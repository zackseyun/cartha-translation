id: GAL.1.21
reference: Galatians 1:21
source:
  edition: SBLGNT
  text: ἔπειτα ἦλθον εἰς τὰ κλίματα τῆς Συρίας καὶ τῆς Κιλικίας.
translation:
  text: Then I went into the regions of Syria and Cilicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the regions of Syria and Cilicia.”
    reason: lexical_alternative
  - marker: b
    text: Or “districts” instead of “regions.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - After that
  - Next
  lexicon: BDAG
  rationale: Marks sequential movement in Paul’s narrative; “Then” is natural modern
    English and preserves the temporal progression.
- source_word: ἦλθον
  chosen: I went
  alternatives:
  - I came
  lexicon: BDAG
  rationale: Although the verb is formally “came,” in English narrative this often
    idiomatically refers to travel from the speaker’s prior location; “I went” best
    fits the movement being described.
- source_word: εἰς
  chosen: into
  alternatives:
  - to
  lexicon: BDAG
  rationale: “Into” preserves the directional force of εἰς, while still sounding natural
    with a regional destination.
- source_word: κλίματα
  chosen: regions
  alternatives:
  - districts
  - territories
  lexicon: BDAG
  rationale: Refers to geographical areas or districts rather than a single city;
    “regions” is the clearest modern equivalent.
- source_word: Συρίας
  chosen: Syria
  rationale: Standard English transliteration of the place name.
- source_word: Κιλικίας
  chosen: Cilicia
  rationale: Standard English transliteration of the place name.
