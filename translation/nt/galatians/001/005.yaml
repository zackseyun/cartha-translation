id: GAL.1.5
reference: Galatians 1:5
source:
  edition: SBLGNT
  text: ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
translation:
  text: to whom be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - to whom belongs
  - to him
  lexicon: BDAG
  rationale: The dative relative pronoun naturally introduces the doxology with 'to
    whom,' referring back to the immediately preceding antecedent, 'our God and Father.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - praise
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and most theologically fitting rendering in
    a doxological context, preserving both weight and familiarity without unnecessary
    paraphrase.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - for the ages of ages
  - unto the ages of the ages
  lexicon: BDAG
  rationale: This is a fixed idiomatic expression of unending duration. 'Forever and
    ever' gives clear modern English while preserving the force of the Greek superlative
    idiom.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: The term is conventionally transliterated in English biblical usage and
    functions as a solemn affirmation concluding the doxology.
