theological_decisions:
- issue: Implied verbal sense in the doxology
  chosen_reading: to whom be the glory
  alternative_readings:
  - to whom belongs the glory
  - to whom is the glory
  rationale: Although no finite verb is expressed in Greek, English normally supplies
    'be' in doxological formulas. This preserves the elevated, prayer-like force without
    adding doctrinal content beyond the idiom.
