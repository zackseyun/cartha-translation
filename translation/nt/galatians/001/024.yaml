id: GAL.1.24
reference: Galatians 1:24
source:
  edition: SBLGNT
  text: καὶ ἐδόξαζον ἐν ἐμοὶ τὸν θεόν.
translation:
  text: And they glorified God because of me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and
  - so
  lexicon: BDAG
  entry: καί
  rationale: Standard connective continuing Paul’s narrative; simple coordination
    is sufficient here.
- source_word: ἐδόξαζον
  chosen: glorified
  alternatives:
  - were glorifying
  - kept glorifying
  - praised
  lexicon: BDAG
  entry: δοξάζω
  rationale: δοξάζω means to give glory or honor. The imperfect suggests ongoing or
    repeated action, but idiomatic English here is best served by the simple past,
    with the durative nuance left implicit.
- source_word: ἐν ἐμοὶ
  chosen: because of me
  alternatives:
  - in me
  - on account of me
  lexicon: BDAG
  entry: ἐν
  rationale: 'Although ἐν is literally ''in,'' in this context the phrase is idiomatically
    causal or associative: the Judean churches were glorifying God on account of what
    God had done in relation to Paul. ''Because of me'' is the clearest modern English
    rendering, while the more literal alternative is preserved in a footnote.'
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  entry: θεός
  rationale: Direct object of ἐδόξαζον; the standard rendering 'God' is straightforward
    and contextually exact.
