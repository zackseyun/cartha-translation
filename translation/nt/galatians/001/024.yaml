theological_decisions:
- issue: Meaning of ἐν ἐμοὶ
  chosen_reading: 'causal/associative: ''because of me'''
  alternative_readings:
  - 'locative/instrumental: ''in me'''
  rationale: The immediate context concerns the churches’ response to Paul’s conversion
    and ministry report. English 'because of me' best conveys that they glorified
    God in response to what God had done with respect to Paul, without suggesting
    that Paul himself was the sphere of divine glory.
  doctrine_reference: Preserve theological tension rather than resolve it; where ambiguity
    remains, render one reading in the main text and preserve the alternative in a
    footnote.
