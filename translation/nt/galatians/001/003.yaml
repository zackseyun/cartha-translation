id: GAL.1.3
reference: Galatians 1:3
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ⸂καὶ κυρίου ἡμῶν⸃ Ἰησοῦ Χριστοῦ,
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "Jesus Christ."'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - grace
  - favor
  lexicon: BDAG
  rationale: Standard epistolary blessing term; 'Grace' preserves both the greeting
    form and Paul's theological resonance.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is naturally rendered 'to you' in an English blessing formula.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '''Peace'' is the established and semantically adequate rendering, preserving
    both Jewish greeting background and theological depth.'
- source_word: ἀπό
  chosen: from
  alternatives:
  - coming from
  lexicon: BDAG
  rationale: The preposition marks source; 'from' is the clearest natural equivalent.
- source_word: θεοῦ πατρὸς
  chosen: God our Father
  alternatives:
  - God the Father
  - God, our Father
  lexicon: BDAG
  rationale: Given the genitive chain with ἡμῶν most naturally understood with πατρός,
    'God our Father' is the most idiomatic and syntactically faithful rendering.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best preserves the title's NT
    and christological force.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine default, Χριστός is translated as 'Messiah' where it functions
    as a title. In this greeting it still carries titular force rather than being
    merely a fixed surname-like element.
