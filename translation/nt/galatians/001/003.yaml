theological_decisions:
- issue: Whether Χριστοῦ should be rendered as a translated title or retained as the
    traditional name-like 'Christ'
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The doctrine guidance prefers translating Χριστός as 'Messiah' where
    title is in view. In Galatians 1:3 the phrase remains a christological designation,
    so the translated title is preferred while preserving the traditional alternative
    in a footnote.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
