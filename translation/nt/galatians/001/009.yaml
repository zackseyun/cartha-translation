id: GAL.1.9
reference: Galatians 1:9
source:
  edition: SBLGNT
  text: ὡς προειρήκαμεν, καὶ ἄρτι πάλιν λέγω, εἴ τις ὑμᾶς εὐαγγελίζεται παρ’ ὃ παρελάβετε,
    ἀνάθεμα ἔστω.
translation:
  text: "As we have said before, so now I say again: if anyone is preaching a gospel\
    \ to you contrary to what you received, let him be accursed."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: "Or \"beyond what you received\"; the phrase can denote deviation from the\
      \ received message."
    reason: lexical_alternative
  - marker: b
    text: "Or \"let him be under a curse\"; Greek: anathema estō."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς προειρήκαμεν
  chosen: As we have said before
  alternatives:
  - As we have previously said
  - Just as we said before
  lexicon: BDAG
  rationale: "προλέγω here refers to something already stated earlier; the English\
    \ keeps the perfect aspect's present relevance without becoming wooden."
- source_word: ἄρτι πάλιν λέγω
  chosen: so now I say again
  alternatives:
  - even now I say again
  - now again I say
  lexicon: BDAG
  rationale: "ἄρτι marks the present moment and πάλιν marks repetition. \"So now\
    \ I say again\" is natural English that preserves both elements."
- source_word: εἴ τις ὑμᾶς εὐαγγελίζεται
  chosen: if anyone is preaching a gospel to you
  alternatives:
  - if anyone proclaims good news to you
  - if anyone preaches to you
  lexicon: BDAG
  rationale: "εὐαγγελίζεται literally relates to proclaiming good news, but in Galatians\
    \ the object is specifically the gospel message; \"is preaching a gospel to you\"\
    \ preserves the verbal force and the polemical contrast."
- source_word: παρ' ὃ
  chosen: contrary to what
  alternatives:
  - beyond what
  - different from what
  lexicon: BDAG
  rationale: "In this context παρά with the relative pronoun signals deviation from\
    \ the apostolic message already received. \"Contrary to what\" best captures\
    \ Paul's adversative force in context."
- source_word: παρελάβετε
  chosen: you received
  alternatives:
  - you accepted
  - you were given
  lexicon: BDAG
  rationale: "\"Received\" is standard and accurate for παραλαμβάνω in the sense\
    \ of receiving a tradition or message."
- source_word: ἀνάθεμα ἔστω
  chosen: let him be accursed
  alternatives:
  - let him be under a curse
  - let him be anathema
  lexicon: BDAG
  rationale: "ἀνάθεμα denotes one devoted to destruction or under divine curse. \"\
    Accursed\" is concise, idiomatic, and preserves the solemn judicial force better\
    \ than the opaque transliteration \"anathema.\""
theological_decisions:
- issue: Force of Paul's condemnation in ἀνάθεμα ἔστω
  chosen_reading: let him be accursed
  alternative_readings:
  - let him be under God's curse
  - let him be anathema
  rationale: "The main text preserves the severity of Paul's warning without importing\
    \ extra doctrinal specification beyond the curse language in the Greek."
