id: GAL.1.23
reference: Galatians 1:23
source:
  edition: SBLGNT
  text: μόνον δὲ ἀκούοντες ἦσαν ὅτι Ὁ διώκων ἡμᾶς ποτε νῦν εὐαγγελίζεται τὴν πίστιν
    ἥν ποτε ἐπόρθει,
translation:
  text: They were only hearing, “The one who formerly persecuted us now proclaims
    the faith he once tried to destroy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gospel'; Greek 'the faith,' likely meaning the Christian message
      or faith once attacked by Paul.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνον
  chosen: only
  alternatives:
  - simply
  - merely
  lexicon: BDAG
  rationale: 'Marks limitation: Paul says their knowledge was restricted to this report.'
- source_word: ἀκούοντες ἦσαν
  chosen: were only hearing
  alternatives:
  - kept hearing
  - were hearing
  lexicon: BDAG
  rationale: The periphrastic imperfect conveys ongoing or repeated reception of report;
    'were only hearing' preserves both the imperfect sense and the limiting force
    of μόνον.
- source_word: ὁ διώκων ἡμᾶς ποτε
  chosen: the one who formerly persecuted us
  alternatives:
  - he who once persecuted us
  - our former persecutor
  lexicon: BDAG
  rationale: Substantival participle with ποτέ is naturally rendered as a descriptive
    phrase identifying Paul by his former activity.
- source_word: νῦν εὐαγγελίζεται
  chosen: now proclaims
  alternatives:
  - now preaches
  - now proclaims the good news of
  lexicon: BDAG
  rationale: εὐαγγελίζεται is gospel-proclamation language. 'Proclaims' is clear modern
    English and avoids overloading the line by repeating 'good news' before the object
    τὴν πίστιν.
- source_word: τὴν πίστιν
  chosen: the faith
  alternatives:
  - the gospel
  - the faith/trust
  lexicon: BDAG
  rationale: With the article, πίστις here most naturally refers to the Christian
    faith as the believed message/body of faith, not primarily the subjective act
    of believing. This keeps the default rendering 'faith' while fitting the context.
- source_word: ἣν ποτε ἐπόρθει
  chosen: he once tried to destroy
  alternatives:
  - which he once was destroying
  - which he once ravaged
  lexicon: BDAG
  rationale: πορθέω carries the sense of ravaging or destroying. 'Tried to destroy'
    captures the hostile destructive intent in idiomatic English and fits Paul's earlier
    description of his campaign against the church.
