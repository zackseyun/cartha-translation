theological_decisions:
- issue: Meaning of τὴν πίστιν
  chosen_reading: '''the faith'' refers to the Christian faith/message Paul now proclaims'
  alternative_readings:
  - '''faith'' as the act of believing'
  - '''gospel'' as a near-contextual rendering'
  rationale: 'In this context Paul contrasts his former persecution with his current
    proclamation of the faith once attacked. The article supports an objective sense:
    the faith as the message/community confession rather than mere inward trust.'
