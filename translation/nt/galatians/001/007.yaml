theological_decisions:
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The phrase refers to the gospel that belongs to or concerns Jesus in
    his messianic office. Following the project's stated default for Χριστός as a
    title, 'Messiah' is preferred in the main text.
