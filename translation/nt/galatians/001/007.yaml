id: GAL.1.7
reference: Galatians 1:7
source:
  edition: SBLGNT
  text: ὃ οὐκ ἔστιν ἄλλο· εἰ μή τινές εἰσιν οἱ ταράσσοντες ὑμᾶς καὶ θέλοντες μεταστρέψαι
    τὸ εὐαγγέλιον τοῦ Χριστοῦ.
translation:
  text: which is not another gospel; except that there are some who are troubling
    you and wanting to distort the gospel of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pervert' the gospel of the Messiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  chosen: another gospel
  alternatives:
  - another
  - a different gospel
  lexicon: BDAG
  rationale: Although ἄλλο stands without an expressed noun here, the immediate context
    from verse 6 makes 'gospel' the understood referent. Supplying it in English preserves
    clarity without adding new meaning.
- source_word: εἰ μή
  chosen: except that
  alternatives:
  - except
  - unless
  lexicon: BDAG
  rationale: Here εἰ μή introduces an exception/explanation rather than a strict conditional.
    'Except that' best reflects Paul's qualification in natural English.
- source_word: ταράσσοντες
  chosen: troubling
  alternatives:
  - disturbing
  - throwing into confusion
  lexicon: BDAG
  rationale: '''Troubling'' preserves the verbal force and pastoral tone of the participle
    while remaining natural in modern English.'
- source_word: θέλοντες
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: '''Wanting'' is concise and idiomatic, preserving the sense of intent
    without overstating volition.'
- source_word: μεταστρέψαι
  chosen: distort
  alternatives:
  - pervert
  - turn upside down
  lexicon: BDAG
  rationale: The verb conveys alteration into something corrupted or contrary. 'Distort'
    is clear, modern, and weighty without sounding archaic; 'pervert' is a viable
    alternative but less accessible in contemporary English.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and readily understood English rendering
    in Pauline contexts. ''Good news'' is possible, but ''gospel'' better preserves
    the term''s technical force here.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per the doctrine guidelines, Χριστός is translated as 'Messiah' where
    it functions as a title. In 'the gospel of the Messiah,' the titular sense is
    still active and preserves the Jewish-messianic frame of Paul's language.
