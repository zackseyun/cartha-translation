id: GAL.1.13
reference: Galatians 1:13
source:
  edition: SBLGNT
  text: Ἠκούσατε γὰρ τὴν ἐμὴν ἀναστροφήν ποτε ἐν τῷ Ἰουδαϊσμῷ, ὅτι καθ’ ὑπερβολὴν
    ἐδίωκον τὴν ἐκκλησίαν τοῦ θεοῦ καὶ ἐπόρθουν αὐτήν,
translation:
  text: For you have heard of my former way of life in Judaism, that I was persecuting
    the church of God beyond measure and was ravaging it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my former conduct” or “my former manner of life.”
    reason: lexical_alternative
  - marker: b
    text: Or “the Jewish religion.”
    reason: lexical_alternative
  - marker: c
    text: Or “excessively” or “to an extraordinary degree.”
    reason: lexical_alternative
  - marker: d
    text: Or “was destroying it” or “was trying to destroy it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστροφήν
  chosen: way of life
  alternatives:
  - conduct
  - manner of life
  lexicon: BDAG
  rationale: The noun refers broadly to one’s way of living or conduct. “Way of life”
    is natural modern English and captures more than isolated behavior.
- source_word: ποτε
  chosen: former
  alternatives:
  - once
  - formerly
  lexicon: BDAG
  rationale: In context, the adverb points to Paul’s earlier life before his calling.
    Rendering it with “former” integrates smoothly with “way of life” and preserves
    the temporal contrast.
- source_word: Ἰουδαϊσμῷ
  chosen: Judaism
  alternatives:
  - the Jewish religion
  - Jewish way of life
  lexicon: BDAG
  rationale: “Judaism” is the straightforward and established sense of the term here,
    referring to Paul’s prior life within Jewish religious identity and practice.
- source_word: καθ’ ὑπερβολὴν
  chosen: beyond measure
  alternatives:
  - excessively
  - to an extraordinary degree
  lexicon: BDAG
  rationale: The phrase intensifies the extent of Paul’s persecution. “Beyond measure”
    preserves the force and rhetorical weight of the Greek while remaining understandable.
- source_word: ἐδίωκον
  chosen: was persecuting
  alternatives:
  - persecuted
  lexicon: BDAG
  rationale: The imperfect verb presents ongoing past action. “Was persecuting” reflects
    that aspect more clearly than a simple past.
- source_word: ἐκκλησίαν τοῦ θεοῦ
  chosen: the church of God
  alternatives:
  - the assembly of God
  lexicon: BDAG
  rationale: Although ἐκκλησία can mean “assembly,” “church” is the most idiomatic
    and contextually fitting rendering for the identifiable community Paul opposed.
- source_word: ἐπόρθουν
  chosen: was ravaging
  alternatives:
  - was destroying
  - was trying to destroy
  lexicon: BDAG
  rationale: The verb is stronger than mere opposition and conveys violent devastation.
    “Was ravaging” preserves that severity and matches the imperfect aspect.
