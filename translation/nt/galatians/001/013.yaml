theological_decisions:
- issue: Rendering ἐκκλησία as church or assembly
  chosen_reading: the church of God
  alternative_readings:
  - the assembly of God
  rationale: The context is Paul’s persecution of the Messiah-following community.
    “Church” best communicates this referent in clear modern English without importing
    extra doctrinal claims.
