theological_decisions:
- issue: Identification of the caller in 'the one who called you'
  chosen_reading: Kept the expression as 'the one who called you' without explicitly
    supplying 'God' in the main text.
  alternative_readings:
  - God who called you
  - Christ who called you
  rationale: The immediate Greek leaves the subject implicit; the translation preserves
    that textual restraint rather than importing an interpretive conclusion into the
    main line.
  doctrine_reference: Preserve theological tension rather than resolve it.
