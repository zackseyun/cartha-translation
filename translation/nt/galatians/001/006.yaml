id: GAL.1.6
reference: Galatians 1:6
source:
  edition: SBLGNT
  text: Θαυμάζω ὅτι οὕτως ταχέως μετατίθεσθε ἀπὸ τοῦ καλέσαντος ὑμᾶς ἐν χάριτι Χριστοῦ
    εἰς ἕτερον εὐαγγέλιον,
translation:
  text: I am astonished that you are so quickly deserting the one who called you in
    the grace of the Messiah for a different gospel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the grace of the Messiah.' The preposition may express sphere or
      means.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as
      a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'to another gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαυμάζω
  chosen: I am astonished
  alternatives:
  - I marvel
  - I am amazed
  lexicon: BDAG
  rationale: Uses clear contemporary English while preserving Paul's shocked tone;
    'astonished' better conveys dismay than the more neutral 'amazed.'
- source_word: οὕτως ταχέως
  chosen: so quickly
  alternatives:
  - so soon
  - so rapidly
  lexicon: BDAG
  rationale: A natural English rendering of the adverbial pair that keeps the emphasis
    on the surprising speed of their shift.
- source_word: μετατίθεσθε
  chosen: deserting
  alternatives:
  - turning away
  - transferring yourselves
  lexicon: BDAG
  rationale: In context the verb describes defection from a person and his call, not
    mere movement between ideas; 'deserting' preserves the relational and covenantal
    force.
- source_word: τοῦ καλέσαντος ὑμᾶς
  chosen: the one who called you
  alternatives:
  - him who called you
  - the one calling you
  lexicon: BDAG
  rationale: Keeps the aorist participle's reference to God's prior calling while
    using natural English without over-specifying the subject in the main text.
- source_word: ἐν χάριτι Χριστοῦ
  chosen: in the grace of the Messiah
  alternatives:
  - by the grace of the Messiah
  - in Messiah's grace
  - in the grace of Christ
  lexicon: BDAG
  rationale: A relatively transparent rendering of ἐν plus dative that preserves the
    genitival relationship and avoids resolving the nuance too narrowly; 'Messiah'
    follows the project's default for Χριστός as a title.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than a fixed name-like form,
    so 'Messiah' best preserves the semantic content in keeping with project guidelines.
- source_word: εἰς ἕτερον εὐαγγέλιον
  chosen: for a different gospel
  alternatives:
  - to a different gospel
  - to another gospel
  lexicon: BDAG
  rationale: '''Different'' reflects ἕτερον well, especially in light of the contrast
    developed in verse 7; ''for'' is idiomatic with ''deserting'' in English while
    still representing εἰς as movement toward another message.'
