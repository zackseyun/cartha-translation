theological_decisions:
- issue: Meaning of Paul's curse formula
  chosen_reading: Paul pronounces a real curse judgment on anyone proclaiming a message
    contrary to the apostolic gospel, rendered 'let him be accursed.'
  alternative_readings:
  - A formal excommunication sense emphasized by 'let him be anathema'
  - A broader sense of divine condemnation expressed as 'let him be under a curse'
  rationale: The text itself is forceful and judicial; 'accursed' preserves that gravity
    without importing later technical ecclesiastical nuance.
