id: GAL.1.8
reference: Galatians 1:8
source:
  edition: SBLGNT
  text: ἀλλὰ καὶ ἐὰν ἡμεῖς ἢ ἄγγελος ἐξ οὐρανοῦ ⸀εὐαγγελίζηται ⸀ὑμῖν παρ’ ὃ εὐηγγελισάμεθα
    ὑμῖν, ἀνάθεμα ἔστω.
translation:
  text: But even if we or an angel from heaven should proclaim good news to you contrary
    to what we proclaimed to you, let him be accursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'should preach the gospel to you.' The Greek uses the verb 'proclaim
      good news.'
    reason: lexical_alternative
  - marker: b
    text: Or 'different from what we proclaimed to you' or 'beyond what we proclaimed
      to you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'let him be anathema' or 'let him be under a curse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ ἐὰν
  chosen: But even if
  alternatives:
  - But if even
  - Yet even if
  lexicon: BDAG
  rationale: Captures the strong adversative force of ἀλλά together with the emphatic
    καί and conditional ἐάν in natural English.
- source_word: ἡμεῖς ἢ ἄγγελος ἐξ οὐρανοῦ
  chosen: we or an angel from heaven
  alternatives:
  - we ourselves or an angel from heaven
  lexicon: BDAG
  rationale: Keeps Paul's emphatic self-inclusion and the heightened contrast of a
    heavenly messenger without adding unnecessary wording.
- source_word: εὐαγγελίζηται
  chosen: should proclaim good news
  alternatives:
  - should preach the gospel
  - should bring good news
  lexicon: BDAG
  rationale: Renders the verb directly rather than importing the noun 'gospel' where
    the Greek uses a verb. 'Proclaim good news' is clear, natural, and transparent
    to the source.
- source_word: παρ’ ὃ
  chosen: contrary to what
  alternatives:
  - beyond what
  - different from what
  lexicon: BDAG
  rationale: In this context παρά marks deviation from the prior apostolic message;
    'contrary to' best conveys the polemical force in readable English.
- source_word: εὐηγγελισάμεθα
  chosen: we proclaimed
  alternatives:
  - we preached
  - we announced as good news
  lexicon: BDAG
  rationale: Maintains lexical connection with εὐαγγελίζηται while avoiding awkward
    repetition like 'proclaimed good news ... proclaimed good news' in English.
- source_word: ἀνάθεμα ἔστω
  chosen: let him be accursed
  alternatives:
  - let him be under a curse
  - let him be anathema
  lexicon: BDAG
  rationale: Best conveys the solemn imprecatory force in clear modern English. 'Anathema'
    is traditional but less accessible; 'under a curse' is interpretive expansion.
