id: GAL.1.12
reference: Galatians 1:12
source:
  edition: SBLGNT
  text: οὐδὲ γὰρ ἐγὼ παρὰ ἀνθρώπου παρέλαβον αὐτό, ⸀οὔτε ἐδιδάχθην, ἀλλὰ δι’ ἀποκαλύψεως
    Ἰησοῦ Χριστοῦ.
translation:
  text: For I neither received it from a human source, nor was I taught it, but through
    a revelation from Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “through a revelation about Jesus Messiah.”
    reason: alternative_reading
lexical_decisions:
- source_word: παρὰ ἀνθρώπου
  chosen: from a human source
  alternatives:
  - from man
  - from a person
  - from a human being
  lexicon: BDAG
  rationale: The phrase is singular and generic, contrasting human mediation with
    divine disclosure. 'From a human source' makes the generic force clear in natural
    English without implying one specific individual.
- source_word: παρέλαβον
  chosen: received
  alternatives:
  - accepted
  - obtained
  lexicon: BDAG
  rationale: '''Received'' is the standard sense in contexts of tradition or transmission
    and fits Paul''s denial that the gospel came to him through human handing-on.'
- source_word: ἐδιδάχθην
  chosen: was taught
  alternatives:
  - was instructed
  lexicon: BDAG
  rationale: The passive verb straightforwardly indicates instruction received from
    another party. 'Was taught' is clear, direct, and preserves the contrast with
    revelation.
- source_word: δι’ ἀποκαλύψεως
  chosen: through a revelation
  alternatives:
  - by revelation
  - through revelation
  lexicon: BDAG
  rationale: The preposition διά naturally expresses means or agency here. Including
    the article in English ('a revelation') reflects the noun's concrete event-like
    force without over-specifying it.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: from Jesus Messiah
  alternatives:
  - of Jesus Messiah
  - about Jesus Messiah
  lexicon: BDAG
  rationale: 'The genitive is ambiguous: it may denote revelation given by Jesus Messiah
    or revelation concerning him. In context, Paul''s point emphasizes source, so
    ''from Jesus Messiah'' best fits the argument, while the alternative is preserved
    in a footnote. ''Messiah'' follows the project''s default for Χριστός as a title.'
