theological_decisions:
- issue: Genitive force in ἀποκαλύψεως Ἰησοῦ Χριστοῦ
  chosen_reading: 'subjective/source genitive: revelation from Jesus Messiah'
  alternative_readings:
  - 'objective genitive: revelation about Jesus Messiah'
  rationale: The immediate context stresses that Paul's gospel did not come through
    human mediation but through divine disclosure. Rendering the phrase as revelation
    'from' Jesus Messiah preserves that contrast most clearly, while acknowledging
    the genuine grammatical ambiguity in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
