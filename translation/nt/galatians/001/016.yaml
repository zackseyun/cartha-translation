id: GAL.1.16
reference: Galatians 1:16
source:
  edition: SBLGNT
  text: ἀποκαλύψαι τὸν υἱὸν αὐτοῦ ἐν ἐμοὶ ἵνα εὐαγγελίζωμαι αὐτὸν ἐν τοῖς ἔθνεσιν,
    εὐθέως οὐ προσανεθέμην σαρκὶ καὶ αἵματι,
translation:
  text: to reveal his Son in me, so that I might proclaim him among the Gentiles,
    I did not immediately consult with flesh and blood,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to me” or “through me.”
    reason: alternative_reading
  - marker: b
    text: “Flesh and blood” is an idiom meaning a human being or human beings.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκαλύψαι
  chosen: to reveal
  alternatives:
  - to unveil
  - to disclose
  lexicon: BDAG
  rationale: The aorist infinitive after God's good pleasure continues the purpose/complement
    idea from the previous verse. “Reveal” is the clearest modern English equivalent
    and preserves the divine-disclosure sense without paraphrase.
- source_word: υἱὸν αὐτοῦ
  chosen: his Son
  alternatives:
  - the Son of him
  lexicon: BDAG
  rationale: This is the natural English rendering of the filial title, preserving
    the christological force of the Greek without expansion.
- source_word: ἐν ἐμοὶ
  chosen: in me
  alternatives:
  - to me
  - through me
  lexicon: BDAG
  rationale: The preposition is literally “in,” and retaining it preserves the text's
    ambiguity between inward revelation and revelation with Paul as its sphere/instrument.
    Because the phrase is genuinely debated, alternatives are preserved in a footnote
    rather than resolved by paraphrase.
- source_word: ἵνα εὐαγγελίζωμαι αὐτὸν
  chosen: so that I might proclaim him
  alternatives:
  - so that I might preach him
  - so that I might proclaim the good news about him
  lexicon: BDAG
  rationale: 'The verb εὐαγγελίζω means proclaim good news, and with αὐτόν as object
    the sense is strikingly personal: Paul proclaims the Son himself. “Proclaim him”
    is readable English that preserves that direct object better than the more interpretive
    “proclaim the good news about him.”'
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  lexicon: BDAG
  rationale: In Pauline usage ἔθνη commonly refers to the non-Jewish peoples. “Gentiles”
    best fits the epistolary context, though “nations” remains a possible more formal
    alternative.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: “Immediately” is the standard and suitably formal rendering in this narrative
    context.
- source_word: οὐ προσανεθέμην
  chosen: I did not immediately consult
  alternatives:
  - I did not immediately confer
  - I did not immediately seek counsel
  lexicon: BDAG
  rationale: The middle verb here carries the sense of consulting or conferring with
    others. “Consult” is natural modern English and fits the following dative phrase.
- source_word: σαρκὶ καὶ αἵματι
  chosen: with flesh and blood
  alternatives:
  - with any human being
  - with mere humans
  lexicon: BDAG
  rationale: This is a known idiom for human beings. Retaining “flesh and blood” preserves
    the vivid Pauline expression; the idiomatic sense is noted in a footnote.
