theological_decisions:
- issue: Meaning of ἐν ἐμοὶ in relation to the revelation of the Son
  chosen_reading: Retain the literal and ambiguous “in me” in the main text
  alternative_readings:
  - to me
  - through me
  rationale: The phrase can be read as inward revelation, revelation to Paul, or revelation
    through Paul for mission. In keeping with the translation philosophy, the draft
    preserves the tension in the main text and records the main alternatives in a
    footnote rather than collapsing the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
