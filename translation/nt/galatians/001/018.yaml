id: GAL.1.18
reference: Galatians 1:18
source:
  edition: SBLGNT
  text: Ἔπειτα μετὰ ⸂ἔτη τρία⸃ ἀνῆλθον εἰς Ἱεροσόλυμα ἱστορῆσαι ⸀Κηφᾶν, καὶ ἐπέμεινα
    πρὸς αὐτὸν ἡμέρας δεκαπέντε·
translation:
  text: Then after three years I went up to Jerusalem to get acquainted with Cephas,
    and I stayed with him fifteen days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to visit Cephas"; the Greek verb can also carry the sense of becoming
      acquainted with someone through personal meeting.
    reason: lexical_alternative
  - marker: b
    text: Cephas is the Aramaic name of Peter.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔπειτα
  chosen: Then
  alternatives:
  - Afterward
  - Next
  lexicon: BDAG
  rationale: Marks the next event in Paul's sequence; 'Then' is natural modern English
    and preserves the narrative flow.
- source_word: μετὰ ἔτη τρία
  chosen: after three years
  alternatives:
  - three years later
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'After three years' closely follows
    the Greek while remaining idiomatic.
- source_word: ἀνῆλθον
  chosen: went up
  alternatives:
  - went
  - traveled up
  lexicon: BDAG
  rationale: The verb literally includes upward movement, fitting travel to Jerusalem.
    'Went up' preserves that nuance without sounding unnatural.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: ἱστορῆσαι
  chosen: to get acquainted with
  alternatives:
  - to visit
  - to inquire of
  lexicon: BDAG
  rationale: The verb carries more nuance than a casual social visit; it suggests
    becoming acquainted with or meeting for informed personal contact. This rendering
    preserves that sense while staying readable.
- source_word: Κηφᾶν
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: Per project philosophy, personal names are transliterated. Since Paul
    specifically writes 'Cephas' here, the draft preserves that form rather than harmonizing
    to 'Peter'.
- source_word: ἐπέμεινα πρὸς αὐτὸν
  chosen: I stayed with him
  alternatives:
  - I remained with him
  lexicon: BDAG
  rationale: This naturally conveys continued presence with Cephas over the stated
    period. 'Stayed with him' is idiomatic and accurate.
- source_word: ἡμέρας δεκαπέντε
  chosen: fifteen days
  alternatives:
  - for fifteen days
  lexicon: BDAG
  rationale: The accusative expresses duration of time. English commonly renders this
    simply as 'fifteen days,' with the duration sense clear from 'stayed.'
