id: GAL.1.10
reference: Galatians 1:10
source:
  edition: SBLGNT
  text: Ἄρτι γὰρ ἀνθρώπους πείθω ἢ τὸν θεόν; ἢ ζητῶ ἀνθρώποις ἀρέσκειν; ⸀εἰ ἔτι ἀνθρώποις
    ἤρεσκον, Χριστοῦ δοῦλος οὐκ ἂν ἤμην.
translation:
  text: For am I now trying to win over people, or God? Or am I seeking to please
    people? If I were still pleasing people, I would not be the Messiah’s slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'am I now seeking the approval of people, or of God?'
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ’s servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρτι
  chosen: now
  alternatives:
  - at present
  - as things stand
  rationale: Marks Paul’s present situation and argument in contrast with any prior
    way of life; 'now' is natural, concise English.
- source_word: πείθω
  chosen: trying to win over
  alternatives:
  - persuade
  - seek approval of
  lexicon: BDAG
  rationale: The verb can mean 'persuade' or 'win over.' Because 'persuade God' sounds
    misleading in English, 'trying to win over' preserves the interpersonal sense
    while fitting the contrast with 'please people.'
- source_word: ἀνθρώπους
  chosen: people
  alternatives:
  - men
  rationale: The Greek refers to human beings generally, not specifically males; 'people'
    is gender-accurate to the sense.
- source_word: θεόν
  chosen: God
  rationale: Direct and standard rendering of the accusative object in the rhetorical
    contrast.
- source_word: ζητῶ
  chosen: am I seeking
  alternatives:
  - am I trying
  - do I seek
  lexicon: BDAG
  rationale: The present tense is well represented by an English progressive in this
    rhetorical question.
- source_word: ἀρέσκειν / ἤρεσκον
  chosen: to please / pleasing
  alternatives:
  - to satisfy
  - to accommodate
  lexicon: BDAG
  rationale: '''Please'' is the most direct and idiomatic rendering in this context
    of human approval.'
- source_word: εἰ ἔτι
  chosen: If I were still
  alternatives:
  - If I were yet
  - If I were continuing to
  rationale: Captures both the conditional force and the adverb ἔτι, implying a former
    pattern of life.
- source_word: Χριστοῦ
  chosen: the Messiah’s
  alternatives:
  - Christ’s
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where the title sense
    is active rather than functioning as a fixed name.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Here Paul stresses total allegiance and bonded ownership in contrast
    to pleasing people, so 'slave' best preserves the force of δοῦλος.
