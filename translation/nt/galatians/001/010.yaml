theological_decisions:
- issue: Rendering Χριστοῦ δοῦλος
  chosen_reading: the Messiah’s slave
  alternative_readings:
  - Christ’s servant
  - Christ’s bondservant
  rationale: The verse contrasts human approval with exclusive belonging to Christ/Messiah.
    Following the doctrine excerpt, δοῦλος is rendered 'slave' where bonded allegiance
    is theologically salient, and Χριστός is rendered 'Messiah' where title meaning
    is foregrounded.
  doctrine_reference: 'Contested terms: Χριστός, δοῦλος'
