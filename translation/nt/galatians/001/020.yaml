id: GAL.1.20
reference: Galatians 1:20
source:
  edition: SBLGNT
  text: ἃ δὲ γράφω ὑμῖν, ἰδοὺ ἐνώπιον τοῦ θεοῦ ὅτι οὐ ψεύδομαι.
translation:
  text: Now what I am writing to you—before God, I am not lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the presence of God.'
    reason: lexical_alternative
  - marker: b
    text: The Greek includes an emphatic particle (ἰδού), traditionally 'behold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - that which
  lexicon: BDAG
  rationale: Neuter plural relative pronoun used idiomatically to introduce the content
    of Paul's present claims; 'what' is natural modern English without losing the
    plural-relative sense.
- source_word: δὲ
  chosen: now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Here δέ functions as a mild discourse transition rather than a strong
    contrast; 'now' marks the shift naturally in English.
- source_word: γράφω
  chosen: am writing
  alternatives:
  - write
  lexicon: BDAG
  rationale: Present tense is best represented with an English progressive here, fitting
    the epistolary context.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun in this context marks the recipients of the letter.
- source_word: ἰδοὺ
  chosen: —
  alternatives:
  - behold
  - look
  lexicon: BDAG
  rationale: ἰδού adds solemn emphasis. Rather than use archaic 'behold' or overly
    colloquial 'look,' the draft conveys the force through punctuation and the oath-like
    clause that follows.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: A conventional solemn appeal formula; 'before God' is concise, natural,
    and preserves the juridical/oath-like force.
- source_word: ὅτι
  chosen: '[not separately translated]'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of Paul's solemn assertion. English expresses
    this naturally without an explicit 'that' after the dash.
- source_word: οὐ ψεύδομαι
  chosen: I am not lying
  alternatives:
  - I do not lie
  - I am telling no lie
  lexicon: BDAG
  rationale: Direct and idiomatic present-tense denial that preserves Paul's emphatic
    self-vindication.
