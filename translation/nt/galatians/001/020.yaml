theological_decisions:
- issue: Force of Paul's appeal to God
  chosen_reading: 'Rendered as a solemn God-invoking assertion: ''before God, I am
    not lying.'''
  alternative_readings:
  - Treated more loosely as mere emphasis without oath-like force
  rationale: The phrase ἐνώπιον τοῦ θεοῦ naturally signals accountability before God
    and strengthens Paul's truth claim, but the translation avoids overstating it
    into a formal oath formula not explicit in the Greek.
