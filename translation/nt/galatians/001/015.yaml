theological_decisions:
- issue: Whether ἀφορίσας should be rendered in a way that imports a specific doctrine
    of predestination or election
  chosen_reading: set me apart
  alternative_readings:
  - chose me
  - appointed me
  - separated me
  rationale: The Greek supports the idea of divine setting apart, likely in prophetic-calling
    idiom, but does not require a more systematized doctrinal rendering. “Set me apart”
    preserves the theological tension without overstating it.
  doctrine_reference: Preserve theological tension rather than resolve it.
