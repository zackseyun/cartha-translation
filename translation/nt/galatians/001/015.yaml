id: GAL.1.15
reference: Galatians 1:15
source:
  edition: SBLGNT
  text: ὅτε δὲ ⸀εὐδόκησεν ὁ ἀφορίσας με ἐκ κοιλίας μητρός μου καὶ καλέσας διὰ τῆς
    χάριτος αὐτοῦ
translation:
  text: But when the one who set me apart from my mother’s womb and called me through
    his grace was pleased
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from birth”; compare prophetic calling language in Jeremiah 1:5 and
      Isaiah 49:1.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - But when
  - Now when
  lexicon: BDAG
  rationale: Keeps the temporal force of ὅτε and the mildly contrastive/continuative
    δέ. “But when” reads naturally in English and preserves the sentence’s turn.
- source_word: εὐδόκησεν
  chosen: was pleased
  alternatives:
  - was pleased
  - was willing
  - decided
  lexicon: BDAG
  rationale: “Was pleased” best reflects εὐδοκέω here, preserving the sense of divine
    good pleasure without flattening it into mere decision or intention.
- source_word: ὁ ἀφορίσας
  chosen: the one who set me apart
  alternatives:
  - he who set me apart
  - the one who separated me
  - the one who appointed me
  lexicon: BDAG
  rationale: The articular participle is naturally rendered substantivally as “the
    one who…”. “Set me apart” communicates consecrating distinction better than the
    more ambiguous “separated” and avoids importing a stronger doctrinal nuance such
    as “appointed” or “chose.”
- source_word: ἐκ κοιλίας μητρός μου
  chosen: from my mother’s womb
  alternatives:
  - from the womb of my mother
  - from birth
  - before I was born
  lexicon: BDAG
  rationale: This preserves the concrete imagery and biblical idiom of the Greek.
    It is more textually transparent than interpretive expansions like “before I was
    born.”
- source_word: καλέσας
  chosen: called
  alternatives:
  - called
  - summoned
  lexicon: BDAG
  rationale: “Called” is the standard and best contextual rendering, especially in
    Pauline usage where divine calling carries vocational and salvific weight without
    needing expansion here.
- source_word: διὰ τῆς χάριτος αὐτοῦ
  chosen: through his grace
  alternatives:
  - by his grace
  - through the grace of him
  lexicon: BDAG
  rationale: “Through his grace” closely reflects διά with the genitive and preserves
    grace as the means/instrument of God’s calling. It is both accurate and natural
    English.
