id: GAL.1.2
reference: Galatians 1:2
source:
  edition: SBLGNT
  text: καὶ οἱ σὺν ἐμοὶ πάντες ἀδελφοί, ταῖς ἐκκλησίαις τῆς Γαλατίας·
translation:
  text: 'And all the brothers with me, to the churches of Galatia:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “brothers and sisters.” The Greek says “brothers,” but may include fellow
      believers of both sexes.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ σὺν ἐμοὶ πάντες ἀδελφοί
  chosen: all the brothers with me
  alternatives:
  - all the brothers who are with me
  - all the siblings with me
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and is rendered gender-accurately
    as “brothers” per project philosophy. The phrase naturally refers to the fellow
    believers presently with Paul. An inclusive alternative is preserved in a footnote
    because the referent may include women.
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline address formulas is best rendered “church,” the standard
    and most natural English equivalent, while still reflecting gathered communities.
- source_word: τῆς Γαλατίας
  chosen: of Galatia
  alternatives:
  - in Galatia
  lexicon: BDAG
  rationale: The genitive with ἐκκλησίαις is most straightforwardly represented as
    “of Galatia” in this epistolary address, matching the Greek construction and conventional
    English style.
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  lexicon: BDAG
  rationale: The conjunction links this sender phrase to Paul in verse 1 and is best
    carried over with a simple “And.”
