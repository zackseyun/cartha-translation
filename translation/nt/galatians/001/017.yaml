theological_decisions:
- issue: Meaning of 'before me' in reference to the apostles
  chosen_reading: 'Temporal priority: apostles prior to Paul''s own apostleship/calling'
  alternative_readings:
  - superior in rank to me
  rationale: The preposition πρό with ἐμοῦ most naturally indicates those who were
    apostles earlier than Paul, not necessarily those of higher authority. The translation
    preserves the temporal sense without importing a doctrinal hierarchy.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
