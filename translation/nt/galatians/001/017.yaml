id: GAL.1.17
reference: Galatians 1:17
source:
  edition: SBLGNT
  text: οὐδὲ ἀνῆλθον εἰς Ἱεροσόλυμα πρὸς τοὺς πρὸ ἐμοῦ ἀποστόλους, ἀλλὰ ἀπῆλθον εἰς
    Ἀραβίαν, καὶ πάλιν ὑπέστρεψα εἰς Δαμασκόν.
translation:
  text: Nor did I go up to Jerusalem to those who were apostles before me, but I went
    away to Arabia, and returned again to Damascus.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδὲ
  chosen: Nor did
  alternatives:
  - and not
  - nor
  lexicon: BDAG
  rationale: Carries forward the negation from the prior context while linking this
    clause tightly to the previous statement; 'Nor did' is natural English and preserves
    the discourse force.
- source_word: ἀνῆλθον
  chosen: go up
  alternatives:
  - went up
  - ascended
  lexicon: BDAG
  rationale: Aorist of ἀνέρχομαι commonly refers to travel up to Jerusalem. 'Go up'
    is idiomatic in English and preserves the geographic/conventional sense without
    sounding overly wooden.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: πρὸς τοὺς πρὸ ἐμοῦ ἀποστόλους
  chosen: to those who were apostles before me
  alternatives:
  - to the apostles before me
  - to those apostles who were before me
  lexicon: BDAG
  rationale: This phrasing preserves both πρός ('to') and πρὸ ἐμοῦ ('before me') while
    making explicit in natural English that temporal priority, not rank, is in view.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks a straightforward contrast between not going to Jerusalem and going
    elsewhere.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: The ἀπ- prefix gives a slight sense of departure/going away, which 'went
    away' preserves better than plain 'went' while remaining readable.
- source_word: Ἀραβίαν
  chosen: Arabia
  lexicon: BDAG
  rationale: Standard English transliteration of the region name; the exact historical
    extent is not specified in the verse itself.
- source_word: πάλιν
  chosen: again
  alternatives:
  - back
  - once more
  lexicon: BDAG
  rationale: Most naturally modifies the return movement and is well represented by
    'again' in smooth English sequence.
- source_word: ὑπέστρεψα
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: BDAG
  rationale: Best concise English equivalent for ὑποστρέφω in a travel context.
- source_word: Δαμασκόν
  chosen: Damascus
  lexicon: BDAG
  rationale: Standard English transliteration of the city name.
