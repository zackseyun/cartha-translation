id: GAL.1.22
reference: Galatians 1:22
source:
  edition: SBLGNT
  text: ἤμην δὲ ἀγνοούμενος τῷ προσώπῳ ταῖς ἐκκλησίαις τῆς Ἰουδαίας ταῖς ἐν Χριστῷ,
translation:
  text: But I was still personally unknown to the churches of Judea that are in Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “unknown by sight” or “unknown in person.”
    reason: lexical_alternative
  - marker: b
    text: Or “in Christ.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  rationale: δέ marks a mild transition/contrast with the previous statement; “But”
    preserves that discourse movement naturally in English.
- source_word: ἀγνοούμενος
  chosen: personally unknown
  alternatives:
  - unknown by sight
  - unknown
  lexicon: BDAG
  rationale: The participle means being unknown or not recognized. With τῷ προσώπῳ,
    the sense is not merely abstract unfamiliarity but lack of personal recognition,
    so “personally unknown” best captures the idiom in natural English.
- source_word: τῷ προσώπῳ
  chosen: personally
  alternatives:
  - by sight
  - in person
  - by face
  lexicon: BDAG
  rationale: The dative with πρόσωπον here is idiomatic, referring to face-to-face/personal
    acquaintance. “Personally” communicates the sense clearly without an awkwardly
    literal rendering.
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: In Pauline usage this refers to Christian congregations; “churches” is
    the clearest contextual rendering in modern English.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - the Judean region
  lexicon: BDAG
  rationale: The geographic reference is straightforward and is best rendered by the
    conventional English place name “Judea.”
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a mere name-like label, and the project’s
    default is “Messiah” where context supports title force. The phrase denotes the
    churches’ union with the Messiah.
