theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the project’s doctrine, Χριστός is rendered “Messiah” when
    its titular sense is still audible. In this context the phrase identifies these
    assemblies in relation to the Anointed One, so “Messiah” preserves that meaning
    better than the traditional transliteration.
