id: PHP.3.9
reference: Philippians 3:9
source:
  edition: SBLGNT
  text: καὶ εὑρεθῶ ἐν αὐτῷ, μὴ ἔχων ἐμὴν δικαιοσύνην τὴν ἐκ νόμου ἀλλὰ τὴν διὰ πίστεως
    Χριστοῦ, τὴν ἐκ θεοῦ δικαιοσύνην ἐπὶ τῇ πίστει,
translation:
  text: and be found in him, not having my own righteousness from the law, but that
    which is through faith in the Messiah—the righteousness from God based on faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through the faithfulness of the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or, 'justice' (for both occurrences of 'righteousness').
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρεθῶ
  chosen: be found
  alternatives:
  - be discovered
  - be seen to be
  lexicon: BDAG
  rationale: Aorist passive subjunctive after καὶ fits Paul's purpose/result nuance;
    'be found' is the established and most natural English equivalent without adding
    interpretation.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - united with him
  lexicon: BDAG
  rationale: The prepositional phrase is central Pauline union-with-Christ language.
    'In him' preserves the source wording and theological breadth without narrowing
    it to one explanatory gloss.
- source_word: μὴ ἔχων
  chosen: not having
  alternatives:
  - without having
  lexicon: BDAG
  rationale: This participle qualifies the manner/state in which Paul is found in
    him. 'Not having' is direct and preserves the participial force.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' in the main
    text. Because this is a Pauline passage where 'justice' is also discussed, that
    alternative is preserved in a footnote.
- source_word: τὴν ἐκ νόμου
  chosen: from the law
  alternatives:
  - from law
  - derived from the law
  lexicon: BDAG
  rationale: '''From the law'' clearly conveys source/origin. Adding the English article
    improves readability and matches idiomatic reference to Mosaic law in Pauline
    argument.'
- source_word: διὰ πίστεως Χριστοῦ
  chosen: through faith in the Messiah
  alternatives:
  - through the faithfulness of the Messiah
  - through faith in Christ
  lexicon: BDAG
  rationale: This is the contested pistis Christou construction. Following project
    guidance, the main text uses the faith reading, while the subjective-genitive
    alternative 'faithfulness of the Messiah' is preserved in a footnote. 'Messiah'
    is preferred over 'Christ' here because Χριστοῦ functions as a title.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where the titular sense
    is active. In this theological contrast, the messianic title remains meaningful
    rather than name-like.
- source_word: τὴν ἐκ θεοῦ δικαιοσύνην
  chosen: the righteousness from God
  alternatives:
  - the righteousness that comes from God
  - the justice from God
  lexicon: BDAG
  rationale: The repeated article and noun restate and define the prior phrase. 'The
    righteousness from God' preserves the source's compact structure and source emphasis.
- source_word: ἐπὶ τῇ πίστει
  chosen: based on faith
  alternatives:
  - on the basis of faith
  - upon faith
  lexicon: BDAG
  rationale: This phrase expresses basis/ground. 'Based on faith' is concise modern
    English and retains the dependence signaled by ἐπί with the dative.
