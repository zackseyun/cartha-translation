theological_decisions:
- issue: Meaning of πίστεως Χριστοῦ
  chosen_reading: 'objective genitive: ''faith in the Messiah'''
  alternative_readings:
  - 'subjective genitive: ''the faithfulness of the Messiah'''
  rationale: The phrase is genuinely contested. To preserve theological tension without
    over-resolving it, the draft follows the project's default main-text rendering
    with πίστις as 'faith' and places the 'faithfulness of the Messiah' alternative
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; contested terms
    table for πίστις and Χριστός'
- issue: Rendering of δικαιοσύνη in a Pauline context
  chosen_reading: '''righteousness'' in the main text'
  alternative_readings:
  - justice
  rationale: The project default for δικαιοσύνη is 'righteousness,' while also preserving
    'justice' in footnotes for Pauline passages. This keeps the traditional Pauline
    sense in the text while exposing the semantic range for review.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δικαιοσύνη'
