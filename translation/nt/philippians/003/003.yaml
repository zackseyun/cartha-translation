theological_decisions:
- issue: Meaning of σάρξ in this verse
  chosen_reading: flesh refers primarily to bodily and human grounds of religious
    confidence, including circumcision and human credentials
  alternative_readings:
  - sinful nature as an inward moral principle
  rationale: In Philippians 3, Paul immediately catalogs circumcision, ethnicity,
    law-observance, and status markers. The context therefore favors 'flesh' as embodied
    and humanly boastworthy identity rather than the broader Pauline sense of indwelling
    sin.
  doctrine_reference: 'Contested terms table: σάρξ rendered contextually as ''flesh''
    (literal) or ''sinful nature'' (metaphorical).'
- issue: Force of πνεύματι θεοῦ
  chosen_reading: reference to the Spirit of God as the means/sphere of worship
  alternative_readings:
  - human spirit
  - worship God spiritually
  rationale: Given the SBLGNT text θεοῦ, the phrase naturally points to the divine
    Spirit. This also strengthens Paul's contrast between true covenant identity and
    merely external ritual.
