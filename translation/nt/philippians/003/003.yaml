id: PHP.3.3
reference: Philippians 3:3
source:
  edition: SBLGNT
  text: ἡμεῖς γάρ ἐσμεν ἡ περιτομή, οἱ πνεύματι θεοῦ λατρεύοντες καὶ καυχώμενοι ἐν
    Χριστῷ Ἰησοῦ καὶ οὐκ ἐν σαρκὶ πεποιθότες,
translation:
  text: For we are the circumcision, who worship by the Spirit of God and boast in
    Messiah Jesus and put no confidence in the flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, with a textual variant, “who worship God in spirit.”
    reason: textual_variant
  - marker: b
    text: “Messiah” translates the title Christos.
    reason: lexical_alternative
  - marker: c
    text: “Flesh” here refers to bodily or human grounds for confidence, such as circumcision
      or status.
    reason: cultural_note
lexical_decisions:
- source_word: περιτομή
  chosen: the circumcision
  alternatives:
  - the truly circumcised
  - God’s circumcised people
  lexicon: BDAG
  rationale: Kept the concrete covenant term rather than paraphrasing it, since Paul’s
    contrast depends on the irony that the true people of circumcision are not merely
    those marked in the body.
- source_word: πνεύματι θεοῦ
  chosen: by the Spirit of God
  alternatives:
  - in the Spirit of God
  - God in spirit
  lexicon: BDAG
  rationale: With the SBLGNT reading θεοῦ, the phrase most naturally refers to the
    agency or sphere of the Holy Spirit rather than to human inwardness alone. 'By
    the Spirit of God' is clear modern English and preserves that sense.
- source_word: λατρεύοντες
  chosen: worship
  alternatives:
  - serve in worship
  - render sacred service
  lexicon: BDAG
  rationale: The verb commonly denotes religious service offered to God. 'Worship'
    is the most natural English rendering here, while still carrying cultic devotion.
- source_word: καυχώμενοι
  chosen: boast
  alternatives:
  - glory
  - rejoice
  lexicon: BDAG
  rationale: '''Boast'' preserves Paul’s contrast of grounds for confidence: believers
    boast in Messiah Jesus rather than in fleshly status. It is sharper and more contextual
    than ''rejoice''.'
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title.
    Here the messianic title remains semantically alive in Paul's argument.
- source_word: σαρκί
  chosen: flesh
  alternatives:
  - sinful nature
  - human status
  - the body
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered contextually. Here the contrast is with
    circumcision and human credentials, so 'flesh' best preserves the literal-metaphorical
    overlap without importing the narrower sense 'sinful nature'.
- source_word: πεποιθότες
  chosen: put no confidence
  alternatives:
  - trust
  - rely
  lexicon: BDAG
  rationale: The perfect participle expresses settled reliance. 'Put no confidence'
    fits Paul's rhetoric and pairs idiomatically with 'in the flesh.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: '''For'' preserves the explanatory link to the previous warning and is
    the most straightforward discourse marker here.'
