id: PHP.3.11
reference: Philippians 3:11
source:
  edition: SBLGNT
  text: εἴ πως καταντήσω εἰς τὴν ἐξανάστασιν ⸂τὴν ἐκ⸃ νεκρῶν.
translation:
  text: if somehow I may attain to the resurrection from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the out-resurrection from among the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ πως
  chosen: if somehow
  alternatives:
  - if by any means
  - if somehow possible
  lexicon: BDAG
  rationale: Conveys Paul's humility and uncertainty of manner without implying doubt
    about God's promise; 'somehow' is natural modern English and preserves the tentative
    force.
- source_word: καταντήσω
  chosen: I may attain
  alternatives:
  - I may arrive at
  - I may reach
  lexicon: BDAG
  rationale: The aorist subjunctive after εἴ πως suggests reaching a goal; 'attain'
    fits the metaphorical sense of arriving at an eschatological outcome better than
    the more spatial 'arrive.'
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  - toward
  lexicon: BDAG
  rationale: In English, 'attain to' idiomatically renders movement toward a goal
    here better than a more literal but less natural prepositional gloss.
- source_word: ἐξανάστασιν
  chosen: the resurrection
  alternatives:
  - the rising again
  - the out-resurrection
  lexicon: BDAG
  rationale: The noun denotes resurrection. A hyper-literal rendering like 'out-resurrection'
    would be obscure in English. The standard 'resurrection' best communicates the
    sense while allowing the unusual form to be noted in rationale rather than forced
    into the main text.
- source_word: τὴν ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: This is the natural English equivalent of the Greek phrase and preserves
    the meaning clearly. The more explicit 'out from among the dead' is possible but
    too cumbersome for the main text.
