theological_decisions:
- issue: Whether ἐξανάστασις should be rendered in a way that distinguishes it sharply
    from the more common ἀνάστασις, potentially implying a special resurrection.
  chosen_reading: Render it as 'the resurrection from the dead' in the main text.
  alternative_readings:
  - the out-resurrection from the dead
  - the resurrection out from among the dead
  rationale: The verse clearly refers to resurrection from among the dead, but the
    unusual form ἐξανάστασις does not require an English neologism. A transparent
    and readable rendering best fits optimal equivalence. The possible nuance of distinctiveness
    is preserved in a footnote rather than overstated in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
