id: PHP.3.20
reference: Philippians 3:20
source:
  edition: SBLGNT
  text: ἡμῶν γὰρ τὸ πολίτευμα ἐν οὐρανοῖς ὑπάρχει, ἐξ οὗ καὶ σωτῆρα ἀπεκδεχόμεθα κύριον Ἰησοῦν Χριστόν,
translation:
  text: For our citizenship is in heaven, from where we also eagerly await a Savior, the Lord Jesus, the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “commonwealth.”
    reason: lexical_alternative
  - marker: b
    text: Greek “in the heavens.”
    reason: lexical_alternative
  - marker: c
    text: Or “the Lord Jesus Christ.”
    reason: alternative_reading
  - marker: d
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: πολίτευμα
  chosen: citizenship
  alternatives:
  - commonwealth
  - homeland
  lexicon: BDAG
  rationale: In this context Paul contrasts earthly-minded identity with the believers’ political/civic belonging. “Citizenship” best preserves the civic force of the noun in clear modern English without overextending to a corporate-political abstraction like “commonwealth.”
- source_word: ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: The Greek uses the plural form, but idiomatic English normally expresses this realm as “heaven.” This preserves sense while remaining natural.
- source_word: ὑπάρχει
  chosen: is
  alternatives:
  - exists
  lexicon: BDAG
  rationale: The verb affirms real present existence. English “is” is the most natural equivalent here, while still carrying the existential force in context.
- source_word: ἐξ οὗ
  chosen: from where
  alternatives:
  - from which
  - from there
  lexicon: BDAG
  rationale: The phrase refers back to heaven as the place from which the awaited Savior comes. “From where” is natural English and preserves the spatial sense.
- source_word: σωτῆρα
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: “Savior” is the standard and contextually appropriate christological term here, preserving both lexical meaning and theological weight.
- source_word: ἀπεκδεχόμεθα
  chosen: eagerly await
  alternatives:
  - wait for eagerly
  - expect eagerly
  lexicon: BDAG
  rationale: The compound verb conveys sustained, expectant waiting. “Eagerly await” captures both expectancy and ongoing posture in readable English.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the doctrine guideline for κύριος, “Lord” is the default rendering and best fits NT christological usage here.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per the doctrine guideline, Χριστός is rendered “Messiah” where it functions as a title. Here, following the personal name Jesus, it still retains titular force rather than operating as a mere surname.
