theological_decisions:
- issue: Rendering Χριστόν in the christological title-string κύριον Ἰησοῦν Χριστόν
  chosen_reading: Messiah in the main text
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs titles to be translated for meaning, and the contested-terms table gives “Messiah” as the default where Χριστός is titular. In Philippians 3:20 the phrase names the expected eschatological deliverer, so the titular sense remains active.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/philippians/003/020.json
  category: awkward_english
  tier: 1
  from: the Lord Jesus the Messiah
  to: the Lord Jesus, the Messiah
  rationale: While the rendering follows the project's guidelines for translating Χριστός, the resulting phrase 'the Lord Jesus the Messiah' is stylistically awkward in English, reading as a single, long title. Adding a comma to set 'the Messiah' in apposition ('the Lord Jesus, the Messiah') would improve the cadence and clarify that 'Messiah' is a title describing Jesus, which aligns with the stated translation rationale.
