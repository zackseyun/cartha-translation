id: PHP.3.2
reference: Philippians 3:2
source:
  edition: SBLGNT
  text: Βλέπετε τοὺς κύνας, βλέπετε τοὺς κακοὺς ἐργάτας, βλέπετε τὴν κατατομήν.
translation:
  text: Watch out for the dogs; watch out for the evil workers; watch out for the
    mutilation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Paul uses 'the mutilation' as a sharp contrast to 'the circumcision' in
      the following verse.
    reason: cross_reference
  - marker: b
    text: Or 'Beware of'; the Greek repeats the same imperative three times for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'the mutilators'; the Greek noun is literally 'mutilation,' a derogatory
      play on the word for circumcision.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  chosen: Watch out for
  alternatives:
  - Beware of
  - Look out for
  lexicon: BDAG
  rationale: The present active imperative is repeated three times for urgent warning.
    'Watch out for' preserves the force in clear modern English better than the more
    formal 'beware of' while keeping the repeated rhythm.
- source_word: τοὺς κύνας
  chosen: the dogs
  alternatives:
  - the filthy dogs
  - the scavenger dogs
  lexicon: BDAG
  rationale: The literal metaphor should be preserved rather than interpreted away.
    In context it is a harsh polemical label, but adding an explanatory adjective
    in the main text would over-translate.
- source_word: τοὺς κακοὺς ἐργάτας
  chosen: the evil workers
  alternatives:
  - the bad workers
  - the wicked laborers
  lexicon: BDAG
  rationale: This rendering keeps both the moral force of κακούς and the ordinary
    sense of ἐργάτας. 'Evil workers' is direct, natural, and preserves Paul's accusation
    without embellishment.
- source_word: τὴν κατατομήν
  chosen: the mutilation
  alternatives:
  - the mutilators
  - the false circumcision
  - the cutting
  lexicon: BDAG
  rationale: The noun is literally an abstract term meaning 'mutilation' or 'cutting
    to pieces.' Rendering it as 'the mutilation' preserves the sharp wordplay with
    περιτομή ('circumcision') in the following verse without importing extra words
    not present in the Greek.
