id: PHP.3.21
reference: Philippians 3:21
source:
  edition: SBLGNT
  text: ὃς μετασχηματίσει τὸ σῶμα τῆς ταπεινώσεως ⸀ἡμῶν σύμμορφον τῷ σώματι τῆς δόξης
    αὐτοῦ κατὰ τὴν ἐνέργειαν τοῦ δύνασθαι αὐτὸν καὶ ὑποτάξαι ⸀αὑτῷ τὰ πάντα.
translation:
  text: who will transform our lowly body to be like his glorious body, by the power
    that enables him even to subject all things to himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the body of our humiliation.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the body of his glory.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the working by which he is able.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετασχηματίσει
  chosen: will transform
  alternatives:
  - will change
  - will refashion
  lexicon: BDAG
  rationale: The verb denotes a real change of form or condition. 'Transform' is natural
    modern English and preserves the strength of the future action better than the
    weaker 'change.'
- source_word: τὸ σῶμα τῆς ταπεινώσεως ἡμῶν
  chosen: our lowly body
  alternatives:
  - the body of our humiliation
  - our humbled body
  lexicon: BDAG
  rationale: A more literal rendering would be 'the body of our humiliation,' but
    'our lowly body' better communicates the genitive phrase in clear English while
    preserving the idea of present bodily lowliness or humiliation.
- source_word: σύμμορφον
  chosen: to be like
  alternatives:
  - conformed to
  - having the same form as
  lexicon: BDAG
  rationale: '''Conformed to'' is more formally precise, but ''to be like'' communicates
    the result naturally in English without denying the strong correspondence implied
    by the Greek adjective.'
- source_word: τῷ σώματι τῆς δόξης αὐτοῦ
  chosen: his glorious body
  alternatives:
  - the body of his glory
  - the body belonging to his glory
  lexicon: BDAG
  rationale: 'The genitive construction is idiomatically expressed in English as an
    attributive idea: the body characterized by glory. ''His glorious body'' is clear
    and faithful.'
- source_word: κατὰ τὴν ἐνέργειαν
  chosen: by the power
  alternatives:
  - according to the working
  - in keeping with the operative power
  lexicon: BDAG
  rationale: The noun refers to active, effective power at work. 'By the power' is
    idiomatic and suitably weighty in context.
- source_word: τοῦ δύνασθαι αὐτὸν
  chosen: that enables him
  alternatives:
  - by which he is able
  - of his being able
  lexicon: BDAG
  rationale: This infinitival construction explains the effective power in terms of
    Christ's ability. 'That enables him' renders the sense smoothly in English while
    keeping the focus on effective capability.
- source_word: ὑποτάξαι ἑαυτῷ τὰ πάντα
  chosen: to subject all things to himself
  alternatives:
  - to bring all things under his authority
  - to subordinate all things to himself
  lexicon: BDAG
  rationale: '''Subject'' preserves the verbal force and the broad scope of τὰ πάντα.
    ''All things'' is important to retain rather than narrowing the statement.'
