theological_decisions:
- issue: Relation between present bodily lowliness and future glorification
  chosen_reading: The verse is rendered to describe a future transformation of believers'
    present lowly bodily condition into likeness with Messiah's glorious body, without
    specifying more than the Greek states about the mechanics of resurrection.
  alternative_readings:
  - A more interpretive rendering could foreground resurrection language explicitly.
  rationale: The Greek clearly speaks of bodily transformation and conformity to his
    glorious body, but it does not elaborate the mechanism here. The translation preserves
    that theological weight without importing extra doctrinal wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
