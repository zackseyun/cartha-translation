theological_decisions:
- issue: Meaning of τέλειοι in Paul’s exhortation
  chosen_reading: spiritually mature
  alternative_readings:
  - perfect
  rationale: Given the immediate context, Paul cannot be asserting absolute perfection
    for the group he addresses. He uses the term comparatively or teleologically for
    those who are mature in outlook, while still pressing onward. Rendering it as
    “mature” preserves that tension rather than implying sinless perfection.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
