theological_decisions:
- issue: Rendering Χριστός in Pauline usage
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this verse Χριστός still carries titular meaning and participates
    in Paul's relational and covenantal framing. Following the doctrine table, the
    title is translated rather than transliterated, while the traditional alternative
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
