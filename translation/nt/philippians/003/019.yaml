id: PHP.3.19
reference: Philippians 3:19
source:
  edition: SBLGNT
  text: ὧν τὸ τέλος ἀπώλεια, ὧν ὁ θεὸς ἡ κοιλία καὶ ἡ δόξα ἐν τῇ αἰσχύνῃ αὐτῶν, οἱ
    τὰ ἐπίγεια φρονοῦντες.
translation:
  text: Their end is destruction, their god is the belly, and their glory is in their
    shame—they are thinking about earthly things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their god is their appetite.”
    reason: lexical_alternative
  - marker: b
    text: Or “set their minds on earthly things.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τέλος
  chosen: end
  alternatives:
  - outcome
  - destiny
  lexicon: BDAG
  rationale: “End” preserves the compact force of the Greek and can denote both termination
    and final outcome. “Destiny” is interpretive; “outcome” is possible but less vivid.
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: “Destruction” is the most natural modern rendering and preserves the
    severe eschatological force without using the more archaic “perdition.”
- source_word: κοιλία
  chosen: belly
  alternatives:
  - stomach
  - appetite
  lexicon: BDAG
  rationale: “Belly” follows the concrete metaphor of the Greek. “Appetite” captures
    the sense but weakens the image by paraphrasing the source.
- source_word: δόξα
  chosen: glory
  alternatives:
  - boast
  - pride
  lexicon: BDAG
  rationale: “Glory” is the direct lexical equivalent and preserves the irony of valuing
    what is shameful. “Boast” or “pride” interpret the expression rather than translate
    it directly.
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  lexicon: BDAG
  rationale: “Shame” is concise and preserves both dishonor and moral disgrace. “Disgrace”
    is acceptable but slightly more paraphrastic.
- source_word: τὰ ἐπίγεια
  chosen: earthly things
  alternatives:
  - earthly matters
  - things on earth
  lexicon: BDAG
  rationale: “Earthly things” is clear, idiomatic, and close to the Greek neuter plural
    expression.
- source_word: φρονοῦντες
  chosen: are thinking about
  alternatives:
  - set their minds on
  - are minded toward
  lexicon: BDAG
  rationale: The participle expresses an ongoing mental orientation. “Are thinking
    about” is readable modern English; “set their minds on” is also strong but somewhat
    more interpretive and idiomatic than the Greek itself.
- source_word: ὧν ... ὧν
  chosen: their ... their
  alternatives:
  - whose ... whose
  lexicon: Greek grammar
  rationale: The repeated genitive relative pronoun refers back to the people described
    in the previous verse. Rendering with “their” avoids stiff English while preserving
    the repeated characterization.
