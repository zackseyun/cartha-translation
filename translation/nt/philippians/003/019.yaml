theological_decisions:
- issue: Metaphorical force of 'their god is the belly'
  chosen_reading: Retained the concrete metaphor 'the belly' in the main text.
  alternative_readings:
  - their god is their appetite
  - their god is their stomach
  rationale: The Greek uses a vivid bodily metaphor for debased desire or sensual
    devotion. Preserving the metaphor maintains Paul's rhetoric without prematurely
    resolving it into a single abstract interpretation.
