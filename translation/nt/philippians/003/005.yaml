id: PHP.3.5
reference: Philippians 3:5
source:
  edition: SBLGNT
  text: περιτομῇ ὀκταήμερος, ἐκ γένους Ἰσραήλ, φυλῆς Βενιαμίν, Ἑβραῖος ἐξ Ἑβραίων,
    κατὰ νόμον Φαρισαῖος,
translation:
  text: circumcised on the eighth day, from the people of Israel, of the tribe of
    Benjamin, a Hebrew from Hebrews; according to the law, a Pharisee,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Hebrew born of Hebrews,' emphasizing Paul's Hebrew parentage and identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτομῇ ὀκταήμερος
  chosen: circumcised on the eighth day
  alternatives:
  - an eight-day-circumcised one
  - circumcised the eighth day
  lexicon: BDAG
  entry: περιτομή; ὀκταήμερος
  rationale: This idiomatic rendering preserves the Jewish covenantal marker and expresses
    the compressed Greek naturally in English.
- source_word: ἐκ γένους Ἰσραήλ
  chosen: from the people of Israel
  alternatives:
  - of the nation of Israel
  - of the stock of Israel
  - from the family line of Israel
  lexicon: BDAG
  entry: γένος
  rationale: γένους here denotes ethnic descent or people-group identity. 'From the
    people of Israel' is natural English that preserves Paul's claim of Israelite
    ancestry without sounding archaic.
- source_word: φυλῆς Βενιαμίν
  chosen: of the tribe of Benjamin
  alternatives:
  - from the tribe of Benjamin
  lexicon: BDAG
  entry: φυλή
  rationale: The genitive phrase identifies tribal lineage. 'Of the tribe of Benjamin'
    is the standard clear rendering.
- source_word: Ἑβραῖος ἐξ Ἑβραίων
  chosen: a Hebrew from Hebrews
  alternatives:
  - a Hebrew born of Hebrews
  - a Hebrew of Hebrews
  lexicon: BDAG
  entry: Ἑβραῖος
  rationale: The phrase is emphatic and concise in Greek. 'A Hebrew from Hebrews'
    preserves that compact force and leaves intact the likely sense of thoroughly
    Hebrew ancestry and identity; a more explicit paraphrase is better kept in a footnote.
- source_word: κατὰ νόμον
  chosen: according to the law
  alternatives:
  - with respect to the law
  - as to the law
  lexicon: BDAG
  entry: κατά; νόμος
  rationale: This reflects the Greek idiom while remaining readable. It signals the
    standard by which the following identification is made.
- source_word: Φαρισαῖος
  chosen: a Pharisee
  alternatives: []
  lexicon: BDAG
  entry: Φαρισαῖος
  rationale: This is the established transliteration for the Jewish sect and is clearer
    than attempting to translate the title.
