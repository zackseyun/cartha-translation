id: PHP.3.6
reference: Philippians 3:6
source:
  edition: SBLGNT
  text: κατὰ ⸀ζῆλος διώκων τὴν ἐκκλησίαν, κατὰ δικαιοσύνην τὴν ἐν νόμῳ γενόμενος ἄμεμπτος.
translation:
  text: as to zeal, persecuting the church; as to righteousness under the law, having
    become blameless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “justice” for “righteousness.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “in the law.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: as to
  alternatives:
  - with respect to
  - according to
  lexicon: BDAG
  rationale: Here κατά introduces the category by which Paul is being evaluated. “As
    to” is concise, natural English and preserves the repeated rhetorical structure
    of the verse.
- source_word: ζῆλος
  chosen: zeal
  alternatives:
  - ardor
  - devotion
  lexicon: BDAG
  rationale: “Zeal” is the standard and most transparent rendering, especially in
    Jewish covenantal and sectarian contexts. It preserves the intensity of Paul’s
    former religious commitment.
- source_word: διώκων
  chosen: persecuting
  alternatives:
  - pursuing
  - hounding
  lexicon: BDAG
  rationale: In this context the verb clearly refers to hostile action against believers,
    not mere pursuit. “Persecuting” best conveys the established sense in Pauline
    usage.
- source_word: ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In Paul this refers to the Christian community, not merely a generic
    assembly. “The church” is the clearest contextual rendering in modern English.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine guidance, δικαιοσύνη normally renders as “righteousness,”
    while “justice” remains a live alternative in Pauline contexts. Here Paul speaks
    of covenantal/legal uprightness measured by the law, so “righteousness” fits best
    in the main text.
- source_word: ἐν νόμῳ
  chosen: under the law
  alternatives:
  - in the law
  - within the law
  lexicon: BDAG
  rationale: Although the Greek is literally “in law,” English idiom is better served
    by “under the law” here, expressing the sphere or standard within which this righteousness
    is assessed.
- source_word: γενόμενος
  chosen: having become
  alternatives:
  - becoming
  - proving to be
  lexicon: BDAG
  rationale: The participle is best represented with a completed verbal idea tied
    to Paul’s former life. “Having become” preserves the participial structure without
    flattening it into a simple adjective.
- source_word: ἄμεμπτος
  chosen: blameless
  alternatives:
  - without fault
  - above reproach
  lexicon: BDAG
  rationale: “Blameless” is the most idiomatic and established rendering. It conveys
    freedom from charge within the stated evaluative framework, without implying absolute
    sinlessness.
