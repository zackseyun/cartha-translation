theological_decisions:
- issue: Scope of Paul’s claimed blamelessness
  chosen_reading: Paul claims blamelessness with respect to righteousness measured
    by the law, not absolute moral perfection before God.
  alternative_readings:
  - Paul is claiming complete sinlessness
  - Paul is speaking only ironically
  rationale: The grammar ties ἄμεμπτος to δικαιοσύνη τὴν ἐν νόμῳ. The verse describes
    Paul’s former standing within Pharisaic/legal evaluation, not an unqualified doctrine
    of human perfection.
