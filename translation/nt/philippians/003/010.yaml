theological_decisions:
- issue: Meaning of κοινωνίαν παθημάτων αὐτοῦ
  chosen_reading: Paul speaks of real participation or sharing in Christ's sufferings,
    not merely emotional sympathy.
  alternative_readings:
  - fellowship with his sufferings in a more abstract sense
  rationale: The genitive construction and the broader Pauline context favor participatory
    sharing in the pattern of Christ's sufferings. The translation keeps this force
    without importing a narrower doctrinal system.
