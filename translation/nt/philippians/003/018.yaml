theological_decisions:
- issue: Rendering Χριστοῦ in a Pauline phrase with established English tradition
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase does not require a name-like use, so the project default for
    the title Χριστός applies. This preserves the meaning of the title rather than
    inheriting English tradition by inertia.
