id: PHP.3.1
reference: Philippians 3:1
source:
  edition: SBLGNT
  text: Τὸ λοιπόν, ἀδελφοί μου, χαίρετε ἐν κυρίῳ. τὰ αὐτὰ γράφειν ὑμῖν ἐμοὶ μὲν οὐκ
    ὀκνηρόν, ὑμῖν δὲ ἀσφαλές.
translation:
  text: Finally, my brothers, rejoice in the Lord. To write the same things to you
    is not troublesome for me, and is safe for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "As for the rest" or "From now on."
    reason: lexical_alternative
  - marker: b
    text: '"Brothers" here addresses the congregation as a whole; that is, "brothers
      and sisters."'
    reason: cultural_note
  - marker: c
    text: Or "is no trouble for me" or "is not tedious for me."
    reason: lexical_alternative
  - marker: d
    text: Or "is a safeguard for you."
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπόν
  chosen: Finally
  alternatives:
  - As for the rest
  - From now on
  lexicon: BDAG
  rationale: Used as a discourse-transition marker. "Finally" is natural English and
    common for this idiom, even if Paul continues the letter at length; alternatives
    are possible but less idiomatic here.
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my brethren
  lexicon: BDAG
  rationale: Kept the masculine plural as "brothers" in line with the project's gender-accurate
    policy. Because Paul addresses the church corporately, an inclusive alternative
    is preserved in a footnote.
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: Imperative plural from χαίρω. "Rejoice" preserves the exhortational force
    and the term's established Pauline usage better than the flatter "be glad."
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in Lord
  lexicon: BDAG
  rationale: Rendered with the default project gloss "Lord" for κύριος. The prepositional
    phrase is preserved straightforwardly to retain Paul's theological framing of
    joy as grounded in union with or relation to the Lord.
- source_word: τὰ αὐτά
  chosen: the same things
  alternatives:
  - these same things
  lexicon: BDAG
  rationale: A formally transparent rendering that leaves the referent broad, matching
    the Greek's ambiguity about whether Paul means repeated exhortations or prior
    teaching more generally.
- source_word: γράφειν
  chosen: to write
  alternatives:
  - writing
  lexicon: BDAG
  rationale: The infinitive is best represented as "to write" in English in this construction.
- source_word: οὐκ ὀκνηρόν
  chosen: is not troublesome for me
  alternatives:
  - is not tedious for me
  - is no trouble for me
  - is not irksome to me
  lexicon: BDAG
  rationale: Conveys that repeating himself does not burden or deter Paul. "Troublesome"
    is natural modern English and avoids the slightly narrower connotation of boredom
    in "tedious."
- source_word: ἀσφαλές
  chosen: safe for you
  alternatives:
  - a safeguard for you
  - beneficially secure for you
  lexicon: BDAG
  rationale: The adjective carries the sense of safety/security. "Safe for you" is
    clear modern English, while a more interpretive expansion like "a safeguard for
    you" is preserved as an alternative.
