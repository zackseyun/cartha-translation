theological_decisions:
- issue: Gendered address to the congregation
  chosen_reading: my brothers
  alternative_readings:
  - my brothers and sisters
  rationale: The Greek is grammatically masculine plural, so the main text keeps the
    gendered form in keeping with the project's policy. Because the referent is the
    whole church, the inclusive force is acknowledged in a footnote rather than absorbed
    into the main text.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #4'
- issue: Meaning of Paul's repeated writing as protective
  chosen_reading: safe for you
  alternative_readings:
  - a safeguard for you
  rationale: The main text preserves the adjective's direct sense without importing
    extra metaphorical wording. The protective nuance remains clear, and the more
    interpretive alternative is noted in a footnote.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #3'
