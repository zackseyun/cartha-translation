id: PHP.3.16
reference: Philippians 3:16
source:
  edition: SBLGNT
  text: πλὴν εἰς ὃ ἐφθάσαμεν, τῷ αὐτῷ ⸀στοιχεῖν.
translation:
  text: Only, let us keep in step with what we have attained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “let us walk by the same rule” / “let us keep to the same standard.”'
    reason: alternative_reading
lexical_decisions:
- source_word: πλήν
  chosen: Only
  alternatives:
  - Nevertheless
  - In any case
  - Except that
  lexicon: BDAG
  rationale: Here πλήν functions as a corrective or limiting transition, not simple
    exception. “Only” is concise, natural English and preserves Paul’s narrowing force.
- source_word: εἰς ὃ
  chosen: with what
  alternatives:
  - to what
  - up to what
  - in regard to what
  lexicon: BDAG
  rationale: The phrase points to the standard or point reached. In idiomatic English
    with στοιχεῖν, “with what” fits best when combined as “keep in step with what
    we have attained.”
- source_word: ἐφθάσαμεν
  chosen: we have attained
  alternatives:
  - we have reached
  - we arrived at
  lexicon: BDAG
  rationale: The aorist refers to the level or point already reached. “Have attained”
    communicates present relevance of past progress in natural English; “reached”
    is possible but slightly less clear in this exhortational context.
- source_word: τῷ αὐτῷ
  chosen: with
  alternatives:
  - by the same
  - according to the same
  lexicon: BDAG
  rationale: The dative phrase means ‘by the same rule/standard/path,’ but ‘rule’
    is not explicit in this SBLGNT wording. Rendering it implicitly in the idiom ‘keep
    in step with’ preserves the sense without adding an unnecessary noun to the main
    text.
- source_word: στοιχεῖν
  chosen: keep in step
  alternatives:
  - walk
  - follow in line
  - live consistently
  lexicon: BDAG
  rationale: στοιχέω commonly conveys walking in line with a standard or keeping in
    step. “Keep in step” preserves the metaphor and reads clearly in modern English.
