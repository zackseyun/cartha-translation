theological_decisions:
- issue: Whether to supply an explicit noun such as 'rule' or 'standard' with τῷ αὐτῷ
  chosen_reading: Do not supply the noun in the main text; render the sense idiomatically
    as 'keep in step with what we have attained.'
  alternative_readings:
  - '''let us walk by the same rule'''
  - '''let us keep to the same standard'''
  rationale: The shorter Greek text here leaves the standard implicit. Supplying 'rule'
    reflects later textual expansions or traditional English renderings more than
    the given source text. The chosen rendering preserves the exhortation without
    over-specifying.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where possible.
