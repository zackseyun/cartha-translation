id: PHP.3.7
reference: Philippians 3:7
source:
  edition: SBLGNT
  text: Ἀλλὰ ἅτινα ἦν μοι κέρδη, ταῦτα ἥγημαι διὰ τὸν Χριστὸν ζημίαν.
translation:
  text: But whatever things were gains to me, these I have considered loss because
    of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "because of Christ."
    reason: lexical_alternative
  - marker: b
    text: Or "I have counted."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding grounds for confidence; 'But'
    is concise and preserves the rhetorical turn.
- source_word: ἅτινα
  chosen: whatever things
  alternatives:
  - whatever
  - whatever things these
  lexicon: BDAG
  rationale: The indefinite relative is broader than a simple demonstrative and points
    to the whole class of former advantages Paul has just listed.
- source_word: κέρδη
  chosen: gains
  alternatives:
  - profits
  - advantages
  lexicon: BDAG
  rationale: The plural noun denotes things counted as assets or advantages. 'Gains'
    is natural English and preserves the accounting metaphor carried through the verse.
- source_word: ἥγημαι
  chosen: I have considered
  alternatives:
  - I have counted
  - I regard
  lexicon: BDAG
  rationale: The perfect form conveys a settled present assessment based on a completed
    reevaluation. 'I have considered' captures that ongoing result in clear English.
- source_word: διὰ τὸν Χριστόν
  chosen: because of the Messiah
  alternatives:
  - for the sake of the Messiah
  - because of Christ
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or cause. Following project
    doctrine, Χριστόν is rendered 'Messiah' as a title rather than transliterated
    'Christ.'
- source_word: ζημίαν
  chosen: loss
  alternatives:
  - damage
  - forfeit
  lexicon: BDAG
  rationale: Singular 'loss' fits the commercial/accounting contrast with plural 'gains'
    and communicates that all former assets are now evaluated as a net loss.
