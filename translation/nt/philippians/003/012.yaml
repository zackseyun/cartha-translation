theological_decisions:
- issue: Whether τετελείωμαι should be rendered in a way that implies sinless perfection
  chosen_reading: have already been perfected
  alternative_readings:
  - have already become perfect
  - have already been made complete
  rationale: The Greek states that Paul denies having reached a completed state, but
    it does not specify a later doctrinal system's categories. The translation keeps
    the passive/resultative force without resolving the broader theological question
    beyond the wording of the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
