id: PHP.3.12
reference: Philippians 3:12
source:
  edition: SBLGNT
  text: Οὐχ ὅτι ἤδη ἔλαβον ἢ ἤδη τετελείωμαι, διώκω δὲ εἰ καὶ καταλάβω, ἐφ’ ᾧ καὶ
    κατελήμφθην ὑπὸ ⸀Χριστοῦ.
translation:
  text: Not that I have already received it or have already been perfected, but I
    press on to see if I may also take hold of that for which I too was taken hold
    of by Christ.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obtained'; the Greek leaves the object implicit from the surrounding
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'have already become perfect' or 'have already been made complete.'
    reason: lexical_alternative
  - marker: c
    text: Greek Christos; alternatively 'Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον
  chosen: have already received it
  alternatives:
  - have already obtained
  - have already taken hold
  lexicon: BDAG
  rationale: λαμβάνω here refers back to the goal in the surrounding context, so English
    supplies the implicit object with 'it' for clarity. 'Received' is natural modern
    English while preserving the sense of not yet attaining what is in view.
- source_word: τετελείωμαι
  chosen: have already been perfected
  alternatives:
  - have already become perfect
  - have already been made complete
  lexicon: BDAG
  rationale: The perfect passive of τελειόω is best reflected with a passive English
    form. 'Been perfected' preserves the completed-state nuance without importing
    a stronger doctrinal claim than the text itself states.
- source_word: διώκω
  chosen: I press on
  alternatives:
  - I pursue
  - I keep striving
  lexicon: BDAG
  rationale: Though διώκω literally means 'pursue,' 'press on' is a clear, natural
    English rendering in this context of ongoing effort.
- source_word: καταλάβω
  chosen: I may also take hold of
  alternatives:
  - I may grasp
  - I may attain
  lexicon: BDAG
  rationale: '''Take hold of'' preserves the concrete force of καταλαμβάνω and keeps
    the verbal link with κατελήμφθην later in the verse.'
- source_word: ἐφ’ ᾧ
  chosen: that for which
  alternatives:
  - because of which
  - for this reason
  lexicon: BDAG
  rationale: 'Here the phrase is best taken as pointing to purpose or goal: Christ
    took hold of Paul with something in view.'
- source_word: κατελήμφθην
  chosen: I too was taken hold of
  alternatives:
  - I was seized
  - I was grasped
  lexicon: BDAG
  rationale: Using 'taken hold of' preserves the wordplay with καταλάβω and keeps
    the passive sense explicit.
- source_word: Χριστοῦ
  chosen: Christ
  alternatives:
  - Messiah
  lexicon: BDAG
  rationale: Although Χριστός often means 'Messiah' as a title, in Paul it can function
    name-like. Here 'Christ' reads more naturally in English while preserving the
    familiar Pauline usage; the title nuance is noted in a footnote.
