theological_decisions:
- issue: Inclusive force of ἀδελφοί
  chosen_reading: Retain 'Brothers' in the main text and clarify broader congregational
    reference in a footnote.
  alternative_readings:
  - Translate directly as 'brothers and sisters' in the main text
  rationale: The Greek form is masculine plural, so the main text should reflect that
    form under the project's gender-accurate policy. Because the address is likely
    inclusive in context, a footnote preserves that contextual sense without erasing
    the source form.
  doctrine_reference: Gender-accurate over gender-neutral
