id: PHP.3.17
reference: Philippians 3:17
source:
  edition: SBLGNT
  text: Συμμιμηταί μου γίνεσθε, ἀδελφοί, καὶ σκοπεῖτε τοὺς οὕτω περιπατοῦντας καθὼς
    ἔχετε τύπον ἡμᾶς·
translation:
  text: Brothers, join in imitating me, and keep your eyes on those who walk this
    way, just as you have us as a pattern.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "brothers and sisters"; the Greek form is masculine plural but likely
      addresses the whole congregation.
    reason: cultural_note
  - marker: b
    text: Or "example."
    reason: lexical_alternative
lexical_decisions:
- source_word: Συμμιμηταί
  chosen: join in imitating
  alternatives:
  - fellow imitators
  - co-imitators
  - be imitators together
  lexicon: BDAG
  rationale: The noun carries the sense of shared imitation, not merely individual
    imitation. 'Join in imitating' preserves the collective force in natural English
    better than the more wooden 'be fellow imitators.'
- source_word: γίνεσθε
  chosen: join in imitating
  alternatives:
  - become
  - be
  lexicon: BDAG
  rationale: The imperative of γίνομαι can mean 'become' or function idiomatically
    as 'be.' In English, its force is absorbed into the idiomatic command 'join in
    imitating.'
- source_word: ἀδελφοί
  chosen: Brothers
  alternatives:
  - brothers and sisters
  - brothers, that is, fellow believers
  lexicon: BDAG
  rationale: The vocative plural is grammatically masculine. Per the project's gender-accurate
    policy, the main text retains 'Brothers,' while inclusivity may be clarified in
    a footnote because Paul likely addresses the whole congregation.
- source_word: σκοπεῖτε
  chosen: keep your eyes on
  alternatives:
  - watch
  - observe
  - take note of
  lexicon: BDAG
  rationale: The verb means to pay careful attention to or notice closely. 'Keep your
    eyes on' conveys ongoing attentiveness in clear modern English.
- source_word: οὕτω περιπατοῦντας
  chosen: those who walk this way
  alternatives:
  - those who live this way
  - those who conduct themselves in this way
  lexicon: BDAG
  rationale: περιπατέω is Paul's common metaphor for manner of life. 'Walk' preserves
    the metaphor, and 'this way' naturally represents οὕτω.
- source_word: τύπον
  chosen: pattern
  alternatives:
  - example
  - model
  lexicon: BDAG
  rationale: τύπος here denotes an exemplar to be followed. 'Pattern' preserves the
    idea of a normative model while fitting the clause smoothly.
- source_word: ἡμᾶς
  chosen: us
  alternatives:
  - me
  - our example
  lexicon: BDAG
  rationale: The plural pronoun should be retained. Paul likely includes himself with
    his co-workers, so the translation should not collapse it to singular.
