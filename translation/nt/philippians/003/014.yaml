id: PHP.3.14
reference: Philippians 3:14
source:
  edition: SBLGNT
  text: κατὰ σκοπὸν διώκω ⸀εἰς τὸ βραβεῖον τῆς ἄνω κλήσεως τοῦ θεοῦ ἐν Χριστῷ Ἰησοῦ.
translation:
  text: I press on toward the goal for the prize of God’s upward call in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the heavenly call” or “the call from above.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek: “in Christ Jesus”; rendered “Messiah Jesus” because Χριστός is a
      title here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ σκοπόν
  chosen: toward the goal
  alternatives:
  - with the goal in view
  - according to the goal
  lexicon: BDAG
  rationale: In this athletic context, the phrase functions idiomatically for directed
    movement toward a fixed objective rather than conformity to a standard. “Toward
    the goal” is natural English and preserves the race imagery.
- source_word: διώκω
  chosen: I press on
  alternatives:
  - I pursue
  - I strive after
  lexicon: BDAG
  rationale: Although the verb can mean “pursue,” in Philippians 3 the established
    metaphor is strenuous forward movement in a race. “I press on” best captures that
    sense in readable modern English.
- source_word: εἰς τὸ βραβεῖον
  chosen: for the prize
  alternatives:
  - toward the prize
  - to win the prize
  lexicon: BDAG
  rationale: Here εἰς marks the aim of the striving. “For the prize” expresses purpose
    cleanly in English without adding words not present in the Greek.
- source_word: ἄνω
  chosen: upward
  alternatives:
  - from above
  - heavenly
  lexicon: BDAG
  rationale: “Upward” preserves both the literal spatial force of ἄνω and the athletic
    imagery of striving ahead and upward. “Heavenly” is interpretive and slightly
    less transparent to the Greek.
- source_word: κλήσεως τοῦ θεοῦ
  chosen: of God’s ... call
  alternatives:
  - of the call of God
  - to which God calls
  lexicon: BDAG
  rationale: 'The genitive construction is most naturally rendered possessively in
    English: the call belongs to or comes from God. This keeps the wording close to
    the Greek while remaining idiomatic.'
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as “Messiah” where it functions
    as a title. In this phrase the title remains meaningful, not merely name-like.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: The prepositional phrase is retained straightforwardly. “In Messiah Jesus”
    preserves Paul’s covenantal-union language while following the project’s title-rendering
    policy.
