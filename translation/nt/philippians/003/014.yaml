theological_decisions:
- issue: Meaning of ἄνω κλήσεως
  chosen_reading: “upward call”
  alternative_readings:
  - “heavenly call”
  - “call from above”
  rationale: The immediate context uses race imagery, so “upward call” best preserves
    the metaphor while still allowing the theological sense that the call is from
    God above. This avoids flattening the image into a purely abstract “heavenly”
    idea.
  doctrine_reference: Preserve theological tension rather than resolve it.
