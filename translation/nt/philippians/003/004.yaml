theological_decisions:
- issue: Meaning of σάρξ in Philippians 3:4
  chosen_reading: Retain “the flesh” in the main text, with the sense of human, worldly,
    or outward grounds for confidence rather than “sinful nature.”
  alternative_readings:
  - human credentials
  - sinful nature
  rationale: The immediate context in Philippians 3:5–6 lists circumcision, lineage,
    law-observance, and zeal, showing that Paul means confidence based on human status
    and covenantal badges. The doctrinal guidelines prefer preserving the source term
    where possible and documenting contextual nuance rather than importing an interpretive
    paraphrase.
  doctrine_reference: 'Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical),
    context-dependent; per-verse documented.'
