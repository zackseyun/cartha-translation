id: PHP.3.13
reference: Philippians 3:13
source:
  edition: SBLGNT
  text: ἀδελφοί, ἐγὼ ἐμαυτὸν ⸀οὐ λογίζομαι κατειληφέναι· ἓν δέ, τὰ μὲν ὀπίσω ἐπιλανθανόμενος
    τοῖς δὲ ἔμπροσθεν ἐπεκτεινόμενος,
translation:
  text: 'Brothers, I do not consider myself to have taken hold of it; but one thing:
    forgetting the things behind and reaching forward to the things ahead,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine Greek vocative adelphoi; Paul often
      uses it for the whole believing community, including women.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: Kept the masculine vocative as 'Brothers' to reflect the Greek form and
    the project's gender-accurate policy; because Paul commonly addresses mixed congregations
    with ἀδελφοί, inclusivity is best preserved in a footnote rather than flattening
    the main text.
- source_word: λογίζομαι
  chosen: consider
  alternatives:
  - reckon
  - count
  lexicon: BDAG
  rationale: '''Consider'' is natural modern English and preserves the sense of personal
    assessment without sounding archaic.'
- source_word: κατειληφέναι
  chosen: to have taken hold of it
  alternatives:
  - to have grasped it
  - to have attained it
  lexicon: BDAG
  rationale: The verb carries the sense of seizing or taking hold. 'Taken hold of
    it' preserves the metaphor from the immediate context (v. 12), while the supplied
    'it' makes the implied object clear in English.
- source_word: ἓν δέ
  chosen: but one thing
  alternatives:
  - but one thing I do
  - yet one thing
  lexicon: BDAG
  rationale: Rendered the Greek ellipsis closely. 'I do' is not expressed here and
    is better left unstated to preserve the abrupt transition.
- source_word: τὰ μὲν ὀπίσω
  chosen: the things behind
  alternatives:
  - what lies behind
  - the things that are behind
  lexicon: BDAG
  rationale: This keeps the article and plural sense visible while remaining idiomatic
    English.
- source_word: ἐπιλανθανόμενος
  chosen: forgetting
  alternatives:
  - leaving behind
  - disregarding
  lexicon: BDAG
  rationale: '''Forgetting'' is the plain lexical sense and fits Paul''s athletic/progressive
    imagery without overinterpretation.'
- source_word: τοῖς δὲ ἔμπροσθεν
  chosen: the things ahead
  alternatives:
  - what lies ahead
  - the things before
  lexicon: BDAG
  rationale: Balances the previous phrase 'the things behind' and preserves the forward-looking
    contrast.
- source_word: ἐπεκτεινόμενος
  chosen: reaching forward
  alternatives:
  - straining toward
  - stretching out toward
  lexicon: BDAG
  rationale: Conveys active forward extension in clear modern English. 'Straining
    toward' is possible, but 'reaching forward' is less interpretively intensified
    and fits the participial flow.
