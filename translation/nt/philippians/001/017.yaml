id: PHP.1.17
reference: Philippians 1:17
source:
  edition: SBLGNT
  text: οἱ δὲ ἐξ ⸂ἐριθείας τὸν Χριστὸν καταγγέλλουσιν, οὐχ ἁγνῶς, οἰόμενοι θλῖψιν
    ἐγείρειν τοῖς δεσμοῖς μου⸃.
translation:
  text: But the others proclaim the Messiah out of selfish ambition, not sincerely,
    thinking to stir up trouble for me in my imprisonment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.”
    reason: alternative_reading
  - marker: b
    text: Literally “in my chains”; that is, in my imprisonment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐριθείας
  chosen: selfish ambition
  alternatives:
  - rivalry
  - factious ambition
  lexicon: BDAG
  rationale: The term denotes self-seeking or partisan ambition rather than mere generic
    selfishness. “Selfish ambition” is established modern English and fits Paul’s
    contrast with sincere motives.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered “Messiah” where it functions as a title.
    Here Paul speaks of proclaiming Jesus in his messianic identity, not using “Christ”
    merely as a name.
- source_word: καταγγέλλουσιν
  chosen: proclaim
  alternatives:
  - preach
  - announce
  lexicon: BDAG
  rationale: “Proclaim” preserves the public heralding sense without narrowing the
    verb to formal preaching alone.
- source_word: ἁγνῶς
  chosen: sincerely
  alternatives:
  - purely
  - with pure motives
  lexicon: BDAG
  rationale: The adverb here refers to purity of motive. “Sincerely” communicates
    that sense in natural modern English, while the negation makes clear their motives
    are impure.
- source_word: οἰόμενοι
  chosen: thinking
  alternatives:
  - supposing
  - imagining
  lexicon: BDAG
  rationale: “Thinking” is the most natural participial rendering in English and adequately
    conveys their intention or assumption.
- source_word: θλῖψιν ἐγείρειν
  chosen: to stir up trouble
  alternatives:
  - to raise up affliction
  - to cause distress
  lexicon: BDAG
  rationale: The expression is idiomatic; a formally literal rendering like “raise
    up affliction” is awkward in English. “Stir up trouble” preserves hostile intent
    and reads naturally.
- source_word: τοῖς δεσμοῖς μου
  chosen: for me in my imprisonment
  alternatives:
  - for my chains
  - in my chains
  lexicon: BDAG
  rationale: δεσμοί literally means “chains,” but in context it stands metonymically
    for imprisonment. The chosen rendering makes the sense clear for modern readers
    while preserving Paul’s suffering context.
