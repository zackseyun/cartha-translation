theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as “Messiah”
    where contextual title usage supports it. This verse refers to the content of
    proclamation, so the titular sense is prominent.
