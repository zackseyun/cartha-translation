id: PHP.1.16
reference: Philippians 1:16
source:
  edition: SBLGNT
  text: οἱ μὲν ἐξ ⸂ἀγάπης, εἰδότες ὅτι εἰς ἀπολογίαν τοῦ εὐαγγελίου κεῖμαι⸃,
translation:
  text: The former do so out of love, knowing that I am appointed for the defense
    of the good news,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the gospel.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “the former … out of love,” with the action implied from the surrounding
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ μὲν
  chosen: The former do so
  alternatives:
  - These indeed
  - The ones on the one hand
  rationale: The Greek is elliptical and contrasts with the following οἱ δέ in the
    next verse. 'The former do so' makes the contrast and implied action clear in
    natural English while signaling that the verb is supplied from context.
- source_word: ἐξ ἀγάπης
  chosen: out of love
  alternatives:
  - from love
  lexicon: BDAG
  rationale: ἀγάπη is rendered with the default 'love' per doctrine. 'Out of love'
    idiomatically conveys motive in English for ἐκ/ἐξ with an abstract noun.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - because they know
  - being aware
  lexicon: BDAG
  rationale: The participle expresses the basis for their loving action; 'knowing'
    preserves the participial connection without over-paraphrasing.
- source_word: εἰς ἀπολογίαν
  chosen: for the defense
  alternatives:
  - for a defense
  - for defending
  lexicon: BDAG
  rationale: ἀπολογία here carries the sense of a legal or reasoned defense. 'For
    the defense' is natural English and preserves the telic force of εἰς.
- source_word: τοῦ εὐαγγελίου
  chosen: of the good news
  alternatives:
  - of the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον is translated by sense as 'good news' for readability and
    source transparency, while retaining the definite reference to the Christian message.
- source_word: κεῖμαι
  chosen: am appointed
  alternatives:
  - am placed here
  - am set
  lexicon: BDAG
  rationale: In context Paul refers to his divinely ordered situation and calling
    in imprisonment; 'am appointed' best conveys the idiomatic sense without the misleadingly
    physical English 'lie' or 'am laid'.
