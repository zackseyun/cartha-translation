theological_decisions:
- issue: Interpretation of κεῖμαι in Paul's imprisonment context
  chosen_reading: am appointed
  alternative_readings:
  - am placed here
  - am set
  rationale: This wording preserves the sense that Paul's present circumstance serves
    a divinely ordered role in defending the gospel, without importing a stronger
    doctrinal claim than the context supports.
