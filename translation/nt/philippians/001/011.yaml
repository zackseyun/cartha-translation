id: PHP.1.11
reference: Philippians 1:11
source:
  edition: SBLGNT
  text: πεπληρωμένοι ⸂καρπὸν δικαιοσύνης τὸν⸃ διὰ Ἰησοῦ Χριστοῦ εἰς δόξαν καὶ ἔπαινον
    θεοῦ.
translation:
  text: filled with the fruit of righteousness that comes through Jesus the Messiah,
    to the glory and praise of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fruit of justice.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; 'Messiah' renders Christos as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεπληρωμένοι
  chosen: filled
  alternatives:
  - having been filled
  - full
  lexicon: BDAG
  rationale: Perfect participle conveying a resulting state; 'filled' is natural English
    and preserves the participial sense from the preceding clause.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - harvest
  - produce
  lexicon: BDAG
  rationale: Standard metaphorical rendering in Pauline usage; 'fruit' preserves the
    image of ethical/spiritual outcome.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: DOCTRINE.md lists 'righteousness' as the default for δικαιοσύνη, while
    preserving 'justice' as an alternative in Pauline contexts. Here it modifies 'fruit'
    and most naturally denotes the moral rightness produced in believers.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: that comes through Jesus Messiah
  alternatives:
  - through Jesus Christ
  - by means of Jesus Messiah
  lexicon: BDAG
  rationale: διά with the genitive indicates means or agency. 'That comes through'
    makes the English flow naturally while preserving dependence on Jesus as mediator.
    Χριστοῦ is rendered 'Messiah' as a title per doctrine guidance.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a christological title rather than merely a name-like second
    proper name, so 'Messiah' best preserves the semantic content.
- source_word: εἰς δόξαν καὶ ἔπαινον θεοῦ
  chosen: to the glory and praise of God
  alternatives:
  - for the glory and praise of God
  lexicon: BDAG
  rationale: εἰς expresses goal or result. 'To the glory and praise of God' is idiomatic
    and preserves the teleological force of the phrase.
