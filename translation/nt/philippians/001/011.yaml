theological_decisions:
- issue: Meaning of 'fruit of righteousness'
  chosen_reading: An ethical/spiritual fruit characterized by righteousness and produced
    through Jesus Messiah.
  alternative_readings:
  - The fruit that consists of righteousness
  - The fruit credited as righteousness
  rationale: The genitive can be understood in more than one way, but in context Paul
    is praying for visible, Christ-produced moral fruit in believers. The wording
    preserves that sense without over-specifying the exact genitival nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
