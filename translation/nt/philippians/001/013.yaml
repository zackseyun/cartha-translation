id: PHP.1.13
reference: Philippians 1:13
source:
  edition: SBLGNT
  text: ὥστε τοὺς δεσμούς μου φανεροὺς ἐν Χριστῷ γενέσθαι ἐν ὅλῳ τῷ πραιτωρίῳ καὶ
    τοῖς λοιποῖς πᾶσιν,
translation:
  text: so that my imprisonment for the Messiah has become known throughout the whole
    imperial guard and to everyone else,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "my chains in the Messiah".
    reason: alternative_reading
  - marker: b
    text: Or "throughout the whole praetorium"; the term may refer to the imperial
      guard or the imperial headquarters/residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - so then
  - with the result that
  lexicon: BDAG
  rationale: Introduces the result of the previous statement; 'so that' is natural
    English and preserves the consequential force.
- source_word: δεσμούς
  chosen: imprisonment
  alternatives:
  - chains
  - bonds
  lexicon: BDAG
  rationale: Though literally 'chains/bonds,' in this context Paul refers metonymically
    to his state of imprisonment. 'Imprisonment' communicates the sense clearly in
    modern English without losing the carceral force.
- source_word: φανεροὺς ... γενέσθαι
  chosen: has become known
  alternatives:
  - has become evident
  - has become clear
  lexicon: BDAG
  rationale: The adjective-plus-infinitive construction expresses that Paul's imprisonment
    came to be publicly recognized. 'Has become known' is idiomatic English and preserves
    the resultative sense.
- source_word: ἐν Χριστῷ
  chosen: for the Messiah
  alternatives:
  - in the Messiah
  - in Christ
  lexicon: BDAG
  rationale: Here the phrase most naturally explains the reason or sphere of Paul's
    imprisonment—his imprisonment is bound up with his allegiance to Christ. 'For
    the Messiah' makes that sense clear in English. 'Messiah' follows project policy
    for Χριστός as a title.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: This is a christological title, not merely a name-like label, so 'Messiah'
    best preserves the title's meaning per project doctrine.
- source_word: πραιτωρίῳ
  chosen: imperial guard
  alternatives:
  - praetorium
  - governor's residence
  - palace guard
  lexicon: BDAG
  rationale: In Philippians this term is commonly understood to refer to the imperial
    guard or the imperial establishment at Rome rather than a building. 'Imperial
    guard' gives the clearest likely referent in context.
- source_word: τοῖς λοιποῖς πᾶσιν
  chosen: to everyone else
  alternatives:
  - to all the rest
  - to all the others
  lexicon: BDAG
  rationale: This phrase broadens the circle beyond the praetorium. 'Everyone else'
    is clear modern English and preserves the inclusive sense.
