id: PHP.1.2
reference: Philippians 1:2
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or Christ.
    reason: lexical_alternative
  - marker: b
    text: Or Master.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: '"Grace" is the standard Pauline greeting term and preserves both the relational and theological weight of χάρις without over-paraphrasing.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is idiomatically rendered "to you" in epistolary blessings and greetings.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '"Peace" is the natural English equivalent and preserves the greeting formula''s resonance with both Greek and Jewish usage.'
- source_word: ἀπό
  chosen: from
  alternatives:
  - coming from
  lexicon: BDAG
  rationale: '"From" is the direct and idiomatic rendering marking source.'
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - our God and Father
  lexicon: BDAG
  rationale: 'The genitive construction is most naturally taken appositionally here: God, who is our Father. "God our Father" is clear, idiomatic, and faithful to the greeting formula.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered "Lord" to preserve its established christological force in New Testament usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  - Jesus the Messiah
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated "Messiah" when functioning as a title. In this greeting formula, the title sense remains intelligible and preserves the meaning of the Greek more transparently than the traditional transliteration "Christ".
