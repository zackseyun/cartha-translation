theological_decisions:
- issue: Rendering Χριστοῦ in a Pauline greeting formula
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Although "Christ" is traditional in English and can function almost name-like in Paul, the doctrine excerpt directs that Χριστός be rendered "Messiah" where title sense is supportable. Here the title remains transparent enough to preserve in the main text.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
status: reviewed
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/philippians/001/002.json
  category: awkward_english
  tier: 1
  from: the Lord Jesus the Messiah
  to: the Lord Jesus Messiah
  rationale: The current rendering with two definite articles ('the Lord... the Messiah') is slightly cumbersome and creates a separation between 'Jesus' and 'Messiah' that is not present in the unified Greek phrase 'Ἰησοῦ Χριστοῦ'. The Greek does not have an article before Χριστοῦ. While English sometimes supplies articles, omitting the second 'the' here ('the Lord Jesus Messiah') creates a more natural and fluid name-title construction, analogous to the traditional 'the Lord Jesus Christ', while still honoring the project's choice to use 'Messiah'.
