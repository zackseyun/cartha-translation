id: PHP.1.28
reference: Philippians 1:28
source:
  edition: SBLGNT
  text: καὶ μὴ πτυρόμενοι ἐν μηδενὶ ὑπὸ τῶν ἀντικειμένων (ἥτις ⸂ἐστὶν αὐτοῖς⸃ ἔνδειξις
    ἀπωλείας, ⸀ὑμῶν δὲ σωτηρίας, καὶ τοῦτο ἀπὸ θεοῦ,
translation:
  text: and not being frightened in any way by those who oppose you. This is a sign
    to them of destruction, but of your salvation—and this is from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being alarmed' or 'being intimidated.'
    reason: lexical_alternative
  - marker: b
    text: Or 'evidence' or 'indication' of destruction.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'this is from God' may refer specifically to salvation or more
      broadly to the whole preceding sign.
    reason: alternative_reading
lexical_decisions:
- source_word: πτυρόμενοι
  chosen: being frightened
  alternatives:
  - being alarmed
  - being intimidated
  lexicon: BDAG
  rationale: The verb conveys being startled or intimidated. 'Being frightened' is
    natural English and preserves the force of refusing fear in the face of opposition.
- source_word: ἐν μηδενί
  chosen: in any way
  alternatives:
  - in nothing
  - in no respect
  lexicon: BDAG
  rationale: This idiom means 'in nothing' or 'in no way.' 'In any way' gives clear
    modern English without weakening the totalizing sense.
- source_word: ἀντικειμένων
  chosen: those who oppose you
  alternatives:
  - the opponents
  - those set against you
  lexicon: BDAG
  rationale: The participle denotes people who are opposing them. 'Those who oppose
    you' is more transparent than the nominalized 'the opponents' and makes the relational
    force explicit.
- source_word: ἔνδειξις
  chosen: sign
  alternatives:
  - evidence
  - proof
  - indication
  lexicon: BDAG
  rationale: The word denotes an evidential indication. 'Sign' is concise, readable,
    and preserves the idea that their fearless conduct points to a larger spiritual
    reality.
- source_word: ἀπωλείας
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: '''Destruction'' is the most natural rendering here and carries the sense
    of ruin or judgment without importing more precision than the Greek itself states.'
- source_word: σωτηρίας
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: In Pauline usage here, the theological weight of God's saving action
    is best preserved by 'salvation' rather than the broader 'deliverance.'
- source_word: τοῦτο ἀπὸ θεοῦ
  chosen: and this is from God
  alternatives:
  - and this from God
  lexicon: BDAG
  rationale: The translation keeps the explicit demonstrative and preserves the source's
    ambiguity about whether 'this' points narrowly to salvation or more broadly to
    the whole preceding circumstance.
