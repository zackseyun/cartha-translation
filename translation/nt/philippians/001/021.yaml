id: PHP.1.21
reference: Philippians 1:21
source:
  edition: SBLGNT
  text: ἐμοὶ γὰρ τὸ ζῆν Χριστὸς καὶ τὸ ἀποθανεῖν κέρδος.
translation:
  text: For to me, to live is Christ, and to die is gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Messiah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - for me
  - as for me
  lexicon: BDAG
  rationale: The dative pronoun is best carried into English with an explicitly personal
    expression. “To me” preserves Paul’s subjective, personal perspective and fits
    the idiomatic structure of the clause.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation of the preceding thought. “For” is the
    most natural concise connector here and preserves the argumentative flow.
- source_word: τὸ ζῆν
  chosen: to live
  alternatives:
  - living
  - the living
  lexicon: BDAG
  rationale: The articular infinitive functions substantivally. “To live” is the clearest
    and most natural English equivalent, preserving the compact parallelism with “to
    die.”
- source_word: Χριστὸς
  chosen: Christ
  alternatives:
  - Messiah
  lexicon: BDAG
  rationale: Although Χριστός often retains titular force, in Paul it can also function
    in a name-like way. In this highly compressed devotional statement, “Christ” sounds
    more natural in English and better reflects likely Pauline usage here, while the
    title-sensitive alternative “Messiah” is preserved in a footnote per project philosophy.
- source_word: τὸ ἀποθανεῖν
  chosen: to die
  alternatives:
  - dying
  - the dying
  lexicon: BDAG
  rationale: As with τὸ ζῆν, the articular infinitive is best rendered with an English
    infinitive to preserve the verse’s balanced structure.
- source_word: κέρδος
  chosen: gain
  alternatives:
  - profit
  - advantage
  lexicon: BDAG
  rationale: “Gain” is the most idiomatic and dignified rendering in this context.
    It preserves the sense of benefit or advantage without sounding overly commercial.
