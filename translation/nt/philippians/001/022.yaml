id: PHP.1.22
reference: Philippians 1:22
source:
  edition: SBLGNT
  text: εἰ δὲ τὸ ζῆν ἐν σαρκί, τοῦτό μοι καρπὸς ἔργου— καὶ τί αἱρήσομαι οὐ γνωρίζω·
translation:
  text: But if to go on living in the flesh means fruitful labor for me, then I do
    not know which I will choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the body."
    reason: lexical_alternative
  - marker: b
    text: Or "fruit of labor" or "fruitful work."
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ζῆν
  chosen: to go on living
  alternatives:
  - to live
  - living
  lexicon: BDAG
  rationale: The articular infinitive refers to continuing life in the present situation.
    'To go on living' makes the sense of ongoing earthly life clear in natural English
    without adding more than the context warrants.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - in the body
  - in bodily life
  lexicon: BDAG
  rationale: σάρξ is rendered with the default literal gloss 'flesh' here because
    the context is physical earthly life, not the metaphorical sense 'sinful nature.'
    Retaining 'flesh' preserves Pauline diction while remaining understandable in
    context.
- source_word: καρπὸς ἔργου
  chosen: fruitful labor
  alternatives:
  - fruit of labor
  - fruitful work
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. 'Fruitful labor' captures
    both καρπός and ἔργου in idiomatic English and conveys productive ministry rather
    than mere activity.
- source_word: αἱρήσομαι
  chosen: I will choose
  alternatives:
  - I will prefer
  - I will take
  lexicon: BDAG
  rationale: In this context Paul speaks of selecting between two possibilities. 'Choose'
    is the clearest and most natural rendering.
- source_word: οὐ γνωρίζω
  chosen: I do not know
  alternatives:
  - I cannot tell
  - I am not making known
  lexicon: BDAG
  rationale: Although γνωρίζω can mean 'make known,' here the idiom functions as an
    expression of uncertainty. 'I do not know' best fits the immediate contrast and
    standard English usage.
