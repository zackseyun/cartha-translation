theological_decisions:
- issue: Meaning of σάρξ in this verse
  chosen_reading: physical earthly existence ('in the flesh')
  alternative_readings:
  - sinful nature
  rationale: The context contrasts continued earthly life with departure to be with
    Messiah, so σάρξ refers to embodied life rather than moral corruption.
  doctrine_reference: 'Contested terms: σάρξ = flesh (literal) / sinful nature (metaphorical)'
