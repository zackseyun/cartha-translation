id: PHP.1.20
reference: Philippians 1:20
source:
  edition: SBLGNT
  text: κατὰ τὴν ἀποκαραδοκίαν καὶ ἐλπίδα μου ὅτι ἐν οὐδενὶ αἰσχυνθήσομαι, ἀλλ’ ἐν
    πάσῃ παρρησίᾳ ὡς πάντοτε καὶ νῦν μεγαλυνθήσεται Χριστὸς ἐν τῷ σώματί μου, εἴτε
    διὰ ζωῆς εἴτε διὰ θανάτου.
translation:
  text: in keeping with my eager expectation and hope that I will not be put to shame
    in anything, but that with all boldness, as always, even now Messiah will be magnified
    in my body, whether through life or through death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will not be ashamed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: in keeping with
  alternatives:
  - according to
  - in accord with
  lexicon: BDAG
  rationale: Here κατά introduces conformity to Paul's expectation and hope rather
    than spatial or merely causal sense; 'in keeping with' is natural English that
    preserves that idea.
- source_word: ἀποκαραδοκίαν
  chosen: eager expectation
  alternatives:
  - earnest expectation
  - eager longing
  lexicon: BDAG
  rationale: This rare noun is vivid and intensified; 'eager expectation' best preserves
    the forward-looking, strained expectancy without becoming awkward.
- source_word: ἐλπίδα
  chosen: hope
  lexicon: BDAG
  rationale: Standard Pauline sense of confident hope fits the context and pairs naturally
    with 'eager expectation.'
- source_word: ἐν οὐδενὶ
  chosen: in anything
  alternatives:
  - in no respect
  - in nothing
  lexicon: BDAG
  rationale: The phrase expresses total negation across any circumstance; 'in anything'
    is idiomatic modern English.
- source_word: αἰσχυνθήσομαι
  chosen: I will not be put to shame
  alternatives:
  - I will not be ashamed
  lexicon: BDAG
  rationale: The passive/deponent form can mean either 'be ashamed' or 'be put to
    shame.' In this context of public witness and vindication, 'be put to shame' better
    preserves the forensic/public nuance while remaining clear.
- source_word: παρρησίᾳ
  chosen: boldness
  alternatives:
  - openness
  - frankness
  lexicon: BDAG
  rationale: The context is courageous public witness to Messiah; 'boldness' captures
    that better than the narrower 'frankness.'
- source_word: μεγαλυνθήσεται
  chosen: will be magnified
  alternatives:
  - will be exalted
  - will be shown to be great
  lexicon: BDAG
  rationale: The verb means to make or show as great. 'Will be magnified' preserves
    the metaphor and longstanding biblical resonance without obscuring meaning.
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated 'Messiah' where it functions
    as a title. Here the sense is still meaning-bearing rather than a mere proper-name
    label, so 'Messiah' is preferred.
- source_word: ἐν τῷ σώματί μου
  chosen: in my body
  alternatives:
  - through my body
  lexicon: BDAG
  rationale: A literal rendering is clear in English and preserves Paul's embodied
    witness, whether in living or dying.
- source_word: διὰ ζωῆς … διὰ θανάτου
  chosen: through life or through death
  alternatives:
  - by life or by death
  lexicon: BDAG
  rationale: διά with the genitive marks means or circumstance; 'through' keeps the
    parallel structure and avoids overinterpreting instrumentality.
