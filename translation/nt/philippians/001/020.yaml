theological_decisions:
- issue: Rendering Χριστός in a Pauline context
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where its
    titular force is still audible. In Philippians 1:20 the clause concerns the honor
    and public display of Jesus' messianic identity, so preserving the title's meaning
    is preferable.
