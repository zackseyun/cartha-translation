theological_decisions:
- issue: Rendering Χριστοῦ in the eschatological phrase εἰς ἡμέραν Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase is titular rather than merely name-like, so the doctrinal
    default favors 'Messiah' to preserve the title's meaning. The traditional English
    'day of Christ' is preserved in a footnote as a familiar alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
