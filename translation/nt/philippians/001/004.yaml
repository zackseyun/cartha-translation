id: PHP.1.4
reference: Philippians 1:4
source:
  edition: SBLGNT
  text: πάντοτε ἐν πάσῃ δεήσει μου ὑπὲρ πάντων ὑμῶν, μετὰ χαρᾶς τὴν δέησιν ποιούμενος,
translation:
  text: always in every prayer of mine for all of you, praying with joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'petition' / 'request' for δέησις; the Greek specifically emphasizes
      an entreaty or appeal in prayer.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'making the prayer with joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: The adverb marks the habitual character of Paul's intercession; 'always'
    is the clearest natural English equivalent.
- source_word: ἐν πάσῃ δεήσει μου
  chosen: in every prayer of mine
  alternatives:
  - in my every prayer
  - in every petition of mine
  lexicon: BDAG
  rationale: This preserves both the distributive force of πάσῃ ('every') and the
    possessive μου, while reading naturally in English.
- source_word: δέησις
  chosen: prayer
  alternatives:
  - petition
  - request
  lexicon: BDAG
  rationale: δέησις can mean a specific petition or request, but in this context of
    address to God, 'prayer' is the most natural English rendering. The more specific
    nuance is preserved in a footnote.
- source_word: ὑπὲρ πάντων ὑμῶν
  chosen: for all of you
  alternatives:
  - on behalf of all of you
  lexicon: BDAG
  rationale: '''For all of you'' is idiomatic and accurately conveys ὑπέρ with the
    genitive in an intercessory context.'
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: The prepositional phrase is preserved directly rather than converted
    to an adverb, keeping the Greek emphasis and cadence.
- source_word: τὴν δέησιν ποιούμενος
  chosen: praying
  alternatives:
  - making prayer
  - offering the prayer
  lexicon: BDAG
  rationale: ποιέω with δέησις is an idiomatic expression meaning to make or offer
    prayer. 'Praying' conveys the sense naturally in English, even though it compresses
    the Greek cognate construction.
