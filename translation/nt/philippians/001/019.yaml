theological_decisions:
- issue: Meaning of σωτηρίαν in Paul's imprisonment context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  - vindication
  rationale: The immediate context concerns Paul's present chains and anticipated
    outcome, so 'deliverance' best captures the likely referent while preserving the
    broader theological echo of salvation; the alternatives are preserved in a footnote
    because the term retains interpretive breadth.
  doctrine_reference: Preserve theological tension rather than resolve it.
