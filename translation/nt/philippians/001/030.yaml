id: PHP.1.30
reference: Philippians 1:30
source:
  edition: SBLGNT
  text: τὸν αὐτὸν ἀγῶνα ἔχοντες οἷον εἴδετε ἐν ἐμοὶ καὶ νῦν ἀκούετε ἐν ἐμοί.
translation:
  text: having the same struggle that you saw in me and now hear that I still have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “having the same struggle that you saw in me and now hear in
      me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγῶνα
  chosen: struggle
  alternatives:
  - conflict
  - fight
  lexicon: BDAG
  rationale: ἀγών denotes a contest or intense struggle. “Struggle” preserves both
    the hardship and the ongoing nature of the believers’ suffering without sounding
    overly militarized.
- source_word: ἔχοντες
  chosen: having
  alternatives:
  - experiencing
  - engaged in
  lexicon: BDAG
  rationale: The participle is most directly rendered as “having,” which keeps the
    Greek structure and links this verse tightly to the preceding sentence.
- source_word: οἷον
  chosen: that
  alternatives:
  - such as
  - the kind that
  lexicon: BDAG
  rationale: Here οἷον introduces comparison with Paul’s experience. “That” is smoother
    modern English in this construction while preserving the comparative sense.
- source_word: εἴδετε
  chosen: you saw
  alternatives:
  - you witnessed
  lexicon: BDAG
  rationale: The aorist points to what the Philippians had directly observed in Paul,
    likely during his earlier ministry among them. “You saw” is natural and sufficiently
    precise.
- source_word: ἐν ἐμοί
  chosen: in me / that I still have
  alternatives:
  - in my case
  - about me
  lexicon: BDAG
  rationale: The phrase is literally “in me,” but in English the second occurrence
    with “hear” is awkward if translated woodenly. The draft keeps the first as “in
    me” and renders the second idiomatically as “that I still have,” making explicit
    that they now hear Paul continues in the same struggle.
- source_word: νῦν
  chosen: still
  alternatives:
  - now
  lexicon: BDAG
  rationale: While νῦν literally means “now,” in this context “still” communicates
    that Paul’s struggle continues into the present, which is the force of the comparison.
