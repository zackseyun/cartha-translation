theological_decisions:
- issue: Meaning of the genitive in χαρὰν τῆς πίστεως
  chosen_reading: joy in the faith
  alternative_readings:
  - joy of faith
  - joy that comes from faith
  rationale: The phrase is grammatically flexible. The main text preserves a natural
    English rendering without collapsing the ambiguity into a more interpretive causal
    paraphrase; alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
