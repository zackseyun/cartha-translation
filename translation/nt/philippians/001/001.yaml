- issue: Rendering Χριστός in Pauline address formula
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine excerpt directs that Χριστός be rendered 'Messiah' where
    it functions as a title. Here the phrase still carries titular force, so the translated
    title is preferred even though English tradition strongly favors 'Christ Jesus.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering δοῦλοι in Philippians 1:1
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The doctrine excerpt explicitly names Philippians 1:1 as a place where
    δοῦλος should reflect bonded status. This makes 'slaves' the project-default choice
    here.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table
    for δοῦλος'
