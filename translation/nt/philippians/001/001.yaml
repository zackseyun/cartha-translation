id: PHP.1.1
reference: Philippians 1:1
source:
  edition: SBLGNT
  text: Παῦλος καὶ Τιμόθεος δοῦλοι ⸂Χριστοῦ Ἰησοῦ⸃ πᾶσιν τοῖς ἁγίοις ἐν Χριστῷ Ἰησοῦ
    τοῖς οὖσιν ἐν Φιλίπποις σὺν ἐπισκόποις καὶ διακόνοις·
translation:
  text: 'Paul and Timothy, slaves of Messiah Jesus, to all the saints in Messiah Jesus
    who are in Philippi, together with the overseers and deacons:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either way in
      English; here it is translated as 'Messiah' to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'servants' or 'bondservants.'
    reason: lexical_alternative
  - marker: c
    text: Or 'bishops' for 'overseers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The doctrine excerpt specifically cites Philippians 1:1 as a context
    where the bonded nature of δοῦλος is theologically salient, so 'slaves' best reflects
    the source over traditional 'servants.'
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Χριστός is a title, not a personal name in origin. Per doctrine, titles
    are translated where context supports, so 'Messiah' preserves the title's meaning.
- source_word: ἁγίοις
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: '''Saints'' is the most natural concise English equivalent in Pauline
    address formulas and preserves the covenantal-holy identity of the believers.'
- source_word: ἐν
  chosen: in
  alternatives:
  - among
  - with
  lexicon: BDAG
  rationale: The repeated ἐν is retained as 'in' to preserve Paul's locative and union-with-Christ
    phrasing rather than paraphrasing it away.
- source_word: τοῖς οὖσιν ἐν Φιλίπποις
  chosen: who are in Philippi
  alternatives:
  - in Philippi
  - those being in Philippi
  lexicon: BDAG
  rationale: The participial phrase is made into natural English relative-clause form
    while preserving the explicit reference to those located in Philippi.
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  lexicon: BDAG
  rationale: '''Together with'' preserves the sense of association slightly more clearly
    than a bare ''with'' in English.'
- source_word: ἐπισκόποις
  chosen: overseers
  alternatives:
  - bishops
  lexicon: BDAG
  rationale: '''Overseers'' translates the Greek meaning transparently and avoids
    importing later ecclesial office connotations attached to ''bishops.'''
- source_word: διακόνοις
  chosen: deacons
  alternatives:
  - servants
  - ministers
  lexicon: BDAG
  rationale: In this paired church-office context, 'deacons' is the clearest established
    rendering and likely reflects a recognized ministry role rather than generic service.
- source_word: πᾶσιν τοῖς ἁγίοις
  chosen: to all the saints
  alternatives:
  - to all God's holy people
  lexicon: BDAG
  rationale: This keeps the formal address structure concise and close to the Greek
    without adding words not present in the text.
