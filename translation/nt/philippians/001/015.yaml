id: PHP.1.15
reference: Philippians 1:15
source:
  edition: SBLGNT
  text: Τινὲς μὲν καὶ διὰ φθόνον καὶ ἔριν, τινὲς δὲ καὶ δι’ εὐδοκίαν τὸν Χριστὸν κηρύσσουσιν·
translation:
  text: Some indeed proclaim the Messiah because of envy and rivalry, but others also
    because of goodwill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos).
    reason: lexical_alternative
lexical_decisions:
- source_word: Τινὲς … τινὲς
  chosen: Some … others
  alternatives:
  - Some people … others
  - Certain ones … others
  rationale: The indefinite pronoun marks two contrasted groups. 'Some ... others'
    is natural English and preserves the μέν … δέ contrast.
- source_word: διὰ φθόνον
  chosen: because of envy
  alternatives:
  - from envy
  - out of envy
  lexicon: BDAG
  rationale: With διά + accusative, the phrase is causal here. 'Because of envy' clearly
    expresses motive.
- source_word: ἔριν
  chosen: rivalry
  alternatives:
  - strife
  - contention
  lexicon: BDAG
  rationale: In this context of impure motives, 'rivalry' fits the interpersonal competitive
    sense better than the more archaic 'strife'.
- source_word: δι’ εὐδοκίαν
  chosen: because of goodwill
  alternatives:
  - from goodwill
  - with good intention
  - because of good purpose
  lexicon: BDAG
  rationale: This phrase contrasts with envy and rivalry, so a motive sense is best.
    'Goodwill' is concise, natural, and morally positive without over-specification.
- source_word: τὸν Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title. Here the article supports a titular sense rather than a name-like
    use.
- source_word: κηρύσσουσιν
  chosen: proclaim
  alternatives:
  - preach
  - announce
  lexicon: BDAG
  rationale: '''Proclaim'' preserves the heraldic sense of κηρύσσω while remaining
    readable modern English. ''Preach'' is possible but can sound more institutional
    than the Greek requires.'
