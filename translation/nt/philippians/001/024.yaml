id: PHP.1.24
reference: Philippians 1:24
source:
  edition: SBLGNT
  text: τὸ δὲ ἐπιμένειν ⸀ἐν τῇ σαρκὶ ἀναγκαιότερον δι’ ὑμᾶς.
translation:
  text: But to remain in the flesh is more necessary for your sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to continue living in the body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἐπιμένειν
  chosen: to remain
  alternatives:
  - to continue
  - to stay on
  lexicon: BDAG
  rationale: The articular infinitive functions substantivally; 'to remain' gives
    natural English while preserving Paul's focus on continuing earthly life.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks contrast with the preceding thought about departing to
    be with Christ, so 'But' best signals the turn.
- source_word: ἐν τῇ σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the body
  - in this life
  lexicon: BDAG
  rationale: This is a literal use of σάρξ referring to embodied earthly existence,
    not the metaphorical sense 'sinful nature.' The doctrinal default favors 'flesh'
    in literal contexts.
- source_word: ἀναγκαιότερον
  chosen: more necessary
  alternatives:
  - more needful
  - more essential
  lexicon: BDAG
  rationale: The comparative sense should be preserved. 'More necessary' is clear,
    direct, and close to the Greek.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - because of you
  - for you
  lexicon: BDAG
  rationale: '''For your sake'' expresses benefit-oriented purpose in smooth English
    and fits the pastoral context better than the more ambiguous ''because of you''.'
