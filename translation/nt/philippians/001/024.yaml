theological_decisions:
- issue: Meaning of σάρξ in this verse
  chosen_reading: literal embodied earthly life ('in the flesh')
  alternative_readings:
  - metaphorical moral sense ('sinful nature')
  - expanded paraphrase ('remain alive in this world')
  rationale: In context Paul contrasts departing to be with Christ with continuing
    his present bodily life for the Philippians' benefit. A moralized reading would
    import a theological nuance not warranted by the immediate context.
  doctrine_reference: 'Contested terms table: σάρξ = ''flesh'' (literal) / ''sinful
    nature'' (metaphorical), context-dependent.'
