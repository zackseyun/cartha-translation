id: PHP.1.5
reference: Philippians 1:5
source:
  edition: SBLGNT
  text: ἐπὶ τῇ κοινωνίᾳ ὑμῶν εἰς τὸ εὐαγγέλιον ἀπὸ ⸀τῆς πρώτης ἡμέρας ἄχρι τοῦ νῦν,
translation:
  text: because of your partnership in the gospel from the first day until now,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the gospel.' The Greek phrase can express either the sphere of their
      shared participation or its goal/purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ
  chosen: because of
  alternatives:
  - on account of
  - for
  lexicon: BDAG
  rationale: With the dative τῇ κοινωνίᾳ, ἐπί here gives the basis or cause of Paul's
    thanksgiving/prayer in the surrounding sentence, best expressed as causal 'because
    of' in natural English.
- source_word: κοινωνίᾳ
  chosen: partnership
  alternatives:
  - fellowship
  - participation
  - sharing
  lexicon: BDAG
  rationale: κοινωνία here refers not merely to warm association but active shared
    participation in the advance of the gospel; 'partnership' captures the relational
    and mission-oriented sense well in context.
- source_word: ὑμῶν
  chosen: your
  rationale: The genitive pronoun straightforwardly marks the Philippians as the possessors/participants
    of this partnership.
- source_word: εἰς τὸ εὐαγγέλιον
  chosen: in the gospel
  alternatives:
  - for the gospel
  - toward the gospel
  lexicon: BDAG
  rationale: Although εἰς often has a directional force ('for/toward'), in this collocation
    it idiomatically expresses the sphere or purpose of their shared participation.
    'In the gospel' is concise and natural, while preserving the close bond between
    κοινωνία and εὐαγγέλιον.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and theologically weighty rendering in
    Pauline contexts; ''good news'' is possible but lighter than the term''s loaded
    usage in Philippians.'
- source_word: ἀπὸ τῆς πρώτης ἡμέρας
  chosen: from the first day
  alternatives:
  - since the first day
  lexicon: BDAG
  rationale: This phrase marks the starting point of the Philippians' participation.
    'From the first day' is both accurate and idiomatic.
- source_word: ἄχρι τοῦ νῦν
  chosen: until now
  alternatives:
  - up to now
  - until the present
  lexicon: BDAG
  rationale: ἄχρι with the temporal expression τοῦ νῦν marks continuation up to the
    present moment; 'until now' is the most natural rendering.
