theological_decisions:
- issue: Implication of postmortem fellowship with Christ
  chosen_reading: to depart and be with the Messiah
  alternative_readings:
  - to die and go to heaven immediately
  rationale: The translation preserves what the Greek explicitly states—departure
    and being with the Messiah—without expanding it into doctrinal language not present
    in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
