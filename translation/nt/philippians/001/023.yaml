id: PHP.1.23
reference: Philippians 1:23
source:
  edition: SBLGNT
  text: συνέχομαι δὲ ἐκ τῶν δύο, τὴν ἐπιθυμίαν ἔχων εἰς τὸ ἀναλῦσαι καὶ σὺν Χριστῷ
    εἶναι, πολλῷ ⸀γὰρ μᾶλλον κρεῖσσον,
translation:
  text: But I am torn between the two, since I have the desire to depart and be with
    the Messiah, for that is much better.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ.'' Greek: ''the Messiah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'to die.' Literally 'to depart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέχομαι
  chosen: am torn
  alternatives:
  - am hard pressed
  - am constrained
  lexicon: BDAG
  rationale: The verb conveys being pressed or held in tension. 'Am torn' expresses
    Paul's inner conflict in natural English while preserving the sense of being constrained
    by competing options.
- source_word: ἐκ τῶν δύο
  chosen: between the two
  alternatives:
  - by the two
  - from the two
  lexicon: BDAG
  rationale: Although literally 'from the two,' the idiom in context refers to being
    pressed by two alternatives, so 'between the two' best communicates the sense
    in English.
- source_word: τὴν ἐπιθυμίαν ἔχων
  chosen: I have the desire
  alternatives:
  - having the desire
  - I long
  lexicon: BDAG
  rationale: This keeps the explicit noun ἐπιθυμία ('desire') rather than flattening
    it into a paraphrase, while still reading smoothly in English.
- source_word: ἀναλῦσαι
  chosen: to depart
  alternatives:
  - to die
  - to depart this life
  lexicon: BDAG
  rationale: The infinitive is a conventional euphemistic expression for death or
    departure. 'To depart' preserves Paul's wording and avoids importing a more explicit
    term than the Greek itself uses.
- source_word: Χριστῷ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the titular sense remains clear.
- source_word: πολλῷ γὰρ μᾶλλον κρεῖσσον
  chosen: for that is much better
  alternatives:
  - for it is far better
  - for this is better by much
  lexicon: BDAG
  rationale: This phrase intensifies comparison. 'Much better' preserves the comparative
    force cleanly in modern English without unnecessary stiffness.
