theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: In this context the term is titular and proclamation-centered, so 'Messiah'
    better preserves the meaning of the Greek title in keeping with the project's
    stated default.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
