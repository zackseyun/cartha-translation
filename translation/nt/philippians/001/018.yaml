id: PHP.1.18
reference: Philippians 1:18
source:
  edition: SBLGNT
  text: τί γάρ; πλὴν ⸀ὅτι παντὶ τρόπῳ, εἴτε προφάσει εἴτε ἀληθείᾳ, Χριστὸς καταγγέλλεται,
    καὶ ἐν τούτῳ χαίρω· ἀλλὰ καὶ χαρήσομαι,
translation:
  text: What then? Only that in every way, whether in pretense or in truth, the Messiah
    is being proclaimed, and in this I rejoice. Yes, and I will rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ is proclaimed.”
    reason: lexical_alternative
  - marker: b
    text: Or “whether as a pretext or in sincerity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ
  chosen: What then?
  alternatives:
  - What does it matter then?
  - So what?
  lexicon: BDAG
  rationale: Keeps Paul's brief rhetorical turn without over-paraphrasing; it introduces
    his conclusion from the prior discussion.
- source_word: πλὴν ὅτι
  chosen: Only that
  alternatives:
  - Except that
  - Nevertheless that
  lexicon: BDAG
  rationale: 'Best captures the narrowing force of the expression: whatever the motives,
    the key point that follows is what matters to Paul.'
- source_word: παντὶ τρόπῳ
  chosen: in every way
  alternatives:
  - by every means
  - in every manner
  lexicon: BDAG
  rationale: Natural English that preserves the distributive sense of the dative phrase.
- source_word: προφάσει
  chosen: in pretense
  alternatives:
  - as a pretext
  - from false motives
  lexicon: BDAG
  rationale: Reflects insincere outward motive without importing more interpretation
    than the noun itself requires.
- source_word: ἀληθείᾳ
  chosen: in truth
  alternatives:
  - sincerely
  - with true motives
  lexicon: BDAG
  rationale: Maintains the Greek contrast with προφάσει in a concise, transparent
    way.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than a name-like identifier,
    so the doctrinal default rendering 'Messiah' best preserves the sense.
- source_word: καταγγέλλεται
  chosen: is being proclaimed
  alternatives:
  - is proclaimed
  - is preached
  lexicon: BDAG
  rationale: Preserves the passive verbal form and conveys public announcement; 'being
    proclaimed' also reflects the ongoing present sense.
- source_word: ἐν τούτῳ
  chosen: in this
  alternatives:
  - because of this
  - in this matter
  lexicon: BDAG
  rationale: A transparent rendering that lets the reader connect Paul's joy directly
    to the preceding fact of Messiah's proclamation.
- source_word: χαίρω
  chosen: I rejoice
  alternatives:
  - I am glad
  lexicon: BDAG
  rationale: Retains the verbal and theological weight of joy rather than flattening
    it to mere happiness.
- source_word: ἀλλὰ καὶ χαρήσομαι
  chosen: Yes, and I will rejoice
  alternatives:
  - But I will also rejoice
  - Indeed, I will continue to rejoice
  lexicon: BDAG
  rationale: Renders the adversative-plus-additive force idiomatically in English
    while preserving the future-looking confidence.
