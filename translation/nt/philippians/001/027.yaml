theological_decisions:
- issue: Whether πνεύματι refers to the Holy Spirit or to a shared human spirit/disposition
  chosen_reading: in one spirit
  alternative_readings:
  - in one Spirit
  rationale: The immediate parallel with 'with one soul' favors a description of shared
    unity and resolve among the believers, though an echo of the Holy Spirit remains
    possible.
  doctrine_reference: Preserve theological tension rather than resolve it.
