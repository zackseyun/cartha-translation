id: PHP.1.27
reference: Philippians 1:27
source:
  edition: SBLGNT
  text: Μόνον ἀξίως τοῦ εὐαγγελίου τοῦ Χριστοῦ πολιτεύεσθε, ἵνα εἴτε ἐλθὼν καὶ ἰδὼν
    ὑμᾶς εἴτε ἀπὼν ⸀ἀκούω τὰ περὶ ὑμῶν, ὅτι στήκετε ἐν ἑνὶ πνεύματι, μιᾷ ψυχῇ συναθλοῦντες
    τῇ πίστει τοῦ εὐαγγελίου,
translation:
  text: Only live as citizens in a manner worthy of the gospel of the Messiah, so
    that whether I come and see you or am absent, I may hear about you that you are
    standing firm in one spirit, with one soul striving together for the faith of
    the gospel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conduct yourselves.' The Greek verb has civic overtones, lit. 'live
      as citizens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the gospel of Christ.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in one Spirit.'
    reason: alternative_reading
  - marker: d
    text: Or 'with one mind.'
    reason: lexical_alternative
  - marker: e
    text: Or 'contending side by side for faith in the gospel.'
    reason: alternative_reading
lexical_decisions:
- source_word: Μόνον
  chosen: Only
  alternatives:
  - Just one thing
  - Only this
  lexicon: BDAG
  rationale: Fronted for emphasis; it marks Paul's singular, controlling exhortation
    without adding words not in the Greek.
- source_word: ἀξίως
  chosen: in a manner worthy of
  alternatives:
  - worthily of
  - worthy of
  lexicon: BDAG
  rationale: This adverb modifies the manner of living; the fuller English phrase
    is idiomatic and preserves the ethical force.
- source_word: πολιτεύεσθε
  chosen: live as citizens
  alternatives:
  - conduct yourselves
  - live your lives
  lexicon: BDAG
  rationale: The verb carries civic/citizenship overtones, especially fitting in Philippi;
    'live as citizens' preserves that nuance better than the flatter 'conduct yourselves.'
- source_word: εὐαγγελίου
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is standard, clear, and retains the term''s recognized theological
    weight in Pauline usage.'
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title; here the genitive construction is titular rather than name-like.
- source_word: ἀκούω τὰ περὶ ὑμῶν
  chosen: I may hear about you
  alternatives:
  - I hear the things concerning you
  - I may hear the news about you
  lexicon: BDAG
  rationale: Natural English that still reflects the content of the idiom τὰ περὶ
    ὑμῶν.
- source_word: στήκετε
  chosen: are standing firm
  alternatives:
  - stand firm
  - remain firm
  lexicon: BDAG
  rationale: The progressive English fits the reported content after 'I may hear'
    while preserving the steadfast sense of the verb.
- source_word: ἐν ἑνὶ πνεύματι
  chosen: in one spirit
  alternatives:
  - in one Spirit
  - with one spirit
  lexicon: BDAG
  rationale: Lowercase 'spirit' best fits the immediate call to communal unity, while
    preserving ambiguity enough for a footnote noting the possible reference to the
    Holy Spirit.
- source_word: μιᾷ ψυχῇ
  chosen: with one soul
  alternatives:
  - with one mind
  - together as one
  lexicon: BDAG
  rationale: This keeps the concrete imagery of ψυχή rather than flattening it to
    mere cognition; English remains understandable in context.
- source_word: συναθλοῦντες
  chosen: striving together
  alternatives:
  - contending together
  - struggling side by side
  lexicon: BDAG
  rationale: Preserves the shared-athletic/struggle imagery while sounding natural
    in modern English.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine, the default rendering of πίστις is 'faith'; here no stronger
    contextual reason compels a different main-text choice.
- source_word: τῇ πίστει τοῦ εὐαγγελίου
  chosen: for the faith of the gospel
  alternatives:
  - for faith in the gospel
  - for the gospel faith
  lexicon: BDAG
  rationale: This rendering stays close to the Greek genitive construction and leaves
    its exact nuance transparent rather than over-resolving it in paraphrase.
