theological_decisions:
- issue: Whether to soften the statement that both believing and suffering are divinely
    granted
  chosen_reading: Retain the explicit gift language for both believing and suffering
  alternative_readings:
  - Render ἐχαρίσθη more weakly as 'you were allowed' or restructure to obscure divine
    agency
  rationale: The Greek presents both believing in Messiah and suffering for him as
    encompassed within what has been graciously granted. The translation should preserve
    that theological tension rather than reduce it.
  doctrine_reference: Preserve theological tension rather than resolve it.
