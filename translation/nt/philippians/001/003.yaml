id: PHP.1.3
reference: Philippians 1:3
source:
  edition: SBLGNT
  text: Εὐχαριστῶ τῷ θεῷ μου ἐπὶ πάσῃ τῇ μνείᾳ ὑμῶν
translation:
  text: I thank my God at every remembrance of you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I give thanks to my God for every remembrance of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  chosen: I thank
  alternatives:
  - I give thanks
  lexicon: BDAG
  rationale: Present active indicative, first person singular; 'I thank' is natural
    modern English and preserves the direct verbal force without unnecessary expansion.
- source_word: τῷ θεῷ μου
  chosen: my God
  alternatives:
  - to my God
  lexicon: BDAG
  rationale: The dative with εὐχαριστέω is idiomatically represented in English as
    the direct object 'my God' rather than the more wooden 'to my God.' The possessive
    pronoun is retained.
- source_word: ἐπὶ
  chosen: at
  alternatives:
  - for
  - upon
  - because of
  lexicon: BDAG
  rationale: Here ἐπὶ with the dative introduces the circumstance or occasion of thanksgiving.
    'At every remembrance of you' best captures the sense in smooth English without
    overinterpreting causation.
- source_word: πάσῃ
  chosen: every
  alternatives:
  - all
  - each
  lexicon: BDAG
  rationale: With the singular noun μνείᾳ, 'every' is the most idiomatic distributive
    rendering in English.
- source_word: μνείᾳ
  chosen: remembrance
  alternatives:
  - memory
  - mention
  - thought
  lexicon: BDAG
  rationale: '''Remembrance'' preserves the noun''s sense of recollection more precisely
    than ''mention'' here and fits the contemplative tone of the thanksgiving.'
- source_word: ὑμῶν
  chosen: of you
  alternatives:
  - of all of you
  - about you
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of you.' Although the plural is present
    in Greek, standard English already conveys this with 'you' in context.
