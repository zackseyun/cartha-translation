id: PHP.2.20
reference: Philippians 2:20
source:
  edition: SBLGNT
  text: οὐδένα γὰρ ἔχω ἰσόψυχον ὅστις γνησίως τὰ περὶ ὑμῶν μεριμνήσει,
translation:
  text: For I have no one so like-minded who will genuinely care about your welfare,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of kindred spirit”; more literally, “equal-souled.”
    reason: lexical_alternative
  - marker: b
    text: Or “will genuinely be concerned for what concerns you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force linking this statement to the preceding
    context.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - no one else
  - nobody
  lexicon: BDAG
  rationale: Directly reflects the accusative object of ἔχω without adding an explicit
    comparative element not stated in the Greek.
- source_word: ἔχω
  chosen: I have
  alternatives:
  - I possess
  lexicon: BDAG
  rationale: Simple present rendering matches the Greek idiom naturally in English.
- source_word: ἰσόψυχον
  chosen: so like-minded
  alternatives:
  - of kindred spirit
  - equal-souled
  - like-souled
  lexicon: BDAG
  rationale: Conveys shared inner disposition in clear modern English. 'Of kindred
    spirit' is strong but slightly less natural for the target readership; the more
    literal options are too opaque.
- source_word: ὅστις
  chosen: who
  alternatives:
  - such a one as
  - who indeed
  lexicon: BDAG
  rationale: A natural English relative pronoun fits the construction and preserves
    the sense without unnecessary stiffness.
- source_word: γνησίως
  chosen: genuinely
  alternatives:
  - truly
  - sincerely
  lexicon: BDAG
  rationale: Captures the adverb's sense of authentic sincerity in a readable modern
    form.
- source_word: τὰ περὶ ὑμῶν
  chosen: your welfare
  alternatives:
  - the things concerning you
  - your circumstances
  - what concerns you
  lexicon: BDAG
  rationale: This phrase refers to the Philippians' condition and interests. 'Your
    welfare' expresses that concern idiomatically in English without flattening the
    pastoral sense.
- source_word: μεριμνήσει
  chosen: will care about
  alternatives:
  - will be concerned for
  - will be anxious about
  lexicon: BDAG
  rationale: In this context the verb carries positive pastoral concern rather than
    sinful anxiety. 'Will care about' is natural English and fits the tone.
