theological_decisions:
- issue: Identity of 'the name'
  chosen_reading: Retained as 'the name' without specifying it in the main text.
  alternative_readings:
  - A reference to the name 'Jesus'
  - A reference to the divine title 'Lord' made explicit in the following verses
  rationale: The verse itself does not identify the name explicitly, so the translation
    preserves the textual openness rather than importing an interpretive conclusion
    from Philippians 2:10–11 into verse 9.
  doctrine_reference: Preserve theological tension rather than resolve it.
