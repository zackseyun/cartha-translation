id: PHP.2.9
reference: Philippians 2:9
source:
  edition: SBLGNT
  text: διὸ καὶ ὁ θεὸς αὐτὸν ὑπερύψωσεν, καὶ ἐχαρίσατο αὐτῷ ⸀τὸ ὄνομα τὸ ὑπὲρ πᾶν
    ὄνομα,
translation:
  text: Therefore God also highly exalted him and graciously gave him the name that
    is above every name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bestowed on him' for 'graciously gave him.'
    reason: lexical_alternative
  - marker: b
    text: '''The name'' may denote not only a spoken name but also status, rank, or
      title; the verse itself does not yet specify which name is meant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ καὶ
  chosen: Therefore ... also
  alternatives:
  - For this reason also
  - Therefore indeed
  lexicon: BDAG
  rationale: Preserves the inferential force of διό and the additive force of καί
    while using natural English word order.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The subject is explicit and definite in Greek; standard English omits
    the article with proper divine reference.
- source_word: ὑπερύψωσεν
  chosen: highly exalted
  alternatives:
  - exalted to the highest place
  - super-exalted
  lexicon: BDAG
  rationale: Retains the intensified force of the compound verb without becoming awkward
    in English. 'Highly exalted' is both transparent and readable.
- source_word: ἐχαρίσατο
  chosen: graciously gave
  alternatives:
  - bestowed
  - granted
  lexicon: BDAG
  rationale: Preserves the verbal connection to χάρις ('grace'). 'Bestowed' is possible,
    but 'graciously gave' better exposes the grace nuance of the middle verb.
- source_word: τὸ ὄνομα
  chosen: the name
  alternatives:
  - the title
  lexicon: BDAG
  rationale: The Greek says 'name' plainly, and the translation should not resolve
    it into 'title' in the main text, even though the phrase may carry connotations
    of rank or status.
- source_word: τὸ ὑπὲρ πᾶν ὄνομα
  chosen: that is above every name
  alternatives:
  - above all names
  - greater than every name
  lexicon: BDAG
  rationale: This rendering preserves the literal comparative structure and reads
    naturally in modern English.
