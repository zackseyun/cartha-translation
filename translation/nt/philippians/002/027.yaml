id: PHP.2.27
reference: Philippians 2:27
source:
  edition: SBLGNT
  text: καὶ γὰρ ἠσθένησεν παραπλήσιον ⸀θανάτῳ· ἀλλὰ ὁ θεὸς ⸂ἠλέησεν αὐτόν⸃, οὐκ αὐτὸν
    δὲ μόνον ἀλλὰ καὶ ἐμέ, ἵνα μὴ λύπην ἐπὶ λύπην σχῶ.
translation:
  text: For indeed he was sick, nearly to death; but God had mercy on him, and not
    on him only but also on me, so that I might not have sorrow upon sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “close to death” or “to the point of death.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “sorrow upon sorrow,” an idiom expressing compounded grief.
    reason: cultural_note
lexical_decisions:
- source_word: ἠσθένησεν
  chosen: was sick
  alternatives:
  - became sick
  - was ill
  - was weak
  lexicon: BDAG
  rationale: The aorist verb ἀσθενέω here refers to physical illness in context, not
    general weakness. 'Was sick' is clear, natural English and best fits Epaphroditus's
    condition.
- source_word: παραπλήσιον θανάτῳ
  chosen: nearly to death
  alternatives:
  - to the point of death
  - close to death
  - near death
  lexicon: BDAG
  rationale: The adjective with the dative conveys nearness or approximation to death.
    'Nearly to death' preserves the sense of coming very close without overstating
    it as actual death.
- source_word: ἠλέησεν
  chosen: had mercy on
  alternatives:
  - showed mercy to
  - pitied
  lexicon: BDAG
  rationale: Ἐλεάω denotes showing mercy or compassion. 'Had mercy on' is idiomatic,
    faithful, and preserves the theological weight of divine mercy better than the
    weaker 'pitied.'
- source_word: οὐκ αὐτὸν δὲ μόνον ἀλλὰ καὶ ἐμέ
  chosen: and not on him only but also on me
  alternatives:
  - and not only on him but also on me
  lexicon: BDAG
  rationale: This keeps the Greek emphasis and explicitly carries over the object
    of mercy from the previous clause. The slight fronting preserves Paul's contrast
    and personal involvement.
- source_word: ἵνα μὴ
  chosen: so that I might not
  alternatives:
  - lest I should
  - in order that I would not
  lexicon: BDAG
  rationale: This construction expresses purpose with a negative outcome avoided.
    'So that I might not' is natural modern English and preserves the purposive force.
- source_word: λύπην ἐπὶ λύπην
  chosen: sorrow upon sorrow
  alternatives:
  - grief upon grief
  - sorrow after sorrow
  lexicon: BDAG
  rationale: The repeated noun with ἐπί is rhetorical and cumulative. 'Sorrow upon
    sorrow' preserves both the repetition and the intensifying effect in readable
    English.
- source_word: σχῶ
  chosen: have
  alternatives:
  - experience
  - bear
  lexicon: BDAG
  rationale: From ἔχω, the verb is broad and idiomatically works with 'sorrow.' 'Have'
    is the most direct and least interpretively intrusive rendering.
