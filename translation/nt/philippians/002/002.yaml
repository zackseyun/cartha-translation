theological_decisions:
- issue: How explicitly to render Paul's appeal for unity in repeated φρονέω language
  chosen_reading: Use 'think the same way' and 'thinking one thing' to preserve the
    repeated lexical pattern without flattening it into a single English idiom.
  alternative_readings:
  - be of the same mind ... of one mind
  - have the same mindset ... focused on one purpose
  rationale: The verse builds unity through repetition and variation. Preserving that
    pattern reflects the text's exhortational force without importing a narrower doctrinal
    claim about institutional uniformity.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
