id: PHP.2.22
reference: Philippians 2:22
source:
  edition: SBLGNT
  text: τὴν δὲ δοκιμὴν αὐτοῦ γινώσκετε, ὅτι ὡς πατρὶ τέκνον σὺν ἐμοὶ ἐδούλευσεν εἰς
    τὸ εὐαγγέλιον.
translation:
  text: 'But you know his proven worth: that like a child with his father, he served
    with me for the gospel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "proven character"; the term refers to character shown genuine through
      testing.
    reason: lexical_alternative
  - marker: b
    text: Literally "like a child with a father."
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Retains the mild contrast or transition from the surrounding context
    in natural English.
- source_word: δοκιμὴν
  chosen: proven worth
  alternatives:
  - proven character
  - testedness
  - proof
  lexicon: BDAG
  rationale: Conveys character demonstrated through testing, in idiomatic modern English,
    without flattening the sense to mere abstract 'proof'.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: Straightforward possessive referring to Timothy.
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - you have come to know
  - you recognize
  lexicon: BDAG
  rationale: The present indicative is best rendered simply and directly here, reflecting
    the Philippians' existing knowledge of Timothy.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content explaining what they know about Timothy.
- source_word: ὡς πατρὶ τέκνον
  chosen: like a child with his father
  alternatives:
  - as a child with a father
  - as a son with his father
  lexicon: BDAG
  rationale: Preserves the family analogy without overtranslating τέκνον as 'son';
    'his father' makes the relational sense natural in English.
- source_word: σὺν ἐμοὶ
  chosen: with me
  alternatives:
  - alongside me
  lexicon: BDAG
  rationale: Simple rendering of close association in shared service.
- source_word: ἐδούλευσεν
  chosen: he served
  alternatives:
  - he labored
  - he served as a slave
  lexicon: BDAG
  rationale: Although related to the δοῦλος word-group, here the idiomatic verbal
    sense in ministry context is best captured by 'served' rather than the overly
    rigid 'slaved.'
- source_word: εἰς τὸ εὐαγγέλιον
  chosen: for the gospel
  alternatives:
  - in the gospel's work
  - for the sake of the gospel
  lexicon: BDAG
  rationale: Expresses purpose and direction naturally in English while keeping the
    gospel as the object of the shared ministry.
