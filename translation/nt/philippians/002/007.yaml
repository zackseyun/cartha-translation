theological_decisions:
- issue: Meaning of 'emptied himself' (ἐκένωσεν) in a Christological context
  chosen_reading: Retain the metaphor 'emptied himself' and let the participles define
    the manner of the self-emptying.
  alternative_readings:
  - made himself nothing
  - treated this as a surrender of divine attributes
  rationale: The verse itself explains the self-emptying through taking the form of
    a slave and becoming human. Rendering the verb literally preserves the text's
    theological tension without importing a kenotic theory that would conflict with
    Nicene and Chalcedonian bounds.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
- issue: Force of 'in the likeness of human beings'
  chosen_reading: Translate ὁμοίωμα as 'likeness' without suggesting mere appearance
    or a denial of true humanity.
  alternative_readings:
  - mere semblance of humanity
  - full identity stated more strongly than the Greek wording
  rationale: Paul's wording should be preserved as written. The following clause ('being
    found in appearance as a man') complements rather than negates real humanity,
    so the translation should not resolve the tension beyond the Greek.
  doctrine_reference: Definition of Chalcedon (451 AD)
