id: PHP.2.7
reference: Philippians 2:7
source:
  edition: SBLGNT
  text: ἀλλὰ ἑαυτὸν ἐκένωσεν μορφὴν δούλου λαβών, ἐν ὁμοιώματι ἀνθρώπων γενόμενος·
    καὶ σχήματι εὑρεθεὶς ὡς ἄνθρωπος
translation:
  text: but emptied himself, taking the form of a slave, becoming in the likeness
    of human beings; and being found in appearance as a man
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made himself nothing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the form of a servant.'
    reason: lexical_alternative
  - marker: c
    text: '''In the likeness of human beings'' preserves the Greek wording and should
      not be read as denying his true humanity.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  rationale: Marks a strong contrast with the preceding clause; 'but' is the most
    natural concise English adversative here.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - himself personally
  rationale: Reflexive object of ἐκένωσεν; standard English reflexive is sufficient
    and clear.
- source_word: ἐκένωσεν
  chosen: emptied himself
  alternatives:
  - made himself nothing
  - poured himself out
  lexicon: BDAG
  rationale: The verb κενόω is most directly rendered 'empty.' This preserves the
    Greek metaphor and avoids importing a fuller theological explanation into the
    translation. The following participles explain the manner of this self-emptying.
- source_word: μορφὴν
  chosen: form
  alternatives:
  - nature
  - status
  lexicon: BDAG
  rationale: '''Form'' keeps the lexical correspondence with μορφή in the surrounding
    context and preserves the deliberate parallelism without over-resolving its metaphysical
    nuance.'
- source_word: δούλου
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this humiliation context, 'slave' best preserves the force
    of the contrast.
- source_word: λαβών
  chosen: taking
  alternatives:
  - having taken
  rationale: Aorist participle expressing means or manner; 'taking' reads naturally
    in English and preserves the participial linkage.
- source_word: ἐν ὁμοιώματι
  chosen: in the likeness
  alternatives:
  - in the form
  - like
  lexicon: BDAG
  rationale: '''Likeness'' is the standard rendering of ὁμοίωμα and preserves the
    wording without flattening it into a looser paraphrase.'
- source_word: ἀνθρώπων
  chosen: human beings
  alternatives:
  - men
  - humans
  rationale: Plural generic ἄνθρωποι refers to humanity broadly, so 'human beings'
    is gender-accurate and natural English.
- source_word: γενόμενος
  chosen: becoming
  alternatives:
  - coming to be
  - being made
  lexicon: BDAG
  rationale: γίνομαι here is best rendered 'becoming,' continuing the participial
    description of incarnation and humiliation.
- source_word: σχήματι
  chosen: in appearance
  alternatives:
  - in outward form
  - in bearing
  lexicon: BDAG
  rationale: σχῆμα often refers to outward appearance or visible mode; 'in appearance'
    is clear modern English.
- source_word: εὑρεθεὶς
  chosen: being found
  alternatives:
  - being seen
  - being recognized
  lexicon: BDAG
  rationale: The passive participle is retained in a straightforward way; 'being found'
    mirrors the Greek while remaining idiomatic enough in context.
- source_word: ὡς ἄνθρωπος
  chosen: as a man
  alternatives:
  - as human
  - as a human being
  rationale: Since the referent is Jesus specifically, singular 'man' is appropriate
    and preserves both the Greek singular and the personal concreteness of the line.
