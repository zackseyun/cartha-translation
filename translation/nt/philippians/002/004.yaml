id: PHP.2.4
reference: Philippians 2:4
source:
  edition: SBLGNT
  text: μὴ τὰ ἑαυτῶν ⸀ἕκαστοι ⸀σκοποῦντες, ἀλλὰ καὶ τὰ ἑτέρων ⸁ἕκαστοι.
translation:
  text: Each of you should look not only to your own interests, but also to the interests
    of others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, "Each of you looking not to your own things, but also
      to the things of others."
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοποῦντες
  chosen: should look to
  alternatives:
  - looking to
  - regarding
  - watching out for
  lexicon: BDAG
  rationale: σκοπέω here carries the sense of directing attention or concern toward
    something. "Look to" is natural English and preserves the idea of attentive regard
    without flattening it into mere emotion.
- source_word: τὰ ἑαυτῶν
  chosen: your own interests
  alternatives:
  - your own things
  - what belongs to yourselves
  lexicon: BDAG
  rationale: The neuter plural article with the reflexive pronoun is broader than
    possessions alone and in context refers to one's own concerns or interests. "Interests"
    makes the implied object explicit in readable English.
- source_word: ἕκαστοι
  chosen: Each of you
  alternatives:
  - each one
  - each
  lexicon: BDAG
  rationale: ἕκαστοι is distributive and addresses the Philippian believers individually
    within the group. "Each of you" brings out that force clearly in English.
- source_word: ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - but also
  - rather also
  lexicon: BDAG
  rationale: This pairing is best represented idiomatically in English as "not only
    ... but also," which captures the contrast and addition together.
- source_word: τὰ ἑτέρων
  chosen: the interests of others
  alternatives:
  - the things of others
  - what belongs to others
  lexicon: BDAG
  rationale: As with τὰ ἑαυτῶν, the phrase refers broadly to others' concerns, welfare,
    or interests. "Interests of others" communicates the sense naturally in context.
