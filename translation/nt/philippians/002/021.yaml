id: PHP.2.21
reference: Philippians 2:21
source:
  edition: SBLGNT
  text: οἱ πάντες γὰρ τὰ ἑαυτῶν ζητοῦσιν, οὐ τὰ ⸂Ἰησοῦ Χριστοῦ⸃.
translation:
  text: For they all seek their own interests, not those of Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jesus Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πάντες
  chosen: they all
  alternatives:
  - all of them
  - everyone
  rationale: The articular plural functions substantivally, referring to the people
    in view. 'They all' is natural English and preserves the collective emphasis.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  rationale: γάρ gives the reason for the preceding statement; 'for' preserves the
    explanatory connection without overinterpreting the nuance.
- source_word: τὰ ἑαυτῶν
  chosen: their own interests
  alternatives:
  - their own things
  - their own concerns
  lexicon: BDAG
  rationale: The neuter plural idiom refers broadly to what pertains to oneself. 'Their
    own interests' communicates the sense clearly in modern English while retaining
    the selfish contrast.
- source_word: ζητοῦσιν
  chosen: seek
  alternatives:
  - pursue
  - look for
  lexicon: BDAG
  rationale: '''Seek'' is the standard rendering and fits both halves of the contrast,
    preserving the moral force without unnecessary expansion.'
- source_word: τὰ Ἰησοῦ Χριστοῦ
  chosen: those of Jesus Messiah
  alternatives:
  - the interests of Jesus Messiah
  - those of Jesus Christ
  rationale: The repeated neuter plural article points back to the implied idea of
    'interests/things.' 'Those of' avoids clumsy repetition while preserving the elliptical
    Greek. Χριστοῦ is rendered 'Messiah' because it is still titular here rather than
    a mere surname.
