theological_decisions:
- issue: Rendering Χριστοῦ in the phrase Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: Following the doctrine's default for Χριστός as a title, 'Messiah' preserves
    the meaning of the christological title in English. Because English readers may
    also recognize 'Jesus Christ' as a name-like expression, that alternative is preserved
    in a footnote.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
