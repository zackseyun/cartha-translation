id: PHP.2.18
reference: Philippians 2:18
source:
  edition: SBLGNT
  text: τὸ δὲ αὐτὸ καὶ ὑμεῖς χαίρετε καὶ συγχαίρετέ μοι.
translation:
  text: In the same way, you also rejoice and rejoice with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Likewise, you also should be glad and share your joy with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ...αὐτὸ
  chosen: In the same way
  alternatives:
  - likewise
  - the same thing
  lexicon: BDAG
  rationale: The idiom τὸ αὐτό here functions adverbially, pointing back to Paul's
    preceding call to shared joy; 'In the same way' is natural English that preserves
    the sense better than the more wooden 'the same thing.'
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: Present active imperative, second person plural. 'Rejoice' preserves
    the verbal force and matches Paul's recurring joy language in Philippians better
    than the flatter 'be glad.'
- source_word: συγχαίρετέ
  chosen: rejoice with
  alternatives:
  - share joy with
  - be glad with
  lexicon: BDAG
  rationale: The compound verb adds the sense of shared rejoicing. 'Rejoice with'
    is the most transparent and direct rendering in context.
- source_word: μοι
  chosen: with me
  alternatives:
  - with me in it
  lexicon: BDAG
  rationale: The dative pronoun marks Paul as the one with whom the Philippians are
    to share joy; 'with me' is the clearest idiomatic English rendering.
