id: PHP.2.24
reference: Philippians 2:24
source:
  edition: SBLGNT
  text: πέποιθα δὲ ἐν κυρίῳ ὅτι καὶ αὐτὸς ταχέως ἐλεύσομαι.
translation:
  text: I am confident in the Lord that I myself will also come soon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I trust in the Lord that I too myself will come soon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέποιθα
  chosen: I am confident
  alternatives:
  - I trust
  - I am persuaded
  lexicon: BDAG
  rationale: Perfect-form verb expressing a settled state of confidence; 'I am confident'
    gives natural English while preserving the present force of the perfect.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: A mild connective marking continuation; left untranslated in English
    for natural flow, with its discourse function absorbed into the sentence.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - with reference to the Lord
  lexicon: BDAG
  rationale: Standard Pauline expression of sphere or basis of confidence. 'In the
    Lord' preserves the Greek wording and Pauline idiom.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of Paul's confidence, naturally rendered with
    'that'.
- source_word: καὶ αὐτὸς
  chosen: I myself will also
  alternatives:
  - I too myself will
  - I also will come personally
  lexicon: BDAG
  rationale: Combines additive καί with emphatic αὐτός. 'I myself will also' preserves
    both the emphasis on Paul personally and the additive sense in relation to Timothy's
    going.
- source_word: ταχέως
  chosen: soon
  alternatives:
  - quickly
  - before long
  lexicon: BDAG
  rationale: Refers here to nearness in time rather than speed of travel; 'soon' is
    the most idiomatic English choice.
- source_word: ἐλεύσομαι
  chosen: will come
  alternatives:
  - will go
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι normally means 'come.' English keeps the deictic
    perspective of the Greek as addressed to the Philippians.
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering for κύριος; this
    also fits Pauline usage here.
