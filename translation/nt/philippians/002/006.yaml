id: PHP.2.6
reference: Philippians 2:6
source:
  edition: SBLGNT
  text: ὃς ἐν μορφῇ θεοῦ ὑπάρχων οὐχ ἁρπαγμὸν ἡγήσατο τὸ εἶναι ἴσα θεῷ,
translation:
  text: who, existing in the form of God, did not consider equality with God something
    to be exploited,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “something to be grasped” or “something to be seized.”
    reason: alternative_reading
  - marker: b
    text: Lit. “to be equal with God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν μορφῇ θεοῦ
  chosen: in the form of God
  alternatives:
  - in very nature God
  - in the nature of God
  lexicon: BDAG
  rationale: μορφή is best preserved as “form” here, retaining the Greek expression
    without collapsing it into a narrower metaphysical paraphrase. This keeps the
    text’s high Christology while avoiding importing later doctrinal wording directly
    into the translation.
- source_word: ὑπάρχων
  chosen: existing
  alternatives:
  - being
  - although he was
  lexicon: BDAG
  rationale: The participle indicates ongoing existence or status. “Existing” is slightly
    more explicit than bare “being” and fits the elevated style of the passage without
    over-paraphrasing.
- source_word: ἁρπαγμὸν
  chosen: something to be exploited
  alternatives:
  - something to be grasped
  - something to be seized
  - a thing to be held onto
  lexicon: BDAG
  rationale: ἁρπαγμός is famously contested. In this context, “something to be exploited”
    best captures the sense of advantage not used for self-gain, fitting the movement
    of the hymn into self-emptying in the next verse. Because the alternative reading
    remains viable, it is preserved in a footnote.
- source_word: ἡγήσατο
  chosen: did not consider
  alternatives:
  - did not regard
  - did not count
  lexicon: BDAG
  rationale: ἡγέομαι commonly carries the sense of considering or regarding. “Did
    not consider” is natural modern English and remains close to the Greek.
- source_word: τὸ εἶναι ἴσα θεῷ
  chosen: equality with God
  alternatives:
  - being equal with God
  - being on equal terms with God
  lexicon: BDAG
  rationale: The articular infinitive phrase is rendered idiomatically as “equality
    with God.” This communicates the meaning clearly in English while preserving the
    force of ἴσα as equality or equal status.
