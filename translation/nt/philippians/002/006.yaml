theological_decisions:
- issue: Christological force of ἐν μορφῇ θεοῦ
  chosen_reading: Retain “in the form of God” in the main text.
  alternative_readings:
  - in the nature of God
  - being God by nature
  rationale: The verse clearly presents a high Christology consistent with historic
    orthodoxy, but the translation should not replace Paul’s wording with later doctrinal
    shorthand. “Form of God” preserves the textual expression while fully allowing
    the ontological weight the context carries.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
- issue: Meaning of ἁρπαγμός in relation to Christ’s equality with God
  chosen_reading: Render as “something to be exploited” in the main text and preserve
    “something to be grasped” as a footnote alternative.
  alternative_readings:
  - something to be grasped
  - something to be seized
  rationale: The immediate context emphasizes self-giving rather than acquisitive
    action, which favors the ‘exploited/used for advantage’ sense. Because this is
    a genuine interpretive crux, the traditional alternative is preserved in a footnote
    rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it
