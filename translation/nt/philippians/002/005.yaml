theological_decisions:
- issue: Whether the clause means the mindset exemplified by Jesus ('which was also
    in Messiah Jesus') or the mindset believers have by union with him ('which you
    also have in Messiah Jesus').
  chosen_reading: 'Exemplary reading: ''which was also in Messiah Jesus.'''
  alternative_readings:
  - 'Participatory/union reading: ''which you also have in Messiah Jesus'''
  rationale: The immediate context moves into Christ's self-humbling as the model
    for believers, which favors the exemplary sense. But the Greek is compressed and
    can also be heard in light of union with Christ, so the alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
