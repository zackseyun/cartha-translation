id: PHP.2.14
reference: Philippians 2:14
source:
  edition: SBLGNT
  text: Πάντα ποιεῖτε χωρὶς γογγυσμῶν καὶ διαλογισμῶν,
translation:
  text: Do everything without grumbling or arguing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without grumbling or disputing.'
    reason: lexical_alternative
  - marker: b
    text: '''Arguing'' may also be understood as ''questioning'' in some contexts,
      though here the sense likely points to contentious dispute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  chosen: Do everything
  alternatives:
  - Do all things
  - Do everything you do
  lexicon: BDAG
  rationale: The accusative plural of πᾶς functions comprehensively here. 'Do everything'
    is natural modern English and preserves the verse's universal scope without sounding
    wooden.
- source_word: ποιεῖτε
  chosen: Do
  alternatives:
  - Keep doing
  - Carry out
  lexicon: BDAG
  rationale: The present active imperative is rightly rendered as an ongoing command.
    English imperative 'Do' naturally carries the force here when paired with 'everything,'
    without needing an explicitly progressive form.
- source_word: χωρὶς
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: '''Without'' is the standard and clearest rendering in this construction
    with genitives expressing what must be absent from their conduct.'
- source_word: γογγυσμῶν
  chosen: grumbling
  alternatives:
  - murmuring
  - complaining
  lexicon: BDAG
  rationale: γογγυσμός denotes muttering complaint. 'Grumbling' is idiomatic, accessible,
    and preserves the likely resonance with Israel's wilderness grumbling better than
    the flatter 'complaining.'
- source_word: διαλογισμῶν
  chosen: arguing
  alternatives:
  - disputing
  - quarreling
  - questioning
  lexicon: BDAG
  rationale: In this exhortational context, διαλογισμός most naturally refers to contentious
    dispute rather than inward reasoning alone. 'Arguing' is clear modern English
    and pairs well with 'grumbling' while preserving the interpersonal sense.
