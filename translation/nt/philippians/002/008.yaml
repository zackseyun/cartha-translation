theological_decisions:
- issue: Force of the final phrase θανάτου δὲ σταυροῦ
  chosen_reading: 'An emphatic escalation: ''even death on a cross'', not a mere restatement
    of death.'
  alternative_readings:
  - '''indeed, death on a cross'''
  - '''even death of a cross'''
  rationale: The verse climaxes in the shameful and cursed character of crucifixion,
    so the English should preserve the rhetorical intensification without importing
    extra doctrinal interpretation.
