id: PHP.2.8
reference: Philippians 2:8
source:
  edition: SBLGNT
  text: ἐταπείνωσεν ἑαυτὸν γενόμενος ὑπήκοος μέχρι θανάτου, θανάτου δὲ σταυροῦ·
translation:
  text: he humbled himself, becoming obedient to the point of death—even death on
    a cross.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unto death'; the phrase means that his obedience extended all the way
      to death itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'death, even of a cross'; the sense is 'even death on a cross.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταπείνωσεν
  chosen: he humbled
  alternatives:
  - he made low
  - he abased
  lexicon: BDAG
  rationale: Rendered with the standard active sense 'humbled' in clear modern English,
    preserving the voluntary lowering implied by the verb without archaic phrasing.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives: null
  lexicon: BDAG
  rationale: The reflexive pronoun is explicit and important to the verse’s emphasis
    on voluntary self-humbling, so it is retained directly.
- source_word: γενόμενος
  chosen: becoming
  alternatives:
  - having become
  - by becoming
  lexicon: BDAG
  rationale: '''Becoming'' preserves the participial linkage naturally in English
    and shows the manner in which he humbled himself, without over-specifying temporal
    sequence.'
- source_word: ὑπήκοος
  chosen: obedient
  alternatives:
  - submissive
  lexicon: BDAG
  rationale: '''Obedient'' is the clearest and most direct equivalent for the adjective
    here and fits the Christological context without weakening the force of obedience.'
- source_word: μέχρι θανάτου
  chosen: to the point of death
  alternatives:
  - unto death
  - to death
  lexicon: BDAG
  rationale: This rendering is natural contemporary English and preserves the sense
    of obedience carried all the way to death itself.
- source_word: δὲ
  chosen: even
  alternatives:
  - indeed
  - and
  lexicon: BDAG
  rationale: 'Here δέ is best taken as heightening the second phrase: not merely death,
    but the shocking kind of death that follows. ''Even'' brings out that intensification
    idiomatically.'
- source_word: σταυροῦ
  chosen: on a cross
  alternatives:
  - of a cross
  - by crucifixion
  lexicon: BDAG
  rationale: '''On a cross'' is the most transparent rendering of the genitive construction
    in this compressed phrase and keeps the concrete scandal of crucifixion visible
    in the text.'
