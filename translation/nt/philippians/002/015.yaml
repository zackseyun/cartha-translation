theological_decisions:
- issue: Relation of 'without blemish' to 'children of God' and possible Deuteronomy
    32:5 echo
  chosen_reading: Render as 'children of God without blemish' and preserve the ethical-covenantal
    echo without making it overly explicit in the main text.
  alternative_readings:
  - Treat 'without blemish' more generally with the whole clause
  - Translate with a stronger interpretive allusion to Deuteronomy 32:5
  rationale: The Greek directly qualifies 'children of God,' and the phrase naturally
    carries an intertextual contrast with the 'crooked and twisted generation.' The
    main text should preserve the wording while leaving the allusion implicit.
