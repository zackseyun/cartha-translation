theological_decisions:
- issue: Whether ἀπόστολον should be rendered with the technical sense 'apostle' or
    the broader sense 'messenger'
  chosen_reading: messenger
  alternative_readings:
  - apostle
  - envoy
  rationale: The immediate context identifies Epaphroditus as one sent by the Philippian
    church to Paul. Rendering ἀπόστολον as 'messenger' preserves the lexical sense
    of a sent representative without importing the more formal apostolic office.
