id: PHP.2.25
reference: Philippians 2:25
source:
  edition: SBLGNT
  text: Ἀναγκαῖον δὲ ἡγησάμην Ἐπαφρόδιτον τὸν ἀδελφὸν καὶ συνεργὸν καὶ συστρατιώτην
    μου, ὑμῶν δὲ ἀπόστολον καὶ λειτουργὸν τῆς χρείας μου, πέμψαι πρὸς ὑμᾶς,
translation:
  text: But I considered it necessary to send to you Epaphroditus—my brother and fellow
    worker and fellow soldier, and your messenger and minister to my need—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apostle'—that is, one sent by you.
    reason: alternative_reading
  - marker: b
    text: Or 'servant to my need.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναγκαῖον
  chosen: necessary
  alternatives:
  - needed
  - compelled
  lexicon: BDAG
  rationale: Expresses necessity or what is regarded as necessary; 'necessary' is
    the most natural English fit with ἡγησάμην.
- source_word: ἡγησάμην
  chosen: I considered
  alternatives:
  - I thought
  - I regarded
  lexicon: BDAG
  rationale: The aorist middle of ἡγέομαι here introduces Paul's judgment or assessment,
    not mere opinion alone; 'I considered' preserves that evaluative sense.
- source_word: πέμψαι
  chosen: to send
  alternatives:
  - to send back
  lexicon: BDAG
  rationale: The infinitive depends on ἡγησάμην. 'To send' is textually warranted;
    'send back' is an interpretive expansion from context, not explicit in this clause.
- source_word: ἀδελφὸν
  chosen: brother
  alternatives:
  - brother in the faith
  lexicon: BDAG
  rationale: A familial term used for a fellow believer. 'Brother' preserves the Greek
    term directly without over-paraphrase.
- source_word: συνεργὸν
  chosen: fellow worker
  alternatives:
  - coworker
  - co-worker
  lexicon: BDAG
  rationale: A standard Pauline term for one who labors alongside another in gospel
    work. 'Fellow worker' is clear, natural, and transparent.
- source_word: συστρατιώτην
  chosen: fellow soldier
  alternatives:
  - comrade in arms
  lexicon: BDAG
  rationale: Keeps the military metaphor plainly and idiomatically in English.
- source_word: ἀπόστολον
  chosen: messenger
  alternatives:
  - apostle
  - envoy
  lexicon: BDAG
  rationale: In this context the term refers to one sent by the Philippians, not necessarily
    to the technical office of Apostle. 'Messenger' best fits the local sense while
    preserving the sending idea.
- source_word: λειτουργὸν
  chosen: minister
  alternatives:
  - servant
  - one who serves
  lexicon: BDAG
  rationale: λειτουργός can denote one who performs a service or ministry. 'Minister'
    preserves the dignity of the service without implying a modern church office.
- source_word: τῆς χρείας μου
  chosen: to my need
  alternatives:
  - for my need
  - in my need
  lexicon: BDAG
  rationale: This genitive phrase explains the sphere or purpose of Epaphroditus's
    service. 'To my need' is concise and reflects service rendered for Paul's practical
    need.
