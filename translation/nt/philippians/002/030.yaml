id: PHP.2.30
reference: Philippians 2:30
source:
  edition: SBLGNT
  text: ὅτι διὰ τὸ ἔργον ⸀Χριστοῦ μέχρι θανάτου ἤγγισεν, ⸀παραβολευσάμενος τῇ ψυχῇ ἵνα ἀναπληρώσῃ τὸ ὑμῶν ὑστέρημα τῆς πρός με λειτουργίας.
translation:
  text: because of the work of the Messiah he came near to death, risking his life to make up for what was lacking in your service to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ.'' Greek: ''the work of Christ/Messiah.'''
    reason: alternative_reading
  - marker: b
    text: '''What was lacking'' refers to service the Philippians could not personally render because they were absent, not to unwillingness on their part.'
    reason: cultural_note
  - marker: c
    text: Or 'because for the work'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τὸ ἔργον Χριστοῦ
  chosen: for the work of the Messiah
  alternatives:
  - because of the work of Christ
  - for Messiah's work
  lexicon: BDAG
  entry: ἔργον; Χριστός
  rationale: διά with the accusative is causal here ('because of/for the sake of'). 'Work' preserves ἔργον straightforwardly. Χριστοῦ is rendered 'the Messiah' per project policy to translate the title where it functions as a title rather than a name-like form.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  entry: Χριστός
  rationale: This is a christological title in context, not merely a name-like label, so 'Messiah' best preserves the semantic force required by the doctrine guidelines.
- source_word: μέχρι θανάτου ἤγγισεν
  chosen: he came near to death
  alternatives:
  - he drew near to death
  - he was close to death
  lexicon: BDAG
  entry: ἐγγίζω
  rationale: The clause is idiomatic and means he came to the point of death. 'Came near to death' is both clear and close to the Greek wording.
- source_word: παραβολευσάμενος τῇ ψυχῇ
  chosen: risking his life
  alternatives:
  - gambling with his life
  - exposing his life to danger
  lexicon: BDAG
  entry: παραβολεύομαι; ψυχή
  rationale: The participle conveys hazardous self-exposure. 'Risking his life' is natural modern English and captures the force without sounding overly idiomatic or slangy. Here ψυχή refers to earthly life rather than the immaterial soul.
- source_word: ἵνα ἀναπληρώσῃ
  chosen: to make up for
  alternatives:
  - to complete
  - to fill up
  lexicon: BDAG
  entry: ἀναπληρόω
  rationale: The ἵνα clause expresses purpose. 'To make up for' best conveys supplying what is absent or unavailable in context.
- source_word: τὸ ὑμῶν ὑστέρημα
  chosen: what was lacking
  alternatives:
  - your deficiency
  - your shortage
  lexicon: BDAG
  entry: ὑστέρημα
  rationale: The phrase denotes what was absent in practice, not a moral fault. 'What was lacking' is idiomatic and avoids overstating blame.
- source_word: τῆς πρός με λειτουργίας
  chosen: your service to me
  alternatives:
  - your ministry to me
  - your assistance to me
  lexicon: BDAG
  entry: λειτουργία
  rationale: λειτουργία can mean service or ministry. 'Service to me' fits the immediate context of practical support while remaining broad enough to include the Philippians' ministry expressed through Epaphroditus.
