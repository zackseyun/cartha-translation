theological_decisions:
- issue: Rendering Χριστοῦ in a Pauline phrase
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where it functions as a title. In 'the work of the Messiah,' the titular sense remains audible and preferable.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
revisions:
- timestamp: '2026-04-21T05:23:39Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/philippians/002/030.json
  category: awkward_english
  tier: 1
  from: because for the work
  to: because of the work
  rationale: The current rendering combines the conjunction 'ὅτι' (because) and the prepositional phrase 'διὰ τὸ ἔργον' (on account of the work) into the slightly awkward English construction 'because for the work'. A more natural and direct translation would be 'because of the work', which smoothly conveys the intended cause.
