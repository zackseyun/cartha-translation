theological_decisions:
- issue: Cultic imagery for Paul's possible death
  chosen_reading: Paul describes himself metaphorically as being poured out as a drink
    offering in addition to the Philippians' sacrifice and priestly service.
  alternative_readings:
  - Paul's life is poured out merely alongside their service without explicit sacrificial
    intensification.
  rationale: The clustered sacrificial terms σπένδομαι, θυσία, and λειτουργία strongly
    support preserving the worship/sacrifice imagery rather than flattening it into
    generic service language.
