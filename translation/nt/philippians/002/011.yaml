- issue: Rendering Χριστός in a christological confession
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy prefers translated titles over inherited transliterations when the title sense remains meaningful. This preserves the messianic claim while avoiding doctrinal over-interpretation beyond the Greek.
