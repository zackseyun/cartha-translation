revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/philippians/002/011.json
  category: awkward_english
  tier: 1
  from: And every tongue confess
  to: and that every tongue should confess
  rationale: The Greek verb ἐξομολογήσηται is a subjunctive in a purpose clause that begins in verse 10. The English rendering 'And every tongue confess' is grammatically awkward and likely to be read as a subject-verb agreement error. A clearer rendering that respects the subjunctive mood would be 'and that every tongue should confess' or similar, making the connection to the purpose clause explicit.
