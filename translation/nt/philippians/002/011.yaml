id: PHP.2.11
reference: Philippians 2:11
source:
  edition: SBLGNT
  text: καὶ πᾶσα γλῶσσα ἐξομολογήσηται ὅτι κύριος Ἰησοῦς Χριστὸς εἰς δόξαν θεοῦ πατρός.
translation:
  text: and that every tongue should confess that Jesus Christ is Lord, to the glory of God the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Jesus Christ is Lord.”'
    reason: alternative_reading
  - marker: b
    text: Or 'And every tongue confess'.
    reason: previous_rendering
lexical_decisions:
- source_word: πᾶσα γλῶσσα
  chosen: every tongue
  alternatives:
  - every mouth
  - everyone
  lexicon: BDAG
  rationale: A formally close rendering preserves the bodily metaphor for universal confession while remaining natural in English.
- source_word: ἐξομολογήσηται
  chosen: confess
  alternatives:
  - openly confess
  - acknowledge
  lexicon: BDAG
  rationale: “Confess” best preserves the public declarative force of the verb without adding interpretive weight. “Acknowledge” is possible but slightly weaker; “openly confess” is explanatory rather than translational.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md gives “Lord” as the default rendering for κύριος. Here it preserves both the christological force and the likely resonance with scriptural language about universal homage.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per DOCTRINE.md, Χριστός is rendered “Messiah” where it functions clearly as a title. In this confessional formula, the title sense is still active, so “the Messiah” is preferred; the traditional “Christ” is preserved in a footnote.
- source_word: εἰς δόξαν
  chosen: to the glory of
  alternatives:
  - for the glory of
  lexicon: BDAG
  rationale: “To the glory of” is idiomatic and closely reflects the directional force of εἰς with δόξα in this worship context.
- source_word: θεοῦ πατρός
  chosen: God the Father
  alternatives:
  - God, the Father
  lexicon: BDAG
  rationale: This is the standard natural English rendering of the genitival expression and clearly conveys the referent without awkwardness.
