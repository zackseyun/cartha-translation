id: PHP.2.13
reference: Philippians 2:13
source:
  edition: SBLGNT
  text: ⸀θεὸς γάρ ἐστιν ὁ ἐνεργῶν ἐν ὑμῖν καὶ τὸ θέλειν καὶ τὸ ἐνεργεῖν ὑπὲρ τῆς εὐδοκίας.
translation:
  text: For God is the one working in you, both to will and to work for his good pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'both the willing and the working.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to his good pleasure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks an explanatory ground for the preceding exhortation; 'for' preserves
    the connective force naturally in English.
- source_word: ὁ ἐνεργῶν
  chosen: the one working
  alternatives:
  - the one at work
  - the one who works
  lexicon: BDAG
  rationale: The article with present participle is substantival. 'The one working'
    keeps the ongoing verbal force and avoids flattening it into a simple finite verb
    too early.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: The phrase can be read individually or corporately, but 'in you' preserves
    the Greek wording and leaves the scope open, matching the text's tension.
- source_word: τὸ θέλειν
  chosen: to will
  alternatives:
  - to desire
  - the willing
  lexicon: BDAG
  rationale: The articular infinitive denotes volition. 'To will' best preserves the
    deliberate-volitional sense and parallels the second infinitive.
- source_word: τὸ ἐνεργεῖν
  chosen: to work
  alternatives:
  - to act
  - the working
  lexicon: BDAG
  rationale: Using 'to work' preserves the lexical connection with ἐνεργῶν earlier
    in the verse and keeps the concise parallel structure.
- source_word: ὑπὲρ τῆς εὐδοκίας
  chosen: for his good pleasure
  alternatives:
  - for good pleasure
  - according to his good pleasure
  - for the sake of his good pleasure
  lexicon: BDAG
  rationale: ὑπέρ with the genitive naturally conveys purpose/benefit here. 'Good
    pleasure' preserves εὐδοκία more closely than 'purpose.' The possessive 'his'
    is implied from the subject, God, and makes the English intelligible.
