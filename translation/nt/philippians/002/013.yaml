theological_decisions:
- issue: Divine agency and human willing/working
  chosen_reading: Retained the dual expression 'both to will and to work' without
    softening either side.
  alternative_readings:
  - both to desire and to act
  - both the desire and the ability to do
  rationale: The verse presents God as the one working in believers at the level of
    both volition and action. The translation preserves that tension without importing
    a narrower denominational explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
