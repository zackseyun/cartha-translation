theological_decisions:
- issue: Scope of the threefold expression ἐπουρανίων καὶ ἐπιγείων καὶ καταχθονίων
  chosen_reading: A cosmic, universal scope of all created realms is preserved without
    specifying more than the text states about the identity of each group.
  alternative_readings:
  - A more explicit rendering naming heavenly beings, humans, and the dead
  - A more interpretive rendering referring to angels, people, and demons
  rationale: The verse emphasizes universal homage to Jesus. The translation retains
    that breadth while avoiding interpretive over-specification not demanded by the
    Greek.
