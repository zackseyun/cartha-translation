id: PHP.2.10
reference: Philippians 2:10
source:
  edition: SBLGNT
  text: ἵνα ἐν τῷ ὀνόματι Ἰησοῦ πᾶν γόνυ κάμψῃ ἐπουρανίων καὶ ἐπιγείων καὶ καταχθονίων,
translation:
  text: so that at the name of Jesus every knee should bow—in heaven and on earth
    and under the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the name of Jesus.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'of heavenly ones and earthly ones and under-the-earth ones';
      the translation expresses these as realms for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result flowing from the previous clause; 'so that' is natural
    English and preserves the telic sense.
- source_word: ἐν τῷ ὀνόματι Ἰησοῦ
  chosen: at the name of Jesus
  alternatives:
  - in the name of Jesus
  lexicon: BDAG
  rationale: With an act of obeisance, this is naturally rendered 'at the name of
    Jesus' in English, expressing response to Jesus' named status and honor. 'In the
    name' is possible but more easily suggests agency or authorization here.
- source_word: πᾶν γόνυ
  chosen: every knee
  alternatives:
  - every person
  lexicon: BDAG
  rationale: A literal rendering preserves the vivid bodily image of universal homage
    rather than paraphrasing it into an abstract reference to persons.
- source_word: κάμψῃ
  chosen: should bow
  alternatives:
  - might bow
  - would bow
  - bend
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα is well represented by 'should bow' in elevated
    but readable English. 'Bow' is more idiomatic than 'bend' in this context of homage.
- source_word: ἐπουρανίων
  chosen: in heaven
  alternatives:
  - of heavenly beings
  - among the heavenly ones
  lexicon: BDAG
  rationale: Though formally a substantival genitive adjective ('of heavenly beings'),
    English reads more naturally by expressing the sphere as 'in heaven,' especially
    in the triad with earth and under the earth.
- source_word: ἐπιγείων
  chosen: on earth
  alternatives:
  - of earthly beings
  - among those on earth
  lexicon: BDAG
  rationale: Rendered as a matching sphere expression for natural English and to preserve
    the cosmic threefold scope.
- source_word: καταχθονίων
  chosen: under the earth
  alternatives:
  - of those under the earth
  - in the underworld
  lexicon: BDAG
  rationale: This keeps the spatial imagery of the Greek without importing a more
    interpretive term like 'underworld.'
