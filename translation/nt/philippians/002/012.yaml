id: PHP.2.12
reference: Philippians 2:12
source:
  edition: SBLGNT
  text: Ὥστε, ἀγαπητοί μου, καθὼς πάντοτε ὑπηκούσατε, μὴ ὡς ἐν τῇ παρουσίᾳ μου μόνον
    ἀλλὰ νῦν πολλῷ μᾶλλον ἐν τῇ ἀπουσίᾳ μου, μετὰ φόβου καὶ τρόμου τὴν ἑαυτῶν σωτηρίαν
    κατεργάζεσθε,
translation:
  text: So then, my beloved, just as you have always obeyed—not only as in my presence,
    but now much more in my absence—work out your own salvation with fear and trembling,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the more in my absence.”
    reason: lexical_alternative
  - marker: b
    text: “Work out” means to carry salvation through in life, not to earn it.
    reason: alternative_reading
  - marker: c
    text: “Fear and trembling” denotes reverent awe and serious humility before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  chosen: So then
  alternatives:
  - Therefore
  - Thus
  lexicon: BDAG
  rationale: Marks an inferential transition from the Christ-hymn and exhortation
    above; “So then” preserves the logical connection while sounding natural in modern
    English.
- source_word: ἀγαπητοί μου
  chosen: my beloved
  alternatives:
  - my dear ones
  - my beloved ones
  lexicon: BDAG
  rationale: A warm vocative of affection; “my beloved” is idiomatic, dignified, and
    reflects Paul's pastoral tone better than flatter alternatives.
- source_word: καθὼς πάντοτε ὑπηκούσατε
  chosen: just as you have always obeyed
  alternatives:
  - as you always obeyed
  - since you have always obeyed
  lexicon: BDAG
  rationale: The aorist summarizes their established pattern of obedience; English
    present perfect best conveys continuing relevance from past conduct to present
    exhortation.
- source_word: μὴ ὡς ... μόνον ἀλλὰ
  chosen: not only as ... but
  alternatives:
  - not merely ... but
  - not only ... but rather
  lexicon: BDAG
  rationale: Preserves the correlative contrast without overcomplicating the sentence.
- source_word: παρουσίᾳ / ἀπουσίᾳ
  chosen: presence / absence
  alternatives:
  - being present / being absent
  lexicon: BDAG
  rationale: Concrete and idiomatic pair that mirrors the Greek nouns and keeps the
    rhetorical contrast clear.
- source_word: πολλῷ μᾶλλον
  chosen: much more
  alternatives:
  - all the more
  - far more
  lexicon: BDAG
  rationale: A standard intensifying comparative; “much more” is clear and direct.
- source_word: μετὰ φόβου καὶ τρόμου
  chosen: with fear and trembling
  alternatives:
  - with reverence and trembling
  - with awe and trembling
  lexicon: BDAG
  rationale: This established expression should be retained because it reflects serious
    humility before God; softer renderings risk weakening the force.
- source_word: τὴν ἑαυτῶν σωτηρίαν
  chosen: your own salvation
  alternatives:
  - your salvation
  - your own deliverance
  lexicon: BDAG
  rationale: σωτηρία normally bears theological weight as “salvation”; “your own”
    preserves ἑαυτῶν and emphasizes personal responsibility without implying isolated
    individualism.
- source_word: κατεργάζεσθε
  chosen: work out
  alternatives:
  - carry out
  - bring about
  - produce
  lexicon: BDAG
  rationale: “Work out” best matches the sense of bringing something to expression
    or completion in conduct, and it preserves the familiar distinction from “work
    for” or “earn.”
