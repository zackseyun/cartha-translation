theological_decisions:
- issue: Meaning of 'work out your own salvation'
  chosen_reading: An exhortation to live out and bring to expression the salvation
    already in view, not to earn salvation by works.
  alternative_readings:
  - A command to achieve salvation by human effort alone
  rationale: The verb κατεργάζεσθε speaks of effecting or carrying something through,
    and the immediate context continues in verse 13 with God working in them. The
    translation preserves the wording of the text without importing a sectarian doctrinal
    resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'fear and trembling'
  chosen_reading: Reverent seriousness and humble awe before God.
  alternative_readings:
  - Cringing terror only
  - Mere respect without emotional weight
  rationale: The phrase carries solemnity and gravity. Retaining the traditional wording
    best preserves that tension for readers.
  doctrine_reference: Readable modern English, not archaic or academic.
