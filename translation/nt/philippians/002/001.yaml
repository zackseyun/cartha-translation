theological_decisions:
- issue: Whether πνεύματος refers specifically to the Holy Spirit and how the genitive
    with κοινωνία should be expressed
  chosen_reading: fellowship of the Spirit
  alternative_readings:
  - participation in the Spirit
  - fellowship in spirit
  rationale: Paul likely refers to the Holy Spirit, not merely human disposition,
    especially in a sequence of distinctly Christian realities. The phrase remains
    somewhat compact in Greek, so the main text adopts the most probable reading while
    preserving alternatives in a footnote rather than over-resolving the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
