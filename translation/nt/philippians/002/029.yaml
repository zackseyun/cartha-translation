id: PHP.2.29
reference: Philippians 2:29
source:
  edition: SBLGNT
  text: προσδέχεσθε οὖν αὐτὸν ἐν κυρίῳ μετὰ πάσης χαρᾶς, καὶ τοὺς τοιούτους ἐντίμους
    ἔχετε,
translation:
  text: So welcome him in the Lord with all joy, and hold people like him in honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'such men.' The Greek uses a masculine plural expression here.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέχεσθε
  chosen: welcome
  alternatives:
  - receive
  - accept
  lexicon: BDAG
  rationale: The imperative calls for more than bare acceptance; 'welcome' conveys
    warm reception appropriate to Paul's pastoral tone.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  rationale: '''So'' preserves the inferential force in natural modern English without
    sounding overly formal.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - as one who belongs to the Lord
  - in union with the Lord
  lexicon: BDAG
  rationale: This keeps the compact Pauline phrase intact and preserves its relational/spiritual
    sense without paraphrase.
- source_word: μετὰ πάσης χαρᾶς
  chosen: with all joy
  alternatives:
  - with great joy
  - with full joy
  lexicon: BDAG
  rationale: A relatively literal rendering that remains natural in English and preserves
    the fullness conveyed by πᾶς.
- source_word: τοὺς τοιούτους
  chosen: people like him
  alternatives:
  - such people
  - such men
  lexicon: BDAG
  rationale: The phrase refers to persons of this sort, with Epaphroditus as the concrete
    example. 'People like him' communicates the representative force naturally in
    English; the masculine form is preserved in a footnote.
- source_word: ἐντίμους ἔχετε
  chosen: hold people like him in honor
  alternatives:
  - honor such people
  - regard such people as worthy of honor
  lexicon: BDAG
  rationale: This reflects the sense of considering or treating such persons as honored,
    while remaining smooth and idiomatic in English.
