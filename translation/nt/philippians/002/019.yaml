theological_decisions:
- issue: Rendering κύριος in the phrase ἐν κυρίῳ Ἰησοῦ
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per the doctrinal guidance, κύριος is rendered 'Lord' as the default
    NT christological title. Nothing in this verse requires a deviation.
  doctrine_reference: 'Contested terms: κύριος → Lord'
