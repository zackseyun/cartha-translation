id: PHP.2.19
reference: Philippians 2:19
source:
  edition: SBLGNT
  text: Ἐλπίζω δὲ ἐν κυρίῳ Ἰησοῦ Τιμόθεον ταχέως πέμψαι ὑμῖν, ἵνα κἀγὼ εὐψυχῶ γνοὺς
    τὰ περὶ ὑμῶν.
translation:
  text: But I hope in the Lord Jesus to send Timothy to you soon, so that I too may
    be encouraged when I learn how you are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when I learn the things concerning you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλπίζω
  chosen: I hope
  alternatives:
  - I expect
  lexicon: BDAG
  rationale: The present indicative naturally conveys Paul's current expectation or
    hope; 'I hope' is the most direct and idiomatic English rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or contrast with the preceding context; 'But'
    preserves that discourse turn clearly in English.
- source_word: ἐν κυρίῳ Ἰησοῦ
  chosen: in the Lord Jesus
  alternatives:
  - through the Lord Jesus
  - in Lord Jesus
  lexicon: BDAG
  rationale: The phrase is retained with its relational sense rather than paraphrased
    away. κύριος is rendered 'Lord' per doctrinal guidance for Kyrios, and ἐν is preserved
    as 'in' because Paul frames his hope within dependence on the Lord Jesus.
- source_word: Τιμόθεον
  chosen: Timothy
  rationale: Personal names are transliterated by standard English convention.
- source_word: ταχέως
  chosen: soon
  alternatives:
  - quickly
  lexicon: BDAG
  rationale: '''Soon'' fits the temporal sense naturally in this context of intended
    travel/sending; ''quickly'' is possible but sounds more focused on speed of action
    than expected time.'
- source_word: πέμψαι
  chosen: to send
  alternatives:
  - to dispatch
  lexicon: BDAG
  rationale: The aorist infinitive after ἐλπίζω is well represented by the English
    infinitive 'to send'; 'dispatch' is too stiff for readable modern English.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is best rendered as the indirect object 'to you' in idiomatic
    English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This clearly marks purpose. 'So that' is readable modern English and
    preserves the force.
- source_word: κἀγὼ
  chosen: I too
  alternatives:
  - I also
  - even I
  lexicon: BDAG
  rationale: The compound form emphasizes Paul alongside others; 'I too' is natural
    and preserves that emphasis.
- source_word: εὐψυχῶ
  chosen: may be encouraged
  alternatives:
  - may be cheered
  - may be heartened
  lexicon: BDAG
  rationale: The verb denotes being in good spirits. 'May be encouraged' communicates
    the sense clearly in contemporary English without sounding colloquial.
- source_word: γνοὺς
  chosen: when I learn
  alternatives:
  - having learned
  - when I know
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having learned'), English idiom
    in this construction is better expressed temporally as 'when I learn,' capturing
    the sense without awkwardness.
- source_word: τὰ περὶ ὑμῶν
  chosen: how you are
  alternatives:
  - the things about you
  - the news concerning you
  lexicon: BDAG
  rationale: The idiom refers to the Philippians' circumstances or condition. 'How
    you are' is a natural English rendering that preserves the intended sense rather
    than a wooden literalism.
