id: PHP.2.3
reference: Philippians 2:3
source:
  edition: SBLGNT
  text: μηδὲν κατ’ ἐριθείαν ⸂μηδὲ κατὰ⸃ κενοδοξίαν, ἀλλὰ τῇ ταπεινοφροσύνῃ ἀλλήλους
    ἡγούμενοι ὑπερέχοντας ἑαυτῶν,
translation:
  text: Do nothing from selfish ambition or empty pride, but in humility regard one
    another as more important than yourselves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “empty conceit” or “vain glory.”
    reason: lexical_alternative
  - marker: b
    text: Or “regard one another as superior to yourselves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν
  chosen: Do nothing
  alternatives:
  - nothing
  - not anything
  lexicon: BDAG
  rationale: Idiomatic prohibition in English; fronting the negative imperative sense
    matches Paul's exhortational style.
- source_word: κατ’ ἐριθείαν
  chosen: from selfish ambition
  alternatives:
  - from rivalry
  - out of factional self-seeking
  lexicon: BDAG
  rationale: ἐριθεία commonly denotes selfish, partisan ambition rather than mere
    generic rivalry. 'From selfish ambition' is natural English and preserves the
    motive/source nuance of κατά.
- source_word: κατὰ κενοδοξίαν
  chosen: or empty pride
  alternatives:
  - or vain glory
  - or empty conceit
  lexicon: BDAG
  rationale: κενοδοξία is literally 'empty glory.' 'Empty pride' communicates the
    hollowness of self-exalting vanity in accessible modern English without the dated
    feel of 'vainglory.'
- source_word: τῇ ταπεινοφροσύνῃ
  chosen: in humility
  alternatives:
  - with humility
  - by humility
  lexicon: BDAG
  rationale: The dative expresses manner or means. 'In humility' is concise, natural,
    and preserves the ethical posture Paul commends.
- source_word: ἡγούμενοι
  chosen: regard
  alternatives:
  - consider
  - count
  - esteem
  lexicon: BDAG
  rationale: The participle carries a cognitive-evaluative sense. 'Regard' is slightly
    more relational and less clinical than 'consider,' fitting the paraenetic context.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in formal Christian English; clear and
    natural.
- source_word: ὑπερέχοντας ἑαυτῶν
  chosen: as more important than yourselves
  alternatives:
  - as superior to yourselves
  - as surpassing yourselves
  - above yourselves
  lexicon: BDAG
  rationale: ὑπερέχω can denote superiority or excelling. 'More important than yourselves'
    best conveys the comparative force in clear modern English without implying ontological
    superiority.
