theological_decisions:
- issue: Rendering Χριστοῦ in an eschatological title phrase
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Per the doctrinal guidance, Χριστός is rendered 'Messiah' where the titular
    sense is active. In 'the day of the Messiah,' the phrase carries eschatological
    and royal-messianic force rather than functioning as a mere proper name.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like.'
