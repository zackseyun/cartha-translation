id: PHP.2.16
reference: Philippians 2:16
source:
  edition: SBLGNT
  text: λόγον ζωῆς ἐπέχοντες, εἰς καύχημα ἐμοὶ εἰς ἡμέραν Χριστοῦ, ὅτι οὐκ εἰς κενὸν
    ἔδραμον οὐδὲ εἰς κενὸν ἐκοπίασα.
translation:
  text: holding fast the word of life, for a boast to me on the day of the Messiah,
    that I did not run in vain or labor in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holding forth' or 'holding out the word of life.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the day of Christ.'''
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον ζωῆς
  chosen: the word of life
  alternatives:
  - the message of life
  lexicon: BDAG
  rationale: 'λόγος can mean either ''word'' or ''message.'' ''Word of life'' preserves
    the compact Greek expression and its possible double force: life-giving word and
    word concerning life.'
- source_word: ἐπέχοντες
  chosen: holding fast
  alternatives:
  - holding forth
  - holding out
  lexicon: BDAG
  rationale: ἐπέχω can mean to hold fast or to hold out/offer. In this context, Paul
    has just urged steadfast obedience and blamelessness, so 'holding fast' best fits
    the exhortational flow, while the outward/proclamatory sense is preserved in a
    footnote.
- source_word: καύχημα
  chosen: a boast
  alternatives:
  - ground for boasting
  - reason for pride
  lexicon: BDAG
  rationale: The noun refers to that in which one boasts. 'A boast' is concise and
    natural here, while still allowing the sense that the Philippians would be Paul's
    occasion for rightful boasting.
- source_word: ἡμέραν Χριστοῦ
  chosen: the day of the Messiah
  alternatives:
  - the day of Christ
  lexicon: BDAG
  rationale: Χριστοῦ is titular here, not merely name-like, so the project's default
    rendering 'Messiah' is followed. 'Day of the Messiah' preserves the eschatological
    title sense; the traditional 'day of Christ' is preserved in a footnote.
- source_word: οὐκ εἰς κενὸν
  chosen: not in vain
  alternatives:
  - not for nothing
  - not to no purpose
  lexicon: BDAG
  rationale: This is a standard idiom for fruitlessness or emptiness. 'In vain' is
    the clearest concise English equivalent and suits Paul's rhetorical parallelism.
- source_word: ἔδραμον
  chosen: I did run
  alternatives:
  - I ran
  lexicon: BDAG
  rationale: τρέχω is used metaphorically by Paul for apostolic exertion and ministry
    course. English idiom favors 'I ran'; in the final rendering this is used naturally
    while preserving the metaphor.
- source_word: ἐκοπίασα
  chosen: labor
  alternatives:
  - toil
  - work hard
  lexicon: BDAG
  rationale: κοπιάω emphasizes strenuous labor. 'Labor' preserves the weight and pairs
    well with 'run' in Paul's athletic-and-work imagery.
