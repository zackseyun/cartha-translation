id: PHP.2.26
reference: Philippians 2:26
source:
  edition: SBLGNT
  text: ἐπειδὴ ἐπιποθῶν ἦν πάντας ⸀ὑμᾶς, καὶ ἀδημονῶν διότι ἠκούσατε ὅτι ἠσθένησεν.
translation:
  text: since he was longing for all of you and was deeply distressed because you
    heard that he was sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because he heard that you had heard he was ill.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  chosen: since
  alternatives:
  - because
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the explanatory ground for sending Epaphroditus back. “Since”
    fits natural English while preserving the causal nuance.
- source_word: ἐπιποθῶν ἦν
  chosen: he was longing
  alternatives:
  - he longed
  - he was yearning
  lexicon: BDAG
  rationale: The periphrastic construction with present participle plus imperfect
    of εἰμί conveys ongoing state or action in past time. “He was longing” preserves
    that aspect better than the simple past.
- source_word: πάντας ὑμᾶς
  chosen: all of you
  alternatives:
  - you all
  - all of you Philippians
  lexicon: BDAG
  rationale: Retains the explicit distributive emphasis of πάντας with the second-person
    pronoun. “All of you” is clear, natural, and preserves the breadth of his affection.
- source_word: ἀδημονῶν
  chosen: was deeply distressed
  alternatives:
  - was troubled
  - was in anguish
  - was anxious
  lexicon: BDAG
  rationale: The term denotes acute emotional distress rather than mild concern. “Deeply
    distressed” communicates the strength of feeling without overstating into physical
    torment.
- source_word: διότι
  chosen: because
  alternatives:
  - since
  - for
  lexicon: BDAG
  rationale: A straightforward causal conjunction here, explaining the reason for
    his distress.
- source_word: ἠκούσατε
  chosen: you heard
  alternatives:
  - you came to hear
  - news reached you
  lexicon: BDAG
  rationale: The aorist is best rendered simply in English. “You heard” is direct
    and idiomatic.
- source_word: ὅτι ἠσθένησεν
  chosen: that he was sick
  alternatives:
  - that he became sick
  - that he fell ill
  lexicon: BDAG
  rationale: ἀσθενέω here refers to physical illness. “Was sick” is the most natural
    English in context, though “became sick” is possible from the aorist.
