theological_decisions:
- issue: Relationship between obedience and divine presence
  chosen_reading: Rendered as a straightforward exhortation followed by promise, without
    implying a mechanistic condition beyond the text.
  alternative_readings:
  - Rendered more strongly as a conditional cause-and-effect statement
  rationale: The Greek coordinates the clauses with καί rather than making the promise
    an explicit conditional formula. The translation preserves the text's pastoral
    force without importing extra doctrinal precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
