id: PHP.4.9
reference: Philippians 4:9
source:
  edition: SBLGNT
  text: ἃ καὶ ἐμάθετε καὶ παρελάβετε καὶ ἠκούσατε καὶ εἴδετε ἐν ἐμοί, ταῦτα πράσσετε·
    καὶ ὁ θεὸς τῆς εἰρήνης ἔσται μεθ’ ὑμῶν.
translation:
  text: What you also learned and received and heard and saw in me—practice these
    things, and the God of peace will be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do these things.'
    reason: lexical_alternative
  - marker: b
    text: '''Saw in me'' may also be expressed as ''saw in my example'' or ''saw in
      my life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - whatever
  lexicon: BDAG
  rationale: Neuter plural relative pronoun introducing the content of Paul's exhortation;
    'what' is idiomatic in English while still covering the plural sense carried forward
    by 'these things'.
- source_word: ἐμάθετε
  chosen: learned
  alternatives:
  - came to learn
  lexicon: BDAG
  rationale: Aorist indicative referring to what the Philippians had learned from
    Paul; 'learned' is the natural and sufficiently formal English equivalent.
- source_word: παρελάβετε
  chosen: received
  alternatives:
  - accepted
  - received as tradition
  lexicon: BDAG
  rationale: In Pauline usage this can carry the sense of receiving instruction or
    tradition. 'Received' preserves that breadth without over-specifying 'tradition'
    where the verse itself does not explicitly do so.
- source_word: ἠκούσατε
  chosen: heard
  alternatives:
  - heard from me
  lexicon: BDAG
  rationale: Simple auditory reception in the series of verbs. 'Heard' keeps the parallel
    structure concise.
- source_word: εἴδετε ἐν ἐμοί
  chosen: saw in me
  alternatives:
  - saw in my example
  - saw in my life
  lexicon: BDAG
  rationale: The phrase points to what was observable in Paul himself. 'Saw in me'
    is more transparent to the Greek than expanding to 'example' in the main text.
- source_word: ταῦτα πράσσετε
  chosen: practice these things
  alternatives:
  - do these things
  - keep doing these things
  lexicon: BDAG
  rationale: πράσσω here calls for habitual putting into practice. 'Practice these
    things' conveys ongoing action well in natural English.
- source_word: ὁ θεὸς τῆς εἰρήνης
  chosen: the God of peace
  alternatives:
  - the God who gives peace
  lexicon: BDAG
  rationale: A standard Pauline expression. The genitive is best kept directly as
    'of peace' rather than interpreted more dynamically.
- source_word: ἔσται μεθ’ ὑμῶν
  chosen: will be with you
  alternatives:
  - will be among you
  lexicon: BDAG
  rationale: Future assurance of God's presence. 'With you' is the straightforward
    rendering of μετά with the genitive here.
