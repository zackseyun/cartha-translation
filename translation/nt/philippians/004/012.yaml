id: PHP.4.12
reference: Philippians 4:12
source:
  edition: SBLGNT
  text: οἶδα καὶ ταπεινοῦσθαι, οἶδα καὶ περισσεύειν· ἐν παντὶ καὶ ἐν πᾶσιν μεμύημαι,
    καὶ χορτάζεσθαι καὶ πεινᾶν, καὶ περισσεύειν καὶ ὑστερεῖσθαι·
translation:
  text: 'I know how to be brought low, and I know how to abound. In every circumstance
    and in all things I have learned the secret: both to be well fed and to be hungry,
    both to abound and to be in need.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: More literally, 'I have been initiated.' Paul uses initiation language metaphorically
      for learning a secret.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  chosen: I know how
  alternatives:
  - I know
  - I have learned how
  lexicon: BDAG
  rationale: With the infinitives that follow, English idiom is best conveyed by 'know
    how to,' expressing practical knowledge gained by experience rather than mere
    abstract awareness.
- source_word: ταπεινοῦσθαι
  chosen: to be brought low
  alternatives:
  - to be humbled
  - to live humbly
  lexicon: BDAG
  rationale: The passive/middle form naturally conveys being lowered or humbled in
    circumstances. 'Be brought low' preserves that sense without narrowing it to attitude
    alone.
- source_word: περισσεύειν
  chosen: to abound
  alternatives:
  - to have plenty
  - to prosper
  lexicon: BDAG
  rationale: '''Abound'' preserves the verbal parallelism and breadth of meaning—having
    more than enough—without over-specifying material prosperity.'
- source_word: ἐν παντὶ καὶ ἐν πᾶσιν
  chosen: In every circumstance and in all things
  alternatives:
  - In anything and everything
  - In each and every situation
  lexicon: BDAG
  rationale: This rendering preserves the rhetorical fullness of the paired expressions
    while remaining natural in English.
- source_word: μεμύημαι
  chosen: I have learned the secret
  alternatives:
  - I have been initiated
  - I have been taught the secret
  lexicon: BDAG
  rationale: The verb literally evokes initiation language, but in context Paul speaks
    idiomatically of acquiring a secret of living under all conditions. 'I have learned
    the secret' communicates the sense clearly in modern English while preserving
    the metaphor in a footnote.
- source_word: χορτάζεσθαι
  chosen: to be well fed
  alternatives:
  - to be filled
  - to be satisfied
  lexicon: BDAG
  rationale: In contrast with 'to be hungry,' the food-related nuance is prominent
    here, so 'well fed' is clearer than the broader 'filled'.
- source_word: πεινᾶν
  chosen: to be hungry
  alternatives:
  - to hunger
  lexicon: BDAG
  rationale: The plain verbal contrast with being well fed is best preserved by the
    simple modern expression 'to be hungry.'
- source_word: ὑστερεῖσθαι
  chosen: to be in need
  alternatives:
  - to lack
  - to go without
  lexicon: BDAG
  rationale: This rendering communicates deprivation clearly and idiomatically, pairing
    well with 'abound' while remaining broader than mere financial lack.
