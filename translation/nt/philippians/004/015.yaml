id: PHP.4.15
reference: Philippians 4:15
source:
  edition: SBLGNT
  text: Οἴδατε δὲ καὶ ὑμεῖς, Φιλιππήσιοι, ὅτι ἐν ἀρχῇ τοῦ εὐαγγελίου, ὅτε ἐξῆλθον
    ἀπὸ Μακεδονίας, οὐδεμία μοι ἐκκλησία ἐκοινώνησεν εἰς λόγον δόσεως καὶ λήμψεως
    εἰ μὴ ὑμεῖς μόνοι,
translation:
  text: And you yourselves also know, Philippians, that at the beginning of the gospel,
    when I departed from Macedonia, no church shared with me in the matter of giving
    and receiving except you alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the account of giving and receiving."
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδατε
  chosen: you ... know
  alternatives:
  - you have known
  - you are aware
  lexicon: BDAG
  rationale: Rendered as a present English stative verb ('know'), which best matches
    normal idiomatic force of οἶδα in context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Carries the discourse forward without strong contrast; 'And' fits the
    connective force in smooth English.
- source_word: καὶ ὑμεῖς
  chosen: you yourselves also
  alternatives:
  - you also
  - you yourselves
  lexicon: BDAG
  rationale: Preserves both the additive force of καί and the emphatic pronoun ὑμεῖς.
- source_word: Φιλιππήσιοι
  chosen: Philippians
  alternatives:
  - people of Philippi
  lexicon: BDAG
  rationale: Standard transliteration of the vocative address, natural in English
    and consistent with epistolary style.
- source_word: ἐν ἀρχῇ τοῦ εὐαγγελίου
  chosen: at the beginning of the gospel
  alternatives:
  - in the beginning of the gospel
  - at the beginning of the good news
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the Greek phrasing and likely
    refers to the beginning stage of Paul's gospel work with them, without importing
    extra interpretation into the main text.
- source_word: ἐξῆλθον ἀπὸ Μακεδονίας
  chosen: I departed from Macedonia
  alternatives:
  - I left Macedonia
  - I went out from Macedonia
  lexicon: BDAG
  rationale: '''Departed'' best captures the aorist event in dignified modern English.'
- source_word: οὐδεμία ... ἐκκλησία
  chosen: no church
  alternatives:
  - not one church
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the negated subject.
- source_word: μοι
  chosen: with me
  alternatives:
  - with me as to my need
  - to me
  lexicon: BDAG
  rationale: With κοινωνέω, English commonly expresses the relationship as 'shared
    with me,' conveying personal participation rather than mere indirect object marking.
- source_word: ἐκοινώνησεν
  chosen: shared with me
  alternatives:
  - partnered with me
  - had fellowship with me
  - participated with me
  lexicon: BDAG
  rationale: Conveys tangible participation in support, which fits the financial context
    while remaining broader than a purely commercial term.
- source_word: εἰς λόγον δόσεως καὶ λήμψεως
  chosen: in the matter of giving and receiving
  alternatives:
  - in the account of giving and receiving
  - for the matter of giving and receiving
  lexicon: BDAG
  rationale: This idiom likely refers to material partnership expressed in giving
    and receiving. 'Matter' is clearer for modern readers, while an accounting nuance
    is preserved in a footnote.
- source_word: εἰ μὴ ὑμεῖς μόνοι
  chosen: except you alone
  alternatives:
  - except you only
  - except for you alone
  lexicon: BDAG
  rationale: Preserves the emphatic exclusivity of the Greek while remaining natural
    English.
