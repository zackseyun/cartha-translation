id: PHP.4.11
reference: Philippians 4:11
source:
  edition: SBLGNT
  text: οὐχ ὅτι καθ’ ὑστέρησιν λέγω, ἐγὼ γὰρ ἔμαθον ἐν οἷς εἰμι αὐτάρκης εἶναι·
translation:
  text: Not that I am speaking from need, for I have learned to be content in whatever
    circumstances I am in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'self-sufficient'; the Greek adjective can denote sufficiency within
      oneself, though here it is rendered by the more contextual 'content.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ὑστέρησιν
  chosen: from need
  alternatives:
  - in want
  - because of lack
  lexicon: BDAG
  rationale: The phrase denotes speaking out of deficiency or lack. 'From need' is
    natural English and preserves the sense that Paul is not motivated by personal
    shortage.
- source_word: λέγω
  chosen: I am speaking
  alternatives:
  - I say
  lexicon: BDAG
  rationale: The present tense is kept with an English progressive for smoother modern
    style while preserving Paul's immediate statement.
- source_word: ἔμαθον
  chosen: I have learned
  alternatives:
  - I learned
  lexicon: BDAG
  rationale: The aorist refers to a completed learning process with present relevance;
    the English perfect communicates that nuance naturally in context.
- source_word: ἐν οἷς εἰμι
  chosen: in whatever circumstances I am in
  alternatives:
  - in whatever situation I am
  - in the circumstances in which I am
  lexicon: BDAG
  rationale: The relative phrase is idiomatic rather than narrowly locative. 'Whatever
    circumstances' brings out the contextual sense without over-paraphrasing.
- source_word: αὐτάρκης
  chosen: content
  alternatives:
  - self-sufficient
  - satisfied
  lexicon: BDAG
  rationale: Although the term can suggest self-sufficiency, in this context 'content'
    best conveys Paul's learned state without importing Stoic overtones as the main
    English rendering.
