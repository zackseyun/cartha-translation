theological_decisions:
- issue: Potential philosophical nuance in αὐτάρκης
  chosen_reading: Rendered as 'content' rather than 'self-sufficient.'
  alternative_readings:
  - self-sufficient
  rationale: Paul describes a learned posture of sufficiency amid varying circumstances.
    'Content' fits the immediate context and avoids overstating autonomous self-reliance,
    while the lexical alternative is preserved in a footnote.
