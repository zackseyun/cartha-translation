theological_decisions:
- issue: Supplying the implied verb in the doxology
  chosen_reading: be the glory
  alternative_readings:
  - is the glory
  - belongs the glory
  rationale: The Greek clause is verbless, so English requires an implied sense. 'Be
    the glory' best matches the doxological and benedictory function of the statement
    in context.
