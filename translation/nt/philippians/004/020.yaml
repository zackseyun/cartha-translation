id: PHP.4.20
reference: Philippians 4:20
source:
  edition: SBLGNT
  text: τῷ δὲ θεῷ καὶ πατρὶ ἡμῶν ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
translation:
  text: Now to our God and Father be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'to the ages of the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Used as a mild connective marking a transition or conclusion in Paul's
    closing doxology; 'Now' sounds natural in English without overstating contrast.
- source_word: θεῷ καὶ πατρὶ ἡμῶν
  chosen: our God and Father
  alternatives:
  - God, even our Father
  - God and our Father
  lexicon: BDAG
  rationale: Rendered as a unified expression referring to one person, with 'our'
    naturally applying to both nouns in English.
- source_word: ἡ δόξα
  chosen: be the glory
  alternatives:
  - is the glory
  - belongs the glory
  lexicon: BDAG
  rationale: English doxological style commonly supplies 'be' for this verbless blessing
    formula; this preserves the sense without awkwardness.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is idiomatic
    modern English and preserves the elevated doxological force better than a wooden
    literalism.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  lexicon: BDAG
  rationale: Retained in transliterated form because it functions as a fixed liturgical
    affirmation in Christian usage.
