id: PHP.4.16
reference: Philippians 4:16
source:
  edition: SBLGNT
  text: ὅτι καὶ ἐν Θεσσαλονίκῃ καὶ ἅπαξ καὶ δὶς εἰς τὴν χρείαν μοι ἐπέμψατε.
translation:
  text: because even in Thessalonica you sent for my need both once and twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “you sent for my needs more than once.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory clause giving the reason for Paul's statement
    in the surrounding context; 'because' is the clearest modern English connector
    here.
- source_word: ἐν Θεσσαλονίκῃ
  chosen: in Thessalonica
  alternatives:
  - while in Thessalonica
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'In Thessalonica' preserves the Greek
    form without importing a temporal nuance beyond the context.
- source_word: ἅπαξ καὶ δὶς
  chosen: both once and twice
  alternatives:
  - more than once
  - once and again
  lexicon: BDAG
  rationale: This preserves the emphatic repetition of the Greek more transparently
    than the idiomatic 'more than once,' while remaining natural English.
- source_word: εἰς τὴν χρείαν μοι
  chosen: for my need
  alternatives:
  - for my needs
  - to meet my need
  lexicon: BDAG
  rationale: χρεία is singular, so 'need' better reflects the Greek than 'needs.'
    'For my need' captures the sense of support directed toward Paul's necessity without
    adding explanatory wording.
- source_word: ἐπέμψατε
  chosen: you sent
  alternatives:
  - you sent support
  - you sent help
  lexicon: BDAG
  rationale: The verb itself is simply 'you sent.' Adding 'support' or 'help' clarifies
    the implied object but goes beyond the explicit wording, so the more transparent
    rendering is preferred.
