theological_decisions:
- issue: Implicit referent of 'the one who strengthens me'
  chosen_reading: Retain the indefinite substantive expression without adding 'Christ'
    or 'Messiah' to the main text.
  alternative_readings:
  - through Christ who strengthens me
  - through the Messiah who strengthens me
  rationale: The immediate and broader context strongly suggests Messiah Jesus as
    the referent, but the Greek text of this verse itself does not name him. Following
    original-language primacy, the translation preserves what is explicit and does
    not import the referent into the main text.
  doctrine_reference: Original-language primacy over translation tradition; do not
    import doctrinal claims the text does not make.
