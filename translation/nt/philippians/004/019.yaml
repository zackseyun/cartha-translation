id: PHP.4.19
reference: Philippians 4:19
source:
  edition: SBLGNT
  text: ὁ δὲ θεός μου πληρώσει πᾶσαν χρείαν ὑμῶν κατὰ ⸂τὸ πλοῦτος⸃ αὐτοῦ ἐν δόξῃ ἐν Χριστῷ Ἰησοῦ.
translation:
  text: And my God will supply your every need according to his riches in glory, in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “in Christ Jesus.”'
    reason: lexical_alternative
  - marker: b
    text: “According to his riches” expresses the measure of God's provision, not merely that it comes from his riches.
    reason: alternative_reading
  - marker: c
    text: Or possibly, “gloriously,” for “in glory.”
    reason: alternative_reading
  - marker: d
    text: Or 'in glory in Messiah Jesus'.
    reason: previous_rendering
lexical_decisions:
- source_word: πληρώσει
  chosen: will supply
  alternatives:
  - will fulfill
  - will fill
  lexicon: BDAG
  rationale: Future active verb from πληρόω here carries the sense of providing what is lacking, so 'will supply' is clearer in English than the more wooden 'will fill' while staying close to Paul's meaning.
- source_word: πᾶσαν χρείαν ὑμῶν
  chosen: your every need
  alternatives:
  - all your need
  - every need of yours
  lexicon: BDAG
  rationale: χρεία denotes need or necessity. 'Your every need' is natural modern English and preserves the distributive force of πᾶσαν.
- source_word: κατὰ τὸ πλοῦτος αὐτοῦ
  chosen: according to his riches
  alternatives:
  - in keeping with his riches
  - out of his riches
  lexicon: BDAG
  rationale: κατά with the accusative here is best rendered 'according to,' indicating measure or standard rather than mere source. This suggests abundant provision matching God's wealth, not a lesser giving from it.
- source_word: ἐν δόξῃ
  chosen: in glory
  alternatives:
  - gloriously
  - with glory
  lexicon: BDAG
  rationale: The prepositional phrase is retained formally because the Greek leaves its exact nuance somewhat open. 'In glory' preserves that texture better than an interpretive adverbial rendering.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστῷ is the title Χριστός, which the doctrine excerpt directs us to translate where context supports it. Here the phrase remains a christological designation, so 'Messiah Jesus' preserves the title's meaning.
- source_word: ὁ δὲ θεός μου
  chosen: And my God
  alternatives:
  - But my God
  - Now my God
  lexicon: BDAG
  rationale: δέ is lightly connective here. 'And' fits the flow from Paul's thanks and confidence without overstating contrast, while preserving the personal force of 'my God.'
