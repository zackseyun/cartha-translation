  category: awkward_english
  tier: 1
  from: in glory in Messiah Jesus
  to: in glory, in Messiah Jesus
  rationale: The current rendering stacks two prepositional phrases ('in glory in Messiah Jesus'), which can be slightly awkward for the English reader to parse. Adding a comma helps to separate the two phrases, signaling that 'in Messiah Jesus' is a distinct adverbial modifier for the entire clause, rather than a nested modifier of 'glory'. This small punctuation change improves readability and clarifies the syntax without altering the meaning.
