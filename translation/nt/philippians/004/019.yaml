theological_decisions:
- issue: Rendering Χριστός in the phrase ἐν Χριστῷ Ἰησοῦ
  chosen_reading: in Messiah Jesus
  alternative_readings:
  - in Christ Jesus
  rationale: The translation philosophy prefers translating christological titles rather than preserving traditional transliterations when context supports it. This verse does not require the title to be left untranslated, so 'Messiah' is used in the main text while the traditional form is preserved in a footnote.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
