id: PHP.4.21
reference: Philippians 4:21
source:
  edition: SBLGNT
  text: Ἀσπάσασθε πάντα ἅγιον ἐν Χριστῷ Ἰησοῦ. ἀσπάζονται ὑμᾶς οἱ σὺν ἐμοὶ ἀδελφοί.
translation:
  text: Greet every saint in Messiah Jesus. The brothers with me greet you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Christ Jesus.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” may in context refer more broadly to fellow believers with Paul,
      including a mixed group.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: The imperative calls for conveying greetings to others. “Greet” is the
    most natural concise English equivalent in epistolary context.
- source_word: πάντα ἅγιον
  chosen: every saint
  alternatives:
  - every holy one
  - each saint
  lexicon: BDAG
  rationale: The singular with πᾶς has distributive force, so “every saint” best represents
    the Greek idiom in natural English while preserving the set-apart identity of
    believers.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστός is functioning as a title here, so the doctrinal default rendering
    “Messiah” is preferred over the traditional “Christ.” The prepositional phrase
    is retained straightforwardly as “in Messiah Jesus.”
- source_word: ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  lexicon: BDAG
  rationale: The present middle is conventionally rendered with simple active English
    in letter closings. “Greet” keeps the sense direct and natural.
- source_word: οἱ σὺν ἐμοὶ ἀδελφοί
  chosen: The brothers with me
  alternatives:
  - The brothers who are with me
  - The brothers and sisters with me
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural. Per the translation philosophy,
    the main text preserves the masculine form as “brothers,” while an inclusive contextual
    alternative is suitable for a footnote if readers may infer a broader group.
