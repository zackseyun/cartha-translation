id: PHP.4.23
reference: Philippians 4:23
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου Ἰησοῦ Χριστοῦ μετὰ ⸂τοῦ πνεύματος⸃ ⸀ὑμῶν.
translation:
  text: The grace of the Lord Jesus the Messiah be with your spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The grace of the Lord Jesus Christ be with your spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - kindness
  lexicon: BDAG
  rationale: Standard Pauline benediction term; 'grace' preserves both theological
    weight and established semantic range better than flatter alternatives.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος and fits both christological
    title usage and common New Testament usage here.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as a translated title rather than a transliterated form in keeping
    with the stated philosophy to translate titles where context supports title force.
    In this benedictory formula, the term still carries titular meaning even though
    it is closely linked with the name Jesus.
- source_word: μετὰ
  chosen: with
  alternatives:
  - among
  lexicon: BDAG
  rationale: With the genitive, μετά naturally expresses accompaniment or presence
    here; 'with' is the clearest English equivalent.
- source_word: πνεύματος
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: Lowercase 'spirit' is preferred because the referent is the Philippians'
    human spirit, not explicitly the Holy Spirit. The singular likely has a collective
    or inward-life sense.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - you all's
  lexicon: BDAG
  rationale: Second-person plural possessive is naturally represented by English 'your';
    the plurality is clear from the addressees even though English does not distinguish
    singular and plural here.
