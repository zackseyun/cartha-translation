theological_decisions:
- issue: Whether Χριστοῦ should be rendered as 'Messiah' or 'Christ' in the title
    'Lord Jesus Christ'
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy prioritizes translating titles rather than
    preserving traditional transliterations when title force remains present. Although
    'Jesus Christ' can function almost as a fixed name in Paul, this instance still
    works naturally as 'Jesus Messiah' without loss of sense.
  doctrine_reference: 'Contested terms table: Χριστός → ''Messiah'' where title; ''Christ''
    where name-like'
