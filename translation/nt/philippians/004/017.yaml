id: PHP.4.17
reference: Philippians 4:17
source:
  edition: SBLGNT
  text: οὐχ ὅτι ἐπιζητῶ τὸ δόμα, ἀλλὰ ἐπιζητῶ τὸν καρπὸν τὸν πλεονάζοντα εἰς λόγον
    ὑμῶν.
translation:
  text: Not that I seek the gift itself, but I seek the fruit that increases to your
    account.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "the fruit that abounds to your credit."'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιζητῶ
  chosen: I seek
  alternatives:
  - I desire
  - I pursue
  lexicon: BDAG
  rationale: The verb conveys active seeking or desiring. 'I seek' is clear, natural
    English and preserves the repeated contrast in the verse.
- source_word: δόμα
  chosen: the gift itself
  alternatives:
  - the gift
  - the offering
  - the present
  lexicon: BDAG
  rationale: δόμα refers to the gift given by the Philippians. 'Gift' is the most
    direct rendering; 'itself' lightly brings out the contrast with what Paul truly
    seeks without adding meaning beyond the Greek contrast.
- source_word: καρπὸν
  chosen: the fruit
  alternatives:
  - the profit
  - the harvest
  - the result
  lexicon: BDAG
  rationale: Paul uses a metaphorical term that can denote result or yield. 'Fruit'
    preserves the metaphor and allows the following financial language to stand in
    tension rather than be flattened into mere 'profit'.
- source_word: πλεονάζοντα
  chosen: that increases
  alternatives:
  - that abounds
  - that multiplies
  - that is increasing
  lexicon: BDAG
  rationale: The participle describes fruit growing or increasing. 'That increases'
    is idiomatic in English and preserves the ongoing sense without sounding awkward.
- source_word: εἰς λόγον ὑμῶν
  chosen: to your account
  alternatives:
  - for your account
  - to your credit
  - for your benefit
  lexicon: BDAG
  rationale: In context Paul uses commercial reckoning language (cf. Phil 4:15). Here
    λόγος is best understood as account or reckoning, so 'to your account' preserves
    the metaphor and the sense of something credited to them.
- source_word: οὐχ ὅτι ... ἀλλὰ
  chosen: Not that ... but
  alternatives:
  - It is not that ... rather
  lexicon: BDAG
  rationale: This construction marks a clarification and contrast. 'Not that ... but'
    is the most natural English equivalent and preserves Paul's rhetorical structure.
