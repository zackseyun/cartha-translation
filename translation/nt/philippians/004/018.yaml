theological_decisions:
- issue: Sacrificial imagery for the Philippians' financial gift
  chosen_reading: 'Retain the offering language as real metaphorical worship: ''a
    fragrant aroma, an acceptable sacrifice, pleasing to God.'''
  alternative_readings:
  - Flatten the imagery into a general statement of gratitude
  - Render more dynamically as 'an offering God gladly accepts'
  rationale: Paul intentionally casts the gift in temple-sacrifice terms. Preserving
    the sequence of aroma, sacrifice, and divine pleasure maintains the theological
    force without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
