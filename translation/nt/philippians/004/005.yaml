id: PHP.4.5
reference: Philippians 4:5
source:
  edition: SBLGNT
  text: τὸ ἐπιεικὲς ὑμῶν γνωσθήτω πᾶσιν ἀνθρώποις. ὁ κύριος ἐγγύς·
translation:
  text: Let your graciousness be known to all people. The Lord is near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “gentleness,” “forbearance,” or “reasonableness.”
    reason: lexical_alternative
  - marker: b
    text: “The Lord is near” may mean that the Lord is present close at hand, that
      his coming is near, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιεικές
  chosen: graciousness
  alternatives:
  - gentleness
  - forbearance
  - reasonableness
  lexicon: BDAG
  rationale: The term denotes more than mild temperament; it carries the sense of
    considerate, yielding, gracious conduct toward others. “Graciousness” preserves
    that broader ethical quality in natural English better than the narrower “gentleness.”
- source_word: γνωσθήτω
  chosen: be known
  alternatives:
  - be evident
  - be recognized
  lexicon: BDAG
  rationale: The aorist passive imperative is well represented by “be known,” which
    is both transparent to the Greek and idiomatic in English.
- source_word: πᾶσιν ἀνθρώποις
  chosen: to all people
  alternatives:
  - to everyone
  - to all men
  lexicon: BDAG
  rationale: This phrase is inclusive in reference, so “all people” best conveys the
    meaning in clear modern English while avoiding an unnecessarily male-specific
    rendering.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project’s default rendering for κύριος and preserves
    the title’s theological weight.
- source_word: ἐγγύς
  chosen: near
  alternatives:
  - close by
  - coming soon
  lexicon: BDAG
  rationale: '“Near” preserves the Greek’s productive ambiguity: the Lord may be understood
    as near in presence, in coming, or both. A more specific rendering would resolve
    tension the text itself leaves open.'
