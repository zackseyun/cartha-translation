theological_decisions:
- issue: Rendering Χριστῷ in the Pauline formula ἐν Χριστῷ Ἰησοῦ
  chosen_reading: in Messiah Jesus
  alternative_readings:
  - in Christ Jesus
  rationale: The project defaults to translating christological titles rather than
    preserving traditional transliterations where context supports meaningful title
    force. In this verse, the phrase denotes believers’ sphere of life and security
    in Jesus as the Messiah, so retaining the translated title best preserves that
    force.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
