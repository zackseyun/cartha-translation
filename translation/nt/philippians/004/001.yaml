theological_decisions:
- issue: Representative scope of ἀδελφοί
  chosen_reading: The main text keeps 'brothers' as a gender-accurate rendering of
    the masculine vocative, with a footnote indicating the congregationally inclusive
    sense.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine requires gender-accurate rendering over gender-neutral paraphrase,
    while allowing annotation where inclusivity is contextually relevant. Philippians
    is addressed to the church as a whole, so the inclusive force should be preserved
    in a footnote rather than moved into the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
