id: PHP.4.1
reference: Philippians 4:1
source:
  edition: SBLGNT
  text: ὥστε, ἀδελφοί μου ἀγαπητοὶ καὶ ἐπιπόθητοι, χαρὰ καὶ στέφανός μου, οὕτως στήκετε
    ἐν κυρίῳ, ἀγαπητοί.
translation:
  text: So then, my beloved and longed-for brothers, my joy and crown, stand firm
    in this way in the Lord, beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Brothers” renders the masculine Greek form; in context Paul is addressing
      fellow believers in the congregation, not males only.
    reason: cultural_note
  - marker: b
    text: Or “victor’s crown”; the Greek term refers to a wreath awarded to a winner.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - Therefore
  - Thus
  lexicon: BDAG
  rationale: Chosen to mark an inferential transition with natural modern English;
    it preserves the forward-moving conclusion of the argument without sounding overly
    formal.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Rendered 'brothers' to reflect the grammatically masculine vocative in
    the Greek, in keeping with the gender-accurate policy. Because the address likely
    includes the whole congregation, inclusivity is preserved in a footnote rather
    than flattened in the main text.
- source_word: ἀγαπητοὶ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: '''Beloved'' preserves both the affectionate tone and the verbal connection
    to Christian love language better than the weaker modern ''dear.'' The repetition
    is retained in both occurrences to mirror Paul''s emphasis.'
- source_word: ἐπιπόθητοι
  chosen: longed-for
  alternatives:
  - greatly missed
  - yearned for
  lexicon: BDAG
  rationale: '''Longed-for'' closely reflects the adjective''s sense of deep yearning
    while remaining readable and compact in English.'
- source_word: χαρὰ
  chosen: joy
  alternatives:
  - delight
  lexicon: BDAG
  rationale: Standard and natural rendering that preserves Paul's statement that the
    Philippians themselves are his joy.
- source_word: στέφανος
  chosen: crown
  alternatives:
  - wreath
  - victor's crown
  lexicon: BDAG
  rationale: '''Crown'' is the most idiomatic English rendering. While the image is
    specifically that of a victor''s wreath rather than a royal diadem, ''crown''
    best balances accuracy and readability; the nuance can be noted in a footnote.'
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Rendered explicitly rather than absorbed into the flow so the adverbial
    force is preserved. It most naturally points to the manner of standing firm in
    light of the preceding exhortation.
- source_word: στήκετε
  chosen: stand firm
  alternatives:
  - stand fast
  - be steadfast
  lexicon: BDAG
  rationale: A clear modern equivalent that preserves the imperative call to steadfast
    perseverance.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  lexicon: BDAG
  rationale: This preserves Paul's common locative/relational phrase without over-interpreting
    it. 'Lord' follows the project's default rendering for κύριος.
