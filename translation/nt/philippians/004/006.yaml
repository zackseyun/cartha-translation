id: PHP.4.6
reference: Philippians 4:6
source:
  edition: SBLGNT
  text: μηδὲν μεριμνᾶτε, ἀλλ’ ἐν παντὶ τῇ προσευχῇ καὶ τῇ δεήσει μετ’ εὐχαριστίας
    τὰ αἰτήματα ὑμῶν γνωριζέσθω πρὸς τὸν θεόν·
translation:
  text: Do not be anxious about anything, but in everything, by prayer and petition
    with thanksgiving, let your requests be made known to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not worry about anything.'
    reason: lexical_alternative
  - marker: b
    text: Or 'supplication' for 'petition.'
    reason: lexical_alternative
  - marker: c
    text: Or 'before God' for 'to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν
  chosen: anything
  alternatives:
  - nothing
  - in no way
  lexicon: BDAG
  rationale: With the prohibition plus verb, this is most naturally conveyed in English
    as 'about anything' rather than the less idiomatic 'nothing.'
- source_word: μεριμνᾶτε
  chosen: be anxious
  alternatives:
  - worry
  - be concerned
  lexicon: BDAG
  rationale: The verb denotes anxious care or worry. 'Be anxious' preserves the prohibition's
    seriousness and matches normal English without sounding colloquial.
- source_word: ἐν παντὶ
  chosen: in everything
  alternatives:
  - in every circumstance
  - in all things
  lexicon: BDAG
  rationale: This keeps the broad comprehensiveness of the phrase while remaining
    natural in modern English.
- source_word: τῇ προσευχῇ
  chosen: prayer
  alternatives:
  - prayerful address
  lexicon: BDAG
  rationale: Standard rendering for προσευχή; broad reference to prayer addressed
    to God.
- source_word: τῇ δεήσει
  chosen: petition
  alternatives:
  - supplication
  - pleading
  lexicon: BDAG
  rationale: δέησις is more specific than προσευχή, indicating specific entreaty.
    'Petition' preserves that distinction in accessible English better than the more
    archaic 'supplication.'
- source_word: μετ’ εὐχαριστίας
  chosen: with thanksgiving
  alternatives:
  - with gratitude
  lexicon: BDAG
  rationale: This is the standard and clearest rendering, preserving the noun form
    and its liturgical/theological weight.
- source_word: τὰ αἰτήματα ὑμῶν
  chosen: your requests
  alternatives:
  - the things you ask for
  - your petitions
  lexicon: BDAG
  rationale: '''Requests'' is the most natural English equivalent for αἰτήματα here
    and avoids redundancy with ''petition'' while preserving the concrete sense of
    what is asked.'
- source_word: γνωριζέσθω
  chosen: let ... be made known
  alternatives:
  - make ... known
  - let ... be known
  lexicon: BDAG
  rationale: The present passive imperative is best reflected by 'let your requests
    be made known,' preserving both the imperative force and passive form in idiomatic
    English.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: '''To God'' is the most direct equivalent for πρὸς here and fits naturally
    with ''made known.'' ''Before God'' is possible but slightly more interpretive.'
