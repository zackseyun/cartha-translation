theological_decisions:
- issue: Interpretation of γνήσιε σύζυγε
  chosen_reading: 'A descriptive address to an unnamed male coworker: "true companion"'
  alternative_readings:
  - A proper name, "Syzygus"
  - A more literal metaphor, "true yokefellow"
  rationale: The adjective γνήσιε naturally fits a descriptive vocative, and taking
    σύζυγε as a common noun best explains the phrase in context. Because the term
    is metaphorical and somewhat debated, alternatives are preserved in a footnote.
