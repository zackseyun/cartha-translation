id: PHP.4.3
reference: Philippians 4:3
source:
  edition: SBLGNT
  text: ναὶ ἐρωτῶ καὶ σέ, ⸂γνήσιε σύζυγε⸃, συλλαμβάνου αὐταῖς, αἵτινες ἐν τῷ εὐαγγελίῳ
    συνήθλησάν μοι μετὰ καὶ Κλήμεντος καὶ τῶν λοιπῶν συνεργῶν μου, ὧν τὰ ὀνόματα ἐν
    βίβλῳ ζωῆς.
translation:
  text: Yes, I ask you also, true companion, help these women, who contended alongside
    me in the gospel, together with Clement and the rest of my fellow workers, whose
    names are in the book of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “true yokefellow”; possibly taken by some as a proper name, “Syzygus.”
    reason: alternative_reading
  - marker: b
    text: Or “strove together with me” or “labored side by side with me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  lexicon: BDAG
  rationale: Retains Paul's affirmative transition and directness at the start of
    the appeal.
- source_word: ἐρωτῶ
  chosen: I ask
  alternatives:
  - I urge
  - I appeal to
  lexicon: BDAG
  rationale: '"Ask" is the plain lexical sense and preserves the personal tone without
    overstating the force.'
- source_word: γνήσιε σύζυγε
  chosen: true companion
  alternatives:
  - true yokefellow
  - genuine partner
  - Syzygus
  lexicon: BDAG
  rationale: Takes σύζυγος as a descriptive vocative rather than a proper name. "Companion"
    communicates partnership naturally in modern English, while the more literal "yokefellow"
    is preserved in a footnote.
- source_word: συλλαμβάνου
  chosen: help
  alternatives:
  - assist
  - take hold together with
  - support
  lexicon: BDAG
  rationale: The imperative calls for active support; "help" is clear, natural, and
    sufficiently strong without overtranslating the metaphor.
- source_word: αὐταῖς
  chosen: these women
  alternatives:
  - them
  lexicon: BDAG
  rationale: The referent in context is Euodia and Syntyche, so "these women" makes
    the feminine plural explicit in English.
- source_word: συνήθλησάν μοι
  chosen: contended alongside me
  alternatives:
  - strove together with me
  - labored side by side with me
  lexicon: BDAG
  rationale: Preserves the athletic συνεργ/contest imagery in συναθλέω better than
    the flatter "worked with me," while remaining readable.
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: in the gospel
  alternatives:
  - for the gospel
  - in the work of the gospel
  lexicon: BDAG
  rationale: Keeps the prepositional phrase close to the Greek and leaves the exact
    nuance broad, preserving Paul's compressed expression.
- source_word: συνεργῶν
  chosen: fellow workers
  alternatives:
  - coworkers
  - fellow laborers
  lexicon: BDAG
  rationale: A familiar Pauline expression; "fellow workers" is transparent and slightly
    more formal than "coworkers."
- source_word: βίβλῳ ζωῆς
  chosen: book of life
  alternatives:
  - scroll of life
  lexicon: BDAG
  rationale: '"Book of life" is the standard and clear English rendering for this
    established biblical expression.'
