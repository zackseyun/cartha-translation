id: PHP.4.8
reference: Philippians 4:8
source:
  edition: SBLGNT
  text: Τὸ λοιπόν, ἀδελφοί, ὅσα ἐστὶν ἀληθῆ, ὅσα σεμνά, ὅσα δίκαια, ὅσα ἁγνά, ὅσα
    προσφιλῆ, ὅσα εὔφημα, εἴ τις ἀρετὴ καὶ εἴ τις ἔπαινος, ταῦτα λογίζεσθε·
translation:
  text: Finally, brothers, whatever is true, whatever is honorable, whatever is just,
    whatever is pure, whatever is lovely, whatever is commendable—if there is any
    virtue and if there is any praise—think about these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address the whole believing
      community.
    reason: cultural_note
lexical_decisions:
- source_word: Τὸ λοιπόν
  chosen: Finally
  alternatives:
  - As for the rest
  - For the rest
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing a concluding exhortation; 'Finally'
    is natural modern English while preserving the transitional force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Rendered gender-accurately per doctrine. The Greek form is masculine
    plural and often representational in Pauline address; the main text keeps 'brothers,'
    with inclusivity relevant as a footnote matter rather than neutralizing the form.
- source_word: ὅσα
  chosen: whatever
  alternatives:
  - whatever things
  - all that
  lexicon: BDAG
  rationale: The repeated neuter plural relative naturally functions distributively
    in English as 'whatever,' preserving the catalog style without wooden repetition
    like 'whatever things.'
- source_word: ἀληθῆ
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: '''True'' best fits the broad moral-cognitive category in this virtue
    list.'
- source_word: σεμνά
  chosen: honorable
  alternatives:
  - noble
  - worthy of respect
  - dignified
  lexicon: BDAG
  rationale: Conveys moral weight and respectability in contemporary English without
    sounding overly formal or narrow.
- source_word: δίκαια
  chosen: just
  alternatives:
  - right
  - righteous
  lexicon: BDAG
  rationale: In this ethical list, 'just' cleanly communicates what is upright and
    fair. 'Righteous' is possible but sounds more overtly theological than the immediate
    context requires.
- source_word: ἁγνά
  chosen: pure
  alternatives:
  - clean
  - chaste
  lexicon: BDAG
  rationale: '''Pure'' is the standard concise rendering and preserves both moral
    and inward connotations.'
- source_word: προσφιλῆ
  chosen: lovely
  alternatives:
  - pleasing
  - lovable
  lexicon: BDAG
  rationale: '''Lovely'' is the established and still intelligible rendering here,
    expressing what calls forth love or affection.'
- source_word: εὔφημα
  chosen: commendable
  alternatives:
  - admirable
  - worthy of praise
  - of good repute
  lexicon: BDAG
  rationale: Chosen for clarity and readability; it captures what is spoken of favorably
    or regarded well.
- source_word: εἴ τις ἀρετὴ
  chosen: if there is any virtue
  alternatives:
  - if anything is excellent
  - if there is any moral excellence
  lexicon: BDAG
  rationale: ἀρετή denotes excellence or virtue. 'Virtue' preserves the compact noun
    form and matches the summative force of the clause.
- source_word: ἔπαινος
  chosen: praise
  alternatives:
  - approval
  - commendation
  lexicon: BDAG
  rationale: '''Praise'' is the most direct equivalent and fits the parallel structure
    with ἀρετή.'
- source_word: ταῦτα λογίζεσθε
  chosen: think about these things
  alternatives:
  - consider these things
  - dwell on these things
  - give thought to these things
  lexicon: BDAG
  rationale: λογίζομαι here calls for deliberate mental focus or consideration. 'Think
    about these things' is clear, natural, and suitably imperative without sounding
    stiff.
