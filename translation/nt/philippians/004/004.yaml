theological_decisions:
- issue: Meaning of 'in the Lord'
  chosen_reading: 'A sphere/relationship reading: believers are commanded to rejoice
    in relation to and union with the Lord, not merely to rejoice about him.'
  alternative_readings:
  - 'Instrumental nuance: rejoice by the Lord''s enablement'
  - 'Causal nuance: rejoice because of the Lord'
  rationale: The phrase ἐν κυρίῳ in Paul commonly marks sphere or relational location.
    The English 'in the Lord' preserves that theological breadth without over-interpreting.
  doctrine_reference: Preserve theological tension rather than resolve it.
