id: PHP.4.4
reference: Philippians 4:4
source:
  edition: SBLGNT
  text: Χαίρετε ἐν κυρίῳ πάντοτε· πάλιν ἐρῶ, χαίρετε.
translation:
  text: Rejoice in the Lord always; again I will say, rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be glad in the Lord always.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'again I will say, rejoice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χαίρετε
  chosen: Rejoice
  alternatives:
  - Be glad
  - Rejoice yourselves
  lexicon: BDAG
  rationale: Present active imperative, second person plural. 'Rejoice' best preserves
    the imperatival force and the semantic range of χαίρω in Pauline exhortation without
    sounding colloquial.
- source_word: ἐν
  chosen: in
  alternatives:
  - because of
  - within the sphere of
  lexicon: BDAG
  rationale: 'The preposition most naturally expresses sphere or relationship here:
    rejoicing in union with or in relation to the Lord. ''In'' is both natural and
    sufficiently transparent.'
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' Here it refers to Christ in Pauline usage, so 'the Lord' is the appropriate
    rendering.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: '''Always'' is the most natural modern English equivalent and cleanly
    conveys the adverb''s continual force.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν introduces emphatic repetition. 'Again' is concise and idiomatic
    in English.
- source_word: ἐρῶ
  chosen: I will say
  alternatives:
  - I say
  - I will repeat
  lexicon: BDAG
  rationale: Future active indicative of λέγω. The future should be preserved rather
    than flattened to a present; 'I will say' reflects the Greek form while remaining
    idiomatic.
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: The repeated imperative should be rendered consistently with the first
    occurrence to preserve Paul's rhetorical emphasis.
