theological_decisions:
- issue: Meaning of 'saints' in Pauline usage
  chosen_reading: A designation for believers/holy ones, rendered lexically as 'saints'
    rather than paraphrased.
  alternative_readings:
  - God’s people
  - believers
  rationale: The term is not restricted here to an elite class of exceptionally holy
    Christians; it denotes the Christian community. Retaining 'saints' preserves Paul’s
    wording while leaving theology to be inferred from usage rather than imported
    by paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
