id: PHP.4.22
reference: Philippians 4:22
source:
  edition: SBLGNT
  text: ἀσπάζονται ὑμᾶς πάντες οἱ ἅγιοι, μάλιστα δὲ οἱ ἐκ τῆς Καίσαρος οἰκίας.
translation:
  text: All the saints greet you, especially those of Caesar’s household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those from Caesar’s household.” The phrase refers to persons associated
      with the imperial household, not necessarily Caesar’s family members.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  - greet warmly
  lexicon: BDAG
  rationale: A standard epistolary greeting verb. 'Greet' is natural modern English
    and preserves the direct interpersonal sense without unnecessary expansion.
- source_word: πάντες οἱ ἅγιοι
  chosen: All the saints
  alternatives:
  - All the holy ones
  - All God’s people
  lexicon: BDAG
  rationale: ἅγιοι is the common Pauline designation for believers. 'Saints' preserves
    the established lexical and theological sense more precisely than the broader
    paraphrase 'God’s people.'
- source_word: μάλιστα δὲ
  chosen: especially
  alternatives:
  - and especially
  - particularly
  lexicon: BDAG
  rationale: The phrase marks special emphasis within the larger group. 'Especially'
    captures the prominence cleanly in English; the connective δέ is absorbed idiomatically.
- source_word: οἱ ἐκ τῆς Καίσαρος οἰκίας
  chosen: those of Caesar’s household
  alternatives:
  - those from Caesar’s household
  - those belonging to Caesar’s household
  lexicon: BDAG
  rationale: ἐκ here identifies those associated with or belonging to the imperial
    household. 'Those of Caesar’s household' is idiomatic and sufficiently precise
    without overstating whether they were blood relatives, slaves, freedpersons, or
    officials.
- source_word: Καίσαρος
  chosen: Caesar’s
  alternatives:
  - the emperor’s
  lexicon: BDAG
  rationale: The Greek uses the proper imperial title/name Καίσαρ. 'Caesar' preserves
    the historical specificity better than the interpretive substitute 'the emperor.'
