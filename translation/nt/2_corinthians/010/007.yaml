  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Χριστός functions as a title here rather than a fixed name, and project
    policy prefers 'Messiah' where context supports title sense. The verse concerns
    belonging to the anointed one, not merely use of a proper name.
