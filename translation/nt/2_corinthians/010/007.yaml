id: 2CO.10.7
reference: 2 Corinthians 10:7
source:
  edition: SBLGNT
  text: Τὰ κατὰ πρόσωπον βλέπετε. εἴ τις πέποιθεν ἑαυτῷ Χριστοῦ εἶναι, τοῦτο λογιζέσθω
    πάλιν ⸀ἐφ’ ἑαυτοῦ ὅτι καθὼς αὐτὸς Χριστοῦ οὕτως καὶ ⸀ἡμεῖς.
translation:
  text: 'You are looking at outward appearances. If anyone is confident in himself
    that he belongs to the Messiah, let him consider this again within himself: that
    just as he belongs to the Messiah, so also do we.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You look at things according to appearance' or possibly
      'Look at what is before your face.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'is Christ's'; rendered 'belongs to the Messiah' to express the sense
      of allegiance/belonging and to translate Χριστός as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: Τὰ κατὰ πρόσωπον
  chosen: outward appearances
  alternatives:
  - what is before your face
  - surface things
  - things according to appearance
  lexicon: BDAG
  rationale: The idiom κατὰ πρόσωπον here refers to what is external or on the surface.
    'Outward appearances' communicates the idiomatic sense in natural English better
    than a more wooden rendering.
- source_word: βλέπετε
  chosen: You are looking at
  alternatives:
  - Look at
  - Do you look at
  - You see
  lexicon: BDAG
  rationale: 'The present indicative plural can be taken as either indicative or imperative
    in form, but the context of rebuke favors an indicative statement: Paul is accusing
    them of evaluating by appearances, not commanding them to do so.'
- source_word: πέποιθεν
  chosen: is confident
  alternatives:
  - has confidence
  - is persuaded
  lexicon: BDAG
  rationale: Perfect active of πείθω in this intransitive sense denotes settled confidence.
    'Is confident' is idiomatic and reflects the ongoing state resulting from that
    confidence.
- source_word: ἑαυτῷ
  chosen: in himself
  alternatives:
  - about himself
  - to himself
  lexicon: BDAG
  rationale: The dative with πέποιθεν expresses the sphere/object of confidence. 'In
    himself' best captures self-assurance here.
- source_word: Χριστοῦ εἶναι
  chosen: belongs to the Messiah
  alternatives:
  - is Christ's
  - belongs to Christ
  lexicon: BDAG
  rationale: The genitive with εἶναι expresses belonging or allegiance. Following
    project guidance, Χριστοῦ as a title is rendered 'the Messiah' rather than 'Christ.'
    'Belongs to' makes the relation explicit in clear English.
- source_word: λογιζέσθω
  chosen: let him consider
  alternatives:
  - let him reckon
  - let him take into account
  - let him think
  lexicon: BDAG
  rationale: The imperative calls for reflective reassessment. 'Consider' is natural
    modern English and preserves the deliberative force.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: Paul calls for renewed reflection; 'again' is the straightforward rendering.
- source_word: ἐφ’ ἑαυτοῦ
  chosen: within himself
  alternatives:
  - for himself
  - about himself
  - on his own
  lexicon: BDAG
  rationale: The phrase most naturally means inwardly or in his own mind in this context.
    'Within himself' fits the introspective force better than 'for himself,' which
    could suggest independence rather than self-examination.
- source_word: καθὼς αὐτὸς Χριστοῦ οὕτως καὶ ἡμεῖς
  chosen: just as he belongs to the Messiah, so also do we
  alternatives:
  - just as he is Messiah's, so also are we
  - as he belongs to Christ, so also we
  lexicon: BDAG
  rationale: This comparative clause asserts equal belonging to the Messiah between
    Paul's opponents and Paul. Supplying 'belongs to' in the second half makes the
    ellipsis explicit in English.
