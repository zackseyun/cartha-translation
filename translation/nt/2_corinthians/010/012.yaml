id: 2CO.10.12
reference: 2 Corinthians 10:12
source:
  edition: SBLGNT
  text: Οὐ γὰρ τολμῶμεν ἐγκρῖναι ἢ συγκρῖναι ἑαυτούς τισιν τῶν ἑαυτοὺς συνιστανόντων·
    ἀλλὰ αὐτοὶ ἐν ἑαυτοῖς ἑαυτοὺς μετροῦντες καὶ συγκρίνοντες ἑαυτοὺς ἑαυτοῖς οὐ συνιᾶσιν.
translation:
  text: For we do not dare to classify or compare ourselves with some of those who
    commend themselves. But when they measure themselves by themselves and compare
    themselves with themselves, they do not understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'include ourselves among' or 'rank ourselves with'; the Greek verb carries
      the idea of placing oneself in the same category as others.
    reason: lexical_alternative
  - marker: b
    text: Literally 'measuring themselves in themselves and comparing themselves with
      themselves.' The sense is that they use themselves as their own standard.
    reason: lexical_alternative
lexical_decisions:
- source_word: τολμῶμεν
  chosen: we do not dare
  alternatives:
  - we are not bold enough
  - we do not presume
  lexicon: BDAG
  rationale: τολμάω here expresses reluctance or refusal to presume to act in a certain
    way. 'Do not dare' is idiomatic and preserves Paul's ironic tone.
- source_word: ἐγκρῖναι
  chosen: to classify
  alternatives:
  - to rank
  - to include
  - to judge as belonging
  lexicon: BDAG
  rationale: ἐγκρίνω in this context is not simple moral judgment but placing oneself
    in the same class or category as others. 'Classify' best captures the comparative
    social sense alongside συγκρῖναι.
- source_word: συγκρῖναι / συγκρίνοντες
  chosen: compare / compare
  alternatives:
  - match
  - liken
  lexicon: BDAG
  rationale: The verb naturally means to compare. Using the same English gloss in
    both occurrences preserves the rhetorical repetition.
- source_word: ἑαυτούς τισιν τῶν ἑαυτοὺς συνιστανόντων
  chosen: ourselves with some of those who commend themselves
  alternatives:
  - ourselves among some of those who recommend themselves
  - ourselves to some of those who present themselves favorably
  lexicon: BDAG
  rationale: συνιστάνω here means to commend or recommend. The reflexive construction
    indicates self-commendation, a key theme in this section.
- source_word: ἀλλὰ αὐτοὶ
  chosen: But when they
  alternatives:
  - But they themselves
  - But as for them
  lexicon: BDAG
  rationale: αὐτοὶ is emphatic, contrasting Paul's group with the self-commending
    opponents. Rendering the emphasis with 'they' after an adversative keeps the sentence
    natural in English; the contrast is preserved by 'But' and the shift in subject.
- source_word: ἐν ἑαυτοῖς
  chosen: by themselves
  alternatives:
  - among themselves
  - within themselves
  lexicon: BDAG
  rationale: The phrase is idiomatic and contextually refers to using themselves as
    the standard. 'By themselves' fits the following reflexive repetitions and the
    logic of self-referential measurement.
- source_word: μετροῦντες
  chosen: measure
  alternatives:
  - evaluate
  - gauge
  lexicon: BDAG
  rationale: μετρέω is literally 'measure.' Here it is metaphorical for evaluating
    by a standard. 'Measure' preserves the metaphor and rhetorical force.
- source_word: ἑαυτοὺς ἑαυτοῖς
  chosen: themselves by themselves
  alternatives:
  - themselves with themselves
  - themselves against themselves
  lexicon: BDAG
  rationale: The repeated reflexives are central to Paul's critique of self-referential
    boasting. 'By themselves' communicates that they use themselves as their own standard.
- source_word: οὐ συνιᾶσιν
  chosen: they do not understand
  alternatives:
  - they have no insight
  - they are without understanding
  lexicon: BDAG
  rationale: 'συνίημι means to understand or comprehend. The object is implicit: they
    fail to grasp the folly of their self-referential comparisons. ''Do not understand''
    is clear and natural.'
