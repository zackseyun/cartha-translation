id: 2CO.10.16
reference: 2 Corinthians 10:16
source:
  edition: SBLGNT
  text: εἰς τὰ ὑπερέκεινα ὑμῶν εὐαγγελίσασθαι, οὐκ ἐν ἀλλοτρίῳ κανόνι εἰς τὰ ἕτοιμα
    καυχήσασθαι.
translation:
  text: to proclaim the good news in the regions beyond you, not to boast in another
    man’s sphere about work already prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to preach the gospel in the lands beyond you.'
    reason: lexical_alternative
  - marker: b
    text: '''Sphere'' translates Greek κανών here in the sense of an assigned field
      or area of ministry, not a moral ''rule'' or later ''canon.'''
    reason: cultural_note
  - marker: c
    text: Or 'not to boast in another's field about what is already done/ready.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερέκεινα
  chosen: the regions beyond
  alternatives:
  - beyond
  - the lands beyond
  - the places beyond
  lexicon: BDAG
  rationale: The term denotes areas lying beyond a given point. With the article τὰ,
    an idiomatic English plural such as 'the regions beyond' best conveys geographic
    extension without awkward literalism.
- source_word: ὑμῶν
  chosen: you
  alternatives:
  - your region
  - your area
  lexicon: BDAG
  rationale: 'The genitive depends on ὑπερέκεινα and indicates location relative to
    the Corinthians: regions beyond them. English ''beyond you'' preserves the relational
    sense more directly than supplying ''region,'' which is interpretive.'
- source_word: εὐαγγελίσασθαι
  chosen: to proclaim the good news
  alternatives:
  - to preach the gospel
  - to evangelize
  lexicon: BDAG
  rationale: This infinitive expresses Paul's missionary aim. 'Proclaim the good news'
    is clear modern English and preserves the verbal force without relying on ecclesiastical
    jargon; 'preach the gospel' is possible but slightly more traditionalized.
- source_word: ἀλλοτρίῳ
  chosen: another man's
  alternatives:
  - another's
  - belonging to another
  lexicon: BDAG
  rationale: The adjective means belonging to another. Because κανών here refers to
    another person's assigned sphere or field, 'another man's' makes the personal
    contrast explicit in natural English, though 'another's' is also possible.
- source_word: κανόνι
  chosen: sphere
  alternatives:
  - measure
  - rule
  - field
  - area of ministry
  lexicon: BDAG
  rationale: In this context κανών refers metaphorically to an assigned sphere, field,
    or limit of ministry, not a normative rule. 'Sphere' is concise and fits the immediate
    context of apostolic territory in vv. 13–15.
- source_word: ἕτοιμα
  chosen: already prepared
  alternatives:
  - what is ready
  - things made ready
  - ready-made work
  lexicon: BDAG
  rationale: The adjective functions substantivally for things already in readiness.
    In context it refers to work already accomplished or prepared by others. 'Already
    prepared' communicates that sense naturally.
- source_word: καυχήσασθαι
  chosen: to boast
  alternatives:
  - to take pride
  - to glory
  lexicon: BDAG
  rationale: Paul uses his recurring term for boasting. 'Boast' preserves the lexical
    link with the surrounding passage and avoids softening the rhetoric.
- source_word: ἐν ἀλλοτρίῳ κανόνι εἰς τὰ ἕτοιμα
  chosen: in another man's sphere about work already prepared
  alternatives:
  - within another's field in regard to things already done
  - in another's sphere over what is already ready
  lexicon: BDAG
  rationale: The phrase is compressed and somewhat elliptical in Greek. This rendering
    makes explicit that Paul rejects boasting with reference to work already prepared
    within another person's assigned field, while staying close to the syntax.
