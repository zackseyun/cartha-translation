theological_decisions:
- issue: Meaning of κανών in Paul's ministry context
  chosen_reading: assigned sphere of ministry rather than moral rule or scriptural
    canon
  alternative_readings:
  - rule
  - standard
  - canon
  rationale: The immediate context (2 Cor 10:13–15) speaks of measured limits and
    assigned areas of labor. Rendering κανών as 'sphere' preserves Paul's point about
    apostolic boundaries rather than importing later ecclesiastical meanings of 'canon.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Reference of τὰ ἕτοιμα
  chosen_reading: work already prepared/accomplished by others
  alternative_readings:
  - things ready in a general sense
  rationale: Paul contrasts his own intended mission beyond Corinth with boasting
    in another's field. The phrase most naturally refers to ministry results already
    made ready by someone else, not merely abstract 'ready things.'
  doctrine_reference: Translation philosophy §1, §3
