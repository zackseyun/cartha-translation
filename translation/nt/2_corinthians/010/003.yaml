id: 2CO.10.3
reference: 2 Corinthians 10:3
source:
  edition: SBLGNT
  text: ἐν σαρκὶ γὰρ περιπατοῦντες οὐ κατὰ σάρκα στρατευόμεθα—
translation:
  text: For though we walk in the flesh, we do not wage war according to the flesh—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For though we live in the body, we do not wage war by merely human standards.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the body
  - in human weakness
  - in the realm of the flesh
  lexicon: BDAG
  rationale: The prepositional phrase is best kept fairly literal here. In this context
    Paul contrasts ordinary embodied human existence with fleshly methods of warfare.
    Because σάρξ is not clearly the Pauline ethical sense 'sinful nature' here, 'in
    the flesh' preserves the contrast without overinterpreting.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the preceding statement, and 'For'
    preserves the argumentative flow in a natural English way.
- source_word: περιπατοῦντες
  chosen: though we walk
  alternatives:
  - while we walk
  - as we live
  - though we live
  lexicon: BDAG
  rationale: Literally 'walking,' but in Pauline usage often refers to manner of life.
    Here 'walk' preserves the metaphor and is still readable. Rendering the participle
    concessively with 'though' fits the sense of contrast with the following clause.
- source_word: οὐ κατὰ σάρκα
  chosen: not according to the flesh
  alternatives:
  - not by fleshly standards
  - not in a fleshly way
  - not according to human standards
  lexicon: BDAG
  rationale: 'κατὰ with σάρκα expresses norm or standard. ''According to the flesh''
    preserves the repeated σάρξ language and leaves the precise nuance open: merely
    human, worldly, or fleshly. This is preferable to collapsing it into one interpretive
    option in the main text.'
- source_word: στρατευόμεθα
  chosen: we do not wage war
  alternatives:
  - we do not make war
  - we are not campaigning
  - we do not serve as soldiers
  lexicon: BDAG
  rationale: In context Paul is using military imagery for apostolic conflict and
    argumentation. 'Wage war' is idiomatic English and captures the active metaphor
    better than a more wooden 'serve as soldiers.'
