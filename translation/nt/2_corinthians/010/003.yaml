theological_decisions:
- issue: Rendering of σάρξ in both occurrences
  chosen_reading: Translate both occurrences with 'flesh' in the main text rather
    than 'sinful nature' or 'human standards.'
  alternative_readings:
  - in the body ... not by human standards
  - in human weakness ... not in a worldly way
  - in the flesh ... not in a fleshly way
  rationale: 'DOCTRINE.md lists σάρξ with context-dependent renderings: ''flesh''
    when literal, ''sinful nature'' when metaphorical. Here Paul''s first use refers
    to embodied human existence, and the second refers to conduct governed by merely
    human/fleshly principles. Using ''flesh'' in both places preserves Paul''s rhetorical
    repetition and theological tension without importing a narrower doctrinal interpretation.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ; Translation philosophy
    §3, §5'
