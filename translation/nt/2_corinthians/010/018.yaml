theological_decisions:
- issue: Referent of 'the Lord' (ὁ κύριος)
  chosen_reading: Rendered simply as 'the Lord' without specifying further in the
    main text.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: In Pauline context, 'the Lord' commonly refers to Jesus, but the verse
    itself uses only κύριος. The translation preserves the text's wording without
    importing a more specific identification into the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
