id: 2CO.10.18
reference: 2 Corinthians 10:18
source:
  edition: SBLGNT
  text: οὐ γὰρ ὁ ἑαυτὸν ⸀συνιστάνων, ἐκεῖνός ἐστιν δόκιμος, ἀλλὰ ὃν ὁ κύριος συνίστησιν.
translation:
  text: For it is not the one who commends himself who is approved, but the one whom
    the Lord commends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recommends himself' ... 'the one whom the Lord recommends.' The same
      Greek verb is used in both places.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιστάνων
  chosen: commends
  alternatives:
  - recommends
  - presents
  - establishes
  lexicon: BDAG
  rationale: In this context of boasting and evaluation, συνίστημι refers to presenting
    or commending oneself for approval. 'Commends' is idiomatic in English and matches
    the repeated verb later in the verse.
- source_word: δόκιμος
  chosen: approved
  alternatives:
  - acceptable
  - proven
  - genuine
  lexicon: BDAG
  rationale: δόκιμος denotes one who stands approved after testing or evaluation.
    'Approved' fits the contrast with self-commendation versus the Lord's commendation
    and is clearer here than 'proven' or 'acceptable'.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In Pauline usage
    here it most naturally refers to the Lord Jesus, but the English title should
    remain the standard translated form.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: The participial construction is grammatically masculine singular and
    refers to a representative individual in context. 'Himself' preserves the Greek
    form and aligns with the gender-accurate policy.
- source_word: ὃν
  chosen: the one whom
  alternatives:
  - whom
  lexicon: BDAG
  rationale: 'Supplying ''the one'' makes the Greek contrast explicit and natural
    in English: not the self-commending person, but the person commended by the Lord.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ links this verse as an explanation of the preceding argument. 'For'
    preserves that explanatory force in a concise way.
