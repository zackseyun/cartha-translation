theological_decisions:
- issue: Reported criticism of Paul should not be translated as narrator endorsement
  chosen_reading: 'The verse is rendered as the words of Paul''s critics: ''For they
    say...'''
  alternative_readings:
  - For he says...
  - For it is said...
  rationale: The Greek presents a reported accusation, not an inspired evaluation
    of Paul's actual weakness or worth. Rendering φησίν as a report formula preserves
    the rhetorical setting and avoids implying endorsement of the criticism.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
