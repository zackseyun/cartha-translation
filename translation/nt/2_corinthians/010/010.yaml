id: 2CO.10.10
reference: 2 Corinthians 10:10
source:
  edition: SBLGNT
  text: ὅτι Αἱ ⸂ἐπιστολαὶ μέν⸃, φησίν, βαρεῖαι καὶ ἰσχυραί, ἡ δὲ παρουσία τοῦ σώματος
    ἀσθενὴς καὶ ὁ λόγος ἐξουθενημένος.
translation:
  text: For they say, “His letters are weighty and strong, but his bodily presence
    is weak, and his speech is despised.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he says, “The letters are weighty and strong...”' The Greek has
      singular φησίν ('he says'), which can function as a parenthetical citation formula;
      the sense here is the reported opinion of Paul's critics.
    reason: lexical_alternative
  - marker: b
    text: Or 'his speech is contemptible' or 'of no account.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In this context ὅτι introduces the content/reason for the preceding claim,
    and idiomatic English is best served by 'For they say,' rather than a more wooden
    'because' or 'that.'
- source_word: ἐπιστολαὶ
  chosen: letters
  alternatives:
  - epistles
  lexicon: BDAG
  rationale: The ordinary sense is written correspondence. 'Letters' is natural modern
    English and avoids ecclesiastical register not required by the text.
- source_word: μέν ... δὲ
  chosen: are ... but
  alternatives:
  - on the one hand ... on the other hand
  lexicon: BDAG
  rationale: The pair marks contrast. English expresses this naturally with 'are ...
    but' without forcing a wooden correlative structure.
- source_word: φησίν
  chosen: they say
  alternatives:
  - he says
  - it is said
  lexicon: BDAG
  rationale: Although formally singular ('he says'), φησίν can function parenthetically
    as an impersonal or representative citation formula. Given the broader context
    of Paul's opponents and common English idiom, 'they say' best conveys the sense
    of reported criticism.
- source_word: βαρεῖαι
  chosen: weighty
  alternatives:
  - heavy
  - severe
  - impressive
  lexicon: BDAG
  rationale: '''Weighty'' preserves the metaphor of heaviness while fitting rhetorical
    force in context; it suggests seriousness and impact without overinterpreting.'
- source_word: ἰσχυραί
  chosen: strong
  alternatives:
  - powerful
  - forceful
  lexicon: BDAG
  rationale: '''Strong'' is the most direct equivalent and pairs well with ''weighty.''
    ''Forceful'' is possible but slightly more interpretive.'
- source_word: παρουσία
  chosen: presence
  alternatives:
  - coming
  - personal presence
  lexicon: BDAG
  rationale: Here the contrast is between Paul's letters and his in-person appearance,
    so 'presence' is the plain contextual sense.
- source_word: τοῦ σώματος
  chosen: bodily
  alternatives:
  - of the body
  - physical
  lexicon: BDAG
  rationale: The genitive qualifies παρουσία. 'Bodily presence' is idiomatic English
    and preserves the reference to physical appearance rather than merely abstract
    presence.
- source_word: ἀσθενὴς
  chosen: weak
  alternatives:
  - feeble
  - unimpressive
  lexicon: BDAG
  rationale: '''Weak'' is the straightforward lexical equivalent and leaves the nature
    of the weakness as the critics state it, without interpretive expansion.'
- source_word: λόγος
  chosen: speech
  alternatives:
  - word
  - speaking
  - message
  lexicon: BDAG
  rationale: In contrast to letters and bodily presence, λόγος here refers to Paul's
    oral expression or manner of speaking. 'Speech' best fits the immediate context.
- source_word: ἐξουθενημένος
  chosen: despised
  alternatives:
  - contemptible
  - looked down on
  - of no account
  lexicon: BDAG
  rationale: The participle denotes being treated as nothing or held in contempt.
    'Despised' is concise and natural; 'contemptible' is possible but can imply intrinsic
    worthlessness rather than others' evaluation.
