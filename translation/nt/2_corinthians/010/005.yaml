theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, not merely a proper-name element.
    Following the project's doctrine, the title is translated to preserve meaning
    in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms table: Χριστός → Messiah (where title; Christ where name-like).'
- issue: Nature of the opposition in πᾶν ὕψωμα ἐπαιρόμενον
  chosen_reading: A general exalted obstacle opposed to God's knowledge
  alternative_readings:
  - every pretension that sets itself up against the knowledge of God
  rationale: The Greek metaphor is broad and should not be reduced only to arrogant
    claims or arguments. The chosen rendering preserves the elevated-obstacle imagery
    and theological tension without over-specifying the referent.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
