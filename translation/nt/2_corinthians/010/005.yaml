id: 2CO.10.5
reference: 2 Corinthians 10:5
source:
  edition: SBLGNT
  text: καὶ πᾶν ὕψωμα ἐπαιρόμενον κατὰ τῆς γνώσεως τοῦ θεοῦ, καὶ αἰχμαλωτίζοντες πᾶν
    νόημα εἰς τὴν ὑπακοὴν τοῦ Χριστοῦ,
translation:
  text: and every lofty thing raised up against the knowledge of God, and taking every
    thought captive into obedience to the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every high thing' or 'every pretension' for 'every lofty thing.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Messiah'; traditionally 'Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶν ὕψωμα
  chosen: every lofty thing
  alternatives:
  - every high thing
  - every pretension
  - every proud obstacle
  lexicon: BDAG
  rationale: ὕψωμα literally denotes something elevated or exalted. In this metaphorical
    context of spiritual/intellectual opposition, 'lofty thing' preserves the image
    of something exalted without over-interpreting it as merely psychological ('pretension').
    'Every' reflects πᾶν distributively.
- source_word: ἐπαιρόμενον
  chosen: raised up
  alternatives:
  - exalting itself
  - lifted up
  lexicon: BDAG
  rationale: The participle conveys being lifted up or exalted. 'Raised up' keeps
    the passive/resultative sense and fits the imagery of an elevated obstacle. 'Exalting
    itself' is possible as a more reflexive interpretive rendering, but the Greek
    form here does not require that nuance.
- source_word: κατὰ τῆς γνώσεως τοῦ θεοῦ
  chosen: against the knowledge of God
  alternatives:
  - against knowing God
  lexicon: BDAG
  rationale: γνῶσις is best rendered 'knowledge' here, referring to true knowledge
    about/of God. The genitive τοῦ θεοῦ is naturally objective or relational; 'of
    God' preserves the Greek compactness without narrowing the nuance.
- source_word: αἰχμαλωτίζοντες
  chosen: taking captive
  alternatives:
  - capturing
  - leading captive
  lexicon: BDAG
  rationale: The verb means to take as a prisoner of war. 'Taking captive' is idiomatic,
    vivid, and preserves the military metaphor that governs the surrounding context.
- source_word: πᾶν νόημα
  chosen: every thought
  alternatives:
  - every mind
  - every design
  - every scheme
  lexicon: BDAG
  rationale: νόημα can denote thought, purpose, or mind-set. 'Every thought' is the
    most natural English rendering here and fits the singular distributive force of
    πᾶν. Broader options like 'scheme' are too negative and contextually narrowed.
- source_word: εἰς τὴν ὑπακοὴν
  chosen: into obedience
  alternatives:
  - for obedience
  - to obedience
  lexicon: BDAG
  rationale: εἰς marks movement toward a resulting state. 'Into obedience' preserves
    the directional force more clearly than the traditional but flatter 'to obedience.'
- source_word: τοῦ Χριστοῦ
  chosen: to the Messiah
  alternatives:
  - to Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the phrase denotes obedience directed
    toward Jesus in his messianic office, so 'Messiah' best preserves the title's
    meaning.
