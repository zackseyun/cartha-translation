theological_decisions:
- issue: Rendering of σάρξ in κατὰ σάρκα
  chosen_reading: according to the flesh
  alternative_readings:
  - according to human standards
  - according to the sinful nature
  rationale: DOCTRINE.md specifies σάρξ as 'flesh' when literal and 'sinful nature'
    when metaphorical, with context-dependent documentation. Here the opponents accuse
    Paul of conducting himself on merely worldly or fleshly terms, but the phrase
    is broad enough that translating it interpretively as 'sinful nature' would overstate
    the claim. 'According to the flesh' preserves Pauline theological texture and
    ambiguity, while a more interpretive alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
