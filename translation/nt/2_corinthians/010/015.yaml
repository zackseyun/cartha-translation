theological_decisions:
- issue: Meaning of μεγαλυνθῆναι in relation to apostolic authority
  chosen_reading: Paul speaks of the enlargement or expansion of his apostolic sphere/work
    among and beyond the Corinthians, not personal self-glorification.
  alternative_readings:
  - Paul speaks of being honored more highly by the Corinthians
  - Paul speaks of his reputation being magnified
  rationale: The immediate context centers on measured apostolic fields and not boasting
    in another's labor (vv. 13–16). Therefore the enlargement is best understood as
    ministry expansion within the sphere God assigned.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sense of κανών
  chosen_reading: '''sphere of ministry'' rather than a literal ''rule'' or later
    theological ''canon'''
  alternative_readings:
  - rule
  - standard
  - assigned measure
  rationale: In this context κανών denotes a measured area or sphere assigned by God
    for apostolic labor. Rendering it dynamically here avoids anachronistic misunderstanding
    while preserving Paul's argument.
  doctrine_reference: Translation philosophy §1, §6
