id: 2CO.10.15
reference: 2 Corinthians 10:15
source:
  edition: SBLGNT
  text: οὐκ εἰς τὰ ἄμετρα καυχώμενοι ἐν ἀλλοτρίοις κόποις, ἐλπίδα δὲ ἔχοντες αὐξανομένης
    τῆς πίστεως ὑμῶν ἐν ὑμῖν μεγαλυνθῆναι κατὰ τὸν κανόνα ἡμῶν εἰς περισσείαν,
translation:
  text: not boasting beyond measure in the labors of others, but having hope that,
    as your faith is growing among you, we will be enlarged according to our sphere
    of ministry, unto abundance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to our assigned measure' or 'according to our rule'; Greek
      κανών here refers to a measured sphere or field of ministry.
    reason: lexical_alternative
  - marker: b
    text: Or 'we may be magnified' or 'we may be greatly enlarged'; the sense in context
      is the expansion of Paul's apostolic work, not mere personal praise.
    reason: alternative_reading
  - marker: c
    text: Or 'to a greater extent' or 'for further expansion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ εἰς τὰ ἄμετρα
  chosen: not boasting beyond measure
  alternatives:
  - not boasting beyond limits
  - not boasting into things beyond measure
  lexicon: BDAG
  rationale: The phrase modifies Paul's boasting and idiomatically means not extending
    boasting beyond proper bounds. 'Beyond measure' preserves the metaphor of measure/limit
    without awkward literalism.
- source_word: καυχώμενοι
  chosen: boasting
  alternatives:
  - taking pride
  - boasting of ourselves
  lexicon: BDAG
  rationale: Paul regularly uses καυχάομαι in the sense of boasting, sometimes positively
    and sometimes negatively. 'Boasting' keeps the lexical link with the surrounding
    context in this chapter.
- source_word: ἐν ἀλλοτρίοις κόποις
  chosen: in the labors of others
  alternatives:
  - in other people's labors
  - about the work of others
  lexicon: BDAG
  rationale: κόποις refers to toil/labor, and ἀλλοτρίοις means belonging to others.
    The phrase indicates Paul is not claiming credit for work done by others.
- source_word: ἐλπίδα δὲ ἔχοντες
  chosen: but having hope
  alternatives:
  - but hoping
  - but holding this hope
  lexicon: BDAG
  rationale: The participial construction is retained fairly closely. 'Having hope'
    preserves the noun ἐλπίδα rather than converting it fully into a verb.
- source_word: αὐξανομένης τῆς πίστεως ὑμῶν
  chosen: as your faith is growing
  alternatives:
  - with your faith increasing
  - as your trust is growing
  lexicon: BDAG
  rationale: πίστις is rendered by the default 'faith' per doctrine guidance. The
    genitive absolute is conveyed naturally with 'as your faith is growing.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith.' Here the sense is the Corinthians'
    believing faith increasing, not primarily their faithfulness, though 'trust' is
    a possible nuance.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - within you
  lexicon: BDAG
  rationale: The phrase most naturally refers to the faith's growth in the Corinthian
    community. 'Among you' avoids sounding purely individualistic.
- source_word: μεγαλυνθῆναι
  chosen: we will be enlarged
  alternatives:
  - we will be magnified
  - we will be greatly extended
  lexicon: BDAG
  rationale: The infinitive depends on the hope Paul has. In context it refers not
    to personal self-exaltation but to the expansion of Paul's apostolic work/standing
    in relation to the Corinthians. 'Enlarged' preserves the metaphor, with the contextual
    sense clarified by the following phrase.
- source_word: κατὰ τὸν κανόνα ἡμῶν
  chosen: according to our sphere of ministry
  alternatives:
  - according to our rule
  - according to our assigned measure
  lexicon: BDAG
  rationale: κανών here refers to a measured sphere or assigned field, as in the immediate
    context (vv. 13–16), not a later ecclesiastical 'canon.' 'Sphere of ministry'
    communicates the contextual meaning in natural English.
- source_word: εἰς περισσείαν
  chosen: unto abundance
  alternatives:
  - abundantly
  - to a greater extent
  - for further expansion
  lexicon: BDAG
  rationale: The phrase indicates movement toward greater fullness or extension. 'Unto
    abundance' is slightly formal but preserves the directional force of εἰς and the
    noun sense of περισσεία.
