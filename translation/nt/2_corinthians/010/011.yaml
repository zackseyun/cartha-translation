id: 2CO.10.11
reference: 2 Corinthians 10:11
source:
  edition: SBLGNT
  text: τοῦτο λογιζέσθω ὁ τοιοῦτος, ὅτι οἷοί ἐσμεν τῷ λόγῳ δι’ ἐπιστολῶν ἀπόντες,
    τοιοῦτοι καὶ παρόντες τῷ ἔργῳ.
translation:
  text: 'Let such a person consider this: what we are in word through letters when
    absent, we are also in deed when present.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'such a one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in speech ... in action.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λογιζέσθω
  chosen: let ... consider
  alternatives:
  - let ... reckon
  - let ... think
  - let ... take into account
  lexicon: BDAG
  rationale: Middle/passive imperative, 3rd singular, calling for the person to reckon
    or take account of a fact. 'Consider' is natural modern English and preserves
    the deliberative force without sounding archaic.
- source_word: ὁ τοιοῦτος
  chosen: such a person
  alternatives:
  - such a one
  - that sort of person
  lexicon: BDAG
  rationale: Idiomatic reference to the kind of critic Paul has just mentioned. 'Such
    a person' is readable modern English and avoids archaic 'such a one' while preserving
    the singular reference.
- source_word: οἷοί ἐσμεν
  chosen: what we are
  alternatives:
  - such as we are
  - the kind of people we are
  lexicon: BDAG
  rationale: The construction expresses quality or character. 'What we are' is concise
    and idiomatic in English, preserving the comparison with the following clause.
- source_word: τῷ λόγῳ
  chosen: in word
  alternatives:
  - in speech
  - by word
  - in what we say
  lexicon: BDAG
  rationale: Dative of respect/sphere. 'In word' keeps the rhetorical contrast with
    'in deed' and reflects Paul's concern with how he comes across verbally in letters.
- source_word: δι’ ἐπιστολῶν
  chosen: through letters
  alternatives:
  - by letters
  - in letters
  lexicon: BDAG
  rationale: διά with genitive commonly indicates means or instrumentality. 'Through
    letters' communicates that the letters are the medium of Paul's words.
- source_word: ἀπόντες
  chosen: when absent
  alternatives:
  - while absent
  - being absent
  lexicon: BDAG
  rationale: Present participle used circumstantially. 'When absent' is smooth English
    and clearly contrasts with 'when present' later in the verse.
- source_word: τοιοῦτοι
  chosen: we are also
  alternatives:
  - such are we also
  - so also are we
  lexicon: BDAG
  rationale: 'The demonstrative adjective resumes and matches the earlier qualitative
    statement. In English the sense is best carried by completing the comparison naturally:
    ''we are also...''.'
- source_word: παρόντες
  chosen: when present
  alternatives:
  - while present
  - being present
  lexicon: BDAG
  rationale: Present participle parallel to ἀπόντες. 'When present' preserves the
    temporal/circumstantial contrast in natural English.
- source_word: τῷ ἔργῳ
  chosen: in deed
  alternatives:
  - in action
  - in what we do
  - by deed
  lexicon: BDAG
  rationale: Dative of respect/sphere, set in deliberate contrast to τῷ λόγῳ. 'In
    deed' preserves the compact antithesis 'in word ... in deed,' which is rhetorically
    strong and understandable in modern English.
