theological_decisions:
- issue: Paul's self-description contrasts letters and personal presence without implying
    inconsistency between speech and conduct.
  chosen_reading: Render the verse as an assertion that Paul's conduct in person matches
    the force of his written words.
  alternative_readings:
  - Render more loosely as a threat about future action
  - Render 'word' and 'deed' as merely style versus power
  rationale: 'The Greek presents a direct comparison: as Paul and his coworkers are
    in word through letters while absent, so they will be in deed when present. The
    translation should preserve this rhetorical warning without overstating it into
    a separate doctrinal or ecclesial claim.'
