id: 2CO.10.13
reference: 2 Corinthians 10:13
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ⸀οὐκ εἰς τὰ ἄμετρα καυχησόμεθα, ἀλλὰ κατὰ τὸ μέτρον τοῦ κανόνος οὗ
    ἐμέρισεν ἡμῖν ὁ θεὸς μέτρου, ἐφικέσθαι ἄχρι καὶ ὑμῶν—
translation:
  text: But we will not boast beyond measure, but according to the measure of the
    boundary God assigned to us—a measure that reaches even to you—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rule' or 'standard'; the Greek term can denote a measuring rod, standard,
      or assigned sphere.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμετρα
  chosen: beyond measure
  alternatives:
  - into immeasurable things
  - beyond proper limits
  lexicon: BDAG
  rationale: The adjective with εἰς in this idiom refers to exceeding proper bounds,
    not merely to abstract 'immeasurable things.' 'Beyond measure' is concise and
    idiomatic in English while preserving the metaphor of limits.
- source_word: καυχησόμεθα
  chosen: we will boast
  alternatives:
  - we will take pride
  - we will glory
  lexicon: BDAG
  rationale: Paul is speaking of boasting/claiming credit in a polemical context.
    'Boast' is the most direct and standard rendering.
- source_word: κατὰ τὸ μέτρον
  chosen: according to the measure
  alternatives:
  - in keeping with the measure
  - by the standard of the measure
  lexicon: BDAG
  rationale: This preserves the repeated μέτρον language and the sense of conformity
    to an assigned limit or standard.
- source_word: κανόνος
  chosen: boundary
  alternatives:
  - rule
  - sphere
  - standard
  lexicon: BDAG
  rationale: In this context κανών denotes a measured sphere or limit assigned by
    God, not primarily a moral 'rule.' 'Boundary' best fits the surrounding measure/limit
    imagery and avoids anachronistic associations with 'canon.'
- source_word: οὗ ἐμέρισεν ἡμῖν ὁ θεὸς
  chosen: God assigned to us
  alternatives:
  - God apportioned to us
  - God distributed to us
  lexicon: BDAG
  rationale: μερίζω here conveys apportioning or assigning a sphere. 'Assigned' is
    natural English and matches the contextual idea of a divinely allotted field of
    ministry.
- source_word: μέτρου
  chosen: a measure
  alternatives:
  - as a measure
  - of measure
  lexicon: BDAG
  rationale: The second occurrence of μέτρον is somewhat appositional/epexegetical,
    clarifying the nature of the κανών. Rendering it explicitly as 'a measure' preserves
    the repetition without producing awkward English.
- source_word: ἐφικέσθαι
  chosen: that reaches
  alternatives:
  - to extend
  - to attain
  lexicon: BDAG
  rationale: The infinitive expresses the extent of the assigned measure/boundary.
    'That reaches' gives clear English sense and connects naturally to the following
    phrase 'even to you.'
- source_word: ἄχρι καὶ ὑμῶν
  chosen: even to you
  alternatives:
  - as far as even you
  - all the way to you
  lexicon: BDAG
  rationale: ἄχρι marks extent, and καί adds emphasis. 'Even to you' preserves the
    emphatic inclusion of the Corinthians within Paul's God-given sphere.
