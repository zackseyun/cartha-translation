theological_decisions:
- issue: Meaning of κανών in Paul's ministry claim
  chosen_reading: A God-assigned boundary or sphere of ministry that includes the
    Corinthians
  alternative_readings:
  - A rule or norm by which Paul measures boasting
  rationale: The immediate context emphasizes limits, measure, and extent ('reaches
    even to you'). While κανών can mean 'rule' or 'standard,' here the spatial/apportionment
    imagery is dominant, so the translation reflects a divinely allotted sphere rather
    than an abstract norm alone.
  doctrine_reference: Translation philosophy §§1, 5
