id: 2CO.10.9
reference: 2 Corinthians 10:9
source:
  edition: SBLGNT
  text: ἵνα μὴ δόξω ὡς ἂν ἐκφοβεῖν ὑμᾶς διὰ τῶν ἐπιστολῶν·
translation:
  text: so that I may not seem as though I were trying to frighten you by my letters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as if I were trying to intimidate you through the letters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result in relation to the preceding context. 'So that'
    is natural modern English and preserves the subordinating force without sounding
    wooden.
- source_word: μὴ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation with the subjunctive, carried in English as 'not' within
    the clause.
- source_word: δόξω
  chosen: I may not seem
  alternatives:
  - I may not appear
  - I might not seem
  lexicon: BDAG
  rationale: From δοκέω, here in the aorist subjunctive after ἵνα. The sense is not
    'think' but 'seem/appear.' 'May not seem' fits the purpose clause and idiomatic
    English.
- source_word: ὡς ἂν
  chosen: as though
  alternatives:
  - as if
  - as one who
  lexicon: BDAG
  rationale: This combination softens/comparativizes the infinitival idea that follows.
    'As though' best captures the nuance of apparent characterization in smooth English.
- source_word: ἐκφοβεῖν
  chosen: were trying to frighten
  alternatives:
  - to frighten
  - to terrify
  - to intimidate
  lexicon: BDAG
  rationale: The verb means to frighten or alarm strongly. Because it depends on seeming
    ('seem as though...'), English idiom is improved by supplying 'were trying to'
    before the infinitive idea. 'Frighten' is strong enough without overstating to
    'terrify.' 'Intimidate' is possible but less direct lexically.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of ἐκφοβεῖν.
- source_word: διὰ τῶν ἐπιστολῶν
  chosen: by my letters
  alternatives:
  - through the letters
  - by means of the letters
  - through my letters
  lexicon: BDAG
  rationale: διά with the genitive expresses means/instrumentality. Although the Greek
    has the article ('the letters'), in context Paul refers to his own letters, so
    'my letters' makes the referent explicit in natural English without adding new
    content.
