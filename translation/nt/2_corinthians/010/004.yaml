id: 2CO.10.4
reference: 2 Corinthians 10:4
source:
  edition: SBLGNT
  text: τὰ γὰρ ὅπλα τῆς στρατείας ἡμῶν οὐ σαρκικὰ ἀλλὰ δυνατὰ τῷ θεῷ πρὸς καθαίρεσιν
    ὀχυρωμάτων— λογισμοὺς καθαιροῦντες
translation:
  text: For the weapons of our warfare are not fleshly, but powerful through God for
    the tearing down of strongholds—tearing down arguments
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not of the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty before God' or 'divinely powerful.'
    reason: alternative_reading
  - marker: c
    text: Or 'reasonings' or 'speculations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  lexicon: BDAG
  rationale: Standard military metaphor; 'weapons' is natural modern English and preserves
    the concrete imagery.
- source_word: στρατείας
  chosen: warfare
  alternatives:
  - campaign
  - military service
  lexicon: BDAG
  rationale: '''Warfare'' best conveys the ongoing military struggle metaphor in context,
    more idiomatic than ''campaign'' and broader than ''military service''.'
- source_word: σαρκικὰ
  chosen: fleshly
  alternatives:
  - of the flesh
  - worldly
  - carnal
  lexicon: BDAG
  rationale: Given the doctrine guidance on σάρξ, this context is metaphorical rather
    than literal. 'Fleshly' preserves the Greek's connection to 'flesh' without over-interpreting
    it as specifically 'sinful nature' or flattening it to merely 'worldly'.
- source_word: δυνατὰ τῷ θεῷ
  chosen: powerful through God
  alternatives:
  - powerful to God
  - mighty in God's sight
  - divinely powerful
  lexicon: BDAG
  rationale: The dative τῷ θεῷ is somewhat compressed idiomatically. 'Powerful through
    God' expresses source/instrument in clear English without sounding wooden. 'Divinely
    powerful' is possible but less transparent to the Greek structure.
- source_word: καθαίρεσιν
  chosen: the tearing down
  alternatives:
  - destruction
  - demolition
  - pulling down
  lexicon: BDAG
  rationale: This noun carries the sense of dismantling or bringing down. 'The tearing
    down' preserves the vivid military/siege imagery and connects naturally with the
    participle καθαιροῦντες.
- source_word: ὀχυρωμάτων
  chosen: strongholds
  alternatives:
  - fortresses
  - fortifications
  lexicon: BDAG
  rationale: '''Strongholds'' is the most established and natural English equivalent
    for fortified positions, fitting both literal imagery and Paul''s metaphorical
    application.'
- source_word: λογισμοὺς
  chosen: arguments
  alternatives:
  - reasonings
  - thoughts
  - speculations
  lexicon: BDAG
  rationale: In this context of intellectual opposition to the knowledge of God (expanded
    in the next verse), 'arguments' best captures hostile patterns of reasoning rather
    than neutral thoughts.
- source_word: καθαιροῦντες
  chosen: tearing down
  alternatives:
  - destroying
  - demolishing
  - pulling down
  lexicon: BDAG
  rationale: The participle continues and specifies the purpose/result of the previous
    clause. Repeating 'tearing down' preserves the lexical link with καθαίρεσιν and
    the rhetorical force.
