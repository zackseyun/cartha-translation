theological_decisions:
- issue: Rendering of σαρκικὰ in Paul's contrast between human and divine means
  chosen_reading: fleshly
  alternative_readings:
  - worldly
  - carnal
  - sinful
  rationale: The verse contrasts merely human means with power that comes from God.
    'Fleshly' preserves Pauline theological texture and avoids prematurely narrowing
    the sense to moral sinfulness alone.
  doctrine_reference: 'DOCTRINE.md: σάρξ = flesh (literal) / sinful nature (metaphorical),
    context-dependent; preserve theological tension rather than resolve it.'
- issue: Force of τῷ θεῷ in δυνατὰ τῷ θεῷ
  chosen_reading: through God
  alternative_readings:
  - mighty before God
  - powerful for God
  - divinely powerful
  rationale: The phrase indicates that the weapons' power derives from God rather
    than from human resources. 'Through God' communicates this clearly in idiomatic
    English while avoiding a doctrinally loaded paraphrase.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    over translation tradition.'
