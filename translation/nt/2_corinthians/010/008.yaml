id: 2CO.10.8
reference: 2 Corinthians 10:8
source:
  edition: SBLGNT
  text: ἐάν ⸀τε ⸀γὰρ περισσότερόν τι καυχήσωμαι περὶ τῆς ἐξουσίας ἡμῶν, ἧς ἔδωκεν
    ὁ ⸀κύριος εἰς οἰκοδομὴν καὶ οὐκ εἰς καθαίρεσιν ὑμῶν, οὐκ αἰσχυνθήσομαι,
translation:
  text: For even if I should boast somewhat more about our authority, which the Lord
    gave for building you up and not for tearing you down, I will not be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not be ashamed.' The Greek verb can be rendered either way, but
      the passive sense 'be put to shame' more clearly reflects the form here.
    reason: lexical_alternative
  - marker: b
    text: Or 'for your destruction.' The Greek contrasts 'building up' with 'tearing
      down/destruction'; the chosen wording preserves the construction metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τε γὰρ
  chosen: For even if
  alternatives:
  - For if indeed
  - For if even
  lexicon: BDAG
  rationale: 'Renders the combined connective force naturally in English: γάρ gives
    explanatory/grounding force (''for''), while ἐάν with the subjunctive introduces
    a conditional clause (''if''), and τε adds an enclitic sense approximated by ''even''
    here.'
- source_word: περισσότερόν τι
  chosen: somewhat more
  alternatives:
  - a little more
  - more abundantly
  - something more
  lexicon: BDAG
  rationale: 'Captures the idiomatic accusative adverbial sense: Paul speaks of boasting
    to a greater degree, but with an indefinite softening (''τι''). ''Somewhat more''
    preserves both comparison and modest indefiniteness.'
- source_word: καυχήσωμαι
  chosen: I should boast
  alternatives:
  - I may boast
  - I were to boast
  lexicon: BDAG
  rationale: Aorist middle subjunctive after ἐάν is best represented by an English
    conditional form. 'Should boast' fits the hypothetical tone without sounding archaic
    in context.
- source_word: περὶ τῆς ἐξουσίας ἡμῶν
  chosen: about our authority
  alternatives:
  - concerning our authority
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated authority/right, not merely power in the abstract.
    'Authority' is the clearest modern rendering in this apostolic context.
- source_word: ἧς ἔδωκεν ὁ κύριος
  chosen: which the Lord gave
  alternatives:
  - which the Lord has given
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'authority.' The aorist ἔδωκεν is
    naturally rendered as simple past here. κύριος is rendered 'Lord' per doctrinal
    default.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In Pauline usage
    here it refers to the exalted Lord Jesus as the giver of apostolic authority,
    and 'Lord' preserves that title appropriately.
- source_word: εἰς οἰκοδομὴν
  chosen: for building you up
  alternatives:
  - for edification
  - for building up
  lexicon: BDAG
  rationale: οἰκοδομή is metaphorical for strengthening/edifying. 'Building you up'
    preserves the metaphor while making explicit the object implied by context.
- source_word: καὶ οὐκ εἰς καθαίρεσιν ὑμῶν
  chosen: and not for tearing you down
  alternatives:
  - and not for your destruction
  - and not for pulling you down
  lexicon: BDAG
  rationale: καθαίρεσις can mean demolition/destruction in contrast to οἰκοδομή. 'Tearing
    you down' preserves the building metaphor and the pastoral contrast better than
    the more absolute 'destruction.'
- source_word: οὐκ αἰσχυνθήσομαι
  chosen: I will not be put to shame
  alternatives:
  - I will not be ashamed
  - I will not be disgraced
  lexicon: BDAG
  rationale: The future passive is better reflected by 'be put to shame' than by the
    more internalized 'be ashamed.' It conveys that Paul's boasting will not prove
    shameful or be exposed as empty.
