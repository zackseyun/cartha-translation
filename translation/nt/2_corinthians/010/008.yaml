theological_decisions:
- issue: Nature and purpose of apostolic authority
  chosen_reading: Paul's authority is presented as delegated by the Lord for the constructive
    strengthening of the Corinthians, not for their ruin.
  alternative_readings:
  - Paul's authority is for church discipline in a destructive sense
  rationale: The explicit contrast between οἰκοδομή and καθαίρεσις frames apostolic
    authority as fundamentally edifying, even when exercised firmly. The translation
    preserves this tension without softening the reality of authority or overstating
    punitive intent.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms: κύριος → Lord'
