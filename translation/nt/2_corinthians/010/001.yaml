theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title rather than a mere name here. Following
    the project's doctrine, title usage is translated as 'Messiah' to preserve meaning
    and Jewish messianic resonance.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Tone of Paul's self-description in the relative clause
  chosen_reading: Retain the wording in a way that preserves possible irony rather
    than resolving whether Paul endorses or echoes an accusation
  alternative_readings:
  - Translate more negatively as 'timid'
  - Translate more positively as 'lowly'
  rationale: The verse likely reflects opponents' characterization of Paul, but the
    Greek itself does not explicitly mark quotation. The translation preserves the
    lexical sense and rhetorical tension without deciding the interpretive question
    in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
