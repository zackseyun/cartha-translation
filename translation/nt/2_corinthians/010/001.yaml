id: 2CO.10.1
reference: 2 Corinthians 10:1
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ἐγὼ Παῦλος παρακαλῶ ὑμᾶς διὰ τῆς πραΰτητος καὶ ἐπιεικείας τοῦ Χριστοῦ,
    ὃς κατὰ πρόσωπον μὲν ταπεινὸς ἐν ὑμῖν, ἀπὼν δὲ θαρρῶ εἰς ὑμᾶς·
translation:
  text: Now I myself, Paul, appeal to you by the meekness and gentleness of the Messiah—I
    who am humble face to face among you, but bold toward you when absent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: alternative_reading
  - marker: b
    text: '''Humble'' may reflect an ironic summary of what some said about Paul in
      person; alternatively, ''lowly'' or, more interpretively, ''timid.'''
    reason: lexical_alternative
  - marker: c
    text: Literally 'according to face'; that is, 'in person' or 'face to face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς δὲ ἐγὼ Παῦλος
  chosen: Now I myself, Paul
  alternatives:
  - But I myself, Paul
  - I, Paul, myself
  lexicon: BDAG
  rationale: The emphatic pronoun plus explicit subject name heightens Paul's personal
    appeal; 'I myself, Paul' preserves the emphasis. δέ here is rendered 'Now' rather
    than 'But' to mark transition without overstating contrast in English.
- source_word: παρακαλῶ
  chosen: appeal to
  alternatives:
  - urge
  - exhort
  - entreat
  lexicon: BDAG
  rationale: παρακαλέω here introduces a personal plea rather than a command. 'Appeal
    to' preserves the earnest, relational force better than the more directive 'urge'
    or the more formal 'exhort'.
- source_word: διὰ τῆς πραΰτητος
  chosen: by the meekness
  alternatives:
  - through the meekness
  - by the gentleness
  lexicon: BDAG
  rationale: διά with the genitive expresses means or basis. 'By the meekness' is
    natural English and preserves the appeal as grounded in or made through Messiah's
    character. πραΰτης is best rendered 'meekness' here to retain the moral quality
    often associated with Christ, while avoiding flattening it into mere softness.
- source_word: ἐπιεικείας
  chosen: gentleness
  alternatives:
  - forbearance
  - clemency
  - considerateness
  lexicon: BDAG
  rationale: ἐπιείκεια denotes a gracious, yielding, considerate quality. 'Gentleness'
    pairs naturally with 'meekness' in English and communicates the tone of Christlike
    restraint, though 'forbearance' is a viable nuance.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title. Here the genitive refers to the character of Jesus in his messianic identity,
    so 'Messiah' preserves the title's meaning rather than defaulting to the traditional
    transliteration 'Christ'.
- source_word: ὃς
  chosen: I who
  alternatives:
  - who
  - the one who
  lexicon: BDAG
  rationale: 'The relative pronoun refers to Paul and introduces the ironic characterization
    attributed to him. English idiom is improved by making the resumptive sense explicit:
    ''I who am...''.'
- source_word: κατὰ πρόσωπον
  chosen: face to face
  alternatives:
  - in person
  - according to appearance
  lexicon: BDAG
  rationale: The idiom most naturally means personal presence here, in contrast with
    absence later in the verse. 'Face to face' preserves the concrete expression and
    the contrast with 'when absent.'
- source_word: ταπεινὸς
  chosen: humble
  alternatives:
  - lowly
  - timid
  lexicon: BDAG
  rationale: ταπεινός can denote lowliness or humility, but in this context it likely
    echoes the accusation that Paul is unimpressive in person. 'Humble' preserves
    the lexical sense while allowing the irony to remain; 'timid' would overinterpret
    the opponents' slant.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - with you
  - in your presence
  lexicon: BDAG
  rationale: The phrase indicates Paul's presence in the Corinthians' midst. 'Among
    you' is idiomatic and fits the contrast with absence.
- source_word: ἀπὼν
  chosen: when absent
  alternatives:
  - being absent
  - away
  lexicon: BDAG
  rationale: The participle is temporal/circumstantial in context. 'When absent' is
    concise and natural in English.
- source_word: θαρρῶ
  chosen: bold
  alternatives:
  - confident
  - courageous
  lexicon: BDAG
  rationale: In context Paul cites the charge that he is daring in letters while absent.
    'Bold' best matches the rhetorical contrast with 'humble' and reflects the common
    nuance of daring confidence.
- source_word: εἰς ὑμᾶς
  chosen: toward you
  alternatives:
  - with respect to you
  - against you
  lexicon: BDAG
  rationale: εἰς here marks direction of attitude or action. 'Toward you' is broad
    enough to preserve the Greek without importing hostility; 'against you' would
    overread the phrase.
