id: 2CO.10.14
reference: 2 Corinthians 10:14
source:
  edition: SBLGNT
  text: οὐ γὰρ ὡς μὴ ἐφικνούμενοι εἰς ὑμᾶς ὑπερεκτείνομεν ἑαυτούς, ἄχρι γὰρ καὶ ὑμῶν
    ἐφθάσαμεν ἐν τῷ εὐαγγελίῳ τοῦ Χριστοῦ—
translation:
  text: For we are not overextending ourselves, as though we had not reached you,
    for we came even as far as you with the gospel of Christ—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as you' or 'even as far as you'; the Greek includes an emphatic
      'even' (καί).
    reason: lexical_alternative
  - marker: b
    text: Or 'the gospel of Christ.'
    reason: alternative_reading
  - marker: c
    text: Or 'as far as even to you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὑπερεκτείνομεν
  chosen: are not overextending
  alternatives:
  - do not overextend
  - are not stretching beyond our limits
  lexicon: BDAG
  rationale: The verb literally conveys stretching beyond proper bounds. 'Are not
    overextending' preserves the metaphor while sounding natural in modern English.
    Present tense is kept.
- source_word: ὡς μὴ ἐφικνούμενοι εἰς ὑμᾶς
  chosen: as though we had not reached you
  alternatives:
  - as if we were not reaching to you
  - as though we did not extend as far as you
  lexicon: BDAG
  rationale: The participial phrase explains the hypothetical basis on which Paul
    would be overextending himself. English idiom is best captured by 'had not reached
    you,' which reflects completed arrival in relation to the accusation.
- source_word: ἐφικνούμενοι
  chosen: reached
  alternatives:
  - attaining
  - extending to
  lexicon: BDAG
  rationale: In context the sense is spatial/ministerial reach to the Corinthians,
    not mere attainment. 'Reached' is concise and idiomatic.
- source_word: ἑαυτούς
  chosen: ourselves
  lexicon: BDAG
  rationale: Reflexive pronoun directly refers to Paul and coworkers; standard English
    reflexive is appropriate.
- source_word: ἄχρι ... καὶ ὑμῶν
  chosen: as far as even to you
  alternatives:
  - as far as you
  - even as far as you
  lexicon: BDAG
  rationale: The combination emphasizes that Paul's ministry genuinely extended to
    Corinth. 'As far as even to you' preserves the emphatic καί, though somewhat wooden;
    it is retained to show the stress of the Greek.
- source_word: ἐφθάσαμεν
  chosen: we came
  alternatives:
  - we arrived
  - we reached
  lexicon: BDAG
  rationale: Aorist indicates completed action. 'We came' fits naturally with 'as
    far as ... you' and avoids awkward repetition with earlier 'reached.'
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: with the gospel
  alternatives:
  - in the gospel
  - by the gospel
  lexicon: BDAG
  rationale: 'The preposition ἐν here is instrumental or associative in context: Paul
    reached them in the sphere/means of gospel ministry. ''With the gospel'' is the
    most natural English rendering.'
- source_word: εὐαγγελίῳ
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' remains the clearest established rendering in Pauline contexts
    and carries the needed theological weight without obscurity.'
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where functioning
    as a title rather than a name-like form. Here in the genitive modifying ''gospel,''
    the titular sense is still clear: the gospel concerning/belonging to the Messiah.'
