  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah'
    where title is in view. In 'the gospel of the Messiah,' the messianic title remains
    semantically active rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
