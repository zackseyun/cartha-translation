id: 2CO.10.17
reference: 2 Corinthians 10:17
source:
  edition: SBLGNT
  text: Ὁ δὲ καυχώμενος ἐν κυρίῳ καυχάσθω·
translation:
  text: But the one who boasts must boast in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Let the one who boasts, boast in the Lord.' Paul is
      likely echoing Jeremiah 9:24 (LXX 9:23).
    reason: cross_reference
lexical_decisions:
- source_word: Ὁ ... καυχώμενος
  chosen: the one who boasts
  alternatives:
  - he who boasts
  - the one who is boasting
  lexicon: BDAG
  rationale: The article with the present middle participle functions substantivally,
    referring generically to a person characterized by boasting. 'The one who boasts'
    is natural modern English and preserves the representative singular without unnecessary
    archaism.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition with the preceding argument. 'But'
    best reflects the adversative force in context, where Paul contrasts illegitimate
    boasting with proper boasting.
- source_word: καυχώμενος / καυχάσθω
  chosen: boasts / must boast
  alternatives:
  - glories / let him glory
  - takes pride / must take pride
  lexicon: BDAG
  rationale: καυχάομαι commonly means 'boast' or 'glory.' 'Boast' is the clearest
    contemporary equivalent and preserves the rhetorical edge of Paul's wording. The
    imperative καυχάσθω is rendered 'must boast' to convey the exhortational force
    idiomatically in English; 'let him boast' is more formally literal but less natural.
- source_word: ἐν
  chosen: in
  alternatives:
  - about
  - with reference to
  lexicon: BDAG
  rationale: ἐν with καυχάομαι is idiomatically rendered 'boast in,' expressing the
    sphere or basis of boasting. This also aligns with the likely allusion to Jeremiah
    9:24 (LXX 9:23), where the same construction appears.
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the project''s default as ''Lord.'' The article
    is natural in English here: ''in the Lord.'' In Pauline usage this can denote
    the Lord Jesus or the Lord in a scriptural citation context; the translation preserves
    the wording without over-specifying beyond the Greek.'
