theological_decisions:
- issue: Referent of 'the Lord' in a citation/allusion context
  chosen_reading: the Lord
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: Paul echoes Jeremiah's instruction that boasting be in the Lord. Because
    the Greek here simply has κυρίῳ and the immediate wording does not explicitly
    identify the referent beyond Paul's scriptural and theological usage, the translation
    retains 'the Lord' without interpretive expansion, preserving the theological
    resonance and possible overlap in Pauline usage.
  doctrine_reference: 'Contested terms: κύριος → Lord; Preserve theological tension
    rather than resolve it.'
