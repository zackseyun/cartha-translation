id: 2CO.10.6
reference: 2 Corinthians 10:6
source:
  edition: SBLGNT
  text: καὶ ἐν ἑτοίμῳ ἔχοντες ἐκδικῆσαι πᾶσαν παρακοήν, ὅταν πληρωθῇ ὑμῶν ἡ ὑπακοή.
translation:
  text: and being ready to punish every act of disobedience, whenever your obedience
    is complete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to avenge every disobedience.' The Greek verb can carry the sense of
      exacting justice or avenging, but here likely refers to disciplinary punishment
      in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'when your obedience is fulfilled/completed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἑτοίμῳ ἔχοντες
  chosen: being ready
  alternatives:
  - having in readiness
  - holding ourselves in readiness
  lexicon: BDAG
  rationale: The idiom ἐν ἑτοίμῳ ἔχειν means to be in readiness or prepared. 'Being
    ready' gives natural English while preserving the participial sense connected
    to the preceding context.
- source_word: ἐκδικῆσαι
  chosen: to punish
  alternatives:
  - to avenge
  - to exact justice for
  lexicon: BDAG
  rationale: In this context Paul speaks of disciplinary action against opposition
    within the church, so 'punish' best fits the object παρακοήν and avoids suggesting
    personal vengeance. 'Avenge' is possible more literally, but is less clear in
    English here.
- source_word: πᾶσαν παρακοήν
  chosen: every act of disobedience
  alternatives:
  - all disobedience
  - every disobedience
  lexicon: BDAG
  rationale: παρακοή denotes disobedience or refusal to obey. Rendering with 'every
    act of disobedience' makes the distributive force of πᾶσαν clear and reads naturally
    in English.
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: ὅταν with the subjunctive introduces a contingent future circumstance.
    'Whenever' preserves that conditional-temporal nuance slightly better than a simple
    'when,' though both are possible.
- source_word: πληρωθῇ
  chosen: is complete
  alternatives:
  - is fulfilled
  - is brought to fullness
  - is completed
  lexicon: BDAG
  rationale: The passive subjunctive of πληρόω here refers to obedience reaching its
    full measure. 'Is complete' is idiomatic and communicates the sense without awkwardness.
- source_word: ὑμῶν ἡ ὑπακοή
  chosen: your obedience
  alternatives:
  - the obedience of you
  lexicon: BDAG
  rationale: A straightforward possessive rendering is best. ὑπακοή is 'obedience,'
    likely referring to the Corinthians' submission to apostolic instruction.
