theological_decisions:
- issue: Nature of Paul's intended response to opposition
  chosen_reading: disciplinary punishment of disobedience within the church context
  alternative_readings:
  - personal vengeance against opponents
  - divine eschatological judgment
  rationale: The immediate context concerns apostolic authority and the correction
    of rebellious opposition. Rendering ἐκδικῆσαι as 'punish' reflects disciplinary
    action rather than personal retaliation, avoiding importation of a theology of
    private vengeance not warranted by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
