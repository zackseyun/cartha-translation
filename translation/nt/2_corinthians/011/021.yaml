theological_decisions:
- issue: Rhetorical irony concerning Paul's 'weakness'
  chosen_reading: Render the statement as ironic concession rather than literal confession
    of moral failure
  alternative_readings:
  - 'Render more flatly as a straightforward admission: ''as though we were weak'''
  rationale: The broader context is Paul's ironic 'fool's speech' contrasting himself
    with boastful opponents. The translation should preserve the irony without importing
    a theological claim that Paul truly lacked apostolic legitimacy. 'As though we
    had been weak' signals the rhetorical posture.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
