id: 2CO.11.21
reference: 2 Corinthians 11:21
source:
  edition: SBLGNT
  text: κατὰ ἀτιμίαν λέγω, ὡς ὅτι ἡμεῖς ⸀ἠσθενήκαμεν· ἐν ᾧ δ’ ἄν τις τολμᾷ, ἐν ἀφροσύνῃ
    λέγω, τολμῶ κἀγώ.
translation:
  text: I say this to our shame, as though we had been weak. Yet in whatever anyone
    dares to boast—I am speaking foolishly—I also dare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by way of dishonor I say'; the Greek expression is idiomatic and may
      also be understood as 'I say this as a disgrace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as if we were weak.' Paul is speaking ironically in the context of his
      'foolish' boasting.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in whatever anyone dares.' The object 'to boast' is implied by
      the surrounding context.
    reason: lexical_alternative
  - marker: d
    text: Or 'I speak as a fool.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ ἀτιμίαν
  chosen: to our shame
  alternatives:
  - by way of dishonor
  - to dishonor
  - with shame
  lexicon: BDAG
  rationale: The idiom is difficult and context-sensitive. In context Paul is speaking
    ironically about the Corinthians' perception of him and his coworkers as 'weak'
    compared with the intruding boastful opponents. 'To our shame' captures the sense
    that what follows is said in a way that acknowledges disgrace/humiliation attached
    to 'us,' and it is idiomatic English. It avoids the less natural 'according to
    dishonor' while preserving the rhetorical force.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I am saying
  lexicon: BDAG
  rationale: Simple present is best in English for Paul's rhetorical asides.
- source_word: ὡς ὅτι
  chosen: as though
  alternatives:
  - as if
  - that
  lexicon: BDAG
  rationale: The combination introduces the content from the standpoint of appearance
    or ironic concession. 'As though' best reflects the comparative/ironic nuance
    in context.
- source_word: ἠσθενήκαμεν
  chosen: we had been weak
  alternatives:
  - we were weak
  - we have been weak
  lexicon: BDAG
  rationale: ἀσθενέω here refers not primarily to physical illness but to weakness/lack
    of force or status in the rhetorical contest Paul is describing. The English pluperfect-like
    'had been weak' fits the concessive, retrospective tone after 'as though,' though
    'were weak' is also possible.
- source_word: ἐν ᾧ
  chosen: in whatever
  alternatives:
  - in what
  - wherein
  - whatever matter
  lexicon: BDAG
  rationale: This idiom introduces the sphere or respect in which someone shows boldness.
    'In whatever' is concise and natural in English.
- source_word: τολμᾷ
  chosen: dares to boast
  alternatives:
  - dares
  - is bold
  lexicon: BDAG
  rationale: The verb itself means 'dares' or 'is bold,' but in this immediate context
    of rival boasting (vv. 18, 21–23), English benefits from making the implied object
    explicit. This is a modest contextual expansion warranted by the discourse and
    avoids ambiguity about what is being dared.
- source_word: ἐν ἀφροσύνῃ
  chosen: I am speaking foolishly
  alternatives:
  - in foolishness I speak
  - I speak as a fool
  lexicon: BDAG
  rationale: Paul inserts a self-conscious rhetorical disclaimer. 'I am speaking foolishly'
    is clear modern English and preserves the force of the dative phrase plus λέγω.
- source_word: τολμῶ κἀγώ
  chosen: I also dare
  alternatives:
  - I too am bold
  - I also dare to boast
  lexicon: BDAG
  rationale: The phrase mirrors the earlier τολμᾷ. 'I also dare' preserves the verbal
    repetition and leaves the implied boasting context to be supplied by the preceding
    clause. Because 'boast' was made explicit earlier for clarity, leaving it implicit
    here avoids overloading the line while retaining the rhetorical parallel.
