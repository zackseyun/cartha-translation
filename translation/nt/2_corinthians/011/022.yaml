id: 2CO.11.22
reference: 2 Corinthians 11:22
source:
  edition: SBLGNT
  text: Ἑβραῖοί εἰσιν; κἀγώ. Ἰσραηλῖταί εἰσιν; κἀγώ. σπέρμα Ἀβραάμ εἰσιν; κἀγώ.
translation:
  text: Are they Hebrews? So am I. Are they Israelites? So am I. Are they Abraham’s
    offspring? So am I.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed of Abraham.' The Greek uses a singular collective expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑβραῖοί
  chosen: Hebrews
  alternatives:
  - Hebrew people
  lexicon: BDAG
  rationale: The ethnic-religious designation is best rendered by the established
    term 'Hebrews.' It preserves the rhetorical parallelism and likely emphasizes
    Jewish heritage/cultural identity.
- source_word: κἀγώ
  chosen: So am I
  alternatives:
  - I am too
  - I also
  lexicon: BDAG
  rationale: This compressed form of καί + ἐγώ is idiomatically rendered 'So am I'
    in English, matching Paul's terse, emphatic repetition better than the flatter
    'I also.'
- source_word: Ἰσραηλῖταί
  chosen: Israelites
  alternatives:
  - members of Israel
  lexicon: BDAG
  rationale: The term denotes belonging to Israel as the covenant people. 'Israelites'
    is the natural and precise English equivalent and preserves the distinction from
    'Hebrews' and 'Abraham’s offspring.'
- source_word: σπέρμα Ἀβραάμ
  chosen: Abraham’s offspring
  alternatives:
  - seed of Abraham
  - descendants of Abraham
  lexicon: BDAG
  rationale: '''Offspring'' is natural modern English and can function collectively,
    matching the singular collective σπέρμα. ''Seed'' is more formal and biblically
    traditional, but less idiomatic here; ''descendants'' is possible but loses the
    singular collective nuance.'
- source_word: εἰσιν
  chosen: Are they / am I
  alternatives:
  - they are / I am
  lexicon: BDAG
  rationale: The repeated copula is rendered within English interrogative clauses
    and responses. This preserves the rhetorical question-and-answer structure rather
    than mechanically repeating 'are' in a less natural way.
