theological_decisions:
- issue: Nuanced distinction among Jewish identity terms
  chosen_reading: 'Retain three distinct labels: ''Hebrews,'' ''Israelites,'' and
    ''Abraham’s offspring'''
  alternative_readings:
  - Collapse them into near-synonyms such as 'Jews' or 'descendants of Abraham' throughout
  rationale: Paul’s rhetoric depends on preserving overlapping but distinct claims
    of identity and heritage. The translation should not flatten these into a single
    category, since the source text intentionally stacks them for emphasis.
  doctrine_reference: Translation philosophy §§1, 5
