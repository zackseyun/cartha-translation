id: 2CO.11.31
reference: 2 Corinthians 11:31
source:
  edition: SBLGNT
  text: ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ⸀Ἰησοῦ οἶδεν, ὁ ὢν εὐλογητὸς εἰς τοὺς αἰῶνας,
    ὅτι οὐ ψεύδομαι.
translation:
  text: The God and Father of the Lord Jesus knows—he who is blessed forever—that
    I am not lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς καὶ πατὴρ
  chosen: The God and Father
  alternatives:
  - God, even the Father
  - the God and Father
  lexicon: BDAG
  rationale: A single article governs both nouns, yielding the fixed expression 'the
    God and Father.' Retaining both nouns preserves the formal structure and Paul's
    solemn appeal to God.
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - of our Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for the title. The
    possessive 'our' is not present in the Greek and should not be supplied.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - knows well
  - is witness
  lexicon: BDAG
  rationale: The verb is the straightforward 'knows.' Although the sense functions
    like an oath appeal, the lexical meaning should be preserved rather than expanded
    to 'is witness' in the main text.
- source_word: ὁ ὢν εὐλογητὸς
  chosen: he who is blessed
  alternatives:
  - who is blessed
  - the one being blessed
  lexicon: BDAG
  rationale: 'The articular participle with predicate adjective identifies God descriptively:
    ''he who is blessed.'' This preserves the doxological aside without overcomplicating
    the English.'
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  - forevermore
  lexicon: BDAG
  rationale: Idiomatic English 'forever' best conveys the enduring doxological force
    of the phrase while remaining natural. More literal alternatives are possible
    but less readable here.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what God knows: ''that I am not lying,''
    not a causal clause.'
- source_word: οὐ ψεύδομαι
  chosen: I am not lying
  alternatives:
  - I do not lie
  - I am telling no lie
  lexicon: BDAG
  rationale: Present middle/passive in idiomatic English is best rendered 'I am not
    lying.' This fits the immediate oath-like assertion and reads naturally in modern
    English.
