theological_decisions:
- issue: Relation of 'God and Father' to 'the Lord Jesus'
  chosen_reading: Render the phrase straightforwardly as 'The God and Father of the
    Lord Jesus' without softening its distinction of persons.
  alternative_readings:
  - Paraphrasing to avoid perceived theological tension
  rationale: The verse distinguishes God the Father from the Lord Jesus while remaining
    fully compatible with historic Trinitarian orthodoxy. The translation should preserve
    the text's wording and not mute the relational distinction.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon
    (451 AD)'
- issue: Doxological clause punctuation and attachment
  chosen_reading: Treat 'he who is blessed forever' as a parenthetical doxological
    description of God.
  alternative_readings:
  - Attach it more tightly without dashes or commas as a restrictive clause
  rationale: The clause functions naturally as a reverent aside in Paul's oath-like
    statement. English punctuation with dashes helps readability while preserving
    the sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
