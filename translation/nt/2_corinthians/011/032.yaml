id: 2CO.11.32
reference: 2 Corinthians 11:32
source:
  edition: SBLGNT
  text: ἐν Δαμασκῷ ὁ ἐθνάρχης Ἁρέτα τοῦ βασιλέως ἐφρούρει τὴν ⸂πόλιν Δαμασκηνῶν⸃ πιάσαι
    ⸀με,
translation:
  text: In Damascus, the ethnarch of King Aretas was guarding the city of the Damascenes
    in order to seize me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city of Damascus.' The Greek more literally reads 'the city of the
      Damascenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Δαμασκῷ
  chosen: In Damascus
  alternatives:
  - At Damascus
  lexicon: BDAG
  rationale: Standard locative use of ἐν with the dative indicates location. 'In Damascus'
    is the most natural modern English rendering.
- source_word: ἐθνάρχης
  chosen: ethnarch
  alternatives:
  - governor
  - ruler
  lexicon: BDAG
  rationale: The term denotes a ruler over a people or district. 'Ethnarch' preserves
    the specific historical title rather than flattening it to the more generic 'governor'
    or 'ruler.'
- source_word: Ἁρέτα τοῦ βασιλέως
  chosen: of King Aretas
  alternatives:
  - under King Aretas
  lexicon: BDAG
  rationale: The genitive construction most naturally identifies the ethnarch as belonging
    to or serving King Aretas. 'Of King Aretas' is formally close and idiomatic in
    English.
- source_word: ἐφρούρει
  chosen: was guarding
  alternatives:
  - was keeping watch over
  - was watching
  lexicon: BDAG
  rationale: The imperfect verb indicates ongoing action in past time. 'Was guarding'
    captures both the progressive aspect and the security/policing sense of the verb.
- source_word: τὴν πόλιν Δαμασκηνῶν
  chosen: the city of the Damascenes
  alternatives:
  - the city of Damascus
  - the Damascene city
  lexicon: BDAG
  rationale: The Greek literally reads 'the city of the Damascenes,' with Δαμασκηνῶν
    functioning as a genitive plural substantive ('Damascenes'). This is slightly
    more formal than simply 'the city of Damascus' and preserves the source wording.
- source_word: πιάσαι με
  chosen: in order to seize me
  alternatives:
  - to arrest me
  - to capture me
  lexicon: BDAG
  rationale: The aorist infinitive expresses purpose after the guarding action. 'Seize'
    is broad and accurate, avoiding the more interpretive 'arrest' while still conveying
    hostile apprehension.
