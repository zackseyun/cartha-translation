theological_decisions:
- issue: Nuance of Paul's pastoral burden in μέριμνα
  chosen_reading: Rendered as 'concern' rather than 'anxiety' to reflect genuine pastoral
    care without importing a negative moral judgment.
  alternative_readings:
  - anxiety for all the churches
  - care for all the churches
  rationale: The verse describes Paul's apostolic burden, not a doctrinal statement
    about sinful worry. 'Concern' preserves the tension of emotional weight while
    avoiding interpretive overreach.
  doctrine_reference: Preserve theological tension rather than resolve it.
