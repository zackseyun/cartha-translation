id: 2CO.11.28
reference: 2 Corinthians 11:28
source:
  edition: SBLGNT
  text: χωρὶς τῶν παρεκτὸς ἡ ⸀ἐπίστασίς ⸀μοι ἡ καθ’ ἡμέραν, ἡ μέριμνα πασῶν τῶν ἐκκλησιῶν.
translation:
  text: 'Apart from such external things, there is the daily pressure on me: concern
    for all the churches.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Besides the other things' or 'Apart from the things left unmentioned.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my daily burden' or 'the daily pressing upon me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'anxiety for all the churches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς τῶν παρεκτὸς
  chosen: Apart from such external things
  alternatives:
  - besides the other things
  - apart from the things left unmentioned
  - apart from external matters
  lexicon: BDAG
  rationale: The idiom χωρὶς + genitive with παρεκτός refers to matters aside from
    or beyond what has just been listed. In context Paul has cataloged outward sufferings,
    so 'Apart from such external things' captures both exclusion ('apart from') and
    the sense of externally imposed hardships. 'Such' helps connect to the preceding
    list without overtranslating.
- source_word: ἐπίστασίς μοι
  chosen: there is ... pressure on me
  alternatives:
  - my daily burden
  - the pressure on me
  - the crowd pressing upon me
  lexicon: BDAG
  rationale: ἐπίστασις can denote pressure, attack, or a pressing upon. In this context,
    paired appositionally with 'the concern for all the churches,' it is best understood
    metaphorically as inward pressure rather than a literal crowd. The dative μοι
    is naturally rendered 'on me' rather than a possessive 'my,' preserving the experiential
    force.
- source_word: ἡ καθ’ ἡμέραν
  chosen: the daily
  alternatives:
  - day by day
  - that comes every day
  lexicon: BDAG
  rationale: The article with the prepositional phrase functions adjectivally with
    ἐπίστασις, indicating something recurring each day. 'The daily' is concise and
    idiomatic in English when paired with 'pressure.'
- source_word: ἡ μέριμνα
  chosen: concern
  alternatives:
  - anxiety
  - care
  lexicon: BDAG
  rationale: μέριμνα can mean care, concern, or anxiety. Here Paul speaks of pastoral
    burden for the churches; 'concern' preserves the emotional and pastoral weight
    without implying sinful worry. 'Anxiety' is possible but may sound overly psychological
    or morally loaded in English.
- source_word: πασῶν τῶν ἐκκλησιῶν
  chosen: for all the churches
  alternatives:
  - for all the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage ordinarily refers to Christian congregations/churches.
    'Churches' is the clearest modern rendering and fits established NT usage. The
    genitive depends on μέριμνα, so 'concern for all the churches' expresses the relationship
    naturally in English.
