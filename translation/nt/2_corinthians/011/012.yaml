theological_decisions:
- issue: Nature of Paul's opponents' sought ἀφορμή
  chosen_reading: Render neutrally as 'opportunity' in the main text rather than specifying
    a morally loaded 'pretext.'
  alternative_readings:
  - pretext
  - occasion
  rationale: The verse is polemical, but the noun itself does not require the more
    interpretive 'pretext.' A neutral rendering preserves the lexical range and lets
    the context supply the negative evaluation. Because the context may suggest 'pretext,'
    that alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
