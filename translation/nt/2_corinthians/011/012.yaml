id: 2CO.11.12
reference: 2 Corinthians 11:12
source:
  edition: SBLGNT
  text: Ὃ δὲ ποιῶ καὶ ποιήσω, ἵνα ἐκκόψω τὴν ἀφορμὴν τῶν θελόντων ἀφορμήν, ἵνα ἐν
    ᾧ καυχῶνται εὑρεθῶσιν καθὼς καὶ ἡμεῖς.
translation:
  text: But what I am doing, I will continue to do, in order to cut off the opportunity
    from those who want an opportunity, so that in what they boast about they may
    be found to be just as we are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pretext' or 'occasion' for both occurrences of 'opportunity' (Greek
      ἀφορμή).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃ δὲ ποιῶ καὶ ποιήσω
  chosen: But what I am doing, I will continue to do
  alternatives:
  - But what I do, I will also do
  - And what I am doing, I will do also
  lexicon: BDAG
  rationale: The present plus future of ποιέω expresses Paul's current practice and
    his resolve to persist in it. 'Continue to do' makes the idiomatic force clear
    in modern English without adding content beyond the Greek.
- source_word: ἐκκόψω
  chosen: cut off
  alternatives:
  - eliminate
  - remove
  lexicon: BDAG
  rationale: ἐκκόπτω literally means 'cut out/off' and here metaphorically means to
    remove or deprive. 'Cut off' preserves the vivid metaphor and is natural English.
- source_word: ἀφορμή
  chosen: opportunity
  alternatives:
  - occasion
  - pretext
  - basis
  lexicon: BDAG
  rationale: ἀφορμή can mean a base of operations, occasion, or opportunity. In this
    polemical context Paul aims to deny his opponents any opening for comparison or
    accusation. 'Opportunity' is the broadest and most natural rendering in English;
    the nuance of 'pretext' is preserved as an alternative.
- source_word: τῶν θελόντων ἀφορμήν
  chosen: those who want an opportunity
  alternatives:
  - those desiring an occasion
  - those wanting a pretext
  lexicon: BDAG
  rationale: The participle θελόντων with repeated ἀφορμήν is concise and somewhat
    pointed in Greek. Rendering it straightforwardly keeps the repetition visible
    while remaining readable. Because the exact nature of the sought ἀφορμή may be
    either an 'opportunity' or a 'pretext,' alternatives are preserved.
- source_word: ἐν ᾧ καυχῶνται
  chosen: in what they boast about
  alternatives:
  - in that which they boast of
  - in the matter about which they boast
  lexicon: BDAG
  rationale: The relative phrase is somewhat idiomatic. 'In what they boast about'
    communicates the sphere or matter of boasting without overformal English.
- source_word: εὑρεθῶσιν καθὼς καὶ ἡμεῖς
  chosen: they may be found to be just as we are
  alternatives:
  - they may be found as we are
  - they may be found to be like us
  lexicon: BDAG
  rationale: The passive subjunctive εὑρεθῶσιν is best rendered 'may be found.' καθὼς
    καὶ ἡμεῖς indicates comparison with Paul and his coworkers. 'Just as we are' preserves
    the comparative force while making the clause intelligible in English.
