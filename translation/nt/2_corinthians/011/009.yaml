- issue: Gender rendering of ἀδελφοὶ
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  rationale: The project specifies gender-accurate rather than gender-neutral rendering.
    The Greek is masculine plural, and in this context likely refers to identifiable
    coworkers who came from Macedonia. Therefore the masculine form is retained in
    the main text.
