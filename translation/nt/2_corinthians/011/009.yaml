id: 2CO.11.9
reference: 2 Corinthians 11:9
source:
  edition: SBLGNT
  text: καὶ παρὼν πρὸς ὑμᾶς καὶ ὑστερηθεὶς οὐ κατενάρκησα οὐθενός· τὸ γὰρ ὑστέρημά
    μου προσανεπλήρωσαν οἱ ἀδελφοὶ ἐλθόντες ἀπὸ Μακεδονίας· καὶ ἐν παντὶ ἀβαρῆ ⸂ἐμαυτὸν
    ὑμῖν⸃ ἐτήρησα καὶ τηρήσω.
translation:
  text: And when I was present with you and was in need, I was not a burden to anyone;
    for the brothers who came from Macedonia supplied what I lacked. And in everything
    I kept myself from being a burden to you, and will keep doing so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I did not burden anyone.' The Greek verb can mean to weigh on someone
      or be a financial burden to them.
    reason: lexical_alternative
  - marker: b
    text: '''The brothers'' translates a masculine plural form. Depending on context,
      Paul can use this term more broadly for fellow believers, but here it likely
      refers to specific coworkers from Macedonia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρὼν πρὸς ὑμᾶς
  chosen: when I was present with you
  alternatives:
  - while I was with you
  lexicon: BDAG
  rationale: The participle with πρὸς ὑμᾶς is naturally temporal/circumstantial. 'Present
    with you' is slightly more formal and preserves the sense of personal presence.
- source_word: ὑστερηθεὶς
  chosen: was in need
  alternatives:
  - lacked
  - was in want
  lexicon: BDAG
  rationale: The passive participle here refers to experiencing deficiency or need,
    especially material lack in context. 'Was in need' is idiomatic modern English
    and fits the financial context.
- source_word: οὐ κατενάρκησα οὐθενός
  chosen: I was not a burden to anyone
  alternatives:
  - I did not burden anyone
  - I did not become dependent on anyone
  lexicon: BDAG
  rationale: The verb καταναρκάω is idiomatic for weighing on someone financially
    or being a burden. The genitive οὐθενός indicates 'no one.' 'Was not a burden
    to anyone' communicates the economic and relational sense clearly.
- source_word: τὸ ὑστέρημά μου
  chosen: what I lacked
  alternatives:
  - my need
  - my deficiency
  lexicon: BDAG
  rationale: The noun denotes what was lacking or the deficiency itself. Rendering
    it as 'what I lacked' is natural in English and avoids awkward abstraction while
    preserving meaning.
- source_word: προσανεπλήρωσαν
  chosen: supplied
  alternatives:
  - filled up
  - made up for
  - fully supplied
  lexicon: BDAG
  rationale: The compound verb means to supply in addition, to make up what is lacking.
    'Supplied' is concise and idiomatic; the object 'what I lacked' already carries
    the sense of making up a deficiency.
- source_word: οἱ ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the brethren
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the masculine plural is retained
    as 'brothers.' In Pauline usage this can include mixed company, but here it likely
    refers to specific male coworkers from Macedonia; in any case the Greek form is
    masculine and should not be neutralized in the main text.
- source_word: ἐλθόντες ἀπὸ Μακεδονίας
  chosen: who came from Macedonia
  alternatives:
  - having come from Macedonia
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as a relative clause
    in smooth English. 'From Macedonia' preserves the geographical source of the aid.
- source_word: ἐν παντί
  chosen: in everything
  alternatives:
  - in every way
  - in all things
  lexicon: BDAG
  rationale: The phrase is broad and adverbial, indicating comprehensive scope. 'In
    everything' is straightforward and preserves the breadth without overinterpreting.
- source_word: ἀβαρῆ ἐμαυτὸν ὑμῖν
  chosen: myself from being a burden to you
  alternatives:
  - myself unburdensome to you
  - myself free of charge to you
  lexicon: BDAG
  rationale: ἀβαρής means not burdensome, especially financially. The phrase is somewhat
    compressed in Greek; English requires expansion. 'From being a burden to you'
    best captures the intended sense in context.
- source_word: ἐτήρησα καὶ τηρήσω
  chosen: I kept ... and will keep doing so
  alternatives:
  - I have kept ... and will keep
  - I guarded ... and will guard
  lexicon: BDAG
  rationale: τηρέω means keep, preserve, maintain. Here it refers to maintaining the
    state of not burdening them. 'Will keep doing so' makes the future continuation
    explicit and idiomatic.
