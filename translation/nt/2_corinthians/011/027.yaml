theological_decisions:
- issue: Meaning of νηστείαις in Paul's hardship list
  chosen_reading: fastings
  alternative_readings:
  - hunger from lack of food
  - forced deprivation
  rationale: The Greek term itself denotes fasting rather than generic hunger; since
    λιμῷ already covers hunger, retaining 'fastings' preserves the lexical distinction
    and avoids collapsing two separate items. The text does not specify whether these
    fastings were voluntary or imposed by circumstance, so the translation leaves
    that open.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Sense of γυμνότητι
  chosen_reading: exposure
  alternative_readings:
  - nakedness
  rationale: In this suffering context, the term likely refers to insufficient clothing
    and vulnerability to the elements. 'Exposure' communicates that sense in readable
    modern English without overstating literal nudity, while the alternative is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §6, Readable modern English, not archaic
    or academic.
