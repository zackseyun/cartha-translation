id: 2CO.11.27
reference: 2 Corinthians 11:27
source:
  edition: SBLGNT
  text: ⸀κόπῳ καὶ μόχθῳ, ἐν ἀγρυπνίαις πολλάκις, ἐν λιμῷ καὶ δίψει, ἐν νηστείαις πολλάκις,
    ἐν ψύχει καὶ γυμνότητι·
translation:
  text: in labor and hardship, in many sleepless nights, in hunger and thirst, in
    frequent fastings, in cold and exposure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in frequent fasts.' The Greek can denote repeated fastings; the text
      does not specify whether these were voluntary or imposed by circumstance.
    reason: lexical_alternative
  - marker: b
    text: Or 'nakedness.' Here the sense may be inadequate clothing and exposure to
      the elements.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόπῳ
  chosen: labor
  alternatives:
  - toil
  lexicon: BDAG
  rationale: κόπος commonly denotes laborious effort or toil. 'Labor' gives a natural
    English singular paired with the following dative phrase and preserves the sense
    of strenuous exertion.
- source_word: μόχθῳ
  chosen: hardship
  alternatives:
  - trouble
  - toil
  lexicon: BDAG
  rationale: μόχθος overlaps with κόπος but adds the sense of hardship/distress accompanying
    labor. Rendering it 'hardship' avoids flattening the near-synonymous pair into
    two identical English words and preserves Paul's cumulative rhetoric.
- source_word: ἐν ἀγρυπνίαις πολλάκις
  chosen: in many sleepless nights
  alternatives:
  - in frequent watchings
  - in sleeplessness often
  lexicon: BDAG
  rationale: ἀγρυπνία refers to wakefulness or sleeplessness. The plural with πολλάκις
    is idiomatically rendered as repeated episodes of sleepless nights. This is more
    natural English than 'watchings' while staying close to the source.
- source_word: ἐν λιμῷ καὶ δίψει
  chosen: in hunger and thirst
  alternatives:
  - with hunger and thirst
  lexicon: BDAG
  rationale: The paired datives denote conditions endured. 'In hunger and thirst'
    preserves the repeated ἐν structure and the experiential force of deprivation.
- source_word: ἐν νηστείαις πολλάκις
  chosen: in frequent fastings
  alternatives:
  - in frequent fasts
  lexicon: BDAG
  rationale: νηστεία means fasting/fast. 'Frequent fastings' preserves the plural
    and repeated πολλάκις. Because the term can denote either voluntary religious
    fasting or involuntary lack of food depending on context, the more literal 'fastings'
    is retained rather than interpreting it as simple starvation.
- source_word: ἐν ψύχει
  chosen: in cold
  alternatives:
  - in the cold
  lexicon: BDAG
  rationale: ψῦχος denotes cold as an endured condition. The anarthrous English 'in
    cold' matches the concise list structure of the Greek.
- source_word: γυμνότητι
  chosen: exposure
  alternatives:
  - nakedness
  - lack of clothing
  lexicon: BDAG
  rationale: γυμνότης can mean nakedness, but in hardship catalogs it often denotes
    inadequate clothing or exposure to the elements rather than literal nudity. 'Exposure'
    communicates the likely sense in idiomatic modern English while fitting the pairing
    with 'cold'.
