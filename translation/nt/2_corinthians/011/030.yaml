theological_decisions:
- issue: Nature of Paul's boasting
  chosen_reading: Render the statement straightforwardly as ironic/rhetorical boasting
    centered on weakness, without importing a broader doctrinal explanation into the
    translation.
  alternative_readings:
  - Interpret as 'boast about my weaknesses' in a more paraphrastic way
  - Interpret as 'boast in what concerns my weakness' with more explicit explanatory
    wording
  rationale: The verse contrasts ordinary boasting with boasting in weakness, a key
    Pauline theme. The translation should preserve that tension and irony without
    resolving it into commentary. The more literal phrasing keeps the focus on the
    paradox Paul intends.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
