id: 2CO.11.5
reference: 2 Corinthians 11:5
source:
  edition: SBLGNT
  text: λογίζομαι γὰρ μηδὲν ὑστερηκέναι τῶν ὑπερλίαν ἀποστόλων·
translation:
  text: For I consider that I am not in the least inferior to those super-apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the most eminent apostles.' The Greek expression can be read either
      ironically ('super-apostles') or as a straightforward reference to highly regarded
      apostles.
    reason: alternative_reading
lexical_decisions:
- source_word: λογίζομαι
  chosen: I consider
  alternatives:
  - I think
  - I reckon
  - I regard
  lexicon: BDAG
  rationale: The verb denotes considering, thinking, or reckoning. 'I consider' is
    natural modern English and preserves the reflective, evaluative sense without
    sounding colloquial ('I reckon') or overly weak ('I think').
- source_word: γὰρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: BDAG
  rationale: γάρ introduces an explanation or support for the preceding statement.
    'For' is the standard concise connective and fits Paul's argumentative flow.
- source_word: μηδὲν
  chosen: not in the least
  alternatives:
  - in no way
  - not at all
  - nothing
  lexicon: BDAG
  rationale: 'With the infinitive ὑστερηκέναι, μηδέν functions adverbially/intensively:
    ''to have fallen short in nothing'' or ''not at all to be inferior.'' ''Not in
    the least'' captures the emphatic force idiomatically in English.'
- source_word: ὑστερηκέναι
  chosen: am ... inferior
  alternatives:
  - have fallen short
  - lack
  - am behind
  lexicon: BDAG
  rationale: The perfect infinitive of ὑστερέω here expresses being deficient relative
    to others. In this comparative context, 'am inferior' is the clearest English
    rendering. 'Have fallen short' is more literal but less idiomatic in this construction.
- source_word: τῶν ὑπερλίαν ἀποστόλων
  chosen: those super-apostles
  alternatives:
  - the most eminent apostles
  - the exceedingly great apostles
  - those so-called super-apostles
  lexicon: BDAG
  rationale: ὑπερλίαν is an adverb meaning 'beyond measure' or 'extraordinarily,'
    modifying ἀποστόλων. In context Paul is likely using irony against rival teachers
    rather than referring straightforwardly to the Twelve. 'Those super-apostles'
    preserves the sharp rhetorical edge in readable English. The demonstrative force
    is supplied idiomatically by 'those' to make the reference clear in English.
