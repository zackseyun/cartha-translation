theological_decisions:
- issue: Whether τῶν ὑπερλίαν ἀποστόλων refers sincerely to eminent apostles or ironically
    to Paul's opponents
  chosen_reading: Rendered as 'those super-apostles' to preserve probable irony without
    overexplaining it in the main text.
  alternative_readings:
  - '''the most eminent apostles'' as a sincere reference to leading apostles such
    as Peter, James, and John'
  rationale: The immediate context in 2 Corinthians 11 strongly suggests polemical
    contrast with rival ministers boasting against Paul. 'Super-apostles' has become
    a recognized English way to preserve the likely ironic force of ὑπερλίαν ἀποστόλων.
    Because the phrase can also be taken as a sincere comparative reference, that
    alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
