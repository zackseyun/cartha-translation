theological_decisions:
- issue: Whether to leave the final clause as a bare 'God knows' or make the implied
    positive answer explicit in English
  chosen_reading: God knows I do.
  alternative_readings:
  - God knows.
  - God knows that I love you.
  rationale: The verse consists of rhetorical questions followed by an appeal to God's
    knowledge. English commonly supplies the implied positive answer for clarity.
    'God knows I do' preserves the rhetorical force while avoiding an overexpanded
    paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
