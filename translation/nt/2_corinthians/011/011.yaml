id: 2CO.11.11
reference: 2 Corinthians 11:11
source:
  edition: SBLGNT
  text: διὰ τί; ὅτι οὐκ ἀγαπῶ ὑμᾶς; ὁ θεὸς οἶδεν.
translation:
  text: Why? Because I do not love you? God knows I do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'God knows.' The Greek leaves the implied answer to
      the rhetorical question unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  chosen: Why?
  alternatives:
  - For what reason?
  - Why is that?
  lexicon: BDAG
  rationale: Idiomatic interrogative asking for the reason; concise English 'Why?'
    best matches the rhetorical force.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - That
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of the rhetorical explanation/question.
    'Because' fits the discourse flow after 'Why?' better than a more wooden 'that.'
- source_word: οὐκ ἀγαπῶ ὑμᾶς
  chosen: I do not love you
  alternatives:
  - I don't love you
  lexicon: BDAG
  rationale: ἀγαπάω is rendered with the default 'love' per doctrine. The explicit
    negation and direct object are preserved straightforwardly.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός; no article is needed in English.
- source_word: οἶδεν
  chosen: knows I do
  alternatives:
  - knows
  - knows that I do love you
  lexicon: BDAG
  rationale: The Greek states simply 'God knows,' but in English the ellipsis can
    sound abrupt or ambiguous. 'God knows I do' preserves the rhetorical implied answer
    to the preceding question without adding more than the context clearly supplies.
