theological_decisions:
- issue: Rendering of Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The phrase ἀποστόλους Χριστοῦ is best understood as 'apostles belonging
    to/representing the Messiah.' The title sense is still active, so 'Messiah' preserves
    meaning in line with project policy while not altering doctrine.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός
    → ''Messiah'' where title; ''Christ'' where name-like.'
