id: 2CO.11.13
reference: 2 Corinthians 11:13
source:
  edition: SBLGNT
  text: οἱ γὰρ τοιοῦτοι ψευδαπόστολοι, ἐργάται δόλιοι, μετασχηματιζόμενοι εἰς ἀποστόλους
    Χριστοῦ·
translation:
  text: For such men are false apostles, deceitful workers, disguising themselves
    as apostles of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'apostles of Christ.' The Greek title Χριστός can be rendered 'Christ'
      when used in a more name-like way; here it is translated 'Messiah' to preserve
      the title's meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks an explanatory connection to the preceding argument; 'For' is the
    most natural concise English discourse marker here.
- source_word: τοιοῦτοι
  chosen: such men
  alternatives:
  - such ones
  - men like these
  lexicon: BDAG
  rationale: Refers to a specific class just described. 'Such men' is idiomatic and
    preserves the masculine plural reference without unnecessary awkwardness.
- source_word: ψευδαπόστολοι
  chosen: false apostles
  alternatives:
  - pseudo-apostles
  lexicon: BDAG
  rationale: A transparent compound meaning those who falsely claim apostolic status.
    'False apostles' is standard, clear, and faithful.
- source_word: ἐργάται δόλιοι
  chosen: deceitful workers
  alternatives:
  - deceitful laborers
  - treacherous workers
  lexicon: BDAG
  rationale: The noun-adjective pair denotes workers characterized by deceit. 'Deceitful
    workers' is natural English and preserves the moral force of δόλιοι.
- source_word: μετασχηματιζόμενοι
  chosen: disguising themselves
  alternatives:
  - masquerading
  - transforming themselves
  - presenting themselves as
  lexicon: BDAG
  rationale: The middle/passive participle in context conveys an outward change of
    appearance or presentation rather than an inner transformation. 'Disguising themselves'
    best captures the deceptive self-presentation Paul condemns.
- source_word: εἰς ἀποστόλους Χριστοῦ
  chosen: as apostles of the Messiah
  alternatives:
  - into apostles of the Messiah
  - as apostles of Christ
  - into Christ's apostles
  lexicon: BDAG
  rationale: With μετασχηματιζόμενοι, εἰς expresses assumed identity/role. 'As apostles
    of the Messiah' is idiomatic English. Χριστοῦ is rendered 'of the Messiah' per
    project guidance to translate the title where context supports title-sense rather
    than name-like usage.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστοῦ functions as a title in a genitival phrase ('apostles of
    the Messiah'), not merely a name-like label. This follows the doctrine guideline
    favoring 'Messiah' where title-sense is clear.
