id: 2CO.11.20
reference: 2 Corinthians 11:20
source:
  edition: SBLGNT
  text: ἀνέχεσθε γὰρ εἴ τις ὑμᾶς καταδουλοῖ, εἴ τις κατεσθίει, εἴ τις λαμβάνει, εἴ
    τις ἐπαίρεται, εἴ τις ⸂εἰς πρόσωπον ὑμᾶς⸃ δέρει.
translation:
  text: For you put up with it if someone enslaves you, if someone devours you, if
    someone takes from you, if someone exalts himself, if someone strikes you in the
    face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you tolerate it' or 'you bear with it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'takes advantage of you'; the Greek simply says 'takes,' likely in an
      exploitative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέχεσθε
  chosen: you put up with it
  alternatives:
  - you tolerate it
  - you bear with it
  lexicon: BDAG
  rationale: Present middle indicative, second plural, here describing the Corinthians'
    actual tolerance of abusive leaders. 'Put up with it' is idiomatic modern English
    and fits the ironic tone better than the more wooden 'bear with.' The supplied
    object 'it' is natural in English though not explicit in Greek.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force linking this verse to Paul's preceding
    irony.
- source_word: καταδουλοῖ
  chosen: enslaves
  alternatives:
  - makes slaves of
  - brings into bondage
  lexicon: BDAG
  rationale: The verb means to bring into slavery or subjection. 'Enslaves' is concise
    and preserves the bonded-force sense, in line with the project's preference to
    avoid softening slavery language where salient.
- source_word: κατεσθίει
  chosen: devours
  alternatives:
  - consumes
  - eats up
  lexicon: BDAG
  rationale: Used metaphorically for exploitative consumption. 'Devours' preserves
    the vivid predatory image better than the flatter 'consumes.'
- source_word: λαμβάνει
  chosen: takes from you
  alternatives:
  - takes advantage of you
  - takes from you
  lexicon: BDAG
  rationale: The verb 'takes' is semantically broad here; context suggests exploitative
    taking, likely of money or resources. 'Takes from you' makes the implied object
    explicit enough for English without over-interpreting to a single kind of abuse.
- source_word: ἐπαίρεται
  chosen: exalts himself
  alternatives:
  - lifts himself up
  - is arrogant
  lexicon: BDAG
  rationale: Middle/passive form here conveys self-exaltation or haughtiness. 'Exalts
    himself' preserves the reflexive nuance more closely than the adjectival paraphrase
    'is arrogant.'
- source_word: εἰς πρόσωπον ὑμᾶς δέρει
  chosen: strikes you in the face
  alternatives:
  - beats you in the face
  - slaps you in the face
  lexicon: BDAG
  rationale: The idiom literally involves striking 'into the face.' 'Strikes you in
    the face' is natural English and preserves the concrete insult without narrowing
    the action to a mere slap.
- source_word: εἴ τις
  chosen: if someone
  alternatives:
  - if anyone
  lexicon: BDAG
  rationale: Repeated conditional structure is retained for rhetorical force. 'Someone'
    reads naturally in contemporary English while preserving the singular indefinite.
