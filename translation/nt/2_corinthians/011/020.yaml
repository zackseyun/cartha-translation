theological_decisions:
- issue: Rhetorical tone of Paul's statement
  chosen_reading: The verse is rendered as ironic rebuke describing the Corinthians'
    tolerance of abusive false apostles, without adding explicit labels in the main
    text.
  alternative_readings:
  - A more explicit paraphrase naming the abusers as false apostles or teachers
  rationale: The context supports irony, but the Greek text itself lists abusive actions
    without naming the offenders in this verse. The translation preserves the rhetoric
    without importing explanatory material into the main text.
  doctrine_reference: Translation philosophy items 1 and 3
