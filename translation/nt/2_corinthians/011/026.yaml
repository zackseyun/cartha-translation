id: 2CO.11.26
reference: 2 Corinthians 11:26
source:
  edition: SBLGNT
  text: ὁδοιπορίαις πολλάκις, κινδύνοις ποταμῶν, κινδύνοις λῃστῶν, κινδύνοις ἐκ γένους,
    κινδύνοις ἐξ ἐθνῶν, κινδύνοις ἐν πόλει, κινδύνοις ἐν ἐρημίᾳ, κινδύνοις ἐν θαλάσσῃ,
    κινδύνοις ἐν ψευδαδέλφοις,
translation:
  text: often on journeys, in dangers from rivers, in dangers from robbers, in dangers
    from my own people, in dangers from Gentiles, in dangers in the city, in dangers
    in the wilderness, in dangers at sea, in dangers among false brothers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from my own race' or 'from my own nation'; the Greek says literally
      'from [my] kindred/people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among false believers.' The Greek reads literally 'among false brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδοιπορίαις πολλάκις
  chosen: often on journeys
  alternatives:
  - in journeys often
  - frequently in travel
  lexicon: BDAG
  rationale: The dative plural ὁδοιπορίαις with the adverb πολλάκις forms an idiomatic
    opening in Paul's hardship list. 'Often on journeys' is natural modern English
    while preserving the sense of repeated travel.
- source_word: κινδύνοις
  chosen: in dangers
  alternatives:
  - in peril
  - with dangers
  lexicon: BDAG
  rationale: The repeated dative plural is retained with 'in dangers' to mirror the
    rhetorical cadence and accumulation of hazards in the Greek. 'Perils' is traditional
    but less natural for modern readers.
- source_word: ποταμῶν
  chosen: from rivers
  alternatives:
  - from flooded rivers
  - from river crossings
  lexicon: BDAG
  rationale: The genitive after κινδύνοις indicates the source or kind of danger.
    'From rivers' is sufficiently literal and leaves the exact nature of the river
    danger implicit, as in Greek.
- source_word: λῃστῶν
  chosen: from robbers
  alternatives:
  - from bandits
  lexicon: BDAG
  rationale: λῃστής denotes robbers or bandits. 'Robbers' is the clearest common English
    term and fits the travel context.
- source_word: ἐκ γένους
  chosen: from my own people
  alternatives:
  - from my own race
  - from my own nation
  - from Jews
  lexicon: BDAG
  rationale: γένους here refers to Paul's own ethnic kin-group. 'My own people' communicates
    this naturally without importing an explicit noun absent from the Greek. It also
    preserves the contrast with ἐξ ἐθνῶν.
- source_word: ἐξ ἐθνῶν
  chosen: from Gentiles
  alternatives:
  - from the nations
  - from non-Jews
  lexicon: BDAG
  rationale: In Pauline usage, ἔθνη in contrast with Paul's own people normally means
    Gentiles/non-Jews. 'Gentiles' is concise and standard, preserving the ethnic contrast.
- source_word: ἐν πόλει
  chosen: in the city
  alternatives:
  - in cities
  - in town
  lexicon: BDAG
  rationale: The singular with ἐν is distributive or generic. 'In the city' preserves
    the Greek form and the list's rhythm better than pluralizing.
- source_word: ἐν ἐρημίᾳ
  chosen: in the wilderness
  alternatives:
  - in deserted places
  - in the desert
  lexicon: BDAG
  rationale: ἐρημία can denote wilderness, desert, or desolate region. 'Wilderness'
    is broad enough for the likely sense and pairs well with 'city' and 'sea' in the
    sequence.
- source_word: ἐν θαλάσσῃ
  chosen: at sea
  alternatives:
  - in the sea
  - on the sea
  lexicon: BDAG
  rationale: English idiom prefers 'at sea' for maritime danger, while still accurately
    reflecting ἐν θαλάσσῃ.
- source_word: ἐν ψευδαδέλφοις
  chosen: among false brothers
  alternatives:
  - among false believers
  - among false brothers and sisters
  lexicon: BDAG
  rationale: ψευδάδελφοι literally means false brothers, likely professing fellow
    believers who are not genuine. The masculine plural is best rendered 'brothers'
    per the project's gender-accurate policy; broader inclusive expansion would go
    beyond the Greek.
