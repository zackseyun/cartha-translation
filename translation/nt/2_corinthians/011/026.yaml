theological_decisions:
- issue: Rendering ψευδαδέλφοις with gender-accurate language
  chosen_reading: among false brothers
  alternative_readings:
  - among false believers
  - among false brothers and sisters
  rationale: The Greek is grammatically masculine plural and likely refers to professed
    fellow Christians. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    expansion unless context clearly demands inclusivity beyond the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ἐξ ἐθνῶν in contrast with ἐκ γένους
  chosen_reading: from Gentiles
  alternative_readings:
  - from the nations
  - from non-Jews
  rationale: Because the phrase is contrasted with dangers from Paul's own people,
    the ethnic-religious sense 'Gentiles' is the most contextually precise and traditional
    without adding doctrinal interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
