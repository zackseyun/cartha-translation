theological_decisions:
- issue: Nature of Satan's change in appearance
  chosen_reading: The verse describes deceptive outward presentation, not an assertion
    of actual transformation into a holy angel.
  alternative_readings:
  - actual transformation into an angel of light
  rationale: The verb μετασχηματίζεται commonly refers to changing form/appearance
    in a way perceptible to others, and in the immediate context Paul is emphasizing
    deception by false apostles and their master. Rendering with 'disguises himself
    as' preserves that emphasis without making additional metaphysical claims.
