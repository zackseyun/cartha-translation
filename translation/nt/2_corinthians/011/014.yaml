id: 2CO.11.14
reference: 2 Corinthians 11:14
source:
  edition: SBLGNT
  text: καὶ οὐ ⸀θαῦμα, αὐτὸς γὰρ ὁ Σατανᾶς μετασχηματίζεται εἰς ἄγγελον φωτός·
translation:
  text: And no wonder, for Satan himself disguises himself as an angel of light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transforms himself into an angel of light.' The Greek verb can be rendered
      more literally as 'changes form,' but here likely refers to deceptive appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Indeed
  - Even
  lexicon: BDAG
  rationale: Standard connective carried over to preserve the flow from the previous
    verse; 'And' is natural English and sufficiently formal.
- source_word: οὐ θαῦμα
  chosen: no wonder
  alternatives:
  - it is no wonder
  - not surprising
  lexicon: BDAG
  rationale: The idiomatic Greek expression means 'it is not surprising.' 'No wonder'
    is concise, natural modern English that preserves the force without over-paraphrasing.
- source_word: αὐτὸς ... ὁ Σατανᾶς
  chosen: Satan himself
  alternatives:
  - the Satan himself
  - Satan
  lexicon: BDAG
  rationale: αὐτός is intensive here, so 'himself' should be expressed. The article
    with Σατανᾶς is conventional with proper names in Greek and does not require translation
    as 'the Satan' in normal English style.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - after all
  lexicon: BDAG
  rationale: Introduces the explanation for why it is 'no wonder.' 'For' preserves
    the explanatory relation with appropriate brevity.
- source_word: μετασχηματίζεται
  chosen: disguises himself as
  alternatives:
  - transforms himself into
  - masquerades as
  lexicon: BDAG
  rationale: The middle/passive form in context conveys an outward change of appearance
    rather than an ontological transformation. 'Disguises himself as' best captures
    deceptive presentation, which fits Paul's argument about false apostles.
- source_word: εἰς
  chosen: as
  alternatives:
  - into
  - as if he were
  lexicon: BDAG
  rationale: With μετασχηματίζεται, εἰς marks the assumed role or appearance. English
    'as' is more idiomatic than a wooden 'into' here.
- source_word: ἄγγελον
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: BDAG
  rationale: In this supernatural context, 'angel' is the clear sense rather than
    the more general 'messenger'.
- source_word: φωτός
  chosen: of light
  alternatives:
  - bright
  - radiant
  lexicon: BDAG
  rationale: A literal genitive is best here. 'Of light' preserves the biblical imagery
    and avoids interpretive expansion.
