theological_decisions:
- issue: Rendering of δικαιοσύνη in a Pauline phrase
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table specifies 'righteousness' as the default for δικαιοσύνη,
    with 'justice' preserved in a footnote for Pauline passages. In this verse the
    false servants present themselves as morally upright or aligned with what is right,
    which 'righteousness' captures well.
