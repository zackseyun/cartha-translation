id: 2CO.11.15
reference: 2 Corinthians 11:15
source:
  edition: SBLGNT
  text: οὐ μέγα οὖν εἰ καὶ οἱ διάκονοι αὐτοῦ μετασχηματίζονται ὡς διάκονοι δικαιοσύνης,
    ὧν τὸ τέλος ἔσται κατὰ τὰ ἔργα αὐτῶν.
translation:
  text: So it is no great thing if his servants also disguise themselves as servants
    of righteousness, whose end will be according to their works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants of justice.' The Greek word can mean either 'righteousness'
      or 'justice'; here it refers to the appearance of being aligned with what is
      right.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέγα
  chosen: it is no great thing
  alternatives:
  - it is not surprising
  - it is no great surprise
  lexicon: BDAG
  rationale: Idiomatic expression meaning something is not remarkable or surprising.
    'It is no great thing' preserves the Greek structure while remaining natural English.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the previous verse. 'So' is concise, natural,
    and preserves the logical connection.
- source_word: διάκονοι
  chosen: servants
  alternatives:
  - ministers
  lexicon: BDAG
  rationale: In this context the referent is Satan's agents functioning in service
    to him. 'Servants' is clearer in modern English than 'ministers,' which could
    sound ecclesiastical and misleadingly positive.
- source_word: μετασχηματίζονται
  chosen: disguise themselves
  alternatives:
  - transform themselves
  - masquerade as
  lexicon: BDAG
  rationale: The verb here refers to outward change of appearance or presentation,
    not inner transformation. 'Disguise themselves' best fits the deceptive context
    established in the preceding verse.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces the role or appearance they assume. 'As' is the most direct
    rendering.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine guidance, δικαιοσύνη defaults to 'righteousness,' while
    'justice' is preserved as an alternative in a footnote for Pauline usage. Here
    the sense is the appearance of moral uprightness rather than judicial justice.
- source_word: τὸ τέλος
  chosen: their end
  alternatives:
  - their outcome
  - their final end
  lexicon: BDAG
  rationale: Refers to the eventual result or destiny awaiting them. 'Their end' is
    concise and idiomatic in judgment contexts.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  chosen: according to their works
  alternatives:
  - according to their deeds
  lexicon: BDAG
  rationale: A standard judgment formula indicating correspondence between outcome
    and actions. 'Works' preserves lexical continuity with ἔργα and remains understandable
    in modern English.
