id: 2CO.11.23
reference: 2 Corinthians 11:23
source:
  edition: SBLGNT
  text: διάκονοι Χριστοῦ εἰσιν; παραφρονῶν λαλῶ, ὑπὲρ ἐγώ· ἐν κόποις περισσοτέρως,
    ἐν ⸂φυλακαῖς περισσοτέρως, ἐν πληγαῖς ὑπερβαλλόντως⸃, ἐν θανάτοις πολλάκις·
translation:
  text: 'Are they servants of the Messiah? I am speaking as if insane: I am more so—
    in labors more abundantly, in imprisonments more abundantly, in beatings beyond
    measure, in deaths often.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ'': ''Are they servants of Christ?'''
    reason: alternative_reading
  - marker: b
    text: Literally 'in deaths often,' likely meaning repeated brushes with death
      or mortal dangers.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάκονοι
  chosen: servants
  alternatives:
  - ministers
  lexicon: BDAG
  rationale: διάκονος commonly denotes one who serves or ministers. 'Servants' is
    more transparent and less ecclesiastically loaded than 'ministers' in modern English,
    and fits Paul's ironic comparison with rival workers.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where functioning as a title
    rather than a name-like identifier. Here it is a titular genitive ('servants of
    the Messiah'). The traditional 'Christ' is preserved as an alternative.
- source_word: παραφρονῶν λαλῶ
  chosen: I am speaking as if insane
  alternatives:
  - I am speaking like a madman
  - I am out of my mind to talk like this
  lexicon: BDAG
  rationale: The participle παραφρονῶν with λαλῶ conveys Paul's self-conscious admission
    that his boasting sounds irrational or mad. 'As if insane' preserves the comparative
    force without over-colloquializing.
- source_word: ὑπὲρ ἐγώ
  chosen: I am more so
  alternatives:
  - I am more
  - I am even more
  lexicon: BDAG
  rationale: The compressed Greek is elliptical after the comparison with the false
    apostles. 'I am more so' makes the ellipsis intelligible in English while preserving
    the comparative claim.
- source_word: ἐν κόποις
  chosen: in labors
  alternatives:
  - in toils
  - in hard work
  lexicon: BDAG
  rationale: κόπος often denotes laborious effort or toil. 'Labors' is natural, concise,
    and preserves the sense of strenuous apostolic work.
- source_word: περισσοτέρως
  chosen: more abundantly
  alternatives:
  - more
  - more often
  - to a greater degree
  lexicon: BDAG
  rationale: The adverb intensifies the comparison. 'More abundantly' reflects the
    comparative force with a slightly formal register suitable to Paul's rhetoric;
    it is repeated for consistency in the first two phrases.
- source_word: φυλακαῖς
  chosen: imprisonments
  alternatives:
  - prisons
  - jailings
  lexicon: BDAG
  rationale: The plural refers to repeated experiences of confinement, not merely
    locations. 'Imprisonments' better captures repeated episodes than 'prisons.'
- source_word: πληγαῖς
  chosen: beatings
  alternatives:
  - blows
  - floggings
  lexicon: BDAG
  rationale: πληγή can mean a blow, wound, or beating. In this catalog of sufferings,
    'beatings' best communicates inflicted physical punishment without narrowing too
    specifically to formal flogging.
- source_word: ὑπερβαλλόντως
  chosen: beyond measure
  alternatives:
  - excessively
  - extraordinarily
  lexicon: BDAG
  rationale: The adverb expresses excess beyond ordinary degree. 'Beyond measure'
    preserves the rhetorical intensity and echoes traditional phrasing without sounding
    archaic in context.
- source_word: ἐν θανάτοις πολλάκις
  chosen: in deaths often
  alternatives:
  - often near death
  - frequently facing death
  lexicon: BDAG
  rationale: The plural 'deaths' is striking and likely idiomatic for repeated brushes
    with death or mortal dangers. 'In deaths often' preserves the metaphorical force
    and the unusual plural more closely than smoothing it into an interpretive paraphrase.
