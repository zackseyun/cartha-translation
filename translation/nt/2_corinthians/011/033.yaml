id: 2CO.11.33
reference: 2 Corinthians 11:33
source:
  edition: SBLGNT
  text: καὶ διὰ θυρίδος ἐν σαργάνῃ ἐχαλάσθην διὰ τοῦ τείχους καὶ ἐξέφυγον τὰς χεῖρας
    αὐτοῦ.
translation:
  text: and through a window in a basket I was lowered through the wall and escaped
    his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was let down through the wall in a rope-basket.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρίδος
  chosen: window
  alternatives:
  - opening
  lexicon: BDAG
  rationale: θυρίς denotes a window or small opening. 'Window' is the most natural
    and specific English equivalent here.
- source_word: σαργάνῃ
  chosen: basket
  alternatives:
  - rope-basket
  - wicker basket
  lexicon: BDAG
  rationale: σαργάνη refers to a plaited or woven container, likely of rope or wicker.
    'Basket' is clear modern English; the more specific material nuance is preserved
    as an alternative.
- source_word: ἐχαλάσθην
  chosen: I was lowered
  alternatives:
  - I was let down
  lexicon: BDAG
  rationale: Passive of χαλάω here means to be lowered by means of a rope or similar
    device. 'I was lowered' is idiomatic and accurate; 'let down' is traditional but
    slightly less explicit.
- source_word: διὰ τοῦ τείχους
  chosen: through the wall
  alternatives:
  - through the city wall
  - along the wall
  lexicon: BDAG
  rationale: The phrase indicates passage by means of an opening in the wall, not
    merely beside it. 'Through the wall' best matches the Greek; 'city wall' is contextually
    possible but not explicit in the text.
- source_word: ἐξέφυγον τὰς χεῖρας αὐτοῦ
  chosen: escaped his hands
  alternatives:
  - escaped from his hands
  - escaped him
  lexicon: BDAG
  rationale: The idiom 'escaped his hands' closely reflects the Greek expression for
    evading someone's grasp or power. It preserves the vividness of the source better
    than the flatter 'escaped him'.
