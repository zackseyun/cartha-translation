theological_decisions:
- issue: Rendering of σάρξ in the idiom κατὰ σάρκα
  chosen_reading: according to the flesh
  alternative_readings:
  - by human standards
  - in a merely human way
  rationale: DOCTRINE.md gives 'flesh' as the default literal rendering for σάρξ,
    with contextual variance documented when metaphorical. In this verse Paul refers
    to boasting on merely human/worldly grounds, but preserving 'flesh' in the main
    text retains Pauline theological texture and avoids over-resolving the idiom into
    interpretation. An idiomatic alternative is preserved in a footnote for clarity.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy
