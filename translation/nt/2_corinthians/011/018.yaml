id: 2CO.11.18
reference: 2 Corinthians 11:18
source:
  edition: SBLGNT
  text: ἐπεὶ πολλοὶ καυχῶνται ⸀κατὰ σάρκα, κἀγὼ καυχήσομαι.
translation:
  text: Since many boast according to the flesh, I too will boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by human standards' or 'in a merely human way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: Since
  alternatives:
  - because
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the grounds for Paul's ironic resolve in the following clause.
    'Since' is natural English and preserves the causal force without sounding overly
    formal.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Straightforward quantitative adjective; 'many' is the natural and sufficiently
    formal rendering.
- source_word: καυχῶνται
  chosen: boast
  alternatives:
  - take pride
  - glory
  lexicon: BDAG
  rationale: καυχάομαι in Paul commonly means 'boast' or 'glory.' 'Boast' best fits
    the ironic and polemical tone of this context and maintains consistency with the
    future καυχήσομαι later in the verse.
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - by human standards
  - in a merely human way
  lexicon: BDAG
  rationale: The phrase is idiomatic, but 'flesh' should be preserved here because
    σάρξ is a contested theological term and the context points to worldly, merely
    human grounds of boasting rather than specifically 'sinful nature.' 'According
    to the flesh' keeps Paul's wording and theological texture, while the idiomatic
    sense can be clarified in a footnote.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - human standards
  - merely human terms
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' when possible, with contextual
    alternatives documented. Here it refers to human, worldly criteria rather than
    the physical body.
- source_word: κἀγὼ
  chosen: I too
  alternatives:
  - I also
  - even I
  lexicon: BDAG
  rationale: Captures the emphatic conjunction of καί + ἐγώ and Paul's rhetorical
    mirroring of his opponents.
- source_word: καυχήσομαι
  chosen: will boast
  alternatives:
  - will glory
  - will brag
  lexicon: BDAG
  rationale: Future middle of καυχάομαι; 'will boast' preserves the verbal repetition
    from earlier in the verse and reflects Paul's announced rhetorical strategy in
    the immediate context.
