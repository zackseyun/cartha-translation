id: 2CO.11.16
reference: 2 Corinthians 11:16
source:
  edition: SBLGNT
  text: Πάλιν λέγω, μή τίς με δόξῃ ἄφρονα εἶναι— εἰ δὲ μή γε, κἂν ὡς ἄφρονα δέξασθέ
    με, ἵνα κἀγὼ μικρόν τι καυχήσωμαι·
translation:
  text: Again I say, let no one think me to be foolish—but if otherwise, then receive
    me even as foolish, so that I too may boast a little.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let no one think me a fool ... receive me even as a fool.' The Greek
      adjective ἄφρων can be rendered either adjectivally ('foolish') or substantivally
      ('a fool').
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Once more
  lexicon: BDAG
  rationale: Adverb marking repetition of Paul's appeal; 'Again' is natural and concise.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I am saying
  lexicon: BDAG
  rationale: Present indicative used idiomatically for direct discourse; simple present
    fits English style.
- source_word: μή τίς με δόξῃ ἄφρονα εἶναι
  chosen: let no one think me to be foolish
  alternatives:
  - let no one suppose that I am a fool
  - let no one consider me foolish
  lexicon: BDAG
  rationale: μή with aorist subjunctive expresses a prohibition or negative wish.
    'Think me to be foolish' preserves the sense of δοκέω plus infinitive without
    over-literal awkwardness.
- source_word: ἄφρονα
  chosen: foolish
  alternatives:
  - a fool
  lexicon: BDAG
  rationale: The adjective can function substantivally, but here 'foolish' works smoothly
    with 'think me to be.' The second occurrence is likewise rendered adjectivally
    after ὡς. This preserves Paul's ironic self-characterization without forcing a
    noun in both places.
- source_word: εἰ δὲ μή γε
  chosen: but if otherwise
  alternatives:
  - but if not
  - but if indeed not
  lexicon: BDAG
  rationale: 'This compact phrase signals an alternative concession: if they will
    not grant the previous request, then at least do the following. ''But if otherwise''
    captures the rhetorical turn more clearly than a bare ''if not.'''
- source_word: κἂν
  chosen: even
  alternatives:
  - at least
  - even if
  lexicon: BDAG
  rationale: 'In context κἂν introduces a concessive nuance with the imperative: ''receive
    me even as foolish.'' ''Even'' preserves the concessive force in idiomatic English.'
- source_word: ὡς ἄφρονα
  chosen: as foolish
  alternatives:
  - as a fool
  lexicon: BDAG
  rationale: Rendered adjectivally for consistency with the earlier phrase and to
    avoid overloading the line with repeated noun forms. The sense remains that they
    are to regard him under the category of foolishness for the sake of his argument.
- source_word: δέξασθέ με
  chosen: receive me
  alternatives:
  - accept me
  lexicon: BDAG
  rationale: Aorist middle imperative calls for welcoming or accepting Paul in this
    rhetorical posture. 'Receive me' preserves the directness and echoes common NT
    idiom.
- source_word: ἵνα κἀγὼ
  chosen: so that I too
  alternatives:
  - that I also
  - in order that I too
  lexicon: BDAG
  rationale: 'ἵνα gives purpose/result in this rhetorical context; ''so that'' is
    natural English, and κἀγώ emphasizes Paul''s inclusion: ''I too.'''
- source_word: μικρόν τι
  chosen: a little
  alternatives:
  - a little bit
  - somewhat
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'to a small extent.' 'A little' is concise
    and natural.
- source_word: καυχήσωμαι
  chosen: may boast
  alternatives:
  - might boast
  lexicon: BDAG
  rationale: Subjunctive after ἵνα is well represented by 'may boast.' The verb should
    remain 'boast,' since Paul's ironic self-defense in this context explicitly uses
    boasting language rather than a softened paraphrase.
