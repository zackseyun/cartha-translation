theological_decisions:
- issue: Paul's ironic self-description with ἄφρων language
  chosen_reading: Retain 'foolish'/'boast' language without softening the irony
  alternative_readings:
  - Use 'fool' in both instances
  - Paraphrase as 'speaking rashly'
  rationale: The verse is rhetorically charged, with Paul conceding the appearance
    of folly in order to engage in reluctant boasting. A translation should preserve
    that tension rather than resolve or mute it.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
