theological_decisions:
- issue: Reference of 'different spirit'
  chosen_reading: Rendered generically as 'a different spirit' without specifying
    whether Paul means the Holy Spirit falsely presented, a demonic spirit, or a different
    spiritual influence.
  alternative_readings:
  - the Holy Spirit misrepresented by false teachers
  - a demonic spirit
  - a different spiritual disposition or experience
  rationale: The Greek phrase is intentionally broad, and the immediate context does
    not require the translator to resolve the referent. Preserving the ambiguity follows
    the doctrine's instruction to preserve theological tension rather than resolve
    it.
  doctrine_reference: Translation philosophy §3
- issue: Tone of καλῶς ἀνέχεσθε
  chosen_reading: 'Treated as ironic rebuke: ''you put up with it well enough.'''
  alternative_readings:
  - straightforward commendation
  - neutral observation
  rationale: In context Paul is criticizing the Corinthians' readiness to tolerate
    rival teachers, not praising them. The English wording signals irony while staying
    close to the Greek idiom.
