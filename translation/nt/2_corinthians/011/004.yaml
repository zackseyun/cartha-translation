id: 2CO.11.4
reference: 2 Corinthians 11:4
source:
  edition: SBLGNT
  text: εἰ μὲν γὰρ ὁ ἐρχόμενος ἄλλον Ἰησοῦν κηρύσσει ὃν οὐκ ἐκηρύξαμεν, ἢ πνεῦμα ἕτερον
    λαμβάνετε ὃ οὐκ ἐλάβετε, ἢ εὐαγγέλιον ἕτερον ὃ οὐκ ἐδέξασθε, καλῶς ⸀ἀνέχεσθε.
translation:
  text: For if someone comes and proclaims another Jesus, whom we did not proclaim,
    or if you receive a different spirit, which you did not receive, or a different
    gospel, which you did not accept, you put up with it well enough.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another spirit.' The Greek uses a term that can mean 'different' or
      'another,' here likely emphasizing a spirit different from the one they had
      previously received.
    reason: lexical_alternative
  - marker: b
    text: Or 'another gospel.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'you put up with it well enough' is likely ironic, meaning the
      Corinthians were too ready to tolerate such claims.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐρχόμενος
  chosen: someone comes
  alternatives:
  - the one who comes
  - the one coming
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    generically to a person who arrives among them. 'Someone comes' is natural modern
    English and preserves the indefinite force in context better than the more wooden
    'the one coming.'
- source_word: ἄλλον Ἰησοῦν
  chosen: another Jesus
  alternatives:
  - a different Jesus
  lexicon: BDAG
  rationale: ἄλλος commonly means 'another' of the same kind or simply 'another.'
    Here 'another Jesus' is the established and clearest English rendering. It preserves
    Paul's warning that a rival proclamation uses the same name 'Jesus' but presents
    a different figure.
- source_word: κηρύσσει / ἐκηρύξαμεν
  chosen: proclaims / did not proclaim
  alternatives:
  - preaches / did not preach
  - announces / did not announce
  lexicon: BDAG
  rationale: 'κηρύσσω is well rendered by ''proclaim'' in Pauline contexts: it is
    public heralding, not merely teaching. ''Proclaim'' is slightly more transparent
    to modern readers than ''preach'' while retaining the formal sense.'
- source_word: πνεῦμα ἕτερον
  chosen: a different spirit
  alternatives:
  - another spirit
  lexicon: BDAG
  rationale: ἕτερος often emphasizes difference in kind, so 'different' is preferable
    here, especially since Paul contrasts what they had previously received with a
    qualitatively different spiritual influence or claim.
- source_word: λαμβάνετε / ἐλάβετε
  chosen: receive / did not receive
  alternatives:
  - are receiving / did not receive
  - accept / did not accept
  lexicon: BDAG
  rationale: λαμβάνω here refers to receiving something offered or imparted. 'Receive'
    works naturally for both present and aorist forms and distinguishes this clause
    from ἐδέξασθε in the next clause.
- source_word: εὐαγγέλιον ἕτερον
  chosen: a different gospel
  alternatives:
  - another gospel
  lexicon: BDAG
  rationale: As with ἕτερον above, 'different' best reflects the adjective's contrastive
    force. 'Gospel' is the standard and clearest rendering of εὐαγγέλιον in Pauline
    usage.
- source_word: ἐδέξασθε
  chosen: did not accept
  alternatives:
  - did not welcome
  - did not receive
  lexicon: BDAG
  rationale: δέχομαι often carries the nuance of welcoming or accepting. Rendering
    it 'accept' preserves a distinction from the previous λαμβάνω ('receive') while
    remaining idiomatic.
- source_word: καλῶς ἀνέχεσθε
  chosen: you put up with it well enough
  alternatives:
  - you bear with it gladly
  - you tolerate it well
  - you put up with him readily
  lexicon: BDAG
  rationale: ἀνέχομαι means to endure or put up with; καλῶς can be taken idiomatically,
    often with irony, as 'well enough' or 'readily.' The phrase is likely ironic in
    context, rebuking the Corinthians for their tolerance of false teaching. 'Put
    up with it well enough' captures both the idiom and the irony without over-paraphrasing.
- source_word: εἰ μὲν γὰρ
  chosen: For if
  alternatives:
  - For indeed if
  - If indeed
  lexicon: BDAG
  rationale: The particle cluster introduces Paul's explanation and conditional setup.
    English does not naturally reproduce every particle, so 'For if' captures the
    argumentative flow without awkwardness.
