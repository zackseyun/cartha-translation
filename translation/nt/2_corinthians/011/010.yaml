id: 2CO.11.10
reference: 2 Corinthians 11:10
source:
  edition: SBLGNT
  text: ἔστιν ἀλήθεια Χριστοῦ ἐν ἐμοὶ ὅτι ἡ καύχησις αὕτη οὐ φραγήσεται εἰς ἐμὲ ἐν
    τοῖς κλίμασι τῆς Ἀχαΐας.
translation:
  text: As the truth of the Messiah is in me, this boasting will not be silenced in
    regard to me in the regions of Achaia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the truth of Christ is in me.'
    reason: alternative_reading
  - marker: b
    text: Or, 'this boasting will not be stopped for me' or 'this boast will not be
      shut off from me.' The Greek expression is idiomatic and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια Χριστοῦ
  chosen: the truth of the Messiah
  alternatives:
  - the Messiah's truth
  - truth in Messiah
  - the truth of Christ
  lexicon: BDAG
  rationale: 'Genitive construction taken most naturally as a genitive of relation/possession:
    the truth that belongs to or is bound up with the Messiah. Per doctrine, Χριστός
    is rendered ''Messiah'' where functioning as a title rather than a name-like proper
    noun.'
- source_word: ἐν ἐμοὶ
  chosen: is in me
  alternatives:
  - is with me
  - is within me
  lexicon: BDAG
  rationale: A straightforward locative/instrumental expression. 'In me' preserves
    Paul's solemn oath-like assertion without over-interpreting the phrase.
- source_word: ὅτι
  chosen: As
  alternatives:
  - that
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of Paul's solemn assertion in a way that
    functions idiomatically in English like an oath formula. 'As' captures the force
    of 'as surely as' without adding words not present in Greek.
- source_word: καύχησις
  chosen: boasting
  alternatives:
  - boast
  - ground of boasting
  lexicon: BDAG
  rationale: The noun denotes the act/content of boasting. 'Boasting' is more natural
    here than 'boast' and preserves the abstract noun form.
- source_word: φραγήσεται
  chosen: will not be silenced
  alternatives:
  - will not be stopped
  - will not be shut off
  - will not be barred
  lexicon: BDAG
  rationale: Future passive of φράσσω literally involves stopping up or blocking.
    In this context of Paul's continued boasting, 'will not be silenced' communicates
    the metaphor naturally in English while preserving the passive sense.
- source_word: εἰς ἐμὲ
  chosen: in regard to me
  alternatives:
  - for me
  - against me
  - toward me
  lexicon: BDAG
  rationale: The idiom is difficult if rendered woodenly as 'unto me.' In context
    it indicates that this boasting will not be shut off as it concerns Paul himself.
    'In regard to me' is clear and contextually fitting.
- source_word: ἐν τοῖς κλίμασι τῆς Ἀχαΐας
  chosen: in the regions of Achaia
  alternatives:
  - in the districts of Achaia
  - in the parts of Achaia
  - throughout Achaia
  lexicon: BDAG
  rationale: κλίμασι refers to regions or districts. 'Regions of Achaia' is natural
    modern English and preserves the plural nuance better than simply 'in Achaia'.
- source_word: Ἀχαΐας
  chosen: Achaia
  lexicon: BDAG
  rationale: Standard transliteration of the Roman province name, in keeping with
    the policy to transliterate names.
