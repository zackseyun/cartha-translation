theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here rather than merely a name-like designation.
    Following the doctrine's contested-terms guidance, 'Messiah' is preferred where
    context supports title force, while the traditional 'Christ' is preserved as an
    alternative.
