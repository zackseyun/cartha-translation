id: 2CO.11.29
reference: 2 Corinthians 11:29
source:
  edition: SBLGNT
  text: τίς ἀσθενεῖ, καὶ οὐκ ἀσθενῶ; τίς σκανδαλίζεται καὶ οὐκ ἐγὼ πυροῦμαι;
translation:
  text: Who is weak, and I am not weak? Who is caused to stumble, and I do not burn?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who is made to stumble, and I do not burn with indignation?' The Greek
      'burn' is metaphorical and may express intense grief, zeal, or indignation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενεῖ / ἀσθενῶ
  chosen: is weak / am weak
  alternatives:
  - is sick / am sick
  - is powerless / am powerless
  lexicon: BDAG
  rationale: ἀσθενέω commonly denotes weakness, whether physical, social, or spiritual.
    In this context Paul is expressing empathetic participation in the frailty of
    others, so 'weak' preserves the breadth better than the narrower 'sick'.
- source_word: σκανδαλίζεται
  chosen: is caused to stumble
  alternatives:
  - is offended
  - falls into sin
  - is led into sin
  lexicon: BDAG
  rationale: The passive form suggests someone being tripped up or brought into spiritual/moral
    danger. 'Is caused to stumble' preserves the metaphor and leaves open whether
    the result is offense, sin, or spiritual downfall.
- source_word: πυροῦμαι
  chosen: burn
  alternatives:
  - burn with indignation
  - am inflamed
  - am deeply troubled
  lexicon: BDAG
  rationale: πυρόομαι literally means to burn or be set on fire, here metaphorically
    for intense inner agitation. 'Burn' keeps the vivid metaphor in the main text
    without over-specifying whether the emotion is grief, zeal, or indignation; the
    likely nuance can be preserved in a footnote.
- source_word: τίς
  chosen: Who
  alternatives:
  - What person
  lexicon: BDAG
  rationale: τίς introduces rhetorical questions about persons. 'Who' is the natural
    and accurate English equivalent.
- source_word: καὶ οὐκ ἐγὼ
  chosen: and I do not
  alternatives:
  - and do I not
  - and am I not
  lexicon: BDAG
  rationale: The explicit ἐγώ adds emphasis. English can reflect this adequately in
    the rhetorical structure without awkward overemphasis; 'and I do not' preserves
    the force in idiomatic form.
