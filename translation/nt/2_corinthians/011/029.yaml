theological_decisions:
- issue: Nature of Paul's response in πυροῦμαι
  chosen_reading: Retain the metaphor 'burn' without specifying the exact emotion
    in the main text.
  alternative_readings:
  - burn with indignation
  - burn with grief
  - am inwardly aflame
  rationale: The verse communicates Paul's deep solidarity and emotional involvement,
    but the Greek metaphor itself does not force a single psychological nuance. Preserving
    the metaphor maintains the text's theological and pastoral tension rather than
    resolving it beyond what the source warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
