id: 2CO.11.17
reference: 2 Corinthians 11:17
source:
  edition: SBLGNT
  text: ὃ λαλῶ οὐ ⸂κατὰ κύριον λαλῶ⸃, ἀλλ’ ὡς ἐν ἀφροσύνῃ, ἐν ταύτῃ τῇ ὑποστάσει τῆς
    καυχήσεως.
translation:
  text: What I am saying, I am not saying according to the Lord, but as in foolishness,
    in this confidence of boasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am not saying this as from the Lord,' or 'by the Lord’s standard.'
    reason: alternative_reading
  - marker: b
    text: Or, 'but as though in foolishness,' or more idiomatically, 'but as a fool.'
    reason: lexical_alternative
  - marker: c
    text: The Greek word rendered 'confidence' can also mean 'matter,' 'basis,' or
      'undertaking' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ λαλῶ
  chosen: What I am saying
  alternatives:
  - What I speak
  - What I am speaking
  lexicon: BDAG
  rationale: The neuter relative pronoun with λαλέω introduces the content of Paul's
    present speech. 'What I am saying' is idiomatic modern English and preserves the
    ongoing present sense.
- source_word: κατὰ κύριον
  chosen: according to the Lord
  alternatives:
  - as from the Lord
  - by the Lord's standard
  lexicon: BDAG
  rationale: κατά with the accusative here expresses norm or standard. 'According
    to the Lord' preserves the ambiguity of whether Paul means in keeping with the
    Lord's manner/authority/standard, without over-interpreting.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context it
    most naturally refers to the Lord Jesus without needing expansion in the main
    text.
- source_word: ἀλλ’ ὡς ἐν ἀφροσύνῃ
  chosen: but as in foolishness
  alternatives:
  - but as though in foolishness
  - but as a fool
  lexicon: BDAG
  rationale: Paul qualifies his boasting as if spoken within the sphere or mode of
    folly. 'As in foolishness' stays close to the Greek and avoids collapsing the
    nuance into a direct self-identification, though that sense is implicit.
- source_word: ἐν ταύτῃ τῇ ὑποστάσει
  chosen: in this confidence
  alternatives:
  - in this matter
  - in this undertaking
  - in this assurance
  lexicon: BDAG
  rationale: ὑπόστασις in this context is difficult; here it likely denotes the basis
    or confident stance from which boasting proceeds. 'Confidence' best fits the immediate
    context of boastful self-assertion and aligns with common Pauline usage in nearby
    passages.
- source_word: τῆς καυχήσεως
  chosen: of boasting
  alternatives:
  - of this boast
  - of boasting confidence
  lexicon: BDAG
  rationale: The genitive specifies the sphere/content of the confidence. 'Of boasting'
    preserves the verbal force of καύχησις and keeps the phrase transparent.
