theological_decisions:
- issue: Referent and force of 'according to the Lord'
  chosen_reading: Paul says his forthcoming boast is not spoken according to the Lord's
    standard or manner, but as speech marked by foolishness.
  alternative_readings:
  - Paul means he lacks direct dominical quotation or command here.
  - Paul means the content is not truly from the Lord at all.
  rationale: The phrase most naturally marks rhetorical mode rather than denying inspiration
    or truthfulness. Paul distances this boasting style from the Lord's pattern while
    still using it for pastoral argument.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
