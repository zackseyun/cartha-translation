theological_decisions:
- issue: Paul's self-description as engaging in 'foolishness'
  chosen_reading: Retained as rhetorical self-deprecation rather than softened paraphrase
  alternative_readings:
  - a little folly
  - a little nonsense
  rationale: The verse introduces Paul's ironic 'boasting' section. The translation
    preserves the rhetorical tension without diluting it into casual language.
  doctrine_reference: Translation philosophy §3, §6
