id: 2CO.11.25
reference: 2 Corinthians 11:25
source:
  edition: SBLGNT
  text: τρὶς ἐραβδίσθην, ἅπαξ ἐλιθάσθην, τρὶς ἐναυάγησα, νυχθήμερον ἐν τῷ βυθῷ πεποίηκα·
translation:
  text: Three times I was beaten with rods, once I was stoned, three times I was shipwrecked;
    I have spent a night and a day in the deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the open sea" for "in the deep."
    reason: lexical_alternative
lexical_decisions:
- source_word: τρὶς
  chosen: three times
  lexicon: BDAG
  rationale: Standard adverbial rendering indicating repeated occurrence; repeated
    consistently for both instances in the verse.
- source_word: ἐραβδίσθην
  chosen: I was beaten with rods
  alternatives:
  - I was flogged with rods
  - I was caned
  lexicon: BDAG
  rationale: The passive of ῥαβδίζω specifically denotes beating with rods, so the
    instrument should be made explicit in English rather than reduced to the generic
    'beaten.'
- source_word: ἅπαξ
  chosen: once
  alternatives:
  - one time
  lexicon: BDAG
  rationale: Natural English adverb matching the single occurrence.
- source_word: ἐλιθάσθην
  chosen: I was stoned
  alternatives:
  - I was pelted with stones
  lexicon: BDAG
  rationale: Established and accurate rendering of λιθάζω in judicial/violent context;
    concise and idiomatic.
- source_word: ἐναυάγησα
  chosen: I was shipwrecked
  alternatives:
  - I suffered shipwreck
  - I was in a shipwreck
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of ναυαγέω; preserves the event-focused
    sense.
- source_word: νυχθήμερον
  chosen: a night and a day
  alternatives:
  - a full day
  - twenty-four hours
  lexicon: BDAG
  rationale: The noun denotes a night-and-day period. 'A night and a day' preserves
    the sequence and avoids over-precise modernization such as 'twenty-four hours.'
- source_word: ἐν τῷ βυθῷ
  chosen: in the deep
  alternatives:
  - in the open sea
  - in the depths
  lexicon: BDAG
  rationale: βυθός here refers to the deep sea/waters. 'In the deep' is concise, traditional
    enough to be recognizable, and faithful without over-interpreting the exact circumstance.
- source_word: πεποίηκα
  chosen: I have spent
  alternatives:
  - I have passed
  - I have been
  lexicon: BDAG
  rationale: ποιέω with a time expression can idiomatically mean 'spend' or 'pass'
    time. 'I have spent' is natural modern English and fits the perfect tense's retrospective
    force.
