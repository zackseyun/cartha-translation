theological_decisions:
- issue: Nature of Paul's 'jealousy'
  chosen_reading: Paul claims a jealousy that reflects God's own covenantal jealousy,
    not sinful envy.
  alternative_readings:
  - Paul speaks only of personal zeal without explicit divine-covenantal overtones
  rationale: The phrase θεοῦ ζήλῳ naturally suggests jealousy sourced in or patterned
    after God. The marital imagery reinforces covenantal exclusivity, so the translation
    preserves 'jealousy' rather than softening to mere 'zeal.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md specifies 'Messiah' where Χριστός functions as a title. In
    this verse it is not merely a proper-name substitute but the designated bridegroom
    figure.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
