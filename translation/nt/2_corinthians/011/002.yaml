id: 2CO.11.2
reference: 2 Corinthians 11:2
source:
  edition: SBLGNT
  text: ζηλῶ γὰρ ὑμᾶς θεοῦ ζήλῳ, ἡρμοσάμην γὰρ ὑμᾶς ἑνὶ ἀνδρὶ παρθένον ἁγνὴν παραστῆσαι
    τῷ Χριστῷ·
translation:
  text: For I am jealous for you with God’s jealousy, because I betrothed you to one
    husband, to present you as a pure virgin to the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a godly jealousy.' The Greek may mean jealousy belonging to God
      or jealousy characterized by God.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to Christ.'' Greek: ''to the Messiah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ζηλῶ
  chosen: I am jealous for
  alternatives:
  - I am zealous for
  - I am jealous over
  lexicon: BDAG
  rationale: The verb can denote either positive zeal or protective jealousy. In this
    marital-betrothal metaphor, 'jealous for' best preserves Paul's protective, covenantal
    concern without implying petty envy.
- source_word: θεοῦ ζήλῳ
  chosen: with God’s jealousy
  alternatives:
  - with a godly jealousy
  - with divine jealousy
  lexicon: BDAG
  rationale: 'The genitive θεοῦ is rendered straightforwardly as possessive: the jealousy
    belongs to God or is characterized by him. ''God’s jealousy'' is more direct to
    the Greek than the traditional interpretive paraphrase ''godly jealousy,'' though
    that sense is preserved.'
- source_word: ἡρμοσάμην
  chosen: I betrothed
  alternatives:
  - I promised in marriage
  - I engaged
  lexicon: BDAG
  rationale: The middle voice and marriage context indicate arranging or pledging
    in marriage. 'Betrothed' is concise, natural, and preserves the formal marital
    imagery better than the more modern but weaker 'engaged'.
- source_word: ἑνὶ ἀνδρὶ
  chosen: to one husband
  alternatives:
  - to one man
  lexicon: BDAG
  rationale: Although ἀνήρ can mean 'man' or 'husband,' the bridal metaphor makes
    'husband' the clearer contextual sense in English.
- source_word: παρθένον
  chosen: virgin
  alternatives:
  - maiden
  lexicon: BDAG
  rationale: The noun denotes a virgin; retaining the term preserves the purity and
    bridal imagery central to Paul's metaphor.
- source_word: ἁγνὴν
  chosen: pure
  alternatives:
  - chaste
  - undefiled
  lexicon: BDAG
  rationale: '''Pure'' is clear modern English and captures moral/ritual purity in
    context. ''Chaste'' is possible but sounds more archaic and narrower.'
- source_word: παραστῆσαι
  chosen: to present
  alternatives:
  - to bring before
  lexicon: BDAG
  rationale: A common Pauline term for presenting someone before another, here in
    an eschatological or ceremonial sense. 'To present' is both natural and sufficiently
    formal.
- source_word: τῷ Χριστῷ
  chosen: to the Messiah
  alternatives:
  - to Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions
    as a title. Here the bridal imagery and explicit article support title force rather
    than a name-like use.
