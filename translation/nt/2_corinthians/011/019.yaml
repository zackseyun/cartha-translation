theological_decisions:
- issue: Paul's ironic rhetoric toward the Corinthians
  chosen_reading: Render the statement straightforwardly in English while preserving
    the irony through lexical choices ('gladly,' 'put up with,' 'wise').
  alternative_readings:
  - Make the irony more explicit with punctuation or paraphrase, e.g., 'since you
    are so wise yourselves'
  rationale: The Greek itself signals irony by juxtaposing 'fools' and 'wise.' A transparent
    translation should preserve that tension without adding interpretive wording not
    present in the text.
  doctrine_reference: Translation philosophy §1, §3, §6
