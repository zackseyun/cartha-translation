id: 2CO.11.19
reference: 2 Corinthians 11:19
source:
  edition: SBLGNT
  text: ἡδέως γὰρ ἀνέχεσθε τῶν ἀφρόνων φρόνιμοι ὄντες·
translation:
  text: For you gladly put up with fools, being wise yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear with fools.'
    reason: lexical_alternative
  - marker: b
    text: 'Paul is speaking ironically: the Corinthians consider themselves wise,
      yet they tolerate foolish leaders.'
    reason: cultural_note
lexical_decisions:
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - readily
  - with pleasure
  lexicon: BDAG
  rationale: Adverb expressing willing or pleased acceptance. 'Gladly' is natural
    modern English and preserves Paul's ironic tone better than the more wooden 'with
    pleasure.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    preserves the connective force in a concise, idiomatic way.
- source_word: ἀνέχεσθε
  chosen: put up with
  alternatives:
  - bear with
  - tolerate
  lexicon: BDAG
  rationale: The verb means to endure or tolerate someone/something. 'Put up with'
    best captures the colloquial, slightly sharp force in context, fitting Paul's
    sarcasm. 'Bear with' is possible but sounds more formal and can soften the rebuke.
- source_word: τῶν ἀφρόνων
  chosen: fools
  alternatives:
  - the foolish
  - senseless people
  lexicon: BDAG
  rationale: Genitive object after ἀνέχεσθε, referring to foolish persons. 'Fools'
    is the most direct and idiomatic rendering in English and matches Paul's rhetorical
    contrast with 'wise.'
- source_word: φρόνιμοι
  chosen: wise
  alternatives:
  - sensible
  - prudent
  lexicon: BDAG
  rationale: Describes the Corinthians as 'wise' in an ironic sense. 'Wise' preserves
    the lexical contrast with 'fools' and keeps the sarcasm transparent.
- source_word: ὄντες
  chosen: being
  alternatives:
  - since you are
  - though you are
  lexicon: BDAG
  rationale: Present participle linked to φρόνιμοι. 'Being wise yourselves' preserves
    the participial structure without over-interpreting whether the nuance is causal
    or concessive; the irony remains intact.
