id: 2CO.11.8
reference: 2 Corinthians 11:8
source:
  edition: SBLGNT
  text: ἄλλας ἐκκλησίας ἐσύλησα λαβὼν ὀψώνιον πρὸς τὴν ὑμῶν διακονίαν,
translation:
  text: I robbed other churches by accepting support for serving you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'wages' or 'pay.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλας ἐκκλησίας
  chosen: other churches
  alternatives:
  - other assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage ordinarily refers to local Christian congregations/churches.
    'Churches' is the most natural modern English rendering here.
- source_word: ἐσύλησα
  chosen: robbed
  alternatives:
  - plundered
  - despoiled
  lexicon: BDAG
  rationale: συλάω is a strong verb meaning to strip, plunder, or rob. Paul is using
    deliberate hyperbole/irony about receiving aid from other churches while ministering
    in Corinth. 'Robbed' preserves the rhetorical sharpness better than softer options.
- source_word: λαβὼν
  chosen: by accepting
  alternatives:
  - taking
  - having received
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/instrumental in sense here,
    explaining how Paul 'robbed' other churches. 'By accepting' gives clear English
    syntax while preserving the participial relationship.
- source_word: ὀψώνιον
  chosen: support
  alternatives:
  - wages
  - pay
  lexicon: BDAG
  rationale: ὀψώνιον literally denotes pay/wages, often provisions or soldier's pay.
    In this ministry context, 'support' communicates financial/material assistance
    in idiomatic modern English without implying a commercial employment relationship
    too strongly. The more literal 'wages' is preserved in a footnote.
- source_word: πρὸς τὴν ὑμῶν διακονίαν
  chosen: for serving you
  alternatives:
  - for your service
  - for ministry to you
  lexicon: BDAG
  rationale: 'πρός with the accusative here expresses purpose/reference: the support
    was directed toward Paul''s ministry among the Corinthians. διακονία can mean
    service or ministry; ''for serving you'' is natural English and makes explicit
    that Paul is the one serving them, which the context requires.'
