theological_decisions:
- issue: Rhetorical force of Paul's statement about receiving money from other churches
  chosen_reading: Retain the provocative metaphor 'I robbed other churches' as ironic/hyperbolic
    rhetoric, not a literal confession of theft.
  alternative_readings:
  - Soften to 'I deprived other churches' or 'I took support from other churches'
    in the main text
  rationale: The Greek verb is intentionally forceful. Softening it in the main text
    would mute Paul's self-deprecating irony in defending his apostolic conduct. The
    surrounding context concerns financial support, not actual criminal theft.
  doctrine_reference: Translation philosophy §§1, 6
