theological_decisions:
- issue: Nature of Paul's rhetorical question about financial support and humility
  chosen_reading: Render the question straightforwardly without importing a doctrinal
    judgment about ministerial compensation.
  alternative_readings:
  - A paraphrastic rendering that implies Paul denied a rightful apostolic claim
  - A rendering that softens the irony into mere apology
  rationale: The verse is rhetorical and ironic, but the Greek itself asks whether
    his self-humbling and free proclamation constituted 'sin.' The translation should
    preserve the irony without expanding it into a theological statement beyond the
    text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
