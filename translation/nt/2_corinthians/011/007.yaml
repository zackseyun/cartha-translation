id: 2CO.11.7
reference: 2 Corinthians 11:7
source:
  edition: SBLGNT
  text: Ἢ ἁμαρτίαν ἐποίησα ἐμαυτὸν ταπεινῶν ἵνα ὑμεῖς ὑψωθῆτε, ὅτι δωρεὰν τὸ τοῦ θεοῦ
    εὐαγγέλιον εὐηγγελισάμην ὑμῖν;
translation:
  text: Or did I commit a sin by humbling myself so that you might be exalted, because
    I proclaimed the gospel of God to you free of charge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did I sin.' The Greek idiom is literally 'did I do/make a sin.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'without payment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  chosen: Or
  alternatives:
  - Or was it that
  lexicon: BDAG
  rationale: Introduces a rhetorical alternative/question tied to the preceding argument;
    simple 'Or' preserves Paul's sharp rhetorical style.
- source_word: ἁμαρτίαν ἐποίησα
  chosen: did I commit a sin
  alternatives:
  - did I sin
  - did I do wrong
  lexicon: BDAG
  rationale: The idiom literally 'did I do/make a sin' is naturally rendered 'did
    I commit a sin' in English, preserving the rhetorical force and moral category.
- source_word: ἐμαυτὸν ταπεινῶν
  chosen: by humbling myself
  alternatives:
  - in humbling myself
  - by lowering myself
  lexicon: BDAG
  rationale: The participle modifies Paul's action and is best expressed adverbially.
    'Humbling myself' preserves the reflexive sense without sounding awkward.
- source_word: ἵνα ὑμεῖς ὑψωθῆτε
  chosen: so that you might be exalted
  alternatives:
  - so that you might be lifted up
  - so that you might be raised up
  lexicon: BDAG
  rationale: Retains the purpose clause and the honor/status reversal implied by ὑψόω.
    'Exalted' fits Paul's rhetorical contrast with his self-humbling better than the
    more physical 'lifted up.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - in that
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the content/ground of the supposed 'sin'; 'because' is
    the clearest modern English connector.
- source_word: δωρεὰν
  chosen: free of charge
  alternatives:
  - for free
  - without payment
  lexicon: BDAG
  rationale: Conveys gratuitousness in idiomatic but dignified English. 'For free'
    is too colloquial; 'without payment' is possible but less natural here.
- source_word: τὸ τοῦ θεοῦ εὐαγγέλιον
  chosen: the gospel of God
  alternatives:
  - God's gospel
  - the good news of God
  lexicon: BDAG
  rationale: A formally transparent rendering that preserves the genitival construction
    and familiar Pauline phrasing. 'Good news' is possible but 'gospel' remains clear
    and suitably weighty in this context.
- source_word: εὐηγγελισάμην ὑμῖν
  chosen: I proclaimed ... to you
  alternatives:
  - I preached ... to you
  - I announced the good news to you
  lexicon: BDAG
  rationale: The middle-form verb εὐαγγελίζω is well represented by 'proclaimed' in
    modern English, avoiding overly narrow ecclesial connotations of 'preached' while
    preserving public announcement.
