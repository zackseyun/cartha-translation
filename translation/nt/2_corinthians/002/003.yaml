id: 2CO.2.3
reference: 2 Corinthians 2:3
source:
  edition: SBLGNT
  text: καὶ ⸀ἔγραψα τοῦτο αὐτὸ ἵνα μὴ ἐλθὼν λύπην ⸀σχῶ ἀφ’ ὧν ἔδει με χαίρειν, πεποιθὼς
    ἐπὶ πάντας ὑμᾶς ὅτι ἡ ἐμὴ χαρὰ πάντων ὑμῶν ἐστιν.
translation:
  text: And I wrote this very thing so that, when I came, I might not have grief from
    those who ought to make me rejoice, because I was confident about all of you that
    my joy is the joy of you all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “from those from whom I ought to rejoice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  chosen: I wrote
  alternatives:
  - I have written
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past in this context,
    referring to Paul's prior writing.
- source_word: τοῦτο αὐτὸ
  chosen: this very thing
  alternatives:
  - this same thing
  - exactly this
  lexicon: BDAG
  rationale: The combination is emphatic; 'this very thing' preserves the stress without
    sounding wooden.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose. 'So that' is natural modern English while preserving the
    clause's purposive force.
- source_word: λύπην σχῶ
  chosen: might not have grief
  alternatives:
  - might not have sorrow
  - might not experience pain
  lexicon: BDAG
  rationale: The aorist subjunctive with μή after ἵνα is well conveyed by 'might not
    have.' 'Grief' communicates emotional pain in accessible modern English.
- source_word: ἀφ’ ὧν ἔδει με χαίρειν
  chosen: from those who ought to make me rejoice
  alternatives:
  - from those from whom I ought to rejoice
  - from those who should have been my joy
  lexicon: BDAG
  rationale: 'A more literal rendering is awkward in English. This wording preserves
    the relational sense: these are the people who should be the source of Paul''s
    joy, not grief.'
- source_word: πεποιθὼς ἐπὶ πάντας ὑμᾶς
  chosen: because I was confident about all of you
  alternatives:
  - being confident in all of you
  - having confidence regarding all of you
  lexicon: BDAG
  rationale: The perfect participle gives Paul's settled confidence. Rendering it
    with 'because' makes the participial relation clear and natural in English.
- source_word: ἡ ἐμὴ χαρὰ πάντων ὑμῶν ἐστιν
  chosen: my joy is the joy of you all
  alternatives:
  - my joy belongs to all of you
  - my joy is shared by all of you
  lexicon: BDAG
  rationale: This keeps the near-formal structure while remaining readable, expressing
    shared joy between Paul and the Corinthians.
