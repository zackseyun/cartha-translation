theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: The doctrinal guidance prefers translating Christological titles rather
    than merely transliterating them when context supports the title sense. Although
    'in Christ' is traditional and formulaic in Paul, the title remains semantically
    alive here, so 'in Messiah' better reflects the stated translation philosophy
    while preserving orthodox Christology.
  doctrine_reference: Translate titles; transliterate names. Christos → 'Messiah'
    where title; 'Christ' where name-like.
