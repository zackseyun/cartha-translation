id: 2CO.2.17
reference: 2 Corinthians 2:17
source:
  edition: SBLGNT
  text: οὐ γάρ ἐσμεν ὡς οἱ ⸀πολλοὶ καπηλεύοντες τὸν λόγον τοῦ θεοῦ, ἀλλ’ ὡς ἐξ εἰλικρινείας,
    ἀλλ’ ὡς ἐκ θεοῦ ⸀κατέναντι θεοῦ ἐν Χριστῷ λαλοῦμεν.
translation:
  text: For we are not like the many, peddling the word of God, but from sincerity,
    but from God, before God, we speak in Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'most people' or 'so many others.'
    reason: lexical_alternative
  - marker: b
    text: '''Peddling'' can also carry the sense of adulterating or marketing for
      profit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with sincerity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in the sight of God' or 'in God's presence.'
    reason: lexical_alternative
  - marker: e
    text: 'Traditional: ''in Christ.'''
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πολλοί
  chosen: the many
  alternatives:
  - most people
  - so many others
  rationale: The articular phrase is best preserved as 'the many' rather than flattened
    into 'most people.' It keeps Paul's contrast with his own ministry sharp and avoids
    over-interpreting the group statistically.
- source_word: καπηλεύοντες
  chosen: peddling
  alternatives:
  - hawking for profit
  - adulterating for gain
  - corrupting
  lexicon: BDAG
  rationale: The verb denotes acting like a retailer or huckster, with a strong connotation
    of self-serving trade and likely profiteering. 'Peddling' preserves both the commercial
    image and the moral criticism without over-paraphrasing.
- source_word: λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  rationale: '''The word of God'' is the most direct rendering of the genitival construction
    and keeps the solemn, recognizable Pauline phrasing.'
- source_word: ἐξ εἰλικρινείας
  chosen: from sincerity
  alternatives:
  - with sincerity
  - from pure motives
  lexicon: BDAG
  rationale: The preposition ἐξ/ἐκ is repeated in the clause, so 'from sincerity'
    preserves the source/origin nuance and the rhetorical parallel with 'from God.'
- source_word: ἐκ θεοῦ
  chosen: from God
  alternatives:
  - sent from God
  - out of God
  rationale: A plain rendering best reflects the source language and maintains Paul's
    sequence of ministry-source statements.
- source_word: κατέναντι θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: '''Before God'' is concise and faithful, conveying accountability in
    God''s presence without adding explanatory wording to the main text.'
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where its titular
    sense is still active. Here the phrase identifies the sphere and basis of apostolic
    speaking in relation to the Anointed One, so the title meaning should be preserved.
- source_word: λαλοῦμεν
  chosen: we speak
  alternatives:
  - we are speaking
  - we proclaim
  rationale: The present tense is well represented by 'we speak.' 'Proclaim' would
    be interpretive and somewhat stronger than the Greek verb itself.
