id: 2CO.2.9
reference: 2 Corinthians 2:9
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ καὶ ἔγραψα ἵνα γνῶ τὴν δοκιμὴν ὑμῶν, εἰ εἰς πάντα ὑπήκοοί ἐστε.
translation:
  text: 'For this is why I also wrote: so that I might know your proven character,
    whether you are obedient in everything.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that I might know the test of you' or 'the proof of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  chosen: For this is why
  alternatives:
  - for this
  - for this purpose
  rationale: Idiomatic causal/purposive English that preserves the forward-pointing
    force of the phrase without wooden literalism.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  rationale: Retained as 'also' to reflect the additive force in Paul's explanation
    of why he wrote.
- source_word: ἔγραψα
  chosen: wrote
  alternatives:
  - have written
  rationale: Aorist is best represented here with simple past in natural English.
- source_word: ἵνα γνῶ
  chosen: so that I might know
  alternatives:
  - in order that I may know
  - to find out
  lexicon: BDAG
  rationale: Preserves the purpose clause and the sense of coming to know, avoiding
    an overly paraphrastic rendering.
- source_word: δοκιμή
  chosen: proven character
  alternatives:
  - test
  - proof
  lexicon: BDAG
  rationale: The noun can denote testing or the demonstrated result of testing. In
    this context, linked with obedience, 'proven character' best conveys demonstrated
    genuineness while remaining natural English.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  rationale: Converted the genitive to standard English possessive style.
- source_word: εἰ εἰς πάντα ὑπήκοοί ἐστε
  chosen: whether you are obedient in everything
  alternatives:
  - if you are obedient in all things
  - whether you are obedient in all matters
  lexicon: BDAG
  rationale: Keeps the indirect-question force of εἰ after 'know' and renders εἰς
    πάντα idiomatically as comprehensive obedience.
