id: 2CO.2.11
reference: 2 Corinthians 2:11
source:
  edition: SBLGNT
  text: ἵνα μὴ πλεονεκτηθῶμεν ὑπὸ τοῦ Σατανᾶ, οὐ γὰρ αὐτοῦ τὰ νοήματα ἀγνοοῦμεν.
translation:
  text: so that we would not be taken advantage of by Satan, for we are not ignorant
    of his schemes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be outwitted” or “be exploited.”
    reason: lexical_alternative
  - marker: b
    text: Or “designs,” “intentions,” or “thoughts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - lest
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. “So that” is natural modern English and preserves
    the clause’s forward-looking force.
- source_word: πλεονεκτηθῶμεν
  chosen: be taken advantage of
  alternatives:
  - be outwitted
  - be exploited
  - be defrauded
  lexicon: BDAG
  rationale: The passive of πλεονεκτέω carries the sense of being exploited or overreached.
    “Taken advantage of” preserves that sense in clear English without narrowing the
    meaning only to intellectual deception.
- source_word: Σατανᾶ
  chosen: Satan
  lexicon: BDAG
  rationale: Personal name, so it is transliterated rather than translated, in keeping
    with the project’s naming policy.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the previous clause. “For” is concise
    and fits the logical flow.
- source_word: νοήματα
  chosen: schemes
  alternatives:
  - designs
  - intentions
  - thoughts
  lexicon: BDAG
  rationale: In this context the word refers not merely to neutral thoughts but to
    Satan’s calculated purposes. “Schemes” best captures the hostile, strategic nuance.
- source_word: ἀγνοοῦμεν
  chosen: are not ignorant of
  alternatives:
  - are not unaware of
  - do not fail to understand
  lexicon: BDAG
  rationale: This preserves the verbal link to knowledge/ignorance in the Greek while
    remaining readable in English.
