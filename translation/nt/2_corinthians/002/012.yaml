id: 2CO.2.12
reference: 2 Corinthians 2:12
source:
  edition: SBLGNT
  text: Ἐλθὼν δὲ εἰς τὴν Τρῳάδα εἰς τὸ εὐαγγέλιον τοῦ Χριστοῦ καὶ θύρας μοι ἀνεῳγμένης
    ἐν κυρίῳ,
translation:
  text: Now when I came to Troas for the good news of the Messiah, and a door had
    been opened for me in the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “for the gospel of Christ.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “and a door stood open for me in the Lord.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλθὼν
  chosen: when I came
  alternatives:
  - having come
  - after I came
  lexicon: BDAG
  rationale: The aorist participle is temporal in context and introduces the circumstance
    leading into the next verse. 'When I came' is natural English and preserves the
    forward movement of the sentence.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than a sharp contrast here. 'Now' carries
    the discourse shift smoothly in modern English while fitting the narrative flow.
- source_word: εἰς τὴν Τρῳάδα
  chosen: to Troas
  alternatives:
  - into Troas
  lexicon: BDAG
  rationale: Standard directional rendering for εἰς with a place name.
- source_word: εἰς τὸ εὐαγγέλιον
  chosen: for the good news
  alternatives:
  - for the gospel
  - for the sake of the good news
  lexicon: BDAG
  rationale: The second εἰς is purposive. 'For the good news' communicates purpose
    without adding 'to preach,' which is not explicitly present in the Greek. 'Good
    news' is more accessible English than 'gospel' while preserving the sense.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  - about the Messiah
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where it functions
    as a title. Here the titular sense is natural, and 'of the Messiah' keeps the
    genitival construction without over-interpreting it.
- source_word: θύρας
  chosen: a door
  alternatives:
  - an opportunity
  lexicon: BDAG
  rationale: Though metaphorical for opportunity in context, the Greek uses 'door,'
    and retaining the image preserves Paul's wording and the metaphor's force.
- source_word: ἀνεῳγμένης
  chosen: had been opened
  alternatives:
  - was opened
  - stood open
  lexicon: BDAG
  rationale: The perfect passive participle in the genitive absolute points to a resulting
    state from a prior action. 'Had been opened' captures both prior action and present
    effect in idiomatic English.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - in union with the Lord
  lexicon: BDAG
  rationale: The preposition ἐν is best left as 'in' here. This preserves Paul's characteristic
    expression without forcing a narrower instrumental reading.
