theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance directs translating Χριστός as 'Messiah' where
    the title sense is active. In this context the phrase refers to the good news
    belonging to or concerning the anointed king, so 'Messiah' best preserves that
    meaning.
