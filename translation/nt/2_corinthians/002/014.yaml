theological_decisions:
- issue: Meaning of θριαμβεύω with ἡμᾶς as object
  chosen_reading: Paul depicts God as leading the apostolic band in triumphal procession
    in the Messiah.
  alternative_readings:
  - Paul depicts God as triumphing over us in the Messiah.
  rationale: The main text preserves the vivid triumphal-procession imagery and yields
    coherent flow with the following fragrance metaphor. Because the verb can carry
    the sense of triumphing over captives, the alternative is preserved in a footnote
    rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
