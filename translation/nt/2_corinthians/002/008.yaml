id: 2CO.2.8
reference: 2 Corinthians 2:8
source:
  edition: SBLGNT
  text: διὸ παρακαλῶ ὑμᾶς κυρῶσαι εἰς αὐτὸν ἀγάπην·
translation:
  text: Therefore I urge you to confirm your love for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'reaffirm your love toward him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inference from the previous discussion; 'Therefore' is natural
    modern English and preserves the connective force.
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: Conveys earnest apostolic appeal without sounding overly formal or harsh.
- source_word: κυρόω
  chosen: confirm
  alternatives:
  - reaffirm
  - ratify
  lexicon: BDAG
  rationale: The verb means to make something valid or confirmed. 'Confirm' preserves
    that sense directly; 'reaffirm' is contextually plausible but slightly more interpretive,
    so it is preserved in a footnote.
- source_word: εἰς αὐτόν
  chosen: for him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: Idiomatic English best expresses the relational direction here as 'for
    him,' while still reflecting the Greek sense of love directed toward the person.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Matches the project's default rendering for ἀγάπη and fits the pastoral
    context plainly and naturally.
