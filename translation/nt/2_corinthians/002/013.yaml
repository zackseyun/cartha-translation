id: 2CO.2.13
reference: 2 Corinthians 2:13
source:
  edition: SBLGNT
  text: οὐκ ἔσχηκα ἄνεσιν τῷ πνεύματί μου τῷ μὴ εὑρεῖν με Τίτον τὸν ἀδελφόν μου, ἀλλὰ
    ἀποταξάμενος αὐτοῖς ἐξῆλθον εἰς Μακεδονίαν.
translation:
  text: I had no rest in my spirit because I did not find Titus my brother, but after
    taking leave of them, I went on to Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for my spirit."
    reason: lexical_alternative
  - marker: b
    text: '"My brother" means Titus as Paul''s fellow believer and coworker.'
    reason: cultural_note
  - marker: c
    text: Or "after bidding them farewell."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσχηκα
  chosen: I had
  alternatives:
  - I have had
  lexicon: BDAG
  rationale: The Greek perfect can be rendered literally as a present-result form,
    but in this narrative context idiomatic English prefers a simple past sense describing
    Paul's prior condition before his departure.
- source_word: ἄνεσιν
  chosen: rest
  alternatives:
  - relief
  - ease
  lexicon: BDAG
  rationale: '"Rest" is natural modern English and fits Paul''s inner unsettled state.
    "Relief" is possible, but "rest" better matches the idiom with ''in my spirit.'''
- source_word: τῷ πνεύματί μου
  chosen: in my spirit
  alternatives:
  - for my spirit
  lexicon: BDAG
  rationale: The dative can be understood as reference or sphere. "In my spirit" preserves
    the personal, inward dimension without over-interpreting Paul's meaning psychologically
    or theologically.
- source_word: τῷ μὴ εὑρεῖν με Τίτον
  chosen: because I did not find Titus
  alternatives:
  - in that I did not find Titus
  - because I could not find Titus
  lexicon: Greek grammar / BDAG
  rationale: The articular infinitive with μή expresses the reason for Paul's lack
    of rest. "Because I did not find Titus" is clear and close to the Greek without
    adding nuance beyond the text.
- source_word: ἀδελφόν μου
  chosen: my brother
  alternatives:
  - my fellow brother
  lexicon: BDAG
  rationale: The familial metaphor is standard Pauline language for a fellow believer
    and coworker. "My brother" preserves the source wording and relational warmth.
- source_word: ἀποταξάμενος αὐτοῖς
  chosen: after taking leave of them
  alternatives:
  - having said goodbye to them
  - after bidding them farewell
  lexicon: BDAG
  rationale: This aorist participle denotes parting from the people in Troas. "After
    taking leave of them" is formal enough for the tone yet still readable.
- source_word: ἐξῆλθον εἰς Μακεδονίαν
  chosen: I went on to Macedonia
  alternatives:
  - I departed for Macedonia
  - I went out to Macedonia
  lexicon: BDAG
  rationale: '"Went on to Macedonia" is smooth idiomatic English for travel onward.
    "Went out" is more literal but sounds awkward in contemporary English.'
