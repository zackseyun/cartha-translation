id: 2CO.2.6
reference: 2 Corinthians 2:6
source:
  edition: SBLGNT
  text: ἱκανὸν τῷ τοιούτῳ ἡ ἐπιτιμία αὕτη ἡ ὑπὸ τῶν πλειόνων,
translation:
  text: This punishment by the majority is enough for such a man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “This penalty by most of them is sufficient for such a one.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανὸν
  chosen: enough
  alternatives:
  - sufficient
  lexicon: BDAG
  rationale: Used as the predicate idea of the clause. “Enough” is natural modern
    English and preserves the sense that the disciplinary action has reached an adequate
    measure without sounding overly formal.
- source_word: τῷ τοιούτῳ
  chosen: for such a man
  alternatives:
  - for such a person
  - for such a one
  lexicon: BDAG
  rationale: The expression refers to a specific offender in context, not people in
    general. Because the Greek is masculine singular and points to a particular individual,
    “such a man” best reflects the source with gender accuracy. “Such a one” is closer
    formally but less natural in current English.
- source_word: ἐπιτιμία
  chosen: punishment
  alternatives:
  - penalty
  - rebuke
  - discipline
  lexicon: BDAG
  rationale: The word denotes a disciplinary sanction imposed by the group. “Punishment”
    most clearly communicates that a concrete corrective action has already been administered.
    “Rebuke” could sound merely verbal, which is likely too weak here.
- source_word: ἡ ὑπὸ τῶν πλειόνων
  chosen: by the majority
  alternatives:
  - by most of them
  - by the many
  lexicon: BDAG
  rationale: οἱ πλείονες commonly carries the sense of the larger part or majority.
    “By the majority” is idiomatic English and best captures the communal decision
    implied by the phrase.
