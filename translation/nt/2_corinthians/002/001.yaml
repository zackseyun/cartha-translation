id: 2CO.2.1
reference: 2 Corinthians 2:1
source:
  edition: SBLGNT
  text: ἔκρινα ⸀γὰρ ἐμαυτῷ τοῦτο, τὸ μὴ πάλιν ἐν λύπῃ πρὸς ὑμᾶς ἐλθεῖν·
translation:
  text: 'For I decided this for myself: not to come to you again in sorrow.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with sorrow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκρινα
  chosen: I decided
  alternatives:
  - I judged
  - I resolved
  - I made up my mind
  lexicon: BDAG
  rationale: The aorist of κρίνω here expresses a settled personal decision. 'I decided'
    is natural modern English and preserves the deliberative force without sounding
    overly formal.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ links this verse explanatorily to the previous context. 'For' best
    preserves that connective force in concise English.
- source_word: ἐμαυτῷ
  chosen: for myself
  alternatives:
  - in myself
  - to myself
  lexicon: BDAG
  rationale: The dative reflexive indicates an inward or personal determination. 'For
    myself' communicates that Paul reached this decision personally and deliberately.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this decision
  - this matter
  lexicon: BDAG
  rationale: The demonstrative points forward to the content expressed by the articular
    infinitive. Retaining 'this' keeps the Greek structure visible, while the following
    colon clarifies the content.
- source_word: τὸ μὴ ... ἐλθεῖν
  chosen: not to come
  alternatives:
  - that I should not come
  - to not come
  lexicon: BDAG
  rationale: The articular infinitive expresses the content of the decision. 'Not
    to come' is the most natural and direct English equivalent.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν marks repetition. 'Again' is the standard, clear rendering.
- source_word: ἐν λύπῃ
  chosen: in sorrow
  alternatives:
  - with sorrow
  - in grief
  lexicon: BDAG
  rationale: λύπη denotes sorrow, grief, or distress. 'In sorrow' preserves the prepositional
    structure and leaves the precise nuance broad enough for the context.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: With a verb of coming, πρός + accusative naturally means movement toward
    persons. 'To you' is idiomatic English.
