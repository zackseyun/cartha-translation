id: 2CO.2.16
reference: 2 Corinthians 2:16
source:
  edition: SBLGNT
  text: οἷς μὲν ὀσμὴ ⸀ἐκ θανάτου εἰς θάνατον, οἷς δὲ ὀσμὴ ⸁ἐκ ζωῆς εἰς ζωήν. καὶ πρὸς
    ταῦτα τίς ἱκανός;
translation:
  text: To the one, a fragrance from death to death; to the other, a fragrance from
    life to life. And who is sufficient for these things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘aroma’ or ‘smell’ for both instances of ὀσμή.
    reason: lexical_alternative
  - marker: b
    text: The phrases ‘from death to death’ and ‘from life to life’ may express source
      and result (‘out of death leading to death’ / ‘out of life leading to life’)
      or an intensified characterization.
    reason: alternative_reading
  - marker: c
    text: Or ‘adequate’ or ‘competent’ for ‘sufficient.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀσμή
  chosen: fragrance
  alternatives:
  - aroma
  - smell
  - odor
  lexicon: BDAG
  rationale: ‘Fragrance’ preserves the sensory metaphor in a natural modern English
    register without flattening it into the more neutral ‘smell’ or the more negative
    ‘odor.’ In context the term can carry either a pleasing or deadly effect depending
    on the recipients, so ‘fragrance’ keeps the image broad enough for both halves
    of the contrast.
- source_word: ἐκ θανάτου εἰς θάνατον
  chosen: from death to death
  alternatives:
  - out of death leading to death
  - deathly, ending in death
  lexicon: BDAG
  rationale: A relatively literal rendering best preserves Paul’s compressed parallelism
    and rhetorical force. The phrase likely expresses source and result or intensification;
    translating it straightforwardly retains the ambiguity rather than over-interpreting
    it.
- source_word: ἐκ ζωῆς εἰς ζωήν
  chosen: from life to life
  alternatives:
  - out of life leading to life
  - life-giving, ending in life
  lexicon: BDAG
  rationale: This is the balanced counterpart to ‘from death to death.’ Keeping the
    same prepositional pattern in English preserves the deliberate symmetry of the
    Greek and avoids resolving the expression into a single narrower interpretation.
- source_word: πρὸς ταῦτα
  chosen: for these things
  alternatives:
  - for this
  - toward these things
  lexicon: BDAG
  rationale: ‘For these things’ is idiomatic and reflects the plural demonstrative
    ταῦτα. It conveys Paul’s sense of adequacy in relation to the weighty matters
    just described.
- source_word: ἱκανός
  chosen: sufficient
  alternatives:
  - adequate
  - competent
  - fit
  lexicon: BDAG
  rationale: ‘Sufficient’ best fits the rhetorical question and preserves the sense
    of being equal to or adequate for a task, with a slightly elevated tone appropriate
    to the passage.
