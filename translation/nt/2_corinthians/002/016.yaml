theological_decisions:
- issue: Interpretive force of the paired expressions ‘from death to death’ and ‘from
    life to life’
  chosen_reading: Retain the Greek ambiguity in the main text rather than specifying
    whether Paul means source-to-result, intensification, or effect-on-hearers.
  alternative_readings:
  - from a death-bringing fragrance ending in death / from a life-giving fragrance
    ending in life
  - an aroma characterized by death / an aroma characterized by life
  rationale: The verse itself does not force a single explanatory paraphrase. Preserving
    the compact wording best follows the project’s principle of maintaining theological
    tension where the source is genuinely open-textured.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
