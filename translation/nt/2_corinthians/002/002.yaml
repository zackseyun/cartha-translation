id: 2CO.2.2
reference: 2 Corinthians 2:2
source:
  edition: SBLGNT
  text: εἰ γὰρ ἐγὼ λυπῶ ὑμᾶς, καὶ ⸀τίς ὁ εὐφραίνων με εἰ μὴ ὁ λυπούμενος ἐξ ἐμοῦ;
translation:
  text: For if I cause you grief, who is there to make me glad except the one I have
    grieved?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'except the one made sorrowful by me,' with ἐξ ἐμοῦ expressing source/cause
      ('by me' or 'because of me').
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπῶ
  chosen: cause ... grief
  alternatives:
  - grieve
  - sadden
  - distress
  lexicon: BDAG
  rationale: The verb denotes causing sorrow or pain. 'Cause ... grief' is natural
    modern English and preserves the causative force better than the more archaic-sounding
    'grieve' alone.
- source_word: εὐφραίνων
  chosen: make me glad
  alternatives:
  - cheer me
  - gladden me
  lexicon: BDAG
  rationale: The participle refers to the person bringing joy to Paul. 'Make me glad'
    is clear, idiomatic, and preserves the relational contrast with 'cause you grief.'
- source_word: τίς ὁ εὐφραίνων με
  chosen: who is there to make me glad
  alternatives:
  - who is the one who makes me glad
  - who makes me glad
  lexicon: Greek grammar / BDAG
  rationale: This rendering captures the rhetorical force of the question in natural
    English while reflecting the substantival participle.
- source_word: ὁ λυπούμενος
  chosen: the one I have grieved
  alternatives:
  - the one being grieved
  - the one made sorrowful
  lexicon: BDAG
  rationale: 'Although the Greek participle is passive (''the one being grieved''),
    English is more natural if the implied agent is made explicit from the context:
    Paul is the one who caused the grief.'
- source_word: ἐξ ἐμοῦ
  chosen: I have grieved
  alternatives:
  - by me
  - because of me
  - from me
  lexicon: BDAG
  rationale: The preposition marks source or cause. In idiomatic English here, folding
    it into 'I have grieved' best conveys the sense without awkwardness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: '''For'' appropriately signals Paul''s explanatory connection to the
    surrounding argument.'
