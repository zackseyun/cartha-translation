theological_decisions:
- issue: Whether Χριστοῦ should be rendered as a title or retained as the traditional
    name-like 'Christ.'
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where the titular
    force is active. Nothing in this verse requires the name-like form 'Christ,' so
    the title is preserved in English.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
