  from: and among those who are perishing
  to: and those who are perishing
  rationale: The Greek repeats 'ἐν' for parallelism, which the draft mirrors by repeating 'among'. While this is a faithful formal rendering, standard English syntax often omits the repeated preposition in such parallel constructions (e.g., 'among X and Y'). The suggested rewrite is slightly more natural and fluid in English without losing any essential meaning.
