theological_decisions:
- issue: Processual aspect in σῳζομένοις and ἀπολλυμένοις
  chosen_reading: 'Render both as ongoing processes: "those who are being saved" and "those who are perishing."'
  alternative_readings:
  - '"the saved" and "the lost"'
  - '"those saved" and "those destroyed"'
  rationale: Paul’s present participles preserve theological tension by portraying salvation and destruction in process rather than as flattened labels. The translation keeps that aspect instead of resolving it into a purely completed state.
  doctrine_reference: Preserve theological tension rather than resolve it.
