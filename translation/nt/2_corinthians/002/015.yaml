id: 2CO.2.15
reference: 2 Corinthians 2:15
source:
  edition: SBLGNT
  text: ὅτι Χριστοῦ εὐωδία ἐσμὲν τῷ θεῷ ἐν τοῖς σῳζομένοις καὶ ἐν τοῖς ἀπολλυμένοις,
translation:
  text: For we are the aroma of Messiah to God among those who are being saved and those who are perishing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the aroma of Christ."
    reason: alternative_reading
  - marker: b
    text: Or 'and among those who are perishing'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces an explanation of the prior statement, so "For" fits natural English while preserving the causal/explanatory force.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered "Messiah" where it functions as a title rather than a name-like form. In this genitival construction, the titular sense is still felt: the aroma belongs to or is characterized by the Messiah.'
- source_word: εὐωδία
  chosen: aroma
  alternatives:
  - fragrance
  - sweet aroma
  lexicon: BDAG
  rationale: '"Aroma" is clear, natural English and preserves the sensory metaphor without adding "sweet," which is not explicit in the Greek.'
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: The dative is straightforwardly represented as "to God," preserving the direction or relation of the metaphor. "Before God" is possible, but "to God" stays closer to the Greek wording.
- source_word: ἐν τοῖς σῳζομένοις
  chosen: among those who are being saved
  alternatives:
  - among the saved
  - in those who are being saved
  lexicon: BDAG
  rationale: The present participle is durative/processual, so "are being saved" better reflects the Greek than a simple stative "the saved." "Among" gives the clearest sense in context.
- source_word: ἐν τοῖς ἀπολλυμένοις
  chosen: among those who are perishing
  alternatives:
  - among the perishing
  - among those being destroyed
  lexicon: BDAG
  rationale: The present participle likewise indicates an ongoing state/process. "Perishing" is the established and contextually fitting English equivalent here, without over-specifying the mode of destruction.
