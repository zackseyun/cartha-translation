id: 2CO.13.6
reference: 2 Corinthians 13:6
source:
  edition: SBLGNT
  text: ἐλπίζω δὲ ὅτι γνώσεσθε ὅτι ἡμεῖς οὐκ ἐσμὲν ἀδόκιμοι.
translation:
  text: But I hope that you will know that we are not disqualified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not unapproved' or 'not failing the test.' The Greek adjective refers
      to failing to stand approved after testing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίζω
  chosen: I hope
  alternatives:
  - I trust
  lexicon: BDAG
  rationale: Present indicative first person singular naturally renders as 'I hope.'
    'I trust' is possible in some contexts, but 'hope' best matches the ordinary sense
    here and preserves Paul's forward-looking expectation.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' best reflects the contrast
    with the preceding concern about being found ἀδόκιμος, while remaining natural
    in English.
- source_word: γνώσεσθε
  chosen: you will know
  alternatives:
  - you will come to know
  - you will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω here points to a future realization by the Corinthians.
    'You will know' is the most straightforward rendering; 'come to know' slightly
    overstates process, and 'recognize' is interpretive.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Both instances introduce content clauses. English 'that' cleanly preserves
    the syntax without unnecessary expansion.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: The explicit pronoun is somewhat emphatic in Greek, but English can convey
    this adequately with normal word order in context. No added emphasis marker is
    required.
- source_word: οὐκ ἐσμὲν
  chosen: are not
  alternatives:
  - are by no means
  lexicon: BDAG
  rationale: Standard negated copula. A stronger English form such as 'are by no means'
    would overtranslate the simple negation.
- source_word: ἀδόκιμοι
  chosen: disqualified
  alternatives:
  - unapproved
  - failing the test
  - reprobate
  lexicon: BDAG
  rationale: In this context of testing/proving in the surrounding verses, ἀδόκιμος
    carries the sense of failing to stand approved after testing. 'Disqualified' is
    clear modern English and fits Paul's examination imagery. 'Unapproved' is more
    literal but less idiomatic; 'failing the test' is explanatory; 'reprobate' is
    too theologically loaded and archaic for this context.
