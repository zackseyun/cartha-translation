theological_decisions:
- issue: Rendering of ἀδόκιμοι in a context of testing and apostolic legitimacy
  chosen_reading: not disqualified
  alternative_readings:
  - not unapproved
  - not failing the test
  - not reprobate
  rationale: The verse concerns whether Paul and his coworkers stand approved under
    examination, paralleling the testing language in the immediate context. Rendering
    ἀδόκιμοι as 'disqualified' preserves the evaluative force without importing later
    doctrinal connotations associated with 'reprobate.' This follows the translation
    philosophy of preserving the source sense without adding theological claims the
    text itself does not make.
  doctrine_reference: Translation philosophy §§1, 3, 6
