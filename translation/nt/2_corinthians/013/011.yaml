theological_decisions:
- issue: Inclusive force of ἀδελφοί in congregational address
  chosen_reading: Render as 'brothers' in the main text, preserving the masculine
    form while recognizing the mixed congregation context.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    translation. Because Paul addresses the church corporately, an explanatory footnote
    can preserve the inclusive sense without altering the main-text form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
