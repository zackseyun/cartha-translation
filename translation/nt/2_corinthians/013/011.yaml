id: 2CO.13.11
reference: 2 Corinthians 13:11
source:
  edition: SBLGNT
  text: Λοιπόν, ἀδελφοί, χαίρετε, καταρτίζεσθε, παρακαλεῖσθε, τὸ αὐτὸ φρονεῖτε, εἰρηνεύετε,
    καὶ ὁ θεὸς τῆς ἀγάπης καὶ εἰρήνης ἔσται μεθ’ ὑμῶν.
translation:
  text: Finally, brothers, rejoice, be restored, be encouraged, think the same thing,
    live in peace, and the God of love and peace will be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''farewell''; the Greek can function as a closing greeting, but here
      it likely continues the series of exhortations: ''rejoice.'''
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the congregation corporately and likely includes
      both men and women.'
    reason: cultural_note
  - marker: c
    text: Or 'be made complete,' 'be restored,' or 'put yourselves in order' for 'be
      restored.'
    reason: lexical_alternative
  - marker: d
    text: Or 'accept encouragement/exhortation' for 'be encouraged.'
    reason: lexical_alternative
  - marker: e
    text: Literally 'think the same thing'; that is, 'be of one mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λοιπόν
  chosen: Finally
  alternatives:
  - As for the rest
  - In conclusion
  lexicon: BDAG
  rationale: Functions as a discourse marker drawing the letter to its close. 'Finally'
    is natural modern English and fits the epistolary conclusion.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in Pauline usage often
    addresses the whole congregation. Per doctrine, gender-accurate rendering is preferred
    in the main text; inclusivity can be noted in a footnote rather than neutralized
    in translation.
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - farewell
  - be glad
  lexicon: BDAG
  rationale: Though χαίρετε can function as a closing greeting ('farewell'), here
    it stands in a string of imperatival exhortations, so the verbal sense 'rejoice'
    best preserves the parallel force.
- source_word: καταρτίζεσθε
  chosen: be restored
  alternatives:
  - be made complete
  - be perfected
  - put yourselves in order
  lexicon: BDAG
  rationale: The verb καταρτίζω can denote restoring, mending, equipping, or bringing
    to proper condition. In this church-repair context, 'be restored' captures the
    passive/middle imperative sense without overstating sinless perfection.
- source_word: παρακαλεῖσθε
  chosen: be encouraged
  alternatives:
  - be comforted
  - encourage one another
  - accept exhortation
  lexicon: BDAG
  rationale: The passive/middle form can mean receive encouragement/exhortation. 'Be
    encouraged' is clear modern English and fits the sequence of communal exhortations;
    'accept exhortation' is possible but less natural in English.
- source_word: τὸ αὐτὸ φρονεῖτε
  chosen: think the same thing
  alternatives:
  - be of one mind
  - agree with one another
  lexicon: BDAG
  rationale: Literally 'think the same thing.' This preserves the cognitive/unity
    emphasis of φρονέω while remaining readable. It avoids importing a stronger idiomatic
    smoothing than necessary.
- source_word: εἰρηνεύετε
  chosen: live in peace
  alternatives:
  - be at peace
  - pursue peace
  lexicon: BDAG
  rationale: The present imperative calls for ongoing peaceful conduct. 'Live in peace'
    expresses the durative communal sense more naturally than the bare 'be at peace'
    while staying close to the Greek.
- source_word: ὁ θεὸς τῆς ἀγάπης καὶ εἰρήνης
  chosen: the God of love and peace
  alternatives:
  - the God characterized by love and peace
  lexicon: BDAG
  rationale: A straightforward genitival expression. 'Love' follows the project's
    default rendering for ἀγάπη.
- source_word: ἔσται μεθ’ ὑμῶν
  chosen: will be with you
  alternatives:
  - shall be with you
  lexicon: BDAG
  rationale: Simple future promise. 'Will be with you' is idiomatic modern English
    without archaic register.
