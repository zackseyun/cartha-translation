id: 2CO.13.3
reference: 2 Corinthians 13:3
source:
  edition: SBLGNT
  text: ἐπεὶ δοκιμὴν ζητεῖτε τοῦ ἐν ἐμοὶ λαλοῦντος Χριστοῦ· ὃς εἰς ὑμᾶς οὐκ ἀσθενεῖ
    ἀλλὰ δυνατεῖ ἐν ὑμῖν,
translation:
  text: since you are seeking proof that the Messiah is speaking in me—he is not weak
    toward you, but is powerful among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that Christ is speaking through me.' The Greek more literally says 'the
      Messiah speaking in me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is powerful in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the reason for Paul's coming severity in the surrounding context.
    'Since' is natural English and preserves the causal force without sounding overly
    formal.
- source_word: δοκιμήν
  chosen: proof
  alternatives:
  - test
  - evidence
  - demonstration
  lexicon: BDAG
  rationale: Here the sense is the evidence that validates something, not the process
    of testing itself. 'Proof' best fits the idiom 'seeking proof that...' in English.
- source_word: ζητεῖτε
  chosen: you are seeking
  alternatives:
  - you seek
  - you are asking for
  lexicon: BDAG
  rationale: Present tense is rendered progressively to reflect the ongoing demand
    of the Corinthians. 'Seeking' fits the object δοκιμήν better than 'asking for'.
- source_word: τοῦ ἐν ἐμοὶ λαλοῦντος Χριστοῦ
  chosen: that the Messiah is speaking in me
  alternatives:
  - of the Messiah speaking in me
  - that Christ is speaking through me
  lexicon: BDAG
  rationale: 'The genitive participial construction after δοκιμήν is idiomatically
    expressed in English with a content clause: ''proof that...''. Χριστοῦ is rendered
    ''Messiah'' per doctrine for title usage. ἐν ἐμοί is kept as ''in me'' rather
    than ''through me'' because that is the explicit preposition, though ''through
    me'' is a plausible interpretive alternative.'
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here rather than a name-like form, so the default doctrinal
    guidance favors 'Messiah' to preserve the title's meaning.
- source_word: ὃς
  chosen: he
  alternatives:
  - who
  lexicon: BDAG
  rationale: English reads more smoothly by starting a new clause with 'he' after
    the dash, while still referring back to the Messiah.
- source_word: εἰς ὑμᾶς
  chosen: toward you
  alternatives:
  - with respect to you
  - for you
  lexicon: BDAG
  rationale: In this context εἰς conveys direction or relation. 'Toward you' preserves
    the relational force and pairs naturally with the contrast that follows.
- source_word: οὐκ ἀσθενεῖ
  chosen: is not weak
  alternatives:
  - does not act weakly
  - is not powerless
  lexicon: BDAG
  rationale: The verb ἀσθενέω can denote weakness or powerlessness. 'Is not weak'
    preserves the lexical contrast with δυνατεῖ and echoes Paul's surrounding weakness/power
    theme.
- source_word: ἀλλὰ δυνατεῖ
  chosen: but is powerful
  alternatives:
  - but is strong
  - but exercises power
  lexicon: BDAG
  rationale: The rare verb δυνατέω is best represented by a power term that directly
    contrasts with 'weak.' 'Is powerful' is concise and natural.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - among you all
  lexicon: BDAG
  rationale: Given the plural addressees and the corporate context of Paul's dealings
    with the church, 'among you' better conveys activity in their midst. 'In you'
    is possible and worth preserving in a footnote because it could suggest inward
    operation within the believers.
