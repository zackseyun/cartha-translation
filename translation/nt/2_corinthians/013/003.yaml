theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this clause ('the Messiah speaking in
    me'), not merely as a proper name. This follows the doctrinal default to translate
    Χριστός as 'Messiah' where title usage is clear.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Force of ἐν ἐμοί and ἐν ὑμῖν
  chosen_reading: '''speaking in me'' and ''powerful among you'''
  alternative_readings:
  - '''speaking through me'' and/or ''powerful in you'''
  rationale: The translation preserves the first prepositional phrase formally as
    'in me' because that is the Greek wording. For ἐν ὑμῖν, 'among you' best fits
    the plural audience and communal setting, while a footnote preserves the more
    interior reading 'in you.' This avoids over-resolving whether the emphasis is
    on Christ's agency through Paul, his presence in Paul, or his power within the
    Corinthians individually.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
