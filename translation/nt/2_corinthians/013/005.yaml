theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs translating Christological titles to preserve
    meaning, using 'Messiah' where context supports a title rather than a name-like
    usage. Here the phrase functions well as a title in a confessional statement.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of ἐν τῇ πίστει
  chosen_reading: the faith as the sphere/reality of Christian faith
  alternative_readings:
  - personal faith in a more subjective sense
  rationale: The phrase can be heard either as persevering within the Christian faith
    or possessing genuine faith. The translation preserves the Greek wording 'in the
    faith' rather than resolving the theological nuance beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Sense of ἐν ὑμῖν
  chosen_reading: in you
  alternative_readings:
  - among you
  rationale: The immediate context of self-examination favors Christ's presence in
    the Corinthians themselves, yet the Greek preposition can also bear a corporate
    nuance. The alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
