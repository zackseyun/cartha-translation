id: 2CO.13.5
reference: 2 Corinthians 13:5
source:
  edition: SBLGNT
  text: Ἑαυτοὺς πειράζετε εἰ ἐστὲ ἐν τῇ πίστει, ἑαυτοὺς δοκιμάζετε· ἢ οὐκ ἐπιγινώσκετε
    ἑαυτοὺς ὅτι ⸂Ἰησοῦς Χριστὸς⸃ ἐν ⸀ὑμῖν; εἰ μήτι ἀδόκιμοί ἐστε.
translation:
  text: Test yourselves to see whether you are in the faith; examine yourselves. Or
    do you not recognize about yourselves that Jesus the Messiah is in you?—unless
    indeed you are disqualified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'among you.'
    reason: alternative_reading
  - marker: c
    text: '''In the faith'' may refer to remaining within the Christian faith or to
      possessing genuine faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πειράζετε
  chosen: Test
  alternatives:
  - Examine
  - Try
  lexicon: BDAG
  rationale: In this context the imperative calls for self-testing to determine genuineness,
    not temptation. 'Test' is natural English and preserves the evaluative sense.
- source_word: ἐν τῇ πίστει
  chosen: in the faith
  alternatives:
  - in faith
  lexicon: BDAG
  rationale: The article favors a more definite expression. In Pauline usage here
    it most naturally refers to the sphere/reality of Christian faith rather than
    mere subjective believing, so 'in the faith' is retained.
- source_word: δοκιμάζετε
  chosen: examine
  alternatives:
  - test
  - prove
  lexicon: BDAG
  rationale: 'Used alongside πειράζετε, a differentiated English rendering helps reflect
    the near-synonymous but slightly more approval-oriented nuance of δοκιμάζω: scrutinize
    to determine what is genuine.'
- source_word: ἐπιγινώσκετε
  chosen: recognize
  alternatives:
  - know
  - realize
  - acknowledge
  lexicon: BDAG
  rationale: The compound verb suggests fuller recognition or acknowledgment. 'Recognize'
    fits the rhetorical question and avoids awkward repetition with 'know yourselves.'
- source_word: ἑαυτοὺς
  chosen: about yourselves
  alternatives:
  - yourselves
  - within yourselves
  lexicon: BDAG
  rationale: After 'recognize,' an explicit reflexive object can sound awkward in
    English. 'About yourselves' preserves the self-referential force while reading
    naturally. The earlier two instances are rendered simply 'yourselves' in direct
    imperatives.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name-like form. Here the confessional force supports
    the titular sense.
- source_word: ἐν ὑμῖν
  chosen: is in you
  alternatives:
  - is among you
  lexicon: BDAG
  rationale: The singular/plural pronoun with ἐν can mean 'in/among you,' but in this
    self-examination context Paul most naturally speaks of Christ's indwelling presence
    in the Corinthians. The communal nuance is preserved in a footnote.
- source_word: εἰ μήτι
  chosen: unless indeed
  alternatives:
  - unless perhaps
  - unless
  lexicon: BDAG
  rationale: This introduces an exception with a slight rhetorical softening or irony.
    'Unless indeed' captures the force without overtranslating.
- source_word: ἀδόκιμοί
  chosen: disqualified
  alternatives:
  - unapproved
  - failing the test
  - reprobate
  lexicon: BDAG
  rationale: The adjective contrasts with successful testing/approval. 'Disqualified'
    clearly conveys failure to stand the test in contemporary English without importing
    later theological baggage attached to 'reprobate'.
