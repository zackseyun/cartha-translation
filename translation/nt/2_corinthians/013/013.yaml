id: 2CO.13.13
reference: 2 Corinthians 13:13
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου Ἰησοῦ Χριστοῦ καὶ ἡ ἀγάπη τοῦ θεοῦ καὶ ἡ κοινωνία τοῦ ἁγίου
    πνεύματος μετὰ πάντων ⸀ὑμῶν.
translation:
  text: The grace of the Lord Jesus Messiah, and the love of God, and the fellowship
    of the Holy Spirit, be with all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “Jesus Christ.”
    reason: alternative_reading
  - marker: b
    text: Or “communion of the Holy Spirit” or “participation in the Holy Spirit.”
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Standard Pauline benediction term; 'grace' preserves both the theological
    weight and established semantic range better than the flatter 'favor'.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος and fits christological title
    usage here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than merely a fixed surname-like
    element; per translation philosophy, titles are translated where context supports.
    'Messiah' preserves the title's meaning.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Matches the default rendering in DOCTRINE.md and is the natural English
    equivalent in this benediction.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Simple possessive genitive: ''the love of God.'' This preserves the
    likely subjective sense without over-specifying it as ''God''s love for you''
    in the main text.'
- source_word: κοινωνία
  chosen: fellowship
  alternatives:
  - participation
  - sharing
  - communion
  lexicon: BDAG
  rationale: κοινωνία can denote shared participation or fellowship. In a benedictory
    formula, 'fellowship' is idiomatic and preserves the relational and participatory
    sense without narrowing it. Alternatives are worth preserving because 'communion'
    is traditional and 'participation' is semantically possible.
- source_word: ἁγίου πνεύματος
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary English rendering of the divine person named in
    the text; 'Holy Ghost' is archaic in modern usage.
- source_word: μετὰ πάντων ὑμῶν
  chosen: be with all of you
  alternatives:
  - be with you all
  - be with you
  lexicon: BDAG
  rationale: μετά with the genitive expresses accompaniment/presence. English benedictions
    normally supply 'be' elliptically. 'All of you' clearly reflects πάντων ὑμῶν and
    avoids losing the explicit inclusiveness of 'all'.
