theological_decisions:
- issue: Rendering Χριστοῦ in the christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that titles be translated and names
    transliterated. Here Χριστοῦ is best taken as a title attached to Jesus, so 'Messiah'
    is preferred in the main text while the traditional 'Christ' is preserved as an
    alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of κοινωνία τοῦ ἁγίου πνεύματος
  chosen_reading: the fellowship of the Holy Spirit
  alternative_readings:
  - the communion of the Holy Spirit
  - participation in the Holy Spirit
  rationale: The genitive construction can be understood in more than one closely
    related way. 'Fellowship of the Holy Spirit' preserves the traditional breadth
    and theological tension without forcing a narrower interpretation such as only
    mutual fellowship produced by the Spirit or only participation in the Spirit.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
