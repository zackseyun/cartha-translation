id: 2CO.13.7
reference: 2 Corinthians 13:7
source:
  edition: SBLGNT
  text: ⸀εὐχόμεθα δὲ πρὸς τὸν θεὸν μὴ ποιῆσαι ὑμᾶς κακὸν μηδέν, οὐχ ἵνα ἡμεῖς δόκιμοι
    φανῶμεν, ἀλλ’ ἵνα ὑμεῖς τὸ καλὸν ποιῆτε, ἡμεῖς δὲ ὡς ἀδόκιμοι ὦμεν.
translation:
  text: Now we pray to God that you may do nothing wrong—not so that we may appear
    approved, but so that you may do what is right, even if we seem disqualified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do no evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'approved' / 'proven genuine'; the Greek contrasts 'approved' with 'disqualified'
      using related terms.
    reason: lexical_alternative
  - marker: c
    text: Or 'even if we are as unapproved' or 'even if we appear disqualified.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐχόμεθα
  chosen: we pray
  alternatives:
  - we pray earnestly
  - we ask
  lexicon: BDAG
  rationale: Present middle indicative of εὔχομαι here denotes prayer directed to
    God. 'We pray' is the most natural and sufficiently direct English rendering.
- source_word: πρὸς τὸν θεὸν
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: With εὔχομαι, πρός + accusative naturally expresses direction of prayer.
    'To God' is idiomatic and clear.
- source_word: μὴ ποιῆσαι ὑμᾶς κακὸν μηδέν
  chosen: that you may do nothing wrong
  alternatives:
  - that you may do no evil
  - that you may do nothing bad
  lexicon: BDAG
  rationale: The infinitival construction after εὐχόμεθα expresses the content of
    the prayer. κακὸν μηδέν is an emphatic negation meaning 'nothing evil/wrong.'
    'Do nothing wrong' is natural modern English and preserves the ethical force without
    sounding archaic.
- source_word: οὐχ ἵνα
  chosen: not so that
  alternatives:
  - not in order that
  - not because
  lexicon: BDAG
  rationale: This introduces Paul's denied purpose. 'Not so that' preserves the purposive
    nuance in readable English.
- source_word: δόκιμοι
  chosen: approved
  alternatives:
  - proven genuine
  - acceptable
  lexicon: BDAG
  rationale: δόκιμος commonly means tested and approved. 'Approved' fits the immediate
    contrast with ἀδόκιμοι and keeps the evaluative sense concise.
- source_word: φανῶμεν
  chosen: we may appear
  alternatives:
  - we may be seen
  - we may be shown
  lexicon: BDAG
  rationale: Aorist passive subjunctive of φαίνω here is best rendered intransitively
    as 'appear' or 'be seen.' 'Appear' fits the rhetorical contrast about public perception.
- source_word: τὸ καλὸν
  chosen: what is right
  alternatives:
  - what is good
  - the good
  lexicon: BDAG
  rationale: καλός in ethical contexts can mean morally good/right. 'What is right'
    communicates the practical ethical sense in contemporary English.
- source_word: ποιῆτε
  chosen: you may do
  alternatives:
  - you do
  lexicon: BDAG
  rationale: Subjunctive under ἵνα is naturally rendered with 'may' in English to
    preserve the purposive nuance.
- source_word: ὡς ἀδόκιμοι
  chosen: even if we seem disqualified
  alternatives:
  - as disqualified
  - as unapproved
  - as failing the test
  lexicon: BDAG
  rationale: ἀδόκιμος is the opposite of δόκιμος, meaning not approved, failing the
    test, disqualified. Because ὡς can mark appearance or characterization in context,
    and because the contrast is with 'appear approved,' 'seem disqualified' best preserves
    Paul's rhetorical point that he is willing to look unsuccessful if the Corinthians
    do what is right.
