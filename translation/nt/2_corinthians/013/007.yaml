theological_decisions:
- issue: Meaning of Paul's self-description ὡς ἀδόκιμοι
  chosen_reading: Paul speaks of appearing or being regarded as disqualified/unapproved
    in the eyes of others, not of ultimate spiritual reprobation.
  alternative_readings:
  - Paul means simply 'as though ineffective'
  - Paul refers to failing an apostolic test in a broader sense
  rationale: The immediate context contrasts δόκιμοι and ἀδόκιμοι in relation to testing
    and public validation. Rendering with 'seem disqualified' preserves the rhetorical
    and relational force without importing a doctrine of final condemnation that the
    verse itself does not assert.
  doctrine_reference: Preserve theological tension rather than resolve it
