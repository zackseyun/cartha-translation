id: 2CO.13.10
reference: 2 Corinthians 13:10
source:
  edition: SBLGNT
  text: διὰ τοῦτο ταῦτα ἀπὼν γράφω, ἵνα παρὼν μὴ ἀποτόμως χρήσωμαι κατὰ τὴν ἐξουσίαν
    ἣν ⸂ὁ κύριος ἔδωκέν μοι⸃, εἰς οἰκοδομὴν καὶ οὐκ εἰς καθαίρεσιν.
translation:
  text: For this reason I write these things while absent, so that when present I
    may not have to act harshly, according to the authority that the Lord gave me
    for building up and not for tearing down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I may not have to use severity' or 'I may not have to deal sharply.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''for edification and not for destruction.'' The Greek uses a building
      metaphor: ''for building up and not for tearing down.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: A natural causal-consequential connector in English that preserves Paul's
    explicit linkage to the preceding context without sounding overly wooden.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these matters
  lexicon: BDAG
  rationale: Plural demonstrative is retained. 'These things' reflects the Greek number
    and points to the contents of the letter or warnings just given.
- source_word: ἀπὼν
  chosen: while absent
  alternatives:
  - being absent
  - away
  lexicon: BDAG
  rationale: The participle is rendered temporally and idiomatically in English, contrasting
    with παρὼν later in the verse.
- source_word: γράφω
  chosen: I write
  alternatives:
  - I am writing
  lexicon: BDAG
  rationale: Simple present best fits epistolary style in English and keeps the statement
    direct.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose clearly in modern English.
- source_word: παρὼν
  chosen: when present
  alternatives:
  - being present
  - when I am there
  lexicon: BDAG
  rationale: Balances the earlier 'while absent' and conveys the temporal force of
    the participle in smooth English.
- source_word: μὴ ἀποτόμως χρήσωμαι
  chosen: I may not have to act harshly
  alternatives:
  - I may not have to use severity
  - I may not have to deal sharply
  lexicon: BDAG
  rationale: χράομαι here means to make use of or deal with, and ἀποτόμως carries
    the sense of severity/sharpness. 'Act harshly' is clear modern English. 'Have
    to' is supplied to reflect the implied undesirable necessity in context, not a
    bare future action.
- source_word: κατὰ τὴν ἐξουσίαν
  chosen: according to the authority
  alternatives:
  - in keeping with the authority
  - with the authority
  lexicon: BDAG
  rationale: κατά here indicates conformity to the authority entrusted to Paul. 'Authority'
    is the standard and contextually appropriate rendering of ἐξουσία.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. The article
    is naturally retained in English in this construction.
- source_word: ἔδωκέν μοι
  chosen: gave me
  alternatives:
  - has given me
  lexicon: BDAG
  rationale: Aorist is naturally rendered as simple past in this context, referring
    to the commission/authority Paul received.
- source_word: εἰς οἰκοδομὴν
  chosen: for building up
  alternatives:
  - for edification
  - for strengthening
  lexicon: BDAG
  rationale: The metaphor of construction is common in Paul; 'building up' preserves
    the image while remaining accessible. 'Edification' is accurate but more ecclesiastical.
- source_word: καθαίρεσιν
  chosen: tearing down
  alternatives:
  - destruction
  - demolition
  lexicon: BDAG
  rationale: Chosen to match the construction metaphor of οἰκοδομή. 'Destruction'
    is possible, but 'tearing down' better preserves the rhetorical contrast between
    building and dismantling.
