theological_decisions:
- issue: Referent of 'the Lord' in Paul's statement about granted authority
  chosen_reading: Rendered simply as 'the Lord' without specifying beyond the Greek
    text.
  alternative_readings:
  - Jesus the Lord specifically
  - the Lord in a broader divine sense
  rationale: The Greek says ὁ κύριος, and the translation preserves that title without
    importing a more specific doctrinal identification than the text itself states
    in this verse. This aligns with the project's principle not to import doctrinal
    claims the text does not make while still using the default rendering for κύριος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy items 1 and 3'
