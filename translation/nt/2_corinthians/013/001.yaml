id: 2CO.13.1
reference: 2 Corinthians 13:1
source:
  edition: SBLGNT
  text: Τρίτον τοῦτο ἔρχομαι πρὸς ὑμᾶς· ἐπὶ στόματος δύο μαρτύρων καὶ τριῶν σταθήσεται
    πᾶν ῥῆμα.
translation:
  text: 'This is the third time I am coming to you: “Every matter will be established
    by the testimony of two witnesses or three.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Every word will be established by the mouth of two witnesses or three.”
      The Greek follows the wording of Deuteronomy 19:15 closely, using a legal idiom.
    reason: lexical_alternative
  - marker: b
    text: An allusion to Deuteronomy 19:15.
    reason: cross_reference
lexical_decisions:
- source_word: Τρίτον τοῦτο
  chosen: This is the third time
  alternatives:
  - This third time
  - For the third time
  lexicon: BDAG
  rationale: The neuter accusative phrase functions adverbially with ἔρχομαι, indicating
    the ordinal occurrence of Paul's coming. English idiom is clearer with 'This is
    the third time' rather than a more wooden 'This third time.'
- source_word: ἔρχομαι πρὸς ὑμᾶς
  chosen: I am coming to you
  alternatives:
  - I come to you
  - I am on my way to you
  lexicon: BDAG
  rationale: Present middle/passive deponent ἔρχομαι is naturally rendered as a present/futuristic
    present in context. 'I am coming to you' preserves the immediacy of Paul's announced
    visit without over-paraphrasing.
- source_word: ἐπὶ στόματος
  chosen: by the testimony of
  alternatives:
  - on the mouth of
  - by the mouth of
  lexicon: BDAG
  rationale: This is an idiomatic legal expression, echoing Deut 19:15 LXX. A literal
    'on the mouth of' would be obscure in modern English; 'by the testimony of' conveys
    the juridical sense while remaining close to the source.
- source_word: δύο μαρτύρων καὶ τριῶν
  chosen: two witnesses or three
  alternatives:
  - two or three witnesses
  - two witnesses and three
  lexicon: BDAG
  rationale: The Greek reproduces the scriptural formula. English legal idiom is best
    captured by 'two witnesses or three,' preserving the distributive sense of the
    quotation. The conjunction καί here reflects the stock formula 'two or three,'
    not a cumulative total.
- source_word: σταθήσεται
  chosen: will be established
  alternatives:
  - will stand
  - will be confirmed
  lexicon: BDAG
  rationale: Future passive of ἵστημι in legal contexts means to be established or
    confirmed. 'Will be established' best fits the forensic setting and common English
    usage.
- source_word: πᾶν ῥῆμα
  chosen: Every matter
  alternatives:
  - every word
  - every charge
  - every statement
  lexicon: BDAG
  rationale: Although ῥῆμα can mean 'word' or 'statement,' in this legal citation
    it refers to a matter/case under consideration. 'Every matter' communicates the
    judicial sense more clearly in context, while avoiding an overly literal rendering
    that could mislead modern readers.
