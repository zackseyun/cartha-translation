theological_decisions:
- issue: Use of the Deuteronomic legal citation in Paul's disciplinary context
  chosen_reading: Render the quotation in clear legal English as applying to the establishment
    of any matter/charge, without narrowing it to church discipline alone.
  alternative_readings:
  - Render πᾶν ῥῆμα more literally as 'every word'
  - Render more specifically as 'every charge'
  rationale: Paul cites a scriptural legal principle. The translation should preserve
    the broader juridical force of the quotation without importing a narrower doctrinal
    or ecclesial interpretation not explicit in the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
