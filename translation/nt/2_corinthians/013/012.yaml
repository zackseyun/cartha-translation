theological_decisions:
- issue: Rendering ἅγιοι in Pauline communal address
  chosen_reading: saints
  alternative_readings:
  - holy ones
  - God's holy people
  rationale: In Paul, ἅγιοι is a standard designation for believers. 'Saints' preserves
    lexical continuity and theological identity, while the alternatives are possible
    but less idiomatic in this epistolary closing. The rendering does not imply a
    later ecclesiastical category of specially canonized persons.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
