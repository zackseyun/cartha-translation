id: 2CO.13.12
reference: 2 Corinthians 13:12
source:
  edition: SBLGNT
  text: ἀσπάσασθε ἀλλήλους ἐν ἁγίῳ φιλήματι. ἀσπάζονται ὑμᾶς οἱ ἅγιοι πάντες.
translation:
  text: Greet one another with a holy kiss. All the saints greet you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a sacred kiss.' The phrase refers to a culturally recognized greeting
      marked by holiness and Christian fellowship.
    reason: lexical_alternative
  - marker: b
    text: '''Saints'' here means believers, that is, God''s holy people; it does not
      refer only to an elite class of especially canonized Christians.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Exchange greetings with
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a direct
    exhortation. 'Greet' is the standard concise English equivalent and fits the reciprocal
    object that follows.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Reciprocal pronoun indicating mutual action within the community. 'One
    another' is the most natural and standard rendering in English biblical style.
- source_word: ἐν ἁγίῳ φιλήματι
  chosen: with a holy kiss
  alternatives:
  - with a sacred kiss
  - in a holy kiss
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' idiomatic English with greeting formulas
    is better expressed as 'with.' 'Holy' is retained for ἁγίῳ rather than softened,
    preserving the consecrated and communal character of the gesture. 'Kiss' is the
    plain sense of φίλημα and should not be paraphrased away.
- source_word: ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  - welcome
  lexicon: BDAG
  rationale: Present middle indicative, third person plural. In epistolary context,
    'greet' naturally conveys the action of those sending greetings to the recipients.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of ἀσπάζονται; straightforward second person plural sense,
    though English 'you' does not mark number.
- source_word: οἱ ἅγιοι πάντες
  chosen: All the saints
  alternatives:
  - All the holy ones
  - All God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to believers as 'saints.' This
    preserves the established lexical sense without importing later canonization concepts.
    πάντες is fronted in English as 'All' for natural style while retaining totality.
