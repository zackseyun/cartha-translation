id: 2CO.13.2
reference: 2 Corinthians 13:2
source:
  edition: SBLGNT
  text: προείρηκα καὶ προλέγω ὡς παρὼν τὸ δεύτερον καὶ ἀπὼν ⸀νῦν, τοῖς προημαρτηκόσιν
    καὶ τοῖς λοιποῖς πᾶσιν, ὅτι ἐὰν ἔλθω εἰς τὸ πάλιν οὐ φείσομαι,
translation:
  text: 'I have said before, and I say beforehand now while absent as I did when present
    the second time, to those who sinned previously and to all the rest: if I come
    again, I will not spare them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'if I come for a third time.' The Greek says literally,
      'if I come again,' but the context of Paul's visits suggests another visit after
      the second.
    reason: alternative_reading
lexical_decisions:
- source_word: προείρηκα
  chosen: I have said before
  alternatives:
  - I have already said
  - I have previously warned
  lexicon: BDAG
  rationale: Perfect tense indicates a prior statement with continuing force. 'I have
    said before' preserves the retrospective sense without over-interpreting it as
    specifically a warning, though the context is admonitory.
- source_word: προλέγω
  chosen: I say beforehand
  alternatives:
  - I warn in advance
  - I say again in advance
  lexicon: BDAG
  rationale: The verb literally means to say beforehand. Because the source uses the
    same lemma as in προείρηκα, this rendering preserves lexical continuity. The warning
    nuance is contextual rather than built into the English gloss.
- source_word: ὡς παρὼν τὸ δεύτερον καὶ ἀπὼν νῦν
  chosen: now while absent as I did when present the second time
  alternatives:
  - as when present the second time, and now absent
  - as present the second time and now absent
  lexicon: BDAG
  rationale: This compressed phrase contrasts Paul's prior in-person presence with
    his current absence. The chosen wording makes the temporal relation clear in natural
    English while preserving the comparison to his second visit.
- source_word: τοῖς προημαρτηκόσιν
  chosen: to those who sinned previously
  alternatives:
  - to those who have sinned before
  - to the ones who sinned earlier
  lexicon: BDAG
  rationale: The perfect participle points to those whose prior sin is already in
    view. 'Sinned previously' captures the anterior sense without implying whether
    repentance has or has not occurred.
- source_word: τοῖς λοιποῖς πᾶσιν
  chosen: to all the rest
  alternatives:
  - to all the others
  - to everyone else
  lexicon: BDAG
  rationale: λοιποί with πᾶσιν is comprehensive. 'All the rest' is idiomatic and preserves
    the distinction between the previously sinning group and the remainder.
- source_word: ἐὰν ἔλθω εἰς τὸ πάλιν
  chosen: if I come again
  alternatives:
  - if I come for a third time
  - if I come back again
  lexicon: BDAG
  rationale: Literally, 'if I come into the again,' an idiom referring to another
    visit. 'If I come again' is the most natural English equivalent. The more explicit
    'for a third time' is interpretive and better left to a note.
- source_word: οὐ φείσομαι
  chosen: I will not spare them
  alternatives:
  - I will not spare
  - I will show no leniency
  lexicon: BDAG
  rationale: φείδομαι means to spare or refrain from severity. English normally supplies
    the object in context; 'them' clarifies that Paul refers to the offenders/rest
    without changing the sense.
