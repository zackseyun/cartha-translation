theological_decisions:
- issue: Scope of Paul's threatened severity
  chosen_reading: Paul warns the offending parties and the rest of the congregation
    that on a return visit he will not refrain from disciplinary action.
  alternative_readings:
  - Paul addresses only the previously sinning group
  - Paul threatens a more general apostolic severity without specifying discipline
  rationale: The syntax addresses both 'those who sinned previously' and 'all the
    rest,' and the future 'I will not spare' naturally extends to those under warning.
    The translation keeps the warning broad without importing a specific church-polity
    framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
