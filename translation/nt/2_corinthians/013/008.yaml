id: 2CO.13.8
reference: 2 Corinthians 13:8
source:
  edition: SBLGNT
  text: οὐ γὰρ δυνάμεθά τι κατὰ τῆς ἀληθείας, ἀλλὰ ὑπὲρ τῆς ἀληθείας.
translation:
  text: For we are not able to do anything against the truth, but only for the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we cannot do anything against the truth, but only in support of the
      truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - Indeed ... not
  - Because ... not
  lexicon: BDAG
  rationale: γάρ gives the explanatory ground for the preceding statement, and 'For'
    is the most natural concise English connector here. οὐ straightforwardly negates
    the clause.
- source_word: δυνάμεθά
  chosen: we are not able
  alternatives:
  - we cannot
  - we have no power
  lexicon: BDAG
  rationale: δύναμαι denotes ability or power. 'We are not able' preserves the verbal
    sense explicitly; 'cannot' is possible but slightly more compressed. The fuller
    form fits the balanced style and keeps the emphasis on incapacity.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  - in any respect
  lexicon: BDAG
  rationale: In a negated clause, the indefinite τι is idiomatically rendered 'anything.'
    This best captures the broad scope of Paul's statement.
- source_word: κατὰ τῆς ἀληθείας
  chosen: against the truth
  alternatives:
  - in opposition to the truth
  - against truth
  lexicon: BDAG
  rationale: κατά with the genitive commonly carries an adversative sense, 'against.'
    Including the article reflects the Greek and points to truth as a definite moral/spiritual
    reality, not merely abstract veracity.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: BDAG
  rationale: ἀλλά marks a strong contrast. 'But' is the most natural English equivalent
    in this compact antithesis.
- source_word: ὑπὲρ τῆς ἀληθείας
  chosen: for the truth
  alternatives:
  - on behalf of the truth
  - in support of the truth
  lexicon: BDAG
  rationale: ὑπέρ here expresses support or benefit. 'For the truth' preserves the
    concise rhetorical parallel with 'against the truth' while remaining clear in
    modern English.
