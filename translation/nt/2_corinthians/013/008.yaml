theological_decisions:
- issue: Meaning of 'the truth' in Paul's antithesis
  chosen_reading: '''the truth'' is retained without narrowing it to a specific doctrinal
    formula'
  alternative_readings:
  - the gospel truth
  - what is true
  rationale: Paul's wording is broader than a single doctrinal slogan, though in context
    it certainly includes the truth of the gospel and God's reality. Retaining 'the
    truth' preserves the theological breadth and rhetorical force without importing
    a narrower interpretation the text itself does not specify.
  doctrine_reference: Preserve theological tension rather than resolve it.
