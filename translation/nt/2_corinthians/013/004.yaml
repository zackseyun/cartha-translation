id: 2CO.13.4
reference: 2 Corinthians 13:4
source:
  edition: SBLGNT
  text: καὶ ⸀γὰρ ἐσταυρώθη ἐξ ἀσθενείας, ἀλλὰ ζῇ ἐκ δυνάμεως θεοῦ. καὶ γὰρ ἡμεῖς ἀσθενοῦμεν
    ἐν αὐτῷ, ἀλλὰ ⸀ζήσομεν σὺν αὐτῷ ἐκ δυνάμεως θεοῦ εἰς ὑμᾶς.
translation:
  text: For indeed he was crucified from weakness, but he lives from the power of
    God. For indeed we are weak in him, but we will live with him from the power of
    God toward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in weakness' for 'from weakness'; the Greek uses ἐξ, which more literally
      expresses source or basis.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the power of God' for 'from the power of God'; the Greek repeats
      ἐκ to set divine power in deliberate contrast with weakness.
    reason: lexical_alternative
  - marker: c
    text: '''We will live with him'' may refer to Paul''s future exercise of Christ-empowered
      life in relation to the Corinthians, and may also echo broader resurrection-life
      themes.'
    reason: alternative_reading
  - marker: d
    text: Or 'for you' / 'among you' for 'toward you'; the Greek εἰς ὑμᾶς is somewhat
      compressed and can indicate direction, relation, or effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσταυρώθη
  chosen: was crucified
  alternatives:
  - was put on a cross
  lexicon: BDAG
  rationale: Passive aorist of σταυρόω; 'was crucified' is the standard and most precise
    rendering in context.
- source_word: ἐξ ἀσθενείας
  chosen: from weakness
  alternatives:
  - out of weakness
  - in weakness
  lexicon: BDAG
  rationale: ἐκ/ἐξ with genitive most naturally expresses source or basis here. 'From
    weakness' preserves the Greek wording and the paradox Paul draws between apparent
    weakness and divine power. 'In weakness' is smoother English and common in translation
    tradition, but is less directly tied to ἐκ.
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  lexicon: BDAG
  rationale: Present active indicative of ζάω; 'lives' better preserves the verbal
    force and ongoing activity.
- source_word: ἐκ δυνάμεως θεοῦ
  chosen: from the power of God
  alternatives:
  - by the power of God
  - through the power of God
  lexicon: BDAG
  rationale: Repeated ἐκ phrase parallels ἐξ ἀσθενείας. Rendering it 'from the power
    of God' preserves the source-oriented contrast in Paul's wording. 'By the power
    of God' is idiomatic and interpretively similar, but less formally parallel.
- source_word: ἀσθενοῦμεν
  chosen: are weak
  alternatives:
  - are weaklings
  - are powerless
  - are weak/unimpressive
  lexicon: BDAG
  rationale: Present active indicative of ἀσθενέω. 'Are weak' best matches the lexical
    field and keeps the connection with ἀσθένεια in the first clause.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - with him
  - in union with him
  lexicon: BDAG
  rationale: ἐν is best left as 'in' to preserve Paul's compact union-with-Christ
    language without over-explication.
- source_word: ζήσομεν
  chosen: we will live
  alternatives:
  - we live
  - we shall live
  lexicon: BDAG
  rationale: Future active indicative; future should be preserved. It may refer to
    future experience of apostolic vindication/power rather than only eschatological
    life, so a simple future is best.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: σύν denotes association/participation. 'With him' is natural and sufficient.
- source_word: εἰς ὑμᾶς
  chosen: toward you
  alternatives:
  - for you
  - among you
  - in relation to you
  lexicon: BDAG
  rationale: εἰς here likely marks direction or reference of the life/power Paul expects
    to display in relation to the Corinthians. 'Toward you' preserves that directional
    nuance without overinterpreting.
