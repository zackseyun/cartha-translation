id: 2CO.13.9
reference: 2 Corinthians 13:9
source:
  edition: SBLGNT
  text: χαίρομεν γὰρ ὅταν ἡμεῖς ἀσθενῶμεν, ὑμεῖς δὲ δυνατοὶ ἦτε· ⸀τοῦτο καὶ εὐχόμεθα,
    τὴν ὑμῶν κατάρτισιν.
translation:
  text: 'For we rejoice when we are weak and you are strong. And this also is what
    we pray for: your restoration.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your maturity' or 'your being made complete.' The Greek can refer to
      restoration, equipping, or bringing something to proper condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρομεν
  chosen: we rejoice
  alternatives:
  - we are glad
  lexicon: BDAG
  rationale: Present indicative expressing Paul's current disposition; 'rejoice' preserves
    the stronger positive sense and matches common NT usage better than the flatter
    'are glad.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this statement to the preceding
    context. 'For' is natural and sufficiently formal here.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the subjunctive ἀσθενῶμεν, the clause has a general temporal sense.
    'When' is idiomatic English; 'whenever' is possible but slightly more repetitive
    than needed in context.
- source_word: ἀσθενῶμεν
  chosen: we are weak
  alternatives:
  - we are powerless
  - we are unimpressive
  lexicon: BDAG
  rationale: ἀσθενέω commonly denotes weakness, whether physical, social, or rhetorical.
    In this context Paul contrasts his apparent weakness with the Corinthians' strength,
    so 'weak' preserves the broad sense without over-specifying.
- source_word: δυνατοὶ
  chosen: strong
  alternatives:
  - powerful
  lexicon: BDAG
  rationale: δυνατός here contrasts naturally with 'weak.' 'Strong' is the most idiomatic
    antonym in English and fits Paul's rhetorical contrast.
- source_word: τοῦτο καὶ εὐχόμεθα
  chosen: And this also is what we pray for
  alternatives:
  - and this also we pray
  - and we also ask this
  lexicon: BDAG
  rationale: εὔχομαι in Pauline usage here is best rendered 'pray.' The fronted τοῦτο
    is carried by 'this also is what we pray for,' which preserves the emphasis while
    remaining natural English.
- source_word: κατάρτισιν
  chosen: restoration
  alternatives:
  - maturity
  - perfecting
  - being made complete
  lexicon: BDAG
  rationale: κατάρτισις can denote restoration to proper condition, equipping, or
    bringing to completeness. In the immediate context of disciplinary concern and
    hoped-for correction within the Corinthian church, 'restoration' best captures
    Paul's desire that they be set right. Alternatives are preserved because 'maturity'
    or 'completion' are also contextually plausible.
