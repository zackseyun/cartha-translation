theological_decisions:
- issue: Sense of κατάρτισις in relation to Paul's pastoral aim
  chosen_reading: your restoration
  alternative_readings:
  - your maturity
  - your completion
  rationale: The verse concerns Paul's joy at the Corinthians' strength and his prayer
    for their being put in proper order. 'Restoration' best reflects the likely pastoral
    and relational sense without importing a technical doctrine of perfection. The
    alternatives remain viable lexical possibilities and are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
