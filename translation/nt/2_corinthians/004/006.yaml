id: 2CO.4.6
reference: 2 Corinthians 4:6
source:
  edition: SBLGNT
  text: ὅτι ὁ θεὸς ὁ εἰπών· Ἐκ σκότους φῶς ⸀λάμψει, ὃς ἔλαμψεν ἐν ταῖς καρδίαις ἡμῶν
    πρὸς φωτισμὸν τῆς γνώσεως τῆς δόξης τοῦ θεοῦ ἐν προσώπῳ ⸀Χριστοῦ.
translation:
  text: For God, who said, “Light will shine out of darkness,” has shone in our hearts
    to give the light of the knowledge of the glory of God in the face of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in the person of Christ.” The Greek phrase can be understood more concretely
      as “in the face of the Messiah,” preserving the imagery of visible divine glory.
    reason: alternative_reading
  - marker: b
    text: Greek Χριστοῦ, traditionally “Christ”; here rendered “Messiah” because the
      term functions as a title.
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes Genesis 1:3 and uses creation-light imagery for God's
      revelatory work in believers.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this clause gives the ground for the prior statement, so a
    causal rendering is best. 'For' preserves the argumentative connection more idiomatically
    than 'that.'
- source_word: ὁ θεὸς ὁ εἰπών
  chosen: God, who said
  alternatives:
  - the God who said
  lexicon: BDAG
  rationale: The articular participle is naturally rendered as a relative clause in
    English. Omitting the repeated article before 'God' yields smoother English without
    loss of meaning.
- source_word: Ἐκ σκότους φῶς λάμψει
  chosen: Light will shine out of darkness
  alternatives:
  - Out of darkness light will shine
  - Light shall shine out of darkness
  lexicon: BDAG
  rationale: This preserves the future verb and the allusive echo of creation language
    while using natural modern English. 'Out of' brings out ἐκ more clearly than a
    bare locative rendering.
- source_word: ὃς ἔλαμψεν
  chosen: has shone
  alternatives:
  - shone
  - has caused to shine
  lexicon: BDAG
  rationale: The aorist is rendered as an English present perfect to connect God's
    past act with its abiding present effect in believers. The verb is intransitive
    here, so 'has shone' is preferable to a causative paraphrase.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  chosen: in our hearts
  alternatives:
  - in our inner beings
  lexicon: BDAG
  rationale: '''Hearts'' is the standard and sufficiently transparent rendering of
    καρδίαις, preserving the biblical metaphor for the inner person.'
- source_word: πρὸς φωτισμὸν
  chosen: to give the light
  alternatives:
  - for illumination
  - for enlightenment
  - for the light
  lexicon: BDAG
  rationale: φωτισμός denotes illumination/enlightenment. Rendering the phrase verbally
    as 'to give the light' makes the construction natural in English and prepares
    for the following genitive chain without excessive abstraction.
- source_word: τῆς γνώσεως
  chosen: of the knowledge
  alternatives:
  - of knowing
  lexicon: BDAG
  rationale: A formal noun rendering best preserves Paul's compact expression and
    theological weight.
- source_word: τῆς δόξης τοῦ θεοῦ
  chosen: of the glory of God
  alternatives:
  - of God's glory
  lexicon: BDAG
  rationale: The more literal chain is retained for transparency and rhythm; it remains
    natural English.
- source_word: ἐν προσώπῳ Χριστοῦ
  chosen: in the face of the Messiah
  alternatives:
  - in the person of Christ
  - in Christ's face
  - in the face of Christ
  lexicon: BDAG
  rationale: πρόσωπον most directly means 'face,' and the immediate context of glory
    and shining supports the concrete image rather than the abstract 'person.' Χριστοῦ
    is rendered 'the Messiah' because it functions as a title here, in keeping with
    the project's default.
