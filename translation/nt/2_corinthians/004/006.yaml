theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The noun functions as a christological title rather than a mere name-label
    in this context of divine glory revealed in him. Per project policy, titles are
    translated where context supports.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah where title;
    Christ where name-like'
- issue: Sense of ἐν προσώπῳ Χριστοῦ
  chosen_reading: in the face of the Messiah
  alternative_readings:
  - in the person of Christ
  rationale: The concrete rendering preserves the incarnation-revealing imagery and
    echoes the visible manifestation of divine glory, without reducing the phrase
    to an abstract reference to Christ's person. The alternative is worth preserving
    because many translations take πρόσωπον more idiomatically here.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; preserve theological
    tension rather than resolve it'
