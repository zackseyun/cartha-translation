theological_decisions:
- issue: Nature of Paul's contrast between deceptive ministry and truthful ministry
  chosen_reading: The verse describes ethical transparency in ministry rather than
    making a narrower doctrinal claim about inspiration, sacramental action, or ecclesial
    office.
  alternative_readings:
  - A more specific claim that Paul condemns only rhetorical manipulation
  - A broader doctrinal statement about all handling of Scripture
  rationale: The immediate context concerns apostolic conduct and proclamation. The
    translation should preserve that scope without importing a more technical doctrine
    not explicit in the text.
