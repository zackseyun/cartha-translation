id: 2CO.4.2
reference: 2 Corinthians 4:2
source:
  edition: SBLGNT
  text: ἀλλὰ ἀπειπάμεθα τὰ κρυπτὰ τῆς αἰσχύνης, μὴ περιπατοῦντες ἐν πανουργίᾳ μηδὲ
    δολοῦντες τὸν λόγον τοῦ θεοῦ, ἀλλὰ τῇ φανερώσει τῆς ἀληθείας ⸀συνιστάνοντες ἑαυτοὺς
    πρὸς πᾶσαν συνείδησιν ἀνθρώπων ἐνώπιον τοῦ θεοῦ.
translation:
  text: Instead, we have renounced the hidden things of shame, not walking in cunning
    nor falsifying the word of God, but by the open proclamation of the truth commending
    ourselves to every human conscience before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the manifestation of the truth.' The Greek may emphasize openly making
      the truth known rather than proclamation alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'adulterating the word of God.' The verb can suggest corrupting something
      by deceitful tampering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπειπάμεθα
  chosen: we have renounced
  alternatives:
  - we have disowned
  - we have rejected
  lexicon: BDAG
  rationale: Aorist middle conveys a decisive repudiation. 'Renounced' is idiomatic,
    weighty, and fits Paul's contrastive defense of ministry conduct better than the
    less natural 'disowned' or flatter 'rejected'.
- source_word: τὰ κρυπτὰ τῆς αἰσχύνης
  chosen: the hidden things of shame
  alternatives:
  - the shameful hidden things
  - the secret things of disgrace
  lexicon: BDAG
  rationale: Keeps the genitival structure and the emphasis on concealed practices
    characterized by shame. 'Hidden things of shame' is slightly formal but transparent;
    alternatives are possible but either interpret more strongly ('shameful') or sound
    less natural ('disgrace').
- source_word: περιπατοῦντες
  chosen: walking
  alternatives:
  - conducting ourselves
  - living
  lexicon: BDAG
  rationale: Paul commonly uses 'walk' metaphorically for manner of life. Retaining
    'walking' preserves Pauline diction while remaining understandable in English.
- source_word: ἐν πανουργίᾳ
  chosen: in cunning
  alternatives:
  - with craftiness
  - in deceitful scheming
  lexicon: BDAG
  rationale: πανουργία denotes unscrupulous cleverness or craftiness. 'In cunning'
    is concise and pairs well with 'walking'; 'craftiness' is a strong alternative
    but slightly more traditional in sound.
- source_word: δολοῦντες
  chosen: falsifying
  alternatives:
  - adulterating
  - distorting
  lexicon: BDAG
  rationale: The verb literally carries the sense of tampering with something by deceit,
    even adulterating for gain. 'Falsifying' communicates deceptive corruption of
    the message in clear modern English. 'Adulterating' is vivid but less accessible;
    'distorting' is broader and slightly less concrete.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: Standard and transparent rendering. 'Word of God' preserves the gravitas
    and breadth of λόγος here without over-specifying whether it means preached message
    or divine utterance generally.
- source_word: τῇ φανερώσει τῆς ἀληθείας
  chosen: by the open proclamation of the truth
  alternatives:
  - by the manifestation of the truth
  - by making the truth plain
  lexicon: BDAG
  rationale: φανέρωσις is a making visible/plain. In context of apostolic ministry
    and contrast with deception, 'open proclamation of the truth' brings out public
    disclosure in speech without losing the noun's force. 'Manifestation of the truth'
    is more formal but less natural; 'making the truth plain' is clear but more dynamic.
- source_word: συνιστάνοντες ἑαυτούς
  chosen: commending ourselves
  alternatives:
  - presenting ourselves as commendable
  - recommending ourselves
  lexicon: BDAG
  rationale: συνίστημι in this context means to commend or present favorably. 'Commending
    ourselves' is the most idiomatic Pauline rendering and does not imply boastfulness
    by itself, especially with the qualifying phrase that follows.
- source_word: πρὸς πᾶσαν συνείδησιν ἀνθρώπων
  chosen: to every human conscience
  alternatives:
  - to everyone's conscience
  - to every person's conscience
  lexicon: BDAG
  rationale: The phrase indicates appeal before the bar of each person's moral awareness.
    'Every human conscience' preserves the distributive πᾶσαν and the generic ἀνθρώπων
    without unnecessary awkwardness. It is gender-accurate to the source's representative
    sense.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: A direct and natural rendering that preserves the sense of divine witness/judgment
    over Paul's ministry. 'In the sight of God' is also good but slightly more idiomatic
    than necessary.
