theological_decisions:
- issue: Nature of ἀπολλυμένοις in Pauline soteriological context
  chosen_reading: those who are perishing
  alternative_readings:
  - those who are lost
  rationale: The participle denotes an ongoing condition/process rather than a static
    label alone. 'Perishing' preserves Pauline theological tension and avoids prematurely
    resolving the term into the more interpretive 'lost,' though that sense is contextually
    related.
  doctrine_reference: Preserve theological tension rather than resolve it.
