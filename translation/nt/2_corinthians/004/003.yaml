id: 2CO.4.3
reference: 2 Corinthians 4:3
source:
  edition: SBLGNT
  text: εἰ δὲ καὶ ἔστιν κεκαλυμμένον τὸ εὐαγγέλιον ἡμῶν, ἐν τοῖς ἀπολλυμένοις ἐστὶν
    κεκαλυμμένον,
translation:
  text: And even if our gospel is veiled, it is veiled among those who are perishing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who are perishing' or 'among the lost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ καὶ
  chosen: And even if
  alternatives:
  - But even if
  - Now even if
  lexicon: BDAG
  rationale: Renders the conditional-concessive force naturally in English while preserving
    δέ as discourse continuation/contrast and καί as intensifying 'even.'
- source_word: κεκαλυμμένον
  chosen: veiled
  alternatives:
  - hidden
  - covered
  lexicon: BDAG
  rationale: Perfect passive participle from καλύπτω; 'veiled' best preserves the
    metaphor established in the immediate context (cf. 3:14–16; 4:4) more precisely
    than the flatter 'hidden' or the overly literal 'covered.'
- source_word: τὸ εὐαγγέλιον ἡμῶν
  chosen: our gospel
  alternatives:
  - the gospel we preach
  - the good news we proclaim
  lexicon: BDAG
  rationale: Keeps the possessive ἡμῶν and the established Pauline phrase without
    over-expanding the expression. 'Gospel' is retained as standard, concise English
    for εὐαγγέλιον.
- source_word: ἐν τοῖς ἀπολλυμένοις
  chosen: among those who are perishing
  alternatives:
  - to those who are perishing
  - in the case of those who are perishing
  lexicon: BDAG
  rationale: 'The preposition ἐν with the dative here is rendered ''among'' to reflect
    sphere/reference rather than simple direction. The present middle/passive participle
    ἀπολλυμένοις is best captured as an ongoing state/process: ''those who are perishing.''
    This also aligns with Pauline usage in 1 Cor 1:18.'
- source_word: ἐστὶν κεκαλυμμένον
  chosen: it is veiled
  alternatives:
  - it remains veiled
  lexicon: BDAG
  rationale: Retains the repeated predicate for emphasis in the Greek. English requires
    the pronoun 'it' for clarity, referring back to 'our gospel.' 'Remains veiled'
    is interpretive and slightly overstates durative force beyond the simple copula
    plus perfect participle.
