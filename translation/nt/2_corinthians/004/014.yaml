id: 2CO.4.14
reference: 2 Corinthians 4:14
source:
  edition: SBLGNT
  text: εἰδότες ὅτι ὁ ἐγείρας ⸀τὸν Ἰησοῦν καὶ ἡμᾶς ⸀σὺν Ἰησοῦ ἐγερεῖ καὶ παραστήσει
    σὺν ὑμῖν.
translation:
  text: because we know that the one who raised the Lord Jesus will also raise us
    with Jesus and will present us with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the Lord Jesus' instead of 'Jesus.'
    reason: textual_variant
lexical_decisions:
- source_word: εἰδότες
  chosen: because we know
  alternatives:
  - knowing that
  - since we know that
  lexicon: BDAG
  rationale: Although formally a participle ('knowing'), in context it gives the ground
    for enduring affliction and is naturally rendered with causal force in English.
    'Because we know' communicates the participle's sense clearly in modern English.
- source_word: ὁ ἐγείρας
  chosen: the one who raised
  alternatives:
  - he who raised
  - the one having raised
  lexicon: BDAG
  rationale: Articular aorist participle referring to God. 'The one who raised' is
    natural, sufficiently formal, and preserves the participial construction without
    over-literal awkwardness.
- source_word: τὸν Ἰησοῦν
  chosen: the Lord Jesus
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: The SBLGNT text reads 'Jesus,' but the broad Pauline and immediate textual
    tradition often includes 'the Lord Jesus' here. Because the standard critical
    text cited is SBLGNT, the main-text wording should ordinarily follow 'Jesus';
    however, 'Lord Jesus' reflects a well-attested variant and familiar Pauline usage.
    The variant is preserved in a footnote for transparency.
- source_word: καὶ ἡμᾶς
  chosen: will also raise us
  alternatives:
  - will raise us too
  lexicon: BDAG
  rationale: The conjunction links Jesus' resurrection with believers' future resurrection.
    'Also' preserves the additive force cleanly in English.
- source_word: σὺν Ἰησοῦ
  chosen: with Jesus
  alternatives:
  - together with Jesus
  - through Jesus
  lexicon: BDAG
  rationale: σύν with the dative most naturally means association or accompaniment.
    'With Jesus' is the plain sense; 'through Jesus' would import instrumental nuance
    not warranted by the preposition.
- source_word: παραστήσει
  chosen: will present
  alternatives:
  - will bring into his presence
  - will cause to stand before
  lexicon: BDAG
  rationale: The verb can mean to present or place before someone, often in an eschatological
    setting. 'Will present' is concise and preserves the likely courtroom/presence
    nuance without needless expansion.
- source_word: σὺν ὑμῖν
  chosen: with you
  alternatives:
  - together with you
  lexicon: BDAG
  rationale: Again σύν marks shared association. 'With you' is idiomatic and communicates
    the communal eschatological hope Paul shares with the Corinthians.
