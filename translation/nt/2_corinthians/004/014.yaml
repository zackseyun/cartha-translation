theological_decisions:
- issue: Textual variant after ἐγείρας
  chosen_reading: Follow the SBLGNT main text sense as 'Jesus' in the verse's base
    wording, while preserving the widely attested fuller reading 'the Lord Jesus'
    in a footnote.
  alternative_readings:
  - Jesus
  - the Lord Jesus
  rationale: This is a textual rather than doctrinal issue. Either reading affirms
    the resurrection of Jesus and the believers' future resurrection. The longer reading
    is common in manuscript tradition and familiar in English Bibles, so it is worth
    preserving in a footnote for auditability.
- issue: Eschatological force of παραστήσει
  chosen_reading: Render as future divine presentation of Paul and the Corinthians
    together before God.
  alternative_readings:
  - general vindication
  - presentation before Christ's judgment/presence
  rationale: The context of resurrection hope supports an eschatological presentation.
    The translation remains broad enough not to over-specify the exact setting beyond
    what the Greek states.
  doctrine_reference: Apostles' Creed; Nicene Creed (resurrection of the dead / life
    of the world to come)
