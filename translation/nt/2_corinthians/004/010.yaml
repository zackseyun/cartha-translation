theological_decisions:
- issue: Meaning of νέκρωσις in relation to Jesus
  chosen_reading: Render as 'death of Jesus' rather than 'dying of Jesus.'
  alternative_readings:
  - dying of Jesus
  rationale: Both are possible in context, but 'death' better reflects the noun's
    lexical sense and the parallel with 'the life of Jesus.' It preserves Paul's union-with-Christ
    pattern without importing a narrower mystical interpretation.
- issue: Number of σώμα in English
  chosen_reading: Retain singular 'body' in both phrases.
  alternative_readings:
  - pluralize the second phrase as 'our bodies'
  rationale: The Greek uses singular in both instances. Keeping singular preserves
    the rhetoric and the embodied corporate sense of Paul's ministry, while still
    being intelligible in English.
