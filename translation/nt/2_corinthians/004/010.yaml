id: 2CO.4.10
reference: 2 Corinthians 4:10
source:
  edition: SBLGNT
  text: πάντοτε τὴν νέκρωσιν ⸀τοῦ Ἰησοῦ ἐν τῷ σώματι περιφέροντες, ἵνα καὶ ἡ ζωὴ τοῦ
    Ἰησοῦ ἐν τῷ σώματι ἡμῶν φανερωθῇ·
translation:
  text: always carrying in the body the death of Jesus, so that the life of Jesus
    may also be revealed in our body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dying of Jesus.' The Greek noun can emphasize the condition or experience
      of death borne in the body.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  - continually
  lexicon: BDAG
  rationale: Adverb of constant circumstance; 'always' is natural, concise, and preserves
    the ongoing force.
- source_word: νέκρωσιν
  chosen: death
  alternatives:
  - dying
  - putting to death
  - deadness
  lexicon: BDAG
  rationale: The noun denotes a state or experience of death/deadness. In this context,
    Paul speaks of sharing in Jesus' mortal suffering. 'Death' is clearer modern English
    than 'dying' here and avoids suggesting merely process rather than the embodied
    mark of death borne by the apostles.
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - belonging to Jesus
  - that Jesus endured
  lexicon: BDAG
  rationale: The genitive is retained formally as 'of Jesus.' Contextually it refers
    to the death associated with Jesus, without over-specifying the genitive relation
    in translation.
- source_word: ἐν τῷ σώματι
  chosen: in the body
  alternatives:
  - in our body
  - in the body of us
  lexicon: BDAG
  rationale: The first occurrence lacks an explicit possessive pronoun in Greek. 'In
    the body' preserves the wording and leaves the representative/collective sense
    intact; adding 'our' would interpretively harmonize with the second phrase.
- source_word: περιφέροντες
  chosen: carrying
  alternatives:
  - bearing around
  - carrying about
  lexicon: BDAG
  rationale: Present participle indicating continual embodied bearing. 'Carrying'
    is idiomatic English and preserves the metaphor of borne affliction without awkwardness.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose/result. 'So that' is readable modern English and preserves
    the clause relationship.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Marks corresponding addition between Jesus' death and Jesus' life. 'Also'
    fits the balanced parallelism.
- source_word: ζωὴ
  chosen: life
  lexicon: BDAG
  rationale: Straightforward rendering; in context it points to the manifested life
    of the risen Jesus.
- source_word: ἐν τῷ σώματι ἡμῶν
  chosen: in our body
  alternatives:
  - in our bodies
  lexicon: BDAG
  rationale: Greek σώματι is singular with plural possessive. English can preserve
    the collective singular, which suits Paul's corporate apostolic perspective and
    maintains the parallel with the earlier singular 'body.'
- source_word: φανερωθῇ
  chosen: may be revealed
  alternatives:
  - may be manifested
  - might become visible
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. 'May be revealed' is clear, natural,
    and preserves divine/passive nuance without archaic diction.
