theological_decisions:
- issue: Meaning of the death/life contrast
  chosen_reading: Paul contrasts the apostles' experience of deathlike suffering with
    the Corinthians' reception of spiritual life through apostolic ministry, without
    narrowing the statement to either merely physical or merely metaphorical categories.
  alternative_readings:
  - Strictly physical death in the apostles versus physical preservation in the Corinthians
  - Strictly spiritual death-to-self in the apostles versus eternal life in the Corinthians
  rationale: The immediate context (vv. 10–11) speaks of Jesus' death and life manifested
    in apostolic bodies, while the broader argument concerns ministry that brings
    life to others. The translation therefore keeps the concise literal terms 'death'
    and 'life' rather than interpreting them in the main text.
