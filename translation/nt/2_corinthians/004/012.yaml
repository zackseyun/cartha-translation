id: 2CO.4.12
reference: 2 Corinthians 4:12
source:
  edition: SBLGNT
  text: ὥστε ⸀ὁ θάνατος ἐν ἡμῖν ἐνεργεῖται, ἡ δὲ ζωὴ ἐν ὑμῖν.
translation:
  text: So then, death is at work in us, but life in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'death is working in us, but life in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - therefore
  - so that
  - consequently
  lexicon: BDAG
  rationale: Here ὥστε introduces the result or conclusion drawn from the preceding
    discussion (vv. 8–11). 'So then' conveys inferential force in natural English
    without sounding overly formal.
- source_word: ὁ θάνατος
  chosen: death
  alternatives:
  - the death
  lexicon: BDAG
  rationale: The article is retained conceptually but not translated explicitly because
    idiomatic English prefers the abstract noun 'death' here. The sense is not a specific
    death-event only, but death as an operative reality in Paul's apostolic suffering.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  - within us
  lexicon: BDAG
  rationale: '''In us'' is the most direct rendering of ἐν with the dative and fits
    Paul''s contrast between the apostolic band and the Corinthians. ''Among us''
    is possible but weaker than the personal, embodied sense in context.'
- source_word: ἐνεργεῖται
  chosen: is at work
  alternatives:
  - is working
  - is active
  - is operative
  lexicon: BDAG
  rationale: The middle/passive form here expresses effective operation. 'Is at work'
    is idiomatic modern English and preserves the ongoing, active sense better than
    the more wooden 'is working' or technical 'is operative.'
- source_word: ἡ δὲ ζωὴ
  chosen: but life
  alternatives:
  - and life
  - but the life
  lexicon: BDAG
  rationale: δέ marks contrast, so 'but' appropriately signals the opposition between
    death in the apostles and life in the Corinthians. As with θάνατος, the article
    is not carried over explicitly because English idiom prefers the abstract noun.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  - within you
  lexicon: BDAG
  rationale: The direct parallel with ἐν ἡμῖν favors 'in you.' It preserves the concise
    antithesis of the Greek and leaves open both communal and personal resonance.
