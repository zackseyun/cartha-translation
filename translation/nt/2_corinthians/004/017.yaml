theological_decisions:
- issue: Nature of the glory produced by affliction
  chosen_reading: The verse speaks of present affliction resulting in future, eschatological
    glory for believers, without implying that suffering merits salvation.
  alternative_readings:
  - Affliction earns glory by human merit
  - Affliction only produces present spiritual maturity
  rationale: Paul's language of contrast between 'momentary' affliction and 'eternal'
    glory points to eschatological outcome. The verb indicates instrumentality/result,
    not meritorious causation. The translation 'is producing for us' preserves the
    text's wording without importing a doctrine of merit.
  doctrine_reference: Historic ecumenical orthodoxy; preserve theological tension
    without importing claims beyond the text.
