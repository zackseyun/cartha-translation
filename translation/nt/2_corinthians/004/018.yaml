theological_decisions:
- issue: Rendering the visible/invisible contrast
  chosen_reading: Maintain concrete language of 'things that are seen' and 'things
    that are not seen' rather than abstracting to 'material' and 'spiritual' things.
  alternative_readings:
  - the visible things ... the invisible things
  - material things ... spiritual things
  rationale: Paul contrasts seen and unseen realities without explicitly defining
    them as material versus spiritual in a philosophical sense. The translation preserves
    the theological tension and avoids importing categories the text does not itself
    state.
  doctrine_reference: Preserve theological tension rather than resolve it.
