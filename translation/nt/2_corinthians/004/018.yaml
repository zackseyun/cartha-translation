id: 2CO.4.18
reference: 2 Corinthians 4:18
source:
  edition: SBLGNT
  text: μὴ σκοπούντων ἡμῶν τὰ βλεπόμενα ἀλλὰ τὰ μὴ βλεπόμενα, τὰ γὰρ βλεπόμενα πρόσκαιρα,
    τὰ δὲ μὴ βλεπόμενα αἰώνια.
translation:
  text: as we look not to the things that are seen but to the things that are not
    seen. For the things that are seen are temporary, but the things that are not
    seen are eternal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''what is seen ... what is not seen''; also possible: ''the visible
      things ... the invisible things.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοπούντων
  chosen: look to
  alternatives:
  - fix our eyes on
  - consider
  - focus on
  lexicon: BDAG
  rationale: Present participle of σκοπέω here carries the sense of directing attention
    toward or fixing one's gaze/concern on something. 'Look to' preserves the visual
    metaphor and reads naturally in English without overstating intensity. Because
    it is a genitive participle dependent on the prior clause, 'as we look' appropriately
    conveys the circumstantial force.
- source_word: μὴ
  chosen: not
  alternatives:
  - no longer
  lexicon: BDAG
  rationale: Simple negation of the participle and of the second participial phrase.
    'Not' is the plain sense; 'no longer' would import a temporal nuance absent from
    the Greek.
- source_word: τὰ βλεπόμενα
  chosen: the things that are seen
  alternatives:
  - what is seen
  - the visible things
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally in the neuter
    plural. 'The things that are seen' preserves the repeated formal parallel with
    τὰ μὴ βλεπόμενα and maintains Paul's contrast between visible and invisible realities.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Strong adversative marking contrast between the two objects of attention.
    'But' is straightforward and preserves the antithesis.
- source_word: τὰ μὴ βλεπόμενα
  chosen: the things that are not seen
  alternatives:
  - what is unseen
  - the invisible things
  lexicon: BDAG
  rationale: Substantival participle with negation, deliberately parallel to τὰ βλεπόμενα.
    The chosen rendering keeps the same structure and rhetorical symmetry across the
    verse.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding assertion. 'For'
    preserves the formal connection in Pauline argumentation.
- source_word: πρόσκαιρα
  chosen: temporary
  alternatives:
  - transient
  - for a season
  - momentary
  lexicon: BDAG
  rationale: Describes what lasts only for a limited time. 'Temporary' is clear modern
    English and fits the contrast with αἰώνια. 'Momentary' would echo v.17 but is
    stronger than the lexical value here.
- source_word: δέ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: Marks the second member of the contrast. 'But' best preserves the antithetical
    force alongside the previous clause.
- source_word: αἰώνια
  chosen: eternal
  alternatives:
  - everlasting
  - age-lasting
  lexicon: BDAG
  rationale: In this Pauline contrast with πρόσκαιρα, αἰώνια denotes what belongs
    to the age to come and endures without end. 'Eternal' is the established and most
    natural rendering in context.
- source_word: ἡμῶν
  chosen: we
  alternatives:
  - us
  - our
  lexicon: BDAG
  rationale: 'Though formally genitive with the participle, in English it is best
    represented as the understood subject of the participial clause: ''as we look.''
    This yields natural syntax while preserving the sense.'
