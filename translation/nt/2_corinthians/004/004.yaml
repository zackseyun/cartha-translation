id: 2CO.4.4
reference: 2 Corinthians 4:4
source:
  edition: SBLGNT
  text: ἐν οἷς ὁ θεὸς τοῦ αἰῶνος τούτου ἐτύφλωσεν τὰ νοήματα τῶν ἀπίστων εἰς τὸ μὴ
    ⸀αὐγάσαι τὸν φωτισμὸν τοῦ εὐαγγελίου τῆς δόξης τοῦ Χριστοῦ, ὅς ἐστιν εἰκὼν τοῦ
    θεοῦ.
translation:
  text: In their case, the god of this age has blinded the minds of the unbelieving,
    so that the light of the gospel of the glory of the Messiah, who is the image
    of God, might not shine on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that they might not see the light of the gospel of the glory of
      the Messiah.' The rare verb here may emphasize either the light's shining or
      their perceiving it.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the god of this world.' Greek aiōn normally means 'age,' emphasizing
      the present fallen era.
    reason: lexical_alternative
  - marker: c
    text: Greek Christos; rendered 'Messiah' here because it functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν οἷς
  chosen: In their case
  alternatives:
  - among whom
  - in whom
  lexicon: BDAG
  rationale: The phrase refers back to the perishing/unbelieving people of the prior
    context. 'In their case' communicates the referential force idiomatically in English
    without suggesting mystical indwelling.
- source_word: ὁ θεὸς τοῦ αἰῶνος τούτου
  chosen: the god of this age
  alternatives:
  - the god of this world
  lexicon: BDAG
  rationale: αἰών is more precisely 'age' than 'world' here, pointing to the present
    evil era rather than the created order. The lower-case 'god' reflects the referent
    as a false deity/usurping power, not the true God.
- source_word: ἐτύφλωσεν
  chosen: has blinded
  alternatives:
  - blinded
  lexicon: BDAG
  rationale: English present perfect fits the aorist well in context, emphasizing
    the present result of the completed action.
- source_word: τὰ νοήματα
  chosen: the minds
  alternatives:
  - the thoughts
  - the understandings
  lexicon: BDAG
  rationale: νόημα here refers to the faculty/perceptions of understanding rather
    than isolated thoughts. 'Minds' is the most natural and accurate English equivalent
    in context.
- source_word: τῶν ἀπίστων
  chosen: of the unbelieving
  alternatives:
  - of the unbelievers
  - of the faithless
  lexicon: BDAG
  rationale: The substantival adjective denotes those who do not believe. 'The unbelieving'
    preserves the adjectival force and avoids importing a stronger moral nuance from
    'faithless.'
- source_word: εἰς τὸ μὴ αὐγάσαι
  chosen: so that ... might not shine on them
  alternatives:
  - to keep ... from seeing
  - so that they might not perceive the shining of
  lexicon: BDAG
  rationale: The construction expresses purpose/result. αὐγάζω is rare and can denote
    shining/illumining or seeing brightness; with φωτισμός as object, the sense is
    best captured as the gospel's light not shining upon them. 'On them' makes explicit
    the implied object in natural English.
- source_word: τὸν φωτισμὸν
  chosen: the light
  alternatives:
  - the illumination
  - the radiance
  lexicon: BDAG
  rationale: While formally 'illumination,' in English 'the light' is both readable
    and faithful in this metaphorical context.
- source_word: τοῦ εὐαγγελίου
  chosen: of the gospel
  alternatives:
  - of the good news
  lexicon: BDAG
  rationale: '''Gospel'' remains clear modern English and preserves the established
    theological sense without distortion.'
- source_word: τῆς δόξης
  chosen: of the glory
  alternatives:
  - of the glorious gospel
  - of the splendor
  lexicon: BDAG
  rationale: 'The genitive is preserved rather than converted into an attributive
    adjective. This maintains the layered structure: the light belonging to the gospel
    concerning the glory of the Messiah.'
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title. Here it is clearly titular and christological rather than merely name-like.
- source_word: ὅς ἐστιν εἰκὼν τοῦ θεοῦ
  chosen: who is the image of God
  alternatives:
  - who is God's image
  lexicon: BDAG
  rationale: This is a direct christological identification. 'Image of God' is the
    standard and clear rendering of εἰκών in Pauline usage and preserves intertextual
    resonance.
