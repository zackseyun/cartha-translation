theological_decisions:
- issue: Referent of 'the god of this age'
  chosen_reading: A false god/usurping ruler, traditionally understood as Satan, not
    the true God.
  alternative_readings:
  - A merely impersonal worldly system
  rationale: The Greek expression naturally identifies a personal evil power exercising
    dominion over the present age. The translation retains the phrase itself rather
    than substituting 'Satan,' avoiding over-interpretation while not obscuring the
    likely referent.
  doctrine_reference: Historic Christian orthodoxy affirms personal evil powers but
    the translation should not import terms absent from the text.
- issue: Function of αὐγάσαι with φωτισμός
  chosen_reading: The gospel's light is what does not shine upon the unbelieving.
  alternative_readings:
  - The unbelieving do not see the light/illumination of the gospel
  rationale: Because αὐγάζω is rare and the syntax can be taken in more than one way,
    the main text adopts the reading most naturally coordinated with 'light/illumination.'
    The alternative is preserved in a footnote.
- issue: Christological force of 'image of God'
  chosen_reading: A direct statement about the Messiah's unique relation to God is
    preserved without explanatory expansion.
  alternative_readings:
  - No major alternative translation adopted
  rationale: The verse has strong christological significance, but the translation
    should state only what the Greek states and avoid importing later doctrinal terminology
    into the text proper.
  doctrine_reference: Nicene and Chalcedonian boundaries affirmed, but not inserted
    into wording beyond the source text.
