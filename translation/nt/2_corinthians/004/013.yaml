id: 2CO.4.13
reference: 2 Corinthians 4:13
source:
  edition: SBLGNT
  text: Ἔχοντες δὲ τὸ αὐτὸ πνεῦμα τῆς πίστεως, κατὰ τὸ γεγραμμένον· Ἐπίστευσα, διὸ
    ἐλάλησα, καὶ ἡμεῖς πιστεύομεν, διὸ καὶ λαλοῦμεν,
translation:
  text: But having the same spirit of faith, according to what is written, “I believed;
    therefore I spoke,” we also believe; therefore we also speak,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the same Spirit of faith,” if πνεῦμα is taken as a reference to the
      Holy Spirit rather than to a shared faith-filled disposition.
    reason: alternative_reading
  - marker: b
    text: Paul quotes Psalm 116:10 (LXX 115:1), aligning his own faith and speaking
      with the psalmist’s testimony.
    reason: cross_reference
lexical_decisions:
- source_word: Ἔχοντες
  chosen: having
  alternatives:
  - since we have
  - because we have
  lexicon: BDAG
  rationale: Present active participle nominative plural is best carried with a participial
    form to preserve the Greek flow into the main clause. 'Having' keeps the syntactic
    connection without over-interpreting the causal nuance.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous context; 'But'
    fits Paul's argumentative movement here.
- source_word: τὸ αὐτὸ πνεῦμα τῆς πίστεως
  chosen: the same spirit of faith
  alternatives:
  - the same Spirit of faith
  - the same spirit characterized by faith
  lexicon: BDAG
  rationale: The phrase echoes the cited Psalm and most naturally denotes a shared
    disposition or animating principle marked by faith. Lowercase 'spirit' avoids
    importing a reference to the Holy Spirit where the text itself is not explicit.
    The genitive 'of faith' is retained rather than paraphrased.
- source_word: κατὰ τὸ γεγραμμένον
  chosen: according to what is written
  alternatives:
  - as it is written
  - in accordance with what has been written
  lexicon: BDAG
  rationale: This idiom introduces Scripture citation. 'According to what is written'
    is clear modern English while preserving the formal citation formula.
- source_word: Ἐπίστευσα
  chosen: I believed
  alternatives:
  - I put my faith
  - I trusted
  lexicon: BDAG
  rationale: Aorist verb in the scriptural quotation is most directly rendered 'I
    believed.' This also maintains consistency with the default rendering of πίστις/πιστεύω
    as the faith/believe word-group.
- source_word: διὸ
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: BDAG
  rationale: διό expresses result/inference. 'Therefore' best matches the logical
    force in both occurrences.
- source_word: ἐλάλησα
  chosen: I spoke
  alternatives:
  - I spoke out
  - I said
  lexicon: BDAG
  rationale: λαλέω is a common verb for speaking; 'spoke' is the simplest and most
    direct rendering in the citation.
- source_word: καὶ ἡμεῖς πιστεύομεν
  chosen: we also believe
  alternatives:
  - we too believe
  lexicon: BDAG
  rationale: The emphatic pronoun plus καί marks correspondence with the cited speaker.
    'We also believe' preserves the parallel structure.
- source_word: διὸ καὶ λαλοῦμεν
  chosen: therefore we also speak
  alternatives:
  - therefore we too speak
  - and so we also speak
  lexicon: BDAG
  rationale: The second καί naturally falls on 'also,' preserving the rhetorical parallel
    with the quotation and Paul's application.
