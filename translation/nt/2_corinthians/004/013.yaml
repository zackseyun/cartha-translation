theological_decisions:
- issue: Whether πνεῦμα here refers to the Holy Spirit or to a shared spirit/disposition
    of faith
  chosen_reading: shared spirit/disposition ('spirit of faith')
  alternative_readings:
  - the Holy Spirit as the giver/source of faith
  rationale: The immediate context links Paul's statement to the cited words 'I believed;
    therefore I spoke,' suggesting the same faith-filled disposition or animating
    spirit rather than an explicit Trinitarian reference. Because the Greek lacks
    markers that require 'Spirit,' the main text preserves the ambiguity without capitalizing.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the πιστ- word group
  chosen_reading: believed / believe
  alternative_readings:
  - trusted
  - had faith
  rationale: DOCTRINE.md sets the default rendering of πίστις as 'faith' and requires
    alternatives to be preserved where contested. Here the verbal form πιστεύω is
    rendered with the cognate English verb 'believe' for consistency and natural English.
  doctrine_reference: 'Contested terms table: πίστις → faith; alternatives preserved
    where contested.'
