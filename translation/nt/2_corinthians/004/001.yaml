theological_decisions:
- issue: Implication of the passive ἠλεήθημεν
  chosen_reading: The passive implies that God showed mercy to Paul and his companions,
    grounding their possession of ministry in divine mercy rather than personal merit.
  alternative_readings:
  - The phrase could be taken more generally as having obtained compassion without
    making the agent explicit in translation.
  rationale: Paul's wording reflects a divine passive and fits the broader Pauline
    theme that ministry is received by God's mercy. The translation expresses this
    idiomatically without importing additional doctrinal claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
