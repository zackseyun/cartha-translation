theological_decisions:
- issue: Nature of the 'treasure' and 'jars' metaphor
  chosen_reading: Retain the metaphor without explicating the treasure as the gospel
    or the jars as human bodies/weakness in the main text.
  alternative_readings:
  - Interpretively expand as 'this gospel treasure' or 'in our frail bodies'
  rationale: Paul's surrounding context clarifies the metaphor, but the verse itself
    leaves it metaphorical. Expanding it in translation would import interpretation
    beyond the Greek wording.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Force of ἵνα clause
  chosen_reading: Render as purpose/result with 'so that ... may be.'
  alternative_readings:
  - 'Pure result: ''with the result that ... is'''
  rationale: Pauline ἵνα can shade toward result, but the traditional purpose nuance
    remains natural here and does not overstate causality.
