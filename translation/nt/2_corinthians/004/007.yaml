id: 2CO.4.7
reference: 2 Corinthians 4:7
source:
  edition: SBLGNT
  text: Ἔχομεν δὲ τὸν θησαυρὸν τοῦτον ἐν ὀστρακίνοις σκεύεσιν, ἵνα ἡ ὑπερβολὴ τῆς
    δυνάμεως ᾖ τοῦ θεοῦ καὶ μὴ ἐξ ἡμῶν·
translation:
  text: But we have this treasure in clay jars, so that the surpassing greatness of
    the power may be of God and not from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in earthen vessels."
    reason: lexical_alternative
  - marker: b
    text: Or "the extraordinary power" or "the surpassing power."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχομεν
  chosen: we have
  alternatives:
  - we hold
  - we possess
  lexicon: BDAG
  rationale: Present indicative first person plural is straightforwardly rendered
    as a present-tense statement of possession.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast/transition from the preceding context; 'But' preserves
    the adversative force better than a simple connective.
- source_word: τὸν θησαυρὸν τοῦτον
  chosen: this treasure
  alternatives:
  - this treasure-store
  lexicon: BDAG
  rationale: θησαυρός commonly means 'treasure'; the demonstrative is retained to
    point back to the gospel/light described in context.
- source_word: ἐν ὀστρακίνοις σκεύεσιν
  chosen: in clay jars
  alternatives:
  - in earthen vessels
  - in pottery containers
  lexicon: BDAG
  rationale: ὀστράκινος denotes made of baked clay/earthenware; σκεῦος is a general
    'container/vessel.' 'Clay jars' is natural modern English while preserving the
    humble, fragile imagery. 'Earthen vessels' is more traditional but less idiomatic.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic and preserves the clause's
    purposive sense.
- source_word: ἡ ὑπερβολὴ τῆς δυνάμεως
  chosen: the surpassing greatness of the power
  alternatives:
  - the extraordinary power
  - the surpassing power
  - the excellence of the power
  lexicon: BDAG
  rationale: ὑπερβολή conveys excess, extraordinary degree, surpassing quality. Retaining
    a noun phrase rather than collapsing it too far keeps closer to the Greek structure;
    'of the power' reflects the genitive τῆς δυνάμεως.
- source_word: ᾖ
  chosen: may be
  alternatives:
  - might be
  - would be shown to be
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is well represented by 'may be' in English
    purpose language.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  - from God
  lexicon: BDAG
  rationale: The genitive is kept formally as 'of God' to match the following contrast
    with 'not from us' and to preserve the terse Pauline expression.
- source_word: καὶ μὴ ἐξ ἡμῶν
  chosen: and not from us
  alternatives:
  - and not of us
  - and not from ourselves
  lexicon: BDAG
  rationale: ἐκ/ἐξ expresses source. 'From us' preserves the source contrast with
    God's agency/power without over-interpreting the pronoun reflexively.
