id: 2CO.4.5
reference: 2 Corinthians 4:5
source:
  edition: SBLGNT
  text: οὐ γὰρ ἑαυτοὺς κηρύσσομεν ἀλλὰ ⸂Χριστὸν Ἰησοῦν⸃ κύριον, ἑαυτοὺς δὲ δούλους
    ὑμῶν διὰ Ἰησοῦν.
translation:
  text: For we do not proclaim ourselves, but Jesus the Messiah as Lord, and ourselves
    as your slaves for Jesus' sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus the Lord.' The Greek Χριστός may be rendered 'Christ' where
      it functions more like a name; here it is taken as the title 'Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your servants' or 'your bondservants.' The Greek δοῦλοι can mean servants
      or slaves; 'slaves' is used here to preserve the stronger sense of subordination
      in contrast with Jesus as Lord.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: κηρύσσομεν
  chosen: proclaim
  alternatives:
  - preach
  - announce
  lexicon: BDAG
  rationale: '''Proclaim'' preserves the public heralding sense of κηρύσσω without
    restricting the meaning to formal sermon-preaching.'
- source_word: ἑαυτοὺς
  chosen: ourselves
  lexicon: BDAG
  rationale: 'Reflexive pronoun is repeated for contrast: Paul and his coworkers are
    not the content of their proclamation, but are described separately in relation
    to the Corinthians.'
- source_word: Χριστὸν Ἰησοῦν
  chosen: Jesus the Messiah
  alternatives:
  - Christ Jesus
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός is treated here as a title rather than a fixed name, so 'Messiah'
    follows the project's default for Christological titles while keeping the personal
    name transliterated.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: 'Follows the project''s default rendering for κύριος. In this construction
    it predicates what is proclaimed about Jesus: that he is Lord.'
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Given the deliberate contrast with 'Lord' and Paul's self-humbling description
    of his apostolic role toward the Corinthians, the bonded and subordinate force
    of δοῦλος is salient here, so 'slaves' best preserves the strength of the term.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The genitive after δοῦλος is naturally rendered 'your,' expressing relational
    subordination/service to the Corinthian believers.
- source_word: διὰ Ἰησοῦν
  chosen: for Jesus' sake
  alternatives:
  - because of Jesus
  - through Jesus
  lexicon: BDAG
  rationale: 'With διά + accusative, the phrase most naturally expresses reason or
    motive here: their servanthood toward the Corinthians is on account of Jesus,
    not ultimately grounded in the Corinthians themselves.'
