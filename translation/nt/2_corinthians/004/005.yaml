theological_decisions:
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: 'Title: ''Messiah'''
  alternative_readings:
  - Christ
  rationale: The doctrine guidelines prefer 'Messiah' where Χριστός functions as a
    title. In this verse the phrase presents the content of proclamation about Jesus,
    so the titular force is still active.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of the proclamation clause Χριστὸν Ἰησοῦν κύριον
  chosen_reading: '''Jesus the Messiah as Lord'''
  alternative_readings:
  - '''Christ Jesus the Lord'''
  - '''Jesus Christ is Lord'''
  rationale: The accusative phrase after κηρύσσομεν is best rendered as the content
    of proclamation, with κύριον functioning predicatively. 'As Lord' preserves the
    Greek structure without adding a finite verb absent from the text.
  doctrine_reference: Nicene/orthodox Christology affirmed; translation should preserve,
    not expand beyond, the text's confession of Jesus' lordship.
