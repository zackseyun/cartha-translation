theological_decisions:
- issue: Anthropological contrast between ὁ ἔξω ἄνθρωπος and ὁ ἔσω
  chosen_reading: Rendered as 'outer man' / 'inner man' without importing a full body-soul
    dualism beyond Paul's stated contrast.
  alternative_readings:
  - outer self / inner self
  - outward nature / inward nature
  rationale: The verse contrasts external bodily deterioration with internal spiritual
    renewal. Retaining 'man' preserves the source wording and Pauline idiom while
    avoiding interpretive expansion into a technical anthropology the text itself
    does not define.
