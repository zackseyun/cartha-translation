id: 2CO.4.16
reference: 2 Corinthians 4:16
source:
  edition: SBLGNT
  text: Διὸ οὐκ ⸀ἐγκακοῦμεν, ἀλλ’ εἰ καὶ ὁ ἔξω ἡμῶν ἄνθρωπος διαφθείρεται, ἀλλ’ ὁ
    ⸂ἔσω ἡμῶν⸃ ἀνακαινοῦται ἡμέρᾳ καὶ ἡμέρᾳ.
translation:
  text: Therefore we do not lose heart. But even if our outer man is wasting away,
    yet our inner man is being renewed day by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our outer person' and 'our inner person.' The Greek uses 'man' in a
      representative sense and sets up a deliberate contrast between the outer and
      inner human life.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    is natural and sufficiently formal.
- source_word: οὐκ ἐγκακοῦμεν
  chosen: we do not lose heart
  alternatives:
  - we do not become discouraged
  - we do not give up
  lexicon: BDAG
  rationale: The idiom ἐγκακέω in Pauline usage commonly conveys not losing courage
    or becoming weary in spirit. 'Lose heart' preserves the established sense without
    sounding archaic.
- source_word: ἀλλ’ εἰ καὶ
  chosen: But even if
  alternatives:
  - But if indeed
  - But although
  lexicon: BDAG
  rationale: Concessive construction introducing a real or acknowledged circumstance.
    'But even if' keeps the rhetorical contrast and concessive nuance.
- source_word: ὁ ἔξω ἡμῶν ἄνθρωπος
  chosen: our outer man
  alternatives:
  - our outer person
  - our outward man
  - the outer man of us
  lexicon: BDAG
  rationale: ἄνθρωπος is singular and here contrasts with the 'inner man.' Per translation
    philosophy, gender-accurate rendering is preferred where representative force
    is present. 'Outer man' preserves the lexical and intertextual parallel with 'inner
    man' in Pauline usage better than 'outer person'.
- source_word: διαφθείρεται
  chosen: is wasting away
  alternatives:
  - is being destroyed
  - is decaying
  - is perishing
  lexicon: BDAG
  rationale: Present passive indicates an ongoing process of deterioration rather
    than annihilation. 'Is wasting away' communicates bodily decline idiomatically
    in English.
- source_word: ἀλλ’
  chosen: yet
  alternatives:
  - but
  - nevertheless
  lexicon: BDAG
  rationale: Used to sharpen the contrast with the preceding clause; 'yet' reads smoothly
    in English while preserving the adversative force.
- source_word: ὁ ἔσω ἡμῶν
  chosen: our inner man
  alternatives:
  - our inner self
  - the inner man of us
  - our inward man
  lexicon: BDAG
  rationale: Elliptical expression paired with 'outer man.' 'Inner man' preserves
    the lexical correspondence and Pauline resonance; 'self' would be smoother but
    less formally transparent.
- source_word: ἀνακαινοῦται
  chosen: is being renewed
  alternatives:
  - is being made new
  - is renewed
  lexicon: BDAG
  rationale: Present passive expresses ongoing renewal effected upon the subject.
    'Is being renewed' captures the continuous aspect more clearly than a simple present.
- source_word: ἡμέρᾳ καὶ ἡμέρᾳ
  chosen: day by day
  alternatives:
  - from day to day
  - each day
  lexicon: BDAG
  rationale: Idiomatic distributive expression indicating continual recurrence. 'Day
    by day' is the most natural English equivalent.
