id: 2CO.4.11
reference: 2 Corinthians 4:11
source:
  edition: SBLGNT
  text: ἀεὶ γὰρ ἡμεῖς οἱ ζῶντες εἰς θάνατον παραδιδόμεθα διὰ Ἰησοῦν, ἵνα καὶ ἡ ζωὴ
    τοῦ Ἰησοῦ φανερωθῇ ἐν τῇ θνητῇ σαρκὶ ἡμῶν.
translation:
  text: For we who are living are always being handed over to death for Jesus’ sake,
    so that the life of Jesus also may be revealed in our mortal flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of Jesus' or 'for Jesus.'
    reason: lexical_alternative
  - marker: b
    text: '''Flesh'' here refers to mortal bodily existence, not to the ''sinful nature.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀεί
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Adverb of constant/repeated circumstance; 'always' is the most natural
    and direct English equivalent.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this statement as an explanation of the previous verse; 'For'
    preserves the discourse linkage without overinterpreting.
- source_word: οἱ ζῶντες
  chosen: we who are living
  alternatives:
  - we the living
  - we who live
  lexicon: BDAG
  rationale: Substantival present participle. 'We who are living' preserves the ongoing
    force and contrast with 'death' in the same clause.
- source_word: εἰς θάνατον
  chosen: to death
  alternatives:
  - over to death
  - for death
  lexicon: BDAG
  rationale: 'With παραδιδόμεθα, the phrase expresses result/destination: being delivered
    over so as to face death. ''To death'' is concise and idiomatic English.'
- source_word: παραδιδόμεθα
  chosen: are being handed over
  alternatives:
  - are being delivered over
  - are being given over
  lexicon: BDAG
  rationale: Present passive indicates ongoing action. 'Handed over' is a transparent,
    natural rendering that preserves the passive sense and echoes judicial/persecutory
    contexts.
- source_word: διὰ Ἰησοῦν
  chosen: for Jesus’ sake
  alternatives:
  - because of Jesus
  - for Jesus
  lexicon: BDAG
  rationale: διά with the accusative commonly indicates reason or cause. In context
    of apostolic suffering endured on account of allegiance to Jesus, 'for Jesus’
    sake' captures the causal sense idiomatically.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is readable modern English and adequately
    preserves the telic force.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Placed with 'the life of Jesus' to mark correspondence with the preceding
    mention of Jesus' death; 'also' preserves this parallelism.
- source_word: ἡ ζωὴ τοῦ Ἰησοῦ
  chosen: the life of Jesus
  alternatives:
  - Jesus' life
  lexicon: BDAG
  rationale: Retaining the fuller genitival expression preserves the formal parallel
    with the Greek and the theological contrast with death in the verse.
- source_word: φανερωθῇ
  chosen: may be revealed
  alternatives:
  - may be made manifest
  - might be shown
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. 'May be revealed' is natural English
    that preserves divine/passive openness without adding an explicit agent.
- source_word: ἐν τῇ θνητῇ σαρκὶ ἡμῶν
  chosen: in our mortal flesh
  alternatives:
  - in our mortal body
  - in our mortal bodies
  lexicon: BDAG
  rationale: σάρξ is a contested term in Pauline usage, but here the context is literal
    bodily mortality, not the ethical/metaphorical 'sinful nature.' Therefore 'flesh'
    best preserves the Greek while 'mortal' clarifies physical perishability. Singular
    'flesh' reflects the Greek collective/somatic expression.
