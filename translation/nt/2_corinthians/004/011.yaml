theological_decisions:
- issue: Rendering of σάρξ in a Pauline context
  chosen_reading: literal 'flesh'
  alternative_readings:
  - body
  - sinful nature
  rationale: The phrase 'mortal flesh' clearly points to the apostles' physically
    vulnerable embodied existence, not to an ethical principle of sin. Because DOCTRINE.md
    specifies 'flesh' for literal uses and 'sinful nature' only for metaphorical uses,
    the main text keeps 'flesh.' 'Body' is possible in idiomatic English but would
    flatten Paul's chosen term and its resonance with mortality.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → ''flesh'' (literal) / ''sinful
    nature'' (metaphorical)'
