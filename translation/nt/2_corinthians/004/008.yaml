theological_decisions:
- issue: Degree of intensification in the second participial pair
  chosen_reading: Render ἐξαπορούμενοι as "driven to despair" to distinguish it from
    ἀπορούμενοι and preserve Paul's intensification without importing a doctrinal
    claim about loss of faith.
  alternative_readings:
  - render as "utterly at a loss" to stay closer to the cognitive nuance of the Greek
  rationale: The verse describes apostolic suffering and resilience, not a technical
    doctrine of psychological despair. "Driven to despair" is a well-established English
    equivalent that communicates the intensified negation while remaining contextually
    appropriate.
