id: 2CO.4.8
reference: 2 Corinthians 4:8
source:
  edition: SBLGNT
  text: ἐν παντὶ θλιβόμενοι ἀλλ’ οὐ στενοχωρούμενοι, ἀπορούμενοι ἀλλ’ οὐκ ἐξαπορούμενοι,
translation:
  text: We are afflicted in every way, but not crushed; perplexed, but not driven
    to despair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in everything"; the phrase denotes comprehensive scope, not necessarily
      literal spatial surround.
    reason: lexical_alternative
  - marker: b
    text: Literally, "not narrowed/constricted"; "crushed" expresses the sense in
      idiomatic English.
    reason: lexical_alternative
  - marker: c
    text: Or "not utterly at a loss." The Greek intensifies the previous term "perplexed."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν παντί
  chosen: in every way
  alternatives:
  - in everything
  - on every side
  lexicon: BDAG
  rationale: The dative singular neuter with ἐν is idiomatic and modifies the manner/scope
    of affliction rather than denoting literal location. "In every way" is natural
    English and captures comprehensive scope without the spatial narrowing of some
    traditional renderings like "on every side."
- source_word: θλιβόμενοι
  chosen: afflicted
  alternatives:
  - pressed
  - hard pressed
  - troubled
  lexicon: BDAG
  rationale: The participle from θλίβω conveys being subjected to pressure or distress.
    "Afflicted" communicates suffering/pressure in clear modern English while fitting
    Paul's hardship catalog. "Hard pressed" is vivid but overlaps too strongly with
    the following στενοχωρούμενοι and can obscure the contrast between external pressure
    and inner constriction.
- source_word: στενοχωρούμενοι
  chosen: crushed
  alternatives:
  - confined
  - hemmed in
  - pressed into a narrow place
  lexicon: BDAG
  rationale: 'στενοχωρέομαι literally evokes being in a narrow space, hence being
    constrained or distressed. In this antithetical pairing after θλιβόμενοι, "crushed"
    conveys the result Paul denies: though afflicted, not brought to collapse. It
    is somewhat dynamic, but preserves the force of the metaphor in idiomatic English
    better than the less natural "not narrowed."'
- source_word: ἀπορούμενοι
  chosen: perplexed
  alternatives:
  - at a loss
  - bewildered
  - uncertain
  lexicon: BDAG
  rationale: The verb denotes being at a loss or in doubt about what to do. "Perplexed"
    is concise, idiomatic, and standard without becoming archaic.
- source_word: ἐξαπορούμενοι
  chosen: driven to despair
  alternatives:
  - utterly at a loss
  - despairing
  - completely without a way out
  lexicon: BDAG
  rationale: The compound intensifies ἀπορέω. "Driven to despair" captures the stronger
    sense of complete loss of resources or hope while preserving the rhetorical escalation
    from perplexity to a more extreme condition that Paul denies.
- source_word: ἀλλ’ οὐ ... ἀλλ’ οὐκ
  chosen: but not ... but not
  alternatives:
  - yet not ... yet not
  lexicon: BDAG
  rationale: The repeated adversative structure is central to Paul's rhythm. "But
    not" keeps the direct contrast and reads naturally in contemporary English.
