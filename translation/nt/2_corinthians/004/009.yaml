theological_decisions:
- issue: Whether ἐγκαταλειπόμενοι should be rendered with the more theologically resonant
    'forsaken' or the more idiomatic 'abandoned'
  chosen_reading: abandoned
  alternative_readings:
  - forsaken
  rationale: The verse does not specifically invoke a formal quotation or allusion
    requiring the traditional 'forsaken.' 'Abandoned' preserves the meaning that God
    does not leave Paul and his companions, without importing additional intertextual
    weight beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
