id: 2CO.4.9
reference: 2 Corinthians 4:9
source:
  edition: SBLGNT
  text: διωκόμενοι ἀλλ’ οὐκ ἐγκαταλειπόμενοι, καταβαλλόμενοι ἀλλ’ οὐκ ἀπολλύμενοι,
translation:
  text: persecuted, but not abandoned; struck down, but not destroyed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forsaken.'
    reason: lexical_alternative
  - marker: b
    text: Or 'thrown down' or 'knocked down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διωκόμενοι
  chosen: persecuted
  alternatives:
  - pursued
  - hounded
  lexicon: BDAG
  rationale: In Pauline usage διώκω commonly denotes hostile pursuit/oppression rather
    than mere pursuit. 'Persecuted' best conveys affliction by opponents in clear
    modern English and fits the passive participial parallelism.
- source_word: ἐγκαταλειπόμενοι
  chosen: abandoned
  alternatives:
  - forsaken
  - deserted
  lexicon: BDAG
  rationale: '''Abandoned'' expresses being left behind or deserted without importing
    archaic tone. ''Forsaken'' is traditional and possible, but ''abandoned'' is more
    accessible while preserving the sense.'
- source_word: καταβαλλόμενοι
  chosen: struck down
  alternatives:
  - thrown down
  - knocked down
  - cast down
  lexicon: BDAG
  rationale: The verb can mean to throw down or bring down. In this athletic/conflict-like
    sequence, 'struck down' idiomatically conveys being knocked to the ground while
    still matching the metaphorical force. 'Cast down' in modern English can suggest
    discouragement more than physical overthrow.
- source_word: ἀπολλύμενοι
  chosen: destroyed
  alternatives:
  - perishing
  - ruined
  lexicon: BDAG
  rationale: Here the contrast with 'struck down' points to ultimate destruction rather
    than an ongoing process of perishing. 'Destroyed' gives the strongest natural
    English antithesis and matches the passive participle's sense in context.
- source_word: ἀλλ’ οὐκ
  chosen: but not
  alternatives:
  - yet not
  lexicon: BDAG
  rationale: This compact adversative-negation pairing structures the verse as balanced
    contrasts. 'But not' preserves the rhetorical force and cadence of the Greek.
