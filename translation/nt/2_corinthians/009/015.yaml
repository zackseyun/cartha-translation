id: 2CO.9.15
reference: 2 Corinthians 9:15
source:
  edition: SBLGNT
  text: ⸀χάρις τῷ θεῷ ἐπὶ τῇ ἀνεκδιηγήτῳ αὐτοῦ δωρεᾷ.
translation:
  text: Thanks be to God for his indescribable gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inexpressible gift.' The Greek adjective can mean something beyond full
      description or narration.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: Thanks be
  alternatives:
  - grace
  - thanks
  lexicon: BDAG
  rationale: Although χάρις commonly means 'grace,' in this idiomatic exclamatory
    construction with the dative τῷ θεῷ it functions as an expression of thanksgiving
    or praise. 'Thanks be' is natural English and preserves the doxological force
    better than a more wooden 'grace to God.'
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - to God
  - be to God
  lexicon: BDAG
  rationale: Dative of recipient/reference with the thanksgiving expression. Rendered
    straightforwardly as 'to God' within the idiom 'Thanks be to God.'
- source_word: ἐπὶ
  chosen: for
  alternatives:
  - for
  - because of
  - on account of
  lexicon: BDAG
  rationale: 'With the dative here, ἐπί expresses basis or cause: thanksgiving offered
    on account of God''s gift. ''For'' is concise and idiomatic in English.'
- source_word: ἀνεκδιηγήτῳ
  chosen: indescribable
  alternatives:
  - inexpressible
  - beyond telling
  - unspeakable
  lexicon: BDAG
  rationale: The adjective denotes something not fully narratable or expressible.
    'Indescribable' is clear modern English and preserves the sense of surpassing
    verbal expression without archaic tone.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - his
  - God's
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to God. 'His' preserves the Greek
    pronominal form while remaining clear in context.
- source_word: δωρεᾷ
  chosen: gift
  alternatives:
  - gift
  - free gift
  lexicon: BDAG
  rationale: δωρεά denotes a gift freely given. 'Gift' is sufficient in English here;
    adding 'free' would be redundant and slightly over-specify what is already inherent
    in the noun.
