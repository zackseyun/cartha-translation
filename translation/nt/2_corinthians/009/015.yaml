theological_decisions:
- issue: Referent of 'his indescribable gift'
  chosen_reading: Left implicit as God's gift without specifying in the translation
    whether Paul refers narrowly to Christ, to salvation in Christ, or more broadly
    to God's grace manifested in the collection context.
  alternative_readings:
  - A specific reference to Christ
  - A reference to salvation/grace in Christ
  - A broader reference to God's gracious provision including the Corinthians' generosity
  rationale: The verse itself names only 'his indescribable gift.' Historic Christian
    interpretation often sees Christ centrally in view, but the immediate context
    also concerns God's grace producing generosity. To preserve theological tension
    and avoid importing a narrower doctrinal claim than the text states, the translation
    keeps the expression general.
  doctrine_reference: Preserve theological tension rather than resolve it.
