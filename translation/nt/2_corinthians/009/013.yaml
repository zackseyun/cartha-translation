theological_decisions:
- issue: Rendering Χριστοῦ in εὐαγγέλιον τοῦ Χριστοῦ
  chosen_reading: the gospel of the Messiah
  alternative_readings:
  - the gospel of Christ
  rationale: Χριστός functions here as a title rather than a name-like form. Per project doctrine, titles are translated where context supports it. This preserves the messianic force without adding doctrinal content.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
revisions:
- timestamp: '2026-04-21T02:11:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_corinthians/009/013.json
  category: awkward_english
  tier: 1
  from: the obedience of your confession
  to: the obedience shown in your confession
  rationale: The current phrasing, while traditional (cf. ESV, NASB), is awkward in English because a 'confession' itself cannot be obedient. The Greek `τῇ ὑποταγῇ τῆς ὁμολογίας` refers to the obedience that is demonstrated by or is integral to the Corinthians' confession of faith. The suggested rewrite clarifies this relationship for the English reader, similar to the NIV's approach ('the obedience that accompanies your confession'), enhancing clarity without being overly paraphrastic.
