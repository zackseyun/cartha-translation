id: 2CO.9.13
reference: 2 Corinthians 9:13
source:
  edition: SBLGNT
  text: διὰ τῆς δοκιμῆς τῆς διακονίας ταύτης δοξάζοντες τὸν θεὸν ἐπὶ τῇ ὑποταγῇ τῆς ὁμολογίας ὑμῶν εἰς τὸ εὐαγγέλιον τοῦ Χριστοῦ καὶ ἁπλότητι τῆς κοινωνίας εἰς αὐτοὺς καὶ εἰς πάντας,
translation:
  text: Because of the proof given by this ministry, they glorify God for the obedience shown in your confession to the gospel of the Messiah and for the generosity of your sharing with them and with everyone,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gospel of Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'submission of your confession to the gospel of the Messiah.' The phrase can be rendered more formally, but 'obedience of your confession' expresses the sense in natural English.
    reason: lexical_alternative
  - marker: c
    text: '''Sharing'' here likely refers specifically to generous material participation in the collection, not only to fellowship in a general sense.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the obedience of your confession'.
    reason: previous_rendering
lexical_decisions:
- source_word: δοκιμῆς
  chosen: proof
  alternatives:
  - testing
  - proven character
  - evidence
  lexicon: BDAG
  rationale: In context the collection functions as demonstrated evidence of genuine faith and love. 'Proof' captures the result of testing more naturally in English than the more process-oriented 'testing.'
- source_word: διακονίας
  chosen: ministry
  alternatives:
  - service
  - administration
  lexicon: BDAG
  rationale: Refers to the charitable service/relief effort Paul is organizing. 'Ministry' preserves both practical service and sacred significance, while remaining idiomatic.
- source_word: δοξάζοντες τὸν θεὸν
  chosen: they glorify God
  alternatives:
  - glorifying God
  - praising God
  lexicon: BDAG
  rationale: The participle is best rendered with an explicit finite verb in English for clarity within Paul's long sentence. 'Glorify' is closer to δοξάζω than the less weighty 'praise.'
- source_word: ἐπὶ
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: Here ἐπί with the dative introduces the basis or occasion for glorifying God. 'For' is concise and natural in English.
- source_word: ὑποταγῇ
  chosen: obedience
  alternatives:
  - submission
  - subjection
  lexicon: BDAG
  rationale: The sense is concrete yielding in response to the gospel. 'Obedience' communicates the practical outworking of submission and fits the following phrase well in English.
- source_word: ὁμολογίας ὑμῶν
  chosen: your confession
  alternatives:
  - your profession
  - your acknowledgment
  lexicon: BDAG
  rationale: Refers to the believers' public confession/profession of allegiance. 'Confession' preserves the verbal and faith-declaring sense.
- source_word: εἰς τὸ εὐαγγέλιον τοῦ Χριστοῦ
  chosen: to the gospel of the Messiah
  alternatives:
  - for the gospel of the Messiah
  - toward the gospel of the Messiah
  - to the gospel of Christ
  lexicon: BDAG
  rationale: The construction expresses relation or direction of the confession's obedience toward the gospel. 'To' is slightly formal but preserves the Greek linkage. Χριστοῦ is rendered 'the Messiah' per project guidance for title usage.
- source_word: ἁπλότητι
  chosen: generosity
  alternatives:
  - sincerity
  - single-heartedness
  - liberality
  lexicon: BDAG
  rationale: In this collection context ἁπλότης carries the sense of openhanded generosity rather than mere simplicity or sincerity.
- source_word: κοινωνίας
  chosen: sharing
  alternatives:
  - fellowship
  - participation
  - contribution
  lexicon: BDAG
  rationale: The word can denote fellowship or participation, but here it refers specifically to material participation with others through giving. 'Sharing' is natural and broad enough to include the financial sense.
- source_word: εἰς αὐτοὺς καὶ εἰς πάντας
  chosen: with them and with everyone
  alternatives:
  - toward them and toward all
  - for them and for all
  lexicon: BDAG
  rationale: The repeated εἰς marks the direction of their generous sharing. English idiom favors 'with them and with everyone' when κοινωνία is rendered 'sharing.'
