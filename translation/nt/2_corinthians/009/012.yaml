theological_decisions:
- issue: Rendering Paul's term ἅγιοι
  chosen_reading: the saints
  alternative_readings:
  - God's people
  - the holy ones
  rationale: The verse refers to fellow believers receiving the collection. 'The saints'
    preserves Paul's ecclesial terminology without importing later canonization concepts;
    alternatives are possible but less text-tied.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
