id: 2CO.9.12
reference: 2 Corinthians 9:12
source:
  edition: SBLGNT
  text: ὅτι ἡ διακονία τῆς λειτουργίας ταύτης οὐ μόνον ἐστὶν προσαναπληροῦσα τὰ ὑστερήματα
    τῶν ἁγίων, ἀλλὰ καὶ περισσεύουσα διὰ πολλῶν εὐχαριστιῶν τῷ θεῷ—
translation:
  text: For the ministry of this service is not only supplying the needs of the saints,
    but is also overflowing through many thanksgivings to God—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supplying what the saints lack.'
    reason: lexical_alternative
  - marker: b
    text: Or 'abounding in many thanksgivings to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces an explanation of the preceding statement.
    'For' reads naturally in English while preserving the explanatory force; 'because'
    is possible but slightly heavier here.
- source_word: διακονία
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: διακονία can mean service or ministry. Here, paired with λειτουργία,
    rendering it as 'ministry' helps preserve a distinction between the two related
    nouns rather than flattening both into 'service.'
- source_word: λειτουργίας
  chosen: service
  alternatives:
  - public service
  - ministry
  lexicon: BDAG
  rationale: λειτουργία often denotes a service performed for the public or in a sacred/official
    sense. 'Service' is the clearest modern English rendering here. 'Public service'
    is too specific, and 'ministry' would obscure the distinction from διακονία.
- source_word: ταύτης
  chosen: this
  alternatives:
  - this very
  lexicon: BDAG
  rationale: The demonstrative points to the specific collection/ministry under discussion.
    'This' is sufficient and natural.
- source_word: προσαναπληροῦσα
  chosen: supplying
  alternatives:
  - fully supplying
  - meeting
  - filling up
  lexicon: BDAG
  rationale: The participle conveys supplying what is lacking. 'Supplying' is clear
    modern English and fits the ongoing/resultative sense in context. 'Filling up'
    is more literal but less idiomatic.
- source_word: ὑστερήματα
  chosen: needs
  alternatives:
  - lacks
  - deficiencies
  - what is lacking
  lexicon: BDAG
  rationale: The noun refers to deficiencies or shortages. In this charitable context,
    'needs' communicates the sense naturally and accessibly without undue abstraction.
- source_word: ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - God's people
  lexicon: BDAG
  rationale: Paul's regular term for believers is ἅγιοι. 'The saints' preserves the
    established Pauline term and its theological weight. 'God's people' is interpretive
    and less formally tied to the Greek.
- source_word: περισσεύουσα
  chosen: overflowing
  alternatives:
  - abounding
  - increasing
  lexicon: BDAG
  rationale: The participle denotes abundance beyond sufficiency. 'Overflowing' vividly
    captures the image and works well with the resulting thanksgivings.
- source_word: διὰ πολλῶν εὐχαριστιῶν
  chosen: through many thanksgivings
  alternatives:
  - with many thanksgivings
  - resulting in many thanksgivings
  lexicon: BDAG
  rationale: διά with the genitive commonly means 'through.' Here it likely expresses
    the means or attendant channel by which the ministry overflows Godward. 'Through
    many thanksgivings' preserves the Greek structure while remaining intelligible.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: The dative is best taken as the recipient/direction of the thanksgivings.
    'To God' is the most natural rendering in English.
