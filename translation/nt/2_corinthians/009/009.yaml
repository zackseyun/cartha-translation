id: 2CO.9.9
reference: 2 Corinthians 9:9
source:
  edition: SBLGNT
  text: (καθὼς γέγραπται· Ἐσκόρπισεν, ἔδωκεν τοῖς πένησιν, ἡ δικαιοσύνη αὐτοῦ μένει
    εἰς τὸν αἰῶνα·
translation:
  text: 'as it is written: “He scattered abroad, he gave to the poor; his righteousness
    remains forever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice remains forever.' The Greek word can carry both the sense
      of righteousness and justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it is written
  lexicon: BDAG
  rationale: Standard citation formula introducing Scripture. 'As it is written' is
    idiomatic, accurate, and preserves the formal scriptural quotation style.
- source_word: Ἐσκόρπισεν
  chosen: he scattered abroad
  alternatives:
  - he scattered
  - he distributed
  lexicon: BDAG
  rationale: The aorist verb denotes dispersing or scattering. 'Scattered abroad'
    preserves the imagery of wide distribution in almsgiving and reflects the Psalm
    citation's poetic force better than the flatter 'distributed.'
- source_word: ἔδωκεν
  chosen: he gave
  alternatives:
  - he has given
  lexicon: BDAG
  rationale: Simple past best matches the Greek aorist in this poetic citation and
    reads naturally in English.
- source_word: τοῖς πένησιν
  chosen: to the poor
  alternatives:
  - to the needy
  lexicon: BDAG
  rationale: πένης refers to poor persons, especially those of limited means. 'The
    poor' is the most direct and idiomatic rendering in this context of generosity.
- source_word: ἡ δικαιοσύνη αὐτοῦ
  chosen: his righteousness
  alternatives:
  - his justice
  lexicon: BDAG
  rationale: Per the doctrine table, δικαιοσύνη defaults to 'righteousness,' while
    'justice' is a viable alternative that should be preserved in a footnote in Pauline
    contexts. Here the phrase likely refers to the enduring righteous character or
    righteous deed of the generous person, and 'righteousness' best preserves the
    lexical continuity.
- source_word: μένει
  chosen: remains
  alternatives:
  - endures
  - abides
  lexicon: BDAG
  rationale: μένω commonly means remain, abide, or endure. 'Remains' is clear modern
    English and fits the enduring-result sense of the quotation.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: BDAG
  rationale: Idiomatic English for the phrase meaning enduring without end. 'Forever'
    is natural and preserves the sense without wooden literalism.
