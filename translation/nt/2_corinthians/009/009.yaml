theological_decisions:
- issue: Rendering of δικαιοσύνη in a Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt specifies 'righteousness' as the default rendering
    of δικαιοσύνη, with 'justice' preserved in a footnote for Pauline passages. In
    this quotation, the term can denote the enduring righteous standing or righteous
    action of the generous person; 'righteousness' best maintains lexical continuity
    while leaving the ethical dimension intact.
