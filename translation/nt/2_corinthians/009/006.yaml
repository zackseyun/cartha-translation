theological_decisions:
- issue: Meaning of εὐλογίαις in the sowing/reaping proverb
  chosen_reading: Translate with the lexical sense 'blessings' rather than the purely
    adverbial interpretation 'bountifully.'
  alternative_readings:
  - bountifully
  - generously
  rationale: The context is financial generosity, so 'bountifully/generously' is a
    valid interpretive rendering. However, the Greek noun εὐλογία naturally carries
    the sense of blessing, and preserving that wording maintains Paul's theological
    linkage between generous giving and blessing without importing a mechanistic prosperity
    formula. The verse states a proverb of correspondence, not a guarantee of material
    enrichment.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
