id: 2CO.9.6
reference: 2 Corinthians 9:6
source:
  edition: SBLGNT
  text: Τοῦτο δέ, ὁ σπείρων φειδομένως φειδομένως καὶ θερίσει, καὶ ὁ σπείρων ἐπ’ εὐλογίαις
    ἐπ’ εὐλογίαις καὶ θερίσει.
translation:
  text: 'Now this: the one who sows sparingly will also reap sparingly, and the one
    who sows with blessings will also reap with blessings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bountifully' / 'generously' for 'with blessings' (ἐπ’ εὐλογίαις). The
      Greek uses the noun 'blessings,' which can idiomatically express generous measure.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο δέ
  chosen: 'Now this:'
  alternatives:
  - And this
  - But this
  lexicon: BDAG
  rationale: Introduces a pointed summary or principle. 'Now this:' is natural English
    that preserves the discourse-shifting force of δέ without overtranslating.
- source_word: ὁ σπείρων
  chosen: the one who sows
  alternatives:
  - whoever sows
  - the sower
  lexicon: BDAG
  rationale: The substantival participle is generic and proverbial. 'The one who sows'
    preserves the participial structure and representative force better than the more
    interpretive 'whoever sows' or the more nominal 'the sower.'
- source_word: φειδομένως
  chosen: sparingly
  alternatives:
  - stingily
  - begrudgingly
  lexicon: BDAG
  rationale: In this giving context the adverb denotes restrained or meager measure.
    'Sparingly' is the standard and clearest proverbial equivalent. 'Stingily' adds
    a stronger moral judgment than the word itself requires here.
- source_word: καὶ θερίσει
  chosen: will also reap
  alternatives:
  - will reap as well
  lexicon: BDAG
  rationale: καί links the corresponding result to the manner of sowing. 'Will also
    reap' is idiomatic and preserves the parallelism.
- source_word: ἐπ’ εὐλογίαις
  chosen: with blessings
  alternatives:
  - bountifully
  - for blessings
  - in blessings
  lexicon: BDAG
  rationale: The repeated prepositional phrase is somewhat idiomatic. εὐλογία can
    denote 'blessing' and, in this context, generous giving. Rendering it as 'with
    blessings' preserves the lexical connection to blessing language in the surrounding
    context and avoids collapsing it too quickly into the interpretive adverb 'bountifully.'
- source_word: ἐπ’ εὐλογίαις ... καὶ θερίσει
  chosen: will also reap with blessings
  alternatives:
  - will also reap bountifully
  - will also reap blessings
  lexicon: BDAG
  rationale: 'Keeping ''blessings'' on both sowing and reaping preserves Paul''s wordplay
    and theological framing: generosity is not merely quantity but a blessing-oriented
    act that corresponds to blessing in return. ''Bountifully'' is possible but loses
    the noun''s blessing resonance.'
