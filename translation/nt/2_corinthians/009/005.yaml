id: 2CO.9.5
reference: 2 Corinthians 9:5
source:
  edition: SBLGNT
  text: ἀναγκαῖον οὖν ἡγησάμην παρακαλέσαι τοὺς ἀδελφοὺς ἵνα προέλθωσιν ⸀εἰς ὑμᾶς
    καὶ προκαταρτίσωσι τὴν ⸀προεπηγγελμένην εὐλογίαν ὑμῶν, ταύτην ἑτοίμην εἶναι οὕτως
    ὡς εὐλογίαν καὶ μὴ ὡς πλεονεξίαν.
translation:
  text: Therefore I considered it necessary to urge the brothers to go on ahead to
    you and prepare in advance your previously promised blessing, so that this might
    be ready as a blessing and not as greed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' if the delegation is understood inclusively.
    reason: lexical_alternative
  - marker: b
    text: '''Blessing'' here refers to the Corinthians'' promised contribution; alternatively,
      ''generous gift'' or ''bountiful gift.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'not as a grudging exaction.' The Greek word more literally means 'greed'
      or 'covetousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγκαῖον
  chosen: necessary
  alternatives:
  - compulsory
  - needful
  lexicon: BDAG
  rationale: Predicate adjective expressing necessity; 'necessary' is natural modern
    English and preserves Paul's sense of practical obligation without overstating
    compulsion.
- source_word: ἡγησάμην
  chosen: I considered
  alternatives:
  - I thought
  - I regarded
  lexicon: BDAG
  rationale: Aorist middle of ἡγέομαι here introduces Paul's judgment. 'I considered'
    fits the deliberative sense better than the flatter 'I thought'.
- source_word: παρακαλέσαι
  chosen: to urge
  alternatives:
  - to exhort
  - to encourage
  - to appeal to
  lexicon: BDAG
  rationale: In this context Paul is pressing the brothers to act promptly. 'Urge'
    captures the force without sounding overly formal like 'exhort'.
- source_word: τοὺς ἀδελφοὺς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the brothers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural. Per gender-accurate policy,
    'brothers' is retained in the main text; the likely mixed-group sense can be noted
    in a footnote.
- source_word: προέλθωσιν εἰς ὑμᾶς
  chosen: to go on ahead to you
  alternatives:
  - to come to you in advance
  - to go before to you
  lexicon: BDAG
  rationale: The compound verb προέρχομαι with the context of advance preparation
    suggests prior arrival. 'Go on ahead to you' preserves the temporal nuance.
- source_word: προκαταρτίσωσι
  chosen: prepare in advance
  alternatives:
  - arrange beforehand
  - complete beforehand
  lexicon: BDAG
  rationale: The verb combines preparation and prior timing. 'Prepare in advance'
    is clear and idiomatic, matching the context of organizing the collection before
    Paul's arrival.
- source_word: προεπηγγελμένην
  chosen: previously promised
  alternatives:
  - promised beforehand
  - announced in advance
  lexicon: BDAG
  rationale: The participle refers to the Corinthians' prior commitment. 'Previously
    promised' is straightforward English and fits the context of an earlier pledge.
- source_word: εὐλογίαν
  chosen: blessing
  alternatives:
  - bountiful gift
  - generous gift
  lexicon: BDAG
  rationale: Paul uses εὐλογία twice in this verse with rhetorical force, contrasting
    it with πλεονεξία. 'Blessing' preserves the lexical repetition and theological
    coloring better than reducing it to merely 'gift.'
- source_word: ἑτοίμην εἶναι
  chosen: might be ready
  alternatives:
  - to be ready
  - would be ready
  lexicon: BDAG
  rationale: This infinitival construction expresses the intended result of the brothers'
    advance visit. 'Might be ready' fits the purpose nuance introduced by ἵνα and
    the following accusative-reference construction.
- source_word: οὕτως ὡς εὐλογίαν
  chosen: as a blessing
  alternatives:
  - in this way as a blessing
  - as a generous blessing
  lexicon: BDAG
  rationale: The phrase describes the manner in which the gift should stand ready.
    A concise 'as a blessing' preserves the repeated εὐλογία and the contrast with
    selfish motive.
- source_word: πλεονεξίαν
  chosen: greed
  alternatives:
  - covetousness
  - grudging exaction
  - stinginess
  lexicon: BDAG
  rationale: πλεονεξία normally denotes greed or covetousness. In this context some
    renderings paraphrase toward 'grudgingly given,' but 'greed' better reflects the
    lexical value and leaves Paul's sharp contrast intact.
