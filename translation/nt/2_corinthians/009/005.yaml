theological_decisions:
- issue: Gendered reference of ἀδελφοὺς
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural is retained rather than neutralized. Because the referent may
    well include a ministry delegation broader than literal male siblings, the inclusive
    possibility is preserved in a footnote rather than moved into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Meaning of εὐλογία in the collection context
  chosen_reading: blessing
  alternative_readings:
  - generous gift
  - bountiful gift
  rationale: Although εὐλογία can idiomatically refer to a generous gift in collection
    contexts, retaining 'blessing' preserves Paul's deliberate wordplay and theological
    framing of the offering as beneficent rather than self-seeking. The more explicit
    financial nuance is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
