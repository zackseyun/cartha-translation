theological_decisions:
- issue: Meaning of ὑπόστασις in a non-technical Pauline context
  chosen_reading: confidence/ground of boasting rather than 'substance'
  alternative_readings:
  - undertaking
  - situation
  rationale: The verse concerns Paul's confidence in the Corinthians' readiness before
    Macedonian visitors. Rendering ὑπόστασις as 'confidence' fits the immediate context
    and avoids importing later theological or philosophical senses of the term.
  doctrine_reference: Translation philosophy §1, §3, §6
