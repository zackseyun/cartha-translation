id: 2CO.9.4
reference: 2 Corinthians 9:4
source:
  edition: SBLGNT
  text: μή πως ἐὰν ἔλθωσιν σὺν ἐμοὶ Μακεδόνες καὶ εὕρωσιν ὑμᾶς ἀπαρασκευάστους καταισχυνθῶμεν
    ἡμεῖς, ἵνα μὴ ⸀λέγωμεν ὑμεῖς, ἐν τῇ ὑποστάσει ⸀ταύτῃ.
translation:
  text: so that if any Macedonians come with me and find you unprepared, we—not to
    say you—would be put to shame in this matter of confidence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in this confidence.' The Greek word can also mean 'undertaking' or 'situation'
      in context, but here it most likely refers to Paul's confidence about you.
    reason: lexical_alternative
  - marker: b
    text: Or 'not to mention you.' Paul parenthetically implies that the Corinthians
      too would share the shame if found unprepared.
    reason: alternative_reading
lexical_decisions:
- source_word: μή πως ἐὰν
  chosen: so that if
  alternatives:
  - lest if
  - in case if
  lexicon: BDAG
  rationale: The combination introduces Paul's concern about a possible future scenario.
    'So that if' gives natural English while preserving the preventative nuance of
    μή πως with the conditional ἐάν.
- source_word: ἔλθωσιν σὺν ἐμοὶ Μακεδόνες
  chosen: any Macedonians come with me
  alternatives:
  - Macedonians come with me
  - some Macedonians come with me
  lexicon: BDAG
  rationale: Μακεδόνες is anarthrous and indefinite in force here; 'any Macedonians'
    best conveys the possibility without implying a specific known group.
- source_word: εὕρωσιν ὑμᾶς ἀπαρασκευάστους
  chosen: find you unprepared
  alternatives:
  - find you not ready
  - find you unready
  lexicon: BDAG
  rationale: ἀπαρασκευάστους means not prepared or not ready. 'Unprepared' is concise
    and fits the context of the collection Paul expects to be ready.
- source_word: καταισχυνθῶμεν
  chosen: would be put to shame
  alternatives:
  - would be ashamed
  - would be disgraced
  lexicon: BDAG
  rationale: The passive form suggests being shamed or disgraced before others, not
    merely an internal feeling. 'Would be put to shame' preserves that passive and
    social sense.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: 'The explicit pronoun is emphatic in Greek, so the English sentence preserves
    emphasis by later punctuation: ''we—not to say you—''.'
- source_word: ἵνα μὴ λέγωμεν ὑμεῖς
  chosen: not to say you
  alternatives:
  - to say nothing of you
  - not to mention you
  lexicon: BDAG
  rationale: This parenthetical softens Paul's statement while implying that the Corinthians
    would also share the shame. 'Not to say you' is close to the Greek wording and
    idiomatic enough in English.
- source_word: ἐν τῇ ὑποστάσει ταύτῃ
  chosen: in this matter of confidence
  alternatives:
  - in this confidence
  - in this undertaking
  - in this situation
  lexicon: BDAG
  rationale: ὑπόστασις here most naturally refers to the basis of Paul's confidence/boast
    regarding the Corinthians, not metaphysical 'substance.' 'Matter of confidence'
    makes the relational and rhetorical context clear while staying close to the noun's
    sense.
