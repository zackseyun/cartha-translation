theological_decisions:
- issue: Meaning of ἁπλότης in the context of the collection
  chosen_reading: generosity/openhandedness in giving
  alternative_readings:
  - simplicity
  - sincerity
  - single-mindedness
  rationale: Although ἁπλότης can denote simplicity or sincerity in some contexts,
    the immediate context of financial provision and the resulting thanksgiving strongly
    favors generosity. This avoids importing a merely inward moral quality where Paul
    is emphasizing concrete liberality.
  doctrine_reference: Translation philosophy §1, §5
