id: 2CO.9.11
reference: 2 Corinthians 9:11
source:
  edition: SBLGNT
  text: ἐν παντὶ πλουτιζόμενοι εἰς πᾶσαν ἁπλότητα, ἥτις κατεργάζεται δι’ ἡμῶν εὐχαριστίαν
    τῷ θεῷ—
translation:
  text: being enriched in every way for all generosity, which through us produces
    thanksgiving to God—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all liberality'; ἁπλότης can also mean 'sincerity' or 'simplicity'
      in other contexts, but here the context of giving favors 'generosity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν παντὶ
  chosen: in every way
  alternatives:
  - in everything
  - with everything
  lexicon: BDAG
  rationale: The dative with ἐν here is idiomatic and broad rather than narrowly locative.
    'In every way' communicates comprehensive provision in natural English and fits
    the context of material and practical enablement for giving.
- source_word: πλουτιζόμενοι
  chosen: being enriched
  alternatives:
  - being made rich
  - becoming rich
  lexicon: BDAG
  rationale: The present passive participle is best carried as 'being enriched,' preserving
    the passive sense that God is the implied agent. 'Made rich' is possible but can
    sound more absolute or prosperity-oriented in English than the context warrants.
- source_word: εἰς πᾶσαν ἁπλότητα
  chosen: for all generosity
  alternatives:
  - for all liberality
  - for all sincerity
  - for all singleness
  lexicon: BDAG
  rationale: In Pauline usage here, ἁπλότης most naturally refers to generosity/openhandedness
    in giving rather than merely simplicity or sincerity. 'For all generosity' captures
    purpose/result after εἰς and matches the surrounding collection context.
- source_word: ἥτις
  chosen: which
  alternatives:
  - and this
  - which indeed
  lexicon: BDAG
  rationale: The qualitative relative pronoun points back to the generosity just mentioned
    and introduces its effect. Simple 'which' is sufficient in English without overtranslating
    the nuance.
- source_word: κατεργάζεται
  chosen: produces
  alternatives:
  - brings about
  - works
  lexicon: BDAG
  rationale: The verb denotes effecting or bringing about a result. 'Produces' is
    concise, natural, and fits the causal chain from generosity to thanksgiving.
- source_word: δι’ ἡμῶν
  chosen: through us
  alternatives:
  - by means of us
  - through our ministry
  lexicon: BDAG
  rationale: διά with the genitive indicates agency or instrumentality. 'Through us'
    preserves the direct wording and leaves implicit that Paul and his companions
    are the mediating agents in administering the gift.
- source_word: εὐχαριστίαν τῷ θεῷ
  chosen: thanksgiving to God
  alternatives:
  - thanks to God
  lexicon: BDAG
  rationale: The noun phrase is rendered formally as 'thanksgiving to God,' preserving
    the substantive emphasis on the response generated. 'Thanks to God' is possible
    but slightly less explicit in mirroring the Greek noun.
