theological_decisions:
- issue: Meaning of χάρις in a generosity context
  chosen_reading: grace as God's gracious provision broadly conceived, including material
    enablement for generosity
  alternative_readings:
  - gracious favor only
  - gift
  rationale: In the immediate context of giving, Paul speaks of God's enabling generosity,
    yet the term χάρις retains its broader theological sense of grace rather than
    narrowing to mere money. 'All grace' preserves that breadth and avoids reducing
    divine action to material supply alone.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Meaning of αὐτάρκεια
  chosen_reading: sufficiency/adequacy rather than philosophical self-sufficiency
  alternative_readings:
  - contentment
  - self-sufficiency
  rationale: The context concerns God supplying believers so they can be generous.
    Rendering αὐτάρκεια as 'sufficiency' avoids importing Stoic autonomy and better
    fits dependence on God for adequate provision.
  doctrine_reference: Translation philosophy §§1, 6
