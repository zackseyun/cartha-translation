theological_decisions:
- issue: Generic masculine expression in English
  chosen_reading: Each one should give as he has decided in his heart
  alternative_readings:
  - Each person should give as they have decided in their heart
  rationale: The Greek is singular and grammatically masculine in a representative
    sense. Per doctrine, gender-accurate rendering is preferred over flattening to
    plural/gender-neutral forms. 'He/his' preserves the singular structure without
    claiming male exclusivity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of λύπη in context of giving
  chosen_reading: not out of grief
  alternative_readings:
  - not reluctantly
  rationale: The source noun denotes sorrow/grief. Although 'reluctantly' captures
    the contextual implication, the main text preserves the lexical force more transparently,
    with the dynamic alternative preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
