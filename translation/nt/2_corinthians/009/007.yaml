id: 2CO.9.7
reference: 2 Corinthians 9:7
source:
  edition: SBLGNT
  text: ἕκαστος καθὼς ⸀προῄρηται τῇ καρδίᾳ, μὴ ἐκ λύπης ἢ ἐξ ἀνάγκης· ἱλαρὸν γὰρ δότην
    ἀγαπᾷ ὁ θεός.
translation:
  text: Each one should give as he has decided in his heart, not out of grief or compulsion,
    for God loves a cheerful giver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not reluctantly'; the Greek says literally 'not out of grief' or 'sorrow.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'he ... his' reflects the Greek's representative singular,
      not an exclusively male reference.
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  chosen: Each one
  alternatives:
  - Each person
  - Each man
  lexicon: BDAG
  rationale: Distributive singular is preserved. 'Each one' is natural English and
    avoids importing a specifically male sense while still reflecting the singular
    individual focus of the Greek.
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: BDAG
  rationale: Introduces the standard by which the giving is to occur. Simple 'as'
    is idiomatic and sufficient here.
- source_word: προῄρηται
  chosen: has decided
  alternatives:
  - has purposed
  - has resolved
  - has chosen beforehand
  lexicon: BDAG
  rationale: The verb conveys deliberate prior determination or purpose. 'Has decided'
    is clear modern English and fits the context of planned generosity without sounding
    overly technical. 'Has purposed' is possible but less natural for contemporary
    readers.
- source_word: τῇ καρδίᾳ
  chosen: in his heart
  alternatives:
  - in the heart
  - in his inner self
  lexicon: BDAG
  rationale: A dative of sphere/location expressing inward personal resolve. 'Heart'
    preserves the biblical anthropological term rather than flattening it to mere
    cognition. The possessive 'his' is supplied in English to match the singular subject;
    in context it is representative rather than exclusively male.
- source_word: μὴ ἐκ λύπης
  chosen: not out of grief
  alternatives:
  - not reluctantly
  - not out of sorrow
  lexicon: BDAG
  rationale: 'λύπη is literally ''grief, sorrow.'' Many English versions render dynamically
    as ''reluctantly'' from the contextual sense, but ''out of grief'' stays closer
    to the Greek while still making sense in context: giving should not arise from
    pained regret.'
- source_word: ἢ ἐξ ἀνάγκης
  chosen: or compulsion
  alternatives:
  - or necessity
  - or pressure
  - or under constraint
  lexicon: BDAG
  rationale: ἀνάγκη can mean necessity or compulsion. In this giving context, 'compulsion'
    best captures external pressure or coercive necessity and pairs naturally with
    the previous phrase.
- source_word: ἱλαρὸν
  chosen: cheerful
  alternatives:
  - glad
  - willing
  - joyful
  lexicon: BDAG
  rationale: Standard sense is cheerful, glad, willing in disposition. 'Cheerful'
    is the established and contextually apt rendering, highlighting the disposition
    of the giver.
- source_word: δότην
  chosen: giver
  alternatives:
  - one who gives
  lexicon: BDAG
  rationale: A straightforward nominal rendering. 'Giver' is concise and idiomatic.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - takes pleasure in
  lexicon: BDAG
  rationale: The default rendering of ἀγαπάω is 'love' per translation consistency.
    While the idiom implies divine approval, 'loves' should be retained unless context
    requires otherwise.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Simple nominative subject; standard rendering.
