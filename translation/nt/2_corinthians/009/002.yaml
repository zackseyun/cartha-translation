id: 2CO.9.2
reference: 2 Corinthians 9:2
source:
  edition: SBLGNT
  text: οἶδα γὰρ τὴν προθυμίαν ὑμῶν ἣν ὑπὲρ ὑμῶν καυχῶμαι Μακεδόσιν ὅτι Ἀχαΐα παρεσκεύασται
    ἀπὸ πέρυσι, καὶ ⸀τὸ ὑμῶν ζῆλος ἠρέθισε τοὺς πλείονας.
translation:
  text: 'For I know your eagerness, which I boast about to the Macedonians on your
    behalf: that Achaia has been ready since last year, and your zeal has stirred
    up most of them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'readiness' for προθυμίαν.
    reason: lexical_alternative
  - marker: b
    text: That is, the province of Achaia, including Corinth; Paul speaks of the region
      for its believers.
    reason: cultural_note
  - marker: c
    text: Or 'the majority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προθυμίαν
  chosen: eagerness
  alternatives:
  - readiness
  - willingness
  lexicon: BDAG
  rationale: προθυμία denotes readiness of mind and willing zeal. 'Eagerness' fits
    the commendatory tone and connects naturally with the later 'zeal,' while avoiding
    a flat or merely logistical sense that 'readiness' alone might suggest.
- source_word: καυχῶμαι
  chosen: I boast about
  alternatives:
  - I am boasting about
  - I take pride in
  lexicon: BDAG
  rationale: καυχάομαι commonly means to boast or take pride. 'I boast about' preserves
    Paul's rhetorical self-reference without softening it into mere private pride.
- source_word: ὑπὲρ ὑμῶν
  chosen: on your behalf
  alternatives:
  - about you
  - for you
  lexicon: BDAG
  rationale: With καυχῶμαι, ὑπέρ can indicate speaking in someone's favor or on their
    behalf. 'On your behalf' captures Paul's representative commendation to the Macedonians.
- source_word: Μακεδόσιν
  chosen: the Macedonians
  alternatives:
  - Macedonian believers
  lexicon: BDAG
  rationale: The dative plural refers to the people of Macedonia to whom Paul has
    been speaking. 'The Macedonians' is the natural English rendering and does not
    add interpretive material beyond the context.
- source_word: Ἀχαΐα
  chosen: Achaia
  alternatives:
  - the people of Achaia
  lexicon: BDAG
  rationale: Paul names the Roman province. Retaining 'Achaia' preserves the geographical
    reference; in context it stands metonymically for the believers there, especially
    Corinth.
- source_word: παρεσκεύασται
  chosen: has been ready
  alternatives:
  - has been prepared
  - is prepared
  lexicon: BDAG
  rationale: The perfect middle/passive indicates a state resulting from prior preparation.
    'Has been ready' is idiomatic English and fits the temporal phrase 'since last
    year.'
- source_word: ἀπὸ πέρυσι
  chosen: since last year
  alternatives:
  - from last year
  lexicon: BDAG
  rationale: This idiom points to duration from the previous year up to the present.
    'Since last year' is the clearest natural English equivalent.
- source_word: τὸ ὑμῶν ζῆλος
  chosen: your zeal
  alternatives:
  - your enthusiasm
  - your earnestness
  lexicon: BDAG
  rationale: ζῆλος can be positive zeal or ardor here. 'Zeal' preserves the strength
    of the term and matches Paul's commendation better than the weaker 'enthusiasm.'
- source_word: ἠρέθισε
  chosen: has stirred up
  alternatives:
  - has provoked
  - has stimulated
  - has inspired
  lexicon: BDAG
  rationale: ἐρεθίζω can mean to stimulate or provoke. In this positive context, 'has
    stirred up' communicates motivational effect without the more negative English
    connotations of 'provoked.'
- source_word: τοὺς πλείονας
  chosen: most of them
  alternatives:
  - the majority
  - the greater number
  lexicon: BDAG
  rationale: οἱ πλείονες commonly means the majority or most people in a group. Because
    the referent is the Macedonians just mentioned, 'most of them' makes the implied
    object explicit in natural English.
