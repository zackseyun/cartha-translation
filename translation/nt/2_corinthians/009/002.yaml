theological_decisions:
- issue: Referent of 'Achaia'
  chosen_reading: Achaia is retained as a geographical designation standing for the
    churches/believers there, rather than being paraphrased directly as 'you' or 'the
    believers in Achaia.'
  alternative_readings:
  - you have been ready since last year
  - the believers in Achaia have been ready since last year
  rationale: The Greek explicitly names Ἀχαΐα. Retaining the place name preserves
    Paul's wording and the broader regional scope of his commendation, while the surrounding
    context allows readers to understand the metonymy.
- issue: Force of Paul's boasting
  chosen_reading: Rendered straightforwardly as 'I boast about' rather than softened.
  alternative_readings:
  - I speak proudly of
  - I commend
  rationale: The text uses καυχῶμαι, a strong rhetorical term Paul often employs.
    No doctrinal issue requires mitigation, and optimal equivalence favors preserving
    the apostolic rhetoric.
