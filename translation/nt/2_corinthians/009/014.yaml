id: 2CO.9.14
reference: 2 Corinthians 9:14
source:
  edition: SBLGNT
  text: καὶ αὐτῶν δεήσει ὑπὲρ ὑμῶν ἐπιποθούντων ὑμᾶς διὰ τὴν ὑπερβάλλουσαν χάριν τοῦ
    θεοῦ ἐφ’ ὑμῖν.
translation:
  text: and in their prayer for you, they long for you because of the surpassing grace
    of God upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their supplication for you, yearning for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δέησις
  chosen: prayer
  alternatives:
  - supplication
  - petition
  lexicon: BDAG
  rationale: 'The dative δεήσει is best taken as a dative of sphere/instrument with
    αὐτῶν: ''in their prayer'' or ''by their prayer.'' ''Prayer'' is natural modern
    English and broad enough to include earnest intercession without sounding overly
    technical; ''supplication'' is possible but less readable.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  - of them
  lexicon: BDAG
  rationale: 'Genitive plural referring back to the Jerusalem believers/recipients
    of the gift. In English it functions possessively with ''prayer'': ''their prayer.'''
- source_word: ὑπὲρ ὑμῶν
  chosen: for you
  alternatives:
  - on behalf of you
  - concerning you
  lexicon: BDAG
  rationale: ὑπέρ with genitive commonly means 'for, on behalf of.' In prayer contexts
    'for you' is the most idiomatic rendering.
- source_word: ἐπιποθούντων
  chosen: they long for
  alternatives:
  - yearning for
  - having deep affection for
  lexicon: BDAG
  rationale: Present active participle genitive plural agreeing with αὐτῶν, describing
    the praying people. Rendering it with a finite verb in English ('they long for')
    produces clear syntax while preserving the ongoing affectionate desire conveyed
    by ἐπιποθέω.
- source_word: διὰ
  chosen: because of
  alternatives:
  - on account of
  - through
  lexicon: BDAG
  rationale: 'With the accusative here, διά expresses reason/causal basis: they long
    for the Corinthians because of God''s grace at work on them.'
- source_word: ὑπερβάλλουσαν
  chosen: surpassing
  alternatives:
  - extraordinary
  - overflowing
  - exceeding
  lexicon: BDAG
  rationale: The participle modifies χάριν and conveys exceptional excess. 'Surpassing'
    preserves the comparative force without over-paraphrasing.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: Pauline χάρις regularly carries theological weight as God's gracious
    favor and enabling. 'Grace' is the standard and best fit here.
- source_word: ἐφ’ ὑμῖν
  chosen: upon you
  alternatives:
  - on you
  - among you
  - toward you
  lexicon: BDAG
  rationale: ἐπί with dative can mean 'on/upon' or more broadly 'in the case of.'
    'Upon you' preserves the metaphor of grace resting on them and fits the causal
    sense of the clause.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: Simple connective linking this clause to the previous verse's thanksgiving
    sequence.
