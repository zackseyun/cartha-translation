theological_decisions:
- issue: Relation of prayer and longing in the syntax
  chosen_reading: The verse describes the recipients of the gift praying for the Corinthians
    and, in that praying posture, longing for them because of God's grace on them.
  alternative_readings:
  - The verse could be rendered more woodenly as 'and by their supplication for you,
    longing for you...'
  - Some take the phrase to emphasize the prayer itself as the means by which their
    longing is expressed.
  rationale: The Greek is compressed, with a genitive participle attached to αὐτῶν.
    English requires unpacking the relation. This rendering preserves both actions—praying
    and longing—without importing additional theology.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it beyond the text
