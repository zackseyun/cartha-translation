id: 2CO.9.3
reference: 2 Corinthians 9:3
source:
  edition: SBLGNT
  text: ἔπεμψα δὲ τοὺς ἀδελφούς, ἵνα μὴ τὸ καύχημα ἡμῶν τὸ ὑπὲρ ὑμῶν κενωθῇ ἐν τῷ
    μέρει τούτῳ, ἵνα καθὼς ἔλεγον παρεσκευασμένοι ἦτε,
translation:
  text: But I sent the brothers, so that our boasting about you might not be emptied
    in this matter, so that, just as I was saying, you may be prepared,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "might not prove empty" or "might not be made void."
    reason: lexical_alternative
  - marker: b
    text: Or "in this respect."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψα
  chosen: I sent
  alternatives:
  - I have sent
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this narrative-explanatory
    context.
- source_word: τοὺς ἀδελφούς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the brethren
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and likely refers to the
    specific male delegates mentioned in context, not a mixed-gender generic group.
    This follows the gender-accurate principle.
- source_word: τὸ καύχημα ἡμῶν τὸ ὑπὲρ ὑμῶν
  chosen: our boasting about you
  alternatives:
  - our boast concerning you
  - our confidence in you
  lexicon: BDAG
  rationale: καύχημα denotes boasting/ground of boasting. Here Paul refers to what
    he has been saying proudly concerning the Corinthians. 'About you' captures ὑπὲρ
    ὑμῶν idiomatically in English.
- source_word: κενωθῇ
  chosen: might not be emptied
  alternatives:
  - might not prove empty
  - might not be made void
  lexicon: BDAG
  rationale: The passive aorist subjunctive after ἵνα μή expresses purpose/prevention.
    'Emptied' preserves the verbal imagery of being rendered empty or void, while
    remaining natural English.
- source_word: ἐν τῷ μέρει τούτῳ
  chosen: in this matter
  alternatives:
  - in this respect
  - in this case
  lexicon: BDAG
  rationale: μέρος here is idiomatic for a particular respect or matter, not a physical
    'part.' 'In this matter' is clear modern English.
- source_word: καθὼς ἔλεγον
  chosen: just as I was saying
  alternatives:
  - as I said
  - just as I kept saying
  lexicon: BDAG
  rationale: The imperfect ἔλεγον suggests ongoing or repeated prior speech. 'I was
    saying' preserves that nuance better than a simple past.
- source_word: παρεσκευασμένοι ἦτε
  chosen: you may be prepared
  alternatives:
  - you might be prepared
  - you should be prepared
  - you are prepared
  lexicon: BDAG
  rationale: The periphrastic perfect/passive-like construction with ἵνα expresses
    the intended resulting state. English often uses 'may be prepared' after a purpose
    clause for naturalness, while preserving the sense of readiness.
