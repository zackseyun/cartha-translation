id: 2CO.9.10
reference: 2 Corinthians 9:10
source:
  edition: SBLGNT
  text: ὁ δὲ ἐπιχορηγῶν ⸀σπόρον τῷ σπείροντι καὶ ἄρτον εἰς βρῶσιν ⸀χορηγήσει καὶ ⸀πληθυνεῖ
    τὸν σπόρον ὑμῶν καὶ ⸀αὐξήσει τὰ γενήματα τῆς δικαιοσύνης ὑμῶν·)
translation:
  text: Now the one who supplies seed to the sower and bread for food will supply
    and multiply your seed and increase the harvest of your righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'increase the fruits/produce of your righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the harvest of your justice.' Greek δικαιοσύνη can mean 'righteousness'
      or, in some contexts, 'justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιχορηγῶν
  chosen: the one who supplies
  alternatives:
  - the one who provides
  - the one who richly supplies
  lexicon: BDAG
  rationale: 'Rendered as a substantival participle with the article ὁ: ''the one
    who supplies.'' The compound verb can carry the nuance of generous provision,
    but ''supplies'' is clear and natural in English while preserving the provisioning
    sense.'
- source_word: σπόρον
  chosen: seed
  alternatives:
  - grain
  - sowing seed
  lexicon: BDAG
  rationale: Standard agricultural sense. 'Seed' preserves the metaphor and matches
    the immediate sowing context.
- source_word: τῷ σπείροντι
  chosen: to the sower
  alternatives:
  - to the one who sows
  lexicon: BDAG
  rationale: The participle is substantival and refers to the person sowing. 'To the
    sower' is concise and idiomatic.
- source_word: ἄρτον εἰς βρῶσιν
  chosen: bread for food
  alternatives:
  - bread for eating
  - bread to eat
  lexicon: BDAG
  rationale: A straightforward rendering of purpose/result. 'Bread for food' is natural
    English and preserves the distinction between seed for sowing and bread for consumption.
- source_word: χορηγήσει
  chosen: will supply
  alternatives:
  - will provide
  - will furnish
  lexicon: BDAG
  rationale: Future indicative matching the earlier participle semantically. 'Will
    supply' preserves the verbal link with ἐπιχορηγῶν without sounding wooden.
- source_word: πληθυνεῖ
  chosen: multiply
  alternatives:
  - increase
  - make abundant
  lexicon: BDAG
  rationale: The verb denotes making more numerous or abundant. 'Multiply' fits the
    agricultural metaphor and pairs well with 'seed.'
- source_word: τὸν σπόρον ὑμῶν
  chosen: your seed
  alternatives:
  - your supply of seed
  lexicon: BDAG
  rationale: Kept literal to preserve the metaphorical overlap between material provision
    and the Corinthians' capacity for generosity.
- source_word: αὐξήσει
  chosen: increase
  alternatives:
  - cause to grow
  - make grow
  lexicon: BDAG
  rationale: Future verb of growth/increase. 'Increase' is concise and works well
    with the object 'harvest.'
- source_word: τὰ γενήματα
  chosen: the harvest
  alternatives:
  - the produce
  - the fruits
  - the yield
  lexicon: BDAG
  rationale: The noun refers to produce/yield. 'Harvest' best captures the agricultural
    image in idiomatic English and suits the plural collective sense.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine guidance, default rendering is 'righteousness,' while 'justice'
    is a viable Pauline alternative that should be preserved in a footnote. Here the
    phrase likely refers to the moral/spiritual fruit produced by generous giving,
    and 'righteousness' best preserves Paul's theological diction.
