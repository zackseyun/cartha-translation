theological_decisions:
- issue: Meaning of 'the harvest of your righteousness'
  chosen_reading: A metaphor for the fruit/results that flow from the Corinthians'
    righteous generosity, without restricting it either to material return or to forensic
    status.
  alternative_readings:
  - material blessing resulting from generosity
  - the fruit of covenant faithfulness/justice
  - evidence of righteous conduct
  rationale: The verse uses agricultural imagery in a context about generous giving.
    The translation preserves the metaphor and theological breadth rather than narrowing
    it to prosperity, social justice alone, or imputed righteousness alone.
  doctrine_reference: Preserve theological tension rather than resolve it; δικαιοσύνη
    default rendering 'righteousness' with 'justice' preserved in footnote.
