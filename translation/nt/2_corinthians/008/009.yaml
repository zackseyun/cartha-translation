id: 2CO.8.9
reference: 2 Corinthians 8:9
source:
  edition: SBLGNT
  text: γινώσκετε γὰρ τὴν χάριν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὅτι δι’ ὑμᾶς ἐπτώχευσεν
    πλούσιος ὤν, ἵνα ὑμεῖς τῇ ἐκείνου πτωχείᾳ πλουτήσητε.
translation:
  text: 'For you know the grace of our Lord Jesus the Messiah: though he was rich,
    yet for your sake he became poor, so that you by his poverty might become rich.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστοῦ can be rendered 'Christ' or translated
      'Messiah'; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: '''Rich'' and ''poor'' are likely metaphorical, contrasting Christ''s prior
      richness with his self-humbling for the sake of others; Paul does not explicitly
      define the metaphor here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - you are knowing
  - you have come to know
  lexicon: BDAG
  rationale: Present active indicative, second person plural. In context Paul appeals
    to knowledge already possessed by the Corinthians, so simple present 'you know'
    is the most natural English rendering.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  - generosity
  lexicon: BDAG
  rationale: χάρις can denote grace, favor, or gracious generosity. In this context
    it refers both to Christ's gracious act and to the paradigm for generous giving
    in the surrounding passage. 'Grace' preserves the theological depth while allowing
    the ethical implication to remain.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος. 'Lord' is the standard title
    here and preserves both authority and christological weight.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per translation philosophy, titles are translated where context supports.
    Here Χριστοῦ functions as a title rather than merely a fixed surname-like element,
    and 'Messiah' preserves the meaning of the Greek title.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - because of you
  - for you
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses purpose, benefit, or reason.
    'For your sake' best captures the benefactive force in idiomatic English.
- source_word: ἐπτώχευσεν
  chosen: he became poor
  alternatives:
  - he was made poor
  - he became destitute
  lexicon: BDAG
  rationale: Aorist active indicative of πτωχεύω. 'Became poor' is the most direct
    and idiomatic rendering, preserving the movement from prior richness to poverty
    without over-specifying the manner.
- source_word: πλούσιος ὤν
  chosen: though he was rich
  alternatives:
  - being rich
  - while he was rich
  lexicon: BDAG
  rationale: The participial construction is concessive in sense within the sentence's
    contrast. 'Though he was rich' communicates that concessive force more clearly
    than a wooden 'being rich.'
- source_word: τῇ ἐκείνου πτωχείᾳ
  chosen: by his poverty
  alternatives:
  - through that one's poverty
  - by that poverty of his
  lexicon: BDAG
  rationale: Dative of means/instrument is best represented by 'by.' ἐκείνου is naturally
    rendered with the pronoun 'his' in English rather than the more wooden 'that one's.'
- source_word: πλουτήσητε
  chosen: might become rich
  alternatives:
  - might be enriched
  - might become wealthy
  lexicon: BDAG
  rationale: Aorist active subjunctive after ἵνα expresses purpose/result. 'Might
    become rich' preserves the verbal parallel with ἐπτώχευσεν ('became poor'). 'Be
    enriched' is possible but weakens the deliberate rich/poor antithesis.
