  from: And not only that, but he was also appointed by the churches as our traveling
    companion for this gracious gift that is being administered by us for the glory
    of the Lord himself and our readiness to help—
  to: And not only that, but he was also appointed by the churches as our traveling
    companion with this gracious gift that is being administered by us for the glory
    of the Lord himself and our eagerness—
  rationale: Changed 'for this gracious gift' to 'with this gracious gift' to reflect
    σύν more accurately, and changed 'our readiness to help' to 'our eagerness' to
    avoid interpretive expansion beyond the Greek προθυμίαν ἡμῶν.
