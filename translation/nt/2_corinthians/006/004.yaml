theological_decisions:
- issue: Rendering διάκονοι in a ministry context
  chosen_reading: God's servants
  alternative_readings:
  - servants of God
  - God's ministers
  rationale: The term identifies Paul and his coworkers by their service to God rather
    than by a formal church office. 'Servants' best fits the translation philosophy
    of readable modern English without importing later institutional connotations.
