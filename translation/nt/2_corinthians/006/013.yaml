theological_decisions:
- issue: Whether to make Paul's familial address explicitly possessive
  chosen_reading: Retain 'as to children' without adding 'my'
  alternative_readings:
  - as to my children
  rationale: Paul's pastoral relationship strongly suggests a parental tone, but the
    Greek text does not explicitly include a possessive pronoun. To avoid importing
    emphasis not present in the source, the translation keeps the non-possessive form
    while allowing readers to infer the relational warmth from context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
