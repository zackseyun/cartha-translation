id: 2CO.6.13
reference: 2 Corinthians 6:13
source:
  edition: SBLGNT
  text: τὴν δὲ αὐτὴν ἀντιμισθίαν, ὡς τέκνοις λέγω, πλατύνθητε καὶ ὑμεῖς.
translation:
  text: Now in return—I speak as to children—open your hearts wide, you also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as repayment,' 'as recompense,' or 'in equal exchange.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'be widened'; the sense in context is to open themselves in affection
      and receptivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιμισθίαν
  chosen: in return
  alternatives:
  - as repayment
  - as recompense
  - in equal exchange
  lexicon: BDAG
  rationale: The noun denotes a return given in response, often a recompense or reciprocal
    exchange. In this context Paul is not asking for payment in a commercial sense
    but for a corresponding response of affection/openheartedness. 'In return' captures
    the reciprocal force naturally in English without implying monetary compensation.
- source_word: ὡς τέκνοις
  chosen: as to children
  alternatives:
  - as to my children
  - as to beloved children
  lexicon: BDAG
  rationale: τέκνοις means 'children.' The possessive 'my' is not explicit in Greek,
    though the relational sense is clear from context. To avoid adding what is not
    stated, the main text keeps the more literal 'as to children.'
- source_word: πλατύνθητε
  chosen: open your hearts wide
  alternatives:
  - be widened
  - be open wide
  - make room in your hearts
  lexicon: BDAG
  rationale: The passive/deponent imperative literally means 'be widened' or 'be broadened.'
    In the immediate context of vv. 11–12, Paul has spoken of hearts being opened/widened,
    so an idiomatic English rendering that makes the implied object explicit communicates
    the sense best. 'Open your hearts wide' preserves the metaphor of enlarged affection
    and receptivity.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  lexicon: BDAG
  rationale: 'This phrase adds emphasis and reciprocity: Paul and his companions have
    opened themselves, and the Corinthians should do the same. ''You also'' preserves
    that responsive emphasis.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' fits
    the flow of exhortation in English better than a sharper 'But,' while still signaling
    movement to the appeal.
