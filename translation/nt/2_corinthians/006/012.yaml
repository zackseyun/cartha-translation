theological_decisions:
- issue: Figurative sense of σπλάγχνα
  chosen_reading: Paul speaks of the Corinthians' inner affections or emotional capacity,
    not a literal bodily reference.
  alternative_readings:
  - literal 'inward parts'
  rationale: The context is relational and rhetorical, contrasting Paul's openness
    with the Corinthians' constrained response. A figurative rendering best reflects
    the intended meaning while preserving the embodied metaphor in a natural English
    way.
