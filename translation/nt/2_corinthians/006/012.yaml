id: 2CO.6.12
reference: 2 Corinthians 6:12
source:
  edition: SBLGNT
  text: οὐ στενοχωρεῖσθε ἐν ἡμῖν, στενοχωρεῖσθε δὲ ἐν τοῖς σπλάγχνοις ὑμῶν·
translation:
  text: You are not restricted by us, but you are restricted in your own affections.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You are not constrained in us, but you are constrained in your own hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στενοχωρεῖσθε
  chosen: are restricted
  alternatives:
  - are constrained
  - are cramped
  - are narrowed
  lexicon: BDAG
  rationale: The verb στενοχωρέομαι literally conveys being in a narrow space and
    figuratively being under constraint or pressure. 'Are restricted' communicates
    the metaphor clearly in natural English without over-literal awkwardness. The
    same English gloss is kept for both occurrences to preserve Paul's rhetorical
    contrast.
- source_word: ἐν ἡμῖν
  chosen: by us
  alternatives:
  - in us
  - with us
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' the sense here is relational/source-oriented:
    the Corinthians'' constraint is not originating from Paul and his companions.
    English idiom expresses this best as ''by us'' rather than the less clear ''in
    us.'''
- source_word: δὲ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: δέ marks contrast between the two clauses. 'But' is the most natural
    and sufficiently strong English connector here.
- source_word: ἐν τοῖς σπλάγχνοις ὑμῶν
  chosen: in your own affections
  alternatives:
  - in your own hearts
  - in your own inward parts
  - in your own tender mercies
  lexicon: BDAG
  rationale: σπλάγχνα literally refers to inward parts and figuratively to deep feelings,
    affections, or compassion. 'Affections' preserves the emotional sense without
    flattening it to mere cognition. 'Your own' reflects the possessive emphasis and
    sharpens Paul's point that the limitation lies within them, not in him.
- source_word: οὐ
  chosen: not
  lexicon: BDAG
  rationale: Straightforward negation of the first clause.
