  from: for the right hand and the left
  to: for the right hand and for the left
  rationale: The Greek phrase 'τῶν δεξιῶν καὶ ἀριστερῶν' modifies 'weapons' and refers to two distinct sides/hands. While the current rendering is understandable, repeating the preposition ('for the right hand and for the left') creates better parallelism and removes a slight ambiguity where 'for' might be read as governing the entire phrase 'the right hand and the left' as a single unit. This small change improves the rhythm and clarity, aligning with several other major translations (e.g., ESV, NRSVUE).
