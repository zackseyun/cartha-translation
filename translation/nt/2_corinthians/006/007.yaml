id: 2CO.6.7
reference: 2 Corinthians 6:7
source:
  edition: SBLGNT
  text: ἐν λόγῳ ἀληθείας, ἐν δυνάμει θεοῦ· διὰ τῶν ὅπλων τῆς δικαιοσύνης τῶν δεξιῶν καὶ ἀριστερῶν,
translation:
  text: in the word of truth, in the power of God; through the weapons of righteousness for the right hand and for the left,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the weapons of justice.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'for the right hand and the left' likely evokes weapons used in both hands, suggesting full readiness for both offense and defense.
    reason: cultural_note
  - marker: c
    text: Or 'for the right hand and the left'.
    reason: previous_rendering
lexical_decisions:
- source_word: λόγῳ ἀληθείας
  chosen: the word of truth
  alternatives:
  - truthful speech
  - the message of truth
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'speech.' In this catalog of ministerial marks, 'the word of truth' preserves the Greek form and allows both the sense of truthful proclamation and the gospel message. It is more formally transparent than 'truthful speech' while remaining natural English.
- source_word: δυνάμει θεοῦ
  chosen: the power of God
  alternatives:
  - God's power
  lexicon: BDAG
  rationale: A straightforward genitive construction. 'The power of God' preserves the emphasis and rhythm of the repeated ἐν phrases better than the more compressed 'God's power.'
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  - with
  lexicon: BDAG
  rationale: With the genitive, διά commonly expresses means or instrumentality. 'Through' is idiomatic and preserves the sense that what follows is the means by which ministry is carried out.
- source_word: ὅπλων
  chosen: weapons
  alternatives:
  - arms
  - armor
  lexicon: BDAG
  rationale: ὅπλον denotes tools of warfare, whether offensive or defensive. 'Weapons' is the broadest and most transparent choice here. 'Armor' is too narrow, and 'arms' is less clear in contemporary English.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine guidance, δικαιοσύνη defaults to 'righteousness,' while 'justice' should be preserved as an alternative in Pauline contexts. Here the phrase likely denotes morally right conduct or God-given righteous means in spiritual conflict. The alternative is preserved in a footnote.
- source_word: τῶν δεξιῶν καὶ ἀριστερῶν
  chosen: for the right hand and the left
  alternatives:
  - on the right and on the left
  - in the right hand and in the left
  lexicon: BDAG
  rationale: The paired adjectives function substantivally and likely describe the two hands/sides in a military image. English must supply the implied noun. 'For the right hand and the left' keeps the Greek compactness and leaves the imagery broad enough to include offensive and defensive use. 'On the right and on the left' is possible, but the Greek does not explicitly repeat a preposition here.
