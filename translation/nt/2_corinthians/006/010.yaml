id: 2CO.6.10
reference: 2 Corinthians 6:10
source:
  edition: SBLGNT
  text: ὡς λυπούμενοι ἀεὶ δὲ χαίροντες, ὡς πτωχοὶ πολλοὺς δὲ πλουτίζοντες, ὡς μηδὲν
    ἔχοντες καὶ πάντα κατέχοντες.
translation:
  text: as sorrowful, yet always rejoicing; as poor, yet making many rich; as having
    nothing, and yet possessing everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enriching many.' The richness in context is likely not material but
      spiritual.
    reason: lexical_alternative
  - marker: b
    text: That is, possessing all things in the deeper sense Paul claims in union
      with Christ, despite outward lack.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  - as though
  lexicon: BDAG
  rationale: 'Retains Paul''s repeated comparative framing in this catalog of paradoxes:
    he is regarded ''as'' one thing while the deeper reality is qualified by the following
    clause.'
- source_word: λυπούμενοι
  chosen: sorrowful
  alternatives:
  - grieving
  - being grieved
  lexicon: BDAG
  rationale: The participle can be passive/middle in sense ('being grieved,' 'sorrowing').
    'Sorrowful' is concise, idiomatic, and preserves the state Paul describes without
    over-specifying agency.
- source_word: ἀεὶ
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Standard temporal adverb; 'always' is the most natural modern equivalent
    and preserves the ongoing contrast with sorrow.
- source_word: δὲ
  chosen: yet
  alternatives:
  - but
  - and yet
  lexicon: BDAG
  rationale: In each pair δέ marks contrast. 'Yet' brings out the paradoxical force
    more naturally in English than a bare 'but' in this stylized list.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - joyful
  - being glad
  lexicon: BDAG
  rationale: A participial form is maintained to mirror the Greek parallelism with
    the surrounding clauses. 'Rejoicing' also conveys active, ongoing joy.
- source_word: πτωχοὶ
  chosen: poor
  alternatives:
  - impoverished
  - destitute
  lexicon: BDAG
  rationale: '''Poor'' is the straightforward gloss and fits both material deprivation
    and apostolic lowliness without overstating to ''destitute.'''
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The object is indefinite and personal; 'many' is sufficiently clear in
    English and preserves the compact style.
- source_word: πλουτίζοντες
  chosen: making many rich
  alternatives:
  - enriching many
  lexicon: BDAG
  rationale: The verb means to make rich/enrich. 'Making many rich' is slightly more
    transparent to modern readers while still allowing the richness to be understood
    primarily as spiritual in context.
- source_word: μηδὲν ἔχοντες
  chosen: having nothing
  alternatives:
  - possessing nothing
  lexicon: BDAG
  rationale: A natural rendering of the participial phrase that preserves the apparent
    material lack in the paradox.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: '''Everything'' is idiomatic modern English for the comprehensive scope
    of Paul''s claim.'
- source_word: κατέχοντες
  chosen: possessing
  alternatives:
  - holding
  - having secure possession of
  lexicon: BDAG
  rationale: κατέχω can mean hold fast, possess, retain. Here 'possessing' best matches
    the paradox with 'having nothing' and communicates real possession rather than
    mere grasping.
