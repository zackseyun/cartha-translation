theological_decisions:
- issue: Nature of the riches and possessions in Paul's paradoxes
  chosen_reading: Render the language straightforwardly without specifying 'spiritually'
    in the main text.
  alternative_readings:
  - Interpret 'making many rich' and 'possessing everything' explicitly as spiritual
    riches in Christ
  rationale: The immediate context and Pauline theology strongly suggest spiritual
    enrichment, but the Greek itself states the paradox without an explicit qualifier.
    To preserve the text's rhetorical force and avoid importing interpretation into
    the translation, the main text remains literal enough to let the tension stand.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
