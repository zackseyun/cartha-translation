theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance specifies 'Messiah' where Χριστός functions as
    a title. In this antithetical pairing with Beliar, the titular force is prominent,
    so 'the Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)'''
- issue: Identification of Βελιάρ
  chosen_reading: Beliar as a proper name for the evil counterpart in Paul's contrast
  alternative_readings:
  - Belial
  rationale: The translation preserves the Greek form as a transliterated proper name
    without importing extra interpretive material into the main text. Because readers
    may know the form 'Belial,' that alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
