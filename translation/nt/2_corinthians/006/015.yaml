id: 2CO.6.15
reference: 2 Corinthians 6:15
source:
  edition: SBLGNT
  text: τίς δὲ συμφώνησις ⸀Χριστοῦ πρὸς Βελιάρ, ἢ τίς μερὶς πιστῷ μετὰ ἀπίστου;
translation:
  text: And what harmony is there between the Messiah and Beliar? Or what share does
    a believer have with an unbeliever?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beliar: Greek Βελιάρ; many English translations use the alternative form
      ''Belial.'''
    reason: alternative_reading
lexical_decisions:
- source_word: συμφώνησις
  chosen: harmony
  alternatives:
  - agreement
  - accord
  lexicon: BDAG
  rationale: The noun denotes concord or compatibility. 'Harmony' fits the rhetorical
    contrast and preserves the relational sense better than the flatter 'agreement,'
    while remaining natural English.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like form. Here the contrast is conceptual and titular, so
    'the Messiah' best preserves meaning.
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: BDAG
  rationale: This is a proper name and should be transliterated. The Greek form here
    is Βελιάρ, so 'Beliar' most directly reflects the source text; the more familiar
    'Belial' is preserved in a footnote as an alternative form.
- source_word: μερίς
  chosen: share
  alternatives:
  - portion
  - part
  lexicon: BDAG
  rationale: The term refers to a portion or share held in common. 'Share' communicates
    participation or common portion idiomatically in this rhetorical question.
- source_word: πιστῷ
  chosen: a believer
  alternatives:
  - the faithful person
  - the believing one
  lexicon: BDAG
  rationale: In context the adjective is substantival, referring to a person characterized
    by faith. 'A believer' is the most natural and clear English rendering.
- source_word: ἀπίστου
  chosen: an unbeliever
  alternatives:
  - the unbelieving one
  - an unfaithful person
  lexicon: BDAG
  rationale: In this contrast with πιστῷ, the substantival sense is best rendered
    'an unbeliever.' 'Unfaithful person' could suggest covenantal unreliability rather
    than lack of belief, which is less likely here.
- source_word: πρὸς
  chosen: between
  alternatives:
  - with
  - toward
  lexicon: BDAG
  rationale: With συμφώνησις in this construction, English idiom prefers 'between
    ... and ...' to express mutual relation.
- source_word: μετὰ
  chosen: with
  alternatives:
  - in company with
  lexicon: BDAG
  rationale: The preposition marks association; 'with' is the natural concise rendering
    in English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ continues a chain of rhetorical questions. 'And' best reflects
    the additive flow without overstating contrast.
