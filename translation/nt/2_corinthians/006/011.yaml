id: 2CO.6.11
reference: 2 Corinthians 6:11
source:
  edition: SBLGNT
  text: Τὸ στόμα ἡμῶν ἀνέῳγεν πρὸς ὑμᾶς, Κορίνθιοι, ἡ καρδία ἡμῶν πεπλάτυνται·
translation:
  text: Our mouth has been opened to you, Corinthians; our heart has been widened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'We have spoken openly to you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our heart has been enlarged' or 'our heart is wide open.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στόμα
  chosen: mouth
  alternatives:
  - speech
  lexicon: BDAG
  rationale: A literal rendering preserves Paul's bodily metaphor. Although the sense
    is that Paul has spoken openly, translating as 'mouth' keeps the parallel with
    'heart' in the next clause and avoids over-paraphrase.
- source_word: ἀνέῳγεν
  chosen: has been opened
  alternatives:
  - is open
  - has spoken openly
  lexicon: BDAG
  rationale: The perfect form conveys a present state resulting from prior action.
    'Has been opened' preserves the metaphor and the aspect better than a simple present.
    A more idiomatic expansion like 'has spoken openly' captures sense but loses the
    image.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: In this context πρός with the accusative is naturally rendered 'to' in
    English, expressing directed address.
- source_word: Κορίνθιοι
  chosen: Corinthians
  alternatives:
  - people of Corinth
  lexicon: BDAG
  rationale: This is a direct vocative address. 'Corinthians' is the natural transliterated
    form and preserves Paul's personal appeal.
- source_word: καρδία
  chosen: heart
  alternatives:
  - affections
  - inner being
  lexicon: BDAG
  rationale: '''Heart'' is the standard and sufficiently clear rendering for the center
    of affection and inner disposition. It also preserves the metaphorical pairing
    with ''mouth.'''
- source_word: πεπλάτυνται
  chosen: has been widened
  alternatives:
  - is wide open
  - has been enlarged
  lexicon: BDAG
  rationale: The verb πλατύνω literally means to widen or broaden. 'Has been widened'
    preserves the metaphor and the perfect aspect. 'Enlarged' is traditional and idiomatic,
    but 'widened' more directly reflects the Greek image.
