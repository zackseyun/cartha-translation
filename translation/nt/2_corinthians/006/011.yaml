theological_decisions:
- issue: Metaphorical language for Paul's openness and affection
  chosen_reading: Retain the bodily metaphors literally ('mouth ... opened,' 'heart
    ... widened') rather than interpret them in the main text.
  alternative_readings:
  - We have spoken openly to you, Corinthians; our heart is wide open.
  - We have been frank with you, Corinthians, and opened our hearts wide.
  rationale: The verse is not doctrinally contested, but the translation philosophy
    prioritizes original-language primacy and avoiding paraphrase beyond the source
    text. Preserving the metaphors keeps Paul's rhetoric auditable while remaining
    understandable in modern English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence; never paraphrase beyond what the source text warrants.'
