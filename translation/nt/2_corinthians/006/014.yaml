id: 2CO.6.14
reference: 2 Corinthians 6:14
source:
  edition: SBLGNT
  text: Μὴ γίνεσθε ἑτεροζυγοῦντες ἀπίστοις· τίς γὰρ μετοχὴ δικαιοσύνῃ καὶ ἀνομίᾳ,
    ⸂ἢ τίς⸃ κοινωνία φωτὶ πρὸς σκότος;
translation:
  text: Do not become unequally yoked with unbelievers. For what partnership has righteousness
    with lawlessness? Or what fellowship has light with darkness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνῃ).
    reason: lexical_alternative
  - marker: b
    text: The expression 'unequally yoked' evokes the image of mismatched animals
      under one yoke; compare Deuteronomy 22:10.
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ γίνεσθε
  chosen: Do not become
  alternatives:
  - Do not be
  - Stop becoming
  lexicon: BDAG
  rationale: The present middle/passive imperative with μή naturally carries a prohibitive
    force. 'Become' reflects γίνομαι more precisely than a stative 'be,' while remaining
    idiomatic in English.
- source_word: ἑτεροζυγοῦντες
  chosen: unequally yoked
  alternatives:
  - mismatched in a yoke
  - yoked with those of a different kind
  lexicon: BDAG
  rationale: The participle evokes the image of being yoked with a different kind,
    likely echoing Deut 22:10. 'Unequally yoked' preserves the metaphor and is the
    most natural concise English rendering, even though it is somewhat traditional.
- source_word: ἀπίστοις
  chosen: with unbelievers
  alternatives:
  - with the unbelieving
  - with those without faith
  lexicon: BDAG
  rationale: ἄπιστος here denotes those who do not believe. 'Unbelievers' is concise
    and idiomatic, and the dative is naturally rendered with 'with' after the yoking
    metaphor.
- source_word: μετοχὴ
  chosen: partnership
  alternatives:
  - share
  - participation
  - portion in common
  lexicon: BDAG
  rationale: μετοχή denotes participation or sharing together. 'Partnership' fits
    the relational contrast Paul is drawing and reads naturally in parallel with 'fellowship'
    in the next clause.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine table, δικαιοσύνη defaults to 'righteousness,' while
    'justice' is a recognized alternative that should be preserved in a footnote for
    Pauline usage. Here the ethical contrast with ἀνομία supports 'righteousness'
    in the main text.
- source_word: ἀνομίᾳ
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: ἀνομία is most directly 'lawlessness,' the state of disregard for God's
    law. This preserves the lexical contrast with δικαιοσύνη better than broader moral
    terms like 'wickedness.'
- source_word: κοινωνία
  chosen: fellowship
  alternatives:
  - sharing
  - communion
  - association
  lexicon: BDAG
  rationale: κοινωνία denotes close sharing or common participation. 'Fellowship'
    is the most natural English equivalent here and preserves the relational force
    of the contrast.
- source_word: φωτὶ
  chosen: light
  lexicon: BDAG
  rationale: Literal rendering is appropriate in Paul's metaphorical contrast.
- source_word: πρὸς σκότος
  chosen: with darkness
  alternatives:
  - toward darkness
  - in relation to darkness
  lexicon: BDAG
  rationale: 'Although πρός often means ''toward,'' in this contrastive construction
    idiomatic English uses ''with'': ''what fellowship has light with darkness?''
    This preserves the sense of relation or association.'
