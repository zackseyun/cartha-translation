theological_decisions:
- issue: Sense of παιδευόμενοι in relation to suffering
  chosen_reading: disciplined
  alternative_readings:
  - chastened
  - trained
  rationale: The verse presents apostolic suffering as severe yet not terminal. 'Disciplined'
    preserves the possibility of divine formative correction without asserting a specific
    theology of punishment. This maintains the text's tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
