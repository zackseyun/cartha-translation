id: 2CO.6.9
reference: 2 Corinthians 6:9
source:
  edition: SBLGNT
  text: ὡς ἀγνοούμενοι καὶ ἐπιγινωσκόμενοι, ὡς ἀποθνῄσκοντες καὶ ἰδοὺ ζῶμεν, ὡς παιδευόμενοι
    καὶ μὴ θανατούμενοι,
translation:
  text: as unknown and yet well known, as dying and behold, we live, as disciplined
    and not put to death,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recognized' for 'well known'; the Greek may emphasize being fully acknowledged
      rather than merely famous.
    reason: lexical_alternative
  - marker: b
    text: Or 'chastened' / 'being trained' for 'disciplined'; the Greek can denote
      corrective discipline or formative training.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  - as though
  lexicon: BDAG
  rationale: Introduces each paradoxical characterization in Paul's catalog. 'As'
    preserves the repeated rhetorical structure more naturally and formally than paraphrastic
    alternatives.
- source_word: ἀγνοούμενοι
  chosen: unknown
  alternatives:
  - ignored
  - not recognized
  lexicon: BDAG
  rationale: Passive participle from ἀγνοέω here denotes being unknown or unrecognized
    by others. 'Unknown' is concise and idiomatic in the paradox pair with 'well known.'
- source_word: ἐπιγινωσκόμενοι
  chosen: well known
  alternatives:
  - fully known
  - recognized
  lexicon: BDAG
  rationale: The compound verb can suggest fuller or clearer recognition. 'Well known'
    gives natural English and preserves the contrast with 'unknown' without overloading
    the phrase with epistemological nuance.
- source_word: ἀποθνῄσκοντες
  chosen: dying
  alternatives:
  - about to die
  - being put to death
  lexicon: BDAG
  rationale: Present participle conveys an ongoing condition or appearance of being
    at death's edge. 'Dying' preserves the terseness and paradox with 'we live.' 'Being
    put to death' would overlap too much with the later θανατούμενοι.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the abrupt, attention-calling force of the particle in a way
    suitable to elevated but still readable English. 'Look' would sound too colloquial
    here.
- source_word: ζῶμεν
  chosen: we live
  alternatives:
  - we are alive
  lexicon: BDAG
  rationale: 'Simple present best reflects the Greek and keeps the sharp paradox:
    ''dying, and behold, we live.'''
- source_word: παιδευόμενοι
  chosen: disciplined
  alternatives:
  - being trained
  - being chastened
  - being corrected
  lexicon: BDAG
  rationale: παιδεύω can denote formative discipline or corrective chastening. In
    this suffering context, 'disciplined' preserves both senses without importing
    excessive harshness.
- source_word: μὴ θανατούμενοι
  chosen: not put to death
  alternatives:
  - not killed
  - not being put to death
  lexicon: BDAG
  rationale: Passive construction is preserved. 'Not put to death' is slightly more
    formal and matches the contrast with divine or providential preservation better
    than the blunter 'not killed.'
