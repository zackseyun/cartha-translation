theological_decisions:
- issue: Rendering κύριος in a prophetic citation with OT background
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The doctrine file specifies κύριος → 'Lord' as the default. Although
    the line echoes OT language associated with YHWH, the Greek text here reads κύριος
    in an NT context, so 'Lord' is retained rather than importing small-caps 'LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of the separation command
  chosen_reading: be separate
  alternative_readings:
  - be set apart
  - separate yourselves
  rationale: The translation preserves the exhortation to distinctness without importing
    sectarian or ascetic applications beyond the text. It states separation from defiling
    association/practice, not withdrawal from all contact with outsiders.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
