id: 2CO.6.17
reference: 2 Corinthians 6:17
source:
  edition: SBLGNT
  text: διὸ ἐξέλθατε ἐκ μέσου αὐτῶν, καὶ ἀφορίσθητε, λέγει κύριος, καὶ ἀκαθάρτου μὴ
    ἅπτεσθε· κἀγὼ εἰσδέξομαι ὑμᾶς·
translation:
  text: Therefore, come out from among them and be separate, says the Lord, and do
    not touch what is unclean; and I will receive you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be set apart' or 'separate yourselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not touch anything unclean.'
    reason: lexical_alternative
  - marker: c
    text: Paul is echoing Old Testament prophetic language, especially Isaiah 52:11.
    reason: cross_reference
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    is natural modern English and preserves the logical force.
- source_word: ἐξέλθατε
  chosen: come out
  alternatives:
  - go out
  - depart
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive separation. 'Come out'
    is the established and contextually fitting rendering in a citation-like exhortation,
    without over-paraphrasing.
- source_word: ἐκ μέσου αὐτῶν
  chosen: from among them
  alternatives:
  - out of their midst
  - from their midst
  lexicon: BDAG
  rationale: Idiomatic English for spatial/social separation. 'From among them' preserves
    both the preposition and the collective sense of μέσου.
- source_word: ἀφορίσθητε
  chosen: be separate
  alternatives:
  - be set apart
  - separate yourselves
  lexicon: BDAG
  rationale: Passive imperative can be rendered as a state/result command. 'Be separate'
    is concise, natural, and echoes the likely Isaianic background. 'Separate yourselves'
    would tilt more reflexive/active than the Greek form requires.
- source_word: λέγει κύριος
  chosen: says the Lord
  alternatives:
  - the Lord says
  lexicon: BDAG
  rationale: Standard prophetic citation formula. κύριος follows the doctrinal default
    'Lord' rather than 'LORD' or 'Master' in NT usage.
- source_word: ἀκαθάρτου
  chosen: what is unclean
  alternatives:
  - the unclean thing
  - anything unclean
  lexicon: BDAG
  rationale: The genitive singular neuter after ἅπτεσθε is idiomatically rendered
    with an English substantive expression. 'What is unclean' is readable modern English
    and preserves the category without forcing a specific object.
- source_word: μὴ ἅπτεσθε
  chosen: do not touch
  alternatives:
  - do not cling to
  - do not handle
  lexicon: BDAG
  rationale: ἅπτομαι can mean touch or take hold of; in this purity/separation context
    'touch' best matches the citation's imagery and traditional intertextual sense.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: The crasis joins καί + ἐγώ. 'And I' preserves the emphatic personal response
    without overstating the emphasis.
- source_word: εἰσδέξομαι ὑμᾶς
  chosen: I will receive you
  alternatives:
  - I will welcome you
  - I will accept you
  lexicon: BDAG
  rationale: Future middle of εἰσδέχομαι conveys favorable reception. 'Receive' is
    slightly more formal and covenantal, fitting the OT-citation context; 'welcome'
    is possible but somewhat softer.
