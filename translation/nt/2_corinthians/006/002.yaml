theological_decisions:
- issue: Whether to render the citation and Paul’s application with definite or indefinite
    expressions ('the acceptable time/day of salvation' vs. 'an/a acceptable time/day
    of salvation')
  chosen_reading: 'Use indefinite expressions in English: ''an acceptable time'' /
    ''a day of salvation.'''
  alternative_readings:
  - the acceptable time
  - the day of salvation
  rationale: The Greek citation and application are anarthrous. While English tradition
    often uses the definite article under the influence of Isaiah citation style and
    theological emphasis, the source text here does not require definiteness. Using
    the indefinite preserves the Greek form and avoids importing a more fixed eschatological
    scheme than the verse itself states, while still allowing Paul’s urgent present
    application to stand.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Whether 'he says' refers to Scripture impersonally or to God as the speaker
    in Scripture
  chosen_reading: Render personally as 'he says.'
  alternative_readings:
  - it says
  rationale: Paul’s citation formula often treats Scripture as the speech of God.
    'He says' preserves that theological texture without adding explanatory wording.
    This remains within historic orthodoxy and does not overstate beyond the citation
    context.
  doctrine_reference: Translation philosophy §1
