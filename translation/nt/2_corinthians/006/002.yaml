id: 2CO.6.2
reference: 2 Corinthians 6:2
source:
  edition: SBLGNT
  text: λέγει γάρ· Καιρῷ δεκτῷ ἐπήκουσά σου καὶ ἐν ἡμέρᾳ σωτηρίας ἐβοήθησά σοι· ἰδοὺ
    νῦν καιρὸς εὐπρόσδεκτος, ἰδοὺ νῦν ἡμέρα σωτηρίας·
translation:
  text: For he says, “At an acceptable time I listened to you, and in a day of salvation
    I helped you.” Behold, now is a very acceptable time; behold, now is a day of
    salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I heard you favorably.” The verb can carry the sense of hearing with
      acceptance or response.
    reason: lexical_alternative
  - marker: b
    text: Or “now is the favorable time … now is the day of salvation.” Traditional
      English often uses the definite article here.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει γάρ
  chosen: For he says
  alternatives:
  - For he is saying
  - For it says
  lexicon: BDAG
  rationale: γάρ is explanatory ('for'), linking Paul’s appeal to Scripture. λέγει
    is present tense and commonly introduces a scriptural citation as a vivid present;
    'he says' preserves the personal subject implied by the quotation’s divine speaker
    better than impersonal 'it says'.
- source_word: Καιρῷ
  chosen: time
  alternatives:
  - season
  - appointed time
  - opportune time
  lexicon: BDAG
  rationale: καιρός denotes a fitting or appointed time rather than mere chronological
    time. 'Time' is retained in idiomatic English, with the adjective carrying the
    nuance of favorability.
- source_word: δεκτῷ
  chosen: acceptable
  alternatives:
  - favorable
  - welcomed
  lexicon: BDAG
  rationale: δεκτός means acceptable or favorable. 'Acceptable' preserves the lexical
    link with the later εὐπρόσδεκτος while remaining natural in English.
- source_word: ἐπήκουσά σου
  chosen: I listened to you
  alternatives:
  - I heard you
  - I answered you
  lexicon: BDAG
  rationale: ἐπακούω can mean hear/listen to, often with the sense of hearing favorably.
    'Listened to you' preserves the responsive nuance without over-interpreting it
    as 'answered,' which is interpretive.
- source_word: ἐν ἡμέρᾳ σωτηρίας
  chosen: in a day of salvation
  alternatives:
  - on the day of salvation
  - in the day of salvation
  lexicon: BDAG
  rationale: The anarthrous phrase is best rendered indefinitely here, especially
    since Paul applies the citation to the present moment. 'In a day of salvation'
    is faithful and readable.
- source_word: ἐβοήθησά σοι
  chosen: I helped you
  alternatives:
  - I came to your aid
  - I assisted you
  lexicon: BDAG
  rationale: βοηθέω means help/come to the aid of. 'I helped you' is the clearest
    modern English rendering and fits the citation style.
- source_word: ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getting particle. 'Behold' preserves the rhetorical
    force and solemnity better than the more casual 'look' or 'see'.
- source_word: νῦν
  chosen: now
  lexicon: BDAG
  rationale: νῦν is straightforwardly temporal and emphatic in this context; 'now'
    preserves Paul’s urgent application.
- source_word: καιρὸς εὐπρόσδεκτος
  chosen: a very acceptable time
  alternatives:
  - the favorable time
  - an acceptable time
  - the acceptable time
  lexicon: BDAG
  rationale: εὐπρόσδεκτος intensifies the idea of being welcome or highly acceptable.
    Rendering it 'very acceptable' distinguishes it from the earlier δεκτός while
    preserving lexical continuity. The anarthrous construction is rendered with 'a'
    rather than 'the' to reflect the Greek form and avoid over-specifying.
- source_word: ἡμέρα σωτηρίας
  chosen: a day of salvation
  alternatives:
  - the day of salvation
  lexicon: BDAG
  rationale: The phrase lacks the article in Greek. 'A day of salvation' preserves
    the form while still conveying the salvific significance of the present moment.
