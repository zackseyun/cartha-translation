theological_decisions:
- issue: Whether νηστείαις should be rendered as involuntary deprivation ('hunger')
    or as fasting
  chosen_reading: fastings
  alternative_readings:
  - hunger
  rationale: The lexical sense of νηστεία is fasting, and the translation should not
    collapse it into mere lack of food without contextual necessity. Because interpreters
    debate whether Paul means voluntary ascetic practice or hardship-induced abstinence,
    the main text keeps the more textually direct 'fastings' and preserves the broader
    possibility in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
