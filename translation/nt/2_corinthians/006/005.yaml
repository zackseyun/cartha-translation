id: 2CO.6.5
reference: 2 Corinthians 6:5
source:
  edition: SBLGNT
  text: ἐν πληγαῖς, ἐν φυλακαῖς, ἐν ἀκαταστασίαις, ἐν κόποις, ἐν ἀγρυπνίαις, ἐν νηστείαις,
translation:
  text: in beatings, in imprisonments, in riots, in labors, in sleepless nights, in
    fastings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disturbances' or 'tumults' for 'riots.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fasts'; the term can refer to periods of fasting, whether chosen or
      imposed by circumstances.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  chosen: in
  lexicon: BDAG
  rationale: Retained the repeated preposition in each phrase to mirror Paul's rhythmic
    catalog of hardships rather than smoothing the list into a more idiomatic English
    series.
- source_word: πληγαῖς
  chosen: beatings
  alternatives:
  - blows
  - stripes
  - wounds
  lexicon: BDAG
  rationale: In this context of apostolic sufferings, the noun denotes inflicted physical
    blows rather than generic wounds. 'Beatings' is clear modern English and fits
    the hardship list better than the archaic 'stripes'.
- source_word: φυλακαῖς
  chosen: imprisonments
  alternatives:
  - prisons
  - jailings
  lexicon: BDAG
  rationale: The plural likely refers to repeated experiences of confinement. 'Imprisonments'
    communicates the event/experience more naturally in English than the more locative
    'prisons'.
- source_word: ἀκαταστασίαις
  chosen: riots
  alternatives:
  - disturbances
  - tumults
  - disorders
  lexicon: BDAG
  rationale: The term can denote disorder, unrest, or tumult. In a list of external
    afflictions endured by Paul, 'riots' best captures public upheaval and hostile
    commotion, while remaining idiomatic and vivid.
- source_word: κόποις
  chosen: labors
  alternatives:
  - hard work
  - toils
  lexicon: BDAG
  rationale: The word often carries the sense of exhausting labor. 'Labors' preserves
    the compactness and gravity of the Greek better than the more paraphrastic 'hard
    work,' while avoiding the slightly archaic feel of 'toils'.
- source_word: ἀγρυπνίαις
  chosen: sleepless nights
  alternatives:
  - watchings
  - wakeful nights
  - sleeplessness
  lexicon: BDAG
  rationale: The noun refers to periods without sleep. 'Sleepless nights' is natural
    modern English and conveys repeated deprivation more concretely than 'sleeplessness.'
- source_word: νηστείαις
  chosen: fastings
  alternatives:
  - fasts
  - hunger
  lexicon: BDAG
  rationale: The term ordinarily means acts or periods of fasting. 'Fastings' preserves
    the plural and leaves open whether these were voluntary devotional fasts or fasting
    imposed by circumstances; 'hunger' would over-interpret the cause.
