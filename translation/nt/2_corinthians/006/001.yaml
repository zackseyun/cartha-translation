theological_decisions:
- issue: Implied object of 'working together'
  chosen_reading: The συνεργοῦντες is understood as 'working together with him,' referring
    contextually to God.
  alternative_readings:
  - '''working together'' with no explicit object'
  - '''as fellow workers'' referring to Paul and coworkers with one another'
  rationale: The immediate context emphasizes God's reconciling action and Paul's
    role as ambassador (5:18–6:1). Many translations supply 'with him' to make the
    participle intelligible in English. This does not add a new doctrine but makes
    explicit the most likely contextual referent already implied by the discourse.
  doctrine_reference: Translation philosophy §1, §3
