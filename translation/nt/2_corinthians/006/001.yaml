id: 2CO.6.1
reference: 2 Corinthians 6:1
source:
  edition: SBLGNT
  text: Συνεργοῦντες δὲ καὶ παρακαλοῦμεν μὴ εἰς κενὸν τὴν χάριν τοῦ θεοῦ δέξασθαι
    ὑμᾶς·
translation:
  text: Working together with him, we also urge you not to receive the grace of God
    in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As fellow workers, we also urge you'; the Greek participle can be rendered
      without making explicit the one with whom Paul is working, though the context
      strongly suggests God.
    reason: alternative_reading
lexical_decisions:
- source_word: Συνεργοῦντες
  chosen: Working together with him
  alternatives:
  - As fellow workers
  - Cooperating
  - Working together
  lexicon: BDAG
  rationale: The participle introduces Paul's stance as one who is cooperating with
    another; in context the implied partner is God from the preceding discussion of
    God's reconciling work (5:18–20; 6:1). English often requires the object to be
    made explicit for clarity, so 'with him' is supplied contextually rather than
    left hanging. 'As fellow workers' is possible, but 'working together' better preserves
    the verbal force of the participle.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective/transition rather than a strong adversative.
    It is absorbed into English flow rather than translated with an explicit conjunction,
    since 'Working together with him, we also urge you' reads naturally and preserves
    the discourse movement.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - indeed
  lexicon: BDAG
  rationale: 'καί here most naturally adds the action of urging to the participial
    frame: ''we also urge.'' ''Also'' captures the additive force in idiomatic English
    better than a second ''and''.'
- source_word: παρακαλοῦμεν
  chosen: we ... urge
  alternatives:
  - we exhort
  - we appeal
  - we encourage
  lexicon: BDAG
  rationale: In Pauline paraenesis παρακαλέω often carries the sense of earnest appeal
    or exhortation. 'Urge' is strong, clear modern English without sounding overly
    formal; 'exhort' is accurate but less accessible.
- source_word: μὴ
  chosen: not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: Standard negation with the infinitive construction; 'not' is the straightforward
    rendering.
- source_word: εἰς κενὸν
  chosen: in vain
  alternatives:
  - to no purpose
  - for nothing
  - emptily
  lexicon: BDAG
  rationale: This idiom means 'without effect' or 'to no purpose.' 'In vain' is concise,
    idiomatic, and preserves the rhetorical force of the Greek expression.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: χάρις in Paul is a theologically weighty term referring to God's gracious
    action/gift. 'Grace' is the established and most precise rendering here.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most naturally rendered attributively/possessively as
    'the grace of God.' 'From God' is interpretive and less direct.
- source_word: δέξασθαι
  chosen: to receive
  alternatives:
  - to accept
  - to welcome
  lexicon: BDAG
  rationale: δέχομαι commonly means receive/accept. 'Receive' fits both the theological
    register and the infinitival construction after παρακαλοῦμεν.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: 'Direct object/subject of the infinitive in accusative-and-infinitive
    construction: ''we urge you not to receive.'' English requires simple ''you''.'
