id: 2CO.6.16
reference: 2 Corinthians 6:16
source:
  edition: SBLGNT
  text: τίς δὲ συγκατάθεσις ναῷ θεοῦ μετὰ εἰδώλων; ⸂ἡμεῖς γὰρ ναὸς θεοῦ ἐσμεν⸃ ζῶντος·
    καθὼς εἶπεν ὁ θεὸς ὅτι Ἐνοικήσω ἐν αὐτοῖς καὶ ἐμπεριπατήσω, καὶ ἔσομαι αὐτῶν θεός,
    καὶ αὐτοὶ ἔσονταί ⸀μου λαός.
translation:
  text: 'And what agreement has the temple of God with idols? For we are the temple
    of the living God, just as God said: “I will dwell among them and walk among them,
    and I will be their God, and they will be my people.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what accord” or “what common cause.”
    reason: lexical_alternative
  - marker: b
    text: Or “I will dwell in them.” The Greek preposition can be rendered “in” or
      “among”; here the communal covenant context favors “among them.”
    reason: alternative_reading
lexical_decisions:
- source_word: συγκατάθεσις
  chosen: agreement
  alternatives:
  - common cause
  - accord
  lexicon: BDAG
  rationale: The noun denotes agreement, consent, or accord. 'Agreement' is clear
    modern English and fits the rhetorical parallel with incompatible pairings in
    the surrounding context.
- source_word: ναῷ / ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/shrine, often the inner sanctuary,
    not the broader temple precincts. 'Temple' is the standard accessible rendering
    and preserves the cultic force of the metaphor.
- source_word: εἰδώλων
  chosen: idols
  alternatives:
  - images
  lexicon: BDAG
  rationale: In this context the referent is pagan idols, not merely images in a neutral
    sense. 'Idols' preserves the religious polemic.
- source_word: ζῶντος
  chosen: living
  alternatives:
  - alive
  lexicon: BDAG
  rationale: 'The genitive participle modifies θεοῦ: ''the living God.'' This is a
    conventional biblical expression contrasting the true God with lifeless idols.'
- source_word: καθὼς εἶπεν ὁ θεὸς
  chosen: just as God said
  alternatives:
  - as God said
  - just as God has said
  lexicon: BDAG
  rationale: Aorist εἶπεν is naturally rendered 'said.' 'Just as' preserves the comparative
    force of καθώς, linking the assertion to scriptural support.
- source_word: Ἐνοικήσω ἐν αὐτοῖς
  chosen: I will dwell among them
  alternatives:
  - I will live in them
  - I will dwell in them
  lexicon: BDAG
  rationale: Although ἐν can be rendered 'in,' in English the paired covenant formula
    with plural αὐτοῖς and the following 'walk among them' is more natural as 'among
    them.' This preserves the communal covenant presence motif without over-individualizing
    the statement.
- source_word: ἐμπεριπατήσω
  chosen: walk among them
  alternatives:
  - walk in their midst
  - move about among them
  lexicon: BDAG
  rationale: The verb is a vivid covenantal anthropomorphism echoing OT language of
    God's presence with his people. 'Walk among them' is idiomatic and keeps the imagery.
- source_word: ἔσομαι αὐτῶν θεός
  chosen: I will be their God
  alternatives:
  - I will be God to them
  lexicon: BDAG
  rationale: This is the standard covenant formula. 'Their God' is natural English
    and preserves the relational genitive.
- source_word: λαός
  chosen: people
  lexicon: BDAG
  rationale: In covenant formula contexts λαός is best rendered 'people,' denoting
    God's covenant people collectively.
