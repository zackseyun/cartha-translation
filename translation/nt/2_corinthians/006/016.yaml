theological_decisions:
- issue: Corporate temple imagery
  chosen_reading: we are the temple of the living God
  alternative_readings:
  - we are a temple of the living God
  rationale: The anarthrous ναὸς in a predicate nominative construction is qualitative/definite
    in sense here, expressing the church's identity as God's temple. 'The temple'
    best reflects Paul's established ecclesial metaphor and the covenant quotation
    that follows.
  doctrine_reference: Translation philosophy §1, §5
- issue: Divine indwelling quotation phrasing
  chosen_reading: I will dwell among them
  alternative_readings:
  - I will dwell in them
  rationale: The quotation conflates OT covenant-presence texts and is addressed to
    the community corporately. Rendering ἐν αὐτοῖς as 'among them' best matches the
    communal sense and the parallel 'walk among them,' while preserving the theology
    of God's presence without narrowing it to individual interiority.
  doctrine_reference: Translation philosophy §3
