id: 2CO.6.6
reference: 2 Corinthians 6:6
source:
  edition: SBLGNT
  text: ἐν ἁγνότητι, ἐν γνώσει, ἐν μακροθυμίᾳ, ἐν χρηστότητι, ἐν πνεύματι ἁγίῳ, ἐν
    ἀγάπῃ ἀνυποκρίτῳ,
translation:
  text: in purity, in knowledge, in patience, in kindness, in the Holy Spirit, in
    sincere love,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a holy spirit,' if taken as describing a holy disposition rather
      than the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἁγνότητι
  chosen: purity
  alternatives:
  - uprightness
  - chastity
  lexicon: BDAG
  rationale: ἁγνότης denotes purity or moral cleanness in a broad sense. 'Purity'
    is the most natural modern English equivalent and avoids narrowing the term to
    sexual chastity alone.
- source_word: γνώσει
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: γνῶσις here refers to knowledge, likely practical and spiritual understanding
    in ministry. 'Knowledge' is the standard and sufficiently broad rendering.
- source_word: μακροθυμίᾳ
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: μακροθυμία conveys enduring patience toward difficulties or people. 'Patience'
    is clear modern English; 'longsuffering' is more traditional but less natural,
    and 'forbearance' is somewhat narrower.
- source_word: χρηστότητι
  chosen: kindness
  alternatives:
  - goodness
  - gentleness
  lexicon: BDAG
  rationale: χρηστότης commonly denotes kindness, benevolence, or graciousness. 'Kindness'
    best captures the relational quality in accessible English.
- source_word: πνεύματι ἁγίῳ
  chosen: the Holy Spirit
  alternatives:
  - a holy spirit
  - holy spirit
  lexicon: BDAG
  rationale: In Pauline usage, πνεῦμα ἅγιον in this construction ordinarily refers
    to the divine Holy Spirit, not merely a human disposition. The capitalization
    reflects this personal referent.
- source_word: ἀγάπῃ
  chosen: love
  lexicon: BDAG
  rationale: Per project defaults, ἀγάπη is rendered 'love.' The context is a list
    of ministerial qualities, and 'love' is the natural English equivalent.
- source_word: ἀνυποκρίτῳ
  chosen: sincere
  alternatives:
  - unhypocritical
  - without hypocrisy
  - genuine
  lexicon: BDAG
  rationale: ἀνυπόκριτος means without hypocrisy or pretense. 'Sincere' is idiomatic
    in English and works naturally with 'love' while preserving the sense of genuineness.
- source_word: ἐν
  chosen: in
  alternatives:
  - by
  - with
  lexicon: BDAG
  rationale: The repeated ἐν introduces the means, sphere, or manner by which Paul
    and his coworkers commend themselves. Retaining 'in' preserves the rhetorical
    rhythm of the Greek list better than varying the preposition.
