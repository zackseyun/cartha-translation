theological_decisions:
- issue: Referent of πνεύματι ἁγίῳ
  chosen_reading: the Holy Spirit refers to the divine Spirit
  alternative_readings:
  - a holy spirit as a human disposition or attitude
  rationale: Given Pauline usage and the sequence of virtues and divine enablement
    in the surrounding context, the most likely referent is the Holy Spirit. This
    does not import a denominational distinctive, but reflects the probable grammatical
    and contextual sense.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
