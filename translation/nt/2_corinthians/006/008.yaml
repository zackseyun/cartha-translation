theological_decisions:
- issue: Whether to make explicit that the final pair contrasts public perception
    with reality
  chosen_reading: Rendered ὡς as 'regarded as' to show that 'deceivers' is an accusation,
    while 'yet true' states the reality.
  alternative_readings:
  - Rendered more literally as 'as deceivers and true'
  - Rendered as 'as impostors, and yet genuine'
  rationale: 'This is not a doctrinal dispute but a rhetorical/theological one: Paul
    presents apostolic ministry as misjudged by others yet vindicated in truth. Making
    the perception element explicit preserves the tension rather than flattening it.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
