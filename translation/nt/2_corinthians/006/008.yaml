id: 2CO.6.8
reference: 2 Corinthians 6:8
source:
  edition: SBLGNT
  text: διὰ δόξης καὶ ἀτιμίας, διὰ δυσφημίας καὶ εὐφημίας· ὡς πλάνοι καὶ ἀληθεῖς,
translation:
  text: through honor and dishonor, through slander and praise; regarded as deceivers
    and yet true,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through glory and dishonor.' The Greek word can mean 'glory,' but here
      likely carries the social sense of public honor.
    reason: lexical_alternative
  - marker: b
    text: Or 'through bad report and good report.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'as deceivers and true.' The wording contrasts how Paul and his
      coworkers are regarded with what they actually are.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ
  chosen: through
  alternatives:
  - amid
  - in the midst of
  - by means of
  lexicon: BDAG
  rationale: With paired genitives naming circumstances or conditions, διά is best
    rendered 'through,' expressing the sphere or course in which the ministry proceeds.
    'Through' preserves the repeated rhetorical structure.
- source_word: δόξης
  chosen: honor
  alternatives:
  - glory
  - reputation
  lexicon: BDAG
  rationale: Here δόξα is contrasted with ἀτιμία in a social/public sense, so 'honor'
    fits the antithetical pair more naturally than the more theological-sounding 'glory.'
- source_word: ἀτιμίας
  chosen: dishonor
  alternatives:
  - disgrace
  - shame
  lexicon: BDAG
  rationale: Chosen to match and balance 'honor' in a concise antonym pair. 'Dishonor'
    preserves the public/social nuance.
- source_word: δυσφημίας
  chosen: slander
  alternatives:
  - bad report
  - defamation
  - evil report
  lexicon: BDAG
  rationale: The term denotes hostile speech or ill repute. 'Slander' is idiomatic
    modern English and captures the negative verbal attack more clearly than 'bad
    report.'
- source_word: εὐφημίας
  chosen: praise
  alternatives:
  - good report
  - commendation
  - good repute
  lexicon: BDAG
  rationale: As the counterpart to δυσφημία, this refers to favorable speech or reputation.
    'Praise' is natural English and keeps the contrast with 'slander' sharp, though
    'good report' is more formally literal.
- source_word: ὡς
  chosen: regarded as
  alternatives:
  - as
  - treated as
  - considered as
  lexicon: BDAG
  rationale: In this catalog Paul contrasts how he and his coworkers are perceived
    with what is actually true. 'Regarded as' makes the implied perspective explicit
    in natural English.
- source_word: πλάνοι
  chosen: deceivers
  alternatives:
  - impostors
  - misleaders
  - wanderers
  lexicon: BDAG
  rationale: In context the word refers to people viewed as misleading others, not
    merely wandering. 'Deceivers' is the clearest contextual rendering, though it
    reflects the accusation rather than conceding its truth.
- source_word: ἀληθεῖς
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: The adjective stands in direct contrast to πλάνοι. 'True' is concise
    and preserves the paradoxical form 'deceivers and yet true.' 'Truthful' is possible
    but slightly more interpretive.
