theological_decisions:
- issue: Rendering the filial relationship inclusively and accurately
  chosen_reading: '''sons and daughters'''
  alternative_readings:
  - children
  rationale: Paul explicitly includes both υἱοὺς and θυγατέρας. Rendering this as
    'children' would lose the marked inclusion of daughters in the citation. This
    aligns with the translation philosophy's gender-accurate principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering κύριος παντοκράτωρ as a divine title
  chosen_reading: '''the Lord Almighty'''
  alternative_readings:
  - '''the Lord, the Almighty'''
  - '''the Lord of Hosts'''
  rationale: κύριος follows the project's default rendering 'Lord.' παντοκράτωρ is
    best rendered 'Almighty' here rather than importing a different OT title such
    as 'of Hosts,' which is not the Greek wording in this verse.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος'
