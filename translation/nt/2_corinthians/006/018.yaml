id: 2CO.6.18
reference: 2 Corinthians 6:18
source:
  edition: SBLGNT
  text: καὶ ἔσομαι ὑμῖν εἰς πατέρα, καὶ ὑμεῖς ἔσεσθέ μοι εἰς υἱοὺς καὶ θυγατέρας,
    λέγει κύριος παντοκράτωρ.
translation:
  text: And I will be a Father to you, and you will be sons and daughters to me, says
    the Lord Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will be to you for a father, and you will be to me
      for sons and daughters.' The Greek expresses covenant relationship with an idiom
      that English normally smooths to 'be a Father to you' and 'be sons and daughters
      to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσομαι
  chosen: I will be
  alternatives:
  - I shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is best rendered with simple English future. 'Will'
    is modern and natural; 'shall' is unnecessarily archaic.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: 'The dative with εἰς πατέρα in this covenantal formula is naturally expressed
    in English as ''to you'': ''I will be a Father to you.'' This preserves the relational
    sense without over-paraphrase.'
- source_word: εἰς πατέρα
  chosen: a Father
  alternatives:
  - as a father
  lexicon: BDAG
  rationale: The idiom εἶναί τινι εἰς + accusative expresses becoming or being in
    a given relation. 'A Father' is the most direct English equivalent. Capitalizing
    'Father' reflects its use as a divine relational title here, not merely a generic
    role.
- source_word: ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but normal English can convey
    the sense without an emphatic form. Retaining 'you' in subject position is sufficient
    and readable.
- source_word: ἔσεσθέ μοι
  chosen: you will be ... to me
  alternatives:
  - you will become ... to me
  - you will be mine as ...
  lexicon: BDAG
  rationale: This mirrors the first clause and preserves the reciprocal covenantal
    relationship. 'To me' reflects μοι directly and keeps the relational symmetry.
- source_word: υἱοὺς καὶ θυγατέρας
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek explicitly names both male and female offspring. Per the gender-accurate
    philosophy, 'sons and daughters' should be preserved rather than flattened to
    'children'.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The present tense in citation formula is standardly rendered 'says' in
    English, preserving the vividness and scriptural authority formula.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the doctrine's contested-terms table, κύριος defaults to 'Lord.'
    Here it functions as a divine title in a scriptural citation.
- source_word: παντοκράτωρ
  chosen: Almighty
  alternatives:
  - the Almighty
  - all-powerful ruler
  lexicon: BDAG
  rationale: παντοκράτωρ is conventionally and accurately rendered 'Almighty' in biblical
    contexts, especially as a divine title. This is concise, natural, and preserves
    the weight of the title.
