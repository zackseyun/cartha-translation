theological_decisions:
- issue: Meaning of διακονία in Paul's self-description
  chosen_reading: Rendered as 'the ministry' referring to Paul's and his coworkers'
    apostolic service.
  alternative_readings:
  - '''the service'' in a broader, less ministerial sense'
  rationale: The immediate context concerns Paul's conduct as God's servant in carrying
    out his commission. 'Ministry' best captures the recognized Pauline sense without
    importing later ecclesiastical office structures.
  doctrine_reference: Translation philosophy §1, §6
