theological_decisions:
- issue: Meaning of πίστις in both occurrences
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: Per the project's contested-terms guidance, πίστις is rendered 'faith'
    in the main text unless the context strongly requires another sense. Here the
    verse speaks of the Corinthians' believing stance, not Christ's faithfulness or
    a more specialized theological nuance.
  doctrine_reference: 'Contested terms: πίστις → faith; alternatives preserved where
    contested'
