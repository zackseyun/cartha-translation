id: 2CO.1.24
reference: 2 Corinthians 1:24
source:
  edition: SBLGNT
  text: οὐχ ὅτι κυριεύομεν ὑμῶν τῆς πίστεως, ἀλλὰ συνεργοί ἐσμεν τῆς χαρᾶς ὑμῶν, τῇ
    γὰρ πίστει ἑστήκατε.
translation:
  text: Not that we lord it over your faith, but we are fellow workers for your joy,
    for you stand firm by faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'coworkers for your joy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you stand firm in faith.'
    reason: alternative_reading
lexical_decisions:
- source_word: κυριεύομεν
  chosen: lord it over
  alternatives:
  - rule over
  - exercise dominion over
  - have mastery over
  lexicon: BDAG
  rationale: The verb denotes exercising lordship or mastery. 'Lord it over' preserves
    the negative sense of domineering authority in natural English better than the
    flatter 'rule over.'
- source_word: ὑμῶν τῆς πίστεως
  chosen: your faith
  alternatives:
  - your trust
  - faith belonging to you
  lexicon: BDAG
  rationale: The genitive construction is best represented idiomatically as 'your
    faith.' Following the project default, πίστις is rendered 'faith' in the main
    text; 'trust' is possible but less consistent here.
- source_word: συνεργοί
  chosen: fellow workers
  alternatives:
  - coworkers
  - workers together
  lexicon: BDAG
  rationale: The term expresses shared labor alongside the Corinthians rather than
    authority over them. 'Fellow workers' is clear, natural, and slightly more formal
    than 'coworkers,' fitting Paul's tone.
- source_word: τῆς χαρᾶς ὑμῶν
  chosen: for your joy
  alternatives:
  - of your joy
  - for the sake of your joy
  lexicon: BDAG
  rationale: Although formally genitive, the sense in context is that Paul and his
    companions work toward the Corinthians' joy. 'For your joy' communicates the function
    naturally in English.
- source_word: τῇ γὰρ πίστει
  chosen: by faith
  alternatives:
  - in faith
  - through faith
  lexicon: BDAG
  rationale: The dative is most naturally taken as expressing means or basis here.
    'By faith' is concise and fits Paul's explanatory γάρ clause.
- source_word: ἑστήκατε
  chosen: stand firm
  alternatives:
  - stand
  - have stood firm
  lexicon: BDAG
  rationale: The perfect form conveys a settled standing. 'Stand firm' brings out
    the durative/resultative force idiomatically in English better than the weaker
    'stand' alone.
