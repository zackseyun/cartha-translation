  rationale: The current rendering is a literal and defensible translation of `ἵνα δευτέραν χάριν σχῆτε`. However, the English logic of 'coming first in order to have a second benefit' can be slightly confusing without the immediate context of verse 16, which explains the two-part journey. A slightly more dynamic phrasing, such as 'so that you might benefit a second time' (cf. NIV) or 'so that you might receive a double benefit' (cf. NRSV), could capture the intended outcome more intuitively for the reader. This is a suggestion for improved readability, not a correction of an error.
