id: 2CO.1.10
reference: 2 Corinthians 1:10
source:
  edition: SBLGNT
  text: ὃς ἐκ τηλικούτου θανάτου ἐρρύσατο ἡμᾶς καὶ ⸀ῥύσεται, εἰς ὃν ἠλπίκαμεν ὅτι
    καὶ ἔτι ῥύσεται,
translation:
  text: who rescued us from so great a death and will rescue us, in whom we have hoped
    that he will indeed rescue us again,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from such a deadly peril.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τηλικούτου
  chosen: so great
  alternatives:
  - so severe
  - so terrible
  - such a great
  lexicon: BDAG
  rationale: The demonstrative adjective intensifies the magnitude of the danger.
    'So great' keeps the emphatic force and works naturally with 'death' in English.
- source_word: θανάτου
  chosen: death
  alternatives:
  - deadly peril
  lexicon: BDAG
  rationale: The noun is literally 'death.' Although the phrase can refer to mortal
    danger, the main text preserves the source wording; the idiomatic sense is noted
    in a footnote.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: The verb denotes deliverance from danger. 'Rescued' is vivid, modern,
    and fits the concrete peril described here.
- source_word: ῥύσεται
  chosen: will rescue
  alternatives:
  - will deliver
  lexicon: BDAG
  rationale: Using the same English gloss as for the cognate aorist preserves lexical
    consistency across the verse while keeping clear future force.
- source_word: εἰς ὃν
  chosen: in whom
  alternatives:
  - on whom
  lexicon: BDAG
  rationale: Though the preposition is literally 'into,' in this construction it expresses
    the object of hope. 'In whom' is idiomatic English and preserves the personal
    focus.
- source_word: ἠλπίκαμεν
  chosen: we have hoped
  alternatives:
  - we have put our hope
  - we have set our hope
  lexicon: BDAG
  rationale: The perfect tense conveys a settled, continuing posture of hope. 'We
    have hoped' is concise and preserves that aspect without over-paraphrase.
- source_word: καὶ ἔτι
  chosen: indeed...again
  alternatives:
  - still
  - yet again
  lexicon: BDAG
  rationale: The combination adds both emphasis and continuation. Rendering it as
    'indeed...again' communicates both the assurance and the expectation of further
    rescue.
