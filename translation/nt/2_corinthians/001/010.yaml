theological_decisions:
- issue: Whether to interpret 'death' literally or paraphrase it as 'deadly peril'
    in the main text
  chosen_reading: Retain 'death' in the main text
  alternative_readings:
  - Render the phrase idiomatically as 'deadly peril'
  rationale: The Greek text explicitly says 'death,' and preserving that wording best
    follows original-language primacy while allowing readers to feel Paul's heightened
    expression. The idiomatic sense can be preserved in a footnote rather than replacing
    the source image.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
