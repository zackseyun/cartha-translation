id: 2CO.1.23
reference: 2 Corinthians 1:23
source:
  edition: SBLGNT
  text: Ἐγὼ δὲ μάρτυρα τὸν θεὸν ἐπικαλοῦμαι ἐπὶ τὴν ἐμὴν ψυχήν, ὅτι φειδόμενος ὑμῶν
    οὐκέτι ἦλθον εἰς Κόρινθον.
translation:
  text: But I call God as witness against my own life, that to spare you I did not
    come again to Corinth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "against myself"; more literally, "upon my soul."
    reason: lexical_alternative
  - marker: b
    text: Or "I did not come anymore to Corinth."
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγὼ δὲ
  chosen: But I
  alternatives:
  - But as for me
  - Now I
  rationale: Keeps the mild contrast marked by δέ and the explicit first-person emphasis
    of ἐγώ without sounding overly stiff.
- source_word: μάρτυρα τὸν θεὸν ἐπικαλοῦμαι
  chosen: I call God as witness
  alternatives:
  - I invoke God as witness
  - I call upon God as witness
  lexicon: BDAG
  rationale: This reflects the idiom naturally in English while preserving the solemn
    forensic sense of invoking God to attest Paul's truthfulness.
- source_word: ἐπὶ τὴν ἐμὴν ψυχήν
  chosen: against my own life
  alternatives:
  - upon my soul
  - against myself
  lexicon: BDAG
  rationale: The phrase is idiomatic and conveys an oath-like appeal with liability
    falling on Paul himself if he is false. 'Against my own life' is clearer in modern
    English than the more opaque literal 'upon my soul.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here it introduces the content of Paul's solemn appeal rather than giving
    a separate causal clause.
- source_word: φειδόμενος ὑμῶν
  chosen: to spare you
  alternatives:
  - sparing you
  - out of consideration for you
  lexicon: BDAG
  rationale: 'An infinitive phrase reads naturally in English and captures the participle''s
    attendant circumstance: Paul''s motive for not coming was to spare them.'
- source_word: οὐκέτι ἦλθον
  chosen: I did not come again
  alternatives:
  - I no longer came
  - I did not come anymore
  lexicon: BDAG
  rationale: Given the contextual sense of a postponed return visit, 'did not come
    again' communicates the force of οὐκέτι idiomatically in English better than a
    wooden rendering.
- source_word: εἰς Κόρινθον
  chosen: to Corinth
  alternatives:
  - into Corinth
  rationale: Standard idiomatic rendering of motion toward a city in English.
