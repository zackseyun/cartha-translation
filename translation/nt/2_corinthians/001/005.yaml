id: 2CO.1.5
reference: 2 Corinthians 1:5
source:
  edition: SBLGNT
  text: ὅτι καθὼς περισσεύει τὰ παθήματα τοῦ Χριστοῦ εἰς ἡμᾶς, οὕτως διὰ τοῦ Χριστοῦ
    περισσεύει καὶ ἡ παράκλησις ἡμῶν.
translation:
  text: For just as the sufferings of Christ overflow to us, so also through Christ
    our comfort overflows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sufferings for Christ.' The Greek may denote sufferings belonging
      to Christ or sufferings endured on his account.
    reason: alternative_reading
  - marker: b
    text: '''Christ'' may also be rendered ''Messiah'' where the title sense is foregrounded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - Because
  rationale: Introduces an explanation for the preceding statement; 'For' fits natural
    English discourse while preserving the causal force.
- source_word: καθὼς ... οὕτως
  chosen: just as ... so also
  alternatives:
  - as ... so
  - just as ... so
  rationale: Preserves the correlative comparison structure in clear modern English.
- source_word: περισσεύει
  chosen: overflow
  alternatives:
  - abound
  - increase
  lexicon: BDAG
  rationale: '''Overflow'' captures both abundance and movement beyond measure, fitting
    the repeated imagery in this verse better than the flatter ''abound''.'
- source_word: τὰ παθήματα
  chosen: the sufferings
  alternatives:
  - the afflictions
  - the sufferings endured
  lexicon: BDAG
  rationale: '''Sufferings'' is the most direct and idiomatic rendering of πάθημα
    here, matching Paul''s language of shared affliction.'
- source_word: τοῦ Χριστοῦ
  chosen: of Christ
  alternatives:
  - of the Messiah
  - for Christ
  lexicon: BDAG
  rationale: Here Χριστοῦ functions naturally in a name-like Pauline way, so 'Christ'
    is preferable to 'Messiah' under the project guideline. The genitive is kept as
    'of Christ' in the main text, while the possible sense 'for Christ' is preserved
    in a footnote.
- source_word: εἰς ἡμᾶς
  chosen: to us
  alternatives:
  - into us
  - upon us
  lexicon: BDAG
  rationale: A more natural English rendering in this idiom; it communicates that
    these sufferings come upon and are experienced by Paul and his companions.
- source_word: διὰ τοῦ Χριστοῦ
  chosen: through Christ
  alternatives:
  - through the Messiah
  - by means of Christ
  lexicon: BDAG
  rationale: '''Through Christ'' is the most natural rendering of διά with the genitive
    here, expressing mediated agency.'
- source_word: παράκλησις
  chosen: comfort
  alternatives:
  - encouragement
  - consolation
  lexicon: BDAG
  rationale: In this immediate context Paul repeatedly contrasts affliction and παράκλησις;
    'comfort' best preserves that pastoral sense in contemporary English.
- source_word: ἡ παράκλησις ἡμῶν
  chosen: our comfort
  alternatives:
  - the comfort we receive
  - our encouragement
  lexicon: BDAG
  rationale: A straightforward rendering of the possessive phrase that remains readable
    without expanding the Greek.
