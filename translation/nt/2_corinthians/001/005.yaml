theological_decisions:
- issue: Meaning of 'the sufferings of Christ'
  chosen_reading: Shared participation in sufferings belonging to Christ and associated
    with union with him
  alternative_readings:
  - sufferings endured for Christ
  - the sufferings Christ himself experienced now overflowing into his people
  rationale: The genitive allows more than one nuance. The main text keeps the formally
    transparent 'of Christ' rather than over-resolving the relationship, while a footnote
    preserves the plausible alternative 'for Christ.'
  doctrine_reference: Preserve theological tension rather than resolve it.
