id: 2CO.1.13
reference: 2 Corinthians 1:13
source:
  edition: SBLGNT
  text: οὐ γὰρ ἄλλα γράφομεν ὑμῖν ἀλλ’ ἢ ἃ ἀναγινώσκετε ἢ καὶ ἐπιγινώσκετε, ἐλπίζω
    δὲ ⸀ὅτι ἕως τέλους ἐπιγνώσεσθε,
translation:
  text: For we are not writing anything else to you except what you read and also
    understand, and I hope that you will understand completely,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I hope that you will understand to the end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  chosen: anything else
  alternatives:
  - other things
  - something else
  lexicon: BDAG
  rationale: The neuter plural after a negated writing verb is naturally idiomatic
    in English as 'anything else,' preserving the denial of hidden meaning without
    sounding wooden.
- source_word: ἀναγινώσκετε
  chosen: you read
  alternatives:
  - you are reading
  lexicon: BDAG
  rationale: A simple present fits the generic force of the statement. 'Read' preserves
    the plain sense of publicly or personally reading the letter.
- source_word: ἐπιγινώσκετε
  chosen: understand
  alternatives:
  - recognize
  - know fully
  lexicon: BDAG
  rationale: In this context Paul contrasts mere reading with grasping the meaning.
    'Understand' communicates that sense more clearly than the more literal but less
    natural 'recognize.'
- source_word: ἐπιγνώσεσθε
  chosen: you will understand completely
  alternatives:
  - you will fully know
  - you will recognize fully
  lexicon: BDAG
  rationale: The future of ἐπιγινώσκω intensifies the earlier verb and points to fuller
    comprehension. 'Understand completely' preserves that progression in natural English.
- source_word: ἕως τέλους
  chosen: completely
  alternatives:
  - to the end
  - fully to the end
  lexicon: BDAG
  rationale: Although literally 'to the end,' the phrase here can function idiomatically
    to express completeness. Rendering it as 'completely' gives clear English sense
    in this sentence, while the more literal temporal alternative is preserved in
    a footnote.
- source_word: οὐ γὰρ ... ἀλλ’ ἢ
  chosen: For ... not ... except
  alternatives:
  - For ... not ... other than
  lexicon: Greek grammar
  rationale: This correlative structure denies any hidden or different message. 'Except'
    is the most natural English equivalent while keeping the exclusivity of the Greek
    construction.
