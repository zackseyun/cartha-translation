theological_decisions:
- issue: Rendering of christological title Χριστός in 'Ἰησοῦ Χριστοῦ'
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The translation philosophy prefers translating titles to preserve meaning.
    Here Χριστός still carries titular force rather than functioning as a mere surname.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like)'
