id: 2CO.1.3
reference: 2 Corinthians 1:3
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ πατὴρ τῶν οἰκτιρμῶν
    καὶ θεὸς πάσης παρακλήσεως,
translation:
  text: Blessed be the God and Father of our Lord Jesus the Messiah, the Father of
    mercies and God of all comfort,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'Master' for 'Lord.'
    reason: lexical_alternative
  - marker: c
    text: Or 'compassions.'
    reason: lexical_alternative
  - marker: d
    text: Or 'encouragement' or 'consolation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: BDAG
  rationale: A predicate adjective used in a doxological formula; 'Blessed be' reflects
    standard English doxology while preserving the declarative force.
- source_word: θεὸς καὶ πατὴρ
  chosen: the God and Father
  alternatives:
  - God and Father
  lexicon: BDAG
  rationale: The article naturally governs the paired nouns, yielding the familiar
    relational expression 'the God and Father' rather than two separate referents.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the doctrinal default for κύριος and fits New Testament
    christological usage.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per the doctrine guideline, Χριστός is translated as 'Messiah' where
    it functions as a title. In 'Jesus Messiah,' the titular sense remains visible
    and meaningful.
- source_word: οἰκτιρμῶν
  chosen: mercies
  alternatives:
  - compassions
  - acts of mercy
  lexicon: BDAG
  rationale: The plural is retained to reflect the Greek form and to convey the abundance
    of God's merciful acts or compassions.
- source_word: παρακλήσεως
  chosen: comfort
  alternatives:
  - encouragement
  - consolation
  lexicon: BDAG
  rationale: In this context, which introduces repeated language of divine help amid
    affliction, 'comfort' is the most natural and readable rendering, though the semantic
    range also includes encouragement and consolation.
