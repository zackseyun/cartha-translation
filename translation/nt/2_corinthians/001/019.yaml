theological_decisions:
- issue: Rendering Χριστός in a potentially titular but name-like construction
  chosen_reading: Jesus Christ
  alternative_readings:
  - Jesus Messiah
  rationale: The project's default is 'Messiah' where Χριστός functions as a title,
    but to use 'Christ' where the expression is name-like. In this verse, Ἰησοῦς Χριστός
    is appositional to 'the Son of God' and reads naturally as a fixed personal designation,
    so 'Jesus Christ' is the best main-text rendering.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah where title; Christ
    where name-like'
- issue: Whether Ναί/Οὔ should be interpreted or left transparent
  chosen_reading: was not Yes and No; rather, in him it has become Yes
  alternative_readings:
  - was not vacillating, but dependable
  - was not Yes and No, but the answer in him is Yes
  rationale: The verse addresses divine faithfulness expressed through Christ. The
    translation preserves Paul's rhetorical wording instead of resolving it into an
    interpretive paraphrase such as 'vacillating' or 'dependable.'
  doctrine_reference: Preserve theological tension rather than resolve it
