id: 2CO.1.19
reference: 2 Corinthians 1:19
source:
  edition: SBLGNT
  text: ὁ ⸂τοῦ θεοῦ γὰρ⸃ υἱὸς ⸂Ἰησοῦς Χριστὸς⸃ ὁ ἐν ὑμῖν δι’ ἡμῶν κηρυχθείς, δι’ ἐμοῦ
    καὶ Σιλουανοῦ καὶ Τιμοθέου, οὐκ ἐγένετο Ναὶ καὶ Οὒ, ἀλλὰ Ναὶ ἐν αὐτῷ γέγονεν·
translation:
  text: For the Son of God, Jesus Christ, who was proclaimed among you through us—through
    me and Silvanus and Timothy—was not Yes and No; rather, in him it has become Yes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was preached among you by us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was not “Yes” and “No” ... but in him it has been “Yes.”'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: Kept the titular expression in its natural English order while preserving
    its full christological weight.
- source_word: Ἰησοῦς Χριστός
  chosen: Jesus Christ
  alternatives:
  - Jesus Messiah
  lexicon: BDAG
  rationale: Although Χριστός is commonly rendered 'Messiah' when clearly titular,
    here the paired expression functions name-like, so 'Jesus Christ' best fits the
    doctrine guideline for name-like usage.
- source_word: κηρυχθείς
  chosen: was proclaimed
  alternatives:
  - was preached
  lexicon: BDAG
  rationale: '''Proclaimed'' preserves the heraldic sense of κηρύσσω while using readable
    modern English.'
- source_word: δι’ ἡμῶν
  chosen: through us
  alternatives:
  - by us
  lexicon: BDAG
  rationale: Repeated διά naturally marks agency/instrumentality here; 'through us'
    preserves the Greek pattern and prepares for the specific names that follow.
- source_word: δι’ ἐμοῦ καὶ Σιλουανοῦ καὶ Τιμοθέου
  chosen: through me and Silvanus and Timothy
  alternatives:
  - by me and Silvanus and Timothy
  lexicon: BDAG
  rationale: Retains Paul's self-reference and named coworkers with the same preposition
    as the prior clause for transparency to the Greek structure.
- source_word: οὐκ ἐγένετο Ναὶ καὶ Οὔ
  chosen: was not Yes and No
  alternatives:
  - did not become Yes and No
  - was not both Yes and No
  lexicon: BDAG
  rationale: This idiom contrasts inconsistency with reliability. 'Was not Yes and
    No' is concise, idiomatic, and close to the Greek without over-paraphrasing.
- source_word: ἀλλὰ Ναὶ ἐν αὐτῷ γέγονεν
  chosen: rather, in him it has become Yes
  alternatives:
  - but in him it has been Yes
  - but in him the answer is Yes
  lexicon: BDAG
  rationale: The perfect γέγονεν is reflected with 'has become,' preserving the completed-and-abiding
    force more directly than a simple present. 'In him' is kept rather than interpreted
    away.
