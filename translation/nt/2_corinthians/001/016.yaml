id: 2CO.1.16
reference: 2 Corinthians 1:16
source:
  edition: SBLGNT
  text: καὶ δι’ ὑμῶν διελθεῖν εἰς Μακεδονίαν, καὶ πάλιν ἀπὸ Μακεδονίας ἐλθεῖν πρὸς
    ὑμᾶς καὶ ὑφ’ ὑμῶν προπεμφθῆναι εἰς τὴν Ἰουδαίαν.
translation:
  text: and through you to pass into Macedonia, and again from Macedonia to come to
    you and by you to be sent on to Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to be helped on my way to Judea.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὑμῶν
  chosen: through you
  alternatives:
  - by way of you
  - via you
  lexicon: BDAG
  rationale: διά with the genitive here most naturally expresses movement by way of
    the Corinthians in the travel plan. 'Through you' preserves the directional sense
    and fits Paul's itinerary.
- source_word: διελθεῖν
  chosen: to pass
  alternatives:
  - to travel
  - to go
  lexicon: BDAG
  rationale: The infinitive denotes passing through or traveling onward. 'To pass'
    stays close to the Greek while remaining natural in English when paired with the
    destination phrase.
- source_word: εἰς Μακεδονίαν
  chosen: into Macedonia
  alternatives:
  - to Macedonia
  lexicon: BDAG
  rationale: εἰς formally means 'into.' Since English travel idiom also allows 'to
    Macedonia,' either works, but 'into Macedonia' preserves the motion nuance of
    the Greek.
- source_word: πάλιν
  chosen: again
  alternatives:
  - then again
  - in turn
  lexicon: BDAG
  rationale: '''Again'' straightforwardly marks the return movement in Paul''s intended
    itinerary.'
- source_word: ἀπὸ Μακεδονίας
  chosen: from Macedonia
  lexicon: BDAG
  rationale: ἀπό with the genitive marks origin or departure. 'From Macedonia' is
    the plain sense.
- source_word: ἐλθεῖν πρὸς ὑμᾶς
  chosen: to come to you
  alternatives:
  - to come back to you
  - to come toward you
  lexicon: BDAG
  rationale: This clause expresses Paul's planned return to Corinth. 'To come to you'
    is natural and accurate; 'back' is implied by context but not explicit in the
    Greek.
- source_word: ὑφ’ ὑμῶν
  chosen: by you
  alternatives:
  - by your help
  - by you all
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency. 'By you' keeps the Corinthians as
    the agents of the following action without over-interpreting the means.
- source_word: προπεμφθῆναι
  chosen: to be sent on
  alternatives:
  - to be helped on my way
  - to be accompanied onward
  lexicon: BDAG
  rationale: In travel contexts προπέμπω commonly refers to sending someone on with
    support for the journey. 'To be sent on' is concise and transparent, while a fuller
    interpretive alternative is preserved in a footnote.
- source_word: εἰς τὴν Ἰουδαίαν
  chosen: to Judea
  alternatives:
  - into Judea
  lexicon: BDAG
  rationale: For destination English idiom, 'to Judea' is more natural than 'into
    Judea,' while still accurately conveying εἰς.
