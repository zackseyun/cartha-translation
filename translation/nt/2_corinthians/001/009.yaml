id: 2CO.1.9
reference: 2 Corinthians 1:9
source:
  edition: SBLGNT
  text: ἀλλὰ αὐτοὶ ἐν ἑαυτοῖς τὸ ἀπόκριμα τοῦ θανάτου ἐσχήκαμεν, ἵνα μὴ πεποιθότες
    ὦμεν ἐφ’ ἑαυτοῖς ἀλλ’ ἐπὶ τῷ θεῷ τῷ ἐγείροντι τοὺς νεκρούς·
translation:
  text: Indeed, we ourselves had received the sentence of death within ourselves,
    so that we would not rely on ourselves but on God, who raises the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the verdict of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: Indeed
  alternatives:
  - But
  - On the contrary
  rationale: Here ἀλλά marks a strong contrast with the previous statement, but English
    reads more naturally with an emphatic adversative/discourse marker than a bare
    'but.' 'Indeed' preserves the force without awkwardness.
- source_word: αὐτοὶ
  chosen: we ourselves
  alternatives:
  - we
  - we personally
  rationale: The pronoun is emphatic, so the English should preserve that emphasis
    explicitly.
- source_word: ἐν ἑαυτοῖς
  chosen: within ourselves
  alternatives:
  - in ourselves
  rationale: This keeps the inward, personal sense of the phrase while sounding natural
    in modern English.
- source_word: τὸ ἀπόκριμα τοῦ θανάτου
  chosen: the sentence of death
  alternatives:
  - the verdict of death
  - the response of death
  lexicon: BDAG
  rationale: In this context ἀπόκριμα most plausibly refers to a judicial or decisive
    outcome, not merely an abstract 'answer.' 'Sentence of death' is idiomatic and
    fits Paul's sense that death seemed effectively decided.
- source_word: ἐσχήκαμεν
  chosen: had received
  alternatives:
  - had
  - came to have
  rationale: The perfect form conveys a settled state resulting from prior experience.
    'Had received' brings out that nuance better than a flat 'had' in English.
- source_word: ἵνα μὴ πεποιθότες ὦμεν
  chosen: so that we would not rely
  alternatives:
  - so that we would not have confidence
  - so that we would not trust
  lexicon: BDAG
  rationale: The construction expresses purpose, and the perfect participle of πείθω
    carries the sense of settled confidence or reliance. 'Rely' is natural English
    and fits the contrast with reliance on God.
- source_word: ἐφ’ ἑαυτοῖς
  chosen: on ourselves
  alternatives:
  - in ourselves
  rationale: With πεποιθότες, English idiom favors 'rely on' rather than 'have confidence
    in' here, and this matches the prepositional contrast with ἐπὶ τῷ θεῷ.
- source_word: ἀλλ’ ἐπὶ τῷ θεῷ
  chosen: but on God
  alternatives:
  - but in God
  rationale: This preserves the strong contrast between self-reliance and reliance
    on God.
- source_word: τῷ ἐγείροντι τοὺς νεκρούς
  chosen: who raises the dead
  alternatives:
  - who raises dead people
  - who resurrects the dead
  rationale: The participle is substantival/descriptive, identifying God by his life-giving
    power. 'Raises the dead' is the most direct and biblically recognizable rendering.
