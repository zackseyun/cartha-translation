theological_decisions:
- issue: Whether τοὺς νεκρούς should be rendered more dynamically as 'dead people'
    or more traditionally as 'the dead'
  chosen_reading: the dead
  alternative_readings:
  - dead people
  rationale: Both are possible, but 'the dead' is accurate, natural, and preserves
    the resonance of God's resurrection power without importing extra interpretation.
