id: 2CO.1.18
reference: 2 Corinthians 1:18
source:
  edition: SBLGNT
  text: πιστὸς δὲ ὁ θεὸς ὅτι ὁ λόγος ἡμῶν ὁ πρὸς ὑμᾶς οὐκ ⸀ἔστιν Ναὶ καὶ Οὔ.
translation:
  text: As surely as God is faithful, our message to you is not “Yes and No.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “But God is faithful, that our word to you is not yes
      and no.”
    reason: lexical_alternative
  - marker: b
    text: “Message” may also be rendered “word” or “speech.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: '"Faithful" is the most natural rendering here for God''s reliability
    and fits Paul''s appeal to God''s dependability as the ground of his statement.'
- source_word: δὲ
  chosen: as surely as
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Although δέ often means "but," the clause here functions idiomatically
    with πιστὸς ὁ θεός as an asseveration. "As surely as" brings out the force in
    natural English better than a bare adversative.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject.
- source_word: ὅτι
  chosen: as introducing the content of Paul's assertion within the asseverative construction
  alternatives:
  - that
  - because
  lexicon: BDAG
  rationale: In context, ὅτι links God's faithfulness to the claim that follows. English
    reads more naturally by expressing the whole construction as "As surely as God
    is faithful, ..." rather than preserving a wooden "God is faithful that ..."
- source_word: λόγος
  chosen: message
  alternatives:
  - word
  - speech
  lexicon: BDAG
  rationale: '"Message" communicates the sense more idiomatically in English here,
    referring to what Paul and his companions communicated to the Corinthians, while
    avoiding an overly wooden "word."'
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Genitive possessive modifying λόγος.
- source_word: ὁ πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - spoken to you
  - for you
  lexicon: BDAG
  rationale: This attributive phrase identifies the message as the one directed to
    the Corinthians. "To you" is the clearest concise rendering.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - has not been
  lexicon: BDAG
  rationale: Present-tense English best reflects the Greek form and the ongoing character
    of Paul's claim.
- source_word: Ναὶ καὶ Οὔ
  chosen: “Yes and No”
  alternatives:
  - yes and no
  - both yes and no
  lexicon: BDAG
  rationale: Retaining the paired terms preserves Paul's pointed contrast with vacillation
    or contradiction. Capitalization and quotation marks signal the idiomatic slogan-like
    expression.
