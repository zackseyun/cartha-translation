theological_decisions:
- issue: How to render the asseverative construction πιστὸς δὲ ὁ θεὸς ὅτι
  chosen_reading: As surely as God is faithful
  alternative_readings:
  - But God is faithful, that ...
  - God is faithful, because ...
  rationale: This rendering preserves Paul's appeal to God's faithfulness as the solemn
    basis for the truthfulness of his ministry, without forcing awkward English syntax.
