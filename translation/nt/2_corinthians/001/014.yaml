id: 2CO.1.14
reference: 2 Corinthians 1:14
source:
  edition: SBLGNT
  text: καθὼς καὶ ἐπέγνωτε ἡμᾶς ἀπὸ μέρους, ὅτι καύχημα ὑμῶν ἐσμεν καθάπερ καὶ ὑμεῖς
    ἡμῶν ἐν τῇ ἡμέρᾳ τοῦ κυρίου ⸀ἡμῶν Ἰησοῦ.
translation:
  text: 'just as you also came to understand us in part: that we are your boast, just
    as you also are ours, in the day of our Lord Jesus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "partially" or "to some extent."
    reason: lexical_alternative
  - marker: b
    text: Or "ground for boasting" or "reason for pride."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωτε
  chosen: came to understand
  alternatives:
  - recognized
  - fully understood
  - acknowledged
  lexicon: BDAG
  rationale: The aorist of ἐπιγινώσκω here points to real recognition or understanding
    reached by the Corinthians. "Came to understand" preserves the verbal force without
    overstating πλήρης/completeness.
- source_word: ἀπὸ μέρους
  chosen: in part
  alternatives:
  - partially
  - to some extent
  lexicon: BDAG
  rationale: This idiom naturally means partiality or incompleteness of understanding.
    "In part" is concise, idiomatic, and leaves the degree intentionally open.
- source_word: καύχημα
  chosen: boast
  alternatives:
  - ground for boasting
  - reason for pride
  lexicon: BDAG
  rationale: Pauline usage often carries the sense of boasting/exultant pride in a
    person or relationship. "Boast" is compact and preserves the rhetorical texture
    better than a flatter paraphrase.
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - just as indeed
  lexicon: BDAG
  rationale: This keeps the explicit reciprocal comparison between Paul and the Corinthians.
- source_word: ἡμέρᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ
  chosen: the day of our Lord Jesus
  alternatives:
  - our Lord Jesus's day
  - the day belonging to our Lord Jesus
  lexicon: BDAG
  rationale: This preserves the established eschatological expression while keeping
    κύριος translated as "Lord" per doctrine. The genitival construction is most naturally
    rendered in standard English as "the day of our Lord Jesus."
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and fits the
    christological title in this context.
- source_word: καθὼς καὶ
  chosen: just as you also
  alternatives:
  - as indeed you also
  - just as also
  lexicon: BDAG
  rationale: This opening comparative phrase links verse 14 back to the previous statement
    and retains καί's additive force without awkward English word order.
