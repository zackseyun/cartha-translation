theological_decisions:
- issue: Paul's reciprocal καύχημα language
  chosen_reading: we are your boast, just as you also are ours
  alternative_readings:
  - we are your reason for pride, just as you are ours
  rationale: The verse describes mutual eschatological rejoicing/boasting between
    apostle and church, not a self-exalting doctrinal claim beyond the text. Retaining
    "boast" preserves Paul's wording and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
