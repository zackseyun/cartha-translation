theological_decisions:
- issue: Semantic range of παρακαλέω / παράκλησις
  chosen_reading: comfort / comforts / comforted
  alternative_readings:
  - encourage / encouragement
  - console / consolation
  rationale: Because the verse is framed by θλῖψις ('affliction'), the consoling-strengthening
    sense is primary. 'Comfort' best preserves both pastoral warmth and the repeated
    lexical linkage across the verse.
