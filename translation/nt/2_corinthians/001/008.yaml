theological_decisions:
- issue: Rendering ἀδελφοί in an epistolary address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Following the translation philosophy, the grammatically masculine term
    is retained in the main text, while its likely representative force in a mixed
    Christian audience is preserved by footnote rather than expanded in the text itself.
  doctrine_reference: Gender-accurate over gender-neutral
