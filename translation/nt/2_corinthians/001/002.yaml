id: 2CO.1.2
reference: 2 Corinthians 1:2
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'Jesus Christ.'
    reason: lexical_alternative
  - marker: b
    text: '''Lord'' may also be rendered ''Master'' in some contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - grace
  lexicon: BDAG
  rationale: Standard Pauline greeting term; 'Grace' preserves both the greeting form
    and the theological weight better than a flatter option like 'favor.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is naturally rendered 'to you' in English epistolary
    style.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '''Peace'' is the established and semantically appropriate rendering
    in Paul''s greeting formula, preserving both Jewish and broader biblical resonance.'
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - coming from
  lexicon: BDAG
  rationale: The preposition marks source; 'from' is the clearest and most natural
    English equivalent.
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - God, our Father
  - our God and Father
  lexicon: BDAG
  rationale: 'The genitive chain is most naturally rendered as a compact appositional
    phrase in English: ''God our Father.'''
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'Lord' as the default rendering for κύριος; it best
    fits NT christological usage here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: DOCTRINE.md directs that Χριστός be rendered 'Messiah' where it functions
    as a title rather than a name-like form. In this greeting, the title remains semantically
    transparent and is best preserved in English.
