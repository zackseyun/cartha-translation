theological_decisions:
- issue: Rendering Χριστοῦ in a Pauline greeting
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the project's stated policy, the title is translated rather
    than merely transliterated when context supports its titular force. This preserves
    the messianic meaning without importing extra doctrinal interpretation.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering κυρίου with christological force
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The term is a title for Jesus in a blessing formula shared with 'God
    our Father.' 'Lord' is the project's default and best reflects NT usage and theological
    register here.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
