id: 2CO.1.21
reference: 2 Corinthians 1:21
source:
  edition: SBLGNT
  text: ὁ δὲ βεβαιῶν ἡμᾶς σὺν ὑμῖν εἰς Χριστὸν καὶ χρίσας ἡμᾶς θεός,
translation:
  text: But the one who establishes us with you in Messiah, and who anointed us, is
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title is Christos, here rendered 'Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: βεβαιῶν
  chosen: establishes
  alternatives:
  - confirms
  - makes firm
  - strengthens
  lexicon: BDAG
  rationale: Carries the sense of making firm or secure. 'Establishes' is natural
    English and preserves the durative force of the present participle without over-paraphrasing.
- source_word: σὺν ὑμῖν
  chosen: with you
  alternatives:
  - together with you
  - along with you
  lexicon: BDAG
  rationale: The phrase marks shared participation of Paul and the Corinthians. 'With
    you' is concise and clear in modern English.
- source_word: εἰς Χριστόν
  chosen: in Messiah
  alternatives:
  - into Messiah
  - in Christ
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' in this Pauline context the idiomatic
    sense is relational incorporation, well conveyed by 'in.' Χριστός is rendered
    'Messiah' per project doctrine when used as a title.
- source_word: χρίσας
  chosen: anointed
  alternatives:
  - consecrated
  lexicon: BDAG
  rationale: This preserves the lexical connection to χρίω and echoes messianic/anointing
    language without importing a narrower ritual meaning.
- source_word: θεός
  chosen: God
  lexicon: BDAG
  rationale: Placed at the end for emphasis in Greek; English requires explicit completion
    of the clause. 'Is God' best represents the predicate force.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Project doctrine specifies 'Messiah' for Χριστός where title is in view,
    to preserve the Hebraic and titular sense rather than defaulting to the name-like
    traditional English form.
