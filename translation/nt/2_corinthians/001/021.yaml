theological_decisions:
- issue: Force of εἰς in the phrase εἰς Χριστόν
  chosen_reading: relational/incorporative sense rendered as 'in Messiah'
  alternative_readings:
  - more literal 'into Messiah'
  - traditional 'in Christ'
  rationale: A strictly literal 'into' is possible, but in idiomatic Pauline usage
    the phrase commonly expresses established union or relation to Christ/Messiah.
    'In Messiah' preserves that sense while remaining readable.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
