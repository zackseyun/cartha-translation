theological_decisions:
- issue: Rendering of σάρξ in the Pauline idiom κατὰ σάρκα
  chosen_reading: according to the flesh
  alternative_readings:
  - according to merely human standards
  - in a worldly way
  rationale: The doctrine guidance treats σάρξ as context-dependent. Here the phrase is metaphorical, but preserving 'flesh' maintains Pauline theological texture and avoids prematurely flattening the idiom into a single interpretation.
  doctrine_reference: 'Contested terms table: σάρξ (*sarx*)'
status: reviewed
revisions:
- timestamp: '2026-04-21T02:03:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_corinthians/001/017.json
  category: awkward_english
  tier: 1
  from: so that with me there is both “Yes, yes” and “No, no”?
  to: so that in my case it is both “Yes, yes” and “No, no”?
  rationale: The current rendering of `παρ’ ἐμοὶ ᾖ` as 'with me there is' is literal and correct. However, it can sound slightly stiff in English. Using a phrase like 'in my case it is' or 'so that for me it is' is a more idiomatic way to express `παρ’ ἐμοὶ` when it refers to a characteristic of a person. This change would slightly improve the natural flow of the rhetorical question without altering the meaning or sacrificing fidelity.
