id: 2CO.1.17
reference: 2 Corinthians 1:17
source:
  edition: SBLGNT
  text: τοῦτο οὖν ⸀βουλόμενος μήτι ἄρα τῇ ἐλαφρίᾳ ἐχρησάμην; ἢ ἃ βουλεύομαι κατὰ σάρκα βουλεύομαι, ἵνα ᾖ παρ’ ἐμοὶ τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ;
translation:
  text: So when I intended this, was I acting lightly? Or do I plan what I plan according to the flesh, so that in my case it is both “Yes, yes” and “No, no”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with fickleness” for “lightly.”
    reason: lexical_alternative
  - marker: b
    text: “According to the flesh” can mean according to merely human or worldly standards.
    reason: lexical_alternative
  - marker: c
    text: That is, speaking as if both “Yes” and “No” could stand together.
    reason: cultural_note
  - marker: d
    text: Or 'so that with me there is both “Yes, yes” and “No, no”?'.
    reason: previous_rendering
lexical_decisions:
- source_word: βουλόμενος
  chosen: intended
  alternatives:
  - wanted
  - purposed
  - planned
  lexicon: BDAG
  rationale: A participial sense tied to Paul's prior travel intention is best conveyed as 'intended,' which is natural in English and keeps the deliberative nuance without over-specifying formal planning.
- source_word: ἐλαφρίᾳ
  chosen: lightly
  alternatives:
  - with fickleness
  - with levity
  - carelessly
  lexicon: BDAG
  rationale: The noun denotes lightness or instability of purpose. 'Acting lightly' preserves the rhetorical question in idiomatic English while implying the charge of fickleness. 'Fickleness' is a strong alternative, but the adverbial English fits the clause more smoothly.
- source_word: ἐχρησάμην
  chosen: was I acting
  alternatives:
  - did I make use of
  - did I act with
  lexicon: BDAG
  rationale: With the dative τῇ ἐλαφρίᾳ, the verb means to conduct oneself with or make use of something. 'Was I acting lightly' gives the natural force of the idiom.
- source_word: ἃ βουλεύομαι ... βουλεύομαι
  chosen: do I plan what I plan
  alternatives:
  - what I decide, do I decide
  - do I make my plans
  lexicon: BDAG
  rationale: The repetition is rhetorically emphatic in Greek, so the English preserves some of that repetition rather than fully smoothing it away.
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - according to merely human standards
  - in a worldly way
  lexicon: BDAG
  rationale: Because σάρξ is a doctrinally significant Pauline term and this phrase is idiomatic, the main text preserves 'flesh' while allowing readers to hear Paul's characteristic wording. The more interpretive alternatives are better left to annotation.
- source_word: τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ
  chosen: both “Yes, yes” and “No, no”
  alternatives:
  - '''Yes'' and ''No'' at the same time'
  - yes and no
  lexicon: BDAG
  rationale: The repeated forms are retained because they are present in the Greek and sharpen the accusation of vacillation or double-minded speech.
- source_word: παρ’ ἐμοὶ
  chosen: with me there is
  alternatives:
  - from me comes
  - in my case there is
  lexicon: BDAG
  rationale: This rendering communicates the sense of something being characteristic of Paul or found in his conduct, in clear modern English.
