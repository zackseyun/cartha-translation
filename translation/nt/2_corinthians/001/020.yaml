id: 2CO.1.20
reference: 2 Corinthians 1:20
source:
  edition: SBLGNT
  text: ὅσαι γὰρ ἐπαγγελίαι θεοῦ, ἐν αὐτῷ τὸ Ναί· ⸀διὸ καὶ ⸂δι’ αὐτοῦ⸃ τὸ Ἀμὴν τῷ
    θεῷ πρὸς δόξαν δι’ ἡμῶν.
translation:
  text: For however many promises of God there are, in him is the Yes. Therefore through
    him also is the Amen to God, for glory through us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in him they have their Yes.'
    reason: alternative_reading
  - marker: b
    text: '''Amen'' is a transliterated affirmation meaning something like ''truly''
      or ''so be it.'''
    reason: cultural_note
  - marker: c
    text: Or 'to the glory of God through us,' if πρὸς δόξαν is taken more explicitly
      with God as the goal of the praise.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅσαι
  chosen: however many
  alternatives:
  - as many as
  - whatever number of
  lexicon: BDAG
  rationale: Conveys an indefinite totality more naturally in English than the wooden
    'as many as' while preserving the sense that all God's promises are in view.
- source_word: ἐπαγγελίαι
  chosen: promises
  alternatives:
  - pledges
  lexicon: BDAG
  rationale: Standard and clear rendering for divine promises; 'pledges' is possible
    but less idiomatic in this theological context.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of God' here, identifying the
    promises as God's own promises.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in him they are fulfilled
  - in him they have their yes
  lexicon: BDAG
  rationale: Keeps Paul's compressed wording and Christ-centered locative/instrumental
    expression without importing an explanatory verb into the main text.
- source_word: τὸ Ναί
  chosen: the Yes
  alternatives:
  - 'yes'
  - their yes
  lexicon: BDAG
  rationale: Retains the article and the rhetorical force of Paul's formulation. Capitalization
    reflects its near-substantival, emphatic use in context, not a distinct title.
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - for this reason
  - so then
  lexicon: BDAG
  rationale: Naturally marks the inference Paul draws from the previous clause.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with the genitive is best rendered 'through,' highlighting mediation
    through Christ.
- source_word: τὸ Ἀμὴν
  chosen: the Amen
  alternatives:
  - amen
  - the so be it
  lexicon: BDAG
  rationale: Amen is well established in English and preserves the liturgical and
    theological resonance of the Greek transliteration. The article is retained to
    mirror the Greek's parallel with 'the Yes.'
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: Best reflects the dative as the one to whom the Amen is directed.
- source_word: πρὸς δόξαν
  chosen: for glory
  alternatives:
  - to the glory
  - for the glory
  lexicon: BDAG
  rationale: A concise rendering that preserves the telic sense of the phrase without
    over-specifying beyond the Greek.
- source_word: δι’ ἡμῶν
  chosen: through us
  alternatives:
  - through our ministry
  - by us
  lexicon: BDAG
  rationale: Keeps Paul's wording broad and direct; adding 'ministry' would be interpretive.
