id: 2CO.1.1
reference: 2 Corinthians 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ καὶ Τιμόθεος ὁ ἀδελφὸς τῇ ἐκκλησίᾳ τοῦ θεοῦ τῇ οὔσῃ ἐν Κορίνθῳ, σὺν τοῖς ἁγίοις πᾶσιν τοῖς οὖσιν ἐν ὅλῃ τῇ Ἀχαΐᾳ·
translation:
  text: 'Paul, an apostle of Messiah Jesus by the will of God, and Timothy our brother, to the church of God that is in Corinth, together with all the saints who are in all Achaia:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, Christ Jesus.
    reason: alternative_reading
  - marker: b
    text: Or 'Timothy the brother'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: '"Apostle" is the established and most precise rendering for Paul’s commissioned office here; alternatives like "messenger" or "envoy" are too weak for this epistolary self-designation.'
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered "Messiah" where it functions as a title rather than a name-like label. Here in "Messiah Jesus" it retains clear titular force.
- source_word: διὰ θελήματος θεοῦ
  chosen: by the will of God
  alternatives:
  - through the will of God
  lexicon: BDAG
  rationale: διά with the genitive can be rendered "through" or "by." In this commissioning formula, "by the will of God" is natural English and clearly expresses divine agency behind Paul’s apostleship.
- source_word: ὁ ἀδελφὸς
  chosen: the brother
  alternatives:
  - brother
  - our brother
  lexicon: BDAG
  rationale: The Greek includes the article and simply says "the brother." "Our brother" is common in English versions but adds a possessive not present in the text. The draft preserves the explicit wording as transparently as possible.
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: '"Church" is the most natural and contextually accurate rendering in Pauline address formulas. "Assembly" is possible more woodenly, but less fitting in contemporary English for this epistolary usage.'
- source_word: ἁγίοις
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: '"Saints" is concise, established, and accurate in Pauline usage for God’s holy people. "Holy ones" is more literal but less idiomatic in English here.'
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  lexicon: BDAG
  rationale: '"Together with" makes the inclusive force of σύν slightly clearer in English while remaining faithful to the preposition’s sense.'
- source_word: ἐν ὅλῃ τῇ Ἀχαΐᾳ
  chosen: in all Achaia
  alternatives:
  - throughout Achaia
  lexicon: BDAG
  rationale: '"In all Achaia" closely follows the Greek structure and communicates the regional scope clearly. "Throughout Achaia" is idiomatic but a bit freer.'
