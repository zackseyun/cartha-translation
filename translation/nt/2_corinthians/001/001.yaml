  from: Timothy the brother
  to: Timothy our brother
  rationale: The literal rendering 'the brother' is defensible based on the Greek text lacking a possessive pronoun, but it sounds somewhat stiff and unnatural in an English salutation. 'Timothy our brother' is a highly common and idiomatic way to express the same relationship within the community, improving flow without adding meaning not already implied by the context.
