  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine excerpt directs that Χριστός be translated as "Messiah" where title force is present, with the traditional alternative preserved in a footnote. This keeps the messianic sense visible without altering orthodox Christology.
