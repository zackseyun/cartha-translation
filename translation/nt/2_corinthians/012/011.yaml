theological_decisions:
- issue: Force of τῶν ὑπερλίαν ἀποστόλων
  chosen_reading: Rendered as 'those super-apostles' with likely ironic/polemical
    force left implicit rather than explained in the main text.
  alternative_readings:
  - '''the most eminent apostles'' as a non-ironic reference to highly regarded apostles'
  - '''the so-called super-apostles'' making the irony explicit'
  rationale: The phrase is contextually charged in 2 Corinthians, but the Greek itself
    does not explicitly mark irony with a particle such as 'so-called.' 'Super-apostles'
    preserves the hyperbolic wording and allows readers to sense the rhetoric without
    importing a stronger interpretive judgment into the main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
