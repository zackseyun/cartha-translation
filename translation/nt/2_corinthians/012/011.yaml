id: 2CO.12.11
reference: 2 Corinthians 12:11
source:
  edition: SBLGNT
  text: Γέγονα ⸀ἄφρων· ὑμεῖς με ἠναγκάσατε· ἐγὼ γὰρ ὤφειλον ὑφ’ ὑμῶν συνίστασθαι.
    οὐδὲν γὰρ ὑστέρησα τῶν ὑπερλίαν ἀποστόλων, εἰ καὶ οὐδέν εἰμι·
translation:
  text: I have become a fool; you forced me to it. For I ought to have been commended
    by you, since I fell short in nothing compared with those super-apostles, even
    if I am nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the most eminent apostles.' The Greek expression is highly emphatic
      and may be ironic in context.
    reason: alternative_reading
lexical_decisions:
- source_word: Γέγονα
  chosen: I have become
  alternatives:
  - I became
  - I have been made
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior action;
    'I have become' preserves that force better than a simple past.
- source_word: ἄφρων
  chosen: a fool
  alternatives:
  - foolish
  - senseless man
  lexicon: BDAG
  rationale: Predicate nominative used substantivally; 'a fool' is the most natural
    English equivalent in Paul's ironic self-description.
- source_word: ὑμεῖς με ἠναγκάσατε
  chosen: you forced me to it
  alternatives:
  - you compelled me
  - you drove me to this
  lexicon: BDAG
  rationale: The emphatic subject 'you' is retained, and 'to it' makes explicit the
    implied action of foolish boasting from the immediate context without over-paraphrasing.
- source_word: ὤφειλον
  chosen: I ought
  alternatives:
  - I was obligated
  - I should have
  lexicon: BDAG
  rationale: Expresses what was proper or expected; 'ought' captures moral/social
    obligation in idiomatic English.
- source_word: ὑφ’ ὑμῶν συνίστασθαι
  chosen: to have been commended by you
  alternatives:
  - to have been recommended by you
  - to have been approved by you
  lexicon: BDAG
  rationale: Passive infinitive with agency by ὑπό; in this context Paul means the
    Corinthians should have spoken in his favor. 'Commended' fits Pauline usage of
    συνίστημι in commendation contexts.
- source_word: οὐδὲν ... ὑστέρησα
  chosen: I fell short in nothing
  alternatives:
  - I was inferior in nothing
  - I lacked nothing
  lexicon: BDAG
  rationale: The idiom means not being behind or inferior. 'Fell short in nothing'
    preserves the comparative sense while remaining natural English.
- source_word: τῶν ὑπερλίαν ἀποστόλων
  chosen: those super-apostles
  alternatives:
  - the most eminent apostles
  - the exceedingly great apostles
  lexicon: BDAG
  rationale: ὑπερλίαν intensifies strongly. In 2 Corinthians this expression is likely
    ironic or polemical; 'super-apostles' captures both the hyperbolic force and common
    scholarly understanding without requiring an interpretive paraphrase beyond the
    text.
- source_word: εἰ καὶ οὐδέν εἰμι
  chosen: even if I am nothing
  alternatives:
  - although I am nothing
  - even though I am nobody
  lexicon: BDAG
  rationale: Concessive clause; 'even if I am nothing' preserves Paul's self-deprecating
    concession and echoes the Greek closely.
