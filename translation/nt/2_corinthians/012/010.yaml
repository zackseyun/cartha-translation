id: 2CO.12.10
reference: 2 Corinthians 12:10
source:
  edition: SBLGNT
  text: διὸ εὐδοκῶ ἐν ἀσθενείαις, ἐν ὕβρεσιν, ἐν ἀνάγκαις, ἐν διωγμοῖς ⸀καὶ στενοχωρίαις,
    ὑπὲρ Χριστοῦ· ὅταν γὰρ ἀσθενῶ, τότε δυνατός εἰμι.
translation:
  text: Therefore I delight in weaknesses, in insults, in hardships, in persecutions
    and distresses, for the sake of the Messiah; for when I am weak, then I am strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “for the sake of Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    is natural and preserves the logical connection.
- source_word: εὐδοκῶ
  chosen: I delight
  alternatives:
  - I am well pleased
  - I take pleasure
  - I am content
  lexicon: BDAG
  rationale: The verb conveys favorable acceptance or pleasure. 'I delight' best captures
    Paul's paradoxical positive disposition here without flattening it to mere resignation.
    'Am content' is possible in context but is less directly tied to the lexical sense
    of taking pleasure.
- source_word: ἐν ἀσθενείαις
  chosen: in weaknesses
  alternatives:
  - in weaknesses
  - in infirmities
  lexicon: BDAG
  rationale: Plural dative after repeated ἐν is best kept as 'in weaknesses.' This
    preserves the broad sense of frailty/weakness rather than narrowing to physical
    illness.
- source_word: ἐν ὕβρεσιν
  chosen: in insults
  alternatives:
  - in mistreatments
  - in outrages
  - in abuses
  lexicon: BDAG
  rationale: ὕβρις here refers to abusive treatment or humiliating insult. 'Insults'
    is concise, idiomatic, and fits the list of sufferings.
- source_word: ἐν ἀνάγκαις
  chosen: in hardships
  alternatives:
  - in necessities
  - in pressures
  - in distresses
  lexicon: BDAG
  rationale: Though literally 'necessities/constraints,' in this context it denotes
    pressing difficulties. 'Hardships' communicates the experiential sense in readable
    English.
- source_word: ἐν διωγμοῖς
  chosen: in persecutions
  alternatives:
  - in pursuits
  lexicon: BDAG
  rationale: In Pauline usage the noun clearly refers to persecution suffered for
    allegiance to Christ.
- source_word: καὶ στενοχωρίαις
  chosen: and distresses
  alternatives:
  - and difficulties
  - and calamities
  - and troubles
  lexicon: BDAG
  rationale: στενοχωρία carries the sense of severe pressure or constriction. 'Distresses'
    preserves the intensity and pairs well with the surrounding list.
- source_word: ὑπὲρ Χριστοῦ
  chosen: for the sake of the Messiah
  alternatives:
  - for Christ
  - on behalf of Christ
  - for the sake of Christ
  lexicon: BDAG
  rationale: 'ὑπέρ here expresses cause/benefit: these sufferings are endured because
    of and for allegiance to Christ. Per doctrine, Χριστός as title is rendered ''Messiah''
    where context supports title sense rather than name-like usage.'
- source_word: ὅταν γὰρ ἀσθενῶ
  chosen: for when I am weak
  alternatives:
  - for whenever I am weak
  lexicon: BDAG
  rationale: ὅταν with present subjunctive gives a general temporal sense. 'When I
    am weak' is idiomatic and sufficient in English; 'whenever' is possible but heavier.
- source_word: τότε δυνατός εἰμι
  chosen: then I am strong
  alternatives:
  - then I am powerful
  lexicon: BDAG
  rationale: δυνατός means strong/able/powerful. 'Strong' is the natural antonym to
    'weak' and preserves Paul's paradox cleanly.
