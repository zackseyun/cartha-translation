theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the doctrine's contested-terms guidance, Χριστός is translated
    'Messiah' where it functions as a title. Here 'for the sake of the Messiah' preserves
    the titular force and the Jewish messianic background, while the traditional 'Christ'
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός Christos → Messiah (where
    title; Christ where name-like)'
