id: 2CO.12.19
reference: 2 Corinthians 12:19
source:
  edition: SBLGNT
  text: ⸀Πάλαι δοκεῖτε ὅτι ὑμῖν ἀπολογούμεθα; ⸀κατέναντι θεοῦ ἐν Χριστῷ λαλοῦμεν.
    τὰ δὲ πάντα, ἀγαπητοί, ὑπὲρ τῆς ὑμῶν οἰκοδομῆς,
translation:
  text: Have you been thinking all along that we are defending ourselves to you? Before
    God, in the Messiah, we are speaking; and all things, beloved, are for your building
    up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in Christ."
    reason: alternative_reading
lexical_decisions:
- source_word: Πάλαι
  chosen: all along
  alternatives:
  - for a long time
  - long ago
  lexicon: BDAG
  rationale: In this context πάλαι idiomatically modifies the readers' ongoing assumption,
    not distant past time in a strict historical sense. 'All along' captures the adverbial
    force naturally in English.
- source_word: δοκεῖτε
  chosen: Have you been thinking
  alternatives:
  - Do you think
  - You think
  lexicon: BDAG
  rationale: The present indicative in a rhetorical question can be rendered with
    an English present perfect progressive to convey an ongoing assumption up to the
    present. This works well with πάλαι.
- source_word: ἀπολογούμεθα
  chosen: we are defending ourselves
  alternatives:
  - we are making our defense
  - we are answering for ourselves
  lexicon: BDAG
  rationale: The middle/passive form here refers to self-defense or self-vindication.
    'Defending ourselves' is clear modern English and preserves the forensic nuance
    without sounding overly technical.
- source_word: κατέναντι θεοῦ
  chosen: Before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: The phrase indicates accountability and speech made in God's presence.
    'Before God' is concise and idiomatic while preserving solemnity.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title. Here the phrase denotes speech in union with or sphere of relation to
    the Messiah, and the title sense remains active.
- source_word: λαλοῦμεν
  chosen: we are speaking
  alternatives:
  - we speak
  lexicon: BDAG
  rationale: Present tense is retained with a progressive English form for immediacy
    and to match the rhetorical flow of the verse.
- source_word: τὰ δὲ πάντα
  chosen: and all things
  alternatives:
  - but everything
  - indeed all things
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And all
    things' fits the discourse movement from denial of self-defense to affirmation
    of edification as the purpose of all Paul says and does.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - dearly loved ones
  lexicon: BDAG
  rationale: '''Beloved'' preserves the affectionate vocative and keeps the lexical
    connection with ἀγάπη/love better than a looser paraphrase.'
- source_word: ὑπὲρ τῆς ὑμῶν οἰκοδομῆς
  chosen: for your building up
  alternatives:
  - for your edification
  - for your strengthening
  lexicon: BDAG
  rationale: οἰκοδομή is metaphorical for spiritual strengthening or edification.
    'Building up' preserves the metaphor in accessible modern English better than
    the church-jargon term 'edification'.
