- issue: Rendering of Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where title sense is active, with 'Christ' reserved for name-like usage. In this
    verse the title remains meaningful rather than merely titular.
