id: 2CO.12.21
reference: 2 Corinthians 12:21
source:
  edition: SBLGNT
  text: μὴ πάλιν ⸂ἐλθόντος μου⸃ ⸀ταπεινώσῃ ⸀με ὁ θεός μου πρὸς ὑμᾶς, καὶ πενθήσω πολλοὺς
    τῶν προημαρτηκότων καὶ μὴ μετανοησάντων ἐπὶ τῇ ἀκαθαρσίᾳ καὶ πορνείᾳ καὶ ἀσελγείᾳ
    ᾗ ἔπραξαν.
translation:
  text: I fear that when I come again, my God may humble me before you, and I will
    mourn over many who sinned before and have not repented of the impurity and sexual
    immorality and sensuality that they practiced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my God may humiliate me among you.' The Greek verb can mean 'humble,'
      'bring low,' or 'humiliate,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'many of those who have sinned previously.'
    reason: lexical_alternative
  - marker: c
    text: '''Sexual immorality'' translates porneia; alternatives such as ''fornication''
      are more traditional but less natural in contemporary English.'
    reason: lexical_alternative
  - marker: d
    text: Or 'debauchery' or 'licentiousness' for 'sensuality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πάλιν ἐλθόντος μου
  chosen: when I come again
  alternatives:
  - when I come back
  - on my return
  lexicon: BDAG
  rationale: The construction with μή after the preceding φοβοῦμαι implied from v.20
    expresses Paul's fear about a future visit. πάλιν modifies the coming as 'again.'
    Rendering as a temporal clause in English communicates the sense naturally without
    over-literal awkwardness.
- source_word: ταπεινώσῃ με
  chosen: may humble me
  alternatives:
  - might humiliate me
  - may bring me low
  lexicon: BDAG
  rationale: ταπεινόω can mean humble, abase, or bring low. 'May humble me' preserves
    the Godward, providential sense without overstating it as public humiliation,
    though that nuance is possible in context.
- source_word: ὁ θεός μου
  chosen: my God
  lexicon: BDAG
  rationale: Straightforward possessive expression; retained literally to preserve
    Paul's personal relation to God.
- source_word: πρὸς ὑμᾶς
  chosen: before you
  alternatives:
  - among you
  - in relation to you
  lexicon: BDAG
  rationale: Here πρός with accusative in this idiom is best taken relationally in
    the sphere of Paul's visit to the Corinthians. 'Before you' captures the sense
    that his humbling would occur in their presence.
- source_word: πενθήσω
  chosen: I will mourn
  alternatives:
  - I will grieve
  - I will lament
  lexicon: BDAG
  rationale: πενθέω denotes mourning or lamenting, often with strong emotional and
    even penitential overtones. 'Mourn' best preserves the gravity.
- source_word: πολλοὺς τῶν προημαρτηκότων
  chosen: many who sinned before
  alternatives:
  - many of those who have sinned previously
  - many of the ones who sinned earlier
  lexicon: BDAG
  rationale: The perfect participle προημαρτηκότων points to prior sinning with continuing
    relevance. 'Who sinned before' is concise and natural, preserving temporal priority.
- source_word: μὴ μετανοησάντων
  chosen: have not repented
  alternatives:
  - did not repent
  lexicon: BDAG
  rationale: 'Though the participle is aorist, in English the present-result force
    in context is well conveyed by ''have not repented'': they remain unrepentant
    by the time of Paul''s visit.'
- source_word: ἐπὶ τῇ ἀκαθαρσίᾳ
  chosen: of the impurity
  alternatives:
  - for the impurity
  - concerning the impurity
  lexicon: BDAG
  rationale: With μετανοέω, ἐπί can mark the matter over which repentance is needed.
    'Of' is idiomatic in English after 'repented' and keeps the focus on the sins
    named.
- source_word: ἀκαθαρσίᾳ
  chosen: impurity
  alternatives:
  - uncleanness
  lexicon: BDAG
  rationale: '''Impurity'' is clear modern English and broad enough to cover moral
    uncleanness without archaic connotations.'
- source_word: πορνείᾳ
  chosen: sexual immorality
  alternatives:
  - fornication
  lexicon: BDAG
  rationale: Given the translation philosophy's preference for readable modern English,
    'sexual immorality' is the clearest rendering of πορνεία.
- source_word: ἀσελγείᾳ
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  lexicon: BDAG
  rationale: ἀσέλγεια denotes shameless, unrestrained conduct, often sexual. 'Sensuality'
    is readable and fits the vice list, though 'debauchery' is also possible.
- source_word: ᾗ ἔπραξαν
  chosen: that they practiced
  alternatives:
  - which they committed
  - that they have done
  lexicon: BDAG
  rationale: The relative pronoun refers back collectively to the listed vices. πράσσω
    often conveys practiced behavior rather than a single act; 'practiced' reflects
    that nuance.
