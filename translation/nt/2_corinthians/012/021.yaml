theological_decisions:
- issue: Force of Paul's statement introduced by μή after the implied verb of fear
    from the previous verse
  chosen_reading: Expressed as 'I fear that when I come again... my God may humble
    me before you'
  alternative_readings:
  - Lest when I come again my God should humble me among you
  rationale: The Greek continues the fear statement from v.20 rather than making an
    independent assertion. English needs the implied fear made explicit for clarity.
    This is a syntactic, not doctrinal, decision.
- issue: Moral vice terminology
  chosen_reading: Rendered the three terms distinctly as 'impurity and sexual immorality
    and sensuality'
  alternative_readings:
  - uncleanness and fornication and licentiousness
  rationale: The verse lists overlapping but distinct sins; the translation preserves
    the accumulation without collapsing them into one category. This avoids importing
    narrower doctrinal definitions than the Greek itself states.
  doctrine_reference: Translation philosophy §§5–6
