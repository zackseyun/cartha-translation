id: 2CO.12.17
reference: 2 Corinthians 12:17
source:
  edition: SBLGNT
  text: μή τινα ὧν ἀπέσταλκα πρὸς ὑμᾶς, δι’ αὐτοῦ ἐπλεονέκτησα ὑμᾶς;
translation:
  text: Did I exploit you through any of those whom I sent to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take advantage of you' or 'defraud you.' The Greek verb carries the
      sense of gaining at another's expense.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή
  chosen: Did ... ?
  alternatives:
  - Surely I did not ... ?
  - I did not ... , did I?
  lexicon: BDAG
  rationale: Introduces a question expecting a negative answer. In idiomatic English,
    this is best conveyed by a rhetorical question beginning with 'Did I ... ?' rather
    than a wooden negative particle.
- source_word: τινα ὧν
  chosen: any of those whom
  alternatives:
  - anyone among those whom
  - someone from those whom
  lexicon: BDAG
  rationale: The construction refers to any person from the group Paul had sent. 'Any
    of those whom' preserves the partitive sense and fits natural English.
- source_word: ἀπέσταλκα
  chosen: I sent
  alternatives:
  - I have sent
  lexicon: BDAG
  rationale: The perfect can be rendered simply in English here because the focus
    is on the agents Paul dispatched to Corinth, not on the present result state.
    'I sent' is natural and sufficient in context.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - to your place
  - toward you
  lexicon: BDAG
  rationale: Standard directional sense in this context; 'to you' is the natural English
    equivalent.
- source_word: δι’ αὐτοῦ
  chosen: through any of those whom I sent to you
  alternatives:
  - through him
  - by means of him
  lexicon: BDAG
  rationale: Although αὐτοῦ is singular ('through him'), in English the sense is distributive
    with the preceding indefinite/group reference. Rendering the phrase with 'through
    any of those whom I sent to you' communicates the intended meaning clearly without
    awkward singular phrasing.
- source_word: ἐπλεονέκτησα
  chosen: exploit
  alternatives:
  - take advantage of
  - defraud
  - make gain from
  lexicon: BDAG
  rationale: The verb πλεονεκτέω in this context concerns taking unfair advantage
    for gain. 'Exploit' is concise, modern, and captures the financial/relational
    abuse Paul denies. 'Defraud' is possible but sounds more technical; 'take advantage
    of' is broader but less pointed.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object referring to the Corinthian believers collectively.
