id: 2CO.12.5
reference: 2 Corinthians 12:5
source:
  edition: SBLGNT
  text: ὑπὲρ τοῦ τοιούτου καυχήσομαι, ὑπὲρ δὲ ἐμαυτοῦ οὐ καυχήσομαι εἰ μὴ ἐν ταῖς
    ⸀ἀσθενείαις.
translation:
  text: On behalf of such a one I will boast, but on behalf of myself I will not boast,
    except in my weaknesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about such a one.' The Greek preposition can be rendered more generally,
      but the wording here preserves Paul's rhetorical distancing.
    reason: lexical_alternative
  - marker: b
    text: Or 'in weaknesses' or 'in infirmities.' Paul often uses 'weakness' for human
      frailty, suffering, or conditions that display God's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  chosen: on behalf of
  alternatives:
  - about
  - concerning
  - for
  lexicon: BDAG
  rationale: Here ὑπέρ with the genitive introduces the person with reference to whom
    the boasting is made. 'On behalf of' preserves the relational sense and fits Paul's
    rhetorical distancing better than the flatter 'about' or 'concerning.'
- source_word: τοῦ τοιούτου
  chosen: such a one
  alternatives:
  - such a man
  - this kind of person
  lexicon: BDAG
  rationale: The expression is intentionally indirect and somewhat distancing. 'Such
    a one' preserves the demonstrative-indefinite force without adding 'man,' which
    is not explicit in the Greek here.
- source_word: καυχήσομαι
  chosen: I will boast
  alternatives:
  - I will glory
  lexicon: BDAG
  rationale: '''Boast'' is the standard, clear English equivalent for καυχάομαι in
    Paul. ''Glory'' is more traditional but less transparent in modern English.'
- source_word: ἐμαυτοῦ
  chosen: myself
  alternatives:
  - my own person
  lexicon: BDAG
  rationale: The reflexive pronoun marks Paul himself as the contrastive object of
    reference. 'Myself' is the natural English rendering.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this construction εἰ μὴ functions idiomatically as an exception clause,
    not a condition. 'Except' best captures the sense.
- source_word: ἐν ταῖς ἀσθενείαις
  chosen: in my weaknesses
  alternatives:
  - in weaknesses
  - in my infirmities
  lexicon: BDAG
  rationale: ἀσθένεια in Paul commonly denotes weakness, including frailty and suffering.
    'Weaknesses' is the most natural modern rendering. The possessive 'my' is supplied
    in English because the contrast with 'myself' and Paul's idiom make the referent
    clearly his own weaknesses.
