theological_decisions:
- issue: Nature of Paul's permitted boasting
  chosen_reading: Paul contrasts boasting with reference to the extraordinary person/experience
    and boasting with reference to himself, allowing only boasting in weaknesses.
  alternative_readings:
  - Paul means he will boast about another person literally distinct from himself.
  - Paul means he will boast only in weakness as a theological principle without personal
    reference.
  rationale: The verse's rhetoric intentionally distances Paul from the revelatory
    experience while turning attention to weakness. The translation preserves that
    tension without resolving the broader autobiographical question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
