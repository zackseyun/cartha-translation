  from: —though it is not beneficial—but I will go on
  to: ; though it is not beneficial, I will go on
  rationale: 'The current rendering uses a ''though... but...'' construction, which
    is often considered redundant or stylistically awkward in English. The Greek ''μέν...δέ''
    particle combination sets up a contrast, which is better rendered by using either
    ''though'' or ''but'', not both in this sequence. Removing ''but'' and adjusting
    the punctuation creates a smoother, more grammatically standard sentence: ''Boasting
    is necessary; though it is not beneficial, I will go on...''. This preserves the
    logical relationship between the clauses more elegantly.'
