id: 2CO.12.1
reference: 2 Corinthians 12:1
source:
  edition: SBLGNT
  text: Καυχᾶσθαι ⸀δεῖ· οὐ ⸂συμφέρον μέν⸃, ἐλεύσομαι ⸀δὲ εἰς ὀπτασίας καὶ ἀποκαλύψεις
    κυρίου.
translation:
  text: Boasting is necessary, though it is not beneficial; but I will go on to visions
    and revelations of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Lord.' The Greek genitive may indicate source, but 'of the
      Lord' more closely preserves the wording and ambiguity of the Greek.
    reason: alternative_reading
  - marker: b
    text: Or '—though it is not beneficial—but I will go on'.
    reason: previous_rendering
lexical_decisions:
- source_word: Καυχᾶσθαι
  chosen: Boasting
  alternatives:
  - To boast
  - Boast
  lexicon: BDAG
  rationale: The present middle infinitive functions substantivally here. 'Boasting'
    preserves the verbal idea while fitting natural English syntax with δεῖ. It keeps
    Paul's reluctant self-referential theme without overparaphrasing.
- source_word: δεῖ
  chosen: is necessary
  alternatives:
  - must
  - is required
  lexicon: BDAG
  rationale: 'δεῖ expresses necessity. ''Is necessary'' is slightly more formal and
    fits the infinitival construction smoothly: ''Boasting is necessary.'' This preserves
    the force without making Paul sound more abrupt than the Greek requires.'
- source_word: οὐ συμφέρον μέν
  chosen: though it is not beneficial
  alternatives:
  - though it is not profitable
  - not indeed beneficial
  lexicon: BDAG
  rationale: συμφέρον conveys what is advantageous or beneficial. The particle μέν
    signals a concessive setup that is answered by δέ later; English 'though' captures
    this discourse function naturally. 'Beneficial' is clearer in modern English than
    'profitable' while preserving the sense.
- source_word: ἐλεύσομαι δὲ
  chosen: but I will go on
  alternatives:
  - but I will come
  - but I will proceed
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι with εἰς in this context is idiomatic for moving
    on to a new topic. 'Go on' communicates discourse progression better than a wooden
    'come,' while 'but' reflects the adversative δέ corresponding to the earlier μέν.
- source_word: εἰς ὀπτασίας
  chosen: to visions
  alternatives:
  - to apparitions
  - to visionary experiences
  lexicon: BDAG
  rationale: ὀπτασία denotes a vision or supernatural sight. 'Visions' is the standard,
    accessible rendering and fits the plural form.
- source_word: καὶ ἀποκαλύψεις
  chosen: and revelations
  alternatives:
  - and disclosures
  - and unveilings
  lexicon: BDAG
  rationale: ἀποκάλυψις here refers to revelatory disclosures from God. 'Revelations'
    is the most natural and established English equivalent in this context.
- source_word: κυρίου
  chosen: of the Lord
  alternatives:
  - from the Lord
  lexicon: BDAG
  rationale: 'The genitive most naturally modifies both nouns: ''visions and revelations
    of the Lord.'' English leaves the relation somewhat open, as Greek does; this
    preserves the ambiguity better than specifying ''from the Lord.'' ''Lord'' follows
    the project''s default rendering for κύριος.'
