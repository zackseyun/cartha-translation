- issue: Relation of κυρίου to 'visions and revelations'
  chosen_reading: of the Lord
  alternative_readings:
  - from the Lord
  rationale: The genitive can be understood as possessive/source-related, but the
    Greek does not force a more explicit interpretive expansion. Preserving 'of the
    Lord' maintains the text's theological restraint and avoids importing a stronger
    claim than the wording requires.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
