id: 2CO.12.12
reference: 2 Corinthians 12:12
source:
  edition: SBLGNT
  text: τὰ μὲν σημεῖα τοῦ ἀποστόλου κατειργάσθη ἐν ὑμῖν ἐν πάσῃ ⸀ὑπομονῇ, σημείοις
    ⸀τε καὶ τέρασιν καὶ δυνάμεσιν.
translation:
  text: Indeed, the signs of an apostle were accomplished among you with all perseverance,
    by signs and wonders and powers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the signs of the apostle,' if taken as referring specifically to Paul
      rather than to apostolic marks in general.
    reason: alternative_reading
  - marker: b
    text: '''Powers'' can also be rendered ''miracles'' or ''mighty works''; the Greek
      term emphasizes acts of power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ μὲν σημεῖα
  chosen: Indeed, the signs
  alternatives:
  - The signs indeed
  - The signs, to be sure
  lexicon: BDAG
  rationale: μέν gives an affirming or concessive emphasis here without an expressed
    δέ counterpart in the verse. 'Indeed' captures the emphasis in natural English
    while keeping σημεῖα as 'signs.'
- source_word: τοῦ ἀποστόλου
  chosen: of an apostle
  alternatives:
  - of the apostle
  lexicon: BDAG
  rationale: 'The genitive is most naturally qualitative or generic: the marks/signs
    that characterize an apostle, not necessarily ''the apostle'' as a title for Paul
    alone. ''Of an apostle'' best conveys that sense in English.'
- source_word: κατειργάσθη
  chosen: were accomplished
  alternatives:
  - were worked
  - were produced
  - were carried out
  lexicon: BDAG
  rationale: The aorist passive indicates that these signs were effected or brought
    about. 'Were accomplished' is idiomatic and preserves the passive/resultative
    sense without over-specifying agency.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - in you
  lexicon: BDAG
  rationale: In context Paul refers to apostolic activity occurring in the Corinthians'
    presence/community. 'Among you' best fits the communal sense rather than an inward
    sense ('in you').
- source_word: ἐν πάσῃ ὑπομονῇ
  chosen: with all perseverance
  alternatives:
  - with all endurance
  - in all patience
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under difficulty. 'Perseverance'
    is clear modern English and fits Paul's emphasis on sustained apostolic ministry.
    The preposition is rendered instrumentally/circumstantially as 'with.'
- source_word: σημείοις τε καὶ τέρασιν καὶ δυνάμεσιν
  chosen: by signs and wonders and powers
  alternatives:
  - with signs and wonders and miracles
  - by signs and wonders and mighty works
  lexicon: BDAG
  rationale: This triad is a conventional expression for miraculous attestations.
    σημεῖα remains 'signs'; τέρατα is 'wonders'; δυνάμεις is rendered 'powers' to
    preserve the lexical distinction rather than collapsing it into 'miracles,' though
    the miraculous sense is implicit.
