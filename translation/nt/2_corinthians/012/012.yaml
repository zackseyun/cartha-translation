theological_decisions:
- issue: Meaning of 'the signs of an apostle'
  chosen_reading: The phrase refers to evidences or marks that authenticate apostolic
    ministry, especially as manifested in endurance and miraculous works.
  alternative_readings:
  - The phrase refers narrowly to miracles alone as the defining signs of apostleship
  rationale: The syntax presents 'the signs of an apostle' as the main claim, then
    elaborates both perseverance and miraculous phenomena. The translation preserves
    this broader sense without making a doctrinal claim about a fixed list of apostolic
    credentials beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
