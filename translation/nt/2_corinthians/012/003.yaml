theological_decisions:
- issue: Paul's indirect self-reference and the nature of the experience
  chosen_reading: Retain the third-person expression 'such a man' without making explicit
    that Paul refers to himself or defining the experience as bodily or disembodied.
  alternative_readings:
  - such a person
  - explicitly identifying the man as Paul in translation
  - rendering the phrase to imply an out-of-body experience
  rationale: The Greek preserves rhetorical distance and leaves unresolved whether
    the experience occurred bodily or apart from the body. In keeping with the translation
    philosophy, the English should preserve that tension rather than resolve it interpretively.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
