id: 2CO.12.3
reference: 2 Corinthians 12:3
source:
  edition: SBLGNT
  text: καὶ οἶδα τὸν τοιοῦτον ἄνθρωπον— εἴτε ἐν σώματι εἴτε ⸀χωρὶς τοῦ σώματος οὐκ
    οἶδα, ὁ θεὸς οἶδεν—
translation:
  text: And I know such a man—whether in the body or apart from the body I do not
    know; God knows—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the body' for 'apart from the body.' Paul does not say whether
      the experience was bodily or not.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware of
  lexicon: BDAG
  rationale: Standard rendering of οἶδα as cognitive knowledge. Repeated in the verse
    for rhetorical emphasis, preserved consistently as 'know/knows'.
- source_word: τὸν τοιοῦτον ἄνθρωπον
  chosen: such a man
  alternatives:
  - this kind of man
  - such a person
  lexicon: BDAG
  rationale: τοιοῦτον with ἄνθρωπον points to a particular person characterized in
    the preceding context. 'Such a man' preserves the masculine singular form and
    Paul's somewhat indirect self-reference better than the more generic 'such a person.'
- source_word: εἴτε ... εἴτε
  chosen: whether ... or
  alternatives:
  - either ... or
  lexicon: BDAG
  rationale: This pair introduces two alternative possibilities. 'Whether ... or'
    is the most natural English equivalent in this construction.
- source_word: ἐν σώματι
  chosen: in the body
  alternatives:
  - in a body
  - bodily
  lexicon: BDAG
  rationale: The prepositional phrase is rendered formally and idiomatically. The
    article is absent in Greek, but English idiom in this contrast naturally uses
    'the body,' especially paired with 'apart from the body.'
- source_word: χωρὶς τοῦ σώματος
  chosen: apart from the body
  alternatives:
  - outside the body
  - without the body
  lexicon: BDAG
  rationale: χωρίς here denotes separation. 'Apart from the body' is idiomatic and
    preserves the conceptual contrast with 'in the body' without over-specifying a
    metaphysical state.
- source_word: οὐκ οἶδα, ὁ θεὸς οἶδεν
  chosen: I do not know; God knows
  alternatives:
  - I do not know, God knows
  lexicon: BDAG
  rationale: The clause is preserved with explicit contrast between Paul's ignorance
    and God's knowledge. A semicolon in English reflects the pause and emphasis of
    the Greek better than a comma.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Unambiguous reference to God; standard English rendering.
