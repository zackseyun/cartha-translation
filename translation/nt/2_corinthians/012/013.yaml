theological_decisions:
- issue: Paul's ironic self-defense regarding financial support
  chosen_reading: Render the statement straightforwardly while preserving the irony
    through 'Forgive me this wrong' rather than making the sarcasm explicit in paraphrase.
  alternative_readings:
  - Expand the irony in the main text, e.g., 'Please forgive me for this terrible
    wrong'
  rationale: The Greek itself conveys irony through context and lexical choice; the
    translation should not over-paraphrase by inserting interpretive markers such
    as 'sarcasm' or exaggerated wording not present in the text. The chosen rendering
    lets readers perceive Paul's rhetorical rebuke from the wording itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
