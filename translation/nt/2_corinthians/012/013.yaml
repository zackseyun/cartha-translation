id: 2CO.12.13
reference: 2 Corinthians 12:13
source:
  edition: SBLGNT
  text: τί γάρ ἐστιν ὃ ⸀ἡσσώθητε ὑπὲρ τὰς λοιπὰς ἐκκλησίας, εἰ μὴ ὅτι αὐτὸς ἐγὼ οὐ
    κατενάρκησα ὑμῶν; χαρίσασθέ μοι τὴν ἀδικίαν ταύτην.
translation:
  text: For in what were you treated as inferior to the rest of the churches, except
    that I myself did not become a burden to you? Forgive me this wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were made inferior to the other churches.' The Greek verb can mean
      to be put at a disadvantage or treated as lesser.
    reason: lexical_alternative
  - marker: b
    text: That is, Paul did not financially burden them by accepting support from
      them.
    reason: cultural_note
  - marker: c
    text: 'Paul speaks ironically: the supposed ''wrong'' was his refusal to be a
      burden to them.'
    reason: cross_reference
lexical_decisions:
- source_word: ἡσσώθητε
  chosen: were treated as inferior
  alternatives:
  - were made inferior
  - were disadvantaged
  - were lessened
  lexicon: BDAG
  rationale: The passive of ἡττάομαι here refers to being at a disadvantage or in
    an inferior position relative to others. 'Were treated as inferior' communicates
    the comparative force with ὑπέρ plus the ironic tone of Paul's question better
    than a bare 'were inferior,' which could imply intrinsic inferiority rather than
    comparative treatment.
- source_word: ὑπὲρ τὰς λοιπὰς ἐκκλησίας
  chosen: to the rest of the churches
  alternatives:
  - than the other churches
  - beyond the other churches
  lexicon: BDAG
  rationale: With a comparative sense after the passive verb, ὑπέρ marks comparison.
    'To the rest of the churches' fits idiomatic English after 'treated as inferior'
    and preserves the comparison with Paul's other congregations.
- source_word: λοιπὰς ἐκκλησίας
  chosen: the rest of the churches
  alternatives:
  - the other churches
  lexicon: BDAG
  rationale: λοιπός commonly means 'remaining' or 'other.' 'The rest of the churches'
    is natural and slightly more precise in context, implying comparison with Paul's
    other assemblies.
- source_word: αὐτὸς ἐγὼ
  chosen: I myself
  alternatives:
  - I personally
  - I
  lexicon: BDAG
  rationale: The emphatic pronoun plus explicit subject heightens Paul's irony and
    personal emphasis. 'I myself' preserves that emphasis without sounding awkward.
- source_word: οὐ κατενάρκησα ὑμῶν
  chosen: did not become a burden to you
  alternatives:
  - did not weigh you down
  - did not take advantage of you financially
  - did not sponge off you
  lexicon: BDAG
  rationale: καταναρκάω in 2 Corinthians refers to imposing oneself financially or
    materially on others. 'Did not become a burden to you' is the established and
    contextually accurate sense, especially in light of Paul's refusal of Corinthian
    support.
- source_word: χαρίσασθέ μοι
  chosen: Forgive me
  alternatives:
  - Grant me
  - Pardon me
  lexicon: BDAG
  rationale: 'χαρίζομαι can mean ''give graciously'' or ''forgive.'' In this ironic
    closing imperative, ''Forgive me'' best captures the rhetorical sting: Paul mock-apologizes
    for not burdening them.'
- source_word: τὴν ἀδικίαν ταύτην
  chosen: this wrong
  alternatives:
  - this injustice
  - this offense
  lexicon: BDAG
  rationale: ἀδικία often means 'wrong' or 'injustice.' Here the singular with demonstrative
    points to the supposed offense just mentioned. 'This wrong' is concise, idiomatic,
    and preserves the irony without overstating a formal injustice.
- source_word: τί γάρ ἐστιν ὃ
  chosen: For in what
  alternatives:
  - For what is it in which
  - For what
  lexicon: BDAG
  rationale: This idiom introduces a rhetorical question asking in what respect the
    Corinthians were disadvantaged. 'For in what' is natural English and preserves
    the argumentative connection signaled by γάρ.
