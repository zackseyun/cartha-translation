theological_decisions:
- issue: Rendering ψυχαί in a pastoral Pauline context
  chosen_reading: your souls
  alternative_readings:
  - your lives
  - you yourselves
  rationale: The verse does not present a contested doctrinal crux, but ψυχή can be
    flattened if rendered merely 'you.' 'Your souls' preserves Paul's language of
    profound personal and spiritual concern without importing a technical anthropology
    beyond the text.
  doctrine_reference: Translation philosophy §1, §5
