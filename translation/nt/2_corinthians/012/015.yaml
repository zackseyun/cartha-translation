id: 2CO.12.15
reference: 2 Corinthians 12:15
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἥδιστα δαπανήσω καὶ ἐκδαπανηθήσομαι ὑπὲρ τῶν ψυχῶν ὑμῶν. ⸀εἰ περισσοτέρως
    ὑμᾶς ⸀ἀγαπῶν, ἧσσον ἀγαπῶμαι;
translation:
  text: But I will most gladly spend and be spent for your souls. If I love you more
    abundantly, am I loved less?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your lives" or "you yourselves" for "your souls."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδιστα
  chosen: most gladly
  alternatives:
  - very gladly
  - most willingly
  lexicon: BDAG
  rationale: Superlative adverb expressing Paul's eager willingness, not mere bare
    consent. 'Most gladly' preserves both intensity and warmth in natural English.
- source_word: δαπανήσω
  chosen: I will spend
  alternatives:
  - I will gladly spend
  - I will expend
  lexicon: BDAG
  rationale: Future active of δαπανάω, literally to spend resources. 'Spend' keeps
    the financial/expenditure metaphor that fits the paired verb ἐκδαπανηθήσομαι.
- source_word: ἐκδαπανηθήσομαι
  chosen: be spent
  alternatives:
  - be utterly spent
  - be expended
  lexicon: BDAG
  rationale: 'Passive/future form intensifies the prior verb: not only spending what
    he has, but being spent himself. ''Be spent'' is idiomatic and preserves the metaphor
    without over-paraphrase.'
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: In this context ὑπέρ marks benefit/advantage. 'For' is concise and natural,
    while still conveying sacrificial purpose.
- source_word: τῶν ψυχῶν ὑμῶν
  chosen: your souls
  alternatives:
  - your lives
  - you
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self depending on context. Here Paul speaks
    of deep pastoral self-giving for their inner lives/persons. 'Your souls' preserves
    the lexical form and spiritual weight without reducing it to a mere pronoun.
- source_word: εἰ
  chosen: If
  alternatives:
  - If indeed
  - Since
  lexicon: BDAG
  rationale: Introduces a rhetorical conditional. 'If' preserves the Greek form and
    leaves the rhetorical force to the following question rather than resolving it
    interpretively.
- source_word: περισσοτέρως
  chosen: more abundantly
  alternatives:
  - more
  - all the more
  lexicon: BDAG
  rationale: Comparative adverb meaning more exceedingly/abundantly. 'More abundantly'
    reflects the heightened degree better than a flat 'more,' while remaining readable.
- source_word: ἀγαπῶν
  chosen: I love
  alternatives:
  - loving
  lexicon: BDAG
  rationale: 'Although formally a participle, English idiom in this rhetorical question
    is best rendered with a finite verb: ''If I love you more abundantly...'' This
    preserves sense and flow.'
- source_word: ἧσσον
  chosen: less
  alternatives:
  - to a lesser degree
  lexicon: BDAG
  rationale: Straight comparative adverb/adjectival form used adverbially in contrast
    with περισσοτέρως. 'Less' is the natural concise equivalent.
- source_word: ἀγαπῶμαι
  chosen: am I loved
  alternatives:
  - am I being loved
  lexicon: BDAG
  rationale: Present passive. English simple present passive best conveys the general
    ongoing state in this rhetorical complaint.
