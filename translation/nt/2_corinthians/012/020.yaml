id: 2CO.12.20
reference: 2 Corinthians 12:20
source:
  edition: SBLGNT
  text: φοβοῦμαι γὰρ μή πως ἐλθὼν οὐχ οἵους θέλω εὕρω ὑμᾶς, κἀγὼ εὑρεθῶ ὑμῖν οἷον
    οὐ θέλετε, μή πως ⸀ἔρις, ⸀ζῆλος, θυμοί, ἐριθεῖαι, καταλαλιαί, ψιθυρισμοί, φυσιώσεις,
    ἀκαταστασίαι·
translation:
  text: For I fear that perhaps when I come I may find you not as I wish, and I may
    be found by you to be as you do not wish—that perhaps there may be strife, jealousy,
    outbursts of anger, selfish ambition, slanders, whisperings, conceit, and disorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gossip' for 'whisperings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβοῦμαι
  chosen: I fear
  alternatives:
  - I am afraid
  lexicon: BDAG
  rationale: Present middle indicative expresses Paul's ongoing concern; 'I fear'
    is direct and natural without softening the force.
- source_word: μή πως
  chosen: that perhaps
  alternatives:
  - lest somehow
  - perhaps
  lexicon: BDAG
  rationale: Used twice to introduce Paul's apprehension. 'That perhaps' preserves
    the sense of feared possibility in readable English; the second instance is echoed
    with 'that perhaps there may be'.
- source_word: ἐλθὼν
  chosen: when I come
  alternatives:
  - on coming
  - if I come
  lexicon: BDAG
  rationale: Aorist participle is temporal in context. 'When I come' is idiomatic
    and fits the sequence of feared events.
- source_word: οὐχ οἵους θέλω
  chosen: not as I wish
  alternatives:
  - not such as I want
  - not what I desire
  lexicon: BDAG
  rationale: The relative adjective construction refers to the Corinthians' condition/character
    as Paul hopes to find them. 'As I wish' is concise and natural.
- source_word: εὕρω ὑμᾶς
  chosen: I may find you
  alternatives:
  - I find you
  lexicon: BDAG
  rationale: Aorist subjunctive after μή πως conveys potential result of the feared
    scenario; 'may find' reflects that contingency.
- source_word: κἀγὼ εὑρεθῶ ὑμῖν
  chosen: and I may be found by you
  alternatives:
  - and I may appear to you
  - and you may find me
  lexicon: BDAG
  rationale: Passive of εὑρίσκω here means 'be found/turn out' in their estimation.
    'Be found by you' preserves the reciprocal structure with the previous clause.
- source_word: οἷον οὐ θέλετε
  chosen: to be as you do not wish
  alternatives:
  - such as you do not want
  - what you do not wish
  lexicon: BDAG
  rationale: 'Completes the reciprocal concern: they may not want the severe Paul
    they encounter. ''As you do not wish'' mirrors the prior clause.'
- source_word: ἔρις
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: BDAG
  rationale: Denotes discord or contention within the community. 'Strife' is concise
    and suitably broad.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this vice-list context the negative sense is intended, not positive
    zeal. 'Jealousy' best fits the relational sins listed.
- source_word: θυμοί
  chosen: outbursts of anger
  alternatives:
  - fits of rage
  - wraths
  lexicon: BDAG
  rationale: Plural noun points to repeated eruptions of anger rather than a settled
    disposition. 'Outbursts of anger' communicates that nuance clearly.
- source_word: ἐριθεῖαι
  chosen: selfish ambition
  alternatives:
  - rivalries
  - self-seeking
  lexicon: BDAG
  rationale: Common Pauline vice term for partisan self-advancement. 'Selfish ambition'
    is established and accurate.
- source_word: καταλαλιαί
  chosen: slanders
  alternatives:
  - backbitings
  - evil speakings
  lexicon: BDAG
  rationale: Refers to speech that maligns others. 'Slanders' is contemporary and
    forceful.
- source_word: ψιθυρισμοί
  chosen: whisperings
  alternatives:
  - gossip
  - secret talk
  lexicon: BDAG
  rationale: Literally whisperings; likely covert disparaging talk. Main text keeps
    the vivid metaphor, with 'gossip' preserved as an alternative.
- source_word: φυσιώσεις
  chosen: conceit
  alternatives:
  - arrogance
  - puffing up
  lexicon: BDAG
  rationale: From the idea of being puffed up; denotes inflated self-importance. 'Conceit'
    is readable and captures the vice without awkward literalism.
- source_word: ἀκαταστασίαι
  chosen: disorder
  alternatives:
  - disturbances
  - tumults
  lexicon: BDAG
  rationale: Refers to instability, unrest, or disorder in communal life. 'Disorder'
    is broad and fits the list's climax.
