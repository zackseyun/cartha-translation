theological_decisions:
- issue: Tone of Paul's feared encounter
  chosen_reading: Paul fears mutual displeasure and the presence of communal vices,
    without specifying a doctrinal cause beyond the text.
  alternative_readings:
  - Paul primarily fears having to exercise apostolic severity
  - Paul mainly fears discovering false teachers' influence
  rationale: The verse itself states reciprocal disappointment and lists social sins.
    Broader contextual inferences are possible from the chapter, but the translation
    should not import them into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
