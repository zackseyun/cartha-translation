theological_decisions:
- issue: Nature of Paul's affliction ('thorn in the flesh')
  chosen_reading: Retain the metaphor without specifying whether it is physical illness, persecution, demonic harassment, or another affliction.
  alternative_readings:
  - physical ailment
  - opponents/persecution
  - demonic oppression
  rationale: The Greek text does not define the thorn's exact identity. The translation preserves the metaphor and avoids importing a doctrinally or interpretively narrow explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Agency behind 'was given to me'
  chosen_reading: Use the passive 'was given to me' without naming God as the giver in the main text.
  alternative_readings:
  - God gave it to me
  - it was allowed
  rationale: The passive may imply divine permission, but the text does not explicitly state the agent here. Leaving the passive intact preserves the tension between divine sovereignty and satanic instrumentality.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἄγγελος Σατανᾶ
  chosen_reading: Render as 'a messenger of Satan' rather than specifying 'angel' or a human emissary.
  alternative_readings:
  - an angel of Satan
  - a satanic emissary
  rationale: The term ἄγγελος is semantically broad. The translation keeps the ambiguity rather than deciding the ontological identity of the agent.
  doctrine_reference: Preserve theological tension rather than resolve it.
