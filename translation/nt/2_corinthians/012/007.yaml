  from: And because of the surpassing greatness of the revelations, so that I might not exalt myself, a thorn in the flesh was given to me
  to: And because of the surpassing greatness of the revelations—so that I might not exalt myself—a thorn in the flesh was given to me
  rationale: The current rendering follows the Greek word order so closely that it creates an awkward and unidiomatic English construction ('Because of A, so that B, C happened'). Inserting the purpose clause ('so that I might not exalt myself') between the causal phrase and the main clause makes the sentence difficult to parse. Using em-dashes to set off the purpose clause as a parenthetical remark preserves the original's fronted emphasis while clarifying the sentence's grammatical structure for the English reader.
