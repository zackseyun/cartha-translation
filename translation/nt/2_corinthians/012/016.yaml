theological_decisions:
- issue: Whether Paul's words after ἀλλὰ are his own admission or an ironic restatement
    of an accusation against him
  chosen_reading: 'Render the clause straightforwardly while preserving the accusatory/ironic
    force in wording and notes: ''Yet, being crafty, I took you by deceit.'''
  alternative_readings:
  - Yet, as a crafty man, I caught you by trickery
  - But, since I was crafty, I took advantage of you by deceit
  rationale: The broader context shows Paul denying exploitation and then echoing
    a possible charge from opponents. The translation should not flatten the rhetoric
    into a literal confession, but neither should it paraphrase the irony into the
    main text. A relatively literal rendering preserves the tension and lets context
    interpret it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
