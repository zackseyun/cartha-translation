id: 2CO.12.16
reference: 2 Corinthians 12:16
source:
  edition: SBLGNT
  text: ἔστω δέ, ἐγὼ οὐ κατεβάρησα ὑμᾶς· ἀλλὰ ὑπάρχων πανοῦργος δόλῳ ὑμᾶς ἔλαβον.
translation:
  text: 'But let it be so: I did not burden you. Yet, being crafty, I took you by
    deceit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Granted then' or 'Be that as it may'; Paul appears to concede the point
      for the sake of argument.
    reason: lexical_alternative
  - marker: b
    text: The clause 'being crafty, I took you by deceit' is likely Paul’s ironic
      restatement of an accusation against him, not an actual admission.
    reason: alternative_reading
  - marker: c
    text: Or 'I caught you by trickery' or 'I took advantage of you by deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστω δέ
  chosen: But let it be so
  alternatives:
  - Granted then
  - Be that as it may
  - But suppose it is so
  lexicon: BDAG
  rationale: 'Idiomatic concessive transition. The imperative ἔστω here functions
    rhetorically: Paul grants, for the sake of argument, the preceding point. ''But
    let it be so'' preserves the concessive force without over-paraphrasing.'
- source_word: κατεβάρησα
  chosen: burden
  alternatives:
  - weigh down
  - be a financial burden to
  - encumber
  lexicon: BDAG
  rationale: In 2 Corinthians this verb refers to imposing oneself materially or financially
    on the Corinthians. 'Burden' is the established and contextually precise English
    equivalent, broad enough to preserve the metaphor while fitting the immediate
    context.
- source_word: ὑπάρχων
  chosen: being
  alternatives:
  - since I was
  - although I was
  lexicon: BDAG
  rationale: The participle is rendered simply as 'being' to preserve the Greek participial
    structure and leave the exact nuance of circumstance to the reader rather than
    over-specifying it.
- source_word: πανοῦργος
  chosen: crafty
  alternatives:
  - cunning
  - shrewd
  - scheming
  lexicon: BDAG
  rationale: The term carries a negative sense of unscrupulous cleverness in this
    context. 'Crafty' is natural modern English and matches the accusatory tone Paul
    is echoing.
- source_word: δόλῳ
  chosen: by deceit
  alternatives:
  - with trickery
  - by guile
  - with deceit
  lexicon: BDAG
  rationale: 'The dative is instrumental: Paul is voicing the charge that he somehow
    exploited them deceptively. ''By deceit'' is concise and idiomatic.'
- source_word: ἔλαβον
  chosen: I took you
  alternatives:
  - I caught you
  - I took advantage of you
  - I trapped you
  lexicon: BDAG
  rationale: λαμβάνω literally means 'take/receive,' but here likely carries the sense
    of seizing or catching someone by a stratagem. 'I took you' stays closer to the
    Greek while allowing the following phrase 'by deceit' to clarify the hostile accusation.
    The more interpretive 'took advantage of you' is preserved as an alternative.
