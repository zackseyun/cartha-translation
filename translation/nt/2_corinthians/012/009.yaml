theological_decisions:
- issue: Rendering τελεῖται with respect to divine power
  chosen_reading: for power is brought to completion in weakness
  alternative_readings:
  - for power is made perfect in weakness
  - for my power is made perfect in weakness
  rationale: The Greek text as given lacks an explicit possessive before δύναμις,
    so the translation does not add 'my' in the main text. 'Brought to completion'
    preserves the sense of τελεῖται without suggesting any deficiency in God's power.
    The traditional rendering 'made perfect' is preserved in a footnote because it
    is well known and lexically defensible.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project's contested-terms guidance prefers 'Messiah' where Χριστός
    functions as a title. Nothing in this verse requires the more name-like 'Christ.'
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
