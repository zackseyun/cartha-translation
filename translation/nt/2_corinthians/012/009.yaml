id: 2CO.12.9
reference: 2 Corinthians 12:9
source:
  edition: SBLGNT
  text: καὶ εἴρηκέν μοι· Ἀρκεῖ σοι ἡ χάρις μου· ἡ γὰρ ⸀δύναμις ἐν ἀσθενείᾳ ⸀τελεῖται.
    ἥδιστα οὖν μᾶλλον καυχήσομαι ἐν ταῖς ἀσθενείαις ⸀μου, ἵνα ἐπισκηνώσῃ ἐπ’ ἐμὲ ἡ
    δύναμις τοῦ Χριστοῦ.
translation:
  text: And he has said to me, “My grace is sufficient for you, for power is brought
    to completion in weakness.” Therefore I will most gladly boast all the more in
    my weaknesses, so that the power of the Messiah may dwell upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for power is made perfect in weakness.”
    reason: lexical_alternative
  - marker: b
    text: Or, “so that the power of the Messiah may rest upon me”; more literally,
      “may tabernacle over me.”
    reason: lexical_alternative
  - marker: c
    text: Traditional English often reads “Christ” instead of “Messiah.”
    reason: alternative_reading
lexical_decisions:
- source_word: εἴρηκέν
  chosen: has said
  alternatives:
  - said
  lexicon: BDAG
  rationale: Perfect tense indicates a past utterance with abiding relevance; 'has
    said' preserves that force better than simple past.
- source_word: Ἀρκεῖ
  chosen: is sufficient
  alternatives:
  - is enough
  - suffices
  lexicon: BDAG
  rationale: '''Is sufficient'' is natural modern English and preserves the sense
    of adequacy without sounding colloquial.'
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: In Pauline usage this term carries rich theological weight beyond mere
    favor; 'grace' is the standard and most fitting rendering here.
- source_word: δύναμις
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: BDAG
  rationale: '''Power'' best matches the repeated noun in this verse and preserves
    the thematic link between divine enabling and Christ''s power.'
- source_word: ἀσθενείᾳ / ἀσθενείαις
  chosen: weakness / weaknesses
  alternatives:
  - frailty / frailties
  - powerlessness / powerlessnesses
  lexicon: BDAG
  rationale: The singular in the divine statement is rendered generically as 'weakness,'
    while the plural in Paul's response is kept as 'weaknesses.' This preserves the
    lexical repetition and the shift from principle to Paul's concrete experiences.
- source_word: τελεῖται
  chosen: is brought to completion
  alternatives:
  - is perfected
  - is made perfect
  - reaches its goal
  lexicon: BDAG
  rationale: The passive verb from τελέω conveys being brought to its intended completion
    or full expression. 'Is brought to completion' avoids implying prior moral defect
    in God's power while preserving the teleological sense. The traditional 'is made
    perfect' is preserved in a footnote.
- source_word: ἥδιστα
  chosen: most gladly
  alternatives:
  - very gladly
  - with greatest pleasure
  lexicon: BDAG
  rationale: This adverb intensifies Paul's willingness; 'most gladly' is concise
    and idiomatic.
- source_word: μᾶλλον
  chosen: all the more
  alternatives:
  - rather
  - more
  lexicon: BDAG
  rationale: This captures the comparative intensification in relation to boasting
    in weaknesses.
- source_word: καυχήσομαι
  chosen: will boast
  alternatives:
  - will take pride
  - will glory
  lexicon: BDAG
  rationale: '''Boast'' is the standard Pauline rendering and preserves the rhetorical
    paradox of boasting in weakness.'
- source_word: ἐπισκηνώσῃ ἐπ’ ἐμέ
  chosen: may dwell upon me
  alternatives:
  - may rest upon me
  - may tabernacle over me
  lexicon: BDAG
  rationale: The verb literally evokes pitching a tent over or dwelling upon. 'May
    dwell upon me' preserves the indwelling/overshadowing imagery in readable English.
    'Rest upon me' is a common alternative; the more literal 'tabernacle over me'
    is too opaque for the main text but worth noting.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a name-like form. Here 'the power of the Messiah' preserves
    the titular sense.
