id: 2CO.12.18
reference: 2 Corinthians 12:18
source:
  edition: SBLGNT
  text: παρεκάλεσα Τίτον καὶ συναπέστειλα τὸν ἀδελφόν· μήτι ἐπλεονέκτησεν ὑμᾶς Τίτος;
    οὐ τῷ αὐτῷ πνεύματι περιεπατήσαμεν; οὐ τοῖς αὐτοῖς ἴχνεσιν;
translation:
  text: I urged Titus to go and sent the brother with him. Titus did not take advantage
    of you, did he? Did we not walk in the same spirit? Did we not walk in the same
    footsteps?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by the same Spirit,' possibly referring to the Holy Spirit rather than
      simply the same attitude or disposition.
    reason: alternative_reading
lexical_decisions:
- source_word: παρεκάλεσα
  chosen: I urged Titus to go
  alternatives:
  - I appealed to Titus
  - I exhorted Titus
  lexicon: BDAG
  rationale: παρακαλέω here refers to Paul's request/appeal to Titus in a practical
    mission context. 'Urged' is natural modern English and preserves the force of
    an earnest request. 'To go' is supplied idiomatically in English from the context
    of sending Titus.
- source_word: συναπέστειλα
  chosen: sent ... with him
  alternatives:
  - sent along
  - sent together with
  lexicon: BDAG
  rationale: The compound verb indicates sending someone along with Titus. English
    requires an explicit relational phrase; 'sent the brother with him' captures the
    sense clearly.
- source_word: τὸν ἀδελφόν
  chosen: the brother
  alternatives:
  - our brother
  - the fellow believer
  lexicon: BDAG
  rationale: The Greek has the definite article with ἀδελφός and no possessive. 'The
    brother' preserves the text as written, likely referring to a known Christian
    brother without overtranslating.
- source_word: μήτι
  chosen: did he?
  alternatives:
  - surely not
  - can it be that
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. In idiomatic
    English, the expectation is best conveyed by the tag 'did he?' after a negative
    statement.
- source_word: ἐπλεονέκτησεν ὑμᾶς
  chosen: take advantage of you
  alternatives:
  - exploit you
  - defraud you
  lexicon: BDAG
  rationale: πλεονεκτέω in this context concerns gaining at another's expense, especially
    financially or materially. 'Take advantage of you' is broad enough to fit the
    context and readable modern English; 'defraud' is possible but narrower and more
    formal.
- source_word: τῷ αὐτῷ πνεύματι
  chosen: in the same spirit
  alternatives:
  - by the same Spirit
  - with the same spirit
  lexicon: BDAG
  rationale: The dative may be understood as sphere or manner. Lowercase 'spirit'
    is chosen because the phrase most naturally refers to shared attitude/disposition
    in context, though an allusion to the Holy Spirit may be heard. The ambiguity
    is preserved better by 'in the same spirit' than by the more interpretive 'by
    the same Spirit'.
- source_word: περιεπατήσαμεν
  chosen: walk
  alternatives:
  - conduct ourselves
  - live
  lexicon: BDAG
  rationale: Paul's metaphor of 'walking' is common and understandable in English.
    Retaining it preserves the metaphorical texture of the Greek while remaining readable.
- source_word: τοῖς αὐτοῖς ἴχνεσιν
  chosen: in the same footsteps
  alternatives:
  - by the same steps
  - in the same tracks
  lexicon: BDAG
  rationale: ἴχνος literally means footprint/track and metaphorically denotes pattern
    of conduct. 'In the same footsteps' is idiomatic English and preserves the metaphor.
