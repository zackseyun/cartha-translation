id: 2CO.12.6
reference: 2 Corinthians 12:6
source:
  edition: SBLGNT
  text: ἐὰν γὰρ θελήσω καυχήσασθαι, οὐκ ἔσομαι ἄφρων, ἀλήθειαν γὰρ ἐρῶ· φείδομαι δέ,
    μή τις εἰς ἐμὲ λογίσηται ὑπὲρ ὃ βλέπει με ἢ ἀκούει ⸀τι ἐξ ἐμοῦ,
translation:
  text: For if I should want to boast, I would not be foolish, for I would be speaking
    the truth. But I refrain, so that no one may reckon me above what he sees in me
    or hears from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hears anything from me.' The Greek explicitly includes an indefinite
      element after 'hears,' which may be left implicit in idiomatic English.
    reason: lexical_alternative
lexical_decisions:
- source_word: θελήσω
  chosen: should want
  alternatives:
  - want
  - choose
  - decide
  lexicon: BDAG
  rationale: Aorist subjunctive with ἐὰν expresses a hypothetical future contingency.
    'Should want' captures the conditional nuance more naturally in English than a
    bare 'want'.
- source_word: καυχήσασθαι
  chosen: to boast
  alternatives:
  - to glory
  lexicon: BDAG
  rationale: In Paul, καυχάομαι often carries the sense of boasting, sometimes with
    irony. 'Boast' is the clearest modern English equivalent here and fits the immediate
    context of reluctant self-commendation.
- source_word: ἄφρων
  chosen: foolish
  alternatives:
  - a fool
  - senseless
  lexicon: BDAG
  rationale: Predicate adjective after ἔσομαι. 'Foolish' reads smoothly in English
    while preserving the contrast with Paul's earlier ironic 'fool' language in the
    chapter. 'A fool' is possible but less natural with 'I would not be' in this clause.
- source_word: ἀλήθειαν ... ἐρῶ
  chosen: I would be speaking the truth
  alternatives:
  - I will speak the truth
  - I would tell the truth
  lexicon: BDAG
  rationale: Future ἐρῶ is within the conditional construction and is best represented
    idiomatically in English as 'would be speaking the truth.' This preserves both
    futurity relative to the condition and the force of truthful speech.
- source_word: φείδομαι
  chosen: I refrain
  alternatives:
  - I spare myself
  - I hold back
  lexicon: BDAG
  rationale: Here the middle verb means Paul is holding back from boasting further.
    'I refrain' is concise and idiomatic, matching the self-restraint in context.
- source_word: λογίσηται
  chosen: may reckon
  alternatives:
  - may think
  - may consider
  - may count
  lexicon: BDAG
  rationale: λογίζομαι often means to reckon, consider, or credit. 'Reckon' preserves
    the evaluative sense without flattening it to mere opinion, though 'think' is
    a viable simpler alternative.
- source_word: ὑπὲρ ὃ
  chosen: above what
  alternatives:
  - beyond what
  - more than what
  lexicon: BDAG
  rationale: ὑπέρ here marks exceeding a standard. 'Above what' closely reflects the
    Greek while remaining natural in English.
- source_word: βλέπει με
  chosen: he sees in me
  alternatives:
  - he sees me do
  - he sees of me
  lexicon: BDAG
  rationale: The added 'in' makes explicit the sense of evaluating Paul on the basis
    of what is observable in him, which fits the comparison with 'hears from me.'
- source_word: ἀκούει τι ἐξ ἐμοῦ
  chosen: hears from me
  alternatives:
  - hears anything from me
  - hears of me
  lexicon: BDAG
  rationale: The τις/τι enclitic after ἀκούει is textually and syntactically awkward
    in English if rendered woodenly. 'Hears from me' captures the sense of what proceeds
    from Paul in speech; the indefinite object is implicit in idiomatic English. An
    alternative preserving the explicit indefinite is worth noting in a footnote.
