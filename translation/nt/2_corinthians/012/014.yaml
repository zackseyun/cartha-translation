theological_decisions:
- issue: Sense of Paul's 'third time' language
  chosen_reading: Rendered as a third readiness/intended visit rather than asserting
    with interpretive force that two prior visits certainly occurred.
  alternative_readings:
  - Rendered more woodenly as 'this third time I am ready to come to you'
  rationale: The Greek wording centers on Paul's present readiness for a third visit.
    The chosen English is natural while avoiding overcommitting beyond the verse's
    own wording to a reconstructed travel history.
  doctrine_reference: Translation philosophy §1, §3
