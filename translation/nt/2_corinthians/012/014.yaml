id: 2CO.12.14
reference: 2 Corinthians 12:14
source:
  edition: SBLGNT
  text: Ἰδοὺ τρίτον ⸀τοῦτο ἑτοίμως ἔχω ἐλθεῖν πρὸς ὑμᾶς, καὶ οὐ ⸀καταναρκήσω· οὐ γὰρ
    ζητῶ τὰ ὑμῶν ἀλλὰ ὑμᾶς, οὐ γὰρ ὀφείλει τὰ τέκνα τοῖς γονεῦσιν θησαυρίζειν, ἀλλὰ
    οἱ γονεῖς τοῖς τέκνοις.
translation:
  text: Look, this is the third time I am ready to come to you, and I will not be
    a burden to you. For I do not seek what is yours, but you. For children are not
    obligated to store up for their parents, but parents for their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'this third time I am ready to come to you.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'be a burden' can carry the sense of imposing oneself
      financially on someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Rendered as a natural attention-getter in modern English. 'Behold' is
    more formal but less readable for the target audience.
- source_word: τρίτον τοῦτο
  chosen: this is the third time
  alternatives:
  - for this third time
  - this third time
  lexicon: BDAG
  rationale: The idiom signals Paul's third intended/ready visit. English requires
    slight smoothing for clarity; 'this is the third time' captures the discourse
    force naturally.
- source_word: ἑτοίμως ἔχω ἐλθεῖν
  chosen: I am ready to come
  alternatives:
  - I am prepared to come
  - I have myself in readiness to come
  lexicon: BDAG
  rationale: Expresses present readiness with infinitive complement. 'Ready to come'
    is idiomatic and sufficiently close to the Greek structure.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: In context of travel/visit, English idiom prefers 'come to you'.
- source_word: καταναρκήσω
  chosen: be a burden to you
  alternatives:
  - weigh you down
  - be financially burdensome to you
  lexicon: BDAG
  rationale: The verb here refers to imposing oneself materially or financially. 'Be
    a burden to you' is the clearest natural rendering; the dative object is made
    explicit in English.
- source_word: ζητῶ τὰ ὑμῶν ἀλλὰ ὑμᾶς
  chosen: I do not seek what is yours, but you
  alternatives:
  - I do not seek your possessions, but you
  - I do not seek what belongs to you, but you yourselves
  lexicon: BDAG
  rationale: Preserves the contrast between possessions and persons. 'What is yours'
    is concise and faithful, while allowing the implied material sense to be heard.
- source_word: ὀφείλει
  chosen: are not obligated
  alternatives:
  - ought not
  - do not owe it
  lexicon: BDAG
  rationale: The verb denotes obligation. Plural English predicate agrees with 'children';
    'are not obligated' communicates normative duty clearly.
- source_word: θησαυρίζειν
  chosen: to store up
  alternatives:
  - to save up
  - to accumulate treasure
  lexicon: BDAG
  rationale: The verb literally means to store up/treasure up. 'Store up' preserves
    the metaphor while fitting the parental-support proverb in context.
- source_word: γονεῦσιν / γονεῖς
  chosen: parents
  alternatives:
  - fathers and mothers
  lexicon: BDAG
  rationale: The Greek term is inclusive of parents generally, not specifically fathers.
    'Parents' is gender-accurate to the source.
- source_word: τέκνα / τέκνοις
  chosen: children
  alternatives:
  - sons and daughters
  lexicon: BDAG
  rationale: The noun is generic for children, not specifically sons. 'Children' best
    matches the source.
