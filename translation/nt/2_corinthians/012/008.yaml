id: 2CO.12.8
reference: 2 Corinthians 12:8
source:
  edition: SBLGNT
  text: ὑπὲρ τούτου τρὶς τὸν κύριον παρεκάλεσα ἵνα ἀποστῇ ἀπ’ ἐμοῦ·
translation:
  text: Concerning this, three times I pleaded with the Lord that it might depart
    from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'About this' or 'For this.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I appealed to' or 'I begged.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says only 'the Lord'; Paul does not explicitly name Jesus here.
    reason: alternative_reading
  - marker: d
    text: Or 'it might leave me' or 'go away from me.' The Greek leaves the subject
      implicit, referring back to the affliction mentioned in the previous verse.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ τούτου
  chosen: Concerning this
  alternatives:
  - About this
  - For this
  lexicon: BDAG
  rationale: ὑπέρ with the genitive here introduces the matter under discussion rather
    than meaning 'on behalf of.' 'Concerning this' is natural English and preserves
    the referential link to the preceding thorn-in-the-flesh context.
- source_word: τρὶς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: The adverb denotes three occasions. 'Three times' is clear modern English;
    'thrice' is accurate but archaic, contrary to the readability aim.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' In this Pauline context it most naturally refers to the Lord Jesus without
    needing to specify the name in translation.
- source_word: παρεκάλεσα
  chosen: I pleaded with
  alternatives:
  - I appealed to
  - I begged
  - I entreated
  lexicon: BDAG
  rationale: παρακαλέω has a broad range including urge, appeal, exhort, comfort.
    In a prayer context directed to the Lord for relief, 'pleaded with' best conveys
    earnest petition without overstating beyond the Greek.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the plea. 'That' is the most idiomatic
    English connector here.
- source_word: ἀποστῇ
  chosen: it might depart
  alternatives:
  - it might leave
  - it might go away
  - he might depart
  lexicon: BDAG
  rationale: Aorist subjunctive of ἀφίστημι/ἀφίσταμαι here means 'go away' or 'depart.'
    'Depart' preserves the elevated but still readable tone. The subject is implicit;
    English supplies 'it' because the antecedent is the affliction just mentioned
    ('thorn' / 'messenger'), and this avoids over-interpreting the personal imagery.
- source_word: ἀπ’ ἐμοῦ
  chosen: from me
  alternatives:
  - away from me
  lexicon: BDAG
  rationale: Simple separation from Paul himself. 'From me' is sufficient and idiomatic
    in English.
