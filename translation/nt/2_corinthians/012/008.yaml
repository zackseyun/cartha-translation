theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Rendered generically as 'the Lord' without expanding to 'the Lord
    Jesus.'
  alternative_readings:
  - the Lord Jesus
  rationale: Paul likely refers to Jesus in this context, but the Greek text says
    only κύριον. To avoid importing specificity beyond the wording while preserving
    orthodox plausibility, the translation keeps 'the Lord.'
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Subject of ἀποστῇ
  chosen_reading: Used the impersonal English subject 'it' for the thing to depart.
  alternative_readings:
  - he might depart
  - the messenger might depart
  - the thorn might depart
  rationale: The Greek verb has an implicit subject supplied from the prior context,
    which includes both the 'thorn in the flesh' and 'a messenger of Satan.' Using
    'it' preserves the ambiguity rather than resolving whether Paul focuses on the
    thorn or the messenger.
  doctrine_reference: 'Translation philosophy #3'
