id: 2CO.12.4
reference: 2 Corinthians 12:4
source:
  edition: SBLGNT
  text: ὅτι ἡρπάγη εἰς τὸν παράδεισον καὶ ἤκουσεν ἄρρητα ῥήματα ἃ οὐκ ἐξὸν ἀνθρώπῳ
    λαλῆσαι.
translation:
  text: that he was caught up into paradise and heard inexpressible words, which a
    man is not permitted to speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unspeakable words' or 'unutterable sayings.' The Greek adjective may
      denote either words too extraordinary to express or words not to be spoken.
    reason: lexical_alternative
  - marker: b
    text: Greek 'a man,' used here in a representative sense; that is, a human being
      is not permitted to speak them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡρπάγη
  chosen: was caught up
  alternatives:
  - was snatched up
  - was taken up
  lexicon: BDAG
  rationale: Passive of ἁρπάζω denotes sudden forceful removal/carrying away. 'Caught
    up' is idiomatic, preserves the passive, and fits Paul's visionary context without
    overinterpreting the mode.
- source_word: παράδεισον
  chosen: paradise
  alternatives:
  - the garden
  - Paradise
  lexicon: BDAG
  rationale: παράδεισος in Jewish and early Christian usage refers to the blessed
    heavenly realm. 'Paradise' is the established and accurate English equivalent
    here; lowercase avoids importing a rigid proper-name convention not explicit in
    the Greek.
- source_word: ἄρρητα ῥήματα
  chosen: inexpressible words
  alternatives:
  - unspeakable words
  - unutterable sayings
  lexicon: BDAG
  rationale: ἄρρητα can mean 'not to be spoken' or 'inexpressible.' In context, paired
    with the following clause about not being permitted to speak them, 'inexpressible
    words' preserves the sense without redundancy while allowing the next clause to
    carry the prohibition explicitly.
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: ῥήματα here refers to spoken content heard in the vision. 'Words' is
    the most natural and sufficiently precise rendering in English.
- source_word: οὐκ ἐξὸν
  chosen: is not permitted
  alternatives:
  - is not lawful
  - is not allowed
  lexicon: BDAG
  rationale: The impersonal expression ἔξεστιν denotes what is permitted or lawful.
    'Is not permitted' communicates the force clearly in modern English without sounding
    overly juridical.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  - man
  lexicon: BDAG
  rationale: The singular dative is generic. Per gender-accurate philosophy, 'a man'
    preserves the source's masculine singular representative force better than the
    more neutral 'a person,' while still functioning generically in context.
- source_word: λαλῆσαι
  chosen: to speak
  alternatives:
  - to say
  - to utter
  lexicon: BDAG
  rationale: λαλέω commonly means 'to speak.' 'To speak' is broad and natural, matching
    the prohibition on verbal disclosure.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: Introduces the content of what he knows about the man in Messiah from
    the previous verse. 'That' is the straightforward complementizer here.
