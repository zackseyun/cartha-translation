theological_decisions:
- issue: Nature of the heavenly experience
  chosen_reading: Retain 'paradise' and 'was caught up' without specifying whether
    the experience was bodily or visionary only.
  alternative_readings:
  - Interpret as bodily ascent
  - Interpret as purely visionary ascent
  rationale: The immediate context (vv. 2–3) explicitly preserves Paul's uncertainty
    about whether the experience was in the body or apart from the body. The translation
    should not resolve that tension in this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ἄρρητα ῥήματα
  chosen_reading: Render as 'inexpressible words' while keeping the following clause
    as a prohibition on human speech.
  alternative_readings:
  - Render as 'unspeakable words' to make the adjective itself carry the prohibition
  rationale: 'This avoids collapsing two related but distinct ideas: the extraordinary
    character of what was heard and the statement that a human is not permitted to
    speak it.'
  doctrine_reference: Translation philosophy §1 and §6
