theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: Following the project's doctrine, Χριστός is translated as 'Messiah'
    where the title sense is active. In Paul's formulaic union language, the messianic
    title remains meaningful, so the title is translated rather than simply preserved
    by tradition.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Nature of Paul's experience ('in the body' or 'outside the body')
  chosen_reading: The translation preserves Paul's uncertainty without resolving whether
    the event was bodily or non-bodily.
  alternative_readings:
  - bodily ascent
  - visionary or disembodied experience
  rationale: The Greek explicitly states Paul's ignorance on this point twice and
    attributes knowledge to God alone. The translation must preserve that tension
    rather than settle the interpretive question.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
