id: 2CO.12.2
reference: 2 Corinthians 12:2
source:
  edition: SBLGNT
  text: οἶδα ἄνθρωπον ἐν Χριστῷ πρὸ ἐτῶν δεκατεσσάρων— εἴτε ἐν σώματι οὐκ οἶδα, εἴτε
    ἐκτὸς τοῦ σώματος οὐκ οἶδα, ὁ θεὸς οἶδεν— ἁρπαγέντα τὸν τοιοῦτον ἕως τρίτου οὐρανοῦ.
translation:
  text: I know a man in Messiah who, fourteen years ago—whether in the body I do not
    know, or outside the body I do not know, God knows—was caught up to the third
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'in Christ.' The Greek is ἐν Χριστῷ; this draft renders
      the title as 'Messiah' to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Paul explicitly does not say whether this happened in the body or outside
      the body; the text leaves the mode of the experience unresolved.
    reason: lexical_alternative
  - marker: c
    text: '''The third heaven'' reflects ancient Jewish cosmological language for
      the highest heaven or paradise; the translation preserves the expression rather
      than interpreting it.'
    reason: cultural_note
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I knew
  - I am acquainted with
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense in Koine; 'I know' is
    the natural English equivalent.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and here refers to a specific
    male individual (Paul speaking obliquely of himself in context). Per gender-accurate
    policy, 'a man' best matches the source.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  - united to Messiah
  lexicon: BDAG
  rationale: Χριστῷ is titular rather than merely name-like here, and doctrine guidance
    prefers 'Messiah' where title is in view. 'In Messiah' preserves Paul's covenantal-union
    language without paraphrase.
- source_word: πρὸ ἐτῶν δεκατεσσάρων
  chosen: fourteen years ago
  alternatives:
  - before fourteen years
  - fourteen years before
  lexicon: BDAG
  rationale: Idiomatic English requires a temporal adverbial expression; 'fourteen
    years ago' accurately conveys πρό with the genitive of time.
- source_word: εἴτε ἐν σώματι
  chosen: whether in the body
  alternatives:
  - whether bodily
  - whether while in the body
  lexicon: BDAG
  rationale: A relatively formal rendering preserves Paul's repeated uncertainty and
    the embodied/disembodied contrast.
- source_word: ἐκτὸς τοῦ σώματος
  chosen: outside the body
  alternatives:
  - apart from the body
  - out of the body
  lexicon: BDAG
  rationale: '''Outside the body'' is the most direct and readable equivalent for
    ἐκτός with the genitive, preserving the contrast with ''in the body.'''
- source_word: ὁ θεὸς οἶδεν
  chosen: God knows
  alternatives:
  - God alone knows
  lexicon: BDAG
  rationale: Straightforward rendering of the clause; 'alone' is interpretive and
    not explicit in the Greek.
- source_word: ἁρπαγέντα
  chosen: was caught up
  alternatives:
  - was snatched up
  - having been caught up
  lexicon: BDAG
  rationale: The aorist passive participle is best rendered in smooth English as a
    passive finite verb linked to the main clause. 'Caught up' is idiomatic and preserves
    the force of sudden divine transport without colloquial roughness.
- source_word: τὸν τοιοῦτον
  chosen: that man
  alternatives:
  - such a man
  - such a one
  lexicon: BDAG
  rationale: Although literally 'such a one,' English style is clearer with 'that
    man' in apposition to the earlier 'a man.' This avoids awkwardness while retaining
    the demonstrative reference.
- source_word: ἕως τρίτου οὐρανοῦ
  chosen: to the third heaven
  alternatives:
  - as far as the third heaven
  - up to the third heaven
  lexicon: BDAG
  rationale: '''To the third heaven'' is the most natural English rendering of ἕως
    with this destination-like expression and matches the context of being caught
    upward.'
