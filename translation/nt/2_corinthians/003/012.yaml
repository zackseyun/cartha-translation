id: 2CO.3.12
reference: 2 Corinthians 3:12
source:
  edition: SBLGNT
  text: Ἔχοντες οὖν τοιαύτην ἐλπίδα πολλῇ παρρησίᾳ χρώμεθα,
translation:
  text: Since, then, we have such a hope, we act with great boldness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we use great openness' or 'we speak with great frankness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες
  chosen: Since ... we have
  alternatives:
  - Having
  lexicon: BDAG
  rationale: The participle is rendered causally in context ('since') rather than
    as a bare English participle ('having') to produce natural English while preserving
    the logical connection to the main clause.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks inference from the prior argument. 'Then' keeps the connective
    force in readable modern English; the inferential nuance is also supported by
    the causal rendering of the participle.
- source_word: τοιαύτην
  chosen: such
  alternatives:
  - this kind of
  lexicon: BDAG
  rationale: '''Such'' is the most natural compact rendering for the demonstrative
    qualitative force.'
- source_word: ἐλπίδα
  chosen: hope
  lexicon: BDAG
  rationale: Standard rendering that fits Paul's future-oriented confidence in the
    surrounding context.
- source_word: πολλῇ
  chosen: great
  alternatives:
  - much
  - abundant
  lexicon: BDAG
  rationale: With παρρησίᾳ, the adjective intensifies the quality. 'Great boldness'
    is idiomatic English and preserves the emphasis.
- source_word: παρρησίᾳ
  chosen: boldness
  alternatives:
  - openness
  - frankness
  lexicon: BDAG
  rationale: παρρησία can denote boldness, openness, or frankness. 'Boldness' best
    fits the immediate contrastive context of confidence versus veiling, while alternatives
    are preserved in a footnote.
- source_word: χρώμεθα
  chosen: we act with
  alternatives:
  - we use
  - we conduct ourselves with
  lexicon: BDAG
  rationale: The middle verb with dative denotes making use of something. 'We act
    with' gives natural English without implying an omitted object such as 'speech,'
    while still reflecting the instrumental sense.
