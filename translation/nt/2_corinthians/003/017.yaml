id: 2CO.3.17
reference: 2 Corinthians 3:17
source:
  edition: SBLGNT
  text: ὁ δὲ κύριος τὸ πνεῦμά ἐστιν· οὗ δὲ τὸ πνεῦμα ⸀κυρίου, ἐλευθερία.
translation:
  text: Now the Lord is the Spirit, and where the Spirit of the Lord is, there is
    freedom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "Now the Lord is the Spirit" may be understood as a close contextual
      identification without specifying how the relationship should be defined theologically.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Rendered as "Lord" in keeping with the project's default for κύριος and
    the strong Pauline/theological usage in context.
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized as "Spirit" because in both instances the referent is the
    Holy Spirit in Paul's argument, not merely an impersonal or human spirit.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: The first δέ is rendered "Now" to mark a development in argument without
    making the contrast overly sharp. The second δέ is carried forward smoothly with
    "and" in English style.
- source_word: οὗ
  chosen: where
  alternatives:
  - wherever
  lexicon: BDAG
  rationale: Rendered as "where" for the natural locative sense in a general statement;
    "wherever" is possible but slightly more expansive than the Greek requires.
- source_word: ἐλευθερία
  chosen: freedom
  alternatives:
  - liberty
  lexicon: BDAG
  rationale: '"Freedom" is the most natural contemporary English equivalent and preserves
    the theological weight without archaic diction.'
- source_word: ὁ δὲ κύριος τὸ πνεῦμά ἐστιν
  chosen: Now the Lord is the Spirit
  alternatives:
  - Now the Lord is Spirit
  lexicon: BDAG
  rationale: Kept the full equative clause with both articles represented in normal
    English syntax. "The Spirit" is clearer and more idiomatic here than the less
    natural "Spirit" alone.
- source_word: τὸ πνεῦμα κυρίου
  chosen: the Spirit of the Lord
  alternatives:
  - the Lord's Spirit
  lexicon: BDAG
  rationale: Translated with the explicit genitival construction to preserve the Greek
    wording and its resonance with biblical usage.
