theological_decisions:
- issue: The identity statement in "the Lord is the Spirit" is theologically contested.
  chosen_reading: 'Rendered the clause straightforwardly as an unsoftened equative
    statement: "the Lord is the Spirit."'
  alternative_readings:
  - Some interpret the clause as functional or covenantal identification rather than
    an exhaustive personal equation.
  - Some take "the Lord" here specifically as Christ from the immediate context; others
    understand a broader divine referent.
  rationale: The Greek states the identification directly, and the translation should
    preserve that tension rather than resolve it by paraphrase. The wording is left
    transparent to the source while doctrinal interpretation is not forced into the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
