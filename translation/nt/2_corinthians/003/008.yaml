theological_decisions:
- issue: Referent of πνεύματος
  chosen_reading: Spirit = the Holy Spirit
  alternative_readings:
  - spirit in a more abstract or non-personal sense
  rationale: In the immediate context Paul contrasts the letter-based old-covenant
    ministry with the life-giving ministry associated with the Holy Spirit (cf. 2
    Cor 3:6). Capitalizing 'Spirit' reflects that contextual referent without adding
    doctrinal content beyond the passage.
