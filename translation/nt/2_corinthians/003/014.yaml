theological_decisions:
- issue: Referent of καταργεῖται
  chosen_reading: The implicit subject is the veil, so the clause means 'because in
    the Messiah it is removed.'
  alternative_readings:
  - The old covenant is what is being abolished or set aside.
  - The clause is intentionally left somewhat ambiguous between veil and covenant.
  rationale: The nearest and most natural antecedent is τὸ ... κάλυμμα ('the veil'),
    and this fits the participial description 'not being unveiled.' The rendering
    preserves Paul's imagery without importing a stronger supersessionist claim than
    the syntax requires.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant ambiguity.
