id: 2CO.3.14
reference: 2 Corinthians 3:14
source:
  edition: SBLGNT
  text: ἀλλὰ ἐπωρώθη τὰ νοήματα αὐτῶν. ἄχρι γὰρ τῆς σήμερον ⸀ἡμέρας τὸ αὐτὸ κάλυμμα
    ἐπὶ τῇ ἀναγνώσει τῆς παλαιᾶς διαθήκης μένει μὴ ἀνακαλυπτόμενον, ⸀ὅτι ἐν Χριστῷ
    καταργεῖται,
translation:
  text: But their minds were hardened. For until this very day, at the reading of
    the old covenant, the same veil remains, not being unveiled, because in the Messiah
    it is removed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the old testament.'' Greek: ''the old covenant.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'because in Christ it is abolished / set aside.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπωρώθη
  chosen: were hardened
  alternatives:
  - were dulled
  - were made stubborn
  lexicon: BDAG
  rationale: Conveys the passive sense of becoming spiritually insensible or resistant
    without overstating volitional rebellion.
- source_word: νοήματα
  chosen: minds
  alternatives:
  - understandings
  - thoughts
  lexicon: BDAG
  rationale: In this context the word refers to their faculty of perception or understanding;
    'minds' is natural English and fits Paul's argument.
- source_word: ἄχρι γὰρ τῆς σήμερον ἡμέρας
  chosen: For until this very day
  alternatives:
  - For to this day
  - For until today
  lexicon: BDAG
  rationale: Keeps the temporal emphasis and reads idiomatically in modern English.
- source_word: κάλυμμα
  chosen: veil
  alternatives:
  - covering
  lexicon: BDAG
  rationale: '''Veil'' preserves the metaphorical link to Moses in the surrounding
    context.'
- source_word: ἐπὶ τῇ ἀναγνώσει
  chosen: at the reading
  alternatives:
  - during the reading
  - when ... is read
  lexicon: BDAG
  rationale: A reasonably formal rendering that preserves the prepositional construction
    while remaining clear.
- source_word: παλαιᾶς διαθήκης
  chosen: the old covenant
  alternatives:
  - the old testament
  lexicon: BDAG
  rationale: The source text says 'covenant,' not 'Testament'; this follows original-language
    primacy over translation tradition.
- source_word: μένει
  chosen: remains
  alternatives:
  - stays
  - continues
  lexicon: BDAG
  rationale: Simple, direct rendering of ongoing persistence.
- source_word: μὴ ἀνακαλυπτόμενον
  chosen: not being unveiled
  alternatives:
  - remaining unlifted
  - not being revealed
  lexicon: BDAG
  rationale: Keeps the passive participial sense and preserves the veil imagery. 'Unveiled'
    is preferable here because the object is the veil itself.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, so 'Messiah' best preserves the meaning according
    to the project's default rendering.
- source_word: καταργεῖται
  chosen: is removed
  alternatives:
  - is abolished
  - is set aside
  - is done away with
  lexicon: BDAG
  rationale: Given the immediate antecedent 'veil,' 'is removed' communicates the
    effect in clear English while preserving the passive sense. More abstract options
    like 'is abolished' are possible but less natural with 'veil' as antecedent.
