theological_decisions:
- issue: Whether πνεῦμα should be rendered 'Spirit' or 'spirit'
  chosen_reading: Spirit
  alternative_readings:
  - spirit
  rationale: Within Paul's explicit new-covenant contrast, the life-giving referent
    most likely is the Holy Spirit rather than a generalized spiritual principle.
    Because the Greek text does not orthographically distinguish upper- and lower-case,
    the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    remains.
