id: 2CO.3.6
reference: 2 Corinthians 3:6
source:
  edition: SBLGNT
  text: ὃς καὶ ἱκάνωσεν ἡμᾶς διακόνους καινῆς διαθήκης, οὐ γράμματος ἀλλὰ πνεύματος,
    τὸ γὰρ γράμμα ἀποκτέννει, τὸ δὲ πνεῦμα ζῳοποιεῖ.
translation:
  text: who also made us competent as servants of a new covenant, not of the letter
    but of the Spirit; for the letter kills, but the Spirit gives life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spirit” in both places.
    reason: alternative_reading
  - marker: b
    text: Or “ministers” for “servants.”
    reason: lexical_alternative
  - marker: c
    text: “Letter” may also be understood as “written code.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκάνωσεν
  chosen: made us competent
  alternatives:
  - made us sufficient
  - qualified us
  lexicon: BDAG
  rationale: Conveys enabling fitness for ministry in clear modern English without
    implying mere adequacy or formal certification alone.
- source_word: διακόνους
  chosen: servants
  alternatives:
  - ministers
  lexicon: BDAG
  rationale: Retains the service-oriented sense of διάκονος in a readable way. 'Ministers'
    is possible, but 'servants' better avoids importing later ecclesial office language
    not explicit in the verse.
- source_word: καινῆς διαθήκης
  chosen: of a new covenant
  alternatives:
  - of the new covenant
  lexicon: BDAG
  rationale: '''New covenant'' is the natural rendering of the genitive phrase. The
    anarthrous construction is well represented by English ''a new covenant'' here,
    while still clearly invoking the covenantal category central to Paul''s argument.'
- source_word: γράμματος / γράμμα
  chosen: letter
  alternatives:
  - written code
  lexicon: BDAG
  rationale: Preserves Paul's concise metaphor and traditional contrast with πνεῦμα.
    'Written code' is interpretive and narrows the image more than the Greek itself
    requires.
- source_word: πνεύματος / πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In this new-covenant context, the contrast is best understood as the
    Holy Spirit over against the letter. The capitalization reflects that judgment
    while preserving the alternative in a footnote because the Greek manuscripts themselves
    do not mark case distinction.
- source_word: ἀποκτέννει
  chosen: kills
  alternatives:
  - brings death
  lexicon: BDAG
  rationale: Direct and forceful, matching the vivid present-tense contrast in Paul's
    wording.
- source_word: ζῳοποιεῖ
  chosen: gives life
  alternatives:
  - makes alive
  lexicon: BDAG
  rationale: Idiomatic modern English that preserves the life-giving action of the
    verb without sounding wooden.
