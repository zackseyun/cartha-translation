id: 2CO.3.9
reference: 2 Corinthians 3:9
source:
  edition: SBLGNT
  text: εἰ γὰρ ⸂τῇ διακονίᾳ⸃ τῆς κατακρίσεως δόξα, πολλῷ μᾶλλον περισσεύει ἡ διακονία
    τῆς ⸀δικαιοσύνης δόξῃ.
translation:
  text: For if the ministry of condemnation came with glory, much more does the ministry
    of righteousness abound in glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονία
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: Rendered as “ministry” because Paul contrasts two covenantal administrations,
    not merely isolated acts of service; “service” is possible but sounds too narrow
    in this context.
- source_word: κατάκρισις
  chosen: condemnation
  alternatives:
  - sentence of condemnation
  - judgment
  lexicon: BDAG
  rationale: “Condemnation” best matches the noun’s forensic sense and fits Paul’s
    contrast between the old ministry and the ministry associated with righteousness.
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: “Glory” is the standard and most theologically appropriate rendering
    here, preserving the continuity of Paul’s argument about the surpassing glory
    of the new covenant.
- source_word: πολλῷ μᾶλλον
  chosen: much more
  alternatives:
  - by far more
  - far more
  lexicon: BDAG
  rationale: This idiomatic comparative intensifier is naturally rendered “much more”
    in English and preserves Paul’s escalated contrast.
- source_word: περισσεύω
  chosen: abound
  alternatives:
  - overflow
  - excel
  lexicon: BDAG
  rationale: “Abound” preserves the sense of overflowing excess without overstating
    the comparative force; it fits well with the dative “in glory.”
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the doctrinal default for Pauline usage, “righteousness” is
    retained in the main text. “Justice” is a plausible alternative nuance and is
    preserved in a footnote.
- source_word: came with
  chosen: came with
  alternatives:
  - had
  - was with
  rationale: The first clause is verbless in Greek, so English requires a supplied
    expression. “Came with” smoothly conveys the presence of glory in that ministry
    without adding a stronger claim than the text warrants.
