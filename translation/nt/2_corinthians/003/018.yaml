theological_decisions:
- issue: The sense of κατοπτριζόμενοι
  chosen_reading: beholding the glory of the Lord as in a mirror
  alternative_readings:
  - reflecting the glory of the Lord like a mirror
  rationale: The verse emphasizes perception of the Lord's glory leading to transformation,
    which favors 'beholding.' Because the Greek verb is genuinely capable of the alternative
    sense, that option is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: The relation of κυρίου and πνεύματος in the closing phrase
  chosen_reading: from the Lord, the Spirit
  alternative_readings:
  - from the Lord who is the Spirit
  - from the Spirit of the Lord
  rationale: The Greek phrase is terse and admits multiple construals. The chosen
    rendering stays close to the wording while avoiding an overly explicit doctrinal
    paraphrase in the main text; alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
