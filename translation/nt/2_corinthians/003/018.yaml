id: 2CO.3.18
reference: 2 Corinthians 3:18
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ πάντες ἀνακεκαλυμμένῳ προσώπῳ τὴν δόξαν κυρίου κατοπτριζόμενοι τὴν
    αὐτὴν εἰκόνα μεταμορφούμεθα ἀπὸ δόξης εἰς δόξαν, καθάπερ ἀπὸ κυρίου πνεύματος.
translation:
  text: And we all, with unveiled face, beholding the glory of the Lord as in a mirror,
    are being transformed into the same image from glory to glory, just as from the
    Lord, the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reflecting the glory of the Lord like a mirror.'
    reason: alternative_reading
  - marker: b
    text: Or 'from the Lord who is the Spirit'; alternatively, 'from the Spirit of
      the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνακεκαλυμμένῳ προσώπῳ
  chosen: with unveiled face
  alternatives:
  - with face unveiled
  lexicon: BDAG
  rationale: The perfect participle with πρόσωπον describes a present state resulting
    from unveiling. 'With unveiled face' is natural English and preserves the singular
    collective expression.
- source_word: δόξαν κυρίου
  chosen: the glory of the Lord
  alternatives:
  - the Lord's glory
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly. 'Lord' follows the project's
    default rendering for κύριος.
- source_word: κατοπτριζόμενοι
  chosen: beholding ... as in a mirror
  alternatives:
  - reflecting like a mirror
  - gazing at as in a mirror
  lexicon: BDAG
  rationale: The verb can mean either beholding by means of a mirror or reflecting
    like a mirror. In this context, 'beholding ... as in a mirror' better fits the
    movement from seeing the Lord's glory to being transformed by it, while the alternative
    is preserved in a footnote because the term is genuinely contested.
- source_word: τὴν αὐτὴν εἰκόνα
  chosen: the same image
  alternatives:
  - that same image
  lexicon: BDAG
  rationale: A direct rendering preserves the link between the Lord's glory and the
    image into which believers are transformed.
- source_word: μεταμορφούμεθα
  chosen: are being transformed
  alternatives:
  - are transformed
  - are being changed
  lexicon: BDAG
  rationale: 'The present passive is best represented with an ongoing passive sense:
    transformation is in progress, not merely punctiliar.'
- source_word: ἀπὸ δόξης εἰς δόξαν
  chosen: from glory to glory
  alternatives:
  - from one degree of glory to another
  lexicon: BDAG
  rationale: The compact Greek expression is retained in compact English. The expanded
    interpretive gloss is possible but says more than the text explicitly states.
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  lexicon: BDAG
  rationale: '''Just as'' gives a clear contemporary equivalent for the comparative
    conjunction.'
- source_word: ἀπὸ κυρίου πνεύματος
  chosen: from the Lord, the Spirit
  alternatives:
  - from the Lord who is the Spirit
  - from the Spirit of the Lord
  lexicon: BDAG
  rationale: The Greek wording is compressed and somewhat ambiguous. 'From the Lord,
    the Spirit' preserves the appositional force without resolving the syntax more
    than necessary. More explicit interpretive renderings are preserved in a footnote.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and suits both
    occurrences in this verse.
