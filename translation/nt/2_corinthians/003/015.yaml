theological_decisions:
- issue: Whether to make explicit that 'Moses' means the Mosaic law or writings
  chosen_reading: Retain 'Moses' in the main text as a metonymy
  alternative_readings:
  - Render explicitly as 'the law of Moses'
  - Render explicitly as 'the writings of Moses'
  rationale: The text itself says 'Moses,' and preserving that wording avoids over-interpreting
    while still allowing the metonymic sense to be clarified in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    the source text's plain sense unless clarity requires otherwise.
