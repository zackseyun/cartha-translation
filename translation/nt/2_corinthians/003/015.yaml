id: 2CO.3.15
reference: 2 Corinthians 3:15
source:
  edition: SBLGNT
  text: ἀλλ’ ἕως σήμερον ἡνίκα ⸂ἂν ἀναγινώσκηται⸃ Μωϋσῆς κάλυμμα ἐπὶ τὴν καρδίαν αὐτῶν
    κεῖται·
translation:
  text: But to this day, whenever Moses is read, a veil lies over their heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the writings of Moses, especially the law.
    reason: cultural_note
  - marker: b
    text: Greek 'their heart' (singular), likely a collective singular; English might
      also be rendered 'their hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a contrast with the preceding statement; 'But' is the most natural
    concise English adversative here.
- source_word: ἕως σήμερον
  chosen: to this day
  alternatives:
  - until today
  - until this day
  lexicon: BDAG
  rationale: An idiomatic temporal expression meaning the condition continues into
    the present; 'to this day' is natural modern English and preserves that force.
- source_word: ἡνίκα ἂν ἀναγινώσκηται
  chosen: whenever Moses is read
  alternatives:
  - when Moses is read
  lexicon: BDAG
  rationale: The combination of ἡνίκα with ἄν and the present subjunctive conveys
    an indefinite repeated circumstance, best rendered 'whenever.'
- source_word: Μωϋσῆς
  chosen: Moses
  alternatives:
  - the law of Moses
  - the writings of Moses
  lexicon: BDAG
  rationale: The Greek uses 'Moses' metonymically for the Mosaic writings. The main
    text preserves the source expression rather than importing the interpretation
    into the translation.
- source_word: κάλυμμα
  chosen: a veil
  alternatives:
  - a covering
  lexicon: BDAG
  rationale: '''Veil'' matches the immediate context of Paul''s veil imagery in this
    chapter and is the standard, contextually precise rendering.'
- source_word: ἐπὶ τὴν καρδίαν αὐτῶν
  chosen: over their heart
  alternatives:
  - over their hearts
  lexicon: BDAG
  rationale: The Greek has singular 'heart' with plural 'their,' likely functioning
    collectively. The translation keeps the singular to reflect the source more closely,
    even though English might more idiomatically use 'hearts.'
- source_word: κεῖται
  chosen: lies
  alternatives:
  - rests
  - is laid
  lexicon: BDAG
  rationale: The verb denotes something lying or resting in place; 'lies' is the clearest
    and most direct English equivalent in this metaphor.
