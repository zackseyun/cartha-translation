theological_decisions:
- issue: Meaning of τέλος τοῦ καταργουμένου
  chosen_reading: Paul refers to the termination of the old-covenant glory as something
    fading away, not primarily to a positive 'goal' or 'telos.'
  alternative_readings:
  - the goal of what was being brought to an end
  - the outcome of what was being nullified
  rationale: The immediate context in 2 Corinthians 3 contrasts what is temporary
    with what remains. Rendering the phrase as 'the end of what was fading away' preserves
    that tension without importing a stronger doctrinal interpretation than the text
    itself requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
