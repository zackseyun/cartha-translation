id: 2CO.3.13
reference: 2 Corinthians 3:13
source:
  edition: SBLGNT
  text: καὶ οὐ καθάπερ Μωϋσῆς ἐτίθει κάλυμμα ἐπὶ τὸ πρόσωπον ⸀αὐτοῦ, πρὸς τὸ μὴ ἀτενίσαι
    τοὺς υἱοὺς Ἰσραὴλ εἰς τὸ τέλος τοῦ καταργουμένου.
translation:
  text: and not like Moses, who used to put a veil over his face so that the sons
    of Israel would not gaze at the end of what was fading away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the goal/outcome of what was being brought to an end.'
    reason: alternative_reading
  - marker: b
    text: Greek 'sons of Israel'; idiomatically, 'Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: like
  alternatives:
  - just as
  - as
  lexicon: BDAG
  rationale: Introduces comparison with the preceding claim; 'like' is concise modern
    English and preserves the comparative force without sounding wooden.
- source_word: ἐτίθει
  chosen: used to put
  alternatives:
  - was putting
  - put
  lexicon: BDAG
  rationale: The imperfect suggests repeated or customary action in the Exodus narrative
    background, so 'used to put' communicates that aspect more clearly than a simple
    past.
- source_word: κάλυμμα
  chosen: veil
  alternatives:
  - covering
  lexicon: BDAG
  rationale: '''Veil'' is the established and precise term for the face-covering in
    this context, and it fits both the Exodus allusion and Paul''s ongoing metaphor.'
- source_word: πρόσωπον αὐτοῦ
  chosen: his face
  alternatives:
  - his countenance
  lexicon: BDAG
  rationale: This is the plain sense of the phrase; 'face' is natural modern English
    without loss of meaning.
- source_word: πρὸς τὸ μὴ ἀτενίσαι
  chosen: so that ... would not gaze
  alternatives:
  - so that ... might not look intently
  - for ... not to stare at
  lexicon: BDAG
  rationale: This construction expresses purpose. 'Gaze' preserves the heightened
    sense of fixed looking in ἀτενίζω better than a simple 'look.'
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: BDAG
  rationale: The Greek is explicitly 'sons,' and the project's philosophy prefers
    gender-accurate rendering where that matches the source form and sense. Here it
    also preserves the biblical idiom.
- source_word: εἰς τὸ τέλος
  chosen: at the end
  alternatives:
  - at the goal
  - at the outcome
  lexicon: BDAG
  rationale: τέλος can mean 'end,' 'goal,' or 'outcome.' In this context, paired with
    καταργουμένου and Paul's contrast between enduring and passing glory, 'end' best
    fits the sense of termination, while alternatives remain possible enough to preserve
    in a footnote.
- source_word: τοῦ καταργουμένου
  chosen: of what was fading away
  alternatives:
  - of what was being brought to an end
  - of what was being abolished
  lexicon: BDAG
  rationale: καταργέω here refers to something losing effect or passing away. 'Fading
    away' reads naturally in context of the vanishing glory, while the more literal
    alternatives are preserved in a footnote for auditability.
