id: 2CO.3.5
reference: 2 Corinthians 3:5
source:
  edition: SBLGNT
  text: οὐχ ὅτι ⸂ἀφ’ ἑαυτῶν ἱκανοί ἐσμεν⸃ λογίσασθαί τι ὡς ἐξ ⸀αὑτῶν, ἀλλ’ ἡ ἱκανότης
    ἡμῶν ἐκ τοῦ θεοῦ,
translation:
  text: Not that we are sufficient in ourselves to consider anything as coming from
    ourselves, but our sufficiency is from God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adequate' or 'competent' for both 'sufficient' and 'sufficiency.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to reckon' or 'to count anything as from ourselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι
  chosen: Not that
  alternatives:
  - not because
  - it is not that
  lexicon: BDAG
  rationale: This idiom introduces a clarification or qualification rather than a
    causal statement; 'Not that' is natural English and preserves Paul's rhetorical
    turn.
- source_word: ἀφ’ ἑαυτῶν
  chosen: in ourselves
  alternatives:
  - from ourselves
  - of ourselves
  lexicon: BDAG
  rationale: With ἱκανοί ἐσμεν, the phrase describes intrinsic sufficiency located
    in oneself. 'In ourselves' best conveys self-derived adequacy in idiomatic English.
- source_word: ἱκανοί
  chosen: sufficient
  alternatives:
  - adequate
  - competent
  lexicon: BDAG
  rationale: '''Sufficient'' preserves the semantic link with ἱκανότης later in the
    verse and avoids importing the narrower idea of ministerial skill alone.'
- source_word: λογίσασθαί
  chosen: to consider
  alternatives:
  - to reckon
  - to count
  lexicon: BDAG
  rationale: The verb concerns mental reckoning or assessment. 'Consider' is clear
    modern English without sounding archaic like 'reckon,' while still preserving
    the cognitive sense.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  - any one thing
  lexicon: BDAG
  rationale: In this negated context, 'anything' best reflects the broad, indefinite
    scope.
- source_word: ὡς ἐξ αὑτῶν
  chosen: as coming from ourselves
  alternatives:
  - as from ourselves
  - as originating from ourselves
  lexicon: BDAG
  rationale: The phrase clarifies source or origin. 'As coming from ourselves' is
    more idiomatic than the overly literal 'as from ourselves' while preserving the
    same meaning.
- source_word: ἡ ἱκανότης ἡμῶν
  chosen: our sufficiency
  alternatives:
  - our adequacy
  - our competence
  lexicon: BDAG
  rationale: Using 'sufficiency' keeps the lexical connection with ἱκανοί and communicates
    that the needed capacity is supplied, not self-generated.
- source_word: ἐκ τοῦ θεοῦ
  chosen: is from God
  alternatives:
  - comes from God
  - is out of God
  lexicon: BDAG
  rationale: '''Is from God'' is simple, direct, and preserves the emphasis on God
    as the source without unnecessary expansion.'
