id: 2CO.3.2
reference: 2 Corinthians 3:2
source:
  edition: SBLGNT
  text: ἡ ἐπιστολὴ ἡμῶν ὑμεῖς ἐστε, ἐγγεγραμμένη ἐν ταῖς καρδίαις ἡμῶν, γινωσκομένη
    καὶ ἀναγινωσκομένη ὑπὸ πάντων ἀνθρώπων·
translation:
  text: You are our letter, written in our hearts, known and read by all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recognized and read by all people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολή
  chosen: letter
  alternatives:
  - epistle
  lexicon: BDAG
  rationale: λεγόμενον refers to a written communication; 'letter' is the clear modern
    English equivalent, while 'epistle' is accurate but unnecessarily traditional
    here.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: 'The genitive pronoun marks possession: the Corinthians are metaphorically
    Paul''s and his coworkers'' letter.'
- source_word: ὑμεῖς ἐστε
  chosen: You are
  alternatives:
  - You yourselves are
  lexicon: BDAG
  rationale: A direct predicative clause. 'You are' is natural English; the emphatic
    force of ὑμεῖς is sufficiently carried by word order and context without adding
    awkward emphasis.
- source_word: ἐγγεγραμμένη
  chosen: written
  alternatives:
  - inscribed
  lexicon: BDAG
  rationale: The perfect passive participle denotes something that stands written.
    'Written' is idiomatic and preserves the metaphor; 'inscribed' is possible but
    sounds too formal for this context.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  chosen: in our hearts
  alternatives:
  - on our hearts
  lexicon: BDAG
  rationale: The preposition ἐν normally takes 'in' here. Although 'on our hearts'
    could echo inscription imagery in English, the source text says 'in,' and this
    rendering preserves that wording while remaining natural.
- source_word: γινωσκομένη
  chosen: known
  alternatives:
  - recognized
  lexicon: BDAG
  rationale: The participle means being known or recognized. 'Known' fits the paired
    metaphor with 'read' and sounds most natural in English.
- source_word: ἀναγινωσκομένη
  chosen: read
  lexicon: BDAG
  rationale: The participle literally refers to reading. Keeping 'read' preserves
    Paul's letter metaphor clearly and directly.
- source_word: ὑπὸ πάντων ἀνθρώπων
  chosen: by all people
  alternatives:
  - by all men
  - by everyone
  lexicon: BDAG
  rationale: ἀνθρώπων is generic for human beings, not specifically males. 'All people'
    is gender-accurate to the referent and communicates the universal scope naturally
    in modern English.
