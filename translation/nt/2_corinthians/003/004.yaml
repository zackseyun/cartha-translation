id: 2CO.3.4
reference: 2 Corinthians 3:4
source:
  edition: SBLGNT
  text: Πεποίθησιν δὲ τοιαύτην ἔχομεν διὰ τοῦ Χριστοῦ πρὸς τὸν θεόν.
translation:
  text: Such confidence we have through the Messiah before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "through Christ."
    reason: alternative_reading
  - marker: b
    text: Lit. "toward God."
    reason: lexical_alternative
lexical_decisions:
- source_word: Πεποίθησιν
  chosen: confidence
  alternatives:
  - assurance
  - trust
  lexicon: BDAG
  rationale: '"Confidence" best captures a settled sense of assurance in context without
    overstating subjective feeling or introducing a different object of trust.'
- source_word: δὲ
  chosen: Such
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: The connective is lightly represented in English by allowing the clause
    to flow from the prior context rather than forcing a heavier conjunction.
- source_word: τοιαύτην
  chosen: such
  alternatives:
  - this kind of
  - like this
  lexicon: BDAG
  rationale: '"Such" is natural English and preserves the qualitative force of the
    demonstrative adjective.'
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: The simple verb "have" is the most direct and idiomatic equivalent.
- source_word: διὰ τοῦ Χριστοῦ
  chosen: through the Messiah
  alternatives:
  - through Christ
  lexicon: BDAG
  rationale: διά with the genitive is naturally instrumental/mediatory, so "through"
    fits well. Χριστοῦ is rendered "Messiah" per the project default for the title
    sense rather than the more name-like "Christ."
- source_word: πρὸς τὸν θεόν
  chosen: before God
  alternatives:
  - toward God
  - with reference to God
  lexicon: BDAG
  rationale: While πρός literally means "toward," here "before God" gives clear idiomatic
    English for the relational orientation intended in context without losing the
    Godward sense.
