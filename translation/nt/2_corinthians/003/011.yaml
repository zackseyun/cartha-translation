id: 2CO.3.11
reference: 2 Corinthians 3:11
source:
  edition: SBLGNT
  text: εἰ γὰρ τὸ καταργούμενον διὰ δόξης, πολλῷ μᾶλλον τὸ μένον ἐν δόξῃ.
translation:
  text: For if what was fading away came with glory, much more what remains is in
    glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what was being brought to an end,' 'what was being set aside,' or 'what
      was being abolished.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'through glory.'
    reason: lexical_alternative
  - marker: c
    text: Or 'what endures' or 'what abides.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταργούμενον
  chosen: what was fading away
  alternatives:
  - what was being brought to an end
  - what was being set aside
  - what was being abolished
  lexicon: BDAG
  rationale: Although καταργέω can more literally mean 'render ineffective,' 'bring
    to an end,' or 'abolish,' in this context Paul contrasts the temporary old-covenant
    ministry with what endures. 'Fading away' captures the contextual sense in readable
    English while preserving the idea of transience.
- source_word: διὰ δόξης
  chosen: came with glory
  alternatives:
  - through glory
  - by means of glory
  lexicon: BDAG
  rationale: διά with the genitive is formally 'through' or 'by means of,' but idiomatic
    English here is better served by 'came with glory,' expressing that the transient
    ministry was attended by glory without forcing an awkward literalism.
- source_word: μένον
  chosen: what remains
  alternatives:
  - what endures
  - what abides
  lexicon: BDAG
  rationale: μένω often means 'remain,' 'abide,' or 'continue.' 'What remains' preserves
    the parallel with the neuter substantival participle and fits Paul's contrast
    between the temporary and the lasting.
- source_word: ἐν δόξῃ
  chosen: is in glory
  alternatives:
  - abides in glory
  - remains glorious
  lexicon: BDAG
  rationale: A fairly direct rendering best preserves the prepositional phrase and
    the rhetorical contrast with διὰ δόξης. 'Is in glory' is natural enough in English
    and keeps the emphasis on the sphere or condition of glory.
- source_word: πολλῷ μᾶλλον
  chosen: much more
  alternatives:
  - by much more
  - far more
  lexicon: BDAG
  rationale: This is the standard comparative intensifier. 'Much more' is both accurate
    and idiomatic.
