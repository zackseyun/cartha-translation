theological_decisions:
- issue: Nature of the contrast between the old and new covenant ministries
  chosen_reading: The verse contrasts a ministry that was temporary and passing with
    one that remains, without importing extra doctrinal conclusions beyond Paul's
    wording.
  alternative_readings:
  - A stricter rendering could foreground abolition ('being brought to an end') rather
    than fading.
  - A more interpretive rendering could explicitly identify the old and new covenants
    in the verse itself.
  rationale: The Greek uses neuter substantival participles rather than naming the
    covenants explicitly in this verse. The translation preserves Paul's rhetoric
    and leaves the fuller identification to context.
  doctrine_reference: Preserve theological tension rather than resolve it.
