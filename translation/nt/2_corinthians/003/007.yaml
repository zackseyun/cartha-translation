theological_decisions:
- issue: Whether καταργουμένην should be rendered in a more abstract theological sense
    ("being brought to an end") or as a visible diminishment ("fading away").
  chosen_reading: which was fading away
  alternative_readings:
  - which was being brought to an end
  - which was passing away
  rationale: The immediate context is the visible glory on Moses’ face, so "fading
    away" best reflects the experiential sense for readers while still preserving
    Paul’s broader point that the old covenant glory was temporary.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    context-driven variance.
