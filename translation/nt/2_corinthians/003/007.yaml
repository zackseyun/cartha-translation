id: 2CO.3.7
reference: 2 Corinthians 3:7
source:
  edition: SBLGNT
  text: Εἰ δὲ ἡ διακονία τοῦ θανάτου ἐν ⸀γράμμασιν ⸀ἐντετυπωμένη λίθοις ἐγενήθη ἐν
    δόξῃ, ὥστε μὴ δύνασθαι ἀτενίσαι τοὺς υἱοὺς Ἰσραὴλ εἰς τὸ πρόσωπον Μωϋσέως διὰ
    τὴν δόξαν τοῦ προσώπου αὐτοῦ τὴν καταργουμένην,
translation:
  text: But if the ministry of death, engraved in letters on stones, came with glory,
    so that the sons of Israel were not able to gaze at Moses’ face because of the
    glory of his face, which was fading away,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "which was being brought to an end" or "which was passing away."
    reason: alternative_reading
  - marker: b
    text: '"The sons of Israel" could be rendered "the Israelites," but the masculine
      expression is retained to reflect the Greek more closely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονία
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: '"Ministry" best fits Paul’s covenantal contrast here, preserving both
    the idea of service and an entrusted administrative role.'
- source_word: τοῦ θανάτου
  chosen: of death
  alternatives:
  - bringing death
  - that results in death
  lexicon: BDAG
  rationale: The genitive is kept compactly as "of death" to preserve Paul’s sharp
    expression without interpretive expansion.
- source_word: ἐν γράμμασιν
  chosen: in letters
  alternatives:
  - in written letters
  - in writing
  lexicon: BDAG
  rationale: A formal rendering preserves the likely contrast with the Spirit in the
    surrounding context while staying natural in English.
- source_word: ἐντετυπωμένη λίθοις
  chosen: engraved in letters on stones
  alternatives:
  - inscribed on stones
  - engraved on stone tablets
  lexicon: BDAG
  rationale: The participle indicates something impressed or engraved, and λίθοις
    is literally "stones." "Stone tablets" is interpretive and not explicit in the
    Greek, so "stones" is retained.
- source_word: ἐγενήθη ἐν δόξῃ
  chosen: came with glory
  alternatives:
  - came in glory
  - was inaugurated with glory
  lexicon: BDAG
  rationale: '"Came with glory" is idiomatic English that still reflects the eventive
    force of ἐγενήθη and the accompanying sense of ἐν δόξῃ.'
- source_word: ὥστε μὴ δύνασθαι ἀτενίσαι
  chosen: so that ... were not able to gaze
  alternatives:
  - so that ... could not look steadily
  - so that ... were unable to stare
  lexicon: BDAG
  rationale: This preserves both the result clause and the force of ἀτενίζω as fixed
    or intent looking.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the masculine expression is preserved
    rather than flattened to the more generic "Israelites."
- source_word: εἰς τὸ πρόσωπον Μωϋσέως
  chosen: at Moses’ face
  alternatives:
  - into the face of Moses
  - at the face of Moses
  lexicon: BDAG
  rationale: English idiom favors "gaze at Moses’ face" while preserving the concrete
    focus on his face.
- source_word: καταργουμένην
  chosen: fading away
  alternatives:
  - being brought to an end
  - passing away
  lexicon: BDAG
  rationale: In this context of visible glory associated with Moses’ face, "fading
    away" communicates the participle naturally while preserving the temporary character
    Paul emphasizes.
