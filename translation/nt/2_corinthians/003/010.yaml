id: 2CO.3.10
reference: 2 Corinthians 3:10
source:
  edition: SBLGNT
  text: καὶ γὰρ οὐ δεδόξασται τὸ δεδοξασμένον ἐν τούτῳ τῷ μέρει ⸀εἵνεκεν τῆς ὑπερβαλλούσης
    δόξης·
translation:
  text: For indeed, what had been glorified has not been glorified in this respect,
    because of the glory that surpasses it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the surpassing glory.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - For
  - Indeed
  - In fact
  rationale: The combination is mildly emphatic and explanatory. “For indeed” preserves
    both the connective force of γὰρ and the reinforcing force of καί without sounding
    overly stiff.
- source_word: δεδόξασται
  chosen: has not been glorified
  alternatives:
  - has had no glory
  - has not come into glory
  lexicon: BDAG
  rationale: The perfect passive is retained with “has not been glorified,” preserving
    the verbal form and the paradoxical force of Paul’s comparison rather than flattening
    it into a simple adjectival statement.
- source_word: τὸ δεδοξασμένον
  chosen: what had been glorified
  alternatives:
  - the thing that had been glorified
  - what was glorious
  lexicon: BDAG
  rationale: The articular perfect participle is rendered substantivally as “what
    had been glorified.” This preserves the comparison with the former covenantal
    glory without adding an explicit noun not present in Greek.
- source_word: ἐν τούτῳ τῷ μέρει
  chosen: in this respect
  alternatives:
  - in this matter
  - in this case
  lexicon: BDAG
  rationale: This idiom marks the limited frame of comparison. “In this respect” is
    idiomatic modern English and preserves the sense that the earlier glory is relativized,
    not absolutely denied.
- source_word: εἵνεκεν
  chosen: because of
  alternatives:
  - on account of
  - in view of
  lexicon: BDAG
  rationale: “Because of” gives the clearest causal sense in natural English.
- source_word: τῆς ὑπερβαλλούσης δόξης
  chosen: the glory that surpasses it
  alternatives:
  - the surpassing glory
  - the glory that excels
  lexicon: BDAG
  rationale: The participle ὑπερβαλλούσης is rendered verbally with “that surpasses
    it” to make the comparative force explicit in English. “It” is supplied to clarify
    that the new glory surpasses the former one in context.
- source_word: δόξα / δεδοξασμένον wordplay
  chosen: glorified ... glory
  alternatives:
  - glorious ... glory
  lexicon: BDAG
  rationale: Keeping the shared δοξ- word group visible reflects Paul’s rhetoric and
    preserves the conceptual link between the prior state of being glorified and the
    superior glory now in view.
