theological_decisions:
- issue: Whether Paul is absolutely denying glory to the former covenantal ministry
    or speaking comparatively.
  chosen_reading: 'Comparative denial within a stated respect: the former glory is
    treated as no glory relative to the surpassing glory.'
  alternative_readings:
  - Absolute denial that the former ministry had any real glory
  rationale: The phrase “in this respect” qualifies the negation, and the wider context
    in 2 Corinthians 3 affirms that the earlier ministry did have glory, though it
    is eclipsed by the greater glory of the new covenant.
