  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_corinthians/003/003.json
  category: awkward_english
  tier: 1
  from: tablets of hearts of flesh
  to: tablets—hearts of flesh
  rationale: 'The Greek construction is appositional: ''on tablets, which are hearts
    of flesh'' (ἐν πλαξὶν καρδίαις σαρκίναις). The draft''s ''tablets of hearts of
    flesh'' renders this as a slightly awkward chain of genitives. Using an em-dash
    (''tablets—hearts of flesh'') or a similar construction (''tablets that are hearts
    of flesh'') would more accurately and elegantly represent the Greek grammar, clarifying
    that the tablets *are* the hearts.'
