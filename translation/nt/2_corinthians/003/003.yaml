theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: from the Messiah
  alternative_readings:
  - of Christ
  - from Christ
  rationale: 'The project defaults Χριστός to ''Messiah'' when functioning as a title.
    The genitive likely indicates source or authorship in the letter metaphor: the
    Corinthians are a letter originating from the Messiah, with Paul as the delivering
    agent.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Capitalization of πνεύματι
  chosen_reading: the Spirit of the living God
  alternative_readings:
  - the spirit of the living God
  rationale: In context Paul contrasts old-covenant external writing with divine inward
    writing, which strongly favors reference to the Holy Spirit rather than an impersonal
    force.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; here the context sufficiently supports a specific reading'
