id: 2CO.3.3
reference: 2 Corinthians 3:3
source:
  edition: SBLGNT
  text: φανερούμενοι ὅτι ἐστὲ ἐπιστολὴ Χριστοῦ διακονηθεῖσα ὑφ’ ἡμῶν, ἐγγεγραμμένη
    οὐ μέλανι ἀλλὰ πνεύματι θεοῦ ζῶντος, οὐκ ἐν πλαξὶν λιθίναις ἀλλ’ ἐν πλαξὶν καρδίαις
    σαρκίναις.
translation:
  text: showing that you are a letter from the Messiah, ministered by us, written
    not with ink but with the Spirit of the living God, not on stone tablets but on
    tablets of hearts of flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a letter of Christ.' The Greek genitive can be read more literally that
      way; the main text renders the likely sense of source/authorship as 'from the
      Messiah.'
    reason: alternative_reading
  - marker: b
    text: '''Messiah'' translates the title Χριστός; traditionally, ''Christ.'''
    reason: lexical_alternative
  - marker: c
    text: '''Hearts of flesh'' echoes Old Testament new-covenant imagery, especially
      Ezekiel 11:19 and 36:26.'
    reason: cross_reference
  - marker: d
    text: Or 'tablets of hearts of flesh'.
    reason: previous_rendering
lexical_decisions:
- source_word: φανερούμενοι
  chosen: showing
  alternatives:
  - being shown
  - being made evident
  lexicon: BDAG
  rationale: A participial expression continuing Paul’s thought; 'showing' is concise,
    natural English that preserves the sense of being openly evident.
- source_word: ἐπιστολὴ
  chosen: letter
  alternatives:
  - epistle
  lexicon: BDAG
  rationale: '''Letter'' is the plain modern equivalent and fits the metaphor without
    archaic church diction.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  - the Christ
  lexicon: BDAG
  rationale: Following the project’s stated default for Χριστός as a title, 'Messiah'
    preserves the title’s meaning better than the name-like traditional 'Christ.'
    In this context the genitive is rendered as source, hence 'from the Messiah.'
- source_word: διακονηθεῖσα
  chosen: delivered
  alternatives:
  - ministered
  - served
  - conveyed
  lexicon: BDAG
  rationale: In the letter metaphor, 'delivered' best communicates that Paul and his
    coworkers functioned as agents through whom the letter came, without importing
    modern ecclesial overtones from 'ministered.'
- source_word: ἐγγεγραμμένη
  chosen: written
  alternatives:
  - inscribed
  lexicon: BDAG
  rationale: '''Written'' is the most natural English equivalent and works well with
    the ink/Spirit contrast; ''inscribed'' is possible but less idiomatic here.'
- source_word: μέλανι
  chosen: ink
  lexicon: BDAG
  rationale: Direct lexical equivalent in the writing metaphor.
- source_word: πνεύματι θεοῦ ζῶντος
  chosen: the Spirit of the living God
  alternatives:
  - the spirit of the living God
  lexicon: BDAG
  rationale: The contrast with ink and the covenantal context point to God’s Holy
    Spirit rather than a mere disposition or breath, so 'Spirit' is capitalized. 'Living
    God' preserves the genitive phrase fully.
- source_word: πλαξὶν λιθίναις
  chosen: stone tablets
  alternatives:
  - tablets of stone
  lexicon: BDAG
  rationale: Natural English equivalent that preserves the allusion to the Sinai tablets.
- source_word: πλαξὶν καρδίαις σαρκίναις
  chosen: tablets of hearts of flesh
  alternatives:
  - tablets of fleshly hearts
  - human hearts as tablets
  lexicon: BDAG
  rationale: This keeps the metaphor and preserves the Ezekiel-like wording 'hearts
    of flesh.' More idiomatic options were possible, but this rendering stays closer
    to the Greek imagery without flattening the biblical allusion.
