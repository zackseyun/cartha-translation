theological_decisions:
- issue: Whether to supply an explicit subject such as 'a person' or 'someone' for
    the indefinite verb
  chosen_reading: Leave the subject implicit in English as 'one' within 'whenever
    one turns to the Lord'
  alternative_readings:
  - But whenever someone turns to the Lord, the veil is removed.
  - But whenever a person turns to the Lord, the veil is removed.
  rationale: The Greek has an indefinite singular verb without an explicit noun. Supplying
    'one' makes the English grammatical while preserving the general, non-specific
    force without importing a narrower theological claim about corporate or individual
    scope.
- issue: Identity of 'the Lord' in context
  chosen_reading: Render simply as 'the Lord' without specifying 'Christ' or 'the
    Spirit' in the translation line
  alternative_readings:
  - the Lord Christ
  - the Lord, that is, the Spirit
  rationale: The immediate broader context involves a complex Pauline linkage between
    the Lord and the Spirit, but this verse itself says only κύριον. The translation
    should preserve that textual restraint rather than resolve the interpretive question
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
