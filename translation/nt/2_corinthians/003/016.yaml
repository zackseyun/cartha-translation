id: 2CO.3.16
reference: 2 Corinthians 3:16
source:
  edition: SBLGNT
  text: ἡνίκα ⸂δὲ ἐὰν⸃ ἐπιστρέψῃ πρὸς κύριον, περιαιρεῖται τὸ κάλυμμα.
translation:
  text: But whenever one turns to the Lord, the veil is removed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when one turns to the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the veil is taken away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡνίκα
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Introduces a temporal clause with iterative force; 'whenever' best reflects
    the repeated or indefinite sense in clear English.
- source_word: δὲ ἐὰν
  chosen: but whenever
  alternatives:
  - but when
  - now whenever
  lexicon: BDAG
  rationale: Together with ἡνίκα and the subjunctive, this combination yields an indefinite
    temporal sense. 'But' preserves the connective δέ, while 'whenever' reflects the
    contingency/iterative nuance.
- source_word: ἐπιστρέψῃ
  chosen: turns
  alternatives:
  - turns back
  - returns
  - converts
  lexicon: BDAG
  rationale: Aorist subjunctive after an indefinite temporal expression is naturally
    rendered in English as a simple present. 'Turns' is broad and transparent, preserving
    the metaphor without over-specifying repentance or conversion.
- source_word: πρὸς κύριον
  chosen: to the Lord
  alternatives:
  - toward the Lord
  lexicon: BDAG
  rationale: πρός with the accusative marks direction toward a person. 'To the Lord'
    is idiomatic and sufficiently preserves that directional sense.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. 'Lord'
    fits both Pauline usage and the likely allusion to Exodus in this context.
- source_word: περιαιρεῖται
  chosen: is removed
  alternatives:
  - is taken away
  lexicon: BDAG
  rationale: Present passive indicative states what happens to the veil when one turns
    to the Lord. 'Is removed' is natural English and accurately reflects passive voice
    without adding an explicit agent.
- source_word: τὸ κάλυμμα
  chosen: the veil
  alternatives:
  - the covering
  lexicon: BDAG
  rationale: In this context Paul is echoing the veil motif from Moses; 'veil' is
    the established and contextually precise rendering, more specific than the broader
    'covering'.
