theological_decisions:
- issue: Meaning of 'he made him ... to be sin'
  chosen_reading: The verse speaks of God treating the sinless one representatively
    with respect to sin for our sake, without implying that Christ became sinful.
  alternative_readings:
  - Christ became a sin offering
  - Christ was made sinful in a literal moral sense
  rationale: Historic orthodoxy requires preserving Christ's sinlessness, which the
    first clause explicitly states. The main translation keeps Paul's wording 'to
    be sin' rather than resolving it in the text, while excluding the morally sinful
    reading as contrary to the immediate context and orthodox Christology. The sacrificial
    reading is preserved in a footnote as a plausible interpretive alternative.
  doctrine_reference: 'Affirmations: Chalcedonian orthodoxy; Translation philosophy
    §3 preserve theological tension rather than resolve it'
- issue: Force of 'δικαιοσύνη θεοῦ'
  chosen_reading: The phrase is left as 'the righteousness of God' without specifying
    whether it means God's own righteousness, righteousness from God, or covenant
    status before God.
  alternative_readings:
  - righteousness from God
  - God's covenant justice
  rationale: Paul's phrase is theologically dense and debated. The translation preserves
    the ambiguity in the main text, with 'justice' noted as a lexical alternative
    per doctrine defaults, rather than collapsing it into one doctrinal scheme.
  doctrine_reference: Translation philosophy §3; Contested terms table for δικαιοσύνη
