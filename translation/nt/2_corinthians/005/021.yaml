id: 2CO.5.21
reference: 2 Corinthians 5:21
source:
  edition: SBLGNT
  text: ⸀τὸν μὴ γνόντα ἁμαρτίαν ὑπὲρ ἡμῶν ἁμαρτίαν ἐποίησεν, ἵνα ἡμεῖς γενώμεθα δικαιοσύνη
    θεοῦ ἐν αὐτῷ.
translation:
  text: He made the one who did not know sin to be sin for us, so that in him we might
    become the righteousness of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sin offering.' The Greek says 'sin' both times; some understand the
      second occurrence sacrificially.
    reason: alternative_reading
  - marker: b
    text: Or 'justice of God' or 'righteousness from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντα
  chosen: did not know
  alternatives:
  - had not known
  - did not experience
  lexicon: BDAG
  rationale: γινώσκω normally means 'to know.' In this context it expresses that Christ
    had no acquaintance with sin in the sense of personal participation. 'Did not
    know sin' preserves the Greek idiom without over-paraphrasing to 'did not commit
    sin,' though that implication is present.
- source_word: ἁμαρτίαν (first occurrence)
  chosen: sin
  lexicon: BDAG
  rationale: The object of γνόντα is straightforwardly 'sin.' Retaining the abstract
    noun preserves Paul's compressed formulation rather than expanding it interpretively.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - for our sake
  lexicon: BDAG
  rationale: ὑπέρ here conveys representative/benefactive force. 'For us' is natural
    English and preserves the breadth of the preposition without prematurely narrowing
    it to one atonement model.
- source_word: ἁμαρτίαν (second occurrence)
  chosen: sin
  alternatives:
  - sin offering
  lexicon: BDAG; LSJ
  rationale: The repeated noun is rendered consistently as 'sin.' While some argue
    for the sacrificial sense 'sin offering' by Semitic background and contextual
    theology, the Greek text itself says 'sin,' and optimal equivalence favors preserving
    Paul's stark wording in the main text while noting the alternative in a footnote.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - appointed
  - caused to be
  lexicon: BDAG
  rationale: ποιέω here is best rendered 'made,' the standard and sufficiently broad
    English equivalent. It preserves the force of divine action without importing
    metaphysical precision beyond the text.
- source_word: γενώμεθα
  chosen: might become
  alternatives:
  - might be made
  - might come to be
  lexicon: BDAG
  rationale: The aorist middle subjunctive of γίνομαι is well represented by 'might
    become.' This fits the ἵνα purpose clause and avoids flattening the verbal nuance
    into a static 'be.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, with 'justice' preserved as an alternative in a footnote for Pauline
    usage. Here 'righteousness' best matches Paul's covenantal and forensic-theological
    register.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is left formally open as 'of God,' preserving Paul's compact
    expression and its possible nuances (source, possession, or relation) rather than
    resolving the ambiguity interpretively.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in union with him
  lexicon: BDAG
  rationale: '''In him'' is the natural and theologically important Pauline expression.
    Expanding to ''in union with him'' would be interpretive; the concise wording
    preserves the source idiom.'
