theological_decisions:
- issue: Whether to make explicit the implied complement of 'at home'/'away' from
    the surrounding context
  chosen_reading: Keep the concise expression 'whether at home or away' in the main
    text
  alternative_readings:
  - whether at home in the body or away from the body
  - whether present with the body or absent from it
  rationale: The immediate context clearly concerns bodily residence and absence,
    but the Greek in this verse leaves the complements unstated. Preserving the terseness
    maintains the textual form and avoids importing more than the verse itself says,
    while the contextual sense can be preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
