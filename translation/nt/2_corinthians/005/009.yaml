id: 2CO.5.9
reference: 2 Corinthians 5:9
source:
  edition: SBLGNT
  text: διὸ καὶ φιλοτιμούμεθα, εἴτε ἐνδημοῦντες εἴτε ἐκδημοῦντες, εὐάρεστοι αὐτῷ εἶναι.
translation:
  text: Therefore we also make it our ambition, whether at home or away, to be pleasing
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the context, 'whether at home in the body or away
      from the body.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding discussion about present bodily
    life and future presence with the Lord; 'Therefore' is natural and sufficiently
    formal.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: Adds emphasis/continuity to Paul's statement; 'also' fits the connective
    force without overtranslating.
- source_word: φιλοτιμούμεθα
  chosen: we make it our ambition
  alternatives:
  - we are ambitious
  - we strive eagerly
  - we make it our aim
  lexicon: BDAG
  rationale: The verb conveys aspiring earnestly or making it one's ambition. 'Make
    it our ambition' is idiomatic modern English and preserves the intentional force
    better than the flatter 'we aim.'
- source_word: εἴτε ἐνδημοῦντες εἴτε ἐκδημοῦντες
  chosen: whether at home or away
  alternatives:
  - whether at home in the body or away from it
  - whether present or absent
  lexicon: BDAG
  rationale: The paired participles literally mean being at home / being away. In
    the immediate context (vv. 6–8) they refer to being at home in the body versus
    away from the body, but Paul omits the explicit complements here. 'At home or
    away' preserves the concise Greek while allowing the context to supply the sense.
- source_word: εὐάρεστοι
  chosen: pleasing
  alternatives:
  - acceptable
  - well-pleasing
  lexicon: BDAG
  rationale: Describes what is pleasing or acceptable to God. 'Pleasing' is clear
    modern English and avoids the slightly stilted 'well-pleasing' while preserving
    the relational sense.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to the Lord
  lexicon: BDAG
  rationale: The pronoun refers back contextually to the Lord/God already in view.
    The Greek uses a pronoun, so 'to him' is the most direct rendering.
- source_word: εἶναι
  chosen: to be
  lexicon: BDAG
  rationale: 'Infinitive complement completing the sense of Paul''s ambition: the
    goal is ''to be pleasing to him.'''
