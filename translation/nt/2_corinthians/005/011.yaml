theological_decisions:
- issue: Meaning of 'fear of the Lord' in context
  chosen_reading: Retain 'fear' rather than interpretively softening to 'reverence.'
  alternative_readings:
  - reverence for the Lord
  rationale: The immediate context of divine judgment (2 Cor 5:10) supports a robust
    sense of awe and accountability. Translating as 'reverence' alone risks muting
    the text's force.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of φανερόω in relation to God and the Corinthians
  chosen_reading: Render as 'made known' rather than more literal but less idiomatic
    'manifested.'
  alternative_readings:
  - manifested
  - revealed
  rationale: This preserves the idea that Paul's true character/ministry stands openly
    exposed before God and, he hopes, before the Corinthians' consciences, without
    importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §6
