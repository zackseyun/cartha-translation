theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine guidelines prefer translating Χριστός as 'Messiah' where
    title is in view. In this verse the term identifies the mediatorial office through
    which God reconciles, so the titular sense is active rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Scope of ἡμᾶς / ἡμῖν
  chosen_reading: us
  alternative_readings:
  - us believers generally
  - us apostles specifically
  rationale: The Greek leaves the immediate referent broad enough to include Paul
    and his fellow believers, though the surrounding context also narrows toward apostolic
    commission. The translation preserves the text's wording without resolving the
    interpretive scope in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
