id: 2CO.5.4
reference: 2 Corinthians 5:4
source:
  edition: SBLGNT
  text: καὶ γὰρ οἱ ὄντες ἐν τῷ σκήνει στενάζομεν βαρούμενοι ἐφ’ ᾧ οὐ θέλομεν ἐκδύσασθαι
    ἀλλ’ ἐπενδύσασθαι, ἵνα καταποθῇ τὸ θνητὸν ὑπὸ τῆς ζωῆς.
translation:
  text: For indeed, while we are in this tent, we groan, being burdened, because we
    do not want to be unclothed but to be further clothed, so that what is mortal
    may be swallowed up by life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be clothed over.' The Greek verb suggests putting on an outer garment
      over what is already worn.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mortal' or 'mortality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκήνει
  chosen: tent
  alternatives:
  - earthly tent
  - dwelling
  lexicon: BDAG
  rationale: σκῆνος is a metaphor for the present bodily existence in this context.
    'Tent' preserves Paul's imagery and links with the surrounding passage better
    than a flattened 'dwelling.'
- source_word: στενάζομεν
  chosen: we groan
  alternatives:
  - we sigh
  lexicon: BDAG
  rationale: '''Groan'' best conveys the weight and eschatological longing in Paul''s
    language; ''sigh'' is too weak.'
- source_word: βαρούμενοι
  chosen: being burdened
  alternatives:
  - weighed down
  - oppressed
  lexicon: BDAG
  rationale: The participle explains the cause or condition accompanying the groaning.
    'Being burdened' is natural English and preserves the passive sense.
- source_word: ἐφ’ ᾧ
  chosen: because
  alternatives:
  - for this reason
  - in that
  - on which account
  lexicon: BDAG
  rationale: Here the phrase most naturally introduces the reason for the groaning.
    'Because' gives the sense clearly in modern English without over-literal awkwardness.
- source_word: ἐκδύσασθαι
  chosen: to be unclothed
  alternatives:
  - to be stripped off
  lexicon: BDAG
  rationale: The clothing metaphor should be preserved. 'Unclothed' communicates the
    metaphorical state Paul rejects without adding interpretive detail.
- source_word: ἐπενδύσασθαι
  chosen: to be further clothed
  alternatives:
  - to be clothed over
  - to put on over
  lexicon: BDAG
  rationale: The compound verb suggests putting on an additional garment over what
    is already worn. 'Further clothed' is idiomatic while preserving the comparative
    force.
- source_word: καταποθῇ
  chosen: may be swallowed up
  alternatives:
  - may be consumed
  - may be overwhelmed
  lexicon: BDAG
  rationale: '''Swallowed up'' is vivid, traditional, and closely matches the metaphor
    of complete overcoming.'
- source_word: τὸ θνητόν
  chosen: what is mortal
  alternatives:
  - the mortal
  - mortality
  lexicon: BDAG
  rationale: The neuter adjective functions substantivally. 'What is mortal' is clear
    and preserves the broad reference to mortal existence rather than only an abstract
    quality.
- source_word: ζωῆς
  chosen: life
  alternatives:
  - the life
  lexicon: BDAG
  rationale: Anarthrous English 'life' is the most natural rendering and fits the
    contrast with mortality.
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - For also
  - Indeed
  lexicon: BDAG
  rationale: This combination connects the verse to the prior argument and adds emphasis.
    'For indeed' preserves both the explanatory and emphatic force.
