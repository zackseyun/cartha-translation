theological_decisions:
- issue: Paul's clothing metaphor and intermediate state
  chosen_reading: Retain the metaphor of being 'unclothed' and 'further clothed' without
    specifying a doctrinal scheme about the intermediate state.
  alternative_readings:
  - Interpret 'unclothed' explicitly as disembodied existence
  - Interpret 'further clothed' explicitly as resurrection body only
  rationale: The verse uses metaphorical language about bodily existence and future
    transformation. The translation preserves the imagery and theological tension
    rather than resolving debated questions beyond what the Greek states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
