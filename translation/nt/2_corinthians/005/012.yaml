id: 2CO.5.12
reference: 2 Corinthians 5:12
source:
  edition: SBLGNT
  text: ⸀οὐ πάλιν ἑαυτοὺς συνιστάνομεν ὑμῖν, ἀλλὰ ἀφορμὴν διδόντες ὑμῖν καυχήματος
    ὑπὲρ ἡμῶν, ἵνα ἔχητε πρὸς τοὺς ἐν προσώπῳ καυχωμένους καὶ ⸂μὴ ἐν⸃ καρδίᾳ.
translation:
  text: We are not commending ourselves to you again, but giving you an opportunity
    to boast on our behalf, so that you may have an answer for those who boast in
    outward appearance and not in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an occasion for boasting about us.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who boast in face and not in heart,' that is, who boast
      in outward appearance rather than inward reality.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιστάνομεν
  chosen: are commending
  alternatives:
  - are recommending
  - are presenting
  lexicon: BDAG
  rationale: In Pauline usage, συνίστημι here refers to commending or recommending
    oneself. 'Commending ourselves' fits the immediate context of Paul denying self-promotion
    while preserving the relational sense toward the Corinthians.
- source_word: ἀφορμὴν
  chosen: opportunity
  alternatives:
  - occasion
  - basis
  lexicon: BDAG
  rationale: ἀφορμή can denote a starting point, occasion, or opportunity. 'Opportunity'
    is idiomatic in English and fits the sense that Paul is furnishing the Corinthians
    with grounds to respond.
- source_word: καυχήματος
  chosen: to boast
  alternatives:
  - for boasting
  - for pride
  lexicon: BDAG
  rationale: 'The genitive after ἀφορμή is rendered idiomatically with an infinitive
    in English: ''an opportunity to boast.'' This preserves the semantic field of
    καύχημα without awkwardness.'
- source_word: ὑπὲρ ἡμῶν
  chosen: on our behalf
  alternatives:
  - about us
  - for us
  lexicon: BDAG
  rationale: ὑπέρ here most naturally means representation or advocacy rather than
    mere topic. 'On our behalf' captures that Paul wants the Corinthians equipped
    to speak in his defense.
- source_word: ἵνα ἔχητε πρὸς
  chosen: so that you may have an answer for
  alternatives:
  - so that you may have something for
  - so that you may have a response to
  lexicon: BDAG
  rationale: The idiom ἔχειν πρός τινα can mean to have something to say in relation
    to someone. 'Have an answer for' makes the implied apologetic or rebuttal sense
    explicit in natural English without overparaphrasing.
- source_word: ἐν προσώπῳ
  chosen: in outward appearance
  alternatives:
  - in face
  - by appearances
  - in what is seen
  lexicon: BDAG
  rationale: The phrase contrasts external show with inner reality. 'In outward appearance'
    communicates the idiomatic sense clearly in English and prepares for the antithesis
    with 'in heart.'
- source_word: καυχωμένους
  chosen: those who boast
  alternatives:
  - those who take pride
  - those who glory
  lexicon: BDAG
  rationale: καυχάομαι commonly means boast or take pride. 'Boast' keeps the verbal
    link with καυχήματος earlier in the verse and preserves Paul's rhetorical contrast.
- source_word: καρδίᾳ
  chosen: heart
  alternatives:
  - inner self
  lexicon: BDAG
  rationale: '''Heart'' is the standard and theologically resonant rendering for καρδία,
    especially in a contrast between outward appearance and inward reality.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν marks repetition; 'again' is the natural English equivalent and
    preserves Paul's denial that he is repeating self-commendation.
