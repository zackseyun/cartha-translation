theological_decisions:
- issue: Meaning of the contrast ἐν προσώπῳ ... καὶ μὴ ἐν καρδίᾳ
  chosen_reading: A contrast between external appearance and inward reality
  alternative_readings:
  - A contrast between public reputation and sincerity
  - A contrast between face-to-face presence and inner disposition
  rationale: The immediate rhetorical setting in 2 Corinthians repeatedly contrasts
    externals with what is genuine before God. Rendering the phrase as 'outward appearance
    ... heart' preserves that theological and moral contrast without importing a narrower
    doctrinal claim.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
