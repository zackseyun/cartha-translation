id: 2CO.5.3
reference: 2 Corinthians 5:3
source:
  edition: SBLGNT
  text: ⸂εἴ γε⸃ καὶ ⸀ἐνδυσάμενοι οὐ γυμνοὶ εὑρεθησόμεθα.
translation:
  text: if indeed, after being clothed, we will not be found naked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if indeed, having put it on, we will not be found unclothed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  chosen: if indeed
  alternatives:
  - if at least
  - if really
  lexicon: BDAG
  rationale: The combination introduces a conditional statement with an emphatic or
    confirmatory nuance. 'If indeed' preserves both the conditional force of εἰ and
    the strengthening particle γε without overinterpreting the clause.
- source_word: καὶ
  chosen: after
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Although καί commonly means 'and/also/even,' in this construction with
    the participle ἐνδυσάμενοι it is best taken adverbially to intensify or connect
    the participial idea. In English, 'after being clothed' best conveys the temporal/logical
    sense of the clause in context, avoiding a wooden 'and having put on' while preserving
    the participial relationship.
- source_word: ἐνδυσάμενοι
  chosen: after being clothed
  alternatives:
  - having put on
  - having been clothed
  lexicon: BDAG
  rationale: The aorist middle participle of ἐνδύω literally means 'having clothed
    ourselves/put on.' In the immediate context of heavenly dwelling imagery, English
    idiom favors 'being clothed.' 'After being clothed' captures the participial action
    as antecedent to the future verb and fits Paul's metaphor of being further clothed.
- source_word: οὐ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation of the future passive verb; no special nuance requires
    expansion.
- source_word: γυμνοὶ
  chosen: naked
  alternatives:
  - unclothed
  lexicon: BDAG
  rationale: γυμνός literally means 'naked.' Because the verse continues Paul's clothing
    metaphor, 'naked' is the most direct rendering. 'Unclothed' is possible and somewhat
    interpretive; it is preserved in a footnote as a lexical alternative.
- source_word: εὑρεθησόμεθα
  chosen: we will be found
  alternatives:
  - we will prove to be
  - we will be discovered
  lexicon: BDAG
  rationale: Future passive of εὑρίσκω here idiomatically means 'be found' or 'be
    shown to be.' 'We will be found' is the most natural and sufficiently formal English
    rendering.
