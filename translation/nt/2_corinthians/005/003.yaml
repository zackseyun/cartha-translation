theological_decisions:
- issue: Meaning of the clothing/nakedness metaphor
  chosen_reading: Retain the metaphor without resolving whether 'naked' refers specifically
    to a disembodied intermediate state, eschatological shame, or lack of resurrection
    embodiment.
  alternative_readings:
  - '''naked'' as disembodied existence between death and resurrection'
  - '''naked'' as being without the heavenly dwelling/body'
  - '''naked'' as a metaphor for shame or exposure before God'
  rationale: The Greek text itself does not explicitly define the metaphor's full
    theological referent in this verse. In keeping with the translation philosophy,
    the rendering preserves Paul's imagery and tension rather than importing a specific
    doctrinal explanation into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
