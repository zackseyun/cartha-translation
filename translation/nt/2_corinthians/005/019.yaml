id: 2CO.5.19
reference: 2 Corinthians 5:19
source:
  edition: SBLGNT
  text: ὡς ὅτι θεὸς ἦν ἐν Χριστῷ κόσμον καταλλάσσων ἑαυτῷ, μὴ λογιζόμενος αὐτοῖς τὰ
    παραπτώματα αὐτῶν, καὶ θέμενος ἐν ἡμῖν τὸν λόγον τῆς καταλλαγῆς.
translation:
  text: namely, that God was in Christ reconciling the world to himself, not counting
    their trespasses against them, and entrusting to us the message of reconciliation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God was in Christ reconciling the world to himself.'
    reason: alternative_reading
  - marker: b
    text: Or, 'among us' or 'to us' for 'in us.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the word of reconciliation.'
    reason: lexical_alternative
  - marker: d
    text: Or 'that is, that'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὡς ὅτι
  chosen: that is, that
  alternatives:
  - namely, that
  - how that
  lexicon: BDAG
  rationale: Taken together as an explanatory formula introducing the content of Paul's
    statement. 'That is, that' preserves the appositional/explanatory force without
    sounding overly archaic.
- source_word: θεὸς ἦν ἐν Χριστῷ
  chosen: God was in Messiah
  alternatives:
  - God was in Christ
  - God was through Messiah
  lexicon: BDAG
  rationale: Rendered straightforwardly with ἐν as 'in.' 'Messiah' is preferred for
    Χριστός as a title per doctrine guidance. The phrase is left as written, preserving
    the theological tension of divine action in/through the Messiah rather than paraphrasing
    it into a more interpretive construction.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός here functions as a title rather than a name-like label, so 'Messiah'
    best preserves the meaning and aligns with the project's contested-terms guidance.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the cosmos
  - the people of the world
  lexicon: BDAG
  rationale: '''The world'' is the natural and sufficiently broad rendering in context,
    referring to humanity in its alienation from God rather than the physical universe
    alone.'
- source_word: καταλλάσσων
  chosen: reconciling
  alternatives:
  - bringing into reconciliation
  - restoring to favor
  lexicon: BDAG
  rationale: Present participle expressing the ongoing divine action. 'Reconciling'
    is the standard and clearest English equivalent and maintains lexical consistency
    with καταλλαγή later in the verse.
- source_word: ἑαυτῷ
  chosen: to himself
  alternatives:
  - to himself again
  lexicon: BDAG
  rationale: Dative reflexive pronoun indicating the direction of reconciliation toward
    God. 'To himself' is idiomatic and precise.
- source_word: μὴ λογιζόμενος
  chosen: not counting
  alternatives:
  - not reckoning
  - not imputing
  lexicon: BDAG
  rationale: '''Not counting'' communicates the accounting metaphor clearly in modern
    English without importing heavier theological jargon. Alternatives are valid but
    less accessible.'
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - offenses
  - sins
  lexicon: BDAG
  rationale: '''Trespasses'' preserves the nuance of wrongful acts/failings and fits
    the relational context of reconciliation. ''Sins'' is broader but less specific
    to παράπτωμα.'
- source_word: καὶ θέμενος
  chosen: and placing
  alternatives:
  - and entrusting
  - and putting
  lexicon: BDAG
  rationale: Aorist participle from τίθημι, literally 'having placed/put.' 'Placing'
    keeps the concrete verbal sense while fitting the idiom of committing a message
    to apostles. 'Entrusting' is interpretive and possible, but the more literal choice
    is preferred in the main text.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  - to us
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' rather than paraphrased. Because
    English readers may hear 'among us' or 'to us,' that alternative is preserved
    in a footnote. The main text preserves the Greek's wording and theological texture.
- source_word: τὸν λόγον τῆς καταλλαγῆς
  chosen: the message of reconciliation
  alternatives:
  - the word of reconciliation
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed content/message rather than a single
    'word.' 'Message of reconciliation' is clearer in contemporary English while preserving
    the genitival relation.
