theological_decisions:
- issue: Rendering Χριστῷ in a Pauline christological phrase
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title and the doctrine guidance directs translating
    titles to preserve meaning where context supports it. This does not diminish orthodox
    christology; it clarifies the title's semantic content.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Interpretation of θεὸς ἦν ἐν Χριστῷ
  chosen_reading: God was in Messiah
  alternative_readings:
  - God was through Messiah reconciling the world to himself
  - In Messiah, God was reconciling the world to himself
  rationale: The Greek permits closely related construals. The chosen rendering stays
    nearest to the wording of the text and preserves theological tension rather than
    resolving the phrase into a more explicit instrumental paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Interpretation of ἐν ἡμῖν
  chosen_reading: in us
  alternative_readings:
  - among us
  - to us
  rationale: The Greek preposition is most directly 'in.' Because the phrase may be
    understood corporately or ministerially, the main text preserves the literal expression
    and a footnote records the idiomatic alternative.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it'
