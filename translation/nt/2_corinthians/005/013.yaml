id: 2CO.5.13
reference: 2 Corinthians 5:13
source:
  edition: SBLGNT
  text: εἴτε γὰρ ἐξέστημεν, θεῷ· εἴτε σωφρονοῦμεν, ὑμῖν.
translation:
  text: For if we are out of our minds, it is for God; if we are of sound mind, it
    is for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'beside ourselves.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'sober-minded' / 'in our right mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε ... εἴτε
  chosen: if ... if
  alternatives:
  - whether ... or
  lexicon: BDAG
  rationale: Although εἴτε often introduces alternatives with 'whether ... or,' in
    this compressed rhetorical construction English reads more naturally with repeated
    'if,' matching Paul's explanatory contrast without losing the either/or force.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement; 'For'
    preserves the connective force in a natural Pauline style.
- source_word: ἐξέστημεν
  chosen: are out of our minds
  alternatives:
  - are beside ourselves
  - have gone mad
  lexicon: BDAG
  rationale: ἐξίστημι in this intransitive sense can mean to be beside oneself or
    out of one's mind. 'Are out of our minds' is idiomatic modern English and fits
    the present relevance of the aorist in this rhetorical summary. 'Beside ourselves'
    is more traditional but less transparent to modern readers.
- source_word: θεῷ
  chosen: for God
  alternatives:
  - to God
  - for God's sake
  lexicon: BDAG
  rationale: 'The dative here is elliptical and expresses reference/advantage: Paul''s
    point is that if his behavior appears ecstatic, it is directed toward God''s interests.
    ''For God'' is concise and natural; ''to God'' is possible but less idiomatic
    in English.'
- source_word: σωφρονοῦμεν
  chosen: are of sound mind
  alternatives:
  - are sober-minded
  - are in our right mind
  - are self-controlled
  lexicon: BDAG
  rationale: σωφρονέω denotes being sound-minded, sensible, or sober in judgment.
    'Are of sound mind' best matches the contrast with ἐξέστημεν while remaining clear
    and dignified.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  - for your sake
  lexicon: BDAG
  rationale: Like θεῷ, this dative is elliptical and indicates reference/benefit.
    'For you' clearly conveys that Paul's sober conduct serves the Corinthians' good.
