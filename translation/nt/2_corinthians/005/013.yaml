theological_decisions:
- issue: Interpretation of Paul's contrasting self-description
  chosen_reading: Paul contrasts behavior perceived as ecstatic or irrational with
    behavior recognized as sober, without endorsing literal madness.
  alternative_readings:
  - Paul refers to actual ecstatic religious experience
  - Paul speaks only hyperbolically about accusations from others
  rationale: The verse is rhetorically framed and elliptical. The translation preserves
    the sharp contrast in ordinary English without importing a technical doctrine
    of ecstasy or reducing the statement to mere insult. This maintains the text's
    tension and explanatory force.
  doctrine_reference: Preserve theological tension rather than resolve it.
