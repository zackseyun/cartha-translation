theological_decisions:
- issue: Meaning of κατὰ σάρκα in relation to people and to the Messiah
  chosen_reading: Rendered 'according to the flesh' in the main text, understood as
    according to merely human, earthly categories rather than as a denial of Christ's
    true humanity.
  alternative_readings:
  - according to worldly standards
  - from a human point of view
  rationale: 'The phrase should preserve Paul''s theological tension: there is a former
    mode of evaluating persons, including the Messiah, that is inadequate after the
    revelation of Christ. Translating with ''flesh'' keeps Paul''s terminology visible
    while avoiding an interpretation that would conflict with Chalcedonian Christology.
    The verse does not deny the incarnation; it rejects merely flesh-based evaluation.'
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon; Translation
    philosophy §§3, 5; Contested terms: σάρξ'
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    sense is active. This preserves the semantic content of the Greek title without
    importing a denominational reading.
  doctrine_reference: 'Translation philosophy §2; Contested terms: Χριστός'
