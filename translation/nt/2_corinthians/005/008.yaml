id: 2CO.5.8
reference: 2 Corinthians 5:8
source:
  edition: SBLGNT
  text: θαρροῦμεν δὲ καὶ εὐδοκοῦμεν μᾶλλον ἐκδημῆσαι ἐκ τοῦ σώματος καὶ ἐνδημῆσαι
    πρὸς τὸν κύριον·
translation:
  text: So we are confident and would rather be away from the body and at home with
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be absent from the body and be at home with the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαρροῦμεν
  chosen: we are confident
  alternatives:
  - we are of good courage
  - we take courage
  lexicon: BDAG
  rationale: Present indicative expressing settled courage/confidence. 'We are confident'
    is natural modern English and preserves the ongoing sense without archaic phrasing.
- source_word: δὲ
  chosen: So
  alternatives:
  - But
  - Now
  lexicon: BDAG
  rationale: Here δέ marks continuation/inference from the preceding argument rather
    than strong contrast. 'So' fits the discourse flow from vv. 6–7 into v. 8.
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  - also
  lexicon: BDAG
  rationale: Simple connective joining the two present verbs θαρροῦμεν and εὐδοκοῦμεν.
- source_word: εὐδοκοῦμεν
  chosen: would rather
  alternatives:
  - are well pleased
  - prefer
  lexicon: BDAG
  rationale: In this context of comparison with μᾶλλον, the sense is preference/delight
    in a desired state. 'Would rather' communicates volitional preference idiomatically
    in English.
- source_word: μᾶλλον
  chosen: rather
  alternatives:
  - instead
  - more
  lexicon: BDAG
  rationale: Comparative adverb modifying the preference expressed by εὐδοκοῦμεν;
    'rather' is the most natural English equivalent here.
- source_word: ἐκδημῆσαι
  chosen: be away
  alternatives:
  - be absent
  - depart
  lexicon: BDAG
  rationale: The verb literally means to be away from one's home/country. In Paul's
    body/home metaphor, 'be away' preserves the imagery without overinterpreting it
    as death by using 'depart'.
- source_word: ἐκ τοῦ σώματος
  chosen: from the body
  alternatives:
  - out of the body
  lexicon: BDAG
  rationale: The preposition ἐκ with genitive is straightforwardly rendered 'from.'
    'Body' should remain literal rather than paraphrased.
- source_word: ἐνδημῆσαι
  chosen: be at home
  alternatives:
  - be present
  - be in one's home
  lexicon: BDAG
  rationale: Paired antonym to ἐκδημῆσαι. 'Be at home' preserves Paul's metaphorical
    contrast between being away from one sphere and at home in another.
- source_word: πρὸς τὸν κύριον
  chosen: with the Lord
  alternatives:
  - with the Master
  - toward the Lord
  - at home with the Lord
  lexicon: BDAG
  rationale: κύριος follows the doctrinal default 'Lord.' Although πρός can be more
    literally 'toward/to,' in this idiom with ἐνδημῆσαι it expresses personal presence/association;
    'with the Lord' is the clearest English rendering. The phrase is integrated as
    'at home with the Lord' to reflect the destination of ἐνδημῆσαι.
