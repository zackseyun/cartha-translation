theological_decisions:
- issue: Whether to render Paul's language as an explicit doctrinal statement about
    the intermediate state beyond the verse's wording
  chosen_reading: Retain Paul's metaphor of being away from the body and at home with
    the Lord without adding explanatory language such as 'after death' or 'in heaven.'
  alternative_readings:
  - Paraphrasing as 'to die and go to be with the Lord in heaven'
  rationale: The verse strongly implies postmortem presence with the Lord, but the
    translation should not import terms not present in the Greek. Preserving the metaphor
    maintains theological tension and textual precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
