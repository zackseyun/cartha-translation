id: 2CO.5.6
reference: 2 Corinthians 5:6
source:
  edition: SBLGNT
  text: Θαρροῦντες οὖν πάντοτε καὶ εἰδότες ὅτι ἐνδημοῦντες ἐν τῷ σώματι ἐκδημοῦμεν
    ἀπὸ τοῦ κυρίου,
translation:
  text: Therefore, we are always confident and know that while we are at home in the
    body, we are away from the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'absent from the Lord.' The Greek verb ἐκδημοῦμεν is the counterpart
      to 'at home' and can be rendered 'be away' or 'be absent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρροῦντες
  chosen: we are ... confident
  alternatives:
  - being confident
  - taking courage
  lexicon: BDAG
  rationale: Present participle conveying an ongoing state of courage/confidence.
    Rendered with a finite verb in English for natural readability while preserving
    the durative sense in connection with the following clause.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding argument about resurrection life and
    the heavenly dwelling; 'Therefore' best preserves the logical connection.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Straightforward adverb indicating continual confidence.
- source_word: εἰδότες
  chosen: know
  alternatives:
  - being aware
  - understanding
  lexicon: BDAG
  rationale: Perfect participle of οἶδα with present force; 'know' is the most natural
    English equivalent and conveys settled awareness.
- source_word: ἐνδημοῦντες
  chosen: while we are at home
  alternatives:
  - being at home
  - dwelling at home
  lexicon: BDAG
  rationale: The verb literally denotes being in one's home country/home. 'At home'
    preserves the metaphor and pairs naturally with ἐκδημοῦμεν in the contrast Paul
    draws.
- source_word: ἐν τῷ σώματι
  chosen: in the body
  alternatives:
  - in this body
  - in the bodily home
  lexicon: BDAG
  rationale: Locative phrase referring to embodied earthly existence. The article
    does not require 'this' in English; the simpler rendering is sufficient and avoids
    over-interpretation.
- source_word: ἐκδημοῦμεν
  chosen: we are away
  alternatives:
  - we are absent
  - we are abroad
  lexicon: BDAG
  rationale: Paired antonym to ἐνδημοῦντες. 'Away' is idiomatic modern English and
    preserves the spatial-metaphorical contrast without archaic tone. 'Absent' is
    traditional and viable, but slightly less natural for the target style.
- source_word: ἀπὸ τοῦ κυρίου
  chosen: from the Lord
  alternatives:
  - away from the Lord
  - from the Lord's presence
  lexicon: BDAG
  rationale: ἀπό marks separation. In English, 'away from the Lord' is absorbed into
    the verbal phrase 'we are away from the Lord.' κύριος is rendered 'Lord' per doctrinal
    default.
