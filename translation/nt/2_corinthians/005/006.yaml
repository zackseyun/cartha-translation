theological_decisions:
- issue: Metaphorical contrast between embodied life and presence with the Lord
  chosen_reading: Paul speaks of present embodied existence as being 'at home in the
    body' and correspondingly 'away from the Lord,' preserving the tension without
    implying total separation from Christ's sustaining presence.
  alternative_readings:
  - '''absent from the body ... present with the Lord'' language imported from the
    next verse'
  - a stronger mystical reading that believers are wholly separated from Christ while
    embodied
  rationale: This verse itself contrasts current bodily life with not yet being with
    the Lord in the consummate sense. The translation keeps Paul's metaphor intact
    and does not import claims from v. 8 or overstate the separation.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    → Lord
