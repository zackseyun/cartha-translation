theological_decisions:
- issue: Scope and force of πάντων / αὐτῶν
  chosen_reading: Rendered straightforwardly as 'all' and 'them' without narrowing
    the referent.
  alternative_readings:
  - all people universally in an unrestricted sense
  - all believers / all represented by Christ in context
  rationale: The verse itself states broad scope language and does not explicitly
    resolve later theological debates about the extent of the atonement. The translation
    preserves the text's wording without importing a denominational conclusion.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
- issue: Resurrection wording in ἐγερθέντι
  chosen_reading: '''was raised'''
  alternative_readings:
  - rose
  rationale: The passive better reflects the Greek form and preserves canonical theological
    emphasis without denying that English 'rose' can be true in other contexts.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition.
