id: 2CO.5.15
reference: 2 Corinthians 5:15
source:
  edition: SBLGNT
  text: καὶ ὑπὲρ πάντων ἀπέθανεν ἵνα οἱ ζῶντες μηκέτι ἑαυτοῖς ζῶσιν ἀλλὰ τῷ ὑπὲρ αὐτῶν
    ἀποθανόντι καὶ ἐγερθέντι.
translation:
  text: And he died for all, so that those who live might no longer live for themselves,
    but for the one who died and was raised for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on behalf of all' / 'on their behalf' for both occurrences of 'for'
      (ὑπέρ), emphasizing representative benefit.
    reason: lexical_alternative
  - marker: b
    text: Greek 'was raised' is passive; some English versions render 'rose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ πάντων
  chosen: for all
  alternatives:
  - on behalf of all
  lexicon: BDAG
  rationale: ὑπέρ with the genitive commonly expresses representation or benefit ('for,
    on behalf of'). 'For all' is idiomatic English and preserves the representative/substitutionary
    sense without over-specifying atonement theory.
- source_word: ἀπέθανεν
  chosen: he died
  lexicon: BDAG
  rationale: Aorist indicative gives the simple past event. The explicit subject is
    supplied from context and Greek verbal inflection.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the telic force.
- source_word: οἱ ζῶντες
  chosen: those who live
  alternatives:
  - the living
  lexicon: BDAG
  rationale: Substantival present participle refers to people who are alive in the
    relevant spiritual/existential sense. 'Those who live' is clearer and less ambiguous
    than 'the living' in English.
- source_word: μηκέτι
  chosen: no longer
  lexicon: BDAG
  rationale: Standard adverbial rendering indicating cessation of a prior pattern.
- source_word: ἑαυτοῖς ζῶσιν
  chosen: live for themselves
  alternatives:
  - live to themselves
  lexicon: BDAG
  rationale: The dative reflexive with ζάω here expresses orientation or advantage.
    'Live for themselves' is idiomatic and captures self-directed living better than
    the more wooden 'to themselves.'
- source_word: ἀλλὰ τῷ ... ἀποθανόντι καὶ ἐγερθέντι
  chosen: but for the one who died and was raised
  alternatives:
  - but for him who died and was raised
  lexicon: BDAG
  rationale: 'Dative after implied ζῶσιν continues the contrast: not for themselves
    but for another. ''The one who died and was raised'' preserves the participial
    structure while remaining readable.'
- source_word: ἐγερθέντι
  chosen: was raised
  alternatives:
  - rose
  lexicon: BDAG
  rationale: The passive form is best represented by 'was raised,' preserving the
    grammatical voice and the common NT emphasis on God's action in resurrection.
    'Rose' is possible idiomatically but loses the passive nuance.
- source_word: ὑπὲρ αὐτῶν
  chosen: for them
  alternatives:
  - on their behalf
  lexicon: BDAG
  rationale: Same preposition as earlier in the verse; 'for them' keeps the repetition
    while remaining natural English.
