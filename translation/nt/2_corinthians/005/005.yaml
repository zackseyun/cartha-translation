theological_decisions:
- issue: Meaning of 'the down payment of the Spirit'
  chosen_reading: The phrase refers to the Holy Spirit as the present installment/guarantee
    of believers' future resurrection life.
  alternative_readings:
  - The phrase could be understood more loosely as a guarantee given by the Spirit
    rather than the Spirit himself as the guarantee.
  rationale: Paul elsewhere uses ἀρραβών with the Spirit in a way that strongly suggests
    the Spirit is the gift that guarantees the future inheritance (cf. 2 Cor 1:22;
    Eph 1:13–14). The translation keeps the Greek genitive form in the main text while
    allowing the theological implication to remain evident.
  doctrine_reference: Preserve theological tension rather than resolve it.
