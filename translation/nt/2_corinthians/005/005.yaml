id: 2CO.5.5
reference: 2 Corinthians 5:5
source:
  edition: SBLGNT
  text: ὁ δὲ κατεργασάμενος ἡμᾶς εἰς αὐτὸ τοῦτο θεός, ⸀ὁ δοὺς ἡμῖν τὸν ἀρραβῶνα τοῦ
    πνεύματος.
translation:
  text: Now the one who prepared us for this very thing is God, who gave us the down
    payment of the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guarantee,' 'deposit,' or 'first installment' of the Spirit.
    reason: lexical_alternative
  - marker: b
    text: The phrase may mean that the Spirit himself is the down payment, or that
      God has given a down payment that guarantees what the Spirit will bring to completion.
    reason: alternative_reading
lexical_decisions:
- source_word: κατεργασάμενος
  chosen: prepared
  alternatives:
  - worked
  - fashioned
  - produced
  - accomplished
  lexicon: BDAG
  rationale: In context Paul speaks of God fitting believers for the future embodied
    state just mentioned (vv. 1–4). 'Prepared' captures purposeful shaping toward
    an intended end better than the more mechanical 'worked' or the less idiomatic
    'accomplished.'
- source_word: εἰς αὐτὸ τοῦτο
  chosen: for this very thing
  alternatives:
  - for this very purpose
  - for this very end
  lexicon: BDAG
  rationale: This idiom points emphatically to the specific reality just discussed.
    'For this very thing' preserves the Greek emphasis and close formal correspondence
    while remaining natural English.
- source_word: θεός
  chosen: God
  lexicon: BDAG
  rationale: 'Straightforward nominative subject/complement identification: the one
    who prepared us is God.'
- source_word: δοὺς
  chosen: who gave
  alternatives:
  - having given
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered in English as a relative
    clause here. 'Who gave' is smoother than 'having given' while preserving the sense
    that God's gift confirms his preparatory work.
- source_word: ἀρραβῶνα
  chosen: down payment
  alternatives:
  - guarantee
  - deposit
  - first installment
  - pledge
  lexicon: BDAG
  rationale: ἀρραβών denotes a first payment that guarantees the rest will follow.
    'Down payment' best conveys both the commercial metaphor and the idea of partial
    present possession with future completion. 'Guarantee' captures the implication
    but loses the concrete metaphor.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - which is the Spirit
  - from the Spirit
  lexicon: BDAG
  rationale: 'The genitive is most naturally taken as appositional or epexegetical
    in Pauline usage: the down payment consists in the Spirit given to believers.
    ''Of the Spirit'' preserves the Greek form without over-resolving the genitive
    in the main text.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild transition or development rather than strong contrast.
    'Now' reflects that discourse function in readable English.
