theological_decisions:
- issue: Rendering of πίστις in a potentially theologically loaded Pauline context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In this verse πίστις is not part
    of the specific pistis-Christou debate, and the antithesis with εἶδος strongly
    favors 'faith' as reliance on what is not presently seen rather than 'faithfulness.'
