id: 2CO.5.7
reference: 2 Corinthians 5:7
source:
  edition: SBLGNT
  text: διὰ πίστεως γὰρ περιπατοῦμεν, οὐ διὰ εἴδους—
translation:
  text: For we walk by faith, not by sight—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not by appearance' or 'not by what is seen.' The Greek word can refer
      to visible form or appearance; 'sight' is chosen to preserve the contrast with
      'faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πίστεως
  chosen: by faith
  alternatives:
  - through faith
  - by trust
  - by faithfulness
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or manner ('through/by').
    Given the idiomatic contrast with 'not by sight,' 'by faith' is the most natural
    and established English rendering. Per doctrine, πίστις defaults to 'faith'; alternatives
    such as 'trust' or 'faithfulness' are possible semantically but are not the best
    fit in this concise antithesis.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the explanatory ground for the surrounding statement. 'For'
    preserves the connective force in a concise, readable way better than the more
    interpretive 'because'.
- source_word: περιπατοῦμεν
  chosen: we walk
  alternatives:
  - we live
  - we conduct our lives
  lexicon: BDAG
  rationale: περιπατέω is literally 'walk' and often metaphorically means to conduct
    one's life. Here the metaphor is transparent and traditional in English, so 'we
    walk' preserves the imagery without unnecessary paraphrase.
- source_word: οὐ διὰ εἴδους
  chosen: not by sight
  alternatives:
  - not by appearance
  - not by what is seen
  lexicon: BDAG
  rationale: εἶδος can denote outward appearance, form, or what is seen. In this established
    contrast with faith, 'sight' best captures the experiential/visible realm in idiomatic
    English. 'Appearance' is lexically possible but can suggest mere superficiality
    more narrowly than the Greek here.
