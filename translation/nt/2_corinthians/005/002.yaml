id: 2CO.5.2
reference: 2 Corinthians 5:2
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐν τούτῳ στενάζομεν, τὸ οἰκητήριον ἡμῶν τὸ ἐξ οὐρανοῦ ἐπενδύσασθαι
    ἐπιποθοῦντες,
translation:
  text: For indeed in this we groan, longing to put on our dwelling from heaven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our heavenly dwelling.' The Greek more literally says 'our dwelling
      from heaven,' emphasizing origin.
    reason: lexical_alternative
  - marker: b
    text: The verb can carry the sense 'to put on over,' like putting one garment
      over another.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - And indeed
  - For also
  lexicon: BDAG
  rationale: The combination is explanatory and mildly emphatic, linking this verse
    to the prior statement. 'For indeed' preserves both the connective and the explanatory
    force more naturally than a bare 'and.'
- source_word: ἐν τούτῳ
  chosen: in this
  alternatives:
  - in this tent
  - because of this
  - in this matter
  lexicon: BDAG
  rationale: A formally close rendering preserves the ambiguity of the demonstrative.
    In context it likely refers to the present bodily condition just mentioned, but
    the Greek does not explicitly repeat 'tent,' so 'in this' is retained rather than
    over-specifying in the main text.
- source_word: στενάζομεν
  chosen: we groan
  alternatives:
  - we sigh
  - we lament
  lexicon: BDAG
  rationale: '''Groan'' best captures the inward burden and yearning of the verb in
    Pauline usage without becoming overly interpretive.'
- source_word: τὸ οἰκητήριον ἡμῶν τὸ ἐξ οὐρανοῦ
  chosen: our dwelling from heaven
  alternatives:
  - our heavenly dwelling
  - our habitation from heaven
  lexicon: BDAG
  rationale: οἰκητήριον denotes a dwelling-place or habitation. 'Dwelling from heaven'
    preserves both the concrete metaphor and the source phrase ἐξ οὐρανοῦ ('from heaven'),
    avoiding the slight interpretive shift of 'heavenly dwelling,' which could emphasize
    quality rather than origin.
- source_word: ἐπενδύσασθαι
  chosen: to put on
  alternatives:
  - to be clothed with
  - to put on over
  lexicon: BDAG
  rationale: The verb carries the sense of putting on an outer garment over what one
    already has. 'To put on' is readable modern English; the more specific nuance
    'put on over' is important contextually but sounds awkward in the main text, so
    it is preserved in documentation/footnote.
- source_word: ἐπιποθοῦντες
  chosen: longing
  alternatives:
  - earnestly desiring
  - yearning
  lexicon: BDAG
  rationale: The participle expresses strong desire accompanying the groaning. 'Longing'
    is natural English and conveys sustained yearning without excess paraphrase.
