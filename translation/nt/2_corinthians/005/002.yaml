theological_decisions:
- issue: Nature of the heavenly embodiment metaphor
  chosen_reading: Retain the clothing/dwelling imagery without resolving whether Paul
    refers specifically to the resurrection body, the intermediate state, or the eschatological
    heavenly habitation in a narrower sense.
  alternative_readings:
  - Explicitly render as 'resurrection body from heaven'
  - Explicitly render as 'heavenly home'
  rationale: The verse uses overlapping metaphors ('dwelling' and 'put on') and does
    not itself force a full systematic conclusion. Per translation philosophy, the
    wording preserves the theological tension rather than collapsing it into one doctrinally
    loaded interpretation.
  doctrine_reference: Translation philosophy §3
