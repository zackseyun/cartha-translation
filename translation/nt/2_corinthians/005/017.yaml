id: 2CO.5.17
reference: 2 Corinthians 5:17
source:
  edition: SBLGNT
  text: ὥστε εἴ τις ἐν Χριστῷ, καινὴ κτίσις· τὰ ἀρχαῖα παρῆλθεν, ἰδοὺ γέγονεν ⸀καινά·
translation:
  text: So then, if anyone is in the Messiah, there is a new creation; the old things
    have passed away; look, new things have come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''he is a new creation.'' The Greek is elliptical: literally, ''if
      anyone is in the Messiah—new creation.'''
    reason: alternative_reading
  - marker: b
    text: Many English translations read, 'all things have become new.' The SBLGNT
      text here reads simply 'new things have come,' without an explicit word for
      'all things.'
    reason: textual_variant
lexical_decisions:
- source_word: ὥστε
  chosen: So then
  alternatives:
  - Therefore
  - So
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument. 'So then'
    preserves the logical connection while sounding natural in modern English.
- source_word: εἴ τις
  chosen: if anyone
  alternatives:
  - if someone
  - if any man
  lexicon: BDAG
  rationale: Indefinite conditional with generic force. 'Anyone' accurately conveys
    the open, representative sense without importing male specificity not intended
    by the Greek.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is the title Χριστός, not merely a name-like form here. Per doctrine,
    titles are translated where context supports, and Paul's union-with-Christ language
    retains messianic significance.
- source_word: καινὴ κτίσις
  chosen: there is a new creation
  alternatives:
  - he is a new creation
  - new creation
  lexicon: BDAG
  rationale: The Greek is verbless and elliptical. Supplying 'there is' best preserves
    the terseness without over-specifying the subject. This avoids forcing the phrase
    to mean only the individual person, while still fitting the immediate context
    of anyone being in the Messiah.
- source_word: τὰ ἀρχαῖα
  chosen: the old things
  alternatives:
  - the old
  - the former things
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'The old things' preserves
    the plural and leaves the scope broad, matching Paul's concise formulation.
- source_word: παρῆλθεν
  chosen: have passed away
  alternatives:
  - passed away
  - have gone by
  lexicon: BDAG
  rationale: Aorist verb rendered idiomatically in English with present relevance
    in context. 'Have passed away' is natural and matches the contrast with the resulting
    newness.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Deictic particle drawing attention to the result. 'Look' is readable
    modern English and preserves the rhetorical force better than the archaic 'behold.'
- source_word: γέγονεν καινά
  chosen: new things have come
  alternatives:
  - all things have become new
  - it has become new
  lexicon: BDAG
  rationale: The perfect γέγονεν emphasizes a present state resulting from change.
    Since καινά is neuter plural in the SBLGNT text, 'new things have come' reflects
    the plural form better than the traditional singularizing expansion 'all things
    have become new,' which imports 'all things' not present in this text.
