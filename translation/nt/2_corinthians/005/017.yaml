theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: in the Messiah
  alternative_readings:
  - in Christ
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    it functions as a title. In this Pauline formula, the title sense remains meaningful
    and should be preserved in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: How to resolve the elliptical phrase καινὴ κτίσις
  chosen_reading: there is a new creation
  alternative_readings:
  - he is a new creation
  rationale: The Greek lacks an explicit verb and can be taken either as an exclamation/declaration
    about new creation or as a predicate about the person. To preserve theological
    tension rather than resolve it too narrowly, the main text uses a less restrictive
    English completion, and the more individualized reading is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
