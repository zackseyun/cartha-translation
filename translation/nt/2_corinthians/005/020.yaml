theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The noun functions as a title rather than merely a name-like identifier.
    Per doctrine guidance, titles are translated to preserve meaning. Because 'Christ'
    is familiar in English tradition, the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Voice and agency in reconciliation
  chosen_reading: be reconciled to God
  alternative_readings:
  - be reconciled with God
  rationale: 'The passive imperative preserves the text''s theological tension: God
    is the one appealing through the apostles, yet the hearers are commanded to receive
    reconciliation. The translation avoids over-resolving the mechanics of divine
    and human agency.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
