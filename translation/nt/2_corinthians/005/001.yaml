id: 2CO.5.1
reference: 2 Corinthians 5:1
source:
  edition: SBLGNT
  text: Οἴδαμεν γὰρ ὅτι ἐὰν ἡ ἐπίγειος ἡμῶν οἰκία τοῦ σκήνους καταλυθῇ, οἰκοδομὴν
    ἐκ θεοῦ ἔχομεν οἰκίαν ἀχειροποίητον αἰώνιον ἐν τοῖς οὐρανοῖς.
translation:
  text: For we know that if our earthly tent-house is torn down, we have a building
    from God, a house not made with hands, eternal in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our earthly house of the tent'; the Greek preserves both 'house' and
      'tent' imagery for the present mortal dwelling.
    reason: lexical_alternative
  - marker: b
    text: Or 'is destroyed' or 'is dismantled'; the verb can suggest the taking down
      of a structure, fitting the tent image.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'we have,' not 'we will have,' preserving a tension between
      present possession and future realization.
    reason: alternative_reading
  - marker: d
    text: Or 'a house not made by human hands.' This expression carries biblical resonance
      for what is of divine, not human, origin.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  chosen: we know
  alternatives:
  - we are aware
  - we understand
  lexicon: BDAG
  rationale: οἶδα commonly expresses settled knowledge rather than mere perception.
    'We know' is the natural and standard English equivalent here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ links this statement to the preceding argument as an explanation
    or ground. 'For' preserves that connective force succinctly.
- source_word: ἐὰν ... καταλυθῇ
  chosen: if ... is torn down
  alternatives:
  - if ... is destroyed
  - if ... is dismantled
  lexicon: BDAG
  rationale: The construction marks a future contingency. καταλύω can mean dismantle,
    destroy, or tear down. Because Paul is using dwelling imagery tied to a tent,
    'is torn down' preserves both the metaphorical and physical nuance better than
    the more abstract 'is destroyed.'
- source_word: ἡ ἐπίγειος ἡμῶν οἰκία τοῦ σκήνους
  chosen: our earthly tent-house
  alternatives:
  - our earthly house of the tent
  - our earthly tent dwelling
  - our earthly house, this tent
  lexicon: BDAG
  rationale: The Greek combines οἰκία ('house') with the genitive τοῦ σκήνους ('of
    the tent'), producing a deliberately mixed image for the present bodily existence.
    'Tent-house' keeps both elements visible in English without flattening the metaphor
    into only 'body' or only 'tent.' 'Earthly' renders ἐπίγειος straightforwardly.
- source_word: οἰκοδομὴν ἐκ θεοῦ
  chosen: a building from God
  alternatives:
  - a building from God himself
  - God's building
  lexicon: BDAG
  rationale: οἰκοδομή here is best taken concretely as a structure rather than abstractly
    as 'edification.' 'From God' preserves ἐκ θεοῦ without overinterpreting possession.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  - we will have
  lexicon: BDAG
  rationale: The present tense is retained as 'we have.' Although interpreters debate
    whether the sense is proleptic or present possession by certainty, the Greek form
    itself is present and should not be shifted to future in translation.
- source_word: οἰκίαν ἀχειροποίητον
  chosen: a house not made with hands
  alternatives:
  - a house not made by human hands
  - an unmade-by-hands house
  lexicon: BDAG
  rationale: ἀχειροποίητος is a significant biblical-theological term often contrasted
    with human manufacture. 'Not made with hands' is idiomatic English and preserves
    the scriptural resonance better than a paraphrase.
- source_word: αἰώνιον
  chosen: eternal
  alternatives:
  - everlasting
  - age-lasting
  lexicon: BDAG
  rationale: In this context αἰώνιος contrasts the transient earthly dwelling with
    the enduring heavenly one. 'Eternal' is the clearest idiomatic rendering.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural. 'In the heavens' preserves the form and avoids prematurely
    collapsing the expression into the singular English idiom 'in heaven.'
