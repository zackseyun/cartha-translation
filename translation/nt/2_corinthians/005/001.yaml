theological_decisions:
- issue: Referent of the dwelling imagery
  chosen_reading: Retain the architectural/tent imagery rather than interpretively
    substituting 'body' in the main text.
  alternative_readings:
  - if our earthly body is destroyed ...
  - if the tent that is our earthly home is destroyed ...
  rationale: 'Paul''s wording intentionally layers metaphors: house, tent, building,
    and house not made with hands. Rendering the referent directly as ''body'' would
    import interpretation into the main text and reduce the metaphorical texture.
    The translation preserves the imagery and lets readers infer the bodily referent
    from context.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Temporal force of ἔχομεν
  chosen_reading: Use present 'we have' rather than future 'we will have.'
  alternative_readings:
  - we will have
  rationale: The Greek indicative is present. Some interpreters understand this as
    a present possession by faith or certainty of future resurrection, but the translation
    should preserve the textual tension rather than resolve the theological debate
    in favor of a future-only reading.
  doctrine_reference: Translation philosophy §3
