theological_decisions:
- issue: Genitive force in 'ἡ ἀγάπη τοῦ Χριστοῦ'
  chosen_reading: The main text preserves the ambiguity with 'the love of the Messiah.'
  alternative_readings:
  - the Messiah's love for us
  - our love for the Messiah
  rationale: The Greek genitive can be read subjectively or objectively, and the immediate
    context does not require the translation to resolve the ambiguity in the main
    text. In keeping with the doctrine guideline to preserve theological tension where
    the source is genuinely ambiguous, the English leaves the phrase open while noting
    the alternatives in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Meaning of 'all died'
  chosen_reading: Rendered literally as 'all died' without interpretive expansion.
  alternative_readings:
  - all people died in the Messiah representatively
  - all believers died with him
  rationale: Paul's compressed logic likely involves representative participation
    in the Messiah's death, but the verse itself states this tersely. The translation
    preserves the wording and does not resolve broader theological debates about the
    scope of 'all' beyond what the Greek explicitly says.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
