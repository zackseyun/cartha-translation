id: 2CO.5.14
reference: 2 Corinthians 5:14
source:
  edition: SBLGNT
  text: ἡ γὰρ ἀγάπη τοῦ Χριστοῦ συνέχει ἡμᾶς, κρίναντας τοῦτο ⸀ὅτι εἷς ὑπὲρ πάντων
    ἀπέθανεν· ἄρα οἱ πάντες ἀπέθανον·
translation:
  text: 'For the love of the Messiah compels us, because we have concluded this: that
    one died on behalf of all; therefore all died.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Messiah's love' or 'love for the Messiah'; the Greek genitive can
      be understood either way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the natural
    modern English equivalent and preserves the lexical connection without archaic
    overtones.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Χριστοῦ is a title here rather than a fixed name-like form, so 'Messiah'
    follows the doctrine guideline to translate titles where context supports. The
    genitive is left formally broad ('of the Messiah') rather than interpreted as
    either subjective ('Messiah's love') or objective ('love for the Messiah').
- source_word: συνέχει
  chosen: compels
  alternatives:
  - controls
  - constrains
  - holds together
  lexicon: BDAG
  rationale: συνέχω here conveys being powerfully pressed or governed. 'Compels' communicates
    strong inward force in readable English. 'Constrains' is traditional but less
    natural today; 'controls' can sound overly mechanistic. The context is motivational
    rather than merely spatial or literal.
- source_word: κρίναντας
  chosen: because we have concluded
  alternatives:
  - having judged
  - since we judged
  - because we judged
  lexicon: BDAG
  rationale: The aorist participle gives the basis for Paul's statement. Rendering
    it with a causal sense ('because') makes the participial relation clear in natural
    English while preserving the idea of reasoned judgment. 'Have concluded' captures
    the evaluative force of κρίνω in context.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what has been concluded. 'That' best fits the
    syntax after κρίναντας τοῦτο.
- source_word: εἷς
  chosen: one
  alternatives:
  - one person
  - one man
  lexicon: BDAG
  rationale: The Greek simply says 'one.' In context it refers to the Messiah, but
    the concise expression is rhetorically important and is preserved.
- source_word: ὑπὲρ πάντων
  chosen: on behalf of all
  alternatives:
  - for all
  - in place of all
  lexicon: BDAG
  rationale: ὑπέρ with genitive often means 'for' or 'on behalf of.' 'On behalf of
    all' preserves the representative/substitutionary nuance without over-specifying
    a debated atonement model. 'In place of all' would be too narrow here.
- source_word: ἄρα
  chosen: therefore
  alternatives:
  - so then
  - consequently
  lexicon: BDAG
  rationale: Marks Paul's inference from the preceding clause. 'Therefore' is clear
    and suitably weighty.
- source_word: οἱ πάντες
  chosen: all
  alternatives:
  - all people
  - the whole group
  lexicon: BDAG
  rationale: The article with πάντες is naturally rendered simply 'all' in English.
    Adding 'people' would be interpretive and unnecessary.
- source_word: ἀπέθανον
  chosen: died
  alternatives:
  - have died
  lexicon: BDAG
  rationale: The aorist is best rendered as a simple past in this tightly reasoned
    statement. The theological implication of participation in the Messiah's death
    is preserved without importing an explanatory gloss into the main text.
