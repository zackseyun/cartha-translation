id: 2CO.5.10
reference: 2 Corinthians 5:10
source:
  edition: SBLGNT
  text: τοὺς γὰρ πάντας ἡμᾶς φανερωθῆναι δεῖ ἔμπροσθεν τοῦ βήματος τοῦ Χριστοῦ, ἵνα κομίσηται ἕκαστος τὰ διὰ τοῦ σώματος πρὸς ἃ ἔπραξεν, εἴτε ἀγαθὸν εἴτε ⸀φαῦλον.
translation:
  text: For we all must be revealed before the judgment seat of the Messiah, so that each one may receive what is due for what he has done in the body, whether good or bad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appear before the judgment seat of the Messiah.' The Greek verb can mean either simple appearance or being openly disclosed; the main text preserves the stronger sense of exposure.
    reason: lexical_alternative
  - marker: b
    text: Or 'the things done in the body.' The Greek phrase may be understood as deeds done through one's embodied life.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: alternative_reading
  - marker: d
    text: Or 'receive what is due for the things done through the body'.
    reason: previous_rendering
lexical_decisions:
- source_word: φανερωθῆναι
  chosen: be revealed
  alternatives:
  - appear
  - be made manifest
  lexicon: BDAG
  rationale: The passive infinitive denotes being openly disclosed or made manifest, not merely physically showing up. 'Be revealed' preserves the forensic and moral exposure implied in the context better than the more neutral 'appear'.
- source_word: βήματος
  chosen: judgment seat
  alternatives:
  - tribunal
  - seat
  lexicon: BDAG
  rationale: βῆμα in this context refers to a judicial platform associated with evaluation. 'Judgment seat' is the clearest natural English rendering and preserves the legal setting better than the bare 'seat.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where functioning as a title rather than a name-like form. Here the genitive after βήματος is titular: the judgment seat belongs to the Messiah.'
- source_word: κομίσηται
  chosen: may receive what is due
  alternatives:
  - may receive
  - may be repaid for
  - may carry away
  lexicon: BDAG
  rationale: The middle subjunctive here conveys receiving back in accordance with one's actions. 'May receive what is due' makes explicit the recompensive sense in context without overparaphrasing.
- source_word: τὰ διὰ τοῦ σώματος
  chosen: what is due for the things done through the body
  alternatives:
  - the things done in the body
  - what was done by means of the body
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. διά with the genitive naturally suggests instrumentality ('through the body'), while τὰ points to deeds or outcomes connected with embodied life. This rendering preserves the Greek structure and avoids importing a stronger idiom than warranted.
- source_word: πρὸς ἃ ἔπραξεν
  chosen: for the things done
  alternatives:
  - according to what he did
  - corresponding to what he practiced
  lexicon: BDAG
  rationale: πρός here expresses correspondence or accordance. 'For the things done' fits smoothly with 'receive what is due' and reflects the relation between recompense and deeds.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every person
  lexicon: BDAG
  rationale: The singular distributive emphasizes individual accountability. 'Each one' preserves that force in natural English.
- source_word: ἀγαθὸν
  chosen: good
  alternatives:
  - beneficial
  - upright
  lexicon: BDAG
  rationale: A broad moral term in contrast with φαῦλον; 'good' is the most direct and idiomatic rendering.
- source_word: φαῦλον
  chosen: bad
  alternatives:
  - worthless
  - evil
  lexicon: BDAG
  rationale: φαῦλος can denote what is bad, base, or worthless. 'Bad' preserves the broad contrast with ἀγαθόν without overstating the term to 'evil' in every case.
