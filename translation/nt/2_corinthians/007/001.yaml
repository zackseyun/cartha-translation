id: 2CO.7.1
reference: 2 Corinthians 7:1
source:
  edition: SBLGNT
  text: ταύτας οὖν ἔχοντες τὰς ἐπαγγελίας, ἀγαπητοί, καθαρίσωμεν ἑαυτοὺς ἀπὸ παντὸς
    μολυσμοῦ σαρκὸς καὶ πνεύματος, ἐπιτελοῦντες ἁγιωσύνην ἐν φόβῳ θεοῦ.
translation:
  text: Therefore, since we have these promises, beloved, let us cleanse ourselves
    from every defilement of flesh and spirit, bringing holiness to completion in
    the fear of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from every impurity of body and spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'perfecting holiness in the fear of God.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'fear of God' carries the sense of reverent awe before God, not
      mere terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτας ... τὰς ἐπαγγελίας
  chosen: these promises
  alternatives:
  - these pledged things
  lexicon: BDAG
  rationale: ἐπαγγελία is naturally rendered 'promise' in Pauline usage; the demonstrative
    ταύτας points back to the preceding covenantal assurances, so 'these promises'
    is idiomatic and precise.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument and citations; 'Therefore'
    preserves the logical connection more clearly than the lighter 'So.'
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: A warm vocative with established epistolary force. 'Beloved' preserves
    both affection and solemnity better than the more colloquial 'dear friends.'
- source_word: καθαρίσωμεν
  chosen: let us cleanse
  alternatives:
  - let us purify
  - we should cleanse
  lexicon: BDAG
  rationale: First person plural aorist subjunctive in a hortatory sense. 'Let us
    cleanse' captures the exhortation directly. 'Cleanse' fits the impurity language
    that follows.
- source_word: ἑαυτοὺς
  chosen: ourselves
  lexicon: BDAG
  rationale: Reflexive object of the hortatory verb; straightforwardly 'ourselves.'
- source_word: ἀπὸ παντὸς μολυσμοῦ
  chosen: from every defilement
  alternatives:
  - from every impurity
  - from every pollution
  lexicon: BDAG
  rationale: μολυσμός denotes stain, defilement, or pollution, especially moral/religious
    contamination. 'Defilement' best matches the holiness context and keeps the cultic-moral
    resonance.
- source_word: σαρκὸς
  chosen: flesh
  alternatives:
  - body
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' when literal and 'sinful nature'
    when metaphorical. Here paired with 'spirit' and governed by 'defilement,' it
    refers broadly to the bodily/material aspect of human life, not specifically the
    Pauline concept of the sinful nature. 'Body' is possible but less literal.
- source_word: πνεύματος
  chosen: spirit
  alternatives:
  - inner life
  - mind
  lexicon: BDAG
  rationale: In contrast with 'flesh,' πνεῦμα here refers to the immaterial or inward
    aspect of the person. 'Spirit' preserves the lexical pairing and avoids over-interpretation.
- source_word: ἐπιτελοῦντες
  chosen: bringing ... to completion
  alternatives:
  - perfecting
  - completing
  lexicon: BDAG
  rationale: The participle expresses the manner/result accompanying the exhortation.
    'Bringing holiness to completion' is natural English and reflects the sense of
    carrying something through to its intended end.
- source_word: ἁγιωσύνην
  chosen: holiness
  alternatives:
  - sanctity
  - consecration
  lexicon: BDAG
  rationale: ἁγιωσύνη denotes holiness as a state or quality. 'Holiness' is the clearest
    and most standard rendering in this ethical context.
- source_word: ἐν φόβῳ θεοῦ
  chosen: in the fear of God
  alternatives:
  - in reverence for God
  - with fear of God
  lexicon: BDAG
  rationale: φόβος θεοῦ can denote reverent awe before God. 'In the fear of God' preserves
    the biblical idiom and its full weight; 'reverence' is interpretive and somewhat
    softer.
