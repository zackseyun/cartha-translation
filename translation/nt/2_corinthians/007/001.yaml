theological_decisions:
- issue: Meaning of σάρξ in the phrase 'defilement of flesh and spirit'
  chosen_reading: Rendered literally as 'flesh,' not 'sinful nature.'
  alternative_readings:
  - body
  - sinful nature
  rationale: The immediate contrast with 'spirit' suggests the whole person in bodily
    and inward dimensions rather than Paul's more specialized use of σάρξ for the
    fallen orientation. This follows the doctrine guideline to render σάρξ as 'flesh'
    when literal and only as 'sinful nature' when the metaphorical sense is clear.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ *sarx* | flesh (literal)
    / sinful nature (metaphorical)'
- issue: Force of the hortatory subjunctive καθαρίσωμεν
  chosen_reading: 'Exhortation inclusive of Paul and the readers: ''let us cleanse
    ourselves.'''
  alternative_readings:
  - we should cleanse ourselves
  rationale: The Greek first person plural subjunctive is best represented as an inclusive
    exhortation rather than a mere statement of obligation. This preserves the pastoral
    tone without weakening the imperative force.
- issue: Sense of φόβος in relation to God
  chosen_reading: Retained as 'fear of God' rather than reduced to 'reverence.'
  alternative_readings:
  - reverence for God
  rationale: The phrase denotes reverent awe, but the biblical idiom intentionally
    retains the stronger term 'fear.' Preserving that tension aligns with the translation
    philosophy of not flattening theological weight.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
