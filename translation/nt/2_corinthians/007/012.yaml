theological_decisions:
- issue: Referent of 'your earnestness for us ... to you' in a syntactically difficult
    clause
  chosen_reading: The clause is rendered to mean that Paul's writing served to make
    the Corinthians' earnest concern for Paul and his companions evident to the Corinthians
    themselves before God.
  alternative_readings:
  - that our earnestness for you might be made known among you before God
  - that your earnestness on our behalf might be made known among you before God
  rationale: The manuscript form in SBLGNT reads τὴν σπουδὴν ὑμῶν τὴν ὑπὲρ ἡμῶν πρὸς
    ὑμᾶς, which is syntactically awkward. The chosen rendering follows the printed
    text straightforwardly, taking ὑμῶν as 'your,' ὑπὲρ ἡμῶν as 'for us,' and πρὸς
    ὑμᾶς as 'to you.' Because another well-known textual form reads 'our earnestness
    for you,' that alternative is preserved in a footnote rather than adopted in the
    main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
