id: 2CO.7.12
reference: 2 Corinthians 7:12
source:
  edition: SBLGNT
  text: ἄρα εἰ καὶ ἔγραψα ὑμῖν, οὐχ ⸀ἕνεκεν τοῦ ἀδικήσαντος, ⸀οὐδὲ ⸁ἕνεκεν τοῦ ἀδικηθέντος,
    ἀλλ’ ⸀1ἕνεκεν τοῦ φανερωθῆναι τὴν σπουδὴν ὑμῶν τὴν ὑπὲρ ἡμῶν πρὸς ὑμᾶς ἐνώπιον
    τοῦ θεοῦ.
translation:
  text: So even if I wrote to you, it was not because of the one who did wrong, nor
    because of the one who was wronged, but so that your earnestness for us might
    be made known to you before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'so that our earnestness for you might be made known
      among you before God.'
    reason: textual_variant
  - marker: b
    text: Or 'your diligence,' 'your zeal,' or 'your deep concern.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα εἰ καὶ
  chosen: So even if
  alternatives:
  - Therefore even if
  - Accordingly, although
  lexicon: BDAG
  rationale: Renders the inferential particle ἄρα with a natural English connective
    ('So') and preserves the concessive force of εἰ καὶ as 'even if.' This gives readable
    modern English while retaining the logical flow from the preceding context.
- source_word: ἔγραψα
  chosen: I wrote
  alternatives:
  - I have written
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this context, referring
    to Paul's prior letter.
- source_word: οὐχ ἕνεκεν
  chosen: it was not because of
  alternatives:
  - not for the sake of
  - not on account of
  lexicon: BDAG
  rationale: ἕνεκεν denotes reason or purpose. 'Because of' is idiomatic and fits
    the contrastive structure in English. Supplying 'it was' is required for clear
    English.
- source_word: τοῦ ἀδικήσαντος
  chosen: the one who did wrong
  alternatives:
  - the offender
  - the one who committed the wrong
  lexicon: BDAG
  rationale: The substantival participle is rendered transparently and personally.
    'The offender' is possible, but 'the one who did wrong' more closely reflects
    the verbal idea of ἀδικέω without over-specifying the case.
- source_word: οὐδὲ ἕνεκεν τοῦ ἀδικηθέντος
  chosen: nor because of the one who was wronged
  alternatives:
  - nor for the sake of the injured party
  - nor because of the one who suffered the wrong
  lexicon: BDAG
  rationale: Maintains the parallelism with the previous phrase and reflects the passive
    participle ἀδικηθέντος. 'Wronged' is concise and natural.
- source_word: ἀλλ’ ἕνεκεν τοῦ φανερωθῆναι
  chosen: but so that ... might be made known
  alternatives:
  - but for the sake of making ... manifest
  - but so that ... might be revealed
  lexicon: BDAG
  rationale: The articular infinitive with ἕνεκεν expresses purpose. 'So that ...
    might be made known' is a natural English way to convey the purposive construction
    while preserving the passive sense of φανερωθῆναι.
- source_word: τὴν σπουδὴν ὑμῶν
  chosen: your earnestness
  alternatives:
  - your diligence
  - your zeal
  - your deep concern
  lexicon: BDAG
  rationale: σπουδή here denotes serious eagerness or earnest concern. 'Earnestness'
    preserves the moral and affective force without sounding overly formal.
- source_word: τὴν ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - toward us
  lexicon: BDAG
  rationale: ὑπέρ here is best taken as expressing orientation or concern in relation
    to Paul and his companions. 'For us' is concise and idiomatic.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  - in your presence
  lexicon: BDAG
  rationale: 'πρός with the accusative after a verb of manifestation can indicate
    direction toward or reference to the audience. ''To you'' fits the syntax and
    yields coherent English: their earnestness is made known to them.'
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: '''Before God'' is the standard concise rendering and preserves the solemn
    theological frame of divine witness or presence.'
