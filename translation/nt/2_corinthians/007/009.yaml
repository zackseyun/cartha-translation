theological_decisions:
- issue: Nature of the sorrow in κατὰ θεόν
  chosen_reading: Render literally as 'according to God' rather than interpretively
    as 'godly sorrow' in the main text.
  alternative_readings:
  - godly
  - in a godly manner
  - as God intends
  rationale: The phrase denotes sorrow in relation to God's standard or will. A more
    literal rendering preserves the theological nuance and avoids collapsing the phrase
    into a stock expression while still remaining understandable in context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
