theological_decisions:
- issue: Nature of Paul's appeal in Χωρήσατε ἡμᾶς
  chosen_reading: A relational appeal for the Corinthians to make space in their hearts/lives
    for Paul and his companions
  alternative_readings:
  - A more general call to receive or welcome Paul
  rationale: The immediate context in 6:11–13 speaks of widened affections and room
    in the heart, so the imperative is best understood relationally. The translation
    preserves the metaphor rather than importing 'heart' into the main text, which
    would be more interpretive than the Greek wording here.
  doctrine_reference: Translation philosophy §§1, 3, 6
