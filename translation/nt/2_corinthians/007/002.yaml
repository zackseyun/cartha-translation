id: 2CO.7.2
reference: 2 Corinthians 7:2
source:
  edition: SBLGNT
  text: Χωρήσατε ἡμᾶς· οὐδένα ἠδικήσαμεν, οὐδένα ἐφθείραμεν, οὐδένα ἐπλεονεκτήσαμεν.
translation:
  text: Make room for us. We have wronged no one, corrupted no one, taken advantage
    of no one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Receive us' or 'Open your hearts to us.' The Greek literally says 'Make
      room for us,' likely continuing the relational imagery from 6:11–13.
    reason: lexical_alternative
  - marker: b
    text: Or 'exploited no one' or 'defrauded no one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χωρήσατε
  chosen: Make room for
  alternatives:
  - Receive
  - Open your hearts to
  - Welcome
  lexicon: BDAG
  rationale: Aorist active imperative plural of χωρέω. In this context Paul is appealing
    for relational acceptance/restored space in the Corinthians' affections, not physical
    movement. 'Make room for us' preserves the metaphor and echoes the immediate context
    (cf. 6:11–13) better than the more interpretive 'open your hearts to us,' while
    remaining natural English.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of the imperative; straightforwardly rendered 'us.'
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Repeated three times for emphatic denial. 'No one' is the most natural
    formal rendering and preserves the rhetorical repetition.
- source_word: ἠδικήσαμεν
  chosen: wronged
  alternatives:
  - treated unjustly
  - injured
  lexicon: BDAG
  rationale: Aorist active indicative of ἀδικέω, meaning to act unjustly toward or
    wrong someone. 'Wronged' is concise, idiomatic, and broad enough to match Paul's
    denial without over-specifying the kind of harm.
- source_word: ἐφθείραμεν
  chosen: corrupted
  alternatives:
  - ruined
  - led astray
  - exploited
  lexicon: BDAG
  rationale: Aorist active indicative of φθείρω, which can mean corrupt, ruin, or
    destroy. In Pauline relational/moral contexts, 'corrupted' best captures the likely
    sense of moral/spiritual harm without overstating to physical destruction. 'Ruined'
    is possible but less precise; 'led astray' is interpretive.
- source_word: ἐπλεονεκτήσαμεν
  chosen: taken advantage of
  alternatives:
  - exploited
  - defrauded
  lexicon: BDAG
  rationale: Aorist active indicative of πλεονεκτέω, often meaning to exploit, outwit
    for gain, or take advantage of. 'Taken advantage of' is clear modern English and
    broad enough to include financial or relational exploitation. 'Defrauded' is possible
    but too narrow; 'exploited' is a viable alternative preserved in the notes.
