theological_decisions:
- issue: Meaning of 'fear and trembling' in relation to the Corinthians' reception
    of Titus
  chosen_reading: An expression of reverent seriousness and humble responsiveness,
    not cringing terror
  alternative_readings:
  - literal fear
  - respectful awe
  rationale: The phrase is a known Pauline idiom and in this context describes the
    earnestness with which the Corinthians received Titus. The translation preserves
    the idiom in the main text rather than flattening it, while clarifying the likely
    sense in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
