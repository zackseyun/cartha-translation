id: 2CO.7.5
reference: 2 Corinthians 7:5
source:
  edition: SBLGNT
  text: Καὶ γὰρ ἐλθόντων ἡμῶν εἰς Μακεδονίαν οὐδεμίαν ⸀ἔσχηκεν ἄνεσιν ἡ σὰρξ ἡμῶν,
    ἀλλ’ ἐν παντὶ θλιβόμενοι— ἔξωθεν μάχαι, ἔσωθεν φόβοι—
translation:
  text: For even when we came into Macedonia, our flesh had no rest, but we were afflicted
    in every way—conflicts on the outside, fears on the inside—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we ourselves had no rest.' The Greek reads 'our flesh,' a literal expression
      for embodied human weakness and distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ γὰρ
  chosen: For even
  alternatives:
  - And indeed
  - For indeed
  lexicon: BDAG
  rationale: The combination is explanatory and slightly emphatic, linking this verse
    to the previous context. 'For even' preserves both the connective and the emphasis
    in natural English.
- source_word: ἐλθόντων ἡμῶν εἰς Μακεδονίαν
  chosen: when we came into Macedonia
  alternatives:
  - when we arrived in Macedonia
  - after we came to Macedonia
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally. 'Came into' reflects
    εἰς more formally, while remaining natural.
- source_word: οὐδεμίαν ἔσχηκεν ἄνεσιν
  chosen: had no rest
  alternatives:
  - had no relief
  - had no ease
  lexicon: BDAG
  rationale: ἄνεσις denotes relief, ease, or rest from pressure. 'Had no rest' is
    idiomatic and fits the emotional and situational strain Paul describes.
- source_word: ἡ σὰρξ ἡμῶν
  chosen: our flesh
  alternatives:
  - we ourselves
  - our body
  lexicon: BDAG
  rationale: Following the doctrine guideline for σάρξ, the literal sense is preferred
    here. The context is not a technical contrast with Spirit or a clear metaphor
    for 'sinful nature,' but a holistic reference to Paul's embodied human weakness
    and distress. 'Our flesh' preserves the source texture; a smoother alternative
    is preserved in a footnote.
- source_word: ἀλλ’ ἐν παντὶ θλιβόμενοι
  chosen: but we were afflicted in every way
  alternatives:
  - but we were troubled in every way
  - but in every way we were under pressure
  lexicon: BDAG
  rationale: θλίβω in the passive/participle conveys being pressed, afflicted, or
    troubled. 'Afflicted in every way' is clear, weighty, and suitably broad for ἐν
    παντί.
- source_word: ἔξωθεν μάχαι
  chosen: conflicts on the outside
  alternatives:
  - fights outside
  - outward conflicts
  lexicon: BDAG
  rationale: μάχαι can denote fights or quarrels, but here likely refers broadly to
    external opposition and strife rather than literal combat. 'Conflicts on the outside'
    communicates the external nature of the pressures.
- source_word: ἔσωθεν φόβοι
  chosen: fears on the inside
  alternatives:
  - fears within
  - inward fears
  lexicon: BDAG
  rationale: φόβοι refers to fears or anxieties. 'On the inside' pairs naturally with
    'on the outside' and preserves Paul's contrast between external and internal distress.
