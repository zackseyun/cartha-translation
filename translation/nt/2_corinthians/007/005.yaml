theological_decisions:
- issue: Rendering of σάρξ
  chosen_reading: our flesh
  alternative_readings:
  - we ourselves
  - our body
  rationale: DOCTRINE.md specifies 'flesh' for literal uses and 'sinful nature' only
    for metaphorical contexts. Here the term refers to embodied human frailty and
    lack of relief, not moral corruption. Therefore 'our flesh' is retained in the
    main text, with a footnote preserving a smoother idiomatic alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ'
