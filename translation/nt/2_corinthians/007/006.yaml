theological_decisions:
- issue: Sense of τοὺς ταπεινοὺς in context
  chosen_reading: the humble
  alternative_readings:
  - the downcast
  - the lowly
  rationale: The phrase can refer to those humbled or cast down by circumstances,
    but the verse does not require narrowing it exclusively to emotional discouragement.
    'The humble' preserves the broader category while the context of consolation still
    implies affliction.
  doctrine_reference: Preserve theological tension rather than resolve it.
