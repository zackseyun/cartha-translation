id: 2CO.7.6
reference: 2 Corinthians 7:6
source:
  edition: SBLGNT
  text: ἀλλ’ ὁ παρακαλῶν τοὺς ταπεινοὺς παρεκάλεσεν ἡμᾶς ὁ θεὸς ἐν τῇ παρουσίᾳ Τίτου·
translation:
  text: But God, who comforts the humble, comforted us by the coming of Titus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the downcast' or 'the lowly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the presence of Titus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast with the preceding distress described by Paul; 'But' is
    the most natural concise English adversative here.
- source_word: ὁ παρακαλῶν
  chosen: who comforts
  alternatives:
  - who encourages
  - who consoles
  lexicon: BDAG
  rationale: The present participle functions substantivally to describe God by characteristic
    action. 'Comforts' fits the immediate context of affliction and consolation in
    2 Corinthians 7 and preserves the lexical connection with παρεκάλεσεν later in
    the verse.
- source_word: τοὺς ταπεινοὺς
  chosen: the humble
  alternatives:
  - the lowly
  - the downcast
  lexicon: BDAG
  rationale: ταπεινός can denote humble/lowly in status or disposition, and in context
    refers to those brought low in spirit by affliction. 'The humble' preserves the
    broader semantic range without over-specifying emotional state in the main text.
- source_word: παρεκάλεσεν
  chosen: comforted
  alternatives:
  - encouraged
  - consoled
  lexicon: BDAG
  rationale: Aorist main verb corresponding to παρακαλῶν. 'Comforted' maintains the
    lexical link and suits Paul's report of relief through Titus's arrival.
- source_word: ἐν τῇ παρουσίᾳ
  chosen: by the coming
  alternatives:
  - by the presence
  - at the arrival
  lexicon: BDAG
  rationale: παρουσία commonly means presence/arrival/coming. Here the sense is Titus's
    actual arrival with good news, so 'by the coming' communicates the eventive force
    naturally in English.
- source_word: Τίτου
  chosen: of Titus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name; rendered idiomatically
    within the phrase 'the coming of Titus'.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Explicit subject placed after the verb in Greek for emphasis/identification;
    standard rendering is retained in natural English word order while preserving
    God as the one acting.
