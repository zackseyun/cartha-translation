id: 2CO.7.16
reference: 2 Corinthians 7:16
source:
  edition: SBLGNT
  text: χαίρω ὅτι ἐν παντὶ θαρρῶ ἐν ὑμῖν.
translation:
  text: I rejoice that in every way I have confidence in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am glad because in everything I am confident about you.'
    reason: alternative_reading
lexical_decisions:
- source_word: χαίρω
  chosen: I rejoice
  alternatives:
  - I am glad
  - I rejoice greatly
  lexicon: BDAG
  rationale: Present active indicative first singular; 'I rejoice' preserves the verbal
    force and slightly elevated tone better than the flatter 'I am glad.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι most naturally introduces the content of Paul's rejoicing ('that...')
    rather than the cause in a strongly causal sense, though English overlap exists.
- source_word: ἐν παντί
  chosen: in every way
  alternatives:
  - in everything
  - in all things
  lexicon: BDAG
  rationale: The neuter singular with ἐν is idiomatic and adverbial. 'In every way'
    communicates comprehensive scope in natural English better than the more wooden
    'in everything,' while preserving the breadth of the Greek.
- source_word: θαρρῶ
  chosen: I have confidence
  alternatives:
  - I am confident
  - I take courage
  - I am of good courage
  lexicon: BDAG
  rationale: θαρρέω can denote being confident or taking courage. In this context,
    with ἐν ὑμῖν, Paul expresses settled confidence regarding the Corinthians. 'I
    have confidence' is idiomatic and reflects the present tense well.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - about you
  - with regard to you
  lexicon: BDAG
  rationale: The preposition ἐν with persons after θαρρέω can be rendered 'in' to
    express confidence placed in them. English idiom might prefer 'about you,' but
    'in you' better preserves the relational force of the Greek.
