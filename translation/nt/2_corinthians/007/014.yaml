id: 2CO.7.14
reference: 2 Corinthians 7:14
source:
  edition: SBLGNT
  text: ὅτι εἴ τι αὐτῷ ὑπὲρ ὑμῶν κεκαύχημαι, οὐ κατῃσχύνθην, ἀλλ’ ὡς πάντα ἐν ἀληθείᾳ ἐλαλήσαμεν ὑμῖν, οὕτως καὶ ἡ καύχησις ἡμῶν ⸀ἡ ἐπὶ Τίτου ἀλήθεια ἐγενήθη.
translation:
  text: For if I have boasted to him at all about you, I was not put to shame; rather, just as we spoke everything to you in truth, so also our boasting to Titus proved true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our boast before Titus proved true.' The Greek phrase could be rendered more literally with 'before Titus,' but the context indicates Paul means what he said to Titus about the Corinthians.
    reason: lexical_alternative
  - marker: b
    text: Or 'our boasting about you to Titus'.
    reason: previous_rendering
lexical_decisions:
- source_word: κεκαύχημαι
  chosen: have boasted
  alternatives:
  - have taken pride
  - have spoken proudly
  lexicon: BDAG
  rationale: καυχάομαι in Paul commonly denotes boasting or taking pride. 'Have boasted' preserves the verbal and rhetorical force without softening it.
- source_word: οὐ κατῃσχύνθην
  chosen: I was not put to shame
  alternatives:
  - I was not ashamed
  - I was not disgraced
  lexicon: BDAG
  rationale: The passive form favors 'was not put to shame' rather than the more inward 'was not ashamed.' This preserves the sense that Paul's boast was not shown false.
- source_word: πάντα ἐν ἀληθείᾳ ἐλαλήσαμεν
  chosen: we spoke everything to you in truth
  alternatives:
  - we told you everything truthfully
  - we spoke all things to you truthfully
  lexicon: BDAG
  rationale: This keeps the broad scope of πάντα ('everything/all things') and the idiomatic force of ἐν ἀληθείᾳ as manner ('in truth,' truthfully).
- source_word: ἡ καύχησις ἡμῶν
  chosen: our boasting
  alternatives:
  - our confidence
  - our pride
  lexicon: BDAG
  rationale: καύχησις is the noun cognate of καυχάομαι; 'boasting' preserves the lexical connection with the earlier verb.
- source_word: ἡ ἐπὶ Τίτου
  chosen: about you to Titus
  alternatives:
  - before Titus
  - to Titus
  - concerning Titus
  lexicon: BDAG
  rationale: In context Paul refers to what he said to Titus concerning the Corinthians. Although ἐπί with genitive can be rendered variously, the sense here is Paul's boast made to Titus about them. The English phrase is slightly expanded to make the implied object explicit from context.
- source_word: ἀλήθεια ἐγενήθη
  chosen: proved true
  alternatives:
  - became truth
  - was found true
  - turned out to be true
  lexicon: BDAG
  rationale: This idiom means that Paul's boast was shown to correspond to reality. 'Proved true' is natural English and preserves the validation sense.
- source_word: ὅτι
  chosen: For
  alternatives:
  - Because
  - That
  lexicon: BDAG
  rationale: Here ὅτι introduces an explanatory clause connected to the previous verse; 'For' fits the discourse flow in English.
