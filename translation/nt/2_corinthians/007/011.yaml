theological_decisions:
- issue: Rendering κατὰ θεόν
  chosen_reading: according to God
  alternative_readings:
  - godly
  rationale: The phrase describes grief measured by or aligned with God's will. A
    more literal rendering preserves Paul's wording and avoids importing a settled
    interpretive gloss into the main text; the common alternative remains viable and
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nuance of ἐκδίκησις in a repentance context
  chosen_reading: vindication
  alternative_readings:
  - punishment
  - justice
  - avenging
  rationale: The context is the Corinthians' repentant response and demonstrated innocence,
    not endorsement of personal vengeance. 'Vindication' best preserves the restorative
    and evidential thrust while avoiding overstatement.
  doctrine_reference: Translation philosophy §§1, 3, 6
