id: 2CO.7.11
reference: 2 Corinthians 7:11
source:
  edition: SBLGNT
  text: ἰδοὺ γὰρ αὐτὸ τοῦτο τὸ κατὰ θεὸν ⸀λυπηθῆναι πόσην κατειργάσατο ὑμῖν σπουδήν,
    ἀλλὰ ἀπολογίαν, ἀλλὰ ἀγανάκτησιν, ἀλλὰ φόβον, ἀλλὰ ἐπιπόθησιν, ἀλλὰ ζῆλον, ἀλλὰ
    ἐκδίκησιν· ἐν παντὶ συνεστήσατε ἑαυτοὺς ἁγνοὺς ⸀εἶναι τῷ πράγματι.
translation:
  text: 'For see what earnestness this very grief according to God has produced in
    you: but also a defense, but also indignation, but also fear, but also longing,
    but also zeal, but also vindication. In every way you proved yourselves to be
    pure in the matter.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this very godly grief.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a clearing of yourselves' for 'a defense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'punishment' or 'justice' for 'vindication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: For see
  alternatives:
  - Behold
  - For look
  lexicon: BDAG
  rationale: Introduces emphatic attention to the evidence Paul is about to list.
    'For see' preserves both the inferential γάρ and the deictic force of ἰδού in
    natural modern English.
- source_word: τὸ κατὰ θεὸν λυπηθῆναι
  chosen: this very grief according to God
  alternatives:
  - this very godly grief
  - this very grief in accordance with God
  lexicon: BDAG
  rationale: The articular infinitive λυπηθῆναι is rendered substantivally as 'grief.'
    κατὰ θεόν is translated more literally as 'according to God' rather than the more
    interpretive 'godly,' to preserve Paul's phrasing while remaining intelligible.
- source_word: πόσην κατειργάσατο ὑμῖν σπουδήν
  chosen: has produced in you ... earnestness
  alternatives:
  - has worked in you ... diligence
  - has brought about for you ... eagerness
  lexicon: BDAG
  rationale: κατεργάζομαι denotes effecting or producing a result. σπουδή here refers
    to serious eagerness/earnestness in response to repentance. 'Produced in you'
    best fits the context of inward moral effect.
- source_word: ἀλλὰ
  chosen: but also
  alternatives:
  - indeed
  - yes, also
  - rather
  lexicon: BDAG
  rationale: Repeated ἀλλά here is not strongly adversative but climactic/additive,
    marking successive evidences. 'But also' preserves the rhetorical repetition more
    closely than smoothing it away.
- source_word: ἀπολογίαν
  chosen: a defense
  alternatives:
  - vindication
  - clearing of yourselves
  lexicon: BDAG
  rationale: Refers to their response in clearing themselves from complicity in the
    offense. 'A defense' is concise and transparent; the more explicit nuance is preserved
    by context and footnote alternative.
- source_word: ἀγανάκτησιν
  chosen: indignation
  alternatives:
  - outrage
  - resentment
  lexicon: BDAG
  rationale: Denotes strong displeasure, likely at the sin involved. 'Indignation'
    captures moral revulsion without over-specifying the object.
- source_word: φόβον
  chosen: fear
  alternatives:
  - reverent fear
  - alarm
  lexicon: BDAG
  rationale: A straightforward rendering is best. The context may imply alarm before
    God or apostolic authority, but the Greek leaves the object unstated, so the translation
    preserves that openness.
- source_word: ἐπιπόθησιν
  chosen: longing
  alternatives:
  - yearning
  - deep desire
  lexicon: BDAG
  rationale: Conveys strong desire, likely for restored relationship with Paul. 'Longing'
    is natural and weighty without over-interpretation.
- source_word: ζῆλον
  chosen: zeal
  alternatives:
  - eagerness
  - ardor
  lexicon: BDAG
  rationale: Retains the strong moral earnestness of the term and distinguishes it
    from σπουδή earlier in the verse.
- source_word: ἐκδίκησιν
  chosen: vindication
  alternatives:
  - punishment
  - avenging of wrong
  - justice
  lexicon: BDAG
  rationale: In context this likely refers to decisive action to set matters right,
    not personal vengeance. 'Vindication' fits the corporate demonstration of innocence
    and proper response, while avoiding an overly punitive sense.
- source_word: ἐν παντὶ
  chosen: In every way
  alternatives:
  - In everything
  - At every point
  lexicon: BDAG
  rationale: Idiomatic summary phrase indicating comprehensively, not necessarily
    every conceivable respect. 'In every way' reads naturally in English.
- source_word: συνεστήσατε ἑαυτοὺς
  chosen: you proved yourselves
  alternatives:
  - you commended yourselves
  - you demonstrated yourselves
  lexicon: BDAG
  rationale: 'συνίστημι can mean show, demonstrate, or commend. Here the sense is
    evidential: their actions showed what they were in relation to the case.'
- source_word: ἁγνοὺς εἶναι
  chosen: to be pure
  alternatives:
  - to be innocent
  - to be blameless
  lexicon: BDAG
  rationale: ἁγνός can denote purity or innocence. 'Pure' preserves the moral quality
    while allowing the contextual implication of innocence in the affair.
- source_word: τῷ πράγματι
  chosen: in the matter
  alternatives:
  - in this affair
  - in the case
  lexicon: BDAG
  rationale: A practical reference to the specific incident under discussion. 'In
    the matter' is idiomatic and sufficiently precise.
