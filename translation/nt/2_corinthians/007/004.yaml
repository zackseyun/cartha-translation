theological_decisions:
- issue: Rendering positive Pauline καύχησις language without importing sinful connotations
  chosen_reading: Translate καύχησις as 'boasting' rather than softening to 'pride'
  alternative_readings:
  - pride
  - confidence
  rationale: Paul frequently uses boasting language in a qualified positive sense.
    Retaining 'boasting' preserves his rhetoric and avoids muting an important Pauline
    theme, while the context makes clear this is not sinful self-exaltation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Preserving the tension between joy and suffering
  chosen_reading: Render ἐπὶ πάσῃ τῇ θλίψει ἡμῶν as 'in all our affliction'
  alternative_readings:
  - despite all our affliction
  rationale: The Greek presents joy as overflowing in the midst of affliction. 'In
    all our affliction' preserves that coexistence without resolving the tension into
    a merely adversative paraphrase.
  doctrine_reference: Translation philosophy §3
