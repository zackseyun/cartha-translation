theological_decisions:
- issue: Meaning of μεταμέλομαι in Paul's emotional self-description
  chosen_reading: Rendered as 'regret' rather than 'repent'
  alternative_readings:
  - repent
  - be sorry
  rationale: The context concerns Paul's emotional response to the painful effect
    of his prior letter, not moral repentance before God. Using 'regret' preserves
    the distinction between μεταμέλομαι and μετανοέω and avoids importing theological
    claims the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
