id: 2CO.7.7
reference: 2 Corinthians 7:7
source:
  edition: SBLGNT
  text: οὐ μόνον δὲ ἐν τῇ παρουσίᾳ αὐτοῦ, ἀλλὰ καὶ ἐν τῇ παρακλήσει ᾗ παρεκλήθη ἐφ’
    ὑμῖν, ἀναγγέλλων ἡμῖν τὴν ὑμῶν ἐπιπόθησιν, τὸν ὑμῶν ὀδυρμόν, τὸν ὑμῶν ζῆλον ὑπὲρ
    ἐμοῦ, ὥστε με μᾶλλον χαρῆναι.
translation:
  text: and not only by his coming, but also by the comfort with which he was comforted
    because of you, as he reported to us your longing, your mourning, and your zeal
    for me, so that I rejoiced even more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by his presence' for 'by his coming.'
    reason: lexical_alternative
  - marker: b
    text: Or 'encouragement' for 'comfort' in both occurrences of the cognate noun
      and verb.
    reason: lexical_alternative
  - marker: c
    text: Or 'your lamentation' for 'your mourning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρουσίᾳ
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this personal travel context, παρουσία refers to Titus's arrival/coming
    rather than an abstract theological 'presence.' 'Coming' is natural English and
    preserves the event sense.
- source_word: παρακλήσει
  chosen: comfort
  alternatives:
  - encouragement
  - consolation
  lexicon: BDAG
  rationale: The immediate context emphasizes mutual consolation and relief after
    distress. 'Comfort' best fits the emotional tone, though 'encouragement' is possible.
- source_word: παρεκλήθη
  chosen: was comforted
  alternatives:
  - was encouraged
  - was consoled
  lexicon: BDAG
  rationale: Using the cognate verbal form with 'comfort' preserves the lexical connection
    with παράκλησις in the same clause. The passive sense is retained.
- source_word: ἐφ’ ὑμῖν
  chosen: because of you
  alternatives:
  - by you
  - over you
  - concerning you
  lexicon: BDAG
  rationale: 'Here ἐπί with dative most naturally indicates basis or occasion: Titus
    was comforted on account of the Corinthians and their response. ''Because of you''
    is the clearest idiomatic rendering.'
- source_word: ἀναγγέλλων
  chosen: as he reported
  alternatives:
  - reporting
  - announcing
  - telling
  lexicon: BDAG
  rationale: The participle explains how Paul learned of their response. 'As he reported'
    gives smooth English while preserving the contemporaneous participial force.
- source_word: ἐπιπόθησιν
  chosen: longing
  alternatives:
  - earnest desire
  - affection
  lexicon: BDAG
  rationale: The noun denotes strong yearning. 'Longing' is concise, natural, and
    preserves the emotional intensity.
- source_word: ὀδυρμόν
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: BDAG
  rationale: The term conveys sorrow expressed in lament. 'Mourning' captures both
    grief and its outward expression better than the flatter 'grief.'
- source_word: ζῆλον
  chosen: zeal
  alternatives:
  - eagerness
  - ardor
  lexicon: BDAG
  rationale: The word denotes earnest fervor. 'Zeal' is the most direct equivalent
    and fits Paul's commendation of their earnest concern.
- source_word: ὑπὲρ ἐμοῦ
  chosen: for me
  alternatives:
  - on my behalf
  - concerning me
  lexicon: BDAG
  rationale: In context Paul refers to their earnest concern/support directed toward
    him. 'For me' is idiomatic and sufficiently broad.
- source_word: ὥστε με μᾶλλον χαρῆναι
  chosen: so that I rejoiced even more
  alternatives:
  - so that I was glad all the more
  - with the result that I rejoiced more
  lexicon: BDAG
  rationale: This clause expresses result. 'I rejoiced even more' is natural English
    and preserves the comparative force of μᾶλλον.
