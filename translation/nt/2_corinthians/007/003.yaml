id: 2CO.7.3
reference: 2 Corinthians 7:3
source:
  edition: SBLGNT
  text: ⸂πρὸς κατάκρισιν οὐ⸃ λέγω, προείρηκα γὰρ ὅτι ἐν ταῖς καρδίαις ἡμῶν ἐστε εἰς
    τὸ συναποθανεῖν καὶ συζῆν.
translation:
  text: I do not say this to condemn you, for I have said before that you are in our
    hearts, to die together and to live together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for condemnation' or 'with a view to condemnation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for dying together and living together.' The Greek emphasizes shared
      solidarity in both death and life.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς κατάκρισιν
  chosen: to condemn
  alternatives:
  - for condemnation
  - with a view to condemnation
  lexicon: BDAG
  rationale: 'The preposition πρός with the accusative κατάκρισιν expresses purpose
    or direction: Paul is clarifying that his words are not aimed at condemning the
    Corinthians. ''To condemn'' is idiomatic modern English and preserves the force
    without wooden phrasing.'
- source_word: λέγω
  chosen: I say this
  alternatives:
  - I speak
  - I am saying
  lexicon: BDAG
  rationale: The present tense is naturally rendered 'I say.' Supplying 'this' in
    English is warranted by context, since Paul refers to his preceding remarks.
- source_word: προείρηκα
  chosen: I have said before
  alternatives:
  - I have already said
  - I said previously
  lexicon: BDAG
  rationale: The perfect tense indicates a prior statement with continuing relevance.
    'I have said before' captures both the anterior action and its present force.
- source_word: καρδίαις
  chosen: hearts
  lexicon: BDAG
  rationale: A standard rendering for καρδία. In Pauline usage here it denotes deep
    affection and inward attachment, not merely emotion in a modern sentimental sense.
- source_word: ἐν ταῖς καρδίαις ἡμῶν ἐστε
  chosen: you are in our hearts
  alternatives:
  - you are in our heart
  lexicon: BDAG
  rationale: The plural 'hearts' follows the Greek and reflects Paul and his companions
    collectively. The phrase is idiomatic in English and preserves the relational
    warmth of the Greek.
- source_word: εἰς τὸ συναποθανεῖν καὶ συζῆν
  chosen: to die together and to live together
  alternatives:
  - for dying together and living together
  - to share death and life together
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses result/purpose closely tied
    to the preceding statement of affection. The compound verbs with συν- emphasize
    shared solidarity. 'To die together and to live together' preserves the parallelism
    and rhetorical intensity.
- source_word: συναποθανεῖν
  chosen: to die together
  alternatives:
  - to die with
  lexicon: BDAG
  rationale: The συν- prefix is significant and should be retained. 'Together' communicates
    mutual solidarity more naturally than the bare 'with' in this paired expression.
- source_word: συζῆν
  chosen: to live together
  alternatives:
  - to live with
  lexicon: BDAG
  rationale: As with συναποθανεῖν, the συν- prefix marks shared life. Rendering both
    verbs with 'together' preserves the balance and emotional force of the pair.
