id: EPH.3.11
reference: Ephesians 3:11
source:
  edition: SBLGNT
  text: κατὰ πρόθεσιν τῶν αἰώνων ἣν ἐποίησεν ἐν ⸀τῷ Χριστῷ Ἰησοῦ τῷ κυρίῳ ἡμῶν,
translation:
  text: according to the purpose of the ages, which he accomplished in the Messiah
    Jesus our Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eternal purpose.' The Greek is more literally 'the purpose of the
      ages.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through the Messiah Jesus.' The Greek preposition is 'in,' which may
      also be understood instrumentally in context.
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as
      a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - by
  lexicon: BDAG
  rationale: With the accusative πρόθεσιν, κατά expresses conformity or accordance.
    'According to' is the most natural and sufficiently formal rendering in context.
- source_word: πρόθεσιν
  chosen: purpose
  alternatives:
  - plan
  - resolve
  lexicon: BDAG
  rationale: πρόθεσις here denotes a deliberate intention or plan of God. 'Purpose'
    preserves both intentionality and theological weight, and fits Pauline usage well.
- source_word: τῶν αἰώνων
  chosen: of the ages
  alternatives:
  - eternal
  - of eternity
  - age-long
  lexicon: BDAG
  rationale: The genitive plural is literally 'of the ages.' Rather than flattening
    it to the interpretive adjective 'eternal,' the translation preserves the Greek
    expression while remaining intelligible. This also keeps the wording auditable
    against the source.
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Relative pronoun referring back to πρόθεσιν. 'Which' is standard and
    clear.
- source_word: ἐποίησεν
  chosen: accomplished
  alternatives:
  - made
  - carried out
  - worked out
  lexicon: BDAG
  rationale: Although ποιέω often means 'make' or 'do,' in this context with 'purpose'
    the sense is that God brought the purpose into effect. 'Accomplished' communicates
    fulfillment without over-paraphrasing.
- source_word: ἐν
  chosen: in
  alternatives:
  - through
  - by means of
  lexicon: BDAG
  rationale: The preposition is formally 'in.' While some interpreters understand
    instrumental nuance ('through'), the Greek wording itself is ἐν, and 'in the Messiah
    Jesus' preserves the text's theological and syntactic tension without over-resolving
    it.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidelines, Χριστός is translated as 'Messiah' where it
    functions as a title rather than a name-like element. Here 'the Messiah Jesus'
    preserves the title's meaning.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention.
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' This preserves both
    common NT usage and the title's theological significance.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Straightforward possessive genitive modifying 'Lord.'
