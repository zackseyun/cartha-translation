theological_decisions:
- issue: Meaning of τῶν αἰώνων in the phrase πρόθεσιν τῶν αἰώνων
  chosen_reading: Rendered literally as 'the purpose of the ages' rather than interpretively
    as 'eternal purpose.'
  alternative_readings:
  - the eternal purpose
  - the age-old purpose
  rationale: The phrase is commonly understood to denote God's eternal purpose, but
    the Greek expression is more literally 'of the ages.' Preserving the literal form
    avoids importing a more polished theological abstraction than the text itself
    states, while still allowing readers to infer the temporal depth of God's purpose
    from context.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of ἐν τῷ Χριστῷ Ἰησοῦ
  chosen_reading: Rendered 'in the Messiah Jesus' rather than 'through the Messiah
    Jesus.'
  alternative_readings:
  - through the Messiah Jesus
  rationale: The preposition ἐν can bear instrumental nuance in some contexts, and
    many English versions render it 'through.' Here the translation preserves the
    more direct prepositional form 'in,' maintaining the source-language wording and
    leaving the exact nuance open rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, not merely a name-like component.
    Following the doctrine's contested-terms guidance, 'Messiah' preserves the title's
    meaning and Jewish background.
  doctrine_reference: 'Contested terms: Χριστός'
