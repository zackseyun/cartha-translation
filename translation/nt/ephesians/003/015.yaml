id: EPH.3.15
reference: Ephesians 3:15
source:
  edition: SBLGNT
  text: ἐξ οὗ πᾶσα πατριὰ ἐν οὐρανοῖς καὶ ἐπὶ γῆς ὀνομάζεται,
translation:
  text: from whom every family in heaven and on earth is named,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the whole family in heaven and on earth"; or, more interpretively, "from
      whom all fatherhood in heaven and on earth derives its name."
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξ οὗ
  chosen: from whom
  alternatives:
  - from whom derives its name
  - from whom
  lexicon: BDAG
  rationale: The preposition ἐξ with the genitive relative pronoun naturally means
    'from whom.' Because the following passive verb ὀνομάζεται concerns naming, the
    sense includes source or derivation. The more explicit English expansion 'from
    whom derives its name' captures the implied relation but adds words not directly
    present, so the simpler 'from whom' is kept in the main text.
- source_word: πᾶσα
  chosen: every
  alternatives:
  - the whole
  - all
  lexicon: BDAG
  rationale: With a singular noun, πᾶσα can mean 'every' or 'the whole.' Here 'every
    family' best fits the distributive sense and the syntax. 'The whole family' is
    a well-known traditional rendering, but it is less natural with πατριά in the
    singular and tends to suggest one collective family rather than each family grouping.
- source_word: πατριὰ
  chosen: family
  alternatives:
  - fatherhood
  - clan
  - lineage
  lexicon: BDAG
  rationale: πατριά denotes a family group, clan, or lineage. 'Family' is the clearest
    modern English equivalent. 'Fatherhood' is possible because of the wordplay with
    πατήρ in the previous verse, but it is less likely as the primary sense here and
    sounds abstract where the noun ordinarily denotes a social grouping.
- source_word: ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  - in heavenlies
  lexicon: BDAG
  rationale: Although οὐρανοῖς is plural in Greek, idiomatic English commonly uses
    the singular 'in heaven' for this locative sense. This preserves readability while
    still referring to the heavenly realm. 'In the heavens' is more formally literal
    but less natural in contemporary English.
- source_word: ἐπὶ γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: A straightforward locative rendering. 'On earth' is idiomatic and accurate.
- source_word: ὀνομάζεται
  chosen: is named
  alternatives:
  - is called
  - derives its name
  lexicon: BDAG
  rationale: The present passive most directly means 'is named' or 'is called.' 'Is
    named' preserves the lexical connection to name and fits the likely sense of derivation
    from the Father. 'Derives its name' is interpretively stronger and therefore better
    preserved in a footnote rather than the main text.
