theological_decisions:
- issue: Meaning of πᾶσα πατριὰ in relation to God the Father in the previous verse
  chosen_reading: every family
  alternative_readings:
  - the whole family
  - all fatherhood
  rationale: The verse follows Paul's address to 'the Father' and likely contains
    a wordplay between πατήρ and πατριά. The translation keeps the ordinary lexical
    sense 'family' in the main text rather than resolving the phrase into a more abstract
    theological claim such as 'all fatherhood.' The traditional 'the whole family'
    is possible, but 'every family' better reflects the distributive force of πᾶσα
    with a singular noun and avoids prematurely deciding that Paul means one single
    collective family. The naming/source nuance is preserved by 'from whom' and 'is
    named,' with a footnote noting the possible sense 'derives its name.'
  doctrine_reference: Translation philosophy §§1, 3, 5
