theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where title is in view. In Ephesians 3, Paul is explaining the inclusion of the Gentiles in God's redemptive promise, a context where the messianic title remains semantically active rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where title; Christ where name-like)'
- issue: Referent of ἔθνη
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The verse concerns the revealed mystery that non-Jews share equally in the people of God. Translating ἔθνη as 'nations' would be more formally possible but less precise in this immediate theological context.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; optimal equivalence'
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/003/006.json
  category: awkward_english
  tier: 1
  from: fellow members of the same body
  to: fellow members of the body
  rationale: 'The Greek presents a powerful, rhythmic tricolon of compound adjectives: συγκληρονόμα, σύσσωμα, and συμμέτοχα. The current rendering of the middle term, ''fellow members of the same body,'' is significantly longer and more explanatory than the other two parts (''fellow heirs'' and ''fellow partakers''), which disrupts the parallelism and rhetorical force. The suggested rewrite, ''fellow members of the body,'' is more concise, maintains the ''fellow'' parallel, and is more rhythmically balanced. The word ''same'' is redundant, as being ''fellow members of *the* body'' already implies it is one and the same body.'
