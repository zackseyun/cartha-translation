id: EPH.3.6
reference: Ephesians 3:6
source:
  edition: SBLGNT
  text: εἶναι τὰ ἔθνη συγκληρονόμα καὶ σύσσωμα καὶ συμμέτοχα τῆς ἐπαγγελίας ⸂ἐν Χριστῷ Ἰησοῦ⸃ διὰ τοῦ εὐαγγελίου,
translation:
  text: that the Gentiles are fellow heirs, fellow members of the body, and fellow partakers of the promise in Messiah Jesus through the gospel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations.' Here the term refers specifically to the non-Jewish peoples included with Israel in God's saving promise.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''in Christ Jesus.'' The Greek title Χριστός is translated here as ''Messiah'' to preserve its titular force.'
    reason: alternative_reading
  - marker: c
    text: Or 'fellow members of the same body'.
    reason: previous_rendering
lexical_decisions:
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline usage here, ἔθνη refers specifically to non-Jews rather than nations in a geopolitical sense. 'Gentiles' best captures the Jew/Gentile inclusion theme of the context.
- source_word: συγκληρονόμα
  chosen: fellow heirs
  alternatives:
  - co-heirs
  - joint heirs
  lexicon: BDAG
  rationale: The σύν compound stresses shared inheritance with others. 'Fellow heirs' is natural English and preserves the corporate force without overformal wording.
- source_word: σύσσωμα
  chosen: fellow members of the same body
  alternatives:
  - of the same body
  - co-bodied
  lexicon: BDAG
  rationale: This rare term literally conveys being incorporated into the same body. 'Fellow members of the same body' makes the metaphor explicit in readable English while preserving Paul's ecclesial imagery.
- source_word: συμμέτοχα
  chosen: fellow partakers
  alternatives:
  - sharers together
  - co-participants
  lexicon: BDAG
  rationale: The term denotes sharing jointly in something. 'Fellow partakers' keeps the parallelism with the preceding σύν compounds and remains understandable.
- source_word: τῆς ἐπαγγελίας
  chosen: of the promise
  alternatives:
  - in the promise
  - of the promised blessing
  lexicon: BDAG
  rationale: 'The genitive depends on συμμέτοχα: the Gentiles are co-participants in the promise. The singular ''promise'' reflects the Greek and likely summarizes God''s covenant promise fulfilled in the Messiah.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as a title. Here the phrase retains clear titular force in Paul's salvation-historical argument, so 'Messiah Jesus' is preferred.
- source_word: διὰ τοῦ εὐαγγελίου
  chosen: through the gospel
  alternatives:
  - by means of the good news
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrumentality. 'Through the gospel' is concise, idiomatic, and preserves the means by which Gentiles come to share in the promise.
- source_word: εἶναι
  chosen: that ... are
  alternatives:
  - namely, that ... are
  - to be
  lexicon: BDAG
  rationale: The infinitive depends on the previous verse's disclosure of the mystery. In English, an explicit finite clause introduced by 'that' best conveys the content of the mystery.
