id: EPH.3.21
reference: Ephesians 3:21
source:
  edition: SBLGNT
  text: αὐτῷ ἡ δόξα ἐν τῇ ἐκκλησίᾳ ⸀καὶ ἐν Χριστῷ Ἰησοῦ εἰς πάσας τὰς γενεὰς τοῦ αἰῶνος
    τῶν αἰώνων· ἀμήν.
translation:
  text: To him be glory in the church and in Messiah Jesus through all generations,
    forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτῷ
  chosen: To him
  alternatives:
  - to him belongs
  - to him be
  lexicon: BDAG
  rationale: Dative pronoun in a doxological formula; English idiom commonly supplies
    the verbless sense ascription. 'To him' preserves the address while allowing the
    implied optative/ascriptive force to be carried by the clause.
- source_word: ἡ δόξα
  chosen: be glory
  alternatives:
  - belongs the glory
  - the glory
  lexicon: BDAG
  rationale: 'The Greek is verbless: literally ''the glory.'' In English doxology,
    ''be glory'' naturally conveys the implied ascription without over-paraphrasing.
    ''Glory'' is the standard rendering of δόξα and fits both honor and praise in
    this context.'
- source_word: ἐν τῇ ἐκκλησίᾳ
  chosen: in the church
  alternatives:
  - among the church
  - in the assembly
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline usage ordinarily refers to the gathered people/community
    of God; 'church' is the most natural and established modern rendering here. 'In'
    is retained from ἐν rather than shifting to a more interpretive 'among,' since
    the parallel phrase 'in Messiah Jesus' favors formal consistency.
- source_word: καὶ ἐν Χριστῷ Ἰησοῦ
  chosen: and in Messiah Jesus
  alternatives:
  - and in Christ Jesus
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like element, so per doctrine
    it is translated 'Messiah.' The preposition ἐν is preserved as 'in' to maintain
    the parallel structure with 'in the church.'
- source_word: εἰς πάσας τὰς γενεὰς
  chosen: through all generations
  alternatives:
  - to all generations
  - for all generations
  lexicon: BDAG
  rationale: εἰς with a temporal expression can indicate extension through time. 'Through
    all generations' is idiomatic English and captures the durative force better than
    a more wooden 'to all generations.'
- source_word: τοῦ αἰῶνος τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - of the age of the ages
  - for the ages of ages
  lexicon: BDAG
  rationale: This is an idiomatic superlative expression for unending duration. A
    literal rendering ('age of ages') is obscure in contemporary English; 'forever
    and ever' communicates the sense clearly while preserving the doxological register.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Standard transliteration in English for the liturgical affirmation; widely
    understood and appropriate in a doxology.
