id: EPH.3.18
reference: Ephesians 3:18
source:
  edition: SBLGNT
  text: ἵνα ἐξισχύσητε καταλαβέσθαι σὺν πᾶσιν τοῖς ἁγίοις τί τὸ πλάτος καὶ μῆκος καὶ
    ⸂ὕψος καὶ βάθος⸃,
translation:
  text: so that you may be strong enough to comprehend, together with all the saints,
    what is the width and length and height and depth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breadth' for 'width.'
    reason: lexical_alternative
  - marker: b
    text: The Greek leaves unstated what these dimensions describe; many understand
      the thought to be completed in the next verse with Messiah's love.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces the purpose/result clause flowing from the preceding prayer.
    'So that' is natural modern English and preserves the telic force without sounding
    wooden.
- source_word: ἐξισχύσητε
  chosen: you may be strong enough
  alternatives:
  - you may have strength
  - you may be fully able
  - you may prevail
  lexicon: BDAG
  rationale: The verb conveys having sufficient strength or ability. Rendering it
    as 'be strong enough' preserves the idea of adequacy for what follows, while fitting
    the infinitive construction with καταλαβέσθαι.
- source_word: καταλαβέσθαι
  chosen: to comprehend
  alternatives:
  - to grasp
  - to understand
  - to apprehend
  lexicon: BDAG
  rationale: In this context the verb refers to mentally grasping or comprehending
    spiritual reality. 'Comprehend' is clear and weighty; 'grasp' is possible but
    slightly more idiomatic and less formal.
- source_word: σὺν πᾶσιν τοῖς ἁγίοις
  chosen: together with all the saints
  alternatives:
  - with all the holy ones
  - along with all God's people
  lexicon: BDAG
  rationale: σύν marks shared participation. ἅγιοι in Paul commonly denotes believers
    as 'saints.' This preserves the established Pauline term while remaining understandable.
    'God's people' is interpretive and less formally tied to the Greek.
- source_word: τί
  chosen: what is
  alternatives:
  - what
  - how great is
  lexicon: BDAG
  rationale: The neuter interrogative introduces the content to be comprehended. 'What
    is' makes the English clause complete before the four dimensions. 'How great is'
    is interpretive, though contextually plausible.
- source_word: τὸ πλάτος
  chosen: the width
  alternatives:
  - the breadth
  lexicon: BDAG
  rationale: πλάτος denotes breadth/width. 'Width' is more natural contemporary English;
    'breadth' is traditional and worth preserving as an alternative.
- source_word: μῆκος
  chosen: length
  lexicon: BDAG
  rationale: Standard dimensional term; 'length' is the direct and natural equivalent.
- source_word: ὕψος
  chosen: height
  lexicon: BDAG
  rationale: Standard dimensional term; 'height' is the direct equivalent.
- source_word: βάθος
  chosen: depth
  lexicon: BDAG
  rationale: Standard dimensional term; 'depth' is the direct equivalent.
