theological_decisions:
- issue: Referent of the four dimensions
  chosen_reading: Leave the object of 'width and length and height and depth' implicit
    in the main text, to be clarified by context rather than supplied by translation.
  alternative_readings:
  - the dimensions refer to Messiah's love
  - the dimensions refer to God's saving plan or fullness
  - the dimensions are intentionally open-ended and completed in the next verse
  rationale: The Greek text does not explicitly state the referent in this verse alone.
    Supplying 'of Messiah's love' here would import wording from the next verse and
    over-resolve an interpretive question. Preserving the open construction maintains
    the textual tension and lets v. 19 complete the thought.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
