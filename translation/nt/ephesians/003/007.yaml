theological_decisions:
- issue: Nature of Paul's role as διάκονος
  chosen_reading: servant
  alternative_readings:
  - minister
  - deacon
  rationale: The verse speaks of Paul's commissioned service in relation to the gospel,
    not explicitly of a formal church office. 'Servant' preserves the functional sense
    without importing later ecclesiastical structure.
  doctrine_reference: Translation philosophy §1, §6
- issue: Agency in ἐγενήθην
  chosen_reading: I became
  alternative_readings:
  - I was made
  rationale: The Greek allows a passive nuance, but 'I became' best reflects idiomatic
    English while still leaving clear from the surrounding phrases that God's grace
    and power are the source of Paul's ministry. This preserves the text's theological
    emphasis without over-specifying agency in the verb itself.
  doctrine_reference: Translation philosophy §3
