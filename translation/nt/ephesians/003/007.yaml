id: EPH.3.7
reference: Ephesians 3:7
source:
  edition: SBLGNT
  text: οὗ ⸀ἐγενήθην διάκονος κατὰ τὴν δωρεὰν τῆς χάριτος τοῦ θεοῦ ⸂τῆς δοθείσης⸃
    μοι κατὰ τὴν ἐνέργειαν τῆς δυνάμεως αὐτοῦ—
translation:
  text: of which I became a servant according to the gift of God's grace given to
    me according to the working of his power—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was made a minister.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  chosen: of which
  alternatives:
  - of whom
  lexicon: BDAG
  rationale: Genitive singular relative pronoun referring back to the immediately
    preceding neuter noun εὐαγγέλιον ('gospel') in context, so 'of which' is the most
    natural English rendering here rather than a personal 'of whom'.
- source_word: ἐγενήθην
  chosen: I became
  alternatives:
  - I was made
  lexicon: BDAG
  rationale: Aorist middle/passive of γίνομαι commonly means 'became' or 'came to
    be.' 'I became' is idiomatic and preserves Paul's sense of entering into the role,
    while 'I was made' is possible but less natural in English.
- source_word: διάκονος
  chosen: servant
  alternatives:
  - minister
  - deacon
  lexicon: BDAG
  rationale: διάκονος denotes one who serves or ministers. 'Servant' is the clearest
    modern English choice here and avoids importing the later ecclesial office sense
    of 'deacon.' 'Minister' is possible but can sound institutional or clerical in
    modern English.
- source_word: κατὰ τὴν δωρεὰν
  chosen: according to the gift
  alternatives:
  - in keeping with the gift
  - by the gift
  lexicon: BDAG
  rationale: 'κατά with the accusative here expresses standard or basis: Paul''s becoming
    a servant is in accordance with the gift bestowed. ''According to the gift'' preserves
    the Greek structure and theological nuance of divine measure/source.'
- source_word: τῆς χάριτος τοῦ θεοῦ
  chosen: of God's grace
  alternatives:
  - of the grace of God
  lexicon: BDAG
  rationale: The genitive chain is rendered smoothly in English as 'of God's grace.'
    This preserves the sense that the gift consists in or is characterized by divine
    grace.
- source_word: τῆς δοθείσης μοι
  chosen: given to me
  alternatives:
  - that was given to me
  lexicon: BDAG
  rationale: The attributive participle modifies χάριτος and is naturally rendered
    in English as a reduced relative expression, 'given to me.' This keeps the sentence
    readable while preserving the passive divine-gift sense.
- source_word: κατὰ τὴν ἐνέργειαν
  chosen: according to the working
  alternatives:
  - according to the operation
  - in accordance with the working
  lexicon: BDAG
  rationale: ἐνέργεια denotes operative power or effective working. 'Working' is natural
    modern English and fits Paul's usage elsewhere without sounding overly technical.
- source_word: τῆς δυνάμεως αὐτοῦ
  chosen: of his power
  alternatives:
  - of his might
  lexicon: BDAG
  rationale: δύναμις is regularly 'power' in Pauline contexts. 'Might' is possible
    but less consistent with common NT usage and slightly more elevated in tone.
