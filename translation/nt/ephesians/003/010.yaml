id: EPH.3.10
reference: Ephesians 3:10
source:
  edition: SBLGNT
  text: ἵνα γνωρισθῇ νῦν ταῖς ἀρχαῖς καὶ ταῖς ἐξουσίαις ἐν τοῖς ἐπουρανίοις διὰ τῆς
    ἐκκλησίας ἡ πολυποίκιλος σοφία τοῦ θεοῦ,
translation:
  text: so that now, through the church, the many-sided wisdom of God might be made
    known to the rulers and the authorities in the heavenly realms,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the manifold wisdom of God.' The Greek term conveys wisdom with many
      facets or rich variety.
    reason: lexical_alternative
  - marker: b
    text: '''The rulers and the authorities in the heavenly realms'' likely refers
      to cosmic or spiritual powers rather than merely human authorities.'
    reason: cultural_note
  - marker: c
    text: Or 'in the heavenly places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    the telic force.
- source_word: γνωρισθῇ
  chosen: might be made known
  alternatives:
  - may be made known
  - might become known
  lexicon: BDAG
  rationale: Aorist passive subjunctive governed by ἵνα; 'might be made known' preserves
    both the passive voice and the purpose nuance.
- source_word: νῦν
  chosen: now
  alternatives:
  - at the present time
  lexicon: BDAG
  rationale: Simple temporal adverb; 'now' is the most direct rendering.
- source_word: ταῖς ἀρχαῖς
  chosen: to the rulers
  alternatives:
  - to the principalities
  - to the rulers/principalities
  lexicon: BDAG
  rationale: In Pauline usage ἀρχαί often denotes cosmic or angelic ruling powers.
    'Rulers' is clear modern English; the more traditional 'principalities' is possible
    but less accessible.
- source_word: ταῖς ἐξουσίαις
  chosen: and the authorities
  alternatives:
  - and the powers
  lexicon: BDAG
  rationale: Common Pauline pairing with ἀρχαί for spiritual/cosmic authorities. 'Authorities'
    closely matches the lexical sense of delegated or exercised authority.
- source_word: ἐν τοῖς ἐπουρανίοις
  chosen: in the heavenly realms
  alternatives:
  - in the heavenlies
  - in the heavenly places
  lexicon: BDAG
  rationale: Pauline expression in Ephesians for the heavenly sphere. 'Heavenly realms'
    is idiomatic and communicates a locative sphere without sounding wooden; 'heavenly
    places' is more traditional but can sound spatially over-specific.
- source_word: διὰ τῆς ἐκκλησίας
  chosen: through the church
  alternatives:
  - by means of the church
  lexicon: BDAG
  rationale: διά with genitive expresses means or instrumentality. 'Through the church'
    is concise and natural while preserving the instrumental sense.
- source_word: ἡ πολυποίκιλος σοφία
  chosen: the many-sided wisdom
  alternatives:
  - the manifold wisdom
  - the richly varied wisdom
  lexicon: BDAG
  rationale: πολυποίκιλος conveys great diversity, variegation, or many facets. 'Many-sided'
    preserves the metaphor of multiplicity in accessible English; 'manifold' is traditional
    but less transparent to modern readers.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward possessive genitive identifying the wisdom as belonging
    to God.
