theological_decisions:
- issue: Identity of 'the rulers and the authorities'
  chosen_reading: Cosmic/spiritual powers are in view, not merely human political
    leaders.
  alternative_readings:
  - Human rulers and authorities
  - A deliberately broad reference including both earthly and heavenly authorities
  rationale: The phrase is a recurring Pauline collocation, and the added qualifier
    'in the heavenly realms' strongly indicates supra-human powers. The translation
    keeps the wording broad enough not to over-specify 'angelic' in the main text,
    while the lexical choices reflect the cosmic setting.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
