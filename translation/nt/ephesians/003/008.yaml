id: EPH.3.8
reference: Ephesians 3:8
source:
  edition: SBLGNT
  text: ἐμοὶ τῷ ἐλαχιστοτέρῳ πάντων ἁγίων ἐδόθη ἡ χάρις αὕτη— ⸀τοῖς ἔθνεσιν εὐαγγελίσασθαι
    ⸂τὸ ἀνεξιχνίαστον πλοῦτος⸃ τοῦ Χριστοῦ,
translation:
  text: To me, the very least of all the saints, this grace was given—to proclaim
    to the Gentiles the unsearchable riches of the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός can be rendered either 'Messiah' or
      'Christ'; here it is translated for meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'the nations.' In this context Paul most likely means the Gentiles, that
      is, the non-Jewish peoples.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''less than the least of all the saints.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαχιστοτέρῳ
  chosen: the very least
  alternatives:
  - less than the least
  - the least
  lexicon: BDAG
  rationale: Comparative/superlative-like form used rhetorically by Paul to express
    extreme humility. 'The very least' is idiomatic modern English that preserves
    the force without the awkward traditional 'less than the least.'
- source_word: ἁγίων
  chosen: the saints
  alternatives:
  - God's holy people
  - the holy ones
  lexicon: BDAG
  rationale: In Pauline usage this commonly refers to believers as God's consecrated
    people. 'The saints' is concise and accurate; 'God's holy people' is possible
    but less formally aligned with the Greek here.
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: Pauline usage regularly carries the sense of gracious divine favor expressed
    in a bestowed commission. 'Grace' preserves both theological and lexical continuity.
- source_word: ἔθνεσιν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In this Pauline context the referent is specifically non-Jews rather
    than nations in a geopolitical sense. 'Gentiles' best communicates the Jew/Gentile
    distinction central to the passage.
- source_word: εὐαγγελίσασθαι
  chosen: to proclaim
  alternatives:
  - to preach the good news
  - to evangelize
  lexicon: BDAG
  rationale: The infinitive expresses Paul's commission to announce good news. 'To
    proclaim' is natural English and fits the object that follows; 'preach the good
    news' is more explicit but heavier, while 'evangelize' is too ecclesiastical for
    the stated style.
- source_word: ἀνεξιχνίαστον
  chosen: unsearchable
  alternatives:
  - unfathomable
  - inscrutable
  lexicon: BDAG
  rationale: The term denotes what cannot be fully traced out or comprehended. 'Unsearchable'
    preserves the metaphor and traditional theological resonance while remaining understandable.
- source_word: πλοῦτος
  chosen: riches
  alternatives:
  - wealth
  - abundance
  lexicon: BDAG
  rationale: Paul frequently uses 'riches' metaphorically for the abundance found
    in God's saving work. It is the most natural and contextually established rendering
    here.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title. Here the genitive is titular and highlights the redemptive riches
    belonging to the anointed one.
