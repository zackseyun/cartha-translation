theological_decisions:
- issue: Whether πατέρα should be rendered as a divine title
  chosen_reading: the Father
  alternative_readings:
  - the father
  rationale: In context Paul is describing prayer directed to God, and the immediately
    following verse expands on this paternal language. Rendering as 'the Father' best
    reflects the referent and normal English theological usage while staying close
    to the Greek.
