id: EPH.3.14
reference: Ephesians 3:14
source:
  edition: SBLGNT
  text: Τούτου χάριν κάμπτω τὰ γόνατά μου πρὸς τὸν ⸀πατέρα,
translation:
  text: For this reason I bend my knees to the Father,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τούτου χάριν
  chosen: For this reason
  alternatives:
  - Because of this
  - On account of this
  lexicon: BDAG
  rationale: This idiomatic genitive + postposition construction introduces the ground
    or motivation for what follows. 'For this reason' is natural modern English and
    preserves the discourse connection to the preceding context better than a more
    wooden 'because of this.'
- source_word: κάμπτω
  chosen: I bend
  alternatives:
  - I bow
  - I kneel
  lexicon: BDAG
  rationale: The verb literally means 'bend.' Since the object 'my knees' is expressed,
    'I bend my knees' preserves the Greek image while remaining idiomatic enough in
    English. 'I kneel' is interpretive and slightly compresses the bodily imagery;
    'I bow' is possible but less precise with the explicit mention of knees.
- source_word: τὰ γόνατά μου
  chosen: my knees
  alternatives:
  - the knees of me
  lexicon: BDAG
  rationale: Rendered idiomatically as 'my knees.' The explicit body-part expression
    should be retained rather than reduced away, since Paul depicts a posture of prayer.
- source_word: πρὸς
  chosen: to
  alternatives:
  - before
  - toward
  lexicon: BDAG
  rationale: With a personal object here, πρός indicates direction/orientation toward
    the one addressed in prayer. 'To' is the most natural English equivalent in this
    context. 'Before' is possible but adds a nuance not required by the preposition
    itself.
- source_word: πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: The article and context in Ephesians favor a titular/theological sense
    rather than an indefinite or merely generic 'father.' Capitalizing 'Father' reflects
    standard English usage for God as addressed in prayer without importing additional
    content beyond the context.
