  rationale: The construction 'for the sake of you' is not idiomatic English; the
    standard idiom is 'for your sake'. While the final phrase 'for the sake of you
    Gentiles' is understandable, a more natural and equally accurate rendering would
    be 'on behalf of you Gentiles.' This phrasing smoothly captures the representative/benefactive
    sense of 'ὑπὲρ' and the apposition of 'you Gentiles'.
