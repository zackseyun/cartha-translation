theological_decisions:
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: Here Χριστοῦ functions as a title attached to Jesus, not merely as a
    fixed surname-like proper name. Following the doctrine's contested-terms guidance,
    the title is translated as 'Messiah' in the main text, while the traditional 'Christ
    Jesus' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
