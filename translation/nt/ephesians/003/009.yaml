theological_decisions:
- issue: Meaning of οἰκονομία in relation to the mystery
  chosen_reading: administration
  alternative_readings:
  - stewardship
  - plan
  rationale: The verse speaks of the outworking or administration of the mystery rather
    than merely its content. 'Administration' preserves the concrete managerial sense
    without importing a later technical dispensational framework.
  doctrine_reference: Translation philosophy §1, §5
- issue: Temporal force of ἀπὸ τῶν αἰώνων
  chosen_reading: from the ages
  alternative_readings:
  - from eternity
  - for ages
  rationale: The Greek refers to the ages rather than explicitly to eternity. Rendering
    it more literally preserves theological tension and avoids overstating the temporal
    claim.
  doctrine_reference: Translation philosophy §1, §3
