id: EPH.3.9
reference: Ephesians 3:9
source:
  edition: SBLGNT
  text: καὶ φωτίσαι ⸀πάντας τίς ἡ οἰκονομία τοῦ μυστηρίου τοῦ ἀποκεκρυμμένου ἀπὸ τῶν
    αἰώνων ἐν τῷ θεῷ τῷ τὰ πάντα ⸀κτίσαντι,
translation:
  text: and to bring to light for everyone what is the administration of the mystery
    hidden from the ages in God, who created all things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is the stewardship of the mystery' or 'what is the plan of the
      mystery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hidden for ages' or, more interpretively, 'hidden from eternity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωτίσαι
  chosen: to bring to light
  alternatives:
  - to enlighten
  - to make known
  lexicon: BDAG
  rationale: The infinitive continues Paul's purpose statement. 'Bring to light' preserves
    the illumination metaphor without sounding overly internalized or mystical, and
    fits the object clause that follows.
- source_word: πάντας
  chosen: for everyone
  alternatives:
  - everyone
  - all people
  - all
  lexicon: BDAG
  rationale: Although literally 'all,' the sense here is personal rather than abstract.
    'For everyone' expresses the universal scope naturally in English while avoiding
    an awkward 'enlighten all as to what...' construction.
- source_word: τίς ἡ οἰκονομία
  chosen: what is the administration
  alternatives:
  - what is the stewardship
  - what is the plan
  - what is the arrangement
  lexicon: BDAG
  rationale: οἰκονομία can denote administration, stewardship, or arrangement/plan.
    In this context of God's outworking of the mystery, 'administration' best captures
    the managerial/dispensational sense without over-paraphrasing. 'Plan' is possible
    but less formally tied to the noun's household-management background.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: Pauline usage favors 'mystery' as a divine purpose once hidden and now
    revealed. 'Secret' is understandable but loses the established theological resonance
    of the term in Paul.
- source_word: ἀποκεκρυμμένου
  chosen: hidden
  alternatives:
  - having been hidden
  - kept hidden
  lexicon: BDAG
  rationale: The perfect passive participle indicates a state resulting from prior
    concealment. 'Hidden' is concise and idiomatic; the temporal depth is further
    conveyed by the following phrase 'from the ages.'
- source_word: ἀπὸ τῶν αἰώνων
  chosen: from the ages
  alternatives:
  - for ages
  - from the beginning of the ages
  - from eternity
  lexicon: BDAG
  rationale: The phrase is literally 'from the ages' and points to long-standing concealment
    across the ages. This preserves the source wording better than the more interpretive
    'from eternity,' while still sounding acceptable in English.
- source_word: ἐν τῷ θεῷ
  chosen: in God
  alternatives:
  - with God
  lexicon: BDAG
  rationale: ἐν is most straightforwardly rendered 'in.' Here it expresses the mystery's
    being hidden in God, not merely with God. This preserves Paul's wording and theological
    nuance.
- source_word: τῷ τὰ πάντα κτίσαντι
  chosen: who created all things
  alternatives:
  - the one who created all things
  lexicon: BDAG
  rationale: The articular participle identifies God descriptively. English relative
    clause style is natural here. 'All things' is the standard rendering of τὰ πάντα
    and fits Pauline usage.
