id: EPH.3.5
reference: Ephesians 3:5
source:
  edition: SBLGNT
  text: ὃ ἑτέραις γενεαῖς οὐκ ἐγνωρίσθη τοῖς υἱοῖς τῶν ἀνθρώπων ὡς νῦν ἀπεκαλύφθη
    τοῖς ἁγίοις ἀποστόλοις αὐτοῦ καὶ προφήταις ἐν πνεύματι,
translation:
  text: which was not made known to the sons of men in other generations as it has
    now been revealed to his holy apostles and prophets in the Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to human beings' / 'to humanity'; the Greek reads literally 'to the
      sons of men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Spirit'; the Greek phrase can express sphere or means.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ
  chosen: which
  alternatives:
  - this mystery
  - which mystery
  lexicon: BDAG
  rationale: Neuter relative pronoun referring back to the previously mentioned mystery
    (v. 4). English 'which' preserves the Greek relative linkage without importing
    the antecedent into this verse.
- source_word: ἑτέραις γενεαῖς
  chosen: in other generations
  alternatives:
  - to other generations
  - in former generations
  lexicon: BDAG
  rationale: 'Dative phrase is best rendered temporally here: ''in other generations.''
    ''Former generations'' is possible, but ''other'' more directly reflects ἑτέραις.'
- source_word: ἐγνωρίσθη
  chosen: was not made known
  alternatives:
  - was not known
  - was not disclosed
  lexicon: BDAG
  rationale: Passive of γνωρίζω means 'make known, disclose.' 'Was not made known'
    preserves the passive and the causative sense better than the flatter 'was not
    known.'
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  chosen: to the sons of men
  alternatives:
  - to humanity
  - to human beings
  - to the children of men
  lexicon: BDAG
  rationale: This is a semitic-sounding expression meaning humankind generally. Per
    gender-accurate philosophy, 'sons of men' best matches the source form and register;
    a footnote preserves the more idiomatic inclusive sense.
- source_word: ὡς νῦν
  chosen: as it has now
  alternatives:
  - as now
  - as it is now
  lexicon: BDAG
  rationale: 'The comparison is qualitative/temporal: not previously made known in
    the way or degree that it now has been. Supplying ''it has'' yields natural English
    while preserving the comparative force.'
- source_word: ἀπεκαλύφθη
  chosen: been revealed
  alternatives:
  - been disclosed
  - been unveiled
  lexicon: BDAG
  rationale: Passive of ἀποκαλύπτω is a key revelatory term in Paul. 'Revealed' is
    the standard and clearest rendering.
- source_word: τοῖς ἁγίοις ἀποστόλοις αὐτοῦ καὶ προφήταις
  chosen: to his holy apostles and prophets
  alternatives:
  - to his apostles and prophets who are holy
  - to the holy apostles and prophets belonging to him
  lexicon: BDAG
  rationale: The adjective ἁγίοις most naturally modifies both coordinated nouns.
    αὐτοῦ is rendered 'his,' referring to God/Christ in context, without over-specifying
    beyond the Greek.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - by the Spirit
  - in spirit
  lexicon: BDAG
  rationale: Given Pauline usage and the revelatory context, the phrase most likely
    refers to the Holy Spirit rather than the human spirit. 'In the Spirit' preserves
    the preposition and leaves the exact nuance of agency/sphere intact.
