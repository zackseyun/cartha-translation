theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual realm/mode
  rationale: In this context of divine revelation to apostles and prophets, Paul's
    usage strongly favors the Holy Spirit as the sphere/means of revelation. Capitalizing
    'Spirit' reflects this likely referent while preserving the Greek preposition
    'in.'
