id: EPH.3.17
reference: Ephesians 3:17
source:
  edition: SBLGNT
  text: κατοικῆσαι τὸν Χριστὸν διὰ τῆς πίστεως ἐν ταῖς καρδίαις ὑμῶν ἐν ἀγάπῃ· ἐρριζωμένοι
    καὶ τεθεμελιωμένοι,
translation:
  text: so that the Messiah may dwell in your hearts through faith, being rooted and
    grounded in love,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'through trust.' The Greek πίστις can also carry the sense of trust or
      faithfulness, though 'faith' best fits here.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in love' is most naturally read with 'being rooted and grounded,'
      though some take it with 'may dwell in your hearts.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατοικῆσαι
  chosen: may dwell
  alternatives:
  - may live
  - may make his home
  lexicon: BDAG
  rationale: Aorist infinitive dependent on the preceding prayer clause ('that he
    may grant...'), expressing result/purpose. 'Dwell' preserves the sense of settled
    residence better than the weaker 'live,' while remaining idiomatic.
- source_word: τὸν Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a name-like form. Here the article and syntax support a titular
    sense.
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine. In this context the phrase most
    naturally refers to the means by which the Messiah dwells in believers' hearts.
    Alternatives are possible at the lexical level but are less likely here.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  alternatives:
  - among your inner selves
  lexicon: BDAG
  rationale: A standard anthropological expression referring to the inner person,
    not merely emotions. 'In your hearts' is both faithful and natural English.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: ἀγάπη defaults to 'love' per doctrine. The prepositional phrase is best
    taken with the following participles, describing the sphere or soil in which believers
    are rooted and grounded.
- source_word: ἐρριζωμένοι
  chosen: being rooted
  alternatives:
  - having been rooted
  lexicon: BDAG
  rationale: Perfect passive participle with continuing state. 'Being rooted' reads
    smoothly in English while still conveying a present resultant condition from a
    completed action.
- source_word: τεθεμελιωμένοι
  chosen: grounded
  alternatives:
  - founded
  - established on a foundation
  lexicon: BDAG
  rationale: The architectural metaphor pairs with the agricultural 'rooted.' 'Grounded'
    is concise, idiomatic, and preserves the foundational sense without overexpansion.
