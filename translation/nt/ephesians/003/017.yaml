theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    rather than transliterated where context supports it. This preserves the title's
    meaning without importing a denominationally distinctive reading.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Referent of πίστις in διὰ τῆς πίστεως
  chosen_reading: through faith
  alternative_readings:
  - through trust
  - through faithfulness
  rationale: The doctrine excerpt sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. This verse does not present the specific
    pistis-Christou ambiguity, so the default is retained in the main text while lexical
    alternatives are documented.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
- issue: Attachment of ἐν ἀγάπῃ
  chosen_reading: taken with 'being rooted and grounded'
  alternative_readings:
  - taken with 'may dwell in your hearts'
  rationale: The punctuation and flow favor connecting 'in love' with the participles
    that follow, yielding the sense that believers are rooted and grounded in love.
    This preserves the syntax without forcing a less likely connection to the dwelling
    of the Messiah.
