id: EPH.3.16
reference: Ephesians 3:16
source:
  edition: SBLGNT
  text: ἵνα ⸀δῷ ὑμῖν κατὰ ⸂τὸ πλοῦτος⸃ τῆς δόξης αὐτοῦ δυνάμει κραταιωθῆναι διὰ τοῦ
    πνεύματος αὐτοῦ εἰς τὸν ἔσω ἄνθρωπον,
translation:
  text: that he may grant you, according to the riches of his glory, to be strengthened
    with power through his Spirit in the inner man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the inner person.' The Greek says 'inner man,' a representative
      singular expression for the inward self.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of Paul's prayer request. 'That' is natural
    in English prayer syntax while preserving the subordinating force.
- source_word: δῷ
  chosen: he may grant
  alternatives:
  - he may give
  lexicon: BDAG
  rationale: Aorist subjunctive of δίδωμι under ἵνα. 'Grant' fits the prayer context
    better than the more generic 'give' without adding meaning.
- source_word: κατὰ τὸ πλοῦτος τῆς δόξης αὐτοῦ
  chosen: according to the riches of his glory
  alternatives:
  - in keeping with the wealth of his glory
  - out of the riches of his glory
  lexicon: BDAG
  rationale: κατά with the accusative here indicates measure or standard, best rendered
    'according to' rather than 'out of,' which could suggest only a portion. 'Riches'
    is the standard rendering of πλοῦτος, and 'glory' preserves δόξα's theological
    weight.
- source_word: δυνάμει
  chosen: with power
  alternatives:
  - in power
  - by power
  lexicon: BDAG
  rationale: Dative of means/instrument closely linked with the infinitive κραταιωθῆναι.
    'With power' is idiomatic and preserves the sense of empowering strength.
- source_word: κραταιωθῆναι
  chosen: to be strengthened
  alternatives:
  - to be made strong
  - to be empowered
  lexicon: BDAG
  rationale: Passive infinitive meaning to become strong or be strengthened. 'To be
    strengthened' is clear, natural, and preserves the passive sense.
- source_word: διὰ τοῦ πνεύματος αὐτοῦ
  chosen: through his Spirit
  alternatives:
  - through his spirit
  lexicon: BDAG
  rationale: διά with the genitive marks means or agency. In Pauline usage here, πνεῦμα
    refers to God's Spirit, so 'Spirit' is capitalized to reflect the referent rather
    than to impose extra theology.
- source_word: εἰς τὸν ἔσω ἄνθρωπον
  chosen: in the inner man
  alternatives:
  - into the inner man
  - for the inner person
  lexicon: BDAG
  rationale: This phrase denotes the inward aspect of the person. 'In the inner man'
    is more idiomatic in English than a wooden 'into,' while still reflecting the
    sphere/target of strengthening. 'Man' is retained per gender-accurate policy because
    ἄνθρωπον here is singular and representative, and 'inner man' is a recognized
    Pauline expression.
