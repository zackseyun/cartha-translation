theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: the Holy Spirit ('his Spirit')
  alternative_readings:
  - his spirit understood more generally as a non-personal divine influence
  rationale: In context, Paul's prayer speaks of divine agency in believers, and Pauline
    usage strongly supports the personal divine Spirit. Capitalization in English
    signals the likely referent while the wording remains simply 'his Spirit' as in
    the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of ἔσω ἄνθρωπον
  chosen_reading: inner man
  alternative_readings:
  - inner person
  rationale: The Greek is grammatically masculine but representative rather than male-specific.
    Per the gender-accurate policy, the translation keeps 'man' where it matches the
    source's representative force, while preserving the inclusive alternative in a
    footnote.
  doctrine_reference: Translation philosophy §4
