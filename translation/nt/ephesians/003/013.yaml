id: EPH.3.13
reference: Ephesians 3:13
source:
  edition: SBLGNT
  text: διὸ αἰτοῦμαι μὴ ⸀ἐγκακεῖν ἐν ταῖς θλίψεσίν μου ὑπὲρ ὑμῶν, ἥτις ἐστὶν δόξα
    ὑμῶν.
translation:
  text: Therefore I ask you not to lose heart because of my afflictions for your sake,
    which are your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not to become discouraged at my afflictions for your sake.'
    reason: lexical_alternative
  - marker: b
    text: That is, Paul's sufferings on their behalf are for their honor in God's
      saving purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' is concise
    and natural, preserving the logical connection without overexpanding.
- source_word: αἰτοῦμαι
  chosen: I ask you
  alternatives:
  - I ask
  - I request
  lexicon: BDAG
  rationale: The middle/passive form here introduces Paul's appeal. Supplying 'you'
    in English clarifies the implied addressee from context and fits the infinitive
    construction that follows.
- source_word: μὴ ἐγκακεῖν
  chosen: not to lose heart
  alternatives:
  - not to become discouraged
  - not to grow weary
  - not to give up
  lexicon: BDAG
  rationale: ἐγκακέω commonly means to lose courage or become discouraged. 'Lose heart'
    is a well-established, readable English equivalent that preserves the idiomatic
    force better than a wooden rendering.
- source_word: ἐν ταῖς θλίψεσίν μου
  chosen: because of my afflictions
  alternatives:
  - in my afflictions
  - at my afflictions
  - over my afflictions
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with verbs of discouragement the sense
    is causal or occasioned by something. 'Because of my afflictions' communicates
    the intended relation in natural English while retaining θλῖψις as 'afflictions'
    rather than softening it.
- source_word: θλίψεσίν
  chosen: afflictions
  alternatives:
  - tribulations
  - sufferings
  - troubles
  lexicon: BDAG
  rationale: θλῖψις denotes pressure, trouble, or affliction. 'Afflictions' preserves
    the seriousness of Paul's sufferings without sounding archaic like 'tribulations'
    in this context.
- source_word: ὑπὲρ ὑμῶν
  chosen: for your sake
  alternatives:
  - for you
  - on your behalf
  lexicon: BDAG
  rationale: ὑπέρ here expresses benefit or representation. 'For your sake' makes
    clear that Paul's sufferings are endured in service of the Gentile believers addressed.
- source_word: ἥτις
  chosen: which
  alternatives:
  - and these
  - which indeed
  lexicon: BDAG
  rationale: The qualitative relative pronoun points back to the preceding idea, especially
    the afflictions as characterized by their significance. 'Which' is sufficient
    in English; the nuance is carried by the clause as a whole.
- source_word: δόξα ὑμῶν
  chosen: your glory
  alternatives:
  - your honor
  - your boast
  lexicon: BDAG
  rationale: δόξα can denote glory, honor, or grounds for pride. 'Your glory' best
    preserves the theological and rhetorical weight, indicating that Paul's sufferings
    redound to the Ephesians' honor in God's saving plan.
