theological_decisions:
- issue: Referent of the singular relative clause ἥτις ἐστὶν δόξα ὑμῶν
  chosen_reading: The clause refers to Paul's afflictions as constituting the Ephesians'
    glory.
  alternative_readings:
  - The clause refers more broadly to Paul's ministry/suffering on their behalf as
    their glory.
  rationale: The nearest antecedent is 'my afflictions,' and the singular relative
    naturally points back to that phrase as a conceptual whole. The translation keeps
    the wording broad enough to preserve the rhetorical sense without importing a
    narrower doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
