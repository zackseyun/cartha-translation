theological_decisions:
- issue: Meaning of μυστήριον in Pauline usage
  chosen_reading: Retain 'the mystery' as a revealed divine purpose formerly hidden,
    without paraphrasing its content in the verse itself.
  alternative_readings:
  - the secret
  - God's hidden plan
  rationale: The verse names the concept but does not yet define it fully; importing
    the fuller content from surrounding verses would exceed the source text. 'Mystery'
    preserves Paul's theological category and leaves the explanation to the context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; never paraphrase beyond what the source text warrants.'
