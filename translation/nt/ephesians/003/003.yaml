id: EPH.3.3
reference: Ephesians 3:3
source:
  edition: SBLGNT
  text: ⸀κατὰ ἀποκάλυψιν ⸀ἐγνωρίσθη μοι τὸ μυστήριον, καθὼς προέγραψα ἐν ὀλίγῳ,
translation:
  text: that the mystery was made known to me by revelation, as I wrote before briefly,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to revelation' or 'through revelation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was revealed to me'; Greek 'was made known to me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in brief' or 'in a few words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ ἀποκάλυψιν
  chosen: by revelation
  alternatives:
  - according to revelation
  - through revelation
  lexicon: BDAG
  rationale: The preposition κατά with the accusative here expresses manner or norm,
    and in idiomatic English 'by revelation' best conveys that the disclosure came
    through divine unveiling. 'According to revelation' is more formal but less natural
    in context.
- source_word: ἐγνωρίσθη μοι
  chosen: was made known to me
  alternatives:
  - was revealed to me
  - became known to me
  lexicon: BDAG
  rationale: The aorist passive of γνωρίζω means 'was made known.' This preserves
    the passive form of the Greek without over-interpreting the implied agent. 'Was
    revealed to me' is possible in context, but since ἀποκάλυψις already supplies
    the revelation language, retaining 'made known' avoids redundancy and stays closer
    to the verb.
- source_word: τὸ μυστήριον
  chosen: the mystery
  alternatives:
  - this mystery
  - the secret
  lexicon: BDAG
  rationale: Pauline μυστήριον commonly denotes a divine purpose once hidden and now
    disclosed. 'Mystery' is the established and accurate rendering in this theological
    context; 'secret' is possible but can sound too mundane or private in English.
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  - in keeping with how
  lexicon: BDAG
  rationale: A simple comparative conjunction is sufficient here, linking the present
    statement to Paul's earlier writing. 'As' is natural and adequately precise.
- source_word: προέγραψα
  chosen: I wrote before
  alternatives:
  - I wrote previously
  - I wrote earlier
  lexicon: BDAG
  rationale: In this context προγράφω refers to writing earlier in the letter rather
    than publicly posting or depicting. 'I wrote before' is concise and idiomatic,
    matching the temporal sense.
- source_word: ἐν ὀλίγῳ
  chosen: briefly
  alternatives:
  - in brief
  - in a few words
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for brevity or conciseness. 'Briefly'
    gives smooth modern English while preserving the sense that Paul had mentioned
    the matter only in short form earlier.
