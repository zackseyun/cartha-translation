theological_decisions:
- issue: Referent of 'the stewardship of God's grace'
  chosen_reading: Paul refers to the entrusted commission/administration of God's
    grace given to him on behalf of the readers.
  alternative_readings:
  - Paul refers more abstractly to God's salvific plan/dispensation itself
  rationale: The immediate context in Ephesians 3 emphasizes Paul's role as minister
    to the Gentiles. 'Stewardship' preserves the personal entrusted-office nuance
    without denying the broader divine plan behind it.
  doctrine_reference: Translation philosophy §5
- issue: Force of εἴ γε
  chosen_reading: A rhetorical assumption expected to be true, not genuine uncertainty.
  alternative_readings:
  - 'A straightforward conditional: ''if indeed'''
  rationale: Paul writes as though his readers are already aware of this grace given
    to him. The translation preserves the conditional structure while signaling expected
    truth.
  doctrine_reference: Translation philosophy §6
