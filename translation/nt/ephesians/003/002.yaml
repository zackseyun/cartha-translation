id: EPH.3.2
reference: Ephesians 3:2
source:
  edition: SBLGNT
  text: εἴ γε ἠκούσατε τὴν οἰκονομίαν τῆς χάριτος τοῦ θεοῦ τῆς δοθείσης μοι εἰς ὑμᾶς·
translation:
  text: assuming indeed that you have heard of the stewardship of God's grace that
    was given to me for you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if indeed you have heard.' The Greek keeps a conditional form, though
      in context Paul likely assumes this is true.
    reason: alternative_reading
  - marker: b
    text: Or 'administration' or 'commission' for 'stewardship.' The Greek term can
      denote entrusted management or administration.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  chosen: assuming indeed that
  alternatives:
  - if indeed
  - surely
  lexicon: BDAG
  rationale: The combination often introduces an assumption Paul expects to be true
    rather than expressing real doubt. 'Assuming indeed that' preserves the conditional
    form while conveying the rhetorical force better than a bare 'if indeed.'
- source_word: ἠκούσατε
  chosen: you have heard
  alternatives:
  - you heard
  - you came to hear
  lexicon: BDAG
  rationale: Rendered as present perfect in English to reflect a past event with present
    relevance in natural English style. The aorist indicates the hearing as a whole
    event, but 'have heard' fits the discourse context well.
- source_word: οἰκονομίαν
  chosen: stewardship
  alternatives:
  - administration
  - commission
  - plan
  lexicon: BDAG
  rationale: Here the sense is Paul's entrusted administrative responsibility regarding
    divine grace toward the Gentiles. 'Stewardship' preserves the entrusted-management
    nuance better than the broader 'administration' or the more interpretive 'plan.'
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Standard Pauline sense of God's gracious gift and calling. 'Grace' best
    preserves both theological and lexical continuity.
- source_word: τοῦ θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: 'Rendered with the English possessive for natural style while preserving
    the genitival relationship: the grace belongs to or comes from God.'
- source_word: τῆς δοθείσης
  chosen: that was given
  alternatives:
  - which was given
  - having been given
  lexicon: BDAG
  rationale: The attributive participle modifies 'grace' or, by close relation, the
    stewardship of grace as given to Paul. 'That was given' is clear, natural English
    and preserves the passive divine-gift sense.
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: Simple dative of indirect object; 'to me' is the most transparent rendering.
- source_word: εἰς ὑμᾶς
  chosen: for you
  alternatives:
  - to you
  - toward you
  - for your sake
  lexicon: BDAG
  rationale: In context this expresses direction/purpose of Paul's entrusted grace-ministry
    toward the Ephesian believers/Gentiles. 'For you' communicates benefit and orientation
    more idiomatically than 'toward you.'
