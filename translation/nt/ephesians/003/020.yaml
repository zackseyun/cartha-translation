theological_decisions:
- issue: Referent of the implied recipient of the doxology
  chosen_reading: Rendered generically as 'the one who is able,' leaving the referent
    to the broader context rather than inserting 'God' into this verse alone.
  alternative_readings:
  - to God who is able
  rationale: The Greek does not explicitly repeat 'God' in this verse, though the
    context clearly points to God. The translation preserves the syntax of the doxological
    continuation without importing an explicit noun absent from the verse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of divine power in believers
  chosen_reading: '''the power at work in us'''
  alternative_readings:
  - the power working among us
  rationale: This wording preserves the text's affirmation of God's effective power
    operative within believers without specifying a denominational account of sanctification
    or spiritual gifts. It maintains the theological tension and breadth of the Greek.
  doctrine_reference: Affirmations; Translation philosophy §3
