id: EPH.3.20
reference: Ephesians 3:20
source:
  edition: SBLGNT
  text: Τῷ δὲ δυναμένῳ ὑπὲρ πάντα ποιῆσαι ὑπερεκπερισσοῦ ὧν αἰτούμεθα ἢ νοοῦμεν κατὰ
    τὴν δύναμιν τὴν ἐνεργουμένην ἐν ἡμῖν,
translation:
  text: Now to the one who is able to do far beyond all that we ask or think, according
    to the power at work in us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abundantly beyond' or 'beyond measure'; the Greek intensifies the idea
      of exceeding what is asked or thought.
    reason: lexical_alternative
  - marker: b
    text: Or 'think' could be rendered 'imagine' here, emphasizing what the mind can
      conceive.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῷ ... δυναμένῳ
  chosen: to the one who is able
  alternatives:
  - to him who is able
  - to the one being able
  lexicon: BDAG
  rationale: The dative articular participle functions as the indirect object of the
    doxology carried into v. 21. 'To the one who is able' preserves the participial
    force while using natural English. 'Him' is possible, but 'the one' better reflects
    the substantival participle.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here marks a transition into the doxological conclusion rather than
    strong contrast. 'Now' gives a natural discourse shift in English without overstating
    adversative force.
- source_word: ὑπὲρ πάντα
  chosen: beyond all
  alternatives:
  - above all
  - more than all things
  lexicon: BDAG
  rationale: With ποιῆσαι, ὑπέρ expresses exceeding measure. 'Beyond all' is concise
    and idiomatic, preserving the comparative sense without awkward literalism.
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to accomplish
  - to make
  lexicon: BDAG
  rationale: ποιέω is broad, and 'do' best matches the Greek's simplicity here. 'Accomplish'
    is interpretive and slightly more specific than the source warrants.
- source_word: ὑπερεκπερισσοῦ
  chosen: far beyond
  alternatives:
  - abundantly beyond
  - beyond measure
  - superabundantly
  lexicon: BDAG
  rationale: This intensive adverb stacks prefixes for emphasis. 'Far beyond' communicates
    the superlative force in readable modern English. A more literal 'abundantly beyond'
    is possible and preserved as a lexical alternative footnote.
- source_word: ὧν αἰτούμεθα ἢ νοοῦμεν
  chosen: all that we ask or think
  alternatives:
  - what we ask or imagine
  - the things we ask or understand
  lexicon: BDAG
  rationale: The genitive relative after a comparative/exceeding expression is idiomatically
    rendered 'all that.' αἰτούμεθα is 'ask,' and νοοῦμεν here is best taken as mental
    conception or thought. 'Think' is broad and natural; 'imagine' is possible but
    somewhat narrower.
- source_word: κατὰ τὴν δύναμιν
  chosen: according to the power
  alternatives:
  - in keeping with the power
  - by the power
  lexicon: BDAG
  rationale: κατά with the accusative here indicates standard or measure, not merely
    instrument. 'According to' preserves that nuance better than the more instrumental
    'by'.
- source_word: τὴν ἐνεργουμένην
  chosen: at work
  alternatives:
  - working
  - being at work
  - operating
  lexicon: BDAG
  rationale: The present middle/passive participle describes power presently active.
    'At work' is idiomatic English and captures ongoing effective activity without
    awkwardness.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: The most direct sense is internal or corporate indwelling/activity 'in
    us.' 'Among us' is possible in some contexts, but here the emphasis on divine
    power operative within believers favors 'in us.'
