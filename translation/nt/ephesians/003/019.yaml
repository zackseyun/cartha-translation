id: EPH.3.19
reference: Ephesians 3:19
source:
  edition: SBLGNT
  text: γνῶναί τε τὴν ὑπερβάλλουσαν τῆς γνώσεως ἀγάπην τοῦ Χριστοῦ, ἵνα πληρωθῆτε
    εἰς πᾶν τὸ πλήρωμα τοῦ θεοῦ.
translation:
  text: and to know the love of the Messiah that surpasses knowledge, so that you
    may be filled unto all the fullness of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the love of Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'filled with all the fullness of God.' The Greek says 'filled unto all
      the fullness of God,' a compressed expression that may emphasize movement toward
      the full measure of God's fullness.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνῶναί
  chosen: to know
  alternatives:
  - to comprehend
  - to come to know
  lexicon: BDAG
  rationale: Aorist infinitive of γινώσκω, coordinated with the preceding prayer request.
    'To know' is the most direct and natural rendering, while still allowing experiential
    as well as cognitive force in context.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - both
  lexicon: BDAG
  rationale: τέ lightly coordinates this infinitive with the preceding infinitives
    in Paul's prayer. English 'and' best reflects the connective force without overtranslating.
- source_word: ὑπερβάλλουσαν
  chosen: that surpasses
  alternatives:
  - surpassing
  - beyond
  lexicon: BDAG
  rationale: Present participle modifying 'love.' A relative clause in English is
    smoother than a bare participle and preserves the ongoing, superlative sense.
- source_word: τῆς γνώσεως
  chosen: knowledge
  alternatives:
  - understanding
  - knowing
  lexicon: BDAG
  rationale: Genitive after ὑπερβάλλουσαν, expressing that Christ's love exceeds knowledge.
    'Knowledge' preserves the lexical link with γνῶναί and the paradox of knowing
    what surpasses knowledge.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Default rendering per doctrine table. No contextual reason to vary.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a mere name-like identifier, and
    the doctrine guidelines prefer 'Messiah' where context supports. The genitive
    is best taken as possessive/objective in the sense 'the Messiah's love' or 'love
    belonging to the Messiah'; English 'of the Messiah' preserves the Greek form without
    overresolving nuances.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and
    preserves the clause's teleological force.
- source_word: πληρωθῆτε
  chosen: you may be filled
  alternatives:
  - you may be made full
  - you may be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive. 'Be filled' is the standard and clearest
    rendering; 'fulfilled' would suggest a different semantic field.
- source_word: εἰς
  chosen: unto
  alternatives:
  - with
  - to
  - into
  lexicon: BDAG
  rationale: εἰς with πλήρωμα is difficult. 'Unto' preserves movement toward a goal
    without making the phrase mean simply 'with all the fullness,' which would flatten
    the preposition. It keeps the expansive, telic sense while remaining intelligible.
- source_word: πᾶν τὸ πλήρωμα
  chosen: all the fullness
  alternatives:
  - the whole fullness
  - all fullness
  lexicon: BDAG
  rationale: The phrase is emphatic and comprehensive. 'All the fullness' is idiomatic
    and preserves the force of πᾶν with the articular noun.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: A straightforward genitive. 'Of God' preserves the Greek wording and
    avoids importing a more interpretive expansion such as 'that comes from God' into
    the main text.
