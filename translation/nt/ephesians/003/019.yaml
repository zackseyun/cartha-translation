theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah'
    where it functions as a title. In this prayer context, the titular sense remains
    active and the rendering preserves the messianic meaning rather than defaulting
    to traditional transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Meaning of 'the love of the Messiah'
  chosen_reading: left formally as 'the love of the Messiah' without specifying whether
    it is the Messiah's love for believers or believers' love for the Messiah
  alternative_readings:
  - the Messiah's love
  - love for the Messiah
  rationale: Although context strongly favors the Messiah's love shown to believers,
    the Greek genitive construction is preserved in translation rather than paraphrased.
    This maintains transparency and avoids resolving more than the text itself states
    in this phrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Rendering εἰς πᾶν τὸ πλήρωμα τοῦ θεοῦ
  chosen_reading: filled unto all the fullness of God
  alternative_readings:
  - filled with all the fullness of God
  - filled up to all the fullness of God
  rationale: This phrase is theologically weighty and syntactically compressed. 'Unto'
    preserves the directional force of εἰς and avoids overstating a metaphysical identity
    or collapsing the phrase into a simpler instrumental sense. The wording keeps
    Paul's exalted expression without importing later doctrinal formulations beyond
    the text.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve theological tension
    rather than resolve it'
