id: EPH.3.12
reference: Ephesians 3:12
source:
  edition: SBLGNT
  text: ἐν ᾧ ἔχομεν τὴν παρρησίαν ⸀καὶ προσαγωγὴν ἐν πεποιθήσει διὰ τῆς πίστεως αὐτοῦ.
translation:
  text: in whom we have boldness and access with confidence through faith in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through his faithfulness.' The Greek phrase can mean either faith directed
      toward him or his own faithfulness.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative pronoun is masculine singular dative, most naturally referring
    back to the Messiah in the preceding context rather than to an abstract concept.
    'In whom' preserves the personal, union-with-Christ sense.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - freedom of speech
  - confidence
  lexicon: BDAG
  rationale: The term commonly denotes frankness, openness, or boldness. 'Boldness'
    fits the context of approaching God without fear and avoids collapsing it into
    the later πεποιθήσει, which is better rendered separately.
- source_word: προσαγωγὴν
  chosen: access
  alternatives:
  - approach
  - introduction
  lexicon: BDAG
  rationale: In Pauline usage this term refers to access or entry into the presence
    of God. 'Access' is idiomatic and theologically apt here, while 'approach' is
    possible but less established in English for this context.
- source_word: ἐν πεποιθήσει
  chosen: with confidence
  alternatives:
  - in confidence
  - in assurance
  lexicon: BDAG
  rationale: Although literally 'in confidence,' idiomatic English expresses the attendant
    manner as 'with confidence.' This distinguishes it from παρρησία while preserving
    the sense of assuredness.
- source_word: διὰ τῆς πίστεως αὐτοῦ
  chosen: through faith in him
  alternatives:
  - through his faithfulness
  - through faithfulness to him
  lexicon: BDAG
  rationale: 'πίστις defaults to ''faith'' per doctrine guidance. The genitive αὐτοῦ
    is contested: it may be objective (''faith in him'') or subjective (''his faithfulness'').
    Given the immediate context of believers'' access and common Pauline idiom, the
    main text uses ''faith in him,'' while preserving ''through his faithfulness''
    in a footnote per the instruction to preserve theological tension.'
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - his
  lexicon: BDAG
  rationale: Rendered as 'him' because it is construed with πίστις as an objective
    genitive in the main text ('faith in him'). The alternative subjective-genitive
    reading is preserved in a footnote.
