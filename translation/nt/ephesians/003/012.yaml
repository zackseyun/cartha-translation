theological_decisions:
- issue: Interpretation of διὰ τῆς πίστεως αὐτοῦ
  chosen_reading: through faith in him
  alternative_readings:
  - through his faithfulness
  rationale: The phrase is genuinely ambiguous and falls under the doctrine note on
    preserving tension for pistis constructions involving Christ. The main text follows
    the common objective-genitive reading because the verse emphasizes believers'
    present access, but the alternative subjective-genitive reading is preserved in
    a footnote rather than excluded.
