id: EPH.6.14
reference: Ephesians 6:14
source:
  edition: SBLGNT
  text: στῆτε οὖν περιζωσάμενοι τὴν ὀσφὺν ὑμῶν ἐν ἀληθείᾳ, καὶ ἐνδυσάμενοι τὸν θώρακα
    τῆς δικαιοσύνης,
translation:
  text: Stand, therefore, having fastened your waist with truth and having put on
    the breastplate of righteousness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breastplate of justice.' The Greek δικαιοσύνη can carry both the
      sense of righteousness and justice in Paul.
    reason: lexical_alternative
  - marker: b
    text: Or 'having fastened the belt around your waist in truth, and having put
      on'.
    reason: previous_rendering
lexical_decisions:
- source_word: στῆτε
  chosen: Stand
  alternatives:
  - Stand firm
  lexicon: BDAG
  rationale: Aorist active imperative, second plural, calling for a decisive stance.
    'Stand' is the plain verbal sense; 'stand firm' is interpretive and draws from
    the broader context, but the adverb is not explicit in this word itself.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding exhortation. 'Therefore' best preserves
    the logical connection in natural English.
- source_word: περιζωσάμενοι
  chosen: having fastened the belt around
  alternatives:
  - having girded
  - having belted
  lexicon: BDAG
  rationale: Aorist middle participle from περιζώννυμι, literally 'having girded around.'
    Because English no longer commonly uses 'gird' in ordinary speech, 'having fastened
    the belt around' conveys the action clearly while preserving the armor imagery.
- source_word: τὴν ὀσφὺν ὑμῶν
  chosen: your waist
  alternatives:
  - your loins
  - your hips
  lexicon: BDAG
  rationale: ὀσφύς literally refers to the loins/waist area. 'Your waist' is more
    readable modern English; 'your loins' is more formal/traditional but less natural
    for contemporary readers. The singular in Greek is represented idiomatically in
    English.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - with truth
  - by truthfulness
  lexicon: BDAG
  rationale: The prepositional phrase likely expresses the sphere or means in which
    the belt is fastened. 'In truth' preserves the Greek compactly and allows both
    objective truth and truthful integrity to remain in view without over-resolving
    the nuance.
- source_word: ἐνδυσάμενοι
  chosen: having put on
  alternatives:
  - having clothed yourselves with
  lexicon: BDAG
  rationale: Aorist middle participle from ἐνδύω, standard idiom for putting on clothing
    or armor. 'Having put on' is natural and sufficiently formal.
- source_word: θώρακα
  chosen: breastplate
  alternatives:
  - body armor
  - corslet
  lexicon: BDAG
  rationale: Standard term for the chest armor in the military metaphor. 'Breastplate'
    preserves the biblical image and remains understandable.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: 'Per DOCTRINE.md, δικαιοσύνη defaults to ''righteousness,'' while ''justice''
    is a recognized alternative that should be preserved in a footnote in Pauline
    passages. Here the genitive is rendered straightforwardly as an attributive/qualifying
    genitive: ''the breastplate of righteousness.'''
