theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline armor metaphor
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default for δικαιοσύνη is 'righteousness,' with 'justice'
    preserved in a footnote for Pauline passages. In this context, 'righteousness'
    fits the established metaphor and common Pauline usage without excluding the ethical/public
    dimension carried by 'justice.'
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; preserve
    ''justice'' in footnotes for Pauline passages'
revisions:
- timestamp: '2026-04-21T03:13:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/006/014.json
  category: awkward_english
  tier: 1
  from: having fastened the belt around your waist in truth, and having put on
  to: fastening the belt of truth around your waist and putting on
  rationale: The current rendering uses the 'having + past participle' construction
    twice ('having fastened... and having put on'). While this is a literal translation
    of the Greek aorist participles, the construction is stilted in English and can
    feel like a list of prior actions rather than the manner of standing. Using English
    present participles ('fastening... and putting on...') is a more natural way to
    express contemporaneous action modifying the main verb 'Stand.' Additionally,
    rendering '...in truth' as 'the belt of truth' is a common and strong interpretation
    that makes the metaphor clearer and more forceful, which aligns well with an optimal-equivalence
    philosophy.
