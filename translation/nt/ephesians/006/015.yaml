theological_decisions:
- issue: Meaning of the phrase ἐν ἑτοιμασίᾳ τοῦ εὐαγγελίου τῆς εἰρήνης
  chosen_reading: the believer is to have feet equipped with the readiness that comes
    from or is associated with the gospel of peace
  alternative_readings:
  - feet fitted with readiness to proclaim the gospel of peace
  - feet fitted with the firm footing provided by the gospel of peace
  rationale: The Greek phrase is compressed and allows more than one interpretive
    construal. The main text preserves the ambiguity by rendering the noun simply
    as 'readiness' and keeping the genitival chain intact, rather than resolving it
    into explicit evangelistic action or stability imagery. This follows the translation
    philosophy of preserving theological tension where the source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
