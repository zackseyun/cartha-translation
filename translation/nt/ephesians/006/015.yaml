id: EPH.6.15
reference: Ephesians 6:15
source:
  edition: SBLGNT
  text: καὶ ὑποδησάμενοι τοὺς πόδας ἐν ἑτοιμασίᾳ τοῦ εὐαγγελίου τῆς εἰρήνης,
translation:
  text: and having shod your feet with the readiness of the gospel of peace,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'preparedness'; possibly 'the readiness to proclaim the gospel of peace,'
      or 'the firm footing of the gospel of peace.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποδησάμενοι
  chosen: having shod
  alternatives:
  - having put on sandals
  - having fitted
  - having bound under
  lexicon: BDAG
  rationale: Aorist middle participle from ὑποδέομαι, literally to bind under or put
    on footwear. 'Having shod' preserves the armor/footwear imagery and the participial
    structure better than a looser 'being ready' rendering.
- source_word: πόδας
  chosen: feet
  alternatives:
  - footwear
  lexicon: BDAG
  rationale: The direct object is literally 'feet,' not the shoes themselves. Retaining
    'feet' keeps the bodily metaphor explicit.
- source_word: ἐν
  chosen: with
  alternatives:
  - in
  - by
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' here it expresses means or equipment in
    the armor metaphor. 'With' is more natural English while preserving the sense
    of being equipped by or with something.
- source_word: ἑτοιμασίᾳ
  chosen: readiness
  alternatives:
  - preparedness
  - firm footing
  - readiness to proclaim
  lexicon: BDAG
  rationale: The noun denotes readiness or preparedness. 'Readiness' is the most direct
    rendering. 'Firm footing' reflects a possible nuance in some contexts but is less
    transparent here; 'readiness to proclaim' imports an interpretive expansion not
    explicit in the Greek.
- source_word: εὐαγγελίου
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: Both are viable. 'Gospel' preserves the established Pauline term and
    its theological density, while remaining readable in modern English.
- source_word: εἰρήνης
  chosen: peace
  lexicon: BDAG
  rationale: 'Standard rendering of εἰρήνη. The genitive is best taken as qualifying
    ''gospel'': the gospel characterized by or concerning peace.'
