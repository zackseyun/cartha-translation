theological_decisions:
- issue: Meaning of 'the evil day'
  chosen_reading: A time of evil or spiritual conflict, left general
  alternative_readings:
  - a specific eschatological end-time day
  - a day of personal trial
  rationale: The phrase can encompass concentrated opposition without requiring a
    single technical eschatological referent. The translation preserves the text's
    breadth rather than resolving the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'armor of God' genitive
  chosen_reading: Retained as 'of God' without specifying whether the armor is God's
    own armor or armor supplied by God
  alternative_readings:
  - armor belonging to God
  - armor provided by God
  rationale: The Greek genitive allows multiple related nuances. A more specific English
    paraphrase would narrow the text beyond what is warranted.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
