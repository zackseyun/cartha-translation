id: EPH.6.13
reference: Ephesians 6:13
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἀναλάβετε τὴν πανοπλίαν τοῦ θεοῦ, ἵνα δυνηθῆτε ἀντιστῆναι ἐν τῇ
    ἡμέρᾳ τῇ πονηρᾷ καὶ ἅπαντα κατεργασάμενοι στῆναι.
translation:
  text: Therefore take up the full armor of God, so that you may be able to withstand
    in the evil day, and having done everything, to stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whole armor of God.' The Greek term denotes the complete equipment of
      a soldier.
    reason: lexical_alternative
  - marker: b
    text: Or 'resist' or 'stand against.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the evil day' may refer generally to a time of intense evil
      or testing, not necessarily only to a specific end-time event.
    reason: alternative_reading
  - marker: d
    text: Or 'having accomplished everything' or 'having done all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Idiomatic inferential conjunction pointing back to the preceding exhortation;
    'Therefore' is concise and natural in English while preserving the logical connection.
- source_word: ἀναλάβετε
  chosen: take up
  alternatives:
  - take
  - put on
  lexicon: BDAG
  rationale: Aorist imperative of ἀναλαμβάνω conveys taking up or picking up. 'Take
    up' fits the military imagery better than simple 'take.' 'Put on' is possible
    by context but is less directly tied to this verb.
- source_word: πανοπλίαν
  chosen: full armor
  alternatives:
  - whole armor
  - complete armor
  lexicon: BDAG
  rationale: πανοπλία denotes the complete equipment of a heavily armed soldier. 'Full
    armor' is clear modern English and preserves the sense of completeness.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - belonging to God
  lexicon: BDAG
  rationale: 'The genitive is left formally broad in English. ''Of God'' preserves
    the source ambiguity: armor associated with, provided by, or characterized by
    God, without over-interpreting.'
- source_word: ἵνα δυνηθῆτε
  chosen: so that you may be able
  alternatives:
  - in order that you may be able
  - that you may be empowered
  lexicon: BDAG
  rationale: This purpose clause is naturally rendered 'so that you may be able.'
    It preserves both purpose and capability without adding theological nuance not
    explicit in the text.
- source_word: ἀντιστῆναι
  chosen: withstand
  alternatives:
  - resist
  - stand against
  lexicon: BDAG
  rationale: In this military context, ἀνθίστημι means to oppose or hold one's ground
    against attack. 'Withstand' captures defensive firmness and pairs well with the
    later 'stand.'
- source_word: ἐν τῇ ἡμέρᾳ τῇ πονηρᾷ
  chosen: in the evil day
  alternatives:
  - on the evil day
  - in the day of evil
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the phrase's solemn and somewhat
    open-ended force. 'Evil day' can denote a time of intense spiritual opposition
    without narrowing it to a specific eschatological event.
- source_word: ἅπαντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'Everything' is idiomatic English
    and conveys totality.
- source_word: κατεργασάμενοι
  chosen: having done
  alternatives:
  - having accomplished
  - having carried out
  - having overcome
  lexicon: BDAG
  rationale: The participle of κατεργάζομαι can mean accomplish, produce, or carry
    out. Here it likely refers to completing all that the situation demands. 'Having
    done' is broad enough to preserve that sense without overstating victory. The
    object 'everything' supplies the needed fullness.
- source_word: στῆναι
  chosen: to stand
  alternatives:
  - stand firm
  - remain standing
  lexicon: BDAG
  rationale: The infinitive echoes the military theme of holding one's ground. 'To
    stand' preserves the verbal repetition and rhetorical force; 'stand firm' is interpretive
    and can be reserved for contexts where firmness is explicit.
