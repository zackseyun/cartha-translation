theological_decisions:
- issue: Sense of τὰ περὶ ἡμῶν
  chosen_reading: Rendered personally and circumstantially as 'how we are.'
  alternative_readings:
  - '''the things concerning us'''
  - '''our circumstances'''
  rationale: The Greek can encompass both personal condition and circumstances. 'How
    we are' preserves that breadth without narrowing the phrase to external circumstances
    alone.
  doctrine_reference: Translation philosophy §3, preserve theological/interpreive
    tension where ambiguity is genuine.
