id: EPH.6.6
reference: Ephesians 6:6
source:
  edition: SBLGNT
  text: μὴ κατ’ ὀφθαλμοδουλίαν ὡς ἀνθρωπάρεσκοι ἀλλ’ ὡς ⸀δοῦλοι Χριστοῦ ποιοῦντες
    τὸ θέλημα τοῦ θεοῦ, ἐκ ψυχῆς
translation:
  text: not by eye-service, as people-pleasers, but as slaves of the Messiah, doing
    the will of God from the soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'service only when being watched'; the Greek term is literally 'eye-service.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Christ'': Greek ''Christos.'' Here it is rendered ''Messiah'' to preserve
      the title''s meaning.'
    reason: alternative_reading
  - marker: c
    text: Or 'from the heart' or 'wholeheartedly'; literally 'from the soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοδουλίαν
  chosen: eye-service
  alternatives:
  - service only when being watched
  - mere outward service
  lexicon: BDAG
  rationale: A rare compound literally built on 'eye' and 'slavery/service,' referring
    to work done only for appearance under supervision. 'Eye-service' preserves the
    compact metaphor and rhetorical force better than a fuller paraphrase, while remaining
    intelligible in context.
- source_word: ἀνθρωπάρεσκοι
  chosen: people-pleasers
  alternatives:
  - man-pleasers
  lexicon: BDAG
  rationale: The term denotes those who seek to please humans for approval. 'People-pleasers'
    is natural modern English and preserves the negative moral sense without unnecessary
    archaism. 'Man-pleasers' is more literal but less idiomatic in current English.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per the project's doctrine, δοῦλος is rendered 'slave' where the bonded
    nature is salient. Here Paul contrasts earthly service with ultimate belonging
    to the Messiah; the ownership/bonded aspect is central, so 'slaves' best preserves
    the force.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός functions here as a title rather than a name-like label. Per
    doctrine, the default is 'Messiah' where title sense is active, preserving the
    meaning of the anointed royal deliverer.
- source_word: ποιοῦντες
  chosen: doing
  alternatives:
  - carrying out
  lexicon: BDAG
  rationale: The participle is straightforward and contemporaneous with the implied
    main exhortation from the surrounding context. 'Doing' is simple and direct, matching
    the Greek without over-interpretation.
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: In this context θέλημα refers to what God wants done. 'Will' is the standard
    and most fitting rendering in ethical exhortation.
- source_word: ἐκ ψυχῆς
  chosen: from the soul
  alternatives:
  - from the heart
  - wholeheartedly
  lexicon: BDAG
  rationale: The phrase is literally 'from the soul.' 'From the soul' preserves the
    anthropological wording of the Greek and the intensity of inward sincerity. 'Wholeheartedly'
    is smoother but more interpretive; 'from the heart' is idiomatic but shifts ψυχή
    to καρδία-like language.
