theological_decisions:
- issue: Rendering δοῦλοι in a household-code context
  chosen_reading: slaves of the Messiah
  alternative_readings:
  - servants of Christ
  - bondservants of Christ
  rationale: The verse addresses literal slaves in the immediate context and then
    reframes their identity in relation to the Messiah. Because the bonded status
    is rhetorically and theologically salient, 'slaves' best fits the project's stated
    policy and the verse's contrast.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The genitive after δοῦλοι highlights allegiance to the anointed ruler,
    making the titular sense prominent. The project's policy prefers translating titles
    where context supports it.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table
    for Χριστός'
