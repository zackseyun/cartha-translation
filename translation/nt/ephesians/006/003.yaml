theological_decisions:
- issue: Scope of ἐπὶ τῆς γῆς in relation to the fifth commandment promise
  chosen_reading: on the earth
  alternative_readings:
  - in the land
  rationale: Because Paul cites the commandment in a form that lacks the more specific
    covenant-land wording, the translation follows the Greek as written rather than
    importing the fuller Exodus/Deuteronomy phrasing. This preserves the text's broader
    wording while acknowledging the Decalogue background.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
