id: EPH.6.3
reference: Ephesians 6:3
source:
  edition: SBLGNT
  text: ἵνα εὖ σοι γένηται καὶ ἔσῃ μακροχρόνιος ἐπὶ τῆς γῆς.
translation:
  text: so that it may go well with you and you may live long on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land,' echoing the wording of the fifth commandment in Exodus
      20:12 and Deuteronomy 5:16.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result, echoing the promise attached to the command
    in the previous verse. 'So that' is natural English and preserves the conjunction's
    force.
- source_word: εὖ
  chosen: well
  alternatives:
  - good
  - prosperously
  lexicon: BDAG
  rationale: Adverb meaning 'well'; in the idiom with γίνομαι and dative ('it may
    go well with you'), 'well' is the most idiomatic and faithful rendering.
- source_word: σοι
  chosen: with you
  alternatives:
  - for you
  - to you
  lexicon: BDAG
  rationale: Dative pronoun in the idiom εὖ σοι γένηται is best rendered in English
    as 'with you' ('it may go well with you'), preserving the personal reference naturally.
- source_word: γένηται
  chosen: it may go
  alternatives:
  - it may be
  - it may happen
  - it may become
  lexicon: BDAG
  rationale: From γίνομαι; in this idiomatic construction it conveys that matters
    turn out or go in a certain way. 'It may go' fits the established sense without
    over-paraphrase.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two promised outcomes.
- source_word: ἔσῃ
  chosen: you may live
  alternatives:
  - you will be
  lexicon: BDAG
  rationale: Although the verb is formally 'you will be,' with the predicate adjective
    μακροχρόνιος the sense is idiomatically 'be long-lived.' Rendering as 'you may
    live long' communicates the meaning in natural English.
- source_word: μακροχρόνιος
  chosen: live long
  alternatives:
  - long-lived
  - of long life
  lexicon: BDAG
  rationale: Adjective meaning 'long-lived' or 'having a long span of life.' In English,
    converting the predicate adjective into the verbal phrase 'live long' is the clearest
    equivalent.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - in the land
  - upon the earth
  lexicon: BDAG
  rationale: The Greek here follows the LXX form of the commandment but Ephesians
    omits the possessive element found in some OT formulations ('the land'). In this
    Gentile-inclusive epistolary context, 'on the earth' best reflects the actual
    Greek wording. 'In the land' is a possible echo of the Decalogue background and
    is preserved in a footnote.
