id: EPH.6.1
reference: Ephesians 6:1
source:
  edition: SBLGNT
  text: Τὰ τέκνα, ὑπακούετε τοῖς γονεῦσιν ὑμῶν ἐν κυρίῳ, τοῦτο γάρ ἐστιν δίκαιον·
translation:
  text: Children, obey your parents in the Lord, for this is right.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as belonging to the Lord' / 'in union with the Lord.' The phrase 'in
      the Lord' may describe the sphere or manner of the obedience, and may also imply
      that such obedience is bounded by allegiance to the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  chosen: Children
  alternatives:
  - sons and daughters
  - offspring
  lexicon: BDAG
  rationale: The vocative plural addresses young members of households directly. 'Children'
    is the natural and accurate English equivalent, preserving the familial relationship
    without unnecessary expansion.
- source_word: ὑπακούετε
  chosen: obey
  alternatives:
  - listen to
  - be subject to
  lexicon: BDAG
  rationale: The present active imperative calls for responsive obedience, not merely
    hearing. 'Obey' best captures the force of the command in household instruction.
- source_word: γονεῦσιν
  chosen: parents
  alternatives:
  - father and mother
  - those who gave you birth
  lexicon: BDAG
  rationale: The plural noun refers collectively to one's parents. 'Parents' is the
    idiomatic and precise English rendering.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - as belonging to the Lord
  - in union with the Lord
  lexicon: BDAG
  rationale: The phrase is best preserved in its compact Pauline form. 'In the Lord'
    can modify the obedience as occurring within the sphere of relationship to the
    Lord, and it also preserves the theological resonance of Paul's repeated expression.
    'Lord' follows the project's default rendering for κύριος.
- source_word: δίκαιον
  chosen: right
  alternatives:
  - just
  - righteous
  lexicon: BDAG
  rationale: Here the adjective describes what is morally proper or fitting. 'Right'
    is clear modern English and fits the ethical context better than the more formal
    'righteous,' while 'just' is possible but less idiomatic in this sentence.
