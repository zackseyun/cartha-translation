theological_decisions:
- issue: Scope of the phrase 'in the Lord'
  chosen_reading: 'Attached in translation as part of the command: ''obey your parents
    in the Lord,'' while preserving the phrase''s interpretive openness.'
  alternative_readings:
  - Children who are in the Lord should obey their parents
  - Obey your parents as is fitting in the Lord
  rationale: The Greek most naturally places ἐν κυρίῳ with the imperative, but the
    exact nuance is not fully explicit. Retaining the literal phrase preserves theological
    tension rather than over-interpreting whether Paul means the children's identity
    in the Lord, the manner/sphere of obedience, or an implicit limitation by allegiance
    to the Lord.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
