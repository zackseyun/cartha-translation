theological_decisions:
- issue: Rendering κύριος twice in one verse for human and divine referents
  chosen_reading: Translate human κύριοι as 'masters' and divine κύριος as 'Lord'
  alternative_readings:
  - Translate both as 'lords/Lord'
  - Translate the second as 'Master'
  rationale: 'The Greek uses the same lemma, but English benefits from differentiating
    the earthly social role from the divine title. This preserves the rhetorical contrast:
    those called ''masters'' on earth are themselves under one heavenly Lord. It also
    follows the doctrine table''s default rendering of κύριος as ''Lord'' for the
    divine title.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Social-status terminology in the household code
  chosen_reading: Use 'masters' in relation to the preceding slave/servant context
  alternative_readings:
  - owners
  - employers
  rationale: The immediate context addresses δοῦλοι and their κύριοι within the ancient
    household structure. 'Employers' would domesticate the text anachronistically,
    while 'owners' is narrower than the relational role expressed by κύριοι. 'Masters'
    best preserves the historical and ethical force of the passage.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
