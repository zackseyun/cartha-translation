id: EPH.6.9
reference: Ephesians 6:9
source:
  edition: SBLGNT
  text: Καὶ οἱ κύριοι, τὰ αὐτὰ ποιεῖτε πρὸς αὐτούς, ἀνιέντες τὴν ἀπειλήν, εἰδότες
    ὅτι καὶ ⸂αὐτῶν καὶ ὑμῶν⸃ ὁ κύριός ἐστιν ἐν οὐρανοῖς, καὶ προσωπολημψία οὐκ ἔστιν
    παρ’ αὐτῷ.
translation:
  text: And masters, do the same things toward them, giving up threatening, knowing
    that both their Lord and yours is in heaven, and there is no partiality with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do the same to them' or 'treat them in the same way.' The Greek closely
      echoes the previous instruction and stresses reciprocity.
    reason: lexical_alternative
  - marker: b
    text: Or 'stopping your threats.' The Greek participle ἀνιέντες can mean ceasing
      or giving up the practice of threatening.
    reason: lexical_alternative
  - marker: c
    text: Greek 'in the heavens'; rendered 'in heaven' as the natural English equivalent
      of the idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριοι
  chosen: masters
  alternatives:
  - lords
  lexicon: BDAG
  rationale: In this household-code context, κύριοι refers to human social superiors
    in relation to slaves/servants. 'Masters' best conveys the social role in idiomatic
    English without confusing the term with the divine title 'Lord' later in the verse.
- source_word: τὰ αὐτὰ ποιεῖτε πρὸς αὐτούς
  chosen: do the same things toward them
  alternatives:
  - do the same to them
  - treat them in the same way
  lexicon: BDAG
  rationale: A relatively close rendering preserves the verbal link to the prior instruction
    and the reciprocity Paul demands. 'Toward them' reflects πρός while remaining
    natural English.
- source_word: ἀνιέντες
  chosen: giving up
  alternatives:
  - stopping
  - letting go of
  - ceasing
  lexicon: BDAG
  rationale: The participle carries the sense of relaxing or giving up a practice.
    'Giving up' is natural and preserves the participial force tied to the imperative.
- source_word: τὴν ἀπειλήν
  chosen: threatening
  alternatives:
  - the threat
  - threats
  lexicon: BDAG
  rationale: The singular abstract noun is well represented by the English verbal
    noun 'threatening,' which communicates the practice being prohibited rather than
    a single isolated threat.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: The participle gives the grounds for the command. 'Knowing' preserves
    the Greek structure while allowing the causal sense to be inferred in context.
- source_word: καὶ αὐτῶν καὶ ὑμῶν ὁ κύριος
  chosen: both their Lord and yours
  alternatives:
  - their Master and yours
  - the Lord of both them and you
  lexicon: BDAG
  rationale: Because this occurrence refers to the exalted heavenly κύριος, the doctrinal
    default 'Lord' is followed. The possessive structure is brought into natural English
    as 'both their Lord and yours.' 'Master' is possible contextually but would blur
    the contrast between earthly masters and the heavenly Lord.
- source_word: ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Although plural in Greek, 'in heaven' is the standard natural English
    equivalent in this idiom and preserves the sense without awkwardness.
- source_word: προσωπολημψία
  chosen: partiality
  alternatives:
  - favoritism
  - respect of persons
  lexicon: BDAG
  rationale: '''Partiality'' is clear modern English and accurately conveys unjust
    favoritism. It avoids the archaic ''respect of persons'' while remaining more
    formal and judicial than ''favoritism''.'
- source_word: παρ’ αὐτῷ
  chosen: with him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The idiom means that such partiality does not exist in God's presence
    or character. 'With him' is the most direct and idiomatic rendering here.
