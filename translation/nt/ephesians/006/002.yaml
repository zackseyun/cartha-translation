id: EPH.6.2
reference: Ephesians 6:2
source:
  edition: SBLGNT
  text: τίμα τὸν πατέρα σου καὶ τὴν μητέρα, ἥτις ἐστὶν ἐντολὴ πρώτη ἐν ἐπαγγελίᾳ,
translation:
  text: Honor your father and mother—which is the first commandment with a promise—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the first commandment in promise'; the sense is that
      this is the first commandment accompanied by a promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίμα
  chosen: Honor
  alternatives:
  - Show honor to
  - Respect
  lexicon: BDAG
  rationale: Imperative of τιμάω, calling for active honoring rather than mere inward
    esteem. 'Honor' is the established and accurate rendering, preserving the command's
    ethical weight and its connection to the Decalogue citation.
- source_word: πατέρα
  chosen: father
  alternatives:
  - male parent
  lexicon: BDAG
  rationale: Direct familial term; 'father' is the natural and precise English equivalent.
- source_word: μητέρα
  chosen: mother
  alternatives:
  - female parent
  lexicon: BDAG
  rationale: Direct familial term; 'mother' is the natural and precise English equivalent.
- source_word: ἥτις
  chosen: which
  alternatives:
  - that
  - and this
  lexicon: BDAG
  rationale: The relative pronoun refers back to the command just cited. 'Which' in
    English smoothly introduces Paul's explanatory comment. The dash helps reflect
    the parenthetical nature of the clause.
- source_word: ἐντολὴ
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: Because Paul is echoing the Decalogue, 'commandment' better preserves
    the scriptural and covenantal resonance than the simpler 'command'.
- source_word: πρώτη
  chosen: first
  alternatives:
  - foremost
  lexicon: BDAG
  rationale: πρώτη is ordinal here. 'First' matches the Greek directly and fits Paul's
    point about this being the first commandment accompanied by a promise.
- source_word: ἐν ἐπαγγελίᾳ
  chosen: with a promise
  alternatives:
  - in promise
  - accompanied by a promise
  lexicon: BDAG
  rationale: Although formally 'in promise,' the idiomatic sense in context is that
    this commandment comes with an attached promise. 'With a promise' is clear modern
    English and preserves the meaning without over-paraphrase.
