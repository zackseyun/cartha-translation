theological_decisions:
- issue: Relation of 'first commandment' to the Decalogue numbering and Paul's point
  chosen_reading: Rendered 'the first commandment with a promise' to indicate not
    absolute first in sequence, but first among the commandments that includes an
    explicit promise.
  alternative_readings:
  - the first commandment in the second table
  - the foremost commandment with a promise
  rationale: 'The Greek phrase is best read in its immediate explanatory sense: Paul
    highlights that this commandment is the first one accompanied by a stated promise
    (expanded in v. 3). The translation avoids importing a sectarian Decalogue-numbering
    scheme or making ''first'' mean ''greatest.'''
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless the Greek unambiguously supports one
    reading.
