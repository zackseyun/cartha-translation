id: EPH.6.10
reference: Ephesians 6:10
source:
  edition: SBLGNT
  text: ⸂Τοῦ λοιποῦ⸃ ἐνδυναμοῦσθε ἐν κυρίῳ καὶ ἐν τῷ κράτει τῆς ἰσχύος αὐτοῦ.
translation:
  text: Finally, be strengthened in the Lord and in the strength of his might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be strong in the Lord.' The Greek verb can be rendered more idiomatically
      this way, but 'be strengthened' better preserves the passive nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ λοιποῦ
  chosen: Finally
  alternatives:
  - For the rest
  - From now on
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing the concluding section of the
    letter. 'Finally' best captures the transitional force in natural English without
    over-literal awkwardness.
- source_word: ἐνδυναμοῦσθε
  chosen: be strengthened
  alternatives:
  - be strong
  - be empowered
  lexicon: BDAG
  rationale: 'Present passive/middle imperative/plural is best represented as a passive
    exhortation: the readers are to receive strength rather than generate it autonomously.
    ''Be strengthened'' preserves that nuance better than the more idiomatic but less
    explicit ''be strong.'''
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - in union with the Lord
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve Paul's relational/sphere
    language. κύριος follows the doctrinal default rendering 'Lord.' 'By the Lord'
    would over-specify instrumentality; 'in union with the Lord' is interpretive expansion
    beyond the Greek wording.
- source_word: κράτει
  chosen: strength
  alternatives:
  - power
  - dominion
  - might
  lexicon: BDAG
  rationale: κράτος denotes manifested strength/power. Here 'strength' works well
    in the collocation with ἰσχύς and avoids an overly abstract or redundant 'power
    of his power.'
- source_word: ἰσχύος
  chosen: might
  alternatives:
  - strength
  - force
  lexicon: BDAG
  rationale: Using 'might' for ἰσχύς differentiates it from κράτος while preserving
    the intensifying genitival construction. The phrase 'the strength of his might'
    is weighty but still readable and reflects the Greek's piled-up power terminology.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - the Lord's
  lexicon: BDAG
  rationale: The pronoun naturally refers back to 'the Lord.' 'His' is the most direct
    English equivalent; repeating 'the Lord's' is unnecessary unless clarity demanded
    it, which it does not here.
