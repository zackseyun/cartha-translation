theological_decisions:
- issue: Voice and source of empowerment in ἐνδυναμοῦσθε
  chosen_reading: 'A receptive exhortation: believers are to be strengthened by virtue
    of their relation to the Lord, not merely told to summon inner resolve.'
  alternative_readings:
  - 'An active-sense idiom: ''be strong'''
  rationale: The passive/middle form supports a rendering that highlights dependence
    on divine strength. This preserves the theological emphasis of the verse without
    importing a more specific doctrine of sanctification than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md lists κύριος → 'Lord' as the default rendering. In this Pauline
    context it naturally refers to the exalted Jesus without needing further expansion
    in the translation.
  doctrine_reference: 'Contested terms: κύριος *Kyrios*'
