theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title and the project's default is to translate
    Χριστός as 'Messiah' where context supports title sense. This preserves the meaning
    of the Greek rather than relying on inherited English tradition.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering δοῦλοι in a slavery context
  chosen_reading: Slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse directly addresses persons under masters in a household structure;
    the bonded nature is contextually salient. The translation should not mute the
    social reality by defaulting to 'servants.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table
    for δοῦλος'
