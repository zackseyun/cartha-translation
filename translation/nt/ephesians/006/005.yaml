id: EPH.6.5
reference: Ephesians 6:5
source:
  edition: SBLGNT
  text: Οἱ δοῦλοι, ὑπακούετε τοῖς ⸂κατὰ σάρκα κυρίοις⸃ μετὰ φόβου καὶ τρόμου ἐν ἁπλότητι
    τῆς καρδίας ὑμῶν ὡς τῷ Χριστῷ,
translation:
  text: Slaves, obey your earthly masters with fear and trembling, in sincerity of
    your heart, as to the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the flesh,' that is, masters in merely earthly or human
      terms.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as
      a title.
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλοι
  chosen: Slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The noun denotes persons in bonded servitude. Per the project's doctrine,
    δοῦλος should be rendered 'slave' where the bonded nature is salient. In a household-code
    context addressing those under ownership, 'slaves' is more transparent than the
    traditional softening 'servants.'
- source_word: ὑπακούετε
  chosen: obey
  alternatives:
  - listen to
  - be subject to
  lexicon: BDAG
  rationale: The present imperative calls for ongoing obedience. 'Obey' is the standard
    and clearest rendering in this relational context.
- source_word: κατὰ σάρκα
  chosen: earthly
  alternatives:
  - according to the flesh
  - human
  lexicon: BDAG
  rationale: Here σάρξ is not metaphorical 'sinful nature' but marks merely human,
    bodily, or temporal relation in contrast to relation to the Messiah. 'Earthly'
    communicates the contrast idiomatically in modern English while preserving the
    sense that these masters are only masters in the present worldly sphere.
- source_word: κυρίοις
  chosen: masters
  alternatives:
  - lords
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, in this social relation
    it refers to slave owners/household masters. 'Masters' best fits the context and
    avoids confusion with the following reference to the Messiah.
- source_word: μετὰ φόβου καὶ τρόμου
  chosen: with fear and trembling
  alternatives:
  - with reverence and trembling
  - with fear and respect
  lexicon: BDAG
  rationale: This is a fixed expression Paul uses elsewhere. A relatively formal rendering
    preserves its rhetorical force and intertextual consistency better than paraphrase.
- source_word: ἐν ἁπλότητι τῆς καρδίας ὑμῶν
  chosen: in sincerity of your heart
  alternatives:
  - with singleness of heart
  - with simplicity of heart
  lexicon: BDAG
  rationale: ἁπλότης here conveys sincerity, single-mindedness, or undividedness.
    'In sincerity of your heart' is natural English while preserving the inward, wholehearted
    sense.
- source_word: ὡς τῷ Χριστῷ
  chosen: as to the Messiah
  alternatives:
  - as to Christ
  lexicon: BDAG
  rationale: Χριστός is titular here rather than name-like, so per project doctrine
    it is translated 'Messiah.' 'As to' preserves the comparative force of ὡς without
    overstating identity between earthly masters and the Messiah.
