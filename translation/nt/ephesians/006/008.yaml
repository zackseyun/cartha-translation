theological_decisions:
- issue: Rendering δοῦλος in a household-code context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse explicitly contrasts δοῦλος with ἐλεύθερος, making the bonded/free
    social distinction central. Following the stated translation philosophy, 'slave'
    best preserves the force of the contrast and avoids muting the historical and
    social reality addressed by Paul.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Referent and rendering of κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: Although the immediate context concerns human masters, this clause points
    to the divine source of recompense. Rendering κύριος as 'Lord' follows the doctrinal
    default and preserves the likely christological reference without collapsing it
    into the household metaphor.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
