id: EPH.6.8
reference: Ephesians 6:8
source:
  edition: SBLGNT
  text: εἰδότες ὅτι ⸂ἕκαστος, ὃ ἂν⸃ ποιήσῃ ἀγαθόν, τοῦτο ⸀κομίσεται ⸀παρὰ κυρίου,
    εἴτε δοῦλος εἴτε ἐλεύθερος.
translation:
  text: knowing that whatever good each one does, this he will receive back from the
    Lord, whether slave or free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be repaid for this by the Lord.' The Greek verb can carry the sense
      of receiving back what corresponds to one's action.
    reason: lexical_alternative
  - marker: b
    text: Or 'whether slave or free person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - because you know
  - since you know
  lexicon: BDAG
  rationale: A participial form from οἶδα functioning adverbially, grounding the exhortation
    of the previous verse. 'Knowing' preserves the participial connection without
    over-interpreting it as explicitly causal, though that nuance is present.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each person
  - everyone
  lexicon: BDAG
  rationale: The masculine singular has representative force. 'Each one' preserves
    the distributive emphasis and remains gender-accurate without flattening the singular.
- source_word: ὃ ἂν ποιήσῃ ἀγαθόν
  chosen: whatever good ... does
  alternatives:
  - whatever good thing ... does
  - whatever ... does that is good
  lexicon: BDAG
  rationale: 'The relative clause with ἄν expresses indefiniteness: ''whatever.''
    ἀγαθόν is rendered ''good'' rather than ''good thing'' for natural English while
    preserving the moral quality of the deed.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - the same
  - that
  lexicon: BDAG
  rationale: The demonstrative points back to the good done. 'This' is the most direct
    rendering; the sense of correspondence is then carried by 'receive back.'
- source_word: κομίσεται
  chosen: will receive back
  alternatives:
  - will receive
  - will be repaid for
  lexicon: BDAG
  rationale: κομίζω here conveys receiving what is due or receiving back in return.
    'Will receive back' preserves the reciprocity without importing a strictly commercial
    sense. 'Will be repaid for' is interpretive and less formally tied to the Greek.
- source_word: παρὰ κυρίου
  chosen: from the Lord
  alternatives:
  - from Lord
  - from the Master
  lexicon: BDAG
  rationale: 'παρά with the genitive indicates source: ''from.'' κύριος is rendered
    by the doctrinal default ''Lord.'' ''Master'' could fit the slave/free context,
    but in Pauline usage here the referent is the exalted Lord, and ''Lord'' preserves
    that theological weight.'
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidelines, δοῦλος should be rendered 'slave' where
    bonded status is salient. In the immediate context addressing slaves and masters,
    the social reality is explicit, so 'slave' is preferred over the softer 'servant.'
- source_word: ἐλεύθερος
  chosen: free
  alternatives:
  - free person
  - freeman
  lexicon: BDAG
  rationale: In contrast to δοῦλος, ἐλεύθερος denotes one who is free in social status.
    'Free' is concise and idiomatic in the paired expression 'whether slave or free.'
