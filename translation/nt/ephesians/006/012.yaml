id: EPH.6.12
reference: Ephesians 6:12
source:
  edition: SBLGNT
  text: ὅτι οὐκ ἔστιν ἡμῖν ἡ πάλη πρὸς αἷμα καὶ σάρκα, ἀλλὰ πρὸς τὰς ἀρχάς, πρὸς τὰς
    ἐξουσίας, πρὸς τοὺς κοσμοκράτορας τοῦ ⸀σκότους τούτου, πρὸς τὰ πνευματικὰ τῆς
    πονηρίας ἐν τοῖς ἐπουρανίοις.
translation:
  text: For our struggle is not against flesh and blood, but against the rulers, against
    the authorities, against the world-rulers of this darkness, against the spiritual
    forces of evil in the heavenly realms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our wrestling is not against flesh and blood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'against the world-rulers of this present darkness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the heavenly places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλη
  chosen: struggle
  alternatives:
  - wrestling
  - combat
  lexicon: BDAG
  rationale: πάλη denotes wrestling or close combat. 'Struggle' preserves the metaphor
    while sounding natural in modern English; 'wrestling' is more formally literal
    and is preserved as an alternative nuance.
- source_word: πρὸς αἷμα καὶ σάρκα
  chosen: against flesh and blood
  alternatives:
  - against blood and flesh
  - against mere human beings
  lexicon: BDAG
  rationale: The idiom refers to human opponents. 'Flesh and blood' is the established
    English idiom and communicates the sense naturally. The Greek order is 'blood
    and flesh,' but English idiom favors 'flesh and blood.'
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - humanity
  - sinful nature
  lexicon: BDAG
  rationale: Here σάρξ occurs in the idiom 'flesh and blood' and refers to human embodied
    life, not Paul's theological use of 'flesh' as sinful nature. Therefore the literal
    'flesh' is required.
- source_word: ἀρχάς
  chosen: rulers
  alternatives:
  - principalities
  - first rulers
  lexicon: BDAG
  rationale: ἀρχαί in Pauline contexts often denotes ruling powers or principal rulers.
    'Rulers' is clear modern English; 'principalities' is traditional but less transparent.
- source_word: ἐξουσίας
  chosen: authorities
  alternatives:
  - powers
  lexicon: BDAG
  rationale: ἐξουσίαι commonly denotes authorities or delegated powers. 'Authorities'
    preserves the governing sense and pairs well with 'rulers.'
- source_word: κοσμοκράτορας
  chosen: world-rulers
  alternatives:
  - cosmic powers
  - world rulers
  lexicon: BDAG
  rationale: The rare term literally means rulers of the world/cosmos. 'World-rulers'
    keeps the compound force visible. 'Cosmic powers' is interpretive and broader
    than the lexical form.
- source_word: τοῦ σκότους τούτου
  chosen: of this darkness
  alternatives:
  - of this world-darkness
  - of this present darkness
  lexicon: BDAG
  rationale: The genitive most naturally qualifies the world-rulers as belonging to
    or characterized by 'this darkness.' 'Of this darkness' is close to the Greek.
    'Of this present darkness' is a common interpretive expansion but adds 'present,'
    which is not explicit.
- source_word: τὰ πνευματικὰ τῆς πονηρίας
  chosen: the spiritual forces of evil
  alternatives:
  - the spiritual things of wickedness
  - the spiritual hosts of wickedness
  lexicon: BDAG
  rationale: The neuter plural adjective πνευματικά here functions substantivally
    for spiritual beings/powers. 'Spiritual forces' makes the referent intelligible
    in English without over-specifying 'hosts.' τῆς πονηρίας is rendered 'of evil'
    as a natural qualitative genitive.
- source_word: ἐν τοῖς ἐπουρανίοις
  chosen: in the heavenly realms
  alternatives:
  - in the heavenlies
  - in the heavenly places
  lexicon: BDAG
  rationale: This phrase recurs in Ephesians and denotes the heavenly sphere. 'Heavenly
    realms' is readable modern English and broad enough to fit Ephesians' usage, which
    includes more than simple location. 'Heavenly places' is more traditional and
    is preserved as an alternative.
