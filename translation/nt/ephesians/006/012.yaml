theological_decisions:
- issue: Nature of the opponents named in the verse
  chosen_reading: The verse refers to supra-human spiritual powers rather than merely
    human political structures.
  alternative_readings:
  - The terms refer primarily to human rulers and institutions
  - The language intentionally includes both spiritual beings and their earthly manifestations
  rationale: The accumulation of terms, especially κοσμοκράτορας and τὰ πνευματικὰ
    τῆς πονηρίας, points directly to spiritual adversaries. The translation therefore
    makes the final phrase explicit as 'spiritual forces of evil' while not denying
    possible earthly manifestations.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of σάρξ in this context
  chosen_reading: σάρξ is rendered literally within the idiom 'flesh and blood,' not
    as 'sinful nature.'
  alternative_readings:
  - sinful nature
  rationale: DOCTRINE.md specifies σάρξ as 'flesh' when literal and 'sinful nature'
    when metaphorical. In this idiom the meaning is human beings, so the literal wording
    is retained.
  doctrine_reference: 'Contested terms table: σάρξ = flesh (literal) / sinful nature
    (metaphorical).'
