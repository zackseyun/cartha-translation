theological_decisions:
- issue: Scope of πατέρες in household instruction
  chosen_reading: The address is rendered specifically as 'fathers' rather than expanded
    to 'parents.'
  alternative_readings:
  - parents
  rationale: The Greek text explicitly names fathers. While the application may extend
    more broadly, the translation should not generalize beyond the wording of the
    source. This preserves the text's particular address without importing a broader
    social application into the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Original-language
    primacy over translation tradition'
- issue: Force of κυρίου in the phrase ἐν παιδείᾳ καὶ νουθεσίᾳ κυρίου
  chosen_reading: The genitive is left as 'of the Lord' rather than interpreted more
    narrowly.
  alternative_readings:
  - from the Lord
  - about the Lord
  - according to the Lord
  rationale: The phrase can indicate source, possession, character, or orientation.
    Rendering it 'of the Lord' preserves the theological breadth and avoids resolving
    an ambiguity the Greek itself leaves open.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; κύριος default rendering ''Lord'''
