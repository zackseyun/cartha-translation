id: EPH.6.4
reference: Ephesians 6:4
source:
  edition: SBLGNT
  text: Καὶ οἱ πατέρες, μὴ παροργίζετε τὰ τέκνα ὑμῶν, ἀλλὰ ἐκτρέφετε αὐτὰ ἐν παιδείᾳ
    καὶ νουθεσίᾳ κυρίου.
translation:
  text: And fathers, do not provoke your children to anger, but bring them up in the
    discipline and instruction of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exasperate your children.' The Greek verb means to stir up anger or
      provoke to resentment.
    reason: lexical_alternative
  - marker: b
    text: Or 'training and admonition of the Lord.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'of the Lord' may mean discipline and instruction that come from
      the Lord, belong to the Lord, or are directed by the Lord.
    reason: alternative_reading
lexical_decisions:
- source_word: πατέρες
  chosen: fathers
  alternatives:
  - parents
  lexicon: BDAG
  rationale: The Greek noun is specifically masculine plural, 'fathers,' not a gender-neutral
    term for parents. In the household code context, Paul directly addresses fathers.
    This follows the gender-accurate principle rather than broadening the referent
    beyond the source text.
- source_word: παροργίζετε
  chosen: provoke ... to anger
  alternatives:
  - exasperate
  - provoke
  lexicon: BDAG
  rationale: The verb means to cause anger or provoke to wrath. 'Provoke ... to anger'
    makes the causative force explicit and preserves the connection to anger inherent
    in the verb better than the broader 'exasperate.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  - offspring
  lexicon: BDAG
  rationale: τέκνα is the ordinary plural for children in a family sense. 'Children'
    is natural modern English and accurately reflects the inclusive filial reference.
- source_word: ἐκτρέφετε
  chosen: bring them up
  alternatives:
  - nourish
  - rear
  - raise
  lexicon: BDAG
  rationale: The verb can literally mean nourish, but in this context of child-rearing
    it idiomatically means to rear or bring up. 'Bring them up' is clear, natural
    English and fits the parental instruction context.
- source_word: παιδείᾳ
  chosen: discipline
  alternatives:
  - training
  - instruction
  lexicon: BDAG
  rationale: παιδεία includes the formative training and correction involved in raising
    a child. 'Discipline' preserves the corrective and formative sense better than
    the broader 'training,' especially when paired with νουθεσία.
- source_word: νουθεσίᾳ
  chosen: instruction
  alternatives:
  - admonition
  - warning
  - counsel
  lexicon: BDAG
  rationale: The term denotes verbal guidance, admonition, or corrective instruction.
    'Instruction' is accessible modern English and pairs well with 'discipline,' while
    still covering the sense of directed moral teaching.
- source_word: κυρίου
  chosen: of the Lord
  alternatives:
  - from the Lord
  - about the Lord
  lexicon: BDAG
  rationale: The genitive most naturally qualifies both παιδεία and νουθεσία as belonging
    to, characterized by, or oriented to the Lord. 'Of the Lord' preserves the Greek
    compactness and leaves the exact nuance appropriately broad. 'Lord' follows the
    project's default rendering for κύριος.
