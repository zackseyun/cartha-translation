theological_decisions:
- issue: Referent of the relative pronoun and subsequent neuter pronoun
  chosen_reading: Both ὃ/αὐτῷ are taken as neuter references to the gospel or 'the
    mystery of the gospel' from v. 19.
  alternative_readings:
  - The relative could be taken more loosely as referring to the gospel proclamation
    generally; some have understood ἐν αὐτῷ in a more personal or masculine sense
    ('in him'), though this is grammatically less likely in this text.
  rationale: The morphology supplied marks οὗ as genitive singular neuter and αὐτῷ
    as dative singular neuter, which strongly favors a neuter antecedent. This preserves
    the textual grammar rather than importing a christological referent not signaled
    by the form.
  doctrine_reference: Translation philosophy §1, §3
