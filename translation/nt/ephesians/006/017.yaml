theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual realm/generic spirit
  rationale: Within Paul's armor-of-God imagery, 'the sword of the Spirit' is best
    understood as the sword supplied by or belonging to the Holy Spirit, especially
    since the following clause identifies it with 'the word of God.' This preserves
    the theological force of divine enablement without importing more than the text
    states.
  doctrine_reference: Affirmations; Translation philosophy §3
