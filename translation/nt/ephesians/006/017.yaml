id: EPH.6.17
reference: Ephesians 6:17
source:
  edition: SBLGNT
  text: καὶ τὴν περικεφαλαίαν τοῦ σωτηρίου ⸀δέξασθε, καὶ τὴν μάχαιραν τοῦ πνεύματος,
    ὅ ἐστιν ῥῆμα θεοῦ,
translation:
  text: And receive the helmet of salvation, and the sword of the Spirit, which is
    the word of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take' the helmet of salvation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the utterance of God'; Greek rhēma can emphasize a spoken word or message.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέξασθε
  chosen: receive
  alternatives:
  - take
  - accept
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural. 'Receive' best preserves
    the sense of taking up what is supplied or given, fitting the armor imagery and
    distinguishing it slightly from a more forceful 'take' while remaining natural
    English.
- source_word: περικεφαλαίαν
  chosen: helmet
  lexicon: BDAG
  rationale: Standard military term for protective headgear. 'Helmet' is the direct
    and natural equivalent in the armor metaphor.
- source_word: τοῦ σωτηρίου
  chosen: of salvation
  alternatives:
  - of deliverance
  lexicon: BDAG
  rationale: The genitival phrase is traditionally and accurately rendered 'of salvation.'
    Although σωτήριος can carry the sense of deliverance or saving, 'salvation' best
    matches Pauline theological usage and the established metaphor without overinterpreting
    the genitive.
- source_word: μάχαιραν
  chosen: sword
  alternatives:
  - short sword
  - dagger
  lexicon: BDAG
  rationale: μάχαιρα denotes a bladed weapon, often shorter than a large broadsword.
    'Sword' is the clearest idiomatic rendering in English; more specific options
    like 'short sword' are possible but unnecessarily narrow in the main text.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - of the spirit
  lexicon: BDAG
  rationale: In this Pauline context, the genitive most naturally refers to the Holy
    Spirit rather than a human spirit or a generic spiritual quality. Capitalizing
    'Spirit' communicates that referent in English.
- source_word: ὅ ἐστιν
  chosen: which is
  alternatives:
  - that is
  lexicon: BDAG
  rationale: The neuter relative pronoun refers back to the sword metaphor as explained
    by the following apposition. 'Which is' is smooth modern English and preserves
    the explanatory force.
- source_word: ῥῆμα θεοῦ
  chosen: the word of God
  alternatives:
  - the utterance of God
  - the message of God
  lexicon: BDAG
  rationale: ῥῆμα often emphasizes a spoken word, saying, or utterance, but 'word
    of God' remains the most natural and recognizable rendering here. 'Utterance of
    God' is more narrowly lexical but less idiomatic; the broader phrase preserves
    both intelligibility and theological resonance.
