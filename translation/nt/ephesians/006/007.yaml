theological_decisions:
- issue: Rendering of κύριος in contrast with human masters
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse contrasts service rendered ultimately to the divine Lord rather
    than merely to human beings. Using 'Lord' preserves the christological title and
    avoids confusion with earthly masters discussed in the surrounding context.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: How strongly to express the slavery nuance of δουλεύοντες
  chosen_reading: serving
  alternative_readings:
  - serving as slaves
  - slaving
  rationale: The broader paragraph already identifies the addressees as slaves, so
    the participle here can be rendered idiomatically as 'serving' without erasing
    the social reality. This balances lexical transparency with readable English under
    optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος / translation philosophy
    on context-dependent rendering'
