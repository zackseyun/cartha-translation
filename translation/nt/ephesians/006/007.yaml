id: EPH.6.7
reference: Ephesians 6:7
source:
  edition: SBLGNT
  text: μετ’ εὐνοίας δουλεύοντες, ὡς τῷ κυρίῳ καὶ οὐκ ἀνθρώποις,
translation:
  text: serving with goodwill, as to the Lord and not to men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to people'; Greek 'to men' contrasts human beings with the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ’ εὐνοίας
  chosen: with goodwill
  alternatives:
  - with good will
  - with kindness
  - with a willing spirit
  lexicon: BDAG
  rationale: The preposition μετά with the genitive expresses manner or accompanying
    disposition. εὔνοια denotes goodwill, benevolence, or favorable intent. 'With
    goodwill' is natural modern English and preserves the inward attitude emphasized
    by Paul.
- source_word: δουλεύοντες
  chosen: serving
  alternatives:
  - slaving
  - being slaves
  - rendering service
  lexicon: BDAG
  rationale: The participle from δουλεύω literally means 'to serve as a slave.' In
    this household-code context addressed to slaves (6:5), the bonded status is already
    explicit in the surrounding passage, but the verbal idea here focuses on the act
    of rendering service. 'Serving' is the most idiomatic English equivalent in this
    clause while still fitting the broader slavery context. The stronger nuance is
    preserved in documentation rather than forced into awkward English.
- source_word: ὡς
  chosen: as
  alternatives:
  - as if
  - as though
  lexicon: BDAG
  rationale: 'ὡς introduces the comparison or manner: their service is to be rendered
    as to the Lord. ''As'' is sufficiently clear and avoids adding interpretive force
    beyond the Greek.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to Lord
  - to the Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In Ephesians this naturally
    refers to the exalted Lord Jesus in the ethical frame of Christian obedience.
    'Master' could fit the slave context but would blur the distinction between earthly
    masters in the context and the divine Lord named here.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here contrasts human beings with the Lord. The plural is generic,
    but because the immediate context concerns male household heads/masters in the
    ancient setting and the doctrine prefers gender-accurate renderings over flattening,
    'men' preserves the source form and traditional contrast. A more inclusive alternative
    is worth preserving in a footnote because the sense is 'human beings' in contrast
    to the Lord.
