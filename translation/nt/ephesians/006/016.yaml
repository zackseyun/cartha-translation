theological_decisions:
- issue: Meaning of τοῦ πονηροῦ
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: In the immediate context of spiritual warfare and hostile attack, the
    personal reading best fits Paul's imagery. This does not over-specify beyond a
    well-supported contextual inference, and the abstract alternative is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    genuine ambiguity.
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. In this verse, 'faith' best matches
    the metaphor of defensive reliance on God, while the lexical alternatives are
    documented.
  doctrine_reference: 'Contested terms table: πίστις → faith; alternatives preserved
    where contested.'
