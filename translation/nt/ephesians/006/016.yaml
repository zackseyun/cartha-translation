id: EPH.6.16
reference: Ephesians 6:16
source:
  edition: SBLGNT
  text: ⸀ἐν πᾶσιν ἀναλαβόντες τὸν θυρεὸν τῆς πίστεως, ἐν ᾧ δυνήσεσθε πάντα τὰ βέλη
    τοῦ ⸀πονηροῦ πεπυρωμένα σβέσαι·
translation:
  text: In all circumstances, taking up the shield of faith, with which you will be
    able to extinguish all the flaming arrows of the evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'darts' for 'arrows' (Greek βέλη, a general term for projectiles).
    reason: lexical_alternative
  - marker: b
    text: Or 'evil' instead of 'the evil one'; the Greek can be read abstractly, though
      the personal sense fits the warfare context well.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''fiery darts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσιν
  chosen: In all circumstances
  alternatives:
  - in all things
  - with all
  lexicon: BDAG
  rationale: 'The dative plural with ἐν here is idiomatic in the armor-list context
    and is best taken adverbially: ''in all circumstances'' or ''in every situation,''
    rather than a more wooden ''in all things.'' This fits the flow from the preceding
    armor imperatives without over-paraphrasing.'
- source_word: ἀναλαβόντες
  chosen: taking up
  alternatives:
  - having taken up
  - take up
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as an attendant action connected
    to the exhortation sequence. 'Taking up' preserves the participial force while
    reading naturally in English.
- source_word: θυρεὸν
  chosen: shield
  lexicon: BDAG
  rationale: θυρεός denotes a large shield. 'Shield' is the standard accessible rendering;
    specifying 'large shield' would add detail not explicit in the immediate English
    tradition, though the military image is preserved.
- source_word: τῆς πίστεως
  chosen: of faith
  alternatives:
  - of trust
  - of faithfulness
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' Here the genitive
    most naturally identifies the shield metaphorically as characterized by faith.
    'Trust' is possible in sense, and 'faithfulness' is a lexical alternative, but
    the context of believer response favors 'faith' in the main text.
- source_word: ἐν ᾧ
  chosen: with which
  alternatives:
  - by which
  - in which
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'shield' and the preposition is instrumental
    in sense. 'With which' is idiomatic and clearly expresses means.
- source_word: δυνήσεσθε
  chosen: you will be able
  alternatives:
  - you can
  - you shall be able
  lexicon: BDAG
  rationale: The future middle indicates future capability. 'You will be able' preserves
    both tense and sense without archaic tone.
- source_word: βέλη
  chosen: arrows
  alternatives:
  - darts
  - missiles
  lexicon: BDAG
  rationale: βέλη can denote projectiles broadly, and traditional English often uses
    'darts.' 'Arrows' is more immediately intelligible to modern readers while still
    fitting the military metaphor. The alternative is worth preserving because of
    translation tradition.
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - the wicked one
  - evil
  lexicon: BDAG
  rationale: 'The genitive singular with article is best read personally here: ''the
    evil one,'' a common NT designation for Satan, especially in a spiritual warfare
    context. Rendering it as the abstract ''evil'' is grammatically possible but less
    likely in context.'
- source_word: πεπυρωμένα
  chosen: flaming
  alternatives:
  - set on fire
  - fiery
  lexicon: BDAG
  rationale: The perfect passive participle means 'having been set on fire.' 'Flaming'
    is concise, natural English that preserves the image. 'Fiery' is traditional and
    viable; 'set on fire' is more explicit but less idiomatic in the line.
- source_word: σβέσαι
  chosen: to extinguish
  alternatives:
  - to quench
  - to put out
  lexicon: BDAG
  rationale: σβέννυμι means to extinguish or quench. 'Extinguish' is clear modern
    English and preserves the image of putting out fire. 'Quench' is traditional but
    less common in contemporary usage.
