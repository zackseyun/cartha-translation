theological_decisions:
- issue: Rendering of διάκονος for Tychicus
  chosen_reading: minister
  alternative_readings:
  - servant
  - deacon
  rationale: The context commends Tychicus as a trusted coworker who will report Paul's
    situation. The term does not unambiguously denote the formal ecclesial office
    of deacon here, so 'minister' preserves functional ministry without importing
    later church-structure claims.
  doctrine_reference: Translation philosophy §§1, 5; Contested terms table for key-term
    consistency principles
- issue: Rendering of ἀδελφός
  chosen_reading: brother
  alternative_readings:
  - brother/sibling
  rationale: The reference is to an individual male coworker, not a mixed group. 'Brother'
    is therefore both gender-accurate and contextually precise.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The phrase ἐν κυρίῳ uses the standard Pauline title for Jesus/the covenantal
    Lord. Per doctrine guidance, κύριος is rendered 'Lord.'
  doctrine_reference: 'Contested terms table: κύριος → Lord'
