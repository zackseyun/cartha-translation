id: EPH.6.18
reference: Ephesians 6:18
source:
  edition: SBLGNT
  text: διὰ πάσης προσευχῆς καὶ δεήσεως, προσευχόμενοι ἐν παντὶ καιρῷ ἐν πνεύματι,
    καὶ εἰς ⸀αὐτὸ ἀγρυπνοῦντες ἐν πάσῃ προσκαρτερήσει καὶ δεήσει περὶ πάντων τῶν ἁγίων,
translation:
  text: with every prayer and petition, praying at all times in the Spirit, and to
    this end staying alert with all perseverance and petition for all the saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in spirit.' The Greek may be read more generally, but in context it
      likely refers to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: '''Saints'' here means all God''s holy people, that is, all believers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all perseverance and petition'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ πάσης προσευχῆς καὶ δεήσεως
  chosen: with every prayer and petition
  alternatives:
  - through all prayer and petition
  - by means of every prayer and petition
  lexicon: BDAG
  rationale: διά with the genitive can denote means or instrumentality. In this participial
    continuation of the armor exhortation, English 'with' naturally conveys means
    without sounding wooden. προσευχή is rendered 'prayer' as the general term, while
    δέησις is distinguished as 'petition' to preserve the nuance of specific entreaty.
- source_word: προσευχόμενοι
  chosen: praying
  alternatives:
  - as you pray
  lexicon: BDAG
  rationale: Present middle participle, nominative plural, continuing the series of
    attendant participles dependent on the preceding imperative context. 'Praying'
    preserves the participial flow and links the action to the means of spiritual
    warfare.
- source_word: ἐν παντὶ καιρῷ
  chosen: at all times
  alternatives:
  - at every time
  - on every occasion
  lexicon: BDAG
  rationale: καιρός here refers to every fitting or occurring time/occasion. 'At all
    times' is idiomatic and captures the comprehensive force of παντί.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  lexicon: BDAG
  rationale: Given Pauline usage and the likely reference to the Holy Spirit in the
    surrounding context of spiritual warfare, the capitalized rendering best reflects
    the probable sense. The anarthrous construction does not require an indefinite
    or merely human-spirit reading.
- source_word: εἰς αὐτὸ
  chosen: for this very thing
  alternatives:
  - to this end
  - for this purpose
  lexicon: BDAG
  rationale: This idiom points forward/backward to the purpose or goal just mentioned.
    'For this very thing' preserves the emphatic force of αὐτό while remaining natural
    English.
- source_word: ἀγρυπνοῦντες
  chosen: staying alert
  alternatives:
  - keeping watch
  - being watchful
  lexicon: BDAG
  rationale: The participle denotes wakeful vigilance. 'Staying alert' is clear modern
    English and fits the military/watchfulness imagery of the passage.
- source_word: ἐν πάσῃ προσκαρτερήσει
  chosen: with all perseverance
  alternatives:
  - with all persistence
  - in all steadfastness
  lexicon: BDAG
  rationale: προσκαρτέρησις conveys persistence or steadfast devotion. 'Perseverance'
    communicates sustained continuance in prayer and vigilance.
- source_word: καὶ δεήσει
  chosen: and petition
  alternatives:
  - and supplication
  lexicon: BDAG
  rationale: δέησις is again rendered distinctly from προσευχή. 'Petition' is more
    accessible than 'supplication' while preserving the sense of specific requests.
- source_word: περὶ πάντων τῶν ἁγίων
  chosen: for all the saints
  alternatives:
  - for all God's holy ones
  - for all the holy ones
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to believers as God's consecrated
    people. 'Saints' preserves the established ecclesial term without importing a
    later canonization sense; the phrase means all believers.
