theological_decisions:
- issue: Interpretation of ἐν ἀφθαρσίᾳ
  chosen_reading: Retain the more literal and ambiguous 'in incorruptibility' in the
    main text
  alternative_readings:
  - with an imperishable love
  - in sincerity
  - with undying love
  rationale: The phrase has generated multiple interpretive renderings in English.
    Because the Greek does not unambiguously specify whether ἀφθαρσία describes the
    believers' love, the manner of the blessing, or a quality akin to sincerity/imperishability,
    the translation preserves the tension in the main text and records smoother interpretive
    options in a footnote, in line with the doctrine's instruction not to collapse
    genuine ambiguity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
