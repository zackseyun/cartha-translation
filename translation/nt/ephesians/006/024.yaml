id: EPH.6.24
reference: Ephesians 6:24
source:
  edition: SBLGNT
  text: ἡ χάρις μετὰ πάντων τῶν ἀγαπώντων τὸν κύριον ἡμῶν Ἰησοῦν Χριστὸν ἐν ⸀ἀφθαρσίᾳ.
translation:
  text: Grace be with all who love our Lord Jesus Messiah in incorruptibility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an imperishable love'; alternatively, 'in sincerity' or 'with undying
      love.' The Greek phrase 'in incorruptibility' is concise and ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - grace
  - favor
  lexicon: BDAG
  rationale: Rendered as 'Grace' in keeping with Pauline epistolary benediction style,
    where the noun functions as a blessing wish. Capitalization is stylistic sentence-initial
    capitalization, not a theological personification.
- source_word: μετὰ πάντων
  chosen: be with all
  alternatives:
  - with all
  - upon all
  lexicon: BDAG
  rationale: The Greek is verbless, but English idiom in a benediction naturally supplies
    'be.' 'With all' is the straightforward sense of μετά with the genitive.
- source_word: ἀγαπώντων
  chosen: who love
  alternatives:
  - loving
  - who are loving
  lexicon: BDAG
  rationale: The present participle is rendered as a substantival relative clause
    for natural English. 'Who love' preserves the ongoing characteristic sense without
    awkwardness.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' 'Master'
    is possible lexically but less fitting here as a christological title.
- source_word: Ἰησοῦν Χριστὸν
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like form. In this blessing formula, the titular
    sense remains intelligible and preserves the meaning of the Greek.
- source_word: ἐν ἀφθαρσίᾳ
  chosen: in incorruptibility
  alternatives:
  - with an imperishable love
  - in sincerity
  - with undying love
  lexicon: BDAG
  rationale: The phrase is syntactically and semantically debated. A more formally
    transparent rendering is retained in the main text to preserve the Greek's ambiguity
    rather than resolving it interpretively. 'In incorruptibility' can qualify either
    the believers' love or the sphere/quality in which the blessing is pronounced;
    alternatives are preserved in a footnote.
