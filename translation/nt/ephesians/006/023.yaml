id: EPH.6.23
reference: Ephesians 6:23
source:
  edition: SBLGNT
  text: Εἰρήνη τοῖς ἀδελφοῖς καὶ ἀγάπη μετὰ πίστεως ἀπὸ θεοῦ πατρὸς καὶ κυρίου Ἰησοῦ
    Χριστοῦ.
translation:
  text: Peace to the brothers, and love with faith, from God the Father and the Lord
    Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the brothers and sisters.' The Greek says 'brothers,' a masculine
      plural form that can address the whole believing community.
    reason: alternative_reading
  - marker: b
    text: Or 'love with faithfulness' or 'love with trust.' The Greek word can carry
      these senses, though 'faith' is the default rendering here.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Jesus Christ.' Here 'Messiah' translates the title Χριστός to preserve
      its meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰρήνη
  chosen: Peace
  alternatives:
  - May there be peace
  - Peace be
  lexicon: BDAG
  rationale: The noun stands elliptically as a benedictory wish. 'Peace' preserves
    the concise nominative blessing formula without adding a verb not present in Greek.
- source_word: τοῖς ἀδελφοῖς
  chosen: to the brothers
  alternatives:
  - to the brothers and sisters
  - to the brethren
  lexicon: BDAG
  rationale: ἀδελφοῖς is grammatically masculine plural and in Pauline usage often
    addresses the whole believing community. Per the gender-accurate policy, 'brothers'
    best matches the source form and representative force; a more inclusive alternative
    is preserved in a footnote.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Matches the default rendering for ἀγάπη and preserves the lexical connection
    to Paul's frequent use of the term.
- source_word: μετὰ πίστεως
  chosen: with faith
  alternatives:
  - with faithfulness
  - with trust
  lexicon: BDAG
  rationale: μετά with the genitive means 'with,' expressing accompaniment. πίστις
    defaults to 'faith' per doctrine. Although πίστις can also mean 'faithfulness'
    or 'trust,' this instance is not a sharply contested construction like pistis
    Christou; the main text keeps the default while alternatives are noted.
- source_word: ἀπὸ
  chosen: from
  lexicon: BDAG
  rationale: 'Standard source/origin sense: the peace, love, and faith named in the
    blessing come from God the Father and the Lord Jesus Messiah.'
- source_word: θεοῦ πατρὸς
  chosen: God the Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The Greek lacks ἡμῶν ('our'), so 'God the Father' is the most precise
    rendering.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord' in line with the doctrine
    guidelines and NT usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than merely a name-like second
    element. Per doctrine, Χριστός is rendered 'Messiah' where context supports title
    sense.
