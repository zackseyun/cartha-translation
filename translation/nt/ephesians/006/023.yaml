theological_decisions:
- issue: Rendering Χριστοῦ in the closing benediction
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    rather than merely transliterated where context supports it. In 'Lord Jesus Messiah,'
    Χριστοῦ still carries titular force and preserves the messianic meaning of the
    Greek.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Gendered address in ἀδελφοῖς
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek is masculine plural. The project's policy is gender-accurate
    over gender-neutral, while allowing annotation where inclusivity is contextually
    relevant. Since Paul likely addresses the whole church, the inclusive sense is
    preserved in a footnote rather than moved into the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Sense of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine excerpt sets 'faith' as the default rendering for πίστις,
    with alternatives footnoted where contested. This verse is not one of the classic
    contested genitival constructions, so the default is retained in the main text
    while semantic alternatives are documented.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
