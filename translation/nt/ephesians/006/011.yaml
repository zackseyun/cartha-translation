theological_decisions:
- issue: Referent and rendering of διάβολος
  chosen_reading: the devil as the personal evil adversary
  alternative_readings:
  - the slanderer
  rationale: The immediate context of spiritual warfare in Ephesians 6 favors the
    personal supernatural adversary rather than a generic human slanderer. The translation
    reflects the text's likely referent without importing additional doctrinal detail
    beyond the verse.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve
    it
