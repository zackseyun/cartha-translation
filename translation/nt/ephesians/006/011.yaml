id: EPH.6.11
reference: Ephesians 6:11
source:
  edition: SBLGNT
  text: ἐνδύσασθε τὴν πανοπλίαν τοῦ θεοῦ πρὸς τὸ δύνασθαι ὑμᾶς στῆναι πρὸς τὰς μεθοδείας
    τοῦ διαβόλου·
translation:
  text: Put on the full armor of God, so that you may be able to stand against the
    schemes of the devil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whole armor of God.' The Greek term refers to the complete equipment
      of a soldier.
    reason: lexical_alternative
  - marker: b
    text: Or 'wiles' or 'crafty methods' of the devil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσασθε
  chosen: Put on
  alternatives:
  - Clothe yourselves with
  - Wear
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural. 'Put on' is idiomatic
    modern English for donning armor and preserves the command force without sounding
    wooden. 'Clothe yourselves with' is more formally transparent to the middle voice
    but less natural here.
- source_word: πανοπλίαν
  chosen: full armor
  alternatives:
  - whole armor
  - complete armor
  lexicon: BDAG
  rationale: The term denotes the complete equipment of a heavily armed soldier, not
    merely armor in a narrow sense. 'Full armor' communicates completeness in readable
    modern English. 'Whole armor' is traditional but less natural today.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - God's
  lexicon: BDAG
  rationale: The genitive is left formally broad in English. 'Of God' preserves the
    likely sense that this armor belongs to God and is supplied by him, without over-specifying
    possession versus source.
- source_word: πρὸς τὸ δύνασθαι ὑμᾶς στῆναι
  chosen: so that you may be able to stand
  alternatives:
  - for you to be able to stand
  - in order that you may be able to stand
  lexicon: BDAG
  rationale: This preposition plus articular infinitive expresses purpose/result.
    'So that you may be able to stand' is natural English and preserves the intended
    purpose of the command.
- source_word: στῆναι
  chosen: to stand
  alternatives:
  - to stand firm
  lexicon: BDAG
  rationale: The infinitive from ἵστημι here means to stand one's ground. 'Stand'
    is kept in the main text because the firmness nuance is contextually present already
    in the military imagery and can be preserved without expansion. 'Stand firm' is
    a plausible interpretive gloss but slightly more expansive.
- source_word: μεθοδείας
  chosen: schemes
  alternatives:
  - wiles
  - strategies
  - crafty methods
  lexicon: BDAG
  rationale: The noun refers to cunning devices or deceptive tactics. 'Schemes' is
    clear, contemporary, and preserves the hostile, deceptive nuance better than the
    archaic 'wiles.'
- source_word: τοῦ διαβόλου
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος functions as the established personal designation
    for Satan, not merely a common noun meaning 'slanderer.' 'The devil' is the standard
    and clearest rendering in English.
