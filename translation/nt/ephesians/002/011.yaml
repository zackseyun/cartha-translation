theological_decisions:
- issue: Rendering of σάρξ in a non-moral context
  chosen_reading: flesh
  alternative_readings:
  - body
  - physical nature
  rationale: The doctrine guidance specifies 'flesh' for literal contexts and 'sinful
    nature' only for metaphorical ones. Here Paul contrasts ethnic/covenantal bodily
    status, not moral corruption, so 'flesh' should be preserved.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
- issue: Force of λεγομένης with περιτομή
  chosen_reading: what is called 'circumcision'
  alternative_readings:
  - the so-called circumcision
  - the circumcision
  rationale: Paul's repetition of 'called' for both groups creates rhetorical symmetry
    and likely relativizes merely external identity markers. The translation preserves
    that tension without importing a stronger anti-Jewish tone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
revisions:
- timestamp: '2026-04-21T03:01:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/002/011.json
  category: awkward_english
  tier: 1
  from: by what is called “circumcision,” made by hands in the flesh—
  to: by the so-called “circumcision” made by hands in the flesh—
  rationale: The current phrasing is grammatically correct but stylistically awkward.
    The comma after 'circumcision' makes 'made by hands in the flesh' feel like a
    tacked-on, non-restrictive clause. In the Greek, 'χειροποιήτου' ('handmade') is
    a single adjective tightly modifying 'περιτομῆς' ('circumcision'). Using 'the
    so-called' (a valid alternative for 'λεγομένης') allows for a more integrated
    English phrase ('the so-called circumcision made by hands...'), which better reflects
    the tight connection in the source text and improves the flow of an already complex
    sentence.
