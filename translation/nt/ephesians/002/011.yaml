id: EPH.2.11
reference: Ephesians 2:11
source:
  edition: SBLGNT
  text: Διὸ μνημονεύετε ὅτι ⸂ποτὲ ὑμεῖς⸃ τὰ ἔθνη ἐν σαρκί, οἱ λεγόμενοι ἀκροβυστία
    ὑπὸ τῆς λεγομένης περιτομῆς ἐν σαρκὶ χειροποιήτου,
translation:
  text: Therefore remember that formerly you, the Gentiles in the flesh, who are called
    “uncircumcision” by what is called “circumcision,” made by hands in the flesh—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you once, the nations in the flesh.” The Greek places emphasis on “you”
      and uses “nations/Gentiles” in the sense of non-Jews.
    reason: lexical_alternative
  - marker: b
    text: “Circumcision” and “uncircumcision” are covenantal-ethnic labels here, not
      merely anatomical descriptions.
    reason: cultural_note
  - marker: c
    text: Or “the so-called circumcision, which is made by hands in the flesh.” Paul’s
      wording may carry a note of critique toward merely outward circumcision.
    reason: alternative_reading
  - marker: d
    text: Or 'by what is called “circumcision,” made by hands in the flesh—'.
    reason: previous_rendering
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding argument; 'Therefore'
    is natural and sufficiently formal.
- source_word: μνημονεύετε
  chosen: remember
  alternatives:
  - keep remembering
  - call to mind
  lexicon: BDAG
  rationale: Present active imperative plural; 'remember' is idiomatic English for
    the command, while the ongoing force is adequately conveyed in context without
    overtranslating.
- source_word: ποτὲ ὑμεῖς
  chosen: formerly you
  alternatives:
  - you once
  - at one time you
  lexicon: BDAG
  rationale: Captures the temporal contrast and preserves the emphatic placement of
    ὑμεῖς with readable English word order.
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  - Gentiles
  lexicon: BDAG
  rationale: In this Jewish/Gentile contrast, ἔθνη refers specifically to non-Jews
    rather than nations in a geopolitical sense; 'the Gentiles' best fits Paul's meaning.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - in bodily terms
  - physically
  lexicon: BDAG
  rationale: Here σάρξ is literal/social-ethnic rather than moral; per doctrine defaults,
    'flesh' is retained in literal contexts. The phrase signals bodily/ethnic status,
    not sinful nature.
- source_word: οἱ λεγόμενοι ἀκροβυστία
  chosen: called “uncircumcision”
  alternatives:
  - those called 'uncircumcision'
  - who are called 'the uncircumcision'
  lexicon: BDAG
  rationale: Preserves the passive social labeling. Quotation marks help signal Paul’s
    use of a conventional designation, likely with some critical distance.
- source_word: ἀκροβυστία
  chosen: uncircumcision
  alternatives:
  - foreskin
  - the uncircumcised
  lexicon: BDAG
  rationale: In this context the term functions as a collective ethnic-religious label,
    not a strictly anatomical reference; 'uncircumcision' preserves the polemical
    label used by Jews for Gentiles.
- source_word: ὑπὸ τῆς λεγομένης περιτομῆς
  chosen: by what is called “circumcision”
  alternatives:
  - by the so-called circumcision
  - by those called 'circumcision'
  lexicon: BDAG
  rationale: The repeated λεγομένης suggests Paul is qualifying the label; 'what is
    called' preserves that rhetorical distance without making the sarcasm too explicit.
    The singular abstract noun can stand for the circumcised group.
- source_word: περιτομή
  chosen: circumcision
  alternatives:
  - the circumcised
  lexicon: BDAG
  rationale: Retains the covenantal marker term and mirrors the Greek abstraction
    used as a group designation.
- source_word: ἐν σαρκὶ χειροποιήτου
  chosen: made by hands in the flesh
  alternatives:
  - performed by human hands in the flesh
  - done by hand on the body
  lexicon: BDAG
  rationale: χειροποίητος literally means 'made by hands.' The phrase modifies 'circumcision'
    and underscores its merely physical, humanly performed character. 'Made by hands
    in the flesh' stays close to the Greek while remaining intelligible.
