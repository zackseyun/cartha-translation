id: EPH.2.1
reference: Ephesians 2:1
source:
  edition: SBLGNT
  text: Καὶ ὑμᾶς ὄντας νεκροὺς τοῖς παραπτώμασιν καὶ ταῖς ἁμαρτίαις ⸀ὑμῶν,
translation:
  text: And you were dead in your trespasses and sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dead because of your trespasses and sins.' The Greek dative can be understood
      in more than one closely related way.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Also
  - Now
  lexicon: BDAG
  rationale: Retains the connective force linking this clause to the preceding doxological
    context. 'And' is the most natural and sufficiently formal rendering.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: Second person plural object carried into English simply as 'you.' English
    does not normally mark the plural here, though the plural sense remains in context.
- source_word: ὄντας
  chosen: were
  alternatives:
  - being
  lexicon: BDAG
  rationale: 'Although formally a present participle (''being''), English idiom in
    this anacoluthic construction is best expressed with a finite verb supplied from
    the sense: ''you were dead.'' This preserves the clause''s meaning without awkwardness.'
- source_word: νεκροὺς
  chosen: dead
  alternatives:
  - lifeless
  lexicon: BDAG
  rationale: Standard and direct rendering of νεκρός. In context it denotes spiritual
    death, but the translation should preserve the metaphor rather than interpret
    it away.
- source_word: τοῖς παραπτώμασιν
  chosen: in your trespasses
  alternatives:
  - because of your trespasses
  - through your trespasses
  lexicon: BDAG
  rationale: The dative here is commonly understood as expressing sphere or cause/instrument
    in relation to being dead. 'In your trespasses' is idiomatic, traditional, and
    preserves the compact Greek relation without over-specifying it.
- source_word: παραπτώμασιν
  chosen: trespasses
  alternatives:
  - transgressions
  - false steps
  lexicon: BDAG
  rationale: '''Trespasses'' is a well-established rendering that captures the sense
    of offenses or violations. ''Transgressions'' is possible, but ''trespasses''
    pairs naturally with ''sins'' while preserving a lexical distinction.'
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinator joining the two near-synonymous nouns without requiring
    interpretive nuance.
- source_word: ταῖς ἁμαρτίαις ὑμῶν
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: 'ἁμαρτία is straightforwardly ''sin''; plural here is best rendered ''sins.''
    The possessive ὑμῶν is naturally expressed once in English over both nouns: ''your
    trespasses and sins.'''
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: 'Placed with both coordinated nouns in English for natural style: ''your
    trespasses and sins.'' This reflects the Greek possessive without unnecessary
    repetition.'
