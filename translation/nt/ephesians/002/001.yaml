theological_decisions:
- issue: Nature of 'dead'
  chosen_reading: Retain 'dead' as the text's metaphor for the readers' condition
    in relation to sin, without expanding it to 'spiritually dead' in the main text.
  alternative_readings:
  - spiritually dead
  - dead because of your trespasses and sins
  rationale: The verse clearly speaks of death in relation to sins, but the translation
    should preserve the apostolic metaphor and not resolve its theological implications
    beyond the wording given. This follows the principle of preserving theological
    tension rather than importing explanatory language.
  doctrine_reference: Translation philosophy §3
