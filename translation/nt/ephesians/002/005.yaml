id: EPH.2.5
reference: Ephesians 2:5
source:
  edition: SBLGNT
  text: καὶ ὄντας ἡμᾶς νεκροὺς τοῖς παραπτώμασιν συνεζωοποίησεν τῷ Χριστῷ— χάριτί
    ἐστε σεσῳσμένοι—
translation:
  text: even when we were dead in our trespasses, he made us alive together with the
    Messiah—by grace you have been saved—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning; traditional English often has 'Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄντας ἡμᾶς νεκροὺς
  chosen: when we were dead
  alternatives:
  - while we were dead
  - though we were dead
  lexicon: BDAG
  rationale: The participial construction is concessive/temporal in context, continuing
    the thought from the previous verse. 'When we were dead' is natural English and
    preserves the state described by νεκρούς without overinterpreting the participle.
- source_word: τοῖς παραπτώμασιν
  chosen: in our trespasses
  alternatives:
  - because of our trespasses
  - through our trespasses
  - in transgressions
  lexicon: BDAG
  rationale: 'The dative here expresses sphere/reference: dead with respect to or
    in the realm of trespasses. ''In our trespasses'' is idiomatic and keeps close
    to Paul''s wording. ''Our'' is supplied from the broader context and standard
    English sense, since the parallel in v. 1 explicitly has ''your trespasses'' and
    here the first-person plural is the object throughout.'
- source_word: συνεζωοποίησεν
  chosen: he made us alive together
  alternatives:
  - he gave us life together
  - he made us alive with
  lexicon: BDAG
  rationale: The compound verb includes both enlivening and togetherness. 'Made us
    alive together' preserves the verbal force and leaves the following dative phrase
    to specify union with the Messiah.
- source_word: τῷ Χριστῷ
  chosen: with the Messiah
  alternatives:
  - with Christ
  lexicon: BDAG
  rationale: 'Χριστός is a title here rather than a name-like usage, so the default
    doctrinal guidance favors ''Messiah.'' The dative is rendered as associative/instrumental
    union: believers are made alive together with the Messiah.'
- source_word: χάριτί
  chosen: by grace
  alternatives:
  - by favor
  - by gracious gift
  lexicon: BDAG
  rationale: The dative is best rendered instrumentally. 'Grace' is the established
    and accurate theological term here, and remains accessible in modern English.
- source_word: ἐστε σεσῳσμένοι
  chosen: you have been saved
  alternatives:
  - you are saved
  - you have been rescued
  lexicon: BDAG
  rationale: The periphrastic perfect emphasizes a present state resulting from completed
    action. 'You have been saved' best captures the perfect aspect and preserves the
    passive voice. 'Rescued' is possible semantically but too interpretive in this
    Pauline theological context.
