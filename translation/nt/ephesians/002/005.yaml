theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine, Χριστός should be translated as 'Messiah' where it functions
    as a title. In this context the title sense is still active, and translating it
    preserves the messianic meaning without denying traditional 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Force of the parenthetical clause χάριτί ἐστε σεσῳσμένοι
  chosen_reading: retain as a parenthetical exclamation within dashes
  alternative_readings:
  - integrate smoothly into the sentence without punctuation emphasis
  rationale: Paul's abrupt insertion is rhetorically significant and anticipates fuller
    explanation in vv. 8–9. Preserving the dash-marked parenthesis maintains the theological
    emphasis on grace without expanding the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
