theological_decisions:
- issue: Referent of 'the saints' (τῶν ἁγίων)
  chosen_reading: the saints refers to God's holy people, likely including the covenant
    people of God broadly rather than only angels or only a narrow subgroup of Christians
  alternative_readings:
  - angels
  - Jewish believers specifically
  - all believers
  rationale: In context Paul is describing Gentiles now incorporated into God's people
    and household. The translation keeps the broader term 'saints' rather than narrowing
    the referent interpretively in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
