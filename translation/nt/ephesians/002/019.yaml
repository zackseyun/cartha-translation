id: EPH.2.19
reference: Ephesians 2:19
source:
  edition: SBLGNT
  text: ἄρα οὖν οὐκέτι ἐστὲ ξένοι καὶ πάροικοι, ἀλλὰ ⸀ἐστὲ συμπολῖται τῶν ἁγίων καὶ
    οἰκεῖοι τοῦ θεοῦ,
translation:
  text: So then, you are no longer strangers and resident foreigners, but you are
    fellow citizens with the saints and members of God's household,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourners' for 'resident foreigners.' The Greek term refers to those
      living in a place without full civic status.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellow citizens of the saints.' The sense is that believers now share
      citizenship with God's holy people.
    reason: lexical_alternative
  - marker: c
    text: '''Saints'' here means God''s holy people, not a specially canonized class.'
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Consequently
  - Accordingly then
  lexicon: BDAG
  rationale: The paired inferential particles intensify the conclusion drawn from
    the preceding argument. 'So then' preserves the connective force in natural modern
    English without sounding overly formal.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed status. 'No longer' is
    the clearest idiomatic rendering.
- source_word: ξένοι
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: BDAG
  rationale: ξένοι denotes those who are foreign or not belonging. 'Strangers' works
    well here, especially in contrast with household membership, while avoiding redundancy
    with πάροικοι if that is rendered with a more specific immigration/residency nuance.
- source_word: πάροικοι
  chosen: resident foreigners
  alternatives:
  - sojourners
  - aliens
  - foreign residents
  lexicon: BDAG
  rationale: πάροικοι refers to those living in a place without full civic belonging.
    'Resident foreigners' preserves the social-legal nuance better than the archaic
    'aliens' or the more temporary-sounding 'sojourners.'
- source_word: συμπολῖται
  chosen: fellow citizens
  alternatives:
  - citizens together
  - fellow countrymen
  lexicon: BDAG
  rationale: The compound term emphasizes shared citizenship. 'Fellow citizens' is
    the most natural and semantically precise English equivalent.
- source_word: τῶν ἁγίων
  chosen: with the saints
  alternatives:
  - of the saints
  - with God's holy people
  lexicon: BDAG
  rationale: 'The genitive after συμπολῖται is naturally rendered as association:
    fellow citizens ''with'' the saints. ''Saints'' is retained as a standard biblical
    term for God''s consecrated people; ''holy people'' is possible but less consistent
    with established NT usage.'
- source_word: οἰκεῖοι
  chosen: members of God's household
  alternatives:
  - household members of God
  - belonging to God's household
  - of God's household
  lexicon: BDAG
  rationale: οἰκεῖοι denotes those belonging to a household. Rendering it as 'members
    of God's household' makes the relational metaphor explicit and idiomatic in English.
- source_word: τοῦ θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The possessive genitive is naturally expressed in English with the possessive
    form. 'God's household' is clearer and more readable than 'the household of God'
    in this sentence.
