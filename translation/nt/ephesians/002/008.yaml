id: EPH.2.8
reference: Ephesians 2:8
source:
  edition: SBLGNT
  text: τῇ γὰρ χάριτί ἐστε σεσῳσμένοι ⸀διὰ πίστεως· καὶ τοῦτο οὐκ ἐξ ὑμῶν, θεοῦ τὸ
    δῶρον·
translation:
  text: For by grace you have been saved through faith, and this is not from yourselves;
    it is the gift of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'this whole saving reality by grace through faith is not
      from yourselves.' The Greek demonstrative 'this' likely points to the preceding
      clause as a whole rather than to 'faith' alone.
    reason: alternative_reading
  - marker: b
    text: '''Faith'' may also be understood as ''trust''; the Greek word can in some
      contexts also mean ''faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτί
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in Pauline usage commonly denotes God's gracious favor or unmerited
    kindness. 'Grace' preserves the established theological sense without over-paraphrasing.
- source_word: ἐστε σεσῳσμένοι
  chosen: you have been saved
  alternatives:
  - you are saved
  - you have been rescued
  lexicon: BDAG
  rationale: The periphrastic perfect (present of εἰμί + perfect participle of σῴζω)
    conveys a completed action with ongoing result. 'You have been saved' best captures
    both the completed saving act and its present state.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    'Through' accurately renders διά with the genitive as means or instrument. 'Trust'
    is possible in English sense, and 'faithfulness' is a lexical alternative, but
    here the standard Pauline expression is best represented as 'through faith.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this whole thing
  - this salvation by grace through faith
  lexicon: BDAG
  rationale: The neuter demonstrative likely refers broadly to the preceding saving
    reality rather than narrowly to a single feminine noun such as χάρις or πίστεως.
    'This' preserves the Greek's compactness while allowing the broader referent.
- source_word: οὐκ ἐξ ὑμῶν
  chosen: is not from yourselves
  alternatives:
  - is not of yourselves
  - does not come from you
  lexicon: BDAG
  rationale: ἐκ with the genitive indicates source or origin. 'From yourselves' is
    idiomatic modern English and preserves Paul's denial that the saving reality originates
    in the readers.
- source_word: θεοῦ τὸ δῶρον
  chosen: it is the gift of God
  alternatives:
  - God's gift
  - the gift is from God
  lexicon: BDAG
  rationale: This appositional phrase identifies the preceding reality as God's gift.
    Supplying 'it is' makes the English natural while preserving the sense. 'Gift
    of God' keeps the genitive relation explicit.
