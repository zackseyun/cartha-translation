theological_decisions:
- issue: Referent of 'this' (τοῦτο) in relation to grace, faith, and salvation
  chosen_reading: '''This'' refers to the whole preceding reality of salvation by
    grace through faith, not narrowly to ''faith'' alone.'
  alternative_readings:
  - '''This'' refers specifically to faith as God''s gift'
  - '''This'' refers specifically to grace'
  rationale: The neuter demonstrative does not naturally match the feminine nouns
    χάρις or πίστις individually, which supports taking τοῦτο as referring to the
    preceding clause or concept as a whole. This preserves the text's theological
    tension and avoids importing a denominationally specific claim beyond what the
    Greek unambiguously states.
  doctrine_reference: Preserve theological tension rather than resolve it.
