  from: create the two in himself into one new man
  to: create the two into one new man in himself
  rationale: The current word order, which follows the Greek precisely (`...create [object] [location] [result]...`), can be slightly clunky for an English reader. The core phrase is 'create the two into one new man.' Placing 'in himself' in the middle of this construction slightly interrupts the flow. Moving the location phrase 'in himself' to the end improves readability without changing the meaning or losing any components of the original.
