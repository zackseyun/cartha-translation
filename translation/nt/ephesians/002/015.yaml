id: EPH.2.15
reference: Ephesians 2:15
source:
  edition: SBLGNT
  text: τὸν νόμον τῶν ἐντολῶν ἐν δόγμασιν καταργήσας, ἵνα τοὺς δύο κτίσῃ ἐν ⸀αὑτῷ εἰς ἕνα καινὸν ἄνθρωπον ποιῶν εἰρήνην,
translation:
  text: having abolished the law of commandments expressed in decrees, so that he might create the two into one new man in himself, making peace,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in decrees,' 'consisting in decrees,' or traditionally 'in ordinances.'
    reason: lexical_alternative
  - marker: b
    text: '''One new man'' is a singular corporate image; alternatively, ''one new humanity.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'create the two in himself into one new man'.
    reason: previous_rendering
lexical_decisions:
- source_word: νόμον
  chosen: law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Rendered as 'law' in lowercase because the phrase is qualified ('of commandments expressed in decrees') and refers to the Mosaic legal code in its commandment/decree form, not to an abstract principle. Capitalization 'Law' is possible but not required by the Greek.
- source_word: ἐντολῶν
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: '''Commandments'' preserves the formal, covenantal sense of ἐντολή and fits the genitival construction with νόμος.'
- source_word: ἐν δόγμασιν
  chosen: expressed in decrees
  alternatives:
  - in decrees
  - consisting in decrees
  - in ordinances
  lexicon: BDAG
  rationale: δόγμα can mean decree, edict, ordinance. 'Expressed in decrees' makes clear the relation to 'the law of commandments' in readable English without over-paraphrasing. 'Ordinances' is traditional but less accessible and can suggest ritual practices too narrowly.
- source_word: καταργήσας
  chosen: having abolished
  alternatives:
  - having nullified
  - having rendered ineffective
  lexicon: BDAG
  rationale: The aorist participle is best represented by 'having abolished,' indicating a decisive prior action relative to the purpose clause. 'Rendered ineffective' is lexically possible, but here the context of hostility and dividing barrier supports the stronger English term.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purposive rendering introducing the intended result of the abolishing action.
- source_word: τοὺς δύο
  chosen: the two
  alternatives:
  - both
  lexicon: BDAG
  rationale: Retains the explicit numeral and echoes the Jew-Gentile pair from the immediate context. 'Both' is smoother but less exact.
- source_word: κτίσῃ
  chosen: might create
  alternatives:
  - might form
  lexicon: BDAG
  rationale: κτίζω is strongly 'create,' preserving the new-creation nuance in Paul's wording.
- source_word: ἐν αὑτῷ
  chosen: in himself
  alternatives:
  - in him
  lexicon: BDAG
  rationale: The reflexive pronoun αὑτῷ is best brought out as 'in himself,' emphasizing that the unifying new humanity is created in the Messiah personally.
- source_word: εἰς ἕνα καινὸν ἄνθρωπον
  chosen: into one new man
  alternatives:
  - into one new humanity
  - into one new person
  lexicon: BDAG
  rationale: Following the gender-accurate policy, ἄνθρωπον is rendered 'man' because the Greek is singular masculine and carries representative force. 'Humanity' is interpretive and smoother in English, but 'one new man' better preserves Paul's metaphor and its Adamic/new-humanity resonance.
- source_word: ποιῶν εἰρήνην
  chosen: making peace
  alternatives:
  - thus making peace
  - bringing about peace
  lexicon: BDAG
  rationale: A natural rendering of the present participle plus object, preserving the ongoing/resultative sense tied to the creation of one new man.
