theological_decisions:
- issue: Rendering ἄνθρωπον in a corporate salvation context
  chosen_reading: one new man
  alternative_readings:
  - one new humanity
  rationale: The verse speaks corporately of Jews and Gentiles being made one, so 'humanity' is a plausible interpretive rendering. However, the translation philosophy requires gender-accurate rendering where the Greek is masculine with representative force. 'One new man' preserves the singular anthropological metaphor and leaves the corporate implication to context rather than importing it into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Force of καταργήσας regarding the law
  chosen_reading: having abolished
  alternative_readings:
  - having rendered ineffective
  - having nullified
  rationale: This wording reflects the Greek participle in context without making a broader doctrinal claim that God's moral will is erased. The object is specifically 'the law of commandments expressed in decrees' as it functioned in dividing Jew and Gentile. The translation preserves Paul's strong language while avoiding interpretive expansion beyond the verse itself.
  doctrine_reference: DOCTRINE.md Affirmations and Translation philosophy §1, §3
