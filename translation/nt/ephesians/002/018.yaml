id: EPH.2.18
reference: Ephesians 2:18
source:
  edition: SBLGNT
  text: ὅτι δι’ αὐτοῦ ἔχομεν τὴν προσαγωγὴν οἱ ἀμφότεροι ἐν ἑνὶ πνεύματι πρὸς τὸν
    πατέρα.
translation:
  text: For through him we both have access in one Spirit to the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because through him we both have access …'
    reason: lexical_alternative
  - marker: b
    text: '''Access'' can also be rendered ''introduction'' or ''approach.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'by one Spirit'; 'in one Spirit' preserves the Greek wording and may
      express either means or sphere.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this conjunction introduces the ground or explanation for
    the preceding statement about peace and reconciliation. 'For' is idiomatic English
    for an explanatory clause here, while 'because' is possible but slightly heavier.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with the genitive normally expresses means or agency. 'Through him'
    best preserves the mediatorial sense in context, referring to Messiah/Christ as
    the one through whom access is granted.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: Simple present indicative stating present shared reality. 'We have' is
    the natural and sufficiently formal English equivalent.
- source_word: τὴν προσαγωγὴν
  chosen: access
  alternatives:
  - introduction
  - approach
  - right of access
  lexicon: BDAG
  rationale: προσαγωγή can denote access or introduction into the presence of someone
    of high status. 'Access' is the clearest modern English rendering and fits Paul's
    relational and cultic imagery without over-paraphrasing. 'Introduction' is too
    narrow and can imply only an initial presentation; 'approach' is possible but
    less idiomatic with 'have' in English.
- source_word: οἱ ἀμφότεροι
  chosen: we both
  alternatives:
  - both of us
  - the two groups
  lexicon: BDAG
  rationale: The phrase refers back to the two formerly divided groups, Jews and Gentiles,
    now jointly included. 'We both' preserves the first-person solidarity of the Greek
    and remains concise. 'The two groups' makes the referent more explicit but adds
    wording not present in the text.
- source_word: ἐν ἑνὶ πνεύματι
  chosen: in one Spirit
  alternatives:
  - by one Spirit
  - in one spirit
  lexicon: BDAG
  rationale: The anarthrous πνεύματι with 'one' in this Pauline context most naturally
    refers to the Holy Spirit as the sphere or means of shared access. Capitalizing
    'Spirit' reflects that reading. 'In' is retained rather than shifted to 'by' to
    preserve the Greek preposition and the likely sense of shared participation within
    the one Spirit.
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to God the Father
  - before the Father
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement or orientation toward
    personal presence. 'To the Father' is direct and faithful. Expanding to 'God the
    Father' imports wording not present, while 'before the Father' slightly shifts
    the preposition's force.
