theological_decisions:
- issue: Referent of 'one Spirit'
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a shared human spirit
  rationale: 'Within Ephesians 2, the surrounding context is strongly Trinitarian:
    ''through him'' (the Son), ''in one Spirit,'' ''to the Father.'' Rendering with
    capital ''Spirit'' preserves this likely referent without adding explanatory words
    to the main text.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Force of προσαγωγή
  chosen_reading: shared access to the Father
  alternative_readings:
  - formal introduction into the Father's presence
  rationale: The term can carry courtly or cultic overtones, but 'access' best communicates
    the ongoing privilege granted to both groups through the Son and in the Spirit.
    This preserves the theological point of reconciled approach without over-specifying
    the metaphor.
  doctrine_reference: Translation philosophy §1, §6
