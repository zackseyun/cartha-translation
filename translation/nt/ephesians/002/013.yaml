theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate christological titles. In this verse
    Χριστός functions as a title with theological significance, so 'Messiah' preserves
    meaning better than the inherited transliteration 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of ἐν τῷ αἵματι τοῦ Χριστοῦ
  chosen_reading: 'instrumental: ''by the blood of the Messiah'''
  alternative_readings:
  - 'locative/sphere: ''in the blood of the Messiah'''
  - 'mediated means: ''through the blood of the Messiah'''
  rationale: The phrase refers to the means by which those formerly far away are brought
    near, namely the sacrificial death of the Messiah. Rendering it instrumentally
    communicates the theological point without importing a more developed atonement
    theory than the text itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
