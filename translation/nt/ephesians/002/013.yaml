id: EPH.2.13
reference: Ephesians 2:13
source:
  edition: SBLGNT
  text: νυνὶ δὲ ἐν Χριστῷ Ἰησοῦ ὑμεῖς οἵ ποτε ὄντες μακρὰν ⸂ἐγενήθητε ἐγγὺς⸃ ἐν τῷ
    αἵματι τοῦ Χριστοῦ.
translation:
  text: But now in Messiah Jesus, you who once were far away have been brought near
    by the blood of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'far off.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have become near' / 'were made near.'
    reason: lexical_alternative
  - marker: c
    text: Or 'through the blood of the Messiah.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'Christ'; translated here as 'Messiah' because Χριστός functions as
      a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now however
  - But as it is now
  lexicon: BDAG
  rationale: Captures the adversative-transition force of δέ with the temporal emphasis
    of νυνί, linking the verse to the prior state described in context.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a name-like fixed form, so the doctrinal
    default 'Messiah' is followed. 'In' preserves Paul's union/incorporation language
    rather than paraphrasing it.
- source_word: ὑμεῖς οἵ ποτε ὄντες
  chosen: you who once were
  alternatives:
  - you who formerly were
  - you, once being
  lexicon: BDAG
  rationale: This renders the pronoun plus relative clause naturally in English while
    preserving the past-state contrast signaled by ποτε and the participle ὄντες.
- source_word: μακρὰν
  chosen: far away
  alternatives:
  - far off
  - distant
  lexicon: BDAG
  rationale: Idiomatic English for the adverbial idea of distance, preserving both
    relational and covenantal exclusion without sounding archaic. 'Far off' is a strong
    traditional alternative worth preserving.
- source_word: ἐγενήθητε ἐγγὺς
  chosen: have been brought near
  alternatives:
  - became near
  - were made near
  lexicon: BDAG
  rationale: Although γίνομαι is literally 'become,' in this context English idiom
    favors a passive-result expression. 'Have been brought near' clearly conveys the
    transition into nearness and the implied divine agency without over-specifying
    it.
- source_word: ἐν τῷ αἵματι
  chosen: by the blood
  alternatives:
  - in the blood
  - through the blood
  lexicon: BDAG
  rationale: 'Here ἐν is rendered instrumentally to express means: nearness comes
    by means of Christ''s sacrificial death. ''Through the blood'' is also possible,
    but ''by the blood'' is concise and natural.'
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Again, Χριστός is treated as a title and translated 'Messiah' in keeping
    with project policy and the likely titular force in this theological context.
