theological_decisions:
- issue: Referent of ἐν αὐτῷ
  chosen_reading: 'The phrase refers to the cross: ''by it.'''
  alternative_readings:
  - 'The phrase refers to Christ: ''in him.'''
  rationale: The immediate antecedent is σταυροῦ, and the clause structure naturally
    links the slaying of hostility to the cross as the means. This reading also coheres
    with the preceding διὰ τοῦ σταυροῦ. However, because αὐτῷ is ambiguous and a Christ-reference
    is grammatically possible, the alternative is preserved in a footnote to maintain
    interpretive transparency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
