id: EPH.2.16
reference: Ephesians 2:16
source:
  edition: SBLGNT
  text: καὶ ἀποκαταλλάξῃ τοὺς ἀμφοτέρους ἐν ἑνὶ σώματι τῷ θεῷ διὰ τοῦ σταυροῦ ἀποκτείνας
    τὴν ἔχθραν ἐν αὐτῷ·
translation:
  text: and might reconcile both to God in one body through the cross, having put
    the hostility to death by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in him,' taking the pronoun to refer to Messiah rather than to the cross.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκαταλλάξῃ
  chosen: might reconcile
  alternatives:
  - might fully reconcile
  - might reconcile completely
  lexicon: BDAG
  rationale: Aorist active subjunctive governed by the preceding purpose construction,
    so English 'might reconcile' preserves the purposive force. The compound verb
    intensifies καταλλάσσω, but idiomatic English usually expresses this adequately
    with 'reconcile' unless emphasis on completeness is contextually necessary.
- source_word: τοὺς ἀμφοτέρους
  chosen: both
  alternatives:
  - the two
  - both groups
  lexicon: BDAG
  rationale: Refers back to the two parties in context, Jew and Gentile. 'Both' is
    concise and natural, while still preserving the dual reference. 'Both groups'
    is interpretive and therefore left as an alternative rather than placed in the
    main text.
- source_word: ἐν ἑνὶ σώματι
  chosen: in one body
  alternatives:
  - into one body
  - in one embodied community
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is most straightforwardly rendered
    'in.' 'One body' preserves Paul's ecclesial/corporate metaphor without overexplaining
    it. 'Into one body' is possible as a result nuance, but 'in one body' better matches
    the Greek form and Pauline idiom.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - with God
  lexicon: BDAG
  rationale: Dative complement after καταλλάσσω commonly marks the party to whom reconciliation
    is made. 'To God' is the most direct rendering here; 'with God' is possible in
    English but slightly more interpretive.
- source_word: διὰ τοῦ σταυροῦ
  chosen: through the cross
  alternatives:
  - by means of the cross
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrument. 'Through the cross'
    is both accurate and idiomatic, preserving the centrality of the crucifixion event
    without unnecessary expansion.
- source_word: ἀποκτείνας
  chosen: having put ... to death
  alternatives:
  - having killed
  - by killing
  lexicon: BDAG
  rationale: The participle is aorist active and antecedent or attendant to the main
    verbal idea. Because the object is abstract ('the hostility'), 'having put ...
    to death' is more natural English than 'having killed,' while still preserving
    the force of ἀποκτείνω. This also avoids flattening the vivid metaphor.
- source_word: τὴν ἔχθραν
  chosen: the hostility
  alternatives:
  - the enmity
  lexicon: BDAG
  rationale: ἔχθρα can mean hostility or enmity. 'Hostility' is more accessible modern
    English, in keeping with the translation philosophy, while retaining the relational
    and oppositional sense. 'Enmity' is preserved as a lexical alternative.
- source_word: ἐν αὐτῷ
  chosen: by it
  alternatives:
  - in him
  - in it
  lexicon: BDAG
  rationale: The pronoun αὐτῷ is grammatically masculine/neuter dative singular and
    is syntactically ambiguous. In context, the nearest and most natural antecedent
    is 'the cross,' yielding an instrumental sense, 'by it'/'in it.' Because some
    interpreters take the antecedent to be Christ ('in him'), that alternative is
    preserved in a footnote rather than resolved silently.
