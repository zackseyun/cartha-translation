theological_decisions:
- issue: Relation of 'the spirit now at work' to 'the ruler of the authority of the
    air'
  chosen_reading: 'Appositional: ''the spirit'' further describes the evil power associated
    with the ruler, rather than introducing a separate unrelated entity.'
  alternative_readings:
  - A second designation for Satan himself
  - An impersonal spiritual force under the ruler's control
  rationale: The Greek genitive chain and article structure naturally allow apposition.
    The English punctuation and phrasing preserve the connection without over-defining
    the ontology beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of υἱοῖς as 'sons'
  chosen_reading: Use 'sons of disobedience' in the main text.
  alternative_readings:
  - children of disobedience
  - those who are disobedient
  rationale: The source is grammatically masculine and idiomatic; the translation
    policy prefers gender-accurate renderings over neutralization, while a footnote
    can clarify the idiom's representative force.
  doctrine_reference: Gender-accurate over gender-neutral.
