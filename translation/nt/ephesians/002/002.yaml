id: EPH.2.2
reference: Ephesians 2:2
source:
  edition: SBLGNT
  text: ἐν αἷς ποτε περιεπατήσατε κατὰ τὸν αἰῶνα τοῦ κόσμου τούτου, κατὰ τὸν ἄρχοντα
    τῆς ἐξουσίας τοῦ ἀέρος, τοῦ πνεύματος τοῦ νῦν ἐνεργοῦντος ἐν τοῖς υἱοῖς τῆς ἀπειθείας·
translation:
  text: in which you once walked, according to the age of this world, according to
    the ruler of the authority of the air, the spirit now at work in the sons of disobedience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the course of this world.' The Greek uses 'age' (αἰών),
      emphasizing the present world's era or pattern.
    reason: lexical_alternative
  - marker: b
    text: '''The air'' reflects ancient cosmological language for the sphere associated
      with hostile spiritual powers.'
    reason: cultural_note
  - marker: c
    text: Or 'children of disobedience,' that is, people characterized by disobedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αἷς
  chosen: in which
  alternatives:
  - among which
  - in these things
  lexicon: BDAG
  rationale: Refers back to the preceding plural feminine nouns (trespasses and sins
    in v.1). 'In which' is the most natural English relative construction preserving
    the locative sense.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: Marks past manner of life succinctly and idiomatically.
- source_word: περιεπατήσατε
  chosen: walked
  alternatives:
  - lived
  - conducted yourselves
  lexicon: BDAG
  rationale: Pauline metaphor for manner of life; 'walked' preserves the metaphor
    and remains readable in English.
- source_word: κατὰ τὸν αἰῶνα τοῦ κόσμου τούτου
  chosen: according to the age of this world
  alternatives:
  - according to the course of this world
  - according to the ways of this world
  lexicon: BDAG
  rationale: αἰών here is more literally 'age' than 'world'; retaining 'age' preserves
    the temporal-cultural sense distinct from κόσμος ('world'). 'According to' reflects
    κατά as conformity or alignment.
- source_word: ἄρχοντα
  chosen: ruler
  alternatives:
  - prince
  - authority
  lexicon: BDAG
  rationale: '''Ruler'' is clear modern English and accurately conveys governing status
    without archaic tone. ''Prince'' is traditional but less transparent.'
- source_word: τῆς ἐξουσίας
  chosen: of the authority
  alternatives:
  - of the domain
  - of the power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority or delegated power. 'Authority' best
    preserves the noun's core sense here.
- source_word: τοῦ ἀέρος
  chosen: of the air
  alternatives:
  - of the lower heavens
  lexicon: BDAG
  rationale: A literal rendering is preferable; the phrase likely reflects an ancient
    cosmological sphere associated with hostile spiritual activity, which can be explained
    in a footnote rather than paraphrased in the text.
- source_word: τοῦ πνεύματος
  chosen: the spirit
  alternatives:
  - the Spirit
  - the spiritual power
  lexicon: BDAG
  rationale: Lowercase 'spirit' fits the context of an evil or hostile spiritual influence,
    not the Holy Spirit. The appositional relation to the preceding phrase is preserved.
- source_word: τοῦ νῦν ἐνεργοῦντος
  chosen: now at work
  alternatives:
  - now working
  - now operating
  - now active
  lexicon: BDAG
  rationale: Idiomatic English for present active participle ἐνεργοῦντος, preserving
    ongoing activity.
- source_word: ἐν τοῖς υἱοῖς τῆς ἀπειθείας
  chosen: in the sons of disobedience
  alternatives:
  - among the sons of disobedience
  - in the children of disobedience
  - in those who are disobedient
  lexicon: BDAG
  rationale: Retains the Semitic-style idiom and masculine noun 'sons' in keeping
    with the gender-accurate policy. 'Disobedience' is more literal than flattening
    to an adjectival paraphrase.
