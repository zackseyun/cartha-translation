theological_decisions:
- issue: Meaning of 'foundation of the apostles and prophets'
  chosen_reading: A deliberately broad genitive left untranslated beyond 'of the apostles
    and prophets,' allowing the phrase to denote the foundational role/witness associated
    with apostles and prophets without specifying whether they are the foundation
    personally or by their teaching.
  alternative_readings:
  - the foundation laid by the apostles and prophets
  - the foundation consisting of the apostles and prophets
  rationale: The Greek genitive permits more than one nuance. The translation preserves
    the metaphorical and ecclesiological tension rather than resolving it beyond what
    the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidance specifies translating Χριστός as 'Messiah' where
    title is in view, while preserving alternatives in a footnote when useful for
    readers familiar with traditional English renderings.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
