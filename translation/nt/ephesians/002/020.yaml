id: EPH.2.20
reference: Ephesians 2:20
source:
  edition: SBLGNT
  text: ἐποικοδομηθέντες ἐπὶ τῷ θεμελίῳ τῶν ἀποστόλων καὶ προφητῶν, ὄντος ἀκρογωνιαίου
    αὐτοῦ ⸂Χριστοῦ Ἰησοῦ⸃,
translation:
  text: having been built on the foundation of the apostles and prophets, Messiah
    Jesus himself being the cornerstone,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Of the apostles and prophets'' may mean the foundation associated with
      their witness, the foundation laid by them, or the foundation consisting in
      them; the Greek genitive does not specify more precisely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποικοδομηθέντες
  chosen: having been built
  alternatives:
  - having been built upon
  - being built upon
  lexicon: BDAG
  rationale: Aorist passive participle, nominative plural, referring to the readers
    as incorporated into God's building. 'Having been built' preserves the passive
    and participial connection to the surrounding sentence while remaining natural
    English.
- source_word: ἐπὶ
  chosen: 'on'
  alternatives:
  - upon
  lexicon: BDAG
  rationale: 'With the dative θεμελίῳ, the sense is locative/supportive: built on
    a foundation. ''On'' is idiomatic modern English; ''upon'' is possible but less
    natural.'
- source_word: θεμελίῳ
  chosen: foundation
  lexicon: BDAG
  rationale: Standard architectural metaphor; 'foundation' is the clear and conventional
    equivalent.
- source_word: τῶν ἀποστόλων καὶ προφητῶν
  chosen: of the apostles and prophets
  alternatives:
  - laid by the apostles and prophets
  - belonging to the apostles and prophets
  lexicon: BDAG
  rationale: The genitive is best left formally as 'of the apostles and prophets.'
    It may denote the foundation consisting in or associated with apostolic and prophetic
    witness/persons. Rendering it more specifically as 'laid by' would over-interpret
    the genitive.
- source_word: ὄντος
  chosen: being
  alternatives:
  - while ... is
  - with ... as
  lexicon: BDAG
  rationale: Genitive absolute introducing the relation of Messiah Jesus to the foundation/building
    image. 'Being' preserves the participial force without adding interpretive structure.
- source_word: ἀκρογωνιαίου
  chosen: cornerstone
  alternatives:
  - chief cornerstone
  - capstone
  lexicon: BDAG
  rationale: The term denotes a cornerstone in the building metaphor. 'Capstone' is
    less likely here; 'chief cornerstone' is traditional but adds emphasis not explicit
    in the adjective alone.
- source_word: αὐτοῦ
  chosen: himself
  alternatives:
  - itself
  lexicon: BDAG
  rationale: 'The pronoun agrees with Χριστοῦ Ἰησοῦ and is naturally rendered emphatically
    as ''himself'': ''Messiah Jesus himself being the cornerstone.'' This avoids an
    impersonal reading.'
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name-like form. Here the titular sense remains clear
    in a theological/building metaphor context, so 'Messiah Jesus' best preserves
    meaning.
