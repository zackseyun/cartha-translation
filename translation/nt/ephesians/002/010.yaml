id: EPH.2.10
reference: Ephesians 2:10
source:
  edition: SBLGNT
  text: αὐτοῦ γάρ ἐσμεν ποίημα, κτισθέντες ἐν Χριστῷ Ἰησοῦ ἐπὶ ἔργοις ἀγαθοῖς οἷς
    προητοίμασεν ὁ θεὸς ἵνα ἐν αὐτοῖς περιπατήσωμεν.
translation:
  text: For we are his workmanship, created in Messiah Jesus for good works, which
    God prepared beforehand so that we might walk in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here
      to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Paul's 'walk' language refers to one's manner of life or conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίημα
  chosen: workmanship
  alternatives:
  - handiwork
  - work
  lexicon: BDAG
  rationale: Conveys something made or crafted by God, preserving the concrete sense
    of God's product or handiwork without sounding overly mechanical. 'Workmanship'
    is established and natural here.
- source_word: κτισθέντες
  chosen: created
  alternatives:
  - having been created
  - made
  lexicon: BDAG
  rationale: The aorist passive participle from κτίζω is best represented by 'created.'
    English smoothness favors an adjectival/participial sense linked to 'we are his
    workmanship.' 'Having been created' is more formally precise but less readable.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like element. Here the phrase retains clear titular
    force, so 'Messiah Jesus' preserves meaning better than inherited tradition 'Christ
    Jesus.'
- source_word: ἐπὶ ἔργοις ἀγαθοῖς
  chosen: for good works
  alternatives:
  - for good deeds
  - for good works
  lexicon: BDAG
  rationale: 'With ἐπί plus the dative here, the sense is purpose or result: created
    with a view to good works. ''For good works'' is idiomatic and preserves the ethical
    emphasis of ἔργα without overinterpreting.'
- source_word: οἷς
  chosen: which
  alternatives:
  - that
  - in which
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'good works.' 'Which' is the most
    natural English connector before the following clause about God's prior preparation.
- source_word: προητοίμασεν
  chosen: prepared beforehand
  alternatives:
  - prepared in advance
  lexicon: BDAG
  rationale: The προ- prefix is significant and should be represented. 'Prepared beforehand'
    is transparent and preserves the temporal nuance without importing a fuller doctrinal
    system.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is readable modern English and adequately
    reflects the telic force.
- source_word: ἐν αὐτοῖς περιπατήσωμεν
  chosen: we might walk in them
  alternatives:
  - we should walk in them
  - we might live in them
  lexicon: BDAG
  rationale: περιπατέω is literally 'walk' and often metaphorically means conduct
    one's life. Retaining 'walk' preserves Pauline idiom and allows readers to sense
    the metaphor. 'In them' naturally refers to the good works as the sphere or pattern
    of life.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Maintains the explanatory connection to the preceding context, especially
    the statement about salvation by grace through faith, without overtranslating
    the discourse relation.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: Idiomatic English possessive referring to God. 'Of him' would be wooden.
