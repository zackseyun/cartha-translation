theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    title is in view. In this verse the phrase still carries theological meaning tied
    to incorporation into the anointed one, so the title is translated rather than
    merely transliterated.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Relation of divine preparation to human conduct
  chosen_reading: which God prepared beforehand so that we might walk in them
  alternative_readings:
  - which God prepared beforehand that we should do them
  - which God prepared beforehand for us to walk in
  rationale: The wording preserves both divine initiative and the purpose of human
    obedience without resolving broader debates about predestination, monergism, or
    synergism beyond what the Greek states. The text says God prepared the good works
    beforehand with the purpose that believers walk in them.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
