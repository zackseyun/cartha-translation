id: EPH.2.12
reference: Ephesians 2:12
source:
  edition: SBLGNT
  text: ὅτι ⸀ἦτε τῷ καιρῷ ἐκείνῳ χωρὶς Χριστοῦ, ἀπηλλοτριωμένοι τῆς πολιτείας τοῦ
    Ἰσραὴλ καὶ ξένοι τῶν διαθηκῶν τῆς ἐπαγγελίας, ἐλπίδα μὴ ἔχοντες καὶ ἄθεοι ἐν τῷ
    κόσμῳ.
translation:
  text: that at that time you were without the Messiah, alienated from the commonwealth
    of Israel and strangers to the covenants of the promise, having no hope and without
    God in the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without Christ.' The Greek title Χριστός can be rendered either way;
      here 'Messiah' preserves the title's meaning in its Jewish-covenantal context.
    reason: alternative_reading
  - marker: b
    text: Or 'the covenants of promise.'
    reason: lexical_alternative
  - marker: c
    text: Or 'godless.' The phrase may denote being without the true God rather than
      philosophical atheism.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς Χριστοῦ
  chosen: without the Messiah
  alternatives:
  - without Christ
  lexicon: BDAG
  rationale: Χριστοῦ is a titular use rather than a name-like use in this context,
    describing the Gentiles' former condition apart from Israel's anointed deliverer.
    Per doctrine, Χριστός is rendered 'Messiah' where title is in view.
- source_word: ἀπηλλοτριωμένοι
  chosen: alienated
  alternatives:
  - excluded
  - estranged
  lexicon: BDAG
  rationale: The perfect/passive participle conveys a state of being estranged or
    cut off. 'Alienated' preserves both the relational and civic sense and fits the
    following genitive phrase.
- source_word: πολιτείας
  chosen: commonwealth
  alternatives:
  - citizenship
  - state
  - community
  lexicon: BDAG
  rationale: πολιτεία here refers to the corporate civic identity/order belonging
    to Israel rather than merely individual legal status. 'Commonwealth' best captures
    the collective-political nuance in readable English.
- source_word: ξένοι
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: BDAG
  rationale: In parallel with 'alienated,' ξένοι denotes those outside a covenantal/social
    sphere. 'Strangers' is idiomatic and avoids overloading 'aliens' after 'alienated'.
- source_word: διαθηκῶν τῆς ἐπαγγελίας
  chosen: the covenants of the promise
  alternatives:
  - the covenants of promise
  - the covenant promises
  lexicon: BDAG
  rationale: The plural διαθηκῶν should be preserved. The singular ἐπαγγελίας is best
    taken as a genitive specifying the promise associated with those covenants. 'Of
    the promise' is slightly more explicit in modern English while remaining close
    to the Greek.
- source_word: ἐλπίδα μὴ ἔχοντες
  chosen: having no hope
  alternatives:
  - not having hope
  - without hope
  lexicon: BDAG
  rationale: The participial phrase is naturally rendered as a circumstantial description
    of their former state. 'Having no hope' preserves the participial flow into the
    final clause.
- source_word: ἄθεοι
  chosen: without God
  alternatives:
  - godless
  - atheists
  lexicon: BDAG
  rationale: Although ἄθεοι can mean 'godless' or even 'atheistic,' in this context
    Paul describes exclusion from the true God rather than a philosophical denial
    of deity. 'Without God' best conveys deprivation rather than modern ideological
    atheism.
- source_word: ἐν τῷ κόσμῳ
  chosen: in the world
  alternatives:
  - in the present world
  lexicon: BDAG
  rationale: κόσμος here is the world as the sphere of human existence. The simple
    rendering is sufficient and idiomatic.
- source_word: ὅτι ... ἦτε
  chosen: that ... you were
  alternatives:
  - that ... you once were
  lexicon: BDAG
  rationale: The clause depends on the previous exhortation to remember. English can
    retain 'that' and the imperfect 'you were' without adding 'once,' since 'at that
    time' already marks the past condition.
