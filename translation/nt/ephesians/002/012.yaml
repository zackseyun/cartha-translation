- issue: Rendering Χριστός in Pauline discourse
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated 'Messiah' where
    title is in view. Here the sense is not merely a proper name but the Jewish messianic
    figure from whom Gentiles were formerly separated.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Rendering ἄθεοι
