  - atheists
  rationale: 'This avoids importing a modern philosophical category and preserves
    Paul''s covenantal/theological point: the Gentiles were outside relationship with
    the true God.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
