theological_decisions:
- issue: Union-with-Christ language in the compound verbs
  chosen_reading: Explicitly render the συν- prefix with 'with him' in both verbs.
  alternative_readings:
  - 'Leave the association implicit: ''raised us up and seated us'''
  rationale: Paul's wording emphasizes believers' participation with Christ in resurrection
    and exaltation. Making 'with him' explicit reflects the Greek compounds and preserves
    the theological force without adding content beyond what the verbs encode.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine guidance directs translating Christological titles where
    context supports it. In this phrase, the titular sense remains intelligible and
    the rendering preserves the messianic meaning of Χριστός.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
