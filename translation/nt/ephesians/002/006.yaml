id: EPH.2.6
reference: Ephesians 2:6
source:
  edition: SBLGNT
  text: καὶ συνήγειρεν καὶ συνεκάθισεν ἐν τοῖς ἐπουρανίοις ἐν Χριστῷ Ἰησοῦ,
translation:
  text: and raised us up with him and seated us with him in the heavenly realms in
    Messiah Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Christ Jesus.”
    reason: alternative_reading
  - marker: b
    text: Or “in the heavenly places.”
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγειρεν
  chosen: raised us up with him
  alternatives:
  - raised us together
  - co-raised us
  lexicon: BDAG
  rationale: The συν- prefix indicates shared participation with Christ in the action.
    English requires the object 'us' from the broader sentence context, and 'with
    him' makes the associative force explicit and natural.
- source_word: συνεκάθισεν
  chosen: seated us with him
  alternatives:
  - made us sit with him
  - enthroned us with him
  lexicon: BDAG
  rationale: The verb means to seat together with. 'Seated us with him' is idiomatic
    and preserves the union-with-Christ sense without overinterpreting it as enthronement,
    though that idea may be implied contextually.
- source_word: ἐν τοῖς ἐπουρανίοις
  chosen: in the heavenly realms
  alternatives:
  - in the heavenlies
  - in the heavenly places
  lexicon: BDAG
  rationale: This Ephesian expression refers to the heavenly sphere. 'Heavenly realms'
    is clear modern English and preserves the locative sense better for contemporary
    readers than the more literal but less natural 'heavenlies.' 'Heavenly places'
    is possible, but 'realms' better captures the sphere/domain nuance.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions
    as a title. Here the phrase retains clear titular force rather than operating
    merely as a fixed proper name, so 'Messiah Jesus' best preserves meaning.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: The repeated conjunction coordinates the divine actions in a cumulative
    sequence and is best preserved straightforwardly.
