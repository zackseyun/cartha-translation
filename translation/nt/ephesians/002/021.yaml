id: EPH.2.21
reference: Ephesians 2:21
source:
  edition: SBLGNT
  text: ἐν ᾧ ⸀πᾶσα οἰκοδομὴ συναρμολογουμένη αὔξει εἰς ναὸν ἅγιον ἐν κυρίῳ,
translation:
  text: in whom the whole building, being fitted together, grows into a holy temple
    in the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "every building." The Greek phrase can be read either distributively
      or corporately; the main text follows the unified temple imagery of the context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative pronoun is masculine/neuter dative singular and refers back
    most naturally to Christ in the preceding context (v. 20, 'Messiah Jesus himself').
    Because the antecedent is personal, 'in whom' is preferred over 'in which.'
- source_word: πᾶσα οἰκοδομὴ
  chosen: the whole building
  alternatives:
  - every building
  - the whole structure
  lexicon: BDAG
  rationale: Grammatically, πᾶσα with an anarthrous singular noun can mean either
    'every' or 'the whole.' In context Paul is describing the unified people of God
    as one temple, so 'the whole building' best fits the singular corporate image.
    The alternative 'every building' is preserved in a footnote because it is a live
    interpretive option.
- source_word: συναρμολογουμένη
  chosen: being fitted together
  alternatives:
  - being joined together
  - being closely fitted together
  lexicon: BDAG
  rationale: The present passive participle conveys an ongoing process of parts being
    joined into a coherent whole. 'Being fitted together' is natural English and preserves
    the architectural metaphor.
- source_word: αὔξει
  chosen: grows
  alternatives:
  - is growing
  - increases
  lexicon: BDAG
  rationale: The present active indicative expresses ongoing development. 'Grows'
    is concise and idiomatic in English while preserving the metaphor of organic growth
    applied to the building image.
- source_word: εἰς
  chosen: into
  alternatives:
  - to become
  - unto
  lexicon: BDAG
  rationale: 'Here εἰς marks result or goal: the building grows so as to become a
    temple. ''Into'' preserves the directional/resultative force without paraphrase.'
- source_word: ναὸν ἅγιον
  chosen: a holy temple
  alternatives:
  - a sacred sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple sanctuary rather than the broader
    temple complex. 'Temple' is the clearest natural rendering, and 'holy' preserves
    ἅγιον directly.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for Kyrios. The phrase
    likely expresses sphere or union; 'in the Lord' preserves Paul's wording and theological
    breadth without over-interpreting.
