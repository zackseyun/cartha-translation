theological_decisions:
- issue: Whether the antecedent of ᾧ is Christ personally or the cornerstone/building
    image more abstractly
  chosen_reading: personal reference to Christ ('in whom')
  alternative_readings:
  - impersonal reference ('in which')
  rationale: The immediate antecedent in v. 20 is 'Messiah Jesus himself' as cornerstone,
    and Paul's repeated 'in him/in whom' language in this context favors a personal
    Christological reference. This preserves the theological emphasis that the temple's
    growth occurs in relation to the Lord Jesus.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Lord'
- issue: Whether πᾶσα οἰκοδομὴ should be read distributively ('every building') or
    corporately ('the whole building')
  chosen_reading: corporate/unified sense ('the whole building')
  alternative_readings:
  - distributive sense ('every building')
  rationale: The broader context stresses one new humanity and one temple made from
    Jews and Gentiles together (2:14–22). Rendering the phrase corporately best preserves
    that theological and literary unity, while the distributive option is retained
    in a footnote because the Greek form allows it.
  doctrine_reference: Translation philosophy §3, §5
