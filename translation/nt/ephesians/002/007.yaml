- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    title is still semantically active. In this Pauline formula, the title remains
    meaningful rather than merely a surname-like label, so 'Messiah Jesus' was chosen.
