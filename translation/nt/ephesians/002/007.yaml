id: EPH.2.7
reference: Ephesians 2:7
source:
  edition: SBLGNT
  text: ἵνα ἐνδείξηται ἐν τοῖς αἰῶσιν τοῖς ἐπερχομένοις ⸂τὸ ὑπερβάλλον πλοῦτος⸃ τῆς
    χάριτος αὐτοῦ ἐν χρηστότητι ἐφ’ ἡμᾶς ἐν Χριστῷ Ἰησοῦ.
translation:
  text: so that in the coming ages he might display the surpassing riches of his grace
    in kindness toward us in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the ages to come.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the immeasurable riches of his grace.'
    reason: lexical_alternative
  - marker: c
    text: 'Greek: ''in Christ Jesus''; translated ''in Messiah Jesus'' because Χριστός
      is treated here as a title.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result flowing from the preceding context. 'So that' is
    natural modern English and preserves the clause's telic force.
- source_word: ἐνδείξηται
  chosen: he might display
  alternatives:
  - he might show
  - he might demonstrate
  lexicon: BDAG
  rationale: Aorist middle subjunctive after ἵνα. 'Display' captures the public, evidential
    sense of ἐνδείκνυμι without sounding overly technical.
- source_word: ἐν τοῖς αἰῶσιν τοῖς ἐπερχομένοις
  chosen: in the coming ages
  alternatives:
  - in the ages to come
  - in the coming eras
  lexicon: BDAG
  rationale: αἰῶσιν is best rendered 'ages' here, and τοῖς ἐπερχομένοις specifies
    those that are coming. 'Coming ages' is concise and idiomatic while preserving
    the plural.
- source_word: τὸ ὑπερβάλλον πλοῦτος
  chosen: the surpassing riches
  alternatives:
  - the immeasurable riches
  - the extraordinary wealth
  lexicon: BDAG
  rationale: ὑπερβάλλον literally conveys exceeding/surpassing quality. 'Surpassing
    riches' stays close to the Greek while remaining readable. 'Wealth' would be less
    idiomatic in this collocation.
- source_word: τῆς χάριτος αὐτοῦ
  chosen: of his grace
  alternatives:
  - of his favor
  lexicon: BDAG
  rationale: χάρις in Pauline usage centrally denotes divine grace; 'favor' is too
    narrow here and loses established theological force.
- source_word: ἐν χρηστότητι
  chosen: in kindness
  alternatives:
  - in goodness
  - by kindness
  lexicon: BDAG
  rationale: χρηστότης denotes kindness, benevolence, generosity of disposition. 'In
    kindness' preserves the prepositional structure and links this kindness as the
    manner/sphere in which grace is shown.
- source_word: ἐφ’ ἡμᾶς
  chosen: toward us
  alternatives:
  - to us
  - upon us
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates direction toward or upon. 'Toward
    us' reads naturally and conveys beneficent orientation.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title. Here the phrase retains clear titular force, and 'in Messiah Jesus' preserves
    Paul's union-with-the-Messiah language.
