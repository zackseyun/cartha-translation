id: EPH.2.14
reference: Ephesians 2:14
source:
  edition: SBLGNT
  text: αὐτὸς γάρ ἐστιν ἡ εἰρήνη ἡμῶν, ὁ ποιήσας τὰ ἀμφότερα ἓν καὶ τὸ μεσότοιχον
    τοῦ φραγμοῦ λύσας, τὴν ἔχθραν ἐν τῇ σαρκὶ αὐτοῦ,
translation:
  text: For he himself is our peace, who made both one and broke down the dividing
    wall of the barrier—the hostility—in his flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two'; the phrase refers to Jews and Gentiles in the immediate context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the middle wall of partition.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'in his flesh'; that is, through his embodied death, not by removing
      his humanity.
    reason: lexical_alternative
  - marker: d
    text: Or 'the hostility in his flesh,'.
    reason: previous_rendering
lexical_decisions:
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The intensive pronoun is emphatic; 'he himself' preserves the stress
    that Christ personally is the source of peace, not merely an agent of it.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: A straightforward connective introducing the ground for the previous
    statement; 'For' preserves the discourse link without overinterpreting.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering; here it denotes reconciliatory peace embodied and
    effected by Christ.
- source_word: ὁ ποιήσας
  chosen: who made
  alternatives:
  - having made
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered in English as a relative
    clause for readability while preserving the action attributed to Christ.
- source_word: τὰ ἀμφότερα
  chosen: both groups
  alternatives:
  - both
  - the two
  lexicon: BDAG
  rationale: In context Paul refers to Jews and Gentiles; 'both groups' makes explicit
    the plural referent while staying close to the contextual sense.
- source_word: ἓν
  chosen: one
  alternatives:
  - into one
  lexicon: BDAG
  rationale: The predicate accusative/adjectival use is concise in Greek; 'one' preserves
    the result of unity. 'Into one' is possible but less natural here in English.
- source_word: μεσότοιχον
  chosen: dividing wall
  alternatives:
  - middle wall
  - partition wall
  lexicon: BDAG
  rationale: The term denotes a wall separating spaces; 'dividing wall' communicates
    both the literal image and its metaphorical force.
- source_word: τοῦ φραγμοῦ
  chosen: of the barrier
  alternatives:
  - of the fence
  - of partition
  lexicon: BDAG
  rationale: The genitive further characterizes the wall as a barrier/partition. 'Barrier'
    is idiomatic modern English and preserves the obstructive sense.
- source_word: λύσας
  chosen: broke down
  alternatives:
  - destroyed
  - loosed
  lexicon: BDAG
  rationale: In context of a wall, 'broke down' is the most natural English expression
    for dismantling/removing the obstacle.
- source_word: ἔχθραν
  chosen: the hostility
  alternatives:
  - enmity
  lexicon: BDAG
  rationale: '''Hostility'' is clear modern English and captures relational opposition.
    ''Enmity'' is more traditional but less accessible.'
- source_word: ἐν τῇ σαρκὶ αὐτοῦ
  chosen: in his flesh
  alternatives:
  - by his flesh
  - in his body
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, σάρξ should be rendered 'flesh'
    in literal contexts. Here it refers to Christ's embodied, sacrificial death rather
    than 'sinful nature,' so 'in his flesh' is preferred.
