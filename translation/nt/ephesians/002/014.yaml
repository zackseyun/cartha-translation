theological_decisions:
- issue: Referent of 'both'
  chosen_reading: '''both groups'' refers to Jews and Gentiles'
  alternative_readings:
  - '''both'' left implicit without specifying groups'
  rationale: The immediate context in Ephesians 2 contrasts Gentiles and Israel/Jews.
    Making the referent explicit in English aids clarity without importing a foreign
    concept.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of σάρξ
  chosen_reading: literal 'flesh' rather than interpretive 'body' or metaphorical
    'sinful nature'
  alternative_readings:
  - body
  - sinful nature
  rationale: The doctrine table specifies 'flesh' for literal uses and 'sinful nature'
    only for metaphorical contexts. Here the phrase points to Christ's incarnate bodily
    death, so 'flesh' preserves both lexical form and theological concreteness.
  doctrine_reference: 'Contested terms table: σάρξ'
- issue: Relation of 'the hostility' to the clause
  chosen_reading: 'appositional/explanatory dash: the dividing wall of the barrier—namely,
    the hostility'
  alternative_readings:
  - attach 'the hostility' to the next verse
  - 'render as separate object: ''and put hostility to death'''
  rationale: In the Greek text of this verse, τὴν ἔχθραν stands in apposition/explanation
    to the barrier just mentioned, though the thought continues into v.15. The dash
    preserves the unfinished flow without forcing a full stop or importing wording
    from the next verse.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/002/014.json
  category: awkward_english
  tier: 1
  from: the hostility in his flesh,
  to: the hostility—in his flesh,
  rationale: The current rendering links "in his flesh" directly to "hostility," creating
    the potentially misleading phrase "the hostility in his flesh." The hostility
    was between Jews and Gentiles, not located within Christ's body. The phrase "in
    his flesh" (ἐν τῇ σαρκὶ αὐτοῦ) modifies the verbal action of breaking down the
    wall (λύσας). Using a second em-dash to set off the appositive ("—the hostility—")
    clarifies that "in his flesh" modifies the main verb, resolving the syntactic
    ambiguity and potential for theological misreading.
