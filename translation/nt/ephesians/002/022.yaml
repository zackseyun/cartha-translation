id: EPH.2.22
reference: Ephesians 2:22
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ ὑμεῖς συνοικοδομεῖσθε εἰς κατοικητήριον τοῦ θεοῦ ἐν πνεύματι.
translation:
  text: in whom you also are being built together into a dwelling place for God in
    the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which,' if the relative is taken to refer to the whole building rather
      than directly to Messiah.
    reason: alternative_reading
  - marker: b
    text: Or 'in spirit' or 'by the Spirit.' The phrase may denote the sphere of God's
      dwelling or the Holy Spirit's agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative pronoun is masculine/neuter dative singular and refers back
    most naturally to the immediately preceding προσωπικό referent, Christ ('the cornerstone'
    in v. 20, 'in whom' in v. 21). Given the personal antecedent in the flow of the
    sentence, 'in whom' is preferred over 'in which.'
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: καί here adds the Gentile believers addressed by 'you' to the larger
    building imagery already applied to the whole people of God. 'Also' conveys the
    additive force naturally in English.
- source_word: ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural pronoun, explicitly present for emphasis. English
    'you' preserves the direct address; plurality is understood from context.
- source_word: συνοικοδομεῖσθε
  chosen: are being built together
  alternatives:
  - are built together
  - are being built up together
  lexicon: BDAG
  rationale: Present passive indicative, second person plural. The present tense suggests
    ongoing action, so 'are being built together' best preserves the progressive sense.
    The σύν prefix is reflected by 'together.' 'Built up' is possible but adds a nuance
    not required by the immediate temple-building metaphor.
- source_word: εἰς
  chosen: into
  alternatives:
  - for
  - as
  lexicon: BDAG
  rationale: 'εἰς marks result or goal: the believers are being built together so
    as to become something. ''Into'' best captures movement toward the resulting state.'
- source_word: κατοικητήριον
  chosen: a dwelling place
  alternatives:
  - a habitation
  - a dwelling
  lexicon: BDAG
  rationale: The noun denotes a place of dwelling or habitation. 'Dwelling place'
    is clear modern English and preserves the concrete temple imagery without sounding
    archaic.
- source_word: τοῦ θεοῦ
  chosen: for God
  alternatives:
  - of God
  - belonging to God
  lexicon: BDAG
  rationale: 'The genitive can be rendered woodenly as ''of God,'' but in English
    with κατοικητήριον the idiomatic sense is destination/occupancy: a dwelling place
    for God. This communicates that God is the one who dwells there.'
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  - by the Spirit
  lexicon: BDAG
  rationale: Given Pauline usage and the temple/church context, πνεύματι is best taken
    as the Holy Spirit rather than the human spirit or a merely spiritual manner.
    The article is absent in Greek, but English commonly uses 'the Spirit' for the
    personal divine referent. 'In' is retained rather than 'by' to preserve the preposition
    and the sphere/instrument overlap without over-resolving it.
