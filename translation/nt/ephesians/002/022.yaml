theological_decisions:
- issue: Referent of ἐν ᾧ
  chosen_reading: The phrase refers to Christ, yielding 'in whom.'
  alternative_readings:
  - The phrase refers more generally to the whole building/structure, yielding 'in
    which.'
  rationale: The immediate context repeatedly centers the building's coherence in
    Christ (vv. 20–21), and the masculine relative naturally fits that antecedent.
    This preserves Paul's christological focus without importing extra doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    the source is genuinely ambiguous; here the contextual reading favors Christ.
- issue: Sense of ἐν πνεύματι
  chosen_reading: 'Reference to the Holy Spirit: ''in the Spirit.'''
  alternative_readings:
  - locative/manner sense 'in spirit'
  - instrumental nuance 'by the Spirit'
  rationale: In Ephesians, temple and indwelling language strongly aligns with the
    Holy Spirit's agency/presence. The translation keeps 'in' to avoid collapsing
    the phrase into a purely instrumental paraphrase, while capitalizing 'Spirit'
    to reflect the most likely referent.
  doctrine_reference: Within historic orthodoxy, avoid importing claims the text does
    not make; capitalization reflects probable referent from context, not sectarian
    distinctives.
