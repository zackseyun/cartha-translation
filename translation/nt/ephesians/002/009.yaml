id: EPH.2.9
reference: Ephesians 2:9
source:
  edition: SBLGNT
  text: οὐκ ἐξ ἔργων, ἵνα μή τις καυχήσηται.
translation:
  text: not from works, so that no one may boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of works.' The phrase denotes source/origin; some interpreters understand
      an instrumental nuance ('by works'), but the Greek wording is more literally
      'from works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ
  chosen: not
  alternatives:
  - not ... from
  lexicon: BDAG
  rationale: Standard negation; in English it naturally scopes over the prepositional
    phrase with ἐξ.
- source_word: ἐξ
  chosen: from
  alternatives:
  - out of
  - by
  lexicon: BDAG
  rationale: ἐκ/ἐξ commonly denotes source or origin. 'From' is the most natural English
    rendering here and fits Paul's contrast with grace/faith in the surrounding context
    without overinterpreting instrumentality.
- source_word: ἔργων
  chosen: works
  alternatives:
  - deeds
  - works of the law
  lexicon: BDAG
  rationale: ἔργον here is best rendered 'works.' 'Deeds' is possible but less idiomatic
    in this Pauline formulation. 'Works of the law' would import wording not present
    in the text.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - lest
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the clause's force without sounding overly formal.
- source_word: μή τις
  chosen: no one
  alternatives:
  - no person
  - no man
  - anyone ... not
  lexicon: BDAG
  rationale: 'The combination after ἵνα expresses a negative purpose: ''so that no
    one...'' ''No one'' is idiomatic and accurately conveys the indefinite singular
    without unnecessary gendering.'
- source_word: καυχήσηται
  chosen: may boast
  alternatives:
  - might boast
  - may take pride
  lexicon: BDAG
  rationale: Aorist middle subjunctive of καυχάομαι after ἵνα. 'May boast' preserves
    the subjunctive nuance in natural English. 'Take pride' is weaker and less direct
    than Paul's recurring language of boasting.
