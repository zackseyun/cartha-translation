theological_decisions:
- issue: Meaning of 'works' in Paul's statement
  chosen_reading: Retain the broad phrase 'works' without narrowing it in translation.
  alternative_readings:
  - works of the law
  - human effort
  - good works
  rationale: The Greek text says only 'works.' Narrowing it to Mosaic law-works or
    broadening it to all human effort would move from translation into interpretation.
    The surrounding context can inform exegesis, but the verse itself should preserve
    Paul's concise wording.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
