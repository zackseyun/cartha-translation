theological_decisions:
- issue: Identity of 'those far away' and 'those who were near'
  chosen_reading: Render the phrases literally without importing the interpretation
    into the main text.
  alternative_readings:
  - '''you Gentiles who were far away'' and ''the Jews who were near'''
  rationale: In the immediate context Paul clearly has Gentiles and Jews in view (cf.
    Eph 2:11-13, 19), but the verse itself uses the metaphorical categories 'far'
    and 'near.' Keeping the literal wording preserves Paul's rhetoric and allows the
    contextual identification to remain interpretive rather than inserted into the
    translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
