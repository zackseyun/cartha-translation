id: EPH.2.17
reference: Ephesians 2:17
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν εὐηγγελίσατο εἰρήνην ὑμῖν τοῖς μακρὰν καὶ ⸀εἰρήνην τοῖς ἐγγύς·
translation:
  text: And he came and proclaimed peace to you who were far away, and peace to those
    who were near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, peace was proclaimed to those formerly far off and to those near—contextually,
      Gentiles and Jews respectively (see Eph 2:11–13).
    reason: cross_reference
  - marker: b
    text: Or 'preached good news of peace.' The Greek verb often means 'announce good
      news,' but here its object is simply 'peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: he came
  alternatives:
  - having come
  - when he came
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/preparatory action. 'He came'
    is natural English and preserves the movement imagery without over-literal participial
    awkwardness.
- source_word: εὐηγγελίσατο
  chosen: proclaimed
  alternatives:
  - preached the good news
  - announced good news
  lexicon: BDAG
  rationale: The verb means to bring or announce good news. Because the direct object
    here is 'peace' rather than an explicit 'gospel,' 'proclaimed' best fits idiomatic
    English while retaining the heraldic sense. 'Preached the good news of peace'
    would add words not present in the Greek.
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering of εἰρήνη. In context it carries reconciliation/shalom
    overtones, but 'peace' is the most direct and sufficiently rich English equivalent.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to you.' It directly addresses
    the Gentile readers in the immediate context.
- source_word: τοῖς μακρὰν
  chosen: who were far away
  alternatives:
  - those far off
  - the ones far away
  lexicon: BDAG
  rationale: Idiomatic rendering of the substantival expression. 'Far away' communicates
    both spatial metaphor and covenantal distance; adding 'were' makes smooth English
    and reflects the contextual contrast with prior alienation.
- source_word: τοῖς ἐγγύς
  chosen: those who were near
  alternatives:
  - those near
  - the ones who were near
  lexicon: BDAG
  rationale: Substantival dative parallel to 'those far away.' 'Those who were near'
    preserves the contrast and reads naturally in English.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated conjunction marks two coordinated groups receiving the same
    proclamation. Simple repetition best mirrors the Greek structure.
