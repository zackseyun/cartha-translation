id: EPH.2.4
reference: Ephesians 2:4
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς πλούσιος ὢν ἐν ἐλέει, διὰ τὴν πολλὴν ἀγάπην αὐτοῦ ἣν ἠγάπησεν ἡμᾶς,
translation:
  text: But God, being rich in mercy, because of his great love with which he loved
    us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mercy.' The Greek expression is literally 'rich in mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding description of humanity's
    deadness and wrath; 'But' best preserves the adversative force in natural English.
- source_word: πλούσιος ὢν
  chosen: being rich
  alternatives:
  - who is rich
  - rich as he is
  lexicon: BDAG
  rationale: The participial construction is causal/descriptive and naturally rendered
    'being rich,' preserving both the adjectival idea of abundance and the participial
    linkage to the following clause.
- source_word: ἐν ἐλέει
  chosen: in mercy
  alternatives:
  - with mercy
  - in compassion
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the idiom of abundance in the
    sphere of mercy. 'Mercy' is the standard gloss for ἔλεος and fits Pauline usage.
- source_word: διὰ
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: BDAG
  rationale: With the accusative, διά here expresses reason or cause. 'Because of'
    is clear modern English and preserves the causal sense.
- source_word: πολλὴν ἀγάπην
  chosen: great love
  alternatives:
  - much love
  - abundant love
  lexicon: BDAG
  rationale: Although πολύς is literally 'much/many,' idiomatic English with an abstract
    noun prefers 'great love.' This also preserves the weight of the expression without
    paraphrase.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Charity' is archaic
    and does not fit modern readable English.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - the love of him
  lexicon: BDAG
  rationale: Standard possessive rendering in English; the pronoun clearly refers
    to God.
- source_word: ἣν ἠγάπησεν ἡμᾶς
  chosen: with which he loved us
  alternatives:
  - that he had for us
  - by which he loved us
  lexicon: BDAG
  rationale: Preserves the relative clause and the cognate repetition between ἀγάπην
    and ἠγάπησεν. The slightly formal English is justified because Paul intentionally
    repeats the love-root for emphasis.
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - showed love to
  lexicon: BDAG
  rationale: Direct verbal cognate with ἀγάπη should be maintained for transparency
    and rhetorical force.
