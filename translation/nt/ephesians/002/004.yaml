theological_decisions:
- issue: Retention of the cognate expression 'love ... loved'
  chosen_reading: 'Preserve the repetition: ''his great love with which he loved us'''
  alternative_readings:
  - his great love for us
  - the great love he showed us
  rationale: The Greek intentionally uses a cognate noun-verb pairing (ἀγάπην ...
    ἠγάπησεν). Smoother English alternatives reduce redundancy but also mute Paul's
    emphatic style. Preserving the repetition maintains transparency to the source
    without importing doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Relation of mercy and love in the clause
  chosen_reading: 'Render both as distinct but related grounds: ''being rich in mercy,
    because of his great love'''
  alternative_readings:
  - collapse into a single idea such as 'because of his merciful love'
  rationale: The Greek presents mercy and love as coordinated but not identical concepts.
    Keeping both terms distinct preserves the theological texture of the verse and
    avoids interpretive compression.
  doctrine_reference: Translation philosophy §§1, 3
