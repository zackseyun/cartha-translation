id: EPH.5.32
reference: Ephesians 5:32
source:
  edition: SBLGNT
  text: τὸ μυστήριον τοῦτο μέγα ἐστίν, ἐγὼ δὲ λέγω εἰς Χριστὸν καὶ εἰς τὴν ἐκκλησίαν.
translation:
  text: This mystery is great, but I am speaking with reference to the Messiah and the church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This mystery is profound.' The Greek more literally says 'great,' which may denote greatness or significance rather than merely depth.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title in this context.
    reason: alternative_reading
  - marker: c
    text: Or 'with reference to the Messiah and to the church'.
    reason: previous_rendering
lexical_decisions:
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  - hidden truth
  lexicon: BDAG
  rationale: In Paul, μυστήριον commonly denotes a divine truth once hidden and now revealed, not something merely puzzling. 'Mystery' preserves established Pauline usage and theological weight without over-paraphrasing.
- source_word: μέγα
  chosen: great
  alternatives:
  - profound
  lexicon: BDAG
  rationale: '''Great'' is the direct lexical sense and preserves the Greek adjective without interpretive expansion. ''Profound'' is idiomatic in some English versions but adds an interpretive nuance of intellectual depth rather than magnitude/significance.'
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' best reflects the shift from the statement about the mystery to Paul's clarification of what he means.
- source_word: λέγω
  chosen: am speaking
  alternatives:
  - say
  - mean
  lexicon: BDAG
  rationale: The present tense is naturally rendered in English as progressive here. 'Am speaking' preserves the verbal force while fitting the explanatory construction. 'Mean' is interpretive and slightly more paraphrastic.
- source_word: εἰς
  chosen: with reference to
  alternatives:
  - concerning
  - about
  - in regard to
  lexicon: BDAG
  rationale: Here εἰς is idiomatic after λέγω, indicating reference rather than motion. 'With reference to' captures the sense clearly and avoids the awkwardly literal 'into' or the potentially too loose 'about'.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like form. In this theological statement contrasting Messiah and the church, the titular sense is strong.
- source_word: ἐκκλησίαν
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Pauline usage here, ἐκκλησία refers to the people of God in their corporate identity, not merely a civic assembly. 'Church' is the clearest and most contextually appropriate rendering.
