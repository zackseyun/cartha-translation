theological_decisions:
- issue: Referent of 'this mystery' in the marriage-Christ-church analogy
  chosen_reading: Render the clause straightforwardly without specifying in the main text whether the mystery is marriage itself, Genesis 2:24, or the typological relation fulfilled in Messiah and the church.
  alternative_readings:
  - The mystery refers specifically to the one-flesh union of marriage.
  - The mystery refers specifically to the quotation of Genesis 2:24.
  - The mystery refers to the typological significance of marriage as pointing to Messiah and the church.
  rationale: The Greek text states that 'this mystery is great' and then clarifies that Paul is speaking with reference to Messiah and the church. The translation should preserve that explanatory movement without collapsing the interpretive possibilities into a narrower doctrinal claim than the text itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:07:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/005/032.json
  category: awkward_english
  tier: 1
  from: with reference to the Messiah and to the church
  to: with reference to the Messiah and the church
  rationale: The current rendering repeats the preposition 'to' ('...with reference to the Messiah and to the church'), which is slightly unnatural in English. While this may be intended to mirror the repeated Greek preposition 'εἰς', the English prepositional phrase 'with reference to' can govern the entire compound object ('the Messiah and the church') without repetition. The suggested rewrite is smoother and more idiomatic.
