theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated to preserve meaning. In this verse Χριστός appears with the article and functions as a title in a comparison, so 'the Messiah' is preferred. The traditional 'Christ' is preserved in a footnote as a familiar alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Rendering of σάρξ
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The doctrine excerpt specifies 'flesh' for literal uses and 'sinful nature' for metaphorical uses. Here the reference is to one's own physical self in the marriage/body analogy, so the literal sense is required. 'Body' is a possible smoothing in English but would obscure the lexical choice.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
revisions:
- timestamp: '2026-04-21T03:09:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/005/029.json
  category: awkward_english
  tier: 1
  from: does the church
  to: does for the church
  rationale: The Greek verb is elided in the final clause, and the draft supplies 'does' to complete the comparison. However, the phrase 'does the church' is unidiomatic in English. While many formal translations use this phrasing, it can be jarring for the reader. A minimal change to 'does for the church' significantly improves the naturalness of the English while still respecting the elliptical nature of the original, as it points back to the beneficent actions of nourishing and cherishing.
