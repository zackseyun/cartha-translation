id: EPH.5.29
reference: Ephesians 5:29
source:
  edition: SBLGNT
  text: οὐδεὶς γάρ ποτε τὴν ἑαυτοῦ σάρκα ἐμίσησεν, ἀλλὰ ἐκτρέφει καὶ θάλπει αὐτήν, καθὼς καὶ ὁ ⸀Χριστὸς τὴν ἐκκλησίαν,
translation:
  text: For no one ever hated his own flesh, but nourishes and cherishes it, just as the Messiah also does for the church,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning; many English translations use 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'his own body.' Greek 'flesh' is retained here because the term refers literally to one's own physical self, not to the metaphorical sense 'sinful nature.'
    reason: lexical_alternative
  - marker: c
    text: Or 'does the church'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard indefinite negative pronoun; 'no one' is clear, natural, and suitably formal.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding for the previous statement; 'For' preserves the connective force in discourse.
- source_word: ποτε
  chosen: ever
  alternatives:
  - at any time
  - yet
  lexicon: BDAG
  rationale: With the aorist verb and negative subject, ποτέ emphasizes universal experience; 'ever' is idiomatic English.
- source_word: τὴν ἑαυτοῦ σάρκα
  chosen: his own flesh
  alternatives:
  - his own body
  lexicon: BDAG
  rationale: σάρξ is rendered 'flesh' per the doctrine default when literal. Here the context is the natural self/body relation, not the Pauline ethical sense of 'sinful nature.' 'His own' reflects ἑαυτοῦ.
- source_word: ἐμίσησεν
  chosen: hated
  alternatives:
  - detested
  lexicon: BDAG
  rationale: Direct rendering of the aorist of μισέω; 'hated' is the normal and sufficiently strong English equivalent.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Simple adversative contrast between hating and the positive actions that follow.
- source_word: ἐκτρέφει
  chosen: nourishes
  alternatives:
  - feeds
  - provides for
  lexicon: BDAG
  rationale: ἐκτρέφω here carries the sense of bringing up by feeding/caring for. 'Nourishes' fits the body metaphor and pairs well with 'cherishes.'
- source_word: θάλπει
  chosen: cherishes
  alternatives:
  - cares for tenderly
  - keeps warm
  lexicon: BDAG
  rationale: Though the verb can literally mean 'keep warm,' in this context it denotes tender care. 'Cherishes' captures the metaphorical sense and matches common English collocation with 'nourishes.'
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: Refers back to σάρκα ('flesh'), a grammatical feminine noun in Greek but naturally rendered with English neuter 'it' for an impersonal body-part referent.
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - even as
  - as also
  lexicon: BDAG
  rationale: Preserves the comparative force and the additive καί linking Christ's action as the pattern.
- source_word: ὁ Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a title rather than a name-like proper designation. Here the article supports title-like usage.
- source_word: τὴν ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In Pauline usage ἐκκλησία here refers to the people of God corporately, conventionally and accurately rendered 'the church.'
