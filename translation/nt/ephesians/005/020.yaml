id: EPH.5.20
reference: Ephesians 5:20
source:
  edition: SBLGNT
  text: εὐχαριστοῦντες πάντοτε ὑπὲρ πάντων ἐν ὀνόματι τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
    τῷ θεῷ καὶ πατρί,
translation:
  text: always giving thanks to God the Father for everything in the name of our Lord
    Jesus the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “Jesus Christ.”
    reason: alternative_reading
  - marker: b
    text: “For everything” could also be understood more literally as “for all things”;
      some take it as “for everyone,” though the context favors the comprehensive
      sense of circumstances or matters.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστοῦντες
  chosen: giving thanks
  alternatives:
  - thanking
  lexicon: BDAG
  rationale: Present active participle, nominative plural, continuing the series of
    participles dependent on the prior imperative. 'Giving thanks' is idiomatic modern
    English and preserves the durative participial sense better than a finite verb.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Standard adverbial sense; 'always' is the most natural concise rendering.
- source_word: ὑπὲρ πάντων
  chosen: for everything
  alternatives:
  - for all things
  - for everyone
  lexicon: BDAG
  rationale: With the genitive, ὑπέρ commonly means 'for/on behalf of.' Because πάντων
    is neuter or masculine in form, context determines sense. Here the surrounding
    exhortation concerns comprehensive gratitude in all circumstances, so 'for everything'
    best fits the flow and common Pauline usage, while 'for everyone' is possible
    but less likely in context.
- source_word: ἐν ὀνόματι
  chosen: in the name
  alternatives:
  - through the name
  - by the authority of
  lexicon: BDAG
  rationale: Retains the familiar biblical idiom while allowing its representative/mediatorial
    force to be understood from context. More interpretive expansions were avoided
    in the main text.
- source_word: κυρίου
  chosen: Lord
  alternatives: []
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a christological
    title.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like element. In this epistolary context the
    titular sense remains clear enough to preserve meaning.
- source_word: τῷ θεῷ καὶ πατρί
  chosen: to God the Father
  alternatives:
  - to the God and Father
  - to God, even the Father
  lexicon: BDAG
  rationale: The dative marks the recipient of thanksgiving. 'God the Father' is clear,
    natural English. The article governs both nouns, but English normally expresses
    the sense smoothly without repeating 'the.'
