theological_decisions:
- issue: Rendering Χριστοῦ in the phrase τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated 'Messiah' where
    it functions as a title, while preserving 'Christ' as an alternative. Here the
    phrase still bears titular force rather than being merely a surname-like identifier,
    so 'Jesus Messiah' is used in the main text and the traditional rendering is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
