id: EPH.5.23
reference: Ephesians 5:23
source:
  edition: SBLGNT
  text: ὅτι ἀνήρ ἐστιν κεφαλὴ τῆς γυναικὸς ὡς καὶ ὁ Χριστὸς κεφαλὴ τῆς ἐκκλησίας, ⸀αὐτὸς σωτὴρ τοῦ σώματος.
translation:
  text: For the husband is the head of the wife, as the Messiah also is the head of the church—himself the Savior of the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because' for 'For' at the start of the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Head'' preserves the Greek metaphor. Interpreters variously understand it here as implying authority, prominence, or source.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because the title sense is active.
    reason: alternative_reading
  - marker: d
    text: Or 'he himself being the Savior of the body'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the preceding exhortation. 'For' fits natural English while preserving the explanatory force.
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: In the immediate household-code context addressing wives and husbands, the relational sense 'husband' is required rather than the generic 'man'.
- source_word: κεφαλή
  chosen: head
  alternatives:
  - source
  - leader
  lexicon: BDAG
  rationale: Retains the Greek metaphor without importing a narrower interpretive gloss. Because 'head' is theologically and interpretively contested, the translation preserves the metaphor rather than resolving it into 'authority over' or 'source' in the main text.
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: Paired with ἀνήρ in this domestic context, the marital sense 'wife' is contextually demanded.
- source_word: ὡς καὶ
  chosen: as ... also
  alternatives:
  - just as also
  - as also
  lexicon: BDAG
  rationale: Marks comparison between husband-wife relation and Messiah-church relation. The English wording preserves the analogical structure without overstating identity between the two relationships.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidelines, the title is translated as 'Messiah' where title sense is active. Here it functions as a christological title, not merely a name-like form.
- source_word: ἐκκλησία
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Pauline usage here, ἐκκλησία refers to the redeemed community in its established theological sense. 'Church' is the clearest modern equivalent.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - himself
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis and links the saving role specifically to Messiah.
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: '''Savior'' is the standard and theologically appropriate rendering in this christological context, preserving both rescue and salvific significance.'
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Maintains Paul's body metaphor for the church. The genitive 'of the body' is kept rather than paraphrased as 'of his body' since 'his' is not explicit in the Greek, though the referent is contextually clear.
