theological_decisions:
- issue: Meaning of κεφαλή in the husband-wife and Messiah-church comparison
  chosen_reading: Retain the metaphor as 'head' without resolving it to 'authority over' or 'source' in the main text.
  alternative_readings:
  - source
  - leader
  - one in authority over
  rationale: The term carries substantial interpretive debate. In keeping with the translation philosophy, the draft preserves the lexical metaphor and theological tension rather than embedding one contested interpretation into the translation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is a title here and should be translated to preserve meaning and Hebraic messianic force, per project doctrine.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
revisions:
- timestamp: '2026-04-21T03:09:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/005/023.json
  category: awkward_english
  tier: 1
  from: he himself being the Savior of the body
  to: himself the Savior of the body
  rationale: The Greek phrase 'αὐτὸς σωτὴρ τοῦ σώματος' is a concise nominative in apposition to 'Christ'. The current rendering with 'he himself being...' is a common but slightly cumbersome way to translate this structure. A more direct appositive, '...church—himself the Savior of the body,' is more concise, stylistically stronger, and better reflects the declarative nature of the Greek phrase without the slight process-oriented feel of the participle 'being'.
