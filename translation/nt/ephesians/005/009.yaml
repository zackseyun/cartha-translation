theological_decisions:
- issue: Textual variant in the genitive phrase
  chosen_reading: the fruit of the light
  alternative_readings:
  - the fruit of the Spirit
  rationale: The provided SBLGNT text reads φωτός ('light'), which fits the immediate context of walking as children of light (vv. 8–9). The variant 'Spirit' is well known from later manuscript tradition and translation history, so it should be preserved in a footnote rather than adopted against the base text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve alternatives in footnotes where relevant.'
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table specifies 'righteousness' as the default rendering, with 'justice' preserved in footnotes for Pauline passages because both are semantically viable and the theological nuance is significant.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternatives preserved in footnotes for Pauline passages.'
