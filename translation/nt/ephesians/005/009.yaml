  from: is in
  to: consists in
  rationale: The Greek preposition 'ἐν' here denotes the sphere or manner in which the fruit is expressed, not a physical location. While 'is in' is a literal rendering, it can sound awkward or overly locative in English. 'Consists in' is a common and clear alternative (used by NIV, NASB, etc.) that better captures this sense of manifestation or composition.
