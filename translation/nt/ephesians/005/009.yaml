id: EPH.5.9
reference: Ephesians 5:9
source:
  edition: SBLGNT
  text: ὁ γὰρ καρπὸς τοῦ ⸀φωτὸς ἐν πάσῃ ἀγαθωσύνῃ καὶ δικαιοσύνῃ καὶ ἀληθείᾳ,
translation:
  text: for the fruit of the light consists in all goodness and righteousness[a] and truth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “justice.” The Greek word can carry both senses in Paul.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read “the fruit of the Spirit” instead of “the fruit of the light.”
    reason: textual_variant
  - marker: c
    text: Or 'is in'.
    reason: previous_rendering
lexical_decisions:
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces an explanatory ground for the preceding exhortation; 'for' preserves the connective force in natural English.
- source_word: καρπὸς
  chosen: fruit
  alternatives:
  - result
  - outcome
  lexicon: BDAG
  rationale: Paul uses the common metaphor of 'fruit' for produced moral/spiritual qualities; retaining 'fruit' preserves the imagery and intertextual resonance.
- source_word: τοῦ φωτός
  chosen: of the light
  alternatives:
  - of light
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly. The article supports 'the light,' likely referring back to believers' identity in the Lord as light (v. 8), not merely an abstract quality.
- source_word: ἐν
  chosen: is in
  alternatives:
  - consists in
  - is found in
  - shows itself in
  lexicon: BDAG
  rationale: With the dative list, ἐν here expresses the sphere or manifestation in which the fruit appears. 'Is in' is formally close and still intelligible in English, while allowing the reader to infer manifestation rather than strict location.
- source_word: πάσῃ
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: 'With singular abstract nouns, πᾶς commonly has a comprehensive sense. ''All'' reads naturally with the three coordinated qualities: ''in all goodness and righteousness and truth.'''
- source_word: ἀγαθωσύνῃ
  chosen: goodness
  alternatives:
  - uprightness
  - kindness
  lexicon: BDAG
  rationale: The noun denotes moral goodness or beneficence. 'Goodness' is the most direct and standard rendering without narrowing the sense to mere kindness.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the main text, while preserving 'justice' as a meaningful Pauline alternative in a footnote.
- source_word: ἀληθείᾳ
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: BDAG
  rationale: The term can denote truth or truthfulness; 'truth' best preserves the broader semantic range here, including both conformity to reality and moral sincerity.
