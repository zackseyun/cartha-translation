theological_decisions:
- issue: Referent of 'Lord'
  chosen_reading: '''Lord'' is retained as the christological title, most naturally
    referring to Jesus in the flow of Ephesians 4:4–6.'
  alternative_readings:
  - A more general reference to God
  rationale: In the triadic context of one Spirit (v. 4), one Lord (v. 5), and one
    God and Father of all (v. 6), 'Lord' most naturally denotes the Son without importing
    more than the text states.
  doctrine_reference: 'Affirmations: Nicene Creed; Contested terms: κύριος → Lord'
- issue: Meaning of 'one baptism'
  chosen_reading: Rendered neutrally as 'one baptism' without specifying mode, efficacy,
    or whether the emphasis is sacramental rite versus its unifying significance.
  alternative_readings:
  - A specifically sacramental emphasis
  - A primarily metaphorical/spiritual-baptism emphasis
  rationale: The verse asserts unity but does not itself resolve denominational debates
    about baptismal theology. The translation preserves the text's wording without
    importing a sectarian interpretation.
  doctrine_reference: Affirmations; Translation philosophy §3 preserve theological
    tension rather than resolve it
