id: EPH.4.5
reference: Ephesians 4:5
source:
  edition: SBLGNT
  text: εἷς κύριος, μία πίστις, ἓν βάπτισμα·
translation:
  text: one Lord, one faith, one baptism;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for faith (πίστις), though 'faith' best fits
      the shared unity emphasized here.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς
  chosen: one
  lexicon: BDAG
  rationale: Cardinal adjective repeated three times to emphasize unity; rendered
    consistently as 'one' in each occurrence.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Default rendering per doctrine for κύριος is 'Lord.' In this Pauline
    context it functions as the christological title, not merely 'master.'
- source_word: μία
  chosen: one
  lexicon: BDAG
  rationale: Feminine form of εἷς agreeing with πίστις; translated with the same English
    gloss 'one' to preserve the triadic parallelism.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine, default rendering is 'faith.' Here the sense is the shared
    faith/confession or believing response that unites the church. Although πίστις
    can mean 'faithfulness' or 'trust,' this verse is not one of the contested constructions
    requiring an alternative in the main text.
- source_word: ἓν
  chosen: one
  lexicon: BDAG
  rationale: Neuter form of εἷς agreeing with βάπτισμα; translated 'one' to maintain
    the repeated structure and emphasis on unity.
- source_word: βάπτισμα
  chosen: baptism
  lexicon: BDAG
  rationale: Standard rendering for the rite/initiation denoted by βάπτισμα. Retained
    as 'baptism' rather than paraphrasing, since the term is both precise and widely
    understood in English.
