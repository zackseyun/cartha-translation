theological_decisions:
- issue: Scope of the repeated πάντων / πᾶσιν
  chosen_reading: Render broadly as 'all' without specifying 'all people' or 'all
    things' in the main text.
  alternative_readings:
  - all people
  - all believers
  - all things
  rationale: The Greek uses anarthrous plural forms of πᾶς without an explicit noun,
    and the immediate context is the unity of the church while the language itself
    is broad. To preserve theological tension rather than resolve it, the translation
    keeps the repeated 'all' and avoids narrowing the scope beyond what the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
