id: EPH.4.6
reference: Ephesians 4:6
source:
  edition: SBLGNT
  text: εἷς θεὸς καὶ πατὴρ πάντων, ὁ ἐπὶ πάντων καὶ διὰ πάντων καὶ ἐν ⸀πᾶσιν.
translation:
  text: one God and Father of all, who is over all and through all and in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of everyone' / 'of all things'; the repeated 'all' in this verse is
      broad and not explicitly limited by a stated noun in Greek.
    reason: lexical_alternative
  - marker: b
    text: Or 'in everyone.' Some manuscripts read 'in you all.'
    reason: textual_variant
lexical_decisions:
- source_word: εἷς
  chosen: one
  alternatives:
  - single
  lexicon: BDAG
  rationale: Retains the emphatic numeral/adjective introducing the unity theme in
    the surrounding context (one body, one Spirit, one Lord, etc.). 'One' is the natural
    and sufficiently formal English rendering.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός. Capitalized in English for the true God
    in this confessional context.
- source_word: πατὴρ
  chosen: Father
  alternatives:
  - father
  lexicon: BDAG
  rationale: Rendered 'Father' as a divine title paired with 'God.' This preserves
    the personal and relational designation without flattening it into abstraction.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of everyone
  - of all things
  lexicon: BDAG
  rationale: The genitive plural after 'Father' is most naturally rendered 'of all.'
    In context, the repeated πάντων binds the church's unity to God's universal relation
    and activity. 'Of all' preserves the Greek's breadth without over-specifying persons
    versus things in the main text.
- source_word: ὁ
  chosen: who is
  alternatives:
  - the one who is
  lexicon: Greek grammar
  rationale: The article introduces a descriptive relative-like clause about God the
    Father. English idiom is best served by 'who is,' making the appositional description
    clear and readable.
- source_word: ἐπὶ πάντων
  chosen: over all
  alternatives:
  - above all
  lexicon: BDAG
  rationale: With ἐπί and the genitive, 'over all' naturally conveys sovereignty or
    supremacy. 'Above all' is possible, but 'over all' better matches the likely sense
    of rule or transcendence in this triad.
- source_word: διὰ πάντων
  chosen: through all
  alternatives:
  - through everyone
  - working through all
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes agency or means. 'Through all'
    preserves the concise Greek and allows the reader to hear God's pervasive activity
    without adding interpretive wording such as 'working.'
- source_word: ἐν πᾶσιν
  chosen: in all
  alternatives:
  - in everyone
  - among all
  lexicon: BDAG
  rationale: ἐν with the dative plural is most straightforwardly 'in all.' Because
    the Greek lacks an explicit noun, the phrase is somewhat open-ended; 'in all'
    preserves that breadth and the rhetorical parallelism of the three prepositional
    phrases.
