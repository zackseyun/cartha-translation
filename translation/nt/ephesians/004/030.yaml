theological_decisions:
- issue: Personal reference to the Holy Spirit in the relative clause
  chosen_reading: Use 'in whom' rather than 'in which'
  alternative_readings:
  - in which
  rationale: Although the Greek relative pronoun is neuter by grammatical agreement
    with πνεῦμα, the verse refers to the Holy Spirit as a personal divine agent who
    can be grieved. Rendering the clause personally in English reflects the referent
    rather than flattening it into an impersonal force.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language)'
- issue: Force of sealing relative to the day of redemption
  chosen_reading: '''for the day of redemption'''
  alternative_readings:
  - until the day of redemption
  rationale: The translation preserves the telic/goal-oriented force of εἰς without
    importing a more specific doctrinal conclusion about perseverance or sacramental
    mechanism than the text itself states. The verse affirms divine sealing oriented
    toward final redemption, while leaving broader theological systems unresolved.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
