id: EPH.4.30
reference: Ephesians 4:30
source:
  edition: SBLGNT
  text: καὶ μὴ λυπεῖτε τὸ πνεῦμα τὸ ἅγιον τοῦ θεοῦ, ἐν ᾧ ἐσφραγίσθητε εἰς ἡμέραν ἀπολυτρώσεως.
translation:
  text: And do not grieve the Holy Spirit of God, in whom you were sealed for the
    day of redemption.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the day of redemption.' The Greek says 'for the day of redemption'
      (εἰς ἡμέραν ἀπολυτρώσεως), which may be understood with a future-oriented sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπεῖτε
  chosen: grieve
  alternatives:
  - sadden
  - cause sorrow to
  lexicon: BDAG
  rationale: 'Present active imperative with μή gives a prohibition: ''do not grieve.''
    ''Grieve'' is the established and most natural English equivalent for λυπέω here,
    preserving the personal-relational force toward the Holy Spirit better than flatter
    options like ''offend'' or weaker ones like ''sadden.'''
- source_word: πνεῦμα τὸ ἅγιον τοῦ θεοῦ
  chosen: the Holy Spirit of God
  alternatives:
  - the Holy Spirit
  - God's Holy Spirit
  lexicon: BDAG
  rationale: The full genitival phrase is retained. 'Holy Spirit' is the standard
    title in English and best reflects the definite, titular sense of the Greek. Including
    'of God' preserves the explicit genitive rather than smoothing it away.
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - by whom
  - in which
  lexicon: BDAG
  rationale: The relative pronoun is neuter grammatically because πνεῦμα is neuter,
    but the referent is personal. 'In whom' preserves both the preposition ἐν and
    the personal reference better than 'in which.' 'By whom' is possible as an interpretive
    rendering of agency, but the Greek more directly says 'in whom.'
- source_word: ἐσφραγίσθητε
  chosen: you were sealed
  alternatives:
  - you were marked with a seal
  - you were stamped with a seal
  lexicon: BDAG
  rationale: Aorist passive indicative, second plural. 'Were sealed' is concise, idiomatic,
    and preserves the metaphor of authentication/ownership/protection without overexplaining
    in the main text.
- source_word: εἰς ἡμέραν ἀπολυτρώσεως
  chosen: for the day of redemption
  alternatives:
  - until the day of redemption
  - for a day of redemption
  lexicon: BDAG
  rationale: εἰς here expresses goal or result. 'For the day of redemption' is a balanced
    rendering that preserves the forward-looking sense without forcing a strictly
    temporal nuance. 'Until' is a common interpretive translation, but 'for' more
    closely matches εἰς while remaining natural English. 'The day of redemption' reflects
    the anarthrous construction as definite in context, referring to the eschatological
    consummation.
