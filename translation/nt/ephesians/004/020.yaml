theological_decisions:
- issue: Rendering Χριστόν as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine guidelines, Χριστός is translated as 'Messiah' where it
    functions as a title. In this context Paul is not merely naming Jesus but speaking
    of the one whom believers have learned in the gospel proclamation. Retaining the
    title preserves the messianic sense without adding 'Jesus,' which the Greek does
    not state.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where
    title; Christ where name-like)'
