id: EPH.4.20
reference: Ephesians 4:20
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ οὐχ οὕτως ἐμάθετε τὸν Χριστόν,
translation:
  text: But you did not learn the Messiah in this way,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'But you did not learn Christ in this way.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second person plural pronoun, explicit for contrast and emphasis. English
    'you' preserves the addressee without overtranslating the emphasis; the contrast
    is further carried by 'But'.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - However
  lexicon: BDAG
  rationale: Marks contrast with the preceding description of Gentile conduct. 'But'
    is concise and natural in English while preserving the adversative force.
- source_word: οὐχ οὕτως
  chosen: not in this way
  alternatives:
  - not so
  - not like that
  lexicon: BDAG
  rationale: 'The negation with adverb οὕτως points to manner: Paul contrasts the
    readers'' learning of Messiah with the corrupt way of life just described. ''Not
    in this way'' makes the manner explicit in idiomatic English.'
- source_word: ἐμάθετε
  chosen: did ... learn
  alternatives:
  - came to know
  - were taught
  lexicon: BDAG
  rationale: Aorist active indicative of μανθάνω means 'learn.' 'Were taught' would
    import the passive idea expressed more explicitly in the following verse, and
    'came to know' is too interpretive here.
- source_word: τὸν Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  - the Christ
  lexicon: BDAG
  rationale: Χριστός here functions as a title rather than a mere name, and the doctrine
    guidelines prefer 'Messiah' where context supports. The unusual expression 'learn
    the Messiah' is retained rather than paraphrased, since Paul speaks of learning
    a person in union with the message about him.
