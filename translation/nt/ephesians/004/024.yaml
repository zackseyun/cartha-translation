theological_decisions:
- issue: Anthropological expression in 'new man'
  chosen_reading: Retain 'new man' rather than interpretive 'new self.'
  alternative_readings:
  - new self
  - new person
  rationale: The Greek uses ἄνθρωπον in a masculine singular expression paired with the 'old man' motif in context. Rendering it as 'self' is interpretive and obscures the lexical link. The chosen reading preserves Paul's representative anthropological language while remaining auditable.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Pauline δικαιοσύνη rendering
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table specifies 'righteousness' as the default for δικαιοσύνη, with 'justice' preserved in a footnote for Pauline passages. This keeps consistency while acknowledging the semantic range.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/004/024.json
  category: awkward_english
  tier: 1
  from: righteousness and holiness of the truth
  to: true righteousness and holiness
  rationale: 'The genitive phrase ''τῆς ἀληθείας'' (of the truth) most likely functions as a qualitative genitive, modifying both ''righteousness'' and ''holiness''. The literal rendering ''of the truth'' is grammatically possible but creates an awkward and somewhat opaque English phrase. Translating the genitive adjectivally as ''true'' is a common and valid way to render this construction, making the meaning clearer: the righteousness and holiness are genuine because they are sourced in the truth. This improves readability while remaining faithful to the source, fitting the optimal-equivalence philosophy.'
