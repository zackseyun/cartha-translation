id: EPH.4.24
reference: Ephesians 4:24
source:
  edition: SBLGNT
  text: καὶ ἐνδύσασθαι τὸν καινὸν ἄνθρωπον τὸν κατὰ θεὸν κτισθέντα ἐν δικαιοσύνῃ καὶ ὁσιότητι τῆς ἀληθείας.
translation:
  text: and to put on the new man, created according to God in true righteousness and holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''new self'' or ''new person.'' Greek: ''new man,'' matching the ''old man'' language in the surrounding context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in God's likeness' or 'after God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'justice' for 'righteousness.'
    reason: alternative_reading
  - marker: d
    text: Or 'righteousness and holiness of the truth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐνδύσασθαι
  chosen: to put on
  alternatives:
  - to clothe yourselves with
  - to be clothed with
  lexicon: BDAG
  rationale: The aorist middle infinitive continues the clothing metaphor from the surrounding context (put off/put on). 'Put on' is idiomatic, concise, and preserves the metaphor without over-paraphrase.
- source_word: καινὸν
  chosen: new
  alternatives:
  - renewed
  - fresh
  lexicon: BDAG
  rationale: καινός emphasizes newness in kind/quality rather than mere recency. 'New' is the standard and sufficiently broad rendering here.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - self
  - person
  - humanity
  lexicon: BDAG
  rationale: The phrase 'new man' is paired with 'old man' in the immediate context and is grammatically masculine with representative force. Per doctrine, gender-accurate rendering is preferred over flattening to 'self,' though 'self' is a common interpretive alternative.
- source_word: κατὰ θεὸν
  chosen: according to God
  alternatives:
  - after God
  - in God's likeness
  lexicon: BDAG
  rationale: This preserves the prepositional force of κατά with the accusative and avoids importing a more interpretive phrase. It likely conveys conformity to God or correspondence to God's pattern, which can be noted in a footnote.
- source_word: κτισθέντα
  chosen: created
  alternatives:
  - having been created
  - made
  lexicon: BDAG
  rationale: The participle is passive and modifies 'new man.' 'Created' preserves the creation language and theological resonance without unnecessary expansion.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine table, the default rendering is 'righteousness,' while 'justice' is a recognized alternative in Pauline usage and should be preserved in a footnote.
- source_word: ὁσιότητι
  chosen: holiness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: ὁσιότης denotes holiness/devoutness, especially in relation to what is godly or holy. 'Holiness' is the most natural and theologically weighty English equivalent here.
- source_word: τῆς ἀληθείας
  chosen: of the truth
  alternatives:
  - that comes from the truth
  - 'true'
  lexicon: BDAG
  rationale: A formal rendering best preserves the genitival relationship and the possibility that truth qualifies both righteousness and holiness. More interpretive renderings smooth the phrase but risk narrowing Paul's wording.
