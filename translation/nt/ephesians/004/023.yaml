theological_decisions:
- issue: Whether πνεύματι refers to the Holy Spirit or the human spirit/disposition
  chosen_reading: 'human inner disposition: ''the spirit of your mind'''
  alternative_readings:
  - the Holy Spirit renewing your mind
  rationale: The phrase τοῦ νοὸς ὑμῶν most naturally qualifies πνεύματι, yielding
    an anthropological expression rather than a direct reference to the Holy Spirit.
    This preserves Paul's wording without importing a more explicit pneumatological
    claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
