theological_decisions:
- issue: Whether ποιμένας should be rendered with the traditional church-office term
    'pastors' or the more literal 'shepherds'
  chosen_reading: shepherds
  alternative_readings:
  - pastors
  rationale: Following original-language primacy, the literal metaphor in ποιμένες
    is preserved in the main text. 'Pastors' is a traditional and contextually plausible
    rendering, but it imports later ecclesiastical terminology more strongly than
    the Greek itself. The alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether 'shepherds and teachers' denotes one combined group or two distinct
    groups
  chosen_reading: Render both nouns straightforwardly without resolving the syntactical
    debate
  alternative_readings:
  - 'a single combined office/group: ''shepherd-teachers'''
  - two distinguishable but closely linked groups/functions
  rationale: The Granville Sharp-like discussion here is debated, and the Greek wording
    suggests a close association without forcing a dogmatic conclusion in translation.
    Preserving the coordinate phrase 'shepherds and teachers' maintains the text's
    tension rather than resolving an ecclesiological dispute.
  doctrine_reference: Translation philosophy §3
