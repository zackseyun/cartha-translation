id: EPH.4.11
reference: Ephesians 4:11
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ἔδωκεν τοὺς μὲν ἀποστόλους, τοὺς δὲ προφήτας, τοὺς δὲ εὐαγγελιστάς,
    τοὺς δὲ ποιμένας καὶ διδασκάλους,
translation:
  text: And he himself gave some as apostles, some as prophets, some as evangelists,
    and some as shepherds and teachers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pastors and teachers.' The Greek literally says 'shepherds and teachers.'
    reason: lexical_alternative
  - marker: b
    text: The single article before 'shepherds and teachers' may indicate a particularly
      close relationship between these roles, though the phrase need not be taken
      as a single office.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and
  lexicon: BDAG
  rationale: Standard connective; retained to preserve the verse's continuity with
    the preceding context.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - himself
  lexicon: BDAG
  rationale: The pronoun is emphatic in position and form; 'he himself' preserves
    the emphasis that the giver is personally the one acting.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - appointed
  - granted
  lexicon: BDAG
  rationale: Aorist of δίδωμι most naturally means 'gave.' 'Appointed' is interpretive
    and narrows the sense beyond the lexical value, while 'gave' fits the broader
    context of gifted persons given to the church.
- source_word: τοὺς μὲν ἀποστόλους
  chosen: some as apostles
  alternatives:
  - the apostles
  - some apostles
  lexicon: BDAG
  rationale: 'The repeated article with μέν/δέ structures a distribution: ''some ...
    some ...'' English idiom is best captured by ''some as apostles'' rather than
    a wooden repetition of articles. ''As'' clarifies that these are roles/persons
    given in these capacities.'
- source_word: προφήτας
  chosen: prophets
  lexicon: BDAG
  rationale: Direct and standard rendering of προφήτης; no contextual pressure suggests
    a different gloss.
- source_word: εὐαγγελιστάς
  chosen: evangelists
  alternatives:
  - proclaimers of the good news
  lexicon: BDAG
  rationale: '''Evangelists'' is the established and accurate rendering of εὐαγγελιστής.
    The alternative is more explanatory but less concise and less natural in this
    list of ministry roles.'
- source_word: ποιμένας
  chosen: shepherds
  alternatives:
  - pastors
  lexicon: BDAG
  rationale: The literal sense of ποιμήν is 'shepherd.' This better preserves the
    metaphor present in the Greek than the ecclesiastical title 'pastors,' though
    that traditional rendering is worth preserving in a footnote.
- source_word: καὶ διδασκάλους
  chosen: and teachers
  lexicon: BDAG
  rationale: Straightforward rendering. The single article before 'shepherds and teachers'
    may suggest a close relationship between the two groups/functions, but the syntax
    does not require collapsing them into one office in translation.
