theological_decisions:
- issue: Agency and source of the church's growth
  chosen_reading: The body's growth is presented as deriving 'from whom'—that is, from Christ—while occurring through the coordinated functioning of every part.
  alternative_readings:
  - An impersonal antecedent ('from which')
  - A reading that places the emphasis almost exclusively on the joints/ligaments rather than Christ as source
  rationale: 'The grammar and immediate context (v. 15, ''Messiah'') support Christ as the personal source from whom the body grows. The verse also preserves the secondary means: each part works in proper measure. The translation keeps both truths without collapsing one into the other.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Meaning of the body imagery in διὰ πάσης ἁφῆς τῆς ἐπιχορηγίας
  chosen_reading: A concrete body metaphor is retained with 'supporting joint' rather than abstracting it to mere 'connection.'
  alternative_readings:
  - every supporting ligament
  - every connection that supplies
  rationale: Paul's metaphor depends on bodily cohesion and supply. 'Supporting joint' preserves the embodied image while remaining understandable to modern readers and avoiding overprecision where the Greek image may include both contact and supply.
  doctrine_reference: Translation philosophy §6
