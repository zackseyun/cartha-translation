id: EPH.4.16
reference: Ephesians 4:16
source:
  edition: SBLGNT
  text: ἐξ οὗ πᾶν τὸ σῶμα συναρμολογούμενον καὶ συμβιβαζόμενον διὰ πάσης ἁφῆς τῆς ἐπιχορηγίας κατ’ ἐνέργειαν ἐν μέτρῳ ἑνὸς ἑκάστου μέρους τὴν αὔξησιν τοῦ σώματος ποιεῖται εἰς οἰκοδομὴν ἑαυτοῦ ἐν ἀγάπῃ.
translation:
  text: from whom the whole body, being joined together and held together through every supporting joint, according to the proper working of each individual part, causes the growth of the body for building itself up in love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'causes the growth of the body.'
    reason: lexical_alternative
  - marker: b
    text: '''Supporting joint'' translates a phrase that could also be rendered ''joint of supply,'' ''ligament of support,'' or ''connection that supplies.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the working in measure of each individual part'.
    reason: previous_rendering
  - marker: d
    text: Or "makes the body's growth".
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξ οὗ
  chosen: from whom
  alternatives:
  - from which
  lexicon: BDAG
  rationale: The antecedent in context is Christ (v. 15), so the masculine relative is best rendered personally as 'whom,' preserving the body's derivation from him.
- source_word: πᾶν τὸ σῶμα
  chosen: the whole body
  alternatives:
  - all the body
  - the entire body
  lexicon: BDAG
  rationale: Idiomatic English prefers 'the whole body' for the singular collective expression.
- source_word: συναρμολογούμενον
  chosen: being joined together
  alternatives:
  - being fitted together
  - being joined
  lexicon: BDAG
  rationale: The participle conveys the fitting/joining of parts into an integrated whole. 'Being joined together' is natural English and preserves the passive sense.
- source_word: συμβιβαζόμενον
  chosen: held together
  alternatives:
  - knit together
  - brought together
  lexicon: BDAG
  rationale: '''Held together'' captures the sense of cohesion and integration in context. ''Knit together'' is possible but more idiomatic/traditional than necessary.'
- source_word: διὰ πάσης ἁφῆς τῆς ἐπιχορηγίας
  chosen: through every supporting joint
  alternatives:
  - through every joint of supply
  - through every ligament of support
  - through every connection of supply
  lexicon: BDAG
  rationale: ἁφή can denote a point of contact/joint rather than merely abstract contact; ἐπιχορηγία conveys supply/support furnished to the body. 'Supporting joint' communicates both ideas in readable English without overcommitting to a medical image like 'ligament.'
- source_word: κατ’ ἐνέργειαν
  chosen: according to the working
  alternatives:
  - according to the effective working
  - according to the operation
  lexicon: BDAG
  rationale: ἐνέργεια denotes operative power/activity. 'According to the working' is clear and sufficiently formal; 'effective' is interpretive and can be left implicit.
- source_word: ἐν μέτρῳ ἑνὸς ἑκάστου μέρους
  chosen: in measure of each individual part
  alternatives:
  - according to the measure of each single part
  - in the measure of each part
  lexicon: BDAG
  rationale: The phrase indicates proportionate functioning assigned to each part. 'Each individual part' preserves both ἑνὸς and ἑκάστου without awkward literalism.
- source_word: τὴν αὔξησιν τοῦ σώματος ποιεῖται
  chosen: makes the body's growth
  alternatives:
  - causes the growth of the body
  - produces the body's growth
  lexicon: BDAG
  rationale: ποιεῖται with αὔξησιν means 'brings about/makes' growth. 'Makes the body's growth' stays close to the Greek while remaining intelligible; the more idiomatic alternative is preserved in a footnote.
- source_word: εἰς οἰκοδομὴν ἑαυτοῦ
  chosen: for building itself up
  alternatives:
  - for its own edification
  - unto the building up of itself
  lexicon: BDAG
  rationale: οἰκοδομή is metaphorical edification/building up. 'Building itself up' is modern and clear, while preserving the reflexive force of ἑαυτοῦ.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  lexicon: BDAG
  rationale: Follows the default rendering of ἀγάπη in DOCTRINE.md and fits Paul's repeated emphasis in this context.
