id: EPH.4.26
reference: Ephesians 4:26
source:
  edition: SBLGNT
  text: ὀργίζεσθε καὶ μὴ ἁμαρτάνετε· ὁ ἥλιος μὴ ἐπιδυέτω ⸀ἐπὶ παροργισμῷ ὑμῶν,
translation:
  text: Be angry, and do not sin. Do not let the sun go down on your anger,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If you are angry, do not sin.' The Greek is formally imperative ('Be
      angry'), but some understand it as a concessive command in context.
    reason: alternative_reading
  - marker: b
    text: Paul likely echoes Psalm 4:4 (LXX 4:5), linking anger with the command not
      to sin.
    reason: cross_reference
  - marker: c
    text: Or, 'on your provocation' or 'while you remain embittered.' The Greek term
      can refer to anger or the state that provokes it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργίζεσθε
  chosen: Be angry
  alternatives:
  - Be angry with one another
  - If you are angry
  lexicon: BDAG
  rationale: The present middle/passive imperative is best rendered as an imperative,
    not merely a condition. 'Be angry' preserves the verbal force and echoes the wording
    of Psalm 4:4 LXX, which Paul appears to invoke. 'If you are angry' is interpretive
    and weakens the imperative form.
- source_word: μὴ ἁμαρτάνετε
  chosen: do not sin
  alternatives:
  - and yet do not sin
  lexicon: BDAG
  rationale: A straightforward prohibition matching the Greek imperative. Adding 'yet'
    is possible in English to clarify concession-like force, but the Greek does not
    require it.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: BDAG
  rationale: Literal rendering with no need for expansion.
- source_word: μὴ ἐπιδυέτω
  chosen: Do not let ... go down
  alternatives:
  - must not set
  - must not go down
  lexicon: BDAG
  rationale: English idiom naturally expresses the third-person imperative with 'Do
    not let.' This preserves the prohibitive force while remaining readable.
- source_word: ἐπὶ παροργισμῷ ὑμῶν
  chosen: on your anger
  alternatives:
  - on your provocation
  - while you remain embittered
  - on your exasperation
  lexicon: BDAG
  rationale: παροργισμός can denote anger, provocation, or embittered irritation.
    In this context, 'your anger' is the clearest and most natural English expression,
    especially in parallel with ὀργίζεσθε. 'Provocation' would suggest the cause rather
    than the emotional state, which is less likely here.
