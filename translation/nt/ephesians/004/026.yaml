theological_decisions:
- issue: Whether the opening clause should be rendered as a command approving anger
    or as a conditional concession
  chosen_reading: 'Rendered as an imperative: ''Be angry, and do not sin.'''
  alternative_readings:
  - 'Rendered concessively: ''If you are angry, do not sin.'''
  rationale: The Greek form is imperative, and preserving that form best reflects
    the source text. This does not import a blanket endorsement of sinful anger; the
    immediately following prohibition limits anger morally and temporally. The translation
    preserves the text's tension rather than resolving it into either approval or
    mere concession.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
