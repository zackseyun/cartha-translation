id: EPH.4.28
reference: Ephesians 4:28
source:
  edition: SBLGNT
  text: ὁ κλέπτων μηκέτι κλεπτέτω, μᾶλλον δὲ κοπιάτω ἐργαζόμενος ⸂ταῖς ἰδίαις χερσὶν
    τὸ ἀγαθόν⸃, ἵνα ἔχῃ μεταδιδόναι τῷ χρείαν ἔχοντι.
translation:
  text: The one who steals must steal no longer, but rather must labor, doing good
    work with his own hands, so that he may have something to share with the one who
    has need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'working what is good' / 'doing what is good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with the one in need.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κλέπτων
  chosen: The one who steals
  alternatives:
  - He who steals
  - The thief
  lexicon: BDAG
  rationale: Articular present participle used substantivally, referring to a person
    characterized by stealing. 'The one who steals' preserves the ongoing/habitual
    force without over-specifying identity. 'The thief' is possible but slightly more
    label-like than the participial construction.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Standard temporal adverb indicating cessation of a prior practice.
- source_word: κλεπτέτω
  chosen: must steal
  alternatives:
  - let him steal
  - is to steal
  lexicon: BDAG
  rationale: Present active imperative, third singular. In English, 'must steal no
    longer' communicates the imperative force naturally and clearly in modern style
    better than the more wooden 'let him steal no longer.'
- source_word: μᾶλλον δὲ
  chosen: but rather
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Marks strong contrast between former behavior and commanded alternative.
    'But rather' preserves both adversative and corrective force.
- source_word: κοπιάτω
  chosen: must labor
  alternatives:
  - must work hard
  - let him labor
  lexicon: BDAG
  rationale: κοπιάω often carries the sense of laboring to the point of effort or
    weariness, stronger than a generic 'work.' 'Must labor' preserves the imperative
    and the strenuous nuance.
- source_word: ἐργαζόμενος
  chosen: doing good work
  alternatives:
  - working
  - producing what is good
  - working at what is good
  lexicon: BDAG
  rationale: The participle explains the manner of the commanded labor. Because τὸ
    ἀγαθόν follows, rendering the phrase together as 'doing good work' gives idiomatic
    English while preserving the sense of productive, morally fitting labor. This
    avoids the awkwardly literal 'working the good.'
- source_word: ταῖς ἰδίαις χερσὶν
  chosen: with his own hands
  alternatives:
  - with his hands
  - by his own hands
  lexicon: BDAG
  rationale: A concrete idiom emphasizing personal, honest labor. 'Own' reflects ἰδίαις,
    and 'with his own hands' is natural English.
- source_word: τὸ ἀγαθόν
  chosen: good work
  alternatives:
  - what is good
  - the good
  lexicon: BDAG
  rationale: Neuter singular adjective functioning substantivally. In this context,
    linked with manual labor, it points to what is good/useful/honest in contrast
    to theft. 'Good work' makes the object of labor explicit in idiomatic English;
    the broader alternative 'what is good' is preserved in a footnote because it is
    also viable.
- source_word: ἵνα ἔχῃ
  chosen: so that he may have something
  alternatives:
  - in order that he may have
  - so that he may have
  lexicon: BDAG
  rationale: Purpose clause with subjunctive. 'Something' is supplied idiomatically
    in English because the infinitive that follows implies having resources available
    for sharing.
- source_word: μεταδιδόναι
  chosen: to share
  alternatives:
  - to give
  - to distribute
  lexicon: BDAG
  rationale: The verb means to share or impart from one's own possessions, not merely
    to transfer. 'Share' captures the relational and generous nuance.
- source_word: τῷ χρείαν ἔχοντι
  chosen: with the one who has need
  alternatives:
  - to the needy person
  - to the one in need
  lexicon: BDAG
  rationale: Dative participial phrase describing the recipient as one possessing
    need. 'The one who has need' is close to the Greek and clear in English; 'the
    one in need' is a smoother alternative preserved in a footnote.
