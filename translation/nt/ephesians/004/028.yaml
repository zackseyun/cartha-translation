theological_decisions:
- issue: Ethical purpose of labor
  chosen_reading: The verse presents honest labor as the divinely intended alternative
    to theft and as a means of generosity toward the needy.
  alternative_readings:
  - The verse primarily emphasizes self-sufficiency
  - The verse primarily emphasizes restitution
  rationale: The explicit purpose clause ('so that he may have to share with the one
    who has need') directs the goal of labor beyond mere self-support. While self-support
    is implied, the text foregrounds generosity. No additional doctrinal claim beyond
    the verse's ethical instruction is imported.
  doctrine_reference: Translation philosophy §1, §3, §6
