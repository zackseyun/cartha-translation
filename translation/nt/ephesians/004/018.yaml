id: EPH.4.18
reference: Ephesians 4:18
source:
  edition: SBLGNT
  text: ⸀ἐσκοτωμένοι τῇ διανοίᾳ ὄντες, ἀπηλλοτριωμένοι τῆς ζωῆς τοῦ θεοῦ, διὰ τὴν
    ἄγνοιαν τὴν οὖσαν ἐν αὐτοῖς, διὰ τὴν πώρωσιν τῆς καρδίας αὐτῶν,
translation:
  text: being darkened in their understanding, alienated from the life of God because
    of the ignorance that is in them, because of the hardness of their heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mind' for 'understanding' (διανοίᾳ).
    reason: lexical_alternative
  - marker: b
    text: Or 'excluded from the life of God' for 'alienated from the life of God.'
    reason: lexical_alternative
  - marker: c
    text: '''The life of God'' may mean either the life that belongs to God or the
      life that comes from God.'
    reason: alternative_reading
  - marker: d
    text: Or 'callousness' for 'hardness' (πώρωσις).
    reason: lexical_alternative
  - marker: e
    text: Greek 'their heart' is singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκοτωμένοι
  chosen: being darkened
  alternatives:
  - having been darkened
  - darkened
  lexicon: BDAG
  rationale: Perfect passive participle describing a resulting state; 'being darkened'
    preserves the participial linkage with ὄντες and the passive sense without overloading
    the English with a wooden perfect.
- source_word: διανοίᾳ
  chosen: understanding
  alternatives:
  - mind
  - thinking
  lexicon: BDAG
  rationale: διάνοια can denote mind, thought, or understanding. 'Understanding' fits
    the dative of respect ('darkened in their understanding') and communicates the
    cognitive faculty clearly in modern English.
- source_word: ὄντες
  chosen: being
  alternatives:
  - as they are
  - while being
  lexicon: BDAG
  rationale: The participle links the descriptive clauses smoothly. Rendering it with
    'being' preserves the Greek structure and keeps the sentence connected to the
    surrounding context.
- source_word: ἀπηλλοτριωμένοι
  chosen: alienated
  alternatives:
  - excluded
  - estranged
  lexicon: BDAG
  rationale: The perfect passive participle conveys a state of estrangement. 'Alienated'
    is a strong and natural English equivalent that preserves relational separation
    without narrowing it to legal exclusion.
- source_word: τῆς ζωῆς τοῦ θεοῦ
  chosen: from the life of God
  alternatives:
  - from God's life
  - from the life that comes from God
  lexicon: BDAG
  rationale: The genitive construction is best kept fairly literal. 'The life of God'
    preserves the ambiguity between life belonging to God and life that comes from
    God, rather than resolving it interpretively.
- source_word: διὰ τὴν ἄγνοιαν
  chosen: because of the ignorance
  alternatives:
  - on account of the ignorance
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause. 'Because of' is idiomatic
    and clear.
- source_word: τὴν οὖσαν ἐν αὐτοῖς
  chosen: that is in them
  alternatives:
  - existing in them
  - within them
  lexicon: BDAG
  rationale: This attributive participial phrase specifies the ignorance as internal
    to them. 'That is in them' is the most natural direct rendering.
- source_word: διὰ τὴν πώρωσιν
  chosen: because of the hardness
  alternatives:
  - because of the callousness
  - because of the dullness
  lexicon: BDAG
  rationale: πώρωσις denotes hardness or insensibility. 'Hardness' preserves the metaphor
    and aligns with common biblical usage, while remaining understandable.
- source_word: τῆς καρδίας αὐτῶν
  chosen: of their heart
  alternatives:
  - of their hearts
  lexicon: BDAG
  rationale: The Greek has singular 'heart' with plural possessive, a common collective
    or representative usage. 'Of their heart' preserves the singular form and the
    biblical anthropology of the heart as the inner person.
