theological_decisions:
- issue: Meaning of 'the life of God'
  chosen_reading: Retain the genitive as 'the life of God' without specifying whether
    it means life belonging to God or life given by God.
  alternative_readings:
  - the life that comes from God
  - God's own life
  rationale: The phrase can bear more than one closely related nuance, and the translation
    philosophy calls for preserving theological tension rather than resolving genuine
    ambiguity. A relatively literal rendering keeps the text open where the Greek
    is open.
  doctrine_reference: Translation philosophy §3
- issue: Singular 'heart' with plural referent
  chosen_reading: Use 'their heart' rather than smoothing to 'their hearts.'
  alternative_readings:
  - their hearts
  rationale: The Greek singular καρδίας should be reflected where natural English
    permits, since it presents the heart as the unified inner faculty rather than
    emphasizing multiple individual hearts. This is a lexical-anthropological choice,
    not a doctrinal expansion.
  doctrine_reference: Translation philosophy §5
