theological_decisions:
- issue: Force of Paul's self-description ὁ δέσμιος ἐν κυρίῳ
  chosen_reading: the prisoner in the Lord
  alternative_readings:
  - the Lord's prisoner
  - a prisoner for the Lord
  rationale: 'The translation preserves the Greek prepositional phrase rather than
    resolving it into possession (''the Lord''s prisoner'') or purpose (''for the
    Lord''). This maintains theological breadth: Paul''s imprisonment is understood
    in relation to the Lord without over-specifying the nuance.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
