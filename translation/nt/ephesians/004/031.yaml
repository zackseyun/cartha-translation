- issue: Sense of βλασφημία in an ethical vice list
  chosen_reading: interpersonal 'slander' rather than God-directed 'blasphemy'
  alternative_readings:
  - blasphemy
  - abusive speech
  rationale: The surrounding terms concern destructive attitudes and speech within
    human relationships. Rendering as 'slander' best fits the immediate context without
    importing a narrower sacrilege sense.
