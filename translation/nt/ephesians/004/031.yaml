id: EPH.4.31
reference: Ephesians 4:31
source:
  edition: SBLGNT
  text: πᾶσα πικρία καὶ θυμὸς καὶ ὀργὴ καὶ κραυγὴ καὶ βλασφημία ἀρθήτω ἀφ’ ὑμῶν σὺν
    πάσῃ κακίᾳ.
translation:
  text: Let all bitterness and rage and anger and shouting and slander be taken away
    from you, along with all malice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abusive speech'; traditionally 'blasphemy.' In this context the Greek
      likely refers to harmful speech against others.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: Used with the vice list to express total removal comprehensively; 'all'
    is idiomatic in English and matches the distributive force here.
- source_word: πικρία
  chosen: bitterness
  alternatives:
  - resentment
  lexicon: BDAG
  rationale: '''Bitterness'' is the standard and sufficiently transparent rendering
    for a settled inner attitude of harsh resentment.'
- source_word: θυμός
  chosen: rage
  alternatives:
  - wrath
  - fury
  - outburst of anger
  lexicon: BDAG
  rationale: Distinguished from the following ὀργή by rendering θυμός as a more heated,
    explosive passion. 'Rage' preserves the emotional intensity without archaic tone.
- source_word: ὀργή
  chosen: anger
  alternatives:
  - wrath
  - indignation
  lexicon: BDAG
  rationale: Rendered 'anger' to differentiate it from θυμός while keeping natural
    modern English. 'Wrath' would sound elevated and could overstate the term in this
    vice list.
- source_word: κραυγή
  chosen: shouting
  alternatives:
  - clamor
  - outcry
  lexicon: BDAG
  rationale: Refers here to loud, hostile verbal expression rather than a neutral
    cry. 'Shouting' is clearer for modern readers than the traditional 'clamor.'
- source_word: βλασφημία
  chosen: slander
  alternatives:
  - abusive speech
  - blasphemy
  - reviling
  lexicon: BDAG
  rationale: In this interpersonal ethical context, the term most naturally refers
    to injurious speech against others rather than blasphemy against God. 'Slander'
    is concise and contextually apt, though broader abusive speech is also possible.
- source_word: ἀρθήτω
  chosen: be taken away
  alternatives:
  - be removed
  - be lifted away
  lexicon: BDAG
  rationale: Aorist passive imperative of αἴρω. 'Be taken away' preserves the passive
    force and the sense of removal from the community's life.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - away from among you
  - from your midst
  lexicon: BDAG
  rationale: Direct and natural rendering of the prepositional phrase; in context
    it means removal from the believers' conduct and communal life.
- source_word: σὺν πάσῃ κακίᾳ
  chosen: along with all malice
  alternatives:
  - together with every kind of malice
  - with all evil
  lexicon: BDAG
  rationale: κακία here denotes ill-will or malicious disposition, not evil in the
    broadest abstract sense. 'Along with all malice' preserves both the accompanying
    force of σύν and the comprehensive πάσῃ.
