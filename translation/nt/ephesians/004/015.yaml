id: EPH.4.15
reference: Ephesians 4:15
source:
  edition: SBLGNT
  text: ἀληθεύοντες δὲ ἐν ἀγάπῃ αὐξήσωμεν εἰς αὐτὸν τὰ πάντα, ὅς ἐστιν ἡ κεφαλή, ⸀Χριστός,
translation:
  text: but speaking the truth in love, let us grow in every way into him who is the
    head, the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being truthful' or 'practicing the truth'; the Greek verb can include
      both truthful speech and truthful conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all things' or more literally 'all things.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; translated 'Messiah' here because the term functions as
      a title.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀληθεύοντες
  chosen: speaking the truth
  alternatives:
  - being truthful
  - truthing
  lexicon: BDAG
  rationale: The participle can denote practicing truth or speaking truthfully. In
    this context, contrasted with deceitful teaching in the surrounding verses and
    paired with corporate growth, 'speaking the truth' is the most natural and idiomatic
    English rendering while still reflecting the verbal force. The broader ethical
    sense is preserved in a footnote alternative.
- source_word: δὲ
  chosen: but
  alternatives:
  - rather
  - and
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding description of instability
    and deception; 'but' best signals that contrast in English.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: This is the standard and natural rendering of ἐν + dative here, preserving
    both manner and sphere. It also maintains consistency for ἀγάπη as 'love' per
    doctrine guidance.
- source_word: αὐξήσωμεν
  chosen: let us grow
  alternatives:
  - we may grow
  - let us increase
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive is hortatory in context, so
    'let us grow' best captures the exhortational force in readable English.
- source_word: εἰς αὐτὸν
  chosen: into him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: εἰς commonly carries directional force. 'Into him' preserves the imagery
    of growth toward and incorporation in Christ more fully than the flatter 'to him'.
- source_word: τὰ πάντα
  chosen: in every way
  alternatives:
  - all things
  - in all things
  lexicon: BDAG
  rationale: Although literally 'all things,' in this idiom with growth language it
    most naturally means comprehensively or in every respect. 'In every way' communicates
    the adverbial sense in clear English without suggesting that literal objects are
    growing.
- source_word: κεφαλή
  chosen: head
  lexicon: BDAG
  rationale: '''Head'' is the direct and standard rendering, preserving Paul''s body
    metaphor without importing a narrower interpretive gloss such as ''source'' or
    ''authority'' into the translation itself.'
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here it stands appositionally after 'the
    head' and is best understood as a title.
