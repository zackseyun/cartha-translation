theological_decisions:
- issue: Semantic scope of ἀληθεύοντες
  chosen_reading: Rendered as 'speaking the truth' in the main text
  alternative_readings:
  - being truthful
  - practicing the truth
  rationale: The verb can extend beyond speech to truthful conduct, but the immediate
    context emphasizes false teaching, deceit, and the body's edifying speech. The
    main text uses the most idiomatic contextual rendering, while a footnote preserves
    the broader ethical nuance so as not to over-resolve the term.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather
    than resolve it)'
- issue: Interpretive force of κεφαλή
  chosen_reading: Translated simply as 'head'
  alternative_readings:
  - source
  - authority over
  rationale: The translation preserves the metaphor without choosing among debated
    theological interpretations of 'head.' This avoids importing a denominationally
    loaded conclusion not explicit in the Greek.
  doctrine_reference: Affirmations; Translation philosophy (do not import doctrinal
    claims the text does not make)
