theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title rather than a name-like form. In this ethical comparison,
    the phrase ἐν Χριστῷ is still transparently titular and thus rendered 'in the
    Messiah,' while preserving the traditional 'in Christ' in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
