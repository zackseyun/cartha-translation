id: EPH.4.32
reference: Ephesians 4:32
source:
  edition: SBLGNT
  text: ⸀γίνεσθε εἰς ἀλλήλους χρηστοί, εὔσπλαγχνοι, χαριζόμενοι ἑαυτοῖς καθὼς καὶ
    ὁ θεὸς ἐν Χριστῷ ἐχαρίσατο ⸀ὑμῖν.
translation:
  text: And be kind to one another, tenderhearted, forgiving one another, just as
    God in the Messiah also forgave you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: γίνεσθε
  chosen: be
  alternatives:
  - become
  lexicon: BDAG
  rationale: Present middle imperative, second plural. English idiom prefers 'be'
    here for an exhortation to ongoing character, though 'become' is possible. The
    imperative force is preserved.
- source_word: εἰς ἀλλήλους
  chosen: to one another
  alternatives:
  - toward one another
  - with one another
  lexicon: BDAG
  rationale: The phrase expresses relational direction. 'To one another' is natural
    modern English and preserves the reciprocal sense.
- source_word: χρηστοί
  chosen: kind
  alternatives:
  - good
  - benevolent
  - gracious
  lexicon: BDAG
  rationale: '''Kind'' best fits the interpersonal ethical context and standard usage
    in paraenesis.'
- source_word: εὔσπλαγχνοι
  chosen: tenderhearted
  alternatives:
  - compassionate
  - kindhearted
  lexicon: BDAG
  rationale: This term denotes deep compassion or heartfelt mercy. 'Tenderhearted'
    preserves the affective force and pairs well with 'kind' without collapsing the
    two adjectives into near-synonyms.
- source_word: χαριζόμενοι
  chosen: forgiving one another
  alternatives:
  - graciously giving to one another
  - showing grace to one another
  lexicon: BDAG
  rationale: In this context the participle carries the sense of forgiving/remitting
    offense, especially as confirmed by the following comparison with God's action.
    'Forgiving one another' is the clearest contextual rendering.
- source_word: ἑαυτοῖς
  chosen: one another
  alternatives:
  - yourselves
  lexicon: BDAG
  rationale: Though formally reflexive, in reciprocal plural contexts it commonly
    functions as 'one another.' This avoids awkward English and matches the mutual
    exhortation.
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - even as
  - as also
  lexicon: BDAG
  rationale: The combination marks comparison with an added emphatic correspondence.
    Rendering both elements preserves the rhetorical parallel between believers' forgiveness
    and God's forgiveness.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  - through the Messiah
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as title is translated 'Messiah' where context
    supports. 'In the Messiah' preserves the preposition ἐν rather than interpreting
    it more dynamically as 'through.'
- source_word: ἐχαρίσατο
  chosen: forgave
  alternatives:
  - graciously forgave
  - freely forgave
  - showed grace to
  lexicon: BDAG
  rationale: Aorist middle of χαρίζομαι here refers to God's act of forgiveness. 'Forgave'
    is the most direct and contextually appropriate rendering, while the grace nuance
    is already present in the verb's semantic background.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: English does not require the preposition here with 'forgave'; the indirect
    object is naturally rendered as 'you'.
