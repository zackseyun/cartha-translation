theological_decisions:
- issue: Rendering Paul's adapted citation of Psalm 68:18, especially the phrase about
    captives
  chosen_reading: Retain the vivid idiom 'he took captivity captive' in the main text
  alternative_readings:
  - he led captives captive
  - he captured a host of captives
  rationale: The phrase is rhetorically dense and allusive. Preserving the cognate
    expression keeps the Psalmic echo and avoids prematurely narrowing the image to
    one interpretive option. A more idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Gender rendering of τοῖς ἀνθρώποις
  chosen_reading: to men
  alternative_readings:
  - to people
  - to human beings
  rationale: The Greek noun is grammatically masculine plural but often generic. Because
    this is a citation-like phrase and the project prefers gender-accurate renderings
    over flattening to gender-neutral language, 'men' is kept in the main text, with
    a footnote clarifying the generic sense.
  doctrine_reference: Translation philosophy item 4
