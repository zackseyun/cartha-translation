id: EPH.4.8
reference: Ephesians 4:8
source:
  edition: SBLGNT
  text: διὸ λέγει· Ἀναβὰς εἰς ὕψος ᾐχμαλώτευσεν αἰχμαλωσίαν, ⸀ἔδωκεν δόματα τοῖς ἀνθρώποις.
translation:
  text: Therefore it says, “Having ascended on high, he took captivity captive, and
    gave gifts to men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he led captives captive” or “he captured a host of captives.” The Greek
      is a vivid cognate expression echoing Psalm 68:18.
    reason: lexical_alternative
  - marker: b
    text: “Men” here likely carries a generic sense, that is, human beings or people.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Inferential conjunction linking the quotation to Paul's preceding argument
    about grace given to each believer. 'Therefore' is natural modern English and
    preserves the logical force.
- source_word: λέγει
  chosen: it says
  alternatives:
  - he says
  - the Scripture says
  lexicon: BDAG
  rationale: The verb is present tense and lacks an explicit subject. In citation
    formulas Paul often uses an impersonal 'it says,' referring to Scripture. This
    avoids over-specifying beyond the Greek while remaining idiomatic.
- source_word: Ἀναβὰς
  chosen: Having ascended
  alternatives:
  - When he ascended
  - After ascending
  lexicon: BDAG
  rationale: Aorist participle best rendered with antecedent action relative to the
    main verbs. 'Having ascended' preserves the participial structure and temporal
    sequence without excessive paraphrase.
- source_word: εἰς ὕψος
  chosen: on high
  alternatives:
  - to the height
  - into the heights
  lexicon: BDAG
  rationale: This phrase echoes Psalm 68:18 and is idiomatically rendered 'on high'
    in English. It communicates exalted ascent without awkward literalism.
- source_word: ᾐχμαλώτευσεν
  chosen: took captive
  alternatives:
  - led captive
  - captured
  lexicon: BDAG
  rationale: The verb means to take or lead captive. In combination with the cognate
    object, 'took captive' preserves the verbal force and works well in English.
- source_word: αἰχμαλωσίαν
  chosen: captivity captive
  alternatives:
  - captives
  - a host of captives
  lexicon: BDAG
  rationale: The Greek uses a cognate accusative, literally 'captivity.' Rendering
    it as 'captivity captive' preserves the rhetorical intensity and the close echo
    of the Psalm. More idiomatic alternatives are possible, but this keeps the source-text
    texture.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - bestowed
  lexicon: BDAG
  rationale: Simple aorist verb of giving; 'gave' is the most direct and transparent
    rendering.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - gift-gifts
  - presents
  lexicon: BDAG
  rationale: Standard sense in this context, especially in light of the surrounding
    discussion of grace-gifts and ministry gifts.
- source_word: τοῖς ἀνθρώποις
  chosen: to men
  alternatives:
  - to people
  - to human beings
  lexicon: BDAG
  rationale: ἄνθρωποι can denote human beings generally, but here the phrase reproduces
    the wording of the citation. Per the project's gender-accurate policy, 'men' is
    retained where the source wording is masculine/generic and representative rather
    than individually male-specific; inclusivity can be clarified in a footnote.
