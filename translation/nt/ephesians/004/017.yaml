theological_decisions:
- issue: Rendering of ἔθνη in an ethical contrast addressed to a largely Gentile church
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  - pagans
  rationale: The term is ethnically and covenantally loaded in Paul. 'Gentiles' preserves
    that Pauline category without importing the stronger pejorative sense of 'pagans.'
    The verse contrasts former Gentile manner of life with new life in the Lord, not
    an ontological claim about all non-Jews in every respect.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of the infinitive περιπατεῖν after λέγω καὶ μαρτύρομαι
  chosen_reading: you must no longer walk
  alternative_readings:
  - that you no longer walk
  rationale: English idiom requires the exhortational force to be made explicit. 'Must'
    reflects apostolic moral urgency without adding a distinct theological category
    beyond the syntax's paraenetic force.
  doctrine_reference: Translation philosophy §6
