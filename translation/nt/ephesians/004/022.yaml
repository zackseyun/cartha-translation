theological_decisions:
- issue: Rendering of τὸν παλαιὸν ἄνθρωπον
  chosen_reading: the old man
  alternative_readings:
  - the old self
  - the old person
  rationale: The phrase is anthropological and representative, not restricted to males.
    However, the Greek is grammatically masculine and the project's philosophy prefers
    gender-accurate renderings over neutralization where representative force is intended.
    'Old self' is common in English tradition but obscures the lexical form ἄνθρωπος
    and weakens the Adamic/corporate resonance often present in Paul.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
- issue: Force of the infinitive ἀποθέσθαι in context
  chosen_reading: to put off
  alternative_readings:
  - that you put off
  - to have put off
  rationale: The infinitive depends on the preceding teaching context (v. 21) and
    introduces the content of what they were taught. English infinitive form preserves
    the Greek syntax without over-interpreting whether Paul emphasizes command, instruction
    content, or conversion event. This preserves theological tension rather than resolving
    it into a single aspectual reading.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve theological
    tension rather than resolve it)'
