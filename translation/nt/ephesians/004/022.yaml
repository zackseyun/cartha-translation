id: EPH.4.22
reference: Ephesians 4:22
source:
  edition: SBLGNT
  text: ἀποθέσθαι ὑμᾶς κατὰ τὴν προτέραν ἀναστροφὴν τὸν παλαιὸν ἄνθρωπον τὸν φθειρόμενον
    κατὰ τὰς ἐπιθυμίας τῆς ἀπάτης,
translation:
  text: to put off, with respect to your former way of life, the old man, which is
    being corrupted according to deceitful desires,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the old self.' Literally 'the old man.' The Greek uses a masculine representative
      expression for the former human mode of life.
    reason: alternative_reading
  - marker: b
    text: Literally 'the desires of deceit'; that is, desires shaped by deception.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποθέσθαι
  chosen: to put off
  alternatives:
  - to lay aside
  - to take off
  lexicon: BDAG
  rationale: Aorist middle infinitive meaning to remove or discard. 'Put off' preserves
    the clothing metaphor that continues in the context with 'put on' in v. 24, while
    remaining natural English.
- source_word: κατὰ τὴν προτέραν ἀναστροφὴν
  chosen: with respect to your former way of life
  alternatives:
  - according to your former way of life
  - as regards your former conduct
  lexicon: BDAG
  rationale: ἀναστροφή refers to conduct or manner of life. Here κατά is best taken
    as reference/sphere rather than strict norm, so 'with respect to' avoids awkwardness
    while keeping the connection to the former lifestyle.
- source_word: προτέραν
  chosen: former
  alternatives:
  - previous
  - earlier
  lexicon: BDAG
  rationale: '''Former'' is the most idiomatic modifier for a past manner of life
    in English and fits the contrast with the renewed life in the following verses.'
- source_word: ἀναστροφὴν
  chosen: way of life
  alternatives:
  - conduct
  - manner of life
  lexicon: BDAG
  rationale: The noun denotes one's behavior or way of living. 'Way of life' is more
    readable modern English than 'conduct' while preserving the ethical sense.
- source_word: τὸν παλαιὸν ἄνθρωπον
  chosen: the old man
  alternatives:
  - the old self
  - the old person
  lexicon: BDAG
  rationale: Literally 'the old man.' In Pauline usage this is a representative anthropological
    expression. Per the gender-accurate philosophy, the masculine form is retained
    rather than neutralized to 'self,' though the idiomatic sense is explained by
    context.
- source_word: φθειρόμενον
  chosen: which is being corrupted
  alternatives:
  - which is being ruined
  - which is perishing
  lexicon: BDAG
  rationale: Present passive participle describing an ongoing process of moral decay.
    'Is being corrupted' best captures the passive, progressive force and the ethical
    context.
- source_word: κατὰ τὰς ἐπιθυμίας
  chosen: according to ... desires
  alternatives:
  - in keeping with ... desires
  - by ... desires
  lexicon: BDAG
  rationale: Here κατά expresses standard or controlling influence. 'According to'
    is sufficiently literal and clear.
- source_word: ἐπιθυμίας
  chosen: desires
  alternatives:
  - lusts
  - cravings
  lexicon: BDAG
  rationale: The term can denote strong desires, often negative in moral contexts.
    'Desires' is accessible modern English and avoids narrowing the sense only to
    sexual lust.
- source_word: τῆς ἀπάτης
  chosen: deceitful
  alternatives:
  - of deceit
  - deception's
  lexicon: BDAG
  rationale: 'The genitive is rendered attributively in English: ''deceitful desires.''
    This is more natural than the wooden ''desires of deceit'' while preserving the
    idea that these desires are characterized by deception.'
