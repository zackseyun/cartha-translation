id: EPH.4.19
reference: Ephesians 4:19
source:
  edition: SBLGNT
  text: οἵτινες ἀπηλγηκότες ἑαυτοὺς παρέδωκαν τῇ ἀσελγείᾳ εἰς ἐργασίαν ἀκαθαρσίας
    πάσης ἐν πλεονεξίᾳ.
translation:
  text: who, having become callous, gave themselves over to sensuality for the practice
    of every kind of impurity with greediness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having lost all feeling' or 'being past feeling.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to debauchery' or 'to licentiousness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in greed' or 'with covetousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - such people
  - who indeed
  lexicon: BDAG
  rationale: Relative pronoun referring back to the Gentiles just mentioned; simple
    'who' is natural English and preserves the connection without adding emphasis
    beyond the Greek.
- source_word: ἀπηλγηκότες
  chosen: having become callous
  alternatives:
  - having lost all feeling
  - being past feeling
  lexicon: BDAG
  rationale: Perfect active participle from ἀπαλγέω denotes becoming insensitive or
    callous. 'Having become callous' preserves the resultant state implied by the
    perfect while using clear modern English. 'Lost all feeling' is possible but can
    sound merely emotional rather than moral insensibility.
- source_word: ἑαυτοὺς παρέδωκαν
  chosen: gave themselves over
  alternatives:
  - handed themselves over
  - delivered themselves up
  lexicon: BDAG
  rationale: The reflexive object plus παραδίδωμι conveys voluntary self-surrender
    to vice. 'Gave themselves over' is idiomatic and preserves the force of deliberate
    yielding.
- source_word: τῇ ἀσελγείᾳ
  chosen: to sensuality
  alternatives:
  - to debauchery
  - to licentiousness
  lexicon: BDAG
  rationale: ἀσέλγεια denotes shameless, unrestrained self-indulgence, often sexual.
    'Sensuality' is accessible modern English and fits the vice context. 'Debauchery'
    and 'licentiousness' are possible but either broader or less natural for contemporary
    readers.
- source_word: εἰς ἐργασίαν
  chosen: for the practice of
  alternatives:
  - for working
  - for the pursuit of
  lexicon: BDAG
  rationale: ἐργασία here means activity, practice, or pursuit rather than literal
    labor. 'For the practice of' captures purpose/result in idiomatic English.
- source_word: ἀκαθαρσίας πάσης
  chosen: every kind of impurity
  alternatives:
  - all impurity
  - every impurity
  lexicon: BDAG
  rationale: The genitive with πάσης is naturally rendered comprehensively. 'Every
    kind of impurity' communicates the distributive breadth and reads more naturally
    in English than the more wooden 'every impurity.'
- source_word: ἐν πλεονεξίᾳ
  chosen: with greediness
  alternatives:
  - in greed
  - with covetousness
  lexicon: BDAG
  rationale: πλεονεξία denotes greedy desire for more, often grasping excess. Here
    it likely modifies the manner in which impurity is practiced. 'With greediness'
    preserves the vice's insatiable quality. 'Covetousness' is possible but sounds
    narrower and more traditional than the immediate context suggests.
