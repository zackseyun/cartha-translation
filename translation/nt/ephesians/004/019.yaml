theological_decisions:
- issue: Moral-psychological force of ἀπηλγηκότες
  chosen_reading: The term is rendered as moral callousness rather than mere emotional
    numbness.
  alternative_readings:
  - having lost all sensitivity
  - being past feeling
  rationale: In context Paul describes ethical alienation and surrender to impurity.
    The translation should reflect hardened moral insensitivity without importing
    a clinical or purely emotional sense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Scope of ἀσέλγεια
  chosen_reading: Rendered broadly as 'sensuality' rather than narrowly as explicitly
    sexual sin alone.
  alternative_readings:
  - debauchery
  - licentiousness
  rationale: The Greek term often includes sexual shamelessness but can denote broader
    unrestrained self-indulgence. 'Sensuality' preserves that breadth while fitting
    the impurity context.
  doctrine_reference: Translation philosophy §1, §6
