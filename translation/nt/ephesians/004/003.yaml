theological_decisions:
- issue: Referent of πνεύματος
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the human spirit
  - a spirit of unity
  rationale: Within Ephesians, 'Spirit' in nearby contexts strongly refers to the
    Holy Spirit (cf. 4:4, 4:30). The phrase therefore points to unity produced or
    given by the Holy Spirit, which believers are exhorted to maintain rather than
    manufacture.
  doctrine_reference: Preserve theological tension rather than resolve it; where context
    strongly supports one reading, render accordingly and document the decision.
- issue: Nature of the unity
  chosen_reading: unity already given, to be maintained
  alternative_readings:
  - unity to be created by believers
  rationale: The infinitive τηρεῖν ('to keep') indicates guarding or maintaining an
    existing reality, not creating it. This avoids importing ecclesiological claims
    beyond the text while preserving Paul's wording.
  doctrine_reference: Original-language primacy over translation tradition; do not
    import doctrinal claims the text does not make.
