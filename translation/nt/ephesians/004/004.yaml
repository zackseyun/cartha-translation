theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a shared spiritual reality or disposition among believers
  rationale: Within Ephesians 4:4–6, the sequence 'one body ... one Spirit ... one
    Lord ... one God and Father' strongly supports a Trinitarian pattern. Capitalizing
    'Spirit' reflects that likely referent while avoiding doctrinal expansion beyond
    the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 preserve theological tension rather than resolve it beyond the text'
