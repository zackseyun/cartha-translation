id: EPH.4.4
reference: Ephesians 4:4
source:
  edition: SBLGNT
  text: ἓν σῶμα καὶ ἓν πνεῦμα, καθὼς καὶ ἐκλήθητε ἐν μιᾷ ἐλπίδι τῆς κλήσεως ὑμῶν·
translation:
  text: There is one body and one Spirit, just as you also were called in one hope
    of your calling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one spirit.' The Greek word can mean 'spirit' or 'Spirit'; here it most
      likely refers to the Holy Spirit in the context of the passage's unity formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἓν
  chosen: one
  lexicon: BDAG
  rationale: Repeated adjective emphasizing unity; rendered consistently as 'one'
    in each occurrence.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard gloss. In Ephesians this likely refers corporately to the unified
    body of believers, but the lexical rendering 'body' preserves the metaphor without
    over-interpreting.
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized as 'Spirit' because in this sevenfold unity context the referent
    is best understood as the Holy Spirit, not merely a human disposition. The Greek
    lacks capitalization, so the decision is interpretive and documented.
- source_word: καθὼς καὶ
  chosen: just as you also
  alternatives:
  - just as also
  - even as you were also
  lexicon: BDAG
  rationale: Renders the comparative force of καθώς and preserves καί with the addressee,
    linking the call of the readers to the prior affirmations of unity.
- source_word: ἐκλήθητε
  chosen: were called
  lexicon: BDAG
  rationale: Aorist passive indicative of καλέω; 'were called' preserves both tense/aspect
    in idiomatic English and the divine-passive sense without making the agent explicit.
- source_word: ἐν
  chosen: in
  alternatives:
  - to
  - with
  lexicon: BDAG
  rationale: The preposition is retained as 'in' to stay close to the Greek construction
    'in one hope,' rather than smoothing to 'to one hope.'
- source_word: μιᾷ ἐλπίδι
  chosen: one hope
  alternatives:
  - a single hope
  lexicon: BDAG
  rationale: Dative phrase rendered straightforwardly; 'one hope' matches the repeated
    unity motif.
- source_word: τῆς κλήσεως ὑμῶν
  chosen: of your calling
  alternatives:
  - belonging to your calling
  - to which you were called
  lexicon: BDAG
  rationale: Genitive is rendered as a possessive/associative phrase. 'Of your calling'
    is more formally transparent than restructuring the clause, and it preserves the
    lexical link with ἐκλήθητε/κλῆσις.
