theological_decisions:
- issue: Sense of 'grace' in context
  chosen_reading: '''Grace'' refers to individually apportioned gracious enablement/gift
    within the church, not saving grace in the narrow sense.'
  alternative_readings:
  - general divine favor
  - saving grace
  rationale: The immediate context moves from unity to differentiated ministry gifts
    (vv. 7–11). Rendering χάρις simply as 'grace' preserves Paul's wording while the
    documented rationale clarifies that the contextual sense is ministerial endowment
    rather than a statement limited to initial salvation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's contested-terms guidance specifies 'Messiah' where Χριστός
    functions as a title. This preserves the semantic content of the Greek rather
    than defaulting to the traditional transliteration.
  doctrine_reference: 'Contested terms: Χριστός Christos → Messiah (where title; Christ
    where name-like).'
