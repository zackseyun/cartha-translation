id: EPH.4.7
reference: Ephesians 4:7
source:
  edition: SBLGNT
  text: Ἑνὶ δὲ ἑκάστῳ ἡμῶν ἐδόθη ⸀ἡ χάρις κατὰ τὸ μέτρον τῆς δωρεᾶς τοῦ Χριστοῦ.
translation:
  text: But grace was given to each one of us according to the measure of the Messiah’s
    gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ’s gift.' The Greek title Χριστοῦ can be rendered 'Christ' where
      it functions more like a name, but here 'Messiah' preserves the title’s meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑνὶ ... ἑκάστῳ ἡμῶν
  chosen: to each one of us
  alternatives:
  - to every one of us
  - to each of us
  lexicon: BDAG
  rationale: The dative construction with both ἑνί and ἑκάστῳ is distributive and
    emphatic, stressing individual allocation within the whole community. 'Each one
    of us' preserves that emphasis more clearly than the slightly flatter 'each of
    us'.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding emphasis on
    unity (one body, one Spirit, etc.) to diversity in gifted grace. 'But' best signals
    that rhetorical turn in natural English.
- source_word: ἐδόθη
  chosen: was given
  alternatives:
  - has been given
  lexicon: BDAG
  rationale: The aorist passive is most naturally rendered as a simple past passive
    here. English present perfect is possible, but 'was given' stays closer to the
    Greek verbal form without losing sense.
- source_word: ἡ χάρις
  chosen: grace
  alternatives:
  - the grace
  - gracious gift
  - favor
  lexicon: BDAG
  rationale: χάρις in this context refers to grace as bestowed enablement for ministry
    within the body, not merely general favor. 'Grace' preserves Paul's theological
    vocabulary and allows the following phrase to specify its measured distribution.
    The article is not carried over because English idiom prefers anarthrous 'grace'
    here.
- source_word: κατὰ τὸ μέτρον
  chosen: according to the measure of
  alternatives:
  - in keeping with the measure of
  - to the measure of
  lexicon: BDAG
  rationale: κατά with the accusative here expresses standard or proportion. 'According
    to the measure of' is both accurate and idiomatic, preserving the idea that the
    gift is apportioned by a defined standard.
- source_word: τῆς δωρεᾶς
  chosen: gift
  alternatives:
  - free gift
  lexicon: BDAG
  rationale: δωρεά emphasizes a gift freely given. In English, 'gift' is sufficient
    and avoids redundancy beside 'grace was given.' The freeness of the gift remains
    implicit in the noun and the broader Pauline context.
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah’s
  alternatives:
  - Christ's
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the genitive denotes the gift belonging
    to or given by the Messiah, and the titular sense is still active.
