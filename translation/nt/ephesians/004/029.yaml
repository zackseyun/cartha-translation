id: EPH.4.29
reference: Ephesians 4:29
source:
  edition: SBLGNT
  text: πᾶς λόγος σαπρὸς ἐκ τοῦ στόματος ὑμῶν μὴ ἐκπορευέσθω, ἀλλὰ εἴ τις ἀγαθὸς πρὸς οἰκοδομὴν τῆς χρείας, ἵνα δῷ χάριν τοῖς ἀκούουσιν.
translation:
  text: Let no rotten word come out of your mouth, but only such as is good for building up according to the need, so that it may give grace to those who hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no corrupt talk' or 'no unwholesome word.' The Greek literally says 'no rotten word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the need' or 'as fits the occasion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that it may give benefit to those who hear.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for building up as the need requires'.
    reason: previous_rendering
lexical_decisions:
- source_word: πᾶς λόγος σαπρὸς
  chosen: no rotten word
  alternatives:
  - no corrupt talk
  - no unwholesome word
  - no foul word
  lexicon: BDAG
  rationale: πᾶς with the singular noun under negation has a distributive sense, effectively 'no ... at all.' λόγος here refers to speech/utterance rather than abstract 'word' alone. σαπρός literally means 'rotten, decayed' and is used metaphorically for bad or harmful speech; 'rotten' preserves the vivid metaphor better than the more interpretive 'unwholesome' or the tradition-shaped 'corrupt talk'.
- source_word: ἐκ τοῦ στόματος ὑμῶν
  chosen: out of your mouth
  alternatives:
  - from your mouth
  - out of your mouths
  lexicon: BDAG
  rationale: A natural English singular collective best reflects the idiom while preserving the bodily metaphor of speech proceeding from the mouth.
- source_word: μὴ ἐκπορευέσθω
  chosen: let ... come out
  alternatives:
  - let ... proceed
  - let ... go out
  lexicon: BDAG
  rationale: The present middle/passive imperative with μή gives a prohibition. 'Come out' is idiomatic modern English for speech issuing forth, less stiff than 'proceed' while still faithful to the image.
- source_word: ἀλλὰ εἴ τις ἀγαθὸς
  chosen: but only such as is good
  alternatives:
  - but if any is good
  - but whatever is good
  - but only what is good
  lexicon: BDAG
  rationale: The elliptical construction contrasts prohibited speech with permitted speech. English requires smoothing; 'but only such as is good' preserves the singular sense tied to λόγος while reading naturally.
- source_word: πρὸς οἰκοδομὴν
  chosen: for building up
  alternatives:
  - for edification
  - for strengthening
  lexicon: BDAG
  rationale: οἰκοδομή is literally 'building' and metaphorically 'edification.' 'Building up' preserves the metaphor in accessible modern English better than the ecclesiastical term 'edification'.
- source_word: τῆς χρείας
  chosen: as the need requires
  alternatives:
  - according to the need
  - for the need
  - as fits the occasion
  lexicon: BDAG
  rationale: χρεία means need, necessity, practical requirement. The genitive with οἰκοδομήν is somewhat compressed; the sense is speech suited to the present need. 'As the need requires' makes the relation clear without overparaphrasing. 'As fits the occasion' is possible but shifts from need to circumstance.
- source_word: ἵνα δῷ χάριν
  chosen: so that it may give grace
  alternatives:
  - so that it may give benefit
  - so that it may give favor
  lexicon: BDAG
  rationale: χάρις can denote grace, favor, or benefit. Here the phrase likely means speech that conveys gracious benefit to hearers. 'Give grace' keeps the theological and relational resonance of χάρις and avoids flattening it to mere usefulness.
- source_word: τοῖς ἀκούουσιν
  chosen: to those who hear
  alternatives:
  - to the hearers
  - to those listening
  lexicon: BDAG
  rationale: The present participle denotes those hearing/listening. 'Those who hear' is natural and broad, fitting both immediate listeners and hearers generally.
