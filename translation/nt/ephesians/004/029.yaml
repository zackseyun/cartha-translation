  from: for building up as the need requires
  to: for building up according to the need
  rationale: The current rendering is grammatically correct but slightly clunky. The phrase 'as the need requires' is a bit wordy to unpack the genitive 'τῆς χρείας'. A more concise and idiomatic English rendering like 'according to the need' would capture the same meaning with better flow, mirroring the compactness of the Greek more effectively.
