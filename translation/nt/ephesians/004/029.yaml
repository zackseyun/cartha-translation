theological_decisions:
- issue: Rendering χάριν in an ethical exhortation context
  chosen_reading: grace
  alternative_readings:
  - benefit
  - favor
  rationale: The verse concerns speech that positively affects others. While χάρις can mean 'benefit,' rendering it 'grace' preserves Paul's characteristic vocabulary and allows the ethical force to remain connected to divine-like graciousness without importing a stronger doctrinal claim than the text makes.
  doctrine_reference: Translation philosophy §§1, 6
