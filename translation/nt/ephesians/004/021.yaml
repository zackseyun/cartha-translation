theological_decisions:
- issue: Whether αὐτὸν ἠκούσατε should be rendered more interpretively as 'heard about
    him' or more directly as 'heard him.'
  chosen_reading: heard him
  alternative_readings:
  - heard about him
  rationale: The direct object favors 'heard him.' This also preserves Paul's elevated
    Christology and the immediacy of apostolic proclamation without importing a stronger
    mystical claim than the text itself makes. The alternative is worth preserving
    because many English versions smooth the expression idiomatically.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to represent the repeated ἐν phrases ('ἐν αὐτῷ' and 'ἐν τῷ Ἰησοῦ').
  chosen_reading: in him / in Jesus
  alternative_readings:
  - by him / in union with Jesus
  rationale: Rendering both with 'in' preserves the theological and linguistic tension
    of Pauline union language rather than resolving it into mere agency or paraphrase.
    This follows the instruction to preserve theological tension where the source
    is capable of more than one nuance.
  doctrine_reference: Translation philosophy §3
