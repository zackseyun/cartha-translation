id: EPH.4.21
reference: Ephesians 4:21
source:
  edition: SBLGNT
  text: εἴ γε αὐτὸν ἠκούσατε καὶ ἐν αὐτῷ ἐδιδάχθητε, καθώς ἐστιν ἀλήθεια ἐν τῷ Ἰησοῦ,
translation:
  text: if indeed you heard him and were taught in him, just as truth is in Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you heard about him.' The Greek more literally says 'you heard him,'
      likely reflecting the idea that in the apostolic message they truly heard Christ
      himself.
    reason: alternative_reading
  - marker: b
    text: '''In him'' and ''in Jesus'' may express sphere, union, or close association;
      the Greek leaves the nuance broader than a simple ''by him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  chosen: if indeed
  alternatives:
  - if surely
  - assuming that
  - since indeed
  lexicon: BDAG
  rationale: The combination introduces a condition with a rhetorical nuance that
    assumes the condition for the sake of argument or mild affirmation. 'If indeed'
    preserves the Greek form and the slightly emphatic force of γε without overcommitting
    to a causal 'since.'
- source_word: αὐτὸν ἠκούσατε
  chosen: you heard him
  alternatives:
  - you heard about him
  - you listened to him
  lexicon: BDAG
  rationale: The direct object αὐτόν naturally yields 'heard him.' Although some take
    this idiomatically as 'heard about him,' the Greek does not include a preposition
    such as περὶ, and the direct-object construction is striking in context, likely
    implying hearing Christ proclaimed so truly that it is tantamount to hearing him.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: BDAG
  rationale: The preposition ἐν with the dative most straightforwardly means 'in him.'
    In Pauline usage this can denote sphere or union rather than simple agency. 'By
    him' would interpret the phrase more instrumentally than the Greek requires.
- source_word: ἐδιδάχθητε
  chosen: were taught
  alternatives:
  - were instructed
  lexicon: BDAG
  rationale: The passive aorist is best represented by 'were taught.' 'Instructed'
    is possible but slightly less direct and less consistent with common NT diction.
- source_word: καθώς
  chosen: just as
  alternatives:
  - as
  - in accordance with how
  lexicon: BDAG
  rationale: '''Just as'' preserves the comparative force linking the readers'' instruction
    with the truth located in Jesus.'
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - the truth
  - reality
  lexicon: BDAG
  rationale: Anarthrous ἀλήθεια is naturally rendered 'truth' rather than 'the truth'
    here. The sense is not mere abstraction but truth as embodied or found in Jesus;
    still, the simple English 'truth' best matches the Greek wording.
- source_word: ἐν τῷ Ἰησοῦ
  chosen: in Jesus
  alternatives:
  - in union with Jesus
  - in the person of Jesus
  lexicon: BDAG
  rationale: Paul's use of the personal name 'Jesus' rather than a title is notable
    and should be preserved. 'In Jesus' is formally close and leaves intact the rich
    Pauline sense of location, sphere, and embodiment without overexplication.
