theological_decisions:
- issue: Interpretation of εἰς τὰ κατώτερα μέρη τῆς γῆς
  chosen_reading: Render the phrase transparently as 'into the lower parts of the
    earth' without specifying whether it refers to the earth in contrast to heaven,
    the grave/realm of the dead, or the incarnation more broadly.
  alternative_readings:
  - into the lower regions, namely the earth
  - into the lower parts of the earth, i.e., the realm of the dead
  rationale: The phrase is genuinely disputed, and the Greek permits more than one
    construal. In keeping with the translation philosophy, the main text preserves
    the ambiguity rather than resolving it toward a specific doctrinal interpretation
    such as the descent to Hades. A footnote preserves the major alternative construals.
  doctrine_reference: Preserve theological tension rather than resolve it.
