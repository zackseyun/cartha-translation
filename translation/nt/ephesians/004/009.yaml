id: EPH.4.9
reference: Ephesians 4:9
source:
  edition: SBLGNT
  text: τὸ δὲ Ἀνέβη τί ἐστιν εἰ μὴ ὅτι καὶ ⸀κατέβη εἰς τὰ κατώτερα μέρη τῆς γῆς;
translation:
  text: Now what does “he ascended” mean except that he also descended into the lower
    parts of the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the lower regions, namely the earth”; the phrase may refer simply
      to descent to earth, or more specifically to the realm of the dead.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀνέβη
  chosen: he ascended
  alternatives:
  - he went up
  lexicon: BDAG
  rationale: Aorist active indicative of ἀναβαίνω, echoing the citation and preserving
    the vertical movement imagery. 'Ascended' is the natural English equivalent in
    this theological context and matches the paired contrast with 'descended.'
- source_word: τί ἐστιν εἰ μὴ ὅτι
  chosen: what does ... mean except that
  alternatives:
  - what is it except that
  - what does it imply except that
  lexicon: BDAG
  rationale: This idiom introduces an inference from the quoted word 'ascended.' 'What
    does ... mean except that' is idiomatic modern English that preserves the argumentative
    force without woodenly reproducing Greek structure.
- source_word: καὶ κατέβη
  chosen: he also descended
  alternatives:
  - he too descended
  lexicon: BDAG
  rationale: The καί is additive and should be retained. 'Also descended' preserves
    the parallel with 'ascended' and the logic that ascent implies a prior descent.
- source_word: εἰς
  chosen: into
  alternatives:
  - to
  lexicon: BDAG
  rationale: εἰς normally marks movement into. 'Into' better preserves the directional
    force than the weaker 'to.'
- source_word: τὰ κατώτερα μέρη
  chosen: the lower parts
  alternatives:
  - the lower regions
  - the lower places
  lexicon: BDAG
  rationale: κατώτερα is comparative ('lower'), and μέρη means 'parts/regions.' 'The
    lower parts' is a relatively formal rendering that keeps the phrase open-ended
    rather than prematurely interpreting it as the underworld or simply the earth.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  - namely, the earth
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here 'earth' best fits the cosmic ascent/descent
    contrast in context. The genitive is left as 'of the earth,' preserving the ambiguity
    of whether it is a partitive genitive ('the lower parts of the earth') or an appositional
    sense ('the lower parts, that is, the earth').
