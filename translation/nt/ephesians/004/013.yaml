theological_decisions:
- issue: Meaning of τῆς πίστεως
  chosen_reading: the shared Christian faith
  alternative_readings:
  - subjective faith or trust exercised by believers
  rationale: 'The article and the corporate-growth context favor an objective or communal
    sense: unity in the faith confessed by the church. The main text preserves the
    Greek wording without over-explication.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table
    for πίστις'
- issue: Rendering of εἰς ἄνδρα τέλειον
  chosen_reading: to a mature man
  alternative_readings:
  - to mature manhood
  - to a perfect man
  rationale: The Greek uses ἀνήρ, a masculine singular image for the corporate body
    reaching maturity. Following the gender-accurate principle, the masculine image
    is retained in the main text, while a footnote preserves a more idiomatic corporate
    alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Rendering of Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in a theological context about the church's
    growth into the fullness belonging to God's Anointed One. The project's default
    is 'Messiah' where title is in view.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2; Contested terms table
    for Χριστός'
