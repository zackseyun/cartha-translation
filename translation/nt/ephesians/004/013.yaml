id: EPH.4.13
reference: Ephesians 4:13
source:
  edition: SBLGNT
  text: μέχρι καταντήσωμεν οἱ πάντες εἰς τὴν ἑνότητα τῆς πίστεως καὶ τῆς ἐπιγνώσεως
    τοῦ υἱοῦ τοῦ θεοῦ, εἰς ἄνδρα τέλειον, εἰς μέτρον ἡλικίας τοῦ πληρώματος τοῦ Χριστοῦ,
translation:
  text: until we all attain to the unity of the faith and of the knowledge of the
    Son of God, to a mature man, to the measure of the stature of the fullness of
    the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of faith.' The phrase may emphasize either the shared body of Christian
      belief ('the faith') or believers' faith more generally.
    reason: alternative_reading
  - marker: b
    text: Or 'full knowledge' or 'deep knowledge.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to mature manhood.' The Greek literally says 'to a mature man,' using
      a masculine singular image for the corporate maturity of the whole church.
    reason: lexical_alternative
  - marker: d
    text: Or 'maturity' for 'stature.'
    reason: lexical_alternative
  - marker: e
    text: Greek 'Christ.' Here rendered 'Messiah' because the title sense is prominent.
    reason: alternative_reading
lexical_decisions:
- source_word: μέχρι
  chosen: until
  alternatives:
  - until such time as
  - until finally
  lexicon: BDAG
  rationale: Marks the goal or terminus of the equipping process from the previous
    verse; simple 'until' is natural and sufficiently precise.
- source_word: καταντήσωμεν
  chosen: we all attain
  alternatives:
  - we arrive
  - we reach
  lexicon: BDAG
  rationale: Aorist subjunctive after μέχρι expresses the intended goal. 'Attain'
    fits the metaphorical sense of arriving at a spiritual objective better than the
    more spatial 'arrive.' 'We all' is brought into English with the explicit subject
    phrase οἱ πάντες.
- source_word: οἱ πάντες
  chosen: we all
  alternatives:
  - all of us
  lexicon: BDAG
  rationale: Explicitly includes the whole believing community. 'We all' is idiomatic
    and preserves the inclusive force of the Greek.
- source_word: εἰς τὴν ἑνότητα
  chosen: to the unity
  alternatives:
  - into unity
  - to unity
  lexicon: BDAG
  rationale: Retains the repeated εἰς structure and the telic sense. The article suggests
    a definite, recognizable unity rather than a vague state.
- source_word: τῆς πίστεως
  chosen: of the faith
  alternatives:
  - of faith
  lexicon: BDAG
  rationale: Given the article and Pauline usage, 'the faith' likely denotes the shared
    Christian faith/belief rather than mere subjective believing. This also preserves
    the contested term πίστις with its default rendering 'faith' per doctrine guidance.
- source_word: ἐπιγνώσεως
  chosen: knowledge
  alternatives:
  - full knowledge
  - deep knowledge
  - recognition
  lexicon: BDAG
  rationale: ἐπίγνωσις can carry an intensified sense, but 'knowledge' is clear modern
    English and avoids over-specifying beyond what the immediate context requires.
    The fuller nuance is preserved in alternatives.
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  chosen: of the Son of God
  lexicon: BDAG
  rationale: Straightforward genitival construction identifying the object of knowledge.
    The christological title should be translated, not paraphrased.
- source_word: εἰς ἄνδρα τέλειον
  chosen: to a mature man
  alternatives:
  - to a perfect man
  - to mature manhood
  - to a full-grown man
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man,' not generic 'person,' and doctrine calls
    for gender-accurate rendering where the Greek is masculine with representative
    force. τέλειος here is best rendered 'mature' rather than 'perfect,' since the
    context is corporate growth toward completeness. A footnote preserves the more
    idiomatic but less formally gendered alternative 'mature manhood.'
- source_word: μέτρον
  chosen: measure
  alternatives:
  - standard
  lexicon: BDAG
  rationale: Keeps the metaphor of measured fullness and growth. 'Standard' is interpretive;
    'measure' is closer to the Greek.
- source_word: ἡλικίας
  chosen: stature
  alternatives:
  - maturity
  - age
  lexicon: BDAG
  rationale: In this growth context, ἡλικία can denote mature stature/development.
    'Stature' preserves the bodily-growth metaphor better than the abstract 'maturity,'
    though that remains a viable interpretive alternative.
- source_word: τοῦ πληρώματος
  chosen: of the fullness
  alternatives:
  - of the full measure
  - of fullness
  lexicon: BDAG
  rationale: Pauline πλήρωμα is theologically weighty; 'fullness' preserves that resonance
    without flattening it into a paraphrase.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where functioning as a title.
    Here it is titular and theological rather than merely name-like.
