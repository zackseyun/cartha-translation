theological_decisions:
- issue: Syntactical relation of the three prepositional phrases
  chosen_reading: 'All three phrases are rendered as coordinate purpose phrases: the
    gifted leaders are given for equipping the saints, for the work of ministry, and
    for the building up of the body of the Messiah.'
  alternative_readings:
  - The saints are equipped for the work of ministry, which in turn results in the
    building up of the body of the Messiah.
  rationale: The Greek sequence πρός ... εἰς ... εἰς can be read either as three coordinate
    goals or as a progression. The wording chosen preserves the Greek structure without
    over-interpreting the syntax. This avoids importing a denominational argument
    about whether ministry belongs primarily to leaders or to the whole church, while
    still allowing the natural implication that the saints participate in ministry.
  doctrine_reference: Preserve theological tension rather than resolve it.
