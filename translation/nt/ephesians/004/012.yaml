id: EPH.4.12
reference: Ephesians 4:12
source:
  edition: SBLGNT
  text: πρὸς τὸν καταρτισμὸν τῶν ἁγίων εἰς ἔργον διακονίας, εἰς οἰκοδομὴν τοῦ σώματος
    τοῦ Χριστοῦ,
translation:
  text: for the equipping of the saints for the work of ministry, for the building
    up of the body of the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for work of service.' The Greek διακονία can mean 'service' or 'ministry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'of Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its titular sense.
    reason: alternative_reading
  - marker: c
    text: 'The Greek may also be understood progressively: ''to equip the saints for
      the work of ministry, for building up the body of the Messiah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς
  chosen: for
  alternatives:
  - toward
  - for the purpose of
  lexicon: BDAG
  rationale: In this purpose/result chain following the gift of ministers in v.11,
    πρός with the accusative is best rendered idiomatically as 'for,' expressing purpose.
- source_word: καταρτισμὸν
  chosen: equipping
  alternatives:
  - preparation
  - perfecting
  lexicon: BDAG
  rationale: καταρτισμός denotes equipping, preparing, or making fit. 'Equipping'
    is clear modern English and fits the ministry context better than the traditional
    but potentially misleading 'perfecting.'
- source_word: τῶν ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is Paul's standard term for believers as those set apart to God.
    'The saints' preserves the established Pauline term without importing a later
    canonization sense; 'holy ones' is possible but less natural in English.
- source_word: εἰς ἔργον διακονίας
  chosen: for the work of ministry
  alternatives:
  - for work of service
  - for the work of service
  lexicon: BDAG
  rationale: διακονία can mean service or ministry. Here 'ministry' fits the ecclesial
    context and preserves the breadth of service rendered in the church. The singular
    'work' reflects the Greek singular ἔργον.
- source_word: διακονίας
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: While 'service' is a valid gloss, 'ministry' better matches the context
    of gifted persons serving the church's growth, without restricting the term to
    clergy.
- source_word: οἰκοδομὴν
  chosen: building up
  alternatives:
  - edification
  - upbuilding
  lexicon: BDAG
  rationale: οἰκοδομή is metaphorical here for strengthening or constructing the community.
    'Building up' is both transparent to the metaphor and readable modern English;
    'edification' is more traditional but more ecclesiastical.
- source_word: τοῦ σώματος
  chosen: the body
  lexicon: BDAG
  rationale: σῶμα is straightforwardly 'body' and in Pauline usage here refers metaphorically
    to the corporate people of God.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title. Here the genitive is titular, identifying whose body is in view, so
    'Messiah' is preferred while preserving 'Christ' as an alternative.
