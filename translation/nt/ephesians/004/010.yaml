theological_decisions:
- issue: Referent of the descending and ascending one
  chosen_reading: The verse speaks of the same person in both descent and ascent,
    with emphatic identity preserved in translation.
  alternative_readings:
  - A less emphatic rendering that simply states sequence without highlighting identity
  rationale: The explicit αὐτός and the repeated articular participles stress that
    the one who descended is identical to the one who ascended. The translation preserves
    this christological emphasis without adding explanatory material beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
- issue: Scope of τὰ πάντα
  chosen_reading: Rendered as 'all things' to preserve the text's comprehensive scope.
  alternative_readings:
  - everything
  - all people
  - the whole universe
  rationale: The phrase is intentionally broad. Restricting it to people or expanding
    it paraphrastically to 'the whole universe' would resolve ambiguity the Greek
    leaves open. The translation preserves the theological breadth and tension.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
