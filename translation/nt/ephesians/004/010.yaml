id: EPH.4.10
reference: Ephesians 4:10
source:
  edition: SBLGNT
  text: ὁ καταβὰς αὐτός ἐστιν καὶ ὁ ἀναβὰς ὑπεράνω πάντων τῶν οὐρανῶν, ἵνα πληρώσῃ
    τὰ πάντα.
translation:
  text: The one who descended is himself also the one who ascended far above all the
    heavens, so that he might fill all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above all the heavens.' The phrase may emphasize exaltation above every
      heavenly realm.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that he might fulfill all things.' The Greek verb can in some contexts
      mean 'fulfill,' but 'fill' better fits the immediate context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καταβὰς
  chosen: the one who descended
  alternatives:
  - he who descended
  - the one having descended
  lexicon: BDAG
  rationale: Articular aorist participle used substantivally; English idiom is best
    represented by 'the one who descended.' A simple past relative clause is more
    natural than a participial form while preserving the referential force.
- source_word: αὐτός
  chosen: is himself also
  alternatives:
  - is also
  - is the same one who also
  lexicon: BDAG
  rationale: αὐτός is emphatic here, stressing identity between the one who descended
    and the one who ascended. 'Himself' preserves the emphasis without overexpanding
    the clause.
- source_word: ὁ ἀναβὰς
  chosen: the one who ascended
  alternatives:
  - he who ascended
  - the one having ascended
  lexicon: BDAG
  rationale: Parallel to ὁ καταβὰς; the substantival participle is rendered consistently
    as 'the one who ascended.'
- source_word: ὑπεράνω
  chosen: far above
  alternatives:
  - above
  - over
  lexicon: BDAG
  rationale: In this exaltation context, ὑπεράνω conveys superiority beyond or above.
    'Far above' captures the intensive spatial/supremacy sense idiomatically in English.
- source_word: πάντων τῶν οὐρανῶν
  chosen: all the heavens
  alternatives:
  - all the heavenlies
  - all the heavens/heaven
  lexicon: BDAG
  rationale: The plural οὐρανῶν is retained as 'heavens,' matching the Greek number
    and avoiding flattening the cosmological expression. 'All the heavens' reflects
    πάντων with the plural noun.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα introduces purpose here. 'So that' is natural modern English and
    preserves purposive force.
- source_word: πληρώσῃ
  chosen: he might fill
  alternatives:
  - he might fulfill
  - he might fill up
  lexicon: BDAG
  rationale: πληρόω here most naturally means 'fill' in the sense of pervading or
    bringing fullness, not merely 'fulfill' a prediction. 'Might fill' reflects the
    aorist subjunctive under ἵνα.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: BDAG
  rationale: The neuter plural phrase is broad and comprehensive. 'All things' preserves
    the scope and theological resonance without importing a narrower or more interpretive
    gloss.
