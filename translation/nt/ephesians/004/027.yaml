theological_decisions:
- issue: Whether διάβολος should be rendered as a common noun ('slanderer') or the
    personal evil being ('the devil')
  chosen_reading: the devil
  alternative_readings:
  - the slanderer
  rationale: In Pauline paraenesis this expression conventionally refers to the personal
    adversary rather than merely to human slander. Rendering it 'the devil' reflects
    the likely referent without expanding the text beyond its wording.
  doctrine_reference: Affirmations; Translation philosophy §1
