id: EPH.4.27
reference: Ephesians 4:27
source:
  edition: SBLGNT
  text: μηδὲ δίδοτε τόπον τῷ διαβόλῳ.
translation:
  text: and do not give the devil an opportunity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'place' or 'room'; the Greek literally says, 'do not give place to the
      devil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  chosen: and do not
  alternatives:
  - nor
  - and not
  lexicon: BDAG
  rationale: In context this conjunction continues the preceding exhortations, so
    'and do not' naturally carries the connective force into English better than a
    bare 'nor' while preserving the prohibition.
- source_word: δίδοτε
  chosen: give
  alternatives:
  - grant
  - allow
  lexicon: BDAG
  rationale: The present imperative of δίδωμι is straightforwardly 'give.' English
    idiom with τόπον favors 'give ... an opportunity/place,' so 'give' is retained
    rather than a more interpretive verb.
- source_word: τόπον
  chosen: opportunity
  alternatives:
  - place
  - room
  - foothold
  lexicon: BDAG
  rationale: Literally 'place,' but in this idiom it means scope or occasion for action.
    'Opportunity' communicates the sense clearly in modern English without importing
    the more interpretive military metaphor 'foothold.' The literal alternative is
    worth preserving in a footnote.
- source_word: τῷ διαβόλῳ
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: With the article and in this context, διάβολος functions as the personal
    designation for Satan, so 'the devil' is the standard and contextually appropriate
    rendering. Although the lexical root relates to slander, that sense is not primary
    here.
