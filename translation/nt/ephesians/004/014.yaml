theological_decisions:
- issue: Rendering διδασκαλία
  chosen_reading: teaching
  alternative_readings:
  - doctrine
  rationale: No doctrinally contested term is involved, but 'teaching' better fits
    the translation philosophy's preference for readable modern English without flattening
    meaning. The verse warns against destabilizing instruction generally, not only
    formal doctrinal systems.
  doctrine_reference: Translation philosophy §6
- issue: Rendering πλάνη
  chosen_reading: error
  alternative_readings:
  - deceit
  - deception
  rationale: The noun can denote both wandering/error and the deceptive force behind
    it. 'Error' preserves the semantic breadth and avoids importing a narrower claim
    about intentionality, while the surrounding terms already express deliberate human
    deception.
  doctrine_reference: Translation philosophy §3
