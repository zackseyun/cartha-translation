id: EPH.4.14
reference: Ephesians 4:14
source:
  edition: SBLGNT
  text: ἵνα μηκέτι ὦμεν νήπιοι, κλυδωνιζόμενοι καὶ περιφερόμενοι παντὶ ἀνέμῳ τῆς διδασκαλίας
    ἐν τῇ κυβείᾳ τῶν ἀνθρώπων ἐν πανουργίᾳ πρὸς τὴν μεθοδείαν τῆς πλάνης,
translation:
  text: so that we may no longer be children, tossed by waves and carried about by
    every wind of teaching, by human trickery, by craftiness toward the scheming of
    error,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by every wind of doctrine.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the dice-playing of men,' an image for cheating or trickery.
    reason: cultural_note
  - marker: c
    text: Or 'toward the scheming of deceit/deception.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result from the previous clause. 'So that' is natural
    modern English while preserving the telic force.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating cessation of a former state.
- source_word: ὦμεν
  chosen: we may be
  alternatives:
  - we should be
  - we are
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is best represented with 'may be' in English
    to preserve the purpose nuance.
- source_word: νήπιοι
  chosen: children
  alternatives:
  - infants
  - little children
  lexicon: BDAG
  rationale: Metaphorical for immaturity. 'Children' is idiomatic and readable; 'infants'
    is possible but sounds overly literal in English here.
- source_word: κλυδωνιζόμενοι
  chosen: tossed by waves
  alternatives:
  - storm-tossed
  - tossed to and fro
  lexicon: BDAG
  rationale: The verb evokes being battered by surf/waves. 'Tossed by waves' preserves
    the maritime image more transparently than the traditional but less explicit 'tossed
    to and fro'.
- source_word: περιφερόμενοι
  chosen: carried about
  alternatives:
  - blown around
  - carried here and there
  lexicon: BDAG
  rationale: Keeps the passive sense of being moved around from place to place, complementing
    the wind metaphor.
- source_word: παντὶ ἀνέμῳ τῆς διδασκαλίας
  chosen: by every wind of teaching
  alternatives:
  - by every wind of doctrine
  - by every teaching-wind
  lexicon: BDAG
  rationale: διδασκαλία is 'teaching.' 'Doctrine' is traditional but can sound more
    technical or ecclesiastical than the Greek requires. The genitive is rendered
    naturally as 'wind of teaching.'
- source_word: ἐν τῇ κυβείᾳ τῶν ἀνθρώπων
  chosen: by human trickery
  alternatives:
  - in the dice-playing of men
  - in human deceit
  - by the trickery of people
  lexicon: BDAG
  rationale: κυβεία literally refers to dice-playing and by extension cheating/trickery.
    The idiomatic sense here is deceptive manipulation, so 'human trickery' communicates
    the metaphor's force in clear English.
- source_word: ἐν πανουργίᾳ
  chosen: by craftiness
  alternatives:
  - in cunning
  - by cunning
  lexicon: BDAG
  rationale: πανουργία denotes unscrupulous cunning. 'Craftiness' is concise and preserves
    the negative moral sense.
- source_word: πρὸς τὴν μεθοδείαν τῆς πλάνης
  chosen: toward the scheming of error
  alternatives:
  - for the scheming of deceit
  - toward the strategy of deception
  - unto the systematized deceit
  lexicon: BDAG
  rationale: μεθοδεία suggests a deliberate scheme or method; πλάνη denotes error/deception/wandering.
    'Scheming of error' preserves the genitival relation without overinterpreting
    whether the emphasis is falsehood itself or the act of deceiving. 'Toward' reflects
    πρός, though the phrase remains difficult and compressed in Greek.
