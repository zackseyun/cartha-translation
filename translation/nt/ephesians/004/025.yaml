id: EPH.4.25
reference: Ephesians 4:25
source:
  edition: SBLGNT
  text: Διὸ ἀποθέμενοι τὸ ψεῦδος λαλεῖτε ἀλήθειαν ἕκαστος μετὰ τοῦ πλησίον αὐτοῦ,
    ὅτι ἐσμὲν ἀλλήλων μέλη.
translation:
  text: Therefore, having put away falsehood, let each one speak truth with his neighbor,
    because we are members of one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “having put away the lie.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding exhortation;
    'Therefore' is natural and preserves the logical force.
- source_word: ἀποθέμενοι
  chosen: having put away
  alternatives:
  - putting away
  - having laid aside
  lexicon: BDAG
  rationale: Aorist middle participle with imperatival context, best rendered as an
    attendant circumstance/precondition to the main command. 'Having put away' preserves
    the completed-renunciatory sense.
- source_word: τὸ ψεῦδος
  chosen: falsehood
  alternatives:
  - the lie
  - lying
  lexicon: BDAG
  rationale: The articular singular can denote falsehood/lying as a category rather
    than one specific lie. 'Falsehood' captures the broader ethical vice in context.
    The alternative 'the lie' is possible and worth preserving because of the article
    and possible collective sense.
- source_word: λαλεῖτε
  chosen: let each one speak
  alternatives:
  - speak
  - keep speaking
  lexicon: BDAG
  rationale: Present active imperative, second person plural. The command is distributed
    by ἕκαστος, so English idiom brings that distributive force forward as 'let each
    one speak.'
- source_word: ἀλήθειαν
  chosen: truth
  alternatives:
  - what is true
  lexicon: BDAG
  rationale: Direct object of the imperative; 'truth' is the most direct and idiomatic
    rendering, echoing the ethical contrast with falsehood.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every one
  lexicon: BDAG
  rationale: Distributive singular applied to the plural audience. 'Each one' preserves
    the individual obligation within the corporate command.
- source_word: μετὰ τοῦ πλησίον αὐτοῦ
  chosen: with his neighbor
  alternatives:
  - with his fellow man
  - with the one near him
  lexicon: BDAG
  rationale: μετά with genitive means association ('with'). πλησίον here means 'neighbor'
    in the ethical/social sense. The masculine singular pronoun is retained as representative/generic
    per gender-accurate philosophy.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the command. 'Because' is clear modern English
    and preserves the causal force.
- source_word: ἐσμὲν ἀλλήλων μέλη
  chosen: we are members of one another
  alternatives:
  - we are parts of one another
  - we belong to one another as members
  lexicon: BDAG
  rationale: μέλη is literally 'members/limbs,' here metaphorical for the church's
    interdependence. 'Members of one another' preserves the body imagery without over-paraphrase.
