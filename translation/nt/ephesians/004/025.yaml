theological_decisions:
- issue: Gendered distributive language in ethical exhortation
  chosen_reading: Retain representative singular in 'each one ... with his neighbor'
  alternative_readings:
  - let each person speak truth with their neighbor
  rationale: The Greek uses grammatically masculine singular forms (ἕκαστος ... αὐτοῦ)
    with generic representative force. Per doctrine, gender-accurate rendering is
    preferred over flattening to gender-neutral English, while the sense remains inclusive
    of the whole congregation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Scope of ψεῦδος
  chosen_reading: Render as 'falsehood' rather than 'the lie'
  alternative_readings:
  - the lie
  rationale: The immediate paraenetic context contrasts general deceptive speech with
    truth-telling among believers. While the article allows 'the lie,' the broader
    ethical category is more likely here. The alternative is preserved in a footnote
    because it is a viable formal rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
