id: EPH.1.13
reference: Ephesians 1:13
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ ὑμεῖς ἀκούσαντες τὸν λόγον τῆς ἀληθείας, τὸ εὐαγγέλιον τῆς σωτηρίας
    ὑμῶν, ἐν ᾧ καὶ πιστεύσαντες ἐσφραγίσθητε τῷ πνεύματι τῆς ἐπαγγελίας τῷ ἁγίῳ,
translation:
  text: In him, you also, when you heard the word of truth, the good news of your
    salvation, and when you believed in him, were sealed with the promised Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the gospel of your salvation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the promised Holy Spirit.'
    reason: alternative_reading
  - marker: d
    text: Or 'in him also, after believing,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In him
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to Messiah in the preceding context.
    'In him' is idiomatic modern English and preserves the Pauline union-with-Christ
    sense better than the more formal 'in whom.'
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  lexicon: BDAG
  rationale: Retains the additive emphasis marking the inclusion of the Gentile believers
    alongside 'we' in the previous verses.
- source_word: ἀκούσαντες
  chosen: after hearing
  alternatives:
  - when you heard
  - having heard
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as antecedent to the
    main verb. 'After hearing' expresses sequence clearly in English without overstating
    a technical ordo salutis.
- source_word: τὸν λόγον τῆς ἀληθείας
  chosen: the word of truth
  alternatives:
  - the message of truth
  lexicon: BDAG
  rationale: Keeps the lexical force of λόγος as 'word/message' while preserving the
    recognizable Pauline expression. 'Word of truth' is understandable in modern English
    and maintains intertextual resonance.
- source_word: τὸ εὐαγγέλιον τῆς σωτηρίας ὑμῶν
  chosen: the good news of your salvation
  alternatives:
  - the gospel of your salvation
  lexicon: BDAG
  rationale: Renders εὐαγγέλιον as 'good news' for accessibility, consistent with
    optimal equivalence, while preserving the genitive construction indicating the
    saving content or result of the message.
- source_word: πιστεύσαντες
  chosen: after believing
  alternatives:
  - when you believed
  - having believed
  lexicon: BDAG
  rationale: Like ἀκούσαντες, this aorist participle is rendered with antecedent force
    relative to 'were sealed.' 'After believing' is the clearest English equivalent
    while avoiding unnecessary interpretive precision beyond sequence.
- source_word: ἐσφραγίσθητε
  chosen: were sealed
  alternatives:
  - were marked with a seal
  lexicon: BDAG
  rationale: The passive verb conveys being marked or authenticated by God. 'Were
    sealed' is the standard and concise rendering that preserves the covenantal and
    eschatological nuance.
- source_word: τῷ πνεύματι
  chosen: with the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - in the Holy Spirit
  lexicon: BDAG
  rationale: The dative may be understood instrumentally or associatively. 'With the
    Holy Spirit' is natural in English and matches the sealing imagery without overcommitting
    to a narrower syntactic category.
- source_word: τῆς ἐπαγγελίας
  chosen: of promise
  alternatives:
  - who was promised
  - of the promise
  lexicon: BDAG
  rationale: The genitive most naturally qualifies 'Spirit' as the promised Spirit
    or the Spirit associated with promise. 'Of promise' is compact and traditional;
    the more explicit paraphrase is preserved in a footnote.
- source_word: τῷ ἁγίῳ
  chosen: the Holy
  alternatives:
  - holy
  lexicon: BDAG
  rationale: Together with πνεύματι, this forms the title 'the Holy Spirit.' English
    idiom requires the full title rather than a wooden adjectival sequence.
