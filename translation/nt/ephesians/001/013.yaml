theological_decisions:
- issue: Relationship of hearing, believing, and being sealed
  chosen_reading: The participles are rendered as antecedent in sequence ('after hearing
    ... after believing ... were sealed') without making a denominational claim about
    the precise timing of salvation or Spirit reception beyond what the Greek indicates.
  alternative_readings:
  - The participles may be taken more loosely as coincident ('when you heard ... when
    you believed')
  rationale: The aorist participles preceding the finite verb most naturally indicate
    action prior to or accompanying the sealing. The translation preserves sequence
    while avoiding doctrinal overstatement on debates about conversion and sealing.
- issue: Meaning of 'Spirit of promise'
  chosen_reading: Rendered as a genitival title, 'the Holy Spirit of promise,' understood
    as the Spirit promised by God.
  alternative_readings:
  - the Holy Spirit who guarantees the promise
  - the promised Holy Spirit
  rationale: The Greek wording is compressed. The main text keeps the formal title
    close to the source, and a footnote preserves the more explicit interpretive alternative.
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/001/013.json
  category: awkward_english
  tier: 1
  from: in him also, after believing,
  to: in him, and after believing,
  rationale: The Greek phrase is `ἐν ᾧ καὶ πιστεύσαντες`. The conjunction `καί` ('and'/'also')
    modifies the participle `πιστεύσαντες` ('believing'). The current rendering attaches
    the 'also' to 'in him' ('in him also'), which is slightly awkward and misplaces
    the grammatical connection. Rewriting to 'in him, and after believing,' creates
    a more natural parallel with the preceding participial phrase ('after hearing...')
    and more accurately reflects the Greek syntax.
