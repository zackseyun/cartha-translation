theological_decisions:
- issue: Whether 'his inheritance in/among the saints' refers to God's own possession
    of his people or the inheritance he grants to believers
  chosen_reading: his inheritance among the saints
  alternative_readings:
  - his inheritance in the saints
  - the inheritance he gives among the saints
  rationale: The Greek genitives and prepositional phrase allow more than one nuance.
    The main text preserves the wording without resolving the theological question
    beyond what the Greek states. This follows the doctrine principle of preserving
    theological tension rather than forcing a denominationally favored interpretation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
