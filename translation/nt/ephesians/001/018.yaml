id: EPH.1.18
reference: Ephesians 1:18
source:
  edition: SBLGNT
  text: πεφωτισμένους τοὺς ὀφθαλμοὺς τῆς καρδίας ὑμῶν εἰς τὸ εἰδέναι ὑμᾶς τίς ἐστιν
    ἡ ἐλπὶς τῆς κλήσεως αὐτοῦ, ⸀τίς ὁ πλοῦτος τῆς δόξης τῆς κληρονομίας αὐτοῦ ἐν τοῖς
    ἁγίοις,
translation:
  text: having the eyes of your heart enlightened, so that you may know what is the
    hope of his calling, what is the wealth of the glory of his inheritance among
    the saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'riches of the glory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his inheritance in the saints' or 'among his holy people.'
    reason: alternative_reading
lexical_decisions:
- source_word: πεφωτισμένους
  chosen: having ... enlightened
  alternatives:
  - being enlightened
  - having been enlightened
  lexicon: BDAG
  rationale: Perfect passive participle modifying the implied object 'you' through
    'the eyes of your heart'; rendered as a participial clause in natural English
    while preserving the completed-result sense of the perfect and the passive voice.
- source_word: ὀφθαλμοὺς τῆς καρδίας ὑμῶν
  chosen: the eyes of your heart
  alternatives:
  - your heart's eyes
  lexicon: BDAG
  rationale: Retains the metaphor rather than flattening it to 'understanding' or
    'mind,' since Paul’s imagery is theologically and rhetorically significant.
- source_word: εἰς τὸ εἰδέναι ὑμᾶς
  chosen: so that you may know
  alternatives:
  - for you to know
  - unto your knowing
  lexicon: BDAG
  rationale: Infinitival purpose construction is best expressed idiomatically in English
    as 'so that you may know' while preserving the purposive force.
- source_word: ἐλπὶς
  chosen: hope
  lexicon: BDAG
  rationale: Standard Pauline sense of confident expectation; 'hope' is the natural
    and theologically appropriate rendering.
- source_word: κλήσεως αὐτοῦ
  chosen: his calling
  alternatives:
  - the calling by which he called you
  - his summons
  lexicon: BDAG
  rationale: Genitive is rendered straightforwardly. 'Calling' preserves Pauline theological
    vocabulary without over-expansion.
- source_word: πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  lexicon: BDAG
  rationale: Both are possible; 'wealth' is slightly more natural in contemporary
    English while still conveying abundance. 'Riches' is preserved as a lexical alternative.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the standard biblical rendering and preserves theological
    resonance.'
- source_word: κληρονομίας αὐτοῦ
  chosen: his inheritance
  alternatives:
  - the inheritance that comes from him
  lexicon: BDAG
  rationale: The phrase is left formally open rather than interpretively narrowed;
    it may denote the inheritance belonging to God or the inheritance he gives. The
    more literal 'his inheritance' preserves this tension.
- source_word: ἐν τοῖς ἁγίοις
  chosen: among the saints
  alternatives:
  - in the saints
  - among his holy people
  lexicon: BDAG
  rationale: ἐν can be rendered 'in' or 'among.' 'Among the saints' reads naturally
    and fits the corporate sense, while preserving the referent 'saints' rather than
    replacing it in the main text. Alternatives are worth preserving because the phrase
    is interpretively significant.
