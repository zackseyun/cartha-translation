id: EPH.1.9
reference: Ephesians 1:9
source:
  edition: SBLGNT
  text: γνωρίσας ἡμῖν τὸ μυστήριον τοῦ θελήματος αὐτοῦ, κατὰ τὴν εὐδοκίαν αὐτοῦ ἣν
    προέθετο ἐν αὐτῷ
translation:
  text: having made known to us the mystery of his will, according to his good pleasure,
    which he purposed in him
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which he purposed in Christ'; some understand 'in him' reflexively as
      'in himself.'
    reason: alternative_reading
lexical_decisions:
- source_word: γνωρίσας
  chosen: having made known
  alternatives:
  - making known
  - revealing
  lexicon: BDAG
  rationale: Aorist active participle, nominative singular masculine, modifying the
    implied subject from the surrounding sentence. 'Having made known' preserves the
    participial form and antecedent action relative to the main clause better than
    the more interpretive 'revealing.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: 'Dative pronoun naturally expresses the indirect object of γνωρίζω here:
    God made the mystery known ''to us.'''
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: In Pauline usage, μυστήριον commonly refers not to something permanently
    hidden but to a divine purpose once concealed and now disclosed. 'Mystery' preserves
    this established theological nuance better than 'secret,' though the latter captures
    hiddenness.
- source_word: θέλημα
  chosen: will
  alternatives:
  - purpose
  - desire
  lexicon: BDAG
  rationale: '''Will'' is the most direct rendering and fits the genitive construction
    ''the mystery of his will.'' ''Purpose'' is possible but would blur the distinction
    from προέθετο later in the verse.'
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - based on
  lexicon: BDAG
  rationale: κατά with the accusative here indicates standard or conformity. 'According
    to' is both accurate and idiomatic.
- source_word: εὐδοκίαν
  chosen: good pleasure
  alternatives:
  - kind intention
  - good purpose
  - delight
  lexicon: BDAG
  rationale: εὐδοκία can denote good pleasure, favor, or gracious purpose. 'Good pleasure'
    preserves the personal-volitional sense without over-paraphrasing. 'Kind intention'
    is common in some translations but is more interpretive.
- source_word: προέθετο
  chosen: purposed
  alternatives:
  - set forth
  - planned
  - determined
  lexicon: BDAG
  rationale: Middle voice of προτίθημι/προτίθεμαι here conveys setting forth or purposing
    beforehand. 'Purposed' fits the context of divine intention and avoids confusion
    with the distinct public-display sense found in some other contexts.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in Christ
  - in himself
  lexicon: BDAG
  rationale: The immediate Greek reads simply 'in him.' In the broader context of
    Ephesians 1, the referent is most naturally the Beloved/Son, i.e., Messiah, but
    the pronoun itself should be translated transparently as 'him.' Because the antecedent
    is interpretively significant, alternatives are preserved in a footnote.
