theological_decisions:
- issue: Referent of ἐν αὐτῷ
  chosen_reading: The main text retains the literal pronoun 'in him' without resolving
    the antecedent beyond the Greek wording.
  alternative_readings:
  - in Christ
  - in himself
  rationale: The phrase is syntactically ambiguous enough that some take the referent
    as Messiah/Christ from the immediate context, while others understand it reflexively
    of God ('in himself'). In keeping with the translation philosophy, the English
    preserves the Greek's wording and the ambiguity is documented in a footnote rather
    than resolved in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
