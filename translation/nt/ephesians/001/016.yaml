id: EPH.1.16
reference: Ephesians 1:16
source:
  edition: SBLGNT
  text: οὐ παύομαι εὐχαριστῶν ὑπὲρ ὑμῶν ⸀μνείαν ποιούμενος ἐπὶ τῶν προσευχῶν μου,
translation:
  text: I do not cease giving thanks for you, making mention of you in my prayers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remembering you in my prayers.' The Greek idiom is literally 'making
      mention [of you] in my prayers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ παύομαι
  chosen: I do not cease
  alternatives:
  - I never stop
  - I do not stop
  lexicon: BDAG
  rationale: Present middle/passive with οὐ expresses ongoing non-cessation. 'I do
    not cease' preserves the formal sense and Pauline cadence better than the more
    idiomatic 'I never stop.'
- source_word: εὐχαριστῶν
  chosen: giving thanks
  alternatives:
  - thanking
  lexicon: BDAG
  rationale: Present participle contemporaneous with παύομαι. 'Giving thanks' is natural
    English and preserves the explicit thanksgiving sense.
- source_word: ὑπὲρ ὑμῶν
  chosen: for you
  alternatives:
  - on your behalf
  - concerning you
  lexicon: BDAG
  rationale: Here ὑπέρ with genitive in a thanksgiving context is best rendered 'for
    you,' indicating the people for whom thanks is offered.
- source_word: μνείαν ποιούμενος
  chosen: making mention of you
  alternatives:
  - remembering you
  - making mention
  lexicon: BDAG
  rationale: This idiom literally means 'making mention.' Including 'of you' makes
    explicit the object implied by context and matches the sense of the idiom without
    over-paraphrasing. 'Remembering you' is possible but less formally transparent.
- source_word: ἐπὶ τῶν προσευχῶν μου
  chosen: in my prayers
  alternatives:
  - during my prayers
  - at my prayers
  lexicon: BDAG
  rationale: The prepositional phrase indicates the sphere/occasion in which the mention
    occurs. 'In my prayers' is idiomatic and accurate in English.
