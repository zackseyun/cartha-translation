id: EPH.1.7
reference: Ephesians 1:7
source:
  edition: SBLGNT
  text: ἐν ᾧ ἔχομεν τὴν ἀπολύτρωσιν διὰ τοῦ αἵματος αὐτοῦ, τὴν ἄφεσιν τῶν παραπτωμάτων,
    κατὰ ⸂τὸ πλοῦτος⸃ τῆς χάριτος αὐτοῦ
translation:
  text: In him we have redemption through his blood, the forgiveness of trespasses,
    according to the riches of his grace
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'transgressions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In him
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to the Beloved/Beloved One in the previous
    verse. 'In him' is natural modern English while preserving the union-with-Christ
    sense of the Greek. 'In whom' is more formal but less idiomatic today.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: Present indicative denotes a present possession/reality. 'We have' is
    the most direct and natural rendering.
- source_word: ἀπολύτρωσιν
  chosen: redemption
  alternatives:
  - release
  - deliverance
  lexicon: BDAG
  rationale: In Pauline usage this term carries the sense of liberation effected by
    payment or costly means. 'Redemption' preserves that theological and lexical weight
    better than the flatter 'deliverance' or 'release'.
- source_word: διὰ τοῦ αἵματος αὐτοῦ
  chosen: through his blood
  alternatives:
  - by his blood
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through
    his blood' is both literal and theologically transparent, preserving the sacrificial/death
    imagery without paraphrase.
- source_word: ἄφεσιν
  chosen: forgiveness
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: Here ἄφεσις explains or apposes redemption as the remission of sins.
    'Forgiveness' is the clearest contemporary rendering and best fits the immediate
    genitive complement.
- source_word: παραπτωμάτων
  chosen: trespasses
  alternatives:
  - transgressions
  - false steps
  lexicon: BDAG
  rationale: παράπτωμα often denotes wrongdoing, offense, or transgression. 'Trespasses'
    preserves the moral and relational sense and has strong NT resonance. 'Transgressions'
    is viable, but 'trespasses' is concise and idiomatic here.
- source_word: κατὰ τὸ πλοῦτος
  chosen: according to the riches
  alternatives:
  - in keeping with the riches
  - based on the riches
  lexicon: BDAG
  rationale: κατά with the accusative here indicates standard or measure, not mere
    source. 'According to the riches' conveys abundance measured by God's wealth of
    grace, stronger than simply 'from' the riches.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in Paul is a central theological term denoting God's gracious favor
    and beneficence. 'Grace' is the established and most semantically adequate rendering.
