theological_decisions:
- issue: Relation between 'redemption' and 'the forgiveness of trespasses'
  chosen_reading: 'Rendered appositionally: ''redemption ... the forgiveness of trespasses'''
  alternative_readings:
  - Rendered more explicitly as 'redemption, that is, the forgiveness of trespasses'
  rationale: The second accusative phrase most naturally stands in apposition to the
    first, explaining the content or effect of redemption. The translation preserves
    the Greek structure without adding interpretive words such as 'that is,' though
    that sense is implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; avoid paraphrase
    beyond the source text.
- issue: Atonement language in 'through his blood'
  chosen_reading: Retained the concrete phrase 'through his blood'
  alternative_readings:
  - through his death
  - by his sacrificial death
  rationale: The verse explicitly uses 'blood,' a sacrificial and covenantal expression.
    Replacing it with 'death' would interpret rather than translate, and would lessen
    the text's cultic imagery.
  doctrine_reference: Original-language primacy over translation tradition; never
    paraphrase beyond what the source text warrants.
