id: EPH.1.23
reference: Ephesians 1:23
source:
  edition: SBLGNT
  text: ἥτις ἐστὶν τὸ σῶμα αὐτοῦ, τὸ πλήρωμα τοῦ τὰ πάντα ἐν πᾶσιν πληρουμένου.
translation:
  text: which is his body, the fullness of the one who fills all things in every way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the fullness of the one who fills all in all.'
    reason: lexical_alternative
  - marker: b
    text: The participle could also be understood as 'the one who is being filled,'
      though most interpreters take it here as 'the one who fills.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἥτις
  chosen: which
  alternatives:
  - which indeed
  - which, as such,
  lexicon: BDAG
  rationale: Relative pronoun referring back to the church in v. 22. A simple 'which'
    is natural English, while the qualitative nuance of ὅστις/ἥτις ('which indeed/as
    such') is not easily carried without awkwardness.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard Pauline metaphor for the church's relation to Messiah; 'body'
    is the direct and established sense.
- source_word: πλήρωμα
  chosen: fullness
  alternatives:
  - that which is filled
  - completion
  lexicon: BDAG
  rationale: The noun is theologically dense and somewhat ambiguous here. 'Fullness'
    preserves the lexical form and the interpretive openness better than a more explanatory
    paraphrase.
- source_word: τοῦ ... πληρουμένου
  chosen: of the one who fills
  alternatives:
  - of him who is being filled
  - of the one who fulfills
  lexicon: BDAG
  rationale: The present middle/passive participle πληρουμένου is contested in nuance.
    In this context, the active-like sense 'who fills' is the most natural and widely
    recognized, especially with the following object phrase 'all things in every way.'
    The passive reading 'being filled' is grammatically possible but contextually
    less likely; it is preserved in a footnote.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: A comprehensive neuter plural expression common in Paul. 'All things'
    preserves the breadth and cosmic scope.
- source_word: ἐν πᾶσιν
  chosen: in every way
  alternatives:
  - in all
  - in everyone
  lexicon: BDAG
  rationale: The phrase is syntactically compressed and debated. 'In every way' best
    captures the adverbial force in idiomatic English without prematurely narrowing
    πᾶσιν to persons ('everyone') or leaving an awkwardly literal 'in all.'
