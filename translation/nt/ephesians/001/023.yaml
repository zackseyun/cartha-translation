theological_decisions:
- issue: Meaning of πλήρωμα in relation to the church and Messiah
  chosen_reading: The church is described as Messiah's body and as 'the fullness'
    related to him, with the wording left intentionally open rather than specifying
    whether the church is that which he fills or that which in some sense completes
    the body metaphor.
  alternative_readings:
  - the church as that which is filled by Messiah
  - the church as the complement/completion of Messiah
  rationale: The Greek permits multiple closely related theological construals, and
    the translation philosophy requires preserving genuine tension rather than resolving
    it beyond the text. 'Fullness' keeps the ambiguity visible.
  doctrine_reference: Translation philosophy §3
- issue: Voice/nuance of πληρουμένου
  chosen_reading: 'Rendered with active sense: ''the one who fills all things in every
    way.'''
  alternative_readings:
  - the one who is being filled in all by all
  - the one who fills all in all
  rationale: The participle is morphologically middle/passive, but Koine usage and
    the immediate context strongly support an active or deponent-like sense here.
    Because the phrase is debated, an alternative is preserved in a footnote rather
    than excluded.
  doctrine_reference: Translation philosophy §3
