id: EPH.1.11
reference: Ephesians 1:11
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ ἐκληρώθημεν προορισθέντες κατὰ πρόθεσιν τοῦ τὰ πάντα ἐνεργοῦντος
    κατὰ τὴν βουλὴν τοῦ θελήματος αὐτοῦ,
translation:
  text: In him we also were made an inheritance, having been predestined according
    to the purpose of the one who works all things according to the counsel of his
    will,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we also obtained an inheritance.' The Greek verb can be understood
      either as receiving an inheritance or as being made God's allotted possession.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In him
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to Messiah in the preceding context.
    'In him' is idiomatic modern English and preserves the union-with-Christ sense
    without awkwardness.
- source_word: ἐκληρώθημεν
  chosen: were made an inheritance
  alternatives:
  - obtained an inheritance
  - were chosen by lot
  - were allotted
  lexicon: BDAG
  rationale: The passive of κληρόω can mean either receiving an inheritance or being
    assigned as a possession/inheritance. In this context, with strong OT covenantal
    background and the passive form, 'were made an inheritance' best preserves the
    likely sense that believers became God's allotted people, while the common alternative
    'obtained an inheritance' is preserved in a footnote because the Greek is genuinely
    debated.
- source_word: προορισθέντες
  chosen: having been predestined
  alternatives:
  - having been appointed beforehand
  - having been determined beforehand
  lexicon: BDAG
  rationale: The participle plainly denotes prior determination. 'Predestined' is
    the standard and most transparent rendering here, preserving the lexical force
    without importing a fuller theological system beyond the text.
- source_word: κατὰ πρόθεσιν
  chosen: according to the purpose
  alternatives:
  - according to the plan
  - in keeping with the purpose
  lexicon: BDAG
  rationale: πρόθεσις here denotes purposeful intention or plan. 'According to the
    purpose' is both natural and close to the Greek.
- source_word: τοῦ τὰ πάντα ἐνεργοῦντος
  chosen: of the one who works all things
  alternatives:
  - of him who accomplishes all things
  - of the one effecting all things
  lexicon: BDAG
  rationale: The substantival participle identifies God as the acting subject. 'Works'
    is a clear rendering of ἐνεργέω and avoids over-specifying the mode of divine
    action while preserving comprehensive scope in 'all things.'
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: '''All things'' is the most direct rendering and preserves the breadth
    of Paul''s statement.'
- source_word: κατὰ τὴν βουλὴν
  chosen: according to the counsel
  alternatives:
  - according to the decision
  - according to the plan
  lexicon: BDAG
  rationale: βουλή conveys deliberate counsel or resolve. 'Counsel' preserves the
    deliberative nuance better than the flatter 'plan'.
- source_word: τοῦ θελήματος αὐτοῦ
  chosen: of his will
  alternatives:
  - of what he wills
  lexicon: BDAG
  rationale: 'A standard and accurate rendering of θέλημα, preserving the genitival
    relation with βουλή: God''s counsel is characterized by or belongs to his will.'
