theological_decisions:
- issue: Sense of ἐκληρώθημεν
  chosen_reading: Believers are described as being made God's inheritance/allotted
    people.
  alternative_readings:
  - Believers obtained an inheritance.
  rationale: The verb κληρόω in the passive allows either sense, and interpreters
    divide on whether the emphasis is on what believers receive or what believers
    become. The immediate context of God's saving purpose and the OT background of
    God's people as his inheritance support the chosen reading, but the alternative
    is sufficiently plausible that it should be preserved in a footnote rather than
    suppressed.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
