id: EPH.1.10
reference: Ephesians 1:10
source:
  edition: SBLGNT
  text: εἰς οἰκονομίαν τοῦ πληρώματος τῶν καιρῶν, ἀνακεφαλαιώσασθαι τὰ πάντα ἐν τῷ
    Χριστῷ, τὰ ἐπὶ τοῖς οὐρανοῖς καὶ τὰ ἐπὶ τῆς γῆς· ἐν αὐτῷ,
translation:
  text: 'for the administration of the fullness of the times: to sum up all things
    in the Messiah—the things in the heavens and the things on the earth—in him,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to bring together all things under one head in the Messiah"; the Greek
      verb can carry the sense of summing up or uniting under a head.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκονομίαν
  chosen: administration
  alternatives:
  - plan
  - stewardship
  - arrangement
  lexicon: BDAG
  rationale: οἰκονομία can denote management, administration, or arrangement of a
    plan. Here, with εἰς and followed by the infinitive expressing purpose, 'administration'
    best preserves the sense of an ordered divine management without over-paraphrasing
    to 'plan.'
- source_word: πληρώματος
  chosen: fullness
  alternatives:
  - completion
  - fulfillment
  lexicon: BDAG
  rationale: The noun denotes fullness or full measure. 'Fullness' preserves the theological
    and temporal weight of the phrase and avoids narrowing it merely to endpoint ('completion').
- source_word: καιρῶν
  chosen: times
  alternatives:
  - seasons
  - appointed times
  lexicon: BDAG
  rationale: καιρός often refers to appointed or fitting times rather than time in
    general. 'Times' is concise and natural in English, while the surrounding phrase
    'fullness of the times' retains the sense of divinely appointed epochs.
- source_word: ἀνακεφαλαιώσασθαι
  chosen: to sum up
  alternatives:
  - to unite
  - to bring together under one head
  - to recapitulate
  lexicon: BDAG
  rationale: The verb can mean to sum up, bring together, or gather under a head.
    'To sum up' is the most direct lexical equivalent and avoids importing a more
    interpretive ecclesiological nuance into the main text. Because the headship nuance
    may be heard in the Greek compound, an alternative is preserved in a footnote.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The neuter plural with the article is comprehensive in scope. 'All things'
    is the standard and suitably weighty rendering in this cosmic context.
- source_word: ἐν τῷ Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title. Here the phrase is titular and theological rather than name-like, so
    'in the Messiah' best preserves meaning.
- source_word: τὰ ἐπὶ τοῖς οὐρανοῖς
  chosen: the things in the heavens
  alternatives:
  - the things in heaven
  - the heavenly things
  lexicon: BDAG
  rationale: The construction refers to things located in the heavenly realm. 'In
    the heavens' reflects the Greek plural οὐρανοῖς and preserves the cosmic scope.
- source_word: τὰ ἐπὶ τῆς γῆς
  chosen: the things on the earth
  alternatives:
  - the things on earth
  - earthly things
  lexicon: BDAG
  rationale: The phrase is locative and contrasts with the heavenly realm. 'On the
    earth' is a transparent rendering of the Greek.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in him alone
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the Messiah. 'In him' preserves
    the Greek repetition and emphasis without adding exclusivity not explicit in the
    text.
