theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine excerpt directs
    that Χριστός be translated as 'Messiah' where context supports title rather than
    name-like usage.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Sense of ἀνακεφαλαιώσασθαι
  chosen_reading: to sum up all things
  alternative_readings:
  - to unite all things
  - to bring all things together under one head
  rationale: The verse speaks of God's cosmic purpose in relation to the Messiah.
    The Greek verb can carry both summative and headship-related nuance. To preserve
    theological tension rather than over-resolve it, the main text uses the more lexically
    direct 'sum up,' while a footnote preserves the headship-oriented alternative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 Preserve theological
    tension rather than resolve it'
