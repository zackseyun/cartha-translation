theological_decisions:
- issue: Rendering of προορίσας in a doctrinally contested context
  chosen_reading: having predestined
  alternative_readings:
  - having decided beforehand
  - having foreordained
  rationale: The verse uses προορίζω explicitly, so the translation should preserve
    that lexical force rather than mute it for the sake of denominational neutrality.
    At the same time, the wording does not import a full systematic account of predestination
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Gendered nuance of υἱοθεσία
  chosen_reading: adoption as sons
  alternative_readings:
  - adoption
  - sonship
  rationale: The Greek term is built on 'son' and in Pauline usage can carry legal-heir
    connotations. Rendering it as 'adoption as sons' preserves the source's gendered
    and status-oriented nuance without denying the inclusive application to all believers.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Title Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Here Χριστοῦ functions as a title rather than a mere name component.
    Rendering it 'Messiah' follows the stated policy of translating titles to preserve
    meaning.
  doctrine_reference: Translate titles; transliterate names.
