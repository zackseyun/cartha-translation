id: EPH.1.5
reference: Ephesians 1:5
source:
  edition: SBLGNT
  text: προορίσας ἡμᾶς εἰς υἱοθεσίαν διὰ Ἰησοῦ Χριστοῦ εἰς αὐτόν, κατὰ τὴν εὐδοκίαν
    τοῦ θελήματος αὐτοῦ,
translation:
  text: having predestined us for adoption as sons through Jesus Messiah to himself,
    according to the good pleasure of his will,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for adoption' or 'for sonship'; the Greek term literally refers to adoption
      into the status of a son, emphasizing legal heirship.
    reason: lexical_alternative
  - marker: b
    text: Or 'through Jesus Christ.' 'Messiah' translates the Greek title Christos.
    reason: alternative_reading
  - marker: c
    text: Or 'for himself'; the Greek phrase can express either direction toward him
      or purpose for himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: προορίσας
  chosen: having predestined
  alternatives:
  - having decided beforehand
  - having foreordained
  lexicon: BDAG
  rationale: Aorist participle modifying the main blessing statement in vv. 3–14.
    'Predestined' is the established and lexically sound rendering for προορίζω, preserving
    the temporal 'beforehand' sense without softening the term. The participial form
    is retained with 'having' to reflect the Greek syntax.
- source_word: εἰς υἱοθεσίαν
  chosen: for adoption as sons
  alternatives:
  - for adoption
  - for sonship
  lexicon: BDAG
  rationale: υἱοθεσία denotes adoption/placement as a son. 'Adoption as sons' preserves
    the filial and legal nuance of the Greek better than the more generic 'adoption'
    alone, while reflecting the masculine component of the term in line with the gender-accurate
    policy.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: 'διά with genitive indicates means or agency: this adoption comes through
    Jesus. Χριστοῦ is rendered ''Messiah'' as a title per doctrine guidance to translate
    titles where context supports it.'
- source_word: εἰς αὐτόν
  chosen: to himself
  alternatives:
  - for himself
  - to him
  lexicon: BDAG
  rationale: The phrase most naturally refers back to God as the goal of the action.
    'To himself' preserves the reflexive sense conveyed in context, though some English
    versions render the telic nuance as 'for himself.'
- source_word: κατὰ τὴν εὐδοκίαν
  chosen: according to the good pleasure
  alternatives:
  - according to the kind intention
  - according to the pleasure
  lexicon: BDAG
  rationale: κατά here means 'in accordance with.' εὐδοκία carries the sense of favorable
    purpose or good pleasure. 'Good pleasure' is both natural and theologically weighty
    without over-paraphrasing.
- source_word: τοῦ θελήματος αὐτοῦ
  chosen: of his will
  alternatives:
  - of what he willed
  - of his purpose
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'Will' is the most direct rendering
    of θέλημα and should not be expanded to 'purpose' here, since purpose is interpretive
    rather than lexical.
