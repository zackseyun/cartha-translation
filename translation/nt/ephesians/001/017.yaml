theological_decisions:
- issue: Whether πνεῦμα refers to the Holy Spirit or to a spirit/disposition given
    by God
  chosen_reading: a spirit of wisdom and revelation
  alternative_readings:
  - the Spirit of wisdom and revelation
  rationale: The Greek lacks the article before πνεῦμα, and the phrase can naturally
    describe a God-given disposition or mode of spiritual perception. Because the
    referent is genuinely debated and the text does not force capitalization, the
    main text preserves the ambiguity as much as English allows with 'a spirit,' while
    the alternative is preserved in a footnote. This avoids importing a doctrinally
    stronger identification than the verse itself unambiguously states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to render Χριστός in the phrase Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where it functions
    as a title. In this context the titular sense remains intelligible and preserves
    the meaning of the Greek rather than relying on inherited English tradition.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
