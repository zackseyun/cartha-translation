id: EPH.1.17
reference: Ephesians 1:17
source:
  edition: SBLGNT
  text: ἵνα ὁ θεὸς τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ πατὴρ τῆς δόξης, δώῃ ὑμῖν πνεῦμα
    σοφίας καὶ ἀποκαλύψεως ἐν ἐπιγνώσει αὐτοῦ,
translation:
  text: that the God of our Lord Jesus the Messiah, the Father of glory, may give
    you a spirit of wisdom and revelation in the knowledge of him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of wisdom and revelation.' The Greek πνεῦμα can be understood
      either as a God-given spirit/disposition or as a reference to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστός means
      ''Messiah.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'the glorious Father.' The phrase is literally 'the Father of glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of Paul's prayer from the previous verse.
    'That' is natural in English while preserving the subordinate force.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός; no contextual reason to vary.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. 'Master' is possible
    lexically but less fitting here as a christological title.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός functions as a title here, so 'Messiah' follows the doctrine
    guideline to translate titles where context supports. 'Jesus Messiah' preserves
    the titular sense better than the name-like traditional 'Jesus Christ'.
- source_word: ὁ πατὴρ τῆς δόξης
  chosen: the Father of glory
  alternatives:
  - the glorious Father
  lexicon: BDAG
  rationale: A formally close rendering that preserves the genitival expression and
    its theological weight. 'The glorious Father' is smoother English but interprets
    the genitive rather than preserving it.
- source_word: δώῃ
  chosen: may give
  alternatives:
  - might give
  - would give
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα is well represented by 'may give' in prayer/wish
    context.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - the Spirit
  - spiritual disposition
  lexicon: BDAG
  rationale: Anarthrous πνεῦμα with following genitives can denote a spirit/disposition
    characterized by wisdom and revelation. The capitalization 'the Spirit' is possible,
    but the lack of article and the construction favor an indefinite rendering in
    the main text while preserving the alternative in a footnote.
- source_word: σοφίας
  chosen: of wisdom
  lexicon: BDAG
  rationale: Genitive of quality/content modifying 'spirit'; straightforwardly rendered.
- source_word: ἀποκαλύψεως
  chosen: and revelation
  alternatives:
  - and disclosure
  - and unveiling
  lexicon: BDAG
  rationale: '''Revelation'' is the standard and most transparent rendering in this
    context of divine disclosure.'
- source_word: ἐν ἐπιγνώσει αὐτοῦ
  chosen: in the knowledge of him
  alternatives:
  - in knowing him
  - for the knowledge of him
  lexicon: BDAG
  rationale: ἐπίγνωσις commonly denotes full/true knowledge or recognition. 'In the
    knowledge of him' stays close to the Greek and leaves the precise nuance open.
    'Knowing him' is smoother but more interpretive.
