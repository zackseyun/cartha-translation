id: EPH.1.8
reference: Ephesians 1:8
source:
  edition: SBLGNT
  text: ἧς ἐπερίσσευσεν εἰς ἡμᾶς ἐν πάσῃ σοφίᾳ καὶ φρονήσει
translation:
  text: which he lavished on us in all wisdom and insight,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "with which he caused to abound toward us".
    reason: lexical_alternative
  - marker: b
    text: The phrase "in all wisdom and insight" may describe either the way God lavished
      his grace or the wisdom and insight associated with what he gave believers.
    reason: alternative_reading
lexical_decisions:
- source_word: ἧς
  chosen: which
  alternatives:
  - of which
  - with which
  lexicon: BDAG
  rationale: Genitive feminine singular relative pronoun referring back to 'the riches
    of his grace' in v. 7. English 'which' naturally carries the connection forward;
    'with which' is possible but less direct in this clause structure.
- source_word: ἐπερίσσευσεν
  chosen: lavished
  alternatives:
  - caused to abound
  - abounded
  - made abundant
  lexicon: BDAG
  rationale: 'Aorist active indicative of περισσεύω here has a causative/transitive
    sense: God caused grace to abound toward believers. ''Lavished'' captures the
    sense of overflowing abundance in idiomatic modern English better than the more
    wooden ''caused to abound,'' while remaining faithful to the metaphor of superabundance.'
- source_word: εἰς ἡμᾶς
  chosen: on us
  alternatives:
  - toward us
  - to us
  - upon us
  lexicon: BDAG
  rationale: The preposition εἰς with persons after a verb of abundance indicates
    direction toward or upon the recipients. 'On us' fits naturally with 'lavished'
    in English and preserves the sense of grace directed to believers.
- source_word: ἐν
  chosen: in
  alternatives:
  - with
  lexicon: BDAG
  rationale: The preposition can be rendered either instrumentally ('with') or locatively/spherically
    ('in') here. 'In all wisdom and insight' preserves the Greek form and leaves the
    precise nuance open rather than over-specifying it.
- source_word: πάσῃ
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: With singular abstract nouns, πᾶς commonly conveys comprehensiveness.
    'All wisdom and insight' is idiomatic and reflects the breadth intended.
- source_word: σοφίᾳ
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering for σοφία. In Pauline usage it commonly denotes wise
    understanding or divine wisdom; 'wisdom' is the most transparent and consistent
    gloss.
- source_word: φρονήσει
  chosen: insight
  alternatives:
  - understanding
  - prudence
  - good sense
  lexicon: BDAG
  rationale: φρόνησις overlaps with wisdom but often emphasizes practical understanding,
    discernment, or prudence. 'Insight' differentiates it from σοφία while remaining
    readable in modern English. 'Prudence' is possible but sounds less natural and
    more archaic to many readers.
