theological_decisions:
- issue: Referent of 'in all wisdom and insight'
  chosen_reading: The phrase is left syntactically open in English, without explicitly
    assigning wisdom and insight either to God as the manner of lavishing grace or
    to believers as what accompanies the gift.
  alternative_readings:
  - It describes God's wisdom and insight in lavishing grace.
  - It describes the wisdom and insight given to believers along with grace.
  rationale: The Greek construction permits debate over whether the phrase modifies
    God's action or the believers' reception. The translation preserves the wording
    without importing a doctrinally loaded resolution, in keeping with the principle
    of preserving theological tension where ambiguity is genuine.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
