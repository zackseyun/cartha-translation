  rationale: The current rendering, while grammatically sound, is slightly stiff in English. Adding a comma to set off 'Jesus the Messiah' as an appositive to 'the Lord' is a more natural English construction that clarifies the relationship between the titles and improves readability without altering the theological meaning.
