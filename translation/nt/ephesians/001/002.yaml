id: EPH.1.2
reference: Ephesians 1:2
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: Grace to you and peace from God our Father and the Lord, Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek Χριστός can function as a title (''Messiah'') or, in some contexts, as a name-like form (''Christ'').'
    reason: alternative_reading
  - marker: b
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - grace
  lexicon: BDAG
  rationale: In Pauline epistolary greetings, χάρις functions as both a conventional greeting adapted theologically and a substantive blessing. 'Grace' preserves the established theological sense without paraphrase.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative here is idiomatically rendered 'to you' in English greetings and blessings.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering that preserves both the ordinary sense of peace and its likely resonance with Jewish shalom in Pauline greetings.
- source_word: ἀπὸ
  chosen: from
  lexicon: BDAG
  rationale: The preposition marks source/origin of the blessing; 'from' is the natural and sufficiently formal rendering.
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - our God and Father
  lexicon: BDAG
  rationale: 'The genitive sequence is most naturally taken appositionally: ''God our Father.'' This is the standard sense in Pauline greeting formulas and avoids introducing an unnecessary conjunction absent from the Greek.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best matches New Testament usage and Christological title force here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it clearly functions as a title rather than a fixed name-like form. In this greeting formula, the titular sense remains transparent and preserves the Hebraic messianic context.
