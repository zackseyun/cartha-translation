theological_decisions:
- issue: Relation of Christ's headship to the church and to all things
  chosen_reading: Christ is given to the church as the one who is head over all things.
  alternative_readings:
  - Christ is made head over all things for the benefit of the church.
  - Christ is head over every person and thing, with special relation to the church.
  rationale: The syntax most naturally links 'head' with 'over all things' and takes
    'to the church' as the beneficiary/recipient. This preserves both Christ's universal
    supremacy and the church's special benefit without collapsing one into the other.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological
    tension rather than resolve it.
