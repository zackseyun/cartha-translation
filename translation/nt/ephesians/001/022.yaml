id: EPH.1.22
reference: Ephesians 1:22
source:
  edition: SBLGNT
  text: καὶ πάντα ὑπέταξεν ὑπὸ τοὺς πόδας αὐτοῦ, καὶ αὐτὸν ἔδωκεν κεφαλὴν ὑπὲρ πάντα
    τῇ ἐκκλησίᾳ,
translation:
  text: And he subjected all things under his feet, and gave him as head over all
    things to the church,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the church'; the dative τῇ ἐκκλησίᾳ can express benefit as well
      as recipient.
    reason: alternative_reading
  - marker: b
    text: The wording echoes Psalm 8:6, a scriptural image of all things being placed
      under the ruler's feet.
    reason: cross_reference
lexical_decisions:
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: Neuter plural indicates the totality of things rather than persons specifically.
    'All things' is the standard and clear rendering here, preserving the cosmic scope
    of Christ's exaltation.
- source_word: ὑπέταξεν
  chosen: subjected
  alternatives:
  - put in subjection
  - placed under
  lexicon: BDAG
  rationale: Aorist active of ὑποτάσσω denotes causing something to be in a subordinate
    relation. 'Subjected' is concise, natural English that preserves the force of
    divine subordination without paraphrase.
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  chosen: under his feet
  alternatives:
  - beneath his feet
  lexicon: BDAG
  rationale: This is a conventional idiom of dominion and subjugation, echoing Psalm
    8:6/LXX. The literal rendering should be preserved because the imagery is theologically
    and intertextually significant.
- source_word: αὐτὸν ἔδωκεν
  chosen: gave him
  alternatives:
  - appointed him
  - made him
  lexicon: BDAG
  rationale: δίδωμι literally means 'give.' While 'appointed' captures part of the
    sense in context, 'gave him' better preserves the Greek wording and allows the
    following dative phrase to express the beneficiary.
- source_word: κεφαλὴν
  chosen: as head
  alternatives:
  - head
  lexicon: BDAG
  rationale: The accusative complement after ἔδωκεν is well represented by 'as head'
    in English. This preserves the metaphor of authority and preeminence without over-interpreting
    its nuance.
- source_word: ὑπὲρ πάντα
  chosen: over all things
  alternatives:
  - above all things
  - over all
  lexicon: BDAG
  rationale: Here ὑπέρ conveys supremacy or authority over the whole. 'Over all things'
    makes explicit the object already implied by the neuter plural πάντα and reads
    naturally in English.
- source_word: τῇ ἐκκλησίᾳ
  chosen: to the church
  alternatives:
  - for the church
  - to the assembly
  lexicon: BDAG
  rationale: 'The dative is best taken as a dative of advantage or recipient with
    ἔδωκεν: God gave Christ as head over all things to/for the church. ''Church''
    is the established and contextually appropriate rendering of ἐκκλησία in Pauline
    usage; ''to the church'' preserves the Greek dative most directly.'
