theological_decisions:
- issue: Potential doctrinal overreading of ἐξελέξατο in a predestination context
  chosen_reading: he chose us
  alternative_readings:
  - he elected us
  rationale: The verse clearly speaks of divine choosing, but the English 'elected' can import later denominational formulations more strongly than the Greek itself requires. 'Chose' preserves the text while avoiding unnecessary systematization, in keeping with preserving theological tension rather than resolving it.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Syntactical attachment of ἐν ἀγάπῃ
  chosen_reading: retain with verse 4 as 'before him in love' while preserving ambiguity in a footnote
  alternative_readings:
  - 'attach to v. 5: ''In love he predestined us...'''
  rationale: The Greek phrase at the end of v. 4 can be read with the preceding clause or with the following participial/finite idea in v. 5. Because the source is genuinely ambiguous, the translation preserves the phrase in place and documents the alternative rather than deciding the issue dogmatically.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T03:01:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/ephesians/001/004.json
  category: awkward_english
  tier: 1
  from: for us to be
  to: to be
  rationale: The Greek construction is `ἐξελέξατο ἡμᾶς ... εἶναι ἡμᾶς` (he chose us ... us to be). While 'for us to be' formally mirrors the explicit subject of the infinitive, the more natural and common English idiom is simply 'to be'. Since 'us' is the direct object of 'chose', it is already understood as the subject of the following infinitive, making the repetition 'for us' slightly redundant and less fluid in English.
