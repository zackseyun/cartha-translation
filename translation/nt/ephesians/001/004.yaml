id: EPH.1.4
reference: Ephesians 1:4
source:
  edition: SBLGNT
  text: καθὼς ἐξελέξατο ἡμᾶς ἐν αὐτῷ πρὸ καταβολῆς κόσμου, εἶναι ἡμᾶς ἁγίους καὶ ἀμώμους κατενώπιον αὐτοῦ ἐν ἀγάπῃ,
translation:
  text: just as he chose us in him before the foundation of the world, to be holy and blameless before him in love,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, the phrase ''in love'' may be taken with the following verse: ''In love he predestined us ...'''
    reason: alternative_reading
  - marker: b
    text: Or 'without blemish.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for us to be'.
    reason: previous_rendering
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Introduces the comparison/grounding relation with the preceding blessing statement. 'Just as' preserves the connective force in natural English better than the flatter 'as'.
- source_word: ἐξελέξατο
  chosen: he chose
  alternatives:
  - he selected
  - he elected
  lexicon: BDAG
  rationale: Aorist middle of ἐκλέγομαι. 'Chose' is the standard, clear rendering and avoids importing later theological systematization that 'elected' may suggest in English, while still preserving the text's meaning.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of ἐξελέξατο and subject of the infinitive clause; straightforward first-person plural rendering.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in union with him
  lexicon: BDAG
  rationale: Retains Paul's compact locative/instrumental union language without over-expanding it. The referent is the Beloved/Son in context, but the pronoun is preserved as in Greek.
- source_word: πρὸ καταβολῆς κόσμου
  chosen: before the foundation of the world
  alternatives:
  - before the world's foundation
  lexicon: BDAG
  rationale: Established idiomatic rendering that closely matches the Greek phrase and preserves its temporal force.
- source_word: εἶναι ἡμᾶς
  chosen: for us to be
  alternatives:
  - that we should be
  - to be
  lexicon: BDAG
  rationale: Infinitival clause expressing purpose/result. 'For us to be' is natural English and keeps the telic sense without sounding overly archaic. 'That we should be' is possible but more interpretive and traditional.
- source_word: ἁγίους
  chosen: holy
  alternatives:
  - set apart
  lexicon: BDAG
  rationale: '''Holy'' is the primary lexical equivalent and preserves both moral and consecrational resonance better than the explanatory ''set apart'' in this context.'
- source_word: ἀμώμους
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: Conveys moral/cultic irreproach in idiomatic English. 'Without blemish' is more literal and sacrificially evocative, but 'blameless' reads more naturally in this Pauline ethical context.
- source_word: κατενώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: BDAG
  rationale: A concise rendering of relational presence/accountability before God. 'In his presence' is possible, but 'before him' better matches the Greek prepositional expression.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: 'ἀγάπη is rendered by the default ''love'' per doctrine. The phrase is syntactically ambiguous: it may modify what precedes (''holy and blameless before him in love'') or what follows in v. 5. Main text keeps the phrase in its Greek position to preserve the ambiguity rather than resolve it.'
