id: EPH.1.1
reference: Ephesians 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ τοῖς ἁγίοις τοῖς οὖσιν
    ⸂[ἐν Ἐφέσῳ]⸃ καὶ πιστοῖς ἐν Χριστῷ Ἰησοῦ·
translation:
  text: 'Paul, an apostle of Messiah Jesus by the will of God, to the saints who are
    [in Ephesus] and faithful in Messiah Jesus:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some early manuscripts omit 'in Ephesus,' which has led some to understand
      this letter as intended for a wider circulation rather than only for the church
      in Ephesus.
    reason: textual_variant
  - marker: b
    text: Or 'believers in Messiah Jesus.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ Jesus' / 'Christos Iēsous'; rendered 'Messiah Jesus' here
      because Χριστός functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - sent one
  lexicon: BDAG
  rationale: The term is a recognized early Christian office/title here, linked to
    Paul's authority. 'Apostle' preserves the technical sense better than the more
    generic 'messenger' or 'sent one'.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: of Messiah Jesus
  alternatives:
  - of Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like element. In this epistolary opening, the titular force
    remains clear, so 'Messiah Jesus' best preserves the Greek sense.
- source_word: διὰ θελήματος θεοῦ
  chosen: by the will of God
  alternatives:
  - through the will of God
  lexicon: BDAG
  rationale: διά with the genitive can be rendered 'through' or 'by.' In this commissioning
    formula, 'by the will of God' is idiomatic English and accurately conveys divine
    agency/authorization.
- source_word: ἁγίοις
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: In Pauline address formulae, ἅγιοι refers to God's consecrated people.
    'Saints' is concise and standard, while still faithful to the communal designation;
    'holy ones' is possible but less natural in English here.
- source_word: τοῖς οὖσιν
  chosen: who are
  alternatives:
  - who are living
  - who are present
  lexicon: BDAG
  rationale: The participle of εἰμί functions substantivally with the article, identifying
    the recipients. 'Who are' is the most direct and least interpretively loaded rendering.
- source_word: '[ἐν Ἐφέσῳ]'
  chosen: '[in Ephesus]'
  alternatives:
  - at Ephesus
  lexicon: BDAG
  rationale: The words are text-critically uncertain in this verse. They are retained
    in brackets in the main text to signal the uncertainty while preserving the likely
    local destination reflected in many manuscripts and translation traditions.
- source_word: πιστοῖς
  chosen: faithful
  alternatives:
  - believers
  lexicon: BDAG
  rationale: πιστός can denote either 'faithful' or 'believing.' Here, paired with
    'saints' and followed by 'in Messiah Jesus,' 'faithful' preserves the adjectival
    quality of allegiance/trust without reducing it to a mere label. The alternative
    'believers' is viable and worth preserving in a footnote.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: ἐν here expresses union/relationship with Jesus the Messiah. 'In Messiah
    Jesus' preserves both the preposition and the doctrinally significant title translation
    policy.
