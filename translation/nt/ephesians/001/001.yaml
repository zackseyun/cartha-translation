theological_decisions:
- issue: Rendering Χριστός in Pauline salutation
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated 'Messiah' where
    it functions as a title, with 'Christ' used where it has become more name-like.
    In this verse the titular sense remains transparent, so 'Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)''.'
- issue: Status of ἐν Ἐφέσῳ
  chosen_reading: Preserved in brackets in the main text as [in Ephesus]
  alternative_readings:
  - omission of 'in Ephesus'
  rationale: The phrase is absent in some important witnesses, creating a notable
    textual question. Because the supplied Greek text marks it as bracketed, the draft
    preserves that uncertainty visibly rather than silently resolving it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; document significant alternatives in footnotes.'
- issue: Sense of πιστοῖς
  chosen_reading: faithful
  alternative_readings:
  - believers
  rationale: The adjective can describe either faithfulness or believing identity.
    'Faithful' keeps the lexical form and avoids over-resolving the nuance, while
    the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
