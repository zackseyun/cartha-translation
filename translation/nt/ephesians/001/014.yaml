id: EPH.1.14
reference: Ephesians 1:14
source:
  edition: SBLGNT
  text: ⸀ὅ ἐστιν ἀρραβὼν τῆς κληρονομίας ἡμῶν, εἰς ἀπολύτρωσιν τῆς περιποιήσεως, εἰς
    ἔπαινον τῆς δόξης αὐτοῦ.
translation:
  text: who is the down payment of our inheritance, toward the redemption of the possession,
    to the praise of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guarantee,' 'deposit,' or 'first installment.' The Greek term refers
      to an initial payment that assures the full amount will follow.
    reason: lexical_alternative
  - marker: b
    text: Or 'the acquired possession,' possibly referring to God's own people as
      his possession.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅ
  chosen: who
  alternatives:
  - which
  lexicon: BDAG
  rationale: Although the pronoun is neuter, it refers back to the Holy Spirit in
    the previous verse. English idiom naturally uses the personal relative pronoun
    'who' for a personal referent, preserving the personhood of the Spirit without
    adding content beyond the discourse reference.
- source_word: ἀρραβών
  chosen: down payment
  alternatives:
  - guarantee
  - deposit
  - first installment
  - pledge
  lexicon: BDAG
  rationale: The term denotes a first payment that guarantees the rest will follow.
    'Down payment' communicates both present possession and future completion in accessible
    modern English. 'Guarantee' captures the result but loses the commercial metaphor;
    it is preserved as an alternative sense.
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  lexicon: BDAG
  rationale: '''Inheritance'' is the standard and most transparent rendering in Pauline
    contexts, preserving both covenantal and eschatological overtones.'
- source_word: εἰς
  chosen: toward
  alternatives:
  - for
  - until
  - with a view to
  lexicon: BDAG
  rationale: Here εἰς marks goal or movement toward an eschatological outcome. 'Toward'
    preserves the directional force without over-specifying temporal nuance.
- source_word: ἀπολύτρωσις
  chosen: redemption
  alternatives:
  - release
  - deliverance
  lexicon: BDAG
  rationale: '''Redemption'' best preserves the term''s established Pauline sense
    of liberation by payment or decisive divine act, while remaining readable.'
- source_word: περιποίησις
  chosen: possession
  alternatives:
  - acquired possession
  - preserved possession
  - people for his own possession
  lexicon: BDAG
  rationale: The noun can denote possession, acquisition, or preservation. 'Possession'
    is concise and leaves the genitive construction somewhat open, matching the Greek's
    compactness. Because the phrase is debated, fuller alternatives are preserved
    in a footnote.
- source_word: ἔπαινος
  chosen: praise
  alternatives:
  - commendation
  lexicon: BDAG
  rationale: In this refrain in Ephesians 1, 'praise' is the natural rendering and
    fits the doxological cadence of the passage.
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the established and contextually fitting rendering in doxological
    contexts, preserving theological weight and intertextual resonance.'
