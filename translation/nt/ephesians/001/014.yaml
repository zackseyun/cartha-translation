theological_decisions:
- issue: Referent of the relative pronoun ὅ
  chosen_reading: The pronoun refers to the Holy Spirit mentioned in the previous
    verse, rendered personally as 'who.'
  alternative_readings:
  - The pronoun is taken more abstractly as 'which,' referring to the sealing or the
    promised Holy Spirit as a concept.
  rationale: The immediate antecedent is the promised Holy Spirit, and English style
    favors a personal pronoun for a personal referent. This does not impose a new
    doctrinal claim but reflects the discourse referent and avoids impersonal English
    for the Spirit.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Meaning of τῆς περιποιήσεως
  chosen_reading: Rendered generically as 'the possession' in the main text, without
    specifying whether the possession is God's people, the inheritance itself, or
    the act/result of acquisition.
  alternative_readings:
  - '''God''s own possession'''
  - '''the acquired possession'''
  - '''the possession he has purchased'''
  rationale: The Greek phrase is compressed and can be understood in more than one
    closely related way. To preserve theological tension rather than over-resolve
    it, the main text keeps a relatively literal rendering and the alternatives are
    preserved in a footnote.
  doctrine_reference: Translation philosophy §3
