theological_decisions:
- issue: Nature of the listed powers (ἀρχή, ἐξουσία, δύναμις, κυριότης)
  chosen_reading: Render as broad categories of rule/authority without specifying
    human or angelic beings in the main text.
  alternative_readings:
  - Explicitly render as cosmic powers
  - Explicitly render as angelic ranks
  rationale: The verse likely includes cosmic/spiritual authorities, but the Greek
    itself lists authority categories without explicit ontological specification.
    The translation preserves the breadth and does not import a narrower doctrinal
    claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
