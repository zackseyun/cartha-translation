id: EPH.1.21
reference: Ephesians 1:21
source:
  edition: SBLGNT
  text: ὑπεράνω πάσης ἀρχῆς καὶ ἐξουσίας καὶ δυνάμεως καὶ κυριότητος καὶ παντὸς ὀνόματος
    ὀνομαζομένου οὐ μόνον ἐν τῷ αἰῶνι τούτῳ ἀλλὰ καὶ ἐν τῷ μέλλοντι·
translation:
  text: far above every rule and authority and power and dominion, and every name
    that is named, not only in this age but also in the one to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every principality and authority and power and lordship.' The Greek
      terms can denote ranks or spheres of authority, including cosmic or spiritual
      powers.
    reason: lexical_alternative
  - marker: b
    text: Or 'every title that is given.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'not only in this age but also in the coming one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεράνω
  chosen: far above
  alternatives:
  - above
  - high above
  lexicon: BDAG
  rationale: Expresses superiority/exaltation. 'Far above' captures the intensive
    force naturally in English and fits the exaltation context from the preceding
    verse without overparaphrasing.
- source_word: πάσης ἀρχῆς
  chosen: every rule
  alternatives:
  - every ruler
  - every principality
  - every beginning
  lexicon: BDAG
  rationale: In this context ἀρχή refers to a ruling power or principality, likely
    among cosmic/spiritual authorities. 'Rule' preserves the abstract/category sense
    better than 'ruler' and is more readable than 'principality'.
- source_word: ἐξουσίας
  chosen: authority
  alternatives:
  - jurisdiction
  - power
  lexicon: BDAG
  rationale: A standard rendering for delegated or exercised authority; distinct enough
    from δύναμις to preserve the series of terms.
- source_word: δυνάμεως
  chosen: power
  alternatives:
  - might
  - force
  lexicon: BDAG
  rationale: Common and natural rendering that preserves distinction from ἐξουσία
    while fitting the list of exalted powers.
- source_word: κυριότητος
  chosen: dominion
  alternatives:
  - lordship
  - rulership
  lexicon: BDAG
  rationale: Refers to lordship/dominion as a category of authority. 'Dominion' is
    idiomatic in English and avoids confusion with the divine title 'Lord'.
- source_word: παντὸς ὀνόματος ὀνομαζομένου
  chosen: every name that is named
  alternatives:
  - every name that is invoked
  - every title that is given
  - every named name
  lexicon: BDAG
  rationale: A fairly formal rendering preserves the rhetorical breadth of any named
    status, title, or authority. 'That is named' reflects the participial construction
    without narrowing the sense too much.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not only ... but even
  lexicon: BDAG
  rationale: Standard correlative construction in English matching the Greek emphasis.
- source_word: ἐν τῷ αἰῶνι τούτῳ
  chosen: in this age
  alternatives:
  - in this world
  - in the present age
  lexicon: BDAG
  rationale: αἰών here is best rendered 'age' rather than 'world,' preserving the
    temporal-redemptive contrast with the coming age.
- source_word: ἐν τῷ μέλλοντι
  chosen: in the one to come
  alternatives:
  - in the coming age
  - in that which is coming
  lexicon: BDAG
  rationale: The participle μέλλοντι is elliptical, with αἰῶνι understood from the
    prior phrase. 'The one to come' is concise, natural, and preserves the ellipsis
    while clearly referring to the coming age.
