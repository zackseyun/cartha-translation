theological_decisions:
- issue: Whether προηλπικότας identifies a distinct first group ('the first to hope,' often taken as Jewish believers) or simply those who had previously hoped
  chosen_reading: Render more cautiously as 'who had already hoped' in the main text
  alternative_readings:
  - who were the first to hope
  rationale: The prefix προ- marks priorness, but the exact nuance is debated. A cautious rendering preserves the temporal sense without forcing a specific salvation-historical distinction into the main text. The stronger interpretive option is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
