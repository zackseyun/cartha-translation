id: EPH.1.12
reference: Ephesians 1:12
source:
  edition: SBLGNT
  text: εἰς τὸ εἶναι ἡμᾶς εἰς ἔπαινον δόξης αὐτοῦ τοὺς προηλπικότας ἐν τῷ Χριστῷ·
translation:
  text: so that we who had already hoped in the Messiah might be for the praise of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were the first to hope in the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'so that we, who had already hoped in the Messiah, might be for the praise of his glory.'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰς τὸ εἶναι
  chosen: so that ... might be
  alternatives:
  - for ... to be
  - unto being
  lexicon: BDAG
  rationale: The preposition with the articular infinitive expresses purpose/result. In idiomatic English, 'so that ... might be' best captures the clause's telic force without wooden literalism.
- source_word: ἡμᾶς
  chosen: we
  alternatives:
  - us
  lexicon: BDAG
  rationale: Although accusative in Greek as the subject of the infinitive, English requires nominative 'we' in the finite restructuring of the clause.
- source_word: εἰς ἔπαινον
  chosen: for the praise
  alternatives:
  - to the praise
  - for praise
  lexicon: BDAG
  rationale: This repeated Ephesian formula is naturally rendered 'for the praise,' expressing purpose/result. 'To the praise' is possible and traditional, but slightly less natural in contemporary English.
- source_word: δόξης αὐτοῦ
  chosen: of his glory
  alternatives:
  - of his glorious splendor
  - of his majesty
  lexicon: BDAG
  rationale: A straightforward genitive construction is preserved. 'Glory' is theologically weighty and should not be diluted into a paraphrase.
- source_word: τοὺς προηλπικότας
  chosen: who had already hoped
  alternatives:
  - who were the first to hope
  - who had hoped beforehand
  lexicon: BDAG
  rationale: The perfect active participle of προελπίζω indicates prior hope with continuing relevance. 'Had already hoped' captures the temporal priority without over-specifying whether Paul means Jewish believers as the first group to hope in the Messiah. The alternative 'were the first to hope' is interpretively stronger and is preserved in a footnote.
- source_word: ἐν τῷ Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός as a title is translated 'Messiah' where context supports title sense. Here the phrase is Paul's theological locution of union/hope centered in the Anointed One, so 'Messiah' preserves the title's meaning.
