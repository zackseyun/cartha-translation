  category: awkward_english
  tier: 1
  from: so that we, who had already hoped in the Messiah, might be for the praise of his glory.
  to: so that we who had already hoped in the Messiah might be for the praise of his glory.
  rationale: The Greek participle 'τοὺς προηλπικότας' functions as a defining appositive, specifying which 'we' is in view (likely Jewish believers, contrasted with the 'you' of v. 13). Using a non-restrictive clause (with commas) in English makes this defining characteristic seem like an incidental aside and awkwardly splits the main clause 'we might be...'. Rendering it as a restrictive clause (without commas) better reflects its defining function in the Greek argument and creates a smoother, more unified English sentence.
