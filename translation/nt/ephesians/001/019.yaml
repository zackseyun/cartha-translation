theological_decisions:
- issue: Rendering the cluster δύναμις / ἐνέργεια / κράτος / ἰσχύς
  chosen_reading: 'Preserve the rhetorical accumulation with distinct but related
    English terms: ''power ... working ... might ... strength.'''
  alternative_readings:
  - Compress the terms into fewer English synonyms for smoother style
  - Render more dynamically as 'the full force of his power'
  rationale: Paul intentionally stacks near-synonyms to emphasize the scale and efficacy
    of God's power. Preserving the distinctions maintains the rhetorical force without
    importing a technical theological scheme into each term.
  doctrine_reference: Translation philosophy §1, §5
- issue: Direction of divine power in εἰς ἡμᾶς
  chosen_reading: '''toward us who believe'''
  alternative_readings:
  - '''in us who believe'''
  - '''for us who believe'''
  rationale: The Greek preposition is εἰς, not ἐν. 'Toward us' best preserves the
    directional sense and avoids over-specifying whether the emphasis is internal
    indwelling or external benefaction; the broader context can carry that theological
    nuance.
  doctrine_reference: Translation philosophy §3
