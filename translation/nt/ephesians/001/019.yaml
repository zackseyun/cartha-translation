id: EPH.1.19
reference: Ephesians 1:19
source:
  edition: SBLGNT
  text: καὶ τί τὸ ὑπερβάλλον μέγεθος τῆς δυνάμεως αὐτοῦ εἰς ἡμᾶς τοὺς πιστεύοντας
    κατὰ τὴν ἐνέργειαν τοῦ κράτους τῆς ἰσχύος αὐτοῦ
translation:
  text: and what is the surpassing greatness of his power toward us who believe, according
    to the working of the might of his strength
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in us who believe.' The Greek says 'toward us,' but some translations
      render the phrase more interpretively as God's power at work within believers.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερβάλλον
  chosen: surpassing
  alternatives:
  - immeasurable
  - extraordinary
  - exceeding
  lexicon: BDAG
  rationale: Present participle used adjectivally with μέγεθος; 'surpassing' preserves
    the comparative/exceeding sense without adding interpretation such as 'immeasurable,'
    which is stronger than the Greek requires.
- source_word: μέγεθος
  chosen: greatness
  alternatives:
  - magnitude
  lexicon: BDAG
  rationale: '''Greatness'' is natural modern English and fits the abstract noun construction
    τὸ ὑπερβάλλον μέγεθος. ''Magnitude'' is possible but more technical.'
- source_word: δύναμις
  chosen: power
  alternatives:
  - might
  lexicon: BDAG
  rationale: Standard rendering in Pauline usage for effective power or capability.
    Here it begins a cluster of near-synonyms, and 'power' best distinguishes it from
    κράτος and ἰσχύς.
- source_word: εἰς ἡμᾶς
  chosen: toward us
  alternatives:
  - for us
  - in us
  lexicon: BDAG
  rationale: εἰς with persons here most naturally indicates direction or application
    of God's power toward believers. 'In us' is traditional in some English versions
    but is less directly represented by εἰς than by ἐν; 'toward us' preserves the
    prepositional force while allowing the context to imply beneficial operation.
- source_word: τοὺς πιστεύοντας
  chosen: who believe
  alternatives:
  - who are believing
  - the believers
  lexicon: BDAG
  rationale: Present participle functioning substantivally. 'Who believe' is idiomatic
    and preserves the verbal aspect better than the nominalized 'believers,' while
    avoiding awkwardness of 'who are believing.'
- source_word: κατά
  chosen: according to
  alternatives:
  - in keeping with
  - by
  lexicon: BDAG
  rationale: 'κατά here expresses standard or correspondence: the power toward believers
    is in accordance with the divine working described next. ''According to'' is both
    accurate and transparent.'
- source_word: ἐνέργεια
  chosen: working
  alternatives:
  - operation
  - active working
  - energy
  lexicon: BDAG
  rationale: Refers to operative activity or effective working. 'Working' is clear
    modern English and avoids the misleading modern connotations of 'energy' while
    preserving the sense of active efficacy.
- source_word: κράτος
  chosen: might
  alternatives:
  - dominion
  - strength
  lexicon: BDAG
  rationale: In the phrase τοῦ κράτους τῆς ἰσχύος αὐτοῦ, κράτος conveys manifested
    force or might. Rendering it 'might' helps differentiate it from ἰσχύς, rendered
    'strength.' 'Dominion' is possible in some contexts but less fitting in this power-cluster.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - force
  lexicon: BDAG
  rationale: ἰσχύς commonly denotes strength or inherent force. 'Strength' is the
    most natural counterpart to κράτος here, preserving Paul's layered accumulation
    of power terms rather than collapsing them.
- source_word: καὶ τί
  chosen: and what is
  alternatives:
  - and what
  - and what [is]
  lexicon: BDAG
  rationale: This continues Paul's prayer in v. 18, where the implied verb from the
    larger sentence is supplied in English for clarity. Including 'is' is necessary
    for readable English while remaining faithful to the syntax.
