theological_decisions:
- issue: Rendering of πίστις in a potentially nuanced Pauline context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here the phrase refers to the readers'
    believing relation to the Lord Jesus; 'faithfulness' is possible as a secondary
    nuance but is not the most direct sense in this construction.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Rendering of κύριος as a christological title
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default for κύριος is 'Lord.' In this verse it functions
    as the title of Jesus and should be translated rather than transliterated or weakened.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος'
