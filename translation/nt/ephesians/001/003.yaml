theological_decisions:
- issue: Rendering Χριστός in Pauline formulae
  chosen_reading: Messiah in both 'Jesus Messiah' and 'in Messiah'
  alternative_readings:
  - Christ
  - Jesus Christ
  - in Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where title force is present. In this verse the title remains semantically active,
    and rendering it preserves the Hebraic messianic sense without altering orthodox
    christology.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of πνευματικῇ
  chosen_reading: spiritual
  alternative_readings:
  - of the Spirit
  rationale: The text does not explicitly require narrowing the adjective to a direct
    reference to the Holy Spirit, though that association is likely in context. To
    preserve theological tension rather than over-resolve it, the broader 'spiritual'
    is kept in the main text and the more specific possibility is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
