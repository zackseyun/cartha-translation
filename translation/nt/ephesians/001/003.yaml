id: EPH.1.3
reference: Ephesians 1:3
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ εὐλογήσας ἡμᾶς
    ἐν πάσῃ εὐλογίᾳ πνευματικῇ ἐν τοῖς ἐπουρανίοις ἐν Χριστῷ,
translation:
  text: Blessed be the God and Father of our Lord Jesus the Messiah, who has blessed
    us with every spiritual blessing in the heavenly realms in Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every blessing of the Spirit.' The Greek adjective can mean 'spiritual'
      more broadly or 'pertaining to the Spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the heavenly places.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''Jesus Christ'' and ''in Christ.'' The Greek title
      Χριστός is translated here as ''Messiah'' to preserve its meaning.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed be
  alternatives:
  - Praised be
  - Blessed
  lexicon: BDAG
  rationale: Predicate adjective used in a benedictory/exclamatory sense. 'Blessed
    be' is idiomatic English for this doxological form and preserves the ascriptive
    praise directed to God better than a flat adjectival 'Blessed is' in this context.
- source_word: θεὸς καὶ πατὴρ
  chosen: the God and Father
  alternatives:
  - God and Father
  lexicon: BDAG
  rationale: The article governs the coordinated nouns, yielding the familiar Pauline
    expression 'the God and Father.' Retaining both nouns preserves the relational
    and theological fullness of the phrase without collapsing it into a looser paraphrase.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best matches NT usage and christological
    title force here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like element. In this opening blessing, the titular
    sense remains clear, so 'Jesus Messiah' preserves the meaning of the Greek title.
- source_word: ὁ εὐλογήσας
  chosen: who has blessed
  alternatives:
  - who blessed
  lexicon: BDAG
  rationale: Aorist participle modifying God. English present perfect fits the discourse
    well by presenting God's blessing as a completed act with present relevance, which
    suits the eulogistic context of Ephesians 1:3–14.
- source_word: ἐν πάσῃ εὐλογίᾳ πνευματικῇ
  chosen: with every spiritual blessing
  alternatives:
  - in every spiritual blessing
  lexicon: BDAG
  rationale: 'Although ἐν is formally ''in,'' English idiom after ''blessed us'' is
    more natural with ''with.'' This preserves the instrumental/content sense: God
    has bestowed every kind of blessing characterized as spiritual.'
- source_word: πνευματικῇ
  chosen: spiritual
  alternatives:
  - of the Spirit
  lexicon: BDAG
  rationale: The adjective can denote what pertains to the Spirit or what is spiritual
    in nature. 'Spiritual' is the most direct rendering and preserves the semantic
    breadth without over-specifying the referent in the main text.
- source_word: ἐν τοῖς ἐπουρανίοις
  chosen: in the heavenly realms
  alternatives:
  - in the heavenlies
  - in the heavenly places
  lexicon: BDAG
  rationale: A distinctive Ephesian expression. 'Heavenly realms' is readable modern
    English and captures the plural/neuter adjectival phrase referring to the heavenly
    sphere. 'Heavenly places' is possible but can sound overly spatially concrete;
    'realms' better conveys sphere/domain.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as title is rendered 'Messiah.' The prepositional
    phrase is central to Pauline union-with-Christ language; 'in Messiah' preserves
    the title's meaning while keeping the compactness of the Greek.
