id: EPH.1.6
reference: Ephesians 1:6
source:
  edition: SBLGNT
  text: εἰς ἔπαινον δόξης τῆς χάριτος αὐτοῦ ⸀ἧς ἐχαρίτωσεν ἡμᾶς ἐν τῷ ἠγαπημένῳ,
translation:
  text: to the praise of the glory of his grace, with which he has graced us in the
    Beloved,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which he freely bestowed on us' or 'by which he favored us.' The Greek
      verb is cognate with 'grace,' preserving the sense that God acted graciously
      toward us.
    reason: lexical_alternative
  - marker: b
    text: '''The Beloved'' refers to the Son, that is, the Messiah.'
    reason: cross_reference
lexical_decisions:
- source_word: εἰς
  chosen: to
  alternatives:
  - for
  lexicon: BDAG
  rationale: In the idiom εἰς ἔπαινον, εἰς marks purpose/result. 'To the praise' is
    a natural and sufficiently formal rendering in English.
- source_word: ἔπαινον
  chosen: praise
  alternatives:
  - commendation
  lexicon: BDAG
  rationale: Standard rendering for ἔπαινος. 'Praise' fits the doxological context
    and preserves the verbal connection of the phrase.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: δόξα in Pauline doxological contexts is best rendered 'glory.' 'Splendor'
    is possible but weaker as a theological term.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις here refers to God's gracious favor in salvation. 'Grace' preserves
    the established theological sense without exceeding the text.
- source_word: ἧς
  chosen: with which
  alternatives:
  - which
  - by which
  lexicon: BDAG
  rationale: The relative pronoun is feminine singular, referring back to χάριτος.
    'With which' best reflects the instrumental nuance implied by the cognate verb
    ἐχαρίτωσεν in idiomatic English.
- source_word: ἐχαρίτωσεν
  chosen: has graced
  alternatives:
  - freely bestowed grace on
  - favored
  - blessed
  lexicon: BDAG
  rationale: The verb χαριτόω is cognate with χάρις and means to bestow favor/grace.
    'Has graced' preserves the lexical connection to 'grace' better than 'favored,'
    while remaining understandable. The English present perfect is used to convey
    the completed divine action with present relevance in context.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of ἐχαρίτωσεν; straightforwardly rendered 'us.'
- source_word: ἐν
  chosen: in
  alternatives:
  - through
  - by means of
  - in union with
  lexicon: BDAG
  rationale: ἐν with τῷ ἠγαπημένῳ is most basically 'in.' While the phrase may imply
    union or sphere, the simple preposition preserves the Greek and leaves the theological
    richness intact.
- source_word: τῷ ἠγαπημένῳ
  chosen: the Beloved
  alternatives:
  - the one he loves
  - his beloved Son
  lexicon: BDAG
  rationale: The perfect passive participle used substantivally functions as a title
    for the Son. 'The Beloved' is concise, traditional, and preserves the christological
    weight without importing 'Son,' which is not explicit in this verse.
