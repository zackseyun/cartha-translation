theological_decisions:
- issue: Rendering of χαριτόω in relation to χάρις
  chosen_reading: with which he has graced us
  alternative_readings:
  - which he freely bestowed on us
  - by which he favored us
  rationale: The verse intentionally pairs χάρις and χαριτόω. Rendering the verb with
    'graced' preserves the lexical and theological linkage between God's grace and
    his gracious action. More idiomatic alternatives are possible, but they obscure
    the cognate relationship present in Greek.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Christological force of τῷ ἠγαπημένῳ
  chosen_reading: the Beloved
  alternative_readings:
  - his beloved Son
  - the one he loves
  rationale: The phrase clearly refers to Christ, but the verse itself uses a title-like
    participial expression rather than explicitly naming 'Son.' 'The Beloved' preserves
    the christological reference while avoiding unnecessary expansion beyond the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1 (Original-language primacy
    over translation tradition) and §2 (Translate titles; transliterate names)
