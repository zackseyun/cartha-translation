id: EPH.1.20
reference: Ephesians 1:20
source:
  edition: SBLGNT
  text: ἣν ⸀ἐνήργηκεν ἐν τῷ Χριστῷ ἐγείρας αὐτὸν ⸀ἐκ νεκρῶν, καὶ ⸀καθίσας ἐν δεξιᾷ
    αὐτοῦ ἐν τοῖς ἐπουρανίοις
translation:
  text: which he worked in the Messiah when he raised him from the dead and seated
    him at his right hand in the heavenly realms,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'in the heavenly places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Refers back to the feminine antecedent δύναμιν/ἐνέργειαν in the preceding
    context; 'which' smoothly carries the relative connection into English.
- source_word: ἐνήργηκεν
  chosen: worked
  alternatives:
  - exercised
  - accomplished
  - put into effect
  lexicon: BDAG
  rationale: The verb denotes effective operation or activity. 'Worked' is idiomatic
    with the relative clause ('which he worked in the Messiah') and preserves the
    sense of divine power being actively operative.
- source_word: ἐν τῷ Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is titular here rather than merely name-like, and DOCTRINE.md
    directs Χριστός to be rendered 'Messiah' where title/context supports. 'In the
    Messiah' preserves the Greek preposition and the messianic title.
- source_word: ἐγείρας
  chosen: when he raised
  alternatives:
  - raising
  - after raising
  lexicon: BDAG
  rationale: Aorist participle expressing attendant circumstance or means relative
    to the main verb. 'When he raised' gives clear temporal linkage in natural English
    without overinterpreting the participle.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. The plural νεκρῶν
    is naturally represented by the collective English expression 'the dead'.
- source_word: καθίσας
  chosen: and seated
  alternatives:
  - causing him to sit
  - having seated
  lexicon: BDAG
  rationale: Aorist participle coordinated with ἐγείρας; 'and seated' preserves the
    sequence of divine actions in concise English.
- source_word: ἐν δεξιᾷ αὐτοῦ
  chosen: at his right hand
  alternatives:
  - at his right side
  - in his right hand
  lexicon: BDAG
  rationale: Idiomatic expression of exalted status and authority. 'At his right hand'
    is the established and accurate sense of the dative phrase here, not location
    within a hand.
- source_word: ἐν τοῖς ἐπουρανίοις
  chosen: in the heavenly realms
  alternatives:
  - in the heavenlies
  - in the heavenly places
  lexicon: BDAG
  rationale: Pauline phrase referring to the heavenly sphere. 'Heavenly realms' is
    readable modern English and captures the plural/neuter adjectival construction
    better than the less natural 'heavenlies,' while avoiding overly wooden phrasing.
