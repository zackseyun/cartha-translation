theological_decisions:
- issue: Rendering of Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this context, and the project's doctrine
    specifies 'Messiah' where title/context supports, preserving the Hebraic messianic
    sense rather than defaulting to traditional transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos | Messiah
    (where title; Christ where name-like)'''
- issue: Rendering of ἐν τοῖς ἐπουρανίοις
  chosen_reading: in the heavenly realms
  alternative_readings:
  - in the heavenly places
  rationale: The phrase denotes the heavenly sphere of exaltation. 'Heavenly realms'
    communicates this clearly in modern English without denying the locative nuance
    preserved by 'heavenly places.' The alternative is worth preserving because of
    its familiarity in Pauline translation tradition.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §6 (readable modern English)
    and §5 (documented exception/consistency)'
