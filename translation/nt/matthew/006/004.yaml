id: MAT.6.4
reference: Matthew 6:4
source:
  edition: SBLGNT
  text: ὅπως ᾖ σου ἡ ἐλεημοσύνη ἐν τῷ κρυπτῷ· καὶ ὁ πατήρ σου ὁ βλέπων ἐν τῷ ⸀κρυπτῷ
    ἀποδώσει ⸀σοι.
translation:
  text: so that your giving to the poor may be in secret; and your Father who sees
    in secret will reward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alms.' The Greek term refers specifically to giving to the poor.
    reason: lexical_alternative
  - marker: b
    text: Or 'will repay you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose, linking this verse to the preceding instruction.
    'So that' is natural modern English while preserving the telic force.
- source_word: ᾖ
  chosen: may be
  alternatives:
  - might be
  lexicon: BDAG
  rationale: Present subjunctive of εἰμί after ὅπως is well represented by 'may be'
    in English, preserving the purpose nuance without sounding archaic.
- source_word: ἐλεημοσύνη
  chosen: giving to the poor
  alternatives:
  - charitable giving
  - alms
  lexicon: BDAG
  rationale: The term refers specifically to almsgiving, not generic mercy. 'Giving
    to the poor' communicates the concrete sense clearly for modern readers. 'Alms'
    is traditional but less accessible; 'charitable giving' is broader and more institutional
    than the context suggests.
- source_word: ἐν τῷ κρυπτῷ
  chosen: in secret
  alternatives:
  - secretly
  - in the hidden place
  lexicon: BDAG
  rationale: This idiom denotes concealment from public view. 'In secret' is idiomatic,
    concise, and preserves the repeated phrase in both clauses.
- source_word: ὁ πατήρ σου
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The Greek here reads simply 'your Father' without the explicit adjective
    'heavenly.' The translation avoids importing wording from nearby parallels not
    present in this verse.
- source_word: ὁ βλέπων
  chosen: who sees
  alternatives:
  - the one seeing
  - who is watching
  lexicon: BDAG
  rationale: The substantival participle is naturally rendered as a relative clause
    in English. 'Who sees' is straightforward and preserves the ongoing, perceptive
    sense.
- source_word: ἀποδώσει
  chosen: will reward
  alternatives:
  - will repay
  - will give back
  lexicon: BDAG
  rationale: In this context of divine response to hidden righteousness, 'will reward'
    best conveys the positive sense in idiomatic English. 'Repay' is more formally
    literal and is preserved as an alternative because it can emphasize recompense.
- source_word: σοι
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative pronoun is naturally incorporated into English verbal complementation
    as 'reward you.' An explicit 'to you' would be more wooden without adding meaning.
