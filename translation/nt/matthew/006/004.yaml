theological_decisions:
- issue: Nature of divine recompense in ἀποδώσει
  chosen_reading: will reward you
  alternative_readings:
  - will repay you
  rationale: The verse promises God's positive response to hidden almsgiving without
    specifying the form of the reward. 'Reward' preserves the favorable sense while
    avoiding overdefinition of whether the recompense is temporal, eternal, material,
    or spiritual.
  doctrine_reference: Preserve theological tension rather than resolve it.
