theological_decisions:
- issue: Divine provision argument from lesser to greater
  chosen_reading: Retained the rhetorical question explicitly as God's greater care
    for disciples than for transient grass.
  alternative_readings:
  - Rendered as a statement rather than a question
  rationale: The Greek syntax and final vocative support a rhetorical question that
    sharpens Jesus' exhortation against anxiety. This preserves the force of the teaching
    without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §3
