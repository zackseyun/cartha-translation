id: MAT.6.30
reference: Matthew 6:30
source:
  edition: SBLGNT
  text: εἰ δὲ τὸν χόρτον τοῦ ἀγροῦ σήμερον ὄντα καὶ αὔριον εἰς κλίβανον βαλλόμενον
    ὁ θεὸς οὕτως ἀμφιέννυσιν, οὐ πολλῷ μᾶλλον ὑμᾶς, ὀλιγόπιστοι;
translation:
  text: But if God so clothes the grass of the field, which is here today and tomorrow
    is thrown into an oven, will he not much more clothe you, you of little faith?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who have little faith.' The Greek vocative ὀλιγόπιστοι is a direct
      address expressing rebuke for inadequate trust.
    reason: lexical_alternative
  - marker: b
    text: The 'oven' refers to a baking oven; dried grass and field plants could be
      used as fuel.
    reason: cultural_note
lexical_decisions:
- source_word: χόρτον τοῦ ἀγροῦ
  chosen: the grass of the field
  alternatives:
  - the field grass
  - the plants of the field
  lexicon: BDAG
  rationale: χόρτος commonly denotes grass or herbage. In this context, following
    the imagery of short-lived wild growth, 'grass of the field' is the most natural
    and established English equivalent without over-specifying flowers.
- source_word: σήμερον ὄντα
  chosen: which is here today
  alternatives:
  - being here today
  - alive today
  lexicon: BDAG
  rationale: The participle ὄντα literally means 'being,' but idiomatic English requires
    an existential expression. 'Which is here today' preserves the προσωρινός sense
    of present existence without adding biological nuance.
- source_word: αὔριον εἰς κλίβανον βαλλόμενον
  chosen: tomorrow is thrown into an oven
  alternatives:
  - tomorrow is cast into a furnace
  - tomorrow is thrown into the oven
  lexicon: BDAG
  rationale: κλίβανος refers to an oven, not necessarily a metallurgical furnace.
    'Thrown into an oven' preserves the domestic/agricultural image of vegetation
    used as fuel. Present passive participle βαλλόμενον is naturally rendered with
    an English present passive.
- source_word: οὕτως ἀμφιέννυσιν
  chosen: so clothes
  alternatives:
  - thus clothes
  - so adorns
  lexicon: BDAG
  rationale: ἀμφιέννυμι means to clothe or dress. 'Clothes' is the clearest modern
    English rendering and fits the argument from God's provision. 'Adorns' is possible
    but risks overstating decorative emphasis.
- source_word: οὐ πολλῷ μᾶλλον
  chosen: will he not much more
  alternatives:
  - will he not by much more
  - how much more will he not
  lexicon: BDAG
  rationale: This is a standard lesser-to-greater argument. 'Will he not much more'
    captures both the rhetorical question and the comparative force in natural English.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: 'Direct object of the implied repeated verb ''clothe.'' English requires
    supplying the verb for clarity: ''clothe you.'''
- source_word: ὀλιγόπιστοι
  chosen: you of little faith
  alternatives:
  - O you of little faith
  - you who have little faith
  lexicon: BDAG
  rationale: ὀλιγόπιστοι is a vocative plural rebuke. 'You of little faith' preserves
    the direct address and the idiomatic force while avoiding overly archaic tone.
    The interjection 'O' is possible but less natural in contemporary English.
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or development from the previous example.
    'But if' best preserves the argumentative turn in context.
