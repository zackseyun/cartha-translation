theological_decisions:
- issue: Nature of the instruction about fasting appearance
  chosen_reading: Jesus instructs ordinary grooming during fasting so that fasting
    is not displayed for human notice.
  alternative_readings:
  - A ritual anointing act is in view
  - A prohibition of public fasting per se is in view
  rationale: The immediate context contrasts hypocritical disfigurement with normal
    appearance. The verse does not forbid fasting or necessarily prescribe a ritual
    act; it directs the disciple to maintain ordinary presentation before others.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
