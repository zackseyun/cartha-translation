id: MAT.6.17
reference: Matthew 6:17
source:
  edition: SBLGNT
  text: σὺ δὲ νηστεύων ἄλειψαί σου τὴν κεφαλὴν καὶ τὸ πρόσωπόν σου νίψαι,
translation:
  text: But you, when you fast, anoint your head and wash your face,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put oil on your head.' The Greek verb can refer to applying oil as part
      of ordinary grooming.
    reason: lexical_alternative
  - marker: b
    text: That is, maintain normal appearance rather than making your fasting obvious
      to others.
    reason: cultural_note
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But you
  alternatives:
  - But as for you
  - But when you
  lexicon: BDAG
  rationale: The emphatic pronoun with δέ marks contrast with the hypocrites in the
    preceding context. 'But you' preserves the direct contrast and emphasis without
    overexpanding.
- source_word: νηστεύων
  chosen: when you fast
  alternatives:
  - fasting
  - while fasting
  lexicon: BDAG
  rationale: The present participle is adverbial and naturally rendered in English
    as a temporal clause. 'When you fast' is idiomatic and fits the instruction context
    better than the more wooden 'fasting.'
- source_word: ἄλειψαί
  chosen: anoint
  alternatives:
  - oil
  - put oil on
  lexicon: BDAG
  rationale: The aorist middle imperative calls for a customary grooming action. 'Anoint'
    is the standard lexical equivalent of ἀλείφω and preserves the cultural texture;
    'put oil on' is possible but less concise. The middle voice is not separately
    represented in natural English.
- source_word: τὴν κεφαλήν
  chosen: your head
  alternatives:
  - your hair
  lexicon: BDAG
  rationale: A direct rendering of κεφαλή is 'head.' Although the sense involves normal
    grooming of the hair/head, 'your head' best matches the Greek wording.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination between the two imperatives.
- source_word: τὸ πρόσωπόν σου
  chosen: your face
  alternatives:
  - your countenance
  lexicon: BDAG
  rationale: πρόσωπον here refers to the visible face. 'Your face' is clear modern
    English and avoids archaic diction.
- source_word: νίψαι
  chosen: wash
  alternatives:
  - cleanse
  lexicon: BDAG
  rationale: νίπτω commonly refers to washing part of the body. 'Wash' is the natural
    English equivalent in this context and matches the practical instruction.
