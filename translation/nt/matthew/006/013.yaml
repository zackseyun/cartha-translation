theological_decisions:
- issue: Meaning of τοῦ πονηροῦ
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: The Greek form is ambiguous between a personal and impersonal referent.
    Because the phrase can naturally denote Satan/the evil one, and because the immediate
    contrast with temptation fits a personal adversary, this reading is adopted in
    the main text. However, the ambiguity is genuine, so the alternative 'evil' is
    preserved in a footnote in keeping with the instruction to preserve theological
    tension rather than resolve it absolutely.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
