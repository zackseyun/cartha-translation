id: MAT.6.13
reference: Matthew 6:13
source:
  edition: SBLGNT
  text: καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν, ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ τοῦ ⸀πονηροῦ.
translation:
  text: And do not lead us into temptation, but deliver us from the evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testing' or 'trial.' The Greek word can refer to temptation or to a
      testing ordeal.
    reason: lexical_alternative
  - marker: b
    text: Or 'from evil.' The Greek phrase can be understood either personally ('the
      evil one') or impersonally ('evil').
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ εἰσενέγκῃς
  chosen: do not lead
  alternatives:
  - do not bring
  - do not cause to enter
  lexicon: BDAG
  rationale: The aorist subjunctive with μή in a prohibitive prayer request is naturally
    rendered in English as 'do not lead.' This preserves the directness of the petition
    without paraphrasing into a more interpretive form such as 'do not allow us to
    be led.'
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός can denote either temptation or testing/trial depending on
    context. In the Lord's Prayer, 'temptation' is the established and contextually
    fitting rendering in English, but the broader semantic range should be preserved
    in a footnote because the petition may include the sense of severe testing as
    well as enticement to sin.
- source_word: ῥῦσαι
  chosen: deliver
  alternatives:
  - rescue
  lexicon: BDAG
  rationale: The imperative asks for active divine rescue. 'Deliver' is idiomatic,
    weighty, and traditional without being archaic; 'rescue' is possible but slightly
    less fitting in the prayer's cadence.
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - evil
  lexicon: BDAG
  rationale: The genitive with the article can be understood either as neuter ('evil')
    or masculine ('the evil one'). In this context, the personal sense is strong and
    widely recognized, and the doctrine requires preserving genuine ambiguity rather
    than collapsing it. Therefore the main text uses 'the evil one' and the alternative
    'evil' is preserved in a footnote.
