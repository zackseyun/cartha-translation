theological_decisions:
- issue: Referent of τὰ ἔθνη in Jesus' teaching
  chosen_reading: Rendered as 'the Gentiles' to preserve the covenantal contrast between
    Jesus' disciples and the surrounding nations, without implying an absolute moral
    judgment on all non-Jews.
  alternative_readings:
  - the pagans
  - the nations
  rationale: The context contrasts those outside the covenant community's trust in
    the Father with Jesus' followers. 'Gentiles' best preserves that historical and
    textual distinction while avoiding an unnecessarily pejorative rendering.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
