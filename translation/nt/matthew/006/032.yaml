id: MAT.6.32
reference: Matthew 6:32
source:
  edition: SBLGNT
  text: πάντα γὰρ ταῦτα τὰ ἔθνη ⸀ἐπιζητοῦσιν· οἶδεν γὰρ ὁ πατὴρ ὑμῶν ὁ οὐράνιος ὅτι
    χρῄζετε τούτων ἁπάντων.
translation:
  text: For the Gentiles eagerly seek all these things; for your heavenly Father knows
    that you need all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations' or 'the pagans.' The Greek term can denote the nations
      generally, but here likely refers to those outside the covenant people.
    reason: alternative_reading
  - marker: b
    text: Or 'seek after' or 'strive after.' The verb suggests earnest or persistent
      seeking.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  - the pagans
  lexicon: BDAG
  rationale: In this Matthean context, ἔθνη refers to non-Jews in contrast with Jesus'
    disciples, so 'the Gentiles' best preserves the covenantal/social distinction.
    'Pagans' captures religious sense but adds interpretive coloring; 'the nations'
    is more literal but less idiomatic here.
- source_word: ἐπιζητοῦσιν
  chosen: eagerly seek
  alternatives:
  - seek
  - strive after
  lexicon: BDAG
  rationale: The prefixed verb ἐπιζητέω intensifies ζητέω, indicating earnest or persistent
    seeking. 'Eagerly seek' reflects that force in natural English better than the
    flatter 'seek.' 'Strive after' is possible but slightly overstates the effort.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  chosen: your heavenly Father
  alternatives:
  - your Father in heaven
  - your Father, the heavenly one
  lexicon: BDAG
  rationale: This is the most natural English rendering of the articular adjective
    construction while preserving both possession ('your') and the heavenly designation.
    'Your Father in heaven' is also viable, but 'heavenly Father' is concise and idiomatic
    without loss of meaning.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - has known
  - is aware
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect, it functions with present meaning.
    'Knows' is the standard and accurate English rendering here.
- source_word: χρῄζετε
  chosen: you need
  alternatives:
  - you have need of
  lexicon: BDAG
  rationale: '''You need'' is clear modern English and accurately conveys χρῄζω. ''You
    have need of'' is more formal but less natural for the stated translation philosophy.'
- source_word: πάντα γὰρ ταῦτα ... τούτων ἁπάντων
  chosen: all these things ... all these things
  alternatives:
  - all these ... all of these
  - all these things ... all of them
  lexicon: BDAG
  rationale: The repetition is preserved in English because it is present in the Greek
    and contributes to the verse's emphasis. 'Things' is supplied idiomatically since
    English normally requires it in this construction.
- source_word: γὰρ ... γὰρ
  chosen: For ... for
  alternatives:
  - Because ... for
  - For ... because
  lexicon: BDAG
  rationale: The double γάρ is retained with 'for' in both clauses to preserve the
    explanatory flow of the Greek. Smoother English could vary the conjunctions, but
    keeping both better reflects the discourse structure.
