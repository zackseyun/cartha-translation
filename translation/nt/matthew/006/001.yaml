id: MAT.6.1
reference: Matthew 6:1
source:
  edition: SBLGNT
  text: Προσέχετε ⸀δὲ τὴν ⸀δικαιοσύνην ὑμῶν μὴ ποιεῖν ἔμπροσθεν τῶν ἀνθρώπων πρὸς
    τὸ θεαθῆναι αὐτοῖς· εἰ δὲ μή γε, μισθὸν οὐκ ἔχετε παρὰ τῷ πατρὶ ὑμῶν τῷ ἐν τοῖς
    οὐρανοῖς.
translation:
  text: But be careful not to practice your righteousness before people in order to
    be seen by them; otherwise, you have no reward from your Father in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your acts of righteousness.' A textual variant reads 'your almsgiving.'
    reason: textual_variant
  - marker: b
    text: Greek 'in the heavens'; many English versions simplify to 'in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: be careful
  alternatives:
  - beware
  - take care
  lexicon: BDAG
  rationale: Present imperative plural calling for ongoing vigilance. 'Be careful'
    is natural modern English and preserves the warning force without sounding archaic.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks transition/contrast with the preceding teaching. 'But' best reflects
    the adversative turn into a warning.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  - acts of righteousness
  - charitable giving
  lexicon: BDAG
  rationale: Default doctrinal rendering is 'righteousness.' Here it likely refers
    broadly to righteous practice, not merely almsgiving; 'righteousness' preserves
    the wider scope and aligns with the contested-terms guidance. A lexical alternative
    is preserved in a footnote because some manuscripts/readers understand the sense
    more concretely as 'acts of righteousness' or, in a variant reading, 'almsgiving.'
- source_word: μὴ ποιεῖν
  chosen: not to practice
  alternatives:
  - not to do
  - not to perform
  lexicon: BDAG
  rationale: The infinitive with μή expresses what they must avoid doing. 'Practice'
    communicates ongoing religious conduct better than the flatter 'do' in this context.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: before people
  alternatives:
  - before men
  - in front of people
  lexicon: BDAG
  rationale: Refers to human observers generally. 'People' is natural English and
    reflects generic force without implying only males.
- source_word: πρὸς τὸ θεαθῆναι αὐτοῖς
  chosen: in order to be seen by them
  alternatives:
  - to be seen by them
  - for the purpose of being noticed by them
  lexicon: BDAG
  rationale: The construction expresses purpose. 'In order to be seen by them' preserves
    the intentionality and the passive sense of public display.
- source_word: εἰ δὲ μή γε
  chosen: otherwise
  alternatives:
  - but if not
  - if otherwise
  lexicon: BDAG
  rationale: Idiomatic summary of the conditional warning. 'Otherwise' conveys the
    consequence naturally in English.
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: In this context of divine recompense for piety, 'reward' is the most
    idiomatic and least misleading English choice.
- source_word: παρὰ τῷ πατρὶ ὑμῶν
  chosen: from your Father
  alternatives:
  - with your Father
  - from the presence of your Father
  lexicon: BDAG
  rationale: παρά with dative can indicate proximity or source. In this context of
    receiving recompense, 'from your Father' best communicates the source of reward.
- source_word: τῷ ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural, literally 'in the heavens.' This rendering preserves
    the form of the source while remaining understandable in English.
