theological_decisions:
- issue: Scope of δικαιοσύνην in this verse
  chosen_reading: broadly 'righteousness' or righteous practice, not restricted in
    the main text to almsgiving
  alternative_readings:
  - almsgiving
  - acts of righteousness
  rationale: Although some translation traditions render the term narrowly due to
    nearby context and a known textual variant, the SBLGNT reading is δικαιοσύνην,
    which naturally has broader scope. To preserve interpretive tension, the main
    text keeps 'righteousness' and alternatives are footnoted rather than resolved
    dogmatically.
  doctrine_reference: 'DOCTRINE.md: contested terms table (δικαιοσύνη → righteousness;
    justice preserved in footnotes where relevant) and translation philosophy #3'
- issue: Rendering ἀνθρώπων
  chosen_reading: generic 'people'
  alternative_readings:
  - men
  rationale: The referent is human observers in general, not specifically males. This
    follows the gender-accurate principle by matching source intent rather than grammatical
    form alone.
  doctrine_reference: 'DOCTRINE.md: translation philosophy #4'
- issue: Rendering τοῖς οὐρανοῖς
  chosen_reading: literal plural 'the heavens'
  alternative_readings:
  - heaven
  rationale: Matthew frequently uses the plural form. Preserving 'the heavens' reflects
    the Greek wording and Matthean style without importing additional doctrinal claims.
  doctrine_reference: 'DOCTRINE.md: translation philosophy #1 and #5'
