theological_decisions:
- issue: Rendering ἀνθρώπων in a generic sense
  chosen_reading: people
  alternative_readings:
  - men
  - others
  rationale: The noun is generic here, referring to human observers generally rather
    than males specifically. This follows the project's gender-accurate principle
    by matching source intent rather than preserving a misleading masculine English
    form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Strength of δοξασθῶσιν
  chosen_reading: glorified by people
  alternative_readings:
  - praised by people
  - honored by people
  rationale: The stronger lexical sense 'glorified' is retained to avoid flattening
    the text, while the context makes clear this refers to human acclaim. This preserves
    the rhetorical contrast with divine reward in the surrounding passage.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
