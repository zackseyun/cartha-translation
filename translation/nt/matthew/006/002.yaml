id: MAT.6.2
reference: Matthew 6:2
source:
  edition: SBLGNT
  text: Ὅταν οὖν ποιῇς ἐλεημοσύνην, μὴ σαλπίσῃς ἔμπροσθέν σου, ὥσπερ οἱ ὑποκριταὶ
    ποιοῦσιν ἐν ταῖς συναγωγαῖς καὶ ἐν ταῖς ῥύμαις, ὅπως δοξασθῶσιν ὑπὸ τῶν ἀνθρώπων·
    ἀμὴν λέγω ὑμῖν, ἀπέχουσιν τὸν μισθὸν αὐτῶν.
translation:
  text: Therefore, whenever you give alms, do not sound a trumpet before yourself,
    as the hypocrites do in the synagogues and in the streets, so that they may be
    glorified by people. Truly I say to you, they have received their reward in full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you give to the needy' or 'when you do acts of mercy.' The Greek
      expression ποιεῖν ἐλεημοσύνην refers to charitable giving.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not announce it with a trumpet.' The wording may be hyperbolic or
      metaphorical, but the Greek literally says 'do not sound a trumpet.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that they may be praised' or 'honored' by people. The Greek verb
      is literally 'be glorified.'
    reason: lexical_alternative
  - marker: d
    text: 'The expression ''they have received their reward in full'' reflects a commercial
      idiom: they already have all the reward they are going to get.'
    reason: cultural_note
lexical_decisions:
- source_word: Ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Introduces an indefinite temporal clause with subjunctive ποιῇς; 'whenever'
    better reflects repeated or general circumstance than a simple punctual 'when'.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference/continuation from the preceding instruction. 'Therefore'
    preserves the logical connection clearly in English.
- source_word: ποιῇς ἐλεημοσύνην
  chosen: give alms
  alternatives:
  - do acts of mercy
  - give to the needy
  - practice charitable giving
  lexicon: BDAG
  rationale: The idiom means to perform charitable giving for the poor. 'Give alms'
    is concise and historically accurate, while remaining understandable; alternatives
    are possible but either more interpretive or less idiomatic.
- source_word: μὴ σαλπίσῃς
  chosen: do not sound a trumpet
  alternatives:
  - do not announce it with a trumpet
  lexicon: BDAG
  rationale: Aorist subjunctive with μή in prohibition. The literal image is retained
    rather than paraphrased, since the metaphor/hyperbole is vivid and traditional,
    and the source text explicitly mentions a trumpet.
- source_word: ἔμπροσθέν σου
  chosen: before yourself
  alternatives:
  - before you
  - in front of you
  lexicon: BDAG
  rationale: Literally 'before you.' Rendered 'before yourself' to keep the reflexive
    force of σου with the vivid image, though idiomatic English could also use 'before
    you.'
- source_word: ὑποκριταὶ
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: Standard and contextually apt rendering for those who perform piety for
    show. 'Pretenders' captures etymological background but is less established in
    this discourse context.
- source_word: συναγωγαῖς
  chosen: synagogues
  alternatives:
  - meeting places
  lexicon: BDAG
  rationale: Refers to Jewish synagogue settings; the established term is both accurate
    and clear.
- source_word: ῥύμαις
  chosen: streets
  alternatives:
  - lanes
  - public streets
  lexicon: BDAG
  rationale: Denotes streets or lanes, here public places where display would be seen.
    'Streets' is the most natural modern rendering.
- source_word: ὅπως δοξασθῶσιν ὑπὸ τῶν ἀνθρώπων
  chosen: so that they may be glorified by people
  alternatives:
  - so that they may be praised by others
  - so that they may be honored by men
  lexicon: BDAG
  rationale: ὅπως expresses purpose. δοξάζω is literally 'glorify/honor'; 'glorified'
    preserves the stronger term, though in context it refers to public acclaim. 'By
    people' avoids unnecessary male-specific wording where ἀνθρώπων is generic.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: A solemn formula introducing an authoritative declaration. 'Truly I say
    to you' preserves both the force of ἀμήν and the directness of λέγω.
- source_word: ἀπέχουσιν
  chosen: they have received ... in full
  alternatives:
  - they are receiving
  - they have their
  lexicon: BDAG
  rationale: Commercial idiom meaning to receive in full, to have paid out completely.
    The expanded English captures the idiomatic force better than a bare 'they have'
    or overly literal 'they receive.'
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - payment
  lexicon: BDAG
  rationale: In this moral/religious context, 'reward' is the natural English equivalent,
    though the underlying term can carry wage/payment nuance.
