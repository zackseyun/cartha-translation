id: MAT.6.23
reference: Matthew 6:23
source:
  edition: SBLGNT
  text: ἐὰν δὲ ὁ ὀφθαλμός σου πονηρὸς ᾖ, ὅλον τὸ σῶμά σου σκοτεινὸν ἔσται. εἰ οὖν
    τὸ φῶς τὸ ἐν σοὶ σκότος ἐστίν, τὸ σκότος πόσον.
translation:
  text: But if your eye is bad, your whole body will be dark. If then the light in
    you is darkness, how great is the darkness!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil,' 'unhealthy,' or possibly 'stingy/generous' in light of the idiom
      of the 'eye' and the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρὸς
  chosen: bad
  alternatives:
  - evil
  - unhealthy
  - stingy
  lexicon: BDAG
  rationale: πονῆρος can mean morally evil, bad, or in this context carry the idiomatic
    sense of a defective or ungenerous eye. 'Bad' preserves the broad semantic range
    and keeps the metaphor open, matching the immediate contrast with a 'healthy/single'
    eye in the previous verse without over-interpreting as only moral evil or only
    stinginess.
- source_word: σκοτεινὸν
  chosen: dark
  alternatives:
  - full of darkness
  - darkened
  lexicon: BDAG
  rationale: The adjective means dark/darkened. 'Dark' is concise, natural English
    and preserves the predicate force without adding words not explicit in the Greek.
- source_word: φῶς
  chosen: light
  lexicon: BDAG
  rationale: Standard rendering of φῶς. In context it refers metaphorically to one's
    inner illumination or moral/spiritual perception, but 'light' should remain literal
    in wording to preserve the metaphor.
- source_word: σκότος
  chosen: darkness
  lexicon: BDAG
  rationale: σκότος is best rendered 'darkness.' This keeps the metaphorical contrast
    with φῶς and the climactic repetition in the final clause.
- source_word: πόσον
  chosen: how great
  alternatives:
  - how much
  - how deep
  lexicon: BDAG
  rationale: In the exclamatory elliptical clause, πόσον expresses degree. 'How great'
    is idiomatic English that conveys the force of the warning better than the more
    wooden 'how much.'
- source_word: ὀφθαλμός
  chosen: eye
  lexicon: BDAG
  rationale: Literal 'eye' should be retained because Jesus' saying works through
    a bodily metaphor for perception, intention, and moral orientation.
- source_word: ὅλον τὸ σῶμά σου
  chosen: your whole body
  alternatives:
  - your entire body
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase; 'whole body' is natural and
    preserves the totalizing emphasis of ὅλον.
- source_word: τὸ φῶς τὸ ἐν σοὶ
  chosen: the light in you
  alternatives:
  - the light that is in you
  - your inner light
  lexicon: BDAG
  rationale: The articular phrase with ἐν σοὶ is best rendered 'the light in you.'
    This is clear and close to the Greek; 'inner light' would over-interpret.
