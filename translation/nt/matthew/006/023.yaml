theological_decisions:
- issue: Meaning of the 'bad eye' metaphor
  chosen_reading: Retain the broader metaphor with 'bad' rather than specifying 'evil'
    or 'stingy' in the main text.
  alternative_readings:
  - '''evil eye'' emphasizing moral corruption'
  - '''unhealthy eye'' emphasizing defective perception'
  - '''stingy eye'' emphasizing lack of generosity in the context of treasures and
    generosity'
  rationale: 'The immediate context (Matt 6:19–24) allows multiple overlapping nuances:
    moral darkness, distorted perception, and possibly the Semitic idiom of a grudging
    or ungenerous eye. To preserve theological and interpretive tension rather than
    resolve it, the main text uses the broader ''bad,'' while alternatives are preserved
    in a footnote.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
