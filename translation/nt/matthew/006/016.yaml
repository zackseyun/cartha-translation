id: MAT.6.16
reference: Matthew 6:16
source:
  edition: SBLGNT
  text: Ὅταν δὲ νηστεύητε, μὴ γίνεσθε ⸀ὡς οἱ ὑποκριταὶ σκυθρωποί, ἀφανίζουσιν γὰρ
    τὰ πρόσωπα αὐτῶν ὅπως φανῶσιν τοῖς ἀνθρώποις νηστεύοντες· ἀμὴν λέγω ⸀ὑμῖν, ἀπέχουσιν
    τὸν μισθὸν αὐτῶν.
translation:
  text: And whenever you fast, do not become gloomy like the hypocrites, for they
    disfigure their faces so that they may appear to men to be fasting. Truly I say
    to you, they have received their reward in full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to people.' The Greek says 'to men' (τοῖς ἀνθρώποις), often used in
      a general sense for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Introduces an indefinite temporal clause with iterative force; 'whenever'
    better captures repeated practice than a simple punctual 'when.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Connective linking this instruction with the preceding parallel teachings
    on almsgiving and prayer; 'And' preserves the discourse flow without overstating
    contrast.
- source_word: νηστεύητε
  chosen: you fast
  alternatives:
  - you are fasting
  lexicon: BDAG
  rationale: Present subjunctive in the temporal clause refers to the practice of
    fasting generally; simple present English is natural and sufficient.
- source_word: μὴ γίνεσθε
  chosen: do not become
  alternatives:
  - do not be
  lexicon: BDAG
  rationale: γίνομαι is ingressive here; 'do not become' preserves the nuance of adopting
    a manner or state, though English readers may hear it close to 'do not be.'
- source_word: ὡς οἱ ὑποκριταὶ
  chosen: like the hypocrites
  alternatives:
  - as the hypocrites
  lexicon: BDAG
  rationale: Standard comparative force; 'like' is idiomatic modern English.
- source_word: σκυθρωποί
  chosen: gloomy
  alternatives:
  - sullen
  - downcast
  - somber
  lexicon: BDAG
  rationale: Describes a deliberately sad or gloomy facial expression. 'Gloomy' is
    clear, natural, and fits the context of performative piety.
- source_word: ἀφανίζουσιν
  chosen: disfigure
  alternatives:
  - neglect
  - make unrecognizable
  - mar
  lexicon: BDAG
  rationale: The verb literally involves making something unseen/indistinct; in context
    it refers to altering or neglecting appearance so the face looks gaunt or marked.
    'Disfigure' best matches the likely sense and traditional contextual understanding.
- source_word: τὰ πρόσωπα αὐτῶν
  chosen: their faces
  alternatives:
  - their appearance
  lexicon: BDAG
  rationale: πρόσωπα is literally 'faces'; retaining the concrete expression preserves
    the imagery.
- source_word: ὅπως φανῶσιν τοῖς ἀνθρώποις νηστεύοντες
  chosen: so that they may appear to men to be fasting
  alternatives:
  - so that they may be seen by people as fasting
  - so that they may show people they are fasting
  lexicon: BDAG
  rationale: ὅπως marks purpose; φανῶσιν is passive/subjunctive with sense 'be seen/appear.'
    τοῖς ἀνθρώποις here refers to people generally, but 'men' preserves the source's
    masculine plural and traditional representative force per gender-accurate policy.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly, I tell you
  lexicon: BDAG
  rationale: A solemn formula introducing an authoritative declaration. 'Truly I say
    to you' is transparent and preserves the force without over-paraphrase.
- source_word: ἀπέχουσιν
  chosen: have received ... in full
  alternatives:
  - receive
  - are receiving
  - have their full payment
  lexicon: BDAG
  rationale: Commercial idiom meaning to receive in full, often with the sense of
    having no further claim. English needs expansion to convey the idiomatic force.
- source_word: τὸν μισθὸν αὐτῶν
  chosen: their reward
  alternatives:
  - their wages
  - their payment
  lexicon: BDAG
  rationale: μισθός can mean wages or reward; in this Matthean context 'reward' is
    the established and contextually appropriate sense, contrasting human recognition
    with divine recompense.
