theological_decisions:
- issue: Representative force of τοῖς ἀνθρώποις
  chosen_reading: rendered as 'men' in the main text
  alternative_readings:
  - people
  - others
  rationale: The noun ἄνθρωποι often means human beings generally. Per the project's
    gender-accurate-over-gender-neutral policy, masculine forms with representative
    force may be rendered with English forms matching the source's intent. Here 'men'
    preserves the Greek form and traditional cadence, while a footnote can clarify
    the generic sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatic force of ἀπέχουσιν τὸν μισθὸν αὐτῶν
  chosen_reading: expanded to 'they have received their reward in full'
  alternative_readings:
  - they have their reward
  - they are receiving their reward
  rationale: The phrase is not merely a statement that they possess a reward, but
    an idiom indicating full receipt already. The expansion preserves the warning
    that no further reward remains implied by the context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
