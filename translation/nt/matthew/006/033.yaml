theological_decisions:
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Following the doctrine table, the default rendering is 'righteousness.'
    In this Matthean context the term encompasses conformity to God's will and covenantal
    rightness; rendering it 'justice' alone would risk narrowing the sense. The alternative
    is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved in footnotes where relevant'
- issue: Referent of αὐτοῦ
  chosen_reading: his
  alternative_readings:
  - God's
  rationale: The pronoun is left as a pronoun in the main text to mirror the Greek
    and avoid interpretive over-specification, though the referent is clearly God/the
    Father from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
