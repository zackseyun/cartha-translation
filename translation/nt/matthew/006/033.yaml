id: MAT.6.33
reference: Matthew 6:33
source:
  edition: SBLGNT
  text: ζητεῖτε δὲ πρῶτον τὴν ⸀βασιλείαν καὶ τὴν δικαιοσύνην αὐτοῦ, καὶ ταῦτα πάντα
    προστεθήσεται ὑμῖν.
translation:
  text: But seek first his kingdom and his righteousness, and all these things will
    be added to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice.' The Greek word can denote righteousness or justice; here
      'righteousness' is retained as the default rendering because the context includes
      right relation and conduct before God, not only judicial or social justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - keep seeking
  - strive for
  lexicon: BDAG
  rationale: Present imperative plural calls for an ongoing directive. 'Seek' is concise
    and idiomatic in English while preserving the sense of active pursuit better than
    a weaker 'look for.' The durative force is implicit in the imperative context.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding prohibitions about anxiety and pursuit
    of material needs. 'But' best preserves the adversative turn in context.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - above all
  - as first priority
  lexicon: BDAG
  rationale: '''First'' preserves both the lexical form and the priority sense without
    over-paraphrasing. It naturally modifies the command to seek with primary concern.'
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign/rule or kingdom. In Matthew, 'kingdom' is the
    established and natural rendering, capable of including both realm and royal rule.
    Here it refers to God's kingly reign/order without needing an interpretive expansion
    in the main text.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness,' with 'justice'
    preserved as an alternative where relevant. In Matthew 6:33 the term likely includes
    covenantal rightness and conduct aligned with God's will; 'righteousness' best
    preserves that breadth without narrowing it to social justice alone.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun refers back to the Father/God in context. 'His' preserves
    the Greek pronoun directly and avoids unnecessary explicitation.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all these
  - all these things as well
  lexicon: BDAG
  rationale: This points back to the material necessities discussed in the immediate
    context (food, drink, clothing). 'All these things' is natural English and preserves
    the demonstrative force.
- source_word: προστεθήσεται
  chosen: will be added
  alternatives:
  - will be given in addition
  - will be provided additionally
  lexicon: BDAG
  rationale: Future passive indicates these things will be added in addition to the
    primary pursuit. 'Will be added' is both literal and idiomatic, and it preserves
    the verbal link to addition rather than replacing it with a more interpretive
    'provided.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is well represented by 'to you' with the passive verb 'will
    be added.' This is the most straightforward rendering.
