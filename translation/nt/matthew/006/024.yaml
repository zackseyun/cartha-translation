theological_decisions:
- issue: Rendering κύριος in a non-divine social context
  chosen_reading: masters
  alternative_readings:
  - lords
  rationale: DOCTRINE.md gives 'Lord' as the default for κύριος, but also allows contextual
    variance when required. In this verse, the plural and the slavery/service imagery
    make 'masters' the plain-sense rendering and avoid accidental confusion with the
    divine title reserved for God in the final clause.
  doctrine_reference: Translation philosophy §5; Contested terms table for κύριος
- issue: Rendering μαμωνᾶς
  chosen_reading: mammon
  alternative_readings:
  - money
  - wealth
  rationale: The verse sets God and μαμωνᾶς as rival objects of service. Preserving
    the loanword in the main text keeps the personified, quasi-masterly force and
    avoids reducing the saying to a merely economic truism. The more explanatory alternatives
    are preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §6
