id: MAT.6.24
reference: Matthew 6:24
source:
  edition: SBLGNT
  text: Οὐδεὶς δύναται δυσὶ κυρίοις δουλεύειν· ἢ γὰρ τὸν ἕνα μισήσει καὶ τὸν ἕτερον
    ἀγαπήσει, ἢ ἑνὸς ἀνθέξεται καὶ τοῦ ἑτέρου καταφρονήσει. οὐ δύνασθε θεῷ δουλεύειν
    καὶ μαμωνᾷ.
translation:
  text: No one is able to serve two masters, for either he will hate the one and love
    the other, or he will be devoted to one and despise the other. You are not able
    to serve God and mammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wealth' or 'money.' The Greek uses the loanword 'mammon,' which can
      personify riches as a rival master.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  chosen: No one
  alternatives:
  - Nobody
  lexicon: BDAG
  rationale: Indefinite negative pronoun best rendered as the universal negative 'No
    one'; more formal and literary than 'Nobody' while remaining natural.
- source_word: δύναται / δύνασθε
  chosen: is able / are not able
  alternatives:
  - can / cannot
  lexicon: BDAG
  rationale: The verb denotes ability or capability. 'Able' preserves the sense of
    incapacity more explicitly than the contracted modal 'can/cannot,' and matches
    the repeated emphasis in the verse.
- source_word: δυσὶ κυρίοις
  chosen: two masters
  alternatives:
  - two lords
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' in many contexts, here the plural
    with δουλεύειν describes ownership/service relations, so 'masters' better conveys
    the social reality and avoids confusion with the divine title. This is a documented
    contextual exception to the default rendering.
- source_word: δουλεύειν
  chosen: to serve / serve
  alternatives:
  - to be a slave to
  - to be enslaved to
  lexicon: BDAG
  rationale: The verb denotes rendering service as a slave or bonded servant. In this
    saying, English idiom strongly favors 'serve two masters.' The bonded nuance is
    still carried by 'masters,' so a more wooden 'be a slave to' is unnecessary in
    the main text.
- source_word: μισήσει
  chosen: will hate
  alternatives:
  - will love less than
  lexicon: BDAG
  rationale: The future verb is rendered straightforwardly as 'will hate.' While Semitic-influenced
    comparative force can sometimes soften the term, the antithetical parallel with
    'love' and 'despise' supports retaining the stronger English verb in the main
    text.
- source_word: ἀγαπήσει
  chosen: will love
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω; the contrast with 'hate' is central to
    the saying and should remain explicit.
- source_word: ἑνὸς ἀνθέξεται
  chosen: he will be devoted to one
  alternatives:
  - he will hold fast to one
  - he will be loyal to one
  lexicon: BDAG
  rationale: ἀντέχομαι here conveys clinging to, holding firmly to, or being devoted
    to one party. 'Be devoted to' is natural modern English and fits the relational
    contrast with 'despise the other.'
- source_word: καταφρονήσει
  chosen: despise
  alternatives:
  - look down on
  - scorn
  lexicon: BDAG
  rationale: '''Despise'' preserves the force of treating someone with contempt and
    pairs well with the elevated style of the saying.'
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Dative object after δουλεύειν; standard rendering.
- source_word: μαμωνᾷ
  chosen: mammon
  alternatives:
  - money
  - wealth
  lexicon: BDAG
  rationale: The Aramaic loanword is preserved as 'mammon' to retain the personified,
    master-like force in the contrast with God. A more interpretive rendering such
    as 'money' or 'wealth' is possible but flattens the rhetorical parallel. The lexical
    sense is preserved in a footnote.
