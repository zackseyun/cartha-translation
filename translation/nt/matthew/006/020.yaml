theological_decisions:
- issue: Nature of 'treasures in heaven'
  chosen_reading: Retained the metaphor 'treasures in heaven' without interpretive
    expansion.
  alternative_readings:
  - heavenly rewards
  - spiritual riches
  rationale: The verse uses metaphorical language that could be over-interpreted if
    paraphrased. Preserving the metaphor maintains theological tension and avoids
    importing a specific doctrine of merit or reward structure not explicit in the
    text.
  doctrine_reference: Translation philosophy §3
- issue: Scope of βρῶσις in the contrast with heavenly treasure
  chosen_reading: Rendered broadly as 'decay' rather than specifically 'rust.'
  alternative_readings:
  - rust
  - corrosion
  rationale: This avoids narrowing Jesus' point to metallic corrosion and better reflects
    the broader consuming/destructive sense in context, while not altering the theological
    contrast between perishable earthly wealth and imperishable heavenly treasure.
  doctrine_reference: Translation philosophy §1, §6
