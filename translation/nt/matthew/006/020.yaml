id: MAT.6.20
reference: Matthew 6:20
source:
  edition: SBLGNT
  text: θησαυρίζετε δὲ ὑμῖν θησαυροὺς ἐν οὐρανῷ, ὅπου οὔτε σὴς οὔτε βρῶσις ἀφανίζει,
    καὶ ὅπου κλέπται οὐ διορύσσουσιν οὐδὲ κλέπτουσιν·
translation:
  text: But store up for yourselves treasures in heaven, where neither moth nor decay
    destroys, and where thieves do not break in and steal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rust.' The Greek word can refer more broadly to consuming deterioration
      or corrosion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'dig through,' likely referring to thieves breaking through the
      walls of a house.
    reason: cultural_note
lexical_decisions:
- source_word: θησαυρίζετε
  chosen: store up
  alternatives:
  - lay up
  - treasure up
  lexicon: BDAG
  rationale: Present imperative calls for ongoing action. 'Store up' is idiomatic
    modern English and preserves the metaphor of accumulating treasure without sounding
    archaic like 'lay up.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the prohibition in the previous verse ('do not store
    up... but store up...'). 'But' best conveys the adversative force in context.
- source_word: ὑμῖν
  chosen: for yourselves
  alternatives:
  - for you
  - for your own benefit
  lexicon: BDAG
  rationale: Dative of advantage/reflexive sense in this idiom; 'for yourselves' is
    the natural English equivalent and matches the force of personal interest.
- source_word: θησαυροὺς
  chosen: treasures
  alternatives:
  - treasure
  lexicon: BDAG
  rationale: Plural accusative is best preserved as 'treasures,' matching the Greek
    number and the repeated treasure motif in the context.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  - in heavenlies
  lexicon: BDAG
  rationale: Singular dative here is idiomatically rendered 'in heaven' in English.
    This preserves the locative sense without awkward literalism.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: Straightforward locative relative adverb; 'where' is natural and sufficiently
    precise.
- source_word: σὴς
  chosen: moth
  lexicon: BDAG
  rationale: Refers to moth as a destroyer of stored garments and goods; the traditional
    and accurate rendering is 'moth.'
- source_word: βρῶσις
  chosen: decay
  alternatives:
  - rust
  - corrosion
  - eating
  lexicon: BDAG
  rationale: The noun can denote 'eating' or that which consumes. In this context
    it refers broadly to the consuming deterioration of earthly goods, not only metal
    oxidation. 'Decay' captures the wider sense better than the traditional but narrower
    'rust,' while remaining readable.
- source_word: ἀφανίζει
  chosen: destroys
  alternatives:
  - makes disappear
  - ruins
  - consumes
  lexicon: BDAG
  rationale: Conveys causing something to perish or vanish. 'Destroys' is clear, idiomatic,
    and fits both moth and decay as subjects.
- source_word: κλέπται
  chosen: thieves
  lexicon: BDAG
  rationale: Standard rendering of the plural noun.
- source_word: διορύσσουσιν
  chosen: break in
  alternatives:
  - dig through
  - break through
  lexicon: BDAG
  rationale: Literally refers to digging through, especially mud-brick walls. In contemporary
    English, 'break in' communicates the action naturally; the more literal cultural
    image is worth preserving in a footnote.
- source_word: κλέπτουσιν
  chosen: steal
  alternatives:
  - steal away
  lexicon: BDAG
  rationale: Simple and direct rendering of the verb.
