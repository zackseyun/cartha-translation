id: MAT.6.27
reference: Matthew 6:27
source:
  edition: SBLGNT
  text: τίς δὲ ἐξ ὑμῶν μεριμνῶν δύναται προσθεῖναι ἐπὶ τὴν ἡλικίαν αὐτοῦ πῆχυν ἕνα;
translation:
  text: And which of you, by being anxious, can add one cubit to his lifespan?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his stature one cubit.' The Greek word can mean either 'lifespan/age'
      or 'stature.'
    reason: alternative_reading
lexical_decisions:
- source_word: τίς δὲ ἐξ ὑμῶν
  chosen: And which of you
  alternatives:
  - But which of you
  - And who among you
  lexicon: BDAG
  rationale: τίς with ἐξ ὑμῶν is an idiomatic question meaning 'which/who among you.'
    δέ here is lightly connective; 'And' fits the discourse flow in English better
    than a strongly adversative 'But,' while preserving continuity with the surrounding
    teaching.
- source_word: μεριμνῶν
  chosen: by being anxious
  alternatives:
  - by worrying
  - while being anxious
  lexicon: BDAG
  rationale: The participle from μεριμνάω denotes being anxious or worried. 'By being
    anxious' captures the participial means/instrument nuance in natural English and
    aligns with the surrounding context about anxiety.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: δύναμαι expresses ability. 'Can' is the most natural modern English equivalent.
- source_word: προσθεῖναι
  chosen: add
  alternatives:
  - increase
  - put on
  lexicon: BDAG
  rationale: προστίθημι here means to add or increase. 'Add' preserves the concrete
    verbal image and works with the following measure expression.
- source_word: ἐπὶ τὴν ἡλικίαν αὐτοῦ
  chosen: to his lifespan
  alternatives:
  - to his stature
  - to his life span
  lexicon: BDAG
  rationale: ἡλικία can mean either 'age/lifespan' or 'stature.' In this context,
    paired with anxiety and the parallel in Luke 12:25, 'lifespan' best fits the sense
    of extending one's life, though the alternative 'stature' is longstanding and
    worth preserving in a footnote.
- source_word: πῆχυν ἕνα
  chosen: one cubit
  alternatives:
  - a single cubit
  - about eighteen inches
  lexicon: BDAG
  rationale: 'πῆχυς is literally a cubit, a standard measure of length. Retaining
    ''cubit'' preserves the concrete metaphor of measured extension; converting it
    to modern units would over-interpret. Even with ''lifespan,'' the image is metaphorical:
    a length measure applied to life.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and representative/generic.
    Per the project's gender-accurate policy, 'his' is retained rather than neutralizing
    to 'one's'.
