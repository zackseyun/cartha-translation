theological_decisions:
- issue: Meaning of ἡλικία in this saying
  chosen_reading: lifespan
  alternative_readings:
  - stature
  rationale: The verse asks what anxiety can accomplish; 'lifespan' coheres well with
    the broader argument about God's care for life and with the idiom of adding to
    one's allotted span. The traditional alternative 'stature' remains lexically possible
    and is preserved in a footnote rather than being erased.
