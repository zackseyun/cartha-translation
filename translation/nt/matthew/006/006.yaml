id: MAT.6.6
reference: Matthew 6:6
source:
  edition: SBLGNT
  text: σὺ δὲ ὅταν προσεύχῃ, εἴσελθε εἰς τὸ ταμεῖόν σου καὶ κλείσας τὴν θύραν σου
    πρόσευξαι τῷ πατρί σου τῷ ἐν τῷ κρυπτῷ· καὶ ὁ πατήρ σου ὁ βλέπων ἐν τῷ κρυπτῷ
    ἀποδώσει ⸀σοι.
translation:
  text: But when you pray, go into your inner room, and after shutting your door,
    pray to your Father who is in secret; and your Father, who sees in secret, will
    reward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'private room,' 'storeroom,' or traditionally 'closet.' The Greek refers
      to an interior room used for privacy or storage.
    reason: lexical_alternative
  - marker: b
    text: Or 'will repay you.' The Greek verb can mean 'give back,' 'repay,' or 'reward,'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But you
  alternatives:
  - But as for you
  - But when it is you
  lexicon: BDAG
  rationale: The emphatic pronoun with δέ marks contrast with the hypocrites in the
    previous verse. English does not need to front the pronoun as strongly, but the
    contrast is preserved with 'But when you pray' in the full sentence.
- source_word: ὅταν προσεύχῃ
  chosen: when you pray
  alternatives:
  - whenever you pray
  lexicon: BDAG
  rationale: ὅταν with the subjunctive gives a general temporal sense. 'When you pray'
    is natural modern English and preserves the expected, repeated action without
    sounding wooden.
- source_word: εἴσελθε
  chosen: go into
  alternatives:
  - enter
  lexicon: BDAG
  rationale: Aorist imperative calling for the action to be done. 'Go into' is idiomatic
    and readable, while still reflecting movement into a place.
- source_word: ταμεῖόν
  chosen: inner room
  alternatives:
  - storeroom
  - private room
  - closet
  lexicon: BDAG
  rationale: ταμεῖον refers to an interior storage or private room. 'Inner room' best
    preserves the idea of a secluded interior space without the misleading modern
    associations of 'closet.'
- source_word: κλείσας τὴν θύραν σου
  chosen: after shutting your door
  alternatives:
  - having shut your door
  - and shut your door
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as antecedent action relative
    to the main imperative. 'After shutting your door' is clear modern English and
    preserves the sequence.
- source_word: πρόσευξαι
  chosen: pray
  alternatives:
  - offer prayer
  lexicon: BDAG
  rationale: Aorist middle imperative of προσεύχομαι. Simple 'pray' is the direct
    and natural rendering.
- source_word: τῷ πατρί σου
  chosen: to your Father
  alternatives:
  - to your heavenly Father
  lexicon: BDAG
  rationale: The text says 'your Father' without adding 'heavenly' here. The relational
    address should be preserved without importing wording from nearby passages.
- source_word: τῷ ἐν τῷ κρυπτῷ
  chosen: who is in secret
  alternatives:
  - who is in the secret place
  - who is unseen
  - who is in private
  lexicon: BDAG
  rationale: The phrase modifies 'your Father' and denotes hiddenness/secrecy rather
    than a physical location alone. 'Who is in secret' stays close to the Greek and
    matches the repeated phrase later in the verse.
- source_word: ὁ βλέπων ἐν τῷ κρυπτῷ
  chosen: who sees in secret
  alternatives:
  - who sees what is done in secret
  - who sees the hidden things
  lexicon: BDAG
  rationale: The participial phrase identifies the Father as the one seeing in the
    hidden realm. 'Who sees in secret' is concise and preserves the Greek repetition.
- source_word: ἀποδώσει σοι
  chosen: will reward you
  alternatives:
  - will repay you
  - will give back to you
  lexicon: BDAG
  rationale: ἀποδίδωμι can mean repay, give back, or reward depending on context.
    Here the context is divine response to sincere prayer, so 'will reward you' best
    conveys the positive sense without over-specifying the nature of the reward.
