theological_decisions:
- issue: Meaning of the repeated phrase ἐν τῷ κρυπτῷ
  chosen_reading: Rendered as 'in secret' both for the Father's hidden presence and
    his seeing of what is hidden.
  alternative_readings:
  - in the secret place
  - in private
  - what is done in secret
  rationale: The verse emphasizes hiddenness in contrast to public display. Keeping
    the same English phrase preserves the rhetorical repetition and theological contrast
    without resolving it into either purely locative or purely adverbial language.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of πατήρ in relation to God
  chosen_reading: Father
  rationale: This is Jesus' direct designation for God in the context of prayer. It
    should be translated plainly and relationally, without expansion or doctrinal
    paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
