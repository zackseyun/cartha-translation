theological_decisions:
- issue: Temporal force of ἔσται in a wisdom-like saying
  chosen_reading: 'Retain explicit future: ''will be'''
  alternative_readings:
  - 'Use present tense: ''is'' to express a general timeless principle'
  rationale: 'The Greek text uses a future form, and preserving it avoids flattening
    the saying into mere static description. The verse teaches not only correspondence
    but directional moral formation: one''s heart follows one''s treasure. This is
    a lexical-syntactic decision with theological implications about desire and allegiance,
    but it does not require resolving any doctrinal controversy beyond the text.'
  doctrine_reference: Translation philosophy §1, §3, §5
