id: MAT.6.21
reference: Matthew 6:21
source:
  edition: SBLGNT
  text: ὅπου γάρ ἐστιν ὁ θησαυρός ⸀σου, ἐκεῖ ἔσται καὶ ἡ καρδία ⸁σου.
translation:
  text: For where your treasure is, there your heart will be also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For where your treasure is, there your heart is also.' Some English
      versions render the clause as a timeless present, but the Greek verb is future
      ('will be').
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - wherever
  lexicon: BDAG
  rationale: Introduces a locative-relative clause. 'Where' is the most natural and
    sufficiently precise English equivalent here.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding teaching about storing
    up treasure. 'For' preserves the discourse logic more transparently than a looser
    rendering.
- source_word: θησαυρός
  chosen: treasure
  alternatives:
  - store of wealth
  - what you treasure
  lexicon: BDAG
  rationale: '''Treasure'' is the standard and natural gloss, preserving both literal
    and metaphorical force in context without over-interpreting the noun into a verbal
    idea.'
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: The genitive pronoun marks possession with both 'treasure' and 'heart';
    straightforwardly rendered as 'your' in English.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Correlates with ὅπου ('where ... there'). 'There' preserves the compact
    parallelism of the Greek.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - is
  lexicon: BDAG
  rationale: 'Future middle indicative of εἰμί is best rendered as future in English.
    Although some translations smooth it to a timeless present for proverbial effect,
    the Greek form should be preserved: the heart comes to rest where treasure is
    placed.'
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - affections
  lexicon: BDAG
  rationale: '''Heart'' is the established and accurate rendering for καρδία, encompassing
    desire, loyalty, and inner orientation. More interpretive alternatives narrow
    the semantic range too much.'
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: Placed after 'will be' in idiomatic English ('will be also'). It preserves
    the additive emphasis linking heart to treasure.
