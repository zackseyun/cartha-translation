id: MAT.6.26
reference: Matthew 6:26
source:
  edition: SBLGNT
  text: ἐμβλέψατε εἰς τὰ πετεινὰ τοῦ οὐρανοῦ ὅτι οὐ σπείρουσιν οὐδὲ θερίζουσιν οὐδὲ
    συνάγουσιν εἰς ἀποθήκας, καὶ ὁ πατὴρ ὑμῶν ὁ οὐράνιος τρέφει αὐτά· οὐχ ὑμεῖς μᾶλλον
    διαφέρετε αὐτῶν;
translation:
  text: Look at the birds of the sky, because they do not sow or reap or gather into
    barns, and your heavenly Father feeds them. Are you not worth much more than they
    are?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of heaven' or, more traditionally, 'the birds of the air.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Are you not of more value than they?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψατε
  chosen: Look at
  alternatives:
  - Consider
  - Look closely at
  lexicon: BDAG
  rationale: Aorist imperative calling for directed attention. 'Look at' is natural
    modern English and preserves the force of an imperative without overinterpreting
    the intensity.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: πετεινά denotes birds/flying creatures. 'Of the sky' is a direct rendering
    of τοῦ οὐρανοῦ and avoids importing the more traditional but less literal 'of
    the air.' 'Heaven' is possible, but 'sky' better fits the visible created realm
    in this context.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the command to look at the birds.
    'Because' makes the logic explicit in clear English.
- source_word: σπείρουσιν ... θερίζουσιν ... συνάγουσιν
  chosen: do not sow or reap or gather
  alternatives:
  - do not plant or harvest or store up
  lexicon: BDAG
  rationale: These are common agricultural verbs. 'Sow,' 'reap,' and 'gather' preserve
    the agrarian imagery and verbal parallelism of the Greek.
- source_word: εἰς ἀποθήκας
  chosen: into barns
  alternatives:
  - into storehouses
  - into granaries
  lexicon: BDAG
  rationale: ἀποθήκαι are storage places for produce. 'Barns' is idiomatic and readily
    understood, while still fitting the agricultural setting.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  chosen: your heavenly Father
  alternatives:
  - your Father in heaven
  - your Father, the heavenly one
  lexicon: BDAG
  rationale: This compact English rendering preserves both the relational term 'Father'
    and the adjective οὐράνιος. It is standard, clear, and faithful to the Greek.
- source_word: τρέφει
  chosen: feeds
  alternatives:
  - nourishes
  lexicon: BDAG
  rationale: τρέφω here refers to providing food. 'Feeds' is the most natural and
    direct equivalent.
- source_word: οὐχ ὑμεῖς μᾶλλον διαφέρετε αὐτῶν;
  chosen: Are you not worth much more than they are?
  alternatives:
  - Are you not of more value than they?
  - Do you not matter more than they do?
  lexicon: BDAG
  rationale: The rhetorical question expects a positive answer. διαφέρω here conveys
    surpassing in value or importance. 'Worth much more' communicates the comparative
    force of μᾶλλον in natural English without weakening the argument.
