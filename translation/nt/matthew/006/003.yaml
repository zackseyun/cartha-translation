theological_decisions:
- issue: Interpretation of the saying about the left and right hand
  chosen_reading: Retain the metaphor as an exhortation to extreme secrecy and freedom
    from self-display in giving.
  alternative_readings:
  - Treat as hyperbole for humility in general
  - Treat as a prohibition of all public charity without exception
  rationale: The verse uses vivid personification and hyperbole. The translation preserves
    the image rather than flattening it into an interpretive paraphrase. This avoids
    importing a stricter doctrinal claim than the text itself makes while maintaining
    Jesus' emphasis on hidden generosity.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
