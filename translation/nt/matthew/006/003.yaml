id: MAT.6.3
reference: Matthew 6:3
source:
  edition: SBLGNT
  text: σοῦ δὲ ποιοῦντος ἐλεημοσύνην μὴ γνώτω ἡ ἀριστερά σου τί ποιεῖ ἡ δεξιά σου,
translation:
  text: But when you give to the needy, do not let your left hand know what your right
    hand is doing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you do almsgiving'; the Greek term refers to charitable giving
      to the poor.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοῦ δὲ ποιοῦντος
  chosen: But when you give
  alternatives:
  - But as for you, when you do
  - But you, when doing
  lexicon: BDAG
  rationale: The genitive absolute with δέ marks contrast with the preceding instruction
    and is most naturally rendered in idiomatic English as 'But when you…'. Although
    ποιέω is formally 'do,' in context with ἐλεημοσύνην it refers to performing charitable
    giving, so 'give' communicates the sense more clearly without over-paraphrase.
- source_word: ἐλεημοσύνην
  chosen: to the needy
  alternatives:
  - alms
  - acts of mercy
  - charitable giving
  lexicon: BDAG
  rationale: ἐλεημοσύνη commonly denotes almsgiving/charitable giving to the poor.
    'To the needy' expresses the object and purpose in natural modern English. 'Alms'
    is traditional but less accessible for the target audience.
- source_word: μὴ γνώτω
  chosen: do not let ... know
  alternatives:
  - let ... not know
  - do not allow ... to know
  lexicon: BDAG
  rationale: 'The third-person aorist imperative with μή is naturally rendered as
    a prohibition: ''do not let ... know.'' This preserves the vivid personification
    of the hands while reading smoothly in English.'
- source_word: ἡ ἀριστερά σου
  chosen: your left hand
  lexicon: BDAG
  rationale: A straightforward literal rendering preserves the metaphor and the memorable
    parallelism of the saying.
- source_word: τί ποιεῖ ἡ δεξιά σου
  chosen: what your right hand is doing
  alternatives:
  - what your right hand does
  lexicon: BDAG
  rationale: The present tense ποιεῖ is well represented by the progressive 'is doing'
    in this idiomatic saying, highlighting ongoing action. 'Does' is possible, but
    'is doing' better reflects the Greek aspect in contemporary English.
