id: MAT.6.7
reference: Matthew 6:7
source:
  edition: SBLGNT
  text: Προσευχόμενοι δὲ μὴ βατταλογήσητε ὥσπερ οἱ ἐθνικοί, δοκοῦσιν γὰρ ὅτι ἐν τῇ
    πολυλογίᾳ αὐτῶν εἰσακουσθήσονται·
translation:
  text: And when you pray, do not heap up empty words like the Gentiles, for they
    think that they will be heard because of their many words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not babble' or 'do not use meaningless repetition.' The Greek verb
      is rare and likely refers to empty, mechanical, or verbose speech rather than
      sincere repeated prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'pagans.' The Greek literally refers to the Gentiles, that is, the nations
      outside the covenant people.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσευχόμενοι
  chosen: when you pray
  alternatives:
  - while praying
  - as you pray
  lexicon: BDAG
  rationale: The participle is adverbial and naturally introduces the circumstance
    of the command. 'When you pray' is idiomatic modern English and fits the instructional
    context better than a more wooden participial rendering.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks continuation to the next instruction in Jesus' teaching.
    'And' preserves the flow without overstating contrast.
- source_word: μὴ βατταλογήσητε
  chosen: do not heap up empty words
  alternatives:
  - do not babble
  - do not use meaningless repetition
  - do not prattle
  lexicon: BDAG
  rationale: βατταλογέω is rare and likely conveys verbose, mechanical, or empty speech
    rather than mere repetition as such. 'Heap up empty words' captures both excess
    and lack of substance, avoiding the implication that all repeated prayer is condemned.
- source_word: ὥσπερ οἱ ἐθνικοί
  chosen: like the Gentiles
  alternatives:
  - like the pagans
  - like the nations
  lexicon: BDAG
  rationale: ἐθνικοί in this Jewish context refers to non-Jews. 'Gentiles' is the
    most direct and contextually accurate rendering; 'pagans' is interpretive and
    foregrounds religion rather than ethnicity/covenantal identity.
- source_word: δοκοῦσιν
  chosen: they think
  alternatives:
  - they suppose
  - they imagine
  lexicon: BDAG
  rationale: δοκέω here expresses their assumption or belief about prayer. 'They think'
    is clear, natural, and sufficiently precise.
- source_word: ἐν τῇ πολυλογίᾳ αὐτῶν
  chosen: because of their many words
  alternatives:
  - by their many words
  - in their wordiness
  - through their much speaking
  lexicon: BDAG
  rationale: πολυλογία denotes much speaking or wordiness. Rendering the prepositional
    phrase causally as 'because of their many words' communicates the sense of the
    mistaken basis on which they expect a hearing.
- source_word: εἰσακουσθήσονται
  chosen: they will be heard
  alternatives:
  - they will be listened to
  - they will be answered
  lexicon: BDAG
  rationale: The passive means to be heard favorably or granted a hearing. 'They will
    be heard' preserves the wording without importing the stronger idea of receiving
    an answer.
