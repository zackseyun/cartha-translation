theological_decisions:
- issue: Whether Jesus forbids all repetition in prayer or specifically empty, verbose
    speech
  chosen_reading: The main text renders βατταλογήσητε as 'heap up empty words,' indicating
    a prohibition of empty verbosity rather than all repeated prayer.
  alternative_readings:
  - do not use meaningless repetition
  - do not babble
  rationale: This wording preserves the force of the rare verb while avoiding a doctrinally
    misleading reading that would conflict with biblical examples of repeated earnest
    prayer. The verse critiques pagan-style verbosity as a means of securing divine
    attention, not repetition per se.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
