id: MAT.6.25
reference: Matthew 6:25
source:
  edition: SBLGNT
  text: Διὰ τοῦτο λέγω ὑμῖν· μὴ μεριμνᾶτε τῇ ψυχῇ ὑμῶν τί ⸀φάγητε, μηδὲ τῷ σώματι
    ὑμῶν τί ἐνδύσησθε· οὐχὶ ἡ ψυχὴ πλεῖόν ἐστι τῆς τροφῆς καὶ τὸ σῶμα τοῦ ἐνδύματος;
translation:
  text: Therefore I tell you, do not worry about your life, what you will eat, or
    about your body, what you will wear. Is not life more than food, and the body
    than clothing?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' for 'life' (ψυχή), though here the context of eating and clothing
      favors 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Introduces an inference from the preceding teaching; 'Therefore' is natural
    modern English and preserves the logical connection.
- source_word: μεριμνᾶτε
  chosen: do not worry
  alternatives:
  - do not be anxious
  - do not be concerned
  lexicon: BDAG
  rationale: The verb denotes anxious care or worry. 'Do not worry' is idiomatic and
    accessible, while still conveying the prohibition against anxious preoccupation.
- source_word: ψυχῇ
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this context the contrast is with food and bodily needs, so ψυχή refers
    to one's life/self rather than the immaterial soul. 'Life' best fits the immediate
    sense and the concluding rhetorical question.
- source_word: τί φάγητε
  chosen: what you will eat
  alternatives:
  - what you may eat
  lexicon: BDAG
  rationale: The aorist subjunctive in an indirect-question construction after μεριμνάω
    is naturally rendered as a future-oriented concern in English.
- source_word: σώματι
  chosen: body
  lexicon: BDAG
  rationale: Literal reference to the physical body in contrast with clothing.
- source_word: τί ἐνδύσησθε
  chosen: what you will wear
  alternatives:
  - what you may put on
  - what you will put on
  lexicon: BDAG
  rationale: Idiomatic English for clothing oneself; 'wear' is smoother than the more
    literal 'put on' in this context.
- source_word: οὐχὶ
  chosen: Is not
  alternatives:
  - Isn't
  lexicon: BDAG
  rationale: Introduces a rhetorical question expecting a positive answer. 'Is not'
    preserves the formal force without sounding archaic in this sentence.
- source_word: πλεῖόν
  chosen: more than
  alternatives:
  - greater than
  - worth more than
  lexicon: BDAG
  rationale: Comparative expression indicating that life/body exceeds food/clothing
    in significance. 'More than' is the most natural English equivalent.
- source_word: τροφῆς
  chosen: food
  alternatives:
  - nourishment
  lexicon: BDAG
  rationale: τροφὴ here refers to food as that which sustains life; 'food' is clear
    and direct.
- source_word: ἐνδύματος
  chosen: clothing
  alternatives:
  - garment
  - what is worn
  lexicon: BDAG
  rationale: General term for clothing/apparel. 'Clothing' matches modern usage and
    parallels 'food' well.
