theological_decisions:
- issue: Meaning of ψυχή in Jesus' teaching
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: The context concerns material necessities—eating, bodily care, and clothing—so
    ψυχή denotes earthly life or one's life/self, not specifically the immaterial
    soul. This avoids importing a dualistic theological claim the verse itself does
    not make.
  doctrine_reference: Translation philosophy §1, §3
