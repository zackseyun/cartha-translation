id: MAT.6.8
reference: Matthew 6:8
source:
  edition: SBLGNT
  text: μὴ οὖν ὁμοιωθῆτε αὐτοῖς, οἶδεν γὰρ ⸀ὁ πατὴρ ὑμῶν ὧν χρείαν ἔχετε πρὸ τοῦ ὑμᾶς
    αἰτῆσαι αὐτόν.
translation:
  text: Therefore, do not become like them, for your Father knows what you need before
    you ask him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'do not be made like them' / 'do not be like them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν
  chosen: Therefore, do not
  alternatives:
  - So do not
  - Then do not
  lexicon: BDAG
  rationale: Combines the prohibitive μή with inferential οὖν. 'Therefore' preserves
    the logical connection to the preceding warning about pagan-style praying.
- source_word: ὁμοιωθῆτε
  chosen: become like
  alternatives:
  - be like
  - be made like
  - resemble
  lexicon: BDAG
  rationale: Aorist passive subjunctive in prohibition; idiomatic English is 'do not
    become like' or 'do not be like.' 'Become like' preserves the sense of conforming
    oneself to their pattern without sounding wooden.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - those people
  lexicon: BDAG
  rationale: Refers back to the Gentiles/hypocrites in the immediate context. Simple
    pronoun is sufficient and natural.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - has known
  - is aware of
  lexicon: BDAG
  rationale: 'Although οἶδα is formally perfect in form, it functions with present
    meaning: ''knows.'''
- source_word: ὁ πατὴρ ὑμῶν
  chosen: your Father
  alternatives:
  - your heavenly Father
  - the Father of you
  lexicon: BDAG
  rationale: The Greek here reads simply 'your Father' without the explicit 'heavenly'
    found elsewhere in the context. The translation should not import extra wording.
- source_word: ὧν χρείαν ἔχετε
  chosen: what you need
  alternatives:
  - the things you need
  - what need you have
  lexicon: BDAG
  rationale: This construction expresses the content of their need. 'What you need'
    is concise, natural English and accurately conveys the sense.
- source_word: πρὸ τοῦ ὑμᾶς αἰτῆσαι αὐτόν
  chosen: before you ask him
  alternatives:
  - before you ask of him
  - before your asking him
  lexicon: BDAG
  rationale: πρὸ τοῦ with infinitive marks prior time. 'Ask him' is idiomatic for
    αἰτέω with personal object here and avoids awkward literalism.
