theological_decisions:
- issue: Divine foreknowledge in relation to prayer
  chosen_reading: Render the statement straightforwardly as the Father's prior knowledge
    of the disciples' needs without adding explanatory language about why prayer is
    still commanded.
  alternative_readings:
  - A paraphrastic rendering that explains prayer as relational rather than informational
  - A doctrinally loaded rendering emphasizing exhaustive foreknowledge
  rationale: The verse plainly states that the Father knows the disciples' needs before
    they ask. The translation should preserve that theological tension and not resolve
    broader debates about prayer and divine knowledge beyond the text itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
