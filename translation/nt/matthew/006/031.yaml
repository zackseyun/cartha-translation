theological_decisions:
- issue: Nature of Jesus' prohibition regarding material needs
  chosen_reading: Render μεριμνήσητε as a prohibition of anxious worry, not a blanket
    ban on prudent planning.
  alternative_readings:
  - Do not be anxious
  - Do not be concerned at all
  rationale: The immediate context addresses anxiety over provision, not responsible
    foresight. 'Do not worry' preserves the force of the saying without importing
    an absolutist claim beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
