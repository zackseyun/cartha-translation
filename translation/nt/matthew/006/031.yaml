id: MAT.6.31
reference: Matthew 6:31
source:
  edition: SBLGNT
  text: μὴ οὖν μεριμνήσητε λέγοντες· Τί φάγωμεν; ἤ· Τί πίωμεν; ἤ· Τί περιβαλώμεθα;
translation:
  text: Therefore do not worry, saying, ‘What will we eat?’ or ‘What will we drink?’
    or ‘What will we wear?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be anxious.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν μεριμνήσητε
  chosen: Therefore do not worry
  alternatives:
  - So do not be anxious
  - Therefore do not be concerned
  lexicon: BDAG
  rationale: μεριμνάω in this context refers to anxious concern about material needs.
    'Do not worry' is natural modern English and fits the discourse of Jesus' teaching
    on anxiety, while preserving the prohibitive force of μή with the aorist subjunctive.
    οὖν is carried by 'Therefore' to show inference from the preceding argument.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - by saying
  - and saying
  lexicon: BDAG
  rationale: The participle is rendered straightforwardly as 'saying,' expressing
    the manner/content accompanying the worrying. English can leave the participial
    relation implicit without over-paraphrasing.
- source_word: Τί
  chosen: What
  alternatives:
  - What is it that
  lexicon: BDAG
  rationale: τί introduces direct questions about necessities. Simple 'What' best
    matches idiomatic English.
- source_word: φάγωμεν
  chosen: will we eat
  alternatives:
  - shall we eat
  - are we to eat
  lexicon: BDAG
  rationale: Although the Greek aorist subjunctive can be woodenly rendered 'shall
    we eat,' in these deliberative questions English idiom is better captured by 'will
    we eat,' reflecting concern about future provision.
- source_word: πίωμεν
  chosen: will we drink
  alternatives:
  - shall we drink
  lexicon: BDAG
  rationale: Parallel to φάγωμεν, this is a deliberative question about future provision.
    'Will we drink' preserves the sense naturally in modern English.
- source_word: περιβαλώμεθα
  chosen: will we wear
  alternatives:
  - will we put on
  - will we clothe ourselves with
  lexicon: BDAG
  rationale: περιβάλλω here refers to putting on clothing. 'What will we wear?' is
    the most idiomatic English equivalent in context, avoiding an overly literal but
    awkward reflexive expression.
- source_word: ἤ ... ἤ ... ἤ
  chosen: or ... or ... or
  alternatives:
  - or else ... or ... or
  lexicon: BDAG
  rationale: The repeated disjunction is preserved to reflect the threefold list of
    anxious questions.
