id: MAT.6.28
reference: Matthew 6:28
source:
  edition: SBLGNT
  text: καὶ περὶ ἐνδύματος τί μεριμνᾶτε; καταμάθετε τὰ κρίνα τοῦ ἀγροῦ πῶς ⸂αὐξάνουσιν·
    οὐ κοπιῶσιν οὐδὲ νήθουσιν⸃·
translation:
  text: 'And why are you anxious about clothing? Consider carefully the lilies of
    the field, how they grow: they do not labor, nor do they spin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why do you worry about clothing?'
    reason: lexical_alternative
  - marker: b
    text: Or 'consider' or 'observe closely' the lilies of the field.
    reason: lexical_alternative
  - marker: c
    text: Some understand 'lilies' more broadly as 'wildflowers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ ἐνδύματος
  chosen: about clothing
  alternatives:
  - about clothes
  - about a garment
  lexicon: BDAG
  rationale: ἔνδυμα denotes clothing/garment. In this context of general provision,
    the singular genitive after περί is best rendered as a category noun, 'clothing,'
    rather than the more specific 'a garment.'
- source_word: τί μεριμνᾶτε
  chosen: why are you anxious
  alternatives:
  - why do you worry
  - what are you worrying about
  lexicon: BDAG
  rationale: In this discourse μεριμνάω carries the sense of anxious concern, not
    mere mental attention. 'Why are you anxious' preserves the interrogative force
    of τί in idiomatic English while matching the theme of anxiety in the surrounding
    passage.
- source_word: καταμάθετε
  chosen: consider carefully
  alternatives:
  - learn from
  - observe closely
  - consider
  lexicon: BDAG
  rationale: The aorist imperative calls for attentive observation leading to understanding.
    'Consider carefully' captures both the observational and reflective force better
    than a bare 'consider' while remaining natural English.
- source_word: τὰ κρίνα τοῦ ἀγροῦ
  chosen: the lilies of the field
  alternatives:
  - the lilies of the countryside
  - the wildflowers of the field
  lexicon: BDAG
  rationale: κρίνα most directly means 'lilies.' Although some argue for a broader
    sense like wildflowers, the lexical base supports 'lilies,' and 'of the field'
    is the natural rendering of the genitive phrase.
- source_word: πῶς αὐξάνουσιν
  chosen: how they grow
  alternatives:
  - how they increase
  - how they flourish
  lexicon: BDAG
  rationale: αὐξάνω here refers to natural growth. 'Grow' is the clearest and most
    idiomatic English equivalent in context.
- source_word: οὐ κοπιῶσιν
  chosen: they do not labor
  alternatives:
  - they do not toil
  - they do not work hard
  lexicon: BDAG
  rationale: κοπιάω often means labor or toil. 'Labor' is slightly more formal and
    pairs well with 'spin,' preserving the contrast between human effort and God's
    provision.
- source_word: οὐδὲ νήθουσιν
  chosen: nor do they spin
  alternatives:
  - nor do they spin thread
  lexicon: BDAG
  rationale: νήθω means to spin, especially thread or yarn. 'Spin' is sufficient in
    English and preserves the concise parallelism of the Greek.
