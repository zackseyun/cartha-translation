theological_decisions:
- issue: Rendering of μεριμνάω in Jesus' teaching on provision
  chosen_reading: anxious
  alternative_readings:
  - worry
  rationale: The verse addresses inward anxiety about material provision. 'Anxious'
    aligns with the semantic force of μεριμνάω in this context and with readable modern
    English, while 'worry' remains a viable alternative preserved in documentation.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
