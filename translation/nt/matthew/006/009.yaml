theological_decisions:
- issue: Rendering of divine address and transcendence in the opening of the Lord's
    Prayer
  chosen_reading: Our Father in the heavens
  alternative_readings:
  - Our Father in heaven
  - Our heavenly Father
  rationale: The Greek text uses the plural τοῖς οὐρανοῖς, and the translation philosophy
    prioritizes original-language primacy over inherited English tradition. 'Our heavenly
    Father' is interpretive and less formally tied to the wording; 'Our Father in
    heaven' is traditional but singularizes the Greek. The chosen rendering preserves
    both intimacy ('Father') and transcendence ('in the heavens') without importing
    extra doctrinal nuance.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἁγιασθήτω in a contemporary but theologically weighty way
  chosen_reading: may your name be treated as holy
  alternative_readings:
  - hallowed be your name
  rationale: The petition concerns the honoring of God's name as holy. The traditional
    'hallowed' is accurate but less transparent to modern readers. The chosen rendering
    preserves the petitionary force and holiness theme while remaining accessible,
    in line with optimal equivalence.
  doctrine_reference: Translation philosophy §6
