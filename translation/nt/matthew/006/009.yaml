id: MAT.6.9
reference: Matthew 6:9
source:
  edition: SBLGNT
  text: Οὕτως οὖν προσεύχεσθε ὑμεῖς· Πάτερ ἡμῶν ὁ ἐν τοῖς οὐρανοῖς· ἁγιασθήτω τὸ ὄνομά
    σου,
translation:
  text: 'Therefore, you should pray like this: Our Father in the heavens, may your
    name be treated as holy,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Our Father in heaven.' The Greek reads 'in the
      heavens' (plural).
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'hallowed be your name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Introduces the manner or pattern of prayer. 'Like this' is natural modern
    English and preserves the instructional force without sounding archaic.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference or conclusion from the preceding teaching. 'Therefore'
    preserves the connective force more clearly than omitting it.
- source_word: προσεύχεσθε ὑμεῖς
  chosen: you should pray
  alternatives:
  - pray
  - you yourselves pray
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural, with explicit
    ὑμεῖς adding emphasis. English idiom does not require a separate emphatic pronoun,
    but 'you should pray' preserves the directive force in readable modern English.
- source_word: Πάτερ ἡμῶν
  chosen: Our Father
  alternatives:
  - Father of us
  lexicon: BDAG
  rationale: Vocative address naturally rendered 'Our Father.' This preserves both
    the direct address and the communal plural pronoun.
- source_word: ὁ ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - who is in the heavens
  lexicon: BDAG
  rationale: The Greek is plural ('the heavens'). Rendering it explicitly preserves
    the source form and avoids flattening the expression into traditional singular
    English. The relative force of ὁ is carried idiomatically in apposition after
    'Our Father.'
- source_word: ἁγιασθήτω
  chosen: may be treated as holy
  alternatives:
  - may be hallowed
  - may be sanctified
  - let ... be holy
  lexicon: BDAG
  rationale: Aorist passive imperative expressing a wish/request that God's name be
    regarded as holy. 'May be treated as holy' communicates the sense clearly in contemporary
    English; 'hallowed' is traditional but less accessible.
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: BDAG
  rationale: Standard rendering. In biblical usage 'name' can stand for the person,
    reputation, and revealed character, but the text itself says 'name' and should
    retain that wording.
