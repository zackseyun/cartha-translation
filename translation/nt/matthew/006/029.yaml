theological_decisions:
- issue: Nature of δόξα in reference to Solomon
  chosen_reading: Rendered as 'glory' with the sense of royal splendor, without importing
    theological overtones.
  alternative_readings:
  - splendor
  rationale: The context is Jesus' comparison of human royal magnificence with God's
    adornment of the lilies. 'Glory' is lexically sound and biblically resonant, but
    the rationale clarifies that the meaning here is earthly splendor, not divine
    glory.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
