id: MAT.6.29
reference: Matthew 6:29
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ὅτι οὐδὲ Σολομὼν ἐν πάσῃ τῇ δόξῃ αὐτοῦ περιεβάλετο ὡς ἓν τούτων.
translation:
  text: But I tell you that not even Solomon in all his glory was clothed like one
    of these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in all his splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - Yet I tell you
  - And I tell you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is naturally rendered 'I tell you.' δέ here marks
    mild contrast or continuation; 'But' fits the discourse flow in English as Jesus
    contrasts human splendor with the lilies.
- source_word: ὅτι
  chosen: that
  alternatives:
  - — (implicit in English)
  lexicon: BDAG
  rationale: Introduces the content of what is said. Including 'that' keeps the sentence
    clear and natural in English.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor even
  - not ... either
  lexicon: BDAG
  rationale: οὐδέ intensifies the negation, emphasizing that even Solomon fails to
    match the comparison.
- source_word: Σολομὼν
  chosen: Solomon
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy for personal names.
- source_word: ἐν πάσῃ τῇ δόξῃ αὐτοῦ
  chosen: in all his glory
  alternatives:
  - in all his splendor
  - with all his glory
  lexicon: BDAG
  rationale: δόξα here refers to royal magnificence or splendor rather than abstract
    honor. 'Glory' preserves the familiar biblical resonance while remaining idiomatic
    with the prepositional phrase.
- source_word: περιεβάλετο
  chosen: was clothed
  alternatives:
  - was dressed
  - clothed himself
  lexicon: BDAG
  rationale: The middle/passive form of περιβάλλω in this context refers to being
    clothed or dressed. 'Was clothed' preserves the formal comparison with the flowers'
    attire and echoes the surrounding context.
- source_word: ὡς ἓν τούτων
  chosen: like one of these
  alternatives:
  - as one of these
  - like a single one of these
  lexicon: BDAG
  rationale: Refers back to the lilies/flowers in the immediate context. 'Like one
    of these' is idiomatic and preserves the singular comparison expressed by ἓν.
