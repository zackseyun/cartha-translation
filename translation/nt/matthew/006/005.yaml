id: MAT.6.5
reference: Matthew 6:5
source:
  edition: SBLGNT
  text: Καὶ ὅταν ⸂προσεύχησθε, οὐκ ἔσεσθε ὡς⸃ οἱ ὑποκριταί· ὅτι φιλοῦσιν ἐν ταῖς συναγωγαῖς
    καὶ ἐν ταῖς γωνίαις τῶν πλατειῶν ἑστῶτες προσεύχεσθαι, ⸀ὅπως φανῶσιν τοῖς ἀνθρώποις·
    ἀμὴν λέγω ⸀ὑμῖν, ἀπέχουσι τὸν μισθὸν αὐτῶν.
translation:
  text: And whenever you pray, you shall not be like the hypocrites, because they
    love to pray standing in the synagogues and on the corners of the broad streets,
    so that they may be seen by people. Truly I say to you, they have received their
    reward in full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "on the street corners." The Greek more literally says "on the corners
      of the broad streets."'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "so that they may be seen by men." The Greek term here refers generically
      to people.'
    reason: lexical_alternative
  - marker: c
    text: 'Or: "they have their reward." The Greek verb can carry the sense of receiving
      payment in full.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Conveys the indefinite temporal force ('whenever') rather than a single
    occasion. This fits Jesus' instruction about repeated practice.
- source_word: προσεύχησθε
  chosen: you pray
  alternatives:
  - you are praying
  lexicon: BDAG
  rationale: 'Present subjunctive after ὅταν is naturally rendered as a general present
    in English: ''whenever you pray.'''
- source_word: οὐκ ἔσεσθε ὡς
  chosen: you shall not be like
  alternatives:
  - do not be like
  - you must not be like
  lexicon: BDAG
  rationale: Future indicative with prohibitive force can be rendered as an instruction.
    'You shall not be like' preserves the Greek form and solemn tone without becoming
    archaic.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - play-actors
  - pretenders
  lexicon: BDAG
  rationale: Standard and contextually precise rendering for those performing piety
    for appearance's sake. Alternatives are more etymological than idiomatic here.
- source_word: φιλοῦσιν
  chosen: they love
  alternatives:
  - they like
  - they are fond of
  lexicon: BDAG
  rationale: 'Retains the strong volitional sense: they take pleasure in this public
    display.'
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  alternatives:
  - in the meeting places
  lexicon: BDAG
  rationale: συναγωγή is best rendered 'synagogue' in this Jewish setting; translating
    the institution preserves historical specificity.
- source_word: ἐν ταῖς γωνίαις τῶν πλατειῶν
  chosen: on the corners of the broad streets
  alternatives:
  - on the street corners
  - at the corners of the squares
  lexicon: BDAG
  rationale: πλατεῖα refers to broad streets/open public thoroughfares. 'Broad streets'
    is more formally aligned to the Greek than the idiomatic 'street corners,' while
    still readable.
- source_word: ἑστῶτες προσεύχεσθαι
  chosen: to pray standing
  alternatives:
  - standing to pray
  - to stand and pray
  lexicon: BDAG
  rationale: The participle modifies the manner of praying. 'To pray standing' is
    concise and natural in English while preserving the connection.
- source_word: ὅπως φανῶσιν τοῖς ἀνθρώποις
  chosen: so that they may be seen by people
  alternatives:
  - in order that they may be seen by men
  - so that they may appear before people
  lexicon: BDAG
  rationale: Expresses purpose clearly. 'People' avoids implying only males are in
    view, since ἀνθρώποις here is generic for human observers.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: A standard rendering that preserves the solemn introductory formula while
    remaining readable modern English.
- source_word: ἀπέχουσι
  chosen: they have received
  alternatives:
  - they are receiving
  - they have in full
  lexicon: BDAG
  rationale: In commercial idiom ἀπέχω can mean 'receive in full' or 'have one's receipt.'
    The perfect-like sense in context is that their reward is already fully paid out.
- source_word: τὸν μισθὸν αὐτῶν
  chosen: their reward in full
  alternatives:
  - their reward
  - their wages
  lexicon: BDAG
  rationale: 'μισθός is ''reward/wages.'' Adding ''in full'' brings out the idiomatic
    force of ἀπέχουσι with μισθός: they have already gotten all the reward they will
    get from this act.'
