theological_decisions:
- issue: Rendering generic ἀνθρώποις
  chosen_reading: people
  alternative_readings:
  - men
  rationale: The Greek noun is grammatically masculine but semantically generic here,
    referring to human observers generally. This follows the project's gender-accurate
    principle by matching source intent rather than preserving an English masculine
    generic that may miscommunicate.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of Jesus' warning about reward
  chosen_reading: they have received their reward in full
  alternative_readings:
  - they have their reward
  - they are receiving their reward
  rationale: 'The wording preserves the moral-theological point without importing
    extra doctrine: public recognition is the entirety of the reward sought and obtained.
    ''In full'' reflects the idiomatic force of ἀπέχουσι in context.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
