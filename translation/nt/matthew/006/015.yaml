id: MAT.6.15
reference: Matthew 6:15
source:
  edition: SBLGNT
  text: ἐὰν δὲ μὴ ἀφῆτε τοῖς ⸀ἀνθρώποις, οὐδὲ ὁ πατὴρ ὑμῶν ἀφήσει τὰ παραπτώματα ὑμῶν.
translation:
  text: But if you do not forgive people, neither will your Father forgive your trespasses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transgressions' or 'offenses' for 'trespasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ μὴ
  chosen: But if ... not
  alternatives:
  - And if ... not
  - But if ... do not
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause; δέ marks contrast with the previous
    verse, best carried by 'But'; μή negates the condition. English smooths this as
    'But if you do not...'.
- source_word: ἀφῆτε
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: ἀφίημι in this context of interpersonal offenses means 'forgive.' This
    matches the immediate context of the Lord's Prayer and keeps the same semantic
    field as the future ἀφήσει later in the verse.
- source_word: τοῖς ἀνθρώποις
  chosen: people
  alternatives:
  - men
  - others
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human beings, not specifically males.
    'People' is gender-accurate to the source intent and natural in modern English.
    'Others' is possible contextually but is less explicit than the Greek noun.
- source_word: οὐδὲ
  chosen: neither
  alternatives:
  - not even
  - nor
  lexicon: BDAG
  rationale: 'οὐδέ links the apodosis negatively and emphatically: if the condition
    is unmet, then ''neither'' will the corresponding action occur. ''Neither'' preserves
    the formal parallelism with the previous clause.'
- source_word: ὁ πατὴρ ὑμῶν
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The Greek here reads simply 'your Father' without the adjective 'heavenly'
    found in some nearby contexts. The translation should not import words absent
    from this verse.
- source_word: ἀφήσει
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: The future of ἀφίημι is rendered consistently with the earlier occurrence
    as 'forgive,' preserving the lexical repetition and the reciprocal structure of
    the saying.
- source_word: τὰ παραπτώματα ὑμῶν
  chosen: your trespasses
  alternatives:
  - your transgressions
  - your offenses
  - your wrongdoing
  lexicon: BDAG
  rationale: παραπτώματα denotes false steps, offenses, or transgressions. 'Trespasses'
    is a well-established and still intelligible rendering in this Matthean context,
    especially given the surrounding prayer tradition. It preserves moral weight without
    over-paraphrasing.
