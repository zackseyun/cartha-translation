theological_decisions:
- issue: Conditional relationship between human forgiveness and divine forgiveness
  chosen_reading: Retain the straightforward conditional wording without softening
    or systematizing it.
  alternative_readings:
  - Interpret as merely evidential rather than conditional
  - Interpret as loss of fellowship rather than forgiveness proper
  rationale: The Greek presents a direct conditional statement. The translation should
    preserve that tension and not resolve broader theological debates by paraphrase.
    'Neither will your Father forgive your trespasses' reflects the text as written.
  doctrine_reference: Preserve theological tension rather than resolve it.
