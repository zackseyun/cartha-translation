id: MAT.6.14
reference: Matthew 6:14
source:
  edition: SBLGNT
  text: ἐὰν γὰρ ἀφῆτε τοῖς ἀνθρώποις τὰ παραπτώματα αὐτῶν, ἀφήσει καὶ ὑμῖν ὁ πατὴρ
    ὑμῶν ὁ οὐράνιος·
translation:
  text: For if you forgive people their trespasses, your heavenly Father will also
    forgive you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transgressions,' 'offenses,' or 'wrongdoings.' The Greek term refers
      to moral failings or false steps.
    reason: lexical_alternative
  - marker: b
    text: Greek 'your Father, the heavenly one'; traditionally, 'your Father in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For whenever
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this verse to the preceding prayer,
    so 'For' is retained; ἐάν with the aorist subjunctive introduces a conditional
    clause, naturally rendered 'if' in English.
- source_word: ἀφῆτε
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: ἀφίημι in this context of interpersonal moral offense means 'forgive.'
    This also preserves the verbal connection with the later ἀφήσει in the same verse.
- source_word: τοῖς ἀνθρώποις
  chosen: people
  alternatives:
  - men
  - others
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human beings, not specifically males.
    'People' is natural modern English and reflects the representative sense without
    unnecessary gendering.
- source_word: τὰ παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - offenses
  - wrongdoings
  lexicon: BDAG
  rationale: παράπτωμα denotes a false step, offense, or transgression. 'Trespasses'
    fits the immediate context because the preceding Lord's Prayer in many traditions
    uses 'trespasses,' and it preserves the moral-relational sense without flattening
    it to a vague 'wrongs.'
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: Straightforward possessive pronoun referring to the people's trespasses.
- source_word: ἀφήσει
  chosen: will also forgive
  alternatives:
  - will forgive too
  - will pardon
  lexicon: BDAG
  rationale: Future of ἀφίημι should be rendered with the same core gloss as ἀφῆτε
    for consistency. καί is brought into English as 'also' to preserve the reciprocal
    correspondence.
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: καί here adds correspondence between human forgiveness and the Father's
    forgiveness; 'also' is the most natural placement in English.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative is naturally expressed by the English object 'you' after 'forgive';
    an explicit 'to' would be less idiomatic.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  chosen: your heavenly Father
  alternatives:
  - your Father in heaven
  - your Father, the heavenly one
  lexicon: BDAG
  rationale: This is the most natural English rendering of the articular noun plus
    attributive adjective. 'Heavenly Father' is idiomatic, faithful, and preserves
    the reverential designation used throughout Matthew.
