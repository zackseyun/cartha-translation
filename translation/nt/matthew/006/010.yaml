id: MAT.6.10
reference: Matthew 6:10
source:
  edition: SBLGNT
  text: ἐλθέτω ἡ βασιλεία σου, γενηθήτω τὸ θέλημά σου, ὡς ἐν οὐρανῷ καὶ ⸀ἐπὶ γῆς·
translation:
  text: May your kingdom come; may your will be done, as in heaven, so also on earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'May your kingdom come; may your will be done, as in heaven,
      so also on earth,' with 'as in heaven, so also on earth' understood to apply
      to both petitions.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλθέτω
  chosen: May ... come
  alternatives:
  - let ... come
  - come
  lexicon: BDAG
  rationale: Aorist active imperative, third singular of ἔρχομαι, expressing a petition/wish
    directed to God. 'May your kingdom come' conveys the volitional force naturally
    in English prayer language without sounding abrupt.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign/rule or kingdom. 'Kingdom' is the established
    and contextually fitting rendering in Matthew, while still carrying the sense
    of God's royal reign. 'Reign' is possible but less natural in this prayer formula.
- source_word: γενηθήτω
  chosen: May ... be done
  alternatives:
  - let ... happen
  - may ... come to pass
  lexicon: BDAG
  rationale: Aorist passive imperative, third singular of γίνομαι. With θέλημα, the
    idiomatic sense is that God's will 'be done' or 'come to pass.' 'Be done' is the
    most natural and faithful English equivalent in this context.
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: θέλημα refers to what one wills, wishes, or intends. 'Will' best preserves
    both the lexical sense and the theological weight of God's purpose without over-specifying.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - as it is
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'As' is concise and natural, leaving the comparison
    open in the same way as the Greek.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Singular dative with ἐν is well rendered 'in heaven.' Although οὐρανός
    can be translated 'heaven' or 'sky/heavens,' 'in heaven' is idiomatic and contextually
    appropriate for God's heavenly sphere.
- source_word: ἐπὶ γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  - in earth
  lexicon: BDAG
  rationale: ἐπί with genitive commonly means 'on/upon.' 'On earth' is the natural
    English counterpart and matches the heaven/earth contrast.
- source_word: καὶ
  chosen: so also
  alternatives:
  - and
  - also
  lexicon: BDAG
  rationale: 'Although καί is simply ''and/also,'' in the construction ὡς ἐν οὐρανῷ
    καὶ ἐπὶ γῆς it idiomatically completes the comparison: ''as in heaven, so also
    on earth.'' This makes the English comparison explicit without adding meaning
    beyond the Greek syntax.'
