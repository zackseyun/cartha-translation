theological_decisions:
- issue: Scope of the comparative phrase ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς
  chosen_reading: The phrase is rendered with the second petition ('may your will
    be done, as in heaven, so also on earth') while acknowledging that some interpreters
    take it to govern both preceding petitions.
  alternative_readings:
  - Attach the phrase only to 'may your will be done'
  - Understand it to modify both 'may your kingdom come' and 'may your will be done'
  rationale: Greek punctuation in modern editions is editorial, and the syntax allows
    discussion of the phrase's scope. The most immediate grammatical attachment is
    to the nearest clause, 'may your will be done,' which also yields the most natural
    English. The broader conceptual connection to both petitions is worth preserving
    in a footnote rather than forcing it into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
