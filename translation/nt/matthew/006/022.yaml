theological_decisions:
- issue: Meaning of ἁπλοῦς in the metaphor of the eye
  chosen_reading: Render as 'healthy' in the main text
  alternative_readings:
  - single
  - clear
  - sound
  - generous
  rationale: The immediate context is the eye as the lamp of the body, followed by
    the contrast with a bad eye in the next verse. A rendering tied to proper visual
    function best preserves the metaphor in contemporary English. Because ἁπλοῦς can
    also carry the sense of singleness or generosity in other contexts, those alternatives
    are preserved in a footnote rather than imported into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
