id: MAT.6.22
reference: Matthew 6:22
source:
  edition: SBLGNT
  text: Ὁ λύχνος τοῦ σώματός ἐστιν ὁ ὀφθαλμός. ἐὰν οὖν ⸂ᾖ ὁ ὀφθαλμός σου ἁπλοῦς⸃,
    ὅλον τὸ σῶμά σου φωτεινὸν ἔσται·
translation:
  text: The eye is the lamp of the body. Therefore, if your eye is healthy, your whole
    body will be full of light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'single,' 'clear,' or 'sound'; the Greek word can also carry the sense
      of being undivided or, in some contexts, generous.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  lexicon: BDAG
  rationale: λύχνος ordinarily denotes a lamp rather than light in the abstract. 'Lamp'
    preserves the concrete metaphor of the eye as the body's source of illumination.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard gloss; the verse uses bodily imagery straightforwardly.
- source_word: ὀφθαλμός
  chosen: eye
  lexicon: BDAG
  rationale: Literal rendering fits both the physical image and the moral metaphor.
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - So if
  - If then
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding statement. 'Therefore, if' preserves
    the logical connection in natural English.
- source_word: ἁπλοῦς
  chosen: healthy
  alternatives:
  - single
  - clear
  - sound
  - generous
  lexicon: BDAG
  rationale: In this context of eyesight and bodily illumination, ἁπλοῦς most naturally
    describes an eye functioning properly, hence 'healthy.' 'Single' is traditional
    but opaque in modern English; 'generous' reflects a semantic extension seen in
    some contexts but is less fitting in this immediate metaphor.
- source_word: ὅλον
  chosen: whole
  alternatives:
  - entire
  lexicon: BDAG
  rationale: '''Whole'' is natural and preserves the comprehensive sense.'
- source_word: φωτεινὸν
  chosen: full of light
  alternatives:
  - bright
  - lighted
  lexicon: BDAG
  rationale: Although literally 'light/bright,' 'full of light' best conveys the predicate
    in idiomatic English and preserves the imagery of illumination affecting the entire
    body.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - is
  lexicon: BDAG
  rationale: Future tense is explicit in Greek and should be retained.
