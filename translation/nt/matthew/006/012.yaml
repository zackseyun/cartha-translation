id: MAT.6.12
reference: Matthew 6:12
source:
  edition: SBLGNT
  text: καὶ ἄφες ἡμῖν τὰ ὀφειλήματα ἡμῶν, ὡς καὶ ἡμεῖς ⸀ἀφήκαμεν τοῖς ὀφειλέταις ἡμῶν·
translation:
  text: And forgive us our debts, as we also have forgiven our debtors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trespasses'; more literally, 'debts.' The Greek keeps the metaphor of
      what is owed, likely referring here to sins or offenses.
    reason: lexical_alternative
  - marker: b
    text: Or 'forgave our debtors.' The Greek aorist may be rendered as a simple past;
      'have forgiven' expresses the action as completed with present relevance in
      natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφες
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι in a prayer context is most naturally rendered
    'forgive.' While the verb can mean 'release' or 'let go,' the collocation with
    moral 'debts' in this petition points to forgiveness rather than a merely financial
    release.
- source_word: τὰ ὀφειλήματα
  chosen: debts
  alternatives:
  - trespasses
  - sins
  lexicon: BDAG
  rationale: ὀφειλήματα literally denotes 'debts' or 'what is owed.' 'Debts' best
    preserves the source metaphor and aligns with the corresponding 'debtors' later
    in the verse. Traditional 'trespasses' reflects liturgical translation history
    more than the plain lexical sense here.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - in the same way as
  lexicon: BDAG
  rationale: ὡς introduces comparison between divine forgiveness requested and human
    forgiveness extended. 'As' is concise and natural while preserving the comparative
    force.
- source_word: ἀφήκαμεν
  chosen: have forgiven
  alternatives:
  - forgave
  lexicon: BDAG
  rationale: The aorist indicative can be rendered simply as past ('forgave'), but
    in idiomatic English within this prayer, 'have forgiven' captures a completed
    action with present relevance. This also preserves the sense that the petition
    assumes an already-extended forgiveness toward others.
- source_word: τοῖς ὀφειλέταις
  chosen: our debtors
  alternatives:
  - those indebted to us
  - those who owe us
  lexicon: BDAG
  rationale: ὀφειλέταις is the cognate noun to ὀφειλήματα, so 'debtors' preserves
    the lexical link and metaphorical coherence of the verse better than a more interpretive
    paraphrase.
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Initial καὶ straightforwardly coordinates this petition with the preceding
    ones in the prayer, so 'And' is the most natural rendering.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: 'The second καὶ with ἡμεῖς adds emphasis to the human side of the comparison:
    ''we also.'' Rendering it explicitly preserves the Greek emphasis.'
