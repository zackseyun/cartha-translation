theological_decisions:
- issue: Moral metaphor of ὀφειλήματα
  chosen_reading: Retain 'debts' in the main text as the governing metaphor for sins/offenses
    before God.
  alternative_readings:
  - trespasses
  - sins
  rationale: The verse uses debt language rather than the more generalized language
    of sins. Preserving the metaphor maintains transparency to the Greek and avoids
    importing a traditional liturgical rendering not demanded by the text. Because
    readers may associate the petition with moral wrongdoing rather than financial
    obligation, alternatives are preserved in a footnote rather than substituted into
    the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Temporal nuance of ἀφήκαμεν
  chosen_reading: Render as 'have forgiven' rather than simple past 'forgave.'
  alternative_readings:
  - forgave
  rationale: This choice preserves the completed-yet-relevant force in natural English
    without overinterpreting the Greek tense. It also avoids implying a merely punctiliar
    past event and fits the prayer's ethical reciprocity theme.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
