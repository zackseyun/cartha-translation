theological_decisions:
- issue: Scope of γῆ versus idiomatic English
  chosen_reading: on the earth
  alternative_readings:
  - on earth
  rationale: The wording preserves the concrete earthly realm in contrast to heaven
    in the immediate context, without importing a theological distinction beyond the
    text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering βρῶσις
  chosen_reading: decay
  alternative_readings:
  - rust
  rationale: The traditional 'rust' is possible in context, but the Greek term is
    broader than metal oxidation. 'Decay' better reflects the source text's plain
    sense while preserving the warning about the perishability of earthly treasure.
    The traditional alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3, §5
