id: MAT.6.19
reference: Matthew 6:19
source:
  edition: SBLGNT
  text: Μὴ θησαυρίζετε ὑμῖν θησαυροὺς ἐπὶ τῆς γῆς, ὅπου σὴς καὶ βρῶσις ἀφανίζει, καὶ
    ὅπου κλέπται διορύσσουσιν καὶ κλέπτουσιν·
translation:
  text: Do not store up for yourselves treasures on the earth, where moth and decay
    destroy, and where thieves break in and steal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rust'; the Greek word can refer more broadly to consuming deterioration
      or decay, not only metal corrosion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'dig through,' likely referring to thieves breaking through mud-brick
      walls.
    reason: cultural_note
lexical_decisions:
- source_word: Μὴ θησαυρίζετε
  chosen: Do not store up
  alternatives:
  - Do not lay up
  - Do not treasure up
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. 'Store up' is natural
    modern English and preserves the verbal idea of accumulating treasure without
    archaic phrasing.
- source_word: ὑμῖν
  chosen: for yourselves
  alternatives:
  - for you
  - for your own benefit
  lexicon: BDAG
  rationale: 'Dative pronoun is reflexive in sense with the imperative: the storing
    is for the disciples'' own possession or benefit. ''For yourselves'' captures
    this clearly in idiomatic English.'
- source_word: θησαυροὺς
  chosen: treasures
  alternatives:
  - stores of wealth
  lexicon: BDAG
  rationale: Direct object cognate with θησαυρίζετε. 'Treasures' preserves the lexical
    connection and the broader sense of valued earthly wealth, not merely money.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on earth
  - upon the earth
  lexicon: BDAG
  rationale: The phrase contrasts with the following verse's heavenly location. 'On
    the earth' is slightly more explicit than the idiomatic 'on earth' and preserves
    the locative force.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: Standard relative adverb introducing the locations/conditions in which
    earthly treasure is vulnerable.
- source_word: σὴς
  chosen: moth
  lexicon: BDAG
  rationale: Refers to moth damage to stored garments or goods; 'moth' is the standard
    and clear rendering.
- source_word: βρῶσις
  chosen: decay
  alternatives:
  - rust
  - corrosion
  - eating
  lexicon: BDAG
  rationale: Though traditionally rendered 'rust,' the noun more broadly denotes eating/consuming,
    hence deterioration or decay. 'Decay' better reflects the wider sense and avoids
    implying only metal corrosion.
- source_word: ἀφανίζει
  chosen: destroy
  alternatives:
  - consume
  - ruin
  lexicon: BDAG
  rationale: The verb denotes causing something to disappear or be ruined. 'Destroy'
    is concise and fits both moth and decay as agents.
- source_word: κλέπται
  chosen: thieves
  lexicon: BDAG
  rationale: Straightforward lexical equivalent.
- source_word: διορύσσουσιν
  chosen: break in
  alternatives:
  - dig through
  - break through
  lexicon: BDAG
  rationale: Literally 'dig through,' likely referring to burglars digging through
    mud-brick walls. 'Break in' communicates the sense idiomatically in modern English;
    the more literal background is worth preserving in a footnote.
- source_word: κλέπτουσιν
  chosen: steal
  lexicon: BDAG
  rationale: Standard rendering of the verb for theft.
