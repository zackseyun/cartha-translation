id: MAT.6.18
reference: Matthew 6:18
source:
  edition: SBLGNT
  text: ὅπως μὴ φανῇς τοῖς ἀνθρώποις νηστεύων ἀλλὰ τῷ πατρί σου τῷ ἐν τῷ ⸀κρυφαίῳ· καὶ ὁ πατήρ σου ὁ βλέπων ἐν τῷ ⸁κρυφαίῳ ἀποδώσει σοι.
translation:
  text: so that you may appear to be fasting not to men, but to your Father who is in secret; and your Father who sees in secret will reward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to people'; Greek 'to men' is a generic reference to human observers, not males only.
    reason: lexical_alternative
  - marker: b
    text: Or 'you may not appear to men to be fasting, but to your Father'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving the telic force.
- source_word: μὴ φανῇς
  chosen: you may not appear
  alternatives:
  - you may not be seen
  - you may not become visible
  lexicon: BDAG
  rationale: Aorist passive subjunctive of φαίνω in this context conveys being seen/appearing publicly. 'Appear' fits the concern with outward display before others in the Sermon on the Mount.
- source_word: τοῖς ἀνθρώποις
  chosen: to men
  alternatives:
  - to people
  - to others
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human observers generally. Per gender-accurate philosophy, 'men' preserves the source form and traditional representative sense; the generic force can be clarified in a footnote.
- source_word: νηστεύων
  chosen: to be fasting
  alternatives:
  - fasting
  lexicon: BDAG
  rationale: The participle expresses the activity in which one is seen. 'To be fasting' makes the English syntax smooth after 'appear to men' without adding meaning.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: Marks contrast between human audience and divine audience.
- source_word: τῷ πατρί σου
  chosen: to your Father
  alternatives:
  - before your Father
  lexicon: BDAG
  rationale: Dative parallels 'to men' and indicates the one before whom the fasting is truly directed. 'To your Father' preserves the Greek structure.
- source_word: τῷ ἐν τῷ κρυφαίῳ
  chosen: who is in secret
  alternatives:
  - who is in the secret place
  - who is in private
  lexicon: BDAG
  rationale: The phrase describes the Father's hiddenness/unseen presence. 'In secret' is concise and idiomatic, and matches the repeated phrase later in the verse.
- source_word: ὁ βλέπων ἐν τῷ κρυφαίῳ
  chosen: who sees in secret
  alternatives:
  - who sees what is done in secret
  - who sees in the secret place
  lexicon: BDAG
  rationale: The participle βλέπων is substantival, describing the Father as the one who sees. The shorter rendering stays close to the Greek; 'what is done' is interpretive and not explicit.
- source_word: ἀποδώσει σοι
  chosen: will reward you
  alternatives:
  - will repay you
  - will give back to you
  lexicon: BDAG
  rationale: In this context of pious practice and divine response, ἀποδίδωμι carries the sense of recompense. 'Reward' is the clearest contextual rendering in English.
