theological_decisions:
- issue: Generic reference of ἀνθρώποις
  chosen_reading: Rendered as 'men' with representative/generic force, not as male-only humans.
  alternative_readings:
  - people
  - others
  rationale: The Greek is grammatically masculine plural and refers generally to human observers, not specifically males. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Meaning of κρυφαίῳ in both occurrences
  chosen_reading: Rendered consistently as 'in secret' for both the Father's hiddenness and his seeing.
  alternative_readings:
  - in the secret place
  - in private
  rationale: Consistency is important here because the repeated phrase links the hidden sphere of true devotion with the Father's perception. 'In secret' preserves that rhetorical connection without over-specifying location.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
revisions:
- timestamp: '2026-04-21T03:21:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/006/018.json
  category: awkward_english
  tier: 1
  from: you may not appear to men to be fasting, but to your Father
  to: you may appear to be fasting not to men, but to your Father
  rationale: The Greek `μὴ...ἀλλὰ` construction often functions as 'not [A] but [B]'. While the draft's formal rendering ('not appear... but...') is defensible, it creates a slightly awkward ellipsis in English. Restructuring the negation ('appear... not to men, but to your Father') is a common translation strategy that improves clarity and flow by making the contrasted elements more explicit, without changing the verse's meaning.
