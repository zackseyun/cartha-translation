theological_decisions:
- issue: Gendered expression in ἁλιεῖς ἀνθρώπων
  chosen_reading: fishers of men
  alternative_readings:
  - fishers of people
  - fishermen of people
  rationale: Following the project's gender-accurate principle, the masculine plural
    ἀνθρώπων is retained with 'men' in the main text, while the generic-human sense
    is clarified in a footnote. This preserves the source form without denying its
    representative force.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
