id: MAT.4.19
reference: Matthew 4:19
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Δεῦτε ὀπίσω μου, καὶ ποιήσω ὑμᾶς ἁλιεῖς ἀνθρώπων.
translation:
  text: And he says to them, “Come after me, and I will make you fishers of men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “fishers of people”; the Greek phrase uses ἀνθρώπων, literally “men,”
      but here refers to human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Rendered as present tense ('says') to reflect the Greek historical present,
    a common narrative feature in the Gospels. English can preserve this naturally
    here.
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  - Follow
  lexicon: BDAG
  rationale: An imperative summons meaning 'come.' 'Follow' would anticipate the sense
    contributed by the following phrase ὀπίσω μου, but Δεῦτε itself is more basically
    'come.'
- source_word: ὀπίσω μου
  chosen: after me
  alternatives:
  - behind me
  - follow me
  lexicon: BDAG
  rationale: Literally 'behind me/after me.' 'After me' preserves the metaphor of
    discipleship while allowing the preceding Δεῦτε to retain its own force. 'Follow
    me' is idiomatic but compresses two Greek elements into one English phrase.
- source_word: ποιήσω
  chosen: I will make
  alternatives:
  - I will make into
  - I will appoint as
  lexicon: BDAG
  rationale: Future active verb indicating Jesus' promised transformative action.
    'I will make' is the most direct and natural rendering.
- source_word: ἁλιεῖς
  chosen: fishers
  alternatives:
  - fishermen
  - fishers
  lexicon: BDAG
  rationale: '''Fishers'' is the straightforward lexical equivalent and avoids adding
    the occupationally specific English suffix ''-men'' beyond what the Greek noun
    itself states.'
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - for people
  lexicon: BDAG
  rationale: The genitive plural of ἄνθρωπος here refers to human beings generally,
    but the source uses the masculine form and the phrase 'fishers of men' is both
    idiomatic and gender-accurate to the Greek under the project's stated philosophy.
    Inclusivity of sense is best preserved in a footnote rather than by replacing
    the source-shaped expression in the main text.
