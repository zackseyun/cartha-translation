theological_decisions:
- issue: Nature of the mountain scene in the temptation narrative
  chosen_reading: Translate the scene straightforwardly as narrated, without specifying
    whether the showing of all kingdoms is visionary, supernatural, or merely geographical.
  alternative_readings:
  - A literal visual survey from a physical mountain
  - A visionary or supernatural disclosure
  rationale: The Greek simply states that the devil took Jesus to a very high mountain
    and showed him all the kingdoms of the world and their glory. The translation
    should preserve the narrative claim without importing an explanatory framework
    the text itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it.
