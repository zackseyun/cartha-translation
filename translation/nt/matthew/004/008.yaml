id: MAT.4.8
reference: Matthew 4:8
source:
  edition: SBLGNT
  text: Πάλιν παραλαμβάνει αὐτὸν ὁ διάβολος εἰς ὄρος ὑψηλὸν λίαν, καὶ δείκνυσιν αὐτῷ
    πάσας τὰς βασιλείας τοῦ κόσμου καὶ τὴν δόξαν αὐτῶν
translation:
  text: Again, the devil takes him to a very high mountain and shows him all the kingdoms
    of the world and their glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Once more
  lexicon: BDAG
  rationale: Marks repetition in the temptation sequence; 'Again' is concise and natural
    in English.
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - takes with him
  lexicon: BDAG
  rationale: Present-tense historical narrative is naturally rendered in English with
    simple present here. 'Takes' is idiomatic and fits the movement context without
    over-specifying accompaniment.
- source_word: ὁ διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος functions as the recognized title for Satan.
    'The devil' is the standard, clear English rendering.
- source_word: εἰς ὄρος ὑψηλὸν λίαν
  chosen: to a very high mountain
  alternatives:
  - onto an exceedingly high mountain
  - to a mountain, very high
  lexicon: BDAG
  rationale: εἰς with movement is best rendered 'to' here. λίαν intensifies ὑψηλόν,
    and 'very high mountain' is natural modern English while preserving the emphasis.
- source_word: δείκνυσιν
  chosen: shows
  alternatives:
  - shows clearly
  - displays
  lexicon: BDAG
  rationale: Simple and direct rendering of the verb of showing; no need to heighten
    beyond the Greek.
- source_word: πάσας τὰς βασιλείας
  chosen: all the kingdoms
  alternatives:
  - every kingdom
  - all the realms
  lexicon: BDAG
  rationale: The plural with πᾶς is best represented by 'all the kingdoms.' 'Kingdoms'
    preserves the political-regal sense of βασιλεία better than 'realms.'
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - of the inhabited world
  lexicon: BDAG
  rationale: κόσμος here refers to the world-order in general; 'of the world' is the
    most natural and contextually fitting rendering.
- source_word: τὴν δόξαν αὐτῶν
  chosen: their glory
  alternatives:
  - their splendor
  - their magnificence
  lexicon: BDAG
  rationale: δόξα in this context refers to visible grandeur or splendor associated
    with the kingdoms. 'Glory' preserves the lexical link while remaining understandable;
    the more interpretive 'splendor' is worth preserving in a footnote.
