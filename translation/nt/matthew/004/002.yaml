theological_decisions:
- issue: Narrative emphasis on Jesus' real human need after the fast
  chosen_reading: he was hungry
  alternative_readings:
  - he became hungry
  rationale: The wording should clearly communicate genuine human hunger without overstating
    a doctrinal point. This aligns with historic orthodoxy regarding the true humanity
    of Jesus while remaining strictly within the verse's lexical sense.
  doctrine_reference: 'Affirmations: Chalcedon (two natures of Christ); Translation
    philosophy §1, §6'
