id: MAT.4.2
reference: Matthew 4:2
source:
  edition: SBLGNT
  text: καὶ νηστεύσας ἡμέρας τεσσεράκοντα καὶ νύκτας τεσσεράκοντα ὕστερον ἐπείνασεν.
translation:
  text: And after fasting forty days and forty nights, he was hungry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "having fasted forty days and forty nights, afterward he became hungry."
    reason: lexical_alternative
lexical_decisions:
- source_word: νηστεύσας
  chosen: after fasting
  alternatives:
  - having fasted
  - when he had fasted
  lexicon: BDAG
  rationale: Aorist active participle preceding the main verb is naturally rendered
    as antecedent action in English. 'After fasting' is concise, idiomatic, and preserves
    the temporal force without unnecessary stiffness.
- source_word: ἡμέρας τεσσεράκοντα καὶ νύκτας τεσσεράκοντα
  chosen: forty days and forty nights
  alternatives:
  - for forty days and forty nights
  lexicon: BDAG
  rationale: Accusative of extent of time indicates duration. English commonly expresses
    this idiomatically without an explicit 'for'; the duration remains clear and echoes
    biblical phrasing.
- source_word: ὕστερον
  chosen: after
  alternatives:
  - afterward
  - later
  lexicon: BDAG
  rationale: Here ὕστερον marks subsequent time relative to the fasting. Rendering
    it with 'after' integrates smoothly with the participial clause in English. 'Afterward'
    or 'later' are possible but slightly more detached in style.
- source_word: ἐπείνασεν
  chosen: he was hungry
  alternatives:
  - he became hungry
  - he hungered
  lexicon: BDAG
  rationale: The aorist of πεινάω here denotes the onset/resulting state after the
    fast. 'He was hungry' is natural modern English and accurately conveys the sense.
    'He became hungry' is more wooden; 'he hungered' is archaic.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: The verse continues the narrative straightforwardly. 'And' preserves
    the simple connective force of καί without adding interpretive nuance.
