theological_decisions:
- issue: Fulfillment formula in Matthew
  chosen_reading: Render πληρωθῇ as 'might be fulfilled' and preserve the explicit
    fulfillment motif without expanding its theological meaning.
  alternative_readings:
  - Render more dynamically as 'came true'
  rationale: Matthew intentionally uses fulfillment language tied to Scripture. 'Fulfilled'
    preserves this intertextual and theological theme better than a flatter expression
    like 'came true,' while avoiding interpretive expansion beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
