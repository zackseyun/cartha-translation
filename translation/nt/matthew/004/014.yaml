id: MAT.4.14
reference: Matthew 4:14
source:
  edition: SBLGNT
  text: ἵνα πληρωθῇ τὸ ῥηθὲν διὰ Ἠσαΐου τοῦ προφήτου λέγοντος·
translation:
  text: 'so that what was spoken through Isaiah the prophet might be fulfilled, saying:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's teleological force without sounding wooden.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - may be fulfilled
  - would be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive of πληρόω in an ἵνα-clause. 'Might be fulfilled'
    preserves both the passive voice and the subjunctive nuance in idiomatic English.
    In Matthew this formula regularly signals fulfillment of Scripture.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been spoken
  lexicon: BDAG
  rationale: The neuter article with the passive participle functions substantivally.
    'What was spoken' is idiomatic and accurately captures the sense without unnecessary
    literalism.
- source_word: διὰ
  chosen: through
  alternatives:
  - by
  lexicon: BDAG
  rationale: With the genitive and a human intermediary, διά commonly denotes agency/instrumentality
    mediated through someone. 'Through Isaiah' preserves the prophetic mediation more
    clearly than the flatter 'by Isaiah.'
- source_word: Ἠσαΐου
  chosen: Isaiah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name, following the
    translation policy to transliterate personal names.
- source_word: τοῦ προφήτου
  chosen: the prophet
  lexicon: BDAG
  rationale: Appositional genitive identifying Isaiah's role. Retained explicitly
    because Matthew's fulfillment formula emphasizes prophetic authority.
- source_word: λέγοντος
  chosen: 'saying:'
  alternatives:
  - 'who said:'
  - 'as he says:'
  lexicon: BDAG
  rationale: Present active participle introducing the forthcoming quotation. 'Saying:'
    is the standard concise English way to introduce direct speech and matches the
    discourse function.
