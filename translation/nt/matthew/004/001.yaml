id: MAT.4.1
reference: Matthew 4:1
source:
  edition: SBLGNT
  text: Τότε ὁ Ἰησοῦς ἀνήχθη εἰς τὴν ἔρημον ὑπὸ τοῦ πνεύματος, πειρασθῆναι ὑπὸ τοῦ
    διαβόλου.
translation:
  text: Then Jesus was led up into the wilderness by the Spirit to be tempted by the
    devil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to be tested"; the Greek verb can mean either "tempt" or "test," though
      here the immediate context favors "tempted."
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - Afterward
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural and sufficiently formal.
- source_word: ἀνήχθη
  chosen: was led up
  alternatives:
  - was led
  - was brought up
  lexicon: BDAG
  rationale: Aorist passive of ἀνάγω, literally involving upward movement or leading
    up. 'Was led up' preserves both the passive and the directional nuance better
    than simply 'was led,' while remaining idiomatic in English.
- source_word: εἰς τὴν ἔρημον
  chosen: into the wilderness
  alternatives:
  - into the desert
  - into the deserted place
  lexicon: BDAG
  rationale: ἔρημος can denote desert, wilderness, or desolate region. 'Wilderness'
    is the broadest and best-established rendering here, fitting the Judean setting
    without over-specifying terrain.
- source_word: ὑπὸ τοῦ πνεύματος
  chosen: by the Spirit
  alternatives:
  - by the Holy Spirit
  - by the spirit
  lexicon: BDAG
  rationale: In Matthew's narrative context immediately following Jesus' baptism,
    τοῦ πνεύματος most naturally refers to the Spirit of God. 'By the Spirit' preserves
    the Greek wording without adding 'Holy,' while still signaling the personal divine
    agent through capitalization.
- source_word: πειρασθῆναι
  chosen: to be tempted
  alternatives:
  - to be tested
  - to be tried
  lexicon: BDAG
  rationale: πειράζω can mean test or tempt depending on context. Because the agent
    is 'the devil' and the following narrative concerns solicitation toward evil,
    'to be tempted' best fits the immediate context, while the testing nuance is worth
    preserving in a footnote.
- source_word: ὑπὸ τοῦ διαβόλου
  chosen: by the devil
  alternatives:
  - by the slanderer
  - by the accuser
  lexicon: BDAG
  rationale: διάβολος can lexically mean slanderer, but in this context it functions
    as the recognized personal adversary title. 'The devil' is the clearest and most
    idiomatic English rendering.
