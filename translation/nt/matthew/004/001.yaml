theological_decisions:
- issue: Identification of τοῦ πνεύματος
  chosen_reading: the Spirit refers to the Holy Spirit
  alternative_readings:
  - a spirit
  - the human spirit
  rationale: The immediate literary context (the Spirit descending on Jesus at his
    baptism in the preceding passage) strongly supports reference to the Holy Spirit.
    This does not import extra doctrine beyond the narrative context.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of πειρασθῆναι
  chosen_reading: to be tempted
  alternative_readings:
  - to be tested
  rationale: The translation preserves the narrative force of demonic temptation while
    acknowledging the broader semantic range of πειράζω. The alternative is preserved
    in a footnote to avoid collapsing the theological tension between testing and
    temptation.
  doctrine_reference: Translation philosophy §3
