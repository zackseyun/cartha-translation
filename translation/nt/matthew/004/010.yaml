id: MAT.4.10
reference: Matthew 4:10
source:
  edition: SBLGNT
  text: τότε λέγει αὐτῷ ὁ Ἰησοῦς· ⸀Ὕπαγε, Σατανᾶ· γέγραπται γάρ· Κύριον τὸν θεόν σου
    προσκυνήσεις καὶ αὐτῷ μόνῳ λατρεύσεις.
translation:
  text: 'Then Jesus says to him, “Go away, Satan! For it is written: ‘You shall worship
    the Lord your God, and serve him only.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You shall bow down to the Lord your God.” The Greek verb can more literally
      denote prostration or bowing in reverence.
    reason: lexical_alternative
  - marker: b
    text: The verb translated “serve” can specifically refer to sacred or religious
      service offered to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence; 'Then' is the natural, concise
    English equivalent.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Greek present is a historical present in narrative. Rendering as 'says'
    preserves the vividness of the Greek; 'said' would smooth it into standard English
    past narrative.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object after 'says'; straightforwardly rendered 'to him.'
- source_word: Ὕπαγε
  chosen: Go away
  alternatives:
  - Be gone
  - Go
  lexicon: BDAG
  rationale: Imperative of departure. 'Go away' is clear modern English and preserves
    the force of dismissal without archaic tone; 'Be gone' is traditional but dated.
- source_word: Σατανᾶ
  chosen: Satan
  alternatives:
  - Adversary
  lexicon: BDAG
  rationale: Proper name/title used vocatively; standard transliteration is appropriate
    for a personal/supernatural name.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Perfect passive formula introducing Scripture citation. 'It is written'
    is the established and accurate English equivalent.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Following the doctrine default for κύριος, render as 'Lord.' The article
    is naturally represented in English here as 'the Lord,' especially in a scriptural
    quotation referring to Israel's God.
- source_word: θεόν σου
  chosen: your God
  lexicon: BDAG
  rationale: Direct object phrase appositional to 'the Lord'; standard rendering is
    'your God.'
- source_word: προσκυνήσεις
  chosen: you shall worship
  alternatives:
  - you shall bow down to
  lexicon: BDAG
  rationale: In this context of devotion directed to God, 'worship' best captures
    the religious sense. 'Bow down to' is more literal but narrower and less idiomatic
    in English.
- source_word: αὐτῷ μόνῳ
  chosen: him only
  alternatives:
  - only him
  - him alone
  lexicon: BDAG
  rationale: Dative pronoun with adjective μόνος emphasizes exclusivity. 'Him only'
    is idiomatic in elevated quotation style and preserves the focus on exclusive
    devotion.
- source_word: λατρεύσεις
  chosen: serve
  alternatives:
  - render sacred service to
  - worship
  lexicon: BDAG
  rationale: λατρεύω often denotes cultic/religious service to God. 'Serve' preserves
    the distinction from προσκυνέω ('worship') in the same clause while remaining
    readable; the more explicit cultic nuance can be noted in a footnote.
