theological_decisions:
- issue: Rendering the paired verbs προσκυνέω and λατρεύω distinctly
  chosen_reading: Translate προσκυνήσεις as 'worship' and λατρεύσεις as 'serve'
  alternative_readings:
  - Translate both with worship language
  - Translate προσκυνήσεις as 'bow down to' and λατρεύσεις as 'serve'
  rationale: 'The Greek uses two related but distinct verbs. Preserving the distinction
    avoids flattening the quotation''s theological force: God alone is to receive
    both worship and devoted service. This also avoids importing a narrower or broader
    theology than the text states.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
