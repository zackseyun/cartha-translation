id: MAT.4.20
reference: Matthew 4:20
source:
  edition: SBLGNT
  text: οἱ δὲ εὐθέως ἀφέντες τὰ δίκτυα ἠκολούθησαν αὐτῷ.
translation:
  text: And they immediately left the nets and followed him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Then
  - So
  - Now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'And'
    is natural modern English and preserves the simple coordination without overstating
    contrast.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως emphasizes promptness. 'Immediately' is a clear and standard rendering
    in Matthew's narrative style, preserving the force of their instant response.
- source_word: ἀφέντες
  chosen: left
  alternatives:
  - having left
  - abandoned
  lexicon: BDAG
  rationale: 'The aorist participle from ἀφίημι is antecedent to the main verb: they
    left and then followed. In idiomatic English narrative, ''left'' conveys the action
    naturally without the wooden ''having left.'' ''Abandoned'' is too strong for
    the immediate context.'
- source_word: τὰ δίκτυα
  chosen: the nets
  alternatives:
  - their nets
  - the fishing nets
  lexicon: BDAG
  rationale: δίκτυα refers to fishing nets in context. 'The nets' closely matches
    the Greek article and is sufficiently clear from the surrounding narrative; adding
    'their' or 'fishing' would be interpretive expansion.
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: ἀκολουθέω with the dative commonly means to follow someone, both physically
    and in discipleship context. 'Followed him' is the standard and most natural rendering,
    preserving both the literal movement and the emerging discipleship sense.
