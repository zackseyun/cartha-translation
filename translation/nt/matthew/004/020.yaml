theological_decisions:
- issue: Discipleship nuance in ἠκολούθησαν αὐτῷ
  chosen_reading: followed him
  alternative_readings:
  - went after him
  rationale: The verb can denote literal following and, in Gospel context, discipleship
    attachment. 'Followed him' preserves this theological and narrative breadth without
    importing more explicit doctrinal language than the text states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
