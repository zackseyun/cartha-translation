theological_decisions:
- issue: Identification of 'the holy city'
  chosen_reading: Retain the Greek designation 'the holy city' in the main text rather
    than substituting 'Jerusalem.'
  alternative_readings:
  - Jerusalem
  rationale: The text itself uses the honorific designation rather than the proper
    name. Preserving it avoids unnecessary interpretive substitution while still allowing
    identification in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of πτερύγιον τοῦ ἱεροῦ
  chosen_reading: Translate as 'the pinnacle of the temple.'
  alternative_readings:
  - the wing of the temple
  - the highest point of the temple complex
  rationale: The exact architectural referent is not fully certain, so the traditional
    but still plausible 'pinnacle' is retained, with alternatives preserved in a footnote
    to maintain transparency rather than over-resolving the ambiguity.
  doctrine_reference: Translation philosophy §3
