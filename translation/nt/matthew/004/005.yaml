id: MAT.4.5
reference: Matthew 4:5
source:
  edition: SBLGNT
  text: Τότε παραλαμβάνει αὐτὸν ὁ διάβολος εἰς τὴν ἁγίαν πόλιν, καὶ ⸀ἔστησεν αὐτὸν
    ἐπὶ τὸ πτερύγιον τοῦ ἱεροῦ,
translation:
  text: Then the devil takes him into the holy city and set him on the pinnacle of
    the temple,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Jerusalem.
    reason: cross_reference
  - marker: b
    text: Or 'the wing of the temple'; the Greek may refer to a projecting edge or
      highest point of the temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal-sequential adverb introducing the next event in the
    narrative.
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - takes with him
  lexicon: BDAG
  rationale: Present-tense historical present in narrative; rendered with vivid English
    present 'takes' rather than a more wooden 'receives' or 'takes along.'
- source_word: ὁ διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: διάβολος functions here as the personal title for Satan in narrative
    context; 'the devil' is the established and accurate English rendering.
- source_word: εἰς τὴν ἁγίαν πόλιν
  chosen: into the holy city
  alternatives:
  - to the holy city
  lexicon: BDAG
  rationale: εἰς commonly marks movement into; 'the holy city' preserves the article
    and the recognized designation for Jerusalem without over-specifying in the main
    text.
- source_word: ἁγίαν πόλιν
  chosen: the holy city
  alternatives:
  - Jerusalem
  lexicon: BDAG
  rationale: The phrase is a title-like designation. Keeping 'the holy city' preserves
    the Greek wording; identifying it as Jerusalem is suitable for a footnote rather
    than the main text.
- source_word: ἔστησεν
  chosen: set
  alternatives:
  - placed
  - stood
  lexicon: BDAG
  rationale: 'Aorist active of ἵστημι here is causative/transitive: the devil caused
    him to stand in a location. ''Set'' is concise and natural; ''stood'' would wrongly
    suggest intransitive action by Jesus.'
- source_word: ἐπὶ τὸ πτερύγιον
  chosen: on the pinnacle
  alternatives:
  - on the wing
  - on the highest point
  lexicon: BDAG
  rationale: πτερύγιον literally denotes a small wing or projecting extremity; in
    temple architecture it is traditionally understood as a pinnacle or projecting
    high point. 'Pinnacle' best captures the likely referent in readable English.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the temple complex
  - of the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex broadly, not specifically the inner
    sanctuary (ναός). 'Temple' is acceptable in the main text, with the broader sense
    noted here.
