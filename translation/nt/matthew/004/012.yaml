id: MAT.4.12
reference: Matthew 4:12
source:
  edition: SBLGNT
  text: Ἀκούσας ⸀δὲ ὅτι Ἰωάννης παρεδόθη ἀνεχώρησεν εἰς τὴν Γαλιλαίαν.
translation:
  text: Now when he heard that John had been handed over, he withdrew into Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'had been arrested.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσας
  chosen: when he heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω, temporal in relation to the main verb. 'When
    he heard' gives natural English while preserving the participial sense better
    than a more wooden 'having heard.' The subject is understood from context as Jesus.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - then
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative transition rather than
    strong contrast. 'Now' reflects the discourse shift in readable English.
- source_word: παρεδόθη
  chosen: had been handed over
  alternatives:
  - had been arrested
  - was delivered up
  - was handed over
  lexicon: BDAG
  rationale: Passive of παραδίδωμι. 'Handed over' preserves the broader lexical sense
    and avoids narrowing the term to mere arrest, while still fitting the narrative
    context of John's seizure by authorities. The pluperfect-like English 'had been
    handed over' fits the temporal relation after 'when he heard that.'
- source_word: ἀνεχώρησεν
  chosen: he withdrew
  alternatives:
  - he departed
  - he went away
  - he retreated
  lexicon: BDAG
  rationale: ἀναχωρέω in Matthew often carries the sense of withdrawing or departing
    in response to circumstances. 'Withdrew' preserves that nuance better than the
    flatter 'departed' and avoids overstating fear implied by 'retreated.'
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς commonly means 'into' or 'to.' 'Into Galilee' slightly better reflects
    the preposition's directional force, though 'to Galilee' would also be acceptable
    idiomatic English.
- source_word: Ἰωάννης
  chosen: John
  rationale: Standard English transliteration of the personal name Ἰωάννης, in keeping
    with the translation philosophy to transliterate names.
