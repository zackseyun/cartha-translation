theological_decisions:
- issue: Rendering of παραδίδωμι in relation to John
  chosen_reading: had been handed over
  alternative_readings:
  - had been arrested
  rationale: The Greek verb is broader than a technical term for arrest and elsewhere
    in Matthew can carry theologically resonant overtones of being 'handed over.'
    The main text preserves the lexical breadth without importing more than the context
    warrants; the more specific contextual alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
