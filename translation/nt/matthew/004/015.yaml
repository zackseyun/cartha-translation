theological_decisions:
- issue: Rendering of ἐθνῶν in the Isaianic citation
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The phrase Γαλιλαία τῶν ἐθνῶν echoes Isa 9:1 and in Matthew's context
    highlights the region's association with non-Jewish populations. "Gentiles" best
    conveys the ethnoreligious contrast likely heard by the original audience, while
    "nations" remains a viable lexical alternative and is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
