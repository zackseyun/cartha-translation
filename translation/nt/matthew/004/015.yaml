id: MAT.4.15
reference: Matthew 4:15
source:
  edition: SBLGNT
  text: Γῆ Ζαβουλὼν καὶ γῆ Νεφθαλίμ, ὁδὸν θαλάσσης, πέραν τοῦ Ἰορδάνου, Γαλιλαία τῶν
    ἐθνῶν,
translation:
  text: Land of Zebulun and land of Naphtali, the way of the sea, beyond the Jordan,
    Galilee of the Gentiles—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Galilee of the nations."
    reason: lexical_alternative
lexical_decisions:
- source_word: Γῆ
  chosen: Land
  alternatives:
  - land
  lexicon: BDAG
  rationale: Rendered as "Land" to reflect the geographic designation in this citation
    context rather than "earth" or "ground." Capitalization is stylistic at the start
    of the line, not a semantic distinction.
- source_word: Ζαβουλὼν
  chosen: Zebulun
  alternatives:
  - Zabulon
  lexicon: BDAG
  rationale: Standard English transliteration of the tribal/place name, following
    conventional biblical usage.
- source_word: γῆ
  chosen: land
  alternatives:
  - territory
  lexicon: BDAG
  rationale: Repeated with the same sense as the first occurrence, preserving the
    parallel structure of the Greek.
- source_word: Νεφθαλίμ
  chosen: Naphtali
  alternatives:
  - Nephthalim
  lexicon: BDAG
  rationale: Standard English transliteration of the tribal/place name.
- source_word: ὁδὸν θαλάσσης
  chosen: the way of the sea
  alternatives:
  - the road by the sea
  - the coastal road
  lexicon: BDAG
  rationale: 'A relatively formal rendering that preserves the Isaianic citation''s
    phrasing and ambiguity: it may denote a known route or a region associated with
    the sea. "The way of the sea" keeps the wording transparent to the source.'
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: BDAG
  rationale: Standard rendering of the prepositional phrase. "Beyond" preserves the
    geographic idiom without over-specifying viewpoint.
- source_word: Γαλιλαία
  chosen: Galilee
  lexicon: BDAG
  rationale: Standard English transliteration of the region name.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: In this Jewish-Gospel context, ἐθνῶν most naturally refers to Gentiles/non-Jews
    rather than nations in a neutral geopolitical sense. "Gentiles" also matches the
    traditional sense of the Isaianic expression while remaining clear in English.
