theological_decisions:
- issue: Christological force of 'Son of God' in the tempter's challenge
  chosen_reading: Rendered as the title 'the Son of God'
  alternative_readings:
  - Rendered more literally as 'son of God' without the English article
  rationale: Within Matthew's narrative, the phrase functions as a recognized christological
    designation, not merely a generic category. Using 'the Son of God' preserves the
    title without adding doctrinal content beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy: do not import doctrinal claims beyond the text,
    but preserve source meaning.'
- issue: Quotation of Psalm 91 by the devil is left as quoted Scripture without harmonizing
    or correcting in the main text
  chosen_reading: Translate the citation as spoken, preserving the tempter's appeal
    to Scripture
  alternative_readings:
  - Add interpretive qualification in the main text
  rationale: The verse presents the devil quoting Scripture; the translation should
    not insert commentary into the text. Any interpretive clarification belongs outside
    the main translation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy.'
