id: MAT.4.6
reference: Matthew 4:6
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ· Εἰ υἱὸς εἶ τοῦ θεοῦ, βάλε σεαυτὸν κάτω· γέγραπται γὰρ ὅτι
    Τοῖς ἀγγέλοις αὐτοῦ ἐντελεῖται περὶ σοῦ καὶ ἐπὶ χειρῶν ἀροῦσίν σε, μήποτε προσκόψῃς
    πρὸς λίθον τὸν πόδα σου.
translation:
  text: 'And he said to him, “If you are the Son of God, throw yourself down, for
    it is written: ‘He will command his angels concerning you,’ and ‘On their hands
    they will lift you up, lest you strike your foot against a stone.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “cast yourself down.”
    reason: lexical_alternative
  - marker: b
    text: Or “On their hands they will bear you up.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Greek present tense in narrative often functions as a historical present.
    English simple past is more natural and preserves the narrative sense.
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The conditional particle introduces the devil's challenge without conceding
    the truth of the condition in English. 'If' best preserves the testing force.
- source_word: υἱὸς ... τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - a son of God
  lexicon: BDAG
  rationale: With the anarthrous predicate noun and genitive phrase in this context,
    the idiomatic and christologically appropriate rendering is the titular 'the Son
    of God,' matching the Matthean context and the force of the temptation.
- source_word: βάλε σεαυτὸν κάτω
  chosen: throw yourself down
  alternatives:
  - cast yourself down
  - throw yourself below
  lexicon: BDAG
  rationale: This is the natural English equivalent of the aorist imperative plus
    reflexive pronoun and adverb. 'Cast yourself down' is traditional, but 'throw
    yourself down' is clearer modern English.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive used for Scripture citation;
    preserves the enduring authority implied by the perfect.
- source_word: ἐντελεῖται
  chosen: He will command
  alternatives:
  - He will give orders
  - He will instruct
  lexicon: BDAG
  rationale: Future middle of ἐντέλλομαι in citation context is well rendered 'He
    will command.' This preserves the sense of authoritative charge.
- source_word: περὶ σοῦ
  chosen: concerning you
  alternatives:
  - about you
  - for you
  lexicon: BDAG
  rationale: '''Concerning you'' is the most direct rendering of περί with genitive
    here and matches the Psalm citation. ''For you'' is possible but less precise
    to the Greek wording.'
- source_word: ἐπὶ χειρῶν
  chosen: On their hands
  alternatives:
  - In their hands
  - Upon their hands
  lexicon: BDAG
  rationale: The preposition ἐπί with genitive here is idiomatically rendered 'on/upon.'
    'On their hands' preserves the image of being borne up by angelic support.
- source_word: ἀροῦσίν σε
  chosen: they will lift you up
  alternatives:
  - they will bear you up
  - they will carry you
  lexicon: BDAG
  rationale: αἴρω here means to lift/carry. 'Lift you up' is clear modern English
    while preserving the protective imagery. The traditional 'bear you up' is preserved
    as an alternative.
- source_word: μήποτε προσκόψῃς
  chosen: lest you strike
  alternatives:
  - so that you may not strike
  - lest you stumble
  lexicon: BDAG
  rationale: 'μήποτε with aorist subjunctive expresses prevention: ''lest.'' προσκόπτω
    with πρὸς λίθον in this context refers specifically to striking the foot, not
    merely general stumbling.'
- source_word: πρὸς λίθον
  chosen: against a stone
  alternatives:
  - against the stone
  - on a stone
  lexicon: BDAG
  rationale: The anarthrous λίθον is indefinite in sense here. 'Against a stone' is
    natural English and fits the Psalm citation.
- source_word: τὸν πόδα σου
  chosen: your foot
  alternatives:
  - your feet
  lexicon: BDAG
  rationale: Singular in Greek should remain singular in English.
