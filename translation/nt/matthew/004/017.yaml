id: MAT.4.17
reference: Matthew 4:17
source:
  edition: SBLGNT
  text: Ἀπὸ τότε ἤρξατο ὁ Ἰησοῦς κηρύσσειν καὶ λέγειν· Μετανοεῖτε, ἤγγικεν γὰρ ἡ βασιλεία
    τῶν οὐρανῶν.
translation:
  text: From that time Jesus began to proclaim, saying, “Repent, for the kingdom of
    heaven has drawn near.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has come near” or “is near.” The Greek perfect verb emphasizes that
      the kingdom's nearness has arrived and remains in effect.
    reason: lexical_alternative
  - marker: b
    text: Greek “the kingdom of the heavens.” Matthew regularly uses this expression
      where other passages often say “the kingdom of God.”
    reason: lexical_alternative
  - marker: c
    text: Or 'to proclaim and to say'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀπὸ τότε
  chosen: From that time
  alternatives:
  - From then on
  - Since that time
  lexicon: BDAG
  rationale: Marks a narrative turning point. 'From that time' is a natural, fairly
    formal rendering that preserves the temporal transition without over-interpreting
    duration.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Standard rendering of ἄρχω in the middle with complementary infinitives.
    'Began' fits the narrative register better than the more colloquial 'started.'
- source_word: κηρύσσειν
  chosen: to proclaim
  alternatives:
  - to preach
  - to herald
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaim' preserves the heraldic
    force while remaining accessible; 'preach' is possible but can sound more ecclesiastically
    specialized.
- source_word: καὶ λέγειν
  chosen: and to say
  alternatives:
  - and to declare
  lexicon: BDAG
  rationale: The Greek uses two infinitives, likely expressing both the activity of
    proclamation and its content. Rendering both avoids collapsing the wording and
    preserves the source's rhythm.
- source_word: Μετανοεῖτε
  chosen: Repent
  alternatives:
  - Change your hearts
  - Turn back
  lexicon: BDAG
  rationale: The imperative calls for a decisive change of mind and life in view of
    God's reign. 'Repent' is the established and most precise English equivalent;
    looser alternatives risk paraphrase.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: Perfect tense suggests a nearness that has arrived and remains in effect.
    'Has drawn near' preserves that aspect better than the simpler present 'is near.'
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign or realm. 'Kingdom' is the most idiomatic and
    recognizable rendering here, while still allowing the dynamic sense of God's royal
    rule to be understood from context.
- source_word: τῶν οὐρανῶν
  chosen: of heaven
  alternatives:
  - of the heavens
  lexicon: BDAG
  rationale: Matthew's characteristic expression is plural in Greek but idiomatically
    refers to heaven as a reverential circumlocution for God. Singular 'heaven' is
    standard English and best conveys the sense without awkwardness.
