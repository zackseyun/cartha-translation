theological_decisions:
- issue: Rendering Matthew's βασιλεία τῶν οὐρανῶν
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the kingdom of the heavens
  - the reign of heaven
  rationale: This preserves Matthew's distinctive wording while using natural English.
    It does not flatten the phrase into merely a location, but retains the established
    expression for God's eschatological royal rule. No doctrinally partisan interpretation
    is imposed.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of Μετανοεῖτε
  chosen_reading: Repent
  alternative_readings:
  - Turn back
  - Change your mind
  rationale: The command includes moral and spiritual turning, not mere intellectual
    reconsideration. 'Repent' best preserves the theological weight without importing
    a narrower denominational framework.
  doctrine_reference: Translation philosophy §§1, 6
revisions:
- timestamp: '2026-04-21T02:41:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/004/017.json
  category: awkward_english
  tier: 1
  from: to proclaim and to say
  to: to proclaim, saying
  rationale: The Greek construction 'κηρύσσειν καὶ λέγειν' uses two coordinate infinitives.
    While the draft's literal rendering is defensible, it creates a slightly redundant
    and stiff phrase in English. The action of 'saying' here is not separate from
    'proclaiming' but rather specifies its content. Using a participle, 'saying',
    is a standard and more idiomatic English construction that clarifies this relationship,
    treating the second verb as subordinate and introductory to the quotation.
