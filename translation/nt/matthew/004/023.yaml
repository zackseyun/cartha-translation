theological_decisions:
- issue: Rendering εὐαγγέλιον
  chosen_reading: the good news
  alternative_readings:
  - the gospel
  rationale: This follows the project's preference for readable modern English and
    direct lexical transparency without importing ecclesiastical jargon. No doctrinal
    content is altered; the traditional term is preserved in a footnote as a lexical
    alternative.
  doctrine_reference: Translation philosophy §6
- issue: Scope of Jesus's healing ministry in πᾶσαν νόσον καὶ πᾶσαν μαλακίαν
  chosen_reading: every disease and every sickness
  alternative_readings:
  - every illness and every affliction
  rationale: The double πᾶσαν construction is preserved to reflect the text's emphatic
    comprehensiveness. The translation avoids reducing the statement to a vague summary
    while not overstating beyond the verse itself.
  doctrine_reference: Translation philosophy §1, §5
