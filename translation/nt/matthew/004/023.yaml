id: MAT.4.23
reference: Matthew 4:23
source:
  edition: SBLGNT
  text: Καὶ περιῆγεν ⸂ἐν ὅλῃ τῇ Γαλιλαίᾳ⸃, διδάσκων ἐν ταῖς συναγωγαῖς αὐτῶν καὶ κηρύσσων
    τὸ εὐαγγέλιον τῆς βασιλείας καὶ θεραπεύων πᾶσαν νόσον καὶ πᾶσαν μαλακίαν ἐν τῷ
    λαῷ.
translation:
  text: And he went throughout all Galilee, teaching in their synagogues and proclaiming
    the good news of the kingdom and healing every disease and every sickness among
    the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the gospel of the kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιῆγεν
  chosen: went throughout
  alternatives:
  - went around
  - traveled throughout
  lexicon: BDAG
  rationale: The imperfect verb depicts ongoing itinerant movement through the region.
    'Went throughout' preserves both the motion and the distributive sense without
    sounding wooden.
- source_word: ἐν ὅλῃ τῇ Γαλιλαίᾳ
  chosen: throughout all Galilee
  alternatives:
  - in all Galilee
  - through all Galilee
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with a verb of movement and the adjective
    ὅλῃ the sense is distributive across the whole region. 'Throughout all Galilee'
    communicates the scope naturally in English.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is well
    represented by the English participle 'teaching.'
- source_word: συναγωγαῖς αὐτῶν
  chosen: their synagogues
  alternatives:
  - the synagogues
  - their meeting places
  lexicon: BDAG
  rationale: συναγωγή here refers to Jewish synagogue assemblies/buildings. 'Their
    synagogues' preserves the possessive αὐτῶν, likely referring to the people/communities
    of Galilee.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: κηρύσσω is public heralding. 'Proclaiming' preserves the authoritative
    public sense while remaining readable modern English.
- source_word: τὸ εὐαγγέλιον
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: '''Good news'' translates the lexical meaning directly and is more transparent
    for modern readers than the traditional loanword ''gospel.'''
- source_word: τῆς βασιλείας
  chosen: of the kingdom
  alternatives:
  - about the kingdom
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered attributively/compositionally:
    the good news characterized by or concerning the kingdom. ''Of the kingdom'' stays
    closer to the Greek while remaining idiomatic.'
- source_word: θεραπεύων
  chosen: healing
  alternatives:
  - curing
  lexicon: BDAG
  rationale: θεραπεύω in this context denotes actual healing. 'Healing' is the most
    natural and broad rendering.
- source_word: πᾶσαν νόσον
  chosen: every disease
  alternatives:
  - every illness
  lexicon: BDAG
  rationale: νόσος commonly denotes disease or illness. 'Disease' helps preserve a
    distinction from μαλακία in the following phrase.
- source_word: πᾶσαν μαλακίαν
  chosen: every sickness
  alternatives:
  - every weakness
  - every infirmity
  lexicon: BDAG
  rationale: μαλακία can denote weakness, sickness, or infirmity. Rendering it as
    'sickness' alongside νόσος as 'disease' preserves the paired comprehensiveness
    without collapsing the two nouns into one English term.
- source_word: ἐν τῷ λαῷ
  chosen: among the people
  alternatives:
  - in the people
  - among the populace
  lexicon: BDAG
  rationale: The phrase indicates the sphere in which the healings occurred. 'Among
    the people' is idiomatic and reflects λαός as the people generally, not necessarily
    a technical covenantal emphasis in this immediate context.
