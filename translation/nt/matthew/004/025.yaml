id: MAT.4.25
reference: Matthew 4:25
source:
  edition: SBLGNT
  text: καὶ ἠκολούθησαν αὐτῷ ὄχλοι πολλοὶ ἀπὸ τῆς Γαλιλαίας καὶ Δεκαπόλεως καὶ Ἱεροσολύμων
    καὶ Ἰουδαίας καὶ πέραν τοῦ Ἰορδάνου.
translation:
  text: And large crowds followed him from Galilee and the Decapolis and Jerusalem
    and Judea and from beyond the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from across the Jordan."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκολουθέω; 'followed' is the natural English
    equivalent in narrative context and preserves both physical following and emerging
    discipleship interest without overstating commitment.
- source_word: ὄχλοι πολλοὶ
  chosen: large crowds
  alternatives:
  - many crowds
  - great crowds
  lexicon: BDAG
  rationale: The noun-adjective combination denotes numerous crowds/large multitudes.
    'Large crowds' is idiomatic modern English and conveys quantity better than the
    wooden 'many crowds.'
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard marker of source/origin. 'From' fits the list of regions supplying
    the crowds.
- source_word: Γαλιλαίας
  chosen: Galilee
  lexicon: BDAG
  rationale: Standard English transliteration of the region name.
- source_word: Δεκαπόλεως
  chosen: the Decapolis
  alternatives:
  - Decapolis
  lexicon: BDAG
  rationale: The proper name refers to the well-known league/region of ten cities.
    Including the article in English is idiomatic for a regional designation.
- source_word: Ἱεροσολύμων
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English form of the place name. Though morphologically plural
    in Greek, it is singular in normal English usage.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - Judaea
  lexicon: BDAG
  rationale: Standard modern English spelling of the region name.
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: from beyond the Jordan
  alternatives:
  - from the other side of the Jordan
  - from across the Jordan
  lexicon: BDAG
  rationale: πέραν with the genitive denotes the region beyond/across the Jordan.
    'From beyond the Jordan' preserves the spatial sense and matches the repeated
    source idea established by ἀπό, even though the preposition is not repeated identically
    in Greek.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - including
  lexicon: N/A
  rationale: The repeated καί is preserved rather than compressed, reflecting the
    cumulative geographic spread of Jesus's following.
