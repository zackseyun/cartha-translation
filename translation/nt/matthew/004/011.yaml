theological_decisions:
- issue: Rendering διάβολος in a narrative involving Satan
  chosen_reading: the devil
  alternative_readings:
  - the slanderer
  rationale: The term can be rendered more literally as 'slanderer,' but in this context
    it functions as the personal designation of Satan in the temptation account. Using
    'the devil' preserves referential clarity without importing extra doctrinal content.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
