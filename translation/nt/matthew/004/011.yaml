id: MAT.4.11
reference: Matthew 4:11
source:
  edition: SBLGNT
  text: τότε ἀφίησιν αὐτὸν ὁ διάβολος, καὶ ἰδοὺ ἄγγελοι προσῆλθον καὶ διηκόνουν αὐτῷ.
translation:
  text: Then the devil left him, and behold, angels came and were ministering to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'angels came and served him.' The Greek verb can be rendered 'served'
      or 'were ministering'; the imperfect tense suggests ongoing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence; 'Then' is the natural narrative connector
    in English.
- source_word: ἀφίησιν
  chosen: left
  alternatives:
  - leaves
  - departs from
  - let go of
  lexicon: BDAG
  rationale: Historical present in Greek is best rendered with simple past in English
    narrative for readability. In this context the sense is that the devil departs
    from Jesus, so 'left' is idiomatic and precise.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; standard English object pronoun.
- source_word: ὁ διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: διάβολος functions here as the recognized title for Satan in the temptation
    narrative. 'The devil' is the established and accurate English rendering; the
    more literal 'slanderer' would obscure referential clarity in context.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the next clause.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as a discourse marker that signals sudden attention and vividness.
    'Behold' preserves the force of ἰδού better than omitting it, while remaining
    understandable in this solemn narrative context.
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this context of Jesus' temptation and divine care, heavenly beings
    are clearly intended, so 'angels' is preferable to the more general 'messengers'.
- source_word: προσῆλθον
  chosen: came
  alternatives:
  - came near
  - approached
  lexicon: BDAG
  rationale: The verb means to come/approach. 'Came' is concise and natural in English;
    the following phrase already makes the action clear.
- source_word: διηκόνουν
  chosen: were ministering
  alternatives:
  - served
  - were serving
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing action. 'Were ministering' preserves
    the progressive aspect and fits the context of angelic care. 'Served' is possible
    but less explicit about the ongoing nature; 'ministering' also preserves the elevated
    register appropriate to the scene.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: Dative pronoun indicating the recipient of the angels' service; 'to him'
    is the clearest English rendering.
