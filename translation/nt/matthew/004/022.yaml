theological_decisions:
- issue: Discipleship response and familial separation
  chosen_reading: The verse is rendered straightforwardly as an immediate act of leaving
    boat and father to follow Jesus, without importing a stronger claim of permanent
    abandonment than the Greek states.
  alternative_readings:
  - They forsook their father permanently
  - They merely stepped away temporarily
  rationale: The text emphasizes immediacy and decisive response, but ἀφέντες itself
    is adequately rendered 'left' rather than a more interpretively loaded term like
    'forsook.' This preserves the narrative force without overstating the theological
    implication.
  doctrine_reference: Translation philosophy §§1, 3, 6
