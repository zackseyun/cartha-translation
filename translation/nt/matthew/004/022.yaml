id: MAT.4.22
reference: Matthew 4:22
source:
  edition: SBLGNT
  text: οἱ δὲ εὐθέως ἀφέντες τὸ πλοῖον καὶ τὸν πατέρα αὐτῶν ἠκολούθησαν αὐτῷ.
translation:
  text: And they immediately left the boat and their father and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Then
  - So
  - Now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'And'
    is natural modern English and preserves the simple coordination without overstating
    contrast or sequence.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως regularly conveys promptness and is a marked Matthean term. 'Immediately'
    preserves the urgency and is standard readable English.
- source_word: ἀφέντες
  chosen: left
  alternatives:
  - having left
  - forsook
  lexicon: BDAG
  rationale: 'The aorist participle denotes action prior to the main verb: they left
    and then followed. In idiomatic English, ''left'' captures the sense cleanly without
    awkwardly preserving the participial form. ''Forsook'' is too archaic and stronger
    than required here.'
- source_word: τὸ πλοῖον
  chosen: the boat
  alternatives:
  - the ship
  lexicon: BDAG
  rationale: πλοῖον in this fishing context is best rendered 'boat' rather than the
    broader 'ship,' matching the likely size and ordinary English usage.
- source_word: τὸν πατέρα αὐτῶν
  chosen: their father
  alternatives:
  - the father of them
  - their own father
  lexicon: BDAG
  rationale: The phrase straightforwardly identifies Zebedee as their father. 'Their
    father' is the natural English rendering and preserves the familial cost of discipleship.
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: ἀκολουθέω in Gospel discipleship contexts commonly means 'follow.' Rendering
    αὐτῷ as 'him' is required by English idiom. This preserves both the literal movement
    and the discipleship nuance.
- source_word: οἱ
  chosen: they
  alternatives:
  - those men
  lexicon: BDAG
  rationale: 'The article functions substantivally, referring back to the two brothers
    just mentioned. English requires an explicit pronoun here: ''they''.'
