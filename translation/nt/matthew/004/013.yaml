id: MAT.4.13
reference: Matthew 4:13
source:
  edition: SBLGNT
  text: καὶ καταλιπὼν τὴν Ναζαρὰ ἐλθὼν κατῴκησεν εἰς Καφαρναοὺμ τὴν παραθαλασσίαν
    ἐν ὁρίοις Ζαβουλὼν καὶ Νεφθαλίμ·
translation:
  text: And leaving Nazara, he came and settled in Capernaum by the sea, in the region
    of Zebulun and Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Nazara''; many English translations have ''Nazareth.'''
    reason: alternative_reading
lexical_decisions:
- source_word: καταλιπὼν
  chosen: leaving
  alternatives:
  - having left
  lexicon: BDAG
  rationale: Aorist participle of καταλείπω, indicating prior action relative to the
    main verb. 'Leaving' is natural modern English while preserving the sense of departure
    from Nazara.
- source_word: Ναζαρὰ
  chosen: Nazara
  alternatives:
  - Nazareth
  lexicon: BDAG
  rationale: The Greek form here is Ναζαρά, not Ναζαρέτ. Following the translation
    philosophy to transliterate names from the source text, 'Nazara' best reflects
    the form actually present in this verse. The familiar 'Nazareth' is preserved
    as an alternative in a footnote.
- source_word: ἐλθὼν
  chosen: he came
  alternatives:
  - coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι. In English, rendering it with a finite
    verb coordinated with the main verb ('he came and settled') communicates the sequence
    clearly and idiomatically without losing the participial force.
- source_word: κατῴκησεν
  chosen: settled
  alternatives:
  - dwelt
  - lived
  - resided
  lexicon: BDAG
  rationale: Aorist indicative of κατοικέω, here denoting taking up residence. 'Settled'
    captures the sense of establishing residence better than the more static 'dwelt'
    and is more natural than 'resided'.
- source_word: Καφαρναοὺμ
  chosen: Capernaum
  lexicon: BDAG
  rationale: Standard English transliteration of the place name Καφαρναούμ.
- source_word: τὴν παραθαλασσίαν
  chosen: by the sea
  alternatives:
  - the seaside
  - on the coast
  lexicon: BDAG
  rationale: The adjective παραθαλάσσιος with the article functions substantivally/descriptively
    for Capernaum as a place beside the sea. 'By the sea' is concise, natural, and
    preserves the geographic sense without sounding archaic.
- source_word: ἐν ὁρίοις
  chosen: in the region of
  alternatives:
  - in the territory of
  - within the borders of
  lexicon: BDAG
  rationale: ὅρια can mean borders, districts, or territories. Here it refers to the
    broader area associated with Zebulun and Naphtali. 'In the region of' is idiomatic
    and communicates the geographic reference clearly.
- source_word: Ζαβουλὼν
  chosen: Zebulun
  alternatives:
  - Zabulon
  lexicon: BDAG
  rationale: Standard English transliteration of the tribal/geographic name.
- source_word: Νεφθαλίμ
  chosen: Naphtali
  alternatives:
  - Nephthalim
  lexicon: BDAG
  rationale: Standard English transliteration of the tribal/geographic name.
