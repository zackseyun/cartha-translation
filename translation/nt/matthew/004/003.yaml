id: MAT.4.3
reference: Matthew 4:3
source:
  edition: SBLGNT
  text: καὶ προσελθὼν ⸂ὁ πειράζων εἶπεν αὐτῷ⸃· Εἰ υἱὸς εἶ τοῦ θεοῦ, εἰπὲ ἵνα οἱ λίθοι
    οὗτοι ἄρτοι γένωνται.
translation:
  text: And the tempter came and said to him, “If you are the Son of God, tell these
    stones to become bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Since you are the Son of God.' The Greek condition may function as
      a challenge rather than expressing simple doubt.
    reason: alternative_reading
  - marker: b
    text: Greek 'bread' is plural ('loaves'); English commonly uses 'bread' idiomatically
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: came
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, functioning adverbially before the
    main verb. 'Came' gives natural English in coordination with 'said' while preserving
    the movement toward Jesus.
- source_word: ὁ πειράζων
  chosen: the tempter
  alternatives:
  - the tester
  - the one who was tempting
  lexicon: BDAG
  rationale: Substantival present participle. 'The tempter' is the established and
    contextually fitting title here, since the narrative presents Satan in the act
    of tempting Jesus. 'Tester' is more literal in some contexts but weaker in English
    and less suitable here.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; 'said to him' is more
    formally aligned than 'told him.'
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  - If indeed
  lexicon: BDAG
  rationale: The conditional particle introduces the challenge. 'If' preserves the
    Greek form and the rhetorical force without resolving whether the sense is doubt,
    challenge, or assumption.
- source_word: υἱὸς ... τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - a son of God
  lexicon: BDAG
  rationale: Although υἱὸς lacks the article, the predicate construction with the
    anarthrous noun after εἰμί naturally identifies Jesus in relation to the known
    title. English idiom and Matthean context strongly support 'the Son of God' rather
    than an indefinite rendering.
- source_word: εἰπὲ
  chosen: tell
  alternatives:
  - say
  - command
  lexicon: BDAG
  rationale: Aorist imperative of λέγω. In English, 'tell these stones to become bread'
    communicates the performative force more naturally than 'say that...' while avoiding
    the stronger lexical claim of 'command,' which is not explicit in λέγω itself.
- source_word: ἵνα
  chosen: to
  alternatives:
  - that
  - so that
  lexicon: BDAG
  rationale: After an imperative, ἵνα commonly introduces the content or intended
    result. English infinitive style ('tell ... to become') is idiomatic and accurately
    conveys the sense.
- source_word: οἱ λίθοι οὗτοι
  chosen: these stones
  alternatives:
  - these rocks
  lexicon: BDAG
  rationale: λίθος is most naturally 'stone' here; 'these stones' preserves the demonstrative
    emphasis and matches the wilderness setting.
- source_word: ἄρτοι
  chosen: bread
  alternatives:
  - loaves of bread
  - loaves
  lexicon: BDAG
  rationale: Plural ἄρτοι can mean 'loaves,' but English often uses mass noun 'bread'
    naturally in this context. This avoids awkwardness while preserving the substance
    in view.
- source_word: γένωνται
  chosen: become
  alternatives:
  - turn into
  - come to be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι. 'Become' is the most direct and
    neutral rendering; 'turn into' is more colloquial and interpretive.
