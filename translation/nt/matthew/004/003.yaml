theological_decisions:
- issue: Force of the conditional clause Εἰ υἱὸς εἶ τοῦ θεοῦ
  chosen_reading: Rendered as 'If you are the Son of God' without implying either
    uncertainty or concession.
  alternative_readings:
  - Since you are the Son of God
  - If indeed you are the Son of God
  rationale: The Greek condition can function rhetorically as a challenge rather than
    a straightforward expression of doubt. To preserve theological tension and avoid
    over-interpreting Satan's intent, the main text keeps the simple 'If.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
- issue: Christological title υἱὸς τοῦ θεοῦ
  chosen_reading: Rendered as 'the Son of God.'
  alternative_readings:
  - a son of God
  rationale: In Matthew's narrative and broader orthodox Christological context, this
    is a title identifying Jesus uniquely, not a generic class membership. The translation
    reflects the title while not expanding beyond the text.
  doctrine_reference: DOCTRINE.md Affirmations (Nicene Creed; Chalcedon)
