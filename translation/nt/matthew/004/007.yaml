id: MAT.4.7
reference: Matthew 4:7
source:
  edition: SBLGNT
  text: ἔφη αὐτῷ ὁ Ἰησοῦς· Πάλιν γέγραπται· Οὐκ ἐκπειράσεις κύριον τὸν θεόν σου.
translation:
  text: 'Jesus said to him, “Again it is written: ‘You shall not put the Lord your
    God to the test.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “You shall not test the Lord your God.” The Greek verb ἐκπειράζω
      can be rendered “test” or “put to the test.”
    reason: lexical_alternative
  - marker: b
    text: This cites Deuteronomy 6:16. The Greek “the Lord” reflects the Septuagint’s
      rendering of the divine name.
    reason: cross_reference
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  - declared
  lexicon: BDAG
  rationale: Aorist of φημί here functions as a simple speech introduction. 'Said'
    is the most natural modern English equivalent without adding force not present
    in the Greek.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object of speech. 'To him' makes
    the relation explicit and reads naturally in English dialogue.
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - On the other hand
  - Also
  lexicon: BDAG
  rationale: πάλιν here introduces a counter-citation from Scripture in response to
    the tempter's quotation. 'Again' preserves the adverb's straightforward sense
    and the rhetorical force of a second scriptural appeal.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: The perfect passive is the standard formula for citing authoritative
    Scripture. 'It is written' is idiomatic, accurate, and preserves the enduring
    authority implied by the perfect.
- source_word: Οὐκ ἐκπειράσεις
  chosen: You shall not put ... to the test
  alternatives:
  - You shall not test
  - You must not put ... to the test
  lexicon: BDAG
  rationale: The future indicative is used as a prohibitive command in citation of
    the Decalogue/traditional law style. ἐκπειράζω carries the sense of testing thoroughly
    or putting to the test. 'You shall not put ... to the test' best reflects both
    the form and the object-complement structure in English.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' With the article and following
    apposition 'your God,' 'the Lord' is the most natural rendering and preserves
    the covenantal resonance of the source citation.
- source_word: τὸν θεόν σου
  chosen: your God
  alternatives:
  - the God of you
  lexicon: BDAG
  rationale: θεόν with possessive pronoun σου is idiomatically rendered 'your God.'
    In English, the appositional phrase after 'the Lord' is naturally 'the Lord your
    God.'
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention. The article
    is not normally represented in English before a proper name in this context.
