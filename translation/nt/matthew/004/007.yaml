theological_decisions:
- issue: Rendering of κύριος in a Scripture citation referring to Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The immediate Greek text has κύριον, following the LXX-style citation.
    Per doctrine, κύριος defaults to 'Lord.' Because the source text here is Greek
    rather than the underlying Hebrew tetragrammaton itself, the main text keeps 'the
    Lord,' while the covenantal background may be noted in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
