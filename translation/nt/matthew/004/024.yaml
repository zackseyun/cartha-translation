  from: all who were sick, afflicted with various diseases and torments, those oppressed by demons, those having seizures, and paralytics
  to: 'all who were sick: those afflicted with various diseases and torments, those oppressed by demons, those having seizures, and paralytics'
  rationale: The current rendering presents a list of ailments that is not grammatically parallel ('afflicted with...', 'those oppressed by...', 'those having...'), which is slightly awkward. Additionally, the comma after 'sick' makes the relationship between the general category ('all who were sick') and the specific examples ambiguous. Using a colon clarifies that the list is in apposition, specifying the types of sickness. Rewording the first item to 'those afflicted with...' makes the list items parallel, improving readability and flow.
