theological_decisions:
- issue: Rendering δαιμονιζομένους in a way that acknowledges real demonic affliction without importing a narrower technical category than the Greek itself requires
  chosen_reading: those oppressed by demons
  alternative_readings:
  - the demon-possessed
  - those demonized
  rationale: Historic Christian orthodoxy affirmed in the project allows and expects the reality of demonic activity, so the translation should not demythologize the term. At the same time, the Greek verb does not itself force one modern clinical or technical English label. 'Those oppressed by demons' preserves the supernatural referent and remains readable; a more traditional alternative is footnoted.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Rendering σεληνιαζομένους without endorsing ancient folk etiology while preserving the referent
  chosen_reading: those having seizures
  alternative_readings:
  - epileptics
  - lunatics
  rationale: The Greek term is etymologically linked to the moon, but the translation should prioritize plain sense for modern readers. In this healing list, it denotes persons suffering seizure-like episodes. 'Those having seizures' communicates the likely referent accessibly, while preserving more literal/traditional alternatives in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 6
