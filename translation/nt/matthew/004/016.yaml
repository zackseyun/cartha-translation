id: MAT.4.16
reference: Matthew 4:16
source:
  edition: SBLGNT
  text: ὁ λαὸς ὁ καθήμενος ἐν ⸀σκοτίᾳ ⸂φῶς εἶδεν⸃ μέγα, καὶ τοῖς καθημένοις ἐν χώρᾳ
    καὶ σκιᾷ θανάτου φῶς ἀνέτειλεν αὐτοῖς.
translation:
  text: The people sitting in darkness saw a great light, and on those sitting in
    the region and shadow of death, a light dawned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deep darkness.' The phrase 'shadow of death' is retained because the
      Greek explicitly includes 'death' and echoes familiar biblical imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸς
  chosen: people
  alternatives:
  - people group
  - nation
  lexicon: BDAG
  rationale: '''People'' is the natural English equivalent here for a collective human
    group. ''Nation'' would sound too political or ethnic in this context, while the
    verse speaks broadly of those dwelling in spiritual darkness.'
- source_word: καθήμενος / καθημένοις
  chosen: sitting
  alternatives:
  - dwelling
  - living
  - seated
  lexicon: BDAG
  rationale: The participle is literally 'sitting' and is retained for imagery and
    intertextual resonance with Isaiah. 'Dwelling' is possible idiomatically, but
    'sitting' better preserves the vivid metaphor and parallel structure.
- source_word: σκοτίᾳ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: Standard rendering for σκοτία. It preserves both literal and metaphorical
    force without overinterpreting the darkness as exclusively moral, spiritual, or
    circumstantial.
- source_word: φῶς εἶδεν μέγα
  chosen: saw a great light
  alternatives:
  - has seen a great light
  - saw great light
  lexicon: BDAG
  rationale: The aorist is best rendered as simple past in English narrative/quotation
    style. Including the article as 'a great light' is idiomatic and preserves the
    sense of a striking manifestation rather than an abstract quality.
- source_word: χώρᾳ
  chosen: region
  alternatives:
  - land
  - country
  lexicon: BDAG
  rationale: '''Region'' fits the geographic sense without suggesting a modern nation-state
    (''country''). ''Land'' is possible, but ''region'' pairs more naturally with
    ''shadow of death'' in contemporary English.'
- source_word: σκιᾷ θανάτου
  chosen: shadow of death
  alternatives:
  - death-shadow
  - deep darkness
  lexicon: BDAG
  rationale: The traditional phrase 'shadow of death' is both accurate to the Greek
    construction and strongly resonant with biblical usage. 'Deep darkness' reflects
    some OT Hebrew contexts, but here the Greek explicitly includes 'death' (θανάτου),
    so it should be preserved in the main text.
- source_word: ἀνέτειλεν
  chosen: dawned
  alternatives:
  - rose
  - shone forth
  - has dawned
  lexicon: BDAG
  rationale: The verb evokes the rising of a heavenly light. 'Dawned' communicates
    that imagery naturally in English and fits the subject 'a light.' 'Rose' is possible
    but less idiomatic here.
- source_word: αὐτοῖς
  chosen: on those
  alternatives:
  - to them
  - for them
  lexicon: BDAG
  rationale: Although αὐτοῖς is dative ('to them'), English idiom with 'dawned' commonly
    takes 'on.' This preserves the sense while producing natural modern English. The
    recipients are still explicitly represented by 'those' in the clause.
