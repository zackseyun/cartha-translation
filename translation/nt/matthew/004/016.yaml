theological_decisions:
- issue: Nature of the darkness/light imagery
  chosen_reading: Retain the imagery without specifying whether the darkness is spiritual,
    moral, political, or existential.
  alternative_readings:
  - Interpret darkness explicitly as sin
  - Interpret darkness explicitly as Gentile ignorance
  - Interpret light explicitly as Messiah's saving revelation
  rationale: The verse, echoing Isaiah, uses rich prophetic imagery that carries theological
    significance, but the Greek text itself does not narrowly define the darkness
    or the light in this clause. The translation therefore preserves the metaphor
    and avoids importing a more specific doctrinal interpretation than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
