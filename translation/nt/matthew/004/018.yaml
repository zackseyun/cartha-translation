id: MAT.4.18
reference: Matthew 4:18
source:
  edition: SBLGNT
  text: Περιπατῶν δὲ παρὰ τὴν θάλασσαν τῆς Γαλιλαίας εἶδεν δύο ἀδελφούς, Σίμωνα τὸν
    λεγόμενον Πέτρον καὶ Ἀνδρέαν τὸν ἀδελφὸν αὐτοῦ, βάλλοντας ἀμφίβληστρον εἰς τὴν
    θάλασσαν, ἦσαν γὰρ ἁλιεῖς·
translation:
  text: As he was walking beside the Sea of Galilee, he saw two brothers, Simon who
    is called Peter and Andrew his brother, casting a net into the sea, for they were
    fishermen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "casting net"; the Greek term refers to a net thrown out for fishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περιπατῶν
  chosen: as he was walking
  alternatives:
  - walking
  - while walking
  lexicon: BDAG
  rationale: Present participle nominative singular masculine, contemporaneous with
    the main verb εἶδεν. Rendered with an English progressive clause to convey ongoing
    action in natural English.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the Sea
  alternatives:
  - along the sea
  - by the sea
  lexicon: BDAG
  rationale: παρά with the accusative here indicates movement or position alongside.
    'Beside' is natural and sufficiently precise.
- source_word: θάλασσαν τῆς Γαλιλαίας
  chosen: the Sea of Galilee
  alternatives:
  - the sea of Galilee
  lexicon: BDAG
  rationale: Standard geographical designation. Capitalized as a proper place name
    in English.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω, straightforward narrative past. 'Saw' preserves
    the simplicity of the Greek.
- source_word: δύο ἀδελφούς
  chosen: two brothers
  alternatives:
  - two siblings
  lexicon: BDAG
  rationale: ἀδελφούς here refers to literal male siblings, confirmed by the naming
    of Simon and Andrew and the phrase 'his brother.' Gender-accurate rendering fits
    the doctrine guidance.
- source_word: Σίμωνα τὸν λεγόμενον Πέτρον
  chosen: Simon who is called Peter
  alternatives:
  - Simon called Peter
  - Simon, the one called Peter
  lexicon: BDAG
  rationale: The participle λεγόμενον is naturally rendered by a relative clause in
    English. 'Peter' is a personal name, so transliterated per translation philosophy.
- source_word: Ἀνδρέαν τὸν ἀδελφὸν αὐτοῦ
  chosen: Andrew his brother
  alternatives:
  - Andrew, his brother
  - Andrew the brother of him
  lexicon: BDAG
  rationale: Appositional phrase identifying Andrew in relation to Simon. 'His brother'
    is idiomatic and clear.
- source_word: βάλλοντας
  chosen: casting
  alternatives:
  - throwing
  lexicon: BDAG
  rationale: Present participle describing what the two brothers were doing when seen.
    'Casting' is idiomatic in fishing context and more natural than the more general
    'throwing.'
- source_word: ἀμφίβληστρον
  chosen: a net
  alternatives:
  - a casting net
  - a dragnet
  lexicon: BDAG
  rationale: The term denotes a fishing net, specifically one cast around. 'A net'
    keeps the text readable; the more specific 'casting net' is preserved in a footnote
    as a lexical alternative.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the lake
  lexicon: BDAG
  rationale: εἰς marks motion into. Although the Sea of Galilee is a lake geographically,
    θάλασσα is the Greek term used here and is best preserved as 'sea' for consistency
    with the place name.
- source_word: ἦσαν γὰρ ἁλιεῖς
  chosen: for they were fishermen
  alternatives:
  - because they were fishermen
  lexicon: BDAG
  rationale: γάρ gives explanatory background; 'for' preserves the explanatory connection
    in a concise narrative style. ἁλιεῖς is accurately rendered 'fishermen' in this
    context, referring to male fishers.
