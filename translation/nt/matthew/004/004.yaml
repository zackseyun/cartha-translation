id: MAT.4.4
reference: Matthew 4:4
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Γέγραπται· Οὐκ ἐπ’ ἄρτῳ μόνῳ ζήσεται ⸀ὁ ἄνθρωπος, ἀλλ’
    ⸀ἐπὶ παντὶ ῥήματι ἐκπορευομένῳ διὰ στόματος θεοῦ.
translation:
  text: 'But he answered, “It is written: ‘Man will not live by bread alone, but by
    every word proceeding through the mouth of God.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the human being”; the Greek uses a masculine singular form with representative
      force, referring to humanity generally.
    reason: lexical_alternative
  - marker: b
    text: Many English translations read “from the mouth of God.” The Greek here is
      literally “through the mouth of God,” preserving the image of every spoken word
      that comes by God's utterance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: he answered
  alternatives:
  - he answered and said
  - in reply he said
  lexicon: BDAG
  rationale: Common Semitic-influenced narrative expression; concise English 'he answered'
    preserves the sense without unnecessary redundancy.
- source_word: Γέγραπται
  chosen: It is written
  alternatives:
  - It stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation; preserves the ongoing authority implied by the perfect.
- source_word: ἄρτῳ
  chosen: bread
  alternatives:
  - loaf
  - food
  lexicon: BDAG
  rationale: Literal 'bread' is the direct lexical sense and fits the quotation context;
    broader 'food' would over-interpret.
- source_word: μόνῳ
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: Idiomatic English with 'bread alone' closely matches the Greek dative
    phrase.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - shall live
  lexicon: BDAG
  rationale: Future middle is naturally rendered as simple future in English; 'will'
    is modern and readable.
- source_word: ὁ ἄνθρωπος
  chosen: Man
  alternatives:
  - the man
  - a person
  - humanity
  lexicon: BDAG
  rationale: The phrase is generic/representative rather than referring to a specific
    male individual. Per doctrine, a gender-accurate rendering is preferred where
    the Greek has representative masculine force; 'Man' preserves the scriptural diction
    and generic sense better than the more interpretive 'humanity.'
- source_word: παντὶ ῥήματι
  chosen: every word
  alternatives:
  - every utterance
  - every saying
  lexicon: BDAG
  rationale: ῥῆμα here refers to what God speaks; 'word' is natural, traditional,
    and sufficiently precise.
- source_word: ἐκπορευομένῳ
  chosen: proceeding
  alternatives:
  - coming
  - going out
  lexicon: BDAG
  rationale: A participial modifier of 'word'; 'proceeding' preserves the formal imagery
    of emergence from God's mouth better than the more colloquial 'coming'.
- source_word: διὰ στόματος θεοῦ
  chosen: through the mouth of God
  alternatives:
  - from the mouth of God
  lexicon: BDAG
  rationale: The Greek uses διά with the genitive, most basically 'through.' Because
    the source text differs from the more familiar English traditional wording 'from
    the mouth of God,' the translation follows the Greek form directly while preserving
    the metaphor of divine speech.
