theological_decisions:
- issue: Generic masculine ὁ ἄνθρωπος
  chosen_reading: Man
  alternative_readings:
  - a person
  - humanity
  - one
  rationale: The saying states a general truth about human life. Following the doctrine's
    gender-accurate principle, the representative masculine is retained rather than
    neutralized, while a footnote can clarify the inclusive sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Quotation formula and scriptural authority in Γέγραπται
  chosen_reading: It is written
  alternative_readings:
  - It stands written
  rationale: This preserves the conventional citation formula without adding doctrinal
    interpretation, while still reflecting the perfect tense's enduring force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
