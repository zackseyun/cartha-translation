theological_decisions:
- issue: Implication of discipleship in ἐκάλεσεν
  chosen_reading: Retain the simple wording 'he called them' without expanding to
    'called them to follow him.'
  alternative_readings:
  - he called them to follow him
  rationale: The immediate context makes the discipleship summons clear, but this
    verse itself only states that he called them. Optimal equivalence here preserves
    the text's wording and lets the context supply the implication.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
