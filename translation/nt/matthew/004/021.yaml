id: MAT.4.21
reference: Matthew 4:21
source:
  edition: SBLGNT
  text: Καὶ προβὰς ἐκεῖθεν εἶδεν ἄλλους δύο ἀδελφούς, Ἰάκωβον τὸν τοῦ Ζεβεδαίου καὶ
    Ἰωάννην τὸν ἀδελφὸν αὐτοῦ, ἐν τῷ πλοίῳ μετὰ Ζεβεδαίου τοῦ πατρὸς αὐτῶν καταρτίζοντας
    τὰ δίκτυα αὐτῶν, καὶ ἐκάλεσεν αὐτούς.
translation:
  text: And going on from there, he saw two other brothers, James the son of Zebedee
    and John his brother, in the boat with Zebedee their father, mending their nets,
    and he called them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προβὰς
  chosen: going on
  alternatives:
  - having gone on
  - moving on
  lexicon: BDAG
  rationale: Aorist participle of προβαίνω indicates proceeding further from the previous
    location. 'Going on' is natural modern English and preserves the sense of continued
    movement without overformal stiffness.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Adverb marking movement away from the prior location; 'from there' is
    the most idiomatic direct rendering.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Simple narrative aorist of ὁράω; 'saw' is the plain sense and should
    not be heightened.
- source_word: ἄλλους δύο ἀδελφούς
  chosen: two other brothers
  alternatives:
  - two more brothers
  - another two brothers
  lexicon: BDAG
  rationale: ἄλλους marks these as additional to the previously mentioned pair. 'Two
    other brothers' preserves both the number and the comparative sense.
- source_word: Ἰάκωβον
  chosen: James
  alternatives:
  - Iakobos
  lexicon: BDAG
  rationale: Standard English transliteration/traditional form for the personal name
    in NT translation.
- source_word: τὸν τοῦ Ζεβεδαίου
  chosen: the son of Zebedee
  alternatives:
  - of Zebedee
  lexicon: BDAG
  rationale: This genitival identification idiom specifies parentage. English normally
    expresses it as 'the son of Zebedee' for clarity.
- source_word: Ἰωάννην τὸν ἀδελφὸν αὐτοῦ
  chosen: John his brother
  alternatives:
  - John, his brother
  - John the brother of him
  lexicon: BDAG
  rationale: Identifies John as James's brother. 'John his brother' is concise and
    natural in English narrative style.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - in the ship
  lexicon: BDAG
  rationale: πλοῖον here refers to a fishing boat, not a large ship. 'Boat' better
    matches the setting and modern usage.
- source_word: μετὰ Ζεβεδαίου τοῦ πατρὸς αὐτῶν
  chosen: with Zebedee their father
  alternatives:
  - with their father Zebedee
  lexicon: BDAG
  rationale: μετά with genitive means accompaniment. The chosen order follows the
    Greek closely while remaining idiomatic.
- source_word: καταρτίζοντας
  chosen: mending
  alternatives:
  - repairing
  - preparing
  lexicon: BDAG
  rationale: In the fishing context, καταρτίζω refers to putting nets in proper condition.
    'Mending' is the most contextually precise and idiomatic rendering.
- source_word: τὰ δίκτυα αὐτῶν
  chosen: their nets
  alternatives:
  - the nets of them
  lexicon: BDAG
  rationale: Direct object with possessive pronoun; standard English possessive rendering.
- source_word: ἐκάλεσεν αὐτούς
  chosen: he called them
  alternatives:
  - he summoned them
  lexicon: BDAG
  rationale: καλέω in this discipleship context means calling them to follow him.
    'Called' preserves the verbal link with the broader Gospel motif without importing
    extra wording not present in this verse.
