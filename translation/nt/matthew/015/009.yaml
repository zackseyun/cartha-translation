id: MAT.15.9
reference: Matthew 15:9
source:
  edition: SBLGNT
  text: μάτην δὲ σέβονταί με, διδάσκοντες διδασκαλίας ἐντάλματα ἀνθρώπων.
translation:
  text: But they worship me in vain, teaching as doctrines the commandments of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "teaching human commandments as doctrines."'
    reason: alternative_reading
  - marker: b
    text: 'Or: "the commandments of people"; Greek "of men" uses a generic human term
      in contrast to what is divine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάτην
  chosen: in vain
  alternatives:
  - vainly
  - for nothing
  lexicon: BDAG
  rationale: Adverb meaning 'to no purpose' or 'in vain.' 'In vain' is the most natural
    and established English equivalent here and preserves the prophetic/judgment tone
    of the citation.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast. 'But' fits the rebuking force
    in context better than a simple 'and.'
- source_word: σέβονταί
  chosen: they worship
  alternatives:
  - they revere
  - they honor
  lexicon: BDAG
  rationale: σέβομαι denotes reverence or worship directed toward deity. 'Worship'
    best matches the God-directed object 'me' and is idiomatic in English.
- source_word: με
  chosen: me
  rationale: Direct object pronoun referring to God in the Isaiah citation, retained
    straightforwardly as 'me.'
- source_word: διδάσκοντες
  chosen: teaching
  alternatives:
  - while teaching
  - as they teach
  lexicon: BDAG
  rationale: Present participle expressing attendant manner/circumstance explaining
    how their worship is vain. Simple 'teaching' preserves the participial linkage
    without over-specifying temporal nuance.
- source_word: διδασκαλίας
  chosen: as doctrines
  alternatives:
  - doctrines
  - teachings
  lexicon: BDAG
  rationale: 'Accusative plural paired with ἐντάλματα in apposition-like relation:
    they are teaching human commandments as if they were doctrines. Rendering with
    ''as doctrines'' makes the Greek relationship clear in natural English.'
- source_word: ἐντάλματα
  chosen: the commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: Refers to prescribed commands. 'Commandments' preserves the formal religious
    sense and echoes the scriptural source tradition.
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - human
  lexicon: BDAG
  rationale: Genitive plural of ἄνθρωπος here contrasts what is merely human with
    what is divine. Per the project's gender-accurate policy, 'men' is retained because
    the phrase is a traditional generic expression and preserves the source's anthropological
    contrast; a more inclusive alternative is worth noting in a footnote.
