theological_decisions:
- issue: Rendering the phrase διδασκαλίας ἐντάλματα ἀνθρώπων
  chosen_reading: teaching as doctrines the commandments of men
  alternative_readings:
  - teaching doctrines, the commandments of men
  - teaching human commandments as doctrines
  rationale: The Greek reflects the LXX/Isaiah citation and is somewhat compressed.
    The chosen rendering makes explicit the sense that human commands are being taught
    with doctrinal authority, without adding content beyond what the syntax implies.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
- issue: Generic force of ἀνθρώπων
  chosen_reading: of men
  alternative_readings:
  - of people
  - human
  rationale: The term is generic rather than male-specific, but the project prefers
    gender-accurate rendering matching source form and intent. Here 'men' preserves
    the traditional generic force and the contrast between divine and human origin;
    the inclusive alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §4
