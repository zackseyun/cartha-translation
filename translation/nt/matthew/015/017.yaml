theological_decisions:
- issue: Relation of Jesus's saying to ritual purity laws
  chosen_reading: Translate the physiological statement plainly without importing
    an explicit abrogation formula into the verse itself.
  alternative_readings:
  - Render with an interpretive expansion implying that all foods are thereby declared
    clean
  rationale: This verse itself states the digestive process and supports Jesus's argument
    about what truly defiles, but it does not explicitly add the interpretive comment
    found in Mark 7:19. To preserve theological tension and avoid importing claims
    not made in this verse, the translation remains close to the Greek wording.
  doctrine_reference: Translation philosophy items 1 and 3
