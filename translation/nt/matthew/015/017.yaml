id: MAT.15.17
reference: Matthew 15:17
source:
  edition: SBLGNT
  text: ⸀οὐ νοεῖτε ὅτι πᾶν τὸ εἰσπορευόμενον εἰς τὸ στόμα εἰς τὴν κοιλίαν χωρεῖ καὶ
    εἰς ἀφεδρῶνα ἐκβάλλεται;
translation:
  text: Do you not understand that everything entering into the mouth goes into the
    stomach and is expelled into the latrine?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever enters into the mouth ... is expelled into the sewer/privy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νοεῖτε
  chosen: understand
  alternatives:
  - perceive
  - grasp
  lexicon: BDAG
  rationale: νοέω here refers to mental comprehension of Jesus's point, not mere sensory
    perception. 'Understand' is natural modern English and fits the rebuking question.
- source_word: πᾶν τὸ εἰσπορευόμενον
  chosen: everything entering
  alternatives:
  - whatever enters
  - all that enters
  lexicon: BDAG
  rationale: The articular participial construction is generic/neuter singular, referring
    broadly to anything that goes in through eating. 'Everything entering' preserves
    the general scope while reading naturally in English.
- source_word: εἰς τὸ στόμα
  chosen: into the mouth
  alternatives:
  - through the mouth
  lexicon: BDAG
  rationale: εἰς normally indicates movement into. 'Into the mouth' is the most direct
    rendering and matches the physical imagery.
- source_word: κοιλίαν
  chosen: stomach
  alternatives:
  - belly
  - abdomen
  lexicon: BDAG
  rationale: While κοιλία can mean 'belly' or 'womb' in other contexts, here the digestive
    sense is clear. 'Stomach' is more precise and idiomatic in contemporary English
    than 'belly'.
- source_word: χωρεῖ
  chosen: goes into
  alternatives:
  - passes into
  - enters
  lexicon: BDAG
  rationale: χωρέω can mean 'go, come, proceed, make room for.' In this digestive
    context it describes food passing into the stomach. 'Goes into' is clear and natural,
    avoiding awkward literalism.
- source_word: ἀφεδρῶνα
  chosen: latrine
  alternatives:
  - toilet
  - sewer
  - privy
  lexicon: BDAG
  rationale: ἀφεδρών denotes a privy/latrine, the place of excretion. 'Latrine' is
    accurate, dignified, and avoids anachronistic or overly colloquial wording.
- source_word: ἐκβάλλεται
  chosen: is expelled
  alternatives:
  - is cast out
  - is eliminated
  - is discharged
  lexicon: BDAG
  rationale: The passive form emphasizes the process/result of excretion. 'Is expelled'
    preserves the physical force of ἐκβάλλω without sounding crude.
