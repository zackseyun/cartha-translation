id: MAT.15.36
reference: Matthew 15:36
source:
  edition: SBLGNT
  text: ⸀ἔλαβεν τοὺς ἑπτὰ ἄρτους καὶ τοὺς ἰχθύας ⸀καὶ εὐχαριστήσας ἔκλασεν καὶ ⸀ἐδίδου
    τοῖς ⸀μαθηταῖς οἱ δὲ μαθηταὶ ⸂τοῖς ὄχλοις⸃.
translation:
  text: He took the seven loaves and the fish, and after giving thanks he broke them
    and kept giving them to the disciples, and the disciples to the crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having given thanks.' The Greek participle can be rendered more formally
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: λαμβάνω here introduces Jesus' handling of the food before blessing and
    distribution. 'Took' is the natural English narrative equivalent and matches the
    action sequence.
- source_word: ἑπτὰ ἄρτους
  chosen: the seven loaves
  alternatives:
  - the seven breads
  lexicon: BDAG
  rationale: ἄρτος in feeding narratives commonly refers to loaves of bread rather
    than abstract 'bread.' 'Loaves' is idiomatic and concrete in English.
- source_word: ἰχθύας
  chosen: the fish
  alternatives:
  - the fishes
  lexicon: BDAG
  rationale: 'Modern English prefers ''fish'' as the plural in ordinary usage. The
    article is retained: ''the fish.'''
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - after thanking God
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb ἔκλασεν. 'After
    giving thanks' expresses the temporal relationship clearly in natural English
    without adding an explicit object not present in the Greek.
- source_word: ἔκλασεν
  chosen: he broke them
  alternatives:
  - he broke
  lexicon: BDAG
  rationale: κλάω here refers to breaking the loaves for distribution. English idiom
    benefits from the object 'them,' which is implied by the context and clarifies
    the action.
- source_word: ἐδίδου
  chosen: kept giving them
  alternatives:
  - gave them
  - was giving them
  lexicon: BDAG
  rationale: The imperfect tense conveys ongoing or repeated action during distribution.
    'Kept giving them' captures the iterative force more clearly than simple past.
- source_word: μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The dative marks the recipients of Jesus' distribution. 'His' is contextually
    true but not explicit in the Greek, so it is omitted.
- source_word: οἱ δὲ μαθηταὶ τοῖς ὄχλοις
  chosen: and the disciples to the crowds
  alternatives:
  - and the disciples gave them to the crowds
  - and the disciples to the people
  lexicon: BDAG
  rationale: The second clause is elliptical in Greek, omitting the verb, which is
    naturally supplied from ἐδίδου. 'Crowds' is the standard rendering of ὄχλοι in
    Matthew and preserves the plural.
