id: MAT.15.18
reference: Matthew 15:18
source:
  edition: SBLGNT
  text: τὰ δὲ ἐκπορευόμενα ἐκ τοῦ στόματος ἐκ τῆς καρδίας ἐξέρχεται, κἀκεῖνα κοινοῖ
    τὸν ἄνθρωπον.
translation:
  text: But the things that come out of the mouth come from the heart, and those defile
    the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make the person unclean.' The Greek uses a representative singular,
      literally 'the man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... ἐκπορευόμενα
  chosen: the things that come out
  alternatives:
  - what comes out
  - the things proceeding out
  lexicon: BDAG
  rationale: The neuter plural participle functions substantivally, referring to utterances
    or outputs in a general sense. 'The things that come out' preserves the plural
    form and concrete imagery while remaining natural English.
- source_word: στόματος
  chosen: mouth
  lexicon: BDAG
  rationale: A straightforward literal rendering fits the context of speech and maintains
    the bodily image used by Jesus.
- source_word: καρδίας
  chosen: heart
  lexicon: BDAG
  rationale: In biblical anthropology, 'heart' denotes the inner person, including
    thoughts and moral intentions. The standard rendering preserves this theological
    and idiomatic force.
- source_word: ἐξέρχεται
  chosen: come from
  alternatives:
  - proceed from
  - go out from
  lexicon: BDAG
  rationale: Although singular in form with a neuter plural subject, the sense is
    collective. 'Come from' is idiomatic in English and clearly expresses source,
    especially paired with 'out of the mouth' and 'from the heart.'
- source_word: κἀκεῖνα
  chosen: those
  alternatives:
  - and those things
  - and these
  lexicon: BDAG
  rationale: The crasis means 'and those.' 'Those' is concise and preserves the anaphoric
    reference back to the things coming out of the mouth.
- source_word: κοινοῖ
  chosen: defile
  alternatives:
  - make unclean
  - profane
  lexicon: BDAG
  rationale: In this purity-context, κοινόω refers to rendering a person unclean/defiled.
    'Defile' is the most established and concise English equivalent, while 'make unclean'
    is preserved as an alternative nuance.
- source_word: ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  - a man
  lexicon: BDAG
  rationale: The Greek singular accusative with article is generic but grammatically
    masculine. Per the project's gender-accurate policy, 'the man' preserves the representative
    force of ἄνθρωπος here rather than neutralizing it to 'person.'
