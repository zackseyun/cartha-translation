theological_decisions:
- issue: Anthropological source of moral defilement
  chosen_reading: The verse teaches that moral defilement arises from the inner person
    ('heart') and is expressed in speech.
  alternative_readings:
  - A narrower reading focused only on ritual impurity from speech
  rationale: The immediate context contrasts external food laws with what proceeds
    from within. Rendering καρδία as 'heart' and κοινόω as 'defile' preserves Jesus'
    teaching without reducing it merely to ceremonial categories or expanding it beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Generic masculine ἄνθρωπον
  chosen_reading: Rendered as 'the man' in the main text.
  alternative_readings:
  - the person
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    rendering where the source uses a grammatically masculine representative singular.
    Because English readers may hear 'man' as male-specific, the inclusive representative
    sense is preserved in a footnote rather than flattened in the main text.
  doctrine_reference: Translation philosophy §4
