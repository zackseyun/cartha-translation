id: MAT.15.34
reference: Matthew 15:34
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς ὁ Ἰησοῦς· Πόσους ἄρτους ἔχετε; οἱ δὲ εἶπαν· Ἑπτά, καὶ ὀλίγα
    ἰχθύδια.
translation:
  text: And Jesus said to them, “How many loaves do you have?” And they said, “Seven,
    and a few small fish.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “fish”; the Greek uses a diminutive form, suggesting small fish.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally uses the simple past here. This is a standard optimal-equivalence
    smoothing that preserves the discourse function without awkwardness.
- source_word: Πόσους ἄρτους
  chosen: How many loaves
  alternatives:
  - How many breads
  lexicon: BDAG
  rationale: ἄρτους refers to bread loaves in countable form, so 'loaves' is the natural
    English equivalent rather than the less idiomatic 'breads.'
- source_word: ἔχετε
  chosen: do you have
  alternatives:
  - have you
  lexicon: BDAG
  rationale: A straightforward present-tense question in idiomatic modern English.
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - But they said
  - Then they said
  lexicon: BDAG
  rationale: δέ here marks simple narrative progression/contrast. 'And' fits smooth
    English narrative flow better than a stronger adversative 'but' in this context.
- source_word: Ἑπτά
  chosen: Seven
  lexicon: BDAG
  rationale: Direct rendering of the numeral.
- source_word: ὀλίγα
  chosen: a few
  alternatives:
  - a small number of
  - few
  lexicon: BDAG
  rationale: Idiomatic English equivalent for an indefinite small quantity.
- source_word: ἰχθύδια
  chosen: small fish
  alternatives:
  - little fish
  - fish
  lexicon: BDAG
  rationale: The diminutive form ἰχθύδια suggests small fish rather than simply fish
    in general, so the diminutive nuance is preserved in English.
