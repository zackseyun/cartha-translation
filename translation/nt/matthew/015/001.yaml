id: MAT.15.1
reference: Matthew 15:1
source:
  edition: SBLGNT
  text: Τότε προσέρχονται τῷ ⸀Ἰησοῦ ἀπὸ Ἱεροσολύμων ⸂Φαρισαῖοι καὶ γραμματεῖς⸃ λέγοντες
translation:
  text: Then Pharisees and scribes from Jerusalem come to Jesus, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approach Jesus.'
    reason: lexical_alternative
  - marker: b
    text: '''Scribes'' can also mean ''experts in the law'' or ''teachers of the law''
      in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next episode; 'Then' is natural,
    concise, and preserves narrative flow.
- source_word: προσέρχονται
  chosen: come to
  alternatives:
  - approach
  - draw near to
  lexicon: BDAG
  rationale: Present middle/passive in narrative present. 'Come to' is idiomatic modern
    English and captures movement toward Jesus without sounding overly formal; the
    narrative present is retained in English for vividness.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - toward Jesus
  lexicon: BDAG
  rationale: Dative with προσέρχομαι marks the person approached. Standard transliteration
    of the personal name follows project policy.
- source_word: ἀπὸ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: BDAG
  rationale: ἀπό indicates source/origin. 'From Jerusalem' is the most natural English
    rendering and may imply official or influential provenance without overstating
    it.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish group name; a recognized historical-religious
    designation rather than a translatable common noun.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς commonly refers to scribal/legal experts. 'Scribes' preserves
    the lexical form and remains familiar in Gospel contexts; fuller interpretive
    alternatives are possible but less formally transparent here.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination of the two groups.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - who said
  lexicon: BDAG
  rationale: Present active participle introducing direct speech in the next verse.
    'Saying' is the most straightforward connective and preserves the Greek participial
    linkage.
