theological_decisions:
- issue: Narrative present tense
  chosen_reading: Retain present-tense narration ('come') in English
  alternative_readings:
  - Shift to past tense ('came') for smoother English narrative
  rationale: The Greek uses historical present forms (προσέρχονται, λέγοντες) to heighten
    immediacy. Retaining the present in English is sufficiently natural here and better
    reflects the source text's discourse effect.
  doctrine_reference: Translation philosophy §1, §5
