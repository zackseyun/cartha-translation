id: MAT.15.37
reference: Matthew 15:37
source:
  edition: SBLGNT
  text: καὶ ἔφαγον πάντες καὶ ἐχορτάσθησαν, καὶ ⸂τὸ περισσεῦον τῶν κλασμάτων ἦραν⸃
    ἑπτὰ σπυρίδας πλήρεις.
translation:
  text: And they all ate and were satisfied, and they picked up seven full baskets
    of the leftover pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven large baskets full'; the Greek word here (spyridas) can denote
      a larger kind of basket than in some other feeding accounts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - ate food
  lexicon: BDAG
  rationale: Aorist of ἐσθίω is straightforwardly rendered 'ate.' No object is expressed
    in Greek, so simple English 'ate' is sufficient and natural.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The nominative plural refers to the crowd collectively. 'They all' makes
    the implied subject explicit in idiomatic English while preserving the universal
    scope.
- source_word: ἐχορτάσθησαν
  chosen: were satisfied
  alternatives:
  - were filled
  - had enough to eat
  lexicon: BDAG
  rationale: χορτάζω here denotes being fed to fullness. 'Were satisfied' is natural
    modern English and preserves the sense of having eaten enough, without over-paraphrasing.
- source_word: τὸ περισσεῦον
  chosen: the leftover
  alternatives:
  - what was left over
  - the excess
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally: ''that which remained/was
    left over.'' ''The leftover'' is concise and idiomatic in English.'
- source_word: κλασμάτων
  chosen: pieces
  alternatives:
  - fragments
  - broken pieces
  lexicon: BDAG
  rationale: κλάσματα refers to broken pieces of bread/food remaining after the meal.
    'Pieces' is readable modern English; 'fragments' is possible but slightly more
    formal. The relation to τὸ περισσεῦον is captured by 'leftover pieces.'
- source_word: ἦραν
  chosen: they picked up
  alternatives:
  - they took up
  - they gathered up
  lexicon: BDAG
  rationale: αἴρω can mean 'take up' or 'pick up.' In this collection context, 'picked
    up' is the clearest contemporary English rendering.
- source_word: ἑπτὰ
  chosen: seven
  lexicon: BDAG
  rationale: Cardinal number directly rendered.
- source_word: σπυρίδας
  chosen: baskets
  alternatives:
  - large baskets
  lexicon: BDAG
  rationale: σπυρίς denotes a basket, often understood as a relatively large basket
    in distinction from κόφινος elsewhere. The base translation keeps 'baskets' in
    the main text for readability; the size nuance is worth preserving in a footnote.
- source_word: πλήρεις
  chosen: full
  alternatives:
  - filled
  lexicon: BDAG
  rationale: 'Predicate adjective modifying ''baskets'': they were ''full.'' ''Full''
    is the most direct and natural rendering.'
