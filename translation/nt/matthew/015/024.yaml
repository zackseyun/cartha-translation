theological_decisions:
- issue: Scope of Jesus' stated mission in this saying
  chosen_reading: Render the statement straightforwardly as a limitation of his earthly
    mission to Israel in this context, without softening or expanding it in translation.
  alternative_readings:
  - A less restrictive paraphrase that implies priority rather than limitation
  - An interpretive rendering that imports the later mission to the nations
  rationale: The Greek wording is explicitly restrictive (Οὐκ ... εἰ μὴ). The translation
    should preserve that tension as spoken in the narrative, without resolving it
    by appeal to broader canonical developments.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
