id: MAT.15.24
reference: Matthew 15:24
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Οὐκ ἀπεστάλην εἰ μὴ εἰς τὰ πρόβατα τὰ ἀπολωλότα οἴκου
    Ἰσραήλ.
translation:
  text: But he answered, “I was sent only to the lost sheep of the house of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I was not sent except to the lost sheep of the house
      of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist participle introducing Jesus' response; idiomatic English commonly
    compresses the participle + finite verb construction into 'answered' without loss
    of meaning.
- source_word: Οὐκ ἀπεστάλην
  chosen: I was sent
  alternatives:
  - I have been sent
  lexicon: BDAG
  rationale: Aorist passive indicative of ἀποστέλλω is best rendered as a simple past
    passive here, expressing mission/commission. English present perfect is possible
    but less natural in this narrative context.
- source_word: εἰ μὴ
  chosen: only
  alternatives:
  - except
  - if not
  lexicon: BDAG
  rationale: 'In this construction εἰ μὴ marks exception/limitation. ''Only'' gives
    the sense naturally in English: ''I was sent only to...''.'
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - sheepfold animals
  lexicon: BDAG
  rationale: Standard rendering for πρόβατα; metaphorical in context for the people
    of Israel, but the image should be preserved rather than paraphrased.
- source_word: ἀπολωλότα
  chosen: lost
  alternatives:
  - perished
  - ruined
  lexicon: BDAG
  rationale: Perfect active participle of ἀπόλλυμι used adjectivally. 'Lost' is the
    established and contextually fitting metaphor for sheep gone astray; 'perished'
    would overstate final destruction in this context.
- source_word: οἴκου Ἰσραήλ
  chosen: the house of Israel
  alternatives:
  - Israel's house
  - the household of Israel
  lexicon: BDAG
  rationale: A genitival expression with strong biblical resonance. 'The house of
    Israel' preserves the covenantal/national idiom better than a more colloquial
    paraphrase.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or continuation. 'But' fits the immediate narrative
    turn in response to the woman's plea.
