id: MAT.15.32
reference: Matthew 15:32
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς προσκαλεσάμενος τοὺς μαθητὰς αὐτοῦ εἶπεν· Σπλαγχνίζομαι ἐπὶ τὸν
    ὄχλον, ὅτι ἤδη ἡμέραι τρεῖς προσμένουσίν μοι καὶ οὐκ ἔχουσιν τί φάγωσιν· καὶ ἀπολῦσαι
    αὐτοὺς νήστεις οὐ θέλω, μήποτε ἐκλυθῶσιν ἐν τῇ ὁδῷ.
translation:
  text: Then Jesus called his disciples to him and said, “I have compassion on the
    crowd, because they have already remained with me three days and have nothing
    to eat. And I do not want to send them away hungry, lest they collapse on the
    way.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am moved with compassion for the crowd.”
    reason: lexical_alternative
  - marker: b
    text: Or “they have already stayed with me for three days.”
    reason: lexical_alternative
  - marker: c
    text: νήστεις is literally “fasting” or “without food,” here meaning they have
      gone unfed rather than that they are engaged in a religious fast.
    reason: lexical_alternative
  - marker: d
    text: Or “lest they faint on the way.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: called ... to him
  alternatives:
  - called together
  - summoned
  lexicon: BDAG
  rationale: The middle participle indicates Jesus calling his disciples to himself.
    'Called ... to him' is natural English and preserves the directional nuance better
    than a bare 'called'.
- source_word: Σπλαγχνίζομαι
  chosen: I have compassion
  alternatives:
  - I feel compassion
  - I am moved with compassion
  lexicon: BDAG
  rationale: The verb expresses deep compassion. 'I have compassion' is clear modern
    English and avoids slightly archaic idiom while preserving the emotional force.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: '''Crowd'' is the most natural contemporary rendering for ὄχλος in narrative
    context.'
- source_word: ἤδη ἡμέραι τρεῖς προσμένουσίν μοι
  chosen: they have already remained with me three days
  alternatives:
  - they have already been with me three days
  - they have already stayed with me for three days
  lexicon: BDAG
  rationale: προσμένω means to remain/stay on with someone. This rendering preserves
    the sense of continued presence with Jesus; 'for' is omitted because the Greek
    construction can be represented idiomatically as duration accusative-like English
    without loss.
- source_word: τί φάγωσιν
  chosen: nothing to eat
  alternatives:
  - nothing they may eat
  - nothing to eat with
  lexicon: BDAG
  rationale: The idiom οὐκ ἔχουσιν τί φάγωσιν means they lack food. 'Nothing to eat'
    is the natural English equivalent.
- source_word: ἀπολῦσαι
  chosen: to send ... away
  alternatives:
  - to dismiss
  - to release
  lexicon: BDAG
  rationale: In this context of dispersing a gathered crowd, 'send away' best fits
    the narrative sense.
- source_word: νήστεις
  chosen: hungry
  alternatives:
  - fasting
  - without food
  lexicon: BDAG
  rationale: Though literally 'fasting' or 'unfed,' the sense here is not voluntary
    religious fasting but being without food. 'Hungry' communicates the intended meaning
    clearly.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that they may not
  - otherwise
  lexicon: BDAG
  rationale: '''Lest'' concisely captures the clause of feared result. It remains
    readable in modern English in this context.'
- source_word: ἐκλυθῶσιν
  chosen: they collapse
  alternatives:
  - they faint
  - they give out
  lexicon: BDAG
  rationale: The passive verb here conveys becoming exhausted or faint on the journey.
    'Collapse' communicates the seriousness of the concern without sounding overly
    clinical.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: This is the most idiomatic English rendering in context, referring to
    the journey home.
