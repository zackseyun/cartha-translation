theological_decisions:
- issue: Rendering of κύριε in a context of messianic address
  chosen_reading: Lord
  alternative_readings:
  - sir
  - master
  rationale: Because the woman addresses Jesus as 'Son of David,' the title likely
    carries more than mere politeness. Rendering κύριε as 'Lord' preserves both the
    lexical default in DOCTRINE.md and the possible reverential/messianic force without
    overstating a fully developed confession.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δαιμονίζεται
  chosen_reading: demon-possessed
  alternative_readings:
  - oppressed by a demon
  - tormented by a demon
  rationale: The text clearly attributes the daughter's condition to demonic agency,
    but English renderings differ in how strongly they specify possession. 'Demon-possessed'
    remains the clearest conventional rendering; an alternative is preserved in a
    footnote to avoid implying more precision than the Greek verb itself may demand.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
