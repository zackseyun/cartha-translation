id: MAT.15.22
reference: Matthew 15:22
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ γυνὴ Χαναναία ἀπὸ τῶν ὁρίων ἐκείνων ἐξελθοῦσα ⸀ἔκραζεν λέγουσα· Ἐλέησόν
    με, κύριε ⸀υἱὸς Δαυίδ· ἡ θυγάτηρ μου κακῶς δαιμονίζεται.
translation:
  text: And behold, a Canaanite woman from those regions came out and was crying out,
    saying, “Have mercy on me, Lord, Son of David; my daughter is badly demon-possessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “is severely oppressed by a demon” / “is tormented by a demon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marker force and vividness of the narrative interruption.
    Though somewhat marked in modern English, it remains readable and signals Matthew's
    attention-directing particle better than omitting it.
- source_word: Χαναναία
  chosen: Canaanite
  alternatives:
  - Syrophoenician
  lexicon: BDAG
  rationale: Matthew explicitly uses 'Canaanite,' evoking Israel's historical memory
    and preserving his wording; 'Syrophoenician' belongs to Mark's parallel, not this
    text.
- source_word: ἀπὸ τῶν ὁρίων ἐκείνων
  chosen: from those regions
  alternatives:
  - from those districts
  - from that territory
  lexicon: BDAG
  rationale: ὅρια here refers to regional boundaries/territory. 'From those regions'
    is natural English and preserves the plural sense without awkward literalism.
- source_word: ἐξελθοῦσα
  chosen: came out
  alternatives:
  - went out
  - having come out
  lexicon: BDAG
  rationale: Aorist participle is rendered with a natural English finite verb in sequence
    with the main verb. 'Came out' fits the narrative perspective and avoids overly
    wooden participial English.
- source_word: ἔκραζεν
  chosen: was crying out
  alternatives:
  - cried out
  - kept crying out
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or repeated action. 'Was crying out' preserves
    that imperfective force better than a simple past.
- source_word: Ἐλέησόν με
  chosen: Have mercy on me
  alternatives:
  - Show me mercy
  - Pity me
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the aorist imperative of ἐλεάω, preserving
    both urgency and the biblical mercy vocabulary.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this messianic appeal
    joined with 'Son of David,' the elevated title is contextually appropriate rather
    than the more generic 'sir'.
- source_word: υἱὸς Δαυίδ
  chosen: Son of David
  lexicon: BDAG
  rationale: This is a recognized messianic title and should be translated literally
    to preserve its royal-Davidic significance.
- source_word: κακῶς
  chosen: badly
  alternatives:
  - severely
  - terribly
  lexicon: BDAG
  rationale: κακῶς intensifies the daughter's condition. 'Badly' is direct and natural;
    'severely' is possible but slightly more clinical.
- source_word: δαιμονίζεται
  chosen: is demon-possessed
  alternatives:
  - is oppressed by a demon
  - is tormented by a demon
  lexicon: BDAG
  rationale: The verb denotes being under demonic influence/possession. 'Demon-possessed'
    is the most established concise rendering in English, though alternatives are
    worth preserving because the exact phenomenology is debated.
