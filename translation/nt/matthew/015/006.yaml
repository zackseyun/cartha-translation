theological_decisions:
- issue: Whether to make explicit that 'honor' includes financial support to parents
  chosen_reading: Keep 'honor' in the main text without expanding to 'support,' allowing
    the contextual implication to stand.
  alternative_readings:
  - Render as 'support' or 'care for' to foreground the practical sense in this dispute.
  rationale: The verse alludes to the commandment to honor parents, and Jesus' argument
    concerns material obligations. Still, the Greek verb is τιμάω, not a narrower
    verb for financial support. Preserving 'honor' maintains the scriptural wording
    and avoids over-specification while remaining faithful to the context.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether to harmonize this verse to parallels or contextual summaries
  chosen_reading: Translate the singular 'his father' and 'word of God' as printed
    in the SBLGNT text.
  alternative_readings:
  - Expand to 'father or mother' from the broader context
  - translate 'commandment of God' from a textual variant or harmonization
  rationale: Original-language primacy requires following the given Greek text rather
    than smoothing it toward nearby verses or familiar traditional forms. Any notable
    alternative should be preserved in a footnote rather than imported into the main
    text.
  doctrine_reference: Translation philosophy §§1, 3, 5
