id: MAT.15.6
reference: Matthew 15:6
source:
  edition: SBLGNT
  text: ⸀οὐ μὴ ⸀τιμήσει τὸν πατέρα ⸀αὐτοῦ· καὶ ἠκυρώσατε ⸂τὸν λόγον⸃ τοῦ θεοῦ διὰ
    τὴν παράδοσιν ὑμῶν.
translation:
  text: he certainly need not honor his father. So you have nullified the word of
    God because of your tradition.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the commandment of God' instead of 'the word of God.'
    reason: textual_variant
  - marker: b
    text: '''Honor'' here likely includes the practical duty of providing for one''s
      parents, not merely showing respect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ
  chosen: certainly need not
  alternatives:
  - shall certainly not
  - will surely not
  - does not have to
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή intensifies the denial. In this context,
    following the quoted traditional ruling, the sense is permissive/obviating obligation
    ('need not') rather than merely predictive future. 'Certainly' preserves the force
    of the double negative.
- source_word: τιμήσει
  chosen: honor
  alternatives:
  - show honor to
  - support
  lexicon: BDAG
  rationale: τιμάω commonly means 'honor.' In the immediate context of caring for
    parents, the term can imply material support, but 'honor' best preserves the lexical
    link to the commandment while allowing the practical implication to remain implicit.
- source_word: πατέρα αὐτοῦ
  chosen: his father
  alternatives:
  - his father and mother
  - his parent
  lexicon: BDAG
  rationale: The Greek text here explicitly has the singular 'his father.' Although
    the broader context includes father or mother, this clause as transmitted names
    only the father, so the translation should not expand it.
- source_word: ἠκυρώσατε
  chosen: have nullified
  alternatives:
  - have invalidated
  - have made void
  - have canceled
  lexicon: BDAG
  rationale: ἀκυρόω means to invalidate or make void. 'Have nullified' is clear modern
    English and preserves the strong charge that their tradition renders God's word
    ineffective.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - the command of God
  lexicon: BDAG
  rationale: The SBLGNT reading is λόγον ('word'), not ἐντολήν ('commandment'). The
    translation follows the printed text directly. 'Word of God' is the natural rendering,
    while 'command of God' is preserved as a textual alternative in a footnote because
    of the well-known variant and the immediate context of commandment.
- source_word: διὰ τὴν παράδοσιν ὑμῶν
  chosen: because of your tradition
  alternatives:
  - for the sake of your tradition
  - by your tradition
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause or reason. 'Because
    of your tradition' communicates that their inherited teaching is the reason God's
    word is being nullified. 'Tradition' is the standard rendering of παράδοσις here.
