theological_decisions:
- issue: Force of Jesus' address to the Pharisees and scribes
  chosen_reading: 'A direct condemnatory vocative: ''Hypocrites'''
  alternative_readings:
  - A softened rebuke such as 'pretenders'
  rationale: The Greek ὑποκριταί is a strong moral-religious accusation in context.
    Softening it would undertranslate Jesus' judgment and weaken the connection to
    the ensuing citation from Isaiah.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English without flattening theological weight.'
