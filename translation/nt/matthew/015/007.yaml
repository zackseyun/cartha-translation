id: MAT.15.7
reference: Matthew 15:7
source:
  edition: SBLGNT
  text: ὑποκριταί, καλῶς ἐπροφήτευσεν περὶ ὑμῶν Ἠσαΐας λέγων·
translation:
  text: 'Hypocrites, Isaiah rightly prophesied about you, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well prophesied about you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριταί
  chosen: Hypocrites
  alternatives:
  - You hypocrites
  lexicon: BDAG
  rationale: Vocative plural noun used as a direct address. 'Hypocrites' preserves
    the force and terseness of Jesus' rebuke. 'You hypocrites' is possible in English
    for explicit address, but the bare vocative better matches the Greek form and
    rhetorical sharpness.
- source_word: καλῶς
  chosen: rightly
  alternatives:
  - well
  - accurately
  lexicon: BDAG
  rationale: Adverb modifying ἐπροφήτευσεν. 'Rightly' conveys that Isaiah's prophecy
    was fitting/true with respect to the audience, in natural modern English. 'Well'
    is more literal but can sound stylistically flat or ambiguous in contemporary
    English.
- source_word: ἐπροφήτευσεν
  chosen: prophesied
  alternatives:
  - spoke prophetically
  lexicon: BDAG
  rationale: Aorist active indicative of προφητεύω. 'Prophesied' is the standard and
    most direct rendering, preserving the prophetic register and connection to Isaiah
    as prophet.
- source_word: περὶ ὑμῶν
  chosen: about you
  alternatives:
  - concerning you
  - of you
  lexicon: BDAG
  rationale: περί with genitive commonly means 'about/concerning.' 'About you' is
    the most natural modern English equivalent while preserving the referential force.
- source_word: Ἠσαΐας
  chosen: Isaiah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name, in keeping with
    the philosophy of transliterating personal names by standard conventions.
- source_word: λέγων
  chosen: 'saying:'
  alternatives:
  - 'when he said:'
  lexicon: BDAG
  rationale: Present participle introducing the quotation that follows. 'Saying:'
    is concise, idiomatic, and preserves the quotation-introducing function of the
    participle.
