id: MAT.15.16
reference: Matthew 15:16
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ εἶπεν· Ἀκμὴν καὶ ὑμεῖς ἀσύνετοί ἐστε;
translation:
  text: But he said, “Even now, are you also still without understanding?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Are you also still without understanding?”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition from the disciples' question
    to Jesus' reply. 'But' best captures the responsive turn in natural English.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - said
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in the aorist. The explicit subject
    is supplied from context and the article ὁ functioning pronominally.
- source_word: ὁ
  chosen: he
  alternatives:
  - the one
  lexicon: BDAG
  rationale: The nominative article functions substantivally/pronominally, referring
    back to Jesus. English requires an explicit pronoun rather than a literal 'the
    one' in this context.
- source_word: Ἀκμὴν
  chosen: Even now
  alternatives:
  - still now
  - already
  - at this point
  lexicon: BDAG
  rationale: ἀκμήν is an adverb meaning 'still, even now, up to this point.' In this
    rebuke, 'Even now' conveys the sense that despite prior instruction they remain
    lacking understanding.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: 'καί intensifies the address to the disciples: they too are included
    in the rebuke. ''Also'' preserves that force in idiomatic English.'
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis. English can convey this adequately
    with 'you' in the interrogative, especially alongside 'also' and 'still'.
- source_word: ἀσύνετοί
  chosen: without understanding
  alternatives:
  - uncomprehending
  - foolish
  - dull
  lexicon: BDAG
  rationale: ἀσύνετος denotes lacking understanding or insight. 'Without understanding'
    is clear modern English and avoids overstating the term as moral 'foolishness'
    where the context is intellectual/spiritual dullness.
- source_word: ἐστε
  chosen: are
  alternatives:
  - remain
  lexicon: BDAG
  rationale: Present indicative of εἰμί in a direct question. 'Are' is the straightforward
    rendering; the sense of persistence is already carried by Ἀκμήν.
