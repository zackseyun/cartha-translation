theological_decisions:
- issue: Tone of Jesus' rebuke to the disciples
  chosen_reading: Render as a pointed question about continued lack of understanding
    without heightening it into harsher condemnation.
  alternative_readings:
  - Are you still so dull?
  - Are you also yet without understanding?
  rationale: The Greek is rebuking but not maximally severe. The translation preserves
    the tension of Jesus' frustration while using accessible modern English and avoiding
    paraphrastic exaggeration.
  doctrine_reference: Translation philosophy §§3, 6
