theological_decisions:
- issue: Rendering of σκανδαλίζω in a non-soteriological interpersonal context
  chosen_reading: were offended
  alternative_readings:
  - took offense
  - were caused to stumble
  rationale: The context is the Pharisees' negative reaction to Jesus' teaching, not
    a doctrinal statement about apostasy or moral stumbling. 'Were offended' preserves
    the immediate sense without importing theological conclusions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
