id: MAT.15.12
reference: Matthew 15:12
source:
  edition: SBLGNT
  text: Τότε προσελθόντες οἱ ⸀μαθηταὶ ⸀λέγουσιν αὐτῷ· Οἶδας ὅτι οἱ Φαρισαῖοι ἀκούσαντες
    τὸν λόγον ἐσκανδαλίσθησαν;
translation:
  text: Then the disciples came and said to him, “Do you know that the Pharisees were
    offended when they heard this word?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “took offense”; more literally, “were caused to stumble.”
    reason: lexical_alternative
  - marker: b
    text: “This word” refers to Jesus’ preceding statement.
    reason: cross_reference
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb introducing the next event in sequence; 'Then' is the
    natural narrative connector in English.
- source_word: προσελθόντες
  chosen: came
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, paired with the finite verb λέγουσιν.
    In English, 'came and said' is a natural compression of the participial construction
    without losing meaning.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: Definite plural noun referring to Jesus' disciples. 'The disciples' is
    sufficient and matches the Greek, which does not explicitly include 'his'.
- source_word: λέγουσιν αὐτῷ
  chosen: said to him
  alternatives:
  - were saying to him
  - tell him
  lexicon: BDAG
  rationale: Historical present λέγουσιν is commonly rendered with simple past in
    English narrative for readability. 'Said to him' preserves the speech introduction.
- source_word: Οἶδας
  chosen: Do you know
  alternatives:
  - Do you realize
  - You know
  lexicon: BDAG
  rationale: Direct question using οἶδα. 'Do you know' is the most straightforward
    rendering; 'realize' is possible but slightly more interpretive.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: ἀκούσαντες τὸν λόγον
  chosen: when they heard this word
  alternatives:
  - when they heard this statement
  - when they heard what you said
  lexicon: BDAG
  rationale: Aorist participle with object λόγον. 'Word' is a formally close rendering
    of λόγος here, and 'this word' naturally refers to Jesus' preceding saying. Alternatives
    like 'statement' or 'what you said' are possible but slightly more interpretive.
- source_word: ἐσκανδαλίσθησαν
  chosen: were offended
  alternatives:
  - took offense
  - were caused to stumble
  lexicon: BDAG
  rationale: Passive of σκανδαλίζω here refers to being offended or scandalized by
    Jesus' saying. 'Were offended' is idiomatic and fits the context; 'caused to stumble'
    is more literal but less natural in this discourse setting.
