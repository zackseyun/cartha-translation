id: MAT.15.10
reference: Matthew 15:10
source:
  edition: SBLGNT
  text: Καὶ προσκαλεσάμενος τὸν ὄχλον εἶπεν αὐτοῖς· Ἀκούετε καὶ συνίετε·
translation:
  text: And after calling the crowd to him, he said to them, “Listen and understand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Hear and understand.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: after calling ... to him
  alternatives:
  - having called
  - summoning
  lexicon: BDAG
  rationale: Aorist middle participle preceding the main verb, naturally rendered
    as an antecedent action in English. 'After calling' is idiomatic and preserves
    the sequence; 'to him' reflects the directional force of προσκαλέομαι.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a gathered crowd. 'The crowd' is clear modern
    English and fits the narrative setting better than the more archaic 'multitude.'
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with indirect object αὐτοῖς. 'Said
    to them' is slightly more formal and closer to the Greek than 'told them.'
- source_word: Ἀκούετε
  chosen: Listen
  alternatives:
  - Hear
  - Keep listening
  lexicon: BDAG
  rationale: Present active imperative plural. 'Listen' communicates the imperative
    force in natural English. 'Hear' is possible but less idiomatic in contemporary
    usage; the present aspect does not require an explicitly progressive rendering
    here.
- source_word: συνίετε
  chosen: understand
  alternatives:
  - perceive
  - comprehend
  lexicon: BDAG
  rationale: συνίημι here calls for grasping the meaning of what is heard, not merely
    auditory reception. 'Understand' pairs naturally with 'Listen' and preserves the
    distinction between hearing and comprehending.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: The connective simply advances the narrative. 'And' preserves the Greek
    coordination without adding interpretive nuance.
