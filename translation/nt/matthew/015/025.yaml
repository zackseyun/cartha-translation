theological_decisions:
- issue: Rendering of προσκυνέω toward Jesus
  chosen_reading: knelt before him
  alternative_readings:
  - worshiped him
  - bowed down before him
  rationale: The verb can indicate either an act of reverence/homage or worship. To
    preserve theological tension rather than resolve beyond the immediate scene, the
    main text uses 'knelt before him,' which clearly reflects the embodied act, while
    a footnote preserves 'worshiped him' as a legitimate alternative in this Matthean
    context.
  doctrine_reference: Translation philosophy §3; Contested terms table for κύριος
    supports 'Lord' but προσκυνέω itself is context-sensitive.
