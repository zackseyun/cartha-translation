id: MAT.15.25
reference: Matthew 15:25
source:
  edition: SBLGNT
  text: ἡ δὲ ἐλθοῦσα ⸀προσεκύνει αὐτῷ λέγουσα· Κύριε, βοήθει μοι.
translation:
  text: But she came and knelt before him, saying, “Lord, help me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “worshiped him.” The Greek verb can denote bowing in reverence, paying
      homage, or worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding exchange;
    'But' best conveys the adversative turn as the woman persists.
- source_word: ἐλθοῦσα
  chosen: she came
  alternatives:
  - having come
  - coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι is rendered naturally in English as a finite
    verb coordinated with the main action. 'She came' preserves the movement toward
    Jesus without awkwardness.
- source_word: προσεκύνει
  chosen: knelt before him
  alternatives:
  - worshiped him
  - bowed down before him
  - prostrated herself before him
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration, homage, or worship depending on context.
    Here the immediate scene is a desperate petition to Jesus; 'knelt before him'
    preserves the bodily act of reverence without over-specifying the woman's theological
    understanding. The stronger alternative 'worshiped him' is preserved in a footnote
    because it is a viable rendering in Matthew.
- source_word: αὐτῷ
  chosen: before him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: With προσκυνέω, the dative marks the one before whom homage is made.
    English idiom prefers 'before him' with 'knelt' rather than the more wooden 'to
    him'.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle introduces her direct speech and is naturally rendered
    'saying' in English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this Gospel context
    it functions as a respectful and weighty address to Jesus; 'Sir' is possible but
    too weak here.
- source_word: βοήθει μοι
  chosen: help me
  alternatives:
  - come to my aid
  - assist me
  lexicon: BDAG
  rationale: The present imperative expresses an urgent plea. 'Help me' is the most
    direct and natural equivalent, preserving the brevity and desperation of the request.
