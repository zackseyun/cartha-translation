id: MAT.15.39
reference: Matthew 15:39
source:
  edition: SBLGNT
  text: καὶ ἀπολύσας τοὺς ὄχλους ἐνέβη εἰς τὸ πλοῖον, καὶ ἦλθεν εἰς τὰ ὅρια ⸀Μαγαδάν.
translation:
  text: And after dismissing the crowds, he got into the boat and came to the region
    of Magadan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Magdala' instead of 'Magadan.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀπολύσας
  chosen: after dismissing
  alternatives:
  - having dismissed
  - sending away
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered as antecedent
    action in English. 'Dismissing' fits the context of sending the crowds away without
    adding nuance beyond the Greek.
- source_word: ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  lexicon: BDAG
  rationale: '''Crowds'' is clear modern English and accurately reflects plural ὄχλους.
    ''Multitudes'' is traditional but less natural for contemporary readers.'
- source_word: ἐνέβη εἰς τὸ πλοῖον
  chosen: he got into the boat
  alternatives:
  - he boarded the boat
  - he entered the boat
  lexicon: BDAG
  rationale: This idiom refers to embarking by boat. 'Got into the boat' is natural
    English and preserves the concrete action.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: The Greek uses ἔρχομαι, whose default sense is 'come.' In narrative travel
    contexts English sometimes prefers 'went,' but 'came' is a straightforward rendering
    and does not distort the sense.
- source_word: τὰ ὅρια
  chosen: the region
  alternatives:
  - the borders
  - the district
  - the territory
  lexicon: BDAG
  rationale: Plural 'boundaries/borders' often functions idiomatically for a geographical
    area or district. 'Region' communicates the sense idiomatically in English without
    woodenly suggesting only borderlines.
- source_word: Μαγαδάν
  chosen: Magadan
  alternatives:
  - Magdala
  lexicon: BDAG
  rationale: The SBLGNT text reads Μαγαδάν, so the main text follows the printed Greek
    by transliterating the place name. Because 'Magdala' is a well-known variant/traditional
    reading, it is preserved in a footnote rather than adopted in the main text.
