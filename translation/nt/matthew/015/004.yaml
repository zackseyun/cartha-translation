id: MAT.15.4
reference: Matthew 15:4
source:
  edition: SBLGNT
  text: ὁ γὰρ θεὸς ⸀εἶπεν· Τίμα τὸν πατέρα καὶ τὴν μητέρα, καί· Ὁ κακολογῶν πατέρα
    ἢ μητέρα θανάτῳ τελευτάτω·
translation:
  text: For God said, ‘Honor your father and your mother,’ and, ‘Whoever speaks evil
    of father or mother must surely die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Whoever curses father or mother must be put to death.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ γὰρ θεὸς
  chosen: For God
  alternatives:
  - For God himself
  - Because God
  lexicon: BDAG
  rationale: γάρ introduces the explanation for Jesus' argument; 'For God' is natural
    English and preserves the causal force without overemphasis.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - commanded
  - spoke
  lexicon: BDAG
  rationale: λέγω here introduces scriptural citation. 'Said' is the plain lexical
    sense and avoids importing the stronger nuance 'commanded,' even though the content
    is imperative.
- source_word: Τίμα
  chosen: Honor
  alternatives:
  - Respect
  - Show honor to
  lexicon: BDAG
  rationale: τιμάω in this commandment carries the sense of giving due honor. 'Honor'
    preserves the established ethical weight better than the weaker 'respect'.
- source_word: τὸν πατέρα καὶ τὴν μητέρα
  chosen: your father and your mother
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: English idiom in citation of the commandment normally includes 'your,'
    which is implicit from the Exodus wording being quoted. This makes the command
    read naturally without changing the sense.
- source_word: Ὁ κακολογῶν
  chosen: Whoever speaks evil of
  alternatives:
  - The one who curses
  - Whoever reviles
  - Whoever insults
  lexicon: BDAG
  rationale: κακολογέω denotes speaking evil against, reviling, or cursing. 'Speaks
    evil of' is broad enough to reflect the lexical range while remaining clear in
    modern English. 'Whoever' renders the substantival participle idiomatically.
- source_word: πατέρα ἢ μητέρα
  chosen: father or mother
  alternatives:
  - his father or mother
  lexicon: BDAG
  rationale: The anarthrous objects are generic. 'Father or mother' is concise and
    idiomatic; adding 'his' would be interpretive and unnecessary.
- source_word: θανάτῳ τελευτάτω
  chosen: must surely die
  alternatives:
  - must be put to death
  - let him end in death
  lexicon: BDAG
  rationale: The dative noun with the imperative verb forms a solemn death-penalty
    formula. 'Must surely die' closely reflects the Semitic-scriptural idiom echoed
    in Greek and matches the citation's legal gravity. 'Must be put to death' is possible,
    but the Greek wording here is slightly less explicit about agency than verbs meaning
    'execute'.
