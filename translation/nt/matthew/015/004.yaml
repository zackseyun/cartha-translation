theological_decisions:
- issue: Rendering of the legal penalty formula in the quotation from the commandment
    tradition
  chosen_reading: must surely die
  alternative_readings:
  - must be put to death
  rationale: The verse cites scriptural law and should preserve its severity without
    overstating the grammatical explicitness of human agency. 'Must surely die' reflects
    the traditional legal formula and the Greek expression θανάτῳ τελευτάτω well.
  doctrine_reference: Translation philosophy §1, §3, §6
