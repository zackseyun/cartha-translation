id: MAT.15.15
reference: Matthew 15:15
source:
  edition: SBLGNT
  text: Ἀποκριθεὶς δὲ ὁ Πέτρος εἶπεν αὐτῷ· Φράσον ἡμῖν τὴν παραβολὴν ⸀ταύτην.
translation:
  text: But Peter answered and said to him, “Explain this parable to us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tell us this parable” or “Make this parable clear to us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι commonly functions deponently
    as 'answering/answered.' In English, 'answered' is natural and preserves the discourse
    sense without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best reflects the transition
    here, as Peter responds after Jesus' prior statement and the disciples' concern.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative. Combined with Ἀποκριθεὶς, the
    idiom 'answered and said' is retained because it reflects the Greek structure
    and remains acceptable English in biblical narrative.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech; 'to him' is
    the straightforward rendering.
- source_word: Φράσον
  chosen: Explain
  alternatives:
  - tell
  - make clear
  - interpret
  lexicon: BDAG
  rationale: Aorist imperative of φράζω means to make known, explain, or clarify.
    'Explain' best fits the request for understanding Jesus' figurative saying.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative pronoun naturally rendered 'to us' with a verb of explanation.
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - figure
  - illustration
  lexicon: BDAG
  rationale: παραβολή is regularly rendered 'parable' in the Gospels. Although the
    saying may function more broadly as a figurative statement, 'parable' preserves
    the Gospel terminology.
- source_word: ταύτην
  chosen: this
  alternatives:
  - that
  lexicon: BDAG
  rationale: The near demonstrative points to the immediately preceding saying; 'this'
    is the natural English equivalent.
- source_word: ὁ Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Personal name is transliterated per translation philosophy.
