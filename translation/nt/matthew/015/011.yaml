theological_decisions:
- issue: Purity language in κοινόω
  chosen_reading: Render with 'defiles' to preserve both ritual and moral impurity
    resonance without narrowing the saying to ceremonial uncleanness alone.
  alternative_readings:
  - makes unclean
  - pollutes
  rationale: Jesus' statement addresses debates about purity and what truly renders
    a person unclean before God. 'Defiles' preserves the theological breadth of the
    saying in context and avoids reducing it either to mere ritual status or to modern
    hygienic notions.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Generic masculine ἄνθρωπον
  chosen_reading: Retain 'the man' in the main text, with inclusive force noted in
    a footnote.
  alternative_readings:
  - the person
  - a person
  rationale: The Greek is grammatically masculine singular with representative force.
    The project's policy prefers gender-accurate rendering over flattening to gender-neutral
    English, while allowing annotation where inclusivity is contextually relevant.
  doctrine_reference: Translation philosophy §4
