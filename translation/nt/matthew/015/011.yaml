id: MAT.15.11
reference: Matthew 15:11
source:
  edition: SBLGNT
  text: οὐ τὸ εἰσερχόμενον εἰς τὸ στόμα κοινοῖ τὸν ἄνθρωπον, ἀλλὰ τὸ ἐκπορευόμενον
    ἐκ τοῦ στόματος τοῦτο κοινοῖ τὸν ἄνθρωπον.
translation:
  text: It is not what enters into the mouth that defiles the man, but what comes
    out of the mouth—this defiles the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'makes the person unclean.' The Greek verb can denote rendering someone
      unclean/defiled in a purity sense.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' here has representative force, referring generically to a human
      being.'
    reason: cultural_note
lexical_decisions:
- source_word: κοινοῖ
  chosen: defiles
  alternatives:
  - makes unclean
  - pollutes
  lexicon: BDAG
  rationale: In this purity-context, κοινόω refers to rendering someone ritually/commonly
    unclean rather than merely dirty. 'Defiles' is established, natural English that
    preserves the moral-ritual force better than the more awkward 'makes unclean.'
- source_word: τὸ εἰσερχόμενον εἰς τὸ στόμα
  chosen: what enters into the mouth
  alternatives:
  - the thing entering into the mouth
  - what goes into the mouth
  lexicon: BDAG
  rationale: The articular participle is substantival and best rendered idiomatically
    as 'what enters.' Retaining 'into' reflects εἰς and preserves the concrete imagery
    without sounding wooden.
- source_word: τὸ ἐκπορευόμενον ἐκ τοῦ στόματος
  chosen: what comes out of the mouth
  alternatives:
  - the thing proceeding out of the mouth
  - what goes out from the mouth
  lexicon: BDAG
  rationale: The substantival participle is again idiomatically rendered with 'what.'
    'Comes out' is readable modern English and captures ἐκπορευόμενον/ἐκ without unnecessary
    archaism such as 'proceeds.'
- source_word: ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  - a man
  - humanity
  lexicon: BDAG
  rationale: Per the project's gender-accurate philosophy, the masculine singular
    representative term is retained as 'the man.' In context it functions generically
    for a human being, but the source uses masculine singular rather than a gender-neutral
    form.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'The demonstrative adds emphasis to the second clause; rendering it explicitly
    as ''this'' preserves the Greek focus: this, rather than ingested food, is what
    defiles.'
- source_word: οὐ ... ἀλλὰ
  chosen: It is not ... but ...
  alternatives:
  - Not ... but ...
  lexicon: BDAG
  rationale: The correlative negation-contrast structure is brought into natural English
    with 'It is not ... but ...,' preserving the antithesis clearly.
