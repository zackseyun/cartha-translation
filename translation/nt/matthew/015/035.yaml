id: MAT.15.35
reference: Matthew 15:35
source:
  edition: SBLGNT
  text: καὶ ⸀παραγγείλας ⸂τῷ ὄχλῳ⸃ ἀναπεσεῖν ἐπὶ τὴν γῆν
translation:
  text: And after instructing the crowd to recline on the ground,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to sit down on the ground.' The Greek verb can denote taking one's place
      for a meal, often with the nuance of reclining.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective introducing the next action in the narrative; simple
    coordination is sufficient.
- source_word: παραγγείλας
  chosen: after instructing
  alternatives:
  - having commanded
  - after ordering
  - having directed
  lexicon: BDAG
  rationale: Aorist active participle, nominative singular masculine, modifying Jesus
    implicitly from context. 'After instructing' captures the participial action as
    antecedent to the main verb in the following verse and avoids overly harsh English
    while preserving directive force.
- source_word: τῷ ὄχλῳ
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: Dative indirect object of παραγγείλας. 'Crowd' is natural modern English
    and fits the narrative setting.
- source_word: ἀναπεσεῖν
  chosen: to recline
  alternatives:
  - to sit down
  - to lie down
  lexicon: BDAG
  rationale: The infinitive refers to taking a reclining or seated-at-meal posture.
    'Recline' preserves the more precise sense better than the traditional but less
    exact 'sit down,' especially in a feeding context.
- source_word: ἐπὶ τὴν γῆν
  chosen: on the ground
  alternatives:
  - on the earth
  - on the land
  lexicon: BDAG
  rationale: In this context γῆ refers to the surface of the ground where the crowd
    would recline, not the earth in a global sense. 'On the ground' is the clearest
    idiomatic rendering.
