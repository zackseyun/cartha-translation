id: MAT.15.8
reference: Matthew 15:8
source:
  edition: SBLGNT
  text: ⸂Ὁ λαὸς οὗτος⸃ τοῖς χείλεσίν με τιμᾷ, ἡ δὲ καρδία αὐτῶν πόρρω ἀπέχει ἀπ’ ἐμοῦ·
translation:
  text: This people honors me with their lips, but their heart is far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hearts.' The Greek has singular 'heart,' likely used collectively
      for the people as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ λαὸς οὗτος
  chosen: This people
  alternatives:
  - This people here
  - This crowd
  lexicon: BDAG
  rationale: λαός commonly means 'people' as a collective group. 'This people' preserves
    the demonstrative force of οὗτος and echoes the prophetic citation background
    without adding interpretive nuance such as 'crowd.'
- source_word: τοῖς χείλεσίν
  chosen: with their lips
  alternatives:
  - with the lips
  - by their lips
  lexicon: BDAG
  rationale: The dative is instrumental here. 'With their lips' is idiomatic English
    and preserves the concrete bodily imagery of χείλη rather than abstracting to
    'words' or 'speech.' 'Their' is supplied naturally from the plural possessive
    sense in context.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of τιμᾷ; straightforwardly rendered 'me.'
- source_word: τιμᾷ
  chosen: honors
  alternatives:
  - honours
  - glorifies
  lexicon: BDAG
  rationale: τιμάω here denotes showing honor. 'Honors' is the standard modern American
    spelling and best matches the sense without overstating to 'glorifies.'
- source_word: ἡ δὲ καρδία αὐτῶν
  chosen: but their heart
  alternatives:
  - but their hearts
  - yet their heart
  lexicon: BDAG
  rationale: The Greek has singular καρδία, likely a collective singular referring
    to the inner disposition of the people as a whole. 'Their heart' preserves the
    singular form and the corporate sense better than smoothing to 'their hearts.'
    δέ is adversative here, well rendered 'but.'
- source_word: πόρρω
  chosen: far
  alternatives:
  - far away
  - distant
  lexicon: BDAG
  rationale: πόρρω expresses distance. 'Far' is concise and natural in English, especially
    with 'from me' following.
- source_word: ἀπέχει ἀπ’ ἐμοῦ
  chosen: is far from me
  alternatives:
  - stands far from me
  - keeps away from me
  lexicon: BDAG
  rationale: ἀπέχω with ἀπό expresses being at a distance from someone. 'Is far from
    me' is the most natural English rendering and captures the relational separation
    in context.
