theological_decisions:
- issue: Corporate singular 'heart' versus distributive plural
  chosen_reading: 'Retain singular: ''their heart'''
  alternative_readings:
  - their hearts
  rationale: The singular καρδία in Greek likely presents the people as a unified
    body with one inward disposition. Preserving the singular maintains the rhetorical
    force of the prophetic quotation and avoids unnecessary interpretive smoothing.
