id: MAT.15.26
reference: Matthew 15:26
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Οὐκ ἔστιν καλὸν λαβεῖν τὸν ἄρτον τῶν τέκνων καὶ βαλεῖν
    τοῖς κυναρίοις.
translation:
  text: But he answered, “It is not right to take the children's bread and throw it
    to the little dogs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'house dogs' or 'puppies'; the Greek uses a diminutive form, suggesting
      small or household dogs rather than street dogs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: he answered
  alternatives:
  - he replied
  - answering, he said
  lexicon: BDAG
  rationale: This participle + finite verb is a common Semitic-influenced Greek expression.
    English normally compresses it to 'he answered' for naturalness while preserving
    the responsive force.
- source_word: καλὸν
  chosen: right
  alternatives:
  - good
  - proper
  - fitting
  lexicon: BDAG
  rationale: In this idiom, καλόν expresses propriety or appropriateness rather than
    moral goodness alone. 'Right' communicates the sense idiomatically in modern English.
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to receive
  lexicon: BDAG
  rationale: The infinitive here denotes taking away or taking in hand; 'to take'
    is the plain contextual sense.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - loaf
  - food
  lexicon: BDAG
  rationale: '''Bread'' is the direct lexical equivalent and preserves the metaphorical
    image in the saying.'
- source_word: τέκνων
  chosen: children's
  alternatives:
  - sons'
  - offspring's
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically 'sons.' The possessive
    English form keeps the genitive relation natural and accurate.
- source_word: βαλεῖν
  chosen: throw
  alternatives:
  - cast
  - give
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast.' 'Throw' preserves the vividness of
    the image better than the softened 'give.'
- source_word: κυναρίοις
  chosen: little dogs
  alternatives:
  - dogs
  - house dogs
  - puppies
  lexicon: BDAG
  rationale: The diminutive form suggests small or household dogs rather than wild
    scavenger dogs. 'Little dogs' preserves the lexical nuance without becoming overly
    colloquial.
