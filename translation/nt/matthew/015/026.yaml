theological_decisions:
- issue: Rendering the metaphor involving children and dogs in a way that preserves
    the force of Jesus' statement without importing extra interpretation about ethnicity
    or tone.
  chosen_reading: Retain the metaphor directly as 'the children's bread' and 'the
    little dogs' without explanatory expansion in the main text.
  alternative_readings:
  - It is not good to take the children's bread and give it to the dogs
  - It is not proper to take the bread of the children and throw it to the house dogs
  rationale: The verse uses a metaphor whose interpretation is shaped by the surrounding
    context, but the text itself does not explicitly spell out the referents here.
    The translation preserves the image and its tension rather than resolving it interpretively
    in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
