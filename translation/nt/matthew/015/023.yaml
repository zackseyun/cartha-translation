id: MAT.15.23
reference: Matthew 15:23
source:
  edition: SBLGNT
  text: ὁ δὲ οὐκ ἀπεκρίθη αὐτῇ λόγον. καὶ προσελθόντες οἱ μαθηταὶ αὐτοῦ ⸀ἠρώτουν αὐτὸν
    λέγοντες· Ἀπόλυσον αὐτήν, ὅτι κράζει ὄπισθεν ἡμῶν.
translation:
  text: But he did not answer her a word. And his disciples came and kept asking him,
    saying, “Send her away, because she is crying out behind us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dismiss her.' The disciples' words do not make explicit whether they
      mean, 'grant her request and send her away,' or simply, 'send her away from
      us.'
    reason: alternative_reading
  - marker: b
    text: Or 'after us.' The Greek can denote either position ('behind us') or pursuit
      ('after us').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: did not answer
  alternatives:
  - did not reply
  lexicon: BDAG
  rationale: Standard narrative sense of ἀποκρίνομαι in response to a person. 'Answer'
    is natural and slightly more direct in English than 'reply.'
- source_word: αὐτῇ λόγον
  chosen: her a word
  alternatives:
  - her anything
  - a word to her
  lexicon: BDAG
  rationale: The idiom οὐκ ἀπεκρίθη αὐτῇ λόγον is well represented by 'did not answer
    her a word,' preserving the emphatic sense that he gave no response at all.
- source_word: προσελθόντες
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: The participle indicates movement toward Jesus. 'Came' is concise and
    idiomatic in English narrative; 'approached' is possible but slightly stiffer.
- source_word: ἠρώτουν
  chosen: kept asking
  alternatives:
  - were asking
  - begged
  - asked
  lexicon: BDAG
  rationale: The imperfect tense suggests repeated or continued action. 'Kept asking'
    brings out the iterative force better than simple 'asked.' 'Begged' would overstate
    the lexical force of ἐρωτάω.
- source_word: Ἀπόλυσον
  chosen: Send her away
  alternatives:
  - dismiss her
  - release her
  lexicon: BDAG
  rationale: ἀπολύω here means to send someone away or dismiss them. 'Send her away'
    is the most natural contextual rendering in this scene.
- source_word: κράζει
  chosen: is crying out
  alternatives:
  - keeps crying out
  - is shouting
  lexicon: BDAG
  rationale: κράζω denotes loud calling or crying out. The present tense is naturally
    rendered as progressive here. 'Crying out' preserves the intensity without implying
    mere volume as 'shouting' might.
- source_word: ὄπισθεν ἡμῶν
  chosen: behind us
  alternatives:
  - after us
  lexicon: BDAG
  rationale: ὄπισθεν with the genitive can mean spatially 'behind' or in pursuit 'after.'
    'Behind us' is the more literal rendering and fits the immediate scene; the pursuit
    nuance is preserved by context.
