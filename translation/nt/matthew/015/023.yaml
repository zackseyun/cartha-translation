theological_decisions:
- issue: Disciples' intent in Ἀπόλυσον αὐτήν
  chosen_reading: Render neutrally as 'Send her away' without specifying whether they
    wanted Jesus to grant her request or simply dismiss her.
  alternative_readings:
  - '''Grant her request and send her away'''
  - '''Dismiss her because she is bothering us'''
  rationale: The Greek command itself does not explicitly state the manner of sending
    away. The following clause explains their concern that she is crying out behind
    them, but does not settle the interpretive question. To preserve the narrative
    tension, the translation keeps the wording neutral rather than importing an interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
