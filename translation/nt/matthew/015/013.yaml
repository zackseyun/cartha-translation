theological_decisions:
- issue: Metaphorical referent of 'every plant'
  chosen_reading: Retain the metaphor as 'Every plant' without specifying whether
    it refers to teachings, traditions, or people.
  alternative_readings:
  - Every teaching
  - Every tradition
  - Everyone not planted by the Father
  rationale: The Greek leaves the metaphor open in context. To preserve theological
    tension and avoid importing an interpretive conclusion, the translation keeps
    the image rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
