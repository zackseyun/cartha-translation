id: MAT.15.13
reference: Matthew 15:13
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Πᾶσα φυτεία ἣν οὐκ ἐφύτευσεν ὁ πατήρ μου ὁ οὐράνιος
    ἐκριζωθήσεται.
translation:
  text: But he answered and said, “Every plant that my heavenly Father did not plant
    will be uprooted.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Every planting that my heavenly Father did not plant will be rooted
      up.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: This is a common Semitic-influenced narrative formula in Greek. Retaining
    both verbs preserves the source wording without sounding excessively wooden in
    English.
- source_word: Πᾶσα
  chosen: Every
  alternatives:
  - Each
  - All
  lexicon: BDAG
  rationale: The singular distributive sense is best conveyed by 'Every,' matching
    the singular noun that follows.
- source_word: φυτεία
  chosen: plant
  alternatives:
  - planting
  - planted thing
  - growth
  lexicon: BDAG
  rationale: The noun denotes something planted or a planting. 'Plant' is the most
    natural modern English rendering in this metaphorical context. 'Planting' is possible,
    but 'plant' better fits the image of something later being uprooted.
- source_word: ἐφύτευσεν
  chosen: did not plant
  alternatives:
  - did not set out
  - did not establish
  lexicon: BDAG
  rationale: The agricultural metaphor should be preserved directly. 'Plant' matches
    the cognate noun φυτεία and keeps the imagery coherent.
- source_word: ὁ πατήρ μου ὁ οὐράνιος
  chosen: my heavenly Father
  alternatives:
  - my Father in heaven
  - my Father, the heavenly one
  lexicon: BDAG
  rationale: This is idiomatic, concise English that preserves both possession ('my')
    and the adjectival qualifier οὐράνιος. 'My heavenly Father' is natural and faithful.
- source_word: ἐκριζωθήσεται
  chosen: will be uprooted
  alternatives:
  - will be rooted up
  - will be torn up by the roots
  lexicon: BDAG
  rationale: The future passive of ἐκριζόω means to pull up by the roots. 'Will be
    uprooted' is clear modern English and preserves the agricultural/judgment imagery.
