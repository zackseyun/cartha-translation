id: MAT.15.2
reference: Matthew 15:2
source:
  edition: SBLGNT
  text: Διὰ τί οἱ μαθηταί σου παραβαίνουσιν τὴν παράδοσιν τῶν πρεσβυτέρων; οὐ γὰρ
    νίπτονται τὰς χεῖρας ⸀αὐτῶν ὅταν ἄρτον ἐσθίωσιν.
translation:
  text: Why do your disciples break the tradition of the elders? For they do not wash
    their hands when they eat bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the handwashing practice required by the tradition of the elders,
      not merely an issue of ordinary hygiene.
    reason: cultural_note
  - marker: b
    text: Or 'when they eat a meal'; Greek 'bread' can sometimes stand for food more
      generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: BDAG
  rationale: Idiomatic interrogative asking for reason; 'Why' is the natural modern
    English equivalent.
- source_word: παραβαίνουσιν
  chosen: break
  alternatives:
  - transgress
  - violate
  lexicon: BDAG
  rationale: The verb means to go beyond or violate a command/tradition. 'Break' is
    clear modern English and fits both legal and customary contexts without sounding
    overly technical.
- source_word: παράδοσιν
  chosen: tradition
  alternatives:
  - tradition handed down
  - custom
  lexicon: BDAG
  rationale: Refers to received tradition passed down by prior authorities. 'Tradition'
    is the standard and most precise rendering here; 'custom' would understate the
    authoritative force.
- source_word: πρεσβυτέρων
  chosen: the elders
  alternatives:
  - the older men
  - the ancestors
  lexicon: BDAG
  rationale: In this context it refers to recognized Jewish forebears/authorities
    associated with received tradition, not merely older people. 'The elders' is the
    established and contextually accurate rendering.
- source_word: νίπτονται
  chosen: wash
  alternatives:
  - cleanse
  - rinse
  lexicon: BDAG
  rationale: νίπτω commonly refers to washing a part of the body, especially hands
    or feet. 'Wash' is the straightforward English equivalent.
- source_word: τὰς χεῖρας αὐτῶν
  chosen: their hands
  alternatives:
  - the hands of theirs
  lexicon: BDAG
  rationale: Natural English possessive rendering of the accusative object plus genitive
    pronoun.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: The conjunction with the present subjunctive expresses customary occurrence.
    'When' is idiomatic in English; the habitual nuance is sufficiently conveyed by
    context.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  - a meal
  lexicon: BDAG
  rationale: The Greek word is literally 'bread.' Although it can stand metonymically
    for food or a meal, the source text specifically says 'bread,' and original-language
    primacy favors retaining it.
- source_word: ἐσθίωσιν
  chosen: they eat
  alternatives:
  - they are eating
  - they partake of
  lexicon: BDAG
  rationale: Present subjunctive after ὅταν in a general temporal clause is best rendered
    with simple present in English.
