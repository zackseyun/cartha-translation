theological_decisions:
- issue: Nature of the handwashing reference
  chosen_reading: Render as a dispute over the tradition of the elders without importing
    ceremonial or hygienic explanations into the main text.
  alternative_readings:
  - Interpret explicitly as ceremonial handwashing
  - Interpret as ordinary hygiene
  rationale: The verse itself frames the issue as fidelity to 'the tradition of the
    elders.' The translation should not resolve whether the concern is primarily ritual
    purity or social custom beyond what the text states. A footnote can clarify the
    cultural background.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
