  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. Here the context is the woman's believing
    appeal to Jesus, so 'faith' best fits while preserving the theological sense without
    overinterpreting.
