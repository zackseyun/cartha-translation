id: MAT.15.28
reference: Matthew 15:28
source:
  edition: SBLGNT
  text: τότε ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτῇ· Ὦ γύναι, μεγάλη σου ἡ πίστις· γενηθήτω
    σοι ὡς θέλεις. καὶ ἰάθη ἡ θυγάτηρ αὐτῆς ἀπὸ τῆς ὥρας ἐκείνης.
translation:
  text: Then Jesus answered her, “O woman, great is your faith; let it be done for
    you as you desire.” And her daughter was healed from that hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your trust is great'; Greek πίστις can also carry the sense of trust
      or faithfulness, though 'faith' is the default rendering here.
    reason: lexical_alternative
  - marker: b
    text: Or 'from that moment.' The Greek literally says 'from that hour.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker linking this response to the preceding exchange;
    'Then' is natural and sufficiently formal.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in Greek narrative. In English, 'answered' captures the
    sense without awkwardly doubling the construction.
- source_word: εἶπεν
  chosen: answered her
  alternatives:
  - said to her
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς, the clause is best rendered as a single English
    speech introduction. Including 'her' preserves αὐτῇ.
- source_word: Ὦ
  chosen: O
  alternatives:
  - Oh
  - —
  lexicon: BDAG
  rationale: Vocative particle expressing direct address with solemnity or emphasis.
    'O' preserves the elevated but still intelligible tone better than omitting it.
- source_word: γύναι
  chosen: woman
  alternatives:
  - lady
  lexicon: BDAG
  rationale: Vocative of γυνή. 'Woman' is the most direct lexical equivalent; 'lady'
    would soften the address beyond the Greek. In this context it is respectful, not
    harsh.
- source_word: μεγάλη σου ἡ πίστις
  chosen: great is your faith
  alternatives:
  - your faith is great
  lexicon: BDAG
  rationale: Retains the emphatic predicate-fronted structure while remaining natural
    English. πίστις follows the doctrinal default 'faith' rather than 'trust' or 'faithfulness'
    here.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per DOCTRINE.md, the default rendering is 'faith.' In this context Jesus
    commends her believing reliance, not primarily her fidelity over time, though
    'trust' is a plausible nuance.
- source_word: γενηθήτω
  chosen: let it be done
  alternatives:
  - may it happen
  - let it happen
  lexicon: BDAG
  rationale: Aorist passive imperative of γίνομαι. 'Let it be done' preserves the
    passive form and the performative force of Jesus' pronouncement.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative pronoun here is naturally rendered 'for you' in English with this
    passive imperative construction.
- source_word: ὡς θέλεις
  chosen: as you desire
  alternatives:
  - as you wish
  - as you want
  lexicon: BDAG
  rationale: θέλω denotes willing/desiring. 'Desire' is slightly more elevated and
    fits the solemn tone; 'want' would sound too colloquial.
- source_word: ἰάθη
  chosen: was healed
  alternatives:
  - was cured
  - was made well
  lexicon: BDAG
  rationale: Aorist passive of ἰάομαι commonly denotes healing. 'Was healed' is the
    standard and clearest rendering in this miracle context.
- source_word: θυγάτηρ
  chosen: daughter
  lexicon: BDAG
  rationale: Straightforward familial term; no contextual reason to vary.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  chosen: from that hour
  alternatives:
  - from that moment
  - at that very time
  lexicon: BDAG
  rationale: Fairly literal rendering of the temporal expression. 'From that hour'
    preserves the source wording and idiomatically indicates immediate effect from
    that point onward.
