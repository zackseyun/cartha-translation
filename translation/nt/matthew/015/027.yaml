id: MAT.15.27
reference: Matthew 15:27
source:
  edition: SBLGNT
  text: ἡ δὲ εἶπεν· Ναί, κύριε, καὶ γὰρ τὰ κυνάρια ἐσθίει ἀπὸ τῶν ψιχίων τῶν πιπτόντων
    ἀπὸ τῆς τραπέζης τῶν κυρίων αὐτῶν.
translation:
  text: She said, “Yes, Lord, for even the little dogs eat from the crumbs that fall
    from their masters’ table.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dogs,' 'house dogs,' or 'puppies'; the Greek uses a diminutive form,
      suggesting small household dogs.
    reason: lexical_alternative
  - marker: b
    text: '''Lord'' could also be understood as a respectful ''sir,'' but the translation
      preserves the usual Gospel rendering of κύριος.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Yes, indeed
  - Certainly
  lexicon: BDAG
  rationale: A straightforward affirmative response. 'Yes' is the most natural modern
    English equivalent and preserves the woman's agreement with Jesus' statement.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Gospel context it can
    function as respectful address and may also carry recognition of Jesus' authority;
    'Lord' preserves that range better than 'sir.'
- source_word: καὶ γὰρ
  chosen: for even
  alternatives:
  - for also
  - yes, for even
  lexicon: BDAG
  rationale: 'This combination gives explanatory force (''for'') with an additive/intensifying
    nuance (''even''). ''For even'' captures her reasoning: she accepts the analogy
    and extends it.'
- source_word: κυνάρια
  chosen: little dogs
  alternatives:
  - dogs
  - house dogs
  - puppies
  lexicon: BDAG
  rationale: The diminutive form suggests small or household dogs rather than wild
    scavenger dogs. 'Little dogs' preserves the lexical nuance without becoming overly
    colloquial like 'puppies.'
- source_word: ἐσθίει
  chosen: eat
  alternatives:
  - do eat
  - feed
  lexicon: BDAG
  rationale: 'Although the Greek form is singular in form, the neuter plural subject
    commonly takes a singular verb. English idiom requires plural agreement: ''the
    little dogs eat.'' ''Eat'' is the plain lexical sense.'
- source_word: ψιχίων
  chosen: crumbs
  alternatives:
  - scraps
  - small pieces
  lexicon: BDAG
  rationale: '''Crumbs'' is the standard and contextually precise rendering for small
    bits of food from a table. It fits the imagery of leftovers falling during a meal.'
- source_word: τῶν πιπτόντων
  chosen: that fall
  alternatives:
  - falling
  - which are falling
  lexicon: BDAG
  rationale: The present participle modifies 'crumbs.' In idiomatic English, a relative
    clause ('that fall') is more natural than a participial phrase while preserving
    the ongoing/general sense.
- source_word: τραπέζης
  chosen: table
  lexicon: BDAG
  rationale: The ordinary meaning is 'table,' and the domestic setting of the metaphor
    is central to the verse.
- source_word: τῶν κυρίων αὐτῶν
  chosen: their masters’
  alternatives:
  - their owners’
  - their lords’
  lexicon: BDAG
  rationale: Here κύριος refers not to the divine title but to human household heads/owners
    in the metaphor. 'Masters' best fits the master-animal relationship and preserves
    the authority nuance better than 'owners,' while 'lords' would sound unnatural
    in English.
