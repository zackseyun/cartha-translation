theological_decisions:
- issue: Rendering κύριε in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The translation follows the doctrinal default for κύριος as 'Lord.' In
    Matthew, address to Jesus often carries more than mere politeness, and 'Lord'
    preserves possible theological depth without overstating it.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering κυνάρια with diminutive force
  chosen_reading: little dogs
  alternative_readings:
  - dogs
  - house dogs
  - puppies
  rationale: The verse contains a potentially harsh metaphor. Preserving the diminutive
    nuance reflects the Greek more accurately and avoids making the saying harsher
    than the text itself, while not softening it into paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
