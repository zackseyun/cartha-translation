theological_decisions:
- issue: Metaphorical force of 'blind'
  chosen_reading: Retain 'blind' as a metaphor for spiritual inability/discernment
    without explicating it in the main text.
  alternative_readings:
  - spiritually blind
  - ignorant leaders
  rationale: The verse uses a vivid metaphor and proverb. Expanding it in translation
    would import interpretation beyond the Greek's wording and reduce the rhetorical
    force.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
- issue: Gender rendering in the proverb
  chosen_reading: Use 'a blind man ... a blind man' in the singular proverb.
  alternative_readings:
  - a blind person ... a blind person
  rationale: The Greek singular is grammatically masculine and representative. Per
    the gender-accurate policy, the translation should match the source's form and
    intent rather than neutralize it; the representative sense can be noted in a footnote.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
