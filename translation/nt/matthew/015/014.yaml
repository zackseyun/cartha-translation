id: MAT.15.14
reference: Matthew 15:14
source:
  edition: SBLGNT
  text: ἄφετε αὐτούς· ⸂τυφλοί εἰσιν ὁδηγοὶ τυφλῶν⸃· τυφλὸς δὲ τυφλὸν ἐὰν ὁδηγῇ, ἀμφότεροι
    εἰς βόθυνον πεσοῦνται.
translation:
  text: Leave them alone; they are blind guides of the blind. But if a blind man guides
    a blind man, both will fall into a pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'blind guides for the blind.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'a blind man' is representative in the proverb; the saying
      applies generally, not only to males.
    reason: cultural_note
  - marker: c
    text: Or, 'ditch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφετε
  chosen: Leave ... alone
  alternatives:
  - Leave
  - Let ... be
  - Ignore
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here means to leave or let be, not 'forgive'
    or 'send away.' 'Leave them alone' is idiomatic modern English and captures the
    dismissive force of Jesus' command.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to the Pharisees in context.
- source_word: τυφλοί
  chosen: blind
  alternatives:
  - blind men
  lexicon: BDAG
  rationale: Predicate adjective used metaphorically for spiritual inability or lack
    of perception. 'Blind' preserves the metaphor without overexplaining it.
- source_word: ὁδηγοὶ
  chosen: guides
  alternatives:
  - leaders
  lexicon: BDAG
  rationale: ὁδηγός is literally 'guide.' 'Leaders' would interpret the metaphor;
    'guides' preserves the image and matches the following clause.
- source_word: τυφλῶν
  chosen: of the blind
  alternatives:
  - for blind people
  lexicon: BDAG
  rationale: Genitive plural is best rendered directly as 'of the blind,' preserving
    the compact proverbial form.
- source_word: τυφλὸς ... τυφλὸν
  chosen: a blind man ... a blind man
  alternatives:
  - the blind ... the blind
  - a blind person ... a blind person
  lexicon: BDAG
  rationale: The singular proverbial construction is naturally rendered with an indefinite
    singular in English. Because the Greek is grammatically masculine singular and
    representative, 'a blind man' best matches the source under the gender-accurate
    policy.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the warning-like
    turn in the proverb.
- source_word: ἐὰν ὁδηγῇ
  chosen: if ... guides
  alternatives:
  - if ... should guide
  - if ... leads
  lexicon: BDAG
  rationale: ἐὰν with present subjunctive forms a general conditional. 'If ... guides'
    is clear modern English; 'leads' is possible, but 'guides' keeps lexical consistency
    with ὁδηγοί.
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Simple rendering of the dual-inclusive adjective; 'both' is concise and
    natural.
- source_word: εἰς βόθυνον
  chosen: into a pit
  alternatives:
  - into a ditch
  - into a hole
  lexicon: BDAG
  rationale: βόθυνος denotes a pit, ditch, or hole. 'Pit' is broad, vivid, and avoids
    sounding overly rustic while preserving the image.
- source_word: πεσοῦνται
  chosen: will fall
  alternatives:
  - will fall down
  lexicon: BDAG
  rationale: Future middle of πίπτω here is deponent in sense; 'will fall' is the
    natural English future outcome of the conditional.
