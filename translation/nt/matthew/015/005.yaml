theological_decisions:
- issue: Whether to import the technical vow term 'Corban' into Matthew's text
  chosen_reading: Retain Matthew's lexical wording with 'a gift' rather than inserting
    'Corban'
  alternative_readings:
  - Corban
  - an offering dedicated to God
  rationale: Matthew uses δῶρον, not the transliterated term κορβᾶν found in Mark
    7:11. Following original-language primacy, the translation keeps the wording actually
    present in Matthew. The cultic implication can be preserved in a footnote rather
    than imported into the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
