id: MAT.15.5
reference: Matthew 15:5
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ λέγετε· Ὃς ἂν εἴπῃ τῷ πατρὶ ἢ τῇ μητρί· Δῶρον ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς,
translation:
  text: But you say, ‘Whoever says to his father or his mother, “Whatever from me
    would have benefited you is a gift,”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an offering.” The sense is that what might have been used to support
      one's parents is declared dedicated to God; compare Mark 7:11, which uses the
      term “Corban.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δὲ λέγετε
  chosen: But you say
  alternatives:
  - But you are saying
  - But as for you, you say
  lexicon: BDAG
  rationale: δὲ marks contrast with the preceding commandment citation and accusation;
    present indicative λέγετε is naturally rendered as a general present, 'you say.'
    'But' preserves the adversative force.
- source_word: Ὃς ἂν εἴπῃ
  chosen: Whoever says
  alternatives:
  - Whoever might say
  - If anyone says
  lexicon: BDAG
  rationale: The relative pronoun with ἄν and aorist subjunctive expresses an indefinite
    general condition. 'Whoever says' is idiomatic English and preserves the generalizing
    force.
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  chosen: to his father or his mother
  alternatives:
  - to the father or the mother
  - to father or mother
  lexicon: BDAG
  rationale: The dative marks indirect object. English idiom prefers possessive pronouns
    here. The singular masculine in Ὃς supports 'his' as gender-accurate representation
    rather than a neutral recast.
- source_word: Δῶρον
  chosen: a gift
  alternatives:
  - an offering
  - Corban
  lexicon: BDAG
  rationale: δῶρον means 'gift' or 'offering.' In this context it refers to something
    dedicated to God and thus withheld from parental support. 'A gift' is the plain
    lexical sense; 'offering' is possible but slightly more interpretive. 'Corban'
    reflects the parallel in Mark 7:11, not Matthew's wording, so it is not used in
    the main text.
- source_word: ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς
  chosen: Whatever from me would have benefited you
  alternatives:
  - Whatever you might have profited from me
  - Whatever help you would have received from me
  - That by which you would have been helped by me
  lexicon: BDAG
  rationale: The clause refers to whatever support the parent might have received
    from the speaker. ἐξ ἐμοῦ is rendered 'from me' to preserve source orientation.
    ὠφεληθῇς is passive ('be benefited/helped'); 'would have benefited you' gives
    natural English while retaining the unrealized benefit implied by the saying.
