id: MAT.15.33
reference: Matthew 15:33
source:
  edition: SBLGNT
  text: καὶ λέγουσιν αὐτῷ οἱ ⸀μαθηταί· Πόθεν ἡμῖν ἐν ἐρημίᾳ ἄρτοι τοσοῦτοι ὥστε χορτάσαι
    ὄχλον τοσοῦτον;
translation:
  text: And the disciples said to him, “Where could we get enough bread in this desolate
    place to satisfy so large a crowd?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the wilderness” / “in a deserted place.”
    reason: lexical_alternative
  - marker: b
    text: Literally “so many loaves,” with “bread” used here as a natural English
      collective.
    reason: lexical_alternative
  - marker: c
    text: Or “feed”; the Greek verb can mean to feed fully or satisfy with food.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - say
  lexicon: BDAG
  rationale: Historical present in Greek is naturally rendered as simple past in English
    narrative for readability while preserving the discourse function.
- source_word: μαθηταί
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article marks a definite group already known in context; 'the disciples'
    is sufficient and natural without adding 'his,' which is implied by context but
    not explicit.
- source_word: Πόθεν
  chosen: Where could we get
  alternatives:
  - From where do we have
  - Where from do we get
  lexicon: BDAG
  rationale: The adverb asks about source/origin. English idiom requires expansion
    to express the implied sense of obtaining a supply.
- source_word: ἡμῖν
  chosen: we
  alternatives:
  - for us
  - to us
  lexicon: BDAG
  rationale: The dative is incorporated idiomatically into the English clause 'could
    we get,' which best conveys the disciples' perspective.
- source_word: ἐν ἐρημίᾳ
  chosen: in this desolate place
  alternatives:
  - in the wilderness
  - in a deserted place
  lexicon: BDAG
  rationale: ἐρημία denotes an uninhabited/deserted region. 'Desolate place' preserves
    the setting without over-specifying a formal wilderness motif; 'this' is supplied
    naturally from the immediate situation.
- source_word: ἄρτοι τοσοῦτοι
  chosen: enough bread
  alternatives:
  - so many loaves
  - such a quantity of bread
  lexicon: BDAG
  rationale: ἄρτοι literally means 'loaves/breads,' but in English 'enough bread'
    is the most natural collective expression here. The quantity idea from τοσοῦτοι
    is preserved by 'enough.'
- source_word: ὥστε
  chosen: to
  alternatives:
  - so as to
  - so that
  lexicon: BDAG
  rationale: With the infinitive χορτάσαι, ὥστε expresses result/purpose. English
    infinitive 'to satisfy' is concise and natural.
- source_word: χορτάσαι
  chosen: satisfy
  alternatives:
  - feed
  - fill
  lexicon: BDAG
  rationale: The verb means to feed to the full or satisfy. 'Satisfy' preserves the
    idea of adequate provision, not merely distribution of food.
- source_word: ὄχλον τοσοῦτον
  chosen: so large a crowd
  alternatives:
  - such a large crowd
  - so great a crowd
  lexicon: BDAG
  rationale: This renders both ὄχλον and the emphatic τοσοῦτον in idiomatic modern
    English.
