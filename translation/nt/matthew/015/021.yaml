theological_decisions:
- issue: Narrative nuance of Jesus' movement into Gentile-associated territory
  chosen_reading: Render ἀνεχώρησεν as 'withdrew' without making explicit a theological
    motive.
  alternative_readings:
  - Render more neutrally as 'departed'
  - Render more strongly as 'retreated'
  rationale: The verse narrates movement, and Matthew's wording may imply strategic
    withdrawal, but the text does not explicitly state why Jesus went there. The translation
    preserves the narrative nuance without importing a doctrinal or psychological
    explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
