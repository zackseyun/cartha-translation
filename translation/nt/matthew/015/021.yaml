id: MAT.15.21
reference: Matthew 15:21
source:
  edition: SBLGNT
  text: Καὶ ἐξελθὼν ἐκεῖθεν ὁ Ἰησοῦς ἀνεχώρησεν εἰς τὰ μέρη Τύρου καὶ Σιδῶνος.
translation:
  text: And Jesus went out from there and withdrew to the region of Tyre and Sidon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'departed to the district of Tyre and Sidon.' The Greek can be rendered
      more neutrally, but 'withdrew' reflects Matthew's recurring use of the verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, naturally rendered as a participial action
    preceding the main verb. 'Went out' preserves the concrete movement without overinterpreting
    motive.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Adverb indicating departure from the prior location. 'From there' is
    idiomatic and sufficiently precise.
- source_word: ἀνεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - retreated
  lexicon: BDAG
  rationale: ἀναχωρέω in Matthew often carries the sense of withdrawing or going away,
    sometimes with strategic nuance. 'Withdrew' preserves that nuance better than
    the flatter 'departed,' while avoiding the possibly overstated 'retreated.'
- source_word: εἰς τὰ μέρη
  chosen: to the region
  alternatives:
  - into the district
  - to the parts
  lexicon: BDAG
  rationale: μέρη literally means 'parts/regions.' In idiomatic English, 'to the region'
    best conveys movement into the general area rather than necessarily entering the
    cities themselves.
- source_word: Τύρου καὶ Σιδῶνος
  chosen: of Tyre and Sidon
  alternatives:
  - of Tyre and Sidon's territory
  lexicon: BDAG
  rationale: Genitives dependent on μέρη identify the region associated with these
    Phoenician cities. Standard transliteration of place names follows project policy.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Simple connective linking the narrative to the preceding context. 'And'
    preserves the Greek flow without adding interpretive emphasis.
