theological_decisions:
- issue: Scope of βλασφημίαι in the vice list
  chosen_reading: Render as 'slanders' rather than 'blasphemies'
  alternative_readings:
  - blasphemies
  rationale: The context is a general list of evils proceeding from the heart, not
    specifically offenses directed toward God. To preserve the broader semantic range
    in accessible English, 'slanders' is preferred, while the more traditional 'blasphemies'
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §6; preserve theological tension where
    ambiguity remains (§3)
