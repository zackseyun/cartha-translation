id: MAT.15.19
reference: Matthew 15:19
source:
  edition: SBLGNT
  text: ἐκ γὰρ τῆς καρδίας ἐξέρχονται διαλογισμοὶ πονηροί, φόνοι, μοιχεῖαι, πορνεῖαι,
    κλοπαί, ψευδομαρτυρίαι, βλασφημίαι.
translation:
  text: For out of the heart come evil thoughts, murders, adulteries, sexual immoralities,
    thefts, false testimonies, and slanders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blasphemies.' The Greek term can refer either to slander against people
      or blasphemous speech against God, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ γὰρ
  chosen: For out of
  alternatives:
  - For from
  - Because from
  lexicon: BDAG
  rationale: γάρ gives explanatory force ('for'), and ἐκ marks source/origin ('out
    of'/'from'). 'For out of' preserves both the connective and the imagery of emergence
    from an inner source.
- source_word: καρδίας
  chosen: the heart
  alternatives:
  - the inner self
  - the mind
  lexicon: BDAG
  rationale: καρδία in this context denotes the inner person as the source of moral
    action. 'Heart' is the standard and sufficiently clear English rendering, preserving
    the biblical metaphor without reduction to mere intellect.
- source_word: ἐξέρχονται
  chosen: come
  alternatives:
  - come out
  - proceed
  lexicon: BDAG
  rationale: The verb means 'go out/come out, proceed from.' 'Come' with 'out of the
    heart' yields natural English while retaining the sense of emergence. 'Proceed'
    is possible but sounds more formal and less natural here.
- source_word: διαλογισμοὶ πονηροί
  chosen: evil thoughts
  alternatives:
  - evil reasonings
  - wicked schemes
  lexicon: BDAG
  rationale: διαλογισμοί can denote thoughts, reasonings, or deliberations; with πονηροί
    it refers to morally corrupt inner thoughts. 'Evil thoughts' is idiomatic and
    faithful without over-specifying plotting or argumentation.
- source_word: φόνοι
  chosen: murders
  alternatives:
  - acts of murder
  - killings
  lexicon: BDAG
  rationale: The plural noun denotes murders/homicides. 'Murders' is the most direct
    and morally weighted English equivalent; 'killings' would be broader and less
    precise.
- source_word: μοιχεῖαι
  chosen: adulteries
  alternatives:
  - acts of adultery
  lexicon: BDAG
  rationale: The plural is retained to match the vice-list style and the Greek number.
    'Adulteries' is somewhat formal but accurate and consistent with the surrounding
    plurals.
- source_word: πορνεῖαι
  chosen: sexual immoralities
  alternatives:
  - sexual immorality
  - fornications
  lexicon: BDAG
  rationale: πορνεία covers illicit sexual behavior broadly. Rendering the plural
    as 'sexual immoralities' preserves the Greek plural and breadth better than the
    singular collective 'sexual immorality.' 'Fornications' is too narrow and archaic
    in modern English.
- source_word: κλοπαί
  chosen: thefts
  alternatives:
  - stealings
  - acts of theft
  lexicon: BDAG
  rationale: The plural noun denotes thefts/acts of stealing. 'Thefts' is concise,
    natural, and preserves the list structure.
- source_word: ψευδομαρτυρίαι
  chosen: false testimonies
  alternatives:
  - false witness
  - false testimony
  lexicon: BDAG
  rationale: The plural noun refers to false testimony or false witness-bearing. 'False
    testimonies' preserves the plural form and the legal/testimonial nuance better
    than the more idiomatic but singular-sounding 'false witness.'
- source_word: βλασφημίαι
  chosen: slanders
  alternatives:
  - blasphemies
  - abusive speech
  lexicon: BDAG
  rationale: βλασφημία can refer to slander against humans or blasphemy against God
    depending on context. Here, in a general vice list, 'slanders' best captures defamatory
    speech broadly. 'Blasphemies' is possible but in English often narrows the sense
    to irreverence toward God.
