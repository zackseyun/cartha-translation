theological_decisions:
- issue: Nature of κοινόω in a dispute about ritual purity
  chosen_reading: Rendered as 'defile' to preserve both ritual-impurity background
    and broader moral force in Jesus' teaching.
  alternative_readings:
  - make unclean
  rationale: The immediate context is ceremonial purity, but Jesus' argument extends
    beyond ritual categories to what truly corrupts a person. 'Defile' preserves that
    theological breadth better than the narrower-sounding 'make unclean,' while remaining
    faithful to the Greek.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Generic singular ἄνθρωπον
  chosen_reading: Rendered as 'the man' rather than a gender-neutral plural or abstract
    noun.
  alternative_readings:
  - the person
  - a person
  - people
  rationale: The source uses a grammatically masculine singular with representative
    force. The translation preserves that form in line with the project's gender-accurate
    policy, without converting the singular into a plural or abstract expression.
  doctrine_reference: Translation philosophy §4
