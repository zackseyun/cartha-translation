id: MAT.15.20
reference: Matthew 15:20
source:
  edition: SBLGNT
  text: ταῦτά ἐστιν τὰ κοινοῦντα τὸν ἄνθρωπον, τὸ δὲ ἀνίπτοις χερσὶν φαγεῖν οὐ κοινοῖ
    τὸν ἄνθρωπον.
translation:
  text: These are the things that defile the man, but to eat with unwashed hands does
    not defile the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make the man unclean.' The Greek verb can refer to making someone ceremonially
      unclean; here 'defile' preserves both the ritual-purity setting and the broader
      sense of corruption in Jesus' teaching.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is a representative singular, expressing a general truth about
      a human being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κοινοῦντα / κοινοῖ
  chosen: defile / defile
  alternatives:
  - make unclean
  - render common
  lexicon: BDAG
  rationale: In this purity-context, κοινόω refers to making a person ritually/morally
    unclean rather than merely 'common.' 'Defile' is idiomatic, concise, and preserves
    the force of Jesus' contrast with Pharisaic purity concerns.
- source_word: ἄνθρωπον
  chosen: the man
  alternatives:
  - a person
  - the person
  - man
  lexicon: BDAG
  rationale: The Greek is singular with the article and functions generically. Per
    the gender-accurate philosophy, 'the man' preserves the representative singular
    form better than the more neutral 'person,' while still communicating a general
    truth about humanity.
- source_word: ἀνίπτοις χερσὶν
  chosen: with unwashed hands
  alternatives:
  - with hands unwashed
  lexicon: BDAG
  rationale: This is the natural English rendering of the dative phrase and clearly
    reflects the ritual handwashing issue in context.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - eating
  lexicon: BDAG
  rationale: 'The articular infinitive is well represented by the English infinitive
    here: ''to eat with unwashed hands.'''
- source_word: ταῦτά ἐστιν τὰ
  chosen: These are the things that
  alternatives:
  - These are what
  - These are the things which
  lexicon: BDAG
  rationale: This structure is rendered in clear modern English while preserving the
    demonstrative emphasis and predicate construction.
- source_word: δέ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks the contrast between what truly defiles and the disciples' alleged
    breach of handwashing tradition; 'but' best conveys that contrast.
