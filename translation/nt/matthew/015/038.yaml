theological_decisions:
- issue: Gender-specific counting formula
  chosen_reading: Retain 'men' in the main text and explicitly distinguish women and
    children as additional groups.
  alternative_readings:
  - Use 'people' for inclusivity
  rationale: The Greek specifies ἄνδρες ('men') and then separately mentions women
    and children. Rendering it as 'people' would erase a significant lexical distinction
    in the source. This follows the doctrine's gender-accurate principle.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
