id: MAT.15.38
reference: Matthew 15:38
source:
  edition: SBLGNT
  text: οἱ δὲ ἐσθίοντες ἦσαν τετρακισχίλιοι ἄνδρες χωρὶς γυναικῶν καὶ παιδίων.
translation:
  text: Now those who had eaten were four thousand men, besides women and children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not counting women and children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: Now those
  alternatives:
  - And those
  - But those
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Now' gives natural English discourse flow without
    overstating contrast. The article with participle is rendered substantivally as
    'those.'
- source_word: ἐσθίοντες
  chosen: who had eaten
  alternatives:
  - who were eating
  - eating
  lexicon: BDAG
  rationale: Although formally a present participle, in context it refers to the group
    who partook of the meal just completed. English idiom prefers the completed sense
    'who had eaten' rather than the more wooden 'who were eating.'
- source_word: ἦσαν
  chosen: were
  alternatives:
  - numbered
  lexicon: BDAG
  rationale: Simple copula introducing the count; 'were' is the most direct rendering.
- source_word: τετρακισχίλιοι
  chosen: four thousand
  lexicon: BDAG
  rationale: Straightforward cardinal number.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: ἀνήρ refers specifically to adult males/men, not people in general. Per
    gender-accurate philosophy, 'men' preserves the source distinction, especially
    since women and children are explicitly mentioned separately.
- source_word: χωρὶς
  chosen: besides
  alternatives:
  - apart from
  - not counting
  - excluding
  lexicon: BDAG
  rationale: χωρίς here marks exclusion from the stated number. 'Besides' is natural
    English and communicates that women and children were additional to the four thousand
    men.
- source_word: γυναικῶν
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: The generic sense 'women' fits the counting formula and avoids narrowing
    the reference to married women only.
- source_word: καὶ παιδίων
  chosen: and children
  alternatives:
  - and little children
  lexicon: BDAG
  rationale: παιδίον can denote child or little child; here 'children' is the clearest
    general rendering without implying a narrower age range than the context requires.
