id: MAT.15.3
reference: Matthew 15:3
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν αὐτοῖς· Διὰ τί καὶ ὑμεῖς παραβαίνετε τὴν ἐντολὴν τοῦ
    θεοῦ διὰ τὴν παράδοσιν ὑμῶν;
translation:
  text: But he answered and said to them, “Why do you also break the commandment of
    God because of your tradition?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transgress the commandment of God on account of your tradition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  lexicon: BDAG
  rationale: This participle + finite verb is a common Semitic-influenced Greek expression.
    Rendering both elements preserves the form and rhetorical weight without becoming
    unnatural. 'Answered' alone is possible in smoother English, but the fuller expression
    better reflects the source.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic interrogative asking reason or cause. 'Why' is the natural
    English equivalent.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: BDAG
  rationale: 'The combination marks correspondence with the accusation just raised
    by the Pharisees and scribes: not only the disciples, but ''you also.'' ''You
    also'' preserves the adversative force without overemphasis.'
- source_word: παραβαίνετε
  chosen: break
  alternatives:
  - transgress
  - violate
  lexicon: BDAG
  rationale: The verb means to go beyond or violate a command. 'Break' is clear, idiomatic
    modern English and fits Jesus' charge. 'Transgress' is more formal but less accessible.
- source_word: τὴν ἐντολὴν
  chosen: the commandment
  alternatives:
  - the command
  lexicon: BDAG
  rationale: '''Commandment'' preserves the biblical and covenantal register of ἐντολή,
    especially in a context contrasting divine command with human tradition.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is straightforward. 'Of God' preserves the formal contrast
    with 'your tradition' and echoes common biblical style.
- source_word: διὰ τὴν παράδοσιν ὑμῶν
  chosen: because of your tradition
  alternatives:
  - for the sake of your tradition
  - on account of your tradition
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause or reason. 'Because of your
    tradition' is natural English and clearly conveys that their tradition is the
    reason they break God's command. 'Tradition' is preferable to paraphrases like
    'traditional teaching' because παράδοσις directly denotes what is handed down.
