theological_decisions:
- issue: Contrast between divine authority and human tradition
  chosen_reading: Render παράδοσις as 'tradition' and ἐντολή as 'commandment' to preserve
    Jesus' direct contrast between God's command and the opponents' inherited practice.
  alternative_readings:
  - Render ἐντολή as 'command' for simpler English
  - Render παράδοσις as 'teaching' or 'custom'
  rationale: The verse critiques elevating humanly transmitted tradition over God's
    command. The translation should preserve that theological tension without importing
    a broader condemnation of all tradition. 'Your tradition' keeps the rebuke specific
    to the tradition at issue.
  doctrine_reference: Translation philosophy §§1, 3, 6
