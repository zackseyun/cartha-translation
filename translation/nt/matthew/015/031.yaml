id: MAT.15.31
reference: Matthew 15:31
source:
  edition: SBLGNT
  text: ὥστε ⸂τὸν ὄχλον⸃ θαυμάσαι βλέποντας κωφοὺς λαλοῦντας ⸂κυλλοὺς ὑγιεῖς⸃ ⸀καὶ
    χωλοὺς περιπατοῦντας καὶ τυφλοὺς βλέποντας· καὶ ἐδόξασαν τὸν θεὸν Ἰσραήλ.
translation:
  text: so that the crowd marveled as they saw the mute speaking, the crippled made
    well, the lame walking, and the blind seeing; and they glorified the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deaf speaking.' The Greek word can refer to those who are deaf or
      mute; here 'mute' is preferred because the immediate emphasis is on speaking.
    reason: lexical_alternative
  - marker: b
    text: Or 'the maimed restored' / 'the maimed whole.' The Greek describes those
      with disabled or maimed limbs being healed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so then
  lexicon: BDAG
  rationale: Introduces the result of the preceding healings. 'So that' preserves
    the consecutive force naturally in English.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: '''Crowd'' is clear modern English for ὄχλος and fits the narrative setting
    better than the more traditional ''multitude.'''
- source_word: θαυμάσαι
  chosen: marveled
  alternatives:
  - wondered
  - was amazed
  lexicon: BDAG
  rationale: Captures the aorist infinitive after ὥστε expressing the resulting reaction.
    'Marveled' preserves the sense of astonished wonder.
- source_word: βλέποντας
  chosen: as they saw
  alternatives:
  - seeing
  lexicon: BDAG
  rationale: The participle modifies the crowd and explains the basis of their marveling.
    'As they saw' is smoother English while retaining the observational force.
- source_word: κωφοὺς
  chosen: the mute
  alternatives:
  - the deaf
  - those unable to speak
  lexicon: BDAG
  rationale: Although κωφός can denote 'deaf' or 'mute,' the immediate participle
    λαλοῦντας ('speaking') indicates those previously unable to speak. 'The mute speaking'
    best reflects the contextual contrast.
- source_word: λαλοῦντας
  chosen: speaking
  alternatives:
  - talking
  lexicon: BDAG
  rationale: A straightforward rendering of λαλέω that matches the miracle description.
- source_word: κυλλοὺς
  chosen: the crippled
  alternatives:
  - the maimed
  - those with crippled limbs
  lexicon: BDAG
  rationale: κυλλός refers to those with disabled or maimed limbs. 'Crippled' is concise
    and readable modern English, though 'maimed' is a viable alternative.
- source_word: ὑγιεῖς
  chosen: made well
  alternatives:
  - healthy
  - restored
  - whole
  lexicon: BDAG
  rationale: Predicate adjective describing the healed condition of the crippled.
    'Made well' brings out the resultative sense in idiomatic English better than
    the bare adjective 'healthy.'
- source_word: χωλοὺς
  chosen: the lame
  alternatives:
  - those unable to walk properly
  lexicon: BDAG
  rationale: Standard and accurate rendering for χωλός in healing contexts.
- source_word: περιπατοῦντας
  chosen: walking
  alternatives:
  - going about
  lexicon: BDAG
  rationale: 'In this miracle list the literal sense is intended: those formerly lame
    are now walking.'
- source_word: τυφλοὺς
  chosen: the blind
  lexicon: BDAG
  rationale: Standard rendering for τυφλός.
- source_word: βλέποντας
  chosen: seeing
  alternatives:
  - regaining sight
  lexicon: BDAG
  rationale: Here the participle describes the restored ability of the blind. 'Seeing'
    is direct and mirrors the Greek.
- source_word: ἐδόξασαν
  chosen: they glorified
  alternatives:
  - they praised
  - they gave glory to
  lexicon: BDAG
  rationale: δοξάζω in this context means to honor or give glory to God. 'Glorified'
    preserves the theological weight better than the flatter 'praised.'
- source_word: τὸν θεὸν Ἰσραήλ
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: BDAG
  rationale: A natural rendering of the genitival construction that preserves the
    biblical phrasing and its covenantal resonance.
