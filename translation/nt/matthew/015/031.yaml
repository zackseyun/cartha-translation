theological_decisions:
- issue: Meaning of κωφοὺς in the phrase κωφοὺς λαλοῦντας
  chosen_reading: the mute speaking
  alternative_readings:
  - the deaf speaking
  rationale: Because κωφός can mean either 'deaf' or 'mute,' context must decide.
    The participle 'speaking' points most directly to restored speech, so 'the mute
    speaking' best captures the miracle described without denying the broader semantic
    range.
- issue: Rendering of δοξάζω in relation to God
  chosen_reading: they glorified the God of Israel
  alternative_readings:
  - they praised the God of Israel
  - they gave glory to the God of Israel
  rationale: The verse emphasizes a response of honor directed to God in light of
    miraculous works. 'Glorified' preserves the stronger theological sense of attributing
    glory to God.
