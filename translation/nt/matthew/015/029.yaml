id: MAT.15.29
reference: Matthew 15:29
source:
  edition: SBLGNT
  text: Καὶ μεταβὰς ἐκεῖθεν ὁ Ἰησοῦς ἦλθεν παρὰ τὴν θάλασσαν τῆς Γαλιλαίας, καὶ ἀναβὰς
    εἰς τὸ ὄρος ἐκάθητο ἐκεῖ.
translation:
  text: And after departing from there, Jesus came along the Sea of Galilee, and after
    going up on the mountain, he was sitting there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside the Sea of Galilee.' The Greek preposition can denote movement
      along or location beside the shore.
    reason: lexical_alternative
  - marker: b
    text: Or 'he sat there.' The Greek imperfect may be rendered more simply, but
      'was sitting' better preserves the ongoing sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταβὰς
  chosen: after departing
  alternatives:
  - having departed
  - moving on
  lexicon: BDAG
  rationale: Aorist participle of μεταβαίνω marking prior action relative to the main
    verb. 'After departing' preserves the temporal sequence in natural English without
    over-paraphrasing.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Locative adverb indicating movement away from the previous location;
    'from there' is the most natural and direct rendering.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: Standard narrative aorist of ἔρχομαι. 'Came' is the conventional and
    contextually sufficient rendering in English Gospel narrative.
- source_word: παρὰ τὴν θάλασσαν τῆς Γαλιλαίας
  chosen: along the Sea of Galilee
  alternatives:
  - beside the Sea of Galilee
  - by the Sea of Galilee
  lexicon: BDAG
  rationale: παρά with the accusative can indicate movement alongside or along. Because
    ἦλθεν is a motion verb, 'along the Sea of Galilee' best reflects movement in the
    vicinity rather than mere static location.
- source_word: ἀναβὰς
  chosen: after going up
  alternatives:
  - having gone up
  - going up
  lexicon: BDAG
  rationale: Aorist participle of ἀναβαίνω indicating antecedent action. 'After going
    up' clearly conveys sequence and avoids awkward participial English.
- source_word: εἰς τὸ ὄρος
  chosen: on the mountain
  alternatives:
  - into the hill country
  - to the mountain
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' with ἀναβαίνω and ὄρος the idiomatic
    sense is ascent onto a mountain/hillside. 'On the mountain' fits the following
    seated posture and reads naturally in English. The article is retained as 'the
    mountain,' though not necessarily identifying a specific named mountain.
- source_word: ἐκάθητο
  chosen: he was sitting
  alternatives:
  - he sat
  - he seated himself
  lexicon: BDAG
  rationale: Imperfect middle/passive of κάθημαι portrays ongoing or durative past
    action/state. 'He was sitting' preserves the imperfective aspect better than simple
    'he sat.'
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Simple locative adverb; 'there' is direct and sufficient.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  rationale: Personal name is transliterated by standard convention per project philosophy.
