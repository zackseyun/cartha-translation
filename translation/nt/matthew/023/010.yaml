id: MAT.23.10
reference: Matthew 23:10
source:
  edition: SBLGNT
  text: μηδὲ κληθῆτε καθηγηταί, ⸂ὅτι καθηγητὴς ὑμῶν ἐστιν εἷς⸃ ὁ χριστός·
translation:
  text: And do not be called instructors, because your instructor is one—the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδὲ
  chosen: And do not
  alternatives:
  - nor
  - neither
  lexicon: BDAG
  rationale: Continues the prohibitive sequence from the surrounding context. 'And
    do not' is natural modern English while preserving the connective force.
- source_word: κληθῆτε
  chosen: be called
  alternatives:
  - be named
  - be addressed as
  lexicon: BDAG
  rationale: Passive of καλέω here refers to receiving a title or designation. 'Be
    called' is the most direct and idiomatic rendering.
- source_word: καθηγηταί
  chosen: instructors
  alternatives:
  - guides
  - leaders
  - teachers
  lexicon: BDAG
  rationale: καθηγητής denotes one who leads or instructs. 'Instructors' fits the
    title sense in this context and avoids collapsing it into 'teachers,' which could
    blur the distinction from διδάσκαλος in the nearby verses.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the prohibition. 'Because' is clear contemporary
    English.
- source_word: καθηγητὴς
  chosen: instructor
  alternatives:
  - guide
  - leader
  - teacher
  lexicon: BDAG
  rationale: Rendered consistently with the plural earlier in the verse. Singular
    maintained for the predicate nominative.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Standard possessive rendering in English.
- source_word: ἐστιν εἷς
  chosen: is one
  alternatives:
  - is only one
  - is one alone
  lexicon: BDAG
  rationale: Preserves the Greek emphasis on singularity without adding interpretive
    weight beyond the text.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the article marks it clearly as
    a title.
