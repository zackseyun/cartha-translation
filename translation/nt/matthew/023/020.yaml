id: MAT.23.20
reference: Matthew 23:20
source:
  edition: SBLGNT
  text: ὁ οὖν ὀμόσας ἐν τῷ θυσιαστηρίῳ ὀμνύει ἐν αὐτῷ καὶ ἐν πᾶσι τοῖς ἐπάνω αὐτοῦ·
translation:
  text: Therefore, the one who swears by the altar swears by it and by everything
    on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and by all the things upon it.' The Greek phrase is broader than a single
      'gift' and may include everything placed on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ οὖν ὀμόσας
  chosen: Therefore, the one who swears
  alternatives:
  - So, whoever swears
  - Therefore, he who swears
  lexicon: BDAG
  rationale: 'The articular aorist participle functions generically/substantivally:
    ''the one who swears'' or ''whoever swears.'' ''Therefore'' renders οὖν as an
    inferential connector linking this statement to the prior argument. Present English
    uses the present tense in the main clause for a general principle.'
- source_word: ἐν τῷ θυσιαστηρίῳ
  chosen: by the altar
  alternatives:
  - in the altar
  - on the altar
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with ὀμνύω in oath formulas it is idiomatically
    rendered 'by.' θυσιαστήριον is 'altar.' This preserves the oath formula natural
    in English while staying close to the Greek sense.
- source_word: ὀμνύει
  chosen: swears
  alternatives:
  - takes an oath
  lexicon: BDAG
  rationale: Simple present best conveys the gnomic force of the statement. 'Swears'
    is concise and matches the repeated verbal pattern in the verse.
- source_word: ἐν αὐτῷ
  chosen: by it
  alternatives:
  - in it
  lexicon: BDAG
  rationale: The pronoun refers back to the altar. As above, ἐν in this oath context
    is best rendered idiomatically as 'by,' not spatially as 'in.'
- source_word: καὶ ἐν πᾶσι τοῖς ἐπάνω αὐτοῦ
  chosen: and by everything on it
  alternatives:
  - and by all the things upon it
  - and by everything above it
  lexicon: BDAG
  rationale: πᾶσι with the article and ἐπάνω forms a substantive expression meaning
    'all the things on/upon it.' In context of an altar, this naturally refers to
    everything placed on it rather than merely 'above it.' 'Everything on it' is clear
    modern English and fits the argument about the altar's sanctifying significance.
