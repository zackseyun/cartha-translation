theological_decisions:
- issue: Referent of 'everything on it'
  chosen_reading: A general reference to all that is upon the altar, without specifying
    sacrificial gifts in the translation.
  alternative_readings:
  - everything above it
  - all the offerings on it
  rationale: The immediate context contrasts oaths by the altar and by the gift on
    it (vv. 18–19). Here the Greek phrase is broader than 'the gift' and is best left
    general in the main text. This preserves the logic of Jesus' argument without
    narrowing the phrase beyond the wording given.
  doctrine_reference: Preserve theological tension rather than resolve it.
