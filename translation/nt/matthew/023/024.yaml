id: MAT.23.24
reference: Matthew 23:24
source:
  edition: SBLGNT
  text: ὁδηγοὶ τυφλοί, ⸀οἱ διϋλίζοντες τὸν κώνωπα τὴν δὲ κάμηλον καταπίνοντες.
translation:
  text: Blind guides, straining out the gnat but swallowing the camel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'filtering out the gnat.' The Greek verb refers to straining liquid to
      remove an impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδηγοὶ
  chosen: guides
  alternatives:
  - leaders
  lexicon: BDAG
  rationale: The noun denotes those who lead or guide others. 'Guides' is the natural
    and established English equivalent here, fitting the metaphor of religious leaders
    directing others.
- source_word: τυφλοί
  chosen: blind
  lexicon: BDAG
  rationale: Used metaphorically of spiritual inability to perceive. 'Blind' preserves
    the vivid rebuke and matches the source adjective directly.
- source_word: διϋλίζοντες
  chosen: straining out
  alternatives:
  - filtering out
  - straining
  lexicon: BDAG
  rationale: The verb refers to filtering liquid so as to remove something. 'Straining
    out' communicates the action idiomatically in English and preserves the image
    of carefully removing an unclean insect from a drink. 'Out' is included to make
    explicit the object being removed.
- source_word: τὸν κώνωπα
  chosen: the gnat
  alternatives:
  - a gnat
  lexicon: BDAG
  rationale: κώνωψ means 'gnat' or 'mosquito-like small insect.' 'Gnat' is the conventional
    and concise rendering. The article is retained as 'the' to mirror the Greek and
    to heighten the proverbial contrast with 'the camel.'
- source_word: τὴν δὲ κάμηλον
  chosen: but swallowing the camel
  alternatives:
  - yet swallowing the camel
  lexicon: BDAG
  rationale: κάμηλος means 'camel.' The contrastive δέ is well represented by 'but,'
    emphasizing the absurd disproportion between meticulous minor avoidance and gross
    major violation.
- source_word: καταπίνοντες
  chosen: swallowing
  alternatives:
  - gulping down
  lexicon: BDAG
  rationale: The participle means 'swallowing down' or 'devouring.' 'Swallowing' is
    direct, vivid, and preserves the hyperbolic image without adding colloquial color.
