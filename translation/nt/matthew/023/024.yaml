theological_decisions:
- issue: Metaphorical force of ritual impurity imagery
  chosen_reading: Retain the concrete image of filtering out an unclean gnat and swallowing
    an unclean camel as a rebuke of hypocritical moral proportion.
  alternative_readings:
  - Render more interpretively as focusing on minor versus major faults without the
    impurity imagery
  rationale: The verse's force depends on the absurdity of meticulous concern over
    a tiny impurity while tolerating a massive one. Preserving the concrete imagery
    best reflects the Greek and avoids paraphrasing beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
