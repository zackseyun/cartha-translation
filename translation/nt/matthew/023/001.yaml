id: MAT.23.1
reference: Matthew 23:1
source:
  edition: SBLGNT
  text: Τότε ὁ Ἰησοῦς ἐλάλησεν τοῖς ὄχλοις καὶ τοῖς μαθηταῖς αὐτοῦ
translation:
  text: Then Jesus spoke to the crowds and to his disciples,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - After that
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence. 'Then' is the most natural
    and concise English equivalent in this context.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name with article used in normal Greek narrative style; English
    omits the article before personal names.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - addressed
  - said
  lexicon: BDAG
  rationale: Aorist of λαλέω commonly means 'speak' or 'talk.' 'Spoke' preserves the
    simple verbal action without adding nuance beyond the Greek. 'Addressed' is possible
    because direct objects follow, but 'spoke to' is closer to the source wording.
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: Dative plural with article indicates the gathered groups of people. 'Crowds'
    reflects the plural form better than singular 'crowd,' while avoiding the slightly
    archaic 'multitudes.'
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining the two recipient groups.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples of him
  lexicon: BDAG
  rationale: Dative plural with possessive genitive. Standard English expresses this
    naturally as 'his disciples.' 'Disciples' is the established and accurate rendering
    of μαθηταί in Gospel contexts.
