theological_decisions:
- issue: Elliptical oath language and implied obligation
  chosen_reading: The first clause is rendered tersely ('it is nothing'), while the
    second clause makes explicit that the speaker is considered obligated by the oath.
  alternative_readings:
  - 'Render both clauses more literally, leaving the implication unstated: ''is nothing
    ... owes'''
  - 'Render the first clause interpretively: ''it means nothing'''
  rationale: The verse critiques casuistic distinctions about binding oaths. The Greek
    itself is elliptical, especially in οὐδέν ἐστιν and ὀφείλει. The chosen rendering
    preserves the first clause's terseness but clarifies the second clause so modern
    readers understand the contrast without importing extra doctrine.
  doctrine_reference: Translation philosophy §§1, 3, 6
