id: MAT.23.16
reference: Matthew 23:16
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, ὁδηγοὶ τυφλοὶ οἱ λέγοντες· Ὃς ἂν ὀμόσῃ ἐν τῷ ναῷ, οὐδέν ἐστιν,
    ὃς δ’ ἂν ὀμόσῃ ἐν τῷ χρυσῷ τοῦ ναοῦ ὀφείλει.
translation:
  text: Woe to you, blind guides, who say, ‘Whoever swears by the temple, it is nothing;
    but whoever swears by the gold of the temple is bound by his oath.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Whoever swears in the temple.' Here 'by the temple'
      reflects the oath formula intended in context.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''it is nothing,'' that is, such an oath is treated as not binding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Standard prophetic/judgment interjection in denunciation contexts; 'Woe'
    preserves the force and familiar rhetorical form of Jesus's woes.
- source_word: ὁδηγοὶ τυφλοὶ
  chosen: blind guides
  alternatives:
  - blind leaders
  lexicon: BDAG
  rationale: A close, natural rendering of the noun-adjective phrase. 'Guides' fits
    ὁδηγοί more directly than 'leaders' and preserves the metaphor of directing others
    while blind.
- source_word: οἱ λέγοντες
  chosen: who say
  alternatives:
  - saying
  lexicon: BDAG
  rationale: The articular participle is naturally rendered in English as a relative
    clause here.
- source_word: Ὃς ἂν ὀμόσῃ
  chosen: Whoever swears
  alternatives:
  - Whoever might swear
  - If anyone swears
  lexicon: BDAG
  rationale: The relative clause with ἄν and aorist subjunctive expresses an indefinite
    general condition; 'Whoever swears' is idiomatic and sufficiently precise.
- source_word: ἐν τῷ ναῷ
  chosen: by the temple
  alternatives:
  - in the temple
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with verbs of swearing in this context
    it functions instrumentally/formulaically for oath language. English idiom requires
    'swears by the temple,' matching the sense of invoking it in an oath.
- source_word: οὐδέν ἐστιν
  chosen: it is nothing
  alternatives:
  - it means nothing
  - he is not bound
  lexicon: BDAG
  rationale: The Greek is terse and elliptical. 'It is nothing' preserves the compact
    form while allowing the implied sense that such an oath is treated as nonbinding.
    A fuller interpretive expansion is reserved for the second clause.
- source_word: χρυσῷ τοῦ ναοῦ
  chosen: the gold of the temple
  alternatives:
  - the temple's gold
  lexicon: BDAG
  rationale: A straightforward genitival rendering that preserves the contrast between
    the sanctuary itself and its gold.
- source_word: ὀφείλει
  chosen: is bound by his oath
  alternatives:
  - is obligated
  - owes it
  - is liable
  lexicon: BDAG
  rationale: The verb means 'to owe/be obligated.' In this oath context, English needs
    the implied object made explicit for clarity. 'Is bound by his oath' communicates
    the intended legal-moral force without wooden obscurity.
