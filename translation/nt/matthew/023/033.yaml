id: MAT.23.33
reference: Matthew 23:33
source:
  edition: SBLGNT
  text: ὄφεις γεννήματα ἐχιδνῶν, πῶς φύγητε ἀπὸ τῆς κρίσεως τῆς γεέννης;
translation:
  text: You snakes, offspring of vipers! How are you to escape from the judgment of
    Gehenna?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the judgment of hell.” Greek: “Gehenna.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄφεις
  chosen: snakes
  alternatives:
  - serpents
  lexicon: BDAG
  rationale: A direct vocative insult. 'Snakes' is natural modern English and preserves
    the force of the metaphor without the slightly archaic tone of 'serpents.'
- source_word: γεννήματα
  chosen: offspring
  alternatives:
  - brood
  - children
  lexicon: BDAG
  rationale: Denotes what is begotten/produced. 'Offspring' is clear and idiomatic
    in English. 'Brood of vipers' is traditional and possible, but 'offspring of vipers'
    more transparently reflects the noun-plus-genitive structure.
- source_word: ἐχιδνῶν
  chosen: vipers
  alternatives:
  - poisonous snakes
  lexicon: BDAG
  rationale: Refers specifically to vipers rather than snakes in general, intensifying
    the denunciation. Retaining 'vipers' preserves the specific image.
- source_word: πῶς
  chosen: How are you to
  alternatives:
  - how will you
  - how can you
  lexicon: BDAG
  rationale: Introduces a rhetorical question about the possibility/prospect of escape.
    'How are you to' captures both the rhetorical force and the future-oriented sense
    without overcommitting to either ability ('can') or mere futurity ('will').
- source_word: φύγητε
  chosen: escape
  alternatives:
  - flee
  lexicon: BDAG
  rationale: The verb means to flee/escape. In English, 'escape' fits best with the
    prepositional phrase 'from the judgment' and communicates the intended result
    of fleeing.
- source_word: κρίσεως
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: BDAG
  rationale: '''Judgment'' is the broad and standard sense here, referring to the
    judicial outcome awaiting them. ''Condemnation'' is interpretively stronger than
    the Greek requires in isolation.'
- source_word: γεέννης
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The Greek term is γέεννα, a specific term with Jewish historical and
    eschatological associations. Following original-language primacy, 'Gehenna' is
    retained rather than flattened to 'hell,' while a footnote preserves the common
    English equivalent.
