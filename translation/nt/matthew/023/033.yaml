theological_decisions:
- issue: Rendering γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The verse speaks of final divine judgment using the term γέεννα. Translating
    it as 'Gehenna' preserves the source-language specificity and Jewish background
    rather than importing all later English associations of 'hell.' Because many readers
    expect 'hell,' that alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §6 (Readable modern English, not archaic or academic)
