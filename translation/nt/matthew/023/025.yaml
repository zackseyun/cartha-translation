theological_decisions:
- issue: Metaphorical referent of the interior uncleanness
  chosen_reading: Keep the imagery focused on the cup and dish themselves ('inside
    they are full') rather than explicitly unpacking the metaphor as the leaders'
    hearts.
  alternative_readings:
  - but inside you are full of greed and self-indulgence
  rationale: The Greek keeps the metaphor at the level of the vessels in this clause,
    even though the referent is obviously the religious leaders. Preserving the image
    avoids importing an interpretive expansion not stated in the text.
  doctrine_reference: Translation philosophy §1, §3
