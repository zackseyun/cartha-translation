id: MAT.23.25
reference: Matthew 23:25
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι καθαρίζετε τὸ ἔξωθεν τοῦ
    ποτηρίου καὶ τῆς παροψίδος, ἔσωθεν δὲ γέμουσιν ἐξ ἁρπαγῆς καὶ ⸀ἀκρασίας.
translation:
  text: Woe to you, scribes and Pharisees, hypocrites! For you clean the outside of
    the cup and the dish, but inside they are full of greed and self-indulgence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but inside it is full of robbery/extortion and lack of self-control.'
      The Greek terms can carry stronger senses of exploitative taking and undisciplined
      excess.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of οὐαί better than softer English
    exclamations.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in Gospel polemical contexts; ''teachers of the law'' is more interpretive.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: Established and contextually precise for moral-religious pretense; 'pretenders'
    is possible but weaker.
- source_word: καθαρίζετε
  chosen: clean
  alternatives:
  - cleanse
  lexicon: BDAG
  rationale: '''Clean'' is natural modern English and adequately conveys the present
    active sense without sounding archaic.'
- source_word: τὸ ἔξωθεν
  chosen: the outside
  alternatives:
  - the exterior
  lexicon: BDAG
  rationale: Direct rendering of the adverbial substantive expression, preserving
    the inside/outside contrast.
- source_word: ποτηρίου
  chosen: cup
  lexicon: BDAG
  rationale: Straightforward lexical equivalent.
- source_word: παροψίδος
  chosen: dish
  alternatives:
  - plate
  - bowl
  lexicon: BDAG
  rationale: A general table vessel is in view; 'dish' is broad and idiomatic in English,
    while 'plate' may be too narrow and 'bowl' too specific.
- source_word: ἔσωθεν
  chosen: inside
  alternatives:
  - within
  lexicon: BDAG
  rationale: Matches the exterior/interior metaphor in clear contemporary English.
- source_word: γέμουσιν
  chosen: they are full
  alternatives:
  - it is full
  lexicon: BDAG
  rationale: The verb is plural, naturally referring to 'the cup and the dish' together,
    so English plural best reflects the Greek syntax.
- source_word: ἁρπαγῆς
  chosen: greed
  alternatives:
  - robbery
  - plunder
  - extortion
  lexicon: BDAG
  rationale: In this metaphorical moral context, the sense is acquisitive grasping
    rather than literal robbery. 'Greed' communicates the inner vice succinctly, though
    the term can also carry nuances of plunder or extortion.
- source_word: ἀκρασίας
  chosen: self-indulgence
  alternatives:
  - lack of self-control
  - excess
  lexicon: BDAG
  rationale: ἀκρασία denotes undisciplined self-gratification or lack of mastery over
    desires. 'Self-indulgence' fits the denunciation and pairs well with 'greed' as
    inward moral corruption.
