id: MAT.23.34
reference: Matthew 23:34
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἰδοὺ ἐγὼ ἀποστέλλω πρὸς ὑμᾶς προφήτας καὶ σοφοὺς καὶ γραμματεῖς·
    ⸀ἐξ αὐτῶν ἀποκτενεῖτε καὶ σταυρώσετε, καὶ ἐξ αὐτῶν μαστιγώσετε ἐν ταῖς συναγωγαῖς
    ὑμῶν καὶ διώξετε ἀπὸ πόλεως εἰς πόλιν·
translation:
  text: Therefore, look, I am sending to you prophets and wise men and scribes. Some
    of them you will kill and crucify, and some of them you will flog in your synagogues
    and persecute from city to city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wise ones' or 'sages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Standard inferential/consequential connective. 'Therefore' is concise,
    natural English and preserves the discourse link to the preceding denunciation.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Retains the deictic/emphatic force without archaic tone. 'Behold' is
    traditional but less natural for modern readers.
- source_word: ἐγὼ ἀποστέλλω
  chosen: I am sending
  alternatives:
  - I send
  - I will send
  lexicon: BDAG
  rationale: Present tense used with vivid/imminent force. 'I am sending' preserves
    the present form while sounding natural in English. 'I send' is possible but stiffer;
    'I will send' over-regularizes the Greek present.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - toward you
  - against you
  lexicon: BDAG
  rationale: In this context πρός with accusative marks direction toward the audience;
    'to you' is the natural idiomatic rendering.
- source_word: προφήτας
  chosen: prophets
  lexicon: BDAG
  rationale: Direct and standard rendering of the noun.
- source_word: σοφοὺς
  chosen: wise men
  alternatives:
  - wise ones
  - sages
  lexicon: BDAG
  rationale: Masculine plural adjective used substantivally. 'Wise men' preserves
    the masculine form and representative force in keeping with the gender-accurate
    policy. 'Sages' is possible but slightly interpretive.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - scholars of the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct rendering and preserves the recognizable
    Jewish leadership category without over-expansion.'
- source_word: ἐξ αὐτῶν ... καὶ ἐξ αὐτῶν
  chosen: Some of them ... and some of them
  alternatives:
  - From among them ... and from among them
  - Some from among them ... and some from among them
  lexicon: BDAG
  rationale: The repeated ἐξ αὐτῶν is partitive, indicating that only some of those
    sent will suffer each action. Rendering it as 'some of them' communicates the
    sense clearly in idiomatic English and preserves the repetition.
- source_word: ἀποκτενεῖτε
  chosen: you will kill
  alternatives:
  - you will put to death
  lexicon: BDAG
  rationale: Straightforward future active. 'Kill' is direct and natural; 'put to
    death' is more formal but not required here.
- source_word: σταυρώσετε
  chosen: crucify
  alternatives:
  - impale on a cross
  lexicon: BDAG
  rationale: Standard rendering for σταυρόω. 'Crucify' is established and precise.
- source_word: μαστιγώσετε
  chosen: flog
  alternatives:
  - whip
  - scourge
  lexicon: BDAG
  rationale: '''Flog'' is clear modern English and suitably severe. ''Scourge'' is
    more traditional but less common.'
- source_word: ἐν ταῖς συναγωγαῖς ὑμῶν
  chosen: in your synagogues
  alternatives:
  - in your assembly halls
  lexicon: BDAG
  rationale: '''Synagogues'' is the standard rendering and preserves the historical-religious
    setting. The possessive ''your'' is retained from the Greek.'
- source_word: διώξετε
  chosen: persecute
  alternatives:
  - pursue
  - hunt down
  lexicon: BDAG
  rationale: In this hostile religious context, 'persecute' best captures sustained
    oppressive pursuit, not mere physical chasing.
- source_word: ἀπὸ πόλεως εἰς πόλιν
  chosen: from city to city
  alternatives:
  - from one city to another
  lexicon: BDAG
  rationale: Idiomatic English preserving the repeated movement and ongoing pursuit.
