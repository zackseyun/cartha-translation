theological_decisions:
- issue: Speaker's authority in 'I am sending'
  chosen_reading: 'Retained the first-person claim without softening: Jesus speaks
    as the one who sends prophets, wise men, and scribes.'
  alternative_readings:
  - A purely prophetic announcement that God will send them
  rationale: The Greek explicitly has ἐγὼ ἀποστέλλω ('I am sending'). The translation
    preserves the text's high Christological force without adding explanation beyond
    the wording itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), including homoousios language;
    Translation philosophy #1 and #3'
- issue: Masculine language in σοφοὺς
  chosen_reading: Rendered as 'wise men' rather than a gender-neutral term.
  alternative_readings:
  - wise ones
  - sages
  rationale: The Greek form is masculine plural and likely representative of identifiable
    commissioned persons. Per the gender-accurate policy, the English should reflect
    the source's grammatical and referential shape unless context clearly demands
    neutralization.
  doctrine_reference: 'Translation philosophy #4'
