id: MAT.23.39
reference: Matthew 23:39
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν, οὐ μή με ἴδητε ἀπ’ ἄρτι ἕως ἂν εἴπητε· Εὐλογημένος ὁ ἐρχόμενος
    ἐν ὀνόματι κυρίου.
translation:
  text: For I tell you, from now on you will certainly not see me until you say, ‘Blessed
    is the one who comes in the name of the Lord.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will by no means see me from now on until you say.' The Greek uses
      an emphatic negation (οὐ μή).
    reason: lexical_alternative
  - marker: b
    text: A quotation/allusion to Psalm 118:26.
    reason: cross_reference
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  - I tell you indeed
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is a common direct-address formula. 'I tell you'
    is natural modern English; γάρ is retained as 'For' to preserve the explanatory
    force linking this statement to the preceding lament/judgment.
- source_word: οὐ μή
  chosen: will certainly not
  alternatives:
  - will by no means
  - shall certainly not
  - will never
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not' preserves the force in readable modern English without archaic 'shall' or
    overly idiomatic 'never,' which can slightly flatten the construction's formal
    emphasis.
- source_word: ἴδητε
  chosen: see
  alternatives:
  - catch sight of
  - behold
  lexicon: BDAG
  rationale: From ὁράω, here best rendered 'see.' 'Behold' is too archaic for the
    translation philosophy, and 'catch sight of' is too colloquial.
- source_word: ἀπ’ ἄρτι
  chosen: from now on
  alternatives:
  - from this time
  - henceforth
  lexicon: BDAG
  rationale: ἀπ’ ἄρτι denotes time beginning at the present moment. 'From now on'
    is idiomatic contemporary English and preserves the temporal starting point.
- source_word: ἕως ἂν εἴπητε
  chosen: until you say
  alternatives:
  - until the time when you say
  - until you should say
  lexicon: BDAG
  rationale: ἕως ἄν with the subjunctive marks a future contingency/terminus. 'Until
    you say' is the standard and clear rendering in English.
- source_word: Εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  - Favored
  lexicon: BDAG
  rationale: The participial/adjectival form in this citation is conventionally and
    accurately rendered 'Blessed.' This preserves the scriptural resonance of Psalm
    118:26/LXX usage.
- source_word: ὁ ἐρχόμενος
  chosen: the one who comes
  alternatives:
  - he who comes
  - the coming one
  lexicon: BDAG
  rationale: The articular participle is best represented by 'the one who comes.'
    'He who comes' is more traditional but less natural; 'the coming one' could suggest
    a titular nuance stronger than the immediate citation requires.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - in the Lord's name
  lexicon: BDAG
  rationale: This preserves the prepositional phrase and the scriptural cadence of
    the quotation. κύριος is rendered 'Lord' per the project's default for Kyrios.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines, with default rendering
    'Lord.' The article is naturally expressed in English within the phrase 'the name
    of the Lord.'
