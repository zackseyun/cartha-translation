theological_decisions:
- issue: Force of Jesus' statement about future seeing and confession
  chosen_reading: A solemn declaration of judicial absence until a future acknowledgment
    expressed in the quoted blessing, without specifying the exact historical or eschatological
    moment beyond the text.
  alternative_readings:
  - A reference specifically to the triumphal entry
  - A reference specifically to the second coming
  - A reference to Israel's future repentance
  rationale: The Greek states that they will not see him from now until they say the
    quoted words, but it does not explicitly define the precise event or timeline.
    To preserve theological tension, the translation remains textually precise and
    does not encode one interpretive scheme into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
