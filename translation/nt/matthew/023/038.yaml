theological_decisions:
- issue: Referent of 'your house'
  chosen_reading: Kept as 'your house' without specifying temple or Jerusalem in the
    main text.
  alternative_readings:
  - the temple
  - Jerusalem
  - the nation/house of Israel
  rationale: The immediate context strongly suggests the temple and Jerusalem under
    judgment, but the Greek expression is broader and metaphorical. Preserving 'house'
    maintains the text's prophetic force and avoids importing a narrower interpretive
    conclusion into the translation itself.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
