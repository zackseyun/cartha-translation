id: MAT.23.38
reference: Matthew 23:38
source:
  edition: SBLGNT
  text: ἰδοὺ ἀφίεται ὑμῖν ὁ οἶκος ὑμῶν ⸀ἔρημος.
translation:
  text: Look, your house is left to you desolate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your temple'; the phrase 'your house' may refer specifically to the
      temple, though the Greek leaves the expression broader.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as the natural modern attention-getter 'Look' rather than the
    more traditional but archaic 'Behold.' This preserves the force of solemn announcement
    in readable English.
- source_word: ἀφίεται
  chosen: is left
  alternatives:
  - is abandoned
  - is forsaken
  - is being left
  lexicon: BDAG
  rationale: The present passive indicative of ἀφίημι here conveys that the house
    is being left/abandoned. 'Is left' is concise and preserves the passive form without
    overinterpreting agency. 'Is abandoned' is possible, but slightly more interpretive.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is retained with 'to you,' matching the Greek construction
    and preserving the sense that the house is handed over or left in their possession/judgment.
- source_word: ὁ οἶκος ὑμῶν
  chosen: your house
  alternatives:
  - your household
  - your temple
  - your house
  lexicon: BDAG
  rationale: Literally 'your house.' In context this likely refers to Jerusalem and
    especially the temple establishment, but the text itself says 'house,' so the
    translation preserves the metaphor without narrowing it in the main text.
- source_word: ἔρημος
  chosen: desolate
  alternatives:
  - deserted
  - laid waste
  - empty
  lexicon: BDAG
  rationale: '''Desolate'' best captures the adjective''s sense of abandonment and
    devastation in prophetic/judgment contexts. It is more theologically and literarily
    fitting than the flatter ''empty'' or merely spatial ''deserted.'''
