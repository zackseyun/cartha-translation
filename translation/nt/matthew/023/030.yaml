id: MAT.23.30
reference: Matthew 23:30
source:
  edition: SBLGNT
  text: καὶ λέγετε· Εἰ ⸀ἤμεθα ἐν ταῖς ἡμέραις τῶν πατέρων ἡμῶν, οὐκ ἂν ⸁ἤμεθα ⸂αὐτῶν
    κοινωνοὶ⸃ ἐν τῷ αἵματι τῶν προφητῶν·
translation:
  text: and you say, ‘If we had been living in the days of our fathers, we would not
    have been partners with them in the blood of the prophets.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharers with them' or 'participants with them'; the Greek term can denote
      shared involvement or complicity.
    reason: lexical_alternative
  - marker: b
    text: That is, participation in the shedding of the prophets' blood; a claim of
      not sharing in their ancestors' bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Present indicative, second person plural, rendered as a direct present
    address in Jesus' denunciation. English simple present fits the discourse naturally.
- source_word: Εἰ ἤμεθα
  chosen: If we had been living
  alternatives:
  - If we had been
  - Had we been
  lexicon: BDAG
  rationale: The imperfect of εἰμί in this contrary-to-fact condition points to a
    hypothetical past situation. 'Had been living' brings out the situational force
    idiomatically in English better than the bare 'had been' while staying within
    the source sense.
- source_word: ἐν ταῖς ἡμέραις
  chosen: in the days
  alternatives:
  - during the days
  - in the time
  lexicon: BDAG
  rationale: A standard temporal idiom meaning 'during the time of.' 'In the days'
    preserves the biblical cadence and is clear in modern English.
- source_word: τῶν πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: πατέρων is literally 'fathers.' Per the gender-accurate philosophy, the
    masculine form is retained rather than neutralized to 'ancestors,' since the text
    explicitly invokes forefathers.
- source_word: οὐκ ἂν ἤμεθα
  chosen: we would not have been
  alternatives:
  - we would not be
  lexicon: BDAG
  rationale: The combination of οὐκ ἄν with the imperfect expresses the apodosis of
    a contrary-to-fact condition. English pluperfect conditional best conveys the
    past unreal sense.
- source_word: αὐτῶν κοινωνοὶ
  chosen: partners with them
  alternatives:
  - sharers with them
  - participants with them
  - accomplices of theirs
  lexicon: BDAG
  rationale: κοινωνοί denotes those who share in or participate with others. 'Partners
    with them' is natural English and preserves the idea of complicity/participation
    without overinterpreting to the stronger 'accomplices' in the main text.
- source_word: ἐν τῷ αἵματι
  chosen: in the blood
  alternatives:
  - in shedding the blood
  - in the murder
  lexicon: BDAG
  rationale: The prepositional phrase is retained fairly literally. In context it
    denotes participation in bloodguilt for the prophets' deaths. The more explicit
    'in shedding the blood' is interpretive, so the literal form is preferred in the
    main text.
- source_word: τῶν προφητῶν
  chosen: of the prophets
  alternatives:
  - of the prophetic messengers
  lexicon: BDAG
  rationale: προφητῶν is straightforwardly 'prophets,' the established and accurate
    rendering in this context.
