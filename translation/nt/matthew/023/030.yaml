theological_decisions:
- issue: Degree of complicity implied by κοινωνοὶ ἐν τῷ αἵματι
  chosen_reading: The statement denies participation in the bloodguilt of those who
    killed the prophets, rendered as 'partners with them in the blood of the prophets.'
  alternative_readings:
  - '''accomplices in the murder of the prophets'''
  - '''sharers in the bloodguilt of the prophets'''
  rationale: The verse concerns moral participation in ancestral violence against
    God's prophets. The chosen wording preserves the Greek's relational language ('partners/sharers')
    and the concrete image of 'blood' without collapsing it into a fully paraphrased
    theological explanation. This keeps the text's rhetorical force while avoiding
    overtranslation.
  doctrine_reference: Translation philosophy §§1, 3, 5
