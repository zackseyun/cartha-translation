id: MAT.23.26
reference: Matthew 23:26
source:
  edition: SBLGNT
  text: Φαρισαῖε τυφλέ, καθάρισον πρῶτον τὸ ἐντὸς τοῦ ποτηρίου ⸂καὶ τῆς παροψίδος⸃,
    ἵνα γένηται καὶ τὸ ἐκτὸς ⸀αὐτοῦ καθαρόν.
translation:
  text: Blind Pharisee, first clean the inside of the cup and the dish, so that its
    outside also may become clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plate,' 'bowl,' or 'platter' for 'dish' (παροψίς), a food-serving vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φαρισαῖε
  chosen: Pharisee
  alternatives:
  - you Pharisee
  lexicon: BDAG
  rationale: Vocative singular used as direct address; 'Pharisee' preserves the specific
    group designation without expansion.
- source_word: τυφλέ
  chosen: Blind
  alternatives:
  - blind one
  lexicon: BDAG
  rationale: Predicate-like vocative insult/metaphor meaning spiritually blind; simple
    'Blind' is idiomatic and forceful in English.
- source_word: καθάρισον
  chosen: clean
  alternatives:
  - cleanse
  - purify
  lexicon: BDAG
  rationale: Aorist imperative calls for decisive action. 'Clean' fits the vessel
    imagery in natural English better than 'cleanse,' while still allowing the moral
    metaphor to remain.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Marks priority in sequence and logic; 'first' is concise and preserves
    the contrast with the resulting outer cleanliness.
- source_word: τὸ ἐντὸς
  chosen: the inside
  alternatives:
  - the inner part
  - what is inside
  lexicon: BDAG
  rationale: Substantivized adverb referring to the interior of the object; 'the inside'
    is the most natural English equivalent.
- source_word: ποτηρίου
  chosen: of the cup
  alternatives:
  - of the drinking cup
  lexicon: BDAG
  rationale: Standard vessel term; 'cup' is the normal English rendering in Gospel
    contexts.
- source_word: καὶ τῆς παροψίδος
  chosen: and the dish
  alternatives:
  - and the plate
  - and the bowl
  lexicon: BDAG
  rationale: παροψίς denotes a dish/platter used for food. 'Dish' is broad, natural
    modern English and pairs well with 'cup' without over-specifying shape.
- source_word: ἵνα γένηται
  chosen: so that ... may become
  alternatives:
  - so that ... may be
  - in order that ... may become
  lexicon: BDAG
  rationale: 'γίνομαι more naturally means ''become'' than simple stative ''be.''
    This preserves the resultative sense: inner cleansing leads to outer cleanliness.'
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: Adverbial καί adds the outer part as a corresponding result; 'also' is
    the clearest English equivalent.
- source_word: τὸ ἐκτὸς
  chosen: its outside
  alternatives:
  - the outside
  - the exterior
  lexicon: BDAG
  rationale: Substantivized adverb parallel to 'the inside.' Rendering with possessive
    'its' makes the English sentence natural and reflects the following αὐτοῦ.
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - of it
  - their
  lexicon: BDAG
  rationale: Genitive singular pronoun referring back to the cup/dish complex as a
    unit in the metaphor. 'Its' is idiomatic English.
- source_word: καθαρόν
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: Maintains the concrete vessel imagery while allowing the moral implication
    to remain implicit, as in the Greek.
