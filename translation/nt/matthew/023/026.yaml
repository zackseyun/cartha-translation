theological_decisions:
- issue: Concrete vessel imagery versus explicit moral interpretation
  chosen_reading: Retain the literal image of cleaning the inside and outside of the
    cup and dish without making the metaphor explicit in the main text.
  alternative_readings:
  - Interpretive renderings such as 'clean your inner life first, so your outward
    life may also be clean'
  rationale: Jesus' saying intentionally works as metaphor through concrete imagery.
    Making the moral referent explicit would paraphrase beyond the Greek and reduce
    the rhetorical force.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text says without importing interpretation.'
