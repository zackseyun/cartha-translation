id: MAT.23.21
reference: Matthew 23:21
source:
  edition: SBLGNT
  text: καὶ ὁ ὀμόσας ἐν τῷ ναῷ ὀμνύει ἐν αὐτῷ καὶ ἐν τῷ ⸀κατοικοῦντι αὐτόν·
translation:
  text: And whoever swears by the temple swears by it and by the One dwelling in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple ... in it'; the Greek preposition is literally 'in,' but
      in this oath formula it carries the sense 'by.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀμόσας
  chosen: whoever swears
  alternatives:
  - the one who swears
  - he who swears
  lexicon: BDAG
  rationale: The articular aorist participle functions substantivally, referring generically
    to any person who swears. 'Whoever swears' is natural modern English and preserves
    the generic force without unnecessary masculine wording.
- source_word: ἐν τῷ ναῷ
  chosen: by the temple
  alternatives:
  - in the temple
  lexicon: BDAG
  rationale: Although ἐν normally means 'in,' in oath formulas in this immediate context
    it carries the sense 'by,' indicating the object invoked in swearing. This matches
    the parallel structure in the surrounding verses and idiomatic English oath language.
- source_word: ναῷ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple proper. 'Temple' is the clearer
    and more idiomatic rendering in this context, especially since the discourse concerns
    oath formulas tied to the Jerusalem temple.
- source_word: ὀμνύει
  chosen: swears
  alternatives:
  - is swearing
  - swears an oath
  lexicon: BDAG
  rationale: Present indicative states the general principle resulting from the act.
    'Swears' is concise and fits the proverbial/legal style.
- source_word: ἐν αὐτῷ
  chosen: by it
  alternatives:
  - in it
  lexicon: BDAG
  rationale: As with the earlier ἐν, the preposition in this oath context is best
    rendered 'by,' referring back to the temple as the object invoked.
- source_word: τῷ κατοικοῦντι αὐτόν
  chosen: the One dwelling in it
  alternatives:
  - the one who dwells in it
  - him who dwells in it
  lexicon: BDAG
  rationale: The present participle κατοικοῦντι is substantival and refers to God
    as the one dwelling in the temple. Capitalizing 'One' signals a divine referent
    in English without adding content beyond the context. 'Dwelling in it' preserves
    the participial aspect and the temple imagery.
- source_word: αὐτόν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun refers to ναός, which is grammatically masculine in Greek
    but denotes an inanimate object; English therefore uses 'it.'
