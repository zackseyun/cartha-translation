theological_decisions:
- issue: Identification of the one dwelling in the temple
  chosen_reading: the One dwelling in it refers to God
  alternative_readings:
  - a more implicit 'the one who dwells in it' without capitalization
  rationale: In context Jesus teaches that swearing by the temple implicates God,
    whose presence sanctifies it. The capitalization is an English convention to reflect
    the clear referent, not a doctrinal expansion.
