theological_decisions:
- issue: Rendering Matthew's phrase βασιλεία τῶν οὐρανῶν
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the kingdom of the heavens
  rationale: The phrase is translated in its familiar Matthean sense without importing a distinction from 'kingdom of God.' The singular 'heaven' is idiomatic English while preserving the Jewish reverential circumlocution reflected in Matthew.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Generic ἀνθρώπων
  chosen_reading: people
  alternative_readings:
  - men
  - human beings
  rationale: The Greek is generic, not male-specific. Rendering it as 'people' follows the project's gender-accurate principle without flattening meaning.
  doctrine_reference: Translation philosophy §4
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/023/013.json
  category: awkward_english
  tier: 1
  from: allow those who are entering to enter
  to: let in those who are entering
  rationale: The repetition in '...those who are entering to enter' directly mirrors the Greek (εἰσερχομένους...εἰσελθεῖν) but is stylistically clumsy in English. A more natural and concise phrasing like 'let in those who are entering' captures the same meaning effectively without the awkward repetition, which is a reasonable trade-off for an optimal-equivalence translation.
