id: MAT.23.13
reference: Matthew 23:13
source:
  edition: SBLGNT
  text: Οὐαὶ ⸀δὲ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι κλείετε τὴν βασιλείαν τῶν οὐρανῶν ἔμπροσθεν τῶν ἀνθρώπων· ὑμεῖς γὰρ οὐκ εἰσέρχεσθε, οὐδὲ τοὺς εἰσερχομένους ἀφίετε ⸀εἰσελθεῖν.
translation:
  text: But woe to you, scribes and Pharisees, hypocrites! Because you shut the kingdom of heaven in front of people; for you do not enter, nor do you let in those who are entering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the kingdom of the heavens.' Matthew regularly uses this expression where other contexts may say 'kingdom of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those trying to enter.' The Greek participle can denote those in the process of entering or seeking to enter.
    reason: lexical_alternative
  - marker: c
    text: Or 'allow those who are entering to enter'.
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐαὶ
  chosen: woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of οὐαί better than softer English options like 'alas.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: δέ here marks continuation with mild contrast/transition in the series of woes; 'But' gives natural English discourse force.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for γραμματεῖς in Gospel contexts; ''teachers of the law'' is more interpretive.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: The established English term accurately conveys moral-religious pretense in this context.
- source_word: κλείετε
  chosen: shut
  alternatives:
  - close
  - lock
  lexicon: BDAG
  rationale: '''Shut'' is idiomatic with a direct object like ''the kingdom'' and preserves the metaphor of barring access.'
- source_word: βασιλείαν τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is the natural English equivalent; the more literal plural 'heavens' is possible but less idiomatic in English here.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: in front of people
  alternatives:
  - before men
  - in people's faces
  lexicon: BDAG
  rationale: ἔμπροσθεν denotes spatial/metaphorical placement before others. 'In front of people' is clear modern English without the archaic generic 'men.'
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: The referent is generic humanity, not specifically males. 'People' is gender-accurate to the source intent.
- source_word: εἰσέρχεσθε
  chosen: enter
  alternatives:
  - go in
  lexicon: BDAG
  rationale: '''Enter'' is concise and matches the kingdom-access metaphor.'
- source_word: τοὺς εἰσερχομένους
  chosen: those who are entering
  alternatives:
  - those trying to enter
  - those entering
  lexicon: BDAG
  rationale: The present participle suggests persons in the process of entering or seeking entry. 'Those who are entering' preserves the aspect without over-interpreting it as merely attempted action.
- source_word: ἀφίετε
  chosen: allow
  alternatives:
  - permit
  - let
  lexicon: BDAG
  rationale: In this construction ἀφίημι means to permit/allow. 'Allow' is natural modern English and preserves the sense of withholding permission.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go in
  lexicon: BDAG
  rationale: Completes the infinitival construction naturally and consistently with εἰσέρχομαι elsewhere in the verse.
