theological_decisions:
- issue: Referent of 'the one seated upon it'
  chosen_reading: A reverential circumlocution for God enthroned in heaven
  alternative_readings:
  - a more indefinite 'the one seated there' without explicit identification
  rationale: The immediate phrase 'the throne of God' makes the referent clear, and
    the verse's logic is that swearing by heaven implicates God himself. The translation
    preserves the circumlocution rather than replacing it with 'God' in the main text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
