id: MAT.23.22
reference: Matthew 23:22
source:
  edition: SBLGNT
  text: καὶ ὁ ὀμόσας ἐν τῷ οὐρανῷ ὀμνύει ἐν τῷ θρόνῳ τοῦ θεοῦ καὶ ἐν τῷ καθημένῳ ἐπάνω
    αὐτοῦ.
translation:
  text: And whoever swears by heaven swears by the throne of God and by the one seated
    upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one sitting on it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀμόσας
  chosen: whoever swears
  alternatives:
  - the one who swore
  - he who swears
  lexicon: BDAG
  rationale: The articular aorist participle functions generically/substantivally.
    English idiom is best captured by 'whoever swears' rather than a rigid past-tense
    participial form, since the saying states a general principle.
- source_word: ἐν
  chosen: by
  alternatives:
  - in
  lexicon: BDAG
  rationale: In oath formulas, ἐν with the dative is idiomatically rendered 'by' in
    English ('swear by heaven'), not the more spatially literal 'in.' This same idiomatic
    force applies to each repeated ἐν phrase in the verse.
- source_word: οὐρανῷ
  chosen: heaven
  alternatives:
  - the sky
  lexicon: BDAG
  rationale: In this Jewish-religious context οὐρανός refers to heaven, not merely
    the physical sky, especially as it is immediately linked with God's throne.
- source_word: ὀμνύει
  chosen: swears
  alternatives:
  - is swearing
  lexicon: BDAG
  rationale: The present indicative expresses a general truth; simple present English
    is the most natural rendering.
- source_word: θρόνῳ τοῦ θεοῦ
  chosen: the throne of God
  alternatives:
  - God's throne
  lexicon: BDAG
  rationale: Both are accurate; 'the throne of God' preserves the explicit genitive
    structure and solemn cadence of the Greek.
- source_word: τῷ καθημένῳ
  chosen: the one seated
  alternatives:
  - the one sitting
  - him who sits
  lexicon: BDAG
  rationale: The present middle/passive participle of κάθημαι denotes the one enthroned
    there. 'The one seated' is natural, reverent English and fits the throne imagery.
- source_word: ἐπάνω αὐτοῦ
  chosen: upon it
  alternatives:
  - on it
  - above it
  lexicon: BDAG
  rationale: Given the throne context, ἐπάνω with the genitive is best rendered 'upon
    it,' referring back to the throne. 'Above it' would suggest spatial separation
    rather than enthronement.
