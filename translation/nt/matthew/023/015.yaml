theological_decisions:
- issue: Rendering γεέννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The Greek text uses γεέννα, a term with Jewish historical and eschatological
    background. Following original-language primacy, the translation preserves the
    term rather than flattening it to the more generalized English 'hell.' The common
    alternative is preserved in a footnote for reader familiarity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the masculine singular reference after προσήλυτον
  chosen_reading: when he becomes one ... make him
  alternative_readings:
  - when such a person becomes one ... make that person
  rationale: The Greek uses masculine singular forms, and the doctrine calls for gender-accurate
    rather than gender-neutral rendering where that matches the source's intent. Here
    the singular masculine is retained in natural English.
  doctrine_reference: Translation philosophy §4
