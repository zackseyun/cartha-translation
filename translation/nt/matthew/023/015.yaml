id: MAT.23.15
reference: Matthew 23:15
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι περιάγετε τὴν θάλασσαν
    καὶ τὴν ξηρὰν ποιῆσαι ἕνα προσήλυτον, καὶ ὅταν γένηται ποιεῖτε αὐτὸν υἱὸν γεέννης
    διπλότερον ὑμῶν.
translation:
  text: Woe to you, scribes and Pharisees, hypocrites! Because you travel over sea
    and land to make one convert, and when he becomes one, you make him twice as much
    a son of Gehenna as yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “proselyte.”
    reason: lexical_alternative
  - marker: b
    text: Or “a son of hell.” Greek “a son of Gehenna.”
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of οὐαί better than softer English
    options.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: Traditional and accurate for the recognized Jewish scholarly group addressed
    by Jesus; alternatives are more interpretive.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish sect.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: Best established English equivalent in this context of moral-religious
    pretense.
- source_word: περιάγετε
  chosen: travel over
  alternatives:
  - go around
  - cross
  lexicon: BDAG
  rationale: Conveys extensive effort and movement without over-literal awkwardness.
    The phrase with sea and land idiomatically indicates traversing widely.
- source_word: τὴν θάλασσαν καὶ τὴν ξηρὰν
  chosen: sea and land
  alternatives:
  - the sea and the dry land
  lexicon: BDAG
  rationale: Natural English rendering of the merism; 'dry land' is more literal but
    less idiomatic here.
- source_word: ποιῆσαι ἕνα προσήλυτον
  chosen: to make one convert
  alternatives:
  - to make one proselyte
  lexicon: BDAG
  rationale: '''Convert'' communicates the sense accessibly in modern English. ''Proselyte''
    is more formal and closer to the loanword, so it is preserved in a footnote.'
- source_word: ὅταν γένηται
  chosen: when he becomes one
  alternatives:
  - when he becomes one of them
  - when he is made
  lexicon: BDAG
  rationale: Makes explicit the implied result of becoming a convert while preserving
    the singular masculine reference in the Greek.
- source_word: υἱὸν γεέννης
  chosen: a son of Gehenna
  alternatives:
  - a child of hell
  - a son of hell
  lexicon: BDAG
  rationale: Gehenna is the Greek term actually used and carries important Second
    Temple/Jewish eschatological associations. 'Son of Gehenna' preserves the Semitic
    idiom and avoids importing later English connotations of 'hell' without note.
- source_word: διπλότερον ὑμῶν
  chosen: twice as much ... as yourselves
  alternatives:
  - twice as much as you
  - more than twice as much as you
  lexicon: BDAG
  rationale: Represents the comparative force of διπλότερον with clear modern English.
    'Yourselves' fits the reflexive-like contrast in direct address.
