id: MAT.23.4
reference: Matthew 23:4
source:
  edition: SBLGNT
  text: δεσμεύουσιν ⸀δὲ φορτία ⸀βαρέα καὶ ἐπιτιθέασιν ἐπὶ τοὺς ὤμους τῶν ἀνθρώπων,
    ⸂αὐτοὶ δὲ τῷ⸃ δακτύλῳ αὐτῶν οὐ θέλουσιν κινῆσαι αὐτά.
translation:
  text: They tie up heavy burdens and lay them on the shoulders of men, but they themselves
    are unwilling to move them with their finger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people'; Greek 'men' (anthrōpōn) is used here in a representative sense
      for human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμεύουσιν
  chosen: tie up
  alternatives:
  - bind
  - bundle up
  lexicon: BDAG
  rationale: The verb denotes fastening or binding together. 'Tie up' is idiomatic
    modern English and fits the image of preparing burdens to be placed on others.
    'Bind' is possible but can sound less natural here.
- source_word: φορτία βαρέα
  chosen: heavy burdens
  alternatives:
  - heavy loads
  - burdensome loads
  lexicon: BDAG
  rationale: φορτία refers to loads/burdens, and βαρέα adds the sense of weight or
    oppressiveness. 'Heavy burdens' preserves both the literal image and the metaphorical
    force of oppressive demands.
- source_word: ἐπιτιθέασιν ἐπὶ τοὺς ὤμους
  chosen: lay them on the shoulders
  alternatives:
  - place them on the shoulders
  - put them on the backs
  lexicon: BDAG
  rationale: ἐπιτίθημι with ἐπί conveys placing something upon. 'Lay them on the shoulders'
    is natural English and keeps the concrete bodily image present in the Greek.
- source_word: τῶν ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - of human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic for human beings, but the translation philosophy
    prefers gender-accurate rendering where the source uses a masculine plural with
    representative force. 'Men' preserves the form and traditional rhetorical force;
    the generic sense can be clarified in a footnote.
- source_word: αὐτοὶ δὲ
  chosen: but they themselves
  alternatives:
  - but they
  - yet they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek. 'They themselves' preserves the contrast
    between what they impose on others and what they refuse to do.
- source_word: τῷ δακτύλῳ αὐτῶν
  chosen: with their finger
  alternatives:
  - with a finger of theirs
  - with even their finger
  lexicon: BDAG
  rationale: The singular 'finger' is the Greek form and works idiomatically in English
    to express minimal effort. It heightens the hypocrisy by stressing that they will
    not exert even the slightest effort.
- source_word: οὐ θέλουσιν κινῆσαι αὐτά
  chosen: are unwilling to move them
  alternatives:
  - do not want to move them
  - will not lift them
  - are not willing to budge them
  lexicon: BDAG
  rationale: θέλω emphasizes volition, not mere inability. κινέω means move. 'Are
    unwilling to move them' best captures the deliberate refusal in clear modern English.
    'Lift' is interpretive and less directly tied to κινέω.
