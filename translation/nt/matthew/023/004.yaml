theological_decisions:
- issue: Interpretation of the burdens as literal or metaphorical
  chosen_reading: Retain the concrete image 'heavy burdens' without explicating the
    referent.
  alternative_readings:
  - Interpret explicitly as legal demands or religious regulations
  rationale: In context Jesus is criticizing the scribes and Pharisees for imposing
    oppressive obligations, but the Greek itself uses the image of burdens without
    naming the obligations. Preserving the metaphor avoids importing a narrower doctrinal
    interpretation than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
