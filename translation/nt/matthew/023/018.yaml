id: MAT.23.18
reference: Matthew 23:18
source:
  edition: SBLGNT
  text: καί· Ὃς ⸀ἂν ὀμόσῃ ἐν τῷ θυσιαστηρίῳ, οὐδέν ἐστιν, ὃς δ’ ἂν ὀμόσῃ ἐν τῷ δώρῳ
    τῷ ἐπάνω αὐτοῦ ὀφείλει.
translation:
  text: And, ‘Whoever swears by the altar, it is nothing; but whoever swears by the
    gift on top of it is obligated.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the offering.' The Greek word can denote a gift presented to God
      in the temple.
    reason: lexical_alternative
  - marker: b
    text: That is, according to the teaching Jesus is condemning, an oath by the altar
      'counts for nothing,' but an oath by the gift on it is considered binding.
    reason: cultural_note
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - Also
  - Again
  lexicon: BDAG
  rationale: Continues the series of quoted teachings being condemned; simple connective
    'And' fits the discourse flow.
- source_word: Ὃς ἂν ... ὀμόσῃ / ὃς δ’ ἂν ... ὀμόσῃ
  chosen: Whoever swears ... but whoever swears
  alternatives:
  - Whoever might swear
  - If anyone swears
  lexicon: BDAG
  rationale: ὅς + ἄν with aorist subjunctive expresses an indefinite general condition.
    'Whoever swears' is idiomatic modern English and preserves the generic force.
- source_word: ἐν τῷ θυσιαστηρίῳ
  chosen: by the altar
  alternatives:
  - in the altar
  - with the altar
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with verbs of swearing it functions instrumentally/objectively
    in this idiom, best rendered 'by the altar' in English oath language.
- source_word: θυσιαστήριον
  chosen: altar
  lexicon: BDAG
  rationale: Standard and precise rendering for the sacrificial altar in the temple
    context.
- source_word: οὐδέν ἐστιν
  chosen: it is nothing
  alternatives:
  - it means nothing
  - he is bound by nothing
  lexicon: BDAG
  rationale: The phrase reflects the scribes' and Pharisees' casuistic claim that
    such an oath counts for nothing. 'It is nothing' stays close to the Greek while
    remaining intelligible.
- source_word: ἐν τῷ δώρῳ
  chosen: by the gift
  alternatives:
  - by the offering
  lexicon: BDAG
  rationale: δῶρον in temple context refers to the gift/offering presented on the
    altar. 'Gift' is the more direct lexical equivalent; the cultic setting is clarified
    by context.
- source_word: τῷ ἐπάνω αὐτοῦ
  chosen: on top of it
  alternatives:
  - upon it
  - that is on it
  lexicon: BDAG
  rationale: ἐπάνω with genitive indicates position above/on. 'On top of it' is natural
    modern English and clearly refers back to the altar.
- source_word: ὀφείλει
  chosen: is obligated
  alternatives:
  - is bound
  - owes it
  - is liable
  lexicon: BDAG
  rationale: In oath context ὀφείλω conveys being under obligation. 'Is obligated'
    communicates the legal-moral force without archaic phrasing.
