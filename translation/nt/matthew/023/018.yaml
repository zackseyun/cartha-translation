theological_decisions:
- issue: Implied object of obligation in oath formula
  chosen_reading: Render ὀφείλει as 'is obligated' without adding an explicit object
    such as 'to perform it' or 'to keep his oath.'
  alternative_readings:
  - is bound by his oath
  - is obligated to fulfill it
  rationale: The Greek leaves the object unstated; adding one would interpret rather
    than translate. The broader context makes clear that obligation to the oath is
    in view, but the main text preserves the terseness of the source.
  doctrine_reference: Translation philosophy §§1, 3, 5
