theological_decisions:
- issue: Scope of Jesus' prohibition
  chosen_reading: Render the saying as a direct prohibition against assigning ultimate
    spiritual honorific fatherhood to anyone on earth, without paraphrasing it into
    an absolute ban on all uses of 'father.'
  alternative_readings:
  - Interpret as an absolute prohibition of every human use of 'father'
  - Interpret as merely hyperbolic and therefore soften the command in translation
  rationale: The Greek is a stark prohibition and should remain so in translation.
    At the same time, the translation should not import an interpretive gloss that
    resolves how the saying relates to ordinary biological or social uses of 'father.'
    Keeping the wording direct preserves the theological tension and lets context
    govern interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
