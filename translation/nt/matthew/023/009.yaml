id: MAT.23.9
reference: Matthew 23:9
source:
  edition: SBLGNT
  text: καὶ πατέρα μὴ καλέσητε ὑμῶν ἐπὶ τῆς γῆς, εἷς γάρ ἐστιν ⸂ὑμῶν ὁ πατὴρ⸃ ὁ ⸀οὐράνιος·
translation:
  text: And call no man on earth your father, for one is your Father—the heavenly
    One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And do not call anyone on earth your father.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for one is your Father, the heavenly Father,' or 'for one is your Father,
      who is in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πατέρα
  chosen: father
  alternatives:
  - a father
  lexicon: BDAG
  rationale: Direct object of καλέσητε; in this context it refers to the honorific/designative
    use of 'father,' not biological paternity as such. English 'father' preserves
    the title language and the parallel with the second clause.
- source_word: μὴ καλέσητε
  chosen: call no man
  alternatives:
  - do not call anyone
  - do not address anyone as
  lexicon: BDAG
  rationale: Aorist subjunctive with μή functions as a prohibition. 'Call no man'
    is concise and preserves the force of the command. 'Address anyone as' is interpretive;
    'call' stays closer to the Greek while remaining natural.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: 'Genitive pronoun after καλέσητε is naturally rendered possessively in
    English: ''your father.'''
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: Idiomatic rendering of the prepositional phrase indicating earthly sphere/location,
    contrasted with the heavenly Father.
- source_word: εἷς
  chosen: one
  alternatives:
  - only one
  lexicon: BDAG
  rationale: The Greek explicitly says 'one.' English 'one' preserves the wording;
    exclusivity is conveyed by context without adding 'only' to the main text.
- source_word: ὁ πατήρ
  chosen: your Father
  alternatives:
  - the Father
  lexicon: BDAG
  rationale: The article plus noun, with ὑμῶν in the textual reading provided, is
    best rendered 'your Father.' This preserves the personal relation expressed in
    the Greek text.
- source_word: οὐράνιος
  chosen: the heavenly One
  alternatives:
  - who is in heaven
  - the heavenly Father
  lexicon: BDAG
  rationale: Used substantivally with the article, modifying/identifying 'Father.'
    'The heavenly One' preserves the adjectival force more closely than expanding
    to 'who is in heaven.' 'The heavenly Father' is possible but slightly smoother
    than the Greek's marked wording.
- source_word: ἄνθρωπον (implicit in English 'man')
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: BDAG
  rationale: Although no separate Greek noun for 'man' appears here beyond the understood
    object in English idiom, the traditional and contextually fitting English expression
    is 'call no man on earth your father.' This also aligns with the project's gender-accurate
    principle, since the saying addresses human teachers/honorifics in a representative
    masculine form. A more inclusive alternative is preserved in a footnote.
