id: MAT.23.2
reference: Matthew 23:2
source:
  edition: SBLGNT
  text: λέγων· Ἐπὶ τῆς Μωϋσέως καθέδρας ἐκάθισαν οἱ γραμματεῖς καὶ οἱ Φαρισαῖοι.
translation:
  text: saying, “The scribes and the Pharisees have seated themselves in Moses’ seat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sit on Moses’ seat” or “have sat in the seat of Moses.” The Greek verb
      can be understood more neutrally, but the rendering “have seated themselves”
      preserves the possible nuance of assuming an authoritative position.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present participle introducing Jesus' speech; 'saying' preserves the
    Greek participial linkage to the previous verse more closely than converting it
    to a finite verb.
- source_word: Ἐπὶ
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: BDAG
  rationale: With the genitive and the idiom 'Moses' seat,' the sense is position/occupancy
    of an authoritative place. 'In Moses’ seat' is idiomatic modern English while
    preserving the metaphor; 'on' is more wooden.
- source_word: Μωϋσέως καθέδρας
  chosen: Moses’ seat
  alternatives:
  - the seat of Moses
  - Moses' chair
  lexicon: BDAG
  rationale: A genitive construction referring to the recognized place of teaching
    authority associated with Moses. 'Seat' is the established and clearest English
    metaphor; 'chair' is possible but less natural in biblical English.
- source_word: ἐκάθισαν
  chosen: have seated themselves
  alternatives:
  - sat
  - have sat down
  - sit
  lexicon: BDAG
  rationale: Aorist active of καθίζω can mean 'sit' or causative 'seat, appoint, install.'
    In this context, the causative nuance best fits the idea of assuming an authoritative
    position. 'Have seated themselves' also preserves the critical nuance that this
    is a claimed/occupied role, not merely physical sitting.
- source_word: οἱ γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς in the Gospels commonly refers to the recognized class of
    scribal experts in the law. 'Scribes' is concise and standard; the explanatory
    alternative is interpretive and broader than the lexical form.
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, consistent with English Bible
    usage and the instruction to transliterate names.
