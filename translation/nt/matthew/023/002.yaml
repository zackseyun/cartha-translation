theological_decisions:
- issue: Whether ἐκάθισαν should be rendered neutrally ('sit') or with a self-assumed/installed
    nuance ('have seated themselves')
  chosen_reading: have seated themselves
  alternative_readings:
  - sit
  - have sat on the seat of Moses
  rationale: The verse concerns recognized teaching authority. Rendering the verb
    causatively preserves the possibility that Jesus is describing their occupation
    of Moses' authoritative role, which fits the immediate context of critique without
    overstating a formal divine endorsement. This preserves interpretive tension rather
    than flattening it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
