theological_decisions:
- issue: Cultic language of ἁγιάζω in relation to altar and gift
  chosen_reading: that sanctifies the gift
  alternative_readings:
  - that makes the gift holy
  - that consecrates the gift
  rationale: The verse assumes the altar confers sanctity on the offering. Retaining
    'sanctifies' preserves the temple-holiness logic of Jesus' argument without flattening
    it into merely ceremonial language.
  doctrine_reference: Translation philosophy §5; preserve theological weight without
    paraphrase
