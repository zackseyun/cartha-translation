id: MAT.23.19
reference: Matthew 23:19
source:
  edition: SBLGNT
  text: ⸀τυφλοί, τί γὰρ μεῖζον, τὸ δῶρον ἢ τὸ θυσιαστήριον τὸ ἁγιάζον τὸ δῶρον;
translation:
  text: Blind men, for which is greater, the gift or the altar that sanctifies the
    gift?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offering' for 'the gift.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that makes the gift holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τυφλοί
  chosen: Blind men
  alternatives:
  - Blind ones
  - Blind fools
  lexicon: BDAG
  rationale: Vocative plural adjective used substantivally as a direct rebuke. Rendered
    'Blind men' to preserve the personal address and the masculine plural form without
    adding the stronger insult 'fools,' which belongs in v. 17, not here. 'Blind ones'
    is possible but less natural in English.
- source_word: τί γὰρ μεῖζον
  chosen: for which is greater
  alternatives:
  - for what is greater
  - for which is more important
  lexicon: BDAG
  rationale: τί asks a comparative question and γάρ gives explanatory force ('for').
    'Which is greater' is idiomatic and preserves the comparative μεῖζον. 'More important'
    is interpretive and less formally tied to the Greek.
- source_word: τὸ δῶρον
  chosen: the gift
  alternatives:
  - the offering
  lexicon: BDAG
  rationale: δῶρον commonly means 'gift' and in temple context can denote an offering.
    'Gift' is retained because it matches the immediate wording of the Greek and the
    Matthean usage in this discourse, while still allowing sacrificial context to
    be inferred.
- source_word: θυσιαστήριον
  chosen: the altar
  lexicon: BDAG
  rationale: Standard rendering for θυσιαστήριον in cultic contexts; clear and conventional
    without loss of meaning.
- source_word: τὸ ἁγιάζον
  chosen: that sanctifies
  alternatives:
  - that makes holy
  - that consecrates
  lexicon: BDAG
  rationale: Present participle modifying 'altar.' 'Sanctifies' preserves the lexical
    connection to ἁγιάζω and the cultic/theological register. 'Makes holy' is understandable
    but less concise; 'consecrates' is possible but can suggest setting apart rather
    than the broader holy-making force.
