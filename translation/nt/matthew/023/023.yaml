theological_decisions:
- issue: Rendering of πίστιν in an ethical triad
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The doctrine excerpt sets πίστις to 'faith' as the default main-text
    rendering, with alternatives footnoted where contested. In Matthew 23:23 the context
    could support 'faithfulness' as covenant fidelity, but the default is retained
    in the text and the alternative preserved in a footnote for auditability.
