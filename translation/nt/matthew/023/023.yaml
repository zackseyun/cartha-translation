id: MAT.23.23
reference: Matthew 23:23
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι ἀποδεκατοῦτε τὸ ἡδύοσμον
    καὶ τὸ ἄνηθον καὶ τὸ κύμινον, καὶ ἀφήκατε τὰ βαρύτερα τοῦ νόμου, τὴν κρίσιν καὶ
    ⸂τὸ ἔλεος⸃ καὶ τὴν πίστιν· ⸀ταῦτα ἔδει ποιῆσαι κἀκεῖνα μὴ ⸀ἀφιέναι.
translation:
  text: 'Woe to you, scribes and Pharisees, hypocrites! For you tithe mint and dill
    and cumin, and have neglected the weightier matters of the law: justice and mercy
    and faith. These you ought to have done, without neglecting the others.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness.' The Greek word can denote faith, trust, or fidelity;
      in this ethical context many understand it as covenant faithfulness.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Standard prophetic/judgment interjection; 'Woe' preserves the denunciatory
    force better than the softer 'Alas.'
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct and established rendering for γραμματεῖς in
    the Gospel context; ''teachers of the law'' is interpretive and broader.'
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - play-actors
  - pretenders
  lexicon: BDAG
  rationale: In this context the metaphorical ethical sense is primary; 'hypocrites'
    is idiomatic and accurate.
- source_word: ἀποδεκατοῦτε
  chosen: tithe
  alternatives:
  - give a tenth of
  lexicon: BDAG
  rationale: The verb specifically denotes paying a tenth. 'Tithe' is concise, natural
    English and preserves the cultic/legal nuance.
- source_word: ἡδύοσμον
  chosen: mint
  lexicon: BDAG
  rationale: Standard gloss for the herb named here.
- source_word: ἄνηθον
  chosen: dill
  lexicon: BDAG
  rationale: Standard gloss for the spice/herb.
- source_word: κύμινον
  chosen: cumin
  alternatives:
  - cummin
  lexicon: BDAG
  rationale: Modern standard spelling is 'cumin'; 'cummin' is archaic.
- source_word: ἀφήκατε
  chosen: have neglected
  alternatives:
  - have left undone
  - have abandoned
  lexicon: BDAG
  rationale: Here ἀφίημι means to leave aside/neglect. 'Have neglected' fits the rebuke
    and reads naturally in English.
- source_word: τὰ βαρύτερα τοῦ νόμου
  chosen: the weightier matters of the law
  alternatives:
  - the more important things of the law
  - the heavier things of the law
  lexicon: BDAG
  rationale: Comparative adjective βαρύτερα is metaphorical for greater importance.
    'Weightier matters' preserves the metaphor and is clear.
- source_word: κρίσιν
  chosen: justice
  alternatives:
  - judgment
  lexicon: BDAG
  rationale: In this ethical triad, 'justice' best conveys the substantive moral demand
    rather than the act of passing judgment.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  lexicon: BDAG
  rationale: '''Mercy'' is the standard biblical rendering and fits the triad''s covenant-ethical
    resonance.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text unless
    context strongly requires otherwise. Here the term could denote fidelity/faithfulness
    in ethical context, so the alternative is preserved in a footnote.
- source_word: ταῦτα ἔδει ποιῆσαι
  chosen: These you ought to have done
  alternatives:
  - It was necessary to do these things
  - These it was right to do
  lexicon: BDAG
  rationale: ἔδει with infinitive expresses obligation. This rendering is idiomatic
    and preserves the retrospective force.
- source_word: κἀκεῖνα μὴ ἀφιέναι
  chosen: without neglecting the others
  alternatives:
  - and not leave those undone
  - and not neglect those things
  lexicon: BDAG
  rationale: 'This clause balances the prior statement: the lesser matters were not
    to be omitted. ''Without neglecting the others'' is natural English and preserves
    the sense of μὴ ἀφιέναι.'
