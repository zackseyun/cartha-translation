id: MAT.23.29
reference: Matthew 23:29
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι οἰκοδομεῖτε τοὺς τάφους τῶν προφητῶν καὶ κοσμεῖτε τὰ μνημεῖα τῶν δικαίων,
translation:
  text: Woe to you, scribes and Pharisees, hypocrites, because you build the tombs of the prophets and decorate the monuments of the righteous,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'memorials.' The Greek term can denote monuments or tomb memorials; here it is rendered 'monuments' to distinguish it from 'tombs' earlier in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'hypocrites! Because'.
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Standard exclamation of denunciation or lament in judgment contexts; 'Woe' preserves the prophetic force better than the softer 'Alas.'
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the established and accurate designation for the Jewish legal experts addressed here; ''teachers of the law'' is interpretive and less formally tied to the Greek term.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; personal/group names are transliterated by project philosophy.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: In this Matthean polemical context, 'hypocrites' is the natural and historically established rendering, conveying moral-religious pretense.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the denunciation. 'Because' makes the causal force explicit in contemporary English.
- source_word: οἰκοδομεῖτε
  chosen: you build
  alternatives:
  - you are building
  - you rebuild
  lexicon: BDAG
  rationale: Present indicative with customary force; 'you build' is straightforward. 'Rebuild' would over-specify restoration, which the verb itself does not require.
- source_word: τάφους
  chosen: tombs
  alternatives:
  - graves
  lexicon: BDAG
  rationale: '''Tombs'' better fits constructed burial sites and pairs well with the building imagery of οἰκοδομεῖτε.'
- source_word: προφητῶν
  chosen: of the prophets
  lexicon: BDAG
  rationale: Genitive of possession/association; straightforward rendering.
- source_word: κοσμεῖτε
  chosen: decorate
  alternatives:
  - adorn
  - beautify
  lexicon: BDAG
  rationale: Conveys the sense of making something attractive or ornamented in clear modern English. 'Adorn' is slightly more formal; 'beautify' may overstate.
- source_word: μνημεῖα
  chosen: monuments
  alternatives:
  - memorials
  - tombs
  lexicon: BDAG
  rationale: Distinguishes μνημεῖα from τάφους in the same verse. While μνημεῖον can mean tomb, here varying the English avoids collapsing the paired terms and preserves the commemorative nuance.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - the just
  - righteous people
  lexicon: BDAG
  rationale: Substantival adjective referring to righteous persons. 'The righteous' is concise and preserves the moral-theological category without unnecessary expansion.
