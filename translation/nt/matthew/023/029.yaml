theological_decisions:
- issue: Rendering of δικαίων in a non-Pauline context
  chosen_reading: the righteous
  alternative_readings:
  - the just
  rationale: The term denotes morally upright people, likely including faithful figures of Israel's past. 'The righteous' is the project's default theological vocabulary and does not import later doctrinal categories beyond the text.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness / justice (analogous preference for ''righteous'' language)'
