- timestamp: '2026-04-21T05:23:39Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/023/029.json
  category: awkward_english
  tier: 1
  from: hypocrites! Because
  to: hypocrites, because
  rationale: The current punctuation creates a sentence fragment ('Because you build...'). While this can be a valid rhetorical device, connecting the 'Woe' and its reason into a single sentence with a comma creates a more conventional grammatical structure in English. This would link the denunciation directly to its reason in a smoother, more fluid sentence without altering the meaning.
