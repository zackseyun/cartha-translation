id: MAT.23.35
reference: Matthew 23:35
source:
  edition: SBLGNT
  text: ὅπως ἔλθῃ ἐφ’ ὑμᾶς πᾶν αἷμα δίκαιον ἐκχυννόμενον ἐπὶ τῆς γῆς ἀπὸ τοῦ αἵματος
    Ἅβελ τοῦ δικαίου ἕως τοῦ αἵματος Ζαχαρίου υἱοῦ Βαραχίου, ὃν ἐφονεύσατε μεταξὺ
    τοῦ ναοῦ καὶ τοῦ θυσιαστηρίου.
translation:
  text: so that upon you may come all the righteous blood being poured out on the
    earth, from the blood of righteous Abel to the blood of Zechariah son of Berechiah,
    whom you murdered between the sanctuary and the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the land.' The Greek word can mean either 'earth' or 'land.'
    reason: lexical_alternative
  - marker: b
    text: The identity of 'Zechariah son of Berechiah' is debated. Some connect him
      with the prophet Zechariah; others with Zechariah son of Jehoiada (2 Chr 24:20–22).
      The translation follows the Greek text as written.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result flowing from the preceding denunciation. 'So
    that' is natural English and preserves the telic force without sounding overly
    wooden.
- source_word: ἔλθῃ ἐφ’ ὑμᾶς
  chosen: upon you may come
  alternatives:
  - may come upon you
  - may fall on you
  lexicon: BDAG
  rationale: The aorist subjunctive with ὅπως is preserved with 'may come.' Keeping
    'upon you' reflects ἐπί with accusative and retains the judicial sense of bloodguilt
    coming on them.
- source_word: πᾶν αἷμα δίκαιον
  chosen: all the righteous blood
  alternatives:
  - every righteous blood
  - all righteous blood
  lexicon: BDAG
  rationale: Although literally singular 'blood,' English idiom uses 'all the righteous
    blood' to denote all innocent bloodshed. The article is not present, but English
    requires a natural rendering. 'Righteous' modifies the blood metonymically, meaning
    blood of righteous people.
- source_word: ἐκχυννόμενον
  chosen: being poured out
  alternatives:
  - being shed
  - shed
  lexicon: BDAG
  rationale: The participle is present passive, so 'being poured out' preserves the
    verbal aspect and imagery of bloodshed. 'Shed' is idiomatic and possible, but
    'poured out' more closely reflects ἐκχέω and keeps the vivid metaphor.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here the scope from Abel onward suggests
    a broad, world-level statement rather than only the land of Israel, so 'earth'
    is preferred while preserving the possible narrower sense in a footnote.
- source_word: ἀπὸ τοῦ αἵματος Ἅβελ τοῦ δικαίου
  chosen: from the blood of righteous Abel
  alternatives:
  - from the blood of Abel the righteous
  lexicon: BDAG
  rationale: This keeps the genitival construction and the epithet δίκαιος. 'Righteous
    Abel' is natural English and echoes biblical diction.
- source_word: ἕως τοῦ αἵματος Ζαχαρίου υἱοῦ Βαραχίου
  chosen: to the blood of Zechariah son of Berechiah
  alternatives:
  - up to the blood of Zechariah son of Berechiah
  lexicon: BDAG
  rationale: Standard rendering of the range expression ἀπό...ἕως. 'Berechiah' is
    the conventional English transliteration of Βαραχίας.
- source_word: ὃν ἐφονεύσατε
  chosen: whom you murdered
  alternatives:
  - whom you killed
  - whom you put to death
  lexicon: BDAG
  rationale: φονεύω commonly denotes murder rather than generic killing. 'Murdered'
    preserves the moral charge of the accusation.
- source_word: μεταξὺ τοῦ ναοῦ καὶ τοῦ θυσιαστηρίου
  chosen: between the sanctuary and the altar
  alternatives:
  - between the temple and the altar
  lexicon: BDAG
  rationale: ναός refers specifically to the sanctuary/temple proper, not the entire
    temple complex (ἱερόν). 'Sanctuary' better captures the narrower referent. θυσιαστήριον
    is straightforwardly 'altar'.
