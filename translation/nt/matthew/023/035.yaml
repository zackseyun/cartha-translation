theological_decisions:
- issue: Referent of Zechariah son of Berechiah
  chosen_reading: Retain the text as written without harmonizing or emending the name.
  alternative_readings:
  - Identify him with the prophet Zechariah son of Berechiah
  - Identify him with Zechariah son of Jehoiada and treat 'son of Berechiah' as a
    textual or traditional difficulty
  rationale: The translation should reflect the Greek text rather than resolve the
    historical identification in the main text. Because the identification is debated,
    the issue is preserved in a footnote rather than silently harmonized.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
