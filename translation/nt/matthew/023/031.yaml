id: MAT.23.31
reference: Matthew 23:31
source:
  edition: SBLGNT
  text: ὥστε μαρτυρεῖτε ἑαυτοῖς ὅτι υἱοί ἐστε τῶν φονευσάντων τοὺς προφήτας.
translation:
  text: So you testify against yourselves that you are sons of those who murdered
    the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you bear witness to yourselves.' The Greek expression can be rendered
      more literally this way, though in context it means their testimony incriminates
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - Therefore
  - Thus
  - Consequently
  lexicon: BDAG
  rationale: Introduces the result or inference from the preceding argument. 'So'
    is natural modern English and preserves the inferential force without sounding
    overly formal.
- source_word: μαρτυρεῖτε
  chosen: you testify
  alternatives:
  - you bear witness
  - you witness
  lexicon: BDAG
  rationale: The verb means to testify or bear witness. 'You testify' is concise,
    idiomatic, and keeps the juridical/self-incriminating nuance in context.
- source_word: ἑαυτοῖς
  chosen: against yourselves
  alternatives:
  - to yourselves
  - for yourselves
  - about yourselves
  lexicon: BDAG
  rationale: Although the dative is literally 'to yourselves,' in this context with
    μαρτυρεῖτε it carries the sense of testimony that implicates the speakers themselves.
    'Against yourselves' makes the idiomatic force explicit in English and matches
    the condemnatory context of Jesus' rebuke.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of the testimony rather than a causal clause.
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and evokes both literal lineage
    and moral solidarity. Per translation philosophy, gender-accurate rendering is
    preferred over neutralizing to 'children.' 'Descendants' is possible but weakens
    the familial and rhetorical force.
- source_word: τῶν φονευσάντων
  chosen: of those who murdered
  alternatives:
  - of those who killed
  - of the ones who murdered
  lexicon: BDAG
  rationale: The aorist participle identifies the ancestors by their completed act.
    'Murdered' better reflects the wrongful killing implied in the context than the
    more neutral 'killed.'
- source_word: τοὺς προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Straightforward accusative object; 'the prophets' preserves the recognized
    class of God's messengers in Israel's history.
