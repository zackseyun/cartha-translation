theological_decisions:
- issue: Whether υἱοί should be rendered literally ('sons') or interpreted more broadly
    as moral/spiritual heirs ('children' or 'descendants').
  chosen_reading: sons
  alternative_readings:
  - children
  - descendants
  rationale: The verse condemns both genealogical continuity and participation in
    the same pattern of hostility toward God's messengers. Retaining 'sons' preserves
    the source's masculine familial language and the rhetorical sharpness of Jesus'
    accusation, while not excluding the implied moral solidarity.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
