theological_decisions:
- issue: Rendering Jewish religious items without importing polemical connotations
  chosen_reading: Use the precise term 'phylacteries' in the main text and explain
    it in a footnote; render κράσπεδα as 'tassels.'
  alternative_readings:
  - Use 'prayer boxes' for φυλακτήρια
  - Use 'fringes' for κράσπεδα
  rationale: The verse critiques ostentatious display, not the legitimacy of these
    commanded practices themselves. Retaining the specific Jewish terms helps avoid
    implying that the objects are inherently suspect while still making the criticism
    intelligible.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve source
    meaning without importing doctrinal claims'
