id: MAT.23.5
reference: Matthew 23:5
source:
  edition: SBLGNT
  text: πάντα δὲ τὰ ἔργα αὐτῶν ποιοῦσιν πρὸς τὸ θεαθῆναι τοῖς ἀνθρώποις· πλατύνουσι
    ⸀γὰρ τὰ φυλακτήρια αὐτῶν καὶ μεγαλύνουσι τὰ ⸀κράσπεδα,
translation:
  text: But they do all their works to be seen by people, for they widen their phylacteries
    and enlarge their tassels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prayer boxes.' These were small leather cases containing Scripture passages,
      worn by some Jews in obedience to passages such as Deuteronomy 6:8.
    reason: cultural_note
  - marker: b
    text: Or 'fringes.' Compare Numbers 15:38–39 for the tassels worn on garments.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: all
  alternatives:
  - everything
  lexicon: BDAG
  rationale: With τὰ ἔργα, the adjective means the totality of their deeds/works.
    'All' is the most natural concise rendering in English.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding material; 'But' best conveys the adversative
    force in context.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: '''Works'' preserves the lexical link to ἔργον while remaining natural.
    ''Deeds'' is possible, but ''works'' better reflects the Greek term directly.'
- source_word: ποιοῦσιν
  chosen: they do
  alternatives:
  - they perform
  - they make
  lexicon: BDAG
  rationale: Standard rendering of ποιέω here with ἔργα; 'do' is idiomatic in English
    ('do works/deeds').
- source_word: πρὸς τὸ θεαθῆναι
  chosen: to be seen
  alternatives:
  - for the purpose of being seen
  - to be noticed
  lexicon: BDAG
  rationale: The construction expresses purpose. 'To be seen' is concise and natural
    while preserving the infinitival purpose sense.
- source_word: τοῖς ἀνθρώποις
  chosen: by people
  alternatives:
  - by men
  - by others
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human observers generally, not specifically males.
    'By people' is gender-accurate and natural modern English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces an explanatory ground for the accusation. 'For' preserves
    the connective flow of the Greek.
- source_word: φυλακτήρια
  chosen: phylacteries
  alternatives:
  - amulets
  - prayer boxes
  lexicon: BDAG
  rationale: The term refers to the small Scripture-containing cases worn in Jewish
    practice. 'Phylacteries' is the established precise term; because it may be unfamiliar,
    a cultural footnote explains it. 'Prayer boxes' is more explanatory but less formally
    precise.
- source_word: πλατύνουσι
  chosen: widen
  alternatives:
  - make broad
  - broaden
  lexicon: BDAG
  rationale: The verb means to make broad/wide. 'Widen' is clear modern English and
    fits the physical image.
- source_word: κράσπεδα
  chosen: tassels
  alternatives:
  - fringes
  - borders
  lexicon: BDAG
  rationale: In this Jewish context the word refers to the tassels/fringes on garments
    associated with Torah observance. 'Tassels' communicates the concrete referent
    more clearly than the broader 'borders' and more naturally than 'fringes' for
    many readers.
- source_word: μεγαλύνουσι
  chosen: enlarge
  alternatives:
  - lengthen
  - make large
  lexicon: BDAG
  rationale: The verb means to make great/large. 'Enlarge' is the most straightforward
    English equivalent in this context.
