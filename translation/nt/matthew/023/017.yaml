theological_decisions:
- issue: Rendering of cultic term ἁγιάζω in temple context
  chosen_reading: sanctified
  alternative_readings:
  - made holy
  - consecrated
  rationale: The verse concerns relative sacredness in relation to temple and offering.
    'Sanctified' best preserves the theological/cultic register without overinterpreting
    the mechanism. No doctrinally contested term from the table is involved, but the
    sacred-status logic should remain visible.
  doctrine_reference: Translation philosophy §§1, 5, 6
