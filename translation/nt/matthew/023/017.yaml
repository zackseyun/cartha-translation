id: MAT.23.17
reference: Matthew 23:17
source:
  edition: SBLGNT
  text: μωροὶ καὶ τυφλοί, τίς γὰρ μείζων ἐστίν, ὁ χρυσὸς ἢ ὁ ναὸς ὁ ⸀ἁγιάσας τὸν χρυσόν;
translation:
  text: 'You fools and blind men, for which is greater: the gold, or the temple that
    sanctified the gold?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that made the gold holy.'
    reason: lexical_alternative
  - marker: b
    text: Greek ναός can more specifically denote the temple sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: μωροὶ
  chosen: fools
  alternatives:
  - foolish men
  - morons
  lexicon: BDAG
  rationale: Vocative plural adjective used as direct address. 'Fools' is natural,
    forceful English and preserves the rebuke without introducing slangy harshness
    like 'morons.'
- source_word: τυφλοί
  chosen: blind men
  alternatives:
  - blind ones
  - blind
  lexicon: BDAG
  rationale: Also a vocative plural adjective in direct address. 'Blind men' makes
    the personal address explicit in idiomatic English; 'blind' alone is possible
    but less natural here. The masculine plural is retained in line with the gender-accurate
    policy.
- source_word: τίς γὰρ μείζων ἐστίν
  chosen: for which is greater
  alternatives:
  - for what is greater
  - for which one is greater
  lexicon: BDAG
  rationale: τίς here asks between two specified options, so 'which' is more idiomatic
    than 'what.' γάρ is retained as 'for' to preserve the explanatory force of Jesus'
    argument.
- source_word: ὁ χρυσὸς
  chosen: the gold
  alternatives:
  - gold
  lexicon: BDAG
  rationale: The article points to the specific gold under discussion in the oath
    saying context, so 'the gold' is preferable to an anarthrous-sounding 'gold.'
- source_word: ὁ ναὸς
  chosen: the temple
  alternatives:
  - the sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple proper, but in this context 'temple'
    is the clearest and most natural rendering for English readers. 'Sanctuary' is
    possible but may sound overly technical here.
- source_word: ὁ ἁγιάσας
  chosen: that sanctified
  alternatives:
  - that makes holy
  - that consecrated
  lexicon: BDAG
  rationale: Aorist active participle modifying 'the temple.' 'Sanctified' preserves
    the cultic/religious sense of ἁγιάζω and matches the argument that the temple
    confers sacred status on the gold. 'Makes holy' is clearer but less concise; 'consecrated'
    is possible but slightly narrower in English usage.
- source_word: τὸν χρυσόν
  chosen: the gold
  alternatives:
  - it
  lexicon: BDAG
  rationale: Repeating 'the gold' reflects the Greek object explicitly and preserves
    the rhetorical parallelism.
