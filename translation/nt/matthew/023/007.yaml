theological_decisions:
- issue: Rendering the representative masculine ἀνθρώπων
  chosen_reading: by men
  alternative_readings:
  - by people
  - by others
  rationale: Following the stated gender-accurate philosophy, the grammatically masculine
    plural is preserved in English rather than neutralized, since the phrase is generic
    but formally masculine in the source.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering Ῥαββί
  chosen_reading: Rabbi
  alternative_readings:
  - Teacher
  rationale: Although titles are ordinarily translated, here the Greek text itself
    uses a transliterated Semitic title, and the narrative force depends on the honorific
    as publicly used. Retaining 'Rabbi' preserves the historical and rhetorical texture;
    the semantic equivalent is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
