id: MAT.23.7
reference: Matthew 23:7
source:
  edition: SBLGNT
  text: καὶ τοὺς ἀσπασμοὺς ἐν ταῖς ἀγοραῖς καὶ καλεῖσθαι ὑπὸ τῶν ἀνθρώπων· ⸀Ῥαββί.
translation:
  text: and greetings in the marketplaces, and to be called by men, ‘Rabbi.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘Teacher.’ ‘Rabbi’ is a Jewish honorific title meaning ‘teacher’ or ‘my
      teacher.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμοὺς
  chosen: greetings
  alternatives:
  - formal greetings
  - salutations
  lexicon: BDAG
  rationale: Refers to greetings or marks of respect received in public. 'Greetings'
    is natural modern English and preserves the social-honor nuance without overexpanding
    the text.
- source_word: ἐν ταῖς ἀγοραῖς
  chosen: in the marketplaces
  alternatives:
  - in the market squares
  - in the public squares
  lexicon: BDAG
  rationale: ἀγορά can denote the marketplace or public square. 'Marketplaces' fits
    common English usage and conveys the public setting where honor is displayed.
- source_word: καλεῖσθαι
  chosen: to be called
  alternatives:
  - to be addressed as
  - to be named
  lexicon: BDAG
  rationale: The present passive infinitive expresses the desire to receive a title
    from others. 'To be called' is the most direct and idiomatic rendering.
- source_word: ὑπὸ τῶν ἀνθρώπων
  chosen: by men
  alternatives:
  - by people
  - by others
  lexicon: BDAG
  rationale: ἄνθρωποι here means human beings generally, but the doctrine calls for
    gender-accurate rendering where the Greek is grammatically masculine and representative.
    'By men' preserves the form of the source while remaining idiomatic in this context.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a transliterated Jewish honorific/title in the Greek text. Since
    the source itself preserves the Semitic form, retaining 'Rabbi' best reflects
    the text and the social-religious setting; 'Teacher' is a meaning-based alternative
    worth preserving in a footnote.
