id: MAT.23.6
reference: Matthew 23:6
source:
  edition: SBLGNT
  text: φιλοῦσι ⸀δὲ τὴν πρωτοκλισίαν ἐν τοῖς δείπνοις καὶ τὰς πρωτοκαθεδρίας ἐν ταῖς
    συναγωγαῖς
translation:
  text: And they love the places of honor at banquets and the best seats in the synagogues,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief place at table' for 'the places of honor,' reflecting the
      honored reclining position at formal meals in the ancient world.
    reason: lexical_alternative
  - marker: b
    text: Or 'the chief seats' for 'the best seats.' The Greek emphasizes seats of
      highest status or precedence.
    reason: lexical_alternative
  - marker: c
    text: Banquets in the ancient Mediterranean world were structured by visible honor
      rankings, so the wording highlights a desire for public status, not merely comfort.
    reason: cultural_note
lexical_decisions:
- source_word: φιλοῦσι
  chosen: they love
  alternatives:
  - they are fond of
  - they delight in
  lexicon: BDAG
  rationale: Present active indicative plural of φιλέω here expresses strong liking
    or preference, not covenantal/theological love. 'They love' is the most natural
    and direct English rendering and preserves the moral force of Jesus' critique.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is mildly connective here, continuing the description of the scribes
    and Pharisees' behavior. 'And' fits the flow in English without overstating contrast.
- source_word: πρωτοκλισίαν
  chosen: the places of honor
  alternatives:
  - the place of honor
  - the chief place at table
  - the seats of honor
  lexicon: BDAG
  rationale: πρωτοκλισία refers to the most honored reclining places at a meal. Because
    English readers may not grasp the ancient dining custom from a literal rendering,
    'places of honor' communicates the social meaning while remaining close to the
    source.
- source_word: ἐν τοῖς δείπνοις
  chosen: at banquets
  alternatives:
  - at dinners
  - at feasts
  lexicon: BDAG
  rationale: δεῖπνον denotes a dinner/meal, and in this social-status context likely
    formal meals or feasts. 'At banquets' best conveys the public, honor-laden setting
    implied by the verse.
- source_word: πρωτοκαθεδρίας
  chosen: the best seats
  alternatives:
  - the chief seats
  - the seats of honor
  - the front seats
  lexicon: BDAG
  rationale: πρωτοκαθεδρία denotes seats of highest status or precedence. 'The best
    seats' is idiomatic modern English and clearly communicates the desire for prominence.
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  alternatives:
  - in synagogues
  lexicon: BDAG
  rationale: A straightforward locative phrase. Retaining the article in English sounds
    natural here and reflects the institutional setting of Jewish assembly life.
