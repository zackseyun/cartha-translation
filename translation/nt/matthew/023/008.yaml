id: MAT.23.8
reference: Matthew 23:8
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ μὴ κληθῆτε· Ῥαββί, εἷς γάρ ἐστιν ὑμῶν ὁ ⸀διδάσκαλος, πάντες δὲ ὑμεῖς
    ἀδελφοί ἐστε·
translation:
  text: But you are not to be called ‘Rabbi,’ for one is your teacher, and you are
    all brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Teacher.' The Greek title 'Rabbi' carries the sense of a teacher, but
      the transliteration preserves the Jewish setting and avoids collapsing it with
      the later word 'teacher' in the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' renders the masculine plural ἀδελφοί. In context it can refer
      to fellow disciples collectively.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ κληθῆτε
  chosen: are not to be called
  alternatives:
  - must not be called
  - do not be called
  lexicon: BDAG
  rationale: The aorist passive subjunctive with μή in this prohibitive construction
    is well rendered as a prohibition with English 'are not to be called.' This preserves
    the force of Jesus' instruction without sounding wooden.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a transliterated title used in the Greek text. Retaining 'Rabbi'
    preserves the historical and Jewish setting. Because the title's meaning overlaps
    with 'teacher,' that sense is conveyed by the following διδάσκαλος rather than
    flattening both terms into the same English word.
- source_word: εἷς
  chosen: one
  alternatives:
  - only one
  lexicon: BDAG
  rationale: '''One'' is the direct lexical equivalent and preserves the emphasis
    on singularity. ''Only one'' is interpretively stronger; the exclusivity is already
    sufficiently conveyed by the context.'
- source_word: ὁ διδάσκαλος
  chosen: your teacher
  alternatives:
  - the teacher
  - your instructor
  lexicon: BDAG
  rationale: 'With ὑμῶν, the sense is relational: the one who is teacher in relation
    to the disciples. ''Your teacher'' is idiomatic English and preserves the force
    better than the more awkward ''the teacher of you.'''
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the project's gender-accurate philosophy, the grammatically masculine
    plural should be rendered with the matching English form when it carries representative
    force. 'Brothers' preserves the source form and the familial metaphor; inclusivity
    can be noted in a footnote rather than neutralized in the main text.
- source_word: πάντες δὲ ὑμεῖς
  chosen: you are all
  alternatives:
  - all of you are
  lexicon: BDAG
  rationale: This preserves the emphatic collective force in natural English. Word
    order is adjusted for readability while maintaining the stress that the whole
    group shares the same status.
