theological_decisions:
- issue: Whether Jesus forbids the use of all human honorific titles absolutely or
    addresses status-seeking within the disciple community
  chosen_reading: The translation preserves the direct prohibition without expanding
    it into an absolute doctrinal rule beyond the verse's wording.
  alternative_readings:
  - An absolute ban on any use of 'Rabbi' or analogous titles
  - A narrower critique only of hypocritical ambition
  rationale: The Greek gives a straightforward prohibition and rationale but does
    not itself spell out all later applications. The translation should therefore
    remain close to the wording and not import a broader or narrower doctrinal conclusion
    into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
