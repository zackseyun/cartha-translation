theological_decisions:
- issue: 'Force of Jesus'' statement: imperative command versus predictive irony'
  chosen_reading: 'Imperative command with ironic/judicial force: ''fill up the measure
    of your fathers.'''
  alternative_readings:
  - 'Indicative/prediction: ''you are filling up'' or ''you will fill up'' the measure
    of your fathers'
  rationale: The morphology identifies πληρώσατε as aorist active imperative, 2nd
    person plural. The translation therefore preserves the grammatical form as a command,
    while recognizing that in context it functions rhetorically as a denunciatory,
    ironic summons to complete the pattern of their fathers' guilt. This preserves
    the text's tension rather than softening it into a mere prediction.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
