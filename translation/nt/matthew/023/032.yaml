id: MAT.23.32
reference: Matthew 23:32
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς πληρώσατε τὸ μέτρον τῶν πατέρων ὑμῶν.
translation:
  text: And you—fill up the measure of your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'complete the full measure of your fathers' sins.' The Greek says literally,
      'fill up the measure of your fathers,' using a metaphor of accumulated guilt
      reaching its limit.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Standard connective carried over straightforwardly. 'And' preserves the
    Greek coordination and the rhetorical continuation from the preceding denunciation.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. The English dash ('And you—')
    is used to reflect that emphasis without overloading the line with 'you yourselves.'
- source_word: πληρώσατε
  chosen: fill up
  alternatives:
  - complete
  - fill full
  - make full
  lexicon: BDAG
  rationale: Aorist imperative, second person plural. 'Fill up' best preserves the
    force of a command and the metaphor of bringing something to its full measure.
    It also matches the idiom of completing accumulated guilt in context better than
    the flatter 'complete.'
- source_word: τὸ μέτρον
  chosen: the measure
  alternatives:
  - the full measure
  - the measure allotted
  lexicon: BDAG
  rationale: Rendered literally to preserve the metaphor of a quantified limit or
    accumulated amount. 'The full measure' is interpretive and is therefore left as
    an alternative rather than placed in the main text.
- source_word: τῶν πατέρων ὑμῶν
  chosen: of your fathers
  alternatives:
  - of your ancestors
  lexicon: BDAG
  rationale: πατέρων is literally 'fathers.' In this context it refers to forefathers/ancestors,
    but 'fathers' preserves the source wording and the rhetorical continuity with
    Jesus' accusation about their lineage and participation in their predecessors'
    deeds. A more interpretive inclusive gloss like 'ancestors' is preserved as an
    alternative.
