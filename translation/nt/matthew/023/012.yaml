id: MAT.23.12
reference: Matthew 23:12
source:
  edition: SBLGNT
  text: ὅστις δὲ ὑψώσει ἑαυτὸν ταπεινωθήσεται, καὶ ὅστις ταπεινώσει ἑαυτὸν ⸀ὑψωθήσεται.
translation:
  text: But whoever exalts himself will be humbled, and whoever humbles himself will
    be exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek uses masculine singular reflexive pronouns ('himself') in a general
      statement, referring representatively to any person.
    reason: cultural_note
  - marker: b
    text: Or 'will be brought low' ... 'will be lifted up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - who
  - everyone who
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general principle; 'whoever'
    captures the generic, proverbial force in natural English.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast or continuation from the preceding context. 'But'
    best reflects the adversative nuance here.
- source_word: ὑψώσει
  chosen: exalts
  alternatives:
  - lifts up
  - raises
  lexicon: BDAG
  rationale: Future active of ὑψόω used idiomatically for self-exaltation. Present
    English 'exalts' in a proverbial statement is natural, while the full clause retains
    future force with 'will be humbled.'
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: Reflexive pronoun referring back to the grammatically masculine singular
    subject. Per gender-accurate policy, 'himself' preserves the source form and representative
    generic sense.
- source_word: ταπεινωθήσεται
  chosen: will be humbled
  alternatives:
  - will be brought low
  - will be made humble
  lexicon: BDAG
  rationale: Future passive of ταπεινόω. 'Will be humbled' is the most direct and
    idiomatic rendering, preserving the passive without specifying the agent.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two balanced clauses.
- source_word: ταπεινώσει
  chosen: humbles
  alternatives:
  - lowers
  - makes humble
  lexicon: BDAG
  rationale: Future active of ταπεινόω in a reflexive construction meaning to humble
    oneself. 'Humbles' is the standard and clearest English equivalent.
- source_word: ὑψωθήσεται
  chosen: will be exalted
  alternatives:
  - will be lifted up
  - will be raised high
  lexicon: BDAG
  rationale: Future passive of ὑψόω. 'Will be exalted' preserves the lexical parallel
    with 'exalts' in the first clause and fits the honor/shame reversal theme.
