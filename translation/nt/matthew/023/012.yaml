theological_decisions:
- issue: Agency of the passive verbs
  chosen_reading: Retain passive forms without naming the agent
  alternative_readings:
  - Render actively with God as subject, e.g., 'God will humble/exalt'
  rationale: The Greek uses passives and does not explicitly identify the agent. Leaving
    the agent unstated preserves the text's wording and theological openness while
    allowing the implied divine agency to remain implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine representation
  chosen_reading: Use 'himself' in both clauses
  alternative_readings:
  - '''themselves'''
  - '''oneself'''
  rationale: The Greek is grammatically masculine singular but representative in force.
    Following the gender-accurate policy, the translation keeps the masculine singular
    rather than neutralizing it, while understanding it generically.
  doctrine_reference: Gender-accurate over gender-neutral.
