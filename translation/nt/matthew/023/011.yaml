theological_decisions:
- issue: Status language in Jesus' teaching on greatness and service
  chosen_reading: 'Render the saying as an ethical reversal of rank: ''the greatest
    among you will be your servant.'''
  alternative_readings:
  - the greater of you shall be your minister
  rationale: The verse teaches that true greatness is expressed in service, without
    importing later ecclesiastical office language or softening the social reversal.
    This preserves the text's moral and theological tension without denominational
    overlay.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Readable modern English, not archaic or academic.'
