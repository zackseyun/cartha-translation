id: MAT.23.11
reference: Matthew 23:11
source:
  edition: SBLGNT
  text: ὁ δὲ μείζων ὑμῶν ἔσται ὑμῶν διάκονος.
translation:
  text: But the greatest among you will be your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the greater of you will be your servant.' The Greek
      comparative can function idiomatically for the highest-ranking person within
      the group.
    reason: lexical_alternative
lexical_decisions:
- source_word: μείζων
  chosen: the greatest
  alternatives:
  - the greater
  - the one who is greater
  lexicon: BDAG
  rationale: Comparative of μέγας used idiomatically in a superlative-like sense within
    this teaching context about rank among the disciples. English 'the greatest among
    you' is the most natural and reflects the sense of highest status rather than
    a merely binary comparison.
- source_word: ὑμῶν
  chosen: among you
  alternatives:
  - of you
  lexicon: BDAG
  rationale: 'The first genitive ὑμῶν is rendered ''among you'' to express the partitive
    sense in idiomatic English: the one greatest within the group addressed.'
- source_word: ἔσται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is best rendered with standard modern English future
    'will be'; 'shall' is unnecessarily archaic for the project's style.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: The second genitive ὑμῶν is possessive/relational with διάκονος, yielding
    natural English 'your servant' rather than the wooden 'servant of you.'
- source_word: διάκονος
  chosen: servant
  alternatives:
  - minister
  - deacon
  lexicon: BDAG
  rationale: In this context διάκονος denotes one who serves others, not a technical
    church office. 'Servant' is clear, natural, and fits Jesus' teaching on humble
    status reversal. 'Minister' is too ecclesiastical here, and 'deacon' would wrongly
    suggest an office.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding pursuit of exalted titles and status.
    'But' best signals the adversative force in context.
