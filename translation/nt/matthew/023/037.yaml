id: MAT.23.37
reference: Matthew 23:37
source:
  edition: SBLGNT
  text: Ἰερουσαλὴμ Ἰερουσαλήμ, ἡ ⸀ἀποκτείνουσα τοὺς προφήτας καὶ λιθοβολοῦσα τοὺς
    ἀπεσταλμένους πρὸς αὐτήν— ποσάκις ἠθέλησα ἐπισυναγαγεῖν τὰ τέκνα σου, ὃν τρόπον
    ⸂ὄρνις ἐπισυνάγει⸃ τὰ νοσσία ⸀αὐτῆς ὑπὸ τὰς πτέρυγας, καὶ οὐκ ἠθελήσατε;
translation:
  text: Jerusalem, Jerusalem, the one killing the prophets and stoning those sent
    to her—how often I wanted to gather your children together, the way a hen gathers
    her chicks under her wings, and you were not willing!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who kills the prophets and stones those sent to her.'
    reason: lexical_alternative
  - marker: b
    text: '''A hen'' translates a Greek word that can mean ''bird'' more generally,
      but the context of gathering young under wings points specifically to a hen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλὴμ Ἰερουσαλήμ
  chosen: Jerusalem, Jerusalem
  lexicon: BDAG
  rationale: Standard transliteration of the place name, preserving the emphatic repetition
    and lamenting address.
- source_word: ἡ ἀποκτείνουσα
  chosen: the one killing
  alternatives:
  - who kills
  - the one who kills
  lexicon: BDAG
  rationale: The article with present participle functions substantivally. 'The one
    killing' preserves the ongoing characteristic force more transparently than a
    simple relative clause, while remaining natural enough in context.
- source_word: τοὺς προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Straightforward rendering of the accusative object.
- source_word: λιθοβολοῦσα
  chosen: stoning
  alternatives:
  - who stones
  lexicon: BDAG
  rationale: Present participle coordinated with ἀποκτείνουσα; 'stoning' preserves
    the parallel ongoing/characteristic sense.
- source_word: τοὺς ἀπεσταλμένους πρὸς αὐτήν
  chosen: those sent to her
  alternatives:
  - those who have been sent to her
  - the ones sent to her
  lexicon: BDAG
  rationale: Perfect/passive participle of ἀποστέλλω rendered idiomatically. 'To her'
    keeps the personified city imagery.
- source_word: ποσάκις
  chosen: how often
  alternatives:
  - how many times
  lexicon: BDAG
  rationale: Idiomatic English equivalent in a lament context.
- source_word: ἠθέλησα
  chosen: I wanted
  alternatives:
  - I desired
  - I was willing
  lexicon: BDAG
  rationale: θέλω here expresses volition/intention. 'I wanted' is clear modern English
    and avoids importing a stronger theological nuance than the verb itself requires.
- source_word: ἐπισυναγαγεῖν
  chosen: to gather
  alternatives:
  - to gather together
  lexicon: BDAG
  rationale: The compound verb means gather together, but English 'gather' already
    carries that sense. Because the object is followed by a simile using the same
    verb, I supplied 'together' after 'your children' for natural emphasis while keeping
    the lexical connection.
- source_word: τὰ τέκνα σου
  chosen: your children
  alternatives:
  - your sons and daughters
  - your offspring
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and relational; 'children' is the most accurate
    and natural rendering.
- source_word: ὃν τρόπον
  chosen: the way
  alternatives:
  - just as
  - as
  lexicon: BDAG
  rationale: Introduces a comparison. 'The way' is natural and preserves the simile
    without sounding wooden.
- source_word: ὄρνις
  chosen: a hen
  alternatives:
  - a bird
  - a fowl
  lexicon: BDAG
  rationale: Although ὄρνις can mean bird/fowl generally, the maternal image with
    chicks under wings strongly specifies a hen in context. This is the clearest English
    rendering.
- source_word: ἐπισυνάγει
  chosen: gathers
  alternatives:
  - gathers together
  lexicon: BDAG
  rationale: Matches the earlier ἐπισυναγαγεῖν and preserves the lexical parallel
    in the simile.
- source_word: τὰ νοσσία αὐτῆς
  chosen: her chicks
  alternatives:
  - her brood
  - her young
  lexicon: BDAG
  rationale: νοσσία refers to young birds; 'chicks' best fits the hen imagery in contemporary
    English.
- source_word: ὑπὸ τὰς πτέρυγας
  chosen: under her wings
  lexicon: BDAG
  rationale: Standard literal rendering; the protective metaphor is important and
    widely intelligible.
- source_word: καὶ οὐκ ἠθελήσατε
  chosen: and you were not willing
  alternatives:
  - and you did not want to
  - but you were not willing
  lexicon: BDAG
  rationale: Retains the contrast with Jesus' prior willing (ἠθέλησα). 'Were not willing'
    preserves the volitional emphasis more clearly than 'did not want to.'
