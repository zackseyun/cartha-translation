theological_decisions:
- issue: Volitional contrast between Jesus and Jerusalem
  chosen_reading: Render both instances of θέλω with willingness/desire language without
    resolving broader debates about divine will, human responsibility, or Christology
    beyond the text.
  alternative_readings:
  - Use stronger determinative language such as 'I determined'
  - Paraphrase to emphasize only emotional longing
  rationale: The verse presents a real contrast between Jesus' desire/willingness
    and Jerusalem's unwillingness. The translation should preserve that tension and
    not flatten it into either mere sentiment or a technical doctrinal statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Identity of 'your children'
  chosen_reading: Keep 'your children' as the inhabitants/people associated with Jerusalem,
    without specifying a narrower subgroup.
  alternative_readings:
  - your people
  - your inhabitants
  rationale: The personified city addresses Jerusalem as representative of its people.
    'Your children' preserves the metaphor and avoids over-interpretation.
