id: MAT.23.27
reference: Matthew 23:27
source:
  edition: SBLGNT
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι ⸀παρομοιάζετε τάφοις κεκονιαμένοις,
    οἵτινες ἔξωθεν μὲν φαίνονται ὡραῖοι ἔσωθεν δὲ γέμουσιν ὀστέων νεκρῶν καὶ πάσης
    ἀκαθαρσίας·
translation:
  text: Woe to you, scribes and Pharisees, hypocrites! For you are like whitewashed
    tombs, which outwardly appear beautiful, but inwardly are full of dead people's
    bones and every kind of uncleanness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'graves whitewashed with lime.'
    reason: lexical_alternative
  - marker: b
    text: '''Uncleanness'' can include both ritual impurity and moral corruption in
      this context.'
    reason: cultural_note
lexical_decisions:
- source_word: Οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Standard prophetic/judgment interjection; 'Woe' preserves the denunciatory
    force better than the softer 'Alas.'
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the established and accurate designation for this Jewish
    scholarly class; ''teachers of the law'' is more interpretive and less formally
    tied to the noun.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  - actors
  lexicon: BDAG
  rationale: In this context Jesus denounces moral-religious pretense; 'hypocrites'
    is the clearest and most idiomatic rendering.
- source_word: παρομοιάζετε
  chosen: you are like
  alternatives:
  - you resemble
  - you are compared to
  lexicon: BDAG
  rationale: The verb means to liken or compare; in direct address, idiomatic English
    is 'you are like.' This avoids an awkward passive while preserving the comparison.
- source_word: τάφοις
  chosen: tombs
  alternatives:
  - graves
  lexicon: BDAG
  rationale: '''Tombs'' fits the image of constructed burial places that can be whitewashed;
    ''graves'' is possible but less vivid in English for this setting.'
- source_word: κεκονιαμένοις
  chosen: whitewashed
  alternatives:
  - plastered with lime
  - white-coated
  lexicon: BDAG
  rationale: The participle refers to coating with lime/whitewash. 'Whitewashed' is
    concise, idiomatic, and preserves the cultural image familiar from this saying.
- source_word: οἵτινες
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause about the tombs; 'which' reads
    naturally in English prose.
- source_word: ἔξωθεν μὲν ... ἔσωθεν δὲ
  chosen: outwardly ... but inwardly
  alternatives:
  - on the outside ... but on the inside
  lexicon: BDAG
  rationale: This pair contrasts external appearance with internal reality. 'Outwardly/inwardly'
    is compact and rhetorically strong.
- source_word: φαίνονται ὡραῖοι
  chosen: appear beautiful
  alternatives:
  - look beautiful
  - seem lovely
  lexicon: BDAG
  rationale: '''Appear beautiful'' preserves both the visual sense and the emphasis
    on appearance rather than reality.'
- source_word: γέμουσιν
  chosen: are full of
  alternatives:
  - are filled with
  lexicon: BDAG
  rationale: Idiomatic rendering of the verb 'to be full of'; present tense retained.
- source_word: ὀστέων νεκρῶν
  chosen: dead people's bones
  alternatives:
  - bones of the dead
  - dead bones
  lexicon: BDAG
  rationale: The genitive construction is most naturally rendered in contemporary
    English as 'dead people's bones.' This avoids the potentially misleading idiom
    'dead bones' while preserving the sense.
- source_word: πάσης ἀκαθαρσίας
  chosen: every kind of uncleanness
  alternatives:
  - all uncleanness
  - every impurity
  lexicon: BDAG
  rationale: ἀκαθαρσία can denote impurity/uncleanness, including ritual and moral
    defilement. 'Every kind of uncleanness' preserves the broad scope and echoes the
    purity context of tomb contamination.
