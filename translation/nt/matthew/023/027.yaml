theological_decisions:
- issue: Nature of ἀκαθαρσία in the metaphor
  chosen_reading: Render broadly as 'uncleanness' without narrowing to either ritual
    impurity alone or moral corruption alone.
  alternative_readings:
  - ritual impurity
  - moral impurity
  rationale: The image of tombs naturally evokes ritual defilement in Jewish context,
    but Jesus' denunciation also targets inner moral corruption. A broad rendering
    preserves the theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
