id: MAT.23.36
reference: Matthew 23:36
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ⸀ἥξει ⸂ταῦτα πάντα⸃ ἐπὶ τὴν γενεὰν ταύτην.
translation:
  text: Truly I say to you, all these things will come upon this generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all this.'' The Greek is plural: ''all these things.'''
    reason: lexical_alternative
  - marker: b
    text: '''This generation'' can also be understood by some as ''these people''
      or as a broader unbelieving generation, but the Greek most directly reads ''this
      generation.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω ὑμῖν, ἀμήν functions as a solemn affirmation
    introducing an authoritative saying. 'Truly' conveys the force in natural modern
    English better than leaving it untranslated as 'Amen.' 'Truly, truly' is not appropriate
    here because Matthew has a single ἀμήν, not the Johannine doubled form.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering of the present indicative plus dative pronoun.
    'I say to you' preserves the formal, solemn cadence of the saying formula; 'I
    tell you' is possible but slightly freer.
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  - will happen
  lexicon: BDAG
  rationale: Future of ἥκω, here indicating the arrival or coming of the consequences
    just described. 'Will come' works idiomatically with the following prepositional
    phrase 'upon this generation.'
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these
  lexicon: BDAG
  rationale: The neuter plural demonstrative plus πᾶς is best represented explicitly
    as 'all these things,' referring back to the judgments and bloodguilt mentioned
    in the preceding context. This is more formally complete than 'all this' while
    remaining natural English.
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  - against
  lexicon: BDAG
  rationale: With motion/extension and an accusative object, ἐπί can indicate movement
    onto or coming upon someone. 'Upon' preserves the solemn judicial tone better
    than the flatter 'on.' 'Against' would over-interpret the hostility rather than
    simply the arrival of judgment.
- source_word: γενεὰν ταύτην
  chosen: this generation
  alternatives:
  - this age
  - these people
  lexicon: BDAG
  rationale: γενεά most naturally means 'generation' here, referring to the contemporaneous
    generation addressed by Jesus. 'Age' would shift the sense toward a time-period
    abstraction, and 'these people' would paraphrase beyond the lexical form.
