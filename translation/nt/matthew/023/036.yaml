theological_decisions:
- issue: Referent of 'this generation' (γενεὰν ταύτην)
  chosen_reading: Rendered as 'this generation' without interpretive expansion, preserving
    the text's direct wording and temporal force.
  alternative_readings:
  - a broader class of people characterized by unbelief
  - the Jewish people across time
  - the present age
  rationale: The translation should not resolve a debated eschatological interpretation
    beyond what the Greek states. The most direct lexical rendering is 'this generation,'
    leaving readers to interpret its scope from context. This preserves theological
    tension rather than importing a system-specific reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
