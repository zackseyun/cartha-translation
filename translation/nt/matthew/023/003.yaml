theological_decisions:
- issue: Whether to make explicit that Jesus refers to the scribes and Pharisees'
    teaching authority from the previous context
  chosen_reading: Leave the object implicit in this verse and translate only what
    verse 3 states.
  alternative_readings:
  - Expand to 'everything they teach you'
  - Expand to 'everything they tell you from Moses' seat'
  rationale: The immediate context identifies the referents, but this verse itself
    does not repeat those details. To avoid importing explanatory material into the
    translation, the draft keeps the statement as concise as the Greek while remaining
    intelligible.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to smooth the repeated action verbs into more idiomatic English
  chosen_reading: Preserve the repetition of 'do/keep ... do not do ... say and do
    not do.'
  alternative_readings:
  - Use varied English such as 'practice/observe ... do not imitate ... they preach
    but do not practice'
  rationale: The Greek intentionally repeats ποιέω to expose hypocrisy through verbal
    echo. Preserving that tension is preferable to stylistic smoothing, even if the
    English is slightly more wooden.
  doctrine_reference: Translation philosophy §3, §5
