id: MAT.23.3
reference: Matthew 23:3
source:
  edition: SBLGNT
  text: πάντα οὖν ὅσα ⸀ἐὰν εἴπωσιν ὑμῖν ⸂ποιήσατε καὶ τηρεῖτε⸃, κατὰ δὲ τὰ ἔργα αὐτῶν
    μὴ ποιεῖτε, λέγουσιν γὰρ καὶ οὐ ποιοῦσιν.
translation:
  text: Therefore, do and keep everything they tell you, but do not do according to
    their works, for they say and do not do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not act as they do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα οὖν ὅσα ἐὰν
  chosen: Therefore, everything
  alternatives:
  - So, whatever
  - Therefore, all that
  lexicon: BDAG
  rationale: πάντα with ὅσα ἐὰν forms a comprehensive expression ('all things whatever'
    / 'everything that'). οὖν is rendered inferentially as 'Therefore.' 'Everything'
    is natural English while preserving the totalizing force.
- source_word: εἴπωσιν ὑμῖν
  chosen: they tell you
  alternatives:
  - they say to you
  - they instruct you
  lexicon: BDAG
  rationale: λέγω commonly means 'say' or 'tell.' In this context of authoritative
    speech directed to the audience, 'tell you' is idiomatic and clear without overstating
    the force as formal instruction.
- source_word: ποιήσατε
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: Aorist imperative of ποιέω calls for action. 'Do' is the most direct
    and least interpretively loaded rendering.
- source_word: τηρεῖτε
  chosen: keep
  alternatives:
  - observe
  - obey
  lexicon: BDAG
  rationale: τηρέω often means 'keep, observe, maintain.' 'Keep' preserves the distinction
    from the preceding ποιήσατε while remaining natural. 'Obey' would narrow the sense;
    'observe' is possible but slightly more formal.
- source_word: κατὰ δὲ τὰ ἔργα αὐτῶν
  chosen: according to their works
  alternatives:
  - according to their deeds
  - as they do
  lexicon: BDAG
  rationale: 'κατά with accusative here expresses conformity or standard: ''according
    to.'' ἔργα is rendered ''works'' to preserve the lexical link with action language
    in the verse and avoid over-paraphrase. A smoother alternative (''as they do'')
    is preserved in a footnote.'
- source_word: μὴ ποιεῖτε
  chosen: do not do
  alternatives:
  - do not act
  - do not practice
  lexicon: BDAG
  rationale: The present imperative with μή prohibits patterned action. 'Do not do'
    preserves the verbal repetition with ποιήσατε/ποιοῦσιν, an important rhetorical
    feature in Greek.
- source_word: λέγουσιν γὰρ καὶ οὐ ποιοῦσιν
  chosen: for they say and do not do
  alternatives:
  - for they speak but do not act
  - for they say it and do not do it
  lexicon: BDAG
  rationale: This clause is concise and epigrammatic in Greek. The translation preserves
    the stark contrast and repetition of λέγω/ποιέω without adding implied objects
    not present in the text.
