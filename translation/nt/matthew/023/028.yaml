id: MAT.23.28
reference: Matthew 23:28
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς ἔξωθεν μὲν φαίνεσθε τοῖς ἀνθρώποις δίκαιοι, ἔσωθεν δέ ⸂ἐστε
    μεστοὶ⸃ ὑποκρίσεως καὶ ἀνομίας.
translation:
  text: In the same way, you also outwardly appear righteous to people, but inwardly
    you are full of hypocrisy and lawlessness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to men.' The Greek ἀνθρώποις is a generic term for human beings here.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - Thus
  - So
  lexicon: BDAG
  rationale: Connects this verse to the preceding comparison with whitewashed tombs.
    'In the same way' makes the inferential/comparative force clear in natural English.
- source_word: ἔξωθεν
  chosen: outwardly
  alternatives:
  - on the outside
  - externally
  lexicon: BDAG
  rationale: Adverbial contrast with ἔσωθεν. 'Outwardly' is concise and idiomatic
    in English while preserving the external/internal contrast.
- source_word: φαίνεσθε
  chosen: appear
  alternatives:
  - seem
  - are seen as
  lexicon: BDAG
  rationale: Middle/passive form here conveys how they present or are perceived. 'Appear'
    best captures visible impression without asserting actual righteousness.
- source_word: τοῖς ἀνθρώποις
  chosen: to people
  alternatives:
  - to men
  - to human beings
  lexicon: BDAG
  rationale: 'Dative of reference: righteous in the sight of people. ''People'' is
    natural modern English and reflects generic human observers without unnecessary
    masculine wording.'
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: In this context the term describes apparent moral/religious rectitude.
    'Righteous' preserves the ethical-religious force better than 'just' in English.
- source_word: ἔσωθεν
  chosen: inwardly
  alternatives:
  - on the inside
  - internally
  lexicon: BDAG
  rationale: Balances 'outwardly' and preserves the metaphorical contrast between
    external appearance and internal reality.
- source_word: μεστοὶ
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: Standard rendering for the adjective meaning 'full'. 'Full of' is direct
    and idiomatic.
- source_word: ὑποκρίσεως
  chosen: hypocrisy
  alternatives:
  - pretense
  - play-acting
  lexicon: BDAG
  rationale: In Jesus' denunciation of the scribes and Pharisees, the noun denotes
    moral-religious duplicity. 'Hypocrisy' is the established and accurate English
    equivalent.
- source_word: ἀνομίας
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: ἀνομία is more than generic evil; it denotes disregard for God's law.
    'Lawlessness' preserves that sharper sense and fits the denunciatory context.
