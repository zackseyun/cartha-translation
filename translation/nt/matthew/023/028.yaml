theological_decisions:
- issue: Whether to render δίκαιοι as actual moral status or merely apparent status
  chosen_reading: merely apparent righteousness in human perception
  alternative_readings:
  - actual righteousness
  rationale: The verb φαίνεσθε and the contrast with 'inwardly you are full of hypocrisy
    and lawlessness' make clear that Jesus is exposing appearance rather than affirming
    genuine righteousness.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax itself resolves the issue toward apparent, not actual, righteousness.
