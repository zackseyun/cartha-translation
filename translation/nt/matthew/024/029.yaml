theological_decisions:
- issue: Nature of the cosmic signs in apocalyptic discourse
  chosen_reading: Retain the imagery straightforwardly without resolving whether it
    is strictly literal astronomical collapse, prophetic-symbolic language, or both.
  alternative_readings:
  - Strictly literal cosmic disturbances
  - Primarily symbolic language for political/judicial upheaval
  rationale: The verse uses established prophetic-apocalyptic imagery. The translation
    should preserve the wording and tension of the source text rather than importing
    a specific eschatological system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
