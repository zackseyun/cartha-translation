id: MAT.24.29
reference: Matthew 24:29
source:
  edition: SBLGNT
  text: Εὐθέως δὲ μετὰ τὴν θλῖψιν τῶν ἡμερῶν ἐκείνων ὁ ἥλιος σκοτισθήσεται, καὶ ἡ
    σελήνη οὐ δώσει τὸ φέγγος αὐτῆς, καὶ οἱ ἀστέρες πεσοῦνται ἀπὸ τοῦ οὐρανοῦ, καὶ
    αἱ δυνάμεις τῶν οὐρανῶν σαλευθήσονται.
translation:
  text: But immediately after the tribulation of those days, the sun will be darkened,
    and the moon will not give its light, and the stars will fall from heaven, and
    the powers of the heavens will be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sky' for 'heaven' in 'the stars will fall from heaven.'
    reason: lexical_alternative
  - marker: b
    text: '''The powers of the heavens'' may refer to cosmic forces, heavenly bodies,
      or heavenly powers; the Greek expression is intentionally left broad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Carries a strong temporal sense of immediacy. 'Immediately' is clear
    modern English and preserves the force better than archaic 'straightway.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks transition/continuation with slight contrast. 'But' reflects the
    discourse shift into the cosmic signs that follow the tribulation.
- source_word: μετὰ τὴν θλῖψιν
  chosen: after the tribulation
  alternatives:
  - after the distress
  - after the affliction
  lexicon: BDAG
  rationale: θλῖψις commonly denotes tribulation, distress, or affliction. 'Tribulation'
    is retained because it is both accurate and contextually weighty in this eschatological
    discourse.
- source_word: τῶν ἡμερῶν ἐκείνων
  chosen: of those days
  alternatives:
  - in those days
  lexicon: BDAG
  rationale: The genitive construction is most naturally rendered 'of those days,'
    modifying 'tribulation.' This preserves the Greek syntax more closely than restructuring
    it.
- source_word: σκοτισθήσεται
  chosen: will be darkened
  alternatives:
  - will grow dark
  - will be made dark
  lexicon: BDAG
  rationale: Future passive is best represented by 'will be darkened.' This preserves
    the verbal voice and the solemn, prophetic tone.
- source_word: οὐ δώσει τὸ φέγγος αὐτῆς
  chosen: will not give its light
  alternatives:
  - will not shine
  - will not give its brightness
  lexicon: BDAG
  rationale: A relatively literal rendering preserves the imagery of the moon withholding
    its light. 'Its light' is natural English for φέγγος.
- source_word: πεσοῦνται
  chosen: will fall
  alternatives:
  - will be falling
  lexicon: BDAG
  rationale: Simple future in English best matches the Greek future middle here; the
    middle voice does not require a distinct English reflexive rendering.
- source_word: ἀπὸ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean sky or heaven. Here 'heaven' better preserves the elevated
    biblical register and aligns with the cosmic-apocalyptic context.
- source_word: αἱ δυνάμεις τῶν οὐρανῶν
  chosen: the powers of the heavens
  alternatives:
  - the powers of heaven
  - the heavenly powers
  - the forces of the heavens
  lexicon: BDAG
  rationale: δύναμεις can denote powers/forces, and the plural 'of the heavens' reflects
    the Greek genitive plural. The phrase is left somewhat literal to preserve the
    text's apocalyptic ambiguity rather than over-interpret it as angelic beings or
    cosmic forces alone.
- source_word: σαλευθήσονται
  chosen: will be shaken
  alternatives:
  - will be set in motion
  - will be disturbed
  lexicon: BDAG
  rationale: Future passive 'will be shaken' is the standard and most transparent
    rendering, fitting both literal and cosmic-symbolic readings.
