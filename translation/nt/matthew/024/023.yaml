id: MAT.24.23
reference: Matthew 24:23
source:
  edition: SBLGNT
  text: τότε ἐάν τις ὑμῖν εἴπῃ· Ἰδοὺ ὧδε ὁ χριστός, ἤ· Ὧδε, μὴ πιστεύσητε·
translation:
  text: Then if anyone says to you, ‘Look, here is the Messiah!’ or, ‘There he is!’
    do not believe it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the Christ.” Traditional English often has “Christ” here.'
    reason: alternative_reading
  - marker: b
    text: Or 'or, ‘Here!’'.
    reason: previous_rendering
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb linking this warning to the preceding eschatological
    discourse. 'Then' is concise and natural in English while preserving sequence.
- source_word: ἐάν τις ὑμῖν εἴπῃ
  chosen: if anyone says to you
  alternatives:
  - if someone says to you
  lexicon: BDAG
  rationale: Conditional construction with indefinite subject. 'Anyone' best captures
    τις in idiomatic modern English without narrowing the referent.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic attention-getter. 'Look' preserves the force in readable modern
    English; 'Behold' is too archaic for the stated philosophy.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  - here, in this spot
  lexicon: BDAG
  rationale: Simple adverb of place. 'Here' is the natural equivalent in both occurrences.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like designation. Here the presence of the article and the
    false-identification context clearly mark it as the messianic title.
- source_word: ἤ· Ὧδε
  chosen: or, ‘Here!’
  alternatives:
  - or, 'There he is!'
  - or, 'Look, here!'
  lexicon: BDAG
  rationale: The Greek is elliptical, omitting a repeated predicate. English can preserve
    the abruptness with 'Here!' rather than supplying more than the text states. The
    quotation marks retain the direct-speech force.
- source_word: μὴ πιστεύσητε
  chosen: do not believe it
  alternatives:
  - do not believe him
  - do not believe
  lexicon: BDAG
  rationale: Aorist subjunctive with μή in a prohibition. English idiom typically
    supplies an object. 'It' best refers to the claim just reported, avoiding an over-specific
    personal object ('him') not present in the Greek while making the sentence natural.
