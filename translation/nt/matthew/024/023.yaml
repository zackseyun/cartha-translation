  to: Then if anyone says to you, ‘Look, here is the Messiah!’ or, ‘There he is!’
    do not believe it.
  rationale: Revised the second clause from ‘He is here!’ to ‘There he is!’ to more
    naturally reflect the elliptical Greek Ὧδε while preserving the contrast with
    ‘here is the Messiah.’
