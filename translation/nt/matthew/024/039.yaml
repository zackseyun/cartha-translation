id: MAT.24.39
reference: Matthew 24:39
source:
  edition: SBLGNT
  text: καὶ οὐκ ἔγνωσαν ἕως ἦλθεν ὁ κατακλυσμὸς καὶ ἦρεν ἅπαντας, οὕτως ἔσται ⸀καὶ
    ἡ παρουσία τοῦ υἱοῦ τοῦ ἀνθρώπου.
translation:
  text: And they did not know until the flood came and swept them all away; so also
    will be the coming of the Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took them all away.' The Greek verb can be rendered more literally as
      'took away'; 'swept ... away' brings out the flood imagery in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (Greek παρουσία). In this context,
      'coming' best conveys the eschatological event in view.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνωσαν
  chosen: did not know
  alternatives:
  - did not understand
  - were unaware
  lexicon: BDAG
  rationale: γινώσκω here denotes coming to know or recognize what was impending.
    'Did not know' is the most direct and idiomatic rendering in context, preserving
    the sense of unawareness without adding interpretive nuance.
- source_word: ἕως
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction marking the point at which their ignorance
    ended.
- source_word: κατακλυσμός
  chosen: the flood
  alternatives:
  - the deluge
  lexicon: BDAG
  rationale: In this Noah context, 'the flood' is the natural English equivalent and
    clearly evokes the Genesis event without unnecessary archaism.
- source_word: ἦρεν
  chosen: swept ... away
  alternatives:
  - took away
  - carried off
  lexicon: BDAG
  rationale: Although αἴρω is literally 'take/lift,' in this judgment context with
    the flood as subject, English 'swept ... away' best conveys the destructive removal
    implied by the narrative. This is a context-driven optimal-equivalence rendering
    rather than a bare formal gloss.
- source_word: ἅπαντας
  chosen: them all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: The adjective means 'all' or 'everyone.' 'Them all' fits the implied
    antecedent from the preceding clause and reads naturally in English.
- source_word: οὕτως
  chosen: so also
  alternatives:
  - so
  - in the same way
  lexicon: BDAG
  rationale: Marks the comparison between the days of Noah and the future event. 'So
    also' preserves the emphatic comparative force and reads smoothly with the future
    verb.
- source_word: παρουσία
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In Matthew 24, παρουσία in eschatological context is conventionally and
    contextually best rendered 'coming.' 'Presence' is lexically possible but would
    sound misleading in English here; 'arrival' is possible but less idiomatic in
    established eschatological discourse.
- source_word: υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation/title in the Gospels. It
    should be translated, not paraphrased, preserving both its idiomatic form and
    its Danielic/theological resonance.
- source_word: καὶ (before ἡ παρουσία)
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'The printed text includes καί before ἡ παρουσία. In English, rendering
    it as ''also'' rather than a second bare ''and'' best reflects its additive force
    and avoids awkwardness: ''so also will be the coming...'''
