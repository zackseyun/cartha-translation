theological_decisions:
- issue: Eschatological sense of παρουσία
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The verse compares the sudden, unrecognized onset of the flood with the
    future παρουσία of the Son of Man. Within historic Christian orthodoxy and the
    immediate Matthean context, 'coming' best communicates the eventive eschatological
    sense without narrowing the theology beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Title υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  rationale: This preserves the traditional and textually grounded title used by Jesus,
    maintaining its theological tension and intertextual resonance rather than resolving
    it into an interpretive paraphrase such as 'the human one' or 'the messianic human
    figure.'
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
