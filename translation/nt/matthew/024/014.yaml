theological_decisions:
- issue: Scope of οἰκουμένη and ἔθνη in an eschatological saying
  chosen_reading: Render the statement with global scope language ('throughout the
    whole world' / 'to all the nations') without narrowing it to either the Roman
    Empire alone or a later technical missiological category.
  alternative_readings:
  - '''throughout the whole inhabited earth'' with stronger first-century geographic
    nuance'
  - '''to all peoples'' to stress ethnicity over nationhood'
  rationale: The verse presents a universal scope to the proclamation before 'the
    end.' The translation should preserve that breadth without resolving debates about
    precise historical fulfillment or eschatological timetable. This follows the project's
    principle of preserving theological tension rather than importing a specific system.
  doctrine_reference: Translation philosophy §3
