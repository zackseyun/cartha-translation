id: MAT.24.14
reference: Matthew 24:14
source:
  edition: SBLGNT
  text: καὶ κηρυχθήσεται τοῦτο τὸ εὐαγγέλιον τῆς βασιλείας ἐν ὅλῃ τῇ οἰκουμένῃ εἰς
    μαρτύριον πᾶσιν τοῖς ἔθνεσιν, καὶ τότε ἥξει τὸ τέλος.
translation:
  text: And this good news of the kingdom will be proclaimed throughout the whole
    world as a testimony to all the nations, and then the end will come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gospel of the kingdom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout the whole inhabited world.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to all peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρυχθήσεται
  chosen: will be proclaimed
  alternatives:
  - will be preached
  - will be announced
  lexicon: BDAG
  rationale: Future passive of κηρύσσω emphasizes public heralding. 'Will be proclaimed'
    preserves the formal sense of authoritative public announcement while remaining
    natural English; 'preached' is possible but can sound more ecclesiastical than
    the Greek itself requires.
- source_word: εὐαγγέλιον
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: The core sense is 'good news.' This rendering is more transparent for
    modern readers and aligns with the project's preference for readable modern English
    over inherited church jargon, while still preserving the term's theological weight
    in context.
- source_word: τῆς βασιλείας
  chosen: of the kingdom
  alternatives:
  - about the kingdom
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of the kingdom,' yielding the
    established sense 'the good news of the kingdom'—the message concerning God's
    reign. 'About the kingdom' is interpretive and less formally tied to the Greek
    construction.
- source_word: ἐν ὅλῃ τῇ οἰκουμένῃ
  chosen: throughout the whole world
  alternatives:
  - in the whole inhabited world
  - throughout the whole inhabited earth
  lexicon: BDAG
  rationale: οἰκουμένη denotes the inhabited world/world as known to human society.
    'Throughout the whole world' is idiomatic and communicates the global scope clearly.
    'Inhabited world' is more formally precise but less natural in contemporary English.
- source_word: εἰς μαρτύριον
  chosen: as a testimony
  alternatives:
  - for a testimony
  - as witness
  lexicon: BDAG
  rationale: 'The phrase expresses purpose/result: the proclamation serves as testimony.
    ''As a testimony'' is natural English and preserves the evidentiary/witness-bearing
    force without overinterpreting whether the testimony is for or against the hearers.'
- source_word: πᾶσιν τοῖς ἔθνεσιν
  chosen: to all the nations
  alternatives:
  - to all the Gentiles
  - to all peoples
  lexicon: BDAG
  rationale: ἔθνη here refers broadly to the nations/peoples of the world, not specifically
    'Gentiles' in contrast to Jews. 'Nations' preserves the lexical link and biblical
    resonance better than the more generalized 'peoples.'
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: ἥκω commonly means 'come' or 'arrive.' 'Will come' is the most natural
    and idiomatic rendering in eschatological context.
- source_word: τὸ τέλος
  chosen: the end
  alternatives:
  - the consummation
  - the end time
  lexicon: BDAG
  rationale: τέλος here denotes the end/consummation. 'The end' is the plain and sufficiently
    weighty rendering; 'consummation' is possible but more technical, and 'end time'
    imports a framework not explicit in the text.
