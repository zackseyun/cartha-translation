id: MAT.24.38
reference: Matthew 24:38
source:
  edition: SBLGNT
  text: ⸀ὡς γὰρ ἦσαν ἐν ταῖς ⸀ἡμέραις ταῖς πρὸ τοῦ κατακλυσμοῦ τρώγοντες καὶ πίνοντες,
    γαμοῦντες καὶ ⸀γαμίζοντες, ἄχρι ἧς ἡμέρας εἰσῆλθεν Νῶε εἰς τὴν κιβωτόν,
translation:
  text: For as in the days before the flood they were eating and drinking, marrying
    and giving in marriage, until the day Noah entered the ark,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marrying and being given in marriage.' The Greek distinguishes γαμοῦντες
      and γαμίζοντες; the latter can refer to being given in marriage or to giving
      someone in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς γὰρ
  chosen: For as
  alternatives:
  - For just as
  - As
  lexicon: BDAG
  rationale: The combination introduces an explanatory comparison with the previous
    verse. 'For as' preserves both γάρ's explanatory force and ὡς's comparative sense
    in natural English.
- source_word: ἦσαν
  chosen: they were
  alternatives:
  - people were
  lexicon: BDAG
  rationale: The imperfect of εἰμί with participles forms a periphrastic construction
    describing ongoing activity. 'They were' keeps the Greek structure without adding
    an explicit subject not present in the text.
- source_word: ἐν ταῖς ἡμέραις ταῖς πρὸ τοῦ κατακλυσμοῦ
  chosen: in the days before the flood
  alternatives:
  - in the days prior to the flood
  - in the days before the deluge
  lexicon: BDAG
  rationale: This phrase is straightforwardly temporal. 'Flood' is the standard, clear
    rendering of κατακλυσμός here and fits the Noah context better than the less natural
    'deluge' for modern readers.
- source_word: κατακλυσμοῦ
  chosen: flood
  alternatives:
  - deluge
  lexicon: BDAG
  rationale: In the Matthean allusion to Genesis and Noah, 'flood' is the most idiomatic
    and recognizable English equivalent.
- source_word: τρώγοντες καὶ πίνοντες
  chosen: eating and drinking
  alternatives:
  - eating and drinking away
  lexicon: BDAG
  rationale: The participles denote ordinary ongoing activities. A plain rendering
    avoids importing a negative moral judgment beyond the text's emphasis on normal
    life continuing.
- source_word: γαμοῦντες
  chosen: marrying
  alternatives:
  - taking wives
  - getting married
  lexicon: BDAG
  rationale: γαμέω commonly means 'to marry.' 'Marrying' is concise and preserves
    the participial parallelism.
- source_word: γαμίζοντες
  chosen: giving in marriage
  alternatives:
  - being given in marriage
  - arranging marriages
  lexicon: BDAG
  rationale: γαμίζω in this context refers to giving someone in marriage, traditionally
    by family arrangement. 'Giving in marriage' preserves the lexical distinction
    from γαμοῦντες better than collapsing both into 'getting married.'
- source_word: ἄχρι ἧς ἡμέρας
  chosen: until the day
  alternatives:
  - until that day on which
  - up to the day
  lexicon: BDAG
  rationale: This idiom marks the endpoint of the ongoing activities. 'Until the day'
    is natural English and accurately reflects the temporal force.
- source_word: εἰσῆλθεν Νῶε εἰς τὴν κιβωτόν
  chosen: Noah entered the ark
  alternatives:
  - Noah went into the ark
  lexicon: BDAG
  rationale: The aorist marks the decisive event ending the prior routine. 'Entered
    the ark' is idiomatic and faithful. 'Ark' is the established and accurate rendering
    of κιβωτός in the Noah narrative.
- source_word: κιβωτόν
  chosen: ark
  alternatives:
  - boat
  - vessel
  lexicon: BDAG
  rationale: Within biblical usage tied to Noah, 'ark' is the precise conventional
    term and avoids flattening the intertextual connection to Genesis.
