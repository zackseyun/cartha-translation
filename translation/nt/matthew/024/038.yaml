theological_decisions:
- issue: Whether the activities listed should be framed as sinful excess or as ordinary
    life continuing unaware of judgment
  chosen_reading: Rendered the activities neutrally as ordinary human actions
  alternative_readings:
  - Rendered with an implied tone of indulgence or moral carelessness
  rationale: The Greek participles themselves denote commonplace activities without
    explicit moral qualifiers. The point in context is unsuspecting normalcy before
    sudden judgment, not necessarily the sinfulness of eating, drinking, or marrying
    as such. This preserves the text's tension without importing additional condemnation.
  doctrine_reference: Translation philosophy §1, §3
