theological_decisions:
- issue: Rendering of ἱερόν versus ναός
  chosen_reading: temple
  alternative_readings:
  - temple precincts
  - temple complex
  rationale: The verse uses ἱερόν, which denotes the broader temple area, not specifically
    the inner sanctuary. For readability and standard English Bible usage, 'temple'
    is retained in the main text, while the more precise nuance is preserved in a
    footnote. This avoids importing theological distinctions not explicit in the English
    while remaining auditable to the Greek.
  doctrine_reference: Translation philosophy §§1, 5, 6
