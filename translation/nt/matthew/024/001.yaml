id: MAT.24.1
reference: Matthew 24:1
source:
  edition: SBLGNT
  text: Καὶ ἐξελθὼν ὁ Ἰησοῦς ⸂ἀπὸ τοῦ ἱεροῦ ἐπορεύετο⸃, καὶ προσῆλθον οἱ μαθηταὶ αὐτοῦ
    ἐπιδεῖξαι αὐτῷ τὰς οἰκοδομὰς τοῦ ἱεροῦ·
translation:
  text: And Jesus went out from the temple and was going away, and his disciples came
    to show him the buildings of the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: went out
  alternatives:
  - came out
  - left
  lexicon: BDAG
  rationale: 'Aorist participle of ἐξέρχομαι, naturally rendered as an attendant action
    preceding the main verb: Jesus first went out, then was going away. ''Went out''
    preserves the directional force without overinterpreting.'
- source_word: ἱεροῦ
  chosen: temple
  alternatives:
  - temple precincts
  - temple complex
  lexicon: BDAG
  rationale: ἱερόν refers broadly to the temple complex/precincts rather than specifically
    the sanctuary (ναός). 'Temple' is the standard readable rendering; the broader
    sense is contextually important but can be preserved in a footnote rather than
    expanded in the main text.
- source_word: ἐπορεύετο
  chosen: was going away
  alternatives:
  - was departing
  - went on his way
  lexicon: BDAG
  rationale: Imperfect middle/passive form of πορεύομαι conveys ongoing movement.
    'Was going away' preserves the imperfective aspect better than a simple past 'went
    away' and fits the narrative flow.
- source_word: προσῆλθον
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: Aorist of προσέρχομαι often means 'came' or 'approached.' 'Came' is idiomatic
    in English here, with the following infinitive expressing purpose.
- source_word: ἐπιδεῖξαι
  chosen: to show
  alternatives:
  - to point out
  - to display
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the disciples came in order to show
    Jesus something. ''To show'' is the most natural and sufficiently precise rendering.'
- source_word: οἰκοδομὰς
  chosen: buildings
  alternatives:
  - structures
  - buildings and stones
  lexicon: BDAG
  rationale: οἰκοδομή here refers to constructed buildings/structures. 'Buildings'
    is the clearest direct rendering in context, anticipating the discourse about
    the temple's destruction.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the temple complex
  - of the temple precincts
  lexicon: BDAG
  rationale: Genitive specifying that the buildings belong to the temple complex.
    Repeating 'temple' in English preserves the Greek wording and the narrative emphasis.
