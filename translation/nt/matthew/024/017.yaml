id: MAT.24.17
reference: Matthew 24:17
source:
  edition: SBLGNT
  text: ὁ ἐπὶ τοῦ δώματος μὴ ⸀καταβάτω ἆραι τὰ ἐκ τῆς οἰκίας αὐτοῦ,
translation:
  text: Let the one on the housetop not go down to take the things out of his house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'roof.' The Greek refers to the flat, usable roof area of a house.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἐπὶ τοῦ δώματος
  chosen: the one on the housetop
  alternatives:
  - the man on the housetop
  - whoever is on the roof
  lexicon: BDAG
  rationale: 'The articular phrase functions substantivally: ''the one who is on the
    housetop/roof.'' ''Housetop'' preserves the concrete first-century setting of
    a flat roof while remaining natural English. ''The one'' avoids over-specifying
    gender while matching the representative singular sense.'
- source_word: δώματος
  chosen: housetop
  alternatives:
  - roof
  - roof terrace
  lexicon: BDAG
  rationale: δώμα refers to the roof/top of a house, often a usable flat roof in the
    ancient Mediterranean world. 'Housetop' is a traditional but still intelligible
    rendering that preserves the domestic architectural sense better than the more
    generic 'roof'.
- source_word: μὴ καταβάτω
  chosen: let ... not go down
  alternatives:
  - must not go down
  - should not go down
  lexicon: BDAG
  rationale: The present/imperatival prohibition is naturally rendered with 'let ...
    not' in English, preserving the urgent directive without sounding overly wooden.
    'Go down' reflects the literal movement from roof to lower level/ground.
- source_word: ἆραι
  chosen: to take
  alternatives:
  - to get
  - to carry off
  lexicon: BDAG
  rationale: 'The aorist infinitive of αἴρω here expresses purpose: going down in
    order to take/remove belongings. ''Take'' is the most straightforward and contextually
    appropriate gloss.'
- source_word: τὰ ἐκ τῆς οἰκίας αὐτοῦ
  chosen: the things out of his house
  alternatives:
  - what is in his house
  - his belongings from the house
  lexicon: BDAG
  rationale: The neuter plural article with ἐκ + genitive is elliptical for possessions/items
    from the house. 'The things out of his house' stays close to the Greek while remaining
    clear. 'Belongings' is possible but slightly more interpretive.
- source_word: οἰκίας
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: '''House'' preserves the concrete physical sense in a context about descending
    from the roof and retrieving items. ''Home'' would shift toward an affective sense
    not foregrounded here.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's
  lexicon: BDAG
  rationale: The Greek uses a masculine singular pronoun agreeing with the representative
    singular subject. Per the project's gender-accurate philosophy, 'his' is retained
    rather than neutralizing to 'one's'.
