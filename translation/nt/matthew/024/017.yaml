theological_decisions:
- issue: Representative masculine reference
  chosen_reading: Retain singular masculine 'his' in English
  alternative_readings:
  - their
  - one's
  rationale: The verse uses a representative singular construction, not a doctrinally
    loaded gender statement. The project's policy prefers gender-accurate rendering
    over neutralization when the source is grammatically masculine with generic force.
