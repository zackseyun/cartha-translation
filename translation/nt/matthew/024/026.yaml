  from: do not go out. ‘Look, he is in the inner rooms,’
  to: do not go out; or ‘Look, he is in the inner rooms,’
  rationale: The Greek presents two parallel scenarios under a single conditional
    clause (ἐὰν ... εἴπωσιν). The current draft's use of a period breaks this into
    two sentences, making the second sentence grammatically awkward (it begins with
    a quotation) and obscuring the parallel structure. Using a semicolon and a conjunction
    like 'or' preserves the single conditional, clarifies that these are two alternative
    reports, and improves the logical flow of the English sentence.
