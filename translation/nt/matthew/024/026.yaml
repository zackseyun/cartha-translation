theological_decisions:
- issue: Implicit referent of ἐστίν
  chosen_reading: The implied subject is the claimed presence of Jesus/Messiah, rendered
    simply as 'he is' without adding a title.
  alternative_readings:
  - he is there
  - the Messiah is there
  rationale: The immediate context concerns false reports about the coming/presence
    of the Son of Man. Supplying 'he' is necessary in English, but adding 'Messiah'
    or 'Jesus' in the main text would import more than the Greek explicitly states
    in this clause.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
