id: MAT.24.26
reference: Matthew 24:26
source:
  edition: SBLGNT
  text: ἐὰν οὖν εἴπωσιν ὑμῖν· Ἰδοὺ ἐν τῇ ἐρήμῳ ἐστίν, μὴ ἐξέλθητε· Ἰδοὺ ἐν τοῖς ταμείοις,
    μὴ πιστεύσητε·
translation:
  text: Therefore, if they say to you, ‘Look, he is in the wilderness,’ do not go
    out; ‘Look, he is in the inner rooms,’ do not believe it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the desert.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the storerooms' or 'in the secret chambers.' The Greek can refer
      to inner or private rooms.
    reason: lexical_alternative
  - marker: c
    text: Or 'do not go out. ‘Look, he is in the inner rooms,’'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - So if
  - If then
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding warning, while ἐὰν introduces
    a conditional scenario. 'Therefore, if' preserves both the logical connection
    and the conditional force in natural English.
- source_word: εἴπωσιν ὑμῖν
  chosen: they say to you
  alternatives:
  - someone says to you
  - they tell you
  lexicon: BDAG
  rationale: The third person plural is indefinite ('they'), not specifying a particular
    group. 'Say to you' is a straightforward rendering of λέγω with dative indirect
    object.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a deictic attention-getter. 'Look' is readable modern English
    and preserves the immediacy without archaic tone.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος can denote desert or wilderness. 'Wilderness' fits Matthew's usage
    and broader biblical resonance without requiring a sandy-desert image.
- source_word: ἐστίν
  chosen: he is
  alternatives:
  - he is there
  lexicon: BDAG
  rationale: The subject is implicit from context, referring to the purported location
    of the Messiah/Son of Man. English requires an explicit subject; 'he is' is the
    minimal supplied form.
- source_word: μὴ ἐξέλθητε
  chosen: do not go out
  alternatives:
  - do not leave
  - do not go out there
  lexicon: BDAG
  rationale: Aorist subjunctive with μή functions as a prohibition. 'Do not go out'
    is direct and preserves the movement implied by ἐξέρχομαι.
- source_word: ἐν τοῖς ταμείοις
  chosen: in the inner rooms
  alternatives:
  - in the storerooms
  - in the secret chambers
  - in the rooms
  lexicon: BDAG
  rationale: ταμεῖον refers to an inner room, storeroom, or private chamber. In this
    context of hidden claims about Jesus' presence, 'inner rooms' best conveys enclosed,
    private spaces without overinterpreting secrecy.
- source_word: μὴ πιστεύσητε
  chosen: do not believe it
  alternatives:
  - do not believe them
  - do not trust it
  lexicon: BDAG
  rationale: πιστεύω here means to believe the claim being reported. English idiom
    prefers an explicit object; 'it' refers to the reported assertion rather than
    the speakers themselves.
