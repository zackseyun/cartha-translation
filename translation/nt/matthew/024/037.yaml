theological_decisions:
- issue: Rendering παρουσία in an eschatological saying
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The verse refers to the future eschatological advent of the Son of Man.
    'Coming' best communicates eventive force in idiomatic English without flattening
    the term's broader semantic range. An alternative is preserved in a footnote to
    maintain transparency.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it
