id: MAT.24.37
reference: Matthew 24:37
source:
  edition: SBLGNT
  text: ὥσπερ ⸀γὰρ αἱ ἡμέραι τοῦ Νῶε, οὕτως ⸀ἔσται ἡ παρουσία τοῦ υἱοῦ τοῦ ἀνθρώπου·
translation:
  text: For just as the days of Noah were, so the coming of the Son of Man will be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''presence'': the Greek word can denote ''presence'' or ''arrival,''
      but here it refers to the future coming of the Son of Man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - just as ... so
  lexicon: BDAG
  rationale: Introduces the comparison. 'Just as' preserves the emphatic comparative
    force more naturally than a bare 'as' in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  - ', for'
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this verse to the preceding
    context. 'For' is concise and natural at the head of the sentence.
- source_word: αἱ ἡμέραι τοῦ Νῶε
  chosen: the days of Noah were
  alternatives:
  - the days of Noah
  - Noah's days were
  lexicon: BDAG
  rationale: The Greek comparison is elliptical, lacking an explicit predicate in
    the first clause; English requires completion. Supplying 'were' is the minimal
    addition needed to mirror the structure and sense.
- source_word: Νῶε
  chosen: Noah
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: BDAG
  rationale: 'Pairs naturally with ''just as'' to preserve the correlative comparison:
    ''just as ... so ...''.'
- source_word: ἔσται
  chosen: will be
  alternatives:
  - will happen
  - will come to be
  lexicon: BDAG
  rationale: Future of εἰμί is best rendered simply as 'will be.' This keeps the statement
    straightforward and avoids overinterpreting the verb.
- source_word: παρουσία
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context, παρουσία conventionally denotes the future
    advent/arrival of the Son of Man. 'Coming' is the clearest modern English rendering,
    while 'presence' is too static here. Because 'presence' is a possible lexical
    alternative, it is preserved in a footnote.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation with strong Danielic resonance.
    'The Son of Man' preserves the title's intertextual and theological weight better
    than more interpretive alternatives.
