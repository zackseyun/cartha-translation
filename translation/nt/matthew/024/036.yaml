id: MAT.24.36
reference: Matthew 24:36
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς ἡμέρας ἐκείνης καὶ ὥρας οὐδεὶς οἶδεν, οὐδὲ οἱ ἄγγελοι τῶν οὐρανῶν
    ⸂οὐδὲ ὁ υἱός⸃, εἰ μὴ ὁ ⸀πατὴρ μόνος.
translation:
  text: But concerning that day and hour, no one knows—not even the angels of heaven,
    nor the Son—except the Father alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit 'nor the Son.' The main text follows the SBLGNT reading.
    reason: textual_variant
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: But concerning
  alternatives:
  - Now concerning
  - About
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic ('concerning/about'), and
    δέ marks a transition or contrast with what precedes. 'But concerning' preserves
    both the topical shift and the mild adversative force in natural English.
- source_word: τῆς ἡμέρας ἐκείνης καὶ ὥρας
  chosen: that day and hour
  alternatives:
  - that day and that hour
  - that day or hour
  lexicon: BDAG
  rationale: The genitives depend on περί. The single demonstrative ἐκείνης naturally
    modifies the coordinated phrase as a unit. 'That day and hour' is idiomatic and
    preserves the specificity of the eschatological time reference without over-literal
    repetition.
- source_word: οὐδεὶς οἶδεν
  chosen: no one knows
  alternatives:
  - nobody knows
  lexicon: BDAG
  rationale: οὐδείς is an emphatic universal negation ('no one'), and οἶδα in the
    perfect-form present sense means 'know.' 'No one knows' is the clearest modern
    rendering.
- source_word: οὐδὲ οἱ ἄγγελοι τῶν οὐρανῶν
  chosen: not even the angels of heaven
  alternatives:
  - nor even the angels of the heavens
  - not even the heavenly angels
  lexicon: BDAG
  rationale: οὐδέ here adds a further negative item with emphatic force; 'not even'
    captures that emphasis well in English. τῶν οὐρανῶν is rendered 'of heaven' idiomatically
    rather than the more wooden 'of the heavens.'
- source_word: οὐδὲ ὁ υἱός
  chosen: nor the Son
  alternatives:
  - not even the Son
  lexicon: BDAG
  rationale: The phrase is coordinate with the preceding negative elements. After
    'not even the angels of heaven,' 'nor the Son' preserves the sequence and avoids
    awkward repetition while still clearly including the Son among those who do not
    know. The article marks a recognized title, so 'the Son' is retained.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this construction after a negated statement, εἰ μή means 'except'
    rather than conditional 'unless.'
- source_word: ὁ πατὴρ μόνος
  chosen: the Father alone
  alternatives:
  - the Father only
  - only the Father
  lexicon: BDAG
  rationale: μόνος restricts the knowledge exclusively to the Father. 'The Father
    alone' is natural and preserves the exclusivity. The title 'Father' is capitalized
    because it functions as a divine title in context.
