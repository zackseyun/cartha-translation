theological_decisions:
- issue: Christological implication of 'nor the Son'
  chosen_reading: Retain the full phrase 'nor the Son' in the main text without softening
    or explanatory expansion.
  alternative_readings:
  - Some translations omit the phrase due to textual variation in parts of the manuscript
    tradition.
  - Some interpreters paraphrase to reduce the apparent tension with the Son's divinity.
  rationale: The SBLGNT text includes οὐδὲ ὁ υἱός, and the translation must preserve
    the wording as given. In keeping with Chalcedonian orthodoxy and the stated philosophy,
    the rendering preserves the theological tension rather than resolving it by paraphrase
    or omission. The verse states the Son's non-knowledge with respect to 'that day
    and hour' and should not be weakened; doctrinal synthesis belongs to theology,
    not translation.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy #3 Preserve theological tension rather than resolve
    it.'
