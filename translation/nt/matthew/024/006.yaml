id: MAT.24.6
reference: Matthew 24:6
source:
  edition: SBLGNT
  text: μελλήσετε δὲ ἀκούειν πολέμους καὶ ἀκοὰς πολέμων· ὁρᾶτε, μὴ θροεῖσθε· δεῖ ⸀γὰρ
    γενέσθαι, ἀλλ’ οὔπω ἐστὶν τὸ τέλος.
translation:
  text: And you are going to hear of wars and reports of wars. See that you are not
    alarmed, for these things must happen, but the end is not yet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rumors of wars.' The Greek phrase can denote reports, news, or rumors.
    reason: lexical_alternative
lexical_decisions:
- source_word: μελλήσετε
  chosen: you are going to
  alternatives:
  - you will
  - you are about to
  lexicon: BDAG
  rationale: Future of μέλλω with infinitive often conveys imminence or expected future.
    'You are going to hear' preserves the prospective force more clearly than a simple
    'you will hear,' while remaining natural English.
- source_word: ἀκούειν
  chosen: hear of
  alternatives:
  - hear
  - hear about
  lexicon: BDAG
  rationale: With objects such as 'wars' and 'reports of wars,' idiomatic English
    prefers 'hear of,' conveying reception of news rather than direct auditory experience.
- source_word: πολέμους
  chosen: wars
  alternatives:
  - battles
  - conflicts
  lexicon: BDAG
  rationale: πόλεμος normally denotes war rather than a single battle. 'Wars' is the
    standard and most precise rendering here.
- source_word: ἀκοὰς πολέμων
  chosen: reports of wars
  alternatives:
  - rumors of wars
  - news of wars
  lexicon: BDAG
  rationale: ἀκοή can mean hearing, report, or news. 'Reports' is broader and more
    lexically transparent than the traditional 'rumors,' which can imply falsehood
    not required by the Greek. The traditional alternative is preserved in a footnote
    because of its familiarity and possible contextual fit.
- source_word: ὁρᾶτε
  chosen: See that
  alternatives:
  - see
  - take heed
  - watch out
  lexicon: BDAG
  rationale: Imperative ὁρᾶτε here introduces a warning or exhortation. 'See that'
    naturally carries the sense 'make sure' in English and fits the following prohibition.
- source_word: μὴ θροεῖσθε
  chosen: you are not alarmed
  alternatives:
  - do not be troubled
  - do not be frightened
  - do not be terrified
  lexicon: BDAG
  rationale: θροέομαι denotes being disturbed, alarmed, or thrown into panic. 'Alarmed'
    is concise, natural, and fits the eschatological warning context without overstating
    the emotion.
- source_word: δεῖ γὰρ γενέσθαι
  chosen: for these things must happen
  alternatives:
  - for it must happen
  - for it is necessary for these things to happen
  lexicon: BDAG
  rationale: δεῖ expresses necessity; γενέσθαι here means 'to happen' or 'to take
    place.' Supplying 'these things' makes explicit the implied subject from context
    and yields clear English.
- source_word: ἀλλ’ οὔπω ἐστὶν τὸ τέλος
  chosen: but the end is not yet
  alternatives:
  - but it is not yet the end
  - but the end has not yet come
  lexicon: BDAG
  rationale: τέλος here refers to the eschatological end. 'But the end is not yet'
    is concise and closely follows the Greek word order and emphasis.
