theological_decisions:
- issue: Eschatological phrasing of τὸ τέλος
  chosen_reading: the end
  alternative_readings:
  - the consummation
  - the final end
  rationale: The phrase is left broad as in the Greek and not narrowed to a specific
    millennial or tribulational scheme. This preserves theological tension and avoids
    importing a denominational eschatology.
  doctrine_reference: Preserve theological tension rather than resolve it.
