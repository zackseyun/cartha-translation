theological_decisions:
- issue: Nature of the deception described by πλανήσουσιν
  chosen_reading: The verse warns that false prophets will mislead many people, without
    specifying the exact mechanism or extent of that deception.
  alternative_readings:
  - The deception is primarily doctrinal.
  - The deception is primarily moral or eschatological.
  rationale: The Greek verb πλανάω is broad enough to include doctrinal, moral, and
    spiritual misleading. The translation preserves that breadth rather than narrowing
    the warning to one theological category.
  doctrine_reference: Preserve theological tension rather than resolve it.
