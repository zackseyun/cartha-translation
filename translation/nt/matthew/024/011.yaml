id: MAT.24.11
reference: Matthew 24:11
source:
  edition: SBLGNT
  text: καὶ πολλοὶ ψευδοπροφῆται ἐγερθήσονται καὶ πλανήσουσιν πολλούς·
translation:
  text: And many false prophets will arise and will lead many astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will deceive many.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be raised up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural and sufficiently
    formal rendering in English.
- source_word: ψευδοπροφῆται
  chosen: false prophets
  alternatives:
  - lying prophets
  - pseudo-prophets
  lexicon: BDAG
  rationale: Compound noun meaning prophets who are false/deceptive. 'False prophets'
    is the established and accurate English rendering, preserving both lexical sense
    and biblical resonance without unnecessary paraphrase.
- source_word: ἐγερθήσονται
  chosen: will arise
  alternatives:
  - will be raised up
  - will appear
  lexicon: BDAG
  rationale: Future passive of ἐγείρω can mean 'be raised up' or idiomatically 'arise/appear.'
    In this context of deceptive figures emerging, 'will arise' is idiomatic and avoids
    implying resurrection while still reflecting the passive form's eventive sense.
- source_word: πλανήσουσιν
  chosen: will lead ... astray
  alternatives:
  - will deceive
  - will mislead
  lexicon: BDAG
  rationale: πλανάω commonly means to cause someone to wander, mislead, or deceive.
    'Lead astray' preserves the metaphor of wandering embedded in the Greek while
    remaining clear modern English. It also fits Jesus' eschatological warning context
    well.
- source_word: πολλούς
  chosen: many
  alternatives:
  - a great many
  - many people
  lexicon: BDAG
  rationale: Direct object of πλανήσουσιν; rendered simply as 'many' for natural English
    and close correspondence to the Greek.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates the two future actions straightforwardly.
    Retaining 'and ... and' reflects the Greek structure and the cumulative force
    of the warning.
