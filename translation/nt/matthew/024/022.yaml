theological_decisions:
- issue: Meaning of 'the elect' in an eschatological discourse
  chosen_reading: Retain the term 'the elect' without interpretive expansion.
  alternative_readings:
  - God's chosen people
  - the believers
  - the faithful remnant
  rationale: The verse identifies a group designated by ἐκλεκτοί but does not specify
    here the full theological scope of that group. To preserve theological tension
    and avoid denominational overreach, the translation keeps the lexical term 'the
    elect' rather than resolving debates about Israel, the church, or a remnant framework.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sense of σῴζω in context
  chosen_reading: Translate as 'saved' while allowing the immediate context to imply
    physical preservation.
  alternative_readings:
  - survived
  - been kept alive
  rationale: In this context the reference is to surviving catastrophic days, yet
    replacing σῴζω with 'survived' would narrow the term more than the Greek requires.
    'Saved' preserves the source wording and avoids importing a purely soteriological
    or purely physical reading.
  doctrine_reference: Translation philosophy §1, §3
