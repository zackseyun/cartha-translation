id: MAT.24.22
reference: Matthew 24:22
source:
  edition: SBLGNT
  text: καὶ εἰ μὴ ἐκολοβώθησαν αἱ ἡμέραι ἐκεῖναι, οὐκ ἂν ἐσώθη πᾶσα σάρξ· διὰ δὲ τοὺς
    ἐκλεκτοὺς κολοβωθήσονται αἱ ἡμέραι ἐκεῖναι.
translation:
  text: And if those days had not been cut short, no flesh would have been saved;
    but for the sake of the elect, those days will be cut short.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not been shortened ... will be shortened.' The Greek verb can be
      rendered either way; 'cut short' was chosen for clearer idiomatic force in English.
    reason: lexical_alternative
  - marker: b
    text: '''No flesh'' is a biblical idiom meaning no human being, no one alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολοβώθησαν / κολοβωθήσονται
  chosen: had not been cut short / will be cut short
  alternatives:
  - had not been shortened / will be shortened
  - had not been curtailed / will be curtailed
  lexicon: BDAG
  rationale: κολοβόω literally conveys shortening or cutting off. 'Cut short' is idiomatic
    modern English that preserves the force better than the flatter 'shortened,' while
    matching the temporal sense of days being reduced in duration.
- source_word: οὐκ ἂν ἐσώθη
  chosen: would have been saved
  alternatives:
  - would have survived
  - would have been preserved
  lexicon: BDAG
  rationale: The construction expresses a contrary-to-fact result. σῴζω can mean rescue,
    save, or preserve alive; in this tribulation context the immediate sense is physical
    preservation of life, but 'saved' keeps the lexical connection to σῴζω without
    over-paraphrasing. 'Would have been saved' best reflects the Greek form and leaves
    the broader semantic range intact.
- source_word: πᾶσα σάρξ
  chosen: no flesh
  alternatives:
  - no one
  - no human being
  - no living person
  lexicon: BDAG
  rationale: Following the doctrine guidance for σάρξ, this is a literal use, not
    the metaphorical 'sinful nature.' The idiom 'all flesh' means humanity/mortal
    creatures, but the negated clause is naturally rendered 'no flesh.' This preserves
    the biblical idiom and gravity better than the more interpretive 'no one.'
- source_word: διὰ δὲ τοὺς ἐκλεκτούς
  chosen: but for the sake of the elect
  alternatives:
  - but because of the elect
  - but on account of the chosen ones
  lexicon: BDAG
  rationale: 'διά with the accusative here indicates reason or benefit: ''for the
    sake of'' captures the purposive-benefactive nuance. ἐκλεκτοί is rendered ''the
    elect,'' the standard and precise theological term, without importing a denominational
    system beyond the text itself.'
- source_word: αἱ ἡμέραι ἐκεῖναι
  chosen: those days
  alternatives:
  - those particular days
  lexicon: BDAG
  rationale: A straightforward demonstrative phrase. 'Those days' is natural English
    and preserves the deictic force of ἐκεῖναι.
- source_word: καὶ εἰ μὴ
  chosen: And if ... not
  alternatives:
  - And unless
  lexicon: BDAG
  rationale: The Greek opens with a coordinated conditional clause. 'And if those
    days had not been cut short' preserves the explicit conditional structure more
    formally than 'unless,' while remaining readable.
