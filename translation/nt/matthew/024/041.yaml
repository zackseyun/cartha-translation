theological_decisions:
- issue: Whether to make explicit the feminine subjects implied by the participle
  chosen_reading: Explicitly render the implied subject as 'women'
  alternative_readings:
  - Two will be grinding at the mill
  rationale: The Greek participle ἀλήθουσαι is feminine plural, so the referents are
    specifically female. In keeping with gender-accurate translation, the English
    should reflect this rather than leave the subject generic.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Whether παραλαμβάνεται / ἀφίεται should be interpreted as salvation versus
    judgment
  chosen_reading: Retain the neutral wording 'is taken' / 'is left' without resolving
    the eschatological significance in the main text
  alternative_readings:
  - one is taken in judgment and one is spared
  - one is taken to salvation and one is left for judgment
  rationale: The verse itself states the separation but does not explicitly define
    the theological valence of each action. The translation should preserve that tension
    rather than resolve a debated interpretation in the wording.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
