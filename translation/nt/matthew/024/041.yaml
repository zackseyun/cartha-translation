id: MAT.24.41
reference: Matthew 24:41
source:
  edition: SBLGNT
  text: δύο ἀλήθουσαι ἐν τῷ ⸀μύλῳ, μία παραλαμβάνεται καὶ μία ἀφίεται.
translation:
  text: Two women will be grinding at the mill; one is taken and one is left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Two women grinding at the mill'; the Greek participle is feminine plural,
      making the subjects specifically women.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the handmill' or 'with the millstone'; the Greek can refer to the
      mill apparatus more specifically.
    reason: lexical_alternative
  - marker: c
    text: The Greek says simply 'one is taken and one is left,' without specifying
      here whether the taking is for salvation or judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: δύο
  chosen: Two
  alternatives:
  - Two women
  lexicon: BDAG
  rationale: Cardinal numeral introducing the pair. English requires no article here.
    The feminine reference is supplied by the feminine participle ἀλήθουσαι rather
    than by δύο itself.
- source_word: ἀλήθουσαι
  chosen: women will be grinding
  alternatives:
  - women grinding
  - female grinders
  lexicon: BDAG
  rationale: Present active participle, nominative feminine plural, from ἀλήθω, 'to
    grind.' Because the participle is feminine plural and lacks an explicit noun,
    English idiom naturally supplies 'women.' The progressive 'will be grinding' fits
    the scene-setting participial force in context, parallel to the surrounding examples.
- source_word: ἐν τῷ μύλῳ
  chosen: at the mill
  alternatives:
  - with the millstone
  - at the handmill
  lexicon: BDAG
  rationale: μύλος can denote a mill or millstone. In this domestic labor context,
    'at the mill' is natural modern English and avoids over-specifying the implement
    while preserving the sense of grinding grain.
- source_word: μία
  chosen: one
  lexicon: BDAG
  rationale: 'Indefinite distributive use: ''one ... and one ...'' preserves the contrast
    between the two women.'
- source_word: παραλαμβάνεται
  chosen: is taken
  alternatives:
  - is taken along
  - is received
  lexicon: BDAG
  rationale: Present passive indicative of παραλαμβάνω. 'Is taken' is the standard
    concise rendering and preserves the ambiguity of whether the taking is for salvation
    or judgment in this immediate clause; 'taken along' is possible but more interpretive.
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: Simple coordinating conjunction. 'And' best reflects the Greek without
    adding adversative force not explicit in the text.
- source_word: μία
  chosen: one
  lexicon: BDAG
  rationale: 'Second distributive numeral matching the first: ''one ... and one ...''.'
- source_word: ἀφίεται
  chosen: is left
  alternatives:
  - is left behind
  - is abandoned
  lexicon: BDAG
  rationale: Present passive indicative of ἀφίημι. 'Is left' is the most direct rendering.
    'Left behind' is idiomatic but can import eschatological associations beyond the
    Greek wording; 'abandoned' is too strong.
