id: MAT.24.3
reference: Matthew 24:3
source:
  edition: SBLGNT
  text: Καθημένου δὲ αὐτοῦ ἐπὶ τοῦ Ὄρους τῶν Ἐλαιῶν προσῆλθον αὐτῷ οἱ μαθηταὶ κατ’
    ἰδίαν λέγοντες· Εἰπὸν ἡμῖν πότε ταῦτα ἔσται, καὶ τί τὸ σημεῖον τῆς σῆς παρουσίας
    ⸀καὶ συντελείας τοῦ αἰῶνος.
translation:
  text: As he was sitting on the Mount of Olives, the disciples came to him privately,
    saying, “Tell us, when will these things be, and what will be the sign of your
    coming and of the end of the age?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence' or 'your arrival' for 'your coming.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the consummation of the age'; traditionally, 'the end of the world.'
    reason: alternative_reading
lexical_decisions:
- source_word: Καθημένου
  chosen: as he was sitting
  alternatives:
  - while he was sitting
  - when he was sitting
  - as he sat
  lexicon: BDAG
  rationale: Genitive absolute with αὐτοῦ, naturally rendered as a temporal circumstantial
    clause. 'As he was sitting' preserves the ongoing aspect without sounding wooden.
- source_word: Ὄρους τῶν Ἐλαιῶν
  chosen: the Mount of Olives
  alternatives:
  - the mountain of olives
  - the hill of olives
  lexicon: BDAG
  rationale: Standard place-name rendering in English; although literally 'mountain
    of olives,' the established geographic name best reflects idiomatic usage without
    loss of meaning.
- source_word: προσῆλθον αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  lexicon: BDAG
  rationale: Common narrative use of προσέρχομαι. 'Came to him' is natural modern
    English and sufficiently reflects the movement toward Jesus.
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: BDAG
  rationale: Idiomatic expression meaning apart from others. 'Privately' is concise
    and clear in context.
- source_word: Εἰπὸν ἡμῖν
  chosen: Tell us
  alternatives:
  - Say to us
  - Tell us, please
  lexicon: BDAG
  rationale: Aorist imperative of λέγω in direct request. 'Tell us' is idiomatic English;
    'say to us' would be overly literal.
- source_word: πότε ταῦτα ἔσται
  chosen: when will these things be
  alternatives:
  - when will these things happen
  - when will these things take place
  lexicon: BDAG
  rationale: Retains the broad futurity of ἔσται while preserving the demonstrative
    'these things.' 'Be' is slightly more formal and echoes the Greek structure.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: Standard rendering for σημεῖον in eschatological discourse; clear and
    consistent.
- source_word: παρουσίας
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context, παρουσία is conventionally and contextually
    best rendered 'coming.' The more literal 'presence' is possible lexically but
    would obscure the disciples' forward-looking question in English.
- source_word: συντελείας
  chosen: end
  alternatives:
  - consummation
  - completion
  - close
  lexicon: BDAG
  rationale: '''End'' is the most natural English rendering here. ''Consummation''
    is more formal and can be preserved in a footnote as a lexical alternative.'
- source_word: αἰῶνος
  chosen: age
  alternatives:
  - world
  - era
  lexicon: BDAG
  rationale: αἰών refers to an age or era rather than the physical world. 'Age' avoids
    importing cosmological finality beyond the Greek term itself.
