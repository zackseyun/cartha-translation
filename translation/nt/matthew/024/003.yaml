theological_decisions:
- issue: Rendering παρουσία in eschatological discourse
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The term can denote presence/arrival, but in Matthew 24 the disciples
    ask about the future manifestation associated with Jesus' return. 'Coming' is
    the clearest English rendering while preserving the eschatological force recognized
    in historic Christian interpretation, without over-specifying timing details.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering συντελείας τοῦ αἰῶνος
  chosen_reading: the end of the age
  alternative_readings:
  - the consummation of the age
  - the end of the world
  rationale: The Greek speaks of the completion/end of the age, not explicitly the
    destruction of the physical world. 'End of the age' preserves the wording and
    avoids importing a stronger cosmological claim. The traditional 'end of the world'
    is worth preserving as an alternative because of its history in English translation.
  doctrine_reference: Original-language primacy over translation tradition
