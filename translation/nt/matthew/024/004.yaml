id: MAT.24.4
reference: Matthew 24:4
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτοῖς· Βλέπετε μή τις ὑμᾶς πλανήσῃ·
translation:
  text: And Jesus answered them, “See that no one leads you astray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “deceives you.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι functions idiomatically as a
    deponent-like narrative participle, commonly rendered 'answered.' English does
    not require a separate participial clause ('answering'), so 'answered' gives natural
    narrative flow while preserving the responsive sense.
- source_word: εἶπεν
  chosen: answered them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Combined with the preceding participle, the clause καὶ ἀποκριθεὶς ...
    εἶπεν αὐτοῖς is a standard Semitic-influenced Greek expression. Rendering the
    whole as 'Jesus answered them' avoids wooden redundancy ('answered and said')
    while preserving both the response and speech-act.
- source_word: Βλέπετε
  chosen: See that
  alternatives:
  - beware
  - watch out
  - take care
  lexicon: BDAG
  rationale: Present active imperative plural of βλέπω here has the idiomatic sense
    of being on guard or taking care. 'See that' preserves the visual metaphor and
    introduces the following μή-clause naturally in English. 'Beware' is possible
    but slightly more interpretive and less formally tied to the Greek wording.
- source_word: μή τις
  chosen: that no one
  alternatives:
  - lest anyone
  - that nobody
  lexicon: BDAG
  rationale: 'μή with the subjunctive after an imperative expresses prevention: ''see
    to it that no one...'' ''That no one'' is clear modern English and accurately
    conveys the force without archaic ''lest.'''
- source_word: πλανήσῃ
  chosen: leads you astray
  alternatives:
  - deceives you
  - misleads you
  lexicon: BDAG
  rationale: πλανάω can mean to cause someone to wander, mislead, or deceive. In this
    eschatological warning context, 'leads you astray' preserves both deception and
    the idea of being drawn off the right path. 'Deceives you' is a strong traditional
    option and worth preserving as a lexical alternative.
