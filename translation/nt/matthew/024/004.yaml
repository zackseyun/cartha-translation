theological_decisions:
- issue: Nature of the warning in πλανήσῃ
  chosen_reading: a warning against being misled/deceived generally, rendered 'leads
    you astray'
  alternative_readings:
  - a narrower warning against intellectual deception only, rendered 'deceives you'
  rationale: The verse warns disciples against false guidance in the context of end-times
    claims. 'Leads you astray' preserves the broader theological tension of both deception
    and defection without narrowing the warning to mere false belief.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
