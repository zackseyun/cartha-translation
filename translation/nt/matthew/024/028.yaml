- issue: Interpretation of the proverb's imagery
  chosen_reading: Translate the image straightforwardly without resolving its broader
    eschatological referent.
  alternative_readings:
  - A proverb of inevitable judgment
  - A saying about the visibility of the Son of Man's coming
  - A reference tied to Jerusalem's destruction or Roman standards
  rationale: The verse's immediate lexical task is to render the proverb itself. The
    Greek does not explicitly identify what the corpse or birds symbolize, so the
    translation should preserve the image and not import a specific interpretive scheme
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
