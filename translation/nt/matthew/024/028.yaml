id: MAT.24.28
reference: Matthew 24:28
source:
  edition: SBLGNT
  text: ⸀ὅπου ἐὰν ᾖ τὸ πτῶμα, ἐκεῖ συναχθήσονται οἱ ἀετοί.
translation:
  text: Wherever the corpse is, there the vultures will gather.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eagles.' The Greek word can refer to eagles, but 'vultures' better fits
      the image of birds gathering around a corpse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν ᾖ
  chosen: Wherever ... is
  alternatives:
  - Where ... is
  - Wherever ... may be
  lexicon: BDAG
  rationale: 'The combination ὅπου with ἐάν and the subjunctive ᾖ expresses an indefinite
    relative sense: ''wherever'' or ''wherever ... may be.'' ''Wherever'' is concise
    and natural English while preserving the indefinite force.'
- source_word: πτῶμα
  chosen: corpse
  alternatives:
  - carcass
  - dead body
  lexicon: BDAG
  rationale: πτῶμα denotes a fallen body, especially a corpse. 'Corpse' is precise
    and idiomatic. 'Carcass' is possible and traditional in some English versions,
    but in contemporary English it can sound more animal-oriented or stylistically
    marked.
- source_word: συναχθήσονται
  chosen: will gather
  alternatives:
  - will be gathered
  - will assemble
  lexicon: BDAG
  rationale: 'The future passive form can be rendered woodenly as ''will be gathered,''
    but in English with animal subjects the natural equivalent is intransitive/middle-like:
    ''will gather.'' This preserves the sense without awkwardness. ''Will assemble''
    is too formal for scavenging birds.'
- source_word: ἀετοί
  chosen: vultures
  alternatives:
  - eagles
  lexicon: BDAG
  rationale: ἀετός can denote 'eagle,' but in this context of birds gathering around
    a corpse, 'vultures' best matches the likely referent and the proverb's imagery.
    Eagles are less naturally associated in English with carrion-scavenging flocks,
    whereas vultures are. The alternative 'eagles' should be preserved in a footnote
    because the Greek term itself commonly means 'eagles' and the traditional rendering
    is well known.
