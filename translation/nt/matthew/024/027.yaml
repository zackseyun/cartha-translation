theological_decisions:
- issue: Rendering παρουσία in an eschatological saying
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The verse compares the public, unmistakable manifestation of lightning
    with the future παρουσία of the Son of Man. In this context, 'coming' best communicates
    the eventive eschatological sense without importing a narrower doctrinal scheme.
    Because παρουσία can also mean 'presence,' that lexical alternative is preserved
    in a footnote rather than elevated to the main text.
  doctrine_reference: Translation philosophy §3; Preserve theological tension rather
    than resolve it
