id: MAT.24.44
reference: Matthew 24:44
source:
  edition: SBLGNT
  text: διὰ τοῦτο καὶ ὑμεῖς γίνεσθε ἕτοιμοι, ὅτι ᾗ ⸂οὐ δοκεῖτε ὥρᾳ⸃ ὁ υἱὸς τοῦ ἀνθρώπου
    ἔρχεται.
translation:
  text: For this reason, you also must be ready, because the Son of Man is coming
    at an hour you do not expect.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at an hour you do not think.' The Greek verb can mean 'think,' 'suppose,'
      or, by implication in context, 'expect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: διά with the accusative demonstrative points back to the preceding warning
    and gives an inferential-causal sense. 'For this reason' is natural English and
    preserves the explicit linkage.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - you yourselves also
  lexicon: BDAG
  rationale: καί with the explicit pronoun adds emphasis/inclusion. 'You also' preserves
    the stress without overtranslating the pronoun.
- source_word: γίνεσθε ἕτοιμοι
  chosen: must be ready
  alternatives:
  - be ready
  - become ready
  - keep yourselves ready
  lexicon: BDAG
  rationale: γίνεσθε is a present middle imperative/plural, calling for an ongoing
    state or posture. English idiom favors 'be ready'; adding 'must' appropriately
    conveys the imperatival force in smooth modern English. 'Become ready' is too
    ingressive here.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the command rather than mere content.
    'Because' best captures the causal force in contemporary English.
- source_word: ᾗ οὐ δοκεῖτε ὥρᾳ
  chosen: at an hour you do not expect
  alternatives:
  - at an hour you do not think
  - at the hour you do not suppose
  lexicon: BDAG
  rationale: The relative dative ᾗ ... ὥρᾳ is a temporal idiom, literally 'in/at which
    hour.' δοκεῖτε can mean 'think/suppose/seem,' but in this eschatological warning
    context 'expect' communicates the intended sense most clearly in English while
    preserving the unpredictability motif.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and literal rendering of the Greek title, preserving
    both its Semitic background and its christological significance. It should be
    translated, not paraphrased.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - will come
  lexicon: BDAG
  rationale: The present middle/passive indicative can function as a futuristic present.
    'Is coming' preserves the Greek aspect and vividness better than the simple future,
    while remaining natural English.
