theological_decisions:
- issue: Rendering the christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional literal rendering best preserves the title's wording,
    its likely Danielic resonance, and its established use in the Gospels without
    flattening its theological depth. The alternative is possible as an interpretive
    gloss but is too paraphrastic for the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
