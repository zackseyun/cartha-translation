theological_decisions:
- issue: Force of Jesus' claim about the permanence of his words
  chosen_reading: Render the statement straightforwardly as an emphatic contrast between
    the passing created order and the enduring authority and permanence of Jesus'
    words.
  alternative_readings:
  - A more interpretive rendering that foregrounds doctrinal implications about divine
    authority
  rationale: The verse itself makes a strong claim about the enduring certainty of
    Jesus' words. The translation preserves that force without importing additional
    doctrinal explanation beyond the text. This aligns with the instruction to preserve
    theological weight without adding claims not explicitly stated.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
