id: MAT.24.35
reference: Matthew 24:35
source:
  edition: SBLGNT
  text: ὁ οὐρανὸς καὶ ἡ γῆ ⸀παρελεύσεται, οἱ δὲ λόγοι μου οὐ μὴ παρέλθωσιν.
translation:
  text: Heaven and earth will pass away, but my words will certainly not pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will never pass away.' The Greek uses an emphatic negation (οὐ μὴ).
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In this eschatological pairing with γῆ, the singular οὐρανός refers to
    the created heavens rather than merely the visible sky. 'Heaven and earth' is
    the natural English equivalent for the merism denoting the present created order.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In the fixed expression 'heaven and earth,' γῆ denotes the earth/world
    rather than a particular land. 'Earth' preserves the cosmic scope of the saying.
- source_word: παρελεύσεται
  chosen: will pass away
  alternatives:
  - will pass by
  - will come to an end
  lexicon: BDAG
  rationale: Future middle of παρέρχομαι here expresses the passing away of the present
    created order. 'Pass away' is idiomatic, accurate, and preserves the solemn eschatological
    force without overinterpreting the mechanism of dissolution.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: δέ marks contrast between the transience of heaven and earth and the
    permanence of Jesus' words. 'But' best conveys that adversative force in English.
- source_word: λόγοι
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: λόγοι in this context refers to Jesus' spoken declarations/teachings.
    'Words' is the most direct and natural rendering and preserves the broad scope
    of what he has spoken.
- source_word: οὐ μὴ παρέλθωσιν
  chosen: will certainly not pass away
  alternatives:
  - will never pass away
  - shall by no means pass away
  lexicon: BDAG
  rationale: The οὐ μή construction with the aorist subjunctive is an emphatic negation.
    'Will certainly not pass away' communicates the force clearly in modern English
    without archaic phrasing. 'Will never pass away' is also possible, but 'certainly
    not' more directly reflects the emphatic negation.
