id: MAT.24.49
reference: Matthew 24:49
source:
  edition: SBLGNT
  text: καὶ ἄρξηται τύπτειν τοὺς συνδούλους ⸂αὐτοῦ, ἐσθίῃ δὲ καὶ πίνῃ⸃ μετὰ τῶν μεθυόντων,
translation:
  text: and begins to beat his fellow slaves, and eats and drinks with those who get
    drunk,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellow servants.' The Greek is literally 'fellow slaves' (συνδούλους),
      emphasizing their shared status under one master.
    reason: alternative_reading
  - marker: b
    text: Or 'with drunkards.' The Greek participle can denote those characterized
      by drunkenness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρξηται
  chosen: begins
  alternatives:
  - starts
  lexicon: BDAG
  rationale: 'Aorist middle subjunctive of ἄρχω here functions idiomatically with
    the infinitive τύπτειν to express the onset of an action: ''begins to.'' ''Begins''
    is standard, natural English and preserves the ingressive sense.'
- source_word: τύπτειν
  chosen: to beat
  alternatives:
  - to strike
  - to hit
  lexicon: BDAG
  rationale: τύπτω commonly means to strike or beat. In this context of abusive treatment
    of subordinates, 'beat' best conveys repeated violent action and fits the moral
    force of the warning better than the milder 'hit' or the more neutral 'strike'.
- source_word: συνδούλους
  chosen: fellow slaves
  alternatives:
  - fellow servants
  - fellow bondservants
  lexicon: BDAG
  rationale: From σύνδουλος, literally 'co-slave' or 'fellow slave.' In light of the
    translation philosophy for δοῦλος, 'slave' is preferred where bonded status is
    salient. Here the relationship within a master's household is central, so 'fellow
    slaves' preserves that social reality better than 'fellow servants.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: 'The genitive pronoun naturally modifies συνδούλους in English as a possessive:
    ''his fellow slaves.'' This is idiomatic and preserves the referential sense.'
- source_word: ἐσθίῃ ... καὶ πίνῃ
  chosen: eats and drinks
  alternatives:
  - eats and keeps drinking
  - feasts and drinks
  lexicon: BDAG
  rationale: The present subjunctives portray characteristic or ongoing behavior.
    'Eats and drinks' is a straightforward rendering that preserves the verbal pair
    without overinterpreting it as necessarily festive 'feasting.'
- source_word: μετὰ τῶν μεθυόντων
  chosen: with those who get drunk
  alternatives:
  - with drunkards
  - with those who are drunk
  lexicon: BDAG
  rationale: The present participle μεθυόντων denotes people engaged in drunkenness,
    not merely those presently intoxicated. 'Those who get drunk' captures the habitual
    aspect better than the static 'those who are drunk.' 'Drunkards' is possible but
    slightly more interpretive and label-like than the participial construction.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - then
  lexicon: BDAG
  rationale: Here δέ is mildly connective rather than strongly adversative. Rendering
    it as 'and' keeps the flow of the vice list natural in English without forcing
    a contrast.
