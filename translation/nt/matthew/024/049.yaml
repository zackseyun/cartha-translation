theological_decisions:
- issue: Rendering of δοῦλος-family term in συνδούλους
  chosen_reading: fellow slaves
  alternative_readings:
  - fellow servants
  - fellow bondservants
  rationale: The doctrine file allows servant/slave contextually and prefers 'slave'
    where bonded nature is salient. In this parabolic household setting, the master's
    ownership structure is part of the point, so 'fellow slaves' best reflects the
    social and moral force of the Greek.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
