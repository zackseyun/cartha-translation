id: MAT.24.50
reference: Matthew 24:50
source:
  edition: SBLGNT
  text: ἥξει ὁ κύριος τοῦ δούλου ἐκείνου ἐν ἡμέρᾳ ᾗ οὐ προσδοκᾷ καὶ ἐν ὥρᾳ ᾗ οὐ γινώσκει,
translation:
  text: the master of that slave will come on a day he does not expect and at an hour
    he does not know,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lord of that servant.' Greek kyrios can mean 'lord' or 'master';
      here it refers to the human superior in the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant' or 'bondservant.' Greek doulos denotes one in a bonded service
      relationship; 'slave' is used here because that status is contextually salient.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: Future of ἥκω denotes coming/arrival. 'Will come' is the most natural
    English in this eschatological-parabolic context and matches the idiom of a master's
    unexpected return.
- source_word: κύριος
  chosen: master
  alternatives:
  - lord
  - owner
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here it refers to the
    human superior of a slave in a parable, not directly to the divine title. 'Master'
    best conveys the social relationship in context.
- source_word: δοῦλου
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where the bonded
    nature is salient. In this master-slave household setting, the status relation
    is explicit, so 'slave' is preferable to the softer 'servant'.
- source_word: ἐκείνου
  chosen: that
  alternatives:
  - that very
  - that particular
  lexicon: BDAG
  rationale: Demonstrative points back to the specific slave under discussion. Simple
    'that' is sufficient and idiomatic.
- source_word: ἐν ἡμέρᾳ ᾗ
  chosen: on a day
  alternatives:
  - in a day
  - on the day when
  lexicon: BDAG
  rationale: The construction indicates the time at which the master comes. 'On a
    day' is idiomatic English and preserves the indefiniteness of the Greek.
- source_word: οὐ προσδοκᾷ
  chosen: he does not expect
  alternatives:
  - he is not expecting
  - he does not anticipate
  lexicon: BDAG
  rationale: προσδοκάω means to expect or await. The singular subject is the slave.
    'He does not expect' is clear, direct, and preserves the present-tense sense in
    natural English.
- source_word: ἐν ὥρᾳ ᾗ
  chosen: at an hour
  alternatives:
  - in an hour when
  - at the time when
  lexicon: BDAG
  rationale: This temporal phrase parallels 'on a day' and is best rendered literally
    as 'at an hour,' preserving the rhetorical pairing of day/hour.
- source_word: οὐ γινώσκει
  chosen: he does not know
  alternatives:
  - he is unaware of
  lexicon: BDAG
  rationale: γινώσκω here has the straightforward sense of knowing. 'He does not know'
    keeps the plain force and the parallelism with 'he does not expect'.
