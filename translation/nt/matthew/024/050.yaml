theological_decisions:
- issue: Rendering of κύριος in a parabolic household context
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: The verse uses κύριος for the owner/master of a slave within the story
    world. Translating it as 'Lord' here could misleadingly import a direct christological
    title into the immediate clause rather than preserving the parable's social imagery.
    The broader parable may have eschatological significance, but the lexical sense
    in this sentence is best represented by 'master.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate titles
    by meaning, but context governs whether the term is a divine title or a human
    superior.'
- issue: Rendering of δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt explicitly allows 'servant / slave' context-dependently
    and prefers 'slave' where bonded status is salient. Since the verse contrasts
    a κύριος and his δοῦλος in a household authority structure, 'slave' better preserves
    the social and rhetorical force.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy example for doulos;
    Contested terms table for δοῦλος.'
