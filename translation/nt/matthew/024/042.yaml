id: MAT.24.42
reference: Matthew 24:42
source:
  edition: SBLGNT
  text: γρηγορεῖτε οὖν, ὅτι οὐκ οἴδατε ποίᾳ ⸀ἡμέρᾳ ὁ κύριος ὑμῶν ἔρχεται.
translation:
  text: Therefore stay awake, because you do not know on what day your Lord is coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep watch' or 'be watchful.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on which day.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your Lord comes' or 'your Lord will come.' The Greek uses a present
      tense form.
    reason: alternative_reading
lexical_decisions:
- source_word: γρηγορεῖτε
  chosen: stay awake
  alternatives:
  - keep watch
  - be watchful
  - be alert
  lexicon: BDAG
  rationale: Present active imperative plural calls for ongoing vigilance. 'Stay awake'
    preserves the metaphor of wakefulness more directly than 'be ready,' while remaining
    idiomatic in modern English.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding teaching. 'Therefore' clearly signals
    the logical conclusion in readable English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the command. 'Because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: οὐκ οἴδατε
  chosen: you do not know
  alternatives:
  - you do not know for certain
  lexicon: BDAG
  rationale: Straightforward negated verb of knowing; no expansion beyond the Greek
    is warranted.
- source_word: ποίᾳ ἡμέρᾳ
  chosen: on what day
  alternatives:
  - on which day
  - what day
  lexicon: BDAG
  rationale: Dative phrase expressing time. 'On what day' is natural English and preserves
    the specificity of the unknown day.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In this eschatological
    saying, 'Lord' preserves both authority and established NT title usage.
- source_word: ὁ κύριος ὑμῶν
  chosen: your Lord
  alternatives:
  - the Lord of you
  lexicon: BDAG
  rationale: The article plus possessive pronoun is best rendered idiomatically as
    'your Lord' in English.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is about to come
  lexicon: BDAG
  rationale: Present middle/passive indicative can function futuristically in context.
    'Is coming' preserves the Greek present-form vividness better than a simple future
    while remaining natural in English.
