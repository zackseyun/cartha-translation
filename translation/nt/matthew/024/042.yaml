theological_decisions:
- issue: Eschatological force of the present tense ἔρχεται
  chosen_reading: Render with a present-progressive English form ('is coming') to
    preserve the vivid, imminent force without overstating timing.
  alternative_readings:
  - comes
  - will come
  rationale: The Greek uses a present tense in an eschatological context. Translating
    it as 'is coming' keeps the urgency and expectancy of the discourse while not
    importing a precise doctrine of imminence beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
