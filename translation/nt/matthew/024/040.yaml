theological_decisions:
- issue: Whether παραλαμβάνεται ('is taken') should be rendered in a way that implies
    rescue/salvation or judgment
  chosen_reading: Retain the neutral rendering 'is taken' in the main text
  alternative_readings:
  - '''is taken'' as taken in judgment'
  - '''is taken'' as taken to safety/rescue'
  rationale: The immediate discourse allows interpretive debate, especially in light
    of the Noah comparison in the surrounding context. The translation should preserve
    the text's wording without resolving the theological question in favor of a particular
    eschatological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether to make the masculine reference explicit in English
  chosen_reading: Use 'two men'
  alternative_readings:
  - '''two will be'''
  rationale: Although the numeral itself is not lexically 'men,' the masculine singular
    forms εἷς ... εἷς and the paired example with women in the next verse support
    an explicitly male scene here. This follows the gender-accurate principle rather
    than using a gender-neutral expression that obscures the source-text distinction.
  doctrine_reference: Gender-accurate over gender-neutral.
