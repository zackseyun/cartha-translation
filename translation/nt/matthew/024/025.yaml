theological_decisions:
- issue: Force of Jesus' statement in eschatological discourse
  chosen_reading: A straightforward assertion that Jesus has already informed his
    disciples ahead of the events in view.
  alternative_readings:
  - 'An emphatic warning: ''I have forewarned you'''
  rationale: The Greek verb προλέγω can support the nuance of warning in context,
    but the wording itself is fundamentally about prior telling. The translation preserves
    the statement without importing a stronger doctrinal or interpretive emphasis
    than the text explicitly carries.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
