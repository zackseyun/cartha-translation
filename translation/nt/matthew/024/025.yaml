id: MAT.24.25
reference: Matthew 24:25
source:
  edition: SBLGNT
  text: ἰδοὺ προείρηκα ὑμῖν.
translation:
  text: Look, I have told you beforehand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have told you in advance' or 'I have forewarned you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getting particle/interjection. 'Look' preserves
    the immediacy in natural modern English better than the more archaic 'Behold,'
    while remaining more forceful than omitting it.
- source_word: προείρηκα
  chosen: I have told beforehand
  alternatives:
  - I have told in advance
  - I have said beforehand
  - I have forewarned
  lexicon: BDAG
  rationale: Perfect active of προλέγω, indicating a prior statement with present
    relevance. 'I have told ... beforehand' preserves both the verbal idea of speaking
    and the temporal prefix προ-. 'Forewarned' is possible in context, but it can
    over-specify warning rather than prior telling.
- source_word: ὑμῖν
  chosen: you
  lexicon: BDAG
  rationale: Second person plural dative, naturally rendered 'you' in English. Number
    is not marked in standard English here, and no special emphasis requires expansion
    such as 'to you' in the main text.
