theological_decisions:
- issue: Rendering κύριος in a parabolic household context
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The verse uses household-management imagery rather than directly foregrounding
    the christological title. Rendering κύριος as 'master' preserves the social metaphor
    while avoiding importing a more explicit titular sense into the parable's surface
    wording. The broader discourse may still imply the Lord by analogy, but the translation
    should reflect the immediate lexical sense in context.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος default ''Lord'';
    context-sensitive variance must be documented)'
