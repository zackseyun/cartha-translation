id: MAT.24.45
reference: Matthew 24:45
source:
  edition: SBLGNT
  text: Τίς ἄρα ἐστὶν ὁ πιστὸς δοῦλος καὶ φρόνιμος ὃν κατέστησεν ὁ ⸀κύριος ἐπὶ τῆς
    ⸀οἰκετείας αὐτοῦ τοῦ ⸀δοῦναι αὐτοῖς τὴν τροφὴν ἐν καιρῷ;
translation:
  text: Who then is the faithful and wise slave, whom the master has appointed over
    his household to give them their food at the proper time?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Greek word can mean either 'slave' or 'servant' depending
      on context; here 'slave' preserves the stronger sense of one under a master's
      authority.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lord.' In this household image, the Greek word is rendered 'master'
      to fit the parable's social setting.
    reason: alternative_reading
lexical_decisions:
- source_word: Τίς ἄρα
  chosen: Who then
  alternatives:
  - Who therefore
  - Who, then
  lexicon: BDAG
  rationale: Interrogative τίς with inferential/continuative ἄρα introduces a rhetorical
    question drawing an implication from the preceding teaching. 'Who then' is natural
    modern English and preserves the discourse force.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: πιστός here describes the character of the slave as dependable in carrying
    out assigned duties. 'Faithful' is the standard and best preserves both reliability
    and covenantal/moral resonance.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered context-dependently as 'servant / slave.'
    Here the figure is one appointed by a superior over a household; the bonded status
    is part of the image, so 'slave' better reflects the source than the softer 'servant.'
    An alternative is preserved in a footnote because many English readers expect
    'servant' in parabolic contexts.
- source_word: φρόνιμος
  chosen: wise
  alternatives:
  - prudent
  - sensible
  lexicon: BDAG
  rationale: φρόνιμος denotes practical wisdom or prudence. 'Wise' is idiomatic in
    English and matches Matthew's recurring usage, while still allowing the practical
    sense in context.
- source_word: κατέστησεν
  chosen: has appointed
  alternatives:
  - set
  - put in charge of
  - placed
  lexicon: BDAG
  rationale: καθίστημι in this context means to appoint or place in a position of
    responsibility. 'Has appointed' clearly conveys delegated authority and fits the
    relative clause naturally.
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although the default rendering of κύριος is 'Lord,' context here is a
    household parable in which the referent is the owner/master of servants. 'Master'
    best conveys the social relation in the image. 'Lord' would sound more overtly
    titular and less domestic in this immediate context.
- source_word: οἰκετείας
  chosen: household
  alternatives:
  - household servants
  - domestic staff
  lexicon: BDAG
  rationale: οἰκετεία refers to the household establishment, especially those belonging
    to the house. 'Household' is concise and natural; the following plural 'them'
    makes clear that the appointed slave is set over the members of the household.
- source_word: τοῦ δοῦναι
  chosen: to give
  alternatives:
  - for giving
  - so as to give
  lexicon: BDAG
  rationale: 'The articular infinitive expresses purpose: the appointment is for the
    purpose of giving. English infinitive ''to give'' captures this smoothly.'
- source_word: τροφὴν
  chosen: their food
  alternatives:
  - food allowance
  - rations
  lexicon: BDAG
  rationale: τροφή means food/nourishment. In a household-management setting it can
    imply allotted provisions, but 'their food' is the clearest natural rendering
    without over-specifying.
- source_word: ἐν καιρῷ
  chosen: at the proper time
  alternatives:
  - in due time
  - at the right time
  lexicon: BDAG
  rationale: καιρός denotes an appropriate or appointed time rather than mere clock
    time. 'At the proper time' preserves the nuance of fitting, timely provision.
