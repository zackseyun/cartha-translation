id: MAT.24.48
reference: Matthew 24:48
source:
  edition: SBLGNT
  text: ἐὰν δὲ εἴπῃ ὁ κακὸς δοῦλος ἐκεῖνος ἐν τῇ καρδίᾳ αὐτοῦ· Χρονίζει ⸂μου ὁ κύριος⸃,
translation:
  text: But if that wicked servant says in his heart, ‘My master is delaying,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that wicked slave.' The Greek word doulos can mean either 'servant'
      or 'slave,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'My lord is delaying.' Here 'master' reflects the household setting of
      the parable; the Greek word is kyrios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: But if
  alternatives:
  - But whenever
  - Now if
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive introduces a conditional scenario; δέ
    adds mild contrast/continuation. 'But if' is natural English and preserves the
    conditional force.
- source_word: εἴπῃ
  chosen: says
  alternatives:
  - should say
  - were to say
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ἐὰν is best rendered in idiomatic English as
    a present-tense condition: ''if ... says.'' This avoids wooden English while preserving
    the conditional sense.'
- source_word: ὁ κακὸς δοῦλος ἐκεῖνος
  chosen: that wicked servant
  alternatives:
  - that evil servant
  - that wicked slave
  lexicon: BDAG
  rationale: κακός here characterizes the servant morally as 'wicked' or 'evil'; 'wicked'
    fits the warning context well. δοῦλος can be 'servant' or 'slave' per project
    policy; here the bonded nature is not the main point, but the role within a household/parabolic
    setting, so 'servant' is preferred. ἐκεῖνος is naturally rendered 'that,' retaining
    the demonstrative emphasis.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: BDAG
  rationale: A standard idiom for inward thought or self-talk. 'In his heart' preserves
    the metaphor and biblical register without sounding archaic.
- source_word: Χρονίζει
  chosen: is delaying
  alternatives:
  - delays
  - is taking a long time
  - is late
  lexicon: BDAG
  rationale: The present tense indicates ongoing delay. 'Is delaying' best captures
    the verbal aspect and the servant's complaint/perception.
- source_word: μου ὁ κύριος
  chosen: My master
  alternatives:
  - my lord
  - my master/lord
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' in the project when used as a title with theological
    weight. In this parabolic household context, however, it refers to the servant's
    human superior within the story, so 'master' is the clearest contextual rendering.
    The possessive μου is naturally fronted in English as 'My master.'
