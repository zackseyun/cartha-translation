theological_decisions:
- issue: Rendering κύριος in a parabolic, non-Christological household context
  chosen_reading: master
  alternative_readings:
  - lord
  - Lord
  rationale: Although κύριος has a default project rendering of 'Lord,' context governs
    here. Within the parable, the δοῦλος speaks of his superior in household terms,
    so 'master' communicates the narrative relationship without importing unnecessary
    christological overtones into the servant's direct speech. Because the broader
    discourse concerns the Son of Man's return, readers may still perceive the parabolic
    referent beyond the story level, but the translation should reflect the immediate
    lexical sense.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy #1 and #5'
- issue: Rendering δοῦλος in this verse
  chosen_reading: servant
  alternative_readings:
  - slave
  - bondservant
  rationale: The project allows 'servant / slave' context-dependently. Here the emphasis
    is on the servant's entrusted role and conduct in a household parable rather than
    on the bonded status itself, so 'servant' is the better optimal-equivalence choice.
    The alternative 'slave' remains lexically possible and is preserved in a footnote
    for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1 and #5'
