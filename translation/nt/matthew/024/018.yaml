- issue: Gender representation in the substantival masculine article
  chosen_reading: the one in the field
  alternative_readings:
  - the man in the field
  rationale: The masculine form is grammatically masculine but representative/generic
    in this warning discourse. Following the translation philosophy's gender-accurate
