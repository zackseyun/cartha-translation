id: MAT.24.18
reference: Matthew 24:18
source:
  edition: SBLGNT
  text: καὶ ὁ ἐν τῷ ἀγρῷ μὴ ἐπιστρεψάτω ὀπίσω ἆραι ⸂τὸ ἱμάτιον⸃ αὐτοῦ.
translation:
  text: And let the one in the field not turn back to take his cloak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his garment' or 'his outer garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐν τῷ ἀγρῷ
  chosen: the one in the field
  alternatives:
  - the man in the field
  - whoever is in the field
  lexicon: BDAG
  rationale: The articular phrase functions substantivally to denote a person characterized
    by being in the field. 'The one in the field' preserves the singular and representative
    force without unnecessarily specifying 'man' where the Greek masculine article
    is generic in context.
- source_word: μὴ ἐπιστρεψάτω
  chosen: let ... not turn back
  alternatives:
  - must not return
  - should not go back
  lexicon: BDAG
  rationale: The aorist imperative with μή gives a prohibition. 'Let ... not turn
    back' preserves the imperative force in natural English and fits the urgent discourse
    context.
- source_word: ὀπίσω
  chosen: back
  alternatives:
  - behind
  - to the rear
  lexicon: BDAG
  rationale: In combination with ἐπιστρεψάτω, ὀπίσω idiomatically means 'back' or
    'back again,' not spatial 'behind' in a literal sense.
- source_word: ἆραι
  chosen: to take
  alternatives:
  - to get
  - to pick up
  lexicon: BDAG
  rationale: 'The aorist infinitive of αἴρω here expresses purpose after the motion
    verb: turning back in order to take something. ''Take'' is the most straightforward
    and idiomatic rendering.'
- source_word: τὸ ἱμάτιον αὐτοῦ
  chosen: his cloak
  alternatives:
  - his garment
  - his outer garment
  - his coat
  lexicon: BDAG
  rationale: ἱμάτιον commonly refers to an outer garment or cloak. 'Cloak' is more
    specific and contextually apt than the broader 'garment,' especially in a scene
    of urgent flight where one might be tempted to retrieve an outer wrap.
