theological_decisions:
- issue: Rendering of eschatologically charged θλῖψις
  chosen_reading: tribulation
  alternative_readings:
  - distress
  - affliction
  rationale: The verse is situated in Jesus' eschatological discourse. While θλῖψις
    can be rendered more generically, 'tribulation' preserves the gravity and intertextual
    resonance without adding doctrinal specificity beyond the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
