id: MAT.24.13
reference: Matthew 24:13
source:
  edition: SBLGNT
  text: ὁ δὲ ὑπομείνας εἰς τέλος οὗτος σωθήσεται.
translation:
  text: But the one who endures to the end, this one will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the end.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be delivered.' The Greek can denote rescue or salvation; the broader
      wording is retained here because the context does not require narrowing the
      sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... ὑπομείνας
  chosen: the one who endures
  alternatives:
  - he who endures
  - the one who has endured
  lexicon: BDAG
  rationale: The article with the aorist participle functions substantivally, referring
    to a person characterized by enduring. 'The one who endures' is natural modern
    English and preserves the representative singular without over-specifying gender.
    The aorist participle here is rendered in idiomatic English relative-clause form
    rather than as a strictly past action.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding warnings about falling away
    or failing under pressure. 'But' best signals that contrast in context.
- source_word: ὑπομείνας
  chosen: endures
  alternatives:
  - perseveres
  - remains steadfast
  lexicon: BDAG
  rationale: ὑπομένω carries the sense of remaining under trial, enduring, or persevering.
    'Endures' is the most direct and accessible rendering; 'perseveres' is possible
    but slightly more interpretive and theological in English usage.
- source_word: εἰς τέλος
  chosen: to the end
  alternatives:
  - until the end
  lexicon: BDAG
  rationale: The prepositional phrase indicates continuance up to the endpoint. 'To
    the end' is concise and idiomatic; 'until the end' is also valid but slightly
    more expansive.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that one
  - such a person
  lexicon: BDAG
  rationale: οὗτος is emphatic and resumptive after the participial phrase. Rendering
    it as 'this one' preserves the Greek emphasis better than omitting it or collapsing
    it into a simple pronoun.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: The future passive of σῴζω can mean save or deliver. In Matthew's eschatological
    context, 'will be saved' preserves the broader theological and eschatological
    sense without narrowing it merely to temporal rescue.
