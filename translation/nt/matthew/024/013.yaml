theological_decisions:
- issue: Meaning of 'will be saved' in an eschatological endurance context
  chosen_reading: Retain the broader wording 'will be saved' without specifying whether
    the salvation is final eschatological salvation, deliverance through tribulation,
    or both.
  alternative_readings:
  - will be delivered (primarily temporal preservation)
  - will attain final salvation (primarily eternal sense)
  rationale: The verse does not explicitly resolve the scope of salvation here. In
    keeping with the translation philosophy, the rendering preserves the theological
    tension rather than importing a denominational conclusion about perseverance or
    the exact nature of the promised salvation.
  doctrine_reference: Preserve theological tension rather than resolve it.
