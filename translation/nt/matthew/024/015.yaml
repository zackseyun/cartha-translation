theological_decisions:
- issue: Definiteness of τόπῳ ἁγίῳ and possible temple-specific interpretation
  chosen_reading: in a holy place
  alternative_readings:
  - in the holy place
  rationale: The phrase likely evokes the temple or a sanctified location, but the
    Greek anarthrous expression does not compel the more specific English 'the holy
    place.' To preserve the textual wording without narrowing the referent beyond
    what the Greek states, the main text uses 'a holy place,' while the more traditional
    temple-specific rendering is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
- issue: Rendering of the Danielic phrase βδέλυγμα τῆς ἐρημώσεως
  chosen_reading: the abomination of desolation
  alternative_readings:
  - the desolating abomination
  - the abomination that causes desolation
  rationale: Because the phrase is a recognized allusion to Daniel and carries established
    apocalyptic significance, the translation preserves the more formal wording rather
    than resolving its meaning into an interpretive paraphrase. Alternatives are preserved
    in a footnote for clarity.
  doctrine_reference: 'Translation philosophy #1, #3'
