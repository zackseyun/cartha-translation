id: MAT.24.15
reference: Matthew 24:15
source:
  edition: SBLGNT
  text: Ὅταν οὖν ἴδητε τὸ βδέλυγμα τῆς ἐρημώσεως τὸ ῥηθὲν διὰ Δανιὴλ τοῦ προφήτου
    ⸀ἑστὸς ἐν τόπῳ ἁγίῳ, ὁ ἀναγινώσκων νοείτω,
translation:
  text: So when you see the abomination of desolation spoken of through Daniel the
    prophet standing in a holy place—let the reader understand—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “in the holy place.”
    reason: alternative_reading
  - marker: b
    text: Or “the desolating abomination” or “the abomination that causes desolation,”
      echoing Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a future contingency with the subjunctive; 'when' is the natural
    English rendering in this prophetic context.
- source_word: οὖν
  chosen: so
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks inference/transition from the preceding discourse. 'So' is idiomatic
    modern English and preserves the discourse connection without sounding overly
    formal.
- source_word: ἴδητε
  chosen: you see
  alternatives:
  - you catch sight of
  - you perceive
  lexicon: BDAG
  rationale: Aorist subjunctive of ὁράω in a temporal clause; 'see' is the straightforward
    rendering.
- source_word: τὸ βδέλυγμα τῆς ἐρημώσεως
  chosen: the abomination of desolation
  alternatives:
  - the desolating abomination
  - the abomination that causes desolation
  lexicon: BDAG
  rationale: This is a recognized apocalyptic expression echoing Daniel. The traditional
    phrase closely reflects the Greek genitive construction and preserves the intertextual
    link. Alternatives are viable interpretive expansions but are less formally transparent.
- source_word: τὸ ῥηθὲν
  chosen: spoken of
  alternatives:
  - spoken
  - mentioned
  lexicon: BDAG
  rationale: The participle refers to what was spoken in prophecy. 'Spoken of' reads
    naturally in English when followed by 'through Daniel the prophet' and makes clear
    that the phrase was prophetically uttered.
- source_word: διὰ Δανιὴλ τοῦ προφήτου
  chosen: through Daniel the prophet
  alternatives:
  - by Daniel the prophet
  lexicon: BDAG
  rationale: διά with genitive commonly indicates agency/instrumentality in prophetic
    speech; 'through' preserves the sense that the utterance came by means of Daniel.
- source_word: ἑστὸς
  chosen: standing
  alternatives:
  - set up
  - standing there
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι functioning adjectivally/predicatively.
    'Standing' is the most direct rendering. Because the participle is neuter agreeing
    grammatically with βδέλυγμα, the English leaves the referent impersonal without
    over-interpreting.
- source_word: ἐν τόπῳ ἁγίῳ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: BDAG
  rationale: The Greek lacks the article before τόπῳ, so 'a holy place' best reflects
    the anarthrous construction. 'The holy place' is possible as a contextual specification
    to the temple precincts, but the Greek form itself does not require definiteness.
- source_word: ὁ ἀναγινώσκων νοείτω
  chosen: let the reader understand
  alternatives:
  - let the one reading understand
  - let the reader take note
  lexicon: BDAG
  rationale: A parenthetical exhortation. 'Let the reader understand' is concise,
    natural, and preserves the imperative force of νοείτω.
