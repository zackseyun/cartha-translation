id: MAT.24.47
reference: Matthew 24:47
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ὅτι ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ καταστήσει αὐτόν.
translation:
  text: Truly I say to you that he will appoint him over all his possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over all that he has.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative declaration. In the Synoptics, English
    idiom is best served by 'Truly' rather than a transliterated 'Amen.' 'Truly, truly'
    is not appropriate here because the Greek has a single ἀμὴν, not the Johannine
    doubled form.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A direct and transparent rendering of the present verb plus dative pronoun.
    'I tell you' is idiomatic, but 'I say to you' preserves the formulaic solemnity
    of Jesus' speech with minimal awkwardness.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content clause following the solemn formula; explicit
    'that' keeps the syntax clear in English.
- source_word: ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ
  chosen: over all his possessions
  alternatives:
  - over all that he has
  - over all his property
  lexicon: BDAG
  rationale: ἐπί with the dative after καθίστημι conveys appointment over a sphere
    of responsibility. τοῖς ὑπάρχουσιν literally means 'the things belonging to/being
    possessed by him,' so 'possessions' is concise and natural. 'All that he has'
    is slightly more literal and is preserved in a footnote as a lexical alternative.
- source_word: καταστήσει
  chosen: he will appoint
  alternatives:
  - he will put
  - he will set
  - he will place
  lexicon: BDAG
  rationale: Future of καθίστημι here means to assign or appoint to a position of
    oversight. 'Appoint' best captures the administrative sense in context, rather
    than merely physical placement.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Refers to the faithful and wise slave/servant in the preceding context.
    The masculine singular should be retained as in the Greek; no gender-neutral recasting
    is warranted here under the project's gender-accurate policy.
