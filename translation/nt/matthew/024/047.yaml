theological_decisions:
- issue: Nature of the master's reward/entrustment
  chosen_reading: Render the statement straightforwardly as appointment over the master's
    possessions without importing eschatological systematization.
  alternative_readings:
  - Interpret as a metaphor for ecclesial authority
  - Interpret as a metaphor for end-time heavenly reward
  rationale: The verse itself states a promotion to broader stewardship within the
    parable's logic. While interpreters may connect this to ecclesial or eschatological
    realities, the translation should not encode those theological inferences beyond
    the text's plain sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
