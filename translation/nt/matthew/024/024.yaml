id: MAT.24.24
reference: Matthew 24:24
source:
  edition: SBLGNT
  text: ἐγερθήσονται γὰρ ψευδόχριστοι καὶ ψευδοπροφῆται, καὶ δώσουσιν σημεῖα μεγάλα
    καὶ τέρατα ὥστε ⸀πλανῆσαι εἰ δυνατὸν καὶ τοὺς ἐκλεκτούς·
translation:
  text: For false messiahs and false prophets will arise, and they will perform great
    signs and wonders so as to lead astray, if possible, even the elect.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'false Christs.' The Greek uses the title Christos; here it is rendered
      'messiahs' because the sense is titular rather than name-like.
    reason: alternative_reading
  - marker: b
    text: Or, 'deceive.' The verb can mean to cause someone to wander or go astray,
      hence 'lead astray.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'if it were possible.' The Greek simply says 'if possible,' leaving
      the theological implication unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγερθήσονται
  chosen: will arise
  alternatives:
  - will be raised up
  - will appear
  lexicon: BDAG
  rationale: Future passive of ἐγείρω here is idiomatic for persons coming forward
    or appearing on the scene. 'Will arise' is natural English and preserves the sense
    without implying resurrection.
- source_word: ψευδόχριστοι
  chosen: false messiahs
  alternatives:
  - false Christs
  lexicon: BDAG
  rationale: Following the doctrine's default for Χριστός as a title, 'messiahs' preserves
    the Hebraic and titular sense better than the traditional 'Christs.' The ψευδο-
    prefix is rendered straightforwardly as 'false.'
- source_word: ψευδοπροφῆται
  chosen: false prophets
  lexicon: BDAG
  rationale: Standard and direct rendering of the compound noun; no contextual reason
    to vary.
- source_word: δώσουσιν
  chosen: they will perform
  alternatives:
  - they will give
  - they will produce
  lexicon: BDAG
  rationale: Although δίδωμι is literally 'give,' with σημεῖα and τέρατα in this idiom
    English more naturally says 'perform' or 'produce.' 'Perform' best conveys the
    doing of miraculous displays.
- source_word: σημεῖα μεγάλα
  chosen: great signs
  alternatives:
  - great miracles
  - great signs
  lexicon: BDAG
  rationale: σημεῖα is kept as 'signs' rather than flattened to 'miracles,' since
    the term can denote evidentiary or portentous acts. μεγάλα is rendered attributively
    as 'great.'
- source_word: τέρατα
  chosen: wonders
  alternatives:
  - portents
  lexicon: BDAG
  rationale: The common biblical pairing 'signs and wonders' is both accurate and
    idiomatic. 'Wonders' captures the astonishing character of τέρατα.
- source_word: ὥστε πλανῆσαι
  chosen: so as to lead astray
  alternatives:
  - so that they might deceive
  - with the result that they deceive
  lexicon: BDAG
  rationale: ὥστε with the infinitive commonly expresses intended or natural result.
    'So as to lead astray' preserves the infinitival construction and the force of
    πλανάω without overcommitting to either pure purpose or pure result.
- source_word: πλανῆσαι
  chosen: lead astray
  alternatives:
  - deceive
  lexicon: BDAG
  rationale: πλανάω often means to cause someone to wander or go astray, not merely
    to tell falsehoods. 'Lead astray' is slightly fuller and preserves the directional
    nuance better than 'deceive' alone.
- source_word: εἰ δυνατὸν
  chosen: if possible
  alternatives:
  - if it were possible
  lexicon: BDAG
  rationale: The Greek phrase is concise and idiomatic. 'If possible' is the most
    direct rendering; the more counterfactual-sounding 'if it were possible' imports
    a nuance not explicit in the wording here.
- source_word: καὶ τοὺς ἐκλεκτούς
  chosen: even the elect
  alternatives:
  - even the chosen ones
  lexicon: BDAG
  rationale: καί here has an ascensive force, hence 'even.' ἐκλεκτούς is rendered
    'the elect,' a standard and accurate term in this context; 'chosen ones' is possible
    but less idiomatic in English biblical style.
