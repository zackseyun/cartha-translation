theological_decisions:
- issue: Rendering of ψευδόχριστοι in light of contested term Χριστός
  chosen_reading: false messiahs
  alternative_readings:
  - false Christs
  rationale: Because Χριστός functions here as a title rather than a name-like designation,
    the doctrinal guideline prefers 'Messiah.' This avoids translation-tradition inertia
    and preserves the Jewish messianic context of Jesus' warning.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός → Messiah (where
    title; Christ where name-like)'
- issue: Force of εἰ δυνατὸν regarding the elect
  chosen_reading: if possible
  alternative_readings:
  - if it were possible
  rationale: The verse warns of the severity of deception without resolving broader
    doctrinal debates about whether the elect can finally be deceived. The translation
    preserves the Greek's conditional wording rather than sharpening it toward a specific
    theological system.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
