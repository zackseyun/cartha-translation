id: MAT.24.32
reference: Matthew 24:32
source:
  edition: SBLGNT
  text: Ἀπὸ δὲ τῆς συκῆς μάθετε τὴν παραβολήν· ὅταν ἤδη ὁ κλάδος αὐτῆς γένηται ἁπαλὸς
    καὶ τὰ φύλλα ἐκφύῃ, γινώσκετε ὅτι ἐγγὺς τὸ θέρος·
translation:
  text: 'Now learn the parable from the fig tree: as soon as its branch becomes tender
    and puts out leaves, you know that summer is near.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lesson' or 'the illustration' for 'the parable.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sprouts leaves.'
    reason: lexical_alternative
  - marker: c
    text: θέρος can denote 'summer' and, in some contexts, the harvest season; here
      the seasonal sense best fits the fig tree imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς συκῆς
  chosen: from the fig tree
  alternatives:
  - from the fig tree learn
  - learn from the fig tree
  lexicon: BDAG
  rationale: Ἀπό with the genitive marks source, and τῆς συκῆς is the object of learning.
    In English, 'learn the parable from the fig tree' preserves both the prepositional
    force and natural word order. 'Now' carries the mild transitional force of δέ.
- source_word: μάθετε
  chosen: learn
  alternatives:
  - understand
  - take a lesson
  lexicon: BDAG
  rationale: Aorist imperative of μανθάνω is best rendered as a direct command, 'learn.'
    'Understand' is possible but shifts from the act of taking instruction to the
    result.
- source_word: τὴν παραβολήν
  chosen: the parable
  alternatives:
  - the lesson
  - the illustration
  lexicon: BDAG
  rationale: παραβολή commonly means 'parable' or illustrative comparison. 'Parable'
    preserves the Gospel idiom, while the following clause explains the comparison.
    'Lesson' is interpretive and less formally tied to the Greek term.
- source_word: ὅταν ἤδη
  chosen: as soon as
  alternatives:
  - when already
  - when
  lexicon: BDAG
  rationale: ὅταν introduces a general temporal condition, and ἤδη adds the sense
    of onset/already. 'As soon as' captures the observable beginning of the seasonal
    sign in idiomatic English.
- source_word: ὁ κλάδος αὐτῆς γένηται ἁπαλὸς
  chosen: its branch becomes tender
  alternatives:
  - its branch becomes soft
  - its branch becomes supple
  lexicon: BDAG
  rationale: γένηται marks a change of state, and ἁπαλός refers to tenderness/softness
    in new growth. 'Tender' is the most natural botanical English equivalent.
- source_word: καὶ τὰ φύλλα ἐκφύῃ
  chosen: and puts out leaves
  alternatives:
  - and sprouts leaves
  - and its leaves come out
  lexicon: BDAG
  rationale: ἐκφύῃ means to sprout or put forth. 'Puts out leaves' is idiomatic modern
    English for plant growth and accurately reflects the imagery.
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - know
  - recognize
  lexicon: BDAG
  rationale: Present indicative second plural is naturally rendered 'you know' in
    a generalizing sense. An imperative reading ('know!') is not supported by the
    morphology given here.
- source_word: ἐγγὺς τὸ θέρος
  chosen: summer is near
  alternatives:
  - the summer is near
  - harvest is near
  lexicon: BDAG
  rationale: 'θέρος ordinarily denotes ''summer'' in this context of fig-tree seasonal
    signs. While the term can in some contexts relate to harvest, here the natural
    seasonal reference is primary. English idiom omits the article: ''summer is near.'''
