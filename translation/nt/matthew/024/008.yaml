id: MAT.24.8
reference: Matthew 24:8
source:
  edition: SBLGNT
  text: πάντα δὲ ταῦτα ἀρχὴ ὠδίνων.
translation:
  text: But all these things are the beginning of birth pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'labor pains' or 'birth pangs.' The Greek evokes the pains of childbirth
      as a metaphor for the beginning stage of coming distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: all
  alternatives:
  - everything
  lexicon: BDAG
  rationale: With the demonstrative ταῦτα, πάντα forms the phrase 'all these things.'
    'All' is the most natural and sufficiently formal rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding list to Jesus'
    evaluative summary. 'But' best captures the discourse turn in English.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  lexicon: BDAG
  rationale: The demonstrative refers back to the preceding events just mentioned.
    'These things' is clearer in English than the bare 'these' and preserves the referential
    force.
- source_word: ἀρχὴ
  chosen: the beginning
  alternatives:
  - a beginning
  - the start
  lexicon: BDAG
  rationale: 'Although the Greek lacks the article, the predicate nominative in English
    is most naturally rendered with the definite article in this idiom: ''are the
    beginning of…''. ''The beginning'' also reflects the sense of an initial stage
    rather than one beginning among many.'
- source_word: ὠδίνων
  chosen: birth pains
  alternatives:
  - labor pains
  - birth pangs
  lexicon: BDAG
  rationale: ὠδίνες denotes the pains of childbirth. 'Birth pains' is clear modern
    English, preserves the metaphor's force, and avoids the slightly archaic tone
    of 'birth pangs.' 'Labor pains' is possible, but 'birth pains' is a more established
    biblical phrasing.
