theological_decisions:
- issue: Metaphorical force of ὠδίνων
  chosen_reading: Retain the childbirth metaphor as 'birth pains' rather than flattening
    it to 'sufferings' or 'troubles.'
  alternative_readings:
  - labor pains
  - birth pangs
  - sufferings
  rationale: The verse presents the preceding upheavals not as the end itself but
    as the initial stage of a larger process. Preserving the childbirth metaphor maintains
    the eschatological tension of the source text without importing a more specific
    doctrinal scheme than the verse states.
  doctrine_reference: Translation philosophy §3, §6
