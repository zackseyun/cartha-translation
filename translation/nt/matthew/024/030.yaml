id: MAT.24.30
reference: Matthew 24:30
source:
  edition: SBLGNT
  text: καὶ τότε φανήσεται τὸ σημεῖον τοῦ υἱοῦ τοῦ ἀνθρώπου ἐν ⸀τῷ οὐρανῷ, καὶ τότε
    κόψονται πᾶσαι αἱ φυλαὶ τῆς γῆς καὶ ὄψονται τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐπὶ
    τῶν νεφελῶν τοῦ οὐρανοῦ μετὰ δυνάμεως καὶ δόξης πολλῆς·
translation:
  text: And then the sign of the Son of Man will appear in heaven, and then all the
    tribes of the earth will mourn, and they will see the Son of Man coming on the
    clouds of heaven with power and great glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sky.' The Greek οὐρανός can mean either 'heaven' or 'sky' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the tribes of the land.' The Greek γῆ can mean 'earth' or 'land.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'coming on the clouds of heaven' echoes Daniel 7:13.
    reason: cross_reference
lexical_decisions:
- source_word: φανήσεται
  chosen: will appear
  alternatives:
  - will be seen
  - will become visible
  lexicon: BDAG
  rationale: Future passive/middle of φαίνω here is best rendered intransitively as
    'will appear,' yielding natural English while preserving the event of visible
    manifestation.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - signal
  - portent
  lexicon: BDAG
  rationale: '''Sign'' is the standard and most transparent rendering. ''Portent''
    is possible in apocalyptic context but is less natural and may over-interpret.'
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: of the Son of Man
  alternatives:
  - belonging to the Son of Man
  - the sign that is the Son of Man
  lexicon: BDAG
  rationale: 'The genitive construction is left relatively literal as ''of the Son
    of Man'' to preserve the ambiguity: it may mean a sign associated with him or,
    less likely, that he himself is the sign. The ambiguity is preserved rather than
    resolved in the main text.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'heaven' or 'sky.' Here 'in heaven' best preserves the
    elevated/apocalyptic register and avoids flattening the phrase, while a footnote
    preserves 'in the sky' as a possible spatial nuance.
- source_word: κόψονται
  chosen: will mourn
  alternatives:
  - will beat their breasts
  - will lament
  lexicon: BDAG
  rationale: The future middle of κόπτω in this idiom refers to mourning/lamentation.
    'Will mourn' communicates the sense clearly in modern English without importing
    a specific gesture into the main text.
- source_word: φυλαὶ
  chosen: tribes
  alternatives:
  - peoples
  - clans
  lexicon: BDAG
  rationale: φυλή most directly means 'tribe.' Although some English versions use
    'peoples,' 'tribes' better reflects the lexical form and preserves the likely
    echo of Zechariah 12 and Danielic/apocalyptic language.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In this cosmic context, especially with
    the Son of Man coming on the clouds, 'earth' is the better default, while 'land'
    remains a viable interpretive alternative worth preserving in a footnote.
- source_word: ὄψονται
  chosen: they will see
  alternatives:
  - they will behold
  lexicon: BDAG
  rationale: Simple future of ὁράω is naturally rendered 'they will see.' 'Behold'
    is too elevated for the stated readability target.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - arriving
  lexicon: BDAG
  rationale: The participle is durative and is well represented by 'coming,' especially
    in this allusive apocalyptic formula.
- source_word: ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ
  chosen: on the clouds of heaven
  alternatives:
  - upon the clouds of heaven
  - with the clouds of heaven
  lexicon: BDAG
  rationale: '''On the clouds of heaven'' is the most direct rendering and preserves
    the strong allusion to Daniel 7:13. Although ἐπί can sometimes shade toward ''with,''
    the traditional spatial sense fits well here.'
- source_word: μετὰ δυνάμεως καὶ δόξης πολλῆς
  chosen: with power and great glory
  alternatives:
  - with great power and glory
  lexicon: BDAG
  rationale: The Greek most naturally modifies 'glory' with πολλῆς directly, but the
    idiomatic English phrase 'with power and great glory' preserves the structure
    and emphasis without awkwardness.
