theological_decisions:
- issue: Meaning of 'the sign of the Son of Man'
  chosen_reading: Retained the genitival ambiguity with 'the sign of the Son of Man'
    rather than specifying whether the sign belongs to him or is him.
  alternative_readings:
  - '''the sign belonging to the Son of Man'''
  - '''the sign, namely the Son of Man himself'''
  rationale: The Greek does not force a single interpretation. In keeping with the
    translation philosophy, the wording preserves the theological tension rather than
    resolving a debated eschatological detail in translation.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Scope of γῆ in 'all the tribes of the earth'
  chosen_reading: Rendered γῆ as 'earth' in the main text.
  alternative_readings:
  - '''land'''
  rationale: The immediate context is cosmic and apocalyptic, favoring a universal
    sense. However, because some interpreters understand an Israel/land-focused allusion,
    the alternative is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
