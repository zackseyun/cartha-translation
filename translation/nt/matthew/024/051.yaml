theological_decisions:
- issue: Whether διχοτομήσει should be softened into a figurative punishment formula
  chosen_reading: Retain the concrete wording 'will cut him in two' in the main text
  alternative_readings:
  - Render more generally as 'will punish him severely'
  rationale: The translation philosophy prioritizes original-language primacy and
    avoids paraphrase beyond what the source warrants. The Greek verb has a concrete
    lexical sense, and the verse itself already supplies the broader judgment outcome
    in the next clause. Preserving the stark imagery also maintains the warning's
    force without importing a specific doctrinal explanation of final punishment.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to express the fate denoted by τὸ μέρος αὐτοῦ ... θήσει
  chosen_reading: Use 'assign his place with the hypocrites'
  alternative_readings:
  - '''assign him a portion with the hypocrites'''
  - '''put him with the hypocrites'''
  rationale: This wording preserves the judicial-allotment sense while remaining readable
    modern English. It does not over-specify whether the 'portion' is inheritance,
    destiny, or location, thus preserving the text's tension.
  doctrine_reference: Translation philosophy §3, §6
