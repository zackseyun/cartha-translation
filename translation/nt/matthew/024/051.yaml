id: MAT.24.51
reference: Matthew 24:51
source:
  edition: SBLGNT
  text: καὶ διχοτομήσει αὐτὸν καὶ τὸ μέρος αὐτοῦ μετὰ τῶν ὑποκριτῶν θήσει· ἐκεῖ ἔσται
    ὁ κλαυθμὸς καὶ ὁ βρυγμὸς τῶν ὀδόντων.
translation:
  text: and will cut him in two and assign his place with the hypocrites. In that
    place there will be weeping and gnashing of teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'will punish him severely.' The Greek verb literally
      means 'will cut in two.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his portion' or 'his share with the hypocrites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διχοτομήσει
  chosen: will cut him in two
  alternatives:
  - will cut him to pieces
  - will severely punish him
  lexicon: BDAG
  rationale: The verb literally denotes cutting in two. Although some interpreters
    take it metaphorically for severe punishment, the plain lexical sense should be
    preserved in translation, especially since the following clause separately states
    his assigned fate. 'Cut him in two' is transparent and forceful without paraphrase.
- source_word: μέρος
  chosen: place
  alternatives:
  - portion
  - share
  lexicon: BDAG
  rationale: While μέρος often means 'part' or 'portion,' in this judgment context
    the idiom 'assign his μέρος with...' refers to the lot or place allotted to someone.
    'Place' communicates the sense naturally in English while preserving the judicial-allotment
    idea.
- source_word: ὑποκριτῶν
  chosen: hypocrites
  alternatives:
  - pretenders
  lexicon: BDAG
  rationale: The standard sense is 'hypocrites,' especially in Matthew where the term
    has established thematic force for those who present false outward righteousness.
    Retaining 'hypocrites' preserves Matthean consistency.
- source_word: ἐκεῖ
  chosen: In that place
  alternatives:
  - there
  lexicon: BDAG
  rationale: The adverb points to the place of judgment just mentioned. 'In that place'
    makes the referent explicit in idiomatic English and avoids a bare deictic that
    can sound abrupt.
- source_word: κλαυθμὸς
  chosen: weeping
  alternatives:
  - wailing
  lexicon: BDAG
  rationale: '''Weeping'' is the standard rendering in the repeated Matthean formula
    and preserves consistency. ''Wailing'' is possible but slightly more interpretive
    in tone.'
- source_word: βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: This is a fixed expression in Matthew. 'Gnashing of teeth' is the conventional
    and accurate rendering, preserving both the vividness and intertextual consistency
    of the phrase.
