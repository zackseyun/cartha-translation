id: MAT.24.16
reference: Matthew 24:16
source:
  edition: SBLGNT
  text: τότε οἱ ἐν τῇ Ἰουδαίᾳ φευγέτωσαν ⸀ἐπὶ τὰ ὄρη,
translation:
  text: then those in Judea must flee to the mountains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''let them flee to the mountains.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in Jesus' discourse. 'Then' is concise
    and natural, while preserving the forward-moving temporal force.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  chosen: those in Judea
  alternatives:
  - the ones in Judea
  - those who are in Judea
  lexicon: BDAG
  rationale: The article with prepositional phrase functions substantivally, referring
    to people located in Judea. 'Those in Judea' is idiomatic English and preserves
    the referential force without over-specifying.
- source_word: Ἰουδαίᾳ
  chosen: Judea
  alternatives:
  - the region of Judea
  lexicon: BDAG
  rationale: Standard transliteration of the geographic name. 'Judea' is the conventional
    and clear English form.
- source_word: φευγέτωσαν
  chosen: must flee
  alternatives:
  - let them flee
  - are to flee
  lexicon: BDAG
  rationale: Third-person present active imperative plural. 'Must flee' communicates
    the urgent imperatival force in clear modern English better than the more wooden
    'let them flee,' while remaining faithful to the command.
- source_word: ἐπὶ τὰ ὄρη
  chosen: to the mountains
  alternatives:
  - into the mountains
  - to the hills
  lexicon: BDAG
  rationale: With motion verb φεύγω, ἐπί plus accusative indicates movement toward
    a destination. 'To the mountains' is the most direct rendering. 'Into the mountains'
    is possible but slightly more interpretive; 'hills' weakens ὄρη.
