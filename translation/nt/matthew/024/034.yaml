id: MAT.24.34
reference: Matthew 24:34
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ⸀ὅτι οὐ μὴ παρέλθῃ ἡ γενεὰ αὕτη ἕως ἂν πάντα ταῦτα γένηται.
translation:
  text: Truly I tell you that this generation will certainly not pass away until all
    these things happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this people' or 'this race.' The Greek word can be understood more broadly,
      but 'generation' is the most direct rendering here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω ὑμῖν, English idiom is best served
    by 'Truly I tell you.' 'Amen' is more formal/transliterated and less natural in
    running English; 'truly' preserves the solemn asseveration.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is a natural modern-English rendering of the discourse
    formula while preserving direct address. ''I say to you'' is more formal but less
    idiomatic.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content clause after the solemn formula; explicit 'that'
    keeps the syntax clear in English.
- source_word: οὐ μὴ παρέλθῃ
  chosen: will certainly not pass away
  alternatives:
  - will by no means pass away
  - will never pass away
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    not pass away' preserves the force in clear modern English without archaic phrasing.
- source_word: ἡ γενεὰ αὕτη
  chosen: this generation
  alternatives:
  - this age-group
  - this people
  lexicon: BDAG
  rationale: γενεά most naturally means 'generation' here. Although broader senses
    such as 'people' or 'race' have been proposed in interpretation, the ordinary
    lexical sense fits the discourse and should remain in the main text.
- source_word: ἕως ἂν
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: 'The conjunction with ἄν marks a future contingency: ''until'' is the
    standard and clearest rendering.'
- source_word: πάντα ταῦτα
  chosen: all these things
  alternatives:
  - all this
  lexicon: BDAG
  rationale: The neuter plural is best represented explicitly as 'all these things,'
    matching the plural form and the discourse's catalog of events.
- source_word: γένηται
  chosen: happen
  alternatives:
  - take place
  - come to pass
  lexicon: BDAG
  rationale: γίνομαι in this context refers to events occurring. 'Happen' is natural
    modern English; 'take place' is also possible but slightly more formal.
