theological_decisions:
- issue: Meaning of 'this generation' (ἡ γενεὰ αὕτη) in an eschatological discourse
  chosen_reading: Render lexically as 'this generation' without interpretive expansion.
  alternative_readings:
  - this people
  - this race
  - the present age-group contemporaneous with Jesus
  rationale: The phrase is the standard lexical rendering of the Greek and preserves
    the interpretive tension rather than resolving a debated eschatological question
    in translation. The translation should not import a specific end-times framework
    where the Greek itself does not specify one beyond the term γενεά.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
