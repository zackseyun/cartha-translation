theological_decisions:
- issue: Implicit subject of ἐγγύς ἐστιν
  chosen_reading: Render impersonally as 'it is near'
  alternative_readings:
  - '''he is near'''
  rationale: The Greek leaves the subject unstated. Because interpreters differ on
    whether the referent is the Son of Man, the destruction/judgment events, or the
    consummation/kingdom, the translation preserves the textual ambiguity rather than
    resolving it. This follows the stated principle of preserving theological tension
    where the source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
