id: MAT.24.33
reference: Matthew 24:33
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ὅταν ἴδητε ⸂πάντα ταῦτα⸃, γινώσκετε ὅτι ἐγγύς ἐστιν ἐπὶ θύραις.
translation:
  text: So also you, when you see all these things, know that it is near, at the doors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he is near.' The Greek does not state the subject explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  chosen: So also you
  alternatives:
  - In the same way, you also
  - So you also
  lexicon: BDAG
  rationale: οὕτως marks comparison with the preceding fig tree illustration ('in
    this way/so'), and καὶ ὑμεῖς adds emphasis to the disciples as the corresponding
    observers. 'So also you' preserves the compact comparative force without overexpanding.
- source_word: ὅταν ἴδητε
  chosen: when you see
  alternatives:
  - whenever you see
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive is a future-more-vivid temporal construction,
    naturally rendered 'when you see.' 'Whenever' is possible but sounds more iterative
    than the discourse requires.
- source_word: πάντα ταῦτα
  chosen: all these things
  alternatives:
  - all this
  - all these events
  lexicon: BDAG
  rationale: The neuter plural is best represented explicitly as 'all these things.'
    'All this' is smoother English but slightly compresses the plural; 'events' interprets
    beyond the wording.
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: BDAG
  rationale: The present imperative/plural can be taken as an exhortation or as an
    imperative with predictive force in context. 'Know' is the most direct rendering
    and preserves the command-like force better than the more interpretive 'recognize.'
- source_word: ἐγγύς
  chosen: near
  alternatives:
  - close
  lexicon: BDAG
  rationale: ἐγγύς straightforwardly means 'near/close by.' 'Near' is the standard
    and most natural biblical English equivalent.
- source_word: ἐπὶ θύραις
  chosen: at the doors
  alternatives:
  - at the door
  - right at the doors
  lexicon: BDAG
  rationale: The Greek has plural θύραις, so 'at the doors' preserves the form better
    than the traditional singular 'at the door.' The idiom conveys extreme nearness.
- source_word: ἐγγύς ἐστιν
  chosen: it is near
  alternatives:
  - he is near
  lexicon: BDAG
  rationale: The verb has no explicit subject in Greek. English requires one, and
    the neuter-like impersonal 'it' best preserves the ambiguity of the Greek expression
    in context, avoiding over-resolution toward either the coming event/kingdom or
    the Son of Man personally.
