theological_decisions:
- issue: Scope and force of Jesus' prediction concerning the temple
  chosen_reading: A concrete prophecy of total structural destruction is expressed
    without importing a specific eschatological system beyond the verse itself.
  alternative_readings:
  - A primarily symbolic statement about judgment
  - A prediction tied to a particular later eschatological framework
  rationale: The language of stones being left or thrown down is concrete and architectural.
    The translation should preserve that force while avoiding doctrinal elaboration
    not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
