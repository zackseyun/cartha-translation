id: MAT.24.2
reference: Matthew 24:2
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀ἀποκριθεὶς εἶπεν αὐτοῖς· Οὐ βλέπετε ⸂ταῦτα πάντα⸃; ἀμὴν λέγω ὑμῖν, οὐ
    μὴ ἀφεθῇ ὧδε λίθος ἐπὶ λίθον ὃς οὐ καταλυθήσεται.
translation:
  text: But he answered and said to them, “Do you not see all these things? Truly
    I tell you, not one stone here will be left upon another that will not be thrown
    down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will be destroyed.” The Greek verb can denote dismantling or demolition;
      “thrown down” preserves the image of stones cast from their place.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - said in reply
  lexicon: BDAG
  rationale: This participle + finite verb is a common Semitic-influenced Greek expression.
    Retaining both verbs reflects the source text without sounding overly wooden.
- source_word: Οὐ βλέπετε
  chosen: Do you not see
  alternatives:
  - Do you not look at
  - You see, do you not
  lexicon: BDAG
  rationale: The present indicative with οὐ naturally introduces a rhetorical question
    expecting agreement. 'See' fits both literal sight and perceptive recognition
    in context.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these
  lexicon: BDAG
  rationale: The neuter plural demonstrative plus πᾶς is best represented explicitly
    as 'all these things,' referring to the temple buildings just mentioned.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: Truly I tell you
  alternatives:
  - Amen, I say to you
  - Truly I say to you
  lexicon: BDAG
  rationale: This preserves the solemn introductory force of Jesus' formula in clear
    modern English. 'Truly' conveys ἀμήν idiomatically.
- source_word: οὐ μὴ ἀφεθῇ
  chosen: will be left
  alternatives:
  - will certainly be left
  - shall by no means be left
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. English future
    'will be left' conveys the prediction naturally; the emphatic force is reinforced
    by the larger clause 'not one stone...'
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A straightforward locative adverb referring to the temple precincts in
    the immediate setting.
- source_word: λίθος ἐπὶ λίθον
  chosen: one stone ... upon another
  alternatives:
  - stone upon stone
  lexicon: BDAG
  rationale: This idiom is commonly rendered with 'one' supplied in English for naturalness
    and to match the sense of total dismantling.
- source_word: καταλυθήσεται
  chosen: will be thrown down
  alternatives:
  - will be destroyed
  - will be dismantled
  lexicon: BDAG
  rationale: καταλύω here refers to demolition of structures. 'Thrown down' preserves
    the vivid physical image better than the more general 'destroyed.'
