id: MAT.24.46
reference: Matthew 24:46
source:
  edition: SBLGNT
  text: μακάριος ὁ δοῦλος ἐκεῖνος ὃν ἐλθὼν ὁ κύριος αὐτοῦ εὑρήσει ⸂οὕτως ποιοῦντα⸃·
translation:
  text: Blessed is that servant whom his lord, when he comes, will find doing so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'master.' The Greek word is kyrios, commonly rendered 'lord' or 'Lord';
      here it refers to the servant's superior in the parable.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: Retains the beatitude-like force and covenantal/religious weight better
    than 'happy,' which sounds too subjective, or 'fortunate,' which sounds merely
    circumstantial.
- source_word: δοῦλος
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave,' here the parabolic household setting
    and common English idiom favor 'servant.' The bonded nature is not theologically
    foregrounded in this verse as strongly as in self-designations like Rom 1:1. This
    follows the doctrine table's context-dependent rendering.
- source_word: ἐκεῖνος
  chosen: that
  alternatives:
  - the one
  - that very
  lexicon: BDAG
  rationale: '''That'' naturally renders the demonstrative force in English and preserves
    the specificity of the particular servant under discussion.'
- source_word: ἐλθὼν
  chosen: when he comes
  alternatives:
  - having come
  - upon coming
  lexicon: BDAG
  rationale: The aorist participle is most natural in English here as a temporal clause.
    'When he comes' communicates the sense clearly without woodenness.
- source_word: κύριος
  chosen: lord
  alternatives:
  - master
  - Lord
  lexicon: BDAG
  rationale: In this immediate parabolic context, the referent is the servant's household
    superior, so lowercase 'lord' best reflects the narrative sense while still translating
    κύριος rather than paraphrasing. 'Master' is possible, but the project's default
    is 'Lord'/'lord' unless context strongly requires otherwise.
- source_word: εὑρήσει
  chosen: will find
  alternatives:
  - finds
  lexicon: BDAG
  rationale: Future indicative is straightforwardly rendered 'will find.'
- source_word: οὕτως ποιοῦντα
  chosen: doing so
  alternatives:
  - doing thus
  - doing this
  - acting in this way
  lexicon: BDAG
  rationale: This concise English expression naturally points back to the prior described
    faithful conduct (especially giving food at the proper time in v. 45). It preserves
    the anaphoric force of οὕτως without over-specifying the action in this verse
    alone.
