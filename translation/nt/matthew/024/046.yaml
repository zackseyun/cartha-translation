theological_decisions:
- issue: Rendering κύριος in a parabolic context
  chosen_reading: lowercase 'lord' referring to the servant's human superior within
    the parable
  alternative_readings:
  - '''master'' to emphasize authority'
  - uppercase 'Lord' if read more directly as referring to Christ
  rationale: The verse is part of a parable and the immediate grammar identifies 'his
    lord' as the servant's superior. While the parable has eschatological significance
    and implicitly points to Christ, capitalizing the term in the main text would
    import an interpretive conclusion beyond the immediate narrative level.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord'' with context-sensitive
    translation; preserve theological tension rather than resolve it'
