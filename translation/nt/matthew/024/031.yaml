theological_decisions:
- issue: Rendering ἐκλεκτούς in an eschatological context with doctrinal sensitivity
  chosen_reading: chosen ones
  alternative_readings:
  - elect
  rationale: The verse identifies those gathered by the Son of Man's angels without
    specifying a later systematic-theological framework. 'Chosen ones' preserves the
    lexical sense while avoiding denominationally loaded overtones that the text itself
    does not explicate. The traditional term 'elect' is preserved in a footnote for
    transparency.
  doctrine_reference: Affirmations; Translation philosophy §§3, 6
- issue: Scope of the gathering imagery
  chosen_reading: from the four winds, from one end of the heavens to the other
  alternative_readings:
  - from the four directions of the earth
  - from one end of heaven to the other
  rationale: The translation preserves the cosmic, idiomatic imagery rather than resolving
    it into a narrower geographical paraphrase. This follows the instruction to preserve
    theological and imagistic tension where the source is expansive.
  doctrine_reference: Translation philosophy §§1, 3, 6
