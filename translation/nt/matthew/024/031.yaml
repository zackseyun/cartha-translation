id: MAT.24.31
reference: Matthew 24:31
source:
  edition: SBLGNT
  text: καὶ ἀποστελεῖ τοὺς ἀγγέλους αὐτοῦ μετὰ ⸀σάλπιγγος μεγάλης, καὶ ἐπισυνάξουσιν
    τοὺς ἐκλεκτοὺς αὐτοῦ ἐκ τῶν τεσσάρων ἀνέμων ἀπ’ ἄκρων οὐρανῶν ἕως ⸀τῶν ἄκρων αὐτῶν.
translation:
  text: And he will send out his angels with a loud trumpet, and they will gather
    his chosen ones from the four winds, from one end of the heavens to the other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “with a great trumpet” or “with a trumpet blast.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “his elect.”'
    reason: lexical_alternative
  - marker: c
    text: The expression “the four winds” is an idiom for the farthest reaches in
      every direction.
    reason: cultural_note
  - marker: d
    text: Greek “from the ends of the heavens to their ends,” an idiom meaning from
      one extreme to the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστελεῖ
  chosen: he will send out
  alternatives:
  - he will send
  - he will dispatch
  lexicon: BDAG
  rationale: Future active indicative of ἀποστέλλω. 'Send out' preserves the force
    of commissioning/dispatching without sounding overly formal.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this eschatological context, supernatural beings are clearly intended
    rather than human messengers.
- source_word: μετὰ σάλπιγγος μεγάλης
  chosen: with a loud trumpet
  alternatives:
  - with a great trumpet
  - with a trumpet blast
  lexicon: BDAG
  rationale: μετά with the genitive here expresses accompaniment. σάλπιγξ is 'trumpet';
    μεγάλη can be rendered 'great' or idiomatically 'loud.' 'With a loud trumpet'
    is natural English while preserving the image. The phrase may imply a trumpet
    blast, but the noun itself is retained in the main text.
- source_word: ἐπισυνάξουσιν
  chosen: they will gather
  alternatives:
  - they will gather together
  - they will assemble
  lexicon: BDAG
  rationale: Future active indicative plural; the subject is the angels. The prefixed
    verb can suggest gathering together, but English 'gather' already conveys this
    adequately here.
- source_word: ἐκλεκτούς
  chosen: chosen ones
  alternatives:
  - elect
  lexicon: BDAG
  rationale: '''Chosen ones'' communicates the meaning of ἐκλεκτοί in clear modern
    English without importing unnecessary traditional jargon. ''Elect'' is preserved
    as an alternative because of its theological familiarity.'
- source_word: ἐκ τῶν τεσσάρων ἀνέμων
  chosen: from the four winds
  alternatives:
  - from the four directions
  lexicon: BDAG
  rationale: A standard idiom for the whole compass of the earth/sky. 'Four winds'
    preserves the biblical imagery better than the interpretive 'four directions.'
- source_word: ἀπ’ ἄκρων οὐρανῶν ἕως τῶν ἄκρων αὐτῶν
  chosen: from one end of the heavens to the other
  alternatives:
  - from the ends of the heavens to their ends
  - from one end of heaven to the other
  lexicon: BDAG
  rationale: A merism expressing total extent. The plural οὐρανῶν is retained as 'the
    heavens' to reflect the Greek, while the idiomatic English 'from one end ... to
    the other' makes the sense clear. αὐτῶν refers back to 'heavens,' hence 'the other'
    rather than a vague 'their ends.'
