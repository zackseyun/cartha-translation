theological_decisions:
- issue: Rendering θλῖψις in an eschatological discourse
  chosen_reading: tribulation
  alternative_readings:
  - affliction
  - persecution
  - suffering
  rationale: In Matthew 24, θλῖψις carries both ordinary persecution/distress and
    broader eschatological weight. 'Tribulation' preserves that tension without forcing
    a technical end-times system beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἔθνη
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  rationale: Although ἔθνη can denote Gentiles in contrast to Jews, here the phrase
    'all the nations' most naturally expresses universal hostility rather than an
    ethnic contrast. This avoids importing a narrower Jew/Gentile distinction not
    demanded by the context.
  doctrine_reference: Original-language primacy over translation tradition.
