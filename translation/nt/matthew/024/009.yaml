id: MAT.24.9
reference: Matthew 24:9
source:
  edition: SBLGNT
  text: Τότε παραδώσουσιν ὑμᾶς εἰς θλῖψιν καὶ ἀποκτενοῦσιν ὑμᾶς, καὶ ἔσεσθε μισούμενοι
    ὑπὸ πάντων τῶν ἐθνῶν διὰ τὸ ὄνομά μου.
translation:
  text: Then they will hand you over to tribulation and kill you, and you will be
    hated by all the nations because of my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to affliction' or 'to persecution.' The Greek word can denote distress,
      oppression, or tribulation.
    reason: lexical_alternative
  - marker: b
    text: Or 'by all nations' or, less likely in this context, 'by all the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'because of my name'; that is, because of allegiance to Jesus
      and what his name represents.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in Jesus' discourse. 'Then' is concise,
    natural English and preserves the forward movement of the prophecy.
- source_word: παραδώσουσιν
  chosen: will hand ... over
  alternatives:
  - will deliver up
  - will betray
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over/deliver into another's power.
    'Hand over' is idiomatic modern English and preserves the hostile sense without
    over-specifying betrayal.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, naturally rendered 'you' in English; plurality
    is understood from context.
- source_word: εἰς θλῖψιν
  chosen: to tribulation
  alternatives:
  - to affliction
  - to persecution
  - to suffering
  lexicon: BDAG
  rationale: θλῖψις denotes affliction/distress/tribulation. 'Tribulation' preserves
    the weight and possible eschatological resonance in this discourse better than
    the flatter 'suffering.' The preposition εἰς after παραδίδωμι is represented by
    'to' in English as part of the idiom 'hand over to.'
- source_word: ἀποκτενοῦσιν
  chosen: kill
  alternatives:
  - put to death
  - murder
  lexicon: BDAG
  rationale: Straightforward future active verb meaning 'kill.' 'Put to death' is
    possible but more formal; 'murder' adds a moral nuance not explicit in the verb
    itself.
- source_word: ἔσεσθε μισούμενοι
  chosen: you will be hated
  alternatives:
  - you will be hated ones
  - you will become hated
  lexicon: BDAG
  rationale: Future of εἰμί with passive participle forms a periphrastic future passive
    sense. 'You will be hated' is the natural English equivalent.
- source_word: ὑπὸ πάντων τῶν ἐθνῶν
  chosen: by all the nations
  alternatives:
  - by all nations
  - by all the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean nations or Gentiles depending on context. Here the global
    scope of opposition is best conveyed by 'all the nations.' Retaining the article
    as 'the nations' reflects the Greek more closely than the idiomatic but less formal
    'all nations.'
- source_word: διὰ τὸ ὄνομά μου
  chosen: because of my name
  alternatives:
  - for my name's sake
  - on account of my name
  lexicon: BDAG
  rationale: διά with the accusative expresses reason/cause. 'Because of my name'
    is clear modern English and preserves the biblical concept of 'name' as representing
    Jesus' person and allegiance to him, without paraphrasing it away.
