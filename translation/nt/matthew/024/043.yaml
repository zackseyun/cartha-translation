id: MAT.24.43
reference: Matthew 24:43
source:
  edition: SBLGNT
  text: ἐκεῖνο δὲ γινώσκετε ὅτι εἰ ᾔδει ὁ οἰκοδεσπότης ποίᾳ φυλακῇ ὁ κλέπτης ἔρχεται,
    ἐγρηγόρησεν ἂν καὶ οὐκ ἂν εἴασεν διορυχθῆναι τὴν οἰκίαν αὐτοῦ.
translation:
  text: 'But know this: if the master of the house had known in what watch the thief
    was coming, he would have stayed awake and would not have let his house be broken
    into.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in which watch of the night.'
    reason: cultural_note
  - marker: b
    text: Literally, 'be dug through,' reflecting houses that could be breached through
      a wall or roof in the ancient setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνο δὲ γινώσκετε
  chosen: But know this
  alternatives:
  - But understand this
  - Yet know this
  lexicon: BDAG
  rationale: A natural imperative-like rendering in English that preserves the discourse
    shift marked by δέ and the direct address of γινώσκετε. 'Know this' is concise
    and idiomatic.
- source_word: οἰκοδεσπότης
  chosen: the master of the house
  alternatives:
  - the homeowner
  - the householder
  lexicon: BDAG
  rationale: Literally denotes the head/master of a household. 'Master of the house'
    preserves the social role more closely than the modernizing 'homeowner,' while
    remaining readable.
- source_word: ποίᾳ φυλακῇ
  chosen: in what watch
  alternatives:
  - at what time of night
  - in which watch of the night
  lexicon: BDAG
  rationale: φυλακή here refers to a night watch, a division of the night. 'In what
    watch' keeps the temporal-cultural specificity; the fuller explanatory alternative
    is preserved in a footnote for clarity.
- source_word: ὁ κλέπτης ἔρχεται
  chosen: the thief was coming
  alternatives:
  - the thief was about to come
  - the thief comes
  lexicon: BDAG
  rationale: Although ἔρχεται is present, in this conditional construction English
    idiom prefers a past-progressive sense after 'had known.' This preserves the sense
    without woodenly retaining the Greek present.
- source_word: ἐγρηγόρησεν ἂν
  chosen: he would have stayed awake
  alternatives:
  - he would have kept watch
  - he would have been watchful
  lexicon: BDAG
  rationale: γρηγορέω commonly means to stay awake or keep watch. 'Stayed awake' fits
    the thief-at-night imagery and is clear modern English.
- source_word: οὐκ ἂν εἴασεν
  chosen: would not have let
  alternatives:
  - would not have allowed
  - would not have permitted
  lexicon: BDAG
  rationale: '''Let'' is the most natural modern English equivalent here, with no
    loss of meaning.'
- source_word: διορυχθῆναι τὴν οἰκίαν αὐτοῦ
  chosen: his house be broken into
  alternatives:
  - his house be dug through
  - his house be burglarized
  lexicon: BDAG
  rationale: διορύσσω literally means to dig through, reflecting mud-brick construction,
    but in context the idiomatic sense is unauthorized entry by a thief. 'Be broken
    into' communicates the meaning clearly; the literal/cultural nuance is preserved
    in a footnote.
