theological_decisions:
- issue: Rendering the householder image
  chosen_reading: the master of the house
  alternative_readings:
  - the homeowner
  - the householder
  rationale: This is a parabolic illustration, not a doctrinally charged title. The
    chosen rendering preserves the social nuance of οἰκοδεσπότης without importing
    modern property assumptions.
  doctrine_reference: Translation philosophy §1, §6
- issue: Handling culturally specific burglary imagery
  chosen_reading: be broken into
  alternative_readings:
  - be dug through
  rationale: Optimal equivalence favors the idiomatic sense in English while preserving
    the ancient construction detail in a footnote. This avoids paraphrase while keeping
    the verse readable.
  doctrine_reference: Translation philosophy §1, §6
