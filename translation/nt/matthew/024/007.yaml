theological_decisions:
- issue: Scope of ἔθνος in an eschatological conflict saying
  chosen_reading: nation
  alternative_readings:
  - people
  rationale: The verse lists large-scale social and political upheavals in parallel
    with 'kingdom against kingdom.' Rendering ἔθνος as 'nation' best matches the immediate
    parallelism and avoids importing a narrower ethnic or specifically Gentile sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the future passive ἐγερθήσεται
  chosen_reading: will rise against
  alternative_readings:
  - will be raised against
  - will arise against
  rationale: The idiom communicates outbreak of conflict, not necessarily an explicit
    divine passive. 'Will rise against' preserves the event description without adding
    theological causation not stated in the text.
  doctrine_reference: Translation philosophy §3
