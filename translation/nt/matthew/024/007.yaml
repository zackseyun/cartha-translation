id: MAT.24.7
reference: Matthew 24:7
source:
  edition: SBLGNT
  text: ἐγερθήσεται γὰρ ἔθνος ἐπὶ ἔθνος καὶ βασιλεία ἐπὶ βασιλείαν, καὶ ἔσονται ⸀λιμοὶ
    καὶ σεισμοὶ κατὰ τόπους·
translation:
  text: For nation will rise against nation, and kingdom against kingdom, and there
    will be famines and earthquakes in various places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will arise against nation.' The Greek idiom conveys the outbreak of
      hostility between peoples.
    reason: lexical_alternative
  - marker: b
    text: Or 'in different places' or 'from place to place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθήσεται
  chosen: will rise
  alternatives:
  - will be raised
  - will arise
  lexicon: BDAG
  rationale: Future passive/middle form of ἐγείρω in this idiom means to rise up against
    or to arise in hostility. 'Will rise' is natural English and preserves the conflict
    sense without over-paraphrasing.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ connects this statement explanatorily to the preceding context. 'For'
    preserves the discourse linkage more formally than omitting it.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: BDAG
  rationale: In the collocation ἔθνος ἐπὶ ἔθνος, the sense is collective political/ethnic
    groups in conflict. 'Nation' is the standard and most natural rendering here.
- source_word: ἐπὶ ἔθνος
  chosen: against nation
  alternatives:
  - upon nation
  lexicon: BDAG
  rationale: ἐπί with accusative in this hostile idiom is best rendered 'against,'
    not the more literal but less idiomatic 'upon.'
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - realm
  - royal power
  lexicon: BDAG
  rationale: Here βασιλεία refers to a kingdom as a political domain, parallel to
    'nation.' 'Kingdom' preserves the political and apocalyptic register.
- source_word: ἔσονται
  chosen: there will be
  alternatives:
  - will occur
  - will happen
  lexicon: BDAG
  rationale: The existential use of εἰμί is naturally rendered 'there will be' in
    English.
- source_word: λιμοὶ
  chosen: famines
  alternatives:
  - food shortages
  - hunger
  lexicon: BDAG
  rationale: Plural noun denoting severe scarcity of food. 'Famines' is the standard
    lexical equivalent and fits the apocalyptic list.
- source_word: σεισμοὶ
  chosen: earthquakes
  alternatives:
  - quakes
  lexicon: BDAG
  rationale: σεισμός in this context refers to earthquakes. The full term is clearer
    and standard in English Bible style.
- source_word: κατὰ τόπους
  chosen: in various places
  alternatives:
  - from place to place
  - in place after place
  - in different places
  lexicon: BDAG
  rationale: The distributive phrase indicates occurrence in multiple locations rather
    than one specific site. 'In various places' is idiomatic and preserves the distributive
    sense.
