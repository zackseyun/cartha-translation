id: MAT.24.10
reference: Matthew 24:10
source:
  edition: SBLGNT
  text: καὶ τότε σκανδαλισθήσονται πολλοὶ καὶ ἀλλήλους παραδώσουσιν καὶ μισήσουσιν
    ἀλλήλους·
translation:
  text: And then many will fall away, and they will betray one another and hate one
    another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be caused to stumble' or 'will take offense.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will hand one another over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence within Jesus' discourse; 'then' is natural
    and sufficiently precise in English.
- source_word: σκανδαλισθήσονται
  chosen: will fall away
  alternatives:
  - will be caused to stumble
  - will take offense
  lexicon: BDAG
  rationale: In this eschatological context, the passive of σκανδαλίζω likely refers
    not merely to momentary offense but to being led into apostasy or defection under
    pressure. 'Will fall away' best captures the relational and covenantal rupture
    implied in context while remaining readable modern English.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Simple quantitative adjective used substantivally; 'many' is the most
    direct and natural rendering.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Reciprocal pronoun indicating mutual action; 'one another' preserves
    the reciprocal sense clearly in formal modern English.
- source_word: παραδώσουσιν
  chosen: will betray
  alternatives:
  - will hand over
  - will deliver up
  lexicon: BDAG
  rationale: Although παραδίδωμι can mean 'hand over' more literally, in this context
    of interpersonal hostility and persecution, 'betray' best conveys the treacherous
    force of the verb in idiomatic English.
- source_word: μισήσουσιν
  chosen: hate
  alternatives:
  - will hate
  lexicon: BDAG
  rationale: Future verb of μισέω expressing active hostility; rendered straightforwardly
    as 'hate.'
- source_word: καὶ τότε ... καὶ ... καὶ ...
  chosen: And then ... and ... and ...
  alternatives:
  - Then ... and ... and ...
  lexicon: Greek grammar
  rationale: The repeated καί gives the verse a cumulative, escalating rhythm. Retaining
    the initial 'And' reflects the discourse flow from the preceding context, while
    preserving the subsequent coordination.
