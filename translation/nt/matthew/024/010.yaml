theological_decisions:
- issue: Meaning of σκανδαλισθήσονται in an eschatological persecution context
  chosen_reading: will fall away
  alternative_readings:
  - will be caused to stumble
  - will take offense
  rationale: The verse describes a progression from internal collapse to betrayal
    and hatred. Rendering the verb as 'fall away' preserves the seriousness of defection
    without over-specifying a doctrinal system of apostasy. It fits the immediate
    context better than the weaker 'take offense.'
  doctrine_reference: Translation philosophy §3, §6
