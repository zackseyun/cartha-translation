id: MAT.24.20
reference: Matthew 24:20
source:
  edition: SBLGNT
  text: προσεύχεσθε δὲ ἵνα μὴ γένηται ἡ φυγὴ ὑμῶν χειμῶνος μηδὲ σαββάτῳ·
translation:
  text: But pray that your flight may not happen in winter or on a Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the Sabbath.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - keep praying
  - pray earnestly
  lexicon: BDAG
  rationale: Present middle/passive imperative, second plural; 'pray' is the natural
    English imperative. The present imperative may imply ongoing action, but English
    normally leaves that implicit here.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding warning; 'But'
    best preserves the discourse turn in concise English.
- source_word: ἵνα μὴ γένηται
  chosen: that ... may not happen
  alternatives:
  - that ... may not be
  - that ... may not take place
  lexicon: BDAG
  rationale: After προσεύχεσθε, ἵνα with aorist subjunctive expresses the content/purpose
    of the prayer. 'May not happen' is idiomatic and fits γίνομαι in this eventive
    sense.
- source_word: ἡ φυγὴ ὑμῶν
  chosen: your flight
  alternatives:
  - your fleeing
  - your escape
  lexicon: BDAG
  rationale: φυγή denotes flight/fleeing. 'Your flight' is concise and idiomatic in
    an eschatological/disaster context, without overinterpreting as either mere movement
    or successful escape.
- source_word: χειμῶνος
  chosen: in winter
  alternatives:
  - during winter
  - in the winter season
  lexicon: BDAG
  rationale: Genitive of time/season; English idiom naturally renders this as 'in
    winter.'
- source_word: μηδὲ σαββάτῳ
  chosen: or on a Sabbath
  alternatives:
  - nor on the Sabbath
  - or on the Sabbath day
  lexicon: BDAG
  rationale: μηδέ coordinates a second negative circumstance. σάββατον here refers
    to the Sabbath day; anarthrous dative is well rendered 'on a Sabbath,' preserving
    the Greek form without forcing definiteness.
