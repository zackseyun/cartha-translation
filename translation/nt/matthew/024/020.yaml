theological_decisions:
- issue: Rendering σαββάτῳ with or without the definite article
  chosen_reading: on a Sabbath
  alternative_readings:
  - on the Sabbath
  rationale: The Greek lacks the article, so 'on a Sabbath' more closely reflects
    the form while still conveying the Jewish Sabbath context. Because English readers
    may expect the traditional 'the Sabbath,' that alternative is preserved in a footnote
    rather than elevated to the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
