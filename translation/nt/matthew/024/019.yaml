theological_decisions:
- issue: Referent of the feminine datives/participles
  chosen_reading: Render generically as 'those who are pregnant' and 'those who are
    nursing infants' rather than explicitly 'women.'
  alternative_readings:
  - pregnant women
  - women nursing infants
  rationale: The Greek feminine forms clearly refer to females, but English can express
    this naturally without adding a noun absent from the text. This preserves the
    source's focus on vulnerable conditions during tribulation rather than making
    an unnecessary stylistic expansion. The meaning remains gender-accurate because
    pregnancy and nursing inherently specify the referent.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
