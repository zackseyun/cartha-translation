id: MAT.24.19
reference: Matthew 24:19
source:
  edition: SBLGNT
  text: οὐαὶ δὲ ταῖς ἐν γαστρὶ ἐχούσαις καὶ ταῖς θηλαζούσαις ἐν ἐκείναις ταῖς ἡμέραις.
translation:
  text: But woe to those who are pregnant and to those who are nursing infants in
    those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pregnant women and women nursing infants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: Retains the prophetic/exclamatory force of impending distress or lament
    better than the softer 'alas.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild transition from the preceding warning; 'but' fits the discourse
    flow in English without overstating contrast.
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  chosen: those who are pregnant
  alternatives:
  - pregnant women
  - those having in the womb
  lexicon: BDAG
  rationale: The idiom ἐν γαστρὶ ἔχω means 'to be pregnant.' 'Those who are pregnant'
    is natural modern English while preserving the referent indicated by the feminine
    participial construction.
- source_word: γαστρί
  chosen: pregnant
  alternatives:
  - womb
  lexicon: BDAG
  rationale: Within the idiom ἐν γαστρὶ ἐχούσαις, a literal rendering with 'womb'
    would be awkward in English; the idiomatic sense is pregnancy.
- source_word: ταῖς θηλαζούσαις
  chosen: those who are nursing infants
  alternatives:
  - those who are breastfeeding
  - those who are nursing
  lexicon: BDAG
  rationale: θηλάζω denotes suckling/nursing a child. 'Nursing infants' makes the
    object implicit in Greek explicit in clear English and preserves the practical
    hardship in view.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A straightforward temporal phrase; 'in those days' is idiomatic and sufficiently
    formal.
