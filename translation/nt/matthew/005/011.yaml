theological_decisions:
- issue: Nature of the opposition described
  chosen_reading: The verse speaks of false verbal abuse and persecution endured on
    account of Jesus, without narrowing the persecution to a specific legal, physical,
    or social form.
  alternative_readings:
  - Restricting the persecution to physical violence
  - Restricting it to slander only
  rationale: The three coordinated verbs cover insult, persecution, and false accusation.
    The translation preserves the breadth of hostility rather than resolving it into
    one subtype.
  doctrine_reference: Preserve theological tension rather than resolve it.
