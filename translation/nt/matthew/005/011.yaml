id: MAT.5.11
reference: Matthew 5:11
source:
  edition: SBLGNT
  text: μακάριοί ἐστε ὅταν ὀνειδίσωσιν ὑμᾶς καὶ διώξωσιν καὶ εἴπωσιν πᾶν ⸀πονηρὸν
    καθ’ ὑμῶν ψευδόμενοι ἕνεκεν ἐμοῦ.
translation:
  text: Blessed are you when they insult you and persecute you and falsely say every
    kind of evil against you because of me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "revile you" for "insult you."
    reason: lexical_alternative
  - marker: b
    text: Or "say all kinds of evil against you".
    reason: lexical_alternative
  - marker: c
    text: Or "for my sake."
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοί ἐστε
  chosen: Blessed are you
  alternatives:
  - You are blessed
  - Fortunate are you
  lexicon: BDAG
  rationale: Retains the beatitude formula and its theological weight. 'Blessed' is
    the established and most fitting English equivalent for μακάριος in this context;
    'fortunate' is too secular.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a general future contingency with the subjunctives that follow.
    'When' is natural English and fits the beatitude pattern; 'whenever' is possible
    but slightly more iterative than needed.
- source_word: ὀνειδίσωσιν
  chosen: they insult you
  alternatives:
  - they reproach you
  - they revile you
  lexicon: BDAG
  rationale: Conveys verbal abuse in clear modern English. 'Revile' is more traditional
    but less accessible; 'reproach' is too formal for the target style.
- source_word: διώξωσιν
  chosen: persecute you
  alternatives:
  - harass you
  - pursue you
  lexicon: BDAG
  rationale: In this context the verb refers to hostile mistreatment for allegiance
    to Jesus, so 'persecute' best captures the religiously charged opposition.
- source_word: εἴπωσιν πᾶν πονηρὸν καθ’ ὑμῶν
  chosen: say every kind of evil against you
  alternatives:
  - say all kinds of evil against you
  - say every evil thing against you
  lexicon: BDAG
  rationale: πᾶν πονηρόν is idiomatic and broad; 'every kind of evil' communicates
    comprehensive malicious speech without sounding wooden. 'Against you' reflects
    κατά with the genitive.
- source_word: ψευδόμενοι
  chosen: falsely
  alternatives:
  - while lying
  - lying
  lexicon: BDAG
  rationale: An adverbial rendering is the most natural English equivalent here, modifying
    the act of speaking evil. It preserves the sense that the accusations are untrue.
- source_word: ἕνεκεν ἐμοῦ
  chosen: because of me
  alternatives:
  - for my sake
  - on account of me
  lexicon: BDAG
  rationale: Clearly expresses causation grounded in allegiance to Jesus. 'For my
    sake' is also good, but 'because of me' is slightly more direct in contemporary
    English.
