id: MAT.5.23
reference: Matthew 5:23
source:
  edition: SBLGNT
  text: ἐὰν οὖν προσφέρῃς τὸ δῶρόν σου ἐπὶ τὸ θυσιαστήριον κἀκεῖ μνησθῇς ὅτι ὁ ἀδελφός
    σου ἔχει τι κατὰ σοῦ,
translation:
  text: Therefore, if you are offering your gift on the altar, and there remember
    that your brother has something against you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your brother or sister'; the Greek says 'brother,' a masculine singular
      term that may function representatively in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - So if
  - Therefore if
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause ('if'), while οὖν marks inference
    from the preceding teaching. 'Therefore, if' preserves both the logical connection
    and the conditional force in natural English.
- source_word: προσφέρῃς
  chosen: you are offering
  alternatives:
  - you offer
  - you bring
  lexicon: BDAG
  rationale: The present subjunctive in this conditional setting can be rendered with
    an English progressive to convey an action in process within a vivid scenario.
    'Offering' also fits sacrificial context better than the more generic 'bring'.
- source_word: τὸ δῶρόν σου
  chosen: your gift
  alternatives:
  - your offering
  lexicon: BDAG
  rationale: δῶρον is broadly 'gift' and in this context refers to a sacrificial gift.
    'Your gift' is more formally aligned with the Greek while still intelligible;
    the cultic setting is clarified by 'on the altar.'
- source_word: ἐπὶ τὸ θυσιαστήριον
  chosen: on the altar
  alternatives:
  - at the altar
  - upon the altar
  lexicon: BDAG
  rationale: θυσιαστήριον is specifically an altar. With ἐπί + accusative, 'on the
    altar' is a natural rendering in sacrificial context and reflects the act of presenting
    the gift there.
- source_word: κἀκεῖ
  chosen: and there
  alternatives:
  - and there at that place
  - and while there
  lexicon: BDAG
  rationale: κἀκεῖ ('and there') links the remembrance to the location of offering.
    The simple rendering preserves the Greek connective and spatial emphasis.
- source_word: μνησθῇς
  chosen: remember
  alternatives:
  - recall
  - are reminded
  lexicon: BDAG
  rationale: The aorist passive/deponent subjunctive of μιμνῄσκομαι is naturally rendered
    'remember.' This keeps the sense straightforward without overinterpreting whether
    the remembrance is spontaneous or prompted.
- source_word: ὅτι
  chosen: that
  alternatives:
  - that fact that
  lexicon: BDAG
  rationale: ὅτι introduces the content of what is remembered. Standard English 'that'
    is sufficient.
- source_word: ὁ ἀδελφός σου
  chosen: your brother
  alternatives:
  - your brother or sister
  - your fellow believer
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per the gender-accurate
    policy, 'your brother' best matches the source form and likely representative
    force. More inclusive expansions would go beyond the explicit wording; an inclusivity
    note preserves awareness of broader application.
- source_word: ἔχει τι κατὰ σοῦ
  chosen: has something against you
  alternatives:
  - has a grievance against you
  - has something against you because of some offense
  lexicon: BDAG
  rationale: This idiom means to hold a complaint or grievance against someone. 'Has
    something against you' is the closest natural English equivalent and preserves
    the deliberate indefiniteness of τι.
