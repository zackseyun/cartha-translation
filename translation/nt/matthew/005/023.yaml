theological_decisions:
- issue: Gendered kinship term ἀδελφός
  chosen_reading: your brother
  alternative_readings:
  - your brother or sister
  - another believer
  rationale: The Greek is masculine singular and should be rendered in a gender-accurate
    way rather than neutralized. The verse's ethical principle may extend more broadly,
    but the translation should not flatten the source wording. Broader application
    can be acknowledged in a footnote rather than imported into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
