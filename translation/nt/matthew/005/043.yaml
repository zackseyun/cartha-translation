id: MAT.5.43
reference: Matthew 5:43
source:
  edition: SBLGNT
  text: Ἠκούσατε ὅτι ἐρρέθη· Ἀγαπήσεις τὸν πλησίον σου καὶ μισήσεις τὸν ἐχθρόν σου.
translation:
  text: You have heard that it was said, ‘You shall love your neighbor and hate your
    enemy.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The first clause echoes Leviticus 19:18; the second clause ('and hate your
      enemy') is not a direct Old Testament quotation but reflects received teaching
      that Jesus is correcting.
    reason: cross_reference
lexical_decisions:
- source_word: Ἠκούσατε
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: BDAG
  rationale: Aorist indicative in this formulaic teaching introduction is rendered
    idiomatically in English as present perfect ('You have heard') to match natural
    discourse and the repeated Matthean pattern, while preserving reference to prior
    reception of teaching.
- source_word: ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  lexicon: BDAG
  rationale: Passive of λέγω is most naturally rendered 'it was said' in English.
    This preserves the impersonal/passive form without over-specifying the speaker.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - Love
  lexicon: BDAG
  rationale: Future indicative here functions as an injunction/quotation of command
    language, conventionally and clearly rendered 'You shall love.' This preserves
    the formal force of the cited teaching.
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - the one near you
  - your fellow
  lexicon: BDAG
  rationale: πλησίον in this ethical context conventionally means 'neighbor.' This
    is the established and contextually precise English equivalent, especially given
    the allusion to Lev 19:18.
- source_word: μισήσεις
  chosen: hate
  alternatives:
  - you shall hate
  lexicon: BDAG
  rationale: Included within the quotation governed by 'it was said'; in English,
    'and hate your enemy' reads naturally after 'You shall love your neighbor.' The
    imperative-like future force is still understood from the quoted construction.
- source_word: τὸν ἐχθρόν σου
  chosen: your enemy
  alternatives:
  - the one hostile to you
  lexicon: BDAG
  rationale: ἐχθρός in this ethical contrast is best rendered 'enemy,' the standard
    and semantically direct equivalent.
