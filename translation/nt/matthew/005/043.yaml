theological_decisions:
- issue: Status of the clause 'and hate your enemy'
  chosen_reading: Render as part of the saying Jesus attributes to what his hearers
    had heard, without implying it is a direct Old Testament quotation.
  alternative_readings:
  - Treat the whole line as if equally quoted from Scripture
  - Mark the second clause as merely interpretive tradition in the main text
  rationale: The Greek presents a single reported saying introduced by 'You have heard
    that it was said.' Since the second clause is not a direct OT command, the translation
    avoids wording that would suggest explicit scriptural citation while still faithfully
    rendering Jesus' summary of received teaching.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
