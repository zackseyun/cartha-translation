id: MAT.5.40
reference: Matthew 5:40
source:
  edition: SBLGNT
  text: καὶ τῷ θέλοντί σοι κριθῆναι καὶ τὸν χιτῶνά σου λαβεῖν, ἄφες αὐτῷ καὶ τὸ ἱμάτιον·
translation:
  text: And to the one who wants to sue you and take your tunic, let him have your
    cloak also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "take you to court." The Greek literally refers to being judged in a
      legal setting.
    reason: lexical_alternative
  - marker: b
    text: '"Tunic" refers to the inner garment; "cloak" refers to the outer garment.'
    reason: cultural_note
lexical_decisions:
- source_word: τῷ θέλοντί
  chosen: to the one who wants
  alternatives:
  - to whoever wishes
  - to the one desiring
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a generic person. 'Wants' is natural modern English and preserves the volitional
    sense of θέλω without sounding stilted.
- source_word: σοι κριθῆναι
  chosen: to sue you
  alternatives:
  - to take you to court
  - to bring judgment against you
  lexicon: BDAG
  rationale: κριθῆναι literally means 'to be judged' or 'to go to court,' but in this
    context with the infinitive λαβεῖν and the object 'your tunic,' it refers to legal
    action against the hearer. 'Sue you' is concise, idiomatic, and contextually precise.
- source_word: χιτῶνά
  chosen: tunic
  alternatives:
  - shirt
  - inner garment
  lexicon: BDAG
  rationale: χιτών refers to the inner garment worn next to the skin. 'Tunic' preserves
    the historical distinction from ἱμάτιον better than 'shirt,' while remaining understandable
    in English.
- source_word: λαβεῖν
  chosen: take
  alternatives:
  - get
  - seize
  lexicon: BDAG
  rationale: λαμβάνω here means to take or receive possession of. 'Take' is the most
    straightforward rendering in the legal context.
- source_word: ἄφες
  chosen: let him have
  alternatives:
  - leave to him
  - give up to him
  lexicon: BDAG
  rationale: The aorist imperative of ἀφίημι here carries the sense of yielding or
    allowing possession. 'Let him have' communicates the imperative naturally in English
    without overtranslating it as a formal legal surrender.
- source_word: ἱμάτιον
  chosen: cloak
  alternatives:
  - outer garment
  - robe
  lexicon: BDAG
  rationale: ἱμάτιον denotes the outer garment, distinct from χιτών. 'Cloak' is the
    standard and clearest English equivalent, preserving the contrast intended in
    the saying.
- source_word: καὶ ... καὶ
  chosen: and ... also
  alternatives:
  - and ... even
  - and ... too
  lexicon: BDAG
  rationale: The first καί links this saying with the previous instruction; the second
    intensifies the response by adding the outer garment. Rendering the second as
    'also' preserves the additive force clearly.
