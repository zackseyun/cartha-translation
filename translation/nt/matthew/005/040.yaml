theological_decisions:
- issue: Ethical force of Jesus' instruction in a legal dispute
  chosen_reading: Render as a direct imperative of radical non-retaliatory generosity
    without softening it into mere metaphor.
  alternative_readings:
  - Render more loosely as a general principle of yielding rights
  rationale: The imperative ἄφες and the concrete garment imagery indicate an actual
    instruction framed in vivid legal-social terms. The translation should preserve
    the sharpness of Jesus' teaching without importing a narrower doctrinal system
    or reducing it to abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
