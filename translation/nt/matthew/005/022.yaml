theological_decisions:
- issue: Rendering γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The translation preserves the Jewish and Second Temple background of
    Jesus' warning rather than importing all later associations of the English term
    'hell.' This maintains theological precision without denying final judgment.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered term ἀδελφός
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The Greek is grammatically masculine singular and is rendered with matching
    English per the gender-accurate policy. Because the saying has representative
    force, an inclusivity note is appropriate in a footnote rather than altering the
    main text.
  doctrine_reference: Translation philosophy §4
