id: MAT.5.22
reference: Matthew 5:22
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι πᾶς ὁ ὀργιζόμενος τῷ ἀδελφῷ ⸀αὐτοῦ ἔνοχος ἔσται τῇ κρίσει·
    ὃς δ’ ἂν εἴπῃ τῷ ἀδελφῷ αὐτοῦ· Ῥακά, ἔνοχος ἔσται τῷ συνεδρίῳ· ὃς δ’ ἂν εἴπῃ·
    Μωρέ, ἔνοχος ἔσται εἰς τὴν γέενναν τοῦ πυρός.
translation:
  text: But I say to you that everyone who is angry with his brother will be liable
    to the judgment; and whoever says to his brother, ‘Raca,’ will be liable to the
    council; and whoever says, ‘Fool,’ will be liable to the Gehenna of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add 'without cause' after 'is angry with his brother.'
      The earliest and best-attested reading omits it.
    reason: textual_variant
  - marker: b
    text: '''Raca'' is an Aramaic term of contempt, roughly ''empty-head'' or ''good-for-nothing.'''
    reason: cultural_note
  - marker: c
    text: Or 'the Sanhedrin,' the Jewish ruling council.
    reason: alternative_reading
  - marker: d
    text: '''Brother'' translates a masculine singular term that can function representatively;
      the saying applies broadly, not only to male siblings.'
    reason: lexical_alternative
  - marker: e
    text: Or 'hell of fire'; 'Gehenna' preserves the specific term Jesus used, drawn
      from the Valley of Hinnom imagery associated with judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  chosen: But I say to you
  alternatives:
  - But I myself say to you
  - But I tell you
  lexicon: BDAG
  rationale: Retains the emphatic contrast introduced by ἐγώ with δέ while using natural
    English. 'Say' is closer to λέγω than the more dynamic 'tell.'
- source_word: πᾶς ὁ ὀργιζόμενος
  chosen: everyone who is angry
  alternatives:
  - everyone who becomes angry
  - whoever is angry
  lexicon: BDAG
  rationale: The substantival present participle expresses a general category. 'Everyone
    who is angry' preserves the gnomic force without over-specifying aspect.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: with his brother
  alternatives:
  - at his brother
  - with his brother/sister
  - against his brother
  lexicon: BDAG
  rationale: The dative after ὀργίζομαι is naturally rendered relationally in English.
    'Brother' preserves the masculine singular ἀδελφός in keeping with the gender-accurate
    policy; inclusive expansion is not placed in the main text. 'With' is idiomatic
    and avoids importing the textual variant 'without cause' or an overly interpretive
    hostility nuance.
- source_word: ἔνοχος ἔσται
  chosen: will be liable
  alternatives:
  - will be guilty
  - will be answerable
  lexicon: BDAG
  rationale: ἔνοχος with a dative or εἰς phrase here denotes exposure to legal penalty
    or judgment. 'Liable' best fits the escalating judicial imagery across the verse.
- source_word: τῇ κρίσει
  chosen: to the judgment
  alternatives:
  - to judgment
  - to the court
  lexicon: BDAG
  rationale: The article supports a specific judicial sense. 'The judgment' preserves
    the formal parallel with 'the council' while leaving open whether a local court
    or judgment process is in view.
- source_word: Ῥακά
  chosen: Raca
  alternatives:
  - empty-head
  - good-for-nothing
  lexicon: BDAG
  rationale: This is an Aramaic insult preserved in Greek script. Following the philosophy
    to transliterate names and preserve source texture where a term is culturally
    specific, the insult is transliterated and explained in a footnote rather than
    flattened in the main text.
- source_word: τῷ συνεδρίῳ
  chosen: to the council
  alternatives:
  - to the Sanhedrin
  lexicon: BDAG
  rationale: συνέδριον means 'council' and can denote the Jewish ruling council. 'Council'
    translates the term rather than importing the more technical proper-name sense
    'Sanhedrin,' which may be too specific in this context; the alternative is preserved
    in a footnote.
- source_word: Μωρέ
  chosen: Fool
  alternatives:
  - You fool
  - moron
  lexicon: BDAG
  rationale: Vocative μωρέ is a direct insult. 'Fool' is the standard lexical equivalent
    and preserves the moral-religious force better than the colloquial but misleading
    'moron.'
- source_word: εἰς τὴν γέενναν τοῦ πυρός
  chosen: to the Gehenna of fire
  alternatives:
  - into hell fire
  - into the fiery Gehenna
  lexicon: BDAG
  rationale: γέεννα is best rendered 'Gehenna' to preserve the historically and theologically
    loaded term rather than collapsing it into the later, broader English 'hell.'
    The genitive τοῦ πυρός is retained as 'of fire' to preserve the source imagery.
