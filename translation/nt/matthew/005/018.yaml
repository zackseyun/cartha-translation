id: MAT.5.18
reference: Matthew 5:18
source:
  edition: SBLGNT
  text: ἀμὴν γὰρ λέγω ὑμῖν, ἕως ἂν παρέλθῃ ὁ οὐρανὸς καὶ ἡ γῆ, ἰῶτα ἓν ἢ μία κεραία
    οὐ μὴ παρέλθῃ ἀπὸ τοῦ νόμου, ἕως ἂν πάντα γένηται.
translation:
  text: For truly I say to you, until heaven and earth pass away, not one iota or
    one stroke will ever pass away from the law until all things happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "one jot" for "one iota"; the Greek names the smallest letter.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "one tittle" for "one stroke"; that is, a tiny written mark distinguishing
      letters.'
    reason: lexical_alternative
  - marker: c
    text: 'Or: "until all is accomplished" / "until everything comes to pass."'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  chosen: truly
  alternatives:
  - amen
  - certainly
  lexicon: BDAG
  rationale: In Jesus' sayings, ἀμὴν functions as a solemn affirmation introducing
    an authoritative statement. 'Truly' is idiomatic modern English and preserves
    the force without leaving the Hebrew loanword untranslated.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ gives explanatory support to the preceding statement; 'for' best
    preserves the connective force in readable English.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A fairly direct rendering that preserves the formal, authoritative tone
    of Jesus' speech.
- source_word: ἕως ἂν παρέλθῃ
  chosen: until ... pass away
  alternatives:
  - until ... disappear
  - until ... come to an end
  lexicon: BDAG
  rationale: The construction marks a future contingency. 'Pass away' is the standard
    and fitting rendering for παρέρχομαι here, especially with 'heaven and earth.'
- source_word: ὁ οὐρανὸς καὶ ἡ γῆ
  chosen: heaven and earth
  alternatives:
  - the heaven and the earth
  lexicon: BDAG
  rationale: Idiomatic English omits the articles while preserving the cosmic scope
    of the phrase.
- source_word: ἰῶτα ἓν
  chosen: one iota
  alternatives:
  - one jot
  - the smallest letter
  lexicon: BDAG
  rationale: ἰῶτα refers to the smallest Greek letter and echoes the idea of the tiniest
    written element. 'Iota' is transparent in English and preserves the lexical specificity
    better than the archaic 'jot.'
- source_word: μία κεραία
  chosen: one stroke
  alternatives:
  - one serif
  - one little mark
  - one tittle
  lexicon: BDAG
  rationale: κεραία denotes a small projection or stroke of a letter. 'Stroke' is
    understandable modern English and avoids the archaic 'tittle' while preserving
    the image of the smallest written mark.
- source_word: οὐ μὴ παρέλθῃ
  chosen: will ever pass away
  alternatives:
  - will certainly not pass away
  - shall by no means pass away
  lexicon: BDAG
  rationale: οὐ μὴ with the subjunctive is an emphatic negation. 'Will ever pass away'
    captures the strong denial in natural English.
- source_word: ἀπὸ τοῦ νόμου
  chosen: from the law
  alternatives:
  - from the Law
  lexicon: BDAG
  rationale: νόμος here most naturally refers to the law in the scriptural sense,
    likely the Mosaic law or Torah as representative of God's revealed instruction.
    Lowercase 'law' is retained in the main text to avoid over-specifying beyond the
    Greek, while the scriptural sense is noted in the rationale.
- source_word: ἕως ἂν πάντα γένηται
  chosen: until all things happen
  alternatives:
  - until everything comes to pass
  - until all is accomplished
  - until everything takes place
  lexicon: BDAG
  rationale: γίνομαι here denotes coming to be or taking place. 'All things happen'
    is straightforward, though the phrase carries the sense of full realization or
    fulfillment.
