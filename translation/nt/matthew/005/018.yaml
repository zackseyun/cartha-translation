theological_decisions:
- issue: Sense of νόμος in Jesus' statement
  chosen_reading: the law refers to God's scriptural law, not merely legal principle
    in general
  alternative_readings:
  - the Law as specifically the Torah/Pentateuch
  - the whole Old Testament by extension
  rationale: In the immediate context (Matt 5:17–19), Jesus speaks of the Law and
    the Prophets and of enduring scriptural authority. The translation keeps 'the
    law' in the text because that is what the Greek says, while recognizing that readers
    may understand a broader scriptural reference by context.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of πάντα γένηται
  chosen_reading: until all things happen
  alternative_readings:
  - until all is accomplished
  - until everything comes to pass
  rationale: The phrase can be understood as the occurrence or accomplishment of all
    that God intends. To preserve theological tension rather than narrowing it to
    one interpretive scheme, the main text uses a broad rendering and preserves a
    common alternative in a footnote.
  doctrine_reference: Translation philosophy §3
