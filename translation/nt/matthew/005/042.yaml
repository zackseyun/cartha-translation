id: MAT.5.42
reference: Matthew 5:42
source:
  edition: SBLGNT
  text: τῷ αἰτοῦντί σε ⸀δός, καὶ τὸν θέλοντα ἀπὸ σοῦ δανίσασθαι μὴ ἀποστραφῇς.
translation:
  text: Give to the one who asks you, and do not turn away from the one who wants
    to borrow from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not refuse the one who wants to borrow from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτοῦντί
  chosen: the one who asks
  alternatives:
  - the one asking
  - whoever asks
  lexicon: BDAG
  rationale: Present participle with article functions substantivally, referring generically
    to a person characterized by asking. 'Asks' is natural modern English and preserves
    the ongoing/generic force without awkwardness.
- source_word: δός
  chosen: Give
  alternatives:
  - you must give
  lexicon: BDAG
  rationale: Aorist imperative of δίδωμι. Simple imperative 'Give' best reflects the
    direct command without adding modal force not explicit in the Greek.
- source_word: θέλοντα
  chosen: the one who wants
  alternatives:
  - the one willing
  - whoever wants
  lexicon: BDAG
  rationale: Present participle with article, substantival. 'Wants' is the most idiomatic
    rendering of θέλω here; 'willing' would sound stilted and slightly shift the sense.
- source_word: ἀπὸ σοῦ
  chosen: from you
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Standard prepositional phrase indicating source. 'From you' is the plain
    sense in context of borrowing.
- source_word: δανίσασθαι
  chosen: to borrow
  alternatives:
  - to borrow money
  - to take a loan
  lexicon: BDAG
  rationale: Aorist middle infinitive of δανίζω/δανείζω in context means to borrow.
    The broader 'to borrow' is preferable to 'borrow money' since the object is not
    specified.
- source_word: μὴ ἀποστραφῇς
  chosen: do not turn away
  alternatives:
  - do not refuse
  - do not turn your back on
  lexicon: BDAG
  rationale: Aorist passive/deponent subjunctive with μή functioning as a prohibition.
    'Do not turn away' preserves the metaphor/image of ἀποστρέφω more closely than
    the interpretive 'do not refuse,' while still reading naturally in English.
