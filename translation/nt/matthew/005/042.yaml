theological_decisions:
- issue: Scope and force of Jesus' ethical command
  chosen_reading: Render as a direct imperative without softening or narrowing the
    command beyond the Greek wording.
  alternative_readings:
  - Interpret as limited only to certain worthy petitioners
  - Render more idiomatically as 'do not refuse'
  rationale: The verse presents two straightforward imperatives in the Sermon on the
    Mount. The translation should preserve their ethical force and generality without
    importing later qualifications not stated in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
