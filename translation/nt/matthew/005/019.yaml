theological_decisions:
- issue: Implication of status 'least/great' in the kingdom
  chosen_reading: Render the statement as comparative status within the kingdom, without
    importing exclusion from the kingdom or a doctrine of merit.
  alternative_readings:
  - Treat 'least' as excluded from the kingdom
  - Treat 'great' as a technical rank of heavenly reward
  rationale: The verse states that such a person 'will be called least in the kingdom
    of heaven,' not that he will be outside it. The translation should preserve the
    wording without resolving broader theological debates about reward, status, or
    salvation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic ἀνθρώπους
  chosen_reading: Use 'men' as a gender-accurate generic, with inclusivity noted in
    a footnote.
  alternative_readings:
  - people
  - others
  rationale: The doctrine excerpt prefers gender-accurate renderings where the Greek
    is grammatically masculine with representative force. Here ἀνθρώπους is generic
    for human beings, so 'men' preserves the source form while a footnote can clarify
    inclusive reference for modern readers.
  doctrine_reference: Gender-accurate over gender-neutral.
