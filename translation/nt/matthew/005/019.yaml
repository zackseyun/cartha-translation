id: MAT.5.19
reference: Matthew 5:19
source:
  edition: SBLGNT
  text: ὃς ἐὰν οὖν λύσῃ μίαν τῶν ἐντολῶν τούτων τῶν ἐλαχίστων καὶ διδάξῃ οὕτως τοὺς
    ἀνθρώπους, ἐλάχιστος κληθήσεται ἐν τῇ βασιλείᾳ τῶν οὐρανῶν· ὃς δ’ ἂν ποιήσῃ καὶ
    διδάξῃ, οὗτος μέγας κληθήσεται ἐν τῇ βασιλείᾳ τῶν οὐρανῶν.
translation:
  text: Therefore, whoever relaxes one of the least of these commandments and teaches
    men to do so will be called least in the kingdom of heaven; but whoever does them
    and teaches them, this one will be called great in the kingdom of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sets aside' or 'breaks.' The Greek verb literally means 'loosens' and
      here refers to weakening or treating a commandment as nonbinding.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here refers to people generally, not males only; the Greek uses
      a masculine plural with generic force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λύσῃ
  chosen: relaxes
  alternatives:
  - breaks
  - sets aside
  - loosens
  lexicon: BDAG
  rationale: λύω literally means 'loose' or 'untie,' but in this legal/commandment
    context it carries the sense of loosening the force of a command, annulling it,
    or treating it as nonbinding. 'Relaxes' preserves the metaphorical sense better
    than the more interpretive 'breaks,' and fits the contrast with doing and teaching
    the commandments.
- source_word: μίαν τῶν ἐντολῶν τούτων τῶν ἐλαχίστων
  chosen: one of the least of these commandments
  alternatives:
  - one of these least commandments
  - one of the smallest of these commandments
  lexicon: BDAG
  rationale: The genitive construction most naturally means one commandment belonging
    to the category of 'the least' among these commandments. 'One of the least of
    these commandments' is clear modern English and preserves the comparative ranking
    implied by ἐλαχίστων.
- source_word: διδάξῃ οὕτως τοὺς ἀνθρώπους
  chosen: teaches men to do so
  alternatives:
  - teaches people so
  - teaches others in this way
  - teaches men thus
  lexicon: BDAG
  rationale: οὕτως points back to the act of relaxing the commandment, so 'to do so'
    makes the anaphoric force explicit in natural English. ἀνθρώπους is grammatically
    masculine plural but refers generically to human beings; per doctrine, gender-accurate
    rendering is preferred, and here 'men' preserves the representative generic force
    of the Greek better than an explicitly neutral recasting.
- source_word: ἐλάχιστος κληθήσεται
  chosen: will be called least
  alternatives:
  - will be called the least
  - will be considered least
  lexicon: BDAG
  rationale: κληθήσεται is a future passive of καλέω, 'will be called/named.' 'Will
    be called least' is the most direct rendering. The article is absent in Greek,
    so 'least' rather than 'the least' better reflects the form, though English idiom
    could support either.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: in the kingdom of heaven
  alternatives:
  - in the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. Singular 'heaven' is standard
    idiomatic English for the plural οὐρανῶν here and best communicates the established
    Matthean phrase without awkwardness.
- source_word: ποιήσῃ καὶ διδάξῃ
  chosen: does them and teaches them
  alternatives:
  - practices them and teaches them
  - keeps them and teaches them
  lexicon: BDAG
  rationale: ποιέω is broad ('do, make, carry out'). Because the implied object is
    the commandments, 'does them' is a straightforward and sufficiently formal rendering.
    'Keeps' would be more interpretive; 'practices' is possible but less directly
    tied to the Greek verb.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: 'The demonstrative adds emphasis: ''this one will be called great.''
    Retaining ''this one'' preserves the marked contrast with the previous clause
    more clearly than a simple pronoun.'
- source_word: μέγας
  chosen: great
  alternatives:
  - greatest
  - important
  lexicon: BDAG
  rationale: μέγας means 'great' or 'important.' 'Great' is the direct lexical equivalent
    and matches the contrast with ἐλάχιστος.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding statement about the enduring validity
    of the Law. 'Therefore' preserves the logical connection with suitable gravity.
