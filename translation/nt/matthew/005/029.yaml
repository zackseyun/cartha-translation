id: MAT.5.29
reference: Matthew 5:29
source:
  edition: SBLGNT
  text: εἰ δὲ ὁ ὀφθαλμός σου ὁ δεξιὸς σκανδαλίζει σε, ἔξελε αὐτὸν καὶ βάλε ἀπὸ σοῦ,
    συμφέρει γάρ σοι ἵνα ἀπόληται ἓν τῶν μελῶν σου καὶ μὴ ὅλον τὸ σῶμά σου βληθῇ εἰς
    γέενναν.
translation:
  text: But if your right eye causes you to stumble, tear it out and throw it away
    from you. For it is better for you that one of your members should perish than
    that your whole body should be thrown into Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''causes you to sin.'''
    reason: lexical_alternative
  - marker: b
    text: Gehenna is the Greek form of a name associated with the Valley of Hinnom;
      traditionally rendered 'hell.'
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζει
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - is a snare to you
  - offends you
  lexicon: BDAG
  rationale: The verb σκανδαλίζω literally carries the sense of causing someone to
    stumble or fall into offense/sin. 'Causes you to stumble' preserves the metaphor
    present in the Greek while remaining clear in modern English. 'Causes you to sin'
    is interpretive and common in English tradition, but it narrows the image; the
    broader metaphor is preferable in the main text.
- source_word: ἔξελε
  chosen: tear it out
  alternatives:
  - pluck it out
  - remove it
  lexicon: BDAG
  rationale: The aorist imperative of ἐξαιρέω here is forceful. 'Tear it out' communicates
    the violent, urgent imagery better than the more traditional but slightly dated
    'pluck it out.'
- source_word: βάλε ἀπὸ σοῦ
  chosen: throw it away from you
  alternatives:
  - cast it from you
  - throw it from you
  lexicon: BDAG
  rationale: βάλε is a strong imperative ('throw'), and ἀπὸ σοῦ adds separation ('away
    from you'). The chosen rendering preserves both force and separation in natural
    English.
- source_word: συμφέρει
  chosen: it is better for you
  alternatives:
  - it is profitable for you
  - it is advantageous for you
  lexicon: BDAG
  rationale: συμφέρει denotes benefit or advantage. 'It is better for you' is idiomatic
    and fits the comparative logic of the sentence without sounding commercial or
    wooden.
- source_word: ἀπόληται
  chosen: should perish
  alternatives:
  - be destroyed
  - be lost
  lexicon: BDAG
  rationale: The middle/subjunctive form of ἀπόλλυμι here refers to the loss of one
    member. 'Should perish' preserves the gravity and avoids over-specifying annihilation;
    'be destroyed' is possible but harsher and less idiomatic in this body-part comparison.
- source_word: μέλος
  chosen: member
  alternatives:
  - part
  - limb
  lexicon: BDAG
  rationale: μέλος refers to a bodily member. 'Member' preserves the lexical connection
    and works well in the contrast with 'whole body.' 'Limb' is too narrow because
    an eye is not normally called a limb.
- source_word: βληθῇ
  chosen: should be thrown
  alternatives:
  - be cast
  lexicon: BDAG
  rationale: The passive of βάλλω is straightforwardly 'be thrown.' This is natural
    modern English while retaining the force of the Greek. 'Be cast' is traditional
    but less current.
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The Greek term is γέεννα, derived from the Valley of Hinnom. Translating
    it as 'Gehenna' preserves the specific term used by Jesus and avoids prematurely
    flattening its historical and theological associations into the broader English
    term 'hell.' A footnote preserves the common alternative.
- source_word: ὁ δεξιὸς
  chosen: right
  lexicon: BDAG
  rationale: δεξιός simply means 'right' here, specifying the right eye. The detail
    should be retained because it is explicit in the source text.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast from the preceding statement.
    'But' best reflects the adversative nuance in context.
