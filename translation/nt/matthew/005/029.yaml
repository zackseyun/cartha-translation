theological_decisions:
- issue: Rendering of γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The translation follows original-language primacy by preserving the distinct
    term γέεννα rather than automatically substituting the more generalized English
    theological term 'hell.' This avoids importing later doctrinal associations beyond
    the text's wording while still allowing the common understanding to be noted in
    a footnote.
  doctrine_reference: Translation philosophy §1, §6
- issue: Metaphorical force of σκανδαλίζω
  chosen_reading: causes you to stumble
  alternative_readings:
  - causes you to sin
  rationale: The main text preserves the metaphorical tension of the Greek rather
    than resolving it into a narrower interpretive gloss. Because the context concerns
    sin, the alternative is worth preserving in a footnote, but the main text should
    retain the source image.
  doctrine_reference: Translation philosophy §1, §3
