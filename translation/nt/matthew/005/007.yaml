id: MAT.5.7
reference: Matthew 5:7
source:
  edition: SBLGNT
  text: μακάριοι οἱ ἐλεήμονες, ὅτι αὐτοὶ ἐλεηθήσονται.
translation:
  text: Blessed are the merciful, because they will receive mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will be shown mercy.' The Greek is a future passive verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Flourishing
  - Happy
  lexicon: BDAG
  rationale: Standard beatitude term denoting a state of divine favor and well-being,
    not merely subjective happiness. 'Blessed' preserves the theological weight and
    established beatitude form better than 'happy,' while remaining natural English.
- source_word: οἱ ἐλεήμονες
  chosen: the merciful
  alternatives:
  - those who are merciful
  - the compassionate
  lexicon: BDAG
  rationale: 'The article plus adjective functions substantivally: ''the merciful.''
    This keeps the concise, proverbial form of the beatitude. ''Merciful'' best matches
    the mercy vocabulary echoed by the verb ἐλεηθήσονται; ''compassionate'' is related
    but weakens the lexical repetition.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the blessing. 'Because' is clearer
    in contemporary English than 'for' while preserving the causal sense.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic, highlighting correspondence between the merciful
    and the mercy they receive. English can convey this adequately with 'they' in
    this compact saying; 'they themselves' would be more explicit but sounds heavy
    in the beatitude style.
- source_word: ἐλεηθήσονται
  chosen: will receive mercy
  alternatives:
  - will be shown mercy
  - will obtain mercy
  lexicon: BDAG
  rationale: Future passive of ἐλεάω. 'Will receive mercy' is idiomatic modern English
    and preserves the lexical connection with 'merciful.' 'Will be shown mercy' is
    also accurate but slightly more cumbersome; 'obtain mercy' sounds less natural.
