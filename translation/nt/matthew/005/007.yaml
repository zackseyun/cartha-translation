theological_decisions:
- issue: Nature of the promised mercy
  chosen_reading: 'Render the promise without specifying the human or divine agent:
    ''they will receive mercy.'''
  alternative_readings:
  - they will be shown mercy by God
  - they will receive mercy from others
  rationale: The passive leaves the agent unstated. In context, divine mercy is strongly
    implied, but the Greek does not explicitly name God. To preserve theological tension
    and avoid importing more specificity than the text states, the translation keeps
    the passive promise general.
  doctrine_reference: Preserve theological tension rather than resolve it.
