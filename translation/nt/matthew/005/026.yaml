theological_decisions:
- issue: Whether the saying should be translated in a way that resolves the metaphor
    toward final judgment, purgation, or merely a legal/prison scenario
  chosen_reading: The translation preserves the immediate image of confinement for
    debt without specifying a doctrinal interpretation.
  alternative_readings:
  - A metaphor of divine judgment
  - A teaching about interpersonal reconciliation with eschatological implications
  rationale: The verse occurs in a context of warning and reconciliation, but the
    Greek itself states only that the person will not get out until the debt is fully
    paid. To avoid importing doctrinal conclusions the text does not explicitly make,
    the translation keeps the concrete legal-prison imagery and leaves broader interpretation
    to readers and notes.
  doctrine_reference: Preserve theological tension rather than resolve it.
