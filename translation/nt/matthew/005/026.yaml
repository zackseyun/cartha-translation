id: MAT.5.26
reference: Matthew 5:26
source:
  edition: SBLGNT
  text: ἀμὴν λέγω σοι, οὐ μὴ ἐξέλθῃς ἐκεῖθεν ἕως ἂν ἀποδῷς τὸν ἔσχατον κοδράντην.
translation:
  text: Truly I tell you, you will certainly not get out of there until you have paid
    the last quadrans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from there.'
    reason: lexical_alternative
  - marker: b
    text: A quadrans was a small Roman coin.
    reason: cultural_note
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω σοι, ἀμήν functions as a solemn affirmation
    introducing an authoritative statement. 'Truly' communicates the force in natural
    modern English better than retaining the untranslated 'Amen.' 'Truly, truly' is
    not appropriate here because the Greek has a single ἀμήν, not the Johannine double
    formula.
- source_word: λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: The idiom λέγω σοι is a direct address formula. 'I tell you' is slightly
    more natural in contemporary English while preserving the directness and authority
    of the statement.
- source_word: οὐ μὴ ἐξέλθῃς
  chosen: you will certainly not get out
  alternatives:
  - you will never come out
  - you shall by no means come out
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not' preserves the strong force without archaic wording. 'Get out' fits the confinement
    context more idiomatically than the more wooden 'come out.'
- source_word: ἐκεῖθεν
  chosen: of there
  alternatives:
  - from there
  lexicon: BDAG
  rationale: ἐκεῖθεν denotes movement away from that place. English idiom with 'get
    out' prefers 'out of there'; this preserves the locative force naturally.
- source_word: ἕως ἂν ἀποδῷς
  chosen: until you have paid
  alternatives:
  - until you pay
  - until you repay
  lexicon: BDAG
  rationale: ἕως ἄν with the aorist subjunctive marks a future contingency terminating
    the prior state. 'Until you have paid' expresses the completion implied by the
    aorist more clearly in English. 'Repay' is possible, but 'paid' is more idiomatic
    in a debt/prison setting.
- source_word: τὸν ἔσχατον
  chosen: the last
  alternatives:
  - the very last
  lexicon: BDAG
  rationale: ἔσχατος here means the final or last in amount. 'The last' is sufficient
    and idiomatic; the emphatic nuance can be preserved by context without overtranslation.
- source_word: κοδράντην
  chosen: quadrans
  alternatives:
  - penny
  - farthing
  - small coin
  lexicon: BDAG
  rationale: κοδράντης is a specific Roman coin (Latin quadrans). Following the translation
    philosophy's preference for source-language primacy and transparency, the specific
    coin name is retained rather than replaced with misleading traditional English
    coinage like 'farthing' or generalized as 'small coin.' A footnote can clarify
    its value.
