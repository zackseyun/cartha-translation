id: MAT.5.47
reference: Matthew 5:47
source:
  edition: SBLGNT
  text: καὶ ἐὰν ἀσπάσησθε τοὺς ⸀ἀδελφοὺς ὑμῶν μόνον, τί περισσὸν ποιεῖτε; οὐχὶ καὶ
    οἱ ⸀ἐθνικοὶ ⸂τὸ αὐτὸ⸃ ποιοῦσιν;
translation:
  text: And if you greet only your brothers, what extraordinary thing are you doing?
    Do not even the Gentiles do the same?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' but may refer more
      broadly to members of one's own group.
    reason: lexical_alternative
  - marker: b
    text: Or 'what more are you doing?'
    reason: lexical_alternative
  - marker: c
    text: Or 'pagans.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσησθε
  chosen: greet
  alternatives:
  - welcome
  - greet warmly
  lexicon: BDAG
  rationale: The verb denotes offering a greeting or salutation. 'Greet' is the most
    natural modern English equivalent and fits the social action in context without
    overinterpreting it as hospitality.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and, in this context, likely
    refers to one's own kin/group members more broadly. Per the translation philosophy,
    gender-accurate rendering is preferred, so 'brothers' is retained in the main
    text, with a footnote preserving the inclusive sense.
- source_word: μόνον
  chosen: only
  alternatives:
  - alone
  - merely
  lexicon: BDAG
  rationale: μόνον restricts the action to a limited group. 'Only' is the clearest
    idiomatic English rendering.
- source_word: τί περισσὸν ποιεῖτε
  chosen: what extraordinary thing are you doing
  alternatives:
  - what more are you doing
  - what are you doing beyond others
  lexicon: BDAG
  rationale: περισσόν conveys what is beyond the ordinary, exceptional, or surpassing.
    'What extraordinary thing are you doing' captures the rhetorical force better
    than the flatter 'what more,' while remaining faithful to the Greek.
- source_word: ἐθνικοὶ
  chosen: Gentiles
  alternatives:
  - pagans
  - the nations
  lexicon: BDAG
  rationale: In this Jewish-context saying, ἐθνικοί refers to non-Jews and carries
    the sense of those outside the covenant people. 'Gentiles' is the most direct
    and contextually appropriate rendering; 'pagans' is interpretive and can overstate
    the religious nuance.
- source_word: τὸ αὐτὸ
  chosen: the same
  alternatives:
  - the same thing
  lexicon: BDAG
  rationale: The phrase means 'the same' or 'the same thing.' English idiom favors
    'do the same' here.
