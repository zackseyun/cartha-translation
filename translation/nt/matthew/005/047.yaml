theological_decisions:
- issue: Scope of ἀδελφοὺς in ethical teaching
  chosen_reading: Rendered as 'brothers' in the main text, preserving the masculine/plural
    form while allowing that the referent may include one's own group more broadly.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The translation philosophy requires gender-accurate rendering rather
    than flattening masculine forms into gender-neutral English in the main text.
    Because the social referent may be broader than male siblings alone, the inclusive
    possibility is preserved in a footnote rather than resolved in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Meaning of ἐθνικοὶ
  chosen_reading: Rendered as 'Gentiles' rather than 'pagans.'
  alternative_readings:
  - pagans
  - the nations
  rationale: The term primarily denotes non-Jews. In this context Jesus contrasts
    his disciples' conduct with that of those outside the covenant community. 'Gentiles'
    preserves the ethnic-covenantal contrast without importing a stronger polemical
    judgment than the Greek itself requires.
