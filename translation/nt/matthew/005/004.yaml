theological_decisions:
- issue: Scope of mourning in the beatitude
  chosen_reading: Render broadly as 'those who mourn' without specifying whether the
    mourning is over personal loss, sin, oppression, or eschatological longing.
  alternative_readings:
  - those who mourn over sin
  - those who grieve in general
  - those who lament Israel's condition
  rationale: The Greek text does not explicitly define the object of mourning. A broad
    rendering preserves the theological and pastoral openness of the saying rather
    than importing a narrower interpretive tradition into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
