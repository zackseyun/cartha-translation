id: MAT.5.4
reference: Matthew 5:4
source:
  edition: SBLGNT
  text: μακάριοι οἱ πενθοῦντες, ὅτι αὐτοὶ παρακληθήσονται.
translation:
  text: Blessed are those who mourn, because they will be comforted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who grieve.' The Greek is broad and does not specify the cause
      of the mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Flourishing
  - Happy
  lexicon: BDAG
  rationale: Retains the beatitude formula's covenantal and evaluative force better
    than 'happy,' which sounds subjective and emotional. 'Blessed' is established
    and accurate in this context.
- source_word: οἱ πενθοῦντες
  chosen: those who mourn
  alternatives:
  - the mourning
  - those who grieve
  lexicon: BDAG
  rationale: The articular present participle is rendered as a substantive plural
    in natural English. 'Mourn' best captures πενθέω, including lament over loss,
    suffering, or sin, without narrowing the cause of grief.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the blessing. 'Because' is clearer
    in modern English than the more traditional 'for' while preserving the causal
    sense.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic in Greek, but English does not require
    explicit emphasis here. The force is adequately conveyed by the beatitude structure;
    'they themselves' would sound overly marked.
- source_word: παρακληθήσονται
  chosen: will be comforted
  alternatives:
  - will be consoled
  - will receive comfort
  lexicon: BDAG
  rationale: Future passive of παρακαλέω here most naturally means receiving comfort
    or consolation. 'Will be comforted' is idiomatic, clear, and preserves the passive
    form.
