theological_decisions:
- issue: Rendering δικαιοσύνη in a non-Pauline Gospel context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md lists 'righteousness' as the default rendering for δικαιοσύνη,
    with 'justice' preserved in footnotes especially for Pauline passages. In Matthew
    5:20, the contrast with the scribes and Pharisees concerns the quality of covenantal
    obedience and right living, so 'righteousness' best preserves the theological
    and literary context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δικαιοσύνη default ''righteousness'''
