id: MAT.5.20
reference: Matthew 5:20
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν ὅτι ἐὰν μὴ περισσεύσῃ ⸂ὑμῶν ἡ δικαιοσύνη⸃ πλεῖον τῶν γραμματέων
    καὶ Φαρισαίων, οὐ μὴ εἰσέλθητε εἰς τὴν βασιλείαν τῶν οὐρανῶν.
translation:
  text: For I tell you that unless your righteousness exceeds that of the scribes
    and Pharisees, you will certainly not enter the kingdom of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice.' The Greek word can denote both righteousness and justice;
      here 'righteousness' best fits the context of Matthew 5.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  lexicon: BDAG
  rationale: λέγω is present indicative, and γάρ gives explanatory force, so 'For
    I tell you' is natural modern English while preserving the direct address to the
    disciples. 'Say to you' is more formal but less idiomatic here.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: The combination introduces a necessary negative condition. 'Unless' is
    the clearest English equivalent and avoids wooden phrasing.
- source_word: περισσεύσῃ
  chosen: exceeds
  alternatives:
  - abounds more than
  - surpasses
  lexicon: BDAG
  rationale: περισσεύω here conveys being greater in measure than a comparison group.
    'Exceeds' is concise and idiomatic in English for comparative moral quality.
- source_word: ὑμῶν ἡ δικαιοσύνη
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: BDAG
  rationale: δικαιοσύνη is a contested term in some contexts, but in Matthew 5 it
    most naturally refers to covenantally right conduct and standing expressed as
    'righteousness.' 'Justice' is possible lexically but is less fitting in this immediate
    context of surpassing the scribes and Pharisees.
- source_word: πλεῖον τῶν γραμματέων καὶ Φαρισαίων
  chosen: that of the scribes and Pharisees
  alternatives:
  - more than the scribes and Pharisees
  - more than that of the scribes and Pharisees
  lexicon: BDAG
  rationale: πλεῖον functions adverbially/comparatively with περισσεύσῃ. English expresses
    the comparison smoothly by supplying 'that of' to avoid ambiguity about whether
    persons or their righteousness are being compared.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς in the Gospels commonly refers to the recognized scribal experts
    in the law. 'Scribes' is the standard and sufficiently transparent term; 'teachers
    of the law' is interpretive and narrower.
- source_word: Φαρισαίων
  chosen: Pharisees
  lexicon: BDAG
  rationale: Proper group name, transliterated by standard English convention.
- source_word: οὐ μὴ εἰσέλθητε
  chosen: you will certainly not enter
  alternatives:
  - you will by no means enter
  - you shall certainly not enter
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not enter' preserves the force in clear modern English without archaic tone.
- source_word: βασιλείαν τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is established,
    accurate, and natural; 'of the heavens' is more literal but less idiomatic in
    English and does not improve clarity.
