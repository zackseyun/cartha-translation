theological_decisions:
- issue: Meaning of 'in heaven' / 'in the heavens'
  chosen_reading: The phrase refers to the heavenly sphere where the disciples' reward
    is kept by God, rendered idiomatically as 'in heaven.'
  alternative_readings:
  - A more formally literal rendering, 'in the heavens'
  rationale: No doctrinal dispute is being resolved; the decision is linguistic and
    stylistic. Matthew's plural often reflects Semitic usage, and English singular
    'heaven' best communicates the referent to modern readers.
  doctrine_reference: Translation philosophy §6 (readable modern English), with original-language
    primacy preserved.
