id: MAT.5.12
reference: Matthew 5:12
source:
  edition: SBLGNT
  text: χαίρετε καὶ ἀγαλλιᾶσθε, ὅτι ὁ μισθὸς ὑμῶν πολὺς ἐν τοῖς οὐρανοῖς· οὕτως γὰρ
    ἐδίωξαν τοὺς προφήτας τοὺς πρὸ ὑμῶν.
translation:
  text: Rejoice and be very glad, because your reward is great in heaven; for in this
    way they persecuted the prophets who were before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the heavens.' Matthew frequently uses the plural form where English
      normally says 'heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρετε
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: BDAG
  rationale: Present imperative, second person plural, calling for active joy. 'Rejoice'
    is the most natural and established English equivalent and pairs well with the
    following intensified verb.
- source_word: ἀγαλλιᾶσθε
  chosen: be very glad
  alternatives:
  - exult
  - be overjoyed
  lexicon: BDAG
  rationale: This verb denotes exuberant rejoicing beyond the simpler χαίρετε. 'Be
    very glad' preserves the intensification in accessible modern English better than
    the more formal 'exult.'
- source_word: μισθὸς
  chosen: reward
  alternatives:
  - wage
  - recompense
  lexicon: BDAG
  rationale: Although the noun can mean 'wage,' in this context of divine recompense
    for persecution 'reward' best fits idiomatic English without implying a merely
    commercial transaction.
- source_word: πολὺς
  chosen: great
  alternatives:
  - large
  - abundant
  lexicon: BDAG
  rationale: Predicate adjective describing the magnitude of the reward. 'Great' is
    idiomatic with 'reward' in English and preserves the emphasis.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Matthew often uses the plural οὐρανοῖς in a Semitic-influenced way where
    English idiom prefers singular 'heaven.' The singular communicates the sense naturally
    without loss of meaning.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: 'This adverb points to manner: the disciples'' persecution corresponds
    to the way the prophets were persecuted. ''In this way'' makes the comparative
    force explicit in natural English.'
- source_word: ἐδίωξαν
  chosen: they persecuted
  alternatives:
  - they pursued
  lexicon: BDAG
  rationale: In this context διώκω clearly carries the hostile sense of persecution,
    matching the preceding beatitude context.
- source_word: προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Standard rendering for Israel's prophetic figures; no contextual reason
    to vary.
- source_word: τοὺς πρὸ ὑμῶν
  chosen: who were before you
  alternatives:
  - before you
  - who came before you
  lexicon: BDAG
  rationale: The article plus prepositional phrase modifies 'the prophets.' 'Who were
    before you' is slightly more explicit in English and can denote those who preceded
    the disciples historically.
