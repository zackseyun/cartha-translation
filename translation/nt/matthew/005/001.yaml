id: MAT.5.1
reference: Matthew 5:1
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ τοὺς ὄχλους ἀνέβη εἰς τὸ ὄρος· καὶ καθίσαντος αὐτοῦ προσῆλθαν αὐτῷ
    οἱ μαθηταὶ αὐτοῦ·
translation:
  text: Seeing the crowds, he went up the mountain; and when he sat down, his disciples
    came to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When he saw the crowds, he went up the mountain.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'after he sat down.' The Greek uses a genitive absolute construction.
    reason: lexical_alternative
  - marker: c
    text: Or 'he went up on the mountain'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰδὼν
  chosen: Seeing
  alternatives:
  - When he saw
  - After seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning adverbially to set the circumstance
    for the main verb. 'Seeing' is concise and natural in English while preserving
    the participial linkage without over-specifying temporal sequence.
- source_word: δὲ
  chosen: —
  alternatives:
  - now
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective/transition particle. In natural English
    it is best left untranslated, since forcing 'now' or 'but' would add discourse
    weight not clearly present.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: ὄχλους is plural and refers to gathered masses of people. 'The crowds'
    is idiomatic modern English and preserves the plural better than 'the crowd';
    'multitudes' is understandable but less natural for the target register.
- source_word: ἀνέβη εἰς τὸ ὄρος
  chosen: he went up on the mountain
  alternatives:
  - he went up into the mountain
  - he went up the mountain
  - he ascended the mountain
  lexicon: BDAG
  rationale: ἀναβαίνω with εἰς τὸ ὄρος denotes upward movement to a mountain/hillside.
    'Went up on the mountain' is clear, natural, and retains the definite article.
    'Ascended' is too elevated for the translation philosophy; 'into the mountain'
    is unidiomatic in modern English.
- source_word: τὸ ὄρος
  chosen: the mountain
  alternatives:
  - the hill
  - the hillside
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain' or 'hill country.' The traditional and
    straightforward rendering is 'mountain.' While the exact topography may have been
    a hillside, the Greek noun itself is best represented by 'mountain' unless context
    compels otherwise.
- source_word: καὶ καθίσαντος αὐτοῦ
  chosen: and when he sat down
  alternatives:
  - and after he sat down
  - and as he sat down
  lexicon: BDAG
  rationale: Genitive absolute construction marking attendant circumstance prior to
    the next action. 'When he sat down' renders the temporal sense naturally in English
    without making the sequence more rigid than the Greek requires.
- source_word: προσῆλθαν αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  - came near to him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'come to' or 'approach.' 'Came to him' is
    simple, idiomatic, and fits the narrative flow; 'approached him' is possible but
    slightly more formal.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  - his learners
  lexicon: BDAG
  rationale: μαθηταί refers to disciples/followers in a teacher-student relationship.
    'His disciples' is the standard and most accurate rendering in this Gospel context.
