theological_decisions:
- issue: Rendering τὸ ὄρος with the definite article
  chosen_reading: the mountain
  alternative_readings:
  - a mountain
  - the hillside
  rationale: The Greek has the article, and the translation preserves it. This does
    not require identifying a specific named mountain, but it reflects the text as
    written and avoids flattening the narrative setting.
  doctrine_reference: Translation philosophy §1, §5
- issue: Narrative sequencing of the genitive absolute καθίσαντος αὐτοῦ
  chosen_reading: when he sat down
  alternative_readings:
  - after he sat down
  rationale: The construction indicates circumstance/temporal relation, but the exact
    nuance can be broader than strict succession. 'When he sat down' preserves the
    flow without importing a more technical or ceremonially loaded interpretation
    of seated teaching posture than the text itself states.
  doctrine_reference: Translation philosophy §3
