id: MAT.5.37
reference: Matthew 5:37
source:
  edition: SBLGNT
  text: ἔστω δὲ ὁ λόγος ὑμῶν ναὶ ναί, οὒ οὔ· τὸ δὲ περισσὸν τούτων ἐκ τοῦ πονηροῦ
    ἐστιν.
translation:
  text: But let your word be, ‘Yes, yes,’ or ‘No, no.’ Anything beyond these is from
    the evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from evil.' The Greek τοῦ πονηροῦ can be understood either personally
      ('the evil one') or impersonally ('evil').
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστω
  chosen: let ... be
  alternatives:
  - must be
  - is to be
  lexicon: BDAG
  rationale: Third-person present imperative of εἰμί; English idiom naturally renders
    the exhortation as 'let ... be' rather than a stiffer 'must be.'
- source_word: λόγος
  chosen: word
  alternatives:
  - speech
  - statement
  lexicon: BDAG
  rationale: λόγος here refers to what one says in ordinary speech. 'Word' preserves
    the concise, proverbial force of the saying better than the broader 'speech.'
- source_word: ναὶ ναί, οὒ οὔ
  chosen: ‘Yes, yes,’ or ‘No, no’
  alternatives:
  - ‘Yes’ and ‘No’
  - a simple ‘Yes’ or ‘No’
  lexicon: BDAG
  rationale: The doubled particles are retained to reflect the Greek emphasis and
    rhythm. Adding 'or' clarifies the contrast in natural English without expanding
    the sense.
- source_word: περισσὸν
  chosen: Anything beyond
  alternatives:
  - what is more than
  - the excess
  lexicon: BDAG
  rationale: The adjective used substantivally refers to what exceeds the simple yes/no
    speech just commanded. 'Anything beyond' is idiomatic and preserves the comparative
    sense.
- source_word: τούτων
  chosen: these
  alternatives:
  - this
  - these things
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the paired responses just
    mentioned; 'these' is concise and sufficient in English.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  - comes from
  lexicon: BDAG
  rationale: The preposition marks source/origin. 'From' is the most direct rendering.
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - evil
  - the wicked one
  lexicon: BDAG
  rationale: The genitive singular with article can mean either 'evil' or 'the evil
    one.' In Matthew, ὁ πονηρός commonly refers personally to Satan (cf. Matt 5:39;
    6:13; 13:19, 38), so 'the evil one' best preserves the likely personal force while
    keeping the ambiguity documented in a footnote.
