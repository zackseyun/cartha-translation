theological_decisions:
- issue: Whether τοῦ πονηροῦ is impersonal ('evil') or personal ('the evil one')
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: The phrase is grammatically ambiguous, but Matthew frequently uses ὁ
    πονηρός in a personal sense for Satan. To preserve theological tension rather
    than over-resolve it, the main text adopts the likely Matthean sense and the impersonal
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
