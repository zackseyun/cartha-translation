theological_decisions:
- issue: Whether to render the opening command idiomatically as a legal settlement
    ('come to terms') or more lexically as a disposition toward the opponent
  chosen_reading: Retain the lexical sense with 'Be well-disposed toward your accuser'
    in the main text.
  alternative_readings:
  - Come to terms quickly with your accuser
  rationale: The verse uses legal imagery, so an idiomatic settlement sense is contextually
    plausible. However, optimal equivalence and original-language primacy favor preserving
    εὐνοέω's core sense of favorable disposition rather than importing a fuller paraphrase.
    The legal implication can be preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
