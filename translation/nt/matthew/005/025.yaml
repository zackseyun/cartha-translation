id: MAT.5.25
reference: Matthew 5:25
source:
  edition: SBLGNT
  text: ἴσθι εὐνοῶν τῷ ἀντιδίκῳ σου ταχὺ ἕως ὅτου εἶ ⸂μετ’ αὐτοῦ ἐν τῇ ὁδῷ⸃, μήποτέ
    σε παραδῷ ὁ ἀντίδικος τῷ κριτῇ, καὶ ὁ ⸀κριτὴς τῷ ὑπηρέτῃ, καὶ εἰς φυλακὴν βληθήσῃ·
translation:
  text: Be well-disposed toward your accuser quickly, while you are with him on the
    way, lest your accuser hand you over to the judge, and the judge to the officer,
    and you be thrown into prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in this legal context, 'Come to terms quickly with
      your accuser.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσθι εὐνοῶν
  chosen: Be well-disposed
  alternatives:
  - Come to terms
  - Be friendly
  - Settle matters
  lexicon: BDAG
  rationale: The periphrastic imperative literally combines 'be' with a present participle,
    conveying an ongoing disposition or action. 'Be well-disposed' preserves the lexical
    sense of εὐνοέω ('to be favorably disposed toward') more closely than the more
    idiomatic but interpretive 'come to terms.'
- source_word: ἀντιδίκῳ / ἀντίδικος
  chosen: accuser
  alternatives:
  - adversary
  - opponent in court
  lexicon: BDAG
  rationale: The term has a legal setting here, reinforced by 'judge,' 'officer,'
    and 'prison.' 'Accuser' communicates the juridical sense clearly in modern English
    better than the broader 'adversary.'
- source_word: ταχὺ
  chosen: quickly
  alternatives:
  - soon
  - without delay
  lexicon: BDAG
  rationale: '''Quickly'' is the most natural adverbial rendering in context and preserves
    the urgency of the command.'
- source_word: ἕως ὅτου εἶ μετ’ αὐτοῦ ἐν τῇ ὁδῷ
  chosen: while you are with him on the way
  alternatives:
  - while you are going with him on the road
  - before you reach court with him
  lexicon: BDAG
  rationale: This phrase is rendered straightforwardly and keeps the concrete imagery
    of being together on the road, without over-interpreting it as explicitly 'to
    court,' though that is implied by context.
- source_word: μήποτέ
  chosen: lest
  alternatives:
  - otherwise
  - so that ... not
  lexicon: BDAG
  rationale: '''Lest'' concisely captures the warning force of μήποτε in a way that
    fits the solemn tone, though slightly formal.'
- source_word: παραδῷ
  chosen: hand ... over
  alternatives:
  - deliver ... over
  - turn ... over
  lexicon: BDAG
  rationale: '''Hand over'' is idiomatic modern English and preserves the force of
    judicial transfer.'
- source_word: κριτῇ / κριτὴς
  chosen: judge
  alternatives:
  - magistrate
  lexicon: BDAG
  rationale: '''Judge'' is the standard and clearest rendering for κριτής in this
    legal context.'
- source_word: ὑπηρέτῃ
  chosen: officer
  alternatives:
  - court officer
  - bailiff
  - attendant
  lexicon: BDAG
  rationale: In this judicial sequence, ὑπηρέτης refers to an official subordinate
    who executes the judge's order. 'Officer' is concise and natural; 'bailiff' is
    possible but more culturally specific.
- source_word: εἰς φυλακὴν
  chosen: into prison
  alternatives:
  - into jail
  lexicon: BDAG
  rationale: '''Prison'' is the standard rendering and suits the gravity of the warning.'
- source_word: βληθήσῃ
  chosen: be thrown
  alternatives:
  - be cast
  - be put
  lexicon: BDAG
  rationale: βάλλω here is vivid; 'be thrown' preserves that force better than the
    softer 'be put.'
