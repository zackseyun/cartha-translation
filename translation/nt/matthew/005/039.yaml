id: MAT.5.39
reference: Matthew 5:39
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν μὴ ἀντιστῆναι τῷ πονηρῷ· ἀλλ’ ὅστις σε ⸀ῥαπίζει ⸀εἰς τὴν δεξιὰν ⸀σιαγόνα, στρέψον αὐτῷ καὶ τὴν ἄλλην·
translation:
  text: But I say to you, do not resist the evil person. Instead, if anyone slaps you on the right cheek, turn the other to him as well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not resist evil'; alternatively, 'do not resist the evil one.'
    reason: alternative_reading
  - marker: b
    text: Or 'turn to him the other also'.
    reason: previous_rendering
lexical_decisions:
- source_word: μὴ ἀντιστῆναι
  chosen: do not resist
  alternatives:
  - do not oppose
  - do not retaliate against
  lexicon: BDAG
  rationale: ἀνθίστημι commonly means to set oneself against or resist. 'Do not resist' preserves the direct verbal force without narrowing it too quickly to only legal opposition or only retaliation, though the immediate example suggests non-retaliation is in view.
- source_word: τῷ πονηρῷ
  chosen: the evil person
  alternatives:
  - evil
  - the evil one
  lexicon: BDAG
  rationale: 'The dative with article and adjective is grammatically ambiguous: it can be neuter (''evil''), masculine generic (''evil person''), or in some contexts personal (''the evil one''). Here the following singular personal example (''whoever slaps you'') favors a personal referent. ''The evil person'' best fits the immediate context while avoiding an unnecessary demonological reading.'
- source_word: ῥαπίζει
  chosen: slaps
  alternatives:
  - strikes
  - hits
  lexicon: BDAG
  rationale: ῥαπίζω often refers to striking with the hand, especially a slap. 'Slaps' fits the cheek context and preserves the insult/humiliation nuance better than the broader 'strikes'.
- source_word: εἰς τὴν δεξιὰν σιαγόνα
  chosen: on the right cheek
  alternatives:
  - on the right jaw
  lexicon: BDAG
  rationale: σιαγών can denote jaw or cheek; in idiomatic English for a slap, 'cheek' is the natural rendering. εἰς with verbs of striking is well represented by English 'on' here.
- source_word: στρέψον αὐτῷ καὶ τὴν ἄλλην
  chosen: turn to him the other also
  alternatives:
  - turn the other also to him
  - offer him the other also
  lexicon: BDAG
  rationale: στρέφω means turn. 'Turn to him the other also' stays close to the Greek and avoids importing the stronger interpretive nuance 'offer,' while still reading naturally enough in English. 'The other' is understood as the other cheek from context.
- source_word: ὅστις
  chosen: if anyone
  alternatives:
  - whoever
  lexicon: BDAG
  rationale: In this conditional-like construction, 'if anyone' is idiomatic modern English and preserves the indefinite force.
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  chosen: But I say to you
  alternatives:
  - But I tell you
  lexicon: BDAG
  rationale: This formula contrasts Jesus' authoritative teaching with what precedes. 'Say to you' is slightly more formal and transparent to the Greek; 'But' preserves the adversative δέ in context.
