  from: turn to him the other also
  to: turn the other to him as well
  rationale: The current word order, which places the prepositional phrase 'to him' before the direct object 'the other', is grammatically correct but sounds somewhat stilted or archaic in contemporary English. Reversing the order to 'turn the other to him' follows a more natural English pattern. Replacing 'also' with 'as well' at the end of the clause further improves the idiomatic flow.
