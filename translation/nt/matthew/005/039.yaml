theological_decisions:
- issue: Meaning of τῷ πονηρῷ
  chosen_reading: 'personal-generic: ''the evil person'''
  alternative_readings:
  - 'abstract: ''evil'''
  - 'personal-specific: ''the evil one'''
  rationale: The phrase is genuinely ambiguous, but the immediate illustration concerns an offending human agent, so the main text uses 'the evil person.' The alternatives are preserved in a footnote to avoid over-resolving the ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
