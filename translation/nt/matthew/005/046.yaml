theological_decisions:
- issue: Meaning of μισθός in Jesus' ethical teaching
  chosen_reading: reward
  alternative_readings:
  - wages
  - recompense
  rationale: The verse contrasts ordinary reciprocal love with the distinctive conduct
    that receives divine commendation in context. 'Reward' preserves the moral-theological
    sense without importing a mechanistic doctrine of merit.
  doctrine_reference: Translation philosophy §§1, 3, 6
