id: MAT.5.46
reference: Matthew 5:46
source:
  edition: SBLGNT
  text: ἐὰν γὰρ ἀγαπήσητε τοὺς ἀγαπῶντας ὑμᾶς, τίνα μισθὸν ἔχετε; οὐχὶ καὶ οἱ τελῶναι
    ⸂τὸ αὐτὸ⸃ ποιοῦσιν;
translation:
  text: For if you love those who love you, what reward do you have? Do not even the
    tax collectors do the same?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what wages do you have?' The Greek word can mean 'wages' or 'reward';
      here it refers to recompense in the context of Jesus' teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For whenever
  lexicon: BDAG
  rationale: γάρ connects this saying to the preceding argument ('for'), while ἐάν
    introduces a conditional clause ('if'). 'For if' preserves both the logical connection
    and the conditional force in natural English.
- source_word: ἀγαπήσητε
  chosen: you love
  alternatives:
  - you should love
  - you have loved
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν forms a general condition. English present
    'you love' best conveys the sense in idiomatic conditional style without overtranslating
    aspect.
- source_word: τοὺς ἀγαπῶντας ὑμᾶς
  chosen: those who love you
  alternatives:
  - the ones loving you
  - those loving you
  lexicon: BDAG
  rationale: The participle is substantival and refers to a group defined by their
    action toward the hearers. 'Those who love you' is clear, natural, and preserves
    the lexical cognate with ἀγαπήσητε.
- source_word: τίνα μισθὸν ἔχετε
  chosen: what reward do you have
  alternatives:
  - what wages do you have
  - what recompense do you have
  lexicon: BDAG
  rationale: μισθός can denote pay, wages, or reward. In this ethical and eschatological
    context within the Sermon on the Mount, 'reward' is the most fitting and idiomatic
    rendering.
- source_word: οὐχὶ
  chosen: Do not
  alternatives:
  - Is it not that
  - Surely not
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer. English commonly
    expresses this with 'Do not ... ?' in rhetorical questions.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - too
  lexicon: BDAG
  rationale: 'Here καί has an emphatic/additive sense highlighting the surprising
    comparison. ''Even'' best captures the rhetorical force: even tax collectors do
    this.'
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax farmers
  - revenue collectors
  lexicon: BDAG
  rationale: τελώναι refers to those who collected taxes/tolls, a socially despised
    group in the Gospel context. 'Tax collectors' is the standard clear rendering
    in modern English.
- source_word: τὸ αὐτὸ
  chosen: the same
  alternatives:
  - the same thing
  - this same thing
  lexicon: BDAG
  rationale: The phrase means 'the same' or 'the same thing.' In English after 'do,'
    the concise 'do the same' is idiomatic and fully conveys the sense.
- source_word: ποιοῦσιν
  chosen: do
  alternatives:
  - practice
  - perform
  lexicon: BDAG
  rationale: ποιέω is broad and contextually refers to carrying out the same action.
    'Do' is the most natural equivalent in this rhetorical question.
