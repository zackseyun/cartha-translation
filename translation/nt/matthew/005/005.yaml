theological_decisions:
- issue: Scope of τὴν γῆν
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The Greek γῆ permits either a universal sense ('earth') or a more localized
    covenantal sense ('land'). In the context of Jesus' beatitude, 'the earth' best
    communicates the broad promise in natural English while preserving the likely
    echo of Psalm 37:11, where 'land' may be foregrounded. The translation preserves
    the theological tension rather than collapsing it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
