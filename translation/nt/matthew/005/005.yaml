id: MAT.5.5
reference: Matthew 5:5
source:
  edition: SBLGNT
  text: μακάριοι οἱ πραεῖς, ὅτι αὐτοὶ κληρονομήσουσι τὴν γῆν.
translation:
  text: Blessed are the meek, because they will inherit the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land'; the phrase likely echoes Psalm 37:11, where the promise can
      be heard in covenant-land terms as well as in a broader sense.
    reason: alternative_reading
  - marker: b
    text: Or 'the gentle'; 'meek' here means humble gentleness, not weakness.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: Standard beatitude rendering that preserves the sense of divine favor
    and flourishing without reducing the term to mere emotion. 'Happy' is too subjective
    and weak in this context.
- source_word: οἱ πραεῖς
  chosen: the meek
  alternatives:
  - the gentle
  - the humble
  lexicon: BDAG
  rationale: 'πραΰς denotes gentleness/meekness, especially strength under control
    rather than timidity. ''Meek'' best preserves the traditional and biblical nuance
    here, though ''gentle'' is a viable lexical alternative. The article makes the
    adjective substantival: ''the meek''.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the beatitude. 'Because' is clear
    modern English; 'for' is more traditional but less natural for contemporary readers.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek. English can convey the sense adequately
    with 'they' in this compact beatitude; a more explicit 'they themselves' would
    sound overly heavy in the main text.
- source_word: κληρονομήσουσι
  chosen: will inherit
  alternatives:
  - will receive as an inheritance
  - will possess
  lexicon: BDAG
  rationale: Future of κληρονομέω, denoting receiving an inheritance. 'Will inherit'
    is the most direct and idiomatic rendering and preserves possible allusion to
    covenantal promise language.
- source_word: τὴν γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: γῆ can mean either 'earth' or 'land.' In this beatitude, 'the earth'
    is the best main-text rendering in English and matches the broad eschatological
    sense commonly heard here, while still allowing recognition of an allusion to
    Psalm 37:11 where 'land' is also possible.
