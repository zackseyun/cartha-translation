theological_decisions:
- issue: Meaning of 'see God'
  chosen_reading: Retained as 'will see God' without interpretive expansion.
  alternative_readings:
  - will experience God's presence
  - will behold God in the eschaton
  rationale: The phrase carries theological depth and likely eschatological force,
    but the Greek itself is concise and should not be narrowed or expanded in translation.
    Preserving the direct wording maintains the text's theological tension, in line
    with the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
