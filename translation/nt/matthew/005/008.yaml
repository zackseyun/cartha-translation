id: MAT.5.8
reference: Matthew 5:8
source:
  edition: SBLGNT
  text: μακάριοι οἱ καθαροὶ τῇ καρδίᾳ, ὅτι αὐτοὶ τὸν θεὸν ὄψονται.
translation:
  text: Blessed are the pure in heart, because they will see God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clean in heart.'
    reason: lexical_alternative
  - marker: b
    text: The promise 'will see God' may refer to direct access to God's presence,
      including its future consummation; the translation preserves the wording without
      narrowing it.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Flourishing
  - Happy
  lexicon: BDAG
  rationale: Standard beatitude rendering that preserves the sense of divine favor
    and enviable state without reducing it to mere emotion. 'Happy' is too shallow;
    'flourishing' is interpretive.
- source_word: καθαροὶ
  chosen: pure
  alternatives:
  - clean
  lexicon: BDAG
  rationale: '''Pure'' best fits the moral and inward sense in this context. ''Clean''
    is possible but sounds more ritual or external in English.'
- source_word: τῇ καρδίᾳ
  chosen: in heart
  alternatives:
  - in the heart
  - of heart
  lexicon: BDAG
  rationale: The dative is rendered idiomatically in English as 'in heart,' expressing
    the sphere or respect in which purity is true. This is more natural than 'of heart'
    while preserving the inward-focus of καρδία as the inner person, not merely emotion.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the blessing. 'Because' is clearer
    in modern English than the more traditional 'for'.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic, highlighting that these very people will receive
    the promise. English can convey this adequately with 'they' in this beatitude
    structure; 'they themselves' is possible but heavier than needed.
- source_word: τὸν θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ὄψονται; straightforwardly rendered 'God.' No article
    is needed in natural English.
- source_word: ὄψονται
  chosen: will see
  alternatives:
  - shall see
  lexicon: BDAG
  rationale: Future middle of ὁράω, here a simple future promise. 'Will see' is natural
    modern English; 'shall see' is more traditional but less current.
