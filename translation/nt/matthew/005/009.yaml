theological_decisions:
- issue: Gendered filial language in υἱοὶ θεοῦ
  chosen_reading: sons of God
  alternative_readings:
  - children of God
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings where the Greek is grammatically masculine and representative/generic.
    'Sons of God' preserves the source wording and possible echoes of filial status
    and inheritance language, while the inclusive sense can be noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
