id: MAT.5.9
reference: Matthew 5:9
source:
  edition: SBLGNT
  text: μακάριοι οἱ εἰρηνοποιοί, ὅτι αὐτοὶ υἱοὶ θεοῦ κληθήσονται.
translation:
  text: Blessed are the peacemakers, because they will be called sons of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of God.' The Greek reads 'sons of God,' using masculine plural
      filial language with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Flourishing
  lexicon: BDAG
  rationale: Standard beatitude rendering that preserves the sense of divine favor
    and enviable status better than the more subjective 'happy.'
- source_word: εἰρηνοποιοί
  chosen: peacemakers
  alternatives:
  - those who make peace
  - peace-makers
  lexicon: BDAG
  rationale: A natural and established English equivalent for those who actively bring
    about peace; it preserves the agentive force of the compound noun.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the blessing. 'Because' is clearer
    in modern English than the more traditional 'for' while preserving the causal
    sense.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek, but standard English can convey the
    sense adequately with 'they' in this beatitude structure. A more explicit 'they
    themselves' would sound overly marked here.
- source_word: υἱοὶ θεοῦ
  chosen: sons of God
  alternatives:
  - children of God
  lexicon: BDAG
  rationale: Rendered gender-accurately in keeping with the stated philosophy. The
    Greek uses the masculine plural 'sons,' and this filial designation carries representative
    covenantal/theological weight that should not be flattened in the main text.
- source_word: κληθήσονται
  chosen: will be called
  alternatives:
  - will be named
  - will be recognized as
  lexicon: BDAG
  rationale: The future passive of καλέω is most directly rendered 'will be called.'
    This preserves both the verbal form and the declarative sense without overinterpreting
    it as merely social recognition.
