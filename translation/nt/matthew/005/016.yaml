theological_decisions:
- issue: Generic masculine ἀνθρώπων
  chosen_reading: before men
  alternative_readings:
  - before people
  - before others
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is preserved in the main text because it carries representative force in Greek.
    An inclusive sense is worth preserving in a footnote for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Plural οὐρανοῖς
  chosen_reading: who is in the heavens
  alternative_readings:
  - who is in heaven
  rationale: The Greek plural is retained rather than flattened to the traditional
    singular. This follows original-language primacy while remaining readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
