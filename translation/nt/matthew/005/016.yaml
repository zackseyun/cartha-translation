id: MAT.5.16
reference: Matthew 5:16
source:
  edition: SBLGNT
  text: οὕτως λαμψάτω τὸ φῶς ὑμῶν ἔμπροσθεν τῶν ἀνθρώπων, ὅπως ἴδωσιν ὑμῶν τὰ καλὰ
    ἔργα καὶ δοξάσωσιν τὸν πατέρα ὑμῶν τὸν ἐν τοῖς οὐρανοῖς.
translation:
  text: In the same way, let your light shine before men, so that they may see your
    good works and glorify your Father who is in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Men'' here means human beings generally, not males only.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who is in heaven.' The Greek has the plural, 'in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Links this verse back to the preceding lamp/light imagery and conveys
    manner rather than merely intensity. 'In the same way' is slightly more natural
    in contemporary English while preserving the discourse connection.
- source_word: λαμψάτω
  chosen: let ... shine
  alternatives:
  - shine
  - must shine
  lexicon: BDAG
  rationale: Aorist active imperative, third singular, governing 'your light.' English
    idiom expresses this naturally as 'let your light shine.' This preserves the imperatival
    force without sounding wooden.
- source_word: τὸ φῶς ὑμῶν
  chosen: your light
  alternatives:
  - the light of you
  lexicon: BDAG
  rationale: Standard possessive rendering. The singular 'light' is retained as in
    Greek, functioning collectively for the disciples' visible witness.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  - in front of people
  - before others
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human beings, but the doctrine excerpt
    prefers gender-accurate rendering where the source uses masculine forms with representative
    force. 'Before men' preserves the Greek form and traditional rhetorical cadence;
    inclusivity can be clarified in a footnote.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose/result naturally in English and fits the subjunctive
    verbs that follow.
- source_word: ἴδωσιν
  chosen: they may see
  alternatives:
  - they might see
  - they see
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅπως is well represented by 'may see' in English.
- source_word: τὰ καλὰ ἔργα
  chosen: your good works
  alternatives:
  - your fine deeds
  - your beautiful works
  lexicon: BDAG
  rationale: καλός can carry the sense of noble, fine, or beautiful, but 'good works'
    is the clearest and most idiomatic rendering here. The possessive 'your' is retained
    from ὑμῶν.
- source_word: δοξάσωσιν
  chosen: glorify
  alternatives:
  - give glory to
  - honor
  lexicon: BDAG
  rationale: '''Glorify'' is the standard and theologically weighty rendering of δοξάζω,
    especially in relation to God.'
- source_word: τὸν πατέρα ὑμῶν
  chosen: your Father
  alternatives:
  - the Father of you
  lexicon: BDAG
  rationale: Natural possessive rendering. Retains the relational language central
    to Matthew's Gospel.
- source_word: τὸν ἐν τοῖς οὐρανοῖς
  chosen: who is in the heavens
  alternatives:
  - who is in heaven
  - who is in the heavenly realms
  lexicon: BDAG
  rationale: The Greek is plural, 'in the heavens.' This rendering preserves the source
    form more closely than the traditional singular 'in heaven,' while remaining understandable
    in English.
