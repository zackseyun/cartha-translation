id: MAT.5.33
reference: Matthew 5:33
source:
  edition: SBLGNT
  text: Πάλιν ἠκούσατε ὅτι ἐρρέθη τοῖς ἀρχαίοις· Οὐκ ἐπιορκήσεις, ἀποδώσεις δὲ τῷ
    κυρίῳ τοὺς ὅρκους σου.
translation:
  text: Again, you have heard that it was said to those of old, ‘You shall not swear
    falsely, but you shall fulfill your oaths to the Lord.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You shall not break an oath”; the verb can refer to swearing falsely
      or violating an oath.
    reason: lexical_alternative
  - marker: b
    text: Or “to the LORD,” reflecting the covenantal divine name in the Old Testament
      background.
    reason: alternative_reading
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Also
  - Further
  lexicon: BDAG
  rationale: Introduces another example in the series of antitheses; 'Again' is natural
    modern English and preserves the discourse progression.
- source_word: ἠκούσατε
  chosen: you have heard
  alternatives:
  - you heard
  lexicon: BDAG
  rationale: Aorist in this formulaic expression is idiomatically rendered with English
    present perfect in this context ('you have heard') to match the repeated Matthean
    pattern and current relevance.
- source_word: ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  lexicon: BDAG
  rationale: Standard passive rendering that preserves the impersonal form without
    over-specifying the speaker.
- source_word: τοῖς ἀρχαίοις
  chosen: to those of old
  alternatives:
  - to the ancients
  - to the people of old
  lexicon: BDAG
  rationale: Dative plural with temporal-historical sense. 'Those of old' is idiomatic
    and preserves the reference to earlier generations rather than merely elderly
    persons.
- source_word: Οὐκ ἐπιορκήσεις
  chosen: You shall not swear falsely
  alternatives:
  - You shall not break an oath
  - You shall not commit perjury
  lexicon: BDAG
  rationale: ἐπιορκέω refers to swearing falsely or violating an oath. 'Swear falsely'
    is broad enough to cover false oath-taking and fits the allusive legal style better
    than the narrower technical term 'commit perjury.'
- source_word: ἀποδώσεις
  chosen: you shall fulfill
  alternatives:
  - you shall pay
  - you shall render
  lexicon: BDAG
  rationale: ἀποδίδωμι here means to carry out what is owed in vows/oaths. 'Fulfill'
    communicates performance of pledged obligations in clear English.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the lord
  lexicon: BDAG
  rationale: κύριος takes the default contested-term rendering 'Lord' per doctrine.
    In this scriptural allusion the referent is God, so capitalization is appropriate
    in English.
- source_word: τοὺς ὅρκους σου
  chosen: your oaths
  alternatives:
  - the oaths you have made
  - your sworn vows
  lexicon: BDAG
  rationale: ὅρκος is specifically an oath. 'Your oaths' is concise and preserves
    the direct object of ἀποδώσεις.
