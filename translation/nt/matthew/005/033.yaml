theological_decisions:
- issue: Rendering of κύριος in a citation/allusion to Israel's Scriptures
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek text has κυρίῳ, and the doctrine default for κύριος is 'Lord.'
    Because this is Jesus' summary of scriptural teaching rather than a direct quotation
    of the Tetragrammaton in Hebrew, 'the Lord' is preferred in the main text, while
    the covenantal alternative is worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Scope of ἐπιορκέω
  chosen_reading: swear falsely
  alternative_readings:
  - break an oath
  - commit perjury
  rationale: The verb can denote false swearing and oath violation. 'Swear falsely'
    best preserves the wording's breadth without importing a narrower modern legal
    category.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
