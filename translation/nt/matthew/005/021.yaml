id: MAT.5.21
reference: Matthew 5:21
source:
  edition: SBLGNT
  text: Ἠκούσατε ὅτι ἐρρέθη τοῖς ἀρχαίοις· Οὐ φονεύσεις· ὃς δ’ ἂν φονεύσῃ, ἔνοχος ἔσται τῇ κρίσει.
translation:
  text: You have heard that it was said to the ancients, ‘You shall not murder; and whoever murders will be liable to judgment.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to those of old.”
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “You shall not kill,” but the Greek verb here more specifically means “murder.”
    reason: lexical_alternative
  - marker: c
    text: Or '‘You shall not murder,’ and ‘whoever murders will be liable to judgment.’'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἠκούσατε
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: BDAG
  rationale: Aorist in this discourse formula is naturally rendered in idiomatic English as present perfect, reflecting what the audience has heard as received teaching rather than a single past event.
- source_word: ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  lexicon: BDAG
  rationale: Standard passive rendering preserves the impersonal divine/passive-like formula without overinterpreting the speaker.
- source_word: τοῖς ἀρχαίοις
  chosen: to the ancients
  alternatives:
  - to those of old
  - to the people of old
  - to the ancient ones
  lexicon: BDAG
  rationale: ἀρχαῖος here refers to people of former times. 'To the ancients' is concise and natural while preserving the dative recipient sense of the saying. 'Those of old' is possible but can sound more idiomatic than transparent.
- source_word: Οὐ φονεύσεις
  chosen: You shall not murder
  alternatives:
  - You shall not kill
  lexicon: BDAG
  rationale: φονεύω specifically denotes murder rather than killing in general. This aligns with original-language primacy and avoids the broader, potentially misleading English 'kill.'
- source_word: ὃς δ’ ἂν φονεύσῃ
  chosen: whoever murders
  alternatives:
  - whoever should murder
  - whoever commits murder
  lexicon: BDAG
  rationale: The relative clause with ἄν and aorist subjunctive expresses an indefinite general condition. 'Whoever murders' is the most natural English equivalent.
- source_word: ἔνοχος ἔσται
  chosen: will be liable
  alternatives:
  - will be guilty
  - will be answerable
  lexicon: BDAG
  rationale: ἔνοχος with dative commonly means being liable or answerable to a legal consequence. 'Will be liable' fits the judicial context better than the more abstract 'guilty.'
- source_word: τῇ κρίσει
  chosen: to judgment
  alternatives:
  - to the court
  - to the judgment
  - to condemnation
  lexicon: BDAG
  rationale: κρίσις here is judicial judgment. 'To judgment' preserves the legal sense without prematurely specifying the exact institution. The article is not always carried into idiomatic English.
