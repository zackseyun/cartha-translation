theological_decisions:
- issue: Rendering of the sixth commandment citation
  chosen_reading: murder
  alternative_readings:
  - kill
  rationale: The Greek verb φονεύω is narrower than general killing and refers to unlawful killing/murder. Using 'murder' avoids importing an absolutist claim about all killing that the Greek wording itself does not make.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
revisions:
- timestamp: '2026-04-21T02:55:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/005/021.json
  category: awkward_english
  tier: 1
  from: ‘You shall not murder,’ and ‘whoever murders will be liable to judgment.’
  to: ‘You shall not murder; and whoever murders will be liable to judgment.’
  rationale: 'The current punctuation, which presents two separate quotations joined by ''and'', is slightly disjointed. Jesus is citing a single unit of received tradition: the commandment and its standard legal consequence. Presenting this as a single quotation, with a semicolon reflecting the Greek high point (·), better captures the sense that this is one packaged teaching that the audience has ''heard''.'
