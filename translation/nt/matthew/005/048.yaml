id: MAT.5.48
reference: Matthew 5:48
source:
  edition: SBLGNT
  text: Ἔσεσθε οὖν ὑμεῖς τέλειοι ⸀ὡς ὁ πατὴρ ὑμῶν ὁ ⸀οὐράνιος τέλειός ἐστιν.
translation:
  text: You, therefore, shall be perfect, as your heavenly Father is perfect.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'complete,' 'whole,' or 'mature.' The Greek τέλειος can denote completeness
      or maturity as well as perfection.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔσεσθε
  chosen: shall be
  alternatives:
  - must be
  - are to be
  - will be
  lexicon: BDAG
  rationale: Future middle indicative of εἰμί used imperativally/exhortationally in
    context. 'Shall be' preserves the formal force and echoes the solemn concluding
    command of the section better than the more colloquial 'must be' or paraphrastic
    'are to be.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding teaching on love for enemies. 'Therefore'
    best preserves the logical connection in natural English.
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis. English can convey this adequately by
    retaining the pronoun in initial position without overtranslating to 'you yourselves.'
- source_word: τέλειοι
  chosen: perfect
  alternatives:
  - complete
  - whole
  - mature
  lexicon: BDAG
  rationale: In this Matthean context, τέλειος carries the sense of wholeness/completeness
    in love and moral integrity, but 'perfect' remains the most direct and traditional
    rendering and fits the comparison with the Father's perfection. Alternatives are
    meaningful interpretive possibilities and are preserved in a footnote.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces the comparison with the Father. 'As' is concise and sufficient;
    'just as' is possible but not necessary.
- source_word: πατὴρ ὑμῶν
  chosen: your Father
  lexicon: BDAG
  rationale: Straightforward possessive construction. Capitalized 'Father' reflects
    its use as a divine title/reference in context.
- source_word: οὐράνιος
  chosen: heavenly
  alternatives:
  - in heaven
  - heavenly one
  lexicon: BDAG
  rationale: Attributive adjective modifying 'Father.' 'Heavenly' is the natural and
    established English equivalent here.
- source_word: τέλειός
  chosen: perfect
  alternatives:
  - complete
  - whole
  lexicon: BDAG
  rationale: Repeated to preserve the lexical correspondence and rhetorical force
    of the Greek. Using the same English gloss maintains the comparison between disciples
    and the Father.
