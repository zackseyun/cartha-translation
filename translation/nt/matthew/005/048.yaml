theological_decisions:
- issue: Meaning of τέλειος in ethical exhortation
  chosen_reading: Render τέλειος as 'perfect' in the main text, while acknowledging
    the semantic range 'complete/whole/mature' in a footnote.
  alternative_readings:
  - complete
  - whole
  - mature
  rationale: The verse does not teach metaphysical equality with God but calls for
    undivided, complete love in keeping with the immediate context (5:43–47). 'Perfect'
    is the most direct lexical rendering and preserves the text's searching ethical
    force; the footnote guards against flattening the term into sinless absolutism
    or, conversely, reducing it too far.
  doctrine_reference: Translation philosophy §§1, 3, 5
