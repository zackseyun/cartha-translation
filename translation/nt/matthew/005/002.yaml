id: MAT.5.2
reference: Matthew 5:2
source:
  edition: SBLGNT
  text: καὶ ἀνοίξας τὸ στόμα αὐτοῦ ἐδίδασκεν αὐτοὺς λέγων·
translation:
  text: 'And opening his mouth, he was teaching them, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'And having opened his mouth, he taught them, saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοίξας
  chosen: opening
  alternatives:
  - having opened
  - began to speak
  lexicon: BDAG
  rationale: Aorist participle of ἀνοίγω, literally 'having opened.' The idiom 'opening
    his mouth' is preserved rather than reduced to 'began to speak' in order to retain
    the Semitic/solemn narrative flavor while remaining natural enough in English.
- source_word: τὸ στόμα αὐτοῦ
  chosen: his mouth
  alternatives:
  - the mouth of him
  lexicon: BDAG
  rationale: Rendered idiomatically as 'his mouth.' The phrase is a conventional expression
    introducing formal speech, and preserving it reflects the source text more closely
    than omitting it.
- source_word: ἐδίδασκεν
  chosen: he was teaching
  alternatives:
  - he taught
  - he began teaching
  lexicon: BDAG
  rationale: Imperfect indicative conveys ongoing or inceptive past action. 'He was
    teaching' best preserves the imperfective aspect without over-interpreting it
    as merely ingressive.
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - the people
  - his disciples
  lexicon: BDAG
  rationale: The pronoun's referent is supplied only by context, not by this verse
    alone. 'Them' preserves the Greek without importing a narrower identification
    into the translation.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: BDAG
  rationale: Present participle introducing the content of the teaching. 'Saying'
    is the standard and sufficiently transparent rendering, preserving the participial
    linkage to the preceding verb.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Simple connective καί is best rendered 'And' here. 'Then' would add a
    stronger temporal nuance than the Greek requires, and 'Now' would be more discourse-interpretive.
