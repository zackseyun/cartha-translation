theological_decisions:
- issue: Metaphorical identification of the disciples as light
  chosen_reading: Retained the direct metaphor 'You are the light of the world' without
    interpretive expansion.
  alternative_readings:
  - You are light for the world
  rationale: The verse assigns a representative role to Jesus' hearers without requiring
    doctrinal elaboration in translation. The wording preserves the metaphor and avoids
    importing additional theological explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
