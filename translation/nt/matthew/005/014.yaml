id: MAT.5.14
reference: Matthew 5:14
source:
  edition: SBLGNT
  text: Ὑμεῖς ἐστε τὸ φῶς τοῦ κόσμου. οὐ δύναται πόλις κρυβῆναι ἐπάνω ὄρους κειμένη·
translation:
  text: You are the light of the world. A city set on a hill cannot be hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'A city lying on a mountain cannot be hidden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun is explicit and emphatic in Greek. English
    normally does not require an emphatic form here, but the explicit pronoun supports
    the direct address. The emphasis is conveyed by word order and context rather
    than adding 'yourselves' in the main text.
- source_word: τὸ φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: The article is present and naturally carried into English as 'the light,'
    marking the disciples' representative role rather than an indefinite quality.
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - for the world
  lexicon: BDAG
  rationale: κόσμος here is best rendered 'world' in the broad human/world-order sense.
    The genitive is most naturally rendered 'of the world,' not a more interpretive
    'for the world.'
- source_word: οὐ δύναται
  chosen: cannot
  alternatives:
  - is not able to
  lexicon: BDAG
  rationale: Idiomatic English compresses the verbal idea into 'cannot' while preserving
    the sense of impossibility.
- source_word: πόλις
  chosen: A city
  alternatives:
  - A town
  lexicon: BDAG
  rationale: πόλις is standardly 'city.' Although some contexts could allow 'town,'
    'city' is the normal and more recognizable rendering in this proverbial image.
- source_word: κρυβῆναι
  chosen: be hidden
  alternatives:
  - be concealed
  lexicon: BDAG
  rationale: Aorist passive infinitive of κρύπτω is well represented by 'be hidden.'
    'Be concealed' is possible but less natural in contemporary English.
- source_word: ἐπάνω ὄρους
  chosen: on a hill
  alternatives:
  - on a mountain
  - upon a hill
  lexicon: BDAG
  rationale: Literally 'upon a mountain/hill.' In this saying, idiomatic English favors
    'on a hill.' 'Mountain' is possible from ὄρος, but the established topographical
    sense in English for a visible elevated settlement is 'hill,' and it avoids overstating
    the terrain.
- source_word: κειμένη
  chosen: set
  alternatives:
  - situated
  - lying
  lexicon: BDAG
  rationale: The participle means 'lying/situated.' In English, with a city and elevated
    location, 'set' is concise and idiomatic, capturing the state of being placed/situated
    there. This is a modestly dynamic rendering justified by natural English style.
