theological_decisions:
- issue: Historical-social force of coerced service under authority
  chosen_reading: Render the saying as a response to coercive demand without specifying
    Roman soldiers in the main text.
  alternative_readings:
  - Interpret explicitly as Roman military impressment
  rationale: The verb and 'mile' strongly evoke the practice of forced carrying/service
    in a Roman context, but the Greek text itself does not explicitly mention soldiers.
    The translation preserves the coercive scenario while avoiding importing a more
    specific historical referent into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
