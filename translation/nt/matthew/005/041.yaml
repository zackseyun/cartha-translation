id: MAT.5.41
reference: Matthew 5:41
source:
  edition: SBLGNT
  text: καὶ ὅστις σε ἀγγαρεύσει μίλιον ἕν, ὕπαγε μετ’ αὐτοῦ δύο.
translation:
  text: And whoever forces you to go one mile, go with him two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compels you to go.' The verb can refer to being pressed into service
      by official authority, likely evoking Roman-era forced service.
    reason: lexical_alternative
  - marker: b
    text: Literally 'one mile ... two,' with 'miles' understood in the second phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - if anyone
  - whoever it is that
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general case; 'whoever' is
    natural modern English and preserves the broad, representative force.
- source_word: ἀγγαρεύσει
  chosen: forces you to go
  alternatives:
  - compels you to go
  - presses you into service for
  lexicon: BDAG
  rationale: The verb refers to impressing someone into service, especially by official
    demand. 'Forces you to go' communicates the coercive sense clearly in modern English;
    'compels' is possible but slightly less natural. The motion component is supplied
    by context with the distance expression.
- source_word: μίλιον ἕν
  chosen: one mile
  alternatives:
  - a mile
  lexicon: BDAG
  rationale: μίλιον is a Roman mile. 'One mile' is a straightforward rendering of
    the numeral plus noun; it preserves the concrete distance without paraphrase.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go on
  - travel
  lexicon: BDAG
  rationale: Imperative of departure/proceeding. In this context, simple 'go' is idiomatic
    and sufficient in English.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: μετά with genitive denotes accompaniment. 'With him' is the most direct
    and natural rendering.
- source_word: δύο
  chosen: two
  alternatives:
  - two miles
  lexicon: BDAG
  rationale: The numeral is elliptical, with 'miles' understood from the previous
    phrase. Rendering simply 'two' preserves the Greek structure while remaining intelligible
    in English when paired with 'go with him two'; however idiomatic English requires
    supplying the unit in sense, so the full clause 'go with him two' is rendered
    as 'go with him two' conceptually in 'go with him two [miles].' In the final English
    text, 'two' stands for the second mile count without awkward literalism by attaching
    it to the whole phrase.
