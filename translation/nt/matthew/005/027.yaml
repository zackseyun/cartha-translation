id: MAT.5.27
reference: Matthew 5:27
source:
  edition: SBLGNT
  text: Ἠκούσατε ὅτι ἐρρέθη· Οὐ μοιχεύσεις.
translation:
  text: You have heard that it was said, ‘You shall not commit adultery.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You heard that it was said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκούσατε
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: BDAG
  rationale: Aorist indicative in this formulaic introduction is naturally rendered
    in idiomatic English as present perfect, reflecting what the audience has heard
    as received tradition. This preserves the discourse force better than a simple
    past while remaining close to the Greek.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what was heard; standard complementizer rendering.
- source_word: ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  lexicon: BDAG
  rationale: Aorist passive of λέγω in this construction is best rendered impersonally
    as 'it was said.' 'It was spoken' is more wooden and less natural in modern English.
- source_word: Οὐ
  chosen: not
  alternatives:
  - you shall not
  lexicon: BDAG
  rationale: Negative particle governing the following future indicative prohibition.
    In English the prohibition is carried by the full clause 'You shall not commit
    adultery.'
- source_word: μοιχεύσεις
  chosen: You shall not commit adultery
  alternatives:
  - Do not commit adultery
  - You shall not adulterate marriage
  lexicon: BDAG
  rationale: Future indicative used as a prohibition, echoing the Decalogue wording.
    'Commit adultery' is the standard and precise English equivalent for μοιχεύω here,
    and 'You shall not' preserves the legal-command form alluded to by Jesus.
