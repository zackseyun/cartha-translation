theological_decisions:
- issue: Relation to the Decalogue citation
  chosen_reading: 'Render the prohibition in traditional command form: ''You shall
    not commit adultery.'''
  alternative_readings:
  - Do not commit adultery
  rationale: Jesus is citing the commandment tradition, specifically the wording familiar
    from the Decalogue. Preserving the formal command style reflects the intertextual
    connection without adding interpretation.
