theological_decisions:
- issue: Whether to render γυνή as 'woman' or 'wife' in a saying about adultery
  chosen_reading: woman
  alternative_readings:
  - wife
  rationale: The verse is a general ethical statement, and the Greek does not explicitly
    mark marital status. Rendering 'woman' avoids narrowing the statement beyond the
    source text, while the adultery context still communicates the sexual-ethical
    gravity of the saying.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Whether to render ἐπιθυμέω with the traditional 'lust' language or the broader
    'desire'
  chosen_reading: desire
  alternative_readings:
  - lust after
  rationale: The Greek verb is semantically broader than 'lust,' though here it clearly
    denotes wrongful sexual desire. 'Desire' preserves lexical transparency to the
    source, and the context supplies the moral specificity. The traditional alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
