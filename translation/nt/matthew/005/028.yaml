  from: in order to desire
  to: to desire
  rationale: The phrase 'in order to desire' is semantically awkward in English. It
    creates a clunky, two-step logical progression (first look, then as a separate
    goal, desire) that is not the most natural reading. A simple infinitive of purpose
    ('to desire') is more idiomatic and fluid in English, as in 'looks at a woman
    to desire her,' while still accurately conveying the purposive sense of the Greek
    'πρὸς τὸ' + infinitive.
