id: MAT.5.28
reference: Matthew 5:28
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι πᾶς ὁ βλέπων γυναῖκα πρὸς τὸ ἐπιθυμῆσαι αὐτὴν ἤδη ἐμοίχευσεν
    αὐτὴν ἐν τῇ καρδίᾳ αὐτοῦ.
translation:
  text: But I say to you that everyone who looks at a woman in order to desire her
    has already committed adultery with her in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "everyone who looks at a woman to lust after her."'
    reason: lexical_alternative
  - marker: b
    text: Greek γυνή can mean either "woman" or "wife" depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'in order to desire'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  chosen: But I say to you
  alternatives:
  - But I tell you
  lexicon: BDAG
  rationale: Retains the emphatic contrast introduced by δέ and the direct first-person
    address. 'Say' is slightly more formal and closer to λέγω, while remaining natural
    English.
- source_word: πᾶς ὁ βλέπων
  chosen: everyone who looks
  alternatives:
  - whoever looks
  - every man who looks
  lexicon: BDAG
  rationale: The construction is generic and representative. 'Everyone who looks'
    conveys the universal force of πᾶς with readable modern English. 'Every man' would
    over-specify the masculine form beyond its generic function.
- source_word: γυναῖκα
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife' depending on context. Here the
    anarthrous singular in a general moral saying is best rendered 'a woman.' The
    adultery context may imply another man's wife, but the Greek expression itself
    does not explicitly say 'wife,' so the broader term is preferred in the main text.
- source_word: πρὸς τὸ ἐπιθυμῆσαι
  chosen: in order to desire
  alternatives:
  - with a view to lust after
  - so as to desire
  - to lust after
  lexicon: BDAG
  rationale: The preposition πρὸς with the articular infinitive expresses purpose
    or directed intent. 'In order to desire' preserves that purposive nuance better
    than a bare infinitive. 'Lust after' is a common idiomatic rendering, but 'desire'
    stays closer to ἐπιθυμέω while avoiding importing sexual nuance beyond what the
    context itself supplies.
- source_word: ἐπιθυμῆσαι αὐτὴν
  chosen: to desire her
  alternatives:
  - to lust after her
  lexicon: BDAG
  rationale: ἐπιθυμέω has a broader semantic range than exclusively sexual lust, but
    in this context it clearly refers to wrongful sexual desire. 'Desire her' preserves
    lexical breadth while the surrounding adultery language makes the sexual sense
    plain.
- source_word: ἤδη
  chosen: already
  alternatives:
  - even now
  lexicon: BDAG
  rationale: Marks the action as morally realized prior to any outward act. 'Already'
    is the most natural and precise English equivalent here.
- source_word: ἐμοίχευσεν
  chosen: has already committed adultery with
  alternatives:
  - has already adulterated
  - has already committed adultery against
  lexicon: BDAG
  rationale: μοιχεύω means 'commit adultery.' English idiom commonly takes 'with'
    in this construction, and this best reflects the transitive Greek with αὐτήν while
    remaining natural.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - in his inner self
  lexicon: BDAG
  rationale: καρδία in biblical usage denotes the inner person, including thought
    and desire. 'In his heart' is both literal and idiomatic, preserving the biblical
    anthropology of the phrase.
