id: MAT.5.32
reference: Matthew 5:32
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι ⸂πᾶς ὁ ἀπολύων⸃ τὴν γυναῖκα αὐτοῦ παρεκτὸς λόγου πορνείας
    ποιεῖ αὐτὴν ⸀μοιχευθῆναι, καὶ ὃς ἐὰν ἀπολελυμένην γαμήσῃ μοιχᾶται.
translation:
  text: But I say to you that everyone who divorces his wife, except on the ground
    of sexual immorality, makes her commit adultery; and whoever marries a divorced
    woman commits adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'makes her become an adulteress' (the Greek infinitive
      is passive in form).
    reason: lexical_alternative
  - marker: b
    text: '''Sexual immorality'' translates Greek porneia, a broad term for illicit
      sexual conduct; some render it ''fornication'' or ''unchastity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύων / ἀπολελυμένην
  chosen: divorces / divorced woman
  alternatives:
  - sends away / woman who has been sent away
  - releases / released woman
  lexicon: BDAG
  rationale: In marital context ἀπολύω commonly means to divorce rather than the more
    general 'send away' or 'release.' Rendering both participles with divorce language
    preserves the legal-marital sense in readable English.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' Here the possessive αὐτοῦ and
    the divorce context require 'wife.'
- source_word: παρεκτὸς λόγου πορνείας
  chosen: except on the ground of sexual immorality
  alternatives:
  - except for a matter of sexual immorality
  - except for fornication
  - except for unchastity
  lexicon: BDAG
  rationale: παρεκτός introduces an exception. λόγου here has the sense of 'matter/ground/case.'
    πορνεία is broader than adultery and is best rendered with the accessible umbrella
    term 'sexual immorality,' preserving the breadth of illicit sexual conduct without
    narrowing it to one act.
- source_word: ποιεῖ αὐτὴν μοιχευθῆναι
  chosen: makes her commit adultery
  alternatives:
  - causes her to be adulterated
  - makes her become an adulteress
  - causes adultery against her
  lexicon: BDAG
  rationale: The construction ποιέω + infinitive means 'cause/make someone do/become.'
    The aorist passive infinitive μοιχευθῆναι is difficult in English; 'makes her
    commit adultery' is the most natural rendering in context, though the passive
    nuance may also suggest 'causes her to become adulterous/an adulteress.' The main
    text uses idiomatic English, with the alternative preserved in a footnote.
- source_word: ὃς ἐὰν ... γαμήσῃ
  chosen: whoever marries
  alternatives:
  - if anyone marries
  lexicon: BDAG
  rationale: The relative clause with ἐάν expresses an indefinite general condition.
    'Whoever marries' is concise and natural in English.
- source_word: μοιχᾶται
  chosen: commits adultery
  alternatives:
  - is committing adultery
  - becomes an adulterer
  lexicon: BDAG
  rationale: The present middle/passive form is idiomatically rendered 'commits adultery.'
    English does not preserve the Greek voice distinction naturally here.
- source_word: πᾶς ὁ ἀπολύων
  chosen: everyone who divorces
  alternatives:
  - every man who divorces
  - whoever divorces
  lexicon: BDAG
  rationale: The masculine singular participial construction is generic. Per translation
    philosophy, the representative force is best conveyed by 'everyone who divorces,'
    while the male-specific social setting remains visible through 'his wife.'
