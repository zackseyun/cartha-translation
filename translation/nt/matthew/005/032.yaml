theological_decisions:
- issue: Meaning of the exception clause παρεκτὸς λόγου πορνείας
  chosen_reading: 'Render as a genuine exception: ''except on the ground of sexual
    immorality.'''
  alternative_readings:
  - except for a matter called sexual immorality
  - except in the case of unlawful marriage
  rationale: The Greek plainly presents an exception clause, so the translation should
    not obscure it. At the same time, the wording should not over-specify the exact
    scope of πορνεία beyond what the term itself states. This preserves theological
    tension among Christian interpretations of the 'exception clause' while translating
    the clause straightforwardly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of μοιχευθῆναι after ποιεῖ
  chosen_reading: Use idiomatic English 'makes her commit adultery' in the main text,
    while preserving the more literal passive-oriented alternative in a footnote.
  alternative_readings:
  - makes her become an adulteress
  - causes her to be adulterated
  rationale: The Greek infinitive is passive in form, and interpreters debate whether
    the sense is active ('commit adultery') or resultative ('become adulterous/an
    adulteress'). The main text favors clear English, but the alternative is worth
    preserving for auditability and to avoid over-resolving the nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
