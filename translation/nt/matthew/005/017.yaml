id: MAT.5.17
reference: Matthew 5:17
source:
  edition: SBLGNT
  text: Μὴ νομίσητε ὅτι ἦλθον καταλῦσαι τὸν νόμον ἢ τοὺς προφήτας· οὐκ ἦλθον καταλῦσαι
    ἀλλὰ πληρῶσαι·
translation:
  text: Do not think that I came to abolish the Law or the Prophets; I did not come
    to abolish them but to fulfill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have come' in both occurrences of 'I came.'
    reason: lexical_alternative
  - marker: b
    text: '''Fulfill'' may also be understood as ''bring to completion'' or ''bring
      to full expression.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ νομίσητε
  chosen: Do not think
  alternatives:
  - Do not suppose
  - Do not imagine
  lexicon: BDAG
  rationale: Aorist subjunctive with μή functions as a prohibition. 'Do not think'
    is idiomatic, direct, and preserves the force without sounding overly formal.
- source_word: ἦλθον
  chosen: I came
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: The aorist is naturally rendered in English here as 'I came,' especially
    in parallel with the repeated clause. 'I have come' is possible and common in
    English translations, but 'I came' better reflects the simple aorist form while
    remaining natural.
- source_word: καταλῦσαι
  chosen: to abolish
  alternatives:
  - to destroy
  - to annul
  - to dismantle
  lexicon: BDAG
  rationale: In this context, with 'the Law or the Prophets,' the sense is not physical
    destruction but setting aside, nullifying, or bringing to an end. 'Abolish' best
    captures that legal-covenantal force in clear modern English.
- source_word: τὸν νόμον
  chosen: the Law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: Capitalized 'Law' signals the Torah/Mosaic Law as a recognized scriptural
    corpus rather than law in a generic sense. This matches the paired expression
    'the Law or the Prophets' as a reference to Israel's Scriptures.
- source_word: τοὺς προφήτας
  chosen: the Prophets
  alternatives:
  - the prophets
  lexicon: BDAG
  rationale: Capitalized 'Prophets' reflects the likely canonical/scriptural sense
    in the expression 'the Law or the Prophets,' not merely prophetic individuals
    in general.
- source_word: ἀλλὰ πληρῶσαι
  chosen: but to fulfill them
  alternatives:
  - but to fulfill
  - but to bring them to fulfillment
  - but to complete them
  lexicon: BDAG
  rationale: πληρόω here carries the sense of bringing to full expression or intended
    completion. 'Fulfill' preserves the theological and intertextual weight of the
    term and is the most established English equivalent. 'Them' is supplied in English
    for clarity, referring back to 'the Law or the Prophets.'
