theological_decisions:
- issue: Meaning of Jesus' relation to 'the Law or the Prophets' in πληρῶσαι
  chosen_reading: retain 'fulfill' without narrowing it to a single theological explanation
  alternative_readings:
  - bring to completion
  - bring to full expression
  - confirm/establish
  rationale: The verse is theologically significant and interpretations vary across
    traditions. In keeping with the doctrine's instruction to preserve theological
    tension rather than resolve it, the translation keeps the broader term 'fulfill'
    and does not encode one doctrinal explanation into the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
