id: MAT.5.3
reference: Matthew 5:3
source:
  edition: SBLGNT
  text: Μακάριοι οἱ πτωχοὶ τῷ πνεύματι, ὅτι αὐτῶν ἐστιν ἡ βασιλεία τῶν οὐρανῶν.
translation:
  text: Blessed are the poor in spirit, because the kingdom of heaven is theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy' or 'flourishing'; the Greek denotes an enviable state of divine
      favor, not merely a feeling of happiness.
    reason: lexical_alternative
  - marker: b
    text: '''Poor in spirit'' may also be understood as ''spiritually poor'' or ''those
      who recognize their spiritual need.'' The translation keeps the Greek expression
      without narrowing it.'
    reason: alternative_reading
  - marker: c
    text: Greek 'kingdom of the heavens,' a characteristic Matthean expression conventionally
      rendered 'kingdom of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  - Flourishing
  lexicon: BDAG
  rationale: '''Blessed'' is the established and still accurate rendering for μακάριος
    in beatitude contexts, conveying divine favor and enviable status without reducing
    the term to mere emotion. Alternatives like ''happy'' are too subjective, while
    ''flourishing'' is interpretive.'
- source_word: πτωχοὶ
  chosen: the poor
  alternatives:
  - poor ones
  - beggars
  lexicon: BDAG
  rationale: πτωχός denotes poverty and destitution. 'The poor' is natural English
    and preserves the substantive adjectival force with the article οἱ. 'Beggars'
    is too narrow and overly concrete here.
- source_word: τῷ πνεύματι
  chosen: in spirit
  alternatives:
  - in the spirit
  - with respect to spirit
  - spiritually
  lexicon: BDAG
  rationale: The dative is best rendered idiomatically as 'in spirit,' preserving
    the compact Greek expression and its interpretive openness. 'Spiritually' risks
    over-paraphrase, and 'in the spirit' could suggest the Holy Spirit specifically,
    which the text does not state.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the blessing. 'Because' is clear modern
    English; 'for' is possible but more formal/archaic in this context.
- source_word: αὐτῶν
  chosen: theirs
  alternatives:
  - belongs to them
  - is for them
  lexicon: BDAG
  rationale: Using the possessive predicate 'theirs' naturally conveys the genitive
    with ἐστιν in English while preserving the emphatic sense that the kingdom belongs
    to this group.
- source_word: ἡ βασιλεία
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingship
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard and most comprehensible rendering. While
    βασιλεία can denote reign or royal rule, ''kingdom'' best preserves both realm
    and rule dimensions in this Matthean formula.'
- source_word: τῶν οὐρανῶν
  chosen: of heaven
  alternatives:
  - of the heavens
  lexicon: BDAG
  rationale: Matthew's characteristic expression is traditionally and accurately rendered
    'of heaven.' Although the Greek is plural, idiomatic English uses the singular
    collective 'heaven' here; 'of the heavens' is overly literal and unnatural.
