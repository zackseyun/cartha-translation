theological_decisions:
- issue: Meaning of 'poor in spirit'
  chosen_reading: Retain the literal phrase 'poor in spirit' without interpretive
    expansion.
  alternative_readings:
  - spiritually poor
  - those who are humble
  - those who know their spiritual need
  rationale: The phrase is theologically rich and somewhat open-textured. Expanding
    it in the main text would resolve interpretive questions the Greek leaves implicit.
    Preserving the literal wording best fits the project's commitment to maintain
    theological tension where the source permits.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Present tense of kingdom possession
  chosen_reading: 'Render ἐστιν as present: ''is theirs.'''
  alternative_readings:
  - will be theirs
  - belongs to them
  rationale: The Greek uses the present tense, and the beatitude's force includes
    present possession, not merely future reward. This should not be shifted to a
    future tense in translation.
