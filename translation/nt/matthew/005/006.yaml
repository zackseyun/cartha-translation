theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt lists δικαιοσύνη with default English 'righteousness'
    and notes that 'justice' should be preserved in footnotes where relevant. In this
    beatitude, the term can encompass both personal rectitude and covenantal/social
    rightness; the main text keeps the default while the footnote preserves the broader
    alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative
    justice preserved in footnotes'
