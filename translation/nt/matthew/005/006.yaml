id: MAT.5.6
reference: Matthew 5:6
source:
  edition: SBLGNT
  text: μακάριοι οἱ πεινῶντες καὶ διψῶντες τὴν δικαιοσύνην, ὅτι αὐτοὶ χορτασθήσονται.
translation:
  text: Blessed are those who hunger and thirst for righteousness, because they will
    be filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for justice." The Greek word can denote righteousness, justice, or what
      is right before God.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - flourishing
  - happy
  lexicon: BDAG
  rationale: Standard beatitude term; 'Blessed' preserves the declarative, covenantal-religious
    sense better than the more psychological 'happy,' while remaining idiomatic in
    English.
- source_word: οἱ πεινῶντες καὶ διψῶντες
  chosen: those who hunger and thirst
  alternatives:
  - the ones hungering and thirsting
  - those who are hungry and thirsty
  lexicon: BDAG
  rationale: The present active participles depict ongoing desire rather than a one-time
    state. 'Those who hunger and thirst' preserves the verbal force naturally in English.
- source_word: τὴν δικαιοσύνην
  chosen: for righteousness
  alternatives:
  - for justice
  - for the righteousness
  lexicon: BDAG
  rationale: δικαιοσύνη is a contested theological term; per doctrine defaults, 'righteousness'
    is used in the main text. The accusative after verbs of hunger/thirst is idiomatically
    rendered in English with 'for.' 'Justice' is a viable contextual alternative and
    is preserved in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the blessing. 'Because' is clear modern English
    and fits the explanatory force of the clause.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek. English can convey this adequately
    with normal subject position here; an explicitly emphatic rendering ('they themselves')
    would sound heavy in this beatitude context.
- source_word: χορτασθήσονται
  chosen: will be filled
  alternatives:
  - will be satisfied
  lexicon: BDAG
  rationale: Future passive of χορτάζω conveys being filled or satisfied, originally
    of feeding to fullness. 'Will be filled' preserves the hunger/thirst imagery more
    directly than 'will be satisfied,' while remaining natural English.
