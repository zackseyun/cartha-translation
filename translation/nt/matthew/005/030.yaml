  category: awkward_english
  tier: 1
  from: throw it away from you
  to: throw it away
  rationale: The Greek 'βάλε ἀπὸ σοῦ' means 'throw from you.' The English phrasal verb 'throw away' idiomatically captures the full sense of disposal and repudiation. Adding 'from you' after 'throw it away' is slightly redundant in English and makes the phrasing less concise. 'Throw it away' is more natural while still conveying the force of the command. This would also maintain consistency with the parallel in v. 29.
