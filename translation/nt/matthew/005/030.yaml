theological_decisions:
- issue: Rendering of γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The Greek term is γέεννα, rooted in the Valley of Hinnom imagery and Second Temple/Jewish judgment language. Rendering it as 'Gehenna' preserves the source-text term and avoids collapsing it into all later doctrinal associations of the English word 'hell.' The alternative 'hell' is preserved in a footnote because many readers will recognize it and because it remains a plausible contextual gloss.
  doctrine_reference: Translation philosophy §1, §6
