id: MAT.5.30
reference: Matthew 5:30
source:
  edition: SBLGNT
  text: καὶ εἰ ἡ δεξιά σου χεὶρ σκανδαλίζει σε, ἔκκοψον αὐτὴν καὶ βάλε ἀπὸ σοῦ, συμφέρει γάρ σοι ἵνα ἀπόληται ἓν τῶν μελῶν σου καὶ μὴ ὅλον τὸ σῶμά σου ⸂εἰς γέενναν ἀπέλθῃ⸃.
translation:
  text: And if your right hand causes you to stumble, cut it off and throw it away. For it is better for you that one of your members should perish than that your whole body should go into Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hell.' Greek 'Gehenna,' a term drawn from the Valley of Hinnom and used for eschatological judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'causes you to sin.' The Greek verb literally means 'causes to stumble.'
    reason: lexical_alternative
  - marker: c
    text: Or 'throw it away from you'.
    reason: previous_rendering
lexical_decisions:
- source_word: δεξιά ... χείρ
  chosen: your right hand
  alternatives:
  - your right-side hand
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the adjective-noun phrase; 'right hand' is natural English and preserves the bodily specificity and rhetorical parallel with the previous verse.
- source_word: σκανδαλίζει
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - is a snare to you
  - offends you
  lexicon: BDAG
  rationale: The verb literally conveys causing someone to stumble or fall into sin. 'Causes you to stumble' preserves the metaphor and avoids prematurely flattening it to the interpretive gloss 'causes you to sin,' while still being understandable in modern English.
- source_word: ἔκκοψον
  chosen: cut it off
  alternatives:
  - cut it out
  - sever it
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action. 'Cut it off' is the most direct and idiomatic rendering for a hand.
- source_word: βάλε ἀπὸ σοῦ
  chosen: throw it away from you
  alternatives:
  - cast it from you
  - throw it from you
  lexicon: BDAG
  rationale: βάλε is forceful; 'throw it away from you' communicates both removal and repudiation in natural English. 'Cast' is more traditional but less contemporary.
- source_word: συμφέρει γάρ σοι
  chosen: For it is better for you
  alternatives:
  - For it is profitable for you
  - For it benefits you
  lexicon: BDAG
  rationale: In context the sense is comparative advantage, not financial profit. 'It is better for you' is idiomatic and fits the solemn warning.
- source_word: ἵνα ἀπόληται
  chosen: that ... should perish
  alternatives:
  - that ... be destroyed
  - that ... be lost
  lexicon: BDAG
  rationale: The verb ἀπόλλυμι here refers to the loss/destruction of the body part. 'Should perish' preserves the gravity and matches the contrast with the whole body going into Gehenna.
- source_word: ἓν τῶν μελῶν σου
  chosen: one of your members
  alternatives:
  - one of your limbs
  - one part of your body
  lexicon: BDAG
  rationale: μέλος means bodily member/part. 'Members' is slightly more formal but preserves the lexical link to the Greek and the bodily imagery. 'Limbs' would be too narrow, since a member need not be only a limb.
- source_word: ὅλον τὸ σῶμά σου
  chosen: your whole body
  alternatives:
  - all your body
  lexicon: BDAG
  rationale: Natural English rendering preserving the totality contrast with 'one of your members.'
- source_word: εἰς γέενναν ἀπέλθῃ
  chosen: should go into Gehenna
  alternatives:
  - be thrown into hell
  - go into hell
  lexicon: BDAG
  rationale: γέεννα is best rendered 'Gehenna' to preserve the historically and theologically loaded term rather than importing later English associations of 'hell' without qualification. 'Go into' reflects ἀπέλθῃ with εἰς more closely than 'be thrown into,' which would import a different verbal idea.
