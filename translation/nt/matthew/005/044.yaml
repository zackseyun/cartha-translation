id: MAT.5.44
reference: Matthew 5:44
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν, ἀγαπᾶτε τοὺς ἐχθροὺς ⸀ὑμῶν καὶ προσεύχεσθε ὑπὲρ ⸀τῶν διωκόντων
    ὑμᾶς·
translation:
  text: But I say to you, love your enemies and pray for those who persecute you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pray on behalf of those who persecute you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  chosen: But I say to you
  alternatives:
  - But I tell you
  - Yet I say to you
  lexicon: BDAG
  rationale: Retains the emphatic contrast introduced by δέ in the Sermon on the Mount
    antitheses while using natural modern English. 'Say' is slightly more formal and
    closer to λέγω than 'tell.'
- source_word: ἀγαπᾶτε
  chosen: love
  alternatives:
  - keep loving
  lexicon: BDAG
  rationale: Imperative of ἀγαπάω is best rendered with the standard gloss 'love,'
    matching the project's default for ἀγάπη cognates. Although the present imperative
    can sometimes suggest ongoing action, English imperative 'love' adequately conveys
    the command without overtranslating aspect.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  chosen: your enemies
  alternatives:
  - those who are your enemies
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the accusative phrase. 'Enemies' preserves
    the relational hostility inherent in ἐχθρός without softening it.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Standard rendering of προσεύχομαι. The middle/passive form is deponent
    in meaning; simple active English 'pray' is appropriate. The imperative force
    is preserved without awkwardness.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  lexicon: BDAG
  rationale: In this context ὑπέρ with the genitive most naturally means praying in
    someone's behalf or for their good. 'For' is idiomatic and sufficiently precise;
    'on behalf of' is more explicit but less natural in the main text.
- source_word: τῶν διωκόντων ὑμᾶς
  chosen: those who persecute you
  alternatives:
  - those who are persecuting you
  - your persecutors
  lexicon: BDAG
  rationale: The substantival present participle is well represented by 'those who
    persecute you.' This preserves the verbal sense of ongoing hostile action better
    than the noun 'persecutors,' while remaining natural English.
