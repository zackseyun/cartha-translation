theological_decisions:
- issue: Scope of the command toward enemies
  chosen_reading: Translate both imperatives straightforwardly without importing later
    interpretive expansions such as emotional affection, nonresistance in every circumstance,
    or prayer specifically for conversion.
  alternative_readings:
  - Render 'love' in a way that implies chiefly benevolent action
  - Expand 'pray for' to specify prayer for blessing or repentance
  rationale: The verse commands love for enemies and prayer for persecutors, but does
    not itself define all practical implications. The translation preserves the ethical
    force while avoiding doctrinal or interpretive additions not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
