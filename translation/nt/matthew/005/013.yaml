id: MAT.5.13
reference: Matthew 5:13
source:
  edition: SBLGNT
  text: Ὑμεῖς ἐστε τὸ ἅλας τῆς γῆς· ἐὰν δὲ τὸ ἅλας μωρανθῇ, ἐν τίνι ἁλισθήσεται; εἰς
    οὐδὲν ἰσχύει ἔτι εἰ μὴ ⸂βληθὲν ἔξω⸃ καταπατεῖσθαι ὑπὸ τῶν ἀνθρώπων.
translation:
  text: You are the salt of the earth. But if the salt becomes tasteless, with what
    will it be made salty? It is no longer good for anything except to be thrown outside
    and trampled underfoot by men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by people'; Greek 'by men' uses a masculine form with a general human
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can convey this adequately
    with sentence-initial 'You' without adding awkward emphasis; 'you yourselves'
    is possible but heavier than the context requires.
- source_word: τὸ ἅλας τῆς γῆς
  chosen: the salt of the earth
  alternatives:
  - the salt of the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'land,' or 'ground.' Here the idiomatic and contextually
    natural sense is 'earth,' matching the broad scope of the metaphor in the Sermon
    on the Mount.
- source_word: μωρανθῇ
  chosen: becomes tasteless
  alternatives:
  - loses its saltiness
  - becomes foolish
  lexicon: BDAG
  rationale: Although the verb is cognate with 'foolish,' in relation to salt it refers
    to becoming insipid or tasteless. 'Becomes tasteless' is a direct, natural rendering
    that preserves the metaphor's force without importing the unrelated sense 'becomes
    foolish.'
- source_word: ἐν τίνι ἁλισθήσεται;
  chosen: with what will it be made salty?
  alternatives:
  - how will its saltiness be restored?
  - by what will it be salted?
  lexicon: BDAG
  rationale: The future passive asks by what means the salt could be salted again.
    'With what will it be made salty?' is clear modern English and stays close to
    the Greek structure.
- source_word: εἰς οὐδὲν ἰσχύει ἔτι
  chosen: It is no longer good for anything
  alternatives:
  - It is no longer strong for anything
  - It is no longer useful for anything
  lexicon: BDAG
  rationale: ἰσχύω here carries the sense of being valid, useful, or effective. 'Good
    for anything' is idiomatic English that captures practical uselessness in context.
- source_word: εἰ μὴ βληθὲν ἔξω
  chosen: except to be thrown outside
  alternatives:
  - except to be thrown out
  lexicon: BDAG
  rationale: The participle plus adverb literally means 'except, having been thrown
    outside.' 'Thrown outside' preserves the spatial force of ἔξω more explicitly
    than the idiom 'thrown out,' though both are viable.
- source_word: καταπατεῖσθαι
  chosen: trampled underfoot
  alternatives:
  - trampled on
  lexicon: BDAG
  rationale: The verb means to tread down or trample. 'Underfoot' brings out the vividness
    of the image and is a standard natural equivalent.
- source_word: ὑπὸ τῶν ἀνθρώπων
  chosen: by men
  alternatives:
  - by people
  - by human beings
  lexicon: BDAG
  rationale: ἀνθρώπων denotes humans in general. Because the Greek is grammatically
    masculine with representative force, 'men' best reflects the source under the
    project's gender-accurate policy, while the inclusive sense can be preserved in
    a footnote.
