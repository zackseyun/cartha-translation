theological_decisions:
- issue: Representative masculine in ὑπὸ τῶν ἀνθρώπων
  chosen_reading: by men
  alternative_readings:
  - by people
  - by human beings
  rationale: The phrase refers generically to human beings, not specifically to males.
    Per the doctrine's gender-accurate policy, the masculine form is retained in the
    main text where it carries representative force, with inclusivity clarified in
    a footnote rather than neutralized in the translation.
