  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file sets 'righteousness' as the default rendering for δικαιοσύνη,
    with alternatives preserved in footnotes where relevant. Here the beatitude most
    naturally refers to persecution suffered on account of living in alignment with
    God's righteous will, though 'justice' remains a meaningful alternative nuance.
