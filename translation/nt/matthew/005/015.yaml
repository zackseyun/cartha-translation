id: MAT.5.15
reference: Matthew 5:15
source:
  edition: SBLGNT
  text: οὐδὲ καίουσιν λύχνον καὶ τιθέασιν αὐτὸν ὑπὸ τὸν μόδιον ἀλλ’ ἐπὶ τὴν λυχνίαν,
    καὶ λάμπει πᾶσιν τοῖς ἐν τῇ οἰκίᾳ.
translation:
  text: Nor do people light a lamp and put it under a basket, but on a lampstand,
    and it gives light to everyone in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under a measuring basket'; traditionally 'under a bushel.' The Greek
      μόδιος refers to a dry measure and, by extension, its container.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it shines for everyone in the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  chosen: Nor do
  alternatives:
  - Neither do
  - And neither do
  lexicon: BDAG
  rationale: Introduces a further negative example linked to the preceding saying.
    'Nor do' is natural English and preserves the connective force without sounding
    wooden.
- source_word: καίουσιν
  chosen: light
  alternatives:
  - burn
  - kindle
  lexicon: BDAG
  rationale: In context with λύχνον, the idiomatic English expression is 'light a
    lamp.' 'Burn' would be less natural, and 'kindle' is more formal/archaic.
- source_word: λύχνον
  chosen: a lamp
  alternatives:
  - a light
  lexicon: BDAG
  rationale: λύχνος denotes an oil lamp, not light in the abstract. 'Lamp' preserves
    the concrete image used in Jesus's illustration.
- source_word: τιθέασιν
  chosen: put
  alternatives:
  - place
  - set
  lexicon: BDAG
  rationale: A simple present-tense verb fits the straightforward action described.
    'Put' is the most natural modern English equivalent.
- source_word: ὑπὸ τὸν μόδιον
  chosen: under a basket
  alternatives:
  - under the measuring basket
  - under a bushel basket
  - under the bushel
  lexicon: BDAG
  rationale: μόδιος is a dry measure and by extension the measuring container itself.
    'Basket' communicates the object clearly in modern English. The more literal 'measuring
    basket' is possible but clunky; traditional 'bushel' is less accessible. The article
    is rendered idiomatically as indefinite in English.
- source_word: ἀλλ’ ἐπὶ τὴν λυχνίαν
  chosen: but on a lampstand
  alternatives:
  - but on the lampstand
  lexicon: BDAG
  rationale: λυχνία refers to a stand for a lamp. English idiom prefers the indefinite
    article here for a general proverbial statement, even though Greek has the article.
- source_word: λάμπει
  chosen: it gives light
  alternatives:
  - it shines
  lexicon: BDAG
  rationale: While λάμπω literally means 'shine,' the sense here is the lamp's function
    for others in the house. 'Gives light' expresses the result naturally in English
    and fits the dative πᾶσιν.
- source_word: πᾶσιν τοῖς ἐν τῇ οἰκίᾳ
  chosen: to everyone in the house
  alternatives:
  - to all those in the house
  - to everyone in the household
  lexicon: BDAG
  rationale: The phrase refers to all persons present within the house. 'Everyone
    in the house' is clear, natural, and preserves the universal scope of πᾶσιν.
- source_word: οἰκίᾳ
  chosen: house
  alternatives:
  - household
  lexicon: BDAG
  rationale: Here the emphasis is spatial ('in the house') rather than primarily relational
    ('household'), so 'house' best matches the image.
