theological_decisions:
- issue: Generic third-person plural subject not explicitly stated in Greek
  chosen_reading: Nor do people light a lamp...
  alternative_readings:
  - Nor does anyone light a lamp...
  - Neither do they light a lamp...
  rationale: Greek uses an indefinite/generic plural verb without an explicit subject.
    Supplying 'people' in English communicates the proverbial generality better than
    the ambiguous 'they' and avoids an overly singular recasting.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy)
