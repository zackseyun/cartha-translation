theological_decisions:
- issue: Gendered filial language
  chosen_reading: sons of your Father
  alternative_readings:
  - children of your Father
  rationale: The verse uses υἱοὶ, not τέκνα. Following the doctrine's gender-accurate
    principle, the masculine filial term is retained in the main text. In context
    it has representative force for disciples generally, but the translation should
    not erase the sonship wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of γένησθε in relation to divine sonship
  chosen_reading: may become
  alternative_readings:
  - may be
  - may prove to be
  rationale: 'The wording should preserve the Greek verbal force without importing
    a doctrinal claim that human action creates adoption status before God. In context
    Jesus speaks ethically: disciples act in a way that reflects and manifests their
    identity in relation to the Father. ''Become'' keeps the lexical sense while the
    rationale documents that no soteriological mechanism is being asserted beyond
    the text.'
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
