id: MAT.5.45
reference: Matthew 5:45
source:
  edition: SBLGNT
  text: ὅπως γένησθε υἱοὶ τοῦ πατρὸς ὑμῶν τοῦ ⸀ἐν οὐρανοῖς, ὅτι τὸν ἥλιον αὐτοῦ ἀνατέλλει
    ἐπὶ πονηροὺς καὶ ἀγαθοὺς καὶ βρέχει ἐπὶ δικαίους καὶ ἀδίκους.
translation:
  text: so that you may become sons of your Father in heaven, because he makes his
    sun rise on evil and good, and sends rain on righteous and unrighteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''children of your Father.'' Greek: ''sons,'' which is retained in the
      main text to preserve the filial wording of the source.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in the heavens'; rendered 'in heaven' as idiomatic English for this
      Matthean expression.
    reason: lexical_alternative
  - marker: c
    text: Or 'he rains on righteous and unrighteous.' The main text uses 'sends rain'
      for natural English while preserving God's agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force.
- source_word: γένησθε
  chosen: you may become
  alternatives:
  - you may be
  - you may prove to be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι commonly means 'become' or 'come
    to be.' 'Become' best preserves the verbal force without flattening it into a
    static 'be.' In context it expresses entering into or showing the character of
    sons by imitation of the Father's generosity, not ontological adoption mechanics.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and evokes sonship language.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
    'Children' is possible in sense but would mute the source wording and its representative
    force.
- source_word: τοῦ πατρὸς ὑμῶν
  chosen: of your Father
  alternatives:
  - of your heavenly Father
  lexicon: BDAG
  rationale: Directly renders the genitive phrase. 'Heavenly' is deferred because
    the Greek separately says 'the one in heaven/in the heavens,' which is better
    represented explicitly rather than absorbed into an adjective here.
- source_word: τοῦ ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Although οὐρανοῖς is plural in Greek, idiomatic English normally uses
    singular 'heaven' in this expression. This preserves meaning in readable English
    while reflecting the standard Matthean circumlocution for God's heavenly dwelling.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding exhortation. 'Because'
    is clearer in contemporary English than 'for.'
- source_word: τὸν ἥλιον αὐτοῦ
  chosen: his sun
  alternatives:
  - the sun
  lexicon: BDAG
  rationale: The possessive pronoun αὐτοῦ is explicit and should be retained. 'His
    sun' highlights divine ownership and providential control.
- source_word: ἀνατέλλει
  chosen: makes ... rise
  alternatives:
  - causes ... to rise
  - raises
  lexicon: BDAG
  rationale: 'With ''sun'' as object, the verb is naturally rendered causatively in
    English: God ''makes his sun rise.'' This is idiomatic and preserves divine agency.'
- source_word: ἐπὶ πονηροὺς καὶ ἀγαθοὺς
  chosen: on evil and good
  alternatives:
  - on the evil and the good
  - upon evil people and good people
  lexicon: BDAG
  rationale: The adjectives function substantivally. English can mirror this concisely
    with 'evil and good.' The absence of explicit nouns keeps the aphoristic balance
    of the Greek.
- source_word: βρέχει
  chosen: sends rain
  alternatives:
  - rains
  lexicon: BDAG
  rationale: Although the verb literally means 'rains,' English more naturally expresses
    God's agency as 'sends rain.' This avoids the awkwardness of 'he rains on' while
    preserving the sense.
- source_word: ἐπὶ δικαίους καὶ ἀδίκους
  chosen: on righteous and unrighteous
  alternatives:
  - on the righteous and the unrighteous
  - on just and unjust
  lexicon: BDAG
  rationale: δικαίους/ἀδίκους are best rendered with the established moral pair 'righteous
    and unrighteous.' 'Just and unjust' is possible but less consistent with common
    biblical diction for δίκαιος/ἄδικος.
