theological_decisions:
- issue: Nature of the prohibition on oath-taking
  chosen_reading: Render the saying as a direct prohibition against swearing by one's
    head, without expanding it into an absolute doctrinal statement about all lawful
    oaths.
  alternative_readings:
  - Interpret as banning every form of oath in all contexts
  - Interpret as condemning only manipulative or evasive oath formulas
  rationale: The verse itself specifically addresses swearing by one's head and grounds
    the prohibition in human inability and creaturely limitation. The translation
    should preserve Jesus' wording and not resolve broader theological debates beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
