id: MAT.5.36
reference: Matthew 5:36
source:
  edition: SBLGNT
  text: μήτε ἐν τῇ κεφαλῇ σου ὀμόσῃς, ὅτι οὐ δύνασαι μίαν τρίχα λευκὴν ⸂ποιῆσαι ἢ
    μέλαιναν⸃.
translation:
  text: Nor shall you swear by your head, because you are not able to make one hair
    white or black.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you cannot make a single hair white or black.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτε
  chosen: Nor
  alternatives:
  - And do not
  - Neither
  lexicon: BDAG
  rationale: Continues the preceding prohibitions in a coordinated negative series;
    'Nor' naturally carries the sense in English without unnecessary repetition.
- source_word: ἐν τῇ κεφαλῇ σου
  chosen: by your head
  alternatives:
  - on your head
  - with your head
  lexicon: BDAG
  rationale: With ὀμόσῃς, ἐν here expresses the object/instrument of oath-taking idiomatically
    rendered in English as 'swear by.' 'Your head' is the thing invoked in the oath.
- source_word: ὀμόσῃς
  chosen: shall you swear
  alternatives:
  - swear
  - take an oath
  lexicon: BDAG
  rationale: Aorist subjunctive in prohibition after μήτε; 'shall you swear' fits
    the formal, prohibitory tone while remaining readable. 'Take an oath' is possible
    but less direct than the Greek verb.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the prohibition. 'Because' is clear modern
    English and preserves the causal force.
- source_word: οὐ δύνασαι
  chosen: you are not able to
  alternatives:
  - you cannot
  - you have no power to
  lexicon: BDAG
  rationale: Makes explicit the incapacity emphasized in the Greek. 'Cannot' is slightly
    smoother, but 'are not able to' more transparently reflects δύνασαι.
- source_word: μίαν τρίχα
  chosen: one hair
  alternatives:
  - a single hair
  lexicon: BDAG
  rationale: Straightforward rendering of the singular phrase. 'One hair' is natural
    and preserves the emphasis on even the smallest unit.
- source_word: λευκὴν ... ἢ μέλαιναν
  chosen: white or black
  alternatives:
  - white or dark
  - gray or black
  lexicon: BDAG
  rationale: These are the basic color terms in the text. 'White or black' preserves
    the stark contrast without interpretive softening.
- source_word: ποιῆσαι
  chosen: make
  alternatives:
  - cause to become
  - turn
  lexicon: BDAG
  rationale: ποιέω here means to cause or make something be a certain way. 'Make'
    is concise and idiomatic with the predicate adjectives 'white or black.'
