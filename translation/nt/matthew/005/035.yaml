theological_decisions:
- issue: Referent of 'his' in 'the footstool of his feet'
  chosen_reading: Lowercase 'his,' allowing the immediate referent to remain implicit
    while context points to God.
  alternative_readings:
  - Capitalize 'His' to make the divine referent explicit
  rationale: The Greek pronoun αὐτοῦ does not itself mark capitalization. English
    lowercase preserves transparency to the source while the context clearly indicates
    God as the referent from the preceding clause and scriptural allusion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T02:59:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/005/035.json
  category: awkward_english
  tier: 1
  from: toward Jerusalem
  to: by Jerusalem
  rationale: The rendering 'toward Jerusalem' is an overly literal translation of
    the preposition 'εἰς'. While the drafter's intent to distinguish it from 'ἐν'
    is understandable, the result is an awkward English phrase that is not a natural
    oath formula. 'Swearing toward' a place is not a standard idiom and obscures the
    meaning. In this context, 'εἰς' is widely understood by commentators and translators
    to function idiomatically as a substitute for 'ἐν' or 'κατά' in an oath, meaning
    'by'. The consensus rendering in major English translations ('by Jerusalem') is
    clearer, more natural, and better fits the parallel structure of the prohibitions.
    The nuance of the specific preposition used in Greek is better suited for the
    existing footnote.
