id: MAT.5.35
reference: Matthew 5:35
source:
  edition: SBLGNT
  text: μήτε ἐν τῇ γῇ, ὅτι ὑποπόδιόν ἐστιν τῶν ποδῶν αὐτοῦ· μήτε εἰς Ἱεροσόλυμα, ὅτι
    πόλις ἐστὶν τοῦ μεγάλου βασιλέως·
translation:
  text: nor by the earth, because it is the footstool of his feet; nor by Jerusalem,
    because it is the city of the great King;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Jerusalem.' The Greek uses 'toward/into Jerusalem' (εἰς Ἱεροσόλυμα),
      which may function idiomatically in oath language.
    reason: lexical_alternative
  - marker: b
    text: 'An allusion to Isaiah 66:1: ''the earth is the footstool of my feet.'''
    reason: cross_reference
  - marker: c
    text: An allusion to Psalm 48:2, where Jerusalem is called 'the city of the great
      King.'
    reason: cross_reference
  - marker: d
    text: Or 'toward Jerusalem'.
    reason: previous_rendering
lexical_decisions:
- source_word: μήτε
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: In this coordinated prohibition, μήτε continues the series from the previous
    verse and is best rendered 'nor' in natural English.
- source_word: ἐν τῇ γῇ
  chosen: by the earth
  alternatives:
  - in the earth
  - on the earth
  lexicon: BDAG
  rationale: Although ἐν commonly means 'in,' in oath formulas here it carries the
    sense of swearing by something. English 'by the earth' best reflects the idiom
    in context and matches the parallel structure with the surrounding prohibitions.
- source_word: γῇ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In contrast with heaven and Jerusalem in the surrounding context, γῆ
    refers to the earth/world rather than a particular land.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the prohibition. 'Because' is slightly
    clearer in modern English than 'for' while preserving the causal force.
- source_word: ὑποπόδιόν
  chosen: footstool
  alternatives:
  - stool for the feet
  lexicon: BDAG
  rationale: Standard and precise rendering of ὑποπόδιον; it also preserves the allusive
    connection to scriptural language about God's sovereignty.
- source_word: τῶν ποδῶν αὐτοῦ
  chosen: of his feet
  alternatives:
  - for his feet
  lexicon: BDAG
  rationale: The genitive construction is formally represented by 'of his feet.' Though
    'for his feet' is smoother idiomatic English, 'of his feet' preserves the Greek
    expression and familiar biblical cadence without obscuring meaning.
- source_word: εἰς Ἱεροσόλυμα
  chosen: toward Jerusalem
  alternatives:
  - by Jerusalem
  - to Jerusalem
  lexicon: BDAG
  rationale: The preposition shifts from ἐν to εἰς. In oath language, a strictly literal
    'to Jerusalem' sounds misleading in English, while 'by Jerusalem' would flatten
    the Greek distinction. 'Toward Jerusalem' preserves the directional force of εἰς
    while fitting the prohibition context.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  alternatives:
  - Hierosolyma
  lexicon: BDAG
  rationale: Personal and place names are transliterated by standard English convention.
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: The straightforward sense is intended; 'city' is the natural equivalent.
- source_word: τοῦ μεγάλου βασιλέως
  chosen: of the great King
  alternatives:
  - belonging to the great King
  lexicon: BDAG
  rationale: The genitive is possessive/descriptive. 'The great King' preserves the
    elevated scriptural register and likely allusion to Psalm 48:2.
