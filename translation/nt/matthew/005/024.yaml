id: MAT.5.24
reference: Matthew 5:24
source:
  edition: SBLGNT
  text: ἄφες ἐκεῖ τὸ δῶρόν σου ἔμπροσθεν τοῦ θυσιαστηρίου καὶ ὕπαγε πρῶτον διαλλάγηθι
    τῷ ἀδελφῷ σου, καὶ τότε ἐλθὼν πρόσφερε τὸ δῶρόν σου.
translation:
  text: leave your gift there before the altar, and go; first be reconciled to your
    brother, and then come and offer your gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be reconciled with your brother.'
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' translates the masculine singular Greek term; in context the
      principle of reconciliation may apply more broadly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφες
  chosen: leave
  alternatives:
  - let go of
  - leave behind
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here means to leave something in place. 'Leave'
    is natural English and fits the concrete cultic setting better than broader senses
    like 'forgive' or 'permit'.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: 'Retains the spatial emphasis: the gift is to be left at the place of
    offering.'
- source_word: δῶρόν
  chosen: gift
  alternatives:
  - offering
  lexicon: BDAG
  rationale: δῶρον commonly denotes a gift/offering brought to God. 'Gift' preserves
    the lexical form and is clear in context; the altar language already signals sacrificial
    offering.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in front of
  lexicon: BDAG
  rationale: '''Before the altar'' is idiomatic and preserves the formal spatial relation.'
- source_word: θυσιαστηρίου
  chosen: altar
  lexicon: BDAG
  rationale: Standard rendering for θυσιαστήριον in sacrificial contexts.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go away
  - depart
  lexicon: BDAG
  rationale: Imperative of movement; 'go' is the most natural concise rendering in
    sequence with the following command.
- source_word: πρῶτον
  chosen: first
  lexicon: BDAG
  rationale: Preserves the priority Jesus places on reconciliation before completing
    the offering.
- source_word: διαλλάγηθι
  chosen: be reconciled
  alternatives:
  - make peace
  - be restored
  lexicon: BDAG
  rationale: The passive imperative indicates entering into a state of reconciliation.
    'Be reconciled' preserves the relational and moral force without over-paraphrasing.
- source_word: τῷ ἀδελφῷ σου
  chosen: to your brother
  alternatives:
  - with your brother
  lexicon: BDAG
  rationale: The dative after διαλλάγηθι can be represented in English as either 'to'
    or 'with.' 'To your brother' stays closer to the Greek construction, while still
    idiomatic enough in context.
- source_word: τότε
  chosen: then
  alternatives:
  - after that
  lexicon: BDAG
  rationale: Marks the temporal sequence following reconciliation.
- source_word: ἐλθὼν
  chosen: come
  alternatives:
  - having come
  - after coming back
  lexicon: BDAG
  rationale: 'The participle is subordinate to the main imperative and in English
    is best rendered with a finite verb in sequence: ''then come and offer.'' This
    is a natural optimal-equivalence rendering.'
- source_word: πρόσφερε
  chosen: offer
  alternatives:
  - present
  lexicon: BDAG
  rationale: Cultic verb for presenting an offering. 'Offer' is the clearest and most
    standard rendering in this context.
