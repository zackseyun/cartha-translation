theological_decisions:
- issue: Rendering ἀδελφός in a context of interpersonal ethics
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The Greek is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral unless context clearly demands otherwise.
    'Brother' preserves the source form and representative force without importing
    a broader paraphrase. An inclusive alternative is preserved in a footnote because
    the ethical principle may apply beyond a male sibling.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
