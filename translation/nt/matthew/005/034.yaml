id: MAT.5.34
reference: Matthew 5:34
source:
  edition: SBLGNT
  text: ἐγὼ δὲ λέγω ὑμῖν μὴ ὀμόσαι ὅλως· μήτε ἐν τῷ οὐρανῷ, ὅτι θρόνος ἐστὶν τοῦ θεοῦ·
translation:
  text: 'But I say to you, do not swear at all: neither by heaven, because it is the
    throne of God;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not take an oath at all.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'in heaven'; the phrase is rendered idiomatically as 'by heaven' because
      it refers to the formula by which one swears.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  chosen: But I say to you
  alternatives:
  - But I tell you
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say/tell.' 'But I say to you' preserves the
    emphatic contrast introduced by δέ and echoes the discourse formula in this section
    without becoming archaic.
- source_word: μὴ ὀμόσαι
  chosen: do not swear
  alternatives:
  - do not take an oath
  - not to swear
  lexicon: BDAG
  rationale: ὀμνύω means to swear or take an oath. 'Do not swear' is the most direct
    and idiomatic rendering here; the infinitive after μή is naturally expressed in
    English as a prohibition.
- source_word: ὅλως
  chosen: at all
  alternatives:
  - altogether
  - in any way
  lexicon: BDAG
  rationale: ὅλως intensifies the prohibition. 'At all' is natural modern English
    and clearly conveys the comprehensive force.
- source_word: μήτε
  chosen: neither
  alternatives:
  - not even
  lexicon: BDAG
  rationale: μήτε introduces the first item in a series of prohibited oath formulas.
    'Neither' prepares for the continuation in the following verses.
- source_word: ἐν τῷ οὐρανῷ
  chosen: by heaven
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: Although ἐν commonly means 'in,' with verbs of swearing it can mark the
    object or sphere by which one swears. English idiom requires 'by heaven,' which
    also fits the immediate context of oath formulas.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: ὅτι gives the reason heaven must not be invoked in oaths. 'Because' is
    clear modern English; 'for' is possible but slightly more formal/archaic in this
    context.
- source_word: θρόνος ἐστὶν τοῦ θεοῦ
  chosen: it is the throne of God
  alternatives:
  - it is God's throne
  lexicon: BDAG
  rationale: The predicate nominative construction is rendered naturally with an explicit
    pronoun in English. 'The throne of God' stays close to the Greek while remaining
    readable.
