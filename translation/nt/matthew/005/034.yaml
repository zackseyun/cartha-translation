theological_decisions:
- issue: Scope of Jesus' prohibition on oath-taking
  chosen_reading: Render the statement directly as a comprehensive prohibition ('do
    not swear at all') without narrowing it to only false, frivolous, or certain kinds
    of oaths in translation.
  alternative_readings:
  - do not swear falsely
  - do not swear casually
  rationale: The Greek text itself states a broad prohibition and then specifies examples
    ('neither by heaven...'). Interpretive traditions that limit the scope belong
    to exegesis, not translation. Preserving the text's force aligns with the instruction
    not to import denominational distinctives or resolve tensions beyond the source.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
