theological_decisions:
- issue: Rendering the legal formula cited by Jesus
  chosen_reading: An eye for an eye and a tooth for a tooth
  alternative_readings:
  - Eye in place of eye and tooth in place of tooth
  rationale: The verse quotes the well-known talionic principle from the Torah. The
    traditional English form accurately reflects the Greek and preserves the recognizable
    legal maxim without importing further interpretation about literal versus proportional
    retaliation.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
