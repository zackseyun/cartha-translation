id: MAT.5.38
reference: Matthew 5:38
source:
  edition: SBLGNT
  text: Ἠκούσατε ὅτι ἐρρέθη· Ὀφθαλμὸν ἀντὶ ὀφθαλμοῦ καὶ ὀδόντα ἀντὶ ὀδόντος.
translation:
  text: You have heard that it was said, ‘An eye for an eye and a tooth for a tooth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “An eye in place of an eye and a tooth in place of a
      tooth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκούσατε
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: BDAG
  rationale: Aorist indicative in this formulaic Matthean introduction is naturally
    rendered in idiomatic English as present perfect, reflecting what the audience
    has heard as received tradition rather than a single past event.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what was heard; standard declarative complementizer.
- source_word: ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  lexicon: BDAG
  rationale: Passive of λέγω. 'It was said' is the most natural English rendering
    and preserves the impersonal/passive form used in Jesus' citation formula.
- source_word: Ὀφθαλμὸν
  chosen: an eye
  lexicon: BDAG
  rationale: Singular accusative object in the legal formula; indefinite article in
    English gives the proverbial/legal sense.
- source_word: ἀντὶ
  chosen: for
  alternatives:
  - in place of
  - instead of
  lexicon: BDAG
  rationale: In this fixed legal expression, 'for' is the established and accurate
    idiomatic equivalent of substitution/reciprocity.
- source_word: ὀφθαλμοῦ
  chosen: an eye
  lexicon: BDAG
  rationale: Genitive after ἀντί expressing exchange or equivalence; repeated in English
    to preserve the balanced legal formula.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two parallel clauses.
- source_word: ὀδόντα
  chosen: a tooth
  lexicon: BDAG
  rationale: Singular accusative in parallel with ὀφθαλμόν; rendered with indefinite
    article for natural English legal phrasing.
- source_word: ἀντὶ
  chosen: for
  alternatives:
  - in place of
  - instead of
  lexicon: BDAG
  rationale: Same preposition and sense as earlier in the verse; consistency preserved
    in the repeated formula.
- source_word: ὀδόντος
  chosen: a tooth
  lexicon: BDAG
  rationale: Genitive after ἀντί, completing the second half of the lex talionis formula.
