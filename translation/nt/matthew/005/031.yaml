theological_decisions:
- issue: Relation of Jesus' wording to the Mosaic divorce provision
  chosen_reading: Render the statement as a citation of a legal saying without importing
    approval or disapproval into this verse itself.
  alternative_readings:
  - Render more interpretively as a command endorsing divorce procedure
  - Render as merely descriptive of common teaching
  rationale: This verse introduces the traditional formulation that Jesus will address
    in the next verse. The translation should preserve the legal-citation form and
    not resolve the broader theological debate about divorce ethics here.
  doctrine_reference: Preserve theological tension rather than resolve it.
