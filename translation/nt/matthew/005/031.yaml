id: MAT.5.31
reference: Matthew 5:31
source:
  edition: SBLGNT
  text: Ἐρρέθη ⸀δέ· Ὃς ἂν ἀπολύσῃ τὴν γυναῖκα αὐτοῦ, δότω αὐτῇ ἀποστάσιον.
translation:
  text: But it was said, ‘Whoever divorces his wife, let him give her a certificate
    of divorce.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sends away his wife ... a writ of divorce.' The Greek verb can mean
      'send away,' but here in legal marital context it refers to divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐρρέθη
  chosen: it was said
  alternatives:
  - it was spoken
  - it was declared
  lexicon: BDAG
  rationale: Aorist passive of λέγω in this formulaic Matthean construction is best
    rendered idiomatically as 'it was said,' matching the citation-introduction pattern
    in the surrounding antitheses.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks transition/contrast with the preceding teaching unit; 'But'
    fits the discourse flow of the antitheses better than a simple connective.
- source_word: Ὃς ἂν
  chosen: Whoever
  alternatives:
  - Anyone who
  - Who if anyone
  lexicon: BDAG
  rationale: The relative pronoun with ἄν expresses an indefinite general condition;
    'Whoever' is concise and natural English.
- source_word: ἀπολύσῃ
  chosen: divorces
  alternatives:
  - sends away
  - dismisses
  lexicon: BDAG
  rationale: Although ἀπολύω can mean 'release' or 'send away,' in this marital legal
    context with ἀποστάσιον it specifically refers to divorce, so 'divorces' makes
    the legal sense explicit without paraphrase.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; the possessive and divorce context require
    'wife.' The masculine possessive should be retained as gender-accurate to the
    source.
- source_word: δότω
  chosen: let him give
  alternatives:
  - he must give
  - let him provide
  lexicon: BDAG
  rationale: Third-person aorist imperative is well represented by 'let him give.'
    'He must give' is possible, but the quoted legal formulation is more formally
    preserved with the imperative-style rendering.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - to her
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English as 'her'
    after 'give,' though the sense is 'to her.'
- source_word: ἀποστάσιον
  chosen: a certificate of divorce
  alternatives:
  - a divorce certificate
  - a writ of divorce
  lexicon: BDAG
  rationale: The noun denotes a written document of divorce. 'Certificate of divorce'
    is clear modern English and preserves the documentary/legal force better than
    the bare 'divorce.'
