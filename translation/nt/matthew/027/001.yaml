id: MAT.27.1
reference: Matthew 27:1
source:
  edition: SBLGNT
  text: Πρωΐας δὲ γενομένης συμβούλιον ἔλαβον πάντες οἱ ἀρχιερεῖς καὶ οἱ πρεσβύτεροι
    τοῦ λαοῦ κατὰ τοῦ Ἰησοῦ ὥστε θανατῶσαι αὐτόν·
translation:
  text: When morning came, all the chief priests and the elders of the people took
    counsel against Jesus so as to put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At daybreak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'held a consultation' for 'took counsel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρωΐας δὲ γενομένης
  chosen: When morning came
  alternatives:
  - Now when morning came
  - At daybreak
  lexicon: BDAG
  rationale: Genitive absolute marking temporal transition. 'When morning came' is
    natural English and preserves the temporal force without unnecessary stiffness.
    'δέ' is lightly represented by the clause transition rather than a separate 'now'.
- source_word: συμβούλιον ἔλαβον
  chosen: took counsel
  alternatives:
  - held a consultation
  - made a plan
  - reached a decision
  lexicon: BDAG
  rationale: The idiom literally means 'took counsel' or 'held council/deliberation.'
    'Took counsel' preserves the deliberative sense and the formal tone of the judicial
    setting better than the more interpretive 'made a plan'.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: Emphasizes the comprehensiveness of the participating leadership group
    and should be retained explicitly.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the Jerusalem priestly leadership class in the
    Gospels; 'high priests' would mislead English readers into thinking of multiple
    holders of the singular office.
- source_word: οἱ πρεσβύτεροι τοῦ λαοῦ
  chosen: the elders of the people
  alternatives:
  - the people's elders
  lexicon: BDAG
  rationale: A formal leadership designation. The more literal genitive construction
    is preserved in idiomatic English.
- source_word: κατὰ τοῦ Ἰησοῦ
  chosen: against Jesus
  alternatives:
  - concerning Jesus
  lexicon: BDAG
  rationale: In this hostile legal context κατά with the genitive carries adversative
    force, not mere reference. 'Against Jesus' best reflects the opposition implied.
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - with the result that
  - in order to
  lexicon: BDAG
  rationale: Here ὥστε with the infinitive expresses intended result/purpose. 'So
    as to' preserves that nuance without overformalizing.
- source_word: θανατῶσαι αὐτόν
  chosen: put him to death
  alternatives:
  - kill him
  - execute him
  lexicon: BDAG
  rationale: '''Put him to death'' fits the formal judicial context and avoids the
    bluntness of ''kill him'' while not over-specifying legal procedure as ''execute
    him'' might.'
