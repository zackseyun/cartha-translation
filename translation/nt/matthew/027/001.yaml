theological_decisions:
- issue: Nature of the leaders' action toward Jesus
  chosen_reading: 'Render the phrase as a hostile deliberation culminating in intent
    to secure Jesus'' death: ''took counsel against Jesus so as to put him to death.'''
  alternative_readings:
  - Render more weakly as 'consulted about Jesus'
  - Render more strongly as 'plotted against Jesus'
  rationale: The Greek clearly indicates opposition ('κατὰ τοῦ Ἰησοῦ') and lethal
    intent ('ὥστε θανατῶσαι αὐτόν'), but 'took counsel' avoids importing a more conspiratorial
    nuance than the wording itself requires. This preserves the text's gravity without
    paraphrastic expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
