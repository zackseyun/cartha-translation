id: MAT.27.27
reference: Matthew 27:27
source:
  edition: SBLGNT
  text: Τότε οἱ στρατιῶται τοῦ ἡγεμόνος παραλαβόντες τὸν Ἰησοῦν εἰς τὸ πραιτώριον
    συνήγαγον ἐπ’ αὐτὸν ὅλην τὴν σπεῖραν.
translation:
  text: Then the governor’s soldiers took Jesus into the praetorium and gathered the
    whole cohort around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the governor’s headquarters.' The Greek term refers to the official
      residence or military headquarters of the Roman governor.
    reason: lexical_alternative
  - marker: b
    text: '''Cohort'' translates a Roman military term; it can refer to a unit of
      soldiers rather than necessarily every soldier in a full cohort being physically
      present.'
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective marking the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: στρατιῶται τοῦ ἡγεμόνος
  chosen: the governor’s soldiers
  alternatives:
  - the soldiers of the governor
  lexicon: BDAG
  rationale: The genitive τοῦ ἡγεμόνος is possessive/associative. 'Governor’s soldiers'
    is idiomatic modern English while preserving the relation to the Roman governor.
- source_word: ἡγεμόνος
  chosen: governor
  alternatives:
  - ruler
  - prefect
  lexicon: BDAG
  rationale: In Matthew’s passion context this refers to the Roman provincial ruler.
    'Governor' is the standard and clearest contextual rendering; 'prefect' is historically
    possible but too specific for the lexical form alone.
- source_word: παραλαβόντες
  chosen: took
  alternatives:
  - having taken
  - led away
  - took along
  lexicon: BDAG
  rationale: The participle denotes taking Jesus into custody/along with them. In
    English, folding the participle into the main clause as 'took' yields natural
    style without losing meaning.
- source_word: εἰς τὸ πραιτώριον
  chosen: into the praetorium
  alternatives:
  - into the governor’s headquarters
  - into the palace
  lexicon: BDAG
  rationale: πραιτώριον denotes the praetorium, the governor's official residence/headquarters.
    Because the term has historical specificity, the transliterated 'praetorium' is
    retained in the main text, with a clarifying alternative preserved in a footnote.
- source_word: συνήγαγον
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: BDAG
  rationale: The verb means to gather together. 'Gathered' is straightforward and
    idiomatic.
- source_word: ἐπ’ αὐτὸν
  chosen: around him
  alternatives:
  - against him
  - before him
  - to him
  lexicon: BDAG
  rationale: With συνάγω in this context, ἐπί + accusative most naturally indicates
    movement/convergence toward and around Jesus. 'Around him' best fits the scene
    of soldiers assembling surrounding him.
- source_word: ὅλην τὴν σπεῖραν
  chosen: the whole cohort
  alternatives:
  - the whole band of soldiers
  - the whole company
  lexicon: BDAG
  rationale: σπεῖρα is a military unit, commonly 'cohort.' This preserves the Roman
    military sense better than the vaguer 'company' or 'band,' while 'whole' reflects
    ὅλην.
