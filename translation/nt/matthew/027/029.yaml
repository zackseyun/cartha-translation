id: MAT.27.29
reference: Matthew 27:29
source:
  edition: SBLGNT
  text: καὶ πλέξαντες στέφανον ἐξ ἀκανθῶν ἐπέθηκαν ἐπὶ ⸂τῆς κεφαλῆς⸃ αὐτοῦ καὶ κάλαμον
    ⸂ἐν τῇ δεξιᾷ⸃ αὐτοῦ, καὶ γονυπετήσαντες ἔμπροσθεν αὐτοῦ ⸀ἐνέπαιξαν αὐτῷ λέγοντες·
    Χαῖρε, ⸀βασιλεῦ τῶν Ἰουδαίων,
translation:
  text: And after weaving a crown of thorns, they put it on his head, and a reed in
    his right hand; and kneeling before him, they mocked him, saying, “Hail, King
    of the Jews!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “king of the Judeans.” The Greek Ἰουδαίων can refer to Judeans or Jews;
      here it appears in the mock royal title used against Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλέξαντες
  chosen: after weaving
  alternatives:
  - having woven
  - twisting together
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'after weaving' gives natural
    English sequence while preserving the participial action.
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: BDAG
  rationale: In this mock-royal context, 'crown' best conveys the intended parody
    of kingship, even though the term can denote a wreath.
- source_word: ἐξ ἀκανθῶν
  chosen: of thorns
  alternatives:
  - from thorns
  lexicon: BDAG
  rationale: Idiomatic English for material composition; preserves the sense that
    the crown was made out of thorns.
- source_word: ἐπέθηκαν ἐπὶ τῆς κεφαλῆς αὐτοῦ
  chosen: they put it on his head
  alternatives:
  - they placed it on his head
  lexicon: BDAG
  rationale: Straightforward rendering of the verb-preposition phrase; 'put' is natural
    modern English and sufficiently precise.
- source_word: κάλαμον
  chosen: a reed
  alternatives:
  - a staff
  - a cane
  lexicon: BDAG
  rationale: The object is literally a reed, likely used as a mock scepter. 'Reed'
    preserves the concrete image without over-interpreting.
- source_word: ἐν τῇ δεξιᾷ αὐτοῦ
  chosen: in his right hand
  alternatives:
  - into his right hand
  - at his right side
  lexicon: BDAG
  rationale: The dative phrase indicates placement in his right hand; this is the
    natural English expression and preserves the royal mockery symbolism.
- source_word: γονυπετήσαντες
  chosen: kneeling
  alternatives:
  - having knelt down
  - falling on their knees
  lexicon: BDAG
  rationale: Aorist participle describing their posture before mocking him. 'Kneeling'
    is concise and idiomatic.
- source_word: ἔμπροσθεν αὐτοῦ
  chosen: before him
  alternatives:
  - in front of him
  lexicon: BDAG
  rationale: '''Before him'' fits the formal, mock-homage setting better than the
    more colloquial ''in front of him.'''
- source_word: ἐνέπαιξαν αὐτῷ
  chosen: they mocked him
  alternatives:
  - they ridiculed him
  - they made fun of him
  lexicon: BDAG
  rationale: '''Mocked'' best captures the scornful derision in a solemn narrative
    register.'
- source_word: Χαῖρε
  chosen: Hail
  alternatives:
  - Greetings
  - Rejoice
  lexicon: BDAG
  rationale: In this context of sarcastic acclamation, 'Hail' best reflects a mock
    royal salute rather than an ordinary greeting.
- source_word: βασιλεῦ τῶν Ἰουδαίων
  chosen: King of the Jews
  alternatives:
  - king of the Judeans
  lexicon: BDAG
  rationale: Traditional and contextually appropriate rendering in the passion narrative.
    While 'Judeans' is lexically possible for Ἰουδαίων, here the title is the Roman-style
    charge/mock acclamation associated with Jesus' kingship claim, and 'Jews' is the
    most recognizable and natural English rendering.
