theological_decisions:
- issue: Rendering the mock acclamation to preserve irony without diminishing the
    royal title
  chosen_reading: “Hail, King of the Jews!”
  alternative_readings:
  - “Greetings, King of the Jews!”
  rationale: The soldiers are parodying royal homage. 'Hail' preserves the formal,
    courtly tone and the irony of mock enthronement, while still accurately translating
    Χαῖρε in context.
  doctrine_reference: Translation philosophy §6 (readable modern English, not flattening
    theological weight)
- issue: Rendering Ἰουδαίων in the title
  chosen_reading: “Jews”
  alternative_readings:
  - “Judeans”
  rationale: Although Ἰουδαῖος can denote Judean ethnicity or regional identity, in
    this passion-title formula the established sense is the broader ethnoreligious
    designation tied to the accusation of kingship. 'Jews' best matches the narrative
    and historical force here without importing a narrower geographic sense.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §6
