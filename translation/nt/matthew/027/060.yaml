id: MAT.27.60
reference: Matthew 27:60
source:
  edition: SBLGNT
  text: καὶ ἔθηκεν αὐτὸ ἐν τῷ καινῷ αὐτοῦ μνημείῳ ὃ ἐλατόμησεν ἐν τῇ πέτρᾳ, καὶ προσκυλίσας
    λίθον μέγαν τῇ θύρᾳ τοῦ μνημείου ἀπῆλθεν.
translation:
  text: and placed it in his own new tomb, which he had cut into the rock. And after
    rolling a large stone to the entrance of the tomb, he went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the door of the tomb.' The Greek uses 'door/entrance' language; 'entrance'
      is chosen for clarity in the context of a rock-cut tomb.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκεν
  chosen: placed
  alternatives:
  - laid
  - put
  lexicon: BDAG
  rationale: Aorist of τίθημι here refers to placing Jesus' body in the tomb. 'Placed'
    is natural modern English and slightly more dignified than 'put,' while remaining
    faithful to the simple verbal action.
- source_word: μνημείῳ / μνημείου
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this burial context refers to a burial tomb, not merely a
    grave. 'Tomb' best matches the rock-hewn burial setting described in the verse.
- source_word: καινῷ
  chosen: new
  alternatives:
  - fresh
  - unused
  lexicon: BDAG
  rationale: καινός means 'new.' 'Unused' may be an implication in burial context
    but is not explicitly stated here, so 'new' is retained.
- source_word: αὐτοῦ
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: The possessive pronoun naturally indicates ownership by Joseph; 'his
    own' brings out the possessive emphasis idiomatically in English without overtranslation.
- source_word: ἐλατόμησεν
  chosen: had cut
  alternatives:
  - hewed out
  - cut out
  lexicon: BDAG
  rationale: λατομέω refers to quarrying or hewing from rock. 'Had cut' communicates
    the action in readable modern English. The pluperfect sense in English ('had cut')
    fits the relative clause describing a tomb previously prepared.
- source_word: ἐν τῇ πέτρᾳ
  chosen: into the rock
  alternatives:
  - in the rock
  - out of the rock
  lexicon: BDAG
  rationale: The phrase describes the tomb as hewn in solid rock. 'Into the rock'
    is idiomatic English for a rock-cut tomb and conveys the spatial sense clearly.
- source_word: προσκυλίσας
  chosen: after rolling
  alternatives:
  - having rolled
  - rolling
  lexicon: BDAG
  rationale: The aorist participle denotes action prior to the main verb ἀπῆλθεν.
    'After rolling' clearly communicates the sequence in natural English.
- source_word: λίθον μέγαν
  chosen: a large stone
  alternatives:
  - a great stone
  - a huge stone
  lexicon: BDAG
  rationale: μέγας commonly means 'large' or 'great.' 'Large stone' is clear, idiomatic,
    and avoids archaic resonance while preserving the sense.
- source_word: τῇ θύρᾳ τοῦ μνημείου
  chosen: to the entrance of the tomb
  alternatives:
  - to the door of the tomb
  - against the door of the tomb
  lexicon: BDAG
  rationale: θύρα can mean 'door' or 'entrance.' Since ancient tombs typically had
    an opening rather than a hinged door in the modern sense, 'entrance' is the clearest
    contextual rendering.
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: ἀπέρχομαι here simply indicates departure. 'Went away' is straightforward
    modern English and preserves the narrative movement.
