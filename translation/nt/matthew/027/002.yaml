theological_decisions:
- issue: Rendering παραδίδωμι in the passion narrative
  chosen_reading: handed him over
  alternative_readings:
  - delivered him
  rationale: The verb can carry both judicial and theological resonance in the passion
    accounts. Here the translation keeps the immediate legal sense prominent without
    suppressing later theological significance. 'Delivered' is possible but sounds
    more traditional and less transparent in contemporary English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
