id: MAT.27.2
reference: Matthew 27:2
source:
  edition: SBLGNT
  text: καὶ δήσαντες αὐτὸν ἀπήγαγον καὶ ⸀παρέδωκαν Πιλάτῳ τῷ ἡγεμόνι.
translation:
  text: And after binding him, they led him away and handed him over to Pilate the
    governor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "having bound him."
    reason: lexical_alternative
  - marker: b
    text: Or "delivered him" to Pilate the governor.
    reason: alternative_reading
lexical_decisions:
- source_word: δήσαντες
  chosen: after binding
  alternatives:
  - having bound
  - binding
  lexicon: BDAG
  rationale: Aorist active participle from δέω, indicating action prior to the main
    verbs. 'After binding' expresses the participle's antecedent action in natural
    English while preserving the concrete sense of tying or binding him.
- source_word: ἀπήγαγον
  chosen: they led him away
  alternatives:
  - they took him away
  - they brought him away
  lexicon: BDAG
  rationale: ἀπάγω commonly means to lead or take away. 'Led him away' preserves the
    physical escorting sense and matches the judicial-custodial context better than
    the more generic 'took him away.'
- source_word: παρέδωκαν
  chosen: handed him over
  alternatives:
  - delivered him
  - turned him over
  lexicon: BDAG
  rationale: παραδίδωμι in passion contexts often carries the sense of handing someone
    over into another's custody or authority. 'Handed him over' is clear modern English
    and preserves the legal/judicial force without importing extra theological interpretation.
- source_word: Πιλάτῳ
  chosen: Pilate
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: ἡγεμόνι
  chosen: the governor
  alternatives:
  - the prefect
  - the ruler
  lexicon: BDAG
  rationale: ἡγεμών is a governing official. 'Governor' is the standard and most accessible
    rendering in this context. 'Prefect' may be historically more specific for Pilate's
    office, but the Greek term itself is broader, so 'governor' best reflects the
    source without over-specifying.
- source_word: καὶ δήσαντες αὐτὸν
  chosen: And after binding him
  alternatives:
  - And having bound him
  lexicon: BDAG
  rationale: The initial καί is retained as 'And' to preserve narrative flow. αὐτόν
    is explicitly rendered as 'him,' maintaining the object of the participle.
- source_word: καὶ παρέδωκαν
  chosen: and handed him over
  alternatives:
  - and they handed him over
  lexicon: BDAG
  rationale: The second καί is rendered coordinately as 'and.' English does not require
    repeating the subject pronoun, so the translation remains natural while preserving
    the sequence of actions.
