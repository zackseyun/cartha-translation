id: MAT.27.23
reference: Matthew 27:23
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἔφη· Τί γὰρ κακὸν ἐποίησεν; οἱ δὲ περισσῶς ἔκραζον λέγοντες· Σταυρωθήτω.
translation:
  text: But he said, “For what evil has he done?” But they kept crying out all the
    more, saying, “Let him be crucified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Why, what wrong has he done?”
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “Crucify him.” The Greek is more literally,
      “Let him be crucified.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he said in reply
  - he kept saying
  lexicon: BDAG
  rationale: Aorist of φημί here functions as simple narrative speech introduction.
    'He said' is the most natural modern English rendering.
- source_word: Τί γὰρ κακὸν ἐποίησεν;
  chosen: For what evil has he done?
  alternatives:
  - Why, what evil has he done?
  - What wrong has he done?
  lexicon: BDAG
  rationale: τί with γάρ is an idiomatic challenge/question. 'For what evil has he
    done?' preserves the explicit κακόν ('evil') more closely than the smoother 'what
    wrong.' The perfect English 'has he done' idiomatically conveys the completed
    action under present consideration.
- source_word: κακὸν
  chosen: evil
  alternatives:
  - wrong
  lexicon: BDAG
  rationale: κακόν denotes something bad/evil. 'Evil' is slightly more formal and
    preserves the moral force of the accusation better than the softer 'wrong.'
- source_word: περισσῶς
  chosen: all the more
  alternatives:
  - exceedingly
  - even more loudly
  - more vehemently
  lexicon: BDAG
  rationale: The adverb intensifies the crowd's response. 'All the more' is idiomatic
    modern English and captures escalation without over-specifying volume.
- source_word: ἔκραζον
  chosen: kept crying out
  alternatives:
  - were crying out
  - shouted
  lexicon: BDAG
  rationale: The imperfect indicates ongoing/repeated action. 'Kept crying out' preserves
    the durative force better than simple 'shouted.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - as they said
  lexicon: BDAG
  rationale: The participle is contemporaneous with ἔκραζον and is naturally rendered
    with the English participle 'saying.'
- source_word: Σταυρωθήτω
  chosen: Let him be crucified
  alternatives:
  - Crucify him
  - Let him be put on a cross
  lexicon: BDAG
  rationale: The third-person aorist passive imperative is best represented by 'Let
    him be crucified.' This preserves both the imperative force and the passive form
    more transparently than the more idiomatic but less formally equivalent 'Crucify
    him.'
- source_word: ὁ δὲ ... οἱ δὲ
  chosen: But he ... But they ...
  alternatives:
  - Then he ... but they ...
  lexicon: BDAG
  rationale: δέ marks contrast/continuation in both clauses. Repeating 'But' in English
    preserves the adversative contrast between Pilate and the crowd.
