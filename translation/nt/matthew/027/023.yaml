theological_decisions:
- issue: Rendering the crowd's demand in relation to crucifixion
  chosen_reading: Let him be crucified
  alternative_readings:
  - Crucify him
  rationale: The Greek uses a passive imperative (σταυρωθήτω). Rendering it passively
    preserves the form of the source text without importing additional theological
    interpretation. The active English idiom 'Crucify him' is common and acceptable,
    but the passive is more transparent to the Greek here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source meaning where English tradition may flatten form.'
