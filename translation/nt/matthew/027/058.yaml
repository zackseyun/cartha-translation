id: MAT.27.58
reference: Matthew 27:58
source:
  edition: SBLGNT
  text: οὗτος προσελθὼν τῷ Πιλάτῳ ᾐτήσατο τὸ σῶμα τοῦ Ἰησοῦ. τότε ὁ Πιλᾶτος ἐκέλευσεν
    ⸀ἀποδοθῆναι.
translation:
  text: He went to Pilate and asked for the body of Jesus. Then Pilate ordered it
    to be given over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordered it to be given' or 'ordered it to be handed over.' The Greek
      infinitive can be rendered in several close ways here.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: He
  alternatives:
  - This man
  - This one
  lexicon: BDAG
  rationale: The demonstrative refers back to Joseph of Arimathea in the previous
    verse. English normally uses the pronoun 'he' rather than 'this one' in smooth
    narrative when the referent is clear.
- source_word: προσελθὼν
  chosen: went to
  alternatives:
  - came to
  - approached
  lexicon: BDAG
  rationale: The aorist participle of προσέρχομαι introduces the action prior to the
    main verb. 'Went to' is natural modern English in narrative and captures movement
    toward Pilate without sounding overly formal; 'approached' is possible but stiffer.
- source_word: ᾐτήσατο
  chosen: asked for
  alternatives:
  - requested
  - asked
  lexicon: BDAG
  rationale: The middle form of αἰτέω here means to ask for or request something.
    'Asked for' is idiomatic and clearly takes the object 'the body of Jesus.'
- source_word: σῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: σῶμα literally means 'body.' Although the referent is Jesus' dead body,
    'body' is the standard and sufficiently clear rendering; 'corpse' would be more
    clinical than the context requires.
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: τότε marks the next event in sequence. 'Then' is the natural narrative
    connector in English.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: κελεύω denotes giving an order or command. 'Ordered' is concise and natural
    in this administrative context.
- source_word: ἀποδοθῆναι
  chosen: to be given over
  alternatives:
  - to be given
  - to be handed over
  - to be released
  lexicon: BDAG
  rationale: The aorist passive infinitive of ἀποδίδωμι means to give back, give over,
    or hand over. Since Pilate is authorizing transfer of Jesus' body to Joseph, 'to
    be given over' preserves the sense of delivery without over-specifying 'back.'
