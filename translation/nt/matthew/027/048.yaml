theological_decisions:
- issue: Nature of the drink offered to Jesus
  chosen_reading: sour wine
  alternative_readings:
  - vinegar
  rationale: The term ὄξος denotes sour wine/wine vinegar. Rendering it as 'sour wine'
    avoids importing unnecessary interpretive or devotional associations tied to the
    traditional English 'vinegar' while staying close to the Greek referent.
  doctrine_reference: Translation philosophy §1, §6
