id: MAT.27.48
reference: Matthew 27:48
source:
  edition: SBLGNT
  text: καὶ εὐθέως δραμὼν εἷς ἐξ αὐτῶν καὶ λαβὼν σπόγγον πλήσας τε ὄξους καὶ περιθεὶς
    καλάμῳ ἐπότιζεν αὐτόν.
translation:
  text: And immediately one of them ran, and taking a sponge, filled it with sour
    wine and put it on a reed, and kept giving him a drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "vinegar." The Greek ὄξος can refer to sour wine or wine vinegar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys the adverb's sense of prompt action in clear modern English;
    'straightway' is archaic, and 'at once' is possible but slightly less direct in
    narrative flow.
- source_word: δραμὼν
  chosen: ran
  alternatives:
  - having run
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered in English narrative as a
    finite verb coordinated with the following actions. 'Ran' preserves the urgency
    without awkward participial English.
- source_word: εἷς ἐξ αὐτῶν
  chosen: one of them
  alternatives:
  - one from among them
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the partitive expression, preserving
    that a single individual from the group acted.
- source_word: λαβὼν σπόγγον
  chosen: taking a sponge
  alternatives:
  - having taken a sponge
  lexicon: BDAG
  rationale: A natural participial rendering in English that preserves sequence of
    action.
- source_word: πλήσας τε ὄξους
  chosen: filled it with sour wine
  alternatives:
  - filled it with vinegar
  lexicon: BDAG
  rationale: ὄξος refers to sour wine/wine vinegar, commonly a cheap acidic drink.
    'Sour wine' is more precise and less misleading to modern readers than 'vinegar,'
    which may suggest a condiment rather than a drinkable liquid.
- source_word: περιθεὶς καλάμῳ
  chosen: put it on a reed
  alternatives:
  - placed it on a stick
  - put it on a staff
  lexicon: BDAG
  rationale: The dative καλάμῳ is instrumental/associative with the idea of mounting
    the sponge on a reed. 'Reed' is the most direct lexical equivalent and fits the
    Gospel passion setting.
- source_word: ἐπότιζεν αὐτόν
  chosen: kept giving him a drink
  alternatives:
  - gave him a drink
  - offered him a drink
  - was giving him a drink
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or attempted action rather than
    a simple punctiliar event. 'Kept giving him a drink' captures the imperfective
    aspect while remaining readable. It also reflects ποτίζω as causing someone to
    drink, not merely handing over a cup.
