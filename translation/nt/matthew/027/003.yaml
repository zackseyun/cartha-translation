theological_decisions:
- issue: Meaning of μεταμεληθεὶς in relation to Judas's response
  chosen_reading: Express Judas's response as regret/remorse, not full repentance
  alternative_readings:
  - repented
  - changed his mind
  rationale: The Greek verb is μεταμέλομαι, not μετανοέω. Rendering it as 'repented'
    could import a stronger theological claim about Judas's spiritual state than the
    text itself states. 'Regretted it' preserves the emotional and moral force without
    resolving broader doctrinal questions.
  doctrine_reference: Translation philosophy §1, §3
