id: MAT.27.3
reference: Matthew 27:3
source:
  edition: SBLGNT
  text: Τότε ἰδὼν Ἰούδας ὁ ⸀παραδιδοὺς αὐτὸν ὅτι κατεκρίθη μεταμεληθεὶς ⸀ἔστρεψεν
    τὰ τριάκοντα ἀργύρια τοῖς ἀρχιερεῦσιν ⸀καὶ πρεσβυτέροις
translation:
  text: Then Judas, who had betrayed him, seeing that he had been condemned, regretted
    it and returned the thirty silver coins to the chief priests and elders,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thirty pieces of silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω expressing attendant circumstance/temporal
    sense. 'Seeing' keeps the participial linkage concise in English.
- source_word: Ἰούδας
  chosen: Judas
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ παραδιδοὺς αὐτόν
  chosen: who had betrayed him
  alternatives:
  - the one betraying him
  - who was betraying him
  - who handed him over
  lexicon: BDAG
  rationale: The articular present participle identifies Judas by his role. In this
    narrative context, English idiom prefers the relative clause 'who had betrayed
    him.' 'Betrayed' is the established contextual sense of παραδίδωμι here, though
    'handed over' is lexically possible.
- source_word: ὅτι κατεκρίθη
  chosen: that he had been condemned
  alternatives:
  - that he was condemned
  - that sentence had been passed against him
  lexicon: BDAG
  rationale: ὅτι introduces content of perception. κατεκρίθη is aorist passive, referring
    to Jesus being condemned. English past perfect fits the sequence after 'seeing'.
- source_word: μεταμεληθεὶς
  chosen: regretted it
  alternatives:
  - felt remorse
  - changed his mind
  lexicon: BDAG
  rationale: μεταμέλομαι denotes regret/remorse rather than the fuller repentance
    often conveyed by μετανοέω. 'Regretted it' is clear modern English and avoids
    overstating theological repentance.
- source_word: ἔστρεψεν
  chosen: returned
  alternatives:
  - brought back
  - turned back
  lexicon: BDAG
  rationale: In context with money and indirect object, the verb means to return/back.
    'Returned' is idiomatic and precise.
- source_word: τὰ τριάκοντα ἀργύρια
  chosen: the thirty silver coins
  alternatives:
  - the thirty pieces of silver
  - the thirty silver pieces
  lexicon: BDAG
  rationale: ἀργύρια refers to silver money/pieces. 'Silver coins' is transparent
    modern English; the traditional 'pieces of silver' remains possible and is worth
    preserving because of its familiarity and intertextual resonance.
- source_word: τοῖς ἀρχιερεῦσιν καὶ πρεσβυτέροις
  chosen: to the chief priests and elders
  alternatives:
  - to the high priests and elders
  lexicon: BDAG
  rationale: Standard rendering for the Jewish leadership groups in Matthew. 'Chief
    priests' is the conventional and contextually accurate gloss for ἀρχιερεῖς; πρεσβύτεροι
    here denotes the ruling elders, not merely older men.
