id: MAT.27.59
reference: Matthew 27:59
source:
  edition: SBLGNT
  text: καὶ λαβὼν τὸ σῶμα ὁ Ἰωσὴφ ἐνετύλιξεν ⸀αὐτὸ σινδόνι καθαρᾷ,
translation:
  text: And Joseph took the body and wrapped it in a clean linen cloth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrapped him in a clean linen cloth.' The Greek pronoun is neuter ('it'),
      referring grammatically to 'the body.' English may also render according to
      the personal referent, Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a clean linen shroud.' The Greek term can refer to a linen burial
      cloth.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  chosen: took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω, temporally prior to the main verb. English
    commonly smooths the participial sequence into coordinated finite verbs in narrative.
    'Took' preserves the action without awkwardness.
- source_word: σῶμα
  chosen: the body
  alternatives:
  - his body
  lexicon: BDAG
  rationale: σῶμα straightforwardly means 'body.' The Greek has the article but no
    explicit possessive here; 'the body' is the most direct rendering. The referent
    is clear from context as Jesus, so 'his body' is possible but less formally tied
    to the wording.
- source_word: ἐνετύλιξεν
  chosen: wrapped
  alternatives:
  - bound
  - rolled up in
  lexicon: BDAG
  rationale: ἐντυλίσσω means to wrap or enfold. 'Wrapped' is the most natural modern
    English equivalent in this burial context.
- source_word: αὐτὸ
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun is neuter singular, agreeing with σῶμα ('body'), so 'it'
    is the most grammatically precise rendering. English burial narratives sometimes
    use 'him' to emphasize the person, but the Greek here points back to 'the body.'
- source_word: σινδόνι
  chosen: in a ... linen cloth
  alternatives:
  - in a linen shroud
  - with linen
  lexicon: BDAG
  rationale: σινδών denotes a linen cloth, often specifically a burial cloth or shroud.
    'Linen cloth' is clear, natural English and avoids importing more specificity
    than necessary, while still fitting the burial setting.
- source_word: καθαρᾷ
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: καθαρός here describes the linen cloth as clean. 'Pure' is possible,
    but 'clean' is the more idiomatic and contextually appropriate description for
    burial linen.
- source_word: καὶ ... ὁ Ἰωσὴφ
  chosen: And Joseph
  alternatives:
  - Then Joseph
  lexicon: BDAG
  rationale: καί is rendered simply as 'And' to preserve the narrative flow of the
    Greek. 'Then' is interpretive and slightly more dynamic than necessary.
