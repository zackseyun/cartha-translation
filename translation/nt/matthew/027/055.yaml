theological_decisions:
- issue: Rendering of διακονοῦσαι in relation to the women’s role
  chosen_reading: serving him
  alternative_readings:
  - ministering to him
  rationale: The verb denotes concrete service/support and should not be narrowed
    to either domestic help or formal ministry office. 'Serving him' preserves the
    breadth of the Greek without importing later ecclesiastical categories.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Temporal relation of the women's following Jesus
  chosen_reading: had followed Jesus from Galilee
  alternative_readings:
  - followed Jesus from Galilee
  rationale: The aorist relative clause refers to action antecedent to the crucifixion
    scene. English past perfect clarifies sequence without changing the underlying
    event.
  doctrine_reference: Translation philosophy §6
