id: MAT.27.55
reference: Matthew 27:55
source:
  edition: SBLGNT
  text: Ἦσαν δὲ ἐκεῖ γυναῖκες πολλαὶ ἀπὸ μακρόθεν θεωροῦσαι, αἵτινες ἠκολούθησαν τῷ
    Ἰησοῦ ἀπὸ τῆς Γαλιλαίας διακονοῦσαι αὐτῷ·
translation:
  text: Now there were many women there, watching from a distance, who had followed
    Jesus from Galilee, serving him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looking on from far away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'ministering to him.' The Greek verb can denote practical service or
      support.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  chosen: Now there were
  alternatives:
  - And there were
  - But there were
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Now' gives natural English scene transition
    without overstating contrast. Ἦσαν is simple existential/imperfect, rendered 'there
    were.'
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Locative adverb indicating presence at the crucifixion scene; simple
    'there' is idiomatic and sufficient.
- source_word: γυναῖκες πολλαὶ
  chosen: many women
  alternatives:
  - many womenfolk
  lexicon: BDAG
  rationale: Straightforward plural noun with attributive adjective; 'many women'
    preserves both number and gender accurately.
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from far away
  - at a distance
  lexicon: BDAG
  rationale: The phrase denotes spatial separation. 'From a distance' is natural modern
    English and preserves the sense of observing from afar.
- source_word: θεωροῦσαι
  chosen: watching
  alternatives:
  - looking on
  - observing
  - seeing
  lexicon: BDAG
  rationale: Present participle describing ongoing visual attention. 'Watching' best
    captures sustained observation in readable English.
- source_word: αἵτινες
  chosen: who
  alternatives:
  - who indeed
  - women who
  lexicon: BDAG
  rationale: Relative pronoun with qualitative nuance, identifying the women as those
    characterized by having followed Jesus. English usually does not mark this nuance
    explicitly; 'who' is the most natural rendering.
- source_word: ἠκολούθησαν
  chosen: had followed
  alternatives:
  - followed
  lexicon: BDAG
  rationale: Aorist indicative in a relative clause referring to prior action relative
    to their present watching/being there. English past perfect smoothly conveys that
    earlier following from Galilee preceded the current scene.
- source_word: τῷ Ἰησοῦ
  chosen: Jesus
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The verb 'follow' in English normally takes a direct object, though Greek
    uses the dative. Rendering simply 'Jesus' is idiomatic and faithful.
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - since Galilee
  lexicon: BDAG
  rationale: Marks the geographical point from which they had accompanied him. 'From
    Galilee' preserves the source wording and likely narrative sense.
- source_word: διακονοῦσαι αὐτῷ
  chosen: serving him
  alternatives:
  - ministering to him
  - caring for him
  lexicon: BDAG
  rationale: διακονέω can mean serve/minister. 'Serving him' is clear modern English
    and avoids importing formal ecclesial overtones, while still allowing practical
    support as the likely sense.
