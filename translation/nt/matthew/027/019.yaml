id: MAT.27.19
reference: Matthew 27:19
source:
  edition: SBLGNT
  text: Καθημένου δὲ αὐτοῦ ἐπὶ τοῦ βήματος ἀπέστειλεν πρὸς αὐτὸν ἡ γυνὴ αὐτοῦ λέγουσα· Μηδὲν σοὶ καὶ τῷ δικαίῳ ἐκείνῳ, πολλὰ γὰρ ἔπαθον σήμερον κατ’ ὄναρ δι’ αὐτόν.
translation:
  text: While he was sitting on the judgment seat, his wife sent word to him, saying, “Have nothing to do with that righteous man, for I have suffered greatly today in a dream on his account.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that innocent man.' The Greek adjective can mean 'righteous,' 'just,' or, in legal context, 'innocent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because I suffered greatly today in a dream because of him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Καθημένου ... αὐτοῦ
  chosen: While he was sitting
  alternatives:
  - As he was sitting
  - While he sat
  lexicon: BDAG
  rationale: The genitive absolute with present participle conveys a contemporaneous circumstance. 'While he was sitting' is natural English and preserves the ongoing aspect better than a simple past.
- source_word: ἐπὶ τοῦ βήματος
  chosen: on the judgment seat
  alternatives:
  - on the tribunal
  - on the governor’s seat
  lexicon: BDAG
  rationale: βῆμα in this judicial context refers to an official seat of judgment, not merely a physical step/platform. 'Judgment seat' is the clearest idiomatic rendering in English.
- source_word: ἀπέστειλεν πρὸς αὐτὸν
  chosen: sent word to him
  alternatives:
  - sent to him
  - sent a message to him
  lexicon: BDAG
  rationale: The verb plus πρὸς with indirect object implies sending a communication via messenger. 'Sent word to him' is concise and idiomatic without over-specifying the medium.
- source_word: ἡ γυνὴ αὐτοῦ
  chosen: his wife
  alternatives:
  - the wife of him
  lexicon: BDAG
  rationale: γυνή here clearly means 'wife' in relation to Pilate, not merely 'woman.'
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - with this message
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the message. 'Saying' preserves the participial linkage straightforwardly.
- source_word: Μηδὲν σοὶ καὶ τῷ δικαίῳ ἐκείνῳ
  chosen: Have nothing to do with that righteous man
  alternatives:
  - Let there be nothing between you and that righteous man
  - Have nothing against that righteous man
  lexicon: BDAG
  rationale: This elliptical idiom means 'have nothing to do with' or 'let there be no involvement between you and.' The chosen rendering communicates the warning clearly in natural English. 'Righteous man' preserves δίκαιος as a moral/judicial descriptor rather than flattening it to 'innocent,' though innocence is contextually related.
- source_word: τῷ δικαίῳ ἐκείνῳ
  chosen: that righteous man
  alternatives:
  - that innocent man
  - that just man
  lexicon: BDAG
  rationale: δίκαιος commonly means 'righteous' or 'just.' In this narrative it can imply innocence, but 'righteous' better preserves the lexical force and Matthew's moral framing. The alternative 'innocent' is worth preserving in a footnote because of the legal context.
- source_word: πολλὰ ... ἔπαθον
  chosen: I suffered greatly
  alternatives:
  - I have suffered much
  - I underwent many things
  lexicon: BDAG
  rationale: The idiom πολλὰ πάσχω means to suffer greatly/much. 'I suffered greatly' is idiomatic modern English and captures the intensity.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: Standard temporal adverb; 'today' is the natural modern equivalent.
- source_word: κατ’ ὄναρ
  chosen: in a dream
  alternatives:
  - through a dream
  - in a dream-vision
  lexicon: BDAG
  rationale: The phrase is a standard expression for dream experience. 'In a dream' is the normal English rendering.
- source_word: δι’ αὐτόν
  chosen: because of him
  alternatives:
  - on account of him
  - because of this man
  lexicon: BDAG
  rationale: διά with accusative indicates cause or reason. 'Because of him' is the most direct and natural rendering.
