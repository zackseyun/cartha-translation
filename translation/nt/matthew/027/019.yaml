theological_decisions:
- issue: Rendering δίκαιος in reference to Jesus
  chosen_reading: righteous man
  alternative_readings:
  - innocent man
  - just man
  rationale: The verse presents Pilate's wife's assessment in morally charged language. 'Righteous man' preserves the lexical sense of δίκαιος and avoids reducing the statement to a merely legal verdict, while still fitting the trial context. Because 'innocent man' is contextually plausible, it is preserved in a footnote as a lexical alternative rather than elevated to the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
revisions:
- timestamp: '2026-04-21T16:37:02Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/matthew/027/019.job-4885.json
  category: awkward_english
  tier: 1
  from: because I suffered greatly today in a dream because of him.
  to: for I have suffered greatly today in a dream on his account.
  rationale: 'The Greek uses two different expressions for cause: the particle `γάρ` and the prepositional phrase `δι’ αὐτόν`. The current rendering translates both using forms of ''because'' (''because... because of him''), which is slightly awkward and repetitive in English. Using a construction like ''for... on his account'' avoids this repetition and improves the flow. Additionally, the present perfect ''have suffered'' can better capture the ongoing relevance of the aorist `ἔπαθον` in the context of this urgent warning.'
