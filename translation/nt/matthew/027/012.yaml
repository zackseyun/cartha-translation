id: MAT.27.12
reference: Matthew 27:12
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ κατηγορεῖσθαι αὐτὸν ὑπὸ τῶν ἀρχιερέων ⸀καὶ πρεσβυτέρων οὐδὲν ἀπεκρίνατο.
translation:
  text: And while he was being accused by the chief priests and elders, he answered
    nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he gave no answer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ κατηγορεῖσθαι
  chosen: while he was being accused
  alternatives:
  - when he was being accused
  - in being accused
  lexicon: BDAG
  rationale: The construction ἐν + articular infinitive commonly expresses contemporaneous
    time. 'While he was being accused' is natural modern English and preserves the
    durative/passive sense of the present infinitive.
- source_word: κατηγορεῖσθαι
  chosen: was being accused
  alternatives:
  - was being charged
  - was being denounced
  lexicon: BDAG
  rationale: The passive infinitive indicates that accusations are being brought against
    him. 'Accused' is the most standard legal-context rendering in English.
- source_word: ὑπὸ τῶν ἀρχιερέων καὶ πρεσβυτέρων
  chosen: by the chief priests and elders
  alternatives:
  - by the high priests and elders
  - by the ruling priests and elders
  lexicon: BDAG
  rationale: ἀρχιερεῖς in the Gospels conventionally refers to the chief-priestly
    leadership rather than a plurality of high priests in the strict singular office
    sense. 'Chief priests and elders' is both accurate and idiomatic.
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - not at all
  - no answer
  lexicon: BDAG
  rationale: As the object of ἀπεκρίνατο, οὐδέν means 'nothing' or 'not at all.' Rendering
    it as 'nothing' keeps the directness of the Greek.
- source_word: ἀπεκρίνατο
  chosen: he answered
  alternatives:
  - he replied
  - he answered back
  lexicon: BDAG
  rationale: The aorist middle deponent is well rendered 'he answered.' Combined with
    οὐδέν, the clause naturally becomes 'he answered nothing' rather than the more
    interpretive 'he gave no answer.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: The verse continues the narrative straightforwardly. 'And' preserves
    the connective force without adding contrast not explicit in the Greek.
