theological_decisions:
- issue: Jesus' silence before his accusers
  chosen_reading: Render the statement plainly as narrative description without importing
    fulfillment language into the verse itself.
  alternative_readings:
  - Translate more interpretively to echo Isaiah 53, e.g., 'he made no reply'
  rationale: The verse reports Jesus' silence under accusation. While this resonates
    with prophetic themes elsewhere, this verse itself does not explicitly state fulfillment,
    so the translation should preserve the narrative fact without adding theological
    interpretation.
  doctrine_reference: Translation philosophy §1, §3
