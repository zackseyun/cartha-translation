theological_decisions:
- issue: Scope of γῆ in the darkness saying
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The Greek noun γῆ is lexically broad. Rendering it as 'land' preserves
    the immediate narrative setting and avoids importing a universalizing claim beyond
    what the term itself requires in context. The alternative 'earth' is preserved
    in a footnote because some readers and traditions understand the darkness as cosmic
    in scope.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
