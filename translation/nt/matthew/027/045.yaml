id: MAT.27.45
reference: Matthew 27:45
source:
  edition: SBLGNT
  text: Ἀπὸ δὲ ἕκτης ὥρας σκότος ἐγένετο ἐπὶ πᾶσαν τὴν γῆν ἕως ὥρας ἐνάτης.
translation:
  text: Now from the sixth hour darkness came over all the land until the ninth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sixth hour is approximately noon, and the ninth hour is approximately
      three in the afternoon.
    reason: cultural_note
  - marker: b
    text: Or 'over all the earth.' The Greek word can mean either 'land' or 'earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ
  chosen: Now from
  alternatives:
  - And from
  - But from
  lexicon: BDAG
  rationale: ἀπό marks the starting point ('from'), while δέ is a mild connective.
    'Now' gives natural English discourse flow without overstating contrast; 'and'
    or 'but' are possible but less idiomatic here.
- source_word: ἕκτης ὥρας
  chosen: the sixth hour
  alternatives:
  - noon
  lexicon: BDAG
  rationale: A formal rendering preserves the Jewish/Roman time expression in the
    main text. Since the sixth hour is approximately noon, that sense can be preserved
    in a footnote rather than replacing the source expression.
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: The basic sense is literal darkness. 'Darkness' is the standard, transparent
    rendering and preserves the starkness of the event.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - fell
  - came to be
  - occurred
  lexicon: BDAG
  rationale: γίνομαι here denotes the onset of a condition. 'Came' in the phrase 'darkness
    came over' is idiomatic English and reflects the ingressive sense without sounding
    wooden.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  chosen: over all the land
  alternatives:
  - over the whole land
  - over all the earth
  lexicon: BDAG
  rationale: γῆ can mean 'land' or 'earth.' In this passion narrative context, 'land'
    is the more contextually restrained rendering, avoiding an unnecessary claim of
    global extent while still allowing readers to sense the event's gravity. 'All
    the earth' remains a viable lexical alternative and is preserved in a footnote.
- source_word: ἕως ὥρας ἐνάτης
  chosen: until the ninth hour
  alternatives:
  - until three in the afternoon
  lexicon: BDAG
  rationale: This preserves the source time expression in the main text. The ninth
    hour is approximately 3 p.m.; that explanatory equivalent is better suited to
    a footnote than the main text.
