id: MAT.27.63
reference: Matthew 27:63
source:
  edition: SBLGNT
  text: λέγοντες· Κύριε, ἐμνήσθημεν ὅτι ἐκεῖνος ὁ πλάνος εἶπεν ἔτι ζῶν· Μετὰ τρεῖς
    ἡμέρας ἐγείρομαι·
translation:
  text: saying, “Lord, we remember that that deceiver said while he was still alive,
    ‘After three days I rise.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'After three days I will rise' or 'After three days I will be raised.'
      The Greek reads a present-form verb, 'I am raised.'
    reason: alternative_reading
  - marker: b
    text: Or 'while still alive that deceiver said'.
    reason: previous_rendering
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of the speakers' address;
    'saying' preserves the participial linkage to the previous verse naturally in
    English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. In this address to Pilate, 'Lord' is the most natural
    respectful title and also matches the project's default rendering for κύριος.
    'Sir' is possible in context, but 'Lord' better reflects the lexical form and
    established title usage without implying divinity here.
- source_word: ἐμνήσθημεν
  chosen: we remember
  alternatives:
  - we remembered
  - we recalled
  lexicon: BDAG
  rationale: Aorist middle/passive of μιμνῄσκομαι can be rendered as an ingressive
    or simple past, but in English direct speech 'we remember' is idiomatic and conveys
    the present relevance of the recollection. This is an optimal-equivalence smoothing
    rather than a strict past-tense rendering.
- source_word: ἐκεῖνος
  chosen: that
  alternatives:
  - that one
  lexicon: BDAG
  rationale: Demonstrative used with a pejorative noun; 'that' preserves the distancing
    force in natural English.
- source_word: ὁ πλάνος
  chosen: that deceiver
  alternatives:
  - that impostor
  - that misleader
  lexicon: BDAG
  rationale: πλάνος denotes one who leads astray or deceives. 'Deceiver' is the clearest
    idiomatic rendering in this hostile speech context. The article plus demonstrative
    is represented by 'that deceiver.'
- source_word: ἔτι ζῶν
  chosen: while still alive
  alternatives:
  - while he was still living
  - still alive
  lexicon: BDAG
  rationale: The adverb-participle combination marks the time of the statement relative
    to his death. 'While still alive' is concise and natural.
- source_word: Μετὰ τρεῖς ἡμέρας
  chosen: After three days
  alternatives:
  - In three days
  lexicon: BDAG
  rationale: μετά with the accusative normally means 'after.' Although the phrase
    can overlap idiomatically with 'on the third day' in Jewish time reckoning, the
    translation should reflect the Greek wording here and not harmonize it.
- source_word: ἐγείρομαι
  chosen: I am raised
  alternatives:
  - I rise
  - I will be raised
  - I am resurrected
  lexicon: BDAG
  rationale: Present passive/middle form of ἐγείρω. 'I am raised' preserves the passive
    sense and avoids importing an explicit future auxiliary not present in the Greek.
    'I rise' would tilt toward an intransitive active sense; 'I will be raised' is
    interpretively smoother but less formally tied to the present form.
