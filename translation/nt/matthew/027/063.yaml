theological_decisions:
- issue: Rendering Jesus' quoted resurrection prediction
  chosen_reading: After three days I am raised
  alternative_readings:
  - After three days I will rise
  - After three days I will be raised
  rationale: The Greek quotation uses present ἐγείρομαι, and the translation preserves
    that form as much as readable English allows. This avoids harmonizing with other
    resurrection-prediction phrasings and preserves the textual wording, while still
    clearly referring to resurrection.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
