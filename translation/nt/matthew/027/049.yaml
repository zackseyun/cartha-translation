id: MAT.27.49
reference: Matthew 27:49
source:
  edition: SBLGNT
  text: οἱ δὲ λοιποὶ ⸀ἔλεγον· Ἄφες ἴδωμεν εἰ ἔρχεται Ἠλίας σώσων ⸀αὐτόν.
translation:
  text: But the rest said, “Leave him alone. Let us see whether Elijah is coming to
    save him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the others said.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Let us see if Elijah comes to save him.' The Greek uses a present tense
      ('is coming') in an indirect question introduced by 'whether.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  chosen: But the rest
  alternatives:
  - But the others
  - But the remaining ones
  lexicon: BDAG
  rationale: λοιποί refers to those remaining in contrast to the prior speaker(s).
    'The rest' is natural modern English and preserves the contrast introduced by
    δέ.
- source_word: ἔλεγον
  chosen: said
  alternatives:
  - were saying
  - kept saying
  lexicon: BDAG
  rationale: The imperfect can suggest continued or repeated speech, but in English
    narrative 'said' is the most idiomatic rendering here without overtranslating
    aspect. The plural subject is already explicit.
- source_word: Ἄφες
  chosen: Leave him alone
  alternatives:
  - Leave it
  - Let be
  - Stop
  lexicon: BDAG
  rationale: Although literally singular imperative 'leave' or 'permit,' in context
    it is directed toward the one offering sour wine and means to stop interfering
    with Jesus so they can observe what happens. 'Leave him alone' makes the implied
    object clear in English.
- source_word: ἴδωμεν
  chosen: Let us see
  alternatives:
  - Let us find out
  - Let us watch
  lexicon: BDAG
  rationale: First person plural aorist subjunctive in hortatory use. 'Let us see'
    is the standard and most direct English equivalent.
- source_word: εἰ ἔρχεται
  chosen: whether ... is coming
  alternatives:
  - if ... comes
  - whether ... will come
  lexicon: BDAG
  rationale: εἰ here introduces an indirect question, best rendered 'whether.' The
    present tense ἔρχεται is naturally conveyed as 'is coming,' though English also
    allows a future sense; the chosen wording preserves the immediacy of the scene.
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name.
- source_word: σώσων αὐτόν
  chosen: to save him
  alternatives:
  - to rescue him
  lexicon: BDAG
  rationale: 'The future participle σώσων expresses purpose or intended result with
    ἔρχεται: Elijah is coming ''to save'' him. ''Save'' preserves the lexical link
    to σῴζω and fits the immediate sense of deliverance from death, while also resonating
    with the mockery in context.'
