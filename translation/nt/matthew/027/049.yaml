theological_decisions:
- issue: Potential theological overtones of σῴζω in the crucifixion context
  chosen_reading: Rendered σώσων αὐτόν as 'to save him' in its immediate narrative
    sense of physical deliverance/rescue.
  alternative_readings:
  - to rescue him
  rationale: The mockers are speaking about visible deliverance from the cross, not
    making a doctrinal statement about eternal salvation. 'Save him' is still preferred
    because it is the ordinary rendering of σῴζω and preserves the irony of the passion
    narrative without importing extra theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
