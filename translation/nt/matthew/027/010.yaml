id: MAT.27.10
reference: Matthew 27:10
source:
  edition: SBLGNT
  text: καὶ ἔδωκαν αὐτὰ εἰς τὸν ἀγρὸν τοῦ κεραμέως, καθὰ συνέταξέν μοι κύριος.
translation:
  text: and they gave them for the potter's field, just as the Lord directed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commanded me' or 'instructed me' for 'directed me.'
    reason: lexical_alternative
  - marker: b
    text: Matthew preserves the first-person wording 'me' in this prophetic citation/allusion
      rather than smoothing it to the narrative context.
    reason: cross_reference
lexical_decisions:
- source_word: ἔδωκαν
  chosen: they gave
  alternatives:
  - they paid
  - they put
  lexicon: BDAG
  rationale: Aorist active indicative of δίδωμι, with the straightforward sense 'gave.'
    In context it refers to the disposition of the silver pieces. 'Paid' is possible
    contextually but is more interpretive than the Greek verb itself.
- source_word: αὐτὰ
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: Neuter plural pronoun, referring back to the silver coins/pieces mentioned
    in the surrounding context. English 'them' preserves the plural reference better
    than a collective singular 'it.'
- source_word: εἰς τὸν ἀγρὸν
  chosen: for the ... field
  alternatives:
  - into the field
  - to the field
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into,' here with δίδωμι in a purchase/disposition
    context it is idiomatic for giving money for/acquiring something. 'For the field'
    best reflects the sense in English.
- source_word: τοῦ κεραμέως
  chosen: the potter's
  alternatives:
  - the potter
  lexicon: BDAG
  rationale: 'Genitive singular of κεραμεύς, naturally rendered as a possessive in
    English: ''the potter''s field.'' This is also the established sense in the immediate
    narrative context.'
- source_word: καθὰ
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: BDAG
  rationale: Introduces correspondence with what follows. 'Just as' gives a natural
    English equivalent while preserving the comparative force.
- source_word: συνέταξέν
  chosen: directed
  alternatives:
  - commanded
  - ordered
  - instructed
  lexicon: BDAG
  rationale: συντάσσω can mean 'order, direct, command.' 'Directed' fits modern readable
    English and avoids sounding harsher than the context requires, while still conveying
    authoritative instruction.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: Dative pronoun after συνέταξέν. English idiom with 'directed' normally
    takes a direct object ('directed me'), though 'commanded me' would more literally
    preserve the dative relation. The chosen rendering is natural and accurate in
    sense.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article is present in Greek,
    so 'the Lord' is appropriate here.
