theological_decisions:
- issue: Speaker reference in the quotation/allusion
  chosen_reading: Retain first-person 'me' as in the Greek, without attempting to
    resolve the broader citation-composite issue in the translation itself.
  alternative_readings:
  - Some translations smooth the line to fit the surrounding narrative or OT source
    wording more explicitly.
  rationale: The Greek text has μοι ('me'), and the translation should preserve that
    wording rather than harmonize or paraphrase. This maintains transparency to the
    source and preserves the textual/theological tension surrounding Matthew's citation
    practice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
