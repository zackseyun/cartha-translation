  category: awkward_english
  tier: 1
  from: he departed, and went away and hanged himself
  to: he departed, and went and hanged himself
  rationale: 'The Greek text uses two verbs of departure: ἀνεχώρησεν (he departed) and the participle ἀπελθὼν (having gone away). Rendering them as ''he departed, and went away...'' creates a slight semantic redundancy and clunky rhythm in English. The construction of a participle of motion plus a main verb (ἀπελθὼν ἀπήγξατο) is very commonly and idiomatically rendered in English as ''went and [verb-ed]''. Changing ''went away and hanged himself'' to ''went and hanged himself'' improves the English flow and is a more standard translation of this Greek idiom, without losing any essential meaning.'
