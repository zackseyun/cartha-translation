id: MAT.27.5
reference: Matthew 27:5
source:
  edition: SBLGNT
  text: καὶ ῥίψας τὰ ἀργύρια ⸂εἰς τὸν ναὸν⸃ ἀνεχώρησεν, καὶ ἀπελθὼν ἀπήγξατο.
translation:
  text: And after throwing the silver into the temple, he departed, and went and hanged himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the sanctuary'; the Greek uses naos, which often refers specifically to the temple sanctuary rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'he departed, and went away and hanged himself'.
    reason: previous_rendering
lexical_decisions:
- source_word: ῥίψας
  chosen: after throwing
  alternatives:
  - throwing
  - having thrown
  - flinging
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'after throwing' makes the action sequence explicit in natural English without over-paraphrasing.
- source_word: τὰ ἀργύρια
  chosen: the silver
  alternatives:
  - the silver coins
  - the money
  lexicon: BDAG
  rationale: Literally 'the silver'; in context it refers to the returned payment. 'The silver' preserves the lexical form and alludes to the known sum without adding 'coins' explicitly to the main text.
- source_word: εἰς τὸν ναὸν
  chosen: into the temple
  alternatives:
  - into the sanctuary
  - into the temple sanctuary
  lexicon: BDAG
  rationale: ναός commonly denotes the temple sanctuary rather than the broader temple complex (ἱερόν). 'Temple' is retained in the main text for readability, while the more specific nuance is preserved in a footnote.
- source_word: ἀνεχώρησεν
  chosen: he departed
  alternatives:
  - he withdrew
  - he left
  lexicon: BDAG
  rationale: The verb means to depart or withdraw. 'Departed' is concise and fits the solemn narrative tone better than the more colloquial 'left.'
- source_word: ἀπελθὼν
  chosen: went away
  alternatives:
  - having gone away
  - going off
  lexicon: BDAG
  rationale: This participle is distinct from ἀνεχώρησεν and should not be collapsed entirely. 'Went away' preserves the second movement in idiomatic English.
- source_word: ἀπήγξατο
  chosen: hanged himself
  alternatives:
  - strangled himself
  lexicon: BDAG
  rationale: The middle voice indicates a self-directed action. In this context the standard and most likely sense is suicide by hanging; 'hanged himself' is the clearest idiomatic rendering.
