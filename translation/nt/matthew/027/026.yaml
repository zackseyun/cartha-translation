id: MAT.27.26
reference: Matthew 27:26
source:
  edition: SBLGNT
  text: τότε ἀπέλυσεν αὐτοῖς τὸν Βαραββᾶν, τὸν δὲ Ἰησοῦν φραγελλώσας παρέδωκεν ἵνα
    σταυρωθῇ.
translation:
  text: Then he released Barabbas to them, but after flogging Jesus, he handed him
    over to be crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after scourging Jesus.' The Greek verb refers to the Roman punishment
      of whipping/flogging.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: A straightforward temporal/sequential adverb. 'Then' preserves the narrative
    progression naturally in English.
- source_word: ἀπέλυσεν
  chosen: released
  alternatives:
  - set free
  - freed
  lexicon: BDAG
  rationale: In this judicial context, ἀπολύω refers to releasing a prisoner. 'Released'
    is precise and idiomatic without over-paraphrasing.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: The dative indicates the people as the recipients/beneficiaries of the
    release. 'To them' is the most direct rendering.
- source_word: Βαραββᾶν
  chosen: Barabbas
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks contrast between Barabbas's release and Jesus's treatment.
    'But' brings out that contrast better than a simple connective.
- source_word: Ἰησοῦν
  chosen: Jesus
  rationale: Personal name transliterated by standard convention.
- source_word: φραγελλώσας
  chosen: after flogging
  alternatives:
  - having flogged
  - after scourging
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as antecedent action
    relative to the main verb. 'After flogging' is clear modern English. 'Scourging'
    is possible but less accessible; 'flogging' communicates the punishment plainly.
- source_word: παρέδωκεν
  chosen: he handed him over
  alternatives:
  - delivered him over
  - turned him over
  lexicon: BDAG
  rationale: παραδίδωμι in passion contexts often carries the sense of handing someone
    over to authorities for a stated fate. 'Handed him over' is idiomatic and preserves
    the judicial force.
- source_word: ἵνα σταυρωθῇ
  chosen: to be crucified
  alternatives:
  - so that he might be crucified
  - for crucifixion
  lexicon: BDAG
  rationale: ἵνα with the passive subjunctive expresses purpose/result. 'To be crucified'
    is concise, natural English that preserves the intended outcome without unnecessary
    stiffness.
