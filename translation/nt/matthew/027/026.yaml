theological_decisions:
- issue: Rendering the sequence and agency in Jesus's sentencing
  chosen_reading: Pilate released Barabbas, then after flogging Jesus, handed Jesus
    over for crucifixion.
  alternative_readings:
  - Pilate handed Jesus over and then he was flogged
  rationale: The Greek aorist participle φραγελλώσας most naturally indicates action
    preceding the main verb παρέδωκεν. The translation preserves the narrative order
    stated in the Greek without importing additional theological interpretation about
    Roman procedure.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense.'
