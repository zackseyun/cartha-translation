id: MAT.27.22
reference: Matthew 27:22
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὁ Πιλᾶτος· Τί οὖν ποιήσω Ἰησοῦν τὸν λεγόμενον χριστόν; ⸀λέγουσιν
    πάντες· Σταυρωθήτω.
translation:
  text: Pilate said to them, “What then should I do with Jesus who is called Messiah?”
    They all said, “Let him be crucified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who is called Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ποιήσω
  chosen: What then should I do
  alternatives:
  - What then am I to do
  - What then shall I do
  lexicon: BDAG
  rationale: ποιήσω is aorist subjunctive in a deliberative question, naturally rendered
    in English with 'should I do' or 'am I to do' rather than a simple future. 'Then'
    reflects οὖν as an inferential/discourse connector.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention in keeping with
    the translation philosophy.
- source_word: τὸν λεγόμενον χριστόν
  chosen: who is called Messiah
  alternatives:
  - the one called Christ
  - who is called Christ
  lexicon: BDAG
  rationale: 'λεγόμενον is a present passive participle functioning attributively:
    ''the one being called.'' Χριστός here is a title, not a name-like form, so ''Messiah''
    follows the project''s default for title usage and preserves the Jewish messianic
    sense.'
- source_word: λέγουσιν πάντες
  chosen: They all said
  alternatives:
  - All of them said
  - They all say
  lexicon: BDAG
  rationale: The historical present λέγουσιν is idiomatically rendered as past in
    English narrative for readability. πάντες is brought forward as 'all' to preserve
    the collective force.
- source_word: Σταυρωθήτω
  chosen: Let him be crucified
  alternatives:
  - Crucify him
  - Let him be put on a cross
  lexicon: BDAG
  rationale: Aorist passive imperative, third singular, is best represented by 'Let
    him be crucified.' This preserves both the imperative force and the passive form
    better than the more interpretive active paraphrase 'Crucify him.'
