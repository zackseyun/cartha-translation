theological_decisions:
- issue: Nature of the temple sign
  chosen_reading: Translate the event straightforwardly as a historical-temple curtain
    tearing without adding interpretive explanation in the main text.
  alternative_readings:
  - Symbolic reference to access to God
  - Judgment on the temple system
  rationale: The verse reports the event and accompanying signs but does not itself
    explain their theological meaning. To preserve theological tension and avoid importing
    commentary, the translation remains descriptive only.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
