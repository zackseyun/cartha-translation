id: MAT.27.51
reference: Matthew 27:51
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ τὸ καταπέτασμα τοῦ ναοῦ ἐσχίσθη ⸂ἀπ’ ἄνωθεν ἕως κάτω εἰς δύο⸃, καὶ
    ἡ γῆ ἐσείσθη, καὶ αἱ πέτραι ἐσχίσθησαν,
translation:
  text: And behold, the curtain of the temple was torn in two from top to bottom,
    and the earth shook, and the rocks were split.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'veil of the sanctuary.' The Greek καταπέτασμα can refer to the inner
      temple curtain; 'curtain' is used here as clear modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the discourse marker's force of sudden
    attention and dramatic emphasis in a solemn narrative context. 'Look' or 'see'
    are possible but sound less natural or less weighty here.
- source_word: καταπέτασμα
  chosen: curtain
  alternatives:
  - veil
  lexicon: BDAG
  rationale: Rendered 'curtain' as clear modern English for the temple hanging. 'Veil'
    is traditional and possible, but 'curtain' is more accessible while still accurate.
- source_word: ναοῦ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: Translated as 'temple' in keeping with normal English usage here. While
    ναός can more specifically denote the sanctuary rather than the whole temple complex,
    in this collocation ('curtain of the temple') 'temple' is the most natural English
    rendering; the specific inner-sanctuary sense is implicit in the reference to
    the curtain.
- source_word: ἐσχίσθη
  chosen: was torn
  alternatives:
  - was split
  - was ripped
  lexicon: BDAG
  rationale: Passive 'was torn' best matches the aorist passive and is idiomatic for
    fabric. It also preserves the eventive force without specifying an explicit agent.
- source_word: ἀπ’ ἄνωθεν ἕως κάτω
  chosen: from top to bottom
  alternatives:
  - from above to below
  lexicon: BDAG
  rationale: This is the natural English equivalent of the directional phrase and
    preserves the narrative emphasis on the direction of the tearing.
- source_word: εἰς δύο
  chosen: in two
  alternatives:
  - into two
  lexicon: BDAG
  rationale: Idiomatic English after 'torn'; 'into two' is possible but less natural.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: BDAG
  rationale: Chose 'the earth' because in this context of cosmic signs accompanying
    Jesus' death, the broader sense fits better than the more localized 'land' or
    'ground.'
- source_word: ἐσείσθη
  chosen: shook
  alternatives:
  - was shaken
  - quaked
  lexicon: BDAG
  rationale: Rendered actively in English as 'shook' for natural style, though the
    Greek is passive in form. 'Quaked' is possible but less common; 'was shaken' is
    more wooden.
- source_word: πέτραι
  chosen: rocks
  alternatives:
  - stones
  - cliffs
  lexicon: BDAG
  rationale: '''Rocks'' best conveys large rock masses in the context of an earthquake.
    ''Stones'' would sound too small and ordinary.'
- source_word: ἐσχίσθησαν
  chosen: were split
  alternatives:
  - were torn apart
  - were broken open
  lexicon: BDAG
  rationale: Used 'were split' rather than repeating 'were torn' because English naturally
    uses 'split' for rocks, while still reflecting the same Greek verb σχίζω.
