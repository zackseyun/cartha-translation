id: MAT.27.54
reference: Matthew 27:54
source:
  edition: SBLGNT
  text: Ὁ δὲ ἑκατόνταρχος καὶ οἱ μετ’ αὐτοῦ τηροῦντες τὸν Ἰησοῦν ἰδόντες τὸν σεισμὸν καὶ τὰ ⸀γενόμενα ἐφοβήθησαν σφόδρα λέγοντες· Ἀληθῶς ⸂θεοῦ υἱὸς⸃ ἦν οὗτος.
translation:
  text: Now when the centurion and those with him who were guarding Jesus saw the earthquake and the things that had happened, they were greatly afraid and said, “Truly this was the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a son of God.” The Greek expression θεοῦ υἱός lacks the article; in context, the translation takes it as a title consistent with Matthew’s presentation of Jesus.
    reason: alternative_reading
  - marker: b
    text: Or 'the centurion and those with him who were guarding Jesus'.
    reason: previous_rendering
  - marker: c
    text: Or 'those guarding Jesus with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἑκατόνταρχος
  chosen: centurion
  alternatives:
  - commander of a hundred
  lexicon: BDAG
  rationale: Standard and precise rendering for the Roman military officer; natural English equivalent.
- source_word: τηροῦντες
  chosen: were guarding
  alternatives:
  - were keeping watch over
  - were watching
  lexicon: BDAG
  rationale: In this context of soldiers at an execution site, τηρέω carries the sense of guarding/keeping watch rather than merely observing.
- source_word: ἰδόντες
  chosen: saw
  alternatives:
  - having seen
  - when they saw
  lexicon: BDAG
  rationale: Aorist participle rendered with temporal force in smooth English; the main clause naturally reads 'when ... saw'.
- source_word: σεισμόν
  chosen: earthquake
  alternatives:
  - tremor
  lexicon: BDAG
  rationale: σεισμός normally denotes an earthquake; this is the plain contextual sense in Matthew's passion narrative.
- source_word: τὰ γενόμενα
  chosen: the things that had happened
  alternatives:
  - what had happened
  - the events that had taken place
  lexicon: BDAG
  rationale: Broad phrase referring to the surrounding extraordinary events, not only the earthquake. The fuller wording preserves the plural article + participle construction.
- source_word: ἐφοβήθησαν σφόδρα
  chosen: were greatly afraid
  alternatives:
  - became very afraid
  - feared greatly
  lexicon: BDAG
  rationale: Combines the passive/deponent verb with the intensifier σφόδρα in idiomatic modern English while preserving the strong emotional force.
- source_word: Ἀληθῶς
  chosen: Truly
  alternatives:
  - Certainly
  - Surely
  lexicon: BDAG
  rationale: Retains the solemn confessional force without overinterpreting the speaker's theological precision.
- source_word: θεοῦ υἱὸς
  chosen: the Son of God
  alternatives:
  - a son of God
  - God's Son
  lexicon: BDAG
  rationale: Although the Greek lacks the article before θεοῦ υἱός, the predicate nominative construction in Matthew's narrative context strongly supports a qualitative/definite sense rather than an indefinite one. Given Matthew's Christological usage and broader context, 'the Son of God' best reflects the evangelist's presentation while remaining natural English. The indefinite alternative is preserved in a footnote because the anarthrous form is discussed in scholarship.
- source_word: οὗτος
  chosen: this
  alternatives:
  - this man
  - he
  lexicon: BDAG
  rationale: Directly reflects the demonstrative pronoun and preserves the immediacy of the utterance.
