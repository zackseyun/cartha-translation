theological_decisions:
- issue: Rendering of θεοῦ υἱὸς in the centurion's confession
  chosen_reading: the Son of God
  alternative_readings:
  - a son of God
  - God's Son
  rationale: The translation should not flatten Matthew's Christological presentation. In this Gospel, 'Son of God' is a loaded title repeatedly applied to Jesus. While the Greek construction is formally anarthrous and could be discussed as qualitative or, in some contexts, indefinite, English idiom and Matthean context favor the titular reading 'the Son of God.' To preserve interpretive transparency, the indefinite alternative is noted in a footnote rather than adopted in the main text.
  doctrine_reference: Affirmations (Nicene/Chalcedonian bounds); Translation philosophy §3 Preserve theological tension rather than resolve it
