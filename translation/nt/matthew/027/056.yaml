id: MAT.27.56
reference: Matthew 27:56
source:
  edition: SBLGNT
  text: ἐν αἷς ἦν Μαρία ἡ Μαγδαληνὴ καὶ Μαρία ἡ τοῦ Ἰακώβου καὶ ⸀Ἰωσὴφ μήτηρ καὶ ἡ
    μήτηρ τῶν υἱῶν Ζεβεδαίου.
translation:
  text: among whom were Mary Magdalene, and Mary the mother of James and Joseph, and
    the mother of the sons of Zebedee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts/readings have 'Joses' instead of 'Joseph.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐν αἷς
  chosen: among whom
  alternatives:
  - among them
  - in whom
  lexicon: BDAG
  rationale: The preposition ἐν with the relative pronoun αἷς refers back to the group
    of women in the previous verse. In idiomatic English, 'among whom' best conveys
    membership within that group; 'in whom' would be misleading, and 'among them'
    loses the relative linkage.
- source_word: ἦν
  chosen: were
  alternatives:
  - was
  lexicon: BDAG
  rationale: 'Although ἦν is singular, it commonly functions existentially with a
    compound subject/list following. English requires plural agreement with the listed
    women: ''were.'''
- source_word: Μαρία ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mary the Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration and idiom render the epithet as 'Magdalene.'
    This preserves the personal name plus identifying designation without awkward
    literalism.
- source_word: Μαρία ἡ τοῦ Ἰακώβου καὶ Ἰωσὴφ μήτηρ
  chosen: Mary the mother of James and Joseph
  alternatives:
  - Mary, mother of James and Joseph
  - Mary the mother of Jacob and Joseph
  lexicon: BDAG
  rationale: The genitives with μήτηρ identify this Mary by her sons. 'James' is the
    standard English form for Ἰάκωβος in NT name usage, and 'Joseph' is the natural
    transliteration of Ἰωσήφ. Including 'the mother of' makes the appositional identification
    explicit and readable.
- source_word: Ἰάκωβος
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: As a personal name in the New Testament, Ἰάκωβος is conventionally rendered
    'James' in English. 'Jacob' would be more etymologically transparent but would
    obscure established referential usage for this NT figure.
- source_word: Ἰωσὴφ
  chosen: Joseph
  alternatives:
  - Joses
  lexicon: BDAG
  rationale: The SBLGNT here reads Ἰωσὴφ, which is best rendered 'Joseph.' Some textual
    traditions/readings have a form reflected in English as 'Joses'; that alternative
    is preserved in a footnote as a textual variant rather than adopted in the main
    text.
- source_word: ἡ μήτηρ τῶν υἱῶν Ζεβεδαίου
  chosen: the mother of the sons of Zebedee
  alternatives:
  - the mother of Zebedee's sons
  lexicon: BDAG
  rationale: This is a straightforward genitival relationship. The fuller phrasing
    is slightly more formal but clear and close to the Greek structure.
- source_word: Ζεβεδαίου
  chosen: Zebedee
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name Ζεβεδαῖος.
