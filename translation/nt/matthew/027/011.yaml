id: MAT.27.11
reference: Matthew 27:11
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς ⸀ἐστάθη ἔμπροσθεν τοῦ ἡγεμόνος· καὶ ἐπηρώτησεν αὐτὸν ὁ ἡγεμὼν
    λέγων· Σὺ εἶ ὁ βασιλεὺς τῶν Ἰουδαίων; ὁ δὲ Ἰησοῦς ⸀ἔφη· Σὺ λέγεις.
translation:
  text: Now Jesus stood before the governor, and the governor questioned him, saying,
    “Are you the King of the Jews?” And Jesus said, “You say so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You say it,” or “It is as you say.” Jesus’ reply is concise and somewhat
      elliptical in Greek.
    reason: alternative_reading
  - marker: b
    text: Or “the King of the Judeans.” The Greek term can refer either to Jews more
      broadly or, in some contexts, to Judeans specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστάθη
  chosen: stood
  alternatives:
  - was made to stand
  - was standing
  lexicon: BDAG
  rationale: Aorist passive/intransitive of ἵστημι here is naturally rendered 'stood'
    in English. 'Was standing' overstates durative aspect, and 'was made to stand'
    imports causation not explicit in the context.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise, idiomatic, and preserves the formal judicial
    setting. ''In front of'' is more spatially literal but less dignified; ''in the
    presence of'' is possible but more expansive than needed.'
- source_word: ἡγεμών / ἡγεμόνος
  chosen: governor
  alternatives:
  - ruler
  - prefect
  lexicon: BDAG
  rationale: '''Governor'' is the standard and clearest rendering for the Roman official
    in this context. ''Prefect'' may be historically specific for Pilate but is too
    technical for the translation text; ''ruler'' is too broad.'
- source_word: ἐπηρώτησεν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: The verb indicates asking a question in a formal setting. 'Questioned'
    fits the judicial context better than the simpler 'asked,' while 'interrogated'
    may sound too forceful for the Greek alone.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Rendering the participle as 'saying' preserves the Greek structure naturally
    in English without unnecessary expansion.
- source_word: βασιλεὺς
  chosen: King
  alternatives:
  - king
  lexicon: BDAG
  rationale: Capitalized 'King' is appropriate here because it functions as a specific
    royal title in direct discourse about Jesus' claimed status. The capitalization
    does not add content but reflects titular usage in English.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: In the passion narrative this phrase is conventionally and contextually
    political-ethnic, referring to the Jewish people as represented in Roman accusation
    language. 'Judeans' is lexically possible, but 'Jews' is the more natural and
    widely understood rendering here.
- source_word: ἔφη
  chosen: said
  alternatives:
  - answered
  - declared
  lexicon: BDAG
  rationale: The verb φημί here simply introduces Jesus' reply. 'Said' is the most
    direct equivalent; 'answered' is interpretive though contextually true.
- source_word: Σὺ λέγεις
  chosen: You say so
  alternatives:
  - You say it
  - You have said so
  - It is as you say
  lexicon: BDAG
  rationale: The expression is elliptical and somewhat restrained. 'You say so' preserves
    the ambiguity and indirectness better than the more explicit 'It is as you say,'
    which can over-resolve the nuance. 'You have said so' is possible but less natural
    in contemporary English.
