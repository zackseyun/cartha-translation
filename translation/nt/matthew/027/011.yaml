theological_decisions:
- issue: Nuance of Jesus' reply Σὺ λέγεις
  chosen_reading: An indirect, qualified affirmation rendered as 'You say so.'
  alternative_readings:
  - 'A direct affirmation: ''It is as you say'''
  - 'A more literal but less idiomatic reply: ''You say [it]'''
  rationale: The Greek wording preserves a measured response that neither flatly denies
    nor states the claim in the governor's political framing without qualification.
    Following the translation philosophy, the rendering should preserve this tension
    rather than resolve it into an unambiguous confession or denial.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
