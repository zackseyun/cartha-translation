id: MAT.27.20
reference: Matthew 27:20
source:
  edition: SBLGNT
  text: Οἱ δὲ ἀρχιερεῖς καὶ οἱ πρεσβύτεροι ἔπεισαν τοὺς ὄχλους ἵνα αἰτήσωνται τὸν
    Βαραββᾶν τὸν δὲ Ἰησοῦν ἀπολέσωσιν.
translation:
  text: But the chief priests and the elders persuaded the crowds to ask for Barabbas,
    but to destroy Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'put Jesus to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Here δέ marks contrast with the preceding narrative development, so 'But'
    best reflects the adversative force in natural English.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: '''Chief priests'' is the standard and accurate rendering for the Jerusalem
    priestly leadership, not a single high priest.'
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  - leaders
  lexicon: BDAG
  rationale: In this context the term refers to recognized Jewish leaders, so 'elders'
    preserves both the institutional and historical sense.
- source_word: ἔπεισαν
  chosen: persuaded
  alternatives:
  - convinced
  - induced
  lexicon: BDAG
  rationale: The aorist indicates a completed act of influencing the crowds; 'persuaded'
    is the most direct and idiomatic rendering.
- source_word: ὄχλους
  chosen: crowds
  alternatives:
  - multitudes
  - people
  lexicon: BDAG
  rationale: Plural ὄχλους is best represented by 'crowds,' preserving the plural
    and the sense of gathered masses.
- source_word: ἵνα
  chosen: to
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: After a verb of persuasion, ἵνα with the subjunctive expresses intended
    result/content. English infinitives ('to ask... to destroy') render this smoothly
    without loss of meaning.
- source_word: αἰτήσωνται
  chosen: ask for
  alternatives:
  - request
  - demand
  lexicon: BDAG
  rationale: The middle subjunctive here means to request for themselves or on their
    own behalf; 'ask for' is natural and sufficiently precise.
- source_word: Βαραββᾶν
  chosen: Barabbas
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἀπολέσωσιν
  chosen: destroy
  alternatives:
  - put to death
  - kill
  lexicon: BDAG
  rationale: ἀπόλλυμι here means to cause someone to perish. 'Destroy' preserves the
    lexical force and reflects the Greek more directly than the more interpretive
    'put to death,' while still fitting the judicial context.
- source_word: τὸν δὲ Ἰησοῦν
  chosen: but Jesus
  alternatives:
  - and Jesus
  - while Jesus
  lexicon: BDAG
  rationale: 'The repeated δέ sets Barabbas and Jesus in contrast: ask for Barabbas,
    but destroy Jesus.'
