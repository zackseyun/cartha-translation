theological_decisions:
- issue: Rendering of ἀπολέσωσιν in a judicial execution context
  chosen_reading: destroy Jesus
  alternative_readings:
  - put Jesus to death
  - kill Jesus
  rationale: The Greek verb is broader than a technical execution term and literally
    means 'destroy' or 'cause to perish.' The translation preserves the lexical force
    without importing a narrower legal expression not explicitly used in the text.
    Because modern English readers may hear 'destroy' as less concrete, an execution-oriented
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
