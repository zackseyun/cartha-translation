theological_decisions:
- issue: Rendering χολή in relation to the passion narrative and Psalmic resonance
  chosen_reading: gall
  alternative_readings:
  - bitter substance
  rationale: The Greek term can denote gall/bile or something bitter. 'Gall' preserves
    the lexical specificity of Matthew's wording and its likely scriptural resonance,
    while avoiding unnecessary interpretive expansion in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
