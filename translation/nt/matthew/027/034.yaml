id: MAT.27.34
reference: Matthew 27:34
source:
  edition: SBLGNT
  text: ἔδωκαν αὐτῷ πιεῖν ⸀οἶνον μετὰ χολῆς μεμιγμένον· καὶ γευσάμενος οὐκ ⸀ἠθέλησεν
    πιεῖν.
translation:
  text: They gave him wine mixed with gall to drink, but after tasting it, he was
    unwilling to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: χολή can mean 'gall' or more generally a bitter substance. The translation
      keeps 'gall' to reflect Matthew's wording; compare the related passion account
      in Mark 15:23, which mentions myrrh.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν
  chosen: They gave
  alternatives:
  - they offered
  lexicon: BDAG
  rationale: Aorist active indicative of δίδωμι, straightforwardly 'they gave.' 'Offered'
    is possible in context, but 'gave' more directly reflects the verb while remaining
    natural English.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of ἔδωκαν.
- source_word: πιεῖν
  chosen: to drink
  lexicon: BDAG
  rationale: Complementary infinitive with ἔδωκαν, expressing what was given to him
    to do.
- source_word: οἶνον
  chosen: wine
  lexicon: BDAG
  rationale: The ordinary Greek term for wine; no contextual reason to weaken it to
    a vaguer term like 'drink.'
- source_word: μετὰ χολῆς
  chosen: mixed with gall
  alternatives:
  - with gall
  - mingled with gall
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' χολή can denote 'gall' literally
    and, by extension, something bitter. 'Gall' preserves the lexical form and the
    traditional/canonical resonance, while the participle supplies the idea of mixing.
- source_word: μεμιγμένον
  chosen: mixed
  alternatives:
  - mingled
  lexicon: BDAG
  rationale: Perfect passive participle of μίγνυμι modifying 'wine.' 'Mixed' is clear
    modern English; 'mingled' is more traditional but less natural.
- source_word: καὶ γευσάμενος
  chosen: but after tasting it
  alternatives:
  - and after tasting it
  - and having tasted it
  lexicon: BDAG
  rationale: γευσάμενος means 'having tasted.' The conjunction καί is rendered adversatively
    as 'but' in English because the narrative contrast is immediately developed by
    his refusal to drink; this is a natural discourse-level rendering within optimal
    equivalence.
- source_word: οὐκ ἠθέλησεν
  chosen: he was unwilling
  alternatives:
  - he did not want
  - he refused
  lexicon: BDAG
  rationale: θέλω denotes willing/wanting. 'Was unwilling' preserves the volitional
    nuance without overinterpreting as a more forceful 'refused,' though that is contextually
    close.
- source_word: πιεῖν
  chosen: to drink
  lexicon: BDAG
  rationale: Infinitive complement to ἠθέλησεν, indicating the action he was unwilling
    to do.
