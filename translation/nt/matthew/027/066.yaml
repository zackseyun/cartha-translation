theological_decisions:
- issue: Meaning of μετὰ τῆς κουστωδίας in relation to securing the tomb
  chosen_reading: The tomb was secured by sealing the stone, with the guard also involved/present.
  alternative_readings:
  - The tomb was secured by sealing the stone and setting a guard
  - The tomb was secured in the presence of the guard
  rationale: The Greek phrase is compact and can be understood as accompaniment rather than a separate finite action. The translation preserves the wording without importing a more explicit procedural sequence than the text states. This avoids resolving whether the emphasis is on posting the guard or on the guard's presence during the sealing.
  doctrine_reference: Preserve theological tension rather than resolve it.
