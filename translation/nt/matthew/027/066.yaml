id: MAT.27.66
reference: Matthew 27:66
source:
  edition: SBLGNT
  text: οἱ δὲ πορευθέντες ἠσφαλίσαντο τὸν τάφον σφραγίσαντες τὸν λίθον μετὰ τῆς κουστωδίας.
translation:
  text: So they went and secured the tomb by sealing the stone with the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the watch' or possibly 'by sealing the stone and setting a guard.' The Greek phrase is concise and may indicate accompaniment rather than a separate action.
    reason: alternative_reading
  - marker: b
    text: Or 'by sealing the stone, along with the guard'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἱ δὲ πορευθέντες
  chosen: So they went
  alternatives:
  - Then they went
  - And they went away
  lexicon: BDAG
  rationale: The participle πορευθέντες is attendant to the main verb and is naturally rendered as a finite verb in English. δέ here marks narrative continuation; 'So' gives smooth English progression without overstating contrast.
- source_word: ἠσφαλίσαντο
  chosen: secured
  alternatives:
  - made secure
  - secured carefully
  lexicon: BDAG
  rationale: ἀσφαλίζω means to make secure or ensure safety/security. 'Secured' is idiomatic modern English and fits the context of taking measures to prevent tampering with the tomb.
- source_word: τὸν τάφον
  chosen: the tomb
  alternatives:
  - the grave
  - the sepulcher
  lexicon: BDAG
  rationale: τάφος in this context refers to Jesus's burial place. 'Tomb' is the standard clear rendering in modern English.
- source_word: σφραγίσαντες
  chosen: by sealing
  alternatives:
  - sealing
  - having sealed
  lexicon: BDAG
  rationale: The aorist participle expresses means or attendant action explaining how they secured the tomb. 'By sealing' best conveys the instrumental sense in natural English.
- source_word: τὸν λίθον
  chosen: the stone
  alternatives:
  - the entrance stone
  lexicon: BDAG
  rationale: λίθος here is the stone placed at the tomb entrance. 'The stone' is sufficient and traditional without adding details not explicit in the Greek.
- source_word: μετὰ τῆς κουστωδίας
  chosen: along with the guard
  alternatives:
  - with the guard
  - with the watch
  lexicon: BDAG
  rationale: 'κουστωδία, a Latin loanword, refers to a guard detail/watch. μετὰ with the genitive most naturally means accompaniment: the sealing occurred in connection with the guard being present or posted. ''Along with the guard'' preserves that accompaniment without overdefining whether the guard is Roman or temple police.'
