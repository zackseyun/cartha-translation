id: MAT.27.16
reference: Matthew 27:16
source:
  edition: SBLGNT
  text: εἶχον δὲ τότε δέσμιον ἐπίσημον λεγόμενον ⸀Ἰησοῦν Βαραββᾶν.
translation:
  text: Now at that time they had a notorious prisoner called Jesus Barabbas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read simply 'Barabbas,' omitting 'Jesus.'
    reason: textual_variant
lexical_decisions:
- source_word: εἶχον
  chosen: they had
  alternatives:
  - there was
  lexicon: BDAG
  rationale: Imperfect of ἔχω with an unspecified plural subject naturally renders
    as 'they had,' likely referring to the governing authorities or those in custody.
    'There was' is smoother English but obscures the verbal idea of possession/custody
    present in the Greek.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' gives a natural narrative transition in
    modern English without overstating sequence. It is better than omitting it entirely
    for preserving discourse flow.
- source_word: τότε
  chosen: at that time
  alternatives:
  - then
  lexicon: BDAG
  rationale: τότε is temporal. 'At that time' preserves the explicit temporal sense
    and avoids redundancy with the connective if δέ were rendered 'then.'
- source_word: δέσμιον
  chosen: prisoner
  alternatives:
  - captive
  lexicon: BDAG
  rationale: δέσμιος refers to one held in custody. 'Prisoner' is the standard, clear
    modern equivalent in this judicial context.
- source_word: ἐπίσημον
  chosen: notorious
  alternatives:
  - well-known
  - prominent
  lexicon: BDAG
  rationale: In this context, referring to Barabbas as a prisoner, ἐπίσημος most likely
    carries the sense of being well known in a bad sense, hence 'notorious.' 'Well-known'
    is lexically possible but too neutral in English for the narrative setting.
- source_word: λεγόμενον
  chosen: called
  alternatives:
  - named
  - known as
  lexicon: BDAG
  rationale: The participle λεγόμενον commonly introduces a name or designation. 'Called'
    is idiomatic and straightforward.
- source_word: Ἰησοῦν Βαραββᾶν
  chosen: Jesus Barabbas
  alternatives:
  - Barabbas
  lexicon: BDAG
  rationale: The SBLGNT text includes the personal name Ἰησοῦν before Βαραββᾶν, so
    the translation should reflect the source text directly as 'Jesus Barabbas.' Because
    many manuscripts and translations omit 'Jesus,' the shorter form is preserved
    in a footnote as a textual variant rather than adopted in the main text.
