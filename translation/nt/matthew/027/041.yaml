id: MAT.27.41
reference: Matthew 27:41
source:
  edition: SBLGNT
  text: ὁμοίως ⸀καὶ οἱ ἀρχιερεῖς ἐμπαίζοντες μετὰ τῶν γραμματέων καὶ ⸀πρεσβυτέρων
    ἔλεγον·
translation:
  text: Likewise, the chief priests also were mocking him, together with the scribes
    and elders, and were saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Similarly, the chief priests also, with the scribes and elders, were
      mocking him and saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Adverb marking correspondence with the preceding mockery scene; 'Likewise'
    is concise and natural while preserving the comparative force.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: Here καί adds the chief priests to the already-mentioned mockers. Rendering
    it as 'also' captures the additive sense better than a simple connective 'and'.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not a plurality of high priests in the singular office sense.
- source_word: ἐμπαίζοντες
  chosen: were mocking him
  alternatives:
  - mocking him
  - ridiculing him
  - making fun of him
  lexicon: BDAG
  rationale: The participle denotes derisive mockery. Supplying 'him' is warranted
    by the immediate context of Jesus as the object of the taunts. The periphrastic
    English 'were mocking' fits the ongoing action alongside the imperfect main verb.
- source_word: μετὰ
  chosen: together with
  alternatives:
  - with
  - along with
  lexicon: BDAG
  rationale: The preposition with the genitive indicates association. 'Together with'
    makes clear that the scribes and elders joined the chief priests in the mockery.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct and established rendering for γραμματεῖς in
    Gospel narrative contexts; ''teachers of the law'' is more interpretive.'
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - leaders
  - older men
  lexicon: BDAG
  rationale: In this context the term refers to recognized Jewish leaders, not merely
    older males. 'Elders' preserves the institutional sense.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'Were saying' preserves
    that aspect without overinterpreting repetition.
