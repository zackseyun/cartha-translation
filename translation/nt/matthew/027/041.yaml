theological_decisions:
- issue: Identification of the mocking parties
  chosen_reading: The verse names the chief priests, scribes, and elders as participating
    together in the mockery of Jesus.
  alternative_readings:
  - The phrase could be read more loosely as the chief priests mocking in the presence
    of the scribes and elders.
  rationale: The syntax with μετὰ plus genitive most naturally indicates association
    in the action, not mere proximity. This is a narrative-historical decision rather
    than a doctrinal expansion.
