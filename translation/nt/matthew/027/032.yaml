theological_decisions:
- issue: Referent of αὐτοῦ ('his')
  chosen_reading: The pronoun refers to Jesus, yielding 'his cross' in context.
  alternative_readings:
  - The pronoun could be misunderstood in English as referring to Simon if isolated
    from context.
  rationale: Narrative context makes Jesus the intended referent, since Simon is being
    compelled to carry the condemned man's cross. The translation preserves the Greek
    pronoun rather than replacing it with 'Jesus' cross,' but the decision is documented
    because English readers could momentarily perceive ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently resolves the referent, so no doctrinally driven ambiguity
    is being imposed or removed.
