id: MAT.27.32
reference: Matthew 27:32
source:
  edition: SBLGNT
  text: Ἐξερχόμενοι δὲ εὗρον ἄνθρωπον Κυρηναῖον ὀνόματι Σίμωνα· τοῦτον ἠγγάρευσαν
    ἵνα ἄρῃ τὸν σταυρὸν αὐτοῦ.
translation:
  text: And as they were going out, they found a man of Cyrene named Simon. They compelled
    this man to carry his cross.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they forced' or 'they pressed into service.' The Greek verb refers to
      compulsory service imposed by authority.
    reason: lexical_alternative
  - marker: b
    text: That is, Jesus' cross.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐξερχόμενοι
  chosen: as they were going out
  alternatives:
  - as they went out
  - while going out
  lexicon: BDAG
  rationale: Present participle with temporal force; rendered as an ongoing action
    contemporaneous with the main verb. 'As they were going out' is natural English
    and preserves the participial sense better than a simple finite verb.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' best fits readable modern English while preserving discourse
    flow.
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they came upon
  lexicon: BDAG
  rationale: Aorist indicative of εὑρίσκω is straightforwardly rendered 'they found.'
    No contextual reason requires a more idiomatic expansion.
- source_word: ἄνθρωπον Κυρηναῖον
  chosen: a man of Cyrene
  alternatives:
  - a Cyrenian man
  - a man, a Cyrenian
  lexicon: BDAG
  rationale: Κυρηναῖον identifies the man by geographic origin. 'A man of Cyrene'
    is idiomatic English and preserves the ethnic/geographic sense without awkwardness.
- source_word: ὀνόματι Σίμωνα
  chosen: named Simon
  alternatives:
  - by name Simon
  lexicon: BDAG
  rationale: Dative ὀνόματι with a proper name is a standard idiom meaning 'named
    Simon.' This is the clearest natural English equivalent.
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - him
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek. Rendering it as 'this man' preserves
    the emphasis better than the reduced pronoun 'him,' while remaining natural in
    English.
- source_word: ἠγγάρευσαν
  chosen: they compelled
  alternatives:
  - they forced
  - they pressed into service
  lexicon: BDAG
  rationale: ἀγγαρεύω refers to impressing someone into service by authority. 'Compelled'
    captures the coercive sense in concise modern English; 'pressed into service'
    is more explanatory but less direct.
- source_word: ἵνα ἄρῃ
  chosen: to carry
  alternatives:
  - so that he might carry
  - to take up
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. In English, an infinitive
    of purpose is the most natural rendering here. αἴρω can mean 'lift, take up, carry';
    in context of the cross procession, 'carry' is the clearest.
- source_word: τὸν σταυρὸν
  chosen: cross
  alternatives:
  - crossbeam
  lexicon: BDAG
  rationale: σταυρός is conventionally and accurately rendered 'cross.' Although some
    historical discussions distinguish the crossbeam, the Greek term itself here does
    not require that narrower specification.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - Jesus'
  lexicon: BDAG
  rationale: 'The pronoun most naturally refers to Jesus in context: Simon is compelled
    to carry Jesus'' cross. The main text keeps the Greek pronoun as ''his'' rather
    than resolving it by explicit substitution, preserving the source wording while
    remaining clear enough in context.'
