id: MAT.27.38
reference: Matthew 27:38
source:
  edition: SBLGNT
  text: Τότε σταυροῦνται σὺν αὐτῷ δύο λῃσταί, εἷς ἐκ δεξιῶν καὶ εἷς ἐξ εὐωνύμων.
translation:
  text: Then two robbers are crucified with him, one on the right and one on the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bandits'; the Greek term can refer to violent robbers and may in some
      contexts overlap with insurgent activity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next event in the narrative sequence; 'Then'
    is the most natural concise English equivalent.
- source_word: σταυροῦνται
  chosen: are crucified
  alternatives:
  - are being crucified
  - are impaled on crosses
  lexicon: BDAG
  rationale: Present passive indicative in narrative context. English historical present
    can sound awkward here, so 'are crucified' preserves the vividness and passive
    sense without over-paraphrase. 'Crucified' is the standard and accurate rendering
    of σταυρόω.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With him' is sufficient
    and idiomatic.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Cardinal number directly modifying λῃσταί.
- source_word: λῃσταί
  chosen: robbers
  alternatives:
  - bandits
  - insurrectionists
  lexicon: BDAG
  rationale: λῃστής commonly denotes a robber or bandit, often one who uses violence.
    'Robbers' is the clearest default in English and aligns with common Gospel usage,
    while 'bandits' is possible. 'Insurrectionists' may over-specify beyond what this
    verse alone states.
- source_word: εἷς ἐκ δεξιῶν
  chosen: one on the right
  alternatives:
  - one at the right side
  - one from the right
  lexicon: BDAG
  rationale: 'Idiomatic spatial expression. Although literally ''one from the right(s),''
    the sense is positional: one on the right side.'
- source_word: καὶ εἷς ἐξ εὐωνύμων
  chosen: and one on the left
  alternatives:
  - and one at the left side
  lexicon: BDAG
  rationale: εὐώνυμος literally relates to the left side; in this idiom it contrasts
    with δεξιῶν. 'On the left' is the natural English rendering.
