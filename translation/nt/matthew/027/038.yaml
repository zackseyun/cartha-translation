theological_decisions:
- issue: Identity of λῃσταί
  chosen_reading: Rendered as 'robbers' without importing a more specific political
    meaning.
  alternative_readings:
  - bandits
  - insurrectionists
  rationale: The term can denote violent robbers or bandits and in some contexts may
    overlap with revolutionary activity, but this verse itself does not require that
    narrower interpretation. The translation avoids importing historical reconstruction
    not explicit in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
