theological_decisions:
- issue: Relation of the participial phrase βάλλοντες κλῆρον to the main verb διεμερίσαντο
  chosen_reading: 'The casting of lots is rendered as the means by which the soldiers
    divided Jesus'' garments: ''they divided his garments by casting lots.'''
  alternative_readings:
  - '''they divided his garments, casting lots'''
  rationale: The Greek participle naturally modifies the main verb and explains how
    the division occurred. Rendering it with 'by' makes the relationship explicit
    in clear English without adding theological content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense in readable modern English.'
