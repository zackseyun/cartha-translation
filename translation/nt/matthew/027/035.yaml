id: MAT.27.35
reference: Matthew 27:35
source:
  edition: SBLGNT
  text: σταυρώσαντες δὲ αὐτὸν διεμερίσαντο τὰ ἱμάτια αὐτοῦ βάλλοντες κλῆρον,
translation:
  text: And after they crucified him, they divided his garments by casting lots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And when they had crucified him, they divided his garments,
      casting lots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σταυρώσαντες
  chosen: after they crucified
  alternatives:
  - having crucified
  - when they had crucified
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates action prior to the
    dividing of the garments. 'After they crucified' is natural modern English and
    preserves the temporal sequence without awkwardness.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is a simple,
    readable rendering that preserves the flow.
- source_word: διεμερίσαντο
  chosen: they divided
  alternatives:
  - they distributed
  - they apportioned
  lexicon: BDAG
  rationale: The verb means to divide up or distribute. 'Divided' best matches the
    concrete action with the clothing and aligns with the immediate context.
- source_word: τὰ ἱμάτια αὐτοῦ
  chosen: his garments
  alternatives:
  - his clothes
  - his clothing
  - his outer garments
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments/clothing. 'Garments' preserves a slightly
    more formal register suitable to the passion narrative without becoming archaic.
    'Outer garments' may be too specific for this context.
- source_word: βάλλοντες κλῆρον
  chosen: by casting lots
  alternatives:
  - casting a lot
  - throwing lots
  - by lot
  lexicon: BDAG
  rationale: This participial phrase expresses the means by which the garments were
    divided. Although κλῆρον is singular, the idiomatic English expression is 'casting
    lots.' This is the clearest natural rendering and reflects the customary practice.
