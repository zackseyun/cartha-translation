id: MAT.27.21
reference: Matthew 27:21
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ ἡγεμὼν εἶπεν αὐτοῖς· Τίνα θέλετε ἀπὸ τῶν δύο ἀπολύσω ὑμῖν;
    οἱ δὲ εἶπαν· ⸀Τὸν Βαραββᾶν.
translation:
  text: But the governor answered them, “Which of the two do you want me to release
    for you?” And they said, “Barabbas.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι functions idiomatically as a
    deponent, introducing the governor’s response. 'Answered' is natural English and
    preserves the responsive force without awkward literalism.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks a mild development/contrast in the narrative. 'But' fits
    the courtroom exchange and preserves the discourse shift better than a flat 'and.'
- source_word: ὁ ἡγεμὼν
  chosen: the governor
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: ἡγεμών in this context refers to the Roman provincial governor, i.e.,
    Pilate. 'Governor' is the standard and most precise contextual rendering.
- source_word: εἶπεν αὐτοῖς
  chosen: answered them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Although εἶπεν literally means 'said,' English commonly compresses the
    participle + finite verb construction into 'answered them.' This avoids redundancy
    ('answered and said') while preserving the sense.
- source_word: Τίνα
  chosen: Which
  alternatives:
  - Whom
  lexicon: BDAG
  rationale: The interrogative asks for selection between two options. 'Which' is
    more idiomatic than 'whom' in contemporary English when choosing between specified
    alternatives.
- source_word: θέλετε
  chosen: do you want
  alternatives:
  - do you wish
  - are you willing
  lexicon: BDAG
  rationale: θέλω here expresses desire/preference. 'Do you want' is clear modern
    English and matches the directness of the scene.
- source_word: ἀπὸ τῶν δύο
  chosen: of the two
  alternatives:
  - from the two
  - out of the two
  lexicon: BDAG
  rationale: The phrase indicates selection from two presented candidates. 'Of the
    two' is idiomatic English for this partitive sense.
- source_word: ἀπολύσω ὑμῖν
  chosen: me to release for you
  alternatives:
  - me to release to you
  - that I should release for you
  lexicon: BDAG
  rationale: ἀπολύω in this legal context means 'release' or 'set free.' The first-person
    subjunctive after θέλετε is naturally rendered in English as 'do you want me to
    release.' 'For you' reflects the dative ὑμῖν in the sense of granting their requested
    release.
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - But they said
  - and they answered
  lexicon: BDAG
  rationale: This resumes the crowd’s response. 'And they said' is straightforward
    and avoids over-marking contrast where simple narrative continuation is sufficient.
- source_word: Τὸν Βαραββᾶν
  chosen: Barabbas
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The accusative article is not represented in English.
