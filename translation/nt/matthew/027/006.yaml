- issue: How to render κορβανᾶν in a way that preserves meaning without unnecessary
    transliteration
  chosen_reading: the temple treasury
  alternative_readings:
  - the treasury
  - the Corban
  rationale: The verse concerns temple funds and ritual/legal propriety, not a doctrinally
    contested term. Translating the term communicates the sense clearly for modern
    readers while a footnote preserves the transliterated form familiar from tradition.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
