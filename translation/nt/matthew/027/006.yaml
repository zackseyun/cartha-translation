id: MAT.27.6
reference: Matthew 27:6
source:
  edition: SBLGNT
  text: οἱ δὲ ἀρχιερεῖς λαβόντες τὰ ἀργύρια εἶπαν· Οὐκ ἔξεστιν βαλεῖν αὐτὰ εἰς τὸν
    κορβανᾶν, ἐπεὶ τιμὴ αἵματός ἐστιν·
translation:
  text: But the chief priests, taking the silver pieces, said, “It is not lawful to
    put them into the temple treasury, since they are the price of blood.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κορβανᾶν (Corban), referring to the temple treasury or sacred funds.
    reason: lexical_alternative
  - marker: b
    text: Or “blood money.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the senior priestly authorities,
    idiomatic in English and consistent with Gospel usage.
- source_word: λαβόντες
  chosen: taking
  alternatives:
  - having taken
  - after taking
  lexicon: BDAG
  rationale: Aorist participle rendered with a natural English participle that preserves
    the attendant action without over-formalizing the sequence.
- source_word: τὰ ἀργύρια
  chosen: the silver pieces
  alternatives:
  - the silver
  - the money
  - the silver coins
  lexicon: BDAG
  rationale: Refers to the silver payment just mentioned in context; 'silver pieces'
    preserves the concrete monetary sense without overstating a specific coin type
    not named here.
- source_word: Οὐκ ἔξεστιν
  chosen: It is not lawful
  alternatives:
  - It is not permitted
  - It is not allowed
  lexicon: BDAG
  rationale: Conveys prohibition in terms of legal/religious propriety, fitting the
    priests' concern with what is permissible.
- source_word: βαλεῖν
  chosen: to put
  alternatives:
  - to throw
  - to place
  lexicon: BDAG
  rationale: Although βάλλω is literally 'throw/cast,' in this treasury context 'put'
    is the most natural English equivalent and avoids an unnecessarily vivid sense.
- source_word: κορβανᾶν
  chosen: the temple treasury
  alternatives:
  - the treasury
  - the Corban
  lexicon: BDAG
  rationale: The term denotes the sacred treasury associated with the temple. Translating
    rather than transliterating best serves readability, while preserving the cultic
    setting.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the prohibition; 'since' is concise and natural.
- source_word: τιμὴ αἵματός
  chosen: the price of blood
  alternatives:
  - blood money
  - the price of bloodshed
  lexicon: BDAG
  rationale: A relatively formal rendering that stays close to the Greek wording.
    'Blood money' is idiomatic but slightly more interpretive; it is preserved in
    a footnote.
