id: MAT.27.47
reference: Matthew 27:47
source:
  edition: SBLGNT
  text: τινὲς δὲ τῶν ἐκεῖ ⸀ἑστηκότων ἀκούσαντες ἔλεγον ὅτι Ἠλίαν φωνεῖ οὗτος.
translation:
  text: But some of those standing there, when they heard it, were saying, “This man
    is calling for Elijah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “This one is calling Elijah.”
    reason: lexical_alternative
  - marker: b
    text: The bystanders likely misunderstand Jesus' cry in the previous verse as
      an appeal to Elijah.
    reason: cross_reference
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - some people
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of the bystanders.
    'Some' is the most natural concise English equivalent.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous statement. 'But'
    fits the narrative turn as bystanders react to Jesus' cry.
- source_word: τῶν ἐκεῖ ἑστηκότων
  chosen: of those standing there
  alternatives:
  - of those who were standing there
  - of the bystanders there
  lexicon: BDAG
  rationale: The perfect participle of ἵστημι functions substantivally with the article,
    describing those present at the scene. 'Standing there' preserves the vivid physical
    posture without over-paraphrasing to 'bystanders' in the main text.
- source_word: ἀκούσαντες
  chosen: when they heard it
  alternatives:
  - having heard
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle indicating action prior to the main verb. English idiom
    is smoother with 'when they heard it'; 'it' is supplied because the object is
    implicit from context, namely Jesus' cry.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'Were saying' preserves
    the imperfective aspect better than simple past 'said' without overstating repetition.
- source_word: ὅτι
  chosen: that
  alternatives:
  - “
  lexicon: BDAG
  rationale: Introduces indirect discourse in Greek; in natural English it is best
    represented by direct quotation punctuation rather than an explicit 'that' in
    the final sentence.
- source_word: Ἠλίαν
  chosen: Elijah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name. The accusative
    is governed by φωνεῖ, yielding 'calling for Elijah' rather than a more wooden
    'calling Elijah'.
- source_word: φωνεῖ
  chosen: is calling for
  alternatives:
  - calls for
  - is calling to
  - is calling
  lexicon: BDAG
  rationale: Present tense in context reports what the bystanders perceive Jesus to
    be doing. With a personal object in this context, English idiom favors 'calling
    for Elijah,' meaning summoning or appealing to him.
- source_word: οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: Demonstrative subject used deictically, likely with some distance or
    dismissiveness from the speakers. 'This man' is natural English and preserves
    the demonstrative force better than the flatter 'he'.
