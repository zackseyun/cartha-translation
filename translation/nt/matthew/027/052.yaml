id: MAT.27.52
reference: Matthew 27:52
source:
  edition: SBLGNT
  text: καὶ τὰ μνημεῖα ἀνεῴχθησαν καὶ πολλὰ σώματα τῶν κεκοιμημένων ἁγίων ⸀ἠγέρθησαν,
translation:
  text: And the tombs were opened, and many bodies of the saints who had fallen asleep
    were raised,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “fallen asleep” is a common idiom for “died.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Also
  - Then
  lexicon: BDAG
  rationale: Common connective; in narrative sequence English typically uses “And”
    to mirror coordination without over-interpreting temporal force.
- source_word: τὰ μνημεῖα
  chosen: the tombs
  alternatives:
  - the graves
  - the memorial tombs
  lexicon: BDAG
  rationale: μνημεῖον commonly denotes a burial place/tomb; “tombs” is natural modern
    English and fits the context of burial sites being opened.
- source_word: ἀνεῴχθησαν
  chosen: were opened
  alternatives:
  - were opened up
  - were unsealed
  lexicon: BDAG
  rationale: Aorist passive indicates the tombs received the action; “were opened”
    is straightforward and avoids adding implied mechanism (e.g., “unsealed”).
- source_word: πολλὰ σώματα
  chosen: many bodies
  alternatives:
  - a great many bodies
  - many corpses
  lexicon: BDAG
  rationale: σῶμα is neutral “body”; “corpses” is more interpretive and harsher; “many
    bodies” preserves the Greek’s plain sense.
- source_word: τῶν κεκοιμημένων
  chosen: who had fallen asleep
  alternatives:
  - who had slept
  - who had died
  lexicon: BDAG
  rationale: κοιμάομαι is a common euphemism for death in Jewish/Christian usage;
    “fallen asleep” preserves the idiom and its connotations while remaining understandable.
- source_word: ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - the holy people
  lexicon: BDAG
  rationale: ἅγιοι as a substantive is standardly “saints”; keeps continuity with
    NT usage for God’s holy people without specifying identity beyond the text.
- source_word: ἠγέρθησαν
  chosen: were raised
  alternatives:
  - were awakened
  - were resurrected
  lexicon: BDAG
  rationale: ἐγείρω in passive commonly refers to being raised (including from death).
    “Were raised” is accurate and leaves the precise nature (resuscitation vs. resurrection)
    to the broader context (clarified in v.53).
