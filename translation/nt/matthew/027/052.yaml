theological_decisions:
- issue: Nature of the event described by ἠγέρθησαν (resurrection language)
  chosen_reading: Translate neutrally as “were raised” without specifying “resurrected,”
    preserving the text’s wording and leaving theological synthesis to context.
  alternative_readings:
  - were resurrected
  rationale: The verb can denote resurrection, but “were raised” is the closest English
    equivalent and avoids importing a fully systematized claim about the kind of resurrection
    in this verse alone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
