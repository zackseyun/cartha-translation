theological_decisions:
- issue: Whether to make explicit that Judas refers to Jesus
  chosen_reading: Keep the object implicit as 'innocent blood' without adding 'Jesus'
    or 'an innocent man' to the main text.
  alternative_readings:
  - I have sinned by betraying the blood of an innocent man
  rationale: The Greek leaves the referent implicit in the idiom 'innocent blood.'
    Adding 'Jesus' would clarify for modern readers but would go beyond the wording
    of the text. The translation preserves the biblical idiom and its legal-moral
    force.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
