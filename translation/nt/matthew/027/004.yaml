id: MAT.27.4
reference: Matthew 27:4
source:
  edition: SBLGNT
  text: λέγων· Ἥμαρτον παραδοὺς αἷμα ⸀ἀθῷον. οἱ δὲ εἶπαν· Τί πρὸς ἡμᾶς; σὺ ⸀ὄψῃ.
translation:
  text: saying, “I have sinned by betraying innocent blood.” But they said, “What
    is that to us? You will see to it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “having betrayed innocent blood.”
    reason: lexical_alternative
  - marker: b
    text: Or, “You see to it,” an idiomatic dismissal meaning “That is your responsibility.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἥμαρτον
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: Aorist indicative can be rendered simply as past, but in direct confession
    English idiom often uses present perfect to express present culpability resulting
    from the act. This preserves the force of Judas's admission without over-paraphrasing.
- source_word: παραδοὺς
  chosen: by betraying
  alternatives:
  - having betrayed
  - by handing over
  lexicon: BDAG
  rationale: The aorist participle is most naturally causal/instrumental here, explaining
    the manner or basis of the sin confessed. 'Betraying' fits the narrative context
    of Judas's action against Jesus better than the more wooden 'handing over,' while
    remaining within the semantic range of παραδίδωμι.
- source_word: αἷμα ἀθῷον
  chosen: innocent blood
  alternatives:
  - innocent bloodshed
  - the blood of an innocent man
  lexicon: BDAG
  rationale: This is a compact idiom in Greek and biblical usage. 'Innocent blood'
    is the most natural and transparent English equivalent and preserves the scriptural
    resonance of unlawful guilt for a death.
- source_word: Τί πρὸς ἡμᾶς;
  chosen: What is that to us?
  alternatives:
  - What is that to us,
  - What concern is that of ours?
  - What is that to us about?
  lexicon: BDAG
  rationale: This idiom dismisses responsibility or concern. 'What is that to us?'
    is concise, idiomatic, and close to the Greek structure.
- source_word: σὺ ὄψῃ
  chosen: You will see to it
  alternatives:
  - See to it yourself
  - That is your concern
  - You see to it
  lexicon: BDAG
  rationale: 'Future middle of ὁράω here functions idiomatically as a brusque dismissal:
    ''you deal with it/see to it.'' ''You will see to it'' preserves the future form
    while sounding natural in English. The sharper imperative-like sense is preserved
    in a footnote.'
