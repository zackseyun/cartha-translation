id: MAT.27.24
reference: Matthew 27:24
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ὁ Πιλᾶτος ὅτι οὐδὲν ὠφελεῖ ἀλλὰ μᾶλλον θόρυβος γίνεται λαβὼν ὕδωρ
    ἀπενίψατο τὰς χεῖρας ⸀ἀπέναντι τοῦ ὄχλου λέγων· Ἀθῷός εἰμι ἀπὸ τοῦ ⸀αἵματος τούτου·
    ὑμεῖς ὄψεσθε.
translation:
  text: So when Pilate saw that he was gaining nothing, but rather that a riot was
    developing, he took water and washed his hands before the crowd, saying, “I am
    innocent of this man's blood; you yourselves will see to it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an uproar was arising' or 'a disturbance was happening.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'I am innocent from this blood.' The expression means freedom
      from responsibility for a person's death.
    reason: lexical_alternative
  - marker: c
    text: Or 'see to it yourselves'; literally 'you will see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν δὲ
  chosen: So when ... saw
  alternatives:
  - But when ... saw
  - Now when ... saw
  lexicon: BDAG
  rationale: The aorist participle with δέ introduces the next step in the narrative.
    'So when' gives natural English flow while preserving the inferential/narrative
    transition better than a bare 'but'.
- source_word: οὐδὲν ὠφελεῖ
  chosen: he was gaining nothing
  alternatives:
  - it was helping nothing
  - he was accomplishing nothing
  lexicon: BDAG
  rationale: Although the Greek is literally 'nothing profits/helps,' the implied
    subject is Pilate's effort to manage the situation. 'He was gaining nothing' is
    idiomatic and reflects the sense that his intervention was ineffective.
- source_word: ἀλλὰ μᾶλλον θόρυβος γίνεται
  chosen: but rather that a riot was developing
  alternatives:
  - but rather that an uproar was arising
  - but instead that a disturbance was happening
  lexicon: BDAG
  rationale: θόρυβος can denote tumult, uproar, or riot. In this judicial/public setting,
    'riot' best conveys escalating public disorder. 'Was developing' renders γίνεται
    as an in-progress emergence rather than a completed event.
- source_word: λαβὼν ὕδωρ
  chosen: he took water
  alternatives:
  - taking water
  lexicon: BDAG
  rationale: Aorist participle of attendant action preceding the main verb; straightforwardly
    rendered in English as a finite verb for readability.
- source_word: ἀπενίψατο τὰς χεῖρας
  chosen: washed his hands
  alternatives:
  - rinsed his hands
  lexicon: BDAG
  rationale: The verb specifically means to wash off, here in the middle voice. 'Washed
    his hands' is the natural English equivalent and preserves the symbolic action.
- source_word: ἀπέναντι τοῦ ὄχλου
  chosen: before the crowd
  alternatives:
  - in front of the crowd
  - in the presence of the crowd
  lexicon: BDAG
  rationale: ἀπέναντι here indicates spatial/public visibility. 'Before the crowd'
    is concise and idiomatic, preserving the public nature of the gesture.
- source_word: Ἀθῷός εἰμι
  chosen: I am innocent
  alternatives:
  - I am guiltless
  - I am not responsible
  lexicon: BDAG
  rationale: ἀθῷος denotes freedom from guilt or liability. 'Innocent' is the clearest
    modern equivalent and fits the legal context.
- source_word: ἀπὸ τοῦ αἵματος τούτου
  chosen: of this man's blood
  alternatives:
  - from this blood
  - of this blood
  lexicon: BDAG
  rationale: Literally 'from this blood,' an idiom for freedom from responsibility
    for a person's death. English commonly expresses this as 'of this man's blood.'
    'Man's' is implied by the context (Jesus) and makes the idiom intelligible without
    changing the sense.
- source_word: ὑμεῖς ὄψεσθε
  chosen: you yourselves will see to it
  alternatives:
  - see to it yourselves
  - you will see
  lexicon: BDAG
  rationale: Future middle of ὁράω here is idiomatic, functioning like 'see to it'
    or 'take responsibility.' The explicit pronoun ὑμεῖς adds emphasis, captured by
    'you yourselves.' A literal 'you will see' is possible but less clear in English.
