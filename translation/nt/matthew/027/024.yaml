theological_decisions:
- issue: Pilate's declaration of innocence
  chosen_reading: Rendered as Pilate's claimed innocence/responsibility disclaimer
    without endorsing its truth.
  alternative_readings:
  - 'A more literal rendering could leave the statement entirely uninterpreted: ''I
    am innocent from this blood.'''
  rationale: The translation preserves Pilate's own claim in direct speech and does
    not import a theological judgment that he was actually innocent. This maintains
    narrative and moral tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
