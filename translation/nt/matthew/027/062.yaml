id: MAT.27.62
reference: Matthew 27:62
source:
  edition: SBLGNT
  text: Τῇ δὲ ἐπαύριον, ἥτις ἐστὶν μετὰ τὴν παρασκευήν, συνήχθησαν οἱ ἀρχιερεῖς καὶ
    οἱ Φαρισαῖοι πρὸς Πιλᾶτον
translation:
  text: Now on the next day, which is after the day of Preparation, the chief priests
    and the Pharisees gathered before Pilate
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is after Preparation.' The Greek term can denote the preparation
      day before the Sabbath; translating it as 'Friday' would be more interpretive
      than the source text requires.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  chosen: Now on the next day
  alternatives:
  - On the next day
  - The next day
  lexicon: BDAG
  rationale: The idiom marks temporal progression. δέ is lightly connective, so 'Now'
    preserves discourse movement without overtranslating. 'On the next day' reflects
    the dative article with the adverbial noun.
- source_word: ἥτις ἐστὶν μετὰ τὴν παρασκευήν
  chosen: which is after the day of Preparation
  alternatives:
  - that is, after the Preparation
  - which is after Preparation
  lexicon: BDAG
  rationale: ἥτις introduces an explanatory relative clause. παρασκευή can denote
    'preparation' generally, but in Jewish context it commonly refers to the day of
    preparation before the Sabbath; 'the day of Preparation' makes the temporal reference
    clear in natural English while staying close to the Greek.
- source_word: παρασκευήν
  chosen: the day of Preparation
  alternatives:
  - Preparation
  - Friday
  lexicon: BDAG
  rationale: The term likely refers to the day before the Sabbath. 'Friday' would
    be interpretive and too specific for the main text; 'the day of Preparation' preserves
    the Jewish calendrical expression while remaining readable.
- source_word: συνήχθησαν
  chosen: gathered
  alternatives:
  - assembled
  - came together
  lexicon: BDAG
  rationale: The passive form here functions intransitively ('were gathered' / 'gathered
    together'). 'Gathered' is concise, natural, and adequately reflects the event
    without unnecessary woodenness.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not multiple holders of the singular office of high priest.
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name.
- source_word: πρὸς Πιλᾶτον
  chosen: before Pilate
  alternatives:
  - to Pilate
  - with Pilate
  lexicon: BDAG
  rationale: πρός with a person after a verb of gathering can mean movement toward
    or appearance before someone. 'Before Pilate' fits the legal-political setting
    and reads naturally in English.
- source_word: Πιλᾶτον
  chosen: Pilate
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Πιλᾶτος.
