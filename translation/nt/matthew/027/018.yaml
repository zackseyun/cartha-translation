id: MAT.27.18
reference: Matthew 27:18
source:
  edition: SBLGNT
  text: ᾔδει γὰρ ὅτι διὰ φθόνον παρέδωκαν αὐτόν.
translation:
  text: For he knew that they had handed him over because of envy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of envy' or 'because of jealousy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  chosen: he knew
  alternatives:
  - he was aware
  - he understood
  lexicon: BDAG
  rationale: οἶδα commonly conveys knowledge or awareness. 'He knew' is the most direct
    and natural English rendering here, preserving the explanatory force of Pilate's
    perception.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the preceding statement. 'For' preserves
    the connective logic in a concise, readable way.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what Pilate knew rather than giving
    a second-level causal clause, so 'that' is the best fit.
- source_word: διὰ φθόνον
  chosen: because of envy
  alternatives:
  - out of envy
  - because of jealousy
  lexicon: BDAG
  rationale: διά with the accusative expresses cause or reason. φθόνος denotes envy,
    ill will at another's standing or success. 'Because of envy' is clear and close
    to the Greek; 'out of envy' is also possible but slightly more idiomatic than
    necessary.
- source_word: παρέδωκαν
  chosen: had handed him over
  alternatives:
  - delivered him up
  - handed him over
  - betrayed him
  lexicon: BDAG
  rationale: παραδίδωμι in the passion context often means to hand someone over to
    authorities. 'Had handed him over' captures the aorist action as prior to Pilate's
    knowing in English idiom. 'Betrayed' is too narrow here because the subject is
    plural and refers more broadly to the leaders' act of surrendering Jesus to Pilate.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Jesus.
