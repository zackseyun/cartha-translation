theological_decisions:
- issue: Motivation of Jesus' accusers
  chosen_reading: Pilate recognized envy as the motive for their handing Jesus over.
  alternative_readings:
  - Pilate recognized jealousy as the motive.
  rationale: The verse attributes the leaders' action to φθόνος. Rendering this as
    'envy' preserves the moral and psychological force without expanding into a fuller
    theological explanation not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
