id: MAT.27.46
reference: Matthew 27:46
source:
  edition: SBLGNT
  text: περὶ δὲ τὴν ἐνάτην ὥραν ⸀ἀνεβόησεν ὁ Ἰησοῦς φωνῇ μεγάλῃ λέγων· ⸂Ἠλὶ ἠλὶ⸃ λεμὰ
    σαβαχθάνι; τοῦτ’ ἔστιν· Θεέ μου θεέ μου, ἱνατί με ἐγκατέλιπες;
translation:
  text: Now about the ninth hour Jesus cried out with a loud voice, saying, “Eli,
    Eli, lema sabachthani?” that is, “My God, my God, why have you forsaken me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording echoes Psalm 22:1.
    reason: cross_reference
  - marker: b
    text: Or, 'did you forsake me?' The Greek verb is aorist; English present perfect
      is used here to preserve the natural force of the cry and its familiar Psalmic
      resonance.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τὴν ἐνάτην ὥραν
  chosen: Now about the ninth hour
  alternatives:
  - About the ninth hour
  - And about the ninth hour
  - Around the ninth hour
  lexicon: BDAG
  rationale: περί with the accusative of time means 'about/around' a point in time.
    δέ is lightly connective; 'Now' preserves discourse movement without overtranslating.
- source_word: ἀνεβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: The aorist verb denotes a loud cry or shout. 'Cried out' is natural English
    and fits the solemn context better than the more colloquial 'shouted.'
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: The dative phrase is instrumental/manner. 'With a loud voice' preserves
    the concrete expression and emphasis of the Greek.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the cry. 'Saying' keeps the
    Greek structure smoothly in English.
- source_word: Ἠλὶ ἠλὶ λεμὰ σαβαχθάνι
  chosen: Eli, Eli, lema sabachthani?
  alternatives:
  - My God, my God, why have you forsaken me? (without preserving the Semitic words
    in the main text)
  lexicon: BDAG
  rationale: Matthew preserves Jesus' Semitic cry before translating it. The draft
    likewise retains the transliterated form in the main text, honoring the source-text
    presentation and the narrative significance of the wording.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - which means
  - that means
  lexicon: BDAG
  rationale: This formula introduces a translation/explanation. 'That is' is concise
    and suitably formal.
- source_word: Θεέ μου θεέ μου
  chosen: My God, my God
  lexicon: BDAG
  rationale: Direct vocative repetition should be preserved. It also echoes Psalm
    22:1 in wording and force.
- source_word: ἱνατί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: The interrogative adverb straightforwardly means 'why.'
- source_word: ἐγκατέλιπες
  chosen: have you forsaken
  alternatives:
  - did you forsake
  - have you abandoned
  lexicon: BDAG
  rationale: Although the Greek aorist could be rendered as a simple past, English
    idiom in this direct cry is well served by the present perfect 'have you forsaken,'
    which also preserves the traditional and Psalmic resonance. 'Forsaken' better
    matches the solemn register than 'abandoned.'
