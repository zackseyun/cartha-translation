theological_decisions:
- issue: Relation of Jesus' cry to Psalm 22:1
  chosen_reading: Render the words straightforwardly as a real cry of dereliction
    while preserving the Psalmic wording and leaving the theological depth unresolved
    in translation.
  alternative_readings:
  - Render primarily as an allusive citation marker to Psalm 22 without emphasizing
    the experiential force
  - Paraphrase to soften the sense of abandonment
  rationale: The Greek gives Jesus' cry and its translation without interpretive qualification.
    In keeping with Chalcedonian orthodoxy and the translation philosophy, the wording
    should neither deny the reality of the cry nor force a particular doctrinal explanation
    of how the Son addresses the Father here. Preserving the direct language and Psalm
    echo maintains the text's theological tension.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Retention of the Semitic cry in the main text
  chosen_reading: Keep the transliterated Semitic words in the main text, followed
    by the Greek translation.
  alternative_readings:
  - Translate only the meaning into English
  rationale: Matthew itself preserves the original cry and then explains it. Retaining
    both reflects original-language primacy and avoids flattening the narrative detail,
    including the reason bystanders could misunderstand 'Eli' as a call for Elijah
    in the surrounding context.
  doctrine_reference: Translation philosophy §1
