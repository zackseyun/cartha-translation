theological_decisions:
- issue: Rendering the christological expression Θεοῦ εἰμι υἱός
  chosen_reading: I am the Son of God
  alternative_readings:
  - I am God's Son
  - I am a son of God
  rationale: Within Matthew's narrative, this is a recognized christological claim,
    not a generic statement of divine affiliation. Rendering it as 'the Son of God'
    preserves the title's force without importing later creedal wording beyond the
    text itself. The indefinite reading is grammatically possible in isolation but
    contextually weak here.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
- issue: Whether to render θέλει αὐτόν with stronger theological language such as
    'delights in him'
  chosen_reading: if he wants him
  alternative_readings:
  - if he delights in him
  rationale: The immediate Greek wording favors the common sense of θέλω ('want/wish').
    Because the line echoes Psalm 22:8, 'delights in him' is a meaningful interpretive
    alternative, but the translation philosophy prioritizes original-language primacy
    and preserves the allusive alternative in a footnote rather than importing it
    into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
