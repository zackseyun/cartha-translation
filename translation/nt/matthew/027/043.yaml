id: MAT.27.43
reference: Matthew 27:43
source:
  edition: SBLGNT
  text: πέποιθεν ἐπὶ τὸν θεόν, ῥυσάσθω ⸀νῦν εἰ θέλει αὐτόν· εἶπεν γὰρ ὅτι Θεοῦ εἰμι
    υἱός.
translation:
  text: He has trusted in God; let him rescue him now, if he wants him, for he said,
    ‘I am the Son of God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if he delights in him.' The wording echoes Psalm 22:8, where the sense
      of divine favor is prominent.
    reason: alternative_reading
  - marker: b
    text: This taunt closely echoes Psalm 22:8, linking the mockery of Jesus with
      the righteous sufferer in that psalm.
    reason: cross_reference
lexical_decisions:
- source_word: πέποιθεν
  chosen: has trusted
  alternatives:
  - trusts
  - has put his trust
  lexicon: BDAG
  rationale: 'Perfect tense of πείθω in the intransitive sense conveys a settled state
    resulting from prior trust: ''has trusted'' or ''has put his trust.'' ''Has trusted''
    preserves the perfect aspect more clearly than a simple present.'
- source_word: ἐπὶ τὸν θεόν
  chosen: in God
  alternatives:
  - on God
  lexicon: BDAG
  rationale: With πείθω/πέποιθα, ἐπί with the accusative idiomatically expresses reliance
    directed toward someone. English 'trust in God' is the natural equivalent; 'trust
    on' would be unnatural.
- source_word: ῥυσάσθω
  chosen: let him rescue him
  alternatives:
  - let him deliver him
  - let him save him
  lexicon: BDAG
  rationale: Aorist middle imperative of ῥύομαι means to rescue or deliver from danger.
    'Rescue' is clear modern English and fits the mocking challenge. 'Deliver' is
    possible but slightly more traditional/idiomatic; 'save' is broader and less specific.
- source_word: νῦν
  chosen: now
  lexicon: BDAG
  rationale: Temporal adverb emphasizing immediacy in the mockers' taunt.
- source_word: εἰ θέλει αὐτόν
  chosen: if he wants him
  alternatives:
  - if he desires him
  - if he delights in him
  - if he wills him
  lexicon: BDAG
  rationale: θέλω ordinarily means 'want, wish, desire, will.' In this allusive context
    to Psalm 22:8 LXX, the sense can shade toward favor or delight, but the Greek
    here most directly says 'if he wants him.' This keeps the wording transparent
    to the source while allowing the allusion to be noted in a footnote.
- source_word: εἶπεν γὰρ
  chosen: for he said
  alternatives:
  - for he was saying
  lexicon: BDAG
  rationale: Aorist εἶπεν is best rendered as simple past, introducing the rationale
    for the mockers' challenge.
- source_word: ὅτι
  chosen: that
  alternatives:
  - ‘
  lexicon: BDAG
  rationale: Introduces indirect discourse/content. In English it is natural either
    to retain 'that' or convert to direct quotation. The final rendering uses direct
    quotation for readability while preserving the same content.
- source_word: Θεοῦ ... υἱός
  chosen: the Son of God
  alternatives:
  - God's Son
  - a son of God
  lexicon: BDAG
  rationale: Although the Greek lacks the article before υἱός, the predicate construction
    and Matthean context point to a qualitative/titular sense, not an indefinite one.
    'The Son of God' best reflects the christological title in context and matches
    the force of the accusation/mockery.
