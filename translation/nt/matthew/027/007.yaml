id: MAT.27.7
reference: Matthew 27:7
source:
  edition: SBLGNT
  text: συμβούλιον δὲ λαβόντες ἠγόρασαν ἐξ αὐτῶν τὸν Ἀγρὸν τοῦ Κεραμέως εἰς ταφὴν
    τοῖς ξένοις.
translation:
  text: So after taking counsel, they bought with them the Potter’s Field as a burial
    place for foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with that money'; the Greek says literally 'from them,' referring to
      the silver coins mentioned in the previous context.
    reason: lexical_alternative
  - marker: b
    text: Or 'for strangers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβούλιον ... λαβόντες
  chosen: after taking counsel
  alternatives:
  - having taken counsel
  - after consulting together
  lexicon: BDAG
  rationale: The idiom literally means 'having taken counsel.' 'After taking counsel'
    preserves the deliberative sense in natural English while reflecting the participial
    construction.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - then
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative continuation rather than strong contrast. 'So'
    gives a natural English transition in context.
- source_word: ἠγόρασαν
  chosen: they bought
  alternatives:
  - they purchased
  lexicon: BDAG
  rationale: Aorist active indicative of ἀγοράζω is straightforwardly rendered 'they
    bought.' 'Purchased' is possible but less natural.
- source_word: ἐξ αὐτῶν
  chosen: with them
  alternatives:
  - from them
  - with that money
  lexicon: BDAG
  rationale: The pronoun is neuter plural and in context refers to the silver coins
    just mentioned. English requires an explicit idiomatic rendering; 'with them'
    keeps the pronoun-based reference without overexpanding. 'With that money' is
    interpretive but clarifying.
- source_word: τὸν Ἀγρὸν τοῦ Κεραμέως
  chosen: the Potter’s Field
  alternatives:
  - the field of the potter
  - the potter's field
  lexicon: BDAG
  rationale: This is the conventional and natural rendering of the genitival phrase.
    Capitalization reflects its function as a recognized place designation in the
    narrative.
- source_word: εἰς ταφὴν
  chosen: as a burial place
  alternatives:
  - for burial
  - for a burial place
  lexicon: BDAG
  rationale: The preposition εἰς with ταφή expresses purpose/result. 'As a burial
    place' communicates the field's intended use clearly in idiomatic English.
- source_word: τοῖς ξένοις
  chosen: for foreigners
  alternatives:
  - for strangers
  - for aliens
  lexicon: BDAG
  rationale: ξένοις here refers to nonlocals/outsiders rather than merely unfamiliar
    persons. 'Foreigners' is the clearest modern English rendering; 'strangers' is
    traditional but less precise.
