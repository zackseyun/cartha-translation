theological_decisions:
- issue: Referent of αὐτῶν
  chosen_reading: The pronoun refers to the silver coins returned by Judas, rendered
    idiomatically as 'with them.'
  alternative_readings:
  - The pronoun could be expanded interpretively as 'with that money.'
  rationale: The immediate context makes the referent clear, and the verse concerns
    the priests' use of the returned silver. The translation avoids unnecessary paraphrase
    while preserving intelligibility.
  doctrine_reference: 'Translation philosophy: original-language primacy; optimal
    equivalence.'
