id: MAT.27.8
reference: Matthew 27:8
source:
  edition: SBLGNT
  text: διὸ ἐκλήθη ὁ ἀγρὸς ἐκεῖνος Ἀγρὸς Αἵματος ἕως τῆς σήμερον.
translation:
  text: Therefore that field has been called Field of Blood to this day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inferential/resultative connection to the preceding explanation
    about the purchase and naming of the field. 'Therefore' preserves the formal link
    clearly in natural English.
- source_word: ἐκλήθη
  chosen: has been called
  alternatives:
  - was called
  - came to be called
  lexicon: BDAG
  rationale: Aorist passive of καλέω, 'was called/named.' English present perfect
    ('has been called') works idiomatically with the following 'to this day' and conveys
    a naming that began in the past and continues in recognized usage.
- source_word: ὁ ἀγρὸς ἐκεῖνος
  chosen: that field
  alternatives:
  - that piece of land
  - that plot
  lexicon: BDAG
  rationale: ἀγρός commonly means 'field.' The demonstrative ἐκεῖνος is naturally
    rendered attributively in English as 'that field.' 'Field' also preserves the
    repeated wordplay with the proper designation that follows.
- source_word: Ἀγρὸς Αἵματος
  chosen: Field of Blood
  alternatives:
  - Blood Field
  lexicon: BDAG
  rationale: This is the name given to the place, built from the same noun ἀγρός plus
    the genitive αἵματος. 'Field of Blood' is the standard and most transparent rendering
    in English, preserving the genitival relationship and the narrative force of the
    name.
- source_word: αἵματος
  chosen: Blood
  lexicon: BDAG
  rationale: Genitive singular of αἷμα, here part of the place-name. Capitalized in
    English because it is within the proper name 'Field of Blood.'
- source_word: ἕως τῆς σήμερον
  chosen: to this day
  alternatives:
  - until today
  - to the present day
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning the name remained current up to
    the writer's present. 'To this day' is concise, natural, and standard for this
    construction.
