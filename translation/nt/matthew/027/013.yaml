id: MAT.27.13
reference: Matthew 27:13
source:
  edition: SBLGNT
  text: τότε λέγει αὐτῷ ὁ Πιλᾶτος· Οὐκ ἀκούεις πόσα σου καταμαρτυροῦσιν;
translation:
  text: Then Pilate says to him, “Do you not hear how many things they are testifying
    against you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “they testify against you” or “they bear witness against you.” The
      Greek verb has a legal-forensic sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present-tense historical present in narrative Greek. Rendering as 'says'
    preserves the vividness of the Greek; 'said' is possible in smoother English but
    less formally aligned.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and should remain pronominal in English;
    the referent is clear from context without expansion.
- source_word: ὁ Πιλᾶτος
  chosen: Pilate
  alternatives:
  - the Pilate
  lexicon: BDAG
  rationale: Proper name with article in Greek; standard English omits the article
    before personal names.
- source_word: Οὐκ ἀκούεις
  chosen: Do you not hear
  alternatives:
  - Do you not listen to
  - Don't you hear
  lexicon: BDAG
  rationale: Retains the negative interrogative force and the basic sense of ἀκούω
    as 'hear.' 'Do you not hear' is slightly more formal than 'Don't you hear' and
    fits the register.
- source_word: πόσα
  chosen: how many things
  alternatives:
  - how much
  - how many accusations
  lexicon: BDAG
  rationale: Neuter plural interrogative/exclamatory usage referring to the quantity
    of matters being alleged. 'How many things' is a close rendering; 'accusations'
    interprets more than the Greek explicitly states.
- source_word: σου
  chosen: against you
  alternatives:
  - about you
  - concerning you
  lexicon: BDAG
  rationale: 'With καταμαρτυρέω, the genitive pronoun carries adversative sense in
    context: testimony borne against Jesus. English idiom requires making that relation
    explicit.'
- source_word: καταμαρτυροῦσιν
  chosen: they are testifying against
  alternatives:
  - they testify against
  - they bear witness against
  - they accuse
  lexicon: BDAG
  rationale: The verb means to testify/bear witness against, often in legal settings.
    'They are testifying against' preserves the forensic nuance without collapsing
    it into the more interpretive 'accuse.' The progressive English form fits the
    ongoing courtroom scene.
