theological_decisions:
- issue: Sense of ἐμαθητεύθη in relation to Jesus
  chosen_reading: Joseph had become a disciple of Jesus
  alternative_readings:
  - Joseph had been discipled by Jesus
  - Joseph also was a disciple of Jesus
  rationale: The verb μαθητεύω in the passive can be rendered either as entering discipleship
    or as being made a disciple. In this context, the text identifies Joseph as one
    who belonged among Jesus' disciples, not necessarily making a specific doctrinal
    claim about the mechanism of his discipleship. The chosen rendering preserves
    that status without over-specifying.
  doctrine_reference: Preserve theological tension rather than resolve it.
