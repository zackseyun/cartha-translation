id: MAT.27.57
reference: Matthew 27:57
source:
  edition: SBLGNT
  text: Ὀψίας δὲ γενομένης ἦλθεν ἄνθρωπος πλούσιος ἀπὸ Ἁριμαθαίας, τοὔνομα Ἰωσήφ,
    ὃς καὶ αὐτὸς ⸀ἐμαθητεύθη τῷ Ἰησοῦ·
translation:
  text: Now when evening had come, a rich man from Arimathea came, named Joseph, who
    himself also had become a disciple of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who had been discipled by Jesus' or 'who also was a disciple of Jesus.'
    reason: alternative_reading
  - marker: b
    text: Or 'who had also himself become'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  chosen: Now when evening had come
  alternatives:
  - When it was evening
  - As evening came
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'Now when evening had
    come' preserves the narrative shift signaled by δέ and the completed sense of
    γενομένης without sounding overly wooden.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Simple aorist of ἔρχομαι; 'came' is the natural narrative equivalent
    and fits the straightforward movement described.
- source_word: ἄνθρωπος πλούσιος
  chosen: a rich man
  alternatives:
  - a wealthy man
  lexicon: BDAG
  rationale: The noun-adjective combination is idiomatically rendered in English as
    'a rich man.' 'Wealthy man' is possible, but 'rich man' is more direct and conventional.
- source_word: ἀπὸ Ἁριμαθαίας
  chosen: from Arimathea
  alternatives:
  - of Arimathea
  lexicon: BDAG
  rationale: ἀπό normally indicates origin or source; 'from Arimathea' is the most
    transparent rendering.
- source_word: τοὔνομα Ἰωσήφ
  chosen: named Joseph
  alternatives:
  - whose name was Joseph
  lexicon: BDAG
  rationale: Idiomatic appositional expression. 'Named Joseph' is concise modern English
    while preserving the identifying function.
- source_word: ὃς καὶ αὐτὸς
  chosen: who had also himself
  alternatives:
  - who also
  - who himself also
  lexicon: BDAG
  rationale: 'Both καί and αὐτός add emphasis: Joseph too, in addition to others,
    was a disciple. ''Had also himself'' preserves that emphasis, though somewhat
    idiomatically reordered in English.'
- source_word: ἐμαθητεύθη τῷ Ἰησοῦ
  chosen: had become a disciple of Jesus
  alternatives:
  - had been discipled by Jesus
  - had become Jesus' disciple
  lexicon: BDAG
  rationale: The passive of μαθητεύω can mean 'become a disciple' or more literally
    'be made a disciple.' With dative τῷ Ἰησοῦ, the sense is that Joseph had attached
    himself as a disciple to Jesus. 'Had become a disciple of Jesus' is clear, idiomatic,
    and avoids implying only direct personal instruction by Jesus, while preserving
    the passive/resultative sense with the English pluperfect.
