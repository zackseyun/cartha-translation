theological_decisions:
- issue: Rendering the crucifixion inscription's legal wording
  chosen_reading: the charge against him
  alternative_readings:
  - his accusation
  - the accusation against him
  rationale: The verse presents the placard as the formal basis of execution. 'Charge'
    preserves the judicial force without importing extra theological interpretation.
- issue: Rendering Ἰουδαίων in the title
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: In the passion inscription formula, the phrase functions as a royal-political
    title recognized across the Gospel tradition. 'The Jews' best preserves the established
    referent here, while the alternative is worth preserving because Ἰουδαῖος can
    denote Judeans in other contexts.
