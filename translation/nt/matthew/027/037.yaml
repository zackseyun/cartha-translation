id: MAT.27.37
reference: Matthew 27:37
source:
  edition: SBLGNT
  text: καὶ ἐπέθηκαν ἐπάνω τῆς κεφαλῆς αὐτοῦ τὴν αἰτίαν αὐτοῦ γεγραμμένην· Οὗτός ἐστιν
    Ἰησοῦς ὁ βασιλεὺς τῶν Ἰουδαίων.
translation:
  text: 'And they placed above his head the charge against him, written: “This is
    Jesus, the King of the Jews.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the accusation against him.” The Greek αἰτίαν has a judicial sense here.
    reason: lexical_alternative
  - marker: b
    text: Or “the King of the Judeans.” Greek Ἰουδαίων can mean either “Jews” or “Judeans,”
      depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέθηκαν
  chosen: they placed
  alternatives:
  - they put
  - they set
  lexicon: BDAG
  rationale: Aorist active of ἐπιτίθημι here refers to physically placing the inscription
    above Jesus' head. 'Placed' is natural modern English and preserves the concrete
    action.
- source_word: ἐπάνω τῆς κεφαλῆς αὐτοῦ
  chosen: above his head
  alternatives:
  - over his head
  - on his head
  lexicon: BDAG
  rationale: ἐπάνω with the genitive indicates position above. 'Above his head' is
    the clearest idiomatic rendering; 'on his head' would sound too literal and potentially
    misleading in English.
- source_word: τὴν αἰτίαν αὐτοῦ
  chosen: the charge against him
  alternatives:
  - his accusation
  - the accusation against him
  - the cause against him
  lexicon: BDAG
  rationale: αἰτία in judicial context commonly means 'charge' or 'accusation.' 'The
    charge against him' best communicates the legal sense in the crucifixion setting.
    A more literal 'cause' would be obscure in contemporary English.
- source_word: γεγραμμένην
  chosen: written
  alternatives:
  - having been written
  - inscribed
  lexicon: BDAG
  rationale: Perfect passive participle from γράφω describes the charge as written
    text. 'Written' is concise and natural; 'inscribed' is possible but slightly more
    interpretive than the Greek requires.
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This is the one who is
  lexicon: BDAG
  rationale: Straightforward demonstrative plus copula. 'This is' preserves the direct
    wording of the placard.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    project philosophy.
- source_word: ὁ βασιλεὺς τῶν Ἰουδαίων
  chosen: the King of the Jews
  alternatives:
  - king of the Jews
  lexicon: BDAG
  rationale: βασιλεύς is best rendered 'King' here as a royal title. The article is
    retained in English because it reads naturally and reflects the titulature of
    the inscription.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: Although Ἰουδαῖος can sometimes mean 'Judean,' in this fixed royal accusation
    formula in the passion narratives the conventional and contextually appropriate
    sense is 'Jews,' referring to the Jewish people under Roman perception rather
    than merely residents of Judea.
