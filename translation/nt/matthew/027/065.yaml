id: MAT.27.65
reference: Matthew 27:65
source:
  edition: SBLGNT
  text: ⸀ἔφη αὐτοῖς ὁ Πιλᾶτος· Ἔχετε κουστωδίαν· ὑπάγετε ἀσφαλίσασθε ὡς οἴδατε.
translation:
  text: Pilate said to them, “You have a guard. Go, make it secure as you know how.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take a guard,' or possibly 'You have your own guard.' The Greek can
      be understood either as Pilate granting a guard or referring to one already
      available to them.
    reason: alternative_reading
  - marker: b
    text: Or 'make it as secure as you know how'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Standard narrative speech verb from φημί; 'said' is the natural English
    equivalent in this context.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun indicating the indirect object of Pilate's speech.
- source_word: Ἔχετε
  chosen: You have
  alternatives:
  - Take
  - Here is
  lexicon: BDAG
  rationale: Present indicative of ἔχω most naturally means 'you have.' In context
    this can imply either granting use of a guard or stating that they already have
    one available. The straightforward lexical sense is retained in the main text.
- source_word: κουστωδίαν
  chosen: a guard
  alternatives:
  - a guard unit
  - a watch
  lexicon: BDAG
  rationale: Loanword from Latin custodia referring to a guard/watch. 'A guard' is
    clear modern English and fits the likely sense of an assigned guard detail.
- source_word: ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: Imperative of departure; 'Go' is concise and idiomatic.
- source_word: ἀσφαλίσασθε
  chosen: make it as secure
  alternatives:
  - secure it
  - make it safe
  lexicon: BDAG
  rationale: Middle imperative of ἀσφαλίζω means to secure or make safe. 'Make it
    as secure' anticipates the following comparative phrase and communicates the action
    clearly.
- source_word: ὡς οἴδατε
  chosen: as you know how
  alternatives:
  - as you know
  - as best you can
  lexicon: BDAG
  rationale: Idiomatic combination meaning according to their own knowledge or ability.
    'As you know how' preserves the sense without overinterpreting.
