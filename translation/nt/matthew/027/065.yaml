theological_decisions:
- issue: Whether Pilate's Ἔχετε κουστωδίαν grants a Roman guard or refers to the Jewish
    leaders' own guard
  chosen_reading: Render neutrally as 'You have a guard' in the main text
  alternative_readings:
  - '''Take a guard'''
  - '''You have your own guard'''
  rationale: The Greek form can be heard either as an authorization ('take/have a
    guard') or as a statement ('you have a guard'). To preserve the textual ambiguity
    rather than resolve a debated historical question, the main text keeps the more
    literal 'You have a guard,' with alternatives preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
