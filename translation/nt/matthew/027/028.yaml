id: MAT.27.28
reference: Matthew 27:28
source:
  edition: SBLGNT
  text: καὶ ἐκδύσαντες αὐτὸν ⸂χλαμύδα κοκκίνην περιέθηκαν αὐτῷ⸃,
translation:
  text: And after stripping him, they put a scarlet cloak on him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a scarlet robe.' The Greek term can refer more broadly to an outer garment
      or mantle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδύσαντες
  chosen: after stripping
  alternatives:
  - having stripped
  - after they stripped
  lexicon: BDAG
  rationale: Aorist participle of ἐκδύω, meaning to strip or undress. 'After stripping'
    renders the participial action naturally in English while preserving its antecedent
    relation to the main verb.
- source_word: χλαμύδα
  chosen: cloak
  alternatives:
  - robe
  - military cloak
  - mantle
  lexicon: BDAG
  rationale: χλαμύς refers to a cloak, often a short outer garment associated with
    soldiers or officials. 'Cloak' is the most direct and natural rendering; 'robe'
    is possible but less specific.
- source_word: κοκκίνην
  chosen: scarlet
  alternatives:
  - red
  - crimson
  lexicon: BDAG
  rationale: κόκκινος denotes a bright red/scarlet color. 'Scarlet' preserves the
    vividness and matches common English usage in this passion context better than
    the broader 'red'.
- source_word: περιέθηκαν αὐτῷ
  chosen: they put ... on him
  alternatives:
  - they placed ... around him
  - they clothed him with
  lexicon: BDAG
  rationale: περιτίθημι with dative here means to put or place something on someone.
    'They put ... on him' is idiomatic and accurately conveys the action without overformal
    wording.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: καί is the straightforward connective 'and.' Although 'then' could smooth
    the narrative in English, 'and' more directly reflects the Greek discourse connection.
