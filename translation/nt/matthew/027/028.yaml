theological_decisions:
- issue: Nature of the garment in the mockery scene
  chosen_reading: scarlet cloak
  alternative_readings:
  - scarlet robe
  rationale: The verse depicts the soldiers' mock investiture of Jesus. Rendering
    χλαμύς as 'cloak' preserves the lexical sense of the Greek garment term without
    importing additional royal connotations beyond what the context itself supplies.
  doctrine_reference: Translation philosophy §1, §5
