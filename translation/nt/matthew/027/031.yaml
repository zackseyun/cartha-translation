id: MAT.27.31
reference: Matthew 27:31
source:
  edition: SBLGNT
  text: καὶ ὅτε ἐνέπαιξαν αὐτῷ, ἐξέδυσαν αὐτὸν τὴν χλαμύδα καὶ ἐνέδυσαν αὐτὸν τὰ ἱμάτια
    αὐτοῦ καὶ ἀπήγαγον αὐτὸν εἰς τὸ σταυρῶσαι.
translation:
  text: And when they had mocked him, they stripped the cloak off him and put his
    own clothes on him, and led him away to crucify him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the robe.' The Greek χλαμύς denotes a cloak, often an outer garment;
      in context it is the mock royal garment placed on Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  chosen: had mocked
  alternatives:
  - mocked
  - made fun of
  lexicon: BDAG
  rationale: The aorist verb denotes derisive ridicule. 'Mocked' preserves the judicial
    and cruel sense better than the lighter 'made fun of.' The English pluperfect
    'had mocked' fits the temporal clause introduced by ὅτε in natural English narrative
    sequence.
- source_word: χλαμύδα
  chosen: the cloak
  alternatives:
  - the robe
  - the military cloak
  lexicon: BDAG
  rationale: χλαμύς refers to a cloak, often a military or official outer garment.
    'Cloak' is more lexically precise than 'robe' and avoids implying a formal royal
    garment beyond what the word itself states. The previous context identifies it
    as the mock garment placed on Jesus.
- source_word: ἐξέδυσαν αὐτὸν τὴν χλαμύδα
  chosen: they stripped the cloak off him
  alternatives:
  - they took the cloak off him
  - they stripped him of the cloak
  lexicon: BDAG
  rationale: ἐκδύω means to strip or undress. The construction here indicates removal
    of the garment from him. 'Stripped the cloak off him' preserves the force of the
    verb while remaining idiomatic; 'took off' is weaker.
- source_word: ἐνέδυσαν αὐτὸν τὰ ἱμάτια αὐτοῦ
  chosen: put his own clothes on him
  alternatives:
  - clothed him with his garments
  - put his garments on him
  lexicon: BDAG
  rationale: ἐνδύω means to dress or clothe someone. ἱμάτια is a broad term for garments/clothes.
    'His own clothes' makes explicit the possessive αὐτοῦ in natural English and contrasts
    with the mock cloak just removed.
- source_word: ἱμάτια
  chosen: clothes
  alternatives:
  - garments
  lexicon: BDAG
  rationale: While 'garments' is more formal, 'clothes' is clear modern English and
    still accurate for the plural ἱμάτια. This follows the project's readable modern
    English aim.
- source_word: ἀπήγαγον
  chosen: led him away
  alternatives:
  - took him away
  - led him off
  lexicon: BDAG
  rationale: ἀπάγω commonly means to lead away or take away. 'Led him away' fits the
    custodial action of soldiers escorting a prisoner and is standard, natural English.
- source_word: εἰς τὸ σταυρῶσαι
  chosen: to crucify him
  alternatives:
  - for crucifying him
  lexicon: BDAG
  rationale: 'The articular infinitive with εἰς expresses purpose: they led him away
    for the purpose of crucifying him. ''To crucify him'' is the most direct and idiomatic
    rendering.'
