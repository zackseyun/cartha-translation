theological_decisions:
- issue: Portrayal of the soldiers' abuse of Jesus
  chosen_reading: Render the actions plainly and concretely without softening or embellishing.
  alternative_readings:
  - Use a more formal sequence such as 'and having spit upon him, they took the reed
    and were striking him on the head'
  rationale: The verse is narrative rather than doctrinally contested, but the translation
    should preserve the humiliation and repeated violence inflicted on Jesus without
    importing additional interpretation. 'Kept striking his head' reflects the imperfect
    aspect and the brutality of the scene in clear modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    plain sense without paraphrase.'
