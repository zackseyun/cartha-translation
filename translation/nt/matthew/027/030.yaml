id: MAT.27.30
reference: Matthew 27:30
source:
  edition: SBLGNT
  text: καὶ ἐμπτύσαντες εἰς αὐτὸν ἔλαβον τὸν κάλαμον καὶ ἔτυπτον εἰς τὴν κεφαλὴν αὐτοῦ.
translation:
  text: And after spitting on him, they took the reed and kept striking his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were striking him on the head.' The Greek imperfect verb can emphasize
      repeated or ongoing action.
    reason: lexical_alternative
  - marker: b
    text: The Greek κάλαμος can mean 'reed' or, by extension, a reed-like staff.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπτύσαντες
  chosen: after spitting on
  alternatives:
  - spitting on
  - having spit on
  lexicon: BDAG
  rationale: Aorist active participle, antecedent to the main verbs; 'after spitting
    on' conveys the participial action in natural English while preserving sequence.
- source_word: εἰς αὐτόν
  chosen: on him
  alternatives:
  - at him
  - into him
  lexicon: BDAG
  rationale: With ἐμπτύω, εἰς + accusative idiomatically means spitting upon someone;
    'on him' is the plain English equivalent.
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - they seized
  - they picked up
  lexicon: BDAG
  rationale: Standard aorist of λαμβάνω; 'took' is the most direct rendering in context.
- source_word: κάλαμον
  chosen: the reed
  alternatives:
  - the staff
  - the cane
  lexicon: BDAG
  rationale: κάλαμος commonly denotes a reed or reed-like staff. In this mock-royal
    scene it refers to the reed previously placed in Jesus's hand; 'reed' preserves
    the lexical link and narrative irony better than the more interpretive 'staff'.
- source_word: ἔτυπτον
  chosen: kept striking
  alternatives:
  - were striking
  - struck repeatedly
  - beat
  lexicon: BDAG
  rationale: Imperfect active indicates repeated or ongoing action in past time. 'Kept
    striking' makes the iterative force explicit in idiomatic English.
- source_word: εἰς τὴν κεφαλὴν αὐτοῦ
  chosen: his head
  alternatives:
  - on his head
  - into his head
  lexicon: BDAG
  rationale: The preposition with τύπτω here indicates the target of the blows. English
    naturally expresses this as 'his head'; the striking sense already implies contact.
