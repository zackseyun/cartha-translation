theological_decisions:
- issue: Relation of the participle 'coming out of the tombs' to the temporal phrase
    'after his resurrection'
  chosen_reading: 'The main text places the resurrection timing with the coming out
    from the tombs: ''after coming out of the tombs after his resurrection, they entered...,''
    indicating that their exit and subsequent entry into the city occurred after Jesus''
    resurrection.'
  alternative_readings:
  - Some construe the participle more loosely with the previous verse, understanding
    the tombs to have been opened at Jesus' death but the saints to have come out
    only after his resurrection.
  - Some English renderings restructure the sentence to avoid the double 'after,'
    e.g., 'They came out of the tombs after his resurrection and entered...'
  rationale: The Greek syntax explicitly places μετὰ τὴν ἔγερσιν αὐτοῦ after ἐκ τῶν
    μνημείων, modifying the participial clause before the main verb. The translation
    preserves this sequence without importing a harmonization beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
