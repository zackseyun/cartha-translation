id: MAT.27.53
reference: Matthew 27:53
source:
  edition: SBLGNT
  text: καὶ ἐξελθόντες ἐκ τῶν μνημείων μετὰ τὴν ἔγερσιν αὐτοῦ εἰσῆλθον εἰς τὴν ἁγίαν
    πόλιν καὶ ἐνεφανίσθησαν πολλοῖς.
translation:
  text: And coming out of the tombs after his resurrection, they entered the holy
    city and appeared to many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''And they came out of the tombs after his resurrection,
      entered the holy city, and appeared to many.'' The Greek places ''after his
      resurrection'' between ''out of the tombs'' and ''they entered.'''
    reason: alternative_reading
  - marker: b
    text: '''The holy city'' refers to Jerusalem.'
    reason: cross_reference
  - marker: c
    text: Or 'And after coming out of the tombs after his resurrection'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξελθόντες
  chosen: after coming out
  alternatives:
  - having come out
  - coming out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is rendered with temporal force
    in natural English. 'After coming out' preserves the participial relationship
    without sounding wooden.
- source_word: μνημείων
  chosen: tombs
  alternatives:
  - graves
  lexicon: BDAG
  rationale: μνημεῖον commonly refers to a burial place or tomb. 'Tombs' fits the
    context of opened burial places in the preceding verse better than the broader
    'graves.'
- source_word: μετὰ τὴν ἔγερσιν αὐτοῦ
  chosen: after his resurrection
  alternatives:
  - after he was raised
  - after his rising
  lexicon: BDAG
  rationale: μετά with the accusative is temporal ('after'). ἔγερσις here refers to
    Jesus' being raised. 'After his resurrection' is idiomatic and clearly identifies
    the referent of αὐτοῦ as Jesus from context.
- source_word: εἰσῆλθον
  chosen: they entered
  alternatives:
  - they went into
  lexicon: BDAG
  rationale: Simple aorist narrative verb; 'entered' is concise and natural.
- source_word: τὴν ἁγίαν πόλιν
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: BDAG
  rationale: Standard rendering of the expression for Jerusalem. 'Holy city' preserves
    the biblical idiom and likely allusion to Jerusalem without overexplaining in
    the main text.
- source_word: ἐνεφανίσθησαν
  chosen: appeared
  alternatives:
  - were seen
  - made themselves visible
  lexicon: BDAG
  rationale: Passive form in context conveys becoming visible or appearing to others.
    'Appeared' is the most natural English rendering in narrative context.
- source_word: πολλοῖς
  chosen: to many
  alternatives:
  - to many people
  lexicon: BDAG
  rationale: The dative plural is indefinite. 'To many' is sufficiently clear and
    closer to the Greek; 'people' is implied and need not be added in the main text.
