  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/high_scrutiny/nt/matthew/027/053.job-4919.json
  category: awkward_english
  tier: 1
  from: And after coming out of the tombs after his resurrection
  to: And coming out of the tombs after his resurrection
  rationale: The current rendering's double 'after' ('after coming out... after his
    resurrection') is redundant and creates an awkward English construction. The temporal
    sequence is already clearly provided by 'after his resurrection,' which modifies
    the action of the participle. Translating the aorist participle ἐξελθόντες simply
    as 'coming out' creates a more natural English clause ('And coming out of the
    tombs after his resurrection, they entered...') that preserves the subordinate
    relationship without sacrificing readability.
