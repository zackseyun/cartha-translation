theological_decisions:
- issue: Rendering the christological title υἱὸς τοῦ θεοῦ in a mockery context
  chosen_reading: the Son of God
  alternative_readings:
  - God's Son
  rationale: The verse records mockers challenging Jesus' identity. The translation
    preserves the title straightforwardly without weakening or expanding its theological
    force. This aligns with historic orthodoxy while not importing claims beyond the
    text.
