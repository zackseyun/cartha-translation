id: MAT.27.40
reference: Matthew 27:40
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Ὁ καταλύων τὸν ναὸν καὶ ἐν τρισὶν ἡμέραις οἰκοδομῶν, σῶσον σεαυτόν·
    εἰ υἱὸς εἶ τοῦ θεοῦ, ⸀κατάβηθι ἀπὸ τοῦ σταυροῦ.
translation:
  text: and saying, “You who would destroy the temple and build it in three days,
    save yourself! If you are the Son of God, come down from the cross.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rebuild it.” The Greek verb is simply “build,” though the context of
      the taunt may imply rebuilding.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: and saying
  alternatives:
  - saying
  - and they were saying
  lexicon: BDAG
  rationale: Present participle coordinated with the previous narrative context; rendered
    as a participial continuation, preserving the mocking speech introduction without
    over-specifying the subject.
- source_word: Ὁ καταλύων
  chosen: You who would destroy
  alternatives:
  - You who destroy
  - Destroyer of
  lexicon: BDAG
  rationale: The article with participle functions vocatively in direct address. 'Would
    destroy' captures the taunting allusion to the accusation/claim about destroying
    the temple, better than a simple present in English.
- source_word: καταλύω
  chosen: destroy
  alternatives:
  - tear down
  - demolish
  lexicon: BDAG
  rationale: In context of the temple, 'destroy' is the most natural and established
    English equivalent, conveying dismantling without unnecessary colloquialism.
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: Although ναός can more specifically denote the sanctuary, in this taunt
    the referent is naturally understood by English readers as 'the temple.' 'Sanctuary'
    would sound overly technical here.
- source_word: ἐν τρισὶν ἡμέραις
  chosen: in three days
  alternatives:
  - within three days
  - in the course of three days
  lexicon: BDAG
  rationale: Standard temporal expression; 'in three days' is idiomatic and preserves
    the wording of the mock quotation.
- source_word: οἰκοδομῶν
  chosen: build it
  alternatives:
  - rebuild it
  - construct it
  lexicon: BDAG
  rationale: The verb means 'build,' and the object 'it' is supplied naturally in
    English from 'the temple.' 'Rebuild' is interpretive; while context may imply
    rebuilding, the Greek verb itself is simply 'build.'
- source_word: σῶσον σεαυτόν
  chosen: save yourself
  alternatives:
  - rescue yourself
  lexicon: BDAG
  rationale: Aorist imperative with reflexive pronoun; 'save yourself' is the direct
    and idiomatic rendering in this mocking challenge.
- source_word: εἰ υἱὸς εἶ τοῦ θεοῦ
  chosen: If you are the Son of God
  alternatives:
  - If you are God's Son
  lexicon: BDAG
  rationale: Retains the conditional taunt and the christological title in its familiar,
    transparent form. The article is naturally represented in English by 'the Son
    of God.'
- source_word: κατάβηθι
  chosen: come down
  alternatives:
  - go down
  - descend
  lexicon: BDAG
  rationale: Imperative of motion downward; 'come down' is the natural English command
    directed at someone elevated on a cross.
- source_word: σταυρός
  chosen: cross
  alternatives:
  - stake
  lexicon: BDAG
  rationale: '''Cross'' is the standard and contextually appropriate rendering in
    the passion narrative; ''stake'' is possible in some lexical discussions but is
    not the best contextual equivalent here.'
