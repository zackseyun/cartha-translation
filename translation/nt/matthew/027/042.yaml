theological_decisions:
- issue: Rendering the mock royal claim about Jesus
  chosen_reading: He is the King of Israel
  alternative_readings:
  - If he is the King of Israel
  rationale: The Greek text as given is an asyndetic nominal clause, not an explicit
    conditional. English can preserve the taunting assertion without inserting 'if,'
    which would add a conditional nuance not present in the wording. The mockers are
    derisively repeating the claim about Jesus rather than neutrally evaluating it.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
