id: MAT.27.42
reference: Matthew 27:42
source:
  edition: SBLGNT
  text: Ἄλλους ἔσωσεν, ἑαυτὸν οὐ δύναται σῶσαι· ⸀βασιλεὺς Ἰσραήλ ἐστιν, καταβάτω νῦν
    ἀπὸ τοῦ σταυροῦ καὶ πιστεύσομεν ἐπ’ ⸀αὐτόν.
translation:
  text: He saved others; he cannot save himself. He is the King of Israel; let him
    come down now from the cross, and we will believe in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If he is the King of Israel, let him come down now from the cross,
      and we will believe in him.' Some English translations make the mockery explicit
      by supplying a conditional sense, but the Greek here states the title directly.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄλλους
  chosen: others
  alternatives:
  - other people
  lexicon: BDAG
  rationale: Accusative plural used substantivally. 'Others' is the natural concise
    English equivalent and preserves the mocking contrast with 'himself.'
- source_word: ἔσωσεν
  chosen: saved
  alternatives:
  - rescued
  lexicon: BDAG
  rationale: Aorist indicative of σῴζω. 'Saved' fits both the immediate sense of deliverance/healing
    attributed to Jesus and the broader semantic range without over-paraphrasing.
- source_word: ἑαυτὸν
  chosen: himself
  lexicon: BDAG
  rationale: 'Reflexive pronoun marking the contrast: he allegedly saved others but
    not himself.'
- source_word: οὐ δύναται σῶσαι
  chosen: cannot save
  alternatives:
  - is not able to save
  lexicon: BDAG
  rationale: Standard rendering of δύναμαι + infinitive. 'Cannot save' is idiomatic
    modern English and preserves the taunt's force.
- source_word: βασιλεὺς Ἰσραήλ
  chosen: the King of Israel
  alternatives:
  - King of Israel
  lexicon: BDAG
  rationale: Title used mockingly but still a recognizable royal designation. English
    idiom normally includes the article here. Capitalized as a title in direct reference
    to Jesus.
- source_word: καταβάτω
  chosen: let him come down
  alternatives:
  - let him descend
  - he should come down
  lexicon: BDAG
  rationale: Third-person aorist imperative expressing challenge/mockery. 'Let him
    come down' is the most natural English equivalent.
- source_word: νῦν
  chosen: now
  alternatives:
  - at once
  lexicon: BDAG
  rationale: Temporal adverb heightening the immediacy of the mock demand.
- source_word: ἀπὸ τοῦ σταυροῦ
  chosen: from the cross
  lexicon: BDAG
  rationale: Straightforward prepositional phrase. 'Cross' is the standard and contextually
    precise rendering of σταυρός here.
- source_word: πιστεύσομεν ἐπ’ αὐτόν
  chosen: we will believe in him
  alternatives:
  - we will trust in him
  - we will believe him
  lexicon: BDAG
  rationale: πιστεύω with ἐπί + accusative commonly expresses belief directed toward
    a person, well rendered 'believe in him.' This also aligns with the default handling
    of πίστις-family terms while fitting idiomatic English.
