id: MAT.27.61
reference: Matthew 27:61
source:
  edition: SBLGNT
  text: ἦν δὲ ἐκεῖ ⸀Μαριὰμ ἡ Μαγδαληνὴ καὶ ἡ ἄλλη Μαρία καθήμεναι ἀπέναντι τοῦ τάφου.
translation:
  text: Now Mary Magdalene and the other Mary were there, sitting opposite the tomb.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦν ... ἐκεῖ
  chosen: were there
  alternatives:
  - was there
  lexicon: BDAG
  rationale: Although ἦν is singular, the construction introduces the presence of
    two coordinated subjects named afterward; idiomatic English uses the plural, 'were
    there,' to reflect the sense rather than reproducing the Greek singular literally.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative transition rather than
    strong contrast. 'Now' conveys the scene shift naturally in English.
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mariam the Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration and established identification of the
    person. 'Mary Magdalene' is natural modern English while preserving the proper
    name.
- source_word: ἡ ἄλλη Μαρία
  chosen: the other Mary
  alternatives:
  - the other Maria
  lexicon: BDAG
  rationale: ἄλλη distinguishes this Mary from Mary Magdalene already mentioned. 'The
    other Mary' is the straightforward and contextually clear rendering.
- source_word: καθήμεναι
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present participle describing their posture/location at the tomb. 'Sitting'
    is simple, natural, and preserves the ongoing aspect.
- source_word: ἀπέναντι
  chosen: opposite
  alternatives:
  - across from
  - facing
  lexicon: BDAG
  rationale: The preposition indicates position opposite or facing something. 'Opposite'
    is concise and sufficiently formal while remaining readable.
- source_word: τοῦ τάφου
  chosen: the tomb
  alternatives:
  - the grave
  - the sepulcher
  lexicon: BDAG
  rationale: τάφος in this burial context is best rendered 'tomb.' 'Grave' is less
    specific, and 'sepulcher' is archaic.
