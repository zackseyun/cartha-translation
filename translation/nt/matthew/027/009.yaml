theological_decisions:
- issue: Citation attribution to Jeremiah though the wording closely resembles Zechariah
    11:12–13
  chosen_reading: Retain the explicit text as 'Jeremiah the prophet' in the main text
    without harmonization.
  alternative_readings:
  - Some propose a scribal error for 'Zechariah'
  - Some explain Matthew as citing a prophetic collection headed by Jeremiah
  - Some see a composite citation with Jeremiah and Zechariah themes
  rationale: The translation should represent the Greek text as given and not resolve
    the long-standing attribution question by altering the name or paraphrasing. The
    issue is historical/textual, not something to be smoothed in translation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
