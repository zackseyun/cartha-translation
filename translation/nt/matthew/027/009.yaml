id: MAT.27.9
reference: Matthew 27:9
source:
  edition: SBLGNT
  text: τότε ἐπληρώθη τὸ ῥηθὲν διὰ Ἰερεμίου τοῦ προφήτου λέγοντος· Καὶ ἔλαβον τὰ τριάκοντα
    ἀργύρια, τὴν τιμὴν τοῦ τετιμημένου ὃν ἐτιμήσαντο ἀπὸ υἱῶν Ἰσραήλ,
translation:
  text: Then what was spoken through Jeremiah the prophet was fulfilled, saying, ‘And
    they took the thirty pieces of silver, the price of the one who had been priced,
    whom some of the sons of Israel priced,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Matthew attributes this prophetic word to Jeremiah. The wording most closely
      parallels Zechariah 11:12–13, and interpreters variously explain this as a composite
      citation, a reference to a prophetic collection, or a textual problem in transmission.
    reason: textual_variant
  - marker: b
    text: Or 'from the sons of Israel'; the Greek phrase is difficult, and 'some of
      the sons of Israel' reflects a likely partitive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the narrative; 'Then' is the natural
    concise English equivalent.
- source_word: ἐπληρώθη
  chosen: was fulfilled
  alternatives:
  - came to pass
  - was brought to fulfillment
  lexicon: BDAG
  rationale: Standard Matthean fulfillment formula; passive is preserved to reflect
    the Greek and avoid over-paraphrase.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - that which was spoken
  lexicon: BDAG
  rationale: Idiomatic English rendering of the articular participle while preserving
    the sense of a prior prophetic utterance.
- source_word: διὰ Ἰερεμίου τοῦ προφήτου
  chosen: through Jeremiah the prophet
  alternatives:
  - by Jeremiah the prophet
  lexicon: BDAG
  rationale: διά with genitive commonly indicates agency/instrumentality in prophetic
    citation formulas; 'through' is idiomatic and preserves prophetic mediation.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - which says
  lexicon: BDAG
  rationale: Conventional participial introduction to the quotation.
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - they received
  lexicon: BDAG
  rationale: λαμβάνω here is best rendered 'took' in the quotation context; 'received'
    is possible but less natural in English here.
- source_word: τὰ τριάκοντα ἀργύρια
  chosen: the thirty pieces of silver
  alternatives:
  - the thirty silver coins
  - the thirty silver pieces
  lexicon: BDAG
  rationale: Traditional but still clear rendering; ἀργύρια refers to silver money/pieces,
    not merely abstract silver.
- source_word: τὴν τιμὴν
  chosen: the price
  alternatives:
  - the value
  lexicon: BDAG
  rationale: τιμή in this commercial context denotes price/value; 'price' is more
    concrete and fits the quotation.
- source_word: τοῦ τετιμημένου
  chosen: of the one who had been priced
  alternatives:
  - of the valued one
  - of the one who had been valued
  lexicon: BDAG
  rationale: Perfect passive participle from τιμάω is difficult; in context it refers
    to the one on whom a price has been set. 'Priced' preserves the commercial irony
    better than 'valued.'
- source_word: ὃν ἐτιμήσαντο
  chosen: whom ... priced
  alternatives:
  - whom ... valued
  - for whom ... set a price
  lexicon: BDAG
  rationale: Repetition of τιμάω should be reflected in English for transparency.
    'Priced' keeps the lexical connection with the preceding participle.
- source_word: ἀπὸ υἱῶν Ἰσραήλ
  chosen: some of the sons of Israel
  alternatives:
  - from the sons of Israel
  - by the sons of Israel
  lexicon: BDAG
  rationale: The preposition ἀπό here is awkward in English if rendered woodenly.
    'Some of the sons of Israel' reflects the partitive nuance often recognized in
    this phrase while retaining the gender-accurate 'sons' per project philosophy.
