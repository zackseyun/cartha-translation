theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this verse χριστόν is a title attached to Jesus via 'the one called,'
    not a name-like surname. The doctrine excerpt directs that Christological titles
    be translated, and the contested-terms table gives 'Messiah' as the default where
    title is intended.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Inclusion of 'Jesus' before Barabbas
  chosen_reading: Included in main text as 'Jesus Barabbas'
  alternative_readings:
  - Barabbas
  rationale: The provided source text (SBLGNT) includes Ἰησοῦν before Βαραββᾶν, so
    the translation follows the given Greek text. Because many readers know the verse
    without 'Jesus' before Barabbas, the alternative is preserved in a footnote as
    a textual variant note.
