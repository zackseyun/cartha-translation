id: MAT.27.17
reference: Matthew 27:17
source:
  edition: SBLGNT
  text: συνηγμένων οὖν αὐτῶν εἶπεν αὐτοῖς ὁ Πιλᾶτος· Τίνα θέλετε ἀπολύσω ὑμῖν, ⸂Ἰησοῦν
    τὸν⸃ Βαραββᾶν ἢ Ἰησοῦν τὸν λεγόμενον χριστόν;
translation:
  text: 'So when they had gathered together, Pilate said to them, “Which one do you
    want me to release to you: Jesus Barabbas, or Jesus who is called Messiah?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read simply 'Barabbas' instead of 'Jesus Barabbas.'
    reason: textual_variant
  - marker: b
    text: Or 'Christ.' The Greek title is Christos, here rendered 'Messiah' because
      it functions as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: συνηγμένων
  chosen: when they had gathered together
  alternatives:
  - when they were assembled
  - after they had gathered
  lexicon: BDAG
  rationale: Genitive absolute with a perfect/passive participial form from συνάγω,
    functioning temporally. 'Had gathered together' preserves the completed action
    prior to Pilate's question and reads naturally in English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: Τίνα
  chosen: Which one
  alternatives:
  - Whom
  - Which
  lexicon: BDAG
  rationale: Accusative interrogative referring to a choice between two named individuals.
    'Which one' makes the binary contrast explicit and idiomatic in English.
- source_word: θέλετε
  chosen: do you want
  alternatives:
  - do you wish
  - are you willing
  lexicon: BDAG
  rationale: θέλω here expresses desire/preference. 'Do you want' is the clearest
    contemporary equivalent.
- source_word: ἀπολύσω
  chosen: me to release
  alternatives:
  - me to set free
  - me to pardon
  lexicon: BDAG
  rationale: In this judicial context ἀπολύω means to release/free a prisoner. Rendering
    with 'me to release' fits the English construction after 'do you want' and preserves
    the legal nuance better than 'pardon'.
- source_word: Ἰησοῦν τὸν Βαραββᾶν
  chosen: Jesus Barabbas
  alternatives:
  - Barabbas
  - Jesus, called Barabbas
  lexicon: BDAG
  rationale: The SBLGNT text includes Ἰησοῦν, so the draft reflects the printed reading
    directly. Keeping both names preserves the rhetorical force of the contrast between
    two men named Jesus.
- source_word: Ἰησοῦν τὸν λεγόμενον χριστόν
  chosen: Jesus who is called Messiah
  alternatives:
  - Jesus who is called Christ
  - Jesus, the so-called Messiah
  lexicon: BDAG
  rationale: λεγόμενον is best rendered 'who is called.' Per doctrine, Χριστός as
    a title is translated 'Messiah' rather than transliterated 'Christ.' 'So-called'
    would add a dismissive nuance not required by the Greek.
- source_word: χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Contested term policy specifies ''Messiah'' where Χριστός functions
    as a title. Here it is clearly titular: ''the one called Messiah.'''
