id: MAT.27.36
reference: Matthew 27:36
source:
  edition: SBLGNT
  text: καὶ καθήμενοι ἐτήρουν αὐτὸν ἐκεῖ.
translation:
  text: And sitting there, they kept watch over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And after sitting down there, they were guarding him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard connective; simple coordination is sufficient and preserves
    the narrative flow without adding temporal nuance not explicit in the conjunction.
- source_word: καθήμενοι
  chosen: sitting there
  alternatives:
  - having sat down
  - seated
  lexicon: BDAG
  rationale: The participle from κάθημαι denotes being seated. Rendering it as 'sitting
    there' gives natural English while preserving the attendant circumstance before
    the main verb. 'There' is grouped here in English for smoother style, though ἐκεῖ
    also modifies the scene.
- source_word: ἐτήρουν
  chosen: kept watch over
  alternatives:
  - were guarding
  - were watching
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action. 'Kept watch over' captures the
    durative sense better than a simple past and fits the crucifixion context, where
    the soldiers remain on guard.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Jesus; 'him' is the natural
    English equivalent.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Locative adverb marking the place of the action. In English it is best
    placed with the participial phrase ('sitting there') to avoid awkward word order
    while retaining the scene-setting function.
