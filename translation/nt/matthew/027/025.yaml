theological_decisions:
- issue: Potential anti-Jewish misreading of πᾶς ὁ λαὸς in context
  chosen_reading: Translate the phrase straightforwardly as the narrative's immediate
    crowd-level collective statement, 'all the people,' without expanding it into
    an ethnic or transhistorical claim.
  alternative_readings:
  - the whole crowd
  rationale: The Greek reports the response of the assembled people in the scene.
    The translation should neither soften the collective wording nor import a doctrine
    of perpetual corporate guilt beyond what the verse itself states. A clarifying
    footnote helps prevent overextension while preserving the text's wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
