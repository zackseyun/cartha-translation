id: MAT.27.25
reference: Matthew 27:25
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς πᾶς ὁ λαὸς εἶπεν· Τὸ αἷμα αὐτοῦ ἐφ’ ἡμᾶς καὶ ἐπὶ τὰ τέκνα ἡμῶν.
translation:
  text: And all the people answered, “His blood be on us and on our children.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the assembled people speaking in the scene; this wording should
      not be taken as assigning perpetual guilt to all Jews in every generation.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι functions idiomatically with
    εἶπεν to introduce a response. English normally renders the sense simply as 'answered'
    rather than the more wooden 'having answered, said.'
- source_word: πᾶς ὁ λαὸς
  chosen: all the people
  alternatives:
  - the whole crowd
  - all the crowd
  lexicon: BDAG
  rationale: πᾶς with the singular articular noun gives a collective sense, 'the whole
    people' or 'all the people.' 'All the people' is the most natural English rendering
    while preserving the collective force. 'Crowd' is possible contextually, but λαός
    more basically means 'people.'
- source_word: Τὸ αἷμα αὐτοῦ
  chosen: His blood
  alternatives:
  - the blood of him
  lexicon: BDAG
  rationale: The phrase is idiomatic and concise in English as 'His blood.' In this
    judicial context, 'blood' carries the sense of bloodguilt or responsibility for
    his death, but that implication should remain implicit in the translation rather
    than expanded interpretively in the main text.
- source_word: ἐφ’ ἡμᾶς
  chosen: be on us
  alternatives:
  - on us
  - upon us
  lexicon: BDAG
  rationale: The Greek is verbless, but English requires a supplied verb. 'Be on us'
    preserves the jussive/imprecatory force of the utterance without overinterpreting
    it. 'Upon us' is more formal but less natural in contemporary English.
- source_word: ἐπὶ τὰ τέκνα ἡμῶν
  chosen: and on our children
  alternatives:
  - and upon our children
  - and on our descendants
  lexicon: BDAG
  rationale: τέκνα most naturally means 'children.' 'Descendants' would broaden the
    scope beyond the immediate lexical sense. The repeated preposition is retained
    in English for emphasis and parallelism.
