id: MAT.27.15
reference: Matthew 27:15
source:
  edition: SBLGNT
  text: Κατὰ δὲ ἑορτὴν εἰώθει ὁ ἡγεμὼν ἀπολύειν ἕνα τῷ ὄχλῳ δέσμιον ὃν ἤθελον.
translation:
  text: Now at the feast the governor was accustomed to release to the crowd one prisoner,
    whom they wanted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the festival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ ἑορτὴν
  chosen: Now at the feast
  alternatives:
  - At the feast
  - Now during the feast
  - According to the feast
  lexicon: BDAG
  rationale: κατά with the accusative in this idiom is temporal, meaning 'at/during'
    a festival time, not 'according to.' δέ is lightly connective; 'Now' captures
    the narrative transition without overtranslating.
- source_word: ἑορτὴν
  chosen: the feast
  alternatives:
  - the festival
  lexicon: BDAG
  rationale: ἑορτή refers to a festival/feast. 'The feast' is natural English and
    fits the Passover context already established in the narrative, while remaining
    close to the Greek.
- source_word: εἰώθει
  chosen: was accustomed
  alternatives:
  - used to
  - had the custom
  - was in the habit
  lexicon: BDAG
  rationale: The imperfect of εἴωθα expresses customary past practice. 'Was accustomed'
    preserves the habitual sense more explicitly than the simpler 'used to.'
- source_word: ὁ ἡγεμὼν
  chosen: the governor
  alternatives:
  - the ruler
  - the prefect
  lexicon: BDAG
  rationale: ἡγεμών in this context refers to the Roman provincial governor. 'Governor'
    is the standard, clear rendering in modern English.
- source_word: ἀπολύειν
  chosen: to release
  alternatives:
  - to set free
  - to free
  lexicon: BDAG
  rationale: ἀπολύω here means to release from custody. 'Release' is precise and idiomatic
    in a judicial setting.
- source_word: ἕνα
  chosen: one
  alternatives:
  - a single
  lexicon: BDAG
  rationale: ἕνα marks the number of prisoners released. 'One' is the straightforward
    rendering.
- source_word: τῷ ὄχλῳ
  chosen: to the crowd
  alternatives:
  - for the crowd
  - to the multitude
  lexicon: BDAG
  rationale: 'The dative here is best taken as indirect object: the prisoner was released
    ''to'' the crowd, that is, at their disposal/request. ''Crowd'' is natural modern
    English for ὄχλος.'
- source_word: δέσμιον
  chosen: prisoner
  alternatives:
  - captive
  lexicon: BDAG
  rationale: δέσμιος denotes someone in bonds or custody. 'Prisoner' is the clearest
    contextual equivalent.
- source_word: ὃν ἤθελον
  chosen: whom they wanted
  alternatives:
  - whomever they wanted
  - the one they wanted
  - whom they wished
  lexicon: BDAG
  rationale: The relative clause identifies the prisoner selected by the crowd. Although
    English often uses 'whomever they wanted' in such constructions, the Greek has
    a singular relative pronoun referring back to 'one prisoner'; 'whom they wanted'
    is both accurate and smooth.
