id: MAT.27.33
reference: Matthew 27:33
source:
  edition: SBLGNT
  text: Καὶ ἐλθόντες εἰς τόπον λεγόμενον Γολγοθᾶ, ὅ ἐστιν ⸂Κρανίου Τόπος λεγόμενος⸃,
translation:
  text: And when they came to a place called Golgotha (which means Place of a Skull),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'which is called Place of the Skull' or 'which means
      Place of the Skull.' The Greek is an explanatory gloss of the name Golgotha.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  chosen: when they came
  alternatives:
  - having come
  - after they came
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι is rendered with a natural temporal sense
    in English. 'When they came' preserves the narrative flow better than the more
    wooden 'having come.'
- source_word: τόπον
  chosen: a place
  alternatives:
  - the place
  - a location
  lexicon: BDAG
  rationale: τόπος commonly means 'place.' The anarthrous construction in Greek is
    naturally rendered 'a place' here.
- source_word: λεγόμενον
  chosen: called
  alternatives:
  - named
  - being called
  lexicon: BDAG
  rationale: The participle from λέγω in this idiom means 'called/named.' 'Called'
    is the most idiomatic and transparent English rendering.
- source_word: Γολγοθᾶ
  chosen: Golgotha
  lexicon: BDAG
  rationale: As a place name, it is transliterated in keeping with the translation
    philosophy to transliterate names rather than translate them.
- source_word: ὅ ἐστιν
  chosen: which means
  alternatives:
  - which is
  - that is
  lexicon: BDAG
  rationale: This explanatory formula introduces the meaning of the Aramaic/Hebrew
    place name for Greek readers. 'Which means' communicates the explanatory force
    more clearly than the more literal 'which is.'
- source_word: Κρανίου Τόπος
  chosen: Place of a Skull
  alternatives:
  - Skull Place
  - Place of the Skull
  lexicon: BDAG
  rationale: κρανίον means 'skull,' here in the genitive, and τόπος means 'place.'
    'Place of a Skull' closely reflects the anarthrous Greek while remaining natural
    English. 'Place of the Skull' is traditional but adds definiteness not explicit
    in the Greek.
- source_word: λεγόμενος
  chosen: called
  alternatives:
  - named
  - being called
  lexicon: BDAG
  rationale: The repeated participle again marks the designation of the place. In
    English, the explanatory parenthesis absorbs the repetition naturally without
    awkward duplication.
