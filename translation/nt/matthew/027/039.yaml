id: MAT.27.39
reference: Matthew 27:39
source:
  edition: SBLGNT
  text: οἱ δὲ παραπορευόμενοι ἐβλασφήμουν αὐτὸν κινοῦντες τὰς κεφαλὰς αὐτῶν
translation:
  text: And those passing by were blaspheming him, shaking their heads,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were reviling him.' The Greek verb can mean abusive speech or slander,
      not only blasphemy in the narrow sense of speech against God.
    reason: lexical_alternative
  - marker: b
    text: A gesture of scorn or derision; compare Psalm 22:7.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And those
  alternatives:
  - Now those
  - But those
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' fits the narrative flow in natural English
    without overstating contrast. The article with participle is substantival, hence
    'those'.
- source_word: παραπορευόμενοι
  chosen: passing by
  alternatives:
  - going by
  - walking past
  - passersby
  lexicon: BDAG
  rationale: The present middle participle functions substantivally for people moving
    past the crucifixion site. 'Passing by' is idiomatic and preserves the ongoing
    action better than the noun 'passersby'.
- source_word: ἐβλασφήμουν
  chosen: were blaspheming
  alternatives:
  - were reviling
  - were mocking
  - were speaking abusively against
  lexicon: BDAG
  rationale: The imperfect indicates continued action, so 'were blaspheming' preserves
    aspect. Although in English 'blaspheme' often implies speech directly against
    God, the Greek verb can also denote abusive, slanderous reviling against a person.
    Because Matthew uses the stronger verb here, the translation keeps 'blaspheming'
    rather than softening to 'mocking,' while allowing a lexical alternative in a
    footnote for readers who may hear the English term too narrowly.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronoun rendering.
- source_word: κινοῦντες
  chosen: shaking
  alternatives:
  - wagging
  - moving
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and describes the
    gesture accompanying the abuse. 'Shaking' is clear modern English. 'Wagging' is
    traditional and possible, but sounds archaic to many readers.
- source_word: τὰς κεφαλὰς αὐτῶν
  chosen: their heads
  alternatives:
  - their head
  lexicon: BDAG
  rationale: The plural is retained naturally in English. The phrase is a conventional
    gesture of derision or scorn.
