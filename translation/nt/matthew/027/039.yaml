theological_decisions:
- issue: Semantic force of βλασφημέω when directed at Jesus in a passion narrative
  chosen_reading: Retain the stronger rendering 'blaspheming' in the main text
  alternative_readings:
  - reviling
  - mocking
  rationale: The Greek verb is stronger than a generic insult term and, in context,
    the abuse of Jesus carries theological weight without requiring the translator
    to add doctrinal commentary. Keeping 'blaspheming' preserves Matthew's diction;
    an alternative is noted because English readers may associate 'blasphemy' exclusively
    with speech against God.
  doctrine_reference: Translation philosophy §§1, 3, 6
