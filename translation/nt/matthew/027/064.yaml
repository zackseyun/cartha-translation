id: MAT.27.64
reference: Matthew 27:64
source:
  edition: SBLGNT
  text: κέλευσον οὖν ἀσφαλισθῆναι τὸν τάφον ἕως τῆς τρίτης ἡμέρας, μήποτε ἐλθόντες
    οἱ μαθηταὶ ⸀αὐτοῦ κλέψωσιν αὐτὸν καὶ εἴπωσιν τῷ λαῷ· Ἠγέρθη ἀπὸ τῶν νεκρῶν, καὶ
    ἔσται ἡ ἐσχάτη πλάνη χείρων τῆς πρώτης.
translation:
  text: Therefore, order the tomb to be secured until the third day, lest his disciples
    come and steal him away and say to the people, ‘He has been raised from the dead,’
    and the last deception will be worse than the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts add ''by night'' after ''come'': ''lest his disciples
      come by night and steal him away.'' The shorter reading is followed here.'
    reason: textual_variant
  - marker: b
    text: Or, 'He was raised from the dead.' The Greek is passive.
    reason: lexical_alternative
lexical_decisions:
- source_word: κέλευσον
  chosen: order
  alternatives:
  - command
  - give orders
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive official action. 'Order' is concise,
    natural English in the context of an appeal to Pilate's authority.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the previous statement. 'Therefore' preserves the
    logical connection more clearly than the lighter 'then.'
- source_word: ἀσφαλισθῆναι
  chosen: to be secured
  alternatives:
  - to be made secure
  - to be guarded
  lexicon: BDAG
  rationale: The passive infinitive denotes making the tomb secure. 'Secured' is broader
    than 'guarded' and fits the later mention of sealing/guarding without over-specifying
    the means.
- source_word: τάφον
  chosen: tomb
  alternatives:
  - grave
  lexicon: BDAG
  rationale: In the burial context of Jesus, 'tomb' better matches the rock-hewn burial
    place than the more generic 'grave.'
- source_word: ἕως τῆς τρίτης ἡμέρας
  chosen: until the third day
  alternatives:
  - until day three
  lexicon: BDAG
  rationale: Standard temporal expression. 'Until the third day' is idiomatic and
    preserves the wording tied to the resurrection prediction.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: BDAG
  rationale: Introduces the feared possibility. 'Lest' is compact and accurately reflects
    the preventative force.
- source_word: ἐλθόντες
  chosen: come
  alternatives:
  - having come
  - come by night
  lexicon: BDAG
  rationale: Aorist participle preceding the main verbs. In smooth English, the participial
    action is naturally rendered with a finite verb coordinated with the following
    actions. 'By night' is absent from this Greek text and should not be imported
    from later textual traditions.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Straightforward possessive construction; idiomatic English is 'his disciples.'
- source_word: κλέψωσιν αὐτὸν
  chosen: steal him away
  alternatives:
  - steal him
  - steal the body
  lexicon: BDAG
  rationale: The direct object is 'him,' referring to Jesus' body. 'Steal him away'
    is idiomatic English that preserves the personal pronoun without flattening it
    to 'the body,' which the Greek does not say explicitly.
- source_word: εἴπωσιν τῷ λαῷ
  chosen: say to the people
  alternatives:
  - tell the people
  - say to the crowd
  lexicon: BDAG
  rationale: λαός here refers to the people generally, not merely a gathered crowd
    at that moment. 'Say to the people' stays close to the Greek while remaining natural.
- source_word: Ἠγέρθη
  chosen: He has been raised
  alternatives:
  - He was raised
  - He is risen
  - He has risen
  lexicon: BDAG
  rationale: 'Aorist passive: the claim reported by the opponents is that Jesus was
    raised. ''He has been raised'' preserves the passive voice, which is theologically
    significant in resurrection language, while remaining natural in English.'
- source_word: ἀπὸ τῶν νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the plural expression in resurrection
    contexts.
- source_word: ἡ ἐσχάτη πλάνη
  chosen: the last deception
  alternatives:
  - the final deception
  - the last error
  lexicon: BDAG
  rationale: πλάνη can denote deception or delusion. In this hostile speech, 'deception'
    best captures the alleged misleading claim they fear will spread.
- source_word: χείρων τῆς πρώτης
  chosen: worse than the first
  alternatives:
  - worse than the former one
  lexicon: BDAG
  rationale: Comparative construction contrasting a later deception with an earlier
    one. 'The first' is the most direct rendering.
