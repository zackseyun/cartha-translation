theological_decisions:
- issue: Rendering the resurrection claim in reported speech
  chosen_reading: He has been raised from the dead
  alternative_readings:
  - He was raised from the dead
  - He is risen
  rationale: The Greek uses a passive verb (Ἠγέρθη). Preserving the passive avoids
    importing an interpretive shift to an active/intransitive form and retains the
    common NT pattern in which God is implicitly the raiser, while not making that
    subject explicit beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence; original-language primacy over translation tradition.'
