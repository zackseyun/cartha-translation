id: MAT.27.50
reference: Matthew 27:50
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς πάλιν κράξας φωνῇ μεγάλῃ ἀφῆκεν τὸ πνεῦμα.
translation:
  text: But Jesus cried out again with a loud voice and gave up his spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breathed his last.' The Greek literally says 'gave up the spirit,' an
      idiom for dying.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast or progression. 'But' fits the
    narrative turn after the preceding events and is idiomatic in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - a second time
  lexicon: BDAG
  rationale: πάλιν straightforwardly indicates repetition. 'Again' is the most natural
    concise rendering.
- source_word: κράξας
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: The aorist participle from κράζω denotes a loud cry. 'Cried out' preserves
    both the vocal force and the participial linkage to the main verb.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: This dative phrase expresses manner/instrument. 'With a loud voice' is
    standard, clear English and preserves the emphasis on volume; 'great voice' would
    be overly literal and unnatural.
- source_word: ἀφῆκεν
  chosen: gave up
  alternatives:
  - released
  - let go
  - yielded
  lexicon: BDAG
  rationale: ἀφίημι has a broad semantic range ('send away,' 'release,' 'leave').
    In this idiom with τὸ πνεῦμα, 'gave up' best reflects the conventional sense at
    death without importing more interpretation than the Greek warrants.
- source_word: τὸ πνεῦμα
  chosen: his spirit
  alternatives:
  - the spirit
  - his breath
  lexicon: BDAG
  rationale: 'Although the Greek has the article (''the spirit''), English idiom in
    this death expression normally uses a possessive: ''his spirit.'' ''Breath'' is
    possible in some contexts, but here ''spirit'' better preserves the wording and
    theological weight of πνεῦμα.'
