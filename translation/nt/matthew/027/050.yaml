theological_decisions:
- issue: Rendering the death idiom ἀφῆκεν τὸ πνεῦμα
  chosen_reading: gave up his spirit
  alternative_readings:
  - breathed his last
  - yielded up his spirit
  rationale: The Greek idiom can be rendered more interpretively as 'breathed his
    last,' but that shifts πνεῦμα toward 'breath' and loses the lexical connection
    to 'spirit.' 'Gave up his spirit' preserves the source wording and the solemnity
    of the scene while remaining natural English. 'Yielded up his spirit' is traditional
    but less natural in contemporary English.
  doctrine_reference: Translation philosophy §§1, 3, 6
