id: MAT.27.14
reference: Matthew 27:14
source:
  edition: SBLGNT
  text: καὶ οὐκ ἀπεκρίθη αὐτῷ πρὸς οὐδὲ ἓν ῥῆμα, ὥστε θαυμάζειν τὸν ἡγεμόνα λίαν.
translation:
  text: And he did not answer him with even one word, so that the governor was greatly
    amazed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with not even a single word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the governor marveled greatly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: did not answer
  alternatives:
  - made no reply
  - did not respond
  lexicon: BDAG
  rationale: Aorist passive-form deponent of ἀποκρίνομαι commonly means 'answer' or
    'reply.' 'Did not answer' is direct and idiomatic in English, preserving the verbal
    force without unnecessary expansion.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun indicating the person addressed; 'him' is the natural
    English object with 'answer.' In context this refers to the governor/Pilate.
- source_word: πρὸς οὐδὲ ἓν ῥῆμα
  chosen: with even one word
  alternatives:
  - to not even one charge
  - concerning even one matter
  - with not even a single word
  lexicon: BDAG
  rationale: ῥῆμα here is best taken in its common sense 'word, statement.' The preposition
    πρὸς with this idiom intensifies the idea of giving no reply at all. 'With even
    one word' is idiomatic and preserves the emphatic negation οὐδὲ ἕν.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: ὥστε introduces a result clause. 'So that' preserves the consequential
    sense without overformalizing.
- source_word: θαυμάζειν
  chosen: was ... amazed
  alternatives:
  - marveled
  - was marveling
  lexicon: BDAG
  rationale: Present infinitive after ὥστε expresses resulting reaction. English finite
    restructuring is required; 'was greatly amazed' communicates the governor's ongoing/resultant
    astonishment naturally.
- source_word: ἡγεμόνα
  chosen: the governor
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: ἡγεμών in this Roman provincial context refers to the governor, specifically
    Pilate. 'Governor' is the standard and contextually precise rendering.
- source_word: λίαν
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: λίαν intensifies the verb. 'Greatly' is concise, natural, and preserves
    the strong degree of astonishment.
