id: MAT.25.39
reference: Matthew 25:39
source:
  edition: SBLGNT
  text: πότε δέ σε εἴδομεν ⸀ἀσθενοῦντα ἢ ἐν φυλακῇ καὶ ἤλθομεν πρός σε;
translation:
  text: And when did we see you sick or in prison and come to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit you.' The Greek says more literally, 'come to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Interrogative adverb asking for the time of the action. 'When' is the
    natural English equivalent in direct speech.
- source_word: δέ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in a sequence of questions, best
    rendered with simple 'and' in idiomatic English rather than a stronger adversative.
- source_word: εἴδομεν
  chosen: did we see
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω. In English interrogative style, 'did we see'
    is more natural than the bare preterite while preserving past reference.
- source_word: ἀσθενοῦντα
  chosen: sick
  alternatives:
  - ill
  - weak
  lexicon: BDAG
  rationale: Present participle of ἀσθενέω, here describing physical illness in parallel
    with hunger, thirst, nakedness, and imprisonment in the surrounding context. 'Sick'
    is the clearest modern English rendering; 'weak' would be too broad.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in jail
  - in custody
  lexicon: BDAG
  rationale: φυλακή here denotes a place of confinement. 'In prison' is standard and
    suitably formal; 'jail' is more colloquial and potentially narrower by modern
    legal distinctions not present in the Greek.
- source_word: ἤλθομεν πρός σε
  chosen: come to you
  alternatives:
  - visit you
  - go to you
  lexicon: BDAG
  rationale: The Greek is literally 'came to you.' 'Come to you' preserves the verbal
    simplicity and directness of the source. 'Visit you' is interpretive and appears
    in some English versions, but the Greek does not explicitly use a verb meaning
    'visit,' so the more transparent rendering is preferred.
