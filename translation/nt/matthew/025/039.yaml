theological_decisions:
- issue: Whether to render ἤλθομεν πρός σε idiomatically as 'visited you' or more
    literally as 'came to you'
  chosen_reading: come to you
  alternative_readings:
  - visit you
  rationale: The verse concerns acts of mercy toward the Son of Man identified with
    'the least of these,' but the Greek expression itself is straightforward motion
    toward a person, not the more specific concept of paying a visit. To avoid importing
    interpretive nuance beyond the wording, the main text keeps 'come to you,' while
    preserving 'visit you' as a lexical alternative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
