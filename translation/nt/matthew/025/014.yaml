id: MAT.25.14
reference: Matthew 25:14
source:
  edition: SBLGNT
  text: Ὥσπερ γὰρ ἄνθρωπος ἀποδημῶν ἐκάλεσεν τοὺς ἰδίους δούλους καὶ παρέδωκεν αὐτοῖς
    τὰ ὑπάρχοντα αὐτοῦ,
translation:
  text: For it is like a man going on a journey, who called his own slaves and entrusted
    his possessions to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his own servants" or "his own bondservants." The Greek word is doulos,
      which can denote a servant or a slave depending on context; here "slaves" was
      chosen because the master's ownership and authority are prominent.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  chosen: For it is like
  alternatives:
  - For just as
  - For it is just like
  lexicon: BDAG
  rationale: Introduces an explanatory comparison to the preceding statement about
    the kingdom. English supplies 'it is' for a complete sentence, reflecting the
    elliptical comparison naturally.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The singular masculine noun here refers to a male figure within the parable,
    not generic humanity. This follows the gender-accurate principle.
- source_word: ἀποδημῶν
  chosen: going on a journey
  alternatives:
  - traveling abroad
  - going away
  lexicon: BDAG
  rationale: The participle denotes departure to another place, often for travel.
    'Going on a journey' is natural modern English and preserves the sense without
    over-specifying 'abroad'.
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: '''Called'' is the straightforward gloss; ''summoned'' is possible but
    slightly more formal than needed here.'
- source_word: τοὺς ἰδίους δούλους
  chosen: his own slaves
  alternatives:
  - his own servants
  - his own bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'slave' where bonded status is salient.
    In this parable the household members and the master's authority over property
    entrusted to them make the bonded relationship prominent. ἰδίους adds possession/intimacy,
    hence 'his own.'
- source_word: παρέδωκεν
  chosen: entrusted
  alternatives:
  - handed over
  - gave over
  lexicon: BDAG
  rationale: In context of assigning stewardship over property, 'entrusted' captures
    the transfer with responsibility better than the more mechanical 'handed over.'
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  chosen: his possessions
  alternatives:
  - his property
  - what belonged to him
  lexicon: BDAG
  rationale: The phrase refers to the man's belongings/property. 'His possessions'
    is clear, idiomatic, and fits the parable's economic setting.
