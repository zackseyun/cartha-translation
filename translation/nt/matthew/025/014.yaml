theological_decisions:
- issue: Rendering δοῦλος in a parabolic household context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The translation follows the doctrine's default of 'servant / slave (context-dependent)'
    and chooses 'slaves' because the master's ownership and authority are foregrounded
    in the parable. This avoids softening the social reality implied by δοῦλος while
    remaining readable.
