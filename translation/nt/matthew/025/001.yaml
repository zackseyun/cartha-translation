theological_decisions:
- issue: Parabolic comparison formula
  chosen_reading: the kingdom of heaven will be compared to ten virgins
  alternative_readings:
  - the kingdom of heaven will be like ten virgins
  rationale: The Greek uses a future passive verb, so the chosen rendering preserves
    the grammatical form and avoids smoothing it into a simple predicate. This is
    a translational rather than doctrinal decision, but it affects how explicitly
    the comparison is framed.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering παρθένοις
  chosen_reading: virgins
  alternative_readings:
  - maidens
  - unmarried women
  rationale: The term's lexical force in this wedding setting includes the sense traditionally
    conveyed by 'virgins.' The translation preserves the source's specificity rather
    than broadening it to a less marked social description.
  doctrine_reference: Translation philosophy §1
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/025/001.json
  category: awkward_english
  tier: 1
  from: will be compared to
  to: will be like
  rationale: While 'will be compared to' is a literal and defensible rendering of
    the future passive ὁμοιωθήσεται, it is stylistically formal and less natural in
    English than the common alternative 'will be like'. Major translations often prefer
    the more idiomatic 'is like' or 'will be like' even for the passive forms (e.g.,
    Matt 13:24, 18:23, 22:2). Adopting the more natural phrasing would improve readability
    and align with the typical English rendering of this parabolic formula without
    sacrificing the core meaning of comparison. The current footnote already captures
    the nuance of the passive verb, making a more idiomatic rendering in the main
    text a safe and preferable option.
