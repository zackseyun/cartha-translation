id: MAT.25.1
reference: Matthew 25:1
source:
  edition: SBLGNT
  text: Τότε ὁμοιωθήσεται ἡ βασιλεία τῶν οὐρανῶν δέκα παρθένοις, αἵτινες λαβοῦσαι
    τὰς λαμπάδας ⸀ἑαυτῶν ἐξῆλθον εἰς ⸀ὑπάντησιν τοῦ νυμφίου.
translation:
  text: Then the kingdom of heaven will be like ten virgins, who took their lamps
    and went out to meet the bridegroom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or "will be like ten virgins." The Greek verb is passive: "will be compared
      to" or "will be likened to."'
    reason: lexical_alternative
  - marker: b
    text: Or "torches" for "lamps." The Greek term can refer to a handheld light source
      in a procession.
    reason: lexical_alternative
  - marker: c
    text: Or 'will be compared to'.
    reason: previous_rendering
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker linking this parable to the preceding eschatological
    context; 'Then' is natural and sufficiently formal.
- source_word: ὁμοιωθήσεται
  chosen: will be compared to
  alternatives:
  - will be like
  - will be likened to
  lexicon: BDAG
  rationale: Future passive of ὁμοιόω. The passive sense is explicit in Greek; 'will
    be compared to' preserves that better than the more idiomatic but less formally
    transparent 'will be like.'
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. Singular 'heaven' is idiomatic English
    while preserving the meaning of the genitive plural expression.
- source_word: δέκα παρθένοις
  chosen: ten virgins
  alternatives:
  - ten maidens
  - ten unmarried women
  lexicon: BDAG
  rationale: παρθένος here denotes young unmarried women, with virginity conventionally
    implied in the wedding setting. 'Virgins' is the most direct and traditional rendering,
    preserving the lexical force better than the softer 'maidens.'
- source_word: αἵτινες
  chosen: who
  alternatives:
  - which women
  lexicon: BDAG
  rationale: Indefinite/qualitative relative pronoun introducing the descriptive clause.
    Simple 'who' is idiomatic English.
- source_word: λαβοῦσαι
  chosen: took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb. English commonly renders
    this naturally with a finite verb coordinated to the main action; the temporal
    sequence remains clear.
- source_word: τὰς λαμπάδας ἑαυτῶν
  chosen: their lamps
  alternatives:
  - their torches
  lexicon: BDAG
  rationale: λαμπάς can denote a lamp or torch. In this parable's traditional English
    reception and likely wedding-procession context, 'lamps' is the conventional and
    acceptable rendering, while 'torches' remains a plausible lexical alternative
    worth preserving in a footnote.
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, indicating movement outward. 'Went out' is clear
    modern English.
- source_word: εἰς ὑπάντησιν
  chosen: to meet
  alternatives:
  - for a meeting with
  - for the reception of
  lexicon: BDAG
  rationale: Idiomatic expression meaning to go out for the purpose of meeting someone.
    'To meet' is the most natural English equivalent.
- source_word: τοῦ νυμφίου
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: νυμφίος specifically denotes the bridegroom in wedding context. 'Bridegroom'
    preserves the formal wedding imagery more clearly than the shorter 'groom.'
