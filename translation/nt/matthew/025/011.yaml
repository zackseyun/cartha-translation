id: MAT.25.11
reference: Matthew 25:11
source:
  edition: SBLGNT
  text: ὕστερον δὲ ἔρχονται καὶ αἱ λοιπαὶ παρθένοι λέγουσαι· Κύριε κύριε, ἄνοιξον
    ἡμῖν·
translation:
  text: Later, the other virgins also come, saying, ‘Lord, lord, open to us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remaining virgins.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Sir, sir'' or ''Master, master.'' Greek: ''Kyrios, kyrios.'''
    reason: alternative_reading
  - marker: c
    text: The Greek says simply 'open to us'; 'the door' is implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  chosen: Later
  alternatives:
  - Afterward
  - Later on
  lexicon: BDAG
  rationale: Temporal adverb marking subsequent action in the narrative. 'Later' is
    natural modern English and preserves the sequence without unnecessary expansion.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. In English, the transition is adequately conveyed
    by word order and 'Later,' so an explicit conjunction is omitted for natural style
    under optimal equivalence.
- source_word: ἔρχονται
  chosen: come
  alternatives:
  - arrive
  - are coming
  lexicon: BDAG
  rationale: Present middle/passive form used as a vivid/narrative present. 'Come'
    preserves the immediacy of the Greek better than the more interpretive 'arrive.'
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - too
  lexicon: BDAG
  rationale: Here καί adds the remaining virgins to the scene. 'Also' captures the
    additive force more clearly than a simple 'and' in English.
- source_word: αἱ λοιπαὶ παρθένοι
  chosen: the other virgins
  alternatives:
  - the rest of the virgins
  - the remaining virgins
  lexicon: BDAG
  rationale: λοιπαί means 'the rest/remaining/other.' 'The other virgins' is concise
    and idiomatic. παρθένοι is most directly 'virgins'; in this parabolic context
    the term denotes unmarried maidens, and the more literal rendering preserves the
    source wording.
- source_word: λέγουσαι
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: Present participle introducing direct speech. 'Saying' is the most straightforward
    English participial equivalent.
- source_word: Κύριε κύριε
  chosen: Lord, lord
  alternatives:
  - Sir, sir
  - Master, master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this address within the parable,
    'Lord' fits both the immediate social sense and Matthew's broader theological
    resonance. The repetition is retained for urgency. Lowercase second 'lord' is
    not used so that both vocatives match the Greek title consistently.
- source_word: ἄνοιξον ἡμῖν
  chosen: open to us
  alternatives:
  - open for us
  - open the door to us
  lexicon: BDAG
  rationale: Aorist imperative plus dative pronoun requests that the door be opened
    for their benefit/access. 'Open to us' is concise and idiomatic; 'the door' is
    implied by context but not explicit in the Greek, so it is not added to the main
    text.
