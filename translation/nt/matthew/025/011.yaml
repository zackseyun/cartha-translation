theological_decisions:
- issue: Rendering of κύριος in direct address
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default rendering.
    In Matthew, this term can carry both respectful address and theological weight;
    retaining 'Lord' preserves that tension rather than flattening it to a merely
    social title.
