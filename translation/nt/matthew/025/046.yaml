id: MAT.25.46
reference: Matthew 25:46
source:
  edition: SBLGNT
  text: καὶ ἀπελεύσονται οὗτοι εἰς κόλασιν αἰώνιον, οἱ δὲ δίκαιοι εἰς ζωὴν αἰώνιον.
translation:
  text: And these will go away into eternal punishment, but the righteous into eternal
    life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'age-long punishment' ... 'age-long life.' The adjective αἰώνιος is debated
      in some contexts, but here the same word modifies both 'punishment' and 'life,'
      so the translation preserves the parallel with 'eternal' in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελεύσονται
  chosen: will go away
  alternatives:
  - will depart
  - will go off
  lexicon: BDAG
  rationale: Future middle of ἀπέρχομαι, indicating departure or going away. 'Will
    go away' is natural modern English and preserves the movement/result sense without
    adding interpretive detail.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these people
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the group just described. 'These'
    is sufficiently clear and keeps the contrast with 'the righteous' concise.
- source_word: κόλασιν
  chosen: punishment
  alternatives:
  - correction
  - penalty
  lexicon: BDAG
  rationale: In this judgment context, κόλασις denotes punitive consequence rather
    than remedial discipline. 'Punishment' is the clearest and most contextually appropriate
    English rendering.
- source_word: αἰώνιον
  chosen: eternal
  alternatives:
  - everlasting
  - age-long
  lexicon: BDAG
  rationale: Used in parallel for both punishment and life in the same sentence. 'Eternal'
    is the standard, natural rendering in this context and best preserves the symmetry
    of the Greek. 'Age-long' is preserved in a footnote as a lexical alternative because
    the term is debated in some theological discussions.
- source_word: δίκαιοι
  chosen: the righteous
  alternatives:
  - the just
  lexicon: BDAG
  rationale: Substantival adjective referring to those counted or characterized as
    righteous. 'The righteous' is idiomatic and preserves the moral-covenantal sense
    better than the less common 'the just' in contemporary English.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: Standard rendering of ζωή. No contextual reason to expand beyond 'life.'
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  lexicon: BDAG
  rationale: Marks contrast between the two groups and their destinies. 'But' makes
    the adversative force explicit in English.
