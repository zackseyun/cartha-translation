theological_decisions:
- issue: Rendering of αἰώνιον in the paired expressions κόλασιν αἰώνιον and ζωὴν αἰώνιον
  chosen_reading: Render αἰώνιον as 'eternal' in both clauses
  alternative_readings:
  - everlasting
  - age-long
  rationale: The same adjective modifies both 'punishment' and 'life,' so translation
    should preserve the parallelism rather than differentiate the duration or quality
    between the two clauses. 'Eternal' is the most natural English rendering and aligns
    with historic orthodox reading while remaining lexically defensible. Because 'age-long'
    is sometimes proposed in theological debate, it is preserved in a footnote rather
    than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
