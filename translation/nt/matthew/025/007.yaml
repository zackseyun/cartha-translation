id: MAT.25.7
reference: Matthew 25:7
source:
  edition: SBLGNT
  text: τότε ἠγέρθησαν πᾶσαι αἱ παρθένοι ἐκεῖναι καὶ ἐκόσμησαν τὰς λαμπάδας ⸀ἑαυτῶν.
translation:
  text: Then all those virgins got up and trimmed their lamps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches' for 'lamps' (Greek λαμπάδας); the term can refer to a handheld
      light source, and the context of oil and preparation supports either rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next event in sequence; 'Then' is natural
    modern English and preserves the narrative flow.
- source_word: ἠγέρθησαν
  chosen: got up
  alternatives:
  - rose
  - were awakened
  lexicon: BDAG
  rationale: Aorist passive of ἐγείρω here refers to rising from sleep or a resting
    position. 'Got up' is idiomatic and clear in modern English. 'Were awakened' is
    possible in context but less direct, since the following action implies rising.
- source_word: πᾶσαι αἱ παρθένοι ἐκεῖναι
  chosen: all those virgins
  alternatives:
  - all those young women
  - all those maidens
  lexicon: BDAG
  rationale: παρθένοι most directly means 'virgins' and in this parable the marital/wedding
    context makes that sense appropriate. 'Young women' is broader and loses the lexical
    specificity; 'maidens' is archaic.
- source_word: ἐκόσμησαν
  chosen: trimmed
  alternatives:
  - prepared
  - put in order
  - made ready
  lexicon: BDAG
  rationale: κοσμέω literally means to arrange or put in order. With lamps in this
    context, the idiomatic sense is to prepare/trim them for use, likely adjusting
    wick and oil. 'Trimmed' is the most natural contextual rendering in English.
- source_word: λαμπάδας
  chosen: lamps
  alternatives:
  - torches
  lexicon: BDAG
  rationale: λαμπάς can denote a torch or lamp. In the immediate context of carrying
    oil and preparing them, 'lamps' fits the narrative best in standard English, though
    'torches' remains a plausible lexical alternative.
- source_word: ἑαυτῶν
  chosen: their
  alternatives:
  - their own
  lexicon: BDAG
  rationale: Reflexive genitive plural indicating possession by the virgins themselves.
    English normally expresses this simply as 'their'; 'their own' would be more emphatic
    than the context requires.
