theological_decisions:
- issue: Whether to preserve symbolic overtones of right/left in the translation
  chosen_reading: 'Translate as spatial placement only: ''at his right hand ... at
    the left'''
  alternative_readings:
  - Expand to 'place of favor' and 'place of disfavor'
  rationale: The verse itself states physical positioning within the judgment scene.
    While right/left carry evaluative symbolism in context, importing that symbolism
    into the main text would interpret beyond the Greek. The theological force is
    preserved by the narrative context rather than by explanatory expansion.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
