id: MAT.25.33
reference: Matthew 25:33
source:
  edition: SBLGNT
  text: καὶ στήσει τὰ μὲν πρόβατα ἐκ δεξιῶν αὐτοῦ τὰ δὲ ἐρίφια ἐξ εὐωνύμων.
translation:
  text: And he will place the sheep at his right hand, but the goats at the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young goats' or 'the kids' for Greek ἐρίφια.
    reason: lexical_alternative
  - marker: b
    text: Greek literally 'from the right ... from the left,' an idiom for placement
      at the right side and at the left side.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσει
  chosen: will place
  alternatives:
  - will set
  - will stand
  lexicon: BDAG
  rationale: Future active of ἵστημι here means to cause to stand/place in position.
    'Will place' is natural modern English and fits the shepherd-judgment scene better
    than the more wooden 'will set.' 'Will stand' would be intransitive and does not
    fit the direct objects.
- source_word: πρόβατα
  chosen: the sheep
  alternatives:
  - the sheepfold animals
  lexicon: BDAG
  rationale: πρόβατα is the standard term for sheep. The article is retained in English
    because the verse refers back to the previously introduced groups in the scene.
- source_word: ἐκ δεξιῶν αὐτοῦ
  chosen: at his right hand
  alternatives:
  - on his right
  - at his right
  lexicon: BDAG
  rationale: The idiom ἐκ/ἐξ + genitive with δεξιῶν in placement contexts means 'at/on
    the right side.' 'At his right hand' preserves the idiomatic and slightly formal
    register appropriate to a judgment scene, while clearly indicating position relative
    to him.
- source_word: ἐρίφια
  chosen: the goats
  alternatives:
  - the young goats
  - the kids
  lexicon: BDAG
  rationale: ἐρίφια more specifically denotes young goats or kids, but in this contrastive
    shepherd image English 'goats' is the most natural and recognizable rendering.
    'Kids' could sound colloquial or ambiguous in modern English. The loss of age
    nuance is acceptable in optimal equivalence because the contrast with sheep, not
    age, is foregrounded.
- source_word: ἐξ εὐωνύμων
  chosen: at the left
  alternatives:
  - on the left
  - at his left hand
  lexicon: BDAG
  rationale: εὐώνυμος literally relates to the left side; in this idiom it means 'at/on
    the left.' Because αὐτοῦ is not repeated in Greek, English can either supply it
    or leave it implicit. 'At the left' keeps the balanced contrast with the prior
    phrase without overtranslating.
- source_word: μὲν ... δὲ
  chosen: but
  alternatives:
  - on the one hand ... on the other
  - and ... but
  lexicon: BDAG
  rationale: The correlative μὲν ... δὲ marks contrast between the two groups. English
    commonly renders this with a simple contrastive structure. 'But' captures the
    opposition cleanly without sounding overly mechanical.
