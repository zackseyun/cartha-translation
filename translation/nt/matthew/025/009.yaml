id: MAT.25.9
reference: Matthew 25:9
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν δὲ αἱ φρόνιμοι λέγουσαι· Μήποτε ⸂οὐ μὴ⸃ ἀρκέσῃ ἡμῖν καὶ ὑμῖν·
    ⸀πορεύεσθε μᾶλλον πρὸς τοὺς πωλοῦντας καὶ ἀγοράσατε ἑαυταῖς.
translation:
  text: But the wise answered, saying, ‘No, lest there should not be enough for us
    and for you. Go instead to those who sell, and buy for yourselves.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'lest there should by no means be enough for us and for
      you.' The Greek uses an emphatic negation with 'lest,' expressing strong concern
      that the supply would prove insufficient.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is idiomatic and preserves
    the formal dialogue structure.
- source_word: αἱ φρόνιμοι
  chosen: the wise
  alternatives:
  - the prudent
  - the sensible
  lexicon: BDAG
  rationale: In the parable context this refers to the wise virgins/young women already
    introduced; 'the wise' is concise and preserves the adjectival substantive force
    without adding a noun not present here.
- source_word: λέγουσαι
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Participial speech introducer is naturally rendered 'saying' in English
    after 'answered,' preserving the Greek structure.
- source_word: Μήποτε ⸂οὐ μὴ⸃ ἀρκέσῃ
  chosen: No, lest there should not be enough
  alternatives:
  - Surely not, for there may not be enough
  - Otherwise there may not be enough
  lexicon: BDAG
  rationale: The combination expresses a strong refusal grounded in concern about
    insufficiency. 'No' makes the implied refusal explicit in natural English, while
    'lest there should not be enough' preserves the μήποτε + emphatic negation sense
    without overparaphrase.
- source_word: ἀρκέσῃ
  chosen: be enough
  alternatives:
  - suffice
  - be sufficient
  lexicon: BDAG
  rationale: '''Be enough'' is clear modern English and fits the context of limited
    oil supply better than the more formal ''suffice.'''
- source_word: ἡμῖν καὶ ὑμῖν
  chosen: for us and for you
  alternatives:
  - for us and you
  - to us and to you
  lexicon: BDAG
  rationale: Dative of advantage is best expressed idiomatically as 'for us and for
    you.'
- source_word: πορεύεσθε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: Imperative of movement; simple 'Go' is direct and sufficient.
- source_word: μᾶλλον
  chosen: instead
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks preferred alternative action; 'instead' is more natural in contemporary
    English than 'rather' here.
- source_word: πρὸς τοὺς πωλοῦντας
  chosen: to those who sell
  alternatives:
  - to the sellers
  - to those selling it
  lexicon: BDAG
  rationale: The participle functions substantivally. 'Those who sell' is transparent
    and avoids adding 'it' though oil is understood from context.
- source_word: ἀγοράσατε
  chosen: buy
  alternatives:
  - purchase
  lexicon: BDAG
  rationale: Common imperative; 'buy' is the plain modern equivalent.
- source_word: ἑαυταῖς
  chosen: for yourselves
  alternatives:
  - for yourselves personally
  lexicon: BDAG
  rationale: Reflexive dative indicates purchase for their own use; 'for yourselves'
    captures this clearly.
