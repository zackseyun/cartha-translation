id: MAT.25.38
reference: Matthew 25:38
source:
  edition: SBLGNT
  text: πότε δέ σε εἴδομεν ξένον καὶ συνηγάγομεν, ἢ γυμνὸν καὶ περιεβάλομεν;
translation:
  text: And when did we see you as a stranger and take you in, or naked and clothe
    you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foreigner.' The Greek term can refer to someone who is strange, unknown,
      or from outside one's circle; here the sense is someone needing hospitality.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gathered in' or 'received'; the sense here is offering hospitality
      by taking someone in.
    reason: lexical_alternative
  - marker: c
    text: Or 'poorly clothed.' The Greek can refer either to being naked or to lacking
      adequate clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Interrogative adverb asking for the time of the action. 'When' is the
    natural modern English equivalent.
- source_word: δέ
  chosen: And
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ lightly connects this question with the preceding one in a sequence.
    'And' fits the discourse flow better than the more contrastive 'but'.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object pronoun referring to the king/Son of Man in the parable.
- source_word: εἴδομεν
  chosen: did we see
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω. In English interrogatives, 'did we see' is
    idiomatic and preserves the past reference.
- source_word: ξένον
  chosen: as a stranger
  alternatives:
  - a stranger
  - foreign
  - strange
  lexicon: BDAG
  rationale: ξένος here denotes someone who is a stranger/outsider, likely lacking
    hospitality. 'As a stranger' reads naturally after 'see you' and preserves the
    predicative sense.
- source_word: συνηγάγομεν
  chosen: take you in
  alternatives:
  - gathered you in
  - welcomed you
  - received you
  lexicon: BDAG
  rationale: From συνάγω, literally 'gather together,' but in this hospitality context
    it means to bring in or receive hospitably. 'Take you in' is a clear modern rendering
    that reflects the action rather than a wooden gloss.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Standard disjunctive conjunction linking the second alternative question.
- source_word: γυμνὸν
  chosen: naked
  alternatives:
  - poorly clothed
  - without adequate clothing
  lexicon: BDAG
  rationale: γυμνός can mean literally naked or inadequately clothed. In this mercy-context,
    'naked' is the traditional and sufficiently broad rendering in English, often
    understood idiomatically as lacking clothing.
- source_word: περιεβάλομεν
  chosen: clothe you
  alternatives:
  - put clothing on you
  - dress you
  lexicon: BDAG
  rationale: From περιβάλλω, here meaning to put clothes on someone. 'Clothe you'
    is concise, natural, and semantically precise.
