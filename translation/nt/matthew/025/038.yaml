theological_decisions:
- issue: Hospitality term ξένος in a judgment-context parable
  chosen_reading: stranger
  alternative_readings:
  - foreigner
  rationale: The verse concerns acts of mercy and hospitality toward those in need.
    'Stranger' preserves the social sense of someone unknown or without welcome, without
    importing ethnic or national categories that 'foreigner' might suggest in English.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve the source text''s plain sense.'
