theological_decisions:
- issue: Referent of 'these brothers of mine'
  chosen_reading: Retain the literal phrase 'these brothers of mine' without specifying
    whether it refers narrowly to disciples, to believers generally, or more broadly
    to the needy.
  alternative_readings:
  - Jesus' disciples/missionaries
  - believers generally
  - the needy or vulnerable more broadly
  rationale: The verse itself does not explicitly resolve the interpretive debate.
    To preserve theological tension and avoid importing a denominationally loaded
    interpretation, the translation keeps the Greek wording and leaves the referent
    open.
  doctrine_reference: Preserve theological tension rather than resolve it; Gender-accurate
    over gender-neutral.
- issue: Gender rendering of ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The source term is grammatically masculine plural and the doctrine requires
    gender-accurate rendering rather than automatic neutralization. Because the interpretive
    scope of the group is contested, a neutral expansion would add an interpretive
    decision not explicit in the Greek.
  doctrine_reference: Gender-accurate over gender-neutral.
