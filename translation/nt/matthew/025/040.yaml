id: MAT.25.40
reference: Matthew 25:40
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ βασιλεὺς ἐρεῖ αὐτοῖς· Ἀμὴν λέγω ὑμῖν, ἐφ’ ὅσον ἐποιήσατε
    ἑνὶ τούτων τῶν ἀδελφῶν μου τῶν ἐλαχίστων, ἐμοὶ ἐποιήσατε.
translation:
  text: And the King will answer them, ‘Truly I say to you, insofar as you did it
    to one of the least of these brothers of mine, you did it to me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Amen, I say to you.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” translates the masculine plural Greek term. The phrase “these
      brothers of mine” may refer specifically to Jesus’ disciples, to believers more
      generally, or more broadly to the vulnerable; the translation preserves the
      wording without deciding the interpretive question.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: will answer
  alternatives:
  - answering
  - in reply
  lexicon: BDAG
  rationale: 'Aorist participle with finite future verb is naturally rendered in English
    as part of the main verbal action: ''will answer.'' This avoids wooden participial
    English while preserving the responsive sense.'
- source_word: ὁ βασιλεὺς
  chosen: the King
  alternatives:
  - the king
  lexicon: BDAG
  rationale: Capitalized because in the parable's referential frame this figure represents
    the eschatological royal judge, identified with the Son of Man in context. 'King'
    preserves the explicit title in the Greek.
- source_word: ἐρεῖ
  chosen: will answer
  alternatives:
  - will say
  lexicon: BDAG
  rationale: Although ἐρεῖ is from λέγω ('will say'), the preceding ἀποκριθείς gives
    the combined sense 'answer ... and say.' English idiom is best served by 'will
    answer them,' with the speech introduced directly thereafter.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: '''Truly I say to you'' preserves the solemn formula and remains readable
    modern English. ''Amen'' could be retained more formally, but ''Truly'' communicates
    the force for contemporary readers.'
- source_word: ἐφ’ ὅσον
  chosen: insofar as
  alternatives:
  - to the extent that
  - as much as
  - whatever you did
  lexicon: BDAG
  rationale: 'This construction marks degree/extent: ''insofar as'' closely reflects
    the Greek while remaining natural. It avoids over-paraphrasing into a freer relative
    clause.'
- source_word: ἐποιήσατε
  chosen: you did it
  alternatives:
  - you did
  - you have done
  lexicon: BDAG
  rationale: The verb is repeated later with ἐμοί as dative object; supplying 'it'
    in English makes the implied act explicit and preserves the parallelism.
- source_word: ἑνὶ τούτων
  chosen: to one of these
  alternatives:
  - for one of these
  lexicon: BDAG
  rationale: Dative with ποιέω here is naturally rendered 'to one of these,' matching
    the personal object construction and preserving the individualizing force of ἑνί
    ('one').
- source_word: τῶν ἀδελφῶν μου
  chosen: brothers of mine
  alternatives:
  - my brothers
  - my brothers and sisters
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. 'Brothers of mine' also preserves
    the emphatic possessive placement more closely than a smoother but less marked
    'my brothers.'
- source_word: τῶν ἐλαχίστων
  chosen: the least
  alternatives:
  - the least important
  - the smallest
  - the lowliest
  lexicon: BDAG
  rationale: Superlative adjective used substantivally; 'the least' is the standard
    concise rendering and preserves both social and status-related breadth without
    narrowing the sense.
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: The dative is best rendered directly as 'to me,' preserving the identification
    between action toward the brothers and action toward the King.
