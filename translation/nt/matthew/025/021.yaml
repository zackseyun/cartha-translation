id: MAT.25.21
reference: Matthew 25:21
source:
  edition: SBLGNT
  text: ⸀ἔφη αὐτῷ ὁ κύριος αὐτοῦ· Εὖ, δοῦλε ἀγαθὲ καὶ πιστέ, ἐπὶ ὀλίγα ἦς πιστός,
    ἐπὶ πολλῶν σε καταστήσω· εἴσελθε εἰς τὴν χαρὰν τοῦ κυρίου σου.
translation:
  text: His master said to him, ‘Well done, good and faithful servant. You were faithful
    over a few things; I will appoint you over many things. Enter into the joy of
    your master.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''slave'': ''Well done, good and faithful slave.'' The Greek word is
      doulos, which can mean either ''servant'' or ''slave'' depending on context.'
    reason: alternative_reading
  - marker: b
    text: Greek kyrios here could also be rendered 'lord,' but 'master' best fits
      the parable's servant-master relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  - declared
  lexicon: BDAG
  rationale: Standard narrative rendering of φημί in direct speech introduction. 'Said'
    is natural modern English and sufficiently formal.
- source_word: κύριος
  chosen: master
  alternatives:
  - lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' in many contexts, here the referent
    within the parable is the slave-owner/master of the servant, not a direct christological
    title in the narrative frame. 'Master' best conveys the social relation in context.
- source_word: δοῦλε
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: DOCTRINE.md allows 'servant / slave' context-dependently for δοῦλος.
    In this parabolic commendation, the bonded status is present but not theologically
    foregrounded as strongly as in identity-formula texts; 'servant' is idiomatic
    in English here while preserving the hierarchical relationship. The alternative
    'slave' is preserved in a footnote for auditability.
- source_word: Εὖ
  chosen: Well done
  alternatives:
  - Good
  - Excellent
  lexicon: BDAG
  rationale: Idiomatic commendation in English corresponding to the adverb εὖ in this
    formulaic context. 'Well done' captures the master's approval more naturally than
    a bare 'Good.'
- source_word: ἀγαθὲ
  chosen: good
  alternatives:
  - worthy
  - excellent
  lexicon: BDAG
  rationale: Direct adjectival commendation; 'good' is the plain and traditional sense
    and fits the paired expression with πιστέ.
- source_word: πιστέ / πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: For πιστός in both vocative and predicate positions, 'faithful' preserves
    the semantic link and moral quality of dependable loyalty. 'Trustworthy' is possible
    but less elegant in the repeated structure.
- source_word: ἐπὶ ὀλίγα
  chosen: over a few things
  alternatives:
  - with a few things
  - over little
  lexicon: BDAG
  rationale: The preposition ἐπί with accusative here expresses sphere/responsibility.
    'Over a few things' communicates entrusted oversight better than a more literal
    but less natural 'over little.'
- source_word: καταστήσω
  chosen: I will appoint
  alternatives:
  - I will set
  - I will put in charge
  lexicon: BDAG
  rationale: Future of καθίστημι here denotes appointment to responsibility. 'I will
    appoint' is clear, natural, and preserves the formal sense of assigning authority.
- source_word: ἐπὶ πολλῶν
  chosen: over many things
  alternatives:
  - over much
  - over many
  lexicon: BDAG
  rationale: Parallel to ἐπὶ ὀλίγα; supplying 'things' in English makes the sense
    explicit and preserves the contrast between lesser and greater entrusted responsibilities.
- source_word: εἴσελθε εἰς τὴν χαρὰν
  chosen: Enter into the joy
  alternatives:
  - Come into the joy
  - Share in the joy
  lexicon: BDAG
  rationale: Aorist imperative plus εἰς naturally yields 'enter into.' This preserves
    the metaphor of entering the master's joy rather than flattening it to mere participation,
    though participation is implied.
