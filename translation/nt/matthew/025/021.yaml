theological_decisions:
- issue: Rendering κύριος in a parable where the figure may typologically reflect
    God/Christ
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The immediate discourse is a parable about a servant and his master.
    Translating κύριος as 'master' preserves the story-level social relation and avoids
    importing an explicit christological title into the dialogue, while readers may
    still perceive the parabolic theological referent. This follows the doctrine's
    instruction not to import doctrinal claims the text does not make directly.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: κύριος → Lord,
    Master'
- issue: Rendering δοῦλος in this context
  chosen_reading: servant
  alternative_readings:
  - slave
  - bondservant
  rationale: The doctrine allows context-dependent rendering of δοῦλος. Here the commendation
    formula in a parable reads more naturally in English as 'servant,' while the underlying
    status relation remains clear through 'master.' Because 'slave' is a viable alternative
    and the bonded nuance is real, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §1; Contested terms: δοῦλος → servant
    / slave (context-dependent)'
