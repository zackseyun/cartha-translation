id: MAT.25.35
reference: Matthew 25:35
source:
  edition: SBLGNT
  text: ἐπείνασα γὰρ καὶ ἐδώκατέ μοι φαγεῖν, ἐδίψησα καὶ ἐποτίσατέ με, ξένος ἤμην
    καὶ συνηγάγετέ με,
translation:
  text: For I was hungry and you gave me something to eat; I was thirsty and you gave
    me something to drink; I was a stranger and you welcomed me in,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you took me in.' The Greek verb literally means 'gathered' or 'brought
      together,' but here refers to receiving a stranger hospitably.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείνασα
  chosen: I was hungry
  alternatives:
  - I hungered
  lexicon: BDAG
  rationale: Aorist of πεινάω expresses the state/experience of hunger in past time.
    'I was hungry' is idiomatic modern English and preserves the sense better than
    the wooden 'I hungered.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the explanation for the preceding statement. 'For' preserves
    the connective force in a concise, natural way.
- source_word: ἐδώκατέ μοι φαγεῖν
  chosen: you gave me something to eat
  alternatives:
  - you gave me to eat
  - you gave me food
  lexicon: BDAG
  rationale: The construction δίδωμι + dative + infinitive means 'give someone something
    to eat.' Supplying 'something' is natural in English and reflects the idiom without
    overtranslating.
- source_word: ἐδίψησα
  chosen: I was thirsty
  alternatives:
  - I thirsted
  lexicon: BDAG
  rationale: As with ἐπείνασα, the aorist here denotes the experience/state in past
    time. 'I was thirsty' is the clearest modern equivalent.
- source_word: ἐποτίσατέ με
  chosen: you gave me something to drink
  alternatives:
  - you gave me drink
  - you gave me water
  - you made me drink
  lexicon: BDAG
  rationale: ποτίζω can mean 'give drink to' or 'cause to drink.' In this context
    of merciful provision, 'you gave me something to drink' best captures the sense
    and parallels the previous clause.
- source_word: ξένος
  chosen: a stranger
  alternatives:
  - a foreigner
  - a guest
  - an outsider
  lexicon: BDAG
  rationale: ξένος here refers to someone unknown and without ordinary social belonging
    or lodging. 'Stranger' is the standard and most contextually fitting English rendering.
- source_word: συνηγάγετέ με
  chosen: you welcomed me in
  alternatives:
  - you took me in
  - you gathered me in
  - you received me
  lexicon: BDAG
  rationale: Though συνάγω literally means 'gather together,' in this context with
    ξένος it idiomatically refers to receiving someone into one's home or community.
    'You welcomed me in' communicates the hospitality sense in natural English; 'took
    me in' is possible but can sound more institutional or coercive.
