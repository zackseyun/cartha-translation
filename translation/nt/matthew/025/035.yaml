theological_decisions:
- issue: Hospitality language for ξένος ... συνηγάγετέ με
  chosen_reading: 'Render the clause as personal hospitality: ''I was a stranger and
    you welcomed me in.'''
  alternative_readings:
  - I was a stranger and you took me in
  - I was a foreigner and you received me
  rationale: The verse emphasizes merciful reception of the vulnerable rather than
    ethnicity or legal status. 'Stranger' plus 'welcomed me in' preserves the ethical
    force without importing modern political categories.
  doctrine_reference: Translation philosophy §§1, 6
