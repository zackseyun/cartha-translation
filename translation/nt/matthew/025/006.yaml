theological_decisions:
- issue: Parabolic referent of νυμφίος
  chosen_reading: Render simply as 'the bridegroom' without capitalizing or making
    the Christological identification explicit in the translation.
  alternative_readings:
  - the Bridegroom
  rationale: Although in the broader Matthean context the bridegroom represents Jesus,
    the verse itself presents the figure within the parable. Lowercase preserves the
    literary level of the text and avoids importing interpretation into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
