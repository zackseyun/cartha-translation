id: MAT.25.6
reference: Matthew 25:6
source:
  edition: SBLGNT
  text: μέσης δὲ νυκτὸς κραυγὴ γέγονεν· Ἰδοὺ ὁ ⸀νυμφίος, ἐξέρχεσθε εἰς ἀπάντησιν ⸀αὐτοῦ.
translation:
  text: 'But at midnight a cry rang out: ‘Look, the bridegroom! Come out to meet him.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was a shout.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Behold, the bridegroom!'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέσης δὲ νυκτός
  chosen: But at midnight
  alternatives:
  - And in the middle of the night
  - Now at midnight
  lexicon: BDAG
  rationale: The genitive construction with μέσης νυκτός is idiomatic for time, meaning
    'at midnight' or 'in the middle of the night.' 'But' reflects δέ as a mild narrative
    transition with slight contrastive force.
- source_word: κραυγὴ γέγονεν
  chosen: a cry rang out
  alternatives:
  - a cry was made
  - there was a shout
  lexicon: BDAG
  rationale: γέγονεν (perfect of γίνομαι) here introduces the occurrence of an event.
    'A cry rang out' is natural modern English that preserves the suddenness of the
    announcement better than the wooden 'a cry happened' or 'was made.'
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a deictic attention-getter. 'Look' is readable modern English
    and preserves the force without archaic diction; 'Behold' is accurate but too
    traditional/archaic for the stated philosophy.
- source_word: ὁ νυμφίος
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: νυμφίος specifically denotes a bridegroom in wedding context. 'Bridegroom'
    preserves the parable's wedding imagery more clearly than the more colloquial
    'groom.'
- source_word: ἐξέρχεσθε
  chosen: Come out
  alternatives:
  - Go out
  lexicon: BDAG
  rationale: The imperative means 'go/come out.' In English, from the perspective
    of those inside hearing the call, 'come out' is the more idiomatic summons and
    fits the direct speech naturally.
- source_word: εἰς ἀπάντησιν αὐτοῦ
  chosen: to meet him
  alternatives:
  - for a meeting with him
  - to meet with him
  lexicon: BDAG
  rationale: The idiom εἰς ἀπάντησιν means 'to meet' or 'for meeting.' 'To meet him'
    is the standard concise rendering and fits the wedding-procession context.
