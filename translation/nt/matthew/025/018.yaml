id: MAT.25.18
reference: Matthew 25:18
source:
  edition: SBLGNT
  text: ὁ δὲ τὸ ἓν λαβὼν ἀπελθὼν ὤρυξεν ⸀γῆν καὶ ⸀ἔκρυψεν τὸ ἀργύριον τοῦ κυρίου αὐτοῦ.
translation:
  text: But the one who had received the one talent went away, dug in the ground,
    and hid his master's money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'hid his master's silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But the one
  alternatives:
  - But he
  - Now the one
  lexicon: BDAG
  rationale: δέ marks contrast with the previous servants; rendering with 'But' preserves
    the narrative contrast. The article functions substantivally, referring to the
    servant characterized by what follows, so 'the one' is more explicit than a bare
    pronoun.
- source_word: τὸ ἓν
  chosen: the one talent
  alternatives:
  - the one
  - the single talent
  lexicon: BDAG
  rationale: The direct object is elliptical in Greek, with 'one' referring back to
    the talent mentioned in the surrounding context (25:15). Supplying 'talent' in
    English is necessary for clarity and reflects the immediate discourse context
    rather than adding new content.
- source_word: λαβὼν
  chosen: who had received
  alternatives:
  - having received
  - who received
  lexicon: BDAG
  rationale: Although λαμβάνω commonly means 'receive' or 'take,' in this parable
    the servant is the recipient of the master's entrusted money. 'Had received' fits
    idiomatic English and conveys the participle's antecedent action relative to the
    main verbs.
- source_word: ἀπελθὼν
  chosen: went away
  alternatives:
  - went off
  - departed
  lexicon: BDAG
  rationale: The participle indicates movement away before the subsequent actions.
    'Went away' is natural modern English and preserves the sequence without sounding
    overly formal.
- source_word: ὤρυξεν γῆν
  chosen: dug in the ground
  alternatives:
  - dug a hole in the ground
  - dug earth
  lexicon: BDAG
  rationale: The idiom means to dig into the earth/ground. English normally requires
    an expanded expression; 'dug in the ground' is concise and natural. 'Dug a hole'
    is interpretive but likely implied; the chosen wording stays slightly closer to
    the Greek while remaining idiomatic.
- source_word: ἔκρυψεν
  chosen: hid
  alternatives:
  - concealed
  lexicon: BDAG
  rationale: '''Hid'' is the plain and natural equivalent of κρύπτω in this context.'
- source_word: τὸ ἀργύριον
  chosen: money
  alternatives:
  - silver
  - the silver money
  lexicon: BDAG
  rationale: ἀργύριον can denote silver or money. In this context of entrusted funds
    in a parable, 'money' best communicates the sense to modern readers. A footnote
    preserves the more literal 'silver' nuance.
- source_word: τοῦ κυρίου αὐτοῦ
  chosen: his master's
  alternatives:
  - his lord's
  lexicon: BDAG
  rationale: κύριος has the default rendering 'Lord' in doctrinally weighty or title
    contexts, but here it refers to the servant's human superior within the parable.
    'Master' is the most natural contextual rendering in English and avoids confusion
    with divine reference while preserving the authority relationship.
