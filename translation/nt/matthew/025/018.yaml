theological_decisions:
- issue: Rendering κύριος in a parabolic, non-divine reference
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: Although the project's default for κύριος is 'Lord,' the doctrine excerpt
    allows contextual rendering. Here the referent is the servant's human superior
    in the story world, not a direct christological title. 'Master' communicates the
    social relation clearly in modern English and avoids importing a divine-title
    sense into the immediate wording.
