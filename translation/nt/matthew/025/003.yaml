id: MAT.25.3
reference: Matthew 25:3
source:
  edition: SBLGNT
  text: ⸂αἱ γὰρ⸃ μωραὶ λαβοῦσαι τὰς λαμπάδας αὐτῶν οὐκ ἔλαβον μεθ’ ἑαυτῶν ἔλαιον·
translation:
  text: For the foolish, when they took their lamps, did not take oil with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches' for 'lamps' (Greek λαμπάδας).
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces an explanation for the preceding statement; 'for' preserves
    the connective force naturally in English.
- source_word: μωραὶ
  chosen: the foolish
  alternatives:
  - the foolish ones
  - the foolish women
  - the foolish virgins
  lexicon: BDAG
  rationale: The adjective is feminine plural and refers back to the virgins in the
    parable. 'The foolish' is concise and natural while preserving the characterization
    without redundantly repeating 'virgins' in this verse.
- source_word: λαβοῦσαι
  chosen: when they took
  alternatives:
  - having taken
  - after taking
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, best rendered with a temporal
    sense in smooth English. 'When they took' preserves the sequence without sounding
    wooden.
- source_word: λαμπάδας
  chosen: lamps
  alternatives:
  - torches
  lexicon: BDAG
  rationale: Traditional and contextually appropriate rendering for λαμπάς in this
    parable. 'Torches' is possible, but 'lamps' fits common English Bible usage and
    the immediate mention of oil.
- source_word: οὐκ ἔλαβον
  chosen: did not take
  alternatives:
  - did not bring
  lexicon: BDAG
  rationale: Keeps the verbal parallel with the participle λαβοῦσαι/ἔλαβον ('took'/'did
    not take'), which is rhetorically present in Greek.
- source_word: μεθ’ ἑαυτῶν
  chosen: with them
  alternatives:
  - with themselves
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the reflexive phrase; 'with themselves'
    would be overly literal and awkward.
- source_word: ἔλαιον
  chosen: oil
  lexicon: BDAG
  rationale: Straightforward rendering of the accusative object; in context it refers
    to oil for the lamps.
