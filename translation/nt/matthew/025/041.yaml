id: MAT.25.41
reference: Matthew 25:41
source:
  edition: SBLGNT
  text: τότε ἐρεῖ καὶ τοῖς ἐξ εὐωνύμων· Πορεύεσθε ἀπ’ ἐμοῦ ⸀οἱ κατηραμένοι εἰς τὸ
    πῦρ τὸ αἰώνιον τὸ ἡτοιμασμένον τῷ διαβόλῳ καὶ τοῖς ἀγγέλοις αὐτοῦ.
translation:
  text: Then he will also say to those on the left, ‘Go away from me, you cursed,
    into the eternal fire prepared for the devil and his angels.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Depart from me, you who are cursed."
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the judgment scene; 'Then' is natural
    and sufficiently formal.
- source_word: ἐρεῖ
  chosen: he will ... say
  alternatives:
  - he will tell
  lexicon: BDAG
  rationale: Future of λέγω; 'say' preserves the speech-act without adding force beyond
    the Greek.
- source_word: τοῖς ἐξ εὐωνύμων
  chosen: to those on the left
  alternatives:
  - to those at his left hand
  - to those from the left
  lexicon: BDAG
  rationale: Idiomatic expression for the group positioned at the king's left in the
    immediate context. 'Those on the left' is clear modern English and matches the
    scene.
- source_word: Πορεύεσθε
  chosen: Go away
  alternatives:
  - Depart
  - Go
  lexicon: BDAG
  rationale: Imperative of πορεύομαι here carries the sense of leaving the speaker's
    presence. 'Go away' is readable modern English; 'Depart' is more traditional but
    less natural.
- source_word: ἀπ’ ἐμοῦ
  chosen: from me
  alternatives:
  - away from me
  lexicon: BDAG
  rationale: Expresses separation from Jesus. In English the force is best conveyed
    together with the verb as 'Go away from me.'
- source_word: οἱ κατηραμένοι
  chosen: you cursed
  alternatives:
  - you who are cursed
  - you accursed
  lexicon: BDAG
  rationale: Perfect passive participle used vocatively. 'You cursed' is concise and
    forceful in direct address; 'accursed' is possible but more archaic.
- source_word: εἰς τὸ πῦρ
  chosen: into the ... fire
  alternatives:
  - into the fire
  lexicon: BDAG
  rationale: εἰς marks movement into a destination; 'into' should be preserved rather
    than weakened to 'to'.
- source_word: τὸ αἰώνιον
  chosen: eternal
  alternatives:
  - everlasting
  - age-long
  lexicon: BDAG
  rationale: Default rendering in this context is 'eternal.' 'Everlasting' is viable
    but less concise; 'age-long' is too interpretively loaded in English here.
- source_word: τὸ ἡτοιμασμένον
  chosen: prepared
  alternatives:
  - made ready
  lexicon: BDAG
  rationale: Perfect passive participle indicating a state resulting from prior preparation.
    'Prepared' is the standard and natural rendering.
- source_word: τῷ διαβόλῳ
  chosen: for the devil
  alternatives:
  - for the slanderer
  lexicon: BDAG
  rationale: διάβολος here functions as the established personal designation for Satan,
    not a generic descriptor. 'The devil' is the clearest idiomatic rendering.
- source_word: τοῖς ἀγγέλοις αὐτοῦ
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: BDAG
  rationale: In this apocalyptic/judgment context, ἄγγελοι refers to supernatural
    beings aligned with the devil, not human messengers.
