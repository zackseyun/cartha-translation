theological_decisions:
- issue: Rendering of αἰώνιον in judgment context
  chosen_reading: eternal
  alternative_readings:
  - everlasting
  - age-long
  rationale: Within historic orthodox bounds and normal Koine usage in this context,
    αἰώνιον is best rendered 'eternal.' The translation preserves the gravity of final
    judgment without importing a narrower doctrinal system beyond the text itself.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
- issue: Referent of διάβολος and ἄγγελοι
  chosen_reading: the devil and his angels
  alternative_readings:
  - the slanderer and his messengers
  rationale: The context is eschatological judgment and the phrase is a conventional
    designation for Satan and his angelic followers. Rendering these as generic categories
    would undertranslate the established referents in this passage.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic'
