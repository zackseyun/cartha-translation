id: MAT.25.8
reference: Matthew 25:8
source:
  edition: SBLGNT
  text: αἱ δὲ μωραὶ ταῖς φρονίμοις εἶπαν· Δότε ἡμῖν ἐκ τοῦ ἐλαίου ὑμῶν, ὅτι αἱ λαμπάδες
    ἡμῶν σβέννυνται.
translation:
  text: But the foolish said to the wise, ‘Give us some of your oil, because our lamps
    are going out.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches' for 'lamps' (Greek λαμπάδες); the term can refer to a handheld
      burning light source, and translators differ based on how they construe the
      scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωραὶ
  chosen: the foolish
  alternatives:
  - the foolish ones
  - the unwise
  lexicon: BDAG
  rationale: Adjectival substantive referring to the group of virgins in the parable.
    'The foolish' is concise, natural English and preserves the moral/prudential contrast
    with φρονίμοις.
- source_word: φρονίμοις
  chosen: the wise
  alternatives:
  - the prudent
  - the sensible
  lexicon: BDAG
  rationale: In this parabolic context the term denotes practical wisdom and preparedness.
    'The wise' is the most idiomatic counterpart to μωραὶ and matches common biblical
    usage without over-specifying.
- source_word: Δότε
  chosen: Give
  alternatives:
  - Give over
  - Give here
  lexicon: BDAG
  rationale: Aorist imperative plural of δίδωμι, functioning as a direct request/command.
    Simple 'Give' best reflects the force in natural English.
- source_word: ἐκ τοῦ ἐλαίου ὑμῶν
  chosen: some of your oil
  alternatives:
  - from your oil
  lexicon: BDAG
  rationale: 'The preposition ἐκ with the genitive indicates a partitive sense: a
    portion from their supply. English idiom expresses this naturally as ''some of
    your oil'' rather than the more wooden ''from your oil.'''
- source_word: λαμπάδες
  chosen: lamps
  alternatives:
  - torches
  lexicon: BDAG
  rationale: λαμπάς can denote a torch or lamp, but in this parable involving oil
    vessels and burning implements, 'lamps' is the most familiar and contextually
    coherent rendering in English Bible tradition. The alternative 'torches' is lexically
    possible and worth preserving in a footnote.
- source_word: σβέννυνται
  chosen: are going out
  alternatives:
  - are being extinguished
  - are going out now
  lexicon: BDAG
  rationale: Present passive/middle conveys an in-progress extinguishing. 'Are going
    out' is idiomatic modern English and captures the ongoing loss of flame without
    awkward literalism.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the request. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal sense.
