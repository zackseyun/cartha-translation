theological_decisions:
- issue: Parabolic imagery of the bridegroom
  chosen_reading: Retain 'bridegroom' as the narrative image without making implicit
    christological identification explicit in the translation.
  alternative_readings:
  - Translate more generically as 'groom'
  rationale: In Matthew's broader context the bridegroom imagery carries theological
    resonance, but the verse itself presents the parable image straightforwardly.
    The translation should preserve the image without importing interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
