id: MAT.25.5
reference: Matthew 25:5
source:
  edition: SBLGNT
  text: χρονίζοντος δὲ τοῦ νυμφίου ἐνύσταξαν πᾶσαι καὶ ἐκάθευδον.
translation:
  text: But while the bridegroom was delayed, they all became drowsy and fell asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while the bridegroom was taking a long time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they all grew sleepy and were sleeping.' The Greek distinguishes becoming
      drowsy (ἐνύσταξαν) from sleeping (ἐκάθευδον).
    reason: lexical_alternative
lexical_decisions:
- source_word: χρονίζοντος
  chosen: was delayed
  alternatives:
  - was taking a long time
  - tarried
  - delayed
  lexicon: BDAG
  rationale: The present participle of χρονίζω denotes delay or taking longer than
    expected. In idiomatic English with the genitive absolute, 'while the bridegroom
    was delayed' best captures the temporal sense and implied lateness without archaic
    wording.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild development or contrast. 'But' fits the narrative turn
    from expectation to delay and resulting sleepiness.
- source_word: νυμφίου
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: νυμφίος specifically means 'bridegroom.' This is the established and
    precise term in the parable's wedding setting; 'groom' is possible but slightly
    less formal and less explicit.
- source_word: ἐνύσταξαν
  chosen: became drowsy
  alternatives:
  - grew sleepy
  - nodded off
  lexicon: BDAG
  rationale: νυστάζω refers to becoming sleepy or drowsy. 'Became drowsy' preserves
    the ingressive sense before the subsequent fuller sleep expressed by ἐκάθευδον.
- source_word: πᾶσαι
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: The feminine plural adjective refers back to all ten virgins. English
    requires an explicit pronoun for natural style; 'they all' clearly conveys the
    totality.
- source_word: ἐκάθευδον
  chosen: fell asleep
  alternatives:
  - were sleeping
  - slept
  lexicon: BDAG
  rationale: καθεύδω means to sleep. Given the preceding aorist ἐνύσταξαν, 'fell asleep'
    naturally conveys the progression from drowsiness to actual sleep in English,
    even though the imperfect could also be rendered 'were sleeping.'
