id: MAT.25.45
reference: Matthew 25:45
source:
  edition: SBLGNT
  text: τότε ἀποκριθήσεται αὐτοῖς λέγων· Ἀμὴν λέγω ὑμῖν, ἐφ’ ὅσον οὐκ ἐποιήσατε ἑνὶ
    τούτων τῶν ἐλαχίστων, οὐδὲ ἐμοὶ ἐποιήσατε.
translation:
  text: Then he will answer them, saying, ‘Truly I say to you, insofar as you did
    not do it to one of the least of these, neither did you do it to me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Amen, I say to you.'
    reason: lexical_alternative
  - marker: b
    text: '''The least of these'' may be understood specifically as Jesus'' disciples
      or more broadly as the lowly and needy; the translation leaves the phrase as
      stated in the text.'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the judgment scene; 'Then' is natural
    and sufficiently formal.
- source_word: ἀποκριθήσεται
  chosen: he will answer
  alternatives:
  - he will reply
  lexicon: BDAG
  rationale: Future middle/passive deponent of ἀποκρίνομαι commonly means 'answer/reply.'
    'Answer' fits the solemn judicial context and matches nearby discourse formulae.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative indirect object referring to those on the left; straightforwardly
    rendered 'them'.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and say
  lexicon: BDAG
  rationale: Participle of attendant speech. 'Saying' preserves the Greek structure
    without awkwardness in English.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: A fixed Jesus-formula. 'Truly I say to you' preserves the emphatic solemnity
    and remains readable. 'Amen' could be retained more formally, but 'Truly' is clearer
    in contemporary English.
- source_word: ἐφ’ ὅσον
  chosen: insofar as
  alternatives:
  - to the extent that
  - because
  lexicon: BDAG
  rationale: This construction introduces the measure/extent of their action or inaction.
    'Insofar as' best captures the idiomatic force without over-paraphrasing. 'Because'
    would flatten the nuance.
- source_word: οὐκ ἐποιήσατε
  chosen: you did not do it
  alternatives:
  - you did not do
  - you failed to do it
  lexicon: BDAG
  rationale: ποιέω here refers to concrete action toward persons in context. Supplying
    'it' is natural English and reflects the implied object from the preceding parallel.
- source_word: ἑνὶ τούτων τῶν ἐλαχίστων
  chosen: to one of the least of these
  alternatives:
  - to one of these least ones
  - to one of these very least
  lexicon: BDAG
  rationale: ἑνί is dative singular, 'to one'; ἐλαχίστων is superlative plural, 'the
    least.' This rendering is idiomatic and preserves the representative singular
    within the group.
- source_word: οὐδὲ ἐμοὶ
  chosen: neither ... to me
  alternatives:
  - not even to me
  - nor to me
  lexicon: BDAG
  rationale: οὐδέ links the second clause as a negated correlative conclusion. 'Neither
    did you do it to me' mirrors the Greek logic and the verse's rhetorical force.
- source_word: ἐποιήσατε
  chosen: did you do it
  alternatives:
  - did you do
  lexicon: BDAG
  rationale: Repeated verb retained for emphasis and parallelism with the first clause;
    'it' is again supplied for natural English coherence.
