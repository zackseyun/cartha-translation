theological_decisions:
- issue: Identification of Jesus with 'the least of these'
  chosen_reading: The translation preserves the text's direct identification—failure
    to act toward 'one of the least of these' is failure to act toward Jesus—without
    specifying beyond the verse itself who the group includes.
  alternative_readings:
  - '''the least of these'' refers specifically to Jesus'' disciples/messengers'
  - '''the least of these'' refers more broadly to the needy'
  rationale: The verse itself states the identification but does not define the referent
    with enough precision to settle the broader interpretive debate in translation.
    The English therefore remains textually close and does not import a denominational
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
