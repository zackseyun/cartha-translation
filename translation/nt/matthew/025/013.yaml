theological_decisions:
- issue: Imperative imagery of vigilance
  chosen_reading: stay awake
  alternative_readings:
  - keep watch
  - be watchful
  rationale: The verse exhorts readiness in light of uncertain timing. 'Stay awake'
    preserves the parabolic imagery without importing a narrower eschatological system
    or flattening the metaphor into mere abstract alertness.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Scope of 'the day or the hour'
  chosen_reading: retain the expression without explicit interpretive expansion
  alternative_readings:
  - the day or hour of the Son of Man's coming
  - the appointed time
  rationale: Although the broader discourse concerns final judgment and the coming
    of the Son of Man, this verse itself states only 'the day or the hour.' The translation
    preserves that wording and avoids adding theological specification not explicit
    in the Greek.
  doctrine_reference: Translation philosophy §1
