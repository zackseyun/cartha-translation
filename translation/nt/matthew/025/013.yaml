id: MAT.25.13
reference: Matthew 25:13
source:
  edition: SBLGNT
  text: γρηγορεῖτε οὖν, ὅτι οὐκ οἴδατε τὴν ἡμέραν οὐδὲ τὴν ⸀ὥραν.
translation:
  text: Therefore, stay awake, because you do not know the day or the hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep watch' or 'be watchful.' The Greek imperative carries the sense
      of ongoing vigilance.
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  chosen: stay awake
  alternatives:
  - keep watch
  - be watchful
  - be alert
  lexicon: BDAG
  rationale: Present active imperative plural calls for ongoing vigilance. 'Stay awake'
    preserves the metaphor used in the parable context and is idiomatic modern English;
    'keep watch' is possible but slightly more interpretive.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding parable. 'Therefore' clearly signals
    the logical conclusion in English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the command. 'Because' is more natural contemporary
    English than 'for' while preserving the causal force.
- source_word: οὐκ οἴδατε
  chosen: you do not know
  alternatives:
  - you do not know for certain
  lexicon: BDAG
  rationale: Straightforward negated verb of knowing in the second person plural.
    No expansion beyond the Greek is warranted.
- source_word: ἡμέραν
  chosen: the day
  lexicon: BDAG
  rationale: Definite article retained. In context it refers to the unknown time of
    the bridegroom's coming, and by implication the coming of the Son of Man, but
    the translation should not make that implication more explicit than the text does.
- source_word: οὐδὲ τὴν ὥραν
  chosen: or the hour
  alternatives:
  - nor the hour
  lexicon: BDAG
  rationale: οὐδέ coordinates a second negated element. 'Or the hour' is natural after
    'do not know the day'; 'nor' would also be acceptable but is slightly less common
    in contemporary English.
