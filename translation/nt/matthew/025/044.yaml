theological_decisions:
- issue: Rendering of κύριος as a title for Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default. In Matthew's
    address to Jesus, 'Lord' preserves both respectful address and christological
    resonance without importing more than the text states.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of διακονέω in the final clause
  chosen_reading: serve you
  alternative_readings:
  - minister to you
  - care for you
  rationale: The verse concerns acts of mercy toward 'the least of these.' 'Serve
    you' keeps the broader semantic range of διακονέω and preserves the connection
    between practical aid and service rendered to the king, without narrowing it to
    emotional care or ecclesial ministry.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
