id: MAT.25.44
reference: Matthew 25:44
source:
  edition: SBLGNT
  text: τότε ἀποκριθήσονται καὶ αὐτοὶ λέγοντες· Κύριε, πότε σε εἴδομεν πεινῶντα ἢ
    διψῶντα ἢ ξένον ἢ γυμνὸν ἢ ἀσθενῆ ἢ ἐν φυλακῇ καὶ οὐ διηκονήσαμέν σοι;
translation:
  text: Then they too will answer, saying, ‘Lord, when did we see you hungry or thirsty
    or a stranger or naked or sick or in prison, and not serve you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'minister to you' or 'care for you' for 'serve you' (Greek διακονέω).
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the judgment scene; 'Then' is natural
    and sufficiently formal.
- source_word: ἀποκριθήσονται
  chosen: will answer
  alternatives:
  - will reply
  lexicon: BDAG
  rationale: Future middle/passive deponent of ἀποκρίνομαι commonly means 'answer'
    or 'reply.' 'Will answer' is the most straightforward English rendering.
- source_word: καὶ αὐτοὶ
  chosen: they too
  alternatives:
  - they also
  - even they
  lexicon: BDAG
  rationale: The combination adds emphasis that this group, like the previous one,
    gives a response. 'They too' captures both inclusion and mild emphasis idiomatically.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Participle of attendant manner introducing direct speech. English idiom
    naturally renders it as 'saying' after 'will answer.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine default, κύριος is rendered 'Lord.'
    In this address to Jesus within Matthew, 'Lord' is the standard and theologically
    appropriate title.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Direct temporal interrogative; 'when' is the natural English equivalent.
- source_word: εἴδομεν
  chosen: did we see
  alternatives:
  - saw we
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω in a past-time question is best rendered with
    English auxiliary 'did' for natural modern style.
- source_word: πεινῶντα
  chosen: hungry
  alternatives:
  - being hungry
  lexicon: BDAG
  rationale: Present participle functioning predicatively after 'see you'; English
    idiom prefers adjective 'hungry' rather than a more wooden participial form.
- source_word: διψῶντα
  chosen: thirsty
  alternatives:
  - being thirsty
  lexicon: BDAG
  rationale: Parallel to πεινῶντα; adjective is the most natural English rendering.
- source_word: ξένον
  chosen: a stranger
  alternatives:
  - a foreigner
  - a guest
  lexicon: BDAG
  rationale: In this mercy-list context, ξένος refers to someone outside one's household/community
    needing welcome. 'A stranger' best matches the social sense without over-specifying
    ethnicity.
- source_word: γυμνὸν
  chosen: naked
  alternatives:
  - poorly clothed
  - without clothing
  lexicon: BDAG
  rationale: Traditional and direct rendering. In context it can imply insufficient
    clothing, but 'naked' preserves the lexical force and echoes the parallel in the
    passage.
- source_word: ἀσθενῆ
  chosen: sick
  alternatives:
  - weak
  - ill
  lexicon: BDAG
  rationale: Although the term can mean weak, in this list of bodily/social need it
    most naturally means 'sick' or 'ill.' 'Sick' is concise and idiomatic.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in jail
  lexicon: BDAG
  rationale: φυλακή here denotes imprisonment. 'In prison' is the standard, slightly
    more formal rendering fitting the register.
- source_word: διηκονήσαμέν σοι
  chosen: serve you
  alternatives:
  - minister to you
  - care for you
  lexicon: BDAG
  rationale: διακονέω can mean serve, wait on, care for, minister to. 'Serve you'
    preserves the verbal link to service/ministry while remaining accessible. 'Care
    for you' is interpretive and narrower.
- source_word: καὶ οὐ
  chosen: and not
  alternatives:
  - but did not
  lexicon: BDAG
  rationale: Coordinates the final clause with the preceding list and negates the
    action. 'And not' follows the Greek structure closely while remaining clear in
    English.
