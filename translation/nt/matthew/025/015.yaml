theological_decisions:
- issue: Representative masculine pronoun in distributive statement
  chosen_reading: his own ability
  alternative_readings:
  - their own ability
  - each one's own ability
  rationale: The Greek uses singular forms with distributive force. Following the
    gender-accurate policy, the translation preserves the singular representative
    masculine rather than flattening it into plural-neutral English. An alternative
    more explicitly inclusive is preserved in a footnote for readers sensitive to
    English idiom.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of τάλαντα in the parable
  chosen_reading: talents as monetary units
  alternative_readings:
  - bags of gold
  - large sums of money
  rationale: The context concerns entrusted property and financial stewardship, so
    the term must not be rendered in a way that suggests natural abilities in the
    modern English sense of 'talent.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
