id: MAT.25.15
reference: Matthew 25:15
source:
  edition: SBLGNT
  text: καὶ ᾧ μὲν ἔδωκεν πέντε τάλαντα ᾧ δὲ δύο ᾧ δὲ ἕν, ἑκάστῳ κατὰ τὴν ἰδίαν δύναμιν,
    καὶ ἀπεδήμησεν. εὐθέως
translation:
  text: And to one he gave five talents, to another two, and to another one, to each
    according to his own ability; and he went away immediately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'large sums of money'; a talent was a very large monetary unit, not a
      natural skill or ability.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to each one's own ability.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τάλαντα
  chosen: talents
  alternatives:
  - bags of gold
  - talent-units
  lexicon: BDAG
  rationale: The term denotes a large unit of money/weight, not an innate skill in
    this context. 'Talents' preserves the historical term and intertextual familiarity
    of the parable, while avoiding over-interpretation into a specific modern currency.
    A footnote preserves a clarifying alternative.
- source_word: ᾧ μὲν ... ᾧ δὲ ... ᾧ δὲ
  chosen: to one ... to another ... and to another
  alternatives:
  - to one ... to one ... to one
  lexicon: BDAG
  rationale: This distributive construction marks differentiated recipients. 'To one
    ... to another ... and to another' is natural English and preserves the contrastive
    sequence signaled by μέν/δέ.
- source_word: ἕν
  chosen: one
  alternatives:
  - one talent
  lexicon: BDAG
  rationale: The noun 'talent' is implied from the previous items and can be left
    unstated in English without loss. This avoids unnecessary repetition while preserving
    the sense.
- source_word: ἑκάστῳ
  chosen: to each
  alternatives:
  - to each one
  - to every one
  lexicon: BDAG
  rationale: A straightforward distributive rendering matching the dative singular
    and fitting idiomatic English.
- source_word: κατὰ τὴν ἰδίαν δύναμιν
  chosen: according to his own ability
  alternatives:
  - according to his own capacity
  - according to each one's ability
  lexicon: BDAG
  rationale: δύναμις here refers to personal capacity or capability, not miraculous
    power. 'Ability' is clear modern English. 'His own' reflects the singular distributive
    force tied to ἑκάστῳ and follows the gender-accurate policy for representative
    masculine forms.
- source_word: ἀπεδήμησεν
  chosen: he went away
  alternatives:
  - he went on a journey
  - he departed to another country
  lexicon: BDAG
  rationale: The verb means to go away, often on a journey or abroad. 'He went away'
    is concise and accurate; the travel nuance can be preserved in a footnote alternative
    if desired, but is not necessary in the main text.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: The adverb most naturally modifies the departure in the transmitted text
    order here. 'Immediately' is a clear, formal-modern rendering.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Retains the connective flow from the preceding verse without adding interpretive
    nuance.
