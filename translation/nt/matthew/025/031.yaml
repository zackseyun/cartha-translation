theological_decisions:
- issue: Christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: In keeping with historic orthodoxy and the translation philosophy of
    preserving source-text meaning and theological tension, the established title
    is retained rather than replaced with a more interpretive paraphrase. This preserves
    the Daniel 7 background and Jesus' self-referential messianic/judicial role in
    the passage.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering of θρόνου δόξης αὐτοῦ
  chosen_reading: his glorious throne
  alternative_readings:
  - the throne of his glory
  rationale: The phrase describes the Son of Man's royal and judicial enthronement.
    The chosen rendering is idiomatic modern English under optimal equivalence, while
    the more literal alternative is preserved in a footnote to maintain auditability
    and theological transparency.
  doctrine_reference: Translation philosophy §§3, 6
