id: MAT.25.31
reference: Matthew 25:31
source:
  edition: SBLGNT
  text: Ὅταν δὲ ἔλθῃ ὁ υἱὸς τοῦ ἀνθρώπου ἐν τῇ δόξῃ αὐτοῦ καὶ πάντες ⸀οἱ ἄγγελοι μετ’
    αὐτοῦ, τότε καθίσει ἐπὶ θρόνου δόξης αὐτοῦ·
translation:
  text: But when the Son of Man comes in his glory, and all the angels with him, then
    he will sit on his glorious throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, "the throne of his glory."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with an indefinite/future sense. In English
    eschatological discourse, 'when' is the most natural rendering here; 'whenever'
    is possible but sounds iterative, which does not fit the singular future event
    in context.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks transition to the next stage of Jesus' discourse. 'But' preserves
    the mild adversative/discourse-shift force better than a bare 'and' and is idiomatic
    at the head of a new sentence.
- source_word: ἔλθῃ
  chosen: comes
  alternatives:
  - has come
  - will come
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν refers to a future event. English commonly
    renders this construction with present tense in the subordinate clause ('when
    ... comes').
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation with strong Danielic resonance.
    'The Son of Man' preserves the title's intertextual and christological weight
    better than interpretive alternatives.
- source_word: ἐν τῇ δόξῃ αὐτοῦ
  chosen: in his glory
  alternatives:
  - in his splendor
  lexicon: BDAG
  rationale: δόξα here denotes manifested majesty/honor. 'Glory' is the standard theological
    rendering and preserves biblical resonance.
- source_word: πάντες οἱ ἄγγελοι
  chosen: all the angels
  alternatives:
  - all his angels
  lexicon: BDAG
  rationale: The Greek text reads 'all the angels' with the possessive idea supplied
    only by context, not by an explicit pronoun. The translation follows the wording
    of the source text rather than importing 'his' from parallels or tradition.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - accompanying him
  lexicon: BDAG
  rationale: Simple accompaniment is in view; 'with him' is direct and natural.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Signals the consequent action following his coming. 'Then' is concise
    and preserves the sequence.
- source_word: καθίσει
  chosen: he will sit
  alternatives:
  - he will take his seat
  - he will be seated
  lexicon: BDAG
  rationale: Future active indicative of καθίζω. 'He will sit' is the most direct
    rendering; 'take his seat' is interpretive though contextually plausible. The
    simpler wording best matches the Greek while remaining natural.
- source_word: ἐπὶ θρόνου
  chosen: on ... throne
  alternatives:
  - upon ... throne
  - on the throne
  lexicon: BDAG
  rationale: ἐπί with genitive here indicates position on/upon. The noun lacks the
    article in Greek, so 'on his glorious throne' or 'on a throne of glory' are both
    possible. The chosen English expresses the idiomatic sense without forcing an
    unnecessary indefinite article.
- source_word: θρόνου δόξης αὐτοῦ
  chosen: his glorious throne
  alternatives:
  - the throne of his glory
  - a throne of glory
  lexicon: BDAG
  rationale: The genitive construction is most naturally rendered in contemporary
    English as an attributive phrase, 'his glorious throne.' This preserves the sense
    of a throne characterized by his glory while avoiding wooden English. The more
    formal 'the throne of his glory' is preserved in a footnote because it is a viable,
    more literal alternative with traditional resonance.
