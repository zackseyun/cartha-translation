theological_decisions:
- issue: Generic masculine reference in participial constructions
  chosen_reading: Use 'everyone/the one ... he/him' to preserve the singular representative
    masculine force
  alternative_readings:
  - Use plural 'those who have ... they'
  - Use fully gender-neutral singular without pronouns
  rationale: The Greek uses grammatically masculine singular participles with generic
    force. Per the translation philosophy, gender-accurate rendering is preferred
    over flattening the singular structure. English 'everyone' plus subsequent 'he/him'
    preserves the representative singular logic of the saying more closely than shifting
    to plurals.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
