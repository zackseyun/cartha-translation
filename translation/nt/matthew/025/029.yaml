id: MAT.25.29
reference: Matthew 25:29
source:
  edition: SBLGNT
  text: τῷ γὰρ ἔχοντι παντὶ δοθήσεται καὶ περισσευθήσεται· ⸂τοῦ δὲ⸃ μὴ ἔχοντος καὶ
    ὃ ἔχει ἀρθήσεται ἀπ’ αὐτοῦ.
translation:
  text: For to everyone who has, more will be given, and he will have an abundance;
    but from the one who does not have, even what he has will be taken away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will abound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ... ἔχοντι παντί
  chosen: to everyone who has
  alternatives:
  - to everyone having
  - to the one who has, to every one
  lexicon: BDAG
  rationale: 'The dative articular participle with παντί functions substantivally
    and distributively: ''to everyone who has.'' This is idiomatic English while preserving
    the generic singular force.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding statement; 'For' preserves
    the discourse connection most naturally in English.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - shall be given
  lexicon: BDAG
  rationale: Future passive of δίδωμι. 'Will be given' is clear modern English and
    preserves the passive voice.
- source_word: περισσευθήσεται
  chosen: he will have an abundance
  alternatives:
  - he will abound
  - he will have more than enough
  lexicon: BDAG
  rationale: The future passive/intransitive sense of περισσεύω here conveys resulting
    abundance. 'He will have an abundance' is idiomatic and communicates the state
    produced, avoiding the less natural English 'will abound' while retaining the
    idea of surplus.
- source_word: τοῦ δὲ μὴ ἔχοντος
  chosen: but from the one who does not have
  alternatives:
  - but from the one not having
  - but from whoever does not have
  lexicon: BDAG
  rationale: The genitive articular participle after δέ forms a contrasting substantive
    expression. 'The one who does not have' preserves the singular representative
    force and the contrast with the first clause.
- source_word: καὶ ὃ ἔχει
  chosen: even what he has
  alternatives:
  - also what he has
  lexicon: BDAG
  rationale: 'καί here is ascensive (''even''), heightening the paradox: not only
    does he lack, but even his present possession is removed.'
- source_word: ἀρθήσεται
  chosen: will be taken away
  alternatives:
  - will be removed
  - will be taken
  lexicon: BDAG
  rationale: Future passive of αἴρω in the sense 'take away/remove.' 'Will be taken
    away' is the most natural English equivalent in this context.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - away from him
  lexicon: BDAG
  rationale: ἀπό with the genitive marks separation. 'From him' is sufficient because
    'taken away' already expresses removal.
