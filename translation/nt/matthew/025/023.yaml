id: MAT.25.23
reference: Matthew 25:23
source:
  edition: SBLGNT
  text: ἔφη αὐτῷ ὁ κύριος αὐτοῦ· Εὖ, δοῦλε ἀγαθὲ καὶ πιστέ, ἐπὶ ὀλίγα ἦς πιστός, ἐπὶ
    πολλῶν σε καταστήσω· εἴσελθε εἰς τὴν χαρὰν τοῦ κυρίου σου.
translation:
  text: His master said to him, ‘Well done, good and faithful servant. You were faithful
    over a few things; I will put you over many things. Enter into the joy of your
    master.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “slave.” The Greek word is δοῦλος, which can denote a servant or a slave
      depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  - declared
  lexicon: BDAG
  rationale: Standard narrative rendering of φημί in direct speech introduction; 'said'
    is natural modern English and sufficiently formal.
- source_word: κύριος
  chosen: master
  alternatives:
  - lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, in this parabolic master-slave/servant
    setting it refers to the human owner/master of the servant, not directly to God
    or Messiah. 'Master' best conveys the relational sense in context.
- source_word: δοῦλε
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: δοῦλος can mean 'slave' or 'servant.' Here the parable depicts a household
    subordinate under a master, but the bonded nature is not theologically foregrounded
    in the same way as some epistolary self-designations. 'Servant' reads naturally
    while preserving the hierarchical relationship; the stronger alternative is preserved
    in a footnote.
- source_word: Εὖ
  chosen: Well done
  alternatives:
  - Good
  - Excellent
  lexicon: BDAG
  rationale: Idiomatic commendation in English for evaluative εὖ in this construction;
    'Well done' best matches the sense of approval.
- source_word: ἀγαθὲ καὶ πιστέ
  chosen: good and faithful
  alternatives:
  - good and trustworthy
  lexicon: BDAG
  rationale: Conventional and accurate rendering of the paired vocative adjectives;
    'faithful' preserves the lexical connection with πιστός later in the verse.
- source_word: ἐπὶ ὀλίγα
  chosen: over a few things
  alternatives:
  - with a few things
  - over little
  lexicon: BDAG
  rationale: In context ἐπί with accusative expresses sphere/responsibility. 'Over
    a few things' communicates entrusted oversight more clearly than a more literal
    but less idiomatic rendering.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: '''Faithful'' preserves lexical consistency with the earlier vocative
    πιστέ and fits the context of proven reliability in stewardship.'
- source_word: ἐπὶ πολλῶν
  chosen: over many things
  alternatives:
  - over much
  - with many things
  lexicon: BDAG
  rationale: Parallel to ἐπὶ ὀλίγα; 'over many things' preserves the contrast and
    the sense of expanded responsibility.
- source_word: καταστήσω
  chosen: I will put you
  alternatives:
  - I will appoint you
  - I will set you
  lexicon: BDAG
  rationale: Future of καθίστημι here means appointing or placing in charge. 'I will
    put you over' is clear, idiomatic, and naturally completes the English construction
    with 'over many things.'
- source_word: εἴσελθε εἰς τὴν χαρὰν
  chosen: Enter into the joy
  alternatives:
  - Come into the joy
  - Share in the joy
  lexicon: BDAG
  rationale: Aorist imperative plus εἰς is well represented by 'Enter into.' This
    preserves the metaphor of entering the master's joy rather than flattening it
    to mere participation, though that nuance is possible.
- source_word: τοῦ κυρίου σου
  chosen: of your master
  alternatives:
  - of your lord
  lexicon: BDAG
  rationale: As earlier in the verse, κύριος in this parabolic setting is best rendered
    'master' for contextual coherence.
