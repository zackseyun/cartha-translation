theological_decisions:
- issue: Rendering κύριος in a parable involving a human superior
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The doctrine default for κύριος is 'Lord,' but context governs. Here
    the referent within the story is the servant's human superior, so 'master' avoids
    implying a direct titular use while still allowing the parable's theological significance
    to emerge from context rather than from imported capitalization or title language.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy #1 and #5'
- issue: Rendering δοῦλος in this context
  chosen_reading: servant
  alternative_readings:
  - slave
  - bondservant
  rationale: The doctrine allows 'servant / slave' context-dependently, using 'slave'
    where bonded status is theologically salient. In this verse the emphasis is commendation
    for faithful stewardship, not the institution of slavery itself, so 'servant'
    is chosen for readability while preserving 'slave' in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1 and #6'
