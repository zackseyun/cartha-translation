id: MAT.25.26
reference: Matthew 25:26
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ κύριος αὐτοῦ εἶπεν αὐτῷ· Πονηρὲ δοῦλε καὶ ὀκνηρέ, ᾔδεις ὅτι
    θερίζω ὅπου οὐκ ἔσπειρα καὶ συνάγω ὅθεν οὐ διεσκόρπισα;
translation:
  text: But his master answered and said to him, ‘Wicked and lazy servant, you knew
    that I reap where I did not sow and gather where I did not scatter seed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Wicked and lazy slave.' The Greek word doulos can mean either 'servant'
      or 'slave,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'You knew that I reap where I did not sow and gather where I did not
      scatter seed.' The Greek may be read as a statement rather than a rhetorical
      question.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - But ... replying
  lexicon: BDAG
  rationale: ἀποκριθεὶς with δέ is a common narrative formula. 'But ... answered'
    preserves both the participial sense and the mild adversative transition in natural
    English.
- source_word: ὁ κύριος αὐτοῦ
  chosen: his master
  alternatives:
  - his lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, in this parabolic master-slave/servant
    setting it refers to the servant's owner/master, not a direct christological title.
    'Master' best fits the social relation in context.
- source_word: Πονηρὲ
  chosen: Wicked
  alternatives:
  - evil
  - bad
  lexicon: BDAG
  rationale: πονηρός here is a moral evaluation, not merely poor quality. 'Wicked'
    preserves the ethical force of the rebuke.
- source_word: δοῦλε
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: δοῦλος can mean 'slave' where bonded status is salient. In this parable,
    the relationship is indeed hierarchical, but idiomatic English in this narrative
    setting commonly uses 'servant,' and the focus in this verse falls on accountability
    and entrusted service rather than on the institution of slavery itself. The alternative
    is preserved because 'slave' is also lexically defensible.
- source_word: ὀκνηρέ
  chosen: lazy
  alternatives:
  - slothful
  - idle
  lexicon: BDAG
  rationale: ὀκνηρός denotes reluctance to act or laziness. 'Lazy' is clear modern
    English without archaic tone.
- source_word: ᾔδεις
  chosen: you knew
  alternatives:
  - did you know
  - you have known
  lexicon: BDAG
  rationale: The form is imperfect/pluperfect in force from οἶδα, but in context it
    functions as a statement of what the servant supposedly knew. 'You knew' is the
    most natural rendering.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what was known: ''that I reap...''
    rather than a causal clause.'
- source_word: θερίζω
  chosen: I reap
  alternatives:
  - I harvest
  lexicon: BDAG
  rationale: '''Reap'' matches the agricultural metaphor and pairs naturally with
    sowing.'
- source_word: ὅπου οὐκ ἔσπειρα
  chosen: where I did not sow
  alternatives:
  - where I have not sown
  lexicon: BDAG
  rationale: A straightforward rendering of the relative clause; the aorist is naturally
    represented by simple past in English.
- source_word: συνάγω
  chosen: gather
  alternatives:
  - collect
  lexicon: BDAG
  rationale: '''Gather'' is the standard and idiomatic counterpart to harvest imagery.'
- source_word: ὅθεν οὐ διεσκόρπισα
  chosen: where I did not scatter seed
  alternatives:
  - from where I did not scatter
  - where I did not winnow
  lexicon: BDAG
  rationale: διασκορπίζω literally means 'scatter.' In this agricultural context,
    'scatter seed' makes explicit the implied object in idiomatic English and parallels
    'sow.' The more literal 'scatter' alone could sound incomplete in English.
