theological_decisions:
- issue: Force of the final clause and punctuation
  chosen_reading: Render the master's words as a rhetorical question ending with a
    question mark
  alternative_readings:
  - 'Render as a statement: ''You knew that I reap where I did not sow and gather
    where I did not scatter seed.'''
  rationale: 'The Greek wording can be read either as an assertion or as an ironic/rhetorical
    question in response to the servant''s claim in the preceding verse. Rendering
    it as a rhetorical question fits the argumentative flow: the master turns the
    servant''s own premise back on him. This does not settle a doctrinal issue but
    affects tone and interpretation, so the alternative is preserved in a footnote.'
  doctrine_reference: Preserve theological tension rather than resolve it
