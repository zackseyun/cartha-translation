id: MAT.25.4
reference: Matthew 25:4
source:
  edition: SBLGNT
  text: αἱ δὲ φρόνιμοι ἔλαβον ἔλαιον ἐν τοῖς ⸀ἀγγείοις μετὰ τῶν λαμπάδων ⸀ἑαυτῶν.
translation:
  text: But the wise took oil in their containers with their lamps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches' for 'lamps' (Greek lampadas); the term can denote a torch or
      lamp depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρόνιμοι
  chosen: wise
  alternatives:
  - prudent
  - sensible
  - prepared
  lexicon: BDAG
  rationale: φρόνιμος commonly denotes practical wisdom or prudence. 'Wise' is the
    most natural and established English rendering here, preserving the contrast with
    the 'foolish' virgins in the surrounding context without over-interpreting the
    term as merely 'prepared.'
- source_word: ἔλαβον
  chosen: took
  alternatives:
  - took along
  - received
  lexicon: BDAG
  rationale: λαμβάνω in this narrative context is best rendered 'took,' indicating
    that they brought or took along oil. 'Received' does not fit the context.
- source_word: ἔλαιον
  chosen: oil
  alternatives:
  - olive oil
  lexicon: BDAG
  rationale: ἔλαιον ordinarily means oil, often olive oil. 'Oil' is sufficient in
    English and fits the parable naturally; specifying 'olive' would add detail not
    required by the text.
- source_word: ἀγγείοις
  chosen: containers
  alternatives:
  - flasks
  - vessels
  - jars
  lexicon: BDAG
  rationale: ἀγγεῖον is a general term for a container or vessel. 'Containers' preserves
    the generic sense without implying a specific shape or material. 'Flasks' is possible
    but more specific than the Greek requires.
- source_word: λαμπάδων
  chosen: lamps
  alternatives:
  - torches
  lexicon: BDAG
  rationale: λαμπάς can refer to a lamp or torch. In this parable, English tradition
    often uses 'lamps,' and that rendering works well with the mention of extra oil.
    Because 'torches' is a viable lexical alternative, it is preserved in a footnote.
- source_word: ἑαυτῶν
  chosen: their
  alternatives:
  - their own
  lexicon: BDAG
  rationale: The reflexive pronoun emphasizes possession by the subjects themselves.
    English normally expresses this simply as 'their'; adding 'own' is possible but
    unnecessary in the main text.
- source_word: μετὰ τῶν λαμπάδων ἑαυτῶν
  chosen: with their lamps
  alternatives:
  - along with their lamps
  lexicon: BDAG
  rationale: μετά with the genitive indicates accompaniment. 'With their lamps' is
    concise and natural, preserving the sense that the oil was taken in addition to
    and alongside the lamps.
