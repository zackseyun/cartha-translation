id: MAT.25.30
reference: Matthew 25:30
source:
  edition: SBLGNT
  text: καὶ τὸν ἀχρεῖον δοῦλον ἐκβάλετε εἰς τὸ σκότος τὸ ἐξώτερον· ἐκεῖ ἔσται ὁ κλαυθμὸς
    καὶ ὁ βρυγμὸς τῶν ὀδόντων.
translation:
  text: And throw the worthless slave into the outer darkness. In that place there
    will be weeping and gnashing of teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Greek word is doulos, which can mean either 'servant'
      or 'slave'; 'slave' is used here because the bonded status is prominent in the
      parable setting.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀχρεῖον
  chosen: worthless
  alternatives:
  - useless
  - unprofitable
  lexicon: BDAG
  rationale: The adjective denotes someone of no use or value in the master's evaluation.
    'Worthless' is idiomatic modern English and preserves the severity of the judgment
    better than the more archaic 'unprofitable.'
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος is rendered according to context. In
    this parabolic master-slave setting, the bonded status is salient, so 'slave'
    better reflects the social relation than 'servant.'
- source_word: ἐκβάλετε
  chosen: throw
  alternatives:
  - cast out
  - drive out
  lexicon: BDAG
  rationale: The aorist imperative is forceful. 'Throw' is vivid, natural English
    that preserves the abruptness of expulsion without archaic diction.
- source_word: σκότος τὸ ἐξώτερον
  chosen: the outer darkness
  alternatives:
  - the farthest darkness
  - the darkness outside
  lexicon: BDAG
  rationale: This is a Matthean expression conventionally rendered 'the outer darkness.'
    It communicates exclusion from the place of blessing or celebration. Retaining
    the established phrase is both accurate and readable.
- source_word: ἐκεῖ
  chosen: In that place
  alternatives:
  - there
  lexicon: BDAG
  rationale: The adverb points emphatically to the location just mentioned. 'In that
    place' makes the referent explicit in smooth English and avoids a bare repetition
    of 'there' after 'outer darkness.'
- source_word: κλαυθμὸς
  chosen: weeping
  alternatives:
  - crying
  - wailing
  lexicon: BDAG
  rationale: '''Weeping'' is the standard rendering in this recurring Matthean formula
    and conveys grief without overinterpreting the intensity as ritual lament.'
- source_word: βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: This fixed expression is well established in English and preserves the
    idiomatic force of anguish and/or rage without flattening it to a mere physical
    description.
