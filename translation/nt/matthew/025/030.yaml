theological_decisions:
- issue: Nature of the judgment imagery in the parable
  chosen_reading: Retain the imagery of exclusion and anguish without specifying beyond
    the text whether it refers directly to final judgment, hell, or a lesser form
    of punishment.
  alternative_readings:
  - Explicitly interpret as hell
  - Explicitly interpret as temporal or merely metaphorical exclusion
  rationale: The verse uses stock Matthean judgment language, but the translation
    should preserve the text's own imagery rather than importing a fuller doctrinal
    explanation into the wording. This follows the principle of preserving theological
    tension rather than resolving interpretive questions in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
