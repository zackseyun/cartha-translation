- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default. In Matthew's
    narrative this title carries both respectful address and christological significance;
    'Lord' preserves that without importing more than the text states.
