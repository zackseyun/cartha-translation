id: MAT.25.37
reference: Matthew 25:37
source:
  edition: SBLGNT
  text: τότε ἀποκριθήσονται αὐτῷ οἱ δίκαιοι λέγοντες· Κύριε, πότε σε εἴδομεν πεινῶντα
    καὶ ἐθρέψαμεν, ἢ διψῶντα καὶ ἐποτίσαμεν;
translation:
  text: Then the righteous will answer him, saying, ‘Lord, when did we see you hungry
    and feed you, or thirsty and give you something to drink?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'gave you drink.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the discourse; 'Then' is the natural,
    concise English equivalent.
- source_word: ἀποκριθήσονται
  chosen: will answer
  alternatives:
  - will reply
  lexicon: BDAG
  rationale: Future middle/passive deponent of ἀποκρίνομαι; idiomatically active in
    meaning. 'Will answer' is standard and clear.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative indirect object after 'answer.' English commonly uses either 'answer
    him' or 'answer to him'; 'answer him' is more idiomatic here while preserving
    the object relation.
- source_word: οἱ δίκαιοι
  chosen: the righteous
  alternatives:
  - the just
  - the righteous ones
  lexicon: BDAG
  rationale: Substantival adjective referring to those declared/recognized as righteous
    in the scene. 'The righteous' is the most natural and established English rendering
    without unnecessary expansion.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Participle of attendant circumstance introducing direct speech. English
    'saying' smoothly carries the participial force.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this address to Jesus within Matthew, 'Lord' preserves both respect and christological
    resonance better than 'Master'.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Direct temporal interrogative; 'when' is the straightforward equivalent.
- source_word: εἴδομεν
  chosen: did we see
  alternatives:
  - saw we
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω in a question. English requires auxiliary 'did'
    for natural interrogative form.
- source_word: πεινῶντα
  chosen: hungry
  alternatives:
  - being hungry
  lexicon: BDAG
  rationale: Present participle functioning as object complement after 'see you.'
    English adjective 'hungry' is the most natural equivalent.
- source_word: ἐθρέψαμεν
  chosen: feed you
  alternatives:
  - nourish you
  - gave you food
  lexicon: BDAG
  rationale: Aorist of τρέφω, to feed/nourish. 'Feed you' is concise and idiomatic,
    matching the concrete act in context.
- source_word: ἢ
  chosen: or
  alternatives:
  - or else
  lexicon: BDAG
  rationale: Simple disjunctive conjunction linking the parallel clause.
- source_word: διψῶντα
  chosen: thirsty
  alternatives:
  - being thirsty
  lexicon: BDAG
  rationale: Present participle parallel to πεινῶντα; English adjective is natural
    and preserves the sense.
- source_word: ἐποτίσαμεν
  chosen: give you something to drink
  alternatives:
  - gave you drink
  - gave you water
  lexicon: BDAG
  rationale: Aorist of ποτίζω, 'to give drink, cause to drink.' 'Give you something
    to drink' is idiomatic modern English and avoids the slightly awkward 'gave you
    drink' while not over-specifying 'water,' which the Greek does not state.
