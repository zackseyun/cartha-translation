theological_decisions:
- issue: Rendering κύριος in a parabolic address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Although the immediate social setting could support 'Master,' the project's
    contested-terms table sets κύριος to 'Lord' by default. This verse does not require
    deviation, and using 'Lord' maintains consistency while not importing extra doctrinal
    claims.
