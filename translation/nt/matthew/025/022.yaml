id: MAT.25.22
reference: Matthew 25:22
source:
  edition: SBLGNT
  text: προσελθὼν ⸀δὲ καὶ ὁ τὰ δύο ⸀τάλαντα εἶπεν· Κύριε, δύο τάλαντά μοι παρέδωκας·
    ἴδε ἄλλα δύο τάλαντα ⸀ἐκέρδησα.
translation:
  text: Then the one who had received the two talents also came forward and said,
    ‘Lord, you handed over to me two talents. Look, I gained two more talents.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Master.” The Greek title is kyrios, commonly rendered “Lord”; in this
      parable it can also function as a respectful address to a master.
    reason: alternative_reading
  - marker: b
    text: A talent was a large unit of money, not a natural ability.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  chosen: came forward
  alternatives:
  - came
  - approached
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, introducing the servant's approach
    to the master. 'Came forward' is natural English in this narrative setting and
    preserves the sense of approaching to speak.
- source_word: δὲ καὶ
  chosen: Then ... also
  alternatives:
  - and also
  - now also
  lexicon: BDAG
  rationale: The combination marks continuation and addition in the sequence of reports.
    Rendering with 'Then' plus 'also' captures both the narrative progression and
    the parallel with the previous servant.
- source_word: ὁ τὰ δύο τάλαντα
  chosen: the one who had received the two talents
  alternatives:
  - the one with the two talents
  - the man with the two talents
  lexicon: BDAG
  rationale: The article with the accusative phrase functions substantivally to identify
    this servant by the amount entrusted to him. 'Had received' is supplied idiomatically
    from the context of the parable to make the English referent clear; 'the one with
    the two talents' is possible but less explicit.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this parable 'Master' would fit the social setting, but the project default
    favors 'Lord,' and the address remains natural in English.
- source_word: παρέδωκας
  chosen: you handed over
  alternatives:
  - you entrusted
  - you gave
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over, deliver.' In context it refers
    to entrusting property. 'Handed over' preserves the concrete verbal force while
    remaining understandable; 'entrusted' is interpretive but contextually accurate.
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: Dative pronoun marking the indirect object. 'To me' is the clearest natural
    rendering in English.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: Deictic/interjection drawing attention to the result. 'Look' is readable
    modern English and avoids archaic 'behold' while preserving the force.
- source_word: ἄλλα δύο τάλαντα
  chosen: two more talents
  alternatives:
  - another two talents
  - two other talents
  lexicon: BDAG
  rationale: ἄλλα with a numeral here means an additional equal amount. 'Two more
    talents' is idiomatic modern English.
- source_word: ἐκέρδησα
  chosen: I gained
  alternatives:
  - I earned
  - I made
  lexicon: BDAG
  rationale: κερδαίνω means 'gain, win, profit.' 'I gained' is a straightforward rendering
    that preserves the result without over-specifying commercial method.
- source_word: τάλαντα
  chosen: talents
  alternatives:
  - large sums of money
  lexicon: BDAG
  rationale: τάλαντον denotes a large unit of weight/value, not an innate ability.
    Retaining 'talents' preserves the traditional term and the parable's wording;
    a cultural note can clarify the monetary sense.
