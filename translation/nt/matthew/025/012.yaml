id: MAT.25.12
reference: Matthew 25:12
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Ἀμὴν λέγω ὑμῖν, οὐκ οἶδα ὑμᾶς.
translation:
  text: But he answered, ‘Truly I tell you, I do not know you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not recognize you.' The Greek more literally reads 'I do not know
      you,' which can imply relational non-recognition in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  chosen: But he answered
  alternatives:
  - But he replied
  - And he answered, saying
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced narrative
    formula. In natural English, compressing it to 'he answered' preserves the sense
    without unnecessary redundancy. δέ is rendered 'But' to mark contrast with the
    previous plea.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula Ἀμὴν λέγω ὑμῖν, English idiom is best served
    by 'Truly I tell you.' 'Amen' is more literal but less transparent in running
    translation; 'truly, truly' does not fit this single Ἀμήν form.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is a natural modern-English rendering of the idiom while
    preserving direct address and solemnity.'
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I do not recognize
  - I have not known
  lexicon: BDAG
  rationale: οἶδα normally means 'know.' In this context it conveys relational non-recognition
    or disavowal, but 'I do not know' best preserves the Greek wording and leaves
    the interpretive force intact.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, addressed to the group in the parable. English
    'you' adequately represents the plural in context.
