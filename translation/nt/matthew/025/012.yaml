theological_decisions:
- issue: Force of 'I do not know you' in the parable
  chosen_reading: Retain the relationally weighty but textually simple wording 'I
    do not know you' without expanding it into a doctrinal statement about salvation
    beyond the verse itself.
  alternative_readings:
  - I do not recognize you
  - I have no relationship with you
  rationale: The phrase carries exclusion and relational disavowal in context, but
    the translation should not import a fuller theological interpretation into the
    main text. A more interpretive gloss would over-specify what the Greek leaves
    implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
