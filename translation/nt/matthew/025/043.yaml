id: MAT.25.43
reference: Matthew 25:43
source:
  edition: SBLGNT
  text: ξένος ἤμην καὶ οὐ συνηγάγετέ με, γυμνὸς καὶ οὐ περιεβάλετέ με, ἀσθενὴς καὶ
    ἐν φυλακῇ καὶ οὐκ ἐπεσκέψασθέ με.
translation:
  text: I was a stranger and you did not welcome me, naked and you did not clothe
    me, sick and in prison and you did not visit me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take me in' / 'receive me'; the Greek verb literally means 'gather'
      but here refers to welcoming a stranger with hospitality.
    reason: lexical_alternative
  - marker: b
    text: '''Visit me'' can also carry the sense ''care for me'' or ''look after me,''
      not merely pay a social call.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ξένος
  chosen: a stranger
  alternatives:
  - a foreigner
  - a guest
  lexicon: BDAG
  rationale: In this judgment-context list of neglected acts of mercy, ξένος refers
    to someone outside one's household/community who needs reception. 'Stranger' is
    the most natural English equivalent and matches the social vulnerability implied.
    'Foreigner' is too ethnically specific; 'guest' is too positive and lacks the
    vulnerability nuance.
- source_word: συνηγάγετέ
  chosen: welcome
  alternatives:
  - gather in
  - take in
  - receive
  lexicon: BDAG
  rationale: From συνάγω literally 'gather together,' but in this idiom with ξένος
    it means to bring in or receive hospitably. 'Welcome' gives clear modern English
    while preserving the hospitality sense better than the more wooden 'gather in.'
    'Take in' is possible but can sound merely logistical rather than hospitable.
- source_word: γυμνός
  chosen: naked
  alternatives:
  - poorly clothed
  - without adequate clothing
  lexicon: BDAG
  rationale: γυμνός can denote literal nakedness or insufficient clothing. Here the
    paired response 'clothe me' shows deprivation of clothing. 'Naked' is the standard
    direct rendering and preserves the force of the Greek; the broader sense is noted
    by alternatives.
- source_word: περιεβάλετέ
  chosen: clothe
  alternatives:
  - put clothing on
  - cover
  lexicon: BDAG
  rationale: The verb literally means to put around, hence to clothe. 'Clothe' is
    concise, idiomatic, and directly corresponds to the expected act of mercy in context.
- source_word: ἀσθενής
  chosen: sick
  alternatives:
  - weak
  - ill
  lexicon: BDAG
  rationale: Although the adjective can mean weak in a broader sense, in this mercy-list
    and especially alongside prison visitation, physical illness is the most natural
    sense. 'Sick' is idiomatic and clear.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in jail
  lexicon: BDAG
  rationale: φυλακή here denotes imprisonment rather than merely a guard-post. 'In
    prison' is the standard and slightly broader rendering; 'jail' is more colloquial
    and potentially anachronistically narrow.
- source_word: ἐπεσκέψασθέ
  chosen: visit
  alternatives:
  - care for
  - look after
  lexicon: BDAG
  rationale: ἐπισκέπτομαι can mean to visit with concern, implying care rather than
    a casual social call. 'Visit' is the conventional rendering and fits the immediate
    context, while the caring nuance is important enough to preserve in a footnote.
