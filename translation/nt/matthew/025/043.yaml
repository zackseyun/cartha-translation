theological_decisions:
- issue: Nuance of merciful action in ἐπεσκέψασθέ με
  chosen_reading: visit me
  alternative_readings:
  - care for me
  - look after me
  rationale: The verse condemns failure to show compassionate presence to the vulnerable.
    Rendering the verb as 'visit' preserves the concrete action named in the Greek
    without over-interpreting it, while acknowledging that the term carries a nuance
    of caring attention beyond mere social visitation.
  doctrine_reference: Translation philosophy §3, §6
