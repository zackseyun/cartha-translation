id: MAT.25.2
reference: Matthew 25:2
source:
  edition: SBLGNT
  text: πέντε δὲ ⸂ἐξ αὐτῶν ἦσαν⸃ ⸂μωραὶ καὶ πέντε φρόνιμοι⸃.
translation:
  text: And five of them were foolish, and five were wise.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πέντε
  chosen: five
  lexicon: BDAG
  rationale: Cardinal numeral straightforwardly rendered as 'five.' Repeated in English
    to mirror the Greek balance and contrast.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And'
    gives natural English while preserving the narrative linkage without overstating
    contrast.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: The partitive expression indicates that the five are a subset of the
    previously mentioned group. 'Of them' is idiomatic English; 'from among them'
    is possible but less natural here.
- source_word: ἦσαν
  chosen: were
  lexicon: BDAG
  rationale: Imperfect of εἰμί functions as a simple copula in this descriptive statement;
    English past 'were' is the natural rendering.
- source_word: μωραὶ
  chosen: foolish
  alternatives:
  - foolish ones
  - unwise
  lexicon: BDAG
  rationale: μωρός denotes foolishness or lack of sense. 'Foolish' is the most natural
    adjectival rendering in this contrast and matches the feminine plural referent
    without needing an explicit noun.
- source_word: καὶ πέντε φρόνιμοι
  chosen: and five were wise
  alternatives:
  - and five prudent
  - and five sensible
  lexicon: BDAG
  rationale: φρόνιμος carries the sense of wise, prudent, or sensible. 'Wise' best
    matches the established contrast with 'foolish' in this parable and reads naturally
    in English. The supplied 'were' in the second clause makes the ellipsis explicit
    for clear English.
