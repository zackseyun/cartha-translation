id: MAT.25.24
reference: Matthew 25:24
source:
  edition: SBLGNT
  text: προσελθὼν δὲ καὶ ὁ τὸ ἓν τάλαντον εἰληφὼς εἶπεν· Κύριε, ἔγνων σε ὅτι σκληρὸς
    εἶ ἄνθρωπος, θερίζων ὅπου οὐκ ἔσπειρας καὶ συνάγων ὅθεν οὐ διεσκόρπισας·
translation:
  text: Then the one who had received the one talent also came and said, ‘Lord, I
    knew you, that you are a hard man, reaping where you did not sow and gathering
    where you did not scatter seed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harsh man.' The Greek σκληρός can mean hard, harsh, or severe.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'gathering from where you did not scatter.' 'Seed' is supplied
      in English to make the agricultural image explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: came
  alternatives:
  - approached
  - came forward
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι introducing the servant’s action before
    speaking. 'Came' is natural English in narrative sequence; 'approached' is possible
    but slightly stiffer.
- source_word: δὲ καὶ
  chosen: Then ... also
  alternatives:
  - and
  - now ... also
  lexicon: BDAG
  rationale: δέ marks progression in the narrative, while καί adds this servant to
    the sequence of those appearing. Rendering both with 'Then' and 'also' preserves
    flow and inclusion.
- source_word: ὁ τὸ ἓν τάλαντον εἰληφὼς
  chosen: the one who had received the one talent
  alternatives:
  - the man who had received the one talent
  - the one who received the one talent
  lexicon: BDAG
  rationale: The articular participial construction identifies the servant by what
    he had received. The perfect participle εἰληφώς suggests a completed action with
    present relevance, well represented by 'had received.' 'The one' preserves the
    Greek structure without unnecessarily adding 'man.'
- source_word: τάλαντον
  chosen: talent
  alternatives:
  - bag of gold
  - large sum of money
  lexicon: BDAG
  rationale: '''Talent'' preserves the source term and its parabolic resonance. More
    interpretive renderings like ''bag of gold'' explain value but lose the lexical
    link and can over-specify. The monetary sense is clear from context.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In the parable this is a respectful
    address to the master; 'Master' is possible contextually, but 'Lord' follows the
    project’s stated default and remains idiomatic.
- source_word: ἔγνων σε
  chosen: I knew you
  alternatives:
  - I came to know you
  - I knew what you were like
  lexicon: BDAG
  rationale: Aorist of γινώσκω here expresses the servant’s claimed knowledge of the
    master's character. 'I knew you' is concise and natural; the fuller paraphrases
    import explanatory nuance not explicit in the Greek.
- source_word: σκληρὸς
  chosen: hard
  alternatives:
  - harsh
  - strict
  lexicon: BDAG
  rationale: σκληρός can denote hardness, severity, or harshness. 'Hard' preserves
    the metaphorical force and leaves the servant’s accusation somewhat open, whereas
    'harsh' interprets more strongly.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The Greek is singular masculine and refers to a male figure in the parable.
    Per gender-accurate policy, 'man' is the appropriate rendering.
- source_word: θερίζων
  chosen: reaping
  alternatives:
  - harvesting
  lexicon: BDAG
  rationale: The participle continues the characterization of the master. 'Reaping'
    matches the agricultural imagery and pairs well with 'sow.'
- source_word: ὅπου οὐκ ἔσπειρας
  chosen: where you did not sow
  alternatives:
  - where you did not plant
  lexicon: BDAG
  rationale: σπείρω is specifically 'sow,' and preserving that term keeps the agricultural
    parallelism intact.
- source_word: συνάγων
  chosen: gathering
  alternatives:
  - collecting
  lexicon: BDAG
  rationale: συνάγω broadly means gather/bring together. 'Gathering' best fits the
    harvest context and parallels 'reaping.'
- source_word: ὅθεν οὐ διεσκόρπισας
  chosen: where you did not scatter seed
  alternatives:
  - from where you did not scatter
  - where you did not winnow
  lexicon: BDAG
  rationale: διασκορπίζω means scatter/disperse. In this agricultural context, English
    needs an implied object for clarity; 'seed' is supplied because the parallel with
    'sow' strongly suggests scattering seed rather than a different action. A more
    literal rendering without an object is possible but less clear in English.
