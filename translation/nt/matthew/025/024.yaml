theological_decisions:
- issue: Rendering κύριος in a parabolic address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Although the speaker addresses the master of the parable, the project’s
    contested-terms guidance sets κύριος to 'Lord' by default. This preserves consistency
    unless context strongly requires otherwise, which this verse does not.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Characterization of the master in the servant’s speech
  chosen_reading: The accusation is rendered as the servant’s claim without softening
    or endorsing it.
  alternative_readings:
  - Translate more interpretively as 'harsh' to foreground moral severity
  rationale: The verse reports the servant’s perception of the master; the translation
    should preserve that tension rather than resolve whether the description is accurate.
    Using 'hard' keeps the statement transparent and less interpretively loaded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
