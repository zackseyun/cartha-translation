id: MAT.25.27
reference: Matthew 25:27
source:
  edition: SBLGNT
  text: ἔδει ⸂σε οὖν⸃ βαλεῖν ⸂τὰ ἀργύριά⸃ μου τοῖς τραπεζίταις, καὶ ἐλθὼν ἐγὼ ἐκομισάμην
    ἂν τὸ ἐμὸν σὺν τόκῳ.
translation:
  text: Therefore, you should have deposited my money with the bankers, and when I
    came, I would have received what was mine with interest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put my silver with the bankers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  chosen: you should have
  alternatives:
  - it was necessary for you to
  - you ought to have
  lexicon: BDAG
  rationale: Imperfect of impersonal δέω expresses what was required or fitting in
    the past. 'You should have' is idiomatic modern English and preserves the rebuking
    force without sounding wooden.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding accusation. 'Therefore' clearly signals
    the logical consequence in formal but readable English.
- source_word: βαλεῖν
  chosen: deposited
  alternatives:
  - put
  - placed
  lexicon: BDAG
  rationale: Although βάλλω is literally 'throw/put,' in this financial context with
    τραπεζίταις it idiomatically means to place money on deposit. 'Deposited' conveys
    the intended economic action more precisely than a literal 'put.'
- source_word: τὰ ἀργύριά μου
  chosen: my money
  alternatives:
  - my silver
  - my coins
  lexicon: BDAG
  rationale: ἀργύριον can denote silver or money. In this parable's commercial setting,
    'money' best communicates the functional sense in natural English. 'Silver' would
    be more literal but less clear for modern readers.
- source_word: τραπεζίταις
  chosen: the bankers
  alternatives:
  - the money changers
  - the bankers at the table
  lexicon: BDAG
  rationale: τραπεζίτης refers to one engaged in banking or money-changing. Here the
    mention of earning τόκος favors 'bankers' rather than merely 'money changers,'
    since the point is deposit and interest.
- source_word: ἐλθὼν ἐγὼ
  chosen: when I came
  alternatives:
  - upon coming, I
  - and having come, I
  lexicon: BDAG
  rationale: The aorist participle is temporal relative to the main verb. 'When I
    came' is smooth English and preserves the sequence of return followed by collection.
- source_word: ἐκομισάμην ἂν
  chosen: I would have received
  alternatives:
  - I would have gotten back
  - I would have recovered
  lexicon: BDAG
  rationale: κομίζω in the middle can mean receive back or recover for oneself. With
    ἄν it expresses the result that would have occurred in this contrary-to-fact scenario.
    'Received' is clear and dignified.
- source_word: τὸ ἐμὸν
  chosen: what was mine
  alternatives:
  - my own
  - that which belonged to me
  lexicon: BDAG
  rationale: The substantivized possessive points to the master's own property. 'What
    was mine' is idiomatic and preserves the possessive emphasis.
- source_word: σὺν τόκῳ
  chosen: with interest
  alternatives:
  - with profit
  - with usury
  lexicon: BDAG
  rationale: τόκος in this context means interest on money. 'Usury' is archaic and
    misleading in modern English because it often implies excessive or exploitative
    interest, which is not the lexical point here.
