theological_decisions:
- issue: Parabolic financial language and possible moral overreading of interest-taking
  chosen_reading: Translate the financial terms straightforwardly as part of the parable's
    imagery without implying an endorsement or condemnation of all interest-taking.
  alternative_readings:
  - Render more literally with 'usury' to evoke traditional moral discourse
  rationale: The verse uses ordinary economic language to make a point within the
    parable. A neutral rendering avoids importing later theological debates about
    lending practices into the text itself.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve original-language primacy.'
