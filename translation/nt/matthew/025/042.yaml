theological_decisions:
- issue: Degree of explicitness in rendering the negated provision clauses
  chosen_reading: Render both clauses as 'you gave me nothing to eat/drink' rather
    than a more literal but less idiomatic 'you did not give me to eat/drink.'
  alternative_readings:
  - you did not give me anything to eat or drink
  - you did not give to me to eat or drink
  rationale: This is not a doctrinally contested phrase, but the verse participates
    in Jesus' judgment discourse about mercy shown or withheld to 'the least of these'
    in the surrounding passage. The chosen rendering preserves the force of personal
    neglect while using clear modern English consistent with optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
