id: MAT.25.42
reference: Matthew 25:42
source:
  edition: SBLGNT
  text: ἐπείνασα γὰρ καὶ οὐκ ἐδώκατέ μοι φαγεῖν, ⸀ἐδίψησα καὶ οὐκ ἐποτίσατέ με,
translation:
  text: For I was hungry and you gave me nothing to eat; I was thirsty and you gave
    me nothing to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'you did not give me to eat ... you did not give me to
      drink.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείνασα
  chosen: I was hungry
  alternatives:
  - I hungered
  lexicon: BDAG
  rationale: Aorist indicative of πεινάω, expressing the speaker's past state of hunger.
    'I was hungry' is idiomatic modern English and preserves the sense without archaic
    stiffness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the judgment in the surrounding context. 'For'
    is concise and preserves the explanatory force.
- source_word: ἐδώκατέ μοι φαγεῖν
  chosen: you gave me nothing to eat
  alternatives:
  - you did not give me to eat
  - you gave me no food
  lexicon: BDAG
  rationale: Literally 'you did not give to me to eat.' In English, 'you gave me nothing
    to eat' is the most natural equivalent and keeps the personal object μοι explicit.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: The dative pronoun is naturally incorporated in English as the indirect
    object 'me' in the idiom 'gave me nothing to eat.'
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - food
  lexicon: BDAG
  rationale: Aorist infinitive of ἐσθίω, complementing ἐδώκατε. Rendering it verbally
    as 'to eat' preserves the Greek construction more closely than nominalizing it
    as 'food,' though the latter is a viable English alternative.
- source_word: ἐδίψησα
  chosen: I was thirsty
  alternatives:
  - I thirsted
  lexicon: BDAG
  rationale: Aorist indicative of διψάω, parallel to ἐπείνασα. 'I was thirsty' is
    idiomatic and preserves the parallelism.
- source_word: ἐποτίσατέ με
  chosen: you gave me nothing to drink
  alternatives:
  - you did not give me a drink
  - you did not make me drink
  lexicon: BDAG
  rationale: ποτίζω can mean 'give drink' or 'cause to drink.' In this context of
    merciful provision, 'you gave me nothing to drink' best captures the intended
    sense and matches the parallel with 'nothing to eat.'
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Accusative direct object retained explicitly in English to preserve the
    personal focus of the neglect.
