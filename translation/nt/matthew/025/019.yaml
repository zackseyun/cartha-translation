id: MAT.25.19
reference: Matthew 25:19
source:
  edition: SBLGNT
  text: μετὰ δὲ ⸂πολὺν χρόνον⸃ ἔρχεται ὁ κύριος τῶν δούλων ἐκείνων καὶ συναίρει ⸂λόγον
    μετ’ αὐτῶν⸃
translation:
  text: Now after a long time, the master of those slaves comes and settles accounts
    with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lord of those servants comes and settles accounts with them.' The
      Greek κύριος can mean 'lord' or 'master,' and δοῦλοι can be rendered 'servants'
      or 'slaves'; here the main text chooses the household-economic sense most explicit
      in the parable.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ δὲ πολὺν χρόνον
  chosen: Now after a long time
  alternatives:
  - After a long time
  - But after a long time
  lexicon: BDAG
  rationale: μετά with the accusative χρόνον means temporal succession, 'after.' δέ
    is a mild connective; 'now' gives natural English discourse flow without overstating
    contrast, while preserving progression in the narrative.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - arrives
  lexicon: BDAG
  rationale: The Greek uses the historical present. English can preserve vividness
    with the present 'comes.' 'Arrives' is possible but less direct.
- source_word: ὁ κύριος
  chosen: the master
  alternatives:
  - the lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a theological title, in this parabolic
    context it refers to the owner/master over household slaves, not directly as a
    christological title within the clause. 'Master' best conveys the social relation
    in idiomatic English.
- source_word: τῶν δούλων ἐκείνων
  chosen: of those slaves
  alternatives:
  - of those servants
  - of those bondservants
  lexicon: BDAG
  rationale: δοῦλος can be 'servant' or 'slave' contextually. Here the household ownership
    relation is explicit under a master, so 'slaves' better preserves the bonded status,
    in line with the project's guidance to use 'slave' where that nature is salient.
- source_word: συναίρει λόγον μετ’ αὐτῶν
  chosen: settles accounts with them
  alternatives:
  - settles a reckoning with them
  - takes account with them
  - settles the account with them
  lexicon: BDAG
  rationale: The idiom συναίρω λόγον with someone means to settle accounts, reckon,
    or call to account. 'Settles accounts with them' is clear modern English and captures
    the commercial/accounting sense in the parable.
