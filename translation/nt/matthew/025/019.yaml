theological_decisions:
- issue: Rendering κύριος in a parable
  chosen_reading: the master
  alternative_readings:
  - the lord
  rationale: The project's default for κύριος is 'Lord,' but context can require a
    non-titular sense. In this verse the referent is the parable's household owner
    in relation to δοῦλοι, so 'master' communicates the narrative role without importing
    a direct christological title into the wording. The broader parabolic significance
    is preserved by context rather than by forcing the title here.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy items 1 and 6'
- issue: Rendering δοῦλος
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The bonded social status is salient in a master-slave economic setting,
    so 'slaves' better reflects the source than the softer 'servants.' This follows
    the documented policy for δοῦλος when bondedness matters.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy item 1'
