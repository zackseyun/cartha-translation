theological_decisions:
- issue: Degree of interpretive expansion in acts of mercy language
  chosen_reading: Retain the concrete actions 'clothed,' 'visited,' and 'came to me'
    without paraphrastic expansion.
  alternative_readings:
  - '''took care of me'' for ἐπεσκέψασθέ με'
  - '''came to visit me'' for ἤλθατε πρός με'
  rationale: The verse emphasizes tangible acts of mercy toward 'the least of these.'
    The Greek wording is straightforward and does not require theological or pastoral
    expansion. Preserving the plain sense aligns with optimal equivalence and avoids
    importing implications not explicitly stated in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
