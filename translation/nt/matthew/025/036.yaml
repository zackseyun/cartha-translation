id: MAT.25.36
reference: Matthew 25:36
source:
  edition: SBLGNT
  text: γυμνὸς καὶ περιεβάλετέ με, ἠσθένησα καὶ ἐπεσκέψασθέ με, ἐν φυλακῇ ἤμην καὶ
    ἤλθατε πρός με.
translation:
  text: I was naked and you clothed me; I was sick and you visited me; I was in prison
    and you came to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked after me' for 'visited me'; the Greek verb can include the sense
      of visiting with care or concern.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you came to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυμνὸς
  chosen: naked
  alternatives:
  - poorly clothed
  - without clothing
  lexicon: BDAG
  rationale: The adjective literally means 'naked' or 'without clothing.' In this
    mercy-context it can imply lack of adequate clothing, but 'naked' is the most
    direct and traditional rendering and fits the parallel action 'you clothed me.'
- source_word: περιεβάλετέ
  chosen: clothed
  alternatives:
  - put clothing on
  - covered
  lexicon: BDAG
  rationale: From περιβάλλω, here meaning to put clothing around/on someone. 'Clothed'
    is concise, natural English and preserves the direct correspondence with γυμνός.
- source_word: ἠσθένησα
  chosen: I was sick
  alternatives:
  - I was weak
  - I was ill
  lexicon: BDAG
  rationale: Although the verb can denote weakness more broadly, in this context of
    compassionate care 'I was sick' best conveys the likely sense in idiomatic English.
- source_word: ἐπεσκέψασθέ
  chosen: visited
  alternatives:
  - looked after
  - cared for
  lexicon: BDAG
  rationale: ἐπισκέπτομαι can mean to visit with concern or care. 'Visited' is the
    most transparent rendering here, while the compassionate nuance is carried by
    the context. Stronger interpretive expansions like 'cared for' would go beyond
    the explicit wording.
- source_word: φυλακῇ
  chosen: prison
  alternatives:
  - jail
  - custody
  lexicon: BDAG
  rationale: φυλακή can refer to a place of confinement. 'Prison' is the standard
    and suitably broad English term here.
- source_word: ἤλθατε πρός με
  chosen: you came to me
  alternatives:
  - you came and saw me
  - you came to visit me
  lexicon: BDAG
  rationale: The Greek is simply 'you came to me.' Rendering it this way preserves
    the verbal simplicity and avoids importing the fuller idea of visitation already
    expressed in the previous clause.
