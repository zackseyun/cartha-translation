theological_decisions:
- issue: Scope of πάντα τὰ ἔθνη
  chosen_reading: all the nations
  alternative_readings:
  - all peoples
  - all the Gentiles
  rationale: The phrase is left at its lexical breadth rather than interpreted more
    narrowly. This preserves the text's eschatological universality without importing
    a specific doctrinal scheme about which groups are judged.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
