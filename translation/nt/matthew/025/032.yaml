id: MAT.25.32
reference: Matthew 25:32
source:
  edition: SBLGNT
  text: καὶ ⸀συναχθήσονται ἔμπροσθεν αὐτοῦ πάντα τὰ ἔθνη, καὶ ἀφορίσει αὐτοὺς ἀπ’
    ἀλλήλων, ὥσπερ ὁ ποιμὴν ἀφορίζει τὰ πρόβατα ἀπὸ τῶν ἐρίφων,
translation:
  text: And all the nations will be gathered before him, and he will separate them
    from one another, just as the shepherd separates the sheep from the goats,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all peoples"; Greek "all the nations" (πάντα τὰ ἔθνη).
    reason: lexical_alternative
  - marker: b
    text: The Greek word ἐρίφων can more specifically mean "young goats" or "kids."
    reason: lexical_alternative
lexical_decisions:
- source_word: συναχθήσονται
  chosen: will be gathered
  alternatives:
  - will be assembled
  - will be brought together
  lexicon: BDAG
  rationale: Future passive of συνάγω; 'will be gathered' is natural English and preserves
    the passive sense without adding an explicit agent.
- source_word: ἔμπροσθεν αὐτοῦ
  chosen: before him
  alternatives:
  - in front of him
  - in his presence
  lexicon: BDAG
  rationale: '''Before him'' is the most idiomatic and sufficiently formal rendering
    of the prepositional phrase, preserving the judicial scene.'
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all peoples
  lexicon: BDAG
  rationale: ἔθνη most basically means 'nations' or 'peoples.' In this eschatological
    judgment context, 'all the nations' best preserves the lexical form and traditional
    scope without narrowing it to 'Gentiles' or flattening it to 'people'.
- source_word: ἀφορίσει
  chosen: will separate
  alternatives:
  - will divide
  - will set apart
  lexicon: BDAG
  rationale: ἀφορίζω here denotes separating one group from another. 'Will separate'
    is the clearest and most direct equivalent.
- source_word: αὐτοὺς ἀπ’ ἀλλήλων
  chosen: them from one another
  alternatives:
  - them from each other
  lexicon: BDAG
  rationale: This phrase emphasizes mutual separation within the gathered nations.
    'From one another' is slightly more formal and matches the Greek structure well.
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: Introduces a comparison. 'Just as' clearly signals the simile in readable
    English.
- source_word: ὁ ποιμὴν
  chosen: the shepherd
  alternatives:
  - a shepherd
  lexicon: BDAG
  rationale: The article is present in Greek. 'The shepherd' works generically in
    English for the illustrative comparison and preserves the article.
- source_word: τὰ πρόβατα
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: BDAG
  rationale: πρόβατα specifically means sheep, not the more collective 'flock.' The
    concrete image should be retained.
- source_word: τῶν ἐρίφων
  chosen: the goats
  alternatives:
  - the young goats
  - the kids
  lexicon: BDAG
  rationale: ἔριφος can denote a young goat/kid, but in English the established and
    natural contrast in this pastoral image is 'sheep' and 'goats.' 'Kids' could sound
    overly colloquial.
