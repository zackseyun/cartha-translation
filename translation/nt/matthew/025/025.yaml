id: MAT.25.25
reference: Matthew 25:25
source:
  edition: SBLGNT
  text: καὶ φοβηθεὶς ἀπελθὼν ἔκρυψα τὸ τάλαντόν σου ἐν τῇ γῇ· ἴδε ἔχεις τὸ σόν.
translation:
  text: And being afraid, I went away and hid your talent in the ground. Look, you
    have what is yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large sum of money'; a talent was a high-value monetary unit, not
      a reference to natural ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθεὶς
  chosen: being afraid
  alternatives:
  - afraid
  - fearing
  lexicon: BDAG
  rationale: Aorist passive participle of φοβέομαι used adverbially/circumstantially.
    'Being afraid' preserves the participial force and the servant's stated motive
    without overinterpreting as reverential fear.
- source_word: ἀπελθὼν
  chosen: I went away
  alternatives:
  - having gone away
  - I went off
  lexicon: BDAG
  rationale: Aorist participle paired with the finite verb ἔκρυψα. In natural English,
    the participle is best brought into the verbal sequence as 'I went away and hid,'
    preserving the action order.
- source_word: ἔκρυψα
  chosen: hid
  alternatives:
  - buried
  - concealed
  lexicon: BDAG
  rationale: κρύπτω means 'hide/conceal.' Although burying is implied by the following
    phrase 'in the ground,' 'hid' is the more direct lexical equivalent and avoids
    importing extra wording into the verb itself.
- source_word: τὸ τάλαντόν σου
  chosen: your talent
  alternatives:
  - your talent coin
  - your bag of gold
  lexicon: BDAG
  rationale: τάλαντον names a large unit of money/weight. 'Talent' preserves the historical
    term used in this parable and avoids an overly interpretive modernization. Because
    modern readers may think of innate ability, a footnote preserves the monetary
    sense.
- source_word: ἐν τῇ γῇ
  chosen: in the ground
  alternatives:
  - in the earth
  - in the soil
  lexicon: BDAG
  rationale: γῆ here refers to the ground/earth as the place of concealment. 'In the
    ground' is idiomatic modern English and fits the burial context.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: ἴδε is a deictic attention-getter. 'Look' is natural modern English;
    'behold' is too archaic for the stated translation philosophy.
- source_word: ἔχεις τὸ σόν
  chosen: you have what is yours
  alternatives:
  - you have your own
  - here is what belongs to you
  lexicon: BDAG
  rationale: 'The expression is elliptical: literally, ''you have the yours.'' ''You
    have what is yours'' preserves the possessive emphasis and the servant''s claim
    that he is merely returning the master''s property.'
