theological_decisions:
- issue: Meaning of τάλαντον in a parable often associated in English with natural
    abilities
  chosen_reading: Retain 'talent' in the main text as the historical monetary term
    used by the parable, while clarifying the monetary sense in a footnote.
  alternative_readings:
  - bag of gold
  - large sum of money
  rationale: The Greek refers to money, not innate giftedness. However, 'talent' is
    the established English rendering in this passage and remains accurate as a transliterated
    historical term if clarified. This preserves literary continuity without endorsing
    the later metaphorical sense.
  doctrine_reference: Translation philosophy §§1, 5, 6
