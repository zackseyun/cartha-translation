id: MAT.25.17
reference: Matthew 25:17
source:
  edition: SBLGNT
  text: ⸀ὡσαύτως ὁ τὰ δύο ⸀ἐκέρδησεν ἄλλα δύο·
translation:
  text: Likewise, the one with the two gained two more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "In the same way, the one who had received the two gained another two."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Adverb linking this servant's action to the previous servant's action
    in v.16. 'Likewise' is concise, natural, and preserves the comparative force.
- source_word: ὁ τὰ δύο
  chosen: the one with the two
  alternatives:
  - the one who had received the two
  - he who had the two
  lexicon: BDAG
  rationale: The article with the accusative phrase functions elliptically, referring
    to the servant characterized by the two talents mentioned in context. 'The one
    with the two' is natural English that preserves the ellipsis without overfilling
    the text.
- source_word: ἐκέρδησεν
  chosen: gained
  alternatives:
  - earned
  - made
  - won
  lexicon: BDAG
  rationale: Aorist of κερδαίνω here refers to gaining additional money through successful
    activity. 'Gained' is idiomatic and fits the financial context without implying
    wages as strongly as 'earned'.
- source_word: ἄλλα δύο
  chosen: two more
  alternatives:
  - another two
  - two others
  lexicon: BDAG
  rationale: ἄλλα with δύο indicates an additional two of the same kind. 'Two more'
    is the clearest contemporary English rendering.
