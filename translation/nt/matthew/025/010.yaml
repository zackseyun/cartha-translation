id: MAT.25.10
reference: Matthew 25:10
source:
  edition: SBLGNT
  text: ἀπερχομένων δὲ αὐτῶν ἀγοράσαι ἦλθεν ὁ νυμφίος, καὶ αἱ ἕτοιμοι εἰσῆλθον μετ’
    αὐτοῦ εἰς τοὺς γάμους, καὶ ἐκλείσθη ἡ θύρα.
translation:
  text: But while they were going away to buy, the bridegroom came, and those who
    were ready went in with him to the wedding feast, and the door was shut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the wedding banquet' or simply 'to the wedding.' The Greek plural
      can refer to the wedding celebration as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπερχομένων ... αὐτῶν
  chosen: while they were going away
  alternatives:
  - while they were leaving
  - as they were going away
  lexicon: BDAG
  rationale: 'The genitive absolute marks contemporaneous action: ''while they were
    going away.'' ''Going away'' preserves the force of ἀπέρχομαι more clearly than
    simply ''went,'' and avoids over-paraphrase.'
- source_word: ἀγοράσαι
  chosen: to buy
  alternatives:
  - to purchase
  lexicon: BDAG
  rationale: The aorist infinitive expresses purpose. 'To buy' is the natural modern
    English equivalent and fits the immediate context of purchasing oil from the previous
    verse without importing the object here.
- source_word: νυμφίος
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and more precise rendering for νυμφίος
    in wedding contexts. It preserves the parable''s imagery and its broader Matthean
    resonance.'
- source_word: αἱ ἕτοιμοι
  chosen: those who were ready
  alternatives:
  - the ready ones
  - the prepared ones
  lexicon: BDAG
  rationale: The feminine plural adjective functions substantivally, referring to
    the ready virgins. 'Those who were ready' is idiomatic English and preserves the
    sense without awkward literalism.
- source_word: εἰσῆλθον μετ’ αὐτοῦ
  chosen: went in with him
  alternatives:
  - entered with him
  lexicon: BDAG
  rationale: '''Went in with him'' is natural English and accurately reflects the
    aorist narrative movement. ''Entered'' is possible but slightly more formal.'
- source_word: εἰς τοὺς γάμους
  chosen: to the wedding feast
  alternatives:
  - to the wedding banquet
  - to the wedding
  lexicon: BDAG
  rationale: Although γάμοι is formally plural, in context it refers to the wedding
    celebration/banquet. 'Wedding feast' communicates the event clearly in modern
    English and avoids a misleadingly bare 'wedding' while remaining close to the
    sense.
- source_word: ἐκλείσθη ἡ θύρα
  chosen: the door was shut
  alternatives:
  - the door was closed
  lexicon: BDAG
  rationale: The passive aorist indicates the resulting action upon the door. 'Was
    shut' is concise, idiomatic, and carries the finality of the scene slightly better
    than 'was closed.'
