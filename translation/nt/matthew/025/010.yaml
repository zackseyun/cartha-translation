theological_decisions:
- issue: Rendering of wedding imagery in a parabolic context
  chosen_reading: Retain 'bridegroom' and 'wedding feast' as ordinary narrative imagery
    without making implicit christological interpretation explicit in the translation.
  alternative_readings:
  - Use 'groom' for contemporary style
  - Use 'wedding banquet' for greater specificity
  rationale: The verse is part of a parable whose theological significance should
    arise from the text and context, not from interpretive expansion in translation.
    The chosen wording preserves the imagery and solemn finality without importing
    doctrinal explanation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
