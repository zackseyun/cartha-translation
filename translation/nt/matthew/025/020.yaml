theological_decisions:
- issue: Rendering of κύριος in parabolic address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The term here refers to the servant's master within the parable, but
    the translation follows the project's default rendering for κύριος as 'Lord,'
    preserving lexical consistency and possible narrative-theological resonance without
    overstating a christological claim in this verse.
