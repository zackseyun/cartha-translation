id: MAT.25.20
reference: Matthew 25:20
source:
  edition: SBLGNT
  text: καὶ προσελθὼν ὁ τὰ πέντε τάλαντα λαβὼν προσήνεγκεν ἄλλα πέντε τάλαντα λέγων·
    Κύριε, πέντε τάλαντά μοι παρέδωκας· ἴδε ἄλλα πέντε τάλαντα ⸀ἐκέρδησα.
translation:
  text: And the one who had received the five talents came forward and brought another
    five talents, saying, ‘Lord, you delivered five talents to me; look, I have gained
    another five talents.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Master.” Greek: “Kyrios.”'
    reason: alternative_reading
  - marker: b
    text: A talent was a large unit of money.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  chosen: came forward
  alternatives:
  - came
  - approached
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, introducing the servant's approach
    to the master. 'Came forward' is natural English that preserves the sense of approaching
    in a presentation scene better than the flatter 'came.'
- source_word: ὁ τὰ πέντε τάλαντα λαβὼν
  chosen: the one who had received the five talents
  alternatives:
  - he who received the five talents
  - the man who received the five talents
  lexicon: BDAG
  rationale: The articular participial construction identifies the servant by prior
    receipt of the money. Pluperfect-like English ('had received') best reflects the
    antecedent action relative to the main verb. 'The one who' avoids adding 'man'
    where the Greek does not explicitly use ἄνθρωπος.
- source_word: τάλαντα
  chosen: talents
  alternatives:
  - money
  - bags of gold
  lexicon: BDAG
  rationale: τάλαντον denotes a large unit of money/weight. 'Talents' preserves the
    source term and the parable's traditional wording without over-paraphrasing; more
    interpretive renderings like 'bags of gold' narrow the semantic range. The monetary
    sense is clear from context.
- source_word: προσήνεγκεν
  chosen: brought
  alternatives:
  - presented
  - offered
  lexicon: BDAG
  rationale: Aorist of προσφέρω here refers to bringing the additional sum before
    the master. 'Brought' is straightforward and idiomatic; 'offered' could sound
    cultic, and 'presented' is possible but slightly more formal than needed.
- source_word: ἄλλα πέντε τάλαντα
  chosen: another five talents
  alternatives:
  - five more talents
  lexicon: BDAG
  rationale: ἄλλα with the numeral indicates an additional equal amount. 'Another
    five talents' is a direct rendering; 'five more talents' is also natural but slightly
    less formally parallel to the Greek repetition.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this parable it
    addresses the master, and 'Lord' preserves both the immediate social sense and
    the broader Matthean resonance.
- source_word: παρέδωκας
  chosen: you delivered
  alternatives:
  - you entrusted
  - you handed over
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over/deliver.' 'You delivered ... to
    me' stays close to the Greek while remaining clear in context. 'Entrusted' captures
    the implication but is more interpretive than the source wording itself.
- source_word: ἴδε
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: BDAG
  rationale: ἴδε is a deictic attention-getter. 'Look' is natural modern English;
    'behold' is too archaic for the stated philosophy, and 'see' is less vivid in
    direct speech.
- source_word: ἐκέρδησα
  chosen: I have gained
  alternatives:
  - I gained
  - I earned
  - I made
  lexicon: BDAG
  rationale: κερδαίνω means to gain or profit. English present perfect ('I have gained')
    fits the completed action with present result in the reporting scene. 'Earned'
    could imply wages rather than profitable increase; 'made' is idiomatic but less
    precise.
