theological_decisions:
- issue: Agency in 'blessed by my Father' versus a more literal 'blessed of my Father'
  chosen_reading: 'Render the genitive as source/agency: ''blessed by my Father.'''
  alternative_readings:
  - '''blessed of my Father'''
  rationale: The Greek genitive after the participle naturally identifies the one
    from whom the blessing comes. The chosen rendering is clearer in modern English
    and does not alter theology.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Meaning of βασιλεία in an eschatological inheritance context
  chosen_reading: Translate as 'kingdom.'
  alternative_readings:
  - '''reign'''
  rationale: While βασιλεία can denote kingship/reign, the collocation with 'inherit'
    and 'prepared for you' points to the inherited eschatological realm. 'Kingdom'
    best preserves that sense without foreclosing the broader notion of divine rule.
  doctrine_reference: Translation philosophy §1 and §5
- issue: Temporal phrase ἀπὸ καταβολῆς κόσμου
  chosen_reading: 'Attach the phrase to ''prepared for you'': ''the kingdom prepared
    for you from the foundation of the world.'''
  alternative_readings:
  - Understand the phrase more loosely as modifying the whole invitation
  rationale: The nearest and most natural syntactic connection is with ἡτοιμασμένην.
    This yields the straightforward sense that the kingdom was prepared from the world's
    foundation, without importing a broader doctrinal system beyond the verse.
  doctrine_reference: Affirmations + Translation philosophy §3 (preserve theological
    tension rather than resolve it)
