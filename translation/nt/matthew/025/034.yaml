id: MAT.25.34
reference: Matthew 25:34
source:
  edition: SBLGNT
  text: τότε ἐρεῖ ὁ βασιλεὺς τοῖς ἐκ δεξιῶν αὐτοῦ· Δεῦτε, οἱ εὐλογημένοι τοῦ πατρός
    μου, κληρονομήσατε τὴν ἡτοιμασμένην ὑμῖν βασιλείαν ἀπὸ καταβολῆς κόσμου.
translation:
  text: Then the King will say to those on his right, ‘Come, you who are blessed by
    my Father, inherit the kingdom prepared for you from the foundation of the world.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you blessed of my Father.'
    reason: lexical_alternative
  - marker: b
    text: Or 'since the foundation of the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the judgment scene; 'Then' is natural
    and sufficiently formal.
- source_word: ἐρεῖ
  chosen: will say
  alternatives:
  - will speak
  lexicon: BDAG
  rationale: Future of λέγω is most naturally rendered 'will say' in direct discourse
    introduction.
- source_word: ὁ βασιλεὺς
  chosen: the King
  alternatives:
  - the king
  lexicon: BDAG
  rationale: Definite title in context. Capitalized in English because it functions
    as a specific royal title for the eschatological judge in this discourse, not
    merely a generic monarch.
- source_word: τοῖς ἐκ δεξιῶν αὐτοῦ
  chosen: to those on his right
  alternatives:
  - to those at his right hand
  - to the ones on his right side
  lexicon: BDAG
  rationale: The idiom denotes the group positioned at the king's right side. 'Those
    on his right' is clear modern English while preserving the spatial and honorific
    sense.
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  - Come forward
  lexicon: BDAG
  rationale: Imperatival summons. 'Come' is the standard concise rendering and fits
    the solemn invitation.
- source_word: οἱ εὐλογημένοι
  chosen: you who are blessed
  alternatives:
  - you who are blessed ones
  - you who have been blessed
  - blessed ones
  lexicon: BDAG
  rationale: Perfect passive participle used substantivally. Rendering with 'you who
    are blessed' makes the address natural in English while preserving the passive
    sense of divine blessing.
- source_word: τοῦ πατρός μου
  chosen: by my Father
  alternatives:
  - of my Father
  - by my Father's favor
  lexicon: BDAG
  rationale: The genitive with εὐλογημένοι can be rendered literally as 'of my Father,'
    but in English 'blessed by my Father' more clearly conveys the source of the blessing
    without adding meaning.
- source_word: κληρονομήσατε
  chosen: inherit
  alternatives:
  - receive as your inheritance
  - take possession of as inheritance
  lexicon: BDAG
  rationale: Aorist imperative of κληρονομέω. 'Inherit' preserves the familial and
    covenantal nuance better than a generic 'receive'.
- source_word: τὴν ... βασιλείαν
  chosen: the kingdom
  alternatives:
  - the reign
  - the royal kingdom
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom; here the object of inheritance
    and preparation is best rendered 'kingdom,' preserving the eschatological domain
    sense.
- source_word: ἡτοιμασμένην ὑμῖν
  chosen: prepared for you
  alternatives:
  - made ready for you
  - having been prepared for you
  lexicon: BDAG
  rationale: Perfect passive participle indicating a completed preparation with ongoing
    relevance. 'Prepared for you' is idiomatic and accurate.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: from the foundation of the world
  alternatives:
  - since the foundation of the world
  lexicon: BDAG
  rationale: Established biblical idiom for the world's founding. 'From' matches ἀπό
    more directly than 'since' and preserves traditional clarity.
