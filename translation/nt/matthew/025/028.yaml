id: MAT.25.28
reference: Matthew 25:28
source:
  edition: SBLGNT
  text: ἄρατε οὖν ἀπ’ αὐτοῦ τὸ τάλαντον καὶ δότε τῷ ἔχοντι τὰ δέκα τάλαντα·
translation:
  text: Therefore take the talent from him and give it to the one who has the ten
    talents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take away.' The Greek imperative can be rendered either way.
    reason: lexical_alternative
  - marker: b
    text: A 'talent' was a large unit of weight and, by extension, money.
    reason: cultural_note
lexical_decisions:
- source_word: ἄρατε
  chosen: take
  alternatives:
  - remove
  - take away
  lexicon: BDAG
  rationale: Aorist active imperative plural of αἴρω, here a direct command to remove
    something from someone. 'Take' is natural English and preserves the imperative
    force; 'take away' is possible but slightly more expanded than the Greek requires.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference or conclusion from the preceding judgment. 'Therefore'
    best preserves the logical connection in clear modern English.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - away from him
  lexicon: BDAG
  rationale: The preposition ἀπό with the genitive indicates separation from the man
    just condemned in the parable. 'From him' is the most direct rendering.
- source_word: τὸ τάλαντον
  chosen: the talent
  alternatives:
  - the sum
  - the money
  lexicon: BDAG
  rationale: τάλαντον refers to a large unit of money/weight in the parable. 'Talent'
    preserves the historical term and intertextual familiarity of the passage. Although
    modern readers may think of natural ability, the immediate context of counted
    sums clarifies the monetary sense.
- source_word: δότε
  chosen: give
  alternatives:
  - hand over
  - give over
  lexicon: BDAG
  rationale: Aorist active imperative plural of δίδωμι. 'Give' is the standard and
    sufficiently forceful rendering.
- source_word: τῷ ἔχοντι
  chosen: to the one who has
  alternatives:
  - to him who has
  - to the man who has
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'The one who has'
    is idiomatic modern English and preserves the referential force without unnecessary
    repetition of 'man.'
- source_word: τὰ δέκα τάλαντα
  chosen: the ten talents
  alternatives:
  - ten talents
  lexicon: BDAG
  rationale: The article is present in Greek and points to the specific amount already
    mentioned in the narrative. 'The ten talents' reflects that specificity.
