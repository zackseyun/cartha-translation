theological_decisions:
- issue: Meaning of τάλαντον in a parabolic context
  chosen_reading: Rendered as the historical monetary term 'talent' rather than interpreting
    it as innate ability.
  alternative_readings:
  - money
  - sum of money
  rationale: The verse is within a parable about entrusted sums and accountability.
    Translating with the historical term avoids importing the later English idiom
    of 'talent' as natural giftedness while still preserving the traditional wording
    recognized in this passage. The context itself signals the monetary sense.
  doctrine_reference: Translation philosophy §1, §5
