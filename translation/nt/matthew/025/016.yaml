id: MAT.25.16
reference: Matthew 25:16
source:
  edition: SBLGNT
  text: ⸀πορευθεὶς ὁ τὰ πέντε τάλαντα λαβὼν ἠργάσατο ἐν αὐτοῖς καὶ ⸀ἐκέρδησεν ἄλλα
    ⸀πέντε·
translation:
  text: The one who had received the five talents went at once and traded with them,
    and gained another five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went away and worked with them'; the Greek describes active use of the
      money for profit.
    reason: lexical_alternative
  - marker: b
    text: A talent was a large unit of money, not a natural ability.
    reason: cultural_note
lexical_decisions:
- source_word: πορευθεὶς
  chosen: went at once
  alternatives:
  - went away
  - went off
  - having gone
  lexicon: BDAG
  rationale: The participle from πορεύομαι can be rendered formally as 'having gone'
    or idiomatically as 'went away.' In this narrative context, paired with the following
    action, English reads more naturally with a finite verb. 'At once' is supplied
    to reflect the participial sequencing and the servant's prompt action in context
    without overstating the Greek.
- source_word: ὁ τὰ πέντε τάλαντα λαβὼν
  chosen: the one who had received the five talents
  alternatives:
  - he who received the five talents
  - the man who received the five talents
  lexicon: BDAG
  rationale: This articular participial construction identifies the servant by what
    he received. 'The one who had received' is natural English and preserves the referential
    force without unnecessarily specifying 'man,' though the referent is masculine
    in Greek.
- source_word: τάλαντα
  chosen: talents
  alternatives:
  - talent-coins
  - large sums of money
  lexicon: BDAG
  rationale: τάλαντον denotes a large monetary unit here, not an innate ability. 'Talents'
    preserves the source term and the parable's traditional wording; the monetary
    sense can be clarified in broader notes if needed, but not by paraphrase in the
    verse itself.
- source_word: ἠργάσατο ἐν αὐτοῖς
  chosen: traded with them
  alternatives:
  - worked with them
  - put them to work
  - did business with them
  lexicon: BDAG
  rationale: ἐργάζομαι with ἐν + dative here conveys active use of the money for gain.
    'Worked with them' is too vague in English; 'did business with them' is possible,
    but 'traded with them' best fits the commercial setting and leads naturally into
    the profit statement.
- source_word: ἐκέρδησεν
  chosen: gained
  alternatives:
  - earned
  - made
  - won
  lexicon: BDAG
  rationale: κερδαίνω in this context means to gain or profit. 'Gained' is clear,
    idiomatic, and avoids colloquial overtones of 'made' while preserving the result-oriented
    sense.
- source_word: ἄλλα πέντε
  chosen: another five
  alternatives:
  - five more
  - five others
  lexicon: BDAG
  rationale: ἄλλα with a numeral is naturally rendered 'another five' or 'five more.'
    'Another five' is concise and idiomatic, preserving the additive sense.
