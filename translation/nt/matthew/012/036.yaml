id: MAT.12.36
reference: Matthew 12:36
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ὅτι πᾶν ῥῆμα ἀργὸν ὃ ⸀λαλήσουσιν οἱ ἄνθρωποι, ἀποδώσουσιν περὶ
    αὐτοῦ λόγον ἐν ἡμέρᾳ κρίσεως·
translation:
  text: But I tell you that for every careless word that people speak, they will give
    an account on the day of judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idle word.' The Greek adjective can mean 'idle,' 'unproductive,' or
      'careless.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will give an account for it'.
    reason: previous_rendering
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I tell you
  - Now I tell you
  lexicon: BDAG
  rationale: λέγω is present indicative with direct address; 'I tell you' is the natural
    English equivalent. δέ is mildly adversative or continuative; 'But' fits the warning
    contrast with the preceding context better than a simple 'and.'
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of Jesus' statement in standard English indirect
    discourse.
- source_word: πᾶν ῥῆμα
  chosen: every ... word
  alternatives:
  - every statement
  - every utterance
  lexicon: BDAG
  rationale: πᾶν with singular noun is distributive, 'every.' ῥῆμα here refers to
    a spoken word/utterance; 'word' is idiomatic and sufficiently precise.
- source_word: ἀργὸν
  chosen: careless
  alternatives:
  - idle
  - useless
  - empty
  lexicon: BDAG
  rationale: ἀργός literally means idle, inactive, unproductive. In this context of
    speech under judgment, 'careless' communicates morally irresponsible speech in
    clear modern English. 'Idle' is traditional but can sound archaic or suggest merely
    casual rather than culpable speech; 'useless' is too narrow.
- source_word: ὃ λαλήσουσιν οἱ ἄνθρωποι
  chosen: that people speak
  alternatives:
  - which men will speak
  - that human beings speak
  lexicon: BDAG
  rationale: λαλέω is 'speak/say,' and the future is naturally rendered in English
    within the relative clause. οἱ ἄνθρωποι is generic for humanity, not specifically
    male; 'people' best reflects the representative sense while remaining natural
    English.
- source_word: ἀποδώσουσιν
  chosen: they will give
  alternatives:
  - they will render
  - they will pay
  lexicon: BDAG
  rationale: With λόγον, ἀποδίδωμι forms the idiom 'give/render an account.' 'Give'
    is the most natural English collocation.
- source_word: περὶ αὐτοῦ λόγον
  chosen: an account for it
  alternatives:
  - account concerning it
  - answer for it
  lexicon: BDAG
  rationale: λόγον with ἀποδίδωμι is an accounting idiom. περὶ αὐτοῦ specifies the
    matter accounted for. 'Give an account for it' preserves both the idiom and the
    referent.
- source_word: ἐν ἡμέρᾳ κρίσεως
  chosen: on the day of judgment
  alternatives:
  - in the day of judgment
  - on judgment day
  lexicon: BDAG
  rationale: A temporal dative with ἐν is idiomatically rendered 'on.' κρίσις here
    is judicial judgment; 'the day of judgment' is both accurate and established without
    being archaic.
