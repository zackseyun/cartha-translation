id: MAT.12.31
reference: Matthew 12:31
source:
  edition: SBLGNT
  text: διὰ τοῦτο λέγω ὑμῖν, πᾶσα ἁμαρτία καὶ βλασφημία ἀφεθήσεται τοῖς ἀνθρώποις, ἡ δὲ τοῦ πνεύματος βλασφημία οὐκ ⸀ἀφεθήσεται.
translation:
  text: Therefore I tell you, every sin and blasphemy people will be forgiven for, but blasphemy against the Spirit will not be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blasphemy against the Holy Spirit.' The referent is the Holy Spirit from the surrounding context, though this verse itself reads simply 'the Spirit.'
    reason: alternative_reading
  - marker: b
    text: Or 'will be forgiven people'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Introduces an inference from the preceding context. 'Therefore' is natural modern English and preserves the logical connection.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common discourse formula. 'I tell you' is slightly more idiomatic in contemporary English while retaining the direct address and solemn force.
- source_word: πᾶσα
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: With singular nouns ('sin' and 'blasphemy'), 'every' best conveys distributive force in English.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard rendering for ἁμαρτία; no contextual reason to vary.
- source_word: βλασφημία
  chosen: blasphemy
  alternatives:
  - slander
  lexicon: BDAG
  rationale: In this context the term concerns irreverent or defiant speech against the divine, so 'blasphemy' is more precise than the broader 'slander'.
- source_word: ἀφεθήσεται
  chosen: will be forgiven
  alternatives:
  - will be pardoned
  - will be released
  lexicon: BDAG
  rationale: Future passive of ἀφίημι here clearly carries the sense of forgiveness. 'Will be forgiven' is the standard and clearest rendering.
- source_word: τοῖς ἀνθρώποις
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: The dative marks those to whom forgiveness is granted. 'People' communicates the generic human reference in natural English without implying only males; this fits the doctrine's gender-accurate principle because the Greek is generic, not specifically male.
- source_word: ἡ δὲ τοῦ πνεύματος βλασφημία
  chosen: but blasphemy against the Spirit
  alternatives:
  - but the blasphemy of the Spirit
  - but blasphemy against the Holy Spirit
  lexicon: BDAG
  rationale: The genitive τοῦ πνεύματος is most naturally understood here as the object of the blasphemy ('against the Spirit'), not as a possessive ('the Spirit's blasphemy'). The article marks contrast with the previous clause. 'Against the Spirit' is a direct rendering; 'Holy' is supplied explicitly in the parallel passages and immediate context, but since ἁγίου is absent here, the main text keeps the wording of this verse itself.
