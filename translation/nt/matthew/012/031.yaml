  category: awkward_english
  tier: 1
  from: will be forgiven people
  to: people will be forgiven for
  rationale: 'The current phrasing is a formal and literal rendering of the Greek passive verb with a dative of recipient (ἀφεθήσεται τοῖς ἀνθρώποις). While not incorrect, the construction ''will be forgiven people'' is somewhat stilted and unnatural in contemporary English. A more idiomatic rendering would be to restructure the clause, making ''people'' the subject: ''people will be forgiven for every sin and blasphemy''. This improves readability, though it does alter the grammatical parallelism with the second clause where ''blasphemy'' is the subject. The current draft''s choice preserves the Greek structure at the cost of some naturalness; the suggestion prioritizes naturalness.'
