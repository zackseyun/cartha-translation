theological_decisions:
- issue: Whether to render πνεύματος as 'Spirit' or 'Holy Spirit' in the main text
  chosen_reading: Spirit
  alternative_readings:
  - Holy Spirit
  rationale: The Greek text of this verse reads only τοῦ πνεύματος ('the Spirit'), without ἁγίου. Because the referent is clearly the Holy Spirit from the immediate context, 'Holy Spirit' is interpretively valid, but the translation philosophy prioritizes the source text's plain wording unless clarity requires expansion. The alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
