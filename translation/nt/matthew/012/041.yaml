id: MAT.12.41
reference: Matthew 12:41
source:
  edition: SBLGNT
  text: ἄνδρες Νινευῖται ἀναστήσονται ἐν τῇ κρίσει μετὰ τῆς γενεᾶς ταύτης καὶ κατακρινοῦσιν
    αὐτήν· ὅτι μετενόησαν εἰς τὸ κήρυγμα Ἰωνᾶ, καὶ ἰδοὺ πλεῖον Ἰωνᾶ ὧδε.
translation:
  text: The men of Nineveh will rise up in the judgment with this generation and will
    condemn it, because they changed their thinking at the preaching of Jonah, and behold, something
    greater than Jonah is here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "one greater than Jonah is here"; Greek has a neuter expression, literally
      "something greater than Jonah," which may emphasize the greater reality present
      in Jesus rather than only a comparison of persons.
    reason: alternative_reading
  - marker: b
    text: Or "in response to the proclamation of Jonah."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες Νινευῖται
  chosen: The men of Nineveh
  alternatives:
  - The Ninevite men
  - The people of Nineveh
  lexicon: BDAG
  rationale: ἄνδρες is explicitly masculine plural ('men'), and Νινευῖται identifies
    them as Ninevites. 'The men of Nineveh' is natural English and preserves the gender-accurate
    wording of the Greek better than the more generic 'people of Nineveh.'
- source_word: ἀναστήσονται
  chosen: will rise up
  alternatives:
  - will stand up
  - will arise
  lexicon: BDAG
  rationale: Future middle of ἀνίστημι here refers to rising in an eschatological/judicial
    setting. 'Will rise up' preserves the vividness and possible resurrection nuance
    without over-specifying beyond the text.
- source_word: ἐν τῇ κρίσει
  chosen: in the judgment
  alternatives:
  - at the judgment
  - in the condemnation
  lexicon: BDAG
  rationale: κρίσις here denotes the final judicial event. 'In the judgment' is a
    standard, clear rendering that preserves the eschatological sense.
- source_word: μετὰ τῆς γενεᾶς ταύτης
  chosen: with this generation
  alternatives:
  - along with this generation
  - against this generation
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with.' The adversative force is
    supplied by the following 'will condemn it,' so 'with this generation' is the
    most direct rendering.
- source_word: κατακρινοῦσιν αὐτήν
  chosen: will condemn it
  alternatives:
  - will pass judgment on it
  - will condemn this generation
  lexicon: BDAG
  rationale: κατακρίνω means 'condemn.' αὐτήν refers back to 'this generation' (γενεά,
    feminine singular). 'Will condemn it' is formally close; the antecedent remains
    clear in context.
- source_word: μετενόησαν
  chosen: they repented
  alternatives:
  - they changed their minds
  - they turned back
  lexicon: BDAG
  rationale: μετανοέω in this context denotes repentance in response to prophetic
    proclamation. 'Repented' is the established and accurate theological term.
- source_word: εἰς τὸ κήρυγμα Ἰωνᾶ
  chosen: at the preaching of Jonah
  alternatives:
  - at Jonah's proclamation
  - in response to the proclamation of Jonah
  lexicon: BDAG
  rationale: κήρυγμα is 'proclamation/preaching.' With εἰς after μετανοέω, the sense
    is response directed toward Jonah's message. 'At the preaching of Jonah' is idiomatic
    English and matches common NT usage without losing the causal-responsive sense.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing emphatic attention. 'Behold' preserves
    the solemn rhetorical force better than the more casual 'look' or 'see.'
- source_word: πλεῖον Ἰωνᾶ ὧδε
  chosen: something greater than Jonah is here
  alternatives:
  - one greater than Jonah is here
  - more than Jonah is here
  lexicon: BDAG
  rationale: πλεῖον is neuter singular comparative, literally 'something greater.'
    The neuter likely expresses greatness more abstractly or idiomatically rather
    than merely identifying a male person. 'Something greater than Jonah is here'
    preserves the Greek form while still clearly referring to the reality present
    in Jesus.
