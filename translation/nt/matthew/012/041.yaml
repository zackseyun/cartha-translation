theological_decisions:
- issue: How to render πλεῖον Ἰωνᾶ in relation to Jesus' self-reference
  chosen_reading: something greater than Jonah is here
  alternative_readings:
  - one greater than Jonah is here
  - more than Jonah is here
  rationale: The neuter comparative πλεῖον is best preserved rather than normalized
    to the masculine 'one greater,' since the Greek does not simply say 'a greater
    man than Jonah' but points to a greater reality present in Jesus and his ministry.
    This preserves theological force without over-explaining it.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gender rendering of ἄνδρες
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The Greek explicitly uses the masculine noun ἄνδρες, not a generic term
    for inhabitants. Per the gender-accurate principle, the translation keeps 'men'
    rather than neutralizing it to 'people.'
  doctrine_reference: Translation philosophy §4
