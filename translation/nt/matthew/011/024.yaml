id: MAT.11.24
reference: Matthew 11:24
source:
  edition: SBLGNT
  text: πλὴν λέγω ὑμῖν ὅτι γῇ Σοδόμων ἀνεκτότερον ἔσται ἐν ἡμέρᾳ κρίσεως ἢ σοί.
translation:
  text: But I tell you that it will be more tolerable for the land of Sodom on the
    day of judgment than for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more bearable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - nevertheless
  - except
  lexicon: BDAG
  rationale: Here πλὴν functions as a strong adversative/transition introducing Jesus'
    solemn contrast with the previous statement. 'But' is the most natural modern
    English equivalent in context.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common direct-speech formula in the Gospels. 'I tell you' is idiomatic
    modern English while preserving the force of the present indicative with dative
    addressee.
- source_word: γῇ Σοδόμων
  chosen: for the land of Sodom
  alternatives:
  - for Sodom's land
  - for the region of Sodom
  - for the land of the Sodomites
  lexicon: BDAG
  rationale: γῇ is dative singular of γῆ, 'land/region,' with Σοδόμων as a genitive
    plural form used with the place name. The phrase refers to the territory/land
    associated with Sodom rather than merely the city as an abstract name. 'For the
    land of Sodom' preserves the explicit γῇ better than simply 'for Sodom.'
- source_word: ἀνεκτότερον
  chosen: more tolerable
  alternatives:
  - more bearable
  lexicon: BDAG
  rationale: Comparative of ἀνεκτός, meaning 'bearable, tolerable.' 'More tolerable'
    is a standard and clear rendering in judgment contexts, though 'more bearable'
    is also possible.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί functioning as a simple future copula. 'It will
    be' is natural contemporary English.
- source_word: ἐν ἡμέρᾳ κρίσεως
  chosen: on the day of judgment
  alternatives:
  - in the day of judgment
  - on judgment day
  lexicon: BDAG
  rationale: The prepositional phrase denotes the time of eschatological judgment.
    'On the day of judgment' is both accurate and readable; 'judgment day' is slightly
    more idiomatic but less formally tied to the Greek construction.
- source_word: ἢ σοί
  chosen: than for you
  alternatives:
  - than for you people
  - than for you alone
  lexicon: BDAG
  rationale: The dative after the comparative is naturally rendered in English with
    'for.' Although σοί is singular, it addresses the city personified in context;
    'you' preserves the direct address without overexplaining in the main text.
