theological_decisions:
- issue: Referent of singular σοί
  chosen_reading: Retain singular 'you' as direct address to the city/personified
    locale in context rather than expanding to a plural audience.
  alternative_readings:
  - than for you people
  rationale: The Greek is singular and continues the prophetic address to the city
    from the surrounding context. Preserving the singular maintains the rhetorical
    force of Jesus' pronouncement without importing an interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not paraphrase.
