id: MAT.11.17
reference: Matthew 11:17
source:
  edition: SBLGNT
  text: ⸀λέγουσιν· Ηὐλήσαμεν ὑμῖν καὶ οὐκ ὠρχήσασθε· ⸀ἐθρηνήσαμεν καὶ οὐκ ἐκόψασθε·
translation:
  text: They say, ‘We played the flute for you, and you did not dance; we sang a lament,
    and you did not mourn.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'we piped for you.' The Greek verb refers specifically
      to playing a flute or pipe.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we lamented' or 'we sang a funeral song.'
    reason: lexical_alternative
  - marker: c
    text: More literally, 'you did not beat yourselves,' referring to customary gestures
      of mourning such as beating the breast.
    reason: cultural_note
lexical_decisions:
- source_word: λέγουσιν
  chosen: They say
  alternatives:
  - They are saying
  - They said
  lexicon: BDAG
  rationale: Present tense introduces the quoted children's complaint vividly within
    the illustrative scene. English simple present best captures the narrative-present
    force here.
- source_word: Ηὐλήσαμεν
  chosen: We played the flute
  alternatives:
  - We piped
  - We played music on the flute
  lexicon: BDAG
  rationale: The verb αὐλέω specifically refers to playing the flute/pipe, not merely
    making music. 'Played the flute' is clearer in modern English than the traditional
    'piped' while preserving the instrument-specific sense.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Either preposition can work idiomatically in English, but 'played the
    flute for you' better conveys performance directed toward others in this context.
- source_word: ὠρχήσασθε
  chosen: you did not dance
  alternatives:
  - you did not begin to dance
  lexicon: BDAG
  rationale: The middle form here is naturally rendered simply as 'dance' in English;
    no special reflexive nuance needs to be brought out.
- source_word: ἐθρηνήσαμεν
  chosen: we sang a lament
  alternatives:
  - we lamented
  - we wailed
  - we sang a funeral song
  lexicon: BDAG
  rationale: θρηνέω denotes lamentation, especially funeral-style lament. 'Sang a
    lament' preserves the performative parallel with 'played the flute' and fits the
    children's-game imagery better than the more generic 'lamented.'
- source_word: ἐκόψασθε
  chosen: you did not mourn
  alternatives:
  - you did not beat your breasts
  - you did not lament
  lexicon: BDAG
  rationale: In this context κόπτω in the middle refers to mourning behavior, often
    expressed by beating the breast in grief. 'Mourn' communicates the sense naturally
    in English, while the more literal gesture can be preserved in a footnote.
