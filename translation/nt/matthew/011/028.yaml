theological_decisions:
- issue: Nature of the promised rest in ἀναπαύσω
  chosen_reading: Render broadly as 'I will give you rest' without specifying whether
    the rest is spiritual, eschatological, emotional, or physical.
  alternative_readings:
  - I will refresh you
  - I will give rest to your souls
  rationale: The verse itself promises rest in a broad sense and does not narrowly
    define its mode here. A broad rendering preserves the theological richness and
    avoids importing a more specific doctrinal interpretation from the surrounding
    context into this single clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
