id: MAT.11.28
reference: Matthew 11:28
source:
  edition: SBLGNT
  text: Δεῦτε πρός με πάντες οἱ κοπιῶντες καὶ πεφορτισμένοι, κἀγὼ ἀναπαύσω ὑμᾶς.
translation:
  text: Come to me, all who labor and are burdened, and I will give you rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are heavy laden.' The Greek perfect passive participle conveys those
      who have been loaded down and remain in that condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will refresh you.' The verb can mean to cause someone to rest or to
      refresh them.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  - Come now
  lexicon: BDAG
  rationale: Idiomatic imperative of invitation. 'Come' is the most natural and direct
    English rendering in context.
- source_word: πρός με
  chosen: to me
  alternatives:
  - toward me
  lexicon: BDAG
  rationale: With motion verb Δεῦτε, πρός + accusative naturally expresses movement
    toward a person; 'to me' is idiomatic English.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of you
  - everyone
  lexicon: BDAG
  rationale: Retains the comprehensive scope of the invitation without adding emphasis
    beyond the Greek.
- source_word: οἱ κοπιῶντες
  chosen: who labor
  alternatives:
  - who are weary from toil
  - who are working hard
  lexicon: BDAG
  rationale: The participle denotes those who are laboring or toiling. 'Who labor'
    preserves the active sense and keeps the wording concise and dignified.
- source_word: πεφορτισμένοι
  chosen: are burdened
  alternatives:
  - are heavy laden
  - have been loaded down
  lexicon: BDAG
  rationale: Perfect passive participle indicates a present state resulting from having
    been loaded or weighed down. 'Are burdened' is clear modern English; 'heavy laden'
    is traditional but archaic.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: Preserves the explicit subject and mild contrast/emphasis in the Greek
    without overstating it.
- source_word: ἀναπαύσω
  chosen: will give you rest
  alternatives:
  - will rest you
  - will refresh you
  lexicon: BDAG
  rationale: Future active of ἀναπαύω can mean cause to rest, give rest, or refresh.
    'Will give you rest' is the most natural English expression here and preserves
    the promise of relief without narrowing it to mere emotional refreshment.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: Standard English object pronoun; the plural is already represented by
    'all' earlier in the clause.
