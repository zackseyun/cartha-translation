theological_decisions:
- issue: Whether εὐδοκία should be rendered in a way that implies divine decree/purpose
    or divine pleasure/approval
  chosen_reading: Rendered as 'well-pleasing' to express the Father's approval and
    delight
  alternative_readings:
  - good pleasure
  - good purpose
  rationale: The verse emphasizes that the Father's way of acting was pleasing in
    his sight. Rendering it as 'good purpose' risks importing a stronger decretal
    nuance than the immediate wording requires. The translation preserves the text's
    affirmation of divine pleasure without narrowing broader theological debates about
    providence or election.
  doctrine_reference: Preserve theological tension rather than resolve it.
