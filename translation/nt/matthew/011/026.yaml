id: MAT.11.26
reference: Matthew 11:26
source:
  edition: SBLGNT
  text: ναί, ὁ πατήρ, ὅτι οὕτως ⸂εὐδοκία ἐγένετο⸃ ἔμπροσθέν σου.
translation:
  text: Yes, Father, because this was well-pleasing before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for so it was your good pleasure' or 'for this was pleasing in your
      sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  - Certainly
  lexicon: BDAG
  rationale: Used as an affirmative response or assent. 'Yes' is the most natural
    and direct English equivalent in this prayer context.
- source_word: ὁ πατήρ
  chosen: Father
  alternatives:
  - O Father
  lexicon: BDAG
  rationale: Vocative-like nominative with article, a common Semitic/Koine address
    form. 'Father' is natural modern English; 'O Father' is possible but sounds more
    archaic than the context requires.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here it introduces the ground for the affirmation: Jesus agrees with
    the Father''s action because it was pleasing in his sight. ''Because'' makes the
    causal force clear in contemporary English.'
- source_word: οὕτως
  chosen: this
  alternatives:
  - so
  - thus
  - in this way
  lexicon: BDAG
  rationale: In context it points back to the manner of divine revelation/concealment
    just mentioned. English idiom prefers 'this was...' rather than the less natural
    'so was...' in this construction.
- source_word: εὐδοκία
  chosen: well-pleasing
  alternatives:
  - good pleasure
  - good purpose
  - pleasure
  lexicon: BDAG
  rationale: The noun denotes that which is pleasing or favorable. Combined with ἐγένετο
    and ἔμπροσθέν σου, the sense is that this came to be pleasing in the Father's
    sight. 'Well-pleasing' preserves the evaluative nuance without overinterpreting
    as decree or purpose.
- source_word: ἐγένετο
  chosen: was
  alternatives:
  - came to be
  - happened
  - became
  lexicon: BDAG
  rationale: 'Although γίνομαι often means ''become'' or ''come to be,'' in this idiom
    a simple English copula is most natural: ''this was well-pleasing before you.''
    This avoids awkwardness while preserving the sense.'
- source_word: ἔμπροσθέν σου
  chosen: before you
  alternatives:
  - in your sight
  - before your face
  lexicon: BDAG
  rationale: Literally 'before you,' meaning 'in your presence' or 'in your sight.'
    'Before you' is sufficiently transparent and retains the relational orientation
    of the Greek.
