theological_decisions:
- issue: Rendering χρηστός in Jesus's description of his yoke
  chosen_reading: kind
  alternative_readings:
  - easy
  - good
  - pleasant
  rationale: The verse does not teach that discipleship is effortless; elsewhere Jesus
    speaks of cost and suffering. Rendering χρηστός as 'kind' preserves the benevolent
    character of Jesus's yoke without importing the idea of trivial difficulty. Because
    'easy' is a longstanding and plausible translation, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
