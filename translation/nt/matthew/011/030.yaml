id: MAT.11.30
reference: Matthew 11:30
source:
  edition: SBLGNT
  text: ὁ γὰρ ζυγός μου χρηστὸς καὶ τὸ φορτίον μου ἐλαφρόν ἐστιν.
translation:
  text: For my yoke is kind, and my burden is light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'easy.' The Greek adjective can mean 'kind,' 'good,' or 'pleasant'; 'easy'
      is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this verse to the preceding
    invitation. 'For' is natural English and preserves the logical link.
- source_word: ζυγός
  chosen: yoke
  alternatives:
  - frame for draft animals
  - burden
  lexicon: BDAG
  rationale: The literal image of a yoke should be preserved because it is central
    to Jesus's metaphor of discipleship and contrasts with oppressive burdens. 'Burden'
    here would blur the distinction from φορτίον later in the verse.
- source_word: μου
  chosen: my
  rationale: Simple possessive pronoun; important to preserve the personal contrast
    between Jesus's yoke and other yokes.
- source_word: χρηστός
  chosen: kind
  alternatives:
  - good
  - pleasant
  - easy
  lexicon: BDAG
  rationale: χρηστός commonly denotes kindness, goodness, or benevolence. 'Easy' is
    traditional in this verse, but can suggest absence of cost or effort more strongly
    than the Greek warrants. 'Kind' preserves the sense that Jesus's yoke is benevolent
    and fitting rather than harsh, while remaining readable modern English.
- source_word: φορτίον
  chosen: burden
  alternatives:
  - load
  lexicon: BDAG
  rationale: A natural rendering for the thing carried. 'Burden' is idiomatic in English
    and pairs well with 'yoke' while preserving the metaphorical sense.
- source_word: ἐλαφρόν
  chosen: light
  alternatives:
  - easy
  - not heavy
  lexicon: BDAG
  rationale: The adjective directly means 'light' in contrast to heavy. This preserves
    the metaphor without over-interpreting it as effortless.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Standard copula; required for clear English predication.
