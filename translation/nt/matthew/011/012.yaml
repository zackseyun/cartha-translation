id: MAT.11.12
reference: Matthew 11:12
source:
  edition: SBLGNT
  text: ἀπὸ δὲ τῶν ἡμερῶν Ἰωάννου τοῦ βαπτιστοῦ ἕως ἄρτι ἡ βασιλεία τῶν οὐρανῶν βιάζεται,
    καὶ βιασταὶ ἁρπάζουσιν αὐτήν.
translation:
  text: But from the days of John the Baptist until now, the kingdom of heaven suffers
    violence, and violent men seize it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the kingdom of heaven is forcefully advancing, and forceful men lay
      hold of it.' The Greek verb translated 'suffers violence' can also be understood
      in a middle sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ δὲ
  chosen: But from
  alternatives:
  - And from
  - Now from
  lexicon: BDAG
  rationale: ἀπό marks the starting point ('from'), while δέ is a mild connective/adversative.
    'But from' preserves the discourse shift without overstating contrast.
- source_word: τῶν ἡμερῶν Ἰωάννου τοῦ βαπτιστοῦ
  chosen: the days of John the Baptist
  alternatives:
  - the time of John the Baptist
  lexicon: BDAG
  rationale: A natural but still fairly formal rendering of the genitive construction;
    'days' preserves the Greek idiom better than the more interpretive 'time.'
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - until the present time
  - until this moment
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the temporal phrase, preserving the sense
    of continuity from John's days to the speaker's present.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is the
    established and accurate singular English idiom for the reign/kingdom associated
    with heaven; 'of the heavens' would be overly wooden in English.
- source_word: βιάζεται
  chosen: suffers violence
  alternatives:
  - is forcefully advancing
  - is treated violently
  lexicon: BDAG
  rationale: The verb βιάζω in the middle/passive here is famously ambiguous between
    passive ('suffers violence') and intransitive/middle ('advances forcefully').
    To preserve theological tension rather than resolve it, the main text adopts the
    passive reading, which fits naturally with the following reference to 'violent
    men,' while the alternative is preserved in a footnote.
- source_word: βιασταὶ
  chosen: violent men
  alternatives:
  - forceful men
  - violent people
  lexicon: BDAG
  rationale: The noun denotes forceful/violent persons. Because the Greek form is
    grammatically masculine plural, 'men' best matches the source under the project's
    gender-accurate policy; 'people' would smooth over that feature.
- source_word: ἁρπάζουσιν αὐτήν
  chosen: seize it
  alternatives:
  - snatch it
  - take it by force
  lexicon: BDAG
  rationale: ἁρπάζω conveys forceful taking or snatching. 'Seize it' is concise, natural
    English and retains the violent nuance without over-paraphrasing.
