theological_decisions:
- issue: Interpretation of βιάζεται in relation to the kingdom
  chosen_reading: 'Passive sense in the main text: ''the kingdom of heaven suffers
    violence'''
  alternative_readings:
  - 'Middle/intransitive sense: ''the kingdom of heaven is forcefully advancing'''
  rationale: This verse is genuinely ambiguous and has long been contested. The passive
    reading coheres well with the immediately following 'violent men seize it,' but
    the alternative has substantial lexical and interpretive support. In keeping with
    the translation philosophy, the main text chooses one defensible reading while
    preserving the other in a footnote rather than collapsing the ambiguity.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
