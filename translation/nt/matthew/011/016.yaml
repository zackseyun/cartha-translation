id: MAT.11.16
reference: Matthew 11:16
source:
  edition: SBLGNT
  text: Τίνι δὲ ὁμοιώσω τὴν γενεὰν ταύτην; ὁμοία ἐστὶν παιδίοις ⸂καθημένοις ἐν ταῖς
    ἀγοραῖς ἃ προσφωνοῦντα τοῖς ἑτέροις⸃
translation:
  text: But what shall I compare this generation to? It is like children sitting in
    the marketplaces, calling out to the others,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the market squares.' The Greek ἀγοραῖς refers to public market areas
      where people gathered.
    reason: lexical_alternative
  - marker: b
    text: Or 'calling to the other children.' The Greek says 'to the others,' with
      the identity supplied by the context of the simile.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνι
  chosen: what ... to
  alternatives:
  - to what
  - with what
  lexicon: BDAG
  rationale: Dative interrogative τίς after ὁμοιώσω asks for the standard of comparison.
    English idiom is best expressed as 'what ... to' rather than a more wooden 'to
    what.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or contrast. 'But' fits the rhetorical turn
    here without overstating the contrast.
- source_word: ὁμοιώσω
  chosen: shall I compare
  alternatives:
  - will I liken
  - should I compare
  lexicon: BDAG
  rationale: Future active indicative used rhetorically. 'Shall I compare' is natural
    English and preserves the deliberative force.
- source_word: γενεὰν ταύτην
  chosen: this generation
  alternatives:
  - this age-group
  - these people of this generation
  lexicon: BDAG
  rationale: γενεά commonly refers to the contemporaneous generation or people characterized
    together. 'This generation' is the established and accurate rendering in Jesus'
    sayings.
- source_word: ὁμοία ἐστὶν
  chosen: It is like
  alternatives:
  - It is comparable to
  - It resembles
  lexicon: BDAG
  rationale: Simple predicate of likeness. 'It is like' is clear, direct, and idiomatic.
- source_word: παιδίοις
  chosen: children
  alternatives:
  - little children
  - young children
  lexicon: BDAG
  rationale: Dative plural of παιδίον refers to children in a general sense. 'Children'
    is sufficient without adding diminutive nuance not required by the context.
- source_word: καθημένοις
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present middle/passive participle describing the children’s posture/location.
    'Sitting' is natural and keeps the ongoing scene.
- source_word: ἐν ταῖς ἀγοραῖς
  chosen: in the marketplaces
  alternatives:
  - in the market squares
  - in the markets
  lexicon: BDAG
  rationale: ἀγορά refers to a public market area or square. 'Marketplaces' is understandable
    modern English while preserving the public setting.
- source_word: ἃ
  chosen: who
  alternatives:
  - which
  lexicon: BDAG
  rationale: Although neuter plural in form agreeing with παιδίοις, English naturally
    uses a personal relative for children. 'Who' reflects the referent rather than
    the grammatical gender.
- source_word: προσφωνοῦντα
  chosen: calling out
  alternatives:
  - calling
  - addressing
  lexicon: BDAG
  rationale: The participle conveys vocal address. 'Calling out' captures the public,
    audible sense appropriate to children in a marketplace.
- source_word: τοῖς ἑτέροις
  chosen: to the others
  alternatives:
  - to the other children
  - to the rest
  lexicon: BDAG
  rationale: ἕτεροι means 'others' or 'the other group.' 'To the others' preserves
    the Greek without over-specifying 'children,' though that is implied by context.
