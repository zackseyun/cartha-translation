theological_decisions:
- issue: Rendering of accusation involving δαιμόνιον
  chosen_reading: He has a demon
  alternative_readings:
  - He is demon-possessed
  rationale: The text reports an accusation against John, not a narrator affirmation.
    A more literal rendering preserves the wording and avoids adding interpretive
    weight beyond the Greek idiom, while still being understandable in modern English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
