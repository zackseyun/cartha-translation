id: MAT.11.18
reference: Matthew 11:18
source:
  edition: SBLGNT
  text: ἦλθεν γὰρ Ἰωάννης μήτε ἐσθίων μήτε πίνων, καὶ λέγουσιν· Δαιμόνιον ἔχει·
translation:
  text: For John came neither eating nor drinking, and they say, ‘He has a demon.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He is demon-possessed.' The Greek is literally, 'He has a demon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - has come
  - appeared
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι here refers to John's arrival/appearance on the scene.
    'Came' is idiomatic and concise in English; 'appeared' is possible but less directly
    tied to the verb's normal sense.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ links this verse as an explanation of the preceding statement. 'For'
    preserves the explanatory force with good readability.
- source_word: Ἰωάννης
  chosen: John
  rationale: Standard transliteration of the personal name Ἰωάννης, referring here
    to John the Baptist by context.
- source_word: μήτε ἐσθίων μήτε πίνων
  chosen: neither eating nor drinking
  alternatives:
  - eating neither bread nor drinking wine
  - neither eating nor drinking in the ordinary way
  lexicon: BDAG
  rationale: The paired participles with μήτε...μήτε describe John's ascetic manner.
    The Greek does not explicitly mention bread or wine in this verse (contrast Luke
    7:33), so the translation should not import those specifics. 'Neither eating nor
    drinking' preserves the compressed Greek expression.
- source_word: καὶ λέγουσιν
  chosen: and they say
  alternatives:
  - and people say
  - and they are saying
  lexicon: BDAG
  rationale: 'Present tense λέγουσιν gives a vivid, generalizing present: ''they say.''
    The subject is indefinite/opponents in general, so retaining ''they'' matches
    the Greek without over-specifying.'
- source_word: Δαιμόνιον ἔχει
  chosen: He has a demon
  alternatives:
  - He is demon-possessed
  - He has a demon in him
  lexicon: BDAG
  rationale: The Greek expression is literally 'has a demon.' This is both natural
    English and closer to the source than the more interpretive 'is demon-possessed.'
    'Demon' is preferable to older 'devil,' since δαιμόνιον is not διάβολος.
