theological_decisions:
- issue: Description of Jesus' character in πραΰς ... καὶ ταπεινὸς τῇ καρδίᾳ
  chosen_reading: I am gentle and humble in heart
  alternative_readings:
  - I am meek and lowly in heart
  rationale: The translation preserves the personal self-description of Jesus without
    weakening its theological significance. 'Gentle' and 'humble' communicate the
    same core meaning in accessible modern English while avoiding archaic connotations.
    No doctrinal tension is resolved beyond the lexical choice.
  doctrine_reference: Translation philosophy §§5–6
