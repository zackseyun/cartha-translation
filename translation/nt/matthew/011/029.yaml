id: MAT.11.29
reference: Matthew 11:29
source:
  edition: SBLGNT
  text: ἄρατε τὸν ζυγόν μου ἐφ’ ὑμᾶς καὶ μάθετε ἀπ’ ἐμοῦ, ὅτι πραΰς εἰμι καὶ ταπεινὸς
    τῇ καρδίᾳ, καὶ εὑρήσετε ἀνάπαυσιν ταῖς ψυχαῖς ὑμῶν·
translation:
  text: Take my yoke upon you and learn from me, because I am gentle and humble in
    heart, and you will find rest for your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meek and lowly in heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρατε
  chosen: Take
  alternatives:
  - Lift
  - Carry
  lexicon: BDAG
  rationale: Aorist imperative plural of αἴρω. In the idiom with 'yoke,' 'take ...
    upon you' is natural English and preserves the force of accepting or assuming
    the yoke, rather than merely lifting it.
- source_word: ζυγόν
  chosen: yoke
  lexicon: BDAG
  rationale: Literal 'yoke' is retained because the metaphor is central and well established
    in biblical usage for submission to teaching or authority; paraphrasing would
    flatten the image.
- source_word: ἐφ’ ὑμᾶς
  chosen: upon you
  alternatives:
  - on you
  lexicon: BDAG
  rationale: With 'take my yoke,' ἐπί + accusative is best rendered 'upon you,' preserving
    the concrete metaphor and matching idiomatic English.
- source_word: μάθετε ἀπ’ ἐμοῦ
  chosen: learn from me
  alternatives:
  - learn of me
  lexicon: BDAG
  rationale: Direct and natural rendering of the imperative plus ἀπό. 'Learn from
    me' communicates both instruction and discipleship without archaic phrasing.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason Jesus is a fitting teacher. 'Because' is clearer
    in modern English than 'for' and better captures the explanatory force here.
- source_word: πραΰς
  chosen: gentle
  alternatives:
  - meek
  lexicon: BDAG
  rationale: '''Gentle'' communicates the positive sense of mildness and non-harshness
    in contemporary English. ''Meek'' is traditional but can suggest weakness to modern
    readers.'
- source_word: ταπεινὸς τῇ καρδίᾳ
  chosen: humble in heart
  alternatives:
  - lowly in heart
  - humble of heart
  lexicon: BDAG
  rationale: This preserves both the adjective ταπεινός and the dative phrase τῇ καρδίᾳ
    as an inward disposition. 'Humble in heart' is idiomatic and clear.
- source_word: εὑρήσετε
  chosen: you will find
  lexicon: BDAG
  rationale: 'Future indicative is straightforwardly rendered as a promise: ''you
    will find.'''
- source_word: ἀνάπαυσιν
  chosen: rest
  alternatives:
  - refreshment
  - relief
  lexicon: BDAG
  rationale: '''Rest'' is the most direct and biblically resonant rendering, especially
    in light of the surrounding context and the echo of scriptural rest language.'
- source_word: ταῖς ψυχαῖς ὑμῶν
  chosen: for your souls
  alternatives:
  - to your souls
  lexicon: BDAG
  rationale: The dative is rendered idiomatically in English as 'for your souls.'
    'Souls' is retained rather than reduced to 'selves' because ψυχή here carries
    the sense of the inner life/person, and the traditional biblical expression remains
    clear in English.
