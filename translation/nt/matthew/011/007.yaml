theological_decisions:
- issue: Referent of Τούτων ('these') in the genitive absolute
  chosen_reading: Explicitly rendered as 'these men' to refer to John's disciples
    from the immediate context
  alternative_readings:
  - Rendered simply as 'they' or 'these' without explicit identification
  rationale: This is a contextual clarification rather than a doctrinal expansion.
    It aids readability and avoids ambiguity in English while remaining faithful to
    the narrative flow.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
