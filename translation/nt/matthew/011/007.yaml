id: MAT.11.7
reference: Matthew 11:7
source:
  edition: SBLGNT
  text: Τούτων δὲ πορευομένων ἤρξατο ὁ Ἰησοῦς λέγειν τοῖς ὄχλοις περὶ Ἰωάννου· Τί
    ἐξήλθατε εἰς τὴν ἔρημον θεάσασθαι; κάλαμον ὑπὸ ἀνέμου σαλευόμενον;
translation:
  text: 'As these men were going away, Jesus began to speak to the crowds about John:
    “What did you go out into the wilderness to look at? A reed being shaken by the
    wind?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What did you go out into the wilderness to see?”
    reason: lexical_alternative
  - marker: b
    text: The image of a reed shaken by the wind suggests instability or vacillation;
      Jesus' question expects a negative answer about John.
    reason: cultural_note
lexical_decisions:
- source_word: Τούτων δὲ πορευομένων
  chosen: As these men were going away
  alternatives:
  - While they were going away
  - As they departed
  lexicon: BDAG
  rationale: Genitive absolute marking contemporaneous action. 'These' refers to John's
    disciples from the prior context; 'men' makes the referent explicit in natural
    English without adding new content. 'As ... were going away' preserves the ongoing
    aspect of the participle.
- source_word: ἤρξατο ... λέγειν
  chosen: began to speak
  alternatives:
  - began to say
  - started speaking
  lexicon: BDAG
  rationale: The construction ἄρχομαι + infinitive means 'began to.' 'Speak' fits
    the discourse setting to the crowds better than the more wooden 'say,' while remaining
    close to the Greek.
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: Plural dative is best represented by 'the crowds.' 'Multitudes' is traditional
    but less natural in modern English.
- source_word: περὶ Ἰωάννου
  chosen: about John
  alternatives:
  - concerning John
  lexicon: BDAG
  rationale: περί with genitive here indicates topic/reference. 'About John' is the
    most natural modern rendering.
- source_word: Τί ἐξήλθατε εἰς τὴν ἔρημον θεάσασθαι;
  chosen: What did you go out into the wilderness to look at?
  alternatives:
  - What did you go out into the wilderness to see?
  - Why did you go out into the wilderness to look at?
  lexicon: BDAG
  rationale: τί here asks 'what?' rather than 'why?'. θεάομαι can mean 'see, behold,
    look at'; 'look at' preserves the sense of going out to observe a spectacle, while
    remaining idiomatic. ἔρημος is 'wilderness' in this Judean setting.
- source_word: κάλαμον
  chosen: a reed
  alternatives:
  - a stalk of reed
  lexicon: BDAG
  rationale: Standard lexical sense is 'reed.' The singular is retained for the rhetorical
    image.
- source_word: ὑπὸ ἀνέμου σαλευόμενον
  chosen: being shaken by the wind
  alternatives:
  - swayed by the wind
  - moved by the wind
  lexicon: BDAG
  rationale: Passive participle modifying 'reed.' 'Being shaken' closely reflects
    σαλευόμενον and preserves the rhetorical force of instability.
