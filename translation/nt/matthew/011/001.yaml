id: MAT.11.1
reference: Matthew 11:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὅτε ἐτέλεσεν ὁ Ἰησοῦς διατάσσων τοῖς δώδεκα μαθηταῖς αὐτοῦ, μετέβη
    ἐκεῖθεν τοῦ διδάσκειν καὶ κηρύσσειν ἐν ταῖς πόλεσιν αὐτῶν.
translation:
  text: And when Jesus had finished instructing his twelve disciples, he went on from
    there to teach and preach in their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commanding' his twelve disciples.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'their cities' is ambiguous in Greek; it may refer to the disciples'
      cities or more generally to the towns of the surrounding people.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: BDAG
  rationale: This Matthean narrative formula is semitic and often functions as a transition
    marker more than as a full event assertion. Rendering it as 'And when' preserves
    the connective force and temporal setup without awkward English. A more formal
    'And it happened when' is possible but less natural in modern English.
- source_word: ἐτέλεσεν
  chosen: had finished
  alternatives:
  - finished
  - completed
  lexicon: BDAG
  rationale: The aorist in context marks completion prior to the next main action
    ('he went on'). English past perfect best conveys that sequence idiomatically.
- source_word: διατάσσων
  chosen: instructing
  alternatives:
  - commanding
  - giving orders to
  - directing
  lexicon: BDAG
  rationale: The participle denotes giving instructions/commands to the twelve. 'Instructing'
    fits the broader discourse context of Jesus' commissioning speech and avoids sounding
    overly militaristic, while still preserving authoritative direction. 'Commanding'
    is lexically possible and worth preserving as an alternative.
- source_word: τοῖς δώδεκα μαθηταῖς αὐτοῦ
  chosen: his twelve disciples
  alternatives:
  - his twelve students
  - the twelve disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the phrase. 'Disciples' is the established
    and accurate gloss for μαθηταί in Gospel context; 'twelve' is retained explicitly
    from the Greek.
- source_word: μετέβη
  chosen: he went on
  alternatives:
  - he departed
  - he moved on
  - he went away
  lexicon: BDAG
  rationale: The verb indicates moving from one place to another. 'He went on' captures
    the narrative progression and pairs naturally with 'from there.'
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  - from thereon
  lexicon: BDAG
  rationale: Straightforward adverb of place indicating departure from the previous
    location.
- source_word: τοῦ διδάσκειν καὶ κηρύσσειν
  chosen: to teach and preach
  alternatives:
  - for teaching and preaching
  - to be teaching and proclaiming
  lexicon: BDAG
  rationale: The articular infinitive here expresses purpose. 'To teach and preach'
    is concise, idiomatic, and preserves the distinction between διδάσκειν and κηρύσσειν.
- source_word: κηρύσσειν
  chosen: preach
  alternatives:
  - proclaim
  - announce
  lexicon: BDAG
  rationale: In Gospel proclamation contexts, 'preach' is the most natural English
    equivalent, though 'proclaim' is a viable alternative. The pair 'teach and preach'
    is also a familiar Matthean collocation.
- source_word: ἐν ταῖς πόλεσιν αὐτῶν
  chosen: in their cities
  alternatives:
  - in the cities of them
  - in their towns
  lexicon: BDAG
  rationale: πόλις can mean 'city' or 'town' depending on scale; 'cities' is the more
    direct gloss. The pronoun αὐτῶν is somewhat ambiguous in reference, likely referring
    to the disciples/the people associated with the region. The Greek leaves the referent
    implicit, so the translation preserves the literal 'their cities' rather than
    resolving it interpretively.
