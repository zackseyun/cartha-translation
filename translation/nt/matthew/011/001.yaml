theological_decisions:
- issue: Referent of αὐτῶν in 'ἐν ταῖς πόλεσιν αὐτῶν'
  chosen_reading: Retain the ambiguous 'their cities' without specifying whose cities
    are meant.
  alternative_readings:
  - the disciples' cities
  - the Jews' cities
  - the towns in that region
  rationale: The Greek pronoun does not explicitly identify the antecedent, and the
    verse does not require a theological or interpretive resolution. Preserving the
    ambiguity follows the stated principle of not resolving tensions the text itself
    leaves open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
