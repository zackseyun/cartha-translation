id: MAT.11.25
reference: Matthew 11:25
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῳ τῷ καιρῷ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν· Ἐξομολογοῦμαί σοι, πάτερ κύριε
    τοῦ οὐρανοῦ καὶ τῆς γῆς, ὅτι ⸀ἔκρυψας ταῦτα ἀπὸ σοφῶν καὶ συνετῶν, καὶ ἀπεκάλυψας
    αὐτὰ νηπίοις·
translation:
  text: At that time Jesus answered and said, “I praise you, Father, Lord of heaven
    and earth, because you hid these things from the wise and understanding, and revealed
    them to little children.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I thank you.' The Greek verb can express thanksgiving as well as praise
      or open acknowledgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'infants.' Here 'little children' likely carries a metaphorical sense
      for those who are humble or childlike in receptivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  chosen: At that time
  alternatives:
  - In that time
  - At that moment
  lexicon: BDAG
  rationale: Idiomatic temporal expression; 'At that time' is natural English and
    preserves the narrative setting without over-specifying immediacy.
- source_word: ἀποκριθεὶς ... εἶπεν
  chosen: answered and said
  alternatives:
  - said
  - responded
  lexicon: BDAG
  rationale: This is a common Semitic-influenced Greek narrative formula. Retaining
    both verbs preserves the source texture; although no explicit prior question appears,
    'answered and said' is established idiomatic usage in this context.
- source_word: Ἐξομολογοῦμαί σοι
  chosen: I praise you
  alternatives:
  - I thank you
  - I confess to you
  lexicon: BDAG
  rationale: In this context of direct address to the Father, the verb carries the
    sense of open acknowledgment with praise/thanksgiving. 'I praise you' best fits
    the doxological tone while avoiding the misleading English sense of confessing
    sin. 'I thank you' is possible and traditional, but the immediate emphasis is
    broader praise for God's revelatory purpose.
- source_word: πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς
  chosen: Father, Lord of heaven and earth
  alternatives:
  - Father, Master of heaven and earth
  lexicon: BDAG
  rationale: Vocative chain preserved directly. 'Lord' follows the doctrinal default
    for κύριος and maintains both sovereignty and biblical resonance.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content-ground for Jesus' praise. 'Because' makes the
    causal force clear in English.
- source_word: ἔκρυψας
  chosen: you hid
  alternatives:
  - you concealed
  lexicon: BDAG
  rationale: Simple past active verb; 'hid' is the most direct and natural rendering.
- source_word: ταῦτα ... αὐτά
  chosen: these things ... them
  alternatives:
  - these things ... these
  lexicon: BDAG
  rationale: The demonstrative points to truths or realities in context; 'these things'
    preserves the referential openness of the Greek.
- source_word: ἀπὸ σοφῶν καὶ συνετῶν
  chosen: from the wise and understanding
  alternatives:
  - from the wise and intelligent
  - from wise and discerning people
  lexicon: BDAG
  rationale: 'Keeps the adjectival substantives and the paired nuance: σοφῶν suggests
    the wise, συνετῶν those possessing understanding/discernment. ''Understanding''
    is concise and natural.'
- source_word: ἀπεκάλυψας
  chosen: revealed
  alternatives:
  - disclosed
  - made known
  lexicon: BDAG
  rationale: Standard rendering for ἀποκαλύπτω, preserving the theological sense of
    divine disclosure.
- source_word: νηπίοις
  chosen: little children
  alternatives:
  - infants
  - babes
  lexicon: BDAG
  rationale: Literally the term can denote infants, but here it functions metaphorically
    for the lowly, unpretentious, or childlike recipients of revelation. 'Little children'
    preserves the image without sounding archaic or overly literal in a potentially
    misleading way.
