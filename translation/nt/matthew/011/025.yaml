theological_decisions:
- issue: Divine agency in hiding and revealing
  chosen_reading: 'Retain the direct attribution to the Father: ''you hid ... and
    revealed'''
  alternative_readings:
  - Soften to permissive language such as 'you allowed these things to remain hidden'
  rationale: The Greek uses straightforward active verbs with God as subject. To preserve
    theological tension rather than resolve it, the translation keeps the direct divine
    agency without importing a broader doctrinal explanation of predestination or
    judicial hardening.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of νηπίοις
  chosen_reading: Metaphorical sense expressed as 'little children'
  alternative_readings:
  - Strictly literal 'infants'
  - Interpretive paraphrase 'the humble'
  rationale: The context contrasts socially/intellectually 'wise and understanding'
    persons with those characterized by childlike receptivity. 'Little children' preserves
    the metaphor without collapsing it into an abstract theological category.
  doctrine_reference: Optimal equivalence; never paraphrase beyond what the source
    warrants.
