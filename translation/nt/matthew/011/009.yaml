id: MAT.11.9
reference: Matthew 11:9
source:
  edition: SBLGNT
  text: ἀλλὰ τί ἐξήλθατε⸂; προφήτην ἰδεῖν⸃; ναί, λέγω ὑμῖν, καὶ περισσότερον προφήτου.
translation:
  text: But what did you go out to see? A prophet? Yes, I tell you, and more than
    a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one greater than a prophet.' The Greek more literally reads 'more than
      a prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - No, but
  lexicon: BDAG
  rationale: Marks contrast with the preceding rhetorical question sequence; 'But'
    is natural and sufficiently formal in English.
- source_word: τί ἐξήλθατε
  chosen: what did you go out
  alternatives:
  - why did you go out
  - what did you go out for
  lexicon: BDAG
  rationale: τί is accusative 'what,' not adverbial 'why.' The construction asks what
    object/purpose they went out to encounter, best represented by 'what did you go
    out...'.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to look at
  - to behold
  lexicon: BDAG
  rationale: Infinitive of purpose after ἐξήλθατε; 'to see' is the standard, clear
    rendering in modern English.
- source_word: προφήτην
  chosen: a prophet
  lexicon: BDAG
  rationale: Anarthrous singular is naturally indefinite in English here within the
    rhetorical question.
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  - Certainly
  lexicon: BDAG
  rationale: Direct affirmative response to the rhetorical question; 'Yes' is simple
    and idiomatic.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common discourse formula. 'I tell you' preserves the force while sounding
    natural in contemporary English.
- source_word: καὶ περισσότερον προφήτου
  chosen: and more than a prophet
  alternatives:
  - and one greater than a prophet
  - and more than a prophet is here
  lexicon: BDAG
  rationale: περισσότερον with the genitive προφήτου expresses comparison, literally
    'more than a prophet.' This preserves the Greek closely without adding interpretive
    material such as 'one greater' or supplying an explicit subject not present in
    the text.
