theological_decisions:
- issue: Rendering the narrative formula ἀποκριθεὶς ... εἶπεν
  chosen_reading: And Jesus answered them
  alternative_readings:
  - And Jesus answered and said to them
  rationale: This is a stylistic and translational decision rather than a doctrinal
    one. The fuller literal formula is common in Greek narrative, but idiomatic English
    usually compresses it. No theological content is lost.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
