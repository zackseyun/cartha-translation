id: MAT.11.4
reference: Matthew 11:4
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτοῖς· Πορευθέντες ἀπαγγείλατε Ἰωάννῃ ἃ ἀκούετε
    καὶ βλέπετε·
translation:
  text: And Jesus answered them, “Go and report to John what you hear and see:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “And Jesus answered and said to them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι functions idiomatically as 'answered'
    in narrative Greek. English normally does not require a participial expansion
    here, so 'answered' gives natural style while preserving the discourse function.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς, the clause is best represented in English as
    'answered them' with the quotation following, rather than a wooden 'answered and
    said.' The speech introduction is preserved by punctuation and quotation.
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - Having gone
  - On your way
  lexicon: BDAG
  rationale: The attendant participle before an imperative commonly carries imperatival
    force. In idiomatic English, 'Go and report' best captures the sequence and command
    force without awkwardness.
- source_word: ἀπαγγείλατε
  chosen: report
  alternatives:
  - tell
  - announce
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce back. 'Report' fits the context
    of John's disciples bringing back what they have witnessed, and is slightly more
    precise than the broader 'tell'.
- source_word: Ἰωάννῃ
  chosen: to John
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to John.' The personal name
    is transliterated per project policy.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  lexicon: BDAG
  rationale: The neuter plural relative pronoun refers to the content of their observation.
    'What' is natural modern English and adequately represents the sense.
- source_word: ἀκούετε
  chosen: you hear
  alternatives:
  - you are hearing
  lexicon: BDAG
  rationale: Present indicative here conveys current experience. Simple present in
    English is the most natural rendering.
- source_word: βλέπετε
  chosen: see
  alternatives:
  - are seeing
  lexicon: BDAG
  rationale: Paired with 'hear,' the present tense denotes ongoing observation. 'See'
    is the natural English equivalent.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Initial καί continues the narrative straightforwardly. 'And' preserves
    the simple connective force without adding temporal nuance.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: The article with the proper name is not normally represented in English.
    The name is transliterated by standard convention.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative plural pronoun refers to John's messengers. 'Them' is the direct
    and natural English rendering in this construction.
