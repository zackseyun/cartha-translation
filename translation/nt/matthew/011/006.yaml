theological_decisions:
- issue: Potentially minimizing the force of σκανδαλισθῇ in relation to Jesus
  chosen_reading: 'Retain the stumbling metaphor in the main text: ''is not caused
    to stumble by me.'''
  alternative_readings:
  - does not take offense at me
  - is not offended because of me
  rationale: The verse blesses the person who does not fall away or stumble over Jesus
    and his works. Keeping the stumbling imagery preserves the theological tension
    between offense and faith without collapsing it into mere emotional reaction.
    The more interpretive alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
