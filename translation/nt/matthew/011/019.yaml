theological_decisions:
- issue: Meaning of 'wisdom' in the closing clause
  chosen_reading: Retain the personified expression 'wisdom' without identifying it
    explicitly with Jesus, God's wisdom, or the divine plan.
  alternative_readings:
  - wisdom refers to Jesus himself
  - wisdom refers to God's saving wisdom/plan
  rationale: The verse uses a personified saying that should be preserved rather than
    resolved into a narrower theological interpretation not explicit in the wording.
    This maintains the text's literary and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Textual form of the final clause
  chosen_reading: Follow the SBLGNT reading 'works' in the main text.
  alternative_readings:
  - '''children'' (τέκνων), as in the parallel at Luke 7:35 and some Matthean witnesses'
  rationale: The provided source text reads ἔργων, so the main text follows it. Because
    'children' is a well-known variant/traditional alternative, it should be preserved
    in a footnote for auditability.
