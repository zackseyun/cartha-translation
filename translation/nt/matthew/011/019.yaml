id: MAT.11.19
reference: Matthew 11:19
source:
  edition: SBLGNT
  text: ἦλθεν ὁ υἱὸς τοῦ ἀνθρώπου ἐσθίων καὶ πίνων, καὶ λέγουσιν· Ἰδοὺ ἄνθρωπος φάγος
    καὶ οἰνοπότης, τελωνῶν φίλος καὶ ἁμαρτωλῶν. καὶ ἐδικαιώθη ἡ σοφία ἀπὸ τῶν ⸀ἔργων
    αὐτῆς.
translation:
  text: The Son of Man came eating and drinking, and they say, ‘Look, a glutton and
    a drunkard, a friend of tax collectors and sinners!’ Yet wisdom was justified
    by her works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'wisdom was vindicated by her deeds.'
    reason: lexical_alternative
  - marker: b
    text: 'Some manuscripts read ''children'' instead of ''works'': ''wisdom was justified
      by her children.'''
    reason: textual_variant
lexical_decisions:
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: The Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: Standard translation of the self-referential title, preserving both the
    Semitic background and its established messianic/theological resonance without
    paraphrase.
- source_word: ἐσθίων καὶ πίνων
  chosen: eating and drinking
  alternatives:
  - feasting and drinking
  lexicon: BDAG
  rationale: The present participles describe customary activity in straightforward
    terms. 'Eating and drinking' preserves the contrast with John’s ascetic mode in
    the context without overstating it as 'feasting.'
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A natural modern equivalent for the deictic/exclamatory particle that
    retains the force of public accusation.
- source_word: φάγος
  chosen: a glutton
  alternatives:
  - a gluttonous man
  lexicon: BDAG
  rationale: This noun is pejorative and idiomatic; 'a glutton' is concise, natural
    English and preserves the insult.
- source_word: οἰνοπότης
  chosen: a drunkard
  alternatives:
  - a wine-drinker
  lexicon: BDAG
  rationale: The term is an accusation of excessive drinking, not a neutral statement
    that he drinks wine. 'Drunkard' best captures the slur.
- source_word: τελωνῶν φίλος καὶ ἁμαρτωλῶν
  chosen: a friend of tax collectors and sinners
  alternatives:
  - friend of tax collectors and sinful people
  lexicon: BDAG
  rationale: This preserves the genitive construction and the social-religious force
    of the labels. 'Sinners' is the established and accurate rendering for ἁμαρτωλῶν
    here.
- source_word: ἐδικαιώθη
  chosen: was justified
  alternatives:
  - was vindicated
  - was shown to be right
  lexicon: BDAG
  rationale: δικαιόω here carries the sense of being proved or shown righteous/right.
    'Was justified' is formally close and preserves the verbal link to broader biblical
    usage, while the footnote preserves the more idiomatic alternative 'vindicated.'
- source_word: ἡ σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: Retained as 'wisdom' without interpretive expansion. The feminine pronoun
    in Greek supports the personified presentation.
- source_word: ἀπὸ τῶν ἔργων αὐτῆς
  chosen: by her works
  alternatives:
  - by her deeds
  - by her actions
  lexicon: BDAG
  rationale: The SBLGNT reads ἔργων ('works'). 'By her works' is a transparent rendering
    of ἀπό with the genitive in this idiom and preserves the personification of wisdom
    as evidenced by what she produces.
