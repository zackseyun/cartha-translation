id: MAT.11.8
reference: Matthew 11:8
source:
  edition: SBLGNT
  text: ἀλλὰ τί ἐξήλθατε ἰδεῖν; ἄνθρωπον ἐν ⸀μαλακοῖς ἠμφιεσμένον; ἰδοὺ οἱ τὰ μαλακὰ
    φοροῦντες ἐν τοῖς οἴκοις τῶν ⸀βασιλέων ⸀εἰσίν.
translation:
  text: But what did you go out to see? A man dressed in soft clothes? Look, those
    who wear soft clothes are in the houses of kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clothed in soft garments' / 'wearing fine clothing.' The Greek literally
      refers to 'soft things/clothes,' with the sense of delicate or luxurious dress.
    reason: lexical_alternative
  - marker: b
    text: Or 'are in royal palaces.' The Greek reads more literally, 'are in the houses
      of kings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - No, rather
  lexicon: BDAG
  rationale: Adversative conjunction continuing Jesus' rhetorical contrast from the
    previous question. 'But' is natural and sufficiently direct in English.
- source_word: τί ἐξήλθατε ἰδεῖν
  chosen: what did you go out to see
  alternatives:
  - why did you go out to see
  - what did you go out to look at
  lexicon: BDAG
  rationale: The infinitive ἰδεῖν with ἐξήλθατε forms an idiomatic purpose expression,
    'go out to see.' 'What' matches τί directly and preserves the rhetorical question.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Singular accusative object of ἰδεῖν. 'A man' is gender-accurate and fits
    the immediate reference to John the Baptist; broader neutralization is unnecessary
    here.
- source_word: ἐν μαλακοῖς ἠμφιεσμένον
  chosen: dressed in soft clothes
  alternatives:
  - clothed in soft garments
  - wearing luxurious clothing
  lexicon: BDAG
  rationale: Perfect passive participle ἠμφιεσμένον means 'clothed/dressed.' μαλακοῖς
    literally means 'soft [things/clothes].' 'Soft clothes' preserves the concrete
    wording while allowing the implied sense of fine, delicate attire to be heard
    from context.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: '''Look'' is a readable modern-English equivalent to the attention-getting
    particle, avoiding archaic ''Behold'' while preserving rhetorical force.'
- source_word: οἱ τὰ μαλακὰ φοροῦντες
  chosen: those who wear soft clothes
  alternatives:
  - those wearing soft garments
  - those who wear fine clothing
  lexicon: BDAG
  rationale: φοροῦντες conveys customary wearing. Repeating 'soft clothes' maintains
    lexical consistency with μαλακοῖς above; the context supplies the connotation
    of luxury.
- source_word: ἐν τοῖς οἴκοις τῶν βασιλέων εἰσίν
  chosen: are in the houses of kings
  alternatives:
  - are in kings' houses
  - are in royal palaces
  lexicon: BDAG
  rationale: A formally close rendering preserves the plural 'houses of kings.' 'Royal
    palaces' is interpretive and smoother, but 'houses of kings' better reflects the
    Greek while still being understandable.
