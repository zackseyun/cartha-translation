id: MAT.11.21
reference: Matthew 11:21
source:
  edition: SBLGNT
  text: Οὐαί σοι, Χοραζίν· οὐαί σοι, Βηθσαϊδά· ὅτι εἰ ἐν Τύρῳ καὶ Σιδῶνι ἐγένοντο
    αἱ δυνάμεις αἱ γενόμεναι ἐν ὑμῖν, πάλαι ἂν ἐν σάκκῳ καὶ σποδῷ μετενόησαν.
translation:
  text: Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done
    among you had taken place in Tyre and Sidon, they would have repented long ago
    in sackcloth and ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "miracles"; Greek "mighty works" or "works of power."
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: '"Woe" preserves the prophetic denunciation and lament force of οὐαί
    better than the softer "alas." In this judgment context, it carries both grief
    and impending doom.'
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is naturally rendered "to you" in the idiom "Woe to you,"
    which is standard and idiomatic in English while preserving the direct address.
- source_word: Χοραζίν
  chosen: Chorazin
  rationale: 'Proper place name is transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: Βηθσαϊδά
  chosen: Bethsaida
  rationale: Proper place name is transliterated by standard English convention.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the ground for the pronouncement of woe. "For" fits
    the explanatory connection smoothly in English.
- source_word: εἰ
  chosen: if
  lexicon: BDAG
  rationale: Introduces a contrary-to-fact conditional clause, straightforwardly rendered
    "if."
- source_word: ἐγένοντο ... αἱ γενόμεναι
  chosen: had taken place ... done
  alternatives:
  - had happened ... that happened
  - had occurred ... performed
  lexicon: BDAG
  rationale: 'The repeated forms of γίνομαι are rendered with natural English variation
    to avoid awkward repetition while preserving sense: the mighty works "done among
    you" are those that "had taken place" in Tyre and Sidon in the hypothetical condition.'
- source_word: αἱ δυνάμεις
  chosen: the mighty works
  alternatives:
  - the miracles
  - the works of power
  lexicon: BDAG
  rationale: In Gospel context δυνάμεις commonly refers to deeds of divine power.
    "Mighty works" preserves the lexical link to power without narrowing too quickly
    to a modern category word like "miracles," though that remains a valid alternative.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: With plural ὑμῖν addressed to townspeople, "among you" best conveys deeds
    occurring in their midst, not inwardly within them.
- source_word: πάλαι
  chosen: long ago
  alternatives:
  - already long ago
  lexicon: BDAG
  rationale: '"Long ago" idiomatically conveys the temporal force that repentance
    would have occurred well before now.'
- source_word: ἂν
  chosen: would have
  lexicon: Greek grammar
  rationale: ἄν with the aorist in this contrary-to-fact apodosis is represented by
    the English modal construction "would have."
- source_word: ἐν σάκκῳ καὶ σποδῷ
  chosen: in sackcloth and ashes
  alternatives:
  - with sackcloth and ashes
  lexicon: BDAG
  rationale: This is a conventional biblical expression for mourning and repentance.
    "In sackcloth and ashes" is both literal and idiomatic in English, preserving
    the cultural image.
- source_word: μετενόησαν
  chosen: would have repented
  alternatives:
  - would have turned back
  lexicon: BDAG
  rationale: '"Repented" is the standard rendering of μετανοέω and fits the Matthean
    context of moral and spiritual turning. "Turned back" is possible but less precise
    in established biblical usage.'
