theological_decisions:
- issue: Nature of Jesus' comparison with Tyre and Sidon
  chosen_reading: A genuine statement of greater culpability for towns that witnessed
    Jesus' mighty works yet did not repent.
  alternative_readings:
  - A purely rhetorical exaggeration without real comparative judgment
  rationale: The verse presents a counterfactual comparison to intensify judgment
    on Chorazin and Bethsaida. The translation preserves this moral contrast without
    adding doctrinal conclusions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
