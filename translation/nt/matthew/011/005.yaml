theological_decisions:
- issue: Rendering of εὐαγγελίζονται in relation to gospel terminology
  chosen_reading: have good news proclaimed to them
  alternative_readings:
  - have the gospel preached to them
  - are evangelized
  rationale: This keeps the verbal connection to 'good news' while preserving the
    passive voice and remaining accessible in modern English. It avoids narrowing
    the phrase to later technical church usage while still conveying the messianic
    announcement implied by the context.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Miracle list as evidence of messianic fulfillment
  chosen_reading: Retain the straightforward miracle statements without adding explicit
    fulfillment language
  alternative_readings:
  - The blind receive sight ... as fulfillment of Isaiah
  rationale: The verse alludes strongly to Isaiah, but the Greek text itself presents
    the works rather than an explicit interpretive gloss. The translation preserves
    the theological resonance without importing commentary into the main text.
  doctrine_reference: Translation philosophy §§1, 3
