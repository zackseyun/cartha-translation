id: MAT.11.5
reference: Matthew 11:5
source:
  edition: SBLGNT
  text: τυφλοὶ ἀναβλέπουσιν καὶ χωλοὶ περιπατοῦσιν, λεπροὶ καθαρίζονται καὶ κωφοὶ
    ἀκούουσιν, ⸀καὶ νεκροὶ ἐγείρονται καὶ πτωχοὶ εὐαγγελίζονται·
translation:
  text: The blind receive sight and the lame walk, lepers are cleansed and the deaf
    hear, and the dead are raised and the poor have good news proclaimed to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''have the gospel preached to them.'' The Greek verb is passive: ''are
      brought good news.'''
    reason: lexical_alternative
  - marker: b
    text: This list echoes Isaiah 35:5–6 and 61:1, presenting signs associated with
      the Messiah’s work.
    reason: cross_reference
lexical_decisions:
- source_word: τυφλοὶ
  chosen: the blind
  alternatives:
  - blind people
  lexicon: BDAG
  rationale: Substantival adjective referring to blind persons as a class. 'The blind'
    is natural English and preserves the concise, representative force of the Greek.
- source_word: ἀναβλέπουσιν
  chosen: receive sight
  alternatives:
  - see again
  - look up
  lexicon: BDAG
  rationale: In healing contexts ἀναβλέπω commonly means regaining or receiving sight,
    not merely 'look up.' 'Receive sight' is idiomatic and fits the miracle list.
- source_word: χωλοὶ
  chosen: the lame
  alternatives:
  - crippled people
  lexicon: BDAG
  rationale: Substantival adjective for those unable to walk normally. 'The lame'
    is the standard, concise rendering and avoids unnecessarily harsh modern phrasing.
- source_word: περιπατοῦσιν
  chosen: walk
  alternatives:
  - are walking
  lexicon: BDAG
  rationale: Simple present best matches the Greek present and the terse catalog style.
- source_word: λεπροὶ
  chosen: lepers
  alternatives:
  - people with leprosy
  - leprous people
  lexicon: BDAG
  rationale: Traditional and concise rendering of λεπρός in Gospel healing contexts.
    While modern diagnosis may differ from ancient categories, 'lepers' best reflects
    the conventional referent in the text.
- source_word: καθαρίζονται
  chosen: are cleansed
  alternatives:
  - are made clean
  - are healed
  lexicon: BDAG
  rationale: καθαρίζω in this context carries both ritual and physical restoration.
    'Are cleansed' preserves that fuller sense better than the narrower 'are healed.'
- source_word: κωφοὶ
  chosen: the deaf
  alternatives:
  - deaf people
  - the mute
  lexicon: BDAG
  rationale: κωφός can denote deaf or mute depending on context, but paired with ἀκούουσιν
    the sense is clearly 'deaf.'
- source_word: ἀκούουσιν
  chosen: hear
  alternatives:
  - are hearing
  lexicon: BDAG
  rationale: Present active indicative rendered simply in English to match the sequence
    of restored abilities.
- source_word: νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: Substantival adjective referring to dead persons. 'The dead' is idiomatic
    and weighty.
- source_word: ἐγείρονται
  chosen: are raised
  alternatives:
  - are awakened
  - rise
  lexicon: BDAG
  rationale: Passive rendering best reflects the form and the miracle context of divine
    action upon the dead.
- source_word: πτωχοὶ
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: Standard rendering of πτωχός, preserving both socioeconomic and Isaianic
    resonance without over-interpreting.
- source_word: εὐαγγελίζονται
  chosen: have good news proclaimed to them
  alternatives:
  - are evangelized
  - hear good news
  - have the gospel preached to them
  lexicon: BDAG
  rationale: 'The passive form is significant: the poor are recipients of the announced
    good news. ''Have good news proclaimed to them'' preserves the passive and avoids
    importing later ecclesiastical jargon into the main text.'
