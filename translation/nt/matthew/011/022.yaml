id: MAT.11.22
reference: Matthew 11:22
source:
  edition: SBLGNT
  text: πλὴν λέγω ὑμῖν, Τύρῳ καὶ Σιδῶνι ἀνεκτότερον ἔσται ἐν ἡμέρᾳ κρίσεως ἢ ὑμῖν.
translation:
  text: But I tell you, it will be more tolerable for Tyre and Sidon on the day of
    judgment than for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more bearable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Introduces a strong contrast with the preceding denunciation. 'But' is
    natural modern English and preserves the adversative force without sounding overly
    formal.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common direct-speech formula in Matthew. 'I tell you' is idiomatic
    contemporary English while retaining the personal address and solemn force.
- source_word: Τύρῳ καὶ Σιδῶνι
  chosen: for Tyre and Sidon
  alternatives:
  - to Tyre and Sidon
  lexicon: BDAG
  rationale: The dative with the comparative adjective in this construction is best
    represented in English with 'for,' expressing the parties for whom the coming
    judgment will be more bearable.
- source_word: ἀνεκτότερον
  chosen: more tolerable
  alternatives:
  - more bearable
  - easier to bear
  lexicon: BDAG
  rationale: Comparative of ἀνεκτός, referring to what can be endured. 'More tolerable'
    is a standard and precise rendering in judgment contexts; 'more bearable' is possible
    but slightly less formal in tone.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Future existential/copular verb. English requires an impersonal subject
    with the predicate adjective; 'it will be' is natural modern English.
- source_word: ἐν ἡμέρᾳ κρίσεως
  chosen: on the day of judgment
  alternatives:
  - in the day of judgment
  - on judgment day
  lexicon: BDAG
  rationale: The prepositional phrase denotes the time of eschatological judgment.
    'On the day of judgment' is both clear and close to the Greek; 'on judgment day'
    is slightly more idiomatic but less formally transparent.
- source_word: κρίσεως
  chosen: judgment
  alternatives:
  - condemnation
  lexicon: BDAG
  rationale: κρίσις here refers to the judicial event, not merely its negative outcome.
    'Judgment' preserves the broader forensic sense and avoids importing a narrower
    result.
- source_word: ἢ ὑμῖν
  chosen: than for you
  alternatives:
  - than for you people
  - than for you all
  lexicon: BDAG
  rationale: Completes the comparison with the addressed towns/people. 'Than for you'
    is concise and faithful; expanded plurals are unnecessary in standard English.
