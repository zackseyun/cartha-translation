theological_decisions:
- issue: Nature of the coming judgment
  chosen_reading: the day of judgment
  alternative_readings:
  - a day of judgment
  rationale: The anarthrous Greek phrase ἐν ἡμέρᾳ κρίσεως can be rendered without
    the article in English, but in this Matthean context it refers to the recognized
    eschatological judgment. 'The day of judgment' best reflects the idiomatic and
    theological force without adding extra doctrinal detail.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
