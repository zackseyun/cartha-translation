theological_decisions:
- issue: Identification of John the Baptist with Elijah
  chosen_reading: Render the statement directly as 'he is Elijah who is to come' while
    preserving Jesus's qualifying clause 'if you are willing to accept it.'
  alternative_readings:
  - he fulfills the role of Elijah
  - he is like Elijah
  rationale: The Greek states the identification plainly (αὐτός ἐστιν Ἠλίας) but frames
    it with a conditional appeal to the hearers' reception. The translation should
    preserve both the force of the identification and the interpretive tension, rather
    than softening it into mere similarity or resolving how this relates to Malachi's
    prophecy.
  doctrine_reference: Preserve theological tension rather than resolve it.
