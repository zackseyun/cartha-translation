id: MAT.11.14
reference: Matthew 11:14
source:
  edition: SBLGNT
  text: καὶ εἰ θέλετε δέξασθαι, αὐτός ἐστιν Ἠλίας ὁ μέλλων ἔρχεσθαι.
translation:
  text: And if you are willing to accept it, he is Elijah who is to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you are willing to receive it.'
    reason: lexical_alternative
  - marker: b
    text: That is, John the Baptist is identified as the promised Elijah-like forerunner;
      compare Malachi 4:5 and Matthew 17:10–13.
    reason: cross_reference
lexical_decisions:
- source_word: εἰ θέλετε δέξασθαι
  chosen: if you are willing to accept it
  alternatives:
  - if you are willing to receive it
  - if you are willing to accept this
  lexicon: BDAG
  rationale: θέλετε with the infinitive δέξασθαι expresses willingness rather than
    mere desire; 'accept it' communicates receptivity to Jesus's identification of
    John. 'Receive' is more literal for δέχομαι but sounds less natural in contemporary
    English here. 'It' is supplied idiomatically for the implied object of acceptance.
- source_word: αὐτός
  chosen: he
  alternatives:
  - this one
  - he himself
  lexicon: BDAG
  rationale: The pronoun refers back to John the Baptist. Simple 'he' is the most
    natural English rendering. An emphatic sense ('he himself') is possible but not
    necessary in context.
- source_word: ἐστιν Ἠλίας
  chosen: is Elijah
  alternatives:
  - is Elias
  lexicon: BDAG
  rationale: Ἠλίας is the standard Greek form of the Hebrew name Elijah; per translation
    philosophy, personal names are transliterated by standard English convention.
    'Elijah' is the established modern English form.
- source_word: ὁ μέλλων ἔρχεσθαι
  chosen: who is to come
  alternatives:
  - who was about to come
  - the coming one
  lexicon: BDAG
  rationale: 'The articular participle with infinitive functions substantivally: ''the
    one who is to come.'' In English, ''who is to come'' preserves the future-oriented
    expectation and echoes prophetic/messianic language. ''Was about to come'' is
    too immediate for this prophetic context; ''the coming one'' is possible but less
    directly tied to Elijah here.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: A straightforward connective is appropriate. 'And' preserves the Greek
    linkage without overinterpreting the discourse relation.
