id: MAT.11.20
reference: Matthew 11:20
source:
  edition: SBLGNT
  text: Τότε ⸀ἤρξατο ὀνειδίζειν τὰς πόλεις ἐν αἷς ἐγένοντο αἱ πλεῖσται δυνάμεις αὐτοῦ,
    ὅτι οὐ μετενόησαν·
translation:
  text: Then he began to reproach the cities in which most of his mighty works had
    been done, because they did not change their thinking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''miracles'' or ''works of power'' for ''mighty works'' (Greek: dynameis).'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next stage in the narrative;
    'Then' is natural and sufficiently precise.
- source_word: ἤρξατο ὀνειδίζειν
  chosen: he began to reproach
  alternatives:
  - he began to denounce
  - he began to rebuke
  lexicon: BDAG
  rationale: The ingressive force of ἤρξατο is preserved with 'began to.' ὀνειδίζω
    carries the sense of reproaching or heaping reproach; 'reproach' best reflects
    the lexical sense without overstating to formal condemnation.
- source_word: τὰς πόλεις
  chosen: the cities
  alternatives:
  - the towns
  lexicon: BDAG
  rationale: πόλις normally means 'city' or 'town'; 'cities' is the standard rendering
    and fits the Galilean locales in view.
- source_word: ἐν αἷς
  chosen: in which
  alternatives:
  - where
  lexicon: BDAG
  rationale: A formally transparent rendering of the relative prepositional phrase;
    readable and close to the Greek structure.
- source_word: ἐγένοντο
  chosen: had been done
  alternatives:
  - took place
  - occurred
  - were done
  lexicon: BDAG
  rationale: γίνομαι here refers to events coming to pass. Because δυνάμεις in context
    refers to Jesus' miraculous deeds, 'had been done' gives idiomatic English and
    links naturally with 'mighty works.' The pluperfect reflects prior action relative
    to his reproach.
- source_word: αἱ πλεῖσται
  chosen: most
  alternatives:
  - the majority of
  - very many of
  lexicon: BDAG
  rationale: πλεῖσται is the superlative of πολύς, here meaning 'most' or 'the greatest
    number.' 'Most' is concise and natural in English.
- source_word: δυνάμεις
  chosen: mighty works
  alternatives:
  - miracles
  - works of power
  - powerful deeds
  lexicon: BDAG
  rationale: In the Synoptic context, δυνάμεις often denotes miraculous works or deeds
    of power. 'Mighty works' preserves the lexical connection to power without reducing
    the term to a later category word; 'miracles' is a valid interpretive alternative
    but slightly less transparent to the Greek.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: Straightforward possessive referring to Jesus.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the reproach; 'because' is clearer in contemporary
    English than 'for.'
- source_word: οὐ μετενόησαν
  chosen: they did not repent
  alternatives:
  - they did not change their minds
  - they did not turn back
  lexicon: BDAG
  rationale: μετανοέω in this context denotes repentance in response to divine revelation.
    'Repent' is the established and accurate theological term, and here it is clear
    enough for modern readers.
