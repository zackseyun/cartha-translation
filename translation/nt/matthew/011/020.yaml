theological_decisions:
- issue: Rendering δυνάμεις in a miracle context
  chosen_reading: mighty works
  alternative_readings:
  - miracles
  - works of power
  rationale: The verse refers to Jesus' powerful deeds performed in the cities. 'Mighty
    works' preserves the Greek term's emphasis on power and avoids importing a narrower
    modern category where the source uses a broader expression.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering μετενόησαν
  chosen_reading: did not repent
  alternative_readings:
  - did not turn back
  rationale: The text states moral-spiritual failure to respond appropriately to Jesus'
    works. 'Repent' preserves the theological weight without adding denominational
    interpretation beyond the Greek.
  doctrine_reference: Translation philosophy §6
