id: MAT.11.2
reference: Matthew 11:2
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰωάννης ἀκούσας ἐν τῷ δεσμωτηρίῳ τὰ ἔργα τοῦ χριστοῦ πέμψας ⸀διὰ τῶν
    μαθητῶν αὐτοῦ
translation:
  text: Now when John heard in prison about the works of the Messiah, he sent word
    through his disciples
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the works of Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: Marks narrative transition; 'Now' gives natural English discourse movement
    without overstating sequence.
- source_word: ἀκούσας
  chosen: when John heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle is best rendered with a temporal clause in natural
    English while preserving antecedent action.
- source_word: ἐν τῷ δεσμωτηρίῳ
  chosen: in prison
  alternatives:
  - in the prison
  - in the jail
  lexicon: BDAG
  rationale: Idiomatic English prefers 'in prison'; the location sense is preserved
    without unnecessary article.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - what was being done
  lexicon: BDAG
  rationale: '''Works'' preserves the lexical link to ἔργα and can encompass Jesus''
    deeds broadly, including mighty works and ministry actions.'
- source_word: τοῦ χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  - of the Anointed One
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like designation. Here the genitive title refers to
    Jesus' messianic activity.
- source_word: πέμψας
  chosen: he sent word
  alternatives:
  - he sent
  - having sent
  lexicon: BDAG
  rationale: The verb's object is implied by the following verse; 'sent word' makes
    acceptable English sense while staying close to the narrative action of dispatching
    a message via intermediaries.
- source_word: διὰ τῶν μαθητῶν αὐτοῦ
  chosen: through his disciples
  alternatives:
  - by his disciples
  - through his own disciples
  lexicon: BDAG
  rationale: διά with the genitive indicates agency or intermediary means; 'through
    his disciples' is the most natural rendering.
