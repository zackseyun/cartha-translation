id: MAT.11.15
reference: Matthew 11:15
source:
  edition: SBLGNT
  text: ὁ ἔχων ⸀ὦτα ἀκουέτω.
translation:
  text: The one who has ears, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whoever has ears, let him hear.' The Greek uses a singular generic
      expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    generically to any person characterized by having. 'The one who has' preserves
    the singular form and representative force without sounding archaic like 'he who
    has.'
- source_word: ὦτα
  chosen: ears
  alternatives:
  - an ear
  lexicon: BDAG
  rationale: The Greek is plural accusative, so 'ears' is the natural and formally
    accurate rendering. The plural also supports the idiomatic call for attentive
    spiritual perception.
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - let him listen
  lexicon: BDAG
  rationale: Third-person present active imperative is well represented by 'let him
    hear.' 'Hear' preserves the traditional biblical idiom and can include the sense
    of heeding, whereas 'listen' is possible but slightly narrows the expression.
    'Him' reflects the grammatically masculine singular generic force in keeping with
    the gender-accurate policy.
