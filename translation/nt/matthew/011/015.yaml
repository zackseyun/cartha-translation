- issue: Generic masculine expression
  chosen_reading: The one who has ears, let him hear.
  alternative_readings:
  - Whoever has ears, let them hear.
  rationale: The Greek uses a grammatically masculine singular generic construction.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing
    when the source has representative masculine force. The wording remains generic
    in sense while preserving the singular masculine form.
