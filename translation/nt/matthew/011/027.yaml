theological_decisions:
- issue: Force of ἐπιγινώσκω in the mutual knowledge statements
  chosen_reading: Rendered as 'fully knows' for both Father and Son
  alternative_readings:
  - knows
  - truly knows
  rationale: The verse emphasizes the unique and exhaustive mutual knowledge between
    Father and Son. Rendering ἐπιγινώσκω as 'fully knows' preserves the intensified
    force of the compound verb without importing later doctrinal terminology. This
    supports, but does not overstate beyond the text, the exclusivity of divine mutual
    knowledge.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Volitional language in βούληται
  chosen_reading: Rendered as 'chooses'
  alternative_readings:
  - wills
  - desires
  rationale: The text attributes revelatory initiative to the Son. 'Chooses' communicates
    real volition in clear modern English while avoiding archaic diction ('wills')
    and avoiding reduction to mere wish ('desires'). This preserves the theological
    tension of divine sovereignty in revelation without importing a denominational
    framework.
  doctrine_reference: Affirmations; Translation philosophy §§3, 6
