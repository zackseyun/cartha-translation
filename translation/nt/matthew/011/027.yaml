id: MAT.11.27
reference: Matthew 11:27
source:
  edition: SBLGNT
  text: Πάντα μοι παρεδόθη ὑπὸ τοῦ πατρός μου, καὶ οὐδεὶς ἐπιγινώσκει τὸν υἱὸν εἰ
    μὴ ὁ πατήρ, οὐδὲ τὸν πατέρα τις ἐπιγινώσκει εἰ μὴ ὁ υἱὸς καὶ ᾧ ἐὰν βούληται ὁ
    υἱὸς ἀποκαλύψαι.
translation:
  text: All things have been handed over to me by my Father, and no one fully knows
    the Son except the Father, nor does anyone fully know the Father except the Son
    and anyone to whom the Son chooses to reveal him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knows' or 'truly knows' for 'fully knows' in both clauses; the Greek
      verb can denote knowing fully or intimately.
    reason: lexical_alternative
  - marker: b
    text: Or 'whomever the Son wills to reveal him to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  chosen: All things
  alternatives:
  - Everything
  lexicon: BDAG
  rationale: Neuter plural with broad scope; 'All things' preserves the comprehensive
    sense and echoes the weight of total entrustment without over-specifying the domain.
- source_word: παρεδόθη
  chosen: have been handed over
  alternatives:
  - were delivered
  - have been entrusted
  lexicon: BDAG
  rationale: Aorist passive of παραδίδωμι. 'Handed over' is the most direct idiomatic
    rendering and preserves the idea of transfer from the Father to the Son. Present
    perfect English conveys the present state resulting from the completed act.
- source_word: ὑπὸ τοῦ πατρός μου
  chosen: by my Father
  alternatives:
  - by my father
  lexicon: BDAG
  rationale: The possessive and article identify a specific relational title. Capitalizing
    'Father' in reference to God clarifies the personal divine title in English.
- source_word: ἐπιγινώσκει
  chosen: fully knows
  alternatives:
  - knows
  - truly knows
  lexicon: BDAG
  rationale: The compound verb ἐπιγινώσκω can intensify γινώσκω, suggesting full or
    complete knowledge rather than mere acquaintance. 'Fully knows' preserves that
    force in both clauses.
- source_word: τὸν υἱὸν
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: In this context the title is christological and reciprocal with 'the
    Father'; capitalization signals titular use rather than an indefinite filial reference.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In exclusion clauses after a negation, 'except' is the most natural English
    equivalent.
- source_word: οὐδὲ τὸν πατέρα τις ἐπιγινώσκει
  chosen: nor does anyone fully know the Father
  alternatives:
  - and no one fully knows the Father
  lexicon: BDAG
  rationale: '''Nor'' preserves the coordinated negative parallelism of the Greek
    and keeps the balanced structure between Son and Father.'
- source_word: ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι
  chosen: anyone to whom the Son chooses to reveal him
  alternatives:
  - whomever the Son wills to reveal him to
  - anyone to whom the Son desires to reveal him
  lexicon: BDAG
  rationale: βούλομαι denotes willing/choosing/desiring. 'Chooses' is idiomatic and
    preserves the Son's volitional agency. The infinitive ἀποκαλύψαι is best rendered
    'to reveal.' The object 'him' refers back to 'the Father' in the immediate context.
- source_word: ἀποκαλύψαι
  chosen: to reveal
  alternatives:
  - to disclose
  - to make known
  lexicon: BDAG
  rationale: '''Reveal'' is the standard rendering and preserves the theological sense
    of divine disclosure without unnecessary expansion.'
