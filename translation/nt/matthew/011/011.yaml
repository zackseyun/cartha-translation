theological_decisions:
- issue: Interpretation of John's greatness relative to kingdom members
  chosen_reading: Render the statement straightforwardly without explaining how the
    least in the kingdom is greater than John.
  alternative_readings:
  - John belongs to the old covenant era while kingdom members enjoy new covenant
    privilege
  - The saying refers to status in salvation history rather than personal holiness
  - The 'least' may refer specifically to any disciple in the inaugurated kingdom
  rationale: The verse presents a paradoxical comparison but does not itself explain
    the theological mechanism. Per translation philosophy, the rendering preserves
    the tension rather than resolving it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
