id: MAT.11.11
reference: Matthew 11:11
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, οὐκ ἐγήγερται ἐν γεννητοῖς γυναικῶν μείζων Ἰωάννου τοῦ βαπτιστοῦ·
    ὁ δὲ μικρότερος ἐν τῇ βασιλείᾳ τῶν οὐρανῶν μείζων αὐτοῦ ἐστιν.
translation:
  text: Truly I say to you, among those born of women no one greater than John the
    Baptist has arisen; yet the least in the kingdom of heaven is greater than he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been raised up.' The Greek verb can mean 'has arisen' or 'has been
      raised up'; here it most likely refers to appearing on the stage of history,
      not resurrection.
    reason: lexical_alternative
  - marker: b
    text: '''Among those born of women'' is a Semitic expression meaning among human
      beings.'
    reason: cultural_note
  - marker: c
    text: Or 'the lesser one' / 'the smallest one.' The Greek literally uses a comparative
      form, but the sense here is the one of least rank or status in the kingdom of
      heaven.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying. In the Synoptics, ἀμὴν λέγω
    ὑμῖν is idiomatically rendered 'Truly I say to you' in clear modern English; 'Amen'
    is more transliterative but less natural in running translation.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A direct and transparent rendering of the formula. 'I tell you' is idiomatic,
    but 'I say to you' preserves the recognizable discourse formula without sounding
    archaic.
- source_word: οὐκ ἐγήγερται
  chosen: has arisen
  alternatives:
  - has been raised up
  - has appeared
  lexicon: BDAG
  rationale: Perfect tense indicates a state resulting from arising/appearing. 'Has
    arisen' fits the idiom 'among those born of women' and avoids implying resurrection,
    which 'has been raised up' might suggest in English.
- source_word: ἐν γεννητοῖς γυναικῶν
  chosen: among those born of women
  alternatives:
  - among those born from women
  - among mortals
  lexicon: BDAG
  rationale: A fairly literal rendering of the Semitic idiom referring to human beings.
    'Among those born of women' preserves the biblical texture better than the interpretive
    'among mortals'.
- source_word: μείζων Ἰωάννου τοῦ βαπτιστοῦ
  chosen: no one greater than John the Baptist
  alternatives:
  - none greater than John the Baptist
  - a greater one than John the Baptist
  lexicon: BDAG
  rationale: English requires an explicit subject for clarity. 'No one greater than
    John the Baptist' accurately conveys the comparative construction in idiomatic
    English.
- source_word: τοῦ βαπτιστοῦ
  chosen: the Baptist
  alternatives:
  - the Baptizer
  lexicon: BDAG
  rationale: '''The Baptist'' is the standard English designation for ὁ βαπτιστής
    and is immediately recognizable. ''The Baptizer'' is more transparent lexically
    but less idiomatic as a name-like epithet in English.'
- source_word: ὁ δὲ μικρότερος
  chosen: yet the least
  alternatives:
  - but the lesser one
  - but the smallest
  lexicon: BDAG
  rationale: μικρότερος is comparative in form but can function idiomatically for
    the one of least status. 'The least' is the most natural English expression here
    and matches the contrastive force with John.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: in the kingdom of heaven
  alternatives:
  - in the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. 'Kingdom of heaven' is established and
    accurate; the more literal plural 'heavens' is possible but less idiomatic in
    English and not necessary to preserve meaning here.
- source_word: μείζων αὐτοῦ ἐστιν
  chosen: is greater than he
  alternatives:
  - is greater than him
  lexicon: BDAG
  rationale: Retains the comparative statement with a slightly more formal pronoun
    after 'than,' matching the elevated tone of the saying. 'Than him' would also
    be acceptable in contemporary English.
