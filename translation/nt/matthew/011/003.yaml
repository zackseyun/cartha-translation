id: MAT.11.3
reference: Matthew 11:3
source:
  edition: SBLGNT
  text: εἶπεν αὐτῷ· Σὺ εἶ ὁ ἐρχόμενος ἢ ἕτερον προσδοκῶμεν;
translation:
  text: and said to him, “Are you the Coming One, or should we expect another?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one who is coming” or “the one to come.” The Greek expression can
      function as a messianic title.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν αὐτῷ
  chosen: and said to him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: The aorist εἶπεν is straightforwardly rendered 'said.' 'And' is supplied
    because the verse continues the narrative from the previous verse and reflects
    normal English discourse flow, though it is not separately represented in the
    Greek words provided here.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are
  lexicon: BDAG
  rationale: 'In English, the direct-question form requires inversion: ''Are you ...?''
    The explicit pronoun σύ adds emphasis, but natural English can convey this without
    an added ''you yourself'' unless stronger emphasis is needed.'
- source_word: ὁ ἐρχόμενος
  chosen: the Coming One
  alternatives:
  - the one who is coming
  - the one to come
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. 'The Coming
    One' preserves its titular/messianic force and echoes Jewish expectation better
    than the flatter 'the one who is coming.' Capitalization reflects title-like usage
    in context, not a separate lexical meaning.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Standard disjunctive conjunction introducing the alternative question.
- source_word: ἕτερον
  chosen: another
  alternatives:
  - someone else
  - a different one
  lexicon: BDAG
  rationale: ἕτερον means 'another/different one.' 'Another' is the most natural English
    in this construction; 'someone else' is possible but slightly more interpretive.
- source_word: προσδοκῶμεν
  chosen: should we expect
  alternatives:
  - are we to expect
  - should we wait for
  lexicon: BDAG
  rationale: Although formally present indicative, in this deliberative question it
    is best rendered idiomatically as 'should we expect.' 'Wait for' is possible in
    some contexts, but 'expect' better matches the semantic range here and avoids
    narrowing the sense to mere waiting.
