theological_decisions:
- issue: Messianic/titular force of ὁ ἐρχόμενος
  chosen_reading: Render as the title 'the Coming One'
  alternative_readings:
  - the one who is coming
  - the expected one
  rationale: In this context John’s question concerns whether Jesus is the awaited
    messianic figure. The Greek allows a more generic participial sense, but the article
    plus context support a recognized title. The translation preserves that theological
    tension without over-specifying 'Messiah' in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
