theological_decisions:
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the realm of the dead
  - hell
  rationale: To avoid importing later doctrinal associations of 'hell' and to preserve
    the distinction in the Greek text between ᾅδης and other judgment terms, the transliteration
    'Hades' is preferred in the main text. A clarifying footnote preserves a more
    explanatory alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
