id: MAT.11.23
reference: Matthew 11:23
source:
  edition: SBLGNT
  text: καὶ σύ, Καφαρναούμ, ⸂μὴ ἕως οὐρανοῦ ὑψωθήσῃ⸃; ἕως ᾅδου ⸀καταβήσῃ· ὅτι εἰ ἐν
    Σοδόμοις ⸀ἐγενήθησαν αἱ δυνάμεις αἱ γενόμεναι ἐν σοί, ⸀ἔμεινεν ἂν μέχρι τῆς σήμερον.
translation:
  text: And you, Capernaum, will you be exalted to heaven? You will go down to Hades.
    For if the mighty works done in you had happened in Sodom, it would have remained
    until today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the realm of the dead.' Greek 'Hades,' not Gehenna.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καφαρναούμ
  chosen: Capernaum
  rationale: 'Transliterated place name per translation philosophy: names are transliterated
    by standard English convention.'
- source_word: μὴ ἕως οὐρανοῦ ὑψωθήσῃ;
  chosen: will you be exalted to heaven?
  alternatives:
  - will you be lifted up to heaven?
  - you will not be exalted to heaven
  lexicon: BDAG
  rationale: The μή with the future/passive verb is best taken as introducing a rhetorical
    question expecting a negative answer, not as a simple negation statement. 'Exalted'
    captures ὑψόω idiomatically in context of pride/status; 'to heaven' preserves
    the spatial metaphor.
- source_word: ἕως ᾅδου καταβήσῃ
  chosen: You will go down to Hades
  alternatives:
  - you will be brought down to Hades
  - you will go down to the realm of the dead
  lexicon: BDAG
  rationale: καταβαίνω is 'go down/descend'; future middle here naturally yields 'you
    will go down.' ᾅδης is rendered 'Hades' rather than paraphrased, preserving the
    Greek term's distinction from final judgment terminology such as Gehenna/hell.
- source_word: δυνάμεις
  chosen: mighty works
  alternatives:
  - miracles
  - works of power
  lexicon: BDAG
  rationale: In the Synoptic context δυνάμεις commonly refers to deeds of power performed
    by Jesus. 'Mighty works' preserves both the concrete deed and the power dimension
    without over-narrowing to a modern sense of 'miracles.'
- source_word: γενόμεναι ἐν σοί
  chosen: done in you
  alternatives:
  - performed in you
  - that happened in you
  lexicon: BDAG
  rationale: The participial phrase modifies the mighty works and refers to events
    occurring in Capernaum. 'Done in you' is natural English while preserving the
    locative ἐν with the city addressed as feminine singular.
- source_word: ἐγενήθησαν
  chosen: had happened
  alternatives:
  - had been done
  - took place
  lexicon: BDAG
  rationale: In the contrary-to-fact condition, an English pluperfect best conveys
    the aorist in protasis relative to the unreal result. 'Had happened' is broad
    enough to match γίνομαι while fitting the context of mighty works.
- source_word: ἔμεινεν ἂν
  chosen: it would have remained
  alternatives:
  - it would have stayed
  - it would still be standing
  lexicon: BDAG
  rationale: The singular verb takes Sodom as a collective city. 'Would have remained'
    is the most direct rendering of the unreal apodosis with ἄν.
- source_word: μέχρι τῆς σήμερον
  chosen: until today
  alternatives:
  - to this day
  - until the present day
  lexicon: BDAG
  rationale: '''Until today'' is clear modern English and preserves the temporal force
    of the phrase.'
