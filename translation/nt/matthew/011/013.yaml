id: MAT.11.13
reference: Matthew 11:13
source:
  edition: SBLGNT
  text: πάντες γὰρ οἱ προφῆται καὶ ὁ νόμος ἕως Ἰωάννου ἐπροφήτευσαν·
translation:
  text: For all the prophets and the Law prophesied until John.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “up to John” or “until the time of John.” The phrase may present John
      as the culmination of the prophetic witness or as the boundary marking its transition.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: Used attributively with οἱ προφῆται to mean the whole group of prophets
    collectively. 'All' is the most natural English rendering here.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding for the preceding statement. 'For' preserves
    the connective force without overinterpreting it.
- source_word: προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering for those who speak prophetically on God's behalf;
    no contextual reason to vary.
- source_word: ὁ νόμος
  chosen: the Law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: Capitalized to signal the Torah/Mosaic Law as a recognized scriptural
    corpus, especially in the Matthean pairing 'the prophets and the Law.' This reflects
    a canonical reference rather than law in a generic sense.
- source_word: ἕως Ἰωάννου
  chosen: until John
  alternatives:
  - up to John
  - until the time of John
  lexicon: BDAG
  rationale: ἕως with the genitive marks a temporal limit. 'Until John' is concise
    and idiomatic, preserving the ambiguity of whether John is included as the culmination
    or marks the boundary.
- source_word: ἐπροφήτευσαν
  chosen: prophesied
  alternatives:
  - spoke prophetically
  - were prophetic
  lexicon: BDAG
  rationale: Aorist active indicative of προφητεύω. 'Prophesied' is the direct and
    natural rendering. Applied to both 'the prophets' and 'the Law,' it preserves
    Jesus' personifying claim that the Law itself bore prophetic witness.
