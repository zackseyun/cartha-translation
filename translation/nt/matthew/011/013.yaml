theological_decisions:
- issue: Whether ὁ νόμος should be rendered generically or as a scriptural title
  chosen_reading: the Law
  alternative_readings:
  - the law
  rationale: In context, Jesus refers to the recognized scriptural witness of Israel
    ('the prophets and the Law'), not merely legal principle. Capitalization helps
    modern readers perceive the canonical/theological reference without adding content
    not present in the Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether ἕως Ἰωάννου implies John is included in the prophetic era or only
    marks its endpoint
  chosen_reading: until John
  alternative_readings:
  - up to John
  - until the time of John
  rationale: The Greek phrase itself does not fully resolve the interpretive question.
    The translation preserves the temporal boundary language without forcing a doctrinally
    loaded interpretation. This maintains the text's tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
