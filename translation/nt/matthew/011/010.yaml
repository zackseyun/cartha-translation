theological_decisions:
- issue: Rendering the scriptural citation's duplicated prepositional phrases
  chosen_reading: Retained both 'before your face' and 'before you' in the main text
  alternative_readings:
  - Smoothing both to a single English phrase such as 'ahead of you'
  rationale: The Greek citation contains both πρὸ προσώπου σου and ἔμπροσθέν σου.
    Retaining both preserves the formal texture and emphatic parallelism of the quotation
    rather than collapsing it for stylistic smoothness.
  doctrine_reference: Translation philosophy §§1, 5
