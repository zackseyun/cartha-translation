id: MAT.11.10
reference: Matthew 11:10
source:
  edition: SBLGNT
  text: ⸀οὗτός ἐστιν περὶ οὗ γέγραπται· Ἰδοὺ ἐγὼ ἀποστέλλω τὸν ἄγγελόν μου πρὸ προσώπου
    σου, ὃς κατασκευάσει τὴν ὁδόν σου ἔμπροσθέν σου.
translation:
  text: 'This is he about whom it is written: ‘Behold, I am sending my messenger before
    your face, who will prepare your way before you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'before you' for 'before your face.' The Greek preserves
      a more concrete expression from the scriptural citation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  chosen: This is he
  alternatives:
  - This is the one
  - This is the man
  lexicon: BDAG
  rationale: Demonstrative pronoun introducing identification. 'This is he' preserves
    the emphatic, somewhat formal identificational force of the Greek better than
    the more interpretive 'the one,' while remaining natural in context.
- source_word: περὶ οὗ
  chosen: about whom
  alternatives:
  - concerning whom
  - of whom
  lexicon: BDAG
  rationale: περί with genitive commonly means 'about/concerning.' 'About whom' is
    idiomatic modern English and preserves the referential sense.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Perfect passive formula for Scripture citation. 'It is written' is the
    standard English equivalent and preserves the ongoing authority/resultative nuance
    without awkwardness.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Citation formula from prophetic Scripture. 'Behold' preserves the elevated
    prophetic register better than 'Look' or 'See,' which can sound too colloquial.
- source_word: ἀποστέλλω
  chosen: I am sending
  alternatives:
  - I send
  lexicon: BDAG
  rationale: Present tense in a scriptural citation with imminent/future force. 'I
    am sending' communicates the vividness of the present while sounding natural in
    English.
- source_word: ἄγγελόν
  chosen: messenger
  alternatives:
  - angel
  lexicon: BDAG
  rationale: In this context the referent is John the Baptist, a human forerunner,
    not a heavenly being. 'Messenger' reflects the lexical range of ἄγγελος and the
    contextual sense.
- source_word: πρὸ προσώπου σου
  chosen: before your face
  alternatives:
  - before you
  - ahead of you
  lexicon: BDAG
  rationale: Literally 'before your face.' This rendering preserves the concrete imagery
    of the Greek and the underlying scriptural citation, even though 'before you'
    would be smoother. The phrase remains intelligible in English.
- source_word: κατασκευάσει
  chosen: will prepare
  alternatives:
  - will make ready
  - will make ready for
  lexicon: BDAG
  rationale: Future verb meaning to prepare or make ready. 'Will prepare' is concise,
    natural, and fits the road/path imagery.
- source_word: τὴν ὁδόν σου
  chosen: your way
  alternatives:
  - your road
  - your path
  lexicon: BDAG
  rationale: ὁδός can mean road, way, or path. 'Way' is the most idiomatic in this
    prophetic-preparatory context and preserves both literal and metaphorical resonance.
- source_word: ἔμπροσθέν σου
  chosen: before you
  alternatives:
  - in front of you
  lexicon: BDAG
  rationale: Standard prepositional phrase meaning 'before/in front of you.' 'Before
    you' is idiomatic and matches the citation's solemn tone.
