id: MAT.13.36
reference: Matthew 13:36
source:
  edition: SBLGNT
  text: Τότε ἀφεὶς τοὺς ὄχλους ἦλθεν εἰς τὴν ⸀οἰκίαν. καὶ προσῆλθον αὐτῷ οἱ μαθηταὶ
    αὐτοῦ λέγοντες· ⸀Διασάφησον ἡμῖν τὴν παραβολὴν τῶν ζιζανίων τοῦ ἀγροῦ.
translation:
  text: Then, after leaving the crowds, he went into the house. And his disciples
    came to him, saying, “Explain to us the parable of the weeds of the field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the parable of the tares of the field”; the Greek term may refer more
      specifically to darnel, a weed resembling wheat.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: ἀφεὶς
  chosen: after leaving
  alternatives:
  - having left
  - leaving behind
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here has the sense of departing from or leaving.
    'After leaving' makes the participial action relation clear in idiomatic English.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: Plural ὄχλους is best represented by 'crowds'; 'multitudes' is traditional
    but less natural in modern English.
- source_word: ἦλθεν εἰς τὴν οἰκίαν
  chosen: he went into the house
  alternatives:
  - he came into the house
  - he entered the house
  lexicon: BDAG
  rationale: Although ἔρχομαι often means 'come,' in narrative English 'went into
    the house' better fits the movement from the prior outdoor setting. The article
    supports 'the house' rather than an indefinite rendering.
- source_word: προσῆλθον αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means to come/approach someone. 'Came to him' is
    clear and natural; 'approached him' is possible but slightly stiffer.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive rendering in English; no theological issue beyond
    identifying the group as Jesus' disciples.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle is naturally rendered 'saying' after the main verb,
    preserving the Greek flow without awkwardness.
- source_word: Διασάφησον
  chosen: Explain
  alternatives:
  - Make clear
  - Clarify
  - Interpret
  lexicon: BDAG
  rationale: Aorist imperative ζητά a clear explanation. 'Explain' is the most natural
    modern English equivalent; 'interpret' would over-specify, while 'make clear'
    is less idiomatic here.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative pronoun marking the indirect object of the request; 'to us' is
    the straightforward rendering.
- source_word: τὴν παραβολὴν
  chosen: the parable
  alternatives:
  - the illustration
  lexicon: BDAG
  rationale: παραβολή is consistently rendered 'parable' in the Gospel context; this
    preserves genre and intertextual consistency.
- source_word: τῶν ζιζανίων
  chosen: of the weeds
  alternatives:
  - of the darnel weeds
  - of the tares
  lexicon: BDAG
  rationale: ζιζάνια refers to noxious weeds, traditionally 'tares,' likely darnel.
    'Weeds' is accessible modern English; the more specific/traditional alternatives
    are worth preserving in a footnote.
- source_word: τοῦ ἀγροῦ
  chosen: of the field
  alternatives:
  - in the field
  lexicon: BDAG
  rationale: 'Genitive construction most directly modifies the parable phrase: ''the
    parable of the weeds of the field.'' This is slightly more formal than ''in the
    field'' and stays close to the Greek structure.'
