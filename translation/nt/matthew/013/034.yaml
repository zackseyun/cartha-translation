id: MAT.13.34
reference: Matthew 13:34
source:
  edition: SBLGNT
  text: Ταῦτα πάντα ἐλάλησεν ὁ Ἰησοῦς ἐν παραβολαῖς τοῖς ὄχλοις, καὶ χωρὶς παραβολῆς
    ⸀οὐδὲν ἐλάλει αὐτοῖς·
translation:
  text: Jesus spoke all these things to the crowds in parables, and apart from a parable
    he was saying nothing to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'without a parable he said nothing to them.' The Greek imperfect may
      be rendered as a customary past or as a simple past in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all these
  lexicon: BDAG
  rationale: The combination of demonstrative and adjective is naturally rendered
    'all these things' in English, preserving both the demonstrative force and the
    comprehensiveness.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: Aorist indicative summarizing Jesus' discourse; 'spoke' fits λαλέω well
    here and reads naturally with the direct object phrase.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - by parables
  - with parables
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here indicates manner or medium. 'In
    parables' is the standard and most natural English rendering.
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the multitudes
  - to the crowd
  lexicon: BDAG
  rationale: Plural dative is best preserved as 'to the crowds.' This is clear modern
    English and reflects repeated gathered groups rather than a single crowd.
- source_word: χωρὶς παραβολῆς
  chosen: apart from a parable
  alternatives:
  - without a parable
  - without parables
  lexicon: BDAG
  rationale: χωρίς with the genitive means 'without/apart from.' The singular παραβολῆς
    is best kept singular rather than generalized to plural. 'Apart from a parable'
    preserves the Greek form while remaining idiomatic.
- source_word: οὐδὲν ἐλάλει
  chosen: he was saying nothing
  alternatives:
  - he said nothing
  - he spoke nothing
  lexicon: BDAG
  rationale: The imperfect ἐλάλει suggests customary or ongoing action in this context,
    so an English progressive form better reflects the aspect than a simple past.
    'Saying nothing' is more idiomatic than 'speaking nothing.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to the crowds
  lexicon: BDAG
  rationale: The pronoun refers back to the crowds and is best rendered directly as
    'to them' to avoid unnecessary repetition.
