theological_decisions:
- issue: Narrative emphasis of the imperfect in the second clause
  chosen_reading: The verse states that Jesus characteristically addressed the crowds
    only in parables in this setting.
  alternative_readings:
  - 'The verse could be flattened to a simple past: ''he said nothing to them without
    a parable.'''
  rationale: This is not a doctrinally contested issue, but the imperfect ἐλάλει carries
    durative/customary force. Preserving that aspect avoids understating Matthew's
    emphasis on Jesus' parabolic mode of public teaching here.
  doctrine_reference: Translation philosophy §1, §5
