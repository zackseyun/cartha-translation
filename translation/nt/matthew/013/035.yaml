id: MAT.13.35
reference: Matthew 13:35
source:
  edition: SBLGNT
  text: ὅπως πληρωθῇ τὸ ῥηθὲν διὰ τοῦ προφήτου λέγοντος· Ἀνοίξω ἐν παραβολαῖς τὸ στόμα
    μου, ἐρεύξομαι κεκρυμμένα ἀπὸ ⸀καταβολῆς.
translation:
  text: 'so that what was spoken through the prophet might be fulfilled, saying: “I
    will open my mouth in parables; I will utter things hidden from the foundation.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “from the foundation of the world.”
    reason: textual_variant
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result, here linking Jesus' use of parables to fulfillment.
    'So that' is natural modern English and preserves the telic force.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - may be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ὅπως is well represented by 'might be
    fulfilled' in English, preserving Matthew's fulfillment formula without overstating
    tense nuance.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been spoken
  lexicon: BDAG
  rationale: Idiomatic rendering of the articular participle; 'what was spoken' is
    standard and clear.
- source_word: διὰ τοῦ προφήτου
  chosen: through the prophet
  alternatives:
  - by the prophet
  lexicon: BDAG
  rationale: διά with genitive often marks agency/instrumentality. 'Through the prophet'
    fits Matthew's formulaic citation style and preserves prophetic mediation.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - who says
  - when he says
  lexicon: BDAG
  rationale: Conventional citation participle introducing the quoted text.
- source_word: Ἀνοίξω
  chosen: I will open
  lexicon: BDAG
  rationale: Straightforward future active; no reason to paraphrase.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  lexicon: BDAG
  rationale: Retains the prepositional phrase and Matthew's terminology for Jesus'
    teaching form.
- source_word: στόμα μου
  chosen: my mouth
  lexicon: BDAG
  rationale: Literal expression is natural in English and preserves the poetic register
    of the citation.
- source_word: ἐρεύξομαι
  chosen: I will utter
  alternatives:
  - I will pour forth
  - I will proclaim
  lexicon: BDAG
  rationale: The verb literally suggests pouring forth or speaking out. 'Utter' preserves
    the elevated, poetic sense without sounding archaic or overly literal.
- source_word: κεκρυμμένα
  chosen: things hidden
  alternatives:
  - hidden things
  - things kept hidden
  - secrets
  lexicon: BDAG
  rationale: Perfect passive participle functioning substantivally. 'Things hidden'
    is concise and preserves the passive/resultative sense better than the more interpretive
    'secrets'.
- source_word: ἀπὸ καταβολῆς
  chosen: from the foundation
  alternatives:
  - since the foundation
  - from the foundation of the world
  lexicon: BDAG
  rationale: The Greek text here reads only 'from the foundation,' without an explicit
    object such as 'of the world.' The translation should not import words absent
    from the source, though the idiom likely implies foundational beginning. The fuller
    traditional reading is preserved in a footnote as a textual variant.
