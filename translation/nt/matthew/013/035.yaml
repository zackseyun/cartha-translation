theological_decisions:
- issue: Citation source and formula-quotation wording
  chosen_reading: through the prophet
  alternative_readings:
  - through Asaph the prophet
  - through the prophet, saying
  rationale: The SBLGNT text reads simply 'through the prophet.' Since the verse quotes
    Psalm 78:2, some manuscripts specify 'Isaiah' elsewhere in Matthew's formulae,
    but not here; no doctrinal issue is at stake, so the translation follows the given
    Greek text exactly and avoids harmonizing or expanding the source identification.
  doctrine_reference: Translation philosophy §1, §5
- issue: Extent of the temporal phrase ἀπὸ καταβολῆς
  chosen_reading: from the foundation
  alternative_readings:
  - from the foundation of the world
  rationale: The source text lacks κόσμου ('of the world'). In keeping with original-language
    primacy, the main text does not add it. Because many readers know the fuller traditional
    wording from other manuscripts and translations, the alternative is preserved
    in a footnote as a textual variant rather than adopted into the main text.
  doctrine_reference: Translation philosophy §1, §3
