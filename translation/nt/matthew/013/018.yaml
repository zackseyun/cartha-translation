id: MAT.13.18
reference: Matthew 13:18
source:
  edition: SBLGNT
  text: Ὑμεῖς οὖν ἀκούσατε τὴν παραβολὴν τοῦ ⸀σπείραντος.
translation:
  text: You, then, hear the parable of the sower.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the parable of the one who sowed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: You
  alternatives:
  - As for you
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic in Greek. English can preserve this
    adequately with stated subject 'You'; the emphasis is further supported by the
    following particle and word order without needing a heavier paraphrase.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks inference or transition. 'Then' fits natural modern English
    here while preserving the discourse connection from the preceding explanation.
- source_word: ἀκούσατε
  chosen: hear
  alternatives:
  - listen to
  - understand
  lexicon: BDAG
  rationale: Aorist active imperative, second plural. 'Hear' is concise and preserves
    the imperative force. 'Listen to' is possible but slightly more expansive; 'understand'
    overinterprets, since the verb is ἀκούω, not συνίημι.
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - illustration
  lexicon: BDAG
  rationale: '''Parable'' is the standard and accurate rendering for παραβολή in the
    Synoptic teaching context. ''Illustration'' is too weak and less specific.'
- source_word: τοῦ σπείραντος
  chosen: of the sower
  alternatives:
  - of the one who sowed
  - about the sower
  lexicon: BDAG
  rationale: The articular aorist participle literally means 'of the one who sowed.'
    In idiomatic English within this well-known parable context, 'of the sower' best
    captures the substantival force and reads naturally. 'About the sower' is possible
    as an interpretive expansion of the genitive but is less formally tied to the
    Greek construction.
