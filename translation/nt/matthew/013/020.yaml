theological_decisions:
- issue: Referent of the sown one in the parable explanation
  chosen_reading: Render the metaphor as 'the one sown on the rocky ground' while
    allowing the following clause to identify the person represented.
  alternative_readings:
  - Render more interpretively as 'the seed sown on rocky ground represents the person
    who...'
  rationale: The Greek keeps the metaphor compressed, speaking of the 'one sown' and
    then identifying him as the hearer. The translation preserves that tension rather
    than resolving it into a fully paraphrastic explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
