id: MAT.13.20
reference: Matthew 13:20
source:
  edition: SBLGNT
  text: ὁ δὲ ἐπὶ τὰ πετρώδη σπαρείς, οὗτός ἐστιν ὁ τὸν λόγον ἀκούων καὶ εὐθὺς μετὰ
    χαρᾶς λαμβάνων αὐτόν,
translation:
  text: As for the one sown on the rocky ground, this is the one who hears the word
    and immediately receives it with joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one sown on rocky places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἐπὶ τὰ πετρώδη σπαρείς
  chosen: As for the one sown on the rocky ground
  alternatives:
  - But the one sown on rocky places
  - The one sown upon the rocky soil
  lexicon: BDAG
  rationale: The articular participial phrase functions substantivally, referring
    back to the seed/soil imagery while identifying the person represented. 'As for'
    captures δέ as a mild transition. 'Rocky ground' renders τὰ πετρώδη idiomatically
    in English while preserving the agricultural image.
- source_word: πετρώδη
  chosen: rocky ground
  alternatives:
  - rocky places
  - stony ground
  lexicon: BDAG
  rationale: The adjective denotes rocky or stony terrain. 'Rocky ground' is natural
    modern English and fits the parable's soil imagery better than the more wooden
    'rocky places.'
- source_word: σπαρείς
  chosen: sown
  alternatives:
  - having been sown
  lexicon: BDAG
  rationale: Aorist passive participle of σπείρω. 'Sown' is concise and preserves
    the passive agricultural metaphor without overtranslating the participial aspect.
- source_word: οὗτός ἐστιν
  chosen: this is
  alternatives:
  - this represents
  - this person is
  lexicon: BDAG
  rationale: A straightforward identificational clause. 'This is' keeps close to the
    Greek and lets the explanatory force of the parable remain implicit rather than
    interpretively expanded.
- source_word: ὁ τὸν λόγον ἀκούων
  chosen: the one who hears the word
  alternatives:
  - the one hearing the word
  lexicon: BDAG
  rationale: The present participle is best rendered in idiomatic English as a relative
    clause. 'The word' is retained rather than paraphrased as 'the message' to preserve
    the wording of the passage and its thematic resonance in Matthew.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: '''Immediately'' is the clearest standard equivalent and preserves the
    emphasis on rapid response.'
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: The prepositional phrase is naturally rendered 'with joy.' This preserves
    the noun χαρά rather than converting it into an adverb unless needed for style.
- source_word: λαμβάνων αὐτόν
  chosen: receives it
  alternatives:
  - accepts it
  - takes it in
  lexicon: BDAG
  rationale: λαμβάνω here means to receive or accept. 'Receives it' is a clear, sufficiently
    formal rendering; 'it' refers back to τὸν λόγον and is natural English despite
    the gender shift from Greek grammatical gender.
