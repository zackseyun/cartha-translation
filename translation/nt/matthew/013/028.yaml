theological_decisions:
- issue: Rendering δοῦλοι in a parabolic context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The doctrine excerpt specifies 'servant / slave (context-dependent)'
    and prefers 'slave' where bonded status is salient. In this verse, the relation
    to the landowner/master is hierarchical and dependent; 'slaves' preserves that
    social reality. Because many English readers expect 'servants' in this parable
    and because the theological point does not hinge on the stronger term, the alternative
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    for δοῦλος'
