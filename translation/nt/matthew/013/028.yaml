id: MAT.13.28
reference: Matthew 13:28
source:
  edition: SBLGNT
  text: ὁ δὲ ἔφη αὐτοῖς· Ἐχθρὸς ἄνθρωπος τοῦτο ἐποίησεν. οἱ δὲ ⸂δοῦλοι αὐτῷ λέγουσιν⸃·
    Θέλεις οὖν ἀπελθόντες ⸀συλλέξωμεν αὐτά;
translation:
  text: He said to them, “An enemy did this.” Then the slaves said to him, “Do you
    want us to go and gather them up?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servants” (Greek doulos/douloi, which can mean either “slave(s)” or
      “servant(s)” depending on context).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: He said
  alternatives:
  - He told
  lexicon: BDAG
  rationale: A standard speech verb; 'said' is the most natural and direct English
    rendering in narrative dialogue.
- source_word: Ἐχθρὸς ἄνθρωπος
  chosen: An enemy
  alternatives:
  - An enemy man
  - An enemy person
  lexicon: BDAG
  rationale: The phrase is literally 'an enemy man/person,' but idiomatic English
    expresses the sense simply as 'an enemy.' The noun ἄνθρωπος here individualizes
    the adversary rather than adding distinct semantic content that must be retained
    woodenly.
- source_word: τοῦτο ἐποίησεν
  chosen: did this
  alternatives:
  - has done this
  - did this thing
  lexicon: BDAG
  rationale: Aorist indicative in narrative is well rendered by simple past, and 'did
    this' is natural English matching the demonstrative force of τοῦτο.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered context-dependently as 'servant / slave.'
    In this parabolic agricultural setting, these are household dependents under a
    master; the bonded status is present, and 'slaves' preserves the social hierarchy
    more transparently than 'servants.' The alternative is preserved in a footnote
    because English tradition often uses 'servants' here and the bonded nature may
    be less theologically salient than in some epistolary uses.
- source_word: Θέλεις
  chosen: Do you want
  alternatives:
  - Do you wish
  - Do you desire
  lexicon: BDAG
  rationale: θέλω commonly expresses desire or will. 'Do you want' is clear, contemporary
    English without undue formality.
- source_word: οὖν
  chosen: Then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Here οὖν marks the next step in the exchange rather than a heavily logical
    inference; 'Then' fits the narrative flow well.
- source_word: ἀπελθόντες
  chosen: to go
  alternatives:
  - after going
  - go
  lexicon: BDAG
  rationale: 'The participle is subordinate to the hortatory subjunctive and is naturally
    represented in English infinitival structure: ''want us to go and...'' This preserves
    the sequence without awkward literalism.'
- source_word: συλλέξωμεν
  chosen: gather ... up
  alternatives:
  - collect
  - pull together
  lexicon: BDAG
  rationale: In the agricultural context of weeds among wheat, 'gather up' is idiomatic
    and anticipates the physical removal in the parable.
- source_word: αὐτά
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is neuter plural, referring to the weeds/tares mentioned
    in context. English uses 'them' naturally for such plural referents.
