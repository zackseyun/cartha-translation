theological_decisions:
- issue: Meaning of αἰών in eschatological phrase
  chosen_reading: age
  alternative_readings:
  - world
  rationale: To preserve original-language primacy, αἰών is rendered 'age' rather
    than the traditional 'world,' since the phrase refers to the consummation of the
    present age/order. This avoids importing a claim about the annihilation of the
    physical cosmos that the wording itself does not require.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identity of ἄγγελοι
  chosen_reading: heavenly angels
  alternative_readings:
  - messengers
  rationale: Within Jesus' explanation of the parable's final judgment imagery, the
    referent is supernatural angels. This is a contextual lexical decision, not a
    denominationally distinctive theological reading.
  doctrine_reference: Affirmations; Translation philosophy §1
