id: MAT.13.49
reference: Matthew 13:49
source:
  edition: SBLGNT
  text: οὕτως ἔσται ἐν τῇ συντελείᾳ τοῦ αἰῶνος· ἐξελεύσονται οἱ ἄγγελοι καὶ ἀφοριοῦσιν
    τοὺς πονηροὺς ἐκ μέσου τῶν δικαίων
translation:
  text: 'So it will be at the end of the age: the angels will go out and separate
    the wicked from among the righteous,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the consummation of the age.' Traditional English often has 'at the
      end of the world,' but the Greek says 'age' (αἰών), not 'world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces the explanation/conclusion of the parable's meaning. 'So'
    is natural modern English and preserves the inferential force without sounding
    overly formal.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  - this is how it will be
  lexicon: BDAG
  rationale: Future middle of εἰμί functioning as a simple future existential/copular
    statement. 'It will be' is straightforward and idiomatic.
- source_word: ἐν τῇ συντελείᾳ τοῦ αἰῶνος
  chosen: at the end of the age
  alternatives:
  - at the consummation of the age
  - at the close of the age
  - at the end of the world
  lexicon: BDAG
  rationale: συντέλεια denotes completion/consummation; αἰών here refers to the present
    age/order, not the physical world as such. 'At the end of the age' best reflects
    the Greek and avoids the misleading traditional 'end of the world.'
- source_word: ἐξελεύσονται
  chosen: will go out
  alternatives:
  - will come out
  - will go forth
  lexicon: BDAG
  rationale: Future middle of ἐξέρχομαι. 'Will go out' is the most direct rendering;
    'go forth' is more traditional but less natural in modern English.
- source_word: οἱ ἄγγελοι
  chosen: the angels
  alternatives:
  - the messengers
  lexicon: BDAG
  rationale: In this eschatological context, ἄγγελοι clearly refers to heavenly angels,
    not human messengers.
- source_word: ἀφοριοῦσιν
  chosen: separate
  alternatives:
  - set apart
  - divide off
  lexicon: BDAG
  rationale: The verb means to separate or mark off from a group. 'Separate' is clear,
    natural, and fits the judgment imagery.
- source_word: τοὺς πονηροὺς
  chosen: the wicked
  alternatives:
  - the evil ones
  - the evil
  lexicon: BDAG
  rationale: Substantival adjective referring to evil persons. 'The wicked' is idiomatic
    English for a class of morally evil people and suits the judgment context.
- source_word: ἐκ μέσου
  chosen: from among
  alternatives:
  - out of the midst of
  - from the midst of
  lexicon: BDAG
  rationale: This prepositional expression indicates separation out from within a
    mixed group. 'From among' is concise and natural.
- source_word: τῶν δικαίων
  chosen: the righteous
  alternatives:
  - the just
  lexicon: BDAG
  rationale: Substantival adjective denoting those who are righteous. 'The righteous'
    is the standard and clearest rendering in this context.
