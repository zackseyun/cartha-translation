theological_decisions:
- issue: Rendering of judgment imagery in an eschatological context
  chosen_reading: Retain the concrete imagery 'the furnace of fire' and 'weeping and
    gnashing of teeth' without softening or interpretive expansion.
  alternative_readings:
  - Use a more idiomatic phrase such as 'fiery furnace'
  - Paraphrase the final clause as 'there people will cry and grind their teeth in
    anguish'
  rationale: The verse presents severe judgment imagery in Jesus' explanation of the
    parable. Optimal equivalence here favors preserving the concrete metaphors and
    traditional Matthean formula rather than resolving their theological implications
    or diluting their force.
  doctrine_reference: Translation philosophy §§1, 3, 6
