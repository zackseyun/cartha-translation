id: MAT.13.50
reference: Matthew 13:50
source:
  edition: SBLGNT
  text: καὶ βαλοῦσιν αὐτοὺς εἰς τὴν κάμινον τοῦ πυρός· ἐκεῖ ἔσται ὁ κλαυθμὸς καὶ ὁ
    βρυγμὸς τῶν ὀδόντων.
translation:
  text: and they will throw them into the furnace of fire. In that place there will
    be weeping and gnashing of teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the fiery furnace.' The Greek reads literally 'the
      furnace of fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαλοῦσιν
  chosen: they will throw
  alternatives:
  - they will cast
  - they will hurl
  lexicon: BDAG
  rationale: Future active of βάλλω commonly means 'throw' or 'cast.' 'Throw' is natural
    modern English and preserves the force of forcible expulsion without archaic tone.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative masculine plural pronoun referring back to the wicked in the
    preceding context; simple object pronoun is sufficient in English.
- source_word: κάμινον τοῦ πυρός
  chosen: the furnace of fire
  alternatives:
  - the fiery furnace
  - the blazing furnace
  lexicon: BDAG
  rationale: A relatively formal rendering that closely reflects the genitive construction
    and preserves the biblical imagery. 'Fiery furnace' is idiomatic English and echoes
    traditional phrasing, but 'furnace of fire' more transparently represents the
    Greek wording.
- source_word: ἐκεῖ
  chosen: In that place
  alternatives:
  - there
  lexicon: BDAG
  rationale: The adverb marks location emphatically. 'In that place' is slightly fuller
    than bare 'there' and preserves the solemn, locative force in readable English.
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - will be
  lexicon: BDAG
  rationale: English existential construction best matches the Greek future of εἰμί
    with the following nominatives.
- source_word: ὁ κλαυθμὸς
  chosen: weeping
  alternatives:
  - wailing
  lexicon: BDAG
  rationale: κλαυθμός denotes crying/weeping, often in lament. 'Weeping' is the standard
    Matthean rendering and avoids overstating the term as 'wailing,' though that nuance
    is possible.
- source_word: ὁ βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: This is a fixed expression in Matthew. 'Gnashing of teeth' is both accurate
    and established English for the idiom, preserving its connotations of anguish
    and judgment.
