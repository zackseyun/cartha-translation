id: MAT.13.6
reference: Matthew 13:6
source:
  edition: SBLGNT
  text: ἡλίου δὲ ἀνατείλαντος ἐκαυματίσθη καὶ διὰ τὸ μὴ ἔχειν ῥίζαν ἐξηράνθη.
translation:
  text: But when the sun rose, it was scorched, and because it had no root, it withered
    away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it dried up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡλίου δὲ ἀνατείλαντος
  chosen: But when the sun rose
  alternatives:
  - And when the sun had risen
  - But after the sun rose
  lexicon: BDAG
  rationale: Genitive absolute marking temporal circumstance. 'But when the sun rose'
    is natural English and preserves δέ as a mild contrast/continuation.
- source_word: ἐκαυματίσθη
  chosen: it was scorched
  alternatives:
  - it was burned
  - it was seared
  lexicon: BDAG
  rationale: Passive of καυματίζω, referring to being burned by heat. 'Scorched' best
    fits plant imagery and standard English usage without overstating total destruction.
- source_word: διὰ τὸ μὴ ἔχειν
  chosen: because it had no
  alternatives:
  - because it did not have
  - on account of not having
  lexicon: BDAG
  rationale: διά + articular infinitive expresses cause. Restructured idiomatically
    into English causal clause while preserving the explicit reason.
- source_word: ῥίζαν
  chosen: root
  alternatives:
  - roots
  lexicon: BDAG
  rationale: Singular in Greek. English singular 'root' works idiomatically for a
    plant lacking sufficient rooting.
- source_word: ἐξηράνθη
  chosen: it withered away
  alternatives:
  - it dried up
  - it withered
  lexicon: BDAG
  rationale: Passive/intransitive sense of ξηραίνω in plant context. 'Withered away'
    communicates the result clearly in modern English and matches the agricultural
    imagery.
