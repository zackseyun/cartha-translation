id: MAT.13.23
reference: Matthew 13:23
source:
  edition: SBLGNT
  text: ὁ δὲ ἐπὶ τὴν ⸂καλὴν γῆν⸃ σπαρείς, οὗτός ἐστιν ὁ τὸν λόγον ἀκούων καὶ ⸀συνιείς,
    ὃς δὴ καρποφορεῖ καὶ ποιεῖ ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα.
translation:
  text: But the one sown on the good soil—this is the one who hears the word and understands
    it, who indeed bears fruit and produces, in one case a hundred, in another sixty,
    and in another thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon the good ground.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'one a hundred, one sixty, and one thirty'; that is, varying
      crop yields. Many English versions express this as 'a hundredfold ... sixty
      ... thirty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τὴν καλὴν γῆν
  chosen: on the good soil
  alternatives:
  - upon the good ground
  - in the good soil
  lexicon: BDAG
  rationale: γῆ can mean land/earth/ground, but in the parable's agricultural setting
    'soil' best conveys the cultivated medium receiving seed. καλὴν is rendered 'good'
    in the sense of suitable/fertile rather than morally good.
- source_word: σπαρείς
  chosen: sown
  alternatives:
  - having been sown
  - seeded
  lexicon: BDAG
  rationale: Aorist passive participle modifying the implied person represented by
    the seed. 'Sown' preserves the parable's metaphor and is idiomatic in English.
- source_word: ὁ τὸν λόγον ἀκούων
  chosen: the one who hears the word
  alternatives:
  - the one hearing the word
  - the man who hears the message
  lexicon: BDAG
  rationale: Present participle indicates characteristic action. 'The word' is retained
    rather than 'message' to preserve the Gospel idiom and intertextual resonance,
    while remaining understandable.
- source_word: συνιείς
  chosen: understands it
  alternatives:
  - comprehends it
  - grasps it
  lexicon: BDAG
  rationale: συνίημι here denotes understanding or perceiving the meaning of the word
    heard. The object 'it' is supplied naturally in English from τὸν λόγον.
- source_word: δὴ
  chosen: indeed
  alternatives:
  - truly
  - then
  - ''
  lexicon: BDAG
  rationale: δή adds emphasis. 'Indeed' lightly marks the emphatic force without sounding
    wooden. It is included because the particle contributes to the statement's stress.
- source_word: καρποφορεῖ
  chosen: bears fruit
  alternatives:
  - is fruitful
  - produces fruit
  lexicon: BDAG
  rationale: Standard metaphorical rendering in agricultural and discipleship contexts;
    preserves the image central to the parable.
- source_word: ποιεῖ
  chosen: produces
  alternatives:
  - yields
  - makes
  lexicon: BDAG
  rationale: ποιέω here refers to producing a crop/yield. Rendering it separately
    from καρποφορεῖ preserves the Greek's two verbs rather than collapsing them into
    one.
- source_word: ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα
  chosen: in one case a hundred, in another sixty, and in another thirty
  alternatives:
  - one a hundredfold, one sixty, and one thirty
  - some a hundred, some sixty, some thirty
  lexicon: BDAG
  rationale: The distributive relative construction marks differing yields among instances.
    This rendering preserves the distribution clearly in natural English. 'Fold' is
    not explicit in Greek here, though context implies yield amounts; therefore it
    is omitted from the main text and preserved as an alternative.
