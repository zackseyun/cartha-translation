id: MAT.13.38
reference: Matthew 13:38
source:
  edition: SBLGNT
  text: ὁ δὲ ἀγρός ἐστιν ὁ κόσμος· τὸ δὲ καλὸν σπέρμα, οὗτοί εἰσιν οἱ υἱοὶ τῆς βασιλείας·
    τὰ δὲ ζιζάνιά εἰσιν οἱ υἱοὶ τοῦ πονηροῦ,
translation:
  text: And the field is the world, and the good seed—these are the sons of the kingdom.
    And the weeds are the sons of the evil one,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, 'darnel'; traditionally, 'tares.'
    reason: lexical_alternative
  - marker: b
    text: '''Sons'' here is a representative relational expression, referring to those
      who belong to the kingdom.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀγρός
  chosen: field
  alternatives:
  - farmland
  lexicon: BDAG
  rationale: Standard sense in an agricultural parable context; 'field' is natural
    English and preserves the imagery.
- source_word: κόσμος
  chosen: world
  alternatives:
  - inhabited world
  lexicon: BDAG
  rationale: In this explanatory context, κόσμος refers broadly to the world as the
    sphere in which the sowing occurs; 'world' is the plain and conventional rendering.
- source_word: καλὸν
  chosen: good
  alternatives:
  - fine
  lexicon: BDAG
  rationale: With σπέρμα, καλός denotes what is good/fit in contrast to the weeds;
    'good' is the clearest idiomatic contrast.
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - grain
  - offspring
  lexicon: BDAG
  rationale: The parable's agricultural metaphor requires the literal image 'seed';
    although σπέρμα can mean 'offspring' in other contexts, here the metaphor is retained
    and then interpreted.
- source_word: οὗτοί
  chosen: these are
  alternatives:
  - this is
  lexicon: BDAG
  rationale: The pronoun is nominative masculine plural, referring to the people represented
    by the singular collective 'seed'; 'these are' correctly reflects the shift from
    symbol to referents.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: Per gender-accurate philosophy, the masculine plural should be preserved
    where the Greek uses υἱοί. 'Sons' also retains the relational and covenantal nuance
    of Semitic/Greek idiom. An inclusive alternative can be noted in a footnote.
- source_word: βασιλείας
  chosen: kingdom
  alternatives:
  - reign
  - royal rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard and most recognizable rendering in Matthew,
    preserving continuity with Jesus''s kingdom language.'
- source_word: ζιζάνια
  chosen: weeds
  alternatives:
  - darnel
  - tares
  lexicon: BDAG
  rationale: '''Weeds'' is clear modern English and fits the translation philosophy.
    ''Darnel'' is botanically specific but less accessible; ''tares'' is traditional
    but archaic. The more specific alternative is worth preserving in a footnote.'
- source_word: πονηροῦ
  chosen: the evil one
  alternatives:
  - the wicked one
  - evil
  lexicon: BDAG
  rationale: 'With the article and masculine singular genitive after ''sons of,''
    the phrase is best taken personally, not abstractly: ''the evil one.'' This aligns
    with Matthew''s usage where ὁ πονηρός commonly refers to Satan/the devil.'
