theological_decisions:
- issue: Whether τοῦ πονηροῦ is impersonal ('evil') or personal ('the evil one')
  chosen_reading: the evil one
  alternative_readings:
  - evil
  - the wicked one
  rationale: The articular masculine singular genitive naturally reads as a personal
    referent here, especially in the parable's explanation where opposing groups are
    contrasted. This preserves the text's personal-agent dimension without importing
    more than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    grammar sufficiently supports the personal reading.
- issue: Whether υἱοὶ should be rendered more inclusively as 'children'
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Greek explicitly uses the masculine plural υἱοί. Following the gender-accurate
    policy, the translation preserves 'sons' in the main text while allowing an explanatory
    footnote for readers who may understand the phrase representatively.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
