id: MAT.13.24
reference: Matthew 13:24
source:
  edition: SBLGNT
  text: Ἄλλην παραβολὴν παρέθηκεν αὐτοῖς λέγων· Ὡμοιώθη ἡ βασιλεία τῶν οὐρανῶν ἀνθρώπῳ
    ⸀σπείραντι καλὸν σπέρμα ἐν τῷ ἀγρῷ αὐτοῦ.
translation:
  text: He set another parable before them, saying, “The kingdom of heaven has become
    like a man who sowed good seed in his field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “is like a man who sowed good seed in his field.” The Greek verb can
      be rendered more simply in English in Matthew’s parable formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλλην παραβολὴν
  chosen: another parable
  alternatives:
  - a different parable
  lexicon: BDAG
  rationale: ἄλλην with παραβολή straightforwardly introduces an additional parable
    in sequence. 'Another parable' is natural English and preserves the narrative
    flow.
- source_word: παρέθηκεν αὐτοῖς
  chosen: set before them
  alternatives:
  - presented to them
  - put before them
  lexicon: BDAG
  rationale: παρατίθημι here means to set forth or present. 'Set before them' preserves
    the concrete metaphor and matches the idiomatic use of introducing teaching material.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is commonly rendered with 'saying' in English narrative
    to preserve the connection between the introductory clause and the quoted speech.
- source_word: Ὡμοιώθη
  chosen: has become like
  alternatives:
  - is like
  - was compared to
  lexicon: BDAG
  rationale: The aorist passive of ὁμοιόω literally means 'was made like' or 'has
    become like.' In Matthew's kingdom parable formula, English often smooths this
    to 'is like,' but 'has become like' better reflects the verbal form without becoming
    wooden.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Heaven' in the singular
    is standard idiomatic English for the plural οὐρανῶν here and preserves the established
    Matthean sense without awkwardness.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and refers to a male figure
    within the parable. Per the gender-accurate policy, 'a man' is preferred over
    the more generic 'a person'.
- source_word: σπείραντι
  chosen: who sowed
  alternatives:
  - sowing
  - who had sown
  lexicon: BDAG
  rationale: The aorist active participle modifying ἀνθρώπῳ is naturally rendered
    in English as a relative clause. 'Who sowed' is clear and preserves the completed
    action.
- source_word: καλὸν σπέρμα
  chosen: good seed
  alternatives:
  - fine seed
  lexicon: BDAG
  rationale: καλός here denotes good or sound quality. 'Good seed' is the natural
    agricultural expression and anticipates the contrast with weeds in the following
    context.
- source_word: ἐν τῷ ἀγρῷ αὐτοῦ
  chosen: in his field
  alternatives:
  - in his farmland
  lexicon: BDAG
  rationale: ἀγρός means field or farm plot. 'In his field' is the most direct and
    idiomatic rendering, and αὐτοῦ is best attached possessively to the man.
