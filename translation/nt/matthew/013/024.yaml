theological_decisions:
- issue: Rendering Matthew's kingdom formula
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the kingdom of the heavens
  rationale: No doctrinally contested term is involved, but the phrase carries theological
    significance in Matthew. The singular 'heaven' is idiomatic English while preserving
    Matthew's reverential circumlocution for God's reign.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Force of Ὡμοιώθη in the parable introduction
  chosen_reading: has become like
  alternative_readings:
  - is like
  rationale: The translation preserves more of the Greek verbal form than the traditional
    simplified 'is like,' while not importing any additional theological claim about
    the kingdom's essence beyond the comparison introduced by the parable.
  doctrine_reference: Translation philosophy §1 and §3
