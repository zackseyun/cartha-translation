id: MAT.13.19
reference: Matthew 13:19
source:
  edition: SBLGNT
  text: παντὸς ἀκούοντος τὸν λόγον τῆς βασιλείας καὶ μὴ συνιέντος, ἔρχεται ὁ πονηρὸς
    καὶ ἁρπάζει τὸ ἐσπαρμένον ἐν τῇ καρδίᾳ αὐτοῦ· οὗτός ἐστιν ὁ παρὰ τὴν ὁδὸν σπαρείς.
translation:
  text: When anyone hears the word of the kingdom and does not understand it, the
    evil one comes and snatches away what has been sown in his heart. This is the
    one sown beside the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one sown along the path' or 'by the roadside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παντὸς ἀκούοντος
  chosen: when anyone hears
  alternatives:
  - everyone hearing
  - of everyone who hears
  lexicon: BDAG
  rationale: The genitive articular participial construction is idiomatically rendered
    as a general conditional/temporal clause in English. 'Anyone' captures the distributive
    force of πᾶς without awkward literalism.
- source_word: λόγον τῆς βασιλείας
  chosen: the word of the kingdom
  alternatives:
  - the message of the kingdom
  - the word about the kingdom
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' 'Word of the kingdom' preserves the
    Greek form and matches the parable's seed/word imagery, while remaining understandable
    in English.
- source_word: μὴ συνιέντος
  chosen: does not understand it
  alternatives:
  - does not comprehend it
  - does not grasp it
  lexicon: BDAG
  rationale: συνίημι here denotes understanding or grasping the meaning. Adding 'it'
    is required for natural English and refers back to 'the word of the kingdom'.
- source_word: ὁ πονηρὸς
  chosen: the evil one
  alternatives:
  - the wicked one
  - the evil
  lexicon: BDAG
  rationale: 'With the article and in this context of satanic opposition to the word,
    the expression is best taken personally: ''the evil one.'' This is standard and
    clearer than the abstract ''evil.'''
- source_word: ἁρπάζει
  chosen: snatches away
  alternatives:
  - seizes
  - takes away
  - snatches
  lexicon: BDAG
  rationale: ἁρπάζω conveys forceful, sudden removal. 'Snatches away' preserves that
    vividness and fits the agricultural/parabolic context.
- source_word: τὸ ἐσπαρμένον
  chosen: what has been sown
  alternatives:
  - the thing sown
  - what was sown
  lexicon: BDAG
  rationale: The neuter perfect passive participle functions substantivally. 'What
    has been sown' is natural English and preserves the passive sense.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - in the heart of him
  - in his inner being
  lexicon: BDAG
  rationale: A direct rendering is best. 'Heart' preserves the biblical anthropological
    term without interpretive expansion.
- source_word: οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  - Such a person is
  lexicon: BDAG
  rationale: This introduces Jesus' identification of the soil/hearer correspondence.
    'This is' is concise and natural.
- source_word: ὁ παρὰ τὴν ὁδὸν σπαρείς
  chosen: the one sown beside the road
  alternatives:
  - the one sown along the path
  - the one sown by the roadside
  lexicon: BDAG
  rationale: The Greek says literally 'the one sown beside the road/path.' Although
    the seed is what is sown, Jesus identifies the person by metonymy with the seed/soil
    image. 'Road' is chosen over 'path' because ὁδός commonly means road/way, while
    still fitting the scene.
