theological_decisions:
- issue: Identity of ὁ πονηρὸς
  chosen_reading: a personal evil agent ('the evil one')
  alternative_readings:
  - an abstract force of evil ('evil')
  rationale: In the immediate context of the parable's interpretation, the figure
    who comes and removes the sown word is personal. Rendering it as 'the evil one'
    preserves the likely referent without over-specifying beyond the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Gendered language in αὐτοῦ
  chosen_reading: '''his heart'''
  alternative_readings:
  - '''their heart'''
  - '''the heart'''
  rationale: The Greek singular masculine pronoun is representative/generic. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing. The generic
    sense is carried by 'anyone' in the first clause, while 'his heart' reflects the
    source grammar.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
