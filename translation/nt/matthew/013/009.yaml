id: MAT.13.9
reference: Matthew 13:9
source:
  edition: SBLGNT
  text: ὁ ἔχων ⸀ὦτα ἀκουέτω.
translation:
  text: The one who has ears, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more inclusively in English: ''Whoever has ears, let them hear.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - He who has
  - Whoever has
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    generically to any person characterized by having. 'The one who has' preserves
    the singular form and representative force while using natural modern English.
    'He who has' is more traditional but less natural; 'whoever has' is possible but
    slightly shifts the syntax from a substantival expression to a more indefinite
    conditional-like form.
- source_word: ὦτα
  chosen: ears
  alternatives:
  - an ear
  lexicon: BDAG
  rationale: The Greek uses the plural accusative of οὖς. 'Ears' is the straightforward
    literal rendering and matches the idiomatic expression in context. Singular 'an
    ear' would not reflect the Greek number here.
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - must hear
  - should listen
  - let him listen
  lexicon: BDAG
  rationale: The present active imperative, third person singular, is well represented
    by 'let him hear.' This preserves the exhortatory force and the traditional idiom
    used in Jesus' sayings. 'Must hear' overstates the modal force; 'should listen'
    weakens the imperative; 'let him listen' is possible, but 'hear' better preserves
    the lexical link to ἀκούω and the biblical idiom that implies attentive reception,
    not mere auditory perception.
