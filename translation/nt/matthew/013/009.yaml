theological_decisions:
- issue: Generic masculine expression in English
  chosen_reading: The one who has ears, let him hear.
  alternative_readings:
  - Whoever has ears, let them hear.
  rationale: The Greek is grammatically masculine singular and functions generically.
    Following the doctrine's gender-accurate principle, the main text preserves the
    singular representative force rather than replacing it with a pluralized gender-neutral
    construction. A more inclusive English alternative is possible, but the chosen
    rendering stays closer to the source form and syntax.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
