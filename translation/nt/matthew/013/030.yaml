theological_decisions:
- issue: Parabolic imagery of final separation
  chosen_reading: Retain the agricultural imagery without making the eschatological
    interpretation explicit in the translation.
  alternative_readings:
  - Translate in a way that foregrounds final judgment, e.g., 'for destruction' or
    'burn them up completely'
  rationale: The verse is part of a parable whose interpretation appears later in
    the chapter. The translation should preserve the image as spoken rather than importing
    the later explanation into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
