id: MAT.13.30
reference: Matthew 13:30
source:
  edition: SBLGNT
  text: ἄφετε συναυξάνεσθαι ἀμφότερα ⸀μέχρι τοῦ θερισμοῦ· καὶ ἐν καιρῷ τοῦ θερισμοῦ
    ἐρῶ τοῖς θερισταῖς· Συλλέξατε πρῶτον τὰ ζιζάνια καὶ δήσατε αὐτὰ εἰς δέσμας πρὸς
    τὸ κατακαῦσαι αὐτά, τὸν δὲ σῖτον ⸀συναγάγετε εἰς τὴν ἀποθήκην μου.
translation:
  text: Let both grow together until the harvest, and at harvest time I will tell
    the reapers, ‘First collect the weeds and tie them into bundles to burn them,
    but gather the wheat into my storehouse.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'darnel weeds'; traditionally 'tares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφετε
  chosen: Let
  alternatives:
  - Allow
  - Leave
  lexicon: BDAG
  rationale: 'Aorist imperative of ἀφίημι here functions as a permissive command:
    ''let/allow.'' ''Let'' is concise and idiomatic in English for direct speech.'
- source_word: συναυξάνεσθαι
  chosen: grow together
  alternatives:
  - grow up together
  lexicon: BDAG
  rationale: The compound verb explicitly includes the idea of growing together. 'Grow
    together' preserves the συν- prefix without sounding wooden.
- source_word: ἀμφότερα
  chosen: both
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Refers to the two crops previously mentioned. 'Both' is the natural English
    equivalent.
- source_word: μέχρι τοῦ θερισμοῦ
  chosen: until the harvest
  alternatives:
  - until harvest
  lexicon: BDAG
  rationale: The article with θερισμός points to the harvest as a definite event in
    the parable. 'Until the harvest' preserves that sense.
- source_word: ἐν καιρῷ τοῦ θερισμοῦ
  chosen: at harvest time
  alternatives:
  - in the time of the harvest
  - when the harvest comes
  lexicon: BDAG
  rationale: καιρός denotes the appropriate or appointed time. 'At harvest time' is
    natural English and preserves the temporal nuance.
- source_word: θερισταῖς
  chosen: the reapers
  alternatives:
  - the harvesters
  lexicon: BDAG
  rationale: Either gloss is possible, but 'reapers' is the more established and precise
    agricultural term in English.
- source_word: Συλλέξατε
  chosen: collect
  alternatives:
  - gather together
  lexicon: BDAG
  rationale: The verb means to gather/collect together. 'Collect' avoids redundancy
    with the later συναγάγετε while still conveying the action clearly.
- source_word: πρῶτον
  chosen: First
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Marks sequence in the reapers' actions; 'First' is sufficient and direct.
- source_word: τὰ ζιζάνια
  chosen: the weeds
  alternatives:
  - the darnel weeds
  - the tares
  lexicon: BDAG
  rationale: ζιζάνια refers to noxious weeds, traditionally identified as darnel.
    'Weeds' is accessible modern English; 'tares' is traditional but archaic for most
    readers. The more specific identification is worth preserving in a footnote.
- source_word: δήσατε
  chosen: tie
  alternatives:
  - bind
  lexicon: BDAG
  rationale: The verb means bind/tie. 'Tie' is more natural in contemporary English
    while preserving the concrete action.
- source_word: εἰς δέσμας
  chosen: into bundles
  alternatives:
  - in bundles
  lexicon: BDAG
  rationale: δέσμη means bundle/sheaf. 'Into bundles' fits the motion implied by εἰς
    and the act of tying.
- source_word: πρὸς τὸ κατακαῦσαι αὐτά
  chosen: to burn them
  alternatives:
  - for burning them
  - so as to burn them up
  lexicon: BDAG
  rationale: The construction expresses purpose. κατακαίω can mean burn up/consume
    by fire, but 'to burn them' is sufficient here without overtranslating the aspect.
- source_word: τὸν δὲ σῖτον
  chosen: but gather the wheat
  alternatives:
  - but the wheat
  lexicon: BDAG
  rationale: σῖτος here refers to wheat rather than grain generically in contrast
    to the weeds. The adversative δέ is brought out with 'but' and the implied verbal
    action is supplied from the following imperative.
- source_word: συναγάγετε
  chosen: gather
  alternatives:
  - bring together
  - collect
  lexicon: BDAG
  rationale: A straightforward imperative meaning gather together. 'Gather' is idiomatic
    and distinct enough from earlier 'collect' to reflect the different Greek verbs.
- source_word: ἀποθήκην μου
  chosen: my storehouse
  alternatives:
  - my barn
  - my granary
  lexicon: BDAG
  rationale: ἀποθήκη denotes a storage place, often for grain. 'Storehouse' is broad
    enough to be accurate and avoids narrowing the image more than the Greek requires,
    while still fitting the agricultural context.
