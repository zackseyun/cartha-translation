theological_decisions:
- issue: Possible allusive imagery of birds lodging in a great tree
  chosen_reading: Retain the image literally without making the allusion explicit
    in the main text.
  alternative_readings:
  - Interpret the birds as symbolizing the nations or peoples finding shelter in God's
    kingdom
  rationale: The verse may echo OT kingdom-tree imagery (e.g., Ezekiel 17; Daniel
    4), but the Greek text itself presents the image without explicit interpretation.
    Following the translation philosophy, the wording preserves the theological resonance
    without importing an interpretive conclusion into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
