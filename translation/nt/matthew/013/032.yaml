id: MAT.13.32
reference: Matthew 13:32
source:
  edition: SBLGNT
  text: ὃ μικρότερον μέν ἐστιν πάντων τῶν σπερμάτων, ὅταν δὲ αὐξηθῇ μεῖζον τῶν λαχάνων
    ἐστὶν καὶ γίνεται δένδρον, ὥστε ἐλθεῖν τὰ πετεινὰ τοῦ οὐρανοῦ καὶ κατασκηνοῦν
    ἐν τοῖς κλάδοις αὐτοῦ.
translation:
  text: It is indeed smaller than all the seeds, but when it has grown, it is larger
    than the garden plants and becomes a tree, so that the birds of the sky come and
    nest in its branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of the air,' a traditional rendering of τὰ πετεινὰ τοῦ οὐρανοῦ.
    reason: lexical_alternative
  - marker: b
    text: The imagery of birds lodging in the branches may echo Old Testament pictures
      of a great kingdom tree (for example, Ezekiel 17:23; Daniel 4:12), but the verse
      does not state the symbolism explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: μικρότερον
  chosen: smaller
  alternatives:
  - the smallest
  lexicon: BDAG
  rationale: The form is comparative ('smaller'), not superlative. Although the idiom
    with πάντων can communicate a superlative sense in English, rendering it as 'smaller
    than all the seeds' preserves the Greek form more transparently.
- source_word: πάντων τῶν σπερμάτων
  chosen: than all the seeds
  alternatives:
  - than any seed
  - of all seeds
  lexicon: BDAG
  rationale: The genitive after the comparative is rendered with explicit English
    comparison. 'Seeds' is retained rather than narrowing to a technical agricultural
    category.
- source_word: μέν ... δέ
  chosen: indeed ... but
  alternatives:
  - on the one hand ... but
  - though ... yet
  lexicon: BDAG
  rationale: This pair marks contrast between the seed's small beginning and large
    outcome. 'Indeed ... but' preserves the discourse contrast in natural English.
- source_word: ὅταν ... αὐξηθῇ
  chosen: when it has grown
  alternatives:
  - when it grows
  - when it is grown
  lexicon: BDAG
  rationale: Aorist subjunctive with ὅταν indicates a future contingency viewed as
    a whole. 'When it has grown' captures the completed growth prior to the next clause.
- source_word: μεῖζον
  chosen: larger
  alternatives:
  - greater
  - bigger
  lexicon: BDAG
  rationale: '''Larger'' is natural modern English and fits the comparative contrast
    with ''smaller.'''
- source_word: τῶν λαχάνων
  chosen: than the garden plants
  alternatives:
  - than the vegetables
  - than the herbs
  lexicon: BDAG
  rationale: λάχανα refers to cultivated garden plants/herbs/vegetables. 'Garden plants'
    is broad, natural, and avoids the misleadingly narrow modern sense of 'herbs'
    or the overly specific 'vegetables.'
- source_word: γίνεται δένδρον
  chosen: becomes a tree
  alternatives:
  - becomes tree-like
  - becomes a large plant
  lexicon: BDAG
  rationale: The Greek states the result plainly. 'Becomes a tree' preserves the vivid
    image without softening it into approximation.
- source_word: ὥστε ἐλθεῖν
  chosen: so that ... come
  alternatives:
  - with the result that ... come
  - so as to allow ... to come
  lexicon: BDAG
  rationale: ὥστε with infinitive expresses result. 'So that' is idiomatic and preserves
    the consequential sense.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: A more literal rendering of οὐρανός here is 'sky.' 'Birds of the air'
    is traditional, but 'birds of the sky' better reflects the Greek while remaining
    natural.
- source_word: κατασκηνοῦν
  chosen: nest
  alternatives:
  - settle
  - dwell
  - make their nests
  lexicon: BDAG
  rationale: The verb here refers to taking lodging or nesting in branches. 'Nest'
    is concise and contextually appropriate with birds.
- source_word: ἐν τοῖς κλάδοις αὐτοῦ
  chosen: in its branches
  alternatives:
  - among its branches
  lexicon: BDAG
  rationale: A straightforward locative rendering. 'Its' matches the neuter antecedent
    and natural English usage for the plant/tree image.
