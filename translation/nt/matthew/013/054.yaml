id: MAT.13.54
reference: Matthew 13:54
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν εἰς τὴν πατρίδα αὐτοῦ ἐδίδασκεν αὐτοὺς ἐν τῇ συναγωγῇ αὐτῶν, ὥστε
    ἐκπλήσσεσθαι αὐτοὺς καὶ λέγειν· Πόθεν τούτῳ ἡ σοφία αὕτη καὶ αἱ δυνάμεις;
translation:
  text: And coming to his hometown, he was teaching them in their synagogue, so that
    they were astonished and said, “Where did this man get this wisdom and these powers?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mighty works”; that is, deeds of power, often understood as miracles.
    reason: lexical_alternative
lexical_decisions:
- source_word: πατρίδα
  chosen: hometown
  alternatives:
  - native place
  - homeland
  - country
  lexicon: BDAG
  rationale: In this narrative context, πατρίς refers to the place where Jesus grew
    up and is known locally, not to a nation-state. 'Hometown' is natural modern English
    and captures the local sense better than 'country' or the more wooden 'native
    place'.
- source_word: ἐδίδασκεν
  chosen: was teaching
  alternatives:
  - taught
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or in-progress action in past time. 'Was
    teaching' preserves that aspect more clearly than the simple past 'taught'.
- source_word: συναγωγῇ
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this Jewish setting the institutional and physical sense 'synagogue'
    is the standard and clearest rendering.
- source_word: ὥστε ἐκπλήσσεσθαι αὐτοὺς καὶ λέγειν
  chosen: so that they were astonished and said
  alternatives:
  - with the result that they were astonished and saying
  - so that they were amazed and saying
  lexicon: BDAG
  rationale: ὥστε introduces result. The infinitives express the outcome of his teaching.
    English idiom prefers finite verbs here. 'Astonished' is slightly stronger and
    more literal to ἐκπλήσσομαι than the more common 'amazed'.
- source_word: Πόθεν
  chosen: Where did ... get
  alternatives:
  - From where
  - How does ... have
  lexicon: BDAG
  rationale: Πόθεν asks about source or origin. In idiomatic English, 'Where did ...
    get' best conveys the sense of questioning the source of Jesus' wisdom and works.
- source_word: τούτῳ
  chosen: this man
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: The dative demonstrative here carries a somewhat distancing tone in the
    crowd's speech. 'This man' communicates that tone more naturally than the bare
    'this one' while remaining faithful to the source.
- source_word: σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering; it refers to extraordinary insight or teaching ability
    recognized by the hearers.
- source_word: δυνάμεις
  chosen: powers
  alternatives:
  - mighty works
  - miracles
  lexicon: BDAG
  rationale: δύναμεις literally means 'powers' and can denote miraculous deeds by
    metonymy. 'Powers' preserves the Greek term's lexical force and leaves the expression
    slightly open, while the context clearly implies extraordinary works. The common
    traditional rendering 'mighty works' is possible but less natural in contemporary
    English; 'miracles' is interpretive.
