theological_decisions:
- issue: Rendering of δυνάμεις in reference to Jesus' extraordinary works
  chosen_reading: powers
  alternative_readings:
  - mighty works
  - miracles
  rationale: The verse records the crowd's astonishment at Jesus' wisdom and supernatural
    activity without specifying a technical theology of miracles. Rendering δυνάμεις
    as 'powers' preserves the lexical sense and the text's own level of specificity,
    avoiding over-interpretation while still fitting orthodox Christological context.
  doctrine_reference: Translation philosophy §1, §3, §6
