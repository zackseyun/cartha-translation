theological_decisions:
- issue: Rendering of δοῦλοι in a parabolic household context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse does not make a doctrinal claim about slavery, but the translation
    philosophy prefers preserving the bonded nature of δοῦλος where salient. Because
    these figures belong to a master's household and act under his authority, 'slaves'
    best reflects the social relation without softening it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
- issue: Rendering of κύριε
  chosen_reading: Lord
  alternative_readings:
  - Master
  - sir
  rationale: The project's default for κύριος is 'Lord.' In this parable the term
    addresses the householder rather than directly making a christological claim,
    but there is no compelling contextual reason to depart from the default. Alternative
    nuance is preserved in lexical documentation.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος
