id: MAT.13.27
reference: Matthew 13:27
source:
  edition: SBLGNT
  text: προσελθόντες δὲ οἱ δοῦλοι τοῦ οἰκοδεσπότου εἶπον αὐτῷ· Κύριε, οὐχὶ καλὸν σπέρμα
    ⸀ἔσπειρας ἐν τῷ σῷ ἀγρῷ; πόθεν οὖν ἔχει ζιζάνια;
translation:
  text: So the slaves of the master of the house came to him and said, ‘Lord, did
    you not sow good seed in your field? Where then does it have weeds?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “tares”; the Greek term likely refers to darnel, a weed that resembles
      wheat in its early stages.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: came to him
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, naturally rendered as attendant action
    before εἶπον. 'Came to him' is idiomatic modern English and preserves the movement
    toward the householder.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    In this parable setting these are household laborers under a master; 'slaves'
    preserves the bonded status more transparently than 'servants,' while remaining
    natural in context.
- source_word: οἰκοδεσπότου
  chosen: master of the house
  alternatives:
  - householder
  - landowner
  - master
  lexicon: BDAG
  rationale: Literally a house-master/householder. 'Master of the house' preserves
    both the domestic authority nuance and the relation to the δοῦλοι better than
    the more opaque 'householder.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - sir
  lexicon: BDAG
  rationale: Vocative κύριε is best rendered 'Lord' in keeping with the project's
    default for κύριος. In this parabolic dialogue it functions as a respectful address
    to the master; 'Master' is possible but the default rendering should be maintained
    unless context strongly requires otherwise.
- source_word: οὐχὶ
  chosen: did you not
  alternatives:
  - didn't you
  - surely you did
  lexicon: BDAG
  rationale: Introduces a question expecting a positive answer. 'Did you not' preserves
    that force without becoming colloquial.
- source_word: καλὸν σπέρμα
  chosen: good seed
  alternatives:
  - fine seed
  lexicon: BDAG
  rationale: Standard agricultural sense; concise and natural.
- source_word: ἔσπειρας
  chosen: sow
  alternatives:
  - plant
  lexicon: BDAG
  rationale: σπείρω specifically means 'sow'; 'plant' would be broader and less precise.
    English past auxiliary with infinitive ('did you not sow') fits the interrogative
    structure.
- source_word: ἐν τῷ σῷ ἀγρῷ
  chosen: in your field
  alternatives:
  - in your own field
  lexicon: BDAG
  rationale: σῷ marks possession; English 'your field' sufficiently conveys it. Adding
    'own' is possible but unnecessary.
- source_word: πόθεν οὖν
  chosen: Where then
  alternatives:
  - From where then
  - How then
  lexicon: BDAG
  rationale: πόθεν asks source/origin; 'Where then' is idiomatic and preserves the
    inferential οὖν.
- source_word: ἔχει
  chosen: does it have
  alternatives:
  - are there
  - did it get
  lexicon: BDAG
  rationale: The Greek literally says 'it has.' Here the subject is the field, so
    'does it have' keeps the personification/possessive structure of the Greek more
    closely than restructuring to 'are there.'
- source_word: ζιζάνια
  chosen: weeds
  alternatives:
  - darnel
  - tares
  lexicon: BDAG
  rationale: ζιζάνια refers to noxious weeds, traditionally 'tares,' likely darnel.
    'Weeds' is the clearest modern English in the main text; more specific traditional/rendering
    alternatives are worth preserving in a footnote.
