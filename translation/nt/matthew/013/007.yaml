id: MAT.13.7
reference: Matthew 13:7
source:
  edition: SBLGNT
  text: ἄλλα δὲ ἔπεσεν ἐπὶ τὰς ἀκάνθας, καὶ ἀνέβησαν αἱ ἄκανθαι καὶ ⸀ἔπνιξαν αὐτά.
translation:
  text: Other seeds fell among the thorns, and the thorns came up and choked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally 'fell on the thorns'; rendered 'among the thorns' for natural
      English in this agricultural context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  chosen: Other seeds
  alternatives:
  - Others
  - Other ones
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally in the parable context, referring
    back implicitly to seed from the preceding verses. Supplying 'seeds' in English
    makes the referent clear and natural without adding new content.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the sequence of the
    parable rather than marking strong contrast. 'And' fits readable modern English.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was sown
  - dropped
  lexicon: BDAG
  rationale: Aorist of πίπτω is most directly 'fell.' Although the broader parable
    concerns sowing, the Greek verb here is not 'was sown' but 'fell,' which should
    be preserved.
- source_word: ἐπὶ τὰς ἀκάνθας
  chosen: among the thorns
  alternatives:
  - on the thorns
  - upon the thornbushes
  lexicon: BDAG
  rationale: Although ἐπί with accusative is literally 'upon/on,' in this agricultural
    context idiomatic English is 'among the thorns,' reflecting seed falling into
    thorny growth/ground rather than perched on top of thorns.
- source_word: ἀκάνθας / ἄκανθαι
  chosen: thorns
  alternatives:
  - thornbushes
  - thorn plants
  lexicon: BDAG
  rationale: '''Thorns'' is the standard and natural rendering in this parable, covering
    both the place where the seed fell and the plants that later grew up.'
- source_word: ἀνέβησαν
  chosen: came up
  alternatives:
  - grew up
  - sprang up
  lexicon: BDAG
  rationale: The verb ἀναβαίνω literally means 'go up' or 'come up.' 'Came up' preserves
    the imagery of upward growth while remaining natural English. 'Grew up' is possible
    but slightly more interpretive.
- source_word: ἔπνιξαν
  chosen: choked
  alternatives:
  - crowded out
  - strangled
  lexicon: BDAG
  rationale: πνίγω means to choke or strangle. 'Choked' is the established and accurate
    agricultural metaphor here, preserving the vividness of the Greek.
- source_word: αὐτά
  chosen: them
  alternatives:
  - the seeds
  - it
  lexicon: BDAG
  rationale: Neuter plural pronoun referring back to the implicit seeds/plants from
    the parable. 'Them' is the natural English equivalent; repeating 'the seeds' would
    be more explicit than the Greek.
