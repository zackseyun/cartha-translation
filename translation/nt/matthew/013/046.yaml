id: MAT.13.46
reference: Matthew 13:46
source:
  edition: SBLGNT
  text: ⸂εὑρὼν δὲ⸃ ἕνα πολύτιμον μαργαρίτην ἀπελθὼν πέπρακεν πάντα ὅσα εἶχεν καὶ ἠγόρασεν
    αὐτόν.
translation:
  text: and having found one pearl of great value, he went away, sold all that he
    had, and bought it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a precious pearl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρὼν δὲ
  chosen: and having found
  alternatives:
  - now having found
  - but having found
  - when he found
  lexicon: BDAG
  rationale: The aorist participle εὑρὼν is best represented as prior action to the
    main verbs. δέ here is lightly connective rather than strongly adversative, so
    'and' fits smooth English while preserving the narrative flow.
- source_word: ἕνα
  chosen: one
  alternatives:
  - a single
  lexicon: BDAG
  rationale: The numeral is explicit in Greek and should be retained. It highlights
    the singular object of exceptional worth.
- source_word: πολύτιμον
  chosen: of great value
  alternatives:
  - precious
  - very valuable
  lexicon: BDAG
  rationale: '''Of great value'' communicates the sense clearly in modern English
    and avoids slightly archaic or overly traditional phrasing while preserving the
    pearl''s exceptional worth.'
- source_word: μαργαρίτην
  chosen: pearl
  lexicon: BDAG
  rationale: Standard lexical meaning; no contextual reason to vary.
- source_word: ἀπελθὼν
  chosen: he went away
  alternatives:
  - going away
  - he departed
  lexicon: BDAG
  rationale: The participle is naturally rendered with a finite verb in English for
    readability. 'Went away' preserves the sequence of action without sounding formalistic.
- source_word: πέπρακεν
  chosen: sold
  alternatives:
  - has sold
  lexicon: BDAG
  rationale: The perfect form can be rendered idiomatically as a simple past in this
    narrative sequence. English narrative style prefers 'sold' here, while the sense
    of completed action remains intact.
- source_word: πάντα ὅσα εἶχεν
  chosen: all that he had
  alternatives:
  - everything he had
  - all the things he possessed
  lexicon: BDAG
  rationale: This is a natural and sufficiently formal rendering of the idiom, preserving
    the totality expressed by πάντα and the relative clause ὅσα εἶχεν.
- source_word: ἠγόρασεν
  chosen: bought
  alternatives:
  - purchased
  lexicon: BDAG
  rationale: '''Bought'' is the plain, natural English equivalent and suits the translation''s
    readable modern style.'
- source_word: αὐτόν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: Although αὐτόν is grammatically masculine, it refers back to μαργαρίτην
    ('pearl'), an inanimate object. English properly uses 'it' for the referent rather
    than mechanically preserving grammatical gender.
