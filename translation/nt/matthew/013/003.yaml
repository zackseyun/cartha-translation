theological_decisions:
- issue: Rendering of Ἰδοὺ in direct discourse
  chosen_reading: Look
  alternative_readings:
  - Behold
  - See
  rationale: This is not a doctrinally contested term, but it affects tone and readability.
    'Look' preserves the discourse force of sudden attention in contemporary English
    without archaic register.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
