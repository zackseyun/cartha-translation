id: MAT.13.3
reference: Matthew 13:3
source:
  edition: SBLGNT
  text: καὶ ἐλάλησεν αὐτοῖς πολλὰ ἐν παραβολαῖς λέγων· Ἰδοὺ ἐξῆλθεν ὁ σπείρων τοῦ
    σπείρειν.
translation:
  text: 'And he spoke many things to them in parables, saying: “Look, the sower went
    out to sow.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, the sower went out to sow.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: Aorist of λαλέω commonly means 'speak' or 'talk.' 'Spoke' fits natural
    English and preserves the verbal distinction without overinterpreting manner.
- source_word: πολλὰ
  chosen: many things
  alternatives:
  - much
  lexicon: BDAG
  rationale: 'Neuter plural accusative functions substantivally: ''many things.''
    This is more precise than the idiomatic but less explicit ''much.'''
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here indicates manner or medium. 'In
    parables' is the standard and clear rendering in English.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of speech is naturally rendered
    'saying,' preserving the Greek flow into the quotation.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getting particle. 'Look' preserves the force in
    readable modern English better than the archaic 'Behold,' while remaining more
    vivid than 'See.'
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι means 'went out' in this narrative setting. 'Went
    forth' is too archaic; 'came out' would shift deictic perspective.
- source_word: ὁ σπείρων
  chosen: the sower
  alternatives:
  - the one sowing
  - the one who sows
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. 'The sower'
    is idiomatic and matches the parable's stock figure in English.
- source_word: τοῦ σπείρειν
  chosen: to sow
  alternatives:
  - for sowing
  lexicon: BDAG
  rationale: The genitive articular infinitive after a verb of motion commonly expresses
    purpose. 'To sow' is the clearest English rendering of purpose here.
