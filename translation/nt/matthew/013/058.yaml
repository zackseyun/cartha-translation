theological_decisions:
- issue: Whether the verse implies inability or simple non-performance in response
    to unbelief
  chosen_reading: 'The translation renders the statement as non-performance: ''he
    did not do many mighty works there because of their unbelief.'''
  alternative_readings:
  - A more interpretive rendering could suggest inability, e.g. 'he could not do many
    miracles there' (cf. Mark 6:5 in some translations).
  rationale: The Greek text here uses οὐκ ἐποίησεν ('he did not do'), not a verb of
    inability. To preserve theological tension and avoid importing a stronger claim
    than Matthew states, the translation keeps the wording at the level of action
    rather than inability.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
