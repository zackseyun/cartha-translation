id: MAT.13.58
reference: Matthew 13:58
source:
  edition: SBLGNT
  text: καὶ οὐκ ἐποίησεν ἐκεῖ δυνάμεις πολλὰς διὰ τὴν ἀπιστίαν αὐτῶν.
translation:
  text: And he did not do many mighty works there because of their unbelief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many miracles' or 'many works of power.' The Greek term refers to deeds
      of power and in this context points to miraculous works.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - performed
  - worked
  lexicon: BDAG
  rationale: ποιέω is a broad verb meaning 'do/make.' In this collocation with δυνάμεις,
    English idiom is best preserved with 'did' rather than a more wooden 'made.'
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Straightforward adverb of place, referring to that location in his hometown
    context.
- source_word: δυνάμεις πολλὰς
  chosen: many mighty works
  alternatives:
  - many miracles
  - many works of power
  lexicon: BDAG
  rationale: δύναμις in Gospel miracle contexts commonly denotes deeds of power. 'Mighty
    works' preserves the lexical link to power without flattening it to the more interpretive
    'miracles,' while remaining natural English. πολλὰς is rendered 'many.'
- source_word: διὰ τὴν ἀπιστίαν αὐτῶν
  chosen: because of their unbelief
  alternatives:
  - because of their lack of faith
  lexicon: BDAG
  rationale: διά with the accusative expresses cause here, hence 'because of.' ἀπιστία
    denotes unbelief or lack of faith. 'Unbelief' is the stronger and more direct
    rendering, matching the negative force of the noun and fitting the context of
    rejection.
- source_word: καὶ οὐκ
  chosen: And he did not
  alternatives:
  - So he did not
  - And he was not doing
  lexicon: BDAG
  rationale: καί continues the narrative, and οὐκ negates the aorist verb. 'And he
    did not' is a natural narrative rendering without adding inferential force beyond
    the Greek.
