theological_decisions:
- issue: Specific identification of ζιζάνια
  chosen_reading: Render generally as 'weeds' in the main text
  alternative_readings:
  - darnel
  - tares
  rationale: The verse itself does not require a botanically precise identification,
    and optimal equivalence favors accessible English. Because the traditional and
    more specific options may matter for study, they are preserved in a footnote rather
    than elevated into the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
