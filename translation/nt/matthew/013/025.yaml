id: MAT.13.25
reference: Matthew 13:25
source:
  edition: SBLGNT
  text: ἐν δὲ τῷ καθεύδειν τοὺς ἀνθρώπους ἦλθεν αὐτοῦ ὁ ἐχθρὸς καὶ ⸀ἐπέσπειρεν ζιζάνια
    ἀνὰ μέσον τοῦ σίτου καὶ ἀπῆλθεν.
translation:
  text: But while the men were sleeping, his enemy came and sowed weeds among the
    wheat and went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'darnel'; traditionally 'tares.' The Greek ζιζάνια refers to harmful
      weeds sown among grain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δὲ τῷ καθεύδειν
  chosen: while ... were sleeping
  alternatives:
  - when ... were sleeping
  - during ... sleep
  lexicon: BDAG
  rationale: The preposition ἐν with the articular infinitive καθεύδειν expresses
    contemporaneous time. 'While ... were sleeping' is natural modern English and
    preserves the temporal force better than a more wooden rendering.
- source_word: τοὺς ἀνθρώπους
  chosen: the men
  alternatives:
  - the people
  - everyone
  lexicon: BDAG
  rationale: ἄνθρωποι can mean people/humans generally, but in this agricultural scene
    it most naturally refers to the workers/men associated with the field. 'The men'
    is gender-accurate to the Greek form and fits the narrative context better than
    the broader 'people.'
- source_word: αὐτοῦ ὁ ἐχθρός
  chosen: his enemy
  alternatives:
  - the enemy of him
  - his adversary
  lexicon: BDAG
  rationale: The genitive pronoun αὐτοῦ is possessive with ὁ ἐχθρός. 'His enemy' is
    the idiomatic English equivalent and preserves the personal opposition in the
    parable.
- source_word: ἐπέσπειρεν
  chosen: sowed
  alternatives:
  - oversowed
  - scattered seed
  lexicon: BDAG
  rationale: ἐπισπείρω means to sow in addition or over/among what is already sown.
    In context, 'sowed' communicates the action clearly, while the accompanying phrase
    'among the wheat' carries the hostile intermingling.
- source_word: ζιζάνια
  chosen: weeds
  alternatives:
  - darnel
  - tares
  lexicon: BDAG
  rationale: ζιζάνια refers to noxious weeds, traditionally identified as darnel.
    'Weeds' is the clearest main-text rendering for modern readers. 'Tares' is traditional
    but archaic; 'darnel' is more specific but less widely understood, so it is preserved
    in a footnote.
- source_word: ἀνὰ μέσον τοῦ σίτου
  chosen: among the wheat
  alternatives:
  - in the midst of the wheat
  - between the wheat
  lexicon: BDAG
  rationale: The phrase indicates distribution in the middle of or among the wheat
    crop. 'Among the wheat' is idiomatic and sufficiently precise.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - left
  lexicon: BDAG
  rationale: ἀπέρχομαι here marks the enemy's departure after the covert act. 'Went
    away' is natural English and preserves the narrative movement.
