theological_decisions:
- issue: Rendering αἰών
  chosen_reading: this age
  alternative_readings:
  - this world
  rationale: The Greek noun αἰών ordinarily denotes an age/era rather than the physical
    world. 'This age' preserves the temporal and moral contrast common in the New
    Testament without importing a cosmological sense not explicit here. Because 'this
    world' is familiar and possible in context, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Personal vs. impersonal referent in the parable explanation
  chosen_reading: he becomes unfruitful
  alternative_readings:
  - it becomes unfruitful
  - the word becomes unfruitful
  rationale: Although the imagery begins with what is sown, Jesus' explanation identifies
    the referent as 'the one who hears the word.' Rendering the final clause personally
    preserves the explanatory shift and avoids suggesting that the word itself fails
    intrinsically.
  doctrine_reference: Translation philosophy §1, §5
