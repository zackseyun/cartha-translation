id: MAT.13.22
reference: Matthew 13:22
source:
  edition: SBLGNT
  text: ὁ δὲ εἰς τὰς ἀκάνθας σπαρείς, οὗτός ἐστιν ὁ τὸν λόγον ἀκούων, καὶ ἡ μέριμνα
    τοῦ αἰῶνος ⸀τούτου καὶ ἡ ἀπάτη τοῦ πλούτου συμπνίγει τὸν λόγον, καὶ ἄκαρπος γίνεται.
translation:
  text: And the one sown among the thorns—this is the one who hears the word, but
    the चिंता of this age and the deceitfulness of wealth choke the word, and he becomes
    unfruitful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cares of this world.' The Greek more literally says 'the worries
      of this age.'
    reason: alternative_reading
  - marker: b
    text: Or 'the deceit of riches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἰς τὰς ἀκάνθας σπαρείς
  chosen: the one sown among the thorns
  alternatives:
  - the one sown into the thorns
  - what was sown among the thorns
  lexicon: BDAG
  rationale: The masculine singular participle with article refers to the person/seed-case
    in the parable explanation. 'Among the thorns' is idiomatic English for εἰς with
    this imagery and matches the explanatory sense better than a wooden 'into.' 'The
    one' preserves the personal referent in the interpretation.
- source_word: ὁ τὸν λόγον ἀκούων
  chosen: the one who hears the word
  alternatives:
  - the one hearing the word
  lexicon: BDAG
  rationale: Present participle ἀκούων is naturally rendered in English as a relative
    clause. 'Word' is retained for λόγον in this parabolic context, referring to the
    proclaimed message.
- source_word: μέριμνα
  chosen: care
  alternatives:
  - anxiety
  - worry
  lexicon: BDAG
  rationale: μέριμνα denotes anxious care or worry. 'Care' here was considered but
    'worry' or 'anxiety' better communicates the negative force in modern English.
    However the main text uses a more idiomatic phrase with the genitive construction.
- source_word: ἡ μέριμνα τοῦ αἰῶνος τούτου
  chosen: the worries of this age
  alternatives:
  - the anxiety of this age
  - the cares of this world
  lexicon: BDAG
  rationale: The phrase denotes worldly/age-bound concerns. αἰών is more precisely
    'age' than 'world,' so 'this age' is preferred in the main text. Because μέριμνα
    has a collective sense in English here, plural 'worries' is idiomatic and conveys
    the practical force.
- source_word: ἀπάτη τοῦ πλούτου
  chosen: the deceitfulness of wealth
  alternatives:
  - the deceit of riches
  - the deception of wealth
  lexicon: BDAG
  rationale: ἀπάτη is 'deceit/deception'; the genitive construction indicates wealth's
    deceptive character. 'Wealth' is more natural modern English than 'riches' while
    preserving the sense.
- source_word: συμπνίγει
  chosen: choke
  alternatives:
  - chokes
  - strangles
  - crowds out
  lexicon: BDAG
  rationale: The verb literally means to choke together or crowd so as to suffocate.
    In this agricultural metaphor, 'choke' is the standard and vivid rendering. In
    the final English text it is inflected as 'choke' because the compound subject
    is plural in English ('worries... and deceitfulness...').
- source_word: ἄκαρπος γίνεται
  chosen: he becomes unfruitful
  alternatives:
  - it becomes unfruitful
  - he proves unfruitful
  lexicon: BDAG
  rationale: 'Given the personalizing explanation (''the one who hears''), the masculine
    singular is best represented personally: ''he becomes unfruitful.'' This preserves
    the parable''s movement from seed imagery to the hearer represented by the seed.'
