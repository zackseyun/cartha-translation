id: MAT.13.16
reference: Matthew 13:16
source:
  edition: SBLGNT
  text: ὑμῶν δὲ μακάριοι οἱ ὀφθαλμοὶ ὅτι βλέπουσιν, καὶ τὰ ὦτα ὑμῶν ὅτι ⸀ἀκούουσιν.
translation:
  text: But blessed are your eyes, because they see, and your ears, because they hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for they see ... for they hear.' The Greek conjunction can be rendered
      either way here.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement about those who do not see
    or hear; 'But' best conveys the adversative force in context.
- source_word: μακάριοι
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: Standard rendering in beatitude-like contexts, preserving the sense of
    divine favor rather than mere subjective happiness.
- source_word: οἱ ὀφθαλμοὶ
  chosen: your eyes
  alternatives:
  - the eyes of you
  lexicon: BDAG
  rationale: English naturally fronts the possessive; the Greek structure emphasizes
    the disciples' own eyes as blessed.
- source_word: ὅτι βλέπουσιν
  chosen: because they see
  alternatives:
  - for they see
  - that they see
  lexicon: BDAG
  rationale: Here ὅτι is causal, giving the reason the eyes are called blessed. 'Because'
    is clear modern English.
- source_word: τὰ ὦτα ὑμῶν
  chosen: your ears
  alternatives:
  - the ears of you
  lexicon: BDAG
  rationale: Natural English rendering of the possessive noun phrase, parallel to
    'your eyes.'
- source_word: ὅτι ἀκούουσιν
  chosen: because they hear
  alternatives:
  - for they hear
  - that they hear
  lexicon: BDAG
  rationale: Again ὅτι is best taken causally. 'Hear' preserves the straightforward
    sensory verb and the parallelism with 'see.'
- source_word: βλέπουσιν / ἀκούουσιν
  chosen: see / hear
  alternatives:
  - perceive / listen
  lexicon: BDAG
  rationale: The immediate contrast is with physical and spiritual reception in context.
    'See' and 'hear' preserve the lexical simplicity while allowing the broader Matthean
    theological resonance to remain implicit rather than overinterpreted.
