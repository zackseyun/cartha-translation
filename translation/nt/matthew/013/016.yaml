theological_decisions:
- issue: Whether to make the seeing and hearing explicitly spiritual in the translation
  chosen_reading: Retain the literal sensory language 'see' and 'hear' without adding
    'understand' or 'receive.'
  alternative_readings:
  - But blessed are your eyes, because they perceive, and your ears, because they
    understand
  rationale: In context Jesus contrasts the disciples with those who see and hear
    without understanding, but this verse itself states only that their eyes see and
    ears hear. Preserving the literal wording maintains the theological tension and
    lets the context supply the deeper implication.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
