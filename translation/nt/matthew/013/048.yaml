id: MAT.13.48
reference: Matthew 13:48
source:
  edition: SBLGNT
  text: ἣν ὅτε ἐπληρώθη ἀναβιβάσαντες ἐπὶ τὸν αἰγιαλὸν καὶ καθίσαντες συνέλεξαν τὰ
    καλὰ εἰς ⸀ἄγγη, τὰ δὲ σαπρὰ ἔξω ἔβαλον.
translation:
  text: When it was filled, they pulled it up onto the shore, sat down, and gathered
    the good fish into containers, but threw the rotten ones out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vessels.' The Greek term is a general word for containers, not necessarily
      baskets.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bad ones.' The Greek word can mean 'rotten,' 'spoiled,' or more
      generally 'worthless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  chosen: it
  alternatives:
  - which
  lexicon: BDAG
  rationale: Refers back to the net in the preceding verse. English naturally uses
    the resumptive pronoun 'it' rather than repeating 'which' at the start of the
    sentence.
- source_word: ἐπληρώθη
  chosen: was filled
  alternatives:
  - was full
  - was filled up
  lexicon: BDAG
  rationale: Passive aorist of πληρόω; 'was filled' is the most direct and natural
    rendering in context of a net full of fish.
- source_word: ἀναβιβάσαντες
  chosen: pulled it up
  alternatives:
  - hauled it up
  - brought it up
  lexicon: BDAG
  rationale: The participle describes drawing the net upward from the water to land.
    'Pulled it up' is clear modern English; 'hauled it up' is possible but slightly
    more idiomatic than necessary.
- source_word: ἐπὶ τὸν αἰγιαλόν
  chosen: onto the shore
  alternatives:
  - to the beach
  - to the seashore
  lexicon: BDAG
  rationale: αἰγιαλός denotes shore/beach. 'Shore' fits the fishing context and avoids
    over-specifying a sandy beach.
- source_word: καθίσαντες
  chosen: sat down
  alternatives:
  - having sat down
  - seated themselves
  lexicon: BDAG
  rationale: Aorist participle indicating the next action in sequence. 'Sat down'
    is idiomatic and preserves the narrative flow.
- source_word: συνέλεξαν
  chosen: gathered
  alternatives:
  - collected
  lexicon: BDAG
  rationale: The verb means to gather together or collect. 'Gathered' is natural and
    fits the sorting imagery.
- source_word: τὰ καλὰ
  chosen: the good fish
  alternatives:
  - the good ones
  - the good
  lexicon: BDAG
  rationale: Although 'fish' is implied rather than explicit, supplying it in English
    clarifies the referent and matches the fishing context without adding new content.
- source_word: εἰς ἄγγη
  chosen: into containers
  alternatives:
  - into vessels
  - into baskets
  lexicon: BDAG
  rationale: ἄγγος is a generic term for container or vessel. 'Containers' is broad
    and accurate; 'baskets' is too specific, and 'vessels' sounds less natural in
    contemporary English.
- source_word: τὰ δὲ σαπρά
  chosen: the rotten ones
  alternatives:
  - the bad ones
  - the spoiled ones
  lexicon: BDAG
  rationale: σαπρός commonly means rotten, spoiled, or worthless. 'Rotten' preserves
    the concrete image and evaluative force better than the flatter 'bad.'
- source_word: ἔξω ἔβαλον
  chosen: threw ... out
  alternatives:
  - cast ... out
  - threw outside
  lexicon: BDAG
  rationale: The combination naturally means to throw out/outside. 'Threw ... out'
    is idiomatic modern English and preserves the force of rejection.
