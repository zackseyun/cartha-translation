theological_decisions:
- issue: Interpretation of the sorting imagery in the parable
  chosen_reading: Render the verse concretely as a fishing scene without importing
    the later allegorical explanation into the translation itself.
  alternative_readings:
  - Translate with more interpretive wording that anticipates final judgment
  rationale: The verse itself narrates the parable image; the theological explanation
    comes in the following verses. To preserve theological tension and avoid importing
    interpretation into the main text, the translation remains at the level of the
    image.
  doctrine_reference: Translation philosophy §3
