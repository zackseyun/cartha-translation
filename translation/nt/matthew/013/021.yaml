id: MAT.13.21
reference: Matthew 13:21
source:
  edition: SBLGNT
  text: οὐκ ἔχει δὲ ῥίζαν ἐν ἑαυτῷ ἀλλὰ πρόσκαιρός ἐστιν, γενομένης δὲ θλίψεως ἢ διωγμοῦ διὰ τὸν λόγον εὐθὺς σκανδαλίζεται.
translation:
  text: Yet he has no root in himself, but is temporary. When affliction or persecution arises because of the word, he immediately falls away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stumbles' or 'is offended'; the Greek verb can mean to be caused to stumble or to take offense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Yet he has no root in himself, but is temporary; and when affliction or persecution arises because of the word, he immediately falls away.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ῥίζαν
  chosen: root
  alternatives:
  - deep root
  - rootedness
  lexicon: BDAG
  rationale: Literal agricultural metaphor should be preserved, matching the parable context. 'Root' is concise and natural in English.
- source_word: ἐν ἑαυτῷ
  chosen: in himself
  alternatives:
  - within himself
  lexicon: BDAG
  rationale: A direct rendering preserves the reflexive force and the personal/internal sense without overinterpreting.
- source_word: πρόσκαιρός
  chosen: temporary
  alternatives:
  - short-lived
  - lasting only for a time
  lexicon: BDAG
  rationale: Conveys endurance only for a limited time in readable modern English. 'Temporary' is concise and fits the contrast with having root.
- source_word: γενομένης ... θλίψεως ἢ διωγμοῦ
  chosen: when affliction or persecution arises
  alternatives:
  - when trouble or persecution happens
  - when tribulation or persecution comes
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally in English. 'Affliction' for θλῖψις preserves the pressure/distress sense without archaic 'tribulation'; 'arises' captures the eventive force of γενομένης.
- source_word: θλίψεως
  chosen: affliction
  alternatives:
  - tribulation
  - trouble
  - distress
  lexicon: BDAG
  rationale: '''Affliction'' is a clear modern equivalent that retains seriousness and avoids overly technical or archaic diction.'
- source_word: διωγμοῦ
  chosen: persecution
  alternatives:
  - harassment
  lexicon: BDAG
  rationale: Standard and precise rendering for hostile pursuit because of allegiance to the message.
- source_word: διὰ τὸν λόγον
  chosen: because of the word
  alternatives:
  - on account of the word
  - because of the message
  lexicon: BDAG
  rationale: '''The word'' is a natural Gospel expression and likely refers to the proclaimed message from the parable. It preserves the lexical link to λόγος while remaining understandable.'
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  lexicon: BDAG
  rationale: Captures the promptness emphasized in the parable and matches common Synoptic usage.
- source_word: σκανδαλίζεται
  chosen: falls away
  alternatives:
  - stumbles
  - is caused to stumble
  - takes offense
  lexicon: BDAG
  rationale: In this context of initial reception followed by collapse under pressure, 'falls away' best communicates the resulting apostasy-like failure rather than mere emotional offense. The more literal 'stumbles' is preserved in a footnote because the Greek term can carry that nuance.
- source_word: δὲ
  chosen: yet
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: The particle marks contrast with the prior description; 'yet' reads smoothly in English at the verse opening.
