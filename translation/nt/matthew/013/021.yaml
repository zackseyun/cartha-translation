theological_decisions:
- issue: Rendering of σκανδαλίζεται in a discipleship/parabolic context
  chosen_reading: falls away
  alternative_readings:
  - stumbles
  - is offended
  rationale: The verse describes a person who receives the word with joy but does not endure under pressure. 'Falls away' best expresses the practical result in context without importing a full doctrinal system about apostasy. The lexical alternatives are preserved in a footnote to maintain transparency and theological tension where the Greek term is broader.
  doctrine_reference: Preserve theological tension rather than resolve it.
