  from: Yet he has no root in himself, but is temporary; and when affliction or persecution arises because of the word, he immediately falls away.
  to: Yet he has no root in himself, but is temporary. When affliction or persecution arises because of the word, he immediately falls away.
  rationale: The current punctuation, using a semicolon followed by 'and' to connect an independent clause to a structure beginning with a dependent clause ('when...'), is grammatically awkward in English. A semicolon should typically join two closely related independent clauses. Breaking the verse into two sentences creates a cleaner, more natural flow in English, improving readability without losing the logical connection between the person's internal state and the subsequent event.
