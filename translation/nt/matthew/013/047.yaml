theological_decisions:
- issue: Meaning of 'kingdom of heaven'
  chosen_reading: Retain the Matthean phrase 'kingdom of heaven' without paraphrasing
    it as 'kingdom of God' or 'reign of God.'
  alternative_readings:
  - kingdom of God
  - reign of heaven
  rationale: Matthew's distinctive wording should be preserved unless context requires
    explanation. No doctrinal issue is resolved by substituting another phrase here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
