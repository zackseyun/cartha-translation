id: MAT.13.47
reference: Matthew 13:47
source:
  edition: SBLGNT
  text: Πάλιν ὁμοία ἐστὶν ἡ βασιλεία τῶν οὐρανῶν σαγήνῃ βληθείσῃ εἰς τὴν θάλασσαν
    καὶ ἐκ παντὸς γένους συναγαγούσῃ·
translation:
  text: Again, the kingdom of heaven is like a dragnet cast into the sea and gathering
    fish from every kind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a net'; the Greek term refers more specifically to a large dragnet or
      seine.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gathering from every kind'; 'fish' is implied by the fishing
      image.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Once more
  lexicon: BDAG
  rationale: Adverb marking another parable in sequence; 'Again' is natural and concise
    in English.
- source_word: ὁμοία ἐστὶν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Standard comparative formula in Matthew's kingdom parables; 'is like'
    is idiomatic and preserves the simile.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the reign of heaven
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Traditional Matthean expression corresponding to 'kingdom of God'; 'kingdom
    of heaven' is both accurate and recognizable. 'Reign' is possible but less natural
    here.
- source_word: σαγήνῃ
  chosen: a dragnet
  alternatives:
  - a net
  - a seine net
  lexicon: BDAG
  rationale: Refers specifically to a large net drawn through the water; 'dragnet'
    best captures the type more precisely than the generic 'net'.
- source_word: βληθείσῃ
  chosen: cast
  alternatives:
  - thrown
  lexicon: BDAG
  rationale: Aorist passive participle modifying 'dragnet'; 'cast' is idiomatic for
    nets in English and fits the fishing context.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the lake
  lexicon: BDAG
  rationale: Literal rendering of the phrase. Although the Sea of Galilee is a lake,
    the Greek says 'sea,' and the translation should preserve the source wording.
- source_word: καὶ ... συναγαγούσῃ
  chosen: and gathering
  alternatives:
  - and collecting
  - which gathered
  lexicon: BDAG
  rationale: Presenting the participial action in smooth English while preserving
    the net's function/result. 'Gathering' keeps the verbal imagery.
- source_word: ἐκ παντὸς γένους
  chosen: from every kind
  alternatives:
  - of every kind
  - from every sort
  lexicon: BDAG
  rationale: γένους here refers to kinds or sorts, especially of fish in context.
    'From every kind' preserves the preposition ἐκ and anticipates the implied catch.
- source_word: ἐκ παντὸς γένους συναγαγούσῃ
  chosen: gathering fish from every kind
  alternatives:
  - gathering some of every kind
  - collecting of every kind
  lexicon: BDAG
  rationale: The Greek leaves the object implicit; in English, 'fish' is naturally
    supplied from the fishing context for clarity without adding interpretive content
    beyond what the image plainly implies.
