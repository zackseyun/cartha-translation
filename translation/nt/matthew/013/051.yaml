id: MAT.13.51
reference: Matthew 13:51
source:
  edition: SBLGNT
  text: ⸀Συνήκατε ταῦτα πάντα; λέγουσιν αὐτῷ· ⸀Ναί.
translation:
  text: Have you understood all these things? They said to him, “Yes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do you understand all these things?”
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνήκατε
  chosen: Have you understood
  alternatives:
  - Do you understand
  - Have you grasped
  lexicon: BDAG
  rationale: 'Aorist indicative second plural in a question naturally looks to a completed
    act of comprehension up to this point: ''Have you understood.'' ''Do you understand''
    is possible in smoother English but weakens the aspectual force; ''grasped'' is
    interpretive.'
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these
  lexicon: BDAG
  rationale: The combination of demonstrative plus πᾶς in the neuter plural is best
    represented explicitly as 'all these things,' referring to the teachings/parables
    just given. 'All this' is idiomatic but slightly less formally transparent.
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They say to him
  lexicon: BDAG
  rationale: Although the Greek uses a present-form historical present ('they say'),
    English narrative style normally renders this as simple past for readability in
    optimal equivalence. The indirect object αὐτῷ is retained as 'to him.'
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Yes, Lord
  lexicon: BDAG
  rationale: The Greek text here contains only the affirmative particle ναί. No title
    such as 'Lord' should be added, since it is absent from the source.
