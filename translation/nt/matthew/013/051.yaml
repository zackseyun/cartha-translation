theological_decisions:
- issue: Whether to expand the disciples' reply with a reverential title
  chosen_reading: Retain the simple reply 'Yes.'
  alternative_readings:
  - Yes, Lord.
  rationale: Some translation traditions expand the response, likely influenced by
    other passages or harmonizing tendencies, but the Greek text here has only ναί.
    To avoid importing doctrinal or devotional content not present in the source,
    the translation keeps the unembellished affirmative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
