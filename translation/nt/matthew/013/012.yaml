theological_decisions:
- issue: Implicit object of 'has' and 'will be given'
  chosen_reading: Kept the object unstated in the main text, preserving the saying's
    generality.
  alternative_readings:
  - Interpreting the object specifically as understanding, receptivity, or kingdom
    insight
  rationale: In context the saying relates to receptivity to Jesus' teaching and the
    mysteries of the kingdom, but the Greek leaves the object implicit. The translation
    preserves that openness rather than narrowing the meaning interpretively.
  doctrine_reference: 'Translation philosophy #3'
- issue: Generic masculine pronouns
  chosen_reading: Retained 'him' rather than shifting to plural or singular 'they.'
  alternative_readings:
  - them
  - the person ... that person
  rationale: The source uses masculine singular forms generically. Per doctrine, the
    translation should be gender-accurate to the source while allowing representative
    force.
  doctrine_reference: 'Translation philosophy #4'
