id: MAT.13.12
reference: Matthew 13:12
source:
  edition: SBLGNT
  text: ὅστις γὰρ ἔχει, δοθήσεται αὐτῷ καὶ περισσευθήσεται· ὅστις δὲ οὐκ ἔχει, καὶ
    ὃ ἔχει ἀρθήσεται ἀπ’ αὐτοῦ.
translation:
  text: For whoever has, more will be given to him, and he will have an abundance;
    but whoever does not have, even what he has will be taken from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will be given to him, and he will abound.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses masculine singular pronouns generically: ''to him'' ...
      ''from him.'''
    reason: cultural_note
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - the one who
  - everyone who
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general principle. 'Whoever'
    is natural modern English and preserves the distributive sense better than a more
    wooden 'the one who.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding statement. 'For' best preserves the
    connective force in readable English.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present of possession. 'Has' is the most direct and idiomatic
    rendering; the object is left implicit as in Greek, preserving the saying's broad
    application.
- source_word: δοθήσεται αὐτῷ
  chosen: more will be given to him
  alternatives:
  - it will be given to him
  - will be given to him
  lexicon: BDAG
  rationale: The passive future of δίδωμι with dative αὐτῷ means 'will be given to
    him.' English idiom in this proverbial context commonly supplies 'more,' which
    is implied by the contrast and by the following περισσευθήσεται. This makes the
    sense clear without over-paraphrasing.
- source_word: περισσευθήσεται
  chosen: he will have an abundance
  alternatives:
  - he will abound
  - he will have more than enough
  lexicon: BDAG
  rationale: Future passive of περισσεύω here conveys resulting abundance. 'He will
    have an abundance' is idiomatic modern English and expresses the resultant state
    more clearly than the less natural 'he will abound.'
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast between the two clauses; 'but' best captures the adversative
    force.
- source_word: οὐκ ἔχει
  chosen: does not have
  alternatives:
  - has not
  lexicon: BDAG
  rationale: Straightforward negated possession; 'does not have' is standard modern
    English.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: 'Here καί is ascensive, heightening the paradox: ''even what he has.''
    ''Even'' best captures that emphasis.'
- source_word: ὃ ἔχει
  chosen: what he has
  alternatives:
  - that which he has
  lexicon: BDAG
  rationale: Neuter relative pronoun with implicit object of possession. 'What he
    has' is the natural English equivalent.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  chosen: will be taken from him
  alternatives:
  - will be removed from him
  lexicon: BDAG
  rationale: Future passive of αἴρω with ἀπό indicates removal. 'Will be taken from
    him' is the clearest and most idiomatic rendering in this context.
- source_word: αὐτῷ / αὐτοῦ
  chosen: him / him
  alternatives:
  - them / them
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular in a representative generic
    construction. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing.
