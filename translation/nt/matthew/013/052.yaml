id: MAT.13.52
reference: Matthew 13:52
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Διὰ τοῦτο πᾶς γραμματεὺς μαθητευθεὶς ⸂τῇ βασιλείᾳ⸃ τῶν
    οὐρανῶν ὅμοιός ἐστιν ἀνθρώπῳ οἰκοδεσπότῃ ὅστις ἐκβάλλει ἐκ τοῦ θησαυροῦ αὐτοῦ
    καινὰ καὶ παλαιά.
translation:
  text: Then he said to them, “Therefore every scribe who has been trained for the
    kingdom of heaven is like a master of a house who brings out of his treasure new
    things and old.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who has become a disciple of the kingdom of heaven.” The Greek participle
      can carry the sense of being made a disciple as well as being instructed or
      trained.
    reason: alternative_reading
  - marker: b
    text: Or “householder” or “head of a household.”
    reason: lexical_alternative
  - marker: c
    text: “Treasure” may also suggest a storeroom or treasury from which valued things
      are brought out.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: A natural inferential connector in English that preserves the logical
    link to the preceding discussion without sounding wooden.
- source_word: πᾶς γραμματεὺς
  chosen: every scribe
  alternatives:
  - every teacher of the law
  lexicon: BDAG
  rationale: γραμματεύς is literally 'scribe.' Although in some contexts it refers
    to a legal expert, the immediate image is broadened by the following metaphor,
    so the more direct rendering is preferred.
- source_word: μαθητευθεὶς
  chosen: who has been trained
  alternatives:
  - who has become a disciple
  - who has been discipled
  - who has been instructed
  lexicon: BDAG
  rationale: The aorist passive participle of μαθητεύω can mean to make/become a disciple.
    In this context, with a scribe being prepared in relation to the kingdom, 'who
    has been trained' communicates the passive formative sense in idiomatic English
    while preserving the idea of discipleship-derived instruction.
- source_word: τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: for the kingdom of heaven
  alternatives:
  - in the kingdom of heaven
  - as a disciple of the kingdom of heaven
  - for the reign of heaven
  lexicon: BDAG
  rationale: 'The dative after μαθητευθείς is unusual and is best taken as indicating
    orientation or reference: trained for/in relation to the kingdom of heaven. ''For
    the kingdom of heaven'' is concise and natural, avoiding over-interpretation while
    preserving Matthew''s characteristic phrase.'
- source_word: ὅμοιός ἐστιν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Standard simile language in Jesus' parables; 'is like' is the clearest
    and most idiomatic rendering.
- source_word: ἀνθρώπῳ οἰκοδεσπότῃ
  chosen: a master of a house
  alternatives:
  - a householder
  - the head of a household
  - a homeowner
  lexicon: BDAG
  rationale: οἰκοδεσπότης denotes the master/head of a household. 'Master of a house'
    preserves the social role more clearly than 'homeowner' and is more transparent
    than the somewhat archaic 'householder'.
- source_word: ἐκβάλλει
  chosen: brings out
  alternatives:
  - takes out
  - throws out
  lexicon: BDAG
  rationale: Although ἐκβάλλω often means 'cast out,' here with treasure it means
    to bring forth from storage. 'Brings out' fits the household metaphor and avoids
    misleading force.
- source_word: ἐκ τοῦ θησαυροῦ αὐτοῦ
  chosen: out of his treasure
  alternatives:
  - out of his storeroom
  - from his treasure store
  lexicon: BDAG
  rationale: θησαυρός can denote treasure or a storehouse/treasury. In this metaphor,
    'treasure' preserves both value and stored reserve; the possessive 'his' follows
    the Greek.
- source_word: καινὰ καὶ παλαιά
  chosen: new things and old
  alternatives:
  - new and old things
  - things new and old
  lexicon: BDAG
  rationale: The neuter plural adjectives imply unstated items. 'New things and old'
    is natural English and preserves the order and contrast of the Greek.
