theological_decisions:
- issue: Sense of μαθητευθεὶς in relation to γραμματεύς and the kingdom
  chosen_reading: A scribe who has been instructed/trained as a disciple for the kingdom
    of heaven
  alternative_readings:
  - A scribe who has become a disciple of the kingdom of heaven
  - A teacher of the law converted to the kingdom
  rationale: The verse depicts a person formed by the kingdom and then able to draw
    from a treasury of old and new. The translation avoids narrowing the image to
    conversion alone or to formal legal expertise alone, preserving the broader pedagogical
    and discipleship sense of the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of οἰκοδεσπότῃ
  chosen_reading: master of a house
  alternative_readings:
  - householder
  - head of a household
  rationale: This preserves the household-authority nuance in the metaphor without
    importing later doctrinal or social claims. It aims for readable modern English
    while retaining the role implied by the Greek.
  doctrine_reference: Translation philosophy §§5, 6
