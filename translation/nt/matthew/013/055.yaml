id: MAT.13.55
reference: Matthew 13:55
source:
  edition: SBLGNT
  text: οὐχ οὗτός ἐστιν ὁ τοῦ τέκτονος υἱός; ⸀οὐχ ἡ μήτηρ αὐτοῦ λέγεται Μαριὰμ καὶ
    οἱ ἀδελφοὶ αὐτοῦ Ἰάκωβος καὶ ⸀Ἰωσὴφ καὶ Σίμων καὶ Ἰούδας;
translation:
  text: Is this not the carpenter’s son? Is not his mother called Mary, and his brothers
    James and Joseph and Simon and Judas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relatives' or 'kinsmen' for 'brothers'; the Greek word ordinarily means
      'brothers,' but some understand it more broadly in this context.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'Joses' instead of 'Joseph.'
    reason: textual_variant
lexical_decisions:
- source_word: τέκτονος
  chosen: carpenter’s
  alternatives:
  - builder
  - craftsman
  lexicon: BDAG
  rationale: τέκτων commonly denotes a craftsman working in wood or construction.
    'Carpenter' is the most natural and traditional English rendering here, while
    still fitting the likely semantic range in this context.
- source_word: υἱός
  chosen: son
  alternatives:
  - descendant
  lexicon: BDAG
  rationale: The immediate familial context makes the literal filial sense certain;
    'son' is the straightforward rendering.
- source_word: λέγεται
  chosen: is called
  alternatives:
  - is named
  lexicon: BDAG
  rationale: The present passive idiom naturally means 'is called' or 'is named.'
    'Is called' preserves the Greek form closely and reads naturally in English.
- source_word: Μαριὰμ
  chosen: Mary
  alternatives:
  - Mariam
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy. 'Mary' is the standard English form of Μαριάμ.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers/kinsmen
  lexicon: BDAG
  rationale: The ordinary lexical sense is 'brothers.' In this verse the term is central
    to a longstanding interpretive debate about Jesus' family relations, but the translation
    should preserve the surface lexical meaning rather than import a theological resolution.
    An alternative broader sense is preserved in a footnote.
- source_word: Ἰάκωβος
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Standard English New Testament convention renders Ἰάκωβος as 'James.'
    This is a conventional transliteration/anglicization for the personal name in
    this corpus.
- source_word: Ἰωσὴφ
  chosen: Joseph
  alternatives:
  - Joses
  lexicon: BDAG
  rationale: The SBLGNT reading here is Ἰωσὴφ, best rendered 'Joseph.' A textual alternative
    'Joses' appears in some traditions and is worth preserving in a footnote.
- source_word: Σίμων
  chosen: Simon
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  - Jude
  lexicon: BDAG
  rationale: Standard transliteration of the Greek name is 'Judas.' 'Jude' is an English
    conventional form in some contexts, but 'Judas' more directly reflects the Greek
    here.
- source_word: οὐχ ... ;
  chosen: Is this not ... ? Is not ... ?
  alternatives:
  - Isn’t this ... ? Isn’t ... ?
  lexicon: BDAG
  rationale: The particle introduces rhetorical questions expecting an affirmative
    answer. The fuller form 'Is this not...?' preserves the tone and structure more
    transparently than a contraction.
