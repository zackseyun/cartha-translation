theological_decisions:
- issue: Meaning of ἀδελφοὶ αὐτοῦ in relation to Jesus' family
  chosen_reading: Render literally as 'his brothers' in the main text
  alternative_readings:
  - his brothers in the ordinary sibling sense
  - his relatives/kinsmen in a broader familial sense
  rationale: The Greek word's default sense is 'brothers,' and the translation should
    not resolve the later doctrinal debate over Mary's perpetual virginity or the
    exact biological relationship of these men to Jesus. Preserving the literal term
    in the text maintains theological tension; a footnote can note the broader possible
    sense without displacing the main rendering.
  doctrine_reference: Preserve theological tension rather than resolve it.
