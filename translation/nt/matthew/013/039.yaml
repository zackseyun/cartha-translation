id: MAT.13.39
reference: Matthew 13:39
source:
  edition: SBLGNT
  text: ὁ δὲ ἐχθρὸς ὁ σπείρας αὐτά ἐστιν ὁ διάβολος· ὁ δὲ θερισμὸς συντέλεια ⸀αἰῶνός
    ἐστιν, οἱ δὲ θερισταὶ ἄγγελοί εἰσιν.
translation:
  text: And the enemy who sowed them is the devil; the harvest is the end of the age,
    and the harvesters are angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the consummation of the age"; traditionally, "the end of the world."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχθρὸς
  chosen: enemy
  alternatives:
  - foe
  lexicon: BDAG
  rationale: Standard gloss in this context; clear and natural in modern English while
    preserving the personal opposition in the parable explanation.
- source_word: ὁ σπείρας
  chosen: who sowed
  alternatives:
  - who planted
  lexicon: BDAG
  rationale: The aorist participle identifies the enemy by his completed action. 'Sowed'
    matches the agricultural imagery already established in the parable better than
    the broader 'planted.'
- source_word: αὐτά
  chosen: them
  alternatives:
  - those things
  lexicon: BDAG
  rationale: Refers back to the weeds/tares sown in the field. 'Them' is the natural
    English anaphoric rendering.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος functions as the recognized personal designation
    for Satan, so 'the devil' is the clearest idiomatic English rendering. A more
    etymological rendering like 'slanderer' would obscure the referent.
- source_word: θερισμὸς
  chosen: harvest
  alternatives:
  - reaping
  lexicon: BDAG
  rationale: '''Harvest'' is the normal noun rendering and fits the parable''s imagery
    and Jesus'' explanation.'
- source_word: συντέλεια αἰῶνός
  chosen: the end of the age
  alternatives:
  - the consummation of the age
  - the end of the world
  lexicon: BDAG
  rationale: αἰών is better rendered 'age' than 'world' here, preserving the temporal
    sense rather than a cosmic-material one. συντέλεια carries the sense of culmination/consummation;
    'end of the age' is the established and accurate idiom, with 'consummation of
    the age' preserved as a lexical alternative.
- source_word: θερισταὶ
  chosen: harvesters
  alternatives:
  - reapers
  lexicon: BDAG
  rationale: Both are possible, but 'harvesters' is more immediately transparent to
    contemporary readers while preserving the agricultural metaphor.
- source_word: ἄγγελοί
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: Although ἄγγελος can mean 'messenger,' the eschatological context clearly
    indicates heavenly beings, so 'angels' is the appropriate rendering.
- source_word: δὲ
  chosen: and / punctuation-based transition
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Repeated δέ marks progression in the explanation. In English, explicit
    repetition of 'but/now' in each clause is awkward, so the discourse function is
    represented by smooth coordination and punctuation.
