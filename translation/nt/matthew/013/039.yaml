theological_decisions:
- issue: Rendering of αἰών in the eschatological phrase συντέλεια αἰῶνός
  chosen_reading: the end of the age
  alternative_readings:
  - the end of the world
  - the consummation of the age
  rationale: To avoid importing a more material/cosmic sense than the Greek requires,
    αἰών is rendered 'age.' This preserves the eschatological timeframe without collapsing
    it into annihilation-of-creation language. 'Consummation of the age' is semantically
    strong but less natural in running English; 'end of the world' is traditional
    but less precise.
  doctrine_reference: Translation philosophy §1, §3, §6
