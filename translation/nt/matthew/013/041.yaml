theological_decisions:
- issue: Rendering of the title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: The Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional rendering best preserves the established titular and
    apocalyptic significance of Jesus' self-designation in Matthew, including likely
    allusion to Daniel 7. A more interpretive alternative is possible but would weaken
    intertextual precision.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Scope of σκάνδαλα in judgment context
  chosen_reading: all causes of stumbling
  alternative_readings:
  - all stumbling blocks
  - all offenses
  rationale: The phrase likely includes persons, influences, or things that lead others
    into sin. Rendering it as 'causes of stumbling' preserves that broader scope and
    avoids narrowing the term to emotional offense.
  doctrine_reference: Translation philosophy §1, §5
