id: MAT.13.41
reference: Matthew 13:41
source:
  edition: SBLGNT
  text: ἀποστελεῖ ὁ υἱὸς τοῦ ἀνθρώπου τοὺς ἀγγέλους αὐτοῦ, καὶ συλλέξουσιν ἐκ τῆς
    βασιλείας αὐτοῦ πάντα τὰ σκάνδαλα καὶ τοὺς ποιοῦντας τὴν ἀνομίαν,
translation:
  text: The Son of Man will send out his angels, and they will gather out of his kingdom
    all causes of stumbling and those who practice lawlessness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all stumbling blocks.' The Greek σκάνδαλα can refer to things that cause
      people to sin or fall away.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who do lawlessness.' The wording emphasizes ongoing, characteristic
      rebellion against God's law.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστελεῖ
  chosen: will send out
  alternatives:
  - will send
  - will dispatch
  lexicon: BDAG
  rationale: Future active indicative of ἀποστέλλω. 'Send out' preserves the force
    of commissioning agents forth, fitting the eschatological scene better than the
    flatter 'send' while remaining natural English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: The Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: Standard translation of the titular expression used by Jesus. It preserves
    the wording and intertextual resonance with Danielic Son of Man imagery without
    paraphrase.
- source_word: τοὺς ἀγγέλους αὐτοῦ
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: BDAG
  rationale: In this apocalyptic/judgment context, ἄγγελοι clearly refers to heavenly
    angels rather than human messengers.
- source_word: συλλέξουσιν
  chosen: they will gather
  alternatives:
  - they will collect
  - they will gather up
  lexicon: BDAG
  rationale: Future active indicative of συλλέγω. 'Gather' is idiomatic and matches
    the harvest/judgment imagery in the surrounding parable explanation.
- source_word: ἐκ τῆς βασιλείας αὐτοῦ
  chosen: out of his kingdom
  alternatives:
  - from his kingdom
  lexicon: BDAG
  rationale: ἐκ is best rendered 'out of' here, emphasizing removal from within the
    sphere of the Son of Man's kingdom.
- source_word: πάντα τὰ σκάνδαλα
  chosen: all causes of stumbling
  alternatives:
  - all stumbling blocks
  - all offenses
  lexicon: BDAG
  rationale: σκάνδαλα can denote things that cause sin or falling away. 'Causes of
    stumbling' makes the active sense explicit and avoids reducing the term merely
    to subjective offense. 'Stumbling blocks' is viable but slightly less transparent
    in modern English.
- source_word: τοὺς ποιοῦντας τὴν ἀνομίαν
  chosen: those who practice lawlessness
  alternatives:
  - those who do lawlessness
  - those who commit evil
  lexicon: BDAG
  rationale: The present participle with ποιέω conveys ongoing characteristic action;
    'practice' captures habitual conduct. ἀνομία is best rendered 'lawlessness,' preserving
    the moral-theological sense of disregard for God's law rather than the broader
    and less precise 'evil'.
