id: MAT.13.26
reference: Matthew 13:26
source:
  edition: SBLGNT
  text: ὅτε δὲ ἐβλάστησεν ὁ χόρτος καὶ καρπὸν ἐποίησεν, τότε ἐφάνη καὶ τὰ ζιζάνια.
translation:
  text: But when the plants had sprouted and produced grain, then the weeds also appeared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tares'; possibly a specific weed such as darnel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause ('when'), and δέ is a mild connective
    best represented here by 'but' to mark narrative progression and slight contrast
    with the prior sowing scene.
- source_word: ἐβλάστησεν
  chosen: had sprouted
  alternatives:
  - sprouted
  - came up
  - grew up
  lexicon: BDAG
  rationale: Aorist verb from βλαστάνω denotes putting forth shoots/sprouting. English
    past perfect fits the sequence before the next aorist event in the clause.
- source_word: ὁ χόρτος
  chosen: the plants
  alternatives:
  - the grass
  - the crop
  - the blade
  lexicon: BDAG
  rationale: χόρτος can mean grass or herbage, but in this agricultural parable it
    refers to the growing crop generally rather than lawn grass. 'Plants' is natural
    modern English and avoids prematurely specifying the species before the grain
    is mentioned.
- source_word: καρπὸν ἐποίησεν
  chosen: produced grain
  alternatives:
  - bore fruit
  - produced fruit
  - made fruit
  lexicon: BDAG
  rationale: Literally 'made fruit,' an idiom for bearing/producing yield. In the
    context of a wheat field and the tares/weeds parable, 'grain' better captures
    the agricultural sense for modern readers than the broader 'fruit'.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: τότε marks the next point in the narrative sequence; 'then' is the straightforward
    temporal adverb.
- source_word: ἐφάνη
  chosen: appeared
  alternatives:
  - became visible
  - was seen
  lexicon: BDAG
  rationale: Passive/intransitive sense of φαίνω here indicates becoming visible or
    evident. 'Appeared' is concise and idiomatic.
- source_word: καὶ τὰ ζιζάνια
  chosen: the weeds also
  alternatives:
  - also the weeds
  - the darnel also
  - the tares also
  lexicon: BDAG
  rationale: ζιζάνια refers to weeds in the field, traditionally 'tares' and possibly
    specifically darnel. Main text uses the accessible generic 'weeds'; the more specific/traditional
    alternatives are preserved in a footnote. καί here has additive force, hence 'also'.
