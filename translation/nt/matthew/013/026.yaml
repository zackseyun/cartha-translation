theological_decisions:
- issue: Specific identification of ζιζάνια
  chosen_reading: Rendered generically as 'weeds' in the main text
  alternative_readings:
  - tares
  - darnel
  rationale: The verse itself does not require a botanically precise identification,
    and optimal equivalence favors accessible modern English. Because 'tares' is traditional
    and 'darnel' may be more specific, these are preserved in a footnote rather than
    elevated into the main text.
  doctrine_reference: Translation philosophy §§1, 6
