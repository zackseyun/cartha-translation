theological_decisions:
- issue: Rendering Matthew's phrase βασιλεία τῶν οὐρανῶν
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the reign of heaven
  - the kingdom of the heavens
  rationale: The phrase is not a contested doctrinal term in the provided table, but
    it carries theological significance. 'Kingdom of heaven' preserves Matthew's established
    wording and avoids narrowing the concept merely to abstract rule ('reign') while
    still allowing the broader biblical sense of God's rule to remain implicit.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
