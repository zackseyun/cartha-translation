id: MAT.13.31
reference: Matthew 13:31
source:
  edition: SBLGNT
  text: Ἄλλην παραβολὴν παρέθηκεν αὐτοῖς λέγων· Ὁμοία ἐστὶν ἡ βασιλεία τῶν οὐρανῶν
    κόκκῳ σινάπεως, ὃν λαβὼν ἄνθρωπος ἔσπειρεν ἐν τῷ ἀγρῷ αὐτοῦ·
translation:
  text: He set another parable before them, saying, “The kingdom of heaven is like
    a mustard seed, which a man took and sowed in his field.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρέθηκεν
  chosen: set ... before
  alternatives:
  - presented
  - put before
  - told
  lexicon: BDAG
  rationale: παρατίθημι here idiomatically means to set forth or present a parable
    to an audience. 'Set another parable before them' preserves the concrete metaphor
    and reads naturally in English better than the flatter 'told'.
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - illustration
  - comparison
  lexicon: BDAG
  rationale: '''Parable'' is the standard and accurate rendering for παραβολή in the
    Synoptic teaching context, preserving the genre term rather than reducing it to
    a generic illustration.'
- source_word: Ὁμοία ἐστὶν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: This is the natural English equivalent of the comparison formula introducing
    the parable. 'Is like' is both faithful and idiomatic.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the reign of heaven
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Matthew's characteristic expression is best preserved as 'the kingdom
    of heaven.' 'Kingdom' communicates both realm and reign adequately in context,
    while 'of heaven' reflects the genitive without over-literalizing to 'of the heavens.'
- source_word: κόκκῳ σινάπεως
  chosen: a mustard seed
  alternatives:
  - a grain of mustard
  - a mustard grain
  lexicon: BDAG
  rationale: κόκκος can mean seed/grain. In English, 'mustard seed' is the clearest
    and most established equivalent for the small seed used in this image.
- source_word: ὃν λαβὼν ἄνθρωπος
  chosen: which a man took
  alternatives:
  - which someone took
  - that a man, having taken
  lexicon: BDAG
  rationale: The masculine singular relative pronoun agrees with κόκκος as construed
    in sense, and the participle λαβών is naturally rendered with the finite verb
    'took.' 'A man' preserves the grammatically masculine singular ἄνθρωπος in line
    with the gender-accurate policy.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Although ἄνθρωπος can be generic in some contexts, here it refers to
    an individual actor within the story. 'A man' matches the singular masculine form
    and the narrative style.
- source_word: ἔσπειρεν
  chosen: sowed
  alternatives:
  - planted
  lexicon: BDAG
  rationale: σπείρω specifically means to sow seed. 'Sowed' is more precise than 'planted,'
    especially since the object is a seed.
- source_word: ἐν τῷ ἀγρῷ αὐτοῦ
  chosen: in his field
  alternatives:
  - in his farm field
  - in his plot of land
  lexicon: BDAG
  rationale: ἀγρός is best rendered 'field' in this agricultural setting. The possessive
    αὐτοῦ is retained straightforwardly as 'his.'
