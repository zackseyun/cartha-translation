id: MAT.13.57
reference: Matthew 13:57
source:
  edition: SBLGNT
  text: καὶ ἐσκανδαλίζοντο ἐν αὐτῷ. ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Οὐκ ἔστιν προφήτης ἄτιμος
    εἰ μὴ ἐν τῇ ⸀πατρίδι καὶ ἐν τῇ οἰκίᾳ αὐτοῦ.
translation:
  text: And they took offense at him. But Jesus said to them, “A prophet is not without
    honor except in his hometown and in his own household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they were offended by him”; literally, “they were caused to stumble
      in him.”
    reason: lexical_alternative
  - marker: b
    text: Or “native place” or “homeland.”
    reason: lexical_alternative
  - marker: c
    text: Or “in his own house.” The Greek can refer to a house or a household/family
      circle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκανδαλίζοντο ἐν αὐτῷ
  chosen: they took offense at him
  alternatives:
  - they were offended by him
  - they stumbled over him
  lexicon: BDAG
  rationale: The idiom σκανδαλίζομαι ἐν with a person here refers to being offended
    at or taking offense at Jesus, not literal stumbling. 'Took offense at him' is
    idiomatic modern English and preserves the relational sense.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  chosen: But Jesus said to them
  alternatives:
  - And Jesus said to them
  lexicon: BDAG
  rationale: δέ here marks mild contrast with their offense, so 'But' better reflects
    the discourse turn than a simple 'And.'
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering; the saying is proverbial and the term should remain
    direct and recognizable.
- source_word: ἄτιμος
  chosen: without honor
  alternatives:
  - dishonored
  - without respect
  lexicon: BDAG
  rationale: The expression οὐκ ἔστιν προφήτης ἄτιμος is a known proverb. 'Not without
    honor except...' preserves the rhetorical form and the honor/shame nuance better
    than flattening to 'dishonored' alone.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this exception construction, 'except' is the natural English equivalent.
- source_word: πατρίδι
  chosen: hometown
  alternatives:
  - homeland
  - native place
  - country
  lexicon: BDAG
  rationale: πατρίς here refers to one's native locality in the narrative setting,
    not the broader nation. 'Hometown' is natural modern English and fits the Nazareth
    context.
- source_word: οἰκίᾳ αὐτοῦ
  chosen: his own household
  alternatives:
  - his house
  - his family
  lexicon: BDAG
  rationale: οἰκία can denote house or household. In this proverb the social sphere
    of one's own domestic circle is in view, so 'household' best conveys the people
    of his home rather than merely the building. 'Own' brings out αὐτοῦ idiomatically.
