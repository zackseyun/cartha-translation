theological_decisions:
- issue: Scope of Jesus' proverb about rejection
  chosen_reading: Render the saying as a general proverb about a prophet lacking honor
    in his native setting, without importing a broader doctrinal claim about all rejection
    of Jesus.
  alternative_readings:
  - A more interpretive rendering emphasizing familial unbelief specifically
  rationale: The verse reports a proverb Jesus applies to the present situation. The
    translation should preserve the honor/shame and local-rejection theme without
    expanding it into a theological paraphrase beyond the Greek.
  doctrine_reference: Translation philosophy items 1, 3, and 6
