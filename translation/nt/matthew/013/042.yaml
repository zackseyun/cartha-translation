theological_decisions:
- issue: Nature of judgment imagery in 'the fiery furnace'
  chosen_reading: Retain the concrete metaphor of eschatological judgment without
    softening or over-specifying it.
  alternative_readings:
  - Render more interpretively as 'the furnace of blazing fire'
  - Paraphrase as 'hellfire'
  rationale: The verse uses vivid judgment imagery. The translation should preserve
    the metaphor as given rather than importing later doctrinal terminology or diluting
    the severity.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of 'weeping and gnashing of teeth'
  chosen_reading: Preserve the stock Matthean expression as a formula of anguish and
    judgment.
  alternative_readings:
  - Interpret gnashing primarily as rage
  - Interpret the phrase solely as sorrow
  rationale: The phrase likely conveys severe anguish and judgment, possibly including
    both grief and hostile distress. The translation keeps the established wording
    rather than narrowing its sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
