id: MAT.13.42
reference: Matthew 13:42
source:
  edition: SBLGNT
  text: καὶ βαλοῦσιν αὐτοὺς εἰς τὴν κάμινον τοῦ πυρός· ἐκεῖ ἔσται ὁ κλαυθμὸς καὶ ὁ
    βρυγμὸς τῶν ὀδόντων.
translation:
  text: and they will throw them into the fiery furnace. In that place there will
    be weeping and gnashing of teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''the furnace of fire.'''
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''there''; rendered ''In that place'' for natural English emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαλοῦσιν
  chosen: they will throw
  alternatives:
  - they will cast
  lexicon: BDAG
  rationale: Future active of βάλλω means to throw/cast. 'Throw' is more natural modern
    English while preserving the force of forcible expulsion.
- source_word: κάμινον τοῦ πυρός
  chosen: the fiery furnace
  alternatives:
  - the furnace of fire
  lexicon: BDAG
  rationale: The genitive construction is idiomatically rendered in English as an
    attributive phrase, 'fiery furnace.' This preserves the imagery and echoes established
    biblical furnace language without being archaic.
- source_word: ἐκεῖ
  chosen: In that place
  alternatives:
  - there
  lexicon: BDAG
  rationale: Rendered slightly expansively for natural English emphasis after the
    sentence break, while preserving the locative force that points to the place just
    mentioned.
- source_word: κλαυθμός
  chosen: weeping
  alternatives:
  - wailing
  lexicon: BDAG
  rationale: '''Weeping'' is the standard and consistent rendering in this Matthean
    formula. ''Wailing'' is possible but somewhat more interpretive and intense than
    the noun itself requires.'
- source_word: βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: This is the conventional and accurate rendering of the idiom. 'Grinding
    of teeth' is more literal in parts but less idiomatic in English.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple connective retained at the head of the verse to preserve continuity
    with the preceding clause.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative plural pronoun referring back to the previously
    identified group; no need to restate the antecedent.
