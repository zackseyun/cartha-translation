id: MAT.13.29
reference: Matthew 13:29
source:
  edition: SBLGNT
  text: ὁ δέ ⸀φησιν· Οὔ, μήποτε συλλέγοντες τὰ ζιζάνια ἐκριζώσητε ἅμα αὐτοῖς τὸν σῖτον·
translation:
  text: But he said, ‘No, lest while gathering the weeds you uproot the wheat along
    with them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘tares’; more specifically, possibly ‘darnel,’ a weed that can resemble
      wheat in its early stages.
    reason: lexical_alternative
lexical_decisions:
- source_word: φησιν
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, idiomatic English in
    narrative commonly renders it as a simple past. This preserves natural readability
    without loss of meaning.
- source_word: Οὔ
  chosen: 'No'
  alternatives:
  - No indeed
  lexicon: BDAG
  rationale: A direct negative reply is best represented by the simple English 'No.'
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: BDAG
  rationale: Introduces a warning about an undesirable possible outcome. 'Lest' is
    concise and accurately conveys the preventative force.
- source_word: συλλέγοντες
  chosen: while gathering
  alternatives:
  - in gathering
  - as you gather
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main action and addressed
    to the servants. 'While gathering' expresses the temporal sense naturally in English.
- source_word: ζιζάνια
  chosen: weeds
  alternatives:
  - tares
  - darnel
  lexicon: BDAG
  rationale: '''Weeds'' is clear modern English and fits the parable context. ''Tares''
    is traditional but archaic for many readers; ''darnel'' is more botanically specific
    but too narrow for the likely audience. The alternative is preserved in a footnote
    because of translation tradition.'
- source_word: ἐκριζώσητε
  chosen: you uproot
  alternatives:
  - you root up
  - you pull up by the roots
  lexicon: BDAG
  rationale: The verb specifically denotes pulling out by the roots. 'Uproot' is precise
    and natural.
- source_word: ἅμα αὐτοῖς
  chosen: along with them
  alternatives:
  - together with them
  lexicon: BDAG
  rationale: This phrase indicates simultaneous removal in company with the weeds.
    'Along with them' is idiomatic and clear.
- source_word: σῖτον
  chosen: the wheat
  alternatives:
  - the grain
  lexicon: BDAG
  rationale: In this agricultural context, σῖτος most naturally refers to wheat rather
    than grain generically, especially in contrast with the weeds in the parable.
