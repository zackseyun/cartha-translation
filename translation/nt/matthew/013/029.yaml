theological_decisions:
- issue: Rendering of ζιζάνια in a well-known parable
  chosen_reading: weeds
  alternative_readings:
  - tares
  - darnel
  rationale: The verse does not hinge on a doctrinally contested term, but translation
    tradition strongly favors 'tares.' Following optimal equivalence and readable
    modern English, 'weeds' is preferred in the main text, while preserving the traditional
    and more specific alternatives in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 6
