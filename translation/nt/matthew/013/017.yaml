theological_decisions:
- issue: Scope of δίκαιοι
  chosen_reading: Rendered as 'righteous people' alongside 'prophets' as a broader
    class beyond prophets alone.
  alternative_readings:
  - Rendered simply 'the righteous'
  rationale: The Greek adjective is substantival and plural. 'Righteous people' is
    clearer for modern readers while preserving the category of faithful persons from
    earlier generations who anticipated the messianic revelation.
  doctrine_reference: Translation philosophy §§5–6
- issue: Nature of what was seen and heard
  chosen_reading: Kept the objects implicit as 'what you see' and 'what you hear'
    without specifying Jesus, the kingdom, or messianic fulfillment in the main text.
  alternative_readings:
  - Expanded interpretively to 'the Messiah' or 'the secrets of the kingdom'
  rationale: The context implies kingdom revelation in Jesus' ministry, but the verse
    itself leaves the objects stated only by relative clauses. The translation preserves
    that theological tension rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3
