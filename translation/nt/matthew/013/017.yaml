id: MAT.13.17
reference: Matthew 13:17
source:
  edition: SBLGNT
  text: ἀμὴν γὰρ λέγω ὑμῖν ὅτι πολλοὶ προφῆται καὶ δίκαιοι ἐπεθύμησαν ἰδεῖν ἃ βλέπετε
    καὶ οὐκ εἶδαν, καὶ ἀκοῦσαι ἃ ἀκούετε καὶ οὐκ ἤκουσαν.
translation:
  text: For truly I say to you that many prophets and righteous people longed to see
    what you see and did not see it, and to hear what you hear and did not hear it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the righteous.' The Greek uses a substantival adjective meaning righteous
      persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: truly
  alternatives:
  - amen
  - truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω ὑμῖν, English idiom is best served
    by rendering the force rather than transliterating. 'Truly' preserves the solemn
    asseveration without sounding archaic.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ gives explanatory support to the preceding statement; 'for' is the
    most direct and natural connective here.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: This preserves the directness of the Greek while remaining natural English.
    'I tell you' is possible, but 'I say to you' better reflects the formulaic wording.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is sufficient and idiomatic.
- source_word: προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Straightforward rendering of the noun referring to Israel's prophetic
    figures.
- source_word: δίκαιοι
  chosen: righteous people
  alternatives:
  - righteous ones
  - just people
  lexicon: BDAG
  rationale: The adjective is substantival here. 'Righteous people' communicates the
    class of persons clearly in modern English; 'just' can suggest fairness more than
    covenantal uprightness.
- source_word: ἐπεθύμησαν
  chosen: longed
  alternatives:
  - desired
  - yearned
  lexicon: BDAG
  rationale: The verb denotes strong desire. 'Longed' captures the intensity naturally
    without importing illicit desire, which the verb can have in other contexts.
- source_word: ἰδεῖν
  chosen: to see
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/complement after ἐπεθύμησαν; simple infinitive
    is appropriate.
- source_word: ἃ βλέπετε
  chosen: what you see
  alternatives:
  - the things you are seeing
  lexicon: BDAG
  rationale: The relative pronoun with present verb is best rendered idiomatically
    as 'what you see.' The English present adequately reflects the Greek present.
- source_word: οὐκ εἶδαν
  chosen: did not see it
  alternatives:
  - did not see
  - never saw
  lexicon: BDAG
  rationale: The negated aorist states the historical fact that they did not obtain
    the desired sight. Adding 'it' makes the English clause complete and ties it back
    to 'what you see' without changing sense.
- source_word: ἀκοῦσαι
  chosen: to hear
  lexicon: BDAG
  rationale: Aorist infinitive parallel to ἰδεῖν; simple infinitive preserves the
    structure.
- source_word: ἃ ἀκούετε
  chosen: what you hear
  alternatives:
  - the things you are hearing
  lexicon: BDAG
  rationale: Idiomatic rendering of the relative clause; the present tense is naturally
    conveyed in English.
- source_word: οὐκ ἤκουσαν
  chosen: did not hear it
  alternatives:
  - did not hear
  - never heard
  lexicon: BDAG
  rationale: Parallel to οὐκ εἶδαν. 'Did not hear it' preserves the symmetry and makes
    the object explicit in English.
