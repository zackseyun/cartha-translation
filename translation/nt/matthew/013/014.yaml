id: MAT.13.14
reference: Matthew 13:14
source:
  edition: SBLGNT
  text: καὶ ἀναπληροῦται αὐτοῖς ἡ προφητεία Ἠσαΐου ἡ λέγουσα· Ἀκοῇ ἀκούσετε καὶ οὐ
    μὴ συνῆτε, καὶ βλέποντες βλέψετε καὶ οὐ μὴ ἴδητε.
translation:
  text: 'And in them the prophecy of Isaiah is being fulfilled, which says: ‘You will
    indeed hear, but never understand, and seeing you will see, but never perceive.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'By hearing you will hear ... and seeing you will see,' a Hebrew-style
      emphatic expression quoted through the Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπληροῦται
  chosen: is being fulfilled
  alternatives:
  - is fulfilled
  - is fully fulfilled
  lexicon: BDAG
  rationale: Present passive indicative suggests an ongoing/passive fulfillment in
    relation to the people just mentioned. 'Is being fulfilled' preserves the present
    aspect better than a simple English present, while avoiding the potentially overstated
    nuance of 'fully fulfilled,' though ἀναπληρόω can carry a sense of filling up
    or completing.
- source_word: αὐτοῖς
  chosen: in them
  alternatives:
  - for them
  - upon them
  - with respect to them
  lexicon: BDAG
  rationale: The dative here is idiomatically rendered to show that Isaiah's prophecy
    finds fulfillment in these people. 'In them' is natural English and reflects the
    sense that the prophecy is realized in their case.
- source_word: προφητεία Ἠσαΐου
  chosen: the prophecy of Isaiah
  alternatives:
  - Isaiah's prophecy
  lexicon: BDAG
  rationale: Both are viable; 'the prophecy of Isaiah' stays slightly closer to the
    Greek genitive construction while remaining natural.
- source_word: ἡ λέγουσα
  chosen: which says
  alternatives:
  - that says
  - saying
  lexicon: BDAG
  rationale: The attributive participle introduces the quotation. 'Which says' is
    idiomatic modern English and preserves the function of the participle.
- source_word: Ἀκοῇ ἀκούσετε
  chosen: You will indeed hear
  alternatives:
  - By hearing you will hear
  - Hearing you will hear
  - You will surely hear
  lexicon: BDAG
  rationale: This construction is a Semitic-style emphatic expression reproduced in
    Greek. 'You will indeed hear' communicates the emphasis without awkward literalism.
    A more formal rendering is preserved in a footnote.
- source_word: οὐ μὴ συνῆτε
  chosen: but never understand
  alternatives:
  - and certainly not understand
  - and by no means understand
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is emphatically negative. 'Never understand'
    conveys the force in readable English. 'But' is used in English to bring out the
    adversative sense implied by the contrast, though Greek repeats καί.
- source_word: βλέποντες βλέψετε
  chosen: and seeing you will see
  alternatives:
  - and you will indeed see while seeing
  - and looking you will look
  lexicon: BDAG
  rationale: This mirrors the emphatic/reduplicative structure of the previous clause.
    The chosen rendering preserves the rhetorical pattern while remaining intelligible.
- source_word: οὐ μὴ ἴδητε
  chosen: but never perceive
  alternatives:
  - and certainly not see
  - and by no means perceive
  lexicon: BDAG
  rationale: Because the previous clause already uses 'see' for βλέπω, rendering ὁράω
    here as 'perceive' helps communicate the distinction between physical seeing and
    true perception/insight that the context implies. The emphatic negation is reflected
    by 'never.'
