theological_decisions:
- issue: Nature of prophetic fulfillment language
  chosen_reading: The verse states that Isaiah's prophecy is being fulfilled in the
    people's response, without specifying a deterministic mechanism beyond the text
    itself.
  alternative_readings:
  - The prophecy is simply exemplified in them
  - The prophecy is exhaustively completed in a stronger sense
  rationale: The translation preserves the fulfillment formula without importing a
    particular theological account of hardening, predestination, or mere typological
    resemblance. 'Is being fulfilled' reflects the Greek while leaving the theological
    tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
