id: MAT.13.5
reference: Matthew 13:5
source:
  edition: SBLGNT
  text: ἄλλα δὲ ἔπεσεν ἐπὶ τὰ πετρώδη ὅπου οὐκ εἶχεν γῆν πολλήν, καὶ εὐθέως ἐξανέτειλεν
    διὰ τὸ μὴ ἔχειν βάθος γῆς,
translation:
  text: Other seed fell on rocky ground, where it did not have much soil, and it sprang
    up at once because it had no depth of soil,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the rocky places'; the phrase refers to shallow soil over
      underlying rock.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα δὲ
  chosen: Other seed
  alternatives:
  - But other seed
  - Others
  lexicon: BDAG
  rationale: Neuter plural adjective with δέ refers back elliptically to seed from
    the preceding verse. English supplies 'seed' for clarity. 'Other seed' preserves
    the distributive contrast better than bare 'others.'
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was sown
  lexicon: BDAG
  rationale: The verb is simply 'fell' in the parable's imagery; 'was sown' would
    over-interpret the action beyond the Greek wording.
- source_word: ἐπὶ τὰ πετρώδη
  chosen: on rocky ground
  alternatives:
  - on the rocky places
  - on stony ground
  lexicon: BDAG
  rationale: πετρώδη denotes rocky/stony places or ground. 'Rocky ground' is natural
    modern English and conveys shallow soil over rock, fitting the explanation in
    context.
- source_word: ὅπου οὐκ εἶχεν γῆν πολλήν
  chosen: where it did not have much soil
  alternatives:
  - where there was not much soil
  - where it had little earth
  lexicon: BDAG
  rationale: The singular verb likely continues the implicit subject from the seed/ground
    scenario; English idiom allows 'it did not have much soil' referring to the place/ground.
    'Soil' is more natural than 'earth' in an agricultural context.
- source_word: καὶ εὐθέως
  chosen: and it sprang up at once
  alternatives:
  - and immediately it sprang up
  - and it quickly came up
  lexicon: BDAG
  rationale: εὐθέως marks immediacy. 'At once' is readable modern English while preserving
    the temporal force.
- source_word: ἐξανέτειλεν
  chosen: sprang up
  alternatives:
  - came up
  - shot up
  lexicon: BDAG
  rationale: In agricultural context the verb refers to sprouting/emerging. 'Sprang
    up' is idiomatic and vivid without being overly colloquial.
- source_word: διὰ τὸ μὴ ἔχειν βάθος γῆς
  chosen: because it had no depth of soil
  alternatives:
  - because it had no deep soil
  - because the soil had no depth
  lexicon: BDAG
  rationale: The articular infinitive with διά expresses cause. βάθος γῆς is literally
    'depth of soil/earth'; 'no depth of soil' preserves the image of shallow topsoil
    over rock.
