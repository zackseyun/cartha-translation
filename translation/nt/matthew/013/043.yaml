id: MAT.13.43
reference: Matthew 13:43
source:
  edition: SBLGNT
  text: Τότε οἱ δίκαιοι ἐκλάμψουσιν ὡς ὁ ἥλιος ἐν τῇ βασιλείᾳ τοῦ πατρὸς αὐτῶν. ὁ
    ἔχων ⸀ὦτα ἀκουέτω.
translation:
  text: Then the righteous will shine like the sun in the kingdom of their Father.
    The one who has ears, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will shine forth.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'The one who has ears, let him hear'—a singular, representative call
      to heed.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the eschatological sequence from the preceding
    explanation; 'Then' is natural and sufficiently formal.
- source_word: οἱ δίκαιοι
  chosen: the righteous
  alternatives:
  - the just
  - the upright
  lexicon: BDAG
  rationale: Substantival adjective referring to those counted righteous. 'The righteous'
    is the standard, clear English equivalent and fits both moral and covenantal dimensions
    without overinterpreting.
- source_word: ἐκλάμψουσιν
  chosen: will shine
  alternatives:
  - will shine forth
  - will gleam
  lexicon: BDAG
  rationale: Future active indicative of ἐκλάμπω, 'shine out/forth.' 'Will shine'
    is idiomatic modern English; the simile 'like the sun' already conveys brilliance,
    so 'forth' is not required in the main text.
- source_word: ὡς ὁ ἥλιος
  chosen: like the sun
  alternatives:
  - as the sun
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'Like the sun' is the most natural contemporary
    rendering while preserving the image.
- source_word: ἐν τῇ βασιλείᾳ
  chosen: in the kingdom
  alternatives:
  - in the reign
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom; here the locative phrase with 'of
    their Father' is best rendered 'in the kingdom,' preserving the realm aspect without
    denying royal rule.
- source_word: τοῦ πατρὸς αὐτῶν
  chosen: of their Father
  alternatives:
  - of their heavenly Father
  lexicon: BDAG
  rationale: The genitive specifies whose kingdom it is. 'Their Father' closely follows
    the Greek; adding 'heavenly' would import wording not present in this verse.
- source_word: ὁ ἔχων ὦτα
  chosen: The one who has ears
  alternatives:
  - He who has ears
  - Whoever has ears
  lexicon: BDAG
  rationale: A substantival participial expression introducing a solemn call to heed.
    'The one who has ears' preserves the singular form and remains readable modern
    English.
- source_word: ἀκουέτω
  chosen: let him hear
  alternatives:
  - let him listen
  - must hear
  lexicon: BDAG
  rationale: Third-person present active imperative. 'Let him hear' preserves the
    traditional force and the distinction between mere listening and truly heeding.
    The masculine singular is retained in line with the gender-accurate policy for
    representative singular expressions.
