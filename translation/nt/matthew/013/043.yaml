theological_decisions:
- issue: Representative masculine in the closing exhortation
  chosen_reading: 'Retain singular masculine wording in English: ''let him hear'''
  alternative_readings:
  - let them hear
  - let that person hear
  rationale: The Greek uses a masculine singular participle and imperative construction
    functioning representatively. Per the translation philosophy, gender-accurate
    renderings are preferred over flattening to gender-neutral language when the source
    is grammatically masculine with generic force.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Nature of βασιλεία in this context
  chosen_reading: Render as 'kingdom' rather than 'reign'
  alternative_readings:
  - reign
  rationale: The phrase 'in the kingdom of their Father' is naturally locative and
    evokes the eschatological realm in which the righteous shine. 'Kingdom' best fits
    the syntax and imagery here without making a denominationally loaded claim.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
