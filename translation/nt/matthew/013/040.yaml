theological_decisions:
- issue: Eschatological phrase τοῦ αἰῶνος
  chosen_reading: of the age
  alternative_readings:
  - of the world
  rationale: The verse refers to the consummation of the present age in Jesus's eschatological
    teaching. Rendering αἰών as 'age' preserves the temporal and redemptive-historical
    nuance and avoids collapsing it into the physical cosmos. This maintains the text's
    theological tension without importing a more specific end-times scheme.
  doctrine_reference: Translation philosophy §1, §3
