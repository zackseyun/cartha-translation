id: MAT.13.40
reference: Matthew 13:40
source:
  edition: SBLGNT
  text: ὥσπερ οὖν συλλέγεται τὰ ζιζάνια καὶ πυρὶ ⸀καίεται, οὕτως ἔσται ἐν τῇ συντελείᾳ
    τοῦ ⸀αἰῶνος·
translation:
  text: Therefore, just as the weeds are gathered and burned with fire, so it will
    be at the end of the age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the tares.' The Greek term refers to harmful weeds,
      likely darnel.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the end of the world'; Greek 'of the age.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ οὖν
  chosen: Therefore, just as
  alternatives:
  - So then, just as
  - Therefore, as
  lexicon: BDAG
  rationale: ὥσπερ introduces the comparison ('just as'), while οὖν marks inference
    or continuation ('therefore/so then'). Rendering both preserves the logical connection
    to the preceding explanation.
- source_word: συλλέγεται
  chosen: are gathered
  alternatives:
  - are collected
  - is gathered
  lexicon: BDAG
  rationale: Present passive/middle singular with neuter plural subject τὰ ζιζάνια
    is naturally rendered in English with a plural verb. 'Gathered' fits the agricultural
    context and matches the imagery of collecting weeds for disposal.
- source_word: τὰ ζιζάνια
  chosen: the weeds
  alternatives:
  - the darnel weeds
  - the tares
  lexicon: BDAG
  rationale: ζιζάνια refers to noxious weeds, likely darnel, in the parable. 'Weeds'
    is clear modern English; 'tares' is traditional but archaic, while 'darnel' is
    more specific than many readers will recognize. The article is retained as 'the
    weeds' because these are the weeds already identified in the parable.
- source_word: πυρὶ καίεται
  chosen: burned with fire
  alternatives:
  - burned in the fire
  - consumed by fire
  lexicon: BDAG
  rationale: The dative πυρί is instrumental or associative here. 'Burned with fire'
    is a natural English rendering that preserves the explicit mention of fire without
    overinterpreting the dative. 'Consumed' is possible but slightly more interpretive
    than the simple verb καίω.
- source_word: οὕτως ἔσται
  chosen: so it will be
  alternatives:
  - thus it will be
  - in the same way it will be
  lexicon: BDAG
  rationale: This phrase draws the comparison to its eschatological fulfillment. 'So
    it will be' is concise, natural, and preserves the forward-looking force of the
    future ἔσται.
- source_word: ἐν τῇ συντελείᾳ
  chosen: at the end
  alternatives:
  - in the completion
  - at the consummation
  lexicon: BDAG
  rationale: συντέλεια denotes culmination or consummation. 'At the end' is idiomatic
    and clear in English, while still fitting the eschatological context. 'Consummation'
    is more formal but less accessible.
- source_word: τοῦ αἰῶνος
  chosen: of the age
  alternatives:
  - of the world
  - of this age
  lexicon: BDAG
  rationale: αἰών is best rendered 'age' rather than 'world' here, preserving the
    temporal-redemptive sense rather than a spatial one. 'This age' is interpretive
    since the Greek lacks an explicit demonstrative.
