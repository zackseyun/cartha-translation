theological_decisions:
- issue: Rendering of the christological title υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase is a title with apocalyptic and messianic overtones, not merely
    a generic reference to a human being. 'The Son of Man' preserves the canonical
    and theological resonance without flattening the title into an interpretive paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §2
