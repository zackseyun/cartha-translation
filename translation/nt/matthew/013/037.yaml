id: MAT.13.37
reference: Matthew 13:37
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς ⸀εἶπεν· Ὁ σπείρων τὸ καλὸν σπέρμα ἐστὶν ὁ υἱὸς τοῦ ἀνθρώπου·
translation:
  text: He answered, “The one who sows the good seed is the Son of Man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Human One.” The Greek title “the Son of Man” echoes Daniel 7 and
      is retained here for its established Gospel and theological resonance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι functions idiomatically as a
    deponent, introducing Jesus' response. 'Answered' is standard, natural English
    and preserves the discourse function without unnecessary literalism.
- source_word: εἶπεν
  chosen: He answered
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Combined in English with ἀποκριθεὶς to avoid the awkwardly redundant
    'answering, he said.' The finite verb carries the main speech introduction, while
    the participle is absorbed into 'answered,' a common optimal-equivalence rendering.
- source_word: Ὁ σπείρων
  chosen: The one who sows
  alternatives:
  - He who sows
  - The sower
  lexicon: BDAG
  rationale: The substantival present participle identifies the referent by action.
    'The one who sows' is clear modern English and preserves the ongoing/generic force
    better than the more compressed 'the sower' in this explanatory context.
- source_word: τὸ καλὸν σπέρμα
  chosen: the good seed
  alternatives:
  - the fine seed
  lexicon: BDAG
  rationale: καλός here denotes what is good/fit/noble rather than merely aesthetically
    'fine.' 'Seed' is singular collective in English as in Greek, so no expansion
    to 'seeds' is warranted.
- source_word: υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels, with strong
    intertextual resonance from Daniel 7. The traditional but still intelligible 'Son
    of Man' best preserves both the idiom and its theological weight.
