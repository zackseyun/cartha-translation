id: MAT.13.44
reference: Matthew 13:44
source:
  edition: SBLGNT
  text: ⸀Ὁμοία ἐστὶν ἡ βασιλεία τῶν οὐρανῶν θησαυρῷ κεκρυμμένῳ ἐν τῷ ἀγρῷ, ὃν εὑρὼν
    ἄνθρωπος ἔκρυψεν, καὶ ἀπὸ τῆς χαρᾶς αὐτοῦ ὑπάγει καὶ ⸂πωλεῖ πάντα ὅσα ἔχει⸃ καὶ
    ἀγοράζει τὸν ἀγρὸν ἐκεῖνον.
translation:
  text: The kingdom of heaven is like a treasure hidden in a field, which a man found
    and hid; and in his joy he goes and sells all that he has and buys that field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The kingdom of heaven is like treasure hidden in a field.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'because of his joy he goes away and sells everything he owns.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁμοία ἐστὶν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Standard comparative formula in Jesus' parables; 'is like' is idiomatic
    modern English and preserves the simile without wooden literalism.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the reign of heaven
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Traditional Matthean expression. 'Kingdom' best preserves βασιλεία in
    this context; 'heaven' rather than 'the heavens' is idiomatic English while retaining
    Matthew's reverential circumlocution for God's reign.
- source_word: θησαυρῷ
  chosen: a treasure
  alternatives:
  - treasure
  lexicon: BDAG
  rationale: 'Anarthrous dative after ὁμοία supports an indefinite comparison: the
    kingdom is like ''a treasure,'' not necessarily ''treasure'' in the abstract.'
- source_word: κεκρυμμένῳ ἐν τῷ ἀγρῷ
  chosen: hidden in a field
  alternatives:
  - having been hidden in the field
  - concealed in a field
  lexicon: BDAG
  rationale: Perfect passive participle conveys a state of being hidden. 'In a field'
    is natural English; the article on ἀγρῷ is not necessarily definite in translation
    within the comparison.
- source_word: ὃν εὑρὼν ἄνθρωπος
  chosen: which a man found
  alternatives:
  - which, after finding, a man
  - which a person found
  lexicon: BDAG
  rationale: Restructured for natural English while preserving the antecedent ('treasure')
    and the masculine singular ἄνθρωπος. 'A man' follows the gender-accurate policy
    and matches the source grammar.
- source_word: ἔκρυψεν
  chosen: hid
  alternatives:
  - hid it
  - concealed
  lexicon: BDAG
  rationale: Simple aorist narrative verb. English can omit the object because it
    is implied by the relative clause antecedent; this keeps the sentence concise
    without loss of meaning.
- source_word: ἀπὸ τῆς χαρᾶς αὐτοῦ
  chosen: in his joy
  alternatives:
  - because of his joy
  - from his joy
  lexicon: BDAG
  rationale: The prepositional phrase expresses motivating cause. 'In his joy' is
    idiomatic and captures both the emotional state and causal force.
- source_word: ὑπάγει
  chosen: he goes
  alternatives:
  - he goes away
  - he departs
  lexicon: BDAG
  rationale: Present tense in vivid narrative is well represented by simple present
    in English. 'He goes' preserves the sequence without overtranslating.
- source_word: πωλεῖ πάντα ὅσα ἔχει
  chosen: sells all that he has
  alternatives:
  - sells everything he owns
  - sells all he has
  lexicon: BDAG
  rationale: This rendering closely follows the Greek while remaining natural. 'All
    that he has' preserves the comprehensiveness of πάντα ὅσα ἔχει.
- source_word: ἀγοράζει τὸν ἀγρὸν ἐκεῖνον
  chosen: buys that field
  alternatives:
  - purchases that field
  - buys that very field
  lexicon: BDAG
  rationale: Straightforward commercial language. 'That field' reflects the demonstrative
    ἐκεῖνον and keeps the narrative emphasis on the specific field containing the
    treasure.
