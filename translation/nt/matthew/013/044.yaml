theological_decisions:
- issue: Gender rendering of ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The noun is grammatically masculine singular and the parable narrates
    a representative male figure. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of βασιλεία
  chosen_reading: kingdom
  alternative_readings:
  - reign
  rationale: The term can denote both realm and reign, but in parabolic comparison
    'kingdom' remains the most natural and established English rendering while still
    allowing the dynamic sense of God's rule to be inferred. No doctrinal issue is
    resolved beyond the lexical range.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
