id: MAT.13.2
reference: Matthew 13:2
source:
  edition: SBLGNT
  text: καὶ συνήχθησαν πρὸς αὐτὸν ὄχλοι πολλοί, ὥστε αὐτὸν ⸀εἰς πλοῖον ἐμβάντα καθῆσθαι,
    καὶ πᾶς ὁ ὄχλος ἐπὶ τὸν αἰγιαλὸν εἱστήκει.
translation:
  text: And large crowds gathered to him, so that he got into a boat and sat down,
    and the whole crowd stood on the shore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boarded a boat and sat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the beach' or 'by the seashore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: gathered
  alternatives:
  - were gathered together
  - assembled
  lexicon: BDAG
  rationale: Aorist passive here is naturally rendered in English as an intransitive/middle-like
    'gathered.' 'Assembled' is possible, but 'gathered' is more idiomatic and preserves
    the sense of crowds coming together around Jesus.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - around him
  - near him
  lexicon: BDAG
  rationale: πρός with accusative commonly indicates movement toward a person. 'To
    him' is the most direct rendering; 'around him' is interpretive and better left
    implicit from context.
- source_word: ὄχλοι πολλοί
  chosen: large crowds
  alternatives:
  - many crowds
  - great crowds
  lexicon: BDAG
  rationale: The plural with πολλοί emphasizes numerous crowd-groups; idiomatic English
    expresses this as 'large crowds.' 'Many crowds' is overly literal and awkward.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: ὥστε introduces a result clause. 'So that' preserves the causal-result
    relationship without overformalizing.
- source_word: εἰς πλοῖον ἐμβάντα
  chosen: got into a boat
  alternatives:
  - boarded a boat
  - entered into a boat
  lexicon: BDAG
  rationale: The participle ἐμβάντα with εἰς πλοῖον denotes entering/boarding a boat.
    'Got into a boat' is natural modern English and fits the narrative flow.
- source_word: καθῆσθαι
  chosen: sat down
  alternatives:
  - sat
  - took his seat
  lexicon: BDAG
  rationale: The infinitive expresses the result of entering the boat. 'Sat down'
    is idiomatic and slightly more vivid than bare 'sat,' while avoiding the formality
    of 'took his seat.'
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: Although earlier the text has plural 'crowds,' Matthew then refers to
    them collectively as a singular mass. 'The whole crowd' preserves that collective
    singular sense in natural English.
- source_word: ἐπὶ τὸν αἰγιαλόν
  chosen: on the shore
  alternatives:
  - on the beach
  - by the seashore
  lexicon: BDAG
  rationale: αἰγιαλός denotes shore/beach. 'Shore' is the most neutral and broadly
    suitable in English; 'beach' may sound too specific or casual.
- source_word: εἱστήκει
  chosen: stood
  alternatives:
  - was standing
  - had taken its stand
  lexicon: BDAG
  rationale: The pluperfect/imperfective force of ἵστημι here describes the crowd's
    standing position. English simple past 'stood' conveys the scene naturally without
    unnecessary aspectual heaviness.
