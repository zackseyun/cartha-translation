id: MAT.13.13
reference: Matthew 13:13
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἐν παραβολαῖς αὐτοῖς λαλῶ, ὅτι βλέποντες οὐ βλέπουσιν καὶ ἀκούοντες
    οὐκ ἀκούουσιν οὐδὲ συνίουσιν·
translation:
  text: 'For this reason I speak to them in parables: because though seeing, they
    do not see, and though hearing, they do not hear, nor do they understand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'seeing they do not see, and hearing they do not hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: The prepositional phrase introduces Jesus' explanation of why he speaks
    in parables. 'For this reason' is natural English and preserves the causal force
    without overstating inferential force as 'therefore' might.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: A straightforward rendering of ἐν + dative. 'In parables' is idiomatic
    in English and matches the mode of speech indicated by the Greek.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to these people
  lexicon: BDAG
  rationale: The dative pronoun refers to the audience Jesus addresses. 'To them'
    is the most direct and contextually sufficient rendering.
- source_word: λαλῶ
  chosen: I speak
  alternatives:
  - I am speaking
  - I talk
  lexicon: BDAG
  rationale: Present indicative first singular. 'I speak' preserves the simple present
    and suits the explanatory context better than the more colloquial 'I talk'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for Jesus' speaking in parables, not merely
    content. 'Because' best captures the causal sense in context.
- source_word: βλέποντες οὐ βλέπουσιν
  chosen: though seeing, they do not see
  alternatives:
  - seeing, they do not see
  - while seeing, they do not see
  lexicon: BDAG
  rationale: The participle plus finite verb creates a paradoxical concessive sense
    in English. 'Though seeing' makes explicit the force that is natural in context
    without adding foreign content.
- source_word: ἀκούοντες οὐκ ἀκούουσιν
  chosen: though hearing, they do not hear
  alternatives:
  - hearing, they do not hear
  - while hearing, they do not hear
  lexicon: BDAG
  rationale: Parallel to the previous clause. 'Though hearing' preserves the rhetorical
    contrast and reads naturally in English.
- source_word: οὐδὲ
  chosen: nor do
  alternatives:
  - and do not
  - neither do
  lexicon: BDAG
  rationale: This conjunction continues the negated series climactically. 'Nor do'
    is concise and idiomatic before the final verb.
- source_word: συνίουσιν
  chosen: understand
  alternatives:
  - comprehend
  - perceive
  lexicon: BDAG
  rationale: συνίημι here denotes grasping the meaning or significance of what is
    heard and seen. 'Understand' is the clearest modern English equivalent and fits
    the Matthean emphasis on comprehension.
