theological_decisions:
- issue: Force of the participles βλέποντες and ἀκούοντες
  chosen_reading: Rendered concessively as 'though seeing' and 'though hearing'
  alternative_readings:
  - Rendered more formally as 'seeing' and 'hearing' without making the concessive
    nuance explicit
  rationale: The Greek participles can be translated more literally, but in this context
    the paradox and judicial irony are best conveyed in English by making the concessive
    sense explicit. This preserves the theological tension of physical perception
    without spiritual comprehension rather than resolving it into a paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of συνίουσιν in context
  chosen_reading: '''understand'' as failure of spiritual/intellectual grasp'
  alternative_readings:
  - '''perceive'''
  - '''comprehend'''
  rationale: The verse contrasts outward seeing/hearing with inward grasp of meaning.
    'Understand' communicates this clearly without importing a stronger doctrinal
    claim about culpability beyond the text itself.
  doctrine_reference: Translation philosophy §6
