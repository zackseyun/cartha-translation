id: MAT.13.4
reference: Matthew 13:4
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ σπείρειν αὐτὸν ἃ μὲν ἔπεσεν παρὰ τὴν ὁδόν, καὶ ⸂ἐλθόντα τὰ πετεινὰ⸃
    κατέφαγεν αὐτά.
translation:
  text: And as he was sowing, some seeds fell beside the path, and the birds came
    and devoured them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'some things fell beside the path'; 'seeds' is supplied
      from the context of the sower.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ σπείρειν αὐτὸν
  chosen: as he was sowing
  alternatives:
  - while he was sowing
  - in his sowing
  lexicon: BDAG
  rationale: The preposition ἐν with the articular infinitive expresses contemporaneous
    time. 'As he was sowing' is natural English and preserves the temporal sense without
    wooden literalism.
- source_word: ἃ μὲν
  chosen: some seeds
  alternatives:
  - some
  - some of the seed
  lexicon: BDAG
  rationale: The relative pronoun is neuter plural ('some things'), referring back
    to the seed scattered by the sower in context. English requires the implied noun
    to be supplied; 'some seeds' is clearer than the more collective 'some of the
    seed' in this sentence.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was falling
  lexicon: BDAG
  rationale: 'Aorist indicative here is best rendered with simple past in narrative:
    ''fell.'''
- source_word: παρὰ τὴν ὁδόν
  chosen: beside the path
  alternatives:
  - along the road
  - by the wayside
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. ὁδός can
    mean road, way, or path; 'path' fits the agricultural setting and avoids archaic
    'wayside.' 'Beside' better reflects παρά than the more idiomatic but slightly
    broader 'along.'
- source_word: ἐλθόντα τὰ πετεινὰ
  chosen: the birds came
  alternatives:
  - the birds, having come
  - the birds of the air came
  lexicon: BDAG
  rationale: 'The aorist participle ἐλθόντα is adverbial, naturally rendered by an
    English finite verb in sequence: ''came.'' πετεινά denotes birds/flying creatures;
    ''birds'' is the cleanest rendering here. ''Of the air'' is not present in this
    verse and should not be imported from parallels.'
- source_word: κατέφαγεν
  chosen: devoured
  alternatives:
  - ate up
  - consumed
  lexicon: BDAG
  rationale: κατεσθίω intensifies the idea of eating/consuming. 'Devoured' conveys
    the force better than plain 'ate,' while remaining idiomatic.
- source_word: αὐτά
  chosen: them
  alternatives:
  - those seeds
  lexicon: BDAG
  rationale: The pronoun refers to the fallen seeds. English pronoun 'them' is sufficient
    and avoids unnecessary repetition.
