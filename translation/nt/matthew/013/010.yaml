id: MAT.13.10
reference: Matthew 13:10
source:
  edition: SBLGNT
  text: Καὶ προσελθόντες οἱ μαθηταὶ εἶπαν αὐτῷ· Διὰ τί ἐν παραβολαῖς λαλεῖς αὐτοῖς;
translation:
  text: Then the disciples came up and said to him, “Why do you speak to them in parables?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached' instead of 'came up'; the Greek participle emphasizes that
      the disciples first came near to Jesus before speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  lexicon: BDAG
  rationale: Though καί is often simply 'and,' here it advances the narrative to the
    disciples' approach after Jesus' public teaching. 'Then' gives natural English
    narrative flow without adding content.
- source_word: προσελθόντες
  chosen: came up
  alternatives:
  - came
  - approached
  - having come near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating approach toward Jesus prior
    to speaking. 'Came up' is idiomatic modern English that preserves the movement
    toward him better than the flatter 'came.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article with μαθηταί identifies the known group of disciples. 'His'
    is implied by context but not explicit in the Greek, so 'the disciples' is preferred.
- source_word: εἶπαν αὐτῷ
  chosen: said to him
  alternatives:
  - asked him
  - said to him
  lexicon: BDAG
  rationale: λέγω here introduces a direct question. English can idiomatically use
    'asked him,' but the Greek verb is 'said,' so 'said to him' stays closer to the
    source while remaining natural.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: BDAG
  rationale: Standard interrogative expression meaning 'why?' A concise English interrogative
    best matches the Greek.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: ἐν with the dative here expresses manner or medium. 'In parables' is
    the established and most natural English rendering, accurately preserving the
    form of Jesus' speech.
- source_word: λαλεῖς
  chosen: do you speak
  alternatives:
  - are you speaking
  - do you talk
  lexicon: BDAG
  rationale: Present active indicative, second singular. 'Do you speak' fits the direct
    question and preserves the verbal aspect without overtranslating.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: Dative pronoun marking the audience addressed by Jesus. 'To them' is
    the straightforward and contextually correct rendering.
