theological_decisions:
- issue: Rendering the judicial-purpose clause in a way that preserves tension between
    divine judgment and human responsibility
  chosen_reading: lest they should see ... understand ... turn back, and I will heal
    them
  alternative_readings:
  - otherwise they would see ... understand ... turn back, and I would heal them
  rationale: The verse quotes Isaiah in a context of judicial hardening. The translation
    preserves the surface force of μήποτε ('lest') without softening the tension or
    resolving debates over whether the clause is purpose, result, or ironic description.
    It also preserves the people's active role in closing their eyes.
  doctrine_reference: Preserve theological tension rather than resolve it.
