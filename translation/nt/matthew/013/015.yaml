id: MAT.13.15
reference: Matthew 13:15
source:
  edition: SBLGNT
  text: ἐπαχύνθη γὰρ ἡ καρδία τοῦ λαοῦ τούτου, καὶ τοῖς ὠσὶν βαρέως ἤκουσαν, καὶ τοὺς
    ὀφθαλμοὺς αὐτῶν ἐκάμμυσαν· μήποτε ἴδωσιν τοῖς ὀφθαλμοῖς καὶ τοῖς ὠσὶν ἀκούσωσιν
    καὶ τῇ καρδίᾳ συνῶσιν καὶ ἐπιστρέψωσιν, καὶ ἰάσομαι αὐτούς.
translation:
  text: For this people's heart has grown dull, and with their ears they scarcely
    hear, and they have closed their eyes, lest they should see with their eyes and
    hear with their ears and understand with their heart and turn back, and I will
    heal them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their ears they hear with difficulty,' literally 'they heard heavily.'
    reason: lexical_alternative
  - marker: b
    text: Or 'turn' or 'return' for 'turn back.'
    reason: lexical_alternative
  - marker: c
    text: Quoted from Isaiah 6:9–10.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπαχύνθη
  chosen: has grown dull
  alternatives:
  - has become fat
  - has grown calloused
  - has become insensitive
  lexicon: BDAG
  rationale: Literally denotes becoming thick/fat, but in this idiom with 'heart'
    it refers to spiritual/moral dullness or insensibility. 'Has grown dull' is natural
    modern English and preserves the metaphorical force without awkward literalism.
- source_word: καρδία
  chosen: heart
  lexicon: BDAG
  rationale: Standard rendering for the inner person, especially the seat of understanding
    and disposition in biblical usage. Retained consistently here because the verse
    itself links heart with understanding.
- source_word: λαοῦ τούτου
  chosen: this people's
  alternatives:
  - the heart of this people
  - of this people
  lexicon: BDAG
  rationale: Rendered as a possessive phrase in English for readability while preserving
    the demonstrative emphasis on 'this people.'
- source_word: βαρέως
  chosen: scarcely
  alternatives:
  - heavily
  - with difficulty
  - dully
  lexicon: BDAG
  rationale: The adverb literally suggests heaviness; in context with hearing it conveys
    impaired or reluctant hearing. 'Scarcely hear' communicates the sense idiomatically
    in modern English.
- source_word: ἤκουσαν
  chosen: hear
  alternatives:
  - heard
  - have heard
  lexicon: BDAG
  rationale: 'Although formally aorist, it is rendered in English with present force
    within the prophetic citation to match the ongoing condition being described:
    their ears function in a deficient way. This also aligns the clause with the surrounding
    gnomic description.'
- source_word: ἐκάμμυσαν
  chosen: have closed
  alternatives:
  - shut
  - closed tightly
  lexicon: BDAG
  rationale: Aorist active describing deliberate action regarding the eyes. 'Have
    closed' captures completed action with present relevance and preserves the active
    agency of the people.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that they may not
  lexicon: BDAG
  rationale: Introduces a negative purpose/result clause in the citation. 'Lest' is
    concise and preserves the force better than a looser paraphrase.
- source_word: ἴδωσιν ... ἀκούσωσιν ... συνῶσιν ... ἐπιστρέψωσιν
  chosen: they should see ... hear ... understand ... turn back
  alternatives:
  - they may see ... hear ... understand ... turn
  - they might see ... hear ... understand ... return
  lexicon: BDAG
  rationale: Aorist subjunctives under μήποτε are rendered with 'should' after 'lest'
    in idiomatic English. This preserves the sequence and rhetorical force of the
    warning/judgment citation.
- source_word: συνῶσιν
  chosen: understand
  alternatives:
  - perceive
  - comprehend
  lexicon: BDAG
  rationale: 'Standard contextual sense of συνίημι here: grasping with insight. ''Understand''
    is clear and idiomatic.'
- source_word: ἐπιστρέψωσιν
  chosen: turn back
  alternatives:
  - turn
  - return
  - be converted
  lexicon: BDAG
  rationale: The verb can mean turn/return, often in repentance contexts. 'Turn back'
    preserves the directional force without importing later ecclesiastical language
    like 'be converted.' An alternative is preserved in a footnote because 'turn'/'return'
    are both viable.
- source_word: ἰάσομαι
  chosen: I will heal
  alternatives:
  - I would heal
  lexicon: BDAG
  rationale: Future middle, naturally rendered 'I will heal.' In the Isaianic citation
    this expresses the result that would follow their turning. The straightforward
    future best matches the Greek form.
