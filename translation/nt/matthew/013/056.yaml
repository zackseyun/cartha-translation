id: MAT.13.56
reference: Matthew 13:56
source:
  edition: SBLGNT
  text: καὶ αἱ ἀδελφαὶ αὐτοῦ οὐχὶ πᾶσαι πρὸς ἡμᾶς εἰσιν; πόθεν οὖν τούτῳ ταῦτα πάντα;
translation:
  text: And are not all his sisters with us? Where then did this man get all these
    things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'female relatives.' The Greek word normally means 'sisters' here, but
      some interpret it more broadly in light of later theological discussions.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀδελφαὶ
  chosen: sisters
  alternatives:
  - female relatives
  lexicon: BDAG
  rationale: The ordinary familial sense fits the village-speakers' reference to Jesus'
    household in context. 'Sisters' is the most natural and direct rendering of ἀδελφαί
    here.
- source_word: οὐχὶ πᾶσαι
  chosen: are not all
  alternatives:
  - are all not
  - are they not all
  lexicon: BDAG
  rationale: This combination expects an affirmative answer in a rhetorical question.
    'Are not all' preserves both the interrogative force and the emphasis on the entirety
    of the sisters.
- source_word: πρὸς ἡμᾶς
  chosen: with us
  alternatives:
  - among us
  - here with us
  lexicon: BDAG
  rationale: In this idiom, πρός with a personal pronoun conveys association or presence
    in the community. 'With us' is concise and idiomatic English; 'among us' is possible
    but slightly more interpretive.
- source_word: πόθεν
  chosen: Where then did
  alternatives:
  - From where then did
  - How then did
  lexicon: BDAG
  rationale: πόθεν asks about source or origin. 'Where then did' communicates the
    sense naturally in English while preserving the question about the source of Jesus'
    abilities or teaching.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν here marks an inferential step in the crowd's reasoning. 'Then' fits
    the rhetorical flow better than the more formal 'therefore'.
- source_word: τούτῳ
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: The dative demonstrative refers to Jesus in a somewhat dismissive way
    in this context. 'This man' brings out the deictic and mildly disparaging tone
    better than the flatter 'he' or less idiomatic 'this one.'
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - these things, all of them
  lexicon: BDAG
  rationale: The phrase points broadly to the wisdom and mighty works just mentioned
    in the surrounding context. 'All these things' is the most straightforward rendering
    of the plural expression.
