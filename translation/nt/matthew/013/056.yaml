theological_decisions:
- issue: Nature of the reference to Jesus' sisters
  chosen_reading: Translate ἀδελφαὶ in its ordinary lexical sense as 'sisters' without
    importing a doctrinal explanation about broader kinship or perpetual virginity.
  alternative_readings:
  - female relatives/cousins
  rationale: The translation should reflect the plain sense of the Greek term in context
    and not resolve later doctrinal debates beyond what the text itself states. Any
    broader interpretive claim would go beyond translation into theological harmonization.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
