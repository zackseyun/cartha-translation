id: MAT.13.53
reference: Matthew 13:53
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ὅτε ἐτέλεσεν ὁ Ἰησοῦς τὰς παραβολὰς ταύτας, μετῆρεν ἐκεῖθεν.
translation:
  text: And when Jesus had finished these parables, he departed from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And it happened when Jesus finished these parables,
      he departed from there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: BDAG
  rationale: The idiom καὶ ἐγένετο often functions as a narrative transition rather
    than requiring a fully literal 'and it happened.' Rendering it as 'And when' preserves
    the temporal linkage and reads naturally in modern English without unnecessary
    stiffness.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: ὅτε introduces the temporal clause. 'When' is the straightforward equivalent;
    the sense is completed by the English pluperfect in the subordinate clause.
- source_word: ἐτέλεσεν
  chosen: had finished
  alternatives:
  - finished
  - completed
  - ended
  lexicon: BDAG
  rationale: τελέω here means to bring to an end or complete. 'Had finished' fits
    the temporal sequence in English after 'when' and reflects the aorist action as
    prior to the main verb.
- source_word: παραβολὰς
  chosen: parables
  alternatives:
  - illustrations
  lexicon: BDAG
  rationale: παραβολή in the Synoptic teaching context is standardly 'parable.' 'Illustrations'
    is possible dynamically but loses the established genre sense.
- source_word: ταύτας
  chosen: these
  alternatives:
  - these very
  lexicon: BDAG
  rationale: The demonstrative points to the immediately preceding set of parables.
    'These' is sufficient and natural.
- source_word: μετῆρεν
  chosen: departed
  alternatives:
  - moved on
  - left
  - went away
  lexicon: BDAG
  rationale: μεταίρω literally conveys moving from one place to another. In this narrative
    context, 'departed' preserves the formal sense of leaving a location without over-specifying
    manner.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: ἐκεῖθεν is an adverb of place meaning 'from there' or 'from that place.'
    'From there' is concise and idiomatic.
