theological_decisions:
- issue: Implied divine agent in the passive 'has been given'
  chosen_reading: Retain the divine passive without naming God explicitly
  alternative_readings:
  - God has given you
  - it has been granted by God
  rationale: The Greek uses the passive and leaves the giver implicit, a common reverential
    or theological idiom. Explicitly supplying 'God' would be interpretive, even if
    likely correct. Preserving the passive maintains the text's theological tension
    and wording.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of μυστήρια in kingdom context
  chosen_reading: Render as 'mysteries' rather than reducing to a narrower interpretive
    gloss
  alternative_readings:
  - secrets
  - hidden truths
  rationale: The term denotes divine realities previously hidden and now disclosed
    to the disciples. 'Mysteries' preserves the biblical-theological category without
    importing a later technical system or flattening it into mere puzzling information.
