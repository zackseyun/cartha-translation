id: MAT.13.11
reference: Matthew 13:11
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν ⸀αὐτοῖς· Ὅτι ὑμῖν δέδοται γνῶναι τὰ μυστήρια τῆς βασιλείας
    τῶν οὐρανῶν, ἐκείνοις δὲ οὐ δέδοται.
translation:
  text: He answered them, “Because it has been given to you to know the mysteries
    of the kingdom of heaven, but to those people it has not been given.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the secrets of the kingdom of heaven.”
    reason: lexical_alternative
  - marker: b
    text: The passive “has been given” leaves the giver implicit; the sense is that
      this knowledge is granted by God.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: He answered
  alternatives:
  - He answered and said
  - In answer he said
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced Greek idiom
    meaning simply 'answered.' English normally does not require both verbs, and 'He
    answered' preserves the sense without wooden redundancy.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: 'The dative object is naturally expressed in English as the indirect
    object of ''answered'': ''answered them.'''
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - That
  lexicon: BDAG
  rationale: Here ὅτι introduces the content/reason of Jesus' answer. 'Because' best
    fits the discourse context, since he is explaining why he speaks as he does; 'That'
    is possible but less idiomatic in English here.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative marks the recipients of what has been granted. 'To you' is
    the most direct and natural rendering.
- source_word: δέδοται
  chosen: it has been given
  alternatives:
  - it has been granted
  lexicon: BDAG
  rationale: Perfect passive indicates a present state resulting from a prior act
    of giving. 'It has been given' preserves both the passive form and the sense of
    divine grant without overinterpreting the implied giver.
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - to understand
  lexicon: BDAG
  rationale: The aorist infinitive of γινώσκω most basically means 'to know.' 'Understand'
    is interpretive and may be implied, but 'know' stays closer to the lexical sense
    while remaining clear.
- source_word: τὰ μυστήρια
  chosen: the mysteries
  alternatives:
  - the secrets
  lexicon: BDAG
  rationale: μυστήρια refers to truths once hidden and now disclosed. 'Mysteries'
    is the established and accurate rendering; 'secrets' is possible but can sound
    overly colloquial and may underplay the revelatory nuance.
- source_word: τῆς βασιλείας τῶν οὐρανῶν
  chosen: of the kingdom of heaven
  alternatives:
  - of the kingdom of the heavens
  lexicon: BDAG
  rationale: This Matthean expression is conventionally and accurately rendered 'the
    kingdom of heaven.' A more literal plural 'heavens' is possible, but singular
    'heaven' is standard idiomatic English and conveys the sense well.
- source_word: ἐκείνοις
  chosen: to those people
  alternatives:
  - to them
  - to those ones
  lexicon: BDAG
  rationale: ἐκεῖνος here contrasts the disciples with another group at some remove.
    'Those people' preserves the contrast more clearly than simply repeating 'them,'
    which could blur the referent in English.
- source_word: οὐ δέδοται
  chosen: it has not been given
  alternatives:
  - it has not been granted
  lexicon: BDAG
  rationale: The negated perfect passive mirrors the earlier clause and should be
    rendered correspondingly for clarity and rhetorical balance.
