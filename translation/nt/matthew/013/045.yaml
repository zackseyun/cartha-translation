id: MAT.13.45
reference: Matthew 13:45
source:
  edition: SBLGNT
  text: Πάλιν ὁμοία ἐστὶν ἡ βασιλεία τῶν οὐρανῶν ⸀ἀνθρώπῳ ἐμπόρῳ ζητοῦντι καλοὺς μαργαρίτας·
translation:
  text: Again, the kingdom of heaven is like a merchant seeking fine pearls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the kingdom of heaven is like a man, a merchant, seeking
      fine pearls.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Again
  - Also
  - Further
  lexicon: BDAG
  rationale: Introduces another comparison in the series of kingdom parables. 'Again'
    is natural and preserves the discourse flow better than the more wooden 'also.'
- source_word: ὁμοία ἐστὶν
  chosen: is like
  alternatives:
  - is like
  - is comparable to
  lexicon: BDAG
  rationale: Standard idiomatic rendering in parabolic comparisons. 'Is like' is concise
    and natural English while preserving the simile.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is established,
    accurate, and idiomatic; 'of the heavens' would be more literal but less natural
    in English.
- source_word: ἀνθρώπῳ ἐμπόρῳ
  chosen: a merchant
  alternatives:
  - a man, a merchant
  - a merchantman
  - a trader
  lexicon: BDAG
  rationale: 'The dative phrase after ὁμοία functions in the comparison: the kingdom
    is like a merchant. Since ἔμπορος already identifies the person, explicitly repeating
    ''man'' in English is unnecessary. ''Merchant'' is clearer and more modern than
    ''merchantman.'''
- source_word: ζητοῦντι
  chosen: seeking
  alternatives:
  - seeking
  - looking for
  lexicon: BDAG
  rationale: The present participle describes the merchant's ongoing activity. 'Seeking'
    preserves the verbal aspect and reads smoothly in English.
- source_word: καλοὺς μαργαρίτας
  chosen: fine pearls
  alternatives:
  - beautiful pearls
  - good pearls
  - valuable pearls
  lexicon: BDAG
  rationale: καλός here conveys quality or excellence rather than merely visual beauty.
    'Fine pearls' is idiomatic English for pearls of high quality and fits the commercial
    context.
