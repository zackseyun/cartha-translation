theological_decisions:
- issue: Scope of the comparison in the parable formula
  chosen_reading: The kingdom is compared to the merchant rather than explicitly to
    the pearls or the search process alone.
  alternative_readings:
  - The kingdom is like the situation involving a merchant seeking fine pearls.
  rationale: The Greek construction ὁμοία ἐστὶν ... ἀνθρώπῳ ἐμπόρῳ naturally presents
    the merchant as the immediate comparison point. The broader parabolic scenario
    unfolds in the next verse, so the translation keeps the wording simple and does
    not over-interpret the metaphor here.
  doctrine_reference: Preserve theological tension rather than resolve it.
