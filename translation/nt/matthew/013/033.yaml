id: MAT.13.33
reference: Matthew 13:33
source:
  edition: SBLGNT
  text: Ἄλλην παραβολὴν ἐλάλησεν αὐτοῖς· Ὁμοία ἐστὶν ἡ βασιλεία τῶν οὐρανῶν ζύμῃ,
    ἣν λαβοῦσα γυνὴ ⸀ἐνέκρυψεν εἰς ἀλεύρου σάτα τρία ἕως οὗ ἐζυμώθη ὅλον.
translation:
  text: 'He told them another parable: “The kingdom of heaven is like leaven, which
    a woman took and hid in three measures of flour until it was all leavened.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “yeast.” The Greek word refers to a leavening agent used in dough.
    reason: lexical_alternative
  - marker: b
    text: Greek “three seahs of flour,” a large quantity.
    reason: cultural_note
  - marker: c
    text: Or “mixed into” or “worked into”; Greek literally “hid in.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλλην παραβολὴν
  chosen: another parable
  alternatives:
  - a different parable
  lexicon: BDAG
  rationale: ἄλλην with παραβολή straightforwardly introduces an additional parable.
    'Another parable' is natural English and preserves the additive sense.
- source_word: ἐλάλησεν αὐτοῖς
  chosen: He told them
  alternatives:
  - he spoke to them
  - he said to them
  lexicon: BDAG
  rationale: λαλέω is literally 'speak,' but in narrative introduction to a parable,
    'told them' is idiomatic English without adding content.
- source_word: Ὁμοία ἐστὶν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Standard comparative formula in parables; 'is like' is the clearest and
    most natural rendering.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This Matthean expression is conventionally and accurately rendered 'the
    kingdom of heaven.' The plural οὐρανῶν is a Semitic-influenced form and need not
    be woodenly preserved in English.
- source_word: ζύμῃ
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: ζύμη denotes leavening agent. 'Leaven' preserves the traditional and
    metaphorically flexible sense better than 'yeast,' especially in a parabolic context.
- source_word: ἣν λαβοῦσα γυνὴ
  chosen: which a woman took
  alternatives:
  - that a woman, having taken
  - which a woman, after taking
  lexicon: BDAG
  rationale: The participle λαβοῦσα is naturally subordinated in English as 'took.'
    This keeps the action sequence without awkwardness.
- source_word: ἐνέκρυψεν εἰς
  chosen: hid in
  alternatives:
  - mixed into
  - worked into
  lexicon: BDAG
  rationale: ἐγκρύπτω literally means 'hide in/conceal in.' 'Hid in' preserves the
    lexical force. Smoother idioms like 'mixed into' are interpretive and therefore
    kept as alternatives only.
- source_word: ἀλεύρου σάτα τρία
  chosen: three measures of flour
  alternatives:
  - three seahs of flour
  - about three measures of meal
  lexicon: BDAG
  rationale: σάτον is a dry measure; 'measure' communicates the sense in readable
    English. 'Seah' is more precise but less accessible, so it is preserved in a footnote
    rather than the main text.
- source_word: ἕως οὗ ἐζυμώθη ὅλον
  chosen: until it was all leavened
  alternatives:
  - until the whole batch was leavened
  - until all of it was leavened
  lexicon: BDAG
  rationale: The passive ἐζυμώθη indicates the flour/dough became leavened. 'It' refers
    collectively to the mass; 'all leavened' preserves ὅλον without over-specifying
    'batch,' though that is a plausible English expansion.
