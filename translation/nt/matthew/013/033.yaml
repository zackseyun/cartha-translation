theological_decisions:
- issue: Connotation of ζύμη in a kingdom parable
  chosen_reading: Render neutrally as 'leaven' without importing either a positive
    or negative theological valuation into the wording.
  alternative_readings:
  - Render as 'yeast' to emphasize ordinary baking imagery
  - Interpret leaven negatively based on other passages and shape the translation
    accordingly
  rationale: In this context the comparison concerns permeation and hidden spread
    within the kingdom parable. The translation should preserve the image without
    resolving broader interpretive debates about whether leaven is always negative
    or can be positive.
  doctrine_reference: Preserve theological tension rather than resolve it.
