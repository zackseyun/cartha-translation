theological_decisions:
- issue: Messianic significance of 'Son of David'
  chosen_reading: Retained the literal title 'the Son of David' in the children's
    acclamation.
  alternative_readings:
  - the heir of David
  - David's son
  rationale: The phrase functions as a recognized messianic title in Matthew. A more
    paraphrastic rendering would weaken the title's theological and narrative significance.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Rendering of Ὡσαννά
  chosen_reading: Transliterated as 'Hosanna' in the main text.
  alternative_readings:
  - Save, please
  - Save now
  rationale: The expression is both rooted in a plea for salvation and functioning
    here as a fixed acclamation of praise. Transliteration preserves the theological
    tension and liturgical resonance; the more explicit semantic gloss is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3
