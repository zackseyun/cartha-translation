id: MAT.21.15
reference: Matthew 21:15
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ ἀρχιερεῖς καὶ οἱ γραμματεῖς τὰ θαυμάσια ἃ ἐποίησεν καὶ τοὺς
    παῖδας ⸀τοὺς κράζοντας ἐν τῷ ἱερῷ καὶ λέγοντας· Ὡσαννὰ τῷ υἱῷ Δαυίδ ἠγανάκτησαν
translation:
  text: But when the chief priests and the scribes saw the wonderful things that he
    did, and the children crying out in the temple and saying, “Hosanna to the Son
    of David,” they were indignant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: “Hosanna” is a Hebrew-derived acclamation meaning something like “Save,
      please” or “Save now,” but by this point it also functions as a shout of praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verb; 'when
    ... saw' is natural English and preserves the temporal force without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast with the preceding scene; 'But' best reflects the
    adversative turn.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not a single high priest.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct and established rendering; alternatives
    are interpretive expansions not required by the text.'
- source_word: τὰ θαυμάσια
  chosen: the wonderful things
  alternatives:
  - the marvelous things
  - the wonders
  lexicon: BDAG
  rationale: The adjective used substantivally refers broadly to remarkable deeds.
    'Wonderful things' is clear, natural, and does not over-specify them as miracles
    alone.
- source_word: ἐποίησεν
  chosen: he did
  alternatives:
  - he had done
  - he performed
  lexicon: BDAG
  rationale: Simple aorist narrative verb; 'he did' is the plainest rendering and
    matches the broad object 'wonderful things.'
- source_word: παῖδας
  chosen: children
  alternatives:
  - boys
  - young people
  - servants
  lexicon: BDAG
  rationale: In this context of those in the temple crying out, 'children' is the
    most likely sense. 'Servants' is contextually unlikely, and 'boys' is too narrow.
- source_word: κράζοντας
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: Conveys loud public acclamation without implying hostility. 'Crying out'
    fits both the lexical sense and the liturgical tone of the scene.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is idiomatic English; the broader sense can be preserved in a footnote.
- source_word: λέγοντας
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: Participle coordinated with 'crying out'; rendered straightforwardly
    in English as part of the children's action.
- source_word: Ὡσαννὰ
  chosen: Hosanna
  alternatives:
  - Save, please
  - Save now
  lexicon: BDAG
  rationale: The term is a liturgical acclamation carried over into Greek. Transliteration
    preserves its recognized messianic and worshipful force better than a wooden gloss;
    lexical alternative preserved in a footnote.
- source_word: τῷ υἱῷ Δαυίδ
  chosen: to the Son of David
  alternatives:
  - for the Son of David
  lexicon: BDAG
  rationale: Dative after the acclamation is naturally rendered 'to.' 'Son of David'
    is a messianic title and should be translated literally.
- source_word: ἠγανάκτησαν
  chosen: they were indignant
  alternatives:
  - they became angry
  - they were offended
  lexicon: BDAG
  rationale: Expresses strong displeasure or indignation. 'They were indignant' captures
    both the emotional and moralizing tone better than the flatter 'angry'.
