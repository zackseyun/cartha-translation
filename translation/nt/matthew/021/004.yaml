id: MAT.21.4
reference: Matthew 21:4
source:
  edition: SBLGNT
  text: Τοῦτο ⸀δὲ γέγονεν ἵνα πληρωθῇ τὸ ῥηθὲν διὰ τοῦ προφήτου λέγοντος·
translation:
  text: 'Now this happened so that what was spoken through the prophet might be fulfilled,
    saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the prophet.' The Greek more literally says 'through the prophet,'
      emphasizing prophetic mediation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  chosen: this
  alternatives:
  - these things
  - this event
  lexicon: BDAG
  rationale: Neuter singular demonstrative referring to the immediately preceding
    action as a whole; 'this' is the most natural English equivalent.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is mildly connective/continuative rather than strongly adversative.
    'Now' signals narrative transition in readable English without overstating contrast.
- source_word: γέγονεν
  chosen: happened
  alternatives:
  - has happened
  - came to pass
  - took place
  lexicon: BDAG
  rationale: Perfect of γίνομαι in fulfillment formulas often functions idiomatically
    for an event occurring with present relevance. 'Happened' is natural modern English;
    'has happened' is possible but less smooth in this narrative context.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result in the fulfillment formula. 'So that' preserves
    the telic sense in idiomatic English.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - may be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. 'Might be fulfilled' is a standard
    and accurate English rendering that preserves the subordinate mood without sounding
    wooden.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been said
  lexicon: BDAG
  rationale: Articular participle functioning substantivally. 'What was spoken' is
    idiomatic and preserves the passive sense.
- source_word: διὰ τοῦ προφήτου
  chosen: through the prophet
  alternatives:
  - by the prophet
  - through the mouth of the prophet
  lexicon: BDAG
  rationale: διά with genitive commonly marks agency/instrumentality in prophetic
    citation formulas. 'Through the prophet' preserves the mediated nature of divine
    speech.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - which says
  - who said
  lexicon: BDAG
  rationale: Present active participle introducing the quotation that follows. 'Saying'
    is the conventional and concise way to introduce the cited words.
