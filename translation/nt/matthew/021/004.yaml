theological_decisions:
- issue: Fulfillment formula and prophetic agency
  chosen_reading: 'Rendered the citation formula as mediated speech: ''what was spoken
    through the prophet might be fulfilled.'''
  alternative_readings:
  - what the prophet said would be fulfilled
  - what was spoken by the prophet might be fulfilled
  rationale: The Greek emphasizes fulfillment of prior divine speech mediated through
    a prophet, not merely the prophet's own prediction. 'Through the prophet' best
    preserves that theological nuance without adding words not in the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
