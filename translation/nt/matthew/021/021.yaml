id: MAT.21.21
reference: Matthew 21:21
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν, ἐὰν ἔχητε πίστιν καὶ
    μὴ διακριθῆτε, οὐ μόνον τὸ τῆς συκῆς ποιήσετε, ἀλλὰ κἂν τῷ ὄρει τούτῳ εἴπητε·
    Ἄρθητι καὶ βλήθητι εἰς τὴν θάλασσαν, γενήσεται·
translation:
  text: But Jesus answered them, “Truly I say to you, if you have faith and do not
    doubt, you will not only do what was done to the fig tree, but even if you say
    to this mountain, ‘Be taken up and thrown into the sea,’ it will happen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “do not waver” or “are not divided in mind.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι introducing Jesus' response. 'Answered'
    is idiomatic English and preserves the responsive force without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast. 'But' fits the narrative turn from
    the disciples' observation to Jesus' response.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: This formula introduces a solemn authoritative saying. 'Truly I say to
    you' preserves both the emphatic force of ἀμήν and the direct speech pattern,
    while remaining natural English.
- source_word: ἐὰν ἔχητε πίστιν
  chosen: if you have faith
  alternatives:
  - if you have trust
  - if you have faithfulness
  lexicon: BDAG
  rationale: πίστις is rendered by the project's default as 'faith.' In this context
    it denotes trusting confidence in God rather than 'faithfulness' as a character
    trait.
- source_word: μὴ διακριθῆτε
  chosen: do not doubt
  alternatives:
  - do not waver
  - are not divided in mind
  lexicon: BDAG
  rationale: Passive/subjunctive of διακρίνω here carries the sense of inward hesitation
    or doubting. 'Do not doubt' is the clearest idiomatic rendering in this context;
    alternatives are preserved in a footnote because the verb can also suggest wavering.
- source_word: οὐ μόνον τὸ τῆς συκῆς ποιήσετε
  chosen: you will not only do what was done to the fig tree
  alternatives:
  - you will not only do the thing of the fig tree
  - you will not only do to the fig tree what happened here
  lexicon: BDAG
  rationale: The articular expression τὸ τῆς συκῆς is elliptical and refers to the
    event involving the fig tree in the immediate context. 'What was done to the fig
    tree' makes the ellipsis explicit in natural English without over-paraphrasing.
- source_word: κἂν
  chosen: even if
  alternatives:
  - and if indeed
  - if even
  lexicon: BDAG
  rationale: κἄν (= καὶ ἐάν) intensifies the conditional extension from the fig tree
    to an even greater example. 'Even if' captures that escalatory force.
- source_word: τῷ ὄρει τούτῳ
  chosen: this mountain
  alternatives:
  - this hill
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain.' The demonstrative likely points to a
    specific visible mountain, so 'this mountain' is appropriate.
- source_word: Ἄρθητι
  chosen: Be taken up
  alternatives:
  - Be lifted up
  - Be removed
  lexicon: BDAG
  rationale: Aorist passive imperative of αἴρω. 'Be taken up' preserves the passive
    form and physical imagery better than the more interpretive 'be removed.'
- source_word: βλήθητι εἰς τὴν θάλασσαν
  chosen: thrown into the sea
  alternatives:
  - cast into the sea
  lexicon: BDAG
  rationale: Aorist passive imperative plus prepositional phrase. 'Thrown into the
    sea' is contemporary and vivid; 'cast' is traditional but less natural for modern
    readers.
- source_word: γενήσεται
  chosen: it will happen
  alternatives:
  - it will be done
  - it will come to pass
  lexicon: BDAG
  rationale: Future middle of γίνομαι here indicates that the commanded event will
    occur. 'It will happen' is straightforward modern English and avoids archaic phrasing.
