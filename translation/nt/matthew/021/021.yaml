theological_decisions:
- issue: Rendering of πίστις in a saying about miraculous action
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: Following the doctrine table, πίστις is rendered 'faith' by default.
    In this context Jesus speaks of confident reliance rather than covenantal faithfulness
    as such. The alternatives are lexical possibilities but less fitting here.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Nature of Jesus' saying about moving a mountain
  chosen_reading: Retain the hyperbolic-imagistic wording without narrowing it to
    either literal miracle or mere metaphor
  alternative_readings:
  - strictly literal promise of miraculous relocation
  - pure metaphor for overcoming difficulties
  rationale: The verse uses vivid prophetic-style imagery. The translation should
    preserve the text's force without resolving the interpretive tension into one
    doctrinally loaded reading.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
