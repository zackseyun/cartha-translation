id: MAT.21.5
reference: Matthew 21:5
source:
  edition: SBLGNT
  text: Εἴπατε τῇ θυγατρὶ Σιών· Ἰδοὺ ὁ βασιλεύς σου ἔρχεταί σοι πραῢς καὶ ἐπιβεβηκὼς
    ἐπὶ ὄνον καὶ ⸀ἐπὶ πῶλον υἱὸν ὑποζυγίου.
translation:
  text: Tell the daughter of Zion, ‘Look, your king is coming to you, gentle and mounted
    on a donkey, and on a colt, the foal of a beast of burden.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “humble.” The Greek πραΰς can mean “gentle,” “meek,” or “humble,” and
      echoes Zechariah 9:9.
    reason: lexical_alternative
  - marker: b
    text: 'Matthew preserves the prophetic wording with two linked animal expressions:
      “on a donkey, and on a colt, the foal of a beast of burden.”'
    reason: cross_reference
lexical_decisions:
- source_word: Εἴπατε
  chosen: Tell
  alternatives:
  - Say to
  lexicon: BDAG
  rationale: Aorist imperative plural of λέγω introducing a citation. 'Tell' is natural
    modern English and preserves the directive force toward the addressed audience.
- source_word: τῇ θυγατρὶ Σιών
  chosen: the daughter of Zion
  alternatives:
  - Daughter Zion
  lexicon: BDAG
  rationale: Retains the prophetic personification from the source and OT background
    rather than flattening it to 'the people of Zion/Jerusalem.' The article is represented
    idiomatically in English.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and preserves the summons to attention without archaic tone.
- source_word: ὁ βασιλεύς σου
  chosen: your king
  lexicon: BDAG
  rationale: Straightforward possessive construction; preserves royal/messianic force.
- source_word: ἔρχεταί σοι
  chosen: is coming to you
  alternatives:
  - comes to you
  lexicon: BDAG
  rationale: Present middle/passive used with vivid immediacy. English progressive
    captures the event as impending/presently arriving in context.
- source_word: πραῢς
  chosen: gentle
  alternatives:
  - humble
  - meek
  lexicon: BDAG
  rationale: The adjective can denote meekness/gentleness and, in the Zechariah 9:9
    background, is often rendered 'humble.' Here 'gentle' best fits contemporary English
    while preserving the non-coercive character of the king. The alternative is worth
    preserving because of the prophetic source text and translation tradition.
- source_word: ἐπιβεβηκὼς
  chosen: mounted
  alternatives:
  - sitting
  - riding
  lexicon: BDAG
  rationale: Perfect active participle of ἐπιβαίνω denotes having mounted / being
    mounted upon. 'Mounted' is concise and works smoothly with the prepositional phrases
    that follow.
- source_word: ἐπὶ ὄνον
  chosen: on a donkey
  alternatives:
  - upon a donkey
  lexicon: BDAG
  rationale: Simple prepositional phrase; 'donkey' is the standard modern gloss for
    ὄνος.
- source_word: πῶλον
  chosen: a colt
  alternatives:
  - a young donkey
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, here specified further by the following
    phrase. 'Colt' is idiomatic and traditional, while the appositional phrase clarifies
    the species/class.
- source_word: υἱὸν ὑποζυγίου
  chosen: the foal of a beast of burden
  alternatives:
  - the son of a pack animal
  - the foal of a donkey
  lexicon: BDAG
  rationale: A Semitic-style appositional/genitival expression clarifying the colt
    as the offspring of a beast used for carrying loads. 'Foal of a beast of burden'
    preserves the imagery without woodenly reproducing 'son.'
