theological_decisions:
- issue: Messianic/prophetic citation from Zechariah 9:9 and whether to harmonize
    wording to the Hebrew/known English tradition
  chosen_reading: 'Preserve Matthew''s Greek wording in natural English: ''gentle
    ... mounted on a donkey, and on a colt, the foal of a beast of burden.'''
  alternative_readings:
  - Use 'humble' for πραῢς to align more explicitly with Zechariah 9:9
  - Collapse the two animal phrases into a single referent without preserving Matthew's
    doubled wording
  rationale: The verse is a fulfillment citation with strong messianic significance,
    but the translation should reflect Matthew's actual Greek rather than importing
    a harmonized OT rendering. The doubled animal phrasing is retained because it
    is present in the text and has interpretive significance in Matthew's presentation.
  doctrine_reference: Translation philosophy §§1, 3, 5
