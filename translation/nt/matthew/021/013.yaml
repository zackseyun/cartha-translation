theological_decisions:
- issue: Old Testament citation and allusion
  chosen_reading: Render the verse so that both Isaiah 56:7 ('My house will be called
    a house of prayer') and Jeremiah 7:11 ('den of robbers') remain recognizable in
    English.
  alternative_readings:
  - Use freer contemporary phrasing that obscures the intertextual links
  rationale: Jesus' statement is built from Scripture citations/allusions, so preserving
    recognizable wording is important for theological transparency and auditability.
  doctrine_reference: Translation philosophy §§1, 3, 5
