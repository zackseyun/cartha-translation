id: MAT.21.13
reference: Matthew 21:13
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Γέγραπται· Ὁ οἶκός μου οἶκος προσευχῆς κληθήσεται, ὑμεῖς
    δὲ αὐτὸν ⸀ποιεῖτε σπήλαιον λῃστῶν.
translation:
  text: And he says to them, “It is written, ‘My house will be called a house of prayer,’
    but you are making it a den of robbers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesus combines Isaiah 56:7 with Jeremiah 7:11.
    reason: cross_reference
  - marker: b
    text: Or “bandits.” The Greek term can refer to robbers or violent brigands.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Rendered as present-tense historical present ('he says') to reflect the
    Greek present indicative and preserve Matthew's narrative vividness rather than
    smoothing to English past tense.
- source_word: Γέγραπται
  chosen: It is written
  alternatives:
  - It stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation; preserves the enduring authority implied by the perfect.
- source_word: οἶκός μου
  chosen: My house
  alternatives:
  - My temple
  lexicon: BDAG
  rationale: Kept the literal 'house' because the citation's theological force depends
    on God's house as a scriptural designation; 'temple' is interpretive and narrower
    than the Greek wording.
- source_word: οἶκος προσευχῆς
  chosen: a house of prayer
  alternatives:
  - a prayer house
  lexicon: BDAG
  rationale: Natural English rendering of the genitive construction while preserving
    the scriptural phrasing from Isaiah 56:7.
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - shall be called
  lexicon: BDAG
  rationale: Future passive is rendered straightforwardly in contemporary English
    without archaic 'shall.'
- source_word: ποιεῖτε
  chosen: are making
  alternatives:
  - make
  - are turning into
  lexicon: BDAG
  rationale: Present progressive best conveys the ongoing action in context. 'Are
    turning into' is possible dynamically, but 'are making' stays closer to the Greek
    verb.
- source_word: σπήλαιον
  chosen: den
  alternatives:
  - cave
  - hideout
  lexicon: BDAG
  rationale: '''Den'' is the established and contextually apt rendering for a lair
    or hideout, especially in the Jeremiah 7:11 allusion.'
- source_word: λῃστῶν
  chosen: robbers
  alternatives:
  - bandits
  lexicon: BDAG
  rationale: '''Robbers'' is the most natural English equivalent here and preserves
    the prophetic accusation. ''Bandits'' is possible, since λῃστής can denote violent
    brigands, but ''robbers'' better matches the scriptural echo familiar in English.'
