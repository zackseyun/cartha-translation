id: MAT.21.6
reference: Matthew 21:6
source:
  edition: SBLGNT
  text: πορευθέντες δὲ οἱ μαθηταὶ καὶ ποιήσαντες καθὼς ⸀συνέταξεν αὐτοῖς ὁ Ἰησοῦς
translation:
  text: So the disciples went and did just as Jesus had instructed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commanded them.' The Greek verb can denote giving orders or instructions;
      here the context favors 'instructed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθέντες
  chosen: went
  alternatives:
  - having gone
  - departed
  lexicon: BDAG
  rationale: Aorist participle of πορεύομαι, functioning adverbially before the main
    action. In natural English narrative, 'went' best captures the movement without
    awkwardness; 'having gone' is more formally literal but less idiomatic here.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: δέ marks narrative continuation. 'So' gives a smooth English transition
    that reflects the connection to the prior command; 'and' or 'then' are possible
    but less clearly convey the responsive sequence.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard contextual rendering for μαθηταί in the Gospels. 'Disciples'
    accurately reflects Jesus' followers in this narrative setting.
- source_word: ποιήσαντες
  chosen: did
  alternatives:
  - having done
  - carried out
  lexicon: BDAG
  rationale: Aorist participle coordinated with πορευθέντες and leading into the comparison
    clause. 'Did' is concise and idiomatic in English when followed by 'just as...';
    'carried out' is possible but slightly more interpretive.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - exactly as
  lexicon: BDAG
  rationale: καθώς introduces correspondence to Jesus' command. 'Just as' preserves
    the sense of conformity and obedience more clearly than the bare 'as'.
- source_word: συνέταξεν
  chosen: had instructed
  alternatives:
  - commanded
  - directed
  - ordered
  lexicon: BDAG
  rationale: συντάσσω here denotes giving directions or instructions. 'Had instructed'
    fits the immediate context of Jesus' prior detailed directions; 'commanded' is
    possible but can sound harsher than the narrative requires.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Indirect object naturally expressed in English as 'them' after 'instructed.'
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  alternatives:
  - Jesus himself
  lexicon: BDAG
  rationale: Proper name with article as subject, normally rendered simply 'Jesus'
    in English.
