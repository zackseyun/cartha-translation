theological_decisions:
- issue: Reference of the healing location in relation to ἱερόν
  chosen_reading: Jesus healed them in the temple complex.
  alternative_readings:
  - Jesus healed them in the temple courts.
  rationale: The Greek uses ἱερόν, which normally denotes the broader temple precincts,
    not the inner sanctuary. Rendering simply 'in the temple' is idiomatic, while
    the lexical note preserves the more precise spatial nuance without overstating
    access to the sanctuary itself.
