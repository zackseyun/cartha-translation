id: MAT.21.14
reference: Matthew 21:14
source:
  edition: SBLGNT
  text: Καὶ προσῆλθον αὐτῷ ⸂τυφλοὶ καὶ χωλοὶ⸃ ἐν τῷ ἱερῷ, καὶ ἐθεράπευσεν αὐτούς.
translation:
  text: And the blind and the lame came to him in the temple, and he healed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθον
  chosen: came
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The verb προσέρχομαι means to come or approach toward someone. 'Came'
    is natural modern English here and adequately conveys movement toward Jesus; 'approached'
    is possible but slightly more formal than the context requires.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: The dative pronoun with προσέρχομαι indicates the person approached.
    'To him' is the most idiomatic English rendering.
- source_word: τυφλοὶ
  chosen: the blind
  alternatives:
  - blind people
  - those who were blind
  lexicon: BDAG
  rationale: The adjective is substantival plural, referring to blind persons. 'The
    blind' is concise and natural, preserving the Greek's substantival force without
    unnecessary expansion.
- source_word: χωλοὶ
  chosen: the lame
  alternatives:
  - crippled people
  - those who were lame
  lexicon: BDAG
  rationale: The adjective is substantival plural, referring to those unable to walk
    normally. 'The lame' is the standard, accurate rendering and pairs naturally with
    'the blind.' 'Crippled' can sound harsher and less precise in contemporary English.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than specifically the inner
    sanctuary (ναός). 'In the temple' is acceptable idiomatic English, but the broader
    sense of the temple precincts is worth preserving as an alternative because the
    setting is the larger temple area.
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω commonly means to heal in Gospel miracle contexts. 'He healed'
    is the clearest and most theologically and narratively appropriate rendering in
    modern English.
