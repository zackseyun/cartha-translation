theological_decisions:
- issue: Stone imagery and judgment metaphor
  chosen_reading: Retain the concrete 'stone' language and the two-stage judgment
    imagery without interpretive expansion.
  alternative_readings:
  - Interpret the stone explicitly as Messiah/Jesus in the main text
  - Harmonize the two verbs into a single generic idea of destruction
  rationale: The surrounding context identifies the stone through citation and application,
    but this verse itself speaks proverbially. The translation preserves the metaphor
    and severity of judgment without importing explanatory theology into the verse
    wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine reference
  chosen_reading: Use 'him' for αὐτόν.
  alternative_readings:
  - them
  - that person
  rationale: The Greek uses a masculine singular pronoun in a generic construction.
    Per the project's gender-accurate policy, the English should match the source's
    grammatical and representative force rather than flatten it into plural or impersonal
    language.
  doctrine_reference: Translation philosophy §4
