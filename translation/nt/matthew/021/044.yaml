id: MAT.21.44
reference: Matthew 21:44
source:
  edition: SBLGNT
  text: ⸂Καὶ ὁ πεσὼν ἐπὶ τὸν λίθον τοῦτον συνθλασθήσεται· ἐφ’ ὃν δ’ ἂν πέσῃ λικμήσει
    αὐτόν.⸃
translation:
  text: And the one who falls on this stone will be shattered; but if it falls on
    anyone, it will crush him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more vividly, 'it will grind him to powder' or 'scatter him like chaff.'
    reason: lexical_alternative
  - marker: b
    text: The verse is absent in some manuscripts of Matthew, though it is paralleled
      in Luke 20:18.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ πεσὼν
  chosen: the one who falls
  alternatives:
  - whoever falls
  - the one having fallen
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring generically
    to a person. 'The one who falls' preserves the singular and proverbial force in
    natural English better than a more wooden participial rendering.
- source_word: ἐπὶ τὸν λίθον τοῦτον
  chosen: on this stone
  alternatives:
  - upon this stone
  lexicon: BDAG
  rationale: A straightforward spatial rendering. 'Stone' is retained rather than
    'rock' to match λίθος and to preserve the immediate connection to the stone imagery
    in the surrounding context.
- source_word: συνθλασθήσεται
  chosen: will be shattered
  alternatives:
  - will be broken to pieces
  - will be crushed
  lexicon: BDAG
  rationale: The future passive indicates the subject will suffer severe breaking.
    'Will be shattered' conveys strong damage without collapsing the distinction from
    the second verb λικμήσει, which is rendered more forcefully as 'will crush.'
- source_word: ἐφ’ ὃν δ’ ἂν πέσῃ
  chosen: but if it falls on anyone
  alternatives:
  - but on whomever it falls
  - but if it falls on someone
  lexicon: BDAG
  rationale: 'This clause reverses the direction of impact: the stone becomes the
    falling subject. The indefinite relative construction with ἄν is rendered idiomatically
    in English as ''if it falls on anyone,'' preserving the open-ended sense.'
- source_word: λικμήσει
  chosen: will crush
  alternatives:
  - will grind to powder
  - will scatter like chaff
  lexicon: BDAG
  rationale: The verb can carry the sense of crushing so thoroughly as to pulverize
    or winnow away. 'Will crush' is clear, forceful, and readable in modern English;
    the more explicit 'grind to powder' is preserved in a footnote because it reflects
    the verb's stronger imagery.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is masculine singular, referring back to the generic singular
    person. In keeping with the project's gender-accurate policy, 'him' is retained
    rather than neutralizing the singular reference.
