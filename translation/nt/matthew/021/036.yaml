id: MAT.21.36
reference: Matthew 21:36
source:
  edition: SBLGNT
  text: πάλιν ἀπέστειλεν ἄλλους δούλους πλείονας τῶν πρώτων, καὶ ἐποίησαν αὐτοῖς ὡσαύτως.
translation:
  text: Again he sent other servants, more than the first ones, and they did the same
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'other slaves.' The Greek word doulous can mean either 'servants' or
      'slaves,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: Again
  alternatives:
  - Once more
  lexicon: BDAG
  rationale: Adverb marking repeated action; 'Again' is concise and natural in narrative
    sequence.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he sent out
  - he dispatched
  lexicon: BDAG
  rationale: Aorist active indicative of ἀποστέλλω; 'sent' is the plain narrative
    equivalent. 'Sent out' is possible but unnecessary here.
- source_word: ἄλλους δούλους
  chosen: other servants
  alternatives:
  - other slaves
  - other servants/slaves
  lexicon: BDAG
  rationale: δοῦλος can mean 'servant' or 'slave' per project policy. In this parabolic
    context the bonded status is not theologically foregrounded as strongly as in
    identity-formula passages, so 'servants' best fits readable modern English while
    remaining accurate.
- source_word: πλείονας τῶν πρώτων
  chosen: more than the first ones
  alternatives:
  - more than the first
  - a greater number than the first group
  lexicon: BDAG
  rationale: Comparative construction indicating that the later group was more numerous
    than the earlier one. 'The first ones' makes the comparison explicit in idiomatic
    English.
- source_word: ἐποίησαν αὐτοῖς
  chosen: they did ... to them
  alternatives:
  - they treated them
  - they did to them
  lexicon: BDAG
  rationale: ποιέω with dative here is idiomatic for acting toward someone. 'Did the
    same to them' preserves the verbal link and leaves the implied mistreatment to
    be supplied from context.
- source_word: ὡσαύτως
  chosen: the same
  alternatives:
  - likewise
  - in the same way
  lexicon: BDAG
  rationale: Refers back to the treatment of the earlier servants in the previous
    verse. 'The same' is natural with 'did ... to them' and preserves the anaphoric
    force.
