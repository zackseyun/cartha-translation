theological_decisions:
- issue: Rendering of δοῦλος in the parable
  chosen_reading: servants
  alternative_readings:
  - slaves
  - bondservants
  rationale: The doctrine file allows 'servant / slave' context-dependently. Here
    the narrative emphasis is on emissaries sent and abused, not on the legal bonded
    status of the emissaries. 'Servants' is therefore the best optimal-equivalence
    rendering, while alternatives are documented for auditability.
