id: MAT.21.8
reference: Matthew 21:8
source:
  edition: SBLGNT
  text: ὁ δὲ πλεῖστος ὄχλος ἔστρωσαν ἑαυτῶν τὰ ἱμάτια ἐν τῇ ὁδῷ, ἄλλοι δὲ ἔκοπτον
    κλάδους ἀπὸ τῶν δένδρων καὶ ἐστρώννυον ἐν τῇ ὁδῷ.
translation:
  text: Now most of the crowd spread their own garments on the road, and others were
    cutting branches from the trees and spreading them on the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the greater part of the crowd.'
    reason: lexical_alternative
  - marker: b
    text: '''Garments'' may also be rendered ''cloaks.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πλεῖστος ὄχλος
  chosen: Now most of the crowd
  alternatives:
  - And the larger crowd
  - Now the greater part of the crowd
  lexicon: BDAG
  rationale: πλεῖστος with a collective noun naturally means 'most' or 'the greater
    part.' ὄχλος is well rendered 'crowd.' δέ is carried by 'Now' to mark narrative
    progression without overtranslating.
- source_word: ἔστρωσαν
  chosen: spread
  alternatives:
  - spread out
  - laid down
  lexicon: BDAG
  rationale: From στρώννυμι, here meaning to spread or lay out. 'Spread' is natural
    modern English and matches the action of placing garments on the road.
- source_word: ἑαυτῶν τὰ ἱμάτια
  chosen: their own garments
  alternatives:
  - their garments
  - their cloaks
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to outer garments/clothes. 'Garments' is slightly
    more formal but accurate and broad. 'Their own' reflects ἑαυτῶν explicitly, emphasizing
    personal garments.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - in the road
  - on the way
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' idiomatic English for objects laid upon
    a traveled surface is 'on the road.' ὁδός here refers to the roadway/path of Jesus'
    approach, not metaphorical 'way'.
- source_word: ἄλλοι δὲ
  chosen: and others
  alternatives:
  - but others
  - now others
  lexicon: BDAG
  rationale: Marks a second group within the crowd. 'And others' fits the additive
    narrative flow better than a strongly contrastive 'but others,' while still reflecting
    δέ.
- source_word: ἔκοπτον
  chosen: were cutting
  alternatives:
  - cut
  - were chopping
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing action in the scene; 'were cutting'
    preserves that better than simple past 'cut.'
- source_word: κλάδους ἀπὸ τῶν δένδρων
  chosen: branches from the trees
  alternatives:
  - boughs from the trees
  lexicon: BDAG
  rationale: Straightforward lexical rendering. 'Branches' is standard modern English;
    'boughs' is accurate but less common.
- source_word: καὶ ἐστρώννυον
  chosen: and spreading them
  alternatives:
  - and were spreading them
  - and laying them down
  lexicon: BDAG
  rationale: The imperfect again conveys ongoing action. 'Spreading them' keeps the
    participial flow in English after 'were cutting,' avoiding clunky repetition while
    preserving the sense.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - in the road
  - on the way
  lexicon: BDAG
  rationale: Repeated phrase rendered consistently. 'On the road' best fits the physical
    setting and keeps the repeated imagery clear.
