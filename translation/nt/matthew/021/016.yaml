id: MAT.21.16
reference: Matthew 21:16
source:
  edition: SBLGNT
  text: καὶ εἶπαν αὐτῷ· Ἀκούεις τί οὗτοι λέγουσιν; ὁ δὲ Ἰησοῦς λέγει αὐτοῖς· Ναί.
    οὐδέποτε ἀνέγνωτε ὅτι Ἐκ στόματος νηπίων καὶ θηλαζόντων κατηρτίσω αἶνον;
translation:
  text: And they said to him, “Do you hear what these are saying?” But Jesus says
    to them, “Yes. Have you never read, ‘Out of the mouth of infants and nursing babies
    you have prepared praise’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesus is quoting Psalm 8:2 according to the Greek scriptural tradition.
      The Hebrew text is commonly rendered, “Out of the mouth of infants and nursing
      babies you have established strength.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀκούεις
  chosen: Do you hear
  alternatives:
  - Are you listening to
  lexicon: BDAG
  rationale: Present indicative in a direct question; 'hear' is the natural English
    equivalent and preserves the challenge being posed to Jesus.
- source_word: τί οὗτοι λέγουσιν
  chosen: what these are saying
  alternatives:
  - what these say
  - what these people are saying
  lexicon: BDAG
  rationale: The present tense λέγουσιν is well represented by English progressive
    here. 'These' keeps the slightly dismissive force of οὗτοι without adding an explicit
    noun not present in Greek.
- source_word: λέγει
  chosen: Jesus says
  alternatives:
  - Jesus said
  - Jesus answers
  lexicon: BDAG
  rationale: The historical present is retained as 'says' for vividness, since Matthew
    uses present here after aorist narration.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  lexicon: BDAG
  rationale: Simple affirmative response; 'Yes' is the most direct and natural rendering.
- source_word: οὐδέποτε ἀνέγνωτε
  chosen: Have you never read
  alternatives:
  - Did you never read
  lexicon: BDAG
  rationale: Idiomatic English for a rhetorical question referring to Scripture familiarity;
    preserves the rebuking tone.
- source_word: Ἐκ στόματος
  chosen: Out of the mouth of
  alternatives:
  - From the mouth of
  lexicon: BDAG
  rationale: This closely reflects the prepositional phrase and matches natural English
    citation style for Scripture.
- source_word: νηπίων
  chosen: infants
  alternatives:
  - little children
  - babies
  lexicon: BDAG
  rationale: νήπιος can denote very young children; here, paired with θηλαζόντων,
    'infants' preserves the youthful sense without collapsing the distinction between
    the two terms.
- source_word: θηλαζόντων
  chosen: nursing babies
  alternatives:
  - those nursing
  - sucklings
  lexicon: BDAG
  rationale: The participle refers to those who are nursing. 'Nursing babies' is clear
    modern English and preserves the image better than the archaic 'sucklings.'
- source_word: κατηρτίσω
  chosen: you have prepared
  alternatives:
  - you have ordained
  - you have perfected
  lexicon: BDAG
  rationale: In this citation context, the verb conveys bringing about or preparing.
    'Prepared' is a clear rendering of the Greek form as cited by Matthew, while 'ordained'
    reflects older English tradition more than the plain sense.
- source_word: αἶνον
  chosen: praise
  alternatives:
  - a song of praise
  lexicon: BDAG
  rationale: The noun straightforwardly means 'praise'; the singular is naturally
    rendered as an abstract noun in English.
