theological_decisions:
- issue: Rendering of Psalm citation in Jesus' argument
  chosen_reading: Use Matthew's Greek wording 'you have prepared praise' in the main
    text
  alternative_readings:
  - Preserve the Hebrew-based Psalm 8:2 wording 'you have established strength' in
    a footnote
  rationale: Jesus' quotation in Matthew follows the Greek scriptural tradition, and
    the translation should render the text as Matthew presents it rather than harmonize
    it to the Hebrew wording. Because readers may know the Psalm in a different form,
    the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
