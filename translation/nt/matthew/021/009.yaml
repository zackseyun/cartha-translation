theological_decisions:
- issue: Messianic royal title in τῷ υἱῷ Δαυίδ
  chosen_reading: Retain 'the Son of David' as a title rather than paraphrasing it
    as 'the Messiah' in the main text.
  alternative_readings:
  - to the Messiah
  rationale: Although 'Son of David' is a messianic designation, the Greek text itself
    uses the Davidic title. Preserving the title maintains the text's historical and
    theological texture without importing an interpretive paraphrase into the main
    line.
  doctrine_reference: Affirmations; Translation philosophy §1, §2, §3
- issue: Rendering of Ὡσαννά
  chosen_reading: Keep 'Hosanna' in the main text and preserve the underlying sense
    in a footnote.
  alternative_readings:
  - Save us, please
  - Save now
  rationale: In this triumphal-entry context, Ὡσαννά functions as a liturgical acclamation
    with praise overtones, not merely a transparent request for rescue. Transliteration
    preserves the worshipful and scriptural resonance while a footnote can expose
    the Hebrew-derived sense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of κυρίου in the Psalm citation
  chosen_reading: Translate as 'the Lord' in line with Greek κύριος while preserving
    the Psalmic/YHWH background in a footnote.
  alternative_readings:
  - the LORD
  rationale: The Greek text before us reads κυρίου, and the doctrine guidance sets
    κύριος to 'Lord' by default. Because the phrase echoes Psalm 118, a footnote can
    note the covenant-name background without replacing the Greek wording in the main
    text.
  doctrine_reference: 'Contested terms table: κύριος; יְהוָה YHWH'
