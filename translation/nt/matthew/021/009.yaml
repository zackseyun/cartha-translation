id: MAT.21.9
reference: Matthew 21:9
source:
  edition: SBLGNT
  text: οἱ δὲ ὄχλοι οἱ προάγοντες ⸀αὐτὸν καὶ οἱ ἀκολουθοῦντες ἔκραζον λέγοντες· Ὡσαννὰ
    τῷ υἱῷ Δαυίδ· Εὐλογημένος ὁ ἐρχόμενος ἐν ὀνόματι κυρίου· Ὡσαννὰ ἐν τοῖς ὑψίστοις.
translation:
  text: And the crowds going ahead of him and those following were crying out, saying,
    “Hosanna to the Son of David! Blessed is the one who comes in the name of the
    Lord! Hosanna in the highest!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Hosanna” is a Hebrew-derived acclamation meaning something like “save,
      please” or “save now,” but here it functions as a shout of praise.
    reason: lexical_alternative
  - marker: b
    text: “The Son of David” is a royal messianic title.
    reason: cultural_note
  - marker: c
    text: This line echoes Psalm 118:26, where “the Lord” reflects the divine name
      YHWH in the Hebrew text.
    reason: cross_reference
lexical_decisions:
- source_word: ὄχλοι
  chosen: crowds
  alternatives:
  - multitudes
  - people
  lexicon: BDAG
  rationale: '''Crowds'' is natural modern English and accurately reflects a gathered
    mass of people without the slightly archaic feel of ''multitudes.'''
- source_word: προάγοντες αὐτόν
  chosen: going ahead of him
  alternatives:
  - going before him
  - leading him
  lexicon: BDAG
  rationale: The participle indicates those moving in front of Jesus in the procession.
    'Going ahead of him' is clear and avoids implying they were formally leading him.
- source_word: ἀκολουθοῦντες
  chosen: following
  alternatives:
  - coming behind
  - those who followed
  lexicon: BDAG
  rationale: A straightforward participial rendering that pairs naturally with 'going
    ahead of him' and preserves the processional scene.
- source_word: ἔκραζον λέγοντες
  chosen: were crying out, saying
  alternatives:
  - kept shouting, saying
  - cried out
  lexicon: BDAG
  rationale: The imperfect ἔκραζον suggests ongoing action; 'were crying out' preserves
    that durative sense better than a simple past. Retaining 'saying' reflects the
    participle λέγοντες without awkwardness.
- source_word: Ὡσαννά
  chosen: Hosanna
  alternatives:
  - Save us, please
  - Save now
  lexicon: BDAG
  rationale: This liturgical acclamation is best preserved by transliteration in the
    main text because it functions as a recognized shout of praise in this context,
    while its underlying plea can be noted in a footnote.
- source_word: τῷ υἱῷ Δαυίδ
  chosen: to the Son of David
  alternatives:
  - for the Son of David
  lexicon: BDAG
  rationale: The dative after 'Hosanna' is idiomatically rendered 'to.' 'Son of David'
    preserves the messianic royal title and should be translated rather than paraphrased.
- source_word: Εὐλογημένος ὁ ἐρχόμενος
  chosen: Blessed is the one who comes
  alternatives:
  - Blessed is he who comes
  - Blessed be the one coming
  lexicon: BDAG
  rationale: This rendering is idiomatic English and preserves the substantival participle.
    'The one who comes' is slightly more natural and inclusive in English than 'he
    who comes' while still matching the singular Greek referent.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - with the authority of the Lord
  - in the Lord's name
  lexicon: BDAG
  rationale: This is the standard and accurate rendering of the phrase, preserving
    both the scriptural allusion and the theological weight of divine authorization.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here the phrase quotes Psalm
    118 in Greek form; 'Lord' fits both the NT wording and the contested-terms guidance,
    while the OT background may be noted in a footnote.
- source_word: ἐν τοῖς ὑψίστοις
  chosen: in the highest
  alternatives:
  - in the highest places
  - in the highest heavens
  lexicon: BDAG
  rationale: This traditional rendering is concise and faithful. The phrase likely
    refers to the highest heavenly realm, but 'in the highest' preserves the elevated
    liturgical force without over-specifying.
