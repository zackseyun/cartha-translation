theological_decisions:
- issue: Force of προάγουσιν ὑμᾶς in relation to entering the kingdom
  chosen_reading: are going ahead of you into the kingdom of God
  alternative_readings:
  - are entering the kingdom of God before you
  rationale: The Greek verb προάγω means to go before or lead on. Rendering it as
    'are going ahead of you' preserves the image of precedence without importing the
    stronger claim that the religious leaders are categorically excluded. This maintains
    the text's warning and theological tension rather than resolving it beyond what
    the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
