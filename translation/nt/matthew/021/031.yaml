id: MAT.21.31
reference: Matthew 21:31
source:
  edition: SBLGNT
  text: τίς ἐκ τῶν δύο ἐποίησεν τὸ θέλημα τοῦ πατρός; ⸀λέγουσιν· Ὁ ⸀πρῶτος. λέγει
    αὐτοῖς ὁ Ἰησοῦς· Ἀμὴν λέγω ὑμῖν ὅτι οἱ τελῶναι καὶ αἱ πόρναι προάγουσιν ὑμᾶς εἰς
    τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: Which of the two did the will of the father? They said, “The first.” Jesus
    said to them, “Truly I say to you, the tax collectors and the prostitutes are
    going ahead of you into the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are entering the kingdom of God before you.” The Greek says “are going
      ahead of you,” emphasizing precedence without necessarily stating final exclusion.
    reason: alternative_reading
lexical_decisions:
- source_word: τίς ἐκ τῶν δύο
  chosen: Which of the two
  alternatives:
  - Which one of the two
  lexicon: BDAG
  rationale: Natural English interrogative preserving the partitive sense of ἐκ with
    δύο.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - performed
  - carried out
  lexicon: BDAG
  rationale: Idiomatic with θέλημα in English ('did the will'), while retaining the
    concrete force of ποιέω.
- source_word: τὸ θέλημα τοῦ πατρός
  chosen: the will of the father
  alternatives:
  - his father's will
  - the father's will
  lexicon: BDAG
  rationale: A formally close rendering. The article with πατρός is preserved as 'the
    father' rather than making the possessive explicit; in context the referent is
    the father in the parable, not directly God.
- source_word: Ὁ πρῶτος
  chosen: The first
  alternatives:
  - The first one
  lexicon: BDAG
  rationale: Concise and natural English matching the elliptical Greek answer.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: Preserves the solemn introductory formula while using accessible modern
    English. 'Amen' could be retained more formally, but 'Truly' communicates the
    force clearly.
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax gatherers
  lexicon: BDAG
  rationale: Standard, clear rendering for the socially stigmatized revenue agents
    in the Gospels.
- source_word: πόρναι
  chosen: prostitutes
  alternatives:
  - sexually immoral women
  - harlots
  lexicon: BDAG
  rationale: '''Prostitutes'' is the most specific and natural modern equivalent here;
    it avoids archaic ''harlots'' and is more precise than the broader moral category
    ''sexually immoral women.'''
- source_word: προάγουσιν ὑμᾶς
  chosen: are going ahead of you
  alternatives:
  - go before you
  - enter before you
  lexicon: BDAG
  rationale: The present tense is kept with progressive force. 'Going ahead of you'
    preserves the metaphor of preceding them, without over-interpreting it as exclusive
    entry.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: into the kingdom of God
  alternatives:
  - into God's kingdom
  lexicon: BDAG
  rationale: Standard rendering preserving the directional εἰς and the full theological
    phrase 'kingdom of God.'
