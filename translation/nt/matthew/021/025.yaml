theological_decisions:
- issue: Meaning of 'from heaven' in the source question
  chosen_reading: Retain 'from heaven' in the main text as the literal expression
    for divine origin.
  alternative_readings:
  - from God
  rationale: The phrase functions as a Jewish reverential way of speaking about divine
    authorization. Preserving 'heaven' keeps the wording of the Greek and the rhetorical
    contrast with 'from men' without importing an interpretive gloss into the main
    text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering ἀνθρώπων in contrast with heaven
  chosen_reading: Use 'men' to express human origin in contrast to divine origin.
  alternative_readings:
  - people
  - human beings
  rationale: The contrast is not specifically male but human. 'Men' here is an established
    generic contrastive term in English and matches the source intent; the generic
    force is documented because the project prefers gender-accurate renderings.
  doctrine_reference: Translation philosophy §4
