id: MAT.21.25
reference: Matthew 21:25
source:
  edition: SBLGNT
  text: τὸ βάπτισμα ⸀τὸ Ἰωάννου πόθεν ἦν; ἐξ οὐρανοῦ ἢ ἐξ ἀνθρώπων; οἱ δὲ διελογίζοντο
    ⸀ἐν ἑαυτοῖς λέγοντες· Ἐὰν εἴπωμεν· Ἐξ οὐρανοῦ, ἐρεῖ ἡμῖν· Διὰ τί οὖν οὐκ ἐπιστεύσατε
    αὐτῷ;
translation:
  text: The baptism of John—where was it from? From heaven or from men? And they were
    reasoning among themselves, saying, “If we say, ‘From heaven,’ he will say to
    us, ‘Why then did you not believe him?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from God”; Greek “from heaven,” a reverential way of referring to divine
      origin.
    reason: lexical_alternative
  - marker: b
    text: “From men” means “from human beings,” contrasting merely human origin with
      heavenly origin.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - baptizing
  - washing
  lexicon: BDAG
  rationale: βάπτισμα normally denotes the rite/practice of baptism rather than the
    act in progress. 'Baptism' is the most natural and established rendering here,
    referring to John's baptism/ministry as a whole.
- source_word: τὸ Ἰωάννου
  chosen: of John
  alternatives:
  - John's
  lexicon: BDAG
  rationale: The genitive identifies the baptism as associated with John. 'Of John'
    preserves the Greek structure and keeps the phrase slightly more formal in a way
    that suits the dispute context.
- source_word: πόθεν
  chosen: where was it from
  alternatives:
  - from where was it
  - what was its source
  lexicon: BDAG
  rationale: πόθεν asks about source/origin. 'Where was it from' is idiomatic modern
    English while preserving the source-oriented question.
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from God
  lexicon: BDAG
  rationale: '''Heaven'' is the literal Greek and preserves the Jewish reverential
    circumlocution for divine origin without over-interpreting it as a direct substitution
    of ''God'' in the main text.'
- source_word: ἐξ ἀνθρώπων
  chosen: from men
  alternatives:
  - from human beings
  - from people
  lexicon: BDAG
  rationale: ἀνθρώπων contrasts human origin with heavenly origin. 'From men' is concise
    and reflects the generic human sense in a traditional but still understandable
    way; it also preserves the sharp contrast with 'from heaven.'
- source_word: διελογίζοντο ἐν ἑαυτοῖς
  chosen: they were reasoning among themselves
  alternatives:
  - they discussed among themselves
  - they argued within themselves
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing internal deliberation. 'Reasoning
    among themselves' captures both the cognitive and dialogical sense without sounding
    overly formal.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle introduces the content of their deliberation. 'Saying'
    is a straightforward participial rendering in English.
- source_word: Ἐὰν εἴπωμεν
  chosen: If we say
  alternatives:
  - If we should say
  lexicon: BDAG
  rationale: This is a third-class conditional with aorist subjunctive. 'If we say'
    is the natural English equivalent.
- source_word: ἐρεῖ ἡμῖν
  chosen: he will say to us
  alternatives:
  - he will tell us
  lexicon: BDAG
  rationale: λέγω here is direct speech introduction; 'say to us' preserves the verbal
    repetition and directness.
- source_word: Διὰ τί οὖν
  chosen: Why then
  alternatives:
  - Why, then
  - Why therefore
  lexicon: BDAG
  rationale: This combination draws an inference from their hypothetical answer. 'Why
    then' is idiomatic and preserves the argumentative force.
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  chosen: did you not believe him
  alternatives:
  - did you not trust him
  lexicon: BDAG
  rationale: πιστεύω with dative commonly means to believe or trust a person. 'Believe
    him' fits the context of accepting John's message and authority; 'trust him' is
    possible but less idiomatic in this challenge scene.
