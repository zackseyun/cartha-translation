id: MAT.21.32
reference: Matthew 21:32
source:
  edition: SBLGNT
  text: ἦλθεν γὰρ ⸂Ἰωάννης πρὸς ὑμᾶς⸃ ἐν ὁδῷ δικαιοσύνης, καὶ οὐκ ἐπιστεύσατε αὐτῷ·
    οἱ δὲ τελῶναι καὶ αἱ πόρναι ἐπίστευσαν αὐτῷ· ὑμεῖς δὲ ἰδόντες ⸀οὐδὲ μετεμελήθητε
    ὕστερον τοῦ πιστεῦσαι αὐτῷ.
translation:
  text: For John came to you in the way of righteousness, and you did not believe
    him; but the tax collectors and the prostitutes believed him. But even after seeing
    this, you did not afterward change your minds so as to believe him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a righteous way' or 'in the path of righteousness.' The Greek phrase
      can describe either John's manner of life/ministry or the righteous way he proclaimed.
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not trust him.' The Greek verb can carry the sense of believing
      or trusting a person.
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not later repent so as to believe him.' The verb here is not
      the more common μετανοέω but μεταμέλομαι, which more specifically suggests a
      change of mind or regret.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is naturally rendered 'came' in narrative discourse;
    'arrived' is possible but less idiomatic here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the explanation for the preceding rebuke; 'for' preserves
    the argumentative connection.
- source_word: Ἰωάννης
  chosen: John
  rationale: Standard transliteration of the personal name, per translation philosophy.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward the audience; 'to
    you' is the most direct rendering, though 'among you' captures the public nature
    secondarily.
- source_word: ἐν ὁδῷ δικαιοσύνης
  chosen: in the way of righteousness
  alternatives:
  - in a righteous way
  - in the path of righteousness
  lexicon: BDAG
  rationale: Retains the metaphor of ὁδός ('way/path') while preserving δικαιοσύνη
    as 'righteousness' per default rendering. The phrase likely denotes John's manner
    and message as aligned with God's righteous way.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default doctrinal rendering is 'righteousness.' In this Matthean context,
    'righteousness' better matches covenantal-moral alignment than the more sociological
    'justice.'
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  chosen: you did not believe him
  alternatives:
  - you did not believe in him
  - you did not trust him
  lexicon: BDAG
  rationale: πιστεύω with dative commonly means to believe/trust a person or message.
    'Believe him' is the most natural English equivalent here and avoids importing
    a more developed 'believe in' formulation.
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax gatherers
  lexicon: BDAG
  rationale: Standard modern rendering for τελώνης; clear and idiomatic.
- source_word: πόρναι
  chosen: prostitutes
  alternatives:
  - sex workers
  lexicon: BDAG
  rationale: '''Prostitutes'' is the most direct lexical equivalent and best matches
    the social-moral force of the term in this context.'
- source_word: ἐπίστευσαν αὐτῷ
  chosen: believed him
  alternatives:
  - trusted him
  lexicon: BDAG
  rationale: Maintains consistency with the earlier ἐπιστεύσατε αὐτῷ and preserves
    the contrast between the leaders and the socially marginalized.
- source_word: ὑμεῖς δὲ
  chosen: But even you
  alternatives:
  - But you
  - And you
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek. The emphasis is carried in English
    by fronting 'you' with adversative 'But'; in the final sentence this emphasis
    is represented by 'But even after seeing this, you...' rather than a wooden repetition.
- source_word: ἰδόντες
  chosen: after seeing this
  alternatives:
  - though you saw it
  - when you saw it
  lexicon: BDAG
  rationale: Aorist participle is best rendered temporally here. 'This' is supplied
    to make explicit that they saw the response of tax collectors and prostitutes.
- source_word: οὐδὲ
  chosen: even ... not
  alternatives:
  - nor
  - not even
  lexicon: BDAG
  rationale: 'Conveys the climactic force: despite seeing, they still failed to respond.'
- source_word: μετεμελήθητε
  chosen: change your minds
  alternatives:
  - repent
  - feel remorse
  lexicon: BDAG
  rationale: μεταμέλομαι differs from μετανοέω; it denotes a change of mind/regret
    rather than the fuller NT term often rendered 'repent.' 'Change your minds' preserves
    the lexical distinction and fits the immediate context of revising one's response
    to John.
- source_word: ὕστερον
  chosen: afterward
  alternatives:
  - later
  lexicon: BDAG
  rationale: Captures the temporal sense following their observation of others' response.
- source_word: τοῦ πιστεῦσαι αὐτῷ
  chosen: so as to believe him
  alternatives:
  - to believe him
  - with the result that you believed him
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses purpose/result nuance. 'So
    as to believe him' makes the connection between changed mind and ensuing faith
    explicit without overtranslation.
