theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file sets δικαιοσύνη's default as 'righteousness,' with
    'justice' preserved where relevant. In Matthew 21:32 the phrase 'way of righteousness'
    is a recognized biblical idiom and best preserves the moral-covenantal sense of
    John's ministry.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Rendering of πιστεύω with dative αὐτῷ
  chosen_reading: believe him
  alternative_readings:
  - trust him
  - believe in him
  rationale: The text speaks of response to John's message and authority. 'Believe
    him' preserves the direct object sense in English and avoids importing later doctrinal
    formulations not explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
- issue: Rendering of μετεμελήθητε
  chosen_reading: change your minds
  alternative_readings:
  - repent
  - feel remorse
  rationale: Using 'repent' could blur the distinction between μεταμέλομαι and μετανοέω.
    'Change your minds' preserves the lexical nuance while still conveying moral reversal
    in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5, consistency of key terms
    or documented exception'
