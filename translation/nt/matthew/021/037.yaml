id: MAT.21.37
reference: Matthew 21:37
source:
  edition: SBLGNT
  text: ὕστερον δὲ ἀπέστειλεν πρὸς αὐτοὺς τὸν υἱὸν αὐτοῦ λέγων· Ἐντραπήσονται τὸν
    υἱόν μου.
translation:
  text: But later he sent his son to them, saying, ‘They will respect my son.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘They will reverence my son.’ The Greek verb can denote showing respect
      or deference; in other contexts it can also mean ‘be ashamed.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  chosen: later
  alternatives:
  - afterward
  - finally
  lexicon: BDAG
  rationale: Temporal adverb meaning 'later/afterward.' 'Later' is natural modern
    English and preserves the sequence without adding the stronger nuance of 'finally,'
    which could overstate the term by implying an absolute last act beyond the immediate
    narrative flow.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the narrative turn
    from sending servants to sending the son. 'And' is possible but weaker in signaling
    the escalation.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Aorist of ἀποστέλλω, straightforwardly 'send.' 'He sent' is idiomatic
    and preserves the action without importing technical apostolic overtones.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - against them
  - toward them
  lexicon: BDAG
  rationale: With verbs of sending, πρός + accusative commonly indicates direction
    toward persons. 'To them' is the most natural English rendering here.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his son
  alternatives:
  - the son of him
  - his own son
  lexicon: BDAG
  rationale: The phrase identifies the uniquely significant messenger. 'His son' is
    the natural English equivalent. 'His own son' would add emphasis not explicit
    in the Greek here, though the context already conveys special status.
- source_word: λέγων
  chosen: saying
  alternatives:
  - thinking
  - with the words
  lexicon: BDAG
  rationale: Present participle introducing the content of what the sender says. 'Saying'
    is the standard and sufficiently transparent rendering.
- source_word: Ἐντραπήσονται
  chosen: They will respect
  alternatives:
  - they will reverence
  - they will be ashamed before
  lexicon: BDAG
  rationale: Future middle/passive form of ἐντρέπω in this context means to show deference/respect.
    'Respect' is clear modern English. Older 'reverence' is possible, but sounds archaic
    and can imply worshipful devotion stronger than the immediate social sense. The
    verb can in other contexts carry the sense 'be ashamed,' but here with a direct
    object ('my son') the sense is 'respect/show regard for.'
- source_word: τὸν υἱόν μου
  chosen: my son
  alternatives:
  - the son of me
  lexicon: BDAG
  rationale: Direct object of Ἐντραπήσονται. 'My son' is the natural English rendering
    and preserves the personal, relational force of the speaker's expectation.
