theological_decisions:
- issue: Rendering the son in the parable without over-interpreting the Christological
    referent
  chosen_reading: his son / my son
  alternative_readings:
  - his beloved son
  - the Son
  rationale: The parable clearly points toward Jesus, but the verse itself uses ordinary
    υἱός language without ἀγαπητός ('beloved') or a titular capitalization demanded
    by the Greek. Lowercase 'son' preserves the narrative form while allowing the
    Christological implication to arise from context rather than translator insertion.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
