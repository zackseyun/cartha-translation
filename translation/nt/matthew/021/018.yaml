theological_decisions:
- issue: Christological implication of Jesus' hunger
  chosen_reading: Translate the statement straightforwardly as a real experience of
    hunger.
  rationale: The verse presents Jesus' genuine human hunger in narrative form. A plain
    rendering preserves the text's witness to his true humanity without adding doctrinal
    commentary, consistent with Chalcedonian orthodoxy and the project's aim not to
    import claims beyond the text.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD, on the two natures
    of Christ)'
