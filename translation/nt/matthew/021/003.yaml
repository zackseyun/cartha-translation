theological_decisions:
- issue: Referent and force of Ὁ κύριος
  chosen_reading: Jesus' instruction is rendered with 'The Lord,' preserving both
    the immediate practical sense and the christological title.
  alternative_readings:
  - the master
  rationale: The project's contested-terms table sets κύριος to 'Lord' by default.
    In this Matthean context, rendering it as 'master' could suggest merely the animals'
    human owner or a generic superior, while the narrative likely presents Jesus speaking
    of himself with recognized authority. 'Lord' preserves that theological and narrative
    weight without over-explication.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
