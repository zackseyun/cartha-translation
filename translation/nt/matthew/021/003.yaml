id: MAT.21.3
reference: Matthew 21:3
source:
  edition: SBLGNT
  text: καὶ ἐάν τις ὑμῖν εἴπῃ τι, ἐρεῖτε ὅτι Ὁ κύριος αὐτῶν χρείαν ἔχει· ⸀εὐθὺς δὲ
    ⸀ἀποστελεῖ αὐτούς.
translation:
  text: And if anyone says anything to you, you shall say, ‘The Lord has need of them,’
    and he will send them at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the master has need of them.'
    reason: alternative_reading
  - marker: b
    text: Or 'he will send them immediately'; the subject is most naturally the person
      addressed, who will send the animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις
  chosen: if anyone
  alternatives:
  - if someone
  lexicon: BDAG
  rationale: Indefinite conditional expression introducing a possible objection from
    any person. 'Anyone' is natural modern English and preserves the open-ended force
    of τις.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to you all
  lexicon: BDAG
  rationale: Dative plural addressed to the disciples. English 'you' can represent
    the plural without awkwardness here.
- source_word: εἴπῃ τι
  chosen: says anything
  alternatives:
  - should say something
  - asks anything
  lexicon: BDAG
  rationale: λέγω with indefinite τι is best rendered broadly as 'say anything.' 'Asks'
    is too specific; the sense is any verbal challenge or question.
- source_word: ἐρεῖτε
  chosen: you shall say
  alternatives:
  - say
  - you are to say
  lexicon: BDAG
  rationale: Future indicative used imperativally/instructionally. 'You shall say'
    preserves the directive force while remaining close to the Greek form.
- source_word: ὅτι
  chosen: that
  alternatives:
  - ‘
  lexicon: BDAG
  rationale: Introduces direct discourse content. In idiomatic English this is represented
    by quotation punctuation rather than an explicit 'that' in the final sentence.
- source_word: Ὁ κύριος
  chosen: The Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In context Jesus refers
    to himself with authority; 'master' is possible in a lower-register sense but
    would weaken the title's force and depart from the project's default rendering.
- source_word: αὐτῶν
  chosen: of them
  alternatives:
  - for them
  - of these
  lexicon: BDAG
  rationale: 'Genitive plural most naturally refers to the colt and donkey: ''has
    need of them.'' This keeps the pronoun tied to the animals rather than to people.'
- source_word: χρείαν ἔχει
  chosen: has need
  alternatives:
  - needs
  lexicon: BDAG
  rationale: The idiom literally means 'has need.' This is slightly more formal than
    'needs' and preserves the wording of the Greek while remaining clear.
- source_word: εὐθὺς
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: εὐθύς commonly means immediate action. 'At once' is natural, concise
    modern English.
- source_word: ἀποστελεῖ αὐτούς
  chosen: he will send them
  alternatives:
  - he will send them back
  - he will release them
  lexicon: BDAG
  rationale: The future verb likely refers to the owner sending the animals with the
    disciples. 'Send them back' imports a return nuance not explicit in the Greek;
    'release them' is interpretive. 'Send them' best preserves the plain sense.
