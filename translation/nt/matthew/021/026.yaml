id: MAT.21.26
reference: Matthew 21:26
source:
  edition: SBLGNT
  text: ἐὰν δὲ εἴπωμεν· Ἐξ ἀνθρώπων, φοβούμεθα τὸν ὄχλον, πάντες γὰρ ⸂ὡς προφήτην
    ἔχουσιν τὸν Ἰωάννην⸃.
translation:
  text: But if we say, ‘From men,’ we fear the crowd, for they all regard John as
    a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of human origin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ εἴπωμεν
  chosen: But if we say
  alternatives:
  - But if we should say
  - But if we were to say
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive εἴπωμεν introduces a conditional possibility.
    'But if we say' is natural modern English and preserves the deliberative conditional
    force without sounding stilted.
- source_word: Ἐξ ἀνθρώπων
  chosen: From men
  alternatives:
  - From human beings
  - Of human origin
  lexicon: BDAG
  rationale: 'In context this is the implied answer to the source of John''s baptism/authority:
    ''from men'' contrasts with ''from heaven'' in the previous verse. ''From men''
    is concise and preserves the source contrast. Although ἀνθρώπων can be generic,
    here it refers to human rather than divine source, not specifically male persons.'
- source_word: φοβούμεθα
  chosen: we fear
  alternatives:
  - we are afraid of
  - we fear because of
  lexicon: BDAG
  rationale: Present middle/passive form here has active sense. 'We fear' is the most
    direct rendering and keeps the immediacy of their concern.
- source_word: τὸν ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος in Matthew commonly refers to the gathered crowd. 'The crowd' is
    readable modern English and suitably specific.
- source_word: πάντες
  chosen: they all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: The subject is the crowd collectively; 'they all' makes the plural explicit
    in idiomatic English.
- source_word: ὡς προφήτην ἔχουσιν τὸν Ἰωάννην
  chosen: regard John as a prophet
  alternatives:
  - consider John a prophet
  - hold John to be a prophet
  - have John as a prophet
  lexicon: BDAG
  rationale: The idiom ἔχω + object + ὡς + predicate indicates considering or regarding
    someone as something. 'Regard John as a prophet' is idiomatic and preserves the
    evaluative sense.
- source_word: προφήτην
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: 'The anarthrous predicate is naturally indefinite in English here: the
    crowd viewed John as a prophet, i.e., one who truly spoke for God.'
- source_word: Ἰωάννην
  chosen: John
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
