theological_decisions:
- issue: Rendering ἀνθρώπων in the heaven-versus-human-source contrast
  chosen_reading: From men
  alternative_readings:
  - Of human origin
  - From human beings
  rationale: The immediate context contrasts divine and human origin. 'From men' preserves
    the sharp antithesis and mirrors the concise Greek, while not implying a male-only
    group in interpretation. This follows the project's gender-accurate principle
    by preserving the contextual sense rather than flattening the contrast.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Force of the crowd's view of John
  chosen_reading: they all regard John as a prophet
  alternative_readings:
  - they all hold John to be a prophet
  rationale: The verse reports popular recognition of John as a prophet without endorsing
    or expanding that claim beyond the text. The translation preserves the narrative
    statement and avoids importing additional doctrinal conclusions.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, point 3
