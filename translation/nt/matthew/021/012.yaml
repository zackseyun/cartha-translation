id: MAT.21.12
reference: Matthew 21:12
source:
  edition: SBLGNT
  text: Καὶ εἰσῆλθεν ⸀Ἰησοῦς εἰς τὸ ⸀ἱερόν, καὶ ἐξέβαλεν πάντας τοὺς πωλοῦντας καὶ
    ἀγοράζοντας ἐν τῷ ἱερῷ καὶ τὰς τραπέζας τῶν κολλυβιστῶν κατέστρεψεν καὶ τὰς καθέδρας
    τῶν πωλούντων τὰς περιστεράς,
translation:
  text: And Jesus entered the temple courts and drove out all those selling and buying
    in the temple courts, and he overturned the tables of the money changers and the
    seats of those selling doves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' or 'the temple precincts'; the Greek word refers to the
      broader temple complex rather than specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερόν
  chosen: temple courts
  alternatives:
  - temple
  - temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple courts' communicates the broader area where commercial activity
    occurred and avoids implying entry into the sanctuary proper.
- source_word: ἐξέβαλεν
  chosen: drove out
  alternatives:
  - cast out
  - threw out
  lexicon: BDAG
  rationale: The verb denotes forceful expulsion. 'Drove out' is natural modern English
    and preserves the decisive action better than the more archaic 'cast out'.
- source_word: πάντας
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: The adjective modifies the substantival participles and is best retained
    explicitly as 'all,' preserving the scope of those engaged in commerce there.
- source_word: τοὺς πωλοῦντας καὶ ἀγοράζοντας
  chosen: those selling and buying
  alternatives:
  - the sellers and buyers
  - those who were selling and buying
  lexicon: BDAG
  rationale: The present participles describe the people engaged in these actions.
    'Those selling and buying' is concise and closely reflects the Greek construction.
- source_word: τράπεζας
  chosen: tables
  alternatives:
  - counters
  lexicon: BDAG
  rationale: The ordinary sense is 'tables.' In context these are the tables used
    for exchange, but the simple term should be preserved in translation.
- source_word: κολλυβιστῶν
  chosen: money changers
  alternatives:
  - coin dealers
  - currency exchangers
  lexicon: BDAG
  rationale: This term refers to those exchanging coinage. 'Money changers' is the
    standard clear English equivalent and fits the temple setting.
- source_word: κατέστρεψεν
  chosen: overturned
  alternatives:
  - turned over
  - upended
  lexicon: BDAG
  rationale: In this context the verb describes overturning furniture. 'Overturned'
    is idiomatic and vivid without overstating destruction.
- source_word: καθέδρας
  chosen: seats
  alternatives:
  - chairs
  lexicon: BDAG
  rationale: The noun denotes seats/chairs. 'Seats' is slightly broader and more formal,
    fitting the narrative style.
- source_word: περιστεράς
  chosen: doves
  alternatives:
  - pigeons
  lexicon: BDAG
  rationale: The term can denote dove/pigeon, but 'doves' is the established and contextually
    fitting rendering in sacrificial contexts.
