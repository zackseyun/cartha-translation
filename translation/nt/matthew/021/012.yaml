theological_decisions:
- issue: Scope of ἱερόν in relation to Jesus' action
  chosen_reading: Jesus entered the temple precincts/courts, not the inner sanctuary
    itself.
  alternative_readings:
  - Jesus entered the temple (generic rendering without specifying precincts)
  rationale: The distinction matters historically and spatially but does not introduce
    extra doctrine. Rendering 'temple courts' preserves the likely referent of ἱερόν
    and avoids suggesting access to the holy place itself.
  doctrine_reference: Translation philosophy §1, §5
