id: MAT.21.27
reference: Matthew 21:27
source:
  edition: SBLGNT
  text: καὶ ἀποκριθέντες τῷ Ἰησοῦ εἶπαν· Οὐκ οἴδαμεν. ἔφη αὐτοῖς καὶ αὐτός· Οὐδὲ ἐγὼ
    λέγω ὑμῖν ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιῶ.
translation:
  text: And answering Jesus, they said, “We do not know.” He also said to them, “Neither
    will I tell you by what authority I do these things.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθέντες
  chosen: answering
  alternatives:
  - in reply
  - having answered
  lexicon: BDAG
  rationale: A participial form introducing their response. 'Answering' preserves
    the Greek structure naturally enough in English, while avoiding over-paraphrase.
- source_word: Οὐκ οἴδαμεν
  chosen: We do not know
  alternatives:
  - We don't know
  lexicon: BDAG
  rationale: A straightforward negated statement of knowledge. The full form 'do not'
    suits the formal dialogue register better than the contraction.
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - told
  lexicon: BDAG
  rationale: A common speech verb. 'Said' is the most natural and least interpretively
    loaded rendering here.
- source_word: καὶ αὐτός
  chosen: He also
  alternatives:
  - and he
  - he in turn
  lexicon: BDAG
  rationale: The combination marks reciprocal response. 'He also' captures the sense
    that Jesus responds in kind to their answer.
- source_word: Οὐδὲ ἐγὼ
  chosen: Neither will I
  alternatives:
  - Nor will I
  - Neither do I
  lexicon: BDAG
  rationale: 'Although λέγω is present tense, in this context English idiom prefers
    a future-like refusal: ''Neither will I tell you.'' This best conveys the responsive
    force of Jesus'' statement.'
- source_word: λέγω ὑμῖν
  chosen: will I tell you
  alternatives:
  - do I say to you
  - am I telling you
  lexicon: BDAG
  rationale: Here λέγω with indirect object is idiomatically better rendered 'tell'
    in English, since Jesus is refusing to disclose information.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - on what authority
  lexicon: BDAG
  rationale: This prepositional phrase refers to the basis or sphere of authorized
    action. 'By what authority' is standard and clear English for the sense of delegated
    or rightful authority.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The plural demonstrative should be preserved. It refers back to Jesus'
    actions under dispute, so 'these things' is more precise than singular 'this'.
- source_word: ποιῶ
  chosen: I do
  alternatives:
  - I am doing
  lexicon: BDAG
  rationale: The present tense here is naturally rendered as a simple present in English,
    referring to Jesus' actions generally in the immediate context.
