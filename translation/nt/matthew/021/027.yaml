theological_decisions:
- issue: Nature of ἐξουσία in Jesus' reply
  chosen_reading: authority
  alternative_readings:
  - right
  - power
  rationale: ἐξουσία can denote authority, right, or delegated power, but in this
    controversy setting the leaders are questioning the legitimacy/source of Jesus'
    actions. 'Authority' best preserves the juridical and theological force without
    narrowing it to mere ability.
  doctrine_reference: Translation philosophy §1, §5
