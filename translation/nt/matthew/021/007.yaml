theological_decisions:
- issue: Referent of the final plural pronoun αὐτῶν in καὶ ἐπεκάθισεν ἐπάνω αὐτῶν
  chosen_reading: Render transparently as 'he sat on them' without resolving whether
    'them' refers to the animals or the cloaks.
  alternative_readings:
  - he sat on the cloaks
  - he sat on one of the animals
  rationale: This is primarily a syntactic and narrative ambiguity rather than a doctrinal
    dispute. In keeping with the translation philosophy of preserving genuine ambiguity
    rather than resolving it, the main text retains the plural pronoun. A footnote
    preserves the common interpretive clarification that Jesus sat on the cloaks spread
    over the animal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
