id: MAT.21.7
reference: Matthew 21:7
source:
  edition: SBLGNT
  text: ἤγαγον τὴν ὄνον καὶ τὸν πῶλον, καὶ ἐπέθηκαν ⸀ἐπ’ αὐτῶν τὰ ⸀ἱμάτια, καὶ ἐπεκάθισεν
    ἐπάνω αὐτῶν.
translation:
  text: They brought the donkey and the colt, and put their cloaks on them, and he
    sat on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'he sat on the cloaks' that had been placed on the
      animals.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγαγον
  chosen: They brought
  alternatives:
  - They led
  lexicon: BDAG
  rationale: Aorist of ἄγω can mean either 'bring' or 'lead.' In this narrative context,
    'brought' is natural modern English and adequately conveys that the disciples
    caused the animals to be present before Jesus.
- source_word: ὄνον
  chosen: the donkey
  alternatives:
  - the she-donkey
  - the ass
  lexicon: BDAG
  rationale: ὄνος can denote a donkey generally; here the feminine article marks the
    animal as female, which aligns with Matthew's pairing of mother and colt. 'Donkey'
    is clear modern English; 'she-donkey' is more explicit but unnecessarily stiff
    in the main text.
- source_word: πῶλον
  chosen: the colt
  alternatives:
  - the young donkey
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, here specifically the young donkey in context.
    'Colt' is concise and idiomatic, while the context supplied by 'donkey' in the
    same clause prevents misunderstanding.
- source_word: ἐπέθηκαν ἐπ’ αὐτῶν τὰ ἱμάτια
  chosen: put their cloaks on them
  alternatives:
  - laid the garments on them
  - put the cloaks on them
  lexicon: BDAG
  rationale: ἱμάτια refers to outer garments/cloaks. 'Cloaks' is more natural than
    'garments' in this scene. The possessive 'their' is supplied from context, referring
    to the disciples' garments, and reflects standard English expression without adding
    new content.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - the animals
  lexicon: BDAG
  rationale: 'The plural pronoun naturally refers to the two animals just mentioned
    in the immediate clause: the cloaks were placed on both animals.'
- source_word: ἐπεκάθισεν ἐπάνω αὐτῶν
  chosen: he sat on them
  alternatives:
  - he sat on it
  - he sat on the cloaks
  - he sat on them both
  lexicon: BDAG
  rationale: The Greek text has a plural pronoun ('them'). The nearest antecedent
    could be either the animals or the cloaks placed on them. A formally transparent
    rendering preserves the plural in the main text rather than resolving the ambiguity.
    Because English readers may infer Jesus sat on both animals simultaneously, the
    alternative understanding 'on the cloaks' is preserved in a footnote.
