theological_decisions:
- issue: Rendering κύριος in a parabolic context
  chosen_reading: owner
  alternative_readings:
  - lord
  - master
  rationale: The doctrine default for κύριος is 'Lord,' but context governs. Here
    κύριος refers to the human proprietor within the story world, not directly as
    a divine title. Rendering it 'owner' avoids importing christological overtones
    the verse itself does not explicitly state while preserving the parable's plain
    sense.
