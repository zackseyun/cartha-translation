id: MAT.21.40
reference: Matthew 21:40
source:
  edition: SBLGNT
  text: ὅταν οὖν ἔλθῃ ὁ κύριος τοῦ ἀμπελῶνος, τί ποιήσει τοῖς γεωργοῖς ἐκείνοις;
translation:
  text: Therefore, when the owner of the vineyard comes, what will he do to those
    farmers?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'master of the vineyard.' The Greek word is kyrios, often rendered 'Lord,'
      but here it refers to the vineyard's proprietor within the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'tenant farmers.' The broader parable context shows these farmers are
      leasing the vineyard, though the Greek word itself more generally means 'farmers'
      or 'cultivators.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with subjunctive ἔλθῃ. In this context it
    points to the anticipated occasion in the parable, so 'when' is more natural than
    the more iterative 'whenever'.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference or transition from the preceding parable setup to
    Jesus' question. 'Therefore' preserves the logical force more clearly than a merely
    sequential 'then'.
- source_word: ἔλθῃ
  chosen: comes
  alternatives:
  - arrives
  lexicon: BDAG
  rationale: 'Aorist subjunctive of ἔρχομαι after ὅταν is idiomatically rendered in
    English present tense in a future-more-vivid temporal clause: ''when ... comes.'''
- source_word: κύριος
  chosen: owner
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here the immediate genitive
    'of the vineyard' and the parabolic setting indicate the sense of proprietor/master
    rather than a christological or divine title. 'Owner' communicates the role clearly
    in modern English.
- source_word: ἀμπελῶνος
  chosen: vineyard
  lexicon: BDAG
  rationale: Standard rendering for ἀμπελών in agricultural/parabolic contexts.
- source_word: τί ποιήσει
  chosen: what will he do
  alternatives:
  - what will he do with
  - what will he do to
  lexicon: BDAG
  rationale: Future verb with interrogative τί asks what action the owner will take.
    Because the dative object can imply action directed toward the tenants, the idiomatic
    English expansion 'what will he do to' best fits the context of judgment.
- source_word: γεωργοῖς
  chosen: farmers
  alternatives:
  - tenants
  - vine-growers
  - vinedressers
  lexicon: BDAG
  rationale: γεωργός broadly means farmer/cultivator. In this parable they are specifically
    tenant farmers, but since the Greek term itself does not explicitly encode tenancy,
    'farmers' keeps closer lexical correspondence while remaining natural. The tenancy
    idea is supplied by the broader context, not this word alone.
- source_word: ἐκείνοις
  chosen: those
  alternatives:
  - those particular
  - those very
  lexicon: BDAG
  rationale: 'Demonstrative adds specificity and slight distancing: ''those farmers.''
    This is preserved straightforwardly with ''those''.'
