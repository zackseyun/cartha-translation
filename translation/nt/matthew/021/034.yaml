id: MAT.21.34
reference: Matthew 21:34
source:
  edition: SBLGNT
  text: ὅτε δὲ ἤγγισεν ὁ καιρὸς τῶν καρπῶν, ἀπέστειλεν τοὺς δούλους αὐτοῦ πρὸς τοὺς
    γεωργοὺς λαβεῖν τοὺς καρποὺς αὐτοῦ.
translation:
  text: But when the season for fruit had drawn near, he sent his servants to the
    tenant farmers to collect his fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his slaves.' The Greek word doulous can mean either 'servants' or 'slaves';
      here 'servants' was chosen because the parable emphasizes their representative
      role as the landowner's agents rather than their bonded status.
    reason: lexical_alternative
  - marker: b
    text: Or 'farmers,' 'tenants,' or 'vine-growers.' The Greek geōrgous refers to
      cultivators; 'tenant farmers' makes explicit their role in leasing and working
      another man's vineyard in this parable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - Now when
  - And when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause ('when'), while δέ is a mild connective
    that can be rendered 'but,' 'now,' or left implicit. 'But when' preserves the
    narrative transition and slight contrast naturally in English.
- source_word: ἤγγισεν
  chosen: had drawn near
  alternatives:
  - came near
  - approached
  lexicon: BDAG
  rationale: 'Aorist of ἐγγίζω means ''approached/drew near.'' The English pluperfect
    fits the temporal relation smoothly with the following main verb in narrative
    style: once the season had drawn near, he sent.'
- source_word: ὁ καιρὸς
  chosen: the season
  alternatives:
  - the time
  - the proper time
  lexicon: BDAG
  rationale: καιρός often denotes an appointed or suitable time rather than mere chronological
    time. In an agricultural context, 'season' best captures the sense.
- source_word: τῶν καρπῶν
  chosen: for fruit
  alternatives:
  - of the fruits
  - for the produce
  lexicon: BDAG
  rationale: 'The genitive specifies what season is in view: the fruit-bearing/harvest
    season. ''For fruit'' is idiomatic English and avoids an overly wooden ''of the
    fruits.'''
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Standard narrative verb meaning 'sent.' 'Dispatched' is possible but
    less natural here.
- source_word: τοὺς δούλους αὐτοῦ
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: BDAG
  rationale: δοῦλος can mean either 'slave' or 'servant' depending on context. In
    this parable, the emphasis is on the landowner's agents rather than on the bonded
    status of the messengers, so 'servants' is the better contextual rendering while
    remaining within the doctrine's allowed range for doulos.
- source_word: πρὸς τοὺς γεωργοὺς
  chosen: to the tenant farmers
  alternatives:
  - to the farmers
  - to the vine-growers
  - to the tenants
  lexicon: BDAG
  rationale: γεωργός means farmer/cultivator. In the parable's context these are not
    merely generic farmers but those leasing and working another man's vineyard, so
    'tenant farmers' makes the role explicit and matches the broader context.
- source_word: λαβεῖν
  chosen: to collect
  alternatives:
  - to receive
  - to take
  lexicon: BDAG
  rationale: λαμβάνω is broad ('take/receive'), but here it refers to obtaining what
    is owed from the tenants. 'Collect' conveys that the owner is claiming his due
    produce.
- source_word: τοὺς καρποὺς αὐτοῦ
  chosen: his fruit
  alternatives:
  - his produce
  - the fruits due him
  lexicon: BDAG
  rationale: καρπός is literally 'fruit,' and in context refers to the vineyard's
    yield belonging to the owner. 'His fruit' is concise and preserves the possessive
    αὐτοῦ; 'produce' is possible but less vivid.
