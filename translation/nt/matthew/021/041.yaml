id: MAT.21.41
reference: Matthew 21:41
source:
  edition: SBLGNT
  text: λέγουσιν αὐτῷ· Κακοὺς κακῶς ἀπολέσει αὐτούς, καὶ τὸν ἀμπελῶνα ἐκδώσεται ἄλλοις
    γεωργοῖς, οἵτινες ἀποδώσουσιν αὐτῷ τοὺς καρποὺς ἐν τοῖς καιροῖς αὐτῶν.
translation:
  text: They said to him, “He will utterly destroy those wretches, and he will lease
    the vineyard to other farmers, who will give him the fruits in their seasons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He will miserably destroy those miserable men.” The Greek uses a wordplay
      with the adjective and adverb from the same root to intensify the judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, “will rent out the vineyard to other tenants.”
    reason: lexical_alternative
  - marker: c
    text: Or, “will give him the produce at the proper times.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They say to him
  lexicon: BDAG
  rationale: Greek present λέγουσιν is commonly used as a historical present in narrative.
    English simple past is more natural and preserves the narrative flow.
- source_word: Κακοὺς κακῶς
  chosen: those wretches ... utterly
  alternatives:
  - those evil men ... miserably
  - the bad ones ... badly
  lexicon: BDAG
  rationale: The adjective-adverb pairing creates emphatic wordplay. English cannot
    reproduce it literally without awkwardness, so 'those wretches' plus 'utterly'
    conveys both moral censure and emphatic force.
- source_word: ἀπολέσει
  chosen: will destroy
  alternatives:
  - will put to death
  - will ruin
  lexicon: BDAG
  rationale: Future of ἀπόλλυμι here refers to decisive judgment on the tenants. 'Destroy'
    is broad enough to preserve the severity without over-specifying the mode.
- source_word: τὸν ἀμπελῶνα
  chosen: the vineyard
  lexicon: BDAG
  rationale: Standard rendering of ἀμπελών; it also preserves the parable's Isaianic
    vineyard imagery.
- source_word: ἐκδώσεται
  chosen: will lease
  alternatives:
  - will rent out
  - will entrust
  lexicon: BDAG
  rationale: In this agricultural context, ἐκδίδωμι means to lease or let out property
    to tenants. 'Lease' is precise modern English for the arrangement described in
    the parable.
- source_word: ἄλλοις γεωργοῖς
  chosen: to other farmers
  alternatives:
  - to other tenants
  - to other vine-growers
  lexicon: BDAG
  rationale: γεωργοί are agricultural workers/cultivators. 'Farmers' is clear modern
    English; the tenancy idea is already conveyed by 'lease.'
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - such as will
  lexicon: BDAG
  rationale: The relative pronoun has a qualitative nuance, referring to the kind
    of tenants who will do what is expected. English 'who' communicates this adequately
    in context without stiffness.
- source_word: ἀποδώσουσιν αὐτῷ
  chosen: will give him
  alternatives:
  - will pay him
  - will render to him
  lexicon: BDAG
  rationale: ἀποδίδωμι can mean give back, pay, or render what is due. Because the
    context is produce owed from leased land, 'give him' is natural, while the sense
    of due return remains implicit.
- source_word: τοὺς καρποὺς
  chosen: the fruits
  alternatives:
  - the produce
  - the fruit
  lexicon: BDAG
  rationale: Literal 'fruits' preserves the agricultural imagery and the metaphorical
    resonance of expected results. 'Produce' is possible but less evocative.
- source_word: ἐν τοῖς καιροῖς αὐτῶν
  chosen: in their seasons
  alternatives:
  - at the proper times
  - when they are due
  lexicon: BDAG
  rationale: καιροί denotes appointed or proper times. 'In their seasons' preserves
    the agricultural setting and the sense of due timing.
