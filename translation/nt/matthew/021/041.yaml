theological_decisions:
- issue: Severity and nature of judgment in the tenants' reply
  chosen_reading: He will utterly destroy those wretches
  alternative_readings:
  - He will miserably destroy those miserable men
  - He will bring those evil men to a miserable end
  rationale: The Greek uses emphatic wordplay rather than a technical theological
    term. The translation preserves the force of divine judgment without importing
    a more specific doctrinal claim about the exact form of punishment than the text
    states.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
