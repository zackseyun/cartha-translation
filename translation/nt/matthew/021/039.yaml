theological_decisions:
- issue: Narrative sequence of expulsion and killing in relation to parallel accounts
  chosen_reading: Render the verse as stating that the son was thrown out of the vineyard
    and then killed.
  alternative_readings:
  - Harmonize with Mark/Luke by implying they killed him and then cast him out
  rationale: 'The Greek sequence in Matthew is explicit: λαβόντες ... ἐξέβαλον ἔξω
    τοῦ ἀμπελῶνος καὶ ἀπέκτειναν (''they took him, threw him out of the vineyard,
    and killed him''). The translation preserves Matthew''s wording rather than harmonizing
    with parallels. This follows original-language primacy and avoids importing a
    synthetic reading.'
  doctrine_reference: Translation philosophy §1, §3
