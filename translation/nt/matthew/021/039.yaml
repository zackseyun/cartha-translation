id: MAT.21.39
reference: Matthew 21:39
source:
  edition: SBLGNT
  text: καὶ λαβόντες αὐτὸν ἐξέβαλον ἔξω τοῦ ἀμπελῶνος καὶ ἀπέκτειναν.
translation:
  text: And they took him, threw him out of the vineyard, and killed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast him out of the vineyard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: took
  alternatives:
  - seized
  - having taken
  lexicon: BDAG
  rationale: Aorist participle from λαμβάνω, coordinated with the following finite
    verbs. 'Took' is natural modern English and preserves the sequence without over-formalizing
    as 'having taken.' 'Seized' is possible but adds a nuance of force not explicit
    in the verb itself.
- source_word: ἐξέβαλον
  chosen: threw ... out
  alternatives:
  - cast out
  - drove out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'throw out' or 'cast out.' Here, with ἔξω τοῦ
    ἀμπελῶνος, the sense is physical expulsion. 'Threw ... out' is clear, idiomatic
    modern English; 'cast out' is more traditional but less natural for the target
    audience.
- source_word: ἔξω τοῦ ἀμπελῶνος
  chosen: out of the vineyard
  alternatives:
  - outside the vineyard
  lexicon: BDAG
  rationale: The phrase marks location outside the vineyard. 'Out of the vineyard'
    fits smoothly with ἐξέβαλον in English and preserves the movement. 'Outside the
    vineyard' is also valid but slightly less direct in this verbal construction.
- source_word: ἀμπελῶνος
  chosen: vineyard
  alternatives:
  - winepress field
  lexicon: BDAG
  rationale: ἀμπελών straightforwardly denotes a vineyard. 'Vineyard' is the standard
    and precise rendering in this parabolic context.
- source_word: ἀπέκτειναν
  chosen: killed him
  alternatives:
  - put him to death
  - murdered him
  lexicon: BDAG
  rationale: ἀποκτείνω means 'kill' or 'put to death.' 'Killed him' is the most direct
    and natural rendering. 'Murdered him' may reflect the moral character of the act
    but is more interpretive than the Greek verb itself.
