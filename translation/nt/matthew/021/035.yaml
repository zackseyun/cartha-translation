- issue: Rendering of δοῦλος in a parabolic narrative
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The doctrine excerpt allows 'servant / slave' context-dependently and
    prefers 'slave' where bonded status is salient. Since these are the landowner's
    emissaries under his authority, 'slaves' best reflects δοῦλοι without importing
    later ecclesiastical softening.
