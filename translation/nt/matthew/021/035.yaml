id: MAT.21.35
reference: Matthew 21:35
source:
  edition: SBLGNT
  text: καὶ λαβόντες οἱ γεωργοὶ τοὺς δούλους αὐτοῦ ὃν μὲν ἔδειραν, ὃν δὲ ἀπέκτειναν,
    ὃν δὲ ἐλιθοβόλησαν.
translation:
  text: And the tenant farmers took his slaves; one they beat, another they killed,
    and another they stoned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants.' The Greek word is douloi, which can mean either 'slaves'
      or 'servants' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  chosen: tenant farmers
  alternatives:
  - farmers
  - vine-growers
  - tenants
  lexicon: BDAG
  rationale: In the parable context, γεωργοί are not merely agricultural workers but
    those leasing and working the land for the owner. 'Tenant farmers' captures both
    the agricultural role and the tenancy relationship better than simply 'farmers.'
- source_word: λαβόντες
  chosen: took
  alternatives:
  - seized
  - having taken
  lexicon: BDAG
  rationale: 'The participle is aorist and antecedent to the main actions. English
    idiom is smoother with finite verb coordination: ''took.'' ''Seized'' is possible,
    but ''took'' is sufficiently forceful in context without overstating the verb.'
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος is rendered according to context. In this
    parable the men are the landowner's subordinate agents sent under his authority;
    the bonded status is more salient than a generic service role, so 'slaves' is
    preferred over 'servants.'
- source_word: ἔδειραν
  chosen: beat
  alternatives:
  - flogged
  - thrashed
  - struck
  lexicon: BDAG
  rationale: δέρω commonly means to beat or flog. 'Beat' is natural modern English
    and does not over-specify the method as 'flogged' might.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - put to death
  - murdered
  lexicon: BDAG
  rationale: The verb straightforwardly means 'killed.' 'Murdered' adds a legal-moral
    nuance not explicit in the lexical form, while 'put to death' sounds more formal
    than the context requires.
- source_word: ἐλιθοβόλησαν
  chosen: stoned
  alternatives:
  - pelted with stones
  lexicon: BDAG
  rationale: λιθοβολέω specifically denotes execution or attack by stoning. 'Stoned'
    is the standard concise rendering and is clear in context.
- source_word: ὃν μὲν ... ὃν δὲ ... ὃν δὲ
  chosen: one ... another ... another
  alternatives:
  - one ... one ... one
  - some ... others ... others
  lexicon: Greek grammar
  rationale: This distributive construction distinguishes the different treatments
    of different slaves. 'One ... another ... another' communicates the pattern clearly
    in idiomatic English.
