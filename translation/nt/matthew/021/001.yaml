theological_decisions:
- issue: Narrative subject of the plural verbs before Jesus is named
  chosen_reading: Render the plural actions impersonally as 'they came near... and
    arrived...' and then name Jesus when the Greek does.
  alternative_readings:
  - Render explicitly as 'Jesus and his disciples came near...'
  rationale: The Greek plural verbs have an implied group subject, but the text does
    not explicitly restate 'Jesus and his disciples' here. The translation preserves
    the source's narrative economy rather than supplying a fuller subject not present
    in the verse.
  doctrine_reference: Translation philosophy §1, §3
