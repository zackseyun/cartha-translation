id: MAT.21.1
reference: Matthew 21:1
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἤγγισαν εἰς Ἱεροσόλυμα καὶ ἦλθον εἰς Βηθφαγὴ ⸀εἰς τὸ Ὄρος τῶν Ἐλαιῶν,
    τότε ⸀Ἰησοῦς ἀπέστειλεν δύο μαθητὰς
translation:
  text: And when they came near to Jerusalem and arrived at Bethphage, at the Mount
    of Olives, then Jesus sent two disciples
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drew near to Jerusalem and came to Bethphage, to the Mount of Olives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισαν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: BDAG
  rationale: Aorist of ἐγγίζω denotes coming near spatially. 'Came near' is natural
    modern English and preserves the movement toward Jerusalem without archaic tone.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: ἦλθον
  chosen: arrived
  alternatives:
  - came
  lexicon: BDAG
  rationale: Used here to distinguish the second movement verb from ἤγγισαν. 'Arrived
    at' fits the sense of reaching Bethphage after coming near Jerusalem and reads
    smoothly in English.
- source_word: Βηθφαγὴ
  chosen: Bethphage
  lexicon: BDAG
  rationale: Personal and place names are transliterated by standard convention.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: at the Mount of Olives
  alternatives:
  - to the Mount of Olives
  - in the vicinity of the Mount of Olives
  lexicon: BDAG
  rationale: Although εἰς often means 'to/into,' in this sequence it locates Bethphage
    with reference to the Mount of Olives. 'At the Mount of Olives' communicates the
    geographic setting in idiomatic English without implying entry into the mountain
    itself.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Marks the narrative transition simply and naturally.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: The ordinary narrative sense is that Jesus sent the disciples on an errand.
    'Sent' is the most direct and idiomatic rendering.
- source_word: δύο μαθητὰς
  chosen: two disciples
  lexicon: BDAG
  rationale: Straightforward rendering of numeral plus noun; μαθητής is best rendered
    'disciple' in Gospel narrative contexts.
