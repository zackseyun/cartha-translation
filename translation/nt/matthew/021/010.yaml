id: MAT.21.10
reference: Matthew 21:10
source:
  edition: SBLGNT
  text: καὶ εἰσελθόντος αὐτοῦ εἰς Ἱεροσόλυμα ἐσείσθη πᾶσα ἡ πόλις λέγουσα· Τίς ἐστιν
    οὗτος;
translation:
  text: And when he entered Jerusalem, the whole city was stirred up, saying, “Who
    is this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was shaken.” The Greek verb can mean to shake physically or, as here,
      to describe public agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθόντος αὐτοῦ
  chosen: when he entered
  alternatives:
  - as he entered
  - after he entered
  - upon his entering
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a temporal clause in natural
    English. 'When he entered' preserves the timing without awkwardness.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: ἐσείσθη
  chosen: was stirred up
  alternatives:
  - was shaken
  - was in turmoil
  - was moved
  lexicon: BDAG
  rationale: 'From σείω, literally ''to shake.'' In this context of a city''s reaction
    to Jesus'' arrival, the sense is figurative: the city was agitated or stirred.
    ''Was stirred up'' preserves the metaphor while sounding natural in modern English.
    ''Was shaken'' is possible but may sound overly physical without explanation.'
- source_word: πᾶσα ἡ πόλις
  chosen: the whole city
  alternatives:
  - all the city
  - the entire city
  lexicon: BDAG
  rationale: Idiomatic English rendering of the distributive force of πᾶσα with the
    article and noun.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - and saying
  - asking
  lexicon: BDAG
  rationale: The present participle agrees with 'city' and introduces the content
    of the reaction. 'Saying' is sufficiently literal; the quoted question makes clear
    that the speech functions as inquiry, so 'asking' is interpretive and unnecessary
    in the main text.
- source_word: Τίς ἐστιν οὗτος;
  chosen: Who is this?
  alternatives:
  - Who is this man?
  lexicon: BDAG
  rationale: Direct and natural rendering of the Greek question. 'Man' is not explicit
    in the text and should not be added.
