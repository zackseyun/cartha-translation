theological_decisions:
- issue: Figurative versus literal force of the city's reaction
  chosen_reading: Render ἐσείσθη figuratively as 'was stirred up' rather than more
    literal 'was shaken.'
  alternative_readings:
  - was shaken
  - was moved
  rationale: The verse describes the city's collective reaction to Jesus' entry, not
    an earthquake. A figurative English rendering communicates the intended sense
    while retaining the underlying metaphor of disturbance.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
