id: MAT.21.45
reference: Matthew 21:45
source:
  edition: SBLGNT
  text: Καὶ ἀκούσαντες οἱ ἀρχιερεῖς καὶ οἱ Φαρισαῖοι τὰς παραβολὰς αὐτοῦ ἔγνωσαν ὅτι
    περὶ αὐτῶν λέγει·
translation:
  text: And when the chief priests and the Pharisees heard his parables, they knew
    that he was speaking about them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning them'; the sense is that they recognized the parables were
      directed at them. Some translations render more interpretively, 'against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when [they] heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered in English
    as a temporal clause. 'When they heard' is smoother modern English than the more
    formal 'having heard' while preserving the sequence.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural term referring to the senior priestly
    leadership, not multiple holders of the singular office of high priest at one
    time.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Conventional transliteration of the Jewish group name; names/groups are
    transliterated rather than translated.
- source_word: παραβολὰς
  chosen: parables
  alternatives:
  - illustrations
  - figures
  lexicon: BDAG
  rationale: The established and accurate rendering for Jesus's figurative stories/sayings
    in the Synoptic context. 'Parables' preserves the literary and theological category.
- source_word: ἔγνωσαν
  chosen: they knew
  alternatives:
  - they understood
  - they realized
  lexicon: BDAG
  rationale: Aorist of γινώσκω here conveys coming to know/recognize. 'Knew' is a
    close formal equivalent; the context makes clear this is recognition. Alternatives
    are possible but less direct.
- source_word: περὶ αὐτῶν
  chosen: about them
  alternatives:
  - concerning them
  - against them
  lexicon: BDAG
  rationale: περί with genitive normally means 'about/concerning.' 'Against them'
    would overinterpret hostility not lexically encoded in the preposition, even if
    implied by context.
- source_word: λέγει
  chosen: he was speaking
  alternatives:
  - he speaks
  - he was saying
  lexicon: BDAG
  rationale: 'Present tense after an aorist main verb can be represented in idiomatic
    English as progressive past in indirect discourse: they recognized that his speech
    was about them. This avoids awkward English (''he speaks'') while preserving the
    sense.'
