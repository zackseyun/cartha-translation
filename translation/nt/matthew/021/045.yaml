theological_decisions:
- issue: Whether to make explicit that Jesus's parables were condemnatory toward the
    leaders
  chosen_reading: he was speaking about them
  alternative_readings:
  - he was speaking against them
  rationale: The Greek states that Jesus was speaking 'about' them (περὶ αὐτῶν). The
    context implies the parables were critical, but the translation should not import
    the stronger adversative sense into the main text without lexical warrant.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
