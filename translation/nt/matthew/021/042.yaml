id: MAT.21.42
reference: Matthew 21:42
source:
  edition: SBLGNT
  text: Λέγει αὐτοῖς ὁ Ἰησοῦς· Οὐδέποτε ἀνέγνωτε ἐν ταῖς γραφαῖς· Λίθον ὃν ἀπεδοκίμασαν
    οἱ οἰκοδομοῦντες οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας· παρὰ κυρίου ἐγένετο αὕτη, καὶ
    ἔστιν θαυμαστὴ ἐν ὀφθαλμοῖς ἡμῶν;
translation:
  text: 'Jesus said to them, “Have you never read in the Scriptures: ‘The stone that
    the builders rejected—this one has become the cornerstone. This came from the
    Lord, and it is marvelous in our eyes’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the capstone'; literally 'the head of the corner.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'from the Lord'; the Hebrew source of the quotation has 'from the
      LORD' (YHWH).
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally renders it as the simple past 'said' without loss of meaning.
- source_word: Οὐδέποτε
  chosen: never
  alternatives:
  - at no time ever
  lexicon: BDAG
  rationale: The adverb intensifies the rhetorical question; 'never' is the natural
    English equivalent in this idiom ('Have you never read...?').
- source_word: ἀνέγνωτε
  chosen: have you read
  alternatives:
  - did you read
  lexicon: BDAG
  rationale: In English rhetorical questions of this kind, present perfect ('Have
    you ... read') best conveys the force of the Greek aorist in a standing-scriptural
    appeal.
- source_word: γραφαῖς
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptures
  lexicon: BDAG
  rationale: In this context γραφαί refers to the sacred writings of Israel, so 'the
    Scriptures' is the standard and clearest rendering.
- source_word: Λίθον
  chosen: the stone
  alternatives:
  - a stone
  lexicon: BDAG
  rationale: Though anarthrous in Greek, the quotation is definite in sense, referring
    to a specific stone in the cited Psalm; English idiom prefers 'the stone.'
- source_word: ἀπεδοκίμασαν
  chosen: rejected
  alternatives:
  - disapproved
  - rejected after examination
  lexicon: BDAG
  rationale: The verb carries the sense of rejecting as unfit after evaluation. 'Rejected'
    is the most natural concise English rendering.
- source_word: οἰκοδομοῦντες
  chosen: the builders
  alternatives:
  - those building
  lexicon: BDAG
  rationale: The participle functions substantivally; 'the builders' is idiomatic
    and preserves the metaphor.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - this
  - he
  lexicon: BDAG
  rationale: The demonstrative is emphatic. 'This one' preserves the emphasis better
    than a bare 'this,' though the English line remains smooth.
- source_word: ἐγενήθη εἰς
  chosen: has become
  alternatives:
  - became
  - came to be as
  lexicon: BDAG
  rationale: The expression denotes resulting status. 'Has become' communicates the
    completed change with present relevance in natural English.
- source_word: κεφαλὴν γωνίας
  chosen: the cornerstone
  alternatives:
  - the head of the corner
  - the capstone
  - the chief cornerstone
  lexicon: BDAG
  rationale: The phrase is traditionally rendered 'cornerstone' and most likely denotes
    the chief stone at the corner. 'Head of the corner' is too wooden for main text;
    'capstone' is possible but less likely here and should be preserved in a footnote.
- source_word: παρὰ κυρίου
  chosen: from the Lord
  alternatives:
  - by the Lord
  - from the Lord's hand
  lexicon: BDAG
  rationale: παρά with genitive here indicates source/origin. 'From the Lord' best
    captures that sense in clear English.
- source_word: θαυμαστὴ
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  lexicon: BDAG
  rationale: The adjective denotes something wondrous or remarkable. 'Marvelous' preserves
    the elevated tone of the citation without sounding archaic.
- source_word: ἐν ὀφθαλμοῖς ἡμῶν
  chosen: in our eyes
  alternatives:
  - in our sight
  lexicon: BDAG
  rationale: This is a standard idiom meaning 'as we perceive it.' 'In our eyes' is
    a transparent and faithful rendering.
