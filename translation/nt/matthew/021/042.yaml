theological_decisions:
- issue: Rendering of κύριος in the Psalm citation
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek text reads κυρίου, and the project's default rendering for
    κύριος is 'Lord.' Because this is an Old Testament citation whose Hebrew source
    uses the divine name, 'LORD' is a meaningful alternative and is preserved in a
    footnote rather than adopted in the main text, in keeping with the stated default
    and transparency about source-language background.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Messianic application of the stone image
  chosen_reading: Retain the metaphor without interpretive expansion
  alternative_readings:
  - Explicitly identify the stone as the Messiah in the main text
  rationale: Jesus applies Psalm 118:22 to himself in context, but the verse itself
    presents the scriptural quotation rather than an explicit gloss. To avoid importing
    doctrinal interpretation into the translation, the metaphor is preserved as stated.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Never import doctrinal claims the text does not make.'
