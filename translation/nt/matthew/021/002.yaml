id: MAT.21.2
reference: Matthew 21:2
source:
  edition: SBLGNT
  text: λέγων αὐτοῖς· ⸀Πορεύεσθε εἰς τὴν κώμην τὴν ⸀κατέναντι ὑμῶν, καὶ ⸀εὐθέως εὑρήσετε
    ὄνον δεδεμένην καὶ πῶλον μετ’ αὐτῆς· λύσαντες ⸀ἀγάγετέ μοι.
translation:
  text: saying to them, “Go into the village opposite you, and immediately you will
    find a donkey tied, and a colt with her. Untie them and bring them to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “across from you” for the village’s location.
    reason: lexical_alternative
  - marker: b
    text: “Colt” here means a young donkey, as the context makes clear.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek literally has a participle, “having untied,” followed by an imperative,
      “bring”; English commonly renders the sequence as two commands: “Untie them
      and bring them.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορεύεσθε
  chosen: Go
  alternatives:
  - Travel
  - Proceed
  lexicon: BDAG
  rationale: Imperative of πορεύομαι in narrative command context is naturally rendered
    'Go' in modern English; fuller alternatives are possible but less idiomatic here.
- source_word: κώμην
  chosen: village
  alternatives:
  - hamlet
  - settlement
  lexicon: BDAG
  rationale: κώμη commonly denotes a village rather than a city or generic place;
    'village' is the standard clear English equivalent.
- source_word: κατέναντι ὑμῶν
  chosen: opposite you
  alternatives:
  - in front of you
  - facing you
  - across from you
  lexicon: BDAG
  rationale: The phrase indicates the village situated opposite or in front of the
    disciples. 'Opposite you' preserves the spatial sense closely, though slightly
    formal.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως regularly means 'immediately/at once.' 'Immediately' preserves
    the temporal force with slightly more formal narrative tone.
- source_word: ὄνον
  chosen: a donkey
  alternatives:
  - an ass
  lexicon: BDAG
  rationale: Modern English strongly prefers 'donkey'; 'ass' is traditional but now
    potentially distracting. The noun is singular feminine by context, but English
    need not mark sex explicitly here because 'with her' clarifies it.
- source_word: δεδεμένην
  chosen: tied
  alternatives:
  - bound
  - fastened
  lexicon: BDAG
  rationale: Perfect passive participle of δέω describes the donkey as being in a
    tied state. 'Tied' is the most natural concise rendering.
- source_word: πῶλον
  chosen: a colt
  alternatives:
  - a young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, here specifically a donkey in context.
    'Colt' is traditional and concise, while the maternal pairing with the donkey
    makes the species clear.
- source_word: μετ’ αὐτῆς
  chosen: with her
  alternatives:
  - beside her
  lexicon: BDAG
  rationale: The pronoun is feminine singular referring to the donkey. 'With her'
    is straightforward and preserves the maternal association relevant to the scene.
- source_word: λύσαντες
  chosen: Untie them
  alternatives:
  - After untying them
  - Loose them
  lexicon: BDAG
  rationale: The aorist participle is attendant/circumstantial to the following imperative.
    In idiomatic English, converting it to a coordinate imperative ('Untie them and
    bring them') best reflects the command sequence. The plural object is inferred
    from the following command and the presence of both animals.
- source_word: ἀγάγετέ μοι
  chosen: bring them to me
  alternatives:
  - lead them to me
  lexicon: BDAG
  rationale: Although ἄγω can mean 'lead,' English idiom with animals in this command
    context is well expressed by 'bring them to me.' Supplying 'them' is required
    by English and matches the plural participle and the two animals mentioned.
- source_word: λέγων αὐτοῖς
  chosen: saying to them
  alternatives:
  - telling them
  lexicon: BDAG
  rationale: The present participle introduces Jesus' speech. 'Saying to them' is
    slightly more formal and keeps close to the Greek narrative structure.
