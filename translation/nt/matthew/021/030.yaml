theological_decisions:
- issue: Rendering of κύριε in address to the father
  chosen_reading: sir
  alternative_readings:
  - Lord
  - master
  rationale: The doctrine defaults κύριος to 'Lord,' but context governs. In this
    parable the speaker addresses his human father respectfully; translating 'Lord'
    in English would sound christological or overtly theological in a way the immediate
    context does not require. 'Sir' preserves respect while avoiding doctrinal overreading.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος → Lord by default) with
    context-sensitive variance documented per verse'
