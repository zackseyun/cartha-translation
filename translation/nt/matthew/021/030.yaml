id: MAT.21.30
reference: Matthew 21:30
source:
  edition: SBLGNT
  text: ⸂προσελθὼν δὲ⸃ τῷ ⸀δευτέρῳ εἶπεν ὡσαύτως· ὁ δὲ ἀποκριθεὶς εἶπεν· ⸂Ἐγώ, κύριε·
    καὶ οὐκ⸃ ἀπῆλθεν.
translation:
  text: Then he came to the second and said the same. And he answered, ‘I will, sir,’
    but he did not go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I, sir'—an elliptical reply meaning 'I will' or 'I
      will go.'
    reason: lexical_alternative
  - marker: b
    text: Greek κύριε can also be rendered 'lord' or 'master'; here it is used as
      a respectful address to a human father, so 'sir' is preferred.
    reason: alternative_reading
lexical_decisions:
- source_word: προσελθὼν
  chosen: came
  alternatives:
  - approached
  - went to
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι introducing the father's movement toward
    the second son. 'Came' is natural English in sequence with 'said'; 'approached'
    is possible but slightly stiffer.
- source_word: δὲ
  chosen: Then / And
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: δέ is mildly connective here, marking narrative progression rather than
    strong contrast. It is represented idiomatically with 'Then' at the start and
    'And' later.
- source_word: τῷ δευτέρῳ
  chosen: to the second
  alternatives:
  - to the second son
  - to the other
  lexicon: BDAG
  rationale: δευτέρῳ means 'second.' 'Son' is implied from the immediate context but
    not repeated in Greek; keeping 'the second' preserves the source economy while
    remaining clear.
- source_word: ὡσαύτως
  chosen: the same
  alternatives:
  - likewise
  - in the same way
  lexicon: BDAG
  rationale: Refers to the same instruction being given to the second son. 'The same'
    is concise and idiomatic in English narrative.
- source_word: ἀποκριθεὶς εἶπεν
  chosen: he answered
  alternatives:
  - answering, he said
  - he replied
  lexicon: BDAG
  rationale: This common Semitic-influenced Greek expression is best rendered idiomatically
    in English as 'he answered,' avoiding unnecessary literal redundancy.
- source_word: Ἐγώ
  chosen: I will
  alternatives:
  - I
  - I will go
  lexicon: BDAG
  rationale: The Greek has only the emphatic pronoun 'I,' but in context it is an
    elliptical assent to the father's command. English requires the implied verb for
    sense; 'I will' preserves the brevity better than the fuller 'I will go.'
- source_word: κύριε
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here the vocative addresses
    a human father in a respectful domestic setting, not a divine or messianic title.
    'Sir' best conveys polite respect in contemporary English without importing theological
    overtones.
- source_word: καὶ οὐκ ἀπῆλθεν
  chosen: but he did not go
  alternatives:
  - and he did not go
  - yet he did not go
  lexicon: BDAG
  rationale: Greek καί plus negated verb states the outcome; English idiom prefers
    adversative 'but' to highlight the contrast between profession and action that
    is central to the parable.
