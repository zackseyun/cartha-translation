id: MAT.21.22
reference: Matthew 21:22
source:
  edition: SBLGNT
  text: καὶ πάντα ὅσα ⸀ἂν αἰτήσητε ἐν τῇ προσευχῇ πιστεύοντες λήμψεσθε.
translation:
  text: And whatever you ask in prayer, believing, you will receive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that you ask' or 'everything you ask.'
    reason: lexical_alternative
  - marker: b
    text: Or 'trusting'; the Greek participle means believing as you pray.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  chosen: whatever
  alternatives:
  - all that
  - everything that
  lexicon: BDAG
  rationale: The combination of πᾶς with ὅσος forms an idiomatic comprehensive expression
    meaning 'whatever' or 'all that.' 'Whatever' is natural English and preserves
    the open-ended scope without sounding wooden.
- source_word: ἂν αἰτήσητε
  chosen: you ask
  alternatives:
  - you might ask
  - you may ask
  lexicon: BDAG
  rationale: 'ἄν with the aorist subjunctive marks an indefinite relative clause:
    ''whatever you may ask.'' In idiomatic English, ''whatever you ask'' best conveys
    the sense without overtranslating the modal nuance.'
- source_word: ἐν τῇ προσευχῇ
  chosen: in prayer
  alternatives:
  - in the prayer
  - while praying
  lexicon: BDAG
  rationale: The dative phrase is best rendered idiomatically as 'in prayer.' The
    article in Greek does not require a definite article in English here. 'While praying'
    is possible but shifts from the noun 'prayer' to a verbal expression.
- source_word: πιστεύοντες
  chosen: believing
  alternatives:
  - if you believe
  - with faith
  - trusting
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the asking and is most
    directly represented by 'believing.' This preserves the Greek syntax and the connection
    between prayer and faith without importing a stronger conditional structure than
    the text explicitly states. 'Trusting' is possible, but 'believing' aligns with
    the common NT usage of πιστεύω.
- source_word: λήμψεσθε
  chosen: you will receive
  alternatives:
  - you will get
  lexicon: BDAG
  rationale: Future middle indicative of λαμβάνω here is naturally rendered 'you will
    receive.' 'Get' is too colloquial for the register, and the middle voice does
    not require special representation in English.
