theological_decisions:
- issue: Relation of faith to answered prayer
  chosen_reading: Render the participle straightforwardly as 'believing' rather than
    making it an explicit condition such as 'if you believe.'
  alternative_readings:
  - if you believe
  - provided that you believe
  rationale: The verse links prayer and faith, but the Greek uses a participle rather
    than an explicit conditional clause. Preserving that form avoids over-resolving
    theological debates about the mechanics or scope of answered prayer while still
    reflecting the text's clear emphasis on faith.
  doctrine_reference: Preserve theological tension rather than resolve it.
