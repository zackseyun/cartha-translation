theological_decisions:
- issue: Intertextual vineyard imagery with Isaiah 5
  chosen_reading: Retain concrete agricultural language without making the allusion
    explicit in the main text.
  alternative_readings:
  - Use more traditional wording such as 'hedge' to heighten the Isaiah echo
  rationale: The verse strongly echoes Isaiah 5, but the translation should preserve
    the imagery through accurate lexical choices rather than importing interpretive
    explanation into the text itself. Any stronger signaling of the allusion belongs
    in a footnote, not the main line.
  doctrine_reference: Translation philosophy §§1, 3, 6
