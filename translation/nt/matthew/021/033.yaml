id: MAT.21.33
reference: Matthew 21:33
source:
  edition: SBLGNT
  text: Ἄλλην παραβολὴν ἀκούσατε. ⸀Ἄνθρωπος ἦν οἰκοδεσπότης ὅστις ἐφύτευσεν ἀμπελῶνα
    καὶ φραγμὸν αὐτῷ περιέθηκεν καὶ ὤρυξεν ἐν αὐτῷ ληνὸν καὶ ᾠκοδόμησεν πύργον, καὶ
    ἐξέδετο αὐτὸν γεωργοῖς, καὶ ἀπεδήμησεν.
translation:
  text: 'Listen to another parable: There was a landowner who planted a vineyard and
    put a fence around it and dug a winepress in it and built a tower, and leased
    it to tenant farmers, and went away.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The imagery of planting a vineyard, enclosing it, digging a winepress, and
      building a tower echoes Isaiah 5:1–2.
    reason: cross_reference
  - marker: b
    text: Or 'put a hedge around it.' The Greek term can refer to an enclosing barrier
      such as a fence or hedge.
    reason: lexical_alternative
  - marker: c
    text: Or 'rented it out to farmers.' The expression refers to leasing the vineyard
      to cultivators who would work it.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλλην παραβολὴν ἀκούσατε
  chosen: Listen to another parable
  alternatives:
  - Hear another parable
  - Listen to another illustration
  lexicon: BDAG
  rationale: ἀκούσατε is aorist imperative plural, naturally rendered as a direct
    command, 'Listen' or 'Hear.' 'Parable' is the standard and contextually precise
    rendering of παραβολή in Jesus' teaching.
- source_word: Ἄνθρωπος ἦν οἰκοδεσπότης
  chosen: There was a landowner
  alternatives:
  - There was a master of a house
  - A man was a householder
  lexicon: BDAG
  rationale: οἰκοδεσπότης literally denotes the master/owner of a household or estate.
    In this agricultural setting with a vineyard and tenants, 'landowner' communicates
    the role idiomatically in modern English better than the more wooden 'householder.'
    The introductory Ἄνθρωπος ἦν is represented idiomatically by 'There was' rather
    than preserving 'A man was,' which is unnatural in English.
- source_word: ἐφύτευσεν ἀμπελῶνα
  chosen: planted a vineyard
  alternatives:
  - established a vineyard
  lexicon: BDAG
  rationale: φυτεύω is straightforwardly 'plant'; ἀμπελών is 'vineyard.' The phrase
    echoes Isaianic vineyard imagery and should remain concrete.
- source_word: φραγμὸν αὐτῷ περιέθηκεν
  chosen: put a fence around it
  alternatives:
  - set a hedge around it
  - put a wall around it
  lexicon: BDAG
  rationale: φραγμός can denote a fence, hedge, or enclosing barrier. 'Fence' is a
    clear modern rendering broad enough to cover the general sense without over-specifying
    the material. αὐτῷ refers to the vineyard.
- source_word: ὤρυξεν ἐν αὐτῷ ληνὸν
  chosen: dug a winepress in it
  alternatives:
  - dug a wine vat in it
  - cut out a winepress in it
  lexicon: BDAG
  rationale: ληνός is a winepress; ὀρύσσω means to dig. 'Dug a winepress' reflects
    the likely excavation involved and preserves the agricultural imagery.
- source_word: ᾠκοδόμησεν πύργον
  chosen: built a tower
  alternatives:
  - constructed a watchtower
  lexicon: BDAG
  rationale: πύργος is 'tower.' While a vineyard tower often functioned as a watchtower,
    the Greek does not explicitly state that function, so the simpler 'tower' is preferred.
- source_word: ἐξέδετο αὐτὸν γεωργοῖς
  chosen: leased it to tenant farmers
  alternatives:
  - rented it out to farmers
  - let it out to vine-growers
  lexicon: BDAG
  rationale: ἐκδίδωμι in the middle here means to lease or rent out. γεωργοί are farmers/cultivators;
    in this context they are not merely laborers but tenants entrusted with the vineyard.
    'Leased it to tenant farmers' best captures the economic relationship.
- source_word: ἀπεδήμησεν
  chosen: went away
  alternatives:
  - went to another country
  - traveled abroad
  lexicon: BDAG
  rationale: ἀποδημέω means to go away from one's home region, often on a journey.
    'Went away' is accurate and avoids adding destination details not explicit in
    Matthew's wording.
