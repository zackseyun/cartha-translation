id: MAT.21.29
reference: Matthew 21:29
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· ⸂Οὐ θέλω· ὕστερον δὲ μεταμεληθεὶς⸃ ἀπῆλθεν.
translation:
  text: But he answered, ‘I do not want to.’ But later he changed his mind and went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having regretted it' or 'having relented.' The Greek participle can include the sense of regret that leads to a change of course.
    reason: lexical_alternative
  - marker: b
    text: Or 'Yet later, having changed his mind, he went.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: A standard participial formula in narrative; English idiom is best served by folding the participle into the finite verb construction, 'he answered,' without loss of meaning.
- source_word: Οὐ θέλω
  chosen: I do not want to
  alternatives:
  - I will not
  - I do not wish to
  lexicon: BDAG
  rationale: θέλω can express will, desire, or willingness. Here the son's refusal is personal and direct; 'I do not want to' captures the volitional sense in natural modern English better than the more absolute 'I will not,' while remaining faithful to the Greek.
- source_word: ὕστερον
  chosen: later
  alternatives:
  - afterward
  lexicon: BDAG
  rationale: Temporal adverb indicating subsequent action. 'Later' is concise, natural, and accurate.
- source_word: μεταμεληθεὶς
  chosen: having changed his mind
  alternatives:
  - having regretted it
  - having relented
  lexicon: BDAG
  rationale: μεταμέλομαι often denotes a change of mind accompanied by regret. In this context the emphasis is on reversal of intention leading to obedience, so 'having changed his mind' best conveys the narrative force without importing stronger penitential language associated more often with μετανοέω.
- source_word: ἀπῆλθεν
  chosen: he went
  alternatives:
  - he went off
  - he departed
  lexicon: BDAG
  rationale: In context, the verb refers to going to do what was requested, not merely departing. 'He went' is the most natural and contextually sufficient rendering in English.
