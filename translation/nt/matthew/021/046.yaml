id: MAT.21.46
reference: Matthew 21:46
source:
  edition: SBLGNT
  text: καὶ ζητοῦντες αὐτὸν κρατῆσαι ἐφοβήθησαν τοὺς ὄχλους, ⸂ἐπεὶ εἰς⸃ προφήτην αὐτὸν
    εἶχον.
translation:
  text: And although they were seeking to arrest him, they feared the crowds, because
    they regarded him as a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they considered him a prophet' or 'they held him to be a prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητοῦντες
  chosen: although they were seeking
  alternatives:
  - seeking
  - wanting
  - trying
  lexicon: BDAG
  rationale: 'Present participle conveying ongoing intent. Rendered with an English
    concessive sense in context (''although they were seeking'') to reflect the participial
    relation to the main verb ἐφοβήθησαν: they wanted to seize him, yet were restrained
    by fear.'
- source_word: κρατῆσαι
  chosen: to arrest
  alternatives:
  - to seize
  - to take hold of
  lexicon: BDAG
  rationale: In this hostile narrative context, κρατέω refers not to merely grasping
    physically but to apprehending or seizing a person. 'Arrest' communicates the
    intended official/forcible action in natural English.
- source_word: ἐφοβήθησαν
  chosen: they feared
  alternatives:
  - they were afraid of
  - they became afraid of
  lexicon: BDAG
  rationale: Aorist passive/deponent verb rendered simply as past tense 'they feared.'
    This preserves the direct object construction with τοὺς ὄχλους and avoids overinterpreting
    ingressive nuance.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: Plural noun best represented by 'the crowds,' a natural modern English
    rendering for the gathered populace.
- source_word: ἐπεὶ εἰς
  chosen: because
  alternatives:
  - since
  - for
  lexicon: BDAG
  rationale: The phrase introduces the reason for their fear. 'Because' is the clearest
    modern English equivalent. The idiom εἰς προφήτην with ἔχω is handled in the following
    decision.
- source_word: εἰς προφήτην αὐτὸν εἶχον
  chosen: they regarded him as a prophet
  alternatives:
  - they considered him a prophet
  - they held him to be a prophet
  - they had him as a prophet
  lexicon: BDAG
  rationale: 'This is an idiomatic construction: ''to have someone as'' in the sense
    of considering/regarding. ''Regarded him as a prophet'' is idiomatic English and
    preserves the people''s estimation of Jesus without implying a denial of his fuller
    identity.'
- source_word: προφήτην
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: 'Anarthrous accusative after εἰς is naturally indefinite in English here:
    the crowds viewed Jesus as belonging to the category of prophet.'
