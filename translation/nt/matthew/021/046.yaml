theological_decisions:
- issue: How to render the crowd's assessment of Jesus as προφήτην without importing
    or denying christological claims beyond the verse
  chosen_reading: they regarded him as a prophet
  alternative_readings:
  - they considered him a prophet
  - they held him to be a prophet
  rationale: The verse reports the crowds' perception, not a full theological definition
    of Jesus' identity. The translation therefore preserves the narrative viewpoint
    and avoids wording that would either flatten the statement into mere objective
    fact or suggest that Jesus was only a prophet.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
