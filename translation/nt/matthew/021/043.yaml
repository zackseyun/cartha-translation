id: MAT.21.43
reference: Matthew 21:43
source:
  edition: SBLGNT
  text: διὰ τοῦτο λέγω ὑμῖν ὅτι ἀρθήσεται ἀφ’ ὑμῶν ἡ βασιλεία τοῦ θεοῦ καὶ δοθήσεται
    ἔθνει ποιοῦντι τοὺς καρποὺς αὐτῆς.
translation:
  text: Therefore I tell you, the kingdom of God will be taken away from you and given
    to a nation producing its fruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a people.' The Greek ἔθνει can denote a nation or people-group; the
      wording here identifies a corporate body by its fruitfulness without specifying
      more narrowly who is meant.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Introduces an inference from the preceding parable and citation. 'Therefore'
    is concise, natural English and preserves the logical force.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard direct-speech formula. 'I tell you' is slightly more natural
    in contemporary English while retaining the personal address.
- source_word: ἀρθήσεται
  chosen: will be taken away
  alternatives:
  - will be removed
  - will be taken
  lexicon: BDAG
  rationale: Future passive of αἴρω here conveys removal from present possessors.
    'Taken away' best matches both the passive form and the sense of loss.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - away from you
  lexicon: BDAG
  rationale: The preposition marks separation from the current addressees. 'From you'
    is sufficient because 'taken away' already carries the separative nuance.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the established and accurate rendering of βασιλεία in this context.
    'Kingdom' preserves both the realm and reign dimensions without over-interpreting
    toward only abstract rule.
- source_word: δοθήσεται
  chosen: and given
  alternatives:
  - and it will be given
  lexicon: BDAG
  rationale: Future passive coordinated with the previous verb. English can omit the
    repeated subject naturally while preserving the passive sense.
- source_word: ἔθνει
  chosen: to a nation
  alternatives:
  - to a people
  - to a Gentile nation
  lexicon: BDAG
  rationale: ἔθνος can mean nation, people, or Gentiles depending on context. Here
    the singular dative refers to a corporate recipient characterized by fruit-bearing.
    'Nation' is the most direct lexical equivalent and avoids prematurely resolving
    whether the referent is ethnic Israel reconstituted, the church, or another corporate
    body.
- source_word: ποιοῦντι
  chosen: producing
  alternatives:
  - bearing
  - making
  lexicon: BDAG
  rationale: Present participle describing the nation by its ongoing action. 'Producing'
    fits naturally with 'fruits' and reflects the active verbal idea without importing
    a more interpretive metaphor than necessary.
- source_word: τοὺς καρποὺς αὐτῆς
  chosen: its fruits
  alternatives:
  - its fruit
  - the fruits of it
  - its produce
  lexicon: BDAG
  rationale: Plural καρπούς is retained as 'fruits.' The pronoun αὐτῆς is rendered
    'its,' referring most naturally to the kingdom. This preserves the metaphor of
    outcomes appropriate to God's kingdom.
