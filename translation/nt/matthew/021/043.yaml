theological_decisions:
- issue: Referent of 'a nation' (ἔθνει)
  chosen_reading: Rendered generically as 'a nation' without specifying the church,
    Gentiles, or a remnant of Israel in the main text.
  alternative_readings:
  - the church as the new covenant people
  - the Gentiles specifically
  - a fruit-bearing people including Jesus' disciples / a renewed people of God
  rationale: The verse speaks of transfer to a corporate body marked by fruitfulness,
    but the Greek term itself does not require a single later theological identification
    in translation. Preserving the broader wording avoids importing a denominational
    or supersessionist conclusion beyond the text's explicit wording.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
- issue: Meaning of 'the kingdom of God' in this judgment saying
  chosen_reading: Retained as 'the kingdom of God' rather than paraphrasing as 'the
    privilege of belonging to God's people' or 'rule of God.'
  alternative_readings:
  - God's reign
  - the privileges of the kingdom
  rationale: Jesus' wording should stand with its full theological range. A paraphrase
    would narrow the concept and interpret the judgment more specifically than the
    Greek states.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
