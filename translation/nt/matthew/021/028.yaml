theological_decisions:
- issue: Whether to render τέκνα/τέκνον as 'sons/son' in line with common translation
    tradition
  chosen_reading: children / Child
  alternative_readings:
  - sons / Son
  rationale: The Greek in this verse uses the more general τέκνα and τέκνον rather
    than υἱοί/υἱέ. In keeping with original-language primacy and gender-accurate translation,
    the broader familial term is retained here rather than narrowing it to 'sons'
    before the text itself does so.
  doctrine_reference: Translation philosophy §§1, 4
