id: MAT.21.28
reference: Matthew 21:28
source:
  edition: SBLGNT
  text: Τί δὲ ὑμῖν δοκεῖ; ἄνθρωπος εἶχεν τέκνα δύο. ⸀προσελθὼν τῷ πρώτῳ εἶπεν· Τέκνον,
    ὕπαγε σήμερον ἐργάζου ἐν τῷ ⸀ἀμπελῶνι.
translation:
  text: But what do you think? A man had two children. Going to the first, he said,
    ‘Child, go work today in the vineyard.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two sons.' Many English translations use 'sons,' but the Greek here
      says 'children' (τέκνα).
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί δὲ ὑμῖν δοκεῖ;
  chosen: But what do you think?
  alternatives:
  - What do you think?
  - But what seems right to you?
  lexicon: BDAG
  rationale: Renders the idiomatic question naturally in English while preserving
    δὲ's mild connective force with 'But.' 'Do you think' best reflects δοκεῖ here
    as an appeal for the hearers' judgment.
- source_word: ἄνθρωπος
  chosen: A man
  alternatives:
  - A person
  - A certain man
  lexicon: BDAG
  rationale: The noun is singular masculine and in this narrative setting refers to
    a male householder/father figure, so 'A man' is gender-accurate and more natural
    than 'a person.' 'Certain' is possible but not required by the Greek.
- source_word: τέκνα δύο
  chosen: two children
  alternatives:
  - two sons
  lexicon: BDAG
  rationale: τέκνα means 'children,' not specifically 'sons.' Although the following
    context may imply sons in the parable, this verse itself uses the broader term,
    so the translation preserves the source wording rather than importing a narrower
    traditional rendering.
- source_word: προσελθὼν
  chosen: Going to
  alternatives:
  - Coming to
  - Approaching
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/sequential with the main verb
    and is rendered smoothly as 'Going to' in English narrative style. 'Approaching'
    is possible but slightly stiffer.
- source_word: τῷ πρώτῳ
  chosen: the first
  alternatives:
  - the first one
  lexicon: BDAG
  rationale: A straightforward ordinal reference; 'the first' is concise and idiomatic.
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: BDAG
  rationale: The vocative τέκνον is broader than 'son.' 'Child' preserves the lexical
    value and the father's direct address without adding possessive nuance not explicit
    in the Greek.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - be off
  - go on
  lexicon: BDAG
  rationale: The imperative is a simple command to depart/go; 'go' is the clearest
    natural equivalent.
- source_word: σήμερον
  chosen: today
  lexicon: BDAG
  rationale: Direct temporal adverb with no special nuance requiring expansion.
- source_word: ἐργάζου
  chosen: work
  alternatives:
  - labor
  lexicon: BDAG
  rationale: The middle imperative here is well represented by the simple English
    imperative 'work.' 'Labor' is possible but less natural in contemporary English.
- source_word: ἐν τῷ ἀμπελῶνι
  chosen: in the vineyard
  alternatives:
  - at the vineyard
  lexicon: BDAG
  rationale: The preposition ἐν with dative is most naturally 'in' here, and ἀμπελών
    is 'vineyard.' This preserves the agricultural imagery central to the parable.
