id: MAT.21.23
reference: Matthew 21:23
source:
  edition: SBLGNT
  text: Καὶ ⸂ἐλθόντος αὐτοῦ⸃ εἰς τὸ ἱερὸν προσῆλθον αὐτῷ διδάσκοντι οἱ ἀρχιερεῖς καὶ
    οἱ πρεσβύτεροι τοῦ λαοῦ λέγοντες· Ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιεῖς; καὶ τίς σοι ἔδωκεν
    τὴν ἐξουσίαν ταύτην;
translation:
  text: And when he came into the temple, the chief priests and the elders of the
    people came up to him while he was teaching and said, “By what authority are you
    doing these things? And who gave you this authority?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθόντος αὐτοῦ
  chosen: when he came
  alternatives:
  - after he came
  - as he came
  lexicon: BDAG
  rationale: The genitive absolute marks attendant circumstance with temporal force.
    'When he came' is natural English and preserves the sequence without over-specifying
    immediacy.
- source_word: ἱερὸν
  chosen: the temple
  alternatives:
  - the temple courts
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'The temple' is the standard readable rendering; the broader precinct sense is
    contextually understood and can be noted in a footnote.
- source_word: προσῆλθον αὐτῷ
  chosen: came up to him
  alternatives:
  - approached him
  - came to him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'approach' or 'come up to.' 'Came up to him'
    is idiomatic and preserves the physical approach in narrative context.
- source_word: διδάσκοντι
  chosen: while he was teaching
  alternatives:
  - as he was teaching
  - teaching
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb. Rendering
    it with 'while he was teaching' makes the temporal overlap explicit in natural
    English.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: In Second Temple usage the plural refers to the leading priestly authorities,
    not multiple holders of the singular office of high priest. 'Chief priests' is
    the established and accurate rendering.
- source_word: οἱ πρεσβύτεροι τοῦ λαοῦ
  chosen: the elders of the people
  alternatives:
  - the people's elders
  lexicon: BDAG
  rationale: This phrase denotes recognized lay leaders among the Jewish people. 'The
    elders of the people' is both literal and clear.
- source_word: Ἐν ποίᾳ ἐξουσίᾳ
  chosen: By what authority
  alternatives:
  - In what authority
  - By what right
  lexicon: BDAG
  rationale: ἐν with ἐξουσία here expresses the basis or sphere of authorized action.
    'By what authority' is the most idiomatic English equivalent and preserves the
    challenge to Jesus' authorization.
- source_word: ταῦτα ποιεῖς
  chosen: are you doing these things
  alternatives:
  - do you do these things
  lexicon: BDAG
  rationale: The present tense is well represented by English progressive here in
    a live confrontation about Jesus' current actions in the temple context.
- source_word: τίς σοι ἔδωκεν τὴν ἐξουσίαν ταύτην
  chosen: who gave you this authority
  alternatives:
  - who has given you this authority
  lexicon: BDAG
  rationale: The aorist ἔδωκεν points to the act of granting authority. English simple
    past is the most natural rendering in direct speech.
