theological_decisions:
- issue: Meaning of ἐξουσία in the leaders' challenge
  chosen_reading: authority
  alternative_readings:
  - right
  - power
  rationale: The context concerns legitimate authorization for Jesus' actions and
    teaching in the temple, not merely raw power. 'Authority' best preserves both
    institutional and theological force without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
