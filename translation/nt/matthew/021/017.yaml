id: MAT.21.17
reference: Matthew 21:17
source:
  edition: SBLGNT
  text: καὶ καταλιπὼν αὐτοὺς ἐξῆλθεν ἔξω τῆς πόλεως εἰς Βηθανίαν, καὶ ηὐλίσθη ἐκεῖ.
translation:
  text: And leaving them, he went out of the city to Bethany and stayed there overnight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "lodged there" or "spent the night there."
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλιπὼν
  chosen: leaving
  alternatives:
  - having left
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    'Leaving' is natural English and preserves the sense without over-formal stiffness;
    'having left' is possible but less readable.
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - those people
  lexicon: BDAG
  rationale: Simple pronoun referring back to the immediate opponents/listeners in
    context. 'Them' is the most direct and least interpretively loaded rendering.
- source_word: ἐξῆλθεν ἔξω τῆς πόλεως
  chosen: went out of the city
  alternatives:
  - went outside the city
  - departed from the city
  lexicon: BDAG
  rationale: The verb ἐξῆλθεν already means 'went out'; ἔξω with the genitive reinforces
    movement outside. 'Went out of the city' captures the idiomatic force in clear
    English without awkward redundancy.
- source_word: πόλεως
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: In context this refers to Jerusalem. 'City' is the standard and most
    natural rendering for πόλις here.
- source_word: εἰς Βηθανίαν
  chosen: to Bethany
  alternatives:
  - into Bethany
  lexicon: BDAG
  rationale: Standard directional use of εἰς with a place name. 'To Bethany' is idiomatic
    English.
- source_word: ηὐλίσθη
  chosen: stayed there overnight
  alternatives:
  - lodged there
  - spent the night there
  lexicon: BDAG
  rationale: The verb αὐλίζομαι means to lodge or spend the night. 'Stayed there overnight'
    is readable modern English and communicates the temporal nuance clearly; 'lodged
    there' is more formal but slightly less natural for contemporary readers.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Locative adverb naturally rendered 'there,' referring to Bethany.
