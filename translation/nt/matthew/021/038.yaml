theological_decisions:
- issue: Parabolic reference to the son
  chosen_reading: Render υἱός simply as 'the son' without making the Christological
    identification explicit in the translation.
  alternative_readings:
  - Translate more interpretively to signal the son as representing Jesus
  rationale: Within Matthew's narrative the parable clearly points toward Jesus, but
    the verse itself speaks at the story level. To preserve theological tension and
    avoid importing interpretation into the main text, the translation keeps the parabolic
    wording plain.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
