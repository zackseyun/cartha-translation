id: MAT.21.38
reference: Matthew 21:38
source:
  edition: SBLGNT
  text: οἱ δὲ γεωργοὶ ἰδόντες τὸν υἱὸν εἶπον ἐν ἑαυτοῖς· Οὗτός ἐστιν ὁ κληρονόμος·
    δεῦτε ἀποκτείνωμεν αὐτὸν καὶ ⸀σχῶμεν τὴν κληρονομίαν αὐτοῦ·
translation:
  text: But when the tenant farmers saw the son, they said among themselves, ‘This
    is the heir. Come, let us kill him and seize his inheritance.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'have his inheritance'; the sense in context is to take
      possession of it by force.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  chosen: tenant farmers
  alternatives:
  - farmers
  - vine-growers
  - tenants
  lexicon: BDAG
  rationale: In the parable context, γεωργοί are not merely agricultural workers but
    those leasing and working the vineyard for the owner. 'Tenant farmers' makes the
    social role explicit in natural English and fits the immediate context better
    than the bare 'farmers.'
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: The aorist participle is rendered with a temporal clause in idiomatic
    English. This preserves the sequence of action without woodenly reproducing the
    participial form.
- source_word: τὸν υἱόν
  chosen: the son
  alternatives:
  - his son
  lexicon: BDAG
  rationale: The Greek has the article plus 'son' without an explicit possessive here.
    'The son' is the most direct rendering and preserves the narrative emphasis; the
    ownership relation is already clear from context.
- source_word: ἐν ἑαυτοῖς
  chosen: among themselves
  alternatives:
  - to themselves
  - within themselves
  lexicon: BDAG
  rationale: The phrase indicates speech within their own group. 'Among themselves'
    communicates collective internal discussion more clearly than 'to themselves'
    in this plural setting.
- source_word: κληρονόμος
  chosen: heir
  alternatives:
  - inheritor
  lexicon: BDAG
  rationale: '''Heir'' is the standard, natural English equivalent and preserves the
    legal/inheritance sense.'
- source_word: δεῦτε
  chosen: Come
  alternatives:
  - come now
  lexicon: BDAG
  rationale: δεῦτε functions as an exhortation introducing the proposed action. 'Come'
    is concise and idiomatic; 'come now' is possible but slightly more interpretive
    in tone.
- source_word: ἀποκτείνωμεν
  chosen: let us kill
  alternatives:
  - let us murder
  - let us put to death
  lexicon: BDAG
  rationale: The hortatory subjunctive is naturally rendered 'let us kill.' 'Murder'
    would foreground illegality and moral judgment more explicitly than the Greek
    verb itself, while 'put to death' sounds more formal and judicial than the context
    suggests.
- source_word: σχῶμεν
  chosen: seize
  alternatives:
  - have
  - take possession of
  - get
  lexicon: BDAG
  rationale: Although the verb is from ἔχω ('have'), in this context after killing
    the heir it carries the sense of taking possession for oneself. 'Seize' brings
    out the hostile, acquisitive force in idiomatic English without over-paraphrasing.
- source_word: κληρονομίαν αὐτοῦ
  chosen: his inheritance
  alternatives:
  - the inheritance
  - his estate
  lexicon: BDAG
  rationale: '''Inheritance'' is the direct lexical equivalent of κληρονομία and matches
    the preceding ''heir.'' Including ''his'' reflects αὐτοῦ explicitly and preserves
    the logic of the tenants'' scheme.'
