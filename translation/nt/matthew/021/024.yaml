id: MAT.21.24
reference: Matthew 21:24
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Ἐρωτήσω ὑμᾶς κἀγὼ λόγον ἕνα, ὃν ἐὰν εἴπητέ
    μοι κἀγὼ ὑμῖν ἐρῶ ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιῶ·
translation:
  text: But Jesus answered them, “I also will ask you one question, which if you tell
    me, I also will tell you by what authority I do these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one matter” or more literally “one word”; Greek λόγον ἕνα can denote
      a question or matter under discussion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative; 'answered' is natural English and preserves
    the responsive force without awkwardly doubling the construction.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the adversarial exchange
    in context better than a simple connective.
- source_word: εἶπεν αὐτοῖς
  chosen: Jesus answered them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς, the clause is best rendered as a single English
    expression, avoiding wooden repetition while preserving that Jesus is responding
    to their challenge.
- source_word: Ἐρωτήσω
  chosen: I ... will ask
  alternatives:
  - I will question
  - I will inquire of
  lexicon: BDAG
  rationale: Future of ἐρωτάω here introduces a counter-question. 'Ask' is the most
    natural and sufficiently precise English equivalent.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  lexicon: BDAG
  rationale: 'The crasis intensifies reciprocity: as they questioned him, he in turn
    will question them. ''I also'' preserves that reciprocal emphasis.'
- source_word: λόγον ἕνα
  chosen: one question
  alternatives:
  - one word
  - one matter
  - one thing
  lexicon: BDAG
  rationale: Although λόγος literally means 'word' or 'matter,' in this interrogative
    context it idiomatically refers to a question or point under discussion. 'One
    question' best communicates the sense in clear English.
- source_word: ὃν ἐὰν εἴπητέ μοι
  chosen: which if you tell me
  alternatives:
  - which if you answer me
  - which if you say to me
  lexicon: BDAG
  rationale: λέγω can mean 'say' or 'tell'; here the sense is to provide the requested
    response. 'Tell me' is idiomatic and keeps the conditional structure.
- source_word: κἀγὼ ὑμῖν ἐρῶ
  chosen: I also will tell you
  alternatives:
  - I too will say to you
  lexicon: BDAG
  rationale: Mirrors the earlier κἀγώ and maintains the reciprocal arrangement of
    the sentence in natural English.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - on what authority
  lexicon: BDAG
  rationale: ἐν with ἐξουσία here expresses the basis or sphere of authorized action.
    English idiom prefers 'by what authority' in this context.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative refers back to Jesus' actions under dispute; 'these
    things' preserves the plural and the broader reference.
- source_word: ποιῶ
  chosen: I do
  alternatives:
  - I am doing
  lexicon: BDAG
  rationale: Present tense here is well represented by the simple present in English,
    referring generally to the actions in question rather than emphasizing progressive
    aspect.
