id: MAT.21.11
reference: Matthew 21:11
source:
  edition: SBLGNT
  text: οἱ δὲ ὄχλοι ἔλεγον· Οὗτός ἐστιν ⸂ὁ προφήτης Ἰησοῦς⸃ ὁ ἀπὸ Ναζαρὲθ τῆς Γαλιλαίας.
translation:
  text: And the crowds were saying, “This is the prophet Jesus, from Nazareth of Galilee.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a prophet.” The Greek has “the prophet,” which may reflect the crowd’s
      identification of Jesus as a recognized prophetic figure.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ὄχλοι
  chosen: And the crowds
  alternatives:
  - Now the crowds
  - And the multitudes
  lexicon: BDAG
  rationale: ὄχλοι is plural and refers to gathered groups of people; 'crowds' is
    natural modern English. δέ is lightly connective here, best represented by 'And'
    rather than omitted, to preserve narrative flow without overtranslating.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'Were saying' preserves
    the imperfect aspect in readable English better than the simple past 'said'; 'kept
    saying' is possible but slightly more interpretive.
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This is he
  - This one is
  lexicon: BDAG
  rationale: Straightforward identificational clause. 'This is' is idiomatic contemporary
    English and adequately reflects the Greek demonstrative plus copula.
- source_word: ὁ προφήτης
  chosen: the prophet
  alternatives:
  - a prophet
  lexicon: BDAG
  rationale: The article is present in Greek, and the phrase likely identifies Jesus
    as the recognized prophet figure in the crowd's acclamation, not merely one prophet
    among others. Therefore 'the prophet' should be retained.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: 'Personal name is transliterated according to the project''s principle:
    translate titles, transliterate names.'
- source_word: ὁ ἀπὸ Ναζαρὲθ τῆς Γαλιλαίας
  chosen: from Nazareth of Galilee
  alternatives:
  - who is from Nazareth in Galilee
  - the one from Nazareth of Galilee
  lexicon: BDAG
  rationale: The articular phrase further identifies Jesus by origin. 'From Nazareth
    of Galilee' is concise and close to the Greek. 'Of Galilee' preserves the genitive
    relation and traditional geographic identification without unnecessary expansion.
