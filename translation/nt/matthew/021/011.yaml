theological_decisions:
- issue: Whether ὁ προφήτης should be rendered definitely or indefinitely
  chosen_reading: the prophet
  alternative_readings:
  - a prophet
  rationale: The Greek includes the article, and in Matthew's Jewish context this
    can evoke the expected prophetic figure rather than a generic description. The
    translation preserves that possible messianic-prophetic resonance without making
    it more explicit than the text itself does.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
