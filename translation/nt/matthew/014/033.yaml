id: MAT.14.33
reference: Matthew 14:33
source:
  edition: SBLGNT
  text: οἱ δὲ ἐν τῷ ⸀πλοίῳ προσεκύνησαν αὐτῷ λέγοντες· Ἀληθῶς θεοῦ υἱὸς εἶ.
translation:
  text: Then those in the boat worshiped him, saying, “Truly you are the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bowed down to him” / “paid homage to him.” The Greek verb can denote
      reverence expressed by kneeling or prostration; here the context supports “worshiped.”
    reason: lexical_alternative
  - marker: b
    text: Or “God’s Son.” The Greek phrase lacks the article before “God,” but in
      context it functions as a title rather than meaning merely “a son of God.”
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  chosen: Then those
  alternatives:
  - And those
  - But those
  lexicon: BDAG
  rationale: δέ is a mild connective; in context after the preceding narrative climax,
    'Then' gives natural English progression without overstating contrast. οἱ functions
    substantivally, referring to the people previously identified as being in the
    boat.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - on the boat
  - aboard the boat
  lexicon: BDAG
  rationale: πλοῖον is the ordinary term for 'boat' here. 'In the boat' is the idiomatic
    English rendering of ἐν with this noun in narrative context.
- source_word: προσεκύνησαν αὐτῷ
  chosen: worshiped him
  alternatives:
  - bowed down to him
  - paid homage to him
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration, homage, or worship depending on context.
    In Matthew, especially following Jesus' display of divine authority over the sea
    and the confession that follows, 'worshiped him' best reflects the likely force
    without reducing it to mere gesture.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered with an English participial or attendant
    expression. 'Saying' preserves the Greek structure smoothly.
- source_word: Ἀληθῶς
  chosen: Truly
  alternatives:
  - Really
  - Indeed
  lexicon: BDAG
  rationale: Ἀληθῶς marks a solemn affirmation. 'Truly' preserves the weight and fits
    the confessional tone better than more colloquial alternatives.
- source_word: θεοῦ υἱὸς
  chosen: the Son of God
  alternatives:
  - God's Son
  - a son of God
  lexicon: BDAG
  rationale: Although θεοῦ lacks the article, the predicate nominative construction
    in context is qualitative/definite rather than indefinite. 'The Son of God' matches
    Matthew's christological usage and standard English expression for this title.
- source_word: εἶ
  chosen: you are
  alternatives:
  - you truly are
  lexicon: BDAG
  rationale: Explicitly rendering the copula is required in English. Word order is
    adjusted idiomatically for direct address.
