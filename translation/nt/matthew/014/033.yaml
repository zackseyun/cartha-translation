theological_decisions:
- issue: Force of προσκυνέω toward Jesus
  chosen_reading: Rendered as 'worshiped him'
  alternative_readings:
  - bowed down to him
  - paid homage to him
  rationale: Given Matthew's narrative context and the accompanying confession 'Truly
    you are the Son of God,' the action is best understood as worship rather than
    merely respectful obeisance. This aligns with historic orthodox Christology while
    remaining grounded in the immediate context rather than importing doctrine beyond
    the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Definiteness of θεοῦ υἱὸς
  chosen_reading: Rendered as 'the Son of God'
  alternative_readings:
  - God's Son
  - a son of God
  rationale: The anarthrous construction does not require an indefinite sense in Greek.
    In this Matthean confessional setting, the phrase functions as a recognized christological
    title. Rendering it indefinitely would undertranslate the force of the confession.
  doctrine_reference: Affirmations; Translation philosophy §1
