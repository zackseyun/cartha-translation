id: MAT.14.19
reference: Matthew 14:19
source:
  edition: SBLGNT
  text: καὶ κελεύσας τοὺς ὄχλους ἀνακλιθῆναι ἐπὶ ⸂τοῦ χόρτου⸃, λαβὼν τοὺς πέντε ἄρτους
    καὶ τοὺς δύο ἰχθύας, ἀναβλέψας εἰς τὸν οὐρανὸν εὐλόγησεν καὶ κλάσας ἔδωκεν τοῖς
    μαθηταῖς τοὺς ἄρτους οἱ δὲ μαθηταὶ τοῖς ὄχλοις.
translation:
  text: And after ordering the crowds to recline on the grass, he took the five loaves
    and the two fish, looked up to heaven, blessed them, and after breaking the loaves
    he gave them to the disciples, and the disciples to the crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he blessed God' / 'he said a blessing.' The Greek simply says 'he blessed,'
      without stating the object explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: κελεύσας
  chosen: after ordering
  alternatives:
  - having commanded
  - directing
  lexicon: BDAG
  rationale: Aorist participle preceding the main action; 'after ordering' gives natural
    English sequence while preserving the force of a directive.
- source_word: ὄχλους
  chosen: crowds
  alternatives:
  - multitudes
  - people
  lexicon: BDAG
  rationale: '''Crowds'' is natural modern English and accurately reflects plural
    groups gathered there.'
- source_word: ἀνακλιθῆναι
  chosen: to recline
  alternatives:
  - to sit down
  - to lie down
  lexicon: BDAG
  rationale: The verb commonly refers to reclining for a meal. 'Recline' preserves
    the meal-setting nuance better than the more generic 'sit down'.
- source_word: ἐπὶ τοῦ χόρτου
  chosen: on the grass
  alternatives:
  - on the green grass
  - on the grassy place
  lexicon: BDAG
  rationale: The phrase straightforwardly indicates location. Matthew has 'grass,'
    not Mark's more explicit 'green grass,' so the translation should not import extra
    detail.
- source_word: λαβὼν
  chosen: he took
  alternatives:
  - taking
  lexicon: BDAG
  rationale: Rendered as a finite verb in English for smooth narrative flow while
    preserving the participial action prior to the blessing.
- source_word: ἄρτους
  chosen: loaves
  alternatives:
  - bread loaves
  - breads
  lexicon: BDAG
  rationale: In feeding narratives ἄρτοι refers to loaves of bread; 'loaves' is idiomatic
    and specific.
- source_word: ἰχθύας
  chosen: fish
  alternatives:
  - fishes
  lexicon: BDAG
  rationale: Standard English collective plural in this context is 'fish.'
- source_word: ἀναβλέψας εἰς τὸν οὐρανόν
  chosen: looked up to heaven
  alternatives:
  - looking up to heaven
  - looked up toward heaven
  lexicon: BDAG
  rationale: Natural English rendering of the participial phrase; 'heaven' is the
    standard translation of οὐρανός here in a reverential context.
- source_word: εὐλόγησεν
  chosen: blessed them
  alternatives:
  - gave thanks
  - said a blessing
  lexicon: BDAG
  rationale: The direct object is implicit from context. 'Blessed' is the most direct
    rendering of εὐλογέω. 'Gave thanks' reflects a related but distinct expression
    found elsewhere; here 'blessed them' best matches the Greek.
- source_word: κλάσας
  chosen: after breaking the loaves
  alternatives:
  - and broke
  - having broken
  lexicon: BDAG
  rationale: The participle indicates action prior to giving. Supplying 'the loaves'
    clarifies the implied object from context.
- source_word: ἔδωκεν τοῖς μαθηταῖς τοὺς ἄρτους
  chosen: he gave them to the disciples
  alternatives:
  - he gave the loaves to the disciples
  lexicon: BDAG
  rationale: English pronoun 'them' naturally refers back to the loaves just broken;
    this avoids awkward repetition while preserving meaning.
- source_word: οἱ δὲ μαθηταὶ τοῖς ὄχλοις
  chosen: and the disciples to the crowds
  alternatives:
  - and the disciples gave them to the crowds
  lexicon: BDAG
  rationale: The verb is omitted in Greek and understood from the previous clause.
    The concise English mirrors the ellipsis while remaining intelligible.
