theological_decisions:
- issue: Object of 'blessed' in εὐλόγησεν
  chosen_reading: Jesus blessed the loaves/fish (rendered 'blessed them')
  alternative_readings:
  - Jesus blessed God / said a blessing
  rationale: The Greek uses εὐλόγησεν without an explicit object. In this narrative
    context, English commonly requires an object, and the nearest contextual referents
    are the loaves and fish. However, the idiom may also imply blessing God before
    the meal. The main text keeps the direct lexical sense with a footnote preserving
    the alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
