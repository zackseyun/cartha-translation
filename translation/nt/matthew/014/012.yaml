theological_decisions:
- issue: Identity of 'his disciples'
  chosen_reading: John the Baptist's disciples are intended.
  alternative_readings:
  - Jesus' disciples
  rationale: The immediate context concerns the death of John the Baptist, so αὐτοῦ
    naturally refers to John. Rendering simply 'his disciples' preserves the Greek
    wording while the contextual referent is clear.
