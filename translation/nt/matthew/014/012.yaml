id: MAT.14.12
reference: Matthew 14:12
source:
  edition: SBLGNT
  text: καὶ προσελθόντες οἱ μαθηταὶ αὐτοῦ ἦραν τὸ ⸀πτῶμα καὶ ἔθαψαν ⸀αὐτόν, καὶ ἐλθόντες
    ἀπήγγειλαν τῷ Ἰησοῦ.
translation:
  text: And his disciples came, took the body, and buried him; then they went and
    reported it to Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corpse.' The Greek word denotes a dead body.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: came
  alternatives:
  - came near
  - approached
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, here introducing the disciples' action
    after John's death. 'Came' is natural English and sufficient in context; 'approached'
    is possible but can sound overly formal without adding meaning.
- source_word: μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - his followers
  lexicon: BDAG
  rationale: Refers to John's disciples in context. 'Disciples' preserves the established
    term μαθηταί and its relational/learning nuance better than the broader 'followers'.
- source_word: ἦραν
  chosen: took
  alternatives:
  - carried away
  - picked up
  lexicon: BDAG
  rationale: From αἴρω, literally 'lift/take up.' In this burial context, 'took' is
    idiomatic and concise; 'carried away' is more interpretive than the Greek requires.
- source_word: πτῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: πτῶμα denotes a dead body/corpse. 'Body' is the more readable modern
    English choice in narrative prose, while still accurately conveying the referent.
    'Corpse' is more explicit but harsher in tone than necessary.
- source_word: ἔθαψαν αὐτόν
  chosen: buried him
  alternatives:
  - laid him in a tomb
  lexicon: BDAG
  rationale: θάπτω means 'bury.' 'Buried him' is the direct and accurate rendering.
    'Laid him in a tomb' imports detail not stated in this verse.
- source_word: ἐλθόντες
  chosen: then they went
  alternatives:
  - and coming
  - after going
  lexicon: BDAG
  rationale: The participle marks the next action in sequence. English usually requires
    a finite verb for smooth narrative flow; 'then they went' captures the movement
    and sequence without woodenly reproducing the participle.
- source_word: ἀπήγγειλαν
  chosen: reported it
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce. Since the object of the report
    is implicit from context (John's death and burial), 'reported it' makes the English
    complete while remaining faithful to the sense.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - to Yeshua
  lexicon: BDAG
  rationale: Standard English transliteration of Ἰησοῦς is 'Jesus.' This follows the
    project's policy to transliterate personal names by standard conventions.
