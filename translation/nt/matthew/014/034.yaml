id: MAT.14.34
reference: Matthew 14:34
source:
  edition: SBLGNT
  text: Καὶ διαπεράσαντες ἦλθον ⸂ἐπὶ τὴν γῆν εἰς⸃ Γεννησαρέτ.
translation:
  text: And after crossing over, they came to land at Gennesaret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they came onto the land in Gennesaret.' The Greek combines 'upon the
      land' with 'into Gennesaret,' expressing arrival at the land/shore in the region
      of Gennesaret.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπεράσαντες
  chosen: after crossing over
  alternatives:
  - having crossed over
  - after they had crossed over
  lexicon: BDAG
  rationale: Aorist active participle preceding the main verb, naturally rendered
    as antecedent action in English. 'Crossing over' preserves the maritime movement
    without over-specifying the means.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they arrived
  - they went
  lexicon: BDAG
  rationale: Standard aorist of ἔρχομαι. 'They came' is the most direct rendering
    and works idiomatically with the destination phrase that follows.
- source_word: ἐπὶ τὴν γῆν
  chosen: to land
  alternatives:
  - onto the land
  - to the shore
  lexicon: BDAG
  rationale: Literally 'upon the land.' In this boating context, 'to land' is idiomatic
    English that conveys arrival from the water onto shore/land without awkwardness.
    'To the shore' is possible but slightly more interpretive than the Greek γῆ.
- source_word: εἰς Γεννησαρέτ
  chosen: at Gennesaret
  alternatives:
  - in Gennesaret
  - to Gennesaret
  lexicon: BDAG
  rationale: Γεννησαρέτ is transliterated as a place name per translation philosophy.
    Given the sequence ἐπὶ τὴν γῆν εἰς Γεννησαρέτ, the sense is arrival/landing in
    the region of Gennesaret; 'at Gennesaret' is natural English for a landing location
    while preserving the destination sense.
- source_word: Γεννησαρέτ
  chosen: Gennesaret
  lexicon: BDAG
  rationale: Proper place name, so transliteration rather than translation follows
    the stated philosophy.
