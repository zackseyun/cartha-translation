id: MAT.14.11
reference: Matthew 14:11
source:
  edition: SBLGNT
  text: καὶ ἠνέχθη ἡ κεφαλὴ αὐτοῦ ἐπὶ πίνακι καὶ ἐδόθη τῷ κορασίῳ, καὶ ἤνεγκεν τῇ
    μητρὶ αὐτῆς.
translation:
  text: And his head was brought on a platter and given to the girl, and she brought
    it to her mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a tray' or 'on a dish.' The Greek πίναξ refers to a serving platter
      or tray.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνέχθη
  chosen: was brought
  alternatives:
  - was carried
  lexicon: BDAG
  rationale: Aorist passive of φέρω. 'Was brought' is natural modern English and fits
    the narrative sequence better than the more mechanical 'was carried,' while preserving
    the passive sense.
- source_word: κεφαλὴ αὐτοῦ
  chosen: his head
  lexicon: BDAG
  rationale: A direct, literal rendering of the noun phrase; no euphemism is warranted
    by the Greek.
- source_word: ἐπὶ πίνακι
  chosen: on a platter
  alternatives:
  - on a tray
  - on a dish
  lexicon: BDAG
  rationale: πίναξ refers to a platter/tray used for serving food. 'Platter' is idiomatic
    in English for this grim presentation and matches the likely sense in context.
- source_word: ἐδόθη
  chosen: given
  lexicon: BDAG
  rationale: Aorist passive of δίδωμι, straightforwardly rendered 'was given.' In
    English narrative style, 'given' after 'was brought' preserves the passive sequence
    cleanly.
- source_word: τῷ κορασίῳ
  chosen: to the girl
  alternatives:
  - to the young girl
  - to the maiden
  lexicon: BDAG
  rationale: κοράσιον denotes a girl/young girl. 'Girl' is the clearest and most natural
    rendering here; 'maiden' is archaic, and 'young girl' is possible but unnecessary
    in this context.
- source_word: ἤνεγκεν
  chosen: she brought it
  alternatives:
  - she carried it
  lexicon: BDAG
  rationale: Aorist active of φέρω. English normally supplies the object pronoun 'it'
    for clarity, since the referent is explicit from the prior clause. 'Brought' maintains
    lexical consistency with ἠνέχθη while fitting the context.
- source_word: τῇ μητρὶ αὐτῆς
  chosen: to her mother
  lexicon: BDAG
  rationale: A straightforward dative phrase. 'Her mother' clearly refers to the girl's
    mother, matching the Greek pronoun.
