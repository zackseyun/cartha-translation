id: MAT.14.22
reference: Matthew 14:22
source:
  edition: SBLGNT
  text: Καὶ εὐθέως ⸀ἠνάγκασεν τοὺς μαθητὰς ἐμβῆναι ⸀εἰς πλοῖον καὶ προάγειν αὐτὸν
    εἰς τὸ πέραν, ἕως οὗ ἀπολύσῃ τοὺς ὄχλους.
translation:
  text: And immediately he compelled the disciples to get into the boat and go on
    ahead of him to the other side, until he should dismiss the crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send the crowds away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Conveys the adverb's sense of promptness and sudden transition. 'Immediately'
    is standard, clear English and fits Matthew's narrative pace.
- source_word: ἠνάγκασεν
  chosen: compelled
  alternatives:
  - made
  - forced
  - urged strongly
  lexicon: BDAG
  rationale: ἀναγκάζω denotes causing someone to do something by strong insistence
    or constraint. 'Compelled' preserves the force better than the weaker 'made' or
    'urged,' without implying physical violence beyond the text.
- source_word: μαθητάς
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article identifies the known group of disciples. 'His' is implicit
    from context but not explicit here, so 'the disciples' is closer to the Greek
    while remaining natural English.
- source_word: ἐμβῆναι εἰς πλοῖον
  chosen: to get into the boat
  alternatives:
  - to embark in the boat
  - to enter the boat
  lexicon: BDAG
  rationale: The infinitive with εἰς + accusative means to board or get into a boat.
    'Get into the boat' is idiomatic modern English and accurately reflects the action.
- source_word: πλοῖον
  chosen: the boat
  alternatives:
  - a boat
  lexicon: BDAG
  rationale: Although the Greek lacks the article, the narrative context points to
    a specific boat already in view. English idiom naturally uses the definite article
    here.
- source_word: προάγειν αὐτόν
  chosen: go on ahead of him
  alternatives:
  - precede him
  - go before him
  lexicon: BDAG
  rationale: προάγω here means to go ahead or precede. With αὐτόν as object, the sense
    is that the disciples are to depart before Jesus. 'Go on ahead of him' is natural
    and precise.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: This idiom refers to the opposite side of the body of water. 'To the
    other side' is the clearest established English equivalent.
- source_word: ἕως οὗ ἀπολύσῃ
  chosen: until he should dismiss
  alternatives:
  - until he dismissed
  - until he might dismiss
  - until he had sent away
  lexicon: BDAG
  rationale: ἕως οὗ with the aorist subjunctive marks a future point relative to the
    main verb. 'Should dismiss' preserves that prospective nuance in smooth English
    better than a simple past.
- source_word: ἀπολύσῃ τοὺς ὄχλους
  chosen: dismiss the crowds
  alternatives:
  - send the crowds away
  - release the crowds
  lexicon: BDAG
  rationale: ἀπολύω in this context means to send away or dismiss. 'Dismiss the crowds'
    is concise and natural, while preserving the formal act of sending them away.
- source_word: ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: The plural is explicit in Greek. 'Crowds' is readable modern English
    and avoids the archaic 'multitudes.'
