id: MAT.14.26
reference: Matthew 14:26
source:
  edition: SBLGNT
  text: ⸂οἱ δὲ μαθηταὶ ἰδόντες αὐτὸν⸃ ἐπὶ ⸂τῆς θαλάσσης⸃ περιπατοῦντα ἐταράχθησαν
    λέγοντες ὅτι Φάντασμά ἐστιν, καὶ ἀπὸ τοῦ φόβου ἔκραξαν.
translation:
  text: But when the disciples saw him walking on the sea, they were terrified, saying,
    “It is a ghost!” And they cried out from fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an apparition” or “a phantom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild narrative contrast or development from the previous verse;
    'But' fits the sudden fearful reaction better than a simple continuative 'And.'
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article makes the group definite; in context these are Jesus' disciples.
    'The disciples' is natural and sufficiently clear.
- source_word: ἰδόντες αὐτὸν
  chosen: when the disciples saw him
  alternatives:
  - seeing him
  - after they saw him
  lexicon: BDAG
  rationale: The aorist participle is best rendered with a temporal clause in natural
    English. 'When ... saw' preserves the sequence without awkwardness.
- source_word: ἐπὶ τῆς θαλάσσης περιπατοῦντα
  chosen: walking on the sea
  alternatives:
  - walking on the water
  - walking upon the sea
  lexicon: BDAG
  rationale: ἐπί with the genitive here indicates movement on the surface/domain of
    the sea. 'On the sea' is closer to the Greek wording than the traditional 'on
    the water,' while remaining clear in English.
- source_word: ἐταράχθησαν
  chosen: they were terrified
  alternatives:
  - they were troubled
  - they were shaken
  - they were frightened
  lexicon: BDAG
  rationale: The passive of ταράσσω can mean to be disturbed or agitated; in this
    context of a supernatural fright followed by crying out, 'were terrified' best
    conveys the intensity.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: A contemporaneous participle introducing their exclamation; 'saying'
    is the most straightforward English rendering.
- source_word: Φάντασμά ἐστιν
  chosen: It is a ghost!
  alternatives:
  - It is an apparition!
  - It is a phantom!
  lexicon: BDAG
  rationale: φάντασμα denotes an apparition/ghostly appearance. 'Ghost' is the clearest
    modern English equivalent and best matches the disciples' fearful interpretation.
- source_word: ἀπὸ τοῦ φόβου
  chosen: from fear
  alternatives:
  - because of fear
  - out of fear
  lexicon: BDAG
  rationale: ἀπό here expresses cause/source. 'From fear' is concise and natural,
    preserving the causal sense.
- source_word: ἔκραξαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they screamed
  lexicon: BDAG
  rationale: κράζω often denotes a loud cry or shout. 'Cried out' is idiomatic, strong,
    and does not over-specify the tone beyond the Greek.
