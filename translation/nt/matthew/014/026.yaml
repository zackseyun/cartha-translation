theological_decisions:
- issue: Nature of φάντασμα in the disciples' exclamation
  chosen_reading: Rendered as 'ghost' in the main text
  alternative_readings:
  - apparition
  - phantom
  rationale: The verse reports the disciples' frightened perception, not an ontological
    claim about spirits. 'Ghost' communicates their mistaken conclusion in accessible
    modern English without importing doctrinal assertions beyond the narrative.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve the
    text''s claim without importing doctrinal conclusions.'
