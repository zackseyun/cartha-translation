id: MAT.14.4
reference: Matthew 14:4
source:
  edition: SBLGNT
  text: ἔλεγεν γὰρ ⸂αὐτῷ ὁ Ἰωάννης⸃· Οὐκ ἔξεστίν σοι ἔχειν αὐτήν·
translation:
  text: For John had been saying to him, “It is not lawful for you to have her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is not permitted for you to have her.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: had been saying
  alternatives:
  - was saying
  - kept saying
  - said
  lexicon: BDAG
  rationale: Imperfect tense indicates repeated or ongoing past action, not merely
    a simple punctiliar 'said.' 'Had been saying' captures the durative force in natural
    English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  - now
  lexicon: BDAG
  rationale: γάρ gives explanatory background for the preceding context. 'For' preserves
    the connective force succinctly.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: Dative pronoun with λέγω is naturally rendered 'to him,' making explicit
    the indirect object in English.
- source_word: ὁ Ἰωάννης
  chosen: John
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The Greek names the speaker simply as 'John.' Since the immediate context
    identifies him, 'John' is sufficient and closest to the source.
- source_word: Οὐκ ἔξεστίν
  chosen: It is not lawful
  alternatives:
  - It is not permitted
  - It is not right
  - It is not allowed
  lexicon: BDAG
  rationale: ἔξεστιν commonly denotes what is permitted or lawful. 'It is not lawful'
    best fits the moral-legal force of John's rebuke regarding Herod's marriage.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: With impersonal ἔξεστιν, the dative is idiomatically rendered 'for you'
    in English.
- source_word: ἔχειν
  chosen: to have
  alternatives:
  - to possess
  - to take
  lexicon: BDAG
  rationale: In this context ἔχειν refers idiomatically to having a woman as one's
    wife/consort. 'To have her' preserves the Greek wording while allowing the context
    to supply the marital sense.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - this woman
  - her as wife
  lexicon: BDAG
  rationale: The pronoun directly refers to Herodias. 'Her' is the most direct rendering;
    expanding to 'her as wife' would interpret beyond the explicit wording, though
    that sense is contextually implied.
