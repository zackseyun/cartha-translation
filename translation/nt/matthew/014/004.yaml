theological_decisions:
- issue: Nature of John's rebuke
  chosen_reading: 'Rendered as a legal-moral prohibition: ''It is not lawful for you
    to have her.'''
  alternative_readings:
  - Rendered more generally as 'It is not right for you to have her'
  rationale: The Greek ἔξεστιν concerns permissibility/lawfulness. In context, John
    is invoking the unlawfulness of Herod's relationship under Jewish moral law, so
    'lawful' preserves the sharper force without adding extra explanation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source''s plain sense.'
