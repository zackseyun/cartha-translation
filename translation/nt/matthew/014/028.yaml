id: MAT.14.28
reference: Matthew 14:28
source:
  edition: SBLGNT
  text: Ἀποκριθεὶς δὲ ⸂αὐτῷ ὁ Πέτρος εἶπεν⸃· Κύριε, εἰ σὺ εἶ, κέλευσόν με ⸂ἐλθεῖν
    πρὸς σὲ⸃ ἐπὶ τὰ ὕδατα·
translation:
  text: And Peter answered him, “Lord, if it is you, command me to come to you on
    the waters.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the water.' The Greek reads 'on the waters' (plural).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  chosen: And ... answered
  alternatives:
  - But ... answered
  - Then ... answered
  lexicon: BDAG
  rationale: ἀποκριθεὶς with δέ is a common narrative formula. 'And ... answered'
    is natural modern English and preserves the discourse connection without overtranslating
    δέ.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative object of ἀποκρίνομαι is naturally rendered in English as
    the direct object 'answered him,' though 'answered to him' would be overly literal.
- source_word: ὁ Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the philosophy
    to transliterate names.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; default rendering
    is 'Lord.' In this direct address to Jesus, 'Lord' preserves both respect and
    possible christological weight better than 'Master'.
- source_word: εἰ σὺ εἶ
  chosen: if it is you
  alternatives:
  - if you are he
  - if you are the one
  lexicon: BDAG
  rationale: The idiom is most naturally expressed in English as 'if it is you.' This
    preserves the sense of personal identification in context, where Peter is testing
    whether the figure is truly Jesus.
- source_word: κέλευσόν
  chosen: command
  alternatives:
  - order
  - bid
  lexicon: BDAG
  rationale: The aorist imperative of κελεύω denotes authoritative direction. 'Command'
    is clear, contemporary, and preserves the force better than archaic 'bid'.
- source_word: με ἐλθεῖν
  chosen: me to come
  alternatives:
  - me to go
  lexicon: BDAG
  rationale: Although ἔρχομαι can be glossed 'come/go' depending on perspective, with
    πρὸς σέ ('to you') English idiom strongly favors 'come to you' from the speaker's
    perspective toward Jesus.
- source_word: πρὸς σὲ
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward a person. 'To
    you' is the most natural English rendering in this request context.
- source_word: ἐπὶ τὰ ὕδατα
  chosen: on the waters
  alternatives:
  - on the water
  - upon the waters
  lexicon: BDAG
  rationale: The Greek has the plural τὰ ὕδατα. 'On the waters' preserves the plural
    form and the vividness of the scene better than the more idiomatic but less formally
    precise 'on the water.'
