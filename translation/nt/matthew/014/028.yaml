theological_decisions:
- issue: Force of Peter's address to Jesus with κύριε
  chosen_reading: Render as 'Lord' without reducing it to merely polite 'sir' or 'master.'
  alternative_readings:
  - Master
  - Sir
  rationale: In Matthew, κύριος addressed to Jesus often carries more than bare politeness.
    The project's default for κύριος is 'Lord,' and this preserves possible theological
    weight without overstating the verse.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Preserve
    theological tension rather than resolve it'
