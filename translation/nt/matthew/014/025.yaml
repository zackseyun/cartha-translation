id: MAT.14.25
reference: Matthew 14:25
source:
  edition: SBLGNT
  text: τετάρτῃ δὲ φυλακῇ τῆς νυκτὸς ⸀ἦλθεν πρὸς ⸀αὐτοὺς περιπατῶν ἐπὶ ⸂τὴν θάλασσαν⸃.
translation:
  text: And in the fourth watch of the night he came to them, walking on the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walking upon the sea.' Some have taken the phrase as 'walking by the
      sea,' but the context strongly favors movement on the water itself.
    reason: alternative_reading
  - marker: b
    text: The 'fourth watch of the night' refers to the final night watch, roughly
      between 3:00 and 6:00 a.m. in the Roman system.
    reason: cultural_note
lexical_decisions:
- source_word: τετάρτῃ ... φυλακῇ τῆς νυκτός
  chosen: in the fourth watch of the night
  alternatives:
  - during the fourth watch of the night
  - in the fourth watch of the night-time
  lexicon: BDAG
  rationale: The dative phrase is temporal, indicating the time when the action occurred.
    'Watch' preserves the historical Roman/Jewish night-watch framework better than
    a flattened modern time expression.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural and sufficiently light in English narrative style.
- source_word: ἦλθεν
  chosen: he came
  alternatives:
  - he went
  - he arrived
  lexicon: BDAG
  rationale: ἔρχομαι with πρὸς αὐτούς is naturally rendered 'came to them.' 'Arrived'
    is possible but less direct; 'went' would obscure the deictic orientation toward
    the disciples.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: πρός with the accusative here marks movement toward persons; idiomatic
    English with ἦλθεν is 'came to them.'
- source_word: περιπατῶν
  chosen: walking
  alternatives:
  - while walking
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is well
    represented by the English participle 'walking.'
- source_word: ἐπὶ τὴν θάλασσαν
  chosen: on the sea
  alternatives:
  - upon the sea
  - on the lake
  - over the sea
  lexicon: BDAG
  rationale: ἐπί with the accusative can denote movement onto/over a surface, but
    in this context with περιπατῶν it describes Jesus' locomotion on the water's surface.
    'On the sea' is the most natural and direct rendering. 'Lake' reflects geographical
    identification of the Sea of Galilee but is not the lexical form of θάλασσα, so
    it is not preferred in the main text.
