theological_decisions:
- issue: Miraculous description of Jesus' movement on the water
  chosen_reading: walking on the sea
  alternative_readings:
  - walking by the sea
  rationale: The syntax of περιπατῶν ἐπὶ τὴν θάλασσαν in context strongly indicates
    movement on the water, not merely along the shore. The translation preserves the
    text's plain sense without reduction of its miraculous force or embellishment
    beyond the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
