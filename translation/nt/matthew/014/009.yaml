id: MAT.14.9
reference: Matthew 14:9
source:
  edition: SBLGNT
  text: καὶ ⸂λυπηθεὶς ὁ βασιλεὺς διὰ⸃ τοὺς ὅρκους καὶ τοὺς συνανακειμένους ἐκέλευσεν
    δοθῆναι,
translation:
  text: And the king, though grieved, because of his oaths and those dining with him,
    commanded it to be given.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those reclining at table with him.' The Greek reflects the customary
      dining posture of the period.
    reason: cultural_note
  - marker: b
    text: The Greek leaves the object of 'to be given' implicit; the referent is the
      request mentioned in the preceding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπηθεὶς
  chosen: though grieved
  alternatives:
  - being grieved
  - although he was distressed
  - though sorrowful
  lexicon: BDAG
  rationale: Aorist passive participle from λυπέω conveys that the king became sorrowful/distressed.
    'Though grieved' captures the concessive force natural in English in this context,
    since his grief stands in tension with the action he nevertheless orders.
- source_word: βασιλεὺς
  chosen: the king
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly means 'king.' This is the most direct and
    contextually appropriate rendering.
- source_word: διὰ τοὺς ὅρκους
  chosen: because of his oaths
  alternatives:
  - on account of the oaths
  - because of the vows
  lexicon: BDAG
  rationale: διά with the accusative indicates reason or cause. ὅρκους refers to sworn
    oaths; 'his' is supplied naturally in English from the context, since these are
    the king's own oaths.
- source_word: τοὺς συνανακειμένους
  chosen: those dining with him
  alternatives:
  - his dinner guests
  - those reclining at table with him
  - those at the table with him
  lexicon: BDAG
  rationale: The participle refers to those reclining at table together, a standard
    meal posture in the ancient setting. 'Those dining with him' is readable modern
    English that preserves the social setting without over-literal awkwardness.
- source_word: ἐκέλευσεν
  chosen: commanded
  alternatives:
  - ordered
  - gave orders
  lexicon: BDAG
  rationale: κελεύω means to command or order. 'Commanded' is concise and fits the
    formal tone of the narrative.
- source_word: δοθῆναι
  chosen: it to be given
  alternatives:
  - her request to be granted
  - it be given
  lexicon: BDAG
  rationale: The infinitive is passive, 'to be given.' The object is implicit from
    the previous verse (what was requested). 'It to be given' preserves the Greek's
    ellipsis without importing too much explanatory material into the main text.
