id: MAT.14.10
reference: Matthew 14:10
source:
  edition: SBLGNT
  text: καὶ πέμψας ἀπεκεφάλισεν ⸀τὸν Ἰωάννην ἐν τῇ φυλακῇ·
translation:
  text: And he sent and beheaded John in the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'having sent, he beheaded John in the prison.' The Greek
      uses an aorist participle followed by the main verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψας
  chosen: he sent
  alternatives:
  - having sent
  - sending
  lexicon: BDAG
  rationale: Aorist participle of πέμπω, functioning adverbially before the main verb.
    In idiomatic English narrative, 'he sent and...' best captures the sequence without
    awkwardness, while preserving that an order or agent was dispatched rather than
    Herod personally performing the act.
- source_word: ἀπεκεφάλισεν
  chosen: beheaded
  alternatives:
  - had beheaded
  - ordered John to be beheaded
  lexicon: BDAG
  rationale: The verb ἀποκεφαλίζω specifically means 'to behead.' The simple past
    fits the narrative sequence. Although the participle plus finite verb implies
    mediation through those sent, the Greek main verb still attributes the act to
    the subject, so 'beheaded' is preferred over the more interpretive 'ordered ...
    to be beheaded.'
- source_word: τὸν Ἰωάννην
  chosen: John
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The proper name is explicit; 'John' is sufficient because the immediate
    context identifies which John is meant. Expanding to 'John the Baptist' would
    add information not present in this verse.
- source_word: ἐν τῇ φυλακῇ
  chosen: in the prison
  alternatives:
  - in prison
  - in the jail
  lexicon: BDAG
  rationale: φυλακή here denotes the place of confinement. 'In the prison' closely
    reflects the article and concrete location in Greek. 'In prison' is idiomatic
    English, but the more formal rendering better preserves the locative phrase's
    specificity.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Simple connective continuing the narrative. 'And' preserves the Greek
    coordination without adding interpretive temporal nuance.
