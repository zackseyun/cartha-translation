theological_decisions:
- issue: Gender-specific counting term in a mixed crowd
  chosen_reading: Translate ἄνδρες as 'men' and retain the explicit exclusion phrase
    'besides women and children.'
  alternative_readings:
  - people
  - persons
  rationale: The Greek specifically counts male persons and then distinguishes women
    and children separately. Rendering ἄνδρες as 'people' would erase a significant
    lexical detail and flatten the social-historical sense of the count. This follows
    the doctrine's gender-accurate principle.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
