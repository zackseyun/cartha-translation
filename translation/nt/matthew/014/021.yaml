id: MAT.14.21
reference: Matthew 14:21
source:
  edition: SBLGNT
  text: οἱ δὲ ἐσθίοντες ἦσαν ἄνδρες ὡσεὶ πεντακισχίλιοι χωρὶς γυναικῶν καὶ παιδίων.
translation:
  text: Now those who ate were about five thousand men, besides women and children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not counting women and children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἐσθίοντες
  chosen: Now those who ate
  alternatives:
  - And those who were eating
  - Those who had eaten
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to the people who partook of the meal. 'Those who ate' is natural English and
    preserves the reference without over-translating aspect. δέ is lightly represented
    by 'Now' to mark narrative transition.
- source_word: ἦσαν
  chosen: were
  lexicon: BDAG
  rationale: Imperfect of εἰμί here gives the simple copular statement of number;
    English 'were' is the natural equivalent.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  - adult men
  lexicon: BDAG
  rationale: ἀνήρ refers specifically to male persons, often adult men, not people
    in general. In keeping with the gender-accurate philosophy, 'men' preserves the
    source distinction, especially since women and children are explicitly mentioned
    separately.
- source_word: ὡσεὶ
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: ὡσεί marks approximation. 'About' is idiomatic modern English and fits
    the numerical estimate.
- source_word: πεντακισχίλιοι
  chosen: five thousand
  lexicon: BDAG
  rationale: Straightforward cardinal number modifying ἄνδρες.
- source_word: χωρὶς
  chosen: besides
  alternatives:
  - apart from
  - not counting
  - excluding
  lexicon: BDAG
  rationale: χωρίς with the genitive indicates separation or exclusion from the count.
    'Besides' communicates that the stated five thousand men does not include the
    women and children. 'Not counting' is possible, but 'besides' is slightly more
    literal while remaining clear.
- source_word: γυναικῶν
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife' depending on context. Here the plural
    in a counting formula is best rendered 'women,' since no marital relation is in
    view.
- source_word: παιδίων
  chosen: children
  alternatives:
  - young children
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'children' is the natural plural and does not
    require narrowing to very young children in this context.
