id: MAT.14.16
reference: Matthew 14:16
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Οὐ χρείαν ἔχουσιν ἀπελθεῖν· δότε αὐτοῖς ὑμεῖς φαγεῖν.
translation:
  text: But Jesus said to them, “They have no need to go away; you yourselves give
    them something to eat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “They do not need to leave; you give them food.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative transition. 'But' fits the immediate
    contrast with the disciples' implied solution that the crowd should leave.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; preserves straightforward
    narrative speech introduction.
- source_word: Οὐ χρείαν ἔχουσιν
  chosen: They have no need
  alternatives:
  - There is no need for them
  - They do not need
  lexicon: BDAG
  rationale: χρεία means 'need, necessity.' The idiom ἔχω χρείαν is naturally rendered
    'have need.' 'They have no need' preserves the Greek structure while remaining
    idiomatic English.
- source_word: ἀπελθεῖν
  chosen: to go away
  alternatives:
  - to leave
  - to depart
  lexicon: BDAG
  rationale: Aorist infinitive of ἀπέρχομαι. 'Go away' best matches the context of
    dismissing the crowds from the place.
- source_word: δότε
  chosen: give
  alternatives:
  - you must give
  lexicon: BDAG
  rationale: Aorist imperative, second person plural. Simple imperative 'give' is
    sufficient in English without overtranslating aspect.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to the crowd; direct English object after
    'give' requires 'them' plus supplied object.
- source_word: ὑμεῖς
  chosen: you yourselves
  alternatives:
  - you
  - you too
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. 'You yourselves' preserves
    the emphasis that Jesus places on the disciples as the agents.
- source_word: φαγεῖν
  chosen: something to eat
  alternatives:
  - food to eat
  - to eat
  lexicon: BDAG
  rationale: 'The infinitive after δίδωμι in this construction is idiomatically expressed
    in English by supplying the implied object: ''give them something to eat.'' This
    avoids wooden English while preserving the sense.'
