theological_decisions:
- issue: Emphasis on the disciples' role in Jesus' command
  chosen_reading: Render ὑμεῖς emphatically as 'you yourselves'
  alternative_readings:
  - Render simply as 'you'
  rationale: The verse highlights Jesus' direct challenge to the disciples without
    adding theological interpretation beyond the Greek emphasis.
