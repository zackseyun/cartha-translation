id: MAT.14.24
reference: Matthew 14:24
source:
  edition: SBLGNT
  text: τὸ δὲ πλοῖον ἤδη ⸂σταδίους πολλοὺς ἀπὸ τῆς γῆς ἀπεῖχεν⸃, βασανιζόμενον ὑπὸ
    τῶν κυμάτων, ἦν γὰρ ἐναντίος ὁ ἄνεμος.
translation:
  text: But the boat was already many stadia from the land, being battered by the
    waves, for the wind was against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from shore' / 'from the shore.' The Greek says 'from the land.'
    reason: lexical_alternative
  - marker: b
    text: A stadion was an ancient unit of distance, roughly 185 meters (about 607
      feet).
    reason: cultural_note
  - marker: c
    text: Or 'being buffeted by the waves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον can denote a boat or ship. In this Galilee crossing context, 'boat'
    is the more natural modern English term and fits the likely size and setting without
    overstating scale.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: ἤδη marks that the situation had already developed by this point in the
    narrative. 'Already' is the most direct and idiomatic rendering.
- source_word: σταδίους πολλοὺς
  chosen: many stadia
  alternatives:
  - many furlongs
  - a long distance
  lexicon: BDAG
  rationale: The Greek preserves the ancient distance measure rather than giving an
    indefinite expression. To maintain transparency to the source while remaining
    readable, the ancient unit is retained in the main text rather than converted
    or generalized.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the land
  alternatives:
  - from shore
  - from the shore
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or ground. Here it contrasts with the water
    and refers to the shoreline/landmass. 'From the land' is slightly more literal;
    'shore' is a plausible contextual alternative preserved in a footnote.
- source_word: ἀπεῖχεν
  chosen: was ... from
  alternatives:
  - was distant from
  - was away from
  lexicon: BDAG
  rationale: ἀπέχω here expresses spatial distance. English idiom prefers restructuring
    with 'was ... from' rather than a more wooden 'was distant from.'
- source_word: βασανιζόμενον
  chosen: being battered
  alternatives:
  - being tormented
  - being buffeted
  - being harassed
  lexicon: BDAG
  rationale: βασανίζω can mean torment or severe distress; in this maritime context
    the boat is being violently struck by the waves. 'Being battered' communicates
    the physical force naturally in English without importing psychological nuance.
- source_word: ὑπὸ τῶν κυμάτων
  chosen: by the waves
  alternatives:
  - by the swells
  lexicon: BDAG
  rationale: A straightforward agent/instrumental phrase. 'Waves' is the normal rendering
    of κύματα here.
- source_word: ἐναντίος
  chosen: against it
  alternatives:
  - contrary
  - opposed
  lexicon: BDAG
  rationale: ἐναντίος means contrary or opposed. In English, with wind and boat, 'the
    wind was against it' is the clearest idiomatic expression. The pronoun 'it' is
    supplied because English normally makes the relation explicit, though the Greek
    leaves the object implicit from context.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition/contrast. 'But' best reflects the
    shift from Jesus on land to the boat's difficult condition.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the explanation for the boat's distress. 'For' preserves
    the explanatory connection compactly and naturally.
