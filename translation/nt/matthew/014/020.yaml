id: MAT.14.20
reference: Matthew 14:20
source:
  edition: SBLGNT
  text: καὶ ἔφαγον πάντες καὶ ἐχορτάσθησαν, καὶ ἦραν τὸ περισσεῦον τῶν κλασμάτων δώδεκα
    κοφίνους πλήρεις.
translation:
  text: And they all ate and were satisfied, and they picked up twelve full baskets
    of the leftover pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fragments.' The Greek can refer to broken pieces left over after the
      meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - had eaten
  lexicon: BDAG
  rationale: Aorist indicative of ἐσθίω, straightforwardly rendered as the simple
    past 'ate' in narrative sequence.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  lexicon: BDAG
  rationale: The nominative plural adjective refers to the crowd collectively. 'They
    all' makes the implied subject explicit in natural English while preserving the
    universal scope.
- source_word: ἐχορτάσθησαν
  chosen: were satisfied
  alternatives:
  - were filled
  - had enough to eat
  lexicon: BDAG
  rationale: From χορτάζω, here in the passive, meaning to be fed fully or satisfied.
    'Were satisfied' is idiomatic modern English and preserves the sense of fullness
    without unnecessary paraphrase.
- source_word: ἦραν
  chosen: they picked up
  alternatives:
  - they took up
  - they gathered up
  lexicon: BDAG
  rationale: From αἴρω, 'lift, take up.' In this context of collecting leftovers,
    'picked up' is natural and precise English.
- source_word: τὸ περισσεῦον
  chosen: the leftover
  alternatives:
  - what was left over
  - the excess
  lexicon: BDAG
  rationale: The substantival participle from περισσεύω denotes that which remained
    in excess. 'The leftover' is concise and idiomatic; the singular collective sense
    is preserved in English.
- source_word: τῶν κλασμάτων
  chosen: pieces
  alternatives:
  - fragments
  - broken pieces
  lexicon: BDAG
  rationale: κλάσματα refers to broken pieces, especially of bread. 'Pieces' is readable
    modern English; 'fragments' is possible but slightly more formal. The relation
    to τὸ περισσεῦον is expressed as 'leftover pieces.'
- source_word: δώδεκα
  chosen: twelve
  lexicon: BDAG
  rationale: Cardinal number directly rendered.
- source_word: κοφίνους
  chosen: baskets
  lexicon: BDAG
  rationale: κόφινος denotes a basket. No more specific English equivalent is required
    here.
- source_word: πλήρεις
  chosen: full
  alternatives:
  - filled
  lexicon: BDAG
  rationale: Predicate/adjectival modifier of 'baskets'; 'full' is the most natural
    English rendering in this collocation.
