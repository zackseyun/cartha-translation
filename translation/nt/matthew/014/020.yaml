theological_decisions:
- issue: Miraculous feeding described with ordinary fullness language
  chosen_reading: were satisfied
  alternative_readings:
  - were filled
  rationale: The verse reports the result of the feeding miracle without adding interpretive
    theological language beyond the Greek. 'Were satisfied' preserves the plain sense
    of complete provision and avoids either minimizing or over-expanding the miracle.
  doctrine_reference: Translation philosophy §§1, 3, 6
