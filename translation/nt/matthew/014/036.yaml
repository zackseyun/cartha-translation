theological_decisions:
- issue: Meaning of διεσώθησαν in a miracle-healing context
  chosen_reading: physical healing ('were healed')
  alternative_readings:
  - were saved
  - were made well
  rationale: Although the verb can bear a broader sense of rescue or salvation, the
    immediate context is bodily healing through contact with Jesus' garment. Rendering
    it as 'were healed' avoids importing soteriological claims the verse itself does
    not explicitly make.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
