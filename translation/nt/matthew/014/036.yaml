id: MAT.14.36
reference: Matthew 14:36
source:
  edition: SBLGNT
  text: καὶ παρεκάλουν αὐτὸν ἵνα μόνον ἅψωνται τοῦ κρασπέδου τοῦ ἱματίου αὐτοῦ· καὶ
    ὅσοι ἥψαντο διεσώθησαν.
translation:
  text: And they begged him that they might only touch the fringe of his garment,
    and as many as touched it were healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hem' or 'edge'; the Greek term can refer to the border or fringe of
      a garment, possibly including its tassel.
    reason: lexical_alternative
  - marker: b
    text: Or 'were made well'; the Greek verb can mean 'were healed,' 'were restored,'
      or more broadly 'were saved/rescued,' but here the context is physical healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλουν
  chosen: begged
  alternatives:
  - implored
  - pleaded with
  - asked
  lexicon: BDAG
  rationale: The imperfect verb indicates repeated or continued entreaty. 'Begged'
    captures the urgency better than the weaker 'asked,' while remaining natural English.
- source_word: ἵνα μόνον ἅψωνται
  chosen: that they might only touch
  alternatives:
  - that they might just touch
  - to only touch
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses the content/purpose of their request.
    μόνον modifies the action with the sense 'only/just,' emphasizing that mere contact
    was sought.
- source_word: κράσπεδου
  chosen: fringe
  alternatives:
  - edge
  - hem
  - tassel
  lexicon: BDAG
  rationale: κράσπεδον can denote the edge, hem, or tassel/fringe of a garment. 'Fringe'
    preserves the likely reference to the garment's border without over-specifying
    beyond the text. 'Hem' is idiomatic but less transparent to the possible Jewish
    garment-background; 'tassel' may be too specific here.
- source_word: τοῦ ἱματίου αὐτοῦ
  chosen: of his garment
  alternatives:
  - of his cloak
  - of his robe
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment. 'Garment' is broad and accurate,
    avoiding unwarranted specificity such as 'cloak' or 'robe.'
- source_word: ὅσοι
  chosen: as many as
  alternatives:
  - all who
  - whoever
  lexicon: BDAG
  rationale: ὅσοι is quantitative/relative, best reflected by 'as many as,' though
    'all who' is a close idiomatic alternative. The chosen rendering preserves the
    distributive sense.
- source_word: ἥψαντο
  chosen: touched it
  alternatives:
  - touched
  lexicon: BDAG
  rationale: The middle form of ἅπτω here means 'touch.' English naturally supplies
    the object from context; 'it' refers to the fringe/garment just mentioned and
    improves readability.
- source_word: διεσώθησαν
  chosen: were healed
  alternatives:
  - were made well
  - were saved
  - were restored
  lexicon: BDAG
  rationale: In this healing context, διασῴζω carries the sense of being cured or
    made well rather than the broader theological sense 'saved.' 'Were healed' is
    clear modern English and fits the narrative context.
