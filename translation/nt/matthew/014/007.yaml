id: MAT.14.7
reference: Matthew 14:7
source:
  edition: SBLGNT
  text: ὅθεν μετὰ ὅρκου ὡμολόγησεν αὐτῇ δοῦναι ὃ ⸀ἐὰν αἰτήσηται.
translation:
  text: Therefore he promised with an oath to give her whatever she might ask.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever she should ask.' The Greek uses an indefinite relative clause
      (ὃ ἐὰν αἰτήσηται) expressing an open-ended future request.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding narrative
    context; 'Therefore' preserves the causal/resultative force in natural English.
- source_word: μετὰ ὅρκου
  chosen: with an oath
  alternatives:
  - under oath
  - with a sworn oath
  lexicon: BDAG
  rationale: The preposition with the genitive expresses accompaniment; the phrase
    indicates that the promise was made in a sworn manner. 'With an oath' is idiomatic
    and sufficiently formal.
- source_word: ὡμολόγησεν
  chosen: he promised
  alternatives:
  - he agreed
  - he pledged
  - he confessed
  lexicon: BDAG
  rationale: In this context ὁμολογέω carries the sense of making a public or firm
    commitment rather than 'confess.' 'Promised' fits the narrative context and pairs
    naturally with the infinitive δοῦναι.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - to her
  lexicon: BDAG
  rationale: Dative indirect object referring to the girl. English can express this
    naturally as 'her' after 'promised,' while the following infinitive clause supplies
    the content of the promise.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - that he would give
  lexicon: BDAG
  rationale: Aorist infinitive complementary to ὡμολόγησεν, expressing the content
    of the promise. 'To give' is the most direct rendering.
- source_word: ὃ ἐὰν αἰτήσηται
  chosen: whatever she might ask
  alternatives:
  - whatever she asks
  - whatever she should ask
  - anything she might ask for
  lexicon: BDAG
  rationale: Relative pronoun with ἐάν and subjunctive forms an indefinite relative
    clause. 'Whatever she might ask' captures the open-ended contingency in idiomatic
    English. 'Ask for' is implied by context but not necessary to state explicitly.
