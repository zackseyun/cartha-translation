id: MAT.14.17
reference: Matthew 14:17
source:
  edition: SBLGNT
  text: οἱ δὲ λέγουσιν αὐτῷ· Οὐκ ἔχομεν ὧδε εἰ μὴ πέντε ἄρτους καὶ δύο ἰχθύας.
translation:
  text: But they said to him, “We have nothing here except five loaves and two fish.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'We do not have here except five loaves and two fish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - So they
  lexicon: BDAG
  rationale: The article with δέ refers back to the disciples as the subject. δέ is
    rendered 'But' to mark the mild contrast with Jesus' preceding instruction, in
    natural English.
- source_word: λέγουσιν αὐτῷ
  chosen: said to him
  alternatives:
  - say to him
  - tell him
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('say'), English narrative
    style normally shifts this to simple past, 'said,' for readability while preserving
    the discourse function.
- source_word: Οὐκ ἔχομεν
  chosen: We have nothing
  alternatives:
  - We do not have
  - We have no
  lexicon: BDAG
  rationale: This negated possession clause is idiomatically expressed in English
    as 'We have nothing.' This best captures the force of the denial without awkwardness.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: ὧδε is a locative adverb meaning 'here.' The simple English adverb is
    sufficient and natural.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - if not
  lexicon: BDAG
  rationale: In this construction after a negated clause, εἰ μή means 'except' rather
    than a conditional 'unless.'
- source_word: πέντε ἄρτους
  chosen: five loaves
  alternatives:
  - five bread loaves
  - five pieces of bread
  lexicon: BDAG
  rationale: ἄρτους is the accusative plural of ἄρτος, commonly 'loaf(s)' or 'bread.'
    'Five loaves' is the most natural and contextually appropriate rendering in this
    feeding narrative.
- source_word: δύο ἰχθύας
  chosen: two fish
  alternatives:
  - two fishes
  lexicon: BDAG
  rationale: ἰχθύας means 'fish.' Modern English prefers 'fish' as the plural in ordinary
    usage.
