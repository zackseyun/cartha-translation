theological_decisions:
- issue: Identity of the subject and object left implicit in Greek narrative context
  chosen_reading: Render pronouns as 'he' and 'him' without supplying names in the
    verse text
  alternative_readings:
  - And although Herod wanted to kill John, he feared the crowd, because they regarded
    him as a prophet.
  rationale: The Greek uses pronouns, and the immediate context supplies Herod and
    John. Retaining pronouns preserves the source text's form while remaining understandable
    in context. Supplying names would be interpretively clarifying but more explicit
    than the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
