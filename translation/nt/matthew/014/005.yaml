id: MAT.14.5
reference: Matthew 14:5
source:
  edition: SBLGNT
  text: καὶ θέλων αὐτὸν ἀποκτεῖναι ἐφοβήθη τὸν ὄχλον, ὅτι ὡς προφήτην αὐτὸν εἶχον.
translation:
  text: And although he wanted to kill him, he feared the crowd, because they regarded
    him as a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''wanting to kill him, he feared the crowd''; the participle
      is rendered concessively in context: ''although he wanted to kill him.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'they considered him a prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλων
  chosen: although he wanted
  alternatives:
  - wanting
  - desiring
  lexicon: BDAG
  rationale: 'The participle is concessive in context when paired with the finite
    verb ἐφοβήθη: despite his desire, he refrained because of fear. Rendering with
    ''although he wanted'' makes the relationship clear in natural English without
    over-paraphrasing.'
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to murder
  lexicon: BDAG
  rationale: The infinitive means to kill or put to death. 'To kill' is the most direct
    and natural rendering here; 'murder' would add a moral nuance not explicit in
    the verb itself.
- source_word: ἐφοβήθη
  chosen: he feared
  alternatives:
  - he was afraid of
  lexicon: BDAG
  rationale: Aorist middle/passive deponent from φοβέομαι, straightforwardly meaning
    'he feared' or 'was afraid of.' 'He feared' is slightly more formal and concise,
    fitting the narrative tone.
- source_word: τὸν ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος commonly refers to a crowd or multitude. 'The crowd' is readable
    modern English and fits the social setting.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for Herod's fear. 'Because' is the clearest
    contemporary English equivalent.
- source_word: ὡς προφήτην
  chosen: as a prophet
  alternatives:
  - to be a prophet
  - like a prophet
  lexicon: BDAG
  rationale: ὡς with the predicate accusative indicates how John was regarded by the
    crowd. 'As a prophet' best captures their estimation without implying uncertainty.
- source_word: αὐτὸν εἶχον
  chosen: they regarded him
  alternatives:
  - they held him
  - they considered him
  lexicon: BDAG
  rationale: The idiom ἔχω with a predicate accusative can mean 'to consider/regard
    as.' 'They regarded him' is idiomatic English and accurately reflects the construction.
