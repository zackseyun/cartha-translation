id: MAT.14.6
reference: Matthew 14:6
source:
  edition: SBLGNT
  text: ⸂γενεσίοις δὲ γενομένοις⸃ τοῦ Ἡρῴδου ὠρχήσατο ἡ θυγάτηρ τῆς Ἡρῳδιάδος ἐν τῷ
    μέσῳ καὶ ἤρεσεν τῷ Ἡρῴδῃ,
translation:
  text: But when Herod’s birthday celebration came, the daughter of Herodias danced
    in the midst and pleased Herod,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when Herod’s birthday arrived' or 'at Herod’s birthday feast.' The
      Greek refers to the occasion of Herod’s birthday observance.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the middle.' The phrase likely means she danced in the midst of
      the gathering.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενεσίοις ... γενομένοις
  chosen: when Herod’s birthday celebration came
  alternatives:
  - when Herod’s birthday arrived
  - at Herod’s birthday feast
  - when Herod’s birthday was being observed
  lexicon: BDAG
  rationale: The dative plural γενεσίοις with γενομένοις forms a temporal genitive/dative
    construction referring to the occurrence or observance of a birthday celebration,
    not merely the calendar date. 'Birthday celebration' captures the event setting
    implied by the narrative better than the bare 'birthday,' while 'came' reflects
    γενομένοις idiomatically in English.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative development with mild contrast or transition.
    'But' fits the flow from the previous verse and preserves the slight adversative
    nuance better than a simple 'and.'
- source_word: ὠρχήσατο
  chosen: danced
  alternatives:
  - performed a dance
  lexicon: BDAG
  rationale: The aorist middle of ὀρχέομαι straightforwardly means 'danced.' The simple
    English verb is natural and sufficient without over-specifying the performance.
- source_word: ἡ θυγάτηρ τῆς Ἡρῳδιάδος
  chosen: the daughter of Herodias
  alternatives:
  - Herodias’s daughter
  lexicon: BDAG
  rationale: This is the plain genitival relationship. The more formal phrasing keeps
    the Greek structure visible and avoids prematurely importing the traditional identification
    with Salome, which the text itself does not name.
- source_word: ἐν τῷ μέσῳ
  chosen: in the midst
  alternatives:
  - in the middle
  - before them
  lexicon: BDAG
  rationale: The phrase literally means 'in the midst/in the middle.' 'In the midst'
    preserves the wording closely while remaining understandable. 'Before them' is
    interpretive and less textually transparent.
- source_word: ἤρεσεν τῷ Ἡρῴδῃ
  chosen: pleased Herod
  alternatives:
  - was pleasing to Herod
  - won Herod’s approval
  lexicon: BDAG
  rationale: ἀρέσκω with the dative means 'to please.' 'Pleased Herod' is the most
    natural modern English rendering and accurately reflects the sense without embellishment.
- source_word: Ἡρῴδου / Ἡρῴδῃ
  chosen: Herod
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the translation
    policy to transliterate names rather than translate them.
