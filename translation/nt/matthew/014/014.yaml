id: MAT.14.14
reference: Matthew 14:14
source:
  edition: SBLGNT
  text: καὶ ⸀ἐξελθὼν εἶδεν πολὺν ὄχλον, καὶ ἐσπλαγχνίσθη ἐπ’ αὐτοῖς καὶ ἐθεράπευσεν
    τοὺς ἀρρώστους αὐτῶν.
translation:
  text: And when he went ashore, he saw a large crowd, and he had compassion on them
    and healed their sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'having gone out' or 'when he came out.' In context,
      this likely refers to going ashore from the boat.
    reason: lexical_alternative
  - marker: b
    text: Or 'was moved with compassion for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: when he went ashore
  alternatives:
  - having gone out
  - when he came out
  lexicon: BDAG
  rationale: The participle literally means 'having gone out/came out,' but in this
    narrative context of Jesus arriving by boat, idiomatic English 'went ashore' best
    conveys the action without wooden phrasing. This is a context-driven rendering
    rather than a bare formal gloss.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he looked at
  lexicon: BDAG
  rationale: Standard aorist of ὁράω, straightforwardly rendered 'he saw.'
- source_word: πολὺν ὄχλον
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd/multitude.' 'Large crowd' is natural modern English and
    preserves the quantitative force of πολύς without archaic tone.
- source_word: ἐσπλαγχνίσθη ἐπ’ αὐτοῖς
  chosen: he had compassion on them
  alternatives:
  - he felt compassion for them
  - he was moved with compassion for them
  lexicon: BDAG
  rationale: σπλαγχνίζομαι denotes deep compassion. 'Had compassion on them' is clear,
    idiomatic, and preserves the emotional force. 'Was moved with compassion' is traditional
    and possible, but slightly more interpretive in English style.
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω in this context refers to physical healing. 'He healed' is the
    standard and most natural rendering.
- source_word: τοὺς ἀρρώστους αὐτῶν
  chosen: their sick
  alternatives:
  - their sick people
  - those among them who were sick
  - their sick ones
  lexicon: BDAG
  rationale: ἄρρωστος means 'sick, ill.' The substantival adjective with αὐτῶν is
    compactly represented by 'their sick,' meaning the sick members of the crowd.
    This preserves the Greek's brevity better than an expanded paraphrase.
