theological_decisions:
- issue: Rendering Jesus' emotional response
  chosen_reading: he had compassion on them
  alternative_readings:
  - he was moved with compassion for them
  rationale: The verse presents Jesus' compassionate response as the motive for healing,
    but does not require a more heightened or paraphrastic expression. The chosen
    wording preserves the text's theological emphasis on Jesus' mercy without embellishment.
  doctrine_reference: Translation philosophy §1, §3, §6
