theological_decisions:
- issue: Narrative implication of Jesus' withdrawal
  chosen_reading: Render ἀνεχώρησεν neutrally as 'withdrew' without importing motives
    beyond the immediate context.
  alternative_readings:
  - retreated for safety
  - departed simply for travel
  - withdrew for private mourning/prayer
  rationale: The verse states that Jesus withdrew after hearing the news and went
    to an isolated place privately, but it does not explicitly define his motive.
    The translation preserves the narrative action without resolving interpretive
    possibilities not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
