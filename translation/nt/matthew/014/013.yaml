id: MAT.14.13
reference: Matthew 14:13
source:
  edition: SBLGNT
  text: ⸂Ἀκούσας δὲ⸃ ὁ Ἰησοῦς ἀνεχώρησεν ἐκεῖθεν ἐν πλοίῳ εἰς ἔρημον τόπον κατ’ ἰδίαν·
    καὶ ἀκούσαντες οἱ ὄχλοι ἠκολούθησαν αὐτῷ πεζῇ ἀπὸ τῶν πόλεων.
translation:
  text: Now when Jesus heard this, he withdrew from there by boat to a desolate place
    by himself. But when the crowds heard, they followed him on foot from the towns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a deserted place' or 'to a solitary place.' The Greek describes an
      isolated or uninhabited area, not necessarily a sandy desert.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the cities.' The Greek word can refer to towns or cities depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσας δὲ
  chosen: Now when ... heard
  alternatives:
  - And when ... heard
  - But when ... heard
  - After hearing
  lexicon: BDAG
  rationale: The aorist participle Ἀκούσας is best rendered temporally ('when he heard'),
    and δέ here marks narrative development rather than strong contrast. 'Now when'
    gives natural English flow while preserving the transition.
- source_word: ἀνεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - went away
  - retreated
  lexicon: BDAG
  rationale: ἀναχωρέω in Matthew often carries the sense of withdrawing or departing,
    sometimes in response to circumstances. 'Withdrew' preserves that nuance better
    than the flatter 'departed'.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: A straightforward adverb of place; 'from there' is idiomatic and sufficiently
    precise.
- source_word: ἐν πλοίῳ
  chosen: by boat
  alternatives:
  - in a boat
  lexicon: BDAG
  rationale: Both are possible. 'By boat' is more natural in contemporary English
    while accurately conveying means of travel.
- source_word: εἰς ἔρημον τόπον
  chosen: to a desolate place
  alternatives:
  - to a deserted place
  - to a wilderness place
  - to a solitary place
  lexicon: BDAG
  rationale: ἔρημος here describes an uninhabited or isolated area, not necessarily
    a desert biome. 'Desolate place' preserves the sense of isolation without over-specifying
    geography.
- source_word: κατ’ ἰδίαν
  chosen: by himself
  alternatives:
  - privately
  - alone
  lexicon: BDAG
  rationale: The phrase means in private or apart from others. 'By himself' fits the
    narrative context and reads naturally with the movement to an isolated place.
- source_word: ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - after hearing
  lexicon: BDAG
  rationale: Like the earlier participle, this aorist participle is rendered temporally
    in smooth English.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: Plural ὄχλοι is best represented by 'the crowds,' a natural modern rendering
    that preserves the plural.
- source_word: ἠκολούθησαν αὐτῷ
  chosen: they followed him
  alternatives:
  - they went after him
  lexicon: BDAG
  rationale: Standard rendering of ἀκολουθέω with dative object; no theological overtones
    need to be imported here beyond literal following.
- source_word: πεζῇ
  chosen: on foot
  alternatives:
  - by land
  - walking
  lexicon: BDAG
  rationale: πεζῇ denotes travel by foot. 'On foot' is the clearest and most idiomatic
    equivalent.
- source_word: ἀπὸ τῶν πόλεων
  chosen: from the towns
  alternatives:
  - from the cities
  lexicon: BDAG
  rationale: πόλις can mean city or town depending on scale. In this Galilean setting,
    'towns' better fits likely referents in contemporary English without denying that
    they were settled population centers.
