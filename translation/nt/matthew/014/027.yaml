id: MAT.14.27
reference: Matthew 14:27
source:
  edition: SBLGNT
  text: ⸀εὐθὺς δὲ ἐλάλησεν ⸂αὐτοῖς ὁ Ἰησοῦς⸃ λέγων· Θαρσεῖτε, ἐγώ εἰμι· μὴ φοβεῖσθε.
translation:
  text: But immediately Jesus spoke to them, saying, “Take courage; it is I. Do not
    be afraid.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “I am.” The Greek can function as simple self-identification
      here, though some readers hear a possible echo of the divine self-designation.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys the temporal force plainly in modern English; 'straightway' is
    archaic, while 'at once' is also possible.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the disciples' fear in the
    previous verse; 'but' fits the discourse turn well.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  - talked
  lexicon: BDAG
  rationale: A natural rendering of λαλέω here. 'Spoke' works smoothly with the participle
    λέγων introducing the direct speech.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Standard dative indirect object; no reason to compress or expand.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated per translation philosophy.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial structure without awkwardness in English and
    preserves the narrative flow.
- source_word: Θαρσεῖτε
  chosen: Take courage
  alternatives:
  - Be courageous
  - Take heart
  lexicon: BDAG
  rationale: Imperative plural calling for courage or confidence. 'Take courage' is
    clear, contemporary, and preserves the exhortational tone. 'Take heart' is idiomatic
    but slightly less explicit.
- source_word: ἐγώ εἰμι
  chosen: it is I
  alternatives:
  - I am
  - I am he
  lexicon: BDAG
  rationale: In this immediate narrative context, Jesus is identifying himself to
    the frightened disciples. 'It is I' communicates the plain sense naturally in
    English. The more literal 'I am' may also evoke broader theological resonance
    and is preserved in a footnote.
- source_word: μὴ φοβεῖσθε
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  - Stop being afraid
  lexicon: BDAG
  rationale: Natural English for the present middle/passive imperative with μή in
    this context. 'Do not fear' is more formal; 'stop being afraid' may over-specify
    aspect.
