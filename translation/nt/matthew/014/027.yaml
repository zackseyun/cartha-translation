theological_decisions:
- issue: Whether ἐγώ εἰμι should be rendered as a simple self-identification or as
    an explicit echo of the divine 'I am' formula
  chosen_reading: Main text renders the immediate narrative sense as 'it is I'
  alternative_readings:
  - I am
  - I am he
  rationale: The immediate context is Jesus reassuring terrified disciples by identifying
    himself. To preserve theological tension rather than over-resolve it, the main
    text gives the idiomatic contextual sense, while a footnote preserves the more
    literal 'I am,' which readers may hear as carrying possible theological resonance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
