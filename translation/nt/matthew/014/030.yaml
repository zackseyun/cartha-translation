id: MAT.14.30
reference: Matthew 14:30
source:
  edition: SBLGNT
  text: βλέπων δὲ τὸν ἄνεμον ⸀ἰσχυρὸν ἐφοβήθη, καὶ ἀρξάμενος καταποντίζεσθαι ἔκραξεν
    λέγων· Κύριε, σῶσόν με.
translation:
  text: But seeing the strong wind, he became afraid, and beginning to sink, he cried
    out, saying, “Lord, save me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the violent wind.”
    reason: lexical_alternative
  - marker: b
    text: Or “rescue me.” The Greek verb can denote deliverance from immediate danger
      as well as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπων
  chosen: seeing
  alternatives:
  - when he saw
  - looking at
  lexicon: BDAG
  rationale: Present participle conveying contemporaneous perception; 'seeing' preserves
    the participial linkage without over-paraphrasing.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with Peter's prior successful walking; 'but' best reflects
    the narrative turn.
- source_word: ἄνεμον ἰσχυρόν
  chosen: the strong wind
  alternatives:
  - the powerful wind
  - the violent wind
  lexicon: BDAG
  rationale: ἰσχυρός modifies ἄνεμος directly. 'Strong wind' is natural English and
    sufficiently vivid without exaggeration.
- source_word: ἐφοβήθη
  chosen: he became afraid
  alternatives:
  - he was afraid
  - he feared
  lexicon: BDAG
  rationale: Aorist passive/deponent here is ingressive in sense; 'became afraid'
    captures the onset of fear better than the stative 'was afraid'.
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - having begun
  lexicon: BDAG
  rationale: Participle introducing the next action; 'beginning' keeps the flow of
    the Greek sequence in idiomatic English.
- source_word: καταποντίζεσθαι
  chosen: to sink
  alternatives:
  - to be submerged
  - to go under
  - to drown
  lexicon: BDAG
  rationale: The verb denotes being swallowed by the sea or sinking. 'To sink' is
    the clearest idiomatic rendering here; 'to drown' would overstate the process
    at this moment.
- source_word: ἔκραξεν
  chosen: he cried out
  alternatives:
  - he shouted
  - he cried
  lexicon: BDAG
  rationale: Conveys a loud urgent appeal. 'Cried out' preserves the intensity without
    sounding overly colloquial.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial construction that introduces the direct speech.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, and in Matthew this address to Jesus
    appropriately carries the sense 'Lord.'
- source_word: σῶσόν με
  chosen: save me
  alternatives:
  - rescue me
  lexicon: BDAG
  rationale: Aorist imperative with direct object expresses urgent plea for deliverance.
    'Save me' is both lexically accurate and preserves the resonance of σῴζω, while
    fitting the immediate physical context.
