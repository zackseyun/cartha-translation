theological_decisions:
- issue: Rendering κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    In this narrative context, 'Lord' also preserves the christological weight of
    the address without importing more than the text states.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering σῴζω in an immediate danger context
  chosen_reading: save me
  alternative_readings:
  - rescue me
  rationale: Although the context is physical peril, 'save me' is the most direct
    rendering of σῴζω and preserves the broader semantic and theological resonance
    of the verb without forcing a narrower gloss.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
