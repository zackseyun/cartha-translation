id: MAT.14.18
reference: Matthew 14:18
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Φέρετέ μοι ⸂ὧδε αὐτούς⸃.
translation:
  text: But he said, “Bring them here to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the loaves and fish mentioned in the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the immediate contrast between the
    disciples' objection and Jesus' response, while remaining natural English.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: λέγω in the aorist is straightforwardly rendered 'said'; 'told' would
    add a nuance of command not inherent in the verb itself.
- source_word: Φέρετέ
  chosen: Bring
  alternatives:
  - Carry
  - Bring here
  lexicon: BDAG
  rationale: φέρω in the present active imperative, second person plural, is a command
    to cause the items to be brought. 'Bring' is the most idiomatic and accurate English
    imperative here.
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: The dative pronoun is naturally expressed in English as 'to me,' making
    the direction of the action explicit and idiomatic.
- source_word: ὧδε
  chosen: here
  alternatives:
  - here
  - to this place
  lexicon: BDAG
  rationale: ὧδε is an adverb of place meaning 'here.' In English, 'Bring them here
    to me' preserves both the spatial and personal focus of the Greek.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Although grammatically masculine plural, αὐτούς refers contextually to
    the loaves and fish just mentioned; English idiom uses 'them' for the items collectively
    without forcing an unnatural specification in the main text.
