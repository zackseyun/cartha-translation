theological_decisions:
- issue: Rendering of Ὀλιγόπιστε in relation to πίστις
  chosen_reading: You of little faith
  alternative_readings:
  - You who have little faith
  rationale: In line with the default rendering of πίστις as 'faith,' the rebuke is
    framed as deficient faith rather than lack of courage or loyalty. This preserves
    the theological emphasis of the passage without overstating Peter's failure as
    total unbelief.
