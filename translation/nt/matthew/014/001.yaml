id: MAT.14.1
reference: Matthew 14:1
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῳ τῷ καιρῷ ἤκουσεν Ἡρῴδης ὁ τετραάρχης τὴν ἀκοὴν Ἰησοῦ,
translation:
  text: At that time Herod the tetrarch heard the report about Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the news about Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: BDAG
  rationale: The prepositional phrase is an idiomatic temporal marker. 'At that time'
    is natural modern English and preserves the temporal sense without woodenly reproducing
    the Greek structure.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - came to hear
  - learned of
  lexicon: BDAG
  rationale: Aorist of ἀκούω straightforwardly means 'heard.' More interpretive renderings
    like 'learned of' are possible in context but go beyond the plain lexical sense.
- source_word: Ἡρῴδης
  chosen: Herod
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ τετραάρχης
  chosen: the tetrarch
  alternatives:
  - the ruler of a fourth part
  - the district ruler
  lexicon: BDAG
  rationale: The title is best translated rather than paraphrased. 'Tetrarch' is established
    English for the specific political office and preserves historical precision.
- source_word: τὴν ἀκοὴν
  chosen: the report
  alternatives:
  - the news
  - what was being said
  lexicon: BDAG
  rationale: Here ἀκοή refers not to the faculty of hearing but to what is heard,
    i.e., report/news. 'The report' is concise and fits the genitive construction
    that follows.
- source_word: Ἰησοῦ
  chosen: about Jesus
  alternatives:
  - of Jesus
  - concerning Jesus
  lexicon: BDAG
  rationale: The genitive after ἀκοή is naturally rendered in English with 'about'
    to express the content of the report. 'Of Jesus' is more formal but less idiomatic
    in contemporary English.
