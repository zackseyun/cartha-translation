theological_decisions:
- issue: Historical-moral framing of Herodias's relationship to Philip
  chosen_reading: Render the phrase neutrally as 'Herodias, the wife of Philip his
    brother' without importing the fuller charge of unlawful marriage from the surrounding
    context.
  alternative_readings:
  - Herodias, his brother Philip's wife
  rationale: The verse itself identifies Herodias by her relation to Philip and Herod;
    it does not yet explicitly state the unlawfulness, which appears in the next verse.
    The translation should not front-load that judgment beyond the wording present.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
