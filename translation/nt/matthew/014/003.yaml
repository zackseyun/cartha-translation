id: MAT.14.3
reference: Matthew 14:3
source:
  edition: SBLGNT
  text: Ὁ γὰρ Ἡρῴδης κρατήσας τὸν Ἰωάννην ἔδησεν ⸀αὐτὸν καὶ ⸂ἐν φυλακῇ ἀπέθετο⸃ διὰ
    Ἡρῳδιάδα τὴν γυναῖκα Φιλίππου τοῦ ἀδελφοῦ αὐτοῦ,
translation:
  text: For Herod had arrested John, bound him, and put him in prison because of Herodias,
    the wife of Philip his brother,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having seized John ... placed him in prison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: Retains the explanatory/grounding force connecting this verse to the
    preceding context. 'For' is natural and sufficiently formal here.
- source_word: κρατήσας
  chosen: had arrested
  alternatives:
  - having seized
  - having taken hold of
  lexicon: BDAG
  rationale: The aorist participle preceding the main verbs is best rendered in English
    as prior action. 'Arrested' fits the custodial context better than the more literal
    'seized'.
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - tied up
  - chained
  lexicon: BDAG
  rationale: A straightforward rendering of δέω. 'Bound' preserves the concrete sense
    without over-specifying the means.
- source_word: ἐν φυλακῇ ἀπέθετο
  chosen: put him in prison
  alternatives:
  - placed him in prison
  - put him in custody
  lexicon: BDAG
  rationale: This idiomatic combination denotes imprisonment. 'Put him in prison'
    is clear modern English and preserves the sense of confinement.
- source_word: διὰ Ἡρῳδιάδα
  chosen: because of Herodias
  alternatives:
  - on account of Herodias
  - for the sake of Herodias
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause or reason. 'Because of'
    is the most natural English equivalent.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this relational/genitival construction, 'wife' is the contextually
    correct sense of γυνή.
- source_word: Φιλίππου τοῦ ἀδελφοῦ αὐτοῦ
  chosen: of Philip his brother
  alternatives:
  - of Philip, his brother
  - of his brother Philip
  lexicon: BDAG
  rationale: This preserves the Greek appositional relationship and makes clear that
    Philip was Herod's brother. The chosen order is natural while staying close to
    the source.
