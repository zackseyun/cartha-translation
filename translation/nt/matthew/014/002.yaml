theological_decisions:
- issue: Nature of John's return
  chosen_reading: He has been raised from the dead
  alternative_readings:
  - He rose from the dead
  rationale: The Greek uses the passive ἠγέρθη, so the translation preserves passive
    wording rather than wording that could suggest John raised himself. This reflects
    the grammar without making a broader doctrinal claim beyond Herod's statement.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of δυνάμεις in context
  chosen_reading: these powers are at work in him
  alternative_readings:
  - these miraculous powers are at work in him
  - the miracles are working in him
  rationale: The term likely refers to miraculous power rather than abstract abilities,
    but the translation keeps the more literal 'powers' in the main text to avoid
    over-interpretation while still allowing the miraculous sense to be recognized.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text
    does not make.
