id: MAT.14.2
reference: Matthew 14:2
source:
  edition: SBLGNT
  text: καὶ εἶπεν τοῖς παισὶν αὐτοῦ· Οὗτός ἐστιν Ἰωάννης ὁ βαπτιστής· αὐτὸς ἠγέρθη
    ἀπὸ τῶν νεκρῶν, καὶ διὰ τοῦτο αἱ δυνάμεις ἐνεργοῦσιν ἐν αὐτῷ.
translation:
  text: And he said to his servants, “This is John the Baptist. He has been raised
    from the dead, and for this reason these powers are at work in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the miraculous powers,” or more interpretively, “the miracles.” The
      Greek says “the powers” (αἱ δυνάμεις), referring to supernatural power manifested
      in mighty works.
    reason: lexical_alternative
lexical_decisions:
- source_word: παισὶν
  chosen: servants
  alternatives:
  - attendants
  - boys
  - courtiers
  lexicon: BDAG
  rationale: παῖς can mean child, servant, or attendant depending on context. Here
    Herod is speaking to members of his household/court, so 'servants' best captures
    the social relationship without over-specifying rank. 'Boys' would sound misleading
    in modern English, and 'courtiers' is possible but less directly lexical.
- source_word: ὁ βαπτιστής
  chosen: the Baptist
  alternatives:
  - the Baptizer
  lexicon: BDAG
  rationale: The established epithet for Ἰωάννης ὁ βαπτιστής in English is 'John the
    Baptist.' 'The Baptizer' is more transparent to the Greek formation but less idiomatic;
    the traditional rendering here does not distort the sense.
- source_word: ἠγέρθη
  chosen: has been raised
  alternatives:
  - was raised
  - rose
  lexicon: BDAG
  rationale: The aorist passive of ἐγείρω is best rendered with a passive sense, 'has
    been raised' or 'was raised.' 'Has been raised' gives natural English while preserving
    the passive nuance rather than implying self-resurrection with 'rose.'
- source_word: ἀπὸ τῶν νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the Greek phrase in English.
    'From among the dead' is more formally explicit but less natural here.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: BDAG
  rationale: The phrase expresses causal inference. 'For this reason' preserves the
    explanatory force more clearly than the more compressed 'therefore.'
- source_word: αἱ δυνάμεις
  chosen: these powers
  alternatives:
  - the miraculous powers
  - the miracles
  - the mighty works
  lexicon: BDAG
  rationale: δύναμεις here refers to supernatural powers manifested in miraculous
    works. Rendering it as 'these powers' keeps the noun explicit and close to the
    Greek, while avoiding prematurely collapsing the term into the resulting acts
    ('miracles'). The demonstrative force is supplied in English for naturalness in
    context, referring to the reported mighty works.
- source_word: ἐνεργοῦσιν
  chosen: are at work
  alternatives:
  - are working
  - operate
  lexicon: BDAG
  rationale: ἐνεργέω denotes being active or operative. 'Are at work' is idiomatic
    modern English and conveys ongoing effective activity.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - through him
  lexicon: BDAG
  rationale: The preposition ἐν most directly means 'in.' In this context it denotes
    the sphere or locus in which the powers are operative. 'Through him' is interpretive
    and less textually direct.
