id: MAT.14.8
reference: Matthew 14:8
source:
  edition: SBLGNT
  text: ἡ δὲ προβιβασθεῖσα ὑπὸ τῆς μητρὸς αὐτῆς· Δός μοι, φησίν, ὧδε ἐπὶ πίνακι τὴν
    κεφαλὴν Ἰωάννου τοῦ βαπτιστοῦ.
translation:
  text: And she, having been prompted by her mother, says, “Give me here on a platter
    the head of John the Baptizer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “John the Baptist.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προβιβασθεῖσα
  chosen: having been prompted
  alternatives:
  - having been instructed
  - having been urged
  - having been put forward
  lexicon: BDAG
  rationale: The participle indicates prior influence exerted on the girl by her mother.
    'Prompted' captures the causative sense in natural English without over-specifying
    formal instruction. The passive is preserved with 'having been prompted.'
- source_word: ὑπὸ τῆς μητρὸς αὐτῆς
  chosen: by her mother
  alternatives:
  - from her mother
  lexicon: BDAG
  rationale: ὑπό with the genitive marks personal agency in a passive construction,
    so 'by her mother' is the most direct rendering.
- source_word: Δός μοι
  chosen: Give me
  alternatives:
  - Give to me
  lexicon: BDAG
  rationale: Aorist imperative of δίδωμι is naturally rendered as a direct command.
    English idiom prefers 'Give me' over the more wooden 'Give to me.'
- source_word: φησίν
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The Greek uses the historical present, which can be retained in English
    for vividness. Here 'says' preserves the narrative immediacy of the source text.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  - at once here
  lexicon: BDAG
  rationale: ὧδε is a deictic adverb meaning 'here.' It likely emphasizes immediacy/location,
    and 'here' preserves that succinctly.
- source_word: ἐπὶ πίνακι
  chosen: on a platter
  alternatives:
  - on a tray
  - on a dish
  lexicon: BDAG
  rationale: πίναξ in this context refers to a serving platter or dish. 'Platter'
    is idiomatic and fits the banquet setting better than the more generic 'board'
    or less vivid 'dish.'
- source_word: τὴν κεφαλὴν
  chosen: the head
  lexicon: BDAG
  rationale: A straightforward literal rendering is required; the gruesome specificity
    is part of the narrative.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  chosen: John the Baptizer
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: βαπτιστής is a title describing John's activity. 'Baptizer' more transparently
    reflects the Greek agent noun, while 'John the Baptist' remains a familiar traditional
    alternative worth preserving in a footnote.
