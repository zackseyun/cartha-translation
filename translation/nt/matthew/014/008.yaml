theological_decisions:
- issue: Rendering of John's title βαπτιστής
  chosen_reading: John the Baptizer
  alternative_readings:
  - John the Baptist
  rationale: This is not a doctrinally contested term, but the translation philosophy
    prefers translating titles rather than defaulting to traditional name-like forms
    when the source sense is clear. 'Baptizer' preserves the descriptive force of
    the Greek title while the traditional rendering is retained in a footnote for
    reader familiarity.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
