theological_decisions:
- issue: Description of Peter's movement toward Jesus
  chosen_reading: and came toward Jesus
  alternative_readings:
  - and came to Jesus
  rationale: The Greek πρὸς marks direction toward Jesus rather than necessarily completed
    arrival. Rendering it as 'toward Jesus' preserves the narrative progression and
    avoids importing a stronger endpoint than the clause itself states.
  doctrine_reference: Preserve theological tension rather than resolve it
