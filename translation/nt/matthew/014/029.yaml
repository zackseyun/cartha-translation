id: MAT.14.29
reference: Matthew 14:29
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ἐλθέ. καὶ καταβὰς ἀπὸ τοῦ ⸀πλοίου Πέτρος περιεπάτησεν ἐπὶ τὰ ὕδατα
    ⸂καὶ ἦλθεν⸃ πρὸς τὸν Ἰησοῦν.
translation:
  text: And he said, “Come.” So Peter got down from the boat, walked on the water,
    and came toward Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and came to Jesus.' The Greek says 'came toward Jesus,' emphasizing
      movement in his direction.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐλθέ
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: Aorist imperative of ἔρχομαι, a direct summons. 'Come' is the natural
    concise English equivalent and preserves the force of Jesus' command without adding
    wording not explicit in the Greek.
- source_word: καταβὰς ἀπὸ τοῦ πλοίου
  chosen: got down from the boat
  alternatives:
  - having gotten down from the boat
  - stepped down out of the boat
  lexicon: BDAG
  rationale: The participle καταβὰς means 'having come down/gone down.' In idiomatic
    English with the following finite verbs, 'got down from the boat' best conveys
    the action naturally while preserving sequence. 'Boat' is the standard rendering
    of πλοῖον in this narrative context.
- source_word: πλοίου
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον can denote a boat or ship; in the Galilean setting and Gospel
    narrative, 'boat' is the most contextually appropriate modern English term.
- source_word: περιεπάτησεν
  chosen: walked
  alternatives:
  - began to walk
  - walked about
  lexicon: BDAG
  rationale: περιπατέω commonly means 'walk.' Although the compound can sometimes
    suggest movement about, here with ἐπὶ τὰ ὕδατα it straightforwardly describes
    Peter's walking. 'Walked' is sufficient and avoids over-interpretation.
- source_word: ἐπὶ τὰ ὕδατα
  chosen: on the water
  alternatives:
  - upon the waters
  - on the waters
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates movement/support over the surface.
    English idiom prefers singular mass noun 'water' rather than 'waters,' while still
    conveying the miraculous action.
- source_word: καὶ ἦλθεν πρὸς τὸν Ἰησοῦν
  chosen: and came toward Jesus
  alternatives:
  - and came to Jesus
  - and went toward Jesus
  lexicon: BDAG
  rationale: ἦλθεν plus πρός indicates movement in Jesus' direction. 'Toward Jesus'
    preserves the directional nuance of πρός better than the more resultative 'to
    Jesus,' which could imply arrival not stated explicitly in this clause.
- source_word: δὲ
  chosen: And
  alternatives:
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. 'And' is a natural
    English equivalent that maintains flow without overstating contrast.
