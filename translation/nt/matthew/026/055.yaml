theological_decisions:
- issue: Nuance of λῃστής in Jesus' rhetorical question
  chosen_reading: robber
  alternative_readings:
  - bandit
  - insurrectionist
  rationale: The term can carry a broader sense than simple theft, sometimes including brigandage or revolutionary violence. Here the main point is that the arresting party treats Jesus like a dangerous criminal. 'Robber' is clear and traditional enough for the main text, while preserving the broader nuance in a footnote avoids overstating a specific political sense not explicit in this verse.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
