  from: Have you come out with swords and clubs to arrest me as against a robber?
  to: Have you come out with swords and clubs to arrest me, as if I were a robber?
  rationale: The phrase 'as against a robber' is a literal but stilted rendering of the Greek `Ὡς ἐπὶ λῃστὴν`. The drafter's own lexical rationale notes that the idiom conveys 'as if I were a robber.' Using this more natural English phrasing improves the rhetorical flow and clarity of the question without losing any essential meaning. The current phrasing is grammatically defensible but feels awkward and less impactful in English.
