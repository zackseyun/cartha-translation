id: MAT.26.55
reference: Matthew 26:55
source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ὥρᾳ εἶπεν ὁ Ἰησοῦς τοῖς ὄχλοις· Ὡς ἐπὶ λῃστὴν ἐξήλθατε μετὰ μαχαιρῶν καὶ ξύλων συλλαβεῖν με; καθ’ ⸀ἡμέραν ⸂ἐν τῷ ἱερῷ ἐκαθεζόμην διδάσκων⸃ καὶ οὐκ ἐκρατήσατέ με.
translation:
  text: At that hour Jesus said to the crowds, “Have you come out with swords and clubs to arrest me, as if I were a robber? Day after day I was sitting in the temple courts teaching, and you did not seize me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bandit” or “insurrectionist”; the Greek λῃστής can denote more than a petty thief, including a violent brigand or rebel in some contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'Have you come out with swords and clubs to arrest me as against a robber?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: At that hour
  alternatives:
  - At that time
  - In that hour
  lexicon: BDAG
  rationale: A natural but still fairly formal rendering of the temporal dative phrase. 'At that hour' preserves the immediacy of the Greek better than the flatter 'at that time.'
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: ὄχλοις is plural, so 'crowds' reflects the form better than singular 'crowd.' 'Multitudes' is traditional but less natural in modern English.
- source_word: Ὡς ἐπὶ λῃστὴν
  chosen: as against a robber
  alternatives:
  - as against a bandit
  - as against an insurrectionist
  lexicon: BDAG
  rationale: The idiom conveys 'as if I were a λῃστής.' 'Robber' is the broad, accessible default. λῃστής can in some contexts suggest brigand or rebel, but this verse does not require narrowing the sense beyond 'robber'; the alternative nuance is preserved in a footnote.
- source_word: ἐξήλθατε
  chosen: have you come out
  alternatives:
  - did you come out
  - have you gone out
  lexicon: BDAG
  rationale: English present perfect works well in the rhetorical question, highlighting the action just undertaken against Jesus. 'Come out' is idiomatic from the speaker's perspective.
- source_word: μετὰ μαχαιρῶν καὶ ξύλων
  chosen: with swords and clubs
  alternatives:
  - with swords and sticks
  lexicon: BDAG
  rationale: μάχαιραι are short swords or large knives; 'swords' is the standard clear rendering. ξύλα here refers to wooden clubs/staves used as weapons; 'clubs' communicates function better than the more literal but potentially misleading 'sticks.'
- source_word: συλλαβεῖν με
  chosen: to arrest me
  alternatives:
  - to seize me
  - to capture me
  lexicon: BDAG
  rationale: In this context of an armed party sent to take Jesus, 'arrest' best captures the intended legal-hostile action in natural English. The more literal 'seize' is preserved by the later ἐκρατήσατέ με in order to avoid repetitive English while still reflecting both verbs.
- source_word: καθ’ ἡμέραν
  chosen: Day after day
  alternatives:
  - Every day
  - Daily
  lexicon: BDAG
  rationale: This idiomatic rendering preserves the distributive force of κατά with the accusative and gives the line rhetorical emphasis. 'Every day' would also be possible.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple courts
  alternatives:
  - in the temple
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary (ναός). 'Temple courts' communicates this distinction in clear English.
- source_word: ἐκαθεζόμην
  chosen: I was sitting
  alternatives:
  - I sat
  - I was seated
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing customary action. 'I was sitting' preserves the aspect better than simple past 'I sat.'
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  lexicon: BDAG
  rationale: The participle is contemporaneous with ἐκαθεζόμην; 'teaching' naturally conveys the attendant action without overcomplicating the English.
- source_word: οὐκ ἐκρατήσατέ με
  chosen: you did not seize me
  alternatives:
  - you did not arrest me
  - you did not take hold of me
  lexicon: BDAG
  rationale: κρατέω here means to take hold of or seize. Rendering it 'seize' preserves a distinction from earlier συλλαβεῖν, which was rendered 'arrest,' and reflects the irony of their failure to act openly.
