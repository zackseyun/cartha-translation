id: MAT.26.27
reference: Matthew 26:27
source:
  edition: SBLGNT
  text: καὶ ⸀λαβὼν ποτήριον καὶ εὐχαριστήσας ἔδωκεν αὐτοῖς λέγων· Πίετε ἐξ αὐτοῦ πάντες,
translation:
  text: And having taken a cup and given thanks, he gave it to them, saying, “Drink from it, all of you,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the cup.” The Greek has “a cup” without the article, though the meal context may make the referent definite.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “Drink of it, all of you.” The Greek πάντες most naturally means “all of you,” addressing the whole group.
    reason: lexical_alternative
  - marker: c
    text: Or 'And taking a cup, and after giving thanks,'.
    reason: previous_rendering
lexical_decisions:
- source_word: λαβὼν
  chosen: taking
  alternatives:
  - having taken
  - took
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb. 'Taking' preserves the participial flow in readable English; 'having taken' is more formal but heavier, while 'took' would flatten the subordinate action into another coordinate finite verb.
- source_word: ποτήριον
  chosen: a cup
  alternatives:
  - the cup
  lexicon: BDAG
  rationale: The noun lacks the article in Greek, so 'a cup' most directly reflects the form. Although the context of the meal could justify 'the cup' idiomatically, the anarthrous form is best preserved here.
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - giving thanks
  lexicon: BDAG
  rationale: The participle denotes an action prior to the main verb. 'After giving thanks' communicates the temporal sequence naturally in English while preserving the sense of thanksgiving rather than importing later sacramental terminology.
- source_word: ἔδωκεν
  chosen: he gave it
  alternatives:
  - he gave
  lexicon: BDAG
  rationale: The direct object is implicit from context ('cup'). English naturally supplies 'it' for clarity without adding new content.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Straightforward dative indirect object referring to the disciples present.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing direct speech. 'Saying' preserves the Greek construction better than converting it to a finite verb.
- source_word: Πίετε
  chosen: Drink
  alternatives:
  - Drink up
  lexicon: BDAG
  rationale: Aorist imperative plural. 'Drink' is the natural English imperative; 'Drink up' would over-specify completion not explicit in the verb.
- source_word: ἐξ αὐτοῦ
  chosen: from it
  alternatives:
  - of it
  - from this
  lexicon: BDAG
  rationale: 'ἐκ/ἐξ with the genitive indicates source: ''from it.'' Traditional ''drink ye all of it'' can be misunderstood in modern English as modifying the quantity consumed rather than the group addressed.'
- source_word: πάντες
  chosen: all of you
  alternatives:
  - all
  - every one of you
  lexicon: BDAG
  rationale: 'Placed after the imperative, πάντες most naturally addresses the whole group: ''all of you.'' This avoids the ambiguity of English ''all'' and makes clear that the command is directed to each disciple present.'
