  from: What is it that these men are testifying against you?
  to: What are these men testifying against you?
  rationale: The Greek uses a simple interrogative pronoun, τί ('What'). The draft's
    rendering 'What is it that...' is an English cleft sentence that adds a layer
    of syntactic complexity and wordiness not present in the source. A more direct
    translation, 'What are these men testifying against you?', is clearer, more concise,
    and more faithful to the straightforward Greek question. This more direct rendering
    is already present in the footnote, suggesting it is a strong alternative that
    is arguably better suited for the main text.
