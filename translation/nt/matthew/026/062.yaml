id: MAT.26.62
reference: Matthew 26:62
source:
  edition: SBLGNT
  text: καὶ ἀναστὰς ὁ ἀρχιερεὺς εἶπεν αὐτῷ· Οὐδὲν ἀποκρίνῃ; τί οὗτοί σου καταμαρτυροῦσιν;
translation:
  text: And the high priest stood up and said to him, “Do you give no answer? What
    is it that these men are testifying against you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Do you answer nothing? What are these men testifying
      against you?”
    reason: lexical_alternative
  - marker: b
    text: Or 'What is it that these men are testifying against you?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here describes the high priest's physical
    action before speaking. 'Stood up' is natural modern English and preserves the
    courtroom/dramatic force better than the more wooden 'having arisen.'
- source_word: ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for the singular office/title ἀρχιερεύς in this context.
    'High priest' is the established and accurate English equivalent for the Jewish
    chief priestly office.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - said to Jesus
  lexicon: BDAG
  rationale: The Greek uses the pronoun 'to him'; the translation preserves the explicit
    wording rather than replacing it with the referent's name.
- source_word: Οὐδὲν ἀποκρίνῃ;
  chosen: Do you give no answer?
  alternatives:
  - Do you answer nothing?
  - Have you no answer?
  lexicon: BDAG
  rationale: This question expects a response and idiomatic English prefers 'give
    no answer' or 'have no answer' over the more literal but less natural 'answer
    nothing.' The present/middle form is represented as a direct present question.
- source_word: τί
  chosen: What is it that
  alternatives:
  - What
  - Why do
  lexicon: BDAG
  rationale: τί here introduces the content/force of the accusation in an elliptical
    question. 'What is it that...' makes the English syntax clear without adding content
    beyond the Greek.
- source_word: οὗτοί
  chosen: these men
  alternatives:
  - these
  - these people
  lexicon: BDAG
  rationale: The demonstrative is masculine plural and refers to the accusers/witnesses
    present. 'These men' makes the referent explicit in natural English while remaining
    gender-accurate to the masculine form.
- source_word: σου
  chosen: against you
  alternatives:
  - about you
  - concerning you
  lexicon: BDAG
  rationale: With καταμαρτυροῦσιν, the genitive pronoun indicates testimony borne
    against the accused, not merely testimony about him. English idiom requires 'against
    you' to convey the adversative legal sense.
- source_word: καταμαρτυροῦσιν
  chosen: are testifying against
  alternatives:
  - bear witness against
  - accuse
  lexicon: BDAG
  rationale: The verb has a forensic sense of bearing testimony against someone. 'Are
    testifying against' preserves the legal nuance and the present tense better than
    the more interpretive 'accuse.'
