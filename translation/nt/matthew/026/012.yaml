id: MAT.26.12
reference: Matthew 26:12
source:
  edition: SBLGNT
  text: βαλοῦσα γὰρ αὕτη τὸ μύρον τοῦτο ἐπὶ τοῦ σώματός μου πρὸς τὸ ἐνταφιάσαι με ἐποίησεν.
translation:
  text: For When she poured this perfume on my body, she did it to prepare me for burial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for my burial"; the Greek can be rendered more compactly, but the verb includes the sense of preparing a body for burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'in pouring this perfume on my body, she did it'.
    reason: previous_rendering
lexical_decisions:
- source_word: βαλοῦσα
  chosen: in pouring
  alternatives:
  - having poured
  - by pouring
  - casting
  lexicon: BDAG
  rationale: Aorist active participle of βάλλω here idiomatically refers to applying/pouring the ointment rather than the more literal 'throwing' or 'casting.' 'In pouring' gives natural English while preserving the participial relation to the main verb.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces Jesus' explanation of the woman's action. 'For' preserves the explanatory force in a concise, natural way.
- source_word: μύρον
  chosen: perfume
  alternatives:
  - ointment
  - fragrant oil
  lexicon: BDAG
  rationale: μύρον denotes perfumed ointment/oil used for anointing. 'Perfume' is idiomatic modern English and fits the context of costly fragrant liquid, though 'ointment' is possible.
- source_word: ἐπὶ τοῦ σώματός μου
  chosen: on my body
  alternatives:
  - upon my body
  lexicon: BDAG
  rationale: ἐπί with the genitive here indicates contact/location. 'On my body' is the most natural modern rendering.
- source_word: πρὸς τὸ ἐνταφιάσαι με
  chosen: to prepare me for burial
  alternatives:
  - for my burial
  - to bury me
  lexicon: BDAG
  rationale: The preposition πρὸς with the articular infinitive expresses purpose. ἐνταφιάζω refers to preparing a body for burial/entombment, not merely the act of burying. 'To prepare me for burial' makes that nuance explicit in clear English.
- source_word: ἐποίησεν
  chosen: she did it
  alternatives:
  - she has done this
  - she did this
  lexicon: BDAG
  rationale: The verb ποιέω here functions broadly for performing the action just described. Supplying 'it' in English avoids awkward repetition and clearly links the main verb to the participial clause.
- source_word: αὕτη
  chosen: she
  alternatives:
  - this woman
  - this one
  lexicon: BDAG
  rationale: Though αὕτη is literally 'this woman/this one,' English normally uses 'she' once the referent is clear. The demonstrative force is not crucial enough here to require a more wooden rendering.
