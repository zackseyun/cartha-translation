  category: awkward_english
  tier: 1
  from: in pouring this perfume on my body, she did it
  to: When she poured this perfume on my body, she did it
  rationale: The current rendering of the aorist participle 'βαλοῦσα' as 'in pouring' creates a slightly awkward and redundant phrasing in English when paired with the main verb 'she did it' (since the 'doing' is the 'pouring'). Translating the participle with a temporal clause ('When she poured...') is a standard and effective way to render this Greek construction. It results in more natural English flow while preserving the logical relationship between the action and its purpose, a solution adopted by several major translations (e.g., NIV, NASB).
