theological_decisions:
- issue: Meaning of ἐνταφιάζω in relation to Jesus' death
  chosen_reading: The woman's act is interpreted as preparation for Jesus' burial.
  alternative_readings:
  - The act is generally 'for burial' without emphasizing preparation
  rationale: The lexical sense of ἐνταφιάζω concerns burial preparation/entombment. Rendering it as 'to prepare me for burial' preserves Jesus' anticipatory interpretation without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
revisions:
- timestamp: '2026-04-21T16:14:21Z'
