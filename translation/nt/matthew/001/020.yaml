id: MAT.1.20
reference: Matthew 1:20
source:
  edition: SBLGNT
  text: ταῦτα δὲ αὐτοῦ ἐνθυμηθέντος ἰδοὺ ἄγγελος κυρίου κατ’ ὄναρ ἐφάνη αὐτῷ λέγων·
    Ἰωσὴφ υἱὸς Δαυίδ, μὴ φοβηθῇς παραλαβεῖν ⸀Μαρίαν τὴν γυναῖκά σου, τὸ γὰρ ἐν αὐτῇ
    γεννηθὲν ἐκ πνεύματός ἐστιν ἁγίου·
translation:
  text: But as he was considering these things, behold, an angel of the Lord appeared
    to him in a dream, saying, “Joseph, son of David, do not be afraid to take Mary
    as your wife, for what has been conceived in her is from the Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to take Mary your wife.' The Greek expression refers to taking her
      into your home in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνθυμηθέντος
  chosen: was considering
  alternatives:
  - had pondered
  - was thinking about
  - had resolved
  lexicon: BDAG
  rationale: The genitive absolute denotes Joseph's ongoing internal deliberation
    about the matter. 'Was considering' captures reflective thought without overstating
    it as a settled decision.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retained as a discourse marker signaling vividness and narrative interruption.
    Though somewhat elevated in English, it preserves the force better than omitting
    it.
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The Greek lacks the article before ἄγγελος, so 'an angel of the Lord'
    is the most direct rendering here, without importing the more specific OT-sounding
    formula 'the angel of the Lord.' 'Lord' follows the default rendering for κύριος
    in DOCTRINE.md.
- source_word: κατ’ ὄναρ
  chosen: in a dream
  alternatives:
  - by a dream
  - during sleep
  lexicon: BDAG
  rationale: Idiomatic Greek expression best rendered in natural English as 'in a
    dream.'
- source_word: ἐφάνη
  chosen: appeared
  alternatives:
  - was seen
  - showed himself
  lexicon: BDAG
  rationale: Standard narrative rendering for a revelatory appearance; clear and natural
    in English.
- source_word: υἱὸς Δαυίδ
  chosen: son of David
  lexicon: BDAG
  rationale: A literal rendering preserves both genealogical and messianic-Davidic
    resonance. As direct address, it identifies Joseph in relation to Davidic lineage.
- source_word: μὴ φοβηθῇς
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: BDAG
  rationale: Natural contemporary English that preserves the prohibition and emotional
    sense of φοβέομαι.
- source_word: παραλαβεῖν Μαρίαν τὴν γυναῖκά σου
  chosen: to take Mary as your wife
  alternatives:
  - to take Mary your wife
  - to receive Mary as your wife
  lexicon: BDAG
  rationale: παραλαμβάνω here refers to taking Mary into his home in formal marriage.
    Because γυνή can mean either 'woman' or 'wife,' 'as your wife' makes the marital
    sense explicit in idiomatic English without implying a second marriage event beyond
    the context.
- source_word: γυναῖκά
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this betrothal/marital context, 'wife' is the contextual sense, not
    merely 'woman.'
- source_word: τὸ ἐν αὐτῇ γεννηθὲν
  chosen: what has been conceived in her
  alternatives:
  - what has been begotten in her
  - the child conceived in her
  - what has been generated in her
  lexicon: BDAG
  rationale: Though γεννάω often relates to begetting/bearing, in this prenatal context
    English 'conceived' best communicates the state of the child in Mary's womb. 'What'
    preserves the neuter substantival participle.
- source_word: ἐκ πνεύματός ἐστιν ἁγίου
  chosen: is from the Holy Spirit
  alternatives:
  - is of the Holy Spirit
  - comes from the Holy Spirit
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the Holy Spirit' is the clearest modern
    English rendering. The phrase is rendered with the definite article in English
    because 'Holy Spirit' functions as a recognized personal designation.
