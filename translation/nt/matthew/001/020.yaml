theological_decisions:
- issue: Rendering of κυρίου in ἄγγελος κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  - YHWH/LORD as an allusive rendering
  rationale: Following DOCTRINE.md, κύριος is rendered 'Lord.' In the genitival phrase
    'angel of the Lord,' English idiom normally includes the article before 'Lord.'
    This does not force an OT theophanic identification beyond the Greek text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Reference of πνεύματός ... ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the Holy Spirit's power
  - a holy spirit
  rationale: Within Matthew's infancy narrative, the phrase refers to the divine person,
    not an impersonal force or an indefinite spirit. The capitalization and article
    in English reflect standard identification while remaining faithful to the source's
    meaning.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §6
