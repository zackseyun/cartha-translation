id: MAT.1.12
reference: Matthew 1:12
source:
  edition: SBLGNT
  text: Μετὰ δὲ τὴν μετοικεσίαν Βαβυλῶνος Ἰεχονίας ἐγέννησεν τὸν Σαλαθιήλ, Σαλαθιὴλ
    δὲ ἐγέννησεν τὸν Ζοροβαβέλ,
translation:
  text: After the deportation to Babylon, Jeconiah fathered Shealtiel, and Shealtiel
    fathered Zerubbabel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exile to Babylon.' The Greek term refers to the forced removal of
      the people into Babylonian exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ
  chosen: After
  alternatives:
  - And after
  - Now after
  lexicon: BDAG
  rationale: μετά with the accusative marks temporal sequence ('after'). δέ here is
    a mild connective and is naturally absorbed into smooth English rather than separately
    rendered.
- source_word: τὴν μετοικεσίαν Βαβυλῶνος
  chosen: the deportation to Babylon
  alternatives:
  - the exile to Babylon
  - the relocation to Babylon
  lexicon: BDAG
  rationale: μετοικεσία denotes removal or deportation into exile. 'Deportation to
    Babylon' captures the forced movement implied by the term and fits Matthew's genealogy
    context. 'Exile to Babylon' is possible and traditional, but 'deportation' more
    clearly reflects the event as an imposed transfer.
- source_word: Ἰεχονίας
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Jechonias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention. 'Jeconiah'
    is a familiar and clear English form for Ἰεχονίας.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: In genealogical contexts γεννάω commonly means 'to father' or 'to become
    the father of.' 'Fathered' is concise, natural modern English, and preserves the
    male genealogical line without archaic tone. It is repeated consistently for both
    occurrences in the verse.
- source_word: Σαλαθιήλ
  chosen: Shealtiel
  alternatives:
  - Salathiel
  lexicon: BDAG
  rationale: The standard English biblical form corresponding to Σαλαθιήλ is 'Shealtiel.'
    This aligns with recognizable Old Testament usage while still functioning as a
    transliterated personal name.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: In the second clause δέ links successive genealogy entries. 'And' is
    the most natural English connective here.
- source_word: Ζοροβαβέλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  lexicon: BDAG
  rationale: The standard English biblical form for Ζοροβαβέλ is 'Zerubbabel,' which
    is the most recognizable transliteration in English Bible tradition.
