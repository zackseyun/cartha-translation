theological_decisions:
- issue: Rendering γεννάω in a genealogy
  chosen_reading: Use 'fathered' for direct genealogical succession without specifying
    biological immediacy beyond what Matthew's genealogy convention requires.
  alternative_readings:
  - became the father of
  - begot
  rationale: The genealogy uses conventional ancestral language. 'Fathered' preserves
    the male-line descent formula while remaining readable modern English and avoids
    importing a stricter claim than the genre itself makes.
  doctrine_reference: Translation philosophy §§1, 5, 6
