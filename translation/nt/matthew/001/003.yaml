id: MAT.1.3
reference: Matthew 1:3
source:
  edition: SBLGNT
  text: Ἰούδας δὲ ἐγέννησεν τὸν Φαρὲς καὶ τὸν Ζάρα ἐκ τῆς Θαμάρ, Φαρὲς δὲ ἐγέννησεν
    τὸν Ἑσρώμ, Ἑσρὼμ δὲ ἐγέννησεν τὸν Ἀράμ,
translation:
  text: Judah fathered Perez and Zerah by Tamar, Perez fathered Hezron, and Hezron
    fathered Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English translations have “Ram” here, reflecting a different transliteration/tradition;
      the Greek text here reads “Aram.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰούδας
  chosen: Judah
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: In the genealogy context referring to the patriarch/tribal ancestor from
    the Hebrew Scriptures, 'Judah' is the standard English transliteration and avoids
    confusion with NT figures commonly called 'Judas'.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in a genealogical sequence rather
    than a strong contrast. Rendering the final instance with 'and' improves natural
    English flow; the earlier instances are adequately represented by punctuation
    and sequencing.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in genealogies denotes male procreation/ancestry. 'Fathered' is
    accurate, concise, and readable modern English. 'Begot' is archaic; 'became the
    father of' is more cumbersome.
- source_word: Φαρὲς
  chosen: Perez
  alternatives:
  - Pharez
  - Phares
  lexicon: BDAG
  rationale: The name corresponds to Hebrew פֶּרֶץ and is commonly rendered 'Perez'
    in modern English OT usage. This aligns the Matthew genealogy with familiar Hebrew
    Bible forms while still transliterating the proper name.
- source_word: Ζάρα
  chosen: Zerah
  alternatives:
  - Zara
  lexicon: BDAG
  rationale: The Greek form reflects the Hebrew זֶרַח; 'Zerah' is the standard English
    form in the OT and best preserves canonical continuity.
- source_word: ἐκ τῆς Θαμάρ
  chosen: by Tamar
  alternatives:
  - from Tamar
  - through Tamar
  lexicon: BDAG
  rationale: ἐκ with a maternal name in a genealogy indicates maternal origin. 'By
    Tamar' is idiomatic English in genealogical style and preserves the notable mention
    of the mother without overexpanding.
- source_word: Θαμάρ
  chosen: Tamar
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name.
- source_word: Ἑσρώμ
  chosen: Hezron
  alternatives:
  - Esrom
  lexicon: BDAG
  rationale: The name corresponds to Hebrew חֶצְרוֹן and is normally rendered 'Hezron'
    in English OT tradition; this maintains continuity across the canon.
- source_word: Ἀράμ
  chosen: Aram
  alternatives:
  - Ram
  lexicon: BDAG
  rationale: The Greek text here reads Ἀράμ. The translation follows the extant Greek
    form directly rather than harmonizing to an English OT tradition. Because many
    English readers know the genealogy form 'Ram' from Ruth 4:19 and some manuscripts/traditions,
    the alternative is preserved in a footnote for auditability.
