- issue: Whether to harmonize the final name with common English OT genealogy tradition
  chosen_reading: Aram
  alternative_readings:
  - Ram
  rationale: The project prioritizes original-language primacy over translation tradition.
    Since the Greek source text provided reads Ἀράμ, the main text follows that reading.
    The familiar alternative 'Ram' is preserved in a footnote because readers may
    expect it from other biblical genealogies and translation traditions.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
