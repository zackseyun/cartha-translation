id: MAT.1.8
reference: Matthew 1:8
source:
  edition: SBLGNT
  text: Ἀσὰφ⸃ δὲ ἐγέννησεν τὸν Ἰωσαφάτ, Ἰωσαφὰτ δὲ ἐγέννησεν τὸν Ἰωράμ, Ἰωρὰμ δὲ ἐγέννησεν
    τὸν Ὀζίαν,
translation:
  text: Asaph fathered Jehoshaphat, Jehoshaphat fathered Joram, and Joram fathered
    Uzziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Asa' instead of 'Asaph'; 'Asa' also matches the Judean
      king named in the Old Testament genealogy.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀσὰφ
  chosen: Asaph
  alternatives:
  - Asa
  lexicon: BDAG
  rationale: The extant Greek text reads the personal name Ἀσάφ, which is most naturally
    transliterated 'Asaph' under the project's policy to transliterate names. However,
    in the genealogy's OT background the king intended is Asa (cf. 1 Kgs 15; 1 Chr
    3:10), so 'Asa' is preserved in a footnote as an alternative tied to the textual/genealogical
    issue rather than silently harmonizing the main text.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - then
  - ', but'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in a genealogy, not an adversative.
    English reads most naturally with 'and' linking the clauses.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: In a genealogy, γεννάω denotes direct paternal descent. 'Fathered' is
    concise, natural modern English, and preserves the genealogical force better than
    archaic 'begot' while being less cumbersome than 'became the father of'.
- source_word: Ἰωσαφάτ
  chosen: Jehoshaphat
  alternatives:
  - Joshaphat
  lexicon: BDAG
  rationale: Standard English transliteration aligned with the familiar OT royal name.
- source_word: Ἰωράμ
  chosen: Joram
  alternatives:
  - Jehoram
  lexicon: BDAG
  rationale: The Greek form Ἰωράμ is conventionally rendered 'Joram' in English. 'Jehoram'
    reflects the Hebrew fuller form, but the Greek here supports the shorter standard
    transliteration.
- source_word: Ὀζίαν
  chosen: Uzziah
  alternatives:
  - Ozias
  lexicon: BDAG
  rationale: Standard English form for the Judean king's name; more recognizable to
    modern readers than the closer Greek transliteration 'Ozias'.
