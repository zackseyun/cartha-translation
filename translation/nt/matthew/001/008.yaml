theological_decisions:
- issue: Rendering the genealogical sequence with repeated δέ and ἐγέννησεν
  chosen_reading: Compress the repeated clauses into smooth English with a final 'and'
    while retaining each father-son link.
  alternative_readings:
  - Asaph begot Jehoshaphat, and Jehoshaphat begot Joram, and Joram begot Uzziah.
  - Asaph became the father of Jehoshaphat; Jehoshaphat became the father of Joram;
    Joram became the father of Uzziah.
  rationale: This is a stylistic translation decision rather than a doctrinal one.
    Optimal equivalence favors readable modern English while preserving the genealogy's
    structure and sequence exactly.
  doctrine_reference: Translation philosophy §6
- issue: Whether to harmonize Ἀσὰφ to the expected historical name Asa in the main
    text
  chosen_reading: Keep 'Asaph' in the main text and preserve 'Asa' in a footnote.
  alternative_readings:
  - Use 'Asa' in the main text by harmonization to the OT genealogy.
  rationale: Original-language primacy requires translating the Greek form actually
    present rather than correcting it in the main text. Because the historical/genealogical
    referent is widely recognized as Asa, the alternative is preserved in a footnote
    for transparency.
  doctrine_reference: Translation philosophy §1
