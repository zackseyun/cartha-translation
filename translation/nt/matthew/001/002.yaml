id: MAT.1.2
reference: Matthew 1:2
source:
  edition: SBLGNT
  text: Ἀβραὰμ ἐγέννησεν τὸν Ἰσαάκ, Ἰσαὰκ δὲ ἐγέννησεν τὸν Ἰακώβ, Ἰακὼβ δὲ ἐγέννησεν
    τὸν Ἰούδαν καὶ τοὺς ἀδελφοὺς αὐτοῦ,
translation:
  text: Abraham fathered Isaac, and Isaac fathered Jacob, and Jacob fathered Judah
    and his brothers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'begot.' The Greek verb can also be rendered more formally as 'became
      the father of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in a genealogy refers to male procreation/ancestry. 'Fathered'
    is clear modern English and preserves the paternal genealogical force better than
    the archaic 'begot,' while being more concise and natural than 'became the father
    of.'
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  - then
  lexicon: BDAG
  rationale: In this genealogical sequence, δέ functions as a mild connective rather
    than a strong contrast. Rendering it as 'and' gives natural English flow and preserves
    the stepwise progression.
- source_word: Ἰούδαν
  chosen: Judah
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: The referent is the patriarch Judah, son of Jacob, not Judas of the New
    Testament period. 'Judah' is the standard English form that correctly signals
    the Old Testament figure.
- source_word: ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically and semantically masculine here, referring specifically
    to Judah's male brothers, the other sons of Jacob. 'His brothers' is therefore
    gender-accurate and contextually precise.
- source_word: Ἀβραάμ / Ἰσαάκ / Ἰακώβ
  chosen: Abraham / Isaac / Jacob
  lexicon: BDAG
  rationale: Per translation philosophy, personal names are transliterated by standard
    English conventions rather than translated.
