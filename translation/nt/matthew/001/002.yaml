theological_decisions:
- issue: Genealogical verb rendering
  chosen_reading: Use 'fathered' throughout the genealogy
  alternative_readings:
  - Use the traditional 'begot'
  - Use the expanded 'became the father of'
  rationale: This choice preserves the genealogical and male-line emphasis of the
    Greek without importing additional theological claims about immediate versus telescoped
    descent. It also maintains readability in modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
