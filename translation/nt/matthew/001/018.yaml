theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this narrative introduction. Translating
    it preserves meaning and aligns with the project's stated default for Χριστός
    where title is in view.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Reference of πνεύματος ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a holy spirit
  - holy spirit
  rationale: Within Matthew's infancy narrative and historic Christian orthodoxy,
    the phrase refers to the divine Holy Spirit, not an indefinite spiritual force.
    The anarthrous construction does not require indefiniteness in Greek.
  doctrine_reference: DOCTRINE.md Affirmations; translation should not undertranslate
    explicit Trinitarian/Christological claims
