id: MAT.1.18
reference: Matthew 1:18
source:
  edition: SBLGNT
  text: Τοῦ δὲ ⸀Ἰησοῦ χριστοῦ ἡ ⸀γένεσις οὕτως ἦν. ⸀μνηστευθείσης τῆς μητρὸς αὐτοῦ
    Μαρίας τῷ Ἰωσήφ, πρὶν ἢ συνελθεῖν αὐτοὺς εὑρέθη ἐν γαστρὶ ἔχουσα ἐκ πνεύματος
    ἁγίου.
translation:
  text: 'Now the birth of Jesus the Messiah happened in this way: when his mother
    Mary had been betrothed to Joseph, before they came together, she was found to
    be pregnant from the Holy Spirit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Betrothed'' refers to a formal, legally recognized commitment more binding
      than a modern engagement.'
    reason: cultural_note
  - marker: c
    text: Or 'before they came together' may imply before marital union was consummated.
    reason: lexical_alternative
lexical_decisions:
- source_word: γένεσις
  chosen: birth
  alternatives:
  - origin
  - genesis
  lexicon: BDAG
  rationale: In this context γένεσις refers to the coming-into-being/birth account
    of Jesus, not an abstract 'origin' alone. 'Birth' is the most natural English
    rendering here and fits the narrative that follows.
- source_word: Ἰησοῦ χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a fixed surname-like name, so per
    doctrine default it is translated as 'Messiah' to preserve its meaning in context.
- source_word: οὕτως ἦν
  chosen: happened in this way
  alternatives:
  - was thus
  - was like this
  lexicon: BDAG
  rationale: This idiom introduces the manner of the event. 'Happened in this way'
    is clear modern English that preserves the explanatory force.
- source_word: μνηστευθείσης
  chosen: had been betrothed
  alternatives:
  - was engaged
  - was pledged in marriage
  lexicon: BDAG
  rationale: The participle denotes formal Jewish betrothal, which was more binding
    than modern engagement. 'Betrothed' best preserves that cultural-legal sense.
- source_word: πρὶν ἢ συνελθεῖν αὐτούς
  chosen: before they came together
  alternatives:
  - before they lived together
  - before they had sexual relations
  lexicon: BDAG
  rationale: The phrase can imply marital union, including sexual consummation. 'Came
    together' preserves the Greek's modest idiom without over-specifying, while allowing
    the context to communicate the point.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - was discovered
  - was found out
  lexicon: BDAG
  rationale: The passive is retained. 'Was found' is straightforward and avoids adding
    interpretive nuance beyond the Greek.
- source_word: ἐν γαστρὶ ἔχουσα
  chosen: to be pregnant
  alternatives:
  - with child
  - having in the womb
  lexicon: BDAG
  rationale: This idiom means being pregnant. 'To be pregnant' is natural modern English;
    'with child' is traditional but less current.
- source_word: ἐκ πνεύματος ἁγίου
  chosen: from the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - from holy spirit
  lexicon: BDAG
  rationale: The preposition ἐκ indicates source/origin. 'From the Holy Spirit' best
    reflects that sense. Capitalization is warranted because the referent is the divine
    Holy Spirit in this context.
