theological_decisions:
- issue: Genealogical force of γεννάω
  chosen_reading: Rendered as direct genealogical succession ('fathered') without
    expanding to a broader 'was the ancestor of' in the main text.
  alternative_readings:
  - was the father of
  - became the father of
  - was the ancestor of
  rationale: Matthew's genealogy uses a stylized repeated formula. 'Fathered' preserves
    the lexical force and literary rhythm. Although biblical genealogies can telescope
    generations, this verse itself presents paternal succession straightforwardly,
    so no interpretive expansion is introduced into the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text plainly says without paraphrastic expansion.'
