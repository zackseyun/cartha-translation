id: MAT.1.9
reference: Matthew 1:9
source:
  edition: SBLGNT
  text: Ὀζίας δὲ ἐγέννησεν τὸν Ἰωαθάμ, Ἰωαθὰμ δὲ ἐγέννησεν τὸν Ἀχάζ, Ἀχὰζ δὲ ἐγέννησεν
    τὸν Ἑζεκίαν,
translation:
  text: Uzziah fathered Jotham, and Jotham fathered Ahaz, and Ahaz fathered Hezekiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἐγέννησεν is traditionally rendered 'begot'; here 'fathered' is used
      as a clear modern equivalent in the genealogy.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀζίας
  chosen: Uzziah
  alternatives:
  - Ozias
  rationale: Personal name transliterated by standard English convention, aligning
    the Greek form with the familiar Hebrew/OT royal name rather than preserving a
    more Greek-looking transliteration.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: In this genealogical sequence, δέ functions as a mild connective advancing
    the list. English 'and' best preserves the flow and readability of the repeated
    pattern.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in genealogies denotes direct paternal descent. 'Fathered' is
    natural modern English, more readable than archaic 'begot,' while remaining more
    concise and formal than 'became the father of.' It also allows the genealogy's
    repetitive structure to remain clear.
- source_word: Ἰωαθάμ
  chosen: Jotham
  alternatives:
  - Joatham
  rationale: Personal name transliterated according to standard English biblical usage
    corresponding to the Judean king known from the Hebrew Bible.
- source_word: Ἀχάζ
  chosen: Ahaz
  alternatives:
  - Achaz
  rationale: Personal name transliterated by standard English convention rather than
    a closer Greek-form transliteration.
- source_word: Ἑζεκίαν
  chosen: Hezekiah
  alternatives:
  - Ezekias
  rationale: Personal name transliterated according to standard English biblical usage
    corresponding to the Judean king from the Hebrew Bible.
