id: MAT.1.5
reference: Matthew 1:5
source:
  edition: SBLGNT
  text: Σαλμὼν δὲ ἐγέννησεν τὸν ⸂Βόες ἐκ τῆς Ῥαχάβ, Βόες⸃ δὲ ἐγέννησεν τὸν ⸂Ἰωβὴδ
    ἐκ τῆς Ῥούθ, Ἰωβὴδ⸃ δὲ ἐγέννησεν τὸν Ἰεσσαί,
translation:
  text: Salmon fathered Boaz by Rahab, and Boaz fathered Obed by Ruth, and Obed fathered
    Jesse,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Rahab' and 'from Ruth.' The Greek uses ἐκ with each mother's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: In Matthew's genealogy, γεννάω refers to male begetting/genealogical
    descent. 'Fathered' is natural modern English and preserves the paternal line
    more clearly than the archaic 'begot.'
- source_word: ἐκ
  chosen: by
  alternatives:
  - from
  lexicon: BDAG
  rationale: With the mother's name in a genealogical formula, ἐκ indicates maternal
    source/parentage. 'By Rahab' and 'by Ruth' is idiomatic English for this construction
    and keeps the maternal note explicit.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  - ', then'
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in a sequence, not an adversative.
    'And' best reflects the flow of the genealogy in readable English.
- source_word: Σαλμὼν
  chosen: Salmon
  alternatives:
  - Salmon (traditional transliteration)
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English biblical convention.
    'Salmon' is the established English form for Σαλμών.
- source_word: Βόες
  chosen: Boaz
  alternatives:
  - Booz
  lexicon: BDAG
  rationale: Although the Greek form is Βόες, the referent is the well-known OT figure
    Boaz. Using the standard English form aids recognition and reflects normal transliteration
    practice across testaments.
- source_word: Ῥαχάβ
  chosen: Rahab
  alternatives:
  - Rachab
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name; this also aligns
    the NT reference with the OT figure commonly known as Rahab.
- source_word: Ἰωβὴδ
  chosen: Obed
  alternatives:
  - Jobed
  lexicon: BDAG
  rationale: The Greek form reflects the Hebrew name commonly rendered 'Obed' in English.
    Using the standard English OT form preserves canonical continuity.
- source_word: Ῥούθ
  chosen: Ruth
  alternatives:
  - Routh
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, matching the OT
    book and figure.
- source_word: Ἰεσσαί
  chosen: Jesse
  alternatives:
  - Jessai
  lexicon: BDAG
  rationale: Standard English form of the name in biblical usage; preferable to a
    more mechanical transliteration because it preserves recognition and continuity.
