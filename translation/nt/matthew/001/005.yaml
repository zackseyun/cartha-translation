theological_decisions:
- issue: Genealogical formula and inclusion of mothers
  chosen_reading: Retain explicit maternal references with 'by Rahab' and 'by Ruth'
    while preserving the paternal genealogy with 'fathered.'
  alternative_readings:
  - Use 'was the father of' throughout without explicit maternal phrasing
  - Render more literally as 'begot ... from Rahab'
  rationale: The Greek text unusually names the mothers with ἐκ + genitive. The translation
    should preserve this feature without flattening it into a generic genealogy. 'Fathered
    ... by ...' keeps both the paternal line and the notable maternal inclusion visible.
  doctrine_reference: Translation philosophy §§1, 5
