id: MAT.1.7
reference: Matthew 1:7
source:
  edition: SBLGNT
  text: Σολομὼν δὲ ἐγέννησεν τὸν Ῥοβοάμ, Ῥοβοὰμ δὲ ἐγέννησεν τὸν Ἀβιά, Ἀβιὰ δὲ ἐγέννησεν
    τὸν ⸂Ἀσάφ,
translation:
  text: Solomon fathered Rehoboam, Rehoboam fathered Abijah, and Abijah fathered Asaph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Asa,' matching the king of Judah named in 1 Kings
      15 and 2 Chronicles 14–16; the Greek text here reads 'Asaph.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: In a genealogy, γεννάω refers to male procreation/descent. 'Fathered'
    is natural modern English and more concise than 'became the father of,' while
    avoiding the archaic feel of 'begot.'
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in a genealogical sequence, not
    an adversative. English 'and' best conveys the continuing chain naturally.
- source_word: Σολομών
  chosen: Solomon
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: Ῥοβοάμ
  chosen: Rehoboam
  rationale: Standard English transliteration of the personal name.
- source_word: Ἀβιά
  chosen: Abijah
  alternatives:
  - Abia
  rationale: Standard English form corresponding to the Hebrew royal name; preferable
    to the more directly Greek-based 'Abia' for reader recognition and OT continuity.
- source_word: Ἀσάφ
  chosen: Asaph
  alternatives:
  - Asa
  rationale: The printed Greek text reads Ἀσάφ. The translation follows the source
    text in the main line, while preserving the historically expected royal name 'Asa'
    in a footnote because this is a well-known textual/genealogical issue.
