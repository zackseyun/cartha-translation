theological_decisions:
- issue: Whether to harmonize Matthew's genealogy with the Old Testament king list
    by translating Ἀσάφ as 'Asa'
  chosen_reading: Retain 'Asaph' in the main text
  alternative_readings:
  - Translate/harmonize as 'Asa'
  rationale: The Greek text provided reads Ἀσάφ, so original-language primacy requires
    preserving that reading rather than silently harmonizing it to the Old Testament
    genealogy. Because readers may expect 'Asa' (the king of Judah in 1 Kings/2 Chronicles),
    the alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §5 (Consistency of key terms, or documented exception)
