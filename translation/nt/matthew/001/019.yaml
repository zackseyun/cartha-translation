id: MAT.1.19
reference: Matthew 1:19
source:
  edition: SBLGNT
  text: Ἰωσὴφ δὲ ὁ ἀνὴρ αὐτῆς, δίκαιος ὢν καὶ μὴ θέλων αὐτὴν ⸀δειγματίσαι, ἐβουλήθη
    λάθρᾳ ἀπολῦσαι αὐτήν.
translation:
  text: And Joseph, her husband, being a righteous man and not wanting to expose her
    to public disgrace, intended to divorce her quietly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her betrothed.' The Greek says 'her man/husband,' reflecting the legal
      force of Jewish betrothal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make an example of her' or 'to disgrace her publicly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to send her away privately.' In context this refers to formal divorce
      during betrothal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ αὐτῆς
  chosen: her husband
  alternatives:
  - her man
  - her betrothed
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband' depending on relational context. In
    the Matthean infancy narrative, Joseph is legally bound to Mary in betrothal,
    and the following infinitive ἀπολῦσαι ('to divorce/send away') shows a marital-legal
    relationship is in view. 'Her husband' is the most natural English rendering,
    while 'her betrothed' captures the stage of the relationship but is less directly
    lexical.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: δίκαιος here describes Joseph's moral character before God and in conduct
    toward Mary. 'Righteous' preserves the biblical-theological resonance better than
    'just,' while remaining natural in English.
- source_word: δειγματίσαι
  chosen: to expose her to public disgrace
  alternatives:
  - to make an example of her
  - to disgrace her publicly
  - to expose her
  lexicon: BDAG
  rationale: δειγματίζω carries the sense of exposing someone publicly, with shame
    implied in this context. The expanded rendering makes explicit the public-shaming
    force without overtranslating beyond the context.
- source_word: ἐβουλήθη
  chosen: intended
  alternatives:
  - resolved
  - decided
  - was minded
  lexicon: BDAG
  rationale: βούλομαι denotes a considered intention or resolve. 'Intended' is clear
    modern English and fits the narrative flow.
- source_word: λάθρᾳ
  chosen: quietly
  alternatives:
  - secretly
  - privately
  lexicon: BDAG
  rationale: λάθρᾳ means in a hidden or private manner. 'Quietly' reads naturally
    in English and pairs well with the concern to avoid public disgrace; 'secretly'
    is possible but can sound more furtive than the context requires.
- source_word: ἀπολῦσαι
  chosen: to divorce her
  alternatives:
  - to send her away
  - to dismiss her
  lexicon: BDAG
  rationale: In this Jewish betrothal context, ἀπολύω refers to ending the legally
    binding relationship, which in English is best expressed as 'divorce.' 'Send away'
    is more literal but can obscure the legal force for modern readers.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is a natural English equivalent in context.
- source_word: ὢν καὶ μὴ θέλων
  chosen: being ... and not wanting
  alternatives:
  - since he was ... and did not wish
  - because he was ... and was unwilling
  lexicon: BDAG
  rationale: The participial construction gives background for Joseph's intention.
    'Being ... and not wanting' preserves the structure with readable English.
