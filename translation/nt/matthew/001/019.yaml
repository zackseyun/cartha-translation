theological_decisions:
- issue: Characterization of Joseph as δίκαιος
  chosen_reading: Rendered as 'righteous man' without specifying whether this means
    strict law-observance, compassion, or both.
  alternative_readings:
  - '''just man'' emphasizing legal uprightness'
  - interpretive paraphrase stressing mercy
  rationale: The Greek states Joseph was δίκαιος and links this with his unwillingness
    to shame Mary publicly. The verse presents both moral uprightness and merciful
    restraint, and the translation preserves that tension rather than resolving it
    into a single doctrinal or ethical category.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Legal status of Joseph and Mary
  chosen_reading: Used 'husband' and 'divorce' in the main text.
  alternative_readings:
  - '''betrothed'' and ''break off the engagement'''
  - more literal 'man' and 'send away'
  rationale: The Greek wording and first-century Jewish betrothal context indicate
    a legally binding relationship requiring formal dissolution. The main text uses
    contemporary legal terms that communicate this clearly, while alternatives are
    preserved in footnotes.
  doctrine_reference: Original-language primacy over translation tradition; optimal
    equivalence.
