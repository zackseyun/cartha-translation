id: MAT.1.10
reference: Matthew 1:10
source:
  edition: SBLGNT
  text: Ἑζεκίας δὲ ἐγέννησεν τὸν Μανασσῆ, Μανασσῆς δὲ ἐγέννησεν τὸν ⸂Ἀμώς, Ἀμὼς⸃ δὲ
    ἐγέννησεν τὸν Ἰωσίαν,
translation:
  text: Hezekiah fathered Manasseh, Manasseh fathered Amos, and Amos fathered Josiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations read “Amon” here, harmonizing the name with the Judean
      king in 2 Kings 21; the Greek text of Matthew reads “Amos.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: In a genealogy, γεννάω refers to male begetting/descent. 'Fathered' is
    concise, natural modern English, and more readable than archaic 'begot' while
    remaining more direct than the expanded 'became the father of'.
- source_word: Ἑζεκίας
  chosen: Hezekiah
  alternatives:
  - Ezekias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English biblical convention.
    'Hezekiah' reflects the recognized English form corresponding to the Judean king.
- source_word: Μανασσῆς
  chosen: Manasseh
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: Ἀμώς
  chosen: Amos
  alternatives:
  - Amon
  lexicon: BDAG
  rationale: The SBLGNT text here reads Ἀμώς, which is transliterated 'Amos.' Although
    the Old Testament king in the genealogy is commonly known as Amon (cf. 2 Kgs 21:18–26),
    the Greek form in Matthew is Ἀμώς, not Ἀμών, so the main text follows the Greek
    source directly. The alternative is preserved in a footnote for readers aware
    of the genealogical background.
- source_word: Ἰωσίας
  chosen: Josiah
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: δέ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: In this repetitive genealogical sequence, δέ functions as a simple connective
    advancing the list. Rendering the final instance as 'and' produces smooth English;
    earlier instances are represented by punctuation rather than repeated 'and' or
    'then'.
