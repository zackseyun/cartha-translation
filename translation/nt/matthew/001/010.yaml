theological_decisions:
- issue: Genealogical naming difference between Matthew's Greek text and the Old Testament
    royal name
  chosen_reading: Follow the Greek text's personal name 'Amos' in the main text
  alternative_readings:
  - Use 'Amon' to harmonize with the Judean king named in Kings/Chronicles
  rationale: The translation philosophy prioritizes the original-language text over
    inherited translation tradition or harmonization. Since Matthew's extant Greek
    text here reads Ἀμώς, the main text should reflect that form rather than silently
    emend it to 'Amon.' Because readers may recognize the historical king as Amon,
    the alternative is preserved in a footnote rather than adopted in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names; Preserve theological tension
    rather than resolve it'
