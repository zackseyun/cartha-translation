id: MAT.1.24
reference: Matthew 1:24
source:
  edition: SBLGNT
  text: ⸀ἐγερθεὶς δὲ ὁ Ἰωσὴφ ἀπὸ τοῦ ὕπνου ἐποίησεν ὡς προσέταξεν αὐτῷ ὁ ἄγγελος κυρίου
    καὶ παρέλαβεν τὴν γυναῖκα αὐτοῦ·
translation:
  text: Then Joseph, having awakened from sleep, did as the angel of the Lord commanded
    him and took his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received his wife' or 'took his wife to himself.' The Greek verb can
      carry the sense of taking someone into one's household.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθεὶς
  chosen: having awakened
  alternatives:
  - after waking
  - when he woke up
  - having arisen
  lexicon: BDAG
  rationale: Aorist passive participle of ἐγείρω used intransitively here. 'Having
    awakened' preserves the participial sequence and the sense of waking from sleep
    without over-literal awkwardness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    gives natural English flow while preserving the connective force.
- source_word: ἀπὸ τοῦ ὕπνου
  chosen: from sleep
  alternatives:
  - from his sleep
  - out of sleep
  lexicon: BDAG
  rationale: The phrase is idiomatic for waking. 'From sleep' is concise and natural;
    'his' is not explicit in Greek and need not be supplied.
- source_word: ἐποίησεν ὡς
  chosen: did as
  alternatives:
  - did just as
  - acted as
  - did according to what
  lexicon: BDAG
  rationale: This construction expresses conformity to a command. 'Did as' is clear
    and sufficiently close to the Greek without unnecessary expansion.
- source_word: προσέταξεν
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: BDAG
  rationale: προστάσσω denotes giving an authoritative directive. 'Commanded' best
    reflects the force of the verb in this context.
- source_word: ὁ ἄγγελος κυρίου
  chosen: the angel of the Lord
  alternatives:
  - the Lord's angel
  lexicon: BDAG
  rationale: Standard and transparent rendering of the anarthrous genitive construction
    in Matthew. 'Lord' follows the doctrine's default for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The contested term κύριος is rendered by the project's default 'Lord.'
    Here the phrase echoes biblical idiom 'angel of the Lord.'
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - received
  - took into his home
  lexicon: BDAG
  rationale: παραλαμβάνω can mean take/receive to oneself. In this marriage context,
    'took' is the most direct rendering and leaves the cultural implications to context
    rather than importing explanatory wording into the main text.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  - Mary as his wife
  - the woman who was his wife
  lexicon: BDAG
  rationale: γυνή can mean woman or wife depending on context. Here, in the context
    of Joseph's betrothal and the angelic instruction, 'wife' is the natural contextual
    sense and matches Matthew's marital framing.
