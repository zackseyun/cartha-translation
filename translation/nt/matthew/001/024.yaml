theological_decisions:
- issue: Rendering γυνή in a context prior to consummation
  chosen_reading: his wife
  alternative_readings:
  - the woman
  rationale: Although the preceding narrative concerns betrothal and Joseph had not
    yet had marital relations with Mary (v. 25), Matthew already speaks of her within
    the legal-marital framework. Rendering γυνή as 'wife' reflects the text's social-legal
    context without implying consummation beyond what the passage states.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering κύριος in the phrase ἄγγελος κυρίου
  chosen_reading: the angel of the Lord
  alternative_readings:
  - the angel of Yahweh
  - the Lord's angel
  rationale: The project's contested-terms policy sets κύριος to 'Lord.' In this Matthean
    phrase, 'the angel of the Lord' preserves established biblical idiom while remaining
    faithful to the Greek.
  doctrine_reference: 'Contested terms: κύριος → Lord'
