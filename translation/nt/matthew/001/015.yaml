id: MAT.1.15
reference: Matthew 1:15
source:
  edition: SBLGNT
  text: Ἐλιοὺδ δὲ ἐγέννησεν τὸν Ἐλεάζαρ, Ἐλεάζαρ δὲ ἐγέννησεν τὸν Ματθάν, Ματθὰν δὲ
    ἐγέννησεν τὸν Ἰακώβ,
translation:
  text: Eliud fathered Eleazar, and Eleazar fathered Matthan, and Matthan fathered
    Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλιοὺδ
  chosen: Eliud
  alternatives:
  - Eliud
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: In this genealogical sequence, δέ functions as a mild connective advancing
    the list. 'And' gives natural English flow while preserving the sequential linkage
    better than a more marked 'now' or 'then'.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in a genealogy denotes male procreation/ancestry. 'Fathered' is
    accurate, readable modern English, and more natural than archaic 'begot' while
    more concise than 'became the father of'.
- source_word: τὸν
  chosen: (not separately translated)
  alternatives:
  - the
  lexicon: BDAG
  rationale: The Greek article marks the direct object before each proper name, but
    English does not normally use an article with personal names in this construction,
    so it is absorbed in idiomatic translation.
- source_word: Ἐλεάζαρ
  chosen: Eleazar
  alternatives:
  - Eleazar
  rationale: Personal name transliterated by standard English convention.
- source_word: Ματθάν
  chosen: Matthan
  alternatives:
  - Matthan
  rationale: Personal name transliterated by standard English convention.
- source_word: Ἰακώβ
  chosen: Jacob
  alternatives:
  - Jakob
  rationale: Personal name transliterated according to established English biblical
    convention as 'Jacob'.
