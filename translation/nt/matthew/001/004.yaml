id: MAT.1.4
reference: Matthew 1:4
source:
  edition: SBLGNT
  text: Ἀρὰμ δὲ ἐγέννησεν τὸν Ἀμιναδάβ, Ἀμιναδὰβ δὲ ἐγέννησεν τὸν Ναασσών, Ναασσὼν
    δὲ ἐγέννησεν τὸν Σαλμών,
translation:
  text: Aram fathered Amminadab, and Amminadab fathered Nahshon, and Nahshon fathered
    Salmon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ram.' The Greek text reads Aram (Ἀράμ), while many English versions
      use 'Ram' in harmony with the Hebrew genealogical form.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀρὰμ
  chosen: Aram
  alternatives:
  - Ram
  rationale: Personal name transliterated per project philosophy. Although this ancestor
    is often rendered 'Ram' in English genealogies influenced by Hebrew forms, the
    Greek form Ἀράμ is more directly represented by 'Aram'; the alternative is preserved
    in a footnote.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: In this genealogy δέ functions as a connective advancing the sequence
    rather than marking strong contrast. 'And' gives natural English flow while preserving
    the repeated linkage.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in genealogical contexts denotes male procreation/ancestry. 'Fathered'
    is clear modern English, more readable than archaic 'begot' and more concise than
    'became the father of.'
- source_word: Ἀμιναδάβ
  chosen: Amminadab
  alternatives:
  - Aminadab
  rationale: Personal name transliterated by standard English biblical convention.
    The doubled 'mm' reflects the familiar OT/NT English form and aids recognition
    across canon.
- source_word: Ναασσών
  chosen: Nahshon
  alternatives:
  - Naasson
  rationale: Personal name transliterated according to established English biblical
    convention corresponding to the Hebrew name, rather than a stricter letter-for-letter
    Greek transliteration.
- source_word: Σαλμών
  chosen: Salmon
  alternatives:
  - Salmon/Salmon with pronunciation note
  rationale: Personal name transliterated by standard convention. Although identical
    in spelling to the English fish name, this is the conventional biblical form for
    Σαλμών and best preserves recognizability in the genealogy.
