id: MAT.1.14
reference: Matthew 1:14
source:
  edition: SBLGNT
  text: Ἀζὼρ δὲ ἐγέννησεν τὸν Σαδώκ, Σαδὼκ δὲ ἐγέννησεν τὸν Ἀχίμ, Ἀχὶμ δὲ ἐγέννησεν
    τὸν Ἐλιούδ,
translation:
  text: Azor fathered Zadok, Zadok fathered Achim, and Achim fathered Eliud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀζώρ
  chosen: Azor
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: δέ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: Here δέ functions as a simple connective in a genealogy. Rendering the
    final instance with 'and' produces natural English while preserving the sequential
    linkage; the earlier instances are left implicit in the repeated clause structure.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: In genealogical context γεννάω denotes male begetting/ancestral descent.
    'Fathered' is concise, natural modern English, and more readable than archaic
    'begot' while remaining more direct than the expanded 'became the father of'.
- source_word: τὸν
  chosen: (not separately translated)
  alternatives:
  - the
  lexicon: Greek grammar
  rationale: The accusative article marks the direct object before each proper name
    in Greek, but English proper names in this construction do not normally take an
    article, so it is absorbed in idiomatic translation.
- source_word: Σαδώκ
  chosen: Zadok
  rationale: Personal name transliterated by standard convention.
- source_word: Ἀχίμ
  chosen: Achim
  rationale: Personal name transliterated by standard convention.
- source_word: Ἐλιούδ
  chosen: Eliud
  rationale: Personal name transliterated by standard convention.
