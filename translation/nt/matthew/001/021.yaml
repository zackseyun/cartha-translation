theological_decisions:
- issue: Rendering the emphatic subject αὐτὸς in relation to Jesus' saving work
  chosen_reading: Retained explicit emphasis with 'he himself will save'
  alternative_readings:
  - he will save
  rationale: The Greek emphasizes that Jesus personally is the one who will save his
    people. Preserving the emphasis reflects the text's christological weight without
    adding doctrinal explanation beyond the verse itself.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1 original-language
    primacy, §3 preserve theological tension rather than resolve it'
- issue: Scope of 'his people'
  chosen_reading: Translated simply as 'his people' without narrowing to Israel alone
    or expanding to all humanity
  alternative_readings:
  - his people Israel
  - all people who belong to him
  rationale: The immediate Matthean context is Jewish and covenantal, but the phrase
    itself is not further defined in this verse. The translation preserves the wording
    and leaves broader canonical interpretation to context rather than importing it
    here.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve
    theological tension rather than resolve it
