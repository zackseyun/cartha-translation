id: MAT.1.21
reference: Matthew 1:21
source:
  edition: SBLGNT
  text: τέξεται δὲ υἱὸν καὶ καλέσεις τὸ ὄνομα αὐτοῦ Ἰησοῦν, αὐτὸς γὰρ σώσει τὸν λαὸν
    αὐτοῦ ἀπὸ τῶν ἁμαρτιῶν αὐτῶν.
translation:
  text: She will bear a son, and you shall call his name Jesus, for he himself will
    save his people from their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name Jesus is the Greek form corresponding to Hebrew/Aramaic Yeshua
      (Joshua), associated with the idea 'Yahweh saves'; Matthew's explanation 'for
      he will save' reflects this wordplay.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέξεται
  chosen: will bear
  alternatives:
  - will give birth to
  lexicon: BDAG
  rationale: Future middle of τίκτω in childbirth context; 'will bear' is natural
    modern English and preserves the predictive force without unnecessary expansion.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. In English the clause reads smoothly without
    an explicit connector, so it is left untranslated to avoid stiffness while preserving
    discourse flow.
- source_word: υἱὸν
  chosen: a son
  alternatives:
  - son
  lexicon: BDAG
  rationale: Anarthrous accusative after τίκτω is idiomatically rendered 'a son' in
    English childbirth announcements.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ
  chosen: you shall call his name
  alternatives:
  - you shall name him
  - you are to call his name
  lexicon: BDAG
  rationale: This reproduces the Semitic-Greek naming formula fairly closely while
    remaining intelligible English. 'Name him' is possible, but 'call his name' better
    preserves the wording and prepares for the explanatory wordplay on the name.
- source_word: Ἰησοῦν
  chosen: Jesus
  alternatives:
  - Joshua
  lexicon: BDAG
  rationale: As a personal name, it is transliterated per project policy. Although
    the Hebrew/Aramaic form is related to Joshua/Yeshua, standard English convention
    for the NT person is 'Jesus.'
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - this one
  lexicon: BDAG
  rationale: The pronoun is emphatic in position and form. 'He himself' preserves
    the emphasis that the child personally is the agent of salvation.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanation for the naming; 'for' is concise and idiomatic
    in this explanatory register.
- source_word: σώσει
  chosen: will save
  alternatives:
  - will rescue
  - will deliver
  lexicon: BDAG
  rationale: σῴζω can mean save, rescue, or deliver, but here the object 'his people'
    and the phrase 'from their sins' make the soteriological sense primary. 'Will
    save' is the most direct and theologically appropriate rendering.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - the people belonging to him
  lexicon: BDAG
  rationale: λαός commonly means 'people,' often with covenantal overtones. 'His people'
    is natural English and preserves the possessive relationship without over-specifying
    ethnicity in the translation itself.
- source_word: ἀπὸ τῶν ἁμαρτιῶν αὐτῶν
  chosen: from their sins
  alternatives:
  - out of their sins
  - from the sins of them
  lexicon: BDAG
  rationale: ἀπό marks separation; 'from their sins' is the standard and accurate
    rendering. The plural ἁμαρτιῶν is preserved as 'sins,' indicating concrete acts/states
    rather than an abstract singular.
