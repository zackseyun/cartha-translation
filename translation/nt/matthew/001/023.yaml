  from: which translated means
  to: which is translated
  rationale: The current rendering 'which translated means' is slightly awkward, using 'translated' as an adverb modifying 'means'. A more precise and elegant rendering of the Greek `ὅ ἐστιν μεθερμηνευόμενον` ('which is, being translated') is 'which is translated'. This phrasing is cleaner, more formally correct, and maps well to the Greek structure while remaining perfectly clear in English.
