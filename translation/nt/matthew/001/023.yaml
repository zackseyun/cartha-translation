theological_decisions:
- issue: Rendering παρθένος in a verse central to the virgin conception
  chosen_reading: virgin
  alternative_readings:
  - young woman
  rationale: Within Matthew 1:23, the evangelist cites Isaiah in the context of Jesus' miraculous conception and uses the Greek term παρθένος, whose ordinary sense is 'virgin.' Given the immediate narrative context and historic orthodox affirmations, 'virgin' is the best main-text rendering. Because Isaiah 7:14 is a well-known lexical and interpretive discussion, the alternative is preserved in a footnote rather than ignored.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Force of the name explanation 'Immanuel'
  chosen_reading: Render the name meaning as 'God with us' without expanding it into a doctrinal paraphrase
  alternative_readings:
  - Add explanatory wording about incarnation
  - Render more woodenly as 'With us is God'
  rationale: The verse itself gives the interpretation of the name; the translation should preserve that wording and theological weight without importing a fuller doctrinal explanation not stated in the text. This maintains orthodoxy while avoiding interpretive overreach.
  doctrine_reference: Translation philosophy §§1, 3
