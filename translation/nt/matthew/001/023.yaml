id: MAT.1.23
reference: Matthew 1:23
source:
  edition: SBLGNT
  text: Ἰδοὺ ἡ παρθένος ἐν γαστρὶ ἕξει καὶ τέξεται υἱόν, καὶ καλέσουσιν τὸ ὄνομα αὐτοῦ Ἐμμανουήλ· ὅ ἐστιν μεθερμηνευόμενον Μεθ’ ἡμῶν ὁ θεός.
translation:
  text: Behold, the virgin will conceive and bear a son, and they will call his name Immanuel—which is translated, 'God with us.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young woman.' In Matthew's context, however, the Greek παρθένος and the surrounding birth narrative support 'virgin.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'they will call,' an indefinite plural expression.
    reason: lexical_alternative
  - marker: c
    text: Also transliterated 'Emmanuel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'which translated means'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic, attention-calling force of the discourse marker in a quotation context. 'Behold' is slightly more formal than normal modern English, but here it fittingly preserves the elevated scriptural tone without obscuring meaning.
- source_word: παρθένος
  chosen: virgin
  alternatives:
  - young woman
  lexicon: BDAG
  rationale: In Matthew's Greek, παρθένος ordinarily denotes a virgin, and in this context Matthew is explicitly presenting the conception as extraordinary in relation to Jesus' birth narrative. This also reflects the LXX wording of Isaiah 7:14 as cited here. The alternative 'young woman' is preserved in a footnote because of the broader Isaiah 7:14 discussion, but the Matthean context strongly supports 'virgin'.
- source_word: ἐν γαστρὶ ἕξει
  chosen: will conceive
  alternatives:
  - will be with child
  - will have in the womb
  lexicon: BDAG
  rationale: This idiom literally means 'will have in the womb,' but idiomatic English is 'will conceive' or 'will be with child.' 'Will conceive' is concise and pairs naturally with 'bear a son,' while preserving the future sense.
- source_word: τέξεται
  chosen: bear
  alternatives:
  - give birth to
  lexicon: BDAG
  rationale: '''Bear a son'' is natural English and preserves the formal connection to the Greek verb for childbirth. ''Give birth to'' is possible but slightly more expansive than needed.'
- source_word: υἱόν
  chosen: a son
  lexicon: BDAG
  rationale: Direct and standard rendering of the accusative object; the indefinite article is natural in English though absent in Greek.
- source_word: καλέσουσιν
  chosen: they will call
  alternatives:
  - you/people will call
  - his name will be called
  lexicon: BDAG
  rationale: The Greek is third person plural active, literally 'they will call.' This indefinite plural is best preserved rather than converted into a passive. It leaves the subject appropriately unspecified.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the Greek expression.
- source_word: Ἐμμανουήλ
  chosen: Immanuel
  alternatives:
  - Emmanuel
  lexicon: BDAG
  rationale: A standard English transliteration of the name. 'Immanuel' aligns well with the immediately supplied translation 'God with us' and reflects common transliteration practice from the Hebrew form behind the Greek.
- source_word: μεθερμηνευόμενον
  chosen: translated means
  alternatives:
  - being translated
  - which means when translated
  lexicon: BDAG
  rationale: Natural modern English for Matthew's explanatory participle, preserving the sense that the name is being interpreted for the reader.
- source_word: Μεθ’ ἡμῶν ὁ θεός
  chosen: God with us
  alternatives:
  - With us is God
  lexicon: BDAG
  rationale: This is the standard and semantically clear rendering of the name explanation. It preserves the theological weight of the title without overinterpreting it.
