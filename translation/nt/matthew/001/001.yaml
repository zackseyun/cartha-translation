id: MAT.1.1
reference: Matthew 1:1
source:
  edition: SBLGNT
  text: Βίβλος γενέσεως Ἰησοῦ χριστοῦ υἱοῦ Δαυὶδ υἱοῦ Ἀβραάμ.
translation:
  text: The book of the genealogy of Jesus the Messiah, the son of David, the son
    of Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The book of the origin' or 'The book of the birth.' The Greek word can
      carry a broader 'genesis/origin' sense, though 'genealogy' best fits the lineage
      that follows.
    reason: alternative_reading
  - marker: b
    text: 'Traditional English: ''Jesus Christ.'' Here ''Messiah'' renders the Greek
      title Χριστός.'
    reason: alternative_reading
lexical_decisions:
- source_word: Βίβλος
  chosen: The book
  alternatives:
  - A book
  - Record
  lexicon: BDAG
  rationale: βίβλος commonly denotes a book, scroll, or written record. With the anarthrous
    opening functioning as a title/header, 'The book' is idiomatic in English and
    preserves the formal, scriptural register better than the looser 'record.'
- source_word: γενέσεως
  chosen: of the genealogy
  alternatives:
  - of the origin
  - of the birth
  - of generation
  lexicon: BDAG
  rationale: γένεσις can mean origin, birth, or genealogy. In this immediate context,
    followed by a lineage and echoing genealogical formulae, 'genealogy' best fits
    Matthew's heading. The broader resonance with origins/genesis is worth preserving
    in a footnote.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, per translation
    philosophy to transliterate names.
- source_word: χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός here functions as a title rather than a fixed surname. Per doctrine
    guidance, the default rendering where title is intended is 'Messiah,' which preserves
    the Jewish royal-anointed context at the head of the Gospel.
- source_word: υἱοῦ Δαυὶδ
  chosen: the son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: υἱός literally means 'son,' and in genealogical/messianic contexts can
    denote descendant. 'Son of David' is the established and textually transparent
    messianic title; replacing it with 'descendant' would flatten the royal-theological
    force.
- source_word: υἱοῦ Ἀβραάμ
  chosen: the son of Abraham
  alternatives:
  - descendant of Abraham
  lexicon: BDAG
  rationale: As with 'son of David,' the literal 'son' preserves the genealogical
    idiom and covenantal linkage. In context it denotes descent, but the traditional
    genealogical phrasing is both accurate and theologically weighty.
