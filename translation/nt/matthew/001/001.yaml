theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term is used titularly in this verse, introducing Jesus in his messianic
    identity. Following the project's contested-terms guidance, 'Messiah' is preferred
    where title is in view; the alternative traditional rendering 'Christ' is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Sense of γενέσεως in the heading
  chosen_reading: genealogy
  alternative_readings:
  - origin
  - birth
  rationale: The immediate literary context is a lineage list, so 'genealogy' is the
    best main-text rendering. However, the Greek can also evoke 'origin' or 'genesis,'
    and Matthew may intend that resonance; this is preserved in a footnote rather
    than resolved away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
