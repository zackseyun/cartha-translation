theological_decisions:
- issue: Implication of 'until' regarding Mary's later virginity
  chosen_reading: Render ἕως οὗ simply as 'until' without implying either that marital
    relations did or did not occur afterward.
  alternative_readings:
  - Some readers infer that normal marital relations began afterward.
  - Others argue the phrase does not imply any change after the stated point.
  rationale: The Greek temporal expression sets a boundary up to Jesus's birth but
    does not itself settle later questions. To preserve theological tension and avoid
    importing denominational conclusions, the translation remains textually minimal
    and a footnote records the interpretive issue.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
