id: MAT.1.25
reference: Matthew 1:25
source:
  edition: SBLGNT
  text: καὶ οὐκ ἐγίνωσκεν αὐτὴν ἕως οὗ ἔτεκεν ⸀υἱόν· καὶ ἐκάλεσεν τὸ ὄνομα αὐτοῦ Ἰησοῦν.
translation:
  text: And he did not know her until she gave birth to a son, and he called his name
    Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'he did not have marital relations with her.' The Greek
      says 'did not know her,' using 'know' as a euphemism.
    reason: lexical_alternative
  - marker: b
    text: '''Until'' marks what was true up to Jesus''s birth; by itself it does not
      decide what happened afterward.'
    reason: alternative_reading
  - marker: c
    text: Or, more idiomatically, 'he named him Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνωσκεν
  chosen: did not know
  alternatives:
  - was not having relations with
  - did not have marital relations with
  lexicon: BDAG
  rationale: γινώσκω can function as a euphemism for sexual relations in this context.
    'Did not know' preserves the Greek idiom more formally while remaining understandable
    in context. The more explicit alternatives are interpretive expansions and are
    therefore preserved as alternatives rather than placed in the main text.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal rendering. It marks the limit up to the birth event
    without, by itself, requiring any conclusion about what happened afterward.
- source_word: ἔτεκεν
  chosen: gave birth
  alternatives:
  - bore
  lexicon: BDAG
  rationale: Modern, natural English for τίκτω. 'Bore' is more traditional but less
    current.
- source_word: υἱόν
  chosen: a son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: The anarthrous accusative is most naturally rendered indefinitely here
    as 'a son.' This avoids importing emphasis not explicit in the Greek.
- source_word: ἐκάλεσεν τὸ ὄνομα αὐτοῦ Ἰησοῦν
  chosen: he called his name Jesus
  alternatives:
  - he named him Jesus
  lexicon: BDAG
  rationale: This reproduces the Semitic-Greek expression fairly closely. 'He named
    him Jesus' is smoother English and idiomatic, but the chosen rendering keeps the
    source structure more transparent.
- source_word: Ἰησοῦν
  chosen: Jesus
  alternatives:
  - Joshua
  lexicon: BDAG
  rationale: As a personal name in the New Testament context, standard English transliteration
    is 'Jesus.' 'Joshua' reflects the underlying Hebrew/Aramaic equivalence but is
    not the conventional NT name form in English.
