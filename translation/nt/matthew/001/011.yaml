theological_decisions:
- issue: Genealogical compression in Matthew's lineage
  chosen_reading: Translate the stated genealogy straightforwardly without attempting
    to resolve historical questions in the main text.
  alternative_readings:
  - Interpret γεννάω as allowing ancestral descent rather than immediate biological
    paternity in every link
  rationale: Matthew's genealogical style can compress generations, but the translation
    should reflect the wording of the Greek rather than import harmonizing explanations.
    'Fathered' preserves the genealogical formula while leaving broader historical
    discussion outside the main text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
