id: MAT.1.11
reference: Matthew 1:11
source:
  edition: SBLGNT
  text: Ἰωσίας δὲ ἐγέννησεν τὸν Ἰεχονίαν καὶ τοὺς ἀδελφοὺς αὐτοῦ ἐπὶ τῆς μετοικεσίας
    Βαβυλῶνος.
translation:
  text: Josiah fathered Jeconiah and his brothers at the time of the deportation to
    Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “during the exile to Babylon.” The Greek term can denote forced relocation/exile;
      “deportation” highlights the event's coercive character.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: In Matthew's genealogy, γεννάω denotes male descent/genealogical fathering.
    'Fathered' is concise, natural modern English, and more readable than 'begot'
    while remaining more formally tied to the source than the expanded 'became the
    father of.'
- source_word: Ἰεχονίαν
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  rationale: Personal names are transliterated by standard English convention. 'Jeconiah'
    is a common and recognizable transliteration of Ἰεχονίας.
- source_word: ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his siblings
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and in this genealogical context
    refers to male kin. Per the translation philosophy, a gender-accurate rendering
    is preferred over a gender-neutral one.
- source_word: ἐπὶ τῆς μετοικεσίας Βαβυλῶνος
  chosen: at the time of the deportation to Babylon
  alternatives:
  - during the exile to Babylon
  - at the deportation to Babylon
  lexicon: BDAG
  rationale: μετοικεσία refers to removal/relocation, especially deportation or exile.
    'Deportation' best captures the forced nature of the event, while 'at the time
    of' reflects ἐπί with the genitive here as a temporal marker rather than strict
    spatial sense. 'To Babylon' expresses the destination implied by the genitive
    Βαβυλῶνος in this idiom.
- source_word: δὲ
  chosen: '[not separately translated]'
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ functions here as a mild connective in a genealogy. English style
    does not require an explicit equivalent in every instance, and omitting a separate
    gloss yields more natural prose without loss of meaning.
