id: MAT.1.13
reference: Matthew 1:13
source:
  edition: SBLGNT
  text: Ζοροβαβὲλ δὲ ἐγέννησεν τὸν Ἀβιούδ, Ἀβιοὺδ δὲ ἐγέννησεν τὸν Ἐλιακίμ, Ἐλιακὶμ
    δὲ ἐγέννησεν τὸν Ἀζώρ,
translation:
  text: Zerubbabel fathered Abiud, Abiud fathered Eliakim, and Eliakim fathered Azor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became the father of'; in biblical genealogies, the repeated verb can
      present lineage in a compressed form.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ζοροβαβέλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  rationale: Personal name transliterated by standard English convention rather than
    translated, following the project's policy to transliterate names. 'Zerubbabel'
    matches established English usage and the underlying historical figure.
- source_word: δέ
  chosen: — / and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: In this genealogical sequence, δέ functions as a mild connective advancing
    the list rather than marking strong contrast. English style does not require repeating
    a connective at each clause; the final 'and' preserves the cumulative flow naturally.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: γεννάω in a genealogy denotes male procreation/ancestry. 'Fathered' is
    concise, natural modern English, and more readable than archaic 'begot' while
    remaining more direct than the expanded 'became the father of'.
- source_word: Ἀβιούδ
  chosen: Abiud
  alternatives:
  - Abioud
  rationale: Personal name transliterated into standard English form. 'Abiud' is the
    conventional rendering in English New Testament genealogies.
- source_word: Ἐλιακίμ
  chosen: Eliakim
  alternatives:
  - Eliacim
  rationale: Personal name transliterated by standard English convention. 'Eliakim'
    aligns with common biblical English usage and reflects the Greek form adequately.
- source_word: Ἀζώρ
  chosen: Azor
  alternatives:
  - Azōr
  rationale: Personal name transliterated into readable modern English without diacritics,
    consistent with standard Bible translation practice.
