theological_decisions:
- issue: Rendering the genealogical verb γεννάω in a lineage that may telescope generations
  chosen_reading: fathered
  alternative_readings:
  - became the father of
  - was the ancestor of
  rationale: Matthew's genealogy uses γεννάω formulaically. 'Fathered' preserves the
    literal genealogical idiom without importing a technical claim about whether every
    link is immediate or whether some generations are compressed. 'Was the ancestor
    of' is possible in genealogical context but is less direct than the Greek's repeated
    formula, so it is not preferred in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it.'
