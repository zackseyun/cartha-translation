  from: So all the generations from Abraham to David were fourteen generations, and from David to the exile to Babylon fourteen generations, and from the exile to Babylon to the Messiah fourteen generations.
  to: So from Abraham to David there were fourteen generations, from David to the exile to Babylon fourteen generations, and from the exile to Babylon to the Messiah fourteen generations.
  rationale: The current draft creates an unbalanced sentence structure. The first clause is a complete sentence, while the subsequent two are elliptical phrases. This obscures the perfect parallelism of the three clauses in the Greek, which is a key rhetorical feature of the verse. The suggested rewrite establishes a consistent, parallel structure ('from X to Y... N generations') that is more natural in English and better reflects the balanced, formulaic nature of the source text. It also avoids the slightly redundant phrasing 'generations... were fourteen generations' in the first clause.
