id: MAT.1.17
reference: Matthew 1:17
source:
  edition: SBLGNT
  text: Πᾶσαι οὖν αἱ γενεαὶ ἀπὸ Ἀβραὰμ ἕως Δαυὶδ γενεαὶ δεκατέσσαρες, καὶ ἀπὸ Δαυὶδ ἕως τῆς μετοικεσίας Βαβυλῶνος γενεαὶ δεκατέσσαρες, καὶ ἀπὸ τῆς μετοικεσίας Βαβυλῶνος ἕως τοῦ χριστοῦ γενεαὶ δεκατέσσαρες.
translation:
  text: So from Abraham to David there were fourteen generations, from David to the exile to Babylon fourteen generations, and from the exile to Babylon to the Messiah fourteen generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Christ.' The Greek title χριστός is rendered 'Messiah' here to preserve its meaning in the genealogy's messianic climax.
    reason: alternative_reading
  - marker: b
    text: Or 'So all the generations from Abraham to David were fourteen generations, and from David to the exile to Babylon fourteen generations, and from the exile to Babylon to the Messiah fourteen generations.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πᾶσαι οὖν
  chosen: So all
  alternatives:
  - Therefore all
  - Thus all
  lexicon: BDAG
  rationale: οὖν marks an inferential or summarizing transition. 'So' gives natural modern English while preserving the summative force. Πᾶσαι with αἱ γενεαὶ is rendered 'all the generations.'
- source_word: γενεαὶ
  chosen: generations
  alternatives:
  - descents
  - genealogical generations
  lexicon: BDAG
  rationale: γενεά here refers to successive generations in a genealogy, not merely an age-group or contemporaries. 'Generations' is the standard and clearest rendering in this context.
- source_word: ἀπὸ ... ἕως
  chosen: from ... to
  alternatives:
  - from ... until
  lexicon: BDAG
  rationale: The paired prepositions mark the span between two points in the genealogy. 'From ... to' is idiomatic and accurate.
- source_word: μετοικεσίας Βαβυλῶνος
  chosen: the exile to Babylon
  alternatives:
  - the deportation to Babylon
  - the captivity in Babylon
  lexicon: BDAG
  rationale: μετοικεσία denotes removal or deportation into exile. 'Exile to Babylon' is concise, natural English and preserves the historical-theological significance of the Babylonian deportation. 'Captivity' is possible but less precise to the lexical sense of relocation.
- source_word: τοῦ χριστοῦ
  chosen: the Messiah
  alternatives:
  - the Christ
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where it functions as a title rather than a name-like form. Here the article and genealogical climax indicate a titular sense: the line culminates in the Messiah.'
- source_word: γενεαὶ δεκατέσσαρες
  chosen: fourteen generations
  alternatives:
  - there were fourteen generations
  lexicon: BDAG
  rationale: The repeated nominal phrase is rendered explicitly as 'fourteen generations.' In the first clause English requires 'were' for smoothness; the repeated structure is preserved across all three segments.
- source_word: Δαυὶδ / Ἀβραὰμ / Βαβυλῶνος
  chosen: David / Abraham / Babylon
  lexicon: standard transliteration practice
  rationale: Personal and place names are transliterated by standard English conventions, in keeping with the translation philosophy to transliterate names while translating titles.
