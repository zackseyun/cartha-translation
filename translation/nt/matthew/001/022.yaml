id: MAT.1.22
reference: Matthew 1:22
source:
  edition: SBLGNT
  text: τοῦτο δὲ ὅλον γέγονεν ἵνα πληρωθῇ τὸ ῥηθὲν ⸀ὑπὸ κυρίου διὰ τοῦ προφήτου λέγοντος·
translation:
  text: Now all this happened so that what was spoken by the Lord through the prophet
    might be fulfilled, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Now this whole thing happened.' The Greek phrase τοῦτο δὲ ὅλον emphasizes
      the entirety of the events just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Neuter singular demonstrative referring to the immediately preceding
    events as a whole; English singular 'this' best matches the discourse reference.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative continuation/transition rather than strong contrast.
    'Now' gives natural English flow while preserving the connective force.
- source_word: ὅλον
  chosen: all
  alternatives:
  - whole
  - entire
  lexicon: BDAG
  rationale: 'With τοῦτο, ὅλον emphasizes totality: ''all this'' is the most idiomatic
    English equivalent.'
- source_word: γέγονεν
  chosen: happened
  alternatives:
  - has happened
  - came to pass
  - took place
  lexicon: BDAG
  rationale: Perfect of γίνομαι can be rendered with present-result force, but in
    English narrative style 'happened' communicates the event naturally. 'Took place'
    is possible, but 'happened' is more readable modern English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' preserves the fulfillment formula
    in clear modern English without over-formality.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - might come to fulfillment
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα in Matthew's fulfillment formula
    is conventionally and accurately rendered 'might be fulfilled.' This preserves
    both the passive voice and the scriptural-fulfillment theme.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been said
  lexicon: BDAG
  rationale: Substantivized aorist passive participle of λέγω. 'What was spoken' is
    idiomatic and preserves the passive construction.
- source_word: ὑπὸ κυρίου
  chosen: by the Lord
  alternatives:
  - by the Lord God
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The phrase identifies
    the ultimate speaker behind the prophetic word. 'Lord God' would add content not
    present in the Greek.
- source_word: διὰ τοῦ προφήτου
  chosen: through the prophet
  alternatives:
  - by means of the prophet
  lexicon: BDAG
  rationale: διά with genitive indicates agency/instrumentality mediated through the
    prophet. 'Through the prophet' clearly preserves the distinction between the Lord
    as ultimate speaker and the prophet as human instrument.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - when he said
  lexicon: BDAG
  rationale: Genitive participle dependent on 'the prophet,' introducing the quotation
    that follows in the next verse. 'Saying' is the standard concise English equivalent.
