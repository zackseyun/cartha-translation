theological_decisions:
- issue: Agency in prophetic inspiration
  chosen_reading: 'The Lord is presented as the ultimate speaker, with the prophet
    as the mediating instrument: ''spoken by the Lord through the prophet.'''
  alternative_readings:
  - spoken by the prophet from the Lord
  - spoken by the Lord by means of the prophet
  rationale: The Greek distinguishes ὑπό + genitive ('by the Lord') from διά + genitive
    ('through the prophet'). The translation preserves this theological nuance without
    expanding into a doctrine of inspiration beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Fulfillment formula
  chosen_reading: 'Render Matthew''s formula in a way that preserves teleology/fulfillment
    without implying mechanical determinism beyond the text: ''so that ... might be
    fulfilled.'''
  alternative_readings:
  - with the result that ... was fulfilled
  - to fulfill what the Lord had spoken
  rationale: ἵνα + subjunctive can express purpose/result. 'So that ... might be fulfilled'
    keeps the biblical-theological tension and avoids over-resolving whether the emphasis
    is divine purpose, narrative result, or both.
  doctrine_reference: 'Translation philosophy #3'
