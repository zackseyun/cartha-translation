id: MAT.1.6
reference: Matthew 1:6
source:
  edition: SBLGNT
  text: Ἰεσσαὶ δὲ ἐγέννησεν τὸν Δαυὶδ τὸν βασιλέα. Δαυὶδ ⸀δὲ ἐγέννησεν τὸν Σολομῶνα
    ἐκ τῆς τοῦ Οὐρίου,
translation:
  text: Jesse fathered David the king. David fathered Solomon by the wife of Uriah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'from the [woman] of Uriah,' an elliptical expression meaning
      'by Uriah's wife.' Matthew does not name Bathsheba here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in genealogical contexts denotes male procreation/ancestry. 'Fathered'
    is natural modern English and preserves the male-genealogical force better than
    the archaic 'begot.'
- source_word: βασιλέα
  chosen: the king
  alternatives:
  - king
  lexicon: BDAG
  rationale: 'The article τὸν is retained in sense: David is identified specifically
    as ''the king,'' highlighting his royal status in the genealogy.'
- source_word: ἐκ τῆς τοῦ Οὐρίου
  chosen: by the wife of Uriah
  alternatives:
  - from her of Uriah
  - by her who had been Uriah's wife
  lexicon: BDAG
  rationale: The Greek literally says 'from the [woman] of Uriah,' with 'woman/wife'
    implied. In idiomatic English, 'by the wife of Uriah' best conveys the elliptical
    expression while preserving Matthew's deliberate avoidance of Bathsheba's name
    and his emphasis on her relation to Uriah.
- source_word: Ἰεσσαὶ
  chosen: Jesse
  rationale: Standard English transliteration of the proper name Ἰεσσαί.
- source_word: Δαυὶδ
  chosen: David
  rationale: Standard English transliteration of Δαυίδ.
- source_word: Σολομῶνα
  chosen: Solomon
  rationale: Standard English transliteration of Σολομών.
- source_word: Οὐρίου
  chosen: Uriah
  rationale: Standard English transliteration of Οὐρίας.
- source_word: δέ
  chosen: —
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ functions here as a mild connective in a genealogy. English style
    does not require an explicit conjunction at each link, so it is left untranslated
    for readability while the sequence remains clear.
