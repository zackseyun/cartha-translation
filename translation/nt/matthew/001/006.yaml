theological_decisions:
- issue: Matthew's indirect reference to Bathsheba
  chosen_reading: Retain the indirect expression 'by the wife of Uriah' rather than
    supplying Bathsheba's name.
  alternative_readings:
  - by Bathsheba
  - by her who had been the wife of Uriah
  rationale: The Greek intentionally identifies the woman through Uriah, which preserves
    the narrative and moral resonance of 2 Samuel rather than neutralizing it with
    the familiar name 'Bathsheba.' This is a literary-theological feature of Matthew's
    genealogy and should remain visible in translation.
  doctrine_reference: Translation philosophy §§1, 3, 5
