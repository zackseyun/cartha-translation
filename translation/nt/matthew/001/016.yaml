theological_decisions:
- issue: Rendering Χριστός in a christological identification formula
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: The phrase ὁ λεγόμενος χριστός presents χριστός as a title. Following the project's contested-terms guidance, the title is translated rather than transliterated to preserve its messianic sense in context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → ''Messiah'' where title; ''Christ'' where name-like'
- issue: Genealogical wording shift from Joseph's fathering to Jesus' birth
  chosen_reading: Joseph is said to be fathered by Jacob, but Jesus is said to be born from Mary
  rationale: The Greek intentionally changes from active ἐγέννησεν ('fathered') in the genealogy to passive ἐγεννήθη with feminine ἐξ ἧς ('from whom'), indicating that Jesus' birth is traced through Mary in this clause rather than stating that Joseph fathered Jesus. The translation preserves this distinction without adding doctrinal explanation beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T12:44:03Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/001/016.json
  category: awkward_english
  tier: 1
  from: from whom Jesus was born, who is called the Messiah
  to: from whom was born Jesus, who is called the Messiah
  rationale: The current word order separates the subject 'Jesus' from its modifying relative clause 'who is called...' by the verb 'was born'. This slightly weakens the connection between the name and the title. Inverting the subject and verb ('was born Jesus') places 'Jesus' directly before the clause that modifies it. This better reflects the tight appositional structure in the Greek ('Ἰησοῦς ὁ λεγόμενος χριστός') and improves the sentence's flow and clarity.
