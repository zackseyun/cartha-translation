id: MAT.1.16
reference: Matthew 1:16
source:
  edition: SBLGNT
  text: Ἰακὼβ δὲ ἐγέννησεν τὸν Ἰωσὴφ τὸν ἄνδρα Μαρίας, ἐξ ἧς ἐγεννήθη Ἰησοῦς ὁ λεγόμενος χριστός.
translation:
  text: And Jacob fathered Joseph, the husband of Mary, from whom was born Jesus, who is called the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who is called the Christ.' The Greek title Christos is rendered 'Messiah' here because it functions as a title, not yet as a name-like form.
    reason: alternative_reading
  - marker: b
    text: Or 'from whom Jesus was born, who is called the Messiah'.
    reason: previous_rendering
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - and
  lexicon: BDAG
  rationale: δέ here lightly advances the genealogy. 'And' is natural English and preserves the connective function without overemphasizing contrast.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: BDAG
  rationale: γεννάω in the genealogy denotes male begetting/descent. 'Fathered' is concise, natural modern English, and preserves the genealogical force better than archaic 'begot'.
- source_word: ἄνδρα
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; with the genitive 'of Mary' the marital sense is clearly intended. 'Husband' makes the relationship explicit in English.
- source_word: ἐξ ἧς
  chosen: from whom
  alternatives:
  - of whom
  - from her
  lexicon: BDAG
  rationale: The feminine singular relative pronoun refers specifically to Mary, marking a break from the repeated male-line formula in the genealogy. 'From whom' preserves both the feminine reference and the preposition ἐκ.
- source_word: ἐγεννήθη
  chosen: was born
  alternatives:
  - was begotten
  lexicon: BDAG
  rationale: The passive of γεννάω here shifts from active male begetting to Jesus' birth from Mary. 'Was born' is idiomatic modern English and highlights the deliberate change in wording.
- source_word: ὁ λεγόμενος
  chosen: who is called
  alternatives:
  - the one called
  - who is said to be
  lexicon: BDAG
  rationale: The participial expression identifies Jesus by the title commonly applied to him. 'Who is called' is the most straightforward and natural rendering.
- source_word: χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered ''Messiah'' where it functions as a title rather than a name-like form. Here it is clearly titular: ''Jesus ... who is called the Messiah.'''
