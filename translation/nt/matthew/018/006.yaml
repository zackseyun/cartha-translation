theological_decisions:
- issue: Scope of 'little ones'
  chosen_reading: Rendered broadly as vulnerable believers ('these little ones who
    believe in me') rather than restricting the phrase to children alone.
  alternative_readings:
  - these children who believe in me
  rationale: The immediate context includes a child as an enacted illustration, but
    the added qualifier 'who believe in me' broadens the reference to disciples characterized
    by lowliness or vulnerability. The translation preserves that breadth without
    importing a narrower doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
