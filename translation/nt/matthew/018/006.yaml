id: MAT.18.6
reference: Matthew 18:6
source:
  edition: SBLGNT
  text: Ὃς δ’ ἂν σκανδαλίσῃ ἕνα τῶν μικρῶν τούτων τῶν πιστευόντων εἰς ἐμέ, συμφέρει
    αὐτῷ ἵνα κρεμασθῇ μύλος ὀνικὸς ⸀εἰς τὸν τράχηλον αὐτοῦ καὶ καταποντισθῇ ἐν τῷ
    πελάγει τῆς θαλάσσης.
translation:
  text: But whoever causes one of these little ones who believe in me to stumble,
    it is better for him that a donkey-driven millstone be hung around his neck and
    that he be drowned in the open sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causes one of these little ones who believe in me to sin.' The Greek
      verb can mean to cause someone to stumble, fall away, or sin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a donkey millstone,' that is, a large millstone turned by a donkey.
    reason: cultural_note
  - marker: c
    text: Or 'in the depth of the sea.' The Greek more specifically refers to the
      open sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίσῃ
  chosen: causes ... to stumble
  alternatives:
  - causes ... to sin
  - offends
  - ensnares
  lexicon: BDAG
  rationale: The verb σκανδαλίζω can denote causing someone to stumble, fall away,
    or sin. 'Causes ... to stumble' preserves the metaphor present in the Greek while
    remaining natural English. 'Causes ... to sin' is interpretive and narrower; the
    context includes spiritual ruin more broadly.
- source_word: μικρῶν τούτων
  chosen: these little ones
  alternatives:
  - these little children
  - these insignificant ones
  lexicon: BDAG
  rationale: μικρός here likely refers not merely to age but to those regarded as
    small or vulnerable. 'These little ones' preserves the broader sense and fits
    the immediate discourse without restricting the referent to children only.
- source_word: τῶν πιστευόντων εἰς ἐμέ
  chosen: who believe in me
  alternatives:
  - who have faith in me
  - who trust in me
  lexicon: BDAG
  rationale: The participial phrase identifies the little ones as believers. 'Who
    believe in me' is the most direct and idiomatic rendering of πιστεύω εἰς with
    personal object. Alternatives are possible, but this best matches standard Johannine/Synoptic
    usage without overcomplication.
- source_word: συμφέρει αὐτῷ
  chosen: it is better for him
  alternatives:
  - it is more profitable for him
  - it benefits him
  lexicon: BDAG
  rationale: συμφέρει literally conveys advantage or benefit. In this warning context,
    idiomatic English prefers 'it is better for him,' conveying comparative advantage
    in a grim hypothetical.
- source_word: μύλος ὀνικὸς
  chosen: a donkey-driven millstone
  alternatives:
  - a great millstone
  - a millstone turned by a donkey
  - a large millstone
  lexicon: BDAG
  rationale: ὀνικός specifies relation to a donkey, distinguishing a large millstone
    from a small hand-mill. 'Donkey-driven millstone' concisely preserves the image
    and size implication better than the traditional but less explicit 'great millstone.'
- source_word: εἰς τὸν τράχηλον αὐτοῦ
  chosen: around his neck
  alternatives:
  - upon his neck
  - on his neck
  lexicon: BDAG
  rationale: Though εἰς is literally 'into/onto,' with hanging imagery English idiom
    is 'around his neck.' This accurately conveys the intended physical picture.
- source_word: καταποντισθῇ
  chosen: he be drowned
  alternatives:
  - he be sunk
  - he be cast into the depths
  - he be plunged
  lexicon: BDAG
  rationale: The passive verb denotes being plunged or drowned in deep water. 'Be
    drowned' communicates the result clearly in natural English, while retaining the
    severity of the image.
- source_word: ἐν τῷ πελάγει τῆς θαλάσσης
  chosen: in the open sea
  alternatives:
  - in the depth of the sea
  - in the deep sea
  - in the sea's expanse
  lexicon: BDAG
  rationale: πέλαγος refers to the open sea, the deep expanse away from shore. 'In
    the open sea' is more lexically precise than the traditional 'in the depth of
    the sea,' which reflects interpretation rather than the noun's basic sense.
