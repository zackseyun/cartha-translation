id: MAT.18.21
reference: Matthew 18:21
source:
  edition: SBLGNT
  text: Τότε προσελθὼν ⸂αὐτῷ ὁ Πέτρος εἶπεν⸃· Κύριε, ποσάκις ἁμαρτήσει εἰς ἐμὲ ὁ ἀδελφός
    μου καὶ ἀφήσω αὐτῷ; ἕως ἑπτάκις;
translation:
  text: Then Peter came up to him and said, “Lord, how many times will my brother
    sin against me and I forgive him? Up to seven times?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my brother or sister'; the Greek says 'my brother' (masculine singular),
      which may in context refer more broadly to a fellow disciple.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal-sequential discourse marker; 'Then' is natural English
    and preserves narrative flow.
- source_word: προσελθὼν
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι indicates approaching Jesus before speaking.
    'Came up' is readable modern English and fits the narrative setting without sounding
    overly formal.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun referring to Jesus; rendered explicitly in idiomatic English
    with the motion verb.
- source_word: ὁ Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention per translation philosophy.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: λέγω is the standard speech verb. Although the content is interrogative,
    'said' more directly reflects the Greek than interpretive 'asked'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this direct address to Jesus, 'Lord' preserves both respect and possible theological
    resonance better than 'Master'.
- source_word: ποσάκις
  chosen: how many times
  alternatives:
  - how often
  lexicon: BDAG
  rationale: The adverb here concerns numerical frequency. 'How many times' fits the
    following numeric limit ('up to seven times?') more precisely than the broader
    'how often.'
- source_word: ἁμαρτήσει εἰς ἐμὲ
  chosen: will ... sin against me
  alternatives:
  - sins against me
  lexicon: BDAG
  rationale: Future indicative ἁμαρτήσει is preserved with 'will ... sin.' The preposition
    εἰς with ἐμέ is idiomatically rendered 'against me,' expressing offense directed
    toward Peter.
- source_word: ὁ ἀδελφός μου
  chosen: my brother
  alternatives:
  - my fellow believer
  - my brother or sister
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per gender-accurate philosophy,
    'my brother' best matches the source form and immediate wording. Broader interpretive
    expansions are not placed in the main text.
- source_word: καὶ ἀφήσω αὐτῷ
  chosen: and I forgive him
  alternatives:
  - and I let it go for him
  - and I pardon him
  lexicon: BDAG
  rationale: ἀφίημι in this ethical context means forgive/remit. The future 'I forgive'
    preserves the Greek tense and coordinates with the prior future verb.
- source_word: ἕως ἑπτάκις
  chosen: Up to seven times?
  alternatives:
  - As many as seven times?
  lexicon: BDAG
  rationale: ἕως marks the proposed upper limit and ἑπτάκις means 'seven times.' 'Up
    to seven times?' is concise, natural, and preserves Peter's suggested limit.
