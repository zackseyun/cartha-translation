theological_decisions:
- issue: Scope of ἀδελφός in context
  chosen_reading: Rendered literally as 'my brother' in the main text.
  alternative_readings:
  - my brother or sister
  - a fellow disciple
  rationale: The Greek is masculine singular and may function representatively in
    context, but the source wording is not explicitly gender-inclusive here. Per doctrine,
    gender-accurate rendering is preferred, with inclusivity concerns preserved in
    a footnote rather than expanded in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
