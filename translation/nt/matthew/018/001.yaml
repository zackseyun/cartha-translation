theological_decisions:
- issue: Rendering Matthew's reverential phrase βασιλεία τῶν οὐρανῶν
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the kingdom of the heavens
  rationale: The phrase is translated idiomatically rather than hyper-literally. This
    preserves Matthew's wording and theological register without importing a distinct
    doctrinal nuance beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
