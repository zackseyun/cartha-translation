id: MAT.18.1
reference: Matthew 18:1
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῃ τῇ ὥρᾳ προσῆλθον οἱ μαθηταὶ τῷ Ἰησοῦ λέγοντες· Τίς ἄρα μείζων ἐστὶν
    ἐν τῇ βασιλείᾳ τῶν οὐρανῶν;
translation:
  text: At that time the disciples came to Jesus, saying, “Who then is greater in
    the kingdom of heaven?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Who then is greatest in the kingdom of heaven?” The Greek adjective
      is comparative (“greater”), though English often expresses the idea with a superlative
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: At that time
  alternatives:
  - At that hour
  - At that moment
  lexicon: BDAG
  rationale: The idiom literally reads 'in that hour,' but in narrative English 'at
    that time' best conveys the temporal sense without sounding overly wooden. 'Hour'
    here is not primarily a clock-time reference.
- source_word: προσῆλθον
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: The verb προσέρχομαι often means 'come to/approach.' 'Came' is natural
    modern English here and sufficiently captures movement toward Jesus; 'approached'
    is possible but slightly stiffer.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering for μαθηταί in the Gospels.
    It preserves the established sense of Jesus' followers as disciples.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  lexicon: BDAG
  rationale: Dative object after προσῆλθον is naturally rendered with 'to.' The personal
    name is transliterated per project philosophy.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - asking
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is well represented
    by 'saying.' 'Asking' would interpret the content rather than translate the participle
    directly.
- source_word: Τίς
  chosen: Who
  lexicon: BDAG
  rationale: Interrogative pronoun referring to a person; 'who' is the direct equivalent.
- source_word: ἄρα
  chosen: then
  alternatives:
  - really
  - indeed
  - after all
  lexicon: BDAG
  rationale: ἄρα adds inferential or consequential force. 'Then' captures the discourse
    connection in idiomatic English without overtranslating.
- source_word: μείζων
  chosen: greater
  alternatives:
  - greatest
  - more important
  lexicon: BDAG
  rationale: The comparative adjective literally means 'greater.' Although English
    idiom might expect 'greatest' in this context, the Greek form is comparative,
    so 'greater' preserves the source wording more closely while remaining understandable.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: in the kingdom of heaven
  alternatives:
  - in the kingdom of the heavens
  - in heaven's kingdom
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression corresponding to 'kingdom
    of God' elsewhere. 'Kingdom of heaven' is the established and accurate rendering;
    the plural 'heavens' is not normally retained in idiomatic English here.
