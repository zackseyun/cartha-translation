id: MAT.18.2
reference: Matthew 18:2
source:
  edition: SBLGNT
  text: καὶ ⸀προσκαλεσάμενος παιδίον ἔστησεν αὐτὸ ἐν μέσῳ αὐτῶν
translation:
  text: And calling a child to himself, he stood him in their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set him among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: calling ... to himself
  alternatives:
  - having called
  - summoning
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι, indicating that Jesus caused
    the child to come near to himself before the main action. 'Calling ... to himself'
    preserves the middle nuance better than a bare 'calling' and reads naturally in
    English.
- source_word: παιδίον
  chosen: a child
  alternatives:
  - a little child
  - a young child
  lexicon: BDAG
  rationale: παιδίον denotes a child, often young, but the diminutive force need not
    be pressed in every context. 'A child' is clear modern English and avoids adding
    emphasis beyond what the verse itself requires.
- source_word: ἔστησεν
  chosen: stood
  alternatives:
  - set
  - placed
  lexicon: BDAG
  rationale: Aorist active of ἵστημι here means to cause someone to stand. 'Stood
    him' is a more literal rendering that preserves the verbal idea of standing rather
    than the more generalized 'placed' or 'set.'
- source_word: ἐν μέσῳ αὐτῶν
  chosen: in their midst
  alternatives:
  - among them
  - in the middle of them
  lexicon: BDAG
  rationale: The phrase means in the middle/among them. 'In their midst' is idiomatic,
    concise, and preserves the spatial focus of the Greek.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Simple connective linking this action to the previous context. 'And'
    is the most straightforward rendering.
- source_word: αὐτὸ
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: Although παιδίον is grammatically neuter, the referent is a personal
    child. English appropriately uses personal 'him' here for the specific child in
    view rather than impersonal 'it.'
