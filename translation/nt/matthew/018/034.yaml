id: MAT.18.34
reference: Matthew 18:34
source:
  edition: SBLGNT
  text: καὶ ὀργισθεὶς ὁ κύριος αὐτοῦ παρέδωκεν αὐτὸν τοῖς βασανισταῖς ἕως οὗ ἀποδῷ
    πᾶν τὸ ⸀ὀφειλόμενον.
translation:
  text: And in anger his master handed him over to the torturers until he should pay
    all that was owed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Lord'': the Greek word is kyrios. Here it refers to the servant''s
      master within the parable, so ''master'' is used in the main text.'
    reason: alternative_reading
  - marker: b
    text: Or 'tormentors' or, less strongly, 'jailers.' The Greek term refers to those
      who inflict torment, not merely ordinary guards.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργισθεὶς
  chosen: in anger
  alternatives:
  - being angry
  - having become angry
  - angry
  lexicon: BDAG
  rationale: Aorist passive participle of ὀργίζομαι, functioning adverbially before
    the main verb. 'In anger' is natural English and preserves the causal/emotional
    force without over-expanding.
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here it refers within
    the parable to the servant's human superior, not directly to God or Christ. 'Master'
    best fits the narrative relationship and avoids implying a christological title
    in the main text.
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered
  - turned over
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over or deliver into another's control.
    'Handed ... over' is idiomatic and preserves the judicial sense in context.
- source_word: βασανισταῖς
  chosen: the torturers
  alternatives:
  - the jailers
  - the tormentors
  lexicon: BDAG
  rationale: βασανιστής denotes one who subjects someone to torture/torment, not merely
    a generic prison guard. 'Torturers' preserves the severity of the term and the
    parable's warning. 'Jailers' is too weak unless interpretively softened.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: Standard temporal construction. Simple 'until' is sufficient in English.
- source_word: ἀποδῷ
  chosen: he should pay
  alternatives:
  - he pays
  - he might repay
  lexicon: BDAG
  rationale: Aorist subjunctive after ἕως οὗ expresses the anticipated endpoint. 'Should
    pay' preserves the prospective sense better than a flat present.
- source_word: πᾶν τὸ ὀφειλόμενον
  chosen: all that was owed
  alternatives:
  - the whole debt
  - everything owed
  lexicon: BDAG
  rationale: The participial expression literally means 'all the thing being owed.'
    'All that was owed' is clear, natural, and closely reflects the Greek without
    importing 'debt' where the text uses a broader owed-amount expression.
