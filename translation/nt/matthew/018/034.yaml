theological_decisions:
- issue: Whether κύριος should be rendered with the doctrinal default 'Lord'
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The doctrine file gives 'Lord' as the default for κύριος, but also requires
    original-language primacy and context-sensitive rendering. In this parable, κύριος
    refers to the servant's earthly lord/master. Rendering it 'master' preserves the
    narrative sense and avoids unnecessarily elevating the term into a title in the
    main text, while still allowing readers to perceive the parable's theological
    implications.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy
    points 1 and 5'
- issue: Severity of βασανισταῖς in a parabolic/judgment context
  chosen_reading: torturers
  alternative_readings:
  - jailers
  - tormentors
  rationale: The verse depicts punitive custody with severe connotations. Choosing
    'torturers' preserves the lexical force and the parable's warning without resolving
    broader doctrinal questions about final judgment beyond what the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
