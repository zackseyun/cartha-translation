id: MAT.18.23
reference: Matthew 18:23
source:
  edition: SBLGNT
  text: Διὰ τοῦτο ὡμοιώθη ἡ βασιλεία τῶν οὐρανῶν ἀνθρώπῳ βασιλεῖ ὃς ἠθέλησεν συνᾶραι
    λόγον μετὰ τῶν δούλων αὐτοῦ·
translation:
  text: For this reason the kingdom of heaven has become like a king who wanted to
    settle accounts with his slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants'; Greek 'slaves' (δοῦλοι), emphasizing their
      bonded status under the king.
    reason: alternative_reading
  - marker: b
    text: Greek 'was likened to' or 'was compared to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: Captures the inferential/causal force linking this parable to the preceding
    teaching. 'For this reason' is natural English and preserves the explanatory connection.
- source_word: ὡμοιώθη
  chosen: has become like
  alternatives:
  - was compared to
  - is like
  lexicon: BDAG
  rationale: Aorist passive of ὁμοιόω, literally 'was made like' or 'was likened to.'
    'Has become like' gives idiomatic English while preserving the comparison introduced
    by the passive form. 'Is like' is common in English but flattens the verbal aspect
    and passive nuance.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. Singular 'heaven' is idiomatic in English
    while preserving Matthew's reverential circumlocution for God's reign.
- source_word: ἀνθρώπῳ βασιλεῖ
  chosen: a king
  alternatives:
  - a man, a king
  - a human king
  lexicon: BDAG
  rationale: The dative phrase means 'to a man, a king,' with βασιλεῖ specifying the
    kind of man. English naturally compresses this to 'a king' without loss of sense.
    'Human king' is unnecessarily marked here.
- source_word: ἠθέλησεν
  chosen: wanted
  alternatives:
  - wished
  - decided
  lexicon: BDAG
  rationale: θέλω here expresses volition or intention. 'Wanted' is straightforward
    modern English and fits the narrative register.
- source_word: συνᾶραι λόγον
  chosen: to settle accounts
  alternatives:
  - to settle a reckoning
  - to audit accounts
  - to take account
  lexicon: BDAG
  rationale: This idiom refers to calling servants to account financially. 'Settle
    accounts' is clear, idiomatic, and preserves the economic/judicial sense of reckoning.
- source_word: μετὰ τῶν δούλων αὐτοῦ
  chosen: with his slaves
  alternatives:
  - with his servants
  - with his bondservants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave depending on context. In this parable
    the bonded, owned status under a king and the debt-accounting context make 'slaves'
    the more transparent rendering under the project's doctrine, which prefers 'slave'
    where bonded status is salient.
