theological_decisions:
- issue: Rendering of δοῦλος in a parabolic royal-economic context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: Following the doctrine's contested-terms guidance, δοῦλος is rendered
    'slave' where bonded status is contextually salient. Here the king's authority
    and the financial reckoning emphasize ownership and obligation more than hired
    service. 'Servants' is preserved as an alternative because some English traditions
    prefer it in parables for readability.
