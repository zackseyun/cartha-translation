theological_decisions:
- issue: Representative identification between the child and Jesus
  chosen_reading: The verse states that receiving a child of this kind in Jesus' name
    is equivalent to receiving Jesus himself.
  alternative_readings:
  - The verse could be softened to mean merely honoring Jesus by such reception.
  rationale: The direct object shift from 'one such child' to 'me' with the same verb
    δέχομαι presents a strong representative identification. The translation preserves
    this without adding sacramental or ecclesial implications not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
