id: MAT.18.5
reference: Matthew 18:5
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἐὰν δέξηται ⸂ἓν παιδίον τοιοῦτο⸃ ἐπὶ τῷ ὀνόματί μου, ἐμὲ δέχεται.
translation:
  text: And whoever receives one such child in my name receives me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcomes.' The Greek verb can mean 'receive,' 'welcome,' or 'accept.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'one such child'; the Greek does not include the adjective 'little'
      in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἐὰν
  chosen: whoever
  alternatives:
  - if anyone
  - whoever may
  lexicon: BDAG
  rationale: The relative pronoun with ἐάν forms an indefinite/general condition.
    'Whoever' is idiomatic English and preserves the generic force better than a more
    wooden 'who if ever.'
- source_word: δέξηται / δέχεται
  chosen: receives / receives
  alternatives:
  - welcomes
  - accepts
  lexicon: BDAG
  rationale: 'δέχομαι can mean receive, welcome, or accept. ''Receives'' preserves
    the lexical repetition between the two clauses and keeps the connection explicit:
    receiving the child is receiving Jesus. ''Welcomes'' is possible and idiomatic
    in context, but ''receives'' better reflects the repeated Greek verb.'
- source_word: ἓν παιδίον τοιοῦτο
  chosen: one such child
  alternatives:
  - one child like this
  - one such little child
  lexicon: BDAG
  rationale: παιδίον denotes a child. The phrase means 'one such child,' referring
    back to the child Jesus has set before them and, by extension, one characterized
    like this child. 'Little child' is traditional but μικρόν is not present here,
    so it is not added to the main text.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - because of my name
  lexicon: BDAG
  rationale: The prepositional phrase indicates reception done with reference to Jesus'
    name, authority, or allegiance. 'In my name' is the most natural and established
    English rendering and adequately preserves the semantic range without over-specifying
    one nuance.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: The emphatic accusative is naturally rendered by standard English object
    position. English does not require additional emphasis marking here, and the sentence-final
    correspondence already highlights the identification.
