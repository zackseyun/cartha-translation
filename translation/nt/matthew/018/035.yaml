id: MAT.18.35
reference: Matthew 18:35
source:
  edition: SBLGNT
  text: Οὕτως καὶ ὁ πατήρ μου ὁ ⸀οὐράνιος ποιήσει ὑμῖν ἐὰν μὴ ἀφῆτε ἕκαστος τῷ ἀδελφῷ
    αὐτοῦ ἀπὸ τῶν καρδιῶν ⸀ὑμῶν.
translation:
  text: So also my heavenly Father will do to you, if each of you does not forgive
    his brother from your hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unless each one forgives his brother.'
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' translates the masculine singular Greek; in context it
      functions representatively for each fellow disciple or fellow believer.'
    reason: cultural_note
lexical_decisions:
- source_word: Οὕτως καὶ
  chosen: So also
  alternatives:
  - In the same way also
  - Thus also
  lexicon: BDAG
  rationale: Introduces the application of the preceding parable. 'So also' is natural
    English and preserves the inferential/comparative force without sounding wooden.
- source_word: ὁ πατήρ μου ὁ οὐράνιος
  chosen: my heavenly Father
  alternatives:
  - my Father in heaven
  - my Father, the heavenly one
  lexicon: BDAG
  rationale: A standard idiomatic rendering that preserves both possession ('my')
    and the adjectival qualifier 'heavenly.' 'My Father in heaven' is possible, but
    the Greek uses the adjective οὐράνιος rather than an explicit prepositional phrase.
- source_word: ποιήσει ὑμῖν
  chosen: will do to you
  alternatives:
  - will do this to you
  - will treat you this way
  lexicon: BDAG
  rationale: ποιέω here is intentionally broad, referring back to the master's action
    in the parable. 'Will do to you' keeps the verbal link and leaves the implied
    judgment to be supplied from context. 'Will treat you this way' is smoother but
    more interpretive.
- source_word: ἐὰν μὴ
  chosen: if ... not
  alternatives:
  - unless
  lexicon: BDAG
  rationale: The construction introduces a negative condition. English can render
    it as 'unless,' but 'if ... not' works well here with the following clause and
    keeps the conditional force transparent.
- source_word: ἀφῆτε
  chosen: forgive
  alternatives:
  - release
  - let go
  lexicon: BDAG
  rationale: In this context of interpersonal offense and debt imagery, ἀφίημι clearly
    means 'forgive.' This matches the immediate parable and standard NT usage.
- source_word: ἕκαστος
  chosen: each of you
  alternatives:
  - each one
  - every one of you
  lexicon: BDAG
  rationale: Although grammatically singular, it distributes the obligation across
    the plural audience. 'Each of you' makes that distributive sense explicit in natural
    English.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: his brother
  alternatives:
  - his brother or sister
  - his fellow believer
  - his sibling
  lexicon: BDAG
  rationale: The Greek is masculine singular ('his brother'). Per the translation
    philosophy, gender-accurate rendering is preferred over gender-neutral smoothing.
    The representative force can be noted in a footnote rather than altered in the
    main text.
- source_word: ἀπὸ τῶν καρδιῶν ὑμῶν
  chosen: from your hearts
  alternatives:
  - from the heart
  - from the depths of your hearts
  lexicon: BDAG
  rationale: The plural 'hearts' matches the Greek and corresponds to the plural audience,
    even though English often uses singular idiomatically. It preserves the emphasis
    on inward, sincere forgiveness.
