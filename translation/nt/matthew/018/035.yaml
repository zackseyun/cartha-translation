theological_decisions:
- issue: Scope and force of the warning
  chosen_reading: The verse is rendered as a direct warning of divine judgment corresponding
    to the parable, without softening or expanding its theological implications.
  alternative_readings:
  - A softened paraphrase such as 'will deal with you similarly'
  - An expanded doctrinal explanation about eternal condemnation or loss of rewards
  rationale: The Greek states a solemn conditional warning but does not itself specify
    the full systematic-theological category of the judgment. The translation preserves
    the gravity and leaves broader doctrinal synthesis unstated.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gendered language in ἀδελφῷ
  chosen_reading: his brother
  alternative_readings:
  - his brother or sister
  - another believer
  - his sibling
  rationale: The source text is grammatically masculine singular. Following the stated
    philosophy, the main text remains gender-accurate rather than neutralized, while
    the representative sense may be clarified in a footnote.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
