theological_decisions:
- issue: Meaning of the conversion-like language in στραφῆτε
  chosen_reading: Render as 'turn' without importing a technical term such as 'be
    converted.'
  alternative_readings:
  - be converted
  rationale: The verse calls for a decisive turning and becoming like children, but
    the Greek itself does not require later technical conversion terminology. This
    preserves the text's force without importing denominational or theological system
    language.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of παιδία in discipleship teaching
  chosen_reading: Translate concretely as 'the children' rather than abstracting to
    qualities such as innocence or humility in the main text.
  alternative_readings:
  - children
  - little children
  rationale: The text compares the disciples to children; it does not explicitly define
    which childlike qualities are in view in this verse alone. The translation should
    preserve that interpretive openness rather than resolve it.
  doctrine_reference: Translation philosophy §3
