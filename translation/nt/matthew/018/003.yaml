id: MAT.18.3
reference: Matthew 18:3
source:
  edition: SBLGNT
  text: καὶ εἶπεν· Ἀμὴν λέγω ὑμῖν, ἐὰν μὴ στραφῆτε καὶ γένησθε ὡς τὰ παιδία, οὐ μὴ
    εἰσέλθητε εἰς τὴν βασιλείαν τῶν οὐρανῶν.
translation:
  text: And he said, “Truly I say to you, unless you turn and become like the children,
    you will certainly not enter the kingdom of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like children.' The Greek has 'like the children,' likely echoing the
      child Jesus had set before them in the immediate context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will never enter.' The Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: c
    text: '''Turn'' can also be rendered ''be turned'' or, in older English tradition,
      ''be converted.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying formula. 'Truly' communicates
    the force in natural modern English; 'Amen' is possible but less transparent in
    running translation.
- source_word: στραφῆτε
  chosen: turn
  alternatives:
  - are turned
  - turn back
  - change
  lexicon: BDAG
  rationale: Aorist passive subjunctive of στρέφω here likely carries an intransitive/passive
    sense, 'turn' or 'be turned.' 'Turn' is concise and idiomatic in English while
    preserving the call for a decisive reorientation without over-specifying agency.
- source_word: γένησθε
  chosen: become
  alternatives:
  - come to be
  lexicon: BDAG
  rationale: γίνομαι regularly means 'become' in contexts of change of state. This
    pairs naturally with 'turn' to reflect the two coordinated verbs.
- source_word: ὡς τὰ παιδία
  chosen: like the children
  alternatives:
  - like children
  - as little children
  lexicon: BDAG
  rationale: The article with παιδία is naturally rendered 'the children,' likely
    referring to children as a recognizable class and echoing the child set before
    the disciples in the immediate context. 'Little children' adds a diminutive nuance
    not explicit in παιδία here.
- source_word: οὐ μὴ εἰσέλθητε
  chosen: you will certainly not enter
  alternatives:
  - you will never enter
  - you shall by no means enter
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not enter' preserves the strong force in clear modern English without archaic
    phrasing.
- source_word: βασιλείαν τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is the
    established and accurate English rendering; 'of the heavens' is more literal but
    less idiomatic and not clearly superior in sense.
