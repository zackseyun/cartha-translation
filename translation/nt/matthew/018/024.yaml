id: MAT.18.24
reference: Matthew 18:24
source:
  edition: SBLGNT
  text: ἀρξαμένου δὲ αὐτοῦ συναίρειν ⸀προσηνέχθη ⸂αὐτῷ εἷς⸃ ὀφειλέτης μυρίων ταλάντων.
translation:
  text: And when he began to settle accounts, one debtor who owed ten thousand talents
    was brought to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A talent was a very large monetary unit; 'ten thousand talents' represents
      an unimaginably great debt in the parable's setting.
    reason: cultural_note
lexical_decisions:
- source_word: ἀρξαμένου ... αὐτοῦ
  chosen: when he began
  alternatives:
  - as he began
  - after he began
  lexicon: BDAG
  rationale: The genitive absolute marks the circumstance introducing the main action.
    'When he began' is natural English and preserves the temporal sense without over-specifying
    sequence.
- source_word: συναίρειν
  chosen: to settle accounts
  alternatives:
  - to settle
  - to reckon accounts
  - to take account
  lexicon: BDAG
  rationale: In this financial context, the infinitive refers to calling accounts
    into order or settling them. 'Settle accounts' is idiomatic modern English and
    fits the parable's bookkeeping imagery better than the more archaic 'take account.'
- source_word: προσηνέχθη
  chosen: was brought
  alternatives:
  - was presented
  - was brought forward
  lexicon: BDAG
  rationale: The aorist passive indicates that the debtor was brought before the king
    by others. 'Was brought' is the clearest and most direct rendering.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The dative naturally renders as 'to him' with προσφέρω in the passive.
    'Before him' is possible in context, but 'to him' stays closer to the Greek while
    remaining natural.
- source_word: εἷς ὀφειλέτης
  chosen: one debtor
  alternatives:
  - a debtor
  - one man who owed
  lexicon: BDAG
  rationale: The numeral εἷς is retained as 'one' because it is explicit in the Greek
    and helps introduce a particular case from among many. ὀφειλέτης is straightforwardly
    'debtor.'
- source_word: μυρίων ταλάντων
  chosen: ten thousand talents
  alternatives:
  - countless talents
  - myriads of talents
  lexicon: BDAG
  rationale: μύριοι literally denotes 'ten thousand' and can also carry the sense
    of an enormous number. Here the conventional numeric sense is best, especially
    in a monetary expression. 'Talents' is retained rather than converted into modern
    currency because it is a historical unit of weight/money and the exact modern
    equivalent is debated.
