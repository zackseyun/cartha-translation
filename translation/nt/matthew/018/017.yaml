id: MAT.18.17
reference: Matthew 18:17
source:
  edition: SBLGNT
  text: ἐὰν δὲ παρακούσῃ αὐτῶν, εἰπὸν τῇ ἐκκλησίᾳ· ἐὰν δὲ καὶ τῆς ἐκκλησίας παρακούσῃ,
    ἔστω σοι ὥσπερ ὁ ἐθνικὸς καὶ ὁ τελώνης.
translation:
  text: But if he refuses to listen to them, tell it to the assembly. And if he also
    refuses to listen to the assembly, let him be to you like the Gentile and the
    tax collector.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''church'' or ''congregation'' for ''assembly'' (Greek: ekklēsia).'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακούσῃ
  chosen: refuses to listen
  alternatives:
  - does not listen
  - disobeys
  - ignores
  lexicon: BDAG
  rationale: παρακούω here carries more than mere failure to hear; in this disciplinary
    context it denotes refusal to heed or listen. 'Refuses to listen' captures the
    volitional nuance in natural English without overparaphrasing into a stronger
    term like 'disobeys'.
- source_word: εἰπὸν
  chosen: tell it
  alternatives:
  - report it
  - say it
  lexicon: BDAG
  rationale: The aorist imperative of λέγω here introduces the next step of reporting
    the matter. 'Tell it' is a natural English rendering that preserves the implied
    object from context without adding interpretive detail.
- source_word: ἐκκλησίᾳ / ἐκκλησίας
  chosen: assembly
  alternatives:
  - church
  - congregation
  lexicon: BDAG
  rationale: ἐκκλησία fundamentally denotes an assembled community. 'Assembly' preserves
    the lexical sense and avoids importing later institutional connotations that 'church'
    may carry, while still fitting the Matthean context of the gathered covenant community.
- source_word: ἔστω σοι
  chosen: let him be to you
  alternatives:
  - let him be for you
  - regard him as
  lexicon: BDAG
  rationale: This preserves the imperative force and the dative σοι. 'Regard him as'
    is interpretive; 'let him be to you' stays closer to the Greek while remaining
    intelligible.
- source_word: ὥσπερ
  chosen: like
  alternatives:
  - as
  - just as
  lexicon: BDAG
  rationale: A straightforward comparative. 'Like' is idiomatic and sufficiently precise
    here.
- source_word: ὁ ἐθνικὸς
  chosen: the Gentile
  alternatives:
  - a Gentile
  - the pagan
  lexicon: BDAG
  rationale: ἐθνικός in Jewish-context discourse commonly means 'Gentile,' an outsider
    to the covenant community. The article is retained with 'the Gentile' to reflect
    the Greek construction and the representative category. 'Pagan' is possible but
    adds a religious nuance not required by the term itself.
- source_word: ὁ τελώνης
  chosen: the tax collector
  alternatives:
  - a tax collector
  lexicon: BDAG
  rationale: τελώνης is straightforwardly 'tax collector.' The article is retained
    to mirror the Greek and to present the category representatively.
