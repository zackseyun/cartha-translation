theological_decisions:
- issue: Rendering ἐκκλησία in a pre-resurrection Matthean disciplinary context
  chosen_reading: assembly
  alternative_readings:
  - church
  - congregation
  rationale: To avoid importing later denominational or institutional assumptions
    into Jesus's instruction, the main text uses 'assembly,' which reflects the core
    sense of ἐκκλησία as the gathered community. Because 'church' is the traditional
    and contextually plausible rendering, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of treating the unrepentant person as outsider
  chosen_reading: let him be to you like the Gentile and the tax collector
  alternative_readings:
  - treat him as a Gentile and a tax collector
  - regard him as an outsider
  rationale: The translation preserves the simile and does not flatten it into a full
    procedural formula. This maintains the text's wording without importing a more
    developed doctrine of excommunication than the verse itself states.
  doctrine_reference: Translation philosophy §3
