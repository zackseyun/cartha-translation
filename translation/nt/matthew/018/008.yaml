id: MAT.18.8
reference: Matthew 18:8
source:
  edition: SBLGNT
  text: Εἰ δὲ ἡ χείρ σου ἢ ὁ πούς σου σκανδαλίζει σε, ἔκκοψον ⸀αὐτὸν καὶ βάλε ἀπὸ
    σοῦ· καλόν σοί ἐστιν εἰσελθεῖν εἰς τὴν ζωὴν ⸂κυλλὸν ἢ χωλόν⸃, ἢ δύο χεῖρας ἢ δύο
    πόδας ἔχοντα βληθῆναι εἰς τὸ πῦρ τὸ αἰώνιον.
translation:
  text: And if your hand or your foot causes you to stumble, cut it off and throw
    it away from you. It is better for you to enter into life maimed or lame than,
    having two hands or two feet, to be thrown into the eternal fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causes you to sin.' The Greek verb literally means 'causes you to stumble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίζει
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - is a snare to you
  - offends you
  lexicon: BDAG
  rationale: The verb σκανδαλίζω literally evokes causing someone to stumble or fall
    into offense/sin. 'Causes you to stumble' preserves the metaphor present in the
    Greek while remaining clear in modern English. 'Causes you to sin' is interpretive
    and common in English tradition, but the more literal image is preferable here.
- source_word: ἔκκοψον
  chosen: cut it off
  alternatives:
  - cut it out
  - remove it
  lexicon: BDAG
  rationale: The aorist imperative of ἐκκόπτω is forceful and concrete. 'Cut it off'
    is the natural English equivalent for a hand or foot and preserves the severity
    of the saying.
- source_word: βάλε ἀπὸ σοῦ
  chosen: throw it away from you
  alternatives:
  - cast it from you
  - throw it from you
  lexicon: BDAG
  rationale: βάλλω with ἀπό σοῦ conveys forceful removal. 'Throw it away from you'
    communicates both the action and separation in idiomatic modern English.
- source_word: καλόν σοί ἐστιν
  chosen: It is better for you
  alternatives:
  - It is good for you
  - It is advantageous for you
  lexicon: BDAG
  rationale: Although καλόν can mean 'good,' in this comparative context with ἢ it
    idiomatically means 'better.' This is standard and clear English.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  chosen: to enter into life
  alternatives:
  - to enter life
  lexicon: BDAG
  rationale: The phrase is a Matthean expression for entering eschatological life.
    'Enter into life' preserves the preposition εἰς and sounds natural, while retaining
    the theological weight of ζωή here as more than mere biological existence.
- source_word: κυλλὸν
  chosen: maimed
  alternatives:
  - crippled
  - disabled
  lexicon: BDAG
  rationale: κυλλός refers to being mutilated or deprived of a limb/hand. 'Maimed'
    fits the immediate context of a severed hand and avoids the broader and less specific
    'disabled.' 'Crippled' is possible but can sound dated or imprecise.
- source_word: χωλόν
  chosen: lame
  alternatives:
  - crippled
  lexicon: BDAG
  rationale: χωλός commonly means lame, especially in relation to the foot/leg. 'Lame'
    is the most direct and contextually fitting rendering.
- source_word: ἔχοντα
  chosen: having
  alternatives:
  - with
  lexicon: BDAG
  rationale: The participle modifies the implied subject and is best represented explicitly
    in English as 'having two hands or two feet,' preserving the Greek structure and
    contrast.
- source_word: βληθῆναι
  chosen: to be thrown
  alternatives:
  - to be cast
  lexicon: BDAG
  rationale: The passive infinitive of βάλλω is straightforwardly 'to be thrown' or
    'to be cast.' 'Thrown' is more natural contemporary English; 'cast' is more traditional
    but less common.
- source_word: τὸ πῦρ τὸ αἰώνιον
  chosen: the eternal fire
  alternatives:
  - the fire of the age
  - everlasting fire
  lexicon: BDAG
  rationale: αἰώνιος in this judgment context is most naturally rendered 'eternal.'
    'The fire of the age' is overly wooden here, and 'everlasting' is a stylistic
    alternative rather than a lexical improvement.
