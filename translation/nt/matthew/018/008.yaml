theological_decisions:
- issue: Whether to render σκανδαλίζει as moralized 'causes you to sin' or preserve
    the stumbling metaphor
  chosen_reading: causes you to stumble
  alternative_readings:
  - causes you to sin
  rationale: The Greek preserves the metaphor of stumbling, and the translation philosophy
    prioritizes original-language primacy over inherited English tradition. The moral
    implication remains clear in context without flattening the image.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of 'life' in εἰς τὴν ζωὴν
  chosen_reading: retain 'life' rather than explicating 'eternal life'
  alternative_readings:
  - eternal life
  rationale: The context clearly has eschatological force, but the Greek text says
    simply 'life.' To avoid importing words not present in the source, the translation
    keeps 'life' and lets the contrast with 'the eternal fire' supply the theological
    weight.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of the warning about bodily mutilation
  chosen_reading: translate the command literally without softening or resolving whether
    it is hyperbolic
  alternative_readings:
  - paraphrasing as a figurative call to radical repentance
  rationale: The verse uses stark imperative language. The translation should preserve
    the severity and imagery without inserting an interpretive resolution into the
    main text.
  doctrine_reference: Translation philosophy §3
