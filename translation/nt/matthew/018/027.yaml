id: MAT.18.27
reference: Matthew 18:27
source:
  edition: SBLGNT
  text: σπλαγχνισθεὶς δὲ ὁ κύριος τοῦ δούλου ἐκείνου ἀπέλυσεν αὐτόν, καὶ τὸ δάνειον
    ἀφῆκεν αὐτῷ.
translation:
  text: Then the lord of that slave, moved with compassion, released him and forgave
    him the loan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'master' for 'lord' (κύριος); the Greek refers here to the human master
      in the parable, not directly to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'the debt'; the Greek noun more specifically denotes a loan or something
      lent.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλαγχνισθεὶς
  chosen: moved with compassion
  alternatives:
  - having compassion
  - feeling pity
  lexicon: BDAG
  rationale: Aorist passive participle of σπλαγχνίζομαι expresses deep pity/compassion.
    'Moved with compassion' is idiomatic modern English that preserves the emotional
    force better than a bare 'having compassion.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' fits the flow of the parable
    in readable English better than a mechanically repeated 'and/but.'
- source_word: κύριος
  chosen: lord
  alternatives:
  - master
  - Lord
  lexicon: BDAG
  rationale: In this parable the referent is the human master of the slave, not a
    direct divine title. Lowercase 'lord' preserves the lexical sense of κύριος while
    avoiding an unwarranted christological reading. 'Master' is possible, but 'lord'
    keeps closer formal correspondence.
- source_word: δοῦλου
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this debt-parable context the hierarchical ownership relation
    is important, so 'slave' is preferred over the softer 'servant.'
- source_word: ἀπέλυσεν αὐτόν
  chosen: released him
  alternatives:
  - set him free
  - dismissed him
  lexicon: BDAG
  rationale: ἀπολύω can mean release, dismiss, or set free. Here it refers to letting
    the slave go from immediate liability/custody. 'Released him' is concise and fits
    the legal-relational context without overinterpreting.
- source_word: τὸ δάνειον
  chosen: the loan
  alternatives:
  - the debt
  - what was lent
  lexicon: BDAG
  rationale: δάνειον specifically denotes a loan, that is, money lent. Since the next
    verb conveys remission, 'forgave him the loan' naturally communicates cancellation
    of what was owed while preserving the more specific noun rather than flattening
    it to 'debt.'
- source_word: ἀφῆκεν αὐτῷ
  chosen: forgave him
  alternatives:
  - canceled for him
  - remitted to him
  lexicon: BDAG
  rationale: ἀφίημι commonly means forgive, remit, or cancel. In Matthew, the forgiveness
    sense is theologically resonant and appropriate here, while the object 'the loan'
    makes clear that a financial obligation is in view within the parable.
