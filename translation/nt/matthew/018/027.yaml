theological_decisions:
- issue: Potential overreading of κύριος as a divine title
  chosen_reading: Rendered as lowercase 'lord' referring to the human master in the
    parable
  alternative_readings:
  - Master
  - Lord
  rationale: Although κύριος can be a divine title, the immediate narrative referent
    is the master of the slave. Lowercase avoids importing a direct identification
    with God into the wording while still allowing the parable's broader theological
    analogy to stand.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Rendering δοῦλος in a socially concrete way
  chosen_reading: Translated as 'slave'
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt explicitly prefers 'slave' where bonded status is
    theologically or contextually salient. In this parable of debt and authority,
    the asymmetrical ownership relation matters.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
