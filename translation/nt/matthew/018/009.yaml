theological_decisions:
- issue: Rendering γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The verse uses the specific term γέεννα rather than a generic word for
    the underworld or final punishment. Retaining 'Gehenna' aligns with original-language
    primacy and avoids importing later English theological associations beyond the
    Greek term itself.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering εἰς τὴν ζωὴν
  chosen_reading: into life
  alternative_readings:
  - into eternal life
  rationale: Although the phrase likely points to eschatological life, the Greek text
    does not explicitly say 'eternal.' Preserving 'life' maintains the text's wording
    and theological tension without over-specification.
  doctrine_reference: Translation philosophy §1, §3
