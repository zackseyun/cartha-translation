id: MAT.18.9
reference: Matthew 18:9
source:
  edition: SBLGNT
  text: καὶ εἰ ὁ ὀφθαλμός σου σκανδαλίζει σε, ἔξελε αὐτὸν καὶ βάλε ἀπὸ σοῦ· καλόν
    σοί ἐστιν μονόφθαλμον εἰς τὴν ζωὴν εἰσελθεῖν, ἢ δύο ὀφθαλμοὺς ἔχοντα βληθῆναι
    εἰς τὴν γέενναν τοῦ πυρός.
translation:
  text: And if your eye causes you to stumble, tear it out and throw it away from
    you. It is better for you to enter into life with one eye than, having two eyes,
    to be thrown into the Gehenna of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causes you to sin.' The Greek verb can mean to cause someone to stumble,
      fall, or sin.
    reason: lexical_alternative
  - marker: b
    text: '''Gehenna'' refers to the place of final judgment; traditionally rendered
      ''hell.'''
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζει
  chosen: causes you to stumble
  alternatives:
  - causes you to sin
  - is a snare to you
  - offends you
  lexicon: BDAG
  rationale: The verb σκανδαλίζω literally evokes causing someone to stumble or fall
    into offense/sin. 'Causes you to stumble' preserves the metaphor and avoids prematurely
    narrowing the sense to only inward temptation, while still fitting the warning
    context.
- source_word: ἔξελε
  chosen: tear ... out
  alternatives:
  - pluck ... out
  - remove
  lexicon: BDAG
  rationale: The aorist imperative is forceful. 'Tear out' communicates the violent,
    urgent imagery more naturally in modern English than the traditional 'pluck out,'
    while remaining faithful to the command's hyperbolic severity.
- source_word: βάλε ἀπὸ σοῦ
  chosen: throw it away from you
  alternatives:
  - cast it from you
  - throw it from you
  lexicon: BDAG
  rationale: βάλλω with ἀπό σοῦ expresses decisive removal. 'Throw it away from you'
    is idiomatic modern English and preserves the sense of complete separation.
- source_word: καλόν σοί ἐστιν
  chosen: It is better for you
  alternatives:
  - It is good for you
  - It is advantageous for you
  lexicon: BDAG
  rationale: In this comparative context, καλόν functions idiomatically to express
    what is better or preferable, not merely morally 'good.' English 'better for you'
    captures the contrast with the following ἤ clause.
- source_word: μονόφθαλμον
  chosen: with one eye
  alternatives:
  - one-eyed
  lexicon: BDAG
  rationale: The adjective means 'one-eyed.' Rendering it as 'with one eye' is smoother
    in contemporary English while preserving the physical image.
- source_word: εἰς τὴν ζωὴν
  chosen: into life
  alternatives:
  - into the life
  - into eternal life
  lexicon: BDAG
  rationale: The Greek has 'into life' without the adjective 'eternal.' In Matthew
    this can carry eschatological weight, but the translation should not import 'eternal'
    where it is not stated. 'Into life' preserves the wording and theological resonance.
- source_word: βληθῆναι
  chosen: to be thrown
  alternatives:
  - to be cast
  lexicon: BDAG
  rationale: The passive infinitive of βάλλω is straightforward. 'To be thrown' is
    clear modern English; 'cast' is traditional but less natural.
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The source uses γέεννα, a term with Jewish historical and eschatological
    associations. Translating it as 'Gehenna' preserves the original term's specificity
    rather than collapsing it into the broader English theological term 'hell.'
- source_word: τοῦ πυρός
  chosen: of fire
  alternatives:
  - fiery
  lexicon: BDAG
  rationale: 'The genitive is best preserved directly: ''the Gehenna of fire.'' This
    keeps the vivid imagery and avoids interpretive smoothing.'
