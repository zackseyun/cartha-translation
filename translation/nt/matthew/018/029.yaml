id: MAT.18.29
reference: Matthew 18:29
source:
  edition: SBLGNT
  text: πεσὼν οὖν ὁ σύνδουλος ⸀αὐτοῦ παρεκάλει αὐτὸν λέγων· Μακροθύμησον ἐπ’ ⸀ἐμοί,
    καὶ ἀποδώσω σοι.
translation:
  text: So his fellow slave fell down and pleaded with him, saying, ‘Be patient with
    me, and I will repay you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellow servant.' The Greek σύνδουλος denotes one who shares the same
      master; 'fellow slave' is used here because the bonded relationship is prominent
      in the parable.
    reason: alternative_reading
lexical_decisions:
- source_word: σύνδουλος
  chosen: fellow slave
  alternatives:
  - fellow servant
  - fellow bondservant
  lexicon: BDAG
  rationale: The compound means a co-slave or fellow slave. Given the parable’s debt-and-master
    setting, the bonded status is salient, so 'slave' better reflects the social reality
    than the softer 'servant,' in line with the project's guidance on doulos-language.
- source_word: παρεκάλει
  chosen: pleaded
  alternatives:
  - begged
  - implored
  - entreated
  lexicon: BDAG
  rationale: In this context of desperate appeal for mercy over debt, 'pleaded' captures
    the earnest force of the imperfect verb without sounding archaic. 'Begged' is
    possible, but 'pleaded' fits the direct speech that follows.
- source_word: Μακροθύμησον
  chosen: Be patient
  alternatives:
  - Have patience
  - Be long-suffering
  lexicon: BDAG
  rationale: The aorist imperative asks for forbearance or patience. 'Be patient'
    is natural modern English and closely matches the sense. 'Long-suffering' is too
    archaic here.
- source_word: ἐπ’ ἐμοί
  chosen: with me
  alternatives:
  - toward me
  - over me
  lexicon: BDAG
  rationale: The idiom μακροθυμέω ἐπί with a person means to be patient with someone.
    'With me' is the most idiomatic and accurate English rendering.
- source_word: ἀποδώσω
  chosen: I will repay
  alternatives:
  - I will pay back
  - I will give back
  lexicon: BDAG
  rationale: In a debt context, 'repay' clearly conveys restoration of what is owed.
    It is slightly more precise than the broader 'give back.'
- source_word: πεσὼν
  chosen: fell down
  alternatives:
  - falling down
  - fell before him
  lexicon: BDAG
  rationale: The participle denotes a physical act of falling down in supplication.
    'Fell down' is concise and preserves the gesture of humble appeal.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν here advances the narrative as an inferential/sequential connector.
    'So' is natural English and preserves the flow without sounding overly formal.
