theological_decisions:
- issue: Rendering of δουλος-language in σύνδουλος
  chosen_reading: Use 'fellow slave' in the main text
  alternative_readings:
  - fellow servant
  - fellow bondservant
  rationale: The verse is part of a parable involving a king, debts, and subordinates
    under authority. The bonded nature of the relationship is contextually important,
    so 'slave' best reflects the source term and the project's stated preference where
    that bonded status is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
