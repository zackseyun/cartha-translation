id: MAT.18.14
reference: Matthew 18:14
source:
  edition: SBLGNT
  text: οὕτως οὐκ ἔστιν θέλημα ⸀ἔμπροσθεν τοῦ πατρὸς ⸀ὑμῶν τοῦ ἐν οὐρανοῖς ἵνα ἀπόληται
    ⸀ἓν τῶν μικρῶν τούτων.
translation:
  text: In the same way, it is not the will of your Father in heaven that even one
    of these little ones should perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that even one of these little ones should be lost.' The Greek verb
      can mean either 'perish' or 'be lost'; the immediate context of the lost sheep
      supports the latter nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - Thus
  - So
  lexicon: BDAG
  rationale: Connects this statement to the preceding parable/application. 'In the
    same way' makes the comparative force clear in natural English better than the
    more abrupt 'thus'.
- source_word: θέλημα
  chosen: the will
  alternatives:
  - a desire
  - what is desired
  lexicon: BDAG
  rationale: 'Standard rendering for θέλημα in contexts of intention or desire. The
    article is supplied in English for idiomatic expression: ''it is not the will...''.'
- source_word: ἔμπροσθεν
  chosen: of
  alternatives:
  - before
  - in the presence of
  lexicon: BDAG
  rationale: The phrase οὐκ ἔστιν θέλημα ἔμπροσθεν τοῦ πατρός is idiomatically rendered
    in English as 'it is not the will of the Father.' A more literal 'before your
    Father' is possible, but less natural here and does not improve clarity.
- source_word: πατρὸς ὑμῶν τοῦ ἐν οὐρανοῖς
  chosen: your Father in heaven
  alternatives:
  - your heavenly Father
  - your Father who is in the heavens
  lexicon: BDAG
  rationale: '''Your Father in heaven'' is clear, natural, and close to the Greek.
    ''In heaven'' is preferred over the more literal plural ''in the heavens'' for
    idiomatic modern English, while preserving the locative sense.'
- source_word: ἵνα ἀπόληται
  chosen: that ... should perish
  alternatives:
  - that ... be lost
  - for ... to perish
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/passive subjunctive here can mean 'perish' or
    'be lost.' In this context, after the parable of the lost sheep, both are possible.
    'Perish' best conveys the serious negative outcome in the Father's will statement,
    while the alternative 'be lost' is preserved in a footnote because of the immediate
    literary context.
- source_word: ἓν
  chosen: even one
  alternatives:
  - one
  lexicon: BDAG
  rationale: 'The addition of ''even'' brings out the emphatic minimization implied
    by the singular in context: not a single one of these little ones.'
- source_word: τῶν μικρῶν τούτων
  chosen: of these little ones
  alternatives:
  - of these small ones
  - of these little children
  lexicon: BDAG
  rationale: μικρός here likely refers to the 'little ones' in the discipleship context
    of the chapter, not necessarily only to young children. 'Little ones' preserves
    the metaphorical and relational sense without over-specifying age.
