theological_decisions:
- issue: Sense of ἀπόληται in relation to the preceding lost-sheep context
  chosen_reading: should perish
  alternative_readings:
  - should be lost
  rationale: The verse can be heard either as speaking of final ruin ('perish') or
    of straying/loss ('be lost'), and the immediate context of the lost sheep supports
    the latter nuance. To preserve theological tension without flattening the warning,
    the main text uses 'perish' while the contextual alternative is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
