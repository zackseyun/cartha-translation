id: MAT.18.28
reference: Matthew 18:28
source:
  edition: SBLGNT
  text: ἐξελθὼν δὲ ὁ δοῦλος ἐκεῖνος εὗρεν ἕνα τῶν συνδούλων αὐτοῦ ὃς ὤφειλεν αὐτῷ
    ἑκατὸν δηνάρια, καὶ κρατήσας αὐτὸν ἔπνιγεν λέγων· ⸀Ἀπόδος εἴ τι ὀφείλεις.
translation:
  text: But when that slave went out, he found one of his fellow slaves who owed him
    a hundred denarii, and seizing him, he began choking him, saying, ‘Pay back whatever
    you owe.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Pay back if you owe anything.”
    reason: lexical_alternative
  - marker: b
    text: A denarius was a common daily wage for a laborer or soldier.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: The parable concerns debt, ownership, and coercive authority; the bonded
    nature is salient, so the doctrine default allows and favors 'slave' here over
    the softer 'servant'.
- source_word: ἐξελθὼν δὲ
  chosen: But when ... went out
  alternatives:
  - Now after ... went out
  - But ... having gone out
  lexicon: BDAG
  rationale: Renders the aorist participle with δέ in natural English while preserving
    the narrative transition and temporal sense.
- source_word: συνδούλων
  chosen: fellow slaves
  alternatives:
  - fellow servants
  - fellow bondservants
  lexicon: BDAG
  rationale: Keeps the σύν- prefix sense ('fellow-') and matches the chosen rendering
    of δοῦλος for consistency within the parable.
- source_word: ὤφειλεν
  chosen: owed
  alternatives:
  - was owing
  - was indebted
  lexicon: BDAG
  rationale: Plain financial indebtedness is in view; 'owed' is the most natural modern
    English equivalent.
- source_word: ἑκατὸν δηνάρια
  chosen: a hundred denarii
  alternatives:
  - one hundred denarii
  - a hundred silver coins
  lexicon: BDAG
  rationale: Retains the historical monetary term rather than flattening it into a
    generic equivalent; this preserves the contrast with the enormous prior debt in
    the parable.
- source_word: κρατήσας
  chosen: seizing him
  alternatives:
  - grabbing him
  - taking hold of him
  lexicon: BDAG
  rationale: Captures the forceful physical action of the aorist participle in concise
    English.
- source_word: ἔπνιγεν
  chosen: he began choking him
  alternatives:
  - he was choking him
  - he throttled him
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or inceptive action; 'began choking' conveys
    the violent onset naturally in English.
- source_word: Ἀπόδος
  chosen: Pay back
  alternatives:
  - Repay
  - Give back
  lexicon: BDAG
  rationale: The aorist imperative in a debt context is well rendered as a sharp demand
    to repay.
- source_word: εἴ τι ὀφείλεις
  chosen: whatever you owe
  alternatives:
  - if you owe anything
  - what you owe
  lexicon: BDAG
  rationale: The idiom εἴ τι can function as an indefinite expression; 'whatever you
    owe' is idiomatic English and fits the threatening demand. The more formally literal
    'if you owe anything' is preserved in a footnote.
