theological_decisions:
- issue: Rendering of δοῦλος in a parabolic narrative
  chosen_reading: slave / fellow slaves
  alternative_readings:
  - servant / fellow servants
  - bondservant / fellow bondservants
  rationale: In keeping with the doctrine guidance, the translation uses 'slave' where
    bonded status and coercive power are salient. This verse depicts one slave under
    a master violently enforcing a debt against a fellow slave, so the stronger rendering
    best reflects the social reality of the parable.
