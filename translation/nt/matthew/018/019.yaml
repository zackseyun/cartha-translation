id: MAT.18.19
reference: Matthew 18:19
source:
  edition: SBLGNT
  text: Πάλιν ⸀ἀμὴν λέγω ὑμῖν ὅτι ἐὰν δύο ⸂συμφωνήσωσιν ἐξ ὑμῶν⸃ ἐπὶ τῆς γῆς περὶ
    παντὸς πράγματος οὗ ἐὰν αἰτήσωνται, γενήσεται αὐτοῖς παρὰ τοῦ πατρός μου τοῦ ἐν
    οὐρανοῖς.
translation:
  text: Again, truly I tell you, if two of you agree on earth about any matter they
    ask for, it will be done for them by my Father in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if two from among you are in agreement.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in the heavens'; rendered idiomatically as 'in heaven.'
    reason: lexical_alternative
  - marker: c
    text: In context, this saying follows Jesus' teaching about the community's authority
      and discipline (18:15–18), though the wording here itself speaks broadly of
      agreed requests.
    reason: cross_reference
lexical_decisions:
- source_word: Πάλιν
  chosen: Again
  alternatives:
  - Further
  - Also
  lexicon: BDAG
  rationale: Marks a renewed or additional solemn saying connected to the preceding
    teaching; 'Again' is natural and preserves the discourse flow.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: truly I tell you
  alternatives:
  - amen, I say to you
  - truly I say to you
  lexicon: BDAG
  rationale: Standard idiomatic rendering of Jesus' solemn formula in readable modern
    English; preserves emphatic force without unnecessary transliteration.
- source_word: ἐὰν δύο συμφωνήσωσιν ἐξ ὑμῶν
  chosen: if two of you agree
  alternatives:
  - if two from among you agree
  - if two of you are in agreement
  lexicon: BDAG
  rationale: συμφωνέω here denotes being in agreement rather than merely sounding
    together. 'Two of you' naturally represents ἐξ ὑμῶν.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: Natural English equivalent preserving the earthly sphere in contrast
    with the Father 'in heaven.'
- source_word: περὶ παντὸς πράγματος
  chosen: about any matter
  alternatives:
  - concerning any thing
  - about any matter at all
  lexicon: BDAG
  rationale: πρᾶγμα is broad ('matter, thing, affair'). 'Any matter' is idiomatic
    and avoids archaic 'thing' while preserving breadth.
- source_word: οὗ ἐὰν αἰτήσωνται
  chosen: they ask for
  alternatives:
  - they might ask
  - they request
  lexicon: BDAG
  rationale: Captures the indefinite relative construction in smooth English. 'Ask
    for' fits αἰτέω in prayer/request context.
- source_word: γενήσεται αὐτοῖς
  chosen: it will be done for them
  alternatives:
  - it will happen for them
  - it will come to pass for them
  lexicon: BDAG
  rationale: γίνομαι here is rendered as a divine-result passive/impersonal future.
    'It will be done for them' best fits the following agency phrase 'by my Father'
    and common English usage.
- source_word: παρὰ τοῦ πατρός μου
  chosen: by my Father
  alternatives:
  - from my Father
  lexicon: BDAG
  rationale: With γενήσεται, παρά + genitive can indicate source or agency. 'By my
    Father' reads most naturally with 'it will be done' and makes the Father's action
    explicit.
- source_word: τοῦ ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - who is in the heavens
  - in the heavens
  lexicon: BDAG
  rationale: Plural οὐρανοῖς is commonly rendered idiomatically in English as singular
    'heaven.' A more literal 'heavens' is possible but less natural here.
