id: MAT.18.25
reference: Matthew 18:25
source:
  edition: SBLGNT
  text: μὴ ἔχοντος δὲ αὐτοῦ ἀποδοῦναι ἐκέλευσεν αὐτὸν ὁ ⸀κύριος πραθῆναι καὶ τὴν ⸀γυναῖκα
    καὶ τὰ τέκνα καὶ πάντα ὅσα ⸀ἔχει καὶ ἀποδοθῆναι.
translation:
  text: But since he had nothing to repay, the lord ordered that he be sold, along
    with his wife and children and all that he had, and that payment be made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the master.' Greek κύριος can mean 'lord' or 'master' depending on context;
      here it refers to the servant’s human superior in the parable.
    reason: lexical_alternative
  - marker: b
    text: That is, he and his family were to be sold and his possessions liquidated
      in order to make repayment.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ ἔχοντος δὲ αὐτοῦ
  chosen: But since he had nothing
  alternatives:
  - But because he did not have
  - And since he had nothing
  lexicon: BDAG
  rationale: 'The genitive absolute with μή + present participle expresses the circumstance/reason:
    ''since he did not have.'' ''Nothing'' is supplied idiomatically from the infinitive
    complement ἀποδοῦναι (''to repay''), yielding natural English without overstating
    the Greek.'
- source_word: ἀποδοῦναι
  chosen: to repay
  alternatives:
  - to pay back
  - to render payment
  lexicon: BDAG
  rationale: ἀποδίδωμι here concerns repayment of a debt in the parable context. 'Repay'
    is concise and idiomatic in English.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: κελεύω denotes giving an authoritative order. 'Ordered' fits modern readable
    English and the social setting.
- source_word: ὁ κύριος
  chosen: the lord
  alternatives:
  - his lord
  - the master
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' in the doctrine table, but in this parabolic
    social setting it refers to the servant's master rather than a direct divine title.
    Lowercase 'lord' preserves the lexical sense without importing a christological
    reading. 'His lord' is possible from context, but the Greek has the article, not
    an explicit possessive.
- source_word: πραθῆναι
  chosen: that he be sold
  alternatives:
  - to be sold
  lexicon: BDAG
  rationale: πιπράσκω means 'sell.' The passive infinitive after ἐκέλευσεν is best
    rendered in English as a content clause, 'ordered that he be sold.' This also
    preserves the bonded/slave-sale sense of the term.
- source_word: τὴν γυναῖκα
  chosen: his wife
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: Although the Greek has the article, English idiom in this context normally
    uses the possessive. The referent is clearly the debtor's wife.
- source_word: τὰ τέκνα
  chosen: children
  alternatives:
  - his children
  lexicon: BDAG
  rationale: τέκνα means 'children.' The possessive is implicit from context; English
    can omit it after 'his wife' while still clearly referring to his family.
- source_word: πάντα ὅσα ἔχει
  chosen: all that he had
  alternatives:
  - everything he had
  - all his possessions
  lexicon: BDAG
  rationale: The phrase denotes the totality of his possessions. 'All that he had'
    closely follows the Greek while remaining natural English.
- source_word: καὶ ἀποδοθῆναι
  chosen: and that payment be made
  alternatives:
  - and repayment be made
  - and the debt be repaid
  lexicon: BDAG
  rationale: 'Passive infinitive of ἀποδίδωμι resumes the debt context: the sale is
    intended to produce repayment. ''That payment be made'' is idiomatic and avoids
    adding ''debt'' explicitly where Greek leaves it implicit.'
