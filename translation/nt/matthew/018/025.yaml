theological_decisions:
- issue: Rendering κύριος in a parable context
  chosen_reading: the lord
  alternative_readings:
  - the master
  - his lord
  rationale: Although κύριος has the default rendering 'Lord,' this verse uses it
    for the human superior within the story. Lowercase 'lord' avoids suggesting a
    direct divine title while preserving the lexical value. 'Master' is possible,
    but 'lord' better reflects the Greek term and the narrative register.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord) with context-sensitive
    application under original-language primacy and optimal equivalence.'
