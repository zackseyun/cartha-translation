theological_decisions:
- issue: Nature of the necessity in ἀνάγκη γὰρ ἐλθεῖν τὰ σκάνδαλα
  chosen_reading: Rendered as a statement of necessity/inevitability without specifying
    divine causation.
  alternative_readings:
  - Rendered more strongly as 'it must be that stumbling blocks come,' which could
    be heard as emphasizing divine decree
  - Rendered more weakly as 'stumbling blocks are bound to come,' emphasizing practical
    inevitability
  rationale: The Greek states necessity but does not explicitly explain its basis.
    To preserve theological tension and avoid importing a doctrine of direct divine
    causation, the translation keeps the necessity language while leaving its grounding
    unstated.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Representative force of ἀνθρώπῳ
  chosen_reading: Main text keeps 'the man' with representative force; inclusivity
    is clarified in a footnote.
  alternative_readings:
  - the person
  - whoever
  rationale: The source is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred in the main text, while a footnote can clarify that the
    warning applies generically to any person.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
