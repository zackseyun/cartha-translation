id: MAT.18.7
reference: Matthew 18:7
source:
  edition: SBLGNT
  text: οὐαὶ τῷ κόσμῳ ἀπὸ τῶν σκανδάλων· ἀνάγκη ⸀γὰρ ἐλθεῖν τὰ σκάνδαλα, πλὴν οὐαὶ
    τῷ ⸀ἀνθρώπῳ δι’ οὗ τὸ σκάνδαλον ἔρχεται.
translation:
  text: Woe to the world because of stumbling blocks; for it is necessary that the
    stumbling blocks come, but woe to the man through whom the stumbling block comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offenses,' 'causes of sin,' or 'traps.' The Greek σκάνδαλον/σκάνδαλα
      refers to something that causes a person to stumble, whether by offense, enticement,
      or occasion for sin.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is grammatically masculine singular in Greek and here represents
      any individual through whom such a stumbling block comes.'
    reason: cultural_note
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic/judicial force of denunciation better than softer
    English options. Repeated in both clauses for rhetorical symmetry.
- source_word: κόσμῳ
  chosen: the world
  alternatives:
  - the world-system
  - the people of the world
  lexicon: BDAG
  rationale: κόσμος here refers broadly to the human world order affected by sin,
    not merely the physical creation. 'The world' is the most natural and sufficiently
    broad rendering.
- source_word: ἀπὸ
  chosen: because of
  alternatives:
  - from
  - on account of
  lexicon: BDAG
  rationale: In this context ἀπό expresses cause/source with reference to the woes
    produced by the scandals/stumbling blocks. 'Because of' communicates the sense
    idiomatically in English.
- source_word: σκάνδαλα / σκάνδαλον
  chosen: stumbling blocks
  alternatives:
  - offenses
  - causes of sin
  - traps
  lexicon: BDAG
  rationale: σκάνδαλον literally evokes something that causes stumbling and by extension
    a cause of sin or offense. 'Stumbling block' preserves the metaphor and theological
    breadth better than the narrower 'offense' or the more interpretive 'cause of
    sin.' Singular and plural are kept distinct as in Greek.
- source_word: ἀνάγκη
  chosen: it is necessary
  alternatives:
  - it must be
  - there is necessity
  lexicon: BDAG
  rationale: Impersonal expression of necessity is best rendered with natural English.
    'It is necessary' preserves the statement of inevitability without over-specifying
    whether the necessity is logical, providential, or situational.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Connects the explanation to the preceding woe. 'For' is concise and preserves
    the discourse relation.
- source_word: ἐλθεῖν ... ἔρχεται
  chosen: come ... comes
  alternatives:
  - occur ... occurs
  - happen ... happens
  lexicon: BDAG
  rationale: Using 'come/comes' preserves the verbal repetition in Greek and keeps
    the imagery less abstract than 'occur.'
- source_word: πλήν
  chosen: but
  alternatives:
  - nevertheless
  - except that
  lexicon: BDAG
  rationale: Marks a strong adversative turn from the inevitability of stumbling blocks
    to the personal woe on the agent. 'But' is clear and idiomatic.
- source_word: ἀνθρώπῳ
  chosen: the man
  alternatives:
  - the person
  - that man
  lexicon: BDAG
  rationale: Following the project's gender-accurate policy, the grammatically masculine
    singular is rendered 'the man.' In context it functions representatively for any
    individual agent, but the source form is masculine singular and should be preserved
    in the main text.
- source_word: δι’ οὗ
  chosen: through whom
  alternatives:
  - by whom
  - through which
  lexicon: BDAG
  rationale: Refers to the human agent as the means by which the stumbling block comes.
    'Through whom' is the most natural rendering for personal agency here.
