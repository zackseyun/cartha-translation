id: MAT.18.10
reference: Matthew 18:10
source:
  edition: SBLGNT
  text: Ὁρᾶτε μὴ καταφρονήσητε ἑνὸς τῶν μικρῶν τούτων, λέγω γὰρ ὑμῖν ὅτι οἱ ἄγγελοι
    αὐτῶν ἐν οὐρανοῖς διὰ παντὸς βλέπουσι τὸ πρόσωπον τοῦ πατρός μου τοῦ ἐν ⸀οὐρανοῖς.
translation:
  text: See that you do not despise one of these little ones, for I tell you that
    their angels in heaven continually see the face of my Father who is in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not look down on' one of these little ones.
    reason: lexical_alternative
  - marker: b
    text: '''Their angels'' may refer to angels associated with or representing these
      little ones; the verse does not by itself settle the full doctrine of guardian
      angels.'
    reason: alternative_reading
  - marker: c
    text: Greek 'in the heavens' / 'who is in the heavens'; rendered idiomatically
      as 'in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁρᾶτε
  chosen: See that
  alternatives:
  - Take care
  - Beware
  lexicon: BDAG
  rationale: Present imperative introducing a warning/exhortation. 'See that' is idiomatic
    modern English that preserves the force of vigilant attention better than a bare
    'see'.
- source_word: μὴ καταφρονήσητε
  chosen: you do not despise
  alternatives:
  - do not look down on
  - do not treat with contempt
  lexicon: BDAG
  rationale: The aorist subjunctive with μή after Ὁρᾶτε expresses prohibition. καταφρονέω
    carries the sense of despising or treating as insignificant. 'Despise' is concise
    and weighty; the more interpretive 'look down on' is preserved as an alternative.
- source_word: ἑνὸς τῶν μικρῶν τούτων
  chosen: one of these little ones
  alternatives:
  - one of these small ones
  - one of these little children
  lexicon: BDAG
  rationale: The genitive construction means 'one of these little ones.' μικρῶν can
    denote littleness in status or age; in Matthew 18 the phrase likely includes children
    and, by extension, humble believers. 'Little ones' preserves the broader referent
    without over-narrowing to children alone.
- source_word: λέγω γὰρ ὑμῖν
  chosen: for I tell you
  alternatives:
  - for I say to you
  lexicon: BDAG
  rationale: Standard discourse formula. 'I tell you' is natural modern English while
    retaining the emphatic explanatory force of γάρ.
- source_word: οἱ ἄγγελοι αὐτῶν
  chosen: their angels
  alternatives:
  - the angels of them
  lexicon: BDAG
  rationale: A straightforward possessive rendering. The phrase is left as written
    without importing a technical doctrine of 'guardian angels'; the genitive relation
    is preserved but not overinterpreted.
- source_word: ἐν οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Although plural in Greek, οὐρανοῖς in this idiom is commonly rendered
    idiomatically in English as singular 'heaven.' This preserves natural English
    while matching the locative sense.
- source_word: διὰ παντὸς
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The idiom means continuously or at all times. 'Continually' fits the
    present tense βλέπουσι and avoids possible overstatement beyond the idiomatic
    sense.
- source_word: βλέπουσι τὸ πρόσωπον
  chosen: see the face
  alternatives:
  - look upon the face
  - behold the face
  lexicon: BDAG
  rationale: A literal rendering preserves the courtly/access sense of direct presence
    before God. 'See the face' is clear and keeps the biblical imagery.
- source_word: τοῦ πατρός μου
  chosen: of my Father
  alternatives:
  - of my heavenly Father
  lexicon: BDAG
  rationale: The possessive is explicit in Greek. 'My Father' preserves Jesus' distinctive
    filial language; 'heavenly' is not inserted here because the following phrase
    already supplies the location.
- source_word: τοῦ ἐν οὐρανοῖς
  chosen: who is in heaven
  alternatives:
  - who is in the heavens
  lexicon: BDAG
  rationale: Attributive phrase modifying 'my Father.' Singular 'heaven' is idiomatic
    English for the Greek plural in this expression.
