theological_decisions:
- issue: Meaning of 'their angels'
  chosen_reading: Retain the phrase 'their angels' without specifying a formal doctrine
    of individual guardian angels.
  alternative_readings:
  - Interpret as a reference to personal guardian angels assigned to each believer/child
  - Interpret more generally as angels representing or ministering to these little
    ones
  rationale: The Greek states that 'their angels' continually see the Father's face,
    but it does not explicitly define the precise angelological mechanism. To preserve
    theological tension and avoid importing a doctrinal conclusion the text does not
    state, the translation remains literal and explanatory interpretation is left
    to footnote-level discussion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
