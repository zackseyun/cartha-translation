theological_decisions:
- issue: Generic masculine ἀνθρώπῳ
  chosen_reading: a man
  alternative_readings:
  - someone
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral flattening
    when the source uses a masculine generic form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nuance of πλανάω in the sheep metaphor
  chosen_reading: goes astray / the one going astray
  alternative_readings:
  - wanders off
  - is led astray
  - the lost one
  rationale: This preserves the metaphorical and moral resonance of πλανάω without
    importing a stronger theological claim about culpability or external deception.
    It also maintains lexical consistency within the verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
