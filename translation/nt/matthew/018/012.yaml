id: MAT.18.12
reference: Matthew 18:12
source:
  edition: SBLGNT
  text: τί ὑμῖν δοκεῖ; ἐὰν γένηταί τινι ἀνθρώπῳ ἑκατὸν πρόβατα καὶ πλανηθῇ ἓν ἐξ αὐτῶν,
    οὐχὶ ⸀ἀφήσει τὰ ἐνενήκοντα ἐννέα ἐπὶ τὰ ὄρη ⸀καὶ πορευθεὶς ζητεῖ τὸ πλανώμενον;
translation:
  text: What do you think? If a man has a hundred sheep, and one of them goes astray,
    will he not leave the ninety-nine on the mountains and go and look for the one
    going astray?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanders off.' The Greek verb can mean 'go astray,' 'wander,' or in some
      contexts 'be led astray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the hills.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the one going astray'; traditionally 'the lost one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὑμῖν δοκεῖ
  chosen: What do you think?
  alternatives:
  - What do you suppose?
  - What seems right to you?
  lexicon: BDAG
  rationale: Idiomatic introductory question inviting the hearers' judgment. 'What
    do you think?' is natural modern English and preserves the direct address.
- source_word: ἐὰν γένηταί τινι ἀνθρώπῳ
  chosen: If a man has
  alternatives:
  - If a certain man has
  - If someone has
  lexicon: BDAG
  rationale: The idiom with γίνομαι plus dative here expresses possession or circumstance
    ('if a man comes to have/has'). 'A man' preserves the masculine singular generic
    sense in line with the gender-accurate policy; 'someone' would flatten the source
    form.
- source_word: ἑκατὸν πρόβατα
  chosen: a hundred sheep
  lexicon: BDAG
  rationale: Straightforward numeric phrase; 'sheep' is the natural collective rendering
    for πρόβατα.
- source_word: πλανηθῇ ἓν ἐξ αὐτῶν
  chosen: one of them goes astray
  alternatives:
  - one of them wanders off
  - one of them is led astray
  lexicon: BDAG
  rationale: πλανάω in passive can mean 'go astray/be led astray.' In this pastoral
    context, 'goes astray' best preserves the sheep metaphor and avoids over-specifying
    agency.
- source_word: οὐχὶ ἀφήσει
  chosen: will he not leave
  alternatives:
  - will he not abandon
  - does he not leave
  lexicon: BDAG
  rationale: οὐχί expects an affirmative answer. Future 'will he not' matches ἀφήσει
    and reads naturally in English. 'Leave' fits the temporary sense better than the
    stronger 'abandon.'
- source_word: τὰ ἐνενήκοντα ἐννέα
  chosen: the ninety-nine
  lexicon: BDAG
  rationale: Standard rendering of the numeral phrase.
- source_word: ἐπὶ τὰ ὄρη
  chosen: on the mountains
  alternatives:
  - in the hills
  - on the hills
  lexicon: BDAG
  rationale: A more formal rendering preserves the concrete topographical image of
    ὄρη as 'mountains.' 'Hills' is possible but less exact.
- source_word: καὶ πορευθεὶς ζητεῖ
  chosen: and go and look for
  alternatives:
  - and, going, seeks
  - and go seek
  lexicon: BDAG
  rationale: The participle plus main verb is naturally rendered as coordinated action
    in English. 'Look for' is idiomatic for ζητέω in this context.
- source_word: τὸ πλανώμενον
  chosen: the one going astray
  alternatives:
  - the stray
  - the wandering one
  - the lost one
  lexicon: BDAG
  rationale: The present participle echoes πλανηθῇ and keeps the verbal idea active.
    'The lost one' is smoother but shifts toward ἀπόλλυμι language not used here;
    'the stray' is possible but less explicit.
