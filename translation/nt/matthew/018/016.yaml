id: MAT.18.16
reference: Matthew 18:16
source:
  edition: SBLGNT
  text: ἐὰν δὲ μὴ ἀκούσῃ, παράλαβε μετὰ σοῦ ἔτι ἕνα ἢ δύο, ἵνα ἐπὶ στόματος δύο μαρτύρων
    ἢ τριῶν σταθῇ πᾶν ῥῆμα·
translation:
  text: But if he does not listen, take one or two others with you, so that by the
    mouth of two or three witnesses every matter may be established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'on the testimony of two or three witnesses.'
    reason: lexical_alternative
  - marker: b
    text: An allusion to Deuteronomy 19:15, where a matter is established by two or
      three witnesses.
    reason: cross_reference
lexical_decisions:
- source_word: ἀκούσῃ
  chosen: does not listen
  alternatives:
  - does not hear
  lexicon: BDAG
  rationale: In this disciplinary context, ἀκούω carries the sense of hearing with
    responsive attention or heeding, not mere auditory reception. 'Listen' best reflects
    the implied refusal to heed.
- source_word: παράλαβε
  chosen: take
  alternatives:
  - bring along
  - take with you
  lexicon: BDAG
  rationale: The aorist imperative calls for the concrete action of taking additional
    persons along. 'Take' is natural English and preserves the directive force; 'with
    you' is supplied from μετὰ σοῦ.
- source_word: μετὰ σοῦ
  chosen: with you
  alternatives:
  - along with you
  lexicon: BDAG
  rationale: μετά with the genitive expresses accompaniment. 'With you' is the straightforward
    rendering.
- source_word: ἔτι ἕνα ἢ δύο
  chosen: one or two others
  alternatives:
  - one or two more
  - one or two
  lexicon: BDAG
  rationale: ἔτι adds the sense of 'still/further/in addition.' 'Others' makes explicit
    in English that these are additional people beyond the speaker and offender, without
    overtranslating.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is readable modern English while preserving
    purposive force.
- source_word: ἐπὶ στόματος
  chosen: by the mouth of
  alternatives:
  - on the testimony of
  - by the testimony of
  lexicon: BDAG
  rationale: This is a Semitic/legal idiom, echoing Deuteronomy 19:15. 'By the mouth
    of' preserves the biblical idiom in understandable English; a footnote preserves
    the more interpretive alternative 'on/by the testimony of.'
- source_word: μαρτύρων
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: Standard legal sense fits the context of confirming a charge or matter.
- source_word: σταθῇ
  chosen: may be established
  alternatives:
  - may stand
  - may be confirmed
  lexicon: BDAG
  rationale: Passive aorist subjunctive of ἵστημι in legal/judicial context means
    to be established or confirmed. 'May be established' is idiomatic and reflects
    the likely allusion to legal validation.
- source_word: πᾶν ῥῆμα
  chosen: every matter
  alternatives:
  - every word
  - every charge
  - every statement
  lexicon: BDAG
  rationale: Though literally 'every word/thing said,' in this legal setting and in
    the Deuteronomy allusion it refers to each matter or case under consideration.
    'Every matter' best conveys the juridical sense in contemporary English.
