theological_decisions:
- issue: OT legal allusion and ecclesial discipline context
  chosen_reading: Render the Deuteronomic witness formula in clear legal English while
    preserving some biblical idiom.
  alternative_readings:
  - Translate more formally as 'that every word may stand by the mouth of two or three
    witnesses'
  - Translate more dynamically as 'so that every charge may be confirmed by two or
    three witnesses'
  rationale: The verse echoes Deuteronomy 19:15 and applies that principle to community
    discipline. The chosen rendering preserves the legal force without importing a
    narrower meaning such as only 'charge' or flattening the idiom entirely.
  doctrine_reference: Translation philosophy §§1, 3, 6
