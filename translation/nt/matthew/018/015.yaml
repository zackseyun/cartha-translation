theological_decisions:
- issue: Whether to render ἀδελφός inclusively in application
  chosen_reading: your brother
  alternative_readings:
  - your brother or sister
  - a fellow believer
  rationale: The translation follows the grammatically masculine singular form in
    the main text, in keeping with the project's gender-accurate policy. Broader application
    may be inferred contextually, but the main text should not replace the source's
    form with an interpretive inclusive expansion.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Text-critical status of εἰς σέ
  chosen_reading: include 'against you' in the main text
  alternative_readings:
  - 'omit the phrase: ''if your brother sins'''
  rationale: The provided source text is SBLGNT, which includes εἰς σέ. Because the
    phrase is a well-known textual variant affecting whether the instruction is limited
    to personal offenses or broader sin, the shorter reading is preserved in a footnote
    rather than silently ignored.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
