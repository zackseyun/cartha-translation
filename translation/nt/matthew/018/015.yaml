id: MAT.18.15
reference: Matthew 18:15
source:
  edition: SBLGNT
  text: Ἐὰν δὲ ἁμαρτήσῃ ⸂εἰς σὲ⸃ ὁ ἀδελφός σου, ⸀ὕπαγε ἔλεγξον αὐτὸν μεταξὺ σοῦ καὶ
    αὐτοῦ μόνου. ἐάν σου ἀκούσῃ, ἐκέρδησας τὸν ἀδελφόν σου·
translation:
  text: But if your brother sins against you, go and confront him between you and
    him alone. If he listens to you, you have gained your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit 'against you,' reading, 'If your brother sins, go
      and confront him between you and him alone.'
    reason: textual_variant
  - marker: b
    text: Or 'reprove,' 'show him his fault.'
    reason: lexical_alternative
  - marker: c
    text: '''Brother'' is grammatically masculine singular; in context it may refer
      more broadly to a fellow disciple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτήσῃ
  chosen: sins
  alternatives:
  - should sin
  - does wrong
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐὰν gives a general conditional sense, naturally
    rendered in English as 'sins.' 'Does wrong' is possible but weakens the specifically
    moral/religious force of ἁμαρτάνω.
- source_word: εἰς σέ
  chosen: against you
  alternatives:
  - against you (omitted in some manuscripts)
  - sins
  lexicon: BDAG
  rationale: The phrase is present in the SBLGNT text and specifies the offense as
    directed toward the hearer. 'Against you' is the idiomatic English equivalent
    of εἰς + accusative here. Because this phrase is text-critically disputed, the
    alternative shorter reading is preserved in a footnote.
- source_word: ἀδελφός σου
  chosen: your brother
  alternatives:
  - your brother or sister
  - your fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and, in this discourse
    context, likely refers to a fellow disciple. Per doctrine, gender-accurate rendering
    is preferred over gender-neutral smoothing. A more inclusive interpretive expansion
    is not placed in the main text because it goes beyond the form of the source.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go away
  - leave and go
  lexicon: BDAG
  rationale: As an imperative introducing the action to be taken, 'go' is the most
    natural concise English rendering. Stronger spatial nuances are not required in
    context.
- source_word: ἔλεγξον
  chosen: confront
  alternatives:
  - reprove
  - rebuke
  - show him his fault
  lexicon: BDAG
  rationale: ἐλέγχω here means to expose or bring fault to light. 'Confront' communicates
    direct personal engagement in readable modern English. 'Reprove' is accurate but
    dated; 'rebuke' can sound harsher than the context requires; 'show him his fault'
    is interpretive expansion beyond the single verb.
- source_word: μεταξὺ σοῦ καὶ αὐτοῦ μόνου
  chosen: between you and him alone
  alternatives:
  - in private, between you and him alone
  - between the two of you alone
  lexicon: BDAG
  rationale: This phrase stresses privacy and exclusivity. The chosen rendering stays
    close to the Greek while remaining natural. 'In private' captures the sense but
    is less formally tied to the wording.
- source_word: ἀκούσῃ
  chosen: listens to you
  alternatives:
  - hears you
  - obeys you
  lexicon: BDAG
  rationale: ἀκούω can mean hear or heed. In this reconciliation context, 'listens
    to you' best captures responsive hearing without overstating it as full obedience.
- source_word: ἐκέρδησας
  chosen: you have gained
  alternatives:
  - you have won
  - you have regained
  lexicon: BDAG
  rationale: κερδαίνω literally means gain or win. 'You have gained' preserves the
    metaphor and avoids importing 'regained,' which would add a nuance not explicit
    in the verb itself.
