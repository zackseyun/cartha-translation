id: MAT.18.4
reference: Matthew 18:4
source:
  edition: SBLGNT
  text: ὅστις οὖν ταπεινώσει ἑαυτὸν ὡς τὸ παιδίον τοῦτο, οὗτός ἐστιν ὁ μείζων ἐν τῇ
    βασιλείᾳ τῶν οὐρανῶν·
translation:
  text: Therefore, whoever humbles himself like this child, he is the greatest in
    the kingdom of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek masculine singular ('himself ... he is'), used here generically for
      any person.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - whoever it is who
  - anyone who
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general condition. 'Whoever'
    is idiomatic English and preserves the open, proverbial force.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding teaching. 'Therefore' preserves the
    logical connection more clearly than the lighter 'then'.
- source_word: ταπεινώσει ἑαυτὸν
  chosen: humbles himself
  alternatives:
  - will humble himself
  - makes himself humble
  lexicon: BDAG
  rationale: The future indicative in a conditional-like statement has gnomic force;
    present English 'humbles himself' communicates the general principle naturally.
    The reflexive pronoun is retained with 'himself' to preserve the self-humbling
    emphasis.
- source_word: ὡς τὸ παιδίον τοῦτο
  chosen: like this child
  alternatives:
  - as this child
  - like this little child
  lexicon: BDAG
  rationale: ὡς here expresses comparison. παιδίον means 'child'; adding 'little'
    is possible from context but not required by the noun itself, so 'this child'
    is more textually restrained.
- source_word: οὗτός ἐστιν
  chosen: he is
  alternatives:
  - this one is
  - that person is
  lexicon: BDAG
  rationale: Demonstrative plus copula identifies the person just described. 'He is'
    is natural English while preserving the masculine singular reference.
- source_word: ὁ μείζων
  chosen: the greatest
  alternatives:
  - greater
  - the greater one
  lexicon: BDAG
  rationale: 'Though morphologically comparative, the article gives it a superlative
    sense in context: the one ranking highest. ''The greatest'' is standard and best
    fits the contrast in the surrounding discourse about greatness.'
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: in the kingdom of heaven
  alternatives:
  - in the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. Singular 'heaven' is idiomatic English
    for the Greek plural οὐρανῶν in this reverential circumlocution, while preserving
    the meaning of God's reign.
