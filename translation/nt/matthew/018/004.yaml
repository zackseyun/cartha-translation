theological_decisions:
- issue: Gendered reference in a generic statement
  chosen_reading: he is / himself
  alternative_readings:
  - that person is / themselves
  - they are / themselves
  rationale: The Greek uses grammatically masculine singular forms with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    when matching the source's intent. A footnote preserves the generic sense for
    English readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of μείζων
  chosen_reading: the greatest
  alternative_readings:
  - greater
  - the greater one
  rationale: In this context of ranking within the kingdom, the articular comparative
    functions idiomatically as a superlative. This preserves the discourse about who
    is greatest without flattening the Greek construction.
