theological_decisions:
- issue: Meaning of προσκυνέω toward a human master
  chosen_reading: Rendered as an act of obeisance rather than religious worship
  alternative_readings:
  - worshiped him
  rationale: In this parable the object is the king/master within the story world,
    and the immediate sense is deferential prostration. Translating as 'worshiped'
    could import stronger theological implications than the context requires. The
    rendering preserves the humility of the act without overstating it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
