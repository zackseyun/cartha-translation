id: MAT.18.26
reference: Matthew 18:26
source:
  edition: SBLGNT
  text: πεσὼν οὖν ὁ δοῦλος προσεκύνει αὐτῷ λέγων· ⸀Μακροθύμησον ἐπ’ ⸀ἐμοί, καὶ πάντα
    ⸂ἀποδώσω σοι⸃.
translation:
  text: So the slave fell down before him and kept pleading, saying, ‘Be patient with
    me, and I will repay you everything.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bowed down before him'; the Greek verb can also be rendered 'worshiped'
      in other contexts, but here it refers to deferential prostration before a human
      master.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεσὼν
  chosen: fell down
  alternatives:
  - having fallen
  - falling down
  lexicon: BDAG
  rationale: Aorist participle of πίπτω indicates the servant's physical act of prostrating
    himself before speaking. 'Fell down' is natural English and preserves the humble
    posture implied by the narrative context.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from the previous verse. 'So' is idiomatic
    in modern English while retaining the inferential flow.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος is rendered 'slave' where bonded status
    is salient. In this parable about debt and total obligation, the bonded nature
    is important, so 'slave' better reflects the social reality than the softer 'servant'.
- source_word: προσεκύνει
  chosen: fell down before him and kept pleading
  alternatives:
  - bowed down before him
  - prostrated himself before him
  - worshiped him
  lexicon: BDAG
  rationale: προσκυνέω here denotes an act of obeisance before a human master, not
    necessarily worship in the full religious sense. Because English 'worshiped' would
    likely overread the scene, the posture is brought out with 'fell down before him,'
    while the ongoing imperfect force is reflected together with λέγων by 'kept pleading.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - begging
  - pleading
  lexicon: BDAG
  rationale: The participle introduces the direct speech. The pleading nuance is conveyed
    in the main clause by 'kept pleading,' so 'saying' can remain straightforward
    here.
- source_word: Μακροθύμησον ἐπ’ ἐμοί
  chosen: Be patient with me
  alternatives:
  - Have patience with me
  - Bear with me
  lexicon: BDAG
  rationale: The imperative asks for forbearance or delay of judgment. 'Be patient
    with me' is clear modern English and fits the debtor-creditor context.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: BDAG
  rationale: Neuter plural used comprehensively; 'everything' is the most natural
    English equivalent in this promise of full repayment.
- source_word: ἀποδώσω σοι
  chosen: I will repay you
  alternatives:
  - I will pay you back
  - I will give back to you
  lexicon: BDAG
  rationale: Future of ἀποδίδωμι in a debt context means repay. 'Repay you' is concise
    and idiomatic, and with πάντα yields 'I will repay you everything.'
