theological_decisions:
- issue: Ambiguous numerical expression in Jesus' teaching on forgiveness
  chosen_reading: seventy-seven times
  alternative_readings:
  - seventy times seven
  rationale: The phrase ἑβδομηκοντάκις ἑπτά is syntactically ambiguous. The translation
    chooses 'seventy-seven times' as the more direct reading of the Greek while preserving
    the traditional 'seventy times seven' in a footnote. The point of the saying is
    not a strict upper limit but a radically expanded posture of forgiveness, so the
    translation should preserve the wording without over-interpreting it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
