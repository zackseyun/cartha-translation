id: MAT.18.22
reference: Matthew 18:22
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· Οὐ λέγω σοι ἕως ἑπτάκις ἀλλὰ ἕως ἑβδομηκοντάκις ἑπτά.
translation:
  text: Jesus says to him, “I do not say to you, up to seven times, but up to seventy-seven
    times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “seventy times seven.”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says,' reflecting the Greek present
    tense in narrative. English can also smooth this to past tense, but preserving
    the vivid narrative present is a reasonable optimal-equivalence choice.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative indirect object; the referent is Peter from the immediate
    context, but the pronoun is retained rather than replaced with the name because
    the Greek uses a pronoun.
- source_word: Οὐ λέγω σοι
  chosen: I do not say to you
  alternatives:
  - I am not saying to you
  - I do not tell you
  lexicon: BDAG
  rationale: A direct and natural rendering of the present indicative with dative
    pronoun. 'Say to you' preserves the verbal form more closely than 'tell you.'
- source_word: ἕως
  chosen: up to
  alternatives:
  - until
  - as many as
  lexicon: BDAG
  rationale: In this counting context, 'up to' best conveys a numerical limit. 'Until'
    is less idiomatic in English here.
- source_word: ἑπτάκις
  chosen: seven times
  alternatives:
  - sevenfold
  lexicon: BDAG
  rationale: The adverb denotes frequency, so 'seven times' is the clearest contemporary
    English rendering.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Simple adversative contrast between Peter's proposed limit and Jesus'
    correction.
- source_word: ἑβδομηκοντάκις ἑπτά
  chosen: seventy-seven times
  alternatives:
  - seventy times seven
  lexicon: BDAG
  rationale: The Greek phrase is ambiguous and has been rendered both 'seventy-seven
    times' and 'seventy times seven.' The more straightforward reading of ἑβδομηκοντάκις
    with ἑπτά is 'seventy-seven times,' while preserving the traditional alternative
    in a footnote for transparency.
