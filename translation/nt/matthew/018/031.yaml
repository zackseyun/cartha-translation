theological_decisions:
- issue: Rendering of δοῦλος-family term in a parabolic social setting
  chosen_reading: fellow slaves
  alternative_readings:
  - fellow servants
  - fellow bondservants
  rationale: The verse uses σύνδουλοι, built on δοῦλος. In this debt-slavery context,
    the bonded status is central to the parable's logic, so 'slaves' best reflects
    the source. This is a lexical-theological decision because English tradition often
    softens the term to 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
- issue: Rendering of κύριος for a human superior
  chosen_reading: lord
  alternative_readings:
  - master
  rationale: The doctrine excerpt gives 'Lord' as the default rendering for κύριος,
    with 'Master' as an alternative. Since this refers to a human figure in a parable,
    lowercase 'lord' preserves the lexical choice without importing divine reference.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος
