id: MAT.18.31
reference: Matthew 18:31
source:
  edition: SBLGNT
  text: ἰδόντες ⸀οὖν οἱ σύνδουλοι αὐτοῦ τὰ γενόμενα ἐλυπήθησαν σφόδρα, καὶ ἐλθόντες
    διεσάφησαν τῷ κυρίῳ ἑαυτῶν πάντα τὰ γενόμενα.
translation:
  text: Therefore, when his fellow slaves saw what had happened, they were deeply
    grieved, and they came and reported to their lord everything that had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellow servants.' The Greek term is σύνδουλοι, literally 'fellow slaves'
      or 'fellow servants'; here 'slaves' is used because their bonded status under
      the same lord is important to the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their master.' The Greek word is κύριος, commonly rendered 'lord'
      or 'master' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Marks an inferential or narrative progression from the preceding action.
    'Therefore' preserves the connective force clearly in English.
- source_word: σύνδουλοι
  chosen: fellow slaves
  alternatives:
  - fellow servants
  - fellow bondservants
  lexicon: BDAG
  rationale: The compound denotes those who share slave-status under the same master.
    In this parable the bonded relationship is salient, so 'slaves' better reflects
    the force of doulos language per translation philosophy.
- source_word: τὰ γενόμενα / πάντα τὰ γενόμενα
  chosen: what had happened / everything that had happened
  alternatives:
  - what had taken place
  - all that had happened
  lexicon: BDAG
  rationale: Idiomatic rendering of the substantival participle of γίνομαι. The first
    instance is naturally 'what had happened'; the second adds πάντα, so 'everything
    that had happened' preserves the intensification.
- source_word: ἐλυπήθησαν σφόδρα
  chosen: were deeply grieved
  alternatives:
  - were very distressed
  - were greatly saddened
  lexicon: BDAG
  rationale: λυπέω in the passive here conveys sorrow/distress, and σφόδρα intensifies
    it. 'Deeply grieved' is natural English that preserves the emotional weight without
    overtranslation.
- source_word: ἐλθόντες
  chosen: they came
  alternatives:
  - having come
  - they went
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance preceding the main verb.
    'They came' is smoother modern English than a wooden participial construction
    and fits the narrative sequence.
- source_word: διεσάφησαν
  chosen: reported
  alternatives:
  - explained fully
  - made clear
  - informed
  lexicon: BDAG
  rationale: The verb means to explain or report in detail. 'Reported' fits the context
    of subordinates informing their master; the comprehensiveness is already reinforced
    by 'everything.'
- source_word: τῷ κυρίῳ ἑαυτῶν
  chosen: to their lord
  alternatives:
  - to their master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord'/'lord' rather than
    'Master' unless context strongly demands otherwise. Here lowercase 'lord' fits
    the human master in the parable while preserving lexical consistency.
