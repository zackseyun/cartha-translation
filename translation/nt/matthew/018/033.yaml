theological_decisions:
- issue: Rendering of δοῦλος-family term in σύνδουλος
  chosen_reading: fellow slave
  alternative_readings:
  - fellow servant
  - fellow bondservant
  rationale: The parable concerns a king/master and debtors under his authority; the
    dependent, bonded relationship is contextually important. Following the doctrine's
    guidance, 'slave' is preferred where bonded status is salient, while alternatives
    are preserved for readers accustomed to traditional renderings.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
