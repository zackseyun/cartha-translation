id: MAT.18.33
reference: Matthew 18:33
source:
  edition: SBLGNT
  text: οὐκ ἔδει καὶ σὲ ἐλεῆσαι τὸν σύνδουλόν σου, ὡς κἀγὼ σὲ ἠλέησα;
translation:
  text: Should you not also have shown mercy to your fellow slave, as I also showed
    mercy to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow servant' or 'your fellow bondservant.' The Greek σύνδουλος
      refers to one who shares the same master; 'fellow slave' is used here to preserve
      the bonded sense of the term in this parable.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἔδει
  chosen: Should ... not have
  alternatives:
  - Was it not necessary for ... to
  - Ought you not to have
  lexicon: BDAG
  rationale: The impersonal ἔδει expresses moral necessity or obligation. In idiomatic
    English within a rhetorical question, 'Should ... not have' best captures the
    rebuking force without sounding wooden.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: καί here adds correspondence between the servant's expected action and
    the king's prior action. 'Also' preserves that parallel naturally.
- source_word: σὲ
  chosen: you
  rationale: Direct object of the infinitive construction; rendered straightforwardly
    as 'you' in English.
- source_word: ἐλεῆσαι / ἠλέησα
  chosen: shown mercy / showed mercy
  alternatives:
  - had mercy on
  - pitied
  lexicon: BDAG
  rationale: Using the same English expression for both verb forms preserves the lexical
    repetition of ἐλεάω in the verse. 'Show mercy' is natural modern English and retains
    the ethical-theological weight better than the weaker 'pity.'
- source_word: τὸν σύνδουλόν σου
  chosen: your fellow slave
  alternatives:
  - your fellow servant
  - your fellow bondservant
  lexicon: BDAG
  rationale: σύνδουλος means a co-slave or fellow slave. In this parable's debt-and-master
    setting, the bonded status is salient, so 'slave' fits the project's guidance
    on δοῦλος-family terms better than the softer 'servant.' 'Fellow slave' also preserves
    the σύν- prefix idea of shared status.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - in the same way that
  lexicon: BDAG
  rationale: ὡς marks comparison between the expected mercy and the mercy already
    received. 'As' is concise and sufficient; the parallel is clear in context.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - even I
  - I too
  lexicon: BDAG
  rationale: κἀγώ (= καὶ ἐγώ) explicitly includes the speaker in the comparison. 'I
    also' mirrors the earlier καὶ and keeps the reciprocal emphasis.
