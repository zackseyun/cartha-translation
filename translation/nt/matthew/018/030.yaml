id: MAT.18.30
reference: Matthew 18:30
source:
  edition: SBLGNT
  text: ὁ δὲ οὐκ ἤθελεν, ἀλλὰ ἀπελθὼν ἔβαλεν αὐτὸν εἰς φυλακὴν ἕως ⸀οὗ ἀποδῷ τὸ ὀφειλόμενον.
translation:
  text: But he was not willing; instead, he went away and threw him into prison until
    he should pay what was owed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refused'; Greek literally 'was not willing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'put him in prison'; the Greek verb is more forceful, literally 'threw/cast
      him into prison.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the amount owed' or 'the debt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - But the man
  - But that one
  lexicon: BDAG
  rationale: The article functions substantivally, referring back to the first servant.
    English requires an explicit pronoun; 'But he' is natural and preserves the contrast
    introduced by δέ.
- source_word: οὐκ ἤθελεν
  chosen: was not willing
  alternatives:
  - did not want
  - refused
  lexicon: BDAG
  rationale: θέλω denotes willing/wanting. 'Was not willing' preserves the volitional
    nuance without overcompressing it into the stronger interpretive gloss 'refused,'
    though that sense is contextually implied.
- source_word: ἀλλὰ
  chosen: instead
  alternatives:
  - but
  - rather
  lexicon: BDAG
  rationale: ἀλλά marks strong contrast with the prior plea for patience. 'Instead'
    brings out the adversative force in idiomatic English.
- source_word: ἀπελθὼν
  chosen: he went away
  alternatives:
  - having gone away
  - departing
  lexicon: BDAG
  rationale: The aorist participle is rendered with a finite English clause for natural
    style while preserving the sequence of action.
- source_word: ἔβαλεν αὐτὸν εἰς φυλακήν
  chosen: threw him into prison
  alternatives:
  - put him in prison
  - cast him into prison
  lexicon: BDAG
  rationale: βάλλω is more forceful than a neutral 'put'; 'threw him into prison'
    preserves the harshness of the action. 'Cast' is more formal/archaic in contemporary
    English.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: This conjunction introduces the temporal limit of imprisonment. Simple
    'until' is accurate and idiomatic.
- source_word: ἀποδῷ
  chosen: he should pay
  alternatives:
  - he paid
  - he might repay
  lexicon: BDAG
  rationale: The aorist subjunctive after ἕως οὗ is well represented by 'should pay'
    in English, conveying anticipated completion without flattening the subordinate
    mood into a simple past.
- source_word: τὸ ὀφειλόμενον
  chosen: what was owed
  alternatives:
  - the amount owed
  - the debt
  lexicon: BDAG
  rationale: 'The participle functions substantivally: ''the thing owed.'' ''What
    was owed'' is precise and natural. ''The debt'' is possible but slightly less
    formally tied to the participial expression.'
