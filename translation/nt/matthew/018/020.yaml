id: MAT.18.20
reference: Matthew 18:20
source:
  edition: SBLGNT
  text: οὗ γάρ εἰσιν δύο ἢ τρεῖς συνηγμένοι εἰς τὸ ἐμὸν ὄνομα, ἐκεῖ εἰμι ἐν μέσῳ αὐτῶν.
translation:
  text: For where two or three are gathered in my name, there I am in their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  chosen: where
  alternatives:
  - wherever
  lexicon: BDAG
  rationale: Introduces a locative clause. 'Where' is the most natural English equivalent
    here; 'wherever' is possible but slightly more expansive than the Greek requires.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this saying to the preceding
    context. 'For' is concise and preserves the discourse relation.
- source_word: δύο ἢ τρεῖς
  chosen: two or three
  lexicon: BDAG
  rationale: Straightforward numerical expression; preserved formally.
- source_word: συνηγμένοι
  chosen: are gathered
  alternatives:
  - have gathered
  - are assembled
  lexicon: BDAG
  rationale: Perfect passive participle of συνάγω. 'Are gathered' naturally conveys
    the resultant state of having been brought together, without overtranslating aspect.
    'Are assembled' is possible but slightly less transparent to the verbal root.
- source_word: εἰς τὸ ἐμὸν ὄνομα
  chosen: in my name
  alternatives:
  - into my name
  - for my name
  lexicon: BDAG
  rationale: Idiomatic English for the Greek expression indicating gathering with
    reference to, under the authority of, or in allegiance to Jesus' name. A more
    literal 'into my name' would be awkward in English and less clear.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Correlates with οὗ ('where ... there'), preserving the Greek structure.
- source_word: εἰμι
  chosen: I am
  alternatives:
  - I am present
  lexicon: BDAG
  rationale: Simple present of εἰμί. 'I am' preserves the directness of the Greek;
    'I am present' is interpretive and therefore left as an alternative sense rather
    than the main rendering.
- source_word: ἐν μέσῳ αὐτῶν
  chosen: in their midst
  alternatives:
  - among them
  lexicon: BDAG
  rationale: Both are good idiomatic renderings. 'In their midst' more closely reflects
    the spatial imagery of the Greek while remaining natural English.
