id: MAT.18.32
reference: Matthew 18:32
source:
  edition: SBLGNT
  text: τότε προσκαλεσάμενος αὐτὸν ὁ κύριος αὐτοῦ λέγει αὐτῷ· Δοῦλε πονηρέ, πᾶσαν
    τὴν ὀφειλὴν ἐκείνην ἀφῆκά σοι, ἐπεὶ παρεκάλεσάς με·
translation:
  text: Then his master summoned him and said to him, ‘Wicked slave, I forgave you
    all that debt because you pleaded with me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I canceled for you all that debt.' The Greek verb can denote releasing
      or remitting a debt as well as forgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant.' The Greek δοῦλος can mean 'servant' or 'slave'; here 'slave'
      is used because the bonded relationship to the master is central to the parable.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal/narrative connector; 'Then' is the natural English equivalent
    in this parabolic sequence.
- source_word: προσκαλεσάμενος
  chosen: summoned
  alternatives:
  - called to him
  - called
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι conveys calling someone to oneself.
    'Summoned' fits the master's authoritative action and reads naturally in English.
- source_word: ὁ κύριος αὐτοῦ
  chosen: his master
  alternatives:
  - his lord
  lexicon: BDAG
  rationale: In this parable κύριος refers to the slave's owner/master rather than
    functioning as a divine title. 'Master' best conveys the social relation in context.
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative
    style commonly renders it as simple past. This preserves sense without awkwardness.
- source_word: Δοῦλε
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance on δοῦλος, 'slave' is preferred where bonded status
    is salient. In this debt-parable the hierarchical ownership relation is central,
    so 'slave' is more accurate than 'servant'.
- source_word: πονηρέ
  chosen: wicked
  alternatives:
  - evil
  - worthless
  lexicon: BDAG
  rationale: Vocative adjective condemning moral character. 'Wicked' is idiomatic
    and weighty without sounding archaic.
- source_word: πᾶσαν τὴν ὀφειλὴν ἐκείνην
  chosen: all that debt
  alternatives:
  - that whole debt
  - all that amount owed
  lexicon: BDAG
  rationale: ὀφειλή denotes a debt/what is owed. The combination with πᾶσαν and ἐκείνην
    is naturally rendered 'all that debt' or 'that whole debt'; the chosen wording
    is concise and idiomatic.
- source_word: ἀφῆκά σοι
  chosen: I forgave you
  alternatives:
  - I canceled for you
  - I released you from
  lexicon: BDAG
  rationale: In debt contexts ἀφίημι can mean remit/cancel, but in Matthew this verb
    also resonates with forgiveness language. 'I forgave you' preserves that moral-theological
    overlap while still fitting the debt setting.
- source_word: ἐπεὶ
  chosen: because
  alternatives:
  - since
  - seeing that
  lexicon: BDAG
  rationale: Introduces the reason for the master's action; 'because' is the clearest
    modern English equivalent.
- source_word: παρεκάλεσάς με
  chosen: you pleaded with me
  alternatives:
  - you begged me
  - you appealed to me
  lexicon: BDAG
  rationale: In this context παρακαλέω expresses earnest entreaty. 'Pleaded with me'
    captures the urgency without over-translating.
