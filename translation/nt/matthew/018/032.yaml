theological_decisions:
- issue: Rendering δοῦλος in a parabolic master-slave relationship
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt specifies servant/slave context-dependently, using
    'slave' where bonded nature is salient. Here the economic and legal dependence
    of the debtor on his κύριος is central to the parable's force, so 'slave' is the
    more transparent rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Rendering ἀφίημι in a debt context
  chosen_reading: forgave
  alternative_readings:
  - canceled
  - remitted
  rationale: The immediate referent is debt remission, but Matthew intentionally uses
    forgiveness vocabulary that links the parable's financial imagery to interpersonal/divine
    forgiveness. 'Forgave' preserves that theological connection better than the more
    purely commercial 'canceled,' while remaining intelligible in context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, preserve theological
    tension rather than flattening it'
