theological_decisions:
- issue: Interpretive force of the shepherd's joy comparison
  chosen_reading: The verse states that the shepherd rejoices more over the recovered
    one than over the ninety-nine that have not gone astray, without implying lack
    of care for the ninety-nine.
  alternative_readings:
  - The comparison is hyperbolic and should be softened to avoid suggesting preference
  - The comparison implies the ninety-nine are of lesser value
  rationale: The Greek comparative μᾶλλον ἢ should be translated directly as a real
    comparison. The translation preserves the tension of the saying without importing
    a doctrinal resolution about relative value.
  doctrine_reference: Preserve theological tension rather than resolve it.
