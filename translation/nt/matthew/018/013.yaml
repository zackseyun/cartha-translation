id: MAT.18.13
reference: Matthew 18:13
source:
  edition: SBLGNT
  text: καὶ ἐὰν γένηται εὑρεῖν αὐτό, ἀμὴν λέγω ὑμῖν ὅτι χαίρει ἐπ’ αὐτῷ μᾶλλον ἢ ἐπὶ
    τοῖς ἐνενήκοντα ἐννέα τοῖς μὴ πεπλανημένοις.
translation:
  text: And if he happens to find it, truly I tell you, he rejoices over it more than
    over the ninety-nine that have not gone astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'if it should happen that he finds it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that did not wander off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: Simple connective retained to preserve the flow of Jesus' illustration.
- source_word: ἐὰν γένηται εὑρεῖν αὐτό
  chosen: if he happens to find it
  alternatives:
  - if he finds it
  - if it should happen that he finds it
  lexicon: BDAG
  rationale: The construction ἐὰν + γένηται + infinitive is somewhat idiomatic, expressing
    contingency with an overt sense of occurrence ('if it happens that he finds it').
    'Happens to find' preserves that nuance better than the flatter 'if he finds it'
    while remaining natural English.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: truly I tell you
  alternatives:
  - truly I say to you
  - amen, I tell you
  lexicon: BDAG
  rationale: Standard solemn formula in Jesus' speech. 'Truly I tell you' is clear
    modern English and preserves the emphatic force without unnecessary archaism.
- source_word: χαίρει ἐπ’ αὐτῷ
  chosen: he rejoices over it
  alternatives:
  - he rejoices about it
  - he is glad over it
  lexicon: BDAG
  rationale: χαίρω means 'rejoice/be glad.' 'Rejoices' preserves the stronger affective
    force appropriate to the shepherd's response. ἐπί with dative here is rendered
    'over' to express the object of joy idiomatically.
- source_word: μᾶλλον ἢ
  chosen: more than
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: Comparative construction straightforwardly rendered as 'more than.' 'Rather
    than' could imply exclusion, which is not required by the Greek.
- source_word: τοῖς ἐνενήκοντα ἐννέα
  chosen: the ninety-nine
  alternatives:
  - the ninety-nine sheep
  lexicon: BDAG
  rationale: The noun 'sheep' is implied from context and the preceding verse, but
    not repeated in Greek here. It is left implicit for closer adherence to the source
    while remaining clear in context.
- source_word: τοῖς μὴ πεπλανημένοις
  chosen: that have not gone astray
  alternatives:
  - that did not wander off
  - that have not been led astray
  lexicon: BDAG
  rationale: Perfect participle of πλανάω here describes the ninety-nine as those
    not having wandered from the proper path. 'Gone astray' is idiomatic, fits sheep
    imagery, and preserves the passive/resultative nuance better than a purely active
    paraphrase.
