theological_decisions:
- issue: Temporal and theological force of the binding/loosing formula
  chosen_reading: Rendered as 'will have been bound/loosed in heaven' rather than
    'will be bound/loosed in heaven.'
  alternative_readings:
  - will be bound/loosed in heaven
  rationale: The Greek construction ἔσται + perfect passive participle suggests a
    future state resulting from prior action. This wording preserves the tension that
    earthly binding/loosing corresponds to what stands already bound/loosed in heaven,
    rather than implying that heaven merely ratifies a later earthly decision. This
    avoids importing a denominational theory of ecclesial authority while reflecting
    the grammar as closely as possible.
  doctrine_reference: Translation philosophy §§1, 3, 5
