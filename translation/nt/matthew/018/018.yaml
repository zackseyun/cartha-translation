id: MAT.18.18
reference: Matthew 18:18
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ὅσα ⸀ἐὰν δήσητε ἐπὶ τῆς γῆς ἔσται δεδεμένα ⸀ἐν οὐρανῷ καὶ
    ὅσα ἐὰν λύσητε ἐπὶ τῆς γῆς ἔσται λελυμένα ⸁ἐν οὐρανῷ.
translation:
  text: Truly I tell you, whatever you bind on earth will have been bound in heaven,
    and whatever you loose on earth will have been loosed in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'will be bound in heaven ... will be loosed in heaven.'
      The Greek form can be rendered this way, but the wording here reflects the future
      verb with a perfect participle, which may indicate a state already established
      in heaven.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Used as a solemn affirmation introducing an authoritative saying. 'Truly'
    communicates the force in natural modern English; 'Amen' is possible but less
    transparent in running translation.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard speech formula. 'I tell you' is slightly more natural in contemporary
    English while preserving direct address and authority.
- source_word: ὅσα ἐὰν
  chosen: whatever
  alternatives:
  - whatever things
  - whatever things that
  lexicon: BDAG
  rationale: The relative pronoun with ἐάν expresses an indefinite general condition.
    'Whatever' captures the scope idiomatically without unnecessary stiffness.
- source_word: δήσητε
  chosen: bind
  alternatives:
  - tie up
  - forbid
  lexicon: BDAG
  rationale: δέω literally means 'bind, tie.' In this Matthean context it likely carries
    juridical/authoritative force, but 'bind' best preserves the metaphor and traditional
    conceptual range without over-interpreting it as only 'forbid'.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: Standard spatial idiom contrasting earthly and heavenly spheres. 'On
    earth' is the natural English equivalent.
- source_word: ἔσται δεδεμένα
  chosen: will have been bound
  alternatives:
  - will be bound
  - will stand bound
  lexicon: BDAG
  rationale: The future of εἰμί with perfect passive participle is most naturally
    rendered as a future perfect in English, indicating a state already effected with
    continuing result. This preserves the Greek aspect better than the traditional
    simple future passive 'will be bound'.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Singular οὐρανῷ here functions idiomatically as 'heaven,' the divine
    sphere. 'In heaven' is standard and clear.
- source_word: λύσητε
  chosen: loose
  alternatives:
  - release
  - untie
  - permit
  lexicon: BDAG
  rationale: λύω literally means 'loose, untie, release.' 'Loose' preserves the verbal
    pairing with 'bind' and avoids prematurely narrowing the meaning to only juridical
    'permit'.
- source_word: ἔσται λελυμένα
  chosen: will have been loosed
  alternatives:
  - will be loosed
  - will stand loosed
  lexicon: BDAG
  rationale: As with the first clause, the future + perfect passive participle is
    best represented by an English future perfect passive to reflect prior heavenly
    action/resulting state.
