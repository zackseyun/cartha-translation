id: MAT.20.2
reference: Matthew 20:2
source:
  edition: SBLGNT
  text: ⸂συμφωνήσας δὲ⸃ μετὰ τῶν ἐργατῶν ἐκ δηναρίου τὴν ἡμέραν ἀπέστειλεν αὐτοὺς
    εἰς τὸν ἀμπελῶνα αὐτοῦ.
translation:
  text: After agreeing with the workers for one denarius for the day, he sent them
    into his vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard daily wage for a laborer.
    reason: cultural_note
lexical_decisions:
- source_word: συμφωνήσας
  chosen: After agreeing
  alternatives:
  - having agreed
  - after making an agreement
  lexicon: BDAG
  rationale: Aorist active participle, temporal in relation to the main verb; 'After
    agreeing' gives natural English while preserving the prior action of reaching
    an agreement.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective. It is not naturally represented
    in English at this point, since the participial clause already provides smooth
    narrative linkage.
- source_word: ἐργατῶν
  chosen: workers
  alternatives:
  - laborers
  - workmen
  lexicon: BDAG
  rationale: '''Workers'' is clear modern English and fits the vineyard-hiring context
    without archaic tone.'
- source_word: ἐκ δηναρίου
  chosen: for one denarius
  alternatives:
  - at a denarius
  - for a denarius
  lexicon: BDAG
  rationale: The idiom expresses the agreed wage amount. 'For one denarius' communicates
    compensation clearly in idiomatic English while retaining the ancient coin name
    rather than replacing it with a modern equivalent.
- source_word: τὴν ἡμέραν
  chosen: for the day
  alternatives:
  - a day
  - for a day's work
  - for the whole day
  lexicon: BDAG
  rationale: Accusative of extent/time with the wage expression; 'for the day' naturally
    conveys the agreed daily wage without over-specifying beyond the Greek.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Standard narrative verb; 'sent' is the most natural and sufficiently
    precise rendering.
- source_word: ἀμπελῶνα
  chosen: vineyard
  alternatives:
  - grape vineyard
  lexicon: BDAG
  rationale: The standard meaning is 'vineyard'; no expansion is needed in English.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The possessive pronoun straightforwardly refers to the landowner's vineyard.
