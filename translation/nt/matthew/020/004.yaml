theological_decisions:
- issue: Rendering δίκαιον in a wage-setting context
  chosen_reading: right
  alternative_readings:
  - just
  - fair
  rationale: The verse speaks of the landowner's promise to give what accords with
    justice/right order. 'Right' preserves the ethical dimension of δίκαιον without
    importing a stronger legal nuance or reducing it to subjective fairness. No doctrinally
    contested term from the table is directly involved here.
  doctrine_reference: Translation philosophy §§1, 5
