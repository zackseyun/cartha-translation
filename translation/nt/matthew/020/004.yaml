id: MAT.20.4
reference: Matthew 20:4
source:
  edition: SBLGNT
  text: καὶ ἐκείνοις εἶπεν· Ὑπάγετε καὶ ὑμεῖς εἰς τὸν ἀμπελῶνα, καὶ ὃ ἐὰν ᾖ δίκαιον
    δώσω ὑμῖν·
translation:
  text: And he said to them, ‘You also go into the vineyard, and whatever is right
    I will give you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whatever is just” or “whatever is fair.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνοις
  chosen: to them
  alternatives:
  - to those men
  - to those ones
  lexicon: BDAG
  rationale: Dative plural demonstrative referring to the other laborers just mentioned.
    Simple English pronoun is natural and sufficient in context.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative; preserves direct-speech introduction
    without overinterpreting force.
- source_word: Ὑπάγετε
  chosen: go
  alternatives:
  - go along
  - depart
  lexicon: BDAG
  rationale: Imperative plural of ὑπάγω here functions as a straightforward command
    to go to the vineyard. 'Go' is idiomatic and adequately reflects the verb.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - you as well
  lexicon: BDAG
  rationale: 'The combination marks inclusion/emphasis: these workers, like the earlier
    ones, are also being sent. ''You also'' preserves that emphasis clearly.'
- source_word: ἀμπελῶνα
  chosen: vineyard
  alternatives:
  - grape vineyard
  lexicon: BDAG
  rationale: Standard meaning of ἀμπελών. 'Vineyard' is the normal English equivalent
    and fits the parable setting.
- source_word: ὃ ἐὰν ᾖ δίκαιον
  chosen: whatever is right
  alternatives:
  - whatever is just
  - whatever is fair
  lexicon: BDAG
  rationale: The neuter relative clause means 'whatever may be right/just.' 'Right'
    is concise, natural English and preserves the moral sense without narrowing it
    to legal justice alone. 'Fair' is possible but slightly more interpretive and
    colloquial.
- source_word: δώσω ὑμῖν
  chosen: I will give you
  alternatives:
  - I will pay you
  lexicon: BDAG
  rationale: δίδωμι means 'give.' Although the context concerns wages, the Greek does
    not explicitly use a payment verb here, so 'give you' better preserves the source
    wording while remaining clear.
