id: MAT.20.22
reference: Matthew 20:22
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν· Οὐκ οἴδατε τί αἰτεῖσθε· δύνασθε πιεῖν τὸ ποτήριον
    ὃ ἐγὼ μέλλω ⸀πίνειν; λέγουσιν αὐτῷ· Δυνάμεθα.
translation:
  text: But Jesus answered and said, “You do not know what you are asking. Are you
    able to drink the cup that I am about to drink?” They said to him, “We are able.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the cup of suffering that I am about to drink.' The
      Greek keeps the metaphor 'cup,' a common biblical image for one's appointed
      portion, especially suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν
  chosen: But Jesus answered and said
  alternatives:
  - And Jesus answered and said
  - But Jesus answered
  lexicon: BDAG
  rationale: Retains the narrative formula with both participle and finite verb represented.
    'But' reflects δέ's mild contrast/continuation here better than omitting it; 'answered
    and said' preserves the Greek idiom without excessive paraphrase.
- source_word: Οὐκ οἴδατε
  chosen: You do not know
  alternatives:
  - You do not understand
  lexicon: BDAG
  rationale: οἶδα primarily denotes knowing; 'understand' is interpretive. The direct
    statement of lack of knowledge best matches the Greek.
- source_word: τί αἰτεῖσθε
  chosen: what you are asking
  alternatives:
  - what you ask for
  - what you are requesting
  lexicon: BDAG
  rationale: The present middle is naturally rendered as an ongoing/requestive action
    in English. 'Asking' is idiomatic and sufficiently precise.
- source_word: δύνασθε
  chosen: Are you able
  alternatives:
  - Can you
  lexicon: BDAG
  rationale: '''Are you able'' preserves the sense of capability more explicitly than
    the more colloquial ''Can you,'' fitting the gravity of the saying.'
- source_word: πιεῖν
  chosen: to drink
  lexicon: BDAG
  rationale: Straightforward infinitive rendering.
- source_word: τὸ ποτήριον
  chosen: the cup
  lexicon: BDAG
  rationale: Formal rendering preserves the metaphor used in the Greek and in broader
    biblical usage for allotted suffering or destiny; paraphrasing to 'suffering'
    would over-resolve the image.
- source_word: ὃ ἐγὼ μέλλω πίνειν
  chosen: that I am about to drink
  alternatives:
  - that I am going to drink
  - that I am to drink
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly indicates imminence or intended future
    action. 'Am about to drink' preserves the forward-looking force while keeping
    the metaphor intact.
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They say to him
  lexicon: BDAG
  rationale: Although the Greek uses a historical present, standard readable English
    normally shifts to simple past in narrative.
- source_word: Δυνάμεθα
  chosen: We are able
  alternatives:
  - We can
  lexicon: BDAG
  rationale: Matches the earlier δύνασθε with lexical consistency and preserves the
    emphasis on ability/capacity.
