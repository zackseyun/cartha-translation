theological_decisions:
- issue: Metaphorical force of 'the cup'
  chosen_reading: Retain 'the cup' in the main text without explicating it as suffering
    or death.
  alternative_readings:
  - the suffering I am about to undergo
  - the cup of suffering that I am about to drink
  rationale: The metaphor is theologically significant and intentionally open within
    the narrative, pointing to Jesus' impending suffering without reducing the image
    to a single gloss in the main text. This preserves theological tension rather
    than resolving it interpretively.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
