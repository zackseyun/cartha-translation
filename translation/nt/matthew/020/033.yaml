theological_decisions:
- issue: Rendering of κύριος as address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrinal guidance sets κύριος to 'Lord' by default. In Matthew's
    presentation of appeals to Jesus, 'Lord' is the most fitting and consistent rendering,
    without forcing a fuller christological claim than the text itself states.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
