id: MAT.20.33
reference: Matthew 20:33
source:
  edition: SBLGNT
  text: λέγουσιν αὐτῷ· Κύριε, ἵνα ⸂ἀνοιγῶσιν οἱ ὀφθαλμοὶ ἡμῶν⸃.
translation:
  text: They said to him, “Lord, that our eyes may be opened.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, that our eyes may be opened.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  chosen: They said
  alternatives:
  - They say
  lexicon: BDAG
  rationale: Present-tense narrative verb commonly rendered with English past tense
    in narrative context for natural English style while preserving the reported response.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun marking indirect object; straightforwardly rendered 'to
    him.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this Gospel context addressed to Jesus, 'Lord' preserves both respect and possible
    recognition of his authority better than the less weighty 'Sir.'
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the request. 'That' fits idiomatic
    English after a verb of asking while preserving the subjunctive sense.
- source_word: ἀνοιγῶσιν
  chosen: may be opened
  alternatives:
  - might be opened
  - may open
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive, third plural. Passive rendering best reflects
    the Greek form: the eyes are the grammatical subject receiving the action.'
- source_word: οἱ ὀφθαλμοὶ ἡμῶν
  chosen: our eyes
  lexicon: BDAG
  rationale: Definite article plus noun with genitive pronoun is naturally rendered
    in English as 'our eyes.'
