id: MAT.20.18
reference: Matthew 20:18
source:
  edition: SBLGNT
  text: Ἰδοὺ ἀναβαίνομεν εἰς Ἱεροσόλυμα, καὶ ὁ υἱὸς τοῦ ἀνθρώπου παραδοθήσεται τοῖς
    ἀρχιερεῦσιν καὶ γραμματεῦσιν, καὶ κατακρινοῦσιν αὐτὸν θανάτῳ,
translation:
  text: Look, we are going up to Jerusalem, and the Son of Man will be handed over
    to the chief priests and scribes, and they will condemn him to death,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Behold."
    reason: lexical_alternative
  - marker: b
    text: Or "will be delivered over"; the verb can also be rendered "will be betrayed"
      in a narrower context.
    reason: lexical_alternative
  - marker: c
    text: '"Son of Man" is Jesus'' characteristic self-designation and may echo Daniel
      7:13–14.'
    reason: cross_reference
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Retains the attention-getting force of the discourse marker in readable
    modern English. 'Behold' is more traditional but archaic for the stated target
    audience.
- source_word: ἀναβαίνομεν
  chosen: we are going up
  alternatives:
  - we are going
  - we go up
  lexicon: BDAG
  rationale: The present tense with motion toward Jerusalem is naturally rendered
    as a progressive in English. 'Going up' preserves the conventional and geographical/cultic
    sense of ascent to Jerusalem.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is the established and most accurate rendering of the titular/self-referential
    expression in the Gospels, preserving both its idiomatic form and its possible
    Danielic resonance without interpretive flattening.
- source_word: παραδοθήσεται
  chosen: will be handed over
  alternatives:
  - will be delivered over
  - will be betrayed
  lexicon: BDAG
  rationale: The future passive indicates that the Son of Man will be given into others'
    power. 'Handed over' is broad enough to fit the immediate context without prematurely
    narrowing the action to Judas's betrayal alone.
- source_word: τοῖς ἀρχιερεῦσιν
  chosen: to the chief priests
  alternatives:
  - to the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not merely one high priest.
- source_word: γραμματεῦσιν
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent and remains understandable
    in modern English; ''teachers of the law'' is more interpretive.'
- source_word: κατακρινοῦσιν
  chosen: they will condemn
  alternatives:
  - they will sentence
  - they will pronounce guilty
  lexicon: BDAG
  rationale: Captures the judicial sense of passing adverse judgment. 'Condemn' is
    the most natural English equivalent in this legal context.
- source_word: θανάτῳ
  chosen: to death
  alternatives:
  - with death
  lexicon: BDAG
  rationale: The dative expresses the penalty/result of condemnation; idiomatic English
    is 'condemn ... to death.'
