theological_decisions:
- issue: Rendering of the christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: Preserves the traditional and textually grounded title used by Jesus
    for himself, including its possible allusion to Daniel 7, without reducing it
    to a merely generic anthropological phrase.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Scope of παραδοθήσεται
  chosen_reading: will be handed over
  alternative_readings:
  - will be betrayed
  rationale: Avoids importing a narrower doctrinal or narrative specification than
    the Greek itself states in this verse. The passive focuses on transfer into hostile
    custody, while the specific agent of betrayal is supplied elsewhere in context.
  doctrine_reference: Translation philosophy §1; §3
