id: MAT.20.9
reference: Matthew 20:9
source:
  edition: SBLGNT
  text: ⸂καὶ ἐλθόντες⸃ οἱ περὶ τὴν ἑνδεκάτην ὥραν ἔλαβον ἀνὰ δηνάριον.
translation:
  text: And those who came about the eleventh hour received a denarius each.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard Roman silver coin, commonly understood as a typical
      day's wage for a laborer.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this event to the preceding narrative. 'And'
    preserves the simple narrative flow without adding temporal nuance beyond the
    Greek.
- source_word: ἐλθόντες
  chosen: who came
  alternatives:
  - having come
  - when they came
  lexicon: BDAG
  rationale: Aorist participle modifying the workers. 'Who came' gives natural English
    while preserving the participial sense tied to the subject. 'Having come' is more
    formally literal but less idiomatic here.
- source_word: οἱ περὶ τὴν ἑνδεκάτην ὥραν
  chosen: those who came about the eleventh hour
  alternatives:
  - those around the eleventh hour
  - those hired about the eleventh hour
  lexicon: BDAG
  rationale: The article with the prepositional phrase identifies the group associated
    with the eleventh hour. 'About the eleventh hour' reflects περὶ with temporal
    accusative. 'Hired' is contextually implied from the parable but not stated in
    this clause, so 'came' is retained from the participle to avoid importing extra
    wording.
- source_word: ἔλαβον
  chosen: received
  alternatives:
  - got
  - took
  lexicon: BDAG
  rationale: In this wage-payment context, 'received' best conveys the sense of being
    given payment. 'Took' could sound overly active in English, and 'got' is too informal.
- source_word: ἀνὰ
  chosen: each
  alternatives:
  - apiece
  - a piece
  lexicon: BDAG
  rationale: With the distributive accusative, ἀνά indicates one item per person.
    English expresses this naturally with 'each'.
- source_word: δηνάριον
  chosen: a denarius
  alternatives:
  - one denarius
  - a day's wage
  lexicon: BDAG
  rationale: '''Denarius'' preserves the historical coin term directly present in
    the Greek. ''A day''s wage'' captures approximate value but interprets rather
    than translates; that cultural information is better preserved in a footnote if
    needed.'
