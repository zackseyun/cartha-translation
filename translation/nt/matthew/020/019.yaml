theological_decisions:
- issue: Resurrection verb voice
  chosen_reading: he will be raised
  alternative_readings:
  - he will rise
  rationale: The Greek uses a future passive form, and rendering it passively preserves
    the text's wording and the theological nuance of divine action without excluding
    Christ's own agency elsewhere.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
