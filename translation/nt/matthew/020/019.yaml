id: MAT.20.19
reference: Matthew 20:19
source:
  edition: SBLGNT
  text: καὶ παραδώσουσιν αὐτὸν τοῖς ἔθνεσιν εἰς τὸ ἐμπαῖξαι καὶ μαστιγῶσαι καὶ σταυρῶσαι,
    καὶ τῇ τρίτῃ ἡμέρᾳ ⸀ἐγερθήσεται.
translation:
  text: and they will hand him over to the Gentiles to mock and flog and crucify him,
    and on the third day he will be raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will rise.' The Greek verb is passive ('he will be raised'), a common
      resurrection expression that can imply God's action.
    reason: alternative_reading
lexical_decisions:
- source_word: παραδώσουσιν
  chosen: will hand ... over
  alternatives:
  - will deliver
  - will betray
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over/deliver into another's power.
    'Hand over' is natural modern English and preserves the transfer-to-hostile-authorities
    sense without importing the more specific 'betray'.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  - to the pagans
  lexicon: BDAG
  rationale: In this Jewish-context passion prediction, ἔθνη refers specifically to
    non-Jewish authorities rather than nations in general. 'Gentiles' is the most
    contextually precise rendering.
- source_word: εἰς τὸ ἐμπαῖξαι
  chosen: to mock
  alternatives:
  - for mocking
  - to ridicule
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose/result. 'To mock'
    is concise and idiomatic, preserving the verbal force of ἐμπαίζω.
- source_word: μαστιγῶσαι
  chosen: flog
  alternatives:
  - scourge
  - whip
  lexicon: BDAG
  rationale: '''Flog'' is clear modern English for judicial whipping. ''Scourge''
    is traditional but more archaic; ''whip'' is less specific.'
- source_word: σταυρῶσαι
  chosen: crucify him
  alternatives:
  - execute him by crucifixion
  lexicon: BDAG
  rationale: The verb directly means 'to crucify.' Supplying 'him' in English clarifies
    the shared object across the coordinated infinitives.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after
  - the third day
  lexicon: BDAG
  rationale: The dative phrase is a temporal expression best rendered 'on the third
    day' in idiomatic English.
- source_word: ἐγερθήσεται
  chosen: he will be raised
  alternatives:
  - he will rise
  - he will be awakened
  lexicon: BDAG
  rationale: 'The future passive of ἐγείρω is most naturally rendered as a divine
    passive in resurrection contexts: ''he will be raised.'' This preserves the passive
    form of the Greek better than ''he will rise.'''
