id: MAT.20.6
reference: Matthew 20:6
source:
  edition: SBLGNT
  text: περὶ δὲ τὴν ⸀ἑνδεκάτην ἐξελθὼν εὗρεν ἄλλους ⸀ἑστῶτας, καὶ λέγει αὐτοῖς· Τί
    ὧδε ἑστήκατε ὅλην τὴν ἡμέραν ἀργοί;
translation:
  text: And about the eleventh hour, after going out, he found others standing there,
    and he says to them, ‘Why have you been standing here idle all day?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'about eleven o’clock.' Literally, 'about the eleventh hour.'
    reason: lexical_alternative
  - marker: b
    text: 'Or, ''he said to them.'' The Greek uses a historical present: ''he says.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τὴν ἑνδεκάτην
  chosen: about the eleventh hour
  alternatives:
  - about eleven o’clock
  - about the eleventh hour of the day
  lexicon: BDAG
  rationale: περί with the accusative expresses approximation ('about/around'). Retaining
    'the eleventh hour' preserves the parable’s temporal framing and biblical idiom,
    while remaining understandable in English.
- source_word: ἐξελθὼν
  chosen: after going out
  alternatives:
  - going out
  - having gone out
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as antecedent to the
    main verb εὗρεν. 'After going out' makes the sequence clear in natural English
    without over-paraphrasing.
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he came upon
  lexicon: BDAG
  rationale: Standard rendering of εὑρίσκω; simple and direct.
- source_word: ἄλλους
  chosen: others
  alternatives:
  - other men
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Others' is sufficient in English;
    adding 'men' would over-specify beyond what the immediate English sentence requires.
- source_word: ἑστῶτας
  chosen: standing there
  alternatives:
  - standing
  - standing around
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι conveys a standing state. 'Standing there'
    reflects both the posture/state and the adverbial sense supplied by context with
    ὧδε later in the verse.
- source_word: καὶ λέγει αὐτοῖς
  chosen: and he says to them
  alternatives:
  - and he said to them
  lexicon: BDAG
  rationale: λέγει is present tense in the Greek narrative. Rendering it as historical
    present ('he says') preserves the vividness of the source text.
- source_word: Τί
  chosen: Why
  alternatives:
  - What is the reason that
  - For what reason
  lexicon: BDAG
  rationale: Although literally 'what?', τί in this question idiomatically means 'why?'.
    This is the plain sense in English.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Simple locative adverb; 'here' is the natural equivalent.
- source_word: ἑστήκατε
  chosen: have you been standing
  alternatives:
  - are you standing
  - have you stood
  lexicon: BDAG
  rationale: Perfect of ἵστημι emphasizes the continuing state resulting from standing.
    English present perfect progressive best captures the durative force in context.
- source_word: ὅλην τὴν ἡμέραν
  chosen: all day
  alternatives:
  - the whole day
  - the entire day
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the accusative duration phrase.
- source_word: ἀργοί
  chosen: idle
  alternatives:
  - doing nothing
  - unemployed
  lexicon: BDAG
  rationale: ἀργός means idle, inactive, not working. 'Idle' is the most direct lexical
    match. 'Unemployed' is interpretive and more socio-economic than the Greek term
    itself.
