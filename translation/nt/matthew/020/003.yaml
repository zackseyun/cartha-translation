id: MAT.20.3
reference: Matthew 20:3
source:
  edition: SBLGNT
  text: καὶ ἐξελθὼν περὶ τρίτην ὥραν εἶδεν ἄλλους ἑστῶτας ἐν τῇ ἀγορᾷ ἀργούς·
translation:
  text: And going out about the third hour, he saw others standing idle in the marketplace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about nine in the morning.' The phrase 'the third hour' reflects Jewish
      daytime reckoning from sunrise.
    reason: cultural_note
  - marker: b
    text: Or 'unemployed.' The Greek says 'idle,' describing that they were not at
      work.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: going out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, rendered with a natural English participial
    clause that preserves the sequential action without over-formalizing it.
- source_word: περὶ τρίτην ὥραν
  chosen: about the third hour
  alternatives:
  - around the third hour
  - about nine in the morning
  lexicon: BDAG
  rationale: Retains the Jewish time expression in the main text for source transparency.
    'About nine in the morning' is interpretive and better suited as an alternative
    rather than the main rendering.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Simple past of ὁράω; 'saw' is the plain and sufficient rendering in narrative
    context.
- source_word: ἄλλους
  chosen: others
  alternatives:
  - other men
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Others' is idiomatic and does
    not add 'men' where the Greek leaves it implicit.
- source_word: ἑστῶτας
  chosen: standing
  alternatives:
  - standing there
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι with stative force; 'standing' captures
    their posture/state without unnecessary expansion.
- source_word: ἀγορᾷ
  chosen: marketplace
  alternatives:
  - market
  - public square
  lexicon: BDAG
  rationale: ἀγορά refers to the public market area where laborers would gather; 'marketplace'
    best conveys the setting in clear modern English.
- source_word: ἀργούς
  chosen: idle
  alternatives:
  - unemployed
  - doing nothing
  lexicon: BDAG
  rationale: ἀργός means idle or not working. 'Idle' is the most direct lexical equivalent
    and avoids importing a modern economic category, though in context it implies
    they were without work.
