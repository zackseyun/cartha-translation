id: MAT.20.30
reference: Matthew 20:30
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ δύο τυφλοὶ καθήμενοι παρὰ τὴν ὁδόν, ἀκούσαντες ὅτι Ἰησοῦς παράγει,
    ἔκραξαν λέγοντες· ⸂Κύριε, ἐλέησον ἡμᾶς⸃, ⸀υἱὸς Δαυίδ.
translation:
  text: And behold, two blind men sitting by the road, when they heard that Jesus
    was passing by, cried out, saying, “Lord, have mercy on us, Son of David.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the discourse marker's attention-directing
    force and the narrative vividness common in Matthew, despite its slightly elevated
    English register.
- source_word: τυφλοὶ
  chosen: blind men
  alternatives:
  - blind people
  - the blind
  lexicon: BDAG
  rationale: The masculine plural refers here to two specific male individuals, so
    'blind men' is gender-accurate and contextually precise.
- source_word: καθήμενοι παρὰ τὴν ὁδόν
  chosen: sitting by the road
  alternatives:
  - sitting beside the road
  - seated along the roadside
  lexicon: BDAG
  rationale: A natural rendering of the participial phrase that preserves the physical
    setting without unnecessary stiffness. 'Road' is slightly more natural than 'way'
    in contemporary English.
- source_word: ἀκούσαντες ὅτι Ἰησοῦς παράγει
  chosen: when they heard that Jesus was passing by
  alternatives:
  - hearing that Jesus was passing by
  - when they heard that Jesus was going by
  lexicon: BDAG
  rationale: The aorist participle is best rendered temporally in English here. 'Passing
    by' captures παράγει idiomatically in this travel context.
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: '''Cried out'' preserves the intensity of κράζω without sounding overly
    colloquial.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this messianic appeal, 'Lord'
    also fits the reverential and potentially christological force better than 'Sir'
    or 'Master'.
- source_word: ἐλέησον ἡμᾶς
  chosen: have mercy on us
  alternatives:
  - show us mercy
  - be merciful to us
  lexicon: BDAG
  rationale: This is the standard and natural English rendering of the aorist imperative
    appeal for compassionate help.
- source_word: υἱὸς Δαυίδ
  chosen: Son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: This is a recognized messianic title in Matthew. The traditional literal
    rendering best preserves both the Davidic and royal-messianic resonance.
