theological_decisions:
- issue: Rendering of κύριος in a direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrinal guidance specifies 'Lord' as the default rendering for
    κύριος. In this context, paired with 'Son of David,' the address carries reverential
    and messianic weight, so 'Lord' best preserves the text's theological force without
    over-interpreting it.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Messianic force of υἱὸς Δαυίδ
  chosen_reading: Son of David
  alternative_readings:
  - descendant of David
  rationale: The phrase functions as a messianic title in Matthew, and the translation
    preserves that title rather than flattening it into a merely genealogical description.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
