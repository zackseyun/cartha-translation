id: MAT.20.13
reference: Matthew 20:13
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς ⸂ἑνὶ αὐτῶν εἶπεν⸃· Ἑταῖρε, οὐκ ἀδικῶ σε· οὐχὶ δηναρίου συνεφώνησάς
    μοι;
translation:
  text: But answering, he said to one of them, ‘Friend, I am not wronging you. Did
    you not agree with me for a denarius?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am doing you no wrong.'
    reason: lexical_alternative
  - marker: b
    text: A denarius was a standard Roman silver coin, commonly understood as a typical
      day's wage for a laborer.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: A participial form introducing the master's response. 'Answering' preserves
    the Greek structure, while still reading naturally in English when followed by
    'he said.'
- source_word: ἑνὶ αὐτῶν
  chosen: to one of them
  alternatives:
  - to one among them
  lexicon: BDAG
  rationale: Dative singular with partitive genitive; standard sense is that he addresses
    a single individual from the group.
- source_word: Ἑταῖρε
  chosen: Friend
  alternatives:
  - Companion
  - Comrade
  lexicon: BDAG
  rationale: Vocative address used in Matthew. 'Friend' is the most idiomatic modern
    English equivalent, though in context it can carry a restrained or distancing
    tone rather than warm intimacy.
- source_word: οὐκ ἀδικῶ σε
  chosen: I am not wronging you
  alternatives:
  - I am doing you no wrong
  - I am not being unjust to you
  lexicon: BDAG
  rationale: ἀδικέω means to act unjustly toward, wrong, or injure. 'Wronging' keeps
    the personal-object force of σε and the present tense. 'Doing you no wrong' is
    idiomatic but slightly less transparent to the Greek verb.
- source_word: οὐχὶ
  chosen: Did you not
  alternatives:
  - Didn’t you
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. 'Did you not'
    preserves that rhetorical force in a clear, slightly formal way appropriate to
    the dialogue.
- source_word: δηναρίου
  chosen: for a denarius
  alternatives:
  - for the wage of a denarius
  - for a silver coin
  lexicon: BDAG
  rationale: Genitive of price after συμφωνέω in this context. 'Denarius' preserves
    the historical coinage rather than flattening it into a generic 'coin' or interpretive
    'day's wage.'
- source_word: συνεφώνησάς μοι
  chosen: agree with me
  alternatives:
  - make an agreement with me
  - come to terms with me
  lexicon: BDAG
  rationale: συμφωνέω here refers to reaching an agreement or arrangement. 'Agree
    with me' is concise, natural, and accurately reflects the aorist reference to
    the prior hiring agreement.
