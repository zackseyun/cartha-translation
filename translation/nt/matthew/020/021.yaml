theological_decisions:
- issue: Nature of the requested seating in relation to Jesus' kingship
  chosen_reading: Render spatially and royally as a request for places of honor 'in
    your kingdom' without specifying an earthly or heavenly phase of the kingdom.
  alternative_readings:
  - an earthly messianic kingdom
  - the consummated heavenly kingdom
  rationale: The Greek states only that the sons be seated at Jesus' right and left
    in his kingdom. The translation should preserve the royal and honorific sense
    without importing a specific eschatological scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
