id: MAT.20.21
reference: Matthew 20:21
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῇ· Τί θέλεις; λέγει αὐτῷ· Εἰπὲ ἵνα καθίσωσιν οὗτοι οἱ δύο υἱοί
    μου εἷς ἐκ δεξιῶν ⸀σου καὶ εἷς ἐξ εὐωνύμων σου ἐν τῇ βασιλείᾳ σου.
translation:
  text: And he said to her, “What do you want?” She said to him, “Say that these two
    sons of mine may sit, one at your right and one at your left, in your kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one on your right and one on your left.”
    reason: lexical_alternative
  - marker: b
    text: “Say” could be rendered “command” or, more interpretively, “grant,” but
      the Greek verb is simply “say.”
    reason: lexical_alternative
  - marker: c
    text: “Kingdom” may also be understood as “reign” or “royal rule.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί θέλεις
  chosen: What do you want?
  alternatives:
  - What do you wish?
  - What do you desire?
  lexicon: BDAG
  rationale: θέλω here asks directly what request she is making. 'Want' is natural
    modern English and preserves the straightforward force without sounding overly
    formal.
- source_word: Εἰπὲ
  chosen: Say
  alternatives:
  - Command
  - Declare
  - Grant
  lexicon: BDAG
  rationale: The aorist imperative of λέγω is literally 'say.' In context she asks
    Jesus to pronounce or state the arrangement. 'Grant' would over-interpret the
    implied effect rather than translate the verb itself; 'say' best preserves the
    Greek wording while remaining idiomatic with the following ἵνα clause.
- source_word: ἵνα καθίσωσιν
  chosen: that ... may sit
  alternatives:
  - that ... may be seated
  - that ... might sit
  lexicon: BDAG
  rationale: This ἵνα clause expresses the content of the request. 'May sit' is idiomatic
    English for requested permission/appointment and keeps the sense without making
    it overly wooden.
- source_word: οὗτοι οἱ δύο υἱοί μου
  chosen: these two sons of mine
  alternatives:
  - my two sons here
  - these my two sons
  lexicon: BDAG
  rationale: The demonstrative οὗτοι is retained with 'these,' and μου is naturally
    rendered by 'of mine' in English to preserve the emphatic personal reference.
- source_word: εἷς ἐκ δεξιῶν σου
  chosen: one at your right
  alternatives:
  - one on your right
  - one at your right hand
  lexicon: BDAG
  rationale: The idiom ἐκ δεξιῶν σου denotes position at the right side. 'At your
    right' is concise and natural; 'right hand' is possible but slightly more interpretive
    than the Greek phrase requires.
- source_word: εἷς ἐξ εὐωνύμων σου
  chosen: one at your left
  alternatives:
  - one on your left
  lexicon: BDAG
  rationale: εὐώνυμος literally means 'left' (lit. 'well-named' as a euphemism), and
    the idiomatic sense here is straightforwardly spatial. 'At your left' matches
    the parallelism with 'at your right.'
- source_word: ἐν τῇ βασιλείᾳ σου
  chosen: in your kingdom
  alternatives:
  - in your reign
  - in your royal rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign/rule or kingdom. Here, because the request
    concerns places of honor in the Messiah's royal domain, 'kingdom' is the most
    natural and traditional English rendering without excluding royal authority.
