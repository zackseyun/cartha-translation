theological_decisions:
- issue: Nature of the saying's reversal
  chosen_reading: Render as a concise reversal proverb without specifying whether
    'last/first' refers to chronology, social status, reward, or salvation.
  alternative_readings:
  - Interpret as social reversal
  - Interpret as reversal of reward within discipleship
  - Interpret as statement about salvation order
  rationale: The Greek itself states the reversal aphorism without narrowing its scope.
    The translation should preserve that theological tension rather than resolve it
    beyond the immediate wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
