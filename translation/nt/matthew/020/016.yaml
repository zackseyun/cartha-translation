id: MAT.20.16
reference: Matthew 20:16
source:
  edition: SBLGNT
  text: οὕτως ἔσονται οἱ ἔσχατοι πρῶτοι καὶ οἱ πρῶτοι ⸀ἔσχατοι.
translation:
  text: So the last will be first, and the first last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus the last will be first, and the first last.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces the concluding application of the parable. 'So' is natural
    modern English and preserves the inferential/resultative force without sounding
    overly formal.
- source_word: ἔσονται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future of εἰμί is straightforwardly rendered 'will be' in readable modern
    English.
- source_word: οἱ ἔσχατοι
  chosen: the last
  alternatives:
  - those who are last
  - the least
  lexicon: BDAG
  rationale: The article with the adjective functions substantivally. 'The last' is
    the most direct and idiomatic rendering in this reversal saying. 'The least' would
    over-interpret social value rather than sequence/status reversal.
- source_word: πρῶτοι
  chosen: first
  alternatives:
  - foremost
  lexicon: BDAG
  rationale: In predicate position after 'will be,' 'first' preserves the concise
    antithetical structure of the Greek.
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: Simple coordination is intended; 'but' would add adversative force not
    explicit in the Greek.
- source_word: οἱ πρῶτοι
  chosen: the first
  alternatives:
  - those who are first
  - the foremost
  lexicon: BDAG
  rationale: Substantival adjective parallel to 'the last'; retaining the same structure
    preserves the balanced reversal.
- source_word: ἔσχατοι
  chosen: last
  alternatives:
  - least
  lexicon: BDAG
  rationale: Predicate adjective completing the reversal formula. 'Last' matches the
    lexical and rhetorical parallel with the first clause.
