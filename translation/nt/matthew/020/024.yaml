id: MAT.20.24
reference: Matthew 20:24
source:
  edition: SBLGNT
  text: Καὶ ἀκούσαντες οἱ δέκα ἠγανάκτησαν περὶ τῶν δύο ἀδελφῶν.
translation:
  text: And when the ten heard it, they became indignant about the two brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after hearing this' or 'having heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when [they] heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context; English supplies 'it'
    because the object is implicit from the preceding request and needed for natural
    readability.
- source_word: οἱ δέκα
  chosen: the ten
  alternatives:
  - the other ten
  - the ten disciples
  lexicon: BDAG
  rationale: The phrase refers to the remaining ten disciples. 'The ten' is the most
    direct rendering; fuller identifications are interpretive expansions not required
    by the Greek.
- source_word: ἠγανάκτησαν
  chosen: became indignant
  alternatives:
  - were angry
  - were upset
  lexicon: BDAG
  rationale: The verb denotes strong displeasure or indignation. 'Became indignant'
    preserves the force better than the flatter 'were upset' and is more precise than
    simply 'were angry.'
- source_word: περὶ
  chosen: about
  alternatives:
  - with
  - at
  - concerning
  lexicon: BDAG
  rationale: With the genitive here, περί marks reference or relation. 'About' is
    natural modern English and captures the sense without overinterpreting hostility.
- source_word: τῶν δύο ἀδελφῶν
  chosen: the two brothers
  alternatives:
  - the two brothers [James and John]
  - the two siblings
  lexicon: BDAG
  rationale: ἀδελφῶν literally means 'brothers,' and the immediate context concerns
    two male siblings. This follows the gender-accurate policy and avoids the less
    precise gender-neutral 'siblings.'
