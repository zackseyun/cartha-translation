theological_decisions:
- issue: Referent of 'the two brothers'
  chosen_reading: Retain the literal expression 'the two brothers' without naming
    them in the main text.
  alternative_readings:
  - Explicitly identify them as James and John in the translation
  rationale: The context makes the referents clear, but the Greek text itself uses
    the relational expression rather than their names. Preserving that wording avoids
    unnecessary interpretive expansion.
  doctrine_reference: Translation philosophy §1, §4, §6
