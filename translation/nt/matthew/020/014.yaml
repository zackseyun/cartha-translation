theological_decisions:
- issue: Gendered rendering of a masculine singular personal referent
  chosen_reading: this last man
  alternative_readings:
  - this last one
  rationale: The Greek uses masculine singular forms for an individual worker in the
    parable. Per the translation philosophy, gender-accurate rendering is preferred
    over neutralizing when the source refers to a male individual or masculine personal
    referent. 'Man' is therefore retained rather than the more generic 'one.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
