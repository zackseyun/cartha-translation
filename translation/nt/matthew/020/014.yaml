id: MAT.20.14
reference: Matthew 20:14
source:
  edition: SBLGNT
  text: ἆρον τὸ σὸν καὶ ὕπαγε· θέλω δὲ τούτῳ τῷ ἐσχάτῳ δοῦναι ὡς καὶ σοί·
translation:
  text: Take what is yours and go. But I want to give to this last man the same as
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to this last one the same as to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἆρον
  chosen: Take
  alternatives:
  - Pick up
  - Receive
  lexicon: BDAG
  rationale: Aorist imperative of αἴρω here functions idiomatically as a command to
    take what belongs to him and depart. 'Take' is natural English and preserves the
    directness.
- source_word: τὸ σὸν
  chosen: what is yours
  alternatives:
  - your own
  - your wages
  lexicon: BDAG
  rationale: The neuter substantive phrase literally means 'the yours/your own.' 'What
    is yours' is idiomatic and sufficiently broad; 'your wages' is contextually possible
    but adds specificity not explicit in the Greek of this clause.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - be on your way
  - go away
  lexicon: BDAG
  rationale: Present imperative of ὑπάγω in this context is a dismissal. 'Go' is concise
    and natural without overinterpreting the tone as hostile.
- source_word: θέλω δὲ
  chosen: But I want
  alternatives:
  - But I wish
  - Yet I desire
  lexicon: BDAG
  rationale: θέλω expresses volition or intention. 'But I want' best reflects the
    speaker's stated will in plain modern English; δέ is adequately represented by
    'But' as a mild contrast.
- source_word: τούτῳ τῷ ἐσχάτῳ
  chosen: to this last man
  alternatives:
  - to this last one
  - to this man who came last
  lexicon: BDAG
  rationale: ἐσχάτῳ means 'last.' Because the referent in the parable is an individual
    laborer, 'this last man' makes the personal reference explicit in English. 'One'
    is possible, but 'man' better matches the singular personal referent while remaining
    gender-accurate in context.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to pay
  - to grant
  lexicon: BDAG
  rationale: The infinitive of δίδωμι is simply 'to give.' Although the context concerns
    payment, 'give' preserves the broader lexical sense and the master's freedom in
    generosity.
- source_word: ὡς καὶ σοί
  chosen: the same as to you
  alternatives:
  - as also to you
  - just as to you
  lexicon: BDAG
  rationale: ὡς with καί and the dative comparison indicates equal treatment. 'The
    same as to you' makes the implied equality explicit in idiomatic English.
