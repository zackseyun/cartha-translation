theological_decisions:
- issue: Whether to interpret the idiom ὀφθαλμός σου πονηρός in the main text
  chosen_reading: Preserve the literal idiom 'is your eye evil' in the main text
  alternative_readings:
  - are you envious
  - are you resentful because I am generous
  rationale: The verse contrasts the worker's 'evil eye' with the master's goodness.
    Rendering the idiom literally preserves the source imagery and theological tension
    rather than resolving it into a single interpretation. Because the idiom may be
    opaque in English, an explanatory footnote preserves the likely sense of envy.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
