id: MAT.20.15
reference: Matthew 20:15
source:
  edition: SBLGNT
  text: ⸀οὐκ ἔξεστίν μοι ⸂ὃ θέλω ποιῆσαι⸃ ἐν τοῖς ἐμοῖς; ⸀ἢ ὁ ὀφθαλμός σου πονηρός
    ἐστιν ὅτι ἐγὼ ἀγαθός εἰμι;
translation:
  text: Is it not lawful for me to do what I want with what is mine? Or is your eye
    evil because I am good?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Are you envious because I am good?'' The expression ''your eye is
      evil'' is a Greek idiom for envy or begrudging resentment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξεστίν
  chosen: is it lawful
  alternatives:
  - is it permitted
  - do I not have the right
  lexicon: BDAG
  rationale: The verb denotes what is permitted or lawful. 'Is it lawful' preserves
    the legal/rightful nuance in the landowner's rhetorical question, while remaining
    natural English.
- source_word: ὃ θέλω ποιῆσαι
  chosen: to do what I want
  alternatives:
  - to do what I wish
  - to do what I will
  lexicon: BDAG
  rationale: This infinitival clause expresses personal volition. 'What I want' is
    idiomatic modern English and accurately reflects θέλω without archaic overtones.
- source_word: ἐν τοῖς ἐμοῖς
  chosen: with what is mine
  alternatives:
  - with my own things
  - in what belongs to me
  lexicon: BDAG
  rationale: The dative plural with ἐν is idiomatic for one's own possessions/property.
    'With what is mine' communicates ownership clearly in English and fits the economic
    context of the parable.
- source_word: ὀφθαλμός σου πονηρός
  chosen: is your eye evil
  alternatives:
  - are you envious
  - is your eye bad
  lexicon: BDAG
  rationale: The Greek idiom literally says 'your eye is evil.' Because this expression
    carries a culturally loaded sense of envy or begrudging stinginess, the main text
    preserves the metaphor for transparency, while an explanatory alternative is preserved
    in a footnote.
- source_word: ἀγαθός
  chosen: good
  alternatives:
  - generous
  - kind
  lexicon: BDAG
  rationale: The adjective straightforwardly means 'good.' Although in this context
    it implies generosity, 'good' best preserves the lexical form and leaves the reader
    to hear the contrast with 'evil eye' as stated in Greek.
