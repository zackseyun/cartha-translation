theological_decisions:
- issue: Rendering ἐθνῶν in a Jewish-context saying of Jesus
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The verse contrasts the pattern of rule characteristic of non-Jewish
    rulers with the kingdom ethic Jesus is about to teach his disciples. 'Gentiles'
    best preserves that contextual contrast without importing extra theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered rendering of οἱ μεγάλοι
  chosen_reading: their great men
  alternative_readings:
  - their great ones
  - their important people
  rationale: The Greek form is grammatically masculine plural. Per the gender-accurate
    policy, the translation should not flatten this into a gender-neutral expression
    without cause. A footnote preserves a less gender-marked lexical alternative because
    the phrase likely refers representatively to prominent persons or officials.
  doctrine_reference: Translation philosophy §4
