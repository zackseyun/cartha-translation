id: MAT.20.25
reference: Matthew 20:25
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς προσκαλεσάμενος αὐτοὺς εἶπεν· Οἴδατε ὅτι οἱ ἄρχοντες τῶν ἐθνῶν
    κατακυριεύουσιν αὐτῶν καὶ οἱ μεγάλοι κατεξουσιάζουσιν αὐτῶν.
translation:
  text: But Jesus, calling them to himself, said, “You know that the rulers of the
    Gentiles lord it over them, and their great men exercise authority over them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the rulers of the nations.”
    reason: alternative_reading
  - marker: b
    text: Or “their great ones” or “their high officials.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: calling them to himself
  alternatives:
  - calling them
  - summoning them
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι conveys Jesus drawing the disciples
    to himself before speaking. 'Calling them to himself' makes the middle nuance
    natural in English without overtranslating.
- source_word: Οἴδατε
  chosen: You know
  alternatives:
  - You have known
  - You understand
  lexicon: BDAG
  rationale: οἶδα is perfect in form but present in sense. 'You know' is the idiomatic
    and semantically accurate English rendering.
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: BDAG
  rationale: ἄρχοντες refers to those who rule or govern. 'Rulers' is broad, clear
    modern English and fits the political context.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In this Jewish-context contrast,
    'Gentiles' best captures the conventional sense of non-Jewish peoples and matches
    common NT usage.
- source_word: κατακυριεύουσιν
  chosen: lord it over
  alternatives:
  - dominate
  - rule over
  lexicon: BDAG
  rationale: The compound verb carries the sense of exercising lordship in a domineering
    way. 'Lord it over' preserves the pejorative force better than the more neutral
    'rule over.'
- source_word: οἱ μεγάλοι
  chosen: their great men
  alternatives:
  - the great ones
  - their high officials
  lexicon: BDAG
  rationale: μέγαλοι here denotes socially or politically prominent persons. 'Their
    great men' preserves the substantival adjective and the masculine form, while
    sounding natural in English. The possessive 'their' is supplied from context because
    the following αὐτῶν indicates the peoples under them.
- source_word: κατεξουσιάζουσιν
  chosen: exercise authority over
  alternatives:
  - dominate
  - wield power over
  lexicon: BDAG
  rationale: The verb means to exercise authority over, often with an oppressive nuance.
    'Exercise authority over' is accurate and readable; the oppressive flavor is already
    reinforced by the parallel with 'lord it over.'
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - those peoples
  - the Gentiles
  lexicon: BDAG
  rationale: The genitive pronoun refers back to τῶν ἐθνῶν as the people being ruled.
    English idiom prefers 'them' rather than repeating 'the Gentiles' twice.
