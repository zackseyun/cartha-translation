theological_decisions:
- issue: Rendering of δοῦλος in a discipleship saying
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse contrasts social ambition with radical self-abasement. Since
    the immediately preceding context uses a different service term, retaining the
    stronger force of δοῦλος is important and aligns with the doctrine guideline that
    'slave' should be used where bonded status is salient. This choice avoids flattening
    Jesus' escalation in language.
