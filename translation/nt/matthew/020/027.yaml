id: MAT.20.27
reference: Matthew 20:27
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἂν θέλῃ ἐν ὑμῖν εἶναι πρῶτος ⸀ἔσται ὑμῶν δοῦλος·
translation:
  text: And whoever wants to be first among you will be your slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Greek word is doulos, a stronger term than the one in
      the previous verse and often denotes a slave or bonded servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἂν θέλῃ
  chosen: whoever wants
  alternatives:
  - whoever wishes
  - whoever desires
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν and the subjunctive expresses an indefinite/general
    condition: ''whoever'' or ''whoever may.'' ''Wants'' is natural modern English
    for θέλω here and preserves the volitional sense without sounding stilted.'
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among you all
  lexicon: BDAG
  rationale: In this social-ranking context, ἐν with the dative is best rendered idiomatically
    as 'among you,' indicating position within the community rather than mere location.
- source_word: εἶναι πρῶτος
  chosen: to be first
  alternatives:
  - to become first
  - to be foremost
  lexicon: BDAG
  rationale: The infinitive with πρῶτος expresses aspiration to highest rank or status.
    'To be first' is the most direct and idiomatic rendering in English.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - must be
  - shall be
  lexicon: BDAG
  rationale: 'The future middle indicative is rendered straightforwardly as future:
    ''will be.'' In context it functions imperativally or normatively, but English
    can preserve that force without replacing it with ''must.'''
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: 'The genitive indicates relation or belonging: the one seeking first
    place is to be ''your'' slave, i.e., in service to the others.'
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where the bonded
    nature is salient. Here Jesus intensifies the prior verse's διάκονος ('servant')
    with the stronger δοῦλος, so 'slave' preserves the rhetorical contrast and force
    better than 'servant.'
