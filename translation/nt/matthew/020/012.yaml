theological_decisions:
- issue: Parabolic complaint about fairness/equality
  chosen_reading: Render the workers' protest straightforwardly without importing
    theological interpretation about divine justice into the translation.
  alternative_readings:
  - A more interpretive rendering emphasizing unfair treatment
  rationale: The verse reports the laborers' complaint in the parable; the translation
    should preserve their wording and emotional force without resolving the broader
    theological point in the wording itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
