id: MAT.20.12
reference: Matthew 20:12
source:
  edition: SBLGNT
  text: ⸀λέγοντες· Οὗτοι οἱ ἔσχατοι μίαν ὥραν ἐποίησαν, καὶ ἴσους ⸂αὐτοὺς ἡμῖν⸃ ἐποίησας
    τοῖς βαστάσασι τὸ βάρος τῆς ἡμέρας καὶ τὸν καύσωνα.
translation:
  text: saying, ‘These last worked one hour, and you made them equal to us, who bore
    the burden of the day and the scorching heat.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you treated them as equal to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Present participle nominative plural, linked to the previous narrative
    clause; 'saying' preserves the participial flow of the Greek while remaining natural
    in English.
- source_word: Οὗτοι οἱ ἔσχατοι
  chosen: These last
  alternatives:
  - These last ones
  - These who came last
  lexicon: BDAG
  rationale: ἔσχατοι here refers to the last-hired workers in the parable. 'These
    last' is concise and preserves the contrastive force of the Greek.
- source_word: μίαν ὥραν ἐποίησαν
  chosen: worked one hour
  alternatives:
  - did one hour
  - spent one hour working
  lexicon: BDAG
  rationale: ποιέω with a time expression idiomatically means to work/spend that amount
    of time. 'Worked one hour' is the clearest natural English equivalent.
- source_word: ἴσους ... ἐποίησας
  chosen: you made them equal to us
  alternatives:
  - you treated them as equal to us
  - you made them the same as us
  lexicon: BDAG
  rationale: The construction means to make someone equal to another. 'Made them equal
    to us' is a direct and natural rendering that preserves the complaint's force.
- source_word: τοῖς βαστάσασι
  chosen: who bore
  alternatives:
  - who carried
  - who endured
  lexicon: BDAG
  rationale: βαστάζω can mean carry or bear/endure. In this labor context, 'bore'
    captures both the physical and endured sense and fits the idiom with 'burden'.
- source_word: τὸ βάρος τῆς ἡμέρας
  chosen: the burden of the day
  alternatives:
  - the day's burden
  - the weight of the day
  lexicon: BDAG
  rationale: βάρος is literally weight/burden; here metaphorically the heavy load
    of a full day's labor. 'The burden of the day' preserves the image and reads naturally.
- source_word: τὸν καύσωνα
  chosen: the scorching heat
  alternatives:
  - the heat
  - the burning heat
  lexicon: BDAG
  rationale: καύσων denotes oppressive, burning heat. 'Scorching heat' best conveys
    the intensity implied in the term.
