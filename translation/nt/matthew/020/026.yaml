id: MAT.20.26
reference: Matthew 20:26
source:
  edition: SBLGNT
  text: οὐχ οὕτως ⸀ἔσται ἐν ὑμῖν· ἀλλ’ ὃς ⸀ἂν θέλῃ ἐν ὑμῖν μέγας γενέσθαι ἔσται ὑμῶν
    διάκονος,
translation:
  text: It shall not be so among you. But whoever wants to become great among you
    shall be your servant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is not so among you.' The Greek uses a future verb ('shall be'),
      which may express how things are not to be among Jesus' followers.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ οὕτως ἔσται ἐν ὑμῖν
  chosen: It shall not be so among you
  alternatives:
  - It is not so among you
  - Not so with you
  lexicon: BDAG
  rationale: Future ἔσται is retained with 'shall be' rather than flattened to a present,
    preserving the forward-looking normative force in Jesus' instruction. 'Among you'
    naturally renders ἐν ὑμῖν in this social-context sense.
- source_word: ἀλλ’ ὃς ἂν θέλῃ
  chosen: But whoever wants
  alternatives:
  - But whoever would
  - But whoever desires
  lexicon: BDAG
  rationale: ὃς ἂν with the subjunctive expresses an indefinite/generic condition,
    well conveyed by 'whoever.' θέλῃ here is volitional; 'wants' is clear modern English,
    less stiff than 'desires' and less potentially misleading than 'would.'
- source_word: μέγας γενέσθαι
  chosen: to become great
  alternatives:
  - to be great
  lexicon: BDAG
  rationale: γενέσθαι is ingressive ('to become'), not merely stative. Retaining 'become'
    preserves the verbal nuance and the aspirational sense of the saying.
- source_word: διάκονος
  chosen: servant
  alternatives:
  - minister
  - deacon
  lexicon: BDAG
  rationale: διάκονος denotes one who serves. 'Servant' is the most natural contextual
    rendering here. 'Deacon' would wrongly suggest a later ecclesial office, and 'minister'
    sounds institutional. Unlike δοῦλος, this term does not primarily emphasize bonded
    status, so 'servant' is preferable.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: 'The genitive is idiomatically rendered ''your'' in English: ''your servant.''
    This preserves the relational sense without wooden phrasing.'
