theological_decisions:
- issue: Nature of greatness in the community of Jesus' followers
  chosen_reading: Render the statement as a normative reversal of worldly hierarchy
    without importing later ecclesial structures
  alternative_readings:
  - Read διάκονος as the church office 'deacon'
  - Paraphrase as generic humility without the servant-language
  rationale: The verse contrasts Gentile-style rule in the surrounding context with
    Jesus' standard for his disciples. The translation preserves the concrete servant-language
    and avoids both institutionalizing the term and diluting it into abstraction.
  doctrine_reference: Translation philosophy §§1, 5, 6
