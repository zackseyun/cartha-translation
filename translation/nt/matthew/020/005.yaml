id: MAT.20.5
reference: Matthew 20:5
source:
  edition: SBLGNT
  text: οἱ δὲ ἀπῆλθον. ⸀πάλιν ἐξελθὼν περὶ ἕκτην καὶ ἐνάτην ὥραν ἐποίησεν ὡσαύτως.
translation:
  text: So they went away. Going out again about the sixth and ninth hour, he did
    likewise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about noon and three in the afternoon by Jewish reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ ἀπῆλθον
  chosen: So they went away
  alternatives:
  - And they went away
  - So they departed
  lexicon: BDAG
  rationale: οἱ refers back to the laborers previously addressed; δέ is a mild connective
    best rendered smoothly in English as 'so' here; ἀπῆλθον means 'went away/departed.'
    'Went away' is natural modern English and preserves the narrative movement.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν straightforwardly indicates repeated action. 'Again' is the most
    natural and direct rendering.
- source_word: ἐξελθὼν
  chosen: Going out
  alternatives:
  - After going out
  - When he went out
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/sequential with the main verb
    in narrative. 'Going out' preserves the participial structure without overinterpreting
    temporal nuance.
- source_word: περὶ ἕκτην καὶ ἐνάτην ὥραν
  chosen: about the sixth and ninth hour
  alternatives:
  - about noon and three in the afternoon
  - around the sixth and ninth hour
  lexicon: BDAG
  rationale: ὥρα with ordinal numbers refers to hours of the day by Jewish time reckoning.
    Retaining 'sixth and ninth hour' preserves the source-culture expression more
    formally; 'about' reflects περὶ. A modern-time equivalent is worth preserving
    in a footnote.
- source_word: ἐποίησεν
  chosen: he did
  alternatives:
  - he did the same
  - he acted
  lexicon: BDAG
  rationale: ποιέω here is semantically light and takes its content from ὡσαύτως.
    Rendering it as 'did' keeps the idiom concise and lets 'likewise' carry the comparison.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - the same way
  - the same
  lexicon: BDAG
  rationale: ὡσαύτως means 'in the same way/likewise.' 'Likewise' is concise and preserves
    the comparative force.
