id: MAT.20.17
reference: Matthew 20:17
source:
  edition: SBLGNT
  text: ⸂Καὶ ἀναβαίνων ὁ⸃ Ἰησοῦς εἰς Ἱεροσόλυμα παρέλαβεν τοὺς δώδεκα ⸀μαθητὰς κατ’
    ἰδίαν, ⸂καὶ ἐν τῇ ὁδῷ⸃ εἶπεν αὐτοῖς·
translation:
  text: And as Jesus was going up to Jerusalem, he took the twelve disciples aside
    by themselves, and on the way he said to them,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναβαίνων
  chosen: was going up
  alternatives:
  - going up
  - ascending
  lexicon: BDAG
  rationale: Present participle indicating contemporaneous action with παρέλαβεν.
    'Was going up' gives natural English while preserving the directional sense of
    ascent to Jerusalem, which is both geographical and conventional in Gospel narrative.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: With a city name, εἰς is idiomatically rendered 'to' in English. 'Jerusalem'
    is the standard transliteration of the place name.
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - took along
  - took aside
  lexicon: BDAG
  rationale: The verb means to take/receive along. Because κατ’ ἰδίαν specifies the
    private setting, the fuller English sense is captured by 'took ... aside' in the
    clause as a whole, while the core lexical value remains 'took'.
- source_word: τοὺς δώδεκα μαθητὰς
  chosen: the twelve disciples
  alternatives:
  - the twelve
  - the twelve learners
  lexicon: BDAG
  rationale: Although 'the twelve' can stand alone as a recognized group, μαθητάς
    is present in the text and should be represented. 'Disciples' is the established
    and accurate rendering of μαθηταί in Gospel context.
- source_word: κατ’ ἰδίαν
  chosen: aside by themselves
  alternatives:
  - privately
  - in private
  - apart
  lexicon: BDAG
  rationale: This idiom denotes separation from others for private conversation. 'Aside
    by themselves' preserves both the spatial and relational nuance better than the
    more abstract 'privately' alone.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: A natural English rendering of the dative phrase that preserves the travel
    setting. 'On the way' is idiomatic and concise.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: λέγω is the ordinary verb of speaking. 'Said to them' is more formally
    aligned with the Greek than 'told them' and leaves the content to the following
    verse.
