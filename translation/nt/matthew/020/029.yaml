theological_decisions:
- issue: Referent of the singular pronoun αὐτῷ after the plural participial clause
  chosen_reading: The crowd followed Jesus ('him').
  alternative_readings:
  - The crowd followed the group ('them')
  rationale: The Greek text shifts from plural 'as they were going out' to singular
    'followed him,' which in context most naturally singles out Jesus as the focal
    referent. The translation preserves this shift rather than smoothing it away.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
