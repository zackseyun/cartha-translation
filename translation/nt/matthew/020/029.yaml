id: MAT.20.29
reference: Matthew 20:29
source:
  edition: SBLGNT
  text: Καὶ ἐκπορευομένων αὐτῶν ἀπὸ Ἰεριχὼ ἠκολούθησεν αὐτῷ ὄχλος πολύς.
translation:
  text: And as they were going out from Jericho, a large crowd followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as they departed from Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένων
  chosen: as they were going out
  alternatives:
  - while they were going out
  - as they departed
  lexicon: BDAG
  rationale: Genitive plural present participle of ἐκπορεύομαι, functioning temporally
    with αὐτῶν. 'As they were going out' preserves the participial, ongoing sense
    in natural English better than a more wooden 'going out of.'
- source_word: ἀπὸ Ἰεριχὼ
  chosen: from Jericho
  alternatives:
  - out of Jericho
  - away from Jericho
  lexicon: BDAG
  rationale: ἀπό commonly marks movement away from a place. 'From Jericho' is idiomatic
    English and adequately conveys the source location without overtranslation.
- source_word: ἠκολούθησεν
  chosen: followed
  alternatives:
  - went after
  - accompanied
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκολουθέω. 'Followed' is the standard and
    contextually appropriate rendering for movement behind or after someone.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - them
  lexicon: BDAG
  rationale: The dative singular pronoun most naturally refers to Jesus, even though
    the participial clause has plural 'they.' The singular is preserved in English
    as 'him.'
- source_word: ὄχλος πολύς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a large multitude
  lexicon: BDAG
  rationale: The noun-adjective combination denotes a numerous crowd. 'A large crowd'
    is clear modern English; 'great crowd' is possible but can sound archaic or qualitative
    rather than quantitative.
