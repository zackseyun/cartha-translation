id: MAT.20.20
reference: Matthew 20:20
source:
  edition: SBLGNT
  text: Τότε προσῆλθεν αὐτῷ ἡ μήτηρ τῶν υἱῶν Ζεβεδαίου μετὰ τῶν υἱῶν αὐτῆς προσκυνοῦσα
    καὶ αἰτοῦσά τι ⸀παρ’ αὐτοῦ.
translation:
  text: Then the mother of the sons of Zebedee came to him with her sons, bowing down
    and asking something from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiping'; the Greek verb can mean bowing in reverence, paying homage,
      or worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural and sufficiently formal.
- source_word: προσῆλθεν
  chosen: came
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The verb προσέρχομαι means to come/approach toward someone. 'Came to
    him' is idiomatic English and preserves the movement without overformalizing.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: Dative pronoun marking the person approached; 'to him' fits naturally
    with 'came'.
- source_word: ἡ μήτηρ τῶν υἱῶν Ζεβεδαίου
  chosen: the mother of the sons of Zebedee
  alternatives:
  - the mother of Zebedee's sons
  lexicon: BDAG
  rationale: A straightforward genitival construction identifying the woman by relation
    to Zebedee's sons. The chosen wording is transparent and close to the Greek.
- source_word: μετὰ τῶν υἱῶν αὐτῆς
  chosen: with her sons
  alternatives:
  - accompanied by her sons
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment. 'With her sons' is concise
    and accurate.
- source_word: προσκυνοῦσα
  chosen: bowing down
  alternatives:
  - kneeling before him
  - paying homage
  - worshiping
  lexicon: BDAG
  rationale: προσκυνέω can range from prostration/homage to worship depending on context.
    Here the immediate scene is a respectful petition to Jesus, so 'bowing down' preserves
    the physical act without forcing the stronger theological reading 'worshiping.'
    The alternative is worth preserving in a footnote because Matthew sometimes uses
    the term in contexts of reverence toward Jesus.
- source_word: καὶ αἰτοῦσά τι παρ’ αὐτοῦ
  chosen: and asking something from him
  alternatives:
  - and requesting something from him
  - and making a request of him
  lexicon: BDAG
  rationale: αἰτέω means ask/request, and τι is an indefinite object, 'something.'
    παρά with the genitive here indicates source, hence 'from him.' The participial
    structure is maintained in natural English.
