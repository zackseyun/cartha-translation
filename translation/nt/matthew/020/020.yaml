theological_decisions:
- issue: Rendering προσκυνοῦσα in relation to Jesus
  chosen_reading: bowing down
  alternative_readings:
  - worshiping
  - kneeling before him
  - paying homage
  rationale: The term προσκυνέω can denote either reverential prostration/homage or
    worship. To preserve theological tension rather than resolve it beyond the immediate
    context, the main text uses the broader physical-reverential sense 'bowing down,'
    while preserving 'worshiping' as an alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological
    tension rather than resolve it)'
