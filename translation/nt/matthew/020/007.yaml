id: MAT.20.7
reference: Matthew 20:7
source:
  edition: SBLGNT
  text: λέγουσιν αὐτῷ· Ὅτι οὐδεὶς ἡμᾶς ἐμισθώσατο. λέγει αὐτοῖς· Ὑπάγετε καὶ ὑμεῖς
    εἰς τὸν ⸀ἀμπελῶνα.
translation:
  text: They said to him, “Because no one has hired us.” He says to them, “You also
    go into the vineyard.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek uses a historical present in both 'They say' and 'He says'; English
      may also be rendered with past tense ('They said ... He said') for smoother
      narrative flow.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  chosen: They said
  alternatives:
  - They say
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly renders it as simple past for natural readability. This preserves the
    discourse sense without awkwardness.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - That
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content and reason for their reply. ''Because''
    best captures the explanatory force in idiomatic English: they answer why they
    are still standing there.'
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: '''No one'' is the clearest standard English equivalent and fits the
    formal tone better than the more colloquial ''nobody.'''
- source_word: ἐμισθώσατο
  chosen: has hired
  alternatives:
  - hired
  - engaged for work
  lexicon: BDAG
  rationale: The verb means to hire for work. The English present perfect ('has hired')
    naturally conveys the resulting state up to the present moment in their reply.
- source_word: λέγει
  chosen: He says
  alternatives:
  - He said
  lexicon: BDAG
  rationale: The Greek historical present is retained here to preserve some narrative
    vividness, and 'He says' is natural enough in English in direct-speech narrative.
    This also reflects the shift in the Greek text rather than flattening both verbs
    identically.
- source_word: Ὑπάγετε
  chosen: go
  alternatives:
  - go along
  - depart
  lexicon: BDAG
  rationale: In this context the imperative is a straightforward command to go to
    the worksite. 'Go' is the most natural and sufficient rendering.
- source_word: καὶ ὑμεῖς
  chosen: You also
  alternatives:
  - You too
  - Even you
  lexicon: BDAG
  rationale: The combination emphasizes inclusion of this group along with the others
    already sent. 'You also' preserves that emphasis in clear English.
- source_word: ἀμπελῶνα
  chosen: vineyard
  alternatives:
  - grape vineyard
  lexicon: BDAG
  rationale: The standard meaning is 'vineyard.' No expansion is needed in English.
