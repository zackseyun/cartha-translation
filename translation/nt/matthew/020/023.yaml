theological_decisions:
- issue: Christological implication of Jesus saying the seats are 'not mine to grant'
  chosen_reading: Render the statement straightforwardly without adding qualifiers
    that diminish or explain away Jesus' authority.
  alternative_readings:
  - Render with an added explanatory gloss such as 'not mine to grant apart from the
    Father'
  - Paraphrase to avoid possible tension with orthodox Christology
  rationale: The translation should preserve the text's own wording and theological
    tension rather than resolve it. In context, Jesus distinguishes roles within the
    Father's saving plan without requiring the translator to insert doctrinal harmonization.
    This is consistent with the doctrine guideline to preserve theological tension
    where the source text does so.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
