id: MAT.20.23
reference: Matthew 20:23
source:
  edition: SBLGNT
  text: ⸀λέγει αὐτοῖς· Τὸ μὲν ποτήριόν μου ⸀πίεσθε, τὸ δὲ καθίσαι ἐκ δεξιῶν μου καὶ
    ἐξ ⸀εὐωνύμων οὐκ ἔστιν ⸀ἐμὸν δοῦναι, ἀλλ’ οἷς ἡτοίμασται ὑπὸ τοῦ πατρός μου.
translation:
  text: He said to them, “You will indeed drink my cup, but to sit at my right and
    at my left is not mine to grant, but it is for those for whom it has been prepared
    by my Father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to sit on my right and on my left.'
    reason: lexical_alternative
  - marker: b
    text: The 'cup' is a metaphor for the suffering or destiny appointed to Jesus,
      which his disciples will also share.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει αὐτοῖς
  chosen: He said to them
  alternatives:
  - He says to them
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, natural English narrative
    style commonly renders it as a simple past. This preserves sense without awkwardness.
- source_word: ποτήριόν μου
  chosen: my cup
  alternatives:
  - the cup that is mine
  lexicon: BDAG
  rationale: A direct rendering preserves the metaphorical image used by Jesus for
    suffering or appointed destiny, without prematurely interpreting it in the main
    text.
- source_word: πίεσθε
  chosen: you will indeed drink
  alternatives:
  - you will drink
  lexicon: BDAG
  rationale: The future middle indicative is rendered as a future. 'Indeed' reflects
    the force of μὲν in the contrastive construction, signaling affirmation before
    the following limitation.
- source_word: καθίσαι ἐκ δεξιῶν μου καὶ ἐξ εὐωνύμων
  chosen: to sit at my right and at my left
  alternatives:
  - to sit on my right and on my left
  lexicon: BDAG
  rationale: This infinitival phrase refers to places of honor beside Jesus. 'At my
    right and at my left' is idiomatic English and preserves the relational sense
    of the Greek prepositional phrases.
- source_word: οὐκ ἔστιν ἐμὸν δοῦναι
  chosen: is not mine to grant
  alternatives:
  - is not mine to give
  lexicon: BDAG
  rationale: '''Grant'' fits the context of assigning places of honor more naturally
    in English, while still accurately reflecting δοῦναι (''to give''). The phrase
    preserves the sense that this prerogative is not being exercised here by Jesus.'
- source_word: ἀλλ’ οἷς ἡτοίμασται
  chosen: but it is for those for whom it has been prepared
  alternatives:
  - but for those for whom it has been prepared
  - except for those for whom it has been prepared
  lexicon: BDAG
  rationale: The Greek is elliptical after ἀλλά. Supplying 'it is for those' makes
    the sentence intelligible in English while preserving the intended contrast. The
    perfect passive 'has been prepared' reflects a completed preparation with continuing
    result.
- source_word: ὑπὸ τοῦ πατρός μου
  chosen: by my Father
  alternatives:
  - by my Father alone
  lexicon: BDAG
  rationale: A straightforward rendering of the personal agent in the passive. 'Alone'
    is not explicit in the Greek and is therefore avoided in the main text.
