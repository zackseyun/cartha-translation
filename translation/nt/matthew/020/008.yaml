id: MAT.20.8
reference: Matthew 20:8
source:
  edition: SBLGNT
  text: ὀψίας δὲ γενομένης λέγει ὁ κύριος τοῦ ἀμπελῶνος τῷ ἐπιτρόπῳ αὐτοῦ· Κάλεσον
    τοὺς ἐργάτας καὶ ἀπόδος ⸀αὐτοῖς τὸν μισθὸν ἀρξάμενος ἀπὸ τῶν ἐσχάτων ἕως τῶν πρώτων.
translation:
  text: When evening came, the master of the vineyard says to his steward, ‘Call the
    workers and pay them their wages, beginning with the last and ending with the
    first.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the owner of the vineyard says to his manager.'
    reason: lexical_alternative
  - marker: b
    text: Greek has the historical present 'says,' a vivid narrative form; many translations
      render it 'said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας δὲ γενομένης
  chosen: When evening came
  alternatives:
  - When it became evening
  - At evening
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'When evening came'
    is natural modern English while preserving the temporal sense.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present-tense historical narrative present in Greek. Rendered as 'says'
    to preserve the vividness of the Greek rather than flattening to a simple past.
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  chosen: the master of the vineyard
  alternatives:
  - the lord of the vineyard
  - the owner of the vineyard
  lexicon: BDAG
  rationale: κύριος here refers to the proprietor/master in the parable, not a direct
    divine title. 'Master' best fits the social relation in context; 'lord' would
    sound overly formal in contemporary English, while 'owner' loses the authority
    nuance.
- source_word: τῷ ἐπιτρόπῳ αὐτοῦ
  chosen: to his steward
  alternatives:
  - to his manager
  - to his foreman
  lexicon: BDAG
  rationale: ἐπίτροπος denotes one placed in charge of administration or oversight.
    'Steward' preserves delegated authority and is idiomatic in parabolic context;
    'manager' is possible but slightly more corporate in tone.
- source_word: Κάλεσον
  chosen: Call
  alternatives:
  - Summon
  lexicon: BDAG
  rationale: Aorist imperative giving a direct command. 'Call' is simple and natural;
    'summon' is possible but more formal than needed.
- source_word: τοὺς ἐργάτας
  chosen: the workers
  alternatives:
  - the laborers
  - the workmen
  lexicon: BDAG
  rationale: ἐργάται are hired laborers in the vineyard. 'Workers' is clear modern
    English and avoids unnecessary archaism.
- source_word: ἀπόδος αὐτοῖς τὸν μισθόν
  chosen: pay them their wages
  alternatives:
  - give them their pay
  - pay them the wage
  lexicon: BDAG
  rationale: ἀποδίδωμι with μισθός means to pay what is due. 'Pay them their wages'
    captures both the act and the owed compensation; plural 'wages' is idiomatic in
    English though Greek has singular collective μισθόν.
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - starting
  lexicon: BDAG
  rationale: Participle modifying the implied action of paying, indicating the order
    in which payment is to proceed.
- source_word: ἀπὸ τῶν ἐσχάτων ἕως τῶν πρώτων
  chosen: with the last and ending with the first
  alternatives:
  - from the last to the first
  - starting from the last up to the first
  lexicon: BDAG
  rationale: Refers to the last-hired workers through to the first-hired. 'Beginning
    with the last and ending with the first' makes the sequence explicit and idiomatic
    in English.
