theological_decisions:
- issue: Rendering κύριος in a parabolic, non-Christological context
  chosen_reading: master
  alternative_readings:
  - lord
  - owner
  rationale: Although κύριος defaults to 'Lord' when used as a title, here it denotes
    the human proprietor within the parable. Rendering it 'master' preserves the authority
    relation without implying a direct titular use. This follows the doctrine's instruction
    to translate according to source sense rather than tradition alone.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy points 1 and 5'
