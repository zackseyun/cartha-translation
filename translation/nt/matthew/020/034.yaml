theological_decisions:
- issue: Nature of the healing result in ἀνέβλεψαν
  chosen_reading: A real, immediate restoration of sight
  alternative_readings:
  - A less specific statement that they merely began to see or looked up
  rationale: The combination of εὐθέως with ἀνέβλεψαν in this miracle context indicates
    an immediate healing. The translation should reflect the concrete restoration
    without embellishment.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Force of ἠκολούθησαν αὐτῷ
  chosen_reading: followed him
  alternative_readings:
  - became disciples of him
  rationale: The text states that they followed Jesus; it may imply discipleship,
    but the verse does not explicitly define the depth or duration of that following.
    The translation preserves the wording without importing a fuller doctrinal claim.
  doctrine_reference: Translation philosophy 3
