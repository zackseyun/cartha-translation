id: MAT.20.34
reference: Matthew 20:34
source:
  edition: SBLGNT
  text: σπλαγχνισθεὶς δὲ ὁ Ἰησοῦς ἥψατο τῶν ⸀ὀμμάτων αὐτῶν, καὶ εὐθέως ⸀ἀνέβλεψαν
    καὶ ἠκολούθησαν αὐτῷ.
translation:
  text: And Jesus, moved with compassion, touched their eyes, and immediately they
    received their sight and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they saw again.' The Greek verb can mean 'to regain sight' or more literally
      'to look up,' but in this context it refers to the restoration of sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλαγχνισθεὶς
  chosen: moved with compassion
  alternatives:
  - having compassion
  - filled with compassion
  lexicon: BDAG
  rationale: The participle denotes deep compassion or pity. 'Moved with compassion'
    is idiomatic modern English that preserves the emotional force better than the
    flatter 'having compassion.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'And'
    is natural in English and keeps the flow without overstating contrast.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - laid hold of
  - took hold of
  lexicon: BDAG
  rationale: In this healing context ἅπτομαι means to touch physically. 'Touched'
    is the clear and natural rendering.
- source_word: τῶν ὀμμάτων αὐτῶν
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: The genitive after ἅπτομαι is standard with this verb. English expresses
    the sense naturally as the direct object 'their eyes.'
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως emphasizes the instantaneous result of Jesus's action. 'Immediately'
    preserves both the temporal force and the narrative solemnity.
- source_word: ἀνέβλεψαν
  chosen: received their sight
  alternatives:
  - regained sight
  - saw again
  - looked up
  lexicon: BDAG
  rationale: In healing contexts ἀναβλέπω commonly means to recover or receive sight.
    Since the men were blind in the immediate context, 'received their sight' communicates
    the idiomatic sense more clearly than the more literal but potentially ambiguous
    'looked up.'
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: ἀκολουθέω here carries both the literal sense of going after Jesus and
    the narrative resonance of discipleship. 'Followed him' preserves both without
    overinterpreting.
