theological_decisions:
- issue: Tone and force of Jesus' question
  chosen_reading: 'A direct question of compassionate invitation: ''What do you want
    me to do for you?'''
  alternative_readings:
  - 'A more formal rendering: ''What do you desire that I should do for you?'''
  rationale: The verse does not present a doctrinally contested term, but the translation
    should preserve Jesus' personal engagement without archaic stiffness. The chosen
    wording reflects the Greek plainly and readably without diminishing reverence.
  doctrine_reference: Translation philosophy §§5–6
