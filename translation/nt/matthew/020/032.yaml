id: MAT.20.32
reference: Matthew 20:32
source:
  edition: SBLGNT
  text: καὶ στὰς ὁ Ἰησοῦς ἐφώνησεν αὐτοὺς καὶ εἶπεν· Τί θέλετε ποιήσω ὑμῖν;
translation:
  text: And Jesus stopped, called them, and said, “What do you want me to do for you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'What do you desire that I should do for you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  chosen: stopped
  alternatives:
  - stood still
  - having stopped
  lexicon: BDAG
  rationale: Aorist participle of ἵστημι here functions idiomatically before the main
    verb, indicating that Jesus halted his movement. 'Stopped' is natural modern English
    and preserves the narrative sense better than the more wooden 'having stood' or
    'stood still.'
- source_word: ἐφώνησεν
  chosen: called
  alternatives:
  - summoned
  - called to
  lexicon: BDAG
  rationale: φωνέω commonly means to call out or summon. 'Called' is the most natural
    concise rendering in context, where Jesus addresses the two men. 'Summoned' is
    possible but sounds overly formal in English.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative plural pronoun referring to the blind men
    mentioned in the immediate context.
- source_word: Τί
  chosen: What
  alternatives:
  - What is it that
  lexicon: BDAG
  rationale: Interrogative pronoun introducing a direct question. Simple 'What' best
    matches the Greek without expansion.
- source_word: θέλετε
  chosen: do you want
  alternatives:
  - do you wish
  - do you desire
  lexicon: BDAG
  rationale: θέλω denotes willing or wanting. 'Do you want' is clear, idiomatic modern
    English and fits the directness of Jesus' question.
- source_word: ποιήσω
  chosen: me to do
  alternatives:
  - that I should do
  - to do
  lexicon: BDAG
  rationale: Aorist subjunctive after θέλετε expresses the content of what they desire
    Jesus to do. English naturally supplies 'me' in 'What do you want me to do for
    you?' rather than the stiffer 'that I should do for you.'
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative pronoun here is best rendered as benefactive, 'for you,' since
    the question concerns what action Jesus should perform on their behalf.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name transliterated per project philosophy. The article is not
    normally represented in English with personal names.
