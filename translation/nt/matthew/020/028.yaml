id: MAT.20.28
reference: Matthew 20:28
source:
  edition: SBLGNT
  text: ὥσπερ ὁ υἱὸς τοῦ ἀνθρώπου οὐκ ἦλθεν διακονηθῆναι ἀλλὰ διακονῆσαι καὶ δοῦναι
    τὴν ψυχὴν αὐτοῦ λύτρον ἀντὶ πολλῶν.
translation:
  text: just as the Son of Man did not come to be served, but to serve, and to give
    his life as a ransom for many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'as a ransom in place of many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: BDAG
  rationale: Introduces the comparison with the preceding teaching. 'Just as' is natural
    modern English and preserves the comparative force.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: Standard translation of the self-designation, preserving its titular
    and Danielic resonance. 'The Human One' is possible but loses established intertextual
    recognition.
- source_word: οὐκ ἦλθεν
  chosen: did not come
  alternatives:
  - did not come here
  - has not come
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past in English; no need
    to add location or aspect not present in the Greek.
- source_word: διακονηθῆναι
  chosen: to be served
  alternatives:
  - to be ministered to
  lexicon: BDAG
  rationale: Passive infinitive of διακονέω. 'Served' is clear modern English; 'ministered
    to' sounds ecclesiastical and less natural here.
- source_word: ἀλλὰ διακονῆσαι
  chosen: but to serve
  alternatives:
  - but to minister
  lexicon: BDAG
  rationale: Maintains the verbal contrast with διακονηθῆναι and uses ordinary English.
- source_word: καὶ δοῦναι
  chosen: and to give
  alternatives:
  - and to hand over
  lexicon: BDAG
  rationale: The infinitive coordinates with 'to serve.' 'Give' is the plain sense
    and fits the sacrificial context without overinterpreting.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: In this context ψυχή refers to one's life given up unto death, not merely
    the immaterial soul. 'His life' is the most idiomatic and contextually accurate
    rendering.
- source_word: λύτρον
  chosen: a ransom
  alternatives:
  - the ransom price
  - redemption price
  lexicon: BDAG
  rationale: λύτρον denotes the price paid to secure release. 'Ransom' is concise,
    established, and preserves the redemptive sense without unnecessary expansion.
- source_word: ἀντὶ πολλῶν
  chosen: for many
  alternatives:
  - in place of many
  - instead of many
  lexicon: BDAG
  rationale: ἀντί carries a substitutionary sense, but 'for many' is idiomatic English
    and traditional enough to preserve readability. The stronger 'in place of many'
    is a viable lexical alternative worth preserving in a footnote because it makes
    the preposition's force more explicit.
