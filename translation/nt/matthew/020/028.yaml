theological_decisions:
- issue: Force of ἀντί in the ransom saying
  chosen_reading: Rendered idiomatically as 'for many' in the main text while preserving
    the more explicit substitutional nuance in a footnote.
  alternative_readings:
  - in place of many
  - instead of many
  rationale: The verse presents Jesus' death in representative/substitutionary terms.
    English 'for many' is natural and does not deny substitution, but because ἀντί
    often carries the sense of exchange or replacement, the stronger alternative should
    be documented rather than suppressed.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant alternatives.
