theological_decisions:
- issue: Gendered reference in the parable opening
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The source text uses the masculine ἀνθρώπῳ and the referent is specifically
    a male house-master in the story. Following the doctrine's gender-accurate principle,
    the translation preserves the masculine reference rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of βασιλεία τῶν οὐρανῶν
  chosen_reading: the kingdom of heaven
  alternative_readings:
  - the reign of heaven
  - the kingdom of the heavens
  rationale: This preserves the familiar Matthean phrase while remaining faithful
    to the Greek. 'Reign' would foreground dynamic rule but is more interpretive than
    necessary here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
