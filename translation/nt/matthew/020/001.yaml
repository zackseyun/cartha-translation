id: MAT.20.1
reference: Matthew 20:1
source:
  edition: SBLGNT
  text: Ὁμοία γάρ ἐστιν ἡ βασιλεία τῶν οὐρανῶν ἀνθρώπῳ οἰκοδεσπότῃ ὅστις ἐξῆλθεν ἅμα
    πρωῒ μισθώσασθαι ἐργάτας εἰς τὸν ἀμπελῶνα αὐτοῦ.
translation:
  text: For the kingdom of heaven is like a man, a master of a house, who went out
    early in the morning to hire workers for his vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a landowner' or 'a householder'; the Greek more literally means 'a master
      of a house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁμοία
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Predicate adjective with ἐστιν introducing a comparison. In idiomatic
    English, 'is like' best conveys the simile without woodenly preserving the adjective
    form.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: Retains the explanatory/connecting force from the preceding context.
    'For' is concise and natural here.
- source_word: βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the reign of heaven
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. 'Kingdom' preserves the established semantic
    range better than the more interpretive 'reign,' and singular 'heaven' is idiomatic
    English for the plural οὐρανῶν in this expression.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The Greek is grammatically masculine and refers to a male figure in the
    parable. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    language.
- source_word: οἰκοδεσπότῃ
  chosen: a master of a house
  alternatives:
  - a landowner
  - a householder
  - a head of a household
  lexicon: BDAG
  rationale: οἰκοδεσπότης is literally the master/head of a household. 'Landowner'
    is common in English versions and fits the vineyard context, but it narrows the
    term beyond the Greek. 'Master of a house' preserves the lexical sense while remaining
    understandable.
- source_word: ὅστις
  chosen: who
  alternatives:
  - who indeed
  - such a one as
  lexicon: BDAG
  rationale: Here it functions as a relative pronoun introducing the description of
    the man. Simple 'who' is sufficient in English.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι is straightforwardly rendered 'went out.'
- source_word: ἅμα πρωῒ
  chosen: early in the morning
  alternatives:
  - at daybreak
  - at dawn
  lexicon: BDAG
  rationale: The phrase denotes very early morning. 'Early in the morning' is natural
    modern English and avoids over-specifying the exact time.
- source_word: μισθώσασθαι
  chosen: to hire
  alternatives:
  - to engage for wages
  lexicon: BDAG
  rationale: The middle infinitive here means to hire for pay. 'To hire' is the clearest
    idiomatic rendering.
- source_word: ἐργάτας
  chosen: workers
  alternatives:
  - laborers
  - workmen
  lexicon: BDAG
  rationale: '''Workers'' is clear modern English. ''Laborers'' is possible and slightly
    more traditional, but ''workers'' is more accessible without loss of meaning.'
- source_word: ἀμπελῶνα
  chosen: vineyard
  alternatives:
  - grape vineyard
  lexicon: BDAG
  rationale: Standard rendering for ἀμπελών; no expansion is needed.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: Simple possessive pronoun referring back to the house-master.
