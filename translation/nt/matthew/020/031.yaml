id: MAT.20.31
reference: Matthew 20:31
source:
  edition: SBLGNT
  text: ὁ δὲ ὄχλος ἐπετίμησεν αὐτοῖς ἵνα σιωπήσωσιν· οἱ δὲ μεῖζον ⸀ἔκραξαν λέγοντες·
    ⸂Κύριε, ἐλέησον ἡμᾶς⸃, ⸀υἱὸς Δαυίδ.
translation:
  text: But the crowd rebuked them so that they would be silent. Yet they cried out
    all the more, saying, “Lord, have mercy on us, Son of David.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more loudly.' The Greek comparative may emphasize either increased intensity
      generally ('all the more') or volume specifically.
    reason: lexical_alternative
  - marker: b
    text: '''Son of David'' is a messianic title, not merely a statement of ancestry.'
    reason: cultural_note
lexical_decisions:
- source_word: ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or multitude. 'Crowd' is the most natural
    modern English rendering and fits the narrative setting.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned
  - scolded
  - sternly ordered
  lexicon: BDAG
  rationale: ἐπιτιμάω often means to rebuke or censure. Here the crowd is sharply
    trying to stop the blind men, so 'rebuked' preserves the force without overtranslating.
- source_word: ἵνα σιωπήσωσιν
  chosen: so that they would be silent
  alternatives:
  - to make them be quiet
  - that they should keep silent
  lexicon: BDAG
  rationale: The ἵνα clause expresses intended result/purpose. 'So that they would
    be silent' is idiomatic English that preserves the sense of attempted silencing.
- source_word: μεῖζον
  chosen: all the more
  alternatives:
  - more loudly
  - even more
  lexicon: BDAG
  rationale: The adverbial comparative here intensifies the following verb. 'All the
    more' captures the comparative force naturally; 'more loudly' is possible but
    slightly more interpretive than the Greek requires.
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: κράζω denotes a loud cry or shout. 'Cried out' is a standard, natural
    rendering that preserves both volume and urgency.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this direct address
    to Jesus, 'Lord' preserves both respect and possible messianic/theological resonance
    better than 'Master'.
- source_word: ἐλέησον ἡμᾶς
  chosen: have mercy on us
  alternatives:
  - show us mercy
  - take pity on us
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the aorist imperative plus
    object. 'Have mercy on us' is both accurate and recognizable without being archaic.
- source_word: υἱὸς Δαυίδ
  chosen: Son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: This is a recognized messianic title in Matthew. 'Son of David' should
    be preserved literally rather than flattened to 'descendant of David,' because
    the title carries royal and messianic significance.
