theological_decisions:
- issue: Messianic title applied to Jesus
  chosen_reading: Render υἱὸς Δαυίδ as 'Son of David' in the main text.
  alternative_readings:
  - descendant of David
  rationale: The phrase functions as a loaded messianic title in Matthew, not merely
    a genealogical description. A literal rendering preserves the theological and
    narrative force without importing more than the text states.
  doctrine_reference: Affirmations; Translation philosophy §§2, 3
- issue: Rendering κύριος in address to Jesus
  chosen_reading: Translate Κύριε as 'Lord.'
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    In this context it can express respectful address and may also carry christological
    weight; 'Lord' preserves that tension better than narrowing it to 'Master.'
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy §3'
