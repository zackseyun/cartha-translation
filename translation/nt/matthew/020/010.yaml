id: MAT.20.10
reference: Matthew 20:10
source:
  edition: SBLGNT
  text: ⸂καὶ ἐλθόντες⸃ οἱ πρῶτοι ἐνόμισαν ὅτι ⸀πλεῖον λήμψονται· καὶ ἔλαβον ⸂τὸ ἀνὰ
    δηνάριον καὶ αὐτοί⸃.
translation:
  text: When the first ones came, they thought they would receive more, but they too
    received a denarius each.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first'; the phrase refers to the laborers hired first in the parable.
    reason: lexical_alternative
  - marker: b
    text: A denarius was a common daily wage for a laborer.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθόντες
  chosen: came
  alternatives:
  - arrived
  - having come
  lexicon: BDAG
  rationale: 'Aorist participle of ἔρχομαι, functioning temporally: ''when ... came.''
    ''Came'' is natural English and preserves the narrative sequence without over-formalizing
    the participle.'
- source_word: οἱ πρῶτοι
  chosen: the first ones
  alternatives:
  - the first
  - those who were first
  lexicon: BDAG
  rationale: Refers to the first group of laborers in the parable, not an abstract
    rank. 'The first ones' makes the plural explicit in English while remaining close
    to the Greek.
- source_word: ἐνόμισαν
  chosen: they thought
  alternatives:
  - they supposed
  - they assumed
  lexicon: BDAG
  rationale: νομίζω here expresses expectation or supposition. 'Thought' is idiomatic
    and sufficiently strong without implying certainty.
- source_word: πλεῖον
  chosen: more
  alternatives:
  - a greater amount
  - something more
  lexicon: BDAG
  rationale: Comparative neuter singular used adverbially/substantivally for greater
    pay. 'More' is the most natural concise rendering.
- source_word: λήμψονται
  chosen: they would receive
  alternatives:
  - they will receive
  - they were going to receive
  lexicon: BDAG
  rationale: Future middle in indirect discourse after a past-tense verb of thinking.
    English backshifts naturally to 'would receive' to reflect their expectation from
    the narrative viewpoint.
- source_word: τὸ ἀνὰ δηνάριον
  chosen: a denarius each
  alternatives:
  - the denarius apiece
  - one denarius each
  lexicon: BDAG
  rationale: ἀνά with accusative expresses distributive sense, 'each/apiece.' The
    article likely points back to the agreed wage, but idiomatic English is 'a denarius
    each.'
- source_word: καὶ αὐτοί
  chosen: they too
  alternatives:
  - even they
  - they also
  lexicon: BDAG
  rationale: Emphatic addition highlighting the surprising equality of payment. 'They
    too' captures the emphasis succinctly.
