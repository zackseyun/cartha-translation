id: MAT.19.1
reference: Matthew 19:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὅτε ἐτέλεσεν ὁ Ἰησοῦς τοὺς λόγους τούτους, μετῆρεν ἀπὸ τῆς Γαλιλαίας
    καὶ ἦλθεν εἰς τὰ ὅρια τῆς Ἰουδαίας πέραν τοῦ Ἰορδάνου.
translation:
  text: And it happened that when Jesus had finished these words, he departed from
    Galilee and came into the region of Judea beyond the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "across the Jordan."
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - Now when it happened
  - And it came to pass
  lexicon: BDAG
  rationale: A common narrative transition in Matthew. 'And it happened' preserves
    the Greek construction without archaic English like 'it came to pass.'
- source_word: ὅτε ἐτέλεσεν
  chosen: when ... had finished
  alternatives:
  - when ... finished
  - after ... finished
  lexicon: BDAG
  rationale: The aorist with ὅτε marks the completion of Jesus' discourse before the
    next action. English past perfect naturally conveys the prior completed action
    in sequence.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these sayings
  - these things
  lexicon: BDAG
  rationale: λόγοι here refers to the immediately preceding discourse. 'These words'
    is natural and sufficiently formal; 'sayings' is possible but can sound more aphoristic
    than the context requires.
- source_word: μετῆρεν
  chosen: he departed
  alternatives:
  - he moved on
  - he left
  lexicon: BDAG
  rationale: The verb indicates removal or departure from one place. 'He departed'
    preserves the narrative dignity and directional sense better than the more colloquial
    'moved on.'
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: BDAG
  rationale: Standard rendering of ἀπό with a place of origin or departure.
- source_word: ἦλθεν εἰς
  chosen: came into
  alternatives:
  - went to
  - came to
  lexicon: BDAG
  rationale: The Greek explicitly uses 'came' plus 'into.' 'Came into' preserves the
    motion into a new area without flattening the preposition.
- source_word: τὰ ὅρια τῆς Ἰουδαίας
  chosen: the region of Judea
  alternatives:
  - the borders of Judea
  - the territory of Judea
  lexicon: BDAG
  rationale: ὅρια can mean borders, districts, or region/territory. In this travel
    context, 'region of Judea' communicates the geographical sense idiomatically in
    English without implying a precise boundary line.
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the far side of the Jordan
  lexicon: BDAG
  rationale: πέραν denotes the far side or beyond. 'Beyond the Jordan' is a standard
    and clear geographical expression; 'across' is also possible and worth preserving
    as a lexical alternative.
