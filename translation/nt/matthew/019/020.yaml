id: MAT.19.20
reference: Matthew 19:20
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ νεανίσκος· ⸂Πάντα ταῦτα⸃ ⸀ἐφύλαξα· τί ἔτι ὑστερῶ;
translation:
  text: The young man says to him, “All these I have kept. What do I still lack?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “All these things I have observed.”
    reason: lexical_alternative
  - marker: b
    text: Or “What do I still fall short in?”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as historical present 'says,' reflecting the Greek present tense
    commonly used in narrative. English can preserve this naturally here.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative pronoun is expressed with 'to him' in idiomatic English after
    'says.'
- source_word: ὁ νεανίσκος
  chosen: the young man
  alternatives:
  - the young ruler
  - the youth
  lexicon: BDAG
  rationale: νεανίσκος denotes a young man. 'Young ruler' imports detail from the
    broader synoptic tradition, not from this verse alone; 'the young man' stays closest
    to Matthew's wording.
- source_word: Πάντα ταῦτα
  chosen: All these
  alternatives:
  - All these things
  - All of these
  lexicon: BDAG
  rationale: A natural rendering of the accusative neuter plural phrase referring
    to the commandments just mentioned. 'All these' is concise and clear in English.
- source_word: ἐφύλαξα
  chosen: I have kept
  alternatives:
  - I kept
  - I have observed
  lexicon: BDAG
  rationale: φυλάσσω in this context means to keep or observe commandments. The aorist
    is rendered with English present perfect to fit natural dialogue about one's past
    conduct with present relevance.
- source_word: τί
  chosen: What
  alternatives:
  - In what
  - What thing
  lexicon: BDAG
  rationale: τί introduces the direct question and is best rendered simply as 'What'
    in idiomatic English.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - further
  lexicon: BDAG
  rationale: ἔτι conveys continuance or remainder; 'still' is the most natural modern
    English choice in this question.
- source_word: ὑστερῶ
  chosen: do I still lack
  alternatives:
  - am I still lacking
  - do I still fall short
  lexicon: BDAG
  rationale: ὑστερέω means to lack, be deficient, or fall short. 'Do I still lack'
    is clear, idiomatic, and preserves the sense of remaining deficiency without overinterpreting
    it.
