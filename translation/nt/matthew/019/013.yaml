theological_decisions:
- issue: Referent of the final αὐτοῖς
  chosen_reading: them
  alternative_readings:
  - the children
  - those who brought the children
  rationale: The Greek pronoun is ambiguous. The translation preserves that ambiguity
    with 'them' rather than deciding between the children and the adults who brought
    them. This follows the philosophy of preserving genuine textual tension rather
    than resolving it unnecessarily.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
