id: MAT.19.13
reference: Matthew 19:13
source:
  edition: SBLGNT
  text: Τότε ⸀προσηνέχθησαν αὐτῷ παιδία ἵνα τὰς χεῖρας ἐπιθῇ αὐτοῖς καὶ προσεύξηται·
    οἱ δὲ μαθηταὶ ἐπετίμησαν αὐτοῖς.
translation:
  text: Then children were brought to him so that he might lay his hands on them and
    pray; but the disciples rebuked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final 'them' may refer either to the children or to those who brought
      them.
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence; 'Then' is the natural concise
    English equivalent in this context.
- source_word: προσηνέχθησαν
  chosen: were brought
  alternatives:
  - were presented
  - were brought near
  lexicon: BDAG
  rationale: Aorist passive of προσφέρω. 'Were brought' best captures the passive
    action in readable modern English without overformal 'were presented.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: Dative pronoun indicating the one to whom the children were brought;
    'to him' is the straightforward rendering.
- source_word: παιδία
  chosen: children
  alternatives:
  - little children
  - young children
  lexicon: BDAG
  rationale: Plural of παιδίον can denote children broadly, often young children.
    'Children' preserves the lexical sense without importing diminutive emphasis not
    explicit in the noun itself; the context may imply youth, but the base term is
    adequately represented by 'children.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic modern English and preserves
    the purposive force.
- source_word: τὰς χεῖρας ἐπιθῇ
  chosen: he might lay his hands on them
  alternatives:
  - he might place his hands on them
  - he might lay hands on them
  lexicon: BDAG
  rationale: The idiom ἐπιτίθημι τὰς χεῖρας is naturally rendered 'lay hands on.'
    Adding 'his' reflects the possessive sense implicit in English idiom. Plural 'hands'
    follows the Greek explicitly.
- source_word: προσεύξηται
  chosen: pray
  alternatives:
  - pray for them
  lexicon: BDAG
  rationale: Middle subjunctive of προσεύχομαι. The object 'for them' is inferable
    from context but not explicit in the Greek verb, so the simpler 'pray' avoids
    adding content beyond the text.
- source_word: οἱ δὲ μαθηταὶ
  chosen: but the disciples
  alternatives:
  - and the disciples
  lexicon: BDAG
  rationale: δέ here marks mild contrast; 'but' brings out the contrast between the
    purpose of those bringing the children and the disciples' response.
- source_word: ἐπετίμησαν
  chosen: rebuked
  alternatives:
  - scolded
  - warned sternly
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means 'rebuke' or 'censure.' 'Rebuked' preserves the
    verbal force and is standard in Gospel contexts.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - those who brought them
  - the children
  lexicon: BDAG
  rationale: The dative plural pronoun could grammatically refer either to the children
    or to those bringing them. In context, English 'them' preserves the Greek ambiguity
    rather than resolving it. This ambiguity is worth preserving in a footnote.
