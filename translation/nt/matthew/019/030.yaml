theological_decisions:
- issue: Nature of the reversal saying
  chosen_reading: A general statement about reversal of status/order is preserved
    without specifying whether the reversal concerns salvation, reward, social standing,
    or eschatological rank.
  alternative_readings:
  - A statement specifically about entrance into the kingdom
  - A statement specifically about rewards among disciples
  - A statement about social reversal in general
  rationale: The verse itself states the reversal proverb without defining its exact
    scope beyond the immediate context. To avoid importing a narrower doctrinal interpretation
    than the text warrants, the translation keeps the saying broad and aphoristic.
  doctrine_reference: Preserve theological tension rather than resolve it.
