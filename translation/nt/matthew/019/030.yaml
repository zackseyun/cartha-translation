id: MAT.19.30
reference: Matthew 19:30
source:
  edition: SBLGNT
  text: πολλοὶ δὲ ἔσονται πρῶτοι ἔσχατοι καὶ ἔσχατοι πρῶτοι.
translation:
  text: But many who are first will be last, and the last first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'But many first will be last, and last first.' The Greek
      is notably terse and proverbial.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally, referring to a broad group without
    specifying identity. 'Many' is concise and natural in English; 'many people' is
    possible but unnecessarily explicit.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding discussion
    about reward and status. 'But' best preserves the adversative nuance in context.
- source_word: ἔσονται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is idiomatically rendered 'will be' in modern English.
    'Shall be' is archaic for the project's style goals.
- source_word: πρῶτοι
  chosen: first
  alternatives:
  - foremost
  - in first place
  lexicon: BDAG
  rationale: πρῶτος here denotes rank or position, not temporal sequence. 'First'
    is the standard and sufficiently broad English equivalent, preserving the aphoristic
    force.
- source_word: ἔσχατοι
  chosen: last
  alternatives:
  - least
  - at the end
  lexicon: BDAG
  rationale: ἔσχατος here contrasts with πρῶτος in terms of status/order. 'Last' preserves
    the direct antithesis and matches common English idiom.
- source_word: πρῶτοι ἔσχατοι
  chosen: who are first will be last
  alternatives:
  - the first will be last
  lexicon: BDAG
  rationale: 'Although the Greek omits an explicit relative pronoun and repeats adjectives
    in predicate sequence, English reads more naturally with ''who are'' and ''will
    be'' supplied: ''many who are first will be last.'' This makes the implied predication
    clear without adding meaning beyond the source.'
- source_word: καὶ ἔσχατοι πρῶτοι
  chosen: and the last first
  alternatives:
  - and the last will be first
  lexicon: BDAG
  rationale: The verb is omitted in the second clause but understood from the first.
    Rendering 'and the last first' preserves the Greek's terseness and proverbial
    balance, while still being clear in English. The fuller 'will be' is a valid smoothing
    alternative.
