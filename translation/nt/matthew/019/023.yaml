theological_decisions:
- issue: Gendered substantival adjective πλούσιος
  chosen_reading: a rich man
  alternative_readings:
  - a rich person
  rationale: The Greek is grammatically masculine singular and in this saying refers
    to a representative individual. Following the doctrine's gender-accurate policy,
    the masculine form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of Ἀμὴν in Jesus' formula
  chosen_reading: Truly
  alternative_readings:
  - Amen
  rationale: This is not a doctrinally contested term, but the formula carries solemn
    authority. 'Truly' communicates the force in readable modern English while preserving
    the weight of Jesus' saying.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
