id: MAT.19.23
reference: Matthew 19:23
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς εἶπεν τοῖς μαθηταῖς αὐτοῦ· Ἀμὴν λέγω ὑμῖν ὅτι ⸂πλούσιος δυσκόλως⸃
    εἰσελεύσεται εἰς τὴν βασιλείαν τῶν οὐρανῶν·
translation:
  text: Then Jesus said to his disciples, “Truly I say to you, a rich man will enter
    the kingdom of heaven with difficulty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Amen, I say to you.”
    reason: lexical_alternative
  - marker: b
    text: Or, “a wealthy man will hardly enter the kingdom of heaven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks narrative progression/transition. 'Then' gives natural English
    flow while preserving the connective force better than omitting it.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard English transliteration of the personal name.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Default rendering of λέγω in narrative introduction; simple and natural
    in English.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit and should be retained; μαθηταῖς is
    best rendered 'disciples' in Gospel context.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly, I tell you
  lexicon: BDAG
  rationale: Preserves the solemn formula while using clear modern English. 'Amen'
    could be retained more formally, but 'Truly' communicates the force idiomatically.
- source_word: πλούσιος
  chosen: a rich man
  alternatives:
  - a rich person
  - a wealthy man
  lexicon: BDAG
  rationale: The adjective is substantival, singular masculine. Per gender-accurate
    policy, 'man' is retained rather than neutralizing to 'person.' 'Rich' is the
    most direct gloss.
- source_word: δυσκόλως
  chosen: with difficulty
  alternatives:
  - hardly
  - with great difficulty
  lexicon: BDAG
  rationale: Expresses manner without overstating the claim. 'Hardly' can imply near
    impossibility, which the next verse develops more explicitly; here 'with difficulty'
    stays closer to the adverb's plain sense.
- source_word: εἰσελεύσεται
  chosen: will enter
  alternatives:
  - will go into
  lexicon: BDAG
  rationale: Future middle of εἰσέρχομαι; 'will enter' is the standard and most natural
    rendering in this context.
- source_word: βασιλείαν τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Traditional Matthean expression. Although the plural οὐρανῶν is formal
    in Greek, idiomatic English is singular 'heaven.' 'Kingdom' preserves the royal/reign
    concept better than paraphrase.
