id: MAT.19.4
reference: Matthew 19:4
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς ⸀εἶπεν· Οὐκ ἀνέγνωτε ὅτι ὁ ⸀κτίσας ἀπ’ ἀρχῆς ἄρσεν καὶ θῆλυ
    ἐποίησεν αὐτοὺς
translation:
  text: He answered, “Have you not read that from the beginning the one who created
    them made them male and female?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Did you not read…?”
    reason: lexical_alternative
  - marker: b
    text: Greek “the one who created”; alternatively, “the Creator.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: He answered
  alternatives:
  - He answered and said
  - In reply he said
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced Greek expression.
    English normally compresses it to 'answered' without loss of meaning; retaining
    both verbs would sound wooden.
- source_word: Οὐκ ἀνέγνωτε
  chosen: Have you not read
  alternatives:
  - Did you not read
  lexicon: BDAG
  rationale: This idiomatic question challenges the hearers on their knowledge of
    Scripture. Present perfect English ('Have you not read') best captures the force
    of an appeal to what stands written and remains available to be read.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how that
  lexicon: BDAG
  rationale: Introduces the content of what they should have read; simple 'that' is
    natural and sufficient.
- source_word: ὁ κτίσας
  chosen: the one who created
  alternatives:
  - the Creator
  - he who created
  lexicon: BDAG
  rationale: The articular participle is rendered transparently as 'the one who created.'
    'The Creator' is possible but slightly more interpretive as a title; this wording
    stays closer to the Greek form while remaining natural.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - at the beginning
  - from the start
  lexicon: BDAG
  rationale: This echoes Genesis creation language and is the most idiomatic rendering
    of the prepositional phrase here.
- source_word: ἄρσεν καὶ θῆλυ
  chosen: male and female
  alternatives:
  - a male and a female
  lexicon: BDAG
  rationale: This reproduces the wording of the Genesis citation/allusion and preserves
    the biological/creational pair expressed in the Greek.
- source_word: ἐποίησεν αὐτούς
  chosen: made them
  alternatives:
  - created them
  lexicon: BDAG
  rationale: Since κτίσας already carries 'created,' rendering ἐποίησεν as 'made'
    preserves the distinction between the two Greek verbs and avoids unnecessary repetition
    in English.
