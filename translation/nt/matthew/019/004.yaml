theological_decisions:
- issue: Rendering the creation statement in relation to Genesis 1:27
  chosen_reading: Retain the creational pair 'male and female' in the main text without
    paraphrase.
  alternative_readings:
  - made them as male and female
  - made them man and woman
  rationale: Jesus is appealing directly to the creation account. 'Male and female'
    most closely reflects both the Greek wording and the Genesis allusion, preserving
    the text's creational framing without importing additional doctrinal conclusions
    beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 4
