theological_decisions:
- issue: Whether to import the identification 'ruler' from parallel accounts
  chosen_reading: Render νεανίσκος simply as 'young man'
  alternative_readings:
  - young ruler
  rationale: This verse's Greek names him only as a young man. To add 'ruler' would
    harmonize with Luke rather than translate Matthew directly, contrary to original-language
    primacy.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
