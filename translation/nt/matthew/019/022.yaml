id: MAT.19.22
reference: Matthew 19:22
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὁ νεανίσκος τὸν ⸀λόγον ἀπῆλθεν λυπούμενος, ἦν γὰρ ἔχων κτήματα
    πολλά.
translation:
  text: But when the young man heard this word, he went away grieving, for he had
    many possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this statement.' Greek 'the word' here refers to Jesus' preceding saying.
    reason: lexical_alternative
  - marker: b
    text: Or 'sorrowful.' The Greek participle describes his departing in a state
      of grief.
    reason: lexical_alternative
  - marker: c
    text: 'Traditionally ''great possessions.'' The Greek more literally emphasizes
      quantity: ''many possessions.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when ... heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: 'Aorist participle is rendered temporally in natural English: ''when
    ... heard.'' This preserves the sequence without awkwardness.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous statement;
    'But' fits the narrative turn as the man reacts negatively.
- source_word: νεανίσκος
  chosen: young man
  alternatives:
  - young ruler
  - youth
  lexicon: BDAG
  rationale: The noun itself means 'young man' or 'youth.' 'Young ruler' imports information
    from the broader synoptic context rather than this verse's wording.
- source_word: τὸν λόγον
  chosen: this word
  alternatives:
  - this statement
  - the word
  - this message
  lexicon: BDAG
  rationale: In context λόγος refers to Jesus' preceding saying. 'This word' is slightly
    formal but clear and stays close to the Greek; 'this statement' is a viable alternative.
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - he departed
  - he went off
  lexicon: BDAG
  rationale: Common narrative verb of departure; 'went away' is idiomatic modern English
    and preserves the sense of leaving.
- source_word: λυπούμενος
  chosen: grieving
  alternatives:
  - sorrowful
  - sad
  - distressed
  lexicon: BDAG
  rationale: Present participle expresses accompanying state/manner. 'Grieving' captures
    ongoing sorrow in readable English better than the more traditional but less natural
    'sorrowful.'
- source_word: ἦν γὰρ ἔχων
  chosen: for he had
  alternatives:
  - for he was having
  - because he possessed
  lexicon: BDAG
  rationale: Periphrastic imperfect indicates a continuing state of possession. English
    naturally compresses this to 'he had' without loss of meaning.
- source_word: κτήματα πολλά
  chosen: many possessions
  alternatives:
  - great possessions
  - much property
  - many properties
  lexicon: BDAG
  rationale: κτήματα denotes possessions/property. 'Many possessions' is a straightforward
    rendering of the plural noun with πολλά. 'Great possessions' reflects traditional
    English but shifts πολλά from quantity toward magnitude.
