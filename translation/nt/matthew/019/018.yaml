theological_decisions:
- issue: Rendering of the Decalogue citations
  chosen_reading: Use traditional covenant-command form 'You shall not ...'
  alternative_readings:
  - Do not ...
  rationale: The Greek future indicatives echo the Septuagint form of the Ten Commandments.
    'You shall not' preserves the scriptural register and intertextual connection
    better than the more colloquial imperative 'Do not.'
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English without flattening theological weight.'
