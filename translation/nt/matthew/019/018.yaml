id: MAT.19.18
reference: Matthew 19:18
source:
  edition: SBLGNT
  text: λέγει αὐτῷ· Ποίας; ὁ δὲ Ἰησοῦς ⸀εἶπεν· Τὸ Οὐ φονεύσεις, Οὐ μοιχεύσεις, Οὐ
    κλέψεις, Οὐ ψευδομαρτυρήσεις,
translation:
  text: 'He says to him, “Which ones?” And Jesus said, “The: You shall not murder,
    you shall not commit adultery, you shall not steal, you shall not bear false witness,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, “These: You shall not murder, you shall not commit
      adultery, you shall not steal, you shall not bear false witness.” The Greek
      has an elliptical article introducing the list.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “You shall not kill”; more precisely, the verb refers to
      murder.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ
  chosen: He says to him
  alternatives:
  - He said to him
  lexicon: BDAG
  rationale: Present-tense historical narrative λέγει is commonly rendered as English
    present for vividness; retaining 'to him' reflects αὐτῷ explicitly.
- source_word: Ποίας
  chosen: Which ones?
  alternatives:
  - Which?
  - What sort?
  lexicon: BDAG
  rationale: Feminine plural interrogative refers back to the commandments; 'Which
    ones?' makes the implied plural object clear in natural English.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν
  chosen: And Jesus said
  alternatives:
  - But Jesus said
  - Jesus said
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative; 'And'
    is natural and sufficient in English narrative.
- source_word: Τὸ
  chosen: 'The:'
  alternatives:
  - 'That is:'
  - 'Namely:'
  lexicon: BDAG
  rationale: The neuter article introduces the following quoted commandments as a
    set. Because the Greek is somewhat elliptical, an introductory marker is needed
    in English. 'The:' is formally closest, though slightly awkward, and preserves
    the abrupt citation style.
- source_word: Οὐ φονεύσεις
  chosen: You shall not murder
  alternatives:
  - You shall not kill
  lexicon: BDAG
  rationale: φονεύω denotes murder rather than killing in general; 'murder' better
    reflects the commandment's lexical force and avoids overbroad interpretation.
- source_word: Οὐ μοιχεύσεις
  chosen: you shall not commit adultery
  alternatives:
  - you shall not adulterate marriage
  lexicon: BDAG
  rationale: Standard and accurate rendering of μοιχεύω in command form.
- source_word: Οὐ κλέψεις
  chosen: you shall not steal
  lexicon: BDAG
  rationale: Direct and standard rendering of κλέπτω.
- source_word: Οὐ ψευδομαρτυρήσεις
  chosen: you shall not bear false witness
  alternatives:
  - you shall not testify falsely
  - you shall not give false testimony
  lexicon: BDAG
  rationale: Traditional phrasing accurately reflects ψευδομαρτυρέω and preserves
    the legal-testimonial nuance of the commandment.
