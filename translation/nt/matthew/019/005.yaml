id: MAT.19.5
reference: Matthew 19:5
source:
  edition: SBLGNT
  text: καὶ εἶπεν· ⸀Ἕνεκα τούτου καταλείψει ἄνθρωπος τὸν πατέρα καὶ τὴν μητέρα καὶ
    ⸀κολληθήσεται τῇ γυναικὶ αὐτοῦ, καὶ ἔσονται οἱ δύο εἰς σάρκα μίαν;
translation:
  text: and said, ‘For this reason a man will leave his father and mother and be joined
    to his wife, and the two will become one flesh.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be united to' or 'cling to his wife.' The Greek verb denotes close attachment.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕνεκα τούτου
  chosen: For this reason
  alternatives:
  - Because of this
  - For this cause
  lexicon: BDAG
  rationale: Standard causal expression introducing the scriptural rationale; 'For
    this reason' is idiomatic modern English and preserves the inferential force.
- source_word: καταλείψει
  chosen: will leave
  alternatives:
  - shall leave
  - will depart from
  lexicon: BDAG
  rationale: Future indicative in a quotation from Scripture; 'will leave' is natural
    English and preserves the predictive/formulaic force without archaic tone.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - man
  lexicon: BDAG
  rationale: In this Genesis marriage citation the masculine singular refers specifically
    to the male partner in the pairing with 'his wife.' Per gender-accurate philosophy,
    'a man' best matches the source and context rather than a gender-neutral rendering.
- source_word: κολληθήσεται
  chosen: be joined to
  alternatives:
  - be united to
  - cling to
  - be bonded to
  lexicon: BDAG
  rationale: Passive future of κολλάομαι conveys being joined/attached closely. 'Be
    joined to' is clear, traditional enough to echo the marriage formula, and avoids
    overreading emotional nuance in 'cling to'.
- source_word: γυναικὶ αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; in this marital context 'wife' is required
    by the sense.
- source_word: οἱ δύο
  chosen: the two
  alternatives:
  - both
  lexicon: BDAG
  rationale: The explicit wording is present in the Greek and should be retained rather
    than compressed to 'both.'
- source_word: εἰς σάρκα μίαν
  chosen: one flesh
  alternatives:
  - into one flesh
  lexicon: BDAG
  rationale: This is the established and semantically precise rendering of the idiom
    for marital union. Although εἰς could be represented by 'into,' English idiom
    favors 'become one flesh.' 'σάρξ' here is literal/relational, not the metaphorical
    'sinful nature' sense.
