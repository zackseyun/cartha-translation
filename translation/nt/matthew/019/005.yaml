theological_decisions:
- issue: Gendered representative language in a marriage citation
  chosen_reading: a man ... his wife
  alternative_readings:
  - a person ... spouse
  rationale: The verse quotes Genesis in a male-female marriage formulation. Following
    the project's gender-accurate policy, the masculine singular is preserved because
    the context is specifically marital and sexed, not a generic statement about humanity
    in the abstract.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the marital-union idiom
  chosen_reading: the two will become one flesh
  alternative_readings:
  - the two will be one flesh
  rationale: '''Become'' best reflects ἔσονται εἰς as movement/result into a new union
    while preserving the theological and relational weight of the Genesis citation
    without paraphrase.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
