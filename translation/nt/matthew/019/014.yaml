theological_decisions:
- issue: Whether Jesus refers exclusively to literal children or also to people characterized
    by childlike status/quality
  chosen_reading: Render τοιούτων as 'such as these,' preserving both the immediate
    reference to children and the broader representative force.
  alternative_readings:
  - Render more narrowly as 'for the kingdom of heaven belongs to these children'
  - Render more interpretively as 'for the kingdom of heaven belongs to those who
    are like children'
  rationale: The Greek points beyond the individual children present to a class characterized
    by what they represent, but it does not explicitly define the quality in view.
    'Such as these' preserves the theological tension rather than resolving it into
    either a merely literal or a fully interpretive statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
