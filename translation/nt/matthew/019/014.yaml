id: MAT.19.14
reference: Matthew 19:14
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν· Ἄφετε τὰ παιδία καὶ μὴ κωλύετε αὐτὰ ἐλθεῖν πρός με, τῶν
    γὰρ τοιούτων ἐστὶν ἡ βασιλεία τῶν οὐρανῶν.
translation:
  text: But Jesus said, “Let the children come, and do not hinder them from coming
    to me, for the kingdom of heaven belongs to such as these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for of such is the kingdom of heaven.”
    reason: lexical_alternative
  - marker: b
    text: “Such as these” can refer not only to the children present but also to people
      of such a kind.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄφετε
  chosen: Let
  alternatives:
  - Allow
  - Leave
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here functions idiomatically as permission/allowance
    rather than 'leave' in the sense of departure. 'Let' is concise and natural in
    English in Jesus' direct command.
- source_word: τὰ παιδία
  chosen: the children
  alternatives:
  - the little children
  - the young children
  lexicon: BDAG
  rationale: παιδία denotes children, often young children. 'The children' is the
    broadest accurate rendering and avoids importing a stronger diminutive than the
    noun itself requires in this verse.
- source_word: μὴ κωλύετε
  chosen: do not hinder
  alternatives:
  - do not prevent
  - stop hindering
  lexicon: BDAG
  rationale: κωλύω means to hinder, prevent, or forbid. 'Do not hinder' preserves
    the general force without over-specifying whether the action is already in progress.
    It reads naturally with the following infinitive.
- source_word: αὐτὰ ἐλθεῖν πρός με
  chosen: them from coming to me
  alternatives:
  - them to come to me
  - them from coming toward me
  lexicon: BDAG
  rationale: The construction with κωλύω + infinitive is naturally rendered in English
    as 'hinder/prevent someone from doing something.' 'Coming to me' is idiomatic
    and faithful to πρός με.
- source_word: τῶν γὰρ τοιούτων
  chosen: for ... to such as these
  alternatives:
  - for ... of such is
  - for ... to such ones
  lexicon: BDAG
  rationale: τοιοῦτος refers not merely to these specific children but to those of
    such a kind. 'Such as these' preserves the representative force better than a
    strictly literal but less natural 'of such is.'
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'The kingdom of heaven'
    is the established and accurate English rendering; 'of the heavens' is more literal
    but less idiomatic in contemporary English.
- source_word: ἐστὶν
  chosen: belongs
  alternatives:
  - is
  - is for
  lexicon: BDAG
  rationale: A literal 'is' would yield the traditional 'for of such is the kingdom
    of heaven.' In contemporary English, 'belongs to such as these' expresses the
    genitive construction's sense clearly while preserving the theological point without
    paraphrastic expansion.
