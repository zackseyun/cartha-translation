id: MAT.19.2
reference: Matthew 19:2
source:
  edition: SBLGNT
  text: καὶ ἠκολούθησαν αὐτῷ ὄχλοι πολλοί, καὶ ἐθεράπευσεν αὐτοὺς ἐκεῖ.
translation:
  text: And large crowds followed him, and he healed them there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκολουθέω, denoting following in a literal
    narrative sense. 'Followed' is the natural and standard English equivalent here
    without adding discipleship overtones beyond the context.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun governed by ἀκολουθέω, which commonly takes the dative
    for the person followed. English idiom requires the direct object form 'him' after
    'followed'.
- source_word: ὄχλοι πολλοί
  chosen: large crowds
  alternatives:
  - many crowds
  - great crowds
  lexicon: BDAG
  rationale: The noun-adjective combination literally means 'many crowds.' In idiomatic
    English, 'large crowds' best conveys the sense of numerous masses of people without
    awkwardness. 'Great crowds' is possible but can sound elevated or ambiguous in
    modern English.
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: Aorist active indicative of θεραπεύω in a healing context. 'He healed'
    is the clearest and most natural rendering in Gospel narrative; 'cured' is possible
    but narrower and less idiomatic in this context.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative plural pronoun referring back to the crowds, rendered straightforwardly
    as 'them.'
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Adverb of place. 'There' preserves the simple locative force and reads
    naturally in English.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Now ... and
  - And ... then
  lexicon: BDAG
  rationale: The repeated καί links the two actions in sequence. Retaining 'and' in
    both places preserves the paratactic flow of the Greek without overinterpreting
    the relationship.
