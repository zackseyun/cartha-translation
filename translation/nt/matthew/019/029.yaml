theological_decisions:
- issue: Rendering γυνή in a discipleship-renunciation list
  chosen_reading: wife
  alternative_readings:
  - woman
  rationale: The immediate context lists family members and possessions relinquished
    for allegiance to Jesus. Translating γυνή as 'wife' preserves the household-relational
    sense without implying a general renunciation of women as such.
  doctrine_reference: Translation philosophy §1, §4
- issue: Rendering ἕνεκεν τοῦ ὀνόματός μου
  chosen_reading: for the sake of my name
  alternative_readings:
  - because of me
  - for my sake
  rationale: 'Keeping ''my name'' preserves the source-text idiom and its theological
    weight: allegiance is to Jesus'' person, authority, and confessed identity. This
    avoids unnecessary paraphrase while remaining readable.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἑκατονταπλασίονα
  chosen_reading: a hundred times as much
  alternative_readings:
  - a hundredfold
  rationale: The chosen rendering communicates the promised abundance in contemporary
    English without reducing the force of the expression. The traditional alternative
    is worth preserving for readers familiar with historic Bible diction.
  doctrine_reference: Translation philosophy §6
