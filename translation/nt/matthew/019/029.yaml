id: MAT.19.29
reference: Matthew 19:29
source:
  edition: SBLGNT
  text: καὶ πᾶς ⸀ὅστις ἀφῆκεν ⸂οἰκίας ἢ⸃ ἀδελφοὺς ἢ ἀδελφὰς ἢ πατέρα ἢ μητέρα ἢ ⸂γυναῖκα
    ἢ⸃ τέκνα ἢ ⸀ἀγροὺς ἕνεκεν τοῦ ⸂ὀνόματός μου⸃, ⸀ἑκατονταπλασίονα λήμψεται καὶ ζωὴν
    αἰώνιον κληρονομήσει.
translation:
  text: And everyone who has left houses or brothers or sisters or father or mother
    or wife or children or fields for the sake of my name will receive a hundred times
    as much and will inherit eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'a hundredfold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὅστις
  chosen: everyone who
  alternatives:
  - whoever
  - every one who
  lexicon: BDAG
  rationale: The combination is distributive and generic, referring to each person
    fitting the condition. 'Everyone who' is natural modern English and preserves
    the universal scope.
- source_word: ἀφῆκεν
  chosen: has left
  alternatives:
  - left
  - has abandoned
  - has forsaken
  lexicon: BDAG
  rationale: The aorist is rendered idiomatically in English as present perfect in
    this conditional-like relative clause, highlighting completed renunciation with
    continuing relevance. 'Has left' is less interpretively loaded than 'abandoned'
    or 'forsaken'.
- source_word: οἰκίας
  chosen: houses
  alternatives:
  - homes
  lexicon: BDAG
  rationale: Plural 'houses' follows the Greek directly. 'Homes' is possible dynamically,
    but 'houses' better preserves the concrete property/family-resource sense alongside
    'fields'.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Here the following separate term ἀδελφὰς explicitly mentions sisters,
    so 'brothers' should remain distinct and gender-accurate.
- source_word: ἀδελφὰς
  chosen: sisters
  lexicon: BDAG
  rationale: Straightforward kinship term; kept distinct from 'brothers' because the
    Greek lists both.
- source_word: πατέρα
  chosen: father
  lexicon: BDAG
  rationale: Singular kinship term retained literally in the list.
- source_word: μητέρα
  chosen: mother
  lexicon: BDAG
  rationale: Singular kinship term retained literally in the list.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In a household-renunciation list parallel to family relations, γυνή is
    best understood as 'wife,' not the more general 'woman.' This fits the relational
    context.
- source_word: τέκνα
  chosen: children
  lexicon: BDAG
  rationale: Standard rendering for offspring/children in a family list.
- source_word: ἀγροὺς
  chosen: fields
  alternatives:
  - farms
  - lands
  lexicon: BDAG
  rationale: The term denotes fields or farmland. 'Fields' is concrete and sufficiently
    broad, preserving the property/economic dimension without over-specifying ownership
    structure.
- source_word: ἕνεκεν τοῦ ὀνόματός μου
  chosen: for the sake of my name
  alternatives:
  - because of my name
  - for my name's sake
  lexicon: BDAG
  rationale: This phrase expresses motive/causal devotion to Jesus and allegiance
    to his person and reputation. 'For the sake of my name' is clear modern English
    while preserving the biblical idiom of 'name' rather than reducing it to 'because
    of me.'
- source_word: ἑκατονταπλασίονα
  chosen: a hundred times as much
  alternatives:
  - a hundredfold
  lexicon: BDAG
  rationale: '''A hundredfold'' is traditional and accurate, but ''a hundred times
    as much'' is more readable modern English while preserving the quantitative force.'
- source_word: λήμψεται
  chosen: will receive
  alternatives:
  - will get
  lexicon: BDAG
  rationale: Future middle is naturally rendered 'will receive.' 'Get' is too colloquial
    for the register.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age to come
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and contextually appropriate rendering.
    While αἰώνιος can carry age-related nuance, this phrase is well established and
    theologically transparent in English.'
- source_word: κληρονομήσει
  chosen: will inherit
  alternatives:
  - will receive as an inheritance
  lexicon: BDAG
  rationale: The inheritance motif is important and should be preserved explicitly
    rather than flattened to 'receive.'
