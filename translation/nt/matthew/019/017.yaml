theological_decisions:
- issue: Relation of Jesus' statement to divine goodness and Christology
  chosen_reading: Translate Matthew's wording as a question about 'what is good' and
    the reply 'One is the good one,' without importing a denial of Jesus' goodness
    or harmonizing to the Synoptic parallels.
  alternative_readings:
  - 'Render in line with Mark/Luke: ''Why do you call me good?... No one is good except
    God alone'''
  rationale: The SBLGNT text in Matthew differs from the Markan/Lukan form. Faithfulness
    to the Greek requires preserving Matthew's wording while avoiding doctrinal overstatement.
    This maintains orthodox Christology by not construing the verse as a denial of
    Jesus' deity, while also not forcing that conclusion into the translation.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
