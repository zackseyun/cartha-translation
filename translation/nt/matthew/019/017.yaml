id: MAT.19.17
reference: Matthew 19:17
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ· Τί με ⸂ἐρωτᾷς περὶ τοῦ ἀγαθοῦ; εἷς ἐστιν ὁ ἀγαθός⸃· εἰ δὲ
    θέλεις ⸂εἰς τὴν ζωὴν εἰσελθεῖν⸃, ⸀τήρησον τὰς ἐντολάς.
translation:
  text: And he said to him, “Why do you ask me about what is good? One is the good
    one. But if you want to enter into life, keep the commandments.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and the parallel accounts read, 'Why do you call me good?
      No one is good except one—God.' Matthew's SBLGNT text instead reads, 'Why do
      you ask me about what is good? One is the good one.'
    reason: textual_variant
  - marker: b
    text: Or more idiomatically, 'There is one who is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί με ἐρωτᾷς περὶ τοῦ ἀγαθοῦ
  chosen: Why do you ask me about what is good?
  alternatives:
  - Why do you ask me about the good?
  - Why do you ask me concerning goodness?
  lexicon: BDAG
  rationale: The neuter singular τοῦ ἀγαθοῦ is best taken abstractly/objectively ('what
    is good') rather than as a personal masculine referent. This follows the immediate
    Greek syntax in Matthew rather than harmonizing to the Mark/Luke parallel about
    calling Jesus good.
- source_word: εἷς ἐστιν ὁ ἀγαθός
  chosen: One is the good one
  alternatives:
  - There is one who is good
  - One alone is good
  lexicon: BDAG
  rationale: The Greek has an explicit predicate structure with εἷς and the substantival
    adjective ὁ ἀγαθός. 'One is the good one' preserves the marked wording and the
    link to the prior phrase περὶ τοῦ ἀγαθοῦ. More idiomatic alternatives are possible,
    but this rendering keeps the textual texture visible.
- source_word: εἰ δὲ θέλεις
  chosen: But if you want
  alternatives:
  - But if you wish
  - Now if you want
  lexicon: BDAG
  rationale: θέλω commonly denotes desire or intention. 'Want' is natural modern English
    and fits the translation philosophy better than the slightly stiffer 'wish.' δέ
    is lightly adversative here, hence 'But.'
- source_word: εἰς τὴν ζωὴν εἰσελθεῖν
  chosen: to enter into life
  alternatives:
  - to enter life
  - to enter into the life
  lexicon: BDAG
  rationale: The phrase is idiomatic for entering eschatological life/life in the
    fullest sense. 'Enter into life' preserves the preposition εἰς and avoids overinterpreting
    with 'eternal life,' which is not stated in this clause.
- source_word: τήρησον
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: In relation to commandments, τηρέω is naturally rendered 'keep.' 'Observe'
    is possible but less direct in contemporary English; 'guard' is too literal for
    this context.
- source_word: τὰς ἐντολάς
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: BDAG
  rationale: ἐντολή in this context refers to divine commandments, and the traditional
    but still clear 'commandments' best conveys that weight.
