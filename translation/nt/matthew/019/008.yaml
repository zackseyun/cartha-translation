id: MAT.19.8
reference: Matthew 19:8
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὅτι Μωϋσῆς πρὸς τὴν σκληροκαρδίαν ὑμῶν ἐπέτρεψεν ὑμῖν ἀπολῦσαι
    τὰς γυναῖκας ὑμῶν, ἀπ’ ἀρχῆς δὲ οὐ γέγονεν οὕτως.
translation:
  text: He said to them, “Because of your hardness of heart Moses permitted you to
    divorce your wives, but from the beginning it was not so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for your hard-heartedness.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “to send away your wives”; in this context the meaning is divorce.
    reason: lexical_alternative
  - marker: c
    text: That is, this concession did not reflect the original order from creation.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει
  chosen: He said
  alternatives:
  - He says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, idiomatic modern English
    commonly renders it as a simple past in narrative dialogue. This preserves natural
    readability without loss of meaning.
- source_word: πρὸς τὴν σκληροκαρδίαν ὑμῶν
  chosen: Because of your hardness of heart
  alternatives:
  - in view of your hardness of heart
  - for your hard-heartedness
  lexicon: BDAG
  rationale: πρός with the accusative here expresses cause or basis. 'Because of'
    communicates the causal force clearly. 'Hardness of heart' preserves the concrete
    biblical idiom better than the more interpretive 'hard-heartedness,' while remaining
    understandable.
- source_word: ἐπέτρεψεν
  chosen: permitted
  alternatives:
  - allowed
  lexicon: BDAG
  rationale: The verb denotes granting permission, not commanding or endorsing. 'Permitted'
    is slightly more precise and formal than 'allowed' and fits the legal-discursive
    context.
- source_word: ἀπολῦσαι
  chosen: to divorce
  alternatives:
  - to send away
  lexicon: BDAG
  rationale: In this marital context, ἀπολύω refers specifically to divorce rather
    than a generic dismissal. 'To divorce' makes the legal sense explicit in English.
- source_word: τὰς γυναῖκας ὑμῶν
  chosen: your wives
  alternatives:
  - your women
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife' depending on context. Here the discussion
    is explicitly about marriage and divorce, so 'wives' is the correct contextual
    rendering.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: '''From the beginning'' is the standard and natural rendering, preserving
    the allusive force to the creation order in the immediate context.'
- source_word: γέγονεν οὕτως
  chosen: it was not so
  alternatives:
  - it has not been this way
  - it did not happen this way
  lexicon: BDAG
  rationale: The perfect of γίνομαι here expresses the state of affairs or established
    reality. 'It was not so' is concise, idiomatic, and fits Jesus' appeal to the
    original divine intention. The more literal 'has not been this way' is possible
    but less natural in English.
