theological_decisions:
- issue: Whether Moses' action should be framed as command, concession, or permission
  chosen_reading: Moses permitted you
  alternative_readings:
  - Moses allowed you
  - Moses commanded you
  rationale: 'The Greek ἐπέτρεψεν indicates permission/concession, not positive command.
    This matters theologically in Jesus'' argument: the Mosaic provision is presented
    as a concession to human sinfulness, not the creational ideal.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether Jesus' appeal to creation should be made more explicit than the Greek
    states
  chosen_reading: but from the beginning it was not so
  alternative_readings:
  - but from the beginning this was not God's design
  - but originally it was not this way
  rationale: The translation preserves the wording of the Greek without importing
    an expanded doctrinal paraphrase. The creational implication is present in context
    and should not be over-resolved in the main text.
  doctrine_reference: Translation philosophy §3
