theological_decisions:
- issue: Rendering ἀνθρώποις in a generic statement
  chosen_reading: men
  alternative_readings:
  - human beings
  - people
  rationale: The Greek is grammatically masculine plural but clearly generic, referring
    to humanity in general. Per the project's gender-accurate philosophy, 'men' is
    retained because it matches the representative force of the source in this proverbial
    contrast with God, while a footnote preserves the more explicitly inclusive alternative
    for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
