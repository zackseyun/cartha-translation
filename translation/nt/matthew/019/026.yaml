id: MAT.19.26
reference: Matthew 19:26
source:
  edition: SBLGNT
  text: ἐμβλέψας δὲ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Παρὰ ἀνθρώποις τοῦτο ἀδύνατόν ἐστιν, παρὰ
    δὲ θεῷ πάντα δυνατά.
translation:
  text: But Jesus looked at them and said to them, “With men this is impossible, but
    with God all things are possible.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “With human beings this is impossible.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  chosen: looked at
  alternatives:
  - fixed his gaze on
  - looked
  lexicon: BDAG
  rationale: Aorist participle of ἐμβλέπω denotes directing one's gaze toward someone.
    'Looked at' is natural modern English and preserves the narrative force without
    over-intensifying to 'fixed his gaze on.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or continuation. Here 'But' fits the response
    to the disciples' implied concern and the contrast developed in the saying.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - said
  lexicon: BDAG
  rationale: The dative αὐτοῖς is explicit in Greek, so it is retained in English
    for transparency and narrative clarity.
- source_word: παρὰ ἀνθρώποις
  chosen: With men
  alternatives:
  - For men
  - With human beings
  - From a human standpoint
  lexicon: BDAG
  rationale: 'παρά with the dative here expresses sphere or standpoint: ''with'' or
    ''in the case of.'' ''With men'' is concise and preserves the gender-accurate
    representative sense of ἄνθρωποις in context, referring to human beings generally.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: The demonstrative points to the matter under discussion, namely what
    has just been described. Simple 'this' is sufficient and idiomatic.
- source_word: ἀδύνατόν ἐστιν
  chosen: is impossible
  alternatives:
  - is not possible
  lexicon: BDAG
  rationale: This is the most direct and idiomatic rendering of the predicate adjective
    plus copula.
- source_word: παρὰ δὲ θεῷ
  chosen: but with God
  alternatives:
  - but for God
  - but from God's standpoint
  lexicon: BDAG
  rationale: The repeated παρά + dative is best mirrored for rhetorical balance. 'With
    God' is the standard and natural English equivalent here.
- source_word: πάντα δυνατά
  chosen: all things are possible
  alternatives:
  - everything is possible
  - all things are able
  lexicon: BDAG
  rationale: This preserves the plural πάντα and the predicate adjective δυνατά in
    idiomatic English while maintaining the maxim-like force of the statement.
