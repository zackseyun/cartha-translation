id: MAT.19.11
reference: Matthew 19:11
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Οὐ πάντες χωροῦσι τὸν λόγον ⸀τοῦτον ἀλλ’ οἷς δέδοται.
translation:
  text: But he said to them, “Not everyone can accept this word, but only those to
    whom it has been given.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this saying” or “this teaching.”
    reason: lexical_alternative
  - marker: b
    text: The passive “it has been given” likely implies God as the giver, but the
      Greek does not state the subject explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - answered
  - told
  lexicon: BDAG
  rationale: Standard aorist of λέγω in narrative introduction; 'said' is the most
    natural English rendering here.
- source_word: Οὐ πάντες
  chosen: Not everyone
  alternatives:
  - Not all
  - Not all people
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the negated universal. 'Not everyone'
    reads naturally while preserving the sense that the statement does not apply universally.
- source_word: χωροῦσι
  chosen: can accept
  alternatives:
  - make room for
  - receive
  - grasp
  lexicon: BDAG
  rationale: χωρέω can mean 'make room for,' and in this idiom with λόγον it refers
    to having room for, receiving, or accepting a saying/teaching. 'Can accept' best
    communicates the intended sense in clear modern English without wooden literalism.
- source_word: τὸν λόγον τοῦτον
  chosen: this word
  alternatives:
  - this saying
  - this statement
  - this teaching
  lexicon: BDAG
  rationale: λόγος here refers to the immediately preceding statement/teaching. 'This
    word' is slightly more formal and preserves the lexical link to λόγος, while remaining
    understandable. Alternatives are viable; 'saying' is especially possible.
- source_word: ἀλλ’ οἷς
  chosen: but only those to whom
  alternatives:
  - but those to whom
  - except those to whom
  lexicon: BDAG
  rationale: The contrast limits the group able to accept the saying. Adding 'only'
    makes the restrictive force explicit in natural English, reflecting the sense
    of ἀλλά with the relative clause.
- source_word: δέδοται
  chosen: it has been given
  alternatives:
  - it is given
  - it has been granted
  lexicon: BDAG
  rationale: Perfect passive of δίδωμι indicates a bestowed capacity or permission
    with present result. 'Has been given' preserves the passive and the completed-bestowal
    nuance.
