theological_decisions:
- issue: Nature of the implied giver in the passive 'it has been given'
  chosen_reading: Retain the divine passive implicitly without specifying God in the
    main text.
  alternative_readings:
  - but only those to whom God has given it
  rationale: The Greek leaves the giver unstated. In context many interpreters understand
    a divine passive, but the text itself does not explicitly name God. Preserving
    the passive maintains the theological tension and avoids importing an explicit
    subject not present in the source.
  doctrine_reference: Preserve theological tension rather than resolve it.
