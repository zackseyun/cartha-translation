id: MAT.19.12
reference: Matthew 19:12
source:
  edition: SBLGNT
  text: εἰσὶν γὰρ εὐνοῦχοι οἵτινες ἐκ κοιλίας μητρὸς ἐγεννήθησαν οὕτως, καὶ εἰσὶν
    εὐνοῦχοι οἵτινες εὐνουχίσθησαν ὑπὸ τῶν ἀνθρώπων, καὶ εἰσὶν εὐνοῦχοι οἵτινες εὐνούχισαν
    ἑαυτοὺς διὰ τὴν βασιλείαν τῶν οὐρανῶν. ὁ δυνάμενος χωρεῖν χωρείτω.
translation:
  text: For there are eunuchs who were born that way from their mother’s womb, and
    there are eunuchs who were made eunuchs by men, and there are eunuchs who made
    themselves eunuchs for the sake of the kingdom of heaven. The one able to accept
    this should accept it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'castrated themselves'; many interpreters understand this figuratively
      as choosing celibacy for the sake of God’s kingdom.
    reason: alternative_reading
  - marker: b
    text: Or 'The one able to receive this, let him receive it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχοι
  chosen: eunuchs
  alternatives:
  - celibates
  lexicon: BDAG
  rationale: The Greek term denotes eunuchs in the ordinary sense, whether congenital,
    made so by others, or by self-castration/self-renunciation in the third clause.
    Rendering it consistently as 'eunuchs' preserves the lexical repetition and avoids
    importing an interpretive paraphrase such as 'celibates' into the noun itself.
- source_word: ἐκ κοιλίας μητρὸς
  chosen: from their mother’s womb
  alternatives:
  - from birth
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the vivid idiom of origin in
    the Greek while remaining natural English. 'From birth' is possible but less explicit
    than the source phrase.
- source_word: ἐγεννήθησαν οὕτως
  chosen: were born that way
  alternatives:
  - were born thus
  lexicon: BDAG
  rationale: '''That way'' is idiomatic modern English for οὕτως here and communicates
    the state just described without archaic stiffness.'
- source_word: εὐνουχίσθησαν ὑπὸ τῶν ἀνθρώπων
  chosen: were made eunuchs by men
  alternatives:
  - were castrated by men
  lexicon: BDAG
  rationale: This keeps the verbal connection to εὐνοῦχοι and is readable modern English.
    'Castrated' is more anatomically explicit and may be implied, but 'made eunuchs'
    better preserves the lexical correspondence and allows for the broader social
    category denoted by εὐνοῦχος.
- source_word: εὐνούχισαν ἑαυτοὺς
  chosen: made themselves eunuchs
  alternatives:
  - castrated themselves
  - renounced marriage
  lexicon: BDAG
  rationale: The aorist active with reflexive pronoun is rendered straightforwardly.
    This preserves the provocative wording of the Greek without prematurely resolving
    whether the saying is literal, hyperbolic, or metaphorical. Alternatives are worth
    preserving because interpreters differ on whether Jesus refers to literal self-castration
    or voluntary celibacy.
- source_word: διὰ τὴν βασιλείαν τῶν οὐρανῶν
  chosen: for the sake of the kingdom of heaven
  alternatives:
  - because of the kingdom of heaven
  - for the kingdom of heaven
  lexicon: BDAG
  rationale: '''For the sake of'' captures διά with accusative as purpose/motive in
    clear English and preserves the theological weight of renunciation undertaken
    in view of God''s reign.'
- source_word: ὁ δυνάμενος χωρεῖν χωρείτω
  chosen: The one able to accept this should accept it
  alternatives:
  - He who is able to receive this, let him receive it
  - The one able to make room for this should make room for it
  lexicon: BDAG
  rationale: χωρέω here is idiomatic for making room for, accepting, or receiving
    a difficult teaching. 'Accept' communicates the sense in contemporary English
    better than a wooden 'receive,' while preserving the exhortational force of the
    imperative.
