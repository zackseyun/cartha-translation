theological_decisions:
- issue: Whether εὐνούχισαν ἑαυτοὺς should be interpreted literally or metaphorically
  chosen_reading: Retain the literal lexical form 'made themselves eunuchs' in the
    main text without interpretive expansion.
  alternative_readings:
  - castrated themselves
  - chose celibacy / renounced marriage
  rationale: The verse itself presents a difficult saying and does not explicitly
    explain whether the third category is literal, hyperbolic, or metaphorical for
    voluntary celibacy. Per the translation philosophy, the draft preserves the tension
    rather than resolving it in translation. A footnote records the interpretive alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: How to render the final exhortation ὁ δυνάμενος χωρεῖν χωρείτω
  chosen_reading: Use 'accept' rather than 'receive' in the main text.
  alternative_readings:
  - receive this
  - make room for this
  rationale: This is not a doctrinally contested issue, but it affects interpretation.
    'Accept' best conveys the idiomatic sense of grasping or embracing a demanding
    teaching in readable modern English, while a footnote preserves the more formal
    'receive' alternative.
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic
    or academic.'
