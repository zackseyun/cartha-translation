id: MAT.19.19
reference: Matthew 19:19
source:
  edition: SBLGNT
  text: Τίμα τὸν πατέρα καὶ τὴν μητέρα, καὶ Ἀγαπήσεις τὸν πλησίον σου ὡς σεαυτόν.
translation:
  text: Honor your father and mother, and love your neighbor as yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Honor your father and mother, and you shall love your
      neighbor as yourself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίμα
  chosen: Honor
  alternatives:
  - Show honor to
  - Respect
  lexicon: BDAG
  rationale: τιμάω here echoes the commandment wording and denotes giving due honor,
    not merely inward esteem. 'Honor' is the established and accurate imperative in
    English and preserves the ethical weight better than the weaker 'respect.'
- source_word: τὸν πατέρα
  chosen: your father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Although the Greek has the article rather than an explicit possessive,
    in English the commandment idiom is naturally and accurately rendered with 'your
    father,' reflecting the direct address and the underlying Decalogue formulation.
- source_word: τὴν μητέρα
  chosen: mother
  alternatives:
  - your mother
  - the mother
  lexicon: BDAG
  rationale: Paired with 'your father,' this completes the conventional commandment
    expression. English omits the repeated possessive naturally after 'your father
    and mother' while retaining the sense of 'your ... your ...' from the commandment
    context.
- source_word: Ἀγαπήσεις
  chosen: love
  alternatives:
  - you shall love
  lexicon: BDAG
  rationale: Future indicative is used here in citation of Torah command language.
    In English, 'love' works well as an imperative-like command in this list and reads
    naturally alongside 'Honor.' 'You shall love' is more formally literal and worth
    preserving as an alternative.
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - the one near you
  - your fellow man
  lexicon: BDAG
  rationale: πλησίον in this ethical context means 'neighbor,' the standard and precise
    rendering from Leviticus 19:18 and Jesus' usage. It denotes another person in
    one's relational sphere, not merely physical proximity.
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - as you love yourself
  lexicon: BDAG
  rationale: This is the concise and idiomatic rendering of the comparison phrase,
    preserving the scriptural wording without adding explanatory material not explicit
    in the Greek.
