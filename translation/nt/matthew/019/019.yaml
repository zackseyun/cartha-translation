theological_decisions:
- issue: Rendering of command forms in a citation of the commandments
  chosen_reading: Use English imperatives ('Honor ... and love ...') rather than mixed
    imperative/future forms in the main text.
  alternative_readings:
  - Honor your father and mother, and you shall love your neighbor as yourself.
  rationale: The Greek combines an imperative (Τίμα) with a future indicative (Ἀγαπήσεις)
    because Jesus is citing commandment language. In contemporary English, rendering
    both as direct commands best preserves readability and the force of the list without
    implying a change in meaning. The more formally literal 'you shall love' is preserved
    in a footnote as an alternative.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
