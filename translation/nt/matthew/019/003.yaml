id: MAT.19.3
reference: Matthew 19:3
source:
  edition: SBLGNT
  text: Καὶ προσῆλθον ⸀αὐτῷ Φαρισαῖοι πειράζοντες αὐτὸν καὶ ⸀λέγοντες· Εἰ ἔξεστιν
    ⸀ἀνθρώπῳ ἀπολῦσαι τὴν γυναῖκα αὐτοῦ κατὰ πᾶσαν αἰτίαν;
translation:
  text: And Pharisees came up to him, testing him and saying, “Is it lawful for a
    man to divorce his wife for any cause?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on any ground” or “for every cause.” The Greek phrase reflects a broad
      legal question about permissible grounds for divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθον
  chosen: came up to
  alternatives:
  - came to
  - approached
  lexicon: BDAG
  rationale: προσέρχομαι commonly means to come/approach toward someone. 'Came up
    to' is natural modern English and preserves the directional nuance without sounding
    stiff.
- source_word: πειράζοντες
  chosen: testing
  alternatives:
  - tempting
  - trying to trap
  lexicon: BDAG
  rationale: πειράζω can mean test, tempt, or try. In this narrative context the Pharisees
    are probing Jesus with hostile intent. 'Testing' preserves the lexical sense while
    allowing the context to convey the adversarial motive; 'tempting' in modern English
    can suggest enticement to sin too narrowly.
- source_word: ἔξεστιν
  chosen: is it lawful
  alternatives:
  - is it permitted
  - is it allowed
  lexicon: BDAG
  rationale: In legal/dispute contexts ἔξεστιν asks about what is permitted. 'Is it
    lawful' fits the halakhic setting and is standard, clear English.
- source_word: ἀνθρώπῳ
  chosen: for a man
  alternatives:
  - for a person
  - for someone
  lexicon: BDAG
  rationale: The dative singular ἀνθρώπῳ is grammatically masculine/generic, but the
    immediate referent is specified by 'his wife,' so the sense is concretely a husband.
    Per gender-accurate philosophy, 'a man' best matches the source and context.
- source_word: ἀπολῦσαι
  chosen: to divorce
  alternatives:
  - to send away
  - to dismiss
  lexicon: BDAG
  rationale: Although ἀπολύω literally means release/send away, in this marital context
    it is the idiomatic term for divorce. 'To divorce' communicates the legal sense
    directly in modern English.
- source_word: γυναῖκα
  chosen: his wife
  alternatives:
  - the wife of him
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean woman or wife; with the possessive αὐτοῦ and divorce context,
    'wife' is required.
- source_word: κατὰ πᾶσαν αἰτίαν
  chosen: for any cause
  alternatives:
  - for every cause
  - on any ground
  lexicon: BDAG
  rationale: This phrase refers to divorce on the basis of any alleged reason, likely
    echoing contemporary Jewish debate. 'For any cause' is concise, idiomatic, and
    preserves the broad scope of πᾶσαν.
