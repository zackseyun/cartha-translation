theological_decisions:
- issue: Rendering the divorce-question formula in a way that preserves first-century
    legal debate without importing a denominational stance on divorce
  chosen_reading: Is it lawful for a man to divorce his wife for any cause?
  alternative_readings:
  - Is it permitted for a man to send away his wife for any reason?
  - Is it lawful for a husband to divorce his wife on any ground?
  rationale: The verse presents a legal challenge to Jesus, not yet a doctrinal resolution.
    The translation preserves the question's breadth and legal framing without narrowing
    it to a later theological system. 'For any cause' also reflects the likely background
    debate over permissive grounds for divorce.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
