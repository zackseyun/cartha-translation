theological_decisions:
- issue: Meaning of παλιγγενεσία in this context
  chosen_reading: cosmic eschatological renewal associated with the Son of Man's enthronement
  alternative_readings:
  - individual regeneration
  - the new age
  - the new world
  rationale: The immediate context is future enthronement and judgment, not personal
    conversion. The translation therefore reflects an eschatological renewal without
    over-specifying a millennial scheme or other denominational framework.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of κρίνοντες
  chosen_reading: judging
  alternative_readings:
  - ruling
  - governing
  rationale: The Greek verb can imply both judicial and governing functions, but the
    text explicitly says 'judging.' To preserve theological tension and avoid importing
    a fuller political program, the main text keeps 'judging' and notes the broader
    possible nuance in a footnote.
  doctrine_reference: Translation philosophy §3
