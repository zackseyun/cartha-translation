id: MAT.19.28
reference: Matthew 19:28
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι ὑμεῖς οἱ ἀκολουθήσαντές μοι ἐν
    τῇ παλιγγενεσίᾳ, ὅταν καθίσῃ ὁ υἱὸς τοῦ ἀνθρώπου ἐπὶ θρόνου δόξης αὐτοῦ, ⸀καθήσεσθε
    καὶ ⸀ὑμεῖς ἐπὶ δώδεκα θρόνους κρίνοντες τὰς δώδεκα φυλὰς τοῦ Ἰσραήλ.
translation:
  text: And Jesus said to them, “Truly I say to you, in the renewal of all things,
    when the Son of Man sits on the throne of his glory, you who have followed me
    will also sit on twelve thrones, judging the twelve tribes of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the regeneration,' 'the new world,' or 'the rebirth.' Here the phrase
      refers to the future renewal associated with the Son of Man's reign, not most
      likely to individual new birth.
    reason: lexical_alternative
  - marker: b
    text: '''Judging'' may also carry the sense of exercising rule or governance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying formula. 'Truly' is natural
    modern English and preserves the force without leaving the Hebrew loanword untranslated.
- source_word: ἀκολουθήσαντές μοι
  chosen: you who have followed me
  alternatives:
  - you who followed me
  - you who have become my followers
  lexicon: BDAG
  rationale: The aorist participle identifies the addressed group by their completed
    act of following Jesus. 'You who have followed me' is idiomatic and keeps the
    direct personal object 'me' explicit.
- source_word: παλιγγενεσίᾳ
  chosen: the renewal of all things
  alternatives:
  - the regeneration
  - the new world
  - the rebirth
  lexicon: BDAG
  rationale: The term can denote renewal, rebirth, or regeneration. In this eschatological
    context it refers not to individual conversion but to the cosmic renewal associated
    with the Son of Man's enthronement. 'Renewal of all things' makes that sense clear
    in contemporary English while avoiding overly technical wording.
- source_word: ὅταν καθίσῃ
  chosen: when ... sits
  alternatives:
  - when ... will sit
  - whenever ... sits
  lexicon: Greek grammar / BDAG
  rationale: 'ὅταν with aorist subjunctive is a temporal clause referring to a future
    event. English idiom normally uses present tense after ''when'' for such clauses:
    ''when ... sits.'''
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard translation of the title, preserving both its idiomatic form
    and its Danielic/messianic resonance.
- source_word: ἐπὶ θρόνου δόξης αὐτοῦ
  chosen: on the throne of his glory
  alternatives:
  - on his glorious throne
  - upon the throne of his glory
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the genitival construction and
    the elevated tone. 'On the throne of his glory' closely follows the Greek while
    remaining readable.
- source_word: καθήσεσθε καὶ ὑμεῖς
  chosen: you ... will also sit
  alternatives:
  - you yourselves will also sit
  - you too will sit
  lexicon: BDAG
  rationale: The future middle indicates the disciples' future enthronement. 'Also'
    captures καί, and the sentence structure preserves the emphatic contrast with
    the Son of Man's sitting.
- source_word: ἐπὶ δώδεκα θρόνους
  chosen: on twelve thrones
  alternatives:
  - upon twelve thrones
  lexicon: BDAG
  rationale: Straightforward locative sense with ἐπί. 'On twelve thrones' is natural
    and sufficiently formal.
- source_word: κρίνοντες
  chosen: judging
  alternatives:
  - ruling
  - governing
  lexicon: BDAG
  rationale: The participle most directly means 'judging.' While the term may include
    governing authority in context, 'judging' best preserves the lexical sense and
    leaves the scope of that judgment unresolved.
- source_word: φυλὰς τοῦ Ἰσραήλ
  chosen: the twelve tribes of Israel
  lexicon: BDAG
  rationale: Conventional and precise rendering of Israel's tribal divisions.
