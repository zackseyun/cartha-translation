theological_decisions:
- issue: Meaning of σωθῆναι in context
  chosen_reading: be saved
  alternative_readings:
  - be delivered
  - be rescued
  rationale: In the immediate context of entering the kingdom and the difficulty for
    the rich, the disciples' question concerns salvation in the fullest theological
    sense, not merely temporal rescue. The translation preserves that weight without
    importing a denominational explanation of how salvation occurs.
  doctrine_reference: Affirmations; Translation philosophy §3
