id: MAT.19.25
reference: Matthew 19:25
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ οἱ ⸀μαθηταὶ ἐξεπλήσσοντο σφόδρα λέγοντες· Τίς ἄρα δύναται σωθῆναι;
translation:
  text: When the disciples heard this, they were greatly astonished and said, “Who
    then can be saved?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: When [they] heard this
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    English idiom is best served by a temporal clause, and 'this' is supplied from
    context because the participle is absolute in English but clearly refers to Jesus'
    preceding statement.
- source_word: δὲ
  chosen: '[implicit connective]'
  alternatives:
  - but
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks continuation or mild contrast. In natural English here, an explicit
    connective is not necessary once the participial clause 'When...' carries the
    transition.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  - the followers
  lexicon: BDAG
  rationale: Standard Gospel rendering for μαθηταί; it is both idiomatic and contextually
    precise for Jesus' disciples.
- source_word: ἐξεπλήσσοντο
  chosen: were ... astonished
  alternatives:
  - were amazed
  - were astounded
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys an ongoing reaction of shock. 'Were
    astonished' preserves the force without sounding overly colloquial.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: σφόδρα intensifies the astonishment. 'Greatly' is natural with 'astonished'
    and preserves the strong degree.
- source_word: λέγοντες
  chosen: and said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: Present participle of attendant speech is most naturally rendered as
    a finite verb in English narrative.
- source_word: Τίς
  chosen: Who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: Interrogative pronoun referring to a person; 'Who' is the direct and
    idiomatic rendering.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - really
  lexicon: BDAG
  rationale: Inferential particle drawing a conclusion from Jesus' prior statement.
    'Then' captures the disciples' inference and surprise.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: Simple modal ability is intended; 'can' is idiomatic modern English.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be delivered
  - be rescued
  lexicon: BDAG
  rationale: In this salvation-context, 'be saved' is the established and contextually
    accurate rendering, preserving the theological weight of the passive infinitive
    without over-specifying the mechanism.
