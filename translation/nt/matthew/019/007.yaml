id: MAT.19.7
reference: Matthew 19:7
source:
  edition: SBLGNT
  text: λέγουσιν αὐτῷ· Τί οὖν Μωϋσῆς ἐνετείλατο δοῦναι βιβλίον ἀποστασίου καὶ ἀπολῦσαι
    ⸀αὐτήν;
translation:
  text: They said to him, “Why then did Moses command us to give a certificate of
    divorce and to send her away?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to divorce her.' The Greek verb can mean 'to send away' and, in
      this context, functions as a term for divorce.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They say to him
  lexicon: BDAG
  rationale: Greek present tense in narrative is commonly rendered as an English past
    ('historical present') for natural narrative flow.
- source_word: Τί οὖν
  chosen: Why then
  alternatives:
  - What then
  - Why, then
  lexicon: BDAG
  rationale: In context this introduces an objection based on Jesus' prior statement,
    so 'Why then' best captures the argumentative force rather than a more wooden
    'What then.'
- source_word: ἐνετείλατο
  chosen: command
  alternatives:
  - order
  - instruct
  lexicon: BDAG
  rationale: The verb denotes giving a command. 'Command' preserves the force of the
    Pharisees' framing, which Jesus will nuance in the following verse.
- source_word: δοῦναι
  chosen: to give
  lexicon: BDAG
  rationale: Straightforward infinitive complement to ἐνετείλατο.
- source_word: βιβλίον ἀποστασίου
  chosen: a certificate of divorce
  alternatives:
  - a bill of divorce
  - a written notice of divorce
  lexicon: BDAG
  rationale: This idiom refers to the written document of dismissal/divorce in Deut
    24:1. 'Certificate of divorce' is clear modern English and preserves the legal-document
    sense.
- source_word: ἀποστασίου
  chosen: of divorce
  alternatives:
  - of separation
  lexicon: BDAG
  rationale: 'In this legal context the genitive specifies the kind of certificate:
    one effecting divorce, not mere separation.'
- source_word: καὶ ἀπολῦσαι αὐτήν
  chosen: and to send her away
  alternatives:
  - and to divorce her
  - and to dismiss her
  lexicon: BDAG
  rationale: ἀπολύω in this context is the act of dismissing a wife, effectively divorcing
    her. 'Send her away' preserves the idiomatic wording Jesus and his interlocutors
    use in this discussion, while the legal sense is already clarified by 'certificate
    of divorce.'
- source_word: αὐτήν
  chosen: her
  lexicon: BDAG
  rationale: The feminine singular pronoun refers to the wife in the divorce scenario
    implied from Deut 24 and the surrounding context.
