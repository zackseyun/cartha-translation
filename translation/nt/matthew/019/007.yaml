theological_decisions:
- issue: Whether to translate the Pharisees' wording in a way that already harmonizes
    with Jesus' correction in the next verse
  chosen_reading: Retain 'command' in the main text
  alternative_readings:
  - permit
  - allow
  rationale: The Greek here explicitly says 'commanded.' Although the next verse distinguishes
    Moses' concession from divine intent, this verse should preserve the opponents'
    own framing rather than importing Jesus' correction prematurely.
  doctrine_reference: Translation philosophy §1, §3
