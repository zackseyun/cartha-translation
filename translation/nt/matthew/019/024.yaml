id: MAT.19.24
reference: Matthew 19:24
source:
  edition: SBLGNT
  text: πάλιν δὲ λέγω ὑμῖν, εὐκοπώτερόν ἐστιν κάμηλον διὰ ⸀τρυπήματος ῥαφίδος ⸀εἰσελθεῖν
    ἢ πλούσιον ⸂εἰς τὴν βασιλείαν τοῦ θεοῦ⸃.
translation:
  text: Again I tell you, it is easier for a camel to go through the eye of a needle
    than for a rich man to enter into the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through a needle's eye.'
    reason: lexical_alternative
  - marker: b
    text: Some have suggested 'rope' instead of 'camel,' but the Greek text here reads
      'camel.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν δὲ
  chosen: Again
  alternatives:
  - And again
  - But again
  lexicon: BDAG
  rationale: πάλιν marks repetition ('again'), while δέ here is a mild connective
    not requiring a separate English conjunction in smooth modern English.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard direct-address formula. 'I tell you' is natural modern English
    while preserving the force of the present indicative.
- source_word: εὐκοπώτερόν ἐστιν
  chosen: it is easier
  alternatives:
  - it is more possible
  - it is less difficult
  lexicon: BDAG
  rationale: Comparative adjective used idiomatically with infinitives; 'it is easier'
    is the clear and conventional English equivalent.
- source_word: κάμηλον
  chosen: a camel
  alternatives:
  - a rope
  lexicon: BDAG
  rationale: The attested reading is κάμηλον, 'camel.' Although some have proposed
    a variant sense or confusion with κάμιλον ('rope'), the source text here supports
    'camel,' fitting the hyperbolic image.
- source_word: διὰ τρυπήματος ῥαφίδος
  chosen: through the eye of a needle
  alternatives:
  - through a needle's eye
  lexicon: BDAG
  rationale: The genitive construction literally denotes the opening of a sewing needle.
    'The eye of a needle' is the established and accurate English idiom.
- source_word: εἰσελθεῖν
  chosen: to go through
  alternatives:
  - to pass through
  - to enter
  lexicon: BDAG
  rationale: With the first clause's image, εἰσελθεῖν refers to movement through the
    opening; 'to go through' is idiomatic and vivid in English.
- source_word: ἢ πλούσιον
  chosen: than for a rich man
  alternatives:
  - than for a rich person
  - than a wealthy man
  lexicon: BDAG
  rationale: πλούσιον is masculine singular and refers to a rich person in this saying.
    Per the project's gender-accurate philosophy, 'rich man' preserves the grammatical
    form and representative force better than a neutral recasting.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: to enter into the kingdom of God
  alternatives:
  - to enter the kingdom of God
  lexicon: BDAG
  rationale: βασιλεία τοῦ θεοῦ is a central kingdom expression and should be rendered
    consistently as 'the kingdom of God.' 'Enter into' preserves the preposition εἰς,
    though in English 'enter the' would also be acceptable.
