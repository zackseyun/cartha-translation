theological_decisions:
- issue: Interpretation of the camel/needle image
  chosen_reading: A deliberate hyperbolic comparison expressing extreme human impossibility
    apart from God, without allegorizing the image into a specific gate or technical
    metaphor.
  alternative_readings:
  - Reference to a supposed 'needle gate' in Jerusalem
  - Reading 'rope' instead of 'camel' to reduce the hyperbole
  rationale: The Greek text straightforwardly presents a vivid impossibility image.
    No doctrinal pressure requires softening it, and preserving the stark metaphor
    best reflects the saying's force in context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
