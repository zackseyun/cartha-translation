theological_decisions:
- issue: Potentially self-interested nuance in Peter’s question
  chosen_reading: 'Render the question straightforwardly without softening or sharpening
    Peter’s motive: ''What then will there be for us?'''
  alternative_readings:
  - What then will we have?
  - What then will become of us?
  rationale: The Greek allows a question about what reward or outcome awaits the disciples.
    The translation should preserve the ambiguity of whether Peter is asking about
    reward, inheritance, or future standing, rather than importing a doctrinal judgment
    about his motives.
  doctrine_reference: Preserve theological tension rather than resolve it.
