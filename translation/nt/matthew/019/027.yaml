id: MAT.19.27
reference: Matthew 19:27
source:
  edition: SBLGNT
  text: Τότε ἀποκριθεὶς ὁ Πέτρος εἶπεν αὐτῷ· Ἰδοὺ ἡμεῖς ἀφήκαμεν πάντα καὶ ἠκολουθήσαμέν
    σοι· τί ἄρα ἔσται ἡμῖν;
translation:
  text: Then Peter answered him, “Look, we have left everything and followed you.
    What then will there be for us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What then will we have?'
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing Peter’s response; 'Then' is
    natural and sufficiently formal.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Though literally a participle ('answering'), idiomatic English commonly
    renders the Semitic-influenced construction ἀποκριθεὶς ... εἶπεν as 'answered
    ...' rather than 'answering, said.'
- source_word: εἶπεν
  chosen: answered him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς to avoid awkward redundancy in English. The
    dative αὐτῷ is retained by 'him.'
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse particle drawing attention. 'Look' preserves the force in
    readable modern English better than archaic 'Behold.'
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English can convey this adequately
    in context without overtranslation; the emphasis is supported by 'Look, we...'.
- source_word: ἀφήκαμεν
  chosen: have left
  alternatives:
  - left
  - forsaken
  lexicon: BDAG
  rationale: The aorist refers to the disciples' decisive act of leaving prior attachments.
    English present perfect fits the resulting present situation in this discourse
    context. 'Forsaken' is too weighty here.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Idiomatic rendering of neuter plural πάντα in context, referring broadly
    to possessions and prior life attachments.
- source_word: ἠκολουθήσαμέν σοι
  chosen: followed you
  alternatives:
  - have followed you
  lexicon: BDAG
  rationale: Natural English summary of discipleship action. Paired with 'have left'
    to express the completed commitment and its continuing relevance; simple past
    after present perfect is acceptable in coordinated English style here.
- source_word: τί ἄρα ἔσται ἡμῖν;
  chosen: What then will there be for us?
  alternatives:
  - What then will we have?
  - What then will become of us?
  lexicon: BDAG
  rationale: τί ἄρα adds inferential force ('what then'). ἔσται ἡμῖν is literally
    'will be for us.' This rendering preserves the open-ended sense without narrowing
    it prematurely to possessions alone, while remaining idiomatic.
