id: MAT.19.15
reference: Matthew 19:15
source:
  edition: SBLGNT
  text: καὶ ἐπιθεὶς ⸂τὰς χεῖρας αὐτοῖς⸃ ἐπορεύθη ἐκεῖθεν.
translation:
  text: And after laying his hands on them, he went on from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having laid his hands on them, he departed from there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθεὶς
  chosen: after laying
  alternatives:
  - having laid
  - placing
  lexicon: BDAG
  rationale: Aorist participle of ἐπιτίθημι here introduces an action prior to the
    main verb. 'After laying' gives natural English while preserving the participial
    sequence and the concrete act.
- source_word: τὰς χεῖρας αὐτοῖς
  chosen: his hands on them
  alternatives:
  - the hands on them
  - hands upon them
  lexicon: BDAG
  rationale: The idiom ἐπιτίθημι τὰς χεῖρας + dative means to lay hands on someone.
    English normally supplies the possessive 'his' from context, since the subject
    is Jesus. 'On them' accurately renders the dative αὐτοῖς.
- source_word: ἐπορεύθη
  chosen: he went on
  alternatives:
  - he departed
  - he went away
  lexicon: BDAG
  rationale: πορεύομαι commonly means 'go' or 'travel.' In this narrative context,
    'went on' conveys continued movement after the blessing without sounding overly
    formal; 'departed' is possible but more elevated.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  - thence
  lexicon: BDAG
  rationale: ἐκεῖθεν is an adverb of place meaning 'from there' or 'from that place.'
    'From there' is the clearest modern English rendering.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: The conjunction simply links this action to the preceding narrative.
    'And' preserves the straightforward connective force without adding interpretive
    nuance.
