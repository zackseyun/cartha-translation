theological_decisions:
- issue: Nature of Jesus' action in laying on hands
  chosen_reading: Rendered as a concrete physical act of blessing without importing
    sacramental or ordination language.
  alternative_readings:
  - A more interpretive rendering such as 'blessed them' in the main text
  rationale: The Greek explicitly states the laying on of hands, while the broader
    context implies blessing. To avoid paraphrase beyond the source text, the translation
    keeps the physical action in the main text rather than substituting the inferred
    result.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
