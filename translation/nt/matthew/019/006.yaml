theological_decisions:
- issue: Generic force of ἄνθρωπος in a prohibition about marriage
  chosen_reading: Rendered as 'man' with generic representative sense
  alternative_readings:
  - a person
  - anyone
  rationale: The Greek is singular masculine and carries generic force. Following
    the translation philosophy's gender-accurate principle, the masculine form is
    preserved in English rather than neutralized, while a footnote can clarify inclusive
    reference if helpful.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Marriage union language from Genesis echoed by σὰρξ μία
  chosen_reading: Preserved as 'one flesh'
  alternative_readings:
  - one body
  rationale: The phrase is theologically and intertextually significant in Jesus'
    appeal to Genesis. Preserving the traditional idiom maintains the textual connection
    without importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 5
