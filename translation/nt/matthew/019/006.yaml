id: MAT.19.6
reference: Matthew 19:6
source:
  edition: SBLGNT
  text: ὥστε οὐκέτι εἰσὶν δύο ἀλλὰ σὰρξ μία. ὃ οὖν ὁ θεὸς συνέζευξεν ἄνθρωπος μὴ χωριζέτω.
translation:
  text: So they are no longer two, but one flesh. Therefore, what God has joined together,
    man must not separate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Man'' here has a generic sense: that is, no human being should separate
      what God has joined together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - Therefore
  - Consequently
  lexicon: BDAG
  rationale: Introduces the result of the preceding statement about the two becoming
    one flesh. 'So' is natural modern English and preserves the inferential force
    without sounding overly formal.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed state; 'no longer' is
    the clearest idiomatic rendering.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Direct numeral retained formally; it contrasts with 'one flesh' in the
    next clause.
- source_word: σὰρξ μία
  chosen: one flesh
  alternatives:
  - one body
  lexicon: BDAG
  rationale: This echoes Genesis marriage language and should be preserved literally.
    Although σάρξ can be rendered differently in metaphorical contexts, here the established
    biblical idiom 'one flesh' best reflects the source and intertext.
- source_word: ὃ οὖν
  chosen: Therefore, what
  alternatives:
  - Therefore, then what
  - So what
  lexicon: BDAG
  rationale: ὃ is a neuter relative pronoun referring to the marital union as a reality
    or bond; 'what' is the most natural English equivalent. οὖν adds inferential force,
    rendered by 'Therefore.'
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject; no article is needed in English.
- source_word: συνέζευξεν
  chosen: has joined together
  alternatives:
  - joined
  - yoked together
  lexicon: BDAG
  rationale: The verb denotes joining or yoking together. 'Has joined together' is
    idiomatic, preserves the completed action with present relevance, and matches
    the marriage context well. 'Yoked together' is more literal in imagery but less
    natural here.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - a person
  - humanity
  lexicon: BDAG
  rationale: The singular generic ἄνθρωπος is grammatically masculine with representative
    force. Per the doctrine's gender-accurate policy, 'man' is retained rather than
    neutralized, while functioning generically for human beings.
- source_word: μὴ χωριζέτω
  chosen: must not separate
  alternatives:
  - let not separate
  - must not divide
  lexicon: BDAG
  rationale: Present active imperative with μή expresses prohibition. 'Must not separate'
    communicates the force clearly in modern English. 'Let not separate' is more formally
    literal but less natural.
