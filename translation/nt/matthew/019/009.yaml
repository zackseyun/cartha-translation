theological_decisions:
- issue: Meaning of πορνεία in the exception clause
  chosen_reading: Render broadly as 'sexual immorality' rather than narrowly as 'adultery'
    or specifically as premarital unchastity.
  alternative_readings:
  - adultery
  - fornication
  - sexual unfaithfulness
  rationale: The Greek term πορνεία has a broader semantic range than adultery alone.
    A broad rendering preserves the text's lexical scope and avoids importing a narrower
    denominational interpretation of the exception clause. Alternatives are preserved
    in a footnote because the phrase is theologically contested in Christian interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Inclusion of the final clause καὶ ὁ ἀπολελυμένην γαμήσας μοιχᾶται
  chosen_reading: Include in the main text with a textual-variant footnote.
  alternative_readings:
  - Omit as absent in some manuscripts
  rationale: The provided source text (SBLGNT) includes the clause in brackets, signaling
    textual variation. Since the base text supplied includes it, it should be translated
    in the main text, while the manuscript uncertainty is documented in a footnote
    for auditability.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    alternatives in footnotes where warranted.
