id: MAT.19.9
reference: Matthew 19:9
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ⸀ὅτι ὃς ἂν ἀπολύσῃ τὴν γυναῖκα αὐτοῦ μὴ ἐπὶ πορνείᾳ καὶ γαμήσῃ
    ἄλλην μοιχᾶται ⸂καὶ ὁ ἀπολελυμένην γαμήσας μοιχᾶται⸃.
translation:
  text: But I tell you that whoever divorces his wife, except for sexual immorality,
    and marries another, commits adultery; and whoever marries a divorced woman commits
    adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'except on the ground of sexual immorality.' The Greek phrase may also
      be rendered more narrowly as 'except for fornication' or interpreted by some
      as 'except for sexual unfaithfulness.'
    reason: lexical_alternative
  - marker: b
    text: 'Some manuscripts omit: ''and whoever marries a divorced woman commits adultery.'''
    reason: textual_variant
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I say to you
  - But I say to you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is naturally rendered 'I tell you' or 'I say to
    you.' 'But' reflects δέ as a mild adversative/continuative in context, preserving
    Jesus' authoritative contrast with the preceding discussion.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of Jesus' statement. Retained in English for clarity
    and formal correspondence.
- source_word: ὃς ἂν
  chosen: whoever
  alternatives:
  - anyone who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν expresses an indefinite general condition.
    'Whoever' is concise and idiomatic while preserving the generic force.
- source_word: ἀπολύσῃ
  chosen: divorces
  alternatives:
  - sends away
  - dismisses
  lexicon: BDAG
  rationale: In this marital context ἀπολύω refers specifically to divorce rather
    than a generic sending away. 'Divorces' communicates the legal-relational sense
    clearly in modern English.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; in this context of marriage and divorce,
    'wife' is required. The masculine possessive is retained in line with the Greek
    wording and the immediate case under discussion.
- source_word: μὴ ἐπὶ πορνείᾳ
  chosen: except for sexual immorality
  alternatives:
  - not on account of sexual immorality
  - except on the ground of sexual immorality
  - except for fornication
  lexicon: BDAG
  rationale: The phrase gives an exception clause. πορνεία is broader than adultery
    alone and is best rendered 'sexual immorality' in accessible modern English. 'Except
    for' expresses the force idiomatically without narrowing the semantic range.
- source_word: γαμήσῃ ἄλλην
  chosen: and marries another
  alternatives:
  - and marries another woman
  lexicon: BDAG
  rationale: ἄλλην is feminine and implies another woman, but English idiom allows
    'another' after 'marries.' This avoids unnecessary expansion while preserving
    the sense.
- source_word: μοιχᾶται
  chosen: commits adultery
  alternatives:
  - is committing adultery
  - becomes an adulterer
  lexicon: BDAG
  rationale: The present middle/passive form here states the resulting moral action/status.
    'Commits adultery' is the standard clear English rendering.
- source_word: καὶ ὁ ἀπολελυμένην γαμήσας μοιχᾶται
  chosen: and whoever marries a divorced woman commits adultery
  alternatives:
  - and the one who marries a divorced woman commits adultery
  lexicon: BDAG
  rationale: The articular participial construction is naturally rendered as a generic
    substantive clause in English. ἀπολελυμένην, perfect passive participle of ἀπολύω,
    denotes a woman who has been divorced. 'Whoever' keeps the generic force parallel
    to the first clause.
