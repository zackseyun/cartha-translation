id: MAT.17.2
reference: Matthew 17:2
source:
  edition: SBLGNT
  text: καὶ μετεμορφώθη ἔμπροσθεν αὐτῶν, καὶ ἔλαμψεν τὸ πρόσωπον αὐτοῦ ὡς ὁ ἥλιος,
    τὰ δὲ ἱμάτια αὐτοῦ ⸀ἐγένετο λευκὰ ὡς τὸ φῶς.
translation:
  text: And he was transfigured before them, and his face shone like the sun, and
    his clothes became white like the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was transformed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεμορφώθη
  chosen: was transfigured
  alternatives:
  - was transformed
  lexicon: BDAG
  rationale: Passive aorist of μεταμορφόομαι. 'Was transfigured' preserves the established
    but still accurate sense of an outwardly visible transformation in glory, fitting
    the immediate context of radiant appearance better than the broader 'was transformed.'
- source_word: ἔμπροσθεν αὐτῶν
  chosen: before them
  alternatives:
  - in front of them
  lexicon: BDAG
  rationale: A straightforward spatial expression. 'Before them' is natural English
    and preserves the sense that the event occurred in their presence.
- source_word: ἔλαμψεν
  chosen: shone
  alternatives:
  - gleamed
  - radiated
  lexicon: BDAG
  rationale: Aorist of λάμπω, denoting shining or giving light. 'Shone' is the most
    direct and idiomatic rendering here.
- source_word: πρόσωπον
  chosen: face
  alternatives:
  - countenance
  lexicon: BDAG
  rationale: In this context πρόσωπον refers to Jesus' physical face. 'Countenance'
    is possible but too elevated for the stated readability goals.
- source_word: ὡς ὁ ἥλιος
  chosen: like the sun
  alternatives:
  - as the sun
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'Like the sun' is clear modern English and
    preserves the simile.
- source_word: ἱμάτια
  chosen: clothes
  alternatives:
  - garments
  - robes
  lexicon: BDAG
  rationale: ἱμάτια refers generally to clothing/garments. 'Clothes' is readable modern
    English; 'garments' is slightly more formal but not necessary here.
- source_word: ἐγένετο λευκὰ
  chosen: became white
  alternatives:
  - became bright white
  - turned white
  lexicon: BDAG
  rationale: The singular verb with neuter plural subject is normal Greek usage. The
    phrase denotes change of state. 'Became white' is the most direct rendering without
    adding intensity not explicit in Matthew's wording.
- source_word: ὡς τὸ φῶς
  chosen: like the light
  alternatives:
  - as light
  - like light
  lexicon: BDAG
  rationale: The article with φῶς is best represented in English by 'the light.' This
    preserves the comparison's vividness and avoids flattening the phrase into a mere
    adjective such as 'bright.'
