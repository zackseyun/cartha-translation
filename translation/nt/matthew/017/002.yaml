theological_decisions:
- issue: Rendering of the transfiguration event
  chosen_reading: was transfigured
  alternative_readings:
  - was transformed
  rationale: The verse describes a visible manifestation of Jesus' glory. 'Was transfigured'
    best captures the event in context and aligns with historic Christian usage without
    importing extra doctrinal claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
