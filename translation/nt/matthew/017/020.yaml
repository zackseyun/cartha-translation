theological_decisions:
- issue: Meaning of πίστις in a miracle context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives footnoted where contested. Here the context concerns the disciples'
    deficient trust in God's power, not an abstract doctrinal statement about saving
    faith or Christ's faithfulness, so 'faith' is retained without importing a denominational
    reading.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
