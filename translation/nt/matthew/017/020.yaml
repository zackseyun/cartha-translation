  from: But he says to them
  to: He says to them
  rationale: The Greek particle 'δὲ' is a weak connective here, marking a transition
    in the narrative rather than a strong contrast. In the context of Jesus directly
    answering the disciples' question from v. 19, the English 'But' introduces an
    adversative tone that isn't present in the Greek. A simpler 'He says to them'
    or 'And he says to them' would be a more natural and common rendering for this
    construction, smoothly continuing the dialogue.
