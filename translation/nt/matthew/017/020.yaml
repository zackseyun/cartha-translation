id: MAT.17.20
reference: Matthew 17:20
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀λέγει αὐτοῖς· Διὰ τὴν ⸀ὀλιγοπιστίαν ὑμῶν· ἀμὴν γὰρ λέγω ὑμῖν, ἐὰν ἔχητε
    πίστιν ὡς κόκκον σινάπεως, ἐρεῖτε τῷ ὄρει τούτῳ· ⸂Μετάβα ἔνθεν⸃ ἐκεῖ, καὶ μεταβήσεται,
    καὶ οὐδὲν ἀδυνατήσει ⸀ὑμῖν.
translation:
  text: But he says to them, “Because of your little faith. For truly I say to you,
    if you have faith like a mustard seed, you will say to this mountain, ‘Move from
    here to there,’ and it will move, and nothing will be impossible for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Because of your lack of faith”; the Greek term more specifically suggests
      deficient or small faith rather than complete unbelief.
    reason: lexical_alternative
  - marker: b
    text: Greek “if you have faith as a mustard seed.” The comparison is to something
      very small.
    reason: lexical_alternative
  - marker: c
    text: Or 'But he says to them'.
    reason: previous_rendering
lexical_decisions:
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present, which can be rendered literally
    as present tense. Retaining 'says' preserves the vivid narrative style of Matthew
    better than flattening to past tense.
- source_word: Διὰ τὴν ὀλιγοπιστίαν ὑμῶν
  chosen: Because of your little faith
  alternatives:
  - Because of your unbelief
  - Because of your lack of faith
  lexicon: BDAG
  rationale: ὀλιγοπιστία denotes deficiency or smallness of faith rather than total
    absence of faith. 'Little faith' preserves the lexical force and matches Matthew's
    recurring usage for inadequate faith.
- source_word: ἀμὴν
  chosen: truly
  alternatives:
  - amen
  - surely
  lexicon: BDAG
  rationale: As a discourse marker introducing a solemn statement, 'truly' is idiomatic
    modern English and preserves the emphatic force without transliterating.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context it refers to trusting confidence rather than primarily faithfulness;
    alternatives are preserved as lexical possibilities but not preferred.
- source_word: ὡς κόκκον σινάπεως
  chosen: like a mustard seed
  alternatives:
  - as a mustard seed
  - like a grain of mustard seed
  lexicon: BDAG
  rationale: This comparison emphasizes very small size. 'Like a mustard seed' is
    natural English and preserves the simile.
- source_word: Μετάβα ἔνθεν ἐκεῖ
  chosen: Move from here to there
  alternatives:
  - Go from here to there
  - Pass from here to there
  lexicon: BDAG
  rationale: The aorist imperative of μεταβαίνω calls for movement or relocation.
    'Move' fits an address to a mountain in English better than 'go' while preserving
    the command's force.
- source_word: μεταβήσεται
  chosen: it will move
  alternatives:
  - it will go
  - it will be moved
  lexicon: BDAG
  rationale: 'Future middle here is intransitive: the mountain itself will relocate.
    ''It will move'' is the clearest natural rendering.'
- source_word: οὐδὲν ἀδυνατήσει ὑμῖν
  chosen: nothing will be impossible for you
  alternatives:
  - nothing will be powerless for you
  - nothing will be unable for you
  lexicon: BDAG
  rationale: The idiom expresses that nothing will prove impossible in relation to
    them. 'Impossible for you' is standard and clear English, preserving the sense
    without over-literal awkwardness.
