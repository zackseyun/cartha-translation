theological_decisions:
- issue: Nature and scope of Elijah's restorative work
  chosen_reading: Render the statement broadly as 'will restore all things' without
    narrowing it to spiritual renewal, social reform, or eschatological consummation.
  alternative_readings:
  - will set everything right
  - will restore everyone/everything to proper order
  rationale: The Greek text states the restoration comprehensively but does not define
    its exact scope in this verse. Preserving the broad phrase maintains the theological
    tension and avoids importing a specific interpretive scheme.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
