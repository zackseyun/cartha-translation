id: MAT.17.11
reference: Matthew 17:11
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἀποκριθεὶς ⸀εἶπεν· Ἠλίας μὲν ⸀ἔρχεται καὶ ἀποκαταστήσει πάντα·
translation:
  text: He answered, “Elijah indeed is coming and will restore all things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes and will restore all things.' The Greek present verb 'is coming/comes'
      has a future-oriented sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: He answered
  alternatives:
  - He answered and said
  - In reply he said
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced Greek expression.
    In natural English, 'He answered' sufficiently conveys the sense without unnecessary
    redundancy, while preserving the responsive force of the Greek.
- source_word: Ἠλίας
  chosen: Elijah
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: μέν
  chosen: indeed
  alternatives:
  - certainly
  - on the one hand
  - truly
  lexicon: BDAG
  rationale: μέν marks emphasis or sets up a contrast. Since the following contrasting
    statement appears in the next verse, 'indeed' preserves the anticipatory force
    here without sounding wooden.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is to come
  lexicon: BDAG
  rationale: Although present in form, the verb has a futurist sense in context. 'Is
    coming' preserves the present-form vividness while fitting the expectation being
    described.
- source_word: ἀποκαταστήσει
  chosen: will restore
  alternatives:
  - will restore again
  - will set right
  lexicon: BDAG
  rationale: Future active indicative straightforwardly denotes future action. 'Will
    restore' is the most direct rendering and preserves the prophetic sense without
    overinterpreting the nature of the restoration.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The neuter plural is broad and comprehensive. 'All things' is a standard
    and suitably weighty English rendering that preserves the scope without specifying
    objects not named in the text.
