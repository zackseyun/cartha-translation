id: MAT.17.19
reference: Matthew 17:19
source:
  edition: SBLGNT
  text: Τότε προσελθόντες οἱ μαθηταὶ τῷ Ἰησοῦ κατ’ ἰδίαν εἶπον· Διὰ τί ἡμεῖς οὐκ ἠδυνήθημεν
    ἐκβαλεῖν αὐτό;
translation:
  text: Then the disciples came to Jesus privately and said, “Why were we not able
    to cast it out?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “him,” if the pronoun is taken to refer to the boy rather than the demon.
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: προσελθόντες
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: 'Aorist participle of προσέρχομαι, coordinated with the main verb and
    naturally rendered in English as a finite verb with the subject: ''the disciples
    came.'' ''Approached'' is possible but slightly stiffer.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard rendering of μαθηταί in the Gospel context; refers specifically
    to Jesus's disciples.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - to Yeshua
  lexicon: BDAG
  rationale: Dative object after προσέρχομαι; personal names are transliterated by
    standard conventions per project philosophy.
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'in private' or 'privately.' 'Privately'
    is concise and natural in modern English.
- source_word: εἶπον
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: Default rendering of λέγω here. Although the content is interrogative,
    the Greek verb is simply 'said,' with the question following.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Standard interrogative phrase asking reason or cause.
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: Explicit pronoun adds some emphasis in Greek, but normal English can
    preserve the sense with 'we' without overemphasis.
- source_word: οὐκ ἠδυνήθημεν
  chosen: were not able
  alternatives:
  - could not
  lexicon: BDAG
  rationale: Aorist passive-deponent form of δύναμαι meaning inability. 'Were not
    able' preserves the verbal force more transparently than the more compressed 'could
    not,' though both are valid.
- source_word: ἐκβαλεῖν
  chosen: to cast out
  alternatives:
  - to drive out
  lexicon: BDAG
  rationale: Common Gospel exorcism term. 'Cast out' preserves established exorcism
    language and matches the semantic force of expelling a demon.
- source_word: αὐτό
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: Neuter singular pronoun most naturally refers to the demon rather than
    the boy in this context, hence 'it.' This avoids obscuring the exorcistic object
    of ἐκβαλεῖν.
