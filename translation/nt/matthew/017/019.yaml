theological_decisions:
- issue: Referent of αὐτό in the exorcism context
  chosen_reading: The pronoun refers to the demon, rendered 'it.'
  alternative_readings:
  - The pronoun refers to the afflicted boy, rendered 'him.'
  rationale: In the immediate narrative context, the disciples' failure concerns expelling
    the demon, and ἐκβάλλω in exorcism contexts commonly takes the demon as its object.
    Rendering 'it' clarifies the likely referent without adding doctrinal content
    beyond the narrative sense.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    documented per verse.
