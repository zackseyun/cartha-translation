id: MAT.17.24
reference: Matthew 17:24
source:
  edition: SBLGNT
  text: Ἐλθόντων δὲ αὐτῶν εἰς Καφαρναοὺμ προσῆλθον οἱ τὰ δίδραχμα λαμβάνοντες τῷ Πέτρῳ
    καὶ εἶπαν· Ὁ διδάσκαλος ὑμῶν οὐ τελεῖ τὰ δίδραχμα;
translation:
  text: When they came to Capernaum, those who collected the two-drachma tax came
    to Peter and said, “Does your teacher not pay the two-drachma tax?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the two-drachmas'; that is, the two-drachma temple tax.
    reason: cultural_note
  - marker: b
    text: Or 'the collectors of the didrachma tax.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλθόντων δὲ αὐτῶν
  chosen: When they came
  alternatives:
  - After they came
  - And when they came
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. 'When they came'
    is natural modern English and preserves the temporal force without over-literal
    awkwardness. δέ is lightly represented by the clause transition rather than an
    explicit 'and'.
- source_word: Καφαρναοὺμ
  chosen: Capernaum
  rationale: Personal and place names are transliterated by standard English convention.
- source_word: προσῆλθον
  chosen: came to
  alternatives:
  - approached
  lexicon: BDAG
  rationale: The verb means 'approached/came to.' 'Came to' reads smoothly in context
    and avoids stiffness while preserving the movement toward Peter.
- source_word: οἱ τὰ δίδραχμα λαμβάνοντες
  chosen: those who collected the two-drachma tax
  alternatives:
  - the collectors of the two-drachma tax
  - those receiving the two-drachma coins
  lexicon: BDAG
  rationale: The participial phrase identifies a group by function. In context this
    refers to collection of the temple tax, but the Greek expression itself is 'those
    taking/collecting the didrachmas.' 'Collected the two-drachma tax' makes the idiom
    clear in English while retaining the monetary term.
- source_word: δίδραχμα
  chosen: two-drachma tax
  alternatives:
  - double-drachma tax
  - didrachma tax
  lexicon: BDAG
  rationale: ' δίδραχμα refers to the two-drachma payment. Rendering it as ''two-drachma
    tax'' communicates both the amount and the fiscal sense in context. A more technical
    transliteration (''didrachma'') is less accessible.'
- source_word: τῷ Πέτρῳ
  chosen: to Peter
  rationale: Simple dative of indirect object; standard transliteration of the name.
- source_word: Ὁ διδάσκαλος ὑμῶν
  chosen: your teacher
  alternatives:
  - your master
  lexicon: BDAG
  rationale: διδάσκαλος is best rendered 'teacher' here. 'Master' could suggest authority
    but is less precise for this common Gospel title.
- source_word: οὐ τελεῖ
  chosen: Does ... not pay
  alternatives:
  - Does ... not give
  - Does ... not pay up
  lexicon: BDAG
  rationale: τελέω in this context means to pay or fulfill an obligation. Because
    the question concerns a tax, 'pay' is the clearest contextual rendering. The Greek
    negative question likely expects a positive answer, but English can preserve the
    form with 'Does ... not pay' without forcing the pragmatic nuance into the wording.
