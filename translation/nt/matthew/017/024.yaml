theological_decisions:
- issue: Identification of δίδραχμα as tax rather than merely coins
  chosen_reading: Render as 'two-drachma tax' in the main text
  alternative_readings:
  - two-drachma coins
  - didrachmas
  rationale: The immediate context concerns whether Jesus pays the required levy,
    not merely whether he handles coins. 'Tax' makes explicit the contextual sense
    while remaining faithful to the idiom. This is a lexical-contextual decision,
    not a doctrinal expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
