theological_decisions:
- issue: Referent of αὐτῷ in Jesus' rebuke
  chosen_reading: Jesus rebuked the demon, rendered as 'him' in English
  alternative_readings:
  - Jesus rebuked the boy
  rationale: The immediate sequel, 'and the demon came out of him,' strongly indicates
    that the rebuke was directed at the demon rather than the boy. Rendering the pronoun
    as 'him' preserves the Greek pronoun while allowing the contextual referent to
    be inferred naturally.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently favors one reading, so no footnote is required.
