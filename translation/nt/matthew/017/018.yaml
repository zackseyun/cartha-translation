id: MAT.17.18
reference: Matthew 17:18
source:
  edition: SBLGNT
  text: καὶ ἐπετίμησεν αὐτῷ ὁ Ἰησοῦς, καὶ ἐξῆλθεν ἀπ’ αὐτοῦ τὸ δαιμόνιον· καὶ ἐθεραπεύθη
    ὁ παῖς ἀπὸ τῆς ὥρας ἐκείνης.
translation:
  text: And Jesus rebuked him, and the demon came out of him; and the boy was healed
    from that hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the child was healed from that moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - commanded
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means to rebuke or reprimand sharply. In exorcism contexts,
    'rebuked' is the established and semantically fitting rendering, preserving the
    force of Jesus' authoritative address without over-interpreting the exact wording
    as merely 'commanded'.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The dative pronoun is grammatically masculine/neuter and contextually
    could refer either to the boy or to the demon. Because the next clause explicitly
    states that the demon came out of him, the most natural reading is that Jesus
    rebuked the demon, expressed idiomatically as 'him.' This preserves the personal
    reference used in the Greek without flattening it to an impersonal 'it.'
- source_word: δαιμόνιον
  chosen: demon
  alternatives:
  - unclean spirit
  - demonic spirit
  lexicon: BDAG
  rationale: δαιμόνιον is best rendered 'demon.' 'Unclean spirit' would import wording
    not present in this verse, and 'demonic spirit' is more interpretive than necessary.
- source_word: ἐξῆλθεν ἀπ’ αὐτοῦ
  chosen: came out of him
  alternatives:
  - went out from him
  - left him
  lexicon: BDAG
  rationale: This is a straightforward exorcism expression. 'Came out of him' closely
    follows the Greek while remaining natural English. 'Left him' is possible but
    less vivid and slightly less formal.
- source_word: ἐθεραπεύθη
  chosen: was healed
  alternatives:
  - was cured
  - was restored
  lexicon: BDAG
  rationale: θεραπεύω in the passive here denotes healing. 'Was healed' is the most
    natural and broadly understandable rendering, preserving the result without narrowing
    it to merely medical cure.
- source_word: ὁ παῖς
  chosen: the boy
  alternatives:
  - the child
  - the servant
  lexicon: BDAG
  rationale: παῖς can mean child, boy, girl, or servant depending on context. Here
    the surrounding narrative concerns a father's son, so 'the boy' is more precise
    than the broader 'child' and avoids the contextually inappropriate 'servant'.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  chosen: from that hour
  alternatives:
  - from that moment
  - at once
  lexicon: BDAG
  rationale: The phrase literally means 'from that hour.' This preserves the temporal
    expression of the Greek. While 'from that moment' is idiomatic, 'from that hour'
    keeps closer formal correspondence and remains understandable in modern English.
