id: MAT.17.4
reference: Matthew 17:4
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Πέτρος εἶπεν τῷ Ἰησοῦ· Κύριε, καλόν ἐστιν ἡμᾶς ὧδε εἶναι·
    εἰ θέλεις, ⸀ποιήσω ὧδε τρεῖς σκηνάς, σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ ⸂Ἠλίᾳ μίαν⸃.
translation:
  text: 'Then Peter answered and said to Jesus, “Lord, it is good for us to be here.
    If you wish, I will make three shelters here: one for you, one for Moses, and
    one for Elijah.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “tabernacles,” “booths,” or “tents” for Greek skēnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb ('answered and said'). 'Answered' preserves the Greek
    discourse formula without over-paraphrasing.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative progression more than contrast. 'Then' gives
    natural English flow while reflecting the connective force.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative speech introduction.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, titles are translated rather than transliterated.
    In direct address to Jesus, 'Lord' best preserves both respect and possible theological
    weight.
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  chosen: it is good for us to be here
  alternatives:
  - it is good that we are here
  - it is good for us to be here in this place
  lexicon: BDAG
  rationale: This clause is idiomatic. 'It is good for us to be here' is natural English
    and closely tracks the Greek infinitival construction without unnecessary expansion.
- source_word: εἰ θέλεις
  chosen: If you wish
  alternatives:
  - If you want
  - If you are willing
  lexicon: BDAG
  rationale: θέλω can denote desire or willingness. 'If you wish' is respectful in
    address to Jesus and fits the register of the scene.
- source_word: ποιήσω
  chosen: I will make
  alternatives:
  - I will set up
  - I will build
  lexicon: BDAG
  rationale: Future active indicative naturally renders as a straightforward offer.
    'Make' is broad enough to fit temporary structures and stays close to the verb.
- source_word: σκηνάς
  chosen: shelters
  alternatives:
  - tabernacles
  - tents
  - booths
  lexicon: BDAG
  rationale: σκηνή denotes a tent or temporary shelter. 'Shelters' is clear modern
    English and avoids the archaic/ecclesiastical feel of 'tabernacles,' while remaining
    broad enough for the likely temporary structures. Alternatives are worth preserving
    because of possible festival/tabernacle associations.
- source_word: σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ Ἠλίᾳ μίαν
  chosen: one for you, one for Moses, and one for Elijah
  alternatives:
  - one for you and one for Moses and one for Elijah
  lexicon: BDAG
  rationale: The repeated μίαν is preserved by repeating 'one' for each person, reflecting
    the distributive emphasis of the Greek.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Both occurrences of ὧδε are naturally rendered 'here'; repetition is
    retained in English because it is also repeated in Greek.
