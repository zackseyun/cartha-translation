theological_decisions:
- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    In this context, 'Lord' preserves the title's semantic range without flattening
    it to mere politeness.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of σκηνάς in the transfiguration context
  chosen_reading: shelters
  alternative_readings:
  - tabernacles
  - booths
  - tents
  rationale: The verse does not explicitly identify the structures with the Feast
    of Booths, so a neutral rendering is preferred in the main text. Because 'tabernacles/booths'
    may suggest intertextual or festival associations, those alternatives are preserved
    in a footnote rather than imported into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
