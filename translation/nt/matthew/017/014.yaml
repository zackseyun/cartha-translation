theological_decisions:
- issue: Rendering of ἄνθρωπος in a narrative reference to an individual
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The Greek is grammatically masculine and contextually refers to a specific
    male individual, not generic humanity. This follows the gender-accurate policy
    without importing broader anthropological claims.
