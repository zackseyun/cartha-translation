id: MAT.17.14
reference: Matthew 17:14
source:
  edition: SBLGNT
  text: Καὶ ⸀ἐλθόντων πρὸς τὸν ὄχλον προσῆλθεν αὐτῷ ἄνθρωπος γονυπετῶν αὐτὸν
translation:
  text: And when they came to the crowd, a man came up to him, kneeling before him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached him' for 'came up to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'falling on his knees before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective linking this episode to the preceding narrative;
    'And' preserves the flow without adding interpretive nuance.
- source_word: ἐλθόντων
  chosen: when they came
  alternatives:
  - after they came
  - as they came
  lexicon: BDAG
  rationale: Aorist participle, genitive plural, forming a genitive absolute with
    an implied plural subject from context ('they'). 'When they came' is natural English
    that preserves the temporal sense.
- source_word: πρὸς τὸν ὄχλον
  chosen: to the crowd
  alternatives:
  - toward the crowd
  - to the multitude
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or multitude. 'Crowd' is more natural
    modern English and fits the translation philosophy.
- source_word: προσῆλθεν
  chosen: came up
  alternatives:
  - approached
  - came
  lexicon: BDAG
  rationale: προσέρχομαι means to approach or come to someone. 'Came up' is idiomatic
    and preserves the directional sense toward Jesus.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: Dative pronoun marking the person approached. Rendered straightforwardly
    as 'to him.'
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is singular masculine and refers to an adult male individual
    in context. Per gender-accurate policy, 'a man' best matches the source.
- source_word: γονυπετῶν
  chosen: kneeling before him
  alternatives:
  - falling on his knees before him
  - kneeling to him
  lexicon: BDAG
  rationale: Present participle describing the man's posture/action as he approaches.
    'Kneeling before him' is concise, natural, and captures the reverential bodily
    action.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object of γονυπετῶν, referring to Jesus. Included in the English
    phrase 'before him.'
