theological_decisions:
- issue: Interpretive force of the disciples' question about Elijah's coming
  chosen_reading: Render the question without resolving whether the scribal teaching
    is affirmed, challenged, or partially corrected until the following verse.
  alternative_readings:
  - A more interpretive rendering could imply skepticism toward the scribes
  - A more explanatory rendering could import Malachi background into the verse itself
  rationale: The verse reports the disciples' question in response to the transfiguration
    context. The translation should preserve the theological tension and not import
    the answer from Matthew 17:11–13 into this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
