id: MAT.17.10
reference: Matthew 17:10
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησαν αὐτὸν οἱ ⸀μαθηταὶ λέγοντες· Τί οὖν οἱ γραμματεῖς λέγουσιν ὅτι
    Ἠλίαν δεῖ ἐλθεῖν πρῶτον;
translation:
  text: And the disciples asked him, saying, “Why then do the scribes say that Elijah
    must come first?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπηρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐπερωτάω here introduces a direct question. 'Asked'
    is natural modern English and sufficiently reflects the verb without overstating
    formality.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article marks a definite group already known in context. 'The disciples'
    is accurate; adding 'his' is interpretive and unnecessary since αὐτοῦ is not present.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - asking
  lexicon: BDAG
  rationale: The participle introduces the content of their question. 'Saying' preserves
    the Greek structure naturally enough in English; 'asking' would smooth the style
    but obscure the participial form.
- source_word: Τί οὖν
  chosen: Why then
  alternatives:
  - What then
  - Why, then
  lexicon: BDAG
  rationale: 'Although τί is formally ''what,'' in this idiom with λέγουσιν ὅτι it
    functions as a request for reason: ''Why then do the scribes say...?'' This best
    captures the sense in idiomatic English.'
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. ''Teachers of the law'' is explanatory but less
    direct.'
- source_word: λέγουσιν ὅτι
  chosen: say that
  alternatives:
  - are saying that
  - say
  lexicon: BDAG
  rationale: Present tense with ὅτι introduces the content clause. 'Say that' is the
    most straightforward English equivalent.
- source_word: Ἠλίαν
  chosen: Elijah
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: δεῖ ἐλθεῖν
  chosen: must come
  alternatives:
  - has to come
  - is necessary to come
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'Must come' is concise, natural, and preserves
    the force of the Greek.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - beforehand
  lexicon: BDAG
  rationale: Adverbial accusative meaning 'first' or 'before.' 'First' is the standard
    rendering and fits the eschatological sequence under discussion.
