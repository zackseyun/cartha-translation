theological_decisions:
- issue: Identification of the referent of αὐτοῦ
  chosen_reading: '''him'' refers to Jesus'
  rationale: The immediate narrative context of the transfiguration makes Jesus the
    clear referent. The translation leaves the pronoun as 'him' rather than substituting
    'Jesus,' preserving the Greek while remaining clear in context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of the appearance event
  chosen_reading: Visible appearance of Moses and Elijah
  alternative_readings:
  - Moses and Elijah were seen by them
  rationale: The verse presents Moses and Elijah as appearing in visible form without
    requiring further doctrinal specification about the mode of their presence. The
    translation preserves the narrative claim without importing theological explanation.
  doctrine_reference: Translation philosophy §3
