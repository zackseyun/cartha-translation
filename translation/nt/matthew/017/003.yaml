id: MAT.17.3
reference: Matthew 17:3
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ⸀ὤφθη αὐτοῖς Μωϋσῆς καὶ Ἠλίας ⸂συλλαλοῦντες μετ’ αὐτοῦ⸃.
translation:
  text: And behold, Moses and Elijah appeared to them, talking with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were seen by them.' The Greek verb is formally passive, though in English
      'appeared to them' is the more natural rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-directing
    particle. 'Behold' is slightly traditional but still understandable and preserves
    the suddenness and vividness better than omitting it.
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: Aorist passive of ὁράω is idiomatically rendered 'appeared' in English.
    This preserves the event of visible manifestation without awkward literalism ('was
    seen').
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - before them
  lexicon: BDAG
  rationale: Dative pronoun naturally indicates the witnesses to the appearance. 'To
    them' is the most direct rendering; 'before them' is possible but slightly interpretive.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: Ἠλίας
  chosen: Elijah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: συλλαλοῦντες
  chosen: talking
  alternatives:
  - speaking
  - conversing
  lexicon: BDAG
  rationale: The participle denotes speaking together or conversing. 'Talking' is
    natural modern English and fits the readable style; 'conversing' is more formal,
    while 'speaking' is slightly less reciprocal.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: μετά with the genitive indicates association. 'With him' is the straightforward
    rendering; in context 'him' refers to Jesus from the surrounding narrative.
