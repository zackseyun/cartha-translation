theological_decisions:
- issue: Meaning of σκανδαλίζω in relation to Jesus paying the temple tax
  chosen_reading: Jesus instructs payment to avoid unnecessary offense to the collectors,
    not because he is conceding an absolute obligation that overrides the prior argument
    about the sons being free.
  alternative_readings:
  - Jesus pays because he is fully obligated by the tax
  - Jesus pays solely as a miracle demonstration without ethical significance
  rationale: The immediate context (17:24–26) establishes the sons' freedom, while
    this verse adds a practical concession 'so that we may not offend them.' The translation
    therefore preserves the pragmatic force of the clause without importing a broader
    doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
