id: MAT.17.27
reference: Matthew 17:27
source:
  edition: SBLGNT
  text: ἵνα δὲ μὴ σκανδαλίσωμεν αὐτούς, πορευθεὶς ⸀εἰς θάλασσαν βάλε ἄγκιστρον καὶ
    τὸν ⸀ἀναβάντα πρῶτον ἰχθὺν ἆρον, καὶ ἀνοίξας τὸ στόμα αὐτοῦ εὑρήσεις στατῆρα·
    ἐκεῖνον λαβὼν δὸς αὐτοῖς ἀντὶ ἐμοῦ καὶ σοῦ.
translation:
  text: But so that we may not offend them, go to the sea, cast in a hook, and take
    the first fish that comes up. And when you open its mouth, you will find a stater.
    Take that and give it to them for me and for yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stater was a coin roughly equal to four drachmas, enough to pay the temple
      tax for two people.
    reason: cultural_note
  - marker: b
    text: Or 'cause them to stumble' / 'give them offense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίσωμεν
  chosen: offend
  alternatives:
  - cause to stumble
  - give offense
  lexicon: BDAG
  rationale: In this context the sense is not causing moral sin but giving unnecessary
    offense to the temple-tax collectors. 'Offend' is natural modern English and fits
    the pragmatic sense, while 'cause to stumble' would sound overly literal and potentially
    misleading.
- source_word: θάλασσαν
  chosen: sea
  alternatives:
  - lake
  lexicon: BDAG
  rationale: The Greek says 'sea.' Although the body of water is the Sea of Galilee
    (a lake), the translation preserves the source term rather than substituting the
    geographic explanation.
- source_word: ἄγκιστρον
  chosen: hook
  alternatives:
  - fishhook
  lexicon: BDAG
  rationale: A simple 'hook' is clear and idiomatic in English; 'fishhook' is possible
    but unnecessary in context.
- source_word: ἀναβάντα πρῶτον ἰχθὺν
  chosen: the first fish that comes up
  alternatives:
  - the first fish that rises
  - the first fish that comes up first
  lexicon: BDAG
  rationale: This participial phrase refers to the first fish brought up from the
    water. 'That comes up' is idiomatic and preserves the action without awkward literalism.
- source_word: ἆρον
  chosen: take
  alternatives:
  - lift up
  - pull up
  lexicon: BDAG
  rationale: Here αἴρω means to take up/remove the fish once caught. 'Take' is concise
    and natural in sequence with the surrounding imperatives.
- source_word: στατῆρα
  chosen: a stater
  alternatives:
  - a four-drachma coin
  lexicon: BDAG
  rationale: '''Stater'' preserves the specific coin named in Greek. Because many
    readers will not know its value, the equivalent value is best preserved in a footnote
    rather than replacing the term in the main text.'
- source_word: ἀντὶ ἐμοῦ καὶ σοῦ
  chosen: for me and for yourself
  alternatives:
  - instead of me and you
  - on behalf of me and you
  lexicon: BDAG
  rationale: ἀντί here expresses payment on behalf of or in place of. 'For me and
    for yourself' is idiomatic English and clearly communicates that the coin covers
    both persons' tax.
- source_word: πορευθεὶς
  chosen: go
  alternatives:
  - having gone
  - depart
  lexicon: BDAG
  rationale: The participle introduces attendant action before the imperatives. In
    English, 'go' naturally carries the force without cumbersome literal phrasing.
- source_word: δὸς αὐτοῖς
  chosen: give it to them
  alternatives:
  - pay it to them
  lexicon: BDAG
  rationale: The direct object is the coin just mentioned. 'Give it to them' is straightforward;
    the payment sense is clear from context.
