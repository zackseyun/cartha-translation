theological_decisions:
- issue: Identification of Elijah's coming
  chosen_reading: The verse is translated in a way that allows Jesus' statement to
    refer to John the Baptist as the Elijah-like forerunner without inserting that
    identification into the text itself.
  alternative_readings:
  - A more explicit rendering could paraphrase the referent as John the Baptist, but
    that would go beyond the Greek of this verse.
  rationale: The immediate context in Matthew clarifies the identification, but this
    verse itself names Elijah. The translation preserves the wording and leaves the
    interpretive identification to context rather than importing it into the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of μέλλει in relation to the Son of Man's suffering
  chosen_reading: Rendered as impending future ('is about to suffer') rather than
    a stronger theological necessity formula.
  alternative_readings:
  - is going to suffer
  - is destined to suffer
  rationale: The Greek states forthcoming suffering, but does not itself explicitly
    articulate divine necessity in this clause. The translation avoids importing a
    fuller passion theology beyond the wording here.
  doctrine_reference: Do not import doctrinal claims the text does not make.
