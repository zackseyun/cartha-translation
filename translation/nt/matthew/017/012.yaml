id: MAT.17.12
reference: Matthew 17:12
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ὅτι Ἠλίας ἤδη ἦλθεν, καὶ οὐκ ἐπέγνωσαν αὐτὸν ἀλλὰ ἐποίησαν ἐν
    αὐτῷ ὅσα ἠθέλησαν· οὕτως καὶ ὁ υἱὸς τοῦ ἀνθρώπου μέλλει πάσχειν ὑπ’ αὐτῶν.
translation:
  text: But I tell you that Elijah has already come, and they did not recognize him,
    but did to him whatever they wanted. So also the Son of Man is about to suffer
    at their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not know him' or 'they did not acknowledge him.' The Greek
      can denote failure to recognize or identify him properly.
    reason: lexical_alternative
  - marker: b
    text: Or 'did against him whatever they wanted' or 'treated him however they wished.'
      The Greek expression is idiomatic and conveys unrestricted action toward him.
    reason: lexical_alternative
  - marker: c
    text: Or 'is going to suffer.' The Greek says the Son of Man is about to suffer,
      emphasizing what is impending.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - But I say to you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is a direct speech introduction. 'I tell you' is
    natural modern English while preserving the force; δέ is rendered 'But' to mark
    contrast with prior expectation.
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy for names.
- source_word: ἤδη ἦλθεν
  chosen: has already come
  alternatives:
  - already came
  - already has come
  lexicon: BDAG
  rationale: Aorist ἦλθεν with adverb ἤδη refers to a completed coming with present
    relevance in context; English present perfect communicates this naturally.
- source_word: οὐκ ἐπέγνωσαν αὐτόν
  chosen: they did not recognize him
  alternatives:
  - they did not know him
  - they did not acknowledge him
  lexicon: BDAG
  rationale: 'ἐπιγινώσκω here is best rendered ''recognize'' in context: the issue
    is failure to identify Elijah''s role/identity, not mere lack of acquaintance.'
- source_word: ἐποίησαν ἐν αὐτῷ
  chosen: did to him
  alternatives:
  - treated him with
  - did against him
  - dealt with him
  lexicon: BDAG
  rationale: The idiom ποιέω ἐν with a person is awkward if rendered woodenly. 'Did
    to him' captures the hostile action implied by the context and fits the following
    'whatever they wanted.'
- source_word: ὅσα ἠθέλησαν
  chosen: whatever they wanted
  alternatives:
  - whatever they wished
  - as much as they wanted
  lexicon: BDAG
  rationale: ὅσα with θέλω expresses unrestricted action according to their will.
    'Whatever they wanted' is idiomatic and sufficiently strong.
- source_word: οὕτως καὶ
  chosen: So also
  alternatives:
  - Likewise also
  - In the same way
  lexicon: BDAG
  rationale: Marks analogy between what happened to Elijah and what will happen to
    the Son of Man. 'So also' preserves the comparative force compactly.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established translation of the titular expression, preserving both its
    idiomatic and Danielic resonance.
- source_word: μέλλει πάσχειν
  chosen: is about to suffer
  alternatives:
  - is going to suffer
  - is destined to suffer
  lexicon: BDAG
  rationale: μέλλω + infinitive commonly indicates imminence or impending action.
    'Is about to suffer' preserves the forward-looking force without importing stronger
    determinism than the Greek states.
- source_word: ὑπ’ αὐτῶν
  chosen: at their hands
  alternatives:
  - by them
  - from them
  lexicon: BDAG
  rationale: ὑπό with genitive marks agency. 'At their hands' is idiomatic English
    that conveys hostile agency clearly in a suffering context.
