id: MAT.17.15
reference: Matthew 17:15
source:
  edition: SBLGNT
  text: καὶ λέγων· Κύριε, ἐλέησόν μου τὸν υἱόν, ὅτι σεληνιάζεται καὶ κακῶς ⸀πάσχει,
    πολλάκις γὰρ πίπτει εἰς τὸ πῦρ καὶ πολλάκις εἰς τὸ ὕδωρ.
translation:
  text: and saying, “Lord, have mercy on my son, because he has seizures and suffers
    terribly; for he often falls into the fire and often into the water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is epileptic'; literally, 'is moonstruck.' The Greek term reflects ancient
      idiom for a seizure-like condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a respectful address to Jesus. Per doctrine
    defaults, κύριος is rendered 'Lord' rather than 'Master'.
- source_word: ἐλέησόν
  chosen: have mercy on
  alternatives:
  - show mercy to
  - take pity on
  lexicon: BDAG
  rationale: Aorist imperative of ἐλεάω, a standard plea for compassionate help. 'Have
    mercy on' is idiomatic and preserves the gravity of the appeal.
- source_word: μου τὸν υἱόν
  chosen: my son
  alternatives:
  - my child
  lexicon: BDAG
  rationale: υἱός specifically denotes 'son,' not merely 'child'; the possessive μου
    is naturally carried by 'my son'.
- source_word: σεληνιάζεται
  chosen: has seizures
  alternatives:
  - is epileptic
  - is moonstruck
  lexicon: BDAG
  rationale: The verb literally relates to the moon and in ancient usage referred
    to seizure-like affliction. 'Has seizures' communicates the observable condition
    in clear modern English without importing a technical modern diagnosis; the more
    literal/traditional alternatives are preserved in a footnote.
- source_word: κακῶς πάσχει
  chosen: suffers terribly
  alternatives:
  - suffers badly
  - is grievously afflicted
  lexicon: BDAG
  rationale: The adverb κακῶς intensifies πάσχει. 'Suffers terribly' is natural modern
    English and conveys severe distress.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - frequently
  - many times
  lexicon: BDAG
  rationale: Standard adverb meaning repeated occurrence; 'often' is the most natural
    concise rendering in English.
- source_word: πίπτει εἰς τὸ πῦρ
  chosen: falls into the fire
  alternatives:
  - falls into fire
  lexicon: BDAG
  rationale: Straightforward rendering of πίπτει with εἰς + accusative; the article
    is idiomatically represented in English as 'the fire'.
- source_word: εἰς τὸ ὕδωρ
  chosen: into the water
  alternatives:
  - into water
  lexicon: BDAG
  rationale: Parallel to 'into the fire'; retaining the article gives a natural English
    expression and preserves the Greek structure.
- source_word: καὶ λέγων
  chosen: and saying
  alternatives:
  - and said
  - saying
  lexicon: BDAG
  rationale: Present participle linked to the preceding narrative. 'And saying' preserves
    the participial connection more formally; English style still remains readable.
