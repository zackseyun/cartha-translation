theological_decisions:
- issue: Rendering of σεληνιάζεται in a healing/exorcism context
  chosen_reading: Translate phenomenologically as 'has seizures' rather than as a
    modern medical diagnosis or a literal moon-based expression.
  alternative_readings:
  - is epileptic
  - is moonstruck
  rationale: The verse reports the father's description of the boy's condition, not
    a technical medical classification. 'Has seizures' preserves the observable sense
    while avoiding both anachronistic precision and endorsement of ancient lunar causation.
    This also avoids importing a theological explanation the text itself does not
    state in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
