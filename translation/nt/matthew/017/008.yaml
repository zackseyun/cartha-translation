theological_decisions:
- issue: Emphasis on Jesus as the sole remaining figure after the vision
  chosen_reading: Retain the double exclusivity with 'except Jesus himself alone'
  alternative_readings:
  - except Jesus only
  - except Jesus alone
  - except him—Jesus alone
  rationale: The Greek stacks εἰ μὴ + αὐτὸν + μόνον for emphasis. Preserving that
    emphasis is important to the narrative scene without importing additional theological
    claims. The wording highlights that Moses and Elijah are no longer visible, leaving
    Jesus as the only one seen.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
