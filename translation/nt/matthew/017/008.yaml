id: MAT.17.8
reference: Matthew 17:8
source:
  edition: SBLGNT
  text: ἐπάραντες δὲ τοὺς ὀφθαλμοὺς αὐτῶν οὐδένα εἶδον εἰ μὴ ⸀αὐτὸν Ἰησοῦν μόνον.
translation:
  text: And when they lifted up their eyes, they saw no one except Jesus himself alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'except Jesus alone.' The Greek uses both an emphatic pronoun ('himself')
      and 'alone' for strong exclusivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάραντες
  chosen: when they lifted up
  alternatives:
  - lifting up
  - raising
  lexicon: BDAG
  rationale: Aorist participle of ἐπαίρω, here idiomatically introducing the action
    prior to the main verb. 'When they lifted up' preserves the participial sequence
    in natural English better than a more wooden 'having lifted up.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective continuing the narrative. 'And' is the most
    natural English equivalent in context; stronger adversative force ('but') is not
    required.
- source_word: τοὺς ὀφθαλμοὺς αὐτῶν
  chosen: their eyes
  alternatives:
  - their gaze
  lexicon: BDAG
  rationale: The phrase is a standard bodily expression. 'Their eyes' keeps the concrete
    wording of the Greek rather than abstracting to 'their gaze.'
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  - no person
  lexicon: BDAG
  rationale: Accusative singular of οὐδείς functioning as the object of 'saw.' 'No
    one' is idiomatic, clear, and suitably formal.
- source_word: εἶδον
  chosen: they saw
  alternatives:
  - they saw there
  - they perceived
  lexicon: BDAG
  rationale: Simple aorist of ὁράω. 'They saw' is the plain sense and needs no expansion.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - except for
  - if not
  lexicon: BDAG
  rationale: In this construction after a negation, εἰ μὴ means 'except.' 'If not'
    would be misleading in English.
- source_word: αὐτὸν
  chosen: himself
  alternatives:
  - him
  lexicon: BDAG
  rationale: Placed before the proper name for emphasis. Rendering it as 'himself'
    preserves the emphatic force better than leaving it untranslated or simply using
    'him.'
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἰησοῦς, in keeping with
    the translation philosophy to transliterate names.
- source_word: μόνον
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: μόνον reinforces exclusivity already signaled by εἰ μὴ. 'Alone' preserves
    the emphatic final position and avoids flattening the double emphasis; the English
    phrase 'except Jesus himself alone' intentionally reflects the Greek's cumulative
    stress.
