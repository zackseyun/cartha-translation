id: MAT.17.7
reference: Matthew 17:7
source:
  edition: SBLGNT
  text: καὶ ⸂προσῆλθεν ὁ Ἰησοῦς καὶ ἁψάμενος αὐτῶν⸃ εἶπεν· Ἐγέρθητε καὶ μὴ φοβεῖσθε.
translation:
  text: And Jesus came near and touched them and said, “Get up, and do not be afraid.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “approached”; the Greek verb can mean “came to” or “approached.”
    reason: lexical_alternative
  - marker: b
    text: Or “Rise”; the command refers to getting up from their fallen position.
    reason: lexical_alternative
  - marker: c
    text: Or “do not fear.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθεν
  chosen: came near
  alternatives:
  - approached
  - came to
  lexicon: BDAG
  rationale: προσέρχομαι commonly means to come/approach toward someone. 'Came near'
    is natural modern English and preserves the movement toward the disciples without
    sounding stiff.
- source_word: ἁψάμενος αὐτῶν
  chosen: touched them
  alternatives:
  - having touched them
  - laid his hand on them
  lexicon: BDAG
  rationale: The aorist middle participle of ἅπτω with genitive means 'touch.' In
    English, coordinating it as 'touched them' is smoother than a literal participial
    construction while preserving the action. 'Laid his hand on them' is more specific
    than the Greek warrants.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: λέγω is the standard verb 'say.' 'Said' is the most direct and least
    interpretive rendering.
- source_word: Ἐγέρθητε
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: The imperative from ἐγείρω here calls for the disciples to rise from
    their prostrate position. 'Get up' is clear, idiomatic modern English; 'Rise'
    is more formal, and 'Stand up' may over-specify the final posture.
- source_word: μὴ φοβεῖσθε
  chosen: do not be afraid
  alternatives:
  - do not fear
  - stop being afraid
  lexicon: BDAG
  rationale: φοβέομαι means 'fear/be afraid.' 'Do not be afraid' is standard, natural
    English and fits Jesus' reassuring command. While the present imperative can sometimes
    imply ongoing action ('stop being afraid'), that nuance is not strong enough here
    to require it in the main text.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: The repeated καί links the sequence of actions straightforwardly. 'And'
    preserves the narrative flow without adding temporal nuance beyond the Greek.
