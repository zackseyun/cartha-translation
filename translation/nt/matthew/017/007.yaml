theological_decisions:
- issue: Rendering Jesus' comforting imperative without importing additional pastoral
    nuance
  chosen_reading: Get up, and do not be afraid
  alternative_readings:
  - Rise, and do not fear
  - Stand up, and stop being afraid
  rationale: The verse presents Jesus' physical approach, touch, and direct reassurance.
    The translation preserves this plainly without embellishment or doctrinal expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
