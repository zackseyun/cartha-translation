theological_decisions:
- issue: Resurrection wording and voice
  chosen_reading: is raised from the dead
  alternative_readings:
  - rises from the dead
  - is resurrected from the dead
  rationale: The Greek uses a passive form (ἐγερθῇ). Rendering it 'is raised' preserves
    the grammatical voice and allows the text's theological resonance regarding divine
    action without making that agency more explicit than the verse itself does.
  doctrine_reference: Preserve theological tension rather than resolve it.
