id: MAT.17.9
reference: Matthew 17:9
source:
  edition: SBLGNT
  text: Καὶ καταβαινόντων αὐτῶν ἐκ τοῦ ὄρους ἐνετείλατο αὐτοῖς ὁ Ἰησοῦς λέγων· Μηδενὶ
    εἴπητε τὸ ὅραμα ἕως οὗ ὁ υἱὸς τοῦ ἀνθρώπου ἐκ νεκρῶν ⸀ἐγερθῇ.
translation:
  text: And as they were coming down from the mountain, Jesus commanded them, saying,
    “Tell the vision to no one until the Son of Man is raised from the dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from among the dead.”
    reason: lexical_alternative
  - marker: b
    text: Or “what you saw.” The Greek says “the vision.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβαινόντων αὐτῶν
  chosen: as they were coming down
  alternatives:
  - while they were descending
  - as they came down
  lexicon: BDAG
  rationale: The present participle with genitive absolute indicates contemporaneous
    action. 'As they were coming down' is natural English that preserves the ongoing
    sense without sounding wooden.
- source_word: ἐκ τοῦ ὄρους
  chosen: from the mountain
  alternatives:
  - down from the mountain
  lexicon: BDAG
  rationale: A straightforward spatial phrase. 'The mountain' preserves the article
    and the narrative specificity of the mountain just mentioned.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: BDAG
  rationale: The verb carries the sense of giving a charge or command. 'Commanded'
    best reflects the force of Jesus' directive here.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retaining 'saying' reflects the participial construction and keeps the
    discourse introduction close to the Greek.
- source_word: Μηδενὶ εἴπητε
  chosen: Tell ... to no one
  alternatives:
  - Say nothing to anyone
  - Do not tell anyone
  lexicon: BDAG
  rationale: The dative μηδενί with aorist subjunctive in prohibition is naturally
    rendered as a command not to tell anyone. 'Tell ... to no one' preserves the object
    that follows and the emphatic negation.
- source_word: τὸ ὅραμα
  chosen: the vision
  alternatives:
  - what you saw
  - the sight
  lexicon: BDAG
  rationale: ὅραμα commonly means 'vision' or 'supernatural sight.' 'The vision' is
    the most direct rendering and preserves the term's revelatory nuance better than
    the more interpretive 'what you saw.'
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: This idiom marks the temporal limit of the prohibition. Simple 'until'
    is accurate and idiomatic.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and should be translated, not paraphrased.
    The traditional rendering accurately reflects the Greek and preserves its Danielic/theological
    resonance.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: The idiom means resurrection out from the realm/company of the dead.
    'From the dead' is standard, clear English; the more literal 'from among the dead'
    is possible but less idiomatic.
- source_word: ἐγερθῇ
  chosen: is raised
  alternatives:
  - is resurrected
  - rises
  lexicon: BDAG
  rationale: The aorist passive subjunctive of ἐγείρω in resurrection contexts is
    well rendered 'is raised.' This preserves the passive form present in the Greek
    without over-interpreting agency in the main text.
