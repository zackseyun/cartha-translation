id: MAT.17.23
reference: Matthew 17:23
source:
  edition: SBLGNT
  text: καὶ ἀποκτενοῦσιν αὐτόν, καὶ τῇ τρίτῃ ἡμέρᾳ ἐγερθήσεται. καὶ ἐλυπήθησαν σφόδρα.
translation:
  text: and they will kill him, and on the third day he will be raised. And they were
    deeply grieved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''he will rise.'' The Greek verb is passive: ''he will be raised.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκτενοῦσιν
  chosen: they will kill
  alternatives:
  - they will put to death
  - they will murder
  lexicon: BDAG
  rationale: Future active indicative plural from ἀποκτείνω. 'Kill' is the most direct
    and natural English equivalent. 'Put to death' is possible but slightly more formal;
    'murder' adds a moral nuance not explicit in the verb itself.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to the Son of Man from the
    prior verse; English requires the object pronoun 'him'.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after that
  - on the third day thereafter
  lexicon: BDAG
  rationale: Dative of time when. 'On the third day' is the standard and accurate
    temporal rendering, preserving the Greek expression without unnecessary expansion.
- source_word: ἐγερθήσεται
  chosen: he will be raised
  alternatives:
  - he will rise
  - he will be awakened
  lexicon: BDAG
  rationale: Future passive indicative singular of ἐγείρω. The passive 'will be raised'
    best reflects the Greek form and preserves the theological nuance of divine action,
    whereas 'will rise' is idiomatic but less formally aligned to the passive voice.
- source_word: ἐλυπήθησαν
  chosen: they were deeply grieved
  alternatives:
  - they were very sad
  - they were greatly distressed
  lexicon: BDAG
  rationale: Aorist passive/deponent indicative plural of λυπέω, expressing sorrow.
    'Were deeply grieved' captures both the emotional weight and the completed response
    better than the flatter 'were very sad.'
- source_word: σφόδρα
  chosen: deeply
  alternatives:
  - greatly
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: Adverb intensifying their grief. 'Deeply' is natural modern English when
    paired with 'grieved'; 'exceedingly' is too archaic, and 'very much' is less idiomatic
    here.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... And
  alternatives:
  - then ... and ... and
  lexicon: BDAG
  rationale: The repeated καί structures the sequence plainly. Retaining 'and' throughout
    preserves the paratactic flow of the Greek without overinterpreting temporal nuance.
