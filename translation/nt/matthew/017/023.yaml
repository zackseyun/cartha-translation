theological_decisions:
- issue: Rendering the resurrection prediction in passive or active English
  chosen_reading: he will be raised
  alternative_readings:
  - he will rise
  rationale: The Greek verb is future passive, and preserving that voice maintains
    the text's wording and the theological nuance of resurrection as an act of God,
    without denying that Jesus also rises. This follows the translation philosophy
    of preserving source-language form where meaningful.
  doctrine_reference: Translation philosophy §1, §3
