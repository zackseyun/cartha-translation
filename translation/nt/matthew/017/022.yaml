theological_decisions:
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional literal rendering best preserves the Greek expression
    and its intertextual/theological resonance, especially in Gospel usage. A more
    interpretive rendering like 'the Human One' reduces that resonance and is not
    required by the text.
  doctrine_reference: Translation philosophy §§2, 3, 4
- issue: Nuance of παραδίδοσθαι in passion prediction
  chosen_reading: be delivered
  alternative_readings:
  - be handed over
  - be betrayed
  rationale: The verse predicts Jesus' being given over into human hands. 'Be delivered'
    preserves the passive and leaves agency/theological layering intact, avoiding
    over-resolution toward either merely human betrayal or a more technical judicial
    transfer. The common alternative 'be handed over' is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
