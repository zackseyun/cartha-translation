id: MAT.17.22
reference: Matthew 17:22
source:
  edition: SBLGNT
  text: ⸀Συστρεφομένων δὲ αὐτῶν ἐν τῇ Γαλιλαίᾳ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Μέλλει ὁ υἱὸς
    τοῦ ἀνθρώπου παραδίδοσθαι εἰς χεῖρας ἀνθρώπων,
translation:
  text: While they were gathering together in Galilee, Jesus said to them, “The Son
    of Man is about to be delivered into the hands of men,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “were assembling together.”
    reason: lexical_alternative
  - marker: b
    text: Or, “is about to be handed over.”
    reason: alternative_reading
  - marker: c
    text: Greek “into the hands of men”; alternatively, “into the hands of people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Συστρεφομένων
  chosen: were gathering together
  alternatives:
  - were staying
  - were assembling
  - were moving about together
  lexicon: BDAG
  rationale: Genitive absolute participle from συστρέφω, here describing the group's
    coming together or being together in Galilee. 'Gathering together' preserves the
    collective sense without over-specifying motion.
- source_word: δὲ
  chosen: while
  alternatives:
  - now
  - and
  - then
  lexicon: BDAG
  rationale: In context δέ links the circumstance of their being in Galilee with Jesus'
    statement. 'While' naturally renders the genitive absolute plus connective in
    readable English.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - throughout Galilee
  lexicon: BDAG
  rationale: Straightforward locative phrase; 'in Galilee' is the most natural and
    sufficiently precise rendering.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; 'said to them' is slightly
    more formal and transparent to the Greek than 'told them'.
- source_word: Μέλλει
  chosen: is about to
  alternatives:
  - is going to
  - is destined to
  - is soon to
  lexicon: BDAG
  rationale: μέλλω commonly indicates imminence or impending action. 'Is about to'
    preserves the forward-looking force without importing a stronger notion of fate.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established and literal rendering of Jesus' self-designation, preserving
    both the idiom and its theological resonance.
- source_word: παραδίδοσθαι
  chosen: be delivered
  alternatives:
  - be handed over
  - be betrayed
  lexicon: BDAG
  rationale: The passive infinitive means 'to be handed over/delivered.' 'Be delivered'
    is broad enough to preserve the process without prematurely narrowing it to Judas's
    betrayal alone; the common alternative 'handed over' is viable and preserved in
    a footnote.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - to the power of
  lexicon: BDAG
  rationale: This is a common idiom. 'Into the hands of' keeps the metaphor and remains
    clear in English; 'to the power of' would interpret rather than translate.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The plural ἀνθρώπων here contrasts with 'the Son of Man' and refers concretely
    to human agents. Per the project's gender-accurate philosophy, 'men' best preserves
    the masculine form and rhetorical contrast, while a more inclusive alternative
    is worth noting.
