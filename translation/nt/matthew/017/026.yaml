theological_decisions:
- issue: Rendering of οἱ υἱοί in a potentially representative statement about those
    belonging to the king/household
  chosen_reading: the sons
  alternative_readings:
  - the children
  rationale: The source text uses the masculine plural υἱοί, and the immediate analogy
    is specifically about a king's sons in relation to taxation. Following the gender-accurate
    principle, the masculine form is retained rather than neutralized. This also preserves
    the theological resonance of sonship without expanding the statement beyond the
    text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
