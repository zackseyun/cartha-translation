id: MAT.17.26
reference: Matthew 17:26
source:
  edition: SBLGNT
  text: ⸂εἰπόντος δέ⸃· Ἀπὸ τῶν ἀλλοτρίων, ἔφη αὐτῷ ὁ Ἰησοῦς· Ἄρα γε ἐλεύθεροί εἰσιν
    οἱ υἱοί.
translation:
  text: When he said, “From strangers,” Jesus said to him, “Then the sons are free.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “From foreigners” or “From others.” The Greek contrasts those outside
      the ruler’s household with his own sons.
    reason: lexical_alternative
  - marker: b
    text: Or “the sons are exempt.” The Greek more literally says “the sons are free,”
      which in context implies exemption from the tax.
    reason: lexical_alternative
  - marker: c
    text: Or “the children,” though the Greek specifically says “sons.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰπόντος δέ
  chosen: When he said
  alternatives:
  - After he said
  - And when he said
  lexicon: BDAG
  rationale: A genitive absolute with δέ marking transition. 'When he said' is natural
    English and preserves the temporal sense without over-translating the connective.
- source_word: ἀπὸ τῶν ἀλλοτρίων
  chosen: From strangers
  alternatives:
  - From foreigners
  - From others
  lexicon: BDAG
  rationale: ἀλλότριος here refers to those who do not belong to the ruler's own household,
    in contrast to his sons. 'Strangers' best preserves the relational contrast in
    concise English; 'foreigners' could imply ethnicity or nationality too strongly.
- source_word: ἔφη αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus said to him
  alternatives:
  - Jesus told him
  lexicon: BDAG
  rationale: Standard narrative use of φημί. 'Said to him' is straightforward and
    formally close.
- source_word: Ἄρα γε
  chosen: Then
  alternatives:
  - So then
  - Consequently
  - Therefore
  lexicon: BDAG
  rationale: Inferential particle combination drawing a conclusion from Peter's answer.
    'Then' is idiomatic and sufficiently marks the deduction without sounding overly
    formal.
- source_word: ἐλεύθεροί
  chosen: free
  alternatives:
  - exempt
  lexicon: BDAG
  rationale: The adjective means 'free' in the sense of not being under obligation.
    'Exempt' captures the tax context but narrows the broader force of Jesus' statement;
    'free' preserves both the immediate implication and the larger sonship contrast.
- source_word: οἱ υἱοί
  chosen: the sons
  alternatives:
  - the children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and contrasts sons of a king
    with outsiders. Per doctrine, gender-accurate rendering is preferred over neutralization.
    'The sons' also preserves the household/legal nuance better than 'the children'.
