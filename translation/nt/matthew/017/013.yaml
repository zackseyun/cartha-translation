theological_decisions:
- issue: Identification of the Elijah figure in the immediate context
  chosen_reading: The verse states that the disciples understood Jesus to be speaking
    about John the Baptist.
  rationale: This is an explicit narrative identification in context, not a translator-imposed
    theological inference. The translation should state it plainly without expanding
    beyond the wording of the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    text itself resolves the referent.
