id: MAT.17.13
reference: Matthew 17:13
source:
  edition: SBLGNT
  text: τότε συνῆκαν οἱ μαθηταὶ ὅτι περὶ Ἰωάννου τοῦ βαπτιστοῦ εἶπεν αὐτοῖς.
translation:
  text: Then the disciples understood that he had spoken to them about John the Baptist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "John the Baptizer."
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal adverb marking the moment of realization; 'Then' is the most
    natural and concise narrative connector in English.
- source_word: συνῆκαν
  chosen: understood
  alternatives:
  - grasped
  - comprehended
  - realized
  lexicon: BDAG
  rationale: Aorist of συνίημι denotes coming to understand or grasping the meaning.
    'Understood' is clear, idiomatic, and fits the narrative context without overstating
    the nuance.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard rendering for μαθηταί in Gospel narrative; preserves the recognized
    referent of Jesus' followers.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what they understood, not a causal clause;
    therefore 'that' best reflects the syntax.
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  - with reference to
  lexicon: BDAG
  rationale: With the genitive here, περί indicates the subject matter of Jesus' statement.
    'About' is the most natural modern English equivalent.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: Conventional English rendering of the title βαπτιστής attached to John.
    'John the Baptist' is widely understood and accurately identifies the figure,
    while 'Baptizer' is a possible but less established alternative.
- source_word: εἶπεν αὐτοῖς
  chosen: he had spoken to them
  alternatives:
  - he spoke to them
  - he had told them
  lexicon: BDAG
  rationale: Greek aorist simply states 'he said/spoke to them,' but English idiom
    after 'understood that' naturally uses past perfect to indicate prior speech relative
    to their later understanding. 'Spoken' preserves the verbal act without importing
    more specificity than 'told' might.
