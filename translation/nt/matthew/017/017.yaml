id: MAT.17.17
reference: Matthew 17:17
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν· Ὦ γενεὰ ἄπιστος καὶ διεστραμμένη, ἕως πότε ⸂μεθ’
    ὑμῶν ἔσομαι⸃; ἕως πότε ἀνέξομαι ὑμῶν; φέρετέ μοι αὐτὸν ὧδε.
translation:
  text: But Jesus answered, “O unbelieving and perverted generation, how long will
    I be with you? How long will I put up with you? Bring him here to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “faithless.” The Greek adjective can mean either “unbelieving” or “faithless.”
    reason: lexical_alternative
  - marker: b
    text: Or “twisted” or “corrupt generation.”
    reason: lexical_alternative
  - marker: c
    text: Or “How long will I bear with you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - Then ... answered
  lexicon: BDAG
  rationale: ἀποκριθεὶς with εἶπεν is a common Semitic-influenced idiom meaning 'answered
    and said'; in natural English this is best rendered 'answered.' δέ is mildly adversative
    or transitional here, and 'But' fits the rebuking turn in the narrative better
    than 'And.'
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, omitting the article as
    normal in English.
- source_word: Ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: BDAG
  rationale: Vocative particle expressing solemn address or lament. 'O' preserves
    the elevated rebuking tone better than the more conversational 'Oh.'
- source_word: γενεὰ
  chosen: generation
  alternatives:
  - people
  - age
  lexicon: BDAG
  rationale: γενεά commonly denotes a generation or contemporaneous group. 'Generation'
    preserves the biblical and prophetic resonance of Jesus' address.
- source_word: ἄπιστος
  chosen: unbelieving
  alternatives:
  - faithless
  - unfaithful
  lexicon: BDAG
  rationale: ἄπιστος can mean unbelieving or faithless. In this context Jesus rebukes
    lack of faith, so 'unbelieving' most directly communicates the sense without importing
    covenantal overtones that 'unfaithful' may suggest.
- source_word: διεστραμμένη
  chosen: perverted
  alternatives:
  - twisted
  - corrupt
  lexicon: BDAG
  rationale: Perfect passive participle from διαστρέφω, describing a distorted or
    warped condition. 'Perverted' captures moral distortion and echoes traditional
    biblical diction; 'twisted' is possible but lighter in tone.
- source_word: ἕως πότε
  chosen: how long
  alternatives:
  - until when
  lexicon: BDAG
  rationale: Idiomatic temporal expression best rendered 'how long' in English.
- source_word: μεθ’ ὑμῶν ἔσομαι
  chosen: will I be with you
  alternatives:
  - am I to be with you
  lexicon: BDAG
  rationale: Future middle of εἰμί with μετά + genitive is straightforwardly 'will
    I be with you.' English inversion preserves the rhetorical question. 'Am I to
    be with you' is interpretive and less direct.
- source_word: ἀνέξομαι ὑμῶν
  chosen: will I put up with you
  alternatives:
  - will I bear with you
  - will I endure you
  lexicon: BDAG
  rationale: ἀνέχομαι here means to endure or bear with. 'Put up with' is idiomatic
    modern English and conveys exasperation; 'bear with' is viable but can sound milder
    or more formal.
- source_word: φέρετέ
  chosen: Bring
  alternatives:
  - Carry
  - Lead
  lexicon: BDAG
  rationale: Imperative of φέρω in context is a command to bring the boy to Jesus.
    'Bring' is the natural English equivalent.
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: Dative pronoun is naturally expressed in English as 'to me' with 'bring.'
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Masculine singular pronoun referring to the afflicted boy in context.
- source_word: ὧδε
  chosen: here
  alternatives:
  - here now
  lexicon: BDAG
  rationale: Adverb of place meaning 'here'; concise and natural in English.
