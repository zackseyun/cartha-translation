theological_decisions:
- issue: Rendering ἄπιστος in Jesus' rebuke
  chosen_reading: unbelieving
  alternative_readings:
  - faithless
  - unfaithful
  rationale: The immediate context centers on deficient faith in relation to the failed
    exorcism. 'Unbelieving' preserves that emphasis without over-specifying covenant
    infidelity. This also avoids importing a broader theological judgment beyond what
    the verse itself states.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
