id: MAT.17.16
reference: Matthew 17:16
source:
  edition: SBLGNT
  text: καὶ προσήνεγκα αὐτὸν τοῖς μαθηταῖς σου, καὶ οὐκ ἠδυνήθησαν αὐτὸν θεραπεῦσαι.
translation:
  text: And I brought him to your disciples, and they were not able to heal him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they could not heal him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήνεγκα
  chosen: brought
  alternatives:
  - presented
  - brought to
  lexicon: BDAG
  rationale: Aorist of προσφέρω here means to bring someone to another person. 'Brought'
    is natural modern English and fits the direct object plus dative construction
    ('him to your disciples') without sounding overly formal like 'presented'.
- source_word: μαθηταῖς σου
  chosen: your disciples
  alternatives:
  - your learners
  - your followers
  lexicon: BDAG
  rationale: μαθητής is regularly rendered 'disciple' in Gospel contexts because it
    denotes committed followers/students of a teacher. 'Your disciples' is the standard
    and clearest contextual rendering.
- source_word: ἠδυνήθησαν
  chosen: were not able
  alternatives:
  - could not
  lexicon: BDAG
  rationale: δύναμαι expresses ability or capability. 'Were not able' slightly more
    closely reflects the verbal idea than the contracted English 'could not,' while
    remaining natural.
- source_word: θεραπεῦσαι
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: θεραπεύω in this context refers to healing the afflicted boy. 'Heal'
    is the most natural and biblically consistent rendering in Gospel miracle contexts;
    'cure' is possible but less idiomatic here.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Then ... but
  lexicon: BDAG
  rationale: The repeated καί coordinates the father's report in a straightforward
    way. Preserving 'and' in both places reflects the Greek flow without importing
    contrastive force beyond what the text states.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to the afflicted son/boy in the immediate context.
    'Him' is the direct and unambiguous English equivalent.
