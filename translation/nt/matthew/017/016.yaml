theological_decisions:
- issue: Nature of the disciples' failure
  chosen_reading: Render the statement simply as inability to heal, without adding
    explanation about lack of faith, authority, or exorcism method.
  alternative_readings:
  - Interpret the failure explicitly as inability to cast out a demon
  - Interpret the failure explicitly as due to unbelief
  rationale: This verse itself states only that the disciples were not able to heal
    him. Broader contextual explanations appear in surrounding verses, but should
    not be imported into the translation of this verse.
  doctrine_reference: Translation philosophy §1, §3
