id: MAT.17.25
reference: Matthew 17:25
source:
  edition: SBLGNT
  text: λέγει· Ναί. καὶ ⸀ἐλθόντα εἰς τὴν οἰκίαν προέφθασεν αὐτὸν ὁ Ἰησοῦς λέγων· Τί
    σοι δοκεῖ, Σίμων; οἱ βασιλεῖς τῆς γῆς ἀπὸ τίνων λαμβάνουσιν τέλη ἢ κῆνσον; ἀπὸ
    τῶν υἱῶν αὐτῶν ἢ ἀπὸ τῶν ἀλλοτρίων;
translation:
  text: He said, “Yes.” And when he came into the house, Jesus spoke to him first,
    saying, “What do you think, Simon? From whom do the kings of the earth collect
    duties or poll tax—from their own sons or from others?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “customs or tribute.” The Greek distinguishes τέλη (duties/customs) from
      κῆνσος (poll tax, tribute tax).
    reason: lexical_alternative
  - marker: b
    text: Or “from strangers.” The Greek ἀλλοτρίων refers to those who are not one's
      own family, that is, outsiders.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  - Indeed
  lexicon: BDAG
  rationale: Simple affirmative reply; 'Yes' is the most natural modern English equivalent.
- source_word: ἐλθόντα εἰς τὴν οἰκίαν
  chosen: when he came into the house
  alternatives:
  - when he entered the house
  - after he came into the house
  lexicon: BDAG
  rationale: The accusative participle refers to Peter as the understood object of
    προέφθασεν; an English temporal clause is the clearest way to render the participial
    construction.
- source_word: προέφθασεν αὐτὸν
  chosen: spoke to him first
  alternatives:
  - anticipated him
  - got ahead of him
  - addressed him before he could speak
  lexicon: BDAG
  rationale: The verb here idiomatically means Jesus took the initiative before Peter
    spoke. 'Spoke to him first' communicates the sense clearly in modern English without
    woodenly preserving a less transparent metaphor.
- source_word: Τί σοι δοκεῖ
  chosen: What do you think
  alternatives:
  - What do you suppose
  - What seems right to you
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the expression introducing a question
    for Simon's judgment.
- source_word: οἱ βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - earthly kings
  - the kings of the land
  lexicon: BDAG
  rationale: A straightforward rendering preserving the broader sense of γῆ here as
    'earth' rather than narrowing it to a specific land.
- source_word: τέλη
  chosen: duties
  alternatives:
  - customs
  - tolls
  lexicon: BDAG
  rationale: τέλη refers to indirect taxes, customs, or duties. 'Duties' distinguishes
    it from the following κῆνσον and fits modern English.
- source_word: κῆνσον
  chosen: poll tax
  alternatives:
  - tribute
  - census tax
  lexicon: BDAG
  rationale: κῆνσος denotes a head tax/tribute tax. 'Poll tax' best captures the specific
    type of levy and preserves the distinction from τέλη.
- source_word: υἱῶν αὐτῶν
  chosen: their own sons
  alternatives:
  - their sons
  - their children
  lexicon: BDAG
  rationale: υἱοί is specifically 'sons,' not the gender-neutral 'children.' 'Their
    own sons' makes explicit the possessive force and preserves the familial contrast
    in Jesus' analogy.
- source_word: ἀλλοτρίων
  chosen: others
  alternatives:
  - strangers
  - foreigners
  - those who are not their sons
  lexicon: BDAG
  rationale: The term means those belonging to another, i.e., non-family outsiders
    in this context. 'Others' is concise and natural, while the contrast with 'their
    own sons' makes the meaning clear.
