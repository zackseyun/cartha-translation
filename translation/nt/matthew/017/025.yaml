theological_decisions:
- issue: Potential theological inference from 'sons' in Jesus' analogy
  chosen_reading: Retain the literal familial language 'their own sons' without expanding
    its christological implication in the main text.
  alternative_readings:
  - their children
  - their subjects
  rationale: The immediate point is the exemption of a ruler's own family from taxation,
    which sets up the following verse's theological implication about the Son. Preserving
    'sons' maintains the narrative and theological tension without over-interpreting
    it here.
  doctrine_reference: Translation philosophy §§3-4
