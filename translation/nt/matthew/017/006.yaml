theological_decisions:
- issue: Nature of the disciples' response to the divine voice
  chosen_reading: The verse is rendered to show a physical act of prostration and
    intense fear, without specifying more than the text states about whether the fear
    is worship, terror, or reverent awe.
  alternative_readings:
  - The response could be interpreted primarily as reverential worship.
  - The response could be interpreted primarily as terror before divine manifestation.
  rationale: The Greek reports the disciples' bodily posture and fear but does not
    explicitly label the response theologically. The translation preserves that tension
    rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
