id: MAT.17.6
reference: Matthew 17:6
source:
  edition: SBLGNT
  text: καὶ ἀκούσαντες οἱ μαθηταὶ ἔπεσαν ἐπὶ πρόσωπον αὐτῶν καὶ ἐφοβήθησαν σφόδρα.
translation:
  text: And when the disciples heard it, they fell on their faces and were greatly
    afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having heard'; the Greek uses an aorist participle that can be rendered
      temporally ('when they heard') or more formally ('having heard').
    reason: lexical_alternative
  - marker: b
    text: Literally 'fell on their face'; in English with a plural subject, 'fell
      on their faces' is the natural idiom.
    reason: lexical_alternative
  - marker: c
    text: That is, they were intensely afraid; 'greatly' translates the adverb σφόδρα.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when ... heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle, nominative masculine plural, modifying 'the disciples.'
    In English, a temporal clause is more natural than a bare participle here. 'Heard
    it' supplies the implied object from context (the heavenly voice in the preceding
    verse) without over-paraphrasing.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard rendering of μαθηταί in the Gospels. It refers specifically
    to Jesus' disciples here, not generic students.
- source_word: ἔπεσαν
  chosen: they fell
  alternatives:
  - they dropped down
  - they threw themselves down
  lexicon: BDAG
  rationale: Simple aorist of πίπτω. 'Fell' preserves the straightforward narrative
    force without adding intensity not explicit in the verb itself.
- source_word: ἐπὶ πρόσωπον αὐτῶν
  chosen: on their faces
  alternatives:
  - upon their face
  - face down
  lexicon: BDAG
  rationale: Idiomatic expression for prostration. Although πρόσωπον is singular,
    English idiom with a plural subject is 'on their faces.' This preserves the sense
    of bodily posture and reverence/fear.
- source_word: ἐφοβήθησαν
  chosen: were afraid
  alternatives:
  - became afraid
  - feared
  lexicon: BDAG
  rationale: Aorist passive/deponent of φοβέομαι. 'Were afraid' is natural modern
    English and conveys the emotional response without archaic tone.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: Adverb intensifying their fear. 'Greatly' is concise, readable, and preserves
    the elevated narrative tone better than the more colloquial 'very much.'
