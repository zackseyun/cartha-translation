theological_decisions:
- issue: Narrative present verbs in Gospel storytelling
  chosen_reading: Retain the historical present in English ('Jesus takes ... and leads
    ... up')
  alternative_readings:
  - 'Shift to past tense: ''Jesus took ... and led ... up'''
  rationale: The Greek uses present-tense verbs παραλαμβάνει and ἀναφέρει for vivid
    narrative effect. English can preserve this naturally here without awkwardness,
    so the translation keeps the historical present rather than flattening it into
    simple past.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy)
