id: MAT.17.1
reference: Matthew 17:1
source:
  edition: SBLGNT
  text: Καὶ μεθ’ ἡμέρας ἓξ παραλαμβάνει ὁ Ἰησοῦς τὸν Πέτρον καὶ Ἰάκωβον καὶ Ἰωάννην
    τὸν ἀδελφὸν αὐτοῦ, καὶ ἀναφέρει αὐτοὺς εἰς ὄρος ὑψηλὸν κατ’ ἰδίαν.
translation:
  text: And after six days Jesus takes Peter, James, and John his brother, and leads
    them up onto a high mountain by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'six days later.'
    reason: lexical_alternative
  - marker: b
    text: Or 'takes along' for 'takes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'privately' for 'by themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἡμέρας ἓξ
  chosen: after six days
  alternatives:
  - six days later
  lexicon: BDAG
  rationale: The idiom μετά with the accusative expresses temporal succession, naturally
    rendered 'after six days.' 'Six days later' is possible in English, but 'after
    six days' stays closer to the Greek wording and preserves the narrative linkage.
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - takes with him
  lexicon: BDAG
  rationale: Present-tense historical narrative is commonly rendered in English with
    a simple present for vividness here. παραλαμβάνω means to take along/with oneself;
    'takes' is concise, natural, and sufficient since the following names make the
    accompaniment clear.
- source_word: Πέτρον καὶ Ἰάκωβον καὶ Ἰωάννην
  chosen: Peter, James, and John
  rationale: Standard English transliterations of the personal names, in keeping with
    the translation policy to transliterate names rather than translate them.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - the brother of James
  - John, his brother
  lexicon: BDAG
  rationale: In context the phrase most naturally identifies John as the brother of
    James. English 'his brother' preserves the Greek wording and ambiguity of the
    pronoun's immediate attachment while clearly functioning appositionally to John.
- source_word: ἀναφέρει
  chosen: leads ... up
  alternatives:
  - brings ... up
  - takes ... up
  lexicon: BDAG
  rationale: ἀναφέρω here has the sense of bringing or leading upward. 'Leads them
    up' fits the movement to the mountain and reads naturally in English. It also
    avoids repeating 'takes' too closely after παραλαμβάνει.
- source_word: εἰς ὄρος ὑψηλὸν
  chosen: onto a high mountain
  alternatives:
  - up to a high mountain
  - into a high mountain
  lexicon: BDAG
  rationale: εἰς with ὄρος in a motion context is best rendered with destination language.
    'Onto a high mountain' communicates ascent and destination idiomatically in English.
- source_word: κατ’ ἰδίαν
  chosen: by themselves
  alternatives:
  - privately
  - alone
  lexicon: BDAG
  rationale: The phrase means in private / by themselves. 'By themselves' makes explicit
    that Jesus and the three disciples are apart from others, which suits the narrative
    context better than the more abstract adverb 'privately'.
