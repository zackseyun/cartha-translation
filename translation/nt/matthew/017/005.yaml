theological_decisions:
- issue: Rendering the divine declaration about Jesus' identity
  chosen_reading: This is my beloved Son, with whom I am well pleased
  alternative_readings:
  - This is my Son, the Beloved, in whom I am well pleased
  rationale: The translation preserves the Father's direct identification of Jesus
    as Son without importing later doctrinal terminology not present in the text.
    It also retains the affection/election language of ἀγαπητός and εὐδόκησα in a
    form natural to English.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Force of ἀκούετε αὐτοῦ
  chosen_reading: listen to him
  alternative_readings:
  - hear him
  rationale: The imperative likely carries more than mere auditory perception; it
    calls for heed and obedience. 'Listen to him' preserves that force without expanding
    into an interpretive paraphrase such as 'obey him.'
  doctrine_reference: Translation philosophy §§1, 3, 6
