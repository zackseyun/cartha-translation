id: MAT.17.5
reference: Matthew 17:5
source:
  edition: SBLGNT
  text: ἔτι αὐτοῦ λαλοῦντος ἰδοὺ νεφέλη φωτεινὴ ἐπεσκίασεν αὐτούς, καὶ ἰδοὺ φωνὴ ἐκ
    τῆς νεφέλης λέγουσα· Οὗτός ἐστιν ὁ υἱός μου ὁ ἀγαπητός, ἐν ᾧ εὐδόκησα· ⸂ἀκούετε
    αὐτοῦ⸃.
translation:
  text: While he was still speaking, behold, a bright cloud overshadowed them, and
    behold, a voice from the cloud said, “This is my beloved Son, with whom I am well
    pleased; listen to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear him.' The Greek imperative can denote hearing with the sense of
      heeding.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'behold' renders Greek ἰδού, an attention-directing marker
      that heightens the dramatic scene.
    reason: lexical_alternative
  - marker: c
    text: '''Overshadowed'' may echo biblical theophany language associated with God''s
      manifest presence.'
    reason: cross_reference
lexical_decisions:
- source_word: ἔτι αὐτοῦ λαλοῦντος
  chosen: While he was still speaking
  alternatives:
  - While he was yet speaking
  - As he was still speaking
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. 'While he was still
    speaking' is natural modern English and preserves the interruption implied by
    ἔτι ('still').
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the vivid, attention-directing discourse
    marker used twice in the verse. Though somewhat elevated, it remains understandable
    and reflects the narrative force better than omitting it.
- source_word: νεφέλη φωτεινὴ
  chosen: a bright cloud
  alternatives:
  - a radiant cloud
  - a shining cloud
  lexicon: BDAG
  rationale: φωτεινή means 'bright/shining.' 'Bright cloud' is the most straightforward
    rendering and preserves the striking description without overinterpreting its
    theological symbolism.
- source_word: ἐπεσκίασεν
  chosen: overshadowed
  alternatives:
  - covered
  - cast its shadow over
  lexicon: BDAG
  rationale: '''Overshadowed'' is the standard and precise rendering for ἐπισκιάζω,
    preserving both the physical image and possible biblical-theophanic resonance
    without making that resonance explicit in the main text.'
- source_word: αὐτούς
  chosen: them
  alternatives:
  - them all
  lexicon: BDAG
  rationale: Simple object pronoun referring to those present. 'Them' is sufficient;
    'them all' would add emphasis not explicit in the Greek.
- source_word: φωνὴ ἐκ τῆς νεφέλης λέγουσα
  chosen: a voice from the cloud said
  alternatives:
  - a voice out of the cloud saying
  - a voice from the cloud, saying
  lexicon: BDAG
  rationale: English idiom prefers finite verb 'said' rather than the more wooden
    participial 'saying.' 'From the cloud' is the natural rendering of ἐκ τῆς νεφέλης.
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  lexicon: BDAG
  rationale: Direct demonstrative identification. 'This is' is idiomatic and fully
    accurate.
- source_word: ὁ υἱός μου ὁ ἀγαπητός
  chosen: my beloved Son
  alternatives:
  - my Son, the Beloved
  - my dearly loved Son
  lexicon: BDAG
  rationale: Combines the article-adjective construction into natural English while
    preserving both filial identity and affection/election. 'Beloved' is concise and
    traditional without being archaic.
- source_word: ἐν ᾧ εὐδόκησα
  chosen: with whom I am well pleased
  alternatives:
  - in whom I am well pleased
  - in whom I have delighted
  lexicon: BDAG
  rationale: Aorist εὐδόκησα is rendered with present English idiom in this divine
    declaration formula. 'With whom I am well pleased' is the most natural contemporary
    equivalent and matches the relational force of ἐν ᾧ here better than a strictly
    literal 'in whom.'
- source_word: ἀκούετε αὐτοῦ
  chosen: listen to him
  alternatives:
  - hear him
  - listen to him!
  lexicon: BDAG
  rationale: Present imperative calls for ongoing heed. In English, 'listen to him'
    better conveys responsive hearing/obedience than the potentially bare auditory
    'hear him.'
