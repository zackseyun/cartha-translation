id: MAT.2.5
reference: Matthew 2:5
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν αὐτῷ· Ἐν Βηθλέεμ τῆς Ἰουδαίας· οὕτως γὰρ γέγραπται διὰ τοῦ προφήτου·
translation:
  text: And they said to him, “In Bethlehem of Judea. For so it has been written through the prophet:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “it is written.” The Greek uses the perfect passive, a standard Scripture-citation formula.
    reason: lexical_alternative
  - marker: b
    text: Or 'Judea, for'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - Then they
  - So they
  - But they
  lexicon: BDAG
  rationale: The article functions substantivally, referring back to the chief priests and scribes in the previous verse. δέ is rendered with a mild connective, and 'And they' gives natural English continuity without overstating contrast.
- source_word: εἶπαν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: λέγω with indirect object αὐτῷ is straightforwardly 'say to him.' 'Told him' is possible but slightly more interpretive than the simple reporting verb.
- source_word: Ἐν Βηθλέεμ
  chosen: In Bethlehem
  alternatives:
  - At Bethlehem
  lexicon: BDAG
  rationale: ἐν with a place name is most naturally rendered 'in.' Bethlehem is transliterated as a proper name in keeping with the translation philosophy.
- source_word: τῆς Ἰουδαίας
  chosen: of Judea
  alternatives:
  - in Judea
  - of Judaea
  lexicon: BDAG
  rationale: The genitive specifies which Bethlehem is meant. 'Of Judea' closely reflects the Greek construction and preserves the identifying force. 'Judea' uses standard modern English spelling.
- source_word: οὕτως γὰρ
  chosen: for so
  alternatives:
  - for thus
  - because this is how
  lexicon: BDAG
  rationale: γάρ introduces the reason for the answer, and οὕτως points forward to the scriptural wording that follows in the next verse. 'For so' is concise and natural while preserving the forward-pointing sense.
- source_word: γέγραπται
  chosen: it has been written
  alternatives:
  - it is written
  lexicon: BDAG
  rationale: The perfect passive of γράφω is a standard scriptural citation formula. 'It has been written' preserves the Greek perfect more transparently than the idiomatic 'it is written,' though the latter remains a viable alternative.
- source_word: διὰ τοῦ προφήτου
  chosen: through the prophet
  alternatives:
  - by the prophet
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes agency or instrumentality. 'Through the prophet' preserves the sense that God is the ultimate source and the prophet the mediating human instrument, fitting biblical citation style.
