theological_decisions:
- issue: Prophetic mediation formula
  chosen_reading: through the prophet
  alternative_readings:
  - by the prophet
  rationale: The wording avoids flattening the biblical pattern of divine speech mediated through a human prophet. This is a translational nuance rather than a doctrinal expansion, and it aligns well with the Greek διά + genitive.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T02:15:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/002/005.json
  category: awkward_english
  tier: 1
  from: Judea, for
  to: Judea. For
  rationale: The Greek text uses a high dot (·) after 'Ἰουδαίας', which marks a stronger pause than an English comma. This punctuation separates the direct answer ('In Bethlehem of Judea') from the justification that follows ('for so it has been written...'). Using a comma in the English draft slightly runs these two distinct clauses together. A period would better reflect the logical structure of the original, presenting the answer and its basis as two separate but closely linked statements.
