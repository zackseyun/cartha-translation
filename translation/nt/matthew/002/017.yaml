theological_decisions:
- issue: Matthew's fulfillment formula
  chosen_reading: 'Retain explicit fulfillment language: ''was fulfilled'''
  alternative_readings:
  - happened to fulfill
  - fulfilled the words of
  rationale: Matthew intentionally frames the event as fulfillment of prophetic speech.
    The translation should preserve that theological-literary claim without softening
    or expanding it beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
revisions:
- timestamp: '2026-04-21T02:29:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/002/017.json
  category: awkward_english
  tier: 1
  from: 'was fulfilled, saying:'
  to: 'was fulfilled, which says:'
  rationale: The Greek participle λέγοντος ('saying') is in the genitive case, modifying
    'Jeremiah.' Its function is to introduce the content of 'what was spoken.' The
    current rendering, '...was fulfilled, saying:', creates a slightly awkward construction
    where the act of fulfillment seems to be doing the 'saying.' While this is a common
    translational convention, attributing the speech to the prophecy itself ('which
    says:') is more logical in English and avoids the awkwardness. This was noted
    as a lexical alternative by the drafter and would be a slight improvement.
