id: MAT.2.17
reference: Matthew 2:17
source:
  edition: SBLGNT
  text: τότε ἐπληρώθη τὸ ῥηθὲν ⸀διὰ Ἰερεμίου τοῦ προφήτου λέγοντος·
translation:
  text: 'Then what was spoken through Jeremiah the prophet was fulfilled, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was fulfilled, saying:'.
    reason: previous_rendering
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in Matthew's narrative; 'Then' is natural,
    concise English and preserves the narrative flow.
- source_word: ἐπληρώθη
  chosen: was fulfilled
  alternatives:
  - came to fulfillment
  - was brought to fulfillment
  lexicon: BDAG
  rationale: Aorist passive of πληρόω in Matthew's fulfillment formula is conventionally
    and accurately rendered 'was fulfilled.' This preserves Matthew's thematic use
    of fulfillment language without paraphrase.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - that which was spoken
  lexicon: BDAG
  rationale: Articular participle functioning substantivally; 'what was spoken' is
    idiomatic English that preserves the referential force of the Greek.
- source_word: διὰ Ἰερεμίου
  chosen: through Jeremiah
  alternatives:
  - by Jeremiah
  lexicon: BDAG
  rationale: διά with genitive commonly indicates agency or instrumentality. 'Through
    Jeremiah' is the standard and slightly more literal rendering in prophetic citation
    formulas, highlighting Jeremiah as the prophetic mediator of God's speech.
- source_word: τοῦ προφήτου
  chosen: the prophet
  lexicon: BDAG
  rationale: Appositional genitive identifying Jeremiah's role; straightforwardly
    rendered 'the prophet.'
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - which says
  lexicon: BDAG
  rationale: Present participle introducing the quotation that follows in the next
    verse. 'Saying' is the standard English connective in citation formulas and preserves
    the forward link.
