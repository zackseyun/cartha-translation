id: MAT.8.6
reference: Matthew 8:6
source:
  edition: SBLGNT
  text: καὶ λέγων· Κύριε, ὁ παῖς μου βέβληται ἐν τῇ οἰκίᾳ παραλυτικός, δεινῶς βασανιζόμενος.
translation:
  text: and saying, “Lord, my servant is lying at home paralyzed, suffering terribly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my boy' or 'my child'; the Greek word can refer to a servant or to a
      child, though 'servant' best fits the centurion context.
    reason: lexical_alternative
  - marker: b
    text: Or 'being severely tormented.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ λέγων
  chosen: and saying
  alternatives:
  - and said
  - saying
  lexicon: BDAG
  rationale: The present participle λέγων is rendered transparently as 'and saying'
    to reflect the Greek participial linkage. English may smooth this as 'and said,'
    but the more literal participial form is still natural enough here and preserves
    the narrative flow.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Following the doctrine default for κύριος, 'Lord' is used. In this address
    to Jesus, it can carry either respectful or more elevated force; 'Lord' preserves
    that ambiguity better than 'Sir' or 'Master'.
- source_word: ὁ παῖς μου
  chosen: my servant
  alternatives:
  - my boy
  - my child
  lexicon: BDAG
  rationale: παῖς can mean 'child,' 'boy,' or 'servant.' In the centurion context,
    'servant' best fits the social setting and aligns with the parallel in Luke 7,
    while preserving the possibility of personal affection through the possessive
    'my.' The lexical ambiguity is worth preserving in a footnote.
- source_word: βέβληται
  chosen: is lying
  alternatives:
  - has been laid
  - is bedridden
  - lies
  lexicon: BDAG
  rationale: The perfect passive of βάλλω literally suggests 'has been thrown/laid,'
    but idiomatically here it describes the servant's condition in bed at home. 'Is
    lying' communicates the resultant state in natural English without over-literal
    awkwardness.
- source_word: ἐν τῇ οἰκίᾳ
  chosen: at home
  alternatives:
  - in the house
  - in the home
  lexicon: BDAG
  rationale: '''At home'' is a natural English rendering of the locative phrase and
    fits the context smoothly. ''In the house'' is more formal-literal but less idiomatic
    here.'
- source_word: παραλυτικός
  chosen: paralyzed
  alternatives:
  - a paralytic
  - paralysed
  lexicon: BDAG
  rationale: The adjective is rendered predicatively as 'paralyzed' in contemporary
    English. 'A paralytic' is possible but sounds more nominal and less natural in
    this sentence.
- source_word: δεινῶς βασανιζόμενος
  chosen: suffering terribly
  alternatives:
  - being tormented severely
  - in terrible agony
  lexicon: BDAG
  rationale: βασανίζω can denote severe torment, pain, or distress. In this healing
    context, 'suffering terribly' communicates intense affliction in accessible modern
    English without importing more than the text states. The stronger 'tormented'
    is preserved in a footnote as a lexical alternative.
