- issue: Force of κύριε in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The address may be read as respectful address or as a title with deeper
    recognition. Rendering it 'Lord' follows the project's default for κύριος and
    preserves the theological openness of the scene without forcing either a merely
    polite or fully confessional reading.
