theological_decisions:
- issue: Meaning of the request to bury the father
  chosen_reading: Render the statement straightforwardly as a request for permission
    to leave and bury his father, without importing an interpretive conclusion about
    whether the father has already died or whether this refers to a delayed filial
    obligation.
  alternative_readings:
  - The father has just died and requires immediate burial.
  - The phrase idiomatically means remaining at home until the father eventually dies.
  rationale: The Greek itself states only the request 'permit me first to go away
    and bury my father.' Since the verse does not resolve the timing question, the
    translation preserves the wording without embedding either interpretation in the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
