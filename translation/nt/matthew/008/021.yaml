id: MAT.8.21
reference: Matthew 8:21
source:
  edition: SBLGNT
  text: ἕτερος δὲ τῶν ⸀μαθητῶν εἶπεν αὐτῷ· Κύριε, ἐπίτρεψόν μοι πρῶτον ἀπελθεῖν καὶ
    θάψαι τὸν πατέρα μου.
translation:
  text: Then another of the disciples said to him, “Lord, permit me first to go away
    and bury my father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'allow me' or 'let me.'
    reason: lexical_alternative
  - marker: b
    text: The request may refer either to an immediate burial or more broadly to fulfilling
      filial duty until his father dies; the Greek does not specify.
    reason: cultural_note
lexical_decisions:
- source_word: ἕτερος
  chosen: another
  alternatives:
  - one other
  - a different one
  lexicon: BDAG
  rationale: ἕτερος marks an additional individual distinct from the previous speaker;
    'another' is natural English and preserves the contrast without overtranslating.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then'
    gives readable narrative flow in English better than a bare 'and' while not implying
    strong contrast.
- source_word: τῶν μαθητῶν
  chosen: of the disciples
  alternatives:
  - among the disciples
  lexicon: BDAG
  rationale: The genitive construction identifies the speaker as belonging to the
    group of disciples. 'Of the disciples' is a straightforward rendering.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the standard rendering. In
    direct address to Jesus it preserves both respect and possible theological weight
    without flattening to merely pedagogical 'Master'.
- source_word: ἐπίτρεψόν μοι
  chosen: permit me
  alternatives:
  - allow me
  - let me
  lexicon: BDAG
  rationale: The aorist imperative ζη? Actually ἐπίτρεψον is a request for permission.
    'Permit me' preserves the formal, respectful tone of the address; 'let me' is
    possible but slightly more colloquial.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - before that
  - first of all
  lexicon: BDAG
  rationale: πρῶτον indicates priority in sequence. 'First' is concise and exact.
- source_word: ἀπελθεῖν
  chosen: to go away
  alternatives:
  - to go
  - to depart
  lexicon: BDAG
  rationale: ἀπέρχομαι includes the sense of going away from the present location.
    'To go away' preserves that nuance more clearly than simply 'to go'.
- source_word: θάψαι
  chosen: bury
  alternatives:
  - perform burial for
  lexicon: BDAG
  rationale: The infinitive means to bury. The simple English verb is sufficient and
    idiomatic.
- source_word: τὸν πατέρα μου
  chosen: my father
  lexicon: BDAG
  rationale: Direct and literal rendering of the object phrase.
