theological_decisions:
- issue: Rendering the demons' recognition of Jesus' identity
  chosen_reading: Son of God
  rationale: The text explicitly presents the demons addressing Jesus with a high
    christological title. The translation preserves the direct force of the confession
    without weakening or expanding it.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §2'
- issue: Eschatological nuance of καιρός
  chosen_reading: before the appointed time
  alternative_readings:
  - before the time
  rationale: The demons' question implies awareness of a divinely set time for judgment.
    'Appointed time' preserves that theological tension and eschatological nuance
    without importing a more detailed doctrinal scheme than the text states.
  doctrine_reference: Translation philosophy §3
