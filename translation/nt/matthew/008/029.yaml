id: MAT.8.29
reference: Matthew 8:29
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἔκραξαν λέγοντες· Τί ἡμῖν καὶ ⸀σοί, υἱὲ τοῦ θεοῦ; ἦλθες ὧδε πρὸ καιροῦ
    βασανίσαι ἡμᾶς;
translation:
  text: And behold, they cried out, saying, “What do you want with us, Son of God?
    Have you come here before the appointed time to torment us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What have we to do with each other?”
    reason: lexical_alternative
  - marker: b
    text: Or “before the time.” The Greek can refer to a divinely appointed time.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - And see
  lexicon: BDAG
  rationale: Retains the discourse marker and vivid attention-getting force of ἰδού.
    'Behold' is slightly traditional but still understandable and preserves the suddenness
    better than omitting it.
- source_word: ἔκραξαν λέγοντες
  chosen: they cried out, saying
  alternatives:
  - they shouted, saying
  - they cried out
  lexicon: BDAG
  rationale: κράζω conveys a loud cry; 'cried out' fits the intensity. λέγοντες is
    retained with 'saying' to reflect the participial construction without awkwardness.
- source_word: Τί ἡμῖν καὶ σοί
  chosen: What do you want with us
  alternatives:
  - What have you to do with us
  - What is there between us and you
  lexicon: BDAG
  rationale: This Semitic/Greek idiom expresses dissociation or challenge. 'What do
    you want with us' communicates the idiomatic force in natural modern English better
    than a wooden rendering, while preserving the confrontational sense.
- source_word: υἱὲ τοῦ θεοῦ
  chosen: Son of God
  lexicon: BDAG
  rationale: A direct christological title. It should be translated straightforwardly
    and capitalized as a title addressed to Jesus.
- source_word: ἦλθες ὧδε
  chosen: Have you come here
  alternatives:
  - Did you come here
  lexicon: BDAG
  rationale: English present perfect can naturally render the aorist in a question
    focused on present arrival and purpose. ὧδε is specifically locative, hence 'here.'
- source_word: πρὸ καιροῦ
  chosen: before the appointed time
  alternatives:
  - before the time
  - too early
  lexicon: BDAG
  rationale: καιρός often denotes an appointed or fitting time, not merely time in
    general. 'Appointed time' preserves the eschatological nuance implied by the demons'
    question.
- source_word: βασανίσαι
  chosen: to torment
  alternatives:
  - to torture
  - to afflict
  lexicon: BDAG
  rationale: βασανίζω in this context refers to severe torment associated with judgment.
    'Torment' is the most idiomatic and contextually fitting English choice without
    over-specifying physical torture.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Straightforward accusative object referring to the demons speaking through
    the possessed men.
