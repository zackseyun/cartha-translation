id: MAT.8.18
reference: Matthew 8:18
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ ὁ Ἰησοῦς ⸂πολλοὺς ὄχλους⸃ περὶ αὐτὸν ἐκέλευσεν ἀπελθεῖν εἰς τὸ πέραν.
translation:
  text: Now when Jesus saw many crowds around him, he gave orders to go to the other
    side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great crowds.' The Greek more literally has the plural, 'many crowds,'
      suggesting multiple groups around him.
    reason: lexical_alternative
  - marker: b
    text: That is, to the other side of the lake.
    reason: cultural_note
lexical_decisions:
- source_word: Ἰδὼν
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning temporally with the main verb.
    'When ... saw' gives natural English while preserving the participial relationship
    better than a bare coordinate 'and saw.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative progression rather than
    strong contrast. 'Now' reflects the discourse shift in readable English; omission
    was possible but the connective is retained.
- source_word: πολλοὺς ὄχλους
  chosen: many crowds
  alternatives:
  - great crowds
  - large crowds
  - many people
  lexicon: BDAG
  rationale: The Greek is literally plural, 'many crowds,' not singular 'a great crowd.'
    Retaining the plural preserves the sense of multiple groups gathering around Jesus.
    'Many people' is smoother but less formally tied to ὄχλους.
- source_word: περὶ αὐτόν
  chosen: around him
  alternatives:
  - about him
  - surrounding him
  - around himself
  lexicon: BDAG
  rationale: 'περί with accusative here is spatial: ''around him.'' This is the plain
    contextual sense.'
- source_word: ἐκέλευσεν
  chosen: he gave orders
  alternatives:
  - he commanded
  - he ordered
  lexicon: BDAG
  rationale: κελεύω denotes giving an order or command. 'He gave orders' is idiomatic
    English and leaves the implied object open, matching the Greek's lack of an explicit
    direct object.
- source_word: ἀπελθεῖν
  chosen: to go
  alternatives:
  - to depart
  - to leave
  lexicon: BDAG
  rationale: Aorist infinitive complement to ἐκέλευσεν. 'To go' is the most natural
    rendering in context, especially with the following destination phrase.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: This idiom commonly refers to crossing to the other side of the lake/sea
    in the Synoptic context. 'To the other side' is the standard and contextually
    precise English rendering.
