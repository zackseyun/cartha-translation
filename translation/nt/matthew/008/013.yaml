id: MAT.8.13
reference: Matthew 8:13
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ Ἰησοῦς τῷ ἑκατοντάρχῃ· Ὕπαγε, ⸀ὡς ἐπίστευσας γενηθήτω σοι· καὶ
    ἰάθη ὁ ⸀παῖς ἐν τῇ ὥρᾳ ἐκείνῃ.
translation:
  text: And Jesus said to the centurion, “Go; as you have believed, let it be done
    for you.” And the servant was healed in that hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the boy” or “the child”; Greek παῖς can refer to a servant or to a young
      person. In this context, “servant” best fits the centurion’s subordinate.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχῃ
  chosen: centurion
  alternatives:
  - army officer
  lexicon: BDAG
  rationale: Standard rendering for a Roman military officer commanding roughly one
    hundred soldiers; 'centurion' is precise and familiar in Gospel contexts.
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Go your way
  - Depart
  lexicon: BDAG
  rationale: Imperative of departure. 'Go' is the clearest modern English equivalent
    without adding idiomatic material not explicit in the Greek.
- source_word: ὡς ἐπίστευσας
  chosen: as you have believed
  alternatives:
  - as you believed
  - according to your faith
  lexicon: BDAG
  rationale: The aorist verb directly states the centurion's act of believing. 'As
    you have believed' preserves the personal verbal force better than the more interpretive
    noun phrase 'according to your faith.'
- source_word: γενηθήτω σοι
  chosen: let it be done for you
  alternatives:
  - let it happen for you
  - may it be done for you
  lexicon: BDAG
  rationale: Aorist passive imperative of γίνομαι used jussively. 'Let it be done
    for you' preserves the volitional force and natural English cadence.
- source_word: παῖς
  chosen: servant
  alternatives:
  - boy
  - child
  lexicon: BDAG
  rationale: In this context, linked with the centurion's subordinate and parallel
    to δοῦλος in the immediate passage context, 'servant' best fits the referent.
    Because παῖς can also mean 'boy' or 'child,' that alternative is preserved in
    a footnote.
- source_word: ἰάθη
  chosen: was healed
  alternatives:
  - was cured
  lexicon: BDAG
  rationale: Passive of ἰάομαι denotes healing/restoration. 'Was healed' is the standard
    and theologically transparent rendering.
- source_word: ἐν τῇ ὥρᾳ ἐκείνῃ
  chosen: in that hour
  alternatives:
  - at that very moment
  - at that time
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the temporal expression without
    over-interpreting it as an exact instant, though the context implies immediacy.
