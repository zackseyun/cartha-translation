theological_decisions:
- issue: Rendering of πιστεύω/πίστις language
  chosen_reading: believed
  alternative_readings:
  - trusted
  - had faith
  rationale: The verb πιστεύω is rendered with the standard English 'believed,' consistent
    with the doctrine's default preference for 'faith' language while avoiding unnecessary
    paraphrase. This verse does not present the contested ambiguity that would require
    a main-text/footnote tension beyond lexical alternatives.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternatives
    trust/faithfulness)'
