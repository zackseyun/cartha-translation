theological_decisions:
- issue: Meaning of προσκυνέω toward Jesus
  chosen_reading: Rendered as reverential bodily action ('bowed down before him')
    rather than the more interpretively loaded 'worshiped him.'
  alternative_readings:
  - worshiped him
  - knelt before him
  - paid homage to him
  rationale: The term can range from prostration/homage to worship. Given the narrative
    context, the act is clearly reverential, but translating 'worshiped' in the main
    text could prematurely resolve the semantic range. The chosen rendering preserves
    theological openness while remaining faithful to the scene and consistent with
    the instruction to preserve tension rather than over-resolve ambiguity.
  doctrine_reference: Translation philosophy §3; Contested terms table for κύριος
    supports 'Lord' but προσκυνέω itself is not fixed there.
