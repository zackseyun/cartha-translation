id: MAT.8.2
reference: Matthew 8:2
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ λεπρὸς ⸀προσελθὼν προσεκύνει αὐτῷ λέγων· Κύριε, ἐὰν θέλῃς δύνασαί
    με καθαρίσαι.
translation:
  text: And behold, a man with leprosy came and bowed down before him, saying, “Lord,
    if you are willing, you are able to cleanse me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "worshiped him"; the Greek verb can denote bowing in reverence, paying
      homage, or worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse particle's attention-directing force. Though somewhat
    marked in modern English, it remains readable and preserves the narrative vividness
    better than omitting it.
- source_word: λεπρὸς
  chosen: a man with leprosy
  alternatives:
  - a leper
  - a leprous man
  lexicon: BDAG
  rationale: The adjective used substantivally refers to a person afflicted with a
    skin disease traditionally rendered 'leprosy.' 'A man with leprosy' is natural
    modern English and avoids reducing the person to the condition, while preserving
    the conventional disease term.
- source_word: προσελθὼν
  chosen: came
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The participle indicates approach toward Jesus. 'Came' is concise and
    idiomatic in English narrative; 'approached' is possible but slightly stiffer.
- source_word: προσεκύνει
  chosen: bowed down before
  alternatives:
  - worshiped
  - knelt before
  - paid homage to
  lexicon: BDAG
  rationale: προσκυνέω can denote worship or an act of reverence/prostration. Here
    the immediate scene clearly depicts reverential bodily action, but the full theological
    sense need not be over-resolved in the main text. 'Bowed down before' preserves
    the physical act while allowing readers to perceive the reverential dimension.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this Gospel context
    the address to Jesus carries at least respectful authority and may also bear christological
    weight; 'Lord' preserves that range better than 'Sir'.
- source_word: ἐὰν θέλῃς
  chosen: if you are willing
  alternatives:
  - if you will
  - if you want to
  lexicon: BDAG
  rationale: '''If you are willing'' expresses volition in natural contemporary English
    without archaic tone. It preserves the conditional appeal to Jesus'' will.'
- source_word: δύνασαί
  chosen: you are able
  alternatives:
  - you can
  lexicon: BDAG
  rationale: The verb denotes ability/power. 'You are able' slightly better preserves
    the explicit sense of capability than the more colloquial 'you can,' and fits
    the solemn tone of the request.
- source_word: καθαρίσαι
  chosen: to cleanse me
  alternatives:
  - to make me clean
  - to heal me
  lexicon: BDAG
  rationale: καθαρίζω in this context includes ritual and physical cleansing associated
    with leprosy, not merely generic healing. 'Cleanse me' preserves the biblical
    and cultic resonance better than 'heal me.'
