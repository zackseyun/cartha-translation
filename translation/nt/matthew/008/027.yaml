id: MAT.8.27
reference: Matthew 8:27
source:
  edition: SBLGNT
  text: οἱ δὲ ἄνθρωποι ἐθαύμασαν λέγοντες· Ποταπός ἐστιν οὗτος ὅτι καὶ οἱ ἄνεμοι καὶ
    ἡ θάλασσα ⸂αὐτῷ ὑπακούουσιν⸃;
translation:
  text: And the men marveled, saying, “What sort of man is this, that even the winds
    and the sea obey him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What kind of man is this?' The Greek expression asks what sort or quality
      of person he is.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄνθρωποι
  chosen: the men
  alternatives:
  - the people
  - the men there
  lexicon: BDAG
  rationale: ἄνθρωποι is grammatically masculine plural and here refers to the male
    disciples in the boat, not humanity in general. 'The men' is gender-accurate and
    contextually specific, in keeping with the translation philosophy.
- source_word: ἐθαύμασαν
  chosen: marveled
  alternatives:
  - were amazed
  - wondered
  lexicon: BDAG
  rationale: The aorist indicates a simple past reaction of astonishment. 'Marveled'
    preserves the sense of wonder with a slightly elevated but still readable register
    appropriate to the narrative.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle is naturally rendered as 'saying' in English narrative,
    preserving the participial linkage to their marveling.
- source_word: Ποταπός
  chosen: What sort of
  alternatives:
  - What kind of
  - What manner of
  lexicon: BDAG
  rationale: ποταπός asks about quality or kind. 'What sort of' is idiomatic modern
    English that preserves the force of astonished inquiry without sounding archaic
    like 'what manner of.'
- source_word: οὗτος
  chosen: this
  alternatives:
  - this man
  lexicon: BDAG
  rationale: οὗτος is deictic, 'this one/this man.' In English, 'this' within 'What
    sort of man is this' captures the immediacy of the disciples' question.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content or grounds of the astonished question.
    ''That'' fits the idiom: ''What sort of man is this, that even…'' while preserving
    the explanatory nuance.'
- source_word: καὶ οἱ ἄνεμοι καὶ ἡ θάλασσα
  chosen: even the winds and the sea
  alternatives:
  - both the winds and the sea
  - the winds and the sea also
  lexicon: BDAG
  rationale: The repeated καί with natural forces heightens the scope of Jesus' authority.
    Rendering the first καί as 'even' brings out the emphatic sense in idiomatic English.
- source_word: αὐτῷ ὑπακούουσιν
  chosen: obey him
  alternatives:
  - listen to him
  - submit to him
  lexicon: BDAG
  rationale: ὑπακούω means 'obey' or 'heed.' 'Obey him' best conveys personal authority
    being exercised over the winds and sea, which is central to the verse's force.
