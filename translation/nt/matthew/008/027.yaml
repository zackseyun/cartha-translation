theological_decisions:
- issue: Christological force of the disciples' question
  chosen_reading: Render the question straightforwardly without adding interpretive
    expansion, while preserving the implication that Jesus exercises authority over
    creation.
  alternative_readings:
  - Make the implication explicit by adding wording such as 'What sort of man can
    this be'
  - Flatten the force into mere amazement at a miracle
  rationale: The verse contributes to Matthew's presentation of Jesus' extraordinary
    authority, but the translation should not import a doctrinal conclusion beyond
    the text. 'What sort of man is this, that even the winds and the sea obey him?'
    preserves the theological tension and the narrative's implicit christological
    weight.
  doctrine_reference: Preserve theological tension rather than resolve it.
