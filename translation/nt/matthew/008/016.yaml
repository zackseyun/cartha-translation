id: MAT.8.16
reference: Matthew 8:16
source:
  edition: SBLGNT
  text: Ὀψίας δὲ γενομένης προσήνεγκαν αὐτῷ δαιμονιζομένους πολλούς· καὶ ἐξέβαλεν
    τὰ πνεύματα λόγῳ, καὶ πάντας τοὺς κακῶς ἔχοντας ἐθεράπευσεν·
translation:
  text: When evening came, they brought to him many who were demon-possessed; and
    he cast out the spirits with a word, and healed all who were sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many afflicted by demons.' The Greek participle refers to people under
      demonic influence; 'demon-possessed' is the conventional concise rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  chosen: When evening came
  alternatives:
  - When it became evening
  - That evening
  lexicon: BDAG
  rationale: Genitive absolute marking time; 'When evening came' is natural modern
    English while preserving the temporal sense.
- source_word: προσήνεγκαν αὐτῷ
  chosen: they brought to him
  alternatives:
  - they brought before him
  - they presented to him
  lexicon: BDAG
  rationale: Aorist active of προσφέρω here means bringing people to Jesus; 'brought
    to him' is idiomatic and sufficiently literal.
- source_word: δαιμονιζομένους πολλούς
  chosen: many who were demon-possessed
  alternatives:
  - many demoniacs
  - many who had demons
  lexicon: BDAG
  rationale: The participle denotes persons under demonic influence/oppression. 'Demon-possessed'
    is the most established and concise English rendering, though not woodenly literal;
    it communicates the condition clearly.
- source_word: ἐξέβαλεν τὰ πνεύματα
  chosen: he cast out the spirits
  alternatives:
  - he drove out the spirits
  - he expelled the spirits
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'cast out' in exorcism contexts. Retaining 'spirits'
    reflects the Greek object directly and avoids over-interpretation, though the
    context makes them evil spirits.
- source_word: λόγῳ
  chosen: with a word
  alternatives:
  - by a word
  - with his word
  lexicon: BDAG
  rationale: Instrumental dative. 'With a word' is idiomatic and preserves the emphasis
    on the effortless authority of Jesus' command without adding 'his,' which is implied
    but not explicit.
- source_word: πάντας τοὺς κακῶς ἔχοντας
  chosen: all who were sick
  alternatives:
  - all who were ill
  - all who were suffering
  lexicon: BDAG
  rationale: The idiom κακῶς ἔχειν means to be sick or ill. 'All who were sick' is
    clear, natural, and fits the healing context.
- source_word: ἐθεράπευσεν
  chosen: healed
  alternatives:
  - cured
  - restored to health
  lexicon: BDAG
  rationale: θεραπεύω in Gospel healing narratives is standardly 'heal.' 'Cured' can
    sound reductionistic; 'healed' preserves both physical and narrative resonance.
