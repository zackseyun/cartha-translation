theological_decisions:
- issue: Nature of δαιμονιζομένους and τὰ πνεύματα
  chosen_reading: 'Render as real demonic affliction: ''demon-possessed'' and ''the
    spirits'''
  alternative_readings:
  - many who were mentally ill
  - many afflicted by demons
  rationale: The verse distinguishes exorcism ('cast out the spirits') from healing
    the sick, so the translation should preserve the text's own categories rather
    than psychologize them. 'Demon-possessed' is used as the conventional English
    rendering, while the direct object 'spirits' is kept literal.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Implication of λόγῳ
  chosen_reading: Translate instrumentally as 'with a word'
  alternative_readings:
  - with his word
  - by speaking
  rationale: The phrase highlights Jesus' authoritative command without requiring
    expansion. This preserves the narrative force without importing later doctrinal
    formulation beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
