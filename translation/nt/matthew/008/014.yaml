id: MAT.8.14
reference: Matthew 8:14
source:
  edition: SBLGNT
  text: Καὶ ἐλθὼν ὁ Ἰησοῦς εἰς τὴν οἰκίαν Πέτρου εἶδεν τὴν πενθερὰν αὐτοῦ βεβλημένην καὶ πυρέσσουσαν·
translation:
  text: And when Jesus came into Peter’s house, he saw his mother-in-law lying down and having a fever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lying sick in bed.' The Greek says literally that she was 'laid/lying' and feverish; 'in bed' is implied by context but not explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'and suffering with a fever'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλθὼν
  chosen: when Jesus came
  alternatives:
  - having come
  - after Jesus came
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/temporal sequence. 'When Jesus came' gives natural English while preserving the temporal force without awkwardness.
- source_word: οἰκίαν Πέτρου
  chosen: Peter’s house
  alternatives:
  - the house of Peter
  - Peter’s home
  lexicon: BDAG
  rationale: Genitive possession is straightforward. 'House' is slightly more formal and closer to οἰκία, while still natural English.
- source_word: πενθερὰν αὐτοῦ
  chosen: his mother-in-law
  alternatives:
  - his wife’s mother
  lexicon: BDAG
  rationale: πενθερά specifically means 'mother-in-law.' The pronoun refers to Peter in context, not Jesus. The idiomatic English kinship term is best.
- source_word: βεβλημένην
  chosen: lying down
  alternatives:
  - laid out
  - cast down
  - lying sick in bed
  lexicon: BDAG
  rationale: Perfect passive participle of βάλλω used idiomatically for being laid or lying down, especially in illness contexts. 'Lying down' captures the state without importing more than the Greek states. 'In bed' is contextually plausible but not explicit in Matthew's wording.
- source_word: πυρέσσουσαν
  chosen: suffering with a fever
  alternatives:
  - feverish
  - having a fever
  - burning with fever
  lexicon: BDAG
  rationale: Present participle denotes her ongoing condition. 'Suffering with a fever' is clear modern English and conveys the active affliction. 'Having a fever' is possible but slightly flatter; 'burning with fever' is more vivid than the Greek requires.
