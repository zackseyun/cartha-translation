theological_decisions:
- issue: Referent of αὐτοῦ in 'his mother-in-law'
  chosen_reading: The pronoun refers to Peter, so the woman is Peter’s mother-in-law.
  alternative_readings:
  - The pronoun could be misconstrued in English as referring to Jesus if the sentence is not carefully phrased.
  rationale: Syntactically and contextually, the house is Peter’s and the mother-in-law is Peter’s. The translation preserves this clearly. This also reflects the narrative detail without drawing further doctrinal conclusions beyond the text.
revisions:
- timestamp: '2026-04-21T03:33:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/008/014.json
  category: awkward_english
  tier: 1
  from: and suffering with a fever
  to: and having a fever
  rationale: The phrase 'suffering with a fever' is slightly verbose and interpretive. The Greek participle 'πυρέσσουσαν' means 'having a fever' or 'being feverish.' While suffering is certainly implied by the illness, explicitly adding the word 'suffering' is an interpretive step that makes the English less direct. A more concise rendering like 'and having a fever' is closer to the source's straightforward description and creates a more parallel structure with the preceding participle 'lying down'.
