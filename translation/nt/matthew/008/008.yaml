id: MAT.8.8
reference: Matthew 8:8
source:
  edition: SBLGNT
  text: ⸂καὶ ἀποκριθεὶς⸃ ὁ ἑκατόνταρχος ἔφη· Κύριε, οὐκ εἰμὶ ἱκανὸς ἵνα μου ὑπὸ τὴν
    στέγην εἰσέλθῃς· ἀλλὰ μόνον εἰπὲ λόγῳ, καὶ ἰαθήσεται ὁ παῖς μου·
translation:
  text: And the centurion answered, “Lord, I am not worthy that you should come under
    my roof. But only speak a word, and my servant will be healed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “say the word.” The Greek literally reads “speak a word.”
    reason: lexical_alternative
  - marker: b
    text: Or “boy” or “child” for “servant”; the Greek word can refer to a child,
      youth, or servant depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative. 'Answered' is natural English and preserves
    the responsive force without overtranslating the participial construction.
- source_word: ἑκατόνταρχος
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: Standard and precise rendering for a commander of roughly one hundred
    soldiers; 'centurion' is established, accurate, and readily understood.
- source_word: ἔφη
  chosen: answered
  alternatives:
  - said
  lexicon: BDAG
  rationale: Although ἔφη by itself means 'said,' in combination with ἀποκριθεὶς the
    clause is best represented by a single English speech introduction. Rendering
    the whole as 'answered' avoids awkward redundancy such as 'answered and said'
    while preserving the sense.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this context it is a respectful
    address to Jesus and may carry more than mere politeness, so 'Lord' best preserves
    both the lexical value and possible theological weight.
- source_word: ἱκανὸς
  chosen: worthy
  alternatives:
  - fit
  - qualified
  - adequate
  lexicon: BDAG
  rationale: In this idiom the sense is moral or social worthiness rather than mere
    ability. 'Worthy' matches the context of humility before Jesus.
- source_word: ἵνα μου ὑπὸ τὴν στέγην εἰσέλθῃς
  chosen: that you should come under my roof
  alternatives:
  - to have you enter under my roof
  - that you should enter my house
  lexicon: BDAG
  rationale: This preserves the Greek idiom fairly closely while remaining natural
    English. 'Under my roof' retains the vivid household image rather than flattening
    it to simply 'into my house.'
- source_word: μόνον
  chosen: only
  alternatives:
  - just
  - simply
  lexicon: BDAG
  rationale: '''Only'' preserves the restrictive force with suitable dignity in context.'
- source_word: εἰπὲ λόγῳ
  chosen: speak a word
  alternatives:
  - say the word
  - speak by a word
  lexicon: BDAG
  rationale: The dative λόγῳ is instrumental or means-related. 'Speak a word' is a
    transparent rendering of the Greek. 'Say the word' is idiomatic English and worth
    preserving in a footnote, but 'speak a word' stays slightly closer to the source.
- source_word: ἰαθήσεται
  chosen: will be healed
  alternatives:
  - will be cured
  - will be made well
  lexicon: BDAG
  rationale: Future passive of ἰάομαι naturally denotes healing. 'Will be healed'
    is the clearest and most standard rendering in a miracle context.
- source_word: παῖς
  chosen: servant
  alternatives:
  - boy
  - child
  lexicon: BDAG
  rationale: παῖς can mean 'child,' 'boy,' or 'servant' depending on context. In this
    narrative, comparison with the parallel in Luke 7 and the centurion's social setting
    favors 'servant' here. Because the term retains some ambiguity, alternatives are
    preserved in a footnote.
