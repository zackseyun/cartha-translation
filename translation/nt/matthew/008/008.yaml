theological_decisions:
- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - sir
  - master
  rationale: The doctrine file specifies 'Lord' as the default rendering for κύριος.
    In a Gospel context addressing Jesus, this also preserves possible christological
    resonance without forcing a stronger doctrinal claim than the text itself makes.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sense of παῖς
  chosen_reading: servant
  alternative_readings:
  - boy
  - child
  rationale: The term is lexically broad. 'Servant' best fits the immediate social
    context and common understanding of the centurion narrative, but the ambiguity
    should be preserved in a footnote rather than erased.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological/interpretive
    tension where genuine ambiguity exists
