id: MAT.8.15
reference: Matthew 8:15
source:
  edition: SBLGNT
  text: καὶ ἥψατο τῆς χειρὸς αὐτῆς, καὶ ἀφῆκεν αὐτὴν ὁ πυρετός, καὶ ἠγέρθη καὶ διηκόνει
    αὐτῷ.
translation:
  text: And he touched her hand, and the fever left her, and she got up and began
    serving him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'served him.' The Greek imperfect may simply describe ongoing action,
      though it can also suggest that she began to serve him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - took hold of
  lexicon: BDAG
  rationale: Middle of ἅπτω in this context means to touch or make contact with. 'Touched'
    is the plain and natural English equivalent and fits the healing context without
    overstating the action.
- source_word: τῆς χειρὸς αὐτῆς
  chosen: her hand
  alternatives:
  - the hand of her
  - her arm
  lexicon: BDAG
  rationale: χείρ normally means 'hand.' The genitive after ἅπτομαι is idiomatic in
    Greek; English expresses it naturally as the direct object 'her hand.'
- source_word: ἀφῆκεν αὐτὴν ὁ πυρετός
  chosen: the fever left her
  alternatives:
  - the fever departed from her
  - the fever released her
  lexicon: BDAG
  rationale: ἀφίημι here means 'leave' or 'depart from.' 'The fever left her' is idiomatic
    modern English and preserves the personified construction of the Greek.
- source_word: πυρετός
  chosen: fever
  alternatives:
  - feverish illness
  lexicon: BDAG
  rationale: The noun directly denotes fever. No expansion is warranted beyond the
    source text.
- source_word: ἠγέρθη
  chosen: she got up
  alternatives:
  - she arose
  - she was raised up
  lexicon: BDAG
  rationale: The passive form of ἐγείρω can function intransitively here, describing
    her rising after healing. 'She got up' is clear modern English; 'was raised up'
    would sound overly theological in this immediate narrative context.
- source_word: διηκόνει αὐτῷ
  chosen: began serving him
  alternatives:
  - served him
  - waited on him
  - ministered to him
  lexicon: BDAG
  rationale: διακονέω means to serve or wait on. In this domestic healing scene, 'serving
    him' best fits the context. 'Began serving' brings out the imperfect's inceptive/progressive
    force better than a simple English past without becoming cumbersome.
