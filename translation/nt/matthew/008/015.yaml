theological_decisions:
- issue: Potential theological overreading of ἠγέρθη ('was raised')
  chosen_reading: Render as 'she got up' in ordinary narrative sense
  alternative_readings:
  - she arose
  - she was raised up
  rationale: Although ἐγείρω can carry resurrection associations in other contexts,
    here the immediate sense is simply that she rose after being healed. The translation
    should not import resurrection theology where the narrative does not require it.
  doctrine_reference: Translation philosophy §1, §3, §6
