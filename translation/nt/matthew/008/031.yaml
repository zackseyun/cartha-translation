theological_decisions:
- issue: Rendering of evil spirits
  chosen_reading: demons
  alternative_readings:
  - demon spirits
  rationale: The verse presents personal evil beings addressing Jesus. 'Demons' preserves
    the text's supernatural claim without importing extra doctrinal explanation or
    softening the ontology.
