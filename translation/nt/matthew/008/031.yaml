id: MAT.8.31
reference: Matthew 8:31
source:
  edition: SBLGNT
  text: οἱ δὲ δαίμονες παρεκάλουν αὐτὸν λέγοντες· Εἰ ἐκβάλλεις ἡμᾶς, ⸂ἀπόστειλον ἡμᾶς⸃
    εἰς τὴν ἀγέλην τῶν χοίρων.
translation:
  text: And the demons kept begging him, saying, “If you cast us out, send us into
    the herd of pigs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “begged him” or “were pleading with him”; the Greek verb is imperfect,
      suggesting repeated or continued action.
    reason: lexical_alternative
  - marker: b
    text: Or “swine.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δαίμονες
  chosen: demons
  alternatives:
  - demon spirits
  lexicon: BDAG
  rationale: Standard and natural rendering for δαίμων/δαιμόνιον in this context;
    'demons' is clear modern English and preserves the personal evil-spirit sense
    without paraphrase.
- source_word: παρεκάλουν
  chosen: kept begging
  alternatives:
  - begged
  - implored
  - were pleading with
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action; 'kept begging'
    captures the durative force better than simple 'begged' while remaining idiomatic.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: A participle introducing direct speech is naturally rendered 'saying'
    in English and preserves the Greek structure without awkwardness.
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The conditional particle introduces a real condition from the speakers'
    perspective; 'If' is the straightforward rendering and avoids over-interpreting
    the nuance.
- source_word: ἐκβάλλεις
  chosen: you cast ... out
  alternatives:
  - you drive ... out
  - you expel
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'cast out' in exorcism contexts; this is also
    the established and semantically precise English equivalent here.
- source_word: ἀπόστειλον
  chosen: send
  alternatives:
  - send away
  - dispatch
  lexicon: BDAG
  rationale: Aorist imperative requesting immediate action; 'send' is the most natural
    and direct English rendering in this context.
- source_word: ἀγέλην
  chosen: herd
  alternatives:
  - drove
  lexicon: BDAG
  rationale: Refers to a group of animals; 'herd' is the normal English term for swine
    in narrative context.
- source_word: χοίρων
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: '''Pigs'' is clear, contemporary English; ''swine'' is accurate but more
    formal/archaic. The source does not require elevated diction.'
- source_word: οἱ δὲ
  chosen: And the
  alternatives:
  - Now the
  - Then the
  lexicon: BDAG
  rationale: δέ here marks narrative continuation/contrast. 'And the' gives smooth
    English flow without overstating contrast.
