theological_decisions:
- issue: Rendering of Jesus' self-designation ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: Following the translation philosophy, this title is translated rather
    than paraphrased. 'The Son of Man' preserves the wording, its established messianic/theological
    resonance, and the ambiguity/tension present in the Greek. 'The Human One' reduces
    that resonance and interprets the title more than the source requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §§2–3
