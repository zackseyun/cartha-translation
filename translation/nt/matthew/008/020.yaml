id: MAT.8.20
reference: Matthew 8:20
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Αἱ ἀλώπεκες φωλεοὺς ἔχουσιν καὶ τὰ πετεινὰ τοῦ οὐρανοῦ
    κατασκηνώσεις, ὁ δὲ υἱὸς τοῦ ἀνθρώπου οὐκ ἔχει ποῦ τὴν κεφαλὴν κλίνῃ.
translation:
  text: And Jesus says to him, “Foxes have dens, and the birds of the sky have nests,
    but the Son of Man has nowhere to lay his head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “holes” for “dens.”
    reason: lexical_alternative
  - marker: b
    text: Or “the birds of heaven” or traditionally “the birds of the air.”
    reason: lexical_alternative
  - marker: c
    text: Or “roosting places” for “nests.”
    reason: lexical_alternative
  - marker: d
    text: “The Son of Man” is Jesus’ self-designation; alternatively, some render
      it “the Human One.”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as present-tense 'says' to reflect the Greek historical present,
    a common narrative feature in the Gospels. English can smooth this to past tense,
    but preserving the present here is natural enough and keeps closer to the source.
- source_word: ἀλώπεκες
  chosen: foxes
  lexicon: BDAG
  rationale: Straightforward lexical equivalent for the plural noun.
- source_word: φωλεοὺς
  chosen: dens
  alternatives:
  - holes
  lexicon: BDAG
  rationale: '''Dens'' communicates animal dwelling places in idiomatic modern English.
    ''Holes'' is traditional and possible, but ''dens'' better fits contemporary usage
    without loss of meaning.'
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: Rendered literally as 'the birds of the sky.' 'Of heaven' is more wooden
    in English, and 'of the air' is traditional but less directly tied to οὐρανός.
    This preserves the source image in readable modern English.
- source_word: κατασκηνώσεις
  chosen: nests
  alternatives:
  - roosting places
  - lodgings
  lexicon: BDAG
  rationale: Although the noun can denote lodging places or shelters, in context of
    birds 'nests' is the most natural and idiomatic English rendering, conveying the
    intended contrast with Jesus' lack of a resting place.
- source_word: ὁ δὲ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and should be translated, not paraphrased.
    It preserves both the idiom and its theological resonance, including possible
    allusion to Daniel 7, without resolving all interpretive layers in translation.
- source_word: ποῦ
  chosen: nowhere
  alternatives:
  - no place where
  lexicon: BDAG
  rationale: In combination with the negated verb, ποῦ is idiomatically expressed
    in English as 'nowhere.' This is a faithful natural rendering rather than an unnecessary
    literalism such as 'does not have where.'
- source_word: κλίνῃ
  chosen: to lay
  alternatives:
  - to rest
  - to recline
  lexicon: BDAG
  rationale: The verb denotes laying or resting down. 'To lay his head' is the natural
    English idiom that closely matches the Greek expression and preserves the concrete
    imagery.
