id: MAT.8.34
reference: Matthew 8:34
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ πᾶσα ἡ πόλις ἐξῆλθεν εἰς ⸀ὑπάντησιν τῷ Ἰησοῦ, καὶ ἰδόντες αὐτὸν παρεκάλεσαν
    ὅπως μεταβῇ ἀπὸ τῶν ὁρίων αὐτῶν.
translation:
  text: And behold, the whole city went out to meet Jesus, and when they saw him,
    they begged him to depart from their region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their territory' or more literally 'from their borders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-getter. 'Behold'
    is slightly formal but still readable and preserves the narrative vividness better
    than omitting it.
- source_word: πᾶσα ἡ πόλις
  chosen: the whole city
  alternatives:
  - all the city
  - the entire town
  lexicon: BDAG
  rationale: A natural English rendering of the distributive sense. It refers to the
    city population corporately, not literally every individual without exception,
    but 'the whole city' best matches the Greek idiom.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι is straightforwardly rendered 'went out.' 'Came
    out' is possible in English, but 'went out' better preserves the movement from
    the city's perspective.
- source_word: εἰς ὑπάντησιν
  chosen: to meet
  alternatives:
  - for a meeting with
  - to encounter
  lexicon: BDAG
  rationale: This is a standard idiom meaning going out for the purpose of meeting
    someone. 'To meet' is idiomatic and sufficiently precise.
- source_word: Ἰησοῦ
  chosen: Jesus
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: ἰδόντες αὐτὸν
  chosen: when they saw him
  alternatives:
  - seeing him
  - after seeing him
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered temporally here in smooth English:
    ''when they saw him.'' This preserves the sequence without awkward literalism.'
- source_word: παρεκάλεσαν
  chosen: begged
  alternatives:
  - urged
  - implored
  - asked
  lexicon: BDAG
  rationale: In this context the verb conveys earnest entreaty rather than a simple
    request. 'Begged' captures the force well and fits the hostile or fearful tone
    of the scene.
- source_word: ὅπως μεταβῇ
  chosen: to depart
  alternatives:
  - that he should go away
  - to leave
  - to go away
  lexicon: BDAG
  rationale: Ὅπως with the subjunctive expresses the content/purpose of their plea.
    'To depart' is concise and preserves the sense of leaving their area. It is slightly
    more formal than 'go away' but fits the narrative register.
- source_word: ἀπὸ τῶν ὁρίων αὐτῶν
  chosen: from their region
  alternatives:
  - from their territory
  - from their borders
  - from their district
  lexicon: BDAG
  rationale: Ὅρια literally means 'boundaries/borders,' but in this context it denotes
    the territory or district belonging to them. 'Region' communicates the geographic
    sense naturally in English without misleadingly emphasizing border lines.
