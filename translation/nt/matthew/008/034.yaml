theological_decisions:
- issue: Reason for the townspeople's request
  chosen_reading: 'The translation leaves the motive unstated: they begged Jesus to
    leave their region.'
  alternative_readings:
  - fear of Jesus' power
  - anger over the loss of the pigs
  - general alarm at the event
  rationale: The Greek reports the action without explicitly explaining their motive.
    To preserve theological and narrative tension, the translation does not import
    an interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
