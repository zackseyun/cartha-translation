id: MAT.8.5
reference: Matthew 8:5
source:
  edition: SBLGNT
  text: ⸂Εἰσελθόντος δὲ αὐτοῦ⸃ εἰς Καφαρναοὺμ προσῆλθεν αὐτῷ ἑκατόνταρχος παρακαλῶν
    αὐτὸν
translation:
  text: When he entered Capernaum, a centurion came to him, appealing to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'begging him' or 'imploring him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσελθόντος δὲ αὐτοῦ
  chosen: When he entered
  alternatives:
  - As he entered
  - After he entered
  lexicon: BDAG
  rationale: The genitive absolute with aorist participle is best rendered as a temporal
    clause in natural English. 'When he entered' preserves the event sequence without
    over-specifying whether the action is strictly prior ('after') or contemporaneous
    ('as'). The pronoun refers to Jesus from context.
- source_word: εἰς Καφαρναοὺμ
  chosen: Capernaum
  lexicon: BDAG
  rationale: Personal and place names are transliterated by standard English convention
    per translation philosophy. 'Into Capernaum' is idiomatic as 'entered Capernaum'
    in English.
- source_word: προσῆλθεν αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'come to' or 'approach.' 'Came to him' is
    clear, natural English and fits the narrative style.
- source_word: ἑκατόνταρχος
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: The standard rendering 'centurion' accurately reflects the specific military
    rank and is widely understood in English Bible translation. A more explanatory
    gloss would lose lexical precision.
- source_word: παρακαλῶν αὐτὸν
  chosen: appealing to him
  alternatives:
  - begging him
  - imploring him
  - asking him for help
  lexicon: BDAG
  rationale: παρακαλέω here introduces the centurion's urgent request in the following
    verse. 'Appealing to him' preserves the sense of earnest entreaty without prematurely
    intensifying to 'begging,' which may overstate the tone, or flattening to mere
    'asking.' The participle is rendered adverbially to show attendant manner.
