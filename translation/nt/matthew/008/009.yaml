id: MAT.8.9
reference: Matthew 8:9
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐγὼ ἄνθρωπός εἰμι ὑπὸ ⸀ἐξουσίαν, ἔχων ὑπ’ ἐμαυτὸν στρατιώτας, καὶ
    λέγω τούτῳ· Πορεύθητι, καὶ πορεύεται, καὶ ἄλλῳ· Ἔρχου, καὶ ἔρχεται, καὶ τῷ δούλῳ
    μου· Ποίησον τοῦτο, καὶ ποιεῖ.
translation:
  text: For I also am a man under authority, having soldiers under me. And I say to
    this one, ‘Go,’ and he goes; and to another, ‘Come,’ and he comes; and to my servant,
    ‘Do this,’ and he does it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''slave'' for ''servant'' (Greek: doulos).'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For
  alternatives:
  - For indeed
  - Because
  lexicon: BDAG
  rationale: The combination introduces the centurion's explanation or grounds for
    his statement. 'For' is natural English and preserves the explanatory force without
    overtranslating γάρ or awkwardly retaining both particles.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis, but English can convey this adequately
    with normal 'I' in context. Adding 'myself' would overemphasize beyond what the
    sentence requires.
- source_word: ἄνθρωπός εἰμι
  chosen: am a man
  alternatives:
  - am a human being
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to the centurion as a human person in contrast to
    rank and delegated authority. 'Man' is the natural, gender-accurate rendering
    in context.
- source_word: ὑπὸ ἐξουσίαν
  chosen: under authority
  alternatives:
  - under someone’s authority
  - subject to authority
  lexicon: BDAG
  rationale: This idiom expresses being under delegated command. 'Under authority'
    is concise, idiomatic, and preserves the military chain-of-command sense.
- source_word: ἔχων ὑπ’ ἐμαυτὸν στρατιώτας
  chosen: having soldiers under me
  alternatives:
  - with soldiers under me
  - having soldiers subject to me
  lexicon: BDAG
  rationale: 'The participial phrase explains the centurion''s analogous position:
    he is under authority and also has subordinates. ''Having soldiers under me''
    preserves the structure and military nuance.'
- source_word: στρατιώτας
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: The noun specifically denotes soldiers, not a general military force.
    'Soldiers' is the most direct and clear rendering.
- source_word: λέγω τούτῳ
  chosen: I say to this one
  alternatives:
  - I tell this one
  - I say to one
  lexicon: BDAG
  rationale: τούτῳ is demonstrative and individualizing. 'This one' preserves the
    distributive feel of the examples better than smoothing to 'one' alone.
- source_word: Πορεύθητι
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: The imperative here is a straightforward command to depart or proceed.
    'Go' is sufficient and idiomatic.
- source_word: πορεύεται
  chosen: he goes
  alternatives:
  - he departs
  lexicon: BDAG
  rationale: 'The present tense in narrative example is well represented by simple
    present in English: immediate obedience to command.'
- source_word: ἄλλῳ
  chosen: another
  alternatives:
  - another one
  lexicon: BDAG
  rationale: This balances 'this one' and keeps the distributive pattern of the sentence.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: A simple imperative is best; 'here' is implied but not explicit.
- source_word: ἔρχεται
  chosen: he comes
  lexicon: BDAG
  rationale: Directly mirrors the command-response pattern and preserves the simplicity
    of the Greek.
- source_word: τῷ δούλῳ μου
  chosen: to my servant
  alternatives:
  - to my slave
  lexicon: BDAG
  rationale: δοῦλος can mean 'servant' or 'slave' depending on context. In this verse
    the focus is not on the bonded status as a theological point but on household
    subordination within the centurion's analogy. 'Servant' is natural here, while
    preserving 'slave' as a lexical alternative in a footnote per project policy on
    contested terms.
- source_word: Ποίησον τοῦτο
  chosen: Do this
  alternatives:
  - Do this task
  - Make this
  lexicon: BDAG
  rationale: ποιέω with τοῦτο is a broad command to perform an action. 'Do this' is
    the most natural equivalent.
- source_word: ποιεῖ
  chosen: he does it
  alternatives:
  - he does so
  lexicon: BDAG
  rationale: English normally supplies the object for smoothness. 'He does it' clearly
    reflects obedient completion of the command.
