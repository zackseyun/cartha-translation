theological_decisions:
- issue: Rendering of δοῦλος in the centurion's example
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: 'The doctrine file marks δοῦλος as context-dependent: ''servant / slave.''
    Here the social subordination is present, but the verse''s point is the centurion''s
    authority structure rather than the bonded nature of the household member. Therefore
    ''servant'' best fits readable modern English while preserving ''slave'' as an
    alternative in a footnote.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1 and #5'
