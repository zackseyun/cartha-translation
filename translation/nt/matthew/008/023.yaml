theological_decisions:
- issue: Potential discipleship nuance in ἀκολουθέω
  chosen_reading: Retain 'followed' in the main text without expanding to an explicitly
    theological paraphrase.
  alternative_readings:
  - went with him
  - became his followers
  rationale: The verse narrates physical movement, but Matthew's use of ἀκολουθέω
    often also evokes discipleship. 'Followed' preserves that tension without importing
    more theology than the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
