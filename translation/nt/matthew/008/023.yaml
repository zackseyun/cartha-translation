id: MAT.8.23
reference: Matthew 8:23
source:
  edition: SBLGNT
  text: Καὶ ἐμβάντι αὐτῷ ⸀εἰς πλοῖον ἠκολούθησαν αὐτῷ οἱ μαθηταὶ αὐτοῦ.
translation:
  text: And when he got into the boat, his disciples followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a boat.' The Greek says simply 'into a boat/boat,' but English narrative
      style may also be rendered 'the boat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he got into the boat' or more formally 'after he entered the boat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβάντι
  chosen: when he got into
  alternatives:
  - as he got into
  - after he got into
  - having entered
  lexicon: BDAG
  rationale: Aorist active participle dative singular modifying αὐτῷ in a genitive-like/dative
    absolute-style construction with Καὶ. In natural English, a temporal clause best
    conveys the participial action preceding the main verb. 'Got into' is idiomatic
    and fits movement into a vessel better than the more formal 'entered'.
- source_word: πλοῖον
  chosen: the boat
  alternatives:
  - a boat
  - the ship
  lexicon: BDAG
  rationale: πλοῖον can denote boat or ship. In the Gospel setting on the Sea of Galilee,
    'boat' is the most natural modern English rendering. The article is not explicit
    in Greek here because εἰς πλοῖον lacks the article, but English idiom and narrative
    continuity favor 'the boat' rather than the more indefinite 'a boat'.
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  - accompanied
  lexicon: BDAG
  rationale: ἀκολουθέω commonly means 'follow,' and in Matthew it often carries discipleship
    resonance. Here the immediate sense is physical following, but 'followed' appropriately
    preserves both the narrative action and the broader discipleship nuance without
    overtranslating.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - learners
  - students
  lexicon: BDAG
  rationale: The standard Gospel term for Jesus' followers is μαθηταί. 'Disciples'
    preserves the established relational and theological sense better than 'students'
    or 'learners'.
- source_word: αὐτῷ ... αὐτῷ ... αὐτοῦ
  chosen: he / him / his
  lexicon: BDAG
  rationale: All three pronouns refer to Jesus in context. English style requires
    resolving the first dative pronoun with 'he' as subject of the temporal clause,
    while retaining 'him' and 'his' for the subsequent references.
