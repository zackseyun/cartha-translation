id: MAT.8.10
reference: Matthew 8:10
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὁ Ἰησοῦς ἐθαύμασεν καὶ εἶπεν τοῖς ἀκολουθοῦσιν· Ἀμὴν λέγω ὑμῖν,
    ⸂παρ’ οὐδενὶ τοσαύτην πίστιν ἐν τῷ Ἰσραὴλ⸃ εὗρον.
translation:
  text: When Jesus heard this, he marveled and said to those following him, “Truly
    I tell you, with no one in Israel have I found such faith.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “so great a faith.”
    reason: lexical_alternative
  - marker: b
    text: Or “I found no one in Israel with such faith.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: When Jesus heard this
  alternatives:
  - After hearing this
  - Having heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verb. English
    idiom is smoother with a temporal clause. 'This' is supplied from context because
    the participle is absolute in English but clearly refers to the centurion's preceding
    words.
- source_word: ἐθαύμασεν
  chosen: marveled
  alternatives:
  - was amazed
  - wondered
  lexicon: BDAG
  rationale: Conveys astonishment without implying ignorance or error in Jesus. 'Marveled'
    preserves the narrative force and traditional sense while remaining understandable
    in modern English.
- source_word: τοῖς ἀκολουθοῦσιν
  chosen: to those following him
  alternatives:
  - to his followers
  - to those who were following
  lexicon: BDAG
  rationale: The present participle denotes the people accompanying Jesus at that
    moment. 'Those following him' is more precise than the potentially institutional
    'his followers.'
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I tell you
  alternatives:
  - Amen, I say to you
  - Truly I say to you
  lexicon: BDAG
  rationale: Standard solemn formula in the Gospels. 'Truly I tell you' is natural
    modern English while preserving the emphatic force of ἀμήν.
- source_word: παρ’ οὐδενὶ
  chosen: with no one
  alternatives:
  - with nobody
  - from no one
  - in no one
  lexicon: BDAG
  rationale: 'παρά with the dative here expresses association or presence: ''with/in
    the case of no one.'' ''With no one'' is idiomatic and fits the sense of not finding
    such faith in any person.'
- source_word: τοσαύτην πίστιν
  chosen: such faith
  alternatives:
  - so great a faith
  - such great faith
  lexicon: BDAG
  rationale: πίστις follows the project's default rendering 'faith.' τοσαύτην emphasizes
    degree; 'such faith' is concise and natural, while the greatness is implied by
    the demonstrative intensity. The traditional 'so great a faith' is possible but
    less natural in current English.
- source_word: ἐν τῷ Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  - within Israel
  lexicon: BDAG
  rationale: The phrase is locative/corporate, referring to the people of Israel in
    their covenantal setting. 'In Israel' is the most direct and idiomatic rendering.
- source_word: εὗρον
  chosen: have I found
  alternatives:
  - I found
  lexicon: BDAG
  rationale: Although the Greek is aorist, English present perfect works naturally
    after 'Truly I tell you' to express Jesus' experience up to the present moment.
    This is an optimal-equivalence adjustment for idiomatic English.
