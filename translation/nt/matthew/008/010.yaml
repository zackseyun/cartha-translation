theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here the context is the centurion's
    believing confidence in Jesus' authority, so 'faith' is the best main-text rendering;
    'trust' is a plausible nuance but not necessary in the main text.
