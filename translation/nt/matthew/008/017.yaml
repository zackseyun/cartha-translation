id: MAT.8.17
reference: Matthew 8:17
source:
  edition: SBLGNT
  text: ὅπως πληρωθῇ τὸ ῥηθὲν διὰ Ἠσαΐου τοῦ προφήτου λέγοντος· Αὐτὸς τὰς ἀσθενείας
    ἡμῶν ἔλαβεν καὶ τὰς νόσους ἐβάστασεν.
translation:
  text: 'so that what was spoken through Isaiah the prophet might be fulfilled, saying:
    “He himself took our weaknesses and carried our diseases.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “infirmities.” The Greek ἀσθενείας can denote weaknesses, infirmities,
      or illnesses.
    reason: lexical_alternative
  - marker: b
    text: Or “bore our diseases.” 'Bore' preserves a closer verbal link to Isaiah
      53:4 and traditional English renderings.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result in Matthew’s fulfillment formula. 'So that'
    is natural modern English while preserving the telic sense.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ὅπως is well represented by 'might be
    fulfilled' in English, preserving the fulfillment motif central to Matthew.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been said
  lexicon: BDAG
  rationale: Idiomatic rendering of the articular participle; 'what was spoken' is
    standard and clear.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  chosen: through Isaiah the prophet
  alternatives:
  - by Isaiah the prophet
  lexicon: BDAG
  rationale: διά with genitive often marks agency/instrumentality in prophetic citation
    formulas. 'Through' preserves the sense that God speaks by means of the prophet.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - who said
  lexicon: BDAG
  rationale: Conventional participial introduction to the quotation; concise and natural
    in English.
- source_word: Αὐτὸς
  chosen: He himself
  alternatives:
  - He
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'He himself' preserves the emphasis rather than
    flattening it.
- source_word: ἀσθενείας
  chosen: weaknesses
  alternatives:
  - infirmities
  - sicknesses
  lexicon: BDAG
  rationale: ἀσθένεια can denote weakness, infirmity, or illness. 'Weaknesses' preserves
    the broader lexical sense while fitting Matthew’s application to healing. A more
    medical rendering is preserved in a footnote.
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - took away
  - bore
  lexicon: BDAG
  rationale: Direct and literal rendering of λαμβάνω. 'Took away' interprets beyond
    the verb itself; 'bore' would blur the distinction from the following verb.
- source_word: νόσους
  chosen: diseases
  alternatives:
  - sicknesses
  - illnesses
  lexicon: BDAG
  rationale: νόσος is specifically disease/sickness; 'diseases' is precise and natural.
- source_word: ἐβάστασεν
  chosen: carried
  alternatives:
  - bore
  lexicon: BDAG
  rationale: βαστάζω commonly means carry/bear. 'Carried' is clearer for modern readers,
    while 'bore' is preserved in a footnote because of its resonance with Isaiah 53
    and possible theological overtones.
