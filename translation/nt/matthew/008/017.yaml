theological_decisions:
- issue: Rendering of Isaiah 53:4 citation in Matthew’s healing context
  chosen_reading: 'Translate the quotation in terms of physical affliction: ''weaknesses''
    and ''diseases.'''
  alternative_readings:
  - '''infirmities'' and ''sicknesses'''
  - more substitutionary-sounding 'griefs' and 'sorrows'
  rationale: Matthew applies the Isaiah citation directly to Jesus’ healing ministry
    in the immediate context, so the rendering should reflect bodily affliction without
    importing a narrower atonement formulation not explicit in this verse. At the
    same time, alternatives with stronger traditional resonance are preserved in footnotes
    because the underlying Isaiah text has a broader semantic range and theological
    significance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
