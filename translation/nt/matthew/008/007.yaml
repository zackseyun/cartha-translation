theological_decisions:
- issue: Whether to render the clause as a statement or a question
  chosen_reading: 'statement: “I will come and heal him.”'
  alternative_readings:
  - 'question: “Shall I come and heal him?”'
  - 'question: “Am I to come and heal him?”'
  rationale: The Greek as given lacks any interrogative particle and is naturally
    read as a declarative statement. Although some interpreters and translations take
    it as a question based on context, the source text's plain sense favors the statement.
    This preserves the directness of Jesus' response without importing a rhetorical
    nuance not marked in the Greek.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension where genuine)
