id: MAT.8.7
reference: Matthew 8:7
source:
  edition: SBLGNT
  text: ⸀καὶ λέγει ⸀αὐτῷ· Ἐγὼ ἐλθὼν θεραπεύσω αὐτόν.
translation:
  text: And he says to him, “I will come and heal him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Shall I come and heal him?” Some interpreters take Jesus’ words as
      a question based on the context, but the Greek wording itself is naturally read
      as a statement.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without
    adding temporal or inferential force not explicit in the Greek.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present-tense historical present in narrative. Rendering as 'says' preserves
    the Greek aspect and vividness; English can naturally bear the historical present
    here.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object after λέγει is straightforwardly rendered 'to
    him.'
- source_word: Ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun is somewhat emphatic in Greek, but normal English
    can convey the sense with simple 'I' in this context without overemphasis.
- source_word: ἐλθὼν
  chosen: will come
  alternatives:
  - having come
  - after coming
  - I, coming,
  lexicon: BDAG
  rationale: Aorist participle preceding a future verb often conveys attendant circumstance
    or action prior to the main verb. In idiomatic English, 'will come and' best captures
    the sequence and natural flow without woodenly reproducing the participle.
- source_word: θεραπεύσω
  chosen: heal
  alternatives:
  - cure
  - restore
  lexicon: BDAG
  rationale: In this healing context, θεραπεύω is best rendered 'heal.' 'Cure' is
    possible but less idiomatic in this Gospel narrative context.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Accusative direct object referring to the sick servant; 'him' is the
    natural English rendering.
