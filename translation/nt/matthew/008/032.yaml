id: MAT.8.32
reference: Matthew 8:32
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Ὑπάγετε. οἱ δὲ ἐξελθόντες ἀπῆλθον εἰς ⸂τοὺς χοίρους⸃· καὶ
    ἰδοὺ ὥρμησεν πᾶσα ἡ ⸀ἀγέλη κατὰ τοῦ κρημνοῦ εἰς τὴν θάλασσαν, καὶ ἀπέθανον ἐν
    τοῖς ὕδασιν.
translation:
  text: And he said to them, “Go.” Then they came out and went into the pigs; and
    behold, the whole herd rushed down the steep bank into the sea and died in the
    waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'down the cliff.' The Greek term can denote a steep slope, bank, or precipice.
    reason: lexical_alternative
  - marker: c
    text: Or 'were drowned in the waters.' The Greek more literally says 'died in
      the waters.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Be gone
  - Depart
  lexicon: BDAG
  rationale: A concise imperative fits Jesus' brief command. 'Go' is natural modern
    English and preserves the force without adding nuance not explicit in the Greek.
- source_word: ἐξελθόντες
  chosen: came out
  alternatives:
  - went out
  - having come out
  lexicon: BDAG
  rationale: The participle denotes exiting, here from the demoniacs. 'Came out' is
    idiomatic in English narrative and pairs well with the following finite verb.
- source_word: ἀπῆλθον εἰς τοὺς χοίρους
  chosen: went into the pigs
  alternatives:
  - departed into the pigs
  - went away into the swine
  lexicon: BDAG
  rationale: The phrase describes the demons' movement into the animals. 'Went into'
    is straightforward; 'pigs' is more readable modern English than 'swine' while
    remaining accurate.
- source_word: χοίρους
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: '''Pigs'' is the plain contemporary equivalent and suits the translation''s
    readable modern English aim.'
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: The discourse marker heightens vividness and draws attention to the ensuing
    event. 'Behold' preserves that rhetorical force better than omitting it or flattening
    it to mere adverbial surprise.
- source_word: πᾶσα ἡ ἀγέλη
  chosen: the whole herd
  alternatives:
  - the entire herd
  - all the herd
  lexicon: BDAG
  rationale: This naturally renders the collective noun with the force of πᾶσα. 'Whole
    herd' is idiomatic and complete.
- source_word: ὥρμησεν
  chosen: rushed
  alternatives:
  - charged
  - hurled itself
  lexicon: BDAG
  rationale: The verb conveys sudden, forceful movement. 'Rushed' captures the sense
    without overinterpreting whether the herd acted as one body or many animals.
- source_word: κατὰ τοῦ κρημνοῦ
  chosen: down the steep bank
  alternatives:
  - down the cliff
  - down the slope
  lexicon: BDAG
  rationale: κρημνός denotes a steep slope or precipice. 'Steep bank' communicates
    the terrain in accessible English without requiring a sheer vertical cliff.
- source_word: θάλασσαν
  chosen: sea
  alternatives:
  - lake
  lexicon: BDAG
  rationale: The Greek word is 'sea,' and original-language primacy favors retaining
    it even though the body of water is also known as the Sea of Galilee. This avoids
    importing a harmonizing geographical gloss into the main text.
- source_word: ἀπέθανον ἐν τοῖς ὕδασιν
  chosen: died in the waters
  alternatives:
  - perished in the water
  - were drowned in the waters
  lexicon: BDAG
  rationale: The Greek explicitly says 'died in the waters.' 'Were drowned' is an
    interpretive inference from the context; the more textually transparent rendering
    is preferred in the main text.
