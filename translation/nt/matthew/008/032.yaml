theological_decisions:
- issue: Degree of interpretive specificity in describing the herd's death
  chosen_reading: Retain the text's wording 'died in the waters' rather than specifying
    'were drowned.'
  alternative_readings:
  - were drowned in the water
  rationale: The narrative strongly implies drowning, but the Greek verb is simply
    'died.' Preserving the source wording avoids adding explanatory detail beyond
    what is stated.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
