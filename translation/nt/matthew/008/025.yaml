id: MAT.8.25
reference: Matthew 8:25
source:
  edition: SBLGNT
  text: καὶ ⸀προσελθόντες ἤγειραν αὐτὸν λέγοντες· Κύριε, ⸀σῶσον, ἀπολλύμεθα.
translation:
  text: And they came and woke him, saying, “Lord, save us! We are perishing!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rescue us.” The Greek imperative σῶσον can denote immediate deliverance
      from danger as well as the broader sense “save.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: they came
  alternatives:
  - they approached
  - they came to him
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating movement toward Jesus before
    waking him. 'They came' is natural English and keeps the sequence without over-specifying
    beyond the Greek; 'to him' is implied by context but not required in English because
    αὐτόν follows with 'woke him.'
- source_word: ἤγειραν
  chosen: woke
  alternatives:
  - awoke
  - roused
  lexicon: BDAG
  rationale: From ἐγείρω, here in the concrete sense of waking someone from sleep,
    not the broader senses 'raise' or 'arouse' in a theological/resurrection context.
    'Woke' is the clearest modern English equivalent.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - crying out
  lexicon: BDAG
  rationale: Present participle introducing the content of their speech. 'Saying'
    is the most direct rendering; 'crying out' would add emotional coloring not explicit
    in λέγοντες itself.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    'Master' is possible in some contexts, but 'Lord' best matches both the lexical
    value and Matthean usage.
- source_word: σῶσον
  chosen: save us
  alternatives:
  - rescue us
  - deliver us
  lexicon: BDAG
  rationale: Aorist imperative of σῴζω, here a plea for immediate deliverance from
    danger. Although the object 'us' is not explicit in the single verb, it is naturally
    supplied in English from the first-person plural verb that follows and the context
    of the disciples' plea. 'Save us' preserves the urgency and the lexical connection
    to σῴζω.
- source_word: ἀπολλύμεθα
  chosen: we are perishing
  alternatives:
  - we are dying
  - we are being destroyed
  lexicon: BDAG
  rationale: Present middle/passive indicative of ἀπόλλυμι, expressing imminent ruin
    or death. 'We are perishing' preserves the aspect and urgency without flattening
    it to merely 'we are dying.' It also echoes common biblical diction while remaining
    understandable.
