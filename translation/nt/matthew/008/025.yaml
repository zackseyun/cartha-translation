theological_decisions:
- issue: Rendering κύριος as a title addressed to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The address to Jesus can carry anything from respectful address to deeper
    christological weight. The translation preserves the title 'Lord' in line with
    the doctrine default for κύριος and does not reduce it to a merely functional
    'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make the plea explicitly plural in English
  chosen_reading: save us
  alternative_readings:
  - save [implicit object]
  rationale: English idiom strongly prefers an expressed object here, and the following
    ἀπολλύμεθα ('we are perishing') makes the implied object unmistakable. This is
    not an added doctrinal element but a necessary idiomatic completion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
