id: MAT.8.30
reference: Matthew 8:30
source:
  edition: SBLGNT
  text: ἦν δὲ μακρὰν ἀπ’ αὐτῶν ἀγέλη χοίρων πολλῶν βοσκομένη.
translation:
  text: Now a large herd of pigs was feeding some distance away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'far from them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - Now there was
  lexicon: BDAG
  rationale: δέ is a mild connective that advances the narrative. 'Now' gives natural
    English discourse flow without overtranslating. ἦν supplies the existential/copular
    sense expressed in English by 'was'.
- source_word: μακρὰν ἀπ’ αὐτῶν
  chosen: some distance away from them
  alternatives:
  - far from them
  - at a distance from them
  lexicon: BDAG
  rationale: μακράν with ἀπό denotes spatial distance. 'Some distance away from them'
    is idiomatic modern English and preserves the comparative remoteness without sounding
    wooden.
- source_word: ἀγέλη
  chosen: herd
  alternatives:
  - drove
  lexicon: BDAG
  rationale: ἀγέλη refers to a herd or drove of animals. 'Herd' is the most natural
    and common English term here.
- source_word: χοίρων
  chosen: of pigs
  alternatives:
  - of swine
  lexicon: BDAG
  rationale: '''Pigs'' is clear modern English. ''Swine'' is more formal or archaic
    in many contexts and is unnecessary here.'
- source_word: πολλῶν
  chosen: large
  alternatives:
  - many
  - numerous
  lexicon: BDAG
  rationale: Although literally 'many,' in English with a collective noun like 'herd,'
    'a large herd' is the most natural equivalent and accurately conveys quantity.
- source_word: βοσκομένη
  chosen: was feeding
  alternatives:
  - was grazing
  - was being tended
  lexicon: BDAG
  rationale: The present participle describes the herd in the act of feeding. 'Was
    feeding' is straightforward and fits pigs well in English. 'Grazing' is less idiomatic
    for pigs, and 'being tended' shifts the focus from the animals' activity to a
    shepherding action not explicit here.
