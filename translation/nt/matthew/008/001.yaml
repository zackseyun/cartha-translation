id: MAT.8.1
reference: Matthew 8:1
source:
  edition: SBLGNT
  text: ⸂Καταβάντος δὲ αὐτοῦ⸃ ἀπὸ τοῦ ὄρους ἠκολούθησαν αὐτῷ ὄχλοι πολλοί.
translation:
  text: When he came down from the mountain, large crowds followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many crowds followed him.' The Greek phrase is literally 'crowds many,'
      which may be rendered more formally but is less natural in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καταβάντος δὲ αὐτοῦ
  chosen: When he came down
  alternatives:
  - And when he came down
  - After he came down
  - As he came down
  lexicon: BDAG
  rationale: The genitive absolute with aorist participle is naturally rendered as
    a temporal clause in English. 'When he came down' is idiomatic and preserves the
    sequence without over-specifying timing. δέ is lightly connective and need not
    be separately represented beyond smooth English flow, though 'and' is possible.
- source_word: ἀπὸ τοῦ ὄρους
  chosen: from the mountain
  alternatives:
  - from the hill
  - from the mount
  lexicon: BDAG
  rationale: ὄρος commonly means 'mountain' or 'hill'; in Matthew's narrative context,
    'the mountain' appropriately echoes the preceding setting and is the most natural
    rendering.
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  - accompanied
  lexicon: BDAG
  rationale: ἀκολουθέω is the standard verb for following, including physical following
    in narrative contexts. 'Followed' is both accurate and consistent with Gospel
    usage.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - after him
  lexicon: BDAG
  rationale: The dative complement with ἀκολουθέω is idiomatically rendered in English
    as the direct object 'him' after 'followed.'
- source_word: ὄχλοι πολλοί
  chosen: large crowds
  alternatives:
  - many crowds
  - great crowds
  - many people
  lexicon: BDAG
  rationale: The adjective πολλοί with ὄχλοι indicates numerous crowds/large numbers
    of people. 'Large crowds' is idiomatic modern English and preserves the plural
    sense better than the less natural 'many crowds.'
