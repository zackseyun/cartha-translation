id: MAT.8.33
reference: Matthew 8:33
source:
  edition: SBLGNT
  text: οἱ δὲ βόσκοντες ἔφυγον, καὶ ἀπελθόντες εἰς τὴν πόλιν ἀπήγγειλαν πάντα καὶ
    τὰ τῶν δαιμονιζομένων.
translation:
  text: Then the herdsmen fled, and when they went into the city, they reported everything,
    including what had happened to the demon-possessed men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the things concerning the demon-possessed men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ βόσκοντες
  chosen: Then the herdsmen
  alternatives:
  - Now those who were tending them
  - And the ones feeding them
  lexicon: BDAG
  rationale: βόσκοντες literally means 'those feeding/grazing' and refers here to
    those tending the herd of pigs. 'Herdsmen' is concise, natural English that captures
    their role better than a wooden participial phrase. δέ is rendered with 'Then'
    to mark narrative progression.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Aorist of φεύγω denotes fleeing. 'Fled' is the most direct and suitably
    vivid narrative rendering.
- source_word: ἀπελθόντες εἰς τὴν πόλιν
  chosen: when they went into the city
  alternatives:
  - and after going into the city
  - and having gone into the city
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered in English as a temporal
    subordinate clause here. 'Into the city' preserves εἰς and the article-noun phrase
    straightforwardly.
- source_word: ἀπήγγειλαν
  chosen: they reported
  alternatives:
  - they told
  - they announced
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce. 'Reported' fits the narrative
    context of relaying news to the townspeople without sounding overly formal.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: BDAG
  rationale: πάντα is comprehensive. 'Everything' is idiomatic modern English and
    preserves the totalizing sense.
- source_word: καὶ τὰ τῶν δαιμονιζομένων
  chosen: including what had happened to the demon-possessed men
  alternatives:
  - and the things concerning the demon-possessed men
  - and what concerned the demonized men
  lexicon: BDAG
  rationale: The phrase literally means 'and the things of/concerning the demon-possessed
    [men].' In context it refers to the matter or events involving them. 'Including
    what had happened to the demon-possessed men' makes explicit the idiomatic sense
    in natural English. 'Men' is supplied from the immediate context of the passage,
    since Matthew has two demoniacs.
- source_word: δαιμονιζομένων
  chosen: demon-possessed men
  alternatives:
  - demoniacs
  - demonized men
  lexicon: BDAG
  rationale: δαιμονίζομαι denotes being under the power of demons. 'Demon-possessed'
    is the clearest established English rendering. 'Demoniacs' is archaic/technical,
    and 'demonized' is possible but less standard for general readers.
