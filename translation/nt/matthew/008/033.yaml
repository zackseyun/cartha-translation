theological_decisions:
- issue: Rendering of δαιμονιζομένων in a way that reflects real demonic affliction
    without importing extra doctrinal precision
  chosen_reading: demon-possessed men
  alternative_readings:
  - demonized men
  - men afflicted by demons
  rationale: The term in context refers to actual demonic oppression/possession in
    the Gospel narrative. 'Demon-possessed' is the most recognizable and direct English
    equivalent, while avoiding speculative distinctions not made by the text itself.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
