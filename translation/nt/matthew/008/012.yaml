id: MAT.8.12
reference: Matthew 8:12
source:
  edition: SBLGNT
  text: οἱ δὲ υἱοὶ τῆς βασιλείας ἐκβληθήσονται εἰς τὸ σκότος τὸ ἐξώτερον· ἐκεῖ ἔσται ὁ κλαυθμὸς καὶ ὁ βρυγμὸς τῶν ὀδόντων.
translation:
  text: But the sons of the kingdom will be thrown out into the outer darkness. In that place there will be weeping and gnashing of teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the children of the kingdom.'' Greek: ''sons of the kingdom,'' an idiom for those regarded as rightful heirs or expected members of the kingdom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be cast out.'
    reason: lexical_alternative
  - marker: c
    text: Or 'There will be weeping and gnashing of teeth there.'.
    reason: previous_rendering
lexical_decisions:
- source_word: υἱοὶ τῆς βασιλείας
  chosen: the sons of the kingdom
  alternatives:
  - the heirs of the kingdom
  - the children of the kingdom
  lexicon: BDAG
  rationale: A formally close rendering preserves the idiom and the irony of those presumed to belong to the kingdom being excluded. 'Sons' is gender-accurate to the Greek and can carry representative force; 'children' is possible in English but softens the idiomatic and covenantal nuance.
- source_word: ἐκβληθήσονται
  chosen: will be thrown out
  alternatives:
  - will be cast out
  - will be driven out
  lexicon: BDAG
  rationale: The future passive of ἐκβάλλω is forceful. 'Thrown out' is vivid, natural modern English and preserves the sense of forcible expulsion. 'Cast out' is traditional and viable, but slightly more archaic.
- source_word: τὸ σκότος τὸ ἐξώτερον
  chosen: the outer darkness
  alternatives:
  - the darkness outside
  - the farthest darkness
  lexicon: BDAG
  rationale: This is a recognized Matthean expression. 'Outer darkness' preserves both the article and the comparative adjective functioning idiomatically, while remaining readable. 'Darkness outside' is possible but less idiomatic in English.
- source_word: κλαυθμός
  chosen: weeping
  alternatives:
  - wailing
  - crying
  lexicon: BDAG
  rationale: '''Weeping'' is the standard rendering in this collocation and conveys lament without overinterpreting intensity. ''Wailing'' may overstate the lexical force in this context.'
- source_word: βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: This fixed expression is well established in English and accurately reflects the Greek genitive construction. 'Grinding of teeth' is possible but less idiomatic and less recognizable as the biblical phrase.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks contrast with the previous statement about many coming from east and west to recline in the kingdom. 'But' best signals that contrast in English.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: A simple adverbial rendering is sufficient and natural. Retaining 'there' also preserves the emphatic location of the judgment scene.
