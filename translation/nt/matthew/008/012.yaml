theological_decisions:
- issue: Rendering of exclusion/judgment imagery without importing a fuller doctrinal system of final punishment
  chosen_reading: Retain the concrete imagery of expulsion into 'the outer darkness' and the stock phrase 'weeping and gnashing of teeth' without paraphrasing it into a systematic theological description.
  alternative_readings:
  - Interpretive renderings such as 'hell' or 'eternal punishment'
  rationale: The verse clearly depicts severe eschatological exclusion and anguish, but the Greek text itself uses metaphorical/judgment imagery rather than the specific term 'hell' here. Preserving the imagery maintains theological tension and avoids importing claims beyond the wording of the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Gender rendering of υἱοὶ
  chosen_reading: Use 'sons' rather than a gender-neutral substitute in the main text.
  alternative_readings:
  - children
  rationale: The Greek is grammatically masculine plural and functions as an idiomatic designation. Per the doctrine statement, gender-accurate renderings are preferred over gender-neutral ones unless context requires otherwise.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
revisions:
- timestamp: '2026-04-21T03:31:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/008/012.json
  category: awkward_english
  tier: 1
  from: There will be weeping and gnashing of teeth there.
  to: In that place there will be weeping and gnashing of teeth.
  rationale: The Greek word ἐκεῖ ('there') is placed at the beginning of the clause for emphasis on the location. The current rendering uses an existential 'There' at the start and a locative 'there' at the end, which is grammatically correct but slightly repetitive and less emphatic than the Greek. Rewriting to 'In that place...' better captures the Greek emphasis, avoids the awkward repetition, and aligns with the stylistic choice of many major English translations for this verse.
