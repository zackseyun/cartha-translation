theological_decisions:
- issue: Banquet imagery and eschatological fellowship
  chosen_reading: Retain the meal image with 'will recline at table' rather than flattening
    to mere presence.
  alternative_readings:
  - will sit down with Abraham and Isaac and Jacob
  rationale: The verse evokes eschatological banquet fellowship, not merely spatial
    inclusion. Preserving the dining image maintains the text's theological and cultural
    force without importing extra doctrinal detail.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Scope of 'many' from east and west
  chosen_reading: Render geographically and leave the implied inclusion of Gentiles
    unstated in the main text.
  alternative_readings:
  - many Gentiles will come from east and west
  rationale: The context strongly suggests inclusion beyond ethnic Israel, but the
    Greek text itself says 'many' from east and west, not explicitly 'Gentiles.' The
    translation preserves the implication without making it explicit.
  doctrine_reference: Translation philosophy §§1, 3
