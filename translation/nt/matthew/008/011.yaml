id: MAT.8.11
reference: Matthew 8:11
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ὅτι πολλοὶ ἀπὸ ἀνατολῶν καὶ δυσμῶν ἥξουσιν καὶ ἀνακλιθήσονται
    μετὰ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ ἐν τῇ βασιλείᾳ τῶν οὐρανῶν·
translation:
  text: But I tell you that many will come from east and west and will recline at
    table with Abraham and Isaac and Jacob in the kingdom of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will recline'; the expression refers to taking one's
      place at a banquet table.
    reason: cultural_note
  - marker: b
    text: '''From east and west'' likely implies people coming from far regions, including
      those outside Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I tell you
  - Now I tell you
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'I say/tell,' and δέ marks a mild contrast
    or development from the preceding statement. 'But I tell you' preserves the discourse
    turn naturally in English.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Many' is concise and natural,
    and English does not require an explicit noun.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  chosen: from east and west
  alternatives:
  - from the east and the west
  - from eastern regions and western regions
  lexicon: BDAG
  rationale: The plurals ἀνατολῶν and δυσμῶν are idiomatic for regions/directions.
    'From east and west' is idiomatic English and preserves the broad geographic sense
    without over-paraphrase.
- source_word: ἥξουσιν
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: ἥκω commonly means 'come/arrive.' 'Will come' fits the idiom of people
    coming from distant regions and is more natural in this context than 'arrive.'
- source_word: ἀνακλιθήσονται
  chosen: will recline at table
  alternatives:
  - will recline
  - will sit down to eat
  lexicon: BDAG
  rationale: The verb refers to reclining for a meal/banquet in ancient dining practice.
    'Will recline at table' preserves the banquet imagery while making the meal context
    explicit for modern readers.
- source_word: μετὰ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  chosen: with Abraham and Isaac and Jacob
  alternatives:
  - along with Abraham and Isaac and Jacob
  lexicon: BDAG
  rationale: μετά with the genitive means association, here table fellowship. The
    patriarchs' names are transliterated per translation policy.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  chosen: in the kingdom of heaven
  alternatives:
  - in the kingdom of the heavens
  lexicon: BDAG
  rationale: This is Matthew's characteristic expression. 'Kingdom of heaven' is the
    established and accurate singular English rendering for the genitival phrase,
    while 'kingdom of the heavens' would be overly literal and less idiomatic.
