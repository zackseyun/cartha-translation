id: MAT.8.22
reference: Matthew 8:22
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸀λέγει αὐτῷ· Ἀκολούθει μοι, καὶ ἄφες τοὺς νεκροὺς θάψαι τοὺς ἑαυτῶν
    νεκρούς.
translation:
  text: But Jesus says to him, “Follow me, and leave the dead to bury their own dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The first ''dead'' is often understood metaphorically: those who are spiritually
      unresponsive may bury the physically dead.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or continuation with the preceding request; 'But'
    best reflects Jesus' corrective response in context without overstating the contrast.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The Greek present is a historical present. Rendering it as 'says' preserves
    the narrative vividness of the source text more closely than smoothing to the
    English past tense.
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Come after me
  lexicon: BDAG
  rationale: A direct imperative of discipleship. 'Follow me' is the natural and established
    English equivalent and accurately conveys both literal following and committed
    discipleship.
- source_word: ἄφες
  chosen: leave
  alternatives:
  - allow
  - let
  lexicon: BDAG
  rationale: The aorist imperative here calls for relinquishing concern or responsibility.
    'Leave' is more direct and idiomatic in English than 'allow,' while 'let' can
    sound permissive rather than renunciatory.
- source_word: νεκρούς ... νεκρούς
  chosen: the dead ... dead
  alternatives:
  - dead people ... dead people
  - the spiritually dead ... dead
  lexicon: BDAG
  rationale: The repetition is deliberate and should be preserved. The first occurrence
    is likely metaphorical (those not responding to Jesus), while the second is literal
    (the physically dead), but the Greek uses the same word in both places; retaining
    'dead' in both positions preserves the rhetorical force and theological tension.
- source_word: θάψαι
  chosen: to bury
  alternatives:
  - bury
  lexicon: BDAG
  rationale: The infinitive after ἄφες is naturally rendered 'to bury' in English,
    preserving the Greek construction and clarity.
- source_word: τοὺς ἑαυτῶν νεκρούς
  chosen: their own dead
  alternatives:
  - their dead
  lexicon: BDAG
  rationale: ἑαυτῶν adds reflexive possession/emphasis. 'Their own dead' preserves
    that emphasis better than the flatter 'their dead.'
