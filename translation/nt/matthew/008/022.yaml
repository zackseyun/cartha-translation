theological_decisions:
- issue: Interpretation of 'the dead' in Jesus' saying
  chosen_reading: Main text preserves the literal wording 'the dead ... their own
    dead' without explicating the first occurrence as 'spiritually dead.'
  alternative_readings:
  - The first 'dead' refers metaphorically to the spiritually dead; the second refers
    to the physically dead.
  rationale: The saying likely involves intentional wordplay and theological provocation.
    The translation should preserve the tension rather than resolve it in the main
    text. Because the Greek itself does not insert 'spiritually,' adding it would
    over-interpret. The likely metaphorical sense is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
