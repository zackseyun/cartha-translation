theological_decisions:
- issue: Rendering of διδάσκαλος as a title for Jesus
  chosen_reading: Teacher
  alternative_readings:
  - Master
  - Rabbi
  rationale: The verse presents respectful address to Jesus without requiring a heightened
    christological title. 'Teacher' reflects the lexical meaning and avoids importing
    doctrinal weight not explicit in the text.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological
    tension rather than resolve it.'
