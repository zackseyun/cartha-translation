id: MAT.8.19
reference: Matthew 8:19
source:
  edition: SBLGNT
  text: καὶ προσελθὼν εἷς γραμματεὺς εἶπεν αὐτῷ· Διδάσκαλε, ἀκολουθήσω σοι ὅπου ἐὰν
    ἀπέρχῃ.
translation:
  text: And one scribe came up and said to him, “Teacher, I will follow you wherever
    you go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “wherever you depart/go away.” The Greek verb can more specifically denote
      going away or departing, though here it functions naturally as “go.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating movement toward Jesus prior
    to speaking. 'Came up' is natural modern English and preserves the approach sense
    without sounding wooden.
- source_word: εἷς
  chosen: one
  alternatives:
  - a certain
  - one of the
  lexicon: BDAG
  rationale: 'The numeral functions idiomatically to introduce an individual: ''one
    scribe.'' This preserves the Greek specificity better than simply omitting it.'
- source_word: γραμματεὺς
  chosen: scribe
  alternatives:
  - teacher of the law
  - legal expert
  lexicon: BDAG
  rationale: '''Scribe'' is the standard and sufficiently transparent rendering for
    γραμματεύς in Gospel narrative. Alternatives are more interpretive and context-expanding
    than the Greek itself.'
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  - Rabbi
  lexicon: BDAG
  rationale: διδάσκαλος is best translated rather than transliterated here. 'Teacher'
    preserves the direct address and avoids importing the stronger connotations of
    'Master' or the untranslated Jewish title 'Rabbi.'
- source_word: ἀκολουθήσω
  chosen: I will follow
  alternatives:
  - I shall follow
  - I will become a follower of
  lexicon: BDAG
  rationale: Future indicative expressing the man's declared intention. 'I will follow'
    is direct and idiomatic, preserving both the literal and discipleship sense.
- source_word: ὅπου ἐὰν
  chosen: wherever
  alternatives:
  - wherever it may be that
  - where
  lexicon: BDAG
  rationale: The combination ὅπου ἐὰν conveys an indefinite relative sense, naturally
    rendered 'wherever.' This captures the open-ended scope of the promise.
- source_word: ἀπέρχῃ
  chosen: you go
  alternatives:
  - you depart
  - you go away
  lexicon: BDAG
  rationale: Although ἀπέρχομαι can more literally mean 'go away' or 'depart,' in
    this context idiomatic English prefers 'go.' The sense is movement to whatever
    destination Jesus chooses.
