id: MAT.8.4
reference: Matthew 8:4
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Ὅρα μηδενὶ εἴπῃς, ἀλλὰ ὕπαγε σεαυτὸν δεῖξον τῷ ἱερεῖ,
    καὶ προσένεγκον τὸ δῶρον ὃ προσέταξεν Μωϋσῆς εἰς μαρτύριον αὐτοῖς.
translation:
  text: And Jesus said to him, “See that you tell no one, but go, show yourself to
    the priest, and offer the gift that Moses commanded, as a testimony to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for a testimony to them”; the phrase may refer to evidence presented
      to the priests, and some understand it as an implicit witness against those
      who would not believe.
    reason: alternative_reading
  - marker: b
    text: This instruction reflects the Mosaic procedure for a person cleansed of
      leprosy; see Leviticus 14.
    reason: cross_reference
lexical_decisions:
- source_word: Ὅρα
  chosen: See that
  alternatives:
  - Take care
  - See
  lexicon: BDAG
  rationale: Imperative of ὁράω used idiomatically as a warning or charge. 'See that'
    captures the force in natural English better than a bare 'See' while preserving
    the imperative sense.
- source_word: μηδενὶ εἴπῃς
  chosen: you tell no one
  alternatives:
  - say nothing to anyone
  - tell nobody
  lexicon: BDAG
  rationale: The dative μηδενί with aorist subjunctive after Ὅρα expresses prohibition.
    'Tell no one' is concise and idiomatic, preserving the personal indirect object.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: Simple imperative of movement. 'Go' is the most natural English equivalent
    here.
- source_word: σεαυτὸν δεῖξον τῷ ἱερεῖ
  chosen: show yourself to the priest
  alternatives:
  - present yourself to the priest
  lexicon: BDAG
  rationale: A direct rendering of the reflexive construction. 'Show yourself' preserves
    the wording and alludes to priestly inspection required for a cleansed leper.
- source_word: ἱερεῖ
  chosen: the priest
  alternatives:
  - a priest
  lexicon: BDAG
  rationale: The article likely points to the appropriate priestly official in the
    Mosaic procedure rather than any priest generically; 'the priest' best reflects
    the Greek.
- source_word: προσένεγκον
  chosen: offer
  alternatives:
  - bring
  - present
  lexicon: BDAG
  rationale: Cultic context favors 'offer' rather than merely 'bring,' since the gift
    is a prescribed sacrificial presentation.
- source_word: τὸ δῶρον
  chosen: the gift
  alternatives:
  - the offering
  lexicon: BDAG
  rationale: δῶρον commonly denotes a gift or offering in sacrificial contexts. 'Gift'
    is retained because it is the direct lexical equivalent, while the cultic sense
    is already conveyed by 'offer.'
- source_word: ὃ προσέταξεν Μωϋσῆς
  chosen: that Moses commanded
  alternatives:
  - that Moses prescribed
  - which Moses commanded
  lexicon: BDAG
  rationale: προστάσσω means to command or prescribe. 'Commanded' is straightforward
    and preserves Mosaic authority without overinterpreting.
- source_word: εἰς μαρτύριον αὐτοῖς
  chosen: as a testimony to them
  alternatives:
  - for a testimony to them
  - as evidence to them
  lexicon: BDAG
  rationale: εἰς + accusative here expresses purpose/result. 'As a testimony to them'
    is idiomatic and preserves the somewhat open-ended force of μαρτύριον without
    deciding whether the testimony is favorable or confrontational.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to the priests
  - to the people
  lexicon: BDAG
  rationale: The pronoun's referent is not explicit in the verse. The translation
    preserves the Greek ambiguity rather than specifying a group.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus said to him
  alternatives:
  - Jesus says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative
    style normally renders it as simple past. This is a standard optimal-equivalence
    adjustment for readability.
