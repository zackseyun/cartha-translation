theological_decisions:
- issue: Referent and force of 'as a testimony to them'
  chosen_reading: Retain the ambiguous wording without specifying whether the testimony
    is to priests, the public, or Israel's leaders, and without deciding whether it
    is positive proof or implicit witness against unbelief.
  alternative_readings:
  - as proof to the priests
  - as a testimony against them
  rationale: The Greek αὐτοῖς does not identify the referent explicitly, and μαρτύριον
    can function broadly as testimony/evidence. Preserving the ambiguity follows the
    translation philosophy of not resolving tensions the text itself leaves open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
