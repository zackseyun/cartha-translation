theological_decisions:
- issue: Purity/healing language in καθαρίζω
  chosen_reading: Render with 'cleanse' language in both command and result
  alternative_readings:
  - Render with 'heal' language
  rationale: The Greek emphasizes cleansing, which in this context carries both physical
    and ritual significance. Translating as 'heal' alone would flatten the theological
    and cultic dimension of the miracle.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Meaning of Θέλω in Jesus' reply
  chosen_reading: I am willing
  alternative_readings:
  - I will
  rationale: The leper's prior appeal concerns Jesus' willingness. Rendering Θέλω
    as 'I am willing' preserves the interpersonal and theological force of Jesus'
    compassionate consent without importing a future-tense nuance.
  doctrine_reference: Translation philosophy §1
