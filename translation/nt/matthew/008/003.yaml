theological_decisions:
- issue: Purity/healing language in καθαρίζω
  chosen_reading: Render with 'cleanse' language in both command and result
  alternative_readings:
  - Render with 'heal' language
  rationale: The Greek emphasizes cleansing, which in this context carries both physical and ritual significance. Translating as 'heal' alone would flatten the theological and cultic dimension of the miracle.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Meaning of Θέλω in Jesus' reply
  chosen_reading: I am willing
  alternative_readings:
  - I will
  rationale: The leper's prior appeal concerns Jesus' willingness. Rendering Θέλω as 'I am willing' preserves the interpersonal and theological force of Jesus' compassionate consent without importing a future-tense nuance.
  doctrine_reference: Translation philosophy §1
revisions:
- timestamp: '2026-04-21T03:27:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/008/003.json
  category: awkward_english
  tier: 1
  from: his leprosy was cleansed
  to: he was cleansed of his leprosy
  rationale: The current rendering is a direct and formal translation of the Greek, where 'ἡ λέπρα' (the leprosy) is the subject of the verb 'ἐκαθαρίσθη' (was cleansed). While this is a valid choice that preserves the source syntax, it is slightly unnatural in contemporary English. We more commonly say a person is cleansed *of* a disease. The suggested rewrite is more idiomatic, though it does shift the grammatical subject from the disease to the person.
