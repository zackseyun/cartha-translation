id: MAT.8.3
reference: Matthew 8:3
source:
  edition: SBLGNT
  text: καὶ ἐκτείνας τὴν χεῖρα ἥψατο ⸀αὐτοῦ λέγων· Θέλω, καθαρίσθητι· καὶ εὐθέως ἐκαθαρίσθη αὐτοῦ ἡ λέπρα.
translation:
  text: And stretching out his hand, he touched him, saying, “I am willing; be cleansed.” And immediately he was cleansed of his leprosy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will; be made clean.”
    reason: lexical_alternative
  - marker: b
    text: “Leprosy” translates Greek λέπρα, a term that may refer more broadly to serious skin diseases than modern Hansen’s disease specifically.
    reason: cultural_note
  - marker: c
    text: Or 'his leprosy was cleansed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐκτείνας τὴν χεῖρα
  chosen: stretching out his hand
  alternatives:
  - extended his hand
  - reached out his hand
  lexicon: BDAG
  rationale: The aorist participle with χείρ is naturally rendered as a preceding attendant action. 'Stretching out his hand' is idiomatic and preserves the concrete physical gesture without over-paraphrase.
- source_word: ἥψατο αὐτοῦ
  chosen: he touched him
  alternatives:
  - he took hold of him
  lexicon: BDAG
  rationale: Middle ἅπτομαι commonly means 'touch' with a genitive object. 'Touched him' is the plain sense and fits the healing context.
- source_word: Θέλω
  chosen: I am willing
  alternatives:
  - I will
  - I want to
  lexicon: BDAG
  rationale: In this context Jesus is responding to the leper's request about willingness, not merely issuing a future action. 'I am willing' best conveys volition in natural English and matches the immediate healing command.
- source_word: καθαρίσθητι
  chosen: be cleansed
  alternatives:
  - be made clean
  - be purified
  lexicon: BDAG
  rationale: The passive imperative calls for the removal of ritual/physical uncleanness. 'Be cleansed' preserves both the physical and purity dimensions better than the more colloquial 'be made clean.'
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: '''Immediately'' is a standard rendering that preserves Matthew''s emphasis on the instantaneous result.'
- source_word: ἐκαθαρίσθη
  chosen: was cleansed
  alternatives:
  - was made clean
  - was healed
  lexicon: BDAG
  rationale: Using 'was cleansed' maintains lexical consistency with καθαρίσθητι and preserves the purity language present in the Greek, rather than reducing it to mere healing.
- source_word: ἡ λέπρα
  chosen: his leprosy
  alternatives:
  - the leprosy
  - his skin disease
  lexicon: BDAG
  rationale: λέπρα in biblical usage refers to a condition traditionally rendered 'leprosy.' Retaining the traditional term preserves recognizability, while the possessive reflects αὐτοῦ. Although the disease category may not map exactly to modern Hansen's disease, the traditional rendering remains the most suitable main-text choice.
