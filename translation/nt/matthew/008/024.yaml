id: MAT.8.24
reference: Matthew 8:24
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ σεισμὸς μέγας ἐγένετο ἐν τῇ θαλάσσῃ, ὥστε τὸ πλοῖον καλύπτεσθαι ὑπὸ
    τῶν κυμάτων, αὐτὸς δὲ ἐκάθευδεν.
translation:
  text: And behold, a great storm arose on the sea, so that the boat was being covered
    by the waves; but he was sleeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek σεισμός literally often means 'earthquake' or 'shaking'; here, in
      context, it refers to a violent storm at sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retains the discourse marker's vivid, attention-directing force. 'Behold'
    is slightly traditional but still understandable and better preserves the abruptness
    than omitting it.
- source_word: σεισμὸς μέγας
  chosen: a great storm
  alternatives:
  - a great earthquake
  - a great shaking
  lexicon: BDAG
  rationale: Although σεισμός often means 'earthquake,' in this maritime context with
    sea, boat, and waves, it denotes a violent upheaval/storm. 'Great storm' communicates
    the contextual sense in natural English without forcing the more literal but misleading
    'earthquake.'
- source_word: ἐγένετο
  chosen: arose
  alternatives:
  - happened
  - came about
  - occurred
  lexicon: BDAG
  rationale: With a weather/event subject, 'arose' is idiomatic English and conveys
    the onset of the storm more naturally than the generic 'happened' or 'occurred.'
- source_word: ἐν τῇ θαλάσσῃ
  chosen: on the sea
  alternatives:
  - in the sea
  - on the lake
  lexicon: BDAG
  rationale: ἐν with θάλασσα here refers to the location of the event on the body
    of water where the boat was. 'On the sea' is idiomatic. 'Lake' could reflect the
    Sea of Galilee's geography, but the Greek says 'sea,' so the translation preserves
    the source term.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so as to
  lexicon: BDAG
  rationale: This conjunction introduces the result of the storm's violence. 'So that'
    is clear, natural, and sufficiently formal.
- source_word: τὸ πλοῖον
  chosen: the boat
  alternatives:
  - the ship
  lexicon: BDAG
  rationale: πλοῖον can be 'boat' or 'ship'; in the Gospel setting on the Sea of Galilee,
    'boat' is the more natural English choice.
- source_word: καλύπτεσθαι
  chosen: was being covered
  alternatives:
  - was being swamped
  - was being hidden
  lexicon: BDAG
  rationale: 'The present passive infinitive emphasizes ongoing action/result: the
    waves were covering the boat. ''Was being covered'' preserves that sense more
    directly than the interpretive ''was being swamped,'' though the latter is contextually
    close.'
- source_word: ὑπὸ τῶν κυμάτων
  chosen: by the waves
  alternatives:
  - under the waves
  lexicon: BDAG
  rationale: 'ὑπό with the genitive marks agency/instrument in the passive construction:
    the waves were the means by which the boat was being covered.'
- source_word: αὐτὸς δὲ
  chosen: but he
  alternatives:
  - yet he
  - and he himself
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic in contrast to the chaos around him.
    'But he' captures the contrast succinctly; adding 'himself' would overemphasize
    in English.
- source_word: ἐκάθευδεν
  chosen: was sleeping
  alternatives:
  - slept
  - was asleep
  lexicon: BDAG
  rationale: The imperfect indicates ongoing past action/state. 'Was sleeping' best
    reflects the aspect and the contrast with the storm.
