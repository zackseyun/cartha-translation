theological_decisions:
- issue: Nature of the event described by σεισμός
  chosen_reading: Rendered contextually as 'storm' rather than the more literal but
    misleading 'earthquake.'
  alternative_readings:
  - Rendered literally as 'earthquake' or 'shaking'
  rationale: This is a lexical-contextual decision rather than a doctrinal one. The
    surrounding maritime imagery requires an English rendering that communicates a
    violent storm at sea without importing a land-based earthquake image foreign to
    the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
