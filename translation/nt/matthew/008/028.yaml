theological_decisions:
- issue: Rendering of demonic affliction language
  chosen_reading: demon-possessed
  alternative_readings:
  - demonized
  - under the power of demons
  rationale: The verse presents real personal demonic agency without requiring a more technical or novel English term. 'Demon-possessed' is the clearest established rendering and does not add claims beyond the Greek participle's sense of demonic domination.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Toponym textual variation in the Synoptic tradition
  chosen_reading: Gadarenes
  alternative_readings:
  - Gergesenes
  - Gerasenes
  rationale: The SBLGNT text here reads Γαδαρηνῶν, so the main text follows the printed Greek. Other place-name forms are preserved in a footnote because they are well-known variants in the manuscript tradition and parallel accounts.
  doctrine_reference: Translation philosophy §1; preserve alternatives in footnotes where relevant
revisions:
- timestamp: '2026-04-21T03:37:54Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/008/028.json
  category: awkward_english
  tier: 1
  from: pass by that road
  to: pass along that road
  rationale: The phrase 'pass by that road' is slightly unnatural in English. One typically passes 'along' a road or 'on' a road. The current phrasing could be interpreted as moving past the road as if it were a landmark, rather than traveling upon it. The Greek 'διὰ τῆς ὁδοῦ' indicates the route of travel, which 'pass along that road' or 'pass by on that road' captures more idiomatically.
