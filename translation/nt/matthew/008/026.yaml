id: MAT.8.26
reference: Matthew 8:26
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Τί δειλοί ἐστε, ὀλιγόπιστοι; τότε ἐγερθεὶς ἐπετίμησεν τοῖς
    ἀνέμοις καὶ τῇ θαλάσσῃ, καὶ ἐγένετο γαλήνη μεγάλη.
translation:
  text: And he said to them, “Why are you fearful, you of little faith?” Then, having
    risen, he rebuked the winds and the sea, and there was a great calm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cowardly.' The Greek δειλοί can denote fearfulness or cowardice; here
      it refers to the disciples' fearful response in contrast to faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    normally renders it with a past tense for natural readability while preserving
    the narrative flow.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: 'In this idiom with a predicate adjective and εἰμί, τί functions adverbially
    to ask the reason or cause: ''Why are you...?'' rather than the more wooden ''What
    are you...?'''
- source_word: δειλοί
  chosen: fearful
  alternatives:
  - afraid
  - cowardly
  - timid
  lexicon: BDAG
  rationale: The term can carry the sense of being cowardly or timid, but in this
    immediate context Jesus addresses their fear in the storm. 'Fearful' preserves
    the rebuking tone without overreading it as a settled character judgment.
- source_word: ὀλιγόπιστοι
  chosen: you of little faith
  alternatives:
  - little-faith ones
  - you with little faith
  lexicon: BDAG
  rationale: This is a characteristic Matthean expression. 'You of little faith' is
    idiomatic English that preserves both the direct address and the evaluative force
    tied to deficient faith.
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: A simple temporal connector is best here; 'Then' is natural and sufficiently
    precise.
- source_word: ἐγερθεὶς
  chosen: having risen
  alternatives:
  - getting up
  - rising
  lexicon: BDAG
  rationale: The aorist participle denotes action prior to the main verb. 'Having
    risen' preserves that sequence more clearly than a looser paraphrase.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - commanded sternly
  - censured
  lexicon: BDAG
  rationale: '''Rebuked'' is the standard and contextually fitting rendering, especially
    in Gospel narratives where Jesus addresses forces with authority. It preserves
    the personal, authoritative force of the verb.'
- source_word: ἀνέμοις
  chosen: the winds
  alternatives:
  - the wind
  lexicon: BDAG
  rationale: The Greek is plural, so 'the winds' should be retained rather than smoothed
    into singular.
- source_word: θαλάσσῃ
  chosen: the sea
  alternatives:
  - the lake
  - the waters
  lexicon: BDAG
  rationale: Although geographically the Sea of Galilee is a lake, the Greek noun
    is 'sea,' and the translation should follow the source wording.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - it became
  - there came to be
  lexicon: BDAG
  rationale: An existential rendering is the most natural English expression here
    and accurately conveys the resulting state.
- source_word: γαλήνη μεγάλη
  chosen: a great calm
  alternatives:
  - a great stillness
  - complete calm
  lexicon: BDAG
  rationale: This preserves both the noun 'calm' and the emphatic adjective 'great,'
    reflecting the sudden and remarkable nature of the stilling.
