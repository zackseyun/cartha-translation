theological_decisions:
- issue: Force of Jesus' rebuke to the disciples
  chosen_reading: Rendered δειλοί as 'fearful' rather than the harsher 'cowardly.'
  alternative_readings:
  - cowardly
  - timid
  rationale: The verse presents a real rebuke for deficient faith, but the translation
    should not intensify the moral condemnation beyond what the immediate storm context
    requires. 'Fearful' preserves the theological tension between understandable human
    fear and culpable lack of faith.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Jesus' authority over creation
  chosen_reading: Retained the personal verb 'rebuked' for the winds and the sea.
  alternative_readings:
  - commanded the winds and the sea
  rationale: The wording should preserve the text's portrayal of Jesus exercising
    direct authority over creation without flattening the vividness of the Greek.
    This aligns with historic orthodoxy while not adding claims beyond the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
