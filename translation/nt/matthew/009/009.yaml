theological_decisions:
- issue: Nature of Jesus' summons to Matthew
  chosen_reading: Render Ἀκολούθει μοι simply as 'Follow me' without expanding it
    into a technical call narrative formula.
  alternative_readings:
  - Come be my disciple
  - Join me
  rationale: The verse clearly depicts a summons into discipleship, but the translation
    should not import explanatory wording beyond the Greek. The theological significance
    is preserved by the plain imperative itself.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
