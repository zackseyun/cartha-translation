id: MAT.9.9
reference: Matthew 9:9
source:
  edition: SBLGNT
  text: Καὶ παράγων ὁ Ἰησοῦς ἐκεῖθεν εἶδεν ἄνθρωπον καθήμενον ἐπὶ τὸ τελώνιον, Μαθθαῖον
    λεγόμενον, καὶ λέγει αὐτῷ· Ἀκολούθει μοι· καὶ ἀναστὰς ἠκολούθησεν αὐτῷ.
translation:
  text: And as Jesus was passing on from there, he saw a man called Matthew sitting
    at the tax booth, and he says to him, “Follow me.” And he rose and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “named Matthew.”
    reason: lexical_alternative
  - marker: b
    text: Or “he said”; Greek uses a historical present (“he says”) for vividness.
    reason: lexical_alternative
  - marker: c
    text: Or “he got up and followed him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παράγων
  chosen: as Jesus was passing on
  alternatives:
  - as Jesus passed by
  - going on
  lexicon: BDAG
  rationale: Present participle with narrative force; 'was passing on' preserves the
    ongoing action while remaining natural English. 'Passing on from there' reflects
    movement away from the previous location.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Straightforward adverb of place; 'from there' is idiomatic and sufficiently
    formal.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun here refers to a specific male individual, so 'a man' is gender-accurate
    rather than gender-neutral.
- source_word: καθήμενον ἐπὶ τὸ τελώνιον
  chosen: sitting at the tax booth
  alternatives:
  - sitting at the tax office
  - sitting at the toll booth
  lexicon: BDAG
  rationale: The participle plus prepositional phrase describes Matthew stationed
    at his place of tax collection. 'Tax booth' is clear modern English and fits the
    likely setting better than the more institutional 'tax office.'
- source_word: Μαθθαῖον λεγόμενον
  chosen: called Matthew
  alternatives:
  - named Matthew
  lexicon: BDAG
  rationale: λεγόμενον commonly introduces the name by which someone is known. 'Called
    Matthew' is concise and idiomatic.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present. Rendering it as 'he says' preserves
    the vividness of the narrative; this is a documented exception to smoothing all
    narrative verbs into past tense.
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Come, follow me
  lexicon: BDAG
  rationale: Present imperative calling for discipleship and attachment. 'Follow me'
    is the standard and precise rendering without adding words not present in the
    Greek.
- source_word: ἀναστὰς
  chosen: he rose
  alternatives:
  - he got up
  - standing up
  lexicon: BDAG
  rationale: Aorist participle indicating the immediate response preceding the main
    verb. 'He rose' is slightly more formal and compact, matching the narrative sequence.
- source_word: ἠκολούθησεν αὐτῷ
  chosen: followed him
  alternatives:
  - became his follower
  lexicon: BDAG
  rationale: Aorist indicative narrating Matthew's concrete response to Jesus' summons.
    'Followed him' preserves both the literal action and discipleship implication
    without paraphrase.
