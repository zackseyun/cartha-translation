id: MAT.9.1
reference: Matthew 9:1
source:
  edition: SBLGNT
  text: Καὶ ⸀ἐμβὰς ⸀εἰς πλοῖον διεπέρασεν καὶ ἦλθεν εἰς τὴν ἰδίαν πόλιν.
translation:
  text: And after getting into a boat, he crossed over and came to his own city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his hometown.' The Greek says 'his own city,' which may refer to the
      city associated with him in this stage of the narrative, likely Capernaum.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβὰς
  chosen: after getting into
  alternatives:
  - having entered
  - boarding
  lexicon: BDAG
  rationale: Aorist participle of ἐμβαίνω, temporally prior to the main verbs. 'After
    getting into' gives natural English while preserving the participial sequence
    better than a flat coordinate verb.
- source_word: πλοῖον
  chosen: a boat
  alternatives:
  - the boat
  - a ship
  lexicon: BDAG
  rationale: πλοῖον is a general term for a watercraft; in the Sea of Galilee context,
    'boat' is more idiomatic and proportionate than 'ship.' The anarthrous noun is
    well rendered 'a boat.'
- source_word: διεπέρασεν
  chosen: he crossed over
  alternatives:
  - he crossed
  - he went across
  lexicon: BDAG
  rationale: διαπεράω commonly means to cross over from one side to another, especially
    by water. 'Crossed over' preserves the directional nuance.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: ἔρχομαι is most basically 'come/go'; 'came' is the straightforward rendering
    here and matches the narrative perspective.
- source_word: ἰδίαν πόλιν
  chosen: his own city
  alternatives:
  - his hometown
  - the city of his own
  lexicon: BDAG
  rationale: ἴδιος adds the sense of belonging or association. 'His own city' is the
    most direct rendering and preserves the possessive emphasis without overinterpreting
    as strictly 'hometown.'
- source_word: Καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Now ... and
  - Then ... and
  lexicon: BDAG
  rationale: The repeated καί links the actions in simple narrative sequence. Retaining
    'And' at the start reflects Matthew's connective style without sounding overly
    wooden.
