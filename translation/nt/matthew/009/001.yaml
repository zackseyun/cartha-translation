theological_decisions:
- issue: Referent of 'his own city'
  chosen_reading: Rendered neutrally as 'his own city' without specifying the city
    in the main text.
  alternative_readings:
  - understood as Capernaum from the Matthean narrative context
  - understood more generally as his home base in Galilee
  rationale: The Greek text itself does not name the city. The translation should
    preserve the wording of the source and not import an identification into the main
    text, even if the context strongly suggests Capernaum.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
