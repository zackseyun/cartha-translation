theological_decisions:
- issue: Metaphorical force of harvest saying
  chosen_reading: Retain the agricultural metaphor without explicating its missional
    referent in the translation.
  alternative_readings:
  - Paraphrase to make explicit that the harvest refers to people ready to receive
    Jesus' ministry
  rationale: The verse itself states the metaphor and does not unpack it fully until
    the surrounding context. Optimal equivalence preserves the image rather than importing
    interpretation into the main text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
