id: MAT.9.37
reference: Matthew 9:37
source:
  edition: SBLGNT
  text: τότε λέγει τοῖς μαθηταῖς αὐτοῦ· Ὁ μὲν θερισμὸς πολύς, οἱ δὲ ἐργάται ὀλίγοι·
translation:
  text: Then he says to his disciples, “The harvest indeed is plentiful, but the workers
    are few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The harvest is abundant, but the laborers are few.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses a historical present: “he says.” Some translations render it
      “he said.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence; 'Then' is the natural concise
    English equivalent.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Greek present in narrative commonly functions as a historical present.
    Rendering as present ('he says') preserves the vividness of the Greek; English
    remains natural in this context.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit and should be retained. 'Disciples'
    is the standard rendering of μαθηταῖς.
- source_word: Ὁ μὲν ... οἱ δὲ
  chosen: indeed ... but
  alternatives:
  - on the one hand ... on the other hand
  - while ... but
  lexicon: BDAG
  rationale: The μέν...δέ construction sets up a contrast. 'Indeed ... but' preserves
    the discourse force in idiomatic English without sounding wooden.
- source_word: θερισμός
  chosen: harvest
  alternatives:
  - crop
  - reaping
  lexicon: BDAG
  rationale: '''Harvest'' is the established and contextually fitting rendering, preserving
    the agricultural metaphor that frames the mission context.'
- source_word: πολύς
  chosen: plentiful
  alternatives:
  - great
  - abundant
  - large
  lexicon: BDAG
  rationale: With 'harvest,' 'plentiful' is idiomatic modern English and conveys abundance
    clearly.
- source_word: ἐργάται
  chosen: workers
  alternatives:
  - laborers
  - workmen
  lexicon: BDAG
  rationale: '''Workers'' is clear, modern, and accurately reflects those who labor
    in the harvest. ''Laborers'' is possible but slightly less natural for the target
    readership.'
- source_word: ὀλίγοι
  chosen: few
  alternatives:
  - too few
  lexicon: BDAG
  rationale: Simple predicate adjective contrasting with 'plentiful'; 'few' is the
    direct and sufficient rendering.
