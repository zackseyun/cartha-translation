id: MAT.9.19
reference: Matthew 9:19
source:
  edition: SBLGNT
  text: καὶ ἐγερθεὶς ὁ Ἰησοῦς ⸀ἠκολούθει αὐτῷ καὶ οἱ μαθηταὶ αὐτοῦ.
translation:
  text: And Jesus rose and followed him, and his disciples did too.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγερθεὶς
  chosen: rose
  alternatives:
  - got up
  - having arisen
  lexicon: BDAG
  rationale: Aorist passive participle of ἐγείρω used in an intransitive sense here,
    introducing the next action. 'Rose' is concise, natural English and preserves
    the movement from sitting to going. 'Having arisen' is more formally precise but
    less natural in running narrative; 'got up' is possible but slightly more colloquial.
- source_word: ἠκολούθει
  chosen: followed
  alternatives:
  - was following
  - went with
  lexicon: BDAG
  rationale: Imperfect of ἀκολουθέω can suggest ongoing action, but in narrative English
    the simple past 'followed' best conveys the event without awkwardness. 'Was following'
    overemphasizes progressive aspect here; 'went with' weakens the discipleship/trailing
    nuance of the verb.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative pronoun governed by ἀκολουθέω, which in English idiom is rendered
    directly as 'followed him,' not 'followed to him.' The antecedent is the ruler
    from the previous verse.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and most contextually accurate rendering
    for μαθηταί in the Gospels, preserving the teacher-disciple relationship. ''Students''
    is too academic; ''followers'' is too broad and loses the technical sense.'
- source_word: καὶ οἱ μαθηταὶ αὐτοῦ
  chosen: and his disciples did too
  alternatives:
  - and his disciples followed him
  - and his disciples also
  lexicon: BDAG
  rationale: The Greek omits the repeated verb after καὶ, so English may either repeat
    it explicitly or supply an idiomatic ellipsis. 'Did too' preserves the coordinated
    ellipsis naturally in modern English. The possessive αὐτοῦ refers to Jesus, yielding
    'his disciples.'
