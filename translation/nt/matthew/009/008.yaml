theological_decisions:
- issue: Whether the crowd's reaction should be softened from fear to awe
  chosen_reading: they were afraid
  alternative_readings:
  - they were filled with awe
  rationale: The Greek verb plainly denotes fear. Although reverential awe is contextually
    possible, the translation preserves the stronger lexical sense rather than resolving
    the emotional nuance interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering τοῖς ἀνθρώποις
  chosen_reading: to men
  alternative_readings:
  - to people
  - to human beings
  rationale: The Greek is grammatically masculine plural and may carry representative
    force. Per the doctrine's gender-accurate principle, 'men' is retained in the
    main text, while an inclusive alternative is preserved in a footnote for readers
    who may otherwise take it as male-exclusive.
  doctrine_reference: Gender-accurate over gender-neutral.
