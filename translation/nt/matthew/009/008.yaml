id: MAT.9.8
reference: Matthew 9:8
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ ὄχλοι ⸀ἐφοβήθησαν καὶ ἐδόξασαν τὸν θεὸν τὸν δόντα ἐξουσίαν τοιαύτην
    τοῖς ἀνθρώποις.
translation:
  text: But when the crowds saw it, they were afraid and glorified God, who had given
    such authority to men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were filled with awe.' The Greek verb more literally means 'were afraid,'
      but the fear may include reverent amazement.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to people'' or ''to human beings.'' Greek: ''to men,'' which can function
      representatively for humans in general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when the crowds saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered temporally in natural English.
    'Saw it' supplies the implied object from context (the healing/forgiveness event)
    without over-paraphrasing.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative transition/contrast. 'But' fits the shift to the crowd's
    reaction better than a simple 'and'.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: Plural noun is best preserved as 'the crowds.' 'Multitudes' is traditional
    but less natural in modern English.
- source_word: ἐφοβήθησαν
  chosen: were afraid
  alternatives:
  - feared
  - were filled with awe
  lexicon: BDAG
  rationale: The verb φοβέομαι ordinarily means 'fear/be afraid.' While the context
    may include awe, 'were afraid' stays closer to the lexical sense and preserves
    the tension of the reaction.
- source_word: ἐδόξασαν
  chosen: glorified
  alternatives:
  - praised
  - gave glory to
  lexicon: BDAG
  rationale: δοξάζω is a key theological verb meaning 'glorify.' Retaining 'glorified'
    preserves lexical consistency and theological weight.
- source_word: τὸν θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἐδόξασαν; standard rendering.
- source_word: τὸν δόντα
  chosen: who had given
  alternatives:
  - who gave
  - the one who gave
  lexicon: BDAG
  rationale: Articular aorist participle functions attributively with θεόν. 'Who had
    given' is idiomatic English relative-clause rendering and reflects prior action
    relative to the crowd's response.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated authority/right more precisely than mere power.
    This is important in the context of Jesus' authority to forgive sins.
- source_word: τοιαύτην
  chosen: such
  alternatives:
  - this kind of
  - so great a
  lexicon: BDAG
  rationale: τοιαύτην modifies ἐξουσίαν and is naturally rendered 'such' in English.
- source_word: τοῖς ἀνθρώποις
  chosen: to men
  alternatives:
  - to human beings
  - to people
  lexicon: BDAG
  rationale: ἄνθρωποι can mean humans generally, but here the plural 'men' preserves
    the gender-accurate form of the Greek while still allowing representative force.
    It also preserves the narrative tension that the crowds speak of authority given
    'to men,' in response to Jesus' exercise of it.
