id: MAT.9.38
reference: Matthew 9:38
source:
  edition: SBLGNT
  text: δεήθητε οὖν τοῦ κυρίου τοῦ θερισμοῦ ὅπως ἐκβάλῃ ἐργάτας εἰς τὸν θερισμὸν αὐτοῦ.
translation:
  text: Therefore pray earnestly to the Lord of the harvest that he would send out
    workers into his harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drive out' workers; the Greek verb is stronger than simple 'send,' though
      here it refers to dispatching laborers into the harvest.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεήθητε
  chosen: pray earnestly
  alternatives:
  - implore
  - beseech
  - pray
  lexicon: BDAG
  rationale: Aorist passive imperative of δέομαι in Koine usage means to ask urgently
    or entreat. 'Pray earnestly' preserves both the prayer context and the sense of
    urgency better than the flatter 'pray' while remaining natural English.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding statement about the plentiful harvest
    and few workers. 'Therefore' makes the logical connection explicit in clear modern
    English.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: DOCTRINE.md lists κύριος with default rendering 'Lord.' Here it denotes
    the one who has authority over the harvest; 'Lord' preserves both authority and
    biblical usage.
- source_word: θερισμοῦ
  chosen: harvest
  lexicon: BDAG
  rationale: Standard meaning is 'harvest.' The metaphor of mission/ingathering should
    be preserved rather than paraphrased.
- source_word: ὅπως
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the prayer. 'That' is idiomatic after
    'pray' in English and avoids stiffness.
- source_word: ἐκβάλῃ
  chosen: send out
  alternatives:
  - cast out
  - drive out
  - send forth
  lexicon: BDAG
  rationale: ἐκβάλλω is literally forceful ('cast out/drive out'), but in this context
    refers to dispatching laborers into the harvest. 'Send out' is the most natural
    contextual rendering, while the stronger nuance is worth preserving in a footnote.
- source_word: ἐργάτας
  chosen: workers
  alternatives:
  - laborers
  lexicon: BDAG
  rationale: Refers to those who work in the harvest. 'Workers' is clear modern English;
    'laborers' is possible but slightly less natural for the target audience.
- source_word: εἰς τὸν θερισμὸν αὐτοῦ
  chosen: into his harvest
  alternatives:
  - into his harvest field
  - for his harvest
  lexicon: BDAG
  rationale: εἰς naturally conveys movement into the sphere/task of the harvest. 'Into
    his harvest' preserves the metaphor and the possessive αὐτοῦ without adding 'field,'
    which is not explicit in the Greek.
