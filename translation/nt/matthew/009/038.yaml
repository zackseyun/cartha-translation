theological_decisions:
- issue: Identity of 'the Lord of the harvest'
  chosen_reading: Render generically as 'the Lord of the harvest' without specifying
    in the translation whether this refers to the Father, Jesus, or God more broadly.
  alternative_readings:
  - the Father specifically
  - Jesus specifically
  rationale: The verse itself does not explicitly identify the referent beyond 'the
    Lord of the harvest.' To preserve theological tension and avoid importing a narrower
    doctrinal claim than the text states, the translation leaves the title as given.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering 'Lord'.
