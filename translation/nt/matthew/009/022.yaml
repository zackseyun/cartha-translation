id: MAT.9.22
reference: Matthew 9:22
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸀στραφεὶς καὶ ἰδὼν αὐτὴν εἶπεν· Θάρσει, θύγατερ· ἡ πίστις σου
    σέσωκέν σε. καὶ ἐσώθη ἡ γυνὴ ἀπὸ τῆς ὥρας ἐκείνης.
translation:
  text: But Jesus turned, and seeing her, said, “Take courage, daughter; your faith
    has saved you.” And the woman was healed from that hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faith has made you well' or 'your faith has healed you.' The Greek
      verb can mean save, heal, or make well; the main text preserves the broader
      sense in Jesus' words.
    reason: lexical_alternative
  - marker: b
    text: Or 'Take heart, daughter.'
    reason: lexical_alternative
  - marker: c
    text: πίστις can also be rendered 'trust' here.
    reason: alternative_reading
lexical_decisions:
- source_word: στραφεὶς
  chosen: turned
  alternatives:
  - turned around
  lexicon: BDAG
  rationale: Aorist passive participle of στρέφω used intransitively here; 'turned'
    is natural modern English and sufficiently reflects the action without over-specifying
    direction.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - having seen
  lexicon: BDAG
  rationale: The participle is contemporaneous/sequential with the main verb. 'Seeing
    her' preserves the participial flow better than a finite-clause expansion while
    remaining readable.
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be encouraged
  - Take heart
  lexicon: BDAG
  rationale: Imperative of θαρσέω meaning to be confident or courageous. 'Take courage'
    is direct and idiomatic; 'take heart' is traditional but slightly less transparent
    to modern readers.
- source_word: θύγατερ
  chosen: daughter
  alternatives:
  - dear daughter
  lexicon: BDAG
  rationale: Vocative of address. 'Daughter' preserves the familial tenderness without
    adding interpretive softening such as 'dear.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this context the woman's believing trust is in view; 'trust' is possible but 'faith'
    best matches both usage and consistency policy.
- source_word: σέσωκέν σε
  chosen: has saved you
  alternatives:
  - has made you well
  - has healed you
  lexicon: BDAG
  rationale: Perfect of σῴζω can denote rescue, salvation, or healing. 'Has saved
    you' preserves the broader semantic and theological range of the Greek, while
    the following clause clarifies the concrete healing outcome.
- source_word: ἐσώθη
  chosen: was healed
  alternatives:
  - was saved
  - was made well
  lexicon: BDAG
  rationale: Although the same verb σῴζω appears, here the context explicitly refers
    to the woman's physical restoration. Rendering it 'was healed' communicates the
    narrative result clearly in English while preserving the broader sense in the
    previous clause.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  chosen: from that hour
  alternatives:
  - from that moment
  - at once from that time
  lexicon: BDAG
  rationale: A fairly literal rendering that remains intelligible in modern English
    and preserves the temporal marker's solemnity better than a looser paraphrase.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the woman herself
  lexicon: BDAG
  rationale: Standard rendering of γυνή here as 'woman,' referring back to the female
    sufferer in the narrative.
