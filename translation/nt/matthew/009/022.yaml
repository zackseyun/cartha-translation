theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: DOCTRINE.md lists πίστις with default rendering 'faith,' with alternatives
    preserved where relevant. This verse is not a major contested-construction case,
    but 'trust' remains a viable nuance and is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Rendering of σῴζω in the direct speech and narrative result
  chosen_reading: Main text uses 'has saved you' in Jesus' statement and 'was healed'
    in the narrative conclusion
  alternative_readings:
  - '''has made you well'' / ''was made well'' for both instances'
  - '''has healed you'' / ''was healed'' for both instances'
  rationale: The repeated σῴζω carries both healing and saving resonance. Preserving
    'saved' in Jesus' words retains theological breadth, while 'was healed' in the
    narrator's conclusion makes the immediate physical result explicit. This preserves
    rather than collapses the semantic tension.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological
    tension rather than resolve it
