theological_decisions:
- issue: Rendering of πίστις in a healing saying
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine excerpt sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. Here the immediate context is the
    petitioners' believing response to Jesus, so 'faith' is retained in the main text;
    'trust' is a viable lexical alternative but not necessary in the main line.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις default English ''faith'''
