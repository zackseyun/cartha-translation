id: MAT.9.29
reference: Matthew 9:29
source:
  edition: SBLGNT
  text: τότε ἥψατο τῶν ὀφθαλμῶν αὐτῶν λέγων· Κατὰ τὴν πίστιν ὑμῶν γενηθήτω ὑμῖν.
translation:
  text: Then he touched their eyes, saying, “According to your faith, let it be done
    for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “According to your trust, let it happen for you.” The Greek word pistis
      can also be rendered “trust” or, in some contexts, “faithfulness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next event in sequence; 'Then' is natural,
    concise narrative English.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - laid a hand on
  lexicon: BDAG
  rationale: Middle form of ἅπτω in this context means 'touch' physically. 'Touched'
    is the plain sense and fits the healing action without over-expansion.
- source_word: τῶν ὀφθαλμῶν αὐτῶν
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: 'Genitive after ἅπτομαι commonly expresses the thing touched. Idiomatic
    English requires direct object phrasing: ''their eyes.'''
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle contemporaneous with the main verb. 'Saying' preserves
    the participial linkage while remaining readable.
- source_word: Κατὰ
  chosen: According to
  alternatives:
  - In keeping with
  - On the basis of
  lexicon: BDAG
  rationale: κατά with the accusative here expresses correspondence or measure. 'According
    to' best preserves the sense without importing a stronger causal nuance than the
    Greek requires.
- source_word: τὴν πίστιν ὑμῶν
  chosen: your faith
  alternatives:
  - your trust
  - your faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context it refers to the blind men's trust/confidence in Jesus' ability to
    heal, but 'faith' remains the most standard and sufficiently precise rendering.
- source_word: γενηθήτω
  chosen: let it be done
  alternatives:
  - let it happen
  - may it be
  lexicon: BDAG
  rationale: Aorist passive imperative of γίνομαι functioning as a performative pronouncement.
    'Let it be done' preserves the imperative force and the passive sense better than
    the more ambiguous 'may it be.'
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative of advantage/benefit is most naturally rendered 'for you' in English
    in this healing context.
