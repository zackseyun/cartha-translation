id: MAT.9.26
reference: Matthew 9:26
source:
  edition: SBLGNT
  text: καὶ ἐξῆλθεν ἡ φήμη αὕτη εἰς ὅλην τὴν γῆν ἐκείνην.
translation:
  text: And this report went out into that whole region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all that land' or 'into all that district.' The Greek γῆ
      can denote land, territory, or region; here it most likely refers to the surrounding
      area rather than the whole earth.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is literally 'went out.' 'Went out' preserves the
    metaphor of news proceeding from a place, while remaining natural English. 'Spread'
    is idiomatic but slightly more interpretive.
- source_word: φήμη
  chosen: report
  alternatives:
  - news
  - rumor
  lexicon: BDAG
  rationale: φήμη denotes a report or news that circulates. 'Report' fits the context
    of public knowledge of the miracle without implying falsehood, whereas 'rumor'
    in modern English can suggest unreliability.
- source_word: αὕτη
  chosen: this
  lexicon: BDAG
  rationale: The demonstrative points to the specific report just mentioned; 'this'
    is the direct and natural rendering.
- source_word: εἰς ὅλην τὴν γῆν ἐκείνην
  chosen: into that whole region
  alternatives:
  - throughout all that land
  - into all that district
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'land,' or 'region' depending on scope. Here the
    local narrative setting favors 'region' rather than the broader 'earth' or the
    potentially misleading 'land.' 'That whole region' communicates the geographical
    extent naturally in English.
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: καί is the straightforward connective here. 'And' preserves the narrative
    flow without adding interpretive nuance.
