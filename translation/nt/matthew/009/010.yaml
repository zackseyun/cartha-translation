id: MAT.9.10
reference: Matthew 9:10
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο αὐτοῦ ἀνακειμένου ἐν τῇ οἰκίᾳ, ⸀καὶ ἰδοὺ πολλοὶ τελῶναι καὶ ἁμαρτωλοὶ
    ἐλθόντες συνανέκειντο τῷ Ἰησοῦ καὶ τοῖς μαθηταῖς αὐτοῦ.
translation:
  text: And as he was reclining at table in the house, behold, many tax collectors
    and sinners came and were reclining at table with Jesus and his disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'while he was dining in the house.' The Greek more
      specifically says 'reclining at table,' reflecting the customary meal posture.
    reason: lexical_alternative
  - marker: b
    text: The text says simply 'in the house' and does not explicitly identify whose
      house it was in this verse alone.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγένετο
  chosen: And as ...
  alternatives:
  - And it happened that
  - Now it happened that
  lexicon: BDAG
  rationale: The idiom καὶ ἐγένετο often functions as a narrative transition rather
    than carrying full lexical weight in English. Rendering it as 'And as ...' preserves
    the temporal/narrative force in readable modern English without woodenly reproducing
    'it happened.'
- source_word: ἀνακειμένου
  chosen: was reclining at table
  alternatives:
  - was reclining
  - was sitting at table
  lexicon: BDAG
  rationale: ἀνάκειμαι in meal contexts refers to reclining for a meal, not merely
    generic sitting. 'At table' makes the meal setting explicit for modern readers.
- source_word: ἐν τῇ οἰκίᾳ
  chosen: in the house
  alternatives:
  - at home
  - in the home
  lexicon: BDAG
  rationale: The phrase is definite in Greek and naturally rendered 'in the house.'
    This preserves the concrete setting without over-specifying whose house in the
    main text.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to what follows. 'Behold'
    preserves the markedness and narrative vividness better than the flatter 'look,'
    while remaining understandable.
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax gatherers
  - revenue agents
  lexicon: BDAG
  rationale: Standard and clear rendering for τελώνης in the Gospels; it also preserves
    the social stigma associated with the group in context.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The adjective is substantival here. 'Sinners' is the natural English
    equivalent and preserves the social-religious categorization present in the text.
- source_word: ἐλθόντες
  chosen: came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered by an English finite
    verb in this narrative sequence. 'Came' keeps the action straightforward and idiomatic.
- source_word: συνανέκειντο
  chosen: were reclining at table with
  alternatives:
  - were dining with
  - were sitting at table with
  lexicon: BDAG
  rationale: The compound verb indicates sharing a meal posture/table fellowship with
    Jesus and his disciples. 'Were reclining at table with' preserves both the meal
    setting and the fellowship nuance more precisely than the broader 'were dining
    with.'
- source_word: τῷ Ἰησοῦ
  chosen: with Jesus
  alternatives:
  - with Yeshua
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name is appropriate
    per project guidance to transliterate names by standard conventions.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: his disciples
  alternatives:
  - his learners
  - his followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί
    in Gospel contexts, preserving the teacher-follower relationship without flattening
    it.'
