theological_decisions:
- issue: Meal posture and fellowship imagery
  chosen_reading: Retain 'reclining at table' language rather than simplifying to
    'eating' or 'dining.'
  alternative_readings:
  - eating
  - dining
  rationale: The verse emphasizes shared table fellowship, which is socially and theologically
    significant in the Gospel context. Preserving the reclining/table language keeps
    that significance visible without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Identification of 'the house'
  chosen_reading: Do not specify whose house in the main text.
  alternative_readings:
  - his house
  - Matthew's house
  - the house
  rationale: The Greek says simply 'in the house.' Although the broader context may
    suggest Levi/Matthew's house, the verse itself does not explicitly state this,
    so the translation should not import that conclusion into the main text.
  doctrine_reference: Translation philosophy §1
