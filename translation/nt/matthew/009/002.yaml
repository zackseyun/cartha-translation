id: MAT.9.2
reference: Matthew 9:2
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ προσέφερον αὐτῷ παραλυτικὸν ἐπὶ κλίνης βεβλημένον. καὶ ἰδὼν ὁ Ἰησοῦς
    τὴν πίστιν αὐτῶν εἶπεν τῷ παραλυτικῷ· Θάρσει, τέκνον· ⸀ἀφίενταί ⸂σου αἱ ἁμαρτίαι⸃.
translation:
  text: And behold, they were bringing to him a paralytic lying on a bed. And when
    Jesus saw their faith, he said to the paralytic, “Take courage, child; your sins
    are forgiven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take heart.”
    reason: lexical_alternative
  - marker: b
    text: Greek “their faith”; the plural may refer to the paralytic and those bringing
      him, or to the bearers as a group.
    reason: alternative_reading
  - marker: c
    text: Or “your sins have been forgiven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse marker's vivid, attention-directing force. Though
    somewhat elevated in English, it remains readable and reflects Matthew's narrative
    style better than omitting it.
- source_word: προσέφερον
  chosen: they were bringing
  alternatives:
  - they brought
  - they carried
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action in the scene, so 'were bringing'
    better reflects aspect than simple past 'brought.' 'Carried' is possible contextually
    but is not the lexical core of προσφέρω here.
- source_word: παραλυτικὸν
  chosen: a paralytic
  alternatives:
  - a paralyzed man
  lexicon: BDAG
  rationale: A standard and concise rendering of the adjective used substantivally.
    'A paralyzed man' is more explicit but adds 'man,' which is not stated in the
    Greek.
- source_word: ἐπὶ κλίνης βεβλημένον
  chosen: lying on a bed
  alternatives:
  - laid on a bed
  - placed on a mat
  lexicon: BDAG
  rationale: The participial phrase describes the man's condition/position. 'Lying
    on a bed' is natural English and captures the sense without over-literal awkwardness.
    'Mat' is less secure for κλίνη here than 'bed' or 'cot.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  lexicon: BDAG
  rationale: Follows the project's default rendering for πίστις. In this context it
    denotes confident trust expressed in action; 'faith' remains the best main-text
    choice.
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be encouraged
  - Take heart
  lexicon: BDAG
  rationale: An imperative of reassurance. 'Take courage' is direct and natural; 'take
    heart' is also good idiomatic English, but 'take courage' slightly better preserves
    the verbal force.
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  - dear child
  lexicon: BDAG
  rationale: τέκνον is a tender form of address meaning 'child.' 'Son' would over-specify
    male sex from the address term itself, though the referent is likely male. 'Child'
    preserves the affectionate nuance without adding what the noun does not explicitly
    state.
- source_word: ἀφίενταί σου αἱ ἁμαρτίαι
  chosen: your sins are forgiven
  alternatives:
  - your sins have been forgiven
  - your sins are being forgiven
  lexicon: BDAG
  rationale: The present passive/middle form naturally conveys a present declaration
    of forgiveness. English present passive is the clearest idiomatic rendering. Perfect
    English ('have been forgiven') is possible interpretively but less direct.
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: Standard rendering preserving the plural concrete sense of offenses;
    no need to paraphrase.
