theological_decisions:
- issue: Meaning of τὴν πίστιν αὐτῶν
  chosen_reading: Jesus responds to the faith of the group associated with the paralytic,
    including at least those who brought him.
  alternative_readings:
  - Jesus responds only to the bearers' faith
  - Jesus responds to the paralytic's faith alone
  rationale: The plural αὐτῶν most naturally refers to more than one person. The text
    does not require excluding the paralytic from that plural, nor does it require
    including him explicitly; the translation therefore leaves the plural 'their faith'
    intact and does not resolve the question beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of Jesus' pronouncement of forgiveness
  chosen_reading: 'A declarative pronouncement: ''your sins are forgiven.'''
  alternative_readings:
  - A performative declaration emphasizing immediate divine action
  - An implicit divine passive without specifying agency in translation
  rationale: The Greek passive leaves the agent unstated while clearly announcing
    forgiveness. The English passive preserves this and avoids importing a fuller
    theological explanation into the main text, while still allowing the narrative
    context to imply Jesus' authority.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
