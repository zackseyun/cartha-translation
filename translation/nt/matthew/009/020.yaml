theological_decisions:
- issue: Potential Jewish significance of κράσπεδον as tassel/fringe associated with
    garment borders
  chosen_reading: Render generally as 'fringe' in the main text
  alternative_readings:
  - Render as 'tassel' to foreground possible allusion to Jewish tassels (cf. Num
    15:38; Deut 22:12)
  - Render as 'hem' to emphasize garment edge
  rationale: The term may evoke the border/tassel of a Jewish garment, but the verse
    itself does not explicitly develop that symbolism. 'Fringe' preserves the lexical
    possibility while avoiding importing a stronger interpretive claim into the main
    text. The possible cultural background is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
