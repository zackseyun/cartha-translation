id: MAT.9.20
reference: Matthew 9:20
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ γυνὴ αἱμορροοῦσα δώδεκα ἔτη προσελθοῦσα ὄπισθεν ἥψατο τοῦ κρασπέδου
    τοῦ ἱματίου αὐτοῦ·
translation:
  text: And behold, a woman who had been suffering from bleeding for twelve years
    came up behind him and touched the fringe of his garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tassel' or 'hem'; the Greek term can refer to the fringe or border of
      a garment, possibly including the tassel-like border associated with Jewish
      dress.
    reason: lexical_alternative
  - marker: b
    text: See Numbers 15:38 and Deuteronomy 22:12 for the background of garment fringes/tassels
      in Israel's law.
    reason: cross_reference
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - And see
  lexicon: BDAG
  rationale: Retains the discourse marker and vivid attention-getting force of ἰδού
    rather than omitting it. 'Behold' is slightly traditional but still understandable
    and preserves the narrative surprise.
- source_word: γυνὴ
  chosen: a woman
  lexicon: BDAG
  rationale: Straightforward indefinite reference; no contextual reason to specify
    more.
- source_word: αἱμορροοῦσα
  chosen: who had been suffering from bleeding
  alternatives:
  - having a flow of blood
  - hemorrhaging
  lexicon: BDAG
  rationale: The participle denotes ongoing bleeding. 'Suffering from bleeding' communicates
    the durative medical condition in natural English without archaic phrasing; 'hemorrhaging'
    is possible but sounds more acute than the likely chronic condition.
- source_word: δώδεκα ἔτη
  chosen: for twelve years
  alternatives:
  - twelve years
  lexicon: BDAG
  rationale: English idiom naturally expresses duration with 'for'; this reflects
    the accusative of extent of time.
- source_word: προσελθοῦσα
  chosen: came up
  alternatives:
  - approached
  - came
  lexicon: BDAG
  rationale: Aorist participle indicating attendant action prior to the main verb.
    'Came up' is natural and preserves the movement toward Jesus.
- source_word: ὄπισθεν
  chosen: behind him
  alternatives:
  - from behind
  - behind
  lexicon: BDAG
  rationale: Specifies her approach from the rear; adding 'him' makes the English
    explicit and clear.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - took hold of
  - grasped
  lexicon: BDAG
  rationale: Middle form of ἅπτω here means 'touch' in context. 'Touched' fits the
    healing narrative without overstating the contact.
- source_word: τοῦ κρασπέδου
  chosen: the fringe
  alternatives:
  - the tassel
  - the edge
  - the hem
  lexicon: BDAG
  rationale: κράσπεδον can refer to edge, hem, or tassel/fringe. 'Fringe' best preserves
    the likely sense of the garment's border/tassel area without overcommitting to
    a technical reconstruction in the main text.
- source_word: τοῦ ἱματίου αὐτοῦ
  chosen: of his garment
  alternatives:
  - of his cloak
  - of his robe
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment. 'Garment' is broad and accurate;
    'cloak' or 'robe' would be more specific than the Greek requires.
