id: MAT.9.12
reference: Matthew 9:12
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἀκούσας ⸀εἶπεν· Οὐ χρείαν ἔχουσιν οἱ ἰσχύοντες ἰατροῦ ἀλλὰ οἱ κακῶς
    ἔχοντες.
translation:
  text: But when he heard it, he said, “Those who are strong have no need of a physician,
    but those who are sick do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Those who are healthy have no need of a physician, but those who are
      ill do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard it
  alternatives:
  - having heard
  - hearing
  lexicon: BDAG
  rationale: Aorist participle with implicit object from context; English naturally
    supplies 'it' to reflect what Jesus heard in the preceding context. 'When he heard
    it' conveys temporal force without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the adversative turn
    in response to the accusation/question.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he answered
  - he spoke
  lexicon: BDAG
  rationale: λέγω here is the standard speech verb. Although contextually responsive,
    the Greek does not explicitly use 'answered,' so 'he said' is more textually restrained.
- source_word: Οὐ χρείαν ἔχουσιν
  chosen: have no need
  alternatives:
  - do not need
  - have no necessity for
  lexicon: BDAG
  rationale: This idiom is well represented by 'have no need.' It preserves the nominal
    expression χρείαν ἔχειν while remaining natural English.
- source_word: οἱ ἰσχύοντες
  chosen: those who are strong
  alternatives:
  - the healthy
  - those who are well
  lexicon: BDAG
  rationale: ἰσχύω fundamentally denotes being strong or having strength. While the
    medical contrast suggests health, 'strong' stays closer to the Greek and preserves
    the metaphorical force.
- source_word: ἰατροῦ
  chosen: a physician
  alternatives:
  - a doctor
  - a healer
  lexicon: BDAG
  rationale: ἰατρός means physician/doctor. 'Physician' fits the proverbial tone and
    avoids overly colloquial diction; the anarthrous genitive after χρείαν ἔχουσιν
    is naturally rendered with an indefinite article in English.
- source_word: οἱ κακῶς ἔχοντες
  chosen: those who are sick
  alternatives:
  - those who are ill
  - those who are unwell
  - those who are badly off
  lexicon: BDAG
  rationale: The idiom κακῶς ἔχω commonly means to be sick or ill. 'Those who are
    sick' is the clearest natural rendering in this medical saying.
