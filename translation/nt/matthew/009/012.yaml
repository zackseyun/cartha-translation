theological_decisions:
- issue: Metaphorical versus merely physical sense of the proverb
  chosen_reading: Render the saying in straightforward medical terms without making
    the spiritual application explicit in the main text.
  alternative_readings:
  - Translate more interpretively to foreground sinners' spiritual need
  rationale: In context Jesus applies the proverb to his association with sinners,
    but the Greek wording itself states the proverb in medical language. Preserving
    the literal image maintains the theological tension and lets the context supply
    the application.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
