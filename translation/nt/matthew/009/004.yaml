id: MAT.9.4
reference: Matthew 9:4
source:
  edition: SBLGNT
  text: καὶ ⸀εἰδὼς ὁ Ἰησοῦς τὰς ἐνθυμήσεις αὐτῶν εἶπεν· ⸀Ἱνατί ἐνθυμεῖσθε πονηρὰ ἐν
    ταῖς καρδίαις ὑμῶν;
translation:
  text: And Jesus, knowing their thoughts, said, “Why are you thinking evil things
    in your hearts?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “perceiving their thoughts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - perceiving
  - seeing
  lexicon: BDAG
  rationale: Although from οἶδα/ὁράω-related forms with the sense of perception/knowledge,
    the participle here most naturally conveys Jesus' awareness of their inner reasoning.
    'Knowing' is idiomatic and concise in English.
- source_word: ἐνθυμήσεις
  chosen: thoughts
  alternatives:
  - reflections
  - reasonings
  lexicon: BDAG
  rationale: The noun denotes inward thoughts or deliberations. 'Thoughts' is the
    most natural modern English rendering and fits the immediate context of internal
    reasoning.
- source_word: Ἱνατί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: This interrogative asks for reason or motive. 'Why' is the clear, natural
    equivalent.
- source_word: ἐνθυμεῖσθε
  chosen: are you thinking
  alternatives:
  - do you think
  - are you considering
  lexicon: BDAG
  rationale: The present middle verb refers to ongoing inward thought. 'Are you thinking'
    preserves the present sense and matches the noun ἐνθυμήσεις earlier in the verse.
- source_word: πονηρὰ
  chosen: evil things
  alternatives:
  - evil
  - wicked things
  lexicon: BDAG
  rationale: The neuter plural adjective functions substantivally, referring to evil
    thoughts or intentions. 'Evil things' makes the object explicit in English without
    overinterpreting beyond the text.
- source_word: καρδίαις
  chosen: hearts
  alternatives:
  - minds
  lexicon: BDAG
  rationale: In biblical usage καρδία commonly denotes the inner person, including
    thought and intention. 'Hearts' preserves the source metaphor and theological
    resonance better than reducing it to 'minds'.
