theological_decisions:
- issue: Rendering Jesus' awareness of unspoken inner thoughts
  chosen_reading: Jesus, knowing their thoughts
  alternative_readings:
  - Jesus, perceiving their thoughts
  rationale: The verse presents Jesus as aware of the scribes' internal reasoning.
    The translation preserves that claim without expanding it into a doctrinal statement
    beyond the text. 'Knowing' is straightforward and does not diminish the christological
    significance.
  doctrine_reference: Preserve theological tension rather than resolve it.
