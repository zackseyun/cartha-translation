theological_decisions:
- issue: Rendering δαιμόνια in an exorcism context
  chosen_reading: demons
  alternative_readings:
  - evil spirits
  rationale: The Greek term is specifically δαιμόνια, not πνεύματα. 'Demons' is the
    most precise lexical equivalent and avoids softening the supernatural claim of
    the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not flattening theological weight.'
