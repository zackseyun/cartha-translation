id: MAT.9.34
reference: Matthew 9:34
source:
  edition: SBLGNT
  text: οἱ δὲ Φαρισαῖοι ἔλεγον· Ἐν τῷ ἄρχοντι τῶν δαιμονίων ἐκβάλλει τὰ δαιμόνια.
translation:
  text: But the Pharisees were saying, “By the ruler of the demons he casts out the
    demons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By the prince of the demons he casts out the demons.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks contrast or continuation; here 'But' best conveys the adversative
    turn from the preceding positive response to the Pharisees' hostile interpretation.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name, with article preserved
    from Greek.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech; 'were saying' preserves
    that aspect better than simple past.
- source_word: Ἐν τῷ ἄρχοντι
  chosen: By the ruler
  alternatives:
  - By means of the ruler
  - In the ruler
  lexicon: BDAG
  rationale: ἐν with the dative here is instrumental, indicating agency or means.
    'By the ruler' is idiomatic English and preserves the accusation that his power
    source is demonic.
- source_word: ἄρχοντι
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: BDAG
  rationale: '''Ruler'' is the most direct and accessible rendering of ἄρχων. ''Prince''
    is traditional in some English versions but can sound archaic or imply nobility
    more than authority.'
- source_word: τῶν δαιμονίων
  chosen: of the demons
  alternatives:
  - of demons
  lexicon: BDAG
  rationale: The genitive with article is naturally rendered 'of the demons,' identifying
    a chief over demonic beings.
- source_word: ἐκβάλλει
  chosen: he casts out
  alternatives:
  - he drives out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'cast out' in exorcism contexts; this preserves
    established exorcism language while remaining clear.
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  lexicon: BDAG
  rationale: The article is retained for formal correspondence and to mirror the Greek
    accusation.
