theological_decisions:
- issue: Rendering of ἠγέρθη in a resurrection/healing context
  chosen_reading: rose
  alternative_readings:
  - was raised
  - got up
  rationale: The verse narrates Jesus' restoration of the girl to life, but the Greek
    passive ἠγέρθη can be represented idiomatically in English by the intransitive
    'rose.' This avoids adding interpretive emphasis beyond the text while still allowing
    the miracle's significance to stand from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
