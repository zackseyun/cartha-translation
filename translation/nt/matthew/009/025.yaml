id: MAT.9.25
reference: Matthew 9:25
source:
  edition: SBLGNT
  text: ὅτε δὲ ἐξεβλήθη ὁ ὄχλος, εἰσελθὼν ἐκράτησεν τῆς χειρὸς αὐτῆς, καὶ ἠγέρθη τὸ
    κοράσιον.
translation:
  text: But when the crowd had been put outside, he went in and took her by the hand,
    and the girl rose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the girl was raised.' The Greek verb can be rendered either way in
      English.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause ('when'), while δέ is a mild connective
    that can be rendered 'but' or simply left implicit. 'But when' preserves the narrative
    transition without sounding wooden.
- source_word: ἐξεβλήθη
  chosen: had been put outside
  alternatives:
  - was cast out
  - was sent out
  - had been driven out
  lexicon: BDAG
  rationale: Aorist passive of ἐκβάλλω. In this context of removing mourners/onlookers
    from the room, 'had been put outside' is natural modern English and preserves
    the passive sense without importing excessive force from 'cast out,' which can
    sound exorcistic in English.
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the people
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or multitude. 'The crowd' is the most
    natural contemporary rendering here.
- source_word: εἰσελθὼν
  chosen: he went in
  alternatives:
  - entering
  - having entered
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/sequential with the main verb
    in narrative. 'He went in' renders the action idiomatically in English rather
    than preserving an awkward participial form.
- source_word: ἐκράτησεν τῆς χειρὸς αὐτῆς
  chosen: took her by the hand
  alternatives:
  - grasped her hand
  - took hold of her hand
  lexicon: BDAG
  rationale: κρατέω with the genitive can mean 'take hold of' or 'grasp.' English
    idiom prefers 'took her by the hand,' which accurately conveys the action and
    reads naturally.
- source_word: ἠγέρθη
  chosen: rose
  alternatives:
  - was raised
  - got up
  - arose
  lexicon: BDAG
  rationale: Aorist passive of ἐγείρω can be rendered intransitively in English as
    'rose' in this healing/resuscitation context. 'Was raised' is possible but can
    sound more explicitly theological or agentive than the Greek requires in this
    immediate clause; 'rose' preserves the result without over-specifying agency.
- source_word: τὸ κοράσιον
  chosen: the girl
  alternatives:
  - the young girl
  - the child
  - the maiden
  lexicon: BDAG
  rationale: κοράσιον denotes a girl/young girl. 'The girl' is clear, natural, and
    sufficient in context.
