id: MAT.9.27
reference: Matthew 9:27
source:
  edition: SBLGNT
  text: Καὶ παράγοντι ἐκεῖθεν τῷ Ἰησοῦ ἠκολούθησαν ⸀αὐτῷ δύο τυφλοὶ κράζοντες καὶ
    λέγοντες· Ἐλέησον ἡμᾶς, ⸀υἱὲ Δαυίδ.
translation:
  text: And as Jesus was passing on from there, two blind men followed him, crying
    out and saying, “Have mercy on us, Son of David.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Son of David” is a royal-messianic title, identifying Jesus as the promised
      heir of David’s line.
    reason: cross_reference
lexical_decisions:
- source_word: παράγοντι ἐκεῖθεν
  chosen: as [Jesus] was passing on from there
  alternatives:
  - as [Jesus] was going on from there
  - as [Jesus] passed by from there
  lexicon: BDAG
  rationale: 'The present participle with ἐκεῖθεν gives a contemporaneous sense: while
    Jesus was moving on from that place. ''Passing on from there'' is natural English
    and preserves the narrative flow without overinterpreting the motion as merely
    ''passing by'' the blind men.'
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: Standard narrative sense of ἀκολουθέω here is physical following. 'Followed
    him' is idiomatic and accurate.
- source_word: δύο τυφλοὶ
  chosen: two blind men
  alternatives:
  - two blind ones
  lexicon: BDAG
  rationale: Although τυφλοί is adjectival, English normally supplies the implied
    noun. 'Men' fits the masculine plural form and the narrative context, in keeping
    with gender-accurate translation philosophy.
- source_word: κράζοντες
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: κράζω often conveys loud, urgent vocal appeal. 'Crying out' preserves
    both urgency and conventional biblical style without sounding archaic.
- source_word: λέγοντες
  chosen: and saying
  alternatives:
  - and saying aloud
  lexicon: BDAG
  rationale: The participle is straightforwardly speech-introducing. Retaining 'and
    saying' reflects the Greek structure and keeps the sequence vivid.
- source_word: Ἐλέησον ἡμᾶς
  chosen: Have mercy on us
  alternatives:
  - Show us mercy
  - Take pity on us
  lexicon: BDAG
  rationale: The aorist imperative of ἐλεάω is a direct plea for merciful action.
    'Have mercy on us' is the most established and semantically precise rendering
    in this appeal context.
- source_word: υἱὲ Δαυίδ
  chosen: Son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: This is a recognized messianic title in Matthew, not merely a genealogical
    description. 'Son of David' preserves the title's theological and royal resonance.
