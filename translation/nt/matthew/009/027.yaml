theological_decisions:
- issue: Messianic significance of 'Son of David'
  chosen_reading: Render as the title 'Son of David' in the main text
  alternative_readings:
  - A more explanatory rendering such as 'Messianic Son of David'
  rationale: The Greek itself uses the traditional title without explicit explanation.
    Preserving the title maintains the text's messianic claim and lets Matthew's narrative
    context supply its significance without importing extra wording.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    theological tension rather than resolve it.'
