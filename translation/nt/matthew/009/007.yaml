id: MAT.9.7
reference: Matthew 9:7
source:
  edition: SBLGNT
  text: καὶ ἐγερθεὶς ἀπῆλθεν εἰς τὸν οἶκον αὐτοῦ.
translation:
  text: And he got up and went away to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'departed to his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this action to the preceding
    narrative. 'And' preserves the simple narrative flow without adding temporal nuance
    beyond the Greek.
- source_word: ἐγερθεὶς
  chosen: he got up
  alternatives:
  - having arisen
  - rising
  lexicon: BDAG
  rationale: Aorist passive participle of ἐγείρω used in an intransitive sense here.
    'He got up' is natural modern English and accurately conveys the action without
    overly wooden participial phrasing.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: Aorist indicative of ἀπέρχομαι, conveying departure. 'Went away' preserves
    the sense of leaving from the present location more clearly than the flatter 'went,'
    while remaining readable.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  chosen: to his house
  alternatives:
  - into his house
  - to his home
  lexicon: BDAG
  rationale: εἰς with οἶκος indicates movement toward/into his dwelling. 'To his house'
    is a straightforward rendering that preserves the concrete noun οἶκος; 'home'
    is possible but slightly more interpretive.
