theological_decisions:
- issue: Rendering Jesus' declaration of forgiveness
  chosen_reading: Your sins are forgiven
  alternative_readings:
  - Your sins have been forgiven
  rationale: The Greek present passive does not require importing a more developed
    theological nuance about timing; the simple passive best preserves the text's
    force and leaves the authority claim in context rather than in an interpretive
    tense choice.
  doctrine_reference: Preserve theological tension rather than resolve it.
