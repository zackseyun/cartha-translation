id: MAT.9.5
reference: Matthew 9:5
source:
  edition: SBLGNT
  text: τί γάρ ἐστιν εὐκοπώτερον, εἰπεῖν· ⸀Ἀφίενταί σου αἱ ἁμαρτίαι, ἢ εἰπεῖν· ⸀Ἔγειρε
    καὶ περιπάτει;
translation:
  text: 'For which is easier: to say, ‘Your sins are forgiven,’ or to say, ‘Get up
    and walk’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your sins have been forgiven.' The Greek present passive can be understood
      with a resulting-state sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ ἐστιν εὐκοπώτερον
  chosen: For which is easier
  alternatives:
  - For what is easier
  - Which is easier, then
  lexicon: BDAG
  rationale: τί with the comparative εὐκοπώτερον asks a choice between two options,
    so 'which is easier' is the most natural English. γάρ is retained as 'For' to
    preserve the explanatory connection to the previous verse.
- source_word: εἰπεῖν
  chosen: to say
  alternatives:
  - to declare
  lexicon: BDAG
  rationale: The infinitive λέγω here is straightforward speech, best rendered 'to
    say' in both clauses for clarity and consistency.
- source_word: Ἀφίενταί σου αἱ ἁμαρτίαι
  chosen: Your sins are forgiven
  alternatives:
  - Your sins have been forgiven
  - Your sins are being forgiven
  lexicon: BDAG
  rationale: 'ἀφίενταί is present passive indicative, third plural, with αἱ ἁμαρτίαι
    as grammatical subject: literally, ''your sins are forgiven.'' English idiom prefers
    this passive construction. The present can be rendered statively in context rather
    than as progressive. ''Have been forgiven'' is possible but less direct.'
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sin-debts
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτίαι; no contextual reason to expand metaphorically.
- source_word: Ἔγειρε
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: Aorist imperative of ἐγείρω in healing contexts commonly means 'get up'
    or 'rise.' 'Get up' is natural modern English and fits the immediate physical
    command.
- source_word: καὶ περιπάτει
  chosen: and walk
  alternatives:
  - and be walking
  - and walk around
  lexicon: BDAG
  rationale: Present imperative of περιπατέω here calls for ongoing action following
    the rising. English idiom expresses this simply as 'and walk.'
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: Second-person singular genitive possessive, naturally rendered 'your'
    with both direct addresses preserved in singular English.
