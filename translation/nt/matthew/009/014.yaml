id: MAT.9.14
reference: Matthew 9:14
source:
  edition: SBLGNT
  text: Τότε προσέρχονται αὐτῷ οἱ μαθηταὶ Ἰωάννου λέγοντες· Διὰ τί ἡμεῖς καὶ οἱ Φαρισαῖοι
    νηστεύομεν ⸀πολλά, οἱ δὲ μαθηταί σου οὐ νηστεύουσιν;
translation:
  text: Then John's disciples came to him, saying, “Why do we and the Pharisees fast
    often, but your disciples do not fast?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “fast much” or “fast many times”; the Greek πολλά with “fast” expresses
      frequent practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural, concise modern English.
- source_word: προσέρχονται αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  - came up to him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'come to' or 'approach.' 'Came to him' is
    idiomatic and preserves the movement toward Jesus without sounding overly formal.
- source_word: οἱ μαθηταὶ Ἰωάννου
  chosen: John's disciples
  alternatives:
  - the disciples of John
  lexicon: BDAG
  rationale: Genitive possession is naturally rendered in English with the possessive.
    'John' is the standard transliteration of Ἰωάννης.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is smoothly
    represented by 'saying,' preserving the Greek flow.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the interrogative phrase asking reason.
- source_word: ἡμεῖς καὶ οἱ Φαρισαῖοι
  chosen: we and the Pharisees
  alternatives:
  - we, and the Pharisees
  lexicon: BDAG
  rationale: Preserves the emphatic first-person plural followed by the comparison
    group. No need to smooth away the explicit pairing.
- source_word: νηστεύομεν
  chosen: fast
  alternatives:
  - go without food as a religious practice
  lexicon: BDAG
  rationale: The standard religious term 'fast' accurately conveys abstaining from
    food for devotional purposes without paraphrase.
- source_word: πολλά
  chosen: often
  alternatives:
  - much
  - many times
  - frequently
  lexicon: BDAG
  rationale: Although πολλά is literally 'many things/much,' with νηστεύω it functions
    adverbially to indicate frequency. 'Often' is the most natural English equivalent
    here.
- source_word: οἱ δὲ μαθηταί σου
  chosen: but your disciples
  alternatives:
  - yet your disciples
  - while your disciples
  lexicon: BDAG
  rationale: δέ marks contrast; 'but' best captures the adversative force in this
    question.
- source_word: οὐ νηστεύουσιν
  chosen: do not fast
  alternatives:
  - are not fasting
  lexicon: BDAG
  rationale: Present indicative here expresses customary practice rather than a progressive
    action at a single moment; 'do not fast' fits the contrast with 'we ... fast often.'
