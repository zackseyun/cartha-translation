theological_decisions:
- issue: Nature of the complaint about fasting
  chosen_reading: Render the question as a comparison of customary religious practice,
    not as a doctrinal judgment beyond the text.
  alternative_readings:
  - Implying Jesus' disciples neglect a required practice
  - Implying only a specific fast occasion is in view
  rationale: The present-tense verbs and adverbial πολλά suggest a general pattern
    of fasting practice. The translation preserves the complaint without importing
    a stronger accusation or narrowing it to a single event.
  doctrine_reference: Preserve theological tension rather than resolve it.
