  from: a mute man who was demon-possessed
  to: a mute, demon-possessed man
  rationale: The current rendering uses a relative clause for the participle δαιμονιζόμενον. A more concise adjectival construction, such as 'a mute, demon-possessed man' or 'a demon-possessed mute man,' would more closely mirror the Greek syntax where κωφὸν and δαιμονιζόμενον function as parallel modifiers of ἄνθρωπον. This change would improve the English flow without loss of meaning.
