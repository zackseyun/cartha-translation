id: MAT.9.32
reference: Matthew 9:32
source:
  edition: SBLGNT
  text: Αὐτῶν δὲ ἐξερχομένων ἰδοὺ προσήνεγκαν αὐτῷ ⸀ἄνθρωπον κωφὸν δαιμονιζόμενον·
translation:
  text: As they were going out, behold, they brought to him a mute, demon-possessed man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a deaf man"; the Greek word can mean either "mute" or "deaf" depending on context. Here the next verse's statement that he spoke supports "mute."
    reason: lexical_alternative
  - marker: b
    text: Or "demonized."
    reason: lexical_alternative
  - marker: c
    text: Or 'a mute man who was demon-possessed'.
    reason: previous_rendering
lexical_decisions:
- source_word: Αὐτῶν δὲ ἐξερχομένων
  chosen: As they were going out
  alternatives:
  - And as they were going out
  - While they were going out
  lexicon: BDAG
  rationale: Genitive absolute with δέ marking scene transition. 'As they were going out' is natural English and preserves the temporal sense without overtranslating δέ.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the narrative vividness and attention-marking force of ἰδού. Though somewhat marked in modern English, it remains readable and preserves the discourse effect better than omitting it.
- source_word: προσήνεγκαν αὐτῷ
  chosen: they brought to him
  alternatives:
  - they brought him
  - they presented to him
  lexicon: BDAG
  rationale: προσφέρω here means to bring/present someone to Jesus. 'To him' explicitly reflects αὐτῷ and avoids ambiguity.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun refers to an adult male individual in this healing narrative, so 'man' is the gender-accurate rendering.
- source_word: κωφὸν
  chosen: mute
  alternatives:
  - unable to speak
  - deaf and mute
  lexicon: BDAG
  rationale: In this context the following verse focuses on speech ('the mute man spoke'), so 'mute' best captures the functional sense here. κωφός can denote deafness or muteness depending on context; 'mute' is contextually preferable.
- source_word: δαιμονιζόμενον
  chosen: who was demon-possessed
  alternatives:
  - demonized
  - under the power of a demon
  lexicon: BDAG
  rationale: Standard, clear English for δαιμονίζομαι in Gospel exorcism contexts. 'Demonized' is more literal to the Greek form but less idiomatic; 'demon-possessed' communicates the intended condition without importing a detailed demonology beyond the text.
