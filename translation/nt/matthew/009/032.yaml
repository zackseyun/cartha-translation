theological_decisions:
- issue: Rendering of demonic affliction language
  chosen_reading: who was demon-possessed
  alternative_readings:
  - who was demonized
  - under the power of a demon
  rationale: The verse presents real demonic affliction in a straightforward narrative way. The chosen rendering is idiomatic and historically recognizable while avoiding speculative elaboration about the exact mode of possession/oppression beyond what δαιμονιζόμενον states.
