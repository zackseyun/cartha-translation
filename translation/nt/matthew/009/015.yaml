theological_decisions:
- issue: Potential christological significance of the bridegroom image
  chosen_reading: Retain 'bridegroom' as a metaphor without making its theological
    implication explicit in the translation.
  alternative_readings:
  - Interpretively expand to identify Jesus as the messianic bridegroom
  rationale: The verse itself uses the image and readers may infer its theological
    significance, but the translation should not import explanatory christological
    claims beyond the text. This preserves theological tension while allowing the
    metaphor to stand.
  doctrine_reference: Preserve theological tension rather than resolve it.
