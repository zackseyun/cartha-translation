id: MAT.9.15
reference: Matthew 9:15
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Μὴ δύνανται οἱ υἱοὶ τοῦ νυμφῶνος πενθεῖν ἐφ’ ὅσον
    μετ’ αὐτῶν ἐστιν ὁ νυμφίος; ἐλεύσονται δὲ ἡμέραι ὅταν ἀπαρθῇ ἀπ’ αὐτῶν ὁ νυμφίος,
    καὶ τότε νηστεύσουσιν.
translation:
  text: And Jesus said to them, “The wedding attendants cannot mourn as long as the
    bridegroom is with them, can they? But days will come when the bridegroom is taken
    away from them, and then they will fast.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the sons of the wedding hall,' an idiom for the bridegroom's
      companions or wedding attendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'when the bridegroom is removed from them.' The passive wording suggests
      more than an ordinary departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ τοῦ νυμφῶνος
  chosen: the wedding attendants
  alternatives:
  - the sons of the wedding hall
  - the wedding guests
  - the bridechamber attendants
  lexicon: BDAG
  rationale: Literally 'sons of the wedding hall/bridal chamber,' an idiom for those
    associated with the wedding celebration, especially the bridegroom's companions.
    'Wedding attendants' preserves the social role in clear modern English without
    woodenly retaining a Semitic idiom that would obscure meaning.
- source_word: νυμφῶνος
  chosen: wedding
  alternatives:
  - wedding hall
  - bridal chamber
  lexicon: BDAG
  rationale: Within the idiom υἱοὶ τοῦ νυμφῶνος, the focus is not the physical room
    but the wedding party context. Rendering the whole phrase idiomatically is preferable
    in English.
- source_word: πενθεῖν
  chosen: mourn
  alternatives:
  - grieve
  - lament
  lexicon: BDAG
  rationale: The verb denotes mourning or grieving, fitting the contrast with fasting.
    'Mourn' is concise and idiomatic in the rhetorical question.
- source_word: ἐφ’ ὅσον
  chosen: as long as
  alternatives:
  - while
  - for as much time as
  lexicon: BDAG
  rationale: This is the natural temporal expression in English and accurately reflects
    the durative sense.
- source_word: νυμφίος
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and slightly weightier term in biblical/wedding
    imagery, preserving the metaphorical resonance.'
- source_word: ἀπαρθῇ
  chosen: is taken away
  alternatives:
  - is removed
  - is taken from them
  lexicon: BDAG
  rationale: The passive verb suggests forcible removal rather than mere departure.
    'Is taken away' preserves that nuance and may foreshadow Jesus' coming death without
    over-interpreting.
- source_word: νηστεύσουσιν
  chosen: they will fast
  alternatives:
  - they will go without food as a fast
  lexicon: BDAG
  rationale: Straightforward future of fasting; the simple English verb is sufficient
    and natural.
- source_word: Μὴ δύνανται ... ;
  chosen: cannot ... , can they?
  alternatives:
  - surely ... cannot
  - they cannot ...
  lexicon: Greek grammar
  rationale: μή with the rhetorical question expects a negative answer. Rendering
    with an English tag question captures the rhetorical force better than a flat
    statement.
- source_word: ἐλεύσονται δὲ ἡμέραι
  chosen: But days will come
  alternatives:
  - Yet days are coming
  - But the days will come
  lexicon: BDAG
  rationale: A common idiomatic future expression. Omitting the article in English
    is natural; 'But' reflects δέ as mild contrast.
