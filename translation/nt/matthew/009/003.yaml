theological_decisions:
- issue: Rendering the scribes' accusation against Jesus
  chosen_reading: This man is blaspheming
  alternative_readings:
  - This one blasphemes
  - He is speaking blasphemy
  rationale: The translation preserves the force of the accusation without softening
    it or importing later theological explanation. 'Blaspheming' is the direct lexical
    sense of βλασφημεῖ and leaves the narrative tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
