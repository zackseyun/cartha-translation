id: MAT.9.3
reference: Matthew 9:3
source:
  edition: SBLGNT
  text: καὶ ἰδού τινες τῶν γραμματέων εἶπαν ἐν ἑαυτοῖς· Οὗτος βλασφημεῖ.
translation:
  text: And behold, some of the scribes said among themselves, “This man is blaspheming.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “said to themselves.” The Greek expression can indicate private speech
      or inward deliberation.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple coordination at the start of
    the narrative.
- source_word: ἰδού
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained to reflect the discourse marker's attention-directing force.
    Though somewhat formal, it remains readable and preserves the narrative vividness
    better than omitting it.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset; 'some' is natural
    modern English.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. Alternatives are more interpretive and less
    formally tied to the source term.'
- source_word: εἶπαν ἐν ἑαυτοῖς
  chosen: said among themselves
  alternatives:
  - said to themselves
  - said within themselves
  - thought
  lexicon: BDAG
  rationale: The phrase literally combines 'said' with 'in themselves.' In this context
    it indicates internal or private speech. 'Among themselves' preserves the plural
    sense and avoids over-interpreting it as purely silent thought, though 'to themselves'
    is also possible.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - This fellow
  - He
  lexicon: BDAG
  rationale: The demonstrative is slightly dismissive in context. 'This man' conveys
    the referential force naturally in English and fits the hostile tone better than
    the wooden 'this one.'
- source_word: βλασφημεῖ
  chosen: is blaspheming
  alternatives:
  - blasphemes
  - speaks blasphemy
  lexicon: BDAG
  rationale: Present tense rendered progressively to fit natural English narrative
    style while preserving the accusation of ongoing speech that dishonors God.
