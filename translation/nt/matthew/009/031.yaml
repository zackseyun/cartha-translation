id: MAT.9.31
reference: Matthew 9:31
source:
  edition: SBLGNT
  text: οἱ δὲ ἐξελθόντες διεφήμισαν αὐτὸν ἐν ὅλῃ τῇ γῇ ἐκείνῃ.
translation:
  text: But after they went out, they spread the news about him throughout that whole
    region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all that land.' The Greek γῆ can mean 'land,' 'region,' or
      'area.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks mild contrast with the previous verse, where Jesus instructed silence;
    'But' best conveys the narrative turn.
- source_word: ἐξελθόντες
  chosen: after they went out
  alternatives:
  - having gone out
  - when they went out
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb; 'after they went out'
    gives natural English while preserving temporal sequence.
- source_word: διεφήμισαν
  chosen: they spread the news about him
  alternatives:
  - they publicized him
  - they spread his fame
  - they made him known
  lexicon: BDAG
  rationale: The verb means to spread news widely or publicize. 'Spread the news about
    him' is idiomatic modern English and avoids the awkwardness of 'spread him' while
    preserving the sense of broadcasting his fame.
- source_word: αὐτὸν
  chosen: about him
  alternatives:
  - him
  lexicon: BDAG
  rationale: In English the object of 'spread the news' is naturally expressed as
    'about him'; this makes explicit the relation implied by the Greek direct object
    with διαφημίζω.
- source_word: ἐν ὅλῃ τῇ γῇ ἐκείνῃ
  chosen: throughout that whole region
  alternatives:
  - in all that land
  - throughout that whole land
  - throughout that entire area
  lexicon: BDAG
  rationale: γῆ can mean land, region, or area. Here 'region' best fits the local
    geographical sense in Matthew and reads naturally in English; 'throughout' captures
    ἐν with distributive force over the whole area.
