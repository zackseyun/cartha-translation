theological_decisions:
- issue: Geographical scope of γῆ
  chosen_reading: region
  alternative_readings:
  - land
  rationale: The verse describes the spread of Jesus' fame in a local setting, not
    a universal or national theological claim. 'Region' avoids overstating the scope
    while matching common NT usage of γῆ for a district or area.
