theological_decisions:
- issue: Distinguishing νέος and καινός in the same verse
  chosen_reading: Render νέος as 'new' and καινός as 'fresh'
  alternative_readings:
  - Render both as 'new'
  rationale: 'The Greek uses two different adjectives. Preserving the distinction
    helps readers see the nuance without overexplaining: the wine is new in time,
    while the wineskins are fresh/new in condition and thus suitable.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
