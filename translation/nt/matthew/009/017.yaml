id: MAT.9.17
reference: Matthew 9:17
source:
  edition: SBLGNT
  text: οὐδὲ βάλλουσιν οἶνον νέον εἰς ἀσκοὺς παλαιούς· εἰ δὲ μή γε, ῥήγνυνται οἱ ἀσκοί,
    καὶ ὁ οἶνος ἐκχεῖται καὶ οἱ ἀσκοὶ ⸀ἀπόλλυνται· ἀλλὰ βάλλουσιν οἶνον νέον εἰς ἀσκοὺς
    καινούς, καὶ ἀμφότεροι συντηροῦνται.
translation:
  text: Nor do they put new wine into old wineskins. Otherwise, the wineskins burst,
    and the wine is spilled, and the wineskins are ruined. Rather, they put new wine
    into fresh wineskins, and both are preserved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'new wineskins.' The Greek distinguishes new wine (νέος) from wineskins
      that are fresh/new in condition (καινός).
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  chosen: Nor
  alternatives:
  - And not
  - Neither
  lexicon: BDAG
  rationale: Introduces a further negative example linked to the previous saying.
    'Nor' is concise, natural English that preserves the connective force.
- source_word: βάλλουσιν
  chosen: put
  alternatives:
  - throw
  - place
  lexicon: BDAG
  rationale: In this context of storing wine, 'put' best reflects idiomatic English
    without the overly forceful sense of 'throw.'
- source_word: οἶνον νέον
  chosen: new wine
  lexicon: BDAG
  rationale: Standard and accurate rendering for freshly made wine; preserves the
    adjective-noun pairing and the contrast with old/fresh wineskins.
- source_word: ἀσκοὺς
  chosen: wineskins
  alternatives:
  - skins
  - wine bags
  lexicon: BDAG
  rationale: Specifies the ancient leather containers used for wine. 'Wineskins' is
    the established and clearest English equivalent.
- source_word: παλαιούς
  chosen: old
  alternatives:
  - worn-out
  - aged
  lexicon: BDAG
  rationale: παλαιός contrasts with καινός/νέος in age and condition. 'Old' is the
    most direct rendering here.
- source_word: εἰ δὲ μή γε
  chosen: Otherwise
  alternatives:
  - If not indeed
  - But if not
  lexicon: BDAG
  rationale: This idiomatic conditional warning is best rendered as 'Otherwise' in
    natural English while preserving the consequence relationship.
- source_word: ῥήγνυνται
  chosen: burst
  alternatives:
  - split open
  - tear
  lexicon: BDAG
  rationale: Describes the wineskins breaking under pressure. 'Burst' is vivid and
    idiomatic in this context.
- source_word: ἐκχεῖται
  chosen: is spilled
  alternatives:
  - is poured out
  - is poured away
  lexicon: BDAG
  rationale: In context the point is loss of the wine after the skins burst; 'is spilled'
    communicates that result more naturally than the more neutral 'is poured out.'
- source_word: ἀπόλλυνται
  chosen: are ruined
  alternatives:
  - perish
  - are destroyed
  - are lost
  lexicon: BDAG
  rationale: Refers to the wineskins being rendered unusable. 'Are ruined' communicates
    practical destruction in context better than the more absolute 'perish.'
- source_word: ἀλλὰ
  chosen: Rather
  alternatives:
  - But
  - Instead
  lexicon: BDAG
  rationale: Marks the corrective contrast to the failed practice just described.
    'Rather' is smooth and appropriately contrastive.
- source_word: καινούς
  chosen: fresh
  alternatives:
  - new
  lexicon: BDAG
  rationale: 'The verse uses νέος for wine and καινός for wineskins. Rendering καινός
    as ''fresh'' preserves the lexical distinction: the wine is newly made, and the
    skins are fresh/new in condition.'
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Refers to both the wine and the wineskins together. 'Both' is concise
    and clear.
- source_word: συντηροῦνται
  chosen: are preserved
  alternatives:
  - are kept safe
  - are maintained
  lexicon: BDAG
  rationale: Conveys that both remain intact/safe. 'Are preserved' is faithful and
    suitably dignified English.
