  category: awkward_english
  tier: 1
  from: When he came into the house, the blind men came to him
  to: When he entered the house, the blind men approached him
  rationale: The current rendering uses 'came' twice in close succession to translate two related but distinct Greek verbs (a participle of ἔρχομαι and an indicative of προσέρχομαι). This repetition, while not incorrect, is slightly wooden in English. Using 'entered' for the action of going 'into the house' and 'approached' for προσῆλθον provides better lexical variety, improves narrative flow, and more precisely captures the nuance of the prefix in προσ-έρχομαι ('to come to, approach').
