theological_decisions:
- issue: Rendering of κύριε in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default rendering. In this healing context, translating κύριε as 'Lord' preserves both respectful address and the possibility of deeper recognition of Jesus' authority, without overstating a fully developed christological confession.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Narrative historical presents λέγει / λέγουσιν
  chosen_reading: Preserved as present tense ('says' / 'say')
  alternative_readings:
  - Flattened to past tense ('said' / 'said')
  rationale: This is not primarily doctrinal, but it affects how the narrative force is conveyed. Preserving the historical present better reflects the Greek discourse texture and does not create theological distortion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
revisions:
- timestamp: '2026-04-21T12:46:23Z'
