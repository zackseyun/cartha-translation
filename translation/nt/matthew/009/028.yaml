id: MAT.9.28
reference: Matthew 9:28
source:
  edition: SBLGNT
  text: ἐλθόντι δὲ εἰς τὴν οἰκίαν προσῆλθον αὐτῷ οἱ τυφλοί, καὶ λέγει αὐτοῖς ὁ Ἰησοῦς· Πιστεύετε ὅτι δύναμαι τοῦτο ποιῆσαι; λέγουσιν αὐτῷ· Ναί, κύριε.
translation:
  text: When he entered the house, the blind men approached him, and Jesus says to them, “Do you believe that I am able to do this?” They say to him, “Yes, Lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Yes, sir.' The Greek κύριε can be a respectful form of address, but here it is rendered 'Lord' in keeping with the translation's default for κύριος and to preserve the possible recognition of Jesus' authority.
    reason: alternative_reading
  - marker: b
    text: Or 'When he came into the house, the blind men came to him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλθόντι δὲ
  chosen: When he came
  alternatives:
  - And when he came
  - After he came
  lexicon: BDAG
  rationale: The aorist participle with δέ introduces the next event temporally. 'When he came' is natural English and preserves the participial sense without over-literal awkwardness.
- source_word: εἰς τὴν οἰκίαν
  chosen: into the house
  alternatives:
  - into the home
  - into the house indoors
  lexicon: BDAG
  rationale: οἰκία commonly means 'house' or 'home.' 'The house' fits the narrative setting and is the most straightforward rendering.
- source_word: προσῆλθον αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  - went up to him
  lexicon: BDAG
  rationale: προσέρχομαι means to approach or come to someone. 'Came to him' is clear, idiomatic, and suitably direct in narrative prose.
- source_word: οἱ τυφλοί
  chosen: the blind men
  alternatives:
  - the blind
  - the blind ones
  lexicon: BDAG
  rationale: The article plus adjective functions substantivally. Since the referents are the two male petitioners from the immediate context, 'the blind men' is more explicit and natural than the bare 'the blind' in English.
- source_word: λέγει αὐτοῖς ὁ Ἰησοῦς
  chosen: Jesus says to them
  alternatives:
  - Jesus said to them
  lexicon: BDAG
  rationale: The Greek uses the historical present λέγει. Rendering it as present ('says') preserves the vivid narrative style of Matthew better than flattening it to a simple past.
- source_word: Πιστεύετε
  chosen: Do you believe
  alternatives:
  - Do you have faith
  - Are you trusting
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believe' in a direct question about confidence in Jesus' ability. This aligns with the default handling of the pistis word-group without importing a more technical nuance.
- source_word: ὅτι δύναμαι
  chosen: that I am able
  alternatives:
  - that I can
  lexicon: BDAG
  rationale: '''Am able'' closely reflects δύναμαι and slightly preserves the emphasis on capability, while remaining natural English.'
- source_word: τοῦτο ποιῆσαι
  chosen: to do this
  alternatives:
  - to do this thing
  - to accomplish this
  lexicon: BDAG
  rationale: A simple infinitival construction; 'to do this' is the most natural and sufficiently precise rendering in context, referring to the healing sought.
- source_word: λέγουσιν αὐτῷ
  chosen: They say to him
  alternatives:
  - They said to him
  - They answer him
  lexicon: BDAG
  rationale: Like λέγει earlier, λέγουσιν is a historical present. Preserving the present maintains the narrative immediacy.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Yes indeed
  - Certainly
  lexicon: BDAG
  rationale: A straightforward affirmative particle; 'Yes' is the plain equivalent.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this context it can function as respectful address and may also carry recognition of Jesus' authority; 'Lord' preserves that theological and narrative weight better than 'sir'.
