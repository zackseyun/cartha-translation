id: MAT.9.33
reference: Matthew 9:33
source:
  edition: SBLGNT
  text: καὶ ἐκβληθέντος τοῦ δαιμονίου ἐλάλησεν ὁ κωφός. καὶ ἐθαύμασαν οἱ ὄχλοι λέγοντες·
    Οὐδέποτε ἐφάνη οὕτως ἐν τῷ Ἰσραήλ.
translation:
  text: And when the demon had been cast out, the mute man spoke. And the crowds were
    amazed, saying, “Never has anything like this appeared in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the deaf man.” The Greek word can mean either “deaf” or “mute”; here
      the context favors “mute” because the emphasis is that he spoke.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβληθέντος
  chosen: when ... had been cast out
  alternatives:
  - after ... was cast out
  - with ... having been cast out
  lexicon: BDAG
  rationale: Aorist passive participle in the genitive absolute indicates prior action
    relative to the main verb. 'When ... had been cast out' is natural English that
    preserves the temporal force without awkward literalism.
- source_word: δαιμονίου
  chosen: the demon
  alternatives:
  - the demon spirit
  - the evil spirit
  lexicon: BDAG
  rationale: δαιμόνιον is best rendered 'demon' in Gospel exorcism contexts. 'Evil
    spirit' is possible but less precise to the Greek term here.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - began to speak
  - talked
  lexicon: BDAG
  rationale: Simple aorist of λαλέω is adequately represented by 'spoke.' 'Began to
    speak' adds ingressive nuance not explicit in the verb form.
- source_word: ὁ κωφός
  chosen: the mute man
  alternatives:
  - the mute one
  - the speechless man
  - the deaf man
  lexicon: BDAG
  rationale: Although κωφός can mean 'deaf' or 'mute,' the immediate narrative focus
    is inability to speak, and the parallel with 'spoke' strongly supports 'mute'
    here. 'Man' is supplied idiomatically from context, since the referent is the
    demon-oppressed man of the preceding verse.
- source_word: ἐθαύμασαν
  chosen: were amazed
  alternatives:
  - marveled
  - wondered
  lexicon: BDAG
  rationale: The verb denotes astonishment or marvel. 'Were amazed' is clear modern
    English and fits the crowd reaction.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: Plural ὄχλοι is naturally 'the crowds.' 'Multitudes' is traditional but
    less natural in contemporary English.
- source_word: Οὐδέποτε
  chosen: Never
  alternatives:
  - Never before
  - At no time
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the adverb meaning 'never' or 'never
    yet.'
- source_word: ἐφάνη
  chosen: has anything like this appeared
  alternatives:
  - has it ever been seen like this
  - did anything like this appear
  lexicon: BDAG
  rationale: Passive of φαίνω can mean 'appear' or idiomatically 'be seen.' Because
    English normally requires an explicit subject here, 'anything like this' is supplied
    to make the clause idiomatic while preserving the sense of unprecedented manifestation.
- source_word: οὕτως
  chosen: like this
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: In this exclamatory statement, οὕτως points to the kind or manner of
    event just witnessed. 'Like this' is more natural than the more wooden 'thus'
    or bare 'so.'
- source_word: ἐν τῷ Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  - in the land of Israel
  lexicon: BDAG
  rationale: Standard rendering of the prepositional phrase. 'In Israel' can denote
    among the people or within Israel's sphere, and is the most natural concise English
    equivalent.
