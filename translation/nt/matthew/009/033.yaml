theological_decisions:
- issue: Semantic range of κωφός in the healing/exorcism context
  chosen_reading: Render as 'mute man' rather than 'deaf man.'
  alternative_readings:
  - deaf man
  rationale: The term can denote either deafness or muteness, but the immediate result
    'he spoke' indicates that speechlessness is the disability emphasized in this
    verse. This avoids importing a second condition unless context requires it.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition.
