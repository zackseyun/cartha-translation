id: MAT.9.30
reference: Matthew 9:30
source:
  edition: SBLGNT
  text: καὶ ἠνεῴχθησαν αὐτῶν οἱ ὀφθαλμοί. καὶ ⸀ἐνεβριμήθη αὐτοῖς ὁ Ἰησοῦς λέγων· Ὁρᾶτε
    μηδεὶς γινωσκέτω·
translation:
  text: And their eyes were opened. And Jesus sternly warned them, saying, “See that
    no one knows it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “strictly charged them” or “sternly admonished them.” The Greek verb
      conveys strong emotion and forcefulness in the warning.
    reason: lexical_alternative
  - marker: b
    text: Literally, “See that no one knows.” The object “it” is implicit from the
      context of the healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνεῴχθησαν
  chosen: were opened
  alternatives:
  - were opened up
  - opened
  lexicon: BDAG
  rationale: Aorist passive of ἀνοίγω; the passive English 'were opened' naturally
    reflects the Greek form and idiomatically conveys the restoration of sight without
    adding an explicit agent.
- source_word: οἱ ὀφθαλμοί
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: The Greek explicitly says 'their eyes'; standard English keeps the possessive
    with 'eyes' rather than a more wooden genitive construction.
- source_word: ἐνεβριμήθη
  chosen: sternly warned
  alternatives:
  - strictly charged
  - sternly admonished
  - rebuked
  lexicon: BDAG
  rationale: ἐμβριμάομαι can convey strong feeling expressed in a forceful warning
    or charge. In this context, where Jesus immediately gives a prohibition, 'sternly
    warned' best captures both the emotional force and the directive sense in clear
    modern English.
- source_word: Ὁρᾶτε
  chosen: See that
  alternatives:
  - Take care that
  - Watch out that
  - See to it that
  lexicon: BDAG
  rationale: The present imperative functions idiomatically as a cautionary command
    introducing the content of the warning. 'See that' is concise, natural, and preserves
    the force of vigilance.
- source_word: μηδεὶς γινωσκέτω
  chosen: no one knows it
  alternatives:
  - let no one know
  - no one should know
  lexicon: BDAG
  rationale: The third-person present imperative with μηδείς expresses prohibition.
    English commonly renders this as 'let no one know,' but after 'See that' the smoother
    equivalent is 'no one knows it,' which preserves the sense of Jesus' command without
    awkwardness. 'It' is supplied in English because the object is implicit from context.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered 'saying' in English, preserving the Greek linkage between the warning
    and its content.
