theological_decisions:
- issue: Force of Jesus' command after the healing
  chosen_reading: Jesus gives a strong prohibition against publicizing the event,
    rendered with emphatic but non-speculative language.
  alternative_readings:
  - Jesus rebuked them
  - Jesus strictly ordered them
  rationale: The verse presents Jesus as issuing a forceful command, but it does not
    explain his motive. The translation preserves the strength of the command without
    importing a theological explanation for why he wanted silence.
  doctrine_reference: Preserve theological tension rather than resolve it.
