id: MAT.9.13
reference: Matthew 9:13
source:
  edition: SBLGNT
  text: πορευθέντες δὲ μάθετε τί ἐστιν· Ἔλεος θέλω καὶ οὐ θυσίαν· οὐ γὰρ ἦλθον καλέσαι
    δικαίους ἀλλὰ ⸀ἁμαρτωλούς.
translation:
  text: 'But go and learn what this means: ‘I desire mercy and not sacrifice.’ For
    I did not come to call the righteous, but sinners.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Go and learn what this is.”
    reason: lexical_alternative
  - marker: b
    text: Quoted from Hosea 6:6.
    reason: cross_reference
  - marker: c
    text: Or possibly “those who think they are righteous”; the Greek simply says
      “the righteous.”
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθέντες
  chosen: go
  alternatives:
  - having gone
  - go your way
  lexicon: BDAG
  rationale: Aorist participle used idiomatically with the following imperative μάθετε;
    in English, 'go and learn' best captures the force without woodenness.
- source_word: μάθετε
  chosen: learn
  alternatives:
  - understand
  lexicon: BDAG
  rationale: Imperative calling for instruction or grasp of meaning; 'learn' preserves
    the verbal connection and the rebuking tone.
- source_word: τί ἐστιν
  chosen: what this means
  alternatives:
  - what it is
  - what this is
  lexicon: BDAG
  rationale: Idiomatic expression introducing the quotation's significance; 'what
    this means' is natural English and reflects the sense of interpretive understanding.
- source_word: Ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - steadfast mercy
  lexicon: BDAG
  rationale: Standard rendering of ἔλεος; 'mercy' preserves both the ethical and covenantal
    resonance of the Hosea citation without overexpansion.
- source_word: θέλω
  chosen: I desire
  alternatives:
  - I want
  lexicon: BDAG
  rationale: '''Desire'' is more fitting in register for a scriptural quotation and
    conveys volition without sounding colloquial.'
- source_word: θυσίαν
  chosen: sacrifice
  alternatives:
  - sacrificial offering
  lexicon: BDAG
  rationale: Direct and conventional rendering in the prophetic citation; singular
    is retained.
- source_word: ἦλθον
  chosen: I did not come
  alternatives:
  - I have not come
  lexicon: BDAG
  rationale: Aorist is best rendered here as a simple past in English, referring to
    Jesus' mission.
- source_word: καλέσαι
  chosen: to call
  alternatives:
  - to summon
  - to invite
  lexicon: BDAG
  rationale: '''Call'' is the broad and contextually appropriate gloss, preserving
    possible vocational and summons overtones.'
- source_word: δικαίους
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: BDAG
  rationale: Substantival adjective; 'the righteous' is concise and preserves the
    category language used in the contrast.
- source_word: ἁμαρτωλούς
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Standard substantive rendering; keeps the sharp moral contrast of the
    saying.
