theological_decisions:
- issue: Quotation of Hosea 6:6 and its force in Jesus' rebuke
  chosen_reading: Render the citation straightforwardly as a divine preference for
    mercy over sacrifice without expanding it into an abolition of sacrifice in every
    sense.
  alternative_readings:
  - A stronger paraphrase implying God rejects all sacrifice
  - A softer paraphrase reducing it to mere preference in this situation
  rationale: The Greek reproduces the prophetic contrast and Jesus uses it to rebuke
    the Pharisees' priorities. The translation should preserve the prophetic tension
    without importing a full theological system beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of 'the righteous'
  chosen_reading: Translate as 'the righteous' without specifying whether Jesus means
    truly righteous persons or those who consider themselves righteous.
  alternative_readings:
  - those who think they are righteous
  - the self-righteous
  rationale: The immediate context may imply irony, but the Greek text itself does
    not explicitly mark that interpretation. The translation therefore leaves the
    phrase as written and avoids importing an interpretive gloss into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
