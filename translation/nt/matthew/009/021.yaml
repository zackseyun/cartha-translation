id: MAT.9.21
reference: Matthew 9:21
source:
  edition: SBLGNT
  text: ἔλεγεν γὰρ ἐν ἑαυτῇ· Ἐὰν μόνον ἅψωμαι τοῦ ἱματίου αὐτοῦ σωθήσομαι.
translation:
  text: For she was saying to herself, “If only I touch his garment, I will be saved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will be healed” or “I will be made well.” The Greek says “I will
      be saved,” using a verb that can also refer to healing in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated internal speech; 'was saying'
    preserves that aspect in natural English better than simple past.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the surrounding narrative; 'for' is a natural connective
    here and preserves the explanatory force.
- source_word: ἐν ἑαυτῇ
  chosen: to herself
  alternatives:
  - within herself
  - in herself
  lexicon: BDAG
  rationale: Idiomatic expression for internal speech or thought. 'To herself' is
    standard modern English and conveys the reflexive sense clearly.
- source_word: Ἐὰν μόνον
  chosen: If only
  alternatives:
  - If just
  - If merely
  lexicon: BDAG
  rationale: The combination expresses a minimal condition with strong focus; 'If
    only' captures both the conditional sense and the emphasis on touching alone.
- source_word: ἅψωμαι
  chosen: I touch
  alternatives:
  - I may touch
  - I might touch
  lexicon: BDAG
  rationale: 'Aorist middle subjunctive after ἐάν in a future-more-vivid condition
    is naturally rendered in English present tense within the conditional clause:
    ''If ... I touch.'' The verb means ''touch'' here, not necessarily ''take hold
    of.'''
- source_word: τοῦ ἱματίου αὐτοῦ
  chosen: his garment
  alternatives:
  - his cloak
  - his clothing
  lexicon: BDAG
  rationale: ἱμάτιον denotes an outer garment or cloak. 'Garment' is broad enough
    to avoid over-specifying while remaining more natural than a literalistic 'outer
    garment' in this context.
- source_word: σωθήσομαι
  chosen: I will be saved
  alternatives:
  - I will be healed
  - I will be made well
  lexicon: BDAG
  rationale: The future passive of σῴζω can mean rescue, salvation, healing, or being
    made well depending on context. Here the immediate context is physical healing,
    but the Greek uses the broader verb 'be saved.' Following optimal equivalence
    and original-language primacy, the main text preserves 'saved,' while a footnote
    records the contextual alternative 'healed/made well.'
