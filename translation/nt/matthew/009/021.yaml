theological_decisions:
- issue: Rendering of σωθήσομαι in a healing context
  chosen_reading: I will be saved
  alternative_readings:
  - I will be healed
  - I will be made well
  rationale: The verse concerns expected bodily healing, yet the Greek verb is σῴζω
    rather than a more narrowly medical term. Preserving 'saved' retains the lexical
    breadth and possible theological resonance without importing a doctrine beyond
    the text. Because English readers may otherwise miss the healing sense, the contextual
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
