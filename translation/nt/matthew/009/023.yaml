theological_decisions:
- issue: Identification of the householder
  chosen_reading: the ruler
  alternative_readings:
  - the official
  - the synagogue leader
  rationale: The Greek text here says only ἄρχοντος ('ruler'). To avoid importing
    detail from parallel accounts, the translation keeps the broader term in the main
    text. More specific identifications are interpretive and should not be inserted
    here.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
