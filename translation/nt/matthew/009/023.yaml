id: MAT.9.23
reference: Matthew 9:23
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ὁ Ἰησοῦς εἰς τὴν οἰκίαν τοῦ ἄρχοντος καὶ ἰδὼν τοὺς αὐλητὰς καὶ τὸν
    ὄχλον θορυβούμενον
translation:
  text: And when Jesus came into the ruler's house and saw the flute players and the
    crowd making a commotion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the official' or, by comparison with parallel accounts, 'the synagogue
      leader.' Matthew's wording here is simply 'the ruler.'
    reason: alternative_reading
  - marker: b
    text: That is, professional mourners were already present, including flute players
      customary at funerals.
    reason: cultural_note
  - marker: c
    text: Or 'in an uproar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: when Jesus came
  alternatives:
  - having come
  - after Jesus came
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/temporal sequence. 'When
    Jesus came' gives natural English while preserving the temporal force without
    sounding wooden.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: '''House'' is the straightforward sense and fits the narrative setting.
    ''Home'' is possible but slightly more interpretive.'
- source_word: ἄρχοντος
  chosen: ruler
  alternatives:
  - official
  - leader
  lexicon: BDAG
  rationale: Matthew identifies the man more generally as an ἄρχων in this context.
    'Ruler' preserves the Greek's broader sense better than the more specific 'official'
    or harmonizing with synagogue-ruler language from parallels.
- source_word: ἰδὼν
  chosen: saw
  alternatives:
  - seeing
  - observed
  lexicon: BDAG
  rationale: Simple narrative verb; 'saw' is idiomatic and sufficiently direct. 'Observed'
    is too strong.
- source_word: αὐλητὰς
  chosen: flute players
  alternatives:
  - pipers
  - flute musicians
  lexicon: BDAG
  rationale: Refers to players of the flute/pipe, commonly present in mourning settings.
    'Flute players' is clear modern English; 'pipers' is possible but less precise
    for contemporary readers.
- source_word: ὄχλον
  chosen: crowd
  alternatives:
  - multitude
  lexicon: BDAG
  rationale: Standard rendering for ὄχλος in narrative contexts; readable and natural.
- source_word: θορυβούμενον
  chosen: making a commotion
  alternatives:
  - in an uproar
  - making a noisy disturbance
  lexicon: BDAG
  rationale: Present participle describing noisy tumult associated with mourning.
    'Making a commotion' captures the audible disturbance without over-specifying
    the emotion; 'in an uproar' is also viable and preserved as an alternative.
