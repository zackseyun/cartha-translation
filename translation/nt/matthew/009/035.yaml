id: MAT.9.35
reference: Matthew 9:35
source:
  edition: SBLGNT
  text: Καὶ περιῆγεν ὁ Ἰησοῦς τὰς πόλεις πάσας καὶ τὰς κώμας, διδάσκων ἐν ταῖς συναγωγαῖς
    αὐτῶν καὶ κηρύσσων τὸ εὐαγγέλιον τῆς βασιλείας καὶ θεραπεύων πᾶσαν νόσον καὶ πᾶσαν
    ⸀μαλακίαν.
translation:
  text: And Jesus went throughout all the cities and villages, teaching in their synagogues
    and proclaiming the good news of the kingdom and healing every disease and every
    sickness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the gospel of the kingdom."
    reason: lexical_alternative
  - marker: b
    text: Or "every disease and every infirmity."
    reason: lexical_alternative
lexical_decisions:
- source_word: περιῆγεν
  chosen: went throughout
  alternatives:
  - was going around
  - traveled through
  lexicon: BDAG
  rationale: The imperfect indicates ongoing itinerant activity. 'Went throughout'
    captures repeated movement through the region in natural English without over-paraphrasing.
- source_word: πόλεις πάσας καὶ τὰς κώμας
  chosen: all the cities and villages
  alternatives:
  - every city and village
  - all the towns and villages
  lexicon: BDAG
  rationale: Retains the distinction between larger urban centers (πόλεις) and smaller
    settlements (κῶμαι). 'All the cities and villages' is idiomatic and reflects πάσας
    with both nouns taken together.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: A straightforward participial rendering that preserves the ongoing action
    coordinated with the other participles.
- source_word: συναγωγαῖς αὐτῶν
  chosen: their synagogues
  alternatives:
  - the synagogues
  - their meeting places
  lexicon: BDAG
  rationale: '''Synagogues'' is the standard historical-religious term and should
    not be flattened. The pronoun αὐτῶν is retained as ''their,'' likely referring
    to the communities of the cities and villages.'
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: '''Proclaiming'' preserves the heraldic force of κηρύσσω while remaining
    readable modern English. ''Preaching'' is possible but can sound more ecclesiastical
    than the Greek requires.'
- source_word: τὸ εὐαγγέλιον τῆς βασιλείας
  chosen: the good news of the kingdom
  alternatives:
  - the gospel of the kingdom
  lexicon: BDAG
  rationale: εὐαγγέλιον is rendered 'good news' for accessibility and transparency
    to meaning; 'of the kingdom' preserves the genitival phrase without interpretive
    expansion.
- source_word: θεραπεύων
  chosen: healing
  alternatives:
  - curing
  lexicon: BDAG
  rationale: '''Healing'' is the most natural and contextually appropriate rendering
    for θεραπεύω in Gospel miracle contexts.'
- source_word: πᾶσαν νόσον
  chosen: every disease
  alternatives:
  - every illness
  lexicon: BDAG
  rationale: νόσος commonly denotes disease or illness; 'disease' works well here,
    especially paired distinctly with μαλακία.
- source_word: πᾶσαν μαλακίαν
  chosen: every sickness
  alternatives:
  - every weakness
  - every infirmity
  lexicon: BDAG
  rationale: μαλακία can denote weakness, sickness, or infirmity. 'Sickness' is clear
    modern English and preserves a distinction from νόσος without becoming overly
    technical. 'Infirmity' is a viable alternative worth preserving.
