theological_decisions:
- issue: Rendering εὐαγγέλιον
  chosen_reading: good news
  alternative_readings:
  - gospel
  rationale: The verse does not require retention of traditional ecclesiastical terminology.
    'Good news' better communicates the lexical sense in contemporary English while
    preserving the theological content of the proclamation.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
- issue: Scope of Jesus's healing ministry in πᾶσαν νόσον καὶ πᾶσαν μαλακίαν
  chosen_reading: every disease and every sickness
  alternative_readings:
  - every disease and every infirmity
  rationale: The repeated πᾶσαν is preserved as 'every ... and every ...' to reflect
    the comprehensive scope of the statement without softening it. This is a lexical-compositional
    choice, not an imported doctrinal claim.
  doctrine_reference: Translation philosophy §1 and §5
