theological_decisions:
- issue: Rendering of προσκυνέω toward Jesus
  chosen_reading: bowed down before him
  alternative_readings:
  - worshiped him
  - knelt before him
  rationale: The verb can denote worship or an act of homage/prostration. To preserve
    theological tension rather than resolve the man's full christological understanding,
    the main text renders the visible act ('bowed down before him'), while preserving
    'worshiped him' as a lexical alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
