id: MAT.9.18
reference: Matthew 9:18
source:
  edition: SBLGNT
  text: Ταῦτα αὐτοῦ λαλοῦντος αὐτοῖς ἰδοὺ ἄρχων εἷς ⸀ἐλθὼν προσεκύνει αὐτῷ λέγων ὅτι
    Ἡ θυγάτηρ μου ἄρτι ἐτελεύτησεν· ἀλλὰ ἐλθὼν ἐπίθες τὴν χεῖρά σου ἐπ’ αὐτήν, καὶ
    ζήσεται.
translation:
  text: While he was saying these things to them, look, a ruler came and bowed down
    before him, saying, “My daughter has just died. But come and lay your hand on
    her, and she will live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “worshiped him.” The Greek verb can denote reverential prostration, homage,
      or worship depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα αὐτοῦ λαλοῦντος αὐτοῖς
  chosen: While he was saying these things to them
  alternatives:
  - As he was speaking these things to them
  - While he was talking to them about these things
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous action.
    'Saying' is a natural rendering of λαλέω here and preserves the ongoing discourse
    setting.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to what follows. 'Look'
    preserves the suddenness in readable modern English better than archaic 'behold.'
- source_word: ἄρχων εἷς
  chosen: a ruler
  alternatives:
  - one ruler
  - a leader
  - an official
  lexicon: BDAG
  rationale: ἄρχων denotes a person in authority; in Matthew's compressed account
    the exact office is not specified in this verse. 'A ruler' is sufficiently formal
    and accurate. εἷς functions idiomatically to introduce an individual rather than
    requiring the awkward 'one ruler' in English.
- source_word: ἐλθὼν
  chosen: came
  alternatives:
  - approached
  - having come
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb is naturally rendered with
    a finite verb in English for smoothness: ''came and...''.'
- source_word: προσεκύνει αὐτῷ
  chosen: bowed down before him
  alternatives:
  - knelt before him
  - worshiped him
  lexicon: BDAG
  rationale: προσκυνέω can mean prostration, homage, or worship depending on context.
    Here the immediate scene clearly depicts reverential bodily homage, while 'worshiped'
    could over-specify the man's theological intent. 'Bowed down before him' preserves
    the act without flattening its reverential force.
- source_word: λέγων ὅτι
  chosen: saying, “
  alternatives:
  - and said, “
  - saying that
  lexicon: BDAG
  rationale: Participle of attendant speech introducing direct discourse is best rendered
    'saying' or 'and said.' 'Saying' keeps closer to the Greek structure.
- source_word: Ἡ θυγάτηρ μου
  chosen: My daughter
  alternatives:
  - My little daughter
  lexicon: BDAG
  rationale: θυγάτηρ straightforwardly means 'daughter.' No diminutive is present
    in Matthew's wording.
- source_word: ἄρτι
  chosen: just
  alternatives:
  - just now
  - at this moment
  - recently
  lexicon: BDAG
  rationale: ἄρτι marks immediate recency. 'Just' is concise and idiomatic.
- source_word: ἐτελεύτησεν
  chosen: has just died
  alternatives:
  - just died
  - has come to her end
  lexicon: BDAG
  rationale: τελευτάω means 'die' or 'come to an end.' English present perfect with
    'just' conveys the recent completed action naturally.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast between the daughter's death and the ruler's request.
    'But' is the most natural connective here.
- source_word: ἐλθὼν ἐπίθες
  chosen: come and lay
  alternatives:
  - come, lay
  - having come, place
  lexicon: BDAG
  rationale: 'The aorist participle plus imperative is idiomatically rendered in English
    as coordinated commands: ''come and lay.'' This preserves urgency and naturalness.'
- source_word: τὴν χεῖρά σου ἐπ’ αὐτήν
  chosen: your hand on her
  alternatives:
  - your hand upon her
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the healing gesture; 'upon' is possible
    but less natural in contemporary English.
- source_word: καὶ ζήσεται
  chosen: and she will live
  alternatives:
  - and she will come to life
  - and she will be alive
  lexicon: BDAG
  rationale: Future middle of ζάω here expresses expected restoration to life. 'She
    will live' is the most direct rendering and leaves the miraculous implication
    intact without paraphrase.
