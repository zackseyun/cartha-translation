theological_decisions:
- issue: Rendering of the compassion language for Jesus
  chosen_reading: he had compassion on them
  alternative_readings:
  - he was moved with compassion for them
  rationale: The verse emphasizes Jesus' deep pity without requiring a more wooden
    reproduction of the Greek idiom. The chosen wording preserves the emotional and
    theological force of Jesus' merciful response while remaining readable modern
    English.
  doctrine_reference: Translation philosophy §6; preserve meaning without archaic
    phrasing
- issue: Rendering of the condition of the crowds
  chosen_reading: harassed and cast down
  alternative_readings:
  - weary and scattered
  - distressed and downcast
  - harassed and helpless
  rationale: The Greek participles depict people abused, worn down, and thrown down.
    'Harassed and cast down' stays closer to the lexical imagery than the traditional
    but more interpretive 'harassed and helpless.' This avoids importing a narrower
    doctrinal or pastoral interpretation while preserving the metaphorical force.
  doctrine_reference: Translation philosophy §1 and §5
