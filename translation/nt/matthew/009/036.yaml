id: MAT.9.36
reference: Matthew 9:36
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ τοὺς ὄχλους ἐσπλαγχνίσθη περὶ αὐτῶν ὅτι ἦσαν ἐσκυλμένοι καὶ ἐρριμμένοι
    ⸀ὡσεὶ πρόβατα μὴ ἔχοντα ποιμένα.
translation:
  text: And when he saw the crowds, he had compassion on them, because they were harassed
    and cast down, like sheep without a shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harassed and helpless.' The Greek terms can also be understood more
      interpretively as describing the crowds as worn down and unable to care for
      themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  chosen: when he saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in smooth English:
    ''when he saw.'' This preserves the participial relationship without awkwardness.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural English equivalent in context.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  lexicon: BDAG
  rationale: ὄχλοι refers to gathered masses of people. 'Crowds' is natural modern
    English and avoids archaic 'multitudes.'
- source_word: ἐσπλαγχνίσθη περὶ αὐτῶν
  chosen: he had compassion on them
  alternatives:
  - he felt compassion for them
  - he was moved with compassion for them
  lexicon: BDAG
  rationale: σπλαγχνίζομαι denotes deep compassion. 'Had compassion on them' is idiomatic
    and clear; 'was moved with compassion' is possible but slightly more traditional
    than necessary. περί with genitive is naturally represented by 'on/for them.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for his compassion; 'because' is the clearest contemporary
    rendering.
- source_word: ἦσαν
  chosen: they were
  lexicon: BDAG
  rationale: Imperfect of εἰμί is straightforwardly rendered 'they were.'
- source_word: ἐσκυλμένοι
  chosen: harassed
  alternatives:
  - troubled
  - distressed
  - mangled
  lexicon: BDAG
  rationale: σκύλλω can convey being troubled, harassed, or badly treated. In this
    pastoral metaphor, 'harassed' captures the sense of people worn down by mistreatment
    without over-literalizing the term.
- source_word: καὶ ἐρριμμένοι
  chosen: and cast down
  alternatives:
  - and helpless
  - and thrown down
  - and prostrated
  lexicon: BDAG
  rationale: Perfect passive participle of ῥίπτω literally suggests being thrown down.
    'Cast down' preserves the image and emotional force better than the more interpretive
    'helpless.'
- source_word: ὡσεὶ πρόβατα
  chosen: like sheep
  alternatives:
  - as sheep
  lexicon: BDAG
  rationale: ὡσεί introduces a comparison. 'Like sheep' is natural English.
- source_word: μὴ ἔχοντα ποιμένα
  chosen: without a shepherd
  alternatives:
  - not having a shepherd
  lexicon: BDAG
  rationale: The participial phrase is idiomatically rendered 'without a shepherd'
    in English while preserving the metaphor of leaderless vulnerability.
