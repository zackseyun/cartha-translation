theological_decisions:
- issue: Christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a significant self-designation of Jesus and likely
    evokes Daniel 7 resonances. Preserving the traditional title maintains the theological
    and intertextual tension without flattening it into an interpretive paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Nature of ἐξουσία in forgiving sins
  chosen_reading: authority
  alternative_readings:
  - power
  - right
  rationale: The verse emphasizes Jesus' legitimate authority to forgive sins on earth,
    not merely miraculous capability. This preserves the text's claim without expanding
    it beyond what is stated.
  doctrine_reference: Translation philosophy §§1, 3
