id: MAT.9.6
reference: Matthew 9:6
source:
  edition: SBLGNT
  text: ἵνα δὲ εἰδῆτε ὅτι ἐξουσίαν ἔχει ὁ υἱὸς τοῦ ἀνθρώπου ἐπὶ τῆς γῆς ἀφιέναι ἁμαρτίας—
    τότε λέγει τῷ παραλυτικῷ· ⸀Ἐγερθεὶς ἆρόν σου τὴν κλίνην καὶ ὕπαγε εἰς τὸν οἶκόν
    σου.
translation:
  text: But so that you may know that the Son of Man has authority on earth to forgive
    sins—then he says to the paralytic, “Get up, pick up your bed, and go to your
    house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Human One” for “the Son of Man.” The traditional rendering is retained
      because it preserves Jesus’ title and its likely Daniel 7 resonance.
    reason: lexical_alternative
  - marker: b
    text: Or “mat” for “bed.” Greek κλίνη can refer to a bed, couch, or sleeping pallet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ εἰδῆτε
  chosen: But so that you may know
  alternatives:
  - But that you may know
  - However, so that you may know
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result; with δέ it marks a mild contrast or transition.
    'But so that you may know' preserves both the discourse shift and the purpose
    clause in natural English.
- source_word: ἐξουσίαν ἔχει
  chosen: has authority
  alternatives:
  - has power
  - has the right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. 'Authority'
    best fits the context of Jesus' right to forgive sins, not merely ability.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation and carries Danielic and
    messianic resonance. 'The Son of Man' preserves the title's traditional and intertextual
    force better than a paraphrastic alternative.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: BDAG
  rationale: With ἐπί + genitive, the phrase naturally means 'on earth' here, contrasting
    earthly sphere with divine prerogative and fitting the narrative point.
- source_word: ἀφιέναι ἁμαρτίας
  chosen: to forgive sins
  alternatives:
  - to release sins
  - to pardon sins
  lexicon: BDAG
  rationale: ἀφίημι in this context means forgive/remit. 'Forgive sins' is the standard
    and clearest rendering.
- source_word: τότε λέγει
  chosen: then he says
  alternatives:
  - then he said
  - then he tells
  lexicon: BDAG
  rationale: The Greek uses historical present λέγει. Rendering it as present ('says')
    preserves the narrative vividness; English can naturally accommodate this after
    the dash.
- source_word: τῷ παραλυτικῷ
  chosen: to the paralytic
  alternatives:
  - to the paralyzed man
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'The paralytic' is concise and
    idiomatic, though 'paralyzed man' is possible. The source does not explicitly
    repeat 'man' here.
- source_word: Ἐγερθεὶς
  chosen: Get up
  alternatives:
  - Having arisen
  - Rise
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having arisen'), in this command
    sequence it functions idiomatically as an imperative-like summons. 'Get up' is
    natural modern English and preserves the force.
- source_word: ἆρόν
  chosen: pick up
  alternatives:
  - take up
  - carry
  lexicon: BDAG
  rationale: αἴρω here means lift/carry away. 'Pick up' is clear and idiomatic in
    the immediate healing context.
- source_word: κλίνην
  chosen: bed
  alternatives:
  - mat
  - cot
  lexicon: BDAG
  rationale: κλίνη can denote bed, couch, or pallet. 'Bed' is the broadest natural
    English choice; 'mat' is possible but more interpretive.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: ὕπαγε is a straightforward command to go away/go along. 'Go' is sufficient
    and natural.
- source_word: εἰς τὸν οἶκόν σου
  chosen: to your house
  alternatives:
  - to your home
  lexicon: BDAG
  rationale: οἶκος can mean house or home. 'House' more closely reflects the lexical
    form, while still sounding natural in English.
