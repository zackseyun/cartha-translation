theological_decisions:
- issue: Jesus' statement that the girl 'has not died, but is sleeping'
  chosen_reading: Retain the literal metaphor 'sleeping' in the main text without
    interpretive expansion.
  alternative_readings:
  - Render interpretively as 'is only sleeping'
  - Explain in the main text that 'sleeping' is a metaphor for death
  rationale: The verse presents Jesus' words in their provocative, tension-filled
    form. Preserving 'sleeping' maintains the narrative and theological tension rather
    than resolving whether this is metaphorical, phenomenological, or anticipatory
    speech. This aligns with the translation philosophy to preserve ambiguity/tension
    where the source does not explicitly explain it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
