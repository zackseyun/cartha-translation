id: MAT.9.24
reference: Matthew 9:24
source:
  edition: SBLGNT
  text: ⸀ἔλεγεν· Ἀναχωρεῖτε, οὐ γὰρ ἀπέθανεν τὸ κοράσιον ἀλλὰ καθεύδει· καὶ κατεγέλων
    αὐτοῦ.
translation:
  text: He was saying, “Go away, for the girl has not died, but is sleeping.” And
    they were laughing at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were ridiculing him.' The Greek verb can mean to laugh at someone
      in mockery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: He was saying
  alternatives:
  - He said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the scene; 'was
    saying' preserves that aspect better than the simple past, though English may
    also idiomatically use 'said'.
- source_word: Ἀναχωρεῖτε
  chosen: Go away
  alternatives:
  - Withdraw
  - Leave
  lexicon: BDAG
  rationale: Imperative plural calls for the crowd to depart. 'Go away' is natural
    modern English and preserves the force without sounding overly formal.
- source_word: οὐ γὰρ
  chosen: for ... not
  alternatives:
  - because ... not
  lexicon: BDAG
  rationale: γάρ gives the reason for the command; 'for' is concise and natural here.
- source_word: ἀπέθανεν
  chosen: has not died
  alternatives:
  - did not die
  - is not dead
  lexicon: BDAG
  rationale: Aorist indicative refers to death as an event. English present perfect
    ('has not died') fits the immediate context and contrasts naturally with 'is sleeping.'
- source_word: τὸ κοράσιον
  chosen: the girl
  alternatives:
  - the little girl
  - the young girl
  - the maiden
  lexicon: BDAG
  rationale: κοράσιον denotes a girl, often a young girl. 'The girl' is the most natural
    rendering here; 'little girl' is possible but adds emphasis not explicit in this
    verse alone.
- source_word: ἀλλὰ καθεύδει
  chosen: but is sleeping
  alternatives:
  - but sleeps
  - but is asleep
  lexicon: BDAG
  rationale: Present tense indicates current state/action. 'Is sleeping' is idiomatic
    and preserves the metaphorical contrast Jesus makes.
- source_word: κατεγέλων αὐτοῦ
  chosen: they were laughing at him
  alternatives:
  - they ridiculed him
  - they were mocking him
  lexicon: BDAG
  rationale: The verb means to laugh at, mock, or ridicule. 'Laughing at him' stays
    close to the lexical image while still conveying derision; the imperfect is reflected
    by 'were laughing.'
