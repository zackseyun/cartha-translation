id: MAT.9.16
reference: Matthew 9:16
source:
  edition: SBLGNT
  text: οὐδεὶς δὲ ἐπιβάλλει ἐπίβλημα ῥάκους ἀγνάφου ἐπὶ ἱματίῳ παλαιῷ· αἴρει γὰρ τὸ
    πλήρωμα αὐτοῦ ἀπὸ τοῦ ἱματίου, καὶ χεῖρον σχίσμα γίνεται.
translation:
  text: But no one puts a patch of unshrunk cloth on an old garment, for the patch
    pulls away from the garment, and a worse tear results.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of unfulled cloth'; the Greek describes cloth not yet processed, with
      the sense that it has not been shrunk and so will pull against the old garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no man
  lexicon: BDAG
  rationale: Indefinite negative subject; 'no one' is natural modern English and preserves
    the universal sense without unnecessary gendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast/transition with the preceding context; 'But' best
    reflects the adversative force here.
- source_word: ἐπιβάλλει
  chosen: puts
  alternatives:
  - sews
  - places
  lexicon: BDAG
  rationale: The verb literally means 'puts on/applies.' In this garment context,
    English idiom favors 'puts ... on' rather than the more specific 'sews,' which
    is implied by context but not stated by the verb itself.
- source_word: ἐπίβλημα
  chosen: patch
  alternatives:
  - piece
  - patch-piece
  lexicon: BDAG
  rationale: Refers to a patch applied to clothing. 'Patch' is the clearest idiomatic
    rendering in modern English.
- source_word: ῥάκους ἀγνάφου
  chosen: of unshrunk cloth
  alternatives:
  - of unfulled cloth
  - of undressed cloth
  - of raw cloth
  lexicon: BDAG
  rationale: The genitive phrase describes the material of the patch. ἄγναφος refers
    to cloth not yet processed/shrunk by fulling; 'unshrunk cloth' communicates the
    practical point of the illustration most clearly for modern readers.
- source_word: ἐπὶ ἱματίῳ παλαιῷ
  chosen: on an old garment
  alternatives:
  - on an old cloak
  - on an old piece of clothing
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment or article of clothing. 'Garment'
    is broad enough and fits the proverbial illustration; 'old' renders παλαιῷ straightforwardly.
- source_word: αἴρει
  chosen: pulls away
  alternatives:
  - tears away
  - takes away
  lexicon: BDAG
  rationale: In context the sense is that the added patch pulls away from the old
    garment, worsening the damage. 'Pulls away' captures the resulting strain without
    overtranslating the mechanism.
- source_word: τὸ πλήρωμα αὐτοῦ
  chosen: the patch
  alternatives:
  - its fullness
  - its filling
  - the piece that fills it
  lexicon: BDAG
  rationale: Literally 'its fullness/filling,' but in this sewing context it refers
    to the filling piece, i.e., the patch itself. Rendering it as 'the patch' communicates
    the referent clearly in idiomatic English.
- source_word: ἀπὸ τοῦ ἱματίου
  chosen: from the garment
  alternatives:
  - from the clothing
  - out of the garment
  lexicon: BDAG
  rationale: Simple prepositional phrase indicating separation from the old garment.
- source_word: χεῖρον σχίσμα γίνεται
  chosen: a worse tear results
  alternatives:
  - the tear becomes worse
  - a worse rip is made
  lexicon: BDAG
  rationale: χείρον is comparative ('worse'), σχίσμα is a tear/split, and γίνεται
    indicates resulting state. 'A worse tear results' is concise, natural, and preserves
    the consequential force.
