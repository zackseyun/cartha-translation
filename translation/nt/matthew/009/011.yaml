id: MAT.9.11
reference: Matthew 9:11
source:
  edition: SBLGNT
  text: καὶ ἰδόντες οἱ Φαρισαῖοι ⸀ἔλεγον τοῖς μαθηταῖς αὐτοῦ· Διὰ τί μετὰ τῶν τελωνῶν
    καὶ ἁμαρτωλῶν ἐσθίει ὁ διδάσκαλος ὑμῶν;
translation:
  text: And when the Pharisees saw it, they were saying to his disciples, “Why does
    your teacher eat with tax collectors and sinners?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And seeing this, the Pharisees said to his disciples...'
      The Greek participle leaves the object of 'saw' implicit, referring to the meal
      scene in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered temporally in natural English.
    'When ... saw' fits the narrative flow. 'It' is supplied in English because the
    participle implies an observed situation, namely the meal scene from the context.
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive past speech. 'They were
    saying' preserves the imperfective aspect better than simple 'said' while remaining
    readable.
- source_word: μαθηταῖς
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually appropriate rendering
    for μαθητής in Gospel narrative, preserving the teacher-disciple relationship.'
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: BDAG
  rationale: Idiomatic interrogative in English; concise and accurate.
- source_word: τελωνῶν
  chosen: tax collectors
  alternatives:
  - tax farmers
  - revenue agents
  lexicon: BDAG
  rationale: '''Tax collectors'' is the established and accurate rendering for τελώνης
    in this context, conveying the socially stigmatized profession without unnecessary
    technicality.'
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Direct and standard rendering of ἁμαρτωλός. In this context it likely
    reflects a socially and morally marked group, but the simple term 'sinners' best
    matches the Greek.
- source_word: ἐσθίει
  chosen: eat
  alternatives:
  - dine
  - share a meal
  lexicon: BDAG
  rationale: Present tense in the quoted question is naturally rendered as English
    present. 'Eat' is the basic lexical sense and avoids adding formality not explicit
    in the Greek.
- source_word: διδάσκαλος
  chosen: teacher
  alternatives:
  - master
  - rabbi
  lexicon: BDAG
  rationale: The translation philosophy prefers translating titles. 'Teacher' is the
    plain sense of διδάσκαλος and is more transparent than transliterated 'rabbi'
    here.
