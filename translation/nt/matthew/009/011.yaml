theological_decisions:
- issue: Whether to make explicit the object of 'saw'
  chosen_reading: Supplied 'it' in English
  alternative_readings:
  - And seeing, the Pharisees were saying...
  - And when the Pharisees saw, they were saying...
  rationale: The Greek leaves the object implicit, but English normally requires one
    in this construction. Supplying 'it' clarifies that they observed the meal situation
    without adding theological content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
