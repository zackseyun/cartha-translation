theological_decisions:
- issue: Aspect of the three present imperatives
  chosen_reading: Render as simple English imperatives ('Ask,' 'seek,' 'knock') while
    allowing the Greek present imperative's ongoing nuance to remain implicit.
  alternative_readings:
  - Render explicitly as 'Keep asking ... keep seeking ... keep knocking'
  rationale: The verse may imply persistence, especially in context, but the Greek
    forms themselves do not require an expanded iterative paraphrase in the main text.
    Optimal equivalence favors preserving the commands in natural English while documenting
    the aspectual alternative in a footnote.
  doctrine_reference: Translation philosophy §3, §6
