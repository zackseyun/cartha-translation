id: MAT.7.7
reference: Matthew 7:7
source:
  edition: SBLGNT
  text: Αἰτεῖτε, καὶ δοθήσεται ὑμῖν· ζητεῖτε, καὶ εὑρήσετε· κρούετε, καὶ ἀνοιγήσεται
    ὑμῖν.
translation:
  text: Ask, and it will be given to you; seek, and you will find; knock, and it will
    be opened to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek present imperatives can also be understood with an ongoing sense:
      ''Keep asking ... keep seeking ... keep knocking.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Αἰτεῖτε
  chosen: Ask
  alternatives:
  - Keep asking
  - Request
  lexicon: BDAG
  rationale: Present active imperative, second person plural. English imperative 'Ask'
    is idiomatic and preserves the command force without overtranslating aspect. 'Keep
    asking' reflects the present imperative's imperfective nuance, but that nuance
    is better left implicit in the main text for readability.
- source_word: δοθήσεται
  chosen: it will be given
  alternatives:
  - it shall be given
  lexicon: BDAG
  rationale: Future passive indicative of δίδωμι. 'It will be given' is natural modern
    English and preserves the passive construction, leaving the implied giver unstated
    as in Greek.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: Dative pronoun best rendered explicitly as 'to you' after passive 'be
    given' and after 'be opened' to preserve the Greek relation and clarity.
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - keep seeking
  - look for
  lexicon: BDAG
  rationale: Present active imperative. 'Seek' is the established and semantically
    fitting rendering, carrying both literal and figurative force. 'Look for' is possible
    but weaker in register and theological resonance.
- source_word: εὑρήσετε
  chosen: you will find
  alternatives:
  - you shall find
  lexicon: BDAG
  rationale: Future active indicative. 'You will find' is straightforward, modern,
    and formally close.
- source_word: κρούετε
  chosen: knock
  alternatives:
  - keep knocking
  lexicon: BDAG
  rationale: Present active imperative. 'Knock' is the natural English imperative.
    As with the prior imperatives, the iterative/imperfective nuance is not made explicit
    in the main text to avoid interpretive overloading.
- source_word: ἀνοιγήσεται
  chosen: it will be opened
  alternatives:
  - it will open
  lexicon: BDAG
  rationale: Future passive indicative of ἀνοίγω. The passive is explicit in Greek
    and should be preserved. 'It will open' would shift to an intransitive active
    sense and obscure the form.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Simple coordinating conjunction repeated in each clause. 'And' preserves
    the rhythmic parallelism of the Greek; 'then' would add a consequential nuance
    not explicit in the text.
