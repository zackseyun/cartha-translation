id: MAT.7.24
reference: Matthew 7:24
source:
  edition: SBLGNT
  text: Πᾶς οὖν ὅστις ἀκούει μου τοὺς λόγους τούτους καὶ ποιεῖ αὐτούς, ⸀ὁμοιωθήσεται
    ἀνδρὶ φρονίμῳ, ὅστις ᾠκοδόμησεν ⸂αὐτοῦ τὴν οἰκίαν⸃ ἐπὶ τὴν πέτραν.
translation:
  text: Therefore everyone who hears these words of mine and does them will be like
    a wise man who built his house on the rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be compared to' or 'will be likened to.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'a wise man'; the comparison is grammatically masculine in the source
      text.
    reason: cultural_note
lexical_decisions:
- source_word: Πᾶς οὖν ὅστις
  chosen: Therefore everyone who
  alternatives:
  - So everyone who
  - Therefore whoever
  lexicon: BDAG
  rationale: Πᾶς with ὅστις gives a distributive/generic sense, best rendered 'everyone
    who.' οὖν is inferential, so 'therefore' preserves the logical connection to the
    preceding teaching.
- source_word: ἀκούει μου τοὺς λόγους τούτους
  chosen: hears these words of mine
  alternatives:
  - hears these sayings of mine
  - listens to these words of mine
  lexicon: BDAG
  rationale: λόγους is broadly 'words' or 'sayings.' 'Words' is more transparent and
    natural here, while 'of mine' preserves the genitive μου.
- source_word: καὶ ποιεῖ αὐτούς
  chosen: and does them
  alternatives:
  - and acts on them
  - and puts them into practice
  lexicon: BDAG
  rationale: ποιέω here means to do/perform what has been heard. 'Does them' is slightly
    more formal but preserves the directness of the Greek and the parallel with hearing.
- source_word: ὁμοιωθήσεται
  chosen: will be like
  alternatives:
  - will be compared to
  - will be likened to
  lexicon: BDAG
  rationale: The future passive can be rendered idiomatically in English as 'will
    be like.' This avoids awkwardness while preserving the comparison introduced by
    the passive verb.
- source_word: ἀνδρὶ φρονίμῳ
  chosen: a wise man
  alternatives:
  - a prudent man
  - a sensible man
  lexicon: BDAG
  rationale: ἀνήρ specifically denotes a male person, not generic humanity, and the
    doctrine calls for gender-accurate rendering. φρόνιμος is 'wise/prudent'; 'wise'
    is the most natural and established equivalent in this context.
- source_word: ᾠκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  lexicon: BDAG
  rationale: οἰκοδομέω in this narrative image is straightforwardly 'built.'
- source_word: αὐτοῦ τὴν οἰκίαν
  chosen: his house
  alternatives:
  - his home
  lexicon: BDAG
  rationale: The possessive pronoun and noun are naturally rendered 'his house.' 'House'
    better preserves the building metaphor than 'home.'
- source_word: ἐπὶ τὴν πέτραν
  chosen: on the rock
  alternatives:
  - upon the rock
  - on bedrock
  lexicon: BDAG
  rationale: πέτρα is 'rock,' here indicating a solid rocky foundation. 'On the rock'
    is the most direct rendering and preserves the imagery without over-specifying.
