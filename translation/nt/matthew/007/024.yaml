theological_decisions:
- issue: Gendered representative language in the comparison
  chosen_reading: a wise man
  alternative_readings:
  - a wise person
  rationale: The Greek uses ἀνδρὶ, specifically 'man,' in the illustrative comparison.
    Following the stated gender-accurate philosophy, the masculine form is retained
    rather than neutralized, while the generic force of the broader statement is already
    conveyed by 'everyone who.'
