id: MAT.7.6
reference: Matthew 7:6
source:
  edition: SBLGNT
  text: Μὴ δῶτε τὸ ἅγιον τοῖς κυσίν, μηδὲ βάλητε τοὺς μαργαρίτας ὑμῶν ἔμπροσθεν τῶν
    χοίρων, μήποτε ⸀καταπατήσουσιν αὐτοὺς ἐν τοῖς ποσὶν αὐτῶν καὶ στραφέντες ῥήξωσιν
    ὑμᾶς.
translation:
  text: Do not give what is holy to dogs, and do not throw your pearls before pigs,
    lest they trample them under their feet and, turning, tear you to pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy thing' or 'what is sacred.' The Greek expression is broad and
      may refer generally to what is consecrated or holy.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''cast your pearls before swine.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'tear you apart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἅγιον
  chosen: what is holy
  alternatives:
  - the holy thing
  - what is sacred
  lexicon: BDAG
  rationale: The neuter singular adjective used substantivally is best rendered generically
    as 'what is holy' rather than the more wooden 'the holy thing.' This preserves
    the broad referent without over-specifying whether Jesus means sacred teaching,
    consecrated things, or something else.
- source_word: κυσίν
  chosen: dogs
  lexicon: BDAG
  rationale: A straightforward plural dative. 'Dogs' preserves the metaphorical force
    and cultural offensiveness of the image without softening it.
- source_word: βάλητε
  chosen: throw
  alternatives:
  - cast
  lexicon: BDAG
  rationale: '''Throw'' is natural modern English and fits the translation philosophy
    better than the traditional but archaic-sounding ''cast,'' while still accurately
    reflecting βάλλω.'
- source_word: μαργαρίτας
  chosen: pearls
  lexicon: BDAG
  rationale: Standard lexical sense. The plural is retained.
- source_word: χοίρων
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: '''Pigs'' is clear modern English; ''swine'' is more traditional but
    less natural for contemporary readers. The metaphor is preserved either way.'
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - so that they may not
  lexicon: BDAG
  rationale: Introduces a negative purpose/result warning. 'Lest' concisely captures
    the sense in idiomatic English.
- source_word: καταπατήσουσιν
  chosen: trample
  alternatives:
  - trample underfoot
  lexicon: BDAG
  rationale: The verb means to trample down. Because the following phrase 'under their
    feet' is explicit in Greek, rendering the verb simply as 'trample' avoids redundancy
    while preserving the full sense in the clause.
- source_word: ἐν τοῖς ποσὶν αὐτῶν
  chosen: under their feet
  alternatives:
  - with their feet
  lexicon: BDAG
  rationale: Though literally 'in their feet,' the idiomatic sense in context is 'under
    their feet' as part of the trampling image.
- source_word: στραφέντες
  chosen: turning
  alternatives:
  - having turned
  - turning around
  lexicon: BDAG
  rationale: The aorist participle is rendered with a natural English participle indicating
    subsequent hostile action.
- source_word: ῥήξωσιν
  chosen: tear you to pieces
  alternatives:
  - tear you apart
  - attack you
  lexicon: BDAG
  rationale: The verb conveys violent tearing or ripping. 'Tear you to pieces' communicates
    the severity of the image more clearly than the weaker 'attack you.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, naturally rendered 'you' in English.
