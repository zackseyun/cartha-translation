theological_decisions:
- issue: Interpretation of the metaphors 'what is holy,' 'dogs,' 'pearls,' and 'pigs'
  chosen_reading: Retain the metaphors without interpretive expansion.
  alternative_readings:
  - Explicitly interpret 'what is holy' as sacred teaching or the message of the kingdom
  - Explicitly interpret 'dogs' and 'pigs' as wicked people or those hostile to the
    gospel
  rationale: The verse uses vivid metaphor but does not itself define each image with
    precision. To preserve theological tension and avoid importing a narrower doctrinal
    interpretation than the text states, the translation leaves the imagery intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
