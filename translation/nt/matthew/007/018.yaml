theological_decisions:
- issue: Nature of the impossibility in the metaphor
  chosen_reading: Render the statement as categorical inability ('cannot') without
    softening it to mere improbability.
  alternative_readings:
  - does not usually produce
  - should not produce
  rationale: The Greek δύναται plainly states inability, and the verse's force in
    Jesus' teaching depends on the strong contrast between nature and outcome. The
    translation preserves the rhetorical and moral force without importing further
    doctrinal conclusions beyond the metaphor itself.
  doctrine_reference: 'Translation philosophy #3'
