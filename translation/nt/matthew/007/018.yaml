id: MAT.7.18
reference: Matthew 7:18
source:
  edition: SBLGNT
  text: οὐ δύναται δένδρον ἀγαθὸν καρποὺς πονηροὺς ⸀ποιεῖν, οὐδὲ δένδρον σαπρὸν καρποὺς
    καλοὺς ποιεῖν.
translation:
  text: A good tree cannot produce bad fruit, nor can a rotten tree produce good fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a healthy tree.'
    reason: lexical_alternative
  - marker: b
    text: Or 'evil fruit' for 'bad fruit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a decayed tree' for 'a rotten tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δένδρον ἀγαθόν
  chosen: a good tree
  alternatives:
  - a healthy tree
  lexicon: BDAG
  rationale: ἀγαθός commonly means 'good.' In this saying about moral discernment
    through outcomes, 'good' preserves both the literal image and the evaluative force
    better than the more interpretive 'healthy.'
- source_word: δύναται ... ποιεῖν
  chosen: cannot produce
  alternatives:
  - is not able to bear
  - cannot make
  lexicon: BDAG
  rationale: δύναται expresses inability, and ποιέω here with καρπούς idiomatically
    means to produce/yield fruit. 'Cannot produce' is natural English and preserves
    the sense of impossibility.
- source_word: καρποὺς πονηρούς
  chosen: bad fruit
  alternatives:
  - evil fruit
  - worthless fruit
  lexicon: BDAG
  rationale: πονηρός can mean evil, bad, or wicked. In the metaphor of fruit as visible
    outcomes, 'bad' is the most idiomatic and broad English equivalent, avoiding an
    overly abstract moralizing gloss while retaining negative quality.
- source_word: οὐδέ
  chosen: nor can
  alternatives:
  - and not
  - neither can
  lexicon: BDAG
  rationale: οὐδέ links the second clause as a parallel negation. 'Nor can' gives
    smooth English while preserving the balanced structure of the Greek.
- source_word: δένδρον σαπρόν
  chosen: a rotten tree
  alternatives:
  - a bad tree
  - a decayed tree
  lexicon: BDAG
  rationale: σαπρός denotes something rotten, decayed, or corrupt. 'Rotten' is vivid,
    idiomatic, and matches the imagery used elsewhere in the immediate context better
    than the flatter 'bad.'
- source_word: καρποὺς καλούς
  chosen: good fruit
  alternatives:
  - fine fruit
  lexicon: BDAG
  rationale: καλός here describes fruit of good quality. 'Good fruit' is the standard
    and natural rendering, preserving the contrast with 'bad fruit' and the parallelism
    of the verse.
