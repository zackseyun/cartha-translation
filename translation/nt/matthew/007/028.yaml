theological_decisions:
- issue: Reference of Jesus' discourse
  chosen_reading: these words refers to the immediately preceding teaching, rendered
    straightforwardly without expanding to a theological label such as 'sermon.'
  alternative_readings:
  - these sayings
  - this sermon
  rationale: The verse summarizes Jesus' completed discourse. The translation avoids
    importing an interpretive label not present in the Greek while still clearly referring
    to what Jesus has just spoken.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
