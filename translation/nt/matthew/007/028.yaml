id: MAT.7.28
reference: Matthew 7:28
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὅτε ⸀ἐτέλεσεν ὁ Ἰησοῦς τοὺς λόγους τούτους, ἐξεπλήσσοντο οἱ ὄχλοι
    ἐπὶ τῇ διδαχῇ αὐτοῦ·
translation:
  text: And it happened that when Jesus had finished these words, the crowds were
    astonished at his teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these sayings.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''And it came to pass.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now when
  lexicon: BDAG
  rationale: This idiomatic narrative formula marks transition and continuation. 'And
    it happened' preserves the Greek structure more transparently than the traditional
    but archaic 'it came to pass,' while avoiding the over-smoothing of simply 'when'
    or 'now when.'
- source_word: ὅτε
  chosen: that when
  alternatives:
  - when
  lexicon: BDAG
  rationale: With the preceding ἐγένετο, ὅτε introduces the content/time clause. In
    English, 'that when' best reflects the full construction 'it happened that when...'
    without losing the Greek's layered syntax.
- source_word: ἐτέλεσεν
  chosen: had finished
  alternatives:
  - finished
  - completed
  - ended
  lexicon: BDAG
  rationale: The aorist here refers to Jesus bringing this discourse to its conclusion.
    'Had finished' is natural English in a past-time subordinate clause and captures
    the sense of completion better than the flatter 'ended.'
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these sayings
  - these statements
  lexicon: BDAG
  rationale: λόγοι can mean 'words,' 'sayings,' or 'statements.' Here 'these words'
    is a natural and sufficiently formal rendering for the discourse just delivered,
    preserving the demonstrative force of τούτους.
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were astounded
  lexicon: BDAG
  rationale: The imperfect indicates an ongoing or collective reaction. 'Were astonished'
    preserves the strength of the verb without becoming colloquial; it also fits the
    solemn tone of the conclusion to the Sermon on the Mount.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: Plural ὄχλοι is best represented by 'the crowds.' 'Multitudes' is traditional
    but less natural in contemporary English; singular 'crowd' would flatten the Greek
    number.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  chosen: at his teaching
  alternatives:
  - because of his teaching
  - at the teaching of him
  lexicon: BDAG
  rationale: With ἐκπλήσσομαι, ἐπί plus dative expresses the basis or occasion of
    astonishment. 'At his teaching' is idiomatic English and preserves the causal/objective
    sense without awkwardness.
