id: MAT.7.2
reference: Matthew 7:2
source:
  edition: SBLGNT
  text: ἐν ᾧ γὰρ κρίματι κρίνετε κριθήσεσθε, καὶ ἐν ᾧ μέτρῳ μετρεῖτε μετρηθήσεται
    ὑμῖν.
translation:
  text: For with the judgment by which you judge, you will be judged, and with the
    measure by which you measure, it will be measured to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will be measured back to you.' The Greek does not explicitly include
      'back,' though the reciprocal sense is implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίματι
  chosen: judgment
  alternatives:
  - standard
  - verdict
  lexicon: BDAG
  rationale: κρίμα commonly denotes judgment or judicial assessment. 'Judgment' best
    preserves the semantic link with the cognate verb κρίνετε/κριθήσεσθε and fits
    the warning context of 7:1–5.
- source_word: κρίνετε
  chosen: you judge
  alternatives:
  - you condemn
  - you pass judgment
  lexicon: BDAG
  rationale: κρίνω has a broad range including judge, evaluate, condemn. In this immediate
    context, the cognate construction with κρίματι favors the general 'judge' rather
    than the narrower 'condemn,' preserving the lexical repetition of the Greek.
- source_word: κριθήσεσθε
  chosen: you will be judged
  alternatives:
  - you will be condemned
  - judgment will be passed on you
  lexicon: BDAG
  rationale: Future passive of κρίνω mirrors the prior active verb. 'You will be judged'
    preserves the reciprocity and keeps the wording close to the Greek without over-specifying
    condemnation.
- source_word: μέτρῳ
  chosen: measure
  alternatives:
  - standard
  - measuring rod
  lexicon: BDAG
  rationale: μέτρον here is metaphorical for the standard or quantity one uses toward
    others. 'Measure' is the most natural English equivalent and preserves the wordplay
    with μετρεῖτε/μετρηθήσεται.
- source_word: μετρεῖτε
  chosen: you measure
  alternatives:
  - you mete out
  - you use as a measure
  lexicon: BDAG
  rationale: The verb is retained as 'measure' to preserve the direct lexical correspondence
    with μέτρῳ and the proverbial force of the saying.
- source_word: μετρηθήσεται ὑμῖν
  chosen: it will be measured to you
  alternatives:
  - it will be measured back to you
  - it will be meted out to you
  lexicon: BDAG
  rationale: The passive with dative ὑμῖν is naturally rendered 'to you.' 'Back' is
    interpretively plausible from the reciprocal sense, but it is not explicit in
    the Greek and is therefore omitted from the main text.
- source_word: ἐν ᾧ ... ἐν ᾧ
  chosen: with ... by which
  alternatives:
  - in whatever ... in whatever
  - by ... by which
  lexicon: BDAG
  rationale: The repeated ἐν ᾧ + dative idiom expresses instrument or standard. Rendering
    the first as 'with' and the second clause as 'by which' yields natural English
    while preserving the parallel structure.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ grounds the preceding prohibition in 7:1. 'For' is concise and preserves
    the explanatory connection.
