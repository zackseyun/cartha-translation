theological_decisions:
- issue: Nature of reciprocal judgment
  chosen_reading: The verse states a principle of reciprocal divine or corresponding
    judgment without specifying the exact agent in the passive.
  alternative_readings:
  - God will judge you by the same standard
  - Others will judge you by the same standard
  rationale: The passive verbs leave the agent unstated. The translation preserves
    that theological and interpretive openness rather than resolving it toward either
    divine judgment alone or merely human reciprocity.
  doctrine_reference: Preserve theological tension rather than resolve it.
