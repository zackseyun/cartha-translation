id: MAT.7.1
reference: Matthew 7:1
source:
  edition: SBLGNT
  text: Μὴ κρίνετε, ἵνα μὴ κριθῆτε·
translation:
  text: Do not judge, so that you may not be judged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not condemn, so that you may not be condemned.' The Greek verb can
      in some contexts carry the sense of condemning, but 'judge' is broader and preserves
      the lexical repetition in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  chosen: Do not
  alternatives:
  - not
  lexicon: BDAG
  rationale: With the present imperative κρίνετε, μή introduces a prohibition. In
    idiomatic English, 'Do not' best conveys the force of the negative command.
- source_word: κρίνετε
  chosen: judge
  alternatives:
  - condemn
  - pass judgment
  lexicon: BDAG
  rationale: κρίνω has a broad semantic range including judge, evaluate, and condemn.
    Here 'judge' preserves the lexical link with κριθῆτε in the second clause and
    avoids over-narrowing the command to final condemnation alone. 'Pass judgment'
    is possible but less concise; 'condemn' is too strong for the main text.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - lest
  lexicon: BDAG
  rationale: ἵνα with the following subjunctive expresses purpose/result. 'So that'
    is natural modern English and preserves the connection without sounding overly
    formal. 'Lest' is archaic here.
- source_word: μὴ
  chosen: not
  lexicon: BDAG
  rationale: The second μή negates the following passive subjunctive and is straightforwardly
    rendered 'not' in English.
- source_word: κριθῆτε
  chosen: be judged
  alternatives:
  - be condemned
  - come under judgment
  lexicon: BDAG
  rationale: 'The aorist passive subjunctive of κρίνω is best rendered with the same
    English root as κρίνετε for transparency and rhetorical balance: ''be judged.''
    Alternatives such as ''be condemned'' interpret the scope too narrowly.'
