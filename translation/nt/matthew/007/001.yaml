theological_decisions:
- issue: Scope of κρίνω in Jesus' prohibition
  chosen_reading: Retain the broader term 'judge' rather than interpretively narrowing
    it to 'condemn.'
  alternative_readings:
  - Do not condemn, so that you may not be condemned.
  - Do not pass judgment, so that judgment will not be passed on you.
  rationale: The verse warns against a kind of judging that is clarified by the immediate
    context (7:2–5), but this single verse does not itself specify every boundary
    of moral evaluation. Rendering κρίνω as 'judge' preserves the theological tension
    and lets the context define the prohibition rather than importing a narrower doctrinal
    interpretation into the translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
