id: MAT.7.5
reference: Matthew 7:5
source:
  edition: SBLGNT
  text: ὑποκριτά, ἔκβαλε πρῶτον ⸂ἐκ τοῦ ὀφθαλμοῦ σοῦ τὴν δοκόν⸃, καὶ τότε διαβλέψεις
    ἐκβαλεῖν τὸ κάρφος ἐκ τοῦ ὀφθαλμοῦ τοῦ ἀδελφοῦ σου.
translation:
  text: Hypocrite, first remove the beam from your eye, and then you will see clearly
    to remove the speck from your brother’s eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'log' or 'plank' for 'beam' (δοκός).
    reason: lexical_alternative
  - marker: b
    text: Or 'splinter' or 'bit of straw' for 'speck' (κάρφος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριτά
  chosen: Hypocrite
  alternatives:
  - You hypocrite
  lexicon: BDAG
  rationale: Vocative singular used as a direct address of rebuke. 'Hypocrite' preserves
    the sharpness and conventional force of Jesus' address; adding 'You' is possible
    in English but not necessary.
- source_word: ἔκβαλε
  chosen: remove
  alternatives:
  - cast out
  - take out
  lexicon: BDAG
  rationale: Aorist imperative of ἐκβάλλω. 'Remove' is natural modern English and
    fits the physical metaphor of extracting an obstruction from the eye without sounding
    overly wooden.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Marks priority in sequence. 'First' is the most direct and idiomatic
    rendering.
- source_word: δοκόν
  chosen: beam
  alternatives:
  - log
  - plank
  lexicon: BDAG
  rationale: δοκός denotes a large beam of timber. 'Beam' preserves the image of something
    structurally large and exaggerated in contrast to the tiny κάρφος. 'Log' is common
    in English tradition, but 'beam' is lexically tighter to the built-structure sense.
- source_word: ὀφθαλμοῦ
  chosen: eye
  lexicon: BDAG
  rationale: Standard rendering of ὀφθαλμός in this bodily metaphor.
- source_word: διαβλέψεις
  chosen: you will see clearly
  alternatives:
  - you will see
  - you will be able to see
  lexicon: BDAG
  rationale: The compound verb διαβλέπω carries the sense of seeing clearly or seeing
    through. 'You will see clearly' preserves the intensified sense better than a
    simple 'see'.
- source_word: ἐκβαλεῖν
  chosen: to remove
  alternatives:
  - to cast out
  - to take out
  lexicon: BDAG
  rationale: Infinitive matching the earlier imperative ἔκβαλε. Repeating 'remove'
    maintains consistency and reads naturally in English.
- source_word: κάρφος
  chosen: speck
  alternatives:
  - splinter
  - straw
  lexicon: BDAG
  rationale: κάρφος refers to a small dry particle such as a speck, splinter, or bit
    of straw. 'Speck' is idiomatic in the eye-metaphor and preserves the contrast
    with 'beam,' though the more material sense 'splinter' remains plausible.
- source_word: ἀδελφοῦ
  chosen: brother’s
  alternatives:
  - fellow believer's
  lexicon: BDAG
  rationale: ἀδελφός is literally 'brother.' In this context it refers to another
    person within the moral/religious community. Per the translation philosophy, the
    masculine form is retained as gender-accurate rather than neutralized.
