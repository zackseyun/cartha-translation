theological_decisions:
- issue: Gendered relational term ἀδελφοῦ
  chosen_reading: brother’s
  alternative_readings:
  - another person's
  - neighbor's
  rationale: The Greek is grammatically masculine singular and the doctrine excerpt
    directs gender-accurate rendering over gender-neutral smoothing unless context
    demands otherwise. 'Brother' also fits Jesus' discourse about interpersonal judgment
    within the covenant community.
