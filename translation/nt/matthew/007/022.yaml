theological_decisions:
- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse presents people addressing Jesus as κύριος. Per doctrine, the
    default rendering is 'Lord.' This preserves both the title’s ordinary sense and
    its christological weight without importing more than the text states.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Eschatological force of 'that day'
  chosen_reading: on that day
  alternative_readings:
  - on the day of judgment
  rationale: The context clearly points to final judgment, but the Greek says only
    'on that day.' The translation preserves the biblical idiom and theological tension
    without making the implicit explicit in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
