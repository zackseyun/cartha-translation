id: MAT.7.22
reference: Matthew 7:22
source:
  edition: SBLGNT
  text: πολλοὶ ἐροῦσίν μοι ἐν ἐκείνῃ τῇ ἡμέρᾳ· Κύριε κύριε, οὐ τῷ σῷ ὀνόματι ἐπροφητεύσαμεν,
    καὶ τῷ σῷ ὀνόματι δαιμόνια ἐξεβάλομεν, καὶ τῷ σῷ ὀνόματι δυνάμεις πολλὰς ἐποιήσαμεν;
translation:
  text: Many will say to me on that day, ‘Lord, Lord, did we not prophesy in your
    name, and cast out demons in your name, and do many mighty works in your name?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perform many miracles' or 'do many works of power.' The Greek phrase
      literally refers to many 'powers,' a Gospel expression often used for miraculous
      deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Anarthrous masculine plural adjective used substantivally; 'Many' is
    natural and sufficiently formal without adding 'people,' which the Greek does
    not state.
- source_word: ἐροῦσίν μοι
  chosen: will say to me
  alternatives:
  - will tell me
  lexicon: BDAG
  rationale: Future of λέγω with dative pronoun. 'Say to me' is the most direct rendering;
    'tell me' is possible but slightly more interpretive.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Idiomatic temporal expression. Although Greek uses ἐν, standard English
    temporal idiom is 'on that day.' The phrase also carries eschatological force,
    which is preserved without expansion.
- source_word: Κύριε κύριε
  chosen: Lord, Lord
  alternatives:
  - Master, Master
  lexicon: BDAG
  rationale: Vocative repetition expresses urgency and appeal. Per doctrine, κύριος
    defaults to 'Lord.' 'Master' is possible lexically but not preferred here.
- source_word: οὐ ... ἐπροφητεύσαμεν
  chosen: did we not prophesy
  alternatives:
  - did we not speak prophetically
  lexicon: BDAG
  rationale: The question expects an affirmative answer. English idiom renders this
    with 'did we not...?' 'Prophesy' is the standard and sufficiently transparent
    gloss for προφητεύω.
- source_word: τῷ σῷ ὀνόματι
  chosen: in your name
  alternatives:
  - by your name
  lexicon: BDAG
  rationale: Dative phrase repeated three times; 'in your name' is the established
    and accurate idiom for acting under the authority or invocation of someone’s name.
    Repetition is preserved for rhetorical force.
- source_word: δαιμόνια ἐξεβάλομεν
  chosen: cast out demons
  alternatives:
  - drove out demons
  lexicon: BDAG
  rationale: ἐκβάλλω with δαιμόνια commonly refers to exorcism. 'Cast out demons'
    is the most natural and recognizable English equivalent.
- source_word: δυνάμεις πολλὰς ἐποιήσαμεν
  chosen: do many mighty works
  alternatives:
  - perform many miracles
  - do many works of power
  lexicon: BDAG
  rationale: δύναμις in Gospel contexts can denote deeds of power/miracles. 'Mighty
    works' preserves the lexical connection to power without over-specifying, while
    remaining readable. 'Do' mirrors ἐποιήσαμεν more closely than 'perform.'
