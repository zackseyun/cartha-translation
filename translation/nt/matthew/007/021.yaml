id: MAT.7.21
reference: Matthew 7:21
source:
  edition: SBLGNT
  text: Οὐ πᾶς ὁ λέγων μοι· Κύριε κύριε εἰσελεύσεται εἰς τὴν βασιλείαν τῶν οὐρανῶν,
    ἀλλ’ ὁ ποιῶν τὸ θέλημα τοῦ πατρός μου τοῦ ἐν ⸀τοῖς οὐρανοῖς.
translation:
  text: Not everyone who says to me, ‘Lord, Lord,’ will enter into the kingdom of
    heaven, but the one who does the will of my Father who is in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the kingdom of the heavens.” Matthew frequently uses this expression
      where other contexts say “kingdom of God.”
    reason: lexical_alternative
  - marker: b
    text: Greek “the heavens” (plural) also at the end of the verse; rendered idiomatically
      as “heaven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ πᾶς ὁ λέγων μοι
  chosen: Not everyone who says to me
  alternatives:
  - Not everyone saying to me
  - Not everyone who keeps saying to me
  lexicon: BDAG
  rationale: 'Οὐ with πᾶς yields a partial negation: ''not everyone,'' not ''no one.''
    The present participle λέγων is rendered with an English relative clause for naturalness
    while preserving the ongoing/general force.'
- source_word: Κύριε κύριε
  chosen: Lord, Lord
  alternatives:
  - Master, Master
  lexicon: BDAG
  rationale: κύριος is a contested term with default rendering 'Lord' per doctrine.
    The repeated vocative is preserved to reflect emphatic address.
- source_word: εἰσελεύσεται
  chosen: will enter
  alternatives:
  - will go in
  - will enter in
  lexicon: BDAG
  rationale: Future middle indicative of εἰσέρχομαι is best rendered idiomatically
    as 'will enter.' English does not require explicit middle nuance here.
- source_word: εἰς τὴν βασιλείαν τῶν οὐρανῶν
  chosen: into the kingdom of heaven
  alternatives:
  - into the kingdom of the heavens
  - into heaven's kingdom
  lexicon: BDAG
  rationale: βασιλεία is rendered 'kingdom.' Matthew's characteristic plural τῶν οὐρανῶν
    is translated idiomatically as 'of heaven' rather than the more wooden 'of the
    heavens,' since this is standard and clear English while preserving the referent.
- source_word: ἀλλ’ ὁ ποιῶν
  chosen: but the one who does
  alternatives:
  - but whoever does
  - but he who does
  lexicon: BDAG
  rationale: The articular present participle is rendered substantivally. 'The one
    who does' preserves the singular contrast with 'not everyone' and avoids archaic
    phrasing.
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - what ... wants
  - the desire
  lexicon: BDAG
  rationale: θέλημα is best rendered 'will' in this theological and ethical context,
    preserving the sense of the Father's intended purpose/command.
- source_word: τοῦ πατρός μου
  chosen: of my Father
  alternatives:
  - of my heavenly Father
  lexicon: BDAG
  rationale: The possessive genitive is translated directly. 'My Father' preserves
    Jesus' distinctive filial language without importing 'heavenly' into the noun
    phrase itself.
- source_word: τοῦ ἐν τοῖς οὐρανοῖς
  chosen: who is in heaven
  alternatives:
  - who is in the heavens
  lexicon: BDAG
  rationale: The article plus prepositional phrase functions attributively modifying
    'my Father.' Although the Greek has plural 'heavens,' idiomatic English singular
    'heaven' is the clearest equivalent here.
