theological_decisions:
- issue: Meaning of entry into the kingdom in relation to verbal confession and obedience
  chosen_reading: The verse contrasts mere verbal address of Jesus as Lord with actually
    doing the Father's will, without specifying a broader doctrinal system of salvation
    in this verse alone.
  alternative_readings:
  - A works-righteousness reading
  - A reading that verbal confession alone is sufficient
  rationale: The translation should preserve the text's warning and contrast without
    importing denominational conclusions. The Greek plainly contrasts saying with
    doing; it does not here articulate the full doctrine of justification.
  doctrine_reference: Preserve theological tension rather than resolve it.
