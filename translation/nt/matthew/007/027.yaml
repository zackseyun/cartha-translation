theological_decisions:
- issue: Severity of judgment imagery in the parable conclusion
  chosen_reading: Rendered the final clause as 'its fall was great' without expanding
    it into explicit eschatological judgment language.
  alternative_readings:
  - its collapse was catastrophic
  rationale: The verse concludes Jesus' parable with vivid ruin imagery, but the Greek
    itself states only the greatness of the house's fall. The translation preserves
    the warning's force without importing interpretive theological conclusions beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
