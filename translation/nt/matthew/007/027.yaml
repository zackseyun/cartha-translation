id: MAT.7.27
reference: Matthew 7:27
source:
  edition: SBLGNT
  text: καὶ κατέβη ἡ βροχὴ καὶ ἦλθον οἱ ποταμοὶ καὶ ἔπνευσαν οἱ ἄνεμοι καὶ προσέκοψαν
    τῇ οἰκίᾳ ἐκείνῃ, καὶ ἔπεσεν, καὶ ἦν ἡ πτῶσις αὐτῆς μεγάλη.
translation:
  text: And the rain came down, and the rivers came, and the winds blew and beat against
    that house, and it fell—and its fall was great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the floods came.' The Greek noun is more literally 'rivers,' but in
      context it can evoke floodwaters.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  chosen: came down
  alternatives:
  - fell
  lexicon: BDAG
  rationale: The verb καταβαίνω means 'go down/come down.' With βροχή ('rain'), idiomatic
    English is 'the rain came down,' which preserves the downward motion more naturally
    than 'the rain fell' while matching the repeated narrative cadence.
- source_word: βροχή
  chosen: rain
  lexicon: BDAG
  rationale: Standard rendering for precipitation; no contextual reason to expand
    or paraphrase.
- source_word: ἦλθον οἱ ποταμοί
  chosen: the rivers came
  alternatives:
  - the floods came
  - the streams came
  lexicon: BDAG
  rationale: ποταμός normally means 'river.' Although many English versions use 'floods'
    to fit the storm imagery, the Greek noun itself is 'rivers/streams.' 'The rivers
    came' keeps closer to the source while still conveying surging waters in context.
- source_word: ἔπνευσαν οἱ ἄνεμοι
  chosen: the winds blew
  lexicon: BDAG
  rationale: A straightforward rendering of πνέω with ἄνεμοι; idiomatic and natural
    in English.
- source_word: προσέκοψαν τῇ οἰκίᾳ ἐκείνῃ
  chosen: beat against that house
  alternatives:
  - struck that house
  - beat on that house
  - stumbled against that house
  lexicon: BDAG
  rationale: In this context προσκόπτω carries the sense of striking against, not
    literal stumbling. 'Beat against' fits the storm setting and the dative construction,
    conveying repeated force more naturally than the more wooden 'struck against.'
- source_word: ἔπεσεν
  chosen: it fell
  alternatives:
  - it collapsed
  lexicon: BDAG
  rationale: πίπτω is simply 'fall.' 'Collapsed' is interpretive; 'fell' preserves
    the source wording and the parable's stark simplicity.
- source_word: ἡ πτῶσις αὐτῆς μεγάλη
  chosen: its fall was great
  alternatives:
  - its collapse was great
  - great was its fall
  lexicon: BDAG
  rationale: πτῶσις is cognate with 'fall' and should be reflected consistently here.
    'Its fall was great' preserves the emphatic result without archaic inversion.
    'Collapse' is possible but less lexically transparent.
