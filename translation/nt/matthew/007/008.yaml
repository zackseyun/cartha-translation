id: MAT.7.8
reference: Matthew 7:8
source:
  edition: SBLGNT
  text: πᾶς γὰρ ὁ αἰτῶν λαμβάνει καὶ ὁ ζητῶν εὑρίσκει καὶ τῷ κρούοντι ⸀ἀνοιγήσεται.
translation:
  text: For everyone who asks receives, and the one who seeks finds, and to the one
    who knocks it will be opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and for the one who knocks, it will be opened.' The Greek does not explicitly
      state 'the door'; that idea is implied from the image.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - every one
  - all
  lexicon: BDAG
  rationale: Used substantivally with the participle construction to express a general
    class. 'Everyone' is natural modern English and preserves the universal scope
    better than a more wooden 'every one.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force linking this verse to the preceding exhortation.
    'For' is concise and idiomatic in this context.
- source_word: ὁ αἰτῶν
  chosen: who asks
  alternatives:
  - the one who asks
  - asking
  lexicon: BDAG
  rationale: 'Present participle with article functions substantivally: ''the one
    who asks.'' In English, after ''everyone,'' ''who asks'' is the most natural rendering
    while preserving the ongoing/general sense.'
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - gets
  lexicon: BDAG
  rationale: Standard gloss for λαμβάνω here; 'receives' fits the formal parallelism
    and avoids the colloquial tone of 'gets.'
- source_word: ὁ ζητῶν
  chosen: the one who seeks
  alternatives:
  - who seeks
  - the seeker
  lexicon: BDAG
  rationale: Kept slightly more explicit here to preserve the repeated article-participle
    structure and the rhythmic parallelism of the saying.
- source_word: εὑρίσκει
  chosen: finds
  alternatives:
  - discovers
  lexicon: BDAG
  rationale: The ordinary and contextually appropriate gloss; it matches the simplicity
    and memorability of the Greek.
- source_word: τῷ κρούοντι
  chosen: to the one who knocks
  alternatives:
  - for the one who knocks
  - to him who knocks
  lexicon: BDAG
  rationale: Dative participial phrase is best represented with 'to the one who knocks,'
    which prepares for the passive verb 'it will be opened' and preserves the Greek
    construction.
- source_word: ἀνοιγήσεται
  chosen: it will be opened
  alternatives:
  - will be opened
  - the door will be opened
  lexicon: BDAG
  rationale: Future passive. 'It will be opened' preserves the Greek's unspecified
    subject and avoids adding 'door,' which is implied by context but not stated in
    the text.
