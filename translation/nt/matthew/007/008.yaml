theological_decisions:
- issue: Scope and force of the promise
  chosen_reading: A general assurance stated in universal terms without importing
    an absolute guarantee detached from context.
  alternative_readings:
  - An unqualified promise that every specific request is granted exactly as asked
  - A restricted promise applying only to certain spiritual requests
  rationale: The verse uses universal language ('everyone who asks') and should be
    translated straightforwardly. However, the translation should not build in a theological
    limitation or absolutize the statement beyond what the wording itself says. The
    wording is therefore kept literal and broad, preserving the interpretive tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
