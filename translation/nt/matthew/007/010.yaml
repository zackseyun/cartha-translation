theological_decisions:
- issue: Rhetorical-question force
  chosen_reading: 'Render the question as expecting a negative answer: ''he will not give him a snake, will he?'''
  alternative_readings:
  - 'Render as a plain statement: ''he will not give him a snake'''
  - Render with 'surely' to mark expectation
  rationale: The μή in direct question form signals an expected negative answer. Preserving that rhetorical force matters for Jesus' argument from lesser to greater in the surrounding context.
  doctrine_reference: Translation philosophy §3, preserve tension/force rather than flatten it
revisions:
- timestamp: '2026-04-21T03:21:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
