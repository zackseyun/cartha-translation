id: MAT.7.10
reference: Matthew 7:10
source:
  edition: SBLGNT
  text: ⸀ἢ καὶ ⸂ἰχθὺν αἰτήσει⸃— μὴ ὄφιν ἐπιδώσει αὐτῷ;
translation:
  text: Or if he asks for a fish—he will not give him a snake, will he?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'serpent.' The Greek ὄφις can be rendered either way; 'snake' is chosen for natural modern English.
    reason: lexical_alternative
  - marker: b
    text: Or ', he will not give him a snake, will he?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἢ καὶ
  chosen: Or if
  alternatives:
  - Or also if
  - Or again if
  lexicon: BDAG
  rationale: Introduces the second example in a paired rhetorical sequence. 'Or if' is natural English and preserves the disjunctive continuation without overtranslating καί.
- source_word: ἰχθὺν
  chosen: a fish
  lexicon: BDAG
  rationale: Direct object in the accusative singular; the ordinary sense 'fish' fits the domestic food context.
- source_word: αἰτήσει
  chosen: he asks for
  alternatives:
  - he should ask for
  - he requests
  lexicon: BDAG
  rationale: Future indicative in a conditional-like example. English present 'asks for' is idiomatic in generic conditions and matches the sense without wooden futurity.
- source_word: μὴ
  chosen: will not ... will he?
  alternatives:
  - surely he will not
  - he will not
  lexicon: BDAG
  rationale: μή marks a question expecting a negative answer. English tag-question form best conveys the rhetorical force.
- source_word: ὄφιν
  chosen: a snake
  alternatives:
  - a serpent
  lexicon: BDAG
  rationale: The common animal term is best rendered 'snake' in readable modern English; 'serpent' is possible but sounds more elevated and tradition-bound here.
- source_word: ἐπιδώσει
  chosen: give
  alternatives:
  - hand over
  - present
  - give in addition
  lexicon: BDAG
  rationale: In context the verb means to give or hand over. 'Give' is the clearest natural equivalent in this father-child analogy.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative indirect object. English can express this naturally as 'give him' rather than the more formal 'give to him'.
