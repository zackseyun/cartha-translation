  from: ', he will not give him a snake, will he?'
  to: —he will not give him a snake, will he?
  rationale: The current rendering uses a comma to connect the introductory conditional clause to the main clause, which is a full tag question. This creates a slightly awkward, run-on sentence in English. The SBLGNT source text uses an em-dash (—) at this point, signaling a sharp rhetorical break. Replacing the comma with a dash better reflects the structure and force of the Greek and results in a clearer, more natural English sentence.
