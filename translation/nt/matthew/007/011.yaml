theological_decisions:
- issue: Anthropological force of 'being evil' in Jesus' comparison
  chosen_reading: Retain the direct description 'being evil' without softening or
    expanding it.
  alternative_readings:
  - though you are sinful
  - though you are morally flawed
  rationale: The verse contrasts human fallenness with the greater goodness of the
    Father. The translation should preserve that tension without importing a fuller
    doctrinal formulation of total depravity or softening the statement into mere
    imperfection.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of 'ὁ ἐν τοῖς οὐρανοῖς'
  chosen_reading: Use 'your Father in the heavens' rather than the traditional 'your
    heavenly Father' or singular 'in heaven.'
  alternative_readings:
  - your heavenly Father
  - your Father in heaven
  rationale: This preserves the Greek expression more transparently and avoids replacing
    the locative phrase with an adjectival title. It does not alter doctrine, only
    reflects the source wording more closely.
  doctrine_reference: Original-language primacy over translation tradition.
