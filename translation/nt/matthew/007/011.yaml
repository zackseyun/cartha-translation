id: MAT.7.11
reference: Matthew 7:11
source:
  edition: SBLGNT
  text: εἰ οὖν ὑμεῖς πονηροὶ ὄντες οἴδατε δόματα ἀγαθὰ διδόναι τοῖς τέκνοις ὑμῶν,
    πόσῳ μᾶλλον ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς δώσει ἀγαθὰ τοῖς αἰτοῦσιν αὐτόν.
translation:
  text: If you, then, being evil, know how to give good gifts to your children, how
    much more will your Father in the heavens give good things to those who ask him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more traditionally, ''your Father in heaven.'' The Greek is plural:
      ''in the heavens.'''
    reason: lexical_alternative
  - marker: b
    text: Some translations read 'give good gifts' in the second clause, but the Greek
      says simply 'give good things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηροὶ ὄντες
  chosen: being evil
  alternatives:
  - though you are evil
  - being wicked
  lexicon: BDAG
  rationale: The participial construction is concessive/descriptive in context. 'Being
    evil' preserves the Greek wording closely without overstating moral depravity
    beyond the text. 'Wicked' is possible but sounds harsher and less natural here.
- source_word: οἴδατε
  chosen: know how
  alternatives:
  - know
  - understand how
  lexicon: BDAG
  rationale: With the complementary infinitive διδόναι, English idiom is best expressed
    as 'know how to give,' conveying practical knowledge/ability rather than mere
    cognition.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - presents
  lexicon: BDAG
  rationale: δόματα denotes gifts given. 'Gifts' is the natural and standard rendering;
    'presents' is too colloquial.
- source_word: ἀγαθὰ
  chosen: good
  alternatives:
  - beneficial
  - good things
  lexicon: BDAG
  rationale: As an attributive adjective with δόματα, 'good' is the straightforward
    rendering. Later in the verse, where ἀγαθὰ stands substantivally, it is rendered
    'good things' to reflect the ellipsis in Greek.
- source_word: τοῖς τέκνοις ὑμῶν
  chosen: to your children
  alternatives:
  - to your sons and daughters
  - to your offspring
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically 'sons.' This is
    both accurate and natural English.
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - how much rather
  - much more
  lexicon: BDAG
  rationale: This is the standard comparative idiom expressing an a fortiori argument.
    'How much more' is clear and idiomatic.
- source_word: ὁ πατὴρ ὑμῶν
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The phrase is immediately qualified by ὁ ἐν τοῖς οὐρανοῖς. Rendering
    πατήρ simply as 'Father' preserves the structure, while the following phrase supplies
    the heavenly qualification.
- source_word: ὁ ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - who is in the heavens
  lexicon: BDAG
  rationale: The Greek is plural, 'in the heavens.' This translation follows original-language
    primacy over traditional singular 'in heaven,' while remaining understandable.
    The relative sense is implicit in English apposition.
- source_word: δώσει ἀγαθὰ
  chosen: will give good things
  alternatives:
  - will give what is good
  - will give good gifts
  lexicon: BDAG
  rationale: Since δόματα is not repeated in the second clause, 'good things' reflects
    the substantival adjective ἀγαθά without importing 'gifts' from the first clause.
    This avoids harmonizing beyond the Greek wording.
- source_word: τοῖς αἰτοῦσιν αὐτόν
  chosen: to those who ask him
  alternatives:
  - to the ones asking him
  - to those who request from him
  lexicon: BDAG
  rationale: The present participle functions substantivally for a general class.
    'Those who ask him' is natural English and preserves the ongoing/general sense.
