theological_decisions:
- issue: Meaning of ἀπώλεια in Jesus' warning
  chosen_reading: destruction
  alternative_readings:
  - ruin
  - perdition
  rationale: The verse warns of a disastrous end without explicitly defining the full
    theological nature of that end. 'Destruction' preserves the seriousness and leaves
    the text's theological tension intact rather than over-specifying it.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:21:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/007/013.json
  category: awkward_english
  tier: 1
  from: who enter through it
  to: who enter through that gate
  rationale: The pronoun 'it' in the English sentence most naturally refers to 'road,'
    the nearest antecedent. However, the Greek pronoun αὐτῆς most likely refers back
    to ἡ πύλη ('the gate'), as one 'enters through' a gate, not a road. This interpretation
    is correctly noted in the drafter's lexical decisions. The current rendering creates
    a minor logical awkwardness for the reader by forcing them to resolve the pronoun
    against the most proximate noun. Making the referent explicit ('that gate') would
    resolve this ambiguity and clarify the intended parallel with the command to 'Enter
    through the narrow gate.'
