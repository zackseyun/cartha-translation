id: MAT.7.13
reference: Matthew 7:13
source:
  edition: SBLGNT
  text: Εἰσέλθατε διὰ τῆς στενῆς πύλης· ὅτι πλατεῖα ⸂ἡ πύλη⸃ καὶ εὐρύχωρος ἡ ὁδὸς
    ἡ ἀπάγουσα εἰς τὴν ἀπώλειαν, καὶ πολλοί εἰσιν οἱ εἰσερχόμενοι δι’ αὐτῆς·
translation:
  text: Enter through the narrow gate. For wide is the gate and broad is the road
    that leads to destruction, and many are those who enter through it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spacious is the road.' The Greek adjective εὐρύχωρος can mean 'broad'
      or 'spacious.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to ruin' or 'to perdition.' The Greek ἀπώλεια can denote destruction,
      ruin, or perdition.
    reason: lexical_alternative
  - marker: c
    text: Or 'who enter through it'.
    reason: previous_rendering
lexical_decisions:
- source_word: Εἰσέλθατε
  chosen: Enter
  alternatives:
  - Go in
  - Enter in
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural; 'Enter' is direct, idiomatic
    English and preserves the force of Jesus' command without adding unnecessary wording.
- source_word: διὰ τῆς στενῆς πύλης
  chosen: through the narrow gate
  alternatives:
  - by the narrow gate
  lexicon: BDAG
  rationale: διά with the genitive naturally expresses movement through. στενῆς is
    rendered 'narrow' as the standard spatial sense; 'gate' for πύλη is the ordinary
    meaning in context.
- source_word: στενῆς
  chosen: narrow
  alternatives:
  - constricted
  - tight
  lexicon: BDAG
  rationale: '''Narrow'' is the most natural English equivalent and fits the metaphorical
    contrast with ''wide'' and ''broad'' in the following clause.'
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the imperative. 'For' is concise
    and natural in English discourse.
- source_word: πλατεῖα ἡ πύλη
  chosen: wide is the gate
  alternatives:
  - the gate is wide
  lexicon: BDAG
  rationale: πλατεῖα means 'wide' or 'broad.' The fronted predicate adjective is preserved
    with slight formal flavor ('wide is the gate') to mirror the emphatic Greek while
    remaining readable.
- source_word: εὐρύχωρος ἡ ὁδός
  chosen: broad is the road
  alternatives:
  - spacious is the road
  - the road is broad
  lexicon: BDAG
  rationale: εὐρύχωρος carries the sense of roomy/spacious/broad. 'Broad' pairs well
    with 'wide' and is more idiomatic in this warning context than 'spacious.' ὁδός
    is rendered 'road' rather than 'way' to keep the travel metaphor concrete in contemporary
    English.
- source_word: ἡ ἀπάγουσα
  chosen: that leads
  alternatives:
  - that is leading
  - that takes
  lexicon: BDAG
  rationale: Present participle modifying 'road'; 'that leads' is idiomatic English
    and captures the directional/resultative sense of ἀπάγω here.
- source_word: εἰς τὴν ἀπώλειαν
  chosen: to destruction
  alternatives:
  - to ruin
  - to perdition
  lexicon: BDAG
  rationale: ἀπώλεια commonly denotes destruction, ruin, or perdition. 'Destruction'
    is the clearest mainstream English rendering and preserves the gravity without
    importing a narrower doctrinal specification than the text itself states.
- source_word: πολλοί εἰσιν οἱ εἰσερχόμενοι δι’ αὐτῆς
  chosen: many are those who enter through it
  alternatives:
  - many enter through it
  - many are entering through it
  lexicon: BDAG
  rationale: This keeps the Greek emphasis on 'many' and retains the participial construction
    in natural English. 'Through it' refers back to the gate, matching the feminine
    pronoun αὐτῆς.
