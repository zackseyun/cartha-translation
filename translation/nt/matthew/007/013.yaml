theological_decisions:
- issue: Meaning of ἀπώλεια in Jesus' warning
  chosen_reading: destruction
  alternative_readings:
  - ruin
  - perdition
  rationale: The verse warns of a disastrous end without explicitly defining the full
    theological nature of that end. 'Destruction' preserves the seriousness and leaves
    the text's theological tension intact rather than over-specifying it.
  doctrine_reference: Preserve theological tension rather than resolve it.
