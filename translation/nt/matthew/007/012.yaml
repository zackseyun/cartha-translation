id: MAT.7.12
reference: Matthew 7:12
source:
  edition: SBLGNT
  text: Πάντα οὖν ὅσα ⸀ἐὰν θέλητε ἵνα ποιῶσιν ὑμῖν οἱ ἄνθρωποι, οὕτως καὶ ὑμεῖς ποιεῖτε
    αὐτοῖς· οὗτος γάρ ἐστιν ὁ νόμος καὶ οἱ προφῆται.
translation:
  text: Therefore, in everything, whatever you want people to do for you, do the same
    for them; for this is the Law and the Prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men'—Greek ἄνθρωποι, here used generically for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  chosen: in everything
  alternatives:
  - all things
  - everything
  lexicon: BDAG
  rationale: Accusative neuter plural with ὅσα forms a comprehensive expression. 'In
    everything' reads naturally in English while preserving the universal scope better
    than a bare 'all things'.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding teaching. 'Therefore' preserves
    the logical connection more explicitly than 'So'.
- source_word: ὅσα ἐὰν θέλητε
  chosen: whatever you want
  alternatives:
  - all that you desire
  - whatever you wish
  lexicon: BDAG
  rationale: The relative construction with ἐὰν expresses indefiniteness/generalization.
    'Whatever you want' is idiomatic modern English and accurately reflects the sense.
- source_word: ἵνα ποιῶσιν ὑμῖν οἱ ἄνθρωποι
  chosen: people to do for you
  alternatives:
  - men to do to you
  - people should do for you
  lexicon: BDAG
  rationale: ἵνα with the subjunctive after θέλητε expresses desired action. 'People'
    renders οἱ ἄνθρωποι generically in context, referring to human beings rather than
    males specifically. 'Do for you' is more idiomatic in English here than 'do to
    you' while preserving the benefactive sense.
- source_word: οἱ ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - others
  lexicon: BDAG
  rationale: Although grammatically masculine, ἄνθρωποι here is generic for human
    beings. Per the gender-accurate policy, 'people' best matches the source intent
    without implying males only.
- source_word: οὕτως καὶ ὑμεῖς ποιεῖτε αὐτοῖς
  chosen: do the same for them
  alternatives:
  - so also you do for them
  - in this way also you do to them
  lexicon: BDAG
  rationale: ποιεῖτε is a present imperative, calling for ongoing conduct. 'Do the
    same for them' is clear, natural, and preserves the reciprocal force of οὕτως
    καὶ.
- source_word: οὗτος γάρ ἐστιν
  chosen: for this is
  alternatives:
  - for this amounts to
  - for this means
  lexicon: BDAG
  rationale: A straightforward equative clause. 'For this is' preserves the concise
    explanatory force of γάρ and ἐστιν.
- source_word: ὁ νόμος καὶ οἱ προφῆται
  chosen: the Law and the Prophets
  alternatives:
  - the law and the prophets
  lexicon: BDAG
  rationale: A recognized Jewish summary for the scriptural and ethical witness. Capitalization
    signals the conventional reference to the scriptural corpus/categories rather
    than abstract law and generic prophets.
