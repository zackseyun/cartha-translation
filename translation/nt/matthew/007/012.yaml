theological_decisions:
- issue: Generic masculine ἄνθρωποι
  chosen_reading: people
  alternative_readings:
  - men
  - others
  rationale: The verse states a universal ethical principle about human relations,
    not a male-specific instruction. Rendering with 'people' preserves the generic
    force while following the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Scope of 'the Law and the Prophets'
  chosen_reading: Retained as a scriptural summary formula
  alternative_readings:
  - the whole of Scripture's ethical teaching
  - the essence of the law and prophetic teaching
  rationale: The Greek uses the established Matthean/Jewish formula. The translation
    keeps the phrase rather than paraphrasing it, preserving intertextual and theological
    resonance without over-explaining in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
