id: MAT.7.3
reference: Matthew 7:3
source:
  edition: SBLGNT
  text: τί δὲ βλέπεις τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ τοῦ ἀδελφοῦ σου, τὴν δὲ ἐν τῷ σῷ
    ὀφθαλμῷ δοκὸν οὐ κατανοεῖς;
translation:
  text: But why do you see the speck in your brother’s eye, yet do not notice the
    beam in your own eye?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splinter,' 'straw,' or 'bit of chaff' for 'speck' (κάρφος).
    reason: lexical_alternative
  - marker: b
    text: Greek 'brother'; the masculine singular is retained from the source text.
    reason: lexical_alternative
  - marker: c
    text: Or 'log' or 'plank' for 'beam' (δοκός).
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: why
  alternatives:
  - what
  lexicon: BDAG
  rationale: In this interrogative construction with βλέπεις, τί functions idiomatically
    as 'why' rather than a literal 'what,' yielding natural English and matching the
    rhetorical force of the question.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding teaching. 'But'
    best preserves the adversative nuance in readable English.
- source_word: βλέπεις
  chosen: do you see
  alternatives:
  - do you look at
  - do you notice
  lexicon: BDAG
  rationale: βλέπω commonly means 'see' or 'look at.' 'See' fits the concrete image
    and keeps the contrast with κατανοεῖς, which is rendered differently to preserve
    the rhetorical distinction.
- source_word: κάρφος
  chosen: speck
  alternatives:
  - splinter
  - straw
  - bit of chaff
  lexicon: BDAG
  rationale: κάρφος denotes a small dry particle such as a speck, splinter, or bit
    of straw. 'Speck' is idiomatic in English for the eye-image and clearly contrasts
    with 'beam' without over-specifying the material.
- source_word: ἀδελφοῦ
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The Greek is singular masculine. Per the project's gender-accurate policy,
    'brother' is retained rather than neutralizing the term. The context is representative,
    but the source wording is masculine singular.
- source_word: σῷ
  chosen: your own
  alternatives:
  - your
  lexicon: BDAG
  rationale: The possessive adjective is emphatic in contrast with 'your brother's.'
    'Your own' brings out the contrast naturally in English.
- source_word: δοκόν
  chosen: beam
  alternatives:
  - log
  - plank
  lexicon: BDAG
  rationale: δοκός refers to a large beam of wood. 'Beam' is a strong, natural English
    equivalent and preserves the hyperbolic contrast with 'speck.' 'Log' is common
    in some English versions, but 'beam' better matches the architectural sense of
    the noun.
- source_word: οὐ κατανοεῖς
  chosen: do not notice
  alternatives:
  - do not perceive
  - do not consider
  - do not observe
  lexicon: BDAG
  rationale: 'κατανοέω carries the sense of noticing, observing carefully, or paying
    attention to. ''Do not notice'' gives a natural English contrast with ''see''
    while preserving the irony: one sees another''s minor fault but fails to register
    one''s own major one.'
- source_word: ὀφθαλμῷ
  chosen: eye
  lexicon: BDAG
  rationale: Standard rendering of ὀφθαλμός in this literal metaphorical image.
