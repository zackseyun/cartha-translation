theological_decisions:
- issue: Nature of Jesus' authority in teaching
  chosen_reading: 'Render the statement descriptively as a comparison of teaching
    manner: ''as one having authority.'''
  alternative_readings:
  - Expand interpretively to imply divine authority explicitly
  - Reduce to mere confidence or rhetorical force
  rationale: The verse contrasts Jesus with the scribes and presents his authority
    as real, but it does not itself specify the full theological ground of that authority.
    The translation preserves the text's claim without importing a fuller doctrinal
    explanation not stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
