id: MAT.7.29
reference: Matthew 7:29
source:
  edition: SBLGNT
  text: ἦν γὰρ διδάσκων αὐτοὺς ὡς ἐξουσίαν ἔχων καὶ οὐχ ὡς οἱ γραμματεῖς ⸀αὐτῶν.
translation:
  text: for he was teaching them as one having authority, and not as their scribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'with authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν γὰρ διδάσκων
  chosen: for he was teaching
  alternatives:
  - for he taught
  - because he was teaching
  lexicon: BDAG
  rationale: Periphrastic imperfect (ἦν + present participle) conveys ongoing/imperfective
    action in past time. 'For' preserves γάρ as explanatory, linking to the crowd's
    astonishment in the previous verse.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring to the crowds/listeners; standard English
    object pronoun.
- source_word: ὡς ἐξουσίαν ἔχων
  chosen: as one having authority
  alternatives:
  - as having authority
  - as one who had authority
  - with authority
  lexicon: BDAG
  rationale: ἐξουσία denotes authority/right/power. 'As one having authority' closely
    reflects the Greek construction and highlights the personal quality of Jesus'
    teaching manner. 'With authority' is idiomatic but slightly less explicit structurally.
- source_word: καὶ οὐχ ὡς
  chosen: and not as
  alternatives:
  - and not like
  lexicon: BDAG
  rationale: Maintains the explicit comparison and contrast in the Greek.
- source_word: οἱ γραμματεῖς αὐτῶν
  chosen: their scribes
  alternatives:
  - the scribes
  - their teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς in the Gospel context refers specifically to scribes, recognized
    experts in the law. 'Scribes' is the most direct lexical equivalent; 'their' preserves
    αὐτῶν, likely referring to the people’s own recognized religious authorities.
