id: MAT.7.19
reference: Matthew 7:19
source:
  edition: SBLGNT
  text: πᾶν δένδρον μὴ ποιοῦν καρπὸν καλὸν ἐκκόπτεται καὶ εἰς πῦρ βάλλεται.
translation:
  text: Every tree not producing good fruit is cut down and thrown into the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not bearing good fruit.'
    reason: lexical_alternative
  - marker: b
    text: The 'fire' is an image of judgment; the verse itself does not specify more
      precisely whether the emphasis is temporal, eschatological, or both.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶν δένδρον
  chosen: Every tree
  alternatives:
  - Every kind of tree
  - Any tree
  lexicon: BDAG
  rationale: πᾶν with the singular noun δένδρον is distributive, referring to each
    tree individually. 'Every tree' is the most natural English rendering and preserves
    the proverbial force.
- source_word: μὴ ποιοῦν
  chosen: not producing
  alternatives:
  - not bearing
  - not making
  lexicon: BDAG
  rationale: The present participle ποιοῦν modifies 'tree' and denotes ongoing characteristic
    action. 'Producing' reflects ποιέω directly while sounding natural in English.
    'Bearing' is idiomatic with fruit and remains a viable alternative, but 'producing'
    stays closer to the Greek verb.
- source_word: καρπὸν καλὸν
  chosen: good fruit
  alternatives:
  - fine fruit
  - fruit that is good
  lexicon: BDAG
  rationale: The phrase is straightforward; καλός here denotes what is good, sound,
    or fitting. 'Good fruit' is idiomatic and preserves the moral/evaluative sense
    in context.
- source_word: ἐκκόπτεται
  chosen: is cut down
  alternatives:
  - is cut off
  - is chopped down
  lexicon: BDAG
  rationale: The passive present indicates what happens to such a tree. In the context
    of a tree, 'cut down' is the most natural English equivalent. 'Cut off' is possible
    but less idiomatic for a whole tree.
- source_word: εἰς πῦρ βάλλεται
  chosen: is thrown into the fire
  alternatives:
  - is cast into the fire
  - is thrown into fire
  lexicon: BDAG
  rationale: βάλλεται is passive, 'is thrown/cast,' and εἰς πῦρ indicates movement
    into fire. 'The fire' is idiomatic in English for this judgment image, even though
    Greek lacks the article; it conveys the known punitive image without overinterpreting.
