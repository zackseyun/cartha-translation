theological_decisions:
- issue: Judgment imagery of the fire
  chosen_reading: Retain the metaphor of being cut down and thrown into the fire without
    specifying the exact referent of the fire.
  alternative_readings:
  - Temporal judgment
  - Eschatological judgment
  - Hell
  rationale: The verse clearly conveys divine judgment through agricultural imagery,
    but it does not itself define the precise scope or timing of that judgment. The
    translation preserves the warning without importing a narrower doctrinal conclusion
    than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
