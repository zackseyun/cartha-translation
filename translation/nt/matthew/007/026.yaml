theological_decisions:
- issue: Gendered representative language in the comparison
  chosen_reading: a foolish man
  alternative_readings:
  - a foolish person
  rationale: The Greek uses ἀνδρί, a masculine singular noun, in a representative
    comparison. Following the doctrine's gender-accurate principle, the translation
    keeps 'man' rather than neutralizing it, while recognizing that the comparison
    applies generically.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
