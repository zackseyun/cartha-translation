id: MAT.7.26
reference: Matthew 7:26
source:
  edition: SBLGNT
  text: καὶ πᾶς ὁ ἀκούων μου τοὺς λόγους τούτους καὶ μὴ ποιῶν αὐτοὺς ὁμοιωθήσεται
    ἀνδρὶ μωρῷ, ὅστις ᾠκοδόμησεν ⸂αὐτοῦ τὴν οἰκίαν⸃ ἐπὶ τὴν ἄμμον.
translation:
  text: And everyone who hears these words of mine and does not do them will be like
    a foolish man, who built his house on the sand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foolish person.' The Greek reads 'a foolish man,' using masculine
      representative language in the comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ ἀκούων
  chosen: everyone who hears
  alternatives:
  - every one who hears
  - whoever hears
  lexicon: BDAG
  rationale: The articular present participle functions substantivally and generically.
    'Everyone who hears' is natural modern English and preserves the representative
    force without unnecessary stiffness.
- source_word: μου τοὺς λόγους τούτους
  chosen: these words of mine
  alternatives:
  - these my words
  - these sayings of mine
  lexicon: BDAG
  rationale: This preserves the demonstrative emphasis and possessive relation. 'Words'
    is the plain sense of λόγοι here; 'sayings' is possible but slightly more idiomatic/traditional
    than necessary.
- source_word: μὴ ποιῶν αὐτούς
  chosen: does not do them
  alternatives:
  - does not act on them
  - does not practice them
  lexicon: BDAG
  rationale: ποιέω here means to do or carry out what is heard. 'Does not do them'
    is more formally aligned with the Greek and keeps the parallel with the preceding
    verse; more interpretive options are possible but not required.
- source_word: ὁμοιωθήσεται
  chosen: will be like
  alternatives:
  - will be compared to
  - will be likened to
  lexicon: BDAG
  rationale: The future passive conveys comparison. 'Will be like' is idiomatic English
    that communicates the sense without awkward passivity.
- source_word: ἀνδρὶ μωρῷ
  chosen: a foolish man
  alternatives:
  - a foolish person
  - a stupid man
  lexicon: BDAG
  rationale: ἀνήρ specifically denotes a male person, and the doctrine calls for gender-accurate
    rendering where the Greek is masculine with representative force. μωρός is well
    rendered 'foolish'; 'stupid' is too colloquial and harsh.
- source_word: ὅστις
  chosen: who
  alternatives:
  - who indeed
  - such a one who
  lexicon: BDAG
  rationale: The relative pronoun introduces the explanatory comparison. Simple 'who'
    is sufficient in English.
- source_word: ᾠκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  lexicon: BDAG
  rationale: The aorist verb straightforwardly means 'built.' 'Constructed' is unnecessarily
    technical.
- source_word: αὐτοῦ τὴν οἰκίαν
  chosen: his house
  alternatives:
  - his home
  lexicon: BDAG
  rationale: οἰκία here refers to the physical house in the parable. 'House' fits
    the building imagery better than 'home.' The possessive pronoun is naturally fronted
    in English.
- source_word: ἐπὶ τὴν ἄμμον
  chosen: on the sand
  alternatives:
  - upon the sand
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates location/foundation in the narrative
    image. 'On the sand' is clear, natural, and sufficiently formal.
