theological_decisions:
- issue: Nature of the warning against deceptive religious leaders
  chosen_reading: Translate the imagery straightforwardly as a moral-spiritual warning
    without importing later ecclesial categories.
  alternative_readings:
  - Render in a way that specifically targets heretical teachers in a later doctrinal
    sense
  rationale: The verse warns against false prophets by means of appearance-versus-reality
    imagery. The translation should preserve that warning without narrowing it to
    a later denominational or institutional category not explicit in the Greek.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
