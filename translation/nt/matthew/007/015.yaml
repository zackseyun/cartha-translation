id: MAT.7.15
reference: Matthew 7:15
source:
  edition: SBLGNT
  text: ⸀Προσέχετε ἀπὸ τῶν ψευδοπροφητῶν, οἵτινες ἔρχονται πρὸς ὑμᾶς ἐν ἐνδύμασι προβάτων
    ἔσωθεν δέ εἰσιν λύκοι ἅρπαγες.
translation:
  text: Beware of false prophets, who come to you in sheep’s clothing, but inwardly
    are ravenous wolves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Watch out for false prophets.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in garments of sheep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'inside they are rapacious wolves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: Beware
  alternatives:
  - Watch out
  - Be on guard
  lexicon: BDAG
  rationale: Present imperative plural calling for ongoing vigilance. 'Beware' is
    concise, idiomatic, and preserves the warning force better than the more wooden
    'pay attention to' in this context.
- source_word: ἀπὸ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With προσέχω, ἀπό marks the object against which one must be on guard.
    English idiom prefers 'beware of' rather than 'beware from.'
- source_word: ψευδοπροφητῶν
  chosen: false prophets
  alternatives:
  - lying prophets
  lexicon: BDAG
  rationale: Standard and accurate rendering of ψευδοπροφήτης, denoting those who
    falsely claim prophetic authority or speak falsely as prophets.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - the ones who
  - such as
  lexicon: BDAG
  rationale: Introduces a qualitative relative clause describing the kind of people
    in view. Simple 'who' is natural English and sufficiently carries the sense here.
- source_word: ἔρχονται πρὸς ὑμᾶς
  chosen: come to you
  alternatives:
  - come toward you
  - approach you
  lexicon: BDAG
  rationale: Straightforward present tense description of their approach to the disciples.
    'Come to you' is natural and faithful.
- source_word: ἐν ἐνδύμασι προβάτων
  chosen: in sheep’s clothing
  alternatives:
  - in garments of sheep
  - wearing sheep's clothing
  lexicon: BDAG
  rationale: 'Idiomatic English equivalent of the Greek phrase. The genitive προβάτων
    is best taken attributively/materially in the metaphor: clothing associated with
    sheep.'
- source_word: ἔσωθεν
  chosen: inwardly
  alternatives:
  - inside
  - within
  lexicon: BDAG
  rationale: Contrasts outward appearance with inner reality. 'Inwardly' fits the
    metaphorical contrast better than the more spatial 'inside.'
- source_word: δέ
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Marks strong contrast between appearance and reality; 'but' is the clearest
    English connector.
- source_word: λύκοι ἅρπαγες
  chosen: ravenous wolves
  alternatives:
  - rapacious wolves
  - wolves that seize
  lexicon: BDAG
  rationale: ἅρπαγες conveys predatory, grasping, destructive character. 'Ravenous
    wolves' is idiomatic, vivid, and preserves the metaphor's force better than the
    less natural 'rapacious wolves.'
