id: MAT.7.16
reference: Matthew 7:16
source:
  edition: SBLGNT
  text: ἀπὸ τῶν καρπῶν αὐτῶν ἐπιγνώσεσθε αὐτούς. μήτι συλλέγουσιν ἀπὸ ἀκανθῶν ⸀σταφυλὰς
    ἢ ἀπὸ τριβόλων σῦκα;
translation:
  text: You will recognize them by their fruits. Do people gather grapes from thorns,
    or figs from thistles?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will know them by their fruits.'
    reason: lexical_alternative
  - marker: b
    text: 'The question expects a negative answer: people do not gather grapes from
      thorns or figs from thistles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καρπῶν
  chosen: fruits
  alternatives:
  - fruit
  lexicon: BDAG
  rationale: Plural is explicit in Greek and idiomatic in English here. In context
    it is metaphorical for observable outcomes/works, but the concrete term 'fruits'
    is retained to preserve the image and its theological resonance.
- source_word: ἐπιγνώσεσθε
  chosen: you will recognize
  alternatives:
  - you will know
  - you will fully know
  lexicon: BDAG
  rationale: Future middle of ἐπιγινώσκω here conveys coming to know/recognize by
    observation. 'Recognize' fits the context of discerning false prophets by evidence
    better than the more wooden 'know,' while avoiding overtranslation such as 'fully
    know.'
- source_word: μήτι
  chosen: Do
  alternatives:
  - Surely ... not
  - People do not ... do they
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. English commonly
    conveys this with a simple rhetorical question beginning 'Do ...?' rather than
    a stilted explicit negative particle.
- source_word: συλλέγουσιν
  chosen: gather
  alternatives:
  - pick
  - collect
  lexicon: BDAG
  rationale: '''Gather'' is a natural rendering for collecting produce and preserves
    the agricultural imagery without becoming colloquial.'
- source_word: ἀκανθῶν
  chosen: thorns
  alternatives:
  - thornbushes
  lexicon: BDAG
  rationale: The noun denotes thorns/thornbushes. 'Thorns' is the standard concise
    English rendering and works well in the parallelism, though the broader plant
    sense is possible.
- source_word: σταφυλάς
  chosen: grapes
  lexicon: BDAG
  rationale: Straightforward lexical equivalent in the accusative plural as the object
    of 'gather.'
- source_word: τριβόλων
  chosen: thistles
  alternatives:
  - briers
  - thornbushes
  lexicon: BDAG
  rationale: τρίβολος refers to a prickly weed/plant. 'Thistles' is clear modern English
    and preserves the contrast with edible fruit. Alternatives like 'briers' are possible
    but less immediately accessible.
- source_word: σῦκα
  chosen: figs
  lexicon: BDAG
  rationale: Standard rendering of the plural noun, matching the agricultural image.
- source_word: αὐτῶν / αὐτούς
  chosen: their / them
  lexicon: BDAG
  rationale: 'The pronouns refer back to the people under discussion (in context,
    false prophets). English preserves the personal reference: their fruits ... them.'
