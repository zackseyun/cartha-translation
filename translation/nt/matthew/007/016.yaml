theological_decisions:
- issue: Metaphorical force of 'fruits' in discerning people
  chosen_reading: Retain the metaphor 'fruits' rather than interpretively expanding
    to 'actions' or 'results.'
  alternative_readings:
  - You will recognize them by their actions
  - You will know them by the results they produce
  rationale: The saying uses a concrete agricultural metaphor central to Jesus's teaching
    on discernment. Preserving 'fruits' maintains intertextual and theological continuity
    without importing a narrower interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
