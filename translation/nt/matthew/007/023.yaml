id: MAT.7.23
reference: Matthew 7:23
source:
  edition: SBLGNT
  text: καὶ τότε ὁμολογήσω αὐτοῖς ὅτι Οὐδέποτε ἔγνων ὑμᾶς· ἀποχωρεῖτε ἀπ’ ἐμοῦ οἱ
    ἐργαζόμενοι τὴν ἀνομίαν.
translation:
  text: And then I will declare to them, ‘I never knew you; depart from me, you who
    practice lawlessness.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I never acknowledged you.' The Greek 'knew' can carry relational recognition,
      not merely intellectual awareness.
    reason: lexical_alternative
  - marker: b
    text: Or 'you who work iniquity' / 'you who do wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογήσω
  chosen: I will declare
  alternatives:
  - I will confess
  - I will acknowledge
  - I will tell
  lexicon: BDAG
  rationale: In this judicial/eschatological context, ὁμολογέω carries the sense of
    openly stating or declaring rather than confessing wrongdoing. 'Declare' preserves
    the formal, public force of the future verb in natural English.
- source_word: Οὐδέποτε
  chosen: never
  alternatives:
  - not ever
  - at no time
  lexicon: BDAG
  rationale: The adverb is emphatic and absolute. 'Never' is the most natural concise
    English equivalent and preserves the total negation.
- source_word: ἔγνων
  chosen: knew
  alternatives:
  - recognized
  - acknowledged
  lexicon: BDAG
  rationale: γινώσκω can denote relational knowledge, not mere awareness. 'Knew' preserves
    the biblical idiom and leaves the relational/judicial nuance intact without over-interpreting
    it as 'approved' or 'recognized' in the main text.
- source_word: ἀποχωρεῖτε
  chosen: depart
  alternatives:
  - go away
  - leave
  lexicon: BDAG
  rationale: The present imperative functions as a command of dismissal. 'Depart'
    fits the solemn tone and echoes established biblical diction without becoming
    archaic.
- source_word: ἐργαζόμενοι
  chosen: you who practice
  alternatives:
  - you who work
  - you who are doing
  lexicon: BDAG
  rationale: The participle denotes ongoing activity or characteristic conduct. 'Practice'
    communicates habitual action more idiomatically than 'work' in English.
- source_word: ἀνομίαν
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: ἀνομία is best rendered 'lawlessness,' preserving the sense of disregard
    for God's law/order. 'Iniquity' is traditional but less transparent to modern
    readers; 'wickedness' is broader and less precise.
- source_word: καὶ τότε
  chosen: And then
  alternatives:
  - Then
  - And at that time
  lexicon: BDAG
  rationale: The connective plus temporal adverb marks sequence from the prior context.
    'And then' preserves both the linkage and temporal progression.
