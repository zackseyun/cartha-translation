theological_decisions:
- issue: Meaning of 'I never knew you'
  chosen_reading: Retained the relational/judicial wording 'I never knew you' without
    paraphrasing it as 'I never approved of you' or 'you were never truly mine.'
  alternative_readings:
  - I never acknowledged you
  - I never approved of you
  rationale: The Greek text states relational knowledge in direct form. Expanding
    it into a doctrinal explanation would resolve theological questions the verse
    itself leaves implicit. This preserves theological tension in line with the translation
    philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ἀνομία
  chosen_reading: Rendered as 'lawlessness' rather than a more generalized moral term.
  alternative_readings:
  - wickedness
  - iniquity
  rationale: This keeps the text's moral-legal force without importing a narrower
    denominational doctrine of salvation or sanctification. The verse condemns those
    characterized by disregard for God's law, and the translation should preserve
    that category plainly.
