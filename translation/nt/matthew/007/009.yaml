theological_decisions:
- issue: Gendered representative language
  chosen_reading: what man is there among you
  alternative_readings:
  - what person is there among you
  - which one of you
  rationale: The Greek uses ἄνθρωπος in a grammatically masculine singular representative
    construction. Per the translation philosophy, gender-accurate language is preferred
    over gender-neutral smoothing when the source uses masculine representative language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
