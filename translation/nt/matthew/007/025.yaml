theological_decisions:
- issue: Parabolic imagery of foundation
  chosen_reading: on the rock
  alternative_readings:
  - on bedrock
  rationale: The verse uses ordinary parabolic imagery without explicitly identifying
    the rock in this verse itself. Rendering it simply as 'the rock' preserves the
    image and avoids importing a more developed theological identification than the
    immediate wording states.
  doctrine_reference: Preserve theological tension rather than resolve it.
