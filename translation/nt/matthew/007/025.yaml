id: MAT.7.25
reference: Matthew 7:25
source:
  edition: SBLGNT
  text: καὶ κατέβη ἡ βροχὴ καὶ ἦλθον οἱ ποταμοὶ καὶ ἔπνευσαν οἱ ἄνεμοι καὶ προσέπεσαν
    τῇ οἰκίᾳ ἐκείνῃ, καὶ οὐκ ἔπεσεν, τεθεμελίωτο γὰρ ἐπὶ τὴν πέτραν.
translation:
  text: And the rain came down, and the rivers came, and the winds blew and beat against
    that house, and it did not fall, for it had been founded on the rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the floods came'; Greek ποταμοί more literally means 'rivers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fell upon' or 'struck against' that house.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  chosen: came down
  alternatives:
  - fell
  lexicon: BDAG
  rationale: The verb καταβαίνω literally means 'go/come down.' With βροχή ('rain')
    as subject, 'came down' is natural modern English and preserves the downward motion
    more explicitly than simply 'fell.'
- source_word: βροχή
  chosen: rain
  lexicon: BDAG
  rationale: Standard gloss; no contextual pressure for a more specific rendering
    such as 'rainstorm.'
- source_word: ποταμοί
  chosen: rivers
  alternatives:
  - floods
  - streams
  lexicon: BDAG
  rationale: The noun normally means 'rivers.' Although many English versions use
    'floods' to fit the storm imagery, the Greek lexical sense is better preserved
    by 'rivers'; the threatening force is already conveyed by the context of their
    coming against the house.
- source_word: ἔπνευσαν
  chosen: blew
  lexicon: BDAG
  rationale: Standard rendering for πνέω with winds as subject.
- source_word: προσέπεσαν
  chosen: beat against
  alternatives:
  - fell upon
  - struck against
  lexicon: BDAG
  rationale: προσπίπτω literally means 'fall against/upon,' but in this storm context
    'beat against' communicates the repeated force of wind and water in idiomatic
    English without excessive paraphrase.
- source_word: οἰκίᾳ ἐκείνῃ
  chosen: that house
  alternatives:
  - that household
  lexicon: BDAG
  rationale: οἰκία here clearly refers to the physical house in the parable, not the
    household as a social unit.
- source_word: οὐκ ἔπεσεν
  chosen: did not fall
  alternatives:
  - did not collapse
  lexicon: BDAG
  rationale: A direct and natural rendering of the aorist verb; 'collapse' is interpretive
    and stronger than the Greek requires.
- source_word: τεθεμελίωτο
  chosen: had been founded
  alternatives:
  - had been established
  - had been built on a foundation
  lexicon: BDAG
  rationale: 'The pluperfect/passive sense indicates a prior completed state: the
    house stood because it had already been founded. ''Had been founded'' preserves
    both the temporal relation and the foundation imagery.'
- source_word: ἐπὶ τὴν πέτραν
  chosen: on the rock
  alternatives:
  - upon the rock
  - on bedrock
  lexicon: BDAG
  rationale: πέτρα is best rendered 'rock' here. The article is retained in English
    for specificity within the parable. 'Bedrock' is possible interpretively but more
    specific than the Greek.
