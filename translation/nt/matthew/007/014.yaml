theological_decisions:
- issue: Nature of the 'way' described by τεθλιμμένη
  chosen_reading: Rendered as 'hard' to express difficulty without over-specifying
    persecution or ascetic severity.
  alternative_readings:
  - '''constricted'' to preserve the compression imagery more literally'
  - '''difficult'' to emphasize challenge'
  rationale: The verse teaches that the way to life is not easy, but the Greek does
    not specify exactly in what manner it is hard. The translation preserves that
    tension rather than importing a narrower doctrinal interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Scope of ζωή
  chosen_reading: Rendered as 'life' rather than 'eternal life.'
  alternative_readings:
  - '''eternal life'' as an interpretive expansion'
  rationale: In Matthew this commonly carries ultimate salvific force, but the Greek
    text says simply 'life.' Expanding to 'eternal life' would interpret beyond the
    wording of the verse.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve theological tension rather than resolve it.'
