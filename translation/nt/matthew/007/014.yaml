id: MAT.7.14
reference: Matthew 7:14
source:
  edition: SBLGNT
  text: ⸀ὅτι στενὴ ἡ πύλη καὶ τεθλιμμένη ἡ ὁδὸς ἡ ἀπάγουσα εἰς τὴν ζωήν, καὶ ὀλίγοι
    εἰσὶν οἱ εὑρίσκοντες αὐτήν.
translation:
  text: For the gate is narrow and the way that leads to life is hard, and few are
    those who find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the way that leads to life is constricted' or 'difficult.' The Greek
      participle τεθλιμμένη literally suggests being pressed or compressed, and by
      extension a way marked by hardship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - how narrow
  lexicon: BDAG
  rationale: In context this clause gives the reason for the preceding exhortation
    in v.13, so 'For' works idiomatically in English. 'Because' is possible, but 'For'
    better preserves the explanatory force without awkwardness.
- source_word: στενὴ
  chosen: narrow
  alternatives:
  - constricted
  - tight
  lexicon: BDAG
  rationale: στενός commonly denotes narrowness or constriction. 'Narrow' is the most
    natural and established English equivalent here and fits both literal and metaphorical
    force.
- source_word: πύλη
  chosen: gate
  alternatives:
  - entrance
  - gateway
  lexicon: BDAG
  rationale: πύλη refers to a gate or gateway. 'Gate' is the straightforward rendering
    and matches the imagery from the preceding verse.
- source_word: τεθλιμμένη
  chosen: hard
  alternatives:
  - afflicted
  - compressed
  - constricted
  - difficult
  lexicon: BDAG
  rationale: As a perfect passive participle from θλίβω, the term literally suggests
    being pressed or compressed, and metaphorically a way marked by difficulty or
    trouble. 'Hard' communicates the idiomatic sense in clear modern English without
    losing the severity. The more literal 'constricted' is possible but sounds unnatural
    when applied to 'way' in English; 'difficult' is also viable.
- source_word: ὁδὸς
  chosen: way
  alternatives:
  - road
  - path
  lexicon: BDAG
  rationale: ὁδός can mean road, path, or way. 'Way' preserves the metaphorical and
    moral sense common in biblical usage better than the more concrete 'road' or 'path'.
- source_word: ἀπάγουσα
  chosen: that leads
  alternatives:
  - bringing
  - leading away
  lexicon: BDAG
  rationale: The participle modifies 'way' and indicates direction toward life. 'That
    leads' is idiomatic English. Although ἀπάγω can have the sense 'lead away,' here
    with εἰς τὴν ζωήν the destination is foregrounded, so 'leads to' is the clearest
    rendering.
- source_word: ζωήν
  chosen: life
  lexicon: BDAG
  rationale: ζωή is simply 'life' here. The context implies eschatological life, but
    the text itself does not require an expanded rendering such as 'eternal life,'
    so the simpler term is retained.
- source_word: ὀλίγοι
  chosen: few
  alternatives:
  - only a few
  lexicon: BDAG
  rationale: ὀλίγοι means 'few.' The bare adjective is best preserved without adding
    emphasis not explicit in the Greek.
- source_word: οἱ εὑρίσκοντες αὐτήν
  chosen: those who find it
  alternatives:
  - the ones finding it
  - those discovering it
  lexicon: BDAG
  rationale: The present participle with article functions substantivally. 'Those
    who find it' is natural English and preserves the ongoing/general characterization.
