id: MAT.7.17
reference: Matthew 7:17
source:
  edition: SBLGNT
  text: οὕτως πᾶν δένδρον ἀγαθὸν καρποὺς καλοὺς ποιεῖ, τὸ δὲ σαπρὸν δένδρον καρποὺς
    πονηροὺς ποιεῖ·
translation:
  text: So, every good tree produces good fruit, but the rotten tree produces bad
    fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus' or 'In this way' for 'So.'
    reason: lexical_alternative
  - marker: b
    text: '''Rotten'' translates Greek sapron, which can also mean ''bad,'' ''decayed,''
      or ''corrupt.'''
    reason: lexical_alternative
  - marker: c
    text: '''Bad fruit'' could also be rendered ''evil fruit''; the broader English
      ''bad'' fits the agricultural metaphor naturally while preserving the negative
      moral implication from the context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces the conclusion or comparison from the preceding illustration.
    'So' is natural modern English and preserves the inferential force without sounding
    stiff.
- source_word: πᾶν δένδρον
  chosen: every ... tree
  alternatives:
  - each tree
  - every tree
  lexicon: BDAG
  rationale: πᾶν with the singular noun has a distributive sense, best rendered 'every
    tree.' The English keeps the generic proverbial force.
- source_word: ἀγαθὸν
  chosen: good
  alternatives:
  - sound
  - healthy
  lexicon: BDAG
  rationale: ἀγαθός here describes the positive quality of the tree in a broad moral/functional
    sense. 'Good' matches the parallel with 'good fruit' and preserves the simplicity
    of the proverb.
- source_word: καρποὺς καλοὺς
  chosen: good fruit
  alternatives:
  - fine fruit
  - beautiful fruit
  lexicon: BDAG
  rationale: καλός can mean 'good,' 'fine,' or 'beautiful,' but in this context of
    evaluating outcomes, 'good fruit' is the most idiomatic and contextually fitting
    English rendering.
- source_word: ποιεῖ
  chosen: produces
  alternatives:
  - makes
  - bears
  lexicon: BDAG
  rationale: ποιέω literally means 'makes/does,' but with fruit and trees English
    idiom prefers 'produces' or 'bears.' 'Produces' preserves the verbal force clearly
    in modern English.
- source_word: τὸ δὲ
  chosen: but the
  alternatives:
  - and the
  - while the
  lexicon: BDAG
  rationale: δέ marks contrast here, so 'but' best reflects the adversative relationship
    between the two kinds of tree.
- source_word: σαπρὸν
  chosen: rotten
  alternatives:
  - bad
  - decayed
  - corrupt
  lexicon: BDAG
  rationale: σαπρός denotes something spoiled, rotten, or worthless. 'Rotten' is more
    vivid and lexically precise than the broader 'bad,' especially in a tree/fruit
    image.
- source_word: καρποὺς πονηροὺς
  chosen: bad fruit
  alternatives:
  - evil fruit
  - worthless fruit
  lexicon: BDAG
  rationale: πονηρός can mean 'evil,' 'wicked,' or 'bad.' In this agricultural metaphor,
    'bad fruit' is the most natural English and avoids over-importing a narrower moral
    abstraction while still allowing the ethical implication of the context.
