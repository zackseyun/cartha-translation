theological_decisions:
- issue: Moral versus merely agricultural force of the imagery
  chosen_reading: Retain the concrete tree-and-fruit metaphor in ordinary English
    without making the moral application explicit in the translation.
  alternative_readings:
  - Use more interpretive language such as 'a sound tree yields wholesome fruit' or
    'a corrupt tree yields evil fruit'
  rationale: The verse functions proverbially within Jesus' warning about false prophets,
    but the Greek itself states the metaphor rather than its interpretation. The translation
    preserves that tension and lets the context supply the moral force.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
