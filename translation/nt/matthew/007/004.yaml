id: MAT.7.4
reference: Matthew 7:4
source:
  edition: SBLGNT
  text: ἢ πῶς ἐρεῖς τῷ ἀδελφῷ σου· Ἄφες ἐκβάλω τὸ κάρφος ⸀ἐκ τοῦ ὀφθαλμοῦ σου, καὶ
    ἰδοὺ ἡ δοκὸς ἐν τῷ ὀφθαλμῷ σοῦ;
translation:
  text: Or how will you say to your brother, ‘Let me take the speck out of your eye,’
    and look, the beam is in your own eye?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splinter' for 'speck' (Greek κάρφος), a small bit of dry material.
    reason: lexical_alternative
  - marker: b
    text: Or 'plank' or 'log' for 'beam' (Greek δοκός), a large piece of timber.
    reason: lexical_alternative
  - marker: c
    text: Greek 'your brother'; the masculine singular may refer to a fellow disciple
      in a representative sense.
    reason: cultural_note
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  - And
  lexicon: BDAG
  rationale: Introduces the next rhetorical alternative in Jesus' argument; 'Or' is
    the natural English connective here.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Retains the rhetorical force of questioning the manner or possibility
    of the action.
- source_word: ἐρεῖς
  chosen: will you say
  alternatives:
  - do you say
  - can you say
  lexicon: BDAG
  rationale: Future indicative is best represented as 'will you say,' matching the
    Greek form and rhetorical challenge.
- source_word: τῷ ἀδελφῷ σου
  chosen: to your brother
  alternatives:
  - to your fellow believer
  - to your brother/sister
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular; per gender-accurate policy,
    'brother' best matches the source. Broader inclusive renderings are interpretive
    and not required by the immediate context.
- source_word: Ἄφες
  chosen: Let me
  alternatives:
  - Allow me
  - Permit me
  lexicon: BDAG
  rationale: 'Aorist imperative of ἀφίημι here functions idiomatically as a request
    for permission: ''let me.'' This is more natural in English than a wooden ''permit.'''
- source_word: ἐκβάλω
  chosen: take ... out
  alternatives:
  - cast out
  - remove
  lexicon: BDAG
  rationale: In this concrete context of extracting something from an eye, 'take out'
    is idiomatic and accurate. 'Cast out' would sound unnatural and over-literal.
- source_word: τὸ κάρφος
  chosen: the speck
  alternatives:
  - the splinter
  - the tiny straw
  lexicon: BDAG
  rationale: κάρφος denotes a small bit of dry material; 'speck' is established, clear
    modern English and fits the contrast with 'beam.' 'Splinter' is possible but slightly
    more specific than the Greek requires.
- source_word: ἐκ τοῦ ὀφθαλμοῦ σου
  chosen: out of your eye
  alternatives:
  - from your eye
  lexicon: BDAG
  rationale: Represents ἐκ naturally in English with the extraction imagery preserved.
- source_word: καὶ ἰδοὺ
  chosen: and look
  alternatives:
  - and behold
  - when look
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English; 'behold' is too archaic for the stated philosophy.
- source_word: ἡ δοκὸς
  chosen: the beam
  alternatives:
  - the log
  - the plank
  lexicon: BDAG
  rationale: δοκός refers to a large beam of timber. 'Beam' is the most lexically
    precise default. 'Log' is common in some English traditions but less exact; 'plank'
    suggests a board rather than a structural timber.
- source_word: ἐν τῷ ὀφθαλμῷ σοῦ
  chosen: is in your own eye
  alternatives:
  - is in your eye
  lexicon: BDAG
  rationale: Adds 'own' for natural English emphasis corresponding to the contrastive
    force in context, without changing the sense. The location 'in your eye' is retained
    directly from the Greek.
