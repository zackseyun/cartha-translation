theological_decisions:
- issue: Gender rendering of ἀδελφῷ
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The source is masculine singular and the context presents a direct address
    to a hypothetical individual. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral expansion unless the context clearly demands inclusivity in
    the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of the hyperbolic contrast κάρφος / δοκός
  chosen_reading: speck / beam
  alternative_readings:
  - splinter / plank
  - speck / log
  rationale: The chosen pair preserves the deliberate disproportion in Jesus' imagery
    while keeping the larger object lexically precise. No doctrinal issue is resolved
    here, but the rhetorical force is important to preserve.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
