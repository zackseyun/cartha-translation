theological_decisions:
- issue: Metaphorical use of 'fruits' in evaluating people
  chosen_reading: Retain the metaphor 'fruits' rather than interpretively expanding
    it.
  alternative_readings:
  - their actions
  - their results
  rationale: The verse teaches discernment by observable outcomes, but the text itself
    uses the established metaphor of fruit. Preserving the metaphor maintains continuity
    with the immediate context and avoids importing a narrower doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
