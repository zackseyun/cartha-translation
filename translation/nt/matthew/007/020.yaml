id: MAT.7.20
reference: Matthew 7:20
source:
  edition: SBLGNT
  text: ἄρα γε ἀπὸ τῶν καρπῶν αὐτῶν ἐπιγνώσεσθε αὐτούς.
translation:
  text: So then, you will recognize them by their fruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Therefore indeed, from their fruits you will know them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα γε
  chosen: So then
  alternatives:
  - Therefore indeed
  - Consequently
  lexicon: BDAG
  rationale: The combination ἄρα γε draws an inferential conclusion with mild emphasis.
    'So then' captures the concluding force in natural modern English without sounding
    overly formal.
- source_word: ἀπὸ
  chosen: by
  alternatives:
  - from
  - by means of
  lexicon: BDAG
  rationale: With ἐπιγινώσκω and the genitive phrase 'from/by their fruits,' the preposition
    indicates the basis or means of recognition. 'By' is the most idiomatic English
    rendering here.
- source_word: καρπῶν
  chosen: fruits
  alternatives:
  - fruit
  - results
  lexicon: BDAG
  rationale: The plural is explicit in Greek and should be preserved. In context,
    'fruits' metaphorically refers to observable outcomes or deeds, but the metaphor
    should remain in the main text rather than be flattened to 'results.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: The genitive pronoun modifies 'fruits' and is naturally rendered 'their'
    in English.
- source_word: ἐπιγνώσεσθε
  chosen: you will recognize
  alternatives:
  - you will know
  - you will fully know
  - you will discern
  lexicon: BDAG
  rationale: Future middle indicative, second plural, from ἐπιγινώσκω. In this context
    it refers to identifying people by observable evidence. 'Recognize' best fits
    the sense of discerning who they are, stronger and more contextually precise than
    simply 'know.'
- source_word: αὐτούς
  chosen: them
  alternatives:
  - these people
  lexicon: BDAG
  rationale: The accusative pronoun refers back to the people under discussion, naturally
    rendered 'them.'
