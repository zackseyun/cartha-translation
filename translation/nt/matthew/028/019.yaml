id: MAT.28.19
reference: Matthew 28:19
source:
  edition: SBLGNT
  text: πορευθέντες ⸀οὖν μαθητεύσατε πάντα τὰ ἔθνη, ⸀βαπτίζοντες αὐτοὺς εἰς τὸ ὄνομα
    τοῦ πατρὸς καὶ τοῦ υἱοῦ καὶ τοῦ ἁγίου πνεύματος,
translation:
  text: Therefore, go and make disciples of all the nations, baptizing them into the
    name of the Father and of the Son and of the Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the name.' The Greek reads 'into the name,' which may emphasize entry
      into relation or identification.
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθέντες
  chosen: go
  alternatives:
  - having gone
  - as you go
  lexicon: BDAG
  rationale: Aorist participle preceding the main imperative μαθητεύσατε. In English,
    an attendant-circumstance or imperatival sense is best conveyed idiomatically
    as 'go' rather than the more wooden 'having gone.' 'As you go' is possible but
    can weaken the commissioning force by sounding merely incidental.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding declaration of Jesus' authority in
    v. 18. 'Therefore' makes the logical connection explicit and natural in English.
- source_word: μαθητεύσατε
  chosen: make disciples
  alternatives:
  - disciple
  lexicon: BDAG
  rationale: The verb means to cause someone to be a disciple / to make a disciple.
    'Make disciples' is clearer in contemporary English than the verbal form 'disciple'
    and preserves the causative force.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all nations
  - all the Gentiles
  lexicon: BDAG
  rationale: ἔθνη most basically means 'nations' or 'peoples.' 'All the nations' preserves
    the article and the broad ethnic-national scope. 'Gentiles' is too narrow here,
    since the commission is universal rather than merely non-Jewish.
- source_word: βαπτίζοντες
  chosen: baptizing
  alternatives:
  - immersing
  lexicon: BDAG
  rationale: The participle expresses one means by which disciples are made. 'Baptizing'
    preserves the established Christian rite without over-specifying mode; 'immersing'
    would prematurely decide a denominationally contested practice not demanded by
    the context.
- source_word: εἰς τὸ ὄνομα
  chosen: into the name
  alternatives:
  - in the name
  - into allegiance to the name
  lexicon: BDAG
  rationale: εἰς naturally means 'into,' and retaining it reflects movement into relation/identification
    rather than mere instrumentality. 'In the name' is traditional and possible, but
    'into the name' better represents the Greek preposition here.
- source_word: τοῦ πατρὸς
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: With the article and in this triadic formula, the referent is clearly
    the first person of the Godhead. Capitalization in English appropriately signals
    titular/divine reference.
- source_word: τοῦ υἱοῦ
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: In coordinated relation with 'the Father' and 'the Holy Spirit,' this
    is a divine filial title, not a generic noun. Capitalization preserves the christological
    force.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  - the holy spirit
  lexicon: BDAG
  rationale: Standard contemporary English rendering of the divine title. 'Holy Ghost'
    is archaic; lowercase would obscure the personal referent in this triadic baptismal
    formula.
