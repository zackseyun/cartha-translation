theological_decisions:
- issue: Rendering the baptismal preposition εἰς in the triune formula
  chosen_reading: into the name
  alternative_readings:
  - in the name
  rationale: The Greek preposition εἰς ordinarily denotes movement into and here likely
    signals incorporation or identification with the one name shared by Father, Son,
    and Holy Spirit. Retaining 'into' preserves the text's theological texture without
    importing a full sacramental theory. The traditional 'in the name' is preserved
    in a footnote as a viable idiomatic alternative.
  doctrine_reference: Translation philosophy §§1, 3, 6; Affirmations (Nicene Creed
    381 AD)
- issue: Capitalization and personal reading of Father, Son, and Holy Spirit
  chosen_reading: the Father and of the Son and of the Holy Spirit
  rationale: Given the affirmed bounds of Nicene orthodoxy and the immediate syntax
    of a singular 'name' followed by three coordinated genitives, the verse presents
    a triune baptismal formula. Capitalization reflects that these are divine personal
    titles, not generic descriptors, while avoiding expansion beyond the wording of
    the text.
  doctrine_reference: Affirmations (Nicene Creed 381 AD)
