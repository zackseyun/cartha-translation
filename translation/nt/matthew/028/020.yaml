theological_decisions:
- issue: Temporal phrase ἕως τῆς συντελείας τοῦ αἰῶνος
  chosen_reading: until the completion of the age
  alternative_readings:
  - until the end of the age
  - until the end of the world
  rationale: The phrase concerns the consummation of the present age, not annihilation
    of the cosmos. 'Completion of the age' preserves the eschatological nuance of
    συντέλεια + αἰών while avoiding the misleading traditional 'world.'
  doctrine_reference: Translation philosophy §1, §3
