id: MAT.28.20
reference: Matthew 28:20
source:
  edition: SBLGNT
  text: διδάσκοντες αὐτοὺς τηρεῖν πάντα ὅσα ἐνετειλάμην ὑμῖν· καὶ ἰδοὺ ἐγὼ μεθ’ ὑμῶν
    εἰμι πάσας τὰς ἡμέρας ἕως τῆς συντελείας τοῦ ⸀αἰῶνος.
translation:
  text: teaching them to keep all that I commanded you. And behold, I am with you
    all the days, until the completion of the age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the end of the age'; traditionally, 'until the end of the world.'
      The Greek speaks of the consummation of the age (αἰών), not specifically the
      physical world.
    reason: alternative_reading
lexical_decisions:
- source_word: διδάσκοντες
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: Present participle continuing the manner of disciple-making from the
    previous verse. 'Teaching' is the most direct and natural rendering and preserves
    the ongoing force.
- source_word: τηρεῖν
  chosen: to keep
  alternatives:
  - to observe
  - to obey
  lexicon: BDAG
  rationale: τηρέω here carries the sense of keeping/observing commands. 'Keep' preserves
    both obedience and careful observance without narrowing the sense to mere external
    compliance.
- source_word: πάντα ὅσα
  chosen: all that
  alternatives:
  - everything that
  - all the things that
  lexicon: BDAG
  rationale: This idiom naturally compresses into English as 'all that,' preserving
    the comprehensive scope without sounding wooden.
- source_word: ἐνετειλάμην
  chosen: I commanded
  alternatives:
  - I instructed
  - I ordered
  lexicon: BDAG
  rationale: The middle form of ἐντέλλομαι means 'command, give orders, instruct.'
    'Commanded' best reflects the authoritative force of Jesus' charge.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing emphatic attention. 'Behold' preserves
    the solemn, heightened tone better than flatter modern options.
- source_word: μεθ’ ὑμῶν εἰμι
  chosen: I am with you
  alternatives:
  - I am among you
  lexicon: BDAG
  rationale: The phrase denotes presence with the disciples. 'With you' is the standard
    and clearest rendering; 'among you' is possible but less direct here.
- source_word: πάσας τὰς ἡμέρας
  chosen: all the days
  alternatives:
  - always
  - every day
  lexicon: BDAG
  rationale: Literally 'all the days.' This more formal rendering preserves the idiom's
    durative, day-by-day sense better than the smoother but less explicit 'always.'
- source_word: συντελείας
  chosen: completion
  alternatives:
  - end
  - consummation
  lexicon: BDAG
  rationale: συντέλεια denotes bringing something to its intended close or consummation.
    'Completion' preserves that nuance better than the potentially abrupt 'end,' while
    remaining accessible.
- source_word: αἰῶνος
  chosen: the age
  alternatives:
  - the world
  - the era
  lexicon: BDAG
  rationale: αἰών refers to an age or epoch, not the physical world as such. 'The
    age' follows the Greek more precisely than traditional 'world' and aligns with
    original-language primacy.
