theological_decisions:
- issue: Identification of the implied subject
  chosen_reading: they = the chief priests, continuing from the previous verse
  alternative_readings:
  - an unspecified group
  rationale: The Greek participles and main verb are masculine plural with an implied
    subject carried over from Matthew 28:11, where the chief priests are the active
    referent. The translation keeps the pronoun implicit in English clause structure
    rather than inserting 'the chief priests' again, since the Greek does not restate
    it.
