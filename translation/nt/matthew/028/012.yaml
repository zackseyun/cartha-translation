id: MAT.28.12
reference: Matthew 28:12
source:
  edition: SBLGNT
  text: καὶ συναχθέντες μετὰ τῶν πρεσβυτέρων συμβούλιόν τε λαβόντες ἀργύρια ἱκανὰ
    ἔδωκαν τοῖς στρατιώταις
translation:
  text: And after gathering with the elders and taking counsel, they gave a considerable
    sum of silver to the soldiers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large amount of silver money.' The Greek literally refers to 'considerable
      silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναχθέντες
  chosen: after gathering
  alternatives:
  - having gathered
  - when they had assembled
  lexicon: BDAG
  rationale: Aorist passive participle of συνάγω used in an intransitive/passive sense
    ('having come together'). 'After gathering' gives natural English while preserving
    the participial sequence leading into the main verb.
- source_word: μετὰ τῶν πρεσβυτέρων
  chosen: with the elders
  alternatives:
  - together with the elders
  lexicon: BDAG
  rationale: μετά with the genitive denotes association. 'Elders' is the standard
    rendering of πρεσβύτεροι in this leadership context.
- source_word: συμβούλιόν τε λαβόντες
  chosen: and taking counsel
  alternatives:
  - and having taken counsel
  - and after consulting together
  - and having formed a plan
  lexicon: BDAG
  rationale: The idiom συμβούλιον λαμβάνω means to take counsel/deliberate, not merely
    to receive advice. 'Taking counsel' preserves the deliberative sense without over-paraphrasing.
- source_word: ἀργύρια
  chosen: a ... sum of silver
  alternatives:
  - silver money
  - silver coins
  - money
  lexicon: BDAG
  rationale: Plural ἀργύρια often refers to silver money. Rendering it with 'silver'
    preserves the material term present in Greek; adding 'sum of' makes idiomatic
    English with the adjective ἱκανά.
- source_word: ἱκανὰ
  chosen: considerable
  alternatives:
  - sizable
  - large
  - sufficient
  lexicon: BDAG
  rationale: In this context ἱκανός describes quantity/amount. 'Considerable' communicates
    that the payment was substantial, fitting the bribery context better than the
    more wooden 'sufficient.'
- source_word: ἔδωκαν
  chosen: they gave
  alternatives:
  - they handed over
  lexicon: BDAG
  rationale: Simple aorist main verb of δίδωμι. 'They gave' is the most direct and
    natural rendering.
- source_word: τοῖς στρατιώταις
  chosen: to the soldiers
  alternatives:
  - to the guards
  lexicon: BDAG
  rationale: στρατιώταις literally means 'soldiers.' Although these men function as
    guards in context, the lexical sense is best preserved by 'soldiers.'
