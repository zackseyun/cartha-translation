theological_decisions:
- issue: Referent of 'him' (αὐτοῦ)
  chosen_reading: The pronoun refers to the angel/messenger described in the previous
    verse, whose appearance caused the guards' fear.
  alternative_readings:
  - A more general reference to the heavenly event as a whole
  rationale: The nearest antecedent in context is the angelic figure whose appearance
    was like lightning. The verse describes the guards' reaction to that visible figure.
    This is a contextual judgment, not a doctrinally loaded choice.
