id: MAT.28.4
reference: Matthew 28:4
source:
  edition: SBLGNT
  text: ἀπὸ δὲ τοῦ φόβου αὐτοῦ ἐσείσθησαν οἱ τηροῦντες καὶ ἐγενήθησαν ⸀ὡς νεκροί.
translation:
  text: And from fear of him the guards shook and became like dead men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of fear of him, the guards trembled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - because of
  lexicon: BDAG
  rationale: 'Here ἀπό with the genitive marks source/cause: the guards'' reaction
    arises from fear. ''From'' preserves the Greek structure while still communicating
    causation in natural English.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' fits the narrative flow better than the
    more contrastive 'but' and avoids the slightly marked discourse sense of 'now'
    in modern English.
- source_word: φόβου
  chosen: fear
  alternatives:
  - terror
  lexicon: BDAG
  rationale: φόβος denotes fear; 'fear' is the most direct and neutral rendering.
    'Terror' would heighten the intensity beyond what the noun itself requires, though
    the context certainly implies great alarm.
- source_word: αὐτοῦ
  chosen: of him
  alternatives:
  - at him
  - because of him
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the angelic figure in the preceding
    verse. 'Of him' closely reflects the genitive construction with φόβος and preserves
    the personal object of their fear.
- source_word: ἐσείσθησαν
  chosen: shook
  alternatives:
  - trembled
  - were shaken
  lexicon: BDAG
  rationale: From σείω, the passive form can mean 'were shaken' or idiomatically 'trembled.'
    'Shook' is concise, vivid, and natural in English while preserving the bodily
    reaction implied by the verb.
- source_word: οἱ τηροῦντες
  chosen: the guards
  alternatives:
  - those keeping watch
  - the ones on guard
  - the watchmen
  lexicon: BDAG
  rationale: Literally 'the ones keeping watch.' In context this refers to the soldiers
    guarding the tomb. 'The guards' is the clearest idiomatic rendering and accurately
    captures the participle's substantival force.
- source_word: ἐγενήθησαν
  chosen: became
  alternatives:
  - came to be
  - were
  lexicon: BDAG
  rationale: γίνομαι here indicates a change of state. 'Became' preserves that nuance
    better than a simple 'were.'
- source_word: ὡς
  chosen: like
  alternatives:
  - as if
  lexicon: BDAG
  rationale: 'ὡς introduces comparison, not identity. ''Like'' clearly signals simile:
    they were not actually dead, but appeared or lay as dead.'
- source_word: νεκροί
  chosen: dead men
  alternatives:
  - dead people
  - corpses
  - dead
  lexicon: BDAG
  rationale: The masculine plural adjective refers to the male guards. 'Dead men'
    is gender-accurate and natural in context. 'Corpses' is too interpretive and concrete;
    'dead' alone is less idiomatic after 'became like.'
