id: MAT.28.1
reference: Matthew 28:1
source:
  edition: SBLGNT
  text: Ὀψὲ δὲ σαββάτων, τῇ ἐπιφωσκούσῃ εἰς μίαν σαββάτων, ἦλθεν ⸀Μαριὰμ ἡ Μαγδαληνὴ
    καὶ ἡ ἄλλη Μαρία θεωρῆσαι τὸν τάφον.
translation:
  text: Now after the Sabbath, as it was dawning toward the first day of the week,
    Mary Magdalene and the other Mary came to look at the tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Late on the Sabbath, as it was dawning toward the first day of the
      week.' The opening Greek phrase can be understood either as 'after the Sabbath'
      or 'late on the Sabbath.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀψὲ δὲ σαββάτων
  chosen: Now after the Sabbath
  alternatives:
  - Late on the Sabbath
  - After the Sabbaths
  lexicon: BDAG
  rationale: ὀψέ with the genitive can denote time after an event ('after'), and in
    this resurrection context the clause is best taken as marking time after the Sabbath
    had ended. δέ is rendered with a light connective ('Now') for readable discourse
    flow. Although σαββάτων is formally plural, it commonly functions idiomatically
    for the singular Sabbath in Jewish-Greek usage.
- source_word: τῇ ἐπιφωσκούσῃ
  chosen: as it was dawning
  alternatives:
  - as it was growing light
  - as it was beginning
  lexicon: BDAG
  rationale: The participle from ἐπιφώσκω most naturally refers here to the coming
    of daylight. Although the verb can in some contexts mean 'draw on/begin,' Matthew's
    temporal setting points to dawn, yielding natural English.
- source_word: εἰς μίαν σαββάτων
  chosen: toward the first day of the week
  alternatives:
  - for the first day of the week
  - toward the first of the week
  lexicon: BDAG
  rationale: μίαν σαββάτων is a Semitic/idiomatic way of referring to the first day
    of the week. Rendering the idiom directly as 'the first day of the week' communicates
    the sense clearly in English. εἰς is reflected by 'toward' in relation to the
    dawning.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: Aorist ἔρχομαι is straightforwardly rendered 'came' in this narrative
    context.
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mariam the Magdalene
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: ἡ ἄλλη Μαρία
  chosen: the other Mary
  alternatives:
  - the second Mary
  lexicon: BDAG
  rationale: ἄλλη means 'other, another'; 'the other Mary' is the natural English
    rendering and preserves the narrative distinction.
- source_word: θεωρῆσαι
  chosen: to look at
  alternatives:
  - to see
  - to observe
  - to inspect
  lexicon: BDAG
  rationale: θεωρέω can mean to look at attentively or observe. 'To look at' is natural
    English and avoids overstating the action as a formal inspection while preserving
    intentionality.
- source_word: τὸν τάφον
  chosen: the tomb
  alternatives:
  - the grave
  - the sepulcher
  lexicon: BDAG
  rationale: τάφος here denotes the burial place of Jesus; 'tomb' is the clearest
    modern English equivalent.
