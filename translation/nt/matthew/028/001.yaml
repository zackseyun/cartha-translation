theological_decisions:
- issue: Temporal expression at the opening of the resurrection narrative
  chosen_reading: The verse is rendered as occurring after the Sabbath had ended and
    at dawn on the first day of the week.
  alternative_readings:
  - The opening phrase could be taken as 'late on the Sabbath' rather than 'after
    the Sabbath'.
  rationale: The Greek expression ὀψὲ σαββάτων is debated, but the combined temporal
    markers in Matthew 28:1 are best represented in English as the women coming after
    the Sabbath, at daybreak on the first day of the week. This preserves the narrative
    sequence without importing harmonizations beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
