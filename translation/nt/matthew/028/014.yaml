id: MAT.28.14
reference: Matthew 28:14
source:
  edition: SBLGNT
  text: καὶ ἐὰν ἀκουσθῇ τοῦτο ⸀ἐπὶ τοῦ ἡγεμόνος, ἡμεῖς πείσομεν ⸀αὐτὸν καὶ ὑμᾶς ἀμερίμνους
    ποιήσομεν.
translation:
  text: And if this is heard by the governor, we will persuade him and keep you out
    of trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if this comes to the governor’s attention.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and will make you free from worry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκουσθῇ
  chosen: is heard
  alternatives:
  - comes to the attention of
  - is reported to
  lexicon: BDAG
  rationale: Passive of ἀκούω here idiomatically refers to the matter becoming known.
    'Is heard' preserves the passive form and remains natural in English; the alternatives
    are interpretive expansions.
- source_word: ἐπὶ τοῦ ἡγεμόνος
  chosen: by the governor
  alternatives:
  - before the governor
  - in the presence of the governor
  - to the governor
  lexicon: BDAG
  rationale: With ἐπί plus genitive after a verb of hearing, the sense is that the
    report reaches the governor's sphere/attention. 'By the governor' in English idiom
    means 'by the governor's hearing' and fits the context. Because English 'by' can
    sound agentive, an alternative is preserved in a footnote.
- source_word: ἡγεμόνος
  chosen: governor
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: In Matthew's Roman trial context, ἡγεμών refers specifically to the provincial
    governor, i.e., Pilate. 'Governor' is the standard and contextually precise rendering.
- source_word: πείσομεν αὐτόν
  chosen: we will persuade him
  alternatives:
  - we will win him over
  - we will satisfy him
  lexicon: BDAG
  rationale: Future of πείθω normally means 'persuade' or 'win over.' 'Persuade him'
    is the most transparent rendering. In context it implies mollifying the governor,
    but the more literal wording is preferred in the main text.
- source_word: ἀμερίμνους
  chosen: out of trouble
  alternatives:
  - free from worry
  - without concern
  - without anxiety
  lexicon: BDAG
  rationale: The adjective literally means 'free from care/anxiety.' In this narrative
    setting the concern is legal or disciplinary consequences for the guards, so 'out
    of trouble' captures the idiomatic force in readable modern English better than
    the more wooden 'free from worry.' A lexical alternative is preserved in a footnote.
- source_word: ποιήσομεν
  chosen: keep you
  alternatives:
  - make you
  - ensure that you are
  lexicon: BDAG
  rationale: ποιέω with predicate adjective can be rendered 'make [someone] [adjective],'
    but in idiomatic English with 'out of trouble' the natural equivalent is 'keep
    you.' This reflects the resultative sense without awkwardness.
