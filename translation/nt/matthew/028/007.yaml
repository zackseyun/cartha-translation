theological_decisions:
- issue: Resurrection voice in Ἠγέρθη
  chosen_reading: 'Render with explicit passive: ''He has been raised'''
  alternative_readings:
  - He has risen
  - He is risen
  rationale: The Greek form is passive, and preserving that voice avoids smoothing
    over the text's wording. This does not deny Jesus' active participation in resurrection
    elsewhere; it simply reflects this verse's formulation.
  doctrine_reference: Translation philosophy §1, §3
