id: MAT.28.7
reference: Matthew 28:7
source:
  edition: SBLGNT
  text: καὶ ταχὺ πορευθεῖσαι εἴπατε τοῖς μαθηταῖς αὐτοῦ ὅτι Ἠγέρθη ἀπὸ τῶν νεκρῶν,
    καὶ ἰδοὺ προάγει ὑμᾶς εἰς τὴν Γαλιλαίαν, ἐκεῖ αὐτὸν ὄψεσθε· ἰδοὺ εἶπον ὑμῖν.
translation:
  text: And go quickly and tell his disciples, ‘He has been raised from the dead,
    and look, he is going ahead of you into Galilee. There you will see him.’ Look,
    I have told you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has risen.' The Greek verb is passive ('has been raised'), but English
      often renders it intransitively.
    reason: alternative_reading
  - marker: b
    text: Or, 'to Galilee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχὺ
  chosen: quickly
  alternatives:
  - at once
  - without delay
  lexicon: BDAG
  rationale: Adverbial accusative conveying haste. 'Quickly' is natural modern English
    and preserves the urgency of the angel's command.
- source_word: πορευθεῖσαι
  chosen: go
  alternatives:
  - having gone
  - depart
  lexicon: BDAG
  rationale: 'Aorist passive participle of πορεύομαι functioning imperativally with
    the following main imperative. English idiom is best captured by coordinating
    it with the imperative: ''go ... and tell,'' rather than the more wooden ''having
    gone, tell.'''
- source_word: εἴπατε
  chosen: tell
  alternatives:
  - say to
  lexicon: BDAG
  rationale: In context of delivering a message to the disciples, 'tell' is the most
    idiomatic rendering of the aorist imperative.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive construction; 'his disciples' is clear and natural.
- source_word: Ἠγέρθη
  chosen: He has been raised
  alternatives:
  - He was raised
  - He is risen
  - He has risen
  lexicon: BDAG
  rationale: Aorist passive indicative of ἐγείρω. The passive should be preserved
    rather than converted to an intransitive active, since Matthew's wording presents
    Jesus as raised. 'Has been raised' is idiomatic English that also highlights the
    completed event with present relevance.
- source_word: ἀπὸ τῶν νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead ones
  lexicon: BDAG
  rationale: Established and accurate idiom for the plural expression; preserves the
    resurrection sense without awkward literalism.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Discourse particle drawing attention. 'Look' preserves the deictic force
    in readable modern English better than archaic 'behold.' Used both times for consistency.
- source_word: προάγει
  chosen: he is going ahead of you
  alternatives:
  - he goes before you
  - he leads you on ahead
  lexicon: BDAG
  rationale: Present tense with directional sense. 'Is going ahead of you' is natural
    English and preserves the idea of prior movement rather than formal leadership
    language.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς commonly marks movement into/toward. 'Into Galilee' is slightly more
    formally aligned with the Greek while remaining natural.
- source_word: ἐκεῖ αὐτὸν ὄψεσθε
  chosen: There you will see him
  alternatives:
  - there you will see him for yourselves
  lexicon: BDAG
  rationale: Future middle of ὁράω is straightforwardly future in sense here. Fronting
    'There' preserves the Greek emphasis on location.
- source_word: εἶπον ὑμῖν
  chosen: I have told you
  alternatives:
  - I told you
  lexicon: BDAG
  rationale: 'Aorist can be rendered as simple past, but English present perfect fits
    the discourse force of a just-completed announcement whose relevance remains immediate:
    ''Look, I have told you.'''
