theological_decisions:
- issue: Rendering Ἰουδαίοις in a narrative context where English readers may hear
    anti-Jewish overtones
  chosen_reading: among the Jews
  alternative_readings:
  - among Jewish people
  - among the Judeans
  rationale: The immediate context concerns the circulation of a report within the
    Jewish community. 'Among the Jews' is the straightforward lexical rendering of
    Ἰουδαίοις here. 'Judeans' is less suitable in this verse because the emphasis
    is communal reception rather than strictly regional identity. The translation
    avoids importing any broader polemical claim beyond Matthew's narrative setting.
  doctrine_reference: Translation philosophy §1, §6
