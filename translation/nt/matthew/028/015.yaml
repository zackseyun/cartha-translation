id: MAT.28.15
reference: Matthew 28:15
source:
  edition: SBLGNT
  text: οἱ δὲ λαβόντες ⸀τὰ ἀργύρια ἐποίησαν ὡς ἐδιδάχθησαν. Καὶ διεφημίσθη ὁ λόγος
    οὗτος παρὰ Ἰουδαίοις μέχρι τῆς σήμερον ⸀ἡμέρας.
translation:
  text: So they took the silver and did as they had been instructed. And this story
    has been spread among the Jews to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this report.' The Greek word λόγος can mean 'word,' 'report,' 'account,'
      or 'story' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: Aorist participle from λαμβάνω, here naturally rendered 'took' in sequence
    with the main verb. 'Received' is possible, but 'took' better matches the narrative
    action after the priests gave the money in the previous verse.
- source_word: τὰ ἀργύρια
  chosen: the silver
  alternatives:
  - the money
  - the silver coins
  lexicon: BDAG
  rationale: ἀργύρια literally denotes silver/money. 'The silver' preserves the concrete
    wording while remaining idiomatic in English. 'Money' is interpretive; 'silver
    coins' is more specific than the Greek requires.
- source_word: ἐποίησαν
  chosen: did
  alternatives:
  - acted
  lexicon: BDAG
  rationale: ποιέω here is a common verb meaning 'do' or 'carry out.' 'Did' keeps
    the close connection with ὡς ἐδιδάχθησαν ('as they had been instructed').
- source_word: ὡς ἐδιδάχθησαν
  chosen: as they had been instructed
  alternatives:
  - as they were taught
  - as they had been directed
  lexicon: BDAG
  rationale: The passive of διδάσκω can mean 'be taught/instructed.' In this context
    of being told what to say, 'instructed' is the most natural English rendering.
- source_word: διεφημίσθη
  chosen: has been spread
  alternatives:
  - was spread abroad
  - became widely known
  lexicon: BDAG
  rationale: The verb means to spread widely, especially by report. Because the clause
    continues with 'to this day,' English present perfect ('has been spread') best
    conveys a report originating in the past with continuing effect.
- source_word: ὁ λόγος οὗτος
  chosen: this story
  alternatives:
  - this report
  - this account
  - this saying
  lexicon: BDAG
  rationale: λόγος has a broad semantic range. Here it refers to the explanatory report
    circulated by the guards, so 'story' is idiomatic and fits the polemical narrative
    context. 'Report' is also possible and preserved in a footnote-worthy alternative.
- source_word: παρὰ Ἰουδαίοις
  chosen: among the Jews
  alternatives:
  - among Jewish people
  - with the Jews
  lexicon: BDAG
  rationale: With παρά plus dative, the sense is 'among' or 'in the circles of.' 'Among
    the Jews' is the most direct rendering. It refers to the Judean/Jewish community
    as a group, not a theological judgment beyond the narrative setting.
- source_word: μέχρι τῆς σήμερον ἡμέρας
  chosen: to this day
  alternatives:
  - until today
  - to the present day
  lexicon: BDAG
  rationale: This is a standard idiom meaning the report continued up to the writer's
    present time. 'To this day' is concise, natural, and faithful.
