id: MAT.28.2
reference: Matthew 28:2
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ σεισμὸς ἐγένετο μέγας· ἄγγελος γὰρ κυρίου καταβὰς ἐξ οὐρανοῦ ⸀καὶ
    προσελθὼν ἀπεκύλισε τὸν ⸀λίθον καὶ ἐκάθητο ἐπάνω αὐτοῦ.
translation:
  text: And behold, there was a great earthquake, for an angel of the Lord had come
    down from heaven and came up and rolled away the stone and was sitting on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached' for 'came up' (προσελθών).
    reason: lexical_alternative
  - marker: b
    text: Or 'rolled back the stone' for 'rolled away the stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force and vividness of the narrative interruption.
    'Behold' is slightly traditional but still understandable and more forceful than
    'look' here.
- source_word: σεισμὸς μέγας
  chosen: a great earthquake
  alternatives:
  - a great shaking
  lexicon: BDAG
  rationale: σεισμός commonly denotes an earthquake in narrative contexts. 'Great
    earthquake' is the most natural rendering and fits Matthew's resurrection scene.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - happened
  - occurred
  lexicon: BDAG
  rationale: Idiomatic English existential rendering. It preserves the eventive sense
    without awkward literalism ('became').
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - a messenger of the Lord
  lexicon: BDAG
  rationale: In this supernatural resurrection context, 'angel' is clearly intended
    rather than the more general 'messenger.' 'Lord' follows the project's default
    for κύριος.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: With ἄγγελος the genitive is naturally rendered 'of the Lord.' This follows
    the doctrinal default rendering of κύριος as 'Lord'.
- source_word: καταβὰς ἐξ οὐρανοῦ
  chosen: had come down from heaven
  alternatives:
  - coming down from heaven
  - descended from heaven
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb ἀπεκύλισε, so English
    past perfect best conveys prior action in smooth narrative sequence.
- source_word: προσελθὼν
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The participle indicates movement toward the tomb/stone before rolling
    it away. 'Came up' is concise and natural; 'approached' is also possible.
- source_word: ἀπεκύλισε τὸν λίθον
  chosen: rolled away the stone
  alternatives:
  - rolled back the stone
  lexicon: BDAG
  rationale: Standard and clear rendering of the compound verb with the object. 'Rolled
    away' is idiomatic and fits the context of opening the tomb.
- source_word: ἐκάθητο
  chosen: was sitting
  alternatives:
  - sat
  - was seated
  lexicon: BDAG
  rationale: The imperfect portrays the angel in a continuing state after the action.
    'Was sitting' preserves the aspect better than simple past 'sat.'
- source_word: ἐπάνω αὐτοῦ
  chosen: on it
  alternatives:
  - upon it
  - on top of it
  lexicon: BDAG
  rationale: Refers most naturally to the stone just mentioned. 'On it' is clear,
    natural English.
