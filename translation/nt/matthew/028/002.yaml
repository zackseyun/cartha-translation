- issue: Rendering κύριος in ἄγγελος κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The phrase is rendered conventionally and transparently as 'an angel
    of the Lord.' This aligns with the project's default rendering of κύριος as 'Lord'
    and does not import further doctrinal claims beyond the text.
