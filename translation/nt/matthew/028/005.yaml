theological_decisions:
- issue: Rendering the emphatic pronoun ὑμεῖς in the angel's reassurance
  chosen_reading: Retained explicit emphasis in the main text as 'Do not be afraid,
    you' and explained in a footnote.
  alternative_readings:
  - Do not be afraid
  - Do not be afraid, you women
  - You need not be afraid
  rationale: The Greek explicitly contrasts the women with others who might rightly
    fear. The text signals reassurance directed particularly to them. The rendering
    preserves that tension without over-interpreting the contrast.
  doctrine_reference: Preserve theological tension rather than resolve it.
