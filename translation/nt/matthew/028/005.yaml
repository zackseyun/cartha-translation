id: MAT.28.5
reference: Matthew 28:5
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ ἄγγελος εἶπεν ταῖς γυναιξίν· Μὴ φοβεῖσθε ὑμεῖς, οἶδα γὰρ ὅτι
    Ἰησοῦν τὸν ἐσταυρωμένον ζητεῖτε·
translation:
  text: But the angel answered and said to the women, “Do not be afraid, you; for
    I know that you are seeking Jesus, the one who has been crucified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek explicitly includes ''you'' for emphasis: the reassurance is
      directed particularly to the women.'
    reason: lexical_alternative
  - marker: b
    text: Or, more compactly, 'Jesus the crucified one' or 'Jesus who was crucified.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative ('answered and said'). 'Answered' preserves
    the Greek narrative formula better than a simplified 'said' alone.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast. 'But' fits the narrative turn from
    the fearful scene to the angel's reassuring speech.
- source_word: ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In this resurrection context the referent is clearly an angelic being,
    not merely a human messenger, so 'angel' is the natural and theologically accurate
    rendering.
- source_word: εἶπεν ταῖς γυναιξίν
  chosen: said to the women
  alternatives:
  - spoke to the women
  lexicon: BDAG
  rationale: Standard narrative speech introduction. 'Women' accurately renders γυναιξίν
    here as adult female persons, not specifically 'wives.'
- source_word: Μὴ φοβεῖσθε
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: Idiomatic present middle/passive imperative with μή in reassurance contexts
    is best rendered in natural English as 'Do not be afraid.'
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. English can preserve this only awkwardly
    if fully formalized. Main text keeps 'you' in apposition after the prohibition
    ('Do not be afraid, you') to reflect the emphasis, while a footnote explains the
    nuance.
- source_word: οἶδα γὰρ
  chosen: for I know
  alternatives:
  - because I know
  lexicon: BDAG
  rationale: γάρ gives the reason for the reassurance; 'for I know' preserves the
    explanatory force with formal clarity.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what the angel knows; standard English complementizer.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the philosophy
    to transliterate names.
- source_word: τὸν ἐσταυρωμένον
  chosen: the one who has been crucified
  alternatives:
  - the crucified one
  - who was crucified
  lexicon: BDAG
  rationale: Perfect passive participle emphasizes the completed act with abiding
    significance. 'The one who has been crucified' preserves both the attributive
    force and the perfect aspect more fully than the simpler 'who was crucified.'
- source_word: ζητεῖτε
  chosen: you are seeking
  alternatives:
  - you seek
  - you are looking for
  lexicon: BDAG
  rationale: Present tense is naturally rendered as progressive here in English. 'Seeking'
    is slightly weightier and more consistent with biblical diction than 'looking
    for.'
