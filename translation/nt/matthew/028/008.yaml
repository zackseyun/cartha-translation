theological_decisions:
- issue: Emotional tension in the women's response
  chosen_reading: with fear and great joy
  alternative_readings:
  - with awe and great joy
  rationale: The verse intentionally holds together fear and joy in response to the
    resurrection event. Following the translation philosophy, the rendering preserves
    this tension rather than resolving φόβος into only negative fear or only reverential
    awe.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
