id: MAT.28.8
reference: Matthew 28:8
source:
  edition: SBLGNT
  text: καὶ ⸀ἀπελθοῦσαι ταχὺ ἀπὸ τοῦ μνημείου μετὰ φόβου καὶ χαρᾶς μεγάλης ἔδραμον
    ἀπαγγεῖλαι τοῖς μαθηταῖς αὐτοῦ.
translation:
  text: And leaving the tomb quickly, with fear and great joy, they ran to report
    it to his disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with awe and great joy.' The Greek word for 'fear' can also carry the
      sense of reverent awe in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθοῦσαι
  chosen: leaving
  alternatives:
  - departing
  - going away
  lexicon: BDAG
  rationale: Aorist participle from ἀπέρχομαι, modifying the women implied from context.
    'Leaving' is natural modern English and preserves the sense of departure from
    the tomb without unnecessary stiffness.
- source_word: ταχὺ
  chosen: quickly
  alternatives:
  - at once
  - swiftly
  lexicon: BDAG
  rationale: Adverbial accusative conveying haste. 'Quickly' is the most natural and
    direct rendering in contemporary English.
- source_word: μνημείου
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in the resurrection context refers to the burial place. 'Tomb'
    is the standard and clearest rendering here.
- source_word: μετὰ φόβου καὶ χαρᾶς μεγάλης
  chosen: with fear and great joy
  alternatives:
  - with خوف and much joy
  - with reverent fear and great joy
  lexicon: BDAG
  rationale: μετά with the genitive expresses accompanying circumstance. φόβος here
    likely denotes fear/awe in response to the angelic and resurrection events, and
    χαρὰ μεγάλη is straightforwardly 'great joy.' The juxtaposition should be preserved
    rather than softened, since Matthew presents both emotions together.
- source_word: ἔδραμον
  chosen: they ran
  alternatives:
  - they hurried
  - they rushed
  lexicon: BDAG
  rationale: Aorist indicative of τρέχω. 'They ran' is the plain sense and preserves
    the vivid physical action better than a weaker paraphrase like 'hurried.'
- source_word: ἀπαγγεῖλαι
  chosen: to report it
  alternatives:
  - to tell
  - to announce
  lexicon: BDAG
  rationale: 'Infinitive of purpose after ἔδραμον. The object is implicit from context:
    the message about the empty tomb and angelic announcement. ''Report it'' communicates
    purposeful relaying of news without over-specifying the content.'
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to his followers
  lexicon: BDAG
  rationale: μαθηταί is best rendered 'disciples' in Gospel narrative because it is
    a recognized relational term for Jesus' learners/followers. The pronoun αὐτοῦ
    refers to Jesus in context.
