id: MAT.28.11
reference: Matthew 28:11
source:
  edition: SBLGNT
  text: Πορευομένων δὲ αὐτῶν ἰδού τινες τῆς κουστωδίας ἐλθόντες εἰς τὴν πόλιν ἀπήγγειλαν
    τοῖς ἀρχιερεῦσιν ἅπαντα τὰ γενόμενα.
translation:
  text: While they were going, behold, some of the guard came into the city and reported
    to the chief priests everything that had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As they were going.' The Greek uses a genitive absolute to set the time
      frame for the next event.
    reason: lexical_alternative
  - marker: b
    text: '''Behold'' translates the Greek attention-marker ἰδού, which signals a
      sudden or noteworthy development in the narrative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορευομένων δὲ αὐτῶν
  chosen: While they were going
  alternatives:
  - As they were going
  - While they were on their way
  lexicon: BDAG
  rationale: Genitive absolute with δέ marking a transition in the narrative. 'While
    they were going' preserves the temporal background sense without over-specifying
    destination in the main clause.
- source_word: ἰδού
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the narrative attention-marker present in the Greek. Though somewhat
    marked in modern English, it preserves the suddenness and discourse function better
    than omitting it.
- source_word: τινες τῆς κουστωδίας
  chosen: some of the guard
  alternatives:
  - some of the watch
  - some of the guard unit
  lexicon: BDAG
  rationale: κουστωδία refers to the guard posted at the tomb; 'some of the guard'
    is idiomatic and clear. 'Watch' is possible but less natural for modern readers
    here.
- source_word: ἐλθόντες εἰς τὴν πόλιν
  chosen: came into the city
  alternatives:
  - went into the city
  - having come into the city
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as attendant
    circumstance. 'Came into' fits the deictic flow of the narrative and avoids wooden
    participial English.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: The verb conveys bringing a report. 'Reported' best matches the formal
    sense of delivering information to authorities.
- source_word: τοῖς ἀρχιερεῦσιν
  chosen: to the chief priests
  alternatives:
  - to the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural ἀρχιερεῖς in Second Temple/Jewish leadership
    contexts; 'high priests' is less idiomatic in English.
- source_word: ἅπαντα τὰ γενόμενα
  chosen: everything that had happened
  alternatives:
  - all the things that had taken place
  - everything that had occurred
  lexicon: BDAG
  rationale: ἅπαντα intensifies totality; τὰ γενόμενα refers to the events that occurred.
    'Everything that had happened' is natural English and preserves the comprehensive
    sense.
