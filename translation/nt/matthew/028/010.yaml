theological_decisions:
- issue: Referent of 'my brothers'
  chosen_reading: Jesus refers to his disciples as 'my brothers.'
  alternative_readings:
  - A broader familial reference including all followers
  rationale: The immediate Matthean context points to the disciples, yet the familial
    term itself is retained rather than replaced with the interpretive gloss 'disciples.'
    This preserves both the literal wording and its theological warmth without overextending
    the referent.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral);
    §3 (preserve tension rather than resolve it)
