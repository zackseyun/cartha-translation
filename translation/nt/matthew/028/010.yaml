id: MAT.28.10
reference: Matthew 28:10
source:
  edition: SBLGNT
  text: τότε λέγει αὐταῖς ὁ Ἰησοῦς· Μὴ φοβεῖσθε· ὑπάγετε ἀπαγγείλατε τοῖς ἀδελφοῖς
    μου ἵνα ἀπέλθωσιν εἰς τὴν Γαλιλαίαν, κἀκεῖ με ὄψονται.
translation:
  text: Then Jesus said to them, “Do not be afraid. Go, report to my brothers that
    they should go to Galilee, and there they will see me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tell my brothers.' The verb can be rendered more simply as 'tell,' but
      'report' preserves the sense of delivering a message.
    reason: lexical_alternative
  - marker: b
    text: '''My brothers'' refers here to Jesus'' disciples. The Greek is masculine
      plural, not a gender-neutral term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb marking narrative sequence; 'Then' is natural
    and sufficiently formal.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    normally renders it as simple past for readability in optimal equivalence.
- source_word: αὐταῖς
  chosen: to them
  alternatives:
  - to the women
  lexicon: BDAG
  rationale: The pronoun is feminine dative plural, referring to the women in context.
    English 'them' naturally carries the referent without over-specifying in the main
    text.
- source_word: Μὴ φοβεῖσθε
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: Idiomatic prohibition with present middle/passive imperative. 'Do not
    be afraid' is natural modern English and preserves the sense without archaic stiffness.
- source_word: ὑπάγετε
  chosen: Go
  alternatives:
  - Be on your way
  - Depart
  lexicon: BDAG
  rationale: Imperative of movement; 'Go' is the clearest concise rendering in this
    commission-like context.
- source_word: ἀπαγγείλατε
  chosen: report
  alternatives:
  - tell
  - announce
  lexicon: BDAG
  rationale: The verb carries the sense of conveying a message. 'Report' preserves
    a slightly more formal nuance than 'tell' without sounding wooden.
- source_word: τοῖς ἀδελφοῖς μου
  chosen: to my brothers
  alternatives:
  - to my brothers and sisters
  - to my disciples
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'brothers.' In context it refers
    to Jesus' male disciples. This also aligns with the translation philosophy's gender-accurate
    principle and avoids interpretive expansion to 'disciples' in the main text.
- source_word: ἵνα ἀπέλθωσιν
  chosen: that they should go
  alternatives:
  - to go
  - that they may go
  lexicon: BDAG
  rationale: ἵνα with subjunctive here expresses the content of the reported instruction.
    'That they should go' clearly conveys indirect command in English.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: to Galilee
  alternatives:
  - into Galilee
  lexicon: BDAG
  rationale: With a place name, English idiom prefers 'to Galilee.'
- source_word: κἀκεῖ
  chosen: and there
  alternatives:
  - and there indeed
  lexicon: BDAG
  rationale: Compound of καί + ἐκεῖ; straightforwardly rendered 'and there'.
- source_word: με ὄψονται
  chosen: they will see me
  alternatives:
  - they will meet me
  - they will catch sight of me
  lexicon: BDAG
  rationale: Future middle of ὁράω normally means 'see.' 'Meet me' is interpretive
    and narrower than the Greek, so 'see me' is preferred.
