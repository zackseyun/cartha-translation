theological_decisions:
- issue: Specificity of the meeting place designated by Jesus
  chosen_reading: Render ἐτάξατο as 'had directed' rather than a stronger ecclesial
    or formal term.
  alternative_readings:
  - had appointed
  - had commanded
  rationale: The verse reports Jesus' prior designation of a location, not a doctrinally
    loaded appointment or command structure. The chosen wording preserves the narrative
    sense without importing extra authority claims beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
