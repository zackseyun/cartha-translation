id: MAT.28.16
reference: Matthew 28:16
source:
  edition: SBLGNT
  text: Οἱ δὲ ἕνδεκα μαθηταὶ ἐπορεύθησαν εἰς τὴν Γαλιλαίαν εἰς τὸ ὄρος οὗ ἐτάξατο
    αὐτοῖς ὁ Ἰησοῦς,
translation:
  text: Now the eleven disciples went to Galilee, to the mountain where Jesus had
    directed them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had appointed them.' The Greek verb can mean 'appointed,' 'directed,'
      or 'designated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - Then
  lexicon: BDAG
  rationale: δέ is a mild connective marking narrative transition. 'Now' gives natural
    English flow without overstating contrast; 'But' would suggest stronger opposition
    than the context requires, and 'Then' is possible but slightly more temporal than
    the Greek demands.
- source_word: ἕνδεκα μαθηταὶ
  chosen: the eleven disciples
  alternatives:
  - the eleven followers
  lexicon: BDAG
  rationale: μαθηταί is best rendered 'disciples' in Gospel narrative as the established
    term for Jesus' learners/followers. 'The eleven' reflects the post-Judas group
    and preserves the specificity of the Greek.
- source_word: ἐπορεύθησαν
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: BDAG
  rationale: πορεύομαι commonly means to go or travel. 'Went' is the most natural
    and sufficiently precise in this narrative context; 'journeyed' is too elevated,
    and 'traveled' is acceptable but less idiomatic here.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: to Galilee
  alternatives:
  - into Galilee
  lexicon: BDAG
  rationale: εἰς with a place name commonly indicates movement toward/into a region.
    English idiom prefers 'to Galilee' here.
- source_word: εἰς τὸ ὄρος
  chosen: to the mountain
  alternatives:
  - to the hill
  - into the mountain region
  lexicon: BDAG
  rationale: ὄρος ordinarily means 'mountain' or 'hill country.' With the article
    and the following relative clause, it points to a specific mountain already designated
    by Jesus. 'Mountain' best preserves the lexical sense and possible Matthean resonance.
- source_word: οὗ
  chosen: where
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: 'The relative adverb naturally refers to place: ''where.'' This is smoother
    and more precise in English than a more wooden ''which'' or ''that''.'
- source_word: ἐτάξατο
  chosen: had directed
  alternatives:
  - had appointed
  - had instructed
  - had designated
  lexicon: BDAG
  rationale: τάσσω in the middle can mean appoint, arrange, order, or direct. In context
    Jesus had specified the meeting place beforehand. 'Had directed' captures that
    sense clearly without sounding overly formal. 'Had appointed' is possible and
    more formal; 'had instructed' could imply a command rather than designation of
    location.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative object is naturally absorbed into idiomatic English as 'them'
    after 'directed.'
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the translation
    philosophy to transliterate names rather than translate them.
