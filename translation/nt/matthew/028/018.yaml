theological_decisions:
- issue: Nature of Jesus' possession of universal authority
  chosen_reading: All authority in heaven and on earth has been given to me
  alternative_readings:
  - All power ... is given to me
  - All authority ... was given to me
  rationale: The passive Ἐδόθη should be preserved rather than converted into an abstract
    claim of inherent possession. This maintains the text's stated economy of the
    Father's granting authority to the risen Son, while remaining fully compatible
    with Nicene and Chalcedonian orthodoxy. 'Authority' is preferred over 'power'
    because ἐξουσία emphasizes rightful rule, not merely ability.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §§1, 3, 6'
