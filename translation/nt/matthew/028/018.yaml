id: MAT.28.18
reference: Matthew 28:18
source:
  edition: SBLGNT
  text: καὶ προσελθὼν ὁ Ἰησοῦς ἐλάλησεν αὐτοῖς λέγων· Ἐδόθη μοι πᾶσα ἐξουσία ἐν οὐρανῷ
    καὶ ἐπὶ ⸀τῆς γῆς·
translation:
  text: And Jesus came near and spoke to them, saying, “All authority in heaven and
    on earth has been given to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was given to me.” The Greek aorist passive can be rendered more formally
      this way; the main text uses present perfect to express the completed act with
      ongoing present force.
    reason: lexical_alternative
  - marker: b
    text: Or “All power.” The Greek word ἐξουσία more precisely denotes authority,
      right, or delegated rule rather than mere might.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: came near
  alternatives:
  - approached
  - came to them
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating movement toward the disciples
    before speaking. 'Came near' is natural modern English and preserves the spatial
    sense without overformal stiffness.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  - addressed
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'talk.' 'Spoke' fits well with the following
    participle λέγων and avoids flattening both verbs into the same English term.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object referring to the disciples present. Standard and
    unambiguous rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing direct discourse. 'Saying' preserves the
    Greek structure smoothly in English.
- source_word: Ἐδόθη
  chosen: has been given
  alternatives:
  - was given
  - is given
  lexicon: BDAG
  rationale: 'Aorist passive of δίδωμι. English present perfect best conveys a completed
    act with present relevance in context: the risen Jesus now possesses this authority.
    ''Was given'' is possible but sounds more temporally remote in English.'
- source_word: μοι
  chosen: to me
  lexicon: BDAG
  rationale: Dative first-person pronoun marking the recipient of the given authority.
- source_word: πᾶσα
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: With singular abstract noun ἐξουσία, πᾶσα is best rendered 'all,' expressing
    totality rather than distributive 'every.'
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated or rightful authority, not merely raw power.
    'Authority' best captures the semantic force and theological significance of Jesus'
    universal dominion.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven(s)
  lexicon: BDAG
  rationale: Idiomatic singular in English. Although οὐρανός can be singular or plural
    in translation, 'in heaven' is the standard natural rendering here and matches
    the paired expression with earth.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: ἐπί with genitive here expresses location over the earthly realm. 'On
    earth' is the natural English counterpart to 'in heaven.'
