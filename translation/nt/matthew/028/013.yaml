id: MAT.28.13
reference: Matthew 28:13
source:
  edition: SBLGNT
  text: λέγοντες· Εἴπατε ὅτι Οἱ μαθηταὶ αὐτοῦ νυκτὸς ἐλθόντες ἔκλεψαν αὐτὸν ἡμῶν κοιμωμένων·
translation:
  text: saying, “Say, ‘His disciples came by night and stole him while we were sleeping.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at night.” The Greek νυκτός is an adverbial genitive indicating the
      time of their coming.
    reason: lexical_alternative
  - marker: b
    text: Greek “him,” not “his body.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - telling
  lexicon: BDAG
  rationale: Present participle introducing the content of the instruction; 'saying'
    is the natural narrative participial rendering in English.
- source_word: Εἴπατε
  chosen: Say
  alternatives:
  - Tell people
  - You must say
  lexicon: BDAG
  rationale: Aorist imperative, second person plural. 'Say' preserves the direct command
    force without adding words not explicit in the Greek.
- source_word: ὅτι
  chosen: that / content marker rendered by quotation structure
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces reported content. In idiomatic English, the function is best
    represented by direct quotation punctuation rather than an explicit repeated 'that'.
- source_word: Οἱ μαθηταὶ αὐτοῦ
  chosen: His disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive construction; capitalized 'His' follows English convention
    for reference to Jesus in this sentence context, while preserving the plain referent.
- source_word: νυκτὸς
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: Genitive used adverbially. 'By night' is concise and natural, preserving
    the temporal sense.
- source_word: ἐλθόντες
  chosen: came
  alternatives:
  - having come
  lexicon: BDAG
  rationale: 'Aorist participle antecedent to the main verb. English commonly smooths
    this into a finite verb in sequence with the main action: ''came ... and stole.'''
- source_word: ἔκλεψαν
  chosen: stole
  alternatives:
  - stole away
  lexicon: BDAG
  rationale: Straightforward aorist active indicative of theft. 'Stole' is the plain
    lexical equivalent.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - his body
  lexicon: BDAG
  rationale: The pronoun directly refers to Jesus. The Greek says 'him,' not 'his
    body'; the more literal pronoun should be retained.
- source_word: ἡμῶν κοιμωμένων
  chosen: while we were sleeping
  alternatives:
  - as we slept
  - during our sleep
  lexicon: BDAG
  rationale: Genitive absolute construction. 'While we were sleeping' is clear modern
    English and preserves the circumstantial force.
