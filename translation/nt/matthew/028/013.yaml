theological_decisions:
- issue: Referent of αὐτόν in the fabricated report
  chosen_reading: Retain the personal pronoun 'him' rather than interpretively expanding
    to 'his body.'
  alternative_readings:
  - his body
  rationale: The Greek text uses the personal pronoun αὐτόν. Expanding to 'his body'
    imports an explanatory gloss not present in the source. The narrative context
    makes the referent clear without interpretive addition.
  doctrine_reference: Translation philosophy §1, §6
