id: MAT.28.17
reference: Matthew 28:17
source:
  edition: SBLGNT
  text: καὶ ἰδόντες αὐτὸν ⸀προσεκύνησαν, οἱ δὲ ἐδίστασαν.
translation:
  text: And when they saw him, they worshiped him, but some doubted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hesitated' or 'wavered.' The Greek can suggest uncertainty rather than
      settled unbelief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in natural English:
    ''when they saw.'' This preserves the participial relationship to the main verbs
    without awkwardness.'
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down to
  - paid homage to
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration, homage, or worship depending on context.
    In Matthew's resurrection context, directed toward Jesus, 'worshiped' best captures
    the likely force without flattening the reverential act to mere physical bowing.
- source_word: οἱ δὲ
  chosen: but some
  alternatives:
  - but they
  - but others
  lexicon: BDAG
  rationale: The article with δέ here functions contrastively and elliptically, referring
    to a subset of the group just mentioned. English requires an explicit subject;
    'but some' is the most natural way to convey that contrast and subset sense.
- source_word: ἐδίστασαν
  chosen: doubted
  alternatives:
  - hesitated
  - were uncertain
  lexicon: BDAG
  rationale: διστάζω can mean to doubt, waver, or hesitate. 'Doubted' is the traditional
    and straightforward rendering, but the term may suggest wavering uncertainty rather
    than settled unbelief; this nuance is preserved in a footnote.
