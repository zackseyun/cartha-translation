theological_decisions:
- issue: Force of προσκυνέω toward the risen Jesus
  chosen_reading: Rendered as 'worshiped'
  alternative_readings:
  - bowed down to him
  - paid homage to him
  rationale: Given Matthew's narrative context after the resurrection and the direct
    object 'him' referring to Jesus, 'worshiped' best reflects the act's theological
    weight while remaining lexically defensible. This aligns with historic orthodox
    Christology without importing more than the Greek warrants.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Nuance of διστάζω
  chosen_reading: Rendered as 'doubted' in the main text
  alternative_readings:
  - hesitated
  - wavered
  rationale: The Greek may indicate hesitation or wavering rather than outright disbelief.
    To preserve the tension without over-resolving it, the main text keeps 'doubted'
    and a footnote preserves the alternative nuance.
  doctrine_reference: Translation philosophy §3
