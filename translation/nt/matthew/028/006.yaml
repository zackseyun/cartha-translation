id: MAT.28.6
reference: Matthew 28:6
source:
  edition: SBLGNT
  text: οὐκ ἔστιν ὧδε, ἠγέρθη γὰρ καθὼς εἶπεν· δεῦτε ἴδετε τὸν τόπον ὅπου ⸀ἔκειτο·
translation:
  text: He is not here, for he has been raised, just as he said. Come, see the place
    where he was lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has risen.' The Greek verb is passive in form ('has been raised'),
      though English tradition often renders it actively.
    reason: alternative_reading
  - marker: b
    text: Or, 'where he lay' or 'where he had been laid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν ὧδε
  chosen: He is not here
  alternatives:
  - He is not in this place
  - He is not here in this spot
  lexicon: BDAG
  rationale: The Greek is an idiomatic existential/location statement. Supplying 'He'
    is required in natural English because the referent is clear from context. 'Here'
    is the natural rendering of ὧδε.
- source_word: ἠγέρθη
  chosen: has been raised
  alternatives:
  - was raised
  - has risen
  lexicon: BDAG
  rationale: The aorist passive of ἐγείρω is best rendered with explicit passive force,
    'has been raised,' preserving the resurrection as an act done to him, while still
    reading naturally in English. 'Has risen' is common in English tradition but shifts
    the voice from passive to active.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' is concise and
    fits the explanatory relation in readable modern English.
- source_word: καθὼς εἶπεν
  chosen: just as he said
  alternatives:
  - as he said
  - just as he had said
  lexicon: BDAG
  rationale: καθώς marks correspondence with Jesus' prior prediction. 'Just as he
    said' preserves that force without overcomplicating the English. 'Had said' is
    possible to make the prior action explicit, but the context already makes that
    clear.
- source_word: δεῦτε
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: δεῦτε is an invitation or summons. 'Come' is the standard concise rendering.
- source_word: ἴδετε
  chosen: see
  alternatives:
  - look at
  - behold
  lexicon: BDAG
  rationale: The aorist imperative calls for immediate inspection. 'See' is natural
    modern English; 'behold' is too archaic, and 'look at' is slightly more colloquial
    than needed.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - the spot
  - the location
  lexicon: BDAG
  rationale: τόπος here refers to the physical place in the tomb where Jesus' body
    had been laid. 'Place' is the most natural and sufficiently concrete rendering.
- source_word: ὅπου ἔκειτο
  chosen: where he was lying
  alternatives:
  - where he lay
  - where he had been laid
  lexicon: BDAG
  rationale: κεῖμαι commonly means 'lie' or 'be laid/placed.' In this context it refers
    to Jesus' body lying in the tomb. 'Where he was lying' preserves the stative sense
    of the imperfect and reads naturally. 'Where he had been laid' would make the
    passive nuance more explicit, but the Greek form itself is middle/passive in form
    with stative meaning rather than an explicit passive event.
