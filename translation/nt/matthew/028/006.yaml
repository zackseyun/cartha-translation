theological_decisions:
- issue: Voice and agency in the resurrection statement
  chosen_reading: has been raised
  alternative_readings:
  - has risen
  - was raised
  rationale: The Greek ἠγέρθη is passive in form. Rendering it 'has been raised' preserves
    the text's wording and avoids importing an interpretive preference for active
    voice. This also retains the theological nuance that the resurrection is God's
    act, while not denying Jesus' own agency elsewhere in the New Testament.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations consistent with
    Nicene and Chalcedonian orthodoxy
