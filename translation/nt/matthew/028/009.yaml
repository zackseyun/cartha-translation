id: MAT.28.9
reference: Matthew 28:9
source:
  edition: SBLGNT
  text: ⸀καὶ ⸀ἰδοὺ Ἰησοῦς ⸀ὑπήντησεν αὐταῖς λέγων· Χαίρετε· αἱ δὲ προσελθοῦσαι ἐκράτησαν
    αὐτοῦ τοὺς πόδας καὶ προσεκύνησαν αὐτῷ.
translation:
  text: And behold, Jesus met them, saying, “Greetings!” And they came up, took hold
    of his feet, and worshiped him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rejoice!” The Greek χαίρετε is literally a plural imperative, but in
      context it functions as a greeting.
    reason: lexical_alternative
  - marker: b
    text: Or “bowed down to him” / “paid homage to him.” The Greek προσεκύνησαν can
      denote prostration or homage; here it likely carries the stronger sense of worship
      in light of the resurrection context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-getter. Though
    somewhat elevated in English, it remains readable and preserves the narrative
    vividness better than omitting it.
- source_word: ὑπήντησεν
  chosen: met
  alternatives:
  - came to meet
  - encountered
  lexicon: BDAG
  rationale: The aorist of ὑπαντάω here naturally means that Jesus met them on their
    way. 'Met' is idiomatic and concise without adding directional nuance not explicit
    in the verb alone.
- source_word: Χαίρετε
  chosen: Greetings!
  alternatives:
  - Rejoice!
  - Hello!
  lexicon: BDAG
  rationale: As a plural imperative from χαίρω used as a greeting, it is best rendered
    as a conventional salutation rather than a command to feel joy. 'Greetings!' preserves
    both the lexical connection and the social function.
- source_word: προσελθοῦσαι
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The participle indicates movement toward Jesus prior to the following
    actions. 'Came up' is natural modern English and keeps the sequence clear.
- source_word: ἐκράτησαν αὐτοῦ τοὺς πόδας
  chosen: took hold of his feet
  alternatives:
  - grasped his feet
  - seized his feet
  lexicon: BDAG
  rationale: κρατέω here conveys taking hold firmly. 'Took hold of his feet' is idiomatic,
    concrete, and avoids the overly harsh connotation of 'seized' while preserving
    physical contact.
- source_word: προσεκύνησαν αὐτῷ
  chosen: worshiped him
  alternatives:
  - bowed down to him
  - paid homage to him
  lexicon: BDAG
  rationale: In this resurrection context involving Jesus, προσκυνέω is best rendered
    'worshiped' rather than the weaker 'paid homage.' This preserves the likely religious
    force of the act without overstating beyond the narrative.
