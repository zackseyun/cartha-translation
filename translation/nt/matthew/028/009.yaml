theological_decisions:
- issue: Rendering προσκυνέω toward the risen Jesus
  chosen_reading: worshiped him
  alternative_readings:
  - bowed down to him
  - paid homage to him
  rationale: Given the immediate post-resurrection setting and Matthew's presentation
    of Jesus, the act carries more than mere respectful obeisance. Rendering it 'worshiped
    him' best reflects the theological weight of the scene while remaining lexically
    defensible.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 preserve theological tension rather than resolve
    it'
