id: MAT.3.5
reference: Matthew 3:5
source:
  edition: SBLGNT
  text: τότε ἐξεπορεύετο πρὸς αὐτὸν Ἱεροσόλυμα καὶ πᾶσα ἡ Ἰουδαία καὶ πᾶσα ἡ περίχωρος
    τοῦ Ἰορδάνου,
translation:
  text: Then Jerusalem, all Judea, and all the region around the Jordan were going
    out to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were continually going out to him'; the Greek imperfect suggests ongoing
      or repeated action.
    reason: lexical_alternative
  - marker: b
    text: '''All Judea'' and ''all the surrounding region of the Jordan'' are broad
      geographic expressions describing the widespread response to John, not necessarily
      every individual person.'
    reason: cultural_note
  - marker: c
    text: Or 'all the surrounding region of the Jordan'.
    reason: previous_rendering
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker linking this response to John's ministry in
    the preceding context. 'Then' is natural and sufficiently precise.
- source_word: ἐξεπορεύετο
  chosen: were going out
  alternatives:
  - went out
  - kept going out
  lexicon: BDAG
  rationale: Imperfect middle/passive form conveys ongoing or repeated action in past
    time. 'Were going out' preserves the imperfect aspect better than simple 'went
    out' while remaining readable.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With a verb of movement, πρός + accusative commonly indicates movement
    toward a person. 'To him' is idiomatic English and fits the sense of people coming
    to John.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: πᾶσα ἡ Ἰουδαία
  chosen: all Judea
  alternatives:
  - the whole of Judea
  - all the Judean countryside
  lexicon: BDAG
  rationale: πᾶσα with the article emphasizes the region as a whole. 'All Judea' is
    concise and idiomatic, without implying literally every individual.
- source_word: πᾶσα ἡ περίχωρος τοῦ Ἰορδάνου
  chosen: all the surrounding region of the Jordan
  alternatives:
  - the whole surrounding district of the Jordan
  - all the region around the Jordan
  lexicon: BDAG
  rationale: περίχωρος denotes the surrounding region/district. 'Of the Jordan' is
    retained rather than paraphrased to preserve the genitival construction and geographic
    reference.
- source_word: καὶ ... καὶ
  chosen: and ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates the three geographic groups in a cumulative
    way; standard 'and' preserves the structure.
