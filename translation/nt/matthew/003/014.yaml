theological_decisions:
- issue: John's objection to baptizing Jesus
  chosen_reading: Render the statement plainly as John's recognition of Jesus' superiority
    and his own need to receive baptism from Jesus, without importing later doctrinal
    explanation into the translation.
  alternative_readings:
  - Interpret the line as primarily about moral sinlessness
  - Interpret the line as primarily about rank/authority
  rationale: The verse itself expresses John's sense of unworthiness and Jesus' superiority,
    but it does not explicitly explain the theological basis in full. The translation
    should preserve that tension rather than resolve it beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
