id: MAT.3.14
reference: Matthew 3:14
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀Ἰωάννης διεκώλυεν αὐτὸν λέγων· Ἐγὼ χρείαν ἔχω ὑπὸ σοῦ βαπτισθῆναι, καὶ
    σὺ ἔρχῃ πρός με;
translation:
  text: But John kept trying to prevent him, saying, “I need to be baptized by you,
    and do you come to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “John tried to prevent him.” The Greek imperfect verb can suggest repeated
      or continued action.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκώλυεν
  chosen: kept trying to prevent
  alternatives:
  - prevented
  - was hindering
  - tried to prevent
  lexicon: BDAG
  rationale: The imperfect verb suggests ongoing or repeated action, not merely a
    simple past event. 'Kept trying to prevent' captures the iterative/imperfective
    force in natural English better than a flat 'prevented.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered as 'saying,' preserving the connection
    between John's resisting action and his spoken explanation.
- source_word: χρείαν ἔχω
  chosen: I need
  alternatives:
  - I have need
  - it is necessary for me
  lexicon: BDAG
  rationale: This idiom means 'to have need' or 'to need.' 'I need' is clear modern
    English and preserves the sense without archaic stiffness.
- source_word: ὑπὸ σοῦ
  chosen: by you
  alternatives:
  - from you
  lexicon: BDAG
  rationale: With the passive infinitive βαπτισθῆναι, ὑπό + genitive normally marks
    personal agency, so 'by you' is the most precise rendering.
- source_word: βαπτισθῆναι
  chosen: to be baptized
  alternatives:
  - to be immersed
  lexicon: BDAG
  rationale: The passive infinitive is best rendered straightforwardly as 'to be baptized.'
    Although immersion may be implicated in some contexts, 'baptized' is the established
    and semantically appropriate rendering here without over-specifying mode.
- source_word: καὶ σὺ ἔρχῃ πρός με;
  chosen: and do you come to me?
  alternatives:
  - and yet you come to me?
  - and are you coming to me?
  lexicon: BDAG
  rationale: The present/middle form in this rhetorical question is well represented
    by English present 'do you come.' Adding 'yet' would sharpen the contrast interpretively;
    the simpler form preserves the Greek's force without embellishment.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δὲ marks a mild contrast with the preceding movement of Jesus toward
    John. 'But' communicates that contrast clearly in context.
