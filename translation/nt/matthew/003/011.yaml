theological_decisions:
- issue: Meaning of 'Holy Spirit and fire'
  chosen_reading: Retain the literal phrase 'in the Holy Spirit and fire' without
    interpretive expansion.
  alternative_readings:
  - the Holy Spirit and purifying fire
  - the Holy Spirit and judgment fire
  rationale: The phrase is theologically debated, and the immediate context can support
    either purification or judgment emphases. Per translation philosophy, the wording
    preserves the tension rather than resolving it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of πνεύματι ἁγίῳ
  chosen_reading: Translate as 'the Holy Spirit'
  alternative_readings:
  - holy spirit
  - Holy Spirit's power
  rationale: In this Matthean context, the phrase is best read as referring to the
    Holy Spirit rather than an impersonal holy influence. This aligns with normal
    New Testament usage while avoiding doctrinal overexpansion beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy:
    original-language primacy over translation tradition.'
