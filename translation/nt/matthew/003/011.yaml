id: MAT.3.11
reference: Matthew 3:11
source:
  edition: SBLGNT
  text: Ἐγὼ μὲν ⸂ὑμᾶς βαπτίζω⸃ ἐν ὕδατι εἰς μετάνοιαν· ὁ δὲ ὀπίσω μου ἐρχόμενος ἰσχυρότερός
    μού ἐστιν, οὗ οὐκ εἰμὶ ἱκανὸς τὰ ὑποδήματα βαστάσαι· αὐτὸς ὑμᾶς βαπτίσει ἐν πνεύματι
    ἁγίῳ ⸂καὶ πυρί⸃·
translation:
  text: I indeed baptize you in water for repentance, but the one coming after me
    is stronger than I, whose sandals I am not worthy to carry. He himself will baptize
    you in the Holy Spirit and fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with water' and later 'with the Holy Spirit and fire'; the Greek preposition
      ἐν can be rendered either way in these phrases.
    reason: lexical_alternative
  - marker: b
    text: '''For repentance'' may also be understood as ''unto repentance,'' preserving
      the Greek phrase''s directional sense without specifying whether repentance
      precedes or is signified by the baptism.'
    reason: lexical_alternative
  - marker: c
    text: '''And fire'' may be understood as referring to purification or to judgment;
      the Greek leaves the image open here, and the surrounding context should guide
      interpretation.'
    reason: alternative_reading
lexical_decisions:
- source_word: βαπτίζω
  chosen: baptize
  alternatives:
  - immerse
  lexicon: BDAG
  rationale: Retains the established verb 'baptize' rather than specifying mode with
    'immerse,' since the verb can denote ritual washing/baptism broadly and the context
    does not explicitly define mode.
- source_word: ἐν ὕδατι
  chosen: in water
  alternatives:
  - with water
  lexicon: BDAG
  rationale: The preposition ἐν with the dative can be rendered 'in' or 'with.' 'In
    water' preserves the Greek form more closely and pairs naturally with the later
    parallel phrase 'in the Holy Spirit and fire.'
- source_word: εἰς μετάνοιαν
  chosen: for repentance
  alternatives:
  - unto repentance
  - for the purpose of repentance
  lexicon: BDAG
  rationale: '''For repentance'' is concise modern English and preserves the directional/purposive
    force of εἰς without overinterpreting whether repentance precedes or is signified
    by the baptism.'
- source_word: ὁ δὲ ὀπίσω μου ἐρχόμενος
  chosen: the one coming after me
  alternatives:
  - he who comes after me
  - the one who is coming after me
  lexicon: BDAG
  rationale: This renders the substantival participle naturally in English while preserving
    the temporal/sequential sense of ὀπίσω μου.
- source_word: ἰσχυρότερός μού
  chosen: is stronger than I
  alternatives:
  - is mightier than I
  - is more powerful than I am
  lexicon: BDAG
  rationale: '''Stronger'' is a direct, readable rendering of the comparative adjective.
    ''Mightier'' is traditional but somewhat archaic; ''more powerful'' is possible
    but less concise.'
- source_word: οὗ οὐκ εἰμὶ ἱκανὸς
  chosen: whose ... I am not worthy
  alternatives:
  - whose ... I am not fit
  - whose ... I am not adequate
  lexicon: BDAG
  rationale: Although ἱκανός can mean 'fit/capable/sufficient,' in this humility formula
    'worthy' best captures the idiomatic force in context.
- source_word: τὰ ὑποδήματα βαστάσαι
  chosen: to carry his sandals
  alternatives:
  - to carry his shoes
  - to remove his sandals
  lexicon: BDAG
  rationale: βαστάσαι means 'to carry/bear,' not 'remove.' 'Sandals' is culturally
    and lexically more precise than 'shoes.' The possessive 'his' is supplied naturally
    in English from the relative clause.
- source_word: αὐτὸς
  chosen: He himself
  alternatives:
  - He
  - that one
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'He himself' preserves the emphasis and contrast
    with John's own baptism.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - with the Holy Spirit
  - in Holy Spirit
  lexicon: BDAG
  rationale: Capitalized 'Holy Spirit' reflects the standard personal referent in
    this context. 'In' preserves the repeated ἐν construction; the article is natural
    in English though absent in Greek.
- source_word: καὶ πυρί
  chosen: and fire
  alternatives:
  - and with fire
  lexicon: BDAG
  rationale: A straightforward rendering of the coordinated dative phrase. Keeping
    'and fire' preserves the ambiguity of whether this is a complementary blessing,
    purifying image, or judgment image, which the immediate context develops.
