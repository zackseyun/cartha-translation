theological_decisions:
- issue: Meaning of Abrahamic descent in John's warning
  chosen_reading: The verse rejects reliance on physical descent from Abraham as sufficient
    before God, without denying Abraham's historical fatherhood to Israel.
  alternative_readings:
  - The statement is only rhetorical hyperbole with no theological critique of lineage
    privilege
  - The statement implies replacement of ethnic Israel as such
  rationale: The wording directly rebukes confidence in ancestry as grounds of security.
    The translation preserves that critique without importing later theological systems
    or supersessionist conclusions not stated in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
