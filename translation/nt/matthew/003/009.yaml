id: MAT.3.9
reference: Matthew 3:9
source:
  edition: SBLGNT
  text: καὶ μὴ δόξητε λέγειν ἐν ἑαυτοῖς· Πατέρα ἔχομεν τὸν Ἀβραάμ, λέγω γὰρ ὑμῖν ὅτι
    δύναται ὁ θεὸς ἐκ τῶν λίθων τούτων ἐγεῖραι τέκνα τῷ Ἀβραάμ.
translation:
  text: And do not presume to say among yourselves, ‘We have Abraham as our father,’
    for I tell you that God is able to raise up children for Abraham from these stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to say within yourselves.' The Greek phrase may refer either to inward
      self-talk or to what they say among themselves as a group.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δόξητε
  chosen: do not presume
  alternatives:
  - do not think
  - do not suppose
  - do not imagine
  lexicon: BDAG
  rationale: The aorist subjunctive with μή in prohibition warns against adopting
    a false assumption. 'Presume' captures not merely mental activity but a self-assured,
    unwarranted confidence, fitting John's rebuke better than the flatter 'think'.
- source_word: λέγειν ἐν ἑαυτοῖς
  chosen: to say among yourselves
  alternatives:
  - to say within yourselves
  - to say to yourselves
  lexicon: BDAG
  rationale: The phrase can mean inward self-talk or speech within the group. Because
    the audience is plural and the warning concerns a shared communal claim of descent,
    'among yourselves' best reflects the plural reflexive force while remaining natural
    English.
- source_word: Πατέρα ἔχομεν τὸν Ἀβραάμ
  chosen: We have Abraham as our father
  alternatives:
  - We have Abraham for our father
  - Abraham is our father
  lexicon: BDAG
  rationale: This preserves the emphatic claim of ancestral privilege. 'As our father'
    is idiomatic modern English and retains the covenantal/lineage sense without archaic
    phrasing.
- source_word: λέγω γὰρ ὑμῖν
  chosen: for I tell you
  alternatives:
  - for I say to you
  lexicon: BDAG
  rationale: '''For I tell you'' is a natural modern rendering of the discourse formula
    and preserves γάρ as explanatory.'
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: '''Is able'' more explicitly conveys capability/power and suits the solemn
    tone better than the more colloquial ''can''.'
- source_word: ἐκ τῶν λίθων τούτων
  chosen: from these stones
  alternatives:
  - out of these stones
  lexicon: BDAG
  rationale: Both are possible for ἐκ. 'From these stones' is smoother in contemporary
    English while preserving the source image.
- source_word: ἐγεῖραι
  chosen: to raise up
  alternatives:
  - to bring forth
  - to produce
  lexicon: BDAG
  rationale: In context ἐγείρω means to bring into existence or appoint descendants,
    not resurrection specifically. 'Raise up' preserves the verbal force and biblical
    resonance without overinterpreting.
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  - sons
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and denotes descendants/children generally.
    'Children' is the most accurate and natural choice; 'sons' would be too narrow.
- source_word: τῷ Ἀβραάμ
  chosen: for Abraham
  alternatives:
  - to Abraham
  lexicon: BDAG
  rationale: 'The dative here expresses relation/advantage: children belonging in
    relation to Abraham as descendants. ''For Abraham'' is idiomatic in English in
    this construction and matches the sense of descendants for him.'
