id: MAT.3.13
reference: Matthew 3:13
source:
  edition: SBLGNT
  text: Τότε παραγίνεται ὁ Ἰησοῦς ἀπὸ τῆς Γαλιλαίας ἐπὶ τὸν Ἰορδάνην πρὸς τὸν Ἰωάννην
    τοῦ βαπτισθῆναι ὑπ’ αὐτοῦ.
translation:
  text: Then Jesus comes from Galilee to the Jordan, to John, to be baptized by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrives.' The Greek verb is a historical present, used for vivid narration.
    reason: lexical_alternative
  - marker: b
    text: Or more explicitly, 'in order to be baptized by him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to the Jordan, to John,'.
    reason: previous_rendering
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence. 'Then'
    is natural, concise English and preserves the narrative flow.
- source_word: παραγίνεται
  chosen: comes
  alternatives:
  - arrives
  - appears
  lexicon: BDAG
  rationale: Historical present middle/passive form used vividly in narrative. 'Comes'
    preserves the present-tense vividness better than the more static 'arrives,' while
    remaining idiomatic in English.
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: BDAG
  rationale: ἀπό marks source/origin. 'From Galilee' is the standard and clearest
    rendering.
- source_word: ἐπὶ τὸν Ἰορδάνην
  chosen: to the Jordan
  alternatives:
  - to the Jordan River
  - upon the Jordan
  lexicon: BDAG
  rationale: With motion, ἐπί + accusative indicates movement toward a place. 'To
    the Jordan' is concise and natural; 'Jordan River' is possible but not necessary
    in context.
- source_word: πρὸς τὸν Ἰωάννην
  chosen: to John
  alternatives:
  - toward John
  - to John the Baptist
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person. 'To John'
    is sufficient because the immediate context already identifies him; adding 'the
    Baptist' would import material not present in this verse.
- source_word: τοῦ βαπτισθῆναι
  chosen: to be baptized
  alternatives:
  - for being baptized
  - in order to be baptized
  lexicon: BDAG
  rationale: Articular infinitive expressing purpose. 'To be baptized' is idiomatic
    English and adequately conveys purpose without over-translating. 'In order to
    be baptized' is more explicit but less natural.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by John
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency. 'By him' closely follows the
    Greek; naming John again would be interpretive expansion beyond the explicit wording.
