theological_decisions:
- issue: Rendering the historical present παραγίνεται
  chosen_reading: Present-tense vividness retained with 'comes'
  alternative_readings:
  - Simple past 'came'
  rationale: The Greek uses a historical present, a common narrative feature. Retaining
    present tense in English preserves the immediacy of Matthew's narration without
    affecting doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Specification of John's title
  chosen_reading: Use 'John' only in the main text
  alternative_readings:
  - John the Baptist
  rationale: The verse itself says only 'John.' Since the translation philosophy prioritizes
    original-language primacy and avoids importing material not present, the title
    is not added here.
  doctrine_reference: Translation philosophy §1
