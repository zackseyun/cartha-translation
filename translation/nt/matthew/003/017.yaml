id: MAT.3.17
reference: Matthew 3:17
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ φωνὴ ἐκ τῶν οὐρανῶν λέγουσα· Οὗτός ἐστιν ὁ υἱός μου ὁ ἀγαπητός, ἐν
    ᾧ εὐδόκησα.
translation:
  text: And behold, a voice from the heavens said, “This is my beloved Son, with whom
    I am well pleased.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from heaven.” The Greek has the plural “from the heavens.”
    reason: lexical_alternative
  - marker: b
    text: Or “in whom I am well pleased.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - And see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to a significant event.
    'Behold' preserves the marked, solemn force better than flatter modern options,
    while remaining understandable in context.
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - a sound
  lexicon: BDAG
  rationale: φωνή here denotes an articulate voice, not merely a noise, since it is
    followed by direct speech.
- source_word: ἐκ τῶν οὐρανῶν
  chosen: from the heavens
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: The Greek is plural, matching the common Jewish/Greek idiom 'the heavens.'
    The translation preserves the source form rather than flattening to the traditional
    singular, while still sounding natural enough in English.
- source_word: λέγουσα
  chosen: said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: The participle modifies 'voice' and introduces the quotation. English
    idiom prefers the finite verb 'said' here rather than the more wooden 'a voice
    ... saying.'
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  lexicon: BDAG
  rationale: Natural English equivalent of the demonstrative plus copula, retaining
    the direct identificational force.
- source_word: ὁ υἱός μου
  chosen: my Son
  alternatives:
  - my son
  lexicon: BDAG
  rationale: Capitalized 'Son' is used because the referent is Jesus in a direct divine
    declaration, and the phrase functions as a christological title in context, not
    merely a generic filial description.
- source_word: ὁ ἀγαπητός
  chosen: beloved
  alternatives:
  - dearly loved
  - the beloved
  lexicon: BDAG
  rationale: ἀγαπητός commonly means 'beloved' or 'dearly loved.' 'Beloved' preserves
    the elevated and covenantally resonant tone of the declaration and fits naturally
    before 'Son' in English.
- source_word: ἐν ᾧ
  chosen: with whom
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' the idiom with εὐδοκέω in this context
    is best rendered 'with whom I am well pleased' in contemporary English. The more
    literal 'in whom' is preserved in a footnote as a lexical alternative.
- source_word: εὐδόκησα
  chosen: I am well pleased
  alternatives:
  - I have delighted
  - I took pleasure
  lexicon: BDAG
  rationale: The aorist εὐδόκησα can be rendered idiomatically in English as a present-state
    declaration in this formulaic heavenly pronouncement. 'I am well pleased' is the
    most natural and established equivalent, expressing divine approval without overstating
    aspect.
