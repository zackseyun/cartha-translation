theological_decisions:
- issue: Rendering the divine declaration of Jesus' sonship
  chosen_reading: my beloved Son
  alternative_readings:
  - my dearly loved Son
  rationale: The translation preserves the explicit filial and christological force
    of the Greek without weakening it into a merely functional or adoptive sense.
    This aligns with historic orthodox Christology while not importing additional
    doctrinal wording beyond the text itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
- issue: Plural οὐρανῶν
  chosen_reading: from the heavens
  alternative_readings:
  - from heaven
  rationale: The source text uses the plural, and the translation philosophy prioritizes
    original-language primacy over inherited English tradition unless clarity demands
    otherwise. The traditional singular is preserved in a footnote because it is familiar
    and idiomatic.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition'
