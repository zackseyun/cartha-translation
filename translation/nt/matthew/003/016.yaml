id: MAT.3.16
reference: Matthew 3:16
source:
  edition: SBLGNT
  text: ⸂βαπτισθεὶς δὲ⸃ ὁ Ἰησοῦς ⸂εὐθὺς ἀνέβη⸃ ἀπὸ τοῦ ὕδατος· καὶ ἰδοὺ ⸀ἠνεῴχθησαν
    οἱ οὐρανοί, καὶ εἶδεν ⸀πνεῦμα θεοῦ καταβαῖνον ὡσεὶ ⸀περιστερὰν ἐρχόμενον ἐπ’ αὐτόν·
translation:
  text: And after Jesus was baptized, he immediately came up from the water. And behold,
    the heavens were opened, and he saw the Spirit of God descending like a dove and
    coming upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came up out of the water.' The Greek says 'from the water' (ἀπὸ τοῦ
      ὕδατος).
    reason: lexical_alternative
  - marker: b
    text: Or 'descending as a dove.' The Greek uses a comparison term ('like/as if').
    reason: alternative_reading
  - marker: c
    text: Some English versions render 'coming upon him' as 'alighting on him,' but
      the Greek verb is more literally 'coming.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαπτισθεὶς
  chosen: after Jesus was baptized
  alternatives:
  - having been baptized
  - when Jesus had been baptized
  lexicon: BDAG
  rationale: Aorist passive participle, nominative masculine singular, temporally
    prior to the main verb. 'After Jesus was baptized' gives clear English temporal
    sequence while preserving the passive sense.
- source_word: δὲ
  chosen: And
  alternatives:
  - now
  - then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural in English narrative and avoids overemphasizing contrast.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Retains Matthew's sense of prompt sequence with a standard modern English
    adverb.
- source_word: ἀνέβη ἀπὸ τοῦ ὕδατος
  chosen: came up from the water
  alternatives:
  - went up from the water
  - came up out of the water
  lexicon: BDAG
  rationale: ἀναβαίνω with ἀπό naturally means 'go/come up from.' 'Came up from the
    water' is idiomatic and does not overstate the preposition beyond the Greek. 'Out
    of the water' is a common interpretive rendering but is stronger than ἀπό alone,
    so it is preserved as an alternative rather than placed in the main text.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Preserves the discourse marker's vivid, attention-directing force. Though
    somewhat elevated, it remains readable and reflects the narrative emphasis.
- source_word: ἠνεῴχθησαν οἱ οὐρανοί
  chosen: the heavens were opened
  alternatives:
  - the sky was opened
  - the heavens opened
  lexicon: BDAG
  rationale: Plural οἱ οὐρανοί is best represented by 'the heavens,' which preserves
    biblical idiom and possible cosmological resonance better than the flatter 'sky.'
    Passive form is retained.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he looked and saw
  lexicon: BDAG
  rationale: Simple aorist active indicative of perception; straightforwardly rendered.
- source_word: πνεῦμα θεοῦ
  chosen: the Spirit of God
  alternatives:
  - God's Spirit
  - a spirit from God
  lexicon: BDAG
  rationale: In this baptismal context, the phrase most naturally refers to the Holy
    Spirit. 'The Spirit of God' preserves the genitive construction and the recognized
    biblical expression without importing more than the text states.
- source_word: καταβαῖνον
  chosen: descending
  alternatives:
  - coming down
  lexicon: BDAG
  rationale: Present participle expressing ongoing motion; 'descending' is concise
    and dignified.
- source_word: ὡσεὶ περιστερὰν
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: BDAG
  rationale: ὡσεὶ marks comparison/similitude. 'Like a dove' preserves the comparison
    without forcing an identification of the Spirit as literally a dove.
- source_word: ἐρχόμενον ἐπ’ αὐτόν
  chosen: coming upon him
  alternatives:
  - coming on him
  - alighting on him
  lexicon: BDAG
  rationale: The participle ἐρχόμενον with ἐπί indicates movement toward and onto/upon
    Jesus. 'Coming upon him' is a close rendering. 'Alighting on him' is interpretive
    and smoother in English tradition, but the Greek verb is 'coming,' not specifically
    'alighting,' so the more transparent wording is preferred.
