theological_decisions:
- issue: Whether πνεῦμα θεοῦ should be rendered generically or as a reference to the
    Holy Spirit
  chosen_reading: the Spirit of God
  alternative_readings:
  - God's Spirit
  - a spirit from God
  rationale: The baptism narrative and broader canonical context strongly support
    a reference to the Holy Spirit, but the translation keeps the exact wording 'Spirit
    of God' rather than substituting the more interpretive title 'Holy Spirit.' This
    preserves theological clarity without exceeding the Greek expression.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Whether ὡσεὶ περιστερὰν describes the manner/form of the Spirit's descent
    or identifies the Spirit as a dove
  chosen_reading: descending like a dove
  alternative_readings:
  - descending as a dove
  rationale: The comparative particle ὡσεὶ indicates likeness. The main text preserves
    comparison rather than asserting that the Spirit literally was a dove, thus maintaining
    the text's theological and grammatical restraint.
  doctrine_reference: 'Translation philosophy #3'
