id: MAT.3.2
reference: Matthew 3:2
source:
  edition: SBLGNT
  text: ⸀καὶ λέγων· Μετανοεῖτε, ἤγγικεν γὰρ ἡ βασιλεία τῶν οὐρανῶν.
translation:
  text: and saying, “Change your thinking, for the kingdom of heaven has drawn near.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Repent' (traditional). Greek μετανοέω literally = "change one's mind/thinking"
      (μετά "change" + νοέω "think, perceive"). In English Bible tradition this verb
      has long been rendered "repent," which in modern English drifts toward "feel
      guilty about sin / apologize." The Greek is broader and more cognitive — a fundamental
      reorientation of thinking, not primarily an emotional state. In John the Baptist's
      proclamation (and Jesus's parallel preaching, Mark 1:15), the call is for hearers
      to rethink everything in light of the kingdom's arrival. See REVISION_METHODOLOGY.md
      for the project-level analysis.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'the kingdom of the heavens has come near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - while
  - then
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this participial clause to
    the preceding narrative. 'And' is the most natural and sufficiently formal rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - preaching
  - proclaiming
  lexicon: BDAG
  rationale: Present active participle of λέγω, modifying the implied subject from
    the previous verse. 'Saying' preserves the participial form and avoids importing
    the more specific idea of heralding unless context explicitly requires it.
- source_word: Μετανοεῖτε
  chosen: Change your thinking
  alternatives:
  - Repent
  - Change your mind
  - Rethink everything
  - Turn back
  lexicon: BDAG
  rationale: Second person plural present imperative of μετανοέω, literally "to change
    one's mind/thinking" (μετά "change" + νοέω "think, perceive"). Modern English
    "repent" has drifted toward "feel guilty about sin / apologize," which loses the
    cognitive force the Greek carries. Here John the Baptist is calling hearers to
    a fundamental worldview reorientation in light of the kingdom's approach — not
    primarily an emotional response to specific sins. "Change your thinking" restores
    the actual lexical force. See REVISION_METHODOLOGY.md for the project-level analysis
    and per-context decisions across all 51 NT occurrences.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: 'Perfect active indicative of ἐγγίζω. ''Has drawn near'' best reflects
    the perfect aspect: the kingdom has approached and is now near. It is more aspectually
    precise than the simple present ''is near.'''
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground for the command to repent. 'For' is concise and
    natural in English proclamation style.
- source_word: ἡ βασιλεία
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingship
  lexicon: BDAG
  rationale: βασιλεία can denote reign/rule or kingdom. In Matthew's formulaic expression,
    'the kingdom' is the most idiomatic English rendering and preserves the broad
    semantic range of God's royal rule and realm without over-narrowing to abstraction.
- source_word: τῶν οὐρανῶν
  chosen: of heaven
  alternatives:
  - of the heavens
  lexicon: BDAG
  rationale: Genitive plural literally 'of the heavens,' but Matthew's Jewish reverential
    circumlocution is conventionally and accurately rendered 'of heaven' in idiomatic
    English. This preserves meaning without awkward literalism.
