theological_decisions:
- issue: Meaning of 'the kingdom of heaven'
  chosen_reading: Retain 'the kingdom of heaven' as Matthew's wording rather than
    interpretively paraphrasing it as 'God's reign' in the main text.
  alternative_readings:
  - the reign of heaven
  - the kingdom of God
  rationale: Matthew characteristically uses 'kingdom of heaven' as a reverential
    expression. Rendering it directly preserves the evangelist's diction and theological
    texture without collapsing it into a paraphrase, though 'reign' captures one aspect
    of βασιλεία and 'kingdom of God' is a close Synoptic parallel.
  doctrine_reference: Translation philosophy §§1, 3, 5
