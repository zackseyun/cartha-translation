id: MAT.3.3
reference: Matthew 3:3
source:
  edition: SBLGNT
  text: οὗτος γάρ ἐστιν ὁ ῥηθεὶς ⸀διὰ Ἠσαΐου τοῦ προφήτου λέγοντος· Φωνὴ βοῶντος ἐν τῇ ἐρήμῳ· Ἑτοιμάσατε τὴν ὁδὸν κυρίου, εὐθείας ποιεῖτε τὰς τρίβους αὐτοῦ.
translation:
  text: 'For this is the one spoken of through Isaiah the prophet, saying: “A voice of one crying in the wilderness: ‘Prepare the way of the Lord; make his paths straight.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Prepare the way of the LORD”; the quotation echoes Isaiah 40:3, where the Hebrew text has the divine name YHWH.
    reason: alternative_reading
  - marker: b
    text: Or 'in the wilderness,'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὗτος
  chosen: this
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: Demonstrative referring to John the Baptist in the immediate context. 'This' preserves the Greek deictic force in the explanatory formula.
- source_word: γάρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Introduces explanation for the preceding statement; 'for' is the natural English connective here.
- source_word: ὁ ῥηθεὶς
  chosen: the one spoken of
  alternatives:
  - the one spoken
  - the one referred to
  lexicon: BDAG
  rationale: Articular aorist passive participle functioning substantivally. 'Spoken of' is idiomatic English and captures the passive reference formula.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  chosen: through Isaiah the prophet
  alternatives:
  - by Isaiah the prophet
  lexicon: BDAG
  rationale: With passive ῥηθεὶς, διά + genitive commonly marks intermediate agency/instrumentality in fulfillment formulas. 'Through Isaiah' preserves the wording and avoids flattening prophetic mediation.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - who says
  lexicon: BDAG
  rationale: Participial introduction to the quotation. 'Saying' is concise and standard in English citation formulas.
- source_word: Φωνὴ βοῶντος
  chosen: A voice of one crying
  alternatives:
  - The voice of one crying
  - A voice crying
  lexicon: BDAG
  rationale: Anarthrous φωνή is naturally rendered 'A voice.' The genitive participle βοῶντος is best represented as 'of one crying,' preserving the quoted form rather than smoothing it away.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος in this context denotes the wilderness region associated with John's ministry and the Isaiah allusion. 'Wilderness' is the established and contextually apt rendering.
- source_word: Ἑτοιμάσατε
  chosen: Prepare
  alternatives:
  - Get ready
  - Make ready
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action. 'Prepare' is direct and suitably formal for prophetic proclamation.
- source_word: τὴν ὁδὸν
  chosen: the way
  alternatives:
  - the road
  lexicon: BDAG
  rationale: In prophetic and metaphorical usage, ὁδός is well rendered 'way'; it also preserves intertextual resonance with Isaiah 40:3.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: DOCTRINE.md lists κύριος default as 'Lord.' In this Isaianic citation the underlying Hebrew refers to YHWH, but in the Greek text Matthew uses κυρίου; main text follows the stated default while preserving the covenantal-background alternative in a footnote.
- source_word: εὐθείας ποιεῖτε
  chosen: make straight
  alternatives:
  - make level
  - straighten
  lexicon: BDAG
  rationale: Imperative phrase meaning to make direct or straight. 'Make straight' is idiomatic and preserves the metaphor.
- source_word: τὰς τρίβους αὐτοῦ
  chosen: his paths
  alternatives:
  - his roads
  - his tracks
  lexicon: BDAG
  rationale: τρίβος denotes path/roadway. 'Paths' fits the poetic register of the quotation and pairs naturally with 'make straight.' The pronoun αὐτοῦ is retained as 'his,' preserving the personal referent.
