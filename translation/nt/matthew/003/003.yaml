theological_decisions:
- issue: Rendering κυρίου in an Isaiah 40:3 quotation whose Hebrew source names YHWH
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek text before us reads κυρίου, and DOCTRINE.md specifies the default rendering of κύριος as 'Lord.' Because the quotation alludes to Isaiah 40:3, where the Hebrew has YHWH, the covenantal-background alternative 'the LORD' is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord; יְהוָה → the LORD)'
revisions:
- timestamp: '2026-04-21T02:23:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/003/003.json
  category: awkward_english
  tier: 1
  from: in the wilderness,
  to: 'in the wilderness:'
  rationale: The phrase 'A voice of one crying' introduces the content of the cry ('Prepare...'). In English, a colon is the most precise punctuation to set off a quotation or statement from an introductory clause like this. Using a colon instead of a comma would more clearly delineate the 'crier' from the 'cry', improving the logical and rhetorical flow of the sentence. While a comma is not strictly incorrect, a colon is stylistically stronger and more formally correct in this context.
