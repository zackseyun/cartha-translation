id: MAT.3.6
reference: Matthew 3:6
source:
  edition: SBLGNT
  text: καὶ ἐβαπτίζοντο ἐν τῷ Ἰορδάνῃ ⸀ποταμῷ ὑπ’ αὐτοῦ ἐξομολογούμενοι τὰς ἁμαρτίας
    αὐτῶν.
translation:
  text: and they were being baptized by him in the Jordan River, confessing their
    sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''were baptized''; the Greek imperfect may emphasize ongoing or repeated
      action: ''were being baptized.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβαπτίζοντο
  chosen: were being baptized
  alternatives:
  - were baptized
  - were immersing themselves
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing/repeated action in the narrative,
    best reflected by 'were being baptized' rather than simple past. 'Baptized' is
    retained rather than a more explicit gloss like 'immersed' because βαπτίζω in
    this context functions as the established ritual term and the text itself does
    not foreground mode.
- source_word: ἐν τῷ Ἰορδάνῃ ποταμῷ
  chosen: in the Jordan River
  alternatives:
  - in the river Jordan
  - in the Jordan
  lexicon: BDAG
  rationale: The dative with ἐν is locative, and ποταμῷ explicitly identifies the
    Jordan as a river. 'Jordan River' is natural modern English while preserving the
    explicit noun ποταμός present in the Greek.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by John
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency. The pronoun naturally refers
    to John from the immediate context; 'by him' preserves the Greek wording without
    importing the antecedent into this verse.
- source_word: ἐξομολογούμενοι
  chosen: confessing
  alternatives:
  - acknowledging
  - openly confessing
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and denotes verbal
    acknowledgment of wrongdoing. 'Confessing' is the most direct and idiomatic rendering
    in this repentance context.
- source_word: τὰς ἁμαρτίας αὐτῶν
  chosen: their sins
  alternatives:
  - the sins of theirs
  lexicon: BDAG
  rationale: A straightforward rendering of the accusative object plus possessive
    genitive. 'Sins' preserves the plural, indicating specific acts or offenses being
    confessed.
- source_word: καὶ
  chosen: and
  alternatives:
  - now
  - then
  lexicon: BDAG
  rationale: Simple connective linking this verse to the preceding description. 'And'
    preserves the narrative flow without overinterpreting discourse force.
