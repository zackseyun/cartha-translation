theological_decisions:
- issue: Nature of baptism terminology
  chosen_reading: Retain 'baptized' rather than specifying mode such as 'immersed.'
  alternative_readings:
  - immersed
  - washed
  rationale: The verse states that people were baptized in the Jordan by John but
    does not explicitly define the mode. Using 'baptized' preserves the text's wording
    and avoids importing denominational conclusions not unambiguously demanded by
    the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
