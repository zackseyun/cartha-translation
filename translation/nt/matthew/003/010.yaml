id: MAT.3.10
reference: Matthew 3:10
source:
  edition: SBLGNT
  text: ἤδη ⸀δὲ ἡ ἀξίνη πρὸς τὴν ῥίζαν τῶν δένδρων κεῖται· πᾶν οὖν δένδρον μὴ ποιοῦν
    καρπὸν καλὸν ἐκκόπτεται καὶ εἰς πῦρ βάλλεται.
translation:
  text: And already the axe is laid at the root of the trees. Therefore every tree
    not producing good fruit is cut down and thrown into the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lies at the root of the trees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - even now
  - now already
  lexicon: BDAG
  rationale: Conveys the immediacy of impending judgment. 'Already' is natural in
    English and preserves the temporal force.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ is mildly connective rather than strongly adversative. 'And'
    preserves the flow from the preceding warning without overstating contrast.
- source_word: ἀξίνη
  chosen: axe
  lexicon: BDAG
  rationale: Standard gloss for the cutting tool in the metaphor of judgment.
- source_word: πρὸς τὴν ῥίζαν τῶν δένδρων κεῖται
  chosen: is laid at the root of the trees
  alternatives:
  - lies at the root of the trees
  - is set against the root of the trees
  lexicon: BDAG
  rationale: κέῖται literally means 'lies' or 'is laid/placed.' 'Is laid at the root'
    is idiomatic English that preserves the image of the axe already positioned for
    use. πρὸς with the accusative here is rendered 'at' to express proximity/direction
    in a natural English metaphor.
- source_word: πᾶν οὖν δένδρον
  chosen: Therefore every tree
  alternatives:
  - So every tree
  - Then every tree
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding image. 'Therefore' makes the logical
    consequence explicit in readable English.
- source_word: μὴ ποιοῦν
  chosen: not producing
  alternatives:
  - not bearing
  - that does not make
  lexicon: BDAG
  rationale: The participle modifies 'tree' and denotes ongoing characteristic action.
    'Producing' is a direct and natural rendering of ποιέω here; 'bearing' is possible
    by English idiom but less directly tied to the Greek verb.
- source_word: καρπὸν καλὸν
  chosen: good fruit
  alternatives:
  - fruit that is good
  lexicon: BDAG
  rationale: A standard and transparent rendering of the metaphor; καλός here denotes
    good/fit/commendable fruit.
- source_word: ἐκκόπτεται
  chosen: is cut down
  alternatives:
  - is cut off
  lexicon: BDAG
  rationale: In the tree metaphor, 'cut down' is the most idiomatic English equivalent
    and fits the image better than the more ambiguous 'cut off.'
- source_word: εἰς πῦρ βάλλεται
  chosen: is thrown into the fire
  alternatives:
  - is cast into the fire
  lexicon: BDAG
  rationale: '''Thrown into the fire'' is clear modern English while preserving the
    force of βάλλεται and the definite image of judgment.'
