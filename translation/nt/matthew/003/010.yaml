theological_decisions:
- issue: Nature of the fire imagery
  chosen_reading: Retained as 'the fire' without interpretive expansion.
  alternative_readings:
  - eschatological judgment
  - temporal judgment
  - hellfire
  rationale: The verse clearly uses judgment imagery, but the text itself does not
    specify beyond 'the fire.' To preserve theological tension and avoid importing
    a narrower doctrinal claim than the wording warrants, the translation leaves the
    metaphor intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
