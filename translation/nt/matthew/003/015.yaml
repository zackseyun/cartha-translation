id: MAT.3.15
reference: Matthew 3:15
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν ⸂πρὸς αὐτόν⸃· Ἄφες ἄρτι, οὕτως γὰρ πρέπον ἐστὶν
    ἡμῖν πληρῶσαι πᾶσαν δικαιοσύνην. τότε ἀφίησιν αὐτόν.
translation:
  text: But Jesus answered him, “Permit it for now, for in this way it is fitting
    for us to fulfill all righteousness.” Then he permitted him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all justice.” The Greek word can denote righteousness or justice; here
      “righteousness” best fits Matthew’s emphasis on conformity to God’s will.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - But ... replied
  lexicon: BDAG
  rationale: ἀποκριθεὶς with εἶπεν is a common Semitic-influenced idiom meaning 'answered
    and said.' In natural English this is best compressed to 'answered.' δέ is rendered
    'But' because it marks contrast with John's objection in the previous verse.
- source_word: πρὸς αὐτόν
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The indirect object is explicit in Greek, but English idiom with 'answered'
    normally takes a direct object ('answered him'). This preserves the sense without
    woodenly retaining 'to.'
- source_word: Ἄφες
  chosen: Permit it
  alternatives:
  - Allow it
  - Let it be
  lexicon: BDAG
  rationale: Imperative of ἀφίημι here means to allow or permit rather than 'forgive'
    or 'leave.' 'Permit it' fits the immediate context of Jesus asking John to proceed
    with the baptism.
- source_word: ἄρτι
  chosen: for now
  alternatives:
  - now
  - at this time
  lexicon: BDAG
  rationale: ἄρτι here has a temporary, immediate sense. 'For now' captures the nuance
    that Jesus is asking for present compliance in this moment.
- source_word: οὕτως γὰρ
  chosen: for in this way
  alternatives:
  - for thus
  - for so
  lexicon: BDAG
  rationale: This phrase points to the manner just described—John baptizing Jesus.
    'In this way' is clearer modern English than 'thus' while preserving the demonstrative
    force.
- source_word: πρέπον ἐστὶν ἡμῖν
  chosen: it is fitting for us
  alternatives:
  - it is proper for us
  - it is appropriate for us
  lexicon: BDAG
  rationale: πρέπον denotes what is fitting, proper, or appropriate. 'Fitting' preserves
    the moral and situational propriety without sounding overly formal.
- source_word: πληρῶσαι
  chosen: to fulfill
  alternatives:
  - to complete
  - to carry out fully
  lexicon: BDAG
  rationale: πληρόω in Matthew often carries the sense 'fulfill,' especially in relation
    to divine purpose. Here 'fulfill' best preserves Matthean resonance.
- source_word: πᾶσαν δικαιοσύνην
  chosen: all righteousness
  alternatives:
  - all that righteousness requires
  - all justice
  lexicon: BDAG
  rationale: δικαιοσύνη is a contested term in the project and defaults to 'righteousness.'
    In this Matthean context it refers broadly to what accords with God's righteous
    will. 'All righteousness' preserves the Greek expression and theological breadth
    better than narrowing paraphrases. 'Justice' is possible lexically but less fitting
    here.
- source_word: τότε ἀφίησιν αὐτόν
  chosen: Then he permitted him
  alternatives:
  - Then he allowed him
  - Then he left him
  lexicon: BDAG
  rationale: The present-tense ἀφίησιν is a historical present; English past tense
    reads naturally in narrative. In context the meaning is that John yielded and
    allowed Jesus to be baptized, not that he physically left him.
