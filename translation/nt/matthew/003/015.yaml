theological_decisions:
- issue: Meaning of 'all righteousness'
  chosen_reading: A broad reference to fulfilling what is fitting according to God's
    righteous will in this moment, specifically through Jesus receiving baptism from
    John.
  alternative_readings:
  - A narrower reference to fulfilling every legal requirement
  - An emphasis on 'justice' rather than 'righteousness'
  rationale: The phrase should not be reduced to mere law-keeping nor expanded into
    a doctrinal system not explicit in the verse. Matthew's diction and the immediate
    context support a broad sense of conformity to God's righteous purpose. Per DOCTRINE.md,
    δικαιοσύνη defaults to 'righteousness,' while alternatives may be preserved in
    a footnote where useful.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη; Translation
    philosophy §§3, 5'
