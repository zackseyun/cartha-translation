  chosen_reading: the Baptist
  alternative_readings:
  - the Baptizer
  rationale: This is a lexical/title decision rather than a doctrinal one. 'The Baptist'
    is retained because it functions as a recognized identifying epithet in English
    and does not distort the Greek. No contested doctrinal term from DOCTRINE.md is
    involved.
  doctrine_reference: Translation philosophy §2, §6
