id: MAT.3.1
reference: Matthew 3:1
source:
  edition: SBLGNT
  text: Ἐν δὲ ταῖς ἡμέραις ἐκείναις παραγίνεται Ἰωάννης ὁ βαπτιστὴς κηρύσσων ἐν τῇ
    ἐρήμῳ τῆς Ἰουδαίας
translation:
  text: Now in those days John the Baptist came, preaching in the wilderness of Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "John the Baptizer."
    reason: lexical_alternative
  - marker: b
    text: Or "appeared" for "came"; the Greek uses a historical present verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ ταῖς ἡμέραις ἐκείναις
  chosen: Now in those days
  alternatives:
  - In those days
  - And in those days
  lexicon: BDAG
  rationale: Ἐν + dative gives the temporal phrase 'in those days.' δέ is a mild connective;
    'Now' captures the narrative transition in readable English without overstating
    contrast. 'And' is possible but less natural in modern English here.
- source_word: παραγίνεται
  chosen: came
  alternatives:
  - appeared
  - arrived
  - comes
  lexicon: BDAG
  rationale: The historical present παραγίνεται is naturally rendered with an English
    past in narrative for readability. 'Came' fits the context of a new figure entering
    the scene. 'Appeared' is possible and slightly more formal, but 'came' is more
    idiomatic and does not imply a sudden or miraculous appearance beyond the text.
- source_word: Ἰωάννης
  chosen: John
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: ὁ βαπτιστὴς
  chosen: the Baptist
  alternatives:
  - the Baptizer
  lexicon: BDAG
  rationale: As an identifying title/appellation for John, 'the Baptist' is the established
    and natural English rendering. 'The Baptizer' is more transparently verbal but
    less idiomatic in English and not required by the context.
- source_word: κηρύσσων
  chosen: preaching
  alternatives:
  - proclaiming
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is well
    represented by 'preaching.' 'Proclaiming' is also valid, but 'preaching' better
    matches common usage for John’s heralding ministry without importing extra nuance.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος denotes an uninhabited/desolate region. 'Wilderness' is the best
    contextual rendering in Matthew, preserving biblical resonance and avoiding the
    overly specific modern sense of sandy 'desert.'
- source_word: τῆς Ἰουδαίας
  chosen: of Judea
  alternatives:
  - of Judah
  rationale: Ἰουδαία in this period refers to the region/province Judea, not the tribal
    designation Judah. 'Of Judea' accurately identifies the geographic area.
