theological_decisions:
- issue: Judgment imagery of separating wheat and chaff
  chosen_reading: Retained the concrete agricultural metaphor and future judgment
    language without softening it.
  alternative_readings:
  - Interpretive paraphrases that make the wheat/chaff explicitly symbolize righteous
    and wicked in the main text
  rationale: The verse itself presents the metaphor and its severe outcome. The translation
    should preserve the imagery and theological weight without importing an explanatory
    gloss into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
