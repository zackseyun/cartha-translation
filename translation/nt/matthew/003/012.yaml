id: MAT.3.12
reference: Matthew 3:12
source:
  edition: SBLGNT
  text: οὗ τὸ πτύον ἐν τῇ χειρὶ αὐτοῦ, καὶ διακαθαριεῖ τὴν ἅλωνα αὐτοῦ καὶ συνάξει
    τὸν σῖτον αὐτοῦ εἰς τὴν ⸀ἀποθήκην, τὸ δὲ ἄχυρον κατακαύσει πυρὶ ἀσβέστῳ.
translation:
  text: His winnowing fork is in his hand, and he will thoroughly clear his threshing
    floor and gather his wheat into the storehouse, but the chaff he will burn up
    with unquenchable fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'winnowing shovel.' Older English versions often have 'fan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'barn' or 'granary' for 'storehouse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πτύον
  chosen: winnowing fork
  alternatives:
  - winnowing shovel
  - fan
  lexicon: BDAG
  rationale: Refers to the agricultural implement used to toss grain into the air
    for separation. 'Winnowing fork' is clear modern English and more precise than
    the traditional but potentially misleading 'fan.'
- source_word: διακαθαριεῖ
  chosen: will thoroughly clear
  alternatives:
  - will thoroughly cleanse
  - will clean out
  lexicon: BDAG
  rationale: 'The compound verb intensifies the action: complete clearing/cleaning.
    ''Thoroughly clear'' preserves the force without sounding unnatural.'
- source_word: ἅλωνα
  chosen: threshing floor
  alternatives:
  - threshing area
  lexicon: BDAG
  rationale: Standard agricultural term for the place where grain is threshed and
    winnowed; widely understood and contextually exact.
- source_word: σῖτον
  chosen: wheat
  alternatives:
  - grain
  lexicon: BDAG
  rationale: Although the term can denote grain more generally, in this threshing/winnowing
    contrast with chaff, 'wheat' is the natural and idiomatic English rendering and
    matches the imagery of the saying.
- source_word: ἀποθήκην
  chosen: storehouse
  alternatives:
  - barn
  - granary
  lexicon: BDAG
  rationale: A general term for a storage place. 'Storehouse' is broad and accurate;
    'barn' is possible but more culturally specific than the Greek requires.
- source_word: ἄχυρον
  chosen: chaff
  alternatives:
  - straw
  lexicon: BDAG
  rationale: In winnowing imagery, 'chaff' is the standard and contextually correct
    term for the worthless husk separated from grain.
- source_word: κατακαύσει
  chosen: will burn up
  alternatives:
  - will burn
  - will consume by fire
  lexicon: BDAG
  rationale: The compound verb conveys complete burning/consumption. 'Burn up' preserves
    that intensification better than simply 'burn.'
- source_word: πυρὶ ἀσβέστῳ
  chosen: with unquenchable fire
  alternatives:
  - in unquenchable fire
  - with fire that cannot be quenched
  lexicon: BDAG
  rationale: The dative phrase expresses means/instrument. 'Unquenchable fire' is
    the established and accurate rendering of the adjective ἄσβεστος, indicating fire
    that cannot be extinguished.
- source_word: οὗ
  chosen: his
  alternatives:
  - whose
  lexicon: BDAG
  rationale: The genitive relative pronoun links back to the coming one from the previous
    verse. In English, beginning the sentence with 'His' yields natural style while
    preserving the possessive sense.
