theological_decisions:
- issue: Sense of the phrase καρπὸν ἄξιον τῆς μετανοίας
  chosen_reading: A command for outward conduct that corresponds to genuine repentance
  alternative_readings:
  - Fruit that earns repentance
  - Fruit equal in value to repentance
  rationale: The genitive construction indicates fitness/correspondence, not merit.
    The verse calls for evidence of repentance, not works that purchase or cause it.
    This preserves the text's moral demand without importing a doctrine of meritorious
    works.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
