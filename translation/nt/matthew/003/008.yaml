id: MAT.3.8
reference: Matthew 3:8
source:
  edition: SBLGNT
  text: ποιήσατε οὖν καρπὸν ἄξιον τῆς μετανοίας
translation:
  text: Therefore, produce fruit worthy of that changed mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fruit in keeping with repentance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσατε
  chosen: produce
  alternatives:
  - bear
  - make
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural, calling for decisive
    action. 'Produce' fits idiomatic English with 'fruit' better than the more wooden
    'make,' while preserving the command's force. 'Bear' is possible in fruit imagery
    but is less directly tied to ποιέω here.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding warning and exhortation. 'Therefore'
    preserves the logical connection clearly and naturally.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - fruitage
  lexicon: BDAG
  rationale: Standard rendering for καρπός, here metaphorical for visible outcome
    or conduct. Singular is retained as a collective singular in English.
- source_word: ἄξιον
  chosen: worthy of
  alternatives:
  - fit for
  - in keeping with
  lexicon: BDAG
  rationale: ἄξιος with the genitive expresses correspondence or suitability. 'Worthy
    of' is the most direct formal equivalent, though the sense is that the fruit corresponds
    to genuine repentance.
- source_word: μετανοίας
  chosen: that changed mind
  alternatives:
  - a change of mind
  - turning
  lexicon: BDAG
  rationale: The established and accurate rendering in this context is 'repentance,'
    denoting a real turning in response to John's call. Alternatives either narrow
    the sense too much ('change of mind') or paraphrase beyond the lexical form ('turning').
