id: MAT.3.7
reference: Matthew 3:7
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ πολλοὺς τῶν Φαρισαίων καὶ Σαδδουκαίων ἐρχομένους ἐπὶ τὸ βάπτισμα ⸀αὐτοῦ
    εἶπεν αὐτοῖς· Γεννήματα ἐχιδνῶν, τίς ὑπέδειξεν ὑμῖν φυγεῖν ἀπὸ τῆς μελλούσης ὀργῆς;
translation:
  text: But when he saw many of the Pharisees and Sadducees coming for his baptism,
    he said to them, “Offspring of vipers, who warned you to flee from the coming
    wrath?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Brood of vipers.”
    reason: lexical_alternative
  - marker: b
    text: Or “the wrath to come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν δὲ
  chosen: But when he saw
  alternatives:
  - And seeing
  - Now when he saw
  lexicon: BDAG
  rationale: The aorist participle with δέ is naturally rendered as a temporal clause
    in English. 'But when he saw' preserves the narrative flow and mild contrast better
    than a wooden participial construction.
- source_word: πολλοὺς τῶν Φαρισαίων καὶ Σαδδουκαίων
  chosen: many of the Pharisees and Sadducees
  alternatives:
  - many Pharisees and Sadducees
  - many from the Pharisees and Sadducees
  lexicon: BDAG
  rationale: The partitive construction with πολλούς + genitive is best represented
    by 'many of the...' in clear English, indicating a subset rather than necessarily
    every member of those groups.
- source_word: ἐρχομένους ἐπὶ τὸ βάπτισμα αὐτοῦ
  chosen: coming for his baptism
  alternatives:
  - coming to his baptism
  - coming to be baptized by him
  lexicon: BDAG
  rationale: ἐπὶ with βάπτισμα here indicates movement toward the baptismal event/ministry.
    'Coming for his baptism' is concise and natural, while preserving that they are
    approaching John's baptism. 'To be baptized by him' is interpretive beyond the
    wording, since the text says they were coming to the baptism, not explicitly that
    they received it in this verse.
- source_word: Γεννήματα ἐχιδνῶν
  chosen: Offspring of vipers
  alternatives:
  - Brood of vipers
  - Children of vipers
  lexicon: BDAG
  rationale: '''Offspring'' closely reflects γεννήματα as those begotten/produced,
    while remaining intelligible in modern English. ''Brood of vipers'' is traditional
    and vivid, but slightly more idiomatic than the underlying noun; it is preserved
    in a footnote as a lexical alternative.'
- source_word: τίς ὑπέδειξεν ὑμῖν
  chosen: who warned you
  alternatives:
  - who showed you
  - who instructed you
  lexicon: BDAG
  rationale: ὑποδείκνυμι can mean to show, point out, or warn depending on context.
    Here, with φυγεῖν ἀπὸ τῆς μελλούσης ὀργῆς, 'warned' best captures the urgent admonitory
    sense.
- source_word: φυγεῖν ἀπὸ
  chosen: to flee from
  alternatives:
  - to escape from
  lexicon: BDAG
  rationale: The infinitive φυγεῖν straightforwardly means 'to flee.' 'Escape' is
    possible but slightly weakens the imagery of urgent flight.
- source_word: τῆς μελλούσης ὀργῆς
  chosen: the coming wrath
  alternatives:
  - the wrath to come
  lexicon: BDAG
  rationale: μελλούσης denotes what is about to come or impending. 'The coming wrath'
    is clear modern English and preserves the eschatological force. The traditional
    'the wrath to come' is preserved in a footnote as a lexical alternative.
