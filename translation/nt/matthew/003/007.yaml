theological_decisions:
- issue: Nature of the addressed groups
  chosen_reading: John addresses many from the Pharisees and Sadducees as they approach
    his baptism, without implying every Pharisee or Sadducee is present or equally
    characterized.
  alternative_readings:
  - John addresses all Pharisees and Sadducees as a whole
  rationale: The partitive wording supports a subset. This avoids overgeneralizing
    beyond the Greek while preserving the sharp prophetic rebuke directed at those
    present.
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: Eschatological force of ὀργή
  chosen_reading: wrath
  alternative_readings:
  - judgment
  - punishment
  rationale: ὀργή is best rendered 'wrath' here, preserving the text's theological
    gravity and likely eschatological sense without softening it into a mere consequence
    term.
  doctrine_reference: 'Translation philosophy #1 and #6'
