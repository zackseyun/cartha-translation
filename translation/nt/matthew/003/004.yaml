theological_decisions:
- issue: Prophetic austerity and Elijah-like description
  chosen_reading: Render the description straightforwardly without importing interpretive
    commentary into the main text.
  alternative_readings:
  - Translate with wording that more explicitly evokes Elijah
  rationale: The verse describes John's clothing and diet in simple narrative terms.
    While the wording echoes Elijah traditions (cf. 2 Kgs 1:8), the translation should
    preserve the description itself and leave the intertextual connection to a footnote
    rather than embedding interpretation in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
revisions:
- timestamp: '2026-04-21T02:27:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/matthew/003/004.json
  category: awkward_english
  tier: 1
  from: had his clothing made of
  to: wore clothing made of
  rationale: The current phrasing 'had his clothing made of' can be ambiguously read
    as John commissioning the garment's creation, an idea not present in the Greek.
    The verb εἶχεν (imperfect of 'to have') describes a continuous state—what he possessed
    or habitually wore. While 'had' is a literal translation, in this construction
    it creates a slight awkwardness. Using 'wore' (a valid contextual translation
    of εἶχεν) avoids this ambiguity and results in a more natural English phrase.
