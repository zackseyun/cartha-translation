id: MAT.3.4
reference: Matthew 3:4
source:
  edition: SBLGNT
  text: αὐτὸς δὲ ὁ Ἰωάννης εἶχεν τὸ ἔνδυμα αὐτοῦ ἀπὸ τριχῶν καμήλου καὶ ζώνην δερματίνην
    περὶ τὴν ὀσφὺν αὐτοῦ, ἡ δὲ τροφὴ ⸂ἦν αὐτοῦ⸃ ἀκρίδες καὶ μέλι ἄγριον.
translation:
  text: Now John himself wore clothing made of camel’s hair and a leather belt around
    his waist, and his food was locusts and wild honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: John’s clothing recalls the prophet Elijah’s appearance in 2 Kings 1:8,
      an important background for Matthew’s presentation of John.
    reason: cross_reference
  - marker: b
    text: Or 'his garment was of camel hair.'
    reason: lexical_alternative
  - marker: c
    text: Or 'had his clothing made of'.
    reason: previous_rendering
lexical_decisions:
- source_word: αὐτὸς δὲ ὁ Ἰωάννης
  chosen: Now John himself
  alternatives:
  - And John himself
  - Now John
  lexicon: BDAG
  rationale: αὐτός is emphatic, so 'himself' is retained. δέ is a mild connective;
    'Now' gives natural English discourse flow while preserving transition.
- source_word: εἶχεν
  chosen: had
  alternatives:
  - wore
  lexicon: BDAG
  rationale: The verb is literally 'had.' In context it describes what John wore,
    but 'had' preserves the Greek wording without awkwardness when followed by a clothing
    description.
- source_word: τὸ ἔνδυμα αὐτοῦ
  chosen: his clothing
  alternatives:
  - his garment
  - his clothes
  lexicon: BDAG
  rationale: ἔνδυμα can mean garment/clothing. 'Clothing' is natural modern English
    and can function collectively for the outfit described.
- source_word: ἀπὸ τριχῶν καμήλου
  chosen: made of camel’s hair
  alternatives:
  - from camel’s hair
  - of camel hair
  lexicon: BDAG
  rationale: ἀπό with material sense indicates composition. 'Made of camel’s hair'
    expresses the material clearly in idiomatic English.
- source_word: ζώνην δερματίνην
  chosen: a leather belt
  alternatives:
  - a leather waistband
  - a belt of leather
  lexicon: BDAG
  rationale: ζώνη is a belt or waistband; 'belt' is the clearest modern equivalent.
    δερματίνην specifies leather material.
- source_word: περὶ τὴν ὀσφὺν αὐτοῦ
  chosen: around his waist
  alternatives:
  - around his loins
  lexicon: BDAG
  rationale: ὀσφύς is literally 'loin/waist.' 'Waist' is more natural contemporary
    English; 'loins' would sound archaic and overly formal here.
- source_word: ἡ δὲ τροφὴ ἦν αὐτοῦ
  chosen: and his food was
  alternatives:
  - and his nourishment was
  - and what he ate was
  lexicon: BDAG
  rationale: τροφή means food/nourishment. 'Food' is the most straightforward rendering,
    and 'and' smoothly carries the second descriptive clause in English.
- source_word: ἀκρίδες
  chosen: locusts
  lexicon: BDAG
  rationale: The standard lexical meaning is the insect 'locusts.' No contextual reason
    justifies a non-literal rendering.
- source_word: μέλι ἄγριον
  chosen: wild honey
  alternatives:
  - honey from the wild
  lexicon: BDAG
  rationale: The adjective ἄγριον modifies μέλι, indicating honey found in the wild
    rather than cultivated/domesticated production.
