theological_decisions:
- issue: Meaning of the idiom εἰς ὄνομα + genitive
  chosen_reading: Retain the literal 'in the name of' in the main text while acknowledging
    the sense 'because he is' / 'as' in a footnote.
  alternative_readings:
  - because he is a prophet / righteous man
  - as a prophet / righteous man
  rationale: The phrase concerns receiving someone on the basis of their recognized
    identity or office. A fully dynamic rendering would clarify the sense but flatten
    the repeated idiom and its resonance with other 'in the name' expressions. Optimal
    equivalence favors preserving the form in the text and clarifying the sense in
    a footnote.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of δίκαιον / δικαίου with masculine language
  chosen_reading: Use 'righteous man' rather than gender-neutral 'righteous person.'
  alternative_readings:
  - righteous person
  rationale: The Greek is grammatically masculine singular and the project's philosophy
    prefers gender-accurate renderings over gender-neutral ones unless context clearly
    demands otherwise. Here the masculine form is retained without claiming exclusivity
    beyond the representative force of the expression.
  doctrine_reference: Translation philosophy §4
