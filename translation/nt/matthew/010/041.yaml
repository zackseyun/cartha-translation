id: MAT.10.41
reference: Matthew 10:41
source:
  edition: SBLGNT
  text: ὁ δεχόμενος προφήτην εἰς ὄνομα προφήτου μισθὸν προφήτου λήμψεται, καὶ ὁ δεχόμενος
    δίκαιον εἰς ὄνομα δικαίου μισθὸν δικαίου λήμψεται.
translation:
  text: The one who receives a prophet in the name of a prophet will receive a prophet’s
    reward, and the one who receives a righteous man in the name of a righteous man
    will receive a righteous man’s reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he is a prophet' or 'as a prophet.' The Greek literally says
      'in the name of a prophet.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because he is a righteous man' or 'as a righteous man.' The Greek literally
      says 'in the name of a righteous man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεχόμενος
  chosen: the one who receives
  alternatives:
  - whoever receives
  - the one welcoming
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a general person characterized by the action. 'The one who receives' preserves
    the Greek structure and the ongoing/general force better than a more idiomatic
    but less formal 'whoever receives.'
- source_word: προφήτην
  chosen: a prophet
  lexicon: BDAG
  rationale: Straightforward accusative object. 'Prophet' is the standard rendering
    and preserves the recognized role without paraphrase.
- source_word: εἰς ὄνομα προφήτου
  chosen: in the name of a prophet
  alternatives:
  - because he is a prophet
  - as a prophet
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic, indicating reception on the basis of
    the person's status/identity. 'In the name of' preserves the Greek wording and
    theological texture, while the alternatives capture the sense more dynamically.
    Because the idiom may be opaque in English, the alternatives are preserved in
    a footnote.
- source_word: μισθὸν προφήτου
  chosen: a prophet’s reward
  alternatives:
  - the reward of a prophet
  lexicon: BDAG
  rationale: The genitive is naturally rendered as possession or association in English.
    'A prophet’s reward' is idiomatic and preserves the ambiguity of whether it means
    the reward given to a prophet or the reward appropriate to one who receives a
    prophet.
- source_word: λήμψεται
  chosen: will receive
  alternatives:
  - will get
  lexicon: BDAG
  rationale: Future middle here is best represented by simple future 'will receive.'
    'Get' is too colloquial for the register.
- source_word: δίκαιον
  chosen: a righteous man
  alternatives:
  - a righteous person
  - a just man
  lexicon: BDAG
  rationale: The adjective is used substantivally in the masculine singular. Per the
    translation philosophy, gender-accurate rendering is preferred where the Greek
    is grammatically masculine and representative. 'Righteous man' preserves both
    the lexical sense and the masculine form; 'righteous person' is possible interpretively
    but less source-transparent.
- source_word: εἰς ὄνομα δικαίου
  chosen: in the name of a righteous man
  alternatives:
  - because he is righteous
  - as a righteous man
  lexicon: BDAG
  rationale: As in the first clause, the idiom indicates reception on account of the
    person's identity/character. The more literal rendering is retained in the main
    text, with dynamic alternatives footnoted for clarity.
- source_word: μισθὸν δικαίου
  chosen: a righteous man’s reward
  alternatives:
  - the reward of a righteous man
  lexicon: BDAG
  rationale: This mirrors the first clause and preserves the parallelism. 'Righteous
    man’s reward' is idiomatic and keeps the genitival relationship without over-interpreting
    it.
