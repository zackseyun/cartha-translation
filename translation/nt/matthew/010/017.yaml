id: MAT.10.17
reference: Matthew 10:17
source:
  edition: SBLGNT
  text: προσέχετε δὲ ἀπὸ τῶν ἀνθρώπων· παραδώσουσιν γὰρ ὑμᾶς εἰς συνέδρια, καὶ ἐν
    ταῖς συναγωγαῖς αὐτῶν μαστιγώσουσιν ὑμᾶς·
translation:
  text: But beware of people, for they will hand you over to councils, and in their
    synagogues they will flog you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men'; the Greek term is masculine plural but here refers generically
      to people.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχετε
  chosen: beware
  alternatives:
  - be on guard
  - watch out
  lexicon: BDAG
  rationale: Imperative plural of προσέχω here warns of danger from hostile persons.
    'Beware' is concise, idiomatic English that preserves the cautionary force better
    than the more wooden 'take heed.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding instruction.
    'But' fits the warning turn in context.
- source_word: ἀπὸ τῶν ἀνθρώπων
  chosen: of people
  alternatives:
  - from men
  - of men
  - of people in general
  lexicon: BDAG
  rationale: 'With προσέχω, ἀπό marks the source of danger: ''beware of.'' ἄνθρωποι
    here refers generically to human opponents, not specifically males, so ''people''
    is gender-accurate to the sense while avoiding misleading male-specific wording.'
- source_word: παραδώσουσιν
  chosen: will hand ... over
  alternatives:
  - will deliver ... over
  - will betray
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over to authorities. 'Hand over' is
    natural modern English and preserves the juridical sense. 'Betray' would over-specify
    relational treachery not explicit in this immediate clause.
- source_word: συνέδρια
  chosen: councils
  alternatives:
  - courts
  - sanhedrins
  lexicon: BDAG
  rationale: Plural συνέδρια denotes local ruling/judicial councils rather than necessarily
    the Jerusalem Sanhedrin. 'Councils' preserves the institutional sense without
    importing a specific technical body.
- source_word: συναγωγαῖς
  chosen: synagogues
  alternatives:
  - assembly halls
  lexicon: BDAG
  rationale: The term refers concretely to Jewish synagogue settings. Per translation
    philosophy, titles are translated and names transliterated; 'synagogues' is the
    standard transparent rendering.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  lexicon: BDAG
  rationale: 'The genitive pronoun naturally modifies ''synagogues'' as possession/association:
    ''their synagogues.'''
- source_word: μαστιγώσουσιν
  chosen: will flog
  alternatives:
  - will whip
  - will scourge
  lexicon: BDAG
  rationale: μαστιγόω denotes corporal punishment by whipping/flogging. 'Flog' is
    clear, serious, and less archaic than 'scourge' while more formal and judicial
    than 'whip.'
