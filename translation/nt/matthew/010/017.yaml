theological_decisions:
- issue: Gender rendering of ἀνθρώπων
  chosen_reading: people
  alternative_readings:
  - men
  rationale: The Greek is grammatically masculine plural but semantically generic
    here, referring to human beings as persecutors rather than specifically males.
    This follows the doctrine's gender-accurate principle by matching source intent
    rather than grammatical form alone.
