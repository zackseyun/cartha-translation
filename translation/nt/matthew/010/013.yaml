theological_decisions:
- issue: Nature of 'your peace'
  chosen_reading: Retained 'your peace' as the disciples' spoken blessing of peace
    that may rest on or return from the house, without reducing it to a mere wish
    or making it a mechanistic force.
  alternative_readings:
  - your greeting of peace
  - the peace you pronounce
  - the blessing of peace associated with the kingdom message
  rationale: The text presents peace in a concrete, almost transferable way tied to
    the disciples' mission, but it does not require a metaphysical explanation. The
    translation preserves the theological tension and imagery rather than resolving
    it into either a bare greeting or a fully systematized doctrine of impartation.
  doctrine_reference: Preserve theological tension rather than resolve it.
