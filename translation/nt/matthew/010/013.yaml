id: MAT.10.13
reference: Matthew 10:13
source:
  edition: SBLGNT
  text: καὶ ἐὰν μὲν ᾖ ἡ οἰκία ἀξία, ἐλθάτω ἡ εἰρήνη ὑμῶν ἐπ’ αὐτήν· ἐὰν δὲ μὴ ᾖ ἀξία,
    ἡ εἰρήνη ὑμῶν ⸀πρὸς ὑμᾶς ἐπιστραφήτω.
translation:
  text: And if the house is worthy, let your peace come upon it; but if it is not
    worthy, let your peace return to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'household' or 'home'; Greek 'house' may refer to the dwelling and, by
      extension, those in it.
    reason: lexical_alternative
  - marker: b
    text: '''Worthy'' here means fit to receive the messengers and their peace, not
      morally sinless.'
    reason: cultural_note
  - marker: c
    text: Or 'let your peace turn back to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκία
  chosen: house
  alternatives:
  - household
  - home
  lexicon: BDAG
  rationale: Rendered 'house' as the most direct equivalent. In context it can imply
    the household associated with the dwelling, but the Greek term itself names the
    house, and the following pronoun refers back to it as a singular feminine noun.
- source_word: ἀξία
  chosen: worthy
  alternatives:
  - deserving
  - fit
  - receptive
  lexicon: BDAG
  rationale: Chose 'worthy' because it is the standard and most transparent rendering
    of ἄξιος here, preserving the evaluative sense without over-interpreting it as
    merely emotional receptivity. 'Receptive' is interpretive and narrower than the
    Greek.
- source_word: ἐλθάτω
  chosen: let ... come
  alternatives:
  - let ... go
  - may ... come
  lexicon: BDAG
  rationale: The aorist imperative of ἔρχομαι is naturally rendered 'let ... come.'
    This preserves the imperative force while sounding idiomatic in English. 'May
    ... come' is possible but slightly more optative in tone.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - blessing
  - shalom
  lexicon: BDAG
  rationale: Rendered εἰρήνη as 'peace,' the normal equivalent, while allowing the
    broader Semitic sense of well-being/blessing to remain implicit from context.
    'Shalom' would be too transliterative for the main text.
- source_word: ἐπ’ αὐτήν
  chosen: upon it
  alternatives:
  - on it
  - upon that house
  lexicon: BDAG
  rationale: Chose 'upon it' to reflect ἐπί with accusative in a directional sense
    and to preserve the imagery of peace coming onto the house. 'It' refers to the
    house, which is grammatically feminine in Greek but naturally neuter in English.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - back to you
  - unto you
  lexicon: BDAG
  rationale: The preposition πρός with the accusative is basically directional, 'to/toward
    you.' Because it is paired with ἐπιστραφήτω ('let it return'), the English clause
    naturally becomes 'return to you'; adding 'back' would be slightly interpretive
    but is semantically implied.
- source_word: ἐπιστραφήτω
  chosen: let ... return
  alternatives:
  - let ... turn back
  - let ... be turned back
  lexicon: BDAG
  rationale: Rendered as 'let ... return' to convey the passive/deponent-like imperative
    idiomatically in English. 'Be turned back' is more wooden and obscures the sense
    that the peace does not remain there but comes back to the disciples.
- source_word: μὲν ... δὲ
  chosen: if ... ; but if ...
  alternatives:
  - on the one hand ... on the other hand
  - if indeed ... but if not
  lexicon: BDAG
  rationale: Represented the contrastive structure with natural English coordination.
    A more literal 'on the one hand/on the other hand' would be too heavy for the
    verse's flow.
