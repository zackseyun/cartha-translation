id: MAT.10.15
reference: Matthew 10:15
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ἀνεκτότερον ἔσται γῇ Σοδόμων καὶ Γομόρρων ἐν ἡμέρᾳ κρίσεως
    ἢ τῇ πόλει ἐκείνῃ.
translation:
  text: Truly I say to you, it will be more bearable for the land of Sodom and Gomorrah
    on the day of judgment than for that town.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more tolerable.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for Sodom and Gomorrah.' The Greek literally says 'for the land of Sodom
      and Gomorrah.'
    reason: lexical_alternative
  - marker: c
    text: Or 'city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptic formula ἀμὴν λέγω ὑμῖν, English idiom is best served
    by 'Truly I say to you.' 'Amen' is more transliterative but less transparent in
    contemporary English; 'truly' preserves the solemn asseverative force.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close rendering preserves the direct speech formula without unnecessary
    paraphrase. 'I tell you' is idiomatic, but 'I say to you' stays nearer the Greek
    while remaining natural.
- source_word: ἀνεκτότερον
  chosen: more bearable
  alternatives:
  - more tolerable
  - easier to endure
  lexicon: BDAG
  rationale: The comparative adjective denotes something more endurable or tolerable.
    'More bearable' is clear modern English; 'more tolerable' is traditional and viable,
    but slightly less natural for the target audience.
- source_word: γῇ
  chosen: the land
  alternatives:
  - the region
  - the earth
  lexicon: BDAG
  rationale: Here γῇ is dative after ἔσται in a comparative construction, referring
    not to the planet but to the territory/land associated with Sodom and Gomorrah.
    'The land' preserves the concrete geographic sense better than 'earth'.
- source_word: Σοδόμων καὶ Γομόρρων
  chosen: of Sodom and Gomorrah
  lexicon: BDAG
  rationale: Standard transliteration of the place names; the genitives depend on
    γῇ, yielding 'the land of Sodom and Gomorrah.'
- source_word: ἐν ἡμέρᾳ κρίσεως
  chosen: on the day of judgment
  alternatives:
  - in the day of judgment
  - on judgment day
  lexicon: BDAG
  rationale: This phrase refers to the eschatological day of divine judgment. 'On
    the day of judgment' is both accurate and natural. 'Judgment day' is idiomatic
    but slightly more interpretive and colloquial.
- source_word: πόλει
  chosen: town
  alternatives:
  - city
  lexicon: BDAG
  rationale: πόλις can mean city or town. In the immediate mission context, Jesus
    has been speaking of towns visited by the disciples; 'town' fits the scale and
    discourse context better than 'city'.
- source_word: ἐκείνῃ
  chosen: that
  alternatives:
  - that very
  lexicon: BDAG
  rationale: The demonstrative points back to the specific town that rejects the messengers.
    Simple 'that' adequately conveys the referential force without overtranslation.
