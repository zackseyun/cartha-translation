theological_decisions:
- issue: Nature of 'the day of judgment'
  chosen_reading: Rendered as a future day of divine judgment without specifying more
    than the text states.
  alternative_readings:
  - A more generalized time of judgment
  rationale: The phrase naturally refers to eschatological judgment, but the translation
    should not import a fuller doctrinal scheme beyond the wording. 'On the day of
    judgment' preserves the text's solemn future orientation.
  doctrine_reference: Preserve theological tension rather than resolve it.
