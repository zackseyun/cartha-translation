id: MAT.10.40
reference: Matthew 10:40
source:
  edition: SBLGNT
  text: Ὁ δεχόμενος ὑμᾶς ἐμὲ δέχεται, καὶ ὁ ἐμὲ δεχόμενος δέχεται τὸν ἀποστείλαντά
    με.
translation:
  text: The one who receives you receives me, and the one who receives me receives
    the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcomes'; the Greek verb can mean receive, accept, or welcome, especially
      in the sense of receiving a messenger.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ δεχόμενος
  chosen: The one who receives
  alternatives:
  - Whoever receives
  - He who receives
  - The one welcoming
  lexicon: BDAG
  rationale: Articular present participle used substantivally; 'the one who receives'
    preserves the generic singular force in natural modern English. 'Receives' fits
    δέχομαι well here in the sense of accepting or welcoming persons.
- source_word: δέχομαι / δέχεται
  chosen: receives
  alternatives:
  - welcomes
  - accepts
  lexicon: BDAG
  rationale: The repeated verb creates a deliberate chain of identification. 'Receives'
    preserves the lexical repetition and can include the hospitable sense in context.
    'Welcomes' is possible, but 'receives' better maintains the broader sense of accepting
    the messengers and, through them, Jesus and the Father.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object referring to Jesus' disciples/apostles. English
    'you' is number-ambiguous, but context supplies the plural reference.
- source_word: ἐμέ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforward first-person
    singular rendering.
- source_word: τὸν ἀποστείλαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: Aorist active participle of ἀποστέλλω with article functions substantivally.
    'The one who sent me' is clear, natural, and preserves the personal reference
    without over-specifying beyond the Greek.
