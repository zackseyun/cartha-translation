theological_decisions:
- issue: Identification of the sender in Jesus' saying
  chosen_reading: Render generically as 'the one who sent me' without inserting 'the
    Father' into the main text.
  alternative_readings:
  - the Father who sent me
  rationale: The context and Matthean theology strongly imply the Father, but the
    Greek text itself says only 'the one who sent me.' Following optimal equivalence
    and the instruction not to import doctrinal claims the text does not explicitly
    make, the translation preserves the wording while allowing the theological implication
    to stand.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
