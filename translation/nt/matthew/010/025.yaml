theological_decisions:
- issue: Rendering of κύριος in a non-titular household analogy
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The doctrine default for κύριος is 'Lord,' but per-verse variance is
    permitted when context demands. Here the immediate parallel with δοῦλος and οἰκοδεσπότης
    is social-household language, not an explicit confessional title. Rendering it
    'master' preserves the analogy without importing a christological emphasis the
    clause itself does not foreground.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy
    #5'
- issue: Rendering of δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine allows 'servant / slave' context-dependently. Because the
    verse contrasts δοῦλος with κύριος in a status hierarchy, the bonded nature is
    sufficiently salient to prefer 'slave.'
  doctrine_reference: 'DOCTRINE.md: Contested terms (δοῦλος), Translation philosophy
    #1'
