id: MAT.10.25
reference: Matthew 10:25
source:
  edition: SBLGNT
  text: ἀρκετὸν τῷ μαθητῇ ἵνα γένηται ὡς ὁ διδάσκαλος αὐτοῦ, καὶ ὁ δοῦλος ὡς ὁ κύριος
    αὐτοῦ. εἰ τὸν οἰκοδεσπότην Βεελζεβοὺλ ⸀ἐπεκάλεσαν, πόσῳ μᾶλλον τοὺς οἰκιακοὺς
    αὐτοῦ.
translation:
  text: It is enough for the disciple that he become like his teacher, and the slave
    like his master. If they called the master of the house Beelzebul, how much more
    those of his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Beelzebub,' a familiar variant form in English tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρκετὸν
  chosen: It is enough
  alternatives:
  - It is sufficient
  lexicon: BDAG
  rationale: Predicate adjective used idiomatically to express sufficiency; 'It is
    enough' is natural modern English and preserves the force without paraphrase.
- source_word: μαθητῇ
  chosen: the disciple
  alternatives:
  - the student
  lexicon: BDAG
  rationale: '''Disciple'' preserves the relational and apprenticeship sense prominent
    in the Gospel context better than the more academic ''student''.'
- source_word: ἵνα γένηται
  chosen: that he become
  alternatives:
  - to become
  - that he may become
  lexicon: BDAG
  rationale: The ἵνα + subjunctive construction here expresses result/purpose in an
    idiomatic way after ἀρκετόν; 'that he become' keeps the formal structure while
    remaining readable.
- source_word: διδάσκαλος
  chosen: teacher
  alternatives:
  - master
  lexicon: BDAG
  rationale: In this pairing with μαθητής, 'teacher' is the clearest contextual equivalent
    and avoids confusion with κύριος later in the verse.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered context-dependently. Here the hierarchical
    contrast with κύριος highlights bonded subordination, so 'slave' better preserves
    the social relation than the softer 'servant'.
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although the default rendering of κύριος is 'Lord,' context here is a
    household/master-slave analogy rather than a direct christological title. 'Master'
    best matches the social sense and pairs naturally with 'slave.'
- source_word: οἰκοδεσπότην
  chosen: the master of the house
  alternatives:
  - the householder
  - the head of the house
  lexicon: BDAG
  rationale: The compound denotes the one who rules a household. 'Master of the house'
    preserves the authority nuance and links well with the following household imagery.
- source_word: Βεελζεβοὺλ
  chosen: Beelzebul
  alternatives:
  - Beelzebub
  lexicon: BDAG
  rationale: This follows the Greek form in the SBLGNT text. The more familiar 'Beelzebub'
    reflects a variant/traditional form and is worth preserving in a footnote.
- source_word: ἐπεκάλεσαν
  chosen: they called
  alternatives:
  - they named
  - they invoked against
  lexicon: BDAG
  rationale: In this context the verb means to address/designate someone by a name.
    'They called' is the most direct and idiomatic rendering.
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - how much more so
  lexicon: BDAG
  rationale: Standard comparative idiom expressing an a fortiori argument; 'how much
    more' is the natural English equivalent.
- source_word: οἰκιακοὺς
  chosen: those of his household
  alternatives:
  - his household members
  - his servants
  lexicon: BDAG
  rationale: The term refers broadly to members of a household, not only slaves. 'Those
    of his household' preserves the breadth and the connection to οἰκοδεσπότης.
