id: MAT.10.20
reference: Matthew 10:20
source:
  edition: SBLGNT
  text: οὐ γὰρ ὑμεῖς ἐστε οἱ λαλοῦντες ἀλλὰ τὸ πνεῦμα τοῦ πατρὸς ὑμῶν τὸ λαλοῦν ἐν
    ὑμῖν.
translation:
  text: For it is not you who are speaking, but the Spirit of your Father speaking
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through you.' The Greek says 'in you,' which may also imply speech expressed
      through the disciples.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For it is not
  alternatives:
  - for not
  - because not
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this statement to the prior assurance;
    'For it is not' is natural English that preserves both the explanation and the
    negation.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic in Greek. English captures the emphasis
    adequately with the clause structure 'it is not you who...' without needing an
    added reflexive.
- source_word: ἐστε οἱ λαλοῦντες
  chosen: are speaking
  alternatives:
  - are the ones speaking
  - are the speakers
  lexicon: BDAG
  rationale: The periphrastic construction with the article and present participle
    emphasizes the identity of the speakers. 'Are speaking' in the relative clause
    'you who are speaking' preserves the ongoing verbal action in idiomatic English.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Strong contrast is intended. 'But' is the most natural English adversative
    here; 'rather' is possible but slightly more interpretive.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In context this refers to the divine Spirit, not a human disposition
    or impersonal breath. Capitalizing 'Spirit' reflects the referent in English without
    adding content beyond the context.
- source_word: τοῦ πατρὸς ὑμῶν
  chosen: of your Father
  alternatives:
  - of your heavenly Father
  - of your father
  lexicon: BDAG
  rationale: The genitive identifies the Spirit in relation to the disciples' Father.
    'Your Father' preserves the direct wording; 'heavenly' is not present in this
    verse and should not be imported.
- source_word: τὸ λαλοῦν
  chosen: speaking
  alternatives:
  - who speaks
  - that is speaking
  lexicon: BDAG
  rationale: The present participle again conveys ongoing action. 'Speaking' keeps
    the participial force and yields smooth English in apposition to 'the Spirit of
    your Father.'
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - through you
  lexicon: BDAG
  rationale: The preposition ἐν most directly means 'in.' In this context it can imply
    agency expressed through the disciples, but the text says 'in you,' and that wording
    preserves the theological tension without over-resolving it.
