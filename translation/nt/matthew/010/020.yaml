theological_decisions:
- issue: Whether ἐν ὑμῖν should be rendered as indwelling ('in you') or instrumental
    agency ('through you')
  chosen_reading: in you
  alternative_readings:
  - through you
  rationale: The Greek preposition is ἐν, whose plain sense is 'in.' Because the context
    concerns inspired speech, English readers may infer 'through you,' but rendering
    it that way would resolve an ambiguity the Greek leaves open. Following the translation
    philosophy, the main text preserves the more direct wording and the alternative
    is noted in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
