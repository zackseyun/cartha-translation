id: MAT.10.22
reference: Matthew 10:22
source:
  edition: SBLGNT
  text: καὶ ἔσεσθε μισούμενοι ὑπὸ πάντων διὰ τὸ ὄνομά μου· ὁ δὲ ὑπομείνας εἰς τέλος
    οὗτος σωθήσεται.
translation:
  text: And you will be hated by all because of my name. But the one who endures to
    the end will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my name's sake.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who perseveres to the end.'
    reason: lexical_alternative
  - marker: c
    text: '''Will be saved'' may also be understood as ''will be delivered'' or ''rescued,''
      depending on how one construes the context.'
    reason: alternative_reading
  - marker: d
    text: Or 'the one who endures to the end, this one will be saved'.
    reason: previous_rendering
lexical_decisions:
- source_word: μισούμενοι
  chosen: be hated
  alternatives:
  - be hated continually
  - be detested
  lexicon: BDAG
  rationale: 'The periphrastic future (ἔσεσθε + participle) conveys a future state:
    ''you will be hated.'' ''Hated'' is the natural modern English equivalent for
    μισέω here.'
- source_word: ὑπὸ πάντων
  chosen: by everyone
  alternatives:
  - by all
  - by all people
  lexicon: BDAG
  rationale: πάντων is a masculine plural genitive after ὑπό in a passive construction,
    indicating personal agents. 'Everyone' is idiomatic English and preserves the
    comprehensive force without wooden literalism.
- source_word: διὰ τὸ ὄνομά μου
  chosen: because of my name
  alternatives:
  - for my name's sake
  - on account of my name
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or cause. 'Because of my name'
    is clear modern English and preserves the biblical sense that Jesus' 'name' stands
    for his person, authority, and allegiance to him.
- source_word: ὁ δὲ ὑπομείνας
  chosen: the one who endures
  alternatives:
  - the one who remains steadfast
  - the one who perseveres
  lexicon: BDAG
  rationale: 'The articular aorist participle functions substantivally: ''the one
    who has endured/endures.'' ''Endures'' best captures ὑπομένω in persecution contexts
    without importing later theological terminology, though ''perseveres'' is a viable
    interpretive alternative.'
- source_word: εἰς τέλος
  chosen: to the end
  alternatives:
  - until the end
  lexicon: BDAG
  rationale: This phrase denotes endurance up to the endpoint. 'To the end' is concise
    and idiomatic; 'until the end' is also possible and nearly equivalent.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - that person
  - he
  lexicon: BDAG
  rationale: οὗτος is emphatic after the participial phrase. Rendering it as 'this
    one' preserves the emphasis present in the Greek, though it is slightly more formal
    than standard English.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  - will be rescued
  lexicon: BDAG
  rationale: σῴζω can mean save, rescue, or deliver depending on context. In Matthew,
    especially in eschatological and discipleship contexts, 'will be saved' best preserves
    the theological breadth of final deliverance without narrowing it merely to temporal
    rescue.
