  category: awkward_english
  tier: 1
  from: the one who endures to the end, this one will be saved
  to: the one who endures to the end will be saved
  rationale: The Greek pronoun οὗτος is resumptive and emphatic after the long participial
    subject. While translating it as 'this one' attempts to preserve this emphasis,
    the resulting English phrase is slightly stilted. A more natural rendering is
    to have the subject ('the one who endures...') flow directly into the verb ('will
    be saved'). This is the approach taken by most major English translations (e.g.,
    ESV, NIV, NRSVUE) and better fits an optimal-equivalence philosophy by prioritizing
    target language naturalness when the source structure creates awkwardness without
    adding significant meaning.
