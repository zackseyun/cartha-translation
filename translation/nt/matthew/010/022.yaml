theological_decisions:
- issue: Meaning of final salvation in relation to endurance
  chosen_reading: Retain the broad wording 'will be saved' without specifying whether
    the emphasis is temporal deliverance, eschatological salvation, or perseverance
    doctrine.
  alternative_readings:
  - will be delivered physically
  - will receive final eschatological salvation
  - the verse teaches a specific doctrinal model of perseverance
  rationale: The verse links endurance under persecution with salvation, but the translation
    should preserve the text's theological tension rather than resolve later doctrinal
    debates. 'Will be saved' allows the Matthean context to speak without importing
    a denominational framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
