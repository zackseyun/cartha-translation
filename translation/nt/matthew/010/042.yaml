theological_decisions:
- issue: Referent and force of 'little ones'
  chosen_reading: Rendered as 'little ones' without restricting the phrase to children;
    it refers broadly to lowly or seemingly insignificant disciples/Jesus' people
    in context.
  alternative_readings:
  - literal children
  - new or weak believers only
  rationale: The immediate context concerns receiving disciples and acting toward
    them because of their association with Jesus. The translation preserves the broader
    expression rather than narrowing it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of εἰς ὄνομα μαθητοῦ
  chosen_reading: Rendered idiomatically as 'because he is a disciple.'
  alternative_readings:
  - in the name of a disciple
  - in the name of the disciple
  rationale: The phrase concerns acting on the basis of the person's identity as a
    disciple. The idiomatic rendering avoids importing sacramental or formulaic overtones
    not required by the text, while a more formal alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
