id: MAT.10.42
reference: Matthew 10:42
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἂν ποτίσῃ ἕνα τῶν μικρῶν τούτων ποτήριον ψυχροῦ μόνον εἰς ὄνομα μαθητοῦ,
    ἀμὴν λέγω ὑμῖν, οὐ μὴ ἀπολέσῃ τὸν μισθὸν αὐτοῦ.
translation:
  text: And whoever gives one of these little ones even a cup of cold water only because
    he is a disciple, truly I say to you, he will certainly not lose his reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'in the name of a disciple.' The Greek phrase indicates
      that the act is done because of the recipient's identity as a disciple.
    reason: alternative_reading
  - marker: b
    text: '''Little ones'' here likely refers to those of low status among Jesus''
      followers, not necessarily only to children.'
    reason: cross_reference
lexical_decisions:
- source_word: ὃς ἂν
  chosen: whoever
  alternatives:
  - if anyone
  - whoever may
  lexicon: BDAG
  rationale: The relative pronoun with ἄν gives an indefinite/generalizing sense.
    'Whoever' is natural modern English and preserves the open, general condition.
- source_word: ποτίσῃ
  chosen: gives
  alternatives:
  - gives to drink
  - causes to drink
  lexicon: BDAG
  rationale: Although the verb literally means 'give to drink,' idiomatic English
    in this context is 'gives ... a cup of cold water.' This preserves the act of
    providing refreshment without awkwardness.
- source_word: ἕνα τῶν μικρῶν τούτων
  chosen: one of these little ones
  alternatives:
  - one of these small ones
  - one of these insignificant ones
  lexicon: BDAG
  rationale: μικρῶν here refers to those regarded as lowly or of little status, not
    merely physically small. 'Little ones' is the established and contextually fitting
    expression, preserving both humility and vulnerability.
- source_word: ποτήριον ψυχροῦ
  chosen: a cup of cold water
  alternatives:
  - a cup of cool water
  lexicon: BDAG
  rationale: The genitive ψυχροῦ is naturally understood with an implied noun 'water.'
    'Cold water' is the standard idiomatic rendering and reflects the minimal, ordinary
    nature of the gift.
- source_word: μόνον
  chosen: even
  alternatives:
  - only
  - merely
  lexicon: BDAG
  rationale: μόνον modifies the smallness/minimality of the gift. Rendering it as
    'even' in English communicates that the act may be as slight as a single cup of
    cold water. The sense of 'only/merely' is preserved semantically, though not woodenly.
- source_word: εἰς ὄνομα μαθητοῦ
  chosen: because he is a disciple
  alternatives:
  - in the name of a disciple
  - on account of the name of a disciple
  - as a disciple
  lexicon: BDAG
  rationale: 'The phrase indicates the basis or reason for the act: the recipient
    is identified with discipleship. ''Because he is a disciple'' communicates the
    idiomatic force clearly in modern English. A more formal ''in the name of a disciple''
    is possible but less transparent in contemporary usage.'
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: truly I say to you
  alternatives:
  - amen, I say to you
  - truly I tell you
  lexicon: BDAG
  rationale: This formula introduces a solemn, authoritative declaration. 'Truly I
    say to you' preserves the weight of ἀμήν while remaining readable. 'Amen' could
    be retained more formally, but 'truly' better communicates function for modern
    readers.
- source_word: οὐ μὴ ἀπολέσῃ
  chosen: will certainly not lose
  alternatives:
  - will by no means lose
  - shall surely not lose
  lexicon: BDAG
  rationale: The οὐ μὴ construction is emphatically negative. 'Will certainly not
    lose' conveys the strong assurance in natural English without archaic phrasing.
- source_word: μισθὸν αὐτοῦ
  chosen: his reward
  alternatives:
  - his wages
  - his recompense
  lexicon: BDAG
  rationale: μισθός can denote pay, recompense, or reward. In this discipleship context,
    'reward' is the most natural and theologically appropriate English rendering.
