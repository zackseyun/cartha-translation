theological_decisions:
- issue: Rendering ψυχή in a discipleship paradox
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse concerns preserving or surrendering one's life in allegiance
    to Jesus, not primarily distinguishing body from soul. Rendering ψυχή as 'life'
    preserves the theological tension of self-preservation versus self-loss for Jesus'
    sake. The alternative 'soul' is worth preserving because of traditional English
    familiarity and possible broader semantic range.
  doctrine_reference: Translation philosophy §§3, 4, 5
