id: MAT.10.39
reference: Matthew 10:39
source:
  edition: SBLGNT
  text: ὁ εὑρὼν τὴν ψυχὴν αὐτοῦ ἀπολέσει αὐτήν, καὶ ὁ ἀπολέσας τὴν ψυχὴν αὐτοῦ ἕνεκεν
    ἐμοῦ εὑρήσει αὐτήν.
translation:
  text: The one who finds his life will lose it, and the one who loses his life for
    my sake will find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' in both clauses; Greek ψυχή can mean 'life' or 'soul,' but here
      'life' best fits the context of losing and finding one's life in discipleship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εὑρὼν
  chosen: The one who finds
  alternatives:
  - Whoever finds
  - He who finds
  lexicon: BDAG
  rationale: The article with aorist participle functions substantivally, referring
    to a representative person. 'The one who' is natural modern English and preserves
    the generic singular force without unnecessary archaism.
- source_word: ψυχὴν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this context of preserving or forfeiting oneself in discipleship,
    ψυχή carries the sense of one's life rather than an abstract immaterial soul.
    'Life' best fits the paradox and the surrounding context in Matthew 10.
- source_word: ἀπολέσει
  chosen: will lose
  alternatives:
  - will destroy
  - will forfeit
  lexicon: BDAG
  rationale: Future of ἀπόλλυμι here expresses loss rather than annihilation. 'Will
    lose' preserves the verbal contrast with 'find' and matches the paradoxical saying
    structure.
- source_word: ὁ ἀπολέσας
  chosen: the one who loses
  alternatives:
  - the one who has lost
  - whoever loses
  lexicon: BDAG
  rationale: 'Although the participle is aorist, English idiom in this proverbial
    construction is best rendered with a present-like generic sense, coordinated with
    the future main verb: ''the one who loses ... will find.'' This preserves the
    gnomic force.'
- source_word: ἕνεκεν ἐμοῦ
  chosen: for my sake
  alternatives:
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: ἕνεκεν with the genitive denotes cause or motive. 'For my sake' is idiomatic,
    concise, and preserves the personal allegiance to Jesus emphasized in the saying.
- source_word: εὑρήσει
  chosen: will find
  alternatives:
  - will gain
  lexicon: BDAG
  rationale: Using 'find' keeps the deliberate verbal correspondence with εὑρὼν earlier
    in the verse. 'Gain' is interpretive and weakens the rhetorical symmetry.
- source_word: αὐτοῦ / αὐτήν
  chosen: his / it
  alternatives:
  - their / it
  - his / her
  lexicon: Greek grammar
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral. 'His
    life ... it' preserves the singular generic construction.
