theological_decisions:
- issue: Rendering of δοῦλος in a non-soteriological analogy
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: 'The verse uses a social-status analogy: disciple/teacher and slave/master.
    Because the bonded nature of δοῦλος is salient in contrast with κύριος, ''slave''
    best preserves the force of the comparison, while alternatives are preserved in
    a footnote.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1 and #5'
- issue: Rendering of κύριος in a non-divine, household context
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The doctrine default for κύριος is 'Lord,' but contextual variance is
    permitted when documented. Here κύριος refers to a human superior in the slave/master
    pair, not a divine title, so 'master' is the clearest contextual rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy #5'
