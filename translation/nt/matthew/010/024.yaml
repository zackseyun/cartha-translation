id: MAT.10.24
reference: Matthew 10:24
source:
  edition: SBLGNT
  text: Οὐκ ἔστιν μαθητὴς ὑπὲρ τὸν διδάσκαλον οὐδὲ δοῦλος ὑπὲρ τὸν κύριον αὐτοῦ.
translation:
  text: A disciple is not above the teacher, nor a slave above his master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλος); the Greek term can denote either, depending
      on context.
    reason: alternative_reading
  - marker: b
    text: Or 'Lord' for 'master' (κύριος), though here it refers to a human superior
      in the analogy.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητὴς
  chosen: disciple
  alternatives:
  - student
  lexicon: BDAG
  rationale: '''Disciple'' preserves the relational and apprenticeship sense of μαθητής
    in the Gospel context better than the more academic ''student.'''
- source_word: ὑπὲρ
  chosen: above
  alternatives:
  - greater than
  - beyond
  lexicon: BDAG
  rationale: With the accusative here, ὑπέρ expresses superiority or status over another.
    'Above' is concise and idiomatic in English, matching the comparative sense without
    overinterpreting.
- source_word: διδάσκαλον
  chosen: teacher
  alternatives:
  - master
  - instructor
  lexicon: BDAG
  rationale: '''Teacher'' is the plain sense of διδάσκαλος and fits modern readable
    English. ''Master'' would risk confusion with the following κύριος/δοῦλος pair.'
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος may be rendered 'servant' or 'slave'
    contextually. Here the contrast with κύριος highlights status and ownership/subordination,
    so 'slave' better preserves the bonded relationship.
- source_word: κύριον
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' in the contested terms table, in this
    immediate social analogy paired with δοῦλος and modified by 'his,' 'master' best
    conveys the human household relationship intended by the saying. This is a contextual,
    non-christological use.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - its own
  lexicon: BDAG
  rationale: The genitive pronoun refers back to the slave's master. 'His' is the
    natural English rendering and preserves the masculine singular form of the Greek.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: '''Nor'' smoothly links the second negative comparison to the first in
    idiomatic English.'
