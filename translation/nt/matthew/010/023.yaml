theological_decisions:
- issue: Meaning of 'the Son of Man comes' in this context
  chosen_reading: Retain the literal 'until the Son of Man comes' without specifying
    whether this refers to the resurrection, judgment on Jerusalem, or the final parousia.
  alternative_readings:
  - until the Son of Man comes in judgment on Jerusalem
  - until the Son of Man comes in resurrection/vindication
  - until the Son of Man comes at the final return
  rationale: The phrase is interpretively contested, and the Greek itself does not
    resolve which referent is intended here. Per doctrine, the translation preserves
    the theological tension rather than importing a specific eschatological scheme
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
