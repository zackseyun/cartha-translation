id: MAT.10.23
reference: Matthew 10:23
source:
  edition: SBLGNT
  text: ὅταν δὲ διώκωσιν ὑμᾶς ἐν τῇ πόλει ταύτῃ, φεύγετε εἰς τὴν ⸀ἑτέραν· ἀμὴν γὰρ
    λέγω ὑμῖν, οὐ μὴ τελέσητε τὰς πόλεις ⸀τοῦ Ἰσραὴλ ἕως ⸀ἂν ἔλθῃ ὁ υἱὸς τοῦ ἀνθρώπου.
translation:
  text: But whenever they persecute you in this city, flee to the next one. For truly
    I say to you, you will certainly not finish going through the cities of Israel
    until the Son of Man comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flee to another city.' The Greek literally says 'to the other/another
      [one],' with 'city' understood from the previous clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will certainly not finish the cities of Israel.' The translation
      'finish going through' makes explicit the implied missionary traversal.
    reason: lexical_alternative
  - marker: c
    text: '''Until the Son of Man comes'' is left intentionally open. Interpreters
      differ whether it refers to Jesus'' vindication, a coming in judgment, or his
      final return.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: Introduces an indefinite temporal clause with repeated or potential force;
    'whenever' better reflects the open-ended sense than a simple 'when'.
- source_word: διώκωσιν
  chosen: they persecute
  alternatives:
  - they pursue
  - they harass
  lexicon: BDAG
  rationale: In this missionary-discourse context the verb denotes hostile persecution,
    not mere pursuit.
- source_word: πόλει ταύτῃ
  chosen: this city
  alternatives:
  - that city
  lexicon: BDAG
  rationale: The demonstrative is proximal; 'this city' preserves the directness of
    Jesus' instruction.
- source_word: φεύγετε
  chosen: flee
  alternatives:
  - escape
  - run away
  lexicon: BDAG
  rationale: Imperative of urgent departure in the face of persecution; 'flee' is
    concise and appropriately forceful.
- source_word: εἰς τὴν ἑτέραν
  chosen: to the next one
  alternatives:
  - to another
  - to the other one
  lexicon: BDAG
  rationale: With πόλις implied from the prior clause, the sense is movement to another
    city. 'The next one' reads naturally in English while preserving the implied noun
    and sequential missionary setting.
- source_word: ἀμὴν
  chosen: truly
  alternatives:
  - amen
  - truly, truly
  lexicon: BDAG
  rationale: Formula introducing a solemn authoritative saying. In the Synoptics a
    single ἀμήν is well rendered 'truly' in accessible modern English.
- source_word: οὐ μὴ τελέσητε
  chosen: you will certainly not finish going through
  alternatives:
  - you will by no means finish
  - you will certainly not complete
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is emphatic negation. τελέω here means
    to complete or finish. 'Going through' is supplied in English to make explicit
    the implied activity with 'the cities of Israel' in context of itinerant mission.
- source_word: τὰς πόλεις τοῦ Ἰσραήλ
  chosen: the cities of Israel
  alternatives:
  - Israel's cities
  lexicon: BDAG
  rationale: A straightforward genitival expression referring to the cities within
    Israel/the people of Israel in the mission context.
- source_word: ἕως ἂν ἔλθῃ
  chosen: until ... comes
  alternatives:
  - before ... comes
  lexicon: BDAG
  rationale: Standard temporal construction with subjunctive indicating a future point
    up to which the negated action remains incomplete.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established translation of the self-designation, preserving both the
    literal wording and its Danielic/theological resonance.
