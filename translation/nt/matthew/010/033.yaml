id: MAT.10.33
reference: Matthew 10:33
source:
  edition: SBLGNT
  text: ὅστις ⸂δ’ ἂν⸃ ἀρνήσηταί με ἔμπροσθεν τῶν ἀνθρώπων, ἀρνήσομαι ⸂κἀγὼ αὐτὸν⸃
    ἔμπροσθεν τοῦ πατρός μου τοῦ ⸀ἐν οὐρανοῖς.
translation:
  text: But whoever denies me before men, I also will deny him before my Father who
    is in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before people.' The Greek says 'before men,' using a masculine plural
      with generic force.
    reason: lexical_alternative
  - marker: b
    text: Literally 'who is in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - whoever it is who
  - anyone who
  lexicon: BDAG
  rationale: Indefinite relative introducing a general condition; 'whoever' is natural
    English and preserves the universal scope.
- source_word: δ’ ἂν
  chosen: But
  alternatives:
  - and whoever
  - now whoever
  lexicon: BDAG
  rationale: δέ marks contrast with the previous verse, while ἄν with the subjunctive
    contributes the generalizing force already carried in English by 'whoever.' 'But'
    best preserves the adversative connection.
- source_word: ἀρνήσηταί
  chosen: denies
  alternatives:
  - disowns
  - renounces
  lexicon: BDAG
  rationale: ἀρνέομαι means to deny or repudiate. 'Denies' is the most direct and
    standard rendering here, matching the judicial/public sense in context.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward first-person pronoun.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  - in front of men
  - before human beings
  lexicon: BDAG
  rationale: ἔμπροσθεν means 'before/in the presence of.' ἀνθρώπων is grammatically
    masculine plural but generic in force. Per doctrine, gender-accurate rendering
    is preferred; 'men' preserves the source form and representative sense. Inclusivity-related
    alternative is preserved in a footnote.
- source_word: ἀρνήσομαι
  chosen: will deny
  alternatives:
  - will disown
  lexicon: BDAG
  rationale: Future middle of the same verb as earlier in the verse; rendering it
    consistently as 'deny' preserves the verbal parallel and rhetorical force.
- source_word: κἀγὼ αὐτὸν
  chosen: I also will deny him
  alternatives:
  - I too will deny him
  - I myself also will deny him
  lexicon: BDAG
  rationale: κἀγώ adds emphatic correspondence ('I also/I too'). 'I also will deny
    him' preserves the reciprocal structure with good English flow.
- source_word: τοῦ πατρός μου
  chosen: my Father
  lexicon: BDAG
  rationale: Standard filial designation used by Jesus; no expansion is warranted.
- source_word: τοῦ ἐν οὐρανοῖς
  chosen: who is in heaven
  alternatives:
  - who is in the heavens
  lexicon: BDAG
  rationale: The Greek uses a plural form 'in the heavens,' but idiomatic English
    normally uses singular 'in heaven.' This preserves meaning without awkwardness;
    the more literal alternative is worth noting in a footnote.
