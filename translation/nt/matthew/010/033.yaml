theological_decisions:
- issue: Gender-accurate rendering of ἀνθρώπων and αὐτόν
  chosen_reading: before men ... deny him
  alternative_readings:
  - before people ... deny that person
  rationale: The Greek uses masculine forms with generic/reference force. Per doctrine,
    gender-accurate renderings are preferred over flattening to gender-neutral English
    unless context demands otherwise. Here 'men' and 'him' preserve the source's grammatical
    shape and representative force.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Reciprocal denial language
  chosen_reading: denies me ... I also will deny him
  alternative_readings:
  - disowns me ... I also will disown him
  rationale: The verse presents a solemn reciprocal correspondence. Using the same
    English verb for both instances of ἀρνέομαι preserves the theological and rhetorical
    symmetry without importing interpretive nuance beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
