id: MAT.10.10
reference: Matthew 10:10
source:
  edition: SBLGNT
  text: μὴ πήραν εἰς ὁδὸν μηδὲ δύο χιτῶνας μηδὲ ὑποδήματα μηδὲ ⸀ῥάβδον· ἄξιος γὰρ
    ὁ ἐργάτης τῆς τροφῆς ⸀αὐτοῦ.
translation:
  text: do not take a traveler's bag for the road, or two tunics, or sandals, or a
    staff; for the worker is worthy of his food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some understand 'or a staff' as forbidding an extra staff, especially in
      light of Mark 6:8, which permits taking a staff.
    reason: alternative_reading
lexical_decisions:
- source_word: πήραν
  chosen: a traveler's bag
  alternatives:
  - a bag
  - a knapsack
  lexicon: BDAG
  rationale: πήρα refers to a bag carried on a journey, especially for provisions.
    'Traveler's bag' makes the travel context explicit and avoids the overly generic
    'bag' while remaining natural English.
- source_word: εἰς ὁδὸν
  chosen: for the road
  alternatives:
  - for the journey
  - on the road
  lexicon: BDAG
  rationale: The phrase idiomatically indicates what is taken along for travel. 'For
    the road' is concise, natural, and preserves the travel sense without over-paraphrasing.
- source_word: δύο χιτῶνας
  chosen: two tunics
  alternatives:
  - two shirts
  - two garments
  lexicon: BDAG
  rationale: χιτών denotes the basic inner garment/tunic. 'Tunics' is more historically
    precise than 'shirts' and less vague than 'garments'.
- source_word: ὑποδήματα
  chosen: sandals
  alternatives:
  - shoes
  - footwear
  lexicon: BDAG
  rationale: ὑπόδημα denotes what is bound under the foot; in this setting 'sandals'
    best fits first-century footwear and standard usage.
- source_word: ῥάβδον
  chosen: a staff
  alternatives:
  - a walking stick
  - a rod
  lexicon: BDAG
  rationale: ῥάβδος here most naturally refers to a traveler's staff. 'Staff' is concise
    and idiomatic. Because Mark 6:8 appears to permit a staff, the rendering remains
    literal here and the inter-Gospel difference is preserved rather than harmonized.
- source_word: ἄξιος
  chosen: is worthy
  alternatives:
  - deserves
  lexicon: BDAG
  rationale: ἄξιος carries the sense of being worthy or deserving. 'Is worthy' preserves
    the evaluative nuance and echoes common biblical idiom.
- source_word: ὁ ἐργάτης
  chosen: the worker
  alternatives:
  - the laborer
  lexicon: BDAG
  rationale: ἐργάτης means one who works or labors. 'Worker' is clear modern English
    and fits the missionary context without importing technical ecclesial language.
- source_word: τῆς τροφῆς αὐτοῦ
  chosen: of his food
  alternatives:
  - of his provisions
  - of his support
  lexicon: BDAG
  rationale: τροφή most directly means food/nourishment. 'Food' keeps the concrete
    sense of the Greek; broader renderings like 'support' are interpretive, though
    contextually related.
