theological_decisions:
- issue: Potential harmonization with parallel accounts regarding permitted travel
    equipment
  chosen_reading: Retain Matthew's prohibition 'or a staff' in the main text without
    harmonizing to Mark 6:8.
  alternative_readings:
  - Interpret as prohibiting an extra staff rather than any staff
  - Harmonize with Mark by rendering more loosely
  rationale: The Greek text plainly lists ῥάβδον among the prohibited items. Following
    original-language primacy and preserving textual tension, the translation keeps
    Matthew's wording and notes the parallel issue rather than resolving it in translation.
  doctrine_reference: Translation philosophy §§1, 3
