theological_decisions:
- issue: Meaning of 'worthy' in missionary instructions
  chosen_reading: '''Worthy'' refers to a suitable/receptive host, not to meriting
    salvation or spiritual superiority.'
  alternative_readings:
  - '''Worthy'' as morally deserving in a broader sense'
  rationale: In context, Jesus is instructing the disciples how to identify an appropriate
    household to receive them. The translation keeps the lexical term 'worthy' in
    the main text but understands it contextually as fitness to receive the messengers,
    avoiding doctrinal overstatement.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
