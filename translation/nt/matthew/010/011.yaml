id: MAT.10.11
reference: Matthew 10:11
source:
  edition: SBLGNT
  text: εἰς ἣν δ’ ἂν πόλιν ἢ κώμην εἰσέλθητε, ἐξετάσατε τίς ἐν αὐτῇ ἄξιός ἐστιν· κἀκεῖ
    μείνατε ἕως ἂν ἐξέλθητε.
translation:
  text: Into whatever city or village you enter, find out who in it is worthy, and
    stay there until you leave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inquire' or 'investigate' for who in it is worthy.
    reason: lexical_alternative
  - marker: b
    text: '''Worthy'' here likely means fit or receptive to receive the messengers,
      not someone who has earned God''s favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν
  chosen: Into whatever
  alternatives:
  - In whatever
  - Whichever ... into
  lexicon: BDAG
  rationale: The construction with εἰς + relative pronoun + ἄν introduces an indefinite
    relative clause referring to any place the disciples may enter. 'Into whatever'
    preserves the directional force of εἰς and the indefiniteness of ἄν in natural
    English.
- source_word: πόλιν ἢ κώμην
  chosen: city or village
  alternatives:
  - town or village
  lexicon: BDAG
  rationale: πόλις commonly denotes a city/town and κώμη a village. 'City or village'
    is the most straightforward pair and preserves the distinction between larger
    and smaller settlements.
- source_word: εἰσέλθητε
  chosen: you enter
  alternatives:
  - you go into
  - you come into
  lexicon: BDAG
  rationale: 'Aorist subjunctive in the indefinite relative clause is best rendered
    with simple present English in this instructional context: ''you enter.'' This
    is idiomatic and keeps the sense of entering a place.'
- source_word: ἐξετάσατε
  chosen: find out
  alternatives:
  - inquire
  - investigate
  - search out
  lexicon: BDAG
  rationale: The imperative calls for making careful inquiry. 'Find out' is clear
    modern English and fits the translation philosophy, while still conveying intentional
    investigation. 'Inquire' is possible but slightly less natural for many readers.
- source_word: τίς ἐν αὐτῇ
  chosen: who in it
  alternatives:
  - who there
  - who in that place
  lexicon: BDAG
  rationale: τίς asks for the identity of a person within the city or village. 'Who
    in it' closely follows the Greek structure and keeps the referent tied to the
    settlement just mentioned.
- source_word: ἄξιός ἐστιν
  chosen: is worthy
  alternatives:
  - is deserving
  - is suitable
  lexicon: BDAG
  rationale: ἄξιος here refers to someone fit or deserving to receive the messengers'
    presence and message. 'Worthy' is the standard and sufficiently transparent rendering,
    preserving the moral/evaluative nuance without overexplaining.
- source_word: κἀκεῖ
  chosen: there
  alternatives:
  - and there
  - in that place
  lexicon: BDAG
  rationale: κἀκεῖ combines καί + ἐκεῖ, literally 'and there/there also.' In English,
    the connective force is adequately carried by the clause structure, so 'there'
    is natural and not misleading.
- source_word: μείνατε
  chosen: stay
  alternatives:
  - remain
  - lodge
  lexicon: BDAG
  rationale: The imperative directs the disciples to continue in that host's place.
    'Stay' is natural modern English; 'remain' is more formal, and 'lodge' is too
    specific.
- source_word: ἕως ἂν ἐξέλθητε
  chosen: until you leave
  alternatives:
  - until you depart
  - until you go out
  lexicon: BDAG
  rationale: 'ἕως ἄν with subjunctive marks a future contingency: remain there up
    to the point of departure. ''Until you leave'' is idiomatic and preserves the
    temporal sense.'
