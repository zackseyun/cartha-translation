id: MAT.10.29
reference: Matthew 10:29
source:
  edition: SBLGNT
  text: οὐχὶ δύο στρουθία ἀσσαρίου πωλεῖται; καὶ ἓν ἐξ αὐτῶν οὐ πεσεῖται ἐπὶ τὴν γῆν
    ἄνευ τοῦ πατρὸς ὑμῶν.
translation:
  text: Are not two sparrows sold for an assarion? Yet not one of them will fall to
    the ground apart from your Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without your Father'; the phrase may imply not apart from his knowledge,
      care, or will, but the Greek does not specify which.
    reason: alternative_reading
  - marker: b
    text: An assarion was a small Roman copper coin of very low value.
    reason: cultural_note
lexical_decisions:
- source_word: στρουθία
  chosen: sparrows
  alternatives:
  - small birds
  lexicon: BDAG
  rationale: The noun commonly refers to sparrows in this context and in established
    usage for this saying. 'Small birds' is possible more generally, but 'sparrows'
    is the most natural and specific rendering here.
- source_word: ἀσσαρίου
  chosen: an assarion
  alternatives:
  - a penny
  - a copper coin
  lexicon: BDAG
  rationale: This is a specific small Roman coin. Retaining 'assarion' preserves the
    historical specificity of the source better than older or approximate English
    monetary equivalents. A cultural footnote can clarify value if needed.
- source_word: πωλεῖται
  chosen: are sold
  alternatives:
  - sell for
  lexicon: BDAG
  rationale: The present passive is naturally rendered in English as 'are sold.' This
    preserves the commercial sense without awkwardness.
- source_word: ἓν ἐξ αὐτῶν
  chosen: one of them
  alternatives:
  - one from among them
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the partitive expression.
- source_word: πεσεῖται ἐπὶ τὴν γῆν
  chosen: will fall to the ground
  alternatives:
  - will fall on the ground
  lexicon: BDAG
  rationale: This is the standard and natural English rendering of the future middle
    with ἐπί + accusative here. 'To the ground' is more idiomatic than 'on the ground'
    in this context.
- source_word: ἄνευ τοῦ πατρὸς ὑμῶν
  chosen: apart from your Father
  alternatives:
  - without your Father
  - without the knowledge of your Father
  - without the will of your Father
  lexicon: BDAG
  rationale: '''Apart from your Father'' closely reflects ἄνευ while preserving the
    text''s ambiguity. The phrase indicates that such an event does not occur independently
    of the Father''s relation to it, but the Greek itself does not specify whether
    that relation is permission, will, presence, or knowledge. Therefore more interpretive
    expansions are avoided in the main text.'
- source_word: οὐχὶ ... ;
  chosen: Are not ... ?
  alternatives:
  - Are ... not?
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer. 'Are not
    ... ?' captures the rhetorical force in natural English.
- source_word: καὶ
  chosen: Yet
  alternatives:
  - And
  - even
  lexicon: BDAG
  rationale: 'Here καί has an ascensive/adversative force in context: despite their
    low value, not even one falls apart from the Father. ''Yet'' brings out the discourse
    sense more clearly than a bare ''and.'''
