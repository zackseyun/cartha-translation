theological_decisions:
- issue: Meaning of 'apart from your Father' in relation to divine providence
  chosen_reading: The translation preserves the phrase's ambiguity as 'apart from
    your Father' rather than specifying 'without the knowledge/will of your Father.'
  alternative_readings:
  - without your Father's knowledge
  - without your Father's will
  rationale: The verse clearly teaches God's providential involvement, but the Greek
    phrase ἄνευ τοῦ πατρὸς ὑμῶν does not explicitly define the mode of that involvement.
    To avoid importing a narrower doctrinal claim than the text states, the translation
    keeps the broader wording and preserves interpretive alternatives in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
