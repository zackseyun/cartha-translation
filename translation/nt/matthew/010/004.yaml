theological_decisions:
- issue: Whether to render παραδοὺς with the more neutral 'handed over' or the contextually
    charged 'betrayed'
  chosen_reading: betrayed
  alternative_readings:
  - handed over
  rationale: The verse identifies Judas in the apostolic list by the act for which
    he is known in the Gospel narrative. In this context, English 'betrayed' best
    captures the relational and moral force without adding doctrine beyond the narrative.
    Because the Greek verb can be broader, the alternative is preserved in a footnote
    to maintain transparency and theological restraint.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
