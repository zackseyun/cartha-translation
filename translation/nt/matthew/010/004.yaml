id: MAT.10.4
reference: Matthew 10:4
source:
  edition: SBLGNT
  text: Σίμων ὁ ⸀Καναναῖος καὶ Ἰούδας ⸀ὁ Ἰσκαριώτης ὁ καὶ παραδοὺς αὐτόν.
translation:
  text: Simon the Cananaean, and Judas Iscariot, who also betrayed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Simon the Zealot.' The Greek here reads 'Cananaean,' likely reflecting
      an Aramaic/Hebrew designation traditionally understood as 'Zealot.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who also handed him over.' The Greek verb can mean 'hand over,' though
      in Judas's case 'betrayed' fits the narrative context.
    reason: alternative_reading
lexical_decisions:
- source_word: Καναναῖος
  chosen: Cananaean
  alternatives:
  - Zealot
  lexicon: BDAG
  rationale: Rendered by transliteration rather than interpretation because the Greek
    form here is Καναναῖος, reflecting an Aramaic/Hebrew-derived designation rather
    than the ordinary Greek term ζηλωτής. This preserves the source wording and avoids
    importing the interpretive gloss 'Zealot' into Matthew's list, while preserving
    that common understanding in a footnote.
- source_word: Ἰσκαριώτης
  chosen: Iscariot
  lexicon: BDAG
  rationale: Standard transliteration of the personal epithet/name. As a proper designation,
    it is transliterated rather than translated, in keeping with the philosophy of
    transliterating names.
- source_word: παραδοὺς
  chosen: betrayed
  alternatives:
  - handed over
  lexicon: BDAG
  rationale: Although παραδίδωμι can mean 'hand over' in a broad sense, in the Judas
    context the sense is specifically treacherous delivery of Jesus to his enemies.
    'Betrayed' communicates the contextual force in natural English. The more formal
    alternative 'handed over' is preserved in a footnote because the Greek verb itself
    is broader than the English betrayal-language.
- source_word: ὁ καὶ παραδοὺς αὐτόν
  chosen: who also betrayed him
  alternatives:
  - the one who also handed him over
  lexicon: BDAG
  rationale: The article with participle functions attributively, identifying Judas
    by a subsequent action. English relative clause style is the most natural equivalent.
    'Also' is retained because καί is present and marks this identifying note.
