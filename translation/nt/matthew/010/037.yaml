theological_decisions:
- issue: Potential misunderstanding of Jesus' demand in relation to family loyalty
  chosen_reading: The verse is rendered as requiring supreme allegiance to Jesus over
    even closest family ties, without implying a denial of the goodness of family
    love itself.
  alternative_readings:
  - A softer paraphrase such as 'does not love me as much as'
  - An interpretive expansion suggesting hatred of family
  rationale: The Greek states a comparative priority ('more than me') and a verdict
    of unworthiness. The translation preserves the stark demand of discipleship without
    importing the stronger language found in other passages or weakening the claim
    into mere preference language detached from worthiness.
  doctrine_reference: Translation philosophy §§1, 3, 6
