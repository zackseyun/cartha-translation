id: MAT.10.37
reference: Matthew 10:37
source:
  edition: SBLGNT
  text: ὁ φιλῶν πατέρα ἢ μητέρα ὑπὲρ ἐμὲ οὐκ ἔστιν μου ἄξιος· καὶ ὁ φιλῶν υἱὸν ἢ θυγατέρα
    ὑπὲρ ἐμὲ οὐκ ἔστιν μου ἄξιος·
translation:
  text: The one who loves father or mother more than me is not worthy of me, and the
    one who loves son or daughter more than me is not worthy of me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above me.' The Greek phrase ὑπὲρ ἐμέ expresses loving someone in preference
      to Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ φιλῶν
  chosen: the one who loves
  alternatives:
  - whoever loves
  - he who loves
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by this action. 'The one who loves' is natural modern
    English and preserves the generic singular force without unnecessary archaic style.
- source_word: πατέρα ἢ μητέρα
  chosen: father or mother
  alternatives:
  - his father or mother
  - a father or mother
  lexicon: BDAG
  rationale: Anarthrous direct objects are rendered simply as relational nouns. Adding
    'his' would slightly over-specify what is implicit rather than explicit in Greek.
- source_word: ὑπὲρ ἐμέ
  chosen: more than me
  alternatives:
  - above me
  - over me
  lexicon: BDAG
  rationale: In this comparative context, ὑπέρ conveys preference or greater regard.
    'More than me' is the clearest idiomatic English equivalent and matches the sense
    of loving someone in preference to Jesus.
- source_word: οὐκ ἔστιν μου ἄξιος
  chosen: is not worthy of me
  alternatives:
  - is not worthy to belong to me
  - is not fit for me
  lexicon: BDAG
  rationale: This preserves the genitive μου with ἄξιος in a straightforward way.
    'Worthy of me' is traditional but still clear, and avoids importing interpretive
    expansions such as belonging or fitness beyond the text.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: Simple coordination best reflects the repeated parallel structure of
    the verse.
- source_word: υἱὸν ἢ θυγατέρα
  chosen: son or daughter
  alternatives:
  - a son or daughter
  lexicon: BDAG
  rationale: As with 'father or mother,' the relational nouns are best rendered directly
    and naturally without adding possessive pronouns not present in the Greek.
- source_word: μου
  chosen: of me
  alternatives:
  - to me
  - for me
  lexicon: BDAG
  rationale: The genitive after ἄξιος is most directly represented by 'of me.' While
    English can sometimes prefer 'worthy of me' or 'worthy to be mine,' the former
    is closest without over-interpretation.
