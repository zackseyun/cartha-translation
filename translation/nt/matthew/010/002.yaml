theological_decisions:
- issue: Meaning of πρῶτος with Simon/Peter
  chosen_reading: Rendered as sequential 'first' in the list without making an explicit
    doctrinal claim about primacy of authority.
  alternative_readings:
  - '''first'' as implying prominence or leadership among the twelve'
  rationale: The Greek term can indicate first in sequence and may also suggest prominence,
    but the verse itself presents a list of names. To preserve theological tension
    and avoid importing denominational conclusions, the main text keeps the simple
    lexical value 'first,' while a footnote preserves the possible nuance of prominence.
  doctrine_reference: Translation philosophy §3; Affirmations (non-sectarian within
    ecumenical orthodoxy)
