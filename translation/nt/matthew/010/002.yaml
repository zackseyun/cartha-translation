id: MAT.10.2
reference: Matthew 10:2
source:
  edition: SBLGNT
  text: τῶν δὲ δώδεκα ἀποστόλων τὰ ὀνόματά ἐστιν ταῦτα· πρῶτος Σίμων ὁ λεγόμενος Πέτρος
    καὶ Ἀνδρέας ὁ ἀδελφὸς ⸀αὐτοῦ, Ἰάκωβος ὁ τοῦ Ζεβεδαίου καὶ Ἰωάννης ὁ ἀδελφὸς αὐτοῦ,
translation:
  text: 'Now these are the names of the twelve apostles: first, Simon who is called
    Peter, and Andrew his brother; James the son of Zebedee, and John his brother,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'first' may imply prominence among the twelve, not merely first in sequence.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ here marks a mild transition to the naming of the twelve. 'Now' gives
    natural English discourse flow without overstating sequence.
- source_word: δώδεκα ἀποστόλων
  chosen: the twelve apostles
  alternatives:
  - the twelve emissaries
  - the twelve messengers
  lexicon: BDAG
  rationale: ἀπόστολος is conventionally and accurately rendered 'apostle' in this
    Gospel context, referring to the recognized group commissioned by Jesus. 'Emissaries'
    is possible semantically but less idiomatic and less identifiable in context.
- source_word: τὰ ὀνόματά ἐστιν ταῦτα
  chosen: these are the names
  alternatives:
  - their names are these
  - the names are these
  lexicon: BDAG
  rationale: This preserves the demonstrative structure while using natural modern
    English. The possessive 'their' is implied by context but not required in English.
- source_word: πρῶτος
  chosen: first
  alternatives:
  - the first
  lexicon: BDAG
  rationale: πρῶτος can be rendered simply 'first' in a list. The term marks sequence
    in enumeration; this verse alone does not require importing a stronger rank nuance
    into the translation.
- source_word: ὁ λεγόμενος
  chosen: who is called
  alternatives:
  - called
  - who was called
  lexicon: BDAG
  rationale: The participial expression identifies Simon by the name Peter. 'Who is
    called' is slightly more formal and transparent to the Greek than the compressed
    'called'.
- source_word: Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ὁ ἀδελφὸς αὐτοῦ
  chosen: his brother
  alternatives:
  - the brother of him
  lexicon: BDAG
  rationale: ἀδελφός here denotes literal familial brotherhood. English idiom requires
    the possessive construction 'his brother.' In the first instance, αὐτοῦ refers
    to Simon; in the second, to James.
- source_word: ὁ τοῦ Ζεβεδαίου
  chosen: the son of Zebedee
  alternatives:
  - the one of Zebedee
  lexicon: BDAG
  rationale: 'This genitival identifier is idiomatically rendered in English as filiation:
    ''the son of Zebedee.'' This makes explicit what the Greek construction implies.'
