theological_decisions:
- issue: Relative value of humans and sparrows in Jesus' teaching
  chosen_reading: you are worth more than many sparrows
  alternative_readings:
  - you are more valuable than many sparrows
  rationale: The verse teaches God's greater care for Jesus' disciples in comparison
    with sparrows, without implying denial of God's care for animals. 'Worth more'
    preserves the comparative force of διαφέρετε in context and remains readable modern
    English.
  doctrine_reference: Translation philosophy §§3, 6
