id: MAT.10.31
reference: Matthew 10:31
source:
  edition: SBLGNT
  text: μὴ οὖν ⸀φοβεῖσθε· πολλῶν στρουθίων διαφέρετε ὑμεῖς.
translation:
  text: Therefore, do not be afraid; you are worth more than many sparrows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are more valuable than many sparrows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν
  chosen: Therefore, do not
  alternatives:
  - So do not
  - Then do not
  lexicon: BDAG
  rationale: μὴ with the present imperative φοβεῖσθε gives a prohibition, and οὖν
    marks inference from the preceding argument about the Father's care. 'Therefore'
    preserves the logical connection clearly in modern English.
- source_word: φοβεῖσθε
  chosen: be afraid
  alternatives:
  - fear
  - be fearful
  lexicon: BDAG
  rationale: The middle/passive imperative of φοβέομαι is idiomatically rendered 'be
    afraid' in English. This is more natural than the bare verb 'fear' here while
    preserving the command not to fear.
- source_word: πολλῶν στρουθίων
  chosen: many sparrows
  alternatives:
  - many small birds
  lexicon: BDAG
  rationale: 'στρουθίον in this context refers to sparrows, matching the immediate
    context of 10:29. The genitive with πολλῶν is comparative after διαφέρετε: ''more
    than many sparrows.'''
- source_word: διαφέρετε
  chosen: are worth more than
  alternatives:
  - are more valuable than
  - excel
  - differ from
  lexicon: BDAG
  rationale: In this context διαφέρω carries the sense of surpassing in value or importance,
    not merely being different. 'Are worth more than' expresses the comparative valuation
    naturally and fits the surrounding teaching on God's care.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: 'The explicit pronoun adds emphasis: ''you'' in contrast to sparrows.
    English can convey this adequately without an overly heavy reflexive expression,
    since the sentence structure already places emphasis on the disciples'' value.'
