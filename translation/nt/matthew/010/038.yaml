theological_decisions:
- issue: Discipleship saying about taking up the cross
  chosen_reading: Retain the concrete image 'take up his cross' as a call to costly
    allegiance and willingness for suffering/shame in following Jesus.
  alternative_readings:
  - Render more interpretively as 'accept suffering' or 'embrace self-denial'
  rationale: The verse uses the concrete image of the cross, and the translation should
    not flatten it into an abstract paraphrase. The metaphor carries both historical
    and theological weight in Matthew's presentation of discipleship.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Generic masculine pronoun αὐτοῦ
  chosen_reading: Render as 'his' rather than a gender-neutral substitute.
  alternative_readings:
  - their
  - one's own
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing,
    while the generic sense may be clarified in a footnote if useful.
  doctrine_reference: Translation philosophy §4
