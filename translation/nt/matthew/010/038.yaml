id: MAT.10.38
reference: Matthew 10:38
source:
  edition: SBLGNT
  text: καὶ ὃς οὐ λαμβάνει τὸν σταυρὸν αὐτοῦ καὶ ἀκολουθεῖ ὀπίσω μου, οὐκ ἔστιν μου
    ἄξιος.
translation:
  text: And whoever does not take up his cross and follow after me is not worthy of
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek ''his cross'' uses a grammatically masculine singular form in a generic
      sense: that is, each disciple must take up his own cross.'
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'follow me.' The Greek more explicitly says 'follow after me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: whoever
  alternatives:
  - the one who
  - he who
  lexicon: BDAG
  rationale: Indefinite/generic relative sense is best conveyed by 'whoever' in natural
    modern English while preserving the conditional force.
- source_word: λαμβάνει
  chosen: take up
  alternatives:
  - take
  - receive
  lexicon: BDAG
  rationale: With σταυρόν in this discipleship context, 'take up' is the established
    and contextually precise sense, expressing willing acceptance rather than mere
    physical taking or receiving.
- source_word: σταυρὸν
  chosen: cross
  alternatives:
  - execution stake
  lexicon: BDAG
  rationale: '''Cross'' is the standard and most intelligible rendering of σταυρός
    in the Gospel passion/disciple context. Although the underlying instrument was
    a Roman execution device, ''cross'' best preserves both lexical continuity and
    theological resonance without over-specification.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's own
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular, matching the representative
    generic construction. Per doctrine, gender-accurate rendering is preferred; 'his'
    preserves the source form while functioning generically in context.
- source_word: ἀκολουθεῖ ὀπίσω μου
  chosen: follow after me
  alternatives:
  - follow me
  - come after me
  lexicon: BDAG
  rationale: The combination of ἀκολουθέω with ὀπίσω explicitly includes the sense
    of following behind. 'Follow after me' preserves that nuance more fully than the
    simpler 'follow me,' while remaining natural English.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - fit
  - deserving
  lexicon: BDAG
  rationale: '''Worthy'' is the most direct and idiomatic rendering in this relational
    evaluative statement and preserves the solemn force of discipleship qualification.'
- source_word: μου ἄξιος
  chosen: worthy of me
  alternatives:
  - fit for me
  - worthy to belong to me
  lexicon: BDAG
  rationale: The genitive with ἄξιος is naturally rendered 'worthy of me.' This avoids
    paraphrastic expansion while preserving the personal allegiance implied by the
    Greek.
