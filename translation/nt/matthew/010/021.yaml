theological_decisions:
- issue: Gendered and representative family terms
  chosen_reading: Retain 'brother' for ἀδελφός and 'children/parents' for the broader
    terms
  alternative_readings:
  - Render ἀδελφός generically as 'sibling'
  rationale: The verse contrasts specific family relationships. Because ἀδελφός is
    grammatically and semantically male here, 'brother' best matches the source, while
    τέκνα and γονεῖς are rendered with inclusive terms appropriate to their lexical
    scope.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
