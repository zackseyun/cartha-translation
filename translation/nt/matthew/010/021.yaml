id: MAT.10.21
reference: Matthew 10:21
source:
  edition: SBLGNT
  text: παραδώσει δὲ ἀδελφὸς ἀδελφὸν εἰς θάνατον καὶ πατὴρ τέκνον, καὶ ἐπαναστήσονται
    τέκνα ἐπὶ γονεῖς καὶ θανατώσουσιν αὐτούς.
translation:
  text: And brother will hand over brother to death, and a father his child, and children
    will rise up against parents and put them to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will deliver up'; the verb can also carry the sense 'betray' in contexts
      of treachery.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδώσει
  chosen: will hand over
  alternatives:
  - will deliver up
  - will betray
  lexicon: BDAG
  rationale: Future active of παραδίδωμι here denotes giving a person over to hostile
    authorities or to death. 'Hand over' is natural modern English and preserves the
    concrete force without over-specifying 'betray,' since the object is familial
    surrender resulting in death.
- source_word: ἀδελφὸς ... ἀδελφὸν
  chosen: brother ... brother
  alternatives:
  - one brother ... another
  - a brother ... his brother
  lexicon: BDAG
  rationale: The singular nouns naturally yield a representative singular in English.
    'Brother ... brother' preserves the familial and gender-specific force of ἀδελφός,
    in keeping with the gender-accurate policy.
- source_word: εἰς θάνατον
  chosen: to death
  alternatives:
  - for death
  lexicon: BDAG
  rationale: 'The prepositional phrase expresses result or end: being handed over
    so as to die. ''To death'' is the standard concise English equivalent.'
- source_word: πατὴρ τέκνον
  chosen: a father his child
  alternatives:
  - father child
  - a father his son/offspring
  lexicon: BDAG
  rationale: τέκνον is broader than 'son' and means 'child.' Supplying 'his' makes
    idiomatic English while preserving the singular representative construction.
- source_word: ἐπαναστήσονται
  chosen: will rise up against
  alternatives:
  - will rebel against
  - will turn against
  lexicon: BDAG
  rationale: The future middle of ἐπανίσταμαι means to rise up against or oppose.
    'Rise up against' preserves the vividness and hostility of the Greek without importing
    a narrower political sense.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  - offspring
  lexicon: BDAG
  rationale: τέκνα is inclusive and not specifically male. 'Children' is the most
    accurate and natural rendering.
- source_word: ἐπὶ γονεῖς
  chosen: against parents
  alternatives:
  - against their parents
  lexicon: BDAG
  rationale: With verbs of hostility, ἐπί plus accusative carries the sense 'against.'
    'Parents' accurately renders the plural γονεῖς.
- source_word: θανατώσουσιν
  chosen: put ... to death
  alternatives:
  - kill
  - cause ... to be executed
  lexicon: BDAG
  rationale: θανατόω means to cause death, often in judicial or deliberate contexts.
    'Put to death' preserves the gravity and possible formal sense better than the
    flatter 'kill'.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - their parents
  lexicon: BDAG
  rationale: The pronoun most immediately refers to γονεῖς ('parents'). The English
    pronoun keeps the Greek flow; the antecedent is clear enough from context.
