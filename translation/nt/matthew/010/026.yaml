theological_decisions:
- issue: Scope of the proverbial saying about hidden things being revealed
  chosen_reading: A general assurance that opponents' concealed actions and the truth
    about Jesus' disciples will ultimately be exposed.
  alternative_readings:
  - A specific reference only to the disciples' message being publicly proclaimed
  - An eschatological judgment saying exclusively about final judgment
  rationale: The verse itself states a broad principle without restricting the scope.
    The translation preserves that breadth and does not narrow it to one doctrinal
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
