id: MAT.10.26
reference: Matthew 10:26
source:
  edition: SBLGNT
  text: Μὴ οὖν φοβηθῆτε αὐτούς· οὐδὲν γάρ ἐστιν κεκαλυμμένον ὃ οὐκ ἀποκαλυφθήσεται,
    καὶ κρυπτὸν ὃ οὐ γνωσθήσεται.
translation:
  text: Therefore, do not fear them, for nothing is covered that will not be revealed,
    and hidden that will not be made known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concealed' for 'covered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'secret' for 'hidden.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will not become known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ οὖν φοβηθῆτε
  chosen: Therefore, do not fear
  alternatives:
  - So do not fear
  - Therefore, do not be afraid of
  lexicon: BDAG
  rationale: μή with the aorist passive subjunctive φοβηθῆτε functions as a prohibition.
    'Do not fear' is concise and natural; 'therefore' preserves οὖν as an inferential
    link to the preceding context.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - those men
  - those people
  lexicon: BDAG
  rationale: The pronoun is accusative plural masculine, referring to the opponents/persecutors
    in context. English 'them' is the natural equivalent without over-specifying.
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - nothing at all
  - not anything
  lexicon: BDAG
  rationale: Neuter singular used substantivally; 'nothing' best matches the absolute
    scope of the statement.
- source_word: κεκαλυμμένον
  chosen: covered
  alternatives:
  - concealed
  - veiled
  - hidden
  lexicon: BDAG
  rationale: Perfect passive participle of καλύπτω denotes something having been covered/concealed.
    'Covered' preserves the imagery and pairs well with the following 'revealed.'
    'Hidden' was avoided here because κρυπτόν appears in the next clause.
- source_word: ἀποκαλυφθήσεται
  chosen: will be revealed
  alternatives:
  - will be uncovered
  - will be disclosed
  lexicon: BDAG
  rationale: Future passive of ἀποκαλύπτω. 'Will be revealed' is the standard and
    clearest rendering, preserving the passive and the semantic contrast with 'covered.'
- source_word: κρυπτὸν
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: BDAG
  rationale: Adjective meaning hidden/secret. 'Hidden' is the most direct lexical
    counterpart and avoids implying only verbal secrecy.
- source_word: γνωσθήσεται
  chosen: will not be made known
  alternatives:
  - will not become known
  - will not be known
  lexicon: BDAG
  rationale: Future passive of γινώσκω. 'Will be made known' preserves the passive
    force more clearly than 'will become known' and gives a good parallel to 'will
    be revealed.'
- source_word: ὃ οὐκ ... / ὃ οὐ ...
  chosen: that will not ... / that will not ...
  alternatives:
  - which will not ... / which will not ...
  lexicon: BDAG
  rationale: 'The relative clauses express an emphatic universal principle: there
    is nothing covered/hidden that will remain so. ''That'' is idiomatic in modern
    English.'
