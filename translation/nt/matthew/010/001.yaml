theological_decisions:
- issue: Nature of the disciples' commission
  chosen_reading: Jesus gave the twelve delegated authority over unclean spirits,
    expressed as authority to cast them out and to heal.
  alternative_readings:
  - Jesus gave them power rather than authority
  rationale: The verse emphasizes ἐξουσία, which is best understood as delegated authority
    from Jesus, not merely impersonal power. This preserves the text's Christological
    implication without adding doctrinal claims beyond the wording.
  doctrine_reference: Translation philosophy §1, §3
