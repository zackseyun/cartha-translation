id: MAT.10.1
reference: Matthew 10:1
source:
  edition: SBLGNT
  text: Καὶ προσκαλεσάμενος τοὺς δώδεκα μαθητὰς αὐτοῦ ἔδωκεν αὐτοῖς ἐξουσίαν πνευμάτων
    ἀκαθάρτων ὥστε ἐκβάλλειν αὐτὰ καὶ θεραπεύειν πᾶσαν νόσον καὶ πᾶσαν μαλακίαν.
translation:
  text: And after calling his twelve disciples to himself, he gave them authority
    over unclean spirits, so as to cast them out and to heal every disease and every
    sickness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having called his twelve disciples to himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'power over unclean spirits'; Greek exousia often carries the sense of
      delegated authority.
    reason: lexical_alternative
  - marker: c
    text: The pair 'every disease and every sickness' reflects two related Greek terms
      (nosos and malakia), also rendered 'every disease and every infirmity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: after calling ... to himself
  alternatives:
  - having called
  - calling to himself
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι, with the middle voice naturally
    conveying summoning to oneself. 'After calling ... to himself' makes the participial
    action and reflexive nuance clear in natural English.
- source_word: τοὺς δώδεκα μαθητὰς αὐτοῦ
  chosen: his twelve disciples
  alternatives:
  - the twelve disciples of him
  - his twelve learners
  lexicon: BDAG
  rationale: μαθητής is regularly 'disciple' in Gospel contexts. The possessive αὐτοῦ
    is naturally rendered with 'his.' The article with δώδεκα is idiomatic in Greek
    and does not require 'the' before 'his' in English.
- source_word: ἔδωκεν
  chosen: he gave
  alternatives:
  - he granted
  - he bestowed
  lexicon: BDAG
  rationale: δίδωμι is straightforwardly 'give.' 'Granted' is possible but slightly
    more interpretive; 'gave' preserves the simple verbal force.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or the right to act, not
    merely raw power. 'Authority' best fits the context of Jesus commissioning the
    disciples.
- source_word: πνευμάτων ἀκαθάρτων
  chosen: over unclean spirits
  alternatives:
  - over impure spirits
  - authority concerning unclean spirits
  lexicon: BDAG
  rationale: The genitive after ἐξουσία is most naturally rendered in English with
    'over,' expressing authority exercised over these spirits. 'Unclean spirits' is
    the standard and contextually precise Gospel expression.
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: With the infinitives ἐκβάλλειν and θεραπεύειν, ὥστε here expresses intended/resulting
    purpose in a way well captured by 'so as to.' This avoids over-specifying either
    pure purpose or pure result.
- source_word: ἐκβάλλειν
  chosen: to cast them out
  alternatives:
  - to drive them out
  - to expel them
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts is conventionally and accurately rendered
    'cast out.' The pronoun αὐτά refers back to the unclean spirits.
- source_word: θεραπεύειν
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: θεραπεύω in this context refers to healing the sick. 'Heal' is the most
    natural and biblically familiar rendering.
- source_word: πᾶσαν νόσον
  chosen: every disease
  alternatives:
  - every illness
  lexicon: BDAG
  rationale: νόσος often denotes disease or illness. 'Disease' pairs well with the
    following μαλακία to preserve some lexical distinction.
- source_word: πᾶσαν μαλακίαν
  chosen: every sickness
  alternatives:
  - every weakness
  - every infirmity
  lexicon: BDAG
  rationale: μαλακία can denote weakness, sickness, or infirmity. Rendering it as
    'sickness' alongside νόσος as 'disease' preserves the two-term expression without
    collapsing them into a single English word.
