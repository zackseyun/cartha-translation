theological_decisions:
- issue: Metonymic address to the house versus explicit reference to its inhabitants
  chosen_reading: Retain the metonymic 'greet it' in the main text
  alternative_readings:
  - greet the household
  - greet those in it
  rationale: The Greek explicitly says to greet the house (αὐτήν referring to οἰκίαν).
    Preserving this wording respects original-language primacy and avoids importing
    an interpretive expansion into the main text. Since the intended social referent
    is likely the occupants, that clarification is preserved in a footnote rather
    than resolved in translation.
  doctrine_reference: Translation philosophy §§1, 3, 5
