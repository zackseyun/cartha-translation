id: MAT.10.12
reference: Matthew 10:12
source:
  edition: SBLGNT
  text: εἰσερχόμενοι δὲ εἰς τὴν οἰκίαν ἀσπάσασθε αὐτήν·
translation:
  text: As you enter the house, greet it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greet the household'—the Greek says 'greet it,' referring to the house,
      likely as a metonymy for those living in it.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχόμενοι
  chosen: As you enter
  alternatives:
  - when you enter
  - entering
  lexicon: BDAG
  rationale: Present participle nominative plural functioning adverbially with the
    imperative; rendered as a temporal participial clause in natural English. 'As
    you enter' preserves the action's contemporaneous sense without awkward literalism.
- source_word: δὲ
  chosen: As
  alternatives:
  - and
  - now
  - but
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. In English the connection is adequately carried
    by the participial construction, so it is not separately translated as a strong
    adversative. Its discourse function is absorbed into 'As you enter' for readable
    modern English.
- source_word: οἰκίαν
  chosen: the house
  alternatives:
  - the household
  - the home
  lexicon: BDAG
  rationale: οἰκία can denote either the physical house or the household. Here, in
    the immediate context of entering and offering greeting, 'house' best matches
    the concrete setting while still allowing the metonymic extension to those within.
- source_word: ἀσπάσασθε
  chosen: greet
  alternatives:
  - give greeting to
  - salute
  lexicon: BDAG
  rationale: Aorist middle imperative, second plural, giving a direct instruction.
    'Greet' is the clearest contemporary equivalent; 'salute' is too formal/archaic,
    and 'give greeting to' is unnecessarily wooden.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - the household
  - them
  lexicon: BDAG
  rationale: Feminine singular pronoun agrees with οἰκίαν. The Greek addresses the
    house metonymically, so 'it' is the most direct grammatical rendering. Because
    English readers may infer the inhabitants are intended, that nuance is preserved
    in a footnote rather than changing the main text to 'them.'
