id: MAT.10.34
reference: Matthew 10:34
source:
  edition: SBLGNT
  text: Μὴ νομίσητε ὅτι ἦλθον βαλεῖν εἰρήνην ἐπὶ τὴν γῆν· οὐκ ἦλθον βαλεῖν εἰρήνην
    ἀλλὰ μάχαιραν.
translation:
  text: Do not think that I came to bring peace on the earth; I did not come to bring
    peace, but a sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have come' instead of 'I came.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'a sword'; in context this image points to division rather
      than commending violence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ νομίσητε
  chosen: Do not think
  alternatives:
  - Do not suppose
  - Do not imagine
  lexicon: BDAG
  rationale: Aorist subjunctive with μή functions as a prohibition. 'Do not think'
    is natural, direct English and preserves the force without overinterpreting the
    mental nuance.
- source_word: ἦλθον
  chosen: I came
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: The aorist is commonly rendered in English here as a simple past in idiomatic
    speech introducing mission or purpose. 'I came' is concise and natural; 'I have
    come' is possible but less direct in this context.
- source_word: βαλεῖν
  chosen: to bring
  alternatives:
  - to cast
  - to throw
  lexicon: BDAG
  rationale: Although βάλλω literally means 'throw/cast,' in this idiom with abstract
    and concrete objects ('peace' / 'a sword') and in mission language, 'bring' best
    communicates the intended result in clear English. A more literal 'cast' would
    sound archaic or misleading.
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering of εἰρήνη. No contextual reason here to expand to
    'peacefulness' or 'peace on earth' beyond the phrase already supplied by the prepositional
    expression.
- source_word: ἐπὶ τὴν γῆν
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  - on the land
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates extension over the earth. 'On
    the earth' is a transparent rendering. 'On earth' is idiomatic and possible, but
    the article is retained for slightly greater formal correspondence. 'Land' is
    possible for γῆ in some contexts, but the broader sense fits this saying.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Strong adversative contrast is adequately conveyed by 'but.' 'Rather'
    is possible but unnecessary.
- source_word: μάχαιραν
  chosen: a sword
  lexicon: BDAG
  rationale: μάχαιρα denotes a sword or short sword/knife. 'A sword' is the standard
    and most recognizable rendering. The image should be preserved rather than interpreted
    away as mere 'division,' especially since the following context explains the divisive
    effect.
