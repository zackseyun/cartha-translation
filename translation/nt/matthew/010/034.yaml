theological_decisions:
- issue: Whether Jesus' statement should be softened into a metaphorical paraphrase
    such as 'division' in the main text
  chosen_reading: Retain the concrete image 'a sword' in the main text
  alternative_readings:
  - division
  rationale: The Greek explicitly says μάχαιραν, 'sword.' While the saying is explained
    in the surrounding context as familial division, the translation should preserve
    the source image and not resolve the metaphor in the main text. This maintains
    theological tension and avoids interpretive paraphrase.
  doctrine_reference: Translation philosophy §3, §6
