theological_decisions:
- issue: Moral characterization in the animal similes
  chosen_reading: 'Render the exhortation as a balance of practical wisdom and moral
    innocence: ''wise as the snakes and innocent as the doves.'''
  alternative_readings:
  - '''shrewd as serpents and harmless as doves'''
  rationale: The verse juxtaposes vulnerability in mission with a dual ethical posture.
    The translation preserves the tension without making Jesus commend deceit or mere
    passivity. 'Wise' avoids over-reading φρόνιμοι as cunning, and 'innocent' preserves
    ἀκέραιοι as moral integrity rather than simple harmlessness.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
