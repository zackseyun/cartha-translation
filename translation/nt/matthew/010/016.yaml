id: MAT.10.16
reference: Matthew 10:16
source:
  edition: SBLGNT
  text: Ἰδοὺ ἐγὼ ἀποστέλλω ὑμᾶς ὡς πρόβατα ἐν μέσῳ λύκων· γίνεσθε οὖν φρόνιμοι ὡς
    οἱ ὄφεις καὶ ἀκέραιοι ὡς αἱ περιστεραί.
translation:
  text: Look, I am sending you out as sheep in the midst of wolves; therefore be wise
    as the snakes and innocent as the doves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'like sheep among wolves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'shrewd as serpents and harmless as doves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Introduces emphatic attention-getting discourse. 'Look' preserves the
    force in readable modern English better than the more archaic 'Behold.'
- source_word: ἀποστέλλω
  chosen: am sending ... out
  alternatives:
  - send
  - dispatch
  lexicon: BDAG
  rationale: Present tense with mission context; 'am sending ... out' captures the
    immediate commissioning sense and the directional force often conveyed in English
    by 'send out.'
- source_word: ὡς πρόβατα ἐν μέσῳ λύκων
  chosen: as sheep in the midst of wolves
  alternatives:
  - like sheep among wolves
  lexicon: BDAG
  rationale: Keeps the simile and the vivid prepositional phrase ἐν μέσῳ. 'In the
    midst of wolves' is slightly more formal and closer to the Greek than the idiomatic
    'among wolves.'
- source_word: γίνεσθε
  chosen: be
  alternatives:
  - become
  - prove yourselves to be
  lexicon: BDAG
  rationale: Present middle imperative calls for an ongoing manner of life. English
    imperative 'be' is the most natural rendering here, while still conveying the
    exhortation.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks inference from the danger just described. 'Therefore' preserves
    the logical connection more explicitly than 'so' or 'then.'
- source_word: φρόνιμοι
  chosen: wise
  alternatives:
  - shrewd
  - prudent
  lexicon: BDAG
  rationale: Conveys practical wisdom without importing a negative connotation. 'Shrewd'
    is possible in context of snakes, but in English can suggest manipulativeness
    more strongly than the Greek requires.
- source_word: ὄφεις
  chosen: snakes
  alternatives:
  - serpents
  lexicon: BDAG
  rationale: Refers to literal snakes in the comparison. 'Snakes' is clear modern
    English; 'serpents' is more traditional but less natural for the target register.
- source_word: ἀκέραιοι
  chosen: innocent
  alternatives:
  - harmless
  - pure
  - unmixed
  lexicon: BDAG
  rationale: In this ethical contrast, the term denotes moral purity or guilelessness.
    'Innocent' best balances clarity and ethical force; 'harmless' is traditional
    but can sound merely non-threatening rather than morally uncorrupted.
- source_word: περιστεραί
  chosen: doves
  alternatives:
  - pigeons
  lexicon: BDAG
  rationale: Standard rendering in biblical English for the bird associated with gentleness
    and purity in this simile.
