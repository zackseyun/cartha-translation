id: MAT.10.30
reference: Matthew 10:30
source:
  edition: SBLGNT
  text: ὑμῶν δὲ καὶ αἱ τρίχες τῆς κεφαλῆς πᾶσαι ἠριθμημέναι εἰσίν.
translation:
  text: But even the hairs of your head are all numbered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have been numbered.' The Greek perfect passive can emphasize a completed
      action with an ongoing result.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Second-person plural genitive possessive modifying 'head'; idiomatic
    English expresses this as 'your.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or continuation from the preceding reassurance;
    'But' best preserves the discourse turn in context.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: In this construction καὶ has an emphatic force ('even'), heightening
    the point that not merely larger matters but even individual hairs are known.
- source_word: αἱ τρίχες
  chosen: the hairs
  alternatives:
  - hairs
  lexicon: BDAG
  rationale: The article is naturally carried into English as 'the hairs' in this
    idiom, referring to the individual hairs collectively.
- source_word: τῆς κεφαλῆς
  chosen: of your head
  alternatives:
  - on your head
  - of the head
  lexicon: BDAG
  rationale: Genitive construction specifying which hairs are meant. English idiom
    commonly says 'the hairs of your head'; adding 'your' reflects the possessive
    relation already present with ὑμῶν.
- source_word: πᾶσαι
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: Predicate adjective emphasizing totality; 'all' is concise and natural
    while preserving the comprehensive force.
- source_word: ἠριθμημέναι εἰσίν
  chosen: are numbered
  alternatives:
  - have been numbered
  - are counted
  lexicon: BDAG
  rationale: Periphrastic perfect passive indicates a completed state with present
    result. 'Are numbered' is idiomatic English and preserves the stative sense; 'have
    been numbered' is possible but less natural here.
