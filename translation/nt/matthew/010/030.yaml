theological_decisions:
- issue: Extent of divine knowledge/care implied by the statement
  chosen_reading: Render the statement straightforwardly as comprehensive divine knowledge
    without expanding it into a doctrinal paraphrase about providence.
  alternative_readings:
  - A more interpretive rendering emphasizing God's care or providential control
  rationale: The verse itself states that the hairs are numbered; the translation
    should preserve that concrete image and let the theological implication arise
    from context rather than importing explanatory wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
