id: MAT.10.35
reference: Matthew 10:35
source:
  edition: SBLGNT
  text: ἦλθον γὰρ διχάσαι ἄνθρωπον κατὰ τοῦ πατρὸς αὐτοῦ καὶ θυγατέρα κατὰ τῆς μητρὸς
    αὐτῆς καὶ νύμφην κατὰ τῆς πενθερᾶς αὐτῆς,
translation:
  text: For I came to set a man against his father, and a daughter against her mother,
    and a daughter-in-law against her mother-in-law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to divide'; the Greek infinitive can be rendered more literally that
      way, but here the following repeated 'against' phrases make the sense of relational
      opposition explicit.
    reason: lexical_alternative
  - marker: b
    text: Greek νύμφη can mean 'bride' in some contexts; here it means 'daughter-in-law'
      because it is paired with 'mother-in-law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  chosen: I came
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: Aorist indicative of ἔρχομαι in this discourse naturally refers to Jesus'
    coming/mission. English simple past is the most straightforward rendering here,
    though some translations use the English present perfect idiomatically.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation for the preceding statement; 'For' preserves the connective
    force cleanly in English.
- source_word: διχάσαι
  chosen: to set ... against
  alternatives:
  - to divide
  - to separate
  lexicon: BDAG
  rationale: The infinitive means to divide or cause division. In this verse the following
    repeated κατά + genitive construction specifies relational opposition, so 'to
    set ... against' best captures the induced hostility rather than a merely abstract
    division.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: Although ἄνθρωπος can be generic, here it is paired with explicitly female
    counterparts ('daughter,' 'daughter-in-law') in a household triad, so the masculine
    singular is best rendered gender-accurately as 'a man' per translation philosophy.
- source_word: κατὰ τοῦ πατρὸς αὐτοῦ
  chosen: against his father
  alternatives:
  - in opposition to his father
  lexicon: BDAG
  rationale: κατά with the genitive commonly expresses opposition. 'Against his father'
    is idiomatic and preserves the adversative sense.
- source_word: θυγατέρα
  chosen: a daughter
  lexicon: BDAG
  rationale: Direct and natural rendering of the accusative singular noun.
- source_word: κατὰ τῆς μητρὸς αὐτῆς
  chosen: against her mother
  alternatives:
  - in opposition to her mother
  lexicon: BDAG
  rationale: Same adversative κατά construction as above; 'against' is the clearest
    English equivalent.
- source_word: νύμφην
  chosen: a daughter-in-law
  alternatives:
  - a bride
  lexicon: BDAG
  rationale: While νύμφη can mean 'bride' in some contexts, the pairing with πενθερά
    ('mother-in-law') requires the kinship sense 'daughter-in-law' here.
- source_word: κατὰ τῆς πενθερᾶς αὐτῆς
  chosen: against her mother-in-law
  alternatives:
  - in opposition to her mother-in-law
  lexicon: BDAG
  rationale: Maintains the repeated household-opposition pattern with natural English
    kinship terminology.
