theological_decisions:
- issue: Nature of Jesus' stated mission in context
  chosen_reading: Render the clause as describing the divisive social effect of Jesus'
    coming without implying that he delights in familial hostility as an ultimate
    good.
  alternative_readings:
  - A more wooden 'to divide' that leaves the relational force less explicit
  - A more interpretive paraphrase emphasizing persecution caused by allegiance to
    Jesus
  rationale: The Greek states that Jesus came 'to set/divide' family members against
    one another in the sense of conflict arising around him. The translation should
    preserve the starkness of the saying while not importing a broader theological
    explanation into the main text. 'To set ... against' keeps the conflict explicit
    and contextual.
  doctrine_reference: Preserve theological tension rather than resolve it.
