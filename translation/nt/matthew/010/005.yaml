id: MAT.10.5
reference: Matthew 10:5
source:
  edition: SBLGNT
  text: Τούτους τοὺς δώδεκα ἀπέστειλεν ὁ Ἰησοῦς παραγγείλας αὐτοῖς λέγων· Εἰς ὁδὸν
    ἐθνῶν μὴ ἀπέλθητε καὶ εἰς πόλιν Σαμαριτῶν μὴ εἰσέλθητε·
translation:
  text: Jesus sent out these twelve, instructing them, saying, “Do not go on the road
    to the Gentiles, and do not enter a town of the Samaritans.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the way of the Gentiles.” The Greek expression is more literally
      road/path language and likely refers to heading toward Gentile territory.
    reason: lexical_alternative
  - marker: b
    text: Or “a Samaritan town.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτους τοὺς δώδεκα
  chosen: these twelve
  alternatives:
  - these twelve disciples
  - these twelve men
  lexicon: BDAG
  rationale: The demonstrative plus article and numeral naturally identifies the group
    just named as 'these twelve.' 'Disciples' is implied by context but not present
    in the Greek, so it is not supplied in the main text.
- source_word: ἀπέστειλεν
  chosen: sent out
  alternatives:
  - sent
  - commissioned
  lexicon: BDAG
  rationale: ἀποστέλλω commonly means 'send' with a sense of dispatching on a mission.
    'Sent out' captures the missional nuance in natural English without overinterpreting
    as a formal 'commissioned.'
- source_word: παραγγείλας
  chosen: instructing
  alternatives:
  - commanding
  - giving orders to
  lexicon: BDAG
  rationale: The aorist participle indicates attendant action prior to the quoted
    speech. παραγγέλλω can be strong ('command'), but here 'instructing' fits readable
    modern English while preserving directive force, especially since the content
    itself is imperative.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle introduces the direct discourse. 'Saying' closely
    reflects the Greek structure and works smoothly in English after 'instructing
    them.'
- source_word: Εἰς ὁδὸν ἐθνῶν
  chosen: on the road to the Gentiles
  alternatives:
  - into the way of the Gentiles
  - on a Gentile road
  - toward the Gentiles
  lexicon: BDAG
  rationale: Literally 'into a road of Gentiles.' The idiom refers to setting out
    toward Gentile territory rather than merely stepping onto a physical road. 'On
    the road to the Gentiles' preserves the metaphorical-path language while making
    the destination sense clear.
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  - the pagans
  lexicon: BDAG
  rationale: In this Jewish mission context, ἔθνη refers to non-Jews. 'Gentiles' is
    the standard and clearest contextual rendering; 'nations' would be too broad and
    less precise here.
- source_word: μὴ ἀπέλθητε
  chosen: do not go
  alternatives:
  - do not depart
  - do not go away
  lexicon: BDAG
  rationale: The aorist subjunctive with μή functions as a prohibition. 'Do not go'
    is idiomatic and sufficient in English.
- source_word: εἰς πόλιν Σαμαριτῶν
  chosen: a town of the Samaritans
  alternatives:
  - a Samaritan town
  - a city of the Samaritans
  lexicon: BDAG
  rationale: πόλις can be 'city' or 'town'; here 'town' reads naturally and avoids
    overstating size. The genitive 'of the Samaritans' is retained rather than converting
    fully to the adjective 'Samaritan' in order to stay closer to the Greek wording.
- source_word: Σαμαριτῶν
  chosen: the Samaritans
  alternatives:
  - Samaritans
  lexicon: BDAG
  rationale: Refers to the ethnoreligious group known from the Gospels. The article
    is supplied in English idiom within the genitival phrase.
- source_word: μὴ εἰσέλθητε
  chosen: do not enter
  alternatives:
  - do not go into
  lexicon: BDAG
  rationale: The prohibition concerns entering such a town. 'Do not enter' is direct
    and natural.
