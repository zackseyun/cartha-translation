theological_decisions:
- issue: Scope and temporality of Jesus's prohibition regarding Gentiles and Samaritans
  chosen_reading: Render the instruction as a specific mission directive without implying
    a permanent exclusion of Gentiles or Samaritans from the gospel.
  alternative_readings:
  - A stronger wording that could suggest an absolute or enduring ban
  rationale: The verse records a historically situated instruction for this sending
    of the twelve. The translation should preserve the prohibition's force while not
    importing a theological claim that contradicts the broader Matthean narrative.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
