theological_decisions:
- issue: Symbolic judgment action toward those rejecting the disciples' message
  chosen_reading: Retain the concrete command 'shake off the dust from your feet'
    without paraphrasing its meaning in the main text.
  alternative_readings:
  - add interpretive wording such as 'as a testimony against them' from parallel contexts
  - render dynamically as 'leave them under judgment'
  rationale: This verse itself gives the symbolic act but not its explicit interpretation.
    To preserve theological tension and avoid importing wording from parallels, the
    translation keeps the concrete image in the main text and leaves interpretation
    to context or footnote.
  doctrine_reference: Translation philosophy items 1 and 3
