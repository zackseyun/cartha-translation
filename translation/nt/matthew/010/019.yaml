theological_decisions:
- issue: Implicit divine passive in δοθήσεται
  chosen_reading: Retain the passive 'will be given' without explicitly naming God
    or the Spirit in the main text.
  alternative_readings:
  - God will give you
  - the Spirit will give you
  rationale: The Greek uses a passive construction and does not explicitly identify
    the giver in this verse. The immediate context clarifies divine agency in the
    following verse, so the translation should preserve the text's own restraint rather
    than import the fuller explanation here.
  doctrine_reference: Preserve theological tension rather than resolve it.
