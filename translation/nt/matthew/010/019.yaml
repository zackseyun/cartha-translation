id: MAT.10.19
reference: Matthew 10:19
source:
  edition: SBLGNT
  text: ὅταν δὲ ⸀παραδῶσιν ὑμᾶς, μὴ μεριμνήσητε πῶς ἢ τί λαλήσητε· δοθήσεται γὰρ ὑμῖν
    ἐν ἐκείνῃ τῇ ὥρᾳ τί ⸀λαλήσητε·
translation:
  text: But when they hand you over, do not worry about how or what you should speak,
    for what you should speak will be given to you in that hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be anxious about how you are to speak or what you are to say.'
    reason: lexical_alternative
  - marker: b
    text: The passive 'will be given' leaves the giver implicit here; the next verse
      identifies the Spirit as the one speaking through them.
    reason: cross_reference
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - Whenever
  lexicon: BDAG
  rationale: ὅταν introduces an indefinite future contingency ('when/whenever'), and
    δέ is a mild connective best represented here as 'But' to mark transition from
    the previous warning.
- source_word: παραδῶσιν
  chosen: hand ... over
  alternatives:
  - deliver ... over
  - betray
  lexicon: BDAG
  rationale: παραδίδωμι commonly means 'hand over/deliver up.' 'Hand ... over' is
    idiomatic modern English and preserves the hostile judicial sense in context without
    over-specifying 'betray.'
- source_word: μὴ μεριμνήσητε
  chosen: do not worry
  alternatives:
  - do not be anxious
  - do not be concerned
  lexicon: BDAG
  rationale: μεριμνάω here forbids anxious concern about impending testimony. 'Do
    not worry' is clear modern English; 'be anxious' is possible but slightly less
    natural in this context.
- source_word: πῶς ἢ τί
  chosen: how or what
  alternatives:
  - how and what
  lexicon: BDAG
  rationale: 'The paired interrogatives distinguish manner/content: not to worry about
    the way of speaking or the substance of what is said. ''Or'' follows the Greek
    conjunction ἤ.'
- source_word: λαλήσητε
  chosen: you should speak
  alternatives:
  - you will speak
  - you are to say
  lexicon: BDAG
  rationale: The aorist subjunctive after indirect question and in this context is
    well conveyed by English modal phrasing, 'you should speak,' expressing contemplated
    speech rather than simple future.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - shall be given
  lexicon: BDAG
  rationale: Future passive of δίδωμι; the passive leaves the giver implicit, fitting
    the reverent style of the text while avoiding unnecessary expansion.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: in that hour
  alternatives:
  - at that time
  - in that moment
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the immediacy of divine provision
    at the needed time. 'In that hour' is natural enough in English and echoes biblical
    style without sounding archaic.
- source_word: τί λαλήσητε
  chosen: what you should speak
  alternatives:
  - what you should say
  - what to speak
  lexicon: BDAG
  rationale: Repeats the earlier wording for consistency with λαλέω. 'Speak' preserves
    the verbal link in Greek, though 'say' is a viable smoother English alternative.
