id: MAT.10.6
reference: Matthew 10:6
source:
  edition: SBLGNT
  text: πορεύεσθε δὲ μᾶλλον πρὸς τὰ πρόβατα τὰ ἀπολωλότα οἴκου Ἰσραήλ.
translation:
  text: but go instead to the lost sheep of the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rather, go to the sheep that have been lost from the house of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορεύεσθε
  chosen: go
  alternatives:
  - travel
  - proceed
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural, functioning
    as a command. 'Go' is the most natural imperative in English and fits the missionary
    instruction context without unnecessary stiffness.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks contrast here with the preceding prohibition about going to
    Gentiles or Samaritans. 'But' best conveys the adversative force in context.
- source_word: μᾶλλον
  chosen: instead
  alternatives:
  - rather
  - preferably
  lexicon: BDAG
  rationale: In combination with δέ, μᾶλλον redirects the disciples from one destination
    to another. 'Instead' communicates the contrast and redirection more idiomatically
    than the more literal 'rather.'
- source_word: πρὸς
  chosen: to
  alternatives:
  - toward
  lexicon: BDAG
  rationale: With a verb of motion, πρός naturally indicates direction toward a destination.
    'To' is idiomatic English here.
- source_word: τὰ πρόβατα
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: BDAG
  rationale: The phrase is metaphorical but should remain transparent. 'Sheep' preserves
    the biblical image; 'flock' would soften the individual metaphor and is less literal.
- source_word: τὰ ἀπολωλότα
  chosen: lost
  alternatives:
  - perished
  - ruined
  - straying
  lexicon: BDAG
  rationale: Perfect active participle of ἀπόλλυμι used adjectivally. In this pastoral
    metaphor, 'lost' is the established and contextually apt sense, conveying those
    who have gone astray rather than physical destruction.
- source_word: οἴκου Ἰσραήλ
  chosen: of the house of Israel
  alternatives:
  - of Israel's house
  - of the people of Israel
  lexicon: BDAG
  rationale: A genitive construction with strong biblical resonance. 'House of Israel'
    preserves the covenantal and corporate sense better than a paraphrase like 'people
    of Israel.'
