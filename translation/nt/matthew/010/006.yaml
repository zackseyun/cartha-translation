theological_decisions:
- issue: Metaphorical description of Israel
  chosen_reading: Retain 'the lost sheep of the house of Israel' as a metaphor for
    Israel rather than paraphrasing it as 'the Israelites who have gone astray.'
  alternative_readings:
  - the Israelites who have gone astray
  rationale: The metaphor is explicit in the Greek and carries intertextual weight
    from the Hebrew Scriptures and prophetic imagery. Preserving it maintains theological
    and literary continuity without adding interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
