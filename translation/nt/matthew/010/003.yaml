id: MAT.10.3
reference: Matthew 10:3
source:
  edition: SBLGNT
  text: Φίλιππος καὶ Βαρθολομαῖος, Θωμᾶς καὶ Μαθθαῖος ὁ τελώνης, Ἰάκωβος ὁ τοῦ Ἁλφαίου
    καὶ ⸀Θαδδαῖος,
translation:
  text: Philip and Bartholomew, Thomas and Matthew the tax collector, James the son
    of Alphaeus and Thaddaeus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “Lebbaeus” (or “Lebbaeus called Thaddaeus”), and Luke’s
      apostolic lists name “Judas son of James” in the corresponding place.
    reason: textual_variant
lexical_decisions:
- source_word: Φίλιππος
  chosen: Philip
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: Βαρθολομαῖος
  chosen: Bartholomew
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Θωμᾶς
  chosen: Thomas
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Μαθθαῖος
  chosen: Matthew
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ τελώνης
  chosen: the tax collector
  alternatives:
  - the toll collector
  - the publican
  lexicon: BDAG
  rationale: τελώνης refers to a collector of taxes/tolls. 'Tax collector' is the
    clearest modern English rendering; 'publican' is traditional but archaic, and
    'toll collector' is narrower than the likely sense here.
- source_word: Ἰάκωβος
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Conventional English form for the Greek name Ἰάκωβος in New Testament
    contexts is 'James,' though it is historically related to 'Jacob.' Retaining 'James'
    preserves recognizability in apostolic lists.
- source_word: ὁ τοῦ Ἁλφαίου
  chosen: the son of Alphaeus
  alternatives:
  - of Alphaeus
  lexicon: BDAG
  rationale: This genitival construction identifies James by paternity. In English,
    'the son of Alphaeus' makes the relationship explicit and natural, whereas 'of
    Alphaeus' is more compressed and less clear.
- source_word: Ἁλφαίου
  chosen: Alphaeus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name in the genitive.
- source_word: Θαδδαῖος
  chosen: Thaddaeus
  alternatives:
  - Lebbaeus
  - Judas son of James
  lexicon: BDAG
  rationale: The SBLGNT reading here is Θαδδαῖος, so 'Thaddaeus' is translated directly
    in the main text. Other Gospel/manuscript traditions preserve different associated
    names, which are worth noting in a footnote but should not displace the printed
    Greek text.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Rendered with the standard coordinating conjunction 'and' throughout
    the list to preserve the simple paratactic structure of the Greek.
