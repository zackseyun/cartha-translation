theological_decisions:
- issue: Identification of the final apostle in the list
  chosen_reading: Thaddaeus
  alternative_readings:
  - Lebbaeus
  - Judas son of James
  rationale: The base Greek text provided reads Θαδδαῖος, so the translation follows
    that reading. Because parallel apostolic lists and some manuscript traditions
    use different names or designations, those alternatives are preserved in a footnote
    for transparency rather than harmonized into the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension/alternatives in footnotes where relevant)
