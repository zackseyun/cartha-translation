theological_decisions:
- issue: Public acknowledgment of Jesus and reciprocal acknowledgment by Jesus
  chosen_reading: Render the verse straightforwardly as a promise of reciprocal confession
    without importing later doctrinal formulations about judgment, salvation mechanics,
    or ecclesial confession.
  alternative_readings:
  - Interpret as specifically forensic acknowledgment at final judgment
  - Interpret as primarily present discipleship language
  rationale: The verse itself states a reciprocal acknowledgment before the Father.
    The translation preserves that theological weight without resolving broader systematic
    questions not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
