id: MAT.10.32
reference: Matthew 10:32
source:
  edition: SBLGNT
  text: Πᾶς οὖν ὅστις ὁμολογήσει ἐν ἐμοὶ ἔμπροσθεν τῶν ἀνθρώπων, ὁμολογήσω κἀγὼ ἐν
    αὐτῷ ἔμπροσθεν τοῦ πατρός μου τοῦ ⸀ἐν οὐρανοῖς·
translation:
  text: Therefore everyone who confesses me before men, I also will confess before
    my Father who is in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before people.' The Greek says 'before men,' using a masculine plural
      with generic human reference.
    reason: lexical_alternative
  - marker: b
    text: Greek more literally, 'I also will confess in him' or 'with respect to him';
      the clause is rendered idiomatically in English as 'I also will confess before
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς οὖν ὅστις
  chosen: Therefore everyone who
  alternatives:
  - So everyone who
  - Everyone therefore who
  - Whoever, then,
  lexicon: BDAG
  rationale: Πᾶς with ὅστις forms an inclusive generalizing expression, best rendered
    idiomatically as 'everyone who.' οὖν is kept as 'Therefore' to preserve the inferential
    connection with the preceding context.
- source_word: ὁμολογήσει
  chosen: confesses
  alternatives:
  - acknowledges
  - declares allegiance to
  lexicon: BDAG
  rationale: ὁμολογέω here carries the sense of openly acknowledging or confessing
    allegiance. 'Confesses' preserves the public, verbal dimension and matches the
    reciprocal use later in the verse.
- source_word: ἐν ἐμοὶ
  chosen: me
  alternatives:
  - in me
  - for me
  lexicon: BDAG
  rationale: Although the Greek uses ἐν, in this idiom with ὁμολογέω the natural English
    rendering is 'confesses me' rather than the wooden 'confesses in me.' This reflects
    idiomatic English while preserving the object of confession as Jesus himself.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  - in front of men
  lexicon: BDAG
  rationale: ἔμπροσθεν means 'before' or 'in the presence of.' ἀνθρώπων is grammatically
    masculine plural but here refers generically to human beings. Per the project's
    gender-accurate principle, 'men' is retained because it matches the representative/generic
    force and echoes the source form; a more inclusive alternative is preserved in
    footnote.
- source_word: ὁμολογήσω κἀγὼ
  chosen: I also will confess
  alternatives:
  - I too will acknowledge
  - I also will declare
  lexicon: BDAG
  rationale: The future verb mirrors the earlier ὁμολογήσει, so 'confess' is retained
    for lexical consistency. κἀγώ adds emphasis, naturally conveyed by 'also.'
- source_word: ἐν αὐτῷ
  chosen: before him
  alternatives:
  - him
  - in him
  lexicon: BDAG
  rationale: The Greek again uses ἐν in an idiom parallel to ἐν ἐμοί. In English,
    the sense is that Jesus will confess or acknowledge the person, and with ἔμπροσθεν
    following, 'before him' is the most natural way to express the relational object
    in this reciprocal construction. A more literal alternative is preserved in a
    footnote because the Greek preposition is notable.
- source_word: τοῦ πατρός μου τοῦ ἐν οὐρανοῖς
  chosen: my Father who is in heaven
  alternatives:
  - my Father in the heavens
  - my Father who is in the heavens
  lexicon: BDAG
  rationale: This is a standard Matthean expression. 'Who is in heaven' gives clear
    modern English while preserving the locative force. Although οὐρανοῖς is plural
    in Greek, singular 'heaven' is the normal English idiom; the more formal 'in the
    heavens' is possible but less natural.
