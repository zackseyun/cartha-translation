theological_decisions:
- issue: Scope of miraculous commands
  chosen_reading: Translate the imperatives straightforwardly as commands to the Twelve
    in this mission discourse, without softening them into general metaphors.
  alternative_readings:
  - Read some actions metaphorically or as later ecclesial practices only
  rationale: The Greek presents direct plural imperatives in a concrete list of ministry
    actions. The translation should preserve the historical and theological force
    of Jesus' commission without narrowing or expanding its application beyond the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
