id: MAT.10.8
reference: Matthew 10:8
source:
  edition: SBLGNT
  text: ἀσθενοῦντας θεραπεύετε, ⸂νεκροὺς ἐγείρετε⸃, λεπροὺς καθαρίζετε, δαιμόνια ἐκβάλλετε·
    δωρεὰν ἐλάβετε, δωρεὰν δότε.
translation:
  text: Heal the sick, raise the dead, cleanse lepers, cast out demons. Freely you
    received; freely give.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those with a skin disease.' The term traditionally rendered 'lepers'
      may refer more broadly to serious skin conditions in biblical usage than to
      modern leprosy alone.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσθενοῦντας
  chosen: the sick
  alternatives:
  - those who are sick
  - the weak
  lexicon: BDAG
  rationale: The participle means those who are ill/sick in this healing context.
    'The sick' is idiomatic English and matches the object of the imperative without
    unnecessary expansion. 'The weak' is too broad here.
- source_word: θεραπεύετε
  chosen: Heal
  alternatives:
  - cure
  lexicon: BDAG
  rationale: In context of miraculous ministry, θεραπεύω is best rendered 'heal.'
    'Cure' is possible but less natural in a sequence of imperatives and can sound
    more clinical.
- source_word: νεκροὺς
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: As the object of ἐγείρετε, this refers to dead persons. 'The dead' is
    concise and natural English.
- source_word: ἐγείρετε
  chosen: raise
  alternatives:
  - raise up
  lexicon: BDAG
  rationale: Here ἐγείρω means to raise from death, not merely awaken. 'Raise' is
    the clearest idiomatic rendering in English.
- source_word: λεπροὺς
  chosen: lepers
  alternatives:
  - those with leprosy
  - people with a skin disease
  lexicon: BDAG
  rationale: The traditional term is concise and widely understood in Gospel contexts,
    though the underlying condition may not map exactly to modern Hansen's disease.
    A cultural footnote preserves that nuance.
- source_word: καθαρίζετε
  chosen: cleanse
  alternatives:
  - make clean
  lexicon: BDAG
  rationale: For lepers, καθαρίζω carries both physical and ritual connotations. 'Cleanse'
    preserves that fuller sense better than simply 'heal'.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: '''Demons'' is the standard and most direct rendering of δαιμόνια in
    NT contexts.'
- source_word: ἐκβάλλετε
  chosen: cast out
  alternatives:
  - drive out
  lexicon: BDAG
  rationale: '''Cast out'' is the established and accurate English equivalent for
    exorcistic contexts, preserving the force of expulsion.'
- source_word: δωρεὰν
  chosen: freely
  alternatives:
  - without payment
  - as a gift
  lexicon: BDAG
  rationale: The adverb means gratis, without cost. 'Freely' works well in both clauses
    and preserves the rhetorical parallelism.
- source_word: ἐλάβετε
  chosen: you received
  alternatives:
  - you have received
  lexicon: BDAG
  rationale: The aorist points to what the disciples received from Jesus; simple past
    is natural in English and fits the parallel imperative that follows.
- source_word: δότε
  chosen: give
  alternatives:
  - give freely
  lexicon: BDAG
  rationale: The imperative is simply 'give'; the preceding δωρεάν supplies the manner.
    Rendering the adverb separately preserves the Greek emphasis and balance.
