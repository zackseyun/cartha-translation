id: MAT.10.28
reference: Matthew 10:28
source:
  edition: SBLGNT
  text: καὶ μὴ ⸀φοβεῖσθε ἀπὸ τῶν ἀποκτεννόντων τὸ σῶμα τὴν δὲ ψυχὴν μὴ δυναμένων ἀποκτεῖναι·
    ⸁φοβεῖσθε δὲ μᾶλλον τὸν δυνάμενον ⸀καὶ ψυχὴν ⸁καὶ σῶμα ἀπολέσαι ἐν γεέννῃ.
translation:
  text: And do not fear those who kill the body but are not able to kill the soul.
    Rather, fear the one who is able to destroy both soul and body in Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''in hell.'' Greek: ''in Gehenna,'' the term derived from the Valley
      of Hinnom and used for the place of final judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβεῖσθε
  chosen: do not fear / fear
  alternatives:
  - be afraid of
  - revere
  lexicon: BDAG
  rationale: The verb is repeated in antithesis, so English should preserve the same
    core term in both clauses. 'Fear' is the most direct rendering and keeps the warning's
    force. 'Revere' would soften the first clause unnaturally and over-interpret the
    second.
- source_word: ἀπὸ τῶν ἀποκτεννόντων
  chosen: those who kill
  alternatives:
  - those killing
  - the ones who are killing
  lexicon: BDAG
  rationale: The present participle with article functions substantivally. 'Those
    who kill' is natural English and preserves the generic class reference.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard and direct rendering for the physical body.
- source_word: ψυχήν
  chosen: soul
  alternatives:
  - life
  lexicon: BDAG
  rationale: In this contrast with 'body,' ψυχή refers to the immaterial aspect of
    the person rather than merely earthly life. 'Soul' best preserves the body/soul
    distinction expressed in the verse. 'Life' is lexically possible in some contexts
    but would blur the contrast here.
- source_word: μὴ δυναμένων ἀποκτεῖναι
  chosen: are not able to kill
  alternatives:
  - cannot kill
  lexicon: BDAG
  rationale: This renders the participial construction clearly while preserving the
    emphasis on inability. 'Cannot kill' is possible, but 'are not able to kill' more
    closely reflects the Greek wording.
- source_word: μᾶλλον
  chosen: rather
  alternatives:
  - instead
  - more
  lexicon: BDAG
  rationale: 'Marks contrast and correction: not this fear, but that fear. ''Rather''
    is idiomatic and preserves the comparative force in context.'
- source_word: τὸν δυνάμενον
  chosen: the one who is able
  alternatives:
  - him who is able
  - the one able
  lexicon: BDAG
  rationale: The substantival participle is left somewhat open in Greek. 'The one
    who is able' is natural English and avoids prematurely specifying identity in
    the translation itself.
- source_word: ἀπολέσαι
  chosen: destroy
  alternatives:
  - ruin
  - cause to perish
  lexicon: BDAG
  rationale: ἀπόλλυμι here denotes decisive destruction/judgment. 'Destroy' is the
    standard rendering and preserves the gravity without over-specifying the metaphysical
    mechanics of the judgment.
- source_word: ἐν γεέννῃ
  chosen: in Gehenna
  alternatives:
  - in hell
  lexicon: BDAG
  rationale: The Greek term is γέεννα, a specific term with Jewish background. Transliteration
    preserves the source-language concept and avoids importing later English associations
    tied to 'hell.' The accessible meaning can be preserved in a footnote.
