theological_decisions:
- issue: Identity of 'the one who is able to destroy both soul and body in Gehenna'
  chosen_reading: Rendered as 'the one' without explicit identification in the main
    text.
  alternative_readings:
  - God
  - Satan
  rationale: The verse most naturally refers to God as the one with final judicial
    authority, but the Greek expression itself does not name the referent. To preserve
    theological tension and avoid importing an explicit identification not stated
    in the text, the main text keeps the expression indefinite while allowing interpretation
    from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: Using 'Gehenna' follows original-language primacy and preserves the Jewish
    and Second Temple background of the term. Because 'hell' is a familiar interpretive
    equivalent in English, it is preserved in a footnote rather than substituted into
    the main text.
  doctrine_reference: Original-language primacy over translation tradition.
