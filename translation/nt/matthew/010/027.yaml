id: MAT.10.27
reference: Matthew 10:27
source:
  edition: SBLGNT
  text: ὃ λέγω ὑμῖν ἐν τῇ σκοτίᾳ, εἴπατε ἐν τῷ φωτί· καὶ ὃ εἰς τὸ οὖς ἀκούετε, κηρύξατε
    ἐπὶ τῶν δωμάτων.
translation:
  text: What I tell you in the darkness, say in the light; and what you hear in the
    ear, proclaim on the housetops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in secret ... openly'; the Greek preserves the imagery 'in the darkness
      ... in the light.'
    reason: lexical_alternative
  - marker: b
    text: That is, what is heard privately is to be announced publicly; 'on the housetops'
      reflects the flat roofs of ancient houses used as visible places for public
      announcement.
    reason: cultural_note
lexical_decisions:
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Neuter singular relative pronoun used substantivally; 'what' is natural
    English and preserves the object sense without wooden phrasing.
- source_word: λέγω
  chosen: tell
  alternatives:
  - say
  - speak
  lexicon: BDAG
  rationale: In 'What I tell you,' English idiom prefers 'tell' with an indirect object
    ('you'). This keeps the sense of direct instruction more naturally than 'say to
    you'.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in secret
  - in the dark
  lexicon: BDAG
  rationale: A formally close rendering of the metaphor/image. 'In secret' captures
    the implied sense but interprets the figure; 'in the darkness' preserves the contrast
    with 'in the light' in the next clause.
- source_word: εἴπατε
  chosen: say
  alternatives:
  - speak
  - tell
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive public utterance. 'Say' is concise
    and pairs well with the first clause; 'tell' would normally require an explicit
    object in English.
- source_word: ἐν τῷ φωτί
  chosen: in the light
  alternatives:
  - openly
  - in daylight
  lexicon: BDAG
  rationale: Retains the metaphorical contrast with 'in the darkness.' 'Openly' is
    interpretive; 'in the light' preserves both imagery and sense.
- source_word: εἰς τὸ οὖς
  chosen: in the ear
  alternatives:
  - in your ear
  - whispered to you
  - into the ear
  lexicon: BDAG
  rationale: The idiom denotes private communication. 'In the ear' is a close rendering
    of the singular Greek expression and preserves the vividness of the image. Adding
    'your' would slightly over-specify what is implicit in English.
- source_word: ἀκούετε
  chosen: hear
  alternatives:
  - are hearing
  - listen to
  lexicon: BDAG
  rationale: Present indicative in a relative clause; simple present English is the
    most natural equivalent here.
- source_word: κηρύξατε
  chosen: proclaim
  alternatives:
  - preach
  - announce
  - declare
  lexicon: BDAG
  rationale: κηρύσσω carries the sense of public heralding. 'Proclaim' preserves the
    public, authoritative force without narrowing it to formal sermonizing as 'preach'
    might.
- source_word: ἐπὶ τῶν δωμάτων
  chosen: on the housetops
  alternatives:
  - from the rooftops
  - on the roofs
  lexicon: BDAG
  rationale: δῶμα here refers to flat-roofed houses used as elevated public vantage
    points. 'On the housetops' is a standard, accurate rendering of the cultural image;
    'from the rooftops' is idiomatic English but slightly shifts the preposition.
