theological_decisions:
- issue: Whether to render the darkness/light and ear/housetops language as literal
    imagery or as interpreted paraphrase about secrecy and publicity
  chosen_reading: 'Preserve the imagery in the main text: ''in the darkness ... in
    the light ... in the ear ... on the housetops.'''
  alternative_readings:
  - '''in secret ... openly ... whispered to you ... proclaim publicly'''
  rationale: The verse uses vivid antithetical imagery that communicates both literal
    and metaphorical force. Preserving the imagery aligns with optimal equivalence
    and avoids flattening Jesus' rhetoric into mere explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
