theological_decisions:
- issue: Meaning of 'the kingdom of heaven'
  chosen_reading: Retained as 'the kingdom of heaven' rather than paraphrasing as
    'God's reign' or harmonizing to 'kingdom of God.'
  alternative_readings:
  - the reign of heaven
  - the kingdom of God
  rationale: Matthew's distinctive wording should be preserved. 'Kingdom' keeps the
    theological breadth of both reign and realm, and avoids importing a harmonization
    not present in the text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Aspect of Ἤγγικεν
  chosen_reading: 'Rendered with present-result perfect sense: ''has drawn near.'''
  alternative_readings:
  - is near
  - has come near
  rationale: This preserves the inaugurated-yet-not-exhausted force of the perfect
    without resolving broader kingdom theology beyond what the verb itself states.
  doctrine_reference: Translation philosophy §3
