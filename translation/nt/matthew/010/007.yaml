id: MAT.10.7
reference: Matthew 10:7
source:
  edition: SBLGNT
  text: πορευόμενοι δὲ κηρύσσετε λέγοντες ὅτι Ἤγγικεν ἡ βασιλεία τῶν οὐρανῶν.
translation:
  text: And as you go, proclaim, saying, ‘The kingdom of heaven has drawn near.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has come near' or 'is near.' The Greek perfect verb emphasizes nearness
      that has arrived and remains in effect.
    reason: lexical_alternative
  - marker: b
    text: Matthew regularly says 'the kingdom of heaven,' where the other Gospels
      often say 'the kingdom of God.'
    reason: cross_reference
lexical_decisions:
- source_word: πορευόμενοι
  chosen: as you go
  alternatives:
  - going
  - as you are going
  lexicon: BDAG
  rationale: Present participle with imperatival main verb; rendered temporally as
    attendant action accompanying the command, in natural English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: Mild connective linking this instruction with the preceding commands.
    'And' preserves the flow without overstating contrast.
- source_word: κηρύσσετε
  chosen: proclaim
  alternatives:
  - preach
  - announce
  lexicon: BDAG
  rationale: Imperative of public heralding. 'Proclaim' preserves the authoritative
    public sense while remaining readable modern English; 'preach' is possible but
    can sound more ecclesiastical than the Greek requires.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and say
  - proclaiming
  lexicon: BDAG
  rationale: Participle specifying the content of the proclamation. 'Saying' keeps
    the Greek structure transparent and introduces the quoted message naturally.
- source_word: ὅτι
  chosen: The
  alternatives:
  - that the
  lexicon: BDAG
  rationale: Introduces direct content after 'saying.' In idiomatic English, the content
    is best rendered directly in quotation marks without an explicit 'that,' while
    preserving the sense.
- source_word: Ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: Perfect tense indicates a nearness that has arrived with continuing relevance.
    'Has drawn near' preserves both aspect and the solemn register better than the
    flatter 'is near.'
- source_word: ἡ βασιλεία
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingship
  lexicon: BDAG
  rationale: Standard rendering that can encompass both realm and reign. 'Kingdom'
    is the most natural and established English equivalent here without excluding
    the dynamic sense of God's rule.
- source_word: τῶν οὐρανῶν
  chosen: of heaven
  alternatives:
  - of the heavens
  lexicon: BDAG
  rationale: Matthean reverential expression corresponding to 'kingdom of God' in
    parallels. Singular 'heaven' is idiomatic English, while still reflecting the
    genitive phrase.
