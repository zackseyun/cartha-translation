theological_decisions:
- issue: Force of μαρτύριον αὐτοῖς
  chosen_reading: neutral 'to them' rather than adversative 'against them'
  alternative_readings:
  - against them
  rationale: The verse presents the disciples' compelled appearance as witness-bearing.
    The dative αὐτοῖς does not itself require condemnation; rendering it neutrally
    preserves the theological tension that the testimony may serve either as invitation
    or as witness against rejection depending on response.
  doctrine_reference: Preserve theological tension rather than resolve it.
