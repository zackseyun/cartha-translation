id: MAT.10.18
reference: Matthew 10:18
source:
  edition: SBLGNT
  text: καὶ ἐπὶ ἡγεμόνας δὲ καὶ βασιλεῖς ἀχθήσεσθε ἕνεκεν ἐμοῦ εἰς μαρτύριον αὐτοῖς
    καὶ τοῖς ἔθνεσιν.
translation:
  text: And you will be brought before governors and kings because of me, as a testimony
    to them and to the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the nations."
    reason: lexical_alternative
  - marker: b
    text: '"To them" may also be understood as "against them" in context, though the
      Greek dative itself is not explicit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ ἡγεμόνας ... καὶ βασιλεῖς
  chosen: before governors and kings
  alternatives:
  - to governors and kings
  - before rulers and kings
  lexicon: BDAG
  rationale: With ἐπί plus accusative after a verb of being led, the sense is appearing
    before authorities rather than merely movement toward them. 'Governors' is the
    standard gloss for ἡγεμών, and βασιλεῖς is straightforwardly 'kings.'
- source_word: ἀχθήσεσθε
  chosen: you will be brought
  alternatives:
  - you will be led
  - you will be dragged
  lexicon: BDAG
  rationale: Future passive of ἄγω. 'Brought' fits natural English and the judicial
    setting without overstating force. 'Dragged' would imply violence not explicit
    here; 'led' is possible but less idiomatic with 'before governors and kings.'
- source_word: ἕνεκεν ἐμοῦ
  chosen: because of me
  alternatives:
  - for my sake
  - on account of me
  lexicon: BDAG
  rationale: ἕνεκεν with genitive expresses cause or reason. 'Because of me' is clear
    modern English and preserves the personal reference to Jesus.
- source_word: εἰς μαρτύριον
  chosen: as a testimony
  alternatives:
  - for a testimony
  - as witness
  lexicon: BDAG
  rationale: 'The phrase indicates purpose/result in this context: their appearance
    before rulers will function as testimony. ''As a testimony'' is idiomatic and
    preserves the noun form rather than converting it to a verb.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - against them
  - for them
  lexicon: BDAG
  rationale: The dative pronoun most naturally refers back to the governors and kings.
    While in some contexts testimony can be adverse, the Greek here does not explicitly
    mark opposition, so the neutral 'to them' best preserves the text's ambiguity.
- source_word: τοῖς ἔθνεσιν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Matthew, ἔθνη commonly contrasts with Israel and often means Gentiles.
    Here, alongside Jewish and political authorities, 'the Gentiles' best captures
    the likely referent while remaining a standard NT rendering.
