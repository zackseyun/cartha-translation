id: MAT.10.36
reference: Matthew 10:36
source:
  edition: SBLGNT
  text: καὶ ἐχθροὶ τοῦ ἀνθρώπου οἱ οἰκιακοὶ αὐτοῦ.
translation:
  text: And a man's enemies will be those of his own household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a person's enemies will be the members of his household.' The Greek
      uses the masculine singular 'man' representatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - For
  - Indeed
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this clause to the preceding
    context; 'And' preserves the simple connective force without adding interpretation.
- source_word: ἐχθροὶ
  chosen: enemies
  alternatives:
  - hostile ones
  - foes
  lexicon: BDAG
  rationale: The nominative plural adjective/substantive denotes those who are hostile.
    'Enemies' is the natural and sufficiently strong English equivalent.
- source_word: τοῦ ἀνθρώπου
  chosen: a man's
  alternatives:
  - of a man
  - of the man
  - of a person
  lexicon: BDAG
  rationale: The genitive phrase is most naturally rendered possessively in English.
    Although ἄνθρωπος can mean 'person/human being,' the doctrine guidance prefers
    gender-accurate rendering where the Greek is grammatically masculine and representative;
    'a man's' preserves the source form and echoes the idiom of the saying.
- source_word: οἱ οἰκιακοὶ αὐτοῦ
  chosen: those of his own household
  alternatives:
  - the members of his household
  - his household
  - his own family
  lexicon: BDAG
  rationale: οἰκιακοί refers to those belonging to one's house/household, including
    household members rather than merely the physical house. 'Those of his own household'
    preserves the relational sense and the emphasis of αὐτοῦ, while remaining idiomatic
    English.
