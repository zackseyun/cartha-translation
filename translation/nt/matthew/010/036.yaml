theological_decisions:
- issue: Gendered representative language in ἀνθρώπου
  chosen_reading: a man's
  alternative_readings:
  - a person's
  - one's
  rationale: The Greek uses the masculine singular ἄνθρωπος in a representative saying.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language when the source is grammatically masculine and representative. A more
    inclusive alternative is possible in English, but the main text preserves the
    source's form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
