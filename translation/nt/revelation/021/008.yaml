theological_decisions:
- issue: Rendering of ἄπιστος in a judgment list
  chosen_reading: unbelieving
  alternative_readings:
  - faithless
  - unfaithful
  rationale: The verse lists those excluded from the new creation and consigned to judgment. In this context, ἄπιστος most naturally denotes those who do not believe, though the semantic range can include unfaithfulness. To preserve theological tension without over-resolving, the main text uses 'unbelieving' and a footnote preserves 'faithless.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; contested term πίστις-related language documented per verse.'
- issue: Rendering of θείῳ
  chosen_reading: sulfur
  alternative_readings:
  - brimstone
  rationale: The image is traditional in English as 'fire and brimstone,' but the source noun denotes sulfur. Following original-language primacy and readable modern English, 'sulfur' is preferred, with the traditional equivalent preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; readable modern English, not archaic or academic.'
