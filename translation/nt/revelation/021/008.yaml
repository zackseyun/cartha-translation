id: REV.21.8
reference: Revelation 21:8
source:
  edition: SBLGNT
  text: τοῖς δὲ δειλοῖς καὶ ⸀ἀπίστοις καὶ ἐβδελυγμένοις καὶ φονεῦσι καὶ πόρνοις καὶ φαρμάκοις καὶ εἰδωλολάτραις καὶ πᾶσι τοῖς ψευδέσιν τὸ μέρος αὐτῶν ἐν τῇ λίμνῃ τῇ καιομένῃ πυρὶ καὶ θείῳ, ὅ ἐστιν ὁ θάνατος ὁ δεύτερος.
translation:
  text: But for the cowardly and unbelieving and detestable and murderers and sexually immoral people and sorcerers and idolaters and all liars, their portion will be in the lake burning with fire and sulfur, which is the second death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithless' or 'unfaithful' for 'unbelieving.'
    reason: alternative_reading
  - marker: b
    text: 'Traditional English: ''brimstone.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the sexually immoral'.
    reason: previous_rendering
lexical_decisions:
- source_word: δειλοῖς
  chosen: cowardly
  alternatives:
  - fearful
  - timid
  lexicon: BDAG
  rationale: δειλός denotes cowardice or shameful fearfulness, not mere ordinary fear. 'Cowardly' best captures the moral force in this vice list.
- source_word: ἀπίστοις
  chosen: unbelieving
  alternatives:
  - faithless
  - unfaithful
  lexicon: BDAG
  rationale: ἄπιστος can mean either 'unbelieving' or 'unfaithful.' In this judgment list, paired with other categories of those outside the holy city, 'unbelieving' is the most straightforward sense, while the alternative is preserved in a footnote because the term can carry covenantal overtones.
- source_word: ἐβδελυγμένοις
  chosen: detestable
  alternatives:
  - abominable
  - those who practice abominations
  lexicon: BDAG
  rationale: The perfect participle from βδελύσσομαι describes those characterized by what is abhorrent/defiled. 'Detestable' is readable modern English and preserves the strong moral revulsion without archaic tone.
- source_word: φονεῦσι
  chosen: murderers
  alternatives:
  - killers
  lexicon: BDAG
  rationale: φονεύς ordinarily means 'murderer'; 'killers' is too broad and could include non-criminal killing.
- source_word: πόρνοις
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - the sexually immoral persons
  lexicon: BDAG
  rationale: πόρνος refers broadly to those engaged in sexual immorality. 'The sexually immoral' communicates the category in clear modern English better than the narrower or archaic 'fornicators.'
- source_word: φαρμάκοις
  chosen: sorcerers
  alternatives:
  - practitioners of magic arts
  - those who use sorcery
  lexicon: BDAG
  rationale: φάρμακος/φαρμακός in Revelation refers to magical or occult practitioners, not merely poisoners or pharmacists. 'Sorcerers' is the standard concise rendering and fits the apocalyptic context.
- source_word: εἰδωλολάτραις
  chosen: idolaters
  alternatives:
  - worshipers of idols
  lexicon: BDAG
  rationale: The term directly denotes those who worship idols. 'Idolaters' is precise and natural in English.
- source_word: πᾶσι τοῖς ψευδέσιν
  chosen: all liars
  alternatives:
  - everyone false
  - all the false
  lexicon: BDAG
  rationale: The adjective ψευδής used substantivally means 'liar' or 'false one.' In this vice list, 'all liars' is the clearest idiomatic rendering.
- source_word: τὸ μέρος αὐτῶν
  chosen: their portion will be
  alternatives:
  - their part is
  - their share will be
  lexicon: BDAG
  rationale: μέρος here denotes allotted share or destiny. Adding 'will be' makes the verbless Greek clause natural in English while preserving the sense of assigned outcome.
- source_word: ἐν τῇ λίμνῃ τῇ καιομένῃ πυρὶ καὶ θείῳ
  chosen: in the lake burning with fire and sulfur
  alternatives:
  - in the lake that burns with fire and sulfur
  - in the fiery lake of sulfur
  lexicon: BDAG
  rationale: The participle καιομένῃ is attributive to λίμνῃ, 'the lake burning.' θείῳ is sulfur/brimstone; 'sulfur' is more accessible modern English than 'brimstone' while preserving the image.
- source_word: ὅ ἐστιν ὁ θάνατος ὁ δεύτερος
  chosen: which is the second death
  alternatives:
  - this is the second death
  lexicon: BDAG
  rationale: The relative pronoun refers back to the lake of fire-and-sulfur imagery and identifies it as 'the second death.' 'Which is' preserves the explanatory force.
