  from: the sexually immoral
  to: sexually immoral people
  rationale: The current rendering of the vice list is largely parallel, but the introduction of 'the' for 'the sexually immoral' creates a slight grammatical bump, as other nouns in the list ('murderers', 'sorcerers') do not use an article. While the choice to render 'πόρνοι' this way is understandable, substituting 'sexually immoral people' would maintain the grammatical pattern of a noun phrase without an article, creating a smoother flow that is more consistent with the rest of the list (e.g., '...and murderers and sexually immoral people and sorcerers...').
