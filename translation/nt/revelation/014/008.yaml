id: REV.14.8
reference: Revelation 14:8
source:
  edition: SBLGNT
  text: Καὶ ἄλλος ⸂δεύτερος ἄγγελος⸃ ἠκολούθησεν λέγων· Ἔπεσεν, ⸀ἔπεσεν Βαβυλὼν ἡ
    μεγάλη, ⸀ἣ ἐκ τοῦ οἴνου τοῦ θυμοῦ τῆς πορνείας αὐτῆς πεπότικεν πάντα τὰ ἔθνη.
translation:
  text: And another, a second angel, followed, saying, “Fallen, fallen is Babylon
    the great, she who has made all the nations drink from the wine of the fury of
    her sexual immorality.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wine of the wrath of her sexual immorality.' The Greek θυμός can
      mean 'wrath,' 'rage,' or intense 'fury/passion.'
    reason: lexical_alternative
  - marker: b
    text: The image of Babylon's 'sexual immorality' is likely metaphorical for corrupting,
      idolatrous, and unfaithful influence, though the text does not limit it to one
      of these alone.
    reason: cultural_note
  - marker: c
    text: Or 'has intoxicated all the nations.' The Greek literally says 'has made
      all the nations drink.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος … δεύτερος ἄγγελος
  chosen: another, a second angel
  alternatives:
  - another angel, a second one
  - a second angel
  lexicon: BDAG
  rationale: The Greek explicitly has both ἄλλος ('another') and δεύτερος ('second'),
    so the translation preserves both rather than smoothing one away. The appositional
    English punctuation keeps the wording readable while reflecting the source.
- source_word: ἠκολούθησεν
  chosen: followed
  alternatives:
  - came after
  - followed after
  lexicon: BDAG
  rationale: Aorist indicative of ἀκολουθέω here denotes sequence in the visionary
    scene. 'Followed' is the most natural and sufficiently formal rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle is well represented by 'saying,' preserving the
    participial linkage to the angel's following.
- source_word: Ἔπεσεν, ἔπεσεν
  chosen: Fallen, fallen
  alternatives:
  - It has fallen, it has fallen
  - Fell, fell
  lexicon: BDAG
  rationale: The repeated aorist is a prophetic proclamation echoing Isaianic judgment
    language. 'Fallen, fallen' is idiomatic in English biblical style and preserves
    the rhetorical force better than a more wooden past-tense repetition.
- source_word: Βαβυλὼν ἡ μεγάλη
  chosen: Babylon the great
  alternatives:
  - great Babylon
  lexicon: BDAG
  rationale: This preserves the Greek order and the title-like force of the phrase.
    'Babylon' is transliterated as a proper name per translation philosophy.
- source_word: ἣ
  chosen: she who
  alternatives:
  - who
  - which
  lexicon: BDAG
  rationale: The relative pronoun is feminine singular, referring back to Babylon
    personified as a woman/city. 'She who' preserves the personification more clearly
    than 'which' and more explicitly than bare 'who'.
- source_word: ἐκ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - of the wine
  lexicon: BDAG
  rationale: The preposition ἐκ is best represented as 'from' here, matching the image
    of causing the nations to drink from a cup/source. This avoids flattening the
    prepositional nuance.
- source_word: τοῦ θυμοῦ
  chosen: the fury
  alternatives:
  - the wrath
  - the passion
  lexicon: BDAG
  rationale: θυμός can denote intense anger, rage, or passionate fury. In this context,
    modifying 'sexual immorality,' it likely carries the sense of heated, intoxicating
    passion with judgment overtones. 'Fury' preserves the intensity without prematurely
    narrowing it to divine wrath.
- source_word: τῆς πορνείας αὐτῆς
  chosen: her sexual immorality
  alternatives:
  - her fornication
  - her prostitution
  lexicon: BDAG
  rationale: πορνεία can be literal or metaphorical sexual immorality; in Revelation
    it often carries symbolic covenantal/idolatrous overtones. 'Sexual immorality'
    is clear modern English and broad enough to preserve the metaphorical range, while
    'fornication' is archaic and 'prostitution' is too narrow.
- source_word: πεπότικεν
  chosen: has made … drink
  alternatives:
  - has given … to drink
  - has intoxicated
  lexicon: BDAG
  rationale: Perfect active of ποτίζω indicates completed action with continuing effect.
    'Has made all the nations drink' preserves the causative sense better than the
    simpler 'has given to drink.' 'Has intoxicated' is interpretive and therefore
    left to a footnote.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: BDAG
  rationale: In Revelation, ἔθνη commonly refers to the nations/peoples broadly, not
    specifically Gentiles over against Jews. 'All the nations' is the most contextually
    fitting and conventional rendering.
