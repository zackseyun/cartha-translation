theological_decisions:
- issue: Metaphorical force of Babylon's πορνεία
  chosen_reading: Render with the literal-metaphorical term 'sexual immorality' in
    the main text without explicating idolatry or political unfaithfulness.
  alternative_readings:
  - fornication
  - prostitution
  - idolatry
  rationale: The verse uses sexual imagery for Babylon's corrupting influence, but
    the text itself does not explicitly gloss the metaphor here. Preserving the image
    maintains theological tension rather than resolving it into a single interpretive
    category.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Sense of θυμός in the phrase 'wine of the θυμός of her πορνεία'
  chosen_reading: Translate θυμός as 'fury' rather than 'wrath' in the main text.
  alternative_readings:
  - wrath
  - passion
  rationale: Because θυμός here is grammatically linked to Babylon's sexual immorality
    rather than directly to God's judgment, 'fury' better preserves the ambiguity
    between passionate excess and destructive rage. 'Wrath' is preserved in a footnote
    as a viable traditional alternative.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
