id: REV.14.1
reference: Revelation 14:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον, καὶ ἰδοὺ τὸ ἀρνίον ⸀ἑστὸς ἐπὶ τὸ ὄρος Σιών, καὶ μετ’ ⸀αὐτοῦ ἑκατὸν
    τεσσεράκοντα τέσσαρες χιλιάδες ἔχουσαι τὸ ὄνομα αὐτοῦ καὶ τὸ ὄνομα τοῦ πατρὸς
    αὐτοῦ γεγραμμένον ἐπὶ τῶν μετώπων αὐτῶν.
translation:
  text: Then I looked, and behold, the Lamb was standing on Mount Zion, and with him
    were one hundred forty-four thousand who had his name and his Father's name written
    on their foreheads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts read only: ''his Father''s name written on their foreheads.'''
    reason: textual_variant
lexical_decisions:
- source_word: Καὶ εἶδον
  chosen: Then I looked
  alternatives:
  - And I saw
  - And I looked
  lexicon: BDAG
  rationale: Rendered with a natural narrative transition in English. καί plus εἶδον
    often advances visionary sequence; 'Then I looked' preserves the progression without
    sounding wooden.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the apocalyptic deictic force and heightened
    attention marker. Though somewhat elevated, it remains readable and fits Revelation's
    style.
- source_word: τὸ ἀρνίον
  chosen: the Lamb
  alternatives:
  - the little lamb
  lexicon: BDAG
  rationale: Standard rendering for the christological title in Revelation. Although
    ἀρνίον is a diminutive form, English 'the Lamb' best captures established title
    usage without trivializing the referent.
- source_word: ἑστὸς
  chosen: was standing
  alternatives:
  - standing
  - stood
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι conveys a standing state/result. 'Was standing'
    expresses the stative aspect more clearly in English than simple 'stood'.
- source_word: ἐπὶ τὸ ὄρος Σιών
  chosen: on Mount Zion
  alternatives:
  - upon Mount Zion
  - on the mountain Zion
  lexicon: BDAG
  rationale: Idiomatic English for the place name. Σιών is transliterated as 'Zion'
    per the policy to transliterate names.
- source_word: μετ’ αὐτοῦ
  chosen: with him were
  alternatives:
  - with him
  - and with him
  lexicon: BDAG
  rationale: Expanded slightly for smooth English predication, since the following
    numeral phrase functions as the subject of an implied verb.
- source_word: ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  chosen: one hundred forty-four thousand
  alternatives:
  - a hundred and forty-four thousand
  lexicon: BDAG
  rationale: Standard contemporary English number formatting; preserves the exact
    number.
- source_word: ἔχουσαι
  chosen: who had
  alternatives:
  - having
  - who were having
  lexicon: BDAG
  rationale: The participle modifies the 144,000 and is best rendered as a relative
    clause in natural English.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: BDAG
  rationale: Simple possessive English accurately reflects the genitive pronoun referring
    back to the Lamb.
- source_word: καὶ τὸ ὄνομα τοῦ πατρὸς αὐτοῦ
  chosen: and his Father's name
  alternatives:
  - and the name of his Father
  lexicon: BDAG
  rationale: Maintains the parallelism of the two names while using natural English
    possessive style. Capitalized 'Father' because it refers to God as the Father
    of the Lamb in a titular/divine sense.
- source_word: γεγραμμένον
  chosen: written
  alternatives:
  - inscribed
  lexicon: BDAG
  rationale: γράφω in the perfect passive participle here denotes the names as already
    written. 'Written' is the most direct and transparent rendering; 'inscribed' is
    possible but slightly more interpretive.
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  chosen: on their foreheads
  alternatives:
  - upon their foreheads
  lexicon: BDAG
  rationale: Direct, idiomatic rendering preserving the marked location imagery that
    contrasts with the beast's mark elsewhere in Revelation.
