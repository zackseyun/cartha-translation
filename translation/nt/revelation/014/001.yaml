theological_decisions:
- issue: Identity of τὸ ἀρνίον
  chosen_reading: Rendered as the christological title 'the Lamb' without paraphrastic
    expansion.
  alternative_readings:
  - the sacrificial Lamb
  rationale: The context in Revelation clearly identifies ἀρνίον as the exalted Christ,
    but the translation should not import additional theological descriptors not explicit
    in the verse. The title alone preserves the canonical theological resonance.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Relationship of the two names
  chosen_reading: Translated as 'his name and his Father's name,' preserving the distinction
    yet close association.
  alternative_readings:
  - his name, that is, his Father's name
  rationale: The Greek presents two coordinated objects, not an explicit apposition.
    The wording preserves both the distinction between the Lamb and his Father and
    their unity of allegiance/ownership without over-resolving the theology.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Text-critical reading of the inscription
  chosen_reading: Followed the SBLGNT reading 'his name and his Father's name.'
  alternative_readings:
  - his Father's name
  rationale: The main text includes both names. A notable textual variant omits 'his
    name' and reads only 'his Father's name'; because this affects the wording materially,
    it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #1 and #3'
