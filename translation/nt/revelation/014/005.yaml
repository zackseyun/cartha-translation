theological_decisions:
- issue: Rendering ἄμωμοί in a way that preserves holiness language without overstating
    sinlessness
  chosen_reading: blameless
  alternative_readings:
  - without blemish
  - faultless
  rationale: The term can evoke both sacrificial purity and moral integrity. 'Blameless'
    preserves the ethical sense in readable English while avoiding a potentially misleading
    implication of absolute metaphysical perfection. The sacrificial nuance is preserved
    in a footnote rather than elevated into the main text.
  doctrine_reference: Translation philosophy §§3, 6
