id: REV.14.5
reference: Revelation 14:5
source:
  edition: SBLGNT
  text: καὶ ⸂ἐν τῷ στόματι αὐτῶν οὐχ εὑρέθη⸃ ψεῦδος· ⸀ἄμωμοί εἰσιν.
translation:
  text: And in their mouth no lie was found; they are blameless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without blemish' or 'faultless'; the Greek term can carry sacrificial-purity
      imagery as well as moral blamelessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ στόματι αὐτῶν
  chosen: in their mouth
  alternatives:
  - on their lips
  - in their mouths
  lexicon: BDAG
  rationale: A close rendering preserves the singular στόματι with collective force.
    'In their mouth' is idiomatic enough in English and reflects the Greek expression
    for speech content. 'On their lips' is smoother but slightly more interpretive.
- source_word: οὐχ εὑρέθη
  chosen: no lie was found
  alternatives:
  - a lie was not found
  - they were found without falsehood
  lexicon: BDAG
  rationale: The aorist passive is retained with an impersonal/passive English construction.
    This preserves the Greek emphasis on the absence of deceit rather than making
    the clause more actively paraphrastic.
- source_word: ψεῦδος
  chosen: lie
  alternatives:
  - falsehood
  - deceit
  lexicon: BDAG
  rationale: '''Lie'' is the most direct and natural singular rendering. ''Falsehood''
    is possible and slightly broader; ''deceit'' leans toward character or intent
    rather than the stated absence of untruth in speech.'
- source_word: ἄμωμοί
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: ἄμωμος can denote being without blemish or moral fault. 'Blameless' communicates
    moral integrity in clear modern English. 'Without blemish' preserves sacrificial
    imagery more explicitly, and 'faultless' is also viable; because the imagery may
    be worth preserving, it is noted in a footnote.
- source_word: καὶ
  chosen: And
  alternatives:
  - —
  lexicon: BDAG
  rationale: The connective is retained to reflect the verse's continuation from the
    prior description rather than treating the statement as disconnected.
