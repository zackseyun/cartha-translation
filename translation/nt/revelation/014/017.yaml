theological_decisions:
- issue: Nature of the heavenly temple imagery
  chosen_reading: Render ναός straightforwardly as 'temple' without interpretive expansion.
  alternative_readings:
  - Render as 'sanctuary' to stress the inner shrine
  - Paraphrase as a symbolic heavenly dwelling place
  rationale: The verse presents apocalyptic imagery of a heavenly temple. The translation
    should preserve the image as stated rather than resolve whether the reference
    is architectural, symbolic, or liturgical. This maintains theological tension
    and avoids importing a specific interpretive scheme.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
