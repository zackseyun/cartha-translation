id: REV.14.17
reference: Revelation 14:17
source:
  edition: SBLGNT
  text: Καὶ ἄλλος ἄγγελος ἐξῆλθεν ἐκ τοῦ ναοῦ τοῦ ἐν τῷ οὐρανῷ, ἔχων καὶ αὐτὸς δρέπανον
    ὀξύ.
translation:
  text: And another angel came out from the temple in heaven, also having a sharp
    sickle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary in heaven.' The Greek ναός can refer more specifically to
      the inner temple or sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  chosen: another angel
  alternatives:
  - a different angel
  lexicon: BDAG
  rationale: ἄλλος commonly means 'another' of the same kind. 'Another angel' is the
    natural English rendering and fits the sequence of angelic figures in the vision.
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, denoting emergence from within. 'Came out' is idiomatic
    modern English and preserves the movement from the temple.
- source_word: ναοῦ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/sanctuary rather than the broader
    temple complex. 'Temple' is retained in the main text as the standard, readable
    rendering; 'sanctuary' is a viable alternative but not necessary here.
- source_word: τοῦ ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - that is in heaven
  - in the heavenly realm
  lexicon: BDAG
  rationale: The attributive phrase identifies the temple as located in heaven. 'In
    heaven' is concise and accurate; 'that is in heaven' is more explicit but less
    natural in English.
- source_word: ἔχων καὶ αὐτὸς
  chosen: also having
  alternatives:
  - he too had
  - also holding
  - himself also having
  lexicon: BDAG
  rationale: The participle ἔχων with καὶ αὐτός emphasizes that this angel, like the
    previous figure, possesses a sickle. 'Also having' preserves the participial linkage
    and the comparative emphasis without overtranslating.
- source_word: δρέπανον
  chosen: sickle
  alternatives:
  - reaping hook
  lexicon: BDAG
  rationale: δρέπανον denotes a sickle or harvesting blade. 'Sickle' is the standard
    and clearest English equivalent in this harvest-judgment context.
- source_word: ὀξύ
  chosen: sharp
  alternatives:
  - keen
  - sharp-edged
  lexicon: BDAG
  rationale: ὀξύ modifies the sickle and indicates its sharpness. 'Sharp' is direct,
    idiomatic, and preserves the vivid imagery.
