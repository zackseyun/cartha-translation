id: REV.14.3
reference: Revelation 14:3
source:
  edition: SBLGNT
  text: καὶ ᾄδουσιν ⸀ὡς ᾠδὴν καινὴν ἐνώπιον τοῦ θρόνου καὶ ἐνώπιον τῶν τεσσάρων ζῴων
    καὶ τῶν πρεσβυτέρων· καὶ οὐδεὶς ἐδύνατο μαθεῖν τὴν ᾠδὴν εἰ μὴ αἱ ἑκατὸν τεσσεράκοντα
    τέσσαρες χιλιάδες, οἱ ἠγορασμένοι ἀπὸ τῆς γῆς.
translation:
  text: And they are singing what seemed to be a new song before the throne and before
    the four living creatures and the elders. And no one was able to learn the song
    except the one hundred forty-four thousand, those who had been purchased from
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a new song' / 'like a new song.' The Greek uses appearance-language
      common in Revelation's visions.
    reason: lexical_alternative
  - marker: b
    text: Or 'redeemed from the earth.' The Greek verb is literally 'purchased' or
      'bought.'
    reason: alternative_reading
lexical_decisions:
- source_word: ᾄδουσιν
  chosen: they are singing
  alternatives:
  - they sing
  - they were singing
  lexicon: BDAG
  rationale: Present indicative plural; rendered with an English progressive to convey
    the vivid present common in Revelation's visionary narration while remaining natural
    English.
- source_word: ὡς
  chosen: what seemed to be
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: In this context ὡς modifies the manner/appearance of the song rather
    than asserting identity straightforwardly. 'What seemed to be' captures the visionary,
    appearance-language nuance better than a flat 'as' in modern English.
- source_word: ᾠδὴν καινὴν
  chosen: a new song
  lexicon: BDAG
  rationale: Standard rendering of the noun-adjective phrase; 'new' preserves the
    eschatological freshness implied by καινή without paraphrase.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and idiomatic, preserving the spatial/courtroom
    sense of being in the presence of the throne and heavenly beings.'
- source_word: θρόνου
  chosen: the throne
  lexicon: BDAG
  rationale: Definite article retained; in Revelation this refers to the heavenly
    throne central to the vision.
- source_word: τῶν τεσσάρων ζῴων
  chosen: the four living creatures
  alternatives:
  - the four creatures
  - the four living beings
  lexicon: BDAG
  rationale: ζῷον in Revelation conventionally denotes the exalted heavenly beings
    around the throne, not 'animals' or generic 'beasts'; 'living creatures' is the
    clearest established English equivalent.
- source_word: τῶν πρεσβυτέρων
  chosen: the elders
  alternatives:
  - the older ones
  lexicon: BDAG
  rationale: In Revelation πρεσβύτεροι functions as a recognized group designation
    in the heavenly court; 'elders' is the natural and contextually established rendering.
- source_word: οὐδεὶς ἐδύνατο
  chosen: no one was able
  alternatives:
  - no one could
  lexicon: BDAG
  rationale: This preserves the imperfect of ability with slightly more formal clarity
    than 'could,' while remaining natural.
- source_word: μαθεῖν
  chosen: to learn
  alternatives:
  - to master
  lexicon: BDAG
  rationale: μανθάνω primarily means 'learn'; no stronger interpretive gloss is needed.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: With an exceptive force after a negated clause, 'except' is the most
    natural English rendering.
- source_word: αἱ ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  chosen: the one hundred forty-four thousand
  alternatives:
  - the 144,000
  lexicon: BDAG
  rationale: Rendered in words for literary dignity and clarity; the article is preserved.
- source_word: οἱ ἠγορασμένοι
  chosen: those who had been purchased
  alternatives:
  - those who had been redeemed
  - those bought
  lexicon: BDAG
  rationale: ἀγοράζω literally means 'buy/purchase.' 'Purchased' preserves the commercial
    metaphor without importing the more interpretive theological term 'redeemed' into
    the main text.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: BDAG
  rationale: In Revelation γῆ commonly means 'earth' in the cosmic sense; 'land' is
    possible in some contexts but less likely here given the global-apocalyptic setting.
