theological_decisions:
- issue: Force of ὡς in the visionary description
  chosen_reading: 'appearance language: ''what seemed to be a new song'''
  alternative_readings:
  - '''as a new song'''
  - '''like a new song'''
  rationale: The text does not necessarily deny that it was truly a new song; rather,
    Revelation often uses ὡς to mark visionary perception. The rendering preserves
    that phenomenological nuance without making a theological claim about the song's
    ontological status.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ἠγορασμένοι
  chosen_reading: '''purchased'' rather than ''redeemed'''
  alternative_readings:
  - redeemed
  rationale: The verse uses marketplace language directly. 'Redeemed' is theologically
    familiar and contextually related, but it adds interpretive freight beyond the
    lexical core of ἀγοράζω. The main text therefore keeps the literal metaphor, with
    the theological alternative preserved in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; do not
    import doctrinal claims the text does not make.
