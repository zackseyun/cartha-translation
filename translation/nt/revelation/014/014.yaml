id: REV.14.14
reference: Revelation 14:14
source:
  edition: SBLGNT
  text: Καὶ εἶδον, καὶ ἰδοὺ νεφέλη λευκή, καὶ ἐπὶ τὴν νεφέλην καθήμενον ὅμοιον ⸀υἱὸν
    ἀνθρώπου, ἔχων ἐπὶ τῆς κεφαλῆς αὐτοῦ στέφανον χρυσοῦν καὶ ἐν τῇ χειρὶ αὐτοῦ δρέπανον
    ὀξύ.
translation:
  text: And I looked, and behold, a white cloud, and seated on the cloud was one like
    a son of man, having on his head a golden crown and in his hand a sharp sickle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one like the Son of Man.' The phrase echoes Daniel 7:13 and is commonly
      understood as a messianic title, though the Greek here reads anarthrously, 'like
      a son of man.'
    reason: alternative_reading
  - marker: b
    text: The Greek word for 'crown' here is stephanos, often a victor's wreath rather
      than a royal diadem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the vivid deictic force of John's visionary narration. 'Behold'
    is slightly elevated but still natural in apocalyptic context and signals sudden
    attention better than a flatter 'see.'
- source_word: νεφέλη λευκή
  chosen: a white cloud
  alternatives:
  - a bright cloud
  lexicon: BDAG
  rationale: Standard rendering of the noun-adjective phrase. 'White' preserves the
    lexical value of λευκή and the symbolic resonance in Revelation without interpretive
    expansion to 'bright.'
- source_word: ἐπὶ τὴν νεφέλην καθήμενον
  chosen: seated on the cloud
  alternatives:
  - sitting on the cloud
  lexicon: BDAG
  rationale: '''Seated'' is idiomatic, dignified, and fits the visionary scene. It
    preserves the participial idea of being in a seated position without unnecessary
    stiffness.'
- source_word: ὅμοιον υἱὸν ἀνθρώπου
  chosen: one like a son of man
  alternatives:
  - one like the Son of Man
  - one like a human son
  - one like a son of humanity
  lexicon: BDAG
  rationale: The Greek lacks the article before υἱὸν, so 'a son of man' more closely
    reflects the wording than the traditional titular 'the Son of Man.' The introductory
    'one like' captures ὅμοιον. This preserves the Danielic allusion while avoiding
    importing a more explicit christological title than the Greek here states.
- source_word: στέφανον χρυσοῦν
  chosen: a golden crown
  alternatives:
  - a gold crown
  - a golden victor's wreath
  lexicon: BDAG
  rationale: στέφανος commonly denotes a wreath/crown of victory rather than a royal
    diadem, but in normal English 'golden crown' is the clearest natural rendering.
    The more specific nuance can be preserved in a footnote.
- source_word: δρέπανον ὀξύ
  chosen: a sharp sickle
  alternatives:
  - a sharp reaping hook
  lexicon: BDAG
  rationale: Standard and transparent rendering for harvesting imagery. 'Sickle' is
    familiar modern English and fits the immediate harvest context of the passage.
