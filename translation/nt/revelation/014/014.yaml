theological_decisions:
- issue: Whether to render υἱὸν ἀνθρώπου as an explicit christological title
  chosen_reading: Rendered 'one like a son of man' in the main text
  alternative_readings:
  - one like the Son of Man
  rationale: In keeping with original-language primacy, the anarthrous Greek is not
    strengthened into the fixed English title in the main text. At the same time,
    the phrase strongly echoes Daniel 7:13 and is widely understood christologically
    in context, so that alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
