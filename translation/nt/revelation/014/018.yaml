id: REV.14.18
reference: Revelation 14:18
source:
  edition: SBLGNT
  text: καὶ ἄλλος ⸀ἄγγελος ἐκ τοῦ θυσιαστηρίου, ⸀ὁ ἔχων ἐξουσίαν ἐπὶ τοῦ πυρός, καὶ
    ἐφώνησεν ⸀φωνῇ μεγάλῃ τῷ ἔχοντι τὸ δρέπανον τὸ ὀξὺ λέγων· Πέμψον σου τὸ δρέπανον
    τὸ ὀξὺ καὶ τρύγησον τοὺς βότρυας τῆς ἀμπέλου τῆς γῆς, ὅτι ἤκμασαν αἱ σταφυλαὶ
    αὐτῆς.
translation:
  text: And another angel came out from the altar, the one who has authority over
    the fire, and he called out with a loud voice to the one who had the sharp sickle,
    saying, “Send out your sharp sickle and gather the clusters of the vine of the
    earth, because its grapes are ripe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Put in your sharp sickle.' The Greek verb is literally 'send,' but in
      harvest imagery some render it idiomatically as 'put in.'
    reason: lexical_alternative
  - marker: b
    text: '''The vine of the earth'' is an apocalyptic image; the text does not explicitly
      identify the referent here, though the surrounding context is one of judgment.'
    reason: cross_reference
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  chosen: another angel
  alternatives:
  - another messenger
  lexicon: BDAG
  rationale: In Revelation, ἄγγελος in visionary scenes normally refers to an angelic
    being rather than a human messenger. 'Another angel' preserves the sequential
    narrative force of ἄλλος.
- source_word: ἐκ τοῦ θυσιαστηρίου
  chosen: from the altar
  alternatives:
  - out of the altar
  lexicon: BDAG
  rationale: θυσιαστήριον is best rendered 'altar.' 'From the altar' is idiomatic
    English while preserving the source image of emergence associated with the heavenly
    altar.
- source_word: ὁ ἔχων ἐξουσίαν ἐπὶ τοῦ πυρός
  chosen: the one who has authority over the fire
  alternatives:
  - who had authority over the fire
  - the one having authority over the fire
  lexicon: BDAG
  rationale: The articular participle identifies this angel descriptively. Present
    tense 'has' reflects ἔχων. ἐξουσίαν ἐπὶ conveys delegated authority or control
    with respect to the fire; 'over the fire' is the most natural rendering.
- source_word: ἐφώνησεν φωνῇ μεγάλῃ
  chosen: called out with a loud voice
  alternatives:
  - cried out with a loud voice
  - shouted with a loud voice
  lexicon: BDAG
  rationale: The phrase is a common Semitic/Greek idiom. 'Called out' is natural modern
    English and preserves the force without sounding overly colloquial. 'With a loud
    voice' keeps the explicit noun φωνή rather than reducing it to an adverb.
- source_word: τῷ ἔχοντι τὸ δρέπανον τὸ ὀξὺ
  chosen: to the one who had the sharp sickle
  alternatives:
  - to the one having the sharp sickle
  lexicon: BDAG
  rationale: The dative participial phrase identifies the addressed figure. English
    past 'had' fits the narrative frame after 'called out.' δρέπανον is 'sickle,'
    and ὀξύ is retained as 'sharp' because it is repeated for emphasis in the verse.
- source_word: Πέμψον σου τὸ δρέπανον τὸ ὀξὺ
  chosen: Send out your sharp sickle
  alternatives:
  - Put in your sharp sickle
  - Swing your sharp sickle
  lexicon: BDAG
  rationale: 'πέμπω literally means ''send.'' In harvest contexts some English versions
    idiomatically use ''put in,'' but ''send out'' better reflects the Greek verb
    while remaining intelligible. σου is possessive: ''your sharp sickle.'''
- source_word: τρύγησον
  chosen: gather
  alternatives:
  - harvest
  - cut off
  - vintage
  lexicon: BDAG
  rationale: τρυγάω specifically refers to gathering grapes. Since the object is explicitly
    'clusters,' 'gather' communicates the viticultural action clearly without redundancy.
    'Harvest' is possible but broader.
- source_word: τοὺς βότρυας
  chosen: the clusters
  alternatives:
  - the grape clusters
  - the bunches
  lexicon: BDAG
  rationale: βότρυς denotes a cluster or bunch of grapes. Because the following clause
    mentions grapes explicitly, 'the clusters' is sufficient and avoids overtranslation.
- source_word: τῆς ἀμπέλου τῆς γῆς
  chosen: of the vine of the earth
  alternatives:
  - of the earth's vine
  - from the vine of the earth
  lexicon: BDAG
  rationale: The double genitive is preserved as closely as possible. 'Vine of the
    earth' keeps the apocalyptic imagery and avoids prematurely interpreting the phrase
    beyond the text.
- source_word: ἤκμασαν
  chosen: are ripe
  alternatives:
  - have ripened
  - are fully ripe
  lexicon: BDAG
  rationale: ἀκμάζω here denotes reaching full maturity. 'Are ripe' is natural English
    and fits the explanatory ὅτι clause. 'Fully ripe' is interpretive intensification
    not required by the verb alone.
- source_word: αἱ σταφυλαὶ αὐτῆς
  chosen: its grapes
  alternatives:
  - her grapes
  lexicon: BDAG
  rationale: σταφυλαί means 'grapes.' English normally uses 'its' for an inanimate
    antecedent ('the vine'), though Greek feminine agreement could be represented
    as 'her'; 'its' is more idiomatic without loss of meaning.
