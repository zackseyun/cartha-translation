theological_decisions:
- issue: Retention of apocalyptic metaphor in τῆς ἀμπέλου τῆς γῆς
  chosen_reading: Rendered literally as 'the vine of the earth' rather than interpreting
    it as humanity or the wicked in the main text.
  alternative_readings:
  - the earth's vine interpreted as the wicked of the earth
  - the vine growing on the earth
  rationale: The immediate context strongly suggests judgment imagery, but the verse
    itself presents the metaphor rather than its theological unpacking. Per translation
    philosophy, the draft preserves the image and does not import a fuller doctrinal
    interpretation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
