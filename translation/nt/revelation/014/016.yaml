id: REV.14.16
reference: Revelation 14:16
source:
  edition: SBLGNT
  text: καὶ ἔβαλεν ὁ καθήμενος ἐπὶ ⸂τῆς νεφέλης⸃ τὸ δρέπανον αὐτοῦ ἐπὶ τὴν γῆν, καὶ
    ἐθερίσθη ἡ γῆ.
translation:
  text: And the one seated on the cloud swung his sickle over the earth, and the earth
    was harvested.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast his sickle onto the earth.' The Greek verb is literally 'threw/cast,'
      but in this harvesting context it refers to setting the sickle in motion for
      reaping.
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth was reaped.'
    reason: lexical_alternative
  - marker: c
    text: The one seated on the cloud is often identified from the preceding context
      as the Son of Man, though the verse itself states only 'the one seated on the
      cloud.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔβαλεν
  chosen: swung
  alternatives:
  - threw
  - cast
  - put in
  lexicon: BDAG
  rationale: Although βάλλω commonly means 'throw/cast,' with δρέπανον ('sickle')
    in a harvesting context the sense is idiomatic for putting the sickle in motion
    to reap. 'Swung' communicates the action naturally in English without obscuring
    the concrete imagery.
- source_word: ὁ καθήμενος ἐπὶ τῆς νεφέλης
  chosen: the one seated on the cloud
  alternatives:
  - the one sitting on the cloud
  - he who sat on the cloud
  lexicon: BDAG
  rationale: The substantival participle is best rendered explicitly as 'the one seated.'
    This preserves the Greek construction and avoids prematurely identifying the figure
    beyond what the verse itself states.
- source_word: νεφέλης
  chosen: the cloud
  alternatives:
  - a cloud
  lexicon: BDAG
  rationale: The article supports 'the cloud.' In context this refers back to the
    previously mentioned cloud, so the definite form is appropriate.
- source_word: δρέπανον
  chosen: sickle
  alternatives:
  - reaping hook
  lexicon: BDAG
  rationale: '''Sickle'' is the standard, clear English equivalent for the harvesting
    implement and preserves the agricultural/judgment imagery.'
- source_word: ἐπὶ τὴν γῆν
  chosen: over the earth
  alternatives:
  - upon the earth
  - onto the earth
  lexicon: BDAG
  rationale: With the verb and harvesting image, ἐπί here indicates direction toward
    the earth in the act of reaping. 'Over the earth' reads naturally in English and
    fits the image of swinging the sickle across the earth.
- source_word: ἐθερίσθη
  chosen: was harvested
  alternatives:
  - was reaped
  lexicon: BDAG
  rationale: The passive aorist of θερίζω means 'was harvested/reaped.' 'Was harvested'
    is slightly more natural for modern readers while retaining the passive sense.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In Revelation's cosmic-apocalyptic context, γῆ is best taken as 'earth'
    rather than a localized 'land.' The repetition of γῆ in the verse is preserved
    for emphasis.
