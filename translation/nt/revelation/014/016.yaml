theological_decisions:
- issue: Identity of the reaper seated on the cloud
  chosen_reading: Render descriptively without making the identification explicit
    in the translation.
  alternative_readings:
  - This figure is the Son of Man / Messiah from the preceding context
  - This figure is an angelic agent acting under divine command
  rationale: The immediate Greek text identifies the figure only as 'the one seated
    on the cloud.' Because interpreters differ on whether the reaper is explicitly
    Christ or an angelic representative, the translation preserves the wording of
    the verse and does not import an interpretive identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
