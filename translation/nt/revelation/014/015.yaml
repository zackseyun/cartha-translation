theological_decisions:
- issue: Identity of 'the one seated on the cloud' and the angel's command
  chosen_reading: Render the phrase neutrally as 'the one seated on the cloud' without
    importing an explicit christological identification into the translation.
  alternative_readings:
  - an implicit reference to the Son of Man / Messiah from the previous verse
  rationale: The immediate Greek expression itself is descriptive, not titular. While
    the wider context strongly suggests the figure introduced in 14:14, the translation
    should not add interpretive identification not stated in this verse. This preserves
    theological tension and lets context do the work.
  doctrine_reference: Preserve theological tension rather than resolve it.
