id: REV.14.15
reference: Revelation 14:15
source:
  edition: SBLGNT
  text: καὶ ἄλλος ἄγγελος ἐξῆλθεν ἐκ τοῦ ναοῦ κράζων ἐν φωνῇ μεγάλῃ τῷ καθημένῳ ἐπὶ
    τῆς νεφέλης· Πέμψον τὸ δρέπανόν σου καὶ θέρισον, ὅτι ἦλθεν ἡ ὥρα θερίσαι, ὅτι
    ἐξηράνθη ὁ θερισμὸς τῆς γῆς.
translation:
  text: And another angel came out from the sanctuary, crying out with a loud voice
    to the one seated on the cloud, “Send your sickle and reap, because the hour to
    reap has come, because the harvest of the earth is ripe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'because the harvest of the earth has dried up.' The
      Greek expression uses the image of drying grain to indicate readiness for reaping.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  chosen: another angel
  alternatives:
  - another messenger
  lexicon: BDAG
  rationale: ἄλλος marks an additional figure of the same kind; ἄγγελος in Revelation
    normally refers to an angelic being, not merely a human messenger, so 'another
    angel' is the most natural rendering.
- source_word: ναοῦ
  chosen: sanctuary
  alternatives:
  - temple
  lexicon: BDAG
  rationale: ναός often denotes the inner sanctuary/shrine rather than the broader
    temple complex (ἱερόν). In Revelation's heavenly setting, 'sanctuary' better preserves
    that specificity while remaining readable.
- source_word: κράζων ἐν φωνῇ μεγάλῃ
  chosen: crying out with a loud voice
  alternatives:
  - shouting in a loud voice
  - calling out with a great voice
  lexicon: BDAG
  rationale: κράζω is a strong vocal utterance; the idiom ἐν φωνῇ μεγάλῃ is naturally
    rendered 'with a loud voice.' 'Crying out' preserves the force without sounding
    archaic.
- source_word: τῷ καθημένῳ ἐπὶ τῆς νεφέλης
  chosen: to the one seated on the cloud
  alternatives:
  - to him who sat on the cloud
  - to the one sitting on the cloud
  lexicon: BDAG
  rationale: The participle with article functions substantivally. 'The one seated'
    is idiomatic English and preserves the stative sense of the middle/passive participle.
- source_word: Πέμψον
  chosen: Send
  alternatives:
  - Put forth
  - Swing
  lexicon: BDAG
  rationale: πέμπω literally means 'send.' Although in context it refers to dispatching
    the sickle into action, 'send' preserves the Greek image more directly than interpretive
    alternatives like 'swing.'
- source_word: δρέπανον
  chosen: sickle
  alternatives:
  - reaping hook
  lexicon: BDAG
  rationale: δρέπανον is the standard harvesting implement; 'sickle' is the clear
    modern equivalent.
- source_word: θέρισον
  chosen: reap
  alternatives:
  - harvest
  lexicon: BDAG
  rationale: As an imperative from θερίζω, 'reap' is the direct verbal equivalent
    and pairs naturally with 'sickle.'
- source_word: ἦλθεν ἡ ὥρα θερίσαι
  chosen: the hour to reap has come
  alternatives:
  - the hour has come to reap
  lexicon: BDAG
  rationale: Either English order is possible; this wording keeps the Greek emphasis
    on 'the hour' while remaining natural.
- source_word: ἐξηράνθη
  chosen: is ripe
  alternatives:
  - has dried up
  - is overripe
  - has withered
  lexicon: BDAG
  rationale: ξηραίνω literally means 'dry up/wither,' but in harvest contexts the
    drying indicates readiness for reaping. 'Is ripe' communicates the agricultural
    sense intended here in clear English; the more literal possibility is worth preserving
    in a footnote.
- source_word: ὁ θερισμὸς τῆς γῆς
  chosen: the harvest of the earth
  alternatives:
  - the earth's harvest
  lexicon: BDAG
  rationale: θερισμός denotes the harvest/crop to be reaped. The genitive τῆς γῆς
    is rendered straightforwardly as 'of the earth,' fitting Revelation's elevated
    style.
