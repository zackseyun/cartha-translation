theological_decisions:
- issue: Whether to preserve the image as hyperbolic-apocalyptic symbolism or soften
    it into explanatory language
  chosen_reading: Retain the concrete imagery of blood, horses’ bridles, and stadia
    without interpretive smoothing.
  alternative_readings:
  - Paraphrase as a symbolic statement of overwhelming judgment
  rationale: The verse presents a deliberately graphic apocalyptic judgment image.
    Optimal equivalence here favors preserving the imagery rather than resolving its
    symbolic force in translation.
  doctrine_reference: Translation philosophy §1, §3, §6
