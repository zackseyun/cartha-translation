id: REV.14.20
reference: Revelation 14:20
source:
  edition: SBLGNT
  text: καὶ ἐπατήθη ἡ ληνὸς ἔξωθεν τῆς πόλεως, καὶ ἐξῆλθεν αἷμα ἐκ τῆς ληνοῦ ἄχρι
    τῶν χαλινῶν τῶν ἵππων ἀπὸ σταδίων χιλίων ἑξακοσίων.
translation:
  text: And the winepress was trodden outside the city, and blood came out from the
    winepress up to the horses’ bridles, for one thousand six hundred stadia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; 1,600 stadia is roughly 184 miles
      or 296 kilometers.
    reason: cultural_note
  - marker: b
    text: Or 'blood flowed out from the winepress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπατήθη
  chosen: was trodden
  alternatives:
  - was trampled
  - was pressed
  lexicon: BDAG
  rationale: Passive of πατέω, literally 'was trodden/trampled.' 'Was trodden' preserves
    the winepress imagery more directly than the more general 'was trampled,' while
    remaining intelligible in English.
- source_word: ληνός / ληνοῦ
  chosen: winepress
  alternatives:
  - wine vat
  - press
  lexicon: BDAG
  rationale: Standard term for a winepress. 'Winepress' preserves the apocalyptic
    harvest/judgment imagery and is the most natural established English equivalent.
- source_word: ἔξωθεν τῆς πόλεως
  chosen: outside the city
  alternatives:
  - outside of the city
  lexicon: BDAG
  rationale: Straightforward spatial expression. 'Outside the city' is idiomatic and
    formally close.
- source_word: ἐξῆλθεν αἷμα
  chosen: blood came out
  alternatives:
  - blood flowed out
  - blood went out
  lexicon: BDAG
  rationale: The verb ἐξέρχομαι means 'come/go out.' 'Came out' is the most direct
    rendering; 'flowed out' is interpretive, though contextually plausible. The main
    text keeps the source wording tighter.
- source_word: ἄχρι τῶν χαλινῶν τῶν ἵππων
  chosen: up to the horses’ bridles
  alternatives:
  - as high as the horses’ bridles
  - to the bridles of the horses
  lexicon: BDAG
  rationale: ἄχρι marks extent. 'Up to the horses’ bridles' is natural English and
    preserves the vivid measure of depth.
- source_word: ἀπὸ σταδίων χιλίων ἑξακοσίων
  chosen: for one thousand six hundred stadia
  alternatives:
  - for 1,600 stadia
  - for a distance of one thousand six hundred stadia
  - for about 184 miles
  lexicon: BDAG
  rationale: στάδιον is an ancient unit of distance. The translation keeps the original
    measure rather than converting it, preserving textual specificity and avoiding
    interpretive precision. 'For' best conveys the extent over which the blood spread;
    'from' would be awkward in English here.
