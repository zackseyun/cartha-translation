theological_decisions:
- issue: Meaning of τὴν πίστιν Ἰησοῦ
  chosen_reading: the faith of Jesus
  alternative_readings:
  - faith in Jesus
  - the faithfulness of Jesus
  rationale: 'The phrase is genuinely ambiguous: it may denote faith directed toward
    Jesus (objective genitive) or faith/faithfulness associated with Jesus (subjective
    or plenary nuance). In keeping with the doctrine''s instruction to preserve theological
    tension, the main text stays close to the Greek with ''the faith of Jesus,'' while
    the more interpretive alternatives are preserved in a footnote.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table
    for πίστις'
