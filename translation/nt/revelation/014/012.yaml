id: REV.14.12
reference: Revelation 14:12
source:
  edition: SBLGNT
  text: Ὧδε ἡ ὑπομονὴ τῶν ἁγίων ἐστίν, οἱ τηροῦντες τὰς ἐντολὰς τοῦ θεοῦ καὶ τὴν πίστιν
    Ἰησοῦ.
translation:
  text: 'Here is the endurance of the saints: those who keep the commandments of God
    and the faith of Jesus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faith in Jesus'; alternatively, 'the faithfulness of Jesus.' The Greek
      phrase is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὧδε
  chosen: Here
  alternatives:
  - Herein
  - In this
  lexicon: BDAG
  rationale: Deictic adverb pointing to the present circumstance or point just described.
    'Here' is natural modern English and preserves the rhetorical force.
- source_word: ὑπομονὴ
  chosen: endurance
  alternatives:
  - patient endurance
  - steadfastness
  - perseverance
  lexicon: BDAG
  rationale: The noun denotes steadfast persistence under trial. 'Endurance' is concise
    and natural; 'patient endurance' is possible but slightly interpretive and redundant
    in English.
- source_word: ἁγίων
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: Standard NT designation for God's holy people. 'Saints' is idiomatic
    and recognizable; 'holy ones' is more literal but less natural here.
- source_word: τηροῦντες
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: In this context the participle refers to obeying or keeping God's commandments.
    'Keep' is the most natural and established rendering without losing the sense
    of faithful observance.
- source_word: ἐντολὰς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: Refers to divine commands. 'Commandments' preserves the weight and biblical
    resonance of the term, especially with the genitive 'of God.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text, while
    alternatives are preserved in a footnote where the construction is contested.
- source_word: Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - in Jesus
  - Jesus'
  lexicon: BDAG
  rationale: The genitive Ἰησοῦ is most directly represented by 'of Jesus.' Because
    πίστις + genitive is a contested construction, a more interpretive rendering such
    as 'faith in Jesus' is preserved in a footnote rather than adopted silently.
