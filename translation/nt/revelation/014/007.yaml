id: REV.14.7
reference: Revelation 14:7
source:
  edition: SBLGNT
  text: λέγων ἐν φωνῇ μεγάλῃ· Φοβήθητε τὸν ⸀θεὸν καὶ δότε αὐτῷ δόξαν, ὅτι ἦλθεν ἡ
    ὥρα τῆς κρίσεως αὐτοῦ, καὶ προσκυνήσατε ⸂τῷ ποιήσαντι⸃ τὸν οὐρανὸν καὶ τὴν γῆν
    ⸀καὶ θάλασσαν καὶ πηγὰς ὑδάτων.
translation:
  text: saying with a loud voice, “Fear God and give him glory, because the hour of
    his judgment has come, and worship the one who made heaven and earth and sea and
    springs of waters.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere God.' The Greek verb can denote reverential fear as well as fear
      in the face of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'springs of water.' The Greek literally has 'springs of waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων ἐν φωνῇ μεγάλῃ
  chosen: saying with a loud voice
  alternatives:
  - saying in a loud voice
  - saying loudly
  lexicon: BDAG
  rationale: Retains the participial connection to the previous clause while using
    natural English. 'With a loud voice' closely reflects ἐν φωνῇ μεγάλῃ without flattening
    it to a mere adverb.
- source_word: Φοβήθητε
  chosen: Fear
  alternatives:
  - Revere
  - Be afraid of
  lexicon: BDAG
  rationale: The aorist passive imperative of φοβέομαι here calls for reverential
    fear before God in a worship/judgment context. 'Fear' preserves the biblical-theological
    weight better than the softer 'revere,' while 'be afraid of' overstates mere terror.
- source_word: τὸν θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of the imperative; standard rendering with no article carried
    into English.
- source_word: δότε αὐτῷ δόξαν
  chosen: give him glory
  alternatives:
  - give glory to him
  - honor him
  lexicon: BDAG
  rationale: A conventional biblical expression that preserves the concrete force
    of δόξαν rather than reducing it to the broader 'honor.' Word order is adjusted
    for idiomatic English.
- source_word: ὅτι ἦλθεν ἡ ὥρα
  chosen: because the hour ... has come
  alternatives:
  - for the hour ... has come
  - because the time ... has come
  lexicon: BDAG
  rationale: ὅτι is rendered causally as 'because' in this exhortational context.
    'Hour' is retained rather than generalized to 'time,' preserving the apocalyptic
    immediacy of ὥρα.
- source_word: τῆς κρίσεως αὐτοῦ
  chosen: of his judgment
  alternatives:
  - for his judgment
  - of the judgment by him
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered as possession/source: the judgment
    belonging to or issued by God. ''His judgment'' is concise and idiomatic.'
- source_word: προσκυνήσατε
  chosen: worship
  alternatives:
  - bow down before
  - pay homage to
  lexicon: BDAG
  rationale: In Revelation this verb regularly denotes worship in a religious sense.
    'Worship' best matches the context and avoids undertranslating the theological
    force.
- source_word: τῷ ποιήσαντι
  chosen: the one who made
  alternatives:
  - him who made
  - the maker of
  lexicon: BDAG
  rationale: The substantival participle is well represented by 'the one who made.'
    This preserves the verbal force of ποιέω and reads naturally in English.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν καὶ θάλασσαν
  chosen: heaven and earth and sea
  alternatives:
  - the heaven and the earth and sea
  - sky and land and sea
  lexicon: BDAG
  rationale: This echoes creation language familiar from Scripture. 'Heaven and earth
    and sea' is both accurate and stylistically fitting.
- source_word: πηγὰς ὑδάτων
  chosen: springs of waters
  alternatives:
  - springs of water
  - water springs
  - fountains of waters
  lexicon: BDAG
  rationale: A relatively literal rendering preserves the plural expression and the
    elevated style of the verse. 'Springs of water' is smoother English, but 'springs
    of waters' better reflects the Greek plural ὑδάτων.
