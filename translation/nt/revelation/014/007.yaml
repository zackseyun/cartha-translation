theological_decisions:
- issue: Nature of the command Φοβήθητε τὸν θεόν
  chosen_reading: Fear God
  alternative_readings:
  - Revere God
  rationale: The verse combines fear, giving glory, and worship in the context of
    impending judgment. 'Fear' preserves the tension of reverence and dread before
    the Creator-Judge rather than resolving it into mere respect.
  doctrine_reference: Preserve theological tension rather than resolve it.
