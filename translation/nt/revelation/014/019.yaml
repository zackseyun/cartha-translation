theological_decisions:
- issue: Nature of the harvest image
  chosen_reading: Render the imagery straightforwardly as a harvest of the earth's
    vine cast into God's winepress, without allegorical expansion in the main text.
  alternative_readings:
  - Interpret the vine explicitly as the wicked of the earth
  - Interpret the harvest more generally as end-time judgment
  rationale: The verse clearly depicts divine judgment, especially through the 'winepress
    of the wrath of God,' but the translation should not import a fuller interpretive
    paraphrase into the main text. The imagery is left intact for readers while preserving
    the judgment motif inherent in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
