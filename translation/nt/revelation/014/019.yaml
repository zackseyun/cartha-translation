id: REV.14.19
reference: Revelation 14:19
source:
  edition: SBLGNT
  text: καὶ ἔβαλεν ὁ ἄγγελος τὸ δρέπανον αὐτοῦ εἰς τὴν γῆν, καὶ ἐτρύγησεν τὴν ἄμπελον
    τῆς γῆς, καὶ ἔβαλεν εἰς τὴν ληνὸν τοῦ θυμοῦ τοῦ θεοῦ τὸν μέγαν.
translation:
  text: And the angel swung his sickle over the earth, and harvested the vine of the
    earth, and threw it into the great winepress of the wrath of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw his sickle onto the earth.' The Greek is more literally 'threw/cast,'
      but here it refers to using the sickle for reaping.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  chosen: swung
  alternatives:
  - threw
  - cast
  lexicon: BDAG
  rationale: Although βάλλω commonly means 'throw' or 'cast,' with δρέπανον ('sickle')
    and εἰς τὴν γῆν the sense is the action of putting the sickle into use over/upon
    the earth for reaping. 'Swung his sickle over the earth' gives idiomatic English
    while preserving the harvesting image better than the overly literal 'threw his
    sickle into the earth.'
- source_word: δρέπανον
  chosen: sickle
  alternatives:
  - reaping hook
  lexicon: BDAG
  rationale: Standard term for a harvesting blade. 'Sickle' is the clearest modern
    equivalent and fits the apocalyptic harvest imagery.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In Revelation, γῆ frequently carries the broader cosmic sense 'earth'
    rather than merely a local 'land.' Retaining 'earth' also preserves the repeated
    phraseology in this verse ('the vine of the earth').
- source_word: ἐτρύγησεν
  chosen: harvested
  alternatives:
  - gathered
  - cut down
  - picked the grapes of
  lexicon: BDAG
  rationale: The verb τρυγάω is specifically used of gathering ripe produce, especially
    grapes. 'Harvested' is natural English and broad enough to avoid over-specifying
    while still fitting the vine imagery. The grape-specific nuance is then reinforced
    by 'winepress' in the same verse.
- source_word: ἄμπελον τῆς γῆς
  chosen: the vine of the earth
  alternatives:
  - the earth's vine
  - the vineyard of the earth
  lexicon: BDAG
  rationale: ἄμπελος is 'vine,' not 'vineyard.' The genitive τῆς γῆς is preserved
    straightforwardly as 'of the earth' to maintain the imagery and the repeated earth-language
    of the passage.
- source_word: ληνός
  chosen: winepress
  alternatives:
  - wine vat
  lexicon: BDAG
  rationale: The standard rendering in judgment contexts and the clearest image for
    modern readers. It also preserves the intertextual connection to prophetic winepress-of-wrath
    imagery.
- source_word: θυμός
  chosen: wrath
  alternatives:
  - fury
  - anger
  lexicon: BDAG
  rationale: In Revelation, θυμός regularly denotes intense divine wrath/judgment.
    'Wrath' best preserves the theological and eschatological force without sounding
    merely emotional.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: A direct genitive construction; no reason to paraphrase. This keeps the
    source of the wrath explicit.
- source_word: τὸν μέγαν
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: BDAG
  rationale: The adjective modifies ληνόν and is placed after the noun in Greek. In
    English, 'the great winepress' is the most natural rendering and preserves the
    solemn, elevated tone.
