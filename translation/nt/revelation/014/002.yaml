id: REV.14.2
reference: Revelation 14:2
source:
  edition: SBLGNT
  text: καὶ ἤκουσα φωνὴν ἐκ τοῦ οὐρανοῦ ὡς φωνὴν ὑδάτων πολλῶν καὶ ὡς φωνὴν βροντῆς
    μεγάλης, καὶ ἡ φωνὴ ἣν ἤκουσα ὡς κιθαρῳδῶν κιθαριζόντων ἐν ταῖς κιθάραις αὐτῶν.
translation:
  text: And I heard a sound from heaven like the sound of many waters and like the
    sound of loud thunder, and the sound that I heard was like harpists playing on
    their harps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'voice' in each occurrence of 'sound'; the Greek word φωνή can mean either,
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Many waters'' is a biblical image for a vast, overwhelming roar; compare
      Ezekiel 43:2.'
    reason: cross_reference
  - marker: c
    text: The Greek κιθάρα refers to an ancient stringed instrument, closer to a lyre;
      traditionally rendered 'harp.'
    reason: cultural_note
lexical_decisions:
- source_word: φωνή
  chosen: sound
  alternatives:
  - voice
  lexicon: BDAG
  rationale: Repeated φωνή here describes an auditory phenomenon compared to waters,
    thunder, and instrumental music. 'Sound' fits the nonverbal, acoustic emphasis
    better than 'voice,' especially in the first and third occurrences, while remaining
    natural English.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός in Revelation commonly refers to the heavenly realm, not merely
    the physical sky. 'From heaven' is the most idiomatic and contextually appropriate
    rendering.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: ὡς introduces similes throughout the verse. 'Like' communicates comparison
    clearly in contemporary English.
- source_word: ὑδάτων πολλῶν
  chosen: many waters
  alternatives:
  - great waters
  - rushing waters
  lexicon: BDAG
  rationale: This is a conventional biblical image for a powerful, overwhelming sound.
    'Many waters' preserves the source wording and intertextual resonance better than
    more interpretive alternatives.
- source_word: βροντῆς μεγάλης
  chosen: loud thunder
  alternatives:
  - great thunder
  - mighty thunder
  lexicon: BDAG
  rationale: μέγας with thunder describes magnitude/intensity. 'Loud thunder' gives
    natural English while preserving the force of the image.
- source_word: κιθαρῳδῶν
  chosen: harpists
  alternatives:
  - lyre-singers
  - musicians
  lexicon: BDAG
  rationale: κιθαρῳδός denotes one associated with the κιθάρα, traditionally a singer
    to harp accompaniment, but in this context the following participle κιθαριζόντων
    specifies instrumental playing. 'Harpists' is the clearest concise rendering in
    English.
- source_word: κιθαριζόντων
  chosen: playing
  alternatives:
  - plucking
  - making music
  lexicon: BDAG
  rationale: The participle explicitly describes playing the instrument. 'Playing'
    is straightforward and idiomatic without adding interpretive detail.
- source_word: ἐν ταῖς κιθάραις αὐτῶν
  chosen: on their harps
  alternatives:
  - with their harps
  lexicon: BDAG
  rationale: English idiom prefers 'play on' an instrument here. κιθάρα is conventionally
    rendered 'harp' in Revelation; while the ancient instrument is closer to a lyre,
    'harp' remains the most recognizable established equivalent in this context.
