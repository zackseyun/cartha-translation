theological_decisions:
- issue: Nature of the heavenly auditory phenomenon
  chosen_reading: Render φωνή as 'sound' rather than 'voice' throughout the verse.
  alternative_readings:
  - Render φωνή as 'voice' throughout the verse
  - Mix 'voice' and 'sound' across occurrences
  rationale: The verse emphasizes likeness to impersonal but powerful sounds (many
    waters, thunder) and then to instrumental music. Translating φωνή as 'sound' avoids
    implying a speaking person where the text does not specify one, thus preserving
    the text's imagery without importing a more personal referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
