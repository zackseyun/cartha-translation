id: REV.14.4
reference: Revelation 14:4
source:
  edition: SBLGNT
  text: οὗτοί εἰσιν οἳ μετὰ γυναικῶν οὐκ ἐμολύνθησαν, παρθένοι γάρ εἰσιν· ⸀οὗτοι οἱ
    ἀκολουθοῦντες τῷ ἀρνίῳ ὅπου ἂν ⸀ὑπάγῃ· ⸁οὗτοι ἠγοράσθησαν ἀπὸ τῶν ἀνθρώπων ἀπαρχὴ
    τῷ θεῷ καὶ τῷ ἀρνίῳ,
translation:
  text: These are the ones who have not defiled themselves with women, for they are
    virgins. These are the ones who follow the Lamb wherever he goes. These were purchased
    from among mankind as firstfruits to God and to the Lamb,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, this imagery signifies spiritual purity or freedom from idolatrous
      defilement rather than making only a literal statement about sexual abstinence.
    reason: alternative_reading
  - marker: b
    text: Or 'from among humanity' or 'from among people.' The Greek refers to human
      beings generally, not specifically males.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμολύνθησαν
  chosen: have not defiled themselves
  alternatives:
  - were not defiled
  - have not been polluted
  lexicon: BDAG
  rationale: μολύνω carries the sense of defilement/pollution, often with moral or
    cultic overtones. English 'defiled themselves' communicates the reflexive sense
    naturally in context, even though the Greek is passive, because the phrase concerns
    their state in relation to sexual contact.
- source_word: μετὰ γυναικῶν
  chosen: with women
  alternatives:
  - by women
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with.' γυνή can mean 'woman' or
    'wife'; here the plural is best rendered 'women' rather than 'wives,' since the
    text is not explicitly about marital status but sexual contact more broadly.
- source_word: παρθένοι
  chosen: virgins
  alternatives:
  - chaste ones
  lexicon: BDAG
  rationale: παρθένος most directly means 'virgin.' Retaining the concrete term preserves
    the text's imagery and avoids interpretive paraphrase into a merely metaphorical
    category such as 'chaste.'
- source_word: ἀκολουθοῦντες
  chosen: follow
  alternatives:
  - keep following
  lexicon: BDAG
  rationale: The present participle denotes ongoing characteristic action. Simple
    English present 'follow' captures the sense idiomatically without overloading
    the line.
- source_word: ἀρνίῳ
  chosen: the Lamb
  lexicon: BDAG
  rationale: In Revelation ἀρνίον is a christological title/image for Jesus. 'The
    Lamb' is the established and accurate rendering, preserving the sacrificial and
    apocalyptic imagery.
- source_word: ὅπου ἂν ὑπάγῃ
  chosen: wherever he goes
  alternatives:
  - wherever he may go
  lexicon: BDAG
  rationale: 'The combination ὅπου ἄν with the subjunctive expresses indefiniteness:
    ''wherever.'' ''He goes'' is idiomatic modern English and preserves the open-ended
    force.'
- source_word: ἠγοράσθησαν
  chosen: were purchased
  alternatives:
  - were bought
  - were redeemed
  lexicon: BDAG
  rationale: ἀγοράζω literally means 'buy/purchase.' 'Purchased' preserves the commercial-redemptive
    metaphor without importing the more interpretive theological term 'redeemed' into
    the main text.
- source_word: ἀπὸ τῶν ἀνθρώπων
  chosen: from among mankind
  alternatives:
  - from among humanity
  - from among men
  - from among people
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, not specifically males.
    'From among mankind' preserves the collective human reference in a gender-accurate
    way and fits the elevated register of the passage.
- source_word: ἀπαρχὴ
  chosen: firstfruits
  alternatives:
  - first offering
  lexicon: BDAG
  rationale: ἀπαρχή is a cultic term for the first portion offered to God. 'Firstfruits'
    is the standard and most theologically resonant rendering, preserving sacrificial/harvest
    imagery.
