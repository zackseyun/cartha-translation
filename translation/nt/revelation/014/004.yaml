theological_decisions:
- issue: Whether the description of not being defiled with women / being virgins should
    be rendered literally or interpreted metaphorically in the main text
  chosen_reading: 'Rendered literally in the main text: ''have not defiled themselves
    with women, for they are virgins.'''
  alternative_readings:
  - A metaphorical reading referring to spiritual purity or freedom from idolatrous
    compromise
  rationale: The Greek wording is concrete and should be translated as written. Revelation
    may employ symbolic imagery, but the translator should preserve the textual form
    rather than resolve the interpretive question in translation. A footnote can preserve
    the possibility of symbolic force without replacing the literal wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
