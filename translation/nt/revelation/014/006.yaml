id: REV.14.6
reference: Revelation 14:6
source:
  edition: SBLGNT
  text: Καὶ εἶδον ⸀ἄλλον ἄγγελον πετόμενον ἐν μεσουρανήματι, ἔχοντα εὐαγγέλιον αἰώνιον
    εὐαγγελίσαι ⸀ἐπὶ τοὺς καθημένους ἐπὶ τῆς γῆς καὶ ἐπὶ πᾶν ἔθνος καὶ φυλὴν καὶ γλῶσσαν
    καὶ λαόν,
translation:
  text: And I saw another angel flying in midheaven, having an eternal gospel to proclaim
    to those who dwell on the earth—to every nation and tribe and language and people—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the middle of the sky' or 'in midair'; the Greek term is a distinctive
      apocalyptic expression.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to those sitting/seated on the earth'; in Revelation this expression
      functions idiomatically for the earth's inhabitants.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον
  chosen: another
  alternatives:
  - an additional
  lexicon: BDAG
  rationale: ἄλλος normally means 'another' of the same kind. 'Another' is the natural
    English rendering and preserves the narrative sequence.
- source_word: ἄγγελον
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation's apocalyptic context, ἄγγελος overwhelmingly refers to
    a heavenly angelic being rather than a human messenger.
- source_word: πετόμενον
  chosen: flying
  alternatives:
  - flying about
  lexicon: BDAG
  rationale: The present participle depicts the angel in motion. 'Flying' is concise
    and idiomatic.
- source_word: ἐν μεσουρανήματι
  chosen: in midheaven
  alternatives:
  - in midair
  - at the zenith
  - in the middle of the sky
  lexicon: BDAG
  rationale: μεσουράνημα is a technical/apocalyptic term for the highest point in
    the sky or the mid-heavenly expanse. 'Midheaven' preserves the distinctive imagery
    better than the flatter 'midair,' while remaining understandable.
- source_word: ἔχοντα
  chosen: having
  alternatives:
  - holding
  - possessing
  lexicon: BDAG
  rationale: The participle links the angel's possession of the message with his flight.
    'Having' is the most direct and least interpretive rendering.
- source_word: εὐαγγέλιον αἰώνιον
  chosen: an eternal gospel
  alternatives:
  - the eternal good news
  - an everlasting gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον is well established as 'gospel' in Christian usage, and αἰώνιον
    here qualifies its enduring character. The anarthrous phrase is naturally rendered
    'an eternal gospel' rather than 'the eternal gospel.' 'Everlasting' is possible,
    but 'eternal' more closely matches αἰώνιος.
- source_word: εὐαγγελίσαι
  chosen: to proclaim
  alternatives:
  - to announce good news
  - to preach the gospel
  lexicon: BDAG
  rationale: 'The aorist infinitive expresses purpose: the angel has the gospel for
    the purpose of proclaiming it. ''To proclaim'' is readable and avoids awkward
    repetition (''gospel ... to gospel''). The good-news sense is already carried
    by εὐαγγέλιον.'
- source_word: ἐπὶ τοὺς καθημένους ἐπὶ τῆς γῆς
  chosen: to those who dwell on the earth
  alternatives:
  - upon those seated on the earth
  - to those living on the earth
  lexicon: BDAG
  rationale: Although καθημένους is literally 'sitting' or 'seated,' in Revelation
    the idiom for earth's inhabitants is commonly rendered 'those who dwell on the
    earth.' This captures the settled, resident sense in context better than a wooden
    'seated.'
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In Revelation's global scope, γῆ refers to the earth/world rather than
    a particular land.
- source_word: πᾶν ἔθνος καὶ φυλὴν καὶ γλῶσσαν καὶ λαόν
  chosen: every nation and tribe and language and people
  alternatives:
  - every nation and clan and tongue and people
  lexicon: BDAG
  rationale: This stock fourfold formula in Revelation emphasizes universal human
    scope. 'Nation,' 'tribe,' 'language,' and 'people' are standard, clear renderings
    that preserve the cumulative rhythm.
