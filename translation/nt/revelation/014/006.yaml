theological_decisions:
- issue: Whether εὐαγγέλιον αἰώνιον should be rendered with traditional ecclesial
    wording or more generic language
  chosen_reading: an eternal gospel
  alternative_readings:
  - the eternal good news
  - an everlasting gospel
  rationale: The verse presents a universal divine proclamation. Retaining 'gospel'
    preserves canonical and theological resonance without adding doctrinal content
    beyond the Greek. The anarthrous construction is not forced into a more definite
    reading than the text warrants.
  doctrine_reference: Translation philosophy §§1, 6
- issue: How to render the idiom τοὺς καθημένους ἐπὶ τῆς γῆς in Revelation's context
  chosen_reading: those who dwell on the earth
  alternative_readings:
  - those seated on the earth
  - those living on the earth
  rationale: This preserves Revelation's recurring category of earth-dwellers while
    avoiding an overly literal rendering that could mislead English readers into picturing
    posture rather than settled habitation. This is a contextual, not doctrinal, decision
    and preserves the text's apocalyptic tension.
  doctrine_reference: Translation philosophy §§1, 5, 6
