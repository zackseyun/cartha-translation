theological_decisions:
- issue: Duration of judgment expressed by εἰς αἰῶνας αἰώνων
  chosen_reading: 'Rendered as unending duration: ''forever and ever'''
  alternative_readings:
  - for ages of ages
  rationale: The Greek idiom in Revelation ordinarily conveys the strongest expression
    of ongoing duration. The translation preserves the phrase's force without softening
    it or importing a narrower doctrinal system beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition where needed.
- issue: Referent and syntax of the final clause
  chosen_reading: 'Kept the Greek''s somewhat abrupt wording: ''those who worship
    ... and if anyone receives ...'''
  alternative_readings:
  - smoothed to 'those who worship ... and whoever receives ...'
  - recast as a relative clause covering both actions
  rationale: The Greek shifts from a plural participial description to a singular
    indefinite conditional. Rather than fully smoothing the syntax, the translation
    preserves the rhetorical abruptness while remaining intelligible. This avoids
    over-resolving whether the final clause is strictly appositional or an added general
    condition.
  doctrine_reference: Preserve theological tension rather than resolve it.
