id: REV.14.11
reference: Revelation 14:11
source:
  edition: SBLGNT
  text: καὶ ὁ καπνὸς τοῦ βασανισμοῦ αὐτῶν εἰς αἰῶνας αἰώνων ἀναβαίνει, καὶ οὐκ ἔχουσιν
    ἀνάπαυσιν ἡμέρας καὶ νυκτός, οἱ προσκυνοῦντες τὸ θηρίον καὶ τὴν εἰκόνα αὐτοῦ,
    καὶ εἴ τις λαμβάνει τὸ χάραγμα τοῦ ὀνόματος αὐτοῦ.
translation:
  text: And the smoke of their torment goes up forever and ever, and they have no
    rest day and night—those who worship the beast and its image, and if anyone receives
    the mark of its name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'for ages of ages.'
    reason: lexical_alternative
  - marker: b
    text: The Greek ends abruptly with 'and if anyone receives the mark of its name,'
      likely extending the description of those under judgment; some translations
      smooth this as 'and whoever receives.'
    reason: alternative_reading
lexical_decisions:
- source_word: καπνὸς
  chosen: smoke
  alternatives:
  - smoke plume
  lexicon: BDAG
  rationale: Direct concrete noun; 'smoke' is the natural English equivalent and preserves
    the imagery without expansion.
- source_word: βασανισμοῦ
  chosen: torment
  alternatives:
  - torture
  - affliction
  lexicon: BDAG
  rationale: '''Torment'' best matches the term in apocalyptic judgment context and
    standard usage for painful punitive suffering, without over-specifying method
    as ''torture'' might.'
- source_word: εἰς αἰῶνας αἰώνων
  chosen: forever and ever
  alternatives:
  - for ages of ages
  lexicon: BDAG
  rationale: This idiom is conventionally and accurately rendered 'forever and ever'
    in English. 'For ages of ages' is more formally transparent but less idiomatic.
    The chosen rendering preserves the force of unending duration in this doxological/apocalyptic
    formula.
- source_word: ἀναβαίνει
  chosen: goes up
  alternatives:
  - ascends
  - rises
  lexicon: BDAG
  rationale: Present tense with vivid imagery; 'goes up' is readable modern English
    and preserves the ongoing aspect better than the more elevated 'ascends'.
- source_word: ἀνάπαυσιν
  chosen: rest
  alternatives:
  - relief
  - respite
  lexicon: BDAG
  rationale: '''Rest'' is the most direct equivalent and fits the contrast with ceaseless
    suffering. ''Relief'' or ''respite'' are interpretive expansions.'
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: BDAG
  rationale: Genitives of time idiomatically express continual duration. 'Day and
    night' is the standard concise English rendering.
- source_word: προσκυνοῦντες
  chosen: worship
  alternatives:
  - bow down to
  lexicon: BDAG
  rationale: In Revelation this verb regularly denotes worshipful homage. 'Worship'
    best captures the religious allegiance in context.
- source_word: θηρίον
  chosen: beast
  lexicon: BDAG
  rationale: Established and precise rendering in Revelation's apocalyptic imagery.
- source_word: εἰκόνα
  chosen: image
  alternatives:
  - statue
  - likeness
  lexicon: BDAG
  rationale: '''Image'' is the broad and standard equivalent, fitting Revelation''s
    recurring phrase ''the beast and its image.'''
- source_word: εἴ τις λαμβάνει
  chosen: if anyone receives
  alternatives:
  - whoever receives
  - and anyone who receives
  lexicon: BDAG
  rationale: The construction is somewhat compressed after the participial phrase.
    'If anyone receives' closely follows the Greek and preserves the open-ended conditional/generalizing
    force, even though English could smooth it more. This keeps the final clause tied
    to the same judged group without paraphrastic restructuring.
- source_word: χάραγμα
  chosen: mark
  alternatives:
  - stamp
  - brand
  lexicon: BDAG
  rationale: '''Mark'' is the standard and sufficiently broad rendering for the identifying
    sign in Revelation.'
- source_word: τοῦ ὀνόματος αὐτοῦ
  chosen: of its name
  alternatives:
  - bearing its name
  - that is its name
  lexicon: BDAG
  rationale: A fairly literal genitival rendering preserves the Greek wording. More
    interpretive options are possible, but 'the mark of its name' matches Revelation's
    repeated expression.
