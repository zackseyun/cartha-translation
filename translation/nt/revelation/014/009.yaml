id: REV.14.9
reference: Revelation 14:9
source:
  edition: SBLGNT
  text: Καὶ ἄλλος ἄγγελος τρίτος ἠκολούθησεν αὐτοῖς λέγων ἐν φωνῇ μεγάλῃ· Εἴ τις προσκυνεῖ
    τὸ θηρίον καὶ τὴν εἰκόνα αὐτοῦ, καὶ λαμβάνει χάραγμα ἐπὶ τοῦ μετώπου αὐτοῦ ἢ ἐπὶ
    τὴν χεῖρα αὐτοῦ,
translation:
  text: And another angel, a third one, followed them, saying with a loud voice, “If
    anyone worships the beast and its image, and receives a mark on his forehead or
    on his hand,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bows down to the beast and its image.” The Greek verb can denote prostration,
      but here it carries the sense of worshipful allegiance.
    reason: lexical_alternative
  - marker: b
    text: Greek “on his forehead or on his hand.” The singular masculine pronoun is
      used generically with “if anyone.”
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλος ἄγγελος τρίτος
  chosen: another angel, a third one
  alternatives:
  - another, third angel
  - a third angel, another one
  lexicon: BDAG
  rationale: 'The Greek stacks ἄλλος and τρίτος with ἄγγελος. Rendering both preserves
    the sequential force in the vision: this is another angel, specifically the third
    in order.'
- source_word: ἠκολούθησεν αὐτοῖς
  chosen: followed them
  alternatives:
  - came after them
  lexicon: BDAG
  rationale: Aorist indicative of ἀκολουθέω here is straightforward narrative sequence.
    'Followed them' is the most natural and sufficiently formal rendering.
- source_word: λέγων ἐν φωνῇ μεγάλῃ
  chosen: saying with a loud voice
  alternatives:
  - saying in a loud voice
  - calling out with a loud voice
  lexicon: BDAG
  rationale: This participial phrase introduces the angel's proclamation. 'With a
    loud voice' is idiomatic English and preserves the emphatic public character of
    the announcement.
- source_word: Εἴ τις
  chosen: If anyone
  alternatives:
  - If someone
  lexicon: BDAG
  rationale: Indefinite conditional construction best rendered generically as 'If
    anyone,' matching the warning's universal scope.
- source_word: προσκυνεῖ
  chosen: worships
  alternatives:
  - bows down to
  lexicon: BDAG
  rationale: In Revelation, προσκυνέω in relation to the beast carries religious devotion,
    not merely physical prostration. 'Worships' best captures the theological force.
- source_word: τὸ θηρίον
  chosen: the beast
  lexicon: BDAG
  rationale: Standard and contextually established rendering in Revelation for the
    apocalyptic figure θηρίον.
- source_word: τὴν εἰκόνα αὐτοῦ
  chosen: its image
  alternatives:
  - the image of it
  - his image
  lexicon: BDAG
  rationale: Because θηρίον is grammatically neuter, 'its image' reflects the Greek
    agreement naturally in English. 'His image' would import personal gender not marked
    here.
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - takes
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive'; in this context of accepting the
    beast's mark, 'receives' better conveys reception/acceptance rather than mere
    physical grasping.
- source_word: χάραγμα
  chosen: a mark
  alternatives:
  - the mark
  - an imprint
  lexicon: BDAG
  rationale: Anarthrous χάραγμα is naturally rendered 'a mark' in this clause. The
    term denotes the identifying mark associated with the beast.
- source_word: ἐπὶ τοῦ μετώπου αὐτοῦ ἢ ἐπὶ τὴν χεῖρα αὐτοῦ
  chosen: on his forehead or on his hand
  alternatives:
  - upon his forehead or upon his hand
  - on the forehead or on the hand
  lexicon: BDAG
  rationale: The prepositional phrases indicate location. The singular pronoun refers
    back to the indefinite τις, and per the project's gender-accurate policy, 'his'
    is retained for the generic singular rather than neutralizing to 'their'.
