theological_decisions:
- issue: Generic masculine pronoun with τις
  chosen_reading: on his forehead or on his hand
  alternative_readings:
  - on their forehead or on their hand
  - on the forehead or on the hand
  rationale: The Greek uses singular masculine αὐτοῦ with the indefinite τις. Following
    the project's gender-accurate policy, the translation preserves the singular masculine
    generic rather than shifting to gender-neutral plural forms.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Religious force of προσκυνέω toward the beast
  chosen_reading: worships
  alternative_readings:
  - bows down to
  rationale: The context is allegiance and idolatrous devotion in apocalyptic judgment.
    'Worships' preserves the theological seriousness without reducing the act to posture
    alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
