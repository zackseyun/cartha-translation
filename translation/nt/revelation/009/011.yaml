theological_decisions:
- issue: Whether to translate or transliterate the names Ἀβαδδών and Ἀπολλύων
  chosen_reading: 'Transliterate both names in the main text as proper names: ''Abaddon''
    and ''Apollyon.'''
  alternative_readings:
  - Translate one or both names as 'Destruction' / 'Destroyer'
  rationale: The translation philosophy states 'Translate titles; transliterate names.'
    In this verse the forms function as names assigned to the angel of the abyss.
    Their lexical sense remains important, so it is preserved in footnotes rather
    than replacing the names in the main text.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names.'''
- issue: Rendering ἀβύσσου
  chosen_reading: abyss
  alternative_readings:
  - bottomless pit
  rationale: No doctrinal issue is at stake, but the choice affects imagery. 'Abyss'
    is the more direct lexical rendering and avoids importing traditional phrasing
    not explicit in the Greek. The traditional alternative is preserved in a footnote
    because readers may recognize it.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
