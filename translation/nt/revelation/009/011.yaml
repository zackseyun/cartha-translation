id: REV.9.11
reference: Revelation 9:11
source:
  edition: SBLGNT
  text: ⸂ἔχουσιν ἐπ’ αὐτῶν βασιλέα τὸν⸃ ἄγγελον τῆς ἀβύσσου· ὄνομα αὐτῷ Ἑβραϊστὶ Ἀβαδδών
    ⸂καὶ ἐν⸃ τῇ Ἑλληνικῇ ὄνομα ἔχει Ἀπολλύων.
translation:
  text: They have over them as king the angel of the abyss. His name in Hebrew is
    Abaddon, and in Greek he has the name Apollyon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abaddon is a Hebrew name associated with destruction.
    reason: lexical_alternative
  - marker: b
    text: Apollyon is a Greek name meaning 'Destroyer.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the bottomless pit' for 'the abyss.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔχουσιν ἐπ’ αὐτῶν
  chosen: They have over them
  alternatives:
  - Over them is
  - They have as ruler over them
  lexicon: BDAG
  rationale: The Greek explicitly uses the verb 'have' with ἐπί + genitive ('over
    them'), so the translation preserves the construction rather than recasting it
    too freely. The subject is the locust-like beings from the prior context.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: βασιλεύς normally denotes 'king.' 'Ruler' is possible in a broader sense,
    but 'king' preserves the concrete royal imagery of the text.
- source_word: τὸν ἄγγελον τῆς ἀβύσσου
  chosen: the angel of the abyss
  alternatives:
  - the messenger of the abyss
  - the angel of the bottomless pit
  lexicon: BDAG
  rationale: ἄγγελος is rendered 'angel' in Revelation unless context clearly requires
    'messenger.' ἄβυσσος is translated 'abyss' as the most direct and readable rendering;
    'bottomless pit' reflects older tradition but is more interpretive and less lexically
    direct.
- source_word: ὄνομα αὐτῷ
  chosen: His name
  alternatives:
  - He is named
  - the name for him
  lexicon: BDAG
  rationale: 'The dative αὐτῷ is idiomatically rendered in English as possession:
    ''his name.'' This is natural English while staying close to the Greek idiom.'
- source_word: Ἑβραϊστὶ
  chosen: in Hebrew
  alternatives:
  - in the Hebrew language
  - Hebrewly
  lexicon: BDAG
  rationale: The adverb means 'in Hebrew' or 'in the Hebrew language.' 'In Hebrew'
    is concise and idiomatic.
- source_word: Ἀβαδδών
  chosen: Abaddon
  alternatives:
  - Destruction
  lexicon: BDAG; HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated. The name is derived from the Hebrew term for destruction/perdition,
    but here it functions as a proper name.
- source_word: καὶ ἐν τῇ Ἑλληνικῇ
  chosen: and in Greek
  alternatives:
  - and in the Greek language
  lexicon: BDAG
  rationale: This phrase contrasts the Hebrew and Greek forms of the name. 'In Greek'
    is the most natural concise rendering.
- source_word: ὄνομα ἔχει
  chosen: he has the name
  alternatives:
  - his name is
  - he is called
  lexicon: BDAG
  rationale: The Greek repeats the noun-plus-verb expression literally, and preserving
    some of that repetition reflects the style of the verse. 'He has the name' is
    slightly more formal than 'his name is' but remains readable.
- source_word: Ἀπολλύων
  chosen: Apollyon
  alternatives:
  - Destroyer
  lexicon: BDAG
  rationale: This is a proper name and is therefore transliterated in the main text.
    Because the Greek name transparently carries the sense 'Destroyer,' that semantic
    value is worth preserving in a footnote.
