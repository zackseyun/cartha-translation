theological_decisions:
- issue: Scope of ἀνθρώπους
  chosen_reading: generic human beings ('the people') rather than males only
  alternative_readings:
  - the men
  rationale: The context contrasts vegetation with human beings marked or unmarked
    by God's seal. Nothing in the verse restricts the referent to males. This follows
    the translation philosophy's gender-accurate principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of the passive instruction
  chosen_reading: authoritative instruction without specifying the speaker
  alternative_readings:
  - explicit divine command
  rationale: The passive ἐρρέθη leaves the speaker implicit. In context God is likely
    ultimate source, but the translation should not import an explicit subject the
    Greek does not state.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
