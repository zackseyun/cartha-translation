id: REV.9.4
reference: Revelation 9:4
source:
  edition: SBLGNT
  text: καὶ ἐρρέθη αὐταῖς ἵνα μὴ ⸀ἀδικήσουσιν τὸν χόρτον τῆς γῆς οὐδὲ πᾶν χλωρὸν οὐδὲ
    πᾶν δένδρον, εἰ μὴ τοὺς ἀνθρώπους οἵτινες οὐκ ἔχουσι τὴν σφραγῖδα τοῦ θεοῦ ἐπὶ
    τῶν ⸀μετώπων.
translation:
  text: And they were told not to harm the grass of the earth, or any green plant,
    or any tree, but only the people who do not have the seal of God on their foreheads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'any green thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρέθη αὐταῖς
  chosen: they were told
  alternatives:
  - it was said to them
  - they were commanded
  lexicon: BDAG
  rationale: Passive of λέγω with dative pronoun; 'they were told' is natural English
    and preserves the passive sense without overstating as a formal command, though
    the context implies authoritative instruction.
- source_word: ἵνα μὴ ἀδικήσουσιν
  chosen: not to harm
  alternatives:
  - that they should not injure
  - that they should not wrong
  lexicon: BDAG
  rationale: ἀδικέω can mean 'do wrong to' or 'harm/injure.' In this apocalyptic judgment
    context, physical damage is in view, so 'harm' best fits idiomatic English.
- source_word: τὸν χόρτον τῆς γῆς
  chosen: the grass of the earth
  alternatives:
  - the earth's grass
  - the grass of the land
  lexicon: BDAG
  rationale: χόρτος commonly denotes grass/vegetation. 'Grass of the earth' keeps
    the genitive relation and echoes the cosmic scope of the vision.
- source_word: οὐδὲ πᾶν χλωρόν
  chosen: or any green plant
  alternatives:
  - nor any green thing
  - nor anything green
  lexicon: BDAG
  rationale: χλωρός as a substantivized adjective literally means 'green [thing].'
    'Any green plant' makes explicit the vegetation sense in context and avoids awkward
    English while staying close to the source.
- source_word: οὐδὲ πᾶν δένδρον
  chosen: or any tree
  alternatives:
  - nor any tree
  lexicon: BDAG
  rationale: Straightforward rendering of δένδρον; coordinated with the preceding
    vegetation terms.
- source_word: εἰ μὴ
  chosen: but only
  alternatives:
  - except
  - unless
  lexicon: BDAG
  rationale: Here εἰ μή introduces the sole permitted object of harm. 'But only' communicates
    the exception clearly in English.
- source_word: τοὺς ἀνθρώπους
  chosen: the people
  alternatives:
  - the men
  - the humans
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, not specifically males.
    'The people' is natural English and accurately conveys the referent.
- source_word: οἵτινες οὐκ ἔχουσι
  chosen: who do not have
  alternatives:
  - who do not possess
  lexicon: BDAG
  rationale: Simple relative clause; 'have' is the most natural equivalent for ἔχω.
- source_word: τὴν σφραγῖδα τοῦ θεοῦ
  chosen: the seal of God
  alternatives:
  - God's seal
  lexicon: BDAG
  rationale: σφραγίς is 'seal,' an important apocalyptic marker of divine ownership/protection.
    The more literal genitive construction is retained.
- source_word: ἐπὶ τῶν μετώπων
  chosen: on their foreheads
  alternatives:
  - upon their foreheads
  lexicon: BDAG
  rationale: μέτωπον means forehead. Adding 'their' is required by English because
    the antecedent is the people lacking the seal.
