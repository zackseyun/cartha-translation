theological_decisions:
- issue: Sense of ἐξουσία in apocalyptic plague imagery
  chosen_reading: Rendered as 'power' rather than 'authority'
  alternative_readings:
  - authority
  rationale: The verse describes the locust-like beings' capacity to inflict suffering
    through their tails. 'Power' better communicates operative ability in English,
    while not denying that this power is divinely permitted within the vision.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἄνθρωποι with masculine English
  chosen_reading: Rendered as 'men'
  alternative_readings:
  - people
  - human beings
  rationale: The Greek is grammatically masculine plural with representative force.
    Following the stated gender-accurate policy, the main text keeps 'men'; an inclusive
    alternative is preserved in a footnote for readers who may otherwise hear the
    term too narrowly in contemporary English.
  doctrine_reference: Translation philosophy §4
