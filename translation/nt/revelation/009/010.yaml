id: REV.9.10
reference: Revelation 9:10
source:
  edition: SBLGNT
  text: καὶ ἔχουσιν οὐρὰς ὁμοίας σκορπίοις καὶ κέντρα, καὶ ἐν ταῖς οὐραῖς αὐτῶν ⸂ἡ
    ἐξουσία αὐτῶν⸃ ἀδικῆσαι τοὺς ἀνθρώπους μῆνας πέντε.
translation:
  text: And they have tails like scorpions, and stingers; and in their tails is their
    power to harm men for five months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people' / 'human beings.' Greek 'men' can function generically for humanity
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρὰς
  chosen: tails
  lexicon: BDAG
  rationale: Direct anatomical/image term; plural retained.
- source_word: ὁμοίας σκορπίοις
  chosen: like scorpions
  alternatives:
  - similar to scorpions
  - like those of scorpions
  lexicon: BDAG
  rationale: ὅμοιος with dative expresses likeness. 'Like scorpions' is natural English
    and preserves the simile without over-specifying whether the likeness is to scorpions
    generally or specifically their tails.
- source_word: κέντρα
  chosen: stingers
  alternatives:
  - stings
  lexicon: BDAG
  rationale: κέντρον can denote a sting or sharp point/goad. In the scorpion imagery,
    'stingers' best matches the concrete anatomy implied by the vision and reads naturally
    with 'tails.'
- source_word: ἐξουσία
  chosen: power
  alternatives:
  - authority
  lexicon: BDAG
  rationale: In Revelation this term can mean delegated authority or capability. Here,
    with infinitive ἀδικῆσαι and the plague imagery, the sense is effective power/capacity
    to inflict harm rather than juridical authority, so 'power' is preferred.
- source_word: ἀδικῆσαι
  chosen: to harm
  alternatives:
  - to injure
  - to wrong
  lexicon: BDAG
  rationale: In this apocalyptic judgment context, the verb refers to causing injury
    rather than committing injustice in an abstract moral sense. 'Harm' is idiomatic
    and fits the immediate context of torment.
- source_word: τοὺς ἀνθρώπους
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The noun is masculine plural and can be generic for humanity. Per translation
    philosophy, gender-accurate rendering is preferred; 'men' preserves the form and
    traditional representative force here without changing the referent.
- source_word: μῆνας πέντε
  chosen: for five months
  alternatives:
  - five months
  lexicon: BDAG
  rationale: Accusative of duration is best rendered with 'for' in English to make
    the temporal extent explicit.
