id: REV.9.16
reference: Revelation 9:16
source:
  edition: SBLGNT
  text: καὶ ὁ ἀριθμὸς τῶν στρατευμάτων τοῦ ⸀ἱππικοῦ ⸀δισμυριάδες μυριάδων· ἤκουσα
    τὸν ἀριθμὸν αὐτῶν.
translation:
  text: And the number of the troops of the cavalry was two hundred million; I heard
    their number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'double myriads of myriads' (that is, two hundred million).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριθμὸς
  chosen: number
  alternatives:
  - count
  - total
  lexicon: BDAG
  rationale: Standard sense 'number, total.' 'Number' is the most natural and direct
    rendering here and is repeated to mirror the Greek repetition.
- source_word: στρατευμάτων
  chosen: troops
  alternatives:
  - armies
  - forces
  lexicon: BDAG
  rationale: στράτευμα can denote an army or military force. In the genitive plural
    with ἱππικοῦ, it refers to the constituent military bodies of the cavalry. 'Troops'
    is natural English and avoids the slightly awkward 'armies of the cavalry' while
    preserving the military sense.
- source_word: ἱππικοῦ
  chosen: cavalry
  alternatives:
  - mounted troops
  - horsemen
  lexicon: BDAG
  rationale: The adjective/substantival form denotes cavalry or mounted force. 'Cavalry'
    is the concise military equivalent in English. 'Horsemen' would shift from the
    collective force to the individual riders and is less exact here.
- source_word: δισμυριάδες μυριάδων
  chosen: two hundred million
  alternatives:
  - twice ten thousand times ten thousand
  - myriads of myriads doubled
  lexicon: BDAG
  rationale: This expression literally involves myriads multiplied in a doubled form,
    yielding 200,000,000. Because the Greek gives a specific computable number and
    the following clause emphasizes that John heard the number, rendering it as 'two
    hundred million' communicates the sense clearly in modern English. A more literal
    phrasing is preserved in a footnote.
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I did hear
  lexicon: BDAG
  rationale: Simple aorist narrative verb; 'I heard' is the straightforward rendering.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: Genitive pronoun referring back to the cavalry troops; possessive 'their'
    is idiomatic English.
