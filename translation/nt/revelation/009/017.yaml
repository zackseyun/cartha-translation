id: REV.9.17
reference: Revelation 9:17
source:
  edition: SBLGNT
  text: καὶ οὕτως εἶδον τοὺς ἵππους ἐν τῇ ὁράσει καὶ τοὺς καθημένους ἐπ’ αὐτῶν, ἔχοντας
    θώρακας πυρίνους καὶ ὑακινθίνους καὶ θειώδεις· καὶ αἱ κεφαλαὶ τῶν ἵππων ὡς κεφαλαὶ
    λεόντων, καὶ ἐκ τῶν στομάτων αὐτῶν ἐκπορεύεται πῦρ καὶ καπνὸς καὶ θεῖον.
translation:
  text: 'And this is how I saw the horses in the vision, and those sitting on them:
    they had breastplates fiery red and hyacinth-blue and sulfur-yellow; and the heads
    of the horses were like lions’ heads, and out of their mouths come fire and smoke
    and sulfur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'they had breastplates fiery and hyacinth-colored and
      sulfurous.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'brimstone' for 'sulfur.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: this is how
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Introduces the manner in which John saw the scene. 'This is how' is natural
    modern English and preserves the demonstrative force better than the more archaic
    'thus.'
- source_word: ἐν τῇ ὁράσει
  chosen: in the vision
  alternatives:
  - in the appearance
  - in the sight
  lexicon: BDAG
  rationale: ὅρασις in Revelation refers to visionary experience, not merely visual
    appearance. 'In the vision' best fits apocalyptic context.
- source_word: καθημένους ἐπ’ αὐτῶν
  chosen: those sitting on them
  alternatives:
  - those mounted on them
  - their riders
  lexicon: BDAG
  rationale: The participial phrase is rendered explicitly rather than compressed
    to 'riders' so the Greek structure remains visible, while still reading naturally.
- source_word: θώρακας
  chosen: breastplates
  alternatives:
  - armor
  - chest armor
  lexicon: BDAG
  rationale: A standard rendering for θώραξ, preserving the concrete image of protective
    armor.
- source_word: πυρίνους
  chosen: fiery red
  alternatives:
  - fire-colored
  - fiery
  lexicon: BDAG
  rationale: The adjective means 'made of fire' or 'fiery/fire-colored.' In a list
    of color descriptors for the breastplates, 'fiery red' makes the implied color
    value explicit in idiomatic English without losing the fire imagery.
- source_word: ὑακινθίνους
  chosen: hyacinth-blue
  alternatives:
  - dark blue
  - sapphire-colored
  - jacinth-colored
  lexicon: BDAG
  rationale: The term denotes the color associated with hyacinth/jacinth, conventionally
    a deep blue or blue-violet. 'Hyacinth-blue' preserves the lexical link while remaining
    understandable.
- source_word: θειώδεις
  chosen: sulfur-yellow
  alternatives:
  - sulfurous
  - brimstone-colored
  lexicon: BDAG
  rationale: As with the preceding adjectives, the context is descriptive coloration
    of the breastplates. 'Sulfur-yellow' communicates the likely color association
    more clearly than the less natural 'sulfurous.'
- source_word: ὡς κεφαλαὶ λεόντων
  chosen: like lions’ heads
  alternatives:
  - as heads of lions
  lexicon: BDAG
  rationale: Standard comparison marker ὡς is rendered 'like.' The plural possessive
    in English is the most natural equivalent.
- source_word: ἐκπορεύεται
  chosen: come
  alternatives:
  - proceeds
  - comes out
  lexicon: BDAG
  rationale: 'Although singular in form, the verb governs a compound subject following
    it. English idiom prefers plural agreement here: ''fire and smoke and sulfur come
    out.'' This preserves sense over strict formal concord.'
- source_word: θεῖον
  chosen: sulfur
  alternatives:
  - brimstone
  lexicon: BDAG
  rationale: θεῖον denotes sulfur; 'brimstone' is traditional but archaic for many
    readers. 'Sulfur' is clearer modern English while preserving the substance intended.
