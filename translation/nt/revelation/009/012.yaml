theological_decisions:
- issue: Apocalyptic sequencing of the three woes
  chosen_reading: The verse marks the completion of the first announced woe and the
    imminent arrival of two additional woes.
  alternative_readings:
  - A looser rendering that treats 'woe' merely as 'judgment' or 'disaster' without
    preserving the repeated formula
  rationale: The Greek emphasizes a numbered sequence of woes within John's vision.
    Preserving 'woe' and 'the first' maintains the literary and theological structure
    of escalating divine judgments without importing further interpretive detail.
  doctrine_reference: Translation philosophy §§1, 5
