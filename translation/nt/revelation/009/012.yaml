id: REV.9.12
reference: Revelation 9:12
source:
  edition: SBLGNT
  text: Ἡ οὐαὶ ἡ μία ἀπῆλθεν· ἰδοὺ ἔρχεται ἔτι δύο οὐαὶ μετὰ ταῦτα.
translation:
  text: The first woe has passed. Behold, two woes are still coming after these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one woe has passed'; the Greek literally says 'the one woe,' but
      in context it means the first in a series.
    reason: lexical_alternative
  - marker: b
    text: Or 'yet two woes are coming after this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: woe
  alternatives:
  - disaster
  - alas
  lexicon: BDAG
  rationale: Retains the apocalyptic/judgment formula rather than paraphrasing to
    a mere event label. In Revelation, οὐαί functions as a solemn pronouncement of
    impending calamity, so 'woe' best preserves both tone and intertextual resonance.
- source_word: ἡ μία
  chosen: the first
  alternatives:
  - the one
  lexicon: BDAG
  rationale: Although literally 'the one,' the construction here is ordinal in force,
    distinguishing the first of a series of three woes announced earlier in the chapter.
    'The first' is the most natural and contextually precise English rendering.
- source_word: ἀπῆλθεν
  chosen: has passed
  alternatives:
  - went away
  - departed
  - passed away
  lexicon: BDAG
  rationale: The aorist indicates the completed end of the first woe. 'Has passed'
    is idiomatic English for the cessation of a period or event and fits the narrative
    transition better than the more spatial 'went away' or 'departed.'
- source_word: ἰδού
  chosen: Behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Preserves the discourse marker's force of drawing urgent attention to
    what follows. 'Behold' is slightly elevated but still understandable and suits
    Revelation's prophetic-apocalyptic register better than the more colloquial 'look.'
- source_word: ἔρχεται
  chosen: are still coming
  alternatives:
  - are coming
  - come
  - are yet to come
  lexicon: BDAG
  rationale: The singular verb with a plural subject is a known construction; the
    sense is that two woes remain on the way. Rendering with an English plural verb
    is required for natural grammar. 'Still coming' reflects ἔτι ('still/yet') and
    the present tense's vivid imminence.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - still yet
  lexicon: BDAG
  rationale: Conveys that additional woes remain after the first. 'Still' is natural
    in contemporary English; 'yet' is also possible, but 'still' reads more smoothly
    with 'are coming.'
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the plural demonstrative
    and Revelation's recurring temporal/sequential phrasing. 'Afterward' is smoother
    but less transparent to the Greek wording.
