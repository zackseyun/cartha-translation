id: REV.9.5
reference: Revelation 9:5
source:
  edition: SBLGNT
  text: καὶ ἐδόθη ⸀αὐτοῖς ἵνα μὴ ἀποκτείνωσιν αὐτούς, ἀλλ’ ἵνα ⸀βασανισθήσονται μῆνας
    πέντε· καὶ ὁ βασανισμὸς αὐτῶν ὡς βασανισμὸς σκορπίου, ὅταν παίσῃ ἄνθρωπον.
translation:
  text: And it was given to them that they should not kill them, but that they would
    be tormented for five months; and their torment was like the torment of a scorpion
    when it strikes a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'when it stings a man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when it strikes a person'; Greek 'a man' can function generically here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  chosen: it was given
  alternatives:
  - they were allowed
  - authority was given
  lexicon: BDAG
  rationale: Passive of δίδωμι in Revelation commonly expresses divinely permitted
    authority without explicitly naming the giver. 'It was given' preserves the passive
    and apocalyptic idiom better than a more interpretive 'they were allowed.'
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative pronoun referring to the locust-like agents from the prior context.
    Kept as 'to them' to preserve the indirect-object construction with ἐδόθη.
- source_word: ἵνα μὴ ἀποκτείνωσιν αὐτούς
  chosen: that they should not kill them
  alternatives:
  - that they might not kill them
  - not to kill them
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose/content of what was given. 'Should
    not kill' is natural English while retaining the force of prohibition/purpose.
- source_word: ἀλλ’ ἵνα βασανισθήσονται
  chosen: but that they would be tormented
  alternatives:
  - but that they should be tormented
  - but to be tormented
  lexicon: BDAG
  rationale: The future passive form after ἵνα is unusual but well attested in Koine
    and conveys the intended result. 'Would be tormented' reflects the future-oriented
    result more naturally than a flat infinitival rendering.
- source_word: βασανισθήσονται / βασανισμός
  chosen: be tormented / torment
  alternatives:
  - be tortured / torture
  - be in agony / agony
  lexicon: BDAG
  rationale: The βασαν- word group denotes severe torment or painful affliction. 'Torment'
    preserves the lexical repetition between verb and noun and fits the scorpion-sting
    comparison without over-specifying judicial torture.
- source_word: μῆνας πέντε
  chosen: for five months
  alternatives:
  - five months
  lexicon: BDAG
  rationale: Accusative of duration is best rendered with 'for' in English.
- source_word: ὁ βασανισμὸς αὐτῶν
  chosen: their torment
  alternatives:
  - the torment they caused
  - their painful torment
  lexicon: BDAG
  rationale: 'Genitive αὐτῶν is most naturally subjective/possessive in context: the
    torment associated with them, i.e., the torment they inflict. ''Their torment''
    is concise and leaves the relation appropriately broad.'
- source_word: ὡς βασανισμὸς σκορπίου
  chosen: like the torment of a scorpion
  alternatives:
  - like a scorpion's torment
  - like the pain from a scorpion
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'The torment of a scorpion' keeps the repeated
    noun and the genitive construction while remaining readable.
- source_word: ὅταν παίσῃ
  chosen: when it strikes
  alternatives:
  - when it stings
  - whenever it strikes
  lexicon: BDAG
  rationale: παίω means strike/hit. Because the subject is a scorpion, English readers
    naturally think of stinging; however, 'strikes' stays closer to the Greek while
    still fitting the image. The more specific 'stings' is a plausible contextual
    alternative preserved in a footnote.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: Per the translation philosophy's gender-accurate principle, ἄνθρωπον
    here is singular generic but grammatically masculine. 'A man' preserves the source
    form and idiom; an inclusive alternative is worth noting in a footnote.
