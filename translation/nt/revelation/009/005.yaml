theological_decisions:
- issue: Divine passive in apocalyptic judgment
  chosen_reading: Retain the passive 'it was given to them' without explicitly naming
    God as the giver.
  alternative_readings:
  - God gave them authority
  - they were permitted
  rationale: The Greek uses a divine passive common in Revelation. Making God explicit
    would interpret beyond the wording, while 'it was given' preserves the text's
    theological tension regarding divine sovereignty and mediated judgment.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of generic ἄνθρωπον
  chosen_reading: Translate as 'a man' in the main text.
  alternative_readings:
  - a person
  - someone
  rationale: The source is grammatically masculine singular with representative force.
    Following the gender-accurate principle, the main text keeps 'man,' while a footnote
    preserves the inclusive sense for modern readers.
  doctrine_reference: Translation philosophy §4
