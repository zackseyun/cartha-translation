id: REV.9.7
reference: Revelation 9:7
source:
  edition: SBLGNT
  text: Καὶ τὰ ὁμοιώματα τῶν ἀκρίδων ὅμοια ἵπποις ἡτοιμασμένοις εἰς πόλεμον, καὶ ἐπὶ
    τὰς κεφαλὰς αὐτῶν ὡς στέφανοι ⸂ὅμοιοι χρυσῷ⸃, καὶ τὰ πρόσωπα αὐτῶν ὡς πρόσωπα
    ἀνθρώπων,
translation:
  text: And the appearances of the locusts were like horses prepared for battle, and
    on their heads were what seemed to be crowns like gold, and their faces were like
    human faces,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'victory wreaths'; Greek στέφανοι can refer to wreath-like crowns associated
      with honor or conquest.
    reason: lexical_alternative
  - marker: b
    text: Greek 'faces of humans'; the expression is generic, not specifically male.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοιώματα
  chosen: appearances
  alternatives:
  - forms
  - likenesses
  lexicon: BDAG
  rationale: ὁμοίωμα can denote form, appearance, or likeness. Here it introduces
    a visionary comparison rather than asserting literal identity, so 'appearances'
    communicates the visual impression in context.
- source_word: ἀκρίδων
  chosen: locusts
  lexicon: BDAG
  rationale: Standard rendering of ἀκρίς; the apocalyptic context does not alter the
    basic lexical sense.
- source_word: ὅμοια ἵπποις ἡτοιμασμένοις εἰς πόλεμον
  chosen: like horses prepared for battle
  alternatives:
  - similar to horses prepared for war
  lexicon: BDAG
  rationale: ὅμοια marks comparison; ἡτοιμασμένοις is a perfect passive participle
    describing a state of readiness. 'Prepared for battle' is idiomatic modern English
    and preserves the martial imagery.
- source_word: πόλεμον
  chosen: battle
  alternatives:
  - war
  lexicon: BDAG
  rationale: While πόλεμος often means 'war,' in this immediate phrase English reads
    more naturally with 'prepared for battle' while retaining the military sense.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτῶν
  chosen: on their heads
  lexicon: BDAG
  rationale: A straightforward spatial rendering of ἐπί with the accusative in this
    visionary description.
- source_word: ὡς στέφανοι
  chosen: what seemed to be crowns
  alternatives:
  - as crowns
  - like crowns
  lexicon: BDAG
  rationale: Because ὡς introduces comparison repeatedly in this verse, 'what seemed
    to be crowns' helps English readers track the visionary, simile-laden description
    without overstating literal identity.
- source_word: στέφανοι
  chosen: crowns
  alternatives:
  - wreaths
  - victor's crowns
  lexicon: BDAG
  rationale: στέφανος denotes a crown or wreath, often associated with victory. 'Crowns'
    is the clearest general rendering here; the more specific nuance is worth preserving
    in a footnote rather than narrowing the main text.
- source_word: ὅμοιοι χρυσῷ
  chosen: like gold
  alternatives:
  - similar to gold
  - golden
  lexicon: BDAG
  rationale: The dative χρυσῷ after ὅμοιοι expresses resemblance, not composition.
    'Like gold' preserves the simile better than 'golden,' which could imply actual
    material or color alone.
- source_word: πρόσωπα
  chosen: faces
  alternatives:
  - countenances
  lexicon: BDAG
  rationale: In this context πρόσωπα refers to visible faces. 'Faces' is natural modern
    English and preserves the concrete imagery.
- source_word: ἀνθρώπων
  chosen: human
  alternatives:
  - men's
  lexicon: BDAG
  rationale: ἄνθρωπος here is generic rather than specifically male. 'Human faces'
    is gender-accurate to the source's representative sense and aligns with the project's
    stated philosophy.
