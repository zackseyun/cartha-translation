theological_decisions:
- issue: Visionary simile language in apocalyptic imagery
  chosen_reading: Preserve repeated comparison markers rather than literalize the
    imagery
  alternative_readings:
  - Render more literally as 'and on their heads as crowns like gold'
  rationale: The verse repeatedly uses ὅμοια/ὡς to describe resemblance. The translation
    keeps this phenomenological quality ('were like,' 'what seemed to be,' 'like gold,'
    'like human faces') so as not to overstate literal ontology in apocalyptic vision.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
