theological_decisions:
- issue: Semantic scope of φαρμάκων in an apocalyptic vice list
  chosen_reading: sorceries
  alternative_readings:
  - magic arts
  - witchcrafts
  - poisonings
  rationale: The immediate context lists moral evils and idolatrous rebellion; in
    Revelation, cognate terms regularly carry the sense of sorcery or magical deception.
    Rendering it as 'sorceries' avoids anachronistically narrowing the term to modern
    pharmaceuticals while acknowledging the broader lexical range in a footnote.
  doctrine_reference: Translation philosophy §1, §5
