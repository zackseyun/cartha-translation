id: REV.9.21
reference: Revelation 9:21
source:
  edition: SBLGNT
  text: καὶ οὐ μετενόησαν ἐκ τῶν φόνων αὐτῶν οὔτε ἐκ τῶν ⸀φαρμάκων αὐτῶν οὔτε ἐκ τῆς
    πορνείας αὐτῶν οὔτε ἐκ τῶν κλεμμάτων αὐτῶν.
translation:
  text: And they did not repent of their murders, or of their sorceries, or of their
    sexual immorality, or of their thefts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'magic arts,' 'witchcrafts'; the Greek term can also be associated with
      potions or poisonings.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετενόησαν
  chosen: did not repent
  alternatives:
  - did not change their minds
  - did not turn away
  lexicon: BDAG
  rationale: μετανοέω in this moral context denotes repentance, not merely an internal
    change of mind. The English phrase 'did not repent' is the standard concise rendering
    and fits the following ἐκ-phrases indicating what they refused to turn from.
- source_word: ἐκ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: Repeated ἐκ with μετανοέω can be rendered woodenly as 'repent from,'
    but idiomatic English prefers 'repent of' in this construction. This preserves
    the sense of turning away from specific sins while remaining readable modern English.
- source_word: φόνων
  chosen: murders
  alternatives:
  - killings
  - murders they committed
  lexicon: BDAG
  rationale: φόνος commonly denotes murder or killing. 'Murders' best captures the
    moral-criminal force in this vice list and is more specific than the broader 'killings'.
- source_word: φαρμάκων
  chosen: sorceries
  alternatives:
  - magic arts
  - witchcrafts
  - poisonings
  lexicon: BDAG
  rationale: φάρμακον and its cognates can involve potions, poisons, or magical practices.
    In Revelation's vice-list and apocalyptic context, 'sorceries' best reflects the
    likely sense of occult/magical practices. Because the semantic range can include
    'poisonings' or drug-related potions, an alternative is preserved in a footnote.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: πορνεία has a broad sexual-ethics range. 'Sexual immorality' is clear
    modern English and avoids the narrower or archaic feel of 'fornication' while
    preserving the term's moral breadth.
- source_word: κλεμμάτων
  chosen: thefts
  alternatives:
  - stealings
  - acts of theft
  lexicon: BDAG
  rationale: κλέμμα denotes a thing stolen or an act of theft; in a vice list, 'thefts'
    is the most natural plural English rendering.
- source_word: οὔτε ... οὔτε ... οὔτε
  chosen: or ... or ... or
  alternatives:
  - nor ... nor ... nor
  lexicon: LSJ
  rationale: After the initial negated clause 'they did not repent,' English idiom
    naturally continues the series with 'or ... or ... or.' 'Nor' would also be possible,
    but 'or' reads more smoothly in contemporary English without loss of meaning.
