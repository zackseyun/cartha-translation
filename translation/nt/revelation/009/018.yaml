theological_decisions:
- issue: Rendering ἀνθρώπων in an apocalyptic judgment context
  chosen_reading: mankind
  alternative_readings:
  - humanity
  - people
  rationale: The term denotes human beings collectively, not males specifically. 'Mankind'
    preserves the broad, solemn register of the judgment scene while remaining gender-inclusive
    by sense. No doctrinal issue is resolved beyond the lexical scope of the Greek.
  doctrine_reference: Gender-accurate over gender-neutral
