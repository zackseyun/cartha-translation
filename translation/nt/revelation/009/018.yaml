id: REV.9.18
reference: Revelation 9:18
source:
  edition: SBLGNT
  text: ἀπὸ τῶν τριῶν πληγῶν τούτων ἀπεκτάνθησαν τὸ τρίτον τῶν ἀνθρώπων, ⸀ἐκ τοῦ πυρὸς
    καὶ τοῦ καπνοῦ καὶ τοῦ θείου τοῦ ἐκπορευομένου ἐκ τῶν στομάτων αὐτῶν.
translation:
  text: By these three plagues a third of mankind was killed—by the fire and the smoke
    and the sulfur coming out of their mouths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a third of humanity.' The Greek means human beings generally, not males
      specifically.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'brimstone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: By
  alternatives:
  - from
  lexicon: BDAG
  rationale: Here ἀπό introduces means or cause ('by means of these three plagues'),
    not simple spatial separation. 'By' is the most natural English rendering in context.
- source_word: τῶν τριῶν πληγῶν τούτων
  chosen: these three plagues
  alternatives:
  - the three plagues
  lexicon: BDAG
  rationale: The demonstrative τούτων is preserved with 'these,' pointing back to
    the immediately described agents of judgment. 'Plagues' is the standard rendering
    of πληγαί in Revelation for divinely sent blows/judgments.
- source_word: ἀπεκτάνθησαν
  chosen: was killed
  alternatives:
  - were killed
  - were put to death
  lexicon: BDAG
  rationale: The verb is passive aorist, 'were killed.' Because the grammatical subject
    in English is the collective singular phrase 'a third of mankind,' singular agreement
    ('was killed') is idiomatic while preserving the passive sense.
- source_word: τὸ τρίτον τῶν ἀνθρώπων
  chosen: a third of mankind
  alternatives:
  - the third of humanity
  - a third of people
  lexicon: BDAG
  rationale: τὸ τρίτον is partitive, indicating one-third. ἀνθρώπων here refers to
    human beings generally, so 'mankind' conveys humanity as a whole in a natural
    literary register; it is not male-specific in this context.
- source_word: ἐκ τοῦ πυρὸς καὶ τοῦ καπνοῦ καὶ τοῦ θείου
  chosen: by the fire and the smoke and the sulfur
  alternatives:
  - from the fire and the smoke and the sulfur
  - by the fire, smoke, and sulfur
  lexicon: BDAG
  rationale: The repeated articles and conjunctions are retained with a relatively
    formal cadence. ἐκ here marks source/instrument flowing from the horses' mouths;
    in English, 'by' best expresses the lethal agency already implied by the clause.
    θεῖον is best rendered 'sulfur' in contemporary English rather than the archaic
    'brimstone.'
- source_word: τοῦ ἐκπορευομένου
  chosen: coming out
  alternatives:
  - proceeding
  - going out
  lexicon: BDAG
  rationale: The present participle describes ongoing emergence from the mouths. 'Coming
    out' is clear modern English and preserves the vivid imagery without archaic diction.
- source_word: ἐκ τῶν στομάτων αὐτῶν
  chosen: of their mouths
  alternatives:
  - from their mouths
  lexicon: BDAG
  rationale: Attached to 'coming out,' English idiom prefers 'coming out of their
    mouths.' The plural pronoun refers back to the horse-like creatures in the vision.
