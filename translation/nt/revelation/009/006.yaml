id: REV.9.6
reference: Revelation 9:6
source:
  edition: SBLGNT
  text: καὶ ἐν ταῖς ἡμέραις ἐκείναις ζητήσουσιν οἱ ἄνθρωποι τὸν θάνατον καὶ οὐ μὴ
    εὑρήσουσιν αὐτόν, καὶ ἐπιθυμήσουσιν ἀποθανεῖν καὶ ⸀φεύγει ⸂ὁ θάνατος ἀπ’ αὐτῶν⸃.
translation:
  text: And in those days men will seek death and will certainly not find it, and
    they will long to die, but death flees from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people' or 'human beings'; Greek 'men' (ἄνθρωποι) is often used generically
      for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A standard temporal expression. 'In those days' is natural English and
    preserves the deictic force of ἐκείναις.
- source_word: ζητήσουσιν
  chosen: will seek
  alternatives:
  - will look for
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'look for.' 'Seek' better preserves the
    gravity and intentionality of the action in this apocalyptic context.
- source_word: οἱ ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - humanity
  lexicon: BDAG
  rationale: The noun is grammatically masculine plural and can be generic for human
    beings. Following the project's gender-accurate principle, 'men' preserves the
    source form and representative force better than a neutral recasting; the context
    speaks broadly of human beings under judgment, not specifically males only.
- source_word: τὸν θάνατον
  chosen: death
  lexicon: BDAG
  rationale: The direct object is personified later in the verse, but here the simple
    gloss 'death' best preserves both the literal term and the emerging personification.
- source_word: οὐ μὴ εὑρήσουσιν αὐτόν
  chosen: will certainly not find it
  alternatives:
  - will by no means find it
  - will never find it
  lexicon: BDAG
  rationale: οὐ μὴ with the future is an emphatic negation. 'Will certainly not find
    it' conveys the force in clear modern English without sounding archaic. 'It' refers
    back to death as the sought object.
- source_word: ἐπιθυμήσουσιν
  chosen: will long
  alternatives:
  - will desire
  - will crave
  lexicon: BDAG
  rationale: ἐπιθυμέω can mean 'desire strongly.' 'Will long' communicates intense
    desire in idiomatic English and fits the solemn tone.
- source_word: ἀποθανεῖν
  chosen: to die
  alternatives:
  - to be dead
  lexicon: BDAG
  rationale: The aorist infinitive of ἀποθνῄσκω is straightforwardly rendered 'to
    die.'
- source_word: φεύγει
  chosen: flees
  alternatives:
  - escapes
  - runs away
  lexicon: BDAG
  rationale: The present tense vividly portrays death as actively eluding them. 'Flees'
    preserves the personified imagery and the dramatic present better than a flatter
    alternative.
- source_word: ὁ θάνατος
  chosen: death
  lexicon: BDAG
  rationale: 'With the article and subject position, the noun is personified: ''death''
    as an active agent. English can preserve this without adding explanatory wording.'
- source_word: ἀπ’ αὐτῶν
  chosen: from them
  alternatives:
  - away from them
  lexicon: BDAG
  rationale: A direct rendering of ἀπό with the genitive. 'From them' is sufficient;
    the verb 'flees' already implies movement away.
