theological_decisions:
- issue: Personification of death in apocalyptic judgment
  chosen_reading: 'Retain the personification directly in the main text: ''death flees
    from them.'''
  alternative_readings:
  - Render more interpretively as 'they cannot die'
  rationale: The Greek explicitly presents death as the subject of φεύγει. Preserving
    the personification respects the imagery of the passage and avoids flattening
    John's apocalyptic style into mere paraphrase, even though the sense implies inability
    to die.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Generic masculine ἄνθρωποι
  chosen_reading: Translate as 'men' in the main text.
  alternative_readings:
  - people
  - human beings
  rationale: The project specifies gender-accurate over gender-neutral renderings
    where the Greek is grammatically masculine with representative force. Here 'men'
    preserves the source form while still functioning generically in context; an inclusivity
    note preserves the broader sense for readers.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
