id: REV.9.19
reference: Revelation 9:19
source:
  edition: SBLGNT
  text: ἡ γὰρ ἐξουσία τῶν ἵππων ἐν τῷ στόματι αὐτῶν ἐστιν καὶ ἐν ταῖς οὐραῖς αὐτῶν·
    αἱ γὰρ οὐραὶ αὐτῶν ὅμοιαι ⸀ὄφεσιν, ἔχουσαι κεφαλάς, καὶ ἐν αὐταῖς ἀδικοῦσιν.
translation:
  text: For the power of the horses is in their mouths and in their tails; for their
    tails are like snakes, having heads, and with them they do harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like serpents.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they injure by them'; the Greek literally says 'and in them they do
      harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσία
  chosen: power
  alternatives:
  - authority
  lexicon: BDAG
  rationale: In this apocalyptic context, ἐξουσία refers to the effective capacity
    by which the horses inflict harm, not primarily delegated jurisdiction. 'Power'
    best fits the imagery and English idiom.
- source_word: στόματι
  chosen: mouths
  alternatives:
  - mouth
  lexicon: BDAG
  rationale: Singular in Greek after distributive plural possessive, but English naturally
    uses the plural 'mouths' to match 'horses' and 'their.'
- source_word: οὐραῖς
  chosen: tails
  lexicon: BDAG
  rationale: Standard gloss for οὐρά; the plural is explicit and important for the
    imagery.
- source_word: ὅμοιαι ὄφεσιν
  chosen: like snakes
  alternatives:
  - like serpents
  lexicon: BDAG
  rationale: ὄφις can be rendered 'snake' or 'serpent.' 'Snakes' is more natural modern
    English while preserving the reptilian image.
- source_word: ἔχουσαι κεφαλάς
  chosen: having heads
  alternatives:
  - with heads
  lexicon: BDAG
  rationale: The participial phrase is retained in a fairly formal way to preserve
    the vivid descriptive sequence of the Greek.
- source_word: ἀδικοῦσιν
  chosen: they do harm
  alternatives:
  - they injure
  - they wrong
  lexicon: BDAG
  rationale: Here ἀδικέω in Revelation commonly denotes causing injury or harm rather
    than committing injustice in an abstract moral sense. 'Do harm' is clear, idiomatic,
    and contextually appropriate.
- source_word: ἐν αὐταῖς
  chosen: with them
  alternatives:
  - by them
  - in them
  lexicon: BDAG
  rationale: The preposition ἐν with the instrumental sense is best conveyed here
    as 'with them,' referring to the tails/heads as the means by which harm is inflicted.
    A more literal 'in them' would be unclear in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Both occurrences of γάρ are explanatory, and 'for' preserves the discourse
    connection without overinterpreting the logic.
