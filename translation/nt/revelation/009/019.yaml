theological_decisions:
- issue: Apocalyptic imagery of the horses' tails and heads
  chosen_reading: Render the imagery straightforwardly without allegorical interpretation
  alternative_readings:
  - Interpret the tails symbolically as false teaching or demonic agency
  rationale: The verse presents visionary description, and the translation should
    preserve the image rather than encode a theological interpretation not explicit
    in the Greek.
  doctrine_reference: Translation philosophy §§1, 3
