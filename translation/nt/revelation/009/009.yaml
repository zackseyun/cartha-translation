id: REV.9.9
reference: Revelation 9:9
source:
  edition: SBLGNT
  text: καὶ εἶχον θώρακας ὡς θώρακας σιδηροῦς, καὶ ἡ φωνὴ τῶν πτερύγων αὐτῶν ὡς φωνὴ
    ἁρμάτων ἵππων πολλῶν τρεχόντων εἰς πόλεμον·
translation:
  text: And they had breastplates like iron breastplates, and the sound of their wings
    was like the sound of many horse-drawn chariots rushing into battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'like the sound of chariots of many horses running into
      battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θώρακας
  chosen: breastplates
  alternatives:
  - chest armor
  - armor
  lexicon: BDAG
  rationale: θώραξ refers specifically to body armor covering the chest/torso. 'Breastplates'
    is the standard precise English equivalent and fits the repeated simile in the
    verse.
- source_word: ὡς θώρακας σιδηροῦς
  chosen: like iron breastplates
  alternatives:
  - as iron breastplates
  - like breastplates of iron
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Like iron breastplates' preserves the simile and
    the adjective σιδηροῦς naturally as 'iron.'
- source_word: φωνὴ
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound/noise.' Here it refers to the audible
    effect of wings and chariots, so 'sound' is the most natural English rendering.
- source_word: πτερύγων
  chosen: wings
  lexicon: BDAG
  rationale: πτέρυξ straightforwardly means 'wing'; the genitive with φωνή yields
    'the sound of their wings.'
- source_word: ἁρμάτων
  chosen: horse-drawn chariots
  alternatives:
  - chariots
  lexicon: BDAG
  rationale: ἅρμα means 'chariot.' Because ἵππων follows in genitive relation, the
    phrase is best represented in idiomatic English as 'horse-drawn chariots,' making
    explicit the relation without overtranslating.
- source_word: ἵππων πολλῶν
  chosen: many
  alternatives:
  - many horses
  lexicon: BDAG
  rationale: The Greek literally includes 'of horses, many,' modifying the chariot
    image. In English, 'many horse-drawn chariots' communicates the collective force
    of the image more naturally than the more wooden 'chariots of many horses.' The
    horse element is retained in 'horse-drawn.'
- source_word: τρεχόντων
  chosen: rushing
  alternatives:
  - running
  - charging
  lexicon: BDAG
  rationale: τρέχω literally means 'run.' With chariots going εἰς πόλεμον, 'rushing'
    conveys rapid forward motion in vivid modern English without adding a military
    nuance stronger than the context already supplies.
- source_word: εἰς πόλεμον
  chosen: into battle
  alternatives:
  - to war
  - into war
  lexicon: BDAG
  rationale: πόλεμος is 'war/battle.' In this immediate image of chariots in motion,
    'into battle' is idiomatic and vivid, preserving the martial sense.
