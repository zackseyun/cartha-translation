theological_decisions:
- issue: Nature of the imagery in John's vision
  chosen_reading: Render the description straightforwardly as visionary simile without
    interpreting the locusts as literal machines, demons, or symbolic armies in the
    translation itself.
  alternative_readings:
  - literal military imagery
  - symbolic/apocalyptic imagery with multiple possible referents
  rationale: The verse consists of explicit comparisons marked by ὡς ('like'). The
    translation should preserve the imagery and not resolve debated apocalyptic interpretation
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
