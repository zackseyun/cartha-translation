theological_decisions:
- issue: Nature of the locusts' granted capacity
  chosen_reading: Render ἐξουσία as 'authority' and retain the divine passive 'was
    given' without identifying the giver explicitly.
  alternative_readings:
  - Render ἐξουσία as 'power'
  - Make the implied giver explicit in translation
  rationale: The text emphasizes that the locusts operate under delegated permission
    rather than autonomous force. Keeping the passive preserves the theological restraint
    and apocalyptic idiom without importing an interpretation beyond the Greek.
  doctrine_reference: Translation philosophy items 1, 3, and 5
