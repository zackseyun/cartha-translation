id: REV.9.3
reference: Revelation 9:3
source:
  edition: SBLGNT
  text: καὶ ἐκ τοῦ καπνοῦ ἐξῆλθον ἀκρίδες εἰς τὴν γῆν, καὶ ἐδόθη αὐταῖς ἐξουσία ὡς
    ἔχουσιν ἐξουσίαν οἱ σκορπίοι τῆς γῆς.
translation:
  text: And out of the smoke came locusts onto the earth, and authority was given
    to them, like the authority that the scorpions of the earth have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'power was given to them.' The Greek word can denote authority, right,
      or power; 'authority' was chosen to reflect delegated permission in the passive
      construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ καπνοῦ
  chosen: out of the smoke
  alternatives:
  - from the smoke
  lexicon: BDAG
  rationale: ἐκ marks movement out from within; 'out of' preserves the vivid emergence
    imagery better than the flatter 'from.'
- source_word: ἐξῆλθον
  chosen: came
  alternatives:
  - went out
  - came out
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι means 'went/came out.' In English, with the preceding
    'out of the smoke,' simply 'came' avoids redundancy while preserving the motion.
- source_word: ἀκρίδες
  chosen: locusts
  alternatives:
  - grasshoppers
  lexicon: BDAG
  rationale: ἀκρίς normally denotes 'locust,' the standard term in biblical and apocalyptic
    contexts; 'grasshoppers' is less precise.
- source_word: εἰς τὴν γῆν
  chosen: onto the earth
  alternatives:
  - upon the earth
  - to the earth
  - onto the land
  lexicon: BDAG
  rationale: εἰς expresses movement toward/upon. In Revelation, γῆ often has the broad
    sense 'earth' rather than merely 'land'; 'onto' reflects the directional force.
- source_word: ἐδόθη αὐταῖς ἐξουσία
  chosen: authority was given to them
  alternatives:
  - power was given to them
  - they were given authority
  lexicon: BDAG
  rationale: ἐξουσία is better rendered 'authority' than 'power' here, since the verse
    speaks of granted right/capacity analogous to scorpions' harmful function. The
    passive 'was given' preserves the Greek form and the implied divine permission
    without over-specifying the giver.
- source_word: ὡς ἔχουσιν ἐξουσίαν
  chosen: like the authority that ... have
  alternatives:
  - as ... have authority
  - just as ... have power
  lexicon: BDAG
  rationale: ὡς introduces comparison. Repeating 'authority' mirrors the Greek repetition
    of ἐξουσία and preserves the formal parallel.
- source_word: οἱ σκορπίοι τῆς γῆς
  chosen: the scorpions of the earth
  alternatives:
  - earthly scorpions
  - the scorpions on the earth
  lexicon: BDAG
  rationale: The genitive is retained straightforwardly. 'Of the earth' preserves
    the wording and contrasts naturally with the locusts emerging from the abyss-related
    smoke in context.
