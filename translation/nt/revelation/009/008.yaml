theological_decisions:
- issue: Nature of the imagery in apocalyptic description
  chosen_reading: Retain the similes straightforwardly without interpreting them symbolically
    in translation.
  alternative_readings:
  - Translate with more interpretive language that explains the symbolism
  rationale: The Greek presents visionary comparisons ('like women’s hair,' 'like
    lions’ teeth') without explanation. Following optimal equivalence and preserving
    theological tension, the translation keeps the imagery rather than resolving its
    meaning.
  doctrine_reference: Translation philosophy §3
