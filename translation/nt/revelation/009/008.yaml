id: REV.9.8
reference: Revelation 9:8
source:
  edition: SBLGNT
  text: καὶ εἶχον τρίχας ὡς τρίχας γυναικῶν, καὶ οἱ ὀδόντες αὐτῶν ὡς λεόντων ἦσαν,
translation:
  text: And they had hair like women’s hair, and their teeth were like lions’ teeth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “like the hair of women.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶχον
  chosen: they had
  alternatives:
  - they were having
  lexicon: BDAG
  rationale: Imperfect of ἔχω in descriptive visionary narrative is best rendered
    with simple past in natural English.
- source_word: τρίχας
  chosen: hair
  alternatives:
  - hairs
  lexicon: BDAG
  rationale: Although plural in Greek, English normally uses the mass noun 'hair'
    for natural description. This preserves sense without awkward literalism.
- source_word: ὡς τρίχας γυναικῶν
  chosen: like women’s hair
  alternatives:
  - as the hair of women
  - like the hair of women
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Women’s hair' is idiomatic modern English and preserves
    the simile without overformal phrasing.
- source_word: οἱ ὀδόντες αὐτῶν
  chosen: their teeth
  alternatives:
  - the teeth of them
  lexicon: BDAG
  rationale: The article plus noun with possessive pronoun is naturally rendered as
    an English possessive construction.
- source_word: ὡς λεόντων
  chosen: like lions’ teeth
  alternatives:
  - like lions
  - like the teeth of lions
  lexicon: BDAG
  rationale: 'Because the comparison modifies ''teeth,'' English supplies the implied
    noun for clarity: their teeth were like lions'' teeth. This avoids a potentially
    abrupt or ambiguous ''their teeth were like lions.'''
- source_word: ἦσαν
  chosen: were
  lexicon: BDAG
  rationale: Standard imperfect of εἰμί in descriptive narrative; simple past is the
    clearest English rendering.
