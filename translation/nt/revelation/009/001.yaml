id: REV.9.1
reference: Revelation 9:1
source:
  edition: SBLGNT
  text: Καὶ ὁ πέμπτος ἄγγελος ἐσάλπισεν· καὶ εἶδον ἀστέρα ἐκ τοῦ οὐρανοῦ πεπτωκότα
    εἰς τὴν γῆν, καὶ ἐδόθη αὐτῷ ἡ κλεὶς τοῦ φρέατος τῆς ἀβύσσου·
translation:
  text: And the fifth angel sounded the trumpet, and I saw a star that had fallen
    from heaven to the earth, and the key to the shaft of the abyss was given to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a star fallen from heaven to the earth.' The Greek participle can be
      rendered more compactly, but likely indicates that the fall had already occurred
      when John saw it.
    reason: lexical_alternative
  - marker: b
    text: The 'star' may symbolize a personal being, since the text continues, 'the
      key ... was given to him.'
    reason: alternative_reading
  - marker: c
    text: 'Traditional: ''the key to the pit of the abyss'' or ''the bottomless pit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: sounded the trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound or blow a trumpet. In English, 'sounded
    the trumpet' is natural and preserves the explicit trumpet imagery implied by
    the verb.
- source_word: ἀστέρα
  chosen: star
  alternatives:
  - angelic being
  lexicon: BDAG
  rationale: ἀστήρ literally means 'star.' Although in apocalyptic context the referent
    may symbolize or represent a personal being, the translation should preserve the
    image in the main text rather than interpret it.
- source_word: πεπτωκότα
  chosen: that had fallen
  alternatives:
  - fallen
  lexicon: BDAG
  rationale: The perfect active participle indicates a completed fall with resulting
    state. 'That had fallen' conveys prior action relative to John's seeing more clearly
    than the bare adjective-like 'fallen.'
- source_word: ἐκ τοῦ οὐρανοῦ ... εἰς τὴν γῆν
  chosen: from heaven to the earth
  alternatives:
  - from the sky to the earth
  - out of heaven onto the earth
  lexicon: BDAG
  rationale: οὐρανός here is best rendered 'heaven' in Revelation's visionary setting,
    not merely 'sky.' Retaining 'the earth' reflects the article and the cosmic contrast.
- source_word: ἐδόθη αὐτῷ
  chosen: was given to him
  alternatives:
  - he was given
  - was granted to him
  lexicon: BDAG
  rationale: The passive construction is important in Revelation, often implying divine
    permission or sovereignty without naming the giver. 'Was given to him' preserves
    that form and theological nuance.
- source_word: κλεὶς
  chosen: the key
  alternatives:
  - a key
  lexicon: BDAG
  rationale: The noun is articular in Greek (ἡ κλεὶς), so 'the key' is the most straightforward
    rendering.
- source_word: φρέατος
  chosen: shaft
  alternatives:
  - pit
  - well
  lexicon: BDAG
  rationale: φρέαρ denotes a pit, well, or shaft. Because ἀβύσσου already carries
    the sense of the abyss/deep, 'shaft' distinguishes the opening/access point from
    the abyss itself and avoids flattening the genitive construction into 'bottomless
    pit.'
- source_word: τῆς ἀβύσσου
  chosen: of the abyss
  alternatives:
  - of the bottomless pit
  - of the deep
  lexicon: BDAG
  rationale: ἄβυσσος is best rendered 'abyss,' a standard and transparent English
    equivalent that preserves the apocalyptic term without overinterpreting it. 'Bottomless
    pit' is traditional but more interpretive than the Greek itself requires.
