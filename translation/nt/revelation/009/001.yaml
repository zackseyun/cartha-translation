theological_decisions:
- issue: Whether to identify the 'star' as an angel or Satan in the main text
  chosen_reading: Retain 'star' in the main text without interpretive identification
  alternative_readings:
  - angelic messenger
  - Satanic figure
  rationale: The verse presents the figure under the image of a star and then uses
    masculine reference ('to him'), suggesting personification or symbolic identity,
    but it does not explicitly identify the figure. Per translation philosophy, theological
    tension should be preserved rather than resolved by importing an interpretation
    into the text.
  doctrine_reference: Translation philosophy §3
- issue: Whether the passive 'was given' should be made explicit as divine agency
  chosen_reading: Keep the passive without naming God as giver
  alternative_readings:
  - God gave him the key
  rationale: Revelation frequently uses divine passives. Making God the explicit subject
    would be a plausible interpretation, but the Greek leaves the agent unstated.
    The translation therefore preserves the text's restraint.
  doctrine_reference: Translation philosophy §3
