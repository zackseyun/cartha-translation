theological_decisions:
- issue: Rendering apocalyptic locale terminology without importing traditional interpretive
    language
  chosen_reading: Translated ἄβυσσος as 'abyss' and φρέαρ as 'shaft,' yielding 'the
    shaft of the abyss.'
  alternative_readings:
  - the bottomless pit
  - the pit of the abyss
  rationale: This preserves the imagery of an opening leading to the abyss and avoids
    conflating the opening itself with the abyss. It also avoids the tradition-laden
    'bottomless pit,' which goes beyond the plain lexical sense of ἄβυσσος in this
    verse.
  doctrine_reference: Translation philosophy §1, §5
