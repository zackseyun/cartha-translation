id: REV.9.2
reference: Revelation 9:2
source:
  edition: SBLGNT
  text: καὶ ἤνοιξεν τὸ φρέαρ τῆς ἀβύσσου, καὶ ἀνέβη καπνὸς ἐκ τοῦ φρέατος ὡς καπνὸς
    καμίνου ⸀μεγάλης, καὶ ⸀ἐσκοτώθη ὁ ἥλιος καὶ ὁ ἀὴρ ἐκ τοῦ καπνοῦ τοῦ φρέατος.
translation:
  text: And he opened the shaft of the abyss, and smoke went up from the shaft like
    the smoke of a great furnace, and the sun and the air were darkened by the smoke
    from the shaft.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the pit of the abyss'; traditionally, 'the bottomless pit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - unlocked
  lexicon: BDAG
  rationale: Aorist active indicative of ἀνοίγω, straightforwardly rendered 'opened.'
    'Unlocked' would over-specify the manner, which the verb itself does not require
    in this verse.
- source_word: φρέαρ
  chosen: shaft
  alternatives:
  - pit
  - well
  lexicon: BDAG
  rationale: Although φρέαρ can denote a well or pit, in this apocalyptic context
    it refers to the opening/access passage to the abyss. 'Shaft' best captures the
    idea of a vertical opening without collapsing it into the abyss itself. This also
    preserves the distinction between φρέαρ ('shaft') and ἄβυσσος ('abyss').
- source_word: ἀβύσσου
  chosen: of the abyss
  alternatives:
  - of the bottomless pit
  - of the deep
  lexicon: BDAG
  rationale: Rendered 'abyss' to reflect the Greek noun directly and avoid importing
    the traditional but interpretive phrase 'bottomless pit.' 'Deep' is possible but
    less precise in Revelation's apocalyptic usage.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - rose
  - came up
  lexicon: BDAG
  rationale: Aorist active indicative of ἀναβαίνω. 'Went up' is natural modern English
    and preserves the upward motion. 'Rose' is also possible, but 'went up' more transparently
    reflects the verbal idea.
- source_word: καπνὸς
  chosen: smoke
  lexicon: BDAG
  rationale: Standard rendering; repeated consistently through the verse.
- source_word: ὡς καπνὸς καμίνου μεγάλης
  chosen: like the smoke of a great furnace
  alternatives:
  - like smoke from a large furnace
  lexicon: BDAG
  rationale: ὡς marks comparison, and κάμινος denotes a furnace. 'Great furnace' is
    a natural rendering of the genitive phrase with μεγάλης while staying close to
    the Greek imagery.
- source_word: ἐσκοτώθη
  chosen: were darkened
  alternatives:
  - was darkened
  - grew dark
  lexicon: BDAG
  rationale: 'The singular verb governs a compound subject (''the sun and the air''),
    which idiomatic English renders with plural agreement: ''were darkened.'' Passive
    sense is retained. ''Grew dark'' would weaken the passive/resultative nuance.'
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: ὁ ἀὴρ
  chosen: the air
  alternatives:
  - the sky
  lexicon: BDAG
  rationale: ἀήρ refers to the air/atmosphere. 'Air' is the more direct rendering;
    'sky' would shift the image from atmosphere to visible heavens.
- source_word: ἐκ τοῦ καπνοῦ τοῦ φρέατος
  chosen: by the smoke from the shaft
  alternatives:
  - from the smoke of the shaft
  lexicon: BDAG
  rationale: The repeated ἐκ phrase expresses source/cause. 'By the smoke from the
    shaft' communicates the causal force naturally in English while preserving the
    source relation.
