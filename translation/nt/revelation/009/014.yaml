theological_decisions:
- issue: Identity and moral status of the four angels
  chosen_reading: Render simply as 'the four angels' without specifying whether they
    are holy or fallen.
  alternative_readings:
  - the four fallen angels
  - the four angels appointed for judgment
  rationale: The verse itself identifies them only as angels who are bound at the
    Euphrates. Adding 'fallen' or another interpretive qualifier would import a theological
    conclusion not explicit in the text. The translation preserves the narrative tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
