id: REV.9.14
reference: Revelation 9:14
source:
  edition: SBLGNT
  text: ⸀λέγοντα τῷ ἕκτῳ ἀγγέλῳ, ὁ ἔχων τὴν σάλπιγγα· Λῦσον τοὺς τέσσαρας ἀγγέλους
    τοὺς δεδεμένους ἐπὶ τῷ ποταμῷ τῷ μεγάλῳ Εὐφράτῃ.
translation:
  text: saying to the sixth angel, the one who had the trumpet, “Release the four
    angels who are bound at the great river Euphrates.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who have been bound' or 'having been bound'; the Greek perfect participle
      emphasizes their existing state of restraint resulting from a prior binding.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντα
  chosen: saying
  alternatives:
  - that said
  - speaking
  lexicon: BDAG
  rationale: Present participle carried into English as 'saying' to preserve the ongoing
    verbal action connected to the voice from the altar in the previous verse.
- source_word: τῷ ἕκτῳ ἀγγέλῳ
  chosen: to the sixth angel
  alternatives:
  - to the angel, the sixth
  lexicon: BDAG
  rationale: Straightforward dative indirect object with ordinal adjective; natural
    English order is retained.
- source_word: ὁ ἔχων τὴν σάλπιγγα
  chosen: the one who had the trumpet
  alternatives:
  - who had the trumpet
  - the one holding the trumpet
  lexicon: BDAG
  rationale: The articular participial phrase identifies which angel is addressed.
    'Had' is idiomatic in English for possession of the trumpet in this narrative
    setting; 'the one who had' preserves the appositional force more clearly than
    a bare relative clause.
- source_word: Λῦσον
  chosen: Release
  alternatives:
  - Loose
  - Set free
  lexicon: BDAG
  rationale: Aorist imperative of λύω. 'Release' is clear modern English and fits
    the command to remove restraint. 'Loose' is more traditional but less natural
    for contemporary readers.
- source_word: τοὺς τέσσαρας ἀγγέλους
  chosen: the four angels
  lexicon: BDAG
  rationale: Direct object with numeral; rendered directly and literally.
- source_word: τοὺς δεδεμένους
  chosen: who are bound
  alternatives:
  - having been bound
  - who have been bound
  lexicon: BDAG
  rationale: Perfect passive participle indicates a present state resulting from prior
    binding. 'Who are bound' gives natural English while preserving the state of restraint.
- source_word: ἐπὶ τῷ ποταμῷ
  chosen: at the river
  alternatives:
  - by the river
  - on the river
  lexicon: BDAG
  rationale: With dative, ἐπί here is locative. 'At' is the most natural English rendering
    for beings restrained in relation to a riverbank or region.
- source_word: τῷ μεγάλῳ Εὐφράτῃ
  chosen: the great river Euphrates
  alternatives:
  - the great Euphrates River
  - the great river, the Euphrates
  lexicon: BDAG
  rationale: The Greek apposition naturally yields the established English expression
    'the great river Euphrates,' preserving both the epithet and the proper name.
