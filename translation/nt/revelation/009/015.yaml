theological_decisions:
- issue: Referent and force of the temporal phrase 'the hour and day and month and
    year'
  chosen_reading: A specific divinely appointed time is in view, expressed with cumulative
    temporal precision.
  alternative_readings:
  - A period totaling a year, month, day, and hour
  - A general statement of God's sovereign timing without specifying exact chronology
  rationale: The Greek most naturally presents a sequence of time markers under one
    article, emphasizing exact appointment rather than inviting a calculation scheme.
    The translation preserves the wording without resolving apocalyptic chronology
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἀνθρώπων
  chosen_reading: humanity
  alternative_readings:
  - mankind
  - people
  - men
  rationale: The noun is generic for human beings, not specifically males. 'Humanity'
    preserves the collective scope and avoids importing male-specific reference while
    remaining faithful to the source intent.
  doctrine_reference: Gender-accurate over gender-neutral.
