id: REV.9.15
reference: Revelation 9:15
source:
  edition: SBLGNT
  text: καὶ ἐλύθησαν οἱ τέσσαρες ἄγγελοι οἱ ἡτοιμασμένοι εἰς τὴν ὥραν ⸀καὶ ἡμέραν
    καὶ μῆνα καὶ ἐνιαυτόν, ἵνα ἀποκτείνωσιν τὸ τρίτον τῶν ἀνθρώπων.
translation:
  text: And the four angels who had been prepared for the hour and day and month and
    year were released, so that they might kill a third of humanity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for this hour and day and month and year.' The Greek may emphasize
      a precisely appointed moment in God's timing.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a third of mankind.' The Greek means human beings generally, not males
      specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλύθησαν
  chosen: were released
  alternatives:
  - were loosed
  - were set free
  lexicon: BDAG
  rationale: Aorist passive of λύω. In this context of previously bound angels (cf.
    preceding verse), 'were released' is natural modern English and preserves the
    passive sense without archaic wording like 'loosed.'
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Revelation's apocalyptic context, supernatural beings are clearly
    intended rather than human messengers.
- source_word: ἡτοιμασμένοι
  chosen: who had been prepared
  alternatives:
  - having been prepared
  - made ready
  lexicon: BDAG
  rationale: Perfect passive participle indicates a prior state of readiness resulting
    from earlier preparation. 'Who had been prepared' communicates that completed
    prior preparation in idiomatic English.
- source_word: εἰς τὴν ὥραν καὶ ἡμέραν καὶ μῆνα καὶ ἐνιαυτόν
  chosen: for the hour and day and month and year
  alternatives:
  - for this hour and day and month and year
  - for the appointed hour, day, month, and year
  lexicon: BDAG
  rationale: The sequence is retained closely to preserve the cumulative temporal
    specificity of the Greek. The article before ὥραν likely governs the whole series.
    'For the hour and day and month and year' best reflects the text without over-interpreting
    whether it means a precise moment or a duration.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic and preserves the purposive
    force.
- source_word: ἀποκτείνωσιν
  chosen: they might kill
  alternatives:
  - they might slay
  - they might put to death
  lexicon: BDAG
  rationale: Aorist active subjunctive under ἵνα expresses intended action. 'Kill'
    is the clearest contemporary equivalent; 'slay' is more traditional but less natural.
- source_word: τὸ τρίτον τῶν ἀνθρώπων
  chosen: a third of humanity
  alternatives:
  - the third part of mankind
  - a third of people
  - a third of men
  lexicon: BDAG
  rationale: τὸ τρίτον is a partitive expression meaning 'a third.' ἀνθρώπων refers
    to human beings generally. 'Humanity' avoids implying males only while accurately
    conveying the collective sense; this follows the gender-accurate principle for
    generic ἄνθρωπος.
