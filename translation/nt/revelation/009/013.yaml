theological_decisions:
- issue: Identity of the voice
  chosen_reading: Render neutrally as 'one voice' without specifying whether it is
    God's voice, an angel's voice, or a personified voice from the altar.
  alternative_readings:
  - the voice of God
  - the voice of an angel
  - a voice associated with the altar
  rationale: The Greek states only that John heard 'one voice' from the horns of the
    golden altar before God. The translation should preserve the text's ambiguity
    rather than resolve it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
