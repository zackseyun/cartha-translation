id: REV.9.13
reference: Revelation 9:13
source:
  edition: SBLGNT
  text: Καὶ ὁ ἕκτος ἄγγελος ἐσάλπισεν· καὶ ἤκουσα φωνὴν μίαν ἐκ ⸀τῶν κεράτων τοῦ θυσιαστηρίου
    τοῦ χρυσοῦ τοῦ ἐνώπιον τοῦ θεοῦ,
translation:
  text: And the sixth angel blew his trumpet, and I heard one voice from the horns
    of the golden altar that is before God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a single voice.' The Greek emphasizes that the voice was one.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: blew his trumpet
  alternatives:
  - sounded
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound or blow a trumpet. In this apocalyptic
    sequence, English idiom is clearest with the explicit object 'his trumpet,' which
    is implied by the verb and standard in context.
- source_word: φωνὴν μίαν
  chosen: one voice
  alternatives:
  - a single voice
  - one sound
  lexicon: BDAG
  rationale: The accusative phrase is most naturally rendered 'one voice.' This preserves
    the emphasis on singularity without overinterpreting whose voice it is.
- source_word: ἐκ τῶν κεράτων
  chosen: from the horns
  alternatives:
  - out of the horns
  lexicon: BDAG
  rationale: ἐκ indicates source/origin, and κέρατα refers to the horn-like projections
    of the altar. 'From the horns' is natural English and preserves the cultic imagery.
- source_word: θυσιαστηρίου τοῦ χρυσοῦ
  chosen: the golden altar
  alternatives:
  - the altar of gold
  lexicon: BDAG
  rationale: This genitive-adjective construction is idiomatically rendered 'the golden
    altar.' It preserves the definite reference and matches the sanctuary imagery.
- source_word: τοῦ ἐνώπιον τοῦ θεοῦ
  chosen: that is before God
  alternatives:
  - which is in the presence of God
  - that stands before God
  lexicon: BDAG
  rationale: ἐνώπιον denotes position in the presence of or before someone. 'That
    is before God' is both formally close and readable, preserving the heavenly-temple
    setting.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation's visionary context, ἄγγελος clearly refers to an angelic
    being rather than a human messenger.
