id: REV.13.6
reference: Revelation 13:6
source:
  edition: SBLGNT
  text: καὶ ἤνοιξε τὸ στόμα αὐτοῦ εἰς ⸀βλασφημίας πρὸς τὸν θεόν, βλασφημῆσαι τὸ ὄνομα
    αὐτοῦ καὶ τὴν σκηνὴν αὐτοῦ, τοὺς ἐν τῷ οὐρανῷ σκηνοῦντας.
translation:
  text: And it opened its mouth in blasphemies against God, to blaspheme his name
    and his dwelling—that is, those dwelling in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and those who dwell in heaven,'' taking the final phrase as a third
      object of ''to blaspheme'' rather than as an explanation of ''his dwelling.'''
    reason: alternative_reading
  - marker: b
    text: '''Dwelling'' could also be rendered ''tabernacle'' or ''tent.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξε
  chosen: opened
  alternatives:
  - began to open
  lexicon: BDAG
  rationale: Aorist indicative of ἀνοίγω is straightforwardly rendered 'opened.' English
    idiom preserves the vivid action without adding aspectual nuance not explicit
    in the Greek.
- source_word: εἰς βλασφημίας
  chosen: in blasphemies
  alternatives:
  - for blasphemies
  - to utter blasphemies
  lexicon: BDAG
  rationale: The construction 'opened its mouth in blasphemies' closely reflects the
    Greek idiom and keeps the plural noun βλασφημίας, which suggests repeated or manifold
    blasphemous utterances rather than a single abstract act.
- source_word: πρὸς τὸν θεόν
  chosen: against God
  alternatives:
  - toward God
  - at God
  lexicon: BDAG
  rationale: With hostile speech, πρός is best rendered 'against' in English, making
    explicit the adversative force in context.
- source_word: βλασφημῆσαι
  chosen: to blaspheme
  alternatives:
  - so as to blaspheme
  - uttering blasphemy against
  lexicon: BDAG
  rationale: The aorist infinitive expresses purpose/result following 'opened its
    mouth'; 'to blaspheme' is the most direct and transparent rendering.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  lexicon: BDAG
  rationale: '''Name'' is retained literally, preserving the biblical sense of God''s
    revealed identity and honor without interpretive expansion.'
- source_word: τὴν σκηνὴν αὐτοῦ
  chosen: his dwelling
  alternatives:
  - his tabernacle
  - his tent
  lexicon: BDAG
  rationale: σκηνή can mean tent/tabernacle/dwelling. Here 'dwelling' communicates
    the sense accessibly in modern English while preserving the idea of God's heavenly
    habitation. 'Tabernacle' is possible but may over-import cultic associations for
    this immediate context.
- source_word: τοὺς ἐν τῷ οὐρανῷ σκηνοῦντας
  chosen: those dwelling in heaven
  alternatives:
  - those who dwell in heaven
  - those tabernacling in heaven
  lexicon: BDAG
  rationale: The present participle σκηνοῦντας is rendered 'dwelling' for natural
    English and to echo σκηνή semantically. The phrase is appositional/epexegetical
    to 'his dwelling,' identifying that dwelling in terms of its inhabitants.
- source_word: αὐτοῦ
  chosen: its / his
  lexicon: BDAG
  rationale: The first αὐτοῦ refers to the beast and is rendered 'its' because the
    referent is the beast rather than a male human. The later αὐτοῦ references God
    and is rendered 'his.' English pronouns are adjusted by referent while preserving
    the Greek distinctions in context.
