theological_decisions:
- issue: Relation between 'his dwelling' and 'those dwelling in heaven'
  chosen_reading: 'Render the final phrase as epexegetical/appositional to ''his dwelling''
    using an em dash: ''his dwelling—that is, those dwelling in heaven.'''
  alternative_readings:
  - 'Render as a third direct object coordinate with ''his name'' and ''his dwelling'':
    ''and those who dwell in heaven'''
  rationale: The Greek can be read either as simple coordination or as apposition
    clarifying what is meant by God's heavenly dwelling. The appositional reading
    best accounts for the accusative phrase following σκηνή and preserves the close
    lexical link between σκηνή and σκηνοῦντας. The dash signals the explanatory force
    without over-paraphrasing. Because the coordinate reading remains plausible, it
    is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
