theological_decisions:
- issue: Rendering δοῦλος in a social-status pair
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The immediate contrast with 'free' foregrounds legal/social bondage rather
    than general service. This matches the doctrine guideline to use 'slave' where
    bonded nature is salient.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
- issue: How to express the difficult clause ἵνα δῶσιν αὐτοῖς χάραγμα
  chosen_reading: to be given a mark
  alternative_readings:
  - so that they might receive a mark
  - so that they might give them a mark
  rationale: The main text should be readable modern English while remaining faithful
    to the Greek. A passive English rendering best captures the event described in
    context without importing extra theology about the exact mechanism. Because the
    Greek wording can be represented more literally in another way, that alternative
    is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
