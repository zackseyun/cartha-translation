id: REV.13.16
reference: Revelation 13:16
source:
  edition: SBLGNT
  text: καὶ ποιεῖ πάντας, τοὺς μικροὺς καὶ τοὺς μεγάλους, καὶ τοὺς πλουσίους καὶ τοὺς
    πτωχούς, καὶ τοὺς ἐλευθέρους καὶ τοὺς δούλους, ἵνα ⸀δῶσιν αὐτοῖς ⸀χάραγμα ἐπὶ
    τῆς χειρὸς αὐτῶν τῆς δεξιᾶς ἢ ἐπὶ τὸ μέτωπον αὐτῶν,
translation:
  text: And it causes everyone—the small and the great, and the rich and the poor,
    and the free and the slaves—to be given a mark on their right hand or on their
    forehead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “so that they might give them a mark.” The Greek wording
      is awkward in English; the main text renders the sense idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  chosen: causes
  alternatives:
  - makes
  - compels
  lexicon: BDAG
  rationale: 'ποιέω with ἵνα + subjunctive here expresses causation: the beast brings
    it about that this happens. ''Causes'' is natural English and avoids overstating
    coercion beyond the verb itself, while still conveying effective agency.'
- source_word: πάντας
  chosen: everyone
  alternatives:
  - all
  - all people
  lexicon: BDAG
  rationale: The accusative plural with the following paired categories refers comprehensively
    to all people in view. 'Everyone' is idiomatic modern English and preserves the
    universal scope.
- source_word: τοὺς μικροὺς καὶ τοὺς μεγάλους
  chosen: the small and the great
  alternatives:
  - the insignificant and the important
  - the lowly and the mighty
  lexicon: BDAG
  rationale: This pair is a stock expression for all social ranks. 'The small and
    the great' stays close to the Greek while remaining understandable; it preserves
    the rhetorical cadence of Revelation.
- source_word: τοὺς πλουσίους καὶ τοὺς πτωχούς
  chosen: the rich and the poor
  lexicon: BDAG
  rationale: Standard socioeconomic contrast; the conventional rendering is both accurate
    and clear.
- source_word: τοὺς ἐλευθέρους καὶ τοὺς δούλους
  chosen: the free and the slaves
  alternatives:
  - the free and the servants
  - the free and the bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος should be rendered 'slave' where bonded status is
    salient. In this social-status list, the contrast with 'free' makes the bonded
    nature explicit, so 'slaves' is the best rendering.
- source_word: ἵνα δῶσιν αὐτοῖς χάραγμα
  chosen: to be given a mark
  alternatives:
  - so that they might give them a mark
  - so that they might receive a mark
  lexicon: BDAG
  rationale: 'The Greek construction is text-critically difficult because δῶσιν with
    αὐτοῖς is literally ''that they might give to them a mark,'' but idiomatic English
    in context is passive: the people are caused ''to be given'' a mark. This preserves
    the sense without forcing awkward English. The alternative ''receive a mark''
    is possible as an interpretive smoothing but is less directly tied to the attested
    wording.'
- source_word: χάραγμα
  chosen: mark
  alternatives:
  - stamp
  - imprint
  lexicon: BDAG
  rationale: '''Mark'' is the standard and semantically appropriate rendering for
    χάραγμα in Revelation, covering the idea of an identifying inscription or imprint.'
- source_word: ἐπὶ τῆς χειρὸς αὐτῶν τῆς δεξιᾶς
  chosen: on their right hand
  alternatives:
  - on their right hands
  lexicon: BDAG
  rationale: Singular 'hand' after distributive 'their' is acceptable idiomatic English
    and avoids stiffness. 'Right' translates δεξιᾶς straightforwardly.
- source_word: ἢ ἐπὶ τὸ μέτωπον αὐτῶν
  chosen: or on their forehead
  alternatives:
  - or on their foreheads
  lexicon: BDAG
  rationale: As with 'hand,' singular 'forehead' works distributively in English and
    reads smoothly while preserving the singular Greek noun.
