theological_decisions:
- issue: Unnamed divine passive in repeated ἐδόθη
  chosen_reading: Preserve the passive ('it was given... authority was given') without
    identifying the giver in the main text.
  alternative_readings:
  - Use 'he was allowed' to make implicit divine permission explicit
  rationale: The Greek uses the passive and does not directly name the giver. Preserving
    that form maintains the text's theological tension regarding divine sovereignty
    and permitted evil rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
