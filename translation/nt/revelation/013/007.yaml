id: REV.13.7
reference: Revelation 13:7
source:
  edition: SBLGNT
  text: καὶ ἐδόθη αὐτῷ ποιῆσαι πόλεμον μετὰ τῶν ἁγίων καὶ νικῆσαι αὐτούς, καὶ ἐδόθη
    αὐτῷ ἐξουσία ἐπὶ πᾶσαν φυλὴν καὶ λαὸν καὶ γλῶσσαν καὶ ἔθνος.
translation:
  text: And it was given to him to make war against the saints and to conquer them,
    and authority was given to him over every tribe and people and language and nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to wage war with the saints'; here the sense is hostile, that is, 'against
      the saints.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to overcome them.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''tongue'' for ''language.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  chosen: it was given / was given
  alternatives:
  - he was allowed
  - it was granted
  lexicon: BDAG
  rationale: Rendered with an English passive to preserve the Greek passive form and
    the text's restraint about the unnamed giver. 'Granted' is possible, but 'given'
    is more direct and consistent across both occurrences in the verse.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative indirect object; repeated both times for clarity and
    fidelity.
- source_word: ποιῆσαι πόλεμον
  chosen: to make war
  alternatives:
  - to wage war
  lexicon: BDAG
  rationale: A natural English rendering of the infinitive plus object that preserves
    the idiomatic force without over-paraphrase. 'Wage war' is also idiomatic, but
    'make war' stays slightly closer to the Greek expression.
- source_word: μετὰ τῶν ἁγίων
  chosen: against the saints
  alternatives:
  - with the saints
  lexicon: BDAG
  rationale: Although μετά with genitive often means 'with,' in the collocation with
    πολεμεῖν/ποιεῖν πόλεμον in apocalyptic and biblical usage it denotes hostile engagement,
    hence 'against.' 'Saints' preserves the established sense of ἅγιοι as God's holy
    people.
- source_word: ἁγίων
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: '''Saints'' is concise, readable, and standard for ἅγιοι in this context.
    ''Holy ones'' is possible but can sound less natural in English and may suggest
    angelic beings here.'
- source_word: νικῆσαι
  chosen: to conquer
  alternatives:
  - to overcome
  - to defeat
  lexicon: BDAG
  rationale: Revelation uses νικάω as a key motif; 'conquer' preserves that thematic
    consistency better than 'defeat' and avoids flattening the term.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - dominion
  lexicon: BDAG
  rationale: '''Authority'' best reflects delegated right or jurisdiction, fitting
    the repeated passive ''was given.'' ''Power'' could overemphasize raw might rather
    than authorized rule.'
- source_word: ἐπὶ πᾶσαν φυλὴν καὶ λαὸν καὶ γλῶσσαν καὶ ἔθνος
  chosen: over every tribe and people and language and nation
  alternatives:
  - over every tribe and people and tongue and nation
  lexicon: BDAG
  rationale: Rendered straightforwardly and comprehensibly. 'Language' is preferred
    over the more traditional 'tongue' for modern readability while preserving the
    ethnic-linguistic scope of the formula.
- source_word: φυλή
  chosen: tribe
  alternatives:
  - clan
  lexicon: BDAG
  rationale: '''Tribe'' is the standard rendering in this stock fourfold expression
    and best matches collective kinship grouping.'
- source_word: λαός
  chosen: people
  alternatives:
  - a people
  lexicon: BDAG
  rationale: In this distributive list, 'people' is the most natural English equivalent.
- source_word: γλῶσσα
  chosen: language
  alternatives:
  - tongue
  lexicon: BDAG
  rationale: Modern English favors 'language'; it communicates the sense clearly without
    archaic coloring.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - Gentile nation
  - ethnic group
  lexicon: BDAG
  rationale: Within the fourfold formula, 'nation' is the most idiomatic and traditional
    English rendering. 'Ethnic group' is possible but too interpretive in this context.
