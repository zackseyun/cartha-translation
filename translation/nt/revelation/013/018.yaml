theological_decisions:
- issue: Meaning of ἀνθρώπου in the phrase ἀριθμὸς γὰρ ἀνθρώπου ἐστίν
  chosen_reading: Render as 'a man's number' in the main text
  alternative_readings:
  - the number of a man
  - a human number
  rationale: The phrase is famously debated. The Greek singular genitive allows more
    than one nuance, and the text itself does not resolve whether John means a specific
    man, a merely human number, or a number belonging to a man. To preserve theological
    and interpretive tension rather than collapse it, the main text keeps the masculine
    singular with broad ambiguity ('a man's number'), while a footnote preserves the
    more specific alternative 'the number of a man.'
  doctrine_reference: Translation philosophy §3; §4
