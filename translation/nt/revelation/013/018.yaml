id: REV.13.18
reference: Revelation 13:18
source:
  edition: SBLGNT
  text: ὧδε ἡ σοφία ἐστίν· ὁ ἔχων νοῦν ψηφισάτω τὸν ἀριθμὸν τοῦ θηρίου, ἀριθμὸς γὰρ
    ἀνθρώπου ἐστίν· καὶ ὁ ἀριθμὸς ⸀αὐτοῦ ⸂ἑξακόσιοι ἑξήκοντα ἕξ⸃.
translation:
  text: 'Here is wisdom: let the one who has understanding calculate the number of
    the beast, for it is a man''s number, and its number is six hundred sixty-six.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for it is the number of a man'; alternatively, 'for it is a human number.'
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 616 instead of 666.
    reason: textual_variant
lexical_decisions:
- source_word: ὧδε
  chosen: Here
  alternatives:
  - In this case
  - Herein
  lexicon: BDAG
  rationale: Adverb introducing the point of application or location of wisdom. 'Here'
    is idiomatic and concise in English, preserving the demonstrative force without
    archaic phrasing.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - the wisdom
  lexicon: BDAG
  rationale: 'Standard rendering of σοφία. The article is naturally omitted in English
    in this predicative construction: ''Here is wisdom.'''
- source_word: ὁ ἔχων νοῦν
  chosen: the one who has understanding
  alternatives:
  - the one who has a mind
  - whoever has insight
  lexicon: BDAG
  rationale: A substantival participial phrase. νοῦς here denotes understanding/mental
    discernment rather than merely 'mind' as a faculty. 'The one who has understanding'
    preserves the singular and the exhortational tone.
- source_word: ψηφισάτω
  chosen: calculate
  alternatives:
  - count
  - compute
  - figure out
  lexicon: BDAG
  rationale: Aorist active imperative calling for reckoning or calculating, historically
    associated with counting by pebbles/tokens. 'Calculate' best fits the context
    of deriving a number while remaining natural modern English.
- source_word: ἀριθμὸν
  chosen: number
  alternatives:
  - sum
  lexicon: BDAG
  rationale: Straightforward rendering; repeated consistently through the verse.
- source_word: θηρίου
  chosen: the beast
  lexicon: BDAG
  rationale: Established and accurate rendering of θηρίον in Revelation's apocalyptic
    context.
- source_word: ἀριθμὸς γὰρ ἀνθρώπου ἐστίν
  chosen: for it is a man's number
  alternatives:
  - for it is the number of a man
  - for it is a human number
  lexicon: BDAG
  rationale: 'The genitive ἀνθρώπου is ambiguous: it may mean a particular man, humanity/human,
    or ''human'' as opposed to divine. Per the translation philosophy, the masculine
    singular should be preserved where the Greek is masculine and representative/generic
    force is possible. ''A man''s number'' keeps the ambiguity better than ''a human
    number,'' while remaining idiomatic. The alternative ''the number of a man'' is
    preserved in a footnote because it is also a plausible construal.'
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - his
  lexicon: BDAG
  rationale: The pronoun refers back to θηρίον, a neuter noun, so 'its' is the most
    grammatically transparent English rendering, even though the beast is personified
    in context.
- source_word: ἑξακόσιοι ἑξήκοντα ἕξ
  chosen: six hundred sixty-six
  alternatives:
  - six hundred and sixty-six
  lexicon: BDAG
  rationale: Direct rendering of the numeral in contemporary English style without
    'and.'
