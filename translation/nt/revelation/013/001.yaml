theological_decisions:
- issue: Symbolic apocalyptic imagery
  chosen_reading: Retain the imagery literally ('beast,' 'horns,' 'heads,' 'crowns,'
    'names of blasphemy') without embedding interpretive identifications in the translation.
  alternative_readings:
  - Interpret the beast as a kingdom, empire, ruler, or satanic agent within the main
    text
  rationale: The verse presents visionary symbolism, but the translation should not
    collapse symbol into interpretation. This preserves theological tension and avoids
    importing a specific eschatological system into the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering of διάδηματα in an apocalyptic royal context
  chosen_reading: Use 'crowns' in the main text, with 'diadems' preserved in a footnote.
  alternative_readings:
  - diadems
  - royal crowns
  rationale: The main text favors readable modern English, while the footnote preserves
    the more specific lexical nuance of royal headpieces important in Revelation's
    imagery.
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic
    or academic; §5: Consistency of key terms, or documented exception.'
