id: REV.13.1
reference: Revelation 13:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἐκ τῆς θαλάσσης θηρίον ἀναβαῖνον, ἔχον κέρατα δέκα καὶ κεφαλὰς ἑπτά,
    καὶ ἐπὶ τῶν κεράτων αὐτοῦ δέκα διαδήματα, καὶ ἐπὶ τὰς κεφαλὰς αὐτοῦ ⸀ὀνόματα βλασφημίας.
translation:
  text: And I saw a beast coming up out of the sea, having ten horns and seven heads,
    and on its horns ten crowns, and on its heads names of blasphemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'ten diadems.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blasphemous names.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  - I saw in a vision
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω is straightforwardly rendered as a simple past
    narrative verb. No need to expand to 'looked' or 'in a vision,' since the Greek
    here only states 'I saw.'
- source_word: ἐκ τῆς θαλάσσης
  chosen: out of the sea
  alternatives:
  - from the sea
  lexicon: BDAG
  rationale: ἐκ emphasizes emergence from within/out of rather than mere source. 'Out
    of the sea' preserves the vivid apocalyptic imagery.
- source_word: θηρίον
  chosen: beast
  alternatives:
  - wild beast
  - monster
  lexicon: BDAG
  rationale: '''Beast'' is the standard and most natural rendering in Revelation,
    preserving both the lexical sense and the established apocalyptic force without
    overinterpreting.'
- source_word: ἀναβαῖνον
  chosen: coming up
  alternatives:
  - rising up
  - ascending
  lexicon: BDAG
  rationale: Present participle describing the beast's action as it emerges. 'Coming
    up' is idiomatic modern English and matches the visual scene better than the more
    formal 'ascending.'
- source_word: ἔχον
  chosen: having
  alternatives:
  - with
  lexicon: BDAG
  rationale: The participle is formally retained as 'having' to preserve the descriptive
    sequence of the Greek while remaining readable.
- source_word: κέρατα δέκα
  chosen: ten horns
  lexicon: BDAG
  rationale: Direct lexical rendering; 'horns' should be preserved literally in apocalyptic
    imagery rather than interpreted symbolically in translation.
- source_word: κεφαλὰς ἑπτά
  chosen: seven heads
  lexicon: BDAG
  rationale: Direct lexical rendering; the symbolic image is left intact for readers
    rather than explained in the text.
- source_word: διαδήματα
  chosen: crowns
  alternatives:
  - diadems
  - royal crowns
  lexicon: BDAG
  rationale: διάδημα refers specifically to a royal headpiece/diadem. 'Crowns' is
    more accessible English; the more precise 'diadems' is worth preserving in a footnote
    because Revelation also uses other crown terminology elsewhere.
- source_word: ἐπὶ τῶν κεράτων αὐτοῦ
  chosen: on its horns
  alternatives:
  - upon its horns
  lexicon: BDAG
  rationale: ἐπί with the genitive here is naturally locative, indicating placement.
    'Its' is appropriate for the neuter singular θηρίον in English.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτοῦ
  chosen: on its heads
  alternatives:
  - upon its heads
  lexicon: BDAG
  rationale: Again a locative use of ἐπί. The plural 'heads' is retained exactly.
- source_word: ὀνόματα βλασφημίας
  chosen: names of blasphemy
  alternatives:
  - blasphemous names
  - names that were blasphemous
  lexicon: BDAG
  rationale: The genitive βλασφημίας can be rendered attributively. 'Names of blasphemy'
    stays closer to the Greek form and preserves the solemn, apocalyptic style; the
    smoother English alternative is preserved in a footnote.
