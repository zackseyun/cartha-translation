id: REV.13.13
reference: Revelation 13:13
source:
  edition: SBLGNT
  text: καὶ ποιεῖ σημεῖα μεγάλα, ⸂ἵνα καὶ πῦρ ποιῇ⸃ ἐκ τοῦ οὐρανοῦ ⸂καταβαίνειν εἰς⸃
    τὴν γῆν ἐνώπιον τῶν ἀνθρώπων.
translation:
  text: And it performs great signs, even causing fire to come down from heaven to
    the earth before people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great miracles' or 'great wonders'; Greek 'signs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the sight of people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  chosen: performs
  alternatives:
  - does
  - works
  lexicon: BDAG
  rationale: For ποιέω with σημεῖα, English idiom favors 'perform(s) signs' over the
    more wooden 'do(es) signs,' while preserving the sense of producing miraculous
    acts.
- source_word: σημεῖα μεγάλα
  chosen: great signs
  alternatives:
  - great miracles
  - great wonders
  lexicon: BDAG
  rationale: σημεῖα is rendered 'signs' to preserve the Johannine/apocalyptic nuance
    of portentous acts that signify and deceive, not merely generic miracles. μεγάλα
    straightforwardly modifies it as 'great.'
- source_word: ἵνα καὶ πῦρ ποιῇ
  chosen: even causing fire
  alternatives:
  - so that it even makes fire
  - even making fire
  lexicon: BDAG
  rationale: The ἵνα clause here expresses result/purpose in connection with the beast's
    sign-working. 'Even causing fire' gives natural English while retaining the force
    that this is an especially striking sign.
- source_word: πῦρ
  chosen: fire
  lexicon: BDAG
  rationale: Literal 'fire' is demanded by the context and echoes prophetic displays
    of heavenly fire.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven,' but in Revelation 'heaven' is the
    more theologically and literarily appropriate rendering, preserving the apocalyptic
    register and possible allusion to heavenly-origin signs.
- source_word: καταβαίνειν εἰς τὴν γῆν
  chosen: to come down from heaven to the earth
  alternatives:
  - to descend to the earth
  - to fall to the earth
  lexicon: BDAG
  rationale: καταβαίνειν is best rendered 'come down' in readable modern English.
    Retaining 'to the earth' rather than simply 'to earth' reflects the explicit εἰς
    τὴν γῆν and keeps the movement vivid.
- source_word: ἐνώπιον τῶν ἀνθρώπων
  chosen: before people
  alternatives:
  - in the sight of people
  - before men
  lexicon: BDAG
  rationale: ἐνώπιον denotes public visibility, hence 'before/in the sight of.' ἀνθρώπων
    is generic for human beings; 'people' is natural English and avoids implying only
    males, consistent with source intent.
