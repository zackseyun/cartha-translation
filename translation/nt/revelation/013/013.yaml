theological_decisions:
- issue: Nature of the sign-working
  chosen_reading: Render the verse as describing real or at least publicly observable
    sign-performance without specifying whether the signs are supernatural in source
    or deceptive in mechanism.
  alternative_readings:
  - Render with 'miracles' to imply supernatural wonders
  - Render with language emphasizing mere illusion
  rationale: The text states that the beast performs great signs and causes fire to
    come down before people. It does not here resolve the metaphysical mechanism,
    so the translation preserves the phenomenon described without importing a doctrinal
    judgment beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
