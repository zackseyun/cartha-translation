theological_decisions:
- issue: Nature of the beast's speech in μεγάλα
  chosen_reading: Rendered as 'great things' rather than interpretively narrowing
    to 'great boasts.'
  alternative_readings:
  - great boasts
  - arrogant words
  rationale: The context clearly implies arrogant, God-opposing speech, but the Greek
    adjective μεγάλα by itself is broader. Preserving the more literal phrase maintains
    the text's wording and lets the following 'and blasphemies' sharpen the sense
    without over-interpretation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of ποιῆσαι with duration phrase
  chosen_reading: Rendered 'to act for forty-two months' following the SBLGNT reading.
  alternative_readings:
  - to continue for forty-two months
  rationale: The main text follows the provided Greek text, where ποιῆσαι is the attested
    reading. Because many English readers know the traditional rendering 'continue
    forty-two months,' that alternative is preserved in a footnote as a textual-variant-related
    translation tradition rather than adopted into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
