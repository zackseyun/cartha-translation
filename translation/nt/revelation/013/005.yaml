id: REV.13.5
reference: Revelation 13:5
source:
  edition: SBLGNT
  text: Καὶ ἐδόθη αὐτῷ στόμα λαλοῦν μεγάλα καὶ ⸀βλασφημίας, καὶ ἐδόθη αὐτῷ ⸀ἐξουσία
    ποιῆσαι μῆνας ⸀τεσσεράκοντα δύο.
translation:
  text: And a mouth was given to him, speaking great things and blasphemies, and authority
    was given to him to act for forty-two months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in some manuscripts and translations, 'authority was given to him to
      continue for forty-two months.'
    reason: textual_variant
  - marker: b
    text: '''Great things'' likely carries the sense of arrogant or boastful speech
      in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  chosen: was given
  alternatives:
  - was granted
  lexicon: BDAG
  rationale: Passive of δίδωμι indicates that the beast receives rather than possesses
    inherently. 'Was given' preserves the repeated divine-passive-like formulation
    in the verse and echoes Revelation's recurring motif of permitted authority.
- source_word: στόμα
  chosen: a mouth
  lexicon: BDAG
  rationale: Literal rendering is natural in English and preserves the vivid apocalyptic
    imagery of an endowed speaking organ rather than reducing it to merely 'speech'
    or 'the ability to speak.'
- source_word: λαλοῦν
  chosen: speaking
  alternatives:
  - uttering
  lexicon: BDAG
  rationale: Present participle modifying 'mouth'; 'speaking' is the most straightforward
    and idiomatic participial rendering in English.
- source_word: μεγάλα
  chosen: great things
  alternatives:
  - great boasts
  - arrogant things
  lexicon: BDAG
  rationale: Literally 'great things.' In context the sense likely includes arrogant
    or boastful speech, but the Greek does not explicitly supply 'boasts' here. 'Great
    things' preserves the wording while allowing the context to convey the hubristic
    force.
- source_word: βλασφημίας
  chosen: blasphemies
  alternatives:
  - slanders against God
  lexicon: BDAG
  rationale: Plural noun is best kept as 'blasphemies.' This preserves the explicit
    religious offense in the term and matches the immediate context of hostile speech
    against God in the surrounding verses.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: '''Authority'' best captures delegated jurisdiction or permission, fitting
    the repeated passive ''was given to him.'' ''Power'' could overemphasize raw might
    rather than authorized scope.'
- source_word: ποιῆσαι
  chosen: to act
  alternatives:
  - to exercise authority
  - to continue
  lexicon: BDAG
  rationale: The infinitive ποιῆσαι is semantically broad ('to do/make'). In this
    context, with a duration phrase ('forty-two months'), English requires a more
    specific idiom. 'To act' preserves breadth better than 'to continue,' which reflects
    a later textual variant, and better than 'to exercise authority,' which imports
    the object from context.
- source_word: μῆνας τεσσεράκοντα δύο
  chosen: for forty-two months
  lexicon: BDAG
  rationale: Accusative of extent/duration is naturally rendered with 'for.' The number
    is kept in words for readability and to preserve the apocalyptic time period.
