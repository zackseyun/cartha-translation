id: REV.13.4
reference: Revelation 13:4
source:
  edition: SBLGNT
  text: καὶ προσεκύνησαν τῷ δράκοντι ⸂ὅτι ἔδωκεν⸃ τὴν ἐξουσίαν τῷ θηρίῳ, καὶ προσεκύνησαν
    τῷ θηρίῳ λέγοντες· Τίς ὅμοιος τῷ θηρίῳ, καὶ τίς ⸀δύναται πολεμῆσαι μετ’ αὐτοῦ;
translation:
  text: And they worshiped the dragon because he had given authority to the beast,
    and they worshiped the beast, saying, “Who is like the beast, and who is able
    to make war with it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who is comparable to the beast?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'who can wage war against it?'
    reason: lexical_alternative
  - marker: c
    text: This acclamation likely echoes Old Testament language about God's incomparability
      (for example, Exod 15:11; Ps 35:10), here applied blasphemously to the beast.
    reason: cross_reference
lexical_decisions:
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down to
  - paid homage to
  lexicon: BDAG
  rationale: In Revelation, προσκυνέω regularly denotes religious veneration rather
    than mere physical prostration. 'Worshiped' best captures the idolatrous force
    in context.
- source_word: δράκοντι
  chosen: dragon
  lexicon: BDAG
  rationale: Standard rendering of δράκων in apocalyptic context; the term is symbolic
    but should be translated directly rather than interpreted here.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι gives the reason for worshiping the dragon: he had given authority
    to the beast. ''Because'' expresses the causal sense clearly in modern English.'
- source_word: ἔδωκεν
  chosen: had given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: 'The aorist is naturally rendered as simple past, but English past perfect
    smooths the sequence: their worship follows the dragon''s prior granting of authority
    to the beast.'
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or ruling power. 'Authority'
    preserves the nuance better than the broader 'power' in this context.
- source_word: θηρίῳ
  chosen: beast
  lexicon: BDAG
  rationale: Established and accurate rendering of θηρίον in Revelation's apocalyptic
    imagery.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: A participle of attendant circumstance/content introducing the words
    spoken. 'Saying' is natural and sufficiently close.
- source_word: Τίς ὅμοιος τῷ θηρίῳ
  chosen: Who is like the beast
  alternatives:
  - Who is comparable to the beast
  lexicon: BDAG
  rationale: A direct, idiomatic rendering that preserves the rhetorical challenge
    and likely echo of biblical language about incomparability.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: '''Is able'' is slightly more formal and preserves the sense of capability
    inherent in δύναμαι.'
- source_word: πολεμῆσαι μετ’ αὐτοῦ
  chosen: to make war with it
  alternatives:
  - to wage war against it
  - to fight against it
  lexicon: BDAG
  rationale: πολεμέω is stronger than simple 'fight'; 'make war' preserves the military
    sense. μετά with the genitive here conveys hostile engagement with the beast.
    The pronoun refers back to θηρίον, a neuter noun, so 'it' is the most grammatically
    transparent English rendering.
