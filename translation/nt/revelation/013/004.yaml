theological_decisions:
- issue: Rendering the beast with the pronoun 'it' rather than 'him'
  chosen_reading: Use 'it' in keeping with the neuter Greek referent θηρίον
  alternative_readings:
  - Use 'him' to reflect the beast's personal, ruler-like portrayal
  rationale: The Greek pronoun αὐτοῦ agrees with the neuter noun θηρίον. Although
    English translations sometimes personalize the beast as 'him' because of its agentive
    role, 'it' more closely follows the source wording and avoids importing an interpretive
    decision beyond the text's grammar.
  doctrine_reference: Translation philosophy §1, §5
- issue: Echo of divine incomparability language
  chosen_reading: Retain the wording 'Who is like the beast' without interpretive
    expansion
  alternative_readings:
  - Paraphrase to make the blasphemous parody explicit
  rationale: The line likely echoes biblical formulas about God's uniqueness, heightening
    the beast's blasphemous imitation. The translation should preserve that tension
    and allusion without adding explanatory wording into the main text.
  doctrine_reference: Translation philosophy §3
