id: REV.13.12
reference: Revelation 13:12
source:
  edition: SBLGNT
  text: καὶ τὴν ἐξουσίαν τοῦ πρώτου θηρίου πᾶσαν ποιεῖ ἐνώπιον αὐτοῦ. καὶ ⸀ποιεῖ τὴν
    γῆν καὶ τοὺς ἐν αὐτῇ κατοικοῦντας ἵνα ⸀προσκυνήσουσιν τὸ θηρίον τὸ πρῶτον, οὗ
    ἐθεραπεύθη ἡ πληγὴ τοῦ θανάτου αὐτοῦ.
translation:
  text: And it exercises all the authority of the first beast in its presence. And
    it causes the earth and those who dwell on it to worship the first beast, whose
    mortal wound was healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before it.' The phrase may emphasize that the second beast acts under
      the first beast's gaze or in its immediate presence.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose wound of death was healed'; that is, 'whose mortal wound
      was healed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated or exercised authority/right rather
    than mere raw power. 'Authority' best fits the beast's operative jurisdiction.
- source_word: πᾶσαν
  chosen: all
  alternatives:
  - the whole
  lexicon: BDAG
  rationale: The adjective intensifies the comprehensiveness of the first beast's
    authority as exercised by the second beast; 'all' is the most natural English
    rendering.
- source_word: ποιεῖ (first occurrence)
  chosen: exercises
  alternatives:
  - does
  - carries out
  lexicon: BDAG
  rationale: The idiom ποιεῖ τὴν ἐξουσίαν is not naturally rendered 'does the authority'
    in English. 'Exercises' captures the sense of putting authority into effect while
    remaining close to the Greek.
- source_word: ἐνώπιον αὐτοῦ
  chosen: in its presence
  alternatives:
  - before it
  - in front of it
  lexicon: BDAG
  rationale: ἐνώπιον can mean spatially 'before/in the presence of.' Here it likely
    indicates that the second beast acts under the gaze or before the first beast.
    'In its presence' is idiomatic and preserves the relational nuance.
- source_word: ποιεῖ (second occurrence)
  chosen: causes
  alternatives:
  - makes
  - compels
  lexicon: BDAG
  rationale: With objects 'the earth and those dwelling in it' followed by ἵνα, ποιέω
    has a causative force. 'Causes' is natural English and avoids overstating the
    coercion as 'compels,' which the Greek does not explicitly require.
- source_word: τὴν γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In Revelation γῆ often has a global or world-oriented sense in contrast
    to heaven/sea. 'The earth' is the standard and contextually fitting rendering.
- source_word: τοὺς ἐν αὐτῇ κατοικοῦντας
  chosen: those who dwell on it
  alternatives:
  - its inhabitants
  - those living in it
  lexicon: BDAG
  rationale: Revelation repeatedly uses κατοικέω for the earth-dwellers as a thematic
    group. 'Those who dwell on it' preserves the verbal texture and apocalyptic resonance
    better than the flatter 'inhabitants.'
- source_word: ἵνα προσκυνήσουσιν
  chosen: to worship
  alternatives:
  - so that they will worship
  - that they should worship
  lexicon: BDAG
  rationale: After causative ποιεῖ, ἵνα + future indicative expresses intended/resulting
    action. English infinitive 'to worship' is smooth and accurately conveys the causative
    construction.
- source_word: θηρίον
  chosen: beast
  lexicon: BDAG
  rationale: '''Beast'' is the established and lexically direct rendering for θηρίον
    in apocalyptic contexts.'
- source_word: πρῶτον
  chosen: first
  lexicon: BDAG
  rationale: The adjective distinguishes this beast from the second beast in the immediate
    context; 'first' is straightforward.
- source_word: ἐθεραπεύθη
  chosen: was healed
  alternatives:
  - was cured
  - recovered
  lexicon: BDAG
  rationale: θεραπεύω in passive commonly means 'be healed.' 'Was healed' preserves
    the verbal link to healing language and matches the miraculous-recovery motif.
- source_word: ἡ πληγὴ τοῦ θανάτου αὐτοῦ
  chosen: its mortal wound
  alternatives:
  - the wound of its death
  - its death-blow wound
  lexicon: BDAG
  rationale: The genitive construction denotes a wound characterized by death, i.e.,
    a death-dealing or mortal wound. 'Mortal wound' is idiomatic English and preserves
    the sense without awkward literalism.
