theological_decisions:
- issue: Force of the second beast's action toward the earth-dwellers
  chosen_reading: causes ... to worship
  alternative_readings:
  - makes ... worship
  - compels ... to worship
  rationale: The Greek causative construction indicates that the second beast brings
    about worship of the first beast, but does not itself specify the exact degree
    of coercion in this clause. 'Causes' preserves the text's force without importing
    a stronger claim than the wording requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
