theological_decisions:
- issue: Sense of πνεῦμα in the animation of the beast's image
  chosen_reading: Rendered as 'breath' rather than 'spirit' or 'life'
  alternative_readings:
  - spirit
  - life
  rationale: The verse depicts the image being enabled to speak, echoing the idea
    of breath animating an idol-like image without asserting true divine life. 'Breath'
    preserves the parody-of-creation effect and avoids over-reading a metaphysical
    claim about an indwelling spirit.
  doctrine_reference: Translation philosophy §1, §3
- issue: Agency in the passive 'it was given'
  chosen_reading: Left implicit
  alternative_readings:
  - explicitly supplying God as giver
  - explicitly supplying Satan as giver
  rationale: The Greek leaves the giver unstated. In apocalyptic context readers may
    infer delegated permission, but the translation should preserve the text's ambiguity
    rather than resolve it.
  doctrine_reference: Translation philosophy §3
