id: REV.13.15
reference: Revelation 13:15
source:
  edition: SBLGNT
  text: καὶ ἐδόθη ⸀αὐτῷ ⸂δοῦναι πνεῦμα⸃ τῇ εἰκόνι τοῦ θηρίου, ἵνα καὶ λαλήσῃ ἡ εἰκὼν
    τοῦ θηρίου καὶ ποιήσῃ ⸀ἵνα ὅσοι ἐὰν μὴ προσκυνήσωσιν τῇ εἰκόνι τοῦ θηρίου ἀποκτανθῶσιν.
translation:
  text: And it was given to him to give breath to the image of the beast, so that
    the image of the beast might even speak and cause those who would not worship
    the image of the beast to be killed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to give spirit' or 'to give life' to the image of the beast.
    reason: lexical_alternative
  - marker: b
    text: Or 'and make it so that all who do not worship the image of the beast would
      be killed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  chosen: it was given
  alternatives:
  - he was allowed
  - authority was given
  lexicon: BDAG
  rationale: Passive of δίδωμι is rendered impersonally to preserve the Greek's unspecified
    giver and apocalyptic idiom of delegated permission/authority.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: Dative pronoun retained explicitly to show the recipient of the granted
    ability, referring to the second beast/false prophet figure in context without
    importing the identification into the translation.
- source_word: δοῦναι πνεῦμα
  chosen: to give breath
  alternatives:
  - to give spirit
  - to give life
  lexicon: BDAG
  rationale: πνεῦμα can mean spirit, breath, or wind. Here, with an image being animated
    so that it speaks, 'breath' best preserves the concrete sense while allowing the
    eerie parody of life. 'Life' is interpretive; 'spirit' could suggest a personal
    spirit more strongly than the text requires.
- source_word: εἰκών
  chosen: image
  alternatives:
  - statue
  - likeness
  lexicon: BDAG
  rationale: Standard rendering that covers an idol/image broadly without narrowing
    to a specific physical form such as 'statue'.
- source_word: θηρίον
  chosen: beast
  alternatives:
  - monster
  lexicon: BDAG
  rationale: Established and accurate apocalyptic term; 'monster' is too interpretive.
- source_word: ἵνα καὶ λαλήσῃ
  chosen: so that ... might even speak
  alternatives:
  - so that ... might also speak
  - so that ... could speak
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose/result. καί here is rendered 'even'
    to convey the startling extension that the image not only receives breath but
    also speaks.
- source_word: ποιήσῃ ἵνα
  chosen: and cause
  alternatives:
  - and make it so that
  - and bring about that
  lexicon: BDAG
  rationale: This construction is awkward if translated woodenly. 'Cause' captures
    ποιέω followed by ἵνα-clause in natural English while preserving causative force.
- source_word: ὅσοι ἐὰν μὴ προσκυνήσωσιν
  chosen: those who would not worship
  alternatives:
  - whoever did not worship
  - as many as did not worship
  lexicon: BDAG
  rationale: This renders the indefinite relative construction naturally in English
    and reflects refusal/noncompliance in the envisioned cases.
- source_word: προσκυνήσωσιν
  chosen: worship
  alternatives:
  - bow down to
  - pay homage to
  lexicon: BDAG
  rationale: In Revelation, προσκυνέω regularly carries the religious sense of worship,
    especially in relation to the beast and its image.
- source_word: ἀποκτανθῶσιν
  chosen: to be killed
  alternatives:
  - to be put to death
  - to be slain
  lexicon: BDAG
  rationale: Passive aorist is preserved. 'To be killed' is clear modern English;
    'put to death' is possible but slightly more formal/juridical than the Greek requires.
