theological_decisions:
- issue: Gendered generic expression in ὁ ἔχων
  chosen_reading: unless he has
  alternative_readings:
  - unless the one who has
  - unless anyone has
  rationale: The Greek is grammatically masculine singular and generic. Per the translation
    philosophy, gender-accurate rendering is preferred over flattening to a gender-neutral
    form, while preserving inclusivity concerns in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Pronoun reference for αὐτοῦ after θηρίου
  chosen_reading: its name
  alternative_readings:
  - his name
  rationale: Because the antecedent θηρίον is neuter, 'its' best reflects the Greek
    form at the lexical level. A footnote preserves 'his' as a viable English alternative
    given the beast's personal agency in context and common translation tradition.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
