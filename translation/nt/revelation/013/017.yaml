id: REV.13.17
reference: Revelation 13:17
source:
  edition: SBLGNT
  text: καὶ ἵνα μή τις ⸀δύνηται ἀγοράσαι ἢ πωλῆσαι εἰ μὴ ὁ ἔχων τὸ χάραγμα, τὸ ὄνομα
    τοῦ θηρίου ἢ τὸν ἀριθμὸν τοῦ ὀνόματος αὐτοῦ.
translation:
  text: so that no one can buy or sell unless he has the mark—the name of the beast
    or the number of its name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the one who has''; the masculine singular is generic here.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the number of his name.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα μή τις δύνηται
  chosen: so that no one can
  alternatives:
  - and that no one may be able to
  - so that no one might be able to
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result, and μή τις yields an indefinite negative
    subject, 'no one.' δύνηται conveys ability/possibility. 'So that no one can' is
    idiomatic modern English while preserving the clause's force.
- source_word: ἀγοράσαι ἢ πωλῆσαι
  chosen: buy or sell
  alternatives:
  - purchase or sell
  - buy or trade
  lexicon: BDAG
  rationale: The paired infinitives denote ordinary commercial activity. 'Buy or sell'
    is the natural English equivalent and preserves the economic restriction in view.
- source_word: εἰ μὴ
  chosen: unless
  alternatives:
  - except if
  - except
  lexicon: BDAG
  rationale: εἰ μὴ introduces the sole exception to the prohibition. 'Unless' is the
    clearest idiomatic rendering in English.
- source_word: ὁ ἔχων
  chosen: he has
  alternatives:
  - the one having
  - the one who has
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally: ''the one who has.''
    Because the clause is generic but grammatically masculine singular, the main text
    uses ''he has'' in keeping with the gender-accurate policy; a footnote preserves
    the more explicitly generic alternative.'
- source_word: τὸ χάραγμα
  chosen: the mark
  alternatives:
  - the stamp
  - the inscription
  lexicon: BDAG
  rationale: χάραγμα commonly denotes a mark, stamp, or impressed sign. 'The mark'
    is the established and most transparent rendering in this apocalyptic context.
- source_word: τὸ ὄνομα τοῦ θηρίου
  chosen: the name of the beast
  alternatives:
  - the beast's name
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'The name of the beast' preserves
    the formal parallelism with the following phrase.
- source_word: θηρίου
  chosen: the beast
  alternatives:
  - the animal
  lexicon: BDAG
  rationale: In Revelation θηρίον is a symbolic title for the apocalyptic antagonist,
    conventionally and accurately rendered 'beast,' not the more generic 'animal.'
- source_word: ἢ τὸν ἀριθμὸν τοῦ ὀνόματος αὐτοῦ
  chosen: or the number of its name
  alternatives:
  - or the number of his name
  lexicon: BDAG
  rationale: The Greek αὐτοῦ is grammatically capable of 'his/its.' Since θηρίον is
    a neuter noun and the immediate antecedent is 'the beast,' 'its' reflects the
    grammatical linkage without over-personalizing beyond the text. The alternative
    'his' is worth preserving because English tradition often personalizes the beast.
