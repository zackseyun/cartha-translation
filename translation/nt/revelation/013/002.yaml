id: REV.13.2
reference: Revelation 13:2
source:
  edition: SBLGNT
  text: καὶ τὸ θηρίον ὃ εἶδον ἦν ὅμοιον παρδάλει, καὶ οἱ πόδες αὐτοῦ ὡς ἄρκου, καὶ
    τὸ στόμα αὐτοῦ ὡς στόμα λέοντος. καὶ ἔδωκεν αὐτῷ ὁ δράκων τὴν δύναμιν αὐτοῦ καὶ
    τὸν θρόνον αὐτοῦ καὶ ἐξουσίαν μεγάλην.
translation:
  text: And the beast that I saw was like a leopard, and its feet were like a bear's,
    and its mouth was like a lion's mouth. And the dragon gave it his power and his
    throne and great authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The imagery of the leopard, bear, and lion echoes the beast visions in Daniel
      7.
    reason: cross_reference
lexical_decisions:
- source_word: θηρίον
  chosen: beast
  alternatives:
  - creature
  - animal
  lexicon: BDAG
  rationale: In Revelation, θηρίον is a stock apocalyptic term for a monstrous political-spiritual
    opponent, and 'beast' preserves both the lexical sense and the established symbolic
    force better than the more neutral 'animal' or 'creature'.
- source_word: ὅμοιον παρδάλει
  chosen: like a leopard
  alternatives:
  - similar to a leopard
  lexicon: BDAG
  rationale: ὅμοιος + dative expresses resemblance. 'Like a leopard' is idiomatic
    English and preserves the visionary comparison without overexplaining it.
- source_word: πόδες
  chosen: feet
  alternatives:
  - legs
  - paws
  lexicon: BDAG
  rationale: πούς normally means 'foot/feet.' Although an animal image might suggest
    'paws,' the Greek uses the ordinary term, so 'feet' best reflects the source while
    remaining natural.
- source_word: ὡς ἄρκου
  chosen: like a bear's
  alternatives:
  - like those of a bear
  - like a bear
  lexicon: BDAG
  rationale: 'The comparison is elliptical in Greek after ''its feet.'' English idiom
    is best served by supplying the possessive sense: ''like a bear''s.'''
- source_word: στόμα ... ὡς στόμα λέοντος
  chosen: mouth ... like a lion's mouth
  alternatives:
  - mouth ... like the mouth of a lion
  lexicon: BDAG
  rationale: The repeated στόμα is explicit in Greek and should be retained rather
    than reduced to 'like a lion's,' because the repetition contributes to the vividness
    and formal balance of the vision description.
- source_word: δράκων
  chosen: dragon
  lexicon: BDAG
  rationale: δράκων in Revelation is the established apocalyptic figure identified
    elsewhere in the book; 'dragon' is the direct and standard rendering.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - granted
  lexicon: BDAG
  rationale: δίδωμι is straightforwardly 'give.' 'Granted' is possible in context,
    but 'gave' is more direct and formally closer.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - might
  - strength
  lexicon: BDAG
  rationale: δύναμις here denotes operative power or capability bestowed by the dragon.
    'Power' is the most natural and consistent rendering in this apocalyptic-political
    context.
- source_word: θρόνον
  chosen: throne
  alternatives:
  - seat of rule
  lexicon: BDAG
  rationale: θρόνος literally means 'throne' and in Revelation carries royal and governmental
    connotations that should remain explicit.
- source_word: ἐξουσίαν μεγάλην
  chosen: great authority
  alternatives:
  - great dominion
  - great jurisdiction
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated authority or right to rule, distinct from δύναμις
    ('power'). Rendering it as 'authority' preserves that distinction; μεγάλην is
    naturally 'great'.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - its
  lexicon: BDAG
  rationale: The genitives referring to the dragon are rendered 'his' because δράκων
    is a personal apocalyptic agent, not an impersonal force. This also keeps the
    distinction clear between the beast ('it') and the dragon ('his').
