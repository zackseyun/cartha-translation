theological_decisions:
- issue: Relationship between the dragon and the beast in pronoun rendering
  chosen_reading: The beast is referred to as 'it,' while the dragon's possessions
    are rendered with 'his' ('his power ... his throne').
  alternative_readings:
  - Use 'its' for the dragon as well for stricter grammatical consistency
  rationale: The Greek pronouns are formally the same, but English style benefits
    from distinguishing the beast as a beastly entity and the dragon as a personal
    satanic actor within the vision. This reflects the narrative portrayal without
    adding doctrinal content beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Retention of composite animal imagery without interpretive expansion
  chosen_reading: Translate the animal comparisons directly and do not import Danielic
    interpretation into the main text.
  alternative_readings:
  - Expand the wording to signal allusion to Daniel 7
  rationale: The verse likely echoes Danielic beast imagery, but the Greek text itself
    presents the comparisons without explanation. Optimal equivalence requires preserving
    the imagery while leaving interpretation to footnotes or cross-reference, not
    the main translation.
  doctrine_reference: Original-language primacy over translation tradition; never
    import doctrinal claims the text does not make.
