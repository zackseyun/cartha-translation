theological_decisions:
- issue: Rendering of ἀρνίον in a context that may echo the Lamb imagery of Revelation
  chosen_reading: lamb
  alternative_readings:
  - little lamb
  rationale: The verse presents deceptive resemblance to a lamb, likely evoking the
    Lamb imagery elsewhere in Revelation without identifying this beast with the true
    Lamb. 'Lamb' preserves the allusion in natural English; 'little lamb' would sound
    diminutive in a way English readers may mishear.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve theological tension rather than resolve it.'
- issue: Rendering γῆ as 'earth' rather than 'land'
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Both are lexically possible. In this apocalyptic scene, 'earth' better
    preserves the broad symbolic contrast with the beast from the sea and avoids narrowing
    the image to a specific territory unless the text requires it.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing narrower interpretive claims.'
