id: REV.13.11
reference: Revelation 13:11
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἄλλο θηρίον ἀναβαῖνον ἐκ τῆς γῆς, καὶ εἶχεν κέρατα δύο ὅμοια ἀρνίῳ,
    καὶ ἐλάλει ὡς δράκων.
translation:
  text: And I saw another beast coming up out of the earth, and it had two horns like
    a lamb, and it was speaking like a dragon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rising from the land.' The Greek word γῆ can mean 'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο θηρίον
  chosen: another beast
  alternatives:
  - another creature
  lexicon: BDAG
  rationale: θηρίον in Revelation is the established apocalyptic term for the hostile
    beastly power; 'beast' preserves the intertextual and symbolic force better than
    the more generic 'creature.' ἄλλο is straightforwardly 'another.'
- source_word: ἀναβαῖνον ἐκ τῆς γῆς
  chosen: coming up out of the earth
  alternatives:
  - rising from the earth
  - ascending out of the land
  lexicon: BDAG
  rationale: ἀναβαῖνον is a present participle describing the beast in the act of
    emerging. 'Coming up' is natural English and preserves the vivid motion. γῆ can
    mean 'earth' or 'land'; here 'earth' best matches the cosmic contrast with the
    sea beast in the immediate context and standard apocalyptic imagery.
- source_word: εἶχεν
  chosen: it had
  alternatives:
  - it was having
  lexicon: BDAG
  rationale: Imperfect ἔχω is idiomatically rendered in English as simple past here;
    'it had' communicates the descriptive narrative force without awkwardness.
- source_word: κέρατα δύο
  chosen: two horns
  lexicon: BDAG
  rationale: A direct rendering is best. 'Horns' retains the symbolic imagery of power/authority
    common in apocalyptic literature.
- source_word: ὅμοια ἀρνίῳ
  chosen: like a lamb
  alternatives:
  - similar to a lamb
  - like a little lamb
  lexicon: BDAG
  rationale: Although ὅμοια is formally neuter plural agreeing with κέρατα ('horns'),
    idiomatic English expresses the comparison as 'two horns like a lamb.' ἀρνίον
    is the diminutive form often rendered 'lamb' in Revelation; 'little lamb' would
    be overly wooden in English.
- source_word: ἐλάλει
  chosen: it was speaking
  alternatives:
  - it spoke
  lexicon: BDAG
  rationale: The imperfect tense is durative/descriptive in this visionary report.
    'It was speaking' better reflects the ongoing characteristic action than the simple
    'it spoke.'
- source_word: ὡς δράκων
  chosen: like a dragon
  alternatives:
  - as a dragon
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Like a dragon' preserves the simile and avoids
    overreading identity; the beast's speech is dragon-like, aligning it with satanic
    deception in the context.
