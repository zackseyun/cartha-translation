theological_decisions:
- issue: Syntactical attachment of 'from the foundation of the world'
  chosen_reading: Attached to 'the Lamb who was slain' in the main text
  alternative_readings:
  - Attached to 'has not been written' ('whose name has not been written from the
    foundation of the world in the book of life of the Lamb who was slain')
  rationale: The Greek word order most naturally links ἀπὸ καταβολῆς κόσμου with the
    immediately preceding participle τοῦ ἐσφαγμένου. However, the broader canonical
    parallel in Revelation 17:8 strongly supports attaching the temporal phrase to
    the writing of the names. Because the syntax here is genuinely disputed, the main
    text preserves the most immediate grammatical connection while the alternative
    is preserved in a footnote, in keeping with the instruction to preserve theological
    tension rather than resolve it dogmatically.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
