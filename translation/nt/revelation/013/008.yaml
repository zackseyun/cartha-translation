id: REV.13.8
reference: Revelation 13:8
source:
  edition: SBLGNT
  text: καὶ προσκυνήσουσιν ⸀αὐτὸν πάντες οἱ κατοικοῦντες ἐπὶ τῆς γῆς, ⸀οὗ οὐ γέγραπται
    τὸ ὄνομα ⸀αὐτοῦ ἐν τῷ βιβλίῳ τῆς ζωῆς τοῦ ἀρνίου τοῦ ἐσφαγμένου ἀπὸ καταβολῆς
    κόσμου.
translation:
  text: And all who dwell on the earth will worship him—everyone whose name has not
    been written in the book of life of the Lamb who was slain from the foundation
    of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'everyone whose name has not been written from the foundation of the
      world in the book of life of the Lamb who was slain.' The Greek can be taken
      to connect 'from the foundation of the world' either with 'was slain' or with
      'has been written.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσκυνήσουσιν
  chosen: will worship
  alternatives:
  - will bow down to
  lexicon: BDAG
  rationale: In Revelation, προσκυνέω regularly denotes worshipful homage, especially
    in contrast between worship of God/Lamb and worship of the beast. 'Worship' best
    captures the religious force here.
- source_word: κατοικοῦντες ἐπὶ τῆς γῆς
  chosen: who dwell on the earth
  alternatives:
  - who live on the earth
  - earth-dwellers
  lexicon: BDAG
  rationale: This is a recurring Revelation expression for the world in rebellion.
    'Dwell on the earth' preserves the verbal form and intertextual consistency better
    than the more idiomatic but less transparent 'earth-dwellers'.
- source_word: οὗ ... τὸ ὄνομα αὐτοῦ
  chosen: whose name
  alternatives:
  - of whom his name
  lexicon: BDAG
  rationale: The genitive relative with possessive pronoun is naturally rendered in
    English as 'whose name.' This preserves the singularity of each person's recorded
    identity.
- source_word: γέγραπται
  chosen: has not been written
  alternatives:
  - is not written
  - has not been recorded
  lexicon: BDAG
  rationale: The perfect tense indicates a resulting state from prior inscription.
    'Has not been written' preserves that aspect better than a simple present.
- source_word: βιβλίῳ τῆς ζωῆς
  chosen: book of life
  alternatives:
  - scroll of life
  lexicon: BDAG
  rationale: Although βιβλίον can denote a scroll, 'book of life' is the established
    and intelligible English rendering for this apocalyptic image. 'Book' communicates
    the idiom without loss of meaning.
- source_word: τοῦ ἀρνίου
  chosen: of the Lamb
  alternatives: []
  lexicon: BDAG
  rationale: Revelation uses ἀρνίον as a christological title. 'Lamb' preserves the
    sacrificial and messianic imagery.
- source_word: τοῦ ἐσφαγμένου
  chosen: who was slain
  alternatives:
  - that was slaughtered
  - who was killed
  lexicon: BDAG
  rationale: The participle from σφάζω carries sacrificial violence. 'Slain' is both
    readable and weighty, preserving the sacrificial nuance better than 'killed' while
    avoiding the harshness of 'slaughtered' in the main text.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: from the foundation of the world
  alternatives:
  - since the foundation of the world
  lexicon: BDAG
  rationale: This is the standard temporal expression. 'From the foundation of the
    world' is the most direct rendering of ἀπό + genitive and preserves the phrase's
    biblical resonance.
