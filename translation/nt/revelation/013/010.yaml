id: REV.13.10
reference: Revelation 13:10
source:
  edition: SBLGNT
  text: εἴ τις ⸂εἰς αἰχμαλωσίαν, εἰς αἰχμαλωσίαν⸃ ὑπάγει· εἴ τις ἐν μαχαίρῃ ⸀ἀποκτανθῆναι
    αὐτὸν ἐν μαχαίρῃ ἀποκτανθῆναι. ὧδέ ἐστιν ἡ ὑπομονὴ καὶ ἡ πίστις τῶν ἁγίων.
translation:
  text: If anyone is for captivity, into captivity he goes; if anyone is to be killed
    with the sword, with the sword he must be killed. Here is the endurance and the
    faith of the saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If anyone goes into captivity, into captivity he goes'; the line may
      also be understood as a statement of appointed destiny rather than a command.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts/readings differ in this clause, including forms that read,
      'If anyone kills with the sword, he must be killed with the sword.' The adopted
      text is retained here, but the variant is significant for interpretation.
    reason: textual_variant
  - marker: c
    text: Or 'faithfulness of the saints.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  chosen: If anyone
  alternatives:
  - If someone
  lexicon: BDAG
  rationale: Indefinite conditional expression introducing a general principle. 'Anyone'
    is natural modern English and preserves the open, generic force.
- source_word: εἰς αἰχμαλωσίαν ... ὑπάγει
  chosen: is for captivity ... into captivity he goes
  alternatives:
  - goes into captivity
  - is destined for captivity
  lexicon: BDAG
  rationale: The repeated phrase εἰς αἰχμαλωσίαν is emphatic. Rendering both occurrences
    preserves the rhetorical repetition. 'Is for captivity' reflects the elliptical,
    proverbial structure better than smoothing everything into a single clause, while
    'he goes' keeps ὑπάγει explicit.
- source_word: αἰχμαλωσία
  chosen: captivity
  alternatives:
  - imprisonment
  - exile
  lexicon: BDAG
  rationale: '''Captivity'' best matches the sense of being taken captive and preserves
    the allusive, judgment-like tone of the verse.'
- source_word: ἐν μαχαίρῃ
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: BDAG
  rationale: Instrumental dative with ἐν. 'With the sword' is idiomatic and echoes
    biblical judgment language.
- source_word: ἀποκτανθῆναι
  chosen: to be killed / be killed
  alternatives:
  - to be slain
  - to be put to death
  lexicon: BDAG
  rationale: Aorist passive infinitive of ἀποκτείνω. 'Killed' is clear modern English;
    'slain' would sound more traditional but less natural.
- source_word: αὐτὸν
  chosen: he must be killed
  alternatives:
  - him to be killed
  - he is to be killed
  lexicon: BDAG
  rationale: The pronoun creates an awkward construction in literal English. 'He must
    be killed' gives a coherent English clause while preserving the passive sense
    and the inevitability expressed by the line.
- source_word: ὧδέ ἐστιν
  chosen: Here is
  alternatives:
  - Herein is
  - This is
  lexicon: BDAG
  rationale: Idiomatic marker drawing attention to what follows. 'Here is' is readable
    modern English and preserves the demonstrative force.
- source_word: ὑπομονή
  chosen: endurance
  alternatives:
  - patient endurance
  - steadfastness
  lexicon: BDAG
  rationale: '''Endurance'' is the standard rendering in Revelation and conveys persevering
    constancy under suffering without overexpanding the phrase.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context 'faithfulness' is a plausible nuance, so the alternative is preserved
    in a footnote rather than resolved away.
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of God's holy ones
  lexicon: BDAG
  rationale: ἅγιοι in Revelation commonly refers to God's holy people. 'Saints' is
    concise, traditional, and still readily understandable in context.
