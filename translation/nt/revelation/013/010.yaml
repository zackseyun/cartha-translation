theological_decisions:
- issue: 'Sense of the verse''s first two clauses: descriptive inevitability versus
    prescriptive command'
  chosen_reading: descriptive inevitability/judicial destiny
  alternative_readings:
  - a command for believers not to resist violence
  - a retributive principle that captors and killers will themselves suffer the same
  rationale: 'The Greek is terse and text-critically difficult, but in this form it
    reads most naturally as a proverbial statement of what is appointed: the one for
    captivity goes to captivity; the one to be killed by the sword must be killed
    by the sword. This preserves the text''s solemn warning without importing a full
    ethic of pacifism or retaliation that the verse itself does not explicitly state.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering πίστις in the closing clause
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: Following the project's contested-terms policy, πίστις is rendered 'faith'
    in the main text. Because the context of perseverance under oppression makes 'faithfulness'
    a viable nuance, that alternative is preserved in a footnote.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives
    where contested.'
