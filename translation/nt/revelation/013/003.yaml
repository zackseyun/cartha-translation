id: REV.13.3
reference: Revelation 13:3
source:
  edition: SBLGNT
  text: καὶ μίαν ἐκ τῶν κεφαλῶν αὐτοῦ ⸀ὡς ἐσφαγμένην εἰς θάνατον, καὶ ἡ πληγὴ τοῦ
    θανάτου αὐτοῦ ἐθεραπεύθη. καὶ ⸀ἐθαυμάσθη ⸂ὅλη ἡ γῆ⸃ ὀπίσω τοῦ θηρίου,
translation:
  text: And one of its heads was as if slaughtered to death, and its deadly wound
    was healed. And the whole earth marveled and followed after the beast,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seemed to have been slain to death.' The Greek uses 'as if,' which may
      indicate appearance or resemblance rather than a flat assertion.
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole land,' though in this apocalyptic context 'the whole earth'
      is more likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: μίαν ἐκ τῶν κεφαλῶν αὐτοῦ
  chosen: one of its heads
  alternatives:
  - one from its heads
  lexicon: BDAG
  rationale: Idiomatic partitive construction; 'one of its heads' is the natural English
    rendering of μίαν ἐκ + genitive plural.
- source_word: ὡς ἐσφαγμένην
  chosen: was as if slaughtered
  alternatives:
  - seemed to have been slain
  - was as though slain
  lexicon: BDAG
  rationale: ὡς marks resemblance rather than asserting straightforward identity;
    ἐσφαγμένην from σφάζω is stronger than generic 'killed' and elsewhere in Revelation
    is often rendered 'slain/slaughtered.' 'As if slaughtered' preserves the visionary
    comparison.
- source_word: εἰς θάνατον
  chosen: to death
  alternatives:
  - unto death
  lexicon: BDAG
  rationale: This idiom intensifies the mortal character of the wound/slaughter. 'To
    death' is clear modern English and preserves the force of the phrase.
- source_word: ἡ πληγὴ τοῦ θανάτου αὐτοῦ
  chosen: its deadly wound
  alternatives:
  - the wound of its death
  - its death-stroke
  lexicon: BDAG
  rationale: A compact English rendering of the genitival construction that communicates
    a wound characterized by death, i.e., apparently mortal. 'Deadly wound' is idiomatic
    and fits the context of apparent death and recovery.
- source_word: ἐθεραπεύθη
  chosen: was healed
  alternatives:
  - was cured
  - was restored
  lexicon: BDAG
  rationale: Passive of θεραπεύω here refers to restoration from the wound. 'Was healed'
    is the standard and most transparent rendering.
- source_word: ἐθαυμάσθη
  chosen: marveled
  alternatives:
  - was amazed
  - wondered
  lexicon: BDAG
  rationale: The passive here conveys that the earth was filled with wonder/awe. 'Marveled'
    preserves the sense of astonishment without overinterpreting whether the response
    is positive or negative.
- source_word: ὅλη ἡ γῆ
  chosen: the whole earth
  alternatives:
  - the whole land
  - all the earth
  lexicon: BDAG
  rationale: In Revelation, γῆ can mean 'earth' or 'land,' but in this global apocalyptic
    context 'the whole earth' best fits the scope of the beast's influence.
- source_word: ὀπίσω τοῦ θηρίου
  chosen: followed after the beast
  alternatives:
  - went after the beast
  - followed the beast
  lexicon: BDAG
  rationale: ὀπίσω with the genitive denotes movement or allegiance 'after' someone.
    'Followed after' preserves both the directional imagery and the sense of following
    in allegiance.
- source_word: θηρίου
  chosen: the beast
  lexicon: BDAG
  rationale: Standard rendering of θηρίον in Revelation's apocalyptic imagery; capitalizing
    is unnecessary here because the Greek does not signal a proper name.
