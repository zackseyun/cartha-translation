theological_decisions:
- issue: Nature of the beast's apparent death and recovery
  chosen_reading: Render the text as an apparent mortal slaughter/healing without
    specifying whether the event is literal resurrection, symbolic political recovery,
    or deceptive imitation.
  alternative_readings:
  - literal death and resurrection
  - symbolic recovery of empire or ruler
  - apparent death staged as deception
  rationale: The Greek states that one head was 'as if slaughtered to death' and that
    its deadly wound was healed, but it does not resolve the interpretive question
    of how this should be understood. The translation preserves the text's imagery
    and ambiguity rather than importing a specific eschatological scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
