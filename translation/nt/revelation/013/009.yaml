id: REV.13.9
reference: Revelation 13:9
source:
  edition: SBLGNT
  text: Εἴ τις ἔχει οὖς ἀκουσάτω.
translation:
  text: If anyone has an ear, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in English style, 'If anyone has an ear, let them hear.'
      The Greek is singular and masculine in form but generic in reference.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἴ
  chosen: If
  alternatives:
  - Whoever
  lexicon: BDAG
  rationale: Conditional particle introducing a proverbial exhortation. 'If' preserves
    the Greek form more directly than smoothing to 'whoever.'
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - whoever
  lexicon: BDAG
  rationale: Indefinite pronoun used generically. 'Anyone' is natural modern English
    and preserves the open, representative force of the Greek.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present indicative of possession; 'has' is the plain and idiomatic
    rendering.
- source_word: οὖς
  chosen: an ear
  alternatives:
  - ears
  lexicon: BDAG
  rationale: Although the Greek noun here is singular in form, the idiom in this formulaic
    exhortation is naturally rendered in English as 'an ear.' This preserves the sense
    of capacity to heed without awkwardness.
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - let him listen
  - he must hear
  lexicon: BDAG
  rationale: Aorist active imperative, third person singular, expressing a solemn
    call to heed. 'Let him hear' preserves the traditional force and the representative
    masculine singular. 'Listen' is possible but slightly weaker than the biblical
    idiom 'hear,' which includes responsive attention.
