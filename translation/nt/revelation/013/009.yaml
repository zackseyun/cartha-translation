theological_decisions:
- issue: Representative masculine in the exhortation
  chosen_reading: let him hear
  alternative_readings:
  - let them hear
  rationale: The Greek imperative is third person singular, and the doctrine calls
    for gender-accurate rather than gender-neutral rendering where the source uses
    a grammatically masculine representative form. 'Let him hear' preserves that form
    while still functioning generically.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatic force of the hearing formula
  chosen_reading: retain the biblical idiom 'hear' rather than interpretively expand
    it
  alternative_readings:
  - let him understand
  - let him listen
  rationale: The verse uses a stock apocalyptic/prophetic summons to attentive reception.
    Rendering it as 'hear' preserves the theological and literary resonance without
    importing a narrower interpretation such as mere cognition ('understand').
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
