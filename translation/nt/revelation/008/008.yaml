theological_decisions:
- issue: Nature of the mountain-like object
  chosen_reading: Render the comparison without identifying the object literally or
    symbolically beyond the Greek wording.
  alternative_readings:
  - a literal mountain
  - a meteor-like object
  - symbolic imagery of judgment
  rationale: The text uses ὡς to signal resemblance. The translation should preserve
    the visionary comparison and not resolve whether the image is literal, symbolic,
    or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
