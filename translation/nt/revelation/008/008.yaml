id: REV.8.8
reference: Revelation 8:8
source:
  edition: SBLGNT
  text: Καὶ ὁ δεύτερος ἄγγελος ἐσάλπισεν· καὶ ὡς ὄρος μέγα ⸀πυρὶ καιόμενον ἐβλήθη
    εἰς τὴν θάλασσαν· καὶ ἐγένετο τὸ τρίτον τῆς θαλάσσης αἷμα,
translation:
  text: And the second angel sounded the trumpet, and something like a great mountain
    burning with fire was thrown into the sea, and a third of the sea became blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a great mountain burning with fire'; the Greek marks resemblance,
      not necessarily identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: sounded the trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound or blow a trumpet. In this apocalyptic
    sequence, English idiom is clearest with the supplied object 'the trumpet,' which
    is implied by the verb and standard in context.
- source_word: ὡς
  chosen: something like
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: ὡς here marks resemblance rather than identity. 'Something like' makes
    explicit that John describes an appearance or comparison, not necessarily a literal
    mountain.
- source_word: ὄρος μέγα
  chosen: a great mountain
  alternatives:
  - a huge mountain
  - a large mountain
  lexicon: BDAG
  rationale: A straightforward rendering of the noun-adjective phrase. 'Great' preserves
    the elevated, weighty tone of apocalyptic imagery better than the more colloquial
    'huge' or merely dimensional 'large.'
- source_word: πυρὶ καιόμενον
  chosen: burning with fire
  alternatives:
  - ablaze with fire
  - set on fire
  - burning in fire
  lexicon: BDAG
  rationale: The dative πυρί with the participle καιόμενον naturally yields 'burning
    with fire.' This preserves the vivid imagery without overinterpreting whether
    the object is volcanic, meteoric, or symbolic.
- source_word: ἐβλήθη
  chosen: was thrown
  alternatives:
  - was cast
  - was hurled
  lexicon: BDAG
  rationale: The passive aorist indicates the object was cast/thrown. 'Was thrown'
    is natural modern English; 'was cast' is more traditional but less contemporary,
    and 'was hurled' adds intensity not explicit in the verb.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the ocean
  lexicon: BDAG
  rationale: θάλασσα is regularly 'sea.' 'Ocean' would be more interpretive and less
    directly tied to the Greek term.
- source_word: τὸ τρίτον τῆς θαλάσσης
  chosen: a third of the sea
  alternatives:
  - the third part of the sea
  lexicon: BDAG
  rationale: This partitive expression is idiomatically rendered 'a third of the sea'
    in modern English. It preserves the quantitative judgment motif common in Revelation.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: The noun plainly means 'blood.' No interpretive expansion is warranted;
    the text states the sea became blood.
