id: REV.8.7
reference: Revelation 8:7
source:
  edition: SBLGNT
  text: Καὶ ὁ πρῶτος ἐσάλπισεν· καὶ ἐγένετο χάλαζα καὶ πῦρ μεμιγμένα ἐν αἵματι, καὶ
    ἐβλήθη εἰς τὴν γῆν· καὶ τὸ τρίτον τῆς γῆς κατεκάη, καὶ τὸ τρίτον τῶν δένδρων κατεκάη,
    καὶ πᾶς χόρτος χλωρὸς κατεκάη.
translation:
  text: And the first sounded his trumpet, and there came hail and fire mixed with
    blood, and it was thrown onto the earth. And a third of the earth was burned up,
    and a third of the trees was burned up, and all the green grass was burned up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'land' for 'earth' (γῆ); the Greek term can denote either, but the broader
      apocalyptic context favors 'earth' here.
    reason: lexical_alternative
  - marker: b
    text: Or 'mingled with blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first angel
  lexicon: BDAG
  rationale: The noun 'angel' is implied from the immediate context of the seven angels
    with trumpets (Rev 8:2, 6) but is not expressed here. To avoid adding words beyond
    the Greek, the translation keeps the elliptical 'the first.'
- source_word: ἐσάλπισεν
  chosen: sounded his trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound a trumpet. English idiom is clearer with
    the object supplied, especially since the context explicitly concerns trumpet
    judgments.
- source_word: ἐγένετο
  chosen: there came
  alternatives:
  - there was
  - there appeared
  - it happened that there was
  lexicon: BDAG
  rationale: This rendering captures the eventive force of γίνομαι in apocalyptic
    narrative, introducing the phenomenon that follows in natural English.
- source_word: χάλαζα καὶ πῦρ
  chosen: hail and fire
  lexicon: BDAG
  rationale: A straightforward rendering of the paired destructive elements, preserving
    the vivid imagery without interpretation.
- source_word: μεμιγμένα ἐν αἵματι
  chosen: mixed with blood
  alternatives:
  - mingled with blood
  lexicon: BDAG
  rationale: μεμιγμένα denotes a mixed or mingled state; 'mixed with blood' is clear
    modern English and preserves the shocking apocalyptic image. The preposition ἐν
    here is rendered instrumentally/associatively.
- source_word: ἐβλήθη εἰς τὴν γῆν
  chosen: it was thrown onto the earth
  alternatives:
  - they were thrown to the earth
  - it was cast upon the earth
  lexicon: BDAG
  rationale: The singular passive verb ἐβλήθη is best represented by singular 'it
    was thrown,' treating the hail-and-fire phenomenon as a collective whole. 'Onto
    the earth' fits εἰς with motion toward a surface.
- source_word: τὸ τρίτον τῆς γῆς
  chosen: a third of the earth
  alternatives:
  - the third part of the earth
  - a third of the land
  lexicon: BDAG
  rationale: The idiom denotes one-third as a portion. 'Earth' is preferred over 'land'
    because Revelation's cosmic judgment imagery here is broader than a local territory.
- source_word: κατεκάη
  chosen: was burned up
  alternatives:
  - was burned
  - was consumed by fire
  lexicon: BDAG
  rationale: κατακαίω intensifies the idea of burning, often to complete consumption.
    'Burned up' reflects that force better than the simpler 'burned.'
- source_word: τὸ τρίτον τῶν δένδρων
  chosen: a third of the trees
  alternatives:
  - the third part of the trees
  lexicon: BDAG
  rationale: Natural English equivalent of the partitive expression, matching the
    repeated judgment pattern in the verse.
- source_word: πᾶς χόρτος χλωρός
  chosen: all the green grass
  alternatives:
  - every green plant
  - all green vegetation
  lexicon: BDAG
  rationale: χόρτος commonly refers to grass or herbage; with χλωρός ('green, fresh'),
    'all the green grass' preserves the concrete image and the contrast with what
    is scorched.
