theological_decisions:
- issue: Scope of γῆ in apocalyptic judgment imagery
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The immediate context of trumpet judgments in Revelation presents cosmic-scale
    effects, so 'earth' better preserves the broader apocalyptic scope without narrowing
    the judgment to a local region. The alternative remains lexically possible.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity where genuine'
