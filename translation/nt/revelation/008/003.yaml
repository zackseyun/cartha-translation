id: REV.8.3
reference: Revelation 8:3
source:
  edition: SBLGNT
  text: Καὶ ἄλλος ἄγγελος ἦλθεν καὶ ἐστάθη ἐπὶ τοῦ θυσιαστηρίου ἔχων λιβανωτὸν χρυσοῦν,
    καὶ ἐδόθη αὐτῷ θυμιάματα πολλὰ ἵνα ⸀δώσει ταῖς προσευχαῖς τῶν ἁγίων πάντων ἐπὶ
    τὸ θυσιαστήριον τὸ χρυσοῦν τὸ ἐνώπιον τοῦ θρόνου.
translation:
  text: And another angel came and stood at the altar, holding a golden censer, and
    much incense was given to him so that he might offer it with the prayers of all
    the saints on the golden altar before the throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a golden incense burner.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'so that he might give [it] to the prayers of all the saints';
      in context, this means the incense is offered with or added to their prayers.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  chosen: another angel
  alternatives:
  - an other angel
  lexicon: BDAG
  rationale: ἄλλος marks an additional angel in the sequence, not a different kind
    of being. Standard idiomatic English is 'another angel.'
- source_word: ἐστάθη ἐπὶ τοῦ θυσιαστηρίου
  chosen: stood at the altar
  alternatives:
  - stood upon the altar
  - took his stand at the altar
  lexicon: BDAG
  rationale: ἐστάθη is ingressive/aoristic 'stood' or 'took his stand.' With ἐπί +
    genitive in this context, English 'at the altar' is more natural than the overly
    literal 'upon the altar,' which could imply standing on top of it.
- source_word: λιβανωτὸν χρυσοῦν
  chosen: a golden censer
  alternatives:
  - a golden incense burner
  lexicon: BDAG
  rationale: λιβανωτός denotes a vessel for burning incense. 'Censer' is concise and
    standard; 'incense burner' is possible but less idiomatic in biblical English.
    'Golden' directly renders χρυσοῦν.
- source_word: ἐδόθη αὐτῷ θυμιάματα πολλὰ
  chosen: much incense was given to him
  alternatives:
  - many incense offerings were given to him
  - a great quantity of incense was given to him
  lexicon: BDAG
  rationale: θυμιάματα refers to incense substances/offerings. In English, incense
    is normally treated as a mass noun, so 'much incense' best reflects natural usage
    while preserving the passive 'was given to him.'
- source_word: ἵνα δώσει
  chosen: so that he might offer it
  alternatives:
  - so that he might give it
  - so that he will give it
  lexicon: BDAG
  rationale: Although δίδωμι commonly means 'give,' in sacrificial/cultic context
    with incense and altar language, the sense is to present or offer. The ἵνα clause
    expresses purpose; English 'might offer' captures that purpose naturally. The
    object 'it' is supplied from the immediately preceding 'incense' for intelligibility.
- source_word: ταῖς προσευχαῖς τῶν ἁγίων πάντων
  chosen: with the prayers of all the saints
  alternatives:
  - to the prayers of all the saints
  - for the prayers of all the saints
  lexicon: BDAG
  rationale: The dative after δώσει in this cultic setting is syntactically difficult.
    The sense in context is that the incense is added to/accompanies the prayers.
    'With the prayers of all the saints' best conveys the relationship without overinterpreting
    beyond the imagery.
- source_word: ἅγιοι
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Revelation commonly denotes God's consecrated people. 'Saints'
    is the established and concise rendering; alternatives are possible but less idiomatic
    here.
- source_word: ἐπὶ τὸ θυσιαστήριον τὸ χρυσοῦν
  chosen: on the golden altar
  alternatives:
  - upon the golden altar
  - at the golden altar
  lexicon: BDAG
  rationale: Here ἐπί with accusative after the offering language naturally indicates
    direction toward/onto the altar. 'On the golden altar' fits the cultic action
    better than 'at.'
- source_word: τὸ ἐνώπιον τοῦ θρόνου
  chosen: before the throne
  alternatives:
  - in the presence of the throne
  lexicon: BDAG
  rationale: 'ἐνώπιον is straightforwardly spatial/relational: ''before'' or ''in
    the presence of.'' ''Before the throne'' is the natural and sufficiently precise
    English rendering.'
