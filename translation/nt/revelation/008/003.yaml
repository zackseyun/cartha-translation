theological_decisions:
- issue: Function of the incense in relation to the prayers of the saints
  chosen_reading: The incense is offered together with/accompanying the prayers of
    all the saints.
  alternative_readings:
  - The incense is given to the prayers of all the saints in a more literal dative
    sense.
  rationale: The syntax is compressed, but the broader apocalyptic-temple imagery
    and immediate context favor understanding the incense as accompanying the saints'
    prayers rather than a wooden 'give to the prayers.' This preserves the imagery
    without importing a developed doctrine of angelic mediation beyond what the verse
    depicts.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
