id: REV.8.12
reference: Revelation 8:12
source:
  edition: SBLGNT
  text: Καὶ ὁ τέταρτος ἄγγελος ἐσάλπισεν· καὶ ἐπλήγη τὸ τρίτον τοῦ ἡλίου καὶ τὸ τρίτον
    τῆς σελήνης καὶ τὸ τρίτον τῶν ἀστέρων, ἵνα σκοτισθῇ τὸ τρίτον αὐτῶν καὶ ⸂ἡ ἡμέρα
    μὴ φάνῃ τὸ τρίτον αὐτῆς⸃, καὶ ἡ νὺξ ὁμοίως.
translation:
  text: And the fourth angel sounded the trumpet, and a third of the sun and a third
    of the moon and a third of the stars was struck, so that a third of them was darkened,
    and the day did not shine for a third of it, and the night likewise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the day might not shine for a third of it.' The Greek construction
      can be expressed with a more purpose-like nuance after 'so that.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: sounded the trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound a trumpet. English normally requires
    the object for clarity, so 'sounded the trumpet' is a natural explicit rendering
    without adding meaning.
- source_word: ἐπλήγη
  chosen: was struck
  alternatives:
  - was smitten
  - was hit
  - was afflicted
  lexicon: BDAG
  rationale: The passive of πλήσσω conveys being struck or smitten. 'Was struck' is
    clear modern English and preserves the judgment imagery without archaic diction.
- source_word: τὸ τρίτον
  chosen: a third
  alternatives:
  - the third part
  - one third
  lexicon: BDAG
  rationale: Repeated τὸ τρίτον is idiomatically rendered 'a third' in English. This
    preserves the quantitative force while avoiding wooden repetition of 'the third
    part.'
- source_word: ἥλιος / σελήνη / ἀστέρες
  chosen: the sun ... the moon ... the stars
  lexicon: BDAG
  rationale: These are straightforward celestial terms and should be rendered literally.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces result/purpose. Here 'so that' reads naturally and fits
    the apocalyptic sequence of judgment and effect.
- source_word: σκοτισθῇ
  chosen: was darkened
  alternatives:
  - might be darkened
  - became dark
  lexicon: BDAG
  rationale: The passive subjunctive after ἵνα is well represented by 'was darkened'
    in English result language. This keeps the passive sense that the darkening happens
    to the luminaries.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: The plural pronoun most naturally refers collectively to the sun, moon,
    and stars. 'Them' preserves the plural reference.
- source_word: ἡ ἡμέρα μὴ φάνῃ
  chosen: the day did not shine
  alternatives:
  - the day might not shine
  - the day did not appear
  - the day did not give light
  lexicon: BDAG
  rationale: φαίνω can mean shine, appear, or give light depending on context. With
    'day' in a cosmic-darkening context, 'shine' best matches the imagery and parallels
    the darkening of the heavenly lights.
- source_word: τὸ τρίτον αὐτῆς
  chosen: for a third of it
  alternatives:
  - for a third part of it
  - during a third of it
  lexicon: BDAG
  rationale: The genitive pronoun refers to the day; the phrase indicates the extent
    or duration affected. 'For a third of it' is concise and natural while preserving
    the quantitative limitation.
- source_word: ἡ νὺξ ὁμοίως
  chosen: and the night likewise
  alternatives:
  - and the night in the same way
  - and likewise the night
  lexicon: BDAG
  rationale: ὁμοίως signals that the same limitation applies to the night. 'And the
    night likewise' is compact and faithful.
