theological_decisions:
- issue: Nature of the cosmic judgment imagery
  chosen_reading: Render the celestial darkening straightforwardly as apocalyptic
    judgment language without specifying whether it is literal, symbolic, or both.
  alternative_readings:
  - strictly literal astronomical event
  - purely symbolic political/cosmic imagery
  rationale: The verse itself describes a divinely inflicted darkening of a third
    of the heavenly lights and of day/night. The translation should preserve the imagery
    and scope of judgment without importing an interpretive scheme not stated in the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
