id: REV.8.13
reference: Revelation 8:13
source:
  edition: SBLGNT
  text: Καὶ εἶδον, καὶ ἤκουσα ἑνὸς ἀετοῦ πετομένου ἐν μεσουρανήματι λέγοντος φωνῇ
    μεγάλῃ· Οὐαὶ οὐαὶ οὐαὶ ⸂τοὺς κατοικοῦντας⸃ ἐπὶ τῆς γῆς ἐκ τῶν λοιπῶν φωνῶν τῆς
    σάλπιγγος τῶν τριῶν ἀγγέλων τῶν μελλόντων σαλπίζειν.
translation:
  text: And I saw, and I heard one eagle flying in midheaven, saying with a loud voice,
    “Woe, woe, woe to those who dwell on the earth, because of the remaining trumpet-blasts
    of the three angels who are about to sound!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “one angel” instead of “one eagle.”
    reason: textual_variant
  - marker: b
    text: Or “in midair”; the Greek term refers to the sky at its highest point.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀετοῦ
  chosen: eagle
  alternatives:
  - vulture
  lexicon: BDAG
  rationale: The noun normally denotes an eagle. Although some contexts may allow
    'vulture,' Revelation's visionary imagery and the lack of carrion-specific context
    favor 'eagle.' The variant tradition 'angel' is not followed because the SBLGNT
    reads ἀετοῦ.
- source_word: μεσουρανήματι
  chosen: in midheaven
  alternatives:
  - in midair
  - at zenith
  lexicon: BDAG
  rationale: The term refers to the highest point of the sky or the open sky overhead.
    'Midheaven' preserves the apocalyptic/cosmic register better than the more colloquial
    'midair,' while remaining intelligible.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  lexicon: BDAG
  rationale: A standard idiomatic rendering of the dative phrase that preserves the
    force of public proclamation.
- source_word: Οὐαὶ οὐαὶ οὐαὶ
  chosen: Woe, woe, woe
  lexicon: BDAG
  rationale: The triple repetition should be preserved formally because it carries
    rhetorical and prophetic intensity.
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those who live on the earth
  lexicon: BDAG
  rationale: This phrase is a recurring expression in Revelation with theological
    resonance for earthbound humanity in rebellion. 'Those who dwell on the earth'
    preserves that repeated wording better than the more compressed 'inhabitants of
    the earth.'
- source_word: ἐκ τῶν λοιπῶν φωνῶν τῆς σάλπιγγος
  chosen: because of the remaining trumpet-blasts
  alternatives:
  - from the remaining sounds of the trumpet
  - because of the remaining voices/sounds of the trumpet
  lexicon: BDAG
  rationale: ἐκ here is causal in context ('because of'). φωνῶν literally means 'sounds/voices,'
    but with trumpet imagery idiomatic English is better served by 'trumpet-blasts.'
    'Remaining' renders λοιπῶν straightforwardly.
- source_word: τῶν τριῶν ἀγγέλων
  chosen: of the three angels
  lexicon: BDAG
  rationale: ἄγγελος is rendered 'angel' in this apocalyptic context; there is no
    reason to generalize to 'messengers.'
- source_word: τῶν μελλόντων σαλπίζειν
  chosen: who are about to sound
  alternatives:
  - who are going to blow
  - who are about to trumpet
  lexicon: BDAG
  rationale: μέλλω + infinitive indicates imminence. With σαλπίζω, English idiom prefers
    'sound' when the object (the trumpet) is implied by context.
