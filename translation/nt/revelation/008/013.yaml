theological_decisions:
- issue: Textual reading of the flying herald
  chosen_reading: one eagle
  alternative_readings:
  - one angel
  rationale: The main text follows the provided SBLGNT reading ἀετοῦ ('eagle'). Because
    'angel' appears in some manuscript traditions and in some translations, the alternative
    is preserved in a footnote for auditability, but not adopted in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where relevant.'
