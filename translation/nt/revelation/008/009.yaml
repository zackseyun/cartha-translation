theological_decisions:
- issue: Rendering ψυχάς in a context describing sea creatures
  chosen_reading: Translate with explicit lexical preservation as 'living souls' rather
    than reducing to 'life' in the main text.
  alternative_readings:
  - life
  - lives
  - living creatures
  rationale: The verse is not making a technical anthropological claim about animal
    souls, but ψυχή is a significant biblical term and should not be silently erased
    where understandable English can preserve it. Adding 'living' prevents misunderstanding
    and reflects the idiomatic sense of animate beings.
  doctrine_reference: Translation philosophy §1, §3, §5
