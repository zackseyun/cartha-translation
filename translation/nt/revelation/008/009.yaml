id: REV.8.9
reference: Revelation 8:9
source:
  edition: SBLGNT
  text: καὶ ἀπέθανε τὸ τρίτον ⸀τῶν κτισμάτων τῶν ἐν τῇ θαλάσσῃ, τὰ ἔχοντα ψυχάς, καὶ
    τὸ τρίτον τῶν πλοίων ⸀διεφθάρησαν.
translation:
  text: And a third of the creatures in the sea—the ones that have living souls—died,
    and a third of the ships were destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''that had life'' or ''living creatures.'' Greek: ''the ones having
      souls/lives.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανε
  chosen: died
  alternatives:
  - perished
  lexicon: BDAG
  rationale: Aorist of ἀποθνῄσκω straightforwardly denotes death. 'Died' is the most
    direct and natural English equivalent.
- source_word: τὸ τρίτον
  chosen: a third
  alternatives:
  - the third part
  lexicon: BDAG
  rationale: Idiomatic partitive expression in English. 'A third' preserves the quantitative
    force without archaic phrasing.
- source_word: κτισμάτων
  chosen: creatures
  alternatives:
  - created things
  - living creatures
  lexicon: BDAG
  rationale: κτίσμα can mean 'creature' or 'created thing.' In this context, modified
    by 'the ones that have ψυχάς' and located in the sea, it refers to animate sea
    creatures rather than all created things in the sea.
- source_word: τῶν ἐν τῇ θαλάσσῃ
  chosen: in the sea
  alternatives:
  - that were in the sea
  lexicon: BDAG
  rationale: The prepositional phrase identifies location. 'In the sea' is concise
    and fully adequate in English.
- source_word: τὰ ἔχοντα ψυχάς
  chosen: the ones that have living souls
  alternatives:
  - that had life
  - that had breath
  - living creatures
  lexicon: BDAG
  rationale: The phrase literally says 'the ones having souls/lives.' Because ψυχή
    is a theologically significant term, the translation preserves its lexical presence
    rather than flattening it to merely 'life.' 'Living souls' is somewhat marked
    in English but remains understandable and auditable.
- source_word: ψυχάς
  chosen: living souls
  alternatives:
  - lives
  - life
  lexicon: BDAG
  rationale: ψυχή can denote soul, life, self, or living being depending on context.
    Here it marks animate life in contrast to inanimate objects. 'Living souls' preserves
    the lexical form while signaling that the referent is living beings, not an abstract
    doctrine of the soul.
- source_word: πλοίων
  chosen: ships
  alternatives:
  - vessels
  lexicon: BDAG
  rationale: πλοῖον normally means ship or boat. In an apocalyptic judgment scene
    involving the sea, 'ships' is the clearest natural rendering.
- source_word: διεφθάρησαν
  chosen: were destroyed
  alternatives:
  - were ruined
  - were corrupted
  lexicon: BDAG
  rationale: Passive of διαφθείρω here refers to destructive ruin, not moral corruption.
    'Were destroyed' best fits the maritime disaster context and standard English
    usage.
