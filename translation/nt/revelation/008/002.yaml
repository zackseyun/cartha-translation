id: REV.8.2
reference: Revelation 8:2
source:
  edition: SBLGNT
  text: καὶ εἶδον τοὺς ἑπτὰ ἀγγέλους οἳ ἐνώπιον τοῦ θεοῦ ἑστήκασιν, καὶ ἐδόθησαν αὐτοῖς
    ἑπτὰ σάλπιγγες.
translation:
  text: And I saw the seven angels who stand before God, and seven trumpets were given
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who are standing before God' or 'who have stood before God'; the Greek
      perfect verb emphasizes their standing as an ongoing state.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked at
  - I beheld
  lexicon: BDAG
  rationale: Aorist of ὁράω in narrative vision reporting is most naturally rendered
    'I saw.' 'Beheld' is too archaic for the stated style, and 'looked at' weakens
    the visionary force.
- source_word: τοὺς ἑπτὰ ἀγγέλους
  chosen: the seven angels
  alternatives:
  - seven angels
  lexicon: BDAG
  rationale: The article plus numeral identifies a definite group already conceptually
    known in the vision, so 'the seven angels' best reflects the Greek.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Revelation's heavenly throne-room context, supernatural angels are
    clearly intended rather than human messengers.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  - before the face of God
  lexicon: BDAG
  rationale: '''Before God'' is natural English and preserves the spatial-relational
    sense of ἐνώπιον. ''In the presence of God'' is possible but slightly more expansive
    than needed.'
- source_word: ἑστήκασιν
  chosen: stand
  alternatives:
  - have stood
  - are standing
  lexicon: BDAG
  rationale: Perfect of ἵστημι conveys a present state resulting from prior action.
    In English, the simple present 'stand' best communicates the stative sense idiomatically.
- source_word: ἐδόθησαν αὐτοῖς
  chosen: were given to them
  alternatives:
  - they were given seven trumpets
  - they received
  lexicon: BDAG
  rationale: The passive leaves the giver implicit, matching the Greek. 'Received'
    would shift to an active-like perspective not present in the text.
- source_word: σάλπιγγες
  chosen: trumpets
  alternatives:
  - bugles
  lexicon: BDAG
  rationale: '''Trumpets'' is the standard and contextually appropriate rendering
    for σάλπιγγες in apocalyptic/judgment imagery.'
