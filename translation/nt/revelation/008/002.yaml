theological_decisions:
- issue: Identity and status of the seven angels
  chosen_reading: Render straightforwardly as 'the seven angels who stand before God'
    without specifying rank or linking them explicitly to later traditions about archangels.
  alternative_readings:
  - the seven archangels
  - the seven angels who stand in God's presence
  rationale: The Greek text identifies a definite group of angels standing before
    God but does not use ἀρχάγγελοι or otherwise define their rank. The translation
    should preserve what the text states without importing later interpretive tradition.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
