theological_decisions:
- issue: Nature of ἄγγελοι in apocalyptic context
  chosen_reading: heavenly angels
  alternative_readings:
  - human messengers
  rationale: No doctrinally contested term is involved, but the narrative context
    of Revelation 8 strongly supports heavenly beings entrusted with eschatological
    trumpets. The translation reflects the most likely referent without importing
    additional theological claims.
