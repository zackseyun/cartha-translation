id: REV.8.5
reference: Revelation 8:5
source:
  edition: SBLGNT
  text: καὶ εἴληφεν ὁ ἄγγελος τὸν λιβανωτόν, καὶ ἐγέμισεν αὐτὸν ἐκ τοῦ πυρὸς τοῦ θυσιαστηρίου,
    καὶ ἔβαλεν εἰς τὴν γῆν· καὶ ἐγένοντο βρονταὶ καὶ φωναὶ καὶ ἀστραπαὶ καὶ σεισμός.
translation:
  text: And the angel took the censer, and filled it with fire from the altar, and
    threw it onto the earth; and there came peals of thunder and sounds and flashes
    of lightning and an earthquake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "voices" for "sounds." The Greek term can denote either articulated voices
      or sounds/noises in a theophanic setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴληφεν
  chosen: took
  alternatives:
  - has taken
  - received
  lexicon: BDAG
  rationale: The perfect form is commonly used with present-result force, but in Revelation's
    narrative sequence idiomatic English prefers the simple past, especially alongside
    the following aorists.
- source_word: λιβανωτόν
  chosen: censer
  alternatives:
  - incense burner
  lexicon: BDAG
  rationale: In this cultic context the object is the vessel used for burning incense
    and carrying coals. 'Censer' is the standard concise English equivalent and fits
    the immediate action of filling it with fire from the altar.
- source_word: ἐγέμισεν αὐτὸν ἐκ τοῦ πυρὸς τοῦ θυσιαστηρίου
  chosen: filled it with fire from the altar
  alternatives:
  - filled it from the fire of the altar
  - filled it with some of the fire from the altar
  lexicon: BDAG
  rationale: 'This renders the sense naturally in English while preserving the source
    relation: the censer is filled using fire taken from the altar. ''From the altar''
    is retained explicitly because the altar is symbolically important in the scene.'
- source_word: θυσιαστηρίου
  chosen: altar
  lexicon: BDAG
  rationale: Standard rendering for the sacrificial/incense altar term in apocalyptic
    temple imagery.
- source_word: ἔβαλεν εἰς τὴν γῆν
  chosen: threw it onto the earth
  alternatives:
  - cast it to the earth
  - threw it to the ground
  lexicon: BDAG
  rationale: βάλλω is forceful; 'threw' preserves the dramatic action better than
    a softer verb. γῆ in Revelation often carries the broader sense 'earth' rather
    than merely 'ground,' especially in cosmic judgment scenes.
- source_word: ἐγένοντο
  chosen: there came
  alternatives:
  - there were
  - there occurred
  lexicon: BDAG
  rationale: An existential rendering is idiomatic in English and conveys the sudden
    onset of the phenomena.
- source_word: βρονταὶ
  chosen: peals of thunder
  alternatives:
  - thunders
  - thunder
  lexicon: BDAG
  rationale: The plural denotes repeated thunderclaps; 'peals of thunder' is natural
    modern English and preserves the plurality.
- source_word: φωναὶ
  chosen: sounds
  alternatives:
  - voices
  - noises
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' In this stock theophanic formula, the
    referent is not clearly personal speech, so 'sounds' avoids over-specifying while
    preserving the auditory phenomenon. The alternative 'voices' is worth preserving
    in a footnote because of translation tradition and possible allusion to heavenly
    utterance.
- source_word: ἀστραπαὶ
  chosen: flashes of lightning
  alternatives:
  - lightnings
  lexicon: BDAG
  rationale: This is clear, idiomatic English for the plural noun.
- source_word: σεισμός
  chosen: an earthquake
  alternatives:
  - earthquake
  lexicon: BDAG
  rationale: The singular count noun is naturally rendered with the article in English.
