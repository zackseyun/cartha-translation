theological_decisions:
- issue: Meaning of γῆ in an apocalyptic judgment context
  chosen_reading: earth
  alternative_readings:
  - ground
  - land
  rationale: The scene depicts cosmic-scale judgment imagery in Revelation, so 'earth'
    best matches the book's broader usage and the dramatic scope of the action. 'Ground'
    would narrow the sense too much, and 'land' would suggest a more localized judgment
    not signaled here.
- issue: Meaning of φωναί in the theophanic formula
  chosen_reading: sounds
  alternative_readings:
  - voices
  rationale: The text lists auditory and visual portents after the censer is thrown.
    Because no speakers are identified, 'sounds' preserves ambiguity without importing
    explicit speech. The traditional alternative 'voices' is preserved in a footnote
    to maintain transparency.
  doctrine_reference: Preserve theological tension rather than resolve it
