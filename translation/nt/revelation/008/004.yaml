id: REV.8.4
reference: Revelation 8:4
source:
  edition: SBLGNT
  text: καὶ ἀνέβη ὁ καπνὸς τῶν θυμιαμάτων ταῖς προσευχαῖς τῶν ἁγίων ἐκ χειρὸς τοῦ
    ἀγγέλου ἐνώπιον τοῦ θεοῦ.
translation:
  text: And the smoke of the incense went up with the prayers of the saints from the
    hand of the angel before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose' or 'ascended' for 'went up.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'with the prayers of the saints'; the wording associates the incense-smoke
      with the prayers without explicitly identifying the two in this verse.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - rose
  - ascended
  lexicon: BDAG
  rationale: Aorist indicative of ἀναβαίνω, describing upward movement. 'Went up'
    is natural modern English and preserves the concrete imagery without sounding
    overly formal like 'ascended.'
- source_word: καπνὸς
  chosen: smoke
  lexicon: BDAG
  rationale: The ordinary sense is literal 'smoke'; the apocalyptic imagery here does
    not require a more interpretive rendering.
- source_word: θυμιαμάτων
  chosen: of the incense
  alternatives:
  - of the censings
  - of the fragrant offerings
  lexicon: BDAG
  rationale: θυμίαμα commonly refers to incense. The plural in Greek can be represented
    idiomatically in English by the mass noun 'incense,' which reads naturally while
    preserving the cultic sense.
- source_word: ταῖς προσευχαῖς
  chosen: with the prayers
  alternatives:
  - together with the prayers
  - along with the prayers
  lexicon: BDAG
  rationale: 'The dative is best taken as associative/instrumental in context: the
    smoke rises in connection with the prayers. ''With'' is concise and preserves
    the relationship without over-specifying whether the incense symbolizes, accompanies,
    or carries the prayers.'
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of the holy ones
  - of God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is a standard designation for God's consecrated people. 'Saints'
    preserves the established biblical term and fits Revelation's register; 'holy
    people' is possible but less textually precise here.
- source_word: ἐκ χειρὸς τοῦ ἀγγέλου
  chosen: from the hand of the angel
  alternatives:
  - out of the hand of the angel
  - from the angel's hand
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the image of priestly mediation
    in the vision. 'From the hand of the angel' is slightly more formal than the possessive
    but mirrors the Greek structure well.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: ἐνώπιον regularly means 'before' or 'in the presence of.' 'Before God'
    is concise, idiomatic, and retains the cultic/judicial sense of presentation in
    God's presence.
