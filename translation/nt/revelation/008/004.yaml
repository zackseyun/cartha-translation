theological_decisions:
- issue: Relationship between the incense and the prayers
  chosen_reading: Rendered as 'the smoke of the incense went up with the prayers of
    the saints' without making the incense identical to the prayers.
  alternative_readings:
  - the smoke of the incense, which are the prayers of the saints, went up
  - the smoke rose for the prayers of the saints
  rationale: The Greek construction links the smoke and the prayers but does not explicitly
    equate them in this verse. The translation preserves the association while avoiding
    interpretive overreach. This also maintains the theological tension of the imagery
    in Revelation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'saints'
  chosen_reading: Retained 'saints' as the covenant people of God, without narrowing
    to a later denominational or canonized sense.
  alternative_readings:
  - holy people
  rationale: In context ἅγιοι refers broadly to God's holy people. Keeping 'saints'
    preserves biblical terminology while avoiding doctrinal import beyond the text.
  doctrine_reference: Within historic ecumenical orthodoxy without advocating denominational
    distinctives.
