id: REV.8.1
reference: Revelation 8:1
source:
  edition: SBLGNT
  text: Καὶ ⸀ὅταν ἤνοιξεν τὴν σφραγῖδα τὴν ἑβδόμην, ἐγένετο σιγὴ ἐν τῷ οὐρανῷ ὡς ἡμιώριον.
translation:
  text: And when he opened the seventh seal, there was silence in heaven for about
    half an hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he broke the seventh seal open.' The Greek simply says 'opened
      the seventh seal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there came to be silence in heaven for about half an hour.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Although ὅταν often carries an indefinite or iterative sense ('whenever'),
    in this narrative context with a singular event—the opening of the seventh seal—English
    idiom is best served by 'when.' This preserves the temporal force without sounding
    awkward.
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - broke open
  lexicon: BDAG
  rationale: ἀνοίγω means 'open.' 'Opened' is the natural rendering for opening a
    seal in this apocalyptic sequence. 'Broke open' is more interpretive and goes
    beyond the lexical value.
- source_word: σφραγῖδα
  chosen: seal
  alternatives:
  - sealed scroll mark
  lexicon: BDAG
  rationale: σφραγίς is standardly 'seal.' In Revelation's context this refers to
    one of the seals on the scroll, and 'seal' is both accurate and established English
    usage.
- source_word: τὴν ἑβδόμην
  chosen: the seventh
  lexicon: BDAG
  rationale: The adjective is attributive and specifies the ordinal number of the
    seal. 'The seventh' is the straightforward rendering.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - there came to be
  - it happened
  lexicon: BDAG
  rationale: 'γίνομαι here introduces the occurrence of a state: silence came about.
    English idiom prefers existential ''there was'' rather than the more wooden ''it
    happened'' or ''there came to be.'''
- source_word: σιγὴ
  chosen: silence
  alternatives:
  - quiet
  - stillness
  lexicon: BDAG
  rationale: σιγή denotes silence or hush. 'Silence' best preserves the solemn, dramatic
    force of the scene; 'quiet' is weaker and 'stillness' slightly more interpretive.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός here refers to the heavenly realm, not the physical sky. English
    idiom in biblical context is 'in heaven.' The article is not normally reproduced
    in English here.
- source_word: ὡς
  chosen: for about
  alternatives:
  - about
  - approximately
  lexicon: BDAG
  rationale: With a measure of time, ὡς can mark approximation. Rendering the phrase
    as 'for about' captures both duration and approximation in natural English.
- source_word: ἡμιώριον
  chosen: half an hour
  alternatives:
  - a half hour
  lexicon: BDAG
  rationale: ἡμιώριον denotes a half-hour period. 'Half an hour' is standard modern
    English.
