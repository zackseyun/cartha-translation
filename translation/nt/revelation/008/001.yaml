theological_decisions:
- issue: Referent of the implicit subject in ἤνοιξεν
  chosen_reading: Rendered as 'he opened,' leaving the antecedent implicit but naturally
    referring to the Lamb from the preceding context.
  alternative_readings:
  - Expanded interpretation such as 'the Lamb opened'
  rationale: The Greek verb has an implicit third-person singular subject. English
    requires an expressed subject, and 'he' preserves the discourse flow without importing
    an unnecessary explicit identification into the verse itself. The antecedent is
    contextually clear from Revelation 6–8.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
