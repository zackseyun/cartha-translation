id: REV.8.11
reference: Revelation 8:11
source:
  edition: SBLGNT
  text: καὶ τὸ ὄνομα τοῦ ἀστέρος λέγεται· ⸀ὁ Ἄψινθος. καὶ ἐγένετο τὸ τρίτον τῶν ὑδάτων
    εἰς ἄψινθον, καὶ πολλοὶ τῶν ἀνθρώπων ἀπέθανον ἐκ τῶν ὑδάτων, ὅτι ἐπικράνθησαν.
translation:
  text: And the name of the star is called Wormwood. And a third of the waters became
    wormwood, and many of the people died from the waters, because they had been made
    bitter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Absinthe'; the Greek Ἄψινθος/ἄψινθον refers to wormwood, a bitter plant,
      and the repeated term links the star's name with the waters' bitterness.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be rendered more explicitly, 'because the waters had
      been made bitter.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄνομα
  chosen: name
  lexicon: BDAG
  rationale: Standard rendering for the designation or name of the star.
- source_word: ἀστέρος
  chosen: star
  lexicon: BDAG
  rationale: Direct and natural rendering of ἀστήρ in apocalyptic imagery.
- source_word: λέγεται
  chosen: is called
  alternatives:
  - is named
  - is said to be called
  lexicon: BDAG
  rationale: Present passive is naturally rendered 'is called'; this preserves the
    Greek idiom without over-literal awkwardness.
- source_word: Ἄψινθος / ἄψινθον
  chosen: Wormwood / wormwood
  alternatives:
  - Absinthe
  lexicon: BDAG
  rationale: As a proper name for the star, the capitalized transliteration/conventional
    plant-name 'Wormwood' is appropriate; as the substance/result in the waters, lowercase
    'wormwood' preserves the lexical link. 'Absinthe' is misleadingly modern and beverage-associated.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - turned into
  - came to be
  lexicon: BDAG
  rationale: 'In context, γίνομαι with εἰς expresses transformation/result: the waters
    became wormwood.'
- source_word: τὸ τρίτον τῶν ὑδάτων
  chosen: a third of the waters
  alternatives:
  - the third part of the waters
  lexicon: BDAG
  rationale: Idiomatic English for the partitive expression while preserving the quantitative
    force.
- source_word: εἰς ἄψινθον
  chosen: became wormwood
  alternatives:
  - became bitter like wormwood
  - turned into wormwood
  lexicon: BDAG
  rationale: The phrase indicates transformation into wormwood/bitter poison imagery.
    'Became wormwood' keeps the metaphor concrete and matches the named star.
- source_word: πολλοὶ τῶν ἀνθρώπων
  chosen: many of the people
  alternatives:
  - many people
  - many of mankind
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, not specifically males.
    'Many of the people' preserves the partitive sense of πολλοὶ τῶν.
- source_word: ἀπέθανον ἐκ τῶν ὑδάτων
  chosen: died from the waters
  alternatives:
  - died because of the waters
  - died from drinking the waters
  lexicon: BDAG
  rationale: ἐκ here marks source/cause. 'From the waters' is concise and faithful
    without adding 'drinking,' which is implied but not explicit.
- source_word: ὅτι ἐπικράνθησαν
  chosen: because they had been made bitter
  alternatives:
  - because they became bitter
  - because the waters were made bitter
  lexicon: BDAG
  rationale: The passive verb most naturally refers back to the waters, the nearest
    plural antecedent. English requires making that relation clear; 'had been made
    bitter' preserves the passive/resultative sense.
