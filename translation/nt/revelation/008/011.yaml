theological_decisions:
- issue: Referent of the passive verb ἐπικράνθησαν
  chosen_reading: The verb refers to the waters, not the people.
  alternative_readings:
  - The verb refers to the people becoming embittered/sickened
  rationale: Grammatically, the nearest and most coherent antecedent is τῶν ὑδάτων.
    Contextually, the deaths occur because the waters were made bitter/poisonous.
    This is a contextual-exegetical decision rather than a doctrinally contested one.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax and context sufficiently favor one reading.
