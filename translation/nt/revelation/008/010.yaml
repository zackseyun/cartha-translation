theological_decisions:
- issue: Referent of the falling star
  chosen_reading: Rendered literally as 'a great star' without interpreting it as
    an angelic being, meteor, or symbolic power.
  alternative_readings:
  - an angelic being
  - a meteor-like object
  - a symbolic ruler or power
  rationale: The verse itself presents the image as a star and does not explicitly
    identify its symbolic referent until the following context develops the vision.
    To preserve theological tension and avoid importing an interpretation, the translation
    remains literal here.
  doctrine_reference: Preserve theological tension rather than resolve it.
