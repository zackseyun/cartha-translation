id: REV.8.10
reference: Revelation 8:10
source:
  edition: SBLGNT
  text: Καὶ ὁ τρίτος ἄγγελος ἐσάλπισεν· καὶ ἔπεσεν ἐκ τοῦ οὐρανοῦ ἀστὴρ μέγας καιόμενος
    ὡς λαμπάς, καὶ ἔπεσεν ἐπὶ τὸ τρίτον τῶν ποταμῶν καὶ ἐπὶ τὰς πηγὰς τῶν ὑδάτων.
translation:
  text: And the third angel sounded his trumpet, and a great star fell from heaven,
    burning like a torch, and it fell on a third of the rivers and on the springs
    of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek word can refer to heaven or the sky; 'from
      heaven' is retained here because it best fits the visionary, apocalyptic setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'burning like a lamp.' The Greek word can denote a torch or lamp; 'torch'
      better fits the image of a blazing falling star.
    reason: lexical_alternative
  - marker: c
    text: The 'star' is left untranslated as an image. Interpreters differ on whether
      it represents an angelic being, a meteor-like object, or a symbolic power.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: sounded his trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound or blow a trumpet. In English, 'sounded
    his trumpet' is natural and explicit, matching the apocalyptic sequence without
    awkwardness.
- source_word: ἀστὴρ μέγας
  chosen: a great star
  alternatives:
  - a large star
  lexicon: BDAG
  rationale: A straightforward rendering of the noun-adjective pair. 'Great' is idiomatic
    in English for something impressive or significant, not merely physically large.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: '''Heaven'' preserves the Greek οὐρανός and fits Revelation''s elevated,
    visionary register. ''Sky'' is possible in some contexts, but here the apocalyptic
    imagery favors ''heaven''.'
- source_word: καιόμενος ὡς λαμπάς
  chosen: burning like a torch
  alternatives:
  - blazing like a torch
  - burning like a lamp
  lexicon: BDAG
  rationale: καιόμενος denotes burning or being on fire; λαμπάς commonly refers to
    a torch rather than a household lamp. 'Burning like a torch' preserves the simile
    clearly and naturally.
- source_word: ἔπεσεν ... καὶ ἔπεσεν
  chosen: fell ... and it fell
  alternatives:
  - fell ... and came down upon
  lexicon: BDAG
  rationale: The Greek repeats ἔπεσεν, first for descent from heaven and then for
    impact upon earthly waters. Retaining the repetition reflects the source text's
    rhythm and emphasis.
- source_word: ἐπὶ τὸ τρίτον τῶν ποταμῶν
  chosen: on a third of the rivers
  alternatives:
  - upon the third of the rivers
  - on the third part of the rivers
  lexicon: BDAG
  rationale: In Revelation's trumpet judgments, τὸ τρίτον regularly denotes one-third.
    'A third of the rivers' is idiomatic modern English and preserves the quantitative
    force.
- source_word: πηγὰς τῶν ὑδάτων
  chosen: the springs of the waters
  alternatives:
  - the springs of water
  - the fountains of waters
  lexicon: BDAG
  rationale: πηγή means spring or fountain. 'Springs of the waters' stays close to
    the Greek genitive construction and preserves the solemn style of the passage,
    while remaining understandable.
