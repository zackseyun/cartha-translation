id: REV.2.3
reference: Revelation 2:3
source:
  edition: SBLGNT
  text: καὶ ὑπομονὴν ἔχεις, καὶ ἐβάστασας διὰ τὸ ὄνομά μου, καὶ ⸂οὐ κεκοπίακες⸃.
translation:
  text: And you have endurance, and you have borne up for my name, and you have not
    grown weary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of my name' or 'for the sake of my name.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''you have not become tired''; the clause may also be understood in
      relation to labor: ''you have not wearied from labor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομονὴν
  chosen: endurance
  alternatives:
  - patient endurance
  - perseverance
  - steadfastness
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under trial. 'Endurance' is concise,
    natural English and preserves the sense without overinterpreting the nuance as
    specifically passive patience or active perseverance.
- source_word: ἔχεις
  chosen: you have
  alternatives:
  - you possess
  lexicon: BDAG
  rationale: 'A straightforward present-tense rendering that preserves the direct
    commendation: the addressee presently has endurance.'
- source_word: ἐβάστασας
  chosen: you have borne up
  alternatives:
  - you bore
  - you have endured
  - you have carried
  lexicon: BDAG
  rationale: βαστάζω can mean bear, carry, or endure. Here, in commendation and followed
    by 'for my name,' it refers to having borne burdens or hardship. 'Have borne up'
    captures the aorist action in idiomatic English while distinguishing it from ὑπομονή
    and avoiding flattening both clauses into the same wording.
- source_word: διὰ τὸ ὄνομά μου
  chosen: for my name
  alternatives:
  - because of my name
  - for the sake of my name
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or purpose. 'For my
    name' is compact and preserves the biblical idiom of suffering on account of allegiance
    to Jesus' name; the fuller alternatives are possible but less direct.
- source_word: οὐ κεκοπίακες
  chosen: you have not grown weary
  alternatives:
  - you have not become tired
  - you have not wearied
  - you have not labored
  lexicon: BDAG
  rationale: κοπιάω can mean labor/toil or become weary depending on context. With
    the negation and in parallel with endurance, the sense is not merely that they
    have worked, but that they have not become exhausted or given out. The perfect
    tense is well represented by 'have not grown weary,' indicating a continuing state.
