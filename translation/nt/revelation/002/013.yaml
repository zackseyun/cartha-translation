id: REV.2.13
reference: Revelation 2:13
source:
  edition: SBLGNT
  text: ⸀Οἶδα ποῦ κατοικεῖς, ὅπου ὁ θρόνος τοῦ Σατανᾶ, καὶ κρατεῖς τὸ ὄνομά μου, καὶ
    οὐκ ἠρνήσω τὴν πίστιν μου ⸀καὶ ἐν ταῖς ⸀ἡμέραις Ἀντιπᾶς, ὁ μάρτυς μου, ὁ πιστός
    ⸀μου, ὃς ἀπεκτάνθη παρ’ ὑμῖν, ὅπου ὁ Σατανᾶς κατοικεῖ.
translation:
  text: I know where you live—where Satan’s throne is. Yet you hold fast my name,
    and you did not deny my faith, even in the days of Antipas, my witness, my faithful
    one, who was killed among you, where Satan lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faith in me' or 'my faithfulness.' The Greek phrase 'my faith' is compact
      and may be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Or 'my martyr.' The Greek word can mean 'witness,' and in contexts of suffering
      or death it can also carry the sense 'martyr.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: Straightforward first-person perfect with present sense; 'I know' is
    idiomatic and direct.
- source_word: κατοικεῖς
  chosen: you live
  alternatives:
  - you dwell
  lexicon: BDAG
  rationale: κατοικέω means to dwell/live in a place. 'You live' is natural modern
    English; 'dwell' is more formal but less readable.
- source_word: ὅπου ὁ θρόνος τοῦ Σατανᾶ
  chosen: where Satan’s throne is
  alternatives:
  - where the throne of Satan is
  lexicon: BDAG
  rationale: Genitive is naturally rendered possessively in English. Retains the stark
    apocalyptic imagery without interpretive expansion.
- source_word: κρατεῖς
  chosen: you hold fast
  alternatives:
  - you hold firmly
  - you keep holding
  lexicon: BDAG
  rationale: κρατέω here conveys firm adherence. 'Hold fast' preserves the sense of
    steadfast loyalty better than the flatter 'hold'.
- source_word: τὸ ὄνομά μου
  chosen: my name
  lexicon: BDAG
  rationale: In context 'name' carries allegiance/reputation/confession, but the text
    says 'name'; the theological force is preserved without paraphrase.
- source_word: οὐκ ἠρνήσω
  chosen: you did not deny
  alternatives:
  - you did not renounce
  lexicon: BDAG
  rationale: Aorist middle of ἀρνέομαι is well rendered 'deny.' 'Renounce' is possible
    but slightly more interpretive.
- source_word: τὴν πίστιν μου
  chosen: my faith
  alternatives:
  - faith in me
  - my faithfulness
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' The genitive pronoun μου can
    be taken in more than one way; the main text preserves the Greek's compact wording
    as 'my faith,' with alternatives footnoted rather than resolving the ambiguity.
- source_word: ἐν ταῖς ἡμέραις Ἀντιπᾶς
  chosen: in the days of Antipas
  alternatives:
  - in Antipas’s days
  - in the days when Antipas lived
  lexicon: BDAG
  rationale: This is the most literal and idiomatic rendering of the temporal phrase.
- source_word: ὁ μάρτυς μου
  chosen: my witness
  alternatives:
  - my martyr
  lexicon: BDAG
  rationale: μάρτυς fundamentally means 'witness.' Given English readers may hear
    'martyr' anachronistically as a technical term, 'witness' is preferred in the
    main text, while the martyr sense is worth preserving in a footnote because of
    the context of being killed.
- source_word: ὁ πιστός μου
  chosen: my faithful one
  alternatives:
  - my faithful witness
  - my faithful servant
  lexicon: BDAG
  rationale: πιστός means faithful/trustworthy. Rendering it separately as 'my faithful
    one' preserves the appositional structure and avoids collapsing it into the previous
    noun.
- source_word: ἀπεκτάνθη
  chosen: was killed
  alternatives:
  - was put to death
  - was murdered
  lexicon: BDAG
  rationale: Passive aorist of ἀποκτείνω. 'Was killed' is clear and direct; 'murdered'
    adds a legal/moral nuance not explicit in the verb itself.
- source_word: παρ’ ὑμῖν
  chosen: among you
  alternatives:
  - by you
  - in your midst
  lexicon: BDAG
  rationale: παρά with dative can mean 'with, among, in the presence of.' Here 'among
    you' best fits the context without implying the church itself killed Antipas.
    'By you' would be misleading.
- source_word: ὅπου ὁ Σατανᾶς κατοικεῖ
  chosen: where Satan lives
  alternatives:
  - where Satan dwells
  lexicon: BDAG
  rationale: Repeats the κατοικέω idea from earlier in the verse. 'Lives' keeps the
    repetition intelligible in modern English.
