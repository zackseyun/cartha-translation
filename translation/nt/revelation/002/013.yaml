theological_decisions:
- issue: Meaning of τὴν πίστιν μου
  chosen_reading: Rendered literally as 'my faith' in the main text
  alternative_readings:
  - faith in me
  - my faithfulness
  rationale: The phrase is genuinely ambiguous. In keeping with the doctrine's instruction
    to preserve theological tension rather than resolve it, the main text keeps the
    compact literal form while footnoting plausible interpretive alternatives.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table
    for πίστις'
- issue: Rendering of μάρτυς in a context of death
  chosen_reading: Main text 'witness'
  alternative_readings:
  - martyr
  rationale: The lexical base meaning is 'witness,' and the context already states
    that Antipas was killed. Using 'witness' avoids importing a later technical sense
    into the main text, while a footnote preserves 'martyr' as a contextually meaningful
    alternative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #6'
