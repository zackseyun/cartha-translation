id: REV.2.14
reference: Revelation 2:14
source:
  edition: SBLGNT
  text: ἀλλὰ ἔχω κατὰ σοῦ ὀλίγα, ὅτι ἔχεις ἐκεῖ κρατοῦντας τὴν διδαχὴν Βαλαάμ, ὃς
    ⸂ἐδίδασκεν τῷ⸃ Βαλὰκ βαλεῖν σκάνδαλον ἐνώπιον τῶν υἱῶν Ἰσραήλ, ⸀φαγεῖν εἰδωλόθυτα
    καὶ πορνεῦσαι·
translation:
  text: 'But I have a few things against you: you have there some who hold to the
    teaching of Balaam, who was teaching Balak to put a stumbling block before the
    sons of Israel, to eat food sacrificed to idols and to commit sexual immorality.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Greek reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  chosen: a few things
  alternatives:
  - a few
  - a little
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally after ἔχω κατὰ σοῦ; in idiomatic
    English 'a few things against you' makes the implied object explicit and natural
    without adding beyond the sense.
- source_word: κρατοῦντας
  chosen: hold to
  alternatives:
  - hold fast to
  - cling to
  lexicon: BDAG
  rationale: Present participle of κρατέω here conveys adherence to a teaching rather
    than physical seizure. 'Hold to' is clear modern English and preserves the sense
    of maintaining allegiance.
- source_word: διδαχὴν
  chosen: teaching
  alternatives:
  - doctrine
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural modern rendering and avoids unnecessary
    ecclesiastical jargon while preserving the content of what is being taught.'
- source_word: Βαλαάμ / Βαλὰκ
  chosen: Balaam / Balak
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: ἐδίδασκεν τῷ Βαλὰκ
  chosen: was teaching Balak
  alternatives:
  - taught Balak
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or characteristic action in the narrative
    recollection; 'was teaching' preserves that aspect better than simple past.
- source_word: βαλεῖν σκάνδαλον
  chosen: to put a stumbling block
  alternatives:
  - to cast a stumbling block
  - to set a trap
  lexicon: BDAG
  rationale: βάλλω + σκάνδαλον is rendered idiomatically in English as 'put a stumbling
    block.' This preserves the metaphor of causing moral/spiritual downfall without
    over-paraphrasing.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and fits the idiom ''put a stumbling block before''
    in English.'
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: BDAG
  rationale: The Greek is explicitly 'sons.' Per gender-accurate philosophy, the masculine
    form is preserved rather than neutralized to 'Israelites,' especially since this
    is a conventional biblical designation.
- source_word: φαγεῖν εἰδωλόθυτα
  chosen: to eat food sacrificed to idols
  alternatives:
  - to eat idol sacrifices
  - to eat things sacrificed to idols
  lexicon: BDAG
  rationale: εἰδωλόθυτα refers to food/meat offered to idols. 'Food sacrificed to
    idols' is clear contemporary English and captures the cultic sense.
- source_word: πορνεῦσαι
  chosen: to commit sexual immorality
  alternatives:
  - to practice sexual immorality
  - to fornicate
  lexicon: BDAG
  rationale: πορνεύω broadly denotes illicit sexual conduct. 'Commit sexual immorality'
    is standard, accessible English that preserves the moral force without narrowing
    the term too specifically.
