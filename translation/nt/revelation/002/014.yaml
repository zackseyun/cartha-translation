theological_decisions:
- issue: Whether to render τῶν υἱῶν Ἰσραήλ with a gender-neutral expression
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The source text uses the masculine plural 'sons,' and the translation
    philosophy prefers gender-accurate renderings over neutralization unless context
    clearly demands otherwise. A more idiomatic neutral alternative is worth preserving
    in a footnote for readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Whether σκάνδαλον should be rendered literally or interpreted more dynamically
  chosen_reading: stumbling block
  alternative_readings:
  - trap
  - occasion for sin
  rationale: The literal metaphor is transparent in English and preserves the theological
    image of enticement into sin. More interpretive renderings risk resolving the
    metaphor beyond the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
