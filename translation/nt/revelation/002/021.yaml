theological_decisions:
- issue: Meaning of πορνεία in an apocalyptic rebuke context
  chosen_reading: Render concretely as 'sexual immorality' while allowing the immediate
    context to carry any metaphorical/idolatrous overtones.
  alternative_readings:
  - immorality
  - fornication
  - her prostitution
  rationale: The term can function literally or metaphorically in prophetic/apocalyptic
    discourse, but the default lexical sense is sexual immorality. Translating it
    concretely avoids importing a fully allegorized interpretation into the main text
    while remaining compatible with the broader symbolic context of Revelation 2.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
