id: REV.2.21
reference: Revelation 2:21
source:
  edition: SBLGNT
  text: καὶ ἔδωκα αὐτῇ χρόνον ἵνα μετανοήσῃ, καὶ οὐ θέλει μετανοῆσαι ἐκ τῆς πορνείας
    αὐτῆς.
translation:
  text: And I gave her time to repent, but she is not willing to repent of her sexual
    immorality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to repent from her sexual immorality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκα
  chosen: I gave
  alternatives:
  - I have given
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past in this context,
    referring to a completed act of granting opportunity.
- source_word: αὐτῇ
  chosen: her
  lexicon: BDAG
  rationale: Dative feminine singular refers to the woman symbolically called Jezebel
    in the immediate context; English indirect object 'her' is straightforward.
- source_word: χρόνον
  chosen: time
  alternatives:
  - an opportunity
  - a period of time
  lexicon: BDAG
  rationale: χρόνος denotes time or a span of time. 'Time' is the most natural and
    sufficiently precise English rendering here, implying a period allowed for repentance.
- source_word: ἵνα μετανοήσῃ
  chosen: to repent
  alternatives:
  - so that she might repent
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose. English idiom prefers
    'gave her time to repent' rather than the more wooden 'so that she might repent.'
- source_word: οὐ θέλει
  chosen: she is not willing
  alternatives:
  - she does not want
  - she refuses
  lexicon: BDAG
  rationale: θέλω here expresses volition rather than mere futurity. 'Is not willing'
    preserves the force of unwillingness without overinterpreting as an absolute act
    of refusal, though 'refuses' is contextually close.
- source_word: μετανοῆσαι
  chosen: to repent
  lexicon: BDAG
  rationale: Infinitive complements θέλει; repeating 'to repent' preserves the Greek
    emphasis.
- source_word: ἐκ τῆς πορνείας αὐτῆς
  chosen: of her sexual immorality
  alternatives:
  - from her sexual immorality
  - of her immorality
  lexicon: BDAG
  rationale: πορνεία commonly denotes sexual immorality. With μετανοέω, English idiom
    often uses 'repent of' even though Greek has ἐκ ('from/out of'). 'Sexual immorality'
    preserves the lexical specificity better than the broader 'immorality'.
