id: REV.2.5
reference: Revelation 2:5
source:
  edition: SBLGNT
  text: μνημόνευε οὖν πόθεν ⸀πέπτωκας, καὶ μετανόησον καὶ τὰ πρῶτα ἔργα ποίησον· εἰ
    δὲ μή, ἔρχομαί ⸀σοι, καὶ κινήσω τὴν λυχνίαν σου ἐκ τοῦ τόπου αὐτῆς, ἐὰν μὴ μετανοήσῃς.
translation:
  text: Therefore remember from where you have fallen, and repent, and do the works
    you did at first. But if not, I am coming to you, and I will remove your lampstand
    from its place, unless you repent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from what height you have fallen.' The Greek literally says 'from where
      you have fallen'; some take it as an implied metaphor of height.
    reason: lexical_alternative
  - marker: b
    text: The 'lampstand' is the image used for a church in Revelation 1:20.
    reason: cross_reference
lexical_decisions:
- source_word: μνημόνευε
  chosen: remember
  alternatives:
  - keep remembering
  - call to mind
  lexicon: BDAG
  rationale: Present imperative calls for ongoing recollection; 'remember' is idiomatic
    and sufficiently preserves the command without awkwardness.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the previous rebuke; 'therefore' preserves the logical
    connection more clearly than a weaker connective.
- source_word: πόθεν
  chosen: from where
  alternatives:
  - from what height
  - where
  lexicon: BDAG
  rationale: The adverb literally means 'from where/whence.' Some English versions
    interpret the metaphor as 'from what height,' but the Greek does not explicitly
    supply 'height,' so the more transparent rendering is preferred.
- source_word: πέπτωκας
  chosen: you have fallen
  alternatives:
  - you have fallen away
  lexicon: BDAG
  rationale: Perfect tense indicates a completed fall with present result. 'You have
    fallen' preserves the metaphor without importing the stronger theological sense
    of apostasy implied by 'fallen away.'
- source_word: μετανόησον
  chosen: repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: Standard imperative rendering in moral-spiritual contexts; concise and
    theologically established without being misleading here.
- source_word: τὰ πρῶτα ἔργα
  chosen: the works you did at first
  alternatives:
  - the first works
  - your former works
  lexicon: BDAG
  rationale: The phrase refers to the deeds characteristic of their earlier state.
    'The works you did at first' is natural English and clarifies the temporal force
    of πρῶτα.
- source_word: ποίησον
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: Simple imperative matching the broad semantic range of ποιέω in this
    context.
- source_word: εἰ δὲ μή
  chosen: But if not
  alternatives:
  - otherwise
  - but if you do not
  lexicon: BDAG
  rationale: Introduces the warning condition. 'But if not' keeps the abruptness and
    conditional force of the Greek.
- source_word: ἔρχομαί σοι
  chosen: I am coming to you
  alternatives:
  - I will come to you
  - I am coming against you
  lexicon: BDAG
  rationale: Present middle indicative can function futuristically, but 'I am coming
    to you' preserves the vivid immediacy of the Greek. 'Against you' is interpretive
    and not explicit in the text.
- source_word: κινήσω
  chosen: I will remove
  alternatives:
  - I will move
  - I will take away
  lexicon: BDAG
  rationale: Although κινέω literally means 'move,' in this judgment context with
    ἐκ τοῦ τόπου αὐτῆς the sense is effectively removal from position. 'Remove' communicates
    the force clearly in English.
- source_word: τὴν λυχνίαν σου
  chosen: your lampstand
  alternatives:
  - your lamp
  lexicon: BDAG
  rationale: λυχνία is 'lampstand,' not the lamp itself. In Revelation 1:20 lampstands
    symbolize churches, so the concrete image should be retained.
- source_word: ἐκ τοῦ τόπου αὐτῆς
  chosen: from its place
  alternatives:
  - out of its place
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase; 'from its place'
    is natural modern English while preserving the image.
- source_word: ἐὰν μὴ μετανοήσῃς
  chosen: unless you repent
  alternatives:
  - if you do not repent
  lexicon: BDAG
  rationale: This conditional clause is idiomatically rendered 'unless you repent,'
    which is concise and equivalent in force.
