theological_decisions:
- issue: Nature of the warning about the lampstand
  chosen_reading: Retain the symbolic image of removing the church's lampstand without
    explicating it as loss of salvation or merely loss of witness.
  alternative_readings:
  - loss of corporate witness
  - judgment on the church's existence/status
  - loss of salvation
  rationale: The immediate context in Revelation identifies lampstands as churches
    (Rev 1:20). The verse threatens judgment on the church's standing/place, but the
    text itself does not specify a systematic-theological conclusion about individual
    salvation. The translation therefore preserves the image and tension rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
