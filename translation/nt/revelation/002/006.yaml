theological_decisions:
- issue: Object of hatred
  chosen_reading: The text condemns the works of the Nicolaitans, not explicitly the
    Nicolaitans themselves.
  alternative_readings:
  - A looser rendering could imply hatred of the people as such.
  rationale: Because τὰ ἔργα is the direct object, the translation should make clear
    that the hated object is their works/deeds. This preserves the text's wording
    without importing a broader claim.
  doctrine_reference: Translation philosophy §1, §5
- issue: Speaker's alignment with the church's stance
  chosen_reading: Render κἀγὼ μισῶ as 'which I also hate.'
  alternative_readings:
  - which I too hate
  rationale: The verse presents the risen Jesus as sharing the church's rejection
    of these works. The translation should preserve this direct theological force
    without softening μισέω.
  doctrine_reference: Translation philosophy §1, §5
