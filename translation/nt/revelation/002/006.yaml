id: REV.2.6
reference: Revelation 2:6
source:
  edition: SBLGNT
  text: ἀλλὰ τοῦτο ἔχεις ὅτι μισεῖς τὰ ἔργα τῶν Νικολαϊτῶν, ἃ κἀγὼ μισῶ.
translation:
  text: 'But this you do have: you hate the works of the Nicolaitans, which I also
    hate.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deeds' instead of 'works.' The Greek term refers to actions or practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast with the preceding commendation/rebuke context; 'But'
    is the most natural concise adversative in English.
- source_word: τοῦτο ἔχεις
  chosen: this you do have
  alternatives:
  - you have this
  - this is to your credit
  lexicon: BDAG
  rationale: The idiom literally means 'you have this.' Rendering it as 'this you
    do have' preserves the emphatic fronting of τοῦτο while remaining readable. 'This
    is to your credit' is interpretive and slightly freer.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  - namely that
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what they 'have.' In English, a colon
    naturally introduces that content after 'this you do have' and avoids awkward
    repetition.
- source_word: μισεῖς
  chosen: you hate
  alternatives:
  - you detest
  lexicon: BDAG
  rationale: μισέω straightforwardly means 'hate.' The stronger English term should
    be retained rather than softened, especially since the same verb is used of Jesus
    in the clause that follows.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - what they do
  lexicon: BDAG
  rationale: ἔργα is best rendered 'works' here for lexical transparency and because
    the object of hatred is their actions/practices, not necessarily the people themselves.
    'Deeds' is possible but less consistent.
- source_word: τῶν Νικολαϊτῶν
  chosen: of the Nicolaitans
  alternatives:
  - of the Nikolaïtans
  lexicon: BDAG
  rationale: Proper group name is transliterated per translation philosophy. Standard
    English convention favors 'Nicolaitans.'
- source_word: ἃ
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun refers back to 'works,' so 'which' naturally
    introduces the relative clause in English.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  - I myself also
  lexicon: BDAG
  rationale: Contraction of καὶ ἐγώ means 'I also/too.' 'I also' is idiomatic and
    preserves the shared stance between speaker and church.
- source_word: μισῶ
  chosen: hate
  alternatives:
  - detest
  lexicon: BDAG
  rationale: Same verb as earlier μισεῖς; consistency is important in this verse.
    The repetition should be preserved.
