theological_decisions:
- issue: Referent of 'the angel of the church'
  chosen_reading: Retain 'angel' in the main text
  alternative_readings:
  - messenger
  rationale: The Greek ἄγγελος permits either reading, but Revelation's apocalyptic
    genre and repeated heavenly imagery favor 'angel.' Because the identity is debated
    and the ambiguity may matter interpretively, the alternative is preserved in a
    footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
