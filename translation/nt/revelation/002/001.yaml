id: REV.2.1
reference: Revelation 2:1
source:
  edition: SBLGNT
  text: Τῷ ἀγγέλῳ ⸀τῆς ἐν Ἐφέσῳ ἐκκλησίας γράψον· Τάδε λέγει ὁ κρατῶν τοὺς ἑπτὰ ἀστέρας
    ἐν τῇ δεξιᾷ αὐτοῦ, ὁ περιπατῶν ἐν μέσῳ τῶν ἑπτὰ λυχνιῶν τῶν χρυσῶν·
translation:
  text: 'To the angel of the church in Ephesus write: These things says the one who
    holds the seven stars in his right hand, who walks among the seven golden lampstands:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger' of the church in Ephesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The noun can mean either a heavenly angel or a human messenger. In Revelation's
    repeated formula 'to the angel of the church,' 'angel' is the more natural and
    traditional reading, and it preserves the apocalyptic setting. The alternative
    'messenger' is worth preserving because the referent is debated.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this Christian communal context, 'church' best communicates the established
    referent of ἐκκλησία while remaining natural English. 'Assembly' is lexically
    possible but less idiomatic here.
- source_word: γράψον
  chosen: write
  lexicon: BDAG
  rationale: Aorist imperative directly commanding John to write; simple imperative
    'write' is the clearest equivalent.
- source_word: Τάδε λέγει
  chosen: These things says
  alternatives:
  - This is what ... says
  - Thus says
  lexicon: BDAG
  rationale: This formula introduces a solemn prophetic declaration. 'These things
    says' stays close to the Greek structure and preserves the oracular tone. 'This
    is what ... says' is smoother English, and 'Thus says' is more traditional, but
    the chosen rendering balances form and readability.
- source_word: κρατῶν
  chosen: holds
  alternatives:
  - grasps
  - has firmly in hand
  lexicon: BDAG
  rationale: κρατέω here conveys firm possession/control. 'Holds' is natural English
    and adequately preserves the sense without overtranslating.
- source_word: δεξιᾷ
  chosen: right hand
  lexicon: BDAG
  rationale: Standard literal rendering; the phrase carries symbolic authority and
    protection, which are preserved by keeping the concrete image.
- source_word: περιπατῶν
  chosen: walks among
  alternatives:
  - walks in the midst of
  - moves among
  lexicon: BDAG
  rationale: Combined with ἐν μέσῳ, the sense is movement among/in the midst of the
    lampstands. 'Walks among' is idiomatic and preserves the vivid imagery.
- source_word: ἐν μέσῳ
  chosen: among
  alternatives:
  - in the midst of
  lexicon: BDAG
  rationale: '''Among'' is the most natural concise English equivalent here; ''in
    the midst of'' is more formal but not necessary in the main text.'
- source_word: λυχνιῶν
  chosen: lampstands
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: λυχνία refers to a lampstand rather than the lamp itself. 'Lampstands'
    is important for consistency with Revelation 1 and the imagery explained there.
- source_word: χρυσῶν
  chosen: golden
  alternatives:
  - of gold
  lexicon: BDAG
  rationale: Attributive adjective naturally rendered 'golden' in English; 'of gold'
    is possible but less smooth.
