id: REV.2.17
reference: Revelation 2:17
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις. τῷ νικῶντι δώσω ⸀αὐτῷ τοῦ μάννα τοῦ κεκρυμμένου, καὶ δώσω αὐτῷ ψῆφον λευκήν, καὶ ἐπὶ τὴν ψῆφον ὄνομα καινὸν γεγραμμένον ὃ οὐδεὶς οἶδεν εἰ μὴ ὁ λαμβάνων.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches. To the one who conquers I will give some of the hidden manna, and I will give him a white stone, and a new name written on it, which no one knows except the one who receives it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'white stone' may evoke a voting pebble, a token of acquittal, or an admission stone; the text itself does not specify which background is intended.
    reason: cultural_note
  - marker: c
    text: Or 'and on the stone a new name written'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  chosen: The one who has an ear
  alternatives:
  - Whoever has an ear
  - The one who has ears
  lexicon: BDAG
  rationale: The singular idiom is retained closely. English idiom prefers 'an ear' in this stock exhortation; 'whoever' is possible but the articular participle is more literally 'the one who has.'
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  lexicon: BDAG
  rationale: Aorist imperative is well represented by 'let him hear.' The masculine singular is preserved in line with the project's gender-accurate policy, while functioning generically.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: In Revelation's repeated formula this refers to the divine Spirit, but the Greek text says 'the Spirit,' not explicitly 'the Holy Spirit,' so the shorter form is preferred.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία in Revelation's address formula is best rendered by the established and contextually appropriate 'churches,' referring to the congregations addressed.
- source_word: τῷ νικῶντι
  chosen: To the one who conquers
  alternatives:
  - To the one who overcomes
  - To the victor
  lexicon: BDAG
  rationale: The present participle denotes the overcoming/conquering person. 'Conquers' is vivid and consistent with νικάω's victory sense in Revelation; 'overcomes' is a traditional alternative worth preserving.
- source_word: τοῦ μάννα τοῦ κεκρυμμένου
  chosen: some of the hidden manna
  alternatives:
  - the hidden manna
  - from the hidden manna
  lexicon: BDAG
  rationale: The genitive after δίδωμι naturally conveys giving some of a substance or share from it. 'Hidden manna' preserves the perfect participle's sense of manna that has been hidden/kept concealed.
- source_word: ψῆφον λευκήν
  chosen: a white stone
  alternatives:
  - a white pebble
  - a white voting stone
  lexicon: BDAG
  rationale: ψῆφος can denote a small stone used in voting or reckoning, but 'stone' is the clearest main-text rendering. The cultural possibilities are better noted in a footnote than over-specified in translation.
- source_word: ἐπὶ τὴν ψῆφον
  chosen: on the stone
  alternatives:
  - upon the stone
  lexicon: BDAG
  rationale: 'ἐπί with the accusative here is naturally rendered spatially as inscription placement: ''on the stone.'''
- source_word: ὄνομα καινὸν
  chosen: a new name
  alternatives:
  - a fresh name
  lexicon: BDAG
  rationale: καινός commonly denotes newness in kind or quality. 'New name' is idiomatic and preserves the theological resonance of transformed identity.
- source_word: γεγραμμένον
  chosen: written
  alternatives:
  - inscribed
  lexicon: BDAG
  rationale: The perfect participle indicates a completed inscription with abiding result. 'Written' is straightforward; 'inscribed' is possible but slightly more interpretive.
- source_word: ὃ οὐδεὶς οἶδεν εἰ μὴ ὁ λαμβάνων
  chosen: which no one knows except the one who receives it
  alternatives:
  - which no one knows except the receiver
  - which no one has known except the one receiving it
  lexicon: BDAG
  rationale: The relative clause modifies 'name.' English requires 'it' to clarify that what is received is the stone/name complex. 'Knows' best captures οἶδεν in idiomatic present force.
