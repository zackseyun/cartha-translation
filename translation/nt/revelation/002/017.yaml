theological_decisions:
- issue: Gendered singular forms in the exhortation and promise
  chosen_reading: 'Retain masculine singular in English: ''let him hear'' and ''I will give him'' while understanding the referent generically.'
  alternative_readings:
  - Use singular 'they' for generic reference
  - Repeat 'the one who' to avoid pronouns
  rationale: The Greek uses grammatically masculine singular forms with representative force. Per the project's gender-accurate policy, the translation preserves that form rather than neutralizing it, while the surrounding phrasing makes the generic scope clear.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Interpretation of ψῆφος λευκή
  chosen_reading: Render minimally as 'a white stone' without deciding among proposed symbolic backgrounds.
  alternative_readings:
  - Acquittal token
  - Banquet admission token
  - Voting pebble
  rationale: The verse does not explicitly explain the stone's cultural referent. To preserve theological and interpretive tension, the main text stays close to the Greek and a footnote notes the range of possible associations rather than resolving the symbol.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
revisions:
- timestamp: '2026-04-21T05:23:39Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/revelation/002/017.json
  category: awkward_english
  tier: 1
  from: and on the stone a new name written
  to: and a new name written on it
  rationale: The current phrasing directly mimics the Greek word order (καὶ ἐπὶ τὴν ψῆφον ὄνομα...), which results in a verbless clause that is grammatically strained in English. While the meaning is discernible, the syntax is awkward. Rephrasing to 'and a new name written on it' clarifies that 'a new name' is the second object of the implied verb 'give', parallel to 'a white stone'. This improves readability and flow by using a more natural English word order and a pronoun ('it') to refer back to the stone, without altering the essential meaning.
