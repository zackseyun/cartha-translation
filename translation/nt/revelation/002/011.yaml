id: REV.2.11
reference: Revelation 2:11
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις. ὁ νικῶν οὐ μὴ ἀδικηθῇ
    ἐκ τοῦ θανάτου τοῦ δευτέρου.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
    The one who conquers will certainly not be harmed by the second death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will certainly not be hurt by the second death'; more literally, 'will
      certainly not be harmed from/by the second death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  chosen: The one who has an ear
  alternatives:
  - Whoever has an ear
  - Anyone who has an ear
  lexicon: BDAG
  rationale: The articular participle is rendered with a singular representative expression.
    Although Greek has singular 'ear,' English idiom often uses the same in this formulaic
    saying. 'The one who' preserves the formal structure better than the more idiomatic
    'whoever.'
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  lexicon: BDAG
  rationale: Aorist imperative, third singular. 'Let him hear' preserves the exhortatory
    force and the traditional apocalyptic formula. The masculine pronoun reflects
    the grammatically masculine singular representative construction, in line with
    the gender-accurate policy.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Introduces the content of what the Spirit says; simple 'what' is natural
    and accurate.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated message formula to the churches, the referent
    is best understood as the Holy Spirit. Capitalization in English signals this
    likely personal divine referent without altering the lexical sense.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  lexicon: BDAG
  rationale: Present indicative in a timeless/repeated proclamation formula. English
    simple present is the most natural equivalent.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία can mean 'assembly,' but in Revelation 2–3 it clearly refers
    to the congregations addressed. 'Churches' is the clearest contextual rendering.
- source_word: ὁ νικῶν
  chosen: The one who conquers
  alternatives:
  - The one who overcomes
  - The victor
  lexicon: BDAG
  rationale: The present articular participle denotes the one characterized by overcoming.
    'Conquers' is vivid and natural; 'overcomes' is a viable traditional alternative
    preserved in a footnote because of its prominence in Revelation translation tradition.
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will never
  - shall by no means
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is an emphatic negation. 'Will certainly not'
    conveys strong denial in readable modern English without archaic phrasing.
- source_word: ἀδικηθῇ
  chosen: be harmed
  alternatives:
  - be hurt
  - be wronged
  lexicon: BDAG
  rationale: Passive of ἀδικέω can mean to be harmed, injured, or wronged. In the
    context of the second death, 'be harmed' best communicates actual adverse effect
    rather than merely legal injustice. 'Be hurt' is possible but weaker; 'be wronged'
    sounds too forensic here.
- source_word: ἐκ τοῦ θανάτου τοῦ δευτέρου
  chosen: by the second death
  alternatives:
  - from the second death
  lexicon: BDAG
  rationale: 'With passive ἀδικέω, ἐκ marks source or agency-like relation: the conqueror
    will not be harmed by what proceeds from the second death. ''By the second death''
    is more idiomatic in English than ''from the second death'' while preserving the
    sense.'
- source_word: τοῦ θανάτου τοῦ δευτέρου
  chosen: the second death
  lexicon: BDAG
  rationale: Standard literal rendering of the apocalyptic expression; it should remain
    untranslated beyond normal English because of its theological significance within
    Revelation.
