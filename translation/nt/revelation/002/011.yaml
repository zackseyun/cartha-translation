theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: the Holy Spirit speaking to the churches
  alternative_readings:
  - the prophetic Spirit more generally
  rationale: Within Revelation's repeated refrain, 'the Spirit' functions as a divine
    speaker addressing the churches. Capitalizing 'Spirit' reflects this likely referent
    while not overtranslating the Greek noun itself.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of representative masculine forms
  chosen_reading: retain singular masculine in 'let him hear' while using representative
    'the one who' constructions
  alternative_readings:
  - gender-neutral recasting such as 'let them hear'
  rationale: The Greek uses grammatically masculine singular participles and imperative
    with representative force. Per the gender-accurate policy, the translation preserves
    this rather than neutralizing it, while still making the representative sense
    clear.
  doctrine_reference: Translation philosophy §4
- issue: Meaning of 'the second death'
  chosen_reading: preserve the expression without interpretive expansion
  alternative_readings:
  - explicitly glossing it as eternal condemnation or final judgment
  rationale: The phrase is theologically weighty and later explained within Revelation
    itself. The translation should not import a fuller doctrinal paraphrase into the
    verse.
  doctrine_reference: Translation philosophy §3
