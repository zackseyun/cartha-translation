id: REV.2.16
reference: Revelation 2:16
source:
  edition: SBLGNT
  text: μετανόησον οὖν· εἰ δὲ μή, ἔρχομαί σοι ταχύ, καὶ πολεμήσω μετ’ αὐτῶν ἐν τῇ
    ῥομφαίᾳ τοῦ στόματός μου.
translation:
  text: Therefore repent. But if not, I am coming to you quickly, and I will make
    war against them with the sword of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''with them''; here the sense is adversative: ''against them.'''
    reason: lexical_alternative
  - marker: b
    text: The 'sword of my mouth' is an apocalyptic image for Christ's judicial word
      or pronouncement of judgment.
    reason: cross_reference
lexical_decisions:
- source_word: μετανόησον
  chosen: repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: Aorist active imperative, calling for decisive repentance. 'Repent' is
    the standard concise English equivalent and preserves the moral-spiritual force
    better than the weaker 'change your mind.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding rebuke. 'Therefore' best preserves
    the logical connection and solemn tone.
- source_word: εἰ δὲ μή
  chosen: but if not
  alternatives:
  - otherwise
  - if not
  lexicon: BDAG
  rationale: Conditional warning formula. 'But if not' reflects both δέ and μή and
    keeps the sharp contrast explicit.
- source_word: ἔρχομαί σοι
  chosen: I am coming to you
  alternatives:
  - I am coming against you
  - I will come to you
  lexicon: BDAG
  rationale: Present middle indicative with imminent force. 'I am coming to you' is
    the plain sense; the hostile nuance is supplied by the following clause about
    making war, so it need not be imported here.
- source_word: ταχύ
  chosen: quickly
  alternatives:
  - soon
  - swiftly
  lexicon: BDAG
  rationale: Conveys nearness and speed. 'Quickly' preserves the adverb's force without
    over-specifying whether the emphasis is temporal imminence or suddenness.
- source_word: πολεμήσω
  chosen: I will make war against
  alternatives:
  - I will fight against
  - I will wage war against
  lexicon: BDAG
  rationale: Future active indicative of πολεμέω. 'Make war against' preserves the
    martial severity more strongly than the milder 'fight against.'
- source_word: μετ’ αὐτῶν
  chosen: against them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: 'Although μετά with genitive commonly means ''with,'' in this context
    after πολεμήσω the idiomatic sense is adversative: Christ will wage war against
    the offenders. Rendering ''with them'' in English could sound allied rather than
    hostile.'
- source_word: ἐν τῇ ῥομφαίᾳ
  chosen: with the sword
  alternatives:
  - by the sword
  - by means of the sword
  lexicon: BDAG
  rationale: Instrumental sense. 'With the sword' is natural English and preserves
    the imagery of the means by which judgment is executed.
- source_word: ῥομφαίᾳ
  chosen: sword
  alternatives:
  - large sword
  - broadsword
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword, but 'sword' is the established and sufficiently
    accurate rendering in this apocalyptic image; more specific terms risk sounding
    interpretively embellished.
- source_word: τοῦ στόματός μου
  chosen: of my mouth
  alternatives:
  - from my mouth
  lexicon: BDAG
  rationale: The genitive is most naturally rendered literally here, preserving the
    established Johannine image of the judicial sword associated with Christ's mouth.
    'From my mouth' is interpretive and less formally aligned with the Greek wording.
