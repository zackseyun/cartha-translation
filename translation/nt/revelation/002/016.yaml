theological_decisions:
- issue: Nature of Christ's threatened action toward the church and the false teachers
  chosen_reading: The warning distinguishes Christ's coming 'to you' from his making
    war 'against them,' preserving both corporate address and targeted judgment.
  alternative_readings:
  - Christ comes against the whole church without distinction
  - Christ comes only against the false teachers and not the church at all
  rationale: The Greek addresses the church singularly ('to you') but specifies hostile
    action toward 'them.' The translation keeps both elements without collapsing the
    tension or resolving ecclesiological implications beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Instrument of judgment in apocalyptic imagery
  chosen_reading: The 'sword of my mouth' is retained as metaphorical-apocalyptic
    imagery rather than paraphrased as merely 'my word.'
  alternative_readings:
  - my word
  - the power of my speech
  rationale: The source text uses vivid imagery already established in Revelation.
    Retaining the metaphor avoids flattening the theological and literary force of
    the passage.
  doctrine_reference: Original-language primacy over translation tradition; readable
    modern English without flattening theological weight.
