id: REV.2.24
reference: Revelation 2:24
source:
  edition: SBLGNT
  text: ὑμῖν δὲ λέγω τοῖς λοιποῖς τοῖς ἐν Θυατείροις, ὅσοι οὐκ ἔχουσιν τὴν διδαχὴν
    ταύτην, οἵτινες οὐκ ἔγνωσαν τὰ βαθέα τοῦ Σατανᾶ, ὡς λέγουσιν, οὐ βάλλω ἐφ’ ὑμᾶς
    ἄλλο βάρος·
translation:
  text: 'But to the rest of you in Thyatira I say: all who do not hold this teaching,
    who have not known the deep things of Satan, as they call them—I am not laying
    any other burden on you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the depths of Satan.' The Greek expression may echo a claim to possessing
      'deep' spiritual insight, which John rejects.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς λοιποῖς
  chosen: the rest of you
  alternatives:
  - the others
  - the remaining ones
  lexicon: BDAG
  rationale: λοιποί refers to the remaining members of the church distinct from those
    following Jezebel's teaching. 'The rest of you' is idiomatic English and preserves
    the contrast.
- source_word: ἐν Θυατείροις
  chosen: in Thyatira
  rationale: Place name transliterated by standard convention per translation philosophy.
- source_word: ἔχουσιν τὴν διδαχὴν ταύτην
  chosen: hold this teaching
  alternatives:
  - have this teaching
  - follow this teaching
  lexicon: BDAG
  rationale: ἔχω with διδαχή here means to possess/adopt/maintain a teaching. 'Hold
    this teaching' captures adherence better than the wooden 'have' without over-paraphrasing
    to 'follow'.
- source_word: οἵτινες οὐκ ἔγνωσαν
  chosen: who have not known
  alternatives:
  - who did not know
  - who have not come to know
  lexicon: BDAG
  rationale: Aorist ἔγνωσαν can be rendered simply in English as 'have not known'
    in this relative description, conveying that they have not entered into such knowledge/experience.
- source_word: τὰ βαθέα τοῦ Σατανᾶ
  chosen: the deep things of Satan
  alternatives:
  - the depths of Satan
  - Satan's deep things
  lexicon: BDAG
  rationale: βαθέα literally means 'deep things/depths.' 'Deep things of Satan' is
    a transparent rendering that preserves the likely ironic echo of claims to profound
    spiritual insight.
- source_word: ὡς λέγουσιν
  chosen: as they call them
  alternatives:
  - as they say
  - as they call it
  lexicon: BDAG
  rationale: The plural verb with the neuter plural object implied from βαθέα is best
    made explicit in English as 'as they call them,' clarifying that this is the label
    used by the proponents/opponents being referenced.
- source_word: οὐ βάλλω ἐφ’ ὑμᾶς ἄλλο βάρος
  chosen: I am not laying any other burden on you
  alternatives:
  - I place no other burden on you
  - I cast no other burden upon you
  lexicon: BDAG
  rationale: βάλλω with ἐπί + accusative is idiomatically 'lay upon.' 'Burden' preserves
    βάρος and echoes the sense of an imposed obligation without archaic diction.
