theological_decisions:
- issue: Referent and force of 'the deep things of Satan, as they call them'
  chosen_reading: Render the phrase straightforwardly as an ironic or reported designation
    without resolving whether John is quoting the false teachers' self-description
    or a sarcastic counter-label.
  alternative_readings:
  - the false teachers called their doctrine 'deep things' and John identifies its
    true source as Satan
  - John sarcastically reports the slogan as 'the deep things of Satan'
  rationale: The Greek permits a compressed, polemical expression. The translation
    preserves the ambiguity and rhetorical force rather than specifying the exact
    speaker's intent beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
