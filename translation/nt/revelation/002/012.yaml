theological_decisions:
- issue: Identity of the 'angel' of the church
  chosen_reading: Retain 'angel' in the main text without specifying whether the referent
    is heavenly or human.
  alternative_readings:
  - human messenger
  - church leader/bishop
  - heavenly representative
  rationale: The Greek term ἄγγελος permits more than one interpretive option, and
    the verse itself does not resolve the question. Preserving the lexical form in
    translation maintains the text's ambiguity rather than importing a specific ecclesiological
    reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
