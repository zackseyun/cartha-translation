id: REV.2.27
reference: Revelation 2:27
source:
  edition: SBLGNT
  text: καὶ ποιμανεῖ αὐτοὺς ἐν ῥάβδῳ σιδηρᾷ ὡς τὰ σκεύη τὰ κεραμικὰ ⸀συντρίβεται,
translation:
  text: and he will shepherd them with an iron rod, as clay vessels are shattered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will rule them with an iron rod.' The verb literally means 'to shepherd,'
      but in this Psalm 2 allusion it also carries the sense of royal rule.
    reason: alternative_reading
  - marker: b
    text: An allusion to Psalm 2:9, where the nations are broken like pottery.
    reason: cross_reference
lexical_decisions:
- source_word: ποιμανεῖ
  chosen: will shepherd
  alternatives:
  - will rule
  - will tend as a shepherd
  lexicon: BDAG
  rationale: The verb ποιμαίνω literally denotes shepherding/pasturing. Although in
    this Psalm 2 allusion it carries royal authority, rendering it as 'shepherd' preserves
    the source image and theological tension between care and rule better than flattening
    it to 'rule.'
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  chosen: with an iron rod
  alternatives:
  - with a rod of iron
  lexicon: BDAG
  rationale: Idiomatic English prefers 'with an iron rod.' ῥάβδος can denote staff/rod/scepter,
    but 'rod' best matches the Psalm 2 background and the instrument of force implied
    here.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Either is possible; 'as' fits the comparative clause smoothly in elevated
    but readable English.
- source_word: τὰ σκεύη τὰ κεραμικὰ
  chosen: clay vessels
  alternatives:
  - pottery vessels
  - earthenware pots
  lexicon: BDAG
  rationale: σκεῦος is a general term for vessel/container, and κεραμικός specifies
    ceramic/pottery material. 'Clay vessels' is concise, natural, and preserves the
    fragility contrast.
- source_word: συντρίβεται
  chosen: are shattered
  alternatives:
  - are broken in pieces
  - is shattered
  lexicon: BDAG
  rationale: συντρίβω here conveys violent breaking. 'Are shattered' is vivid and
    natural. The singular verb with neuter plural subject reflects common Greek syntax;
    English regularizes to plural agreement.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Straightforward connective; retained to preserve the verse's linkage
    with the preceding promise.
