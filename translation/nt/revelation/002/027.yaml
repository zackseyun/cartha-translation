theological_decisions:
- issue: Royal-messianic allusion to Psalm 2:9 through ποιμανεῖ and iron-rod imagery
  chosen_reading: Preserve the shepherding metaphor in the main text while allowing
    the coercive royal sense to remain implicit in context.
  alternative_readings:
  - Translate ποιμανεῖ as 'will rule' to foreground dominion
  rationale: The Greek uses ποιμαίνω, not a generic verb for ruling. Because the verse
    echoes Psalm 2 and combines pastoral and judicial imagery, the translation should
    preserve that tension rather than resolve it into mere political rule.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
