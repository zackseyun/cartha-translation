- issue: Meaning of πίστις in the virtue list
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The doctrine excerpt sets πίστις default as 'faith,' with alternatives
    preserved where contested. In this context the term may denote either trust in
    God/Messiah or reliability/faithfulness expressed in conduct. The main text keeps
    'faith' for consistency, while a footnote preserves 'faithfulness.'
