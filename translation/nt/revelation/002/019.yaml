id: REV.2.19
reference: Revelation 2:19
source:
  edition: SBLGNT
  text: Οἶδά σου τὰ ἔργα, καὶ τὴν ⸂ἀγάπην καὶ τὴν πίστιν⸃ καὶ τὴν διακονίαν καὶ τὴν
    ὑπομονήν σου, καὶ τὰ ἔργα σου τὰ ἔσχατα πλείονα τῶν πρώτων.
translation:
  text: I know your works, your love and faith and service and endurance, and that
    your last works are more than the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness.' The Greek word can denote either faith or faithfulness
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  chosen: I know
  alternatives:
  - I have known
  - I am aware of
  lexicon: BDAG
  rationale: οἶδα functions as a present with stative force ('know'). 'I know' is
    the natural English rendering in Revelation's repeated formula to the churches.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: ἔργα refers to concrete actions or deeds. 'Works' preserves the repeated
    term in this verse and aligns with Revelation's evaluative language about conduct.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine default, ἀγάπη is rendered 'love.' It denotes active love
    as a Christian virtue here.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith.' In this virtue list
    it could shade toward 'faithfulness,' but the default is retained in the main
    text and the alternative is preserved in a footnote to maintain the lexical-theological
    tension.
- source_word: διακονίαν
  chosen: service
  alternatives:
  - ministry
  lexicon: BDAG
  rationale: διακονία here denotes practical service or ministry. 'Service' is more
    accessible modern English and fits the list of virtues without importing formal
    office language.
- source_word: ὑπομονήν
  chosen: endurance
  alternatives:
  - patient endurance
  - steadfastness
  - perseverance
  lexicon: BDAG
  rationale: ὑπομονή in Revelation commonly conveys steadfast endurance under pressure.
    'Endurance' is concise and natural, while preserving the sense of persevering
    constancy.
- source_word: τὰ ἔργα σου τὰ ἔσχατα
  chosen: your last works
  alternatives:
  - your later works
  - your recent works
  lexicon: BDAG
  rationale: ἔσχατα here is temporal/comparative, contrasting later deeds with earlier
    ones. 'Last works' is slightly formal but preserves the Greek contrast with 'the
    first'; the following clause clarifies the comparison.
- source_word: πλείονα τῶν πρώτων
  chosen: are more than the first
  alternatives:
  - exceed the first
  - are greater than the first ones
  lexicon: BDAG
  rationale: πλείονα is comparative ('more, greater in number/extent'). The phrase
    means their later works surpass their earlier ones. 'Are more than the first'
    stays close to the Greek while remaining readable.
