theological_decisions:
- issue: Meaning of 'your first love'
  chosen_reading: Rendered literally as 'your first love' without specifying whether
    it refers primarily to love for Christ, love for fellow believers, or both.
  alternative_readings:
  - your love for me at first
  - the love you had at first
  - your former love
  rationale: The Greek phrase is concise and contextually open. In keeping with the
    doctrine's instruction to preserve theological tension rather than resolve it,
    the translation avoids narrowing the referent beyond what the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
