id: REV.2.4
reference: Revelation 2:4
source:
  edition: SBLGNT
  text: ἀλλὰ ἔχω κατὰ σοῦ ὅτι τὴν ἀγάπην σου τὴν πρώτην ἀφῆκες.
translation:
  text: 'But I have this against you: you have abandoned your first love.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have left your first love.' The phrase may refer to the love they
      had at first, whether toward the Lord, toward one another, or both.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Adversative conjunction marking a sharp contrast with the preceding commendation.
    'But' is the most natural modern English equivalent.
- source_word: ἔχω κατὰ σοῦ
  chosen: I have this against you
  alternatives:
  - I hold this against you
  - I have against you
  lexicon: BDAG
  rationale: The idiom ἔχω κατά + genitive expresses having a charge or complaint
    against someone. 'I have this against you' is clear, idiomatic English and preserves
    the judicial/reproving force.
- source_word: ὅτι
  chosen: ': you have'
  alternatives:
  - that you have
  - because you have
  lexicon: BDAG
  rationale: Introduces the content of the complaint. In English, a colon smoothly
    represents the explanatory content after 'I have this against you,' while retaining
    the sense of 'that.' 'Because' would overinterpret the syntax.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine default, ἀγάπη is rendered 'love.' No contextual reason
    here to depart from the standard gloss.
- source_word: τὴν πρώτην
  chosen: first
  alternatives:
  - former
  - earlier
  lexicon: BDAG
  rationale: πρώτην most naturally means 'first.' In context it can imply earliest
    or original devotion, but 'first' preserves the Greek wording and theological
    openness better than interpretive expansions like 'former' or 'original.'
- source_word: ἀφῆκες
  chosen: have abandoned
  alternatives:
  - have left
  - have forsaken
  lexicon: BDAG
  rationale: Aorist of ἀφίημι here means to leave behind or abandon. 'Have abandoned'
    communicates a serious relinquishing of prior love in natural modern English.
    'Have left' is possible but weaker; 'have forsaken' is weighty but less contemporary.
