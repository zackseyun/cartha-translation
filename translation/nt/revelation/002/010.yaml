theological_decisions:
- issue: Meaning of πειρασθῆτε in a context involving the devil and persecution
  chosen_reading: tested
  alternative_readings:
  - tempted
  - tried
  rationale: The immediate context is imprisonment and suffering that prove believers'
    faithfulness. Rendering as 'tested' preserves the experiential and refining sense
    without over-reading the devil's role as merely internal temptation. The lexical
    alternative remains possible and is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Force of ἄχρι θανάτου
  chosen_reading: until death
  alternative_readings:
  - to the point of death
  - even if it means death
  rationale: The phrase naturally calls for faithfulness maintained up to death and
    likely includes martyrdom as a real possibility. 'Until death' keeps the wording
    close to the Greek while not narrowing it only to martyrdom; the stronger interpretive
    nuance is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
