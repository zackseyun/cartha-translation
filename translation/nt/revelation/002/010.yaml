id: REV.2.10
reference: Revelation 2:10
source:
  edition: SBLGNT
  text: ⸀μηδὲν φοβοῦ ἃ μέλλεις ⸀πάσχειν. ⸀ἰδοὺ μέλλει ⸀βάλλειν ὁ διάβολος ἐξ ὑμῶν
    εἰς φυλακὴν ἵνα πειρασθῆτε, καὶ ⸀ἕξετε θλῖψιν ἡμερῶν δέκα. γίνου πιστὸς ἄχρι θανάτου,
    καὶ δώσω σοι τὸν στέφανον τῆς ζωῆς.
translation:
  text: Do not fear what you are about to suffer. Look, the devil is about to throw
    some of you into prison so that you may be tested, and you will have tribulation
    for ten days. Be faithful until death, and I will give you the crown of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you may be tempted' or 'so that you may be tried'; the Greek
      verb can denote testing, trial, or temptation depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Until death'' can also mean ''even to the point of death,'' implying
      faithfulness even if martyrdom is required.'
    reason: alternative_reading
  - marker: c
    text: The Greek word for 'crown' (stephanos) refers to a victor's wreath or award,
      not a royal diadem.
    reason: cultural_note
lexical_decisions:
- source_word: μηδὲν φοβοῦ
  chosen: Do not fear
  alternatives:
  - Fear nothing
  lexicon: BDAG
  rationale: Imperative with μηδέν gives a prohibition of fear. 'Do not fear' is idiomatic
    modern English; 'Fear nothing' is more formal but slightly stiffer.
- source_word: ἃ μέλλεις πάσχειν
  chosen: what you are about to suffer
  alternatives:
  - the things you are about to suffer
  - what you are going to suffer
  lexicon: BDAG
  rationale: μέλλω + infinitive marks imminence; πάσχειν is 'to suffer/undergo.' 'What
    you are about to suffer' preserves both the object sense of ἃ and the near-future
    force.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Discourse particle drawing attention to what follows. 'Look' is readable
    modern English and retains the force better than archaic 'Behold.'
- source_word: μέλλει βάλλειν
  chosen: is about to throw
  alternatives:
  - is going to throw
  - is about to cast
  lexicon: BDAG
  rationale: Again μέλλω indicates imminence. βάλλω literally means 'throw/cast';
    'throw' is natural English here, especially with imprisonment as the result.
- source_word: ὁ διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος functions as the personal supernatural adversary,
    so the established title 'the devil' is appropriate rather than the more generic
    lexical sense 'slanderer.'
- source_word: ἐξ ὑμῶν
  chosen: some of you
  alternatives:
  - from among you
  lexicon: BDAG
  rationale: The preposition with the plural pronoun indicates a subset taken from
    the group. English idiom prefers 'some of you' over the more wooden 'from among
    you.'
- source_word: εἰς φυλακήν
  chosen: into prison
  alternatives:
  - into jail
  lexicon: BDAG
  rationale: φυλακή here denotes imprisonment/custody. 'Prison' better fits the register
    and gravity of the passage.
- source_word: ἵνα πειρασθῆτε
  chosen: so that you may be tested
  alternatives:
  - so that you may be tried
  - so that you may be tempted
  lexicon: BDAG
  rationale: πειράζω can mean test/try or tempt. Given the context of persecution
    refining faithfulness, 'tested' best captures the intended result without implying
    God morally solicits evil. The alternative 'tempted' is lexically possible and
    worth preserving in a footnote.
- source_word: ἕξετε θλῖψιν
  chosen: you will have tribulation
  alternatives:
  - you will have affliction
  - you will suffer distress
  lexicon: BDAG
  rationale: θλῖψις is a weighty term in Revelation for oppressive suffering. 'Tribulation'
    preserves that theological resonance better than the flatter 'trouble,' while
    remaining understandable.
- source_word: ἡμερῶν δέκα
  chosen: for ten days
  alternatives:
  - ten days
  lexicon: BDAG
  rationale: Genitive of extent/duration is naturally rendered 'for ten days' in English.
- source_word: γίνου πιστός
  chosen: Be faithful
  alternatives:
  - Become faithful
  - Keep being faithful
  lexicon: BDAG
  rationale: Present middle imperative of γίνομαι with predicate adjective can carry
    the sense of entering and continuing in a state. In context, 'Be faithful' is
    concise and idiomatic, encompassing steadfast continuance.
- source_word: ἄχρι θανάτου
  chosen: until death
  alternatives:
  - unto death
  - even to the point of death
  lexicon: BDAG
  rationale: The phrase can mean persistence up to death, including martyrdom if necessary.
    'Until death' is the most direct rendering; the stronger nuance is preserved in
    an alternative footnote.
- source_word: δώσω σοι
  chosen: I will give you
  alternatives:
  - I will grant you
  lexicon: BDAG
  rationale: Simple future of δίδωμι; 'give' is direct and sufficient.
- source_word: τὸν στέφανον τῆς ζωῆς
  chosen: the crown of life
  alternatives:
  - the victor's crown of life
  - the wreath of life
  lexicon: BDAG
  rationale: στέφανος is the wreath/crown awarded to a victor, distinct from a royal
    diadem. 'Crown of life' is traditional and clear, but the athletic-victory nuance
    is worth preserving in a footnote.
