theological_decisions:
- issue: Identity/significance of 'the morning star'
  chosen_reading: Retain the expression as 'the morning star' without explicating
    it in the main text.
  alternative_readings:
  - a symbol of royal/messianic vindication
  - a reference to Christ himself in light of Revelation 22:16
  - a symbol of eschatological glory or reward
  rationale: The phrase carries rich biblical and intratextual resonance, but the
    verse itself does not explicitly define the symbol. To preserve theological tension
    rather than resolve it, the main text keeps the metaphor intact and a footnote
    notes the possible Christological connection.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Christological relation in 'from my Father'
  chosen_reading: Translate directly as 'from my Father' without adding explanatory
    wording about authority or eternal relation.
  alternative_readings:
  - from my Father as delegated authority
  - from my Father in the economy of redemption
  rationale: The wording should reflect the text's explicit filial relation and reception
    language without importing later doctrinal explanation into the translation itself.
    This remains fully consistent with Nicene and Chalcedonian orthodoxy while avoiding
    overtranslation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
