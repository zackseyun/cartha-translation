id: REV.2.28
reference: Revelation 2:28
source:
  edition: SBLGNT
  text: ὡς κἀγὼ εἴληφα παρὰ τοῦ πατρός μου, καὶ δώσω αὐτῷ τὸν ἀστέρα τὸν πρωϊνόν.
translation:
  text: just as I also have received from my Father, and I will give him the morning
    star.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dawn star.' The phrase may allude to messianic royal imagery and
      may also anticipate Revelation 22:16, where Jesus identifies himself as 'the
      bright morning star.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: 'Introduces comparison/correspondence with the preceding promise: the
    authority/gift given by the Son corresponds to what he has received from the Father.
    ''Just as'' makes the comparative force clear in natural English.'
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  - even I
  lexicon: BDAG
  rationale: The crasis of καὶ ἐγώ adds emphasis and correspondence. 'I also' preserves
    both the pronoun and the additive force without overemphasis.
- source_word: εἴληφα
  chosen: have received
  alternatives:
  - received
  - have taken
  lexicon: BDAG
  rationale: Perfect active indicates a completed reception with continuing result.
    'Have received' preserves the perfect aspect better than simple past. 'Taken'
    is less suitable here because the source is explicitly 'from my Father,' emphasizing
    reception rather than seizure.
- source_word: παρὰ τοῦ πατρός μου
  chosen: from my Father
  alternatives:
  - from beside my Father
  - from the presence of my Father
  lexicon: BDAG
  rationale: παρά with genitive commonly means 'from' in the sense of source/origin.
    'My Father' preserves the filial and christological relationship without expansion.
- source_word: καὶ δώσω αὐτῷ
  chosen: and I will give him
  alternatives:
  - and I will give to him
  lexicon: BDAG
  rationale: Future active is straightforward. English idiom prefers 'give him' over
    the more wooden 'give to him.' The dative singular refers back to the conqueror
    in the preceding context.
- source_word: τὸν ἀστέρα τὸν πρωϊνόν
  chosen: the morning star
  alternatives:
  - the star of the morning
  - the dawn star
  lexicon: BDAG
  rationale: The article-adjective construction is idiomatically rendered 'the morning
    star.' This is the standard natural English equivalent and preserves the imagery
    without interpretive expansion in the main text.
