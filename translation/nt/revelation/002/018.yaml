theological_decisions:
- issue: Christological title in direct self-identification
  chosen_reading: the Son of God
  rationale: The verse explicitly presents Jesus with the title 'the Son of God.'
    The translation preserves this direct wording in line with historic orthodox Christology
    and does not soften it into a merely functional title.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Chalcedon (451 AD)'
- issue: Referent of ἀγγέλῳ in the address to Thyatira
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: The translation retains the more traditional and contextually likely
    apocalyptic referent 'angel' while not foreclosing the interpretive possibility
    of a human messenger; that alternative is preserved in a footnote to maintain
    transparency rather than resolving the ambiguity dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
