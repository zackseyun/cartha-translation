id: REV.2.18
reference: Revelation 2:18
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ ⸀τῆς ἐν Θυατείροις ἐκκλησίας γράψον· Τάδε λέγει ὁ υἱὸς τοῦ θεοῦ,
    ὁ ἔχων τοὺς ὀφθαλμοὺς αὐτοῦ ὡς φλόγα πυρός, καὶ οἱ πόδες αὐτοῦ ὅμοιοι χαλκολιβάνῳ·
translation:
  text: 'And to the angel of the church in Thyatira write: These things says the Son
    of God, the one who has his eyes like a flame of fire, and his feet like burnished
    bronze:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger' for 'angel.'
    reason: alternative_reading
  - marker: b
    text: The Greek term rendered 'burnished bronze' is rare and may refer more generally
      to a refined, glowing metal or alloy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: Rendered 'angel' as the default sense of ἄγγελος in Revelation's repeated
    address formula to the seven churches. 'Messenger' is lexically possible, but
    the apocalyptic context and consistent usage in these messages favor 'angel,'
    while the alternative remains interpretively relevant.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: Rendered 'church' because in Revelation this term refers to the Christian
    congregation as a recognized community. 'Assembly' is more etymologically transparent
    but less natural in this ecclesial context.
- source_word: Τάδε
  chosen: These things
  alternatives:
  - This is what
  - Thus
  lexicon: BDAG
  rationale: Chose 'These things' to preserve the formal prophetic/messenger formula
    τάδε λέγει while keeping readable English. 'This is what' is smoother but slightly
    more dynamic.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Translated directly and fully as a christological title. This preserves
    the explicit filial and divine reference in the Greek without reduction or paraphrase.
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - who has
  lexicon: BDAG
  rationale: Rendered the articular participle with an English substantival participial
    expression, preserving the descriptive force attached to the speaker's identity.
- source_word: ὀφθαλμοὺς ... ὡς φλόγα πυρός
  chosen: eyes like a flame of fire
  alternatives:
  - eyes like fiery flame
  - eyes like a blazing fire
  lexicon: BDAG
  rationale: Kept the simile close to the Greek. 'A flame of fire' reflects φλόγα
    πυρός more formally than 'blazing fire' and preserves the vivid apocalyptic imagery.
- source_word: πόδες
  chosen: feet
  lexicon: BDAG
  rationale: Straightforward lexical rendering.
- source_word: ὅμοιοι
  chosen: like
  alternatives:
  - similar to
  - resembling
  lexicon: BDAG
  rationale: Rendered the predicate adjective idiomatically in English with 'like,'
    which best conveys the comparison introduced by ὅμοιοι.
- source_word: χαλκολιβάνῳ
  chosen: burnished bronze
  alternatives:
  - fine brass
  - refined bronze
  - glowing metal
  lexicon: BDAG
  rationale: χαλκολίβανον is a rare term of uncertain exact referent, likely denoting
    a bright refined metal or alloy. 'Burnished bronze' is a clear modern rendering
    that preserves the image of gleaming refined metal without overclaiming precision.
