theological_decisions:
- issue: Relation of 'in the same way' (ὁμοίως) to the sentence
  chosen_reading: 'Render it in the main text as modifying the whole clause: ''So
    you also have those who hold to the teaching of the Nicolaitans in the same way.'''
  alternative_readings:
  - '''Likewise, you also have those who hold to the teaching of the Nicolaitans'''
  - '''So you also have, in the same way, those who hold to the teaching of the Nicolaitans'''
  rationale: The Greek permits slight ambiguity as to whether ὁμοίως modifies the
    participle directly or the broader comparison with v.14. The chosen rendering
    preserves the ambiguity reasonably well while remaining natural English and maintaining
    the connection to the preceding rebuke.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
