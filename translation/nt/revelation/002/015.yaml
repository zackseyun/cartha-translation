id: REV.2.15
reference: Revelation 2:15
source:
  edition: SBLGNT
  text: οὕτως ἔχεις καὶ σὺ κρατοῦντας τὴν ⸀διδαχὴν Νικολαϊτῶν ὁμοίως.
translation:
  text: So you also have those who hold to the teaching of the Nicolaitans in the
    same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'likewise' or 'similarly.' The Greek may emphasize that they hold this
      teaching in a manner comparable to those mentioned in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces a comparison with the preceding rebuke in v.14. 'So' is natural
    modern English and preserves the inferential/comparative force without sounding
    wooden.
- source_word: ἔχεις
  chosen: you have
  alternatives:
  - you possess
  - there are among you
  lexicon: BDAG
  rationale: The verb literally means 'have.' In context it means the church has or
    contains such people among them. 'You have' keeps the directness of the Greek
    while remaining idiomatic.
- source_word: καὶ σὺ
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: BDAG
  rationale: 'The combination adds emphasis and comparison: Pergamum, like the previous
    case, also has such people. ''You also'' preserves this emphasis in straightforward
    English.'
- source_word: κρατοῦντας
  chosen: those who hold to
  alternatives:
  - those who hold fast to
  - those who adhere to
  lexicon: BDAG
  rationale: The participle denotes maintaining or clinging to a teaching. 'Hold to'
    is clear and idiomatic; 'hold fast to' is possible but slightly more interpretive
    in intensity.
- source_word: διδαχὴν
  chosen: the teaching
  alternatives:
  - the doctrine
  - the instruction
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural modern rendering and avoids overly
    ecclesiastical language while preserving the content of what is taught.'
- source_word: Νικολαϊτῶν
  chosen: of the Nicolaitans
  alternatives:
  - of the Nikolaïtans
  lexicon: BDAG
  rationale: This is a group name and should be transliterated by standard English
    convention. 'Nicolaitans' is the established and recognizable form.
- source_word: ὁμοίως
  chosen: in the same way
  alternatives:
  - likewise
  - similarly
  lexicon: BDAG
  rationale: The adverb most naturally modifies the manner in which they hold the
    teaching, or echoes the comparison with the preceding clause. 'In the same way'
    makes the comparative force explicit and readable. 'Likewise' is possible but
    less clear in contemporary English.
