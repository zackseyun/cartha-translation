id: REV.2.2
reference: Revelation 2:2
source:
  edition: SBLGNT
  text: Οἶδα τὰ ἔργα σου, καὶ τὸν ⸀κόπον καὶ τὴν ὑπομονήν σου, καὶ ὅτι οὐ δύνῃ βαστάσαι
    κακούς, καὶ ἐπείρασας τοὺς λέγοντας ἑαυτοὺς ⸀ἀποστόλους, καὶ οὐκ εἰσίν, καὶ εὗρες
    αὐτοὺς ψευδεῖς·
translation:
  text: I know your works, your labor, and your endurance, and that you cannot tolerate
    evil people. You tested those who call themselves apostles and are not, and you
    found them to be false.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are not able to bear evil people.' The Greek is more literally 'you
      cannot bear,' with the sense here of refusing to tolerate them.
    reason: lexical_alternative
  - marker: b
    text: Or 'those claiming to be apostles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδα
  chosen: I know
  alternatives:
  - I am aware of
  lexicon: BDAG
  rationale: Standard rendering of οἶδα as a present-state verb of knowledge. 'I know'
    is direct, idiomatic, and preserves the personal evaluative force in the address.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' preserves the broad sense of actions/activities and matches
    Johannine usage well. ''Deeds'' is possible but slightly narrower in tone.'
- source_word: κόπον
  chosen: labor
  alternatives:
  - toil
  - hard work
  lexicon: BDAG
  rationale: κόπος often carries the sense of wearisome labor or toil. 'Labor' preserves
    both effort and seriousness without sounding overly colloquial.
- source_word: ὑπομονήν
  chosen: endurance
  alternatives:
  - patient endurance
  - perseverance
  - steadfastness
  lexicon: BDAG
  rationale: '''Endurance'' is concise and natural English, preserving the idea of
    steadfast persistence under pressure. ''Patient endurance'' is interpretively
    fuller but less concise.'
- source_word: οὐ δύνῃ βαστάσαι
  chosen: you cannot tolerate
  alternatives:
  - you are not able to bear
  - you cannot put up with
  lexicon: BDAG
  rationale: The infinitive βαστάσαι with δύναμαι literally means 'to bear,' but in
    this context of moral and ecclesial discernment it idiomatically means not tolerating
    or putting up with. 'Cannot tolerate' best captures the force in clear modern
    English.
- source_word: κακούς
  chosen: evil people
  alternatives:
  - evil men
  - wicked people
  lexicon: BDAG
  rationale: The adjective is masculine plural used substantivally for persons. 'Evil
    people' communicates the personal referent clearly in natural English. 'Evil men'
    would be more formally gender-marked than the context requires.
- source_word: ἐπείρασας
  chosen: tested
  alternatives:
  - examined
  - tried
  lexicon: BDAG
  rationale: πειράζω can mean test/try, and here refers to examining claims to apostleship.
    'Tested' is the clearest and most idiomatic choice.
- source_word: λέγοντας ἑαυτοὺς ἀποστόλους
  chosen: those who call themselves apostles
  alternatives:
  - those claiming to be apostles
  - those who say they are apostles
  lexicon: BDAG
  rationale: This participial phrase describes self-claimed status. 'Call themselves
    apostles' preserves the reflexive force of ἑαυτούς and reads naturally.
- source_word: ἀποστόλους
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this ecclesial context the technical sense 'apostles' is most likely,
    referring to authoritative emissaries rather than generic messengers.
- source_word: ψευδεῖς
  chosen: 'false'
  alternatives:
  - liars
  - false ones
  lexicon: BDAG
  rationale: Predicate adjective describing the claimants as false. 'False' is idiomatic
    in English after 'found them to be'; 'liars' would sharpen the accusation beyond
    the adjective's immediate form, though it is contextually related.
