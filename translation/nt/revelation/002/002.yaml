theological_decisions:
- issue: Nature of the false claimants' status as 'apostles'
  chosen_reading: Render ἀποστόλους as the ecclesial title 'apostles' rather than
    the broader 'messengers.'
  alternative_readings:
  - messengers
  rationale: The immediate context concerns doctrinal and moral testing within the
    churches, and the self-claim to apostolic authority is central to the rebuke/commendation.
    Using 'apostles' preserves the likely technical force without importing later
    institutional claims beyond the text.
  doctrine_reference: Translation philosophy §1, §2, §5
- issue: Gender rendering of κακούς
  chosen_reading: Use 'evil people' rather than 'evil men.'
  alternative_readings:
  - evil men
  rationale: Although the Greek form is masculine plural, it functions substantivally
    for persons in general here. Per the doctrine's gender-accurate principle, English
    should match intended referent rather than mechanically preserve grammatical gender.
  doctrine_reference: Translation philosophy §4
