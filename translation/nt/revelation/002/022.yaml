id: REV.2.22
reference: Revelation 2:22
source:
  edition: SBLGNT
  text: ἰδοὺ βάλλω αὐτὴν εἰς κλίνην, καὶ τοὺς μοιχεύοντας μετ’ αὐτῆς εἰς θλῖψιν μεγάλην,
    ἐὰν μὴ ⸀μετανοήσωσιν ἐκ τῶν ἔργων αὐτῆς·
translation:
  text: Look, I am throwing her onto a bed, and those who commit adultery with her
    into great affliction, unless they repent of her works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'onto a sickbed.' The Greek says literally 'onto a bed'; in context many
      understand it as a bed of suffering or illness as judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'into great tribulation.' Here the phrase refers to severe affliction
      or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Rendered as the attention-getting interjection 'Look' in readable modern
    English. 'Behold' is more traditional but archaic for the target audience.
- source_word: βάλλω
  chosen: I am throwing
  alternatives:
  - I throw
  - I cast
  lexicon: BDAG
  rationale: Present indicative used with imminent force in prophetic/judgment context;
    English progressive conveys vivid immediacy. 'Cast' is possible but less natural
    in contemporary English.
- source_word: αὐτὴν εἰς κλίνην
  chosen: her onto a bed
  alternatives:
  - her into a bed
  - her onto a sickbed
  lexicon: BDAG
  rationale: κλίνη is literally 'bed/couch.' The text itself does not explicitly say
    'sickbed,' so the main text keeps the literal 'bed.' Because the judgment context
    may imply a bed of suffering, that interpretive alternative is preserved in a
    footnote rather than imported into the translation.
- source_word: τοὺς μοιχεύοντας μετ’ αὐτῆς
  chosen: those who commit adultery with her
  alternatives:
  - those committing adultery with her
  - her adulterers
  lexicon: BDAG
  rationale: The present participle denotes those engaged in adulterous relations
    with her. The explicit verbal rendering preserves the action and avoids over-condensing
    the phrase.
- source_word: εἰς θλῖψιν μεγάλην
  chosen: into great affliction
  alternatives:
  - into great tribulation
  - into great distress
  lexicon: BDAG
  rationale: θλῖψις commonly denotes affliction, distress, or tribulation. 'Affliction'
    communicates severe suffering without importing eschatological associations that
    'tribulation' may trigger in English readers.
- source_word: ἐὰν μὴ μετανοήσωσιν
  chosen: unless they repent
  alternatives:
  - if they do not repent
  lexicon: BDAG
  rationale: This conditional clause is idiomatically rendered 'unless they repent,'
    which is concise and faithful to the Greek construction.
- source_word: ἐκ τῶν ἔργων αὐτῆς
  chosen: of her works
  alternatives:
  - from her works
  - from what she does
  - of her deeds
  lexicon: BDAG
  rationale: The preposition ἐκ after μετανοέω can indicate turning away from something.
    'Repent of her works' is idiomatic English and preserves the genitival link to
    her deeds. 'From her works' is more literal but less natural; 'deeds' is possible
    but 'works' maintains lexical consistency with ἔργον.
