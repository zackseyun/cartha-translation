theological_decisions:
- issue: Whether κλίνη should be interpreted explicitly as a 'sickbed' of judgment
  chosen_reading: Keep the literal 'bed' in the main text
  alternative_readings:
  - sickbed
  rationale: The immediate context clearly concerns judgment, and many interpreters
    understand the bed as a bed of suffering in ironic reversal of immorality. However,
    κλίνη itself does not lexically require 'sickbed.' In keeping with original-language
    primacy and avoiding interpretive expansion beyond the source text, the main text
    retains 'bed' and preserves the interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy 1, 3
- issue: Whether μοιχεύοντας refers to literal sexual adultery, metaphorical spiritual
    unfaithfulness, or both
  chosen_reading: Translate with the lexical sense 'commit adultery' and leave broader
    application implicit
  alternative_readings:
  - commit sexual immorality with her
  - are unfaithful with her
  rationale: μοιχεύω directly denotes adultery. In Revelation the imagery may also
    carry metaphorical/spiritual force, but the translation should not flatten the
    concrete term into a generalized paraphrase. The lexical rendering preserves the
    text's force while allowing readers to perceive the symbolic dimension from context.
  doctrine_reference: Translation philosophy 1, 3
