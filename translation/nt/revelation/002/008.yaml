id: REV.2.8
reference: Revelation 2:8
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ ⸀τῆς ἐν Σμύρνῃ ἐκκλησίας γράψον· Τάδε λέγει ὁ πρῶτος καὶ ὁ ἔσχατος,
    ὃς ἐγένετο νεκρὸς καὶ ἔζησεν·
translation:
  text: 'And to the angel of the church in Smyrna write: These things says the First
    and the Last, who became dead and lived again:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger' of the church in Smyrna.
    reason: alternative_reading
  - marker: b
    text: Or 'who was dead and came to life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: Rendered 'angel' as the default sense of ἄγγελος in Revelation's apocalyptic
    context, where heavenly intermediaries are prominent. 'Messenger' is lexically
    possible, but the immediate literary setting favors 'angel'.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: Rendered 'church' because in Revelation this term refers to the gathered
    Christian community, not merely a generic civic assembly. 'Assembly' is possible
    lexically but would undertranslate the established communal-religious sense here.
- source_word: Τάδε
  chosen: These things
  alternatives:
  - This is what
  - Thus
  lexicon: BDAG
  rationale: Rendered with the somewhat formal 'These things' to preserve the prophetic-message
    formula in Revelation. This keeps the solemn cadence of the repeated address formula
    while remaining intelligible.
- source_word: λέγει
  chosen: says
  alternatives:
  - declares
  lexicon: BDAG
  rationale: Used the present 'says' to match the Greek present and the recurring
    prophetic formula 'These things says...'. 'Declares' is stylistically possible
    but less direct.
- source_word: ὁ πρῶτος καὶ ὁ ἔσχατος
  chosen: the First and the Last
  alternatives:
  - the first and the last
  lexicon: BDAG
  rationale: Capitalized as a christological title. The phrase functions as a self-designation
    of the risen Jesus and echoes divine title language in Isaiah; capitalization
    signals titular force in English.
- source_word: ἐγένετο νεκρὸς
  chosen: became dead
  alternatives:
  - was dead
  - became a dead man
  lexicon: BDAG
  rationale: 'Rendered more literally as ''became dead'' to reflect ἐγένετο rather
    than smoothing to a stative expression. This preserves the eventive sense: he
    entered into death. ''Was dead'' is idiomatic and common, but it weakens the verbal
    nuance of γίνομαι.'
- source_word: ἔζησεν
  chosen: lived again
  alternatives:
  - came to life
  - lived
  lexicon: BDAG
  rationale: Rendered 'lived again' to make explicit in natural English the contrast
    with death and the resurrection sense in context. A bare 'lived' is too weak in
    English; 'came to life' is also possible and idiomatic.
