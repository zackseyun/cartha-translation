theological_decisions:
- issue: Christological title and resurrection wording
  chosen_reading: Retained 'the First and the Last' as a title and rendered the following
    clause in a way that clearly refers to Jesus' death and resurrection without importing
    extra doctrinal explanation.
  alternative_readings:
  - the first and the last
  - who was dead and came to life
  rationale: The verse presents a high christological self-identification and resurrection
    claim. The translation preserves both plainly from the Greek while avoiding paraphrastic
    expansion. Capitalization reflects title usage, and 'lived again' communicates
    resurrection in context without adding interpretive material beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
