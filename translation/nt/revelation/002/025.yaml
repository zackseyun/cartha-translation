theological_decisions:
- issue: Whether Jesus' statement refers specifically to his final eschatological
    coming or more generally to his coming in judgment/visitation to this church
  chosen_reading: Rendered simply as 'until I come' without specifying the mode or
    timing of the coming.
  alternative_readings:
  - until I come in judgment
  - until my final coming
  rationale: The Greek does not explicitly define the nature of the coming here. In
    keeping with the translation philosophy, the rendering preserves the theological
    tension rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
