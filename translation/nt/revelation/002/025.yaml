id: REV.2.25
reference: Revelation 2:25
source:
  edition: SBLGNT
  text: πλὴν ὃ ἔχετε κρατήσατε ἄχρι οὗ ἂν ἥξω.
translation:
  text: Nevertheless, hold fast what you have until I come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Only hold fast what you have until I come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - But
  - Only
  lexicon: BDAG
  rationale: Introduces an exception or narrowing after the preceding material. 'Nevertheless'
    captures the adversative/limiting force in natural English better than the more
    wooden 'only,' while preserving the sense of a concluding qualification.
- source_word: ὃ ἔχετε
  chosen: what you have
  alternatives:
  - that which you have
  - what you possess
  lexicon: BDAG
  rationale: The neuter relative with ἔχετε is idiomatic and refers generally to what
    the church presently holds. 'What you have' is clear, natural, and sufficiently
    formal.
- source_word: κρατήσατε
  chosen: hold fast
  alternatives:
  - hold firmly
  - keep hold of
  lexicon: BDAG
  rationale: Aorist imperative of κρατέω here calls for firm retention. 'Hold fast'
    preserves the exhortational force and is a well-established but still understandable
    English rendering.
- source_word: ἄχρι οὗ ἂν
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: This construction marks a future limit up to the point of the speaker's
    coming. Simple 'until' conveys the temporal boundary naturally in English.
- source_word: ἥξω
  chosen: I come
  alternatives:
  - I arrive
  lexicon: BDAG
  rationale: ἥκω emphasizes arrival/coming. In Revelation, with the speaker being
    the risen Jesus, 'I come' preserves the familiar eschatological resonance without
    overinterpreting the timing.
