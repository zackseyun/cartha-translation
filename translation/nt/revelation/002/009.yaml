id: REV.2.9
reference: Revelation 2:9
source:
  edition: SBLGNT
  text: Οἶδά ⸀σου τὴν θλῖψιν καὶ τὴν πτωχείαν, ἀλλὰ πλούσιος εἶ, καὶ τὴν βλασφημίαν
    ἐκ τῶν λεγόντων Ἰουδαίους εἶναι ἑαυτούς, καὶ οὐκ εἰσίν, ἀλλὰ συναγωγὴ τοῦ Σατανᾶ.
translation:
  text: I know your affliction and your poverty—but you are rich—and the slander from
    those who say that they are Jews and are not, but are a synagogue of Satan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blasphemy.' Here the sense is hostile defamatory speech against the
      believers, so 'slander' is used in the main text.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a synagogue of Satan' is retained literally. 'Synagogue' can
      also mean 'assembly' or 'gathering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψιν
  chosen: affliction
  alternatives:
  - tribulation
  - distress
  lexicon: BDAG
  rationale: θλῖψις denotes pressure, trouble, or oppression. 'Affliction' is natural
    modern English and preserves the sense of suffering without importing the more
    technical eschatological overtones that 'tribulation' can carry.
- source_word: πτωχείαν
  chosen: poverty
  alternatives:
  - destitution
  lexicon: BDAG
  rationale: πτωχεία straightforwardly refers to poverty. 'Poverty' is the clearest
    and most idiomatic rendering; 'destitution' is possible but more interpretive
    in degree.
- source_word: πλούσιος
  chosen: rich
  alternatives:
  - wealthy
  lexicon: BDAG
  rationale: The adjective is used predicatively in contrast with material poverty.
    'Rich' preserves the sharp paradox and likely spiritual valuation in context without
    overexplaining it.
- source_word: βλασφημίαν
  chosen: slander
  alternatives:
  - blasphemy
  - abuse
  - reviling
  lexicon: BDAG
  rationale: In this context the word refers to hostile speech directed against believers
    by other people. 'Slander' best captures defamatory human speech in English; 'blasphemy'
    in contemporary English would suggest speech directly against God and could mislead.
- source_word: ἐκ τῶν λεγόντων
  chosen: from those who say
  alternatives:
  - from those saying
  - from those who claim
  lexicon: BDAG
  rationale: ἐκ marks source/origin of the slander, and the participle λεγόντων is
    substantival. 'From those who say' is a clear, close rendering.
- source_word: Ἰουδαίους εἶναι ἑαυτούς
  chosen: that they are Jews
  alternatives:
  - that they themselves are Jews
  lexicon: BDAG
  rationale: The construction means 'to say themselves to be Jews.' English idiom
    is best served by 'that they are Jews'; the reflexive force is implicit and need
    not be woodenly reproduced.
- source_word: συναγωγὴ
  chosen: synagogue
  alternatives:
  - assembly
  - gathering
  lexicon: BDAG
  rationale: Although συναγωγή can mean 'assembly,' here it likely carries both the
    literal sense of a Jewish gathering/community and a pointed ironic characterization.
    'Synagogue' preserves the lexical and historical specificity.
- source_word: τοῦ Σατανᾶ
  chosen: of Satan
  alternatives:
  - belonging to Satan
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of Satan.' This preserves the
    stark polemical force of the phrase without softening or overinterpreting it.
