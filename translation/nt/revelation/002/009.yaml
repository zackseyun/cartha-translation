theological_decisions:
- issue: How to render the polemical phrase concerning those 'who say that they are
    Jews and are not'
  chosen_reading: Retain 'Jews' literally and preserve the contrast as stated, without
    expanding it into an ethnic denial or paraphrasing it as merely 'not true Jews.'
  alternative_readings:
  - those who claim to be God's people and are not
  - those who say they are true Jews and are not
  rationale: Ἰουδαίους is explicit and should be translated directly as 'Jews.' The
    verse's rhetoric is intra-biblical and polemical; the translation should neither
    blunt the wording nor intensify it beyond the Greek by adding qualifiers absent
    from the text. The likely force is a claim about covenantal authenticity rather
    than ethnicity as such, but that interpretive nuance belongs in documentation
    rather than in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether to make explicit that 'rich' refers spiritually rather than materially
  chosen_reading: Leave 'but you are rich' unqualified in the main text.
  alternative_readings:
  - but you are spiritually rich
  rationale: The contrast with poverty strongly implies non-material richness, but
    the Greek leaves the predicate unqualified. Adding 'spiritually' would resolve
    an implication into an explicit statement not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
