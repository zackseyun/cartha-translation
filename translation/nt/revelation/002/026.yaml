theological_decisions:
- issue: Representative masculine language
  chosen_reading: Retain singular masculine 'him' in the main text
  alternative_readings:
  - I will give that person authority
  - I will give them authority
  rationale: The Greek uses masculine singular substantival participles and pronoun.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
    The form is representative/generic, not male-exclusive, but the translation preserves
    the source grammar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of 'my works'
  chosen_reading: Preserve the literal phrase 'my works'
  alternative_readings:
  - the works I require
  - what I have commanded
  rationale: The text does not explicitly say 'works done for me' or 'commands.' Preserving
    'my works' avoids importing a narrower doctrinal interpretation and keeps the
    theological tension of the genitive relation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
