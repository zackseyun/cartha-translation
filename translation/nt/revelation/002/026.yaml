id: REV.2.26
reference: Revelation 2:26
source:
  edition: SBLGNT
  text: καὶ ὁ νικῶν καὶ ὁ τηρῶν ἄχρι τέλους τὰ ἔργα μου, δώσω αὐτῷ ἐξουσίαν ἐπὶ τῶν
    ἐθνῶν,
translation:
  text: And the one who conquers and who keeps my works until the end—I will give
    him authority over the nations,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: '''My works'' could mean works that belong to or accord with Jesus—his deeds,
      purposes, or the works he requires; the Greek does not make the relation more
      specific.'
    reason: lexical_alternative
  - marker: c
    text: The Greek has singular masculine forms ('the one who ... I will give him'),
      used here in a representative sense.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ νικῶν
  chosen: the one who conquers
  alternatives:
  - the one who overcomes
  - the victor
  lexicon: BDAG
  rationale: Present participle with article functions substantivally, referring to
    the person characterized by overcoming. 'Conquers' preserves the active conflict
    imagery common in Revelation; 'overcomes' is traditional but slightly less vivid.
- source_word: ὁ τηρῶν
  chosen: who keeps
  alternatives:
  - who obeys
  - who guards
  lexicon: BDAG
  rationale: τηρέω commonly means keep, observe, or guard. Here 'keeps' best preserves
    the verbal link to faithful observance without narrowing it only to obedience
    or protection.
- source_word: ἄχρι τέλους
  chosen: until the end
  alternatives:
  - to the end
  lexicon: BDAG
  rationale: A straightforward temporal expression indicating perseverance to the
    endpoint. 'Until the end' is natural English and preserves the durative force.
- source_word: τὰ ἔργα μου
  chosen: my works
  alternatives:
  - what I do
  - my deeds
  lexicon: BDAG
  rationale: The phrase is somewhat unusual; the Greek explicitly says 'my works,'
    not 'works for me.' Retaining 'my works' preserves the source wording and leaves
    intact the likely sense of deeds that belong to or accord with Messiah's own pattern
    and will.
- source_word: δώσω αὐτῷ
  chosen: I will give him
  alternatives:
  - I will grant him
  lexicon: BDAG
  rationale: Future indicative of δίδωμι is naturally rendered 'I will give.' The
    masculine singular pronoun reflects the grammatically masculine singular participial
    construction; this is representative rather than excluding females, but the translation
    remains gender-accurate to the source.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία often denotes delegated authority or the right to rule, which
    fits the following phrase 'over the nations.' 'Authority' is more precise than
    the broader 'power.'
- source_word: ἐπὶ τῶν ἐθνῶν
  chosen: over the nations
  alternatives:
  - over the Gentiles
  - over the peoples
  lexicon: BDAG
  rationale: In Revelation this phrase most naturally refers to the nations/peoples
    of the world rather than specifically 'Gentiles' in contrast to Jews. 'Over' captures
    ἐπί with the genitive in a ruling sense.
