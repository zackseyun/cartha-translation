id: REV.2.29
reference: Revelation 2:29
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: 'The article with present participle functions substantivally: ''the
    one who has.'' This preserves the singular, proverbial force without sounding
    archaic. ''Whoever has'' is possible but slightly more dynamic; ''he who has''
    is more traditional but less natural in modern English.'
- source_word: οὖς
  chosen: an ear
  alternatives:
  - ears
  lexicon: BDAG
  rationale: Although Greek has the singular noun here, idiomatic English commonly
    uses 'an ear' in this formulaic expression. This preserves the singular form and
    the sense of capacity to hear/respond.
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - listen
  lexicon: BDAG
  rationale: Aorist active imperative, third singular. 'Let him hear' best reflects
    the imperative force and preserves the traditional solemn summons. 'Listen' is
    possible but weakens the resonance of the repeated Revelation formula.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Introduces the content of what is being spoken. 'What' is natural modern
    English and sufficiently precise.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated address formula, πνεῦμα refers to the Holy Spirit
    speaking to the churches. Capitalization in English signals this referent, though
    the Greek manuscripts themselves do not mark case distinction.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: BDAG
  rationale: Present indicative conveys ongoing or characteristic speech. 'Says' is
    the most natural English equivalent in this formula; 'is saying' is possible but
    unnecessarily wooden here.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  lexicon: BDAG
  rationale: ἐκκλησία can mean 'assembly,' but in Revelation 2–3 it clearly denotes
    the congregations addressed. 'Churches' is the established and contextually accurate
    rendering in modern English.
