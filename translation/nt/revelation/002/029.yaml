theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: the Holy Spirit speaking to the churches
  alternative_readings:
  - a human spirit
  - the spirit/message of Jesus
  rationale: Within Revelation 2–3, the repeated refrain presents the Spirit as the
    divine speaker addressing all the churches through the messages. Rendering as
    'the Spirit' with capitalization preserves this theological identification without
    adding explanatory words to the text.
  doctrine_reference: Affirmations; Translation philosophy §3
