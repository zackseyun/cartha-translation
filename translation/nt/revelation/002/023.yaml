theological_decisions:
- issue: Identity of the speaker as the one who searches the inner person
  chosen_reading: Retain the first-person self-identification ('I am the one who searches
    minds and hearts') as a claim of divine-like judicial knowledge by the risen Jesus.
  alternative_readings:
  - A softened paraphrase that reduces the statement to general awareness or observation
  rationale: The Greek presents a strong self-identification with the prerogative
    of searching the inner person. The translation should preserve this theological
    weight without dilution.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 preserve theological tension rather than resolve it.'
- issue: Meaning of 'her children'
  chosen_reading: Leave the phrase open to literal or figurative sense in the main
    text.
  alternative_readings:
  - Explicitly interpret as biological children
  - Explicitly interpret as spiritual followers/disciples
  rationale: The context may suggest followers aligned with 'Jezebel,' but the Greek
    itself does not force an explicit interpretive gloss. The translation preserves
    the ambiguity.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather
    than resolve it.
