id: REV.2.23
reference: Revelation 2:23
source:
  edition: SBLGNT
  text: καὶ τὰ τέκνα αὐτῆς ἀποκτενῶ ἐν θανάτῳ· καὶ γνώσονται πᾶσαι αἱ ἐκκλησίαι ὅτι
    ἐγώ εἰμι ὁ ἐραυνῶν νεφροὺς καὶ καρδίας, καὶ δώσω ὑμῖν ἑκάστῳ κατὰ τὰ ἔργα ὑμῶν.
translation:
  text: And I will kill her children with death, and all the churches will know that
    I am the one who searches minds and hearts, and I will give to each of you according
    to your works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with pestilence'; the Greek literally says 'with death,' an idiom that
      may intensify the judgment or echo Old Testament judgment language.
    reason: lexical_alternative
  - marker: b
    text: Literally 'kidneys and hearts,' a biblical idiom for the inner person, including
      motives, thoughts, and desires.
    reason: cultural_note
lexical_decisions:
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: τέκνα most naturally means 'children' or 'offspring.' 'Children' is the
    clearest and most idiomatic English here, while still allowing either literal
    or figurative reference to her followers/disciples.
- source_word: ἀποκτενῶ
  chosen: I will kill
  alternatives:
  - I will put to death
  - I will slay
  lexicon: BDAG
  rationale: The verb directly denotes killing. 'I will kill' is the most transparent
    rendering; 'put to death' is possible but slightly more interpretive and formal.
- source_word: ἐν θανάτῳ
  chosen: with death
  alternatives:
  - dead
  - by death
  - with pestilence
  lexicon: BDAG
  rationale: 'The phrase is semantically difficult and likely intensifying: ''kill
    with death.'' A very literal rendering preserves the force and allusive quality,
    especially its resonance with biblical judgment language. ''Pestilence'' is a
    known contextual interpretation influenced by Septuagintal usage, but it is not
    demanded by the Greek here and is therefore preserved as an alternative in a footnote
    rather than adopted in the main text.'
- source_word: γνώσονται
  chosen: will know
  alternatives:
  - will come to know
  - will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω here communicates resulting recognition/knowledge.
    'Will know' is natural and sufficient in English.
- source_word: ἐκκλησίαι
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: In Revelation this term refers to the Christian congregations addressed
    by the book. 'Churches' is the standard and contextually appropriate rendering.
- source_word: ὁ ἐραυνῶν
  chosen: the one who searches
  alternatives:
  - the one who examines
  - the one who probes
  lexicon: BDAG
  rationale: The substantival participle identifies Jesus by an ongoing characteristic
    action. 'The one who searches' preserves both the participial force and the solemn
    judicial nuance.
- source_word: νεφροὺς
  chosen: minds
  alternatives:
  - kidneys
  - inmost being
  lexicon: BDAG
  rationale: Literally 'kidneys,' a Hebrew-Greek anthropological idiom for the inner
    self, especially hidden motives or emotions. In contemporary English, 'kidneys'
    would obscure meaning, so 'minds' communicates the inward, evaluative dimension
    in a readable way when paired with 'hearts.'
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner selves
  lexicon: BDAG
  rationale: '''Hearts'' is both literal and idiomatic in English for the center of
    thought, will, and desire. Paired with ''minds,'' it preserves the dual inward
    focus of the Greek expression.'
- source_word: δώσω
  chosen: I will give
  alternatives:
  - I will repay
  - I will render
  lexicon: BDAG
  rationale: The verb is simply 'give,' but in this judgment context it carries the
    sense of recompense. Retaining 'give' stays close to the Greek while allowing
    the following phrase to express the judicial sense.
- source_word: ἑκάστῳ
  chosen: to each of you
  alternatives:
  - to each one of you
  - to each
  lexicon: BDAG
  rationale: The dative singular distributive adjective is naturally rendered 'to
    each of you' because ὑμῖν is present and governs the group addressed.
- source_word: κατὰ τὰ ἔργα ὑμῶν
  chosen: according to your works
  alternatives:
  - according to your deeds
  - according to what you have done
  lexicon: BDAG
  rationale: ἔργα is best rendered consistently as 'works' in this judgment formula.
    'Deeds' is possible, but 'works' preserves the lexical link to broader biblical
    usage.
