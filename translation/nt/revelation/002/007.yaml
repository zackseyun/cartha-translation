id: REV.2.7
reference: Revelation 2:7
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις. τῷ νικῶντι δώσω αὐτῷ
    φαγεῖν ἐκ τοῦ ξύλου τῆς ζωῆς, ὅ ἐστιν ἐν τῷ παραδείσῳ τοῦ ⸀θεοῦ.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
    To the one who conquers I will give him to eat from the tree of life, which is
    in the paradise of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'To the one who overcomes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  chosen: The one who has an ear
  alternatives:
  - Whoever has an ear
  - Anyone who has an ear
  lexicon: BDAG
  rationale: The articular participle is singular and idiomatic. 'The one who has
    an ear' preserves the formal structure while remaining natural English. Singular
    'ear' reflects the Greek singular οὖς in this stock exhortation.
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - let him listen
  lexicon: BDAG
  rationale: Aorist imperative, third singular. 'Let him hear' preserves the exhortatory
    force and traditional resonance. The masculine pronoun reflects the grammatically
    masculine singular form in a representative sense, consistent with the gender-accurate
    policy.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated formula to the churches, the referent is the
    Holy Spirit rather than a generic spirit; capitalization in English signals this
    referential judgment without adding content beyond the context.
- source_word: λέγει ταῖς ἐκκλησίαις
  chosen: says to the churches
  alternatives:
  - is saying to the churches
  - says to the assemblies
  lexicon: BDAG
  rationale: Present indicative is well represented by simple present in English.
    'Churches' is the established and contextually appropriate rendering of ἐκκλησίαις
    in Revelation 2–3, though 'assemblies' is lexically possible.
- source_word: τῷ νικῶντι
  chosen: To the one who conquers
  alternatives:
  - To the one who overcomes
  - To the victor
  lexicon: BDAG
  rationale: The present participle denotes the overcoming/conquering person. 'Conquers'
    preserves the verbal force of νικάω and fits Revelation's conflict imagery. 'Overcomes'
    is possible and traditional, but 'conquers' more directly reflects the lexeme.
- source_word: δώσω αὐτῷ
  chosen: I will give him
  alternatives:
  - I will grant him
  - I will give to him
  lexicon: BDAG
  rationale: Future active indicative with dative pronoun. 'I will give him' is idiomatic
    English and preserves the personal dative. 'Grant' is possible but slightly more
    interpretive.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - to partake
  lexicon: BDAG
  rationale: The aorist infinitive straightforwardly means 'to eat.' 'Partake' is
    more ecclesiastical and less direct than the Greek warrants.
- source_word: ἐκ τοῦ ξύλου τῆς ζωῆς
  chosen: from the tree of life
  alternatives:
  - of the tree of life
  lexicon: BDAG
  rationale: ἐκ is best rendered 'from,' expressing source. ξύλον here refers to a
    tree rather than generic wood; the phrase clearly echoes Genesis and later Revelation
    usage.
- source_word: παραδείσῳ
  chosen: paradise
  alternatives:
  - garden
  lexicon: BDAG
  rationale: παράδεισος can denote a garden or paradise, but in this eschatological
    context 'paradise' best preserves the term's theological and intertextual weight
    without flattening it to an ordinary garden.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of God.' This preserves the concise
    possessive/associative force of the Greek.
