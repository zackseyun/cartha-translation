theological_decisions:
- issue: Referent of τὸ πνεῦμα
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a generic spirit
  rationale: Within Revelation 2–3, the repeated refrain 'what the Spirit says to
    the churches' functions as divine address to the churches and is best understood
    as the Holy Spirit. Capitalization reflects this contextual identification rather
    than a doctrinal expansion beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of νικάω in the promise formula
  chosen_reading: conquers
  alternative_readings:
  - overcomes
  rationale: '''Conquers'' more transparently reflects the lexical sense of νικάω
    and preserves Revelation''s victory imagery. ''Overcomes'' remains a viable traditional
    alternative and is preserved in a footnote because the phrase is formulaic and
    familiar in English Bible tradition.'
  doctrine_reference: Translation philosophy §1; §5
- issue: Gendered representative singular in the exhortation
  chosen_reading: let him hear
  alternative_readings:
  - let them hear
  - let that person hear
  rationale: The Greek uses a grammatically masculine singular participle and imperative
    with representative force. Per the gender-accurate policy, the translation keeps
    the singular masculine form rather than neutralizing it, while the surrounding
    phrase makes the representative sense clear.
  doctrine_reference: Translation philosophy §4
