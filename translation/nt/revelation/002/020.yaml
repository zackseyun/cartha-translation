theological_decisions:
- issue: Identity of 'Jezebel'
  chosen_reading: Retain 'Jezebel' as the name/title used in the text without specifying
    whether it is her literal personal name or a symbolic allusion to the OT Jezebel.
  alternative_readings:
  - A literal woman named Jezebel
  - A symbolic label evoking the OT Jezebel
  rationale: The verse itself does not resolve whether the designation is literal
    or symbolic. The translation preserves the textual form and leaves the interpretive
    question open rather than importing a conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of δοῦλος
  chosen_reading: my slaves
  alternative_readings:
  - my servants
  - my bondservants
  rationale: The doctrinal guidance allows 'slave' where bonded nature is theologically
    salient. Because the phrase marks these people as belonging to Christ, 'slaves'
    best preserves that force, while alternatives are documented.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος = servant / slave (context-dependent)'
