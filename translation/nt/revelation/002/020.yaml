id: REV.2.20
reference: Revelation 2:20
source:
  edition: SBLGNT
  text: ἀλλὰ ἔχω κατὰ σοῦ ὅτι ἀφεῖς τὴν ⸀γυναῖκα Ἰεζάβελ, ἡ ⸀λέγουσα ἑαυτὴν προφῆτιν,
    καὶ διδάσκει καὶ πλανᾷ τοὺς ἐμοὺς δούλους πορνεῦσαι καὶ φαγεῖν εἰδωλόθυτα.
translation:
  text: 'But I have this against you: you tolerate the woman Jezebel, who calls herself
    a prophetess and teaches and deceives my slaves to commit sexual immorality and
    to eat food sacrificed to idols.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'your wife Jezebel' instead of 'the woman Jezebel.'
    reason: textual_variant
  - marker: b
    text: Or 'who claims to be a prophetess.'
    reason: lexical_alternative
  - marker: c
    text: Or 'deceives' may be rendered 'leads astray.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Adversative conjunction introducing a sharp contrast with the commendation
    in the preceding context; 'But' is the most natural modern English equivalent.
- source_word: ἔχω κατὰ σοῦ
  chosen: I have this against you
  alternatives:
  - I have against you
  - I hold this against you
  lexicon: BDAG
  rationale: This idiom expresses a charge or complaint. Adding 'this' makes the English
    idiomatic while preserving the accusatory force.
- source_word: ἀφεῖς
  chosen: you tolerate
  alternatives:
  - you allow
  - you permit
  - you leave alone
  lexicon: BDAG
  rationale: In context the verb means allowing a harmful situation to continue rather
    than simply 'forgive' or 'leave.' 'Tolerate' best captures culpable permissiveness
    in natural English.
- source_word: τὴν γυναῖκα Ἰεζάβελ
  chosen: the woman Jezebel
  alternatives:
  - that woman Jezebel
  - your wife Jezebel
  lexicon: BDAG
  rationale: The direct object is literally 'the woman Jezebel.' 'The woman Jezebel'
    preserves the Greek wording without importing the textual variant 'your wife Jezebel.'
- source_word: Ἰεζάβελ
  chosen: Jezebel
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: ἡ λέγουσα ἑαυτὴν προφῆτιν
  chosen: who calls herself a prophetess
  alternatives:
  - who says she is a prophetess
  - who claims to be a prophetess
  lexicon: BDAG
  rationale: The participial phrase identifies her by her self-claimed status. 'Calls
    herself' is concise and accurate; 'prophetess' preserves the feminine noun explicitly
    present in Greek.
- source_word: διδάσκει
  chosen: teaches
  alternatives:
  - is teaching
  lexicon: BDAG
  rationale: Present indicative conveys ongoing activity; English simple present adequately
    represents this in a general characterization.
- source_word: πλανᾷ
  chosen: deceives
  alternatives:
  - leads astray
  - misleads
  lexicon: BDAG
  rationale: The verb denotes causing someone to wander from truth or right conduct.
    'Deceives' is clear and forceful; the nuance 'leads astray' is preserved as an
    alternative.
- source_word: τοὺς ἐμοὺς δούλους
  chosen: my slaves
  alternatives:
  - my servants
  - my bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος should be rendered 'slave' where bonded belonging
    is salient. Here the possessive 'my' underscores ownership/allegiance to Christ,
    making 'slaves' the stronger and more transparent rendering.
- source_word: πορνεῦσαι
  chosen: to commit sexual immorality
  alternatives:
  - to practice sexual immorality
  - to fornicate
  lexicon: BDAG
  rationale: The infinitive denotes engaging in illicit sexual behavior. 'Commit sexual
    immorality' is clear modern English without archaic narrowing.
- source_word: φαγεῖν εἰδωλόθυτα
  chosen: to eat food sacrificed to idols
  alternatives:
  - to eat idol sacrifices
  - to eat things sacrificed to idols
  lexicon: BDAG
  rationale: εἰδωλόθυτα refers to food associated with pagan sacrificial offerings.
    'Food sacrificed to idols' is the clearest idiomatic rendering in modern English.
