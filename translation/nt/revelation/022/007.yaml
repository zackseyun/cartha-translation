id: REV.22.7
reference: Revelation 22:7
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἔρχομαι ταχύ· μακάριος ὁ τηρῶν τοὺς λόγους τῆς προφητείας τοῦ βιβλίου
    τούτου.
translation:
  text: And behold, I am coming soon. Blessed is the one who keeps the words of the
    prophecy of this book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quickly'; the Greek can emphasize either temporal nearness ('soon')
      or sudden/rapid coming.
    reason: lexical_alternative
  - marker: b
    text: Or 'this scroll.'
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the deictic, attention-commanding force of the discourse marker.
    'Behold' is slightly elevated but still natural in apocalyptic proclamation and
    better preserves the solemnity than 'look.'
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  - I am on my way
  lexicon: BDAG
  rationale: Present tense with futurist force in context is well represented by the
    English progressive, conveying imminent arrival without flattening the aspectual
    nuance.
- source_word: ταχύ
  chosen: soon
  alternatives:
  - quickly
  - swiftly
  lexicon: BDAG
  rationale: In this context the adverb most naturally communicates temporal nearness
    rather than manner alone. 'Soon' is clearer in contemporary English, while 'quickly'
    is preserved as a lexical alternative because the Greek can also suggest suddenness
    or rapidity.
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: Standard rendering in beatitude-like statements; it preserves the covenantal
    and eschatological weight better than 'happy,' which sounds merely emotional.
- source_word: ὁ τηρῶν
  chosen: the one who keeps
  alternatives:
  - the one who obeys
  - whoever keeps
  lexicon: BDAG
  rationale: The articular participle is naturally rendered generically as 'the one
    who ...' in English. 'Keeps' preserves the verbal link to guarding/observing the
    revelation's contents, whereas 'obeys' is interpretive and narrower.
- source_word: λόγους
  chosen: words
  alternatives:
  - message
  - sayings
  lexicon: BDAG
  rationale: A straightforward plural rendering that preserves the concrete form of
    the revelation's utterances. 'Message' would over-summarize; 'sayings' is possible
    but less natural here.
- source_word: προφητείας
  chosen: prophecy
  alternatives:
  - prophetic message
  lexicon: BDAG
  rationale: Maintains the established apocalyptic category and the genitival relation
    'words of the prophecy' without unnecessary expansion.
- source_word: βιβλίου τούτου
  chosen: this book
  alternatives:
  - this scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll in ancient context, but 'book' is the most
    idiomatic and conventional rendering in English for Revelation's self-reference.
    'Scroll' is preserved as a cultural-lexical alternative.
