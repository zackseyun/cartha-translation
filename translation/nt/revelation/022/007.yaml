theological_decisions:
- issue: Speaker identity of 'I am coming soon'
  chosen_reading: Rendered without adding an explicit subject beyond the first person
    pronoun, allowing the literary context to identify the speaker rather than the
    translation importing an interpretive gloss such as 'Jesus.'
  alternative_readings:
  - Explicitly identifying the speaker as Jesus in the verse text
  rationale: The Greek text itself gives only first-person speech here. Since the
    immediate context clarifies speaker identity, the translation should not insert
    a proper name not present in the source.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
