id: REV.22.11
reference: Revelation 22:11
source:
  edition: SBLGNT
  text: ὁ ἀδικῶν ἀδικησάτω ἔτι, καὶ ὁ ῥυπαρὸς ⸀ῥυπαρευθήτω ἔτι, καὶ ὁ δίκαιος δικαιοσύνην
    ποιησάτω ἔτι, καὶ ὁ ἅγιος ἁγιασθήτω ἔτι.
translation:
  text: Let the one who does wrong still do wrong, and the filthy still be made filthy,
    and the righteous still practice righteousness, and the holy still be made holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the filthy still be filthy.' The Greek verb is passive ('be made filthy'),
      but some translations smooth it to an intransitive English expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous still do justice.' The noun δικαιοσύνη can also be rendered
      'justice,' though 'righteousness' is the default rendering here.
    reason: lexical_alternative
  - marker: c
    text: Or 'the holy still be sanctified.' The Greek verb means 'be made holy' or
      'be sanctified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀδικῶν
  chosen: the one who does wrong
  alternatives:
  - the evildoer
  - the unjust one
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally; rendered as
    a generic personal expression in natural English. 'Does wrong' preserves the verbal
    force of ἀδικέω better than a static label alone.
- source_word: ἀδικησάτω
  chosen: let ... do wrong
  alternatives:
  - let ... act unjustly
  - let ... continue in wrongdoing
  lexicon: BDAG
  rationale: Third-person aorist imperative. English 'let ... do wrong' best captures
    the imperative force without overstating aspect. 'Still' from ἔτι conveys continuation.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - further
  lexicon: BDAG
  rationale: Repeated adverb marking continuation or persistence; 'still' is the most
    idiomatic and clear in all four clauses.
- source_word: ὁ ῥυπαρός
  chosen: the filthy
  alternatives:
  - the defiled one
  - the vile one
  - the unclean one
  lexicon: BDAG
  rationale: Adjective used substantivally. 'Filthy' preserves the moral and impurity
    connotations of ῥυπαρός and matches the stark parallelism of the verse.
- source_word: ῥυπαρευθήτω
  chosen: be made filthy
  alternatives:
  - be filthy
  - be defiled
  - continue in filth
  lexicon: BDAG
  rationale: Aorist passive imperative of ῥυπαρεύω. The passive form is best reflected
    explicitly as 'be made filthy,' even though English style is somewhat abrupt;
    this preserves the morphology and the rhetorical shock of the Greek.
- source_word: ὁ δίκαιος
  chosen: the righteous
  alternatives:
  - the just one
  lexicon: BDAG
  rationale: Substantival adjective. 'The righteous' is the standard and clearest
    rendering in this moral contrast.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default rendering per doctrine for δικαιοσύνη is 'righteousness.' In
    this non-Pauline context, 'righteousness' fits the ethical parallelism best; 'justice'
    is preserved as an alternative.
- source_word: ποιησάτω
  chosen: practice
  alternatives:
  - do
  - perform
  lexicon: BDAG
  rationale: Although ποιέω is broadly 'do/make,' with δικαιοσύνην the idiomatic English
    expression is 'practice righteousness,' which preserves the sense of active conduct
    better than the wooden 'do righteousness.'
- source_word: ὁ ἅγιος
  chosen: the holy
  alternatives:
  - the saintly one
  - the sanctified one
  lexicon: BDAG
  rationale: Substantival adjective. 'The holy' preserves the adjective's force and
    keeps the parallel structure concise.
- source_word: ἁγιασθήτω
  chosen: be made holy
  alternatives:
  - be sanctified
  - be holy still
  lexicon: BDAG
  rationale: Aorist passive imperative of ἁγιάζω. 'Be made holy' is more accessible
    than 'be sanctified' while preserving the passive morphology and theological sense
    of consecration.
