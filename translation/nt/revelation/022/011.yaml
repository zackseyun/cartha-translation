theological_decisions:
- issue: Imperative force in a context of final moral fixing
  chosen_reading: Render the four verbs as imperatives ('Let ...') rather than as
    predictive indicatives.
  alternative_readings:
  - The wrongdoer will still do wrong ...
  - Whoever is unjust, let him be unjust still ...
  rationale: The Greek forms are third-person imperatives, not indicatives. In context
    they function rhetorically to declare the settled state of people at the end,
    but the translation should preserve the grammatical force rather than resolve
    it into mere prediction. The wording avoids implying divine approval of evil while
    retaining the solemn judicial tone.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Voice of ῥυπαρευθήτω and ἁγιασθήτω
  chosen_reading: Preserve the passive voice in English ('be made filthy,' 'be made
    holy').
  alternative_readings:
  - let the filthy still be filthy
  - let the holy still be holy
  - let the filthy continue in filth
  - let the holy continue in holiness
  rationale: Both verbs are passive in Greek. Keeping the passive maintains the textual
    form and leaves the agency implicit, preserving the verse's theological tension
    rather than smoothing it into simple reflexive or stative language.
  doctrine_reference: Preserve theological tension rather than resolve it.
