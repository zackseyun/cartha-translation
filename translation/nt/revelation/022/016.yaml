id: REV.22.16
reference: Revelation 22:16
source:
  edition: SBLGNT
  text: Ἐγὼ Ἰησοῦς ἔπεμψα τὸν ἄγγελόν μου μαρτυρῆσαι ὑμῖν ταῦτα ἐπὶ ταῖς ἐκκλησίαις.
    ἐγώ εἰμι ἡ ῥίζα καὶ τὸ γένος Δαυίδ, ὁ ἀστὴρ ὁ λαμπρός, ὁ πρωϊνός.
translation:
  text: I, Jesus, have sent my angel to testify to you about these things for the
    churches. I am the root and the descendant of David, the bright morning star.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to testify to you these things in the churches' or 'concerning the churches.'
      The Greek phrase ἐπὶ ταῖς ἐκκλησίαις allows more than one nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the root and the offspring of David.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγὼ Ἰησοῦς
  chosen: I, Jesus,
  alternatives:
  - I Jesus
  - I am Jesus
  lexicon: BDAG
  rationale: The explicit pronoun with the proper name is emphatic self-identification.
    English idiom is best served by apposition, 'I, Jesus,' rather than the less natural
    'I Jesus.' Adding 'am' here would overtranslate, since the finite verb comes later.
- source_word: ἔπεμψα
  chosen: have sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: 'The aorist is rendered with English present perfect to convey a completed
    action with present relevance in the discourse: Jesus has commissioned the angel
    for the purpose of this revelation. Simple past is possible, but present perfect
    reads more naturally in this solemn self-attestation.'
- source_word: ἄγγελόν
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation, ἄγγελος regularly refers to an angelic being unless context
    clearly indicates a human messenger. Here the apocalyptic context strongly favors
    'angel.'
- source_word: μαρτυρῆσαι
  chosen: to testify
  alternatives:
  - to bear witness
  - to witness
  lexicon: BDAG
  rationale: The infinitive expresses purpose after 'sent.' 'To testify' is clear
    modern English and preserves the juridical/witness nuance of μαρτυρέω.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is naturally rendered 'to you' with the infinitive of testimony.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The plural demonstrative points to the contents of the revelation as
    a whole; 'these things' preserves the plural reference.
- source_word: ἐπὶ ταῖς ἐκκλησίαις
  chosen: for the churches
  alternatives:
  - concerning the churches
  - in the churches
  - to the churches
  lexicon: BDAG
  rationale: 'The preposition ἐπί with the dative here is somewhat flexible. In this
    context it most likely indicates reference/sphere: the testimony is given to John
    and intended for the churches. ''For the churches'' communicates destination and
    purpose in idiomatic English without forcing a narrower local sense like ''in
    the churches.'''
- source_word: ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: Straightforward copular self-declaration, retaining the emphatic pronoun.
- source_word: ἡ ῥίζα
  chosen: the root
  lexicon: BDAG
  rationale: Standard rendering of ῥίζα. In this messianic title it evokes source/origin
    imagery and should be preserved literally.
- source_word: τὸ γένος Δαυίδ
  chosen: the descendant of David
  alternatives:
  - the offspring of David
  - the race of David
  lexicon: BDAG
  rationale: γένος can denote family line, stock, or descendant group. In singular
    predication about Jesus, 'the descendant of David' is the clearest idiomatic English.
    'Offspring of David' is also strong and traditional, but 'descendant' is slightly
    more natural for contemporary readers.
- source_word: ὁ ἀστὴρ ὁ λαμπρός, ὁ πρωϊνός
  chosen: the bright morning star
  alternatives:
  - the star, the bright one, the morning one
  - the morning star, the bright one
  lexicon: BDAG
  rationale: The repeated articles stack descriptors appositionally. English idiom
    compresses them naturally into 'the bright morning star' while preserving both
    adjectives. This is a recognized messianic title and should remain vivid and literal.
