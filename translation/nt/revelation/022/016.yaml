theological_decisions:
- issue: Messianic-Davidic self-identification
  chosen_reading: Rendered ἡ ῥίζα καὶ τὸ γένος Δαυίδ as 'the root and the descendant
    of David' without resolving the theological paradox.
  alternative_readings:
  - the source and offspring of David
  rationale: The verse presents Jesus as both antecedent to and descended from David.
    The translation preserves this tension rather than explaining it away, in keeping
    with the doctrine's instruction to preserve theological tension where the text
    itself presents it.
  doctrine_reference: Translation philosophy §3
- issue: Christological title 'morning star'
  chosen_reading: 'Retained as a title for Jesus: ''the bright morning star.'''
  rationale: The phrase is a direct self-designation in the Greek and should be preserved
    as such without importing later doctrinal elaboration. The wording maintains the
    text's high Christology while staying within the verse's own claims.
  doctrine_reference: Affirmations; Translation philosophy §1
