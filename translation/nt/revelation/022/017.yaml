theological_decisions:
- issue: Identity of the addressee of “Come”
  chosen_reading: The repeated “Come” is left textually open, preserving the likely layered sense that the Spirit and the bride address the Lord, while the hearer joins that cry and the thirsty person is then invited to come for life.
  alternative_readings:
  - All instances of “Come” are addressed to Jesus alone.
  - The final invitation shifts so that the thirsty person is the addressee only in the clause 'let the one who is thirsty come.'
  rationale: The Greek uses the same imperative twice before shifting to third-person imperatives for the thirsty and willing one. The translation preserves this literary and theological tension rather than resolving the first two calls into an explicit object not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Symbolic referent of “the bride”
  chosen_reading: Retain the symbolic term 'the bride' without interpretive expansion in the main text.
  alternative_readings:
  - the church
  - the people of God
  - the new Jerusalem
  rationale: Revelation's imagery intentionally layers these associations. Expanding the symbol in translation would import interpretation beyond the wording of the verse.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
