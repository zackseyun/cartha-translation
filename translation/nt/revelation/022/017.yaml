id: REV.22.17
reference: Revelation 22:17
source:
  edition: SBLGNT
  text: καὶ τὸ πνεῦμα καὶ ἡ νύμφη λέγουσιν· Ἔρχου· καὶ ὁ ἀκούων εἰπάτω· Ἔρχου· καὶ ὁ διψῶν ἐρχέσθω, ὁ θέλων λαβέτω ὕδωρ ζωῆς δωρεάν.
translation:
  text: And the Spirit and the bride say, “Come.” And let the one who hears say, “Come.” And let the one who is thirsty come; let the one who is willing take the water of life freely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “without cost” or “as a gift.”
    reason: lexical_alternative
  - marker: b
    text: The first two calls, “Come,” are commonly understood as an appeal for the Lord’s coming; the following clauses then invite the thirsty and willing person to come and receive life.
    reason: alternative_reading
  - marker: c
    text: Or 'the one who wants it'.
    reason: previous_rendering
lexical_decisions:
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation, πνεῦμα with the article in this context most naturally refers to the Holy Spirit rather than a human spirit or disposition. Capitalization reflects referential sense in English, not a distinct Greek form.
- source_word: ἡ νύμφη
  chosen: the bride
  lexicon: BDAG
  rationale: Standard rendering of νύμφη. In Revelation this is symbolically the people of God / new Jerusalem, but the translation preserves the image rather than interpreting it in the main text.
- source_word: λέγουσιν
  chosen: say
  alternatives:
  - are saying
  lexicon: BDAG
  rationale: Present indicative is rendered with simple present in idiomatic English for a vivid, ongoing proclamation.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come!
  lexicon: BDAG
  rationale: Second person middle imperative of ἔρχομαι. The direct summons is best rendered simply as 'Come.' Punctuation supplies the force.
- source_word: ὁ ἀκούων
  chosen: the one who hears
  alternatives:
  - whoever hears
  - the hearer
  lexicon: BDAG
  rationale: Articular present participle is represented with a gender-accurate, generic singular expression in natural English. This preserves the representative force without over-paraphrase.
- source_word: εἰπάτω
  chosen: let ... say
  alternatives:
  - must say
  - should say
  lexicon: BDAG
  rationale: Third person aorist imperative is naturally rendered with 'let ... say' in English.
- source_word: ὁ διψῶν
  chosen: the one who is thirsty
  alternatives:
  - the thirsty one
  - whoever thirsts
  lexicon: BDAG
  rationale: The participle denotes the thirsty person; 'is thirsty' is idiomatic English and preserves the metaphor of need/desire.
- source_word: ἐρχέσθω
  chosen: let ... come
  alternatives:
  - must come
  lexicon: BDAG
  rationale: Third person imperative invites or commands approach. 'Let ... come' preserves the hortatory force without sounding overly harsh.
- source_word: ὁ θέλων
  chosen: the one who wants it
  alternatives:
  - the one who wills
  - whoever wants to
  lexicon: BDAG
  rationale: θέλω expresses willing/desiring. 'The one who wants it' makes explicit in English that the desire is for the offered gift, while remaining close to the sense.
- source_word: λαβέτω
  chosen: let ... take
  alternatives:
  - receive
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'take' or 'receive.' 'Take' fits the imperative parallelism and the imagery of freely taking water.
- source_word: ὕδωρ ζωῆς
  chosen: the water of life
  alternatives:
  - living water
  lexicon: BDAG
  rationale: The genitive construction is most directly 'water of life,' a familiar Johannine expression. 'Living water' would shift the syntax and nuance.
- source_word: δωρεάν
  chosen: freely
  alternatives:
  - without cost
  - as a gift
  lexicon: BDAG
  rationale: δωρεάν means freely / gratis. 'Freely' is concise and traditional, while still clear in context. An alternative is worth preserving because 'without cost' makes the economic metaphor more explicit.
