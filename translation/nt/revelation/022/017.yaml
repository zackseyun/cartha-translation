  source_review: state/reviews/gemini/nt/revelation/022/017.json
  category: awkward_english
  tier: 1
  from: the one who wants it
  to: the one who is willing
  rationale: 'The Greek articular participle ὁ θέλων is concise, meaning ''the willing one'' or ''the one who desires.'' The draft''s rendering, ''the one who wants it,'' adds an object (''it'') that is not explicit in the Greek. This addition is also redundant, as the object of the action (''the water of life'') is stated immediately after the verb. This creates a slightly clunky phrase: ''let the one who wants it take the water of life.'' A more elegant and faithful rendering like ''let the one who is willing take...'' avoids this redundancy and better reflects the source text''s compact style.'
