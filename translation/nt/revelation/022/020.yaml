id: REV.22.20
reference: Revelation 22:20
source:
  edition: SBLGNT
  text: Λέγει ὁ μαρτυρῶν ταῦτα· Ναί· ἔρχομαι ταχύ. Ἀμήν· ⸀ἔρχου, κύριε Ἰησοῦ.
translation:
  text: The one who testifies to these things says, “Yes, I am coming soon.” Amen.
    Come, Lord Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am coming quickly.” The Greek adverb can emphasize either nearness
      in time or swiftness of arrival/action.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  chosen: says
  alternatives:
  - is saying
  - declares
  lexicon: BDAG
  rationale: 'Present indicative is naturally rendered as a present-tense speech introduction
    in English narrative/discourse: ''says.'' ''Declares'' is possible but slightly
    more elevated than the Greek requires.'
- source_word: ὁ μαρτυρῶν
  chosen: the one who testifies
  alternatives:
  - he who bears witness
  - the witness-bearing one
  lexicon: BDAG
  rationale: The substantival present participle identifies Jesus as the ongoing witness
    to the apocalypse's contents. 'Testifies' is clear modern English and preserves
    the legal/witness nuance of μαρτυρέω better than a looser 'says.'
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - all this
  lexicon: BDAG
  rationale: Plural demonstrative points to the contents of the revelation just given.
    'These things' is a standard and sufficiently transparent rendering.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Surely
  - Indeed
  lexicon: BDAG
  rationale: Ναί is a direct affirmative response. 'Yes' best matches the plain force
    here; 'Surely' would import a slightly interpretive solemnity.
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  - I am on my way
  lexicon: BDAG
  rationale: 'Present middle/passive deponent with future-oriented force is idiomatically
    rendered in English as a progressive: ''I am coming.'' This preserves imminence
    without paraphrase.'
- source_word: ταχύ
  chosen: soon
  alternatives:
  - quickly
  - swiftly
  lexicon: BDAG
  rationale: In Revelation this adverb can denote either temporal nearness ('soon')
    or rapidity ('quickly'). Here, with the eschatological promise and the prayer
    that follows, 'soon' best captures the expected sense in contemporary English,
    while the alternative is preserved in a footnote.
- source_word: Ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: BDAG
  rationale: As a liturgical/interjectional response, 'Amen' is both transparent and
    traditional, and it preserves the prayerful assent of the speaker better than
    a paraphrase.
- source_word: ἔρχου
  chosen: Come
  alternatives:
  - Do come
  lexicon: BDAG
  rationale: Present middle imperative, second singular, is a direct appeal to the
    Lord. 'Come' is the natural imperative in English and preserves the brevity and
    urgency of the prayer.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, the title is rendered 'Lord.' In direct
    address to Jesus, this preserves both reverence and established NT title usage.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    project policy.
