theological_decisions:
- issue: Sense of ταχύ in the promise of Christ's coming
  chosen_reading: soon
  alternative_readings:
  - quickly
  - swiftly
  rationale: The adverb ταχύ can indicate either temporal nearness or rapid execution.
    In this closing exchange, 'I am coming soon' best fits idiomatic English and the
    church's responsive prayer, while not denying the nuance of suddenness. Because
    the term is interpretively significant in eschatological contexts, the alternative
    is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
