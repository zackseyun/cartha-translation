theological_decisions:
- issue: Textual variant at 'tree of life' versus the later Byzantine reading 'book
    of life'
  chosen_reading: tree of life
  alternative_readings:
  - book of life
  rationale: The provided SBLGNT text reads ξύλου τῆς ζωῆς ('tree of life'), which
    is strongly supported by critical editions and fits the immediate context of Revelation
    22. Because 'book of life' is a well-known variant in translation tradition, it
    should be preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where significant.'
