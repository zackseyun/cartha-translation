id: REV.22.19
reference: Revelation 22:19
source:
  edition: SBLGNT
  text: καὶ ἐάν τις ἀφέλῃ ἀπὸ τῶν λόγων τοῦ βιβλίου τῆς προφητείας ταύτης, ⸀ἀφελεῖ
    ὁ θεὸς τὸ μέρος αὐτοῦ ἀπὸ τοῦ ξύλου τῆς ζωῆς καὶ ἐκ τῆς πόλεως τῆς ἁγίας, τῶν
    γεγραμμένων ἐν τῷ βιβλίῳ τούτῳ.
translation:
  text: and if anyone takes away from the words of the book of this prophecy, God
    will take away his share from the tree of life and from the holy city, which are
    written in this book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'book of life' instead of 'tree of life.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀφέλῃ
  chosen: takes away
  alternatives:
  - removes
  - subtracts
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν in a conditional clause. 'Takes away' is
    natural English and preserves the verbal parallel with future ἀφελεῖ later in
    the verse.
- source_word: λόγων
  chosen: words
  alternatives:
  - sayings
  lexicon: BDAG
  rationale: λόγος here refers to the verbal content of the prophecy. 'Words' is the
    most direct and suitably formal rendering in a warning about altering the text.
- source_word: βιβλίου
  chosen: book
  alternatives:
  - scroll
  lexicon: BDAG
  rationale: Although βιβλίον can denote a scroll in ancient context, 'book' is the
    conventional and readily understood English rendering here. The phrase 'book of
    this prophecy' is idiomatic and reflects the source closely.
- source_word: προφητείας
  chosen: prophecy
  alternatives:
  - prophetic message
  lexicon: BDAG
  rationale: '''Prophecy'' preserves the genre designation and solemnity of the warning
    without unnecessary expansion.'
- source_word: ἀφελεῖ
  chosen: will take away
  alternatives:
  - will remove
  lexicon: BDAG
  rationale: 'Future indicative matching the earlier ἀφέλῃ. Rendering it with the
    same English verb preserves the deliberate reciprocity: the one who takes away
    will have something taken away by God.'
- source_word: μέρος
  chosen: share
  alternatives:
  - part
  - portion
  lexicon: BDAG
  rationale: '''Share'' communicates allotted participation or inheritance more clearly
    in contemporary English than ''part,'' while remaining faithful to the noun''s
    sense.'
- source_word: ξύλου τῆς ζωῆς
  chosen: tree of life
  alternatives:
  - wood of life
  lexicon: BDAG
  rationale: ξύλον in this context clearly refers to the apocalyptic 'tree of life.'
    This also matches the immediate context in Revelation 22:2, 14.
- source_word: πόλεως τῆς ἁγίας
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: BDAG
  rationale: Standard rendering of the phrase, preserving the definite article and
    the covenantal/apocalyptic designation.
- source_word: τῶν γεγραμμένων ἐν τῷ βιβλίῳ τούτῳ
  chosen: which are written in this book
  alternatives:
  - that are written in this book
  - described in this book
  lexicon: BDAG
  rationale: The participial phrase is best taken as referring back to both 'the tree
    of life' and 'the holy city.' 'Which are written in this book' preserves the passive
    perfect sense γεγραμμένων and keeps the syntax transparent.
