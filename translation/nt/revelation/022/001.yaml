theological_decisions:
- issue: Shared throne imagery for God and the Lamb
  chosen_reading: Rendered 'from the throne of God and of the Lamb' without restructuring.
  alternative_readings:
  - from the throne belonging jointly to God and the Lamb
  - from the thrones of God and the Lamb
  rationale: The Greek has singular 'throne' with coordinated genitives, presenting
    a shared throne in the vision. The translation preserves this wording and its
    theological force without adding explanatory language. A plural 'thrones' would
    contradict the Greek form.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 preserve theological tension rather than resolve
    it'
