id: REV.22.1
reference: Revelation 22:1
source:
  edition: SBLGNT
  text: Καὶ ἔδειξέν μοι ⸀ποταμὸν ὕδατος ζωῆς λαμπρὸν ὡς κρύσταλλον, ἐκπορευόμενον
    ἐκ τοῦ θρόνου τοῦ θεοῦ καὶ τοῦ ἀρνίου
translation:
  text: And he showed me a river of the water of life, bright as crystal, flowing
    out from the throne of God and of the Lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like crystal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'proceeding from the throne of God and of the Lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδειξέν
  chosen: showed
  alternatives:
  - revealed
  - displayed
  lexicon: BDAG
  rationale: Aorist active of δείκνυμι commonly means 'show' or 'point out.' 'Showed'
    is natural English and preserves the visionary scene without adding interpretive
    weight.
- source_word: μοι
  chosen: me
  lexicon: BDAG
  rationale: Simple dative indirect object; rendered directly as 'me.'
- source_word: ποταμὸν
  chosen: a river
  alternatives:
  - the river
  - stream
  lexicon: BDAG
  rationale: Anarthrous accusative is naturally indefinite here in English. 'River'
    best matches ποταμός; 'stream' is too small, and 'the river' would over-specify.
- source_word: ὕδατος ζωῆς
  chosen: of the water of life
  alternatives:
  - life-giving water
  - living water
  lexicon: BDAG
  rationale: The genitive chain is preserved formally as 'water of life.' This keeps
    the biblical imagery intact and avoids collapsing the phrase into an interpretive
    paraphrase such as 'life-giving water.' 'Living water' is possible in broader
    biblical theology but is not the most direct rendering of this exact construction.
- source_word: λαμπρὸν
  chosen: bright
  alternatives:
  - shining
  - radiant
  - clear
  lexicon: BDAG
  rationale: λαμπρός denotes brightness or radiance. 'Bright' is concise and idiomatic.
    'Clear' is influenced by traditional English renderings and by the comparison
    with crystal, but the adjective itself primarily denotes brightness rather than
    transparency.
- source_word: ὡς κρύσταλλον
  chosen: as crystal
  alternatives:
  - like crystal
  lexicon: BDAG
  rationale: ὡς marks comparison. 'As crystal' is idiomatic and preserves the simile.
    'Like crystal' would also be acceptable, but 'as crystal' is slightly more compact.
- source_word: ἐκπορευόμενον
  chosen: flowing out
  alternatives:
  - coming out
  - proceeding
  lexicon: BDAG
  rationale: Present middle/passive participle modifying 'river.' 'Flowing out' captures
    the motion appropriate to a river in natural English. 'Proceeding' is more formal
    and traditional but less vivid for modern readers.
- source_word: ἐκ τοῦ θρόνου
  chosen: from the throne
  alternatives:
  - out of the throne
  lexicon: BDAG
  rationale: ἐκ indicates source/origin. 'From the throne' is standard English and
    clearly expresses source.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward genitive dependent on 'throne.'
- source_word: καὶ τοῦ ἀρνίου
  chosen: and of the Lamb
  lexicon: BDAG
  rationale: ἀρνίον in Revelation is a major christological title. 'The Lamb' preserves
    the established apocalyptic and sacrificial imagery and the definite article in
    context.
