id: REV.22.2
reference: Revelation 22:2
source:
  edition: SBLGNT
  text: ἐν μέσῳ τῆς πλατείας αὐτῆς· καὶ τοῦ ποταμοῦ ἐντεῦθεν καὶ ἐκεῖθεν ξύλον ζωῆς
    ποιοῦν καρποὺς δώδεκα, κατὰ μῆνα ἕκαστον ⸀ἀποδιδοῦν τὸν καρπὸν αὐτοῦ, καὶ τὰ φύλλα
    τοῦ ξύλου εἰς θεραπείαν τῶν ἐθνῶν.
translation:
  text: in the middle of its street, and on this side and on that side of the river,
    was the tree of life, bearing twelve kinds of fruit, yielding its fruit each month.
    And the leaves of the tree are for the healing of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on either side of the river.' The Greek literally says 'on this side
      and on that side.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'producing twelve fruits.' The phrase may mean twelve kinds of fruit
      or a full, abundant cycle of fruitfulness.
    reason: lexical_alternative
  - marker: c
    text: The imagery echoes the tree of life in Genesis 2:9 and Ezekiel 47:12.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν μέσῳ
  chosen: in the middle of
  alternatives:
  - in the midst of
  lexicon: BDAG
  rationale: A natural English rendering of the locative phrase that preserves the
    spatial sense without archaic tone.
- source_word: πλατείας
  chosen: street
  alternatives:
  - square
  - broad street
  lexicon: BDAG
  rationale: πλατεῖα can denote a broad street or public square. Here 'street' fits
    the city imagery and reads naturally in English, while the possessive 'its' preserves
    αὐτῆς.
- source_word: ἐντεῦθεν καὶ ἐκεῖθεν
  chosen: on this side and on that side
  alternatives:
  - on either side
  - here and there
  lexicon: BDAG
  rationale: This preserves the distributive spatial expression more transparently
    than the smoother but slightly interpretive 'on either side.'
- source_word: ξύλον ζωῆς
  chosen: the tree of life
  alternatives:
  - a tree of life
  - wood of life
  lexicon: BDAG
  rationale: Although ξύλον can mean 'wood' or 'tree,' the Genesis/Revelation intertext
    clearly favors 'tree.' The anarthrous construction is rendered definitely because
    the referent is the well-known eschatological/tree-of-Eden image.
- source_word: ποιοῦν καρποὺς δώδεκα
  chosen: bearing twelve kinds of fruit
  alternatives:
  - producing twelve fruits
  - making twelve fruits
  lexicon: BDAG
  rationale: The participle ποιοῦν with καρπούς idiomatically means producing/bearing
    fruit. 'Twelve kinds of fruit' best conveys the sense in context, likely twelve
    recurring varieties or crops rather than merely a count of twelve individual fruits.
- source_word: κατὰ μῆνα ἕκαστον
  chosen: each month
  alternatives:
  - every month
  - month by month
  lexicon: BDAG
  rationale: A concise idiomatic rendering of the distributive phrase, preserving
    regular monthly recurrence.
- source_word: ἀποδιδοῦν τὸν καρπὸν αὐτοῦ
  chosen: yielding its fruit
  alternatives:
  - giving its fruit
  - rendering its fruit
  lexicon: BDAG
  rationale: ἀποδίδωμι here conveys giving forth or yielding produce. 'Yielding' is
    idiomatic in English for agricultural imagery.
- source_word: φύλλα
  chosen: leaves
  lexicon: BDAG
  rationale: Straightforward botanical term.
- source_word: εἰς θεραπείαν
  chosen: for the healing
  alternatives:
  - for healing
  - for health
  lexicon: BDAG
  rationale: θεραπεία can denote healing or restoration. 'For the healing' preserves
    the telic force of εἰς and the concrete noun form.
- source_word: τῶν ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - for the peoples
  lexicon: BDAG
  rationale: In Revelation, ἔθνη commonly refers to nations/peoples broadly, not specifically
    Gentiles in contrast to Jews. 'Nations' preserves the eschatological scope.
