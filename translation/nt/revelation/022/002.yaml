theological_decisions:
- issue: Syntactical tension in the spatial description of the tree relative to the
    street and river
  chosen_reading: 'Render the verse with a singular collective image: ''the tree of
    life'' located in relation to both the street and both sides of the river, without
    forcing a more explicit restructuring.'
  alternative_readings:
  - Render as plural, 'trees of life,' to match the 'on this side and on that side'
    language
  - Restructure more dynamically as 'on either side of the river stood the tree of
    life in the middle of the street'
  rationale: The Greek text presents a famously compressed apocalyptic image. Retaining
    the singular 'tree of life' respects the transmitted wording and the Genesis intertext,
    while allowing the visionary symbolism to stand without over-resolving the geography.
  doctrine_reference: Preserve theological tension rather than resolve it.
