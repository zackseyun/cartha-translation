id: REV.22.15
reference: Revelation 22:15
source:
  edition: SBLGNT
  text: ἔξω οἱ κύνες καὶ οἱ φάρμακοι καὶ οἱ πόρνοι καὶ οἱ φονεῖς καὶ οἱ εἰδωλολάτραι
    καὶ πᾶς φιλῶν καὶ ποιῶν ψεῦδος.
translation:
  text: Outside are the dogs and the sorcerers and the sexually immoral and the murderers
    and the idolaters, and everyone who loves and practices falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who loves and practices a lie.'
    reason: lexical_alternative
  - marker: b
    text: '''Dogs'' is likely metaphorical here, a term of exclusion and moral impurity;
      some interpreters take it more specifically.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔξω
  chosen: Outside are
  alternatives:
  - Outside
  - On the outside are
  lexicon: BDAG
  rationale: Predicate adverb indicating exclusion from the city described in the
    context. English supplies 'are' naturally. 'Outside are' preserves the emphatic
    fronting better than a smoother paraphrase.
- source_word: κύνες
  chosen: the dogs
  alternatives:
  - dogs
  lexicon: BDAG
  rationale: Retains the literal image 'dogs,' which in this context functions metaphorically
    for the excluded and morally impure. Avoided interpretive paraphrases so the apocalyptic
    imagery remains intact.
- source_word: φάρμακοι
  chosen: the sorcerers
  alternatives:
  - those who practice magic arts
  - magicians
  lexicon: BDAG
  rationale: In Revelation this term refers to practitioners of sorcery/magic, not
    merely poisoners or pharmacists. 'Sorcerers' is concise, standard, and communicates
    the religious-ethical force of the term.
- source_word: πόρνοι
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - the immoral
  lexicon: BDAG
  rationale: A broad term for those engaged in sexual immorality. 'Sexually immoral'
    is clearer in modern English than 'fornicators' and avoids narrowing the term
    too specifically.
- source_word: φονεῖς
  chosen: the murderers
  alternatives:
  - murderers
  lexicon: BDAG
  rationale: Straightforward rendering of the noun for those who commit murder.
- source_word: εἰδωλολάτραι
  chosen: the idolaters
  alternatives:
  - those who worship idols
  lexicon: BDAG
  rationale: Standard and accurate rendering; preserves the compact vice-list style.
- source_word: πᾶς φιλῶν καὶ ποιῶν ψεῦδος
  chosen: everyone who loves and practices falsehood
  alternatives:
  - everyone loving and doing a lie
  - everyone who loves and does falsehood
  - everyone who loves and practices a lie
  lexicon: BDAG
  rationale: πᾶς with participles is naturally rendered 'everyone who ...'. φιλῶν
    and ποιῶν are both durative participles, suggesting characteristic conduct, hence
    'loves and practices.' ψεῦδος can be 'lie' or 'falsehood'; 'falsehood' better
    captures both deceitful speech and broader allegiance to what is false in this
    climactic ethical list.
- source_word: ψεῦδος
  chosen: falsehood
  alternatives:
  - a lie
  - lie
  lexicon: BDAG
  rationale: Although singular, the noun can denote falsehood generally. 'Falsehood'
    reads naturally in English and fits the moral category alongside loving and practicing
    what is false.
