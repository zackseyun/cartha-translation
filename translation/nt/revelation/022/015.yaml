theological_decisions:
- issue: Whether 'dogs' should be interpreted in the main text as a specific subgroup
    (e.g., male prostitutes, the impure, or outsiders generally) rather than translated
    literally.
  chosen_reading: Retain the literal term 'dogs' in the main text.
  alternative_readings:
  - male prostitutes
  - the impure
  - the shameless
  rationale: The Greek uses the concrete image κύνες, and Revelation regularly employs
    vivid symbolic language. Translating the metaphor literally preserves the text's
    rhetorical force and avoids importing one debated interpretation into the main
    text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether ψεῦδος should be rendered narrowly as 'a lie' or more broadly as
    'falsehood.'
  chosen_reading: Render broadly as 'falsehood.'
  alternative_readings:
  - a lie
  rationale: The phrase describes settled allegiance and conduct ('loving and practicing'),
    so the broader moral category is likely intended, not merely isolated acts of
    lying. This preserves theological tension between false speech and broader participation
    in what is false.
  doctrine_reference: Translation philosophy §3
