theological_decisions:
- issue: Interpretation of ἐν τάχει in an eschatological context
  chosen_reading: soon
  alternative_readings:
  - quickly
  rationale: The phrase can denote either temporal nearness ('soon') or rapidity once
    events begin ('quickly'). The immediate context of Revelation repeatedly uses
    this language to stress imminence, so 'soon' is retained in the main text, while
    the alternative is preserved in a footnote to avoid over-resolving a debated eschatological
    nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of δοῦλοι for God's people
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The translation philosophy explicitly prefers 'slave' where the bonded
    nature of δοῦλος is theologically salient. Because the referents are those who
    belong to God and receive his revelation, that belonging is significant enough
    to justify 'slaves' in the main text, while traditional alternatives are noted
    lexically.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος.
