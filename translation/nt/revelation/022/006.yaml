id: REV.22.6
reference: Revelation 22:6
source:
  edition: SBLGNT
  text: Καὶ ⸀εἶπέν μοι· Οὗτοι οἱ λόγοι πιστοὶ καὶ ἀληθινοί, καὶ ⸀ὁ κύριος, ὁ θεὸς
    τῶν πνευμάτων τῶν προφητῶν, ἀπέστειλεν τὸν ἄγγελον αὐτοῦ δεῖξαι τοῖς δούλοις αὐτοῦ
    ἃ δεῖ γενέσθαι ἐν τάχει·
translation:
  text: And he said to me, “These words are trustworthy and true, and the Lord, the
    God of the spirits of the prophets, sent his angel to show his slaves what must
    happen soon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what must happen quickly.” The Greek phrase can emphasize either nearness
      in time (“soon”) or rapidity of occurrence (“quickly”).
    reason: alternative_reading
  - marker: b
    text: Or “servants” or “bondservants” for “slaves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστοὶ
  chosen: trustworthy
  alternatives:
  - faithful
  lexicon: BDAG
  rationale: In the predicate pair πιστοὶ καὶ ἀληθινοί describing λόγοι, 'trustworthy'
    communicates reliability of the message in idiomatic modern English better than
    'faithful,' which is less natural for 'words' in English.
- source_word: ἀληθινοί
  chosen: 'true'
  alternatives:
  - genuine
  - truthful
  lexicon: BDAG
  rationale: '''True'' is the most direct and natural rendering in this collocation
    (''trustworthy and true''), preserving both veracity and authenticity without
    overcomplication.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. Here it functions
    as a divine title in apposition with 'the God of the spirits of the prophets,'
    so 'Lord' best preserves biblical-theological resonance.
- source_word: θεὸς τῶν πνευμάτων τῶν προφητῶν
  chosen: the God of the spirits of the prophets
  alternatives:
  - the God who inspires the prophets
  - the God of the prophetic spirits
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the genitival structure and avoids
    importing an interpretive paraphrase about inspiration. The phrase likely refers
    to God as sovereign over the spirits belonging to the prophets, but the translation
    leaves that relation transparent rather than resolved.
- source_word: ἄγγελον
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation, ἄγγελος regularly refers to a heavenly angelic being unless
    context clearly indicates a human messenger. The apocalyptic context strongly
    supports 'angel.'
- source_word: δούλοις
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per project philosophy, δοῦλος should be rendered 'slave' where the bonded
    nature is salient. Here the designation of God's people as those belonging to
    him supports 'slaves,' even though 'servants' is traditional.
- source_word: δεῖξαι
  chosen: to show
  alternatives:
  - to reveal
  - to make known
  lexicon: BDAG
  rationale: '''To show'' is the straightforward gloss of δείκνυμι and fits the visionary
    context without adding interpretive nuance.'
- source_word: ἃ δεῖ γενέσθαι
  chosen: what must happen
  alternatives:
  - the things that must take place
  - what must come to pass
  lexicon: BDAG
  rationale: This compresses the Greek idiom into natural English while preserving
    the sense of divine necessity in δεῖ and eventuation in γενέσθαι.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in a short time
  lexicon: BDAG
  rationale: In this context the phrase most naturally indicates temporal nearness
    from the narrator's perspective. 'Soon' is idiomatic and concise; 'quickly' can
    suggest manner rather than time, though that nuance is worth preserving in a footnote
    because the phrase is debated in eschatological interpretation.
- source_word: Καὶ εἶπέν μοι
  chosen: And he said to me
  alternatives:
  - Then he said to me
  lexicon: BDAG
  rationale: A simple connective plus speech introduction reflects the Greek without
    overinterpreting καί as a stronger temporal transition.
