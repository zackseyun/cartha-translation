theological_decisions:
- issue: Textual variant in the first clause
  chosen_reading: Translate the SBLGNT reading 'those who wash their robes.'
  alternative_readings:
  - '''those who do his commandments'' (or ''those who keep his commandments'')'
  rationale: The provided source text reads πλύνοντες τὰς στολὰς αὐτῶν ('washing their
    robes'), a well-known textual variant against the Byzantine/TR reading ποιoῦντες
    τὰς ἐντολὰς αὐτοῦ ('doing his commandments'). Following original-language primacy,
    the main text reflects the given critical text, while the alternative is preserved
    in a footnote because of its prominence in translation tradition and theological
    significance.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relation of washing robes to access to life
  chosen_reading: Retain the text's stated connection without importing a doctrinal
    mechanism beyond the verse.
  alternative_readings:
  - Explicitly interpret the washing as a meritorious human act
  - Explicitly specify the robes are washed in the Lamb's blood from Rev 7:14 in the
    main text
  rationale: The verse itself states that those who wash their robes have the right
    to the tree of life and enter the city. The translation preserves this wording
    without adding explanatory theology not present in the verse, while allowing readers
    to connect the imagery with Revelation's broader symbolism.
  doctrine_reference: Translation philosophy §3
