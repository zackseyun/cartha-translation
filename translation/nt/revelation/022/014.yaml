id: REV.22.14
reference: Revelation 22:14
source:
  edition: SBLGNT
  text: Μακάριοι οἱ ⸂πλύνοντες τὰς στολὰς αὐτῶν⸃, ἵνα ἔσται ἡ ἐξουσία αὐτῶν ἐπὶ τὸ
    ξύλον τῆς ζωῆς καὶ τοῖς πυλῶσιν εἰσέλθωσιν εἰς τὴν πόλιν.
translation:
  text: Blessed are those who wash their robes, so that they may have the right to
    the tree of life and may enter the city by the gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'Blessed are those who do his commandments' or 'keep
      his commandments,' instead of 'wash their robes.'
    reason: textual_variant
  - marker: b
    text: The imagery of washing robes echoes Revelation 7:14, where robes are washed
      and made white in the blood of the Lamb.
    reason: cross_reference
  - marker: c
    text: Or 'through the gates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude rendering that preserves the covenantal and eschatological
    weight better than the more subjective 'happy' or merely circumstantial 'fortunate'.
- source_word: πλύνοντες
  chosen: wash
  alternatives:
  - are washing
  - cleanse
  lexicon: BDAG
  rationale: The present participle denotes those characterized by washing their robes.
    English simple present in a relative clause is natural and preserves the ongoing/defining
    sense without awkwardness. 'Cleanse' is more interpretive and less concrete than
    the verb's ordinary sense.
- source_word: στολάς
  chosen: robes
  alternatives:
  - garments
  lexicon: BDAG
  rationale: '''Robes'' is the conventional and contextually fitting rendering in
    Revelation for στολή, especially in visionary scenes; it preserves the symbolic
    clothing imagery.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose/result clearly in contemporary English while preserving
    the clause linkage.
- source_word: ἔσται
  chosen: may have
  alternatives:
  - will be
  - might have
  lexicon: BDAG
  rationale: Although the verb is future ('will be'), in English the idiom 'so that
    they may have the right' best conveys the ἵνα + future construction as intended
    result. A more literal 'so that their authority/right will be' is less natural.
- source_word: ἐξουσία
  chosen: the right
  alternatives:
  - authority
  - power
  lexicon: BDAG
  rationale: Here ἐξουσία denotes rightful access or entitlement rather than ruling
    authority or raw power. 'The right' best fits the context of access to the tree
    of life.
- source_word: ἐπὶ τὸ ξύλον τῆς ζωῆς
  chosen: to the tree of life
  alternatives:
  - over the tree of life
  - for the tree of life
  lexicon: BDAG
  rationale: With ἐξουσία, ἐπί here is best rendered idiomatically as access/right
    'to' the tree of life. A more wooden 'over' would mislead English readers into
    hearing dominion rather than access.
- source_word: πυλῶσιν
  chosen: by the gates
  alternatives:
  - through the gates
  - at the gates
  lexicon: BDAG
  rationale: 'The dative plural without a preposition is most naturally rendered as
    means or attendant circumstance here: entry into the city by way of its gates.
    ''By the gates'' is concise and natural, though ''through the gates'' is also
    possible.'
- source_word: εἰσέλθωσιν εἰς τὴν πόλιν
  chosen: may enter the city
  alternatives:
  - may go into the city
  lexicon: BDAG
  rationale: Standard rendering of the aorist subjunctive after ἵνα. 'Enter' is more
    idiomatic and elevated than 'go into' for this eschatological scene.
