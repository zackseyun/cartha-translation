id: REV.22.21
reference: Revelation 22:21
source:
  edition: SBLGNT
  text: Ἡ χάρις τοῦ κυρίου ⸀Ἰησοῦ μετὰ ⸀πάντων.
translation:
  text: The grace of the Lord Jesus be with all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'The grace of the Lord Jesus be with all the saints,'
      and others, 'with you all.'
    reason: textual_variant
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: Standard NT theological sense here in an epistolary benediction/closing
    blessing. 'Grace' preserves both the relational and salvific resonance without
    paraphrase.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a christological
    title. 'Lord' is the established and contextually appropriate title here.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: 'Personal name is transliterated per project philosophy: translate titles,
    transliterate names.'
- source_word: μετὰ
  chosen: be with
  alternatives:
  - with
  lexicon: BDAG
  rationale: Although the Greek is verbless ('with all'), English idiom in a benedictory
    formula normally supplies 'be' to make the blessing explicit and natural. This
    is a minimal, warranted supplementation rather than paraphrase.
- source_word: πάντων
  chosen: all
  alternatives:
  - all of you
  - all the saints
  lexicon: BDAG
  rationale: The Greek adjective/pronoun is broad and unqualified in the SBLGNT text.
    'All' preserves that breadth without importing an explicit object not present
    in the text.
