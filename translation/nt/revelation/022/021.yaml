theological_decisions:
- issue: Whether to specify the implied recipients of the benediction
  chosen_reading: 'Leave the object implicit: ''with all'''
  alternative_readings:
  - with all of you
  - with all the saints
  rationale: The Greek text ends simply with πάντων ('all'). Supplying 'of you' is
    idiomatic in some English traditions, and 'the saints' appears in other textual
    traditions, but the SBLGNT reading is broader and unqualified. The translation
    preserves the textual form while remaining readable by supplying only the implied
    verb.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
