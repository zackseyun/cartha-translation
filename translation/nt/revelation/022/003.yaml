id: REV.22.3
reference: Revelation 22:3
source:
  edition: SBLGNT
  text: καὶ πᾶν κατάθεμα οὐκ ἔσται ἔτι. καὶ ὁ θρόνος τοῦ θεοῦ καὶ τοῦ ἀρνίου ἐν αὐτῇ
    ἔσται, καὶ οἱ δοῦλοι αὐτοῦ λατρεύσουσιν αὐτῷ,
translation:
  text: And there will no longer be any curse. And the throne of God and of the Lamb
    will be in it, and his slaves will worship him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything accursed' or 'any accursed thing.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek has singular language: ''the throne'' of ''God and of the Lamb''
      ... ''his slaves will worship him,'' preserving both distinction between God
      and the Lamb and their shared rule.'
    reason: alternative_reading
  - marker: c
    text: Or 'servants' or 'bondservants.'
    reason: lexical_alternative
  - marker: d
    text: Or 'will serve' or 'will render sacred service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κατάθεμα
  chosen: any curse
  alternatives:
  - anything accursed
  - any accursed thing
  - any ban
  lexicon: BDAG
  rationale: The phrase is neuter singular with πᾶν giving a comprehensive sense.
    In this context, κατάθεμα most naturally denotes that which is under a curse or
    the state/effect of curse. English 'any curse' is idiomatic and fits the allusion
    to the removal of the curse in the new creation, while alternatives are preserved
    because the noun can be understood more concretely as 'accursed thing.'
- source_word: οὐκ ἔσται ἔτι
  chosen: there will no longer be
  alternatives:
  - will no longer exist
  - will not be anymore
  lexicon: BDAG
  rationale: This future existential construction is best rendered idiomatically in
    English as 'there will no longer be,' preserving both futurity and the adverb
    ἔτι ('any longer / still').
- source_word: θρόνος
  chosen: throne
  lexicon: BDAG
  rationale: Standard rendering; the singular is important and should be preserved.
- source_word: τοῦ θεοῦ καὶ τοῦ ἀρνίου
  chosen: of God and of the Lamb
  lexicon: BDAG
  rationale: Both genitives are retained explicitly in English. 'Lamb' is the established
    rendering of ἀρνίον in Revelation and preserves the sacrificial and messianic
    imagery.
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - in her
  - in the city
  lexicon: BDAG
  rationale: The pronoun is feminine singular, referring back to the city/new Jerusalem.
    'In it' is natural English for a city while preserving the locative sense. Alternatives
    are possible if one wishes to make the antecedent explicit or preserve the feminine
    personification.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος should be rendered 'slave' where bonded belonging
    is theologically salient. Here the inhabitants are wholly God's possession and
    render cultic service before his throne, so 'slaves' best preserves the force
    of the term, while alternatives are noted.
- source_word: λατρεύσουσιν
  chosen: will worship
  alternatives:
  - will serve
  - will render sacred service
  lexicon: BDAG
  rationale: λατρεύω often denotes cultic or sacred service rendered to God. In this
    throne-room and temple-like context, 'will worship' communicates the God-directed
    religious sense in clear English, though 'serve' is a viable lexical alternative.
- source_word: αὐτοῦ ... αὐτῷ
  chosen: his ... him
  alternatives:
  - their ... them
  lexicon: Greek grammar / discourse context
  rationale: The singular pronouns follow the singular subject 'the throne' with the
    coordinated genitives 'of God and of the Lamb.' Rendering them as singular preserves
    the Greek and the theological force of the shared divine rule, without flattening
    the distinction between God and the Lamb.
