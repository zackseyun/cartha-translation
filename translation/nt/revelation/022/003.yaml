theological_decisions:
- issue: Singular throne with coordinated genitives ('of God and of the Lamb') and
    singular pronouns
  chosen_reading: 'Retain the singulars: ''the throne ... his slaves will worship
    him'''
  alternative_readings:
  - 'Use plural pronouns for clarity: ''their servants ... worship them'''
  - Paraphrase to avoid the singular-pronoun tension
  rationale: The Greek text intentionally combines distinction ('God and the Lamb')
    with unity (one throne; singular pronouns). Per doctrine, theological tension
    should be preserved rather than resolved. Keeping the singular reflects the text's
    high Christology without importing later doctrinal wording into the translation.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
