theological_decisions:
- issue: Imminence language in apocalyptic context
  chosen_reading: for the time is near
  alternative_readings:
  - for the appointed time is near
  - for the time is at hand
  rationale: The verse asserts nearness without specifying a detailed eschatological
    timetable. The translation preserves the text's tension and does not soften or
    reinterpret the claim. 'Time' is retained rather than expanding to 'appointed
    time' in the main text, though that nuance is lexically possible in καιρός.
  doctrine_reference: Preserve theological tension rather than resolve it.
