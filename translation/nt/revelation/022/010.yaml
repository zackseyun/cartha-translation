id: REV.22.10
reference: Revelation 22:10
source:
  edition: SBLGNT
  text: Καὶ λέγει μοι· Μὴ σφραγίσῃς τοὺς λόγους τῆς προφητείας τοῦ βιβλίου τούτου,
    ὁ καιρὸς γὰρ ἐγγύς ἐστιν.
translation:
  text: And he says to me, “Do not seal up the words of the prophecy of this book,
    for the time is near.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not seal” or “Do not keep secret”; the phrase echoes prophetic language
      about whether a revelation is closed up or left open.
    reason: lexical_alternative
  - marker: b
    text: Or “for the appointed time is near.” Greek καιρός can mean a decisive or
      appointed time.
    reason: lexical_alternative
  - marker: c
    text: Compare Daniel 12:4, where the prophecy is told to be sealed; here the command
      is the opposite.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει μοι
  chosen: he says to me
  alternatives:
  - he said to me
  lexicon: BDAG
  rationale: The Greek uses the present tense λέγει, a common narrative present in
    Revelation. Rendering it as present preserves the vividness of the Greek; English
    can naturally carry this here.
- source_word: Μὴ σφραγίσῃς
  chosen: Do not seal up
  alternatives:
  - Do not seal
  - Do not keep secret
  lexicon: BDAG
  rationale: σφραγίζω means to seal, authenticate, or close up. In this prophetic
    context, 'seal up' best conveys the idea of closing off or withholding the message
    from disclosure, echoing Danielic language, while remaining transparent to the
    Greek.
- source_word: τοὺς λόγους
  chosen: the words
  alternatives:
  - the message
  - the sayings
  lexicon: BDAG
  rationale: λόγοι is most directly 'words.' Although 'message' could capture the
    collective sense, the plural concrete form should be preserved in the main text.
- source_word: τῆς προφητείας
  chosen: of the prophecy
  alternatives:
  - of this prophecy
  - of the prophetic message
  lexicon: BDAG
  rationale: 'The genitive is straightforward: these are the words belonging to the
    prophecy. ''Of the prophecy'' is formally close and idiomatic in English.'
- source_word: τοῦ βιβλίου τούτου
  chosen: of this book
  alternatives:
  - in this book
  - of this scroll
  lexicon: BDAG
  rationale: βιβλίον can mean book or scroll. 'Book' is the most natural modern English
    rendering and fits the referent in Revelation; 'scroll' is possible historically
    but would sound more interpretive here. The double genitive is represented naturally
    as 'the prophecy of this book.'
- source_word: ὁ καιρὸς
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: BDAG
  rationale: καιρός often denotes a decisive or appointed time rather than time in
    general. 'The time' is concise and traditional, while still allowing the eschatological
    force to be heard in context.
- source_word: ἐγγύς ἐστιν
  chosen: is near
  alternatives:
  - has drawn near
  - is at hand
  lexicon: BDAG
  rationale: ἐγγύς means near, close at hand. 'Is near' is the clearest contemporary
    English rendering; 'at hand' is understandable but more traditional/idiomatic
    than necessary.
