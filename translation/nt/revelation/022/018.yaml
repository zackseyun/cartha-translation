theological_decisions:
- issue: Nature of the statement as warning versus testimony
  chosen_reading: Rendered the opening as 'I testify' rather than 'I warn,' allowing
    the warning force to arise from the content.
  alternative_readings:
  - I warn everyone who hears
  rationale: The Greek verb is witness-language, and the translation should not collapse
    that into a purely interpretive paraphrase. The solemn covenantal/judicial warning
    remains clear from the following conditional judgment.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text says without importing more explicit
    doctrinal force than warranted.'
