id: REV.22.18
reference: Revelation 22:18
source:
  edition: SBLGNT
  text: Μαρτυρῶ ἐγὼ παντὶ τῷ ἀκούοντι τοὺς λόγους τῆς προφητείας τοῦ βιβλίου τούτου·
    ἐάν τις ἐπιθῇ ἐπ’ αὐτά, ⸀ἐπιθήσει ὁ θεὸς ἐπ’ αὐτὸν τὰς πληγὰς τὰς γεγραμμένας
    ἐν τῷ βιβλίῳ τούτῳ·
translation:
  text: 'I testify to everyone who hears the words of the prophecy of this book: if
    anyone adds to them, God will add to him the plagues that are written in this
    book.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scroll' for 'book' (βιβλίον), reflecting the ancient physical form of
      the writing.
    reason: lexical_alternative
  - marker: b
    text: Or 'I bear witness to'; the opening verb is testimony language, not merely
      a generic warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μαρτυρῶ
  chosen: I testify
  alternatives:
  - I warn
  - I bear witness
  lexicon: BDAG
  rationale: μαρτυρέω primarily means to testify or bear witness. 'I testify' preserves
    the solemn juridical/witness force without over-interpreting it as merely 'warn,'
    though the warning sense is contextually present.
- source_word: παντὶ τῷ ἀκούοντι
  chosen: to everyone who hears
  alternatives:
  - to everyone hearing
  - to every one who hears
  lexicon: BDAG
  rationale: The dative participial construction is naturally rendered in English
    as 'to everyone who hears.' Present participle conveys ongoing/receptive hearing,
    but idiomatic English uses the finite verb.
- source_word: τοὺς λόγους
  chosen: the words
  alternatives:
  - the sayings
  - the message
  lexicon: BDAG
  rationale: λόγοι here refers to the verbal contents of the prophecy. 'Words' is
    the most direct and suitably formal rendering.
- source_word: τῆς προφητείας
  chosen: of the prophecy
  alternatives:
  - of this prophecy
  - of the prophetic message
  lexicon: BDAG
  rationale: The genitive is straightforward. 'Prophecy' preserves the apocalyptic/prophetic
    category of the book's contents without reducing it to generic prediction.
- source_word: τοῦ βιβλίου τούτου
  chosen: of this book
  alternatives:
  - of this scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll in ancient context, but 'book' is the standard,
    natural English rendering here and matches the immediate literary reference. 'Scroll'
    is possible but less idiomatic for modern readers in this warning formula.
- source_word: ἐάν τις ἐπιθῇ ἐπ’ αὐτά
  chosen: if anyone adds to them
  alternatives:
  - if anyone lays anything upon them
  - if anyone adds anything to them
  lexicon: BDAG
  rationale: ἐπιτίθημι with ἐπί + accusative here means to add to. 'Adds to them'
    is concise and idiomatic; the object 'anything' is implied by English usage and
    need not be supplied.
- source_word: ἐπιθήσει ὁ θεὸς ἐπ’ αὐτὸν
  chosen: God will add to him
  alternatives:
  - God will lay upon him
  - God will impose on him
  lexicon: BDAG
  rationale: 'The future of the same verb creates deliberate lexical correspondence
    with the prior clause. Rendering both with ''add'' preserves the rhetorical symmetry:
    if someone adds, God will add.'
- source_word: τὰς πληγὰς
  chosen: the plagues
  alternatives:
  - the afflictions
  - the blows
  lexicon: BDAG
  rationale: πληγή in Revelation commonly refers to plagues/judgments. 'Plagues' preserves
    intertextual resonance within the book.
- source_word: τὰς γεγραμμένας
  chosen: that are written
  alternatives:
  - that have been written
  - written
  lexicon: BDAG
  rationale: Perfect passive participle indicates what stands written. 'That are written'
    is idiomatic and reflects the enduring written status without awkwardness.
- source_word: ἐν τῷ βιβλίῳ τούτῳ
  chosen: in this book
  alternatives:
  - in this scroll
  lexicon: BDAG
  rationale: Repeated phrase should be rendered consistently within the verse. 'Book'
    maintains readability and internal consistency.
