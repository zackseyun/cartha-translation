id: REV.22.4
reference: Revelation 22:4
source:
  edition: SBLGNT
  text: καὶ ὄψονται τὸ πρόσωπον αὐτοῦ, καὶ τὸ ὄνομα αὐτοῦ ἐπὶ τῶν μετώπων αὐτῶν.
translation:
  text: and they will see his face, and his name will be on their foreheads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will behold his face.'
    reason: lexical_alternative
  - marker: b
    text: The singular pronouns 'his' may refer to God, or reflect the shared divine
      reign of God and the Lamb in the immediate context.
    reason: alternative_reading
lexical_decisions:
- source_word: ὄψονται
  chosen: they will see
  alternatives:
  - they will behold
  lexicon: BDAG
  rationale: Future middle indicative of ὁράω, here functioning with straightforward
    future sense. 'See' is the most natural modern English rendering; 'behold' is
    possible but sounds elevated and archaic for the project's style.
- source_word: πρόσωπον
  chosen: face
  alternatives:
  - presence
  lexicon: BDAG
  rationale: The primary sense is 'face.' While πρόσωπον can sometimes extend to 'presence,'
    the direct object with ὄψονται strongly favors the concrete expression 'see his
    face,' which also preserves the relational and visual force of the Greek.
- source_word: ὄνομα
  chosen: name
  lexicon: BDAG
  rationale: Standard rendering of ὄνομα. In biblical usage 'name' can imply identity,
    ownership, or character, but the text itself states simply that his name is on
    their foreheads, so the translation keeps the lexical form and leaves the fuller
    implications to interpretation rather than importing them into the main text.
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  chosen: on their foreheads
  alternatives:
  - upon their foreheads
  lexicon: BDAG
  rationale: ἐπί with the genitive here indicates position/resting on. 'On their foreheads'
    is idiomatic modern English; 'upon' is more formal but not necessary. The plural
    μετώπων is preserved with 'foreheads.'
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Both occurrences are rendered with simple coordination, preserving the
    additive structure of the Greek.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun is rendered directly as 'his' rather than replacing it with
    an explicit noun. This preserves the Greek cohesion with the preceding context
    while allowing the referent to remain contextually determined.
