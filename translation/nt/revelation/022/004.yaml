theological_decisions:
- issue: Referent of 'his' in 'his face' and 'his name'
  chosen_reading: Retain the pronoun 'his' without specifying the referent in the
    translation.
  alternative_readings:
  - God
  - the Lord God and the Lamb in shared reign/context
  rationale: The immediate context includes both God and the Lamb in close relation
    (especially Rev 22:3), and this verse's singular pronouns contribute to Revelation's
    high Christological and theological texture. The translation should not resolve
    the referent more narrowly than the Greek does. Keeping 'his' preserves the textual
    ambiguity/tension rather than importing an interpretive decision.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
