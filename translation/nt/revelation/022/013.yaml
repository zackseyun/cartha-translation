id: REV.22.13
reference: Revelation 22:13
source:
  edition: SBLGNT
  text: ἐγὼ τὸ Ἄλφα καὶ τὸ Ὦ, ὁ πρῶτος καὶ ὁ ἔσχατος, ⸀ἡ ἀρχὴ καὶ ⸀τὸ τέλος.
translation:
  text: I am the Alpha and the Omega, the first and the last, the beginning and the
    end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the origin and the goal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: Rendered as the explicit first-person pronoun 'I.' Greek includes the
    pronoun for emphasis, but English can preserve the force adequately with 'I am'
    in this solemn self-declaration without adding the more marked 'I myself.'
- source_word: τὸ Ἄλφα
  chosen: the Alpha
  lexicon: BDAG
  rationale: Retained as 'the Alpha,' the name of the first Greek letter, because
    the expression is a fixed symbolic title in Revelation and is best preserved rather
    than paraphrased as 'the A.' The article is carried over with 'the.'
- source_word: τὸ Ὦ
  chosen: the Omega
  alternatives:
  - the O
  lexicon: BDAG
  rationale: Rendered 'the Omega,' preserving the established symbolic title corresponding
    to the last Greek letter. 'The O' would be formally possible but unnatural and
    would obscure the title's recognized force.
- source_word: ὁ πρῶτος
  chosen: the first
  lexicon: BDAG
  rationale: Straightforward rendering of the adjectival substantive. In this context
    it functions as a title expressing primacy and ultimacy.
- source_word: ὁ ἔσχατος
  chosen: the last
  alternatives:
  - the final
  lexicon: BDAG
  rationale: Rendered 'the last' as the most direct equivalent and as the natural
    counterpart to 'the first.' 'The final' is possible but less idiomatic in this
    titular sequence.
- source_word: ἡ ἀρχὴ
  chosen: the beginning
  alternatives:
  - the origin
  lexicon: BDAG
  rationale: Rendered 'the beginning' to preserve the parallelism with 'the end' and
    the traditional apocalyptic idiom. 'Origin' is semantically possible and can highlight
    source, but here the paired expression favors the temporal/comprehensive formulation.
- source_word: τὸ τέλος
  chosen: the end
  alternatives:
  - the goal
  lexicon: BDAG
  rationale: Rendered 'the end' as the natural pair to 'the beginning.' While τέλος
    can also denote goal or consummation, 'the end' best preserves the compact title
    and its literary balance in context.
