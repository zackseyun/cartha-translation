id: REV.22.9
reference: Revelation 22:9
source:
  edition: SBLGNT
  text: καὶ λέγει μοι· Ὅρα μή· σύνδουλός σού εἰμι καὶ τῶν ἀδελφῶν σου τῶν προφητῶν
    καὶ τῶν τηρούντων τοὺς λόγους τοῦ βιβλίου τούτου· τῷ θεῷ προσκύνησον.
translation:
  text: And he says to me, “Do not do that! I am a fellow slave with you and with
    your brothers the prophets, and with those who keep the words of this book. Worship
    God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am a fellow servant with you.' The Greek term denotes shared slave-status
      under a master; here it emphasizes that the angel, like John, is under God and
      therefore not to be worshiped.
    reason: lexical_alternative
  - marker: b
    text: The prohibition is elliptical in Greek, literally 'See not' or 'Watch out,
      no'; the sense is 'Do not do that,' referring to John's attempted worship of
      the angel.
    reason: lexical_alternative
  - marker: c
    text: 'Compare Revelation 19:10, where the angel gives the same correction: ''Worship
      God.'''
    reason: cross_reference
lexical_decisions:
- source_word: Ὅρα μή
  chosen: Do not do that!
  alternatives:
  - See that you do not
  - Watch out—do not
  lexicon: BDAG
  rationale: The idiom Ὅρα μή in this context is an abrupt prohibition responding
    to John's attempted worship (cf. the parallel in Rev 19:10). English needs the
    implied action supplied for clarity; 'Do not do that!' is natural and faithful
    to the force of the prohibition.
- source_word: σύνδουλός
  chosen: fellow slave
  alternatives:
  - fellow servant
  - co-slave
  lexicon: BDAG
  rationale: σύνδουλος denotes one who shares slave-status with another. In keeping
    with the project's guidance on δοῦλος-language, 'slave' is preferred where bonded
    status is salient. Here the angel denies receiving worship by identifying himself
    as under the same divine master, so 'fellow slave' preserves that force better
    than 'fellow servant'.
- source_word: ἀδελφῶν σου
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your fellow believers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and should be rendered gender-accurately
    per project philosophy. Here it likely refers specifically to fellow members of
    the Christian community, further defined as 'the prophets,' but the text itself
    says 'brothers,' so that wording is retained.
- source_word: τῶν προφητῶν
  chosen: the prophets
  alternatives:
  - who are prophets
  lexicon: BDAG
  rationale: The genitive phrase is appositional or epexegetical to 'your brothers,'
    identifying them as 'the prophets.' The simple rendering 'the prophets' is both
    natural and sufficiently transparent.
- source_word: τηρούντων
  chosen: keep
  alternatives:
  - obey
  - guard
  lexicon: BDAG
  rationale: τηρέω can mean keep, observe, obey, or guard. In Revelation, with 'the
    words,' it carries the sense of faithful observance. 'Keep' preserves the verbal
    link to other Johannine usage without over-interpreting toward either mere guarding
    or active obedience alone.
- source_word: λόγους
  chosen: the words
  alternatives:
  - the message
  - the sayings
  lexicon: BDAG
  rationale: λόγοι here refers to the verbal contents of the prophecy/book. 'Words'
    is the most direct rendering and matches the repeated diction in Revelation.
- source_word: βιβλίου τούτου
  chosen: this book
  alternatives:
  - this scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll in ancient context, but 'book' is standard
    readable English and fits the referent in Revelation. 'Scroll' is possible but
    not required by the immediate context.
- source_word: τῷ θεῷ προσκύνησον
  chosen: Worship God
  alternatives:
  - Bow down to God
  lexicon: BDAG
  rationale: προσκυνέω in Revelation regularly denotes worshipful prostration or homage.
    Since the contrast is between misdirected worship toward the angel and proper
    worship toward God, 'Worship God' best captures the theological and lexical force
    in clear English.
