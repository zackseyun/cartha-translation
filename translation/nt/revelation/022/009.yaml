theological_decisions:
- issue: Rendering of δουλος-language in σύνδουλος
  chosen_reading: Use 'fellow slave' rather than 'fellow servant.'
  alternative_readings:
  - fellow servant
  - co-servant
  rationale: The verse's theological point is that the angel is not an object of worship
    but a fellow subordinate under God. Rendering the bonded status explicitly strengthens
    the contrast intended by the text and aligns with the project's stated handling
    of doulos terminology where that status is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος
- issue: Supplying the implied object in the prohibition Ὅρα μή
  chosen_reading: Explicitly render the implied action as 'Do not do that!'
  alternative_readings:
  - See that you do not
  - Do not
  rationale: 'The Greek prohibition is elliptical, but the narrative context makes
    the referent clear: John must not worship the angel. Supplying the implied action
    in idiomatic English clarifies the sense without adding a new doctrinal claim.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
