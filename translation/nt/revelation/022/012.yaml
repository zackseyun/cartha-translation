id: REV.22.12
reference: Revelation 22:12
source:
  edition: SBLGNT
  text: Ἰδοὺ ἔρχομαι ταχύ, καὶ ὁ μισθός μου μετ’ ἐμοῦ, ἀποδοῦναι ἑκάστῳ ὡς τὸ ἔργον
    ⸀ἐστὶν αὐτοῦ.
translation:
  text: Behold, I am coming soon, and my reward is with me, to repay each one according
    to what his work is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am coming quickly.' The Greek ταχύ can emphasize either nearness ('soon')
      or swiftness/suddenness ('quickly').
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic/apocalyptic attention-getter with elevated but
    still intelligible English. 'Look' or 'See' are possible, but 'Behold' better
    matches the solemn register of Revelation without becoming archaic in this context.
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  lexicon: BDAG
  rationale: Present tense with futurist force in context; English progressive naturally
    conveys imminent arrival. 'I come' is more formal but less idiomatic in modern
    English.
- source_word: ταχύ
  chosen: soon
  alternatives:
  - quickly
  - swiftly
  lexicon: BDAG
  rationale: In this eschatological context, the adverb can denote nearness/imminence
    as well as speed. 'Soon' communicates the expected sense in natural English. 'Quickly'
    is preserved in a footnote because it is a common and viable alternative that
    emphasizes suddenness/speed.
- source_word: ὁ μισθός μου
  chosen: my reward
  alternatives:
  - my wages
  - my recompense
  lexicon: BDAG
  rationale: μισθός commonly denotes reward, pay, or wages. 'Reward' is the most natural
    and contextually fitting in divine judgment/recompense language. 'Wages' sounds
    overly commercial here; 'recompense' is accurate but less readable.
- source_word: μετ’ ἐμοῦ
  chosen: is with me
  alternatives:
  - with me
  lexicon: BDAG
  rationale: The copula is implied in the verbless clause and must be supplied in
    English. 'Is with me' makes the clause complete and clear.
- source_word: ἀποδοῦναι
  chosen: to repay
  alternatives:
  - to give
  - to render
  - to recompense
  lexicon: BDAG
  rationale: The infinitive expresses purpose/result tied to the coming and the reward.
    'Repay' captures the sense of giving back in accordance with deeds. 'Render' is
    more formal; 'give' is too weak.
- source_word: ἑκάστῳ
  chosen: each one
  alternatives:
  - to each
  - to everyone
  lexicon: BDAG
  rationale: Dative singular distributive sense is well represented by 'each one,'
    preserving individual accountability.
- source_word: ὡς
  chosen: according to what
  alternatives:
  - as
  - according to
  lexicon: BDAG
  rationale: Introduces the standard of judgment/reward. Because the clause includes
    ἐστὶν, 'according to what' yields natural English while preserving the comparative
    sense.
- source_word: τὸ ἔργον ἐστὶν αὐτοῦ
  chosen: his work is
  alternatives:
  - his deed is
  - he has done
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the explicit noun 'work' (ἔργον)
    and the present verb 'is.' 'He has done' is smoother but shifts from noun to verbal
    paraphrase and goes beyond the source wording.
