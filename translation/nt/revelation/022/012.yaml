theological_decisions:
- issue: Gender representation in ἑκάστῳ ... αὐτοῦ
  chosen_reading: each one ... his work
  alternative_readings:
  - each person ... their work
  - each one ... what he has done
  rationale: The Greek uses grammatically masculine singular forms with representative
    force. Per the translation philosophy's gender-accurate principle, the draft preserves
    the masculine singular in English rather than flattening it to singular 'they.'
    A more inclusive alternative is possible in idiomatic English, but the source's
    form is retained here.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
- issue: Nature of recompense language
  chosen_reading: reward ... to repay each one according to what his work is
  alternative_readings:
  - reward ... to give each one according to his deeds
  rationale: The verse speaks of individual recompense according to works. The translation
    preserves that wording without importing a doctrinal conclusion about the basis
    of final salvation beyond what the text itself states.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, preserve
    theological tension rather than resolve it
