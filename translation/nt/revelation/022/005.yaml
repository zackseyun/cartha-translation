theological_decisions:
- issue: Temporal reference of οὐκ ἔχουσιν χρείαν in a future-vision context
  chosen_reading: 'Render the clause futurally in English: ''they will have no need,''
    harmonized with the surrounding future verbs.'
  alternative_readings:
  - 'Render more formally as present: ''they have no need'''
  rationale: The Greek present can function vividly within prophetic/apocalyptic description,
    but the verse as a whole is framed by explicit futures (ἔσται, φωτίσει, βασιλεύσουσιν).
    Using future English preserves coherence without materially altering the sense.
  doctrine_reference: Translation philosophy § optimal equivalence; preserve source
    sense in readable modern English
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: DOCTRINE.md lists κύριος with default English 'Lord.' No contextual factor
    here warrants deviation.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
