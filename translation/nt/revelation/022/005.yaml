id: REV.22.5
reference: Revelation 22:5
source:
  edition: SBLGNT
  text: καὶ νὺξ οὐκ ἔσται ⸀ἔτι, καὶ ⸂οὐκ ἔχουσιν χρείαν⸃ ⸀φωτὸς λύχνου καὶ ⸀φῶς ἡλίου,
    ὅτι κύριος ὁ θεὸς φωτίσει ⸀ἐπ’ αὐτούς, καὶ βασιλεύσουσιν εἰς τοὺς αἰῶνας τῶν αἰώνων.
translation:
  text: And night will be no more, and they will have no need of lamplight or sunlight,
    because the Lord God will shine on them, and they will reign forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'light of a lamp and light of the sun.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''to the ages of the ages,'' an idiom meaning unending duration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νὺξ
  chosen: night
  alternatives:
  - the night
  lexicon: BDAG
  rationale: Basic lexical sense is 'night.' Anarthrous in Greek, so simple 'night'
    is natural in English.
- source_word: οὐκ ἔσται ἔτι
  chosen: will be no more
  alternatives:
  - will no longer exist
  - will not be anymore
  lexicon: BDAG
  rationale: This idiom expresses cessation of existence or occurrence. 'Will be no
    more' is idiomatic, solemn, and fits apocalyptic style.
- source_word: οὐκ ἔχουσιν χρείαν
  chosen: they will have no need
  alternatives:
  - they have no need
  - they will not need
  lexicon: BDAG
  rationale: 'Although ἔχουσιν is present, the surrounding future-oriented context
    supports an English future rendering for smooth coherence: the description concerns
    the consummated state.'
- source_word: φωτὸς λύχνου
  chosen: lamplight
  alternatives:
  - light of a lamp
  - lamp light
  lexicon: BDAG
  rationale: Genitive construction means 'light of a lamp.' 'Lamplight' is concise,
    natural modern English, and preserves the contrast with sunlight.
- source_word: φῶς ἡλίου
  chosen: sunlight
  alternatives:
  - light of the sun
  lexicon: BDAG
  rationale: The phrase denotes the sun's light. 'Sunlight' is idiomatic and pairs
    well with 'lamplight.'
- source_word: κύριος ὁ θεός
  chosen: the Lord God
  alternatives:
  - Lord God
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord' per doctrine. The article
    is naturally represented in English by 'the Lord God' in this clause.
- source_word: φωτίσει ἐπ’ αὐτούς
  chosen: will shine on them
  alternatives:
  - will give them light
  - will illumine them
  lexicon: BDAG
  rationale: φωτίζω can mean 'give light' or 'illumine.' With ἐπί + accusative, 'shine
    on them' best captures the directional imagery and echoes the immediate context
    of light sources.
- source_word: βασιλεύσουσιν
  chosen: will reign
  alternatives:
  - will rule as kings
  - will be kings
  lexicon: BDAG
  rationale: The verb means 'reign' or 'rule as king.' 'Will reign' is the standard,
    accurate rendering and avoids over-specifying royal imagery beyond the verb itself.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the emphatic eternal-duration
    formula. A more literal form is possible but less natural in English main text.
