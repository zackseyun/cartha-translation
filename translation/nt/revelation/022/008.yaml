theological_decisions:
- issue: Nature of προσκυνέω directed toward the angel
  chosen_reading: Rendered as 'to worship' while leaving the narrative itself to show
    that this act is inappropriate toward the angel.
  alternative_readings:
  - to bow down before
  - to pay homage to
  rationale: The verb προσκυνέω can denote prostration/homage, but in Revelation it
    commonly carries worshipful force. The following verse corrects John's action,
    so the translation should not soften the term in a way that preemptively resolves
    the theological tension. This preserves the seriousness of the mistaken act without
    implying the angel rightly receives worship.
  doctrine_reference: Preserve theological tension rather than resolve it.
