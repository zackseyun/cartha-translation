id: REV.22.8
reference: Revelation 22:8
source:
  edition: SBLGNT
  text: Κἀγὼ Ἰωάννης ὁ ἀκούων καὶ βλέπων ταῦτα. καὶ ὅτε ἤκουσα καὶ ἔβλεψα, ἔπεσα προσκυνῆσαι
    ἔμπροσθεν τῶν ποδῶν τοῦ ἀγγέλου τοῦ δεικνύοντός μοι ταῦτα.
translation:
  text: And I, John, am the one hearing and seeing these things. And when I heard
    and saw, I fell down to worship before the feet of the angel who was showing me
    these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bow down before' or 'to pay homage to.' The Greek verb can denote
      an act of prostration or reverence; here it is rendered 'worship' because of
      its regular force in Revelation and the rebuke that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγὼ
  chosen: And I
  alternatives:
  - I also
  - And I myself
  lexicon: BDAG
  rationale: Retains the connective καί fused with ἐγώ and the emphatic first-person
    subject. 'And I' is natural English and preserves the discourse continuation.
- source_word: Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Personal name is transliterated per project philosophy.
- source_word: ὁ ἀκούων καὶ βλέπων
  chosen: am the one hearing and seeing
  alternatives:
  - was the one who heard and saw
  - am the one who hears and sees
  lexicon: BDAG
  rationale: The present participles are rendered with a present-progressive sense
    to reflect the Greek forms rather than collapsing them into simple past. 'The
    one hearing and seeing' preserves the substantival participial construction; 'am'
    is supplied for idiomatic English.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative should be preserved; 'these things' matches the
    repeated ταῦτα in the verse and refers to the visions/revelations just described.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: Temporal conjunction is straightforwardly rendered 'when'; 'after' would
    over-interpret sequence.
- source_word: ἤκουσα καὶ ἔβλεψα
  chosen: I heard and saw
  alternatives:
  - I had heard and seen
  lexicon: BDAG
  rationale: Aorist indicatives are best rendered as simple past in English here.
    Pluperfect is possible in context but not required by the Greek.
- source_word: ἔπεσα
  chosen: I fell down
  alternatives:
  - I fell
  lexicon: BDAG
  rationale: '''Fell down'' captures the physical act in context and reads naturally
    before an infinitive of worship.'
- source_word: προσκυνῆσαι
  chosen: to worship
  alternatives:
  - to bow down in worship
  - to prostrate myself
  lexicon: BDAG
  rationale: In Revelation this verb regularly denotes worshipful reverence. 'To worship'
    is the clearest main-text rendering; more physically explicit alternatives are
    possible but less natural here.
- source_word: ἔμπροσθεν τῶν ποδῶν
  chosen: before the feet
  alternatives:
  - at the feet
  - in front of the feet
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the preposition ἔμπροσθεν and
    the explicit mention of 'feet.' 'At the feet' is idiomatic but slightly less literal.
- source_word: τοῦ ἀγγέλου
  chosen: of the angel
  alternatives:
  - of the messenger
  lexicon: BDAG
  rationale: In Revelation the heavenly being is clearly angelic, so 'angel' is the
    appropriate established gloss rather than the more generic 'messenger.'
- source_word: τοῦ δεικνύοντός μοι ταῦτα
  chosen: who was showing me these things
  alternatives:
  - who shows me these things
  - who had shown me these things
  lexicon: BDAG
  rationale: The present participle is rendered as an imperfective relative clause
    in English, fitting the ongoing role of the angel in the vision. 'Showing' preserves
    the verbal aspect better than a simple past.
