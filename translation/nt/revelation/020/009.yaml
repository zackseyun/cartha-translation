id: REV.20.9
reference: Revelation 20:9
source:
  edition: SBLGNT
  text: καὶ ἀνέβησαν ἐπὶ τὸ πλάτος τῆς γῆς, καὶ ⸀ἐκύκλευσαν τὴν παρεμβολὴν τῶν ἁγίων
    καὶ τὴν πόλιν τὴν ἠγαπημένην. καὶ κατέβη πῦρ ⸂ἐκ τοῦ οὐρανοῦ⸃ καὶ κατέφαγεν αὐτούς·
translation:
  text: And they came up over the broad plain of the earth and surrounded the camp
    of the saints and the beloved city. And fire came down from heaven and consumed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the breadth of the earth.' The Greek expression is literally 'upon
      the breadth of the earth,' referring to a vast expanse.
    reason: lexical_alternative
  - marker: b
    text: Or 'encircled.'
    reason: lexical_alternative
  - marker: c
    text: The text does not explicitly identify 'the beloved city'; interpreters commonly
      understand it as Jerusalem or, more broadly, the city of God.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβησαν
  chosen: came up
  alternatives:
  - went up
  - advanced over
  lexicon: BDAG
  rationale: Aorist of ἀναβαίνω commonly means 'go up' or 'come up.' 'Came up' is
    natural in English narrative and preserves the upward/advancing movement without
    overinterpreting the geography.
- source_word: ἐπὶ τὸ πλάτος τῆς γῆς
  chosen: over the broad plain of the earth
  alternatives:
  - over the breadth of the earth
  - across the broad expanse of the land
  lexicon: BDAG
  rationale: πλάτος is literally 'breadth' or 'broad expanse.' A strictly formal 'breadth
    of the earth' is possible, but in English it can sound awkward or idiomatic in
    a way that obscures the image. 'Broad plain of the earth' conveys the sense of
    a wide expanse while remaining readable. 'Earth' is preferred over 'land' because
    γῆ in Revelation often has a global sense.
- source_word: ἐκύκλευσαν
  chosen: surrounded
  alternatives:
  - encircled
  lexicon: BDAG
  rationale: The verb means to encircle or surround. 'Surrounded' is the clearest
    modern English rendering.
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: BDAG
  rationale: παρεμβολή denotes a camp or encampment, often military. 'Camp' is concise
    and preserves the imagery without adding interpretive detail.
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of the holy ones
  - of God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is regularly rendered 'saints' in the New Testament. This preserves
    intertextual continuity in Revelation and avoids paraphrase.
- source_word: τὴν πόλιν τὴν ἠγαπημένην
  chosen: the beloved city
  alternatives:
  - the city that is loved
  - the city beloved by God
  lexicon: BDAG
  rationale: The perfect passive participle ἠγαπημένην means 'beloved' or 'having
    been loved.' 'The beloved city' is idiomatic and preserves the passive/resultative
    sense without explicitly supplying the agent in the main text.
- source_word: κατέβη πῦρ ἐκ τοῦ οὐρανοῦ
  chosen: fire came down from heaven
  alternatives:
  - fire descended from heaven
  lexicon: BDAG
  rationale: This is a straightforward rendering of the clause. 'Came down from heaven'
    is natural English and preserves the source imagery.
- source_word: κατέφαγεν αὐτούς
  chosen: consumed them
  alternatives:
  - devoured them
  lexicon: BDAG
  rationale: κατεσθίω literally means 'eat up' and idiomatically 'devour' or 'consume.'
    With fire as subject, 'consumed them' is the most natural English collocation
    while retaining the totality of destruction.
