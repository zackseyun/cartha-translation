theological_decisions:
- issue: Referent and theological force of 'the beloved city'
  chosen_reading: Render generically as 'the beloved city' without identifying it
    in the main text.
  alternative_readings:
  - Jerusalem
  - the eschatological people/city of God
  rationale: The Greek text itself does not explicitly name the city here. Identifying
    it more specifically in the translation would import an interpretive conclusion
    not stated in the verse. The wording preserves the text's imagery and theological
    tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
