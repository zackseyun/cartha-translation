theological_decisions:
- issue: Identity of the one seated on the throne
  chosen_reading: Left implicit as 'the one seated on it' rather than identifying
    him explicitly as God or Messiah.
  alternative_readings:
  - God the Father
  - God in a broader sense
  - the enthroned divine judge
  rationale: The verse itself does not name the enthroned figure. To preserve theological
    tension and avoid importing a more specific identification than the text states,
    the translation keeps the Greek's descriptive wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
