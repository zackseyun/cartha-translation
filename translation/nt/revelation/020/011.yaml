id: REV.20.11
reference: Revelation 20:11
source:
  edition: SBLGNT
  text: Καὶ εἶδον θρόνον μέγαν λευκὸν καὶ τὸν καθήμενον ⸂ἐπ’ αὐτοῦ⸃, οὗ ἀπὸ ⸀τοῦ προσώπου
    ἔφυγεν ἡ γῆ καὶ ὁ οὐρανός, καὶ τόπος οὐχ εὑρέθη αὐτοῖς.
translation:
  text: And I saw a great white throne and the one seated on it, from whose presence
    the earth and the heaven fled, and no place was found for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from whose face the earth and the heaven fled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θρόνον μέγαν λευκὸν
  chosen: a great white throne
  alternatives:
  - a throne, great and white
  - a large white throne
  lexicon: BDAG
  rationale: Retains the straightforward adjectival sequence in natural English. 'Great'
    preserves both grandeur and magnitude better than the flatter 'large.'
- source_word: τὸν καθήμενον ἐπ’ αὐτοῦ
  chosen: the one seated on it
  alternatives:
  - the one sitting on it
  - him who sat on it
  lexicon: BDAG
  rationale: Uses an English participial expression that is natural and reverent without
    over-specifying identity. 'Seated' fits throne imagery idiomatically better than
    'sitting.'
- source_word: οὗ
  chosen: from whose
  alternatives:
  - from whom
  - whose
  lexicon: BDAG
  rationale: The genitive relative pronoun is governed by the following preposition
    ἀπό, yielding 'from whose' in idiomatic English and linking the flight of creation
    to the enthroned figure's presence.
- source_word: ἀπὸ τοῦ προσώπου
  chosen: from whose presence
  alternatives:
  - from whose face
  - from before him
  lexicon: BDAG
  rationale: πρόσωπον is literally 'face,' but in this construction 'presence' best
    conveys the idiomatic sense of beings fleeing before someone. 'Face' is possible
    but sounds overly literal in English here.
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - ran away
  - vanished
  lexicon: BDAG
  rationale: Aorist active of φεύγω is well represented by 'fled.' It preserves the
    vivid, personal imagery better than the more interpretive 'vanished.'
- source_word: ἡ γῆ καὶ ὁ οὐρανός
  chosen: the earth and the heaven
  alternatives:
  - earth and heaven
  - the earth and heaven
  - the earth and the sky
  lexicon: BDAG
  rationale: The articles are present with both nouns, and 'heaven' is preferable
    to 'sky' in apocalyptic context. Keeping both articles reflects the Greek while
    remaining readable.
- source_word: τόπος οὐχ εὑρέθη αὐτοῖς
  chosen: no place was found for them
  alternatives:
  - there was no place for them
  - a place was not found for them
  lexicon: BDAG
  rationale: This preserves the passive construction and solemn tone. 'For them' naturally
    refers back to 'the earth and the heaven.'
