theological_decisions:
- issue: Referent of the implied subject of 'he will go out'
  chosen_reading: The subject is Satan, carried over from the previous verse.
  rationale: The verb has no explicit subject in this verse, but the immediate context
    (Rev 20:7) identifies Satan as the one released from prison; this is grammatical
    continuity rather than theological expansion.
- issue: Force of 'Gog and Magog'
  chosen_reading: Rendered as appositional identification of the deceived nations,
    preserving the Ezekiel allusion without specifying whether the names are symbolic,
    typological, or strictly ethnogeographic.
  alternative_readings:
  - Strictly symbolic labels for the final enemies of God
  - A direct identification with Ezekiel's Gog from the land of Magog
  rationale: The translation keeps the names untranslated and does not resolve the
    debated apocalyptic referent beyond what the Greek states, in line with preserving
    theological tension where the text does not force a narrower interpretation.
  doctrine_reference: Translation philosophy §3; §2 on transliterating names
