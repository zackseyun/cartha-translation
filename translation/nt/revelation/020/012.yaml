id: REV.20.12
reference: Revelation 20:12
source:
  edition: SBLGNT
  text: καὶ εἶδον τοὺς νεκρούς, τοὺς μεγάλους καὶ τοὺς μικρούς, ἑστῶτας ἐνώπιον τοῦ
    θρόνου, καὶ βιβλία ἠνοίχθησαν· καὶ ἄλλο βιβλίον ἠνοίχθη, ὅ ἐστιν τῆς ζωῆς· καὶ
    ἐκρίθησαν οἱ νεκροὶ ἐκ τῶν γεγραμμένων ἐν τοῖς βιβλίοις κατὰ τὰ ἔργα αὐτῶν.
translation:
  text: And I saw the dead, the great and the small, standing before the throne, and
    books were opened. And another book was opened, which is the book of life. And
    the dead were judged from what had been written in the books, according to their
    works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their deeds.'
    reason: lexical_alternative
  - marker: b
    text: '''Books'' could also be rendered ''scrolls,'' reflecting the ancient medium.'
    reason: cultural_note
lexical_decisions:
- source_word: νεκρούς / νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: Substantival adjective referring to deceased persons collectively. 'The
    dead' is idiomatic, concise, and preserves the solemn register of the passage.
- source_word: μεγάλους καὶ τοὺς μικρούς
  chosen: the great and the small
  alternatives:
  - the great and the least
  - the important and the insignificant
  lexicon: BDAG
  rationale: A merism indicating all ranks or statuses. 'The great and the small'
    closely follows the Greek while remaining natural English.
- source_word: ἑστῶτας
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι with present-state force; 'standing'
    best conveys their posture before the throne in smooth English.
- source_word: ἐνώπιον τοῦ θρόνου
  chosen: before the throne
  alternatives:
  - in the presence of the throne
  - before the judgment seat
  lexicon: BDAG
  rationale: ἐνώπιον commonly means 'before' or 'in the presence of.' 'Before the
    throne' is the most direct rendering; 'judgment seat' would import interpretation
    not explicit in θρόνος.
- source_word: βιβλία
  chosen: books
  alternatives:
  - scrolls
  - records
  lexicon: BDAG
  rationale: Although βιβλίον could denote scrolls in the ancient context, 'books'
    is the standard and sufficiently broad rendering here. 'Records' is interpretive
    rather than lexical.
- source_word: ἠνοίχθησαν / ἠνοίχθη
  chosen: were opened
  alternatives:
  - were unsealed
  lexicon: BDAG
  rationale: Passive aorist of ἀνοίγω. 'Were opened' is straightforward and fits both
    plural and singular occurrences. 'Unsealed' is too specific for the verb itself.
- source_word: ἄλλο βιβλίον
  chosen: another book
  alternatives:
  - one more book
  - a different book
  lexicon: BDAG
  rationale: ἄλλο here introduces an additional book distinct from the previously
    mentioned books. 'Another book' is the natural English equivalent.
- source_word: ὅ ἐστιν τῆς ζωῆς
  chosen: which is the book of life
  alternatives:
  - which is of life
  - that is the book of life
  lexicon: BDAG
  rationale: The genitive τῆς ζωῆς is elliptical with βιβλίον understood; English
    requires the supplied noun for clarity. 'Book of life' is the established and
    accurate sense.
- source_word: ἐκρίθησαν
  chosen: were judged
  alternatives:
  - were condemned
  - were evaluated
  lexicon: BDAG
  rationale: κρίνω in this context denotes judicial judgment. 'Were judged' preserves
    the formal judicial sense without prematurely specifying the verdict.
- source_word: ἐκ τῶν γεγραμμένων ἐν τοῖς βιβλίοις
  chosen: from what had been written in the books
  alternatives:
  - by what was written in the books
  - from the things written in the books
  lexicon: BDAG
  rationale: The phrase indicates the basis or source of judgment. 'From what had
    been written in the books' is natural English and preserves the perfect participle's
    completed-record sense.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  chosen: according to their works
  alternatives:
  - according to their deeds
  lexicon: BDAG
  rationale: ἔργα can mean works or deeds. 'Works' is chosen for consistency with
    common biblical usage and because it preserves the broader sense of actions without
    narrowing to isolated acts.
