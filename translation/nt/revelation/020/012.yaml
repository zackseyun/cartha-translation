theological_decisions:
- issue: Judgment according to works
  chosen_reading: Render κατὰ τὰ ἔργα αὐτῶν as 'according to their works' without
    softening or explaining it away.
  alternative_readings:
  - according to what they had done
  rationale: The verse explicitly states judgment in accordance with works. The translation
    should preserve this wording and not import a broader doctrinal synthesis about
    final judgment beyond what the text says. 'Works' also maintains intertextual
    resonance with similar judgment passages.
  doctrine_reference: Preserve theological tension rather than resolve it.
