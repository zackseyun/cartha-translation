theological_decisions:
- issue: Nature of the thousand years
  chosen_reading: Render χίλια ἔτη straightforwardly as 'a thousand years' without
    interpreting whether the period is literal, symbolic, or otherwise.
  alternative_readings:
  - A literal thousand-year period
  - A symbolic or figurative millennium
  rationale: The translation should preserve the text's wording and theological tension
    rather than resolve a debated millennial framework in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Identification of the dragon
  chosen_reading: 'Retain the full chain of identifications: ''the dragon—that ancient
    serpent, who is the Devil and Satan.'''
  rationale: The verse itself explicitly identifies the dragon with the serpent, the
    Devil, and Satan; the translation should preserve all titles without collapsing
    them into a single simplified label.
  doctrine_reference: Affirmations; Translation philosophy §1 and §5.
