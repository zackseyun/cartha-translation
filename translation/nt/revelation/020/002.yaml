id: REV.20.2
reference: Revelation 20:2
source:
  edition: SBLGNT
  text: καὶ ἐκράτησεν τὸν δράκοντα, ⸂ὁ ὄφις ὁ ἀρχαῖος⸃, ὅς ἐστιν Διάβολος καὶ ὁ ⸀Σατανᾶς,
    καὶ ἔδησεν αὐτὸν χίλια ἔτη,
translation:
  text: And he seized the dragon—that ancient serpent, who is the Devil and Satan—and
    bound him for a thousand years,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ancient serpent' or 'that serpent of old.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκράτησεν
  chosen: seized
  alternatives:
  - took hold of
  - captured
  lexicon: BDAG
  rationale: Aorist of κρατέω here denotes forceful grasping or taking hold. 'Seized'
    is concise, vivid, and natural in English, preserving the decisive action better
    than the more cumbersome 'took hold of.'
- source_word: δράκοντα
  chosen: dragon
  lexicon: BDAG
  rationale: Standard rendering of δράκων in apocalyptic context; preserves the imagery
    and intertextual continuity within Revelation.
- source_word: ὁ ὄφις ὁ ἀρχαῖος
  chosen: that ancient serpent
  alternatives:
  - the ancient serpent
  - that serpent of old
  lexicon: BDAG
  rationale: Appositional identification of the dragon. 'Ancient serpent' is the most
    natural modern English equivalent. 'That' helps mark the explanatory apposition
    in flowing English, though the Greek article could also be represented by 'the.'
- source_word: Διάβολος
  chosen: the Devil
  alternatives:
  - Devil
  lexicon: BDAG
  rationale: 'Although anarthrous in Greek, English idiom normally uses the title
    with the article in this construction: ''the Devil and Satan.'' This preserves
    the recognized title without awkwardness.'
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title, in keeping with
    the philosophy of transliterating names.
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - tied up
  - restrained
  lexicon: BDAG
  rationale: δέω literally means 'bind.' 'Bound' preserves the concrete imagery and
    avoids over-interpreting the nature of the restraint.
- source_word: χίλια ἔτη
  chosen: for a thousand years
  lexicon: BDAG
  rationale: Accusative of extent/duration is naturally rendered with 'for.' 'A thousand
    years' is the plain sense and should not be weakened or paraphrased.
