theological_decisions:
- issue: Referent of 'This is the first resurrection'
  chosen_reading: The translation leaves the demonstrative broad, referring to the
    resurrection reality just described in context, without specifying a millennial
    scheme beyond the text itself.
  alternative_readings:
  - It refers narrowly to the martyrs of v. 4
  - It refers more broadly to all the righteous dead
  - It is interpreted spiritually rather than bodily
  rationale: The verse is central to disputed millennial interpretations, but the
    Greek itself simply states 'This is the first resurrection.' The translation should
    preserve the wording without importing a particular eschatological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἔζησαν in this context
  chosen_reading: Rendered as bodily-revival language ('come to life') in keeping
    with the immediate resurrection context, while not expanding beyond the text.
  alternative_readings:
  - lived
  - came to life spiritually
  rationale: In Revelation 20 the verb is used in close connection with resurrection
    and reigning after death. 'Come to life' best communicates the contextual force
    while avoiding doctrinal overstatement beyond the verse.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
