id: REV.20.5
reference: Revelation 20:5
source:
  edition: SBLGNT
  text: ⸀οἱ λοιποὶ τῶν νεκρῶν οὐκ ἔζησαν ἄχρι τελεσθῇ τὰ χίλια ἔτη. αὕτη ἡ ἀνάστασις
    ἡ πρώτη.
translation:
  text: The rest of the dead did not come to life until the thousand years were finished.
    This is the first resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not live until the thousand years were finished.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ λοιποὶ
  chosen: the rest
  alternatives:
  - the others
  - the remainder
  lexicon: BDAG
  rationale: λοιποί commonly denotes those remaining in contrast to a previously mentioned
    group. 'The rest' is idiomatic and preserves the contrast with those who lived
    and reigned in the previous verse.
- source_word: τῶν νεκρῶν
  chosen: of the dead
  alternatives:
  - of the dead ones
  lexicon: BDAG
  rationale: νεκρός here functions substantivally for deceased persons. 'The dead'
    is standard, natural English and preserves the collective sense.
- source_word: οὐκ ἔζησαν
  chosen: did not come to life
  alternatives:
  - did not live
  - did not become alive
  lexicon: BDAG
  rationale: Aorist of ζάω in this resurrection context is best rendered ingressively
    as 'come to life,' matching the immediate context of resurrection language and
    the same verb used in nearby verses. 'Did not live' is possible but less clear
    in English.
- source_word: ἄχρι τελεσθῇ
  chosen: until ... were finished
  alternatives:
  - until ... was completed
  - until ... had ended
  lexicon: BDAG
  rationale: 'ἄχρι with the aorist passive subjunctive marks a terminus: ''until''
    the thousand years reach completion. Rendering τελεσθῇ as ''were finished'' is
    natural with a plural subject in English and preserves the passive/completive
    sense.'
- source_word: τὰ χίλια ἔτη
  chosen: the thousand years
  alternatives:
  - the thousand-year period
  - the thousand years
  lexicon: BDAG
  rationale: The article plus numeral and noun points to the specific millennium already
    in view. 'The thousand years' is the most direct and contextually coherent rendering.
- source_word: αὕτη
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: The demonstrative points to the preceding reality just described. 'This'
    is the natural English equivalent.
- source_word: ἡ ἀνάστασις ἡ πρώτη
  chosen: is the first resurrection
  alternatives:
  - is the resurrection, the first
  - is the first rising
  lexicon: BDAG
  rationale: ἀνάστασις is the standard term for resurrection. The attributive construction
    with πρώτη is best rendered straightforwardly as 'the first resurrection.'
