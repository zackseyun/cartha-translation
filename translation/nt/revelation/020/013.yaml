id: REV.20.13
reference: Revelation 20:13
source:
  edition: SBLGNT
  text: καὶ ἔδωκεν ἡ θάλασσα τοὺς νεκροὺς τοὺς ἐν αὐτῇ, καὶ ὁ θάνατος καὶ ὁ ᾅδης ἔδωκαν
    τοὺς νεκροὺς τοὺς ἐν αὐτοῖς, καὶ ἐκρίθησαν ἕκαστος κατὰ τὰ ἔργα αὐτῶν.
translation:
  text: And the sea gave up the dead who were in it, and Death and Hades gave up the
    dead who were in them, and each one was judged according to their works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the realm of the dead' for Hades. The Greek term is ᾅδης, distinct from
      terms often rendered 'hell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν / ἔδωκαν
  chosen: gave up
  alternatives:
  - gave
  - handed over
  - delivered up
  lexicon: BDAG
  rationale: Although δίδωμι is literally 'give,' in this context of the sea, Death,
    and Hades releasing the dead for judgment, 'gave up' is the most natural and semantically
    precise English rendering.
- source_word: θάλασσα
  chosen: sea
  alternatives:
  - the sea
  lexicon: BDAG
  rationale: Standard rendering of θάλασσα. The article is retained in English as
    'the sea' because the Greek has ἡ θάλασσα and the referent is definite.
- source_word: νεκρούς
  chosen: the dead
  alternatives:
  - dead people
  - the dead ones
  lexicon: BDAG
  rationale: As an adjectival substantive, νεκρούς is best rendered idiomatically
    as 'the dead' in English.
- source_word: ἐν αὐτῇ
  chosen: who were in it
  alternatives:
  - in it
  lexicon: BDAG
  rationale: The article-participle-like construction τοὺς ... τοὺς ἐν αὐτῇ identifies
    the dead as those located in the sea. English requires a relative clause for clarity.
- source_word: θάνατος
  chosen: Death
  alternatives:
  - death
  lexicon: BDAG
  rationale: Here θάνατος is personified alongside Hades as a realm/power that yields
    up the dead. Capitalizing 'Death' helps signal the personified force without altering
    meaning.
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the realm of the dead
  - hell
  lexicon: BDAG
  rationale: ᾅδης is best transliterated as 'Hades' to avoid confusion with γέεννα
    ('hell'). 'Realm of the dead' captures sense but loses the term's distinct lexical
    identity; 'hell' is misleading.
- source_word: ἐν αὐτοῖς
  chosen: who were in them
  alternatives:
  - in them
  lexicon: BDAG
  rationale: Refers back to the plural subjects Death and Hades. A relative clause
    makes the English natural and preserves the identifying force of the Greek construction.
- source_word: ἐκρίθησαν
  chosen: was judged
  alternatives:
  - were judged
  lexicon: BDAG
  rationale: 'The verb is plural (''they were judged''), but it is immediately distributed
    by ἕκαστος (''each one''). English idiom commonly shifts to singular distributive
    sense: ''each one was judged.'' This preserves the meaning more naturally than
    ''they were judged, each one.'''
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every one
  lexicon: BDAG
  rationale: ἕκαστος is distributive and singular. 'Each one' makes the individualizing
    force explicit.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  chosen: according to their works
  alternatives:
  - according to their deeds
  - based on what they had done
  lexicon: BDAG
  rationale: ἔργα is literally 'works' or 'deeds.' 'Works' preserves the lexical form
    and the repeated biblical idiom of judgment according to works. The plural pronoun
    'their' reflects the collective referent of the judged dead.
