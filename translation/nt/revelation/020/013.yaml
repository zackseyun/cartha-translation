theological_decisions:
- issue: Rendering ᾅδης in an eschatological judgment context
  chosen_reading: Hades
  alternative_readings:
  - the realm of the dead
  - hell
  rationale: Using 'Hades' preserves the distinction between ᾅδης and final punishment
    terminology such as 'lake of fire' in the immediate context. Rendering it as 'hell'
    would import later theological associations not demanded by the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Personification of θάνατος
  chosen_reading: Death
  alternative_readings:
  - death
  rationale: Capitalization signals personification in apocalyptic imagery without
    making an additional doctrinal claim. The verse presents Death and Hades as entities
    that surrender the dead.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy over translation tradition.'
