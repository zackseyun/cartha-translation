theological_decisions:
- issue: Duration of final punishment expressed by εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen_reading: forever and ever
  alternative_readings:
  - for the ages of the ages
  rationale: The translation preserves the strongest natural English equivalent of
    the Greek idiom without softening or reinterpreting it. The wording reflects the
    text's emphatic portrayal of unending duration rather than resolving broader doctrinal
    debates beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Implied verb in ὅπου καὶ τὸ θηρίον καὶ ὁ ψευδοπροφήτης
  chosen_reading: where also the beast and the false prophet are
  alternative_readings:
  - where also the beast and the false prophet were
  rationale: Because Greek omits the verb, English requires supplementation. Present
    'are' best fits the immediate literary context, in which the beast and false prophet
    have already been thrown there and remain there. This is a grammatical completion,
    not an added doctrinal claim.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    what the source implies without paraphrase.
