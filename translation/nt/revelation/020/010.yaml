id: REV.20.10
reference: Revelation 20:10
source:
  edition: SBLGNT
  text: καὶ ὁ διάβολος ὁ πλανῶν αὐτοὺς ἐβλήθη εἰς τὴν λίμνην τοῦ πυρὸς καὶ θείου,
    ὅπου καὶ τὸ θηρίον καὶ ὁ ψευδοπροφήτης, καὶ βασανισθήσονται ἡμέρας καὶ νυκτὸς
    εἰς τοὺς αἰῶνας τῶν αἰώνων.
translation:
  text: And the devil, who was deceiving them, was thrown into the lake of fire and
    sulfur, where also the beast and the false prophet are, and they will be tormented
    day and night forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the lake of fire and brimstone.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''for the ages of the ages,'' an idiom meaning unending duration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In Revelation this functions as the established personal designation
    for Satan rather than a generic descriptor. 'The devil' is standard, clear modern
    English and preserves the referential force.
- source_word: ὁ πλανῶν αὐτοὺς
  chosen: who was deceiving them
  alternatives:
  - who deceives them
  - who was leading them astray
  lexicon: BDAG
  rationale: The present participle with article identifies the devil by his ongoing
    activity. 'Was deceiving' captures the durative force in relation to the narrative
    sequence; 'leading astray' is possible but 'deceiving' is the more direct lexical
    equivalent for πλανάω here.
- source_word: ἐβλήθη
  chosen: was thrown
  alternatives:
  - was cast
  lexicon: BDAG
  rationale: Passive of βάλλω in judgment contexts commonly means 'was thrown/cast.'
    'Thrown' is more natural contemporary English while retaining the force of forcible
    consigning.
- source_word: λίμνην τοῦ πυρὸς καὶ θείου
  chosen: the lake of fire and sulfur
  alternatives:
  - the lake of fire and brimstone
  lexicon: BDAG
  rationale: θεῖον denotes sulfur. 'Brimstone' is traditional but archaic for many
    readers; 'sulfur' is more accessible while preserving the image.
- source_word: ὅπου καὶ τὸ θηρίον καὶ ὁ ψευδοπροφήτης
  chosen: where also the beast and the false prophet are
  alternatives:
  - where also the beast and the false prophet were
  - where also the beast and the false prophet are present
  lexicon: BDAG
  rationale: The clause is verbless in Greek, so English must supply a verb. Present
    'are' best reflects the implied continuing presence from the prior context (cf.
    19:20) and avoids importing a past-only sense.
- source_word: θηρίον
  chosen: the beast
  lexicon: BDAG
  rationale: Standard rendering in Revelation for the apocalyptic figure; consistent
    and contextually established.
- source_word: ψευδοπροφήτης
  chosen: the false prophet
  lexicon: BDAG
  rationale: Direct lexical equivalent and established apocalyptic title.
- source_word: βασανισθήσονται
  chosen: they will be tormented
  alternatives:
  - they will be tortured
  lexicon: BDAG
  rationale: βασανίζω in judgment contexts denotes severe torment. 'Tormented' is
    the most idiomatic and established rendering here; 'tortured' is possible but
    can over-specify the mode.
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  lexicon: BDAG
  rationale: Fixed idiom indicating unceasing continuity.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - for the ages of the ages
  - unto the ages of the ages
  lexicon: BDAG
  rationale: This is the standard idiomatic English rendering of the emphatic Greek
    expression for unending duration. More literal options are possible but less natural
    in English.
