theological_decisions:
- issue: Gendered representative singular
  chosen_reading: he was thrown
  alternative_readings:
  - they were thrown
  - that person was thrown
  rationale: The Greek indefinite τις is followed by masculine singular participle
    and verb agreement. In keeping with the doctrine's gender-accurate policy, the
    translation preserves the singular masculine representative form rather than neutralizing
    it in the main text. An inclusive alternative is worth noting for English readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Imagery of final judgment
  chosen_reading: lake of fire
  rationale: The verse uses established apocalyptic imagery without further interpretive
    expansion. The translation preserves the image as stated and does not import a
    denominational explanation of the nature of final punishment.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
