id: REV.20.15
reference: Revelation 20:15
source:
  edition: SBLGNT
  text: καὶ εἴ τις οὐχ εὑρέθη ἐν ⸂τῇ βίβλῳ⸃ τῆς ζωῆς γεγραμμένος, ἐβλήθη εἰς τὴν λίμνην
    τοῦ πυρός.
translation:
  text: And if anyone was not found written in the book of life, he was thrown into
    the lake of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that person was thrown into the lake of fire.' Greek has a masculine
      singular form here used representatively.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the scroll of life.' The Greek word can refer to a book or a scroll.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  chosen: if anyone
  alternatives:
  - if someone
  - whoever
  lexicon: BDAG
  rationale: Indefinite conditional expression introducing a general case. 'Anyone'
    is natural modern English and preserves the open, indefinite force better than
    the more wooden 'if any one.'
- source_word: οὐχ εὑρέθη
  chosen: was not found
  alternatives:
  - was not discovered
  - was not found to be
  lexicon: BDAG
  rationale: Aorist passive of εὑρίσκω is idiomatically rendered 'was found.' With
    οὐχ it straightforwardly means 'was not found.' This preserves the judicial/disclosive
    sense in context without paraphrase.
- source_word: ἐν τῇ βίβλῳ τῆς ζωῆς
  chosen: in the book of life
  alternatives:
  - in the scroll of life
  lexicon: BDAG
  rationale: βίβλος can denote 'book' or 'scroll.' 'Book of life' is the established
    and clear English rendering in this apocalyptic context; 'scroll' is lexically
    possible but less natural here and not required by the immediate context.
- source_word: γεγραμμένος
  chosen: written
  alternatives:
  - recorded
  - inscribed
  lexicon: BDAG
  rationale: 'Perfect passive participle of γράφω, modifying the implied subject (''anyone'').
    ''Written'' is the most direct rendering and works idiomatically with ''found''
    in English: ''found written in the book of life.'' ''Recorded'' or ''inscribed''
    are possible but less direct.'
- source_word: ἐβλήθη
  chosen: was thrown
  alternatives:
  - was cast
  - was hurled
  lexicon: BDAG
  rationale: Aorist passive of βάλλω. 'Was thrown' is clear modern English and preserves
    the force of forcible casting. 'Was cast' is traditional but somewhat archaic;
    'was hurled' may over-intensify.
- source_word: εἰς τὴν λίμνην τοῦ πυρός
  chosen: into the lake of fire
  alternatives:
  - into the fiery lake
  - into the lake of burning fire
  lexicon: BDAG
  rationale: Standard literal rendering of the phrase. 'Lake of fire' is both transparent
    and consistent with the immediate context in Revelation 20.
- source_word: τις ... γεγραμμένος / ἐβλήθη
  chosen: he was thrown
  alternatives:
  - that person was thrown
  - they were thrown
  lexicon: N/A
  rationale: The Greek is grammatically masculine singular and refers to an indefinite
    individual. Per the project's gender-accurate policy, the representative singular
    is preserved with 'he' rather than replaced by singular 'they.'
