id: REV.20.7
reference: Revelation 20:7
source:
  edition: SBLGNT
  text: Καὶ ὅταν τελεσθῇ τὰ χίλια ἔτη, λυθήσεται ὁ Σατανᾶς ἐκ τῆς φυλακῆς αὐτοῦ,
translation:
  text: And when the thousand years are completed, Satan will be released from his
    prison,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  - after
  lexicon: BDAG
  rationale: Introduces a temporal clause with subjunctive τελεσθῇ. In this eschatological
    sequence, 'when' best conveys the expected future time reference without adding
    interpretive nuance.
- source_word: τελεσθῇ
  chosen: are completed
  alternatives:
  - are finished
  - come to an end
  lexicon: BDAG
  rationale: Passive of τελέω here refers to the completion of a defined period. 'Are
    completed' is natural English and preserves the passive/resultative sense better
    than a more colloquial paraphrase.
- source_word: τὰ χίλια ἔτη
  chosen: the thousand years
  alternatives:
  - the thousand-year period
  - a thousand years
  lexicon: BDAG
  rationale: The article supports a definite expression in context, referring back
    to the previously mentioned millennium. 'The thousand years' is the most direct
    and contextually coherent rendering.
- source_word: λυθήσεται
  chosen: will be released
  alternatives:
  - will be loosed
  - will be set free
  lexicon: BDAG
  rationale: '''Will be released'' communicates the future passive clearly in modern
    English. ''Loosed'' is overly archaic here, while ''set free'' may suggest a positive
    connotation not present in the context.'
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name/title, consistent
    with common biblical usage and the instruction to transliterate names.
- source_word: ἐκ τῆς φυλακῆς αὐτοῦ
  chosen: from his prison
  alternatives:
  - out of his prison
  - from his place of imprisonment
  lexicon: BDAG
  rationale: φυλακή can denote prison, guard, or watch; in this context of confinement,
    'prison' is the plain sense. 'From his prison' is idiomatic and preserves the
    possessive αὐτοῦ.
