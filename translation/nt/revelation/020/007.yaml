theological_decisions:
- issue: Nature of the thousand years
  chosen_reading: Render the phrase straightforwardly as 'the thousand years' without
    interpreting it symbolically or literally beyond the text itself.
  alternative_readings:
  - a literal thousand-year reign
  - a symbolic long period
  rationale: The verse names a defined period but does not itself adjudicate millennial
    systems. The translation preserves the wording without importing premillennial,
    amillennial, or postmillennial conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
