theological_decisions:
- issue: Rendering ἄβυσσος in apocalyptic context
  chosen_reading: abyss
  alternative_readings:
  - bottomless pit
  rationale: The Greek term is transliterated semantically as 'abyss' rather than
    expanded to 'bottomless pit.' This better reflects the source term itself and
    avoids over-specifying the image beyond the Greek wording, while preserving the
    established apocalyptic concept.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
