id: REV.20.1
reference: Revelation 20:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἄγγελον καταβαίνοντα ἐκ τοῦ οὐρανοῦ, ἔχοντα τὴν κλεῖν τῆς ἀβύσσου
    καὶ ἅλυσιν μεγάλην ἐπὶ τὴν χεῖρα αὐτοῦ.
translation:
  text: And I saw an angel coming down from heaven, holding the key to the abyss and
    a great chain in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bottomless pit.' The Greek reads 'the abyss.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next element in John's vision sequence.
    'And' preserves the paratactic flow of Revelation better than the more interpretive
    'Then'.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist of ὁράω in visionary narrative is naturally rendered 'I saw.'
    This keeps the directness of the Greek without expanding the wording.
- source_word: ἄγγελον
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: BDAG
  rationale: In Revelation the referent is clearly a heavenly being, so 'angel' is
    the appropriate contextual rendering rather than the more general 'messenger'.
- source_word: καταβαίνοντα
  chosen: coming down
  alternatives:
  - descending
  lexicon: BDAG
  rationale: Present participle describing the angel's motion from heaven. 'Coming
    down' is idiomatic modern English and preserves the directional force of καταβαίνω.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: In apocalyptic context οὐρανός refers to heaven, not merely the sky.
    'From heaven' is the natural English equivalent of ἐκ + genitive here.
- source_word: ἔχοντα
  chosen: holding
  alternatives:
  - having
  - carrying
  lexicon: BDAG
  rationale: Present participle coordinated with καταβαίνοντα. 'Holding' fits the
    immediate imagery of the key and chain better than the more abstract 'having.'
- source_word: τὴν κλεῖν
  chosen: the key
  lexicon: BDAG
  rationale: κλείς straightforwardly means 'key.' The article is retained in English
    because it points to a specific key associated with the abyss.
- source_word: τῆς ἀβύσσου
  chosen: to the abyss
  alternatives:
  - of the abyss
  - to the bottomless pit
  lexicon: BDAG
  rationale: The genitive with 'key' is best expressed idiomatically in English as
    'the key to the abyss.' 'Bottomless pit' reflects older translation tradition,
    but 'abyss' more directly represents ἄβυσσος and avoids importing imagery not
    explicit in the Greek.
- source_word: ἅλυσιν μεγάλην
  chosen: a great chain
  alternatives:
  - a large chain
  - a massive chain
  lexicon: BDAG
  rationale: ἅλυσις is 'chain,' and μεγάλην here denotes size or impressiveness. 'Great
    chain' preserves the elevated apocalyptic tone while remaining natural English.
- source_word: ἐπὶ τὴν χεῖρα αὐτοῦ
  chosen: in his hand
  alternatives:
  - upon his hand
  - on his hand
  lexicon: BDAG
  rationale: Although ἐπί with accusative is literally 'upon/on,' the idiomatic sense
    in this context is possession or placement at hand. 'In his hand' is the clearest
    natural English rendering for the image.
