id: REV.20.6
reference: Revelation 20:6
source:
  edition: SBLGNT
  text: μακάριος καὶ ἅγιος ὁ ἔχων μέρος ἐν τῇ ἀναστάσει τῇ πρώτῃ· ἐπὶ τούτων ὁ δεύτερος
    θάνατος οὐκ ἔχει ἐξουσίαν, ἀλλ’ ἔσονται ἱερεῖς τοῦ θεοῦ καὶ τοῦ χριστοῦ, καὶ βασιλεύσουσιν
    μετ’ αὐτοῦ ⸀χίλια ἔτη.
translation:
  text: Blessed and holy is the one who has a share in the first resurrection. Over
    these the second death has no authority, but they will be priests of God and of
    the Messiah, and they will reign with him for a thousand years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of God and of Christ.' The Greek title Χριστός is rendered 'Messiah'
      here to preserve its titular sense.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude language in biblical English; 'blessed' preserves
    the covenantal and eschatological weight better than the more subjective 'happy'
    or 'fortunate'.
- source_word: ἅγιος
  chosen: holy
  alternatives:
  - set apart
  - saintly
  lexicon: BDAG
  rationale: '''Holy'' is the direct and theologically appropriate rendering here,
    describing consecrated status rather than merely moral quality.'
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - he who has
  - whoever has
  lexicon: BDAG
  rationale: This renders the substantival participle naturally in modern English
    while avoiding unnecessary archaic masculine phrasing. It preserves the singular
    representative force of the Greek.
- source_word: μέρος
  chosen: a share
  alternatives:
  - part
  - portion
  lexicon: BDAG
  rationale: '''A share'' idiomatically fits the expression ''has a share in'' and
    conveys participation in the resurrection.'
- source_word: ἐν τῇ ἀναστάσει τῇ πρώτῃ
  chosen: in the first resurrection
  alternatives:
  - in the resurrection, the first one
  lexicon: BDAG
  rationale: Straightforward rendering of the prepositional phrase with attributive
    adjective; 'first resurrection' is the natural English equivalent.
- source_word: ἐπὶ τούτων
  chosen: Over these
  alternatives:
  - Upon these
  - Over such people
  lexicon: BDAG
  rationale: With ἐπί and the genitive pronoun, the sense is dominion or authority
    over persons. 'Over these' keeps the concise force of the Greek and links back
    to those sharing in the first resurrection.
- source_word: ὁ δεύτερος θάνατος
  chosen: the second death
  lexicon: BDAG
  rationale: Established apocalyptic expression; a literal rendering is clear and
    preserves the text's theological terminology.
- source_word: οὐκ ἔχει ἐξουσίαν
  chosen: has no authority
  alternatives:
  - has no power
  - has no right
  lexicon: BDAG
  rationale: ἐξουσία denotes authority or jurisdiction more than raw power. 'Has no
    authority' best matches the legal-governing nuance in context.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - priestly servants
  lexicon: BDAG
  rationale: The noun directly denotes priests. A more interpretive rendering would
    weaken the cultic and royal-priestly imagery.
- source_word: τοῦ θεοῦ καὶ τοῦ χριστοῦ
  chosen: of God and of the Messiah
  alternatives:
  - of God and of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' where context
    supports title sense. Here it is paired with 'God' in a formal genitival construction,
    so the titular sense is prominent.
- source_word: βασιλεύσουσιν
  chosen: they will reign
  alternatives:
  - they will rule as kings
  lexicon: BDAG
  rationale: '''Reign'' is the standard and sufficiently transparent rendering, preserving
    royal participation without over-expanding the wording.'
- source_word: μετ’ αὐτοῦ
  chosen: with him
  lexicon: BDAG
  rationale: Natural rendering of companionship/association in reign; the antecedent
    is the Messiah in context.
- source_word: χίλια ἔτη
  chosen: for a thousand years
  alternatives:
  - a thousand years
  lexicon: BDAG
  rationale: Including 'for' makes the duration explicit in idiomatic English, though
    the Greek accusative of extent could also be rendered without it.
