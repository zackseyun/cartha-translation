theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated 'Messiah' where
    it functions as a title rather than a name-like form. In this verse, the phrase
    'of God and of the Messiah' is titular and fits that policy.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Millennial duration phrase
  chosen_reading: for a thousand years
  alternative_readings:
  - a thousand years
  rationale: The translation preserves the text's explicit temporal statement without
    importing a particular millennial system. The verse states duration; it does not
    itself resolve broader eschatological debates.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
