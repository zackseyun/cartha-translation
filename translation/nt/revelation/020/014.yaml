theological_decisions:
- issue: Rendering of ᾅδης in an eschatological judgment context
  chosen_reading: Hades
  alternative_readings:
  - hell
  - the grave
  rationale: The verse distinguishes ᾅδης from 'the lake of fire'; therefore translating
    it as 'hell' would collapse two distinct images/states into one. 'Hades' preserves
    the conceptual distinction and avoids importing a specific doctrinal model beyond
    the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Personification of θάνατος
  chosen_reading: Capitalized 'Death' in the first clause, lowercase in 'the second
    death'
  alternative_readings:
  - lowercase 'death' throughout
  - capitalized 'Death' throughout
  rationale: The first clause presents Death and Hades as entities acted upon, which
    English can signal with capitalization. The second clause names the eschatological
    reality 'the second death,' where capitalization would over-personify the expression.
    This preserves the literary force without adding doctrine.
  doctrine_reference: 'Translation philosophy: readable modern English; do not import
    doctrinal claims the text does not make.'
