id: REV.20.14
reference: Revelation 20:14
source:
  edition: SBLGNT
  text: καὶ ὁ θάνατος καὶ ὁ ᾅδης ἐβλήθησαν εἰς τὴν λίμνην τοῦ πυρός. οὗτος ὁ ⸂θάνατος
    ὁ δεύτερός⸃ ἐστιν, ἡ λίμνη τοῦ πυρός.
translation:
  text: 'And Death and Hades were thrown into the lake of fire. This is the second
    death: the lake of fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave.' The Greek term is 'Hades,' which here is distinct from the
      'lake of fire'; therefore 'hell' is also used by some translations but can be
      misleading in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάνατος
  chosen: Death
  alternatives:
  - death
  lexicon: BDAG
  rationale: Rendered as the personified proper-like 'Death' in the first clause because
    it is paired with Hades as an entity cast into the lake of fire, reflecting apocalyptic
    personification. In the phrase 'the second death,' rendered as common noun 'death'
    because it functions as the designation of a state/judgment rather than a personified
    agent.
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the grave
  - hell
  lexicon: BDAG
  rationale: Transliterated as 'Hades' to preserve the distinct Greek term and avoid
    conflating it with final punishment ('hell') or flattening it to merely 'the grave.'
    In this context it is distinguished from the lake of fire, so 'hell' would be
    misleading.
- source_word: ἐβλήθησαν
  chosen: were thrown
  alternatives:
  - were cast
  lexicon: BDAG
  rationale: Passive aorist of βάλλω rendered with natural modern English 'were thrown.'
    'Were cast' is traditional but less contemporary; both preserve the force of forcible
    consigning.
- source_word: λίμνη τοῦ πυρός
  chosen: lake of fire
  alternatives:
  - fiery lake
  lexicon: BDAG
  rationale: Standard, transparent rendering of the genitive construction, preserving
    the established apocalyptic image without paraphrase.
- source_word: οὗτος
  chosen: This is
  alternatives:
  - This means
  - This
  lexicon: BDAG
  rationale: Kept the demonstrative explicitly as 'This is' to preserve the equative
    statement identifying the referent, rather than interpreting more loosely.
- source_word: θάνατος ὁ δεύτερος
  chosen: the second death
  alternatives:
  - death, the second
  lexicon: BDAG
  rationale: Natural English rendering of the articular noun plus adjective construction.
    Preserves the technical apocalyptic expression used in Revelation.
- source_word: ἡ λίμνη τοῦ πυρός
  chosen: the lake of fire
  alternatives:
  - the fiery lake
  lexicon: BDAG
  rationale: Repeated identically in the second clause for consistency and to mirror
    the Greek repetition.
