id: REV.20.3
reference: Revelation 20:3
source:
  edition: SBLGNT
  text: καὶ ἔβαλεν αὐτὸν εἰς τὴν ἄβυσσον, καὶ ἔκλεισεν καὶ ἐσφράγισεν ἐπάνω αὐτοῦ,
    ἵνα μὴ ⸀πλανήσῃ ἔτι τὰ ἔθνη, ἄχρι τελεσθῇ τὰ χίλια ἔτη· ⸀μετὰ ταῦτα δεῖ ⸂λυθῆναι
    αὐτὸν⸃ μικρὸν χρόνον.
translation:
  text: And he threw him into the abyss, and shut it and sealed it over him, so that
    he might no longer deceive the nations until the thousand years were finished.
    After these things he must be released for a short time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bottomless pit' for 'abyss.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that he might not mislead the nations any longer.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he must be loosed for a little while.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  chosen: threw
  alternatives:
  - cast
  lexicon: BDAG
  rationale: Aorist of βάλλω with direct object and destination; 'threw' is vivid,
    natural modern English and preserves the force of forcible placement better than
    the more traditional but slightly archaic 'cast'.
- source_word: ἄβυσσον
  chosen: abyss
  alternatives:
  - bottomless pit
  - deep
  lexicon: BDAG
  rationale: ἄβυσσος in Revelation functions as an apocalyptic place term. 'Abyss'
    preserves the established conceptual sense without importing the more interpretive
    traditional phrase 'bottomless pit.'
- source_word: ἔκλεισεν
  chosen: shut
  alternatives:
  - locked
  - closed
  lexicon: BDAG
  rationale: κλείω means to shut/close. 'Shut' fits the sequence with 'sealed' and
    avoids over-specifying with 'locked,' which the Greek does not explicitly state.
- source_word: ἐσφράγισεν ἐπάνω αὐτοῦ
  chosen: sealed it over him
  alternatives:
  - sealed it above him
  - sealed it upon him
  lexicon: BDAG
  rationale: The verb σφραγίζω means 'seal.' With ἐπάνω αὐτοῦ, the sense is that the
    abyss was secured over him. Rendering the implied object as 'it' in English is
    necessary for clarity, while 'over him' preserves the spatial relation.
- source_word: ἵνα μὴ πλανήσῃ ἔτι τὰ ἔθνη
  chosen: so that he might no longer deceive the nations
  alternatives:
  - so that he might not mislead the nations any longer
  lexicon: BDAG
  rationale: πλανάω commonly means 'deceive' or 'lead astray.' 'Deceive' is concise
    and idiomatic here. ἔτι is best attached to the verbal idea as 'no longer.' τὰ
    ἔθνη is rendered 'the nations,' the standard sense in Revelation.
- source_word: ἄχρι τελεσθῇ τὰ χίλια ἔτη
  chosen: until the thousand years were finished
  alternatives:
  - until the thousand years were completed
  - until the thousand years should be ended
  lexicon: BDAG
  rationale: τελεσθῇ (aorist passive subjunctive of τελέω) here denotes reaching completion.
    'Were finished' is natural English and preserves the temporal boundary introduced
    by ἄχρι.
- source_word: μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After that
  - Afterward
  lexicon: BDAG
  rationale: A relatively formal temporal transition that mirrors the Greek closely
    and fits Revelation's discourse style.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is required
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'Must' is the clearest and most idiomatic rendering,
    preserving the sense of divine necessity without over-explaining it.
- source_word: λυθῆναι αὐτὸν
  chosen: he must be released
  alternatives:
  - he must be loosed
  - it is necessary for him to be released
  lexicon: BDAG
  rationale: Passive infinitive of λύω in this context means to be set free/released
    from restraint. 'Released' communicates the sense in contemporary English better
    than the traditional 'loosed.'
- source_word: μικρὸν χρόνον
  chosen: for a short time
  alternatives:
  - for a little while
  - for a brief time
  lexicon: BDAG
  rationale: An accusative of duration. 'For a short time' is straightforward and
    natural, preserving the limited duration indicated by μικρόν.
