theological_decisions:
- issue: Nature of the 'thousand years'
  chosen_reading: Render τὰ χίλια ἔτη straightforwardly as 'the thousand years' without
    interpretive qualification.
  alternative_readings:
  - a literal millennium
  - a symbolic long period
  rationale: The translation should not resolve millennial debates in the wording.
    A direct rendering preserves the text's language while leaving eschatological
    interpretation open.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of δεῖ in apocalyptic context
  chosen_reading: Translate as 'must' to reflect necessity without specifying the
    mechanism of that necessity.
  alternative_readings:
  - divine decree
  - mere narrative inevitability
  rationale: The Greek indicates necessity, but the verse itself does not explicitly
    unpack whether this is divine decree, prophetic necessity, or narrative sequence.
    'Must' preserves the force without importing a system.
  doctrine_reference: Do not import doctrinal claims the text does not make.
