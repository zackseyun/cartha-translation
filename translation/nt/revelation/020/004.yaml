theological_decisions:
- issue: Ambiguity of the subject of ἐκάθισαν and recipients of judgment
  chosen_reading: Kept the subject indefinite as 'they' and 'to them' without identifying
    them as saints, martyrs, apostles, or heavenly beings.
  alternative_readings:
  - identified as the martyrs
  - identified as all the saints
  - identified as heavenly court figures
  rationale: The Greek leaves the subject implicit. Supplying a specific referent
    would import an interpretive decision not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of διὰ τὴν μαρτυρίαν Ἰησοῦ
  chosen_reading: Rendered 'because of the testimony of Jesus' in the main text and
    preserved 'their testimony about Jesus' as a footnote alternative.
  alternative_readings:
  - because of their testimony about Jesus
  - for the witness borne by Jesus
  rationale: The genitive is genuinely ambiguous. A literal rendering in the main
    text best preserves the ambiguity, while the footnote documents the common alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine file directs that
    Christological titles be translated where context supports.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
- issue: Rendering of ἔζησαν
  chosen_reading: they came to life
  alternative_readings:
  - they lived
  - they lived again
  rationale: This wording reflects the eventive force in context while avoiding unnecessary
    doctrinal specification about the nature of the resurrection beyond what the text
    states.
  doctrine_reference: Within orthodoxy, do not advocate a denominational distinctive
    unless the Greek unambiguously supports one reading.
