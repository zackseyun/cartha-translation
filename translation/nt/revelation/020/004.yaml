id: REV.20.4
reference: Revelation 20:4
source:
  edition: SBLGNT
  text: Καὶ εἶδον θρόνους, καὶ ἐκάθισαν ἐπ’ αὐτούς, καὶ κρίμα ἐδόθη αὐτοῖς, καὶ τὰς
    ψυχὰς τῶν πεπελεκισμένων διὰ τὴν μαρτυρίαν Ἰησοῦ καὶ διὰ τὸν λόγον τοῦ θεοῦ, καὶ
    οἵτινες οὐ προσεκύνησαν τὸ θηρίον οὐδὲ τὴν εἰκόνα αὐτοῦ καὶ οὐκ ἔλαβον τὸ χάραγμα
    ἐπὶ τὸ μέτωπον καὶ ἐπὶ τὴν χεῖρα αὐτῶν· καὶ ἔζησαν καὶ ἐβασίλευσαν μετὰ τοῦ χριστοῦ
    ⸀χίλια ἔτη.
translation:
  text: And I saw thrones, and they sat on them, and judgment was given to them, and
    the souls of those who had been beheaded because of the testimony of Jesus and
    because of the word of God, and those who had not worshiped the beast or its image
    and had not received the mark on their forehead and on their hand; and they came
    to life and reigned with the Messiah for a thousand years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because of their testimony about Jesus.' The Greek phrase 'the testimony
      of Jesus' may mean testimony borne by Jesus or testimony about Jesus.
    reason: alternative_reading
  - marker: b
    text: Or, 'with Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: θρόνους
  chosen: thrones
  lexicon: BDAG
  rationale: Direct concrete rendering; no contextual reason to soften or paraphrase.
- source_word: ἐκάθισαν ἐπ’ αὐτούς
  chosen: they sat on them
  alternatives:
  - they were seated on them
  - some sat on them
  lexicon: BDAG
  rationale: The Greek has an active plural verb with implicit subject. 'They sat
    on them' preserves the ambiguity of the unnamed subject better than supplying
    an interpretive identification. A more passive English form would obscure the
    active verb.
- source_word: κρίμα ἐδόθη αὐτοῖς
  chosen: judgment was given to them
  alternatives:
  - authority to judge was given to them
  - the right of judgment was given to them
  lexicon: BDAG
  rationale: κρίμα can denote judgment, verdict, or judicial authority. The more literal
    'judgment was given to them' preserves the wording and leaves open whether the
    sense is judicial authority or the act/result of judging. The alternatives are
    interpretive expansions.
- source_word: ψυχὰς
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: In apocalyptic context, 'souls' is the most transparent rendering and
    matches the visionary register. 'Lives' or 'persons' would flatten the imagery
    and potentially obscure the distinction between their prior death and subsequent
    coming to life.
- source_word: πεπελεκισμένων
  chosen: had been beheaded
  alternatives:
  - had been executed with an axe
  - had been beheaded with an axe
  lexicon: BDAG
  rationale: The perfect passive participle refers specifically to execution by beheading.
    'Had been beheaded' is idiomatic and sufficiently precise without overloading
    the English with instrument detail.
- source_word: διὰ τὴν μαρτυρίαν Ἰησοῦ
  chosen: because of the testimony of Jesus
  alternatives:
  - for the testimony of Jesus
  - because of their testimony about Jesus
  lexicon: BDAG
  rationale: 'διά with accusative here expresses cause: ''because of.'' The genitive
    Ἰησοῦ is ambiguous between testimony borne by Jesus and testimony about Jesus.
    The main text keeps the more literal ''of Jesus'' to preserve the theological
    tension rather than resolving it.'
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  chosen: because of the word of God
  alternatives:
  - for the word of God
  lexicon: BDAG
  rationale: Again διά with accusative is causal. 'Word of God' is standard and transparent.
- source_word: οἵτινες
  chosen: those who
  alternatives:
  - who
  - namely those who
  lexicon: BDAG
  rationale: This relative pronoun introduces a qualitative/identifying group. 'Those
    who' is natural English and preserves the class-identifying force.
- source_word: προσεκύνησαν
  chosen: had not worshiped
  alternatives:
  - did not worship
  - had not bowed down to
  lexicon: BDAG
  rationale: The aorist is best rendered in English here with pluperfect-like relation
    within the vision sequence, since their refusal precedes 'they came to life.'
    'Worshiped' captures the religious force better than merely physical 'bowed down.'
- source_word: θηρίον
  chosen: the beast
  lexicon: BDAG
  rationale: Established apocalyptic term and the plain lexical sense.
- source_word: εἰκόνα
  chosen: image
  alternatives:
  - likeness
  - idol
  lexicon: BDAG
  rationale: '''Image'' is the direct rendering and preserves intertextual resonance
    with Revelation''s imagery. ''Idol'' is interpretive.'
- source_word: χάραγμα
  chosen: the mark
  alternatives:
  - brand
  - stamp
  lexicon: BDAG
  rationale: '''Mark'' is the standard and clearest rendering in Revelation''s context.'
- source_word: ἐπὶ τὸ μέτωπον ... καὶ ἐπὶ τὴν χεῖρα αὐτῶν
  chosen: on their forehead and on their hand
  alternatives:
  - upon their forehead and upon their hand
  - on their foreheads and on their hands
  lexicon: BDAG
  rationale: The Greek uses singular nouns distributively. Singular English ('their
    forehead ... their hand') preserves that distributive sense more closely than
    pluralizing.
- source_word: ἔζησαν
  chosen: they came to life
  alternatives:
  - they lived
  - they lived again
  lexicon: BDAG
  rationale: In this context, following mention of the slain and preceding reign,
    'came to life' best conveys the ingressive sense without importing a specific
    millennial interpretation beyond the text. 'Lived again' is possible but slightly
    more interpretive and text-tradition driven.
- source_word: ἐβασίλευσαν
  chosen: reigned
  alternatives:
  - ruled as kings
  lexicon: BDAG
  rationale: '''Reigned'' is concise, natural, and preserves the royal sense.'
- source_word: μετὰ τοῦ χριστοῦ
  chosen: with the Messiah
  alternatives:
  - with Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as title is translated 'Messiah' where context
    supports. Here it is titular rather than name-like, so 'Messiah' preserves the
    meaning of the title.
- source_word: χίλια ἔτη
  chosen: for a thousand years
  lexicon: BDAG
  rationale: Standard temporal expression with μετά + genitive phrase preceding; 'for
    a thousand years' is the natural English rendering.
