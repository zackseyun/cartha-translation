theological_decisions:
- issue: Rendering ἀνθρώπου in the third creature's description
  chosen_reading: a face like a man
  alternative_readings:
  - a human face
  - the face of a human being
  rationale: The Greek uses ἀνθρώπου, which can denote a human being generically,
    but the translation philosophy prefers gender-accurate renderings where the source
    uses masculine form with representative force. 'A face like a man' preserves the
    lexical form and the comparison introduced by ὡς, while an inclusive alternative
    is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
