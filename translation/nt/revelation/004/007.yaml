id: REV.4.7
reference: Revelation 4:7
source:
  edition: SBLGNT
  text: καὶ τὸ ζῷον τὸ πρῶτον ὅμοιον λέοντι, καὶ τὸ δεύτερον ζῷον ὅμοιον μόσχῳ, καὶ
    τὸ τρίτον ζῷον ⸀ἔχων ⸂τὸ πρόσωπον ὡς⸃ ἀνθρώπου, καὶ τὸ τέταρτον ζῷον ὅμοιον ἀετῷ
    πετομένῳ·
translation:
  text: And the first living creature was like a lion, and the second living creature
    like a calf, and the third living creature had a face like a man, and the fourth
    living creature was like an eagle in flight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a human face.' The Greek literally says 'a face like a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῷον
  chosen: living creature
  alternatives:
  - creature
  - animal
  - beast
  lexicon: BDAG
  rationale: Rendered as 'living creature' rather than 'beast' to distinguish these
    throne-room beings from the hostile θηρίον imagery later in Revelation and to
    reflect the broader sense of ζῷον in this apocalyptic context.
- source_word: ὅμοιον
  chosen: was like / like
  alternatives:
  - similar to
  - resembled
  lexicon: BDAG
  rationale: The adjective indicates likeness rather than identity. English varies
    slightly ('was like' for smoother clauses; 'like' in the second coordinated clause)
    while preserving the same semantic force.
- source_word: λέοντι
  chosen: lion
  lexicon: BDAG
  rationale: Straightforward animal term in the dative after ὅμοιον, naturally rendered
    'like a lion'.
- source_word: μόσχῳ
  chosen: calf
  alternatives:
  - young ox
  - ox
  lexicon: BDAG
  rationale: μόσχος commonly denotes a calf or young bovine. 'Calf' is the most natural
    and traditional English equivalent here, without over-specifying sex or sacrificial
    connotations.
- source_word: ἔχων
  chosen: had
  alternatives:
  - having
  lexicon: BDAG
  rationale: 'The participle is rendered with a finite verb in English for readability:
    ''the third living creature had...'' This preserves the descriptive force without
    awkwardness.'
- source_word: τὸ πρόσωπον ὡς ἀνθρώπου
  chosen: a face like a man
  alternatives:
  - the face of a man
  - a human face
  lexicon: BDAG
  rationale: πρόσωπον is 'face.' ὡς marks comparison, so 'like a man' is preferable
    to the more interpretive 'human face.' 'Man' follows the Greek ἀνθρώπου in a gender-accurate,
    representative sense and preserves the source's wording.
- source_word: ἀετῷ
  chosen: eagle
  alternatives:
  - vulture
  lexicon: BDAG
  rationale: ἀετός can denote eagle and in some contexts vulture, but 'eagle' is the
    standard and best fits the exalted visionary imagery here.
- source_word: πετομένῳ
  chosen: in flight
  alternatives:
  - flying
  lexicon: BDAG
  rationale: The participle modifies ἀετῷ and depicts the eagle in the act/state of
    flying. 'In flight' is idiomatic English and preserves the vividness of the image.
