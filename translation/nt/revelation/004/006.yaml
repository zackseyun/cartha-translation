id: REV.4.6
reference: Revelation 4:6
source:
  edition: SBLGNT
  text: καὶ ἐνώπιον τοῦ θρόνου ὡς θάλασσα ὑαλίνη ὁμοία κρυστάλλῳ. Καὶ ἐν μέσῳ τοῦ
    θρόνου καὶ κύκλῳ τοῦ θρόνου τέσσαρα ζῷα γέμοντα ὀφθαλμῶν ἔμπροσθεν καὶ ὄπισθεν·
translation:
  text: And before the throne was something like a sea of glass, like crystal. And
    in the midst of the throne and around the throne were four living creatures, full
    of eyes in front and behind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a glassy sea.'' The Greek presents a comparison: ''something like
      a sea of glass.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'four living beings.' The Greek word does not mean the hostile 'beasts'
      of later Revelation passages.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in the midst of the throne and around the throne' is spatially
      difficult; the Greek likely reflects visionary perspective and is left intentionally
      close to the source.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in front of
  - before the presence of
  lexicon: BDAG
  rationale: Standard spatial rendering in this visionary scene; 'before' is natural
    English and preserves the relation to the throne without overexpanding to 'presence
    of.'
- source_word: ὡς
  chosen: something like
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: Introduces comparison rather than strict identification. 'Something like'
    makes the visionary approximation explicit in English, especially with the unusual
    image that follows.
- source_word: θάλασσα ὑαλίνη
  chosen: a sea of glass
  alternatives:
  - a glassy sea
  - a sea like glass
  lexicon: BDAG
  rationale: Conventional but accurate rendering of the noun-adjective phrase. 'Sea
    of glass' is clear, vivid, and preserves the imagery without implying literal
    water.
- source_word: ὁμοία κρυστάλλῳ
  chosen: like crystal
  alternatives:
  - resembling crystal
  - similar to crystal
  lexicon: BDAG
  rationale: A second comparison intensifying clarity/brilliance. 'Like crystal' is
    concise and idiomatic.
- source_word: ἐν μέσῳ τοῦ θρόνου καὶ κύκλῳ τοῦ θρόνου
  chosen: in the midst of the throne and around the throne
  alternatives:
  - at the center, around the throne
  - in the middle of the throne and around the throne
  lexicon: BDAG
  rationale: The Greek intentionally presents a difficult spatial description. This
    rendering stays close to the wording and preserves the tension rather than smoothing
    it into a single interpretive picture.
- source_word: ζῷα
  chosen: living creatures
  alternatives:
  - creatures
  - living beings
  - beasts
  lexicon: BDAG
  rationale: In apocalyptic context, 'living creatures' best reflects the term without
    the misleading negative connotations of 'beasts,' which English readers may confuse
    with the hostile beast imagery later in Revelation.
- source_word: γέμοντα ὀφθαλμῶν
  chosen: full of eyes
  alternatives:
  - covered with eyes
  - filled with eyes
  lexicon: BDAG
  rationale: Idiomatic rendering of the participial construction with genitive complement.
    'Full of eyes' is both literal enough and readable.
- source_word: ἔμπροσθεν καὶ ὄπισθεν
  chosen: in front and behind
  alternatives:
  - before and behind
  - in front and in back
  lexicon: BDAG
  rationale: Natural English adverbial pair describing the creatures' all-seeing appearance.
