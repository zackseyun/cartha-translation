theological_decisions:
- issue: Rendering ζῷα in a heavenly throne-room vision
  chosen_reading: living creatures
  alternative_readings:
  - living beings
  - beasts
  rationale: The term denotes animate beings around God's throne, echoing Ezekiel's
    throne vision. 'Living creatures' preserves the exalted visionary sense and avoids
    importing the hostile associations that 'beasts' carries in English Revelation
    usage.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Handling the spatial tension in ἐν μέσῳ τοῦ θρόνου καὶ κύκλῳ τοῦ θρόνου
  chosen_reading: preserve the wording 'in the midst of the throne and around the
    throne'
  alternative_readings:
  - harmonize to 'around the throne, in the center'
  - interpret as 'between the throne and its circle'
  rationale: The Greek is deliberately difficult or visionary in perspective. Per
    the doctrine's instruction to preserve theological/interpreive tension rather
    than resolve it, the translation keeps the unusual phrasing instead of forcing
    a clarified geometry.
  doctrine_reference: Translation philosophy §3
