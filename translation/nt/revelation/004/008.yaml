id: REV.4.8
reference: Revelation 4:8
source:
  edition: SBLGNT
  text: καὶ τὰ τέσσαρα ζῷα, ἓν ⸂καθ’ ἓν⸃ ⸀αὐτῶν ⸀ἔχων ἀνὰ πτέρυγας ἕξ, κυκλόθεν καὶ
    ἔσωθεν γέμουσιν ὀφθαλμῶν· καὶ ἀνάπαυσιν οὐκ ἔχουσιν ἡμέρας καὶ νυκτὸς λέγοντες·
    Ἅγιος ἅγιος ἅγιος κύριος, ὁ θεός, ὁ παντοκράτωρ, ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος.
translation:
  text: 'And the four living creatures, each one of them having six wings, are full
    of eyes all around and within; and they have no rest day and night, saying: “Holy,
    holy, holy is the Lord God, the Almighty, who was and who is and who is coming.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “who was and who is and who is to come.”
    reason: alternative_reading
lexical_decisions:
- source_word: ζῷα
  chosen: living creatures
  alternatives:
  - living beings
  - creatures
  lexicon: BDAG
  rationale: In Revelation, ζῷα refers to animate heavenly beings, not 'animals' in
    the modern sense. 'Living creatures' is established and accurately distinguishes
    them from beasts while preserving the visionary imagery.
- source_word: ἓν καθ’ ἓν αὐτῶν
  chosen: each one of them
  alternatives:
  - one by one
  - each of them
  lexicon: BDAG
  rationale: The distributive expression emphasizes each individual creature separately.
    'Each one of them' brings out the force naturally in English.
- source_word: ἔχων ἀνὰ πτέρυγας ἕξ
  chosen: having six wings
  alternatives:
  - with six wings each
  lexicon: BDAG
  rationale: The participial phrase modifies the distributive subject and states that
    each creature possesses six wings. 'Having six wings' is straightforward and close
    to the Greek.
- source_word: κυκλόθεν καὶ ἔσωθεν
  chosen: all around and within
  alternatives:
  - around and inside
  - round about and within
  lexicon: BDAG
  rationale: The pair of adverbs stresses comprehensive coverage of eyes externally
    and internally. 'All around and within' is idiomatic and preserves both spatial
    dimensions.
- source_word: γέμουσιν ὀφθαλμῶν
  chosen: are full of eyes
  alternatives:
  - are covered with eyes
  - are filled with eyes
  lexicon: BDAG
  rationale: γέμω with the genitive means 'be full of.' 'Are full of eyes' is the
    most direct rendering and preserves the vivid apocalyptic image.
- source_word: ἀνάπαυσιν οὐκ ἔχουσιν
  chosen: they have no rest
  alternatives:
  - they do not cease
  - they have no respite
  lexicon: BDAG
  rationale: ἀνάπαυσις denotes rest or respite. 'Have no rest' is both literal and
    natural, and it avoids overinterpreting the phrase as mere verbal repetition.
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: BDAG
  rationale: The genitives function adverbially to indicate continual action. 'Day
    and night' is the standard concise English equivalent.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - as they say
  - crying out
  lexicon: BDAG
  rationale: The participle introduces the content of their ongoing proclamation.
    'Saying' is sufficiently neutral and does not add intensity not explicit in the
    verb itself.
- source_word: Ἅγιος ἅγιος ἅγιος
  chosen: Holy, holy, holy
  lexicon: BDAG
  rationale: The threefold repetition should be preserved exactly, since it is rhetorically
    and theologically significant in the heavenly liturgy.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it functions as
    a divine title in worship.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: The article is not normally reproduced in English before a proper divine
    designation in this construction. 'Lord God' is the natural equivalent.
- source_word: ὁ παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Powerful
  - the Ruler of all
  lexicon: BDAG
  rationale: παντοκράτωρ is a divine title meaning the one who holds all power or
    rules all. 'The Almighty' is the standard, theologically weighty, and natural
    English rendering.
- source_word: ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος
  chosen: who was and who is and who is coming
  alternatives:
  - who was and who is and who is to come
  lexicon: BDAG
  rationale: The final participle ἐρχόμενος is a present middle/passive participle,
    literally 'the one coming.' Rendering it as 'who is coming' preserves the verbal
    aspect and avoids flattening it into a mere future paraphrase, while the traditional
    alternative is worth preserving in a footnote because of its familiarity and possible
    idiomatic force.
