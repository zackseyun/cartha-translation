theological_decisions:
- issue: Rendering the divine temporal formula ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος
  chosen_reading: who was and who is and who is coming
  alternative_readings:
  - who was and who is and who is to come
  rationale: The Greek uses a present participle for the final element, not an infinitive
    or simple future expression. Preserving 'is coming' better reflects the source
    text's aspect and the eschatological immediacy of Revelation, while the traditional
    'is to come' remains a legitimate idiomatic alternative and is preserved in a
    footnote rather than adopted in the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
