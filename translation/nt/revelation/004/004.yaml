id: REV.4.4
reference: Revelation 4:4
source:
  edition: SBLGNT
  text: καὶ κυκλόθεν τοῦ θρόνου ⸀θρόνοι εἴκοσι τέσσαρες, καὶ ἐπὶ τοὺς ⸀θρόνους εἴκοσι
    τέσσαρας πρεσβυτέρους καθημένους περιβεβλημένους ⸀ἐν ἱματίοις λευκοῖς, καὶ ἐπὶ
    τὰς κεφαλὰς αὐτῶν στεφάνους χρυσοῦς.
translation:
  text: And around the throne were twenty-four thrones, and on the thrones were seated
    twenty-four elders, clothed in white garments, and on their heads were golden
    crowns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'victory wreaths'; the Greek word can denote a crown awarded for honor
      or victory, not only a royal diadem.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυκλόθεν
  chosen: around
  alternatives:
  - surrounding
  - all around
  lexicon: BDAG
  rationale: Adverb/preposition indicating encircling spatial relation. 'Around' is
    natural modern English and preserves the visual arrangement.
- source_word: θρόνοι
  chosen: thrones
  alternatives:
  - seats
  lexicon: BDAG
  rationale: The same noun as the central 'throne' is used for the twenty-four surrounding
    seats. 'Thrones' preserves the regal/judicial imagery better than the weaker 'seats.'
- source_word: εἴκοσι τέσσαρες
  chosen: twenty-four
  rationale: Standard rendering of the numeral; hyphenated in English style.
- source_word: ἐπὶ τοὺς θρόνους
  chosen: on the thrones
  alternatives:
  - upon the thrones
  lexicon: BDAG
  rationale: With accusative after ἐπί in this context, the sense is location/rest
    in idiomatic English. 'On the thrones' is straightforward and natural.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In Revelation this is a recognized heavenly group/title, so 'elders'
    is the established and contextually appropriate rendering rather than the merely
    age-descriptive 'older men.'
- source_word: καθημένους
  chosen: were seated
  alternatives:
  - sitting
  - seated
  lexicon: BDAG
  rationale: Rendered with an English finite verb to make the participial construction
    natural. 'Were seated' conveys posture/state and fits the vision report style.
- source_word: περιβεβλημένους
  chosen: clothed
  alternatives:
  - dressed
  - wearing
  lexicon: BDAG
  rationale: Perfect participle indicating a state of being arrayed. 'Clothed' preserves
    the elevated tone without becoming archaic.
- source_word: ἐν ἱματίοις λευκοῖς
  chosen: in white garments
  alternatives:
  - in white robes
  - wearing white clothes
  lexicon: BDAG
  rationale: ἱμάτια are garments/clothes broadly. 'Garments' is slightly more formal
    and avoids over-specifying 'robes,' which the Greek does not require, while preserving
    the solemn scene.
- source_word: στεφάνους
  chosen: crowns
  alternatives:
  - wreaths
  - victor's crowns
  lexicon: BDAG
  rationale: στέφανος denotes a wreath/crown, often associated with victory or honor.
    In this throne-room context, 'crowns' is the clearest English rendering; the more
    specific nuance can be preserved in a footnote.
- source_word: χρυσοῦς
  chosen: golden
  alternatives:
  - of gold
  lexicon: BDAG
  rationale: Attributive adjective naturally rendered as 'golden' in English; concise
    and idiomatic.
