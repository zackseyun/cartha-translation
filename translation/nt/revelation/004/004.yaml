theological_decisions:
- issue: Nature of the twenty-four surrounding θρόνοι
  chosen_reading: Rendered as 'thrones' rather than 'seats' to preserve the exalted
    royal/judicial imagery without deciding the identity of the elders.
  alternative_readings:
  - Rendered as 'seats' in some translations to avoid implying equal sovereignty with
    the central throne.
  rationale: The Greek repeats θρόνος, so the translation should preserve that lexical
    link. Using 'thrones' does not flatten the distinction, since the singular central
    throne remains primary in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identity of the twenty-four elders
  chosen_reading: Left as 'elders' without interpretive expansion.
  alternative_readings:
  - Representatives of the church
  - Angelic beings
  - Representatives of Israel and the apostles
  rationale: The verse itself names them πρεσβύτεροι but does not explain their identity.
    The translation preserves the term and avoids importing a denominational interpretation.
  doctrine_reference: Affirmations; Translation philosophy §3
