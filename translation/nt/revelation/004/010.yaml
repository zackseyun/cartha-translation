theological_decisions:
- issue: Referent of the enthroned and living one
  chosen_reading: 'Render with reverential but non-interpretive language: ''the one
    seated on the throne'' and ''the one who lives forever and ever.'''
  alternative_readings:
  - Explicitly identify as God the Father in the translation
  rationale: The context strongly indicates the enthroned God, but the Greek text
    itself uses descriptive titles rather than a proper identification in this verse.
    The translation preserves the text's own wording without importing a fuller doctrinal
    specification.
  doctrine_reference: Preserve theological tension rather than resolve it.
