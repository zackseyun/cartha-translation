id: REV.4.10
reference: Revelation 4:10
source:
  edition: SBLGNT
  text: πεσοῦνται οἱ εἴκοσι τέσσαρες πρεσβύτεροι ἐνώπιον τοῦ καθημένου ἐπὶ τοῦ θρόνου,
    καὶ προσκυνήσουσιν τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων, καὶ βαλοῦσιν τοὺς στεφάνους
    αὐτῶν ἐνώπιον τοῦ θρόνου, λέγοντες·
translation:
  text: 'the twenty-four elders will fall down before the one seated on the throne,
    and they will worship the one who lives forever and ever, and they will cast their
    crowns before the throne, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'to the ages of ages.'
    reason: lexical_alternative
  - marker: b
    text: The Greek word for 'crowns' can also refer to victory wreaths awarded as
      a sign of honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεσοῦνται
  chosen: will fall down
  alternatives:
  - will fall
  - will prostrate themselves
  lexicon: BDAG
  rationale: Future middle of πίπτω in this worship context denotes falling down in
    reverence. 'Fall down' preserves the physical action and its liturgical force
    without over-interpreting as full prostration.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - presbyters
  lexicon: BDAG
  rationale: Standard rendering for πρεσβύτεροι in Revelation's heavenly court setting.
    'Presbyters' is too technical for the target audience.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is the natural concise English equivalent here and fits both
    occurrences in the verse.'
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  chosen: the one seated on the throne
  alternatives:
  - him who is seated on the throne
  - the one sitting on the throne
  lexicon: BDAG
  rationale: Substantival participle is best rendered with an English participial
    title. 'The one seated on the throne' is idiomatic, reverent, and preserves the
    ongoing enthroned state.
- source_word: προσκυνήσουσιν
  chosen: will worship
  alternatives:
  - will bow down before
  - will pay homage to
  lexicon: BDAG
  rationale: In Revelation this verb in divine context is best rendered 'worship.'
    'Bow down' captures gesture but can understate the religious devotion explicit
    in context.
- source_word: τῷ ζῶντι
  chosen: the one who lives
  alternatives:
  - the living one
  lexicon: BDAG
  rationale: The substantival participle emphasizes God's living, enduring identity.
    'The one who lives' is clear and natural in English.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for ever and ever
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the standard
    natural English equivalent; the more literal 'ages of ages' is preserved as a
    lexical alternative.
- source_word: βαλοῦσιν
  chosen: will cast
  alternatives:
  - will throw
  - will lay down
  lexicon: BDAG
  rationale: βάλλω commonly means 'throw/cast.' 'Cast' preserves the vividness and
    solemnity of the symbolic action better than the flatter 'lay down.'
- source_word: στεφάνους
  chosen: crowns
  alternatives:
  - victory wreaths
  lexicon: BDAG
  rationale: στέφανος refers to a wreath/crown of honor or victory. In this apocalyptic
    royal setting, 'crowns' is the most natural English rendering, though 'victory
    wreaths' reflects the term's historical nuance.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Present participle introduces the content of the following speech. English
    commonly uses simple 'saying' after the finite verbs.
