id: REV.4.3
reference: Revelation 4:3
source:
  edition: SBLGNT
  text: ⸂καὶ ὁ καθήμενος⸃ ὅμοιος ὁράσει λίθῳ ἰάσπιδι καὶ σαρδίῳ, καὶ ἶρις κυκλόθεν
    τοῦ θρόνου ⸂ὅμοιος ὁράσει σμαραγδίνῳ⸃.
translation:
  text: And the one seated there was in appearance like jasper and carnelian stone,
    and around the throne was a rainbow in appearance like emerald.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sardius,' a traditional rendering for the gemstone here translated 'carnelian.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a halo' for 'rainbow'; the Greek term can denote a rainbow-like radiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καθήμενος
  chosen: the one seated there
  alternatives:
  - the one sitting
  - the one seated
  lexicon: BDAG
  rationale: Substantival participle referring to the enthroned figure. 'The one seated'
    is natural English and preserves the ongoing enthroned posture. 'There' is supplied
    idiomatically from context to smooth the clause in English without changing sense.
- source_word: ὅμοιος ὁράσει
  chosen: in appearance like
  alternatives:
  - like in appearance
  - having the appearance of
  lexicon: BDAG
  rationale: The dative ὁράσει expresses respect/sphere ('in appearance, in look').
    Rendering the phrase as 'in appearance like' preserves the visionary comparison
    without overstating material identity.
- source_word: λίθῳ ἰάσπιδι
  chosen: jasper ... stone
  alternatives:
  - a jasper stone
  - jasper
  lexicon: BDAG
  rationale: The construction identifies a precious stone, literally 'to a jasper
    stone.' English can either compress to 'jasper' or retain 'stone.' Here 'stone'
    is retained with the paired expression to reflect λίθῳ while keeping readable
    style.
- source_word: σαρδίῳ
  chosen: carnelian
  alternatives:
  - sardius
  - ruby
  lexicon: BDAG
  rationale: Modern readers are better served by 'carnelian' than the traditional
    but opaque 'sardius.' 'Ruby' is too specific and potentially inaccurate. This
    follows source sense over translation tradition.
- source_word: ἶρις
  chosen: rainbow
  alternatives:
  - halo
  - iris
  lexicon: BDAG
  rationale: In this apocalyptic context the term most naturally denotes a rainbow-like
    radiance encircling the throne. 'Halo' is possible in some contexts but is less
    direct and more interpretive.
- source_word: κυκλόθεν τοῦ θρόνου
  chosen: around the throne
  alternatives:
  - encircling the throne
  - all around the throne
  lexicon: BDAG
  rationale: κυκλόθεν denotes surrounding position. 'Around the throne' is clear,
    idiomatic, and sufficiently precise.
- source_word: ὅμοιος ὁράσει σμαραγδίνῳ
  chosen: in appearance like emerald
  alternatives:
  - looking like an emerald
  - in appearance like an emerald stone
  lexicon: BDAG
  rationale: Again the phrase marks visual resemblance, not literal composition. 'Emerald'
    is the natural English equivalent of σμαραγδίνῳ. The article is not required in
    English in this comparative construction.
