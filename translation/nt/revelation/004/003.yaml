theological_decisions:
- issue: Description of the enthroned figure by simile rather than direct physical
    depiction
  chosen_reading: Retain the language of visual resemblance ('in appearance like')
  alternative_readings:
  - More interpretive renderings that describe the figure as made of gemstones or
    emitting gemstone colors
  rationale: The Greek twice uses comparison language, emphasizing visionary likeness
    and preserving divine transcendence rather than offering a literal physical description.
    The translation should not collapse simile into ontology.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
