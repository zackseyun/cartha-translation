theological_decisions:
- issue: Whether ἐν πνεύματι should be rendered as a reference to the Holy Spirit
    or as a more general ecstatic state ('in spirit')
  chosen_reading: in the Spirit
  alternative_readings:
  - in spirit
  rationale: Within Revelation, this phrase functions as a marker of prophetic visionary
    transport (cf. similar formulae elsewhere in the book). Capitalizing 'Spirit'
    reflects the likely referent without adding content beyond the text. Because the
    Greek lacks the article and some readers may take it more generally, the alternative
    is preserved in a footnote to maintain the text's interpretive tension.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
