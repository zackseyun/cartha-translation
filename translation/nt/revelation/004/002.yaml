id: REV.4.2
reference: Revelation 4:2
source:
  edition: SBLGNT
  text: ⸀εὐθέως ἐγενόμην ἐν πνεύματι· καὶ ἰδοὺ θρόνος ἔκειτο ἐν τῷ οὐρανῷ, καὶ ἐπὶ
    τὸν θρόνον καθήμενος,
translation:
  text: Immediately I came to be in the Spirit, and behold, a throne stood in heaven,
    and one seated on the throne,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in spirit." The Greek phrase lacks the article and may denote either
      being in the Holy Spirit or being in a spiritual/visionary state.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  chosen: Immediately
  alternatives:
  - At once
  - At once/immediately
  lexicon: BDAG
  rationale: Adverb marking immediacy. 'Immediately' is natural modern English and
    preserves the sudden transition in John's experience.
- source_word: ἐγενόμην
  chosen: I came to be
  alternatives:
  - I was
  - I became
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι often means 'become' or 'come to be.' Here it
    signals entry into a visionary state rather than simple static existence. 'I came
    to be' preserves that transition better than the more idiomatic but flatter 'I
    was.'
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  - in the spirit
  lexicon: BDAG
  rationale: The anarthrous πνεύματι in Revelation regularly denotes a prophetic/spiritual
    state. Capitalized 'Spirit' reflects the conventional and likely sense of being
    seized by the Holy Spirit in visionary experience, while preserving the Greek
    phrase's compactness. The alternative 'in spirit' is possible and worth preserving
    in a footnote because the Greek lacks the article.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Discourse particle drawing attention to the vision. 'Behold' retains
    the elevated, apocalyptic force better than the more colloquial 'look' or 'see.'
- source_word: θρόνος
  chosen: a throne
  alternatives:
  - throne
  lexicon: BDAG
  rationale: Anarthrous nominative introducing a new element in the vision; English
    idiom naturally uses the indefinite article here.
- source_word: ἔκειτο
  chosen: stood
  alternatives:
  - was set
  - was standing
  - lay
  lexicon: BDAG
  rationale: Imperfect of κεῖμαι can denote something being situated or set in place.
    For a throne, 'stood' is idiomatic English and conveys established placement.
    'Lay' would be misleading in English for a throne; 'was set' is possible but less
    vivid.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the sky
  lexicon: BDAG
  rationale: 'Standard apocalyptic/celestial sense, not atmospheric ''sky.'' English
    normally omits the article in this idiom: ''in heaven.'''
- source_word: καθήμενος
  chosen: one seated
  alternatives:
  - someone sitting
  - one sitting
  - one seated there
  lexicon: BDAG
  rationale: Substantival participle referring to the occupant of the throne. 'One
    seated' is concise, dignified, and avoids over-specifying identity beyond the
    Greek.
