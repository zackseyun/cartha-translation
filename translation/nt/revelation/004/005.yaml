theological_decisions:
- issue: Interpretation of τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  chosen_reading: Render literally as 'the seven spirits of God' in the main text.
  alternative_readings:
  - the sevenfold Spirit of God
  - a symbolic description of the fullness of the Holy Spirit
  rationale: The Greek text is explicitly plural ('seven spirits'). To translate 'sevenfold
    Spirit' would move from translation into interpretation. In keeping with the stated
    philosophy, the main text preserves the lexical form and theological tension,
    while the alternative interpretive understanding is noted in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
