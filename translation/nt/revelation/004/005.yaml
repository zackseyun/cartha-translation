id: REV.4.5
reference: Revelation 4:5
source:
  edition: SBLGNT
  text: καὶ ἐκ τοῦ θρόνου ἐκπορεύονται ἀστραπαὶ καὶ φωναὶ καὶ βρονταί· καὶ ἑπτὰ λαμπάδες
    πυρὸς καιόμεναι ἐνώπιον τοῦ θρόνου, ⸀ἅ εἰσιν ⸀τὰ ἑπτὰ πνεύματα τοῦ θεοῦ,
translation:
  text: And from the throne come flashes of lightning and sounds and peals of thunder;
    and before the throne were seven fiery lamps burning, which are the seven spirits
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'voices' for 'sounds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'seven torches of fire burning before the throne.'
    reason: lexical_alternative
  - marker: c
    text: Many understand 'the seven spirits of God' as a symbolic way of speaking
      about the fullness of the one Holy Spirit; the Greek text itself reads 'seven
      spirits.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπορεύονται
  chosen: come
  alternatives:
  - proceed
  - go out
  lexicon: BDAG
  rationale: Present middle/passive intransitive with ἐκ, describing phenomena issuing
    from the throne. 'Come' is natural modern English; 'proceed' is more formal but
    can sound technical. The present tense is retained.
- source_word: ἀστραπαὶ
  chosen: flashes of lightning
  alternatives:
  - lightnings
  - lightning flashes
  lexicon: BDAG
  rationale: Plural noun denoting repeated lightning phenomena. 'Flashes of lightning'
    is idiomatic English and preserves the plural sense better than the traditional
    but less natural 'lightnings'.
- source_word: φωναὶ
  chosen: sounds
  alternatives:
  - voices
  - noises
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' In this throne-theophany sequence paired
    with lightning and thunder, the broader 'sounds' best fits without over-specifying
    personal speech. 'Voices' remains possible and is preserved in a footnote because
    of translation tradition and apocalyptic usage.
- source_word: βρονταί
  chosen: peals of thunder
  alternatives:
  - thunders
  - thunderclaps
  lexicon: BDAG
  rationale: Plural noun indicating repeated thunderous reports. 'Peals of thunder'
    is idiomatic and preserves the plural force more clearly than bare 'thunders'
    in contemporary English.
- source_word: λαμπάδες πυρὸς
  chosen: fiery lamps
  alternatives:
  - torches of fire
  - lamps of fire
  lexicon: BDAG
  rationale: λαμπάς often denotes a torch, but 'lamp' is also possible in context.
    Because Revelation 4:5 identifies these symbolically as the seven spirits of God
    and because the imagery is cultic/throne-room rather than handheld battlefield
    torches, 'fiery lamps' balances literalness and readability. The more formal 'torches
    of fire' is preserved in a footnote as a lexical alternative.
- source_word: καιόμεναι
  chosen: burning
  alternatives:
  - blazing
  lexicon: BDAG
  rationale: Present participle modifying 'seven fiery lamps,' indicating ongoing
    burning before the throne. 'Burning' is straightforward and sufficiently vivid.
- source_word: ἐνώπιον τοῦ θρόνου
  chosen: before the throne
  alternatives:
  - in the presence of the throne
  lexicon: BDAG
  rationale: Standard spatial rendering in apocalyptic throne-room scenes; concise
    and natural.
- source_word: ἅ εἰσιν
  chosen: which are
  alternatives:
  - these are
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring back to the seven lamps and
    introducing symbolic identification. 'Which are' is the most direct English equivalent.
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  chosen: the seven spirits of God
  alternatives:
  - the sevenfold Spirit of God
  lexicon: BDAG
  rationale: This is the plain lexical rendering of the Greek plural. Although some
    interpreters understand it as a symbolic reference to the fullness of the one
    Holy Spirit, the translation should preserve the text's wording rather than resolve
    the symbolism interpretively.
