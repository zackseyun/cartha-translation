theological_decisions:
- issue: Rendering the vocative-like title sequence for God
  chosen_reading: our Lord and God
  alternative_readings:
  - O Lord and our God
  - the Lord and our God
  rationale: The Greek article-noun sequence in this worship setting functions as
    direct address to the one seated on the throne. Rendering it vocatively preserves
    the doxological force without importing additional doctrinal content. The verse
    attributes creation to God and uses titles consistent with historic Christian
    orthodoxy, but the translation does not expand beyond the text.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy §§2,
    6'
- issue: Relation of divine will to creation in διὰ τὸ θέλημά σου
  chosen_reading: because of your will they existed and were created
  alternative_readings:
  - by your will they existed and were created
  rationale: The phrase grounds creation and existence in God's will. 'Because of
    your will' preserves the causal nuance of διά + accusative and avoids making a
    stronger philosophical claim than the text itself states. The wording maintains
    the theological emphasis on God's sovereign will as the reason for creation without
    resolving broader metaphysical debates.
  doctrine_reference: Translation philosophy §§1, 3, 6
