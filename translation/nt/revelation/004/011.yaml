id: REV.4.11
reference: Revelation 4:11
source:
  edition: SBLGNT
  text: Ἄξιος εἶ, ὁ κύριος καὶ ὁ θεὸς ⸀ἡμῶν, λαβεῖν τὴν δόξαν καὶ τὴν τιμὴν καὶ τὴν
    δύναμιν, ὅτι σὺ ἔκτισας ⸀τὰ πάντα, καὶ διὰ τὸ θέλημά σου ἦσαν καὶ ἐκτίσθησαν.
translation:
  text: You are worthy, our Lord and God, to receive the glory and the honor and the
    power, because you created all things, and because of your will they existed and
    were created.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by your will they existed and were created.' The Greek phrase διὰ τὸ
      θέλημά σου can be understood with a causal nuance ('because of') or, less likely,
      an instrumental nuance ('by').
    reason: lexical_alternative
  - marker: b
    text: Or, 'Worthy are you, our Lord and God.' The Greek word order places 'worthy'
      first for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄξιος εἶ
  chosen: You are worthy
  alternatives:
  - Worthy are you
  lexicon: BDAG
  rationale: Predicate adjective with εἶ expresses worthiness. 'You are worthy' is
    idiomatic modern English while preserving the direct address and force of the
    Greek.
- source_word: ὁ κύριος καὶ ὁ θεὸς ἡμῶν
  chosen: our Lord and God
  alternatives:
  - O Lord and our God
  - the Lord and our God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine default. The article-plus-noun
    sequence functions vocatively in context; English naturally renders this as direct
    address. 'Our Lord and God' preserves both titles and the possessive ἡμῶν.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to take
  lexicon: BDAG
  rationale: Infinitive of λαμβάνω after ἄξιος expresses what the addressee is worthy
    to receive. 'Receive' fits the worship context better than the more physical 'take.'
- source_word: τὴν δόξαν
  chosen: the glory
  alternatives:
  - glory
  lexicon: BDAG
  rationale: δόξα here denotes honor/glory ascribed in worship. The article is retained
    for rhythmic correspondence with the Greek triad.
- source_word: τὴν τιμήν
  chosen: the honor
  alternatives:
  - honor
  lexicon: BDAG
  rationale: τιμή in this context is honor paid to God. Retaining the article matches
    the Greek structure and preserves the liturgical cadence.
- source_word: τὴν δύναμιν
  chosen: the power
  alternatives:
  - power
  - might
  lexicon: BDAG
  rationale: δύναμις can mean power or might. 'Power' is the more standard and transparent
    rendering here, especially in a doxological list.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the ground for God's worthiness. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal sense.
- source_word: ἔκτισας τὰ πάντα
  chosen: you created all things
  alternatives:
  - you created everything
  lexicon: BDAG
  rationale: κτίζω is straightforwardly 'create.' τὰ πάντα is best rendered 'all things'
    in this elevated context, preserving the comprehensive scope without colloquial
    flattening.
- source_word: διὰ τὸ θέλημά σου
  chosen: because of your will
  alternatives:
  - by your will
  - through your will
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause or reason. 'Because
    of your will' most directly reflects the Greek syntax and avoids over-specifying
    instrumentality.
- source_word: ἦσαν καὶ ἐκτίσθησαν
  chosen: they existed and were created
  alternatives:
  - they came to be and were created
  - they were and were created
  lexicon: BDAG
  rationale: The imperfect ἦσαν and aorist passive ἐκτίσθησαν are both preserved.
    'They existed and were created' reflects the two verbs distinctly without collapsing
    them. The first verb likely states their continued existence or being, while the
    second states the act of creation.
