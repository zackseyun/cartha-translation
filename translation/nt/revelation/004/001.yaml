theological_decisions:
- issue: Temporal force of repeated μετὰ ταῦτα
  chosen_reading: 'Rendered both occurrences as temporal sequence within the vision:
    ''After these things'' ... ''after these things.'''
  alternative_readings:
  - The final phrase could be taken more broadly as 'what must happen after this'
    with less explicit repetition in English.
  rationale: The Greek repeats the phrase, and preserving that repetition avoids over-interpreting
    whether the sequence is literary, visionary, or salvation-historical. This maintains
    the text's temporal language without importing a specific end-times scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
