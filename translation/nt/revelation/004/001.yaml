id: REV.4.1
reference: Revelation 4:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα εἶδον, καὶ ἰδοὺ θύρα ἠνεῳγμένη ἐν τῷ οὐρανῷ, καὶ ἡ φωνὴ ἡ πρώτη
    ἣν ἤκουσα ὡς σάλπιγγος λαλούσης μετ’ ἐμοῦ, λέγων· Ἀνάβα ὧδε, καὶ δείξω σοι ἃ δεῖ
    γενέσθαι. μετὰ ταῦτα
translation:
  text: After these things I looked, and behold, a door standing open in heaven, and
    the first voice that I had heard speaking with me like a trumpet said, “Come up
    here, and I will show you what must take place after these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'After this ... what must take place after this.'
      The Greek repeats the plural phrase 'after these things' at both the beginning
      and end of the verse.
    reason: lexical_alternative
  - marker: b
    text: The expression 'the first voice' likely refers back to the voice John heard
      earlier (see Rev 1:10).
    reason: cross_reference
  - marker: c
    text: Or 'speaking to me.' The Greek more literally says 'speaking with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A formally transparent rendering that preserves the plural demonstrative
    and the repeated phrase at both the beginning and end of the verse. 'After this'
    is smoother English but slightly less explicit than the Greek plural.
- source_word: εἶδον
  chosen: I looked
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: Although the verb commonly means 'I saw,' English idiom with 'behold'
    and the ensuing visionary scene is smoother with 'I looked,' while still reflecting
    visual perception. This avoids the awkward 'I saw, and behold' without paraphrasing
    the sense.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as a discourse marker of sudden visionary attention. 'Behold'
    is slightly elevated but still understandable and preserves the apocalyptic tone
    better than a flatter alternative.
- source_word: θύρα ἠνεῳγμένη
  chosen: a door standing open
  alternatives:
  - an opened door
  - a door having been opened
  lexicon: BDAG
  rationale: The perfect passive participle indicates a present state resulting from
    prior opening. 'Standing open' conveys that resultant state naturally in English.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: BDAG
  rationale: In Revelation this refers to the heavenly realm, not the visible sky;
    'in heaven' best matches the apocalyptic setting.
- source_word: ἡ φωνὴ ἡ πρώτη
  chosen: the first voice
  alternatives:
  - the voice, the first one
  - the voice I heard first
  lexicon: BDAG
  rationale: A concise rendering that preserves the adjectival force of πρώτη and
    likely recalls the earlier voice in 1:10.
- source_word: ἣν ἤκουσα
  chosen: that I had heard
  alternatives:
  - which I heard
  - that I heard
  lexicon: BDAG
  rationale: Past perfect in English clarifies that this hearing preceded the present
    speech event and fits the retrospective structure.
- source_word: ὡς σάλπιγγος
  chosen: like a trumpet
  alternatives:
  - as a trumpet
  lexicon: BDAG
  rationale: The comparison is simile, not identity. 'Like a trumpet' is idiomatic
    modern English.
- source_word: λαλούσης μετ’ ἐμοῦ
  chosen: speaking with me
  alternatives:
  - speaking to me
  lexicon: BDAG
  rationale: The Greek preposition μετά with genitive is literally 'with me.' While
    English often says 'to me,' 'with me' is sufficiently natural here and preserves
    the source wording.
- source_word: λέγων
  chosen: said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: English normally converts the participle introducing direct speech into
    a finite verb. This is a standard optimal-equivalence adjustment.
- source_word: Ἀνάβα ὧδε
  chosen: Come up here
  alternatives:
  - Go up here
  - Ascend here
  lexicon: BDAG
  rationale: The imperative calls John upward to the heavenly realm. 'Come up here'
    is natural English and reflects the deictic perspective of the speaker in heaven.
- source_word: δείξω σοι
  chosen: I will show you
  alternatives:
  - I shall show you
  lexicon: BDAG
  rationale: Simple future promise; 'will' is natural contemporary English.
- source_word: ἃ δεῖ γενέσθαι
  chosen: what must take place
  alternatives:
  - what must happen
  - the things that must come to pass
  lexicon: BDAG
  rationale: This rendering preserves the sense of divine necessity in δεῖ and the
    eventive force of γενέσθαι in clear modern English.
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: BDAG
  rationale: Repeated at the end of the verse, it is preserved in translation rather
    than absorbed into the previous clause, because the repetition is part of the
    Greek wording and may mark sequence in the vision.
