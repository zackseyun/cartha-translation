id: REV.4.9
reference: Revelation 4:9
source:
  edition: SBLGNT
  text: καὶ ὅταν ⸀δώσουσιν τὰ ζῷα δόξαν καὶ τιμὴν καὶ εὐχαριστίαν τῷ καθημένῳ ἐπὶ
    ⸂τῷ θρόνῳ⸃, τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων,
translation:
  text: And whenever the living creatures give glory and honor and thanksgiving to
    the one seated on the throne, to the one who lives forever and ever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'for the ages of ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: 'The conjunction with the subjunctive-like future-oriented verb gives
    an iterative or indefinite temporal sense: not a single event but repeated occasions.
    ''Whenever'' better captures the recurring action in the heavenly scene than the
    simpler ''when.'''
- source_word: δώσουσιν
  chosen: give
  alternatives:
  - offer
  - ascribe
  lexicon: BDAG
  rationale: Although the object nouns are abstract ('glory,' 'honor,' 'thanksgiving'),
    δίδωμι remains the ordinary verb 'give.' 'Ascribe' is idiomatic in worship contexts
    but is more interpretive; 'give' preserves the Greek's simplicity and allows the
    liturgical sense to emerge from context.
- source_word: τὰ ζῷα
  chosen: the living creatures
  alternatives:
  - the four living creatures
  - the creatures
  - the living beings
  lexicon: BDAG
  rationale: In Revelation, ζῷα refers to the throne-room beings introduced earlier
    in the chapter, not merely 'animals.' 'Living creatures' is the established and
    accurate rendering. 'Four' is not repeated in this verse and so is not supplied
    in the main text.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - praise
  - splendor
  lexicon: BDAG
  rationale: δόξα in doxological contexts is best rendered 'glory.' 'Praise' would
    shift from the honor attributed to the recipient to the act of the worshipers;
    'splendor' would emphasize inherent majesty rather than the worshipful acknowledgment
    expressed here.
- source_word: τιμήν
  chosen: honor
  alternatives:
  - reverence
  - esteem
  lexicon: BDAG
  rationale: '''Honor'' is the most direct and natural equivalent for τιμή in a worship
    context and pairs well with ''glory'' and ''thanksgiving'' without overinterpreting
    the nuance.'
- source_word: εὐχαριστίαν
  chosen: thanksgiving
  alternatives:
  - thanks
  - gratitude
  lexicon: BDAG
  rationale: '''Thanksgiving'' preserves the nominal form and formal cadence of the
    triad. ''Thanks'' is possible but slightly less elevated; ''gratitude'' would
    describe an inner disposition more than the expressed act.'
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  chosen: to the one seated on the throne
  alternatives:
  - to him who sits on the throne
  - to the one sitting on the throne
  lexicon: BDAG
  rationale: The participial phrase is rendered with a natural English relative expression.
    'Seated' conveys the stative force of the participle and suits the throne-room
    imagery. 'On the throne' follows ἐπί with the dative in this idiom.
- source_word: τῷ ζῶντι
  chosen: to the one who lives
  alternatives:
  - to him who lives
  - to the living one
  lexicon: BDAG
  rationale: The present participle is best rendered verbally here. 'The living one'
    is possible, but 'the one who lives' more clearly connects with the following
    eternal-duration phrase.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - for the ages of ages
  - unto the ages of the ages
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the clearest
    natural English equivalent in contemporary Bible translation. A more literal rendering
    such as 'for the ages of ages' is possible but less idiomatic in English.
