theological_decisions:
- issue: Rendering the divine throne-title without importing extra specification
  chosen_reading: to the one seated on the throne, to the one who lives forever and
    ever
  alternative_readings:
  - to him who sits on the throne, who lives forever and ever
  rationale: The verse identifies God by enthronement and eternal life. The translation
    preserves the appositional structure of the Greek without adding 'God' explicitly,
    since the source text does not do so here, while still making the referent clear
    in context.
  doctrine_reference: Translation philosophy §§1, 3, 6
