theological_decisions:
- issue: Supplying the implied verb in the doxology
  chosen_reading: be to our God
  alternative_readings:
  - belongs to our God
  - are for our God
  rationale: The Greek is verbless after the list of nouns. English idiom normally
    supplies a copular or possessive expression. 'Be to our God' preserves the ascriptive,
    worshipful force without over-interpreting possession.
  doctrine_reference: Translation philosophy §1, §6
- issue: Distinguishing δύναμις and ἰσχύς
  chosen_reading: power ... might
  alternative_readings:
  - power ... strength
  rationale: The verse intentionally piles near-synonyms in praise. Rendering them
    with distinct English terms preserves the rhetorical fullness rather than collapsing
    them into one concept.
  doctrine_reference: Translation philosophy §5
