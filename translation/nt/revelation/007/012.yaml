id: REV.7.12
reference: Revelation 7:12
source:
  edition: SBLGNT
  text: λέγοντες· Ἀμήν· ἡ εὐλογία καὶ ἡ δόξα καὶ ἡ σοφία καὶ ἡ εὐχαριστία καὶ ἡ τιμὴ
    καὶ ἡ δύναμις καὶ ἡ ἰσχὺς τῷ θεῷ ἡμῶν εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
translation:
  text: saying, “Amen! The blessing and the glory and the wisdom and the thanksgiving
    and the honor and the power and the might be to our God forever and ever. Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “to our God unto the ages of the ages.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - saying aloud
  - they were saying
  lexicon: BDAG
  rationale: Present active participle nominative plural introducing the content of
    the acclamation; 'saying' is the natural concise English participial equivalent.
- source_word: Ἀμήν / ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  lexicon: BDAG
  rationale: In liturgical and doxological contexts ἀμήν is conventionally transliterated
    as 'Amen' rather than translated 'truly.' The repeated use frames the doxology.
- source_word: ἡ εὐλογία
  chosen: the blessing
  alternatives:
  - blessing
  - praise
  lexicon: BDAG
  rationale: With the article, the noun functions as a specific element in a sevenfold
    doxology. 'The blessing' preserves the formal structure and likely sense of ascribed
    blessing directed to God.
- source_word: ἡ δόξα
  chosen: the glory
  alternatives:
  - glory
  - splendor
  lexicon: BDAG
  rationale: Standard rendering in doxological contexts; the article is retained for
    the rhythmic series.
- source_word: ἡ σοφία
  chosen: the wisdom
  alternatives:
  - wisdom
  lexicon: BDAG
  rationale: Retained with article to mirror the Greek's stylized enumeration of divine
    attributes/praise.
- source_word: ἡ εὐχαριστία
  chosen: the thanksgiving
  alternatives:
  - thanksgiving
  - thanks
  lexicon: BDAG
  rationale: '''Thanksgiving'' better matches the noun form and formal cadence of
    the list than the shorter ''thanks.'''
- source_word: ἡ τιμή
  chosen: the honor
  alternatives:
  - honor
  - value
  lexicon: BDAG
  rationale: In worship language τιμή denotes honor ascribed to God, not economic
    value.
- source_word: ἡ δύναμις
  chosen: the power
  alternatives:
  - power
  - strength
  lexicon: BDAG
  rationale: δύναμις commonly denotes power or capability; 'power' is the most idiomatic
    and expected rendering here.
- source_word: ἡ ἰσχύς
  chosen: the might
  alternatives:
  - strength
  - force
  lexicon: BDAG
  rationale: Chosen to distinguish it from δύναμις while preserving overlap. 'Might'
    fits elevated doxological English and avoids flattening the pair into synonyms.
- source_word: τῷ θεῷ ἡμῶν
  chosen: to our God
  alternatives:
  - belongs to our God
  - be to our God
  lexicon: BDAG
  rationale: Dative of recipient/ascription in an implied verbless doxology. English
    requires supplementation; 'be to our God' is reflected in the full clause while
    preserving the dative sense.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - unto the ages of the ages
  - for the ages of ages
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the Semitic/Greek superlative expression
    of unending duration. More literal alternatives are preserved as possible lexical
    notes but are less natural in the main text.
