id: REV.7.17
reference: Revelation 7:17
source:
  edition: SBLGNT
  text: ὅτι τὸ ἀρνίον τὸ ἀνὰ μέσον τοῦ θρόνου ⸀ποιμανεῖ αὐτούς, καὶ ⸀ὁδηγήσει αὐτοὺς
    ἐπὶ ζωῆς πηγὰς ὑδάτων· καὶ ἐξαλείψει ὁ θεὸς πᾶν δάκρυον ἐκ τῶν ὀφθαλμῶν αὐτῶν.
translation:
  text: because the Lamb in the midst of the throne will shepherd them, and he will
    guide them to springs of the water of life, and God will wipe away every tear
    from their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the center of the throne.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will lead them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to springs of living water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνίον
  chosen: the Lamb
  alternatives:
  - the little lamb
  lexicon: BDAG
  rationale: Standard apocalyptic and christological title in Revelation. Although
    the diminutive form can suggest 'little lamb,' English usage in this context overwhelmingly
    treats it as the title 'the Lamb,' preserving both sacrificial and messianic resonance
    without sounding trivial.
- source_word: ἀνὰ μέσον τοῦ θρόνου
  chosen: in the midst of the throne
  alternatives:
  - at the center of the throne
  - between the throne
  lexicon: BDAG
  rationale: The phrase denotes central position relative to the throne. 'In the midst
    of' is slightly more formal but preserves the vivid spatial imagery of the Greek
    better than the smoother 'at the center of.'
- source_word: ποιμανεῖ
  chosen: will shepherd
  alternatives:
  - will tend
  - will pastor
  - will rule
  lexicon: BDAG
  rationale: ποιμαίνω literally means to act as a shepherd. 'Will shepherd' preserves
    the deliberate paradox that the Lamb is also shepherd. 'Will rule' is possible
    in some contexts, especially with royal overtones, but here the following promise
    of guidance to life-giving waters favors the pastoral sense.
- source_word: ὁδηγήσει
  chosen: he will guide
  alternatives:
  - he will lead
  lexicon: BDAG
  rationale: Both 'guide' and 'lead' are viable. 'Guide' best matches ὁδηγέω and complements
    the shepherding imagery without collapsing it into a mere repetition of ποιμανεῖ.
- source_word: ἐπὶ ζωῆς πηγὰς ὑδάτων
  chosen: to springs of the water of life
  alternatives:
  - to living springs of water
  - to springs of living water
  - to fountains of the water of life
  lexicon: BDAG
  rationale: The genitive ζωῆς most naturally qualifies the water ('water of life')
    rather than the springs alone. 'Springs' is preferred over 'fountains' for natural
    imagery. The preposition ἐπί with motion here is rendered idiomatically as 'to.'
- source_word: ἐξαλείψει
  chosen: will wipe away
  alternatives:
  - will blot out
  - will wipe off
  lexicon: BDAG
  rationale: In this consolatory context, 'will wipe away' is the natural English
    equivalent. 'Blot out' is too forensic here, though the verb can bear that sense
    elsewhere.
- source_word: πᾶν δάκρυον
  chosen: every tear
  alternatives:
  - all tears
  lexicon: BDAG
  rationale: The singular with πᾶν is idiomatically rendered 'every tear,' emphasizing
    totality in a vivid, individualizing way.
- source_word: ἐκ τῶν ὀφθαλμῶν αὐτῶν
  chosen: from their eyes
  alternatives:
  - out of their eyes
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ in this expression; 'from their eyes'
    is natural English and preserves the image.
