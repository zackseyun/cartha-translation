theological_decisions:
- issue: Christological paradox of the Lamb as shepherd
  chosen_reading: Retained the literal 'the Lamb ... will shepherd them'
  alternative_readings:
  - the Lamb ... will tend them
  - the Lamb ... will rule them
  rationale: The verse intentionally presents the exalted Lamb in a shepherding role,
    echoing biblical shepherd imagery while preserving Revelation's distinctive christology.
    A smoother rendering that avoids the paradox would mute the theological force
    of the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Relation of 'God' to the Lamb in the final clause
  chosen_reading: Kept 'and God will wipe away every tear from their eyes' as a distinct
    clause with God as explicit subject
  alternative_readings:
  - implicit continuation with the Lamb as subject
  rationale: The Greek explicitly names ὁ θεός as the subject of ἐξαλείψει. Preserving
    this distinction avoids collapsing the persons in the vision while remaining fully
    consistent with orthodox Trinitarian doctrine.
  doctrine_reference: Affirmations (Nicene Creed; Chalcedon)
