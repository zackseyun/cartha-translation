theological_decisions:
- issue: Rendering of σκηνώσει in relation to divine presence imagery
  chosen_reading: will spread his tent over them
  alternative_readings:
  - will dwell over them
  - will shelter them
  rationale: The verse evokes God's protective, covenantal presence using tabernacle
    imagery. The chosen rendering preserves that theological texture without importing
    extra doctrinal claims. It also avoids flattening the image into a purely abstract
    'presence' or purely functional 'shelter.'
  doctrine_reference: Translation philosophy §§1, 3, 6
