id: REV.7.15
reference: Revelation 7:15
source:
  edition: SBLGNT
  text: διὰ τοῦτό εἰσιν ἐνώπιον τοῦ θρόνου τοῦ θεοῦ, καὶ λατρεύουσιν αὐτῷ ἡμέρας καὶ
    νυκτὸς ἐν τῷ ναῷ αὐτοῦ, καὶ ὁ καθήμενος ἐπὶ ⸂τοῦ θρόνου⸃ σκηνώσει ἐπ’ αὐτούς.
translation:
  text: For this reason they are before the throne of God, and they serve him day
    and night in his temple, and the one seated on the throne will spread his tent
    over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will dwell over them' or 'will shelter them.' The Greek verb is related
      to 'tent' or 'tabernacle' imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτό
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: The phrase points back to the preceding explanation and is best rendered
    causally. 'For this reason' preserves the explicit inferential connection more
    clearly than the more compressed 'therefore.'
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and natural while still conveying spatial/presential
    proximity to God''s throne. ''In the presence of'' is possible but heavier in
    English.'
- source_word: λατρεύουσιν
  chosen: serve
  alternatives:
  - worship
  - render sacred service
  lexicon: BDAG
  rationale: λατρεύω often denotes cultic or sacred service offered to God. 'Serve'
    in this context preserves that sense without narrowing it to verbal praise alone,
    while the temple setting implies worshipful service.
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - continually
  lexicon: BDAG
  rationale: The idiom is retained literally because it is clear in English and preserves
    the imagery of unceasing service.
- source_word: ναῷ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the sanctuary/temple rather than the broader
    temple precincts. 'Temple' is the more familiar English term; 'sanctuary' is possible
    but less immediate here. The heavenly setting is preserved by context.
- source_word: ὁ καθήμενος ἐπὶ τοῦ θρόνου
  chosen: the one seated on the throne
  alternatives:
  - he who sits on the throne
  lexicon: BDAG
  rationale: This participial title is rendered in clear modern English while preserving
    its titular force and ongoing aspect.
- source_word: σκηνώσει ἐπ’ αὐτούς
  chosen: will spread his tent over them
  alternatives:
  - will dwell over them
  - will shelter them
  - will tabernacle over them
  lexicon: BDAG
  rationale: σκηνόω is related to tent/tabernacle imagery. 'Will spread his tent over
    them' best preserves the metaphor of divine protective presence signaled by the
    preposition ἐπί, while remaining understandable. More interpretive renderings
    like 'shelter them' capture the sense but lose the tabernacle imagery; 'tabernacle
    over them' is too opaque for main text.
