id: REV.7.2
reference: Revelation 7:2
source:
  edition: SBLGNT
  text: καὶ εἶδον ἄλλον ἄγγελον ἀναβαίνοντα ἀπὸ ἀνατολῆς ἡλίου, ἔχοντα σφραγῖδα θεοῦ
    ζῶντος, καὶ ἔκραξεν φωνῇ μεγάλῃ τοῖς τέσσαρσιν ἀγγέλοις οἷς ἐδόθη αὐτοῖς ἀδικῆσαι
    τὴν γῆν καὶ τὴν θάλασσαν,
translation:
  text: And I saw another angel coming up from the east, having the seal of the living
    God, and he cried out with a loud voice to the four angels who had been given
    power to harm the earth and the sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the rising of the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον ἄγγελον
  chosen: another angel
  alternatives:
  - one more angel
  lexicon: BDAG
  rationale: ἄλλον marks an additional angel distinct from those previously mentioned;
    'another angel' is the natural and sufficiently formal English rendering.
- source_word: ἀναβαίνοντα
  chosen: coming up
  alternatives:
  - ascending
  - going up
  lexicon: BDAG
  rationale: The participle denotes upward movement. 'Coming up' is idiomatic modern
    English and fits the visionary perspective without sounding overly wooden; 'ascending'
    is possible but slightly more formal.
- source_word: ἀπὸ ἀνατολῆς ἡλίου
  chosen: from the east
  alternatives:
  - from the rising of the sun
  - from the sunrise
  lexicon: BDAG
  rationale: Literally the phrase is 'from the rising of the sun.' In context it functions
    as a directional expression, so 'from the east' best captures the sense in readable
    English. The more literal alternative is worth preserving in a footnote because
    of its imagery.
- source_word: ἔχοντα σφραγῖδα
  chosen: having the seal
  alternatives:
  - holding the seal
  - bearing the seal
  lexicon: BDAG
  rationale: The participle ἔχοντα simply means 'having.' 'Seal' for σφραγίς preserves
    the concrete image of an authenticating or protective mark without overinterpreting
    its function.
- source_word: θεοῦ ζῶντος
  chosen: of the living God
  alternatives:
  - of God who lives
  lexicon: BDAG
  rationale: The genitive phrase is a standard biblical expression. 'The living God'
    is the established and accurate rendering, preserving both the attributive force
    and theological weight.
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  chosen: he cried out with a loud voice
  alternatives:
  - he shouted loudly
  - he cried with a great voice
  lexicon: BDAG
  rationale: κράζω conveys a strong cry or shout. 'Cried out with a loud voice' preserves
    the verbal intensity and the instrumental dative φωνῇ μεγάλῃ while remaining natural
    English.
- source_word: τοῖς τέσσαρσιν ἀγγέλοις
  chosen: to the four angels
  lexicon: BDAG
  rationale: A straightforward dative indirect object; the article and numeral are
    naturally rendered together in English.
- source_word: οἷς ἐδόθη αὐτοῖς
  chosen: who had been given power
  alternatives:
  - to whom it was given
  - who were allowed
  lexicon: BDAG
  rationale: The passive ἐδόθη indicates delegated permission or authority. Supplying
    'power' in English makes explicit the implied object of what was given, which
    is contextually necessary and idiomatic; 'allowed' is interpretive and less precise.
- source_word: ἀδικῆσαι
  chosen: to harm
  alternatives:
  - to damage
  - to injure
  lexicon: BDAG
  rationale: In this apocalyptic context ἀδικέω refers to inflicting damage or harm
    on creation, not primarily committing injustice in an abstract moral sense. 'To
    harm' is the clearest contextual rendering.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  chosen: the earth and the sea
  alternatives:
  - the land and the sea
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In Revelation's cosmic scene, 'earth'
    better matches the scope of the judgment imagery, paired with 'the sea'.
