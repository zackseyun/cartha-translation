theological_decisions:
- issue: Extent of delegated authority in ἐδόθη
  chosen_reading: rendered as 'had been given power'
  alternative_readings:
  - had been allowed
  - had been permitted
  rationale: The passive verb suggests authority or permission granted by God without
    requiring the translation to specify the giver explicitly. 'Given power' preserves
    the apocalyptic theme of delegated agency while avoiding doctrinal overstatement
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Directional phrase ἀπὸ ἀνατολῆς ἡλίου
  chosen_reading: rendered idiomatically as 'from the east' in the main text
  alternative_readings:
  - from the rising of the sun
  rationale: The idiomatic rendering communicates the plain sense in modern English,
    while the more literal imagery is preserved in a footnote to maintain transparency
    and theological-literary tension in the vision's symbolism.
  doctrine_reference: Translation philosophy §§1, 3, 6
