theological_decisions:
- issue: Relation of 'salvation' to God and the Lamb
  chosen_reading: 'Render as a shared acclamation: ''Salvation belongs to our God
    ... and to the Lamb!'''
  alternative_readings:
  - Render more woodenly as 'Salvation to our God ... and to the Lamb!'
  rationale: The Greek dative construction attributes salvation jointly to God and
    the Lamb without forcing a narrower doctrinal explanation. This preserves the
    text's high Christology and liturgical force without adding interpretive material
    beyond the wording.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
