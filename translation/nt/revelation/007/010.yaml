id: REV.7.10
reference: Revelation 7:10
source:
  edition: SBLGNT
  text: καὶ κράζουσι φωνῇ μεγάλῃ λέγοντες· Ἡ σωτηρία τῷ θεῷ ἡμῶν τῷ καθημένῳ ἐπὶ τῷ
    θρόνῳ καὶ τῷ ἀρνίῳ.
translation:
  text: And they cry out with a loud voice, saying, “Salvation belongs to our God,
    who sits on the throne, and to the Lamb!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'Salvation to our God who sits on the throne, and to
      the Lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράζουσι
  chosen: they cry out
  alternatives:
  - they shout
  - they are crying out
  lexicon: BDAG
  rationale: Present indicative plural conveys an ongoing/vivid action. 'Cry out'
    preserves the force of κράζω better than the weaker 'say' and is idiomatic in
    English.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: This dative phrase is an idiom of manner/instrument. 'With a loud voice'
    is a natural and fairly formal rendering that preserves the imagery better than
    the adverb 'loudly'.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle introduces the content of the cry. English commonly renders
    this attendant participle as 'saying' after a main verb of speaking or crying
    out.
- source_word: Ἡ σωτηρία
  chosen: Salvation belongs
  alternatives:
  - Salvation be
  - The salvation is
  - Victory belongs
  lexicon: BDAG
  rationale: 'The Greek is a verbless acclamation with the article: literally ''The
    salvation [to] our God ... and [to] the Lamb.'' In English, ''Salvation belongs
    to'' best conveys the dative of ascription/attribution. ''Victory'' is too interpretive
    here; ''Salvation be to'' is traditional but less natural in modern English.'
- source_word: τῷ θεῷ ἡμῶν
  chosen: to our God
  alternatives:
  - belongs to our God
  lexicon: BDAG
  rationale: The dative marks the one to whom salvation is attributed. In the full
    English clause, this is expressed as 'belongs to our God.'
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  chosen: who sits on the throne
  alternatives:
  - who is seated on the throne
  - the one seated on the throne
  lexicon: BDAG
  rationale: The participial phrase functions appositionally to 'our God.' 'Who sits
    on the throne' is clear modern English; 'who is seated' is also possible, but
    the simpler present better matches the vivid scene.
- source_word: τῷ ἀρνίῳ
  chosen: to the Lamb
  lexicon: BDAG
  rationale: ἀρνίον is the established Johannine title for Jesus in Revelation. 'Lamb'
    should be translated, not transliterated, preserving the sacrificial and messianic
    imagery.
