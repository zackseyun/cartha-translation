id: REV.7.1
reference: Revelation 7:1
source:
  edition: SBLGNT
  text: ⸀Μετὰ τοῦτο εἶδον τέσσαρας ἀγγέλους ἑστῶτας ἐπὶ τὰς τέσσαρας γωνίας τῆς γῆς,
    κρατοῦντας τοὺς τέσσαρας ἀνέμους τῆς γῆς, ἵνα μὴ πνέῃ ἄνεμος ἐπὶ τῆς γῆς μήτε
    ἐπὶ τῆς θαλάσσης μήτε ἐπὶ ⸀πᾶν δένδρον.
translation:
  text: After this I saw four angels standing at the four corners of the earth, holding
    back the four winds of the earth so that no wind might blow on the earth or on
    the sea or on any tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'After these things I saw.'
    reason: lexical_alternative
  - marker: b
    text: '''The four corners of the earth'' is a conventional expression for the
      earth''s extremities or the four directions.'
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ τοῦτο
  chosen: After this
  alternatives:
  - After these things
  lexicon: BDAG
  rationale: Common apocalyptic/sequential discourse marker. 'After this' is natural
    modern English while preserving temporal sequence; 'After these things' is more
    formal but less idiomatic here.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist of ὁράω straightforwardly reports visionary perception. 'I saw'
    is sufficient; nothing in the Greek requires the expanded idiom 'I looked and
    saw'.
- source_word: τέσσαρας ἀγγέλους
  chosen: four angels
  lexicon: BDAG
  rationale: Direct rendering of numeral + noun; no reason to paraphrase.
- source_word: ἑστῶτας
  chosen: standing
  alternatives:
  - stationed
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι describes a standing posture/state.
    'Standing' is the most transparent English equivalent; 'stationed' is interpretive
    and stronger than the Greek requires.
- source_word: ἐπὶ τὰς τέσσαρας γωνίας τῆς γῆς
  chosen: at the four corners of the earth
  alternatives:
  - on the four corners of the earth
  - at the four corners of the land
  lexicon: BDAG
  rationale: Idiomatic apocalyptic/cosmic expression. 'At' fits English better than
    wooden 'on.' γῆ here is best rendered 'earth' rather than 'land' because the scope
    includes earth, sea, and every tree in a cosmic scene.
- source_word: κρατοῦντας
  chosen: holding back
  alternatives:
  - holding
  - restraining
  lexicon: BDAG
  rationale: κρατέω can mean seize, hold fast, or restrain. In context the angels
    prevent the winds from blowing, so 'holding back' makes the implied restraint
    explicit without over-paraphrasing.
- source_word: τοὺς τέσσαρας ἀνέμους τῆς γῆς
  chosen: the four winds of the earth
  alternatives:
  - the four winds of the land
  lexicon: BDAG
  rationale: Standard apocalyptic expression for winds from the four directions. 'Earth'
    matches the cosmic scope of the verse.
- source_word: ἵνα μὴ πνέῃ ἄνεμος
  chosen: so that no wind might blow
  alternatives:
  - so that wind might not blow
  - in order that no wind should blow
  lexicon: BDAG
  rationale: ἵνα + subjunctive expresses purpose/result. The anarthrous singular ἄνεμος
    is naturally rendered generically as 'no wind' in English, conveying the total
    cessation intended by the restraint.
- source_word: ἐπὶ τῆς γῆς μήτε ἐπὶ τῆς θαλάσσης μήτε ἐπὶ πᾶν δένδρον
  chosen: on the earth or on the sea or on any tree
  alternatives:
  - upon the earth, nor upon the sea, nor upon any tree
  lexicon: BDAG
  rationale: μήτε...μήτε coordinates the three negated domains. 'Or ... or ... or'
    is idiomatic English under the preceding negation. πᾶν δένδρον is distributive,
    well captured by 'any tree.'
