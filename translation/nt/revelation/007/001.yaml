theological_decisions:
- issue: Scope of γῆ in an apocalyptic vision
  chosen_reading: Rendered γῆ as 'earth' throughout the verse.
  alternative_readings:
  - land
  rationale: 'The imagery is global/cosmic: four corners, four winds, earth, sea,
    and every tree. Translating γῆ as ''land'' would narrow the scene more than the
    context warrants.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Nature of the cosmological language 'four corners of the earth'
  chosen_reading: Preserved the idiom literally.
  alternative_readings:
  - the four extremities of the earth
  rationale: The phrase is conventional visionary/cosmological language and should
    not be flattened into an explanatory paraphrase. A literal rendering preserves
    the text's imagery without making a scientific claim beyond the idiom itself.
  doctrine_reference: Translation philosophy §1, §6
