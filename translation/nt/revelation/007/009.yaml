theological_decisions:
- issue: Rendering ἀρνίον in a christological context
  chosen_reading: the Lamb
  alternative_readings:
  - the little lamb
  rationale: Although ἀρνίον is morphologically a diminutive form, in Revelation it
    functions as a fixed christological title. 'The Lamb' preserves both recognizability
    and theological weight without introducing an unnatural diminutive in English.
  doctrine_reference: Affirmations; Translation philosophy §2
