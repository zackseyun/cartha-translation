id: REV.7.9
reference: Revelation 7:9
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα εἶδον, καὶ ἰδοὺ ὄχλος πολύς, ὃν ἀριθμῆσαι ⸀αὐτὸν οὐδεὶς ἐδύνατο,
    ἐκ παντὸς ἔθνους καὶ φυλῶν καὶ λαῶν καὶ γλωσσῶν, ⸀ἑστῶτες ἐνώπιον τοῦ θρόνου καὶ
    ἐνώπιον τοῦ ἀρνίου, περιβεβλημένους στολὰς λευκάς, καὶ ⸀φοίνικες ἐν ταῖς χερσὶν
    αὐτῶν·
translation:
  text: After these things I looked, and behold, a great multitude that no one was
    able to count, from every nation and tribes and peoples and languages, standing
    before the throne and before the Lamb, clothed in white robes, with palm branches
    in their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'from every nation, tribe, people, and language.' The
      main text preserves the Greek's shift from singular 'nation' to plural terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the sequential visionary structure
    common in Revelation. 'After these things' reflects the plural demonstrative ταῦτα
    more precisely than the smoother 'After this.'
- source_word: εἶδον, καὶ ἰδοὺ
  chosen: I looked, and behold
  alternatives:
  - I saw, and behold
  - I looked, and there was
  lexicon: BDAG
  rationale: Using 'I looked' for εἶδον here fits the visionary scene-setting, while
    'behold' preserves the force of ἰδού as an attention marker without paraphrasing
    it away.
- source_word: ὄχλος πολύς
  chosen: a great multitude
  alternatives:
  - a large crowd
  - a vast multitude
  lexicon: BDAG
  rationale: '''Multitude'' fits apocalyptic/register better than ''crowd'' and naturally
    conveys a very large assembly. ''Great'' is the straightforward sense of πολύς
    here.'
- source_word: ὃν ἀριθμῆσαι αὐτὸν οὐδεὶς ἐδύνατο
  chosen: that no one was able to count
  alternatives:
  - which no one could number
  - that no one could count
  lexicon: BDAG
  rationale: This renders the relative clause idiomatically while preserving the emphasis
    on human inability. 'Was able to count' reflects ἐδύνατο more explicitly than
    simple 'could count,' though both are viable.
- source_word: ἐκ παντὸς ἔθνους καὶ φυλῶν καὶ λαῶν καὶ γλωσσῶν
  chosen: from every nation and tribes and peoples and languages
  alternatives:
  - from every nation, tribe, people, and language
  - out of every nation and tribes and peoples and languages
  lexicon: BDAG
  rationale: The phrase is kept close to the Greek, including the singular ἔθνους
    followed by plural terms. 'Nation' for ἔθνος, 'tribes' for φυλαί, 'peoples' for
    λαοί, and 'languages' for γλῶσσαι preserve the distinct categories rather than
    collapsing them into smoother English.
- source_word: ἑστῶτες
  chosen: standing
  alternatives:
  - who were standing
  lexicon: BDAG
  rationale: The participle is rendered as a concise participial phrase in English,
    preserving the scene's immediacy and avoiding unnecessary expansion.
- source_word: ἐνώπιον τοῦ θρόνου καὶ ἐνώπιον τοῦ ἀρνίου
  chosen: before the throne and before the Lamb
  alternatives:
  - in the presence of the throne and in the presence of the Lamb
  lexicon: BDAG
  rationale: Repeating 'before' reflects the Greek repetition of ἐνώπιον and preserves
    the solemn cadence. ἀρνίον is rendered 'the Lamb,' the established and contextually
    transparent christological title in Revelation.
- source_word: περιβεβλημένους στολὰς λευκάς
  chosen: clothed in white robes
  alternatives:
  - wearing white robes
  - arrayed in white robes
  lexicon: BDAG
  rationale: '''Clothed in'' captures the participial sense of περιβεβλημένους naturally.
    στολαί are long robes/garments; ''robes'' is the clearest idiomatic choice in
    this context.'
- source_word: φοίνικες ἐν ταῖς χερσὶν αὐτῶν
  chosen: with palm branches in their hands
  alternatives:
  - and palm branches were in their hands
  - holding palm branches in their hands
  lexicon: BDAG
  rationale: φοίνικες here refers to palm branches, not palm trees. 'With palm branches
    in their hands' is idiomatic English that preserves the image without overinterpreting
    the action.
