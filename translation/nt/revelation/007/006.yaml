id: REV.7.6
reference: Revelation 7:6
source:
  edition: SBLGNT
  text: ἐκ φυλῆς Ἀσὴρ δώδεκα χιλιάδες, ἐκ φυλῆς Νεφθαλὶμ δώδεκα χιλιάδες, ἐκ φυλῆς
    Μανασσῆ δώδεκα χιλιάδες,
translation:
  text: from the tribe of Asher, twelve thousand; from the tribe of Naphtali, twelve
    thousand; from the tribe of Manasseh, twelve thousand;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the context, 'from the tribe of Asher, twelve thousand
      were sealed' (and likewise for the following tribes). The Greek of this verse
      itself does not repeat the verb.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: 'The preposition marks source/origin. In this listing formula, ''from''
    is the most natural English rendering: those counted are from each tribe.'
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: BDAG
  rationale: φυλή in this Israelite genealogical context refers to a tribal division
    of Israel. 'Tribe' is the standard and precise English equivalent.
- source_word: Ἀσὴρ
  chosen: Asher
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: δώδεκα χιλιάδες
  chosen: twelve thousand
  lexicon: BDAG
  rationale: The cardinal number plus plural noun straightforwardly denotes the counted
    group size. No expansion such as 'were sealed' is supplied here because it is
    not present in this verse's Greek text and is understood from the larger context.
- source_word: Νεφθαλὶμ
  chosen: Naphtali
  alternatives:
  - Nephthalim
  rationale: Standard English transliteration of the tribal name is 'Naphtali.' A
    more letter-near form is possible but is not standard in modern English Bible
    usage.
- source_word: Μανασσῆ
  chosen: Manasseh
  rationale: Proper name transliterated by standard English convention.
