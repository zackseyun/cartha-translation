theological_decisions:
- issue: Whether to supply an implied verb such as 'were sealed' from the surrounding
    context
  chosen_reading: Do not supply the verb in the main text; preserve the verbless enumeration
    as in Greek.
  alternative_readings:
  - from the tribe of Asher, twelve thousand were sealed; from the tribe of Naphtali,
    twelve thousand; from the tribe of Manasseh, twelve thousand
  rationale: This verse is part of a larger list whose governing idea of sealing is
    established in the preceding verse, but the Greek here consists of repeated prepositional
    phrases and number expressions without an explicit verb. To avoid importing words
    not present in the source, the translation keeps the concise list form while remaining
    readable in English.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
