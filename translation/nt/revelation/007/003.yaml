theological_decisions:
- issue: Rendering of δοῦλος in an apocalyptic belonging/ownership context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse depicts God's people as marked as belonging to him before judgment
    proceeds. This makes the bonded-status nuance of δοῦλος theologically salient,
    so 'slaves' is preferred under the project's contested-terms guidance, while preserving
    softer traditional alternatives in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
