id: REV.7.3
reference: Revelation 7:3
source:
  edition: SBLGNT
  text: λέγων· Μὴ ἀδικήσητε τὴν γῆν μήτε τὴν θάλασσαν μήτε τὰ δένδρα, ⸀ἄχρι σφραγίσωμεν
    τοὺς δούλους τοῦ θεοῦ ἡμῶν ἐπὶ τῶν μετώπων αὐτῶν.
translation:
  text: saying, “Do not harm the earth or the sea or the trees until we have sealed
    the slaves of our God on their foreheads.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servants” or “bondservants.” The Greek word is doulous, which can denote
      those who belong to a master; here the translation “slaves” preserves that force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικήσητε
  chosen: harm
  alternatives:
  - damage
  - wrong
  lexicon: BDAG
  rationale: In this apocalyptic context, the object is the earth, sea, and trees,
    so the sense is physical damage rather than moral injustice toward persons. 'Harm'
    is idiomatic and broad enough to cover the impending judgments.
- source_word: γῆν
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: Given the triad 'earth ... sea ... trees' in a cosmic-judgment scene,
    'earth' better fits the global scope than the more localized 'land'.
- source_word: θάλασσαν
  chosen: sea
  lexicon: BDAG
  rationale: Standard rendering; no contextual pressure suggests variation.
- source_word: δένδρα
  chosen: trees
  lexicon: BDAG
  rationale: Direct and natural rendering of the plural noun.
- source_word: ἄχρι
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: 'Marks the temporal limit on the prohibition: the harm is delayed up
    to the sealing.'
- source_word: σφραγίσωμεν
  chosen: have sealed
  alternatives:
  - seal
  lexicon: BDAG
  rationale: English present perfect after 'until' naturally conveys the completed
    action required before the next event proceeds. It preserves the aorist subjunctive's
    event sense without awkwardness.
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where bonded
    belonging is salient. Here the phrase 'the slaves of our God' emphasizes ownership
    and allegiance marked by sealing, so 'slaves' best preserves the force.
- source_word: τοῦ θεοῦ ἡμῶν
  chosen: of our God
  lexicon: BDAG
  rationale: Straightforward genitival construction expressing belonging to God; 'our'
    is retained as part of the speaker's identification with God.
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  chosen: on their foreheads
  alternatives:
  - upon their foreheads
  lexicon: BDAG
  rationale: Natural modern English for the location of the seal; 'on' is sufficiently
    precise for ἐπί with the genitive here.
