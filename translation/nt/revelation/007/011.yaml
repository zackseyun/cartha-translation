theological_decisions:
- issue: Rendering of heavenly throne-room beings (ζῷα)
  chosen_reading: living creatures
  alternative_readings:
  - living beings
  - creatures
  rationale: The term should not be flattened to 'animals,' nor should it be paraphrased
    into a more interpretive label. 'Living creatures' preserves the apocalyptic imagery
    and traditional recognition of these beings without importing extra theological
    identification.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of προσκυνέω in relation to God
  chosen_reading: worshiped God
  alternative_readings:
  - bowed down before God
  rationale: Because the object is explicitly God and the preceding clause already
    narrates bodily prostration, the verb here carries the fuller sense of worship
    rather than merely physical obeisance.
  doctrine_reference: Translation philosophy §1, §6
