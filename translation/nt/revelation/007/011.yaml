id: REV.7.11
reference: Revelation 7:11
source:
  edition: SBLGNT
  text: καὶ πάντες οἱ ἄγγελοι εἱστήκεισαν κύκλῳ τοῦ θρόνου καὶ τῶν πρεσβυτέρων καὶ
    τῶν τεσσάρων ζῴων, καὶ ἔπεσαν ἐνώπιον τοῦ θρόνου ἐπὶ τὰ πρόσωπα αὐτῶν καὶ προσεκύνησαν
    τῷ θεῷ,
translation:
  text: And all the angels were standing around the throne and the elders and the
    four living creatures, and they fell before the throne on their faces and worshiped
    God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the four living beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες οἱ ἄγγελοι
  chosen: all the angels
  alternatives:
  - all the angelic beings
  lexicon: BDAG
  rationale: A straightforward rendering of the articular plural with πάντες. 'Angels'
    is the standard and natural English equivalent for ἄγγελοι in Revelation.
- source_word: εἱστήκεισαν
  chosen: were standing
  alternatives:
  - stood
  - had been standing
  lexicon: BDAG
  rationale: 'The pluperfect/intransitive form of ἵστημι conveys a stative sense:
    they were in a standing position. ''Were standing'' best captures the ongoing
    posture in context better than the simple ''stood.'''
- source_word: κύκλῳ
  chosen: around
  alternatives:
  - in a circle around
  - encircling
  lexicon: BDAG
  rationale: κύκλῳ with the genitive indicates spatial position around something.
    'Around' is idiomatic and sufficiently precise without overloading the English.
- source_word: τοῦ θρόνου
  chosen: the throne
  lexicon: BDAG
  rationale: θρόνος is consistently rendered 'throne' in Revelation, preserving the
    royal/heavenly imagery.
- source_word: τῶν πρεσβυτέρων
  chosen: the elders
  alternatives:
  - the older ones
  lexicon: BDAG
  rationale: In Revelation this is a recognized heavenly group; 'elders' is the established
    and contextually appropriate rendering.
- source_word: τῶν τεσσάρων ζῴων
  chosen: the four living creatures
  alternatives:
  - the four creatures
  - the four living beings
  lexicon: BDAG
  rationale: ζῷα in Revelation refers to the exalted throne-room beings, not merely
    'animals.' 'Living creatures' is the clearest established rendering that preserves
    their animate character without misleading connotations.
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - threw themselves down
  - fell down
  lexicon: BDAG
  rationale: The aorist verb denotes the act of falling/prostrating. 'Fell' is sufficient
    here because the following phrase 'on their faces' makes the prostration explicit.
- source_word: ἐνώπιον τοῦ θρόνου
  chosen: before the throne
  alternatives:
  - in front of the throne
  lexicon: BDAG
  rationale: ἐνώπιον commonly means 'before' in a spatial sense here, and this wording
    is both natural and reverent in English.
- source_word: ἐπὶ τὰ πρόσωπα αὐτῶν
  chosen: on their faces
  alternatives:
  - face down
  - upon their faces
  lexicon: BDAG
  rationale: This idiom expresses full prostration. 'On their faces' is a clear, essentially
    formal rendering.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down in worship
  - prostrated themselves before
  lexicon: BDAG
  rationale: In this context of direct homage to God, προσκυνέω is best rendered 'worshiped.'
    The physical act has already been described by 'fell ... on their faces,' so 'worshiped'
    captures the devotional meaning.
- source_word: τῷ θεῷ
  chosen: God
  lexicon: BDAG
  rationale: A direct dative object after προσκυνέω; 'God' is the plain and correct
    rendering.
