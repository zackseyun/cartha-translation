theological_decisions:
- issue: Rendering υἱῶν Ἰσραήλ in a tribal-list context
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the people of Israel
  rationale: The Greek explicitly uses the masculine noun υἱοί. In this apocalyptic
    context introducing tribal descent, 'sons of Israel' preserves the source wording
    and genealogical flavor without importing a specific eschatological system. More
    inclusive alternatives are possible in English tradition, but the text itself
    is not gender-neutral here.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
