id: REV.7.4
reference: Revelation 7:4
source:
  edition: SBLGNT
  text: Καὶ ἤκουσα τὸν ἀριθμὸν τῶν ἐσφραγισμένων, ⸀ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες,
    ⸀ἐσφραγισμένοι ἐκ πάσης φυλῆς υἱῶν Ἰσραήλ·
translation:
  text: 'And I heard the number of those who had been sealed: one hundred forty-four
    thousand, sealed from every tribe of the sons of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel.' The Greek reads 'the sons of Israel,' preserving
      the masculine genealogical wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω is straightforwardly rendered 'I heard' in
    narrative/reporting context.
- source_word: ἀριθμὸν
  chosen: number
  alternatives:
  - count
  lexicon: BDAG
  rationale: '''Number'' is the standard and most natural rendering for ἀριθμός here,
    referring to the total counted group.'
- source_word: τῶν ἐσφραγισμένων / ἐσφραγισμένοι
  chosen: those who had been sealed / sealed
  alternatives:
  - the sealed ones / sealed
  lexicon: BDAG
  rationale: The perfect passive participle of σφραγίζω indicates a completed action
    with ongoing result. English 'those who had been sealed' captures the state resulting
    from prior sealing; the repeated participle later is rendered simply 'sealed'
    for readable English while preserving the repetition.
- source_word: ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  chosen: one hundred forty-four thousand
  alternatives:
  - a hundred and forty-four thousand
  lexicon: BDAG
  rationale: Standard contemporary English number style; no article in Greek requiring
    'a' here.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From' is idiomatic and sufficiently preserves
    the sense; 'out of' is possible but less natural in this construction.
- source_word: πάσης φυλῆς
  chosen: every tribe
  alternatives:
  - each tribe
  - all the tribes
  lexicon: BDAG
  rationale: 'Genitive singular with πᾶς after ἐκ is distributive: ''from every tribe''
    best reflects the sense that the sealed come from each tribe.'
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: BDAG
  rationale: Given the doctrine's gender-accurate principle, the masculine υἱῶν is
    preserved as 'sons' rather than neutralizing to 'children.' This also echoes biblical
    tribal language. An alternative is worth preserving because English tradition
    often uses 'children of Israel.'
