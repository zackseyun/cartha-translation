id: REV.7.5
reference: Revelation 7:5
source:
  edition: SBLGNT
  text: ἐκ φυλῆς Ἰούδα δώδεκα χιλιάδες ⸀ἐσφραγισμένοι, ἐκ φυλῆς Ῥουβὴν δώδεκα χιλιάδες,
    ἐκ φυλῆς Γὰδ δώδεκα χιλιάδες,
translation:
  text: from the tribe of Judah, twelve thousand were sealed; from the tribe of Reuben,
    twelve thousand; from the tribe of Gad, twelve thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from the tribe of Judah, twelve thousand sealed.' The
      Greek uses a passive participle ('sealed') after the first tribal count.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard prepositional sense marking source/origin. 'From' is natural
    English and preserves the repeated formula.
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: BDAG
  rationale: In Israelite genealogical/list contexts, φυλή is best rendered 'tribe.'
    'Clan' would understate the established tribal structure.
- source_word: Ἰούδα
  chosen: Judah
  rationale: Standard transliteration of the tribal/personal name in English Bible
    usage.
- source_word: δώδεκα χιλιάδες
  chosen: twelve thousand
  lexicon: BDAG
  rationale: Direct numerical rendering. No need to supply 'persons' in English since
    the count stands idiomatically.
- source_word: ἐσφραγισμένοι
  chosen: were sealed
  alternatives:
  - sealed
  lexicon: BDAG
  rationale: Passive participle referring back to the counted group. Rendering with
    'were sealed' makes the implied verbal force explicit and reads naturally in English.
    It is attached to the first tribal clause but understood across the list from
    the previous verse's context.
- source_word: Ῥουβὴν
  chosen: Reuben
  rationale: Standard transliteration of the tribal name.
- source_word: Γὰδ
  chosen: Gad
  rationale: Standard transliteration of the tribal name.
