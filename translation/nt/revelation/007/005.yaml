theological_decisions:
- issue: Force and scope of ἐσφραγισμένοι in a tribal enumeration
  chosen_reading: Render explicitly as 'were sealed' in the first clause, with the
    sealing understood for the subsequent parallel clauses.
  alternative_readings:
  - '''sealed'' as a verbless apposition: ''twelve thousand, sealed'''
  - repeating 'were sealed' after each tribe in English
  rationale: The Greek places ἐσφραγισμένοι after the first number, and the participle
    naturally describes those counted in the list. English is clearer with an explicit
    passive verb in the first clause while preserving the ellipsis in the following
    parallel members rather than overfilling the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
