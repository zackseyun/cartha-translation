id: REV.7.14
reference: Revelation 7:14
source:
  edition: SBLGNT
  text: καὶ ⸀εἴρηκα αὐτῷ· Κύριέ μου, σὺ οἶδας. καὶ εἶπέν μοι· Οὗτοί εἰσιν οἱ ἐρχόμενοι
    ἐκ τῆς θλίψεως τῆς μεγάλης, καὶ ἔπλυναν τὰς στολὰς αὐτῶν καὶ ἐλεύκαναν ⸀αὐτὰς
    ἐν τῷ αἵματι τοῦ ἀρνίου.
translation:
  text: And I said to him, “My lord, you know.” And he said to me, “These are the
    ones coming out of the great tribulation. They washed their robes and made them
    white in the blood of the Lamb.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “out of the great affliction” or “out of the great distress.” The Greek
      term can denote pressure, affliction, or tribulation.
    reason: lexical_alternative
  - marker: b
    text: The phrase “in the blood of the Lamb” is intentionally retained. The Greek
      could be understood instrumentally (“by the blood”), but the wording preserves
      Revelation’s paradoxical cleansing imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴρηκα
  chosen: I said
  alternatives:
  - I have said
  lexicon: BDAG
  rationale: Although the form is perfect, in Johannine narrative it commonly functions
    as a present-result or simple past in dialogue introduction. English idiom strongly
    favors the simple past here.
- source_word: Κύριέ μου
  chosen: My lord
  alternatives:
  - My Lord
  - Sir
  lexicon: BDAG
  rationale: κύριος is generally rendered 'Lord' by default, but here the speaker
    addresses one of the heavenly elders rather than God or the Messiah. 'My lord'
    preserves respectful address without importing a stronger christological sense.
    'Sir' is possible but too flattened for the elevated scene.
- source_word: σὺ οἶδας
  chosen: you know
  alternatives:
  - you yourself know
  - you know it
  lexicon: BDAG
  rationale: The explicit pronoun adds mild emphasis, but natural English can convey
    the sense with 'you know.' The phrase expresses deferential acknowledgment that
    the elder knows the answer.
- source_word: οἱ ἐρχόμενοι
  chosen: the ones coming out
  alternatives:
  - those who come out
  - the ones who are coming out
  - those coming out
  lexicon: BDAG
  rationale: The present participle is best preserved as an ongoing or characteristic
    action, not flattened into a simple past. 'The ones coming out' keeps the participial
    force and reads naturally in English.
- source_word: ἐκ τῆς θλίψεως τῆς μεγάλης
  chosen: out of the great tribulation
  alternatives:
  - out of the great affliction
  - out of the great distress
  lexicon: BDAG
  rationale: θλῖψις commonly means tribulation, affliction, or distress. 'The great
    tribulation' is the most recognizable and contextually fitting rendering here,
    preserving the article and adjective. Because this phrase carries interpretive
    weight in eschatological traditions, the translation keeps the lexical form rather
    than paraphrasing.
- source_word: ἔπλυναν
  chosen: washed
  alternatives:
  - have washed
  lexicon: BDAG
  rationale: Aorist narrative verb rendered as simple past in English. The action
    is presented as a completed whole.
- source_word: στολάς
  chosen: robes
  alternatives:
  - garments
  lexicon: BDAG
  rationale: στολή refers to a long robe or stately garment. 'Robes' fits Revelation's
    imagery better than the more generic 'garments.'
- source_word: ἐλεύκαναν
  chosen: made them white
  alternatives:
  - whitened them
  - bleached them
  lexicon: BDAG
  rationale: The verb means to make white. 'Made them white' is clear modern English
    and preserves the causative sense better than the less common 'whitened.'
- source_word: ἐν τῷ αἵματι
  chosen: in the blood
  alternatives:
  - by the blood
  - with the blood
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve the striking imagery
    of purification in blood. Although instrumental senses like 'by' are possible,
    'in' better reflects the Greek and the paradoxical symbolism.
- source_word: τοῦ ἀρνίου
  chosen: of the Lamb
  alternatives:
  - of the lamb
  lexicon: BDAG
  rationale: In Revelation, ἀρνίον is a christological title for Jesus. Capitalizing
    'Lamb' signals titular usage in English without altering the lexical meaning.
