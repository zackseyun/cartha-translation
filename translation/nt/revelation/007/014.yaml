theological_decisions:
- issue: Rendering of κύριος in address to the elder
  chosen_reading: My lord
  alternative_readings:
  - My Lord
  - Sir
  rationale: The default rendering for κύριος is 'Lord,' but context determines referent.
    Since John addresses a heavenly elder, not explicitly God or the Messiah, 'My
    lord' avoids overstating the figure's identity while preserving reverence. This
    follows the doctrine's principle of original-language primacy and context-sensitive
    rendering of titles.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord), with per-verse
    contextual variance documented'
- issue: Interpretation of 'the great tribulation'
  chosen_reading: the great tribulation
  alternative_readings:
  - the great affliction
  - the great distress
  rationale: The phrase is translated lexically rather than interpreted through any
    one eschatological system. This preserves theological tension and avoids denominationally
    resolving whether the reference is to a specific end-time period, the church's
    suffering generally, or both.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
