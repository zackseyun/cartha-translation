theological_decisions:
- issue: Allusion to Isaiah 49:10 and eschatological restoration language
  chosen_reading: Retain the concrete imagery of hunger, thirst, sun, and scorching
    heat as covenant-restoration promise without over-spiritualizing.
  alternative_readings:
  - Interpret hunger and thirst primarily metaphorically for spiritual longing
  rationale: The immediate context is apocalyptic consolation, and the wording echoes
    Isaianic restoration promises. The translation preserves the literal imagery,
    allowing theological resonance without importing a purely metaphorical interpretation
    not demanded by the text.
  doctrine_reference: Translation philosophy §1, §3
