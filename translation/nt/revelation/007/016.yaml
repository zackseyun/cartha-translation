id: REV.7.16
reference: Revelation 7:16
source:
  edition: SBLGNT
  text: οὐ πεινάσουσιν ἔτι ⸀οὐδὲ διψήσουσιν ἔτι, οὐδὲ μὴ πέσῃ ἐπ’ αὐτοὺς ὁ ἥλιος οὐδὲ
    πᾶν καῦμα,
translation:
  text: They will hunger no more, nor thirst anymore; the sun will never fall on them,
    nor any scorching heat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sun will certainly not strike them.' The Greek uses an emphatic
      negation (οὐδὲ μὴ πέσῃ).
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινάσουσιν
  chosen: will hunger
  alternatives:
  - will be hungry
  lexicon: BDAG
  rationale: Future active of πεινάω is naturally rendered verbally as 'will hunger.'
    This keeps the parallelism with 'will thirst' and reflects the Greek predicate
    more directly than the adjectival 'be hungry.'
- source_word: ἔτι
  chosen: no more / anymore
  alternatives:
  - again
  - still
  lexicon: BDAG
  rationale: In this negated eschatological promise, ἔτι conveys cessation from this
    point onward. English idiom varies slightly across the paired clauses; 'no more'
    and 'anymore' both communicate the same force naturally.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: οὐδὲ coordinates the negative clauses. 'Nor' preserves the cumulative
    negation smoothly in English.
- source_word: διψήσουσιν
  chosen: will thirst
  alternatives:
  - will be thirsty
  lexicon: BDAG
  rationale: Future active of διψάω is best rendered verbally to match the Greek and
    the preceding 'will hunger.'
- source_word: οὐδὲ μὴ πέσῃ
  chosen: will never fall on
  alternatives:
  - will certainly not strike
  - will never beat down on
  lexicon: BDAG
  rationale: The οὐδὲ μή + aorist subjunctive construction is emphatic, expressing
    strong future negation. 'Will never fall on' preserves the imagery of πέσῃ ('fall')
    while communicating the emphatic denial. 'Strike' is possible interpretively,
    but 'fall on' stays closer to the source.
- source_word: ἐπ’ αὐτούς
  chosen: on them
  alternatives:
  - upon them
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates motion or impact onto persons. 'On
    them' is idiomatic modern English.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: BDAG
  rationale: Straightforward lexical rendering.
- source_word: πᾶν καῦμα
  chosen: any scorching heat
  alternatives:
  - any heat
  - any burning heat
  lexicon: BDAG
  rationale: καῦμα denotes burning heat, especially scorching heat from the sun. Rendering
    πᾶν with 'any' fits the negative construction and yields natural English while
    preserving the totality of the promise.
