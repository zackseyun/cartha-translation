theological_decisions:
- issue: Referent and force of the final participle ἐσφραγισμένοι
  chosen_reading: 'Render as a concluding predicate-like participle applying to all
    three listed tribal groups: ''sealed.'''
  alternative_readings:
  - Render more explicitly as 'who were sealed'
  - Move the participle earlier in English for smoother style
  rationale: The Greek places ἐσφραγισμένοι at the end of the sequence, functioning
    as a summary descriptor for the enumerated thousands. Keeping 'sealed' at the
    end preserves the literary effect and avoids importing additional interpretive
    nuance about the nature of the sealing beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
