id: REV.7.8
reference: Revelation 7:8
source:
  edition: SBLGNT
  text: ἐκ φυλῆς Ζαβουλὼν δώδεκα χιλιάδες, ἐκ φυλῆς Ἰωσὴφ δώδεκα χιλιάδες, ἐκ φυλῆς
    Βενιαμὶν δώδεκα χιλιάδες ⸀ἐσφραγισμένοι.
translation:
  text: from the tribe of Zebulun, twelve thousand; from the tribe of Joseph, twelve
    thousand; from the tribe of Benjamin, twelve thousand, sealed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been sealed' or 'who were sealed.' The Greek participle at the
      end summarizes the listed groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard prepositional sense indicating source or origin. 'From' is natural
    English and preserves the repeated formula of the list.
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: BDAG
  rationale: In this Israelite genealogical context, φυλή refers to a tribal division.
    'Tribe' is the established and accurate English equivalent.
- source_word: Ζαβουλών
  chosen: Zebulun
  lexicon: BDAG
  rationale: Personal/tribal name is transliterated by standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: δώδεκα χιλιάδες
  chosen: twelve thousand
  lexicon: BDAG
  rationale: Direct numerical rendering preserves the formal structure and count of
    the Greek without paraphrase.
- source_word: Ἰωσήφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Name is transliterated conventionally. Although Joseph here stands in
    a tribal-list function that may overlap conceptually with Ephraim/Manasseh traditions,
    the text itself says 'Joseph,' so the translation preserves that wording exactly.
- source_word: Βενιαμίν
  chosen: Benjamin
  lexicon: BDAG
  rationale: Personal/tribal name transliterated by standard English convention.
- source_word: ἐσφραγισμένοι
  chosen: sealed
  alternatives:
  - having been sealed
  - who were sealed
  lexicon: BDAG
  rationale: Perfect passive participle, nominative plural, summarizing the listed
    groups as those marked with a seal. 'Sealed' is concise, idiomatic, and preserves
    the passive/resultative force in context. Alternatives are more explicit but less
    natural in the list format.
