theological_decisions:
- issue: Aspect/tense of ἦλθον in English
  chosen_reading: 'Rendered with English present perfect: ''where have they come from'''
  alternative_readings:
  - where did they come from
  rationale: The Greek aorist is formally past, but in English the present perfect
    can better express a past arrival with present relevance in the visionary scene.
    This is a translation-style decision, not a doctrinal one.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
