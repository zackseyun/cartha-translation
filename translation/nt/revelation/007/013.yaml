id: REV.7.13
reference: Revelation 7:13
source:
  edition: SBLGNT
  text: Καὶ ἀπεκρίθη εἷς ἐκ τῶν πρεσβυτέρων λέγων μοι· Οὗτοι οἱ περιβεβλημένοι τὰς
    στολὰς τὰς λευκὰς τίνες εἰσὶν καὶ πόθεν ἦλθον;
translation:
  text: Then one of the elders answered, saying to me, “These who are clothed in the
    white robes—who are they, and where have they come from?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “where did they come from?”
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  lexicon: BDAG
  rationale: Rendered as a discourse-advancing connective in narrative/apocalyptic
    sequence. 'Then' reads more naturally in English while preserving the progression
    of the vision.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Standard rendering of ἀποκρίνομαι. Although no prior direct question
    is recorded immediately before, 'answered' is idiomatic in biblical narrative
    and reflects the Greek usage.
- source_word: εἷς ἐκ τῶν πρεσβυτέρων
  chosen: one of the elders
  alternatives:
  - one from among the elders
  lexicon: BDAG
  rationale: Natural English for the partitive construction, preserving the identity
    of the speaker as a member of the elder group.
- source_word: λέγων μοι
  chosen: saying to me
  alternatives:
  - saying to me this
  - and said to me
  lexicon: BDAG
  rationale: Keeps the participial construction explicit and preserves the addressee.
    This is slightly more formal than collapsing it entirely into 'said to me,' but
    remains readable.
- source_word: Οὗτοι
  chosen: These
  alternatives:
  - These ones
  lexicon: BDAG
  rationale: Demonstrative referring to the group in view. Simple 'These' is idiomatic
    and sufficient in English.
- source_word: οἱ περιβεβλημένοι
  chosen: who are clothed
  alternatives:
  - who are dressed
  - the ones having been clothed
  - the ones wearing
  lexicon: BDAG
  rationale: The perfect participle indicates a present state resulting from prior
    action. 'Who are clothed' preserves the stative sense better than the more casual
    'wearing' and is smoother than a wooden perfect rendering.
- source_word: τὰς στολὰς τὰς λευκάς
  chosen: the white robes
  alternatives:
  - the robes, the white ones
  - white garments
  lexicon: BDAG
  rationale: στολή commonly denotes a robe or long garment. 'White robes' is the most
    natural English rendering and fits Revelation's repeated imagery.
- source_word: τίνες εἰσὶν
  chosen: who are they
  alternatives:
  - who are these
  lexicon: BDAG
  rationale: English idiom prefers 'who are they' after the fronted demonstrative
    phrase. The sense is unchanged.
- source_word: πόθεν ἦλθον
  chosen: where have they come from
  alternatives:
  - from where did they come
  - where did they come from
  lexicon: BDAG
  rationale: πόθεν asks source/origin. The English present perfect can naturally convey
    the relevance of their arrival to the present scene, though simple past is also
    possible. This choice fits contemporary readable English.
