theological_decisions:
- issue: Repetitive tribal-list syntax
  chosen_reading: Preserve the repeated formula 'from the tribe of ... , twelve thousand'
    for each tribe.
  alternative_readings:
  - Compress to 'from the tribes of Simeon, Levi, and Issachar, twelve thousand each'
  rationale: The Greek repeats the phrase for each tribe, and the repetitive cadence
    is part of the apocalyptic enumeration. Preserving the repetition is more faithful
    to the source and avoids smoothing away the formal structure.
  doctrine_reference: Translation philosophy §1, §5
- issue: Inclusion of Levi in the tribal enumeration
  chosen_reading: Translate Levi without explanatory expansion in the main text.
  alternative_readings:
  - Add interpretive wording to explain Levi's unusual inclusion
  rationale: The verse itself simply lists Levi among the tribes. Adding explanation
    in the main text would import interpretation beyond what the source text states.
  doctrine_reference: 'Affirmations: do not import doctrinal claims the text does
    not make; Translation philosophy §1'
