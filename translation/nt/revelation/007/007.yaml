id: REV.7.7
reference: Revelation 7:7
source:
  edition: SBLGNT
  text: ἐκ φυλῆς Συμεὼν δώδεκα χιλιάδες, ἐκ φυλῆς Λευὶ δώδεκα χιλιάδες, ἐκ φυλῆς Ἰσσαχὰρ
    δώδεκα χιλιάδες,
translation:
  text: from the tribe of Simeon, twelve thousand; from the tribe of Levi, twelve
    thousand; from the tribe of Issachar, twelve thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of the tribe of Simeon ... out of the tribe of Levi ... out of the
      tribe of Issachar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard prepositional sense marking source/origin. 'From' is natural
    English and preserves the repeated formulaic structure of the list.
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: BDAG
  rationale: In this Israelite genealogical context, φυλή refers to a tribal division.
    'Tribe' is the established and most precise English equivalent.
- source_word: Συμεὼν
  chosen: Simeon
  rationale: Personal/tribal name is transliterated according to standard English
    convention, following the translation philosophy to transliterate names.
- source_word: δώδεκα χιλιάδες
  chosen: twelve thousand
  alternatives:
  - 12,000
  lexicon: BDAG
  rationale: The cardinal plus noun phrase is rendered in words for literary readability
    in running text. It denotes the number sealed from each tribe in the list.
- source_word: Λευὶ
  chosen: Levi
  rationale: Proper name transliterated by standard convention. Although Levi is not
    always counted among tribal allotments in the Old Testament, here the Greek explicitly
    includes Levi in the list, so the translation preserves it straightforwardly.
- source_word: Ἰσσαχὰρ
  chosen: Issachar
  rationale: Proper name transliterated by standard English convention.
