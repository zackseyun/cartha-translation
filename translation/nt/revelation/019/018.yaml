id: REV.19.18
reference: Revelation 19:18
source:
  edition: SBLGNT
  text: ἵνα φάγητε σάρκας βασιλέων καὶ σάρκας χιλιάρχων καὶ σάρκας ἰσχυρῶν καὶ σάρκας
    ἵππων καὶ τῶν καθημένων ἐπ’ ⸀αὐτῶν, καὶ σάρκας πάντων ἐλευθέρων τε καὶ δούλων
    καὶ μικρῶν ⸀καὶ μεγάλων.
translation:
  text: so that you may eat the flesh of kings, the flesh of commanders, the flesh
    of the mighty, the flesh of horses and of those who sit on them, and the flesh
    of all, both free and slave, and small and great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those seated on them'; more compactly, 'their riders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result following the angel's summons in the previous
    verse. 'So that' is natural modern English while preserving the purposive force.
- source_word: φάγητε
  chosen: you may eat
  alternatives:
  - you might eat
  - eat
  lexicon: BDAG
  rationale: Aorist active subjunctive, second plural, governed by ἵνα. 'You may eat'
    preserves the subordinate purposive sense without sounding wooden.
- source_word: σάρκας
  chosen: the flesh
  alternatives:
  - flesh
  - the carcasses
  lexicon: BDAG
  rationale: Literal use of σάρξ in a judgment scene involving physical bodies. Per
    doctrine, σάρξ is rendered 'flesh' in literal contexts. The repeated article is
    supplied idiomatically in English to mirror the Greek repetition and rhetorical
    force.
- source_word: βασιλέων
  chosen: of kings
  alternatives:
  - of rulers
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly denotes kings here; 'rulers' would weaken
    the specific royal reference.
- source_word: χιλιάρχων
  chosen: of commanders
  alternatives:
  - of captains
  - of military commanders
  - of chiliarchs
  lexicon: BDAG
  rationale: χιλίαρχος is a military officer, historically a commander of a thousand.
    'Commanders' is clear modern English and preserves the military sense better than
    the archaic 'captains' or opaque transliteration.
- source_word: ἰσχυρῶν
  chosen: of the mighty
  alternatives:
  - of strong men
  - of powerful ones
  lexicon: BDAG
  rationale: The adjective functions substantivally for powerful warriors or strong
    ones. 'The mighty' is concise, idiomatic, and fits the judgment catalogue.
- source_word: ἵππων
  chosen: of horses
  lexicon: BDAG
  rationale: Literal reference to horses in the battle imagery.
- source_word: τῶν καθημένων ἐπ’ αὐτῶν
  chosen: of those who sit on them
  alternatives:
  - of those seated on them
  - of their riders
  lexicon: BDAG
  rationale: A participial phrase meaning those sitting/seated on the horses. 'Those
    who sit on them' stays close to the Greek; 'riders' is possible but slightly compresses
    the imagery.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of everyone
  lexicon: BDAG
  rationale: Genitive plural after σάρκας, summing up the totality of the groups that
    follow. 'Of all' preserves the collective force.
- source_word: ἐλευθέρων τε καὶ δούλων
  chosen: both free and slave
  alternatives:
  - both free and slaves
  - both freemen and slaves
  lexicon: BDAG
  rationale: The pair marks social extremes. Following doctrine on δοῦλος, 'slave'
    is preferred where bonded status is in view; this social-status contrast makes
    that salient. Singular 'slave' after 'free' works idiomatically as a class designation
    in English.
- source_word: μικρῶν καὶ μεγάλων
  chosen: small and great
  alternatives:
  - the small and the great
  - low and high
  lexicon: BDAG
  rationale: A conventional merism for all ranks/statuses. 'Small and great' preserves
    the biblical cadence and broad social scope.
- source_word: τε καὶ
  chosen: both ... and
  alternatives:
  - and ... and
  lexicon: BDAG
  rationale: The correlative construction is best represented by 'both ... and' in
    English.
