theological_decisions:
- issue: Rendering δοῦλος in a social-status pair
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse contrasts free persons with those in bondage. In this context
    the bonded nature of δοῦλος is explicit, so 'slave' best matches the source and
    the project's doctrine on contested terms.
