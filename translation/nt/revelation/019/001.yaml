id: REV.19.1
reference: Revelation 19:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἤκουσα ὡς φωνὴν μεγάλην ὄχλου πολλοῦ ἐν τῷ οὐρανῷ λεγόντων· Ἁλληλουϊά·
    ἡ σωτηρία καὶ ἡ ⸂δόξα καὶ ἡ δύναμις⸃ τοῦ θεοῦ ἡμῶν,
translation:
  text: After these things I heard what seemed to be the loud voice of a great multitude
    in heaven, saying, “Hallelujah! Salvation and glory and power belong to our God,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Praise Yah” or “Praise the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A standard temporal-sequential expression in Revelation. 'After these
    things' preserves the plural demonstrative and the visionary progression more
    formally than 'After this,' while remaining natural English.
- source_word: ἤκουσα
  chosen: I heard
  lexicon: BDAG
  rationale: Straightforward aorist of ἀκούω; simple past best fits the narrative
    sequence.
- source_word: ὡς
  chosen: what seemed to be
  alternatives:
  - like
  - as
  lexicon: BDAG
  rationale: In apocalyptic description, ὡς often marks resemblance or appearance
    rather than strict identification. 'What seemed to be' communicates perceptual
    approximation more clearly in modern English than bare 'as' or 'like' in this
    construction.
- source_word: φωνὴν μεγάλην
  chosen: the loud voice
  alternatives:
  - a loud voice
  - a great voice
  lexicon: BDAG
  rationale: μεγάλην with φωνή idiomatically denotes loudness or greatness of sound.
    'Loud voice' is the most natural English equivalent. The article is supplied in
    English because the phrase is further defined by the following genitive construction
    and reads smoothly as a single perceived sound.
- source_word: ὄχλου πολλοῦ
  chosen: of a great multitude
  alternatives:
  - of a large crowd
  - of a vast multitude
  lexicon: BDAG
  rationale: ὄχλος can mean crowd or multitude; in Revelation's heavenly worship scene,
    'multitude' better conveys the massed worshiping assembly. πολλοῦ intensifies
    size, hence 'great multitude.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the sky
  lexicon: BDAG
  rationale: 'οὐρανός here refers to the heavenly realm, not the sky. Idiomatic English
    omits the article: ''in heaven.'''
- source_word: λεγόντων
  chosen: saying
  alternatives:
  - who were saying
  lexicon: BDAG
  rationale: The present participle introduces the content of the multitude's cry.
    'Saying' is concise and natural in English narrative.
- source_word: Ἁλληλουϊά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Praise the LORD
  lexicon: BDAG
  rationale: This liturgical exclamation is conventionally transliterated in English,
    and its established form is readily understood by readers. Because it is a Hebrew-derived
    worship cry embedded in Greek, transliteration preserves its recognizable doxological
    force; a lexical alternative is worth preserving in a footnote.
- source_word: ἡ σωτηρία
  chosen: Salvation
  alternatives:
  - The salvation
  - deliverance
  lexicon: BDAG
  rationale: 'σωτηρία here denotes saving deliverance belonging to God. Anarthrous
    English abstract style is most natural in a doxology: ''Salvation.'''
- source_word: ἡ δόξα
  chosen: glory
  alternatives:
  - the glory
  - honor
  lexicon: BDAG
  rationale: δόξα in worship contexts is standardly 'glory.' Omitting the article
    in English yields a natural triadic ascription.
- source_word: ἡ δύναμις
  chosen: power
  alternatives:
  - the power
  - might
  lexicon: BDAG
  rationale: δύναμις here refers to divine power or might. 'Power' is the broadest
    and most idiomatic rendering in this doxological list.
- source_word: τοῦ θεοῦ ἡμῶν
  chosen: belong to our God
  alternatives:
  - are of our God
  - are God's
  lexicon: BDAG
  rationale: The Greek is a genitive of possession/ascription following the nominative
    series. English commonly makes this explicit with 'belong to our God,' which preserves
    the sense without awkward literalism.
