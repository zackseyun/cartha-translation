theological_decisions:
- issue: Rendering the heavenly acclamation Ἁλληλουϊά
  chosen_reading: Hallelujah
  alternative_readings:
  - Praise Yah
  - Praise the LORD
  rationale: The term is a Hebrew liturgical exclamation carried into Greek and then
    into Christian worship vocabulary. Transliteration preserves its intertextual
    and worship character without importing additional doctrinal nuance. A footnote
    preserves the semantic gloss.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
