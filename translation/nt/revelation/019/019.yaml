theological_decisions:
- issue: Referent of 'the one seated on the horse'
  chosen_reading: Kept as a descriptive expression rather than explicitly substituting
    a christological title in the translation.
  alternative_readings:
  - against Messiah
  - against Christ
  rationale: The immediate literary context identifies the rider, but this verse itself
    uses a descriptive participial phrase. Retaining that phrase avoids importing
    an explicit title not present in the Greek while remaining fully compatible with
    orthodox christological reading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
