id: REV.19.19
reference: Revelation 19:19
source:
  edition: SBLGNT
  text: καὶ εἶδον τὸ θηρίον καὶ τοὺς βασιλεῖς τῆς γῆς καὶ τὰ στρατεύματα αὐτῶν συνηγμένα
    ποιῆσαι ⸀τὸν πόλεμον μετὰ τοῦ καθημένου ἐπὶ τοῦ ἵππου καὶ μετὰ τοῦ στρατεύματος
    αὐτοῦ.
translation:
  text: And I saw the beast and the kings of the earth and their armies gathered to
    make war against the one seated on the horse and against his army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''to make war with''; in context, the sense is hostile: ''to
      make war against.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρίον
  chosen: the beast
  alternatives:
  - the animal
  - the wild beast
  lexicon: BDAG
  rationale: In Revelation, θηρίον is a loaded apocalyptic term and is conventionally
    but accurately rendered 'beast,' preserving its symbolic and menacing force better
    than more generic alternatives.
- source_word: βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: BDAG
  rationale: γῆ can mean 'land' or 'earth,' but in Revelation's global-apocalyptic
    scope 'earth' best fits the sense of world rulers in opposition to God.
- source_word: στρατεύματα
  chosen: armies
  alternatives:
  - troops
  - forces
  lexicon: BDAG
  rationale: The military context created by πόλεμος favors 'armies' as the most natural
    and forceful English rendering.
- source_word: συνηγμένα
  chosen: gathered
  alternatives:
  - assembled
  lexicon: BDAG
  rationale: The perfect/passive participle denotes a state of having been brought
    together; 'gathered' is concise and idiomatic in English while preserving the
    sense.
- source_word: ποιῆσαι τὸν πόλεμον
  chosen: to make war
  alternatives:
  - to wage war
  - to do battle
  lexicon: BDAG
  rationale: This is a standard idiom for engaging in warfare. 'Make war' is slightly
    more formal and preserves the Greek construction well.
- source_word: μετὰ τοῦ καθημένου ἐπὶ τοῦ ἵππου
  chosen: against the one seated on the horse
  alternatives:
  - with the one seated on the horse
  lexicon: BDAG
  rationale: 'Although μετά with genitive often means ''with,'' in the context of
    making war it carries adversative force: war is made against someone. Rendering
    it ''against'' communicates the intended hostility clearly in English.'
- source_word: τοῦ καθημένου
  chosen: the one seated
  alternatives:
  - the one sitting
  - the rider
  lexicon: BDAG
  rationale: The participial expression is preserved directly as 'the one seated,'
    which is both natural and closer to the Greek than the interpretive shorthand
    'the rider.'
- source_word: ἐπὶ τοῦ ἵππου
  chosen: on the horse
  alternatives:
  - upon the horse
  lexicon: BDAG
  rationale: A straightforward locative rendering; 'on the horse' is modern and readable.
- source_word: μετὰ τοῦ στρατεύματος αὐτοῦ
  chosen: against his army
  alternatives:
  - against his armies
  - with his army
  lexicon: BDAG
  rationale: As with the previous μετά phrase, the warfare context makes the adversative
    sense primary. The singular στρατεύματος is best rendered 'army' here, referring
    collectively to the heavenly host accompanying the rider.
