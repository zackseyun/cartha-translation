theological_decisions:
- issue: Meaning of δικαιώματα in relation to the bride's garment
  chosen_reading: The garment symbolizes the righteous deeds of the saints.
  alternative_readings:
  - The garment symbolizes the righteous requirements pertaining to the saints.
  - The garment symbolizes the righteous status/vindication of the saints.
  rationale: The immediate explanatory clause identifies the fine linen with τὰ δικαιώματα
    τῶν ἁγίων. In this context, the plural most naturally points to deeds/acts rather
    than legal requirements. This preserves the text's symbolism without denying that
    the garment is also 'given' by God in the first clause; the verse holds both divine
    gift and the saints' righteous conduct together.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Agency in the passive ἐδόθη
  chosen_reading: 'The passive is left implicit: ''it was given to her.'''
  alternative_readings:
  - God gave it to her.
  rationale: Revelation frequently uses the divine passive. Making God the explicit
    subject is a likely inference, but the Greek leaves the giver unstated. The translation
    preserves that textual restraint.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source states without importing more'
