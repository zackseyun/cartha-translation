id: REV.19.8
reference: Revelation 19:8
source:
  edition: SBLGNT
  text: καὶ ἐδόθη αὐτῇ ἵνα περιβάληται βύσσινον ⸀λαμπρὸν καθαρόν, τὸ γὰρ βύσσινον
    τὰ δικαιώματα τῶν ἁγίων ἐστίν.
translation:
  text: And it was given to her to clothe herself with fine linen, bright and clean,
    for the fine linen is the righteous deeds of the saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteous acts.' The Greek word can also mean 'righteous requirements'
      in other contexts, but here it most naturally refers to the saints' righteous
      deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  chosen: it was given
  alternatives:
  - she was given
  - it was granted
  lexicon: BDAG
  rationale: A passive of δίδωμι. 'It was given' preserves the impersonal divine passive
    feel common in Revelation without over-specifying the giver in the English subject.
    'Granted' is possible, but 'given' is more transparent and natural here.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative feminine singular referring to the bride/wife in context. 'To
    her' is the straightforward rendering.
- source_word: ἵνα περιβάληται
  chosen: to clothe herself
  alternatives:
  - that she might clothe herself
  - to be clothed
  lexicon: BDAG
  rationale: The ἵνα clause with middle subjunctive expresses purpose/result. The
    middle voice of περιβάλλω is naturally reflexive here, so 'to clothe herself'
    best reflects the Greek form. 'To be clothed' would flatten the middle nuance.
- source_word: βύσσινον
  chosen: fine linen
  alternatives:
  - linen
  - a linen garment
  lexicon: BDAG
  rationale: βύσσινος denotes fine linen, often luxurious or cultically significant.
    'Fine linen' is the established and accurate English equivalent and fits both
    occurrences in the verse.
- source_word: λαμπρὸν
  chosen: bright
  alternatives:
  - radiant
  - splendid
  lexicon: BDAG
  rationale: λαμπρός can mean bright, radiant, splendid. 'Bright' is concise, natural,
    and preserves the visual imagery without sounding overly interpretive.
- source_word: καθαρόν
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: καθαρός can be rendered 'clean' or 'pure.' 'Clean' pairs well with 'bright'
    and avoids importing a more abstract moral sense into the garment description,
    while the following explanatory clause supplies the ethical significance.
- source_word: τὸ γὰρ βύσσινον
  chosen: for the fine linen
  alternatives:
  - for the linen
  - because the fine linen
  lexicon: BDAG
  rationale: γάρ is explanatory, so 'for' is appropriate. Repeating 'the fine linen'
    preserves the Greek's explicit repetition and keeps the symbolic explanation clear.
- source_word: δικαιώματα
  chosen: righteous deeds
  alternatives:
  - righteous acts
  - righteous requirements
  - ordinances
  - justification(s)
  lexicon: BDAG
  rationale: δικαίωμα has a range including righteous act, requirement, ordinance.
    In this symbolic context, referring to what characterizes the saints, 'righteous
    deeds' best fits the plural and the explanatory force. 'Righteous acts' is also
    viable; 'requirements' or 'ordinances' fit poorly here.
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of the holy ones
  - of God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is a standard NT designation for God's holy people. 'Saints' is
    concise and traditional without being misleading in this context; 'holy ones'
    is possible but less idiomatic in English.
