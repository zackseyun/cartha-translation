id: REV.19.3
reference: Revelation 19:3
source:
  edition: SBLGNT
  text: καὶ δεύτερον ⸀εἴρηκαν· Ἁλληλουϊά· καὶ ὁ καπνὸς αὐτῆς ἀναβαίνει εἰς τοὺς αἰῶνας
    τῶν αἰώνων.
translation:
  text: And a second time they said, “Hallelujah!” And her smoke goes up forever and
    ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “to the ages of ages,” an idiom meaning unending duration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεύτερον
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: BDAG
  rationale: Adverbial accusative indicating repetition. 'A second time' is natural
    modern English and preserves the sequential force.
- source_word: εἴρηκαν
  chosen: they said
  alternatives:
  - they have said
  - they cried out
  lexicon: BDAG
  rationale: Perfect of λέγω. In English narrative, the simple past is the most natural
    rendering here, while still conveying the utterance without overstating aspect.
    'Cried out' would add intensity not explicit in the verb itself.
- source_word: Ἁλληλουϊά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Praise the LORD
  lexicon: BDAG
  rationale: This liturgical exclamation is conventionally transliterated in English
    and is recognizable to modern readers. Translating it would lose the marked worship
    formula used in this passage.
- source_word: ὁ καπνὸς αὐτῆς
  chosen: her smoke
  alternatives:
  - the smoke from her
  - its smoke
  lexicon: BDAG
  rationale: The genitive αὐτῆς refers back to Babylon portrayed as a woman/city in
    context. 'Her smoke' preserves the feminine personification present in the Greek
    better than the neuter 'its smoke'.
- source_word: ἀναβαίνει
  chosen: goes up
  alternatives:
  - rises
  - ascends
  lexicon: BDAG
  rationale: Present tense with vivid/imperfective force. 'Goes up' is straightforward,
    idiomatic, and preserves the image without sounding overly elevated.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the standard
    natural English equivalent in apocalyptic and doxological contexts; the more literal
    alternatives are preserved in a footnote because they may be of interpretive interest.
