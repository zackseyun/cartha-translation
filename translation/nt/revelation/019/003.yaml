theological_decisions:
- issue: Duration expressed by εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen_reading: forever and ever
  alternative_readings:
  - to the ages of ages
  - for the ages of the ages
  rationale: The Greek idiom most naturally communicates unending duration in this
    context of final judgment. The translation preserves that force in idiomatic English
    without softening it. A more formally literal rendering is preserved in a footnote
    for transparency.
  doctrine_reference: Translation philosophy §3, §6
