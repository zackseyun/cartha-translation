id: REV.19.15
reference: Revelation 19:15
source:
  edition: SBLGNT
  text: καὶ ἐκ τοῦ στόματος αὐτοῦ ἐκπορεύεται ⸀ῥομφαία ὀξεῖα, ἵνα ἐν αὐτῇ πατάξῃ τὰ
    ἔθνη, καὶ αὐτὸς ποιμανεῖ αὐτοὺς ἐν ῥάβδῳ σιδηρᾷ· καὶ αὐτὸς πατεῖ τὴν ληνὸν τοῦ
    οἴνου τοῦ θυμοῦ τῆς ὀργῆς τοῦ θεοῦ τοῦ παντοκράτορος.
translation:
  text: And from his mouth comes a sharp sword, so that with it he may strike down
    the nations, and he himself will shepherd them with an iron rod; and he himself
    treads the winepress of the wine of the fury of the wrath of God the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will rule them with an iron rod.' The Greek verb literally means
      'shepherd,' echoing Psalm 2 while retaining the pastoral metaphor.
    reason: alternative_reading
  - marker: b
    text: Traditional English often has 'with a rod of iron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορεύεται
  chosen: comes
  alternatives:
  - goes out
  - proceeds
  lexicon: BDAG
  rationale: Present middle/passive deponent with the sense of issuing forth. 'Comes'
    is idiomatic modern English while preserving the vivid present imagery; 'goes
    out' is possible but less natural here.
- source_word: ῥομφαία ὀξεῖα
  chosen: a sharp sword
  alternatives:
  - a sharp broadsword
  - a sharp saber
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword; English 'sword' is the clearest natural
    rendering. 'Sharp' preserves ὀξεῖα directly. More specific weapon terms would
    over-interpret the image.
- source_word: ἵνα ἐν αὐτῇ πατάξῃ
  chosen: so that with it he may strike down
  alternatives:
  - in order that with it he might strike
  - so that by it he may strike
  lexicon: BDAG
  rationale: ἵνα + aorist subjunctive expresses purpose/result. ἐν αὐτῇ is instrumental
    here, best rendered 'with it.' πατάσσω in judgment contexts commonly means 'strike'
    or 'strike down'; 'strike down' makes the hostile judicial force explicit without
    adding beyond context.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In Revelation this term commonly refers to the nations collectively rather
    than specifically Gentiles as opposed to Jews. 'The nations' is the most contextually
    appropriate and consistent rendering.
- source_word: ποιμανεῖ
  chosen: will shepherd
  alternatives:
  - will rule
  - will tend as a shepherd
  lexicon: BDAG
  rationale: The verb literally means 'to shepherd.' Although in this messianic/judgment
    context it carries ruling authority (echoing Psalm 2), the translation philosophy
    favors preserving the source metaphor in the main text rather than flattening
    it to 'rule.'
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  chosen: with an iron rod
  alternatives:
  - with a rod of iron
  lexicon: BDAG
  rationale: Instrumental ἐν is naturally rendered 'with.' 'Iron rod' is clear modern
    English; 'rod of iron' is a traditional alternative preserved in a footnote-worthy
    lexical note.
- source_word: πατεῖ
  chosen: treads
  alternatives:
  - tramples
  - is treading
  lexicon: BDAG
  rationale: Present tense continues the vivid imagery. 'Treads' is the standard rendering
    for winepress imagery and avoids over-specifying with 'tramples,' though that
    nuance is present.
- source_word: τὴν ληνὸν
  chosen: the winepress
  alternatives:
  - the vat
  lexicon: BDAG
  rationale: ληνός refers to a winepress. This is the established and accurate image
    in prophetic judgment language.
- source_word: τοῦ οἴνου τοῦ θυμοῦ τῆς ὀργῆς
  chosen: of the wine of the fury of the wrath
  alternatives:
  - of the wine of the fierce wrath
  - of the wine of the passion of the wrath
  lexicon: BDAG
  rationale: The stacked genitives are rhetorically intense and should be preserved
    rather than smoothed away. θυμός and ὀργή overlap semantically but are distinct
    terms; rendering them as 'fury' and 'wrath' preserves the double emphasis.
- source_word: τοῦ θεοῦ τοῦ παντοκράτορος
  chosen: of God the Almighty
  alternatives:
  - of the Almighty God
  lexicon: BDAG
  rationale: παντοκράτωρ is a divine title best translated 'the Almighty.' The article
    structure supports 'God the Almighty,' preserving the titular force.
