theological_decisions:
- issue: ποιμανεῖ in a Psalm 2 allusion within a judgment context
  chosen_reading: will shepherd them with an iron rod
  alternative_readings:
  - will rule them with an iron rod
  rationale: 'The Greek verb is literally ''shepherd,'' even in the messianic royal
    allusion. Preserving ''shepherd'' maintains the source metaphor and theological
    tension: the Messiah''s rule is both pastoral and judicial. Because many English
    versions render ''rule'' due to the Psalm 2 context, that alternative is preserved
    in a footnote rather than adopted in the main text.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering the compounded wrath expression θυμοῦ τῆς ὀργῆς
  chosen_reading: fury of the wrath
  alternative_readings:
  - fierce wrath
  - wrathful fury
  rationale: The text intensifies divine judgment by using two near-synonymous terms.
    The translation preserves both rather than collapsing them into a single English
    expression, avoiding interpretive reduction of the severity of the image.
  doctrine_reference: Translation philosophy §§1, 3
