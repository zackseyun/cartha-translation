id: REV.19.13
reference: Revelation 19:13
source:
  edition: SBLGNT
  text: καὶ περιβεβλημένος ἱμάτιον ⸀βεβαμμένον αἵματι, καὶ ⸀κέκληται τὸ ὄνομα αὐτοῦ
    ὁ Λόγος τοῦ Θεοῦ.
translation:
  text: And he is clothed in a robe dipped in blood, and his name is called the Word
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stained with blood.' The Greek verb more literally means 'dipped' or
      'dyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβεβλημένος
  chosen: is clothed in
  alternatives:
  - having been clothed with
  - wearing
  lexicon: BDAG
  rationale: Perfect participle of περιβάλλω describing his present state. 'Is clothed
    in' gives natural English while preserving the stative force better than a simple
    'wearing' alone.
- source_word: ἱμάτιον
  chosen: robe
  alternatives:
  - garment
  - cloak
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment. 'Robe' fits the elevated, royal-warrior
    context of the vision better than the flatter 'garment,' without over-specifying.
- source_word: βεβαμμένον αἵματι
  chosen: dipped in blood
  alternatives:
  - stained with blood
  - sprinkled with blood
  lexicon: BDAG
  rationale: From βάπτω, whose core sense is 'dip' or 'immerse,' not merely 'stain.'
    'Dipped in blood' preserves the vividness of the Greek and avoids weakening the
    imagery. 'Stained with blood' is possible as an interpretive gloss and is preserved
    in a footnote.
- source_word: κέκληται
  chosen: is called
  alternatives:
  - has been called
  - is named
  lexicon: BDAG
  rationale: Perfect passive of καλέω. In idiomatic English, 'is called' best conveys
    the naming/title sense while reflecting the present result of the perfect.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the Greek possessive construction.
- source_word: ὁ Λόγος τοῦ Θεοῦ
  chosen: the Word of God
  alternatives:
  - the message of God
  lexicon: BDAG
  rationale: λόγος here functions as a christological title, not merely 'message'
    or 'speech.' Capitalizing 'Word' reflects title usage in context and coheres with
    Johannine usage without importing more than the text states.
