theological_decisions:
- issue: Christological title λόγος
  chosen_reading: the Word of God
  alternative_readings:
  - the message of God
  rationale: In this apocalyptic context, ὁ Λόγος τοῦ Θεοῦ is presented as a personal
    title for the rider. Rendering it 'the Word of God' preserves the title's theological
    weight and its likely resonance with Johannine Christology, while avoiding paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §2
