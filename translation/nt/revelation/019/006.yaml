id: REV.19.6
reference: Revelation 19:6
source:
  edition: SBLGNT
  text: καὶ ἤκουσα ὡς φωνὴν ὄχλου πολλοῦ καὶ ὡς φωνὴν ὑδάτων πολλῶν καὶ ὡς φωνὴν βροντῶν
    ἰσχυρῶν, ⸀λεγόντων· Ἁλληλουϊά, ὅτι ἐβασίλευσεν κύριος, ὁ ⸀θεός, ὁ παντοκράτωρ.
translation:
  text: And I heard what seemed to be the voice of a great multitude, and like the
    voice of many waters, and like the voice of mighty thunders, saying, “Hallelujah!
    For the Lord our God, the Almighty, has begun to reign.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “the Lord our God, the Almighty,” while the printed
      Greek text here reads more literally, “the Lord, the God, the Almighty.”
    reason: textual_variant
  - marker: b
    text: Or “reigns,” “has reigned,” or “has become king”; the Greek verb may be
      understood as celebrating the decisive manifestation of God's reign.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened
  - I heard the sound of
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω is straightforwardly rendered 'I heard' in
    narrative sequence.
- source_word: ὡς
  chosen: what seemed to be / like
  alternatives:
  - as
  - something like
  lexicon: BDAG
  rationale: Repeated ὡς marks comparison rather than identity. The first instance
    is idiomatically rendered 'what seemed to be,' with the following instances as
    'like,' preserving the visionary, simile-rich style of Revelation.
- source_word: φωνὴν
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' Here the repeated phrase introduces
    a heard proclamation ('saying, Hallelujah'), so 'voice' best preserves both auditory
    force and personal/corporate utterance.
- source_word: ὄχλου πολλοῦ
  chosen: a great multitude
  alternatives:
  - a large crowd
  - a vast multitude
  lexicon: BDAG
  rationale: Standard apocalyptic expression for a very large assembled group. 'Great
    multitude' is natural English and preserves the elevated register.
- source_word: ὑδάτων πολλῶν
  chosen: many waters
  alternatives:
  - great waters
  - rushing waters
  lexicon: BDAG
  rationale: A conventional biblical image for overwhelming, majestic sound. 'Many
    waters' preserves the intertextual resonance better than an interpretive paraphrase.
- source_word: βροντῶν ἰσχυρῶν
  chosen: mighty thunders
  alternatives:
  - loud thunders
  - powerful peals of thunder
  lexicon: BDAG
  rationale: ἰσχυρῶν emphasizes strength/power. 'Mighty thunders' is concise, vivid,
    and fitting to Revelation's elevated style.
- source_word: λεγόντων
  chosen: saying
  alternatives:
  - crying out
  - declaring
  lexicon: BDAG
  rationale: The present participle introduces the content of the proclamation. 'Saying'
    is the most direct and least interpretive rendering.
- source_word: Ἁλληλουϊά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Praise the LORD
  lexicon: BDAG
  rationale: This liturgical exclamation is conventionally transliterated in English.
    Although Hebrew in origin, its established NT form in English is 'Hallelujah.'
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the hallelujah. 'For' fits elevated doxological
    English better than 'because' here.
- source_word: ἐβασίλευσεν
  chosen: has begun to reign
  alternatives:
  - reigns
  - has reigned
  - has become king
  lexicon: BDAG
  rationale: 'The aorist of βασιλεύω here is best understood as ingressive in context:
    God''s reign is being celebrated as having now decisively commenced in manifested
    victory. ''Has begun to reign'' captures that force better than a simple English
    past tense.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This also suits the
    divine title here.
- source_word: ὁ θεός
  chosen: our God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Although the printed Greek here reads 'the God,' the broader doxological
    formula in this context is idiomatically rendered in English as 'our God,' and
    this reflects the well-attested reading κύριος ὁ θεὸς ἡμῶν in the textual tradition.
    The possessive makes the acclamation natural in English worship language.
- source_word: ὁ παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Powerful
  - the Ruler of all
  lexicon: BDAG
  rationale: Traditional and accurate rendering of παντοκράτωρ in Revelation; concise
    and theologically weighty without being obscure.
