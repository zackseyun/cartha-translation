theological_decisions:
- issue: Rendering of ἐβασίλευσεν in relation to God's reign
  chosen_reading: has begun to reign
  alternative_readings:
  - reigns
  - has reigned
  - has become king
  rationale: The verse celebrates the decisive manifestation of God's kingship in
    the eschatological scene, not the onset of divine sovereignty in an absolute sense.
    The ingressive nuance preserves the text's salvation-historical force without
    denying God's eternal rule.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Text-critical/translation choice around θεός and implied possessive
  chosen_reading: the Lord our God, the Almighty
  alternative_readings:
  - the Lord God, the Almighty
  - the Lord, the God, the Almighty
  rationale: The main text adopts the familiar doxological form 'our God' because
    it is strongly represented in the textual tradition and yields idiomatic English
    worship language. Since the provided SBLGNT line lacks ἡμῶν, the alternative should
    be preserved in a footnote for transparency.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    alternatives in footnotes where ambiguity or textual variation is significant.
