id: REV.19.14
reference: Revelation 19:14
source:
  edition: SBLGNT
  text: καὶ τὰ στρατεύματα ⸀τὰ ἐν τῷ οὐρανῷ ἠκολούθει αὐτῷ ἐφ’ ἵπποις λευκοῖς, ἐνδεδυμένοι
    βύσσινον λευκὸν καθαρόν.
translation:
  text: And the armies in heaven were following him on white horses, clothed in fine
    linen, white and clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the armies of heaven.' The Greek phrase is literally 'the armies, the
      ones in heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύματα
  chosen: armies
  alternatives:
  - hosts
  - troops
  lexicon: BDAG
  rationale: The plural noun denotes organized military forces. 'Armies' is the most
    natural and direct English equivalent in this apocalyptic warfare context; 'hosts'
    is possible but more traditional and less explicit.
- source_word: τὰ ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - of heaven
  - in the sky
  lexicon: BDAG
  rationale: The phrase is locative, identifying the armies as situated in heaven.
    'In heaven' is the plain sense. 'Of heaven' is interpretive, and 'sky' is too
    mundane for Revelation's visionary setting.
- source_word: ἠκολούθει αὐτῷ
  chosen: were following him
  alternatives:
  - followed him
  lexicon: BDAG
  rationale: The imperfect verb portrays ongoing action in the vision. 'Were following
    him' preserves that progressive aspect better than the simple past 'followed him.'
- source_word: ἐφ’ ἵπποις λευκοῖς
  chosen: on white horses
  alternatives:
  - upon white horses
  lexicon: BDAG
  rationale: This prepositional phrase indicates mounted accompaniment. 'On white
    horses' is idiomatic modern English and preserves the symbolic color term λευκοῖς
    as 'white.'
- source_word: ἐνδεδυμένοι
  chosen: clothed
  alternatives:
  - dressed
  - wearing
  lexicon: BDAG
  rationale: The participle describes the armies' state of being attired. 'Clothed'
    is slightly more formal and fitting for the elevated register of Revelation, while
    remaining readable.
- source_word: βύσσινον
  chosen: fine linen
  alternatives:
  - linen
  - a garment of fine linen
  lexicon: BDAG
  rationale: The adjective refers to costly linen fabric. 'Fine linen' captures both
    the material and its quality, matching Revelation's recurring imagery.
- source_word: λευκὸν καθαρόν
  chosen: white and clean
  alternatives:
  - white and pure
  - bright and clean
  lexicon: BDAG
  rationale: Both adjectives modify the linen. 'White and clean' is a transparent
    rendering that preserves the visual and purity connotations without over-interpreting
    καθαρόν as 'pure.'
