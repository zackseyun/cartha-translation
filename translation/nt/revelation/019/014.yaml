theological_decisions:
- issue: Identity and characterization of the heavenly armies
  chosen_reading: Render descriptively as 'the armies in heaven' without specifying
    whether they are angels, saints, or both.
  alternative_readings:
  - the armies of heaven
  - the heavenly armies, that is, angels
  - the heavenly armies, that is, glorified saints
  rationale: The Greek text identifies their location and appearance but does not
    explicitly define their identity in this verse. The translation preserves that
    textual restraint rather than importing an interpretive conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
