id: REV.19.21
reference: Revelation 19:21
source:
  edition: SBLGNT
  text: καὶ οἱ λοιποὶ ἀπεκτάνθησαν ἐν τῇ ῥομφαίᾳ τοῦ καθημένου ἐπὶ τοῦ ἵππου τῇ ἐξελθούσῃ
    ἐκ τοῦ στόματος αὐτοῦ, καὶ πάντα τὰ ὄρνεα ἐχορτάσθησαν ἐκ τῶν σαρκῶν αὐτῶν.
translation:
  text: And the rest were killed by the sword of the one seated on the horse, the
    sword that came out from his mouth, and all the birds were filled from their flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were slain.'
    reason: lexical_alternative
  - marker: b
    text: The 'sword' coming from his mouth is apocalyptic imagery; compare Rev 19:15.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ λοιποὶ
  chosen: the rest
  alternatives:
  - the remainder
  - the others
  lexicon: BDAG
  rationale: A natural collective rendering for the nominative plural referring to
    those remaining after the beast and false prophet are dealt with in the preceding
    context. 'The rest' is concise and idiomatic.
- source_word: ἀπεκτάνθησαν
  chosen: were killed
  alternatives:
  - were slain
  - were put to death
  lexicon: BDAG
  rationale: Aorist passive indicative of ἀποκτείνω. 'Were killed' is clear modern
    English; 'were slain' is more traditional but slightly archaic. The passive is
    preserved.
- source_word: ἐν τῇ ῥομφαίᾳ
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword; in Revelation it is a recurring image.
    'By the sword' best conveys instrumentality in idiomatic English while preserving
    the concrete image.
- source_word: τοῦ καθημένου ἐπὶ τοῦ ἵππου
  chosen: of the one seated on the horse
  alternatives:
  - of him who sat on the horse
  - of the rider on the horse
  lexicon: BDAG
  rationale: The participial construction is rendered transparently. 'The one seated
    on the horse' closely follows the Greek while remaining readable.
- source_word: τῇ ἐξελθούσῃ ἐκ τοῦ στόματος αὐτοῦ
  chosen: the sword that came out from his mouth
  alternatives:
  - which came out of his mouth
  - proceeding from his mouth
  lexicon: BDAG
  rationale: The attributive participle modifies 'sword' and is made explicit in English
    for clarity. 'Came out from his mouth' preserves the vivid apocalyptic imagery
    without over-paraphrase.
- source_word: πάντα τὰ ὄρνεα
  chosen: all the birds
  alternatives:
  - all the birds of prey
  lexicon: BDAG
  rationale: ὄρνεα means birds. Although the context implies carrion-eating birds,
    the Greek does not explicitly add 'of prey,' so the simpler rendering is preferred.
- source_word: ἐχορτάσθησαν
  chosen: were filled
  alternatives:
  - were gorged
  - were satisfied
  - had their fill
  lexicon: BDAG
  rationale: Passive of χορτάζω, 'to satisfy/feed fully.' 'Were filled' is a direct
    and sober rendering. 'Gorged' is interpretive and more vivid than the Greek itself
    requires; 'satisfied' is possible but less concrete in this grisly context.
- source_word: ἐκ τῶν σαρκῶν αὐτῶν
  chosen: from their flesh
  alternatives:
  - with their flesh
  - on their flesh
  lexicon: BDAG
  rationale: ἐκ naturally means 'from/out of.' σάρξ here is literal physical flesh,
    not metaphorical 'sinful nature,' in line with the doctrine's context-dependent
    guidance. 'From their flesh' preserves the preposition and the gruesome image.
