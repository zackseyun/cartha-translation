theological_decisions:
- issue: Nature of the sword from the rider's mouth
  chosen_reading: Retain the concrete apocalyptic image 'the sword ... that came out
    from his mouth' without interpreting it in the main text as a metaphor for his
    word.
  alternative_readings:
  - the sword, that is, his word/judgment
  rationale: The verse presents symbolic imagery already established in Revelation.
    The translation should preserve the image rather than resolve its symbolism in
    the text itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
