id: REV.19.16
reference: Revelation 19:16
source:
  edition: SBLGNT
  text: καὶ ἔχει ἐπὶ τὸ ἱμάτιον καὶ ἐπὶ τὸν μηρὸν αὐτοῦ ὄνομα γεγραμμένον· Βασιλεὺς
    βασιλέων καὶ κύριος κυρίων.
translation:
  text: 'And he has a name written on his robe and on his thigh: King of kings and
    Lord of lords.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a name inscribed.' The Greek says literally 'a name written.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχει
  chosen: has
  alternatives:
  - had
  - wears
  lexicon: BDAG
  rationale: Present indicative is best carried by simple present, preserving the
    vivid present of the vision. 'Wears' is interpretive and less directly tied to
    the object 'a name written.'
- source_word: ἐπὶ τὸ ἱμάτιον
  chosen: on his robe
  alternatives:
  - on the robe
  - upon his garment
  lexicon: BDAG
  rationale: ἱμάτιον denotes a garment or robe. In this apocalyptic royal-warrior
    context, 'robe' is more natural and specific than the broader 'garment.' 'His'
    is supplied in English from the possessive relation already implied by the surrounding
    syntax and parallel with 'his thigh.'
- source_word: ἐπὶ τὸν μηρὸν αὐτοῦ
  chosen: on his thigh
  alternatives:
  - upon his thigh
  lexicon: BDAG
  rationale: μηρός straightforwardly means 'thigh.' The phrase is retained literally
    rather than reinterpreted, since the Greek gives two locations associated with
    the written name.
- source_word: ὄνομα γεγραμμένον
  chosen: a name written
  alternatives:
  - a written name
  - a name inscribed
  lexicon: BDAG
  rationale: This preserves the Greek order and the perfect passive participle's stative
    sense without overtranslating. 'Inscribed' is possible but slightly more specific
    than the text requires.
- source_word: Βασιλεὺς βασιλέων
  chosen: King of kings
  lexicon: BDAG
  rationale: A standard and precise rendering of the superlative genitive construction,
    preserving the title's exalted force.
- source_word: κύριος κυρίων
  chosen: Lord of lords
  alternatives:
  - master of masters
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' The repeated genitive
    construction is preserved literally to match the Greek title and its theological
    resonance.
