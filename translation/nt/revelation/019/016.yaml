theological_decisions:
- issue: Whether to render the titular phrase in a more interpretive or traditional
    way
  chosen_reading: Retain the literal royal titles 'King of kings and Lord of lords'
    as the written name/title.
  alternative_readings:
  - Supreme King and Supreme Lord
  rationale: The Greek presents an explicit written name/title with elevated royal
    language. A literal rendering preserves both the wording and the christological
    force without paraphrastic expansion.
  doctrine_reference: Affirmations; Contested terms table for κύριος
- issue: How to handle the spatial phrase 'on his robe and on his thigh'
  chosen_reading: Translate both locations directly without harmonizing or explaining
    how the inscription is positioned.
  alternative_readings:
  - on his robe, that is, on the part covering his thigh
  - on his robe and sword-belt area
  rationale: The text itself gives two ἐπί phrases. The translation should preserve
    the imagery and not resolve interpretive questions the Greek leaves unexplained.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
