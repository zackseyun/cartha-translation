theological_decisions:
- issue: Rendering of apocalyptic spatial imagery
  chosen_reading: standing in the sun
  alternative_readings:
  - standing before the sun
  rationale: The verse presents a deliberately striking apocalyptic image. The translation
    preserves the literal wording rather than reducing the imagery to a safer interpretive
    paraphrase.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
