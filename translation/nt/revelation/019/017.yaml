id: REV.19.17
reference: Revelation 19:17
source:
  edition: SBLGNT
  text: Καὶ εἶδον ⸀ἕνα ἄγγελον ἑστῶτα ἐν τῷ ἡλίῳ, καὶ ⸀ἔκραξεν φωνῇ μεγάλῃ λέγων πᾶσι
    τοῖς ὀρνέοις τοῖς πετομένοις ἐν μεσουρανήματι· Δεῦτε συνάχθητε εἰς τὸ δεῖπνον
    τὸ μέγα τοῦ θεοῦ,
translation:
  text: And I saw one angel standing in the sun, and he cried out with a loud voice,
    saying to all the birds flying in midheaven, “Come, gather for the great supper
    of God,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “flying in midair” or “flying in the middle of the sky.” The Greek term
      is μεσουράνημα, a distinctive apocalyptic expression used in Revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνα ἄγγελον
  chosen: one angel
  alternatives:
  - an angel
  - a single angel
  lexicon: BDAG
  rationale: The numeral ἕνα is retained as 'one' to reflect the explicit Greek wording
    and the visionary specificity, rather than smoothing to the more idiomatic 'an
    angel.'
- source_word: ἑστῶτα ἐν τῷ ἡλίῳ
  chosen: standing in the sun
  alternatives:
  - standing on the sun
  - standing before the sun
  lexicon: BDAG
  rationale: ἐν with ἥλιος is rendered straightforwardly as 'in the sun.' Though vivid
    and apocalyptic, the translation should preserve the image rather than soften
    it interpretively.
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  chosen: cried out with a loud voice
  alternatives:
  - shouted with a loud voice
  - cried with a mighty voice
  lexicon: BDAG
  rationale: This preserves the force of κράζω and the instrumental/dative phrase
    φωνῇ μεγάλῃ in natural English. 'Cried out' is strong without sounding overly
    colloquial.
- source_word: πᾶσι τοῖς ὀρνέοις
  chosen: to all the birds
  alternatives:
  - to all the birds of prey
  - to every bird
  lexicon: BDAG
  rationale: ὄρνεον means 'bird' generally; the carrion-eating implication comes from
    context in the following verse, not from the noun itself, so 'birds' is preferred.
- source_word: τοῖς πετομένοις ἐν μεσουρανήματι
  chosen: flying in midheaven
  alternatives:
  - flying in midair
  - flying overhead
  - flying in the middle of the sky
  lexicon: BDAG
  rationale: μεσουράνημα in Revelation is a technical apocalyptic term for the zenith/midpoint
    of the sky. 'Midheaven' preserves the elevated imagery better than the flatter
    'midair.'
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: A direct imperative invitation/summons is best rendered simply as 'Come.'
- source_word: συνάχθητε
  chosen: gather
  alternatives:
  - assemble
  - be gathered together
  lexicon: BDAG
  rationale: The passive/deponent imperative is rendered idiomatically in English
    as 'gather.' 'Assemble' is possible, but 'gather' fits the scene and collocates
    naturally with the following phrase.
- source_word: εἰς τὸ δεῖπνον τὸ μέγα τοῦ θεοῦ
  chosen: for the great supper of God
  alternatives:
  - for the great banquet of God
  - for God's great supper
  lexicon: BDAG
  rationale: δεῖπνον commonly denotes the main meal/supper. 'Supper' preserves the
    lexical link with the contrasting marriage supper imagery in the context, while
    'of God' keeps the genitive structure explicit.
