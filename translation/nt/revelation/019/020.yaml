theological_decisions:
- issue: Referential pronouns for the beast
  chosen_reading: Use 'it/its' for the beast
  alternative_readings:
  - use 'him/his' to personalize the beast
  rationale: The Greek noun θηρίον is neuter, and the immediate pronouns here are
    naturally rendered with neuter English reference. This avoids importing a more
    personalized interpretation than the verse itself requires, while still allowing
    the figure's personal agency to emerge from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of final judgment imagery
  chosen_reading: Translate literally as 'the lake of fire that burns with sulfur'
  alternative_readings:
  - paraphrastic renderings emphasizing hell or eternal torment
  rationale: The verse presents apocalyptic judgment imagery in concrete terms. The
    translation should preserve the image without importing later doctrinal formulations
    not explicitly stated in this verse.
  doctrine_reference: Translation philosophy §1, §3
