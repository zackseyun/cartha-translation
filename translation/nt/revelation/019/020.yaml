id: REV.19.20
reference: Revelation 19:20
source:
  edition: SBLGNT
  text: καὶ ἐπιάσθη τὸ θηρίον καὶ ⸂μετ’ αὐτοῦ ὁ⸃ ψευδοπροφήτης ὁ ποιήσας τὰ σημεῖα
    ἐνώπιον αὐτοῦ, ἐν οἷς ἐπλάνησεν τοὺς λαβόντας τὸ χάραγμα τοῦ θηρίου καὶ τοὺς προσκυνοῦντας
    τῇ εἰκόνι αὐτοῦ· ζῶντες ἐβλήθησαν οἱ δύο εἰς τὴν λίμνην τοῦ πυρὸς ⸂τῆς καιομένης⸃
    ἐν θείῳ.
translation:
  text: And the beast was captured, and with it the false prophet who had performed
    the signs in its presence, by which he deceived those who had received the mark
    of the beast and those who worshiped its image. The two of them were thrown alive
    into the lake of fire that burns with sulfur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with him' / 'before him'; the Greek uses pronouns referring back to
      'the beast' (a grammatically neuter noun).
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''brimstone'' for ''sulfur.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιάσθη
  chosen: was captured
  alternatives:
  - was seized
  - was taken
  lexicon: BDAG
  rationale: Aorist passive of πιάζω denotes being apprehended or seized. 'Was captured'
    is natural modern English and preserves the passive event.
- source_word: θηρίον
  chosen: beast
  lexicon: BDAG
  rationale: Standard apocalyptic term in Revelation; 'beast' preserves the established
    imagery and the lexical sense.
- source_word: μετ’ αὐτοῦ
  chosen: with it
  alternatives:
  - with him
  lexicon: BDAG
  rationale: The antecedent is τὸ θηρίον, a neuter noun. English can refer to the
    beast as 'it' without loss; this also keeps the syntax clear.
- source_word: ψευδοπροφήτης
  chosen: false prophet
  lexicon: BDAG
  rationale: Direct and standard rendering of the compound noun; no need for paraphrase.
- source_word: ὁ ποιήσας τὰ σημεῖα
  chosen: who had performed the signs
  alternatives:
  - who did the signs
  - who worked the signs
  lexicon: BDAG
  rationale: The aorist participle is best rendered relative to the main past action
    as prior action ('had performed'). 'Signs' is preferred over 'miracles' because
    σημεῖα emphasizes sign-value rather than merely wondrous acts.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miracles
  - wonders
  lexicon: BDAG
  rationale: In Johannine and apocalyptic usage, σημεῖα commonly points to attesting
    signs. 'Signs' preserves the lexical and theological nuance.
- source_word: ἐνώπιον αὐτοῦ
  chosen: in its presence
  alternatives:
  - before it
  - in front of it
  lexicon: BDAG
  rationale: ἐνώπιον can mean 'before' or 'in the presence of.' 'In its presence'
    is idiomatic and fits the beast as antecedent.
- source_word: ἐν οἷς
  chosen: by which
  alternatives:
  - with which
  - in which
  lexicon: BDAG
  rationale: The relative phrase refers instrumentally to the signs as the means of
    deception. 'By which' communicates that instrumental force clearly.
- source_word: ἐπλάνησεν
  chosen: he deceived
  alternatives:
  - he led astray
  lexicon: BDAG
  rationale: πλανάω can mean deceive or lead astray. 'Deceived' is concise and natural
    here, while still conveying the false prophet's misleading activity.
- source_word: τοὺς λαβόντας
  chosen: those who had received
  alternatives:
  - those who received
  - those who took
  lexicon: BDAG
  rationale: The participle denotes those characterized by having received the mark
    prior to the deception/judgment scene. 'Had received' clarifies anteriority in
    English.
- source_word: χάραγμα
  chosen: mark
  alternatives:
  - stamp
  - brand
  lexicon: BDAG
  rationale: '''Mark'' is the conventional and accurate rendering in Revelation for
    the identifying inscription/imprint associated with the beast.'
- source_word: προσκυνοῦντας
  chosen: worshiped
  alternatives:
  - bowed down to
  lexicon: BDAG
  rationale: προσκυνέω in Revelation often carries cultic devotion, not merely physical
    prostration. 'Worshiped' best fits the context.
- source_word: εἰκών
  chosen: image
  alternatives:
  - idol
  - likeness
  lexicon: BDAG
  rationale: '''Image'' is the straightforward lexical equivalent and preserves the
    intertextual resonance within Revelation.'
- source_word: ζῶντες
  chosen: alive
  alternatives:
  - living
  lexicon: BDAG
  rationale: The participle is adverbial/predicative, indicating the condition in
    which they were thrown. 'Alive' is the most idiomatic English rendering.
- source_word: ἐβλήθησαν
  chosen: were thrown
  alternatives:
  - were cast
  lexicon: BDAG
  rationale: Passive of βάλλω here denotes forcible casting. 'Were thrown' is clear
    modern English; 'cast' is possible but more traditional/archaic.
- source_word: λίμνην τοῦ πυρός
  chosen: the lake of fire
  alternatives:
  - the fiery lake
  lexicon: BDAG
  rationale: This is the standard apocalyptic expression in Revelation and should
    be kept consistent.
- source_word: τῆς καιομένης
  chosen: that burns
  alternatives:
  - burning
  - that is burning
  lexicon: BDAG
  rationale: The present participle modifies 'lake' and describes its ongoing state.
    'That burns' is smooth and preserves the durative sense.
- source_word: ἐν θείῳ
  chosen: with sulfur
  alternatives:
  - with brimstone
  lexicon: BDAG
  rationale: θεῖον refers to sulfur. 'Sulfur' is modern and precise; 'brimstone' is
    traditional but archaic for many readers.
