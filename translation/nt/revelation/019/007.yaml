id: REV.19.7
reference: Revelation 19:7
source:
  edition: SBLGNT
  text: χαίρωμεν καὶ ⸀ἀγαλλιῶμεν, καὶ ⸀δώσομεν τὴν δόξαν αὐτῷ, ὅτι ἦλθεν ὁ γάμος τοῦ
    ἀρνίου, καὶ ἡ γυνὴ αὐτοῦ ἡτοίμασεν ἑαυτήν,
translation:
  text: Let us rejoice and exult, and let us give glory to him, because the marriage
    of the Lamb has come, and his bride has made herself ready.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his wife.' The Greek γυνή can mean 'woman,' 'wife,' or, in wedding
      context, 'bride.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'we will give glory to him.' The Greek form is future, though here it
      likely carries exhortative force in parallel with 'let us rejoice' and 'let
      us exult.'
    reason: alternative_reading
lexical_decisions:
- source_word: χαίρωμεν
  chosen: Let us rejoice
  alternatives:
  - we should rejoice
  - let us be glad
  lexicon: BDAG
  rationale: First person plural present subjunctive used hortatorily; 'Let us rejoice'
    captures the exhortational force in natural English.
- source_word: ἀγαλλιῶμεν
  chosen: exult
  alternatives:
  - be exceedingly glad
  - celebrate joyfully
  lexicon: BDAG
  rationale: Chosen to preserve the heightened, exuberant sense distinct from χαίρωμεν,
    avoiding flattening the paired verbs into mere repetition.
- source_word: δώσομεν τὴν δόξαν αὐτῷ
  chosen: let us give glory to him
  alternatives:
  - let us glorify him
  - we will give glory to him
  lexicon: BDAG
  rationale: Although the form is future indicative, in this liturgical-exhortative
    sequence it naturally functions alongside the preceding hortatory verbs. 'Let
    us give glory to him' preserves the parallelism and imperative-like force better
    than a simple predictive future.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and theologically weighty rendering for δόξα
    in doxological contexts.'
- source_word: ἦλθεν
  chosen: has come
  alternatives:
  - came
  - has arrived
  lexicon: BDAG
  rationale: Aorist rendered with English present perfect to convey the arrival as
    a completed event with present significance in the visionary proclamation.
- source_word: γάμος
  chosen: marriage
  alternatives:
  - wedding
  - marriage feast
  lexicon: BDAG
  rationale: γάμος can denote wedding, marriage, or wedding feast. 'Marriage' best
    fits the covenantal union in context without importing 'feast,' which is explicit
    in the next verse rather than here.
- source_word: ἀρνίου
  chosen: the Lamb
  lexicon: BDAG
  rationale: Standard Johannine christological title; translated, not transliterated,
    in keeping with title-translation policy.
- source_word: γυνὴ αὐτοῦ
  chosen: his bride
  alternatives:
  - his wife
  - the woman belonging to him
  lexicon: BDAG
  rationale: γυνή can mean woman, wife, or bride depending on context. In the setting
    of the Lamb's marriage, 'bride' is the most contextually precise and idiomatic
    English rendering.
- source_word: ἡτοίμασεν ἑαυτήν
  chosen: has made herself ready
  alternatives:
  - prepared herself
  - has prepared herself
  lexicon: BDAG
  rationale: This rendering is idiomatic and preserves the reflexive sense. 'Made
    herself ready' fits bridal preparation language in contemporary English while
    remaining close to the Greek.
