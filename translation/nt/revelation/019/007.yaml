theological_decisions:
- issue: Rendering γυνὴ αὐτοῦ in the marriage imagery
  chosen_reading: his bride
  alternative_readings:
  - his wife
  rationale: The verse uses eschatological wedding imagery for the people of God in
    relation to the Lamb. 'Bride' best reflects the nuptial setting and avoids suggesting
    merely a settled marital status where the scene emphasizes readiness for the marriage.
    The alternative 'wife' is lexically possible and worth preserving.
  doctrine_reference: Translation philosophy §§2, 3, 6
- issue: Force of δώσομεν within the exhortative sequence
  chosen_reading: let us give glory to him
  alternative_readings:
  - we will give glory to him
  rationale: The sequence χαίρωμεν ... ἀγαλλιῶμεν ... δώσομεν is best represented
    in English as a unified summons to praise. This is a grammatical/semantic decision
    rather than a doctrinal one, but it affects the tone of worship and should be
    documented.
  doctrine_reference: Translation philosophy §1, §6
