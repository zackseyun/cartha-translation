id: REV.19.11
reference: Revelation 19:11
source:
  edition: SBLGNT
  text: Καὶ εἶδον τὸν οὐρανὸν ἠνεῳγμένον, καὶ ἰδοὺ ἵππος λευκός, καὶ ὁ καθήμενος ἐπ’
    αὐτὸν ⸂πιστὸς καλούμενος⸃ καὶ ἀληθινός, καὶ ἐν δικαιοσύνῃ κρίνει καὶ πολεμεῖ.
translation:
  text: And I saw heaven opened, and behold, a white horse, and the one sitting on
    it is called Faithful and True, and in righteousness he judges and wages war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in justice he judges and wages war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνεῳγμένον
  chosen: opened
  alternatives:
  - having been opened
  - standing open
  lexicon: BDAG
  rationale: Perfect passive participle of ἀνοίγω describes heaven in an opened state.
    'Opened' is natural English and preserves the resultative sense without overloading
    the line.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the apocalyptic vividness and discourse force of ἰδού better
    than flatter modern options.
- source_word: ἵππος λευκός
  chosen: a white horse
  lexicon: BDAG
  rationale: Straightforward nominal phrase; indefinite in English is the most natural
    rendering here.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  chosen: the one sitting on it
  alternatives:
  - the rider on it
  - the one seated on it
  lexicon: BDAG
  rationale: Keeps close to the participial construction while remaining readable.
    'Rider' is possible but slightly more interpretive than the Greek wording.
- source_word: πιστὸς καλούμενος καὶ ἀληθινός
  chosen: is called Faithful and True
  alternatives:
  - called Faithful and True
  - being called Faithful and True
  lexicon: BDAG
  rationale: καλούμενος governs the naming expression, with πιστός and ἀληθινός functioning
    as titles. Capitalization reflects titular use for the exalted figure in context.
- source_word: πιστός
  chosen: Faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: In titular christological context, 'Faithful' best preserves both covenantal
    reliability and established semantic range.
- source_word: ἀληθινός
  chosen: 'True'
  alternatives:
  - genuine
  - real
  lexicon: BDAG
  rationale: '''True'' is the most natural title-pairing with ''Faithful'' and matches
    Johannine usage.'
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in justice
  lexicon: BDAG
  rationale: The prepositional phrase expresses the sphere or manner of his judging
    and waging war. Because δικαιοσύνη has a default rendering of 'righteousness'
    in the project guidelines, that is retained here; 'justice' is a viable contextual
    alternative and preserved in a footnote.
- source_word: κρίνει
  chosen: he judges
  alternatives:
  - he judges rightly
  lexicon: BDAG
  rationale: Simple present active; no adverb should be added beyond what ἐν δικαιοσύνῃ
    already supplies.
- source_word: πολεμεῖ
  chosen: wages war
  alternatives:
  - makes war
  - fights
  lexicon: BDAG
  rationale: '''Wages war'' is idiomatic modern English and preserves the military
    force of πολεμέω better than the less common ''makes war''.'
