theological_decisions:
- issue: Identification and presentation of the rider's titles
  chosen_reading: Render πιστός and ἀληθινός as the titles 'Faithful and True' for
    the rider on the white horse.
  alternative_readings:
  - 'Render as descriptive adjectives without capitalization: ''faithful and true'''
  rationale: In the immediate literary context of Revelation, these function as christological
    designations rather than merely incidental qualities. Capitalization signals title-like
    usage without adding content beyond the Greek.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Rendering δικαιοσύνη
  chosen_reading: Use 'righteousness' in the main text.
  alternative_readings:
  - justice
  rationale: The doctrine table gives δικαιοσύνη the default rendering 'righteousness,'
    while noting 'justice' as an alternative to preserve in footnotes where relevant.
    In this verse the term can denote righteous justice in judgment and warfare; the
    default is kept and the alternative footnoted to preserve the semantic tension.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
