theological_decisions:
- issue: Reference of the exclusive knowledge clause
  chosen_reading: The clause refers to the rider himself uniquely knowing the written
    name.
  alternative_readings:
  - The emphasis could be read more broadly as stressing the incomprehensibility of
    the name rather than the rider's self-knowledge per se.
  rationale: The Greek explicitly states 'no one knows except himself.' The translation
    preserves the exclusivity without expanding its theological implications beyond
    the text. In context this contributes to the mystery and majesty of the rider,
    traditionally understood as the exalted Messiah, but the wording itself is left
    intact and not doctrinally amplified.
  doctrine_reference: Preserve theological tension rather than resolve it.
