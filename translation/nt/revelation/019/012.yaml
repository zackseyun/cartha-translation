id: REV.19.12
reference: Revelation 19:12
source:
  edition: SBLGNT
  text: οἱ δὲ ὀφθαλμοὶ ⸀αὐτοῦ φλὸξ πυρός, καὶ ἐπὶ τὴν κεφαλὴν αὐτοῦ διαδήματα πολλά,
    ⸀ἔχων ὄνομα γεγραμμένον ὃ οὐδεὶς οἶδεν εἰ μὴ αὐτός,
translation:
  text: His eyes were a flame of fire, and on his head were many crowns, and he had
    a name written that no one knows except himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many diadems.' The Greek term refers specifically to royal crowns.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... ὀφθαλμοὶ αὐτοῦ
  chosen: His eyes
  alternatives:
  - the eyes of him
  lexicon: BDAG
  rationale: Standard possessive rendering of the articular noun with genitive pronoun;
    natural English preserves the vivid description without unnecessary literalism.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective/continuative particle. English
    does not require an explicit equivalent in this descriptive sequence, so it is
    left untranslated for natural flow.
- source_word: φλὸξ πυρός
  chosen: a flame of fire
  alternatives:
  - like a fiery flame
  - a fiery flame
  lexicon: BDAG
  rationale: The Greek is nominal rather than explicitly comparative in this clause,
    so 'a flame of fire' best reflects the wording while remaining idiomatic. It also
    preserves the intertextual resonance with earlier Johannine/Apocalyptic descriptions.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: BDAG
  rationale: Straightforward spatial sense of ἐπί with the accusative in context;
    'on' is clear modern English.
- source_word: διαδήματα πολλά
  chosen: many crowns
  alternatives:
  - many diadems
  lexicon: BDAG
  rationale: διάδημα refers specifically to a royal crown/diadem. 'Crowns' is more
    accessible modern English, while the royal nuance is retained by context. The
    more technical 'diadems' is preserved in a footnote as a lexical alternative.
- source_word: ἔχων
  chosen: he had
  alternatives:
  - having
  lexicon: BDAG
  rationale: The present participle agrees with the rider and continues the descriptive
    portrayal. Finite English 'he had' is smoother and idiomatic in a coordinate descriptive
    sequence.
- source_word: ὄνομα γεγραμμένον
  chosen: a name written
  alternatives:
  - a written name
  - a name inscribed
  lexicon: BDAG
  rationale: This preserves the passive perfect participle's resultative sense while
    staying close to the Greek wording. 'Inscribed' is possible but slightly more
    interpretive.
- source_word: ὃ οὐδεὶς οἶδεν
  chosen: that no one knows
  alternatives:
  - which no one has known
  lexicon: BDAG
  rationale: Natural English rendering of the relative clause. The perfect-form οἶδεν
    is commonly translated with present force ('knows').
- source_word: εἰ μὴ αὐτός
  chosen: except himself
  alternatives:
  - except he himself
  - except him alone
  lexicon: BDAG
  rationale: Idiomatic rendering of the exception clause. 'Himself' preserves the
    emphatic exclusivity without awkwardness.
