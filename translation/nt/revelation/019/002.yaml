id: REV.19.2
reference: Revelation 19:2
source:
  edition: SBLGNT
  text: ὅτι ἀληθιναὶ καὶ δίκαιαι αἱ κρίσεις αὐτοῦ· ὅτι ἔκρινεν τὴν πόρνην τὴν μεγάλην
    ἥτις ⸀ἔφθειρεν τὴν γῆν ἐν τῇ πορνείᾳ αὐτῆς, καὶ ἐξεδίκησεν τὸ αἷμα τῶν δούλων
    αὐτοῦ ἐκ χειρὸς αὐτῆς.
translation:
  text: because his judgments are true and just; because he has judged the great prostitute
    who corrupted the earth with her sexual immorality, and he has avenged the blood
    of his slaves from her hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood of his servants.' The Greek word is doulos, which can mean
      either 'servant' or 'slave'; 'slave' is used here to preserve the stronger sense
      of belonging to a master.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀληθιναὶ
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: Predicate adjective modifying κρίσεις; 'true' is the most natural and
    established English equivalent here, conveying that God's judgments accord with
    reality and are not false.
- source_word: δίκαιαι
  chosen: just
  alternatives:
  - righteous
  - fair
  lexicon: BDAG
  rationale: In collocation with κρίσεις, 'just' is more idiomatic in English than
    'righteous judgments' while preserving the judicial sense of moral rightness.
- source_word: κρίσεις
  chosen: judgments
  alternatives:
  - judicial decisions
  - acts of judgment
  lexicon: BDAG
  rationale: Plural noun in a judicial context; 'judgments' preserves both the formal
    and eschatological sense without overexpansion.
- source_word: ἔκρινεν
  chosen: has judged
  alternatives:
  - judged
  - has condemned
  lexicon: BDAG
  rationale: Aorist rendered with English present perfect to fit the praise context
    and the sequence of completed divine acts just announced. 'Judged' is broader
    and closer to κρίνω than 'condemned,' though condemnation is implied by context.
- source_word: πόρνην τὴν μεγάλην
  chosen: the great prostitute
  alternatives:
  - the great harlot
  - the great whore
  lexicon: BDAG
  rationale: πόρνη literally denotes a prostitute. 'Prostitute' is accurate modern
    English and avoids archaic ('harlot') or overly coarse ('whore') diction while
    retaining the metaphor's force.
- source_word: ἔφθειρεν
  chosen: corrupted
  alternatives:
  - destroyed
  - ruined
  - depraved
  lexicon: BDAG
  rationale: φθείρω can mean destroy/corrupt. Here, with 'the earth' and the means
    phrase 'with her sexual immorality,' 'corrupted' best captures moral-spiritual
    defilement rather than physical destruction alone.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  - the world
  lexicon: BDAG
  rationale: In Revelation's cosmic scope, 'earth' is the default and most likely
    sense. 'Land' would sound too localized.
- source_word: πορνείᾳ
  chosen: sexual immorality
  alternatives:
  - fornication
  - prostitution
  lexicon: BDAG
  rationale: Standard accessible rendering of πορνεία. In Revelation the term also
    carries metaphorical force for idolatrous unfaithfulness, but the main text keeps
    the lexical value while the broader symbolism is left to interpretation.
- source_word: ἐξεδίκησεν
  chosen: has avenged
  alternatives:
  - has exacted vengeance for
  - has given justice for
  - has vindicated
  lexicon: BDAG
  rationale: The verb denotes carrying out justice/vengeance on behalf of another.
    'Has avenged' is concise and fits the judicial-praise context.
- source_word: τὸ αἷμα τῶν δούλων αὐτοῦ
  chosen: the blood of his slaves
  alternatives:
  - the blood of his servants
  - the blood of his bond-servants
  lexicon: BDAG
  rationale: δοῦλος is a contested term in the project. Here the bonded identity of
    those belonging to God is theologically salient, so 'slaves' follows the stated
    philosophy better than the softer 'servants.'
- source_word: ἐκ χειρὸς αὐτῆς
  chosen: from her hand
  alternatives:
  - at her hand
  - out of her hand
  lexicon: BDAG
  rationale: A literal idiom meaning from her agency/power. 'From her hand' preserves
    the biblical idiom in readable English.
