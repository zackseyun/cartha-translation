theological_decisions:
- issue: Rendering of δοῦλοι in relation to God's people
  chosen_reading: his slaves
  alternative_readings:
  - his servants
  - his bond-servants
  rationale: Per project philosophy, δοῦλος should be rendered 'slave' where bonded
    belonging is theologically salient. In this apocalyptic context, the martyrs are
    portrayed as those wholly belonging to God, so 'slaves' best preserves the force
    of the Greek while an alternative is preserved in a footnote for readers sensitive
    to English connotations.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    for δοῦλος'
