theological_decisions:
- issue: Rendering δοῦλοι in a worship context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The doctrine file allows 'servant / slave' context-dependently and prefers
    'slave' where bonded nature is salient. Here the heavenly worshipers are identified
    by belonging to God; 'slaves' preserves that stronger ownership/allegiance dimension,
    while a footnote preserves the more traditional alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Meaning of fearing God
  chosen_reading: those who fear him
  alternative_readings:
  - those who revere him
  rationale: The phrase should retain the biblical tension of reverent fear rather
    than be softened in the main text. 'Revere' is a valid interpretive gloss but
    narrows the semantic range, so it is preserved in a footnote instead of replacing
    the idiom.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §6'
