id: REV.19.5
reference: Revelation 19:5
source:
  edition: SBLGNT
  text: Καὶ φωνὴ ἀπὸ τοῦ θρόνου ἐξῆλθεν λέγουσα· Αἰνεῖτε ⸂τῷ θεῷ⸃ ἡμῶν, πάντες οἱ
    δοῦλοι αὐτοῦ, ⸀καὶ οἱ φοβούμενοι αὐτόν, οἱ μικροὶ καὶ οἱ μεγάλοι.
translation:
  text: And a voice came from the throne, saying, “Praise our God, all his slaves,
    and those who fear him, the small and the great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all his servants” or “all his bondservants.” The Greek word is δοῦλοι,
      which can denote servants or slaves depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “those who revere him.” The expression “fear him” is a biblical idiom
      for reverent awe and allegiance toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - a sound
  lexicon: BDAG
  rationale: φωνή commonly denotes a voice or sound; in this context, because it is
    followed by λέγουσα ('saying'), 'voice' is the natural English rendering.
- source_word: ἀπὸ τοῦ θρόνου
  chosen: from the throne
  alternatives:
  - out of the throne
  lexicon: BDAG
  rationale: The preposition ἀπό normally indicates source/origin. 'From the throne'
    is idiomatic English and preserves the imagery of the heavenly throne as the source
    of the proclamation.
- source_word: ἐξῆλθεν
  chosen: came
  alternatives:
  - went out
  - came out
  lexicon: BDAG
  rationale: ἐξέρχομαι literally means 'go out/come out.' In English, with 'from the
    throne,' 'came' is the most natural concise rendering while still conveying emergence
    from that source.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - which said
  lexicon: BDAG
  rationale: The present participle introduces the content of the voice. 'Saying'
    is the standard and clear way to represent the participial construction.
- source_word: Αἰνεῖτε
  chosen: Praise
  alternatives:
  - Keep praising
  - Give praise to
  lexicon: BDAG
  rationale: The present active imperative plural calls for praise addressed to a
    group. 'Praise' is direct and idiomatic; the iterative nuance of the present imperative
    need not be made explicit in English here.
- source_word: τῷ θεῷ ἡμῶν
  chosen: our God
  alternatives:
  - to our God
  lexicon: BDAG
  rationale: The dative after αἰνέω marks the object of praise. English idiom normally
    omits the preposition after 'praise,' so 'Praise our God' best reflects natural
    usage without loss of meaning.
- source_word: πάντες οἱ δοῦλοι αὐτοῦ
  chosen: all his slaves
  alternatives:
  - all his servants
  - all his bondservants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where bonded
    status is theologically salient. In Revelation, the term denotes those wholly
    belonging to God in covenantal allegiance and worship; 'slaves' preserves that
    stronger ownership sense better than 'servants.'
- source_word: οἱ φοβούμενοι αὐτόν
  chosen: those who fear him
  alternatives:
  - those who revere him
  - those who worship him
  lexicon: BDAG
  rationale: φοβέομαι in relation to God often carries the sense of reverent fear.
    'Those who fear him' preserves the biblical idiom and theological weight without
    reducing it to mere emotion or flattening it into 'worship.'
- source_word: οἱ μικροὶ καὶ οἱ μεγάλοι
  chosen: the small and the great
  alternatives:
  - small and great
  - the least and the greatest
  lexicon: BDAG
  rationale: The paired substantival adjectives denote people of low and high status.
    'The small and the great' closely follows the Greek form and preserves the social
    breadth of the summons.
- source_word: καὶ οἱ φοβούμενοι αὐτόν, οἱ μικροὶ καὶ οἱ μεγάλοι
  chosen: and those who fear him, the small and the great
  alternatives:
  - even those who fear him, small and great
  lexicon: BDAG
  rationale: The syntax can be read appositionally, with 'those who fear him' further
    specified as 'the small and the great.' This rendering preserves the Greek sequence
    and keeps both groups united in the call to praise.
