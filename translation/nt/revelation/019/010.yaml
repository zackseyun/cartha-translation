id: REV.19.10
reference: Revelation 19:10
source:
  edition: SBLGNT
  text: καὶ ἔπεσα ἔμπροσθεν τῶν ποδῶν αὐτοῦ προσκυνῆσαι αὐτῷ. καὶ λέγει μοι· Ὅρα μή·
    σύνδουλός σού εἰμι καὶ τῶν ἀδελφῶν σου τῶν ἐχόντων τὴν μαρτυρίαν Ἰησοῦ· τῷ θεῷ
    προσκύνησον· ἡ γὰρ ⸀μαρτυρία Ἰησοῦ ἐστιν τὸ πνεῦμα τῆς προφητείας.
translation:
  text: And I fell before his feet to worship him. But he says to me, “See that you
    do not! I am a fellow slave with you and with your brothers who hold the testimony
    of Jesus. Worship God, for the testimony of Jesus is the spirit of prophecy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who have the testimony of Jesus.' The phrase 'the testimony of Jesus'
      may mean 'the testimony about Jesus' or 'Jesus’ own testimony.' The same ambiguity
      applies in the final clause.
    reason: alternative_reading
  - marker: b
    text: Or 'your brothers and sisters,' with 'brothers' functioning representatively
      for fellow believers.
    reason: lexical_alternative
  - marker: c
    text: Or 'I am a fellow servant with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσα ἔμπροσθεν τῶν ποδῶν αὐτοῦ
  chosen: I fell before his feet
  alternatives:
  - I fell at his feet
  lexicon: BDAG
  rationale: A natural rendering of the idiom that preserves the physical posture
    and the preposition ἔμπροσθεν ('before/in front of'). 'At his feet' is idiomatic
    English but slightly less explicit than the Greek.
- source_word: προσκυνῆσαι αὐτῷ / προσκύνησον
  chosen: to worship him / Worship God
  alternatives:
  - to bow down before him / Bow down before God
  lexicon: BDAG
  rationale: In this context the act is explicitly refused by the angel and redirected
    to God, so 'worship' best captures the religious force of προσκυνέω. 'Bow down'
    is lexically possible but too weak for the theological contrast in the verse.
- source_word: Ὅρα μή
  chosen: See that you do not!
  alternatives:
  - Do not do that!
  - Be careful—do not!
  lexicon: BDAG
  rationale: This imperative plus μή is an abrupt prohibition. 'See that you do not!'
    preserves the vividness and compactness of the Greek better than a smoother paraphrase.
- source_word: σύνδουλός
  chosen: fellow slave
  alternatives:
  - fellow servant
  lexicon: BDAG
  rationale: The noun denotes one who shares slave-status with another. Per translation
    philosophy, 'slave' is preferred where the bonded relation is salient; here the
    angel emphasizes shared subordination under God, not mere service.
- source_word: ἀδελφῶν σου
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your fellow believers
  lexicon: BDAG
  rationale: The Greek is masculine plural and should be rendered gender-accurately.
    In context it likely refers representatively to fellow believers, but the source
    wording is 'brothers,' so that is retained.
- source_word: τῶν ἐχόντων τὴν μαρτυρίαν Ἰησοῦ
  chosen: who hold the testimony of Jesus
  alternatives:
  - who have the testimony of Jesus
  - who bear witness to Jesus
  lexicon: BDAG
  rationale: ἔχω here is straightforwardly 'have/hold.' 'Hold' gives a slightly more
    active, faithful sense in idiomatic English without overtranslating. The genitive
    Ἰησοῦ is ambiguous, so a more literal rendering is kept in the main text.
- source_word: μαρτυρία Ἰησοῦ
  chosen: the testimony of Jesus
  alternatives:
  - the testimony about Jesus
  - Jesus' testimony
  lexicon: BDAG
  rationale: The genitive can be objective ('testimony about Jesus') or subjective
    ('Jesus' own testimony'). To preserve theological tension rather than resolve
    it, the more literal 'of Jesus' is retained in both occurrences, with alternatives
    preserved in a footnote.
- source_word: πνεῦμα τῆς προφητείας
  chosen: the spirit of prophecy
  alternatives:
  - the essence of prophecy
  lexicon: BDAG
  rationale: A formal rendering is preferable because πνεῦμα is theologically loaded
    and should not be flattened to 'essence' in the main text. The phrase is preserved
    as traditionally and lexically defensible English.
