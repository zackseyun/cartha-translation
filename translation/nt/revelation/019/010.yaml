theological_decisions:
- issue: Meaning of the genitive in 'the testimony of Jesus'
  chosen_reading: Retain the ambiguous rendering 'the testimony of Jesus' in the main
    text
  alternative_readings:
  - the testimony about Jesus
  - Jesus' own testimony
  rationale: 'The Greek genitive Ἰησοῦ is genuinely ambiguous, and the doctrine requires
    preserving theological tension rather than resolving it where the source does
    not force a choice. A literal rendering keeps both possibilities available: believers
    may hold testimony about Jesus, and/or this may refer to testimony that comes
    from Jesus. The alternatives are preserved in a footnote.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Rendering σύνδουλος
  chosen_reading: fellow slave
  alternative_readings:
  - fellow servant
  rationale: The verse stresses that the angel is not a proper object of worship but
    stands under God alongside John and the other believers. The bonded, subordinate
    sense of δοῦλος is therefore salient, so 'slave' is preferred in line with the
    stated philosophy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1; Contested terms table
    for δοῦλος'
