theological_decisions:
- issue: Rendering κεκλημένοι in an eschatological salvation-feast context
  chosen_reading: invited
  alternative_readings:
  - called
  rationale: The Greek participle from καλέω can be rendered more literally as 'called,'
    but in the context of a meal invitation, 'invited' better conveys the idiomatic
    force in contemporary English without making a doctrinal claim about effectual
    calling. The alternative is preserved in a footnote to maintain auditability and
    theological tension where readers may hear broader calling language.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering γάμου in the phrase δεῖπνον τοῦ γάμου
  chosen_reading: wedding supper
  alternative_readings:
  - marriage supper
  rationale: Both are possible, and 'marriage supper of the Lamb' is traditional.
    'Wedding supper' better reflects idiomatic modern English while still conveying
    the nuptial imagery. The traditional alternative is preserved in a footnote because
    of its familiarity in English-speaking Christian tradition.
  doctrine_reference: Translation philosophy §1, §6
