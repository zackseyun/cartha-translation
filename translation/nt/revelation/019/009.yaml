id: REV.19.9
reference: Revelation 19:9
source:
  edition: SBLGNT
  text: Καὶ λέγει μοι· Γράψον· Μακάριοι οἱ εἰς τὸ δεῖπνον τοῦ γάμου τοῦ ἀρνίου κεκλημένοι.
    καὶ λέγει μοι· Οὗτοι οἱ λόγοι ἀληθινοὶ τοῦ θεοῦ εἰσιν.
translation:
  text: 'And he says to me, “Write: Blessed are those who have been invited to the
    wedding supper of the Lamb.” And he says to me, “These are the true words of God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “called to the marriage supper of the Lamb.”
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: “the marriage supper of the Lamb.”'
    reason: alternative_reading
  - marker: c
    text: Or “trustworthy”; the phrase affirms that this message truly comes from
      God and can be relied on.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γράψον
  chosen: Write
  alternatives:
  - Write this
  lexicon: BDAG
  rationale: Aorist imperative singular of γράφω; the simple imperative 'Write' is
    direct and natural, matching the Greek without adding content.
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude language in Revelation and the wider NT. 'Blessed'
    preserves the solemn, theological sense better than the more subjective 'happy'.
- source_word: οἱ εἰς τὸ δεῖπνον ... κεκλημένοι
  chosen: those who have been invited to ... supper
  alternatives:
  - those called to ... supper
  - those invited to ... banquet
  lexicon: BDAG
  rationale: The perfect passive participle κεκλημένοι denotes persons who stand in
    the state of having been invited/called. In this banquet context, 'invited' communicates
    the idiomatic sense more clearly in modern English than the more literal 'called,'
    while preserving the passive idea.
- source_word: δεῖπνον
  chosen: supper
  alternatives:
  - banquet
  - feast
  - dinner
  lexicon: BDAG
  rationale: δεῖπνον denotes the main meal, often an evening meal. In the fixed expression
    here, 'wedding supper' is both natural English and close to the Greek. 'Banquet'
    is possible but slightly more interpretive.
- source_word: γάμου
  chosen: wedding
  alternatives:
  - marriage
  lexicon: BDAG
  rationale: γάμος can denote marriage or wedding feast. Because it modifies δεῖπνον,
    'wedding' best fits the immediate image of a celebratory meal.
- source_word: τοῦ ἀρνίου
  chosen: of the Lamb
  lexicon: BDAG
  rationale: ἀρνίον is a key christological title in Revelation. 'Lamb' preserves
    the established symbolic title and its sacrificial/messianic resonance.
- source_word: Οὗτοι οἱ λόγοι
  chosen: These are the words
  alternatives:
  - These words are
  lexicon: BDAG
  rationale: 'The demonstrative plus noun is naturally rendered as an English clause
    with supplied copula order: ''These are the words...''.'
- source_word: ἀληθινοὶ
  chosen: 'true'
  alternatives:
  - genuine
  - trustworthy
  lexicon: BDAG
  rationale: ἀληθινός here affirms the reliability and truthfulness of the message.
    'True' is the most direct rendering; 'trustworthy' is interpretive and can be
    preserved as a lexical alternative.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most straightforwardly rendered 'of God.' While context
    may imply divine source, 'from God' is more interpretive than the Greek requires.
