theological_decisions:
- issue: Rendering of Ἁλληλουϊά, a Hebrew liturgical acclamation embedded in Greek
  chosen_reading: Hallelujah
  alternative_readings:
  - Praise the LORD
  - Praise Yah
  rationale: The term functions here as a fixed worship acclamation rather than ordinary
    propositional speech. Transliteration preserves its liturgical character and matches
    common English recognition, while the underlying meaning is worth preserving in
    a footnote. This does not conflict with the default treatment of YHWH because
    the divine name is embedded within an established exclamation rather than appearing
    independently in the Greek text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; YHWH default
    ''the LORD'''
