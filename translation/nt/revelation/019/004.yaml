id: REV.19.4
reference: Revelation 19:4
source:
  edition: SBLGNT
  text: καὶ ἔπεσαν οἱ πρεσβύτεροι οἱ εἴκοσι τέσσαρες καὶ τὰ τέσσαρα ζῷα, καὶ προσεκύνησαν
    τῷ θεῷ τῷ καθημένῳ ἐπὶ ⸂τῷ θρόνῳ⸃ λέγοντες· Ἀμήν, Ἁλληλουϊά.
translation:
  text: And the twenty-four elders and the four living creatures fell down and worshiped
    God, the one seated on the throne, saying, “Amen! Hallelujah!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Praise the LORD!” (Hebrew liturgical acclamation; alternatively, “Praise
      Yah!”).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσαν
  chosen: fell down
  alternatives:
  - fell
  lexicon: BDAG
  rationale: Aorist of πίπτω here describes a prostrating movement in worship. 'Fell
    down' makes the reverential action explicit in natural English and fits the worship
    context better than the bare 'fell'.
- source_word: πρεσβύτεροι οἱ εἴκοσι τέσσαρες
  chosen: the twenty-four elders
  alternatives:
  - the twenty-four presbyters
  lexicon: BDAG
  rationale: πρεσβύτεροι is the standard term 'elders' in Revelation. 'Presbyters'
    is more technical and less readable; 'elders' preserves both lexical sense and
    established apocalyptic usage.
- source_word: τὰ τέσσαρα ζῷα
  chosen: the four living creatures
  alternatives:
  - the four creatures
  - the four living beings
  lexicon: BDAG
  rationale: In Revelation, ζῷα are not merely generic animals but exalted throne-room
    beings. 'Living creatures' is the clearest established rendering that distinguishes
    them from ordinary animals while staying close to the Greek.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down before
  - paid homage to
  lexicon: BDAG
  rationale: Given the explicit object 'God,' the verb denotes worship rather than
    mere obeisance. 'Worshiped' is the most direct and natural rendering in this context.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - to God
  lexicon: BDAG
  rationale: English idiom after 'worshiped' normally takes a direct object without
    repeating the preposition. The dative is naturally represented by the English
    syntax.
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  chosen: the one seated on the throne
  alternatives:
  - who sits on the throne
  - the one sitting on the throne
  lexicon: BDAG
  rationale: The participial phrase functions substantivally to identify God. 'The
    one seated on the throne' is idiomatic, preserves the present participial force,
    and matches Revelation's repeated throne-room formula.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle is well represented by 'saying,' linking their
    worship with the acclamation that follows.
- source_word: Ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: BDAG
  rationale: As a liturgical acclamation, Ἀμήν is best preserved by transliteration
    in English Bible style rather than translated.
- source_word: Ἁλληλουϊά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Praise the LORD
  lexicon: BDAG
  rationale: This is a transliterated Hebrew liturgical cry already naturalized in
    English. Retaining 'Hallelujah' preserves the form and worshipful force of the
    Greek text; a more explicit translation can be noted in a footnote.
