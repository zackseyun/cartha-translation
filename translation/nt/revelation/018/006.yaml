id: REV.18.6
reference: Revelation 18:6
source:
  edition: SBLGNT
  text: ἀπόδοτε αὐτῇ ὡς καὶ αὐτὴ ἀπέδωκεν, καὶ ⸀διπλώσατε ⸀τὰ διπλᾶ κατὰ τὰ ἔργα αὐτῆς·
    ἐν τῷ ποτηρίῳ ᾧ ἐκέρασεν κεράσατε αὐτῇ διπλοῦν·
translation:
  text: Pay her back as she herself has paid back, and repay her double according
    to her works; in the cup that she mixed, mix a double portion for her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'double the double things for her'; the Greek expression is rhetorically
      forceful and compressed, and may emphasize intensified repayment.
    reason: lexical_alternative
  - marker: b
    text: That is, the cup she prepared by mixing; the image likely evokes a prepared
      drink of judgment.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπόδοτε
  chosen: Pay her back
  alternatives:
  - Repay her
  - Give back to her
  lexicon: BDAG
  rationale: Aorist imperative of ἀποδίδωμι calls for retributive repayment. 'Pay
    her back' is idiomatic modern English and preserves the judicial/recompense sense
    better than a flatter 'give back.'
- source_word: ὡς καὶ αὐτὴ ἀπέδωκεν
  chosen: as she herself has paid back
  alternatives:
  - as she also repaid
  - just as she has done
  lexicon: BDAG
  rationale: The clause grounds the command in Babylon's own prior actions. 'She herself'
    reflects the emphatic αὐτή. English present perfect ('has paid back') conveys
    prior completed action with present relevance naturally.
- source_word: διπλώσατε τὰ διπλᾶ
  chosen: repay her double
  alternatives:
  - double the double things for her
  - double it double
  lexicon: BDAG
  rationale: The Greek is rhetorically intensive and somewhat idiomatic. A highly
    literal rendering would be awkward in English. 'Repay her double' captures the
    force of doubled retribution while remaining readable. The explicit object is
    supplied from context and clarified by the following phrase.
- source_word: κατὰ τὰ ἔργα αὐτῆς
  chosen: according to her works
  alternatives:
  - according to what she has done
  - in proportion to her deeds
  lexicon: BDAG
  rationale: ἔργα is literally 'works/deeds.' 'Works' preserves the lexical form and
    the judicial tone of measured recompense; it remains understandable in context.
- source_word: ποτηρίῳ
  chosen: cup
  alternatives:
  - goblet
  lexicon: BDAG
  rationale: Standard rendering for ποτήριον; also preserves the symbolic imagery
    common in Revelation and the prophets.
- source_word: ἐκέρασεν
  chosen: she mixed
  alternatives:
  - she prepared
  - she poured
  lexicon: BDAG
  rationale: κεράννυμι commonly means 'mix' or 'prepare by mixing,' especially of
    wine. 'Mixed' preserves the image of preparing a drink, likely with intoxicating/judgment
    connotations.
- source_word: κεράσατε αὐτῇ διπλοῦν
  chosen: mix a double portion for her
  alternatives:
  - mix double for her
  - prepare for her a double measure
  lexicon: BDAG
  rationale: The imperative repeats the cup imagery and specifies doubled recompense.
    'Double portion' makes the accusative διπλοῦν idiomatic in English while preserving
    the sense of a doubled measure in the cup.
