theological_decisions:
- issue: Nature of the command for doubled repayment
  chosen_reading: Render as symbolic/judicial recompense without softening the severity
    or importing a literal legal formula.
  alternative_readings:
  - Treat 'double' as a strictly literal quantitative penalty
  - Paraphrase as a general statement of justice without the doubled imagery
  rationale: In apocalyptic judgment language, the verse depicts proportionate and
    intensified recompense against Babylon. The translation preserves the imagery
    of doubled repayment and the cup of judgment without resolving whether the doubling
    is mathematically literal or rhetorically emphatic.
  doctrine_reference: Translation philosophy §§1, 3, 6
