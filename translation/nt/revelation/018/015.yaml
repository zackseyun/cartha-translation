id: REV.18.15
reference: Revelation 18:15
source:
  edition: SBLGNT
  text: οἱ ἔμποροι τούτων, οἱ πλουτήσαντες ἀπ’ αὐτῆς, ἀπὸ μακρόθεν στήσονται διὰ τὸν
    φόβον τοῦ βασανισμοῦ αὐτῆς κλαίοντες καὶ πενθοῦντες,
translation:
  text: The merchants of these things, who became rich from her, will stand far off
    because of the fear of her torment, weeping and mourning,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of these goods' or 'of these wares'; the phrase points back to the luxury
      items listed in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμποροι
  chosen: merchants
  alternatives:
  - traders
  lexicon: BDAG
  rationale: ἔμποροι refers to those engaged in commerce. 'Merchants' is the most
    natural and established English equivalent in this economic-judgment context,
    slightly more specific than 'traders.'
- source_word: τούτων
  chosen: of these things
  alternatives:
  - of these goods
  - of these wares
  lexicon: BDAG
  rationale: The genitive demonstrative points back to the luxury items listed in
    the surrounding context. 'Of these things' is formally close and preserves the
    backward reference without over-specifying beyond the pronoun itself.
- source_word: πλουτήσαντες
  chosen: who became rich
  alternatives:
  - who grew rich
  - who were enriched
  lexicon: BDAG
  rationale: The aorist participle denotes the merchants' prior enrichment through
    Babylon. 'Became rich' is idiomatic and clear; 'were enriched' could imply a passive
    nuance less explicit here.
- source_word: ἀπ’ αὐτῆς
  chosen: from her
  alternatives:
  - by her
  - off her
  lexicon: BDAG
  rationale: ἀπό marks source. 'From her' best conveys that Babylon was the source
    of their wealth.
- source_word: ἀπὸ μακρόθεν
  chosen: far off
  alternatives:
  - at a distance
  - from far away
  lexicon: BDAG
  rationale: This idiom regularly conveys spatial distance maintained intentionally.
    'Far off' is concise and idiomatic in English and fits the scene of fearful observation.
- source_word: στήσονται
  chosen: will stand
  alternatives:
  - will stand still
  - will take their stand
  lexicon: BDAG
  rationale: Future middle of ἵστημι here means to stand or station oneself. 'Will
    stand' is the straightforward rendering; the middle nuance does not require separate
    expression in English.
- source_word: διὰ τὸν φόβον
  chosen: because of the fear
  alternatives:
  - for fear of
  - because they fear
  lexicon: BDAG
  rationale: διά with the accusative expresses reason. 'Because of the fear' stays
    close to the Greek structure while remaining natural English.
- source_word: βασανισμοῦ
  chosen: torment
  alternatives:
  - torture
  - punishment
  lexicon: BDAG
  rationale: In Revelation, βασανισμός commonly denotes severe torment associated
    with divine judgment. 'Torment' preserves the intensity without importing the
    narrower modern connotations of 'torture.'
- source_word: κλαίοντες
  chosen: weeping
  alternatives:
  - crying
  - lamenting
  lexicon: BDAG
  rationale: The participle denotes audible crying or weeping. 'Weeping' fits the
    solemn register and pairs well with the following participle.
- source_word: πενθοῦντες
  chosen: mourning
  alternatives:
  - grieving
  - lamenting
  lexicon: BDAG
  rationale: πενθέω emphasizes mourning or lament over loss. 'Mourning' preserves
    the distinction from κλαίοντες rather than collapsing both into a single English
    idea.
