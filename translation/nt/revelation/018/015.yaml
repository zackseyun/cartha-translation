theological_decisions:
- issue: Nature of βασανισμός in apocalyptic judgment language
  chosen_reading: Rendered as 'torment' without softening to a merely emotional or
    economic distress.
  alternative_readings:
  - punishment
  - distress
  rationale: The immediate context is Babylon's judgment, and Revelation regularly
    uses βασανισμός for severe punitive suffering. The translation preserves the gravity
    of divine judgment without expanding beyond the text into a detailed doctrine
    of final punishment.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
