theological_decisions:
- issue: Imagery of Babylon's judgment
  chosen_reading: Render the verse as a threefold declaration that the ordinary sounds
    of celebration, skilled labor, and daily provision will cease completely in the
    judged city.
  alternative_readings:
  - Treat the items as merely decorative details without symbolic force
  rationale: The verse's repeated οὐ μή ... ἔτι formula communicates total and irreversible
    desolation. This is an interpretive matter of emphasis, but the translation preserves
    the concrete imagery without over-allegorizing it.
  doctrine_reference: Preserve theological tension rather than resolve it
