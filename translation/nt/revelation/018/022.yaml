id: REV.18.22
reference: Revelation 18:22
source:
  edition: SBLGNT
  text: καὶ φωνὴ κιθαρῳδῶν καὶ μουσικῶν καὶ αὐλητῶν καὶ σαλπιστῶν οὐ μὴ ἀκουσθῇ ἐν
    σοὶ ἔτι, καὶ πᾶς τεχνίτης πάσης τέχνης οὐ μὴ εὑρεθῇ ἐν σοὶ ἔτι, καὶ φωνὴ μύλου
    οὐ μὴ ἀκουσθῇ ἐν σοὶ ἔτι,
translation:
  text: And the sound of harpists and musicians and flute players and trumpeters will
    never be heard in you again, and no craftsman of any craft will ever be found
    in you again, and the sound of a mill will never be heard in you again,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pipers' for 'flute players'; the Greek refers to players of the αὐλός,
      an ancient wind instrument not identical to the modern flute.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound of a millstone'; the Greek can refer to the mill apparatus
      more specifically, but 'mill' captures the broader image of grinding activity.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  chosen: the sound
  alternatives:
  - the voice
  - the noise
  lexicon: BDAG
  rationale: In this context φωνή refers to audible sound rather than spoken speech.
    'Sound' fits both the musical performers and the mill, and preserves the repeated
    imagery of city life falling silent.
- source_word: κιθαρῳδῶν
  chosen: harpists
  alternatives:
  - lyre-singers
  - kithara players
  lexicon: BDAG
  rationale: The term denotes performers associated with the kithara. 'Harpists' is
    idiomatic modern English and communicates the class of stringed musicians without
    awkward transliteration.
- source_word: μουσικῶν
  chosen: musicians
  alternatives:
  - singers
  - musical performers
  lexicon: BDAG
  rationale: Although the term can denote those involved in music more broadly, 'musicians'
    is the most natural umbrella term here and fits the list of entertainers.
- source_word: αὐλητῶν
  chosen: flute players
  alternatives:
  - pipers
  lexicon: BDAG
  rationale: The αὐλητής plays the αὐλός, often rendered 'flute' in accessible English.
    'Flute players' is clearer to modern readers than 'pipers,' though the ancient
    instrument was not identical to a modern flute.
- source_word: σαλπιστῶν
  chosen: trumpeters
  alternatives:
  - trumpet players
  lexicon: BDAG
  rationale: A straightforward rendering of those who sound trumpets; 'trumpeters'
    is concise and natural in a list.
- source_word: οὐ μὴ ἀκουσθῇ
  chosen: will never be heard
  alternatives:
  - will certainly not be heard
  - will by no means be heard
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation. 'Will never be
    heard' captures the emphatic finality in readable modern English.
- source_word: ἐν σοὶ
  chosen: in you
  alternatives:
  - within you
  - in your midst
  lexicon: BDAG
  rationale: The addressee is Babylon personified as a city. 'In you' preserves the
    direct second-person address and the prophetic personification.
- source_word: ἔτι
  chosen: again
  alternatives:
  - any longer
  - still
  lexicon: BDAG
  rationale: 'In this repeated judgment formula, ''again'' idiomatically conveys the
    cessation of former activity: these sounds and people will not be present anymore.'
- source_word: πᾶς τεχνίτης πάσης τέχνης
  chosen: no craftsman of any craft
  alternatives:
  - no artisan of any trade
  - no worker skilled in any craft
  lexicon: BDAG
  rationale: The phrase is comprehensive and somewhat formal. 'Craftsman of any craft'
    preserves the repetition and breadth of the Greek while remaining readable.
- source_word: εὑρεθῇ
  chosen: will ever be found
  alternatives:
  - will be found
  - will be discovered
  lexicon: BDAG
  rationale: Combined with οὐ μή, the sense is emphatic absence. 'Will ever be found'
    brings out the totality of the negation in natural English.
- source_word: μύλου
  chosen: of a mill
  alternatives:
  - of a millstone
  - of grinding
  lexicon: BDAG
  rationale: The genitive after φωνή points to the sound associated with a mill. 'The
    sound of a mill' is a natural metonymy in English for the noise of grinding activity;
    'millstone' is possible but narrower than the Greek term.
