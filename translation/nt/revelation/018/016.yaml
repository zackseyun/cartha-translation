theological_decisions:
- issue: Tone of lament over Babylon's fall
  chosen_reading: Render οὐαί as 'Woe' to preserve both lament and judgment
  alternative_readings:
  - Render as 'Alas' to emphasize grief
  rationale: The verse is part of Revelation's judgment oracle against Babylon. 'Woe'
    preserves the prophetic-apocalyptic register and does not reduce the utterance
    to mere sorrow.
  doctrine_reference: Translation philosophy §1, §3
