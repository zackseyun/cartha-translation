id: REV.18.16
reference: Revelation 18:16
source:
  edition: SBLGNT
  text: ⸀λέγοντες· Οὐαὶ οὐαί, ἡ πόλις ἡ μεγάλη, ἡ περιβεβλημένη βύσσινον καὶ πορφυροῦν
    καὶ κόκκινον καὶ ⸀κεχρυσωμένη χρυσίῳ καὶ λίθῳ τιμίῳ καὶ ⸀μαργαρίτῃ,
translation:
  text: saying, “Woe, woe, the great city, clothed in fine linen and purple and scarlet,
    and adorned with gold and precious stone and pearl,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Alas, alas.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: Present active participle nominative plural, introducing the lament speech.
    English participial 'saying' preserves the Greek connection to the previous verse
    without unnecessarily supplying an explicit subject here.
- source_word: Οὐαὶ οὐαί
  chosen: Woe, woe
  alternatives:
  - Alas, alas
  lexicon: BDAG
  rationale: Retains the prophetic lament force of οὐαί. 'Alas' is possible in context,
    but 'Woe' better preserves the interjection's biblical and judgment-laden tone
    in Revelation.
- source_word: ἡ πόλις ἡ μεγάλη
  chosen: the great city
  alternatives:
  - the city, the great one
  lexicon: BDAG
  rationale: Standard appositional/adjectival rendering. English naturally compresses
    the repeated article construction into 'the great city' while preserving emphasis.
- source_word: περιβεβλημένη
  chosen: clothed in
  alternatives:
  - arrayed in
  - dressed in
  lexicon: BDAG
  rationale: Perfect middle/passive participle describing the city's state. 'Clothed
    in' is clear, natural, and suitably elevated without sounding archaic.
- source_word: βύσσινον
  chosen: fine linen
  alternatives:
  - linen
  lexicon: BDAG
  rationale: Refers to costly fine linen, not merely generic linen. 'Fine linen' preserves
    the luxury imagery central to the verse.
- source_word: πορφυροῦν
  chosen: purple
  alternatives:
  - purple cloth
  lexicon: BDAG
  rationale: Color term associated with wealth and royalty. The simple color term
    works idiomatically in English in a list of luxury garments.
- source_word: κόκκινον
  chosen: scarlet
  alternatives:
  - red
  - crimson
  lexicon: BDAG
  rationale: '''Scarlet'' is the conventional and precise rendering in apocalyptic
    luxury imagery, preserving the vividness and intertextual resonance.'
- source_word: κεχρυσωμένη
  chosen: adorned with
  alternatives:
  - decked with
  - gilded with
  lexicon: BDAG
  rationale: Perfect passive participle from χρυσόω can suggest overlaying with gold
    or ornamentation. Because the following dative list includes gold, precious stone,
    and pearl together, 'adorned with' best captures the broader sense of lavish ornament
    rather than literal gilding alone.
- source_word: χρυσίῳ
  chosen: gold
  lexicon: BDAG
  rationale: Straightforward dative of material/instrument in the adornment list.
- source_word: λίθῳ τιμίῳ
  chosen: precious stone
  alternatives:
  - precious jewel
  - costly stone
  lexicon: BDAG
  rationale: Singular in Greek; rendered singular in English for formal correspondence.
    'Precious stone' is transparent and natural.
- source_word: μαργαρίτῃ
  chosen: pearl
  alternatives:
  - a pearl
  lexicon: BDAG
  rationale: Singular noun, coordinated with the preceding singular items. 'Pearl'
    fits the list of luxury materials and keeps the Greek singular pattern.
