theological_decisions:
- issue: Implicit subject of εὑρήσουσιν
  chosen_reading: Impersonal sense rendered as 'they will be found again'
  alternative_readings:
  - unspecified people will not find them again
  rationale: This is not a doctrinally weighty issue but an interpretive one. Greek
    commonly uses third person plural with an indefinite sense. The passive-like English
    rendering best communicates the finality of Babylon's loss without adding a specific
    subject absent from the text.
  doctrine_reference: Translation philosophy §3, preserve ambiguity/tension where
    present
