id: REV.18.14
reference: Revelation 18:14
source:
  edition: SBLGNT
  text: καὶ ἡ ὀπώρα ⸂σου τῆς ἐπιθυμίας τῆς ψυχῆς⸃ ἀπῆλθεν ἀπὸ σοῦ, καὶ πάντα τὰ λιπαρὰ
    καὶ τὰ λαμπρὰ ἀπώλετο ἀπὸ σοῦ, καὶ ⸀οὐκέτι ⸂οὐ μὴ αὐτὰ εὑρήσουσιν⸃.
translation:
  text: And the fruit your soul desired has gone away from you, and all the rich and
    splendid things have perished from you, and they will never be found again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the fruit of your soul's desire.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they will never find them again,' with an indefinite subject in Greek.
    reason: alternative_reading
lexical_decisions:
- source_word: ὀπώρα
  chosen: fruit
  alternatives:
  - harvest fruit
  - ripe fruit
  lexicon: BDAG
  rationale: ὀπώρα denotes fruit, especially ripe or late-season fruit. In this lament
    over luxury goods, 'fruit' works idiomatically in English while preserving the
    metaphor of desired produce rather than general 'harvest.'
- source_word: σου τῆς ἐπιθυμίας τῆς ψυχῆς
  chosen: your soul desired
  alternatives:
  - for which your soul longed
  - of your soul's desire
  lexicon: BDAG
  rationale: The genitive chain is awkward if rendered woodenly. 'Your soul desired'
    preserves ψυχή and ἐπιθυμία while producing natural English. 'Soul' is retained
    rather than reduced to 'you' in order to preserve the intensity of inward desire.
- source_word: ἀπῆλθεν ἀπὸ σοῦ
  chosen: has gone away from you
  alternatives:
  - departed from you
  - is gone from you
  lexicon: BDAG
  rationale: Aorist is rendered with present perfect in English for vivid resultative
    force in this lament context. 'Gone away from you' reflects ἀπέρχομαι plus ἀπό
    without sounding archaic.
- source_word: πάντα τὰ λιπαρὰ
  chosen: all the rich things
  alternatives:
  - all the luxurious things
  - all the costly delicacies
  lexicon: BDAG
  rationale: λιπαρός can denote richness, luxury, or sumptuousness. Here it refers
    broadly to luxurious possessions rather than merely fatty foods, so 'rich things'
    captures material opulence in a concise way.
- source_word: τὰ λαμπρὰ
  chosen: splendid things
  alternatives:
  - bright things
  - glorious things
  - magnificent things
  lexicon: BDAG
  rationale: λαμπρός here describes brilliance or splendor in the sense of showy luxury.
    'Splendid things' fits the commercial-luxury context better than the overly literal
    'bright things.'
- source_word: ἀπώλετο ἀπὸ σοῦ
  chosen: have perished from you
  alternatives:
  - have been destroyed from you
  - have vanished from you
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/intransitive can mean perish or be lost. 'Have
    perished from you' preserves the sense of irreversible loss while matching the
    lament's elevated tone.
- source_word: οὐκέτι οὐ μὴ
  chosen: never again
  alternatives:
  - no longer, certainly not
  - certainly never again
  lexicon: BDAG
  rationale: The combination intensifies negation. English idiom is best served by
    'never again,' which conveys emphatic finality without awkward double negatives.
- source_word: αὐτὰ εὑρήσουσιν
  chosen: they will be found again
  alternatives:
  - they will find them again
  - these things will ever be found
  lexicon: BDAG
  rationale: 'The Greek future plural lacks an explicit subject. In context, an impersonal/passive-like
    English rendering communicates the sense clearly: the lost luxuries will not be
    recoverable. This avoids introducing an unspecified ''they'' as a concrete actor
    in the main text.'
