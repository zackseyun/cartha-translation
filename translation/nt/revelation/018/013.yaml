theological_decisions:
- issue: Rendering σωμάτων καὶ ψυχὰς ἀνθρώπων
  chosen_reading: bodies—and human souls
  alternative_readings:
  - slaves, that is, human souls
  - bodies and souls of men
  rationale: The verse condemns the dehumanizing trade in persons. A literal rendering
    preserves John's rhetorical shock and avoids prematurely interpreting σῶμα as
    a mere idiom. The dash marks the climactic apposition-like force in English. An
    alternative clarifying 'slaves' is preserved in a footnote because many translations
    make the commercial sense explicit.
  doctrine_reference: Translation philosophy §§1, 3, 5
