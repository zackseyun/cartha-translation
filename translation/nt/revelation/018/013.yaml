id: REV.18.13
reference: Revelation 18:13
source:
  edition: SBLGNT
  text: καὶ κιννάμωμον ⸂καὶ ἄμωμον⸃ καὶ θυμιάματα καὶ μύρον καὶ λίβανον καὶ οἶνον
    καὶ ἔλαιον καὶ σεμίδαλιν καὶ σῖτον καὶ ⸂κτήνη καὶ πρόβατα⸃, καὶ ἵππων καὶ ῥεδῶν
    καὶ σωμάτων, καὶ ψυχὰς ἀνθρώπων.
translation:
  text: and cinnamon and spice and incense and perfume and frankincense and wine and
    olive oil and fine flour and wheat and cattle and sheep, and horses and carriages
    and bodies—and human souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'amomum,' a costly aromatic spice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'bodies'; that is, human beings sold as slaves.
    reason: lexical_alternative
lexical_decisions:
- source_word: κιννάμωμον
  chosen: cinnamon
  alternatives:
  - cinnamon spice
  lexicon: BDAG
  rationale: The term denotes cinnamon, an imported aromatic commodity. 'Cinnamon'
    is the plain and established English equivalent.
- source_word: ἄμωμον
  chosen: spice
  alternatives:
  - amomum
  - cardamom
  - aromatic spice
  lexicon: BDAG
  rationale: The noun refers to a costly aromatic plant/spice, traditionally identified
    as amomum. Because 'amomum' is obscure in modern English, 'spice' communicates
    the commodity naturally while preserving the luxury-goods list; the more specific
    identification is preserved in a footnote.
- source_word: θυμιάματα
  chosen: incense
  alternatives:
  - incense offerings
  - fumigations
  lexicon: BDAG
  rationale: In this commercial list the word refers to incense substances rather
    than the act of offering them. 'Incense' is the most natural commodity rendering.
- source_word: μύρον
  chosen: perfume
  alternatives:
  - ointment
  - perfumed oil
  - myrrh-oil
  lexicon: BDAG
  rationale: The term denotes costly scented ointment/perfume. 'Perfume' is idiomatic
    modern English and fits the luxury inventory better than the more archaic 'ointment.'
- source_word: λίβανον
  chosen: frankincense
  alternatives:
  - incense resin
  lexicon: BDAG
  rationale: This specifically denotes frankincense, distinct from the broader θυμιάματα
    earlier in the list.
- source_word: ἔλαιον
  chosen: olive oil
  alternatives:
  - oil
  lexicon: BDAG
  rationale: In this context the referent is olive oil. Making it explicit avoids
    ambiguity for modern readers.
- source_word: σεμίδαλιν
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: BDAG
  rationale: The term denotes high-quality flour. 'Fine flour' is both accurate and
    familiar from biblical commodity contexts.
- source_word: σῖτον
  chosen: wheat
  alternatives:
  - grain
  lexicon: BDAG
  rationale: Although the word can refer more broadly to grain, 'wheat' is the standard
    and likely specific sense in such trade lists.
- source_word: κτήνη
  chosen: cattle
  alternatives:
  - beasts of burden
  - livestock
  lexicon: BDAG
  rationale: The term can denote domesticated animals, often larger beasts. Since
    πρόβατα follows separately, 'cattle' preserves distinction better than the broader
    'livestock.'
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - flocks
  lexicon: BDAG
  rationale: The noun straightforwardly denotes sheep.
- source_word: ῥεδῶν
  chosen: carriages
  alternatives:
  - chariots
  - wagons
  lexicon: BDAG
  rationale: The term refers to four-wheeled vehicles, likely luxury carriages rather
    than war chariots. 'Carriages' best fits the Roman commercial setting and luxury
    tone.
- source_word: σωμάτων
  chosen: bodies
  alternatives:
  - slaves
  lexicon: BDAG
  rationale: The Greek literally says 'bodies.' Retaining the literal term preserves
    the shocking commodification in the text. Because the phrase is then clarified
    by 'human souls,' readers can infer the slave-trade sense without flattening the
    rhetoric; the alternative is preserved in a footnote.
- source_word: ψυχὰς ἀνθρώπων
  chosen: human souls
  alternatives:
  - human lives
  - people
  lexicon: BDAG
  rationale: The phrase intensifies the horror of trafficking in persons. 'Human souls'
    preserves the lexical force of ψυχή and the contrast with 'bodies,' rather than
    reducing it to the generic 'people'.
