theological_decisions:
- issue: Referent and imagery of αὐτῆς
  chosen_reading: Retain feminine personal language ('her') for Babylon rather than
    neutralizing to 'it.'
  alternative_readings:
  - Render as 'it' to emphasize the city/system rather than the woman imagery
  rationale: Revelation personifies Babylon as a woman while also referring to a city/system.
    Preserving 'her' maintains the apocalyptic imagery and literary coherence without
    adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the two ἵνα clauses
  chosen_reading: Render both as purpose/result clauses with 'so that you may not
    ... and so that you may not ...'
  alternative_readings:
  - Use 'lest' clauses
  - Treat the second as epexegetical rather than coordinate
  rationale: The repeated ἵνα with subjunctive presents coordinated purpose/warning
    clauses. Repeating 'so that' preserves the Greek structure and rhetorical emphasis.
  doctrine_reference: Translation philosophy §5
