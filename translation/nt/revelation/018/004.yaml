id: REV.18.4
reference: Revelation 18:4
source:
  edition: SBLGNT
  text: Καὶ ἤκουσα ἄλλην φωνὴν ἐκ τοῦ οὐρανοῦ λέγουσαν· ⸀Ἐξέλθατε, ⸂ὁ λαός μου, ἐξ
    αὐτῆς⸃, ἵνα μὴ συγκοινωνήσητε ταῖς ἁμαρτίαις αὐτῆς, καὶ ἐκ τῶν πληγῶν αὐτῆς ἵνα
    μὴ λάβητε·
translation:
  text: And I heard another voice from heaven saying, “Come out of her, my people,
    so that you may not share in her sins, and so that you may not receive from her
    plagues.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go out of her, my people.' The imperative Ἐξέλθατε can be rendered either
      way; 'Come out' is chosen as the more natural English summons from a heavenly
      voice.
    reason: lexical_alternative
  - marker: b
    text: Babylon is referred to with feminine language ('her'), preserving the book's
      personification of the city/system as a woman.
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλην φωνὴν
  chosen: another voice
  alternatives:
  - a different voice
  lexicon: BDAG
  rationale: ἄλλην with φωνή naturally indicates an additional voice distinct from
    the prior speaker. 'Another voice' is idiomatic and sufficiently precise.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: In Revelation οὐρανός in this context refers to the heavenly realm, not
    the physical sky. 'From heaven' is the natural English rendering.
- source_word: Ἐξέλθατε
  chosen: Come out
  alternatives:
  - Go out
  - Depart
  lexicon: BDAG
  rationale: Aorist imperative plural of ἐξέρχομαι gives a direct summons to leave.
    'Come out' is the established and natural imperative in English for a heavenly
    voice calling people away from Babylon; 'go out' is possible but less idiomatic
    from the speaker's vantage in English.
- source_word: ὁ λαός μου
  chosen: my people
  alternatives:
  - O my people
  lexicon: BDAG
  rationale: Vocative force is conveyed by apposition with the imperative. 'My people'
    preserves the covenantal address without adding archaic vocative style.
- source_word: ἐξ αὐτῆς
  chosen: out of her
  alternatives:
  - from her
  - out of it
  lexicon: BDAG
  rationale: The feminine pronoun refers to Babylon portrayed as a woman/city. 'Out
    of her' preserves the personified feminine imagery better than 'out of it.'
- source_word: ἵνα μὴ συγκοινωνήσητε
  chosen: so that you may not share in
  alternatives:
  - lest you participate in
  - so that you may not take part in
  lexicon: BDAG
  rationale: συγκοινωνέω means to share with, participate in, or have fellowship in
    common with. 'Share in' is concise, natural, and captures complicity/participation.
- source_word: ταῖς ἁμαρτίαις αὐτῆς
  chosen: her sins
  alternatives:
  - her sinful deeds
  lexicon: BDAG
  rationale: The dative after συγκοινωνήσητε is well represented by 'share in her
    sins.' 'Sins' is the direct lexical equivalent and preserves the moral-theological
    weight.
- source_word: ἐκ τῶν πληγῶν αὐτῆς
  chosen: from her plagues
  alternatives:
  - in her plagues
  - of her plagues
  lexicon: BDAG
  rationale: The preposition ἐκ with λαμβάνω suggests receiving a portion from or
    out of the plagues that belong to her. 'From her plagues' best reflects the Greek
    construction while remaining idiomatic.
- source_word: πληγῶν
  chosen: plagues
  alternatives:
  - blows
  - afflictions
  - strikes
  lexicon: BDAG
  rationale: In Revelation πληγή commonly denotes divinely inflicted plagues/judgments.
    'Plagues' preserves intertextual resonance with biblical judgment language.
- source_word: ἵνα μὴ λάβητε
  chosen: so that you may not receive
  alternatives:
  - lest you receive
  - so that you may not take
  lexicon: BDAG
  rationale: λάβητε is aorist subjunctive after ἵνα expressing intended avoidance.
    'Receive' fits the idiom of coming under judgment better than the more literal
    but less natural 'take'.
