theological_decisions:
- issue: Rendering of κύριος in reference to God
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The doctrine file specifies 'Lord' as the default rendering for κύριος.
    In this context the title refers to God in a judicial and sovereign sense, and
    'Lord God' is the standard transparent English equivalent.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of the final clause describing divine judgment
  chosen_reading: because strong is the Lord God who judged her
  alternative_readings:
  - for mighty is the Lord God who has judged her
  rationale: The translation preserves the causal grounding of Babylon's destruction
    in God's power and prior judicial action without importing extra doctrinal conclusions
    about timing beyond the text itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
