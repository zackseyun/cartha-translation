id: REV.18.8
reference: Revelation 18:8
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἐν μιᾷ ἡμέρᾳ ἥξουσιν αἱ πληγαὶ αὐτῆς, θάνατος καὶ πένθος καὶ λιμός,
    καὶ ἐν πυρὶ κατακαυθήσεται· ὅτι ἰσχυρὸς κύριος ὁ θεὸς ὁ κρίνας αὐτήν.
translation:
  text: 'For this reason, in one day her plagues will come: death and mourning and
    famine, and she will be burned up with fire; because strong is the Lord God who
    judged her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pestilence' for 'death,' if the term is understood as a plague category
      rather than death in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty' instead of 'strong.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who has judged her'; the Greek participle can be rendered with an English
      perfect to emphasize the completed judicial act.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: Idiomatic causal-consequential connector; 'For this reason' preserves
    the explicit inferential force without sounding wooden.
- source_word: ἐν μιᾷ ἡμέρᾳ
  chosen: in one day
  alternatives:
  - in a single day
  - within one day
  lexicon: BDAG
  rationale: Retains the temporal compression and judgment emphasis of the Greek.
    'In one day' is natural and sufficiently formal.
- source_word: ἥξουσιν
  chosen: will come
  alternatives:
  - will arrive
  - will overtake
  lexicon: BDAG
  rationale: Future of ἥκω commonly means 'come/arrive.' 'Will come' is the most direct
    rendering with the plagues as subject.
- source_word: αἱ πληγαὶ αὐτῆς
  chosen: her plagues
  alternatives:
  - the plagues for her
  - her afflictions
  lexicon: BDAG
  rationale: πληγαί in Revelation regularly denotes divinely inflicted plagues/judgments;
    'her plagues' is concise and contextually apt.
- source_word: θάνατος
  chosen: death
  alternatives:
  - pestilence
  lexicon: BDAG
  rationale: The lexical sense is straightforwardly 'death.' While some contexts may
    imply deadly plague, the Greek here lists outcomes/judgments, so 'death' should
    remain in the main text.
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: BDAG
  rationale: '''Mourning'' best captures the public and lamentive sense in judgment
    contexts.'
- source_word: λιμός
  chosen: famine
  alternatives:
  - hunger
  lexicon: BDAG
  rationale: Standard rendering in apocalyptic judgment lists; more specific than
    'hunger.'
- source_word: ἐν πυρὶ κατακαυθήσεται
  chosen: she will be burned up with fire
  alternatives:
  - she will be burned with fire
  - she will be completely consumed by fire
  lexicon: BDAG
  rationale: The compound verb κατακαίω intensifies the burning; 'burned up' reflects
    the destructive force better than simply 'burned.' 'With fire' is idiomatic for
    ἐν πυρί here.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the certainty of judgment. 'Because' is clearer
    in modern English than 'for'.
- source_word: ἰσχυρὸς
  chosen: strong
  alternatives:
  - mighty
  - powerful
  lexicon: BDAG
  rationale: The adjective emphasizes God's strength in executing judgment. 'Strong'
    is a direct rendering; 'mighty' is possible but slightly more interpretive and
    traditionalized.
- source_word: κύριος ὁ θεὸς
  chosen: the Lord God
  alternatives:
  - the Lord, the God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. The collocation is naturally
    rendered 'the Lord God' in English.
- source_word: ὁ κρίνας αὐτήν
  chosen: who judged her
  alternatives:
  - who has judged her
  - who condemned her
  lexicon: BDAG
  rationale: Aorist participle points to God's decisive judicial act. 'Who judged
    her' is the most direct and leaves aspectual nuance unforced; 'condemned' would
    over-specify the verb.
