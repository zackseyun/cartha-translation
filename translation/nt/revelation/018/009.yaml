theological_decisions:
- issue: Nature of Babylon's 'sexual immorality' imagery
  chosen_reading: Retain the sexual-immorality language in the main text while allowing
    its metaphorical force in context.
  alternative_readings:
  - Translate more abstractly as 'committed immorality' or 'were unfaithful with her'
  rationale: Revelation regularly uses prostitution/sexual immorality imagery for
    idolatrous and corrupt alliance. Preserving the sexual terminology maintains the
    prophetic metaphor and theological tension rather than resolving it into a purely
    symbolic abstraction.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of κόψονται
  chosen_reading: Translate the mourning sense rather than a hyper-literal bodily
    action.
  alternative_readings:
  - '''will beat their breasts'''
  - '''will cut themselves'''
  rationale: The idiom denotes lamentation. A literal rendering could mislead modern
    readers into thinking the text emphasizes self-harm rather than grief. The chosen
    rendering preserves sense while a lexical alternative is documented.
  doctrine_reference: Translation philosophy §6
