id: REV.18.9
reference: Revelation 18:9
source:
  edition: SBLGNT
  text: Καὶ κλαύσουσιν καὶ κόψονται ἐπ’ αὐτὴν οἱ βασιλεῖς τῆς γῆς οἱ μετ’ αὐτῆς πορνεύσαντες
    καὶ στρηνιάσαντες, ὅταν βλέπωσιν τὸν καπνὸν τῆς πυρώσεως αὐτῆς,
translation:
  text: And the kings of the earth who committed sexual immorality with her and lived
    in luxury with her will weep and mourn over her when they see the smoke of her
    burning,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will beat themselves' / 'will lament'; the Greek verb evokes demonstrative
      mourning.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'committed sexual immorality with her' likely participates in
      Revelation's recurring metaphor for corrupt, idolatrous alliance, while retaining
      the sexualized imagery of the Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλαύσουσιν
  chosen: will weep
  alternatives:
  - will cry
  lexicon: BDAG
  rationale: Future active indicative of κλαίω, denoting audible weeping or lament.
    'Will weep' is natural modern English and preserves the emotional force.
- source_word: κόψονται
  chosen: will mourn
  alternatives:
  - will beat themselves
  - will lament
  lexicon: BDAG
  rationale: Middle voice of κόπτω in this idiom refers to ritual mourning/lamentation
    rather than literal cutting. 'Will mourn' communicates the sense clearly in contemporary
    English; the more literal image is preserved as an alternative.
- source_word: ἐπ’ αὐτὴν
  chosen: over her
  alternatives:
  - for her
  - because of her
  lexicon: BDAG
  rationale: With verbs of lament, ἐπί + accusative can indicate the object over whom
    mourning is expressed. 'Over her' is the most idiomatic English rendering here.
- source_word: οἱ βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: BDAG
  rationale: Standard apocalyptic expression for the world's rulers. 'Earth' fits
    Revelation's global scope better than 'land' in this context.
- source_word: μετ’ αὐτῆς
  chosen: with her
  alternatives:
  - in association with her
  lexicon: BDAG
  rationale: Simple associative μετά + genitive. 'With her' is direct and sufficient.
- source_word: πορνεύσαντες
  chosen: committed sexual immorality
  alternatives:
  - committed fornication
  - acted immorally
  lexicon: BDAG
  rationale: The verb πορνεύω can be literal or metaphorical in Revelation's imagery.
    'Committed sexual immorality' preserves the sexualized metaphor without flattening
    it into a purely political reading.
- source_word: στρηνιάσαντες
  chosen: lived in luxury
  alternatives:
  - lived sensuously
  - indulged in luxury
  lexicon: BDAG
  rationale: The verb conveys self-indulgent luxury and wanton living. 'Lived in luxury'
    is clear, idiomatic, and fits the economic-moral critique of Babylon.
- source_word: ὅταν βλέπωσιν
  chosen: when they see
  alternatives:
  - whenever they see
  lexicon: BDAG
  rationale: Ὅταν with present subjunctive gives a future contingency in this context.
    'When they see' is the natural English equivalent in narrative prophecy.
- source_word: καπνὸν
  chosen: the smoke
  lexicon: BDAG
  rationale: Direct lexical equivalent; no special nuance requires expansion.
- source_word: τῆς πυρώσεως αὐτῆς
  chosen: of her burning
  alternatives:
  - of her torment by fire
  - of her conflagration
  lexicon: BDAG
  rationale: πύρωσις denotes burning/burning process. 'Of her burning' is a straightforward
    rendering that avoids importing the more specific wording of nearby verses while
    preserving the image of destruction by fire.
