id: REV.18.1
reference: Revelation 18:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα εἶδον ἄλλον ἄγγελον καταβαίνοντα ἐκ τοῦ οὐρανοῦ, ἔχοντα ἐξουσίαν
    μεγάλην, καὶ ἡ γῆ ἐφωτίσθη ἐκ τῆς δόξης αὐτοῦ.
translation:
  text: After these things I saw another angel coming down out of heaven, having great
    authority, and the earth was illuminated by his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descending from heaven.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth was illuminated from his glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A standard temporal-sequential expression in Revelation. 'After these
    things' preserves the plural demonstrative ταῦτα and the visionary sequence more
    formally than 'After this,' while remaining natural English.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Simple aorist of ὁράω introducing the next vision scene. 'I saw' is the
    plain sense and avoids adding nuance not explicit in the verb.
- source_word: ἄλλον ἄγγελον
  chosen: another angel
  lexicon: BDAG
  rationale: ἄλλον marks another of the same kind within the visionary sequence. 'Another
    angel' is the natural and sufficiently precise rendering.
- source_word: καταβαίνοντα ἐκ τοῦ οὐρανοῦ
  chosen: coming down out of heaven
  alternatives:
  - descending from heaven
  - coming down from heaven
  lexicon: BDAG
  rationale: The present participle καταβαίνοντα is contemporaneous with 'I saw' and
    is well rendered by the English participial phrase 'coming down.' 'Out of heaven'
    reflects ἐκ slightly more explicitly than simple 'from heaven.'
- source_word: ἔχοντα ἐξουσίαν μεγάλην
  chosen: having great authority
  alternatives:
  - having great power
  - with great authority
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power rather
    than mere raw power. 'Having great authority' preserves that distinction and fits
    the angel's commission.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In Revelation, γῆ often has a broad cosmic sense rather than a localized
    territory. Here the global illumination imagery favors 'the earth' over 'the land.'
- source_word: ἐφωτίσθη
  chosen: was illuminated
  alternatives:
  - was lit up
  - was made bright
  - shone
  lexicon: BDAG
  rationale: The passive aorist of φωτίζω means to give light to or illuminate. 'Was
    illuminated' preserves the passive sense and the grandeur of the scene better
    than more colloquial alternatives.
- source_word: ἐκ τῆς δόξης αὐτοῦ
  chosen: by his glory
  alternatives:
  - from his glory
  - because of his glory
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' in this construction it expresses
    source or cause. 'By his glory' is idiomatic English that communicates the angel's
    glory as the means/source of the earth's illumination. The more literal 'from
    his glory' is preserved as an alternative.
