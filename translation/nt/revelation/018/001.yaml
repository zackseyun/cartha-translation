theological_decisions:
- issue: Nature of the angel's radiance and authority
  chosen_reading: The verse describes a created angel endowed with great authority
    and glory from God, without implying deity for the angel.
  alternative_readings:
  - The angel's glory could be read in a heightened way because the earth is illuminated
    by it.
  rationale: The text attributes 'great authority' and 'his glory' to the angel, but
    the wording does not identify the angel as divine. The translation preserves the
    language of glory without softening it, while avoiding any doctrinal overreading
    beyond the Greek.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
