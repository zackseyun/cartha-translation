theological_decisions:
- issue: Rendering of apocalyptic lament οὐαί
  chosen_reading: Woe, woe
  alternative_readings:
  - Alas, alas
  rationale: The verse is a prophetic-apocalyptic pronouncement over Babylon. 'Woe'
    better preserves the biblical register of lament joined with doom, without importing
    extra doctrinal content.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight'
- issue: Aspect of ἦλθεν in English
  chosen_reading: has come
  alternative_readings:
  - came
  rationale: The aorist can be rendered simply as past, but in English direct speech
    lamenting a just-arrived catastrophe, 'has come' communicates the completed event's
    present force more naturally. This is a translational, not doctrinal, decision.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
