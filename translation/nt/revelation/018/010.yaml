id: REV.18.10
reference: Revelation 18:10
source:
  edition: SBLGNT
  text: ἀπὸ μακρόθεν ἑστηκότες διὰ τὸν φόβον τοῦ βασανισμοῦ αὐτῆς λέγοντες· Οὐαὶ οὐαί,
    ἡ πόλις ἡ μεγάλη, Βαβυλὼν ἡ πόλις ἡ ἰσχυρά, ὅτι μιᾷ ὥρᾳ ἦλθεν ἡ κρίσις σου.
translation:
  text: standing far off because of the fear of her torment, saying, ‘Woe, woe, the
    great city, Babylon, the strong city! For in one hour your judgment has come.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Alas, alas.” The Greek exclamation can express lament as well as doom;
      “Woe, woe” preserves the prophetic-apocalyptic force.
    reason: lexical_alternative
  - marker: b
    text: Or “the mighty city.” The Greek adjective can denote strength, power, or
      might.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ μακρόθεν
  chosen: standing far off
  alternatives:
  - from afar
  - at a distance
  lexicon: BDAG
  rationale: The phrase denotes spatial distance. 'Far off' is idiomatic modern English
    and preserves the vivid image without sounding archaic.
- source_word: ἑστηκότες
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι here functions descriptively of their posture/state.
    English present participle 'standing' best fits the flow with λέγοντες.
- source_word: διὰ τὸν φόβον
  chosen: because of the fear
  alternatives:
  - for fear of
  - because of fear
  lexicon: BDAG
  rationale: διά with the accusative gives cause. 'Because of the fear' is slightly
    more formal and keeps the explicit noun φόβος rather than collapsing it into an
    idiom.
- source_word: τοῦ βασανισμοῦ αὐτῆς
  chosen: of her torment
  alternatives:
  - of her torture
  - of her agony
  lexicon: BDAG
  rationale: βασανισμός in Revelation commonly refers to severe torment. 'Torment'
    is the standard and contextually appropriate rendering, preserving the intensity
    without over-specifying the mechanism.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: A participle introducing direct speech; 'saying' is the natural English
    equivalent.
- source_word: Οὐαὶ οὐαί
  chosen: Woe, woe
  alternatives:
  - Alas, alas
  lexicon: BDAG
  rationale: οὐαί is an exclamation of lament and doom. 'Woe' preserves the prophetic
    and apocalyptic force better than the softer 'Alas.'
- source_word: ἡ πόλις ἡ μεγάλη
  chosen: the great city
  alternatives:
  - the city, the great one
  lexicon: BDAG
  rationale: The repeated article + adjective is naturally rendered attributively
    in English. 'The great city' is both accurate and idiomatic.
- source_word: Βαβυλὼν
  chosen: Babylon
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: ἡ πόλις ἡ ἰσχυρά
  chosen: the strong city
  alternatives:
  - the mighty city
  - the powerful city
  lexicon: BDAG
  rationale: ἰσχυρός denotes strength or might. 'Strong' is a direct rendering; 'mighty'
    is possible, but 'strong' more transparently reflects the lexical sense while
    remaining natural.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the lament. 'For' fits the exclamatory style
    and reads smoothly in English.
- source_word: μιᾷ ὥρᾳ
  chosen: in one hour
  alternatives:
  - within one hour
  - in a single hour
  lexicon: BDAG
  rationale: Dative of time. 'In one hour' is the conventional and clear rendering,
    emphasizing the suddenness of Babylon's fall.
- source_word: ἦλθεν
  chosen: has come
  alternatives:
  - came
  - has arrived
  lexicon: BDAG
  rationale: Aorist rendered with English present perfect to convey the completed
    arrival of judgment with present relevance in the lament. This is a natural English
    equivalent in context.
- source_word: ἡ κρίσις σου
  chosen: your judgment
  alternatives:
  - your condemnation
  - your sentence
  lexicon: BDAG
  rationale: κρίσις here refers to judicial judgment that has come upon Babylon. 'Judgment'
    preserves the broader biblical resonance without narrowing it to only the verdict
    or punishment.
