id: REV.18.21
reference: Revelation 18:21
source:
  edition: SBLGNT
  text: Καὶ ἦρεν εἷς ἄγγελος ἰσχυρὸς λίθον ὡς ⸀μύλινον μέγαν, καὶ ἔβαλεν εἰς τὴν θάλασσαν
    λέγων· Οὕτως ὁρμήματι βληθήσεται Βαβυλὼν ἡ μεγάλη πόλις, καὶ οὐ μὴ εὑρεθῇ ἔτι.
translation:
  text: And one mighty angel lifted up a stone like a great millstone and threw it
    into the sea, saying, “So will Babylon the great city be thrown down with violence,
    and it will never be found again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a rush,' 'with force,' or 'violently.' The Greek term conveys sudden,
      forceful motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦρεν
  chosen: lifted up
  alternatives:
  - picked up
  - raised
  lexicon: BDAG
  rationale: Aorist of αἴρω here describes the angel taking up the stone in preparation
    for the symbolic action. 'Lifted up' is natural English and preserves the physical,
    deliberate motion.
- source_word: εἷς ἄγγελος ἰσχυρὸς
  chosen: one mighty angel
  alternatives:
  - a strong angel
  - one powerful angel
  lexicon: BDAG
  rationale: εἷς is retained as 'one' rather than the indefinite article alone, matching
    the Greek's presentation of a single angelic figure. ἰσχυρός can mean 'strong'
    or 'mighty'; 'mighty' fits apocalyptic style in readable modern English.
- source_word: λίθον ὡς μύλινον μέγαν
  chosen: a stone like a great millstone
  alternatives:
  - a stone like a huge millstone
  - a great millstone-like stone
  lexicon: BDAG
  rationale: The phrase compares the stone to a large millstone rather than identifying
    it strictly as one. 'A stone like a great millstone' preserves ὡς ('like/as')
    and the imagery of massive weight.
- source_word: ἔβαλεν εἰς τὴν θάλασσαν
  chosen: threw it into the sea
  alternatives:
  - cast it into the sea
  lexicon: BDAG
  rationale: βάλλω is commonly 'throw/cast.' 'Threw' is more natural contemporary
    English, while preserving the forceful action. 'Sea' is the standard rendering
    of θάλασσα.
- source_word: Οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces the interpretation of the symbolic act. 'So' is concise, natural,
    and adequately reflects the demonstrative force.
- source_word: ὁρμήματι
  chosen: with violence
  alternatives:
  - with a rush
  - with force
  - with violence/violently
  lexicon: BDAG
  rationale: ὅρμημα denotes a violent rush, impulse, or forceful movement. In this
    judgment context, 'with violence' best conveys both the suddenness and destructive
    force of Babylon's downfall. The dative is rendered adverbially/instrumentally.
- source_word: βληθήσεται
  chosen: be thrown down
  alternatives:
  - be thrown
  - be cast down
  lexicon: BDAG
  rationale: Future passive of βάλλω echoes the earlier symbolic throwing of the stone.
    'Be thrown down' makes explicit the downward, ruinous sense in context without
    over-paraphrasing.
- source_word: Βαβυλὼν ἡ μεγάλη πόλις
  chosen: Babylon the great city
  alternatives:
  - Babylon, the great city
  - great Babylon, the city
  lexicon: BDAG
  rationale: This preserves the appositional structure and the repeated apocalyptic
    designation of Babylon. The comma is stylistic; the chosen form reads smoothly
    in English while keeping the title intact.
- source_word: οὐ μὴ εὑρεθῇ ἔτι
  chosen: it will never be found again
  alternatives:
  - it will no longer be found
  - it will certainly not be found anymore
  lexicon: BDAG
  rationale: οὐ μὴ with the subjunctive is an emphatic negation. 'Will never be found
    again' captures both the force of the negation and ἔτι ('any longer/again') in
    idiomatic English.
