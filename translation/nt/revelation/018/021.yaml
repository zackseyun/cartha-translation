theological_decisions:
- issue: Nature of Babylon's destruction imagery
  chosen_reading: Rendered the judgment as forceful and final without specifying whether
    'Babylon' is literal, symbolic, or both.
  alternative_readings:
  - literal city Babylon
  - symbolic world-system/city opposed to God
  - composite apocalyptic symbol
  rationale: The verse itself presents a symbolic action and pronouncement of catastrophic
    overthrow. The translation should preserve the image and finality without importing
    a specific eschatological scheme not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
