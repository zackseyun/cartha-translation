theological_decisions:
- issue: Distinguishing ἁμαρτίαι and ἀδικήματα in the same verse
  chosen_reading: 'Render with two different English terms: ''sins'' and ''wrongdoings'''
  alternative_readings:
  - Render both with 'sins' or 'iniquities' for stylistic smoothness
  rationale: The Greek uses two related but distinct terms. Preserving the distinction
    respects the source text's rhetorical fullness without forcing a sharp theological
    contrast beyond what the verse states.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented
    exception)'
- issue: Force of God's remembrance
  chosen_reading: Translate ἐμνημόνευσεν as 'has remembered' without expanding to
    explicit judgment language
  alternative_readings:
  - '''has called to account'''
  - '''has brought into judgment'''
  rationale: In biblical idiom divine remembrance often entails action, especially
    judgment here, but the Greek verb itself is 'remember.' The translation preserves
    that theological tension rather than resolving it by paraphrase.
  doctrine_reference: 'Translation philosophy #3 (Preserve theological tension rather
    than resolve it)'
