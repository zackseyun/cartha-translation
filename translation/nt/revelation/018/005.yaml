id: REV.18.5
reference: Revelation 18:5
source:
  edition: SBLGNT
  text: ὅτι ἐκολλήθησαν αὐτῆς αἱ ἁμαρτίαι ἄχρι τοῦ οὐρανοῦ, καὶ ἐμνημόνευσεν ὁ θεὸς
    τὰ ἀδικήματα αὐτῆς.
translation:
  text: for her sins have piled up as high as heaven, and God has remembered her wrongdoings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have been joined together up to heaven'; the Greek verb literally means
      'have been glued/joined,' here expressing sins amassed in a great heap.
    reason: lexical_alternative
  - marker: b
    text: '''Remembered'' here carries judicial force in context: God has not overlooked
      her wrongdoings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this gives the reason for the command in the previous verse,
    so 'for' is natural English while preserving the causal force.
- source_word: ἐκολλήθησαν
  chosen: have piled up
  alternatives:
  - have been joined together
  - have clung
  lexicon: BDAG
  rationale: The verb literally means 'to join, glue, cling.' With sins as subject
    and 'up to heaven' as the complement, the sense is metaphorical accumulation in
    a towering mass. 'Have piled up' communicates the image clearly in modern English
    better than a wooden 'have stuck together.'
- source_word: ἁμαρτίαι
  chosen: sins
  lexicon: BDAG
  rationale: Standard rendering for ἁμαρτία; no contextual reason to vary.
- source_word: ἄχρι τοῦ οὐρανοῦ
  chosen: as high as heaven
  alternatives:
  - up to heaven
  - to heaven
  lexicon: BDAG
  rationale: This phrase marks extent. 'As high as heaven' preserves the vertical
    imagery idiomatically in English; 'heaven' rather than 'the sky' fits Revelation's
    theological register and likely alludes to OT judgment language.
- source_word: ἐμνημόνευσεν
  chosen: has remembered
  alternatives:
  - remembered
  - called to mind
  lexicon: BDAG
  rationale: Rendered as an English present perfect to match the preceding perfect-like
    result ('have piled up') and to convey that God's remembrance is an action with
    present judicial consequence. In biblical usage, God's 'remembering' often implies
    acting upon what is remembered, but the translation keeps the verb itself rather
    than importing 'punished.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Direct and standard rendering.
- source_word: ἀδικήματα
  chosen: wrongdoings
  alternatives:
  - unrighteous deeds
  - crimes
  - injustices
  lexicon: BDAG
  rationale: ἀδίκημα overlaps with acts of wrongdoing or injustice. 'Wrongdoings'
    is clear modern English and preserves distinction from the earlier ἁμαρτίαι ('sins')
    without becoming overly technical. 'Injustices' is possible but narrower; 'crimes'
    is too juridically specific.
