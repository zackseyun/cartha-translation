theological_decisions:
- issue: Referent and portrayal of Babylon
  chosen_reading: The feminine pronoun is preserved as 'her,' maintaining the personified
    city imagery without interpreting beyond the text.
  alternative_readings:
  - Rendering more abstractly as 'it' for the city/system
  rationale: Revelation personifies Babylon as a woman/city. Preserving 'her' keeps
    the literary-theological imagery intact and avoids flattening the apocalyptic
    symbolism.
  doctrine_reference: Translation philosophy §1, §3, §6
