id: REV.18.11
reference: Revelation 18:11
source:
  edition: SBLGNT
  text: Καὶ οἱ ἔμποροι τῆς γῆς ⸂κλαίουσιν καὶ πενθοῦσιν⸃ ἐπ’ ⸀αὐτήν, ὅτι τὸν γόμον
    αὐτῶν οὐδεὶς ἀγοράζει οὐκέτι,
translation:
  text: And the merchants of the earth weep and mourn over her, because no one buys
    their cargo anymore,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'merchandise.' The Greek term can denote a ship's load or commercial
      goods; here 'cargo' highlights the trade setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'of the land.' In Revelation, 'the earth' often carries a broader world-wide
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμποροι
  chosen: merchants
  alternatives:
  - traders
  lexicon: BDAG
  rationale: '''Merchants'' is the standard and natural rendering for commercial dealers
    engaged in trade. ''Traders'' is possible, but ''merchants'' better fits the economic
    and maritime luxury-trade context of Revelation 18.'
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In Revelation, the phrase commonly has
    a global scope in apocalyptic judgment contexts, so 'of the earth' best preserves
    the book's wider horizon.
- source_word: κλαίουσιν καὶ πενθοῦσιν
  chosen: weep and mourn
  alternatives:
  - cry and grieve
  lexicon: BDAG
  rationale: 'The paired verbs are retained distinctly to preserve the rhetorical
    intensification: κλαίω denotes weeping/crying, while πενθέω denotes mourning/grieving.
    ''Weep and mourn'' is idiomatic and preserves both terms.'
- source_word: ἐπ’ αὐτήν
  chosen: over her
  alternatives:
  - for her
  - because of her
  lexicon: BDAG
  rationale: With verbs of lament, ἐπί + accusative can express lament directed over
    someone. 'Over her' is the most natural English expression for mourning Babylon's
    fall while preserving the personal feminine reference.
- source_word: γόμον
  chosen: cargo
  alternatives:
  - merchandise
  - cargo load
  lexicon: BDAG
  rationale: γόμος refers to a ship's load or cargo. In this chapter's trade context,
    'cargo' is more precise than the broader 'merchandise' and anticipates the detailed
    list of goods in the following verse.
- source_word: οὐδεὶς ἀγοράζει οὐκέτι
  chosen: no one buys anymore
  alternatives:
  - no one purchases any longer
  lexicon: BDAG
  rationale: This preserves the present tense force in idiomatic English and the finality
    of οὐκέτι. 'Anymore' is natural modern English and communicates cessation clearly.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: The genitive pronoun is possessive here, referring to the merchants'
    cargo. 'Their' is the natural English equivalent.
