theological_decisions:
- issue: Personification of Babylon/the city
  chosen_reading: Retain feminine reference ('her') for the city
  alternative_readings:
  - Use neuter 'its' to match English treatment of cities
  rationale: Revelation consistently personifies Babylon as a woman/city. Preserving
    'her' maintains the literary and theological imagery of the passage without adding
    interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense and literary force.'
