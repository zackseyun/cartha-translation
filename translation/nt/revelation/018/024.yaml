theological_decisions:
- issue: Referent and scope of Babylon's guilt
  chosen_reading: The verse attributes to Babylon responsibility for the blood of
    prophets, saints, and indeed all who have been slaughtered on the earth, expressed
    in sweeping apocalyptic/judicial language.
  alternative_readings:
  - The final clause may be taken as hyperbolic rhetoric for all righteous bloodshed
    for which Babylon stands representative.
  - The final clause may be read more literally as universal culpability in the vision's
    symbolic framework.
  rationale: The Greek text itself states the comprehensive charge without qualifying
    how the symbolism maps onto history. The translation preserves the breadth of
    the accusation and does not narrow it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
