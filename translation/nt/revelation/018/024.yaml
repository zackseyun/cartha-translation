id: REV.18.24
reference: Revelation 18:24
source:
  edition: SBLGNT
  text: καὶ ἐν αὐτῇ ⸀αἷμα προφητῶν καὶ ἁγίων εὑρέθη καὶ πάντων τῶν ἐσφαγμένων ἐπὶ
    τῆς γῆς.
translation:
  text: And in her was found the blood of prophets and saints, and of all who have
    been slaughtered on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy ones' or 'God’s holy people' for 'saints.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all who were slain on the earth.' The Greek verb is stronger than a
      generic term for killing and can mean 'slaughtered.'
    reason: lexical_alternative
  - marker: c
    text: '''Her'' refers to Babylon, portrayed as a woman in the surrounding vision.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐν αὐτῇ
  chosen: in her
  alternatives:
  - in it
  lexicon: BDAG
  rationale: The feminine pronoun refers back to Babylon, portrayed as a woman/city
    in the surrounding context. Rendering it as 'her' preserves the personified feminine
    imagery rather than flattening it to impersonal 'it.'
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal 'blood' is the natural sense here and carries the forensic sense
    of bloodguilt in context.
- source_word: προφητῶν
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering for προφήτης; no contextual reason to vary.
- source_word: ἁγίων
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Revelation commonly refers to God's consecrated people. 'Saints'
    is concise and traditional without obscuring meaning; alternatives are possible
    but less idiomatic here.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - was discovered
  lexicon: BDAG
  rationale: Aorist passive of εὑρίσκω is best rendered straightforwardly as 'was
    found.' This preserves the judicial/disclosive force of the passive.
- source_word: πάντων τῶν ἐσφαγμένων
  chosen: all who have been slaughtered
  alternatives:
  - all who were slain
  - all the slaughtered
  lexicon: BDAG
  rationale: σφάζω is stronger than a generic 'kill'; 'slaughtered' preserves the
    violent sacrificial/massacre nuance often present in Revelation. The perfect participle
    is rendered with English present perfect ('have been slaughtered') to reflect
    a completed action with abiding significance.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on the land
  lexicon: BDAG
  rationale: In Revelation, γῆ commonly has the broader apocalyptic sense 'earth'
    rather than a localized 'land.' 'On the earth' fits the book's global scope in
    this judgment oracle.
