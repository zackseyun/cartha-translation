theological_decisions:
- issue: Rendering the lament formula Οὐαὶ οὐαί in an apocalyptic judgment context
  chosen_reading: Woe, woe
  alternative_readings:
  - Alas, alas
  rationale: The verse is both lament and judgment oracle. 'Woe' preserves the prophetic
    and judicial resonance of Revelation better than the softer 'alas,' without importing
    extra doctrine.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological
    tension; readable modern English without flattening gravity.'
