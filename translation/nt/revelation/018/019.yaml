id: REV.18.19
reference: Revelation 18:19
source:
  edition: SBLGNT
  text: καὶ ἔβαλον χοῦν ἐπὶ τὰς κεφαλὰς αὐτῶν καὶ ⸀ἔκραξαν κλαίοντες καὶ ⸀πενθοῦντες
    λέγοντες· Οὐαὶ οὐαί, ἡ πόλις ἡ μεγάλη, ἐν ᾗ ἐπλούτησαν πάντες οἱ ἔχοντες τὰ πλοῖα
    ἐν τῇ θαλάσσῃ ἐκ τῆς τιμιότητος αὐτῆς, ὅτι μιᾷ ὥρᾳ ἠρημώθη.
translation:
  text: And they threw dust on their heads and cried out, weeping and mourning, saying,
    “Woe, woe, the great city, by which all who had ships on the sea became rich from
    her wealth, because in one hour she has been laid waste.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Alas, alas.” The Greek interjection can express lament; “Woe, woe” is
      retained here to preserve the prophetic tone of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or “from her costly luxury” or “from her splendor” for “from her wealth.”
      The Greek term can denote costliness, magnificence, or wealth.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλον χοῦν ἐπὶ τὰς κεφαλὰς αὐτῶν
  chosen: they threw dust on their heads
  alternatives:
  - they cast dust on their heads
  - they put dust on their heads
  lexicon: BDAG
  rationale: A conventional mourning gesture; 'threw dust on their heads' is natural
    modern English while remaining close to the Greek imagery.
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: '''Cried out'' preserves the force of a loud lament without sounding
    overly colloquial.'
- source_word: κλαίοντες
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: Paired with πενθοῦντες, 'weeping' helps distinguish audible lament from
    broader grief.
- source_word: πενθοῦντες
  chosen: mourning
  alternatives:
  - grieving
  - lamenting
  lexicon: BDAG
  rationale: '''Mourning'' is the standard rendering and complements ''weeping'' as
    a related but distinct expression of grief.'
- source_word: Οὐαὶ οὐαί
  chosen: Woe, woe
  alternatives:
  - Alas, alas
  lexicon: BDAG
  rationale: Retains the prophetic/judgment-lament force of οὐαί. 'Alas' is possible,
    but 'woe' better preserves the biblical register and the repeated cry.
- source_word: ἡ πόλις ἡ μεγάλη
  chosen: the great city
  alternatives:
  - the city, the great one
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the articular appositional phrase.
- source_word: ἐν ᾗ
  chosen: by which
  alternatives:
  - in which
  - through which
  lexicon: BDAG
  rationale: 'Although literally ''in which,'' the sense here is instrumental/associative:
    the merchants became rich by means of the city''s commercial system. ''By which''
    communicates this clearly in English.'
- source_word: ἐπλούτησαν
  chosen: became rich
  alternatives:
  - grew rich
  - were enriched
  lexicon: BDAG
  rationale: Simple and direct rendering of the aorist active; 'became rich' is idiomatic
    and clear.
- source_word: οἱ ἔχοντες τὰ πλοῖα ἐν τῇ θαλάσσῃ
  chosen: all who had ships on the sea
  alternatives:
  - all who owned ships at sea
  - all who had seagoing ships
  lexicon: BDAG
  rationale: A close rendering of the participial phrase. 'Had ships on the sea' preserves
    the Greek wording without over-specifying ownership beyond what ἔχοντες requires.
- source_word: ἐκ τῆς τιμιότητος αὐτῆς
  chosen: from her wealth
  alternatives:
  - from her splendor
  - from her costly luxury
  - from her preciousness
  lexicon: BDAG
  rationale: τιμιότης denotes value, costliness, or magnificence. In this commercial
    lament, 'wealth' best captures the economic sense that explains how shipowners
    profited, while alternatives like 'luxury' or 'splendor' are possible nuances.
- source_word: ὅτι μιᾷ ὥρᾳ
  chosen: because in one hour
  alternatives:
  - for in one hour
  - since in one hour
  lexicon: BDAG
  rationale: Introduces the reason for the lament. 'In one hour' preserves the apocalyptic
    emphasis on suddenness.
- source_word: ἠρημώθη
  chosen: she has been laid waste
  alternatives:
  - she was laid waste
  - she has been devastated
  - she was made desolate
  lexicon: BDAG
  rationale: The passive verb conveys desolation/devastation. 'Has been laid waste'
    is vivid, idiomatic, and preserves the passive result. 'Made desolate' is more
    formal but less natural in contemporary English.
