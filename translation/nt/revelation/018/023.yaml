id: REV.18.23
reference: Revelation 18:23
source:
  edition: SBLGNT
  text: καὶ φῶς λύχνου οὐ μὴ φάνῃ ἐν σοὶ ἔτι, καὶ φωνὴ νυμφίου καὶ νύμφης οὐ μὴ ἀκουσθῇ
    ἐν σοὶ ἔτι· ὅτι οἱ ἔμποροί σου ἦσαν οἱ μεγιστᾶνες τῆς γῆς, ὅτι ἐν τῇ φαρμακείᾳ
    σου ἐπλανήθησαν πάντα τὰ ἔθνη,
translation:
  text: And the light of a lamp will never shine in you again, and the voice of bridegroom
    and bride will never be heard in you again; for your merchants were the great
    ones of the earth, because by your sorcery all the nations were led astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by your magic arts' or 'by your witchcraft.' The Greek φαρμακεία refers
      to sorcery or magical deception.
    reason: lexical_alternative
  - marker: b
    text: Or 'the magnates of the earth.' The Greek term refers to people of great
      prominence or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς λύχνου
  chosen: the light of a lamp
  alternatives:
  - lamp-light
  - light of a lantern
  lexicon: BDAG
  rationale: A straightforward genitive construction. 'Lamp' is the most natural rendering
    of λύχνος in biblical context; 'lantern' is possible in some contexts but less
    standard here.
- source_word: οὐ μὴ φάνῃ
  chosen: will never shine
  alternatives:
  - will certainly not shine
  - will no longer shine
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation. 'Will never shine'
    captures the emphatic future denial in idiomatic English. 'Again' is supplied
    from ἔτι.
- source_word: ἐν σοὶ
  chosen: in you
  alternatives:
  - within you
  - in your midst
  lexicon: BDAG
  rationale: The addressee is personified Babylon/city. 'In you' preserves the direct
    second-person personification better than the more interpretive 'in your midst.'
- source_word: ἔτι
  chosen: again
  alternatives:
  - any longer
  - still
  lexicon: BDAG
  rationale: '''Again'' fits the idiom with the negated future clauses (''never ...
    again'') and communicates cessation clearly.'
- source_word: φωνὴ νυμφίου καὶ νύμφης
  chosen: the voice of bridegroom and bride
  alternatives:
  - the sound of bridegroom and bride
  - the voice of the groom and the bride
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' 'Voice' preserves the lexical form
    and echoes prophetic judgment language. 'Bridegroom' is retained as a biblical
    and still understandable term.
- source_word: οὐ μὴ ἀκουσθῇ
  chosen: will never be heard
  alternatives:
  - will certainly not be heard
  - will no longer be heard
  lexicon: BDAG
  rationale: Again, οὐ μή with subjunctive gives emphatic negation. Passive 'be heard'
    reflects the Greek passive naturally.
- source_word: οἱ ἔμποροί σου
  chosen: your merchants
  alternatives:
  - your traders
  lexicon: BDAG
  rationale: ἔμπορος refers to merchants engaged in trade. 'Merchants' fits the commercial
    imagery of Revelation 18.
- source_word: οἱ μεγιστᾶνες τῆς γῆς
  chosen: the great ones of the earth
  alternatives:
  - the magnates of the earth
  - the nobles of the earth
  lexicon: BDAG
  rationale: μεγιστᾶνες denotes leading or powerful people. 'Great ones' is broad,
    readable, and avoids over-specifying either political nobility or commercial tycoons,
    while fitting the context of worldly prominence.
- source_word: ἐν τῇ φαρμακείᾳ σου
  chosen: by your sorcery
  alternatives:
  - by your magic arts
  - by your witchcraft
  lexicon: BDAG
  rationale: φαρμακεία can denote sorcery/magic arts, historically linked with potions/spells.
    'Sorcery' is the clearest and most established rendering in this apocalyptic judgment
    context without narrowing it merely to drug use.
- source_word: ἐπλανήθησαν
  chosen: were led astray
  alternatives:
  - were deceived
  - went astray
  lexicon: BDAG
  rationale: The passive form is best represented by 'were led astray' or 'were deceived.'
    'Were led astray' preserves the verbal connection to πλανάω ('to lead astray')
    and leaves room for both deception and seduction.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: BDAG
  rationale: In Revelation, ἔθνη commonly refers to the nations/peoples of the world.
    'All the nations' is the most natural collective rendering here.
