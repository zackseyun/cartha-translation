theological_decisions:
- issue: Rendering φαρμακεία in an apocalyptic judgment context
  chosen_reading: sorcery
  alternative_readings:
  - magic arts
  - witchcraft
  rationale: The term can carry associations with magical practices and potions, but
    the context concerns Babylon's deceptive spiritual corruption of the nations.
    'Sorcery' best preserves that broader moral-religious sense without importing
    a modern reduction to pharmaceuticals.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the repeated οὐ μή clauses
  chosen_reading: will never ... again
  alternative_readings:
  - will no longer ...
  - will certainly not ...
  rationale: The verse announces irreversible judgment on Babylon. Rendering the emphatic
    negation as 'will never ... again' preserves the finality without awkward literalism.
  doctrine_reference: Translation philosophy §6
