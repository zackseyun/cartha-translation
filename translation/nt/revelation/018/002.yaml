theological_decisions:
- issue: Whether θηρίου should be rendered as the apocalyptic title 'Beast' or the
    common noun 'beast'
  chosen_reading: common noun 'beast'
  alternative_readings:
  - Beast
  rationale: In this context θηρίου is part of a triad with 'unclean spirit' and 'unclean
    bird,' each modified by παντός ('every'). This favors the generic sense of unclean
    animals rather than the singular symbolic antagonist elsewhere in Revelation.
    Capitalizing it as 'Beast' would import a specific theological identification
    not demanded by the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: How to render φυλακή in this apocalyptic judgment scene
  chosen_reading: prison
  alternative_readings:
  - haunt
  - hold
  rationale: The term can mean prison, guard, watch, or place of keeping. Traditional
    'haunt' captures the eerie effect but is less transparent to the Greek's core
    sense. 'Prison' keeps the lexical value visible while still fitting the image
    of Babylon as a place given over to uncleanness and confinement.
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
