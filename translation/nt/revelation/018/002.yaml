id: REV.18.2
reference: Revelation 18:2
source:
  edition: SBLGNT
  text: καὶ ἔκραξεν ⸀ἐν ἰσχυρᾷ φωνῇ λέγων· Ἔπεσεν, ⸀ἔπεσεν Βαβυλὼν ἡ μεγάλη, καὶ ἐγένετο
    κατοικητήριον ⸀δαιμονίων καὶ φυλακὴ παντὸς πνεύματος ἀκαθάρτου καὶ φυλακὴ παντὸς
    ὀρνέου ἀκαθάρτου ⸂καὶ φυλακὴ παντὸς θηρίου ἀκαθάρτου⸃ καὶ μεμισημένου,
translation:
  text: And he cried out with a mighty voice, saying, “Fallen, fallen is Babylon the
    great! She has become a dwelling place of demons, a prison of every unclean spirit,
    a prison of every unclean bird, and a prison of every unclean and hated beast.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a haunt of every unclean spirit ... every unclean bird ... every unclean
      and detested beast.' The Greek word translated 'prison' can also denote a place
      inhabited or frequented.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and a prison of every unclean and hated beast.'
    reason: textual_variant
lexical_decisions:
- source_word: ἔκραξεν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: Aorist of κράζω denotes a loud cry or shout. 'Cried out' is natural English
    and preserves the force without sounding overly colloquial.
- source_word: ἐν ἰσχυρᾷ φωνῇ
  chosen: with a mighty voice
  alternatives:
  - in a strong voice
  - with a loud voice
  lexicon: BDAG
  rationale: The prepositional phrase is instrumental/manner. 'Mighty voice' reflects
    ἰσχυρᾷ more distinctly than the flatter 'loud voice,' fitting Revelation's elevated
    style.
- source_word: Ἔπεσεν, ἔπεσεν
  chosen: Fallen, fallen
  alternatives:
  - It has fallen, it has fallen
  - Fell, fell
  lexicon: BDAG
  rationale: The repeated aorist is a prophetic proclamation echoing Isaianic judgment
    language. 'Fallen, fallen' is idiomatic in English and preserves the solemn, oracular
    cadence better than a fully explicit finite clause.
- source_word: Βαβυλὼν ἡ μεγάλη
  chosen: Babylon the great
  alternatives:
  - great Babylon
  lexicon: BDAG
  rationale: This preserves the appositional/title-like structure of the Greek and
    matches Revelation's recurring designation.
- source_word: ἐγένετο
  chosen: has become
  alternatives:
  - became
  - has come to be
  lexicon: BDAG
  rationale: English present perfect conveys the resultant state now in view after
    the fall announcement. This balances formal sense with readable English.
- source_word: κατοικητήριον
  chosen: dwelling place
  alternatives:
  - habitation
  - home
  lexicon: BDAG
  rationale: '''Dwelling place'' is clear modern English and preserves the sense of
    a place inhabited.'
- source_word: δαιμονίων
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: The noun specifically denotes demons; 'evil spirits' is interpretive
    and less direct.
- source_word: φυλακὴ
  chosen: prison
  alternatives:
  - haunt
  - hold
  - guardhouse
  lexicon: BDAG
  rationale: φυλακή can denote a place of confinement, watch, or guard. Here, with
    repeated genitives and apocalyptic imagery, 'prison' best captures the idea of
    a place where such beings are confined or kept. 'Haunt' is traditional in some
    English versions but is less directly lexical and more interpretive.
- source_word: παντὸς πνεύματος ἀκαθάρτου
  chosen: every unclean spirit
  alternatives:
  - every impure spirit
  lexicon: BDAG
  rationale: Standard rendering of apocalyptic/demonic terminology; 'unclean' preserves
    biblical intertextuality better than 'impure.'
- source_word: παντὸς ὀρνέου ἀκαθάρτου
  chosen: every unclean bird
  alternatives:
  - every impure bird
  lexicon: BDAG
  rationale: ὄρνεον is a bird, often in ominous or scavenging contexts, but the Greek
    itself is simply 'bird.' 'Unclean bird' preserves the cultic/judgment resonance.
- source_word: παντὸς θηρίου ἀκαθάρτου καὶ μεμισημένου
  chosen: every unclean and hated beast
  alternatives:
  - every unclean and detestable beast
  - every unclean and loathed beast
  lexicon: BDAG
  rationale: θηρίον here is best taken in its ordinary sense 'beast/animal,' not the
    technical apocalyptic 'Beast' of Revelation's antagonist, since it is governed
    by πᾶς and grouped with birds. μεμισημένου is a perfect passive participle, 'hated'
    or 'detested.' 'Hated' is the more direct lexical rendering; 'detestable' is smoother
    but shifts from passive/resultative sense to evaluative adjective.
