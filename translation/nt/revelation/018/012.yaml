id: REV.18.12
reference: Revelation 18:12
source:
  edition: SBLGNT
  text: γόμον χρυσοῦ καὶ ἀργύρου καὶ λίθου τιμίου καὶ ⸀μαργαριτῶν καὶ βυσσίνου καὶ
    ⸀πορφύρας καὶ σιρικοῦ καὶ κοκκίνου, καὶ πᾶν ξύλον θύϊνον καὶ πᾶν σκεῦος ἐλεφάντινον
    καὶ πᾶν σκεῦος ἐκ ξύλου τιμιωτάτου καὶ χαλκοῦ καὶ σιδήρου καὶ μαρμάρου,
translation:
  text: cargo of gold and silver and precious stone and pearls and fine linen and
    purple cloth and silk and scarlet cloth, and every kind of citron wood and every
    kind of ivory vessel and every kind of vessel made from most precious wood and
    bronze and iron and marble,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thyine wood,' a traditional rendering for a costly fragrant wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: γόμον
  chosen: cargo
  alternatives:
  - cargoes
  - merchandise
  lexicon: BDAG
  rationale: γόμος denotes a ship's load or freight. In this commercial lament context,
    'cargo' best captures the singular collective sense of the accusative object governed
    by the implied continuation from the previous verse.
- source_word: λίθου τιμίου
  chosen: precious stone
  alternatives:
  - precious stones
  - valuable stone
  lexicon: BDAG
  rationale: Although English often idiomatically uses the plural in such lists, the
    Greek is singular genitive coordinated with other material nouns under γόμον.
    'Precious stone' preserves the form while still functioning as a collective material
    term.
- source_word: μαργαριτῶν
  chosen: pearls
  lexicon: BDAG
  rationale: Standard lexical sense; plural should be retained.
- source_word: βυσσίνου
  chosen: fine linen
  alternatives:
  - linen
  - cloth of fine linen
  lexicon: BDAG
  rationale: βύσσινος refers to fine linen fabric. 'Fine linen' is clear, idiomatic,
    and preserves the luxury connotation.
- source_word: πορφύρας
  chosen: purple cloth
  alternatives:
  - purple
  - purple fabric
  lexicon: BDAG
  rationale: πορφύρα can denote purple dye, cloth, or garments. In a merchandise list,
    'purple cloth' makes the commercial object explicit in English.
- source_word: σιρικοῦ
  chosen: silk
  alternatives:
  - silken fabric
  lexicon: BDAG
  rationale: σιρικός refers to silk or silken goods associated with the East. 'Silk'
    is the natural English rendering in a trade inventory.
- source_word: κοκκίνου
  chosen: scarlet cloth
  alternatives:
  - scarlet
  - scarlet fabric
  lexicon: BDAG
  rationale: κόκκινος denotes scarlet material/color. As with πορφύρα, 'scarlet cloth'
    clarifies that a textile commodity is meant.
- source_word: πᾶν ξύλον θύϊνον
  chosen: every kind of citron wood
  alternatives:
  - every kind of thyine wood
  - every kind of scented wood
  lexicon: BDAG
  rationale: θύϊνος refers to costly fragrant wood, traditionally identified with
    citrus/citron wood used in luxury furnishings. 'Citron wood' gives a concrete
    modern equivalent; the more traditional 'thyine wood' is less transparent and
    is preserved in a footnote.
- source_word: πᾶν σκεῦος ἐλεφάντινον
  chosen: every kind of ivory vessel
  alternatives:
  - every ivory article
  - every kind of ivory object
  lexicon: BDAG
  rationale: σκεῦος is a broad term for vessel, object, or article. 'Vessel' is somewhat
    formal but preserves the lexical breadth and matches the repeated structure.
- source_word: πᾶν σκεῦος ἐκ ξύλου τιμιωτάτου
  chosen: every kind of vessel made from most precious wood
  alternatives:
  - every kind of article made from very costly wood
  - every kind of object of highly valued wood
  lexicon: BDAG
  rationale: τιμιωτάτου is the superlative of τίμιος, so 'most precious' reflects
    the Greek form more closely than simply 'costly.' 'Made from' renders ἐκ naturally.
- source_word: χαλκοῦ
  chosen: bronze
  alternatives:
  - copper
  lexicon: BDAG
  rationale: χαλκός can denote copper or bronze; in ancient luxury goods lists and
    common NT usage, 'bronze' is the more idiomatic and likely material reference.
- source_word: σιδήρου
  chosen: iron
  lexicon: BDAG
  rationale: Standard lexical rendering.
- source_word: μαρμάρου
  chosen: marble
  lexicon: BDAG
  rationale: Standard lexical rendering for the stone material.
