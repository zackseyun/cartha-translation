theological_decisions:
- issue: Scope of maritime groups listed in lament over Babylon
  chosen_reading: Render the groups distinctly without collapsing them into a single
    class
  alternative_readings:
  - Treat 'everyone sailing to a place' as a gloss for merchants or passengers
  - Harmonize the list into 'all seafarers'
  rationale: The Greek presents multiple coordinated groups affected by Babylon's
    fall. Preserving the distinctions reflects the text's rhetoric of comprehensive
    economic loss without adding interpretive specificity beyond the wording.
  doctrine_reference: Translation philosophy items 1, 3, and 5
