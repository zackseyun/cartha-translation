id: REV.18.17
reference: Revelation 18:17
source:
  edition: SBLGNT
  text: ὅτι μιᾷ ὥρᾳ ἠρημώθη ὁ τοσοῦτος πλοῦτος. Καὶ πᾶς κυβερνήτης καὶ πᾶς ὁ ἐπὶ τόπον
    πλέων, καὶ ναῦται καὶ ὅσοι τὴν θάλασσαν ἐργάζονται, ἀπὸ μακρόθεν ἔστησαν
translation:
  text: for in one hour such great wealth has been laid waste. And every shipmaster,
    and everyone sailing to a place, and sailors, and as many as work the sea, stood
    far off
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone sailing for a port' or 'everyone who sails anywhere.' The Greek
      phrase is somewhat idiomatic and may refer broadly to those traveling by sea
      to destinations.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content/reason for the lament in the surrounding context.
    'For' fits the explanatory force in English and connects naturally to the preceding
    cry.
- source_word: μιᾷ ὥρᾳ
  chosen: in one hour
  alternatives:
  - within one hour
  - in a single hour
  lexicon: BDAG
  rationale: Dative of time; 'in one hour' is the standard and natural rendering,
    preserving the suddenness of judgment without overinterpreting the exact duration.
- source_word: ἠρημώθη
  chosen: has been laid waste
  alternatives:
  - was made desolate
  - has been devastated
  lexicon: BDAG
  rationale: The verb ἐρημόομαι carries the sense of being devastated or made desolate.
    'Has been laid waste' preserves the ruin/desolation nuance and reads idiomatically
    in English.
- source_word: ὁ τοσοῦτος πλοῦτος
  chosen: such great wealth
  alternatives:
  - so much wealth
  - this great wealth
  lexicon: BDAG
  rationale: τοσοῦτος intensifies the noun, pointing to the magnitude of the wealth.
    'Such great wealth' captures both the demonstrative/intensive force and the lamenting
    tone.
- source_word: πᾶς κυβερνήτης
  chosen: every shipmaster
  alternatives:
  - every pilot
  - every captain
  lexicon: BDAG
  rationale: κυβερνήτης in maritime context refers to one who steers or commands a
    ship. 'Shipmaster' is precise and suitably elevated; 'pilot' may sound too technical
    or limited, and 'captain' is possible but slightly less tied to the steering/nautical
    term.
- source_word: πᾶς ὁ ἐπὶ τόπον πλέων
  chosen: everyone sailing to a place
  alternatives:
  - everyone who sails anywhere
  - every passenger
  - everyone sailing for a port
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic and likely denotes those traveling by
    sea to destinations/ports. 'Everyone sailing to a place' stays close to the Greek
    without importing a narrower category not explicit in the text. A more idiomatic
    alternative is preserved in a footnote.
- source_word: ναῦται
  chosen: sailors
  alternatives:
  - seamen
  lexicon: BDAG
  rationale: '''Sailors'' is the clear modern English equivalent; ''seamen'' is older
    and less natural for contemporary readers.'
- source_word: ὅσοι τὴν θάλασσαν ἐργάζονται
  chosen: as many as work the sea
  alternatives:
  - all who make their living from the sea
  - all who ply their trade on the sea
  lexicon: BDAG
  rationale: The expression is broader than sailors alone and refers to those whose
    labor/business is connected with the sea. 'Work the sea' is a fairly literal rendering
    that preserves the imagery and breadth of the Greek.
- source_word: ἀπὸ μακρόθεν
  chosen: far off
  alternatives:
  - from a distance
  - at a distance
  lexicon: BDAG
  rationale: A standard idiomatic rendering in English, preserving the spatial separation
    and the fearful stance of the onlookers.
- source_word: ἔστησαν
  chosen: stood
  alternatives:
  - took their stand
  - were standing
  lexicon: BDAG
  rationale: Aorist active indicative, narrating the action simply. 'Stood' is concise
    and natural; the following verse continues their lament from this position.
