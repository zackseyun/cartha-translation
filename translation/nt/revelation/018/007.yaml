id: REV.18.7
reference: Revelation 18:7
source:
  edition: SBLGNT
  text: ὅσα ἐδόξασεν αὑτὴν καὶ ἐστρηνίασεν, τοσοῦτον δότε αὐτῇ βασανισμὸν καὶ πένθος.
    ὅτι ἐν τῇ καρδίᾳ αὐτῆς λέγει ὅτι Κάθημαι βασίλισσα, καὶ χήρα οὐκ εἰμί, καὶ πένθος
    οὐ μὴ ἴδω.
translation:
  text: As much as she glorified herself and lived in luxury, give her that much torment
    and mourning. For she says in her heart, ‘I sit as a queen, and I am not a widow,
    and I will certainly never see mourning.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived self-indulgently' or 'lived sensuously.' The Greek verb can denote
      luxurious, wanton living.
    reason: lexical_alternative
  - marker: b
    text: The expression 'I will certainly never see mourning' uses an emphatic Greek
      negation, expressing strong confidence that mourning will never come.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα ... τοσοῦτον
  chosen: As much as ... that much
  alternatives:
  - To the degree that ... to that degree
  - As greatly as ... so much
  lexicon: BDAG
  rationale: Preserves the correlative comparative structure of the Greek, expressing
    proportional retribution without sounding wooden in English.
- source_word: ἐδόξασεν αὑτὴν
  chosen: she glorified herself
  alternatives:
  - she made herself glorious
  - she honored herself
  lexicon: BDAG
  rationale: 'The reflexive construction is explicit and important: Babylon is self-exalting.
    ''Glorified herself'' preserves the verbal link to glory/exaltation better than
    the flatter ''honored herself.'''
- source_word: ἐστρηνίασεν
  chosen: lived in luxury
  alternatives:
  - lived sensuously
  - indulged herself
  - lived self-indulgently
  lexicon: BDAG
  rationale: The verb denotes luxurious, wanton, self-indulgent living. 'Lived in
    luxury' is clear modern English and fits the economic-royal context of Revelation
    18, while avoiding oversexualizing the term in this verse.
- source_word: δότε αὐτῇ
  chosen: give her
  alternatives:
  - pay her
  - render to her
  lexicon: BDAG
  rationale: A straightforward imperative matching the judicial tone. 'Give her' works
    naturally with the following direct objects 'torment and mourning.'
- source_word: βασανισμὸν
  chosen: torment
  alternatives:
  - torture
  - pain
  lexicon: BDAG
  rationale: In Revelation this term regularly carries the sense of severe torment
    under judgment. 'Torment' is the most contextually fitting and established rendering
    without narrowing to physical torture alone.
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: BDAG
  rationale: The noun denotes mourning, especially in response to loss or judgment.
    'Mourning' fits both occurrences in the verse and preserves the thematic repetition.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς λέγει
  chosen: she says in her heart
  alternatives:
  - she says to herself
  - she says within herself
  lexicon: BDAG
  rationale: This is a conventional biblical idiom for inward self-assurance or self-talk.
    Retaining 'in her heart' preserves the scriptural idiom and the moral-theological
    dimension of inner pride.
- source_word: Κάθημαι βασίλισσα
  chosen: I sit as a queen
  alternatives:
  - I sit a queen
  - I am enthroned as queen
  lexicon: BDAG
  rationale: '''Sit as a queen'' preserves the present posture/image of enthroned
    royal security. It is more idiomatic in modern English than the more literal ''sit
    a queen'' while keeping the metaphor.'
- source_word: χήρα οὐκ εἰμί
  chosen: I am not a widow
  alternatives:
  - I am no widow
  lexicon: BDAG
  rationale: A direct and natural rendering. The widow image conveys supposed invulnerability
    to loss and abandonment.
- source_word: οὐ μὴ ἴδω
  chosen: I will certainly never see
  alternatives:
  - I will never see
  - I shall surely not see
  lexicon: BDAG
  rationale: The emphatic negation οὐ μὴ with the aorist subjunctive is stronger than
    a simple future negation. 'Will certainly never' captures the force of Babylon's
    boastful certainty.
