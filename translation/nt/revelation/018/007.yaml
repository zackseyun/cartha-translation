theological_decisions:
- issue: Personification of Babylon as a woman/queen/widow
  chosen_reading: Retain the feminine singular personification throughout ('she,'
    'queen,' 'widow').
  alternative_readings:
  - Flatten to an impersonal city/economic system
  rationale: The Greek consistently personifies Babylon as a woman, and the imagery
    is central to Revelation's prophetic rhetoric. Preserving the feminine imagery
    maintains the literary and theological force of arrogant self-exaltation followed
    by judgment.
  doctrine_reference: Translation philosophy §1, §5
- issue: Judgment language in βασανισμός
  chosen_reading: Use 'torment' in the main text.
  alternative_readings:
  - torture
  - pain
  rationale: The verse depicts divine/judicial recompense in proportion to Babylon's
    self-glorification and luxury. 'Torment' preserves the severity of judgment without
    importing a narrower mechanism than the text states.
  doctrine_reference: Translation philosophy §1, §6
