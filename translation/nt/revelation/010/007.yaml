theological_decisions:
- issue: Rendering of δοῦλος in reference to God's prophets
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: Following the doctrine's contested-terms guidance, δοῦλος may be rendered
    'servant' or 'slave' context-dependently. Because ἑαυτοῦ underscores divine ownership
    and covenantal commission, 'slaves' better preserves the bonded relation, while
    an alternative is preserved in a footnote for readers sensitive to English connotations.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1 and §5'
- issue: Force of ἐτελέσθη with μυστήριον
  chosen_reading: was fulfilled
  alternative_readings:
  - was finished
  - was completed
  rationale: The phrase concerns the realization of God's redemptive/apocalyptic purpose,
    not merely cessation. 'Was fulfilled' preserves that theological nuance without
    importing a specific eschatological system.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
