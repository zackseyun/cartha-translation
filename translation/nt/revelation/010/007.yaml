id: REV.10.7
reference: Revelation 10:7
source:
  edition: SBLGNT
  text: ἀλλ’ ἐν ταῖς ἡμέραις τῆς φωνῆς τοῦ ἑβδόμου ἀγγέλου, ὅταν μέλλῃ σαλπίζειν,
    καὶ ἐτελέσθη τὸ μυστήριον τοῦ θεοῦ, ὡς εὐηγγέλισεν τοὺς ⸂ἑαυτοῦ δούλους⸃ τοὺς
    προφήτας.
translation:
  text: but in the days of the voice of the seventh angel, when he is about to sound
    the trumpet, then the mystery of God was fulfilled, just as he proclaimed the
    good news to his own slaves, the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own servants.' The Greek word can mean 'servants' or 'slaves'; here
      it emphasizes belonging to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - however
  lexicon: BDAG
  rationale: Adversative conjunction linking this statement with the preceding delay;
    'but' is the most natural concise English equivalent.
- source_word: ἐν ταῖς ἡμέραις
  chosen: in the days
  alternatives:
  - during the days
  lexicon: BDAG
  rationale: A fairly formal temporal expression; 'in the days' preserves the apocalyptic
    register without becoming unnatural.
- source_word: τῆς φωνῆς τοῦ ἑβδόμου ἀγγέλου
  chosen: of the voice of the seventh angel
  alternatives:
  - of the sounding of the seventh angel
  - of the seventh angel's voice
  lexicon: BDAG
  rationale: φωνή is literally 'voice' or 'sound.' Retaining 'voice' preserves the
    Greek wording and the likely connection to the angel's trumpet announcement. A
    more interpretive rendering like 'sounding' would collapse φωνή into the trumpet
    action too quickly.
- source_word: ὅταν μέλλῃ σαλπίζειν
  chosen: when he is about to sound the trumpet
  alternatives:
  - when he is about to trumpet
  - when he is about to blow the trumpet
  lexicon: BDAG
  rationale: μέλλῃ + infinitive conveys imminence ('is about to'). σαλπίζω in this
    context refers to sounding a trumpet; English idiom requires the object 'the trumpet'
    though it is implicit in the verb.
- source_word: καὶ ἐτελέσθη
  chosen: then ... was fulfilled
  alternatives:
  - and ... was finished
  - and ... was completed
  lexicon: BDAG
  rationale: Aorist passive of τελέω can mean 'was finished/completed/fulfilled.'
    With 'the mystery of God' in salvation-historical context, 'was fulfilled' best
    conveys the bringing to realization of God's hidden plan. 'Then' is supplied to
    make the temporal sequence clear in English.
- source_word: τὸ μυστήριον τοῦ θεοῦ
  chosen: the mystery of God
  alternatives:
  - God's mystery
  - the secret purpose of God
  lexicon: BDAG
  rationale: μυστήριον is a key theological term often meaning a divine purpose once
    hidden and now disclosed. 'Mystery' preserves the established biblical term without
    over-paraphrasing.
- source_word: ὡς εὐηγγέλισεν
  chosen: just as he proclaimed the good news
  alternatives:
  - just as he announced
  - just as he declared the gospel to
  lexicon: BDAG
  rationale: εὐαγγελίζω means 'proclaim good news.' Rendering it verbally rather than
    with the noun 'gospel' keeps the clause natural in English while preserving the
    evangel/good-news sense.
- source_word: τοὺς ἑαυτοῦ δούλους
  chosen: his own slaves
  alternatives:
  - his own servants
  - his own bondservants
  lexicon: BDAG
  rationale: δοῦλος is a contested term in the project. Here the prophets are explicitly
    God's owned agents ('his own'), and the bonded relation is salient enough to prefer
    'slaves' per doctrine guidance, while preserving 'servants' as an alternative
    in a footnote.
- source_word: τοὺς προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Appositional accusative identifying which slaves are in view. 'The prophets'
    is straightforward and should be retained explicitly.
