theological_decisions:
- issue: Rendering γῆ in apocalyptic imagery
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The immediate image is the angel physically standing with one foot on
    the sea and one on the terrestrial counterpart. 'Land' better fits the scene without
    making an unnecessary cosmological claim. 'Earth' remains possible and is preserved
    in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering βιβλίον in continuity with the surrounding context
  chosen_reading: scroll
  alternative_readings:
  - little scroll
  - book
  rationale: The noun itself is βιβλίον, best rendered 'scroll' in this literary-historical
    setting. Because the surrounding context repeatedly uses the diminutive βιβλαρίδιον
    ('little scroll'), some translations harmonize here. To avoid importing surrounding
    wording into this verse, the main text keeps 'scroll' and preserves 'little scroll'
    in a footnote.
  doctrine_reference: Translation philosophy §1, §5
