id: REV.10.8
reference: Revelation 10:8
source:
  edition: SBLGNT
  text: Καὶ ἡ φωνὴ ἣν ἤκουσα ἐκ τοῦ οὐρανοῦ, πάλιν ⸀λαλοῦσαν μετ’ ἐμοῦ καὶ ⸀λέγουσαν·
    Ὕπαγε λάβε τὸ ⸀βιβλίον τὸ ἠνεῳγμένον ἐν τῇ χειρὶ τοῦ ἀγγέλου τοῦ ἑστῶτος ἐπὶ τῆς
    θαλάσσης καὶ ἐπὶ τῆς γῆς.
translation:
  text: And the voice that I heard from heaven spoke with me again and said, “Go,
    take the scroll that is opened in the hand of the angel who is standing on the
    sea and on the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “little scroll”; the surrounding context uses a diminutive form in nearby
      verses, but this verse reads βιβλίον, “scroll.”
    reason: alternative_reading
  - marker: b
    text: Or “earth” for “land.”
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: φωνή here refers to a speaking voice from heaven, not merely a sound;
    'voice' preserves the personal, communicative force.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: 'πάλιν marks repeated action: the heavenly voice addresses John another
    time. ''Again'' is the most natural concise rendering.'
- source_word: λαλοῦσαν μετ’ ἐμοῦ
  chosen: spoke with me
  alternatives:
  - was speaking with me
  - spoke to me
  lexicon: BDAG
  rationale: The participle with μετά + genitive naturally conveys speaking with someone.
    'Spoke with me' is idiomatic and preserves the relational sense better than the
    more directional 'to me.'
- source_word: λέγουσαν
  chosen: said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: English normally converts the attendant participle into a finite verb
    after 'voice ... spoke'; 'said' is natural and faithful.
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: In command form here, ὕπαγε functions as a straightforward directive
    to go. 'Go' is sufficient without adding nuance not demanded by the context.
- source_word: λάβε
  chosen: take
  alternatives:
  - receive
  - take hold of
  lexicon: BDAG
  rationale: λάβε is aorist imperative of λαμβάνω, here a direct command to take the
    object from the angel's hand. 'Take' is the plain sense.
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  - little scroll
  lexicon: BDAG
  rationale: In Revelation, βιβλίον commonly denotes a scroll rather than a codex-style
    book. Although context from the surrounding passage speaks of a small scroll,
    this verse's text reads βιβλίον without the diminutive; therefore 'scroll' is
    preferred, while 'little scroll' is preserved as an alternative in a footnote
    due to contextual and textual considerations.
- source_word: ἠνεῳγμένον
  chosen: is opened
  alternatives:
  - has been opened
  - open
  lexicon: BDAG
  rationale: The perfect passive participle denotes a state resulting from prior opening.
    'Is opened' preserves the resultant state more formally than simply 'open,' while
    remaining readable.
- source_word: ἐν τῇ χειρὶ
  chosen: in the hand
  alternatives:
  - from the hand
  - in his hand
  lexicon: BDAG
  rationale: The Greek preposition is ἐν, literally 'in,' and the phrase describes
    the scroll's location in the angel's hand. 'In the hand' stays close to the source;
    the taking 'from' the hand is implied by context but not explicit in this phrase.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation's visionary context, ἄγγελος clearly refers to a heavenly
    angelic being, not a human messenger.
- source_word: ἑστῶτος
  chosen: who is standing
  alternatives:
  - standing
  - who stood
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι conveys a standing posture/state.
    'Who is standing' expresses the ongoing state in natural English.
- source_word: ἐπὶ τῆς θαλάσσης καὶ ἐπὶ τῆς γῆς
  chosen: on the sea and on the land
  alternatives:
  - on the sea and on the earth
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here, paired with 'sea' and describing
    the angel's stance, 'land' better captures the spatial contrast. Repeating 'on'
    reflects the Greek structure and the vivid imagery.
