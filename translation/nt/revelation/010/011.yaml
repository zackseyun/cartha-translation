id: REV.10.11
reference: Revelation 10:11
source:
  edition: SBLGNT
  text: Καὶ λέγουσίν μοι· Δεῖ σε πάλιν προφητεῦσαι ἐπὶ λαοῖς ⸀καὶ ἔθνεσιν καὶ γλώσσαις
    καὶ βασιλεῦσιν πολλοῖς.
translation:
  text: And they say to me, “You must prophesy again about many peoples and nations
    and languages and kings.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before many peoples and nations and languages and kings”; ἐπὶ with the
      dative can also be understood in an audience-oriented sense here.
    reason: alternative_reading
  - marker: b
    text: Or “against many peoples and nations and languages and kings”; the preposition
      may also carry an adversative nuance in some contexts, though that is not required
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσίν
  chosen: they say
  alternatives:
  - they tell
  - they are saying
  lexicon: BDAG
  rationale: 'Present tense is naturally rendered as vivid present in English narrative:
    ''they say to me.'' ''Tell'' is possible but ''say'' more directly reflects λέγω
    without adding nuance.'
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: Dative pronoun after λέγω is best expressed in English with 'to me.'
- source_word: Δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is required
  lexicon: BDAG
  rationale: Conveys divine or compelling necessity in idiomatic modern English. 'Must'
    is concise and preserves the force of necessity.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense; 'again' is the most natural and direct rendering.
- source_word: προφητεῦσαι
  chosen: prophesy
  alternatives:
  - prophesy forth
  - speak prophetically
  lexicon: BDAG
  rationale: 'The infinitive after Δεῖ is best rendered with English infinitive sense:
    ''must prophesy.'' This preserves the prophetic function without paraphrase.'
- source_word: ἐπὶ
  chosen: about
  alternatives:
  - concerning
  - against
  - before
  - over
  lexicon: BDAG
  rationale: With the dative plural objects here, ἐπί can indicate reference or sphere.
    In this context, 'about' best captures the content-direction of John's prophetic
    message concerning these groups. 'Before' would emphasize audience, and 'against'
    would over-specify judgment, neither of which is demanded by the preposition alone.
- source_word: λαοῖς
  chosen: peoples
  alternatives:
  - peoples groups
  - peoples/tribes
  lexicon: BDAG
  rationale: Plural 'peoples' preserves the distinct collective groups indicated by
    λαοί and matches Revelation's recurring multinational formula.
- source_word: ἔθνεσιν
  chosen: nations
  alternatives:
  - Gentiles
  - ethnic groups
  lexicon: BDAG
  rationale: In Revelation's stock list, ἔθνη is best rendered 'nations.' 'Gentiles'
    would be too specifically Jewish-Gentile in nuance here.
- source_word: γλώσσαις
  chosen: languages
  alternatives:
  - tongues
  lexicon: BDAG
  rationale: Readable modern English favors 'languages.' 'Tongues' is traditional
    but can mislead modern readers toward glossolalia rather than language groups.
- source_word: βασιλεῦσιν πολλοῖς
  chosen: many kings
  alternatives:
  - kings, many of them
  - many rulers
  lexicon: BDAG
  rationale: Straightforward rendering of noun plus attributive adjective. 'Kings'
    preserves the monarchical/political title more exactly than 'rulers.'
