theological_decisions:
- issue: Scope of ἐπὶ with the four dative plurals
  chosen_reading: about many peoples and nations and languages and kings
  alternative_readings:
  - before many peoples and nations and languages and kings
  - against many peoples and nations and languages and kings
  rationale: The preposition ἐπί with the dative here is semantically flexible. In
    context, the command concerns the content and scope of John's prophetic witness
    rather than merely the audience before whom he speaks or an exclusively adversative
    message. 'About' preserves that breadth without narrowing the prophecy to condemnation
    alone.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
