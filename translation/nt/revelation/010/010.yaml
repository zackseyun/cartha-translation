id: REV.10.10
reference: Revelation 10:10
source:
  edition: SBLGNT
  text: καὶ ἔλαβον τὸ ⸀βιβλαρίδιον ἐκ τῆς χειρὸς τοῦ ἀγγέλου καὶ κατέφαγον αὐτό, καὶ
    ἦν ἐν τῷ στόματί μου ὡς μέλι γλυκύ· καὶ ὅτε ἔφαγον αὐτό, ἐπικράνθη ἡ κοιλία μου.
translation:
  text: And I took the little scroll from the hand of the angel and ate it, and in
    my mouth it was sweet like honey; and when I had eaten it, my stomach was made
    bitter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "little book." The Greek term is a diminutive and may denote a small
      written document; "little scroll" best fits the likely ancient form.
    reason: lexical_alternative
  - marker: b
    text: Or "my belly became bitter."
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλαρίδιον
  chosen: little scroll
  alternatives:
  - small scroll
  - little book
  lexicon: BDAG
  rationale: The diminutive form suggests a smaller written roll. 'Little scroll'
    preserves both the likely physical form and the diminutive nuance better than
    the traditional 'little book,' which can sound anachronistic.
- source_word: ἐκ τῆς χειρὸς τοῦ ἀγγέλου
  chosen: from the hand of the angel
  alternatives:
  - out of the angel's hand
  lexicon: BDAG
  rationale: A straightforward formal rendering of the prepositional phrase that preserves
    the vivid imagery of receiving the scroll directly from the angel.
- source_word: κατέφαγον
  chosen: ate
  alternatives:
  - devoured
  lexicon: BDAG
  rationale: Although the compound verb can intensify the action, English 'ate' is
    sufficient and natural here, especially since the symbolic act itself already
    carries force. 'Devoured' would risk overstating the tone.
- source_word: ὡς μέλι γλυκύ
  chosen: sweet like honey
  alternatives:
  - as sweet as honey
  - sweet as honey
  lexicon: BDAG
  rationale: This preserves the comparison naturally in English. 'Like honey' closely
    reflects ὡς while remaining idiomatic.
- source_word: ὅτε ἔφαγον αὐτό
  chosen: when I had eaten it
  alternatives:
  - when I ate it
  lexicon: BDAG
  rationale: 'The English pluperfect helps mark the sequence clearly: after the eating,
    the bitterness followed. This is a stylistic choice for clarity rather than a
    claim about a distinct Greek tense value beyond the aorist narrative sequence.'
- source_word: ἐπικράνθη
  chosen: was made bitter
  alternatives:
  - became bitter
  - was embittered
  lexicon: BDAG
  rationale: The passive form is preserved with 'was made bitter.' This keeps the
    Greek voice visible and avoids flattening it into a simple intransitive change,
    while still sounding natural enough in English.
- source_word: κοιλία
  chosen: stomach
  alternatives:
  - belly
  - abdomen
  lexicon: BDAG
  rationale: '''Stomach'' is clear modern English and fits the bodily sense here.
    ''Belly'' is possible and more traditional, but can sound either overly colloquial
    or archaic depending on audience.'
