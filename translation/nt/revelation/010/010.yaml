theological_decisions:
- issue: Symbolic act of eating the scroll
  chosen_reading: Render the imagery plainly without interpretive expansion.
  alternative_readings:
  - Interpret the sweetness and bitterness explicitly in the translation as joy and
    judgment
  rationale: The verse presents prophetic symbolism but does not itself explain all
    its theological implications. Following the translation philosophy, the wording
    preserves the image and tension without importing an interpretation into the main
    text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
