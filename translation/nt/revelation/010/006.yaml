theological_decisions:
- issue: Meaning of χρόνος in the oath formula
  chosen_reading: χρόνος means 'delay' or 'waiting period,' not the end of time itself
  alternative_readings:
  - '''time will be no more'''
  - '''there will be no more time'''
  rationale: The phrase has often been rendered traditionally as 'time no longer will
    be,' but in context the angel announces that the period of delay before God's
    final action has ended, as clarified by the next verse. Rendering it as 'delay'
    preserves the likely sense without importing a doctrine that temporal succession
    itself ceases at this moment.
  doctrine_reference: Translation philosophy §§1, 3, 6
