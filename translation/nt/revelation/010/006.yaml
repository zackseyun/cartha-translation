id: REV.10.6
reference: Revelation 10:6
source:
  edition: SBLGNT
  text: καὶ ⸀ὤμοσεν τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων, ὃς ἔκτισεν τὸν οὐρανὸν καὶ
    τὰ ἐν αὐτῷ καὶ τὴν γῆν καὶ τὰ ἐν αὐτῇ καὶ τὴν θάλασσαν καὶ τὰ ἐν αὐτῇ, ὅτι χρόνος
    οὐκέτι ἔσται·
translation:
  text: and swore by the one who lives forever and ever, who created heaven and the
    things in it, and the earth and the things on it, and the sea and the things in
    it, that there will no longer be any delay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'time will be no more.' Here χρόνος is understood in
      context as 'delay'—that the waiting period before God's final action has ended.
    reason: alternative_reading
lexical_decisions:
- source_word: ὤμοσεν
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: BDAG
  rationale: Aorist of ὀμνύω denotes making an oath. 'Swore' is the most natural concise
    English rendering and fits the solemn apocalyptic scene.
- source_word: τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: by the one who lives forever and ever
  alternatives:
  - by him who lives for the ages of the ages
  - by the living one forever and ever
  lexicon: BDAG
  rationale: The dative after ὀμνύω indicates the one by whom the oath is sworn. The
    participle ζῶντι is substantival, so 'the one who lives' is clear modern English.
    εἰς τοὺς αἰῶνας τῶν αἰώνων is an idiom for unending duration; 'forever and ever'
    preserves the force idiomatically.
- source_word: ἔκτισεν
  chosen: created
  alternatives:
  - made
  lexicon: BDAG
  rationale: κτίζω commonly means 'create' in theological/cosmic contexts. 'Created'
    best reflects the Creator language of the verse.
- source_word: τὸν οὐρανὸν
  chosen: heaven
  alternatives:
  - the heaven
  - sky
  lexicon: BDAG
  rationale: Singular οὐρανός here refers to the cosmic realm in a creation formula.
    'Heaven' is the standard English equivalent in this context.
- source_word: τὰ ἐν αὐτῷ
  chosen: the things in it
  alternatives:
  - what is in it
  - everything in it
  lexicon: BDAG
  rationale: The neuter plural article with prepositional phrase is most literally
    'the things in it.' This preserves the repeated triadic structure of heaven/earth/sea
    and their contents.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In the cosmic creation triad heaven-earth-sea, γῆ clearly means 'earth,'
    not a local 'land.'
- source_word: θάλασσαν
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: BDAG
  rationale: θάλασσα is straightforwardly 'sea.' Retaining the singular matches the
    Greek and the creation formula.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'After a verb of swearing, ὅτι introduces the content of the oath: ''that...''
    rather than a causal clause.'
- source_word: χρόνος οὐκέτι ἔσται
  chosen: there will no longer be any delay
  alternatives:
  - time will be no more
  - there will be no more time
  lexicon: BDAG
  rationale: In this apocalyptic context χρόνος is best understood as 'delay' rather
    than the cessation of temporal existence. The immediate context in v. 7 speaks
    of the fulfillment of God's mystery, supporting the sense that the waiting period
    is over. This avoids a misleading cosmological reading while still reflecting
    the oath's force.
