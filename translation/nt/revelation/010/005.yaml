id: REV.10.5
reference: Revelation 10:5
source:
  edition: SBLGNT
  text: καὶ ὁ ἄγγελος, ὃν εἶδον ἑστῶτα ἐπὶ τῆς θαλάσσης καὶ ἐπὶ τῆς γῆς, ἦρεν τὴν
    χεῖρα αὐτοῦ τὴν δεξιὰν εἰς τὸν οὐρανόν,
translation:
  text: And the angel whom I saw standing on the sea and on the land raised his right
    hand to heaven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the earth' for 'on the land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'toward heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Revelation the referent is a heavenly being, so 'angel' is the natural
    and contextually specific rendering rather than the more general 'messenger'.
- source_word: ἑστῶτα
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι here describes the angel's present
    posture/state. English idiom is best served by 'standing' rather than a more wooden
    'having stood.'
- source_word: ἐπὶ τῆς θαλάσσης
  chosen: on the sea
  alternatives:
  - upon the sea
  - on the waters
  lexicon: BDAG
  rationale: ἐπί with the genitive here is most naturally rendered 'on/upon.' 'On
    the sea' preserves the vivid imagery from the Greek and matches the prior context.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - on the earth
  - upon the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'ground,' or 'land.' In contrast with 'sea' in this
    immediate scene, 'land' best captures the spatial contrast intended by the vision.
- source_word: ἦρεν
  chosen: raised
  alternatives:
  - lifted up
  lexicon: BDAG
  rationale: αἴρω commonly means 'raise' or 'lift.' 'Raised' is concise, natural English
    and fits the solemn oath gesture in context.
- source_word: τὴν χεῖρα αὐτοῦ τὴν δεξιὰν
  chosen: his right hand
  alternatives:
  - his right arm
  - his hand, the right one
  lexicon: BDAG
  rationale: The Greek explicitly specifies the hand and identifies it as the right
    one. 'His right hand' is the idiomatic equivalent and preserves the specificity.
- source_word: εἰς τὸν οὐρανόν
  chosen: to heaven
  alternatives:
  - toward heaven
  - into heaven
  - to the sky
  lexicon: BDAG
  rationale: In oath-taking imagery, εἰς with οὐρανός is well rendered 'to heaven,'
    indicating direction toward the heavenly realm. 'Sky' would flatten the theological
    register.
