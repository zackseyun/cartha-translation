theological_decisions:
- issue: Rendering γῆ in contrast with θάλασσα
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse depicts the angel's stance over two domains, sea and land.
    Rendering γῆ as 'land' preserves the immediate visual contrast without making
    a broader cosmological claim beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering οὐρανός
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: The gesture anticipates the oath by the eternal Creator in the next verse
    and carries theological weight beyond mere physical skyward motion. 'Heaven' preserves
    that register while remaining faithful to the Greek.
  doctrine_reference: Translation philosophy §1, §6
