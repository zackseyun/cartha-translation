theological_decisions:
- issue: Whether to make explicit the identity of the heavenly voice
  chosen_reading: a voice from heaven
  alternative_readings:
  - the voice of God from heaven
  - a heavenly voice
  rationale: The text states only that John heard 'a voice from heaven.' It does not
    explicitly identify the speaker as God. To preserve theological restraint and
    avoid importing a claim the verse does not make, the translation leaves the speaker
    unspecified.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
