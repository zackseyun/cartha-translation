id: REV.10.4
reference: Revelation 10:4
source:
  edition: SBLGNT
  text: καὶ ὅτε ἐλάλησαν αἱ ἑπτὰ βρονταί, ἤμελλον γράφειν· καὶ ἤκουσα φωνὴν ἐκ τοῦ
    οὐρανοῦ λέγουσαν· Σφράγισον ἃ ἐλάλησαν αἱ ἑπτὰ βρονταί, καὶ μὴ αὐτὰ γράψῃς.
translation:
  text: And when the seven thunders spoke, I was about to write; and I heard a voice
    from heaven saying, “Seal up what the seven thunders spoke, and do not write it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''do not write them''; the plural pronoun refers to the things spoken
      by the seven thunders, rendered collectively in English as ''it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησαν
  chosen: spoke
  alternatives:
  - uttered
  - said
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'utter.' 'Spoke' is natural modern English
    and preserves the verbal action without adding interpretive nuance.
- source_word: βρονταί
  chosen: thunders
  alternatives:
  - thunderclaps
  lexicon: BDAG
  rationale: βροντή is 'thunder.' Retaining 'thunders' reflects the personified/apocalyptic
    imagery in the Greek, where the seven thunders are treated as speaking agents.
- source_word: ἤμελλον γράφειν
  chosen: I was about to write
  alternatives:
  - I was going to write
  - I intended to write
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates imminence. 'I was about to write' best
    captures the sense that John was on the verge of writing when interrupted.
- source_word: φωνὴν ἐκ τοῦ οὐρανοῦ
  chosen: a voice from heaven
  alternatives:
  - a voice out of heaven
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the phrase. 'From heaven'
    is idiomatic English and preserves the heavenly source of the command.
- source_word: Σφράγισον
  chosen: Seal up
  alternatives:
  - Seal
  - Keep sealed
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive action. 'Seal up' is idiomatic
    in English for concealing or securing contents from disclosure, fitting the revelatory
    context.
- source_word: ἃ ἐλάλησαν αἱ ἑπτὰ βρονταί
  chosen: what the seven thunders spoke
  alternatives:
  - what the seven thunders said
  - the things that the seven thunders spoke
  lexicon: BDAG
  rationale: The neuter plural relative pronoun ἃ refers to the content of their speech.
    'What the seven thunders spoke' is concise and close to the Greek structure.
- source_word: μὴ αὐτὰ γράψῃς
  chosen: do not write it
  alternatives:
  - do not write them
  - you must not write it down
  lexicon: BDAG
  rationale: Although αὐτά is grammatically plural ('them'), in English the referent
    is the content as a collective whole. 'Do not write it' is the most natural rendering;
    the plural alternative is preserved in a footnote because the Greek form is plural.
