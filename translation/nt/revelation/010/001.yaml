id: REV.10.1
reference: Revelation 10:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ⸀ἄλλον ἄγγελον ἰσχυρὸν καταβαίνοντα ἐκ τοῦ οὐρανοῦ, περιβεβλημένον
    νεφέλην, καὶ ἡ ἶρις ἐπὶ ⸂τὴν κεφαλὴν⸃ αὐτοῦ, καὶ τὸ πρόσωπον αὐτοῦ ὡς ὁ ἥλιος,
    καὶ οἱ πόδες αὐτοῦ ὡς στῦλοι πυρός,
translation:
  text: And I saw another mighty angel coming down from heaven, clothed with a cloud,
    with the rainbow over his head, and his face was like the sun, and his feet like
    pillars of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another powerful angel.'
    reason: lexical_alternative
  - marker: b
    text: The Greek word can denote a radiant 'halo,' but 'rainbow' is the usual sense
      and fits Revelation's imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον ἄγγελον
  chosen: another angel
  alternatives:
  - another messenger
  lexicon: BDAG
  rationale: ἄγγελος can mean either 'angel' or 'messenger,' but in Revelation's visionary
    context and with the heavenly descent, 'angel' is the natural referent.
- source_word: ἰσχυρὸν
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: BDAG
  rationale: '''Mighty'' is idiomatic in apocalyptic description and preserves the
    sense of exceptional strength without sounding wooden.'
- source_word: καταβαίνοντα ἐκ τοῦ οὐρανοῦ
  chosen: coming down from heaven
  alternatives:
  - descending from heaven
  lexicon: BDAG
  rationale: The participle denotes downward movement from heaven. 'Coming down' is
    natural modern English and retains the vivid motion.
- source_word: περιβεβλημένον νεφέλην
  chosen: clothed with a cloud
  alternatives:
  - wrapped in a cloud
  - robed in a cloud
  lexicon: BDAG
  rationale: The perfect middle/passive participle of περιβάλλω conveys being clothed
    or enveloped. 'Clothed with a cloud' preserves the imagery and echoes biblical
    theophanic language.
- source_word: ἡ ἶρις
  chosen: the rainbow
  alternatives:
  - the halo
  lexicon: BDAG
  rationale: ἶρις ordinarily means 'rainbow.' Although some contexts allow a radiant
    halo-like sense, Revelation elsewhere uses rainbow imagery (cf. 4:3), so 'rainbow'
    is preferred.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  chosen: over his head
  alternatives:
  - upon his head
  - on his head
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates position over/upon the head. 'Over
    his head' reads naturally while preserving the image.
- source_word: τὸ πρόσωπον αὐτοῦ ὡς ὁ ἥλιος
  chosen: his face was like the sun
  alternatives:
  - his face like the sun
  lexicon: BDAG
  rationale: Supplying 'was' is required for smooth English. πρόσωπον is best rendered
    'face' here, referring to visible appearance.
- source_word: οἱ πόδες αὐτοῦ
  chosen: his feet
  alternatives:
  - his legs
  lexicon: BDAG
  rationale: πούς literally means 'foot,' but in some contexts can extend to the lower
    extremities. Here 'feet' is the standard and sufficiently inclusive of the imagery.
- source_word: στῦλοι πυρός
  chosen: pillars of fire
  alternatives:
  - columns of fire
  - fiery pillars
  lexicon: BDAG
  rationale: στῦλος means 'pillar' or 'column.' 'Pillars of fire' is the most recognizable
    and vivid English rendering, preserving the genitive imagery.
