theological_decisions:
- issue: Identity of the mighty angel
  chosen_reading: Render neutrally as 'another mighty angel' without identifying him
    as Messiah or a mere ordinary angel in the translation.
  alternative_readings:
  - a created angelic being
  - a manifestation of Messiah/Christ
  rationale: The Greek text identifies the figure simply as ἄλλον ἄγγελον ἰσχυρόν.
    Because interpreters dispute whether this is a created angel or a christophanic
    figure, the translation should preserve the text's wording and not resolve the
    interpretive question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
