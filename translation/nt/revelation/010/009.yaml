id: REV.10.9
reference: Revelation 10:9
source:
  edition: SBLGNT
  text: καὶ ⸀ἀπῆλθα πρὸς τὸν ἄγγελον λέγων αὐτῷ δοῦναί μοι τὸ ⸀βιβλαρίδιον. καὶ λέγει
    μοι· Λάβε καὶ κατάφαγε αὐτό, καὶ πικρανεῖ σου τὴν κοιλίαν, ἀλλ’ ἐν τῷ στόματί
    σου ἔσται γλυκὺ ὡς μέλι.
translation:
  text: So I went to the angel, telling him to give me the little scroll. And he says
    to me, “Take and eat it up, and it will make your stomach bitter, but in your
    mouth it will be sweet like honey.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'little book.' The Greek βιβλαρίδιον is a diminutive term and may denote
      a small scroll or booklet.
    reason: lexical_alternative
  - marker: b
    text: Or 'he said to me.' Greek uses a historical present ('he says') for vividness.
    reason: lexical_alternative
  - marker: c
    text: Or 'it will make your belly bitter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθα
  chosen: I went
  alternatives:
  - I went away
  - I came
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι here denotes John's movement toward the angel. 'I
    went' is natural English and fits πρὸς τὸν ἄγγελον. 'Went away' is too wooden
    in context, and 'came' would shift the deictic perspective.
- source_word: λέγων αὐτῷ δοῦναί μοι
  chosen: telling him to give me
  alternatives:
  - saying to him, 'Give me'
  - asking him to give me
  lexicon: BDAG
  rationale: The participle λέγων with infinitive δοῦναί expresses accompanying speech
    content. 'Telling him to give me' preserves the construction smoothly in English
    without overstating politeness as 'asking' might. A more formal 'saying to him'
    is possible but less idiomatic.
- source_word: βιβλαρίδιον
  chosen: little scroll
  alternatives:
  - small scroll
  - little book
  lexicon: BDAG
  rationale: The diminutive form suggests a small scroll/booklet. 'Little scroll'
    preserves both the likely physical form in the ancient context and the diminutive
    nuance better than traditional 'little book.'
- source_word: λέγει μοι
  chosen: he says to me
  alternatives:
  - he said to me
  lexicon: BDAG
  rationale: The present tense is a vivid historical present in narrative. Rendering
    it as 'he says to me' preserves the Greek's immediacy; English can bear this in
    apocalyptic narration.
- source_word: Λάβε
  chosen: Take
  alternatives:
  - Receive
  - Take it
  lexicon: BDAG
  rationale: Aorist imperative of λαμβάνω is straightforwardly 'Take.' The object
    is supplied in the following pronoun αὐτό, so adding 'it' here is unnecessary.
- source_word: κατάφαγε αὐτό
  chosen: eat it up
  alternatives:
  - eat it
  - devour it
  lexicon: BDAG
  rationale: The compound verb κατεσθίω intensifies the action beyond simple 'eat.'
    'Eat it up' captures the force naturally without becoming overly dramatic like
    'devour it.'
- source_word: πικρανεῖ σου τὴν κοιλίαν
  chosen: it will make your stomach bitter
  alternatives:
  - it will embitter your stomach
  - it will make your belly bitter
  lexicon: BDAG
  rationale: πικραίνω here means to cause bitterness. κοιλία can be 'belly' or 'stomach';
    'stomach' is more natural in contemporary English while still referring to the
    inner digestive organ.
- source_word: κοιλίαν
  chosen: stomach
  alternatives:
  - belly
  - inner parts
  lexicon: BDAG
  rationale: In this context of eating and digestion, the concrete bodily sense is
    primary. 'Stomach' communicates clearly for modern readers; 'belly' is possible
    but slightly more idiomatic/traditional than necessary.
- source_word: γλυκὺ ὡς μέλι
  chosen: sweet like honey
  alternatives:
  - sweet as honey
  lexicon: BDAG
  rationale: Both are valid. 'Sweet like honey' is slightly more natural in contemporary
    English while preserving the simile exactly.
