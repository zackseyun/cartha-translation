theological_decisions:
- issue: Symbolic act of eating the scroll
  chosen_reading: Retained the concrete command 'Take and eat it up' without interpreting
    its symbolism in the translation.
  alternative_readings:
  - Interpretive renderings that explain the act as internalizing God's message
  rationale: The verse presents a prophetic symbolic action, but the translation should
    not import an explanatory gloss into the main text. This preserves theological
    tension and lets the imagery stand as given.
  doctrine_reference: Translation philosophy §3
