theological_decisions:
- issue: Rendering γῆ in contrast with θάλασσα
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse depicts the angel's stance with one foot on the sea and the
    other on the dry land. Translating γῆ as 'land' preserves the immediate spatial
    contrast and avoids importing a broader cosmological emphasis not required by
    the verse.
  doctrine_reference: Translation philosophy §1, §5
