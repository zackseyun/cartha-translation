id: REV.10.2
reference: Revelation 10:2
source:
  edition: SBLGNT
  text: καὶ ἔχων ἐν τῇ χειρὶ αὐτοῦ ⸀βιβλαρίδιον ἠνεῳγμένον. καὶ ἔθηκεν τὸν πόδα αὐτοῦ
    τὸν δεξιὸν ἐπὶ τῆς θαλάσσης, τὸν δὲ εὐώνυμον ἐπὶ τῆς γῆς,
translation:
  text: and having in his hand a little scroll that had been opened. And he placed
    his right foot on the sea, and his left on the land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the earth.' The Greek γῆ can mean 'land' or 'earth'; here 'land'
      is chosen to match the contrast with 'the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a little book.' The Greek βιβλαρίδιον is a diminutive term for a small
      scroll/booklet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  chosen: having
  alternatives:
  - holding
  lexicon: BDAG
  rationale: Present participle modifying the mighty angel from v.1; 'having' preserves
    the participial linkage and keeps the syntax close to the Greek without over-smoothing.
- source_word: χειρὶ
  chosen: hand
  lexicon: BDAG
  rationale: Standard rendering of χείρ; singular is explicit in Greek and retained.
- source_word: βιβλαρίδιον
  chosen: a little scroll
  alternatives:
  - a small scroll
  - a little book
  lexicon: BDAG
  rationale: The diminutive form suggests a smaller scroll/booklet. 'Little scroll'
    is idiomatic modern English and preserves the imagery better than the traditional
    but potentially misleading 'little book.'
- source_word: ἠνεῳγμένον
  chosen: that had been opened
  alternatives:
  - open
  - opened
  lexicon: BDAG
  rationale: Perfect passive participle indicates a completed action with continuing
    result. 'That had been opened' brings out the resultant state more clearly than
    a bare adjective, while remaining natural in English.
- source_word: ἔθηκεν
  chosen: placed
  alternatives:
  - set
  - put
  lexicon: BDAG
  rationale: '''Placed'' fits the solemn, deliberate action in context and is a natural
    rendering of τίθημι here.'
- source_word: πόδα
  chosen: foot
  lexicon: BDAG
  rationale: Direct lexical equivalent of πούς in the accusative singular.
- source_word: δεξιὸν
  chosen: right
  alternatives:
  - right-hand
  lexicon: BDAG
  rationale: With 'foot,' the simple adjective 'right' is the natural English equivalent.
- source_word: ἐπὶ τῆς θαλάσσης
  chosen: on the sea
  alternatives:
  - upon the sea
  lexicon: BDAG
  rationale: ἐπί with the genitive here is naturally rendered 'on.' 'Sea' is the standard
    sense of θάλασσα and preserves the vivid apocalyptic image.
- source_word: εὐώνυμον
  chosen: left
  alternatives:
  - left foot
  lexicon: BDAG
  rationale: εὐώνυμος literally means 'left' (lit. 'well-named,' a euphemistic form),
    and in context refers to the left foot. English can omit the repeated noun because
    it is supplied naturally from the parallel structure.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - on the earth
  - upon the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'ground,' or 'land.' In contrast with 'the sea,'
    'land' best captures the local spatial contrast in this vision rather than the
    globe as a whole.
