theological_decisions:
- issue: Personification of the seven thunders
  chosen_reading: Retain the personified wording 'the seven thunders spoke their own
    voices' rather than demythologizing it.
  alternative_readings:
  - the seven thunders sounded
  - the seven thunders uttered their messages
  rationale: The Greek explicitly gives the thunders speech (ἐλάλησαν ... φωνάς).
    In apocalyptic literature this personification is part of the inspired imagery
    and should be preserved rather than reduced to mere sound effects.
  doctrine_reference: Translation philosophy §§1, 3, 6
