id: REV.10.3
reference: Revelation 10:3
source:
  edition: SBLGNT
  text: καὶ ἔκραξεν φωνῇ μεγάλῃ ὥσπερ λέων μυκᾶται. καὶ ὅτε ἔκραξεν, ἐλάλησαν αἱ ἑπτὰ
    βρονταὶ τὰς ἑαυτῶν φωνάς.
translation:
  text: And he cried out with a loud voice, just as a lion roars. And when he cried
    out, the seven thunders spoke their own voices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seven thunders uttered their own voices.' The Greek is strikingly
      literal and personifies the thunders as speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: Aorist of κράζω denotes a forceful vocal outcry. 'Cried out' is idiomatic
    and preserves the intensity without implying distress alone.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: The dative phrase is rendered instrumentally/manner-wise. 'With a loud
    voice' keeps the concrete noun φωνή rather than flattening it to the adverb 'loudly.'
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - like
  - as
  lexicon: BDAG
  rationale: Introduces a comparison. 'Just as' preserves the simile with slightly
    more formal clarity than bare 'like.'
- source_word: λέων
  chosen: a lion
  lexicon: BDAG
  rationale: Straightforward lexical rendering.
- source_word: μυκᾶται
  chosen: roars
  alternatives:
  - bellows
  lexicon: BDAG
  rationale: Used of the cry of animals, especially here fitting a lion. 'Roars' is
    the natural English equivalent for a lion and matches the imagery better than
    the more generic 'bellows.'
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: Temporal conjunction. 'When' preserves the sequence without over-specifying
    immediacy or causation.
- source_word: ἐλάλησαν
  chosen: spoke
  alternatives:
  - uttered
  - said
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'utter.' 'Spoke' is the most direct and
    natural rendering here.
- source_word: αἱ ἑπτὰ βρονταὶ
  chosen: the seven thunders
  lexicon: BDAG
  rationale: The article and numeral identify a known visionary referent. Retaining
    the personified expression is important to the apocalyptic imagery.
- source_word: τὰς ἑαυτῶν φωνάς
  chosen: their own voices
  alternatives:
  - their own utterances
  - what each of them said
  lexicon: BDAG
  rationale: A literal rendering preserves the vivid personification and the emphatic
    reflexive ἑαυτῶν. Although English can sound unusual, this is warranted by the
    source text and avoids paraphrasing away the imagery.
