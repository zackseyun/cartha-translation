id: REV.6.4
reference: Revelation 6:4
source:
  edition: SBLGNT
  text: καὶ ἐξῆλθεν ἄλλος ἵππος πυρρός, καὶ τῷ καθημένῳ ἐπ’ αὐτὸν ἐδόθη αὐτῷ λαβεῖν
    τὴν εἰρήνην ἐκ τῆς γῆς ⸀καὶ ἵνα ἀλλήλους ⸀σφάξουσιν, καὶ ἐδόθη αὐτῷ μάχαιρα μεγάλη.
translation:
  text: And another horse came out, fiery red; and to the one sitting on it, it was
    given to take peace from the earth, so that they would slaughter one another,
    and a great sword was given to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'red horse.' The Greek adjective πυρρός more specifically suggests a
      fire-like red, hence 'fiery red.'
    reason: lexical_alternative
  - marker: b
    text: Or 'land' instead of 'earth'; the Greek γῆ can mean either, but here the
      broader sense fits Revelation's global-apocalyptic context.
    reason: lexical_alternative
  - marker: c
    text: The verb translated 'slaughter' is stronger than a generic word for 'kill'
      and conveys violent bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος
  chosen: another
  alternatives:
  - other
  lexicon: BDAG
  rationale: Indicates a subsequent horse distinct from the previous one; 'another'
    is the natural English equivalent in this sequential vision context.
- source_word: ἵππος πυρρός
  chosen: horse, fiery red
  alternatives:
  - red horse
  - flame-colored horse
  lexicon: BDAG
  rationale: πυρρός denotes a fire-like red color. 'Fiery red' preserves the vivid,
    flame-associated nuance better than the flatter 'red,' while remaining natural
    English.
- source_word: τῷ καθημένῳ ἐπ’ αὐτὸν
  chosen: the one sitting on it
  alternatives:
  - its rider
  - the one seated on it
  lexicon: BDAG
  rationale: A participial construction literally means 'the one sitting on it.' This
    is retained rather than replacing it with the more interpretive 'rider,' though
    that sense is implicit.
- source_word: ἐδόθη αὐτῷ
  chosen: it was given to him
  alternatives:
  - he was given
  - authority was given to him
  lexicon: BDAG
  rationale: The passive 'it was given' preserves the repeated divine-passive style
    of Revelation without specifying the giver beyond the text. Supplying 'authority'
    would over-interpret.
- source_word: λαβεῖν τὴν εἰρήνην ἐκ τῆς γῆς
  chosen: to take peace from the earth
  alternatives:
  - to remove peace from the earth
  - to take away peace from the land
  lexicon: BDAG
  rationale: λαμβάνω with εἰρήνην and ἐκ naturally yields 'take peace from.' 'Earth'
    is preferred over 'land' because in Revelation γῆ often has a broad world-oriented
    scope, and nothing in the immediate context narrows it to a local territory.
- source_word: ἵνα ἀλλήλους σφάξουσιν
  chosen: so that they would slaughter one another
  alternatives:
  - so that they might slay one another
  - so that they would kill one another
  lexicon: BDAG
  rationale: ἵνα here expresses result/purpose following the removal of peace. σφάζω
    is stronger than generic 'kill' and often denotes violent slaughter, so 'slaughter'
    best preserves the brutality of the term.
- source_word: μάχαιρα μεγάλη
  chosen: a great sword
  alternatives:
  - a large sword
  - a great dagger
  lexicon: BDAG
  rationale: μάχαιρα commonly denotes a sword or large knife/short sword. In apocalyptic
    imagery, 'sword' is the clearest and most idiomatic English rendering; 'great'
    preserves the adjective μεγάλη without flattening the image.
