theological_decisions:
- issue: Divine passive in repeated ἐδόθη clauses
  chosen_reading: Retain passive wording ('it was given to him') without naming God
    explicitly
  alternative_readings:
  - God gave him
  - authority was granted to him
  rationale: Revelation frequently uses the divine passive to imply God's sovereign
    permission without making the agent explicit in each clause. Preserving the passive
    maintains the theological tension and literary style rather than resolving it
    interpretively.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
