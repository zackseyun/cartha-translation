theological_decisions:
- issue: Rendering the divine address δεσπότης
  chosen_reading: Master
  alternative_readings:
  - Sovereign Lord
  - Lord
  rationale: The verse addresses God with a title distinct from κύριος. To preserve
    lexical distinction and avoid flattening the nuance into the default rendering
    for κύριος ('Lord'), 'Master' is used. This does not deny divine sovereignty;
    it reflects the specific Greek term chosen by the text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; original-language
    primacy over translation tradition.'
- issue: Force of the martyrs' plea for justice
  chosen_reading: judge and avenge our blood
  alternative_readings:
  - judge and vindicate our blood
  rationale: The text explicitly asks for divine judgment and vengeance in response
    to martyrdom. The translation preserves this judicial-retributive language rather
    than softening it, while understanding it as a plea for God's just action, not
    personal sinful retaliation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; never import doctrinal claims the text does not make.'
