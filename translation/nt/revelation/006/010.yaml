id: REV.6.10
reference: Revelation 6:10
source:
  edition: SBLGNT
  text: καὶ ἔκραξαν φωνῇ μεγάλῃ λέγοντες· Ἕως πότε, ὁ δεσπότης ὁ ἅγιος καὶ ἀληθινός,
    οὐ κρίνεις καὶ ἐκδικεῖς τὸ αἷμα ἡμῶν ἐκ τῶν κατοικούντων ἐπὶ τῆς γῆς;
translation:
  text: And they cried out with a loud voice, saying, “How long, Master, holy and
    true, will you not judge and avenge our blood on those who dwell on the earth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sovereign Lord.” The Greek title here is despotes, emphasizing absolute
      authority; it is distinct from kyrios (“Lord”).
    reason: lexical_alternative
  - marker: b
    text: Or “against those who dwell on the earth.” The phrase can express the object
      of the avenging action; Revelation frequently uses “those who dwell on the earth”
      as a thematic designation.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔκραξαν
  chosen: cried out
  alternatives:
  - shouted
  - cried
  lexicon: BDAG
  rationale: Aorist of κράζω denotes a loud, urgent cry. 'Cried out' preserves both
    intensity and natural English style.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: This dative phrase is idiomatic for manner. 'With a loud voice' is a
    transparent and common English equivalent that preserves the concrete imagery.
- source_word: Ἕως πότε
  chosen: How long
  alternatives:
  - Until when
  lexicon: BDAG
  rationale: Standard idiomatic rendering for a lamenting appeal about delayed divine
    action.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Sovereign Lord
  - Lord
  lexicon: BDAG
  rationale: δεσπότης emphasizes ownership and absolute authority more strongly than
    κύριος. 'Master' best reflects the lexical force. 'Sovereign Lord' is possible
    but adds 'Lord,' which is not present here.
- source_word: ἅγιος
  chosen: holy
  lexicon: BDAG
  rationale: Direct adjectival rendering; preserves the moral and cultic distinctness
    attributed to God.
- source_word: ἀληθινός
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: '''True'' is the most natural rendering here and carries the sense of
    reliability and genuineness in divine character.'
- source_word: οὐ κρίνεις καὶ ἐκδικεῖς
  chosen: will you not judge and avenge
  alternatives:
  - do you not judge and avenge
  - will you not judge and vindicate
  lexicon: BDAG
  rationale: Although formally present tense, the phrase in this lament functions
    as an appeal concerning delayed action, naturally rendered in English as 'will
    you not...'. 'Avenge' fits ἐκδικέω in context of requital for bloodshed better
    than the softer 'vindicate,' though vindication is part of the sense.
- source_word: τὸ αἷμα ἡμῶν
  chosen: our blood
  alternatives:
  - our lifeblood
  - our bloodshed
  lexicon: BDAG
  rationale: A literal rendering preserves the biblical idiom for violent death and
    martyrdom without overexplaining.
- source_word: ἐκ τῶν κατοικούντων ἐπὶ τῆς γῆς
  chosen: on those who dwell on the earth
  alternatives:
  - against those who dwell on the earth
  - from those who dwell on the earth
  - on the inhabitants of the earth
  lexicon: BDAG
  rationale: The construction expresses the target/source of vengeance. 'On those
    who dwell on the earth' is idiomatic in English and preserves Revelation's recurring
    phrase 'those who dwell on the earth.'
