theological_decisions:
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - hell
  - the grave
  - the realm of the dead
  rationale: The verse distinguishes the personified rider Death from ᾅδης as the
    following realm of the dead. Translating ᾅδης as 'hell' would risk conflating
    intermediate death with final judgment and importing theological claims not made
    by the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretation of ἐν θανάτῳ in the judgment list
  chosen_reading: pestilence
  alternative_readings:
  - death
  rationale: The phrase participates in a stock judgment formula echoing the Greek
    of Ezekiel, where 'death' can stand metonymically for pestilence. The chosen rendering
    preserves the Old Testament allusion and the list's semantic coherence, while
    the more literal alternative is preserved in a footnote to maintain transparency.
  doctrine_reference: Translation philosophy §1, §3
