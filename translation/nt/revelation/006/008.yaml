id: REV.6.8
reference: Revelation 6:8
source:
  edition: SBLGNT
  text: καὶ ⸂εἶδον, καὶ⸃ ἰδοὺ ἵππος χλωρός, καὶ ὁ καθήμενος ἐπάνω αὐτοῦ ὄνομα αὐτῷ
    ὁ Θάνατος, καὶ ὁ ᾅδης ἠκολούθει ⸂μετ’ αὐτοῦ⸃, καὶ ἐδόθη ⸀αὐτοῖς ἐξουσία ἐπὶ τὸ
    τέταρτον τῆς γῆς, ἀποκτεῖναι ἐν ῥομφαίᾳ καὶ ἐν λιμῷ καὶ ἐν θανάτῳ καὶ ὑπὸ τῶν
    θηρίων τῆς γῆς.
translation:
  text: And I looked, and behold, a pale green horse, and the name of the one seated
    on it was Death, and Hades was following with him. And authority was given to
    them over a fourth of the earth, to kill with sword and with famine and with pestilence
    and by the wild beasts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''a pale horse.'' The Greek χλωρός literally denotes a greenish or
      pale-green color, often suggesting a sickly pallor.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''with death.'' Here ''pestilence'' reflects the idiomatic sense of
      θανάτῳ in an Old Testament judgment-list context, especially echoing Ezekiel
      14.'
    reason: alternative_reading
lexical_decisions:
- source_word: χλωρός
  chosen: pale green
  alternatives:
  - pale
  - ashen
  - greenish
  lexicon: BDAG
  rationale: χλωρός commonly denotes a greenish or pale-green color, used of vegetation
    and also of a sickly pallor. 'Pale green' preserves the lexical sense better than
    the traditional 'pale' alone while still conveying the ominous, corpse-like hue
    in context.
- source_word: ὁ καθήμενος ἐπάνω αὐτοῦ
  chosen: the one seated on it
  alternatives:
  - its rider
  - the one sitting on it
  lexicon: BDAG
  rationale: This participial expression is rendered transparently. 'The one seated
    on it' closely follows the Greek while remaining natural English; 'rider' is possible
    but slightly less explicit than the source wording.
- source_word: ὄνομα αὐτῷ ὁ Θάνατος
  chosen: the name of the one seated on it was Death
  alternatives:
  - his name was Death
  - its rider was named Death
  lexicon: BDAG
  rationale: The Greek construction literally identifies the rider's name as Death.
    The chosen rendering keeps the naming formula explicit while smoothing it into
    idiomatic English.
- source_word: Θάνατος
  chosen: Death
  alternatives:
  - death
  lexicon: BDAG
  rationale: Here θάνατος is personified as the named rider, so capitalization in
    English appropriately signals personification.
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: BDAG
  rationale: ᾅδης refers to the realm of the dead, not final hell. 'Hades' avoids
    importing later doctrinal associations tied to 'hell' and preserves the distinct
    term used in the Greek.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - behind him
  - after him
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with.' In context it implies accompanying/following
    alongside. 'With him' preserves the preposition's basic sense while fitting the
    clause 'was following with him.'
- source_word: ἐδόθη αὐτοῖς ἐξουσία
  chosen: authority was given to them
  alternatives:
  - power was given to them
  - they were given authority
  lexicon: BDAG
  rationale: ἐξουσία is better rendered 'authority' than 'power' because it denotes
    delegated right or jurisdiction. The passive 'was given' preserves the divine-passive
    style of Revelation.
- source_word: ἐπὶ τὸ τέταρτον τῆς γῆς
  chosen: over a fourth of the earth
  alternatives:
  - over the fourth part of the earth
  - over one-fourth of the land
  lexicon: BDAG
  rationale: τέταρτον here denotes a quarter. 'Earth' is preferred over 'land' because
    Revelation's scope in this judgment scene is global/cosmic rather than merely
    local.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to slay
  lexicon: BDAG
  rationale: '''To kill'' is the straightforward infinitive sense and fits readable
    modern English without unnecessary archaism.'
- source_word: ἐν ῥομφαίᾳ
  chosen: with sword
  alternatives:
  - by the sword
  - with a sword
  lexicon: BDAG
  rationale: ῥομφαία denotes sword; the anarthrous instrumental sense is well conveyed
    by 'with sword,' matching the series of means by which death comes.
- source_word: ἐν λιμῷ
  chosen: with famine
  alternatives:
  - by famine
  - with hunger
  lexicon: BDAG
  rationale: λιμός denotes famine rather than the subjective feeling of hunger. 'With
    famine' keeps the parallel structure with the surrounding prepositional phrases.
- source_word: ἐν θανάτῳ
  chosen: with pestilence
  alternatives:
  - with death
  lexicon: BDAG, LXX usage
  rationale: Although θάνατος literally means 'death,' in judgment lists echoing Ezekiel
    14 it can function as a conventional term for pestilence/plague. Rendering it
    'pestilence' best captures the idiomatic sense in this allusive context and avoids
    the awkwardness of 'kill with death.' The literal alternative is preserved in
    a footnote.
- source_word: ὑπὸ τῶν θηρίων τῆς γῆς
  chosen: by the wild beasts of the earth
  alternatives:
  - by the beasts of the earth
  - by the wild animals of the earth
  lexicon: BDAG
  rationale: θηρίον here refers to wild beasts/animals, not the later apocalyptic
    'beast' figure of Revelation. 'Wild beasts' makes that distinction clear and matches
    the judgment-list background.
