theological_decisions:
- issue: Rendering the divine-human agents of judgment in apocalyptic imagery
  chosen_reading: Retain both 'the One seated on the throne' and 'the Lamb' as distinct
    yet coordinated objects of fear and judgment.
  alternative_readings:
  - Flattening the phrase into a generalized reference to God alone
  - Softening 'wrath of the Lamb' to avoid the paradox
  rationale: 'The Greek explicitly presents two coordinated genitive phrases after
    ἀπό: one referring to the enthroned One and one to the Lamb. The translation preserves
    the striking theological tension that the Lamb, elsewhere associated with sacrifice,
    is also the bearer of eschatological wrath. This accords with the instruction
    to preserve theological tension rather than resolve it.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3; Affirmations (Nicene/Chalcedonian
    orthodoxy)
