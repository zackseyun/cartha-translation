id: REV.6.16
reference: Revelation 6:16
source:
  edition: SBLGNT
  text: καὶ λέγουσιν τοῖς ὄρεσιν καὶ ταῖς πέτραις· Πέσετε ἐφ’ ἡμᾶς καὶ κρύψατε ἡμᾶς
    ἀπὸ προσώπου τοῦ καθημένου ἐπὶ τοῦ θρόνου καὶ ἀπὸ τῆς ὀργῆς τοῦ ἀρνίου,
translation:
  text: and they say to the mountains and to the rocks, “Fall on us and hide us from
    the face of the One seated on the throne and from the wrath of the Lamb,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of the One seated on the throne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  chosen: they say
  alternatives:
  - they are saying
  - they said
  lexicon: BDAG
  rationale: 'Present indicative is best carried as a vivid present in apocalyptic
    narrative: ''they say.'' English present preserves the immediacy without forcing
    a progressive sense.'
- source_word: ὄρεσιν
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain.' 'Hills' would weaken the imagery and
    is less exact.
- source_word: πέτραις
  chosen: the rocks
  alternatives:
  - the cliffs
  - the crags
  lexicon: BDAG
  rationale: πέτρα denotes rock mass/rocky outcrop. 'Rocks' is natural modern English
    and fits the allusion to people seeking cover in the created order.
- source_word: Πέσετε ἐφ’ ἡμᾶς
  chosen: Fall on us
  alternatives:
  - Fall over us
  lexicon: BDAG
  rationale: Aorist imperative plural gives a direct urgent command. 'Fall on us'
    is the standard and most natural rendering of πίπτω with ἐπί + accusative here.
- source_word: κρύψατε ἡμᾶς
  chosen: hide us
  alternatives:
  - conceal us
  lexicon: BDAG
  rationale: '''Hide us'' is straightforward, idiomatic, and preserves the force of
    the imperative without sounding overly formal.'
- source_word: ἀπὸ προσώπου
  chosen: from the face of
  alternatives:
  - from the presence of
  lexicon: BDAG
  rationale: πρόσωπον literally means 'face.' Here the literal rendering is intelligible
    in English and preserves the vivid personal imagery of divine encounter. 'Presence'
    is a viable interpretive alternative and is preserved in a footnote.
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  chosen: the One seated on the throne
  alternatives:
  - him who sits on the throne
  - the one sitting on the throne
  lexicon: BDAG
  rationale: The substantival participle is well represented by 'the One seated on
    the throne.' This is readable modern English while preserving the ongoing enthroned
    status.
- source_word: ὀργῆς
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: ὀργή in judgment contexts carries a stronger judicial sense than ordinary
    'anger.' 'Wrath' best preserves the eschatological gravity.
- source_word: τοῦ ἀρνίου
  chosen: the Lamb
  alternatives: []
  lexicon: BDAG
  rationale: ἀρνίον is Revelation's established christological title. 'Lamb' preserves
    the paradox of sacrificial meekness joined with judicial authority.
