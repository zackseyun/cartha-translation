theological_decisions:
- issue: Plural pronoun with 'wrath' in reference to the one seated on the throne
    and the Lamb
  chosen_reading: Retain the plural expression 'their wrath'
  alternative_readings:
  - Render idiomatically as 'his wrath' by assimilation to singular divine agency
  - Interpret as a collective or merged singular reference
  rationale: The Greek text explicitly reads αὐτῶν ('their'), referring back to the
    two figures named in the previous verse. The translation should preserve this
    grammatical and theological tension rather than resolve it. This maintains the
    text's portrayal of the shared judicial action of God and the Lamb without forcing
    a later doctrinal simplification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
