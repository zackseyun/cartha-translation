id: REV.6.17
reference: Revelation 6:17
source:
  edition: SBLGNT
  text: ὅτι ἦλθεν ἡ ἡμέρα ἡ μεγάλη τῆς ὀργῆς ⸀αὐτῶν, καὶ τίς δύναται σταθῆναι;
translation:
  text: because the great day of their wrath has come, and who is able to stand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wrath' in some interpretive renderings; Greek reads 'their wrath,'
      referring to the one seated on the throne and the Lamb together.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the terror described in the previous verse.
    'Because' is the clearest modern English causal connector here; 'for' is possible
    but less natural.
- source_word: ἦλθεν
  chosen: has come
  alternatives:
  - came
  - has arrived
  lexicon: BDAG
  rationale: Aorist indicative of ἔρχομαι. In English, the present perfect best conveys
    the force of an event now realized with present consequences in this apocalyptic
    declaration.
- source_word: ἡ ἡμέρα ἡ μεγάλη
  chosen: the great day
  alternatives:
  - the day, the great one
  - the mighty day
  lexicon: BDAG
  rationale: The attributive adjective μεγάλη is naturally rendered in English as
    'the great day.' This preserves the solemn, eschatological weight without awkward
    literalism.
- source_word: τῆς ὀργῆς
  chosen: of ... wrath
  alternatives:
  - of ... anger
  lexicon: BDAG
  rationale: ὀργή in judgment contexts is stronger and more judicial than ordinary
    'anger.' 'Wrath' best preserves the eschatological and divine-judicial force.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - his
  lexicon: BDAG
  rationale: The plural pronoun matches the immediately preceding referents in Revelation
    6:16 ('the one seated on the throne' and 'the Lamb'), yielding 'their wrath.'
    Although theologically striking, the plural should be preserved rather than harmonized
    away.
- source_word: τίς
  chosen: who
  alternatives:
  - who indeed
  lexicon: BDAG
  rationale: An interrogative pronoun introducing a rhetorical question. Simple 'who'
    is sufficient and idiomatic.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: '''Is able'' preserves the sense of capability more explicitly than the
    shorter ''can,'' fitting the solemn tone.'
- source_word: σταθῆναι
  chosen: to stand
  alternatives:
  - to stand firm
  - to withstand
  lexicon: BDAG
  rationale: Aorist passive infinitive from ἵστημι, idiomatically 'to stand.' In this
    judgment context it implies enduring or remaining standing before divine wrath;
    that fuller sense is implicit without expanding the wording in the main text.
