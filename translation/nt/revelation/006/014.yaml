theological_decisions:
- issue: Cosmic terminology in apocalyptic imagery
  chosen_reading: Render οὐρανός as 'sky' rather than 'heaven'
  alternative_readings:
  - heaven
  rationale: This choice avoids implying a theological statement about God's dwelling
    place being altered and instead reflects the visible cosmic phenomenon described
    in the vision. It preserves the text's imagery without importing doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of the sky's action
  chosen_reading: Translate ἀπεχωρίσθη with a parting/splitting sense
  alternative_readings:
  - departed
  - vanished
  rationale: The simile of a scroll being rolled up favors imagery of separation/parting
    rather than annihilation. This preserves the visionary tension without over-interpreting
    the cosmological mechanics.
  doctrine_reference: Translation philosophy §3
