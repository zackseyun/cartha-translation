id: REV.6.14
reference: Revelation 6:14
source:
  edition: SBLGNT
  text: καὶ ὁ οὐρανὸς ἀπεχωρίσθη ὡς βιβλίον ἑλισσόμενον, καὶ πᾶν ὄρος καὶ νῆσος ἐκ
    τῶν τόπων αὐτῶν ἐκινήθησαν.
translation:
  text: And the sky was split apart like a scroll being rolled up, and every mountain
    and island was moved from its place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heaven was parted' or 'the sky departed'; the Greek can denote separation
      or withdrawal.
    reason: lexical_alternative
  - marker: b
    text: Greek βιβλίον refers to a scroll, not a modern bound book.
    reason: cultural_note
  - marker: c
    text: Literally 'from their places.' English uses the singular distributively
      after 'every mountain and island.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  chosen: sky
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: In this apocalyptic-cosmic context, the referent is the visible expanse
    above the earth rather than the dwelling place of God. 'Sky' best matches the
    imagery of cosmic disturbance in readable modern English, while 'heaven' remains
    a possible alternative.
- source_word: ἀπεχωρίσθη
  chosen: was split apart
  alternatives:
  - departed
  - was separated
  - vanished
  lexicon: BDAG
  rationale: The verb from ἀποχωρίζομαι conveys separation or being parted. Given
    the simile of a scroll being rolled up, 'was split apart' captures the image of
    the sky opening/separating more naturally than the traditional 'departed,' which
    can sound like disappearance rather than parting.
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  lexicon: BDAG
  rationale: In first-century context βιβλίον commonly denotes a scroll rather than
    a codex-style book. 'Scroll' is historically and contextually more precise, especially
    with the participle 'being rolled up.'
- source_word: ἑλισσόμενον
  chosen: being rolled up
  alternatives:
  - being rolled together
  - being rolled
  lexicon: BDAG
  rationale: The participle from ἑλίσσω denotes rolling or winding. 'Being rolled
    up' gives clear modern English and fits the image of a scroll closing upon itself.
- source_word: πᾶν ὄρος καὶ νῆσος
  chosen: every mountain and island
  alternatives:
  - each mountain and island
  lexicon: BDAG
  rationale: πᾶν with singular nouns has distributive force. 'Every mountain and island'
    preserves that force idiomatically in English.
- source_word: ἐκ τῶν τόπων αὐτῶν
  chosen: from its place
  alternatives:
  - from their places
  lexicon: BDAG
  rationale: Although the Greek uses the plural 'their places,' English commonly shifts
    to singular distributive agreement after 'every mountain and island.' 'From its
    place' is smoother while preserving the distributive sense of each being displaced
    from its own location.
- source_word: ἐκινήθησαν
  chosen: was moved
  alternatives:
  - were moved
  - was shaken
  lexicon: BDAG
  rationale: κινέω here indicates being moved from location, not merely trembling.
    Because the compound subject is distributive ('every mountain and island'), singular
    English agreement ('was moved') is idiomatic with 'every ... and ...' in this
    construction.
