theological_decisions:
- issue: Rendering of ζῴων in Revelation's throne-room imagery
  chosen_reading: living creatures
  alternative_readings:
  - beasts
  - animals
  rationale: To avoid misleading associations of 'beasts' with the later hostile beasts
    of Revelation and to reflect the exalted throne-room beings of the vision, 'living
    creatures' is preferred.
  doctrine_reference: Translation philosophy §1, §6
- issue: Degree of specificity in ancient measures and wages
  chosen_reading: Use readable modern equivalent for χοῖνιξ while retaining denarius
    untranslated
  alternative_readings:
  - transliterate both terms
  - convert both into modern currency and volume
  rationale: Optimal equivalence favors readability without flattening historical
    texture. 'Quart' communicates the measure; 'denarius' is retained because it is
    a culturally specific wage coin whose significance is better preserved and can
    be clarified in a footnote.
  doctrine_reference: Translation philosophy §6
