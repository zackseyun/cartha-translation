id: REV.6.6
reference: Revelation 6:6
source:
  edition: SBLGNT
  text: καὶ ἤκουσα ⸀ὡς φωνὴν ἐν μέσῳ τῶν τεσσάρων ζῴων λέγουσαν· Χοῖνιξ σίτου δηναρίου,
    καὶ τρεῖς χοίνικες ⸀κριθῶν δηναρίου· καὶ τὸ ἔλαιον καὶ τὸν οἶνον μὴ ἀδικήσῃς.
translation:
  text: And I heard what seemed to be a voice in the midst of the four living creatures,
    saying, “A quart of wheat for a denarius, and three quarts of barley for a denarius;
    and do not harm the oil and the wine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was typically a day's wage for a laborer; the prices here depict
      severe scarcity.
    reason: cultural_note
  - marker: b
    text: Greek χοῖνιξ, a dry measure roughly equivalent to a quart (about a liter),
      often understood as about a person's daily grain ration.
    reason: cultural_note
  - marker: c
    text: Or “do not damage” the oil and the wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς φωνὴν
  chosen: what seemed to be a voice
  alternatives:
  - like a voice
  - as a voice
  lexicon: BDAG
  rationale: ὡς with φωνή here signals appearance or resemblance rather than strict
    identity. 'What seemed to be a voice' preserves John's auditory perception without
    overcommitting to a literal speaker description.
- source_word: ἐν μέσῳ τῶν τεσσάρων ζῴων
  chosen: in the midst of the four living creatures
  alternatives:
  - among the four living creatures
  - in the middle of the four living creatures
  lexicon: BDAG
  rationale: ἐν μέσῳ is spatially 'in the midst of/among.' 'In the midst of' preserves
    the solemn apocalyptic register, while ζῷα in Revelation is best rendered 'living
    creatures,' not merely 'animals,' to reflect the visionary beings around the throne.
- source_word: λέγουσαν
  chosen: saying
  alternatives:
  - that said
  lexicon: BDAG
  rationale: The present participle agrees with φωνήν and is naturally rendered with
    an English participial clause introducing the quoted speech.
- source_word: Χοῖνιξ
  chosen: quart
  alternatives:
  - choinix
  - roughly a quart
  - daily ration
  lexicon: BDAG
  rationale: χοῖνιξ is a dry measure approximately equivalent to a quart/liter and
    associated with a person's daily grain ration. 'Quart' gives a readable modern
    equivalent in the main text; the more technical transliteration is unnecessary
    in the running translation.
- source_word: σίτου
  chosen: wheat
  lexicon: BDAG
  rationale: Standard rendering of σῖτος here as wheat/grain, with 'wheat' fitting
    the contrast with barley.
- source_word: δηναρίου
  chosen: for a denarius
  alternatives:
  - at a denarius
  - costing a denarius
  lexicon: BDAG
  rationale: The genitive of price is idiomatically rendered 'for a denarius.' This
    preserves the economic force of the proclamation.
- source_word: τρεῖς χοίνικες κριθῶν
  chosen: three quarts of barley
  alternatives:
  - three choinixes of barley
  - three measures of barley
  lexicon: BDAG
  rationale: κριθή is barley; the repeated measure is rendered consistently with χοῖνιξ
    as 'quarts.' The phrase communicates scarcity and relative pricing.
- source_word: μὴ ἀδικήσῃς
  chosen: do not harm
  alternatives:
  - do not damage
  - do not wrong
  - do not injure
  lexicon: BDAG
  rationale: ἀδικέω can mean do wrong, harm, or damage. In this context of commodities
    under judgment, 'do not harm' best conveys prohibition against damaging the oil
    and wine, while remaining broad enough to include economic devastation.
- source_word: τὸ ἔλαιον
  chosen: the oil
  alternatives:
  - the olive oil
  lexicon: BDAG
  rationale: ἔλαιον commonly refers to olive oil, but 'oil' is the conventional and
    sufficiently clear English rendering here.
- source_word: τὸν οἶνον
  chosen: the wine
  lexicon: BDAG
  rationale: Standard rendering of οἶνος as 'wine.'
