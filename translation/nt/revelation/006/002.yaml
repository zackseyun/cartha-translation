theological_decisions:
- issue: Identity of the rider on the white horse
  chosen_reading: The translation leaves the rider's identity unspecified.
  alternative_readings:
  - Christ or a Christ-like figure
  - a conquering ruler/empire
  - the antichrist or a deceptive conqueror
  rationale: The Greek text describes the rider's appearance and action without identifying
    him. Because interpreters sharply disagree, the translation should not import
    an identification into the wording. The imagery is left intact and unresolved.
  doctrine_reference: Preserve theological tension rather than resolve it.
