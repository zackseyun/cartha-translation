id: REV.6.2
reference: Revelation 6:2
source:
  edition: SBLGNT
  text: καὶ ⸂εἶδον, καὶ⸃ ἰδοὺ ἵππος λευκός, καὶ ὁ καθήμενος ἐπ’ αὐτὸν ἔχων τόξον,
    καὶ ἐδόθη αὐτῷ στέφανος, καὶ ἐξῆλθεν νικῶν καὶ ἵνα νικήσῃ.
translation:
  text: And I looked, and behold, a white horse, and the one sitting on it had a bow,
    and a crown was given to him, and he went out conquering and in order that he
    might conquer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a victor's crown was given to him'; Greek στέφανος often refers to a
      wreath or crown associated with victory rather than a royal diadem.
    reason: lexical_alternative
  - marker: b
    text: The rider's identity is not stated in the text. Interpretations vary widely.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶδον
  chosen: I looked
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: Although the aorist of ὁράω is often rendered 'I saw,' 'I looked' fits
    the visionary sequence with ἰδού ('behold') and avoids awkward repetition in English
    while still reflecting visual perception.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the apocalyptic vividness and discourse
    force of the particle in Revelation. Though somewhat elevated, it remains understandable
    and signals sudden attention.
- source_word: ἵππος λευκός
  chosen: a white horse
  lexicon: BDAG
  rationale: Straightforward nominal phrase; indefinite in English because Greek lacks
    the article here and the vision introduces a new figure.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  chosen: the one sitting on it
  alternatives:
  - its rider
  - the one seated on it
  lexicon: BDAG
  rationale: This preserves the participial construction more transparently than 'its
    rider' while remaining natural English. 'On it' reflects ἐπί with the accusative
    object αὐτόν referring to the horse.
- source_word: ἔχων τόξον
  chosen: had a bow
  alternatives:
  - holding a bow
  lexicon: BDAG
  rationale: English idiom prefers finite 'had' after 'the one sitting on it.' 'Bow'
    is the standard rendering of τόξον.
- source_word: ἐδόθη αὐτῷ στέφανος
  chosen: a crown was given to him
  alternatives:
  - a victor's crown was given to him
  - a wreath was given to him
  lexicon: BDAG
  rationale: στέφανος denotes a wreath/crown, often associated with victory rather
    than royal rule. 'Crown' is the most natural English rendering; the more specific
    nuance is preserved as an alternative because context may suggest conquest/victory
    imagery.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he came out
  lexicon: BDAG
  rationale: ἐξέρχομαι is most basically 'go out/come out.' 'Went out' fits the narrative
    perspective and keeps the movement simple.
- source_word: νικῶν
  chosen: conquering
  alternatives:
  - overcoming
  - victorious
  lexicon: BDAG
  rationale: The present participle conveys ongoing action accompanying his going
    out. 'Conquering' best matches the military-imperial imagery of the scene.
- source_word: ἵνα νικήσῃ
  chosen: in order that he might conquer
  alternatives:
  - to conquer
  - so that he might conquer
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose/result. 'In order that he
    might conquer' preserves the clause's force more explicitly than a bare infinitive,
    though the latter is possible in smoother English.
