theological_decisions:
- issue: Addressee of the imperative Ἔρχου
  chosen_reading: Render simply as 'Come' without specifying the addressee.
  alternative_readings:
  - Addressed to John
  - Addressed to the rider/horseman
  rationale: The Greek gives only the imperative 'Come' and does not explicitly identify
    the addressee. Preserving the bare command maintains the narrative and theological
    ambiguity rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
