id: REV.6.7
reference: Revelation 6:7
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἤνοιξεν τὴν σφραγῖδα τὴν τετάρτην, ἤκουσα ⸀φωνὴν τοῦ τετάρτου ζῴου
    λέγοντος· ⸀Ἔρχου.
translation:
  text: And when he opened the fourth seal, I heard the voice of the fourth living
    creature saying, “Come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “Go forth.” The Greek more literally reads “Come,” but interpreters
      differ on whether the command is directed to John or to the horseman.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - broke open
  lexicon: BDAG
  rationale: Standard aorist rendering of ἀνοίγω. 'Opened' is the natural English
    equivalent for opening a seal in this repeated apocalyptic formula.
- source_word: σφραγῖδα
  chosen: seal
  alternatives:
  - sealed scroll mark
  lexicon: BDAG
  rationale: σφραγίς in Revelation 6 refers to the seals being opened on the scroll.
    'Seal' is the established and precise English term.
- source_word: τετάρτην / τετάρτου
  chosen: fourth
  lexicon: BDAG
  rationale: Both adjectival occurrences are straightforward ordinals and should be
    rendered consistently as 'fourth'.
- source_word: φωνὴν
  chosen: the voice
  alternatives:
  - a voice
  - the sound
  lexicon: BDAG
  rationale: Although anarthrous in Greek, 'voice' is best rendered with 'the' in
    English because it is immediately specified by the genitive phrase 'of the fourth
    living creature' and fits the recurring pattern in the passage.
- source_word: ζῴου
  chosen: living creature
  alternatives:
  - creature
  - living being
  lexicon: BDAG
  rationale: In Revelation, ζῷον refers to the throne-room beings, not ordinary animals.
    'Living creature' is the clearest established rendering that preserves the distinction
    from θηρίον ('beast').
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - calling out
  - speaking
  lexicon: BDAG
  rationale: The present participle is naturally rendered as 'saying' in English after
    'I heard the voice...'.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Go forth
  lexicon: BDAG
  rationale: The imperative ἔρχου most directly means 'come.' In this context some
    understand it as addressed to the horseman, hence 'Come,' while 'Go forth' is
    interpretive and exceeds the plain lexical sense.
