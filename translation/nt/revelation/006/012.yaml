theological_decisions:
- issue: Nature of the cosmic signs
  chosen_reading: Render the imagery straightforwardly as visionary/apocalyptic phenomena
    without interpreting whether the signs are literal astronomical events, symbolic
    portents, or both.
  alternative_readings:
  - Strictly literal end-time astronomical catastrophe
  - Primarily symbolic depiction of divine judgment and political upheaval
  rationale: The Greek presents the seer's vision in vivid similes ('like sackcloth,'
    'like blood') but does not itself settle the broader interpretive debate. The
    translation therefore preserves the imagery and theological tension rather than
    resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
