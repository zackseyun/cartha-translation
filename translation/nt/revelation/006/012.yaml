id: REV.6.12
reference: Revelation 6:12
source:
  edition: SBLGNT
  text: Καὶ εἶδον ὅτε ἤνοιξεν τὴν σφραγῖδα τὴν ἕκτην, καὶ σεισμὸς μέγας ἐγένετο, καὶ
    ὁ ἥλιος ⸂ἐγένετο μέλας⸃ ὡς σάκκος τρίχινος, καὶ ἡ σελήνη ὅλη ἐγένετο ὡς αἷμα,
translation:
  text: And I saw when he opened the sixth seal, and a great earthquake occurred,
    and the sun became black like sackcloth made of hair, and the whole moon became
    like blood,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like haircloth sackcloth'; the phrase refers to coarse sackcloth made
      from hair, traditionally associated with mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked
  lexicon: BDAG
  rationale: Aorist of ὁράω in Revelation commonly introduces visionary perception.
    'I saw' is the standard and most natural rendering for the seer's report.
- source_word: ὅτε
  chosen: when
  alternatives:
  - as
  - at the time when
  lexicon: BDAG
  rationale: Temporal conjunction marking the point at which the vision event occurred.
    'When' is concise and accurate.
- source_word: ἤνοιξεν
  chosen: he opened
  alternatives:
  - he broke open
  lexicon: BDAG
  rationale: Aorist of ἀνοίγω; in the seal context 'opened' is the normal rendering
    and fits the established imagery of opening seals.
- source_word: σφραγῖδα τὴν ἕκτην
  chosen: the sixth seal
  lexicon: BDAG
  rationale: Direct rendering of noun plus ordinal adjective. English idiom places
    the ordinal before the noun.
- source_word: σεισμὸς μέγας
  chosen: a great earthquake
  alternatives:
  - a great shaking
  lexicon: BDAG
  rationale: σεισμός can denote shaking or earthquake, but in apocalyptic cosmic-judgment
    context 'earthquake' is the clearest and most idiomatic English equivalent.
- source_word: ἐγένετο
  chosen: occurred
  alternatives:
  - happened
  - came about
  - there was
  lexicon: BDAG
  rationale: For the earthquake clause, 'occurred' gives natural English while preserving
    the eventive force of γίνομαι. A more literal 'there was' is possible but less
    vivid in modern English.
- source_word: ὁ ἥλιος ἐγένετο μέλας
  chosen: the sun became black
  alternatives:
  - the sun turned black
  - the sun became dark
  lexicon: BDAG
  rationale: μέλας specifically means 'black,' not merely 'dark.' 'Became black' preserves
    the lexical force and the repeated γίνομαι pattern in the verse.
- source_word: ὡς σάκκος τρίχινος
  chosen: like sackcloth made of hair
  alternatives:
  - like haircloth sackcloth
  - like a sackcloth of hair
  lexicon: BDAG
  rationale: σάκκος is sackcloth; τρίχινος means made of hair, likely coarse goat
    hair. The chosen rendering is clear in modern English while preserving the material
    description.
- source_word: ἡ σελήνη ὅλη
  chosen: the whole moon
  alternatives:
  - the entire moon
  - the moon in its entirety
  lexicon: BDAG
  rationale: ὅλη modifies σελήνη and is best represented explicitly. 'Whole moon'
    is natural and preserves the emphasis that the moon as a whole took on the appearance
    described.
- source_word: ἐγένετο ὡς αἷμα
  chosen: became like blood
  alternatives:
  - became as blood
  - turned like blood
  lexicon: BDAG
  rationale: ὡς marks simile, so the text says the moon became like blood, not that
    it literally became blood. This preserves the apocalyptic imagery without over-literalizing
    it.
