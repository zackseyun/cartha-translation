id: REV.6.5
reference: Revelation 6:5
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἤνοιξε τὴν σφραγῖδα τὴν τρίτην, ἤκουσα τοῦ τρίτου ζῴου λέγοντος· Ἔρχου.
    καὶ ⸀εἶδον, καὶ ἰδοὺ ἵππος μέλας, καὶ ὁ καθήμενος ἐπ’ αὐτὸν ἔχων ζυγὸν ἐν τῇ χειρὶ
    αὐτοῦ.
translation:
  text: And when he opened the third seal, I heard the third living creature saying,
    “Come.” And I looked, and behold, a black horse, and its rider had a pair of scales
    in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Come here.' The command may be understood either as addressed to John
      or as summoning the horse and its rider.
    reason: alternative_reading
  - marker: b
    text: Or, 'a balance.' The Greek word can denote weighing scales; in this context
      it likely refers to scales used for measuring out food.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξε
  chosen: opened
  alternatives:
  - broke open
  lexicon: BDAG
  rationale: Standard rendering of ἀνοίγω for opening a seal; 'opened' is idiomatic
    and sufficiently formal here.
- source_word: σφραγῖδα τὴν τρίτην
  chosen: the third seal
  lexicon: BDAG
  rationale: Direct rendering preserving the sequence of the seal judgments.
- source_word: ζῴου
  chosen: living creature
  alternatives:
  - creature
  - living being
  lexicon: BDAG
  rationale: In Revelation, ζῷον refers to the exalted throne-room beings, not ordinary
    animals; 'living creature' is the established and semantically accurate rendering.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: The imperative is brief and forceful. 'Come' preserves the Greek without
    adding 'here,' though some understand the summons as directed to the horseman.
- source_word: εἶδον
  chosen: I looked
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: Although the verb commonly means 'I saw,' rendering it as 'I looked'
    avoids awkward repetition with ἰδού ('behold') immediately following and reflects
    the visionary progression naturally in English.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: BDAG
  rationale: Retains the vivid deictic force of the apocalyptic vision formula.
- source_word: ἵππος μέλας
  chosen: a black horse
  lexicon: BDAG
  rationale: Straightforward adjectival construction; 'black' is important to the
    symbolism of the vision and should be preserved literally.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  chosen: its rider
  alternatives:
  - the one sitting on it
  - the one seated on it
  lexicon: BDAG
  rationale: '''Its rider'' is a natural English compression of the participial phrase
    and preserves the referent clearly without unnecessary stiffness.'
- source_word: ζυγὸν
  chosen: a pair of scales
  alternatives:
  - scales
  - a balance
  - a yoke
  lexicon: BDAG
  rationale: In this context of the black horse and the following verse's rationing
    language, ζυγός refers to weighing scales/balance rather than a yoke. 'A pair
    of scales' is the clearest modern English expression.
- source_word: ἐν τῇ χειρὶ αὐτοῦ
  chosen: in his hand
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the prepositional phrase.
