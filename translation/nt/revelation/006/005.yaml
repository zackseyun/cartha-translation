theological_decisions:
- issue: Referent of the command Ἔρχου
  chosen_reading: Rendered simply as 'Come' without specifying the addressee.
  alternative_readings:
  - A summons to John to come and see
  - A summons to the horse/rider to come forth
  rationale: The Greek leaves the addressee implicit. To preserve the text's ambiguity
    rather than resolve it interpretively, the translation keeps the simple imperative
    and notes the alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
