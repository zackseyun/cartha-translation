id: REV.6.13
reference: Revelation 6:13
source:
  edition: SBLGNT
  text: καὶ οἱ ἀστέρες τοῦ οὐρανοῦ ἔπεσαν εἰς τὴν γῆν, ὡς συκῆ ⸀βάλλει τοὺς ὀλύνθους
    αὐτῆς ὑπὸ ἀνέμου μεγάλου σειομένη,
translation:
  text: and the stars of heaven fell to the earth, as a fig tree drops its unripe
    figs when shaken by a strong wind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'winter figs,' 'green figs,' or 'late figs'; the Greek term refers to
      immature figs shaken off before they ripen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀστέρες
  chosen: stars
  alternatives:
  - heavenly bodies
  lexicon: BDAG
  rationale: The ordinary sense is 'stars.' In apocalyptic imagery the referent may
    be symbolic, but the translation should preserve the lexical image rather than
    interpret it.
- source_word: τοῦ οὐρανοῦ
  chosen: of heaven
  alternatives:
  - of the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven.' In Revelation's elevated apocalyptic
    style, 'heaven' best preserves the cosmic register, while still allowing the image
    of stars falling from above.
- source_word: ἔπεσαν εἰς τὴν γῆν
  chosen: fell to the earth
  alternatives:
  - fell onto the earth
  - fell to the land
  lexicon: BDAG
  rationale: Aorist verb plus εἰς marks movement toward the earth. 'To the earth'
    is idiomatic and preserves the dramatic descent.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces a comparison. 'As' fits the simile smoothly in English.
- source_word: συκῆ
  chosen: a fig tree
  lexicon: BDAG
  rationale: Standard rendering for the noun; no contextual reason to vary.
- source_word: βάλλει
  chosen: drops
  alternatives:
  - casts
  - throws down
  - sheds
  lexicon: BDAG
  rationale: βάλλω is literally 'throw/cast,' but with fruit from a tree, idiomatic
    English is 'drops' or 'sheds.' 'Drops' preserves the result without sounding wooden.
- source_word: ὀλύνθους
  chosen: unripe figs
  alternatives:
  - winter figs
  - green figs
  - late figs
  lexicon: BDAG
  rationale: ὄλυνθος refers to untimely or unripe figs, often those shaken off before
    maturity. 'Unripe figs' is the clearest modern English rendering; alternatives
    are worth preserving because the term can denote a specific kind of immature fig.
- source_word: ὑπὸ ἀνέμου μεγάλου
  chosen: by a strong wind
  alternatives:
  - by a great wind
  lexicon: BDAG
  rationale: μέγας with wind can be rendered literally 'great,' but in contemporary
    English 'strong wind' communicates the force naturally without loss of meaning.
- source_word: σειομένη
  chosen: when shaken
  alternatives:
  - being shaken
  lexicon: BDAG
  rationale: Present passive participle modifying 'fig tree.' 'When shaken' is natural
    English and captures the circumstantial force of the participle.
