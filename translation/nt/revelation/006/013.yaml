theological_decisions:
- issue: Apocalyptic imagery of stars falling
  chosen_reading: Retain the literal lexical image 'stars of heaven fell to the earth'
    without interpretive qualification.
  alternative_readings:
  - Interpret 'stars' symbolically as angelic beings or rulers
  rationale: The verse is apocalyptic and may carry symbolic force, but the translation
    should not resolve that interpretive question in the main text. Preserving the
    image maintains the theological tension and lets readers and notes handle symbolism.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
