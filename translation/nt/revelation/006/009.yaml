theological_decisions:
- issue: Nature of ψυχὰς in the visionary scene
  chosen_reading: Render ψυχὰς as 'souls' in the main text.
  alternative_readings:
  - lives
  - persons
  rationale: The verse depicts the martyred dead seen under the altar in John's vision.
    Rendering as 'souls' preserves the text's imagery and does not force a broader
    anthropological conclusion beyond the scene itself. Alternatives such as 'lives'
    or 'persons' flatten the visionary specificity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἐσφαγμένων
  chosen_reading: Use 'had been slaughtered' rather than a softer term.
  alternative_readings:
  - had been slain
  rationale: The sacrificial resonance of σφάζω coheres with the altar imagery and
    should be preserved. This is a lexical-theological choice because softer English
    could obscure the martyr-sacrifice imagery present in the Greek.
  doctrine_reference: Original-language primacy over translation tradition.
