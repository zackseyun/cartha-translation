id: REV.6.9
reference: Revelation 6:9
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἤνοιξεν τὴν πέμπτην σφραγῖδα, εἶδον ὑποκάτω τοῦ θυσιαστηρίου τὰς ψυχὰς
    τῶν ἐσφαγμένων διὰ τὸν λόγον τοῦ θεοῦ καὶ διὰ τὴν ⸀μαρτυρίαν ἣν εἶχον.
translation:
  text: And when he opened the fifth seal, I saw under the altar the souls of those
    who had been slaughtered because of the word of God and because of the testimony
    they had.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been slain.' The Greek verb can be rendered more traditionally this
      way, but 'slaughtered' better preserves its stronger, sacrificial force.
    reason: lexical_alternative
  - marker: b
    text: Or 'witness.' The Greek term may denote either testimony borne or witness
      given.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - broke open
  lexicon: BDAG
  rationale: Standard rendering of ἀνοίγω in the seal-opening sequence; 'opened' is
    natural English and fits the repeated formula in Revelation.
- source_word: σφραγῖδα
  chosen: seal
  lexicon: BDAG
  rationale: Conventional and precise rendering for σφραγίς in apocalyptic imagery.
- source_word: ὑποκάτω
  chosen: under
  alternatives:
  - beneath
  lexicon: BDAG
  rationale: Simple spatial term; 'under' is idiomatic and sufficiently literal.
- source_word: θυσιαστηρίου
  chosen: altar
  lexicon: BDAG
  rationale: Standard rendering of θυσιαστήριον; in Revelation this preserves sacrificial/cultic
    imagery without over-specifying heavenly or earthly referent.
- source_word: ψυχὰς
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: ψυχή can mean life, self, or soul, but here in visionary context referring
    to the disembodied dead under the altar, 'souls' best matches the scene and traditional
    semantic force without unnecessary paraphrase.
- source_word: ἐσφαγμένων
  chosen: had been slaughtered
  alternatives:
  - had been slain
  - had been killed
  lexicon: BDAG
  rationale: σφάζω is stronger than generic 'kill' and often used for violent slaughter,
    including sacrificial overtones in Revelation. 'Slaughtered' preserves that force
    better than the smoother 'slain.'
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  chosen: because of the word of God
  alternatives:
  - for the word of God
  - on account of the word of God
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason/cause. 'Because of' is
    clear modern English and preserves the causal sense.
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: μαρτυρία can be rendered 'testimony' or 'witness.' 'Testimony' fits the
    object of 'had' more naturally in English ('the testimony they had') while preserving
    the juridical/confessional sense.
- source_word: ἣν εἶχον
  chosen: they had
  alternatives:
  - they held
  - they maintained
  lexicon: BDAG
  rationale: A straightforward rendering of the imperfect ἔχω. 'They had' is idiomatic
    and avoids interpretive expansion; the imperfect nuance is adequately carried
    in English by the broader narrative context.
