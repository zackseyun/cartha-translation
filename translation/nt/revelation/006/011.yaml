id: REV.6.11
reference: Revelation 6:11
source:
  edition: SBLGNT
  text: καὶ ἐδόθη αὐτοῖς ἑκάστῳ στολὴ λευκή, καὶ ἐρρέθη αὐτοῖς ἵνα ⸀ἀναπαύσονται ἔτι χρόνον ⸀μικρόν, ἕως ⸀πληρωθῶσιν καὶ οἱ σύνδουλοι αὐτῶν καὶ οἱ ἀδελφοὶ ⸀αὐτῶν οἱ μέλλοντες ⸀ἀποκτέννεσθαι ὡς καὶ αὐτοί.
translation:
  text: And a white robe was given to each of them, and they were told that they should rest a little longer, until their fellow slaves and their brothers should also be made complete, those who are about to be killed just as they were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until their fellow servants and their brothers also should be fulfilled' or 'until the full number of their fellow slaves and brothers should be complete.' The Greek says simply 'until ... should be made complete/fulfilled.'
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' may here refer to fellow believers more broadly, including women, but the Greek uses the masculine plural ἀδελφοί.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their fellow slaves and their brothers also should be made complete'.
    reason: previous_rendering
lexical_decisions:
- source_word: στολή λευκή
  chosen: a white robe
  alternatives:
  - a white garment
  lexicon: BDAG
  rationale: στολή denotes a robe or long garment; 'robe' is the most natural and established English equivalent here, and λευκή is straightforwardly 'white.'
- source_word: ἑκάστῳ
  chosen: each of them
  alternatives:
  - to each one
  lexicon: BDAG
  rationale: The dative singular distributive sense is best conveyed idiomatically as 'to each of them' in English.
- source_word: ἐρρέθη αὐτοῖς
  chosen: they were told
  alternatives:
  - it was said to them
  lexicon: BDAG
  rationale: The passive of λέγω is naturally rendered in English as 'they were told'; this preserves the passive sense while avoiding stiffness.
- source_word: ἀναπαύσονται ἔτι χρόνον μικρόν
  chosen: they should rest a little longer
  alternatives:
  - they should rest yet a little time
  - they should wait a little longer
  lexicon: BDAG
  rationale: ἀναπαύω here carries the sense of resting or ceasing from labor/suffering. 'Rest a little longer' is idiomatic and preserves the temporal force of ἔτι...μικρόν.
- source_word: πληρωθῶσιν
  chosen: should be made complete
  alternatives:
  - should be fulfilled
  - should be completed
  - should reach the full number
  lexicon: BDAG
  rationale: The passive of πληρόω can mean 'be fulfilled' or 'be made complete/full.' In this context, with persons as subject, the sense likely concerns the completion of the group/number rather than moral perfection. 'Be made complete' preserves the passive and avoids over-specifying 'number' where the Greek does not explicitly state it.
- source_word: σύνδουλοι
  chosen: fellow slaves
  alternatives:
  - fellow servants
  - fellow bondservants
  lexicon: BDAG
  rationale: In line with the project's doctrine, δοῦλος-family terms are rendered with 'slave' where bonded status is salient. σύνδουλοι means those who share the same master; 'fellow slaves' preserves that force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the grammatically masculine term is retained as 'brothers.' In early Christian usage it may include the wider believing community, but the main text should match the source form; inclusivity can be noted in a footnote.
- source_word: μέλλοντες ἀποκτέννεσθαι
  chosen: those who are about to be killed
  alternatives:
  - those who were going to be killed
  - those destined to be killed
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates what is impending or expected. 'Are about to be killed' preserves the prospective force without importing a stronger deterministic nuance.
- source_word: ὡς καὶ αὐτοί
  chosen: just as they were
  alternatives:
  - even as they also were
  - as they themselves also were
  lexicon: BDAG
  rationale: This comparative clause refers back to the souls under the altar who had been slain. 'Just as they were' is clear and idiomatic in English.
