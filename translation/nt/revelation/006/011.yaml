  category: awkward_english
  tier: 1
  from: their fellow slaves and their brothers also should be made complete
  to: their fellow slaves and their brothers should also be made complete
  rationale: The current placement of 'also' between the subject ('slaves and brothers') and the modal verb ('should') is grammatically correct but stylistically awkward and slightly unnatural in English. Moving 'also' to its more common position after the modal verb ('should also') improves the flow and readability of the clause significantly without altering the meaning. This change better reflects the adverbial force of the initial 'καὶ' in the Greek phrase 'καὶ οἱ σύνδουλοι' in smooth English prose.
