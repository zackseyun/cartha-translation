theological_decisions:
- issue: Meaning of πληρωθῶσιν with the martyrs' fellow slaves and brothers as subject
  chosen_reading: Render generally as completion of the group ('should be made complete') rather than explicitly 'their number should be completed.'
  alternative_readings:
  - should be fulfilled
  - their number should be complete
  rationale: The Greek does not explicitly include 'number,' though that is a common interpretive expansion based on context. To avoid importing a more specific doctrinal or apocalyptic schema than the text states, the translation keeps the broader passive idea of completion while allowing readers to infer numerical completion from context.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of ἀδελφοί in a potentially mixed-gender referent
  chosen_reading: Use 'brothers' in the main text, with inclusivity noted in a footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral rendering. Since the Greek is masculine plural and may function representatively, the main text preserves 'brothers' while a footnote can acknowledge the likely broader referent.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of σύνδουλοι (δοῦλος-family term)
  chosen_reading: Use 'fellow slaves.'
  alternative_readings:
  - fellow servants
  - fellow bondservants
  rationale: The project's contested-terms guidance prefers 'slave' where bonded status is theologically salient. In Revelation's master-slave imagery of belonging to God, that bonded relation is significant enough to preserve.
  doctrine_reference: 'Contested terms table: δοῦλος'
