id: REV.6.1
reference: Revelation 6:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ⸀ὅτε ἤνοιξεν τὸ ἀρνίον μίαν ἐκ τῶν ἑπτὰ σφραγίδων, καὶ ἤκουσα ἑνὸς
    ἐκ τῶν τεσσάρων ζῴων λέγοντος ὡς φωνῇ βροντῆς· ⸀Ἔρχου.
translation:
  text: And I saw when the Lamb opened one of the seven seals, and I heard one of
    the four living creatures saying with a voice like thunder, “Come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Go forth,' if the command is understood as addressed to the rider rather
      than to John.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρνίον
  chosen: the Lamb
  alternatives:
  - the little lamb
  lexicon: BDAG
  rationale: Although the diminutive form can literally suggest 'little lamb,' in
    Revelation it functions as a christological title for Jesus. 'The Lamb' is the
    established and contextually accurate rendering without importing unnecessary
    diminutive nuance.
- source_word: μίαν ἐκ τῶν ἑπτὰ σφραγίδων
  chosen: one of the seven seals
  alternatives:
  - one from the seven seals
  lexicon: BDAG
  rationale: This is idiomatic partitive expression. 'One of the seven seals' is natural
    English and preserves the sense of a single seal being opened from the set of
    seven.
- source_word: ζῴων
  chosen: living creatures
  alternatives:
  - living beings
  - animals
  lexicon: BDAG
  rationale: In Revelation, ζῷον refers to the exalted throne-room beings, not ordinary
    animals. 'Living creatures' is the clearest established English equivalent and
    avoids misleading zoological associations.
- source_word: ὡς φωνῇ βροντῆς
  chosen: with a voice like thunder
  alternatives:
  - as with a voice of thunder
  - in a voice like thunder
  lexicon: BDAG
  rationale: The phrase compares the creature's voice to thunder. 'With a voice like
    thunder' is natural English and preserves the simile without over-literal awkwardness.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Go forth
  lexicon: BDAG
  rationale: The imperative of ἔρχομαι most directly means 'come.' Some translations
    use 'Come!' while others interpret the command as directed to the rider and render
    'Go forth!'; the Greek itself supports 'Come' most plainly, so that is retained
    in the main text and the alternative is preserved in a footnote.
- source_word: ὅτε
  chosen: when
  alternatives:
  - as
  - after
  lexicon: BDAG
  rationale: 'The conjunction introduces the time of John''s seeing: he saw when the
    Lamb opened the seal. ''When'' is the most straightforward temporal rendering.'
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist narrative verb rendered simply and directly. No additional verb
    such as 'looked' is warranted by the Greek here.
- source_word: ἤκουσα
  chosen: I heard
  lexicon: BDAG
  rationale: Standard rendering of the aorist of ἀκούω in narrative sequence.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - calling out
  - speaking
  lexicon: BDAG
  rationale: The participle is best rendered with a simple participial sense in English,
    maintaining the narrative flow and not overstating the manner of speech.
