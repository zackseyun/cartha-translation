theological_decisions:
- issue: Referent and force of the command Ἔρχου
  chosen_reading: Render the command as 'Come' without specifying the addressee in
    the main text.
  alternative_readings:
  - Render as 'Go forth' if understood as addressed to the rider rather than to John
  rationale: The Greek imperative itself is simply 'Come.' The text does not explicitly
    identify the addressee here, and preserving that openness best fits the translation
    philosophy of not resolving ambiguity beyond what the source warrants. Because
    many readers know the alternative interpretive rendering 'Go forth,' it is preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
