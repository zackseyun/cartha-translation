theological_decisions:
- issue: Rendering of Ἔρχου in the seal-opening formula
  chosen_reading: Come
  alternative_readings:
  - Go
  rationale: The Greek imperative Ἔρχου most naturally means 'Come.' Because the immediate
    context has generated debate about whether the summons is directed toward John
    or toward the rider, the translation preserves the lexical default in the main
    text and notes the contextual alternative in a footnote rather than resolving
    the interpretive question beyond the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
