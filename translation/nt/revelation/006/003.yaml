id: REV.6.3
reference: Revelation 6:3
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἤνοιξεν τὴν ⸂σφραγῖδα τὴν δευτέραν⸃, ἤκουσα τοῦ δευτέρου ζῴου λέγοντος·
    Ἔρχου.
translation:
  text: And when he opened the second seal, I heard the second living creature saying,
    “Come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go.” Some understand the command to be directed to the horseman rather
      than as a summons to come forward.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective; retained to preserve the narrative flow from the
    preceding verse.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: Temporal conjunction introducing the next event in sequence; 'when' is
    the most natural and sufficiently formal rendering.
- source_word: ἤνοιξεν
  chosen: he opened
  alternatives:
  - he broke
  lexicon: BDAG
  rationale: ἀνοίγω means 'open.' Although seals are conceptually broken to open a
    scroll, the Greek verb here is 'opened,' and the translation should not import
    a more interpretive verb.
- source_word: σφραγῖδα τὴν δευτέραν
  chosen: the second seal
  alternatives:
  - the seal, the second
  lexicon: BDAG
  rationale: Natural English rendering of the article-noun-adjective construction
    while preserving the ordinal emphasis.
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω in narrative context is best rendered simply
    as 'I heard.'
- source_word: τοῦ δευτέρου ζῴου
  chosen: the second living creature
  alternatives:
  - the second creature
  - the second animal
  lexicon: BDAG
  rationale: ζῷον in Revelation refers to the exalted throne beings of chapters 4–6,
    not ordinary animals; 'living creature' is the clearest established English rendering
    that avoids misleading connotations.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - that said
  lexicon: BDAG
  rationale: Present participle dependent on 'I heard'; 'saying' preserves the participial
    force in smooth English.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come!
  - Go!
  lexicon: BDAG
  rationale: Second person middle/passive imperative of ἔρχομαι is most directly 'Come.'
    In this context some argue for 'Go' depending on whether the command is addressed
    to the horseman or to John, but the lexical sense is 'come'; the alternative is
    preserved in a footnote because the addressee is contextually debated.
