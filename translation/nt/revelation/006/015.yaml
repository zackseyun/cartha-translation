id: REV.6.15
reference: Revelation 6:15
source:
  edition: SBLGNT
  text: καὶ οἱ βασιλεῖς τῆς γῆς καὶ οἱ μεγιστᾶνες καὶ οἱ χιλίαρχοι καὶ οἱ πλούσιοι
    καὶ οἱ ἰσχυροὶ καὶ πᾶς δοῦλος καὶ ἐλεύθερος ἔκρυψαν ἑαυτοὺς εἰς τὰ σπήλαια καὶ
    εἰς τὰς πέτρας τῶν ὀρέων·
translation:
  text: And the kings of the earth, and the great men, and the commanders, and the
    rich, and the strong, and every slave and free person, hid themselves in the caves
    and among the rocks of the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nobles' for 'the great men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every slave and free man'; the Greek uses a masculine singular pair
      with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: BDAG
  rationale: γῆ can mean either 'earth' or 'land'; in Revelation's cosmic judgment
    context, 'earth' best fits the scope of the scene and aligns with the repeated
    phrase in the book.
- source_word: μεγιστᾶνες
  chosen: the great men
  alternatives:
  - the nobles
  - the magnates
  - the great ones
  lexicon: BDAG
  rationale: The term denotes high-ranking or prominent persons. 'Great men' preserves
    the social-status sense and the masculine form of the Greek, while remaining readable.
    'Nobles' is possible but may imply hereditary aristocracy too narrowly.
- source_word: χιλίαρχοι
  chosen: the commanders
  alternatives:
  - the military commanders
  - the captains
  - the chiliarchs
  lexicon: BDAG
  rationale: Literally the term refers to commanders of a thousand, but in idiomatic
    English 'commanders' communicates the military rank without awkwardness. 'Captains'
    may sound too low in rank; 'military commanders' is slightly more interpretive.
- source_word: πλούσιοι
  chosen: the rich
  alternatives:
  - the wealthy
  lexicon: BDAG
  rationale: Substantival adjective naturally rendered 'the rich'; concise and standard
    English.
- source_word: ἰσχυροὶ
  chosen: the strong
  alternatives:
  - the powerful
  - the mighty
  lexicon: BDAG
  rationale: The adjective can denote strength or power. 'The strong' keeps closer
    lexical correspondence while still fitting the list of social groups. 'Powerful'
    is plausible but overlaps more with status than strength.
- source_word: πᾶς δοῦλος καὶ ἐλεύθερος
  chosen: every slave and free person
  alternatives:
  - every slave and free man
  - everyone, slave and free
  lexicon: BDAG
  rationale: δοῦλος is rendered 'slave' per the project's guidance where bonded status
    is explicit; here the slave/free contrast makes that social distinction salient.
    'Free person' is supplied for natural English and to make explicit the antithesis
    with δοῦλος without restricting the sense to males only.
- source_word: ἔκρυψαν ἑαυτοὺς
  chosen: hid themselves
  alternatives:
  - concealed themselves
  lexicon: BDAG
  rationale: Straightforward reflexive sense of κρύπτω with ἑαυτούς; 'hid themselves'
    is natural and sufficiently literal.
- source_word: εἰς τὰ σπήλαια
  chosen: in the caves
  alternatives:
  - into the caves
  lexicon: BDAG
  rationale: Although εἰς often marks motion into, English idiom after 'hid themselves'
    commonly uses 'in the caves.' The sense of location after movement is preserved
    naturally.
- source_word: εἰς τὰς πέτρας τῶν ὀρέων
  chosen: among the rocks of the mountains
  alternatives:
  - into the rocks of the mountains
  - in the rocks of the mountains
  lexicon: BDAG
  rationale: πέτραι here likely refers to rocky crags or rock formations associated
    with the mountains. 'Among the rocks' conveys hiding within mountainous rock clefts
    more idiomatically than the wooden 'into the rocks.'
