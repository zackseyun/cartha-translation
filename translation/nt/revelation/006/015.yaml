theological_decisions:
- issue: Rendering of δοῦλος in the slave/free pair
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The immediate contrast with ἐλεύθερος makes the bonded social status
    explicit, so 'slave' best preserves the text's force and aligns with the doctrine
    guideline for δοῦλος when bonded nature is salient.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος → servant / slave (context-dependent);
    use ''slave'' where the bonded nature is salient.'
- issue: Gender representation in κοινωνic status list
  chosen_reading: free person
  alternative_readings:
  - free man
  rationale: Although ἐλεύθερος is grammatically masculine singular, the phrase functions
    representatively in a stock social pair ('slave and free') encompassing all people.
    'Free person' preserves the generic force in natural English without overstating
    male specificity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral.'
