theological_decisions:
- issue: Symbolic identification of the incense with the prayers
  chosen_reading: Render the clause directly as 'which are the prayers of the saints'
    without weakening the identification.
  alternative_readings:
  - which represent the prayers of the saints
  rationale: The Greek uses a straightforward equative clause (αἵ εἰσιν), and the
    apocalyptic symbolism should be preserved rather than paraphrased into a more
    interpretive formulation.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Rendering of ἅγιοι
  chosen_reading: saints
  alternative_readings:
  - holy ones
  - God's people
  rationale: In this worship context, 'saints' is both accurate and idiomatic, and
    it preserves continuity with the term's theological usage for God's consecrated
    people without narrowing it to a later canonized-saints concept.
  doctrine_reference: 'Translation philosophy #5'
