id: REV.5.8
reference: Revelation 5:8
source:
  edition: SBLGNT
  text: καὶ ὅτε ἔλαβεν τὸ βιβλίον, τὰ τέσσαρα ζῷα καὶ οἱ εἴκοσι τέσσαρες πρεσβύτεροι
    ἔπεσαν ἐνώπιον τοῦ ἀρνίου, ἔχοντες ἕκαστος κιθάραν καὶ φιάλας χρυσᾶς γεμούσας
    θυμιαμάτων, αἵ εἰσιν ⸀αἱ προσευχαὶ τῶν ἁγίων·
translation:
  text: And when he took the scroll, the four living creatures and the twenty-four
    elders fell down before the Lamb, each holding a harp and golden bowls full of
    incense, which are the prayers of the saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lyre' for 'a harp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the prayers of the holy ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  lexicon: BDAG
  rationale: In Revelation, βιβλίον commonly refers to a rolled written document rather
    than a modern codex-style book. 'Scroll' better reflects the likely ancient form
    and the scene's imagery.
- source_word: ζῷα
  chosen: living creatures
  alternatives:
  - living beings
  - beasts
  lexicon: BDAG
  rationale: ζῷα here refers to the exalted heavenly beings around the throne, not
    animals in a pejorative sense. 'Living creatures' is the established and contextually
    accurate rendering.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - presbyters
  lexicon: BDAG
  rationale: The term denotes the twenty-four heavenly elders. 'Elders' is natural
    English and preserves the representative or dignified sense without importing
    later ecclesiastical office terminology.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise, idiomatic, and adequately conveys spatial and
    reverential proximity in this worship scene.'
- source_word: ἀρνίου
  chosen: the Lamb
  lexicon: BDAG
  rationale: This is the established christological title in Revelation. It should
    be translated, not transliterated, to preserve the title's meaning and sacrificial
    resonance.
- source_word: ἔχοντες ἕκαστος
  chosen: each holding
  alternatives:
  - each having
  - holding, each one
  lexicon: BDAG
  rationale: The participial construction modifies the elders and living creatures
    as they fall down. 'Each holding' is smooth modern English and preserves the distributive
    force of ἕκαστος.
- source_word: κιθάραν
  chosen: a harp
  alternatives:
  - a lyre
  lexicon: BDAG
  rationale: κιθάρα denotes a stringed instrument. 'Harp' is the conventional rendering
    in this apocalyptic worship context, though 'lyre' is a possible more technical
    equivalent.
- source_word: φιάλας χρυσᾶς
  chosen: golden bowls
  alternatives:
  - golden incense bowls
  - golden vials
  lexicon: BDAG
  rationale: φιάλη denotes a bowl or shallow vessel. 'Bowls' is clearer in modern
    English than 'vials' and fits the imagery of vessels containing incense.
- source_word: γεμούσας θυμιαμάτων
  chosen: full of incense
  alternatives:
  - filled with incense offerings
  - full of fragrant incense
  lexicon: BDAG
  rationale: θυμίαμα refers to incense. The plural θυμιαμάτων is naturally rendered
    as a mass noun in English. 'Full of incense' is idiomatic and faithful.
- source_word: αἵ εἰσιν αἱ προσευχαὶ τῶν ἁγίων
  chosen: which are the prayers of the saints
  alternatives:
  - which are the prayers of the holy ones
  - which represent the prayers of the saints
  lexicon: BDAG
  rationale: The relative clause identifies the incense symbolically with the prayers.
    'Saints' is retained as the standard rendering of ἅγιοι in this context, referring
    to God's holy people; 'holy ones' is possible but less idiomatic here.
