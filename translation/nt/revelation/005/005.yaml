id: REV.5.5
reference: Revelation 5:5
source:
  edition: SBLGNT
  text: καὶ εἷς ἐκ τῶν πρεσβυτέρων λέγει μοι· Μὴ κλαῖε· ἰδοὺ ἐνίκησεν ὁ λέων ὁ ἐκ
    τῆς φυλῆς Ἰούδα, ἡ ῥίζα Δαυίδ, ⸀ἀνοῖξαι τὸ βιβλίον καὶ τὰς ἑπτὰ σφραγῖδας αὐτοῦ.
translation:
  text: And one of the elders says to me, “Do not weep. Look—the Lion from the tribe
    of Judah, the Root of David, has conquered, so that he can open the scroll and
    its seven seals.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “the Lion of the tribe of Judah.”
    reason: lexical_alternative
  - marker: b
    text: Or “has overcome.” The Greek verb is a key Revelation term for victorious
      conquest.
    reason: lexical_alternative
  - marker: c
    text: The phrase “so that he can open” renders a Greek infinitive that may also
      be translated more literally as “to open.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In Revelation, πρεσβύτεροι functions as a recognized heavenly group/title
    rather than merely describing age, so 'elders' best preserves the apocalyptic
    setting and intertextual resonance.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The present tense is a vivid/narrative present. Rendering it as 'says'
    preserves the Greek aspect and immediacy in readable English.
- source_word: Μὴ κλαῖε
  chosen: Do not weep
  alternatives:
  - Do not cry
  - Stop weeping
  lexicon: BDAG
  rationale: κλαίω denotes weeping/crying. 'Do not weep' is idiomatic and preserves
    the solemn tone. 'Stop weeping' is possible if the present imperative is taken
    as progressive, but English idiom does not require that nuance here.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' is natural modern
    English and retains the force without archaic tone; 'Behold' is too traditional/archaic
    for the stated philosophy.
- source_word: ἐνίκησεν
  chosen: has conquered
  alternatives:
  - has overcome
  - was victorious
  lexicon: BDAG
  rationale: νικάω is a key Johannine/Revelation verb meaning conquer/overcome. 'Has
    conquered' preserves the victory motif strongly and reads naturally in context.
- source_word: ὁ λέων ὁ ἐκ τῆς φυλῆς Ἰούδα
  chosen: the Lion from the tribe of Judah
  alternatives:
  - the Lion of the tribe of Judah
  lexicon: BDAG
  rationale: The phrase identifies the messianic figure by origin/association with
    Judah. 'From the tribe of Judah' closely reflects ἐκ while remaining idiomatic.
    The more traditional 'of the tribe of Judah' is also possible and worth preserving.
- source_word: ἡ ῥίζα Δαυίδ
  chosen: the Root of David
  alternatives:
  - the root of David
  lexicon: BDAG
  rationale: A titular messianic expression echoing Isaianic imagery. Capitalizing
    'Root' treats it as a christological title in context, consistent with translating
    titles while preserving recognizable messianic force.
- source_word: ἀνοῖξαι
  chosen: so that he can open
  alternatives:
  - to open
  - and open
  lexicon: BDAG
  rationale: 'The infinitive here expresses result or effective qualification after
    ''has conquered'': he has conquered with the consequence that he is able/worthy
    to open the scroll. English often needs an explicit connector; ''so that he can
    open'' makes the relation clear without overparaphrase.'
- source_word: τὸ βιβλίον
  chosen: the scroll
  alternatives:
  - the book
  lexicon: BDAG
  rationale: In this apocalyptic setting βιβλίον refers to a written scroll rather
    than a codex-style book. 'Scroll' is the historically and contextually accurate
    rendering.
- source_word: σφραγῖδας
  chosen: seals
  alternatives:
  - seal impressions
  lexicon: BDAG
  rationale: Standard rendering for σφραγίς in this context; it refers to the seals
    securing the scroll.
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - of it
  lexicon: BDAG
  rationale: The pronoun refers to the neuter βιβλίον/scroll. 'Its' is the natural
    English possessive.
