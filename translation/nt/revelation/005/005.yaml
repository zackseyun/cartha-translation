theological_decisions:
- issue: Messianic royal titles applied to Jesus
  chosen_reading: 'Retain both titles as explicit messianic designations: ''the Lion
    from the tribe of Judah, the Root of David.'''
  alternative_readings:
  - Reduce one or both titles to explanatory paraphrase
  rationale: The verse intentionally stacks royal/messianic identifiers drawn from
    Israel's Scriptures. Preserving them directly maintains the christological force
    without importing extra doctrinal explanation beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1-2, 6
- issue: Force of ἀνοῖξαι after ἐνίκησεν
  chosen_reading: 'Express the infinitive as result/qualification: ''has conquered,
    so that he can open.'''
  alternative_readings:
  - '''has conquered to open'''
  - '''has conquered and can open'''
  rationale: The syntax links the victory to the right/ability to open the scroll.
    The chosen wording preserves that theological logic—victory grounds access—without
    adding explicit 'worthiness' language not present in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
