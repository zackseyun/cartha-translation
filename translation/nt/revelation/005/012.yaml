theological_decisions:
- issue: Christological title and capitalization
  chosen_reading: the Lamb
  alternative_readings:
  - the lamb
  rationale: In Revelation, ἀρνίον is a recognized title for the exalted yet slain
    Jesus. Capitalization signals titular use without adding doctrinal content beyond
    the context.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Rendering of sacrificial death language
  chosen_reading: who was slain
  alternative_readings:
  - who was slaughtered
  - having been slain
  rationale: The verse presents the Lamb's worthiness in relation to his sacrificial
    death. 'Slain' preserves that theological connection in natural English without
    over-interpreting the atonement mechanism.
  doctrine_reference: Affirmations; Translation philosophy §6
