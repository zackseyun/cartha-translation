id: REV.5.12
reference: Revelation 5:12
source:
  edition: SBLGNT
  text: λέγοντες φωνῇ μεγάλῃ· Ἄξιόν ἐστιν τὸ ἀρνίον τὸ ἐσφαγμένον λαβεῖν τὴν δύναμιν
    ⸀καὶ πλοῦτον καὶ σοφίαν καὶ ἰσχὺν καὶ τιμὴν καὶ δόξαν καὶ εὐλογίαν.
translation:
  text: saying with a loud voice, “Worthy is the Lamb who was slain to receive power
    and wealth and wisdom and might and honor and glory and blessing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who was slaughtered.” The Greek participle can be rendered more graphically,
      but “slain” better fits the elevated worship setting here.
    reason: lexical_alternative
  - marker: b
    text: Or “riches” for “wealth.”
    reason: lexical_alternative
  - marker: c
    text: Or “strength” for “might.” The translation uses “might” to distinguish this
      term from the earlier “power.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: Present participle modifying the heavenly multitude from the previous
    verse; 'saying' preserves the participial linkage and vividness without over-specifying
    aspect.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: Instrumental/dative expression idiomatically rendered 'with a loud voice.'
    This keeps the concrete imagery better than the adverb 'loudly'.
- source_word: Ἄξιόν ἐστιν
  chosen: Worthy is
  alternatives:
  - is worthy
  lexicon: BDAG
  rationale: Predicate adjective construction naturally fronted in English for elevated,
    doxological style matching the Greek emphasis.
- source_word: τὸ ἀρνίον
  chosen: the Lamb
  lexicon: BDAG
  rationale: Standard rendering of Revelation's christological title ἀρνίον. Capitalized
    because it functions here as a title for Jesus/Messiah in context.
- source_word: τὸ ἐσφαγμένον
  chosen: who was slain
  alternatives:
  - that was slain
  - having been slain
  - who was slaughtered
  lexicon: BDAG
  rationale: Perfect passive participle of σφάζω. 'Who was slain' is idiomatic and
    dignified in English while preserving the sacrificial/death sense. 'Slaughtered'
    is more graphic but less natural in this liturgical context.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to take
  lexicon: BDAG
  rationale: Infinitive expressing what the Lamb is worthy to receive. 'Receive' fits
    the conferral of honor in the hymn better than the more forceful 'take,' though
    λαμβάνω can bear either sense contextually.
- source_word: δύναμιν
  chosen: power
  lexicon: BDAG
  rationale: Standard gloss for δύναμις; here the first item in the sevenfold ascription.
- source_word: πλοῦτον
  chosen: wealth
  alternatives:
  - riches
  lexicon: BDAG
  rationale: '''Wealth'' is clear modern English and avoids slightly archaic tone,
    while preserving the sense of abundance/resources.'
- source_word: σοφίαν
  chosen: wisdom
  lexicon: BDAG
  rationale: Direct and standard rendering.
- source_word: ἰσχὺν
  chosen: might
  alternatives:
  - strength
  lexicon: BDAG
  rationale: Chose 'might' to distinguish ἰσχύς from δύναμις ('power'), preserving
    the rhetorical variety of the seven terms. 'Strength' is possible but slightly
    flatter in this doxological list.
- source_word: τιμὴν
  chosen: honor
  lexicon: BDAG
  rationale: Standard rendering in contexts of bestowed worth and reverence.
- source_word: δόξαν
  chosen: glory
  lexicon: BDAG
  rationale: Standard biblical rendering, especially appropriate in worship contexts.
- source_word: εὐλογίαν
  chosen: blessing
  alternatives:
  - praise
  lexicon: BDAG
  rationale: Primary sense here is blessing/ascription of blessing. 'Praise' captures
    part of the effect but narrows the lexical range.
