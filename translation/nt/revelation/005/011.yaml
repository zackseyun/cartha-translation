theological_decisions:
- issue: Rendering of apocalyptic throne-room beings (ζῷα)
  chosen_reading: the living creatures
  alternative_readings:
  - the living beings
  - the creatures
  rationale: This preserves the distinctive identity of the four ζῷα in Revelation
    without flattening them into ordinary animals or abstract beings. The choice is
    lexical rather than doctrinal, but it avoids interpretive reduction.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
