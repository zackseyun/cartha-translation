id: REV.5.11
reference: Revelation 5:11
source:
  edition: SBLGNT
  text: Καὶ εἶδον, καὶ ⸀ἤκουσα φωνὴν ἀγγέλων πολλῶν κύκλῳ τοῦ θρόνου καὶ τῶν ζῴων
    καὶ τῶν πρεσβυτέρων, καὶ ἦν ὁ ἀριθμὸς αὐτῶν μυριάδες μυριάδων καὶ χιλιάδες χιλιάδων,
translation:
  text: And I looked, and I heard the voice of many angels around the throne and the
    living creatures and the elders, and their number was myriads of myriads and thousands
    of thousands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I saw" at the beginning of the verse.
    reason: lexical_alternative
  - marker: b
    text: Greek "myriads of myriads and thousands of thousands," an idiom for an immense
      multitude; alternatively, "ten thousands of ten thousands and thousands of thousands."
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I looked
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: 'Rendered as "I looked" to reflect the visionary progression in context:
    John turns his attention and then reports what he hears. "I saw" is possible and
    common, but "I looked" better preserves the sequence with the following "I heard."'
- source_word: ἤκουσα
  chosen: I heard
  lexicon: BDAG
  rationale: Standard rendering of ἀκούω in the aorist narrative.
- source_word: φωνὴν
  chosen: the voice
  alternatives:
  - a voice
  - the sound
  lexicon: BDAG
  rationale: Although anarthrous in Greek, English idiom naturally takes "the voice"
    here because the genitive phrase specifies whose voice is heard. "Sound" is possible
    but less personal than the context suggests.
- source_word: ἀγγέλων πολλῶν
  chosen: of many angels
  alternatives:
  - of a great many angels
  lexicon: BDAG
  rationale: Straightforward genitive construction; "many angels" is natural and sufficiently
    weighty without expansion.
- source_word: κύκλῳ
  chosen: around
  alternatives:
  - in a circle around
  - surrounding
  lexicon: BDAG
  rationale: Best concise English equivalent for the spatial preposition/adverb in
    this context.
- source_word: θρόνου
  chosen: the throne
  lexicon: BDAG
  rationale: Standard rendering; in Revelation this refers to the heavenly throne
    in the vision.
- source_word: ζῴων
  chosen: the living creatures
  alternatives:
  - the creatures
  - the living beings
  lexicon: BDAG
  rationale: '"Living creatures" is the established and semantically precise rendering
    for ζῷα in Revelation, distinguishing them from ordinary animals and preserving
    the visionary character.'
- source_word: πρεσβυτέρων
  chosen: the elders
  lexicon: BDAG
  rationale: Standard rendering of πρεσβύτεροι in Revelation's throne-room scenes.
- source_word: ἦν ὁ ἀριθμὸς αὐτῶν
  chosen: their number was
  alternatives:
  - the number of them was
  lexicon: BDAG
  rationale: Natural English rendering of the clause while preserving the explicit
    statement about number.
- source_word: μυριάδες μυριάδων
  chosen: myriads of myriads
  alternatives:
  - ten thousands of ten thousands
  - countless myriads
  lexicon: BDAG
  rationale: Kept relatively formal to preserve the Greek idiom and the sense of an
    immense, almost uncountable multitude. "Ten thousands of ten thousands" is more
    literal numerically but less natural in modern English; "countless" over-interprets.
- source_word: χιλιάδες χιλιάδων
  chosen: thousands of thousands
  alternatives:
  - thousands upon thousands
  lexicon: BDAG
  rationale: Preserves the repetitive Semitic-style numerical expression. "Thousands
    upon thousands" is idiomatic but slightly freer.
