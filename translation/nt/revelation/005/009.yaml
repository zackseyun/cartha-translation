theological_decisions:
- issue: Object of 'purchased' not explicitly stated in the Greek clause
  chosen_reading: 'supply ''people'' in English: ''you purchased for God people from
    every tribe...'''
  alternative_readings:
  - 'leave the object implicit: ''you purchased for God from every tribe...'''
  rationale: Although the direct object is not overtly repeated in this verse's Greek
    text, English normally requires one, and the immediate context plus the common
    textual tradition support an implied human object. Supplying 'people' makes the
    sentence intelligible without importing a narrower doctrinal claim than the context
    warrants.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Atonement language in 'by your blood'
  chosen_reading: retain sacrificial language without expanding into a doctrinal formula
  alternative_readings:
  - paraphrase as 'by your death'
  rationale: The verse explicitly grounds the purchase in the Lamb's blood. The translation
    preserves that concrete sacrificial wording and does not flatten it into a generalized
    statement about death alone.
  doctrine_reference: Affirmations; Translation philosophy §1
