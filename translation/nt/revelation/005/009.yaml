id: REV.5.9
reference: Revelation 5:9
source:
  edition: SBLGNT
  text: καὶ ᾄδουσιν ᾠδὴν καινὴν λέγοντες· Ἄξιος εἶ λαβεῖν τὸ βιβλίον καὶ ἀνοῖξαι τὰς
    σφραγῖδας αὐτοῦ, ὅτι ἐσφάγης καὶ ἠγόρασας τῷ ⸀θεῷ ἐν τῷ αἵματί σου ἐκ πάσης φυλῆς
    καὶ γλώσσης καὶ λαοῦ καὶ ἔθνους,
translation:
  text: And they sing a new song, saying, “You are worthy to take the scroll and to
    open its seals, because you were slain, and by your blood you purchased for God
    people from every tribe and language and people and nation,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to God.' The Greek dative τῷ θεῷ can be rendered either way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'with your blood.'
    reason: lexical_alternative
  - marker: c
    text: Lit. 'from every tribe and language and people and nation'—a fourfold formula
      emphasizing the worldwide scope of those purchased.
    reason: cultural_note
lexical_decisions:
- source_word: ᾄδουσιν
  chosen: they sing
  alternatives:
  - they are singing
  - they sing praises
  lexicon: BDAG
  rationale: 'Present indicative is naturally rendered as a vivid present in English
    narrative: ''they sing.'' ''Sing praises'' adds content not explicit in the verb.'
- source_word: ᾠδὴν καινὴν
  chosen: a new song
  alternatives:
  - a fresh song
  lexicon: BDAG
  rationale: Standard and idiomatic rendering; 'new' preserves the biblical motif
    without unnecessary paraphrase.
- source_word: Ἄξιος εἶ
  chosen: You are worthy
  alternatives:
  - Worthy are you
  lexicon: BDAG
  rationale: Idiomatic modern English while preserving the direct acclamation. The
    more formal inversion is possible but less natural.
- source_word: τὸ βιβλίον
  chosen: the scroll
  alternatives:
  - the book
  lexicon: BDAG
  rationale: In Revelation this refers to a rolled written document sealed with seals;
    'scroll' better reflects the ancient object than 'book'.
- source_word: ἀνοῖξαι τὰς σφραγῖδας αὐτοῦ
  chosen: to open its seals
  alternatives:
  - to break its seals
  - to open its sealed scroll
  lexicon: BDAG
  rationale: The Greek says literally 'open its seals,' an idiomatic compression for
    opening what is sealed. 'Break its seals' is interpretive; 'open its seals' stays
    closer to the wording.
- source_word: ἐσφάγης
  chosen: you were slain
  alternatives:
  - you were slaughtered
  - you were killed
  lexicon: BDAG
  rationale: '''Slain'' preserves the sacrificial and violent nuance of σφάζω better
    than the flatter ''killed,'' while remaining readable.'
- source_word: ἠγόρασας
  chosen: you purchased
  alternatives:
  - you bought
  - you redeemed
  lexicon: BDAG
  rationale: The verb's core commercial sense is 'buy/purchase.' 'Redeemed' is theologically
    possible in context but imports a more interpretive gloss than the lexical form
    itself warrants.
- source_word: τῷ θεῷ
  chosen: for God
  alternatives:
  - to God
  lexicon: BDAG
  rationale: 'The dative here is well represented by ''for God'' in English: those
    purchased belong to God. ''To God'' is possible and preserved in a footnote as
    a lexical alternative.'
- source_word: ἐν τῷ αἵματί σου
  chosen: by your blood
  alternatives:
  - with your blood
  - in your blood
  lexicon: BDAG
  rationale: Here ἐν is instrumental; 'by your blood' is idiomatic English and clearly
    expresses means. 'With your blood' is also possible and worth preserving in a
    footnote.
- source_word: ἐκ πάσης φυλῆς καὶ γλώσσης καὶ λαοῦ καὶ ἔθνους
  chosen: from every tribe and language and people and nation
  alternatives:
  - out of every tribe and tongue and people and nation
  lexicon: BDAG
  rationale: '''From every'' accurately renders ἐκ πάσης across the fourfold list.
    ''Language'' is more natural modern English than ''tongue,'' while preserving
    the ethnic-linguistic scope.'
- source_word: λαοῦ
  chosen: people
  alternatives:
  - peoples
  lexicon: BDAG
  rationale: Singular collective 'people' is the most natural English equivalent in
    this stock fourfold formula. 'Peoples' is possible but less idiomatic here.
