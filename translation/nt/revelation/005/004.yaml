id: REV.5.4
reference: Revelation 5:4
source:
  edition: SBLGNT
  text: καὶ ⸀ἐγὼ ἔκλαιον πολὺ ὅτι οὐδεὶς ἄξιος εὑρέθη ἀνοῖξαι τὸ βιβλίον οὔτε βλέπειν
    αὐτό·
translation:
  text: And I was weeping greatly because no one was found worthy to open the scroll
    or to look into it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the book." The Greek word βιβλίον can mean either, but in this setting
      "scroll" best fits the ancient form and the imagery of opening it.
    reason: lexical_alternative
  - marker: b
    text: Or "to look at it." The phrase may mean simply seeing it, but in context
      likely refers to looking into its contents.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαιον
  chosen: was weeping
  alternatives:
  - wept
  - began to weep
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time, best represented
    by the English progressive rather than a simple past.
- source_word: πολὺ
  chosen: greatly
  alternatives:
  - much
  - loudly
  - bitterly
  lexicon: BDAG
  rationale: Adverbial accusative intensifies the weeping. 'Greatly' is natural modern
    English and preserves the strength without adding emotional nuance not explicit
    in the Greek.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard indefinite negative referring to absence of any qualified person;
    'no one' is clear and suitably formal.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - fit
  - qualified
  lexicon: BDAG
  rationale: In Revelation this term carries moral and status fitness before God;
    'worthy' preserves the theological weight better than flatter alternatives.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - could be found
  - was discovered
  lexicon: BDAG
  rationale: Aorist passive is naturally rendered 'was found.' This keeps the passive
    form and avoids over-interpreting agency.
- source_word: ἀνοῖξαι
  chosen: to open
  lexicon: BDAG
  rationale: Straightforward infinitive after 'worthy,' expressing the action for
    which worthiness is required.
- source_word: τὸ βιβλίον
  chosen: the scroll
  alternatives:
  - the book
  lexicon: BDAG
  rationale: In this apocalyptic setting βιβλίον refers to a scroll rather than a
    codex-style book. 'Scroll' better matches the ancient object and the scene in
    Revelation 5.
- source_word: οὔτε βλέπειν αὐτό
  chosen: or to look into it
  alternatives:
  - nor to look at it
  - nor even to look into it
  lexicon: BDAG
  rationale: βλέπειν here likely means more than a glance at the exterior; in context
    it refers to looking into the scroll's contents. 'Look into it' captures the sense
    naturally in English. 'Even' is omitted from the main text because it is not explicit,
    though the force is contextually implied.
- source_word: καὶ ἐγώ
  chosen: And I
  alternatives:
  - Then I
  - And I myself
  lexicon: BDAG
  rationale: καὶ links the narrative forward, while explicit ἐγώ gives natural emphasis
    to John as the experiencer. 'And I' preserves both without overemphasis.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the reason for John's weeping, so 'because' is the clearest
    English rendering.
