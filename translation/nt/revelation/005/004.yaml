theological_decisions:
- issue: Nature of ἄξιος in the heavenly throne-room scene
  chosen_reading: Render as 'worthy' with moral and covenantal weight intact
  alternative_readings:
  - qualified
  - fit
  rationale: The context is not merely procedural competence but worthiness before
    God to enact the divine purpose contained in the scroll. The translation should
    preserve that theological gravity without expanding the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referent of βιβλίον in Revelation 5
  chosen_reading: Translate as 'scroll'
  alternative_readings:
  - book
  rationale: The apocalyptic throne-room imagery and the action of opening support
    an ancient scroll rather than a modern 'book.' This is a lexical-cultural decision
    with interpretive significance for readers' mental picture, but it does not alter
    doctrine.
  doctrine_reference: Translation philosophy §§1, 6
