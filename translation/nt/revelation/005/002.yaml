theological_decisions:
- issue: Rendering βιβλίον in the throne-room vision
  chosen_reading: scroll
  alternative_readings:
  - book
  rationale: The apocalyptic imagery involves a written object sealed with multiple
    seals, which in the first-century context is more naturally a scroll than a modern-style
    book. This is a lexical-historical decision rather than a doctrinal one, but it
    affects how readers visualize the scene.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
