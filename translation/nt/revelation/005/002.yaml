id: REV.5.2
reference: Revelation 5:2
source:
  edition: SBLGNT
  text: καὶ εἶδον ἄγγελον ἰσχυρὸν κηρύσσοντα ἐν φωνῇ μεγάλῃ· Τίς ⸀ἄξιος ἀνοῖξαι τὸ
    βιβλίον καὶ λῦσαι τὰς σφραγῖδας αὐτοῦ;
translation:
  text: And I saw a mighty angel proclaiming with a loud voice, “Who is worthy to
    open the scroll and break its seals?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “book.” The Greek word βιβλίον can mean a written document generally,
      but here “scroll” best fits an item sealed with multiple seals.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελον ἰσχυρόν
  chosen: a mighty angel
  alternatives:
  - a strong angel
  - a powerful angel
  lexicon: BDAG
  rationale: ἰσχυρός denotes strength or power. 'Mighty' is idiomatic in English for
    a heavenly being and preserves the force without sounding wooden.
- source_word: κηρύσσοντα
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  - crying out
  lexicon: BDAG
  rationale: κηρύσσω is to herald or proclaim publicly. 'Proclaiming' fits the solemn,
    public declaration better than 'preaching' in this apocalyptic scene.
- source_word: ἐν φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: This is a common idiom meaning audible, forceful speech. 'With a loud
    voice' is natural English and preserves the emphasis.
- source_word: Τίς ἄξιος
  chosen: Who is worthy
  alternatives:
  - Who is deserving
  - Who is fit
  lexicon: BDAG
  rationale: ἄξιος here conveys worthiness or fitness for a solemn task. 'Worthy'
    is the standard and most theologically resonant rendering in this context.
- source_word: ἀνοῖξαι τὸ βιβλίον
  chosen: to open the scroll
  alternatives:
  - to open the book
  - to open the document
  lexicon: BDAG
  rationale: βιβλίον in Revelation commonly refers to a scroll rather than a codex-style
    'book.' 'Scroll' better reflects the likely ancient form and the imagery of sealed
    writing.
- source_word: λῦσαι τὰς σφραγῖδας αὐτοῦ
  chosen: and break its seals
  alternatives:
  - and loose its seals
  - and unseal it
  lexicon: BDAG
  rationale: λύω literally means loose, untie, or release. With seals, the sense is
    to break or remove them so the scroll can be opened. 'Break its seals' is clear
    and contextually precise while preserving the concrete imagery.
