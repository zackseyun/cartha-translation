id: REV.5.10
reference: Revelation 5:10
source:
  edition: SBLGNT
  text: καὶ ἐποίησας αὐτοὺς τῷ θεῷ ἡμῶν ⸀βασιλείαν καὶ ἱερεῖς, καὶ ⸀βασιλεύουσιν ἐπὶ
    τῆς γῆς.
translation:
  text: and you made them a kingdom and priests to our God, and they will reign on
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “kings and priests” instead of “a kingdom and priests.”
    reason: textual_variant
  - marker: b
    text: Some manuscripts read “they reign on the earth” instead of “they will reign
      on the earth.”
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίησας
  chosen: you made
  alternatives:
  - you have made
  lexicon: BDAG
  rationale: Aorist active indicative, rendered as a simple past in English for natural
    narrative style in the hymn. Present-perfect English is possible but less direct
    here.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative plural pronoun referring to the redeemed people from the previous
    verse; straightforward object of ἐποίησας.
- source_word: τῷ θεῷ ἡμῶν
  chosen: to our God
  alternatives:
  - for our God
  lexicon: BDAG
  rationale: The dative can be rendered either 'to' or 'for' in this construction.
    'To our God' preserves the Greek form and the consecratory sense without overinterpreting
    the relationship.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - kingship
  - royal realm
  lexicon: BDAG
  rationale: 'The singular noun is best taken collectively: the redeemed are constituted
    as a kingdom. This follows the plain sense of the Greek better than the textual
    variant ''kings'' found in some traditions.'
- source_word: ἱερεῖς
  chosen: priests
  lexicon: BDAG
  rationale: Standard rendering of the noun; paired with 'kingdom' in an allusion
    to Exodus 19:6 and Revelation 1:6.
- source_word: βασιλεύουσιν
  chosen: they will reign
  alternatives:
  - they reign
  lexicon: BDAG
  rationale: The form is future active indicative in the provided text, so it is rendered
    futurally. A present-tense variant exists in some manuscripts and is preserved
    in a footnote.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - over the earth
  lexicon: BDAG
  rationale: ἐπί with the genitive commonly means 'on/upon.' 'On the earth' is the
    most direct rendering. 'Over the earth' would tilt toward dominion and is interpretively
    stronger than the preposition alone requires.
