theological_decisions:
- issue: Identity of the redeemed as βασιλείαν
  chosen_reading: a kingdom
  alternative_readings:
  - kings
  rationale: The SBLGNT text reads βασιλείαν ('kingdom'), not βασιλεῖς ('kings').
    The translation therefore reflects the adopted Greek text while preserving the
    familiar alternative in a footnote because it has influenced translation tradition
    and interpretation.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Timing of the saints' reign
  chosen_reading: they will reign
  alternative_readings:
  - they reign
  rationale: The provided Greek text reads βασιλεύουσιν as future, so the main text
    should preserve that future sense rather than resolve eschatological questions
    by choosing a present-tense reading from another textual tradition. The present
    reading is preserved in a footnote as a textual variant.
  doctrine_reference: 'Translation philosophy #1 and #3'
