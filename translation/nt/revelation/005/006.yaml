theological_decisions:
- issue: Referent of 'which are the seven Spirits of God'
  chosen_reading: The relative clause is taken to identify the Lamb's seven eyes with
    'the seven Spirits of God.'
  alternative_readings:
  - The clause could be taken more loosely as referring to the horns and eyes together,
    though this is less likely grammatically.
  rationale: The masculine plural relative pronoun can follow grammatical attraction,
    but the nearest and most coherent antecedent is 'seven eyes,' especially given
    the intertextual echo of Zechariah's eyes imagery. The translation preserves the
    identification without adding interpretive explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of 'the seven Spirits of God'
  chosen_reading: Retain the phrase as 'the seven Spirits of God' without paraphrasing
    it as the Holy Spirit in sevenfold fullness.
  alternative_readings:
  - the sevenfold Spirit of God
  - the Spirit of God in sevenfold fullness
  rationale: The phrase is theologically weighty and debated. The Greek text itself
    says 'the seven Spirits of God,' so the translation should preserve that wording
    and not collapse the imagery into a doctrinal paraphrase, while orthodoxy is maintained
    by not denying possible Trinitarian significance.
  doctrine_reference: Preserve theological tension rather than resolve it.
