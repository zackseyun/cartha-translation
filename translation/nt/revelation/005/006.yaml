id: REV.5.6
reference: Revelation 5:6
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἐν μέσῳ τοῦ θρόνου καὶ τῶν τεσσάρων ζῴων καὶ ἐν μέσῳ τῶν πρεσβυτέρων
    ἀρνίον ⸀ἑστηκὸς ὡς ἐσφαγμένον, ⸀ἔχων κέρατα ἑπτὰ καὶ ὀφθαλμοὺς ἑπτά, ⸀οἵ εἰσιν
    τὰ ἑπτὰ πνεύματα τοῦ θεοῦ, ⸀ἀπεσταλμένοι εἰς πᾶσαν τὴν γῆν.
translation:
  text: And I saw, in the midst of the throne and of the four living creatures, and
    in the midst of the elders, a Lamb standing as though it had been slain, having
    seven horns and seven eyes, which are the seven Spirits of God sent out into all
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'as slain' or 'as if slaughtered.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the seven Spirits of God' is retained as written; some understand
      it as a symbolic way of speaking of the Holy Spirit in sevenfold fullness.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν μέσῳ ... καὶ ... ἐν μέσῳ
  chosen: in the midst of ... and in the midst of
  alternatives:
  - between ... and among
  - in the center of ... and among
  lexicon: BDAG
  rationale: Retains the repeated spatial phrasing of the Greek rather than collapsing
    it. 'In the midst of' is slightly formal but clear and preserves the visionary
    scene's layered location.
- source_word: ζῴων
  chosen: living creatures
  alternatives:
  - living beings
  - animals
  lexicon: BDAG
  rationale: In Revelation this term refers to the throne-room beings, not ordinary
    animals. 'Living creatures' is established and accurately distinguishes them from
    beasts in other contexts.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In this apocalyptic setting the term functions as a recognized heavenly
    group/title, so 'elders' is the natural rendering.
- source_word: ἀρνίον
  chosen: Lamb
  alternatives:
  - little lamb
  lexicon: BDAG
  rationale: Although the diminutive nuance may underlie the form, English 'Lamb'
    best conveys the sacrificial and messianic imagery without sounding trivial.
- source_word: ἑστηκὸς
  chosen: standing
  alternatives:
  - having stood
  - standing there
  lexicon: BDAG
  rationale: The perfect participle presents the Lamb in a standing state. English
    idiom is best served by 'standing,' which preserves the vivid scene.
- source_word: ὡς ἐσφαγμένον
  chosen: as though it had been slain
  alternatives:
  - as slain
  - as if slaughtered
  lexicon: BDAG
  rationale: ὡς marks appearance/comparison, and the perfect passive participle indicates
    a completed slaughter with abiding significance. 'As though it had been slain'
    is natural English and preserves the paradox of a living yet slain Lamb.
- source_word: ἐσφαγμένον
  chosen: been slain
  alternatives:
  - been slaughtered
  - been killed
  lexicon: BDAG
  rationale: σφάζω often denotes violent sacrificial slaughter. 'Slain' is dignified,
    readable, and preserves sacrificial resonance better than the flatter 'killed.'
- source_word: ἔχων κέρατα ἑπτὰ
  chosen: having seven horns
  alternatives:
  - with seven horns
  lexicon: BDAG
  rationale: A close participial rendering keeps the descriptive flow of the Greek.
    'Horns' should remain literal, since the symbolic meaning is supplied by the apocalyptic
    context rather than translated away.
- source_word: ὀφθαλμοὺς ἑπτά
  chosen: seven eyes
  lexicon: BDAG
  rationale: Literal rendering is required; the symbolism is then interpreted in the
    following clause.
- source_word: οἵ εἰσιν
  chosen: which are
  alternatives:
  - these are
  lexicon: BDAG
  rationale: The relative pronoun most naturally refers to the immediately preceding
    'seven eyes.' 'Which are' preserves the grammatical linkage in English.
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  chosen: the seven Spirits of God
  alternatives:
  - the seven spirits of God
  lexicon: BDAG
  rationale: Capitalized 'Spirits' signals that these are not merely human or angelic
    spirits but a divine-revelatory designation in Johannine apocalyptic usage. The
    phrase is left formally close to the Greek rather than interpretively paraphrased.
- source_word: ἀπεσταλμένοι
  chosen: sent out
  alternatives:
  - sent
  - having been sent
  lexicon: BDAG
  rationale: The participle is passive and plural, agreeing with 'the seven Spirits.'
    'Sent out' captures the missional force of ἀποστέλλω and reads naturally in English.
- source_word: εἰς πᾶσαν τὴν γῆν
  chosen: into all the earth
  alternatives:
  - into the whole earth
  - throughout all the earth
  lexicon: BDAG
  rationale: A close rendering of εἰς + accusative preserves the directional sense.
    'All the earth' is idiomatic and fits Revelation's global scope.
