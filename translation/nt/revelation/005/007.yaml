theological_decisions:
- issue: Implied direct object of εἴληφεν
  chosen_reading: Supplied 'it' in English, referring to the scroll from the immediate
    context.
  alternative_readings:
  - And he came and took from the right hand...
  rationale: The Greek leaves the object implicit because it is obvious from the preceding
    context. English normally requires an expressed object for clarity. Supplying
    'it' clarifies without adding new content beyond the discourse context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of the enthroned figure
  chosen_reading: the one seated on the throne
  alternative_readings:
  - him who sits on the throne
  rationale: This preserves the distinction between the Lamb and the enthroned one
    without importing additional doctrinal explanation. The wording remains faithful
    to the participial construction and avoids unnecessary traditionalism.
  doctrine_reference: Translation philosophy §3, §6
