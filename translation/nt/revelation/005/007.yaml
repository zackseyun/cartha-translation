id: REV.5.7
reference: Revelation 5:7
source:
  edition: SBLGNT
  text: καὶ ἦλθεν καὶ εἴληφεν ἐκ τῆς δεξιᾶς τοῦ καθημένου ἐπὶ τοῦ θρόνου.
translation:
  text: And he came and took it from the right hand of the one seated on the throne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - approached
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι, here narrating the Lamb's movement toward the enthroned
    one. 'Came' is the natural English narrative equivalent; 'approached' is possible
    but adds interpretive nuance not explicit in the verb.
- source_word: εἴληφεν
  chosen: took it
  alternatives:
  - has taken
  - received
  lexicon: BDAG
  rationale: Perfect of λαμβάνω in a visionary narrative can be rendered idiomatically
    as a simple past in English. 'Took it' fits the sequence with 'came' and makes
    explicit the implied object from the immediate context (the scroll of v. 1), which
    English requires more naturally than a bare 'took.' 'Received' is weaker and less
    fitting for the direct action described.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: 'Standard spatial sense indicating source: the Lamb takes the scroll
    from the right hand of the enthroned one. ''From'' is idiomatic English; ''out
    of'' would sound overly literal here.'
- source_word: τῆς δεξιᾶς
  chosen: the right hand
  alternatives:
  - the right side
  lexicon: BDAG
  rationale: δεξιά in this construction refers to the right hand, not merely the right
    side. This preserves the concrete imagery of the vision and the symbolic association
    of authority.
- source_word: τοῦ καθημένου
  chosen: the one seated
  alternatives:
  - him who sits
  - the one sitting
  lexicon: BDAG
  rationale: Present participle of κάθημαι used substantivally. 'The one seated' is
    natural, reverent, and preserves the ongoing state without awkwardness. 'Him who
    sits' is more traditional but less natural in contemporary English.
- source_word: ἐπὶ τοῦ θρόνου
  chosen: on the throne
  alternatives:
  - upon the throne
  lexicon: BDAG
  rationale: Standard locative sense with ἐπί. 'On the throne' is clear modern English;
    'upon' is unnecessarily archaic.
