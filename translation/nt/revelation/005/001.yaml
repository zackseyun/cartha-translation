id: REV.5.1
reference: Revelation 5:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἐπὶ τὴν δεξιὰν τοῦ καθημένου ἐπὶ τοῦ θρόνου βιβλίον γεγραμμένον
    ἔσωθεν καὶ ⸀ὄπισθεν, κατεσφραγισμένον σφραγῖσιν ἑπτά.
translation:
  text: And I saw in the right hand of the one seated on the throne a scroll written
    within and on the back, sealed with seven seals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a book.' The Greek word βιβλίον in this context likely refers to a scroll
      rather than a codex-style book.
    reason: lexical_alternative
  - marker: b
    text: Literally 'written within and on the back.' Some translations render the
      second phrase more generally as 'on the outside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist of ὁράω is straightforwardly rendered as a simple past narrative
    verb. 'I saw' is concise and natural in English.
- source_word: ἐπὶ τὴν δεξιὰν
  chosen: in the right hand
  alternatives:
  - on the right hand
  - upon the right hand
  lexicon: BDAG
  rationale: Although ἐπί with the accusative can mean 'on/upon,' in this idiom with
    'right hand' the natural English sense is possession/location in the hand rather
    than merely resting on it. 'In the right hand' best communicates the scene.
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  chosen: of the one seated on the throne
  alternatives:
  - of him who sat on the throne
  - of the one sitting on the throne
  lexicon: BDAG
  rationale: The substantival participle καθημένου is rendered with an English participial
    phrase. 'The one seated on the throne' is idiomatic, reverent, and avoids over-specifying
    tense beyond the Greek participle's descriptive force.
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  lexicon: BDAG
  rationale: In first-century context βιβλίον ordinarily refers to a scroll rather
    than a codex-style book. 'Scroll' reflects original-language primacy over traditional
    English inertia and fits the imagery of being written on both sides and sealed.
- source_word: γεγραμμένον
  chosen: written
  alternatives:
  - inscribed
  lexicon: BDAG
  rationale: Perfect passive participle indicates the object stands in a written state.
    Simple 'written' is sufficient and idiomatic in English.
- source_word: ἔσωθεν καὶ ὄπισθεν
  chosen: within and on the back
  alternatives:
  - inside and on the back
  - on the inside and on the outside
  - within and behind
  lexicon: BDAG
  rationale: ἔσωθεν means 'inside/within.' ὄπισθεν here most naturally refers to the
    reverse side/back of the scroll. 'Within and on the back' preserves the likely
    physical image without overinterpreting as 'outside' in a generalized sense.
- source_word: κατεσφραγισμένον
  chosen: sealed
  alternatives:
  - having been sealed
  - completely sealed
  lexicon: BDAG
  rationale: The perfect passive participle denotes a completed state of being sealed.
    English 'sealed' captures this naturally; the prefix κατα- intensifies but need
    not be separately represented.
- source_word: σφραγῖσιν ἑπτά
  chosen: with seven seals
  alternatives:
  - by seven seals
  lexicon: BDAG
  rationale: Instrumental dative is naturally rendered 'with seven seals.' This is
    the standard and clearest English expression for the means or accompanying marks
    of sealing.
