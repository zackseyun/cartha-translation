theological_decisions:
- issue: Referent description for the enthroned figure
  chosen_reading: the one seated on the throne
  alternative_readings:
  - him who sat on the throne
  rationale: The Greek identifies the figure descriptively rather than by explicit
    divine name. The translation preserves that literary presentation and does not
    import a more specific identification into the wording of the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
