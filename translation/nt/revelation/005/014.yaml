id: REV.5.14
reference: Revelation 5:14
source:
  edition: SBLGNT
  text: καὶ τὰ τέσσαρα ζῷα ⸀ἔλεγον· Ἀμήν. καὶ οἱ πρεσβύτεροι ἔπεσαν καὶ προσεκύνησαν.
translation:
  text: And the four living creatures were saying, “Amen.” And the elders fell down
    and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add an explicit object, such as 'the One who lives forever
      and ever' or 'him,' after 'worshiped.' The main text follows the shorter SBLGNT
      reading, which leaves the object implicit from the context.
    reason: textual_variant
lexical_decisions:
- source_word: ζῷα
  chosen: living creatures
  alternatives:
  - creatures
  - living beings
  lexicon: BDAG
  rationale: In Revelation, ζῷον refers to the exalted heavenly beings around the
    throne, not merely 'animals.' 'Living creatures' is the established and semantically
    precise rendering that preserves the allusive connection to Ezekiel's throne vision.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action. 'Were saying'
    preserves that aspect more clearly than the simple past 'said,' while remaining
    natural English.
- source_word: Ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: BDAG
  rationale: As a liturgical acclamation, ἀμήν is best preserved by transliteration
    in English. Alternatives such as 'So be it' capture part of the sense but lose
    the recognizable worship formula.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In Revelation this term functions as a recognized heavenly group/title
    rather than a mere age descriptor. 'Elders' is the natural and contextually appropriate
    rendering.
- source_word: ἔπεσαν
  chosen: fell down
  alternatives:
  - fell
  lexicon: BDAG
  rationale: The idiom 'fell down' communicates the bodily act of prostration more
    clearly in English, especially in a worship context.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down in worship
  - prostrated themselves
  lexicon: BDAG
  rationale: In this heavenly throne-room context, προσκυνέω denotes worshipful reverence
    directed toward God/the Lamb. 'Worshiped' conveys the act's religious force better
    than a merely physical description.
