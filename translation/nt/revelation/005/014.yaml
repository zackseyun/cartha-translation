theological_decisions:
- issue: Object of worship left implicit
  chosen_reading: Retain the Greek's absolute 'worshiped' without supplying an explicit
    object.
  alternative_readings:
  - worshiped him
  - worshiped God
  - worshiped the One who lives forever and ever
  rationale: The SBLGNT text ends with καὶ προσεκύνησαν without an expressed object.
    English can naturally preserve this absolute use. Supplying an object would import
    wording from other textual traditions or from the broader context rather than
    this verse's explicit text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
