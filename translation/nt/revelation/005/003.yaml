theological_decisions:
- issue: Cosmic scope of those unable to open the scroll
  chosen_reading: 'Retain the three-tier spatial language literally: ''in heaven or
    on the earth or under the earth.'''
  alternative_readings:
  - Generalized paraphrase such as 'anywhere in creation'
  rationale: The verse emphasizes universal incapacity through a conventional cosmic
    triad. Preserving the imagery maintains the apocalyptic texture and avoids flattening
    the scene into abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
