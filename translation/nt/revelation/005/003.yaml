id: REV.5.3
reference: Revelation 5:3
source:
  edition: SBLGNT
  text: καὶ οὐδεὶς ἐδύνατο ἐν τῷ ⸀οὐρανῷ ⸂οὐδὲ ἐπὶ τῆς γῆς οὐδὲ⸃ ὑποκάτω τῆς γῆς ἀνοῖξαι
    τὸ βιβλίον οὔτε βλέπειν αὐτό.
translation:
  text: And no one in heaven or on the earth or under the earth was able to open the
    scroll or even to look at it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book.' The Greek word can denote a written document generally, but
      in this setting 'scroll' best fits the ancient image.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no person
  lexicon: BDAG
  rationale: Standard indefinite negative pronoun; 'no one' is clear, natural, and
    suitably formal for the solemn context.
- source_word: ἐδύνατο
  chosen: was able
  alternatives:
  - could
  lexicon: BDAG
  rationale: Imperfect middle/passive of δύναμαι expresses inability in past narrative
    context. 'Was able' preserves the verbal force slightly more explicitly than the
    contracted 'could.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  lexicon: BDAG
  rationale: Idiomatic English omits the article here. Singular 'heaven' matches the
    Greek and standard apocalyptic spatial language.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  lexicon: BDAG
  rationale: With ἐπί + genitive, the sense is location 'on/upon.' 'On the earth'
    preserves the article and the cosmic threefold scope.
- source_word: ὑποκάτω τῆς γῆς
  chosen: under the earth
  alternatives:
  - beneath the earth
  lexicon: BDAG
  rationale: 'A straightforward spatial rendering that preserves the cosmological
    triad: heaven, earth, under the earth.'
- source_word: ἀνοῖξαι
  chosen: to open
  lexicon: BDAG
  rationale: Infinitive after ἐδύνατο; simple and direct. No expansion beyond the
    source is needed.
- source_word: τὸ βιβλίον
  chosen: the scroll
  alternatives:
  - the book
  lexicon: BDAG
  rationale: In Revelation, βιβλίον in this visionary setting most naturally refers
    to a scroll rather than a codex-style book. 'Scroll' better reflects the likely
    ancient referent and avoids anachronistic imagery.
- source_word: οὔτε βλέπειν αὐτό
  chosen: or even to look at it
  alternatives:
  - nor to look at it
  - or to see it
  lexicon: BDAG
  rationale: οὔτε coordinates a second infinitive with negative force. 'Look at it'
    fits the context better than 'see it,' since the point is not merely visual perception
    but daring to gaze upon/examine it. 'Even' is supplied to bring out the climactic
    force of the construction in natural English.
