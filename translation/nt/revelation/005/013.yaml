theological_decisions:
- issue: Joint doxology addressed to God and the Lamb
  chosen_reading: 'Render the single doxological acclamation as jointly addressed:
    ''To the one seated on the throne and to the Lamb be ...'''
  alternative_readings:
  - Repeat the verb explicitly for each addressee in English
  rationale: The Greek presents a unified ascription to both figures without explanatory
    expansion. The translation preserves the text's high christology and liturgical
    parallelism without importing additional doctrinal commentary.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §1, §3'
- issue: Referent of κτίσμα in the cosmic praise scene
  chosen_reading: Use 'every creature' rather than 'all creation'
  alternative_readings:
  - all creation
  - every created thing
  rationale: The verse depicts the inhabitants of all realms audibly speaking praise.
    'Every creature' better reflects the personal, vocal aspect of the scene while
    still preserving the universal scope.
  doctrine_reference: Translation philosophy §1, §6
