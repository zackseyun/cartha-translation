id: REV.5.13
reference: Revelation 5:13
source:
  edition: SBLGNT
  text: καὶ πᾶν κτίσμα ὃ ἐν τῷ οὐρανῷ καὶ ἐπὶ τῆς γῆς καὶ ὑποκάτω τῆς γῆς καὶ ἐπὶ
    τῆς ⸀θαλάσσης, καὶ τὰ ἐν αὐτοῖς ⸀πάντα, ἤκουσα λέγοντας· Τῷ καθημένῳ ἐπὶ ⸂τῷ θρόνῳ⸃
    καὶ τῷ ἀρνίῳ ἡ εὐλογία καὶ ἡ τιμὴ καὶ ἡ δόξα καὶ τὸ κράτος εἰς τοὺς αἰῶνας τῶν
    ⸀αἰώνων.
translation:
  text: And I heard every creature in heaven and on the earth and under the earth
    and on the sea, and all that is in them, saying, “To the one seated on the throne
    and to the Lamb be blessing and honor and glory and dominion forever and ever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “every created thing.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “to the ages of ages.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κτίσμα
  chosen: every creature
  alternatives:
  - every created thing
  - all creation
  lexicon: BDAG
  rationale: κτίσμα denotes a created being/thing. In this context of universal praise
    voiced by animate worshipers, 'every creature' is the most natural English rendering
    while preserving the distributive force of πᾶν.
- source_word: ὃ ἐν τῷ οὐρανῷ ... καὶ τὰ ἐν αὐτοῖς πάντα
  chosen: in heaven and on the earth and under the earth and on the sea, and all that
    is in them
  alternatives:
  - in the sky/heaven ... and everything in them
  - in heaven ... and everything in them all
  lexicon: BDAG
  rationale: The sequence is a merism expressing totality of creation. οὐρανός is
    rendered 'heaven' in Revelation's cosmic setting. αὐτοῖς refers collectively to
    the listed realms; 'all that is in them' preserves the comprehensive scope without
    over-paraphrase.
- source_word: ἤκουσα λέγοντας
  chosen: I heard ... saying
  alternatives:
  - I heard them saying
  lexicon: BDAG
  rationale: The participle λέγοντας is masculine plural by sense, referring to the
    collective creatures. English can leave the object implicit after 'heard' while
    still reading naturally.
- source_word: Τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  chosen: To the one seated on the throne
  alternatives:
  - To him who sits on the throne
  - To the one sitting on the throne
  lexicon: BDAG
  rationale: The articular participle is idiomatically rendered as a substantive phrase.
    'The one seated' is natural, reverent, and avoids unnecessary archaism while preserving
    the present participial sense.
- source_word: τῷ ἀρνίῳ
  chosen: the Lamb
  lexicon: BDAG
  rationale: ἀρνίον is Revelation's established christological title. 'Lamb' preserves
    the sacrificial and exalted imagery central to the book.
- source_word: ἡ εὐλογία
  chosen: blessing
  alternatives:
  - praise
  lexicon: BDAG
  rationale: εὐλογία here denotes ascribed blessing in doxological speech. 'Blessing'
    is the standard and most transparent rendering in this liturgical formula.
- source_word: ἡ τιμή
  chosen: honor
  alternatives:
  - worth
  - reverence
  lexicon: BDAG
  rationale: τιμή in doxological contexts is well rendered 'honor,' matching common
    English usage and the semantic field of bestowed esteem.
- source_word: ἡ δόξα
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the established and semantically fitting rendering for
    δόξα in worship contexts.'
- source_word: τὸ κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: κράτος emphasizes manifested strength or ruling might. 'Dominion' fits
    the royal-doxological setting better than the more generic 'power,' while still
    being readable modern English.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  lexicon: BDAG
  rationale: This idiom expresses unending duration. 'Forever and ever' is the clearest
    natural English equivalent; the more literal 'to the ages of ages' is preserved
    as a lexical alternative.
