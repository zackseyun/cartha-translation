theological_decisions:
- issue: Rendering ναός in a heavenly temple context
  chosen_reading: sanctuary
  alternative_readings:
  - temple
  rationale: The verse depicts angels emerging from God's heavenly dwelling. Translating
    ναός as 'sanctuary' preserves the more specific sense of the sacred inner shrine
    and avoids flattening it to the broader 'temple' complex.
  doctrine_reference: Translation philosophy §1, §5
