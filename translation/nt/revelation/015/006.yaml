id: REV.15.6
reference: Revelation 15:6
source:
  edition: SBLGNT
  text: καὶ ἐξῆλθον οἱ ἑπτὰ ἄγγελοι οἱ ἔχοντες τὰς ἑπτὰ πληγὰς ἐκ τοῦ ναοῦ, ⸀ἐνδεδυμένοι
    ⸀λίνον καθαρὸν λαμπρὸν καὶ περιεζωσμένοι περὶ τὰ στήθη ζώνας χρυσᾶς.
translation:
  text: And the seven angels who had the seven plagues came out from the sanctuary,
    clothed in clean, bright linen, and wrapped around the chest with golden sashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple'; the Greek word here is specifically ναός, often referring to
      the sanctuary rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'pure, shining linen.'
    reason: lexical_alternative
  - marker: c
    text: Or 'girded around their chests with golden belts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: BDAG
  rationale: Aorist indicative of ἐξέρχομαι, denoting movement outward. 'Came out'
    is natural English and preserves the directional force without archaic tone.
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Revelation's heavenly vision context, supernatural angels are clearly
    intended rather than human messengers.
- source_word: πληγάς
  chosen: plagues
  alternatives:
  - strikes
  - afflictions
  lexicon: BDAG
  rationale: In Revelation this term commonly refers to divinely sent blows/judgments;
    'plagues' is the established and contextually fitting rendering.
- source_word: ναοῦ
  chosen: sanctuary
  alternatives:
  - temple
  lexicon: BDAG
  rationale: ναός refers specifically to the inner sanctuary/shrine rather than the
    broader temple complex. 'Sanctuary' better reflects the narrower sense in this
    heavenly scene.
- source_word: ἐνδεδυμένοι
  chosen: clothed
  alternatives:
  - dressed
  - arrayed
  lexicon: BDAG
  rationale: Perfect middle/passive participle describing their state of being dressed.
    'Clothed' is dignified, clear, and fits apocalyptic description.
- source_word: λίνον
  chosen: linen
  alternatives:
  - flax garment
  - fine linen
  lexicon: BDAG
  rationale: The noun denotes linen. The text does not explicitly include a separate
    word for 'fine,' so 'linen' is retained in the main text, with the adjectives
    carrying the descriptive force.
- source_word: καθαρὸν
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: καθαρός can mean 'clean' or 'pure.' 'Clean' is the more direct lexical
    equivalent here, while still conveying ritual/moral brightness in context.
- source_word: λαμπρὸν
  chosen: bright
  alternatives:
  - shining
  - radiant
  lexicon: BDAG
  rationale: λαμπρός denotes brightness/splendor. 'Bright' is concise and natural
    alongside 'clean' in describing the linen.
- source_word: περιεζωσμένοι
  chosen: wrapped around
  alternatives:
  - girded
  - belted
  lexicon: BDAG
  rationale: Perfect participle of περιζώννυμι, meaning to gird or bind around oneself.
    'Wrapped around' communicates the physical sense in contemporary English; the
    object 'with golden sashes' completes the idiom.
- source_word: περὶ τὰ στήθη
  chosen: around the chest
  alternatives:
  - around their breasts
  - across their chests
  lexicon: BDAG
  rationale: στῆθος refers to the chest/breast area. 'Around the chest' is idiomatic
    and avoids awkwardness while preserving the location of the golden sashes.
- source_word: ζώνας χρυσᾶς
  chosen: golden sashes
  alternatives:
  - golden belts
  - golden bands
  lexicon: BDAG
  rationale: ζώνη is a belt, sash, or girdle. Because the binding is around the chest
    rather than the waist, 'sashes' better fits the image than 'belts'.
