theological_decisions:
- issue: Rendering divine judgment language in apocalyptic context
  chosen_reading: the wrath of God
  alternative_readings:
  - the anger of God
  - God's fury
  rationale: The verse presents God's judicial response reaching completion in the
    seven last plagues. "Wrath" best preserves the solemn, judicial force of θυμός
    in Revelation without softening or sensationalizing it.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Aspect of ἐτελέσθη in relation to God's wrath
  chosen_reading: was completed
  alternative_readings:
  - was finished
  rationale: This wording preserves the sense that God's wrath reaches its intended
    consummation in these plagues, without importing a broader theological system
    about the end of all judgment beyond what the verse states.
  doctrine_reference: Translation philosophy §§1, 3, 6
