id: REV.15.1
reference: Revelation 15:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἄλλο σημεῖον ἐν τῷ οὐρανῷ μέγα καὶ θαυμαστόν, ἀγγέλους ἑπτὰ ἔχοντας
    πληγὰς ἑπτὰ τὰς ἐσχάτας, ὅτι ἐν αὐταῖς ἐτελέσθη ὁ θυμὸς τοῦ θεοῦ.
translation:
  text: 'And I saw another sign in heaven, great and marvelous: seven angels having
    seven last plagues, because in them the wrath of God was completed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "great and wonderful."
    reason: lexical_alternative
  - marker: b
    text: Or "was finished."
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - portent
  lexicon: BDAG
  rationale: '"Sign" is the standard and most transparent rendering in Revelation
    for a visible symbolic phenomenon. "Portent" is possible but less natural in modern
    English and can overemphasize ominousness.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: BDAG
  rationale: In Revelation, οὐρανός commonly refers to the heavenly realm rather than
    merely the visible sky. "In heaven" best fits the apocalyptic setting.
- source_word: μέγα καὶ θαυμαστόν
  chosen: great and marvelous
  alternatives:
  - great and wonderful
  - great and amazing
  lexicon: BDAG
  rationale: This pair conveys grandeur and awe. "Marvelous" preserves the elevated
    tone without sounding archaic; "wonderful" is possible but can sound weaker in
    contemporary English.
- source_word: ἀγγέλους ἑπτὰ
  chosen: seven angels
  lexicon: BDAG
  rationale: Straightforward rendering of the accusative phrase as the content of
    what John saw.
- source_word: ἔχοντας
  chosen: having
  alternatives:
  - with
  - who had
  lexicon: BDAG
  rationale: '"Having" closely reflects the participle and preserves the formal linkage
    to the angels. "With" is smoother but slightly less explicit; "who had" would
    shift the participial structure into a relative clause.'
- source_word: πληγὰς
  chosen: plagues
  alternatives:
  - blows
  - afflictions
  lexicon: BDAG
  rationale: In Revelation and biblical judgment contexts, πληγή is conventionally
    and accurately rendered "plague." It communicates divinely inflicted judgments
    more clearly than "blows" or "afflictions."
- source_word: τὰς ἐσχάτας
  chosen: last
  alternatives:
  - final
  lexicon: BDAG
  rationale: '"Last" is the direct lexical equivalent and preserves the sequence-oriented
    force. "Final" is a good stylistic alternative but slightly more interpretive.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason these plagues are called the last. "Because"
    makes the causal relation explicit in natural English.
- source_word: ἐν αὐταῖς
  chosen: in them
  alternatives:
  - with them
  - by them
  lexicon: BDAG
  rationale: The preposition ἐν is best retained as "in," indicating that within these
    plagues God's wrath reaches its completion. Other options are possible but less
    direct.
- source_word: ἐτελέσθη
  chosen: was completed
  alternatives:
  - was finished
  - came to an end
  lexicon: BDAG
  rationale: The aorist passive of τελέω here denotes bringing something to its intended
    completion. "Was completed" preserves that telic nuance slightly better than the
    more idiomatic "was finished."
- source_word: ὁ θυμὸς τοῦ θεοῦ
  chosen: the wrath of God
  alternatives:
  - God's fury
  - the anger of God
  lexicon: BDAG
  rationale: θυμός in Revelation often denotes intense divine wrath in judgment. "The
    wrath of God" is both accurate and theologically weighty without overstating beyond
    the text.
