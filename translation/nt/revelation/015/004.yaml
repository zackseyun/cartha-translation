id: REV.15.4
reference: Revelation 15:4
source:
  edition: SBLGNT
  text: τίς οὐ μὴ ⸀φοβηθῇ, κύριε, καὶ ⸀δοξάσει τὸ ὄνομά σου, ὅτι μόνος ⸀ὅσιος; ὅτι
    πάντα τὰ ἔθνη ἥξουσιν καὶ προσκυνήσουσιν ἐνώπιόν σου, ὅτι τὰ δικαιώματά σου ἐφανερώθησαν.
translation:
  text: Who will not fear, Lord, and glorify your name? For you alone are holy. For
    all the nations will come and worship before you, because your righteous acts
    have been revealed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your righteous judgments"; the Greek term can also refer to judicial
      verdicts or ordinances, but here likely points to God's just deeds now made
      visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς οὐ μὴ φοβηθῇ
  chosen: Who will not fear
  alternatives:
  - Who would not fear
  - Who shall not fear
  lexicon: BDAG
  rationale: The interrogative with οὐ μή is a strong rhetorical construction expecting
    the answer 'no one.' English 'Who will not fear' preserves the rhetorical force
    and future orientation without over-paraphrasing.
- source_word: κύριε
  chosen: Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord,'
    not 'Master' or 'LORD' here.
- source_word: δοξάσει τὸ ὄνομά σου
  chosen: glorify your name
  alternatives:
  - give glory to your name
  - honor your name
  lexicon: BDAG
  rationale: δοξάζω commonly means 'glorify' or 'give glory to.' 'Glorify your name'
    is idiomatic English and preserves the biblical idiom of honoring God's revealed
    character and reputation.
- source_word: μόνος ὅσιος
  chosen: you alone are holy
  alternatives:
  - you alone are faithful
  - you alone are devout
  lexicon: BDAG
  rationale: ὅσιος denotes holiness/piety/devoutness, often with the sense of being
    holy in relation to God and morally pure. In this doxological context, 'holy'
    is the most natural and theologically weighty rendering in English. The supplied
    copula is required in English.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all peoples
  lexicon: BDAG
  rationale: ἔθνη can mean nations or Gentiles. In this all-encompassing eschatological
    worship context, 'all the nations' best preserves the collective geopolitical/ethnic
    sense and echoes scriptural worship language.
- source_word: ἥξουσιν
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: ἥκω here denotes coming/arriving. 'Will come' is the standard natural
    rendering in prophetic contexts.
- source_word: προσκυνήσουσιν ἐνώπιόν σου
  chosen: worship before you
  alternatives:
  - bow down before you
  - pay homage before you
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration or worship. In Revelation's heavenly
    liturgical context, 'worship before you' best captures the religious act while
    retaining ἐνώπιόν σου as 'before you.'
- source_word: τὰ δικαιώματά σου
  chosen: your righteous acts
  alternatives:
  - your righteous judgments
  - your ordinances
  - your requirements
  lexicon: BDAG
  rationale: δικαίωμα has a broad semantic range including ordinance, requirement,
    righteous deed, and judicial verdict. In Revelation 15, the context celebrates
    God's manifested justice in judgment, so 'righteous acts' best captures the revealed
    demonstrations of his justice without narrowing the term to legal statutes alone.
- source_word: ἐφανερώθησαν
  chosen: have been revealed
  alternatives:
  - were revealed
  - have become manifest
  lexicon: BDAG
  rationale: Aorist passive indicates manifestation/revelation. English present perfect
    fits the discourse well, expressing a completed action with present significance.
