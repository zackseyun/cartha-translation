theological_decisions:
- issue: Rendering of ὅσιος in a divine doxology
  chosen_reading: holy
  alternative_readings:
  - faithful
  - devout
  rationale: The verse praises God's unique moral and cultic holiness. 'Holy' aligns
    with the immediate worship context and broader biblical diction, while avoiding
    a reduction to mere covenant reliability.
  doctrine_reference: Translation philosophy §1, §6
- issue: Interpretation of δικαιώματα in apocalyptic judgment context
  chosen_reading: righteous acts
  alternative_readings:
  - righteous judgments
  - ordinances
  rationale: The context is the song celebrating God's manifested justice before the
    nations. 'Righteous acts' preserves breadth and avoids importing a narrower legal
    or statutory sense unless context demands it.
  doctrine_reference: Translation philosophy §1, §5
