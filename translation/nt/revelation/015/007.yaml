id: REV.15.7
reference: Revelation 15:7
source:
  edition: SBLGNT
  text: καὶ ἓν ἐκ τῶν τεσσάρων ζῴων ἔδωκεν τοῖς ἑπτὰ ἀγγέλοις ἑπτὰ φιάλας χρυσᾶς γεμούσας
    τοῦ θυμοῦ τοῦ θεοῦ τοῦ ζῶντος εἰς τοὺς αἰῶνας τῶν αἰώνων.
translation:
  text: And one of the four living creatures gave to the seven angels seven golden
    bowls full of the wrath of God, who lives forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven golden vials' or 'seven golden basins'; the Greek word denotes
      a bowl-like vessel.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'unto the ages of the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἓν ἐκ τῶν τεσσάρων ζῴων
  chosen: one of the four living creatures
  alternatives:
  - one of the four beasts
  - one from among the four living creatures
  lexicon: BDAG
  rationale: ζῷον in Revelation refers to the exalted throne-room beings, not ordinary
    animals; 'living creatures' avoids the misleading connotations of 'beasts' in
    English, especially in this book where θηρίον is used for the beast.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - handed
  - presented
  lexicon: BDAG
  rationale: Aorist indicative of δίδωμι is straightforwardly rendered 'gave'; no
    contextual pressure requires a more interpretive verb.
- source_word: τοῖς ἑπτὰ ἀγγέλοις
  chosen: to the seven angels
  lexicon: BDAG
  rationale: Standard rendering of ἄγγελος here as heavenly 'angels' fits the apocalyptic
    context.
- source_word: ἑπτὰ φιάλας
  chosen: seven bowls
  alternatives:
  - seven basins
  - seven vials
  lexicon: BDAG
  rationale: φιάλη denotes a bowl or shallow vessel. 'Bowls' is clear modern English
    and better reflects the object than the traditional but potentially misleading
    'vials'.
- source_word: χρυσᾶς
  chosen: golden
  alternatives:
  - made of gold
  lexicon: BDAG
  rationale: The adjective is naturally rendered 'golden' in idiomatic English while
    preserving the material description.
- source_word: γεμούσας
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: The participle γέμω with genitive expresses fullness; 'full of' is concise
    and natural.
- source_word: τοῦ θυμοῦ
  chosen: the wrath
  alternatives:
  - the fury
  - the anger
  lexicon: BDAG
  rationale: θυμός in Revelation commonly denotes intense divine wrath. 'Wrath' preserves
    the judicial and theological force better than the more emotional-sounding 'anger'
    or 'fury'.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Simple possessive genitive identifying the wrath as God's.
- source_word: τοῦ ζῶντος
  chosen: who lives
  alternatives:
  - the living
  - the living One
  lexicon: BDAG
  rationale: 'The participle modifies ''God.'' Rendering it as a relative clause in
    English is smooth and preserves the predicative force: God is the one who lives.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - for the ages of ages
  - unto the ages of the ages
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the standard
    natural English equivalent; the more literal alternatives are less idiomatic and
    can sound opaque.
