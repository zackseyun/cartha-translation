theological_decisions:
- issue: Rendering of divine wrath terminology
  chosen_reading: the wrath of God
  alternative_readings:
  - the anger of God
  - the fury of God
  rationale: The verse depicts eschatological judgment. 'Wrath' best preserves the
    solemn judicial sense of θυμός in this context without softening or overstating
    it.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of God's life and eternity
  chosen_reading: God, who lives forever and ever
  alternative_readings:
  - the living God forever and ever
  - God, the living One, unto the ages of the ages
  rationale: The Greek links God's identity as the living one with the idiom of eternal
    duration. The chosen wording preserves both truths in clear modern English without
    importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §6
