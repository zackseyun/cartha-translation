theological_decisions:
- issue: Meaning of the victors' relation to the beast expressed by repeated ἐκ after
    νικῶντας
  chosen_reading: They are portrayed as having gained victory over the beast, its
    image, and the number of its name.
  alternative_readings:
  - They came out from the beast's sphere or power.
  - They were delivered away from the beast.
  rationale: The immediate English idiom after 'victorious' favors 'over,' and Revelation's
    recurring νικάω language commonly denotes overcoming hostile powers. This rendering
    preserves the triumph motif without adding doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
