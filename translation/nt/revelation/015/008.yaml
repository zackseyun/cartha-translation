theological_decisions:
- issue: Rendering ναός in an apocalyptic heavenly-worship context
  chosen_reading: sanctuary
  alternative_readings:
  - temple
  rationale: The verse depicts the heavenly dwelling of God filled with smoke in the
    manner of Old Testament theophanies. Rendering ναός as 'sanctuary' avoids suggesting
    the entire temple precinct and better reflects the specific holy dwelling in view,
    without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
