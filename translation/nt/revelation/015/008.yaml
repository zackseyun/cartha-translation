id: REV.15.8
reference: Revelation 15:8
source:
  edition: SBLGNT
  text: καὶ ἐγεμίσθη ὁ ναὸς καπνοῦ ἐκ τῆς δόξης τοῦ θεοῦ καὶ ἐκ τῆς δυνάμεως αὐτοῦ,
    καὶ οὐδεὶς ἐδύνατο εἰσελθεῖν εἰς τὸν ναὸν ἄχρι τελεσθῶσιν αἱ ἑπτὰ πληγαὶ τῶν ἑπτὰ
    ἀγγέλων.
translation:
  text: And the sanctuary was filled with smoke from the glory of God and from his
    power, and no one was able to enter the sanctuary until the seven plagues of the
    seven angels were finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple' for 'sanctuary' (Greek ναός), though the term often refers more
      specifically to the inner holy dwelling than to the broader temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  chosen: sanctuary
  alternatives:
  - temple
  lexicon: BDAG
  rationale: In Revelation, ναός often refers specifically to the inner divine dwelling
    rather than the broader temple complex. 'Sanctuary' preserves that more specific
    sense better than the broader 'temple,' while remaining natural English.
- source_word: ἐγεμίσθη
  chosen: was filled
  alternatives:
  - filled
  lexicon: BDAG
  rationale: Aorist passive indicative; 'was filled' clearly represents the passive
    verbal force in idiomatic English.
- source_word: καπνοῦ
  chosen: with smoke
  alternatives:
  - with vapor
  lexicon: BDAG
  rationale: The genitive after γεμίζω is naturally rendered in English with 'with.'
    'Smoke' is the standard and contextually appropriate sense, especially in theophanic
    imagery.
- source_word: ἐκ τῆς δόξης τοῦ θεοῦ
  chosen: from the glory of God
  alternatives:
  - out of the glory of God
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the glory of God' is idiomatic and preserves
    the imagery that the smoke proceeds from God's manifested glory.
- source_word: ἐκ τῆς δυνάμεως αὐτοῦ
  chosen: from his power
  alternatives:
  - out of his power
  - from his might
  lexicon: BDAG
  rationale: δύναμις here denotes divine power/might as the source associated with
    the smoke. 'Power' is the most direct and consistent rendering.
- source_word: οὐδεὶς ἐδύνατο
  chosen: no one was able
  alternatives:
  - no one could
  lexicon: BDAG
  rationale: This preserves the imperfect sense of inability in straightforward English.
    'Was able' is slightly more formal and fits the solemn tone.
- source_word: εἰσελθεῖν εἰς τὸν ναὸν
  chosen: to enter the sanctuary
  alternatives:
  - to enter the temple
  lexicon: BDAG
  rationale: The infinitive construction expresses entry into the ναός. 'Sanctuary'
    is retained for consistency with the earlier occurrence in the verse.
- source_word: ἄχρι τελεσθῶσιν
  chosen: until ... were finished
  alternatives:
  - until ... were completed
  - until ... came to an end
  lexicon: BDAG
  rationale: ἄχρι with the aorist passive subjunctive marks the limit in time. 'Were
    finished' is natural English and preserves the passive/resultative sense.
- source_word: πληγαὶ
  chosen: plagues
  alternatives:
  - afflictions
  - strikes
  lexicon: BDAG
  rationale: In Revelation this term commonly denotes divinely sent plagues/judgments.
    'Plagues' is the established and contextually precise rendering.
- source_word: τῶν ἑπτὰ ἀγγέλων
  chosen: of the seven angels
  alternatives:
  - belonging to the seven angels
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered as association/possession: these
    are the plagues borne by or associated with the seven angels.'
