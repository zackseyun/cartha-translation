id: REV.15.5
reference: Revelation 15:5
source:
  edition: SBLGNT
  text: Καὶ μετὰ ταῦτα εἶδον, καὶ ἠνοίγη ὁ ναὸς τῆς σκηνῆς τοῦ μαρτυρίου ἐν τῷ οὐρανῷ,
translation:
  text: And after these things I saw, and the temple of the tabernacle of the testimony
    in heaven was opened,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary' for 'temple' (ναός), emphasizing the inner holy place rather
      than the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: '''Tabernacle of the testimony'' echoes Old Testament sanctuary language,
      especially the wilderness tabernacle associated with God''s covenant testimony.'
    reason: cross_reference
lexical_decisions:
- source_word: Καὶ μετὰ ταῦτα
  chosen: And after these things
  alternatives:
  - After this
  - And after this
  lexicon: BDAG
  rationale: μετὰ ταῦτα is a standard apocalyptic/sequential formula. 'After these
    things' preserves the plural demonstrative ταῦτα and the formal narrative linkage
    better than the smoother singular 'after this.' Retaining initial 'And' reflects
    John's paratactic style.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked
  lexicon: BDAG
  rationale: Aorist of ὁράω here reports visionary perception. 'I saw' is the direct
    and standard rendering; 'I looked' would shift the focus from perception to the
    act of looking.
- source_word: ἠνοίγη
  chosen: was opened
  alternatives:
  - was opened up
  - stood open
  lexicon: BDAG
  rationale: The aorist passive indicates the temple came to be opened. 'Was opened'
    is the most natural and sufficiently formal English equivalent.
- source_word: ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός often refers to the inner sanctuary/temple proper rather than the
    broader temple complex. 'Temple' is retained as the more familiar term, while
    the genitival qualifiers specify its heavenly/tabernacle character. 'Sanctuary'
    is possible but less consistent with common Revelation usage in English.
- source_word: τῆς σκηνῆς
  chosen: of the tabernacle
  alternatives:
  - of the tent
  - of the dwelling
  lexicon: BDAG
  rationale: σκηνή in biblical cultic contexts commonly refers to the tabernacle/tent
    of meeting. 'Tabernacle' preserves the strong intertextual link to the Mosaic
    wilderness sanctuary.
- source_word: τοῦ μαρτυρίου
  chosen: of the testimony
  alternatives:
  - of witness
  lexicon: BDAG
  rationale: In this cultic phrase, μαρτύριον echoes the OT expression 'tabernacle
    of the testimony' and refers to the divine testimony/covenant witness associated
    with the sanctuary. 'Testimony' best preserves that established biblical sense;
    'witness' is possible but less idiomatic here.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  lexicon: BDAG
  rationale: Idiomatic English omits the article. The phrase locates the temple in
    the heavenly realm, not on earth.
