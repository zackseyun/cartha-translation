theological_decisions:
- issue: Cultic imagery of the heavenly sanctuary
  chosen_reading: Render the phrase straightforwardly as 'the temple of the tabernacle
    of the testimony in heaven' without collapsing the imagery into a simplified paraphrase.
  alternative_readings:
  - the heavenly sanctuary
  - the temple in heaven, that is, the tabernacle of testimony
  rationale: The Greek stacks cultic genitives that evoke OT tabernacle imagery and
    the heavenly temple motif in Revelation. Preserving the full phrase maintains
    the theological texture and intertextual resonance rather than resolving it into
    a single interpretive gloss.
  doctrine_reference: Translation philosophy §§1, 3, 5
