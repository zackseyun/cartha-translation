id: REV.15.3
reference: Revelation 15:3
source:
  edition: SBLGNT
  text: καὶ ᾄδουσιν τὴν ᾠδὴν Μωϋσέως τοῦ δούλου τοῦ θεοῦ καὶ τὴν ᾠδὴν τοῦ ἀρνίου λέγοντες·
    Μεγάλα καὶ θαυμαστὰ τὰ ἔργα σου, κύριε, ὁ θεός, ὁ παντοκράτωρ· δίκαιαι καὶ ἀληθιναὶ
    αἱ ὁδοί σου, ὁ βασιλεὺς τῶν ⸀αἰώνων·
translation:
  text: 'And they sing the song of Moses, the slave of God, and the song of the Lamb,
    saying: “Great and marvelous are your works, Lord God, the Almighty; righteous
    and true are your ways, O King of the ages.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'O King of the nations' instead of 'O King of the
      ages.'
    reason: textual_variant
lexical_decisions:
- source_word: ᾄδουσιν
  chosen: they sing
  alternatives:
  - they are singing
  - they sing out
  lexicon: BDAG
  rationale: 'Present indicative plural is naturally rendered as a vivid present in
    English narrative/vision report: ''they sing.'''
- source_word: ᾠδὴν
  chosen: song
  alternatives:
  - hymn
  lexicon: BDAG
  rationale: The ordinary sense is 'song'; 'hymn' would add liturgical coloring not
    required by the Greek.
- source_word: Μωϋσέως
  chosen: Moses
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: δούλου
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: DOCTRINE.md allows 'servant / slave' context-dependently. Here the genitival
    title 'the slave of God' highlights belonging and commissioned status in a solemn
    biblical formula, and 'slave' preserves the bonded force of δοῦλος better than
    the softened 'servant.'
- source_word: ἀρνίου
  chosen: the Lamb
  lexicon: BDAG
  rationale: In Revelation ἀρνίον is a christological title; 'the Lamb' is the established
    and accurate rendering preserving the sacrificial and messianic imagery.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - as they say
  lexicon: BDAG
  rationale: The participle introduces the content of the song straightforwardly;
    'saying' is idiomatic and close to the Greek.
- source_word: Μεγάλα
  chosen: Great
  alternatives:
  - great things
  lexicon: BDAG
  rationale: 'Predicate adjective with τὰ ἔργα σου; English idiom renders the adjective
    directly: ''Great ... are your works.'''
- source_word: θαυμαστὰ
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  lexicon: BDAG
  rationale: '''Marvelous'' preserves the sense of evoking wonder and fits the elevated
    doxological register.'
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the most direct rendering and suits divine acts in biblical
    diction.'
- source_word: κύριε, ὁ θεός, ὁ παντοκράτωρ
  chosen: Lord God, the Almighty
  alternatives:
  - Lord, God Almighty
  - Lord God Almighty
  lexicon: BDAG
  rationale: 'κύριος is rendered ''Lord'' per doctrine. The appositional sequence
    is compressed into natural English while retaining all three elements: Lord, God,
    and the title ''the Almighty'' for παντοκράτωρ.'
- source_word: παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Powerful
  - the Ruler of all
  lexicon: BDAG
  rationale: '''The Almighty'' is the standard and semantically fitting rendering
    for the divine title in Revelation.'
- source_word: δίκαιαι
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: For δίκαιος, 'righteous' best preserves the moral-theological dimension
    here, while 'just' is possible but narrower. This is distinct from the contested
    noun δικαιοσύνη listed in DOCTRINE.md.
- source_word: ἀληθιναὶ
  chosen: 'true'
  alternatives:
  - faithful
  - genuine
  lexicon: BDAG
  rationale: '''True'' is the most direct rendering and pairs naturally with ''righteous''
    in this doxological statement.'
- source_word: ὁδοί
  chosen: ways
  alternatives:
  - paths
  lexicon: BDAG
  rationale: In biblical idiom for God's manner of acting and governing, 'ways' is
    the natural equivalent.
- source_word: ὁ βασιλεὺς τῶν αἰώνων
  chosen: O King of the ages
  alternatives:
  - King of the nations
  - King forever
  - King of eternity
  lexicon: BDAG
  rationale: The SBLGNT reads αἰώνων ('ages'), so the translation follows the given
    source text directly. 'O' reflects the vocative force in context, though βασιλεύς
    is nominative in apposition. Because this phrase has a well-known textual variant,
    the alternative is preserved in a footnote.
