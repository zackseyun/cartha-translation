theological_decisions:
- issue: Rendering δοῦλος in the title of Moses
  chosen_reading: slave of God
  alternative_readings:
  - servant of God
  - bondservant of God
  rationale: Following the project's doctrine, δοῦλος should not be routinely softened.
    In this context the title emphasizes Moses' belonging to God and commissioned
    status; 'slave' preserves that force while remaining intelligible.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1'
- issue: Textual form of the divine title at the end of the verse
  chosen_reading: O King of the ages
  alternative_readings:
  - O King of the nations
  rationale: The translation follows the provided SBLGNT text αἰώνων ('ages'). Because
    'nations' is a significant and well-known variant in the manuscript tradition
    and in some translations, it is preserved in a footnote rather than adopted into
    the main text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve alternatives
    in footnotes where warranted'
