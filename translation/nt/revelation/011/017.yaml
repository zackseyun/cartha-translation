theological_decisions:
- issue: Rendering the divine title sequence without adding the omitted phrase 'who
    is to come'
  chosen_reading: who is and who was
  alternative_readings:
  - who is and who was and who is to come
  rationale: The Greek text here contains only ὁ ὢν καὶ ὁ ἦν. The translation preserves
    the shorter form and does not harmonize it to other Revelation formulas. This
    also coheres with the verse's portrayal of God's reign as now manifested.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Aspect of ἐβασίλευσας in relation to God's kingship
  chosen_reading: have begun to reign
  alternative_readings:
  - have reigned
  - have become king
  rationale: The context is not denying God's eternal sovereignty but celebrating
    the decisive manifestation of his royal rule in history. The ingressive nuance
    is best represented in English by 'have begun to reign,' while avoiding a doctrinally
    misleading implication that God only now first became sovereign in an absolute
    sense.
  doctrine_reference: Within historic orthodoxy; do not import doctrinal claims the
    text does not make.
