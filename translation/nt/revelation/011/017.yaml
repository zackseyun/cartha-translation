id: REV.11.17
reference: Revelation 11:17
source:
  edition: SBLGNT
  text: λέγοντες· Εὐχαριστοῦμέν σοι, κύριε, ὁ θεός, ὁ παντοκράτωρ, ὁ ὢν καὶ ὁ ἦν,
    ὅτι εἴληφας τὴν δύναμίν σου τὴν μεγάλην καὶ ἐβασίλευσας.
translation:
  text: saying, “We give thanks to you, Lord God Almighty, who is and who was, because
    you have taken your great power and have begun to reign.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who is and who was.' Some manuscripts and translations elsewhere
      in Revelation include 'and who is to come,' but the Greek text here omits that
      phrase.
    reason: textual_variant
  - marker: b
    text: Or 'have reigned' or 'have become king.' The Greek verb can emphasize the
      onset or exercise of royal rule; here it likely highlights the public manifestation
      of God's reign.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: Present active participle nominative plural, introducing the content
    of the elders' speech from the previous verse. English idiom naturally uses the
    participial 'saying' to connect with the prior narrative.
- source_word: Εὐχαριστοῦμέν
  chosen: We give thanks
  alternatives:
  - We thank
  lexicon: BDAG
  rationale: The verb εὐχαριστέω commonly means 'give thanks' or 'thank.' 'We give
    thanks' preserves the formal, liturgical tone appropriate to heavenly worship
    better than the flatter 'We thank.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In this
    vocative address to God, 'Lord' preserves both reverence and biblical title usage.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Straightforward titular apposition with κύριε, yielding the conventional
    and accurate address 'Lord God.'
- source_word: ὁ παντοκράτωρ
  chosen: Almighty
  alternatives:
  - the Almighty
  - the All-Powerful
  lexicon: BDAG
  rationale: In Revelation, παντοκράτωρ is a divine title conventionally and accurately
    rendered 'Almighty.' Here it functions appositionally after 'Lord God,' so 'Lord
    God Almighty' is natural English and preserves the title's force.
- source_word: ὁ ὢν καὶ ὁ ἦν
  chosen: who is and who was
  alternatives:
  - the one who is and who was
  lexicon: BDAG
  rationale: This formulaic divine designation in Revelation is rendered relatively
    rather than as a bare nominal phrase for smoother English after the title sequence.
    The present and imperfect forms are preserved as 'is' and 'was.' The phrase notably
    omits 'who is to come' here, likely because the reign has now been manifested.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Causal sense fits the thanksgiving: they give thanks because God has
    acted. ''Because'' is clearer in modern English than ''for.'''
- source_word: εἴληφας
  chosen: you have taken
  alternatives:
  - you have assumed
  - you have taken up
  lexicon: BDAG
  rationale: Perfect active indicative of λαμβάνω. 'Have taken' preserves the completed
    action with present relevance. 'Taken up' is possible but slightly more interpretive.
- source_word: τὴν δύναμίν σου τὴν μεγάλην
  chosen: your great power
  alternatives:
  - your power, the great power
  - your mighty power
  lexicon: BDAG
  rationale: δύναμις is 'power.' The attributive adjective μεγάλην is naturally rendered
    before the noun in English. 'Great power' is more literal than 'mighty power'
    while still idiomatic.
- source_word: ἐβασίλευσας
  chosen: have begun to reign
  alternatives:
  - have reigned
  - became king
  - have become king
  lexicon: BDAG
  rationale: Aorist of βασιλεύω can denote entering into royal rule or exercising
    kingship. In this context of eschatological consummation, English 'have begun
    to reign' best captures the ingressive force often present here without implying
    that God was previously not sovereign in an absolute sense; rather, his reign
    is now openly manifested in judgment and rule.
