id: REV.11.12
reference: Revelation 11:12
source:
  edition: SBLGNT
  text: καὶ ⸀ἤκουσαν ⸂φωνῆς μεγάλης⸃ ἐκ τοῦ οὐρανοῦ ⸀λεγούσης αὐτοῖς· ⸀Ἀνάβατε ὧδε,
    καὶ ἀνέβησαν εἰς τὸν οὐρανὸν ἐν τῇ νεφέλῃ, καὶ ἐθεώρησαν αὐτοὺς οἱ ἐχθροὶ αὐτῶν.
translation:
  text: And they heard a loud voice from heaven saying to them, “Come up here,” and
    they went up to heaven in the cloud, and their enemies watched them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a cloud.” The Greek has “in the cloud,” which may also echo biblical
      scenes of divine presence and vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσαν
  chosen: they heard
  alternatives:
  - they listened to
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω here denotes the event of hearing the
    heavenly voice, not the more durative sense 'listen.'
- source_word: φωνῆς μεγάλης
  chosen: a loud voice
  alternatives:
  - a great voice
  lexicon: BDAG
  rationale: Idiomatic English prefers 'loud voice.' 'Great voice' is more literal
    but less natural and in this context refers to volume/majesty of the utterance.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: In Revelation οὐρανός in visionary and divine-speech contexts normally
    refers to heaven, not merely the sky. 'From heaven' is standard and clear.
- source_word: λεγούσης αὐτοῖς
  chosen: saying to them
  alternatives:
  - which said to them
  - speaking to them
  lexicon: BDAG
  rationale: The participle modifies 'voice' and is naturally rendered with an English
    participial clause. 'To them' preserves αὐτοῖς explicitly.
- source_word: Ἀνάβατε ὧδε
  chosen: Come up here
  alternatives:
  - Ascend here
  - Come up here now
  lexicon: BDAG
  rationale: Second person plural aorist imperative of ἀναβαίνω is an urgent summons
    upward. 'Come up here' is idiomatic English and matches the deictic ὧδε.
- source_word: ἀνέβησαν εἰς τὸν οὐρανὸν
  chosen: they went up to heaven
  alternatives:
  - they ascended into heaven
  - they went up into heaven
  lexicon: BDAG
  rationale: '''Went up to heaven'' preserves the upward movement without sounding
    overly formal. ''Ascended'' is possible but can sound more technical or tradition-laden
    than the Greek requires.'
- source_word: ἐν τῇ νεφέλῃ
  chosen: in the cloud
  alternatives:
  - in a cloud
  - with the cloud
  lexicon: BDAG
  rationale: The article is present, and 'the cloud' may evoke the recognizable biblical
    cloud of divine presence. Retaining the article preserves that possible allusion
    better than 'a cloud.'
- source_word: ἐθεώρησαν
  chosen: watched
  alternatives:
  - saw
  - looked at
  - beheld
  lexicon: BDAG
  rationale: θεωρέω often carries the sense of observing or watching attentively,
    stronger than a mere punctiliar 'saw.' 'Watched' captures that nuance in natural
    English.
- source_word: οἱ ἐχθροὶ αὐτῶν
  chosen: their enemies
  alternatives:
  - the enemies of them
  lexicon: BDAG
  rationale: Straightforward possessive rendering in English. The phrase emphasizes
    that those hostile to the witnesses observed their vindication.
