theological_decisions:
- issue: Potential allusion in 'the cloud'
  chosen_reading: Retain 'the cloud' in the main text
  alternative_readings:
  - in a cloud
  rationale: The Greek article may signal a recognizable biblical motif of the cloud
    associated with divine presence and vindication. The translation preserves that
    possibility without making the allusion explicit beyond the wording itself.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
