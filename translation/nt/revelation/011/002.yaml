theological_decisions:
- issue: Specificity of ναός in apocalyptic temple imagery
  chosen_reading: Render ναός as 'temple' in the main text, while preserving 'sanctuary'
    as an alternative.
  alternative_readings:
  - sanctuary
  rationale: The verse distinguishes the outer court from the ναός. English 'temple'
    is more readable, but 'sanctuary' better reflects the narrower sense of ναός and
    may affect interpretation of the vision. To preserve that tension without overloading
    the main text, the alternative is footnoted.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Meaning of ἔθνεσιν
  chosen_reading: Use 'the nations' in the main text, with 'the Gentiles' preserved
    in a footnote.
  alternative_readings:
  - the Gentiles
  rationale: The Greek term can denote either nations generally or Gentiles in contrast
    to Israel/Jews. In Revelation's prophetic-apocalyptic register, 'the nations'
    is broader and less interpretively restrictive, while the ethnic-religious nuance
    remains worth preserving in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
