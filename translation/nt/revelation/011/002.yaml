id: REV.11.2
reference: Revelation 11:2
source:
  edition: SBLGNT
  text: καὶ τὴν αὐλὴν τὴν ἔξωθεν τοῦ ναοῦ ἔκβαλε ⸀ἔξωθεν, καὶ μὴ αὐτὴν μετρήσῃς, ὅτι
    ἐδόθη τοῖς ἔθνεσιν, καὶ τὴν πόλιν τὴν ἁγίαν πατήσουσιν μῆνας ⸀τεσσεράκοντα δύο.
translation:
  text: But leave out the court outside the temple, and do not measure it, because
    it has been given to the nations, and they will trample the holy city for forty-two
    months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the court outside the sanctuary.' The Greek ναός can refer more specifically
      to the sanctuary rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'it was given to the Gentiles.' The Greek ἔθνεσιν can mean 'nations'
      or 'Gentiles,' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐλή
  chosen: court
  alternatives:
  - courtyard
  lexicon: BDAG
  rationale: Refers to the temple court area rather than a generic yard. 'Court' is
    the standard concise English rendering in temple context.
- source_word: ἔξωθεν τοῦ ναοῦ
  chosen: outside the temple
  alternatives:
  - that is outside the sanctuary
  - the outer court of the temple
  lexicon: BDAG
  rationale: The phrase modifies 'court' and locates it as external to the ναός. 'Temple'
    is retained for readability, though ναός more specifically denotes the sanctuary/temple
    proper; the spatial contrast is preserved by 'outside.'
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: While ναός can specifically mean the sanctuary, in English 'temple' is
    more natural here. The distinction is partially preserved by the phrase 'court
    outside the temple.' 'Sanctuary' is a viable alternative and is preserved in a
    footnote because the narrower sense may matter interpretively.
- source_word: ἔκβαλε ἔξωθεν
  chosen: leave out
  alternatives:
  - cast out outside
  - throw outside
  - exclude
  lexicon: BDAG
  rationale: The idiom conveys exclusion from the measuring rather than literal violent
    expulsion. 'Leave out' is idiomatic modern English and matches the following prohibition
    against measuring.
- source_word: μὴ αὐτὴν μετρήσῃς
  chosen: do not measure it
  alternatives:
  - you must not measure it
  lexicon: BDAG
  rationale: A straightforward prohibition in the second person singular. 'Do not
    measure it' preserves the imperative force without unnecessary expansion.
- source_word: ἐδόθη
  chosen: it has been given
  alternatives:
  - it was given
  lexicon: BDAG
  rationale: The aorist passive indicates that the court/city is handed over by an
    unstated agent. 'Has been given' communicates the resulting state in natural English;
    the passive is preserved and the divine agent is not made explicit.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean nations or Gentiles. In this apocalyptic context, 'the
    nations' better preserves the broader collective-political sense and echoes biblical
    prophetic diction. 'Gentiles' is preserved as an alternative in a footnote.
- source_word: πόλιν τὴν ἁγίαν
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: BDAG
  rationale: A conventional and accurate rendering of the phrase, likely referring
    to Jerusalem within the vision, without over-specifying in the main text.
- source_word: πατήσουσιν
  chosen: they will trample
  alternatives:
  - they will tread underfoot
  lexicon: BDAG
  rationale: Conveys hostile desecration or domination. 'Trample' is vivid and natural
    English while preserving the force of the future verb.
- source_word: μῆνας τεσσεράκοντα δύο
  chosen: for forty-two months
  alternatives:
  - forty-two months
  lexicon: BDAG
  rationale: The accusative expresses duration of time. English idiom normally supplies
    'for' to make the duration explicit.
