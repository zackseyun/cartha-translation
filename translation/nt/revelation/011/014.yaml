id: REV.11.14
reference: Revelation 11:14
source:
  edition: SBLGNT
  text: Ἡ οὐαὶ ἡ δευτέρα ἀπῆλθεν· ⸂ἰδοὺ ἡ οὐαὶ ἡ τρίτη⸃ ἔρχεται ταχύ.
translation:
  text: The second woe has passed; behold, the third woe is coming quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soon.' The Greek ταχύ can emphasize either temporal nearness or rapidity.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαί
  chosen: woe
  alternatives:
  - disaster
  - judgment
  lexicon: BDAG
  rationale: οὐαί is the standard exclamation/noun of lament or impending doom. In
    Revelation, where the trumpet judgments are explicitly numbered as 'woes,' 'woe'
    preserves the apocalyptic and intertextual force better than a more interpretive
    gloss like 'disaster' or 'judgment'.
- source_word: δευτέρα
  chosen: second
  lexicon: BDAG
  rationale: The ordinal directly modifies 'woe' and is best rendered straightforwardly
    as 'second.'
- source_word: ἀπῆλθεν
  chosen: has passed
  alternatives:
  - went away
  - is gone
  lexicon: BDAG
  rationale: The aorist of ἀπέρχομαι literally means 'went away' or 'departed,' but
    in this context of a completed woe/judgment sequence, 'has passed' is idiomatic
    modern English that preserves the sense that the second woe is now over.
- source_word: ἰδού
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing urgent attention. 'Behold' preserves
    the solemn, prophetic tone of Revelation better than the more colloquial 'look'
    or 'see,' while remaining understandable in context.
- source_word: τρίτη
  chosen: third
  lexicon: BDAG
  rationale: The ordinal directly modifies 'woe' and is best rendered as 'third.'
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is about to come
  lexicon: BDAG
  rationale: The present middle/passive form here conveys an event in progress or
    imminence. 'Is coming' is natural English and preserves the vividness of the Greek
    present better than the simple 'comes.' 'Is about to come' would overstate imminence
    beyond the wording itself.
- source_word: ταχύ
  chosen: quickly
  alternatives:
  - soon
  - swiftly
  lexicon: BDAG
  rationale: ταχύ can denote either temporal nearness ('soon') or rapidity ('quickly/swiftly').
    Here, paired with 'is coming,' 'quickly' preserves the adverb's urgency without
    forcing a specific eschatological timetable. 'Soon' is possible, but 'quickly'
    better reflects the lexical form and leaves the temporal nuance less interpretively
    loaded.
