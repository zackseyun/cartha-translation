theological_decisions:
- issue: Rendering of ταχύ in an eschatological context
  chosen_reading: quickly
  alternative_readings:
  - soon
  rationale: Because ταχύ in Revelation can be heard either as temporal nearness or
    as suddenness/rapidity, the translation avoids resolving a debated eschatological
    nuance. 'Quickly' preserves the urgency and allows readers to hear either imminent
    arrival or sudden onset. The alternative 'soon' is preserved in a footnote to
    maintain transparency and theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
