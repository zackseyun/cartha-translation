id: REV.11.11
reference: Revelation 11:11
source:
  edition: SBLGNT
  text: Καὶ μετὰ τὰς τρεῖς ἡμέρας καὶ ἥμισυ πνεῦμα ζωῆς ἐκ τοῦ θεοῦ εἰσῆλθεν ⸂ἐν αὐτοῖς⸃,
    καὶ ἔστησαν ἐπὶ τοὺς πόδας αὐτῶν, καὶ φόβος μέγας ⸀ἐπέπεσεν ἐπὶ τοὺς θεωροῦντας
    αὐτούς·
translation:
  text: And after the three and a half days, a breath of life from God entered into
    them, and they stood on their feet, and great fear fell on those watching them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a spirit of life from God"; possibly "the Spirit of life from God."
      The Greek πνεῦμα can mean breath, spirit, or Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὰς τρεῖς ἡμέρας καὶ ἥμισυ
  chosen: after the three and a half days
  alternatives:
  - after three and a half days
  - after the three days and a half
  lexicon: BDAG
  rationale: μετά with the accusative indicates temporal succession ('after'). The
    article with τρεῖς ἡμέρας supports a definite expression, and καὶ ἥμισυ idiomatically
    yields 'and a half.' Rendering as 'the three and a half days' preserves the Greek
    wording and the apocalyptic specificity.
- source_word: πνεῦμα ζωῆς
  chosen: a breath of life
  alternatives:
  - the breath of life
  - a spirit of life
  - the Spirit of life
  lexicon: BDAG
  rationale: πνεῦμα can mean breath, wind, spirit. In this resurrection scene, the
    allusion to Ezekiel 37 and Genesis-style life-restoration favors 'breath' as the
    life-imparting force. The anarthrous construction does not require capitalization
    or identification as the Holy Spirit. 'Of life' is retained as a genitive qualifier.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - out of God
  lexicon: BDAG
  rationale: Standard source language indicating origin. 'From God' is idiomatic English
    and preserves the divine source of the life-giving breath.
- source_word: εἰσῆλθεν ἐν αὐτοῖς
  chosen: entered into them
  alternatives:
  - entered them
  - entered in them
  lexicon: BDAG
  rationale: The verb εἰσέρχομαι means 'enter,' and the prepositional phrase ἐν αὐτοῖς
    is best represented idiomatically in English as 'into them' to convey internal
    entry. This avoids awkward literalism while preserving the sense.
- source_word: ἔστησαν ἐπὶ τοὺς πόδας αὐτῶν
  chosen: they stood on their feet
  alternatives:
  - they stood upon their feet
  - they came to stand on their feet
  lexicon: BDAG
  rationale: 'Aorist active of ἵστημι here is intransitive in sense: they stood. ''On
    their feet'' is the natural English equivalent of ἐπὶ τοὺς πόδας αὐτῶν and echoes
    resurrection/restoration language.'
- source_word: φόβος μέγας
  chosen: great fear
  alternatives:
  - a great fear
  - great terror
  lexicon: BDAG
  rationale: A straightforward nominal phrase. 'Great fear' preserves the lexical
    force without overinterpreting it as panic or terror.
- source_word: ἐπέπεσεν ἐπὶ
  chosen: fell on
  alternatives:
  - came upon
  - fell upon
  lexicon: BDAG
  rationale: ἐπιπίπτω with ἐπί commonly conveys something coming or falling upon someone.
    'Fell on' is vivid, natural, and suitably solemn.
- source_word: τοὺς θεωροῦντας αὐτούς
  chosen: those watching them
  alternatives:
  - those looking at them
  - those observing them
  - those beholding them
  lexicon: BDAG
  rationale: θεωρέω denotes watching or observing attentively. 'Those watching them'
    is clear modern English and fits the ongoing participial aspect.
