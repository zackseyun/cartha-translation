theological_decisions:
- issue: Whether πνεῦμα ζωῆς should be rendered as an impersonal life-giving breath
    or identified explicitly as the Holy Spirit
  chosen_reading: a breath of life from God
  alternative_readings:
  - the Spirit of life from God
  - a spirit of life from God
  rationale: The text states divine origin but does not explicitly identify the referent
    as the Holy Spirit. To preserve theological tension and avoid importing a more
    specific doctrinal claim than the Greek makes, the main text uses 'breath of life,'
    while alternatives are preserved in a footnote. This also respects the likely
    intertextual resonance with prophetic resurrection imagery.
  doctrine_reference: Preserve theological tension rather than resolve it.
