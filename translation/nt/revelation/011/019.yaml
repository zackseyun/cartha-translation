theological_decisions:
- issue: Nature of the heavenly ναός
  chosen_reading: Rendered ναός as 'temple' rather than 'sanctuary' in the main text.
  alternative_readings:
  - sanctuary
  rationale: The verse depicts the heavenly dwelling of God and the revelation of
    the ark. 'Temple' is the most natural English rendering and does not force a narrower
    theological claim about heavenly architecture, while 'sanctuary' remains a viable
    lexical alternative.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Meaning of φωναὶ in the theophanic sequence
  chosen_reading: Rendered φωναὶ as 'voices' in the main text.
  alternative_readings:
  - sounds
  - rumblings
  rationale: Revelation repeatedly uses the sequence 'lightnings, voices, thunders';
    preserving 'voices' maintains intertextual consistency and avoids smoothing away
    the text's distinctive theophanic language. The alternative is preserved in a
    footnote because English readers may otherwise hear only spoken speech.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
