id: REV.11.19
reference: Revelation 11:19
source:
  edition: SBLGNT
  text: Καὶ ἠνοίγη ὁ ναὸς τοῦ θεοῦ ⸀ὁ ἐν τῷ οὐρανῷ, καὶ ὤφθη ἡ κιβωτὸς τῆς διαθήκης
    ⸀αὐτοῦ ἐν τῷ ναῷ αὐτοῦ· καὶ ἐγένοντο ἀστραπαὶ καὶ φωναὶ καὶ βρονταὶ ⸂καὶ σεισμὸς⸃
    καὶ χάλαζα μεγάλη.
translation:
  text: And the temple of God in heaven was opened, and the ark of his covenant was
    seen in his temple; and there were flashes of lightning and voices and peals of
    thunder and an earthquake and great hail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary' for 'temple' (Greek ναός), emphasizing the inner holy dwelling
      rather than the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ark of the covenant'; the Greek explicitly says 'his covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sounds' or 'rumblings' for 'voices'; Revelation often uses this theophanic
      expression in scenes of divine majesty and judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: Rendered as 'temple' for natural English and because in Revelation this
    refers to the heavenly temple dwelling of God. 'Sanctuary' is possible and slightly
    more specific to ναός as the inner shrine, but 'temple' is the clearer default
    in context.
- source_word: ὁ ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - that is in heaven
  - in the heaven
  lexicon: BDAG
  rationale: 'Takes the article-participle-like construction adjectivally with ναός:
    ''the temple of God in heaven.'' ''In heaven'' is idiomatic English and preserves
    the locative sense without awkwardness.'
- source_word: ἠνοίγη
  chosen: was opened
  alternatives:
  - was made open
  - opened
  lexicon: BDAG
  rationale: Aorist passive rendered with English passive to preserve the eventive
    sense and the implied divine action without supplying an explicit agent.
- source_word: ὤφθη
  chosen: was seen
  alternatives:
  - appeared
  - became visible
  lexicon: BDAG
  rationale: Passive 'was seen' closely matches the Greek and avoids overstating whether
    the ark itself actively appeared or simply became visible to the seer.
- source_word: κιβωτὸς τῆς διαθήκης αὐτοῦ
  chosen: the ark of his covenant
  alternatives:
  - the ark of the covenant
  - the ark of his testament
  lexicon: BDAG
  rationale: Includes αὐτοῦ explicitly as 'his' because it is present in the Greek
    and identifies the covenant as God's. 'Covenant' is the standard and contextually
    correct rendering of διαθήκη here; 'testament' would be misleading in modern English.
- source_word: ἐν τῷ ναῷ αὐτοῦ
  chosen: in his temple
  alternatives:
  - in his sanctuary
  lexicon: BDAG
  rationale: Retains the repeated ναός with the same English gloss for consistency.
    The possessive αὐτοῦ is preserved.
- source_word: ἐγένοντο
  chosen: there were
  alternatives:
  - there came
  - there occurred
  lexicon: BDAG
  rationale: Idiomatic English existential rendering for the onset of accompanying
    phenomena. This best fits the list of signs that follows.
- source_word: ἀστραπαὶ
  chosen: flashes of lightning
  alternatives:
  - lightnings
  - lightning flashes
  lexicon: BDAG
  rationale: '''Flashes of lightning'' is clear modern English and preserves the plural
    force better than the traditional but less natural ''lightnings.'''
- source_word: φωναὶ
  chosen: voices
  alternatives:
  - sounds
  lexicon: BDAG
  rationale: Rendered literally as 'voices,' the common apocalyptic expression in
    Revelation. Although some take it as 'sounds' or 'rumblings' in meteorological
    context, 'voices' preserves the lexical form and the book's recurring diction.
- source_word: βρονταὶ
  chosen: peals of thunder
  alternatives:
  - thunders
  - thunderclaps
  lexicon: BDAG
  rationale: '''Peals of thunder'' is idiomatic English for the plural and communicates
    repeated thunder better than the wooden ''thunders.'''
- source_word: σεισμὸς
  chosen: an earthquake
  alternatives:
  - a quake
  lexicon: BDAG
  rationale: Standard rendering of σεισμός in apocalyptic judgment contexts.
- source_word: χάλαζα μεγάλη
  chosen: great hail
  alternatives:
  - heavy hail
  - a great hailstorm
  lexicon: BDAG
  rationale: A close rendering of noun plus adjective. 'Great hail' preserves the
    elevated apocalyptic style; 'heavy hail' is possible but less direct.
