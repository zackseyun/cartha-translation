theological_decisions:
- issue: Rendering the hostile relation in ποιήσει μετ’ αὐτῶν πόλεμον
  chosen_reading: will make war with them
  alternative_readings:
  - will wage war against them
  rationale: The Greek uses μετά with the genitive ('with them') in the idiom 'make
    war.' The context makes the hostility explicit through 'conquer' and 'kill.' Retaining
    'with them' stays closer to the source while not obscuring meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
