id: REV.11.7
reference: Revelation 11:7
source:
  edition: SBLGNT
  text: Καὶ ὅταν τελέσωσιν τὴν μαρτυρίαν αὐτῶν, τὸ θηρίον τὸ ἀναβαῖνον ἐκ τῆς ἀβύσσου
    ποιήσει μετ’ αὐτῶν πόλεμον καὶ νικήσει αὐτοὺς καὶ ἀποκτενεῖ αὐτούς.
translation:
  text: And when they finish their testimony, the beast that comes up out of the abyss
    will make war with them and conquer them and kill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will wage war against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τελέσωσιν
  chosen: finish
  alternatives:
  - complete
  - bring to an end
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ὅταν indicates a future contingency: ''when
    they finish.'' ''Finish'' is natural modern English and preserves the sense of
    bringing their assigned witness to completion without overformal wording.'
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: μαρτυρία can mean 'testimony' or 'witness.' 'Testimony' fits the object
    of 'finish' smoothly in English ('finish their testimony') while still preserving
    the juridical/witness-bearing sense central to Revelation.
- source_word: θηρίον
  chosen: beast
  alternatives:
  - wild beast
  lexicon: BDAG
  rationale: '''Beast'' is the established and semantically accurate rendering in
    Revelation''s apocalyptic context. ''Wild beast'' is possible but unnecessarily
    cumbersome in English here.'
- source_word: ἀναβαῖνον
  chosen: comes up
  alternatives:
  - ascending
  - rising
  lexicon: BDAG
  rationale: 'The present participle modifying θηρίον is rendered relatively: ''that
    comes up.'' This is idiomatic English and preserves the vivid ongoing aspect better
    than the stiffer ''ascending.'''
- source_word: ἀβύσσου
  chosen: abyss
  alternatives:
  - bottomless pit
  - deep
  lexicon: BDAG
  rationale: '''Abyss'' closely reflects the Greek and avoids importing the more interpretive
    traditional phrase ''bottomless pit.'' It also maintains consistency with apocalyptic
    terminology.'
- source_word: ποιήσει μετ’ αὐτῶν πόλεμον
  chosen: will make war with them
  alternatives:
  - will wage war against them
  - will make war against them
  lexicon: BDAG
  rationale: This reproduces the Greek construction closely while remaining readable.
    'With them' reflects μετά + genitive literally; in context the hostile sense is
    clear from the following verbs. 'Against them' is interpretive and preserved as
    an alternative.
- source_word: νικήσει
  chosen: conquer
  alternatives:
  - overcome
  - defeat
  lexicon: BDAG
  rationale: In Revelation, νικάω often carries the sense 'conquer/overcome.' 'Conquer'
    preserves the conflict imagery and avoids flattening the term to a merely military
    'defeat,' while remaining clear to modern readers.
- source_word: ἀποκτενεῖ
  chosen: kill
  alternatives:
  - slay
  - put to death
  lexicon: BDAG
  rationale: '''Kill'' is the most direct and natural modern equivalent. ''Slay''
    is archaic/literary, and ''put to death'' is more formal than the context requires.'
