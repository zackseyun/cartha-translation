theological_decisions:
- issue: Whether the response of 'the rest' should be rendered as explicit repentance
    or saving faith
  chosen_reading: The text is rendered neutrally as 'became terrified and gave glory
    to the God of heaven' without specifying whether this was genuine repentance.
  alternative_readings:
  - They repented genuinely
  - They merely acknowledged God's power in fear
  rationale: The Greek states fear and giving glory to God, but does not explicitly
    define the inner spiritual quality of that response. In keeping with the doctrine's
    instruction to preserve theological tension rather than resolve it, the translation
    does not import either conversion or mere external acknowledgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
