id: REV.11.13
reference: Revelation 11:13
source:
  edition: SBLGNT
  text: καὶ ἐν ἐκείνῃ τῇ ⸀ὥρᾳ ἐγένετο σεισμὸς μέγας, καὶ τὸ δέκατον τῆς πόλεως ἔπεσεν,
    καὶ ἀπεκτάνθησαν ἐν τῷ σεισμῷ ὀνόματα ἀνθρώπων χιλιάδες ἑπτά, καὶ οἱ λοιποὶ ἔμφοβοι
    ἐγένοντο καὶ ἔδωκαν δόξαν τῷ θεῷ τοῦ οὐρανοῦ.
translation:
  text: And in that hour there was a great earthquake, and a tenth of the city fell,
    and seven thousand people were killed in the earthquake, and the rest became terrified
    and gave glory to the God of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'names of people, seven thousand'—an idiom meaning seven thousand
      persons were counted among the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: in that hour
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the apocalyptic immediacy of
    the expression while remaining natural in English. 'At that time' is possible
    but slightly flattens the vivid temporal marker.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - there occurred
  - came about
  lexicon: BDAG
  rationale: With σεισμὸς as the subject, idiomatic English prefers 'there was' rather
    than a more wooden 'there occurred.' This keeps the eventive force without sounding
    stilted.
- source_word: σεισμὸς μέγας
  chosen: a great earthquake
  alternatives:
  - a severe earthquake
  lexicon: BDAG
  rationale: '''Earthquake'' is the direct sense of σεισμός here, and μέγας is well
    represented by ''great.'' ''Severe'' is interpretive and less direct.'
- source_word: τὸ δέκατον τῆς πόλεως
  chosen: a tenth of the city
  alternatives:
  - the tenth part of the city
  lexicon: BDAG
  rationale: This is a natural modern-English rendering of the partitive expression
    while preserving the numerical specificity.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - collapsed
  lexicon: BDAG
  rationale: '''Fell'' is the straightforward lexical equivalent and leaves the exact
    mode of destruction as stated in the Greek. ''Collapsed'' is possible but more
    interpretive.'
- source_word: ἀπεκτάνθησαν
  chosen: were killed
  alternatives:
  - were slain
  lexicon: BDAG
  rationale: The passive verb denotes being put to death. 'Were killed' is clear modern
    English; 'were slain' is more traditional but less contemporary.
- source_word: ὀνόματα ἀνθρώπων
  chosen: people
  alternatives:
  - names of people
  - persons
  lexicon: BDAG
  rationale: Literally the phrase is 'names of people,' an idiom for counted persons.
    English normally expresses the sense as 'people.' The more literal wording is
    preserved in a footnote because it is a notable Semitic-style expression.
- source_word: χιλιάδες ἑπτά
  chosen: seven thousand
  alternatives:
  - seven thousands
  lexicon: BDAG
  rationale: Standard English cardinal-number expression.
- source_word: οἱ λοιποὶ
  chosen: the rest
  alternatives:
  - the survivors
  - the remainder
  lexicon: BDAG
  rationale: '''The rest'' is the most direct rendering. ''The survivors'' may be
    inferentially true in context but is more interpretive than the Greek wording.'
- source_word: ἔμφοβοι ἐγένοντο
  chosen: became terrified
  alternatives:
  - became fearful
  - were filled with fear
  lexicon: BDAG
  rationale: This captures both the ingressive force of ἐγένοντο and the strong sense
    of ἔμφοβοι. 'Terrified' communicates the intensity naturally.
- source_word: ἔδωκαν δόξαν
  chosen: gave glory
  alternatives:
  - glorified
  - gave honor
  lexicon: BDAG
  rationale: A more formal rendering preserves the idiom used frequently in biblical
    literature. 'Glorified' is possible but slightly less transparent to the underlying
    expression.
- source_word: τῷ θεῷ τοῦ οὐρανοῦ
  chosen: to the God of heaven
  alternatives:
  - to God in heaven
  - to the heavenly God
  lexicon: BDAG
  rationale: This preserves the genitival title as written and echoes established
    biblical usage without unnecessary paraphrase.
