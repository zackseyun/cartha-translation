id: REV.11.4
reference: Revelation 11:4
source:
  edition: SBLGNT
  text: Οὗτοί εἰσιν αἱ δύο ἐλαῖαι καὶ αἱ δύο λυχνίαι αἱ ἐνώπιον τοῦ κυρίου τῆς γῆς
    ⸀ἑστῶτες.
translation:
  text: These are the two olive trees and the two lampstands standing before the Lord
    of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An allusion to Zechariah 4, where olive trees and lampstand imagery symbolize
      God's appointed, Spirit-empowered servants.
    reason: cross_reference
  - marker: b
    text: Or 'who stand before the Lord of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτοί
  chosen: These
  alternatives:
  - These men
  - These witnesses
  lexicon: BDAG
  rationale: Demonstrative pronoun, nominative masculine plural, referring back to
    the two witnesses in context. 'These' is the most direct rendering and avoids
    importing 'witnesses' from the previous verse into this verse's wording.
- source_word: ἐλαῖαι
  chosen: olive trees
  alternatives:
  - olive trees
  - olive trees/olive plants
  lexicon: BDAG
  rationale: In this allusive apocalyptic context, ἐλαία refers to olive trees rather
    than merely olives. 'Olive trees' preserves the imagery and echoes Zechariah 4.
- source_word: λυχνίαι
  chosen: lampstands
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: λυχνία denotes a lampstand rather than the lamp itself. 'Lampstands'
    is the established and lexically precise rendering, especially important in Revelation
    where the image is thematically significant.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: The preposition indicates position in the presence of someone. 'Before'
    is concise, natural English and preserves the formal sense.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This also fits the
    reverential and theological force of the title here.
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In Revelation's cosmic scope, 'earth' is more likely than 'land.' 'Lord
    of the earth' also echoes broader biblical idiom and the universal sovereignty
    implied by the context.
- source_word: ἑστῶτες
  chosen: standing
  alternatives:
  - who stand
  lexicon: BDAG
  rationale: Perfect active participle from ἵστημι used adjectivally/predicatively.
    'Standing' gives a smooth English participial construction while preserving the
    present state resulting from having taken their stand.
