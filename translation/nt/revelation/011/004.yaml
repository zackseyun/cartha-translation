theological_decisions:
- issue: Relation of the imagery to Zechariah 4 and the identity of the two witnesses
  chosen_reading: 'Retain the metaphor directly: ''the two olive trees and the two
    lampstands,'' without explicating the symbolism in the main text.'
  alternative_readings:
  - Interpretive expansion such as 'These two witnesses are like the two olive trees
    and the two lampstands'
  rationale: The Greek identifies them through apocalyptic imagery rather than explanatory
    paraphrase. Preserving the metaphor maintains the theological tension and intertextual
    resonance without resolving the symbolism for the reader.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
