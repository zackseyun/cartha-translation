theological_decisions:
- issue: Nature of προσκυνέω in a heavenly liturgical scene
  chosen_reading: Rendered as 'worshiped' rather than a weaker term such as 'bowed
    down.'
  alternative_readings:
  - bowed down
  - paid homage
  rationale: Because the object is explicitly God and the action occurs in an apocalyptic
    throne-room setting, the religious sense is primary. This avoids understating
    the act while not importing additional doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
