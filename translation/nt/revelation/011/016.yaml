id: REV.11.16
reference: Revelation 11:16
source:
  edition: SBLGNT
  text: Καὶ οἱ εἴκοσι τέσσαρες πρεσβύτεροι οἱ ἐνώπιον τοῦ ⸂θεοῦ καθήμενοι⸃ ἐπὶ τοὺς
    θρόνους αὐτῶν ἔπεσαν ἐπὶ τὰ πρόσωπα αὐτῶν καὶ προσεκύνησαν τῷ θεῷ,
translation:
  text: And the twenty-four elders, who were seated before God on their thrones, fell
    on their faces and worshiped God,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - presbyters
  - older men
  lexicon: BDAG
  rationale: In Revelation this term denotes the heavenly council figures traditionally
    called 'elders,' not merely aged men. 'Elders' is the clearest and most established
    English equivalent without unnecessary transliteration.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: The preposition indicates spatial/relational presence before God. 'Before'
    is concise, natural English and preserves the scene's formal posture.
- source_word: καθήμενοι
  chosen: were seated
  alternatives:
  - sitting
  lexicon: BDAG
  rationale: The participle describes their ongoing seated position. 'Were seated'
    fits smooth English narrative style while preserving the stative sense better
    than a simple finite verb.
- source_word: ἐπὶ τοὺς θρόνους αὐτῶν
  chosen: on their thrones
  alternatives:
  - upon their thrones
  lexicon: BDAG
  rationale: ἐπί with the accusative here conveys position on/upon the thrones in
    idiomatic narrative description. 'On their thrones' is natural modern English.
- source_word: ἔπεσαν ἐπὶ τὰ πρόσωπα αὐτῶν
  chosen: fell on their faces
  alternatives:
  - fell face down
  - fell upon their faces
  lexicon: BDAG
  rationale: This is a standard idiom for prostration. 'Fell on their faces' preserves
    the vivid bodily posture and its worshipful significance without paraphrase.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down in worship
  - prostrated themselves before
  lexicon: BDAG
  rationale: In this context the verb denotes reverential worship directed to God,
    not merely physical obeisance. 'Worshiped' communicates the act's religious force
    clearly in English.
- source_word: θεῷ / θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The genitive and dative forms are both represented
    naturally in English as 'God' within their respective constructions.
- source_word: οἱ εἴκοσι τέσσαρες
  chosen: the twenty-four
  alternatives:
  - the twenty four
  lexicon: BDAG
  rationale: English convention hyphenates compound numbers used attributively. The
    article is retained to mark the known group in the vision.
