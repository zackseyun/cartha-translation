id: REV.11.18
reference: Revelation 11:18
source:
  edition: SBLGNT
  text: καὶ τὰ ἔθνη ὠργίσθησαν, καὶ ἦλθεν ἡ ὀργή σου καὶ ὁ καιρὸς τῶν νεκρῶν κριθῆναι
    καὶ δοῦναι τὸν μισθὸν τοῖς δούλοις σου τοῖς προφήταις καὶ τοῖς ἁγίοις καὶ τοῖς
    φοβουμένοις τὸ ὄνομά σου, ⸂τοὺς μικροὺς καὶ τοὺς μεγάλους⸃, καὶ διαφθεῖραι τοὺς
    διαφθείροντας τὴν γῆν.
translation:
  text: And the nations became angry, and your wrath came, and the time for the dead
    to be judged, and to give the reward to your servants—the prophets, the saints,
    and those who fear your name, the small and the great—and to destroy those who
    destroy the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slaves' for 'your servants'; Greek doulos can denote a servant or a
      slave, depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'those who ruin/corrupt the earth'; Greek gē can also mean 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: In Revelation this commonly denotes the nations of the world in collective
    opposition or subjection, not specifically 'Gentiles' over against Jews. 'Nations'
    is the most natural and contextually fitting rendering.
- source_word: ὠργίσθησαν
  chosen: became angry
  alternatives:
  - were enraged
  - raged
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζομαι conveys becoming angry or enraged.
    'Became angry' preserves the verbal force without over-intensifying; 'raged' is
    possible but less directly tied to the cognate noun ὀργή later in the verse.
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: For divine ὀργή, 'wrath' better preserves the judicial and eschatological
    force than the flatter 'anger.' It also creates a deliberate contrast with the
    nations' anger.
- source_word: καιρός
  chosen: time
  alternatives:
  - appointed time
  - season
  lexicon: BDAG
  rationale: καιρός here denotes the decisive appointed moment in salvation history.
    'Time' is concise and natural in English; the eschatological specificity is carried
    by the context.
- source_word: τῶν νεκρῶν
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: BDAG
  rationale: Standard idiomatic rendering for the substantival adjective νεκρῶν.
- source_word: κριθῆναι
  chosen: to be judged
  alternatives:
  - to be brought to judgment
  lexicon: BDAG
  rationale: The passive infinitive is straightforwardly judicial. 'To be judged'
    is both accurate and readable.
- source_word: μισθός
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: In this context of divine recompense to God's people, 'reward' is the
    most idiomatic and least misleading English choice; 'wages' sounds transactional
    in a way the context does not require.
- source_word: δούλοις
  chosen: servants
  alternatives:
  - slaves
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος may be 'servant' or 'slave' context-dependently.
    Here the list 'your servants—the prophets...' functions as an honorific designation
    for God's people rather than emphasizing bonded status, so 'servants' is preferable
    in the main text.
- source_word: προφήταις
  chosen: the prophets
  lexicon: BDAG
  rationale: The article supports a recognizable group designation. 'The prophets'
    is the natural rendering.
- source_word: ἁγίοις
  chosen: the saints
  alternatives:
  - the holy ones
  - God's holy people
  lexicon: BDAG
  rationale: '''Saints'' is the established and accurate rendering for ἅγιοι in Revelation,
    preserving the covenantal identity of God''s consecrated people. ''Holy ones''
    is possible but less idiomatic here.'
- source_word: φοβουμένοις τὸ ὄνομά σου
  chosen: those who fear your name
  alternatives:
  - those who revere your name
  lexicon: BDAG
  rationale: This biblical idiom denotes reverent fear toward God. 'Fear your name'
    preserves the source expression; 'revere' is interpretive and smoother but less
    transparent.
- source_word: τοὺς μικροὺς καὶ τοὺς μεγάλους
  chosen: the small and the great
  alternatives:
  - small and great alike
  - the least and the greatest
  lexicon: BDAG
  rationale: This phrase marks comprehensiveness across status levels. 'The small
    and the great' is a close, rhythmic rendering that preserves the article and pair
    structure.
- source_word: διαφθεῖραι
  chosen: to destroy
  alternatives:
  - to ruin
  - to corrupt
  lexicon: BDAG
  rationale: In this final clause, the infinitive parallels the prior infinitives
    and denotes divine judgment. 'Destroy' best fits the punitive force in context.
- source_word: τοὺς διαφθείροντας τὴν γῆν
  chosen: those who destroy the earth
  alternatives:
  - those who ruin the earth
  - those who corrupt the earth/land
  lexicon: BDAG
  rationale: 'The participle repeats the same verb as the infinitive, creating a wordplay/retributive
    symmetry: God destroys those who destroy. ''Earth'' is preferred over ''land''
    in Revelation''s cosmic scope.'
- source_word: γῆν
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: Although γῆ can mean 'land,' Revelation here speaks in universal, eschatological
    terms, so 'earth' best matches the scope.
