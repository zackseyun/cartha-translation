theological_decisions:
- issue: Rendering δοῦλος in a designation for God's people
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The doctrinal guidance allows 'servant / slave' context-dependently.
    In this verse the emphasis falls on God's recognized people receiving reward,
    not on the bonded-status metaphor. 'Servants' reads naturally while preserving
    belonging to God; the alternative is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1 and #5'
- issue: Scope of γῆ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse sits in an apocalyptic, cosmic judgment context, so 'earth'
    better preserves the universal scope. 'Land' remains lexically possible and is
    preserved in a footnote as a lexical alternative rather than a doctrinally loaded
    choice.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #5'
