theological_decisions:
- issue: Implied object of δώσω
  chosen_reading: The main text supplies the implied sense as 'grant authority' rather
    than leaving 'I will give' without an object.
  alternative_readings:
  - And I will give to my two witnesses
  - And I will appoint my two witnesses
  rationale: The Greek omits the object, but English normally requires one or an equivalent
    expression. Because the next clause states that the witnesses will prophesy, the
    implied gift is their prophetic commission/authority. This clarifies the syntax
    without importing a sectarian interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Symbolic force of sackcloth
  chosen_reading: The translation retains the image 'clothed in sackcloth' without
    interpreting it in the main text.
  alternative_readings:
  - clothed in garments of mourning
  rationale: Sackcloth carries associations of mourning, repentance, and prophetic
    lament, but the text itself presents the image rather than an explicit explanation.
    Preserving the image maintains theological tension and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3
