id: REV.11.3
reference: Revelation 11:3
source:
  edition: SBLGNT
  text: καὶ δώσω τοῖς δυσὶν μάρτυσίν μου, καὶ προφητεύσουσιν ἡμέρας χιλίας διακοσίας
    ἑξήκοντα, ⸀περιβεβλημένοι σάκκους.
translation:
  text: And I will grant authority to my two witnesses, and they will prophesy for
    one thousand two hundred sixty days, clothed in sackcloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'And I will give to my two witnesses.' The Greek leaves
      unstated what is given; the sense is likely authority or commission to prophesy.
    reason: lexical_alternative
  - marker: b
    text: Sackcloth was associated with mourning, repentance, and prophetic lament.
    reason: cultural_note
lexical_decisions:
- source_word: δώσω
  chosen: I will grant authority
  alternatives:
  - I will give
  - I will appoint
  lexicon: BDAG
  rationale: The verb is literally 'I will give,' but the direct object is omitted
    in Greek ('I will give to my two witnesses'). In context, what is given is the
    capacity/commission to prophesy. 'Grant authority' makes the implied sense explicit
    in natural English without over-paraphrasing. A more literal 'I will give to'
    is awkward and incomplete in English.
- source_word: τοῖς δυσὶν μάρτυσίν μου
  chosen: to my two witnesses
  alternatives:
  - to the two witnesses of mine
  lexicon: BDAG
  rationale: Standard possessive rendering. 'Witnesses' preserves the legal-testimonial
    sense of μάρτυς and fits the apocalyptic context.
- source_word: προφητεύσουσιν
  chosen: they will prophesy
  alternatives:
  - they will speak prophetically
  lexicon: BDAG
  rationale: '''Prophesy'' is the direct and established equivalent for προφητεύω
    and remains clear in modern English.'
- source_word: ἡμέρας χιλίας διακοσίας ἑξήκοντα
  chosen: for one thousand two hundred sixty days
  alternatives:
  - one thousand two hundred and sixty days
  lexicon: BDAG
  rationale: The accusative expresses duration of time, so 'for ... days' is idiomatic
    English. Number wording is standardized in contemporary English.
- source_word: περιβεβλημένοι
  chosen: clothed
  alternatives:
  - wearing
  - dressed
  lexicon: BDAG
  rationale: The perfect participle indicates a state of being clothed. 'Clothed'
    preserves the formal, vivid imagery better than the more casual 'wearing.'
- source_word: σάκκους
  chosen: in sackcloth
  alternatives:
  - with sackcloth garments
  lexicon: BDAG
  rationale: Although the Greek is literally 'sackcloths/sacks,' the idiomatic expression
    in English is 'in sackcloth.' This preserves the prophetic mourning/repentance
    imagery without wooden literalism.
