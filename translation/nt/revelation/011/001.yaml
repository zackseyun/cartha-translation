theological_decisions:
- issue: Reference of ναός in apocalyptic context
  chosen_reading: the temple of God
  alternative_readings:
  - the sanctuary of God
  rationale: The verse does not itself resolve whether the vision concerns a literal
    earthly temple, a heavenly sanctuary, or a symbolic people of God. The translation
    therefore keeps the lexical rendering 'temple' and avoids importing a specific
    eschatological interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of the speaker implied by λέγων
  chosen_reading: left implicit as 'saying'
  alternative_readings:
  - an angel saying
  - a voice saying
  rationale: The Greek participle does not explicitly identify the speaker. Supplying
    'angel' or 'voice' would interpret beyond the wording of the text, so the translation
    preserves the ambiguity.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
