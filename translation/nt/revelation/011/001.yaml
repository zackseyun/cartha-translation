id: REV.11.1
reference: Revelation 11:1
source:
  edition: SBLGNT
  text: Καὶ ἐδόθη μοι κάλαμος ὅμοιος ῥάβδῳ, λέγων· ⸀Ἔγειρε καὶ μέτρησον τὸν ναὸν τοῦ
    θεοῦ καὶ τὸ θυσιαστήριον καὶ τοὺς προσκυνοῦντας ἐν αὐτῷ.
translation:
  text: And I was given a reed like a rod, saying, “Rise and measure the temple of
    God and the altar and those who worship in it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the sanctuary of God”; Greek ναός can refer more specifically to the
      inner temple rather than the entire temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη μοι
  chosen: I was given
  alternatives:
  - there was given to me
  - I received
  lexicon: BDAG
  rationale: Passive of δίδωμι with dative pronoun; English passive preserves the
    Greek focus on the gift being given rather than on an explicit giver.
- source_word: κάλαμος
  chosen: reed
  alternatives:
  - measuring rod
  - staff
  lexicon: BDAG
  rationale: The basic sense is 'reed.' Because ὅμοιος ῥάβδῳ follows, the text distinguishes
    the object as a reed that is like a rod; translating simply 'measuring rod' would
    frontload interpretation that is only implied by the command to measure.
- source_word: ὅμοιος ῥάβδῳ
  chosen: like a rod
  alternatives:
  - similar to a staff
  - resembling a rod
  lexicon: BDAG
  rationale: ὅμοιος plus dative expresses comparison. 'Rod' is the most straightforward
    rendering of ῥάβδος here and preserves the imagery of firmness/authority without
    overinterpreting.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and someone said
  - with these words
  lexicon: BDAG
  rationale: The present participle is masculine singular and somewhat syntactically
    abrupt, likely referring to the implicit speaker associated with the gift. 'Saying'
    preserves the Greek's participial linkage and ambiguity without supplying an explicit
    subject.
- source_word: Ἔγειρε
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: BDAG
  rationale: Aorist imperative of ἐγείρω. 'Rise' is concise, natural, and suitably
    elevated for apocalyptic discourse.
- source_word: μέτρησον
  chosen: measure
  alternatives:
  - take the measure of
  lexicon: BDAG
  rationale: Direct imperative; 'measure' is the plain sense and fits the visionary
    action.
- source_word: ναὸν τοῦ θεοῦ
  chosen: the temple of God
  alternatives:
  - the sanctuary of God
  lexicon: BDAG
  rationale: ναός often refers specifically to the sanctuary rather than the broader
    temple complex. However, 'temple' is the most natural English rendering and remains
    accurate here; the more specific nuance is worth preserving in a footnote.
- source_word: θυσιαστήριον
  chosen: the altar
  lexicon: BDAG
  rationale: Standard rendering for θυσιαστήριον; no stronger contextual reason to
    specify incense altar versus sacrificial altar in the main text.
- source_word: τοὺς προσκυνοῦντας
  chosen: those who worship
  alternatives:
  - the worshipers
  lexicon: BDAG
  rationale: Substantival participle. 'Those who worship' closely reflects the Greek
    verbal force while remaining natural English.
- source_word: ἐν αὐτῷ
  chosen: in it
  alternatives:
  - therein
  - in him
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to ναός, the temple, not to God.
    'In it' makes the spatial reference clear in English.
