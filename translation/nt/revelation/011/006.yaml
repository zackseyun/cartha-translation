theological_decisions:
- issue: Allusive language linking the witnesses to Elijah and Moses motifs
  chosen_reading: Retain the miraculous actions in direct, non-reductive language
    without explaining or demythologizing them.
  alternative_readings:
  - Interpret the actions symbolically in translation
  rationale: The verse presents these acts as part of the witnesses' granted authority.
    Translation should preserve the text's apocalyptic imagery and theological tension
    rather than resolve whether the actions are literal, symbolic, or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
