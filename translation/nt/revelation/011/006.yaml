id: REV.11.6
reference: Revelation 11:6
source:
  edition: SBLGNT
  text: οὗτοι ἔχουσιν ⸂τὴν ἐξουσίαν κλεῖσαι τὸν οὐρανόν⸃, ἵνα μὴ ὑετὸς βρέχῃ τὰς ἡμέρας
    τῆς προφητείας αὐτῶν, καὶ ἐξουσίαν ἔχουσιν ἐπὶ τῶν ὑδάτων στρέφειν αὐτὰ εἰς αἷμα
    καὶ πατάξαι τὴν γῆν ⸂ἐν πάσῃ πληγῇ ὁσάκις ἐὰν θελήσωσιν⸃.
translation:
  text: These have the authority to shut the sky so that no rain may fall during the
    days of their prophecy, and they have authority over the waters to turn them into
    blood and to strike the earth with every kind of plague as often as they wish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shut heaven.' The Greek οὐρανός can mean either 'heaven' or 'sky'; here
      'sky' is chosen because the context concerns rain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  lexicon: BDAG
  rationale: Rendered as 'authority' rather than 'power' to emphasize delegated right
    or jurisdiction, which fits apocalyptic prophetic commission language better than
    mere ability.
- source_word: κλεῖσαι τὸν οὐρανόν
  chosen: shut the sky
  alternatives:
  - shut heaven
  lexicon: BDAG
  rationale: Translated οὐρανός here as 'sky' because the immediate reference is to
    withholding rain, a meteorological function. 'Heaven' is possible and traditional,
    but 'sky' better matches the plain sense in context.
- source_word: ἵνα μὴ ὑετὸς βρέχῃ
  chosen: so that no rain may fall
  alternatives:
  - so that rain may not fall
  - so that it may not rain
  lexicon: BDAG
  rationale: This expresses the purpose/result of shutting the sky. 'No rain may fall'
    is natural English and preserves the force of ὑετός with βρέχω without unnecessary
    literalism.
- source_word: τὰς ἡμέρας τῆς προφητείας αὐτῶν
  chosen: during the days of their prophecy
  alternatives:
  - in the days of their prophesying
  lexicon: BDAG
  rationale: The genitive construction is rendered idiomatically. 'Their prophecy'
    here denotes the period of their prophetic witness; 'during' makes the temporal
    force clear in English.
- source_word: ἐπὶ τῶν ὑδάτων
  chosen: over the waters
  alternatives:
  - over the water
  - concerning the waters
  lexicon: BDAG
  rationale: With ἐξουσίαν ἔχουσιν, ἐπί with the genitive conveys authority over a
    domain. The plural 'waters' reflects the Greek and suits the allusion to waters
    generally being turned to blood.
- source_word: στρέφειν αὐτὰ εἰς αἷμα
  chosen: to turn them into blood
  alternatives:
  - to change them into blood
  lexicon: BDAG
  rationale: A straightforward rendering of στρέφω with εἰς. 'Turn ... into' is idiomatic
    and preserves the transformation imagery.
- source_word: πατάξαι τὴν γῆν
  chosen: to strike the earth
  alternatives:
  - to smite the earth
  lexicon: BDAG
  rationale: '''Strike'' is preferred as readable modern English; ''smite'' is traditional
    but archaic. γῆ is rendered ''earth'' in keeping with Revelation''s broader cosmic
    scope.'
- source_word: ἐν πάσῃ πληγῇ
  chosen: with every kind of plague
  alternatives:
  - with every plague
  - by every plague
  lexicon: BDAG
  rationale: ἐν here is instrumental. 'Every kind of plague' brings out the distributive
    sense of πάσῃ in natural English without implying a fixed list.
- source_word: ὁσάκις ἐὰν θελήσωσιν
  chosen: as often as they wish
  alternatives:
  - whenever they want
  - as often as they desire
  lexicon: BDAG
  rationale: This construction expresses repeated contingency. 'As often as they wish'
    is concise, natural, and preserves the iterative force of ὁσάκις with ἐάν.
- source_word: οὗτοι
  chosen: These
  alternatives:
  - These two
  lexicon: BDAG
  rationale: The demonstrative is rendered simply as 'These.' Although the referent
    is the two witnesses from context, the Greek here does not explicitly repeat 'two,'
    so it is not added.
