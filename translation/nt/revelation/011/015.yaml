theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not a name-like designation, and the doctrine
    file directs 'Messiah' where context supports. The possessive phrase 'his Messiah'
    makes the titular sense especially clear.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Subject of βασιλεύσει
  chosen_reading: he will reign
  alternative_readings:
  - they will reign
  - the Lord and his Messiah will reign
  rationale: The Greek verb is singular (βασιλεύσει), so the translation should preserve
    a singular subject. English leaves the antecedent somewhat compressed, matching
    the Greek's compact proclamation, rather than resolving the referent more explicitly
    than the text does.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
