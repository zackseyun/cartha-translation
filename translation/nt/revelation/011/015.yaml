id: REV.11.15
reference: Revelation 11:15
source:
  edition: SBLGNT
  text: Καὶ ὁ ἕβδομος ἄγγελος ἐσάλπισεν· καὶ ἐγένοντο φωναὶ μεγάλαι ἐν τῷ οὐρανῷ ⸀λέγοντες·
    Ἐγένετο ἡ βασιλεία τοῦ κόσμου τοῦ κυρίου ἡμῶν καὶ τοῦ χριστοῦ αὐτοῦ, καὶ βασιλεύσει
    εἰς τοὺς αἰῶνας τῶν αἰώνων.
translation:
  text: And the seventh angel sounded his trumpet, and there were loud voices in heaven,
    saying, “The kingdom of the world has become that of our Lord and of his Messiah,
    and he will reign forever and ever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the kingdoms of the world have become' or 'the kingdom
      of this world has become.' The SBLGNT text reads singular, 'the kingdom of the
      world has become.'
    reason: textual_variant
  - marker: b
    text: Or 'his Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its titular sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally, 'to the ages of the ages,' an idiom meaning unending
      duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  chosen: sounded his trumpet
  alternatives:
  - blew the trumpet
  - trumpeted
  lexicon: BDAG
  rationale: The verb σαλπίζω means to sound a trumpet. In English, 'sounded his trumpet'
    is natural and makes explicit the instrument implied by the verb without adding
    foreign content.
- source_word: φωναὶ μεγάλαι
  chosen: loud voices
  alternatives:
  - great voices
  - loud cries
  lexicon: BDAG
  rationale: φωνή can mean voice, sound, or cry; with λέγοντες following, articulated
    speakers are in view, so 'voices' is preferable. 'Loud' is idiomatic for μεγάλαι
    here.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the sky
  lexicon: BDAG
  rationale: In Revelation, οὐρανός in this setting refers to the heavenly realm,
    not the physical sky. English idiom prefers 'in heaven'.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - which said
  - who were saying
  lexicon: BDAG
  rationale: A participial construction is best rendered smoothly in English as 'saying.'
    Although the masculine participle with feminine φωναί is syntactically notable,
    the sense is clear and does not require awkward reproduction in English.
- source_word: Ἐγένετο ἡ βασιλεία τοῦ κόσμου
  chosen: The kingdom of the world has become
  alternatives:
  - The kingdom of the world became
  - The kingdom of the world has come to be
  lexicon: BDAG
  rationale: βασιλεία is singular in the SBLGNT text, so 'kingdom' rather than 'kingdoms.'
    The aorist ἐγένετο is rendered with English present perfect ('has become') to
    convey the proclamatory, now-accomplished force in context.
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - of this world
  - worldly
  lexicon: BDAG
  rationale: The genitive is simply 'of the world.' 'Of this world' reflects a different
    textual tradition and should not be imported into the main text.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: of our Lord
  alternatives:
  - belonging to our Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The genitive after
    'has become' is naturally expressed in English with 'that of our Lord' to avoid
    ambiguity.
- source_word: τοῦ χριστοῦ αὐτοῦ
  chosen: of his Messiah
  alternatives:
  - of his Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' where context
    supports. Here it is clearly titular and in relation to God ('his Messiah'), so
    'Messiah' best preserves the meaning.
- source_word: καὶ βασιλεύσει
  chosen: and he will reign
  alternatives:
  - and he shall reign
  lexicon: BDAG
  rationale: The singular future verb most naturally takes a singular subject in English.
    'Will reign' is clear modern English; 'shall' is unnecessarily archaic.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the standard
    natural English equivalent while preserving the force of the expression.
