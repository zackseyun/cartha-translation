theological_decisions:
- issue: Singular πτῶμα with plural referent (the two witnesses)
  chosen_reading: Render the singular as 'their dead body' to preserve the Greek's
    corporate singular.
  alternative_readings:
  - their dead bodies
  rationale: Although two witnesses are in view, the Greek text uses a singular noun.
    Retaining the singular preserves the text's rhetorical effect of treating them
    as a unit, while remaining intelligible in English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Meaning of πνευματικῶς in the city's symbolic naming
  chosen_reading: Translate as 'spiritually' in the main text.
  alternative_readings:
  - figuratively
  rationale: The Greek adverb is literally 'spiritually,' and the translation should
    not flatten this into a purely literary category unless necessary. Because many
    English readers may understand the sense as symbolic/figurative, that alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
- issue: Identification of 'the great city'
  chosen_reading: Leave the identification implicit rather than naming Jerusalem in
    the translation.
  alternative_readings:
  - an explicit gloss such as 'Jerusalem'
  rationale: The clause 'where also their Lord was crucified' strongly points to Jerusalem,
    but the Greek text itself uses the symbolic expression 'the great city.' The translation
    should preserve John's apocalyptic rhetoric rather than replace it with an interpretive
    identification.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
