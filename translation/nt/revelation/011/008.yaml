id: REV.11.8
reference: Revelation 11:8
source:
  edition: SBLGNT
  text: καὶ τὸ πτῶμα αὐτῶν ἐπὶ τῆς πλατείας τῆς πόλεως τῆς μεγάλης, ἥτις καλεῖται
    πνευματικῶς Σόδομα καὶ Αἴγυπτος, ὅπου καὶ ὁ κύριος αὐτῶν ἐσταυρώθη.
translation:
  text: And their dead body lies in the street of the great city, which is spiritually
    called Sodom and Egypt, where also their Lord was crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'figuratively called Sodom and Egypt.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'dead body' likely treats the two witnesses as a unit; some
      translations render 'dead bodies' for smoother English.
    reason: alternative_reading
  - marker: c
    text: The phrase 'where also their Lord was crucified' points to Jerusalem, though
      the text retains the symbolic title 'the great city.'
    reason: cross_reference
lexical_decisions:
- source_word: πτῶμα
  chosen: dead body
  alternatives:
  - corpse
  - carcass
  lexicon: BDAG
  rationale: πτῶμα denotes a fallen body/corpse. 'Dead body' is natural modern English
    and preserves the starkness without the harsher connotations of 'carcass.' The
    singular is retained because the Greek has singular τὸ πτῶμα, likely treating
    the two witnesses corporately.
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: Genitive plural possessive, referring to the two witnesses. Rendered
    straightforwardly as 'their.'
- source_word: ἐπὶ τῆς πλατείας
  chosen: in the street
  alternatives:
  - on the street
  - in the public square
  lexicon: BDAG
  rationale: πλατεῖα can mean a broad street or public square. Given the singular
    with city imagery, 'street' is a clear, idiomatic rendering; 'public square' is
    possible but less certain in this context.
- source_word: τῆς πόλεως τῆς μεγάλης
  chosen: of the great city
  alternatives:
  - of the large city
  lexicon: BDAG
  rationale: A formally close rendering that preserves the apocalyptic designation
    'the great city,' an important phrase in Revelation.
- source_word: ἥτις
  chosen: which
  alternatives:
  - which indeed
  - which, being the one that
  lexicon: BDAG
  rationale: ἥτις can have a qualitative/explanatory nuance, but simple 'which' communicates
    the relative clause naturally in English without overtranslating.
- source_word: καλεῖται
  chosen: is called
  alternatives:
  - is named
  lexicon: BDAG
  rationale: Standard passive rendering of καλέω in naming contexts.
- source_word: πνευματικῶς
  chosen: spiritually
  alternatives:
  - figuratively
  lexicon: BDAG
  rationale: The adverb indicates a spiritual/symbolic mode of designation. 'Spiritually'
    is the most direct lexical equivalent; 'figuratively' is interpretive and can
    be preserved in a footnote.
- source_word: Σόδομα καὶ Αἴγυπτος
  chosen: Sodom and Egypt
  lexicon: BDAG
  rationale: Proper names are transliterated per project philosophy. The pairing conveys
    symbolic moral corruption and oppression without needing to make those implications
    explicit in the translation.
- source_word: ὅπου καὶ
  chosen: where also
  alternatives:
  - where even
  - where too
  lexicon: BDAG
  rationale: Retains both the locative force of ὅπου and the additive καί. 'Also'
    is the most neutral rendering.
- source_word: ὁ κύριος αὐτῶν
  chosen: their Lord
  alternatives:
  - their master
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' in keeping with the project's default for this
    theologically weighty title. The phrase refers to the Lord of the two witnesses.
- source_word: ἐσταυρώθη
  chosen: was crucified
  lexicon: BDAG
  rationale: Aorist passive of σταυρόω, rendered with the standard historical passive
    'was crucified.'
