theological_decisions:
- issue: Whether to literalize or interpret the fire-from-the-mouth imagery
  chosen_reading: 'Preserve the imagery as stated: ''fire comes out from their mouth.'''
  alternative_readings:
  - Interpret as symbolic speech of judgment
  - Render more dynamically as destructive judgment proceeds from them
  rationale: Revelation regularly uses symbolic imagery, but the translation philosophy
    forbids importing interpretation into the main text where the Greek presents the
    image directly. The wording leaves symbolic or literal interpretation to readers
    and commentators.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
