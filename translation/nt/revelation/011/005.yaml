id: REV.11.5
reference: Revelation 11:5
source:
  edition: SBLGNT
  text: καὶ εἴ τις αὐτοὺς θέλει ἀδικῆσαι, πῦρ ἐκπορεύεται ἐκ τοῦ στόματος αὐτῶν καὶ
    κατεσθίει τοὺς ἐχθροὺς αὐτῶν· καὶ εἴ τις ⸂θελήσῃ αὐτοὺς⸃ ἀδικῆσαι, οὕτως δεῖ αὐτὸν
    ἀποκτανθῆναι.
translation:
  text: And if anyone wants to harm them, fire comes out from their mouth and devours
    their enemies; and if anyone should want to harm them, in this way he must be
    killed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes out of their mouths.' The Greek reads literally 'from their mouth,'
      with a singular noun and plural possessor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῆσαι
  chosen: to harm
  alternatives:
  - to wrong
  - to injure
  lexicon: BDAG
  rationale: In this apocalyptic context the verb refers to hostile action against
    the two witnesses, not merely abstract injustice. 'Harm' is natural modern English
    and fits both occurrences without over-specifying the manner of attack.
- source_word: πῦρ
  chosen: fire
  lexicon: BDAG
  rationale: The noun is straightforwardly 'fire.' Given Revelation's imagery, the
    translation preserves the vivid literal wording rather than softening it into
    a metaphor in the main text.
- source_word: ἐκπορεύεται ἐκ τοῦ στόματος αὐτῶν
  chosen: comes out from their mouth
  alternatives:
  - proceeds out of their mouth
  - comes out of their mouth
  lexicon: BDAG
  rationale: This keeps the concrete imagery and reflects the singular 'mouth' in
    Greek. The singular may be collective or idiomatic with a plural possessor; retaining
    'their mouth' follows the source closely, though English readers may find 'their
    mouths' more idiomatic.
- source_word: κατεσθίει
  chosen: devours
  alternatives:
  - consumes
  - eats up
  lexicon: BDAG
  rationale: '''Devours'' best conveys the forceful, destructive sense in idiomatic
    English while matching the vividness of the Greek compound verb.'
- source_word: ἐχθροὺς
  chosen: enemies
  alternatives:
  - foes
  lexicon: BDAG
  rationale: Standard and clear rendering for those hostile to the witnesses.
- source_word: θελήσῃ
  chosen: should want
  alternatives:
  - wants
  - desires
  lexicon: BDAG
  rationale: The aorist subjunctive in the second conditional clause is rendered with
    'should want' to reflect the slightly more contingent force, while remaining natural
    English. The first θέλει is present indicative and is rendered 'wants.'
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: This points back to the described manner of judgment. 'In this way' is
    clearer for modern readers than the more formal 'thus.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  lexicon: BDAG
  rationale: The verb expresses necessity or inevitability. 'Must' is concise and
    preserves the force of divine or prophetic necessity without adding interpretation.
- source_word: ἀποκτανθῆναι
  chosen: be killed
  alternatives:
  - be put to death
  - be slain
  lexicon: BDAG
  rationale: A clear passive infinitive in natural English. 'Be killed' is direct
    and avoids archaic tone.
