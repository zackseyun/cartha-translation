id: REV.11.10
reference: Revelation 11:10
source:
  edition: SBLGNT
  text: καὶ οἱ κατοικοῦντες ἐπὶ τῆς γῆς χαίρουσιν ἐπ’ αὐτοῖς καὶ ⸀εὐφραίνονται, καὶ
    δῶρα ⸀πέμψουσιν ἀλλήλοις, ὅτι οὗτοι οἱ δύο προφῆται ἐβασάνισαν τοὺς κατοικοῦντας
    ἐπὶ τῆς γῆς.
translation:
  text: And those who dwell on the earth rejoice over them and celebrate, and they
    will send gifts to one another, because these two prophets tormented those who
    dwell on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the earth.' Revelation frequently uses this expression
      for the world in rebellion against God.
    reason: lexical_alternative
  - marker: b
    text: Or 'make merry.' The Greek verb emphasizes festive celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κατοικοῦντες ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those living on the earth
  lexicon: BDAG
  rationale: A participial construction used twice in the verse. 'Those who dwell
    on the earth' preserves the verbal force and matches Revelation's recurring expression,
    while remaining natural English.
- source_word: χαίρουσιν
  chosen: rejoice
  alternatives:
  - are glad
  lexicon: BDAG
  rationale: '''Rejoice'' best reflects the verb''s sense and keeps the elevated tone
    appropriate to the scene.'
- source_word: ἐπ’ αὐτοῖς
  chosen: over them
  alternatives:
  - because of them
  - at their expense
  lexicon: BDAG
  rationale: In context the earth-dwellers are rejoicing with reference to the two
    prophets' death; 'over them' is idiomatic and concise.
- source_word: εὐφραίνονται
  chosen: celebrate
  alternatives:
  - make merry
  - are glad
  lexicon: BDAG
  rationale: Used alongside χαίρουσιν, this calls for a distinct but related English
    rendering. 'Celebrate' avoids awkward repetition while conveying festive joy.
    'Make merry' is possible but sounds archaic in contemporary English.
- source_word: δῶρα
  chosen: gifts
  alternatives:
  - presents
  lexicon: BDAG
  rationale: Standard and natural rendering; the context suggests celebratory gift-giving.
- source_word: πέμψουσιν ἀλλήλοις
  chosen: they will send to one another
  alternatives:
  - they send one another
  - they will exchange
  lexicon: BDAG
  rationale: The future indicative is preserved with 'will send.' 'Exchange' is interpretive
    and less literal than the Greek wording.
- source_word: οὗτοι οἱ δύο προφῆται
  chosen: these two prophets
  alternatives:
  - these, the two prophets
  lexicon: BDAG
  rationale: Straightforward rendering of the demonstrative plus noun phrase; English
    naturally compresses the appositional force.
- source_word: ἐβασάνισαν
  chosen: tormented
  alternatives:
  - afflicted
  - caused anguish to
  lexicon: BDAG
  rationale: βασανίζω often carries the sense of severe torment or distress. 'Tormented'
    preserves the intensity better than softer options like 'troubled' or 'afflicted'.
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those living on the earth
  lexicon: BDAG
  rationale: Repeated identically from the opening clause, so the English is kept
    consistent in line with the translation philosophy's emphasis on consistency of
    key terms.
