theological_decisions:
- issue: Rendering Revelation's stock phrase for the unbelieving world
  chosen_reading: those who dwell on the earth
  alternative_readings:
  - the inhabitants of the earth
  rationale: The phrase in Revelation often carries theological weight, referring
    not merely to geographic residents but to the earthbound human community opposed
    to God's witnesses. The chosen rendering preserves the repeated verbal expression
    without over-interpreting it in the main text.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Intensity of the witnesses' effect on the world
  chosen_reading: tormented
  alternative_readings:
  - afflicted
  - troubled
  rationale: The text states that the two prophets 'tormented' the earth-dwellers;
    this should not be softened, since the hostility of the world is explained by
    the severity of the prophets' witness and judgments. The rendering reflects the
    Greek without importing additional theological explanation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the text''s force without paraphrase'
