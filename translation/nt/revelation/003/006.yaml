theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a spirit
  rationale: Within the recurring refrain in Revelation 2–3, 'the Spirit' is best
    read as the Holy Spirit addressing the churches through the prophetic message.
    This aligns with the book's pneumatological usage and does not import a denominational
    distinctive beyond the text's likely sense.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §1, §3'
- issue: Generic singular in the exhortation
  chosen_reading: let him hear
  alternative_readings:
  - let them hear
  - let the one hear
  rationale: The Greek uses a singular masculine participle and singular imperative
    in a representative/generic construction. Per the gender-accurate policy, the
    translation preserves the singular form rather than neutralizing it to plural.
    The phrase is idiomatic and not restricted to males.
  doctrine_reference: Translation philosophy §4
