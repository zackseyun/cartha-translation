id: REV.3.6
reference: Revelation 3:6
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The one who has an ear, let him hear.'' The singular masculine
      form is a generic exhortation addressed to anyone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: literally
    ''the one having.'' ''The one who has'' preserves the singular, proverbial force
    without archaic diction. ''Whoever has'' is possible but slightly more generalized;
    ''He who has'' is traditional but less natural in modern English.'
- source_word: οὖς
  chosen: an ear
  alternatives:
  - ears
  - an ear to hear
  lexicon: BDAG
  rationale: 'Although Greek has singular ''ear,'' the idiom in this repeated Revelation
    formula is best preserved as singular in English: ''has an ear.'' ''Ears'' would
    smooth the idiom but move away from the source form. ''An ear to hear'' imports
    the infinitive ''to hear,'' which is not present here.'
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - let that one hear
  lexicon: BDAG
  rationale: Aorist active imperative, third singular. 'Let him hear' is the most
    natural English equivalent for the exhortatory imperative and preserves the singular
    address. 'Must hear' overstates obligation; 'should hear' weakens the force. The
    masculine pronoun reflects the grammatical singular formula, though the sense
    is representative/generic.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Introduces the content of what is being said. 'What' is idiomatic and
    accurate; 'that which' is overly formal.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated address formula to the churches, πνεῦμα is best
    understood as the Holy Spirit speaking through the message. Capitalization in
    English signals this referent. Lowercase 'spirit' is grammatically possible in
    isolation but context strongly favors the Holy Spirit.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: BDAG
  rationale: Present indicative conveys ongoing or characteristic speech. 'Says' is
    the most natural English rendering in this formula. 'Is saying' is possible but
    less idiomatic here; 'speaks' slightly shifts the verbal aspect and formulaic
    feel.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  - to the congregations
  lexicon: BDAG
  rationale: Dative plural after λέγει is naturally rendered 'to the churches.' 'Assemblies'
    is more etymological but less established and may underplay the ecclesial referent
    in Revelation's seven churches. 'Congregations' is possible but narrower and less
    consistent with standard NT usage.
