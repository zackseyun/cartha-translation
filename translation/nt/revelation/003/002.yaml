theological_decisions:
- issue: Rendering of the exhortation γίνου γρηγορῶν in a spiritually admonitory context
  chosen_reading: Wake up
  alternative_readings:
  - Be watchful
  - Keep awake
  rationale: The verse addresses a church with a reputation for life but actual deadness
    (context in 3:1), so the idiomatic imperative 'Wake up' best conveys the force
    of the warning without importing extra doctrine. It is interpretively stronger
    than the more literal 'be watchful,' but still warranted by the immediate context
    of spiritual sleep/death imagery.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    force in readable modern English'
- issue: Sense of πεπληρωμένα with τὰ ἔργα
  chosen_reading: completed
  alternative_readings:
  - fulfilled
  - perfected
  rationale: The text states that the works are deficient before God, but does not
    specify whether the deficiency is moral perfection, sincerity, or perseverance.
    'Completed' preserves the incompleteness motif without resolving the theological
    nature of the deficiency beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it
