id: REV.3.2
reference: Revelation 3:2
source:
  edition: SBLGNT
  text: γίνου γρηγορῶν, καὶ στήρισον τὰ λοιπὰ ἃ ⸂ἔμελλον ἀποθανεῖν⸃, οὐ γὰρ εὕρηκά
    σου ⸀τὰ ἔργα πεπληρωμένα ἐνώπιον τοῦ θεοῦ μου·
translation:
  text: Wake up, and strengthen what remains, which was about to die, for I have not
    found your works completed in the sight of my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be watchful.' The Greek expression is literally 'be/become watching,'
      an idiom for wakefulness or alertness.
    reason: lexical_alternative
  - marker: b
    text: Or 'which were about to die' or 'which was on the verge of dying.' The Greek
      can be rendered with either a collective singular or a plural in English.
    reason: lexical_alternative
  - marker: c
    text: Or 'your deeds ... fulfilled' or 'brought to fullness before my God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνου γρηγορῶν
  chosen: Wake up
  alternatives:
  - Be watchful
  - Become alert
  - Keep awake
  lexicon: BDAG
  rationale: The periphrastic imperative combines γίνου ('be/become') with the participle
    γρηγορῶν ('being awake/watchful'). In this context of spiritual lethargy and impending
    judgment, concise English 'Wake up' best captures the urgent force in natural
    modern English, while 'be watchful' is more traditional and slightly more formal.
- source_word: στήρισον
  chosen: strengthen
  alternatives:
  - establish
  - confirm
  lexicon: BDAG
  rationale: στήρισον carries the sense of making firm or strengthening. 'Strengthen'
    fits the pastoral-exhortational context and pairs naturally with 'what remains.'
- source_word: τὰ λοιπὰ
  chosen: what remains
  alternatives:
  - the rest
  - the remaining things
  lexicon: BDAG
  rationale: The neuter plural idiomatically refers to what is left or remaining.
    'What remains' is idiomatic English and preserves the sense without unnecessary
    stiffness.
- source_word: ἃ ἔμελλον ἀποθανεῖν
  chosen: which was about to die
  alternatives:
  - which were about to die
  - which was on the verge of dying
  lexicon: BDAG
  rationale: Although the antecedent is neuter plural, English can treat the collective
    sense as singular ('what remains ... was about to die'). μέλλω + infinitive indicates
    imminence, hence 'was about to die.' The singular verb in English reflects the
    collective rendering of τὰ λοιπά as 'what remains.'
- source_word: εὕρηκά
  chosen: I have not found
  alternatives:
  - I have not discovered
  - I have not found to be
  lexicon: BDAG
  rationale: The perfect tense indicates a present assessment based on completed examination.
    'I have not found' is the most natural direct rendering.
- source_word: τὰ ἔργα
  chosen: your works
  alternatives:
  - your deeds
  lexicon: BDAG
  rationale: ἔργα commonly means works/deeds. 'Works' preserves lexical continuity
    with Revelation's repeated evaluation of churches' works, though 'deeds' is a
    viable modern alternative.
- source_word: πεπληρωμένα
  chosen: completed
  alternatives:
  - fulfilled
  - brought to fullness
  - perfected
  lexicon: BDAG
  rationale: The perfect passive participle from πληρόω here describes works not found
    in a state of completion/fullness. 'Completed' is clear modern English and avoids
    overreading theological nuance into 'fulfilled' or 'perfected.'
- source_word: ἐνώπιον τοῦ θεοῦ μου
  chosen: in the sight of my God
  alternatives:
  - before my God
  - in the presence of my God
  lexicon: BDAG
  rationale: ἐνώπιον literally means 'before/in the sight of.' 'In the sight of my
    God' is natural English and preserves the evaluative sense of divine scrutiny.
