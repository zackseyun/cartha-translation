id: REV.3.17
reference: Revelation 3:17
source:
  edition: SBLGNT
  text: ὅτι λέγεις ⸀ὅτι Πλούσιός εἰμι καὶ πεπλούτηκα καὶ ⸀οὐδὲν χρείαν ἔχω, καὶ οὐκ
    οἶδας ὅτι σὺ εἶ ὁ ταλαίπωρος ⸀καὶ ἐλεεινὸς καὶ πτωχὸς καὶ τυφλὸς καὶ γυμνός,
translation:
  text: because you say, ‘I am rich, and I have become wealthy, and I have need of
    nothing,’ and you do not know that you are the wretched one, pitiable and poor
    and blind and naked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I need nothing.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'wretched' or 'miserable' for 'the wretched one.' The Greek includes
      the article, making the description especially pointed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the rebuke in context; 'because' best fits
    the causal force at the head of the clause.
- source_word: λέγεις
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Simple present is natural in English and preserves the direct accusation
    addressed to the church.
- source_word: ὅτι
  chosen: ‘
  alternatives:
  - that
  lexicon: BDAG
  rationale: The second ὅτι introduces the content of what is said. In English, direct
    quotation is the clearest and most natural way to render it.
- source_word: Πλούσιός εἰμι
  chosen: I am rich
  alternatives:
  - I am wealthy
  lexicon: BDAG
  rationale: Retains the predicate adjective with straightforward economic connotation,
    matching the self-assessment of material sufficiency.
- source_word: πεπλούτηκα
  chosen: I have become wealthy
  alternatives:
  - I have grown rich
  - I have prospered
  lexicon: BDAG
  rationale: The perfect tense suggests a resulting state from having acquired wealth.
    'Have become wealthy' preserves both the process and present condition better
    than simply repeating 'am rich.'
- source_word: οὐδὲν χρείαν ἔχω
  chosen: I have need of nothing
  alternatives:
  - I need nothing
  - I have no need of anything
  lexicon: BDAG
  rationale: A relatively formal but still readable rendering that preserves the idiom
    χρείαν ἔχω and the emphatic οὐδέν.
- source_word: οὐκ οἶδας
  chosen: you do not know
  alternatives:
  - you do not realize
  lexicon: BDAG
  rationale: Keeps the cognitive verb explicit. 'Realize' is interpretive; 'know'
    is closer to the Greek.
- source_word: σὺ εἶ
  chosen: you are
  alternatives:
  - you yourself are
  lexicon: BDAG
  rationale: The pronoun σὺ adds emphasis, but English can carry the force adequately
    in context without overtranslation.
- source_word: ὁ ταλαίπωρος
  chosen: the wretched one
  alternatives:
  - wretched
  - miserable
  lexicon: BDAG
  rationale: The article makes the expression more pointed than a bare adjective.
    'The wretched one' preserves that marked form, though slightly idiomatic in English.
- source_word: ἐλεεινός
  chosen: pitiable
  alternatives:
  - pitiful
  - miserable
  lexicon: BDAG
  rationale: Distinguishes this term from ταλαίπωρος rather than collapsing both into
    'miserable.' 'Pitiable' conveys one deserving pity.
- source_word: πτωχός
  chosen: poor
  alternatives:
  - destitute
  lexicon: BDAG
  rationale: Plain and direct, preserving the irony against the claim of being rich.
- source_word: τυφλός
  chosen: blind
  lexicon: BDAG
  rationale: Standard gloss; likely metaphorical in context but should not be paraphrased
    beyond the source wording.
- source_word: γυμνός
  chosen: naked
  alternatives:
  - unclothed
  lexicon: BDAG
  rationale: Direct and vivid, preserving the shame imagery without softening it.
