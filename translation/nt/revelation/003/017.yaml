theological_decisions:
- issue: Whether to make the economic and spiritual contrast explicit in the main
    text
  chosen_reading: Kept the language of wealth, poverty, blindness, and nakedness literal
    in the main text without adding interpretive qualifiers such as 'spiritually.'
  alternative_readings:
  - I am spiritually rich ... you are spiritually poor
  rationale: The verse itself creates the irony and metaphorical force; adding 'spiritually'
    would import interpretation into the translation rather than preserve the text's
    rhetorical tension.
  doctrine_reference: Translation philosophy §1, §3
