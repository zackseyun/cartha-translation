id: REV.3.7
reference: Revelation 3:7
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ τῆς ἐν Φιλαδελφείᾳ ἐκκλησίας γράψον· Τάδε λέγει ὁ ἅγιος, ὁ ἀληθινός,
    ὁ ἔχων τὴν κλεῖν ⸀Δαυίδ, ὁ ἀνοίγων καὶ οὐδεὶς κλείσει, ⸂καὶ κλείων⸃ καὶ οὐδεὶς
    ⸀ἀνοίγει·
translation:
  text: 'And write to the angel of the church in Philadelphia: These things says the
    Holy One, the True One, the one who has the key of David, who opens and no one
    will shut, and who shuts and no one opens:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The key of David'' likely alludes to Isaiah 22:22, an image of royal
      authority to open and shut.'
    reason: cross_reference
  - marker: b
    text: Or 'messenger' for 'angel' (ἀγγέλῳ).
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The term can mean either a heavenly 'angel' or a human 'messenger.' In
    Revelation's messages to the seven churches, both have been argued, but 'angel'
    is the more natural and traditional rendering and best matches the repeated formula
    without forcing an interpretation beyond the lexical range.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Revelation's address formula, ἐκκλησία refers to the gathered Christian
    community. 'Church' is the clearest natural English equivalent here.
- source_word: Τάδε λέγει
  chosen: These things says
  alternatives:
  - Thus says
  - This is what ... says
  lexicon: BDAG
  rationale: This formula echoes prophetic speech introductions. 'These things says'
    preserves the demonstrative force of τάδε and the solemn cadence of the Greek
    more closely than the smoother but less literal 'This is what ... says.'
- source_word: ὁ ἅγιος
  chosen: the Holy One
  alternatives:
  - the holy one
  lexicon: BDAG
  rationale: With the article and adjectival substantive usage, this functions as
    a title. Capitalization reflects titular use in English.
- source_word: ὁ ἀληθινός
  chosen: the True One
  alternatives:
  - the truthful one
  - the genuine one
  lexicon: BDAG
  rationale: ἀληθινός in Johannine usage often carries the sense of 'true' in the
    sense of genuine, real, ultimate. 'The True One' preserves the title form and
    avoids narrowing it merely to truthfulness, though that nuance is included.
- source_word: κλεῖν Δαυίδ
  chosen: the key of David
  alternatives:
  - David's key
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly. The phrase alludes to
    Isaiah 22:22 and denotes Davidic authority; 'the key of David' is the established
    and clear English form.
- source_word: ἀνοίγων
  chosen: who opens
  alternatives:
  - the one opening
  lexicon: BDAG
  rationale: The present participle continues the chain of titles/descriptions for
    the speaker. Relative-clause English is the most natural equivalent.
- source_word: κλείσει
  chosen: will shut
  alternatives:
  - shuts
  lexicon: BDAG
  rationale: The future indicative is retained as future in English. This yields a
    slight tense shift with the surrounding presents, but it reflects the Greek form
    and the sense that no one will be able to shut what he opens.
- source_word: κλείων
  chosen: who shuts
  alternatives:
  - the one shutting
  lexicon: BDAG
  rationale: As with ἀνοίγων, the participle is best rendered by a relative clause
    in idiomatic English.
- source_word: ἀνοίγει
  chosen: opens
  alternatives:
  - will open
  lexicon: BDAG
  rationale: 'The present indicative is retained. The Greek presents a complementary
    pair: he opens and none will shut; he shuts and none opens.'
