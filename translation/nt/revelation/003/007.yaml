theological_decisions:
- issue: Christological titles ὁ ἅγιος, ὁ ἀληθινός
  chosen_reading: 'Rendered as direct divine/messianic titles of the risen Jesus:
    ''the Holy One, the True One.'''
  alternative_readings:
  - 'Rendered more generically as adjectives: ''the holy, true one'''
  rationale: The immediate speaker in the message formula is Christ, and these article-plus-adjective
    constructions function as solemn titles. This preserves the high Christology of
    the passage without importing claims beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Chalcedon (451 AD)'
- issue: Allusion in 'the key of David'
  chosen_reading: Preserved the Isaianic-Davidic royal authority allusion in the main
    text without expanding it interpretively.
  alternative_readings:
  - Paraphrastic expansion such as 'the authority over David's kingdom'
  rationale: The phrase likely echoes Isaiah 22:22, but the translation should preserve
    the biblical image rather than replace it with interpretation. The allusion can
    be noted in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
