id: REV.3.3
reference: Revelation 3:3
source:
  edition: SBLGNT
  text: μνημόνευε οὖν πῶς εἴληφας καὶ ἤκουσας καὶ τήρει, καὶ μετανόησον· ἐὰν οὖν μὴ
    γρηγορήσῃς, ⸀ἥξω ὡς κλέπτης, καὶ οὐ μὴ ⸀γνῷς ποίαν ὥραν ἥξω ἐπὶ σέ·
translation:
  text: Therefore remember how you have received and heard; keep it, and repent. So
    if you do not stay awake, I will come like a thief, and you will certainly not
    know at what hour I will come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remember what you have received and heard.' The Greek says 'how,' which
      may emphasize the manner of their reception, though some understand it as referring
      to the message itself.
    reason: alternative_reading
  - marker: b
    text: '''Stay awake'' may also be rendered ''be watchful'' or ''keep watch.'''
    reason: lexical_alternative
  - marker: c
    text: The warning 'I will come like a thief' echoes language used elsewhere for
      sudden, unexpected visitation; the verse itself does not specify whether the
      reference is to final judgment or a more immediate act of discipline.
    reason: cross_reference
lexical_decisions:
- source_word: μνημόνευε
  chosen: remember
  alternatives:
  - keep in mind
  - call to mind
  lexicon: BDAG
  rationale: Present active imperative calls for ongoing recollection; 'remember'
    is natural and sufficiently forceful in English.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding rebuke; 'therefore' preserves the
    logical connection clearly at the verse opening.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - what kind of way
  lexicon: BDAG
  rationale: The adverb most naturally points to the manner or way in which they received
    and heard, not merely the content. This preserves the Greek wording without overinterpreting.
- source_word: εἴληφας
  chosen: you have received
  alternatives:
  - you received
  - you have accepted
  lexicon: BDAG
  rationale: Perfect tense suggests a past reception with continuing relevance; 'have
    received' reflects that better than simple past.
- source_word: ἤκουσας
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist points to the prior act of hearing the message; 'heard' is the
    straightforward rendering.
- source_word: τήρει
  chosen: keep it
  alternatives:
  - obey it
  - hold fast to it
  - guard it
  lexicon: BDAG
  rationale: τηρέω can mean keep, observe, or guard. In this exhortational context,
    'keep it' preserves both obedience and retention without narrowing the sense.
    'It' is supplied in English for clarity, referring back to what was received and
    heard.
- source_word: μετανόησον
  chosen: repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: Standard NT imperative for turning from sin; 'repent' is concise and
    theologically appropriate.
- source_word: γρηγορήσῃς
  chosen: stay awake
  alternatives:
  - watch
  - be watchful
  - remain alert
  lexicon: BDAG
  rationale: The verb literally evokes wakefulness/vigilance. 'Stay awake' preserves
    the metaphor and fits the thief imagery that follows, while remaining idiomatic.
- source_word: ἥξω ὡς κλέπτης
  chosen: I will come like a thief
  alternatives:
  - I will come as a thief
  lexicon: BDAG
  rationale: Standard simile; 'like a thief' is idiomatic modern English and preserves
    the sudden, unexpected nature of the coming.
- source_word: οὐ μὴ γνῷς
  chosen: you will certainly not know
  alternatives:
  - you will never know
  - you will by no means know
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    not know' conveys the force without sounding archaic.
- source_word: ποίαν ὥραν
  chosen: at what hour
  alternatives:
  - at what time
  - which hour
  lexicon: BDAG
  rationale: More specific than a generic 'time'; 'hour' preserves the Greek expression
    and the apocalyptic tone.
- source_word: ἐπὶ σέ
  chosen: upon you
  alternatives:
  - against you
  - to you
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates movement toward/against the addressee.
    'Upon you' preserves the solemnity and leaves open both visitation and judgment
    nuance without overdefining it.
