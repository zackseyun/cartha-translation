theological_decisions:
- issue: Nature of the exhortation in πῶς εἴληφας καὶ ἤκουσας
  chosen_reading: Rendered as 'remember how you have received and heard' rather than
    specifying the content alone.
  alternative_readings:
  - remember what you received and heard
  rationale: The Greek text uses πῶς ('how'), which most directly points to manner
    or mode. Some interpreters take it functionally as recalling the message itself,
    but the translation preserves the wording of the source and its possible call
    to remember the manner of initial reception.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the warning 'I will come like a thief'
  chosen_reading: Left as a warning of unexpected coming without specifying whether
    it refers to final advent, temporal judgment, or disciplinary visitation.
  alternative_readings:
  - explicit reference to the second coming
  - explicit reference to local historical judgment
  rationale: The verse itself does not resolve the scope of the coming. To preserve
    theological tension, the translation keeps the image without importing a narrower
    doctrinal interpretation.
  doctrine_reference: Translation philosophy §3
