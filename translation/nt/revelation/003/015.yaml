id: REV.3.15
reference: Revelation 3:15
source:
  edition: SBLGNT
  text: Οἶδά σου τὰ ἔργα, ὅτι οὔτε ψυχρὸς εἶ οὔτε ζεστός. ὄφελον ψυχρὸς ἦς ἢ ζεστός.
translation:
  text: 'I know your works: you are neither cold nor hot. I wish that you were cold
    or hot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If only you were cold or hot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  chosen: I know
  alternatives:
  - I have known
  - I am aware of
  lexicon: BDAG
  rationale: οἶδα functions as a present with stative force; 'I know' is the natural
    English equivalent and preserves the direct, evaluative tone.
- source_word: τὰ ἔργα
  chosen: your works
  alternatives:
  - what you do
  - your deeds
  lexicon: BDAG
  rationale: A standard rendering of ἔργα in Revelation's evaluative formula. 'Works'
    preserves lexical continuity and moral weight better than the more paraphrastic
    'what you do.'
- source_word: ψυχρὸς
  chosen: cold
  alternatives:
  - cool
  lexicon: BDAG
  rationale: The basic temperature metaphor should be preserved literally. 'Cold'
    matches the contrast with ζεστός and avoids softening the image.
- source_word: ζεστός
  chosen: hot
  alternatives:
  - boiling
  - fervent
  lexicon: BDAG
  rationale: The literal temperature term is best retained in English. While the word
    can suggest heat/boiling, 'hot' is the most natural counterpart to 'cold' in this
    metaphorical contrast.
- source_word: ὄφελον
  chosen: I wish that
  alternatives:
  - would that
  - if only
  lexicon: BDAG
  rationale: ὄφελον expresses a wish contrary to present reality. 'I wish that' is
    clear modern English and preserves the force without archaic diction.
- source_word: ἢ
  chosen: or
  alternatives:
  - either ... or
  lexicon: BDAG
  rationale: Simple disjunction is intended here after the paired negatives; 'or'
    is sufficient and idiomatic in English.
