theological_decisions:
- issue: Meaning of the temperature metaphor ('cold' and 'hot')
  chosen_reading: Retain the literal metaphor in the main text without interpreting
    it as spiritually hostile versus spiritually zealous.
  alternative_readings:
  - '''cold'' = spiritually indifferent/unbelieving; ''hot'' = spiritually fervent'
  - '''cold'' = refreshingly beneficial; ''hot'' = therapeutically beneficial'
  rationale: The verse itself presents a metaphorical contrast but does not explicitly
    decode the symbolism. To preserve theological tension rather than resolve it,
    the translation keeps the literal terms 'cold' and 'hot' and avoids importing
    a specific interpretive scheme into the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
