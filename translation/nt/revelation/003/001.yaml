theological_decisions:
- issue: Meaning of 'the seven spirits of God'
  chosen_reading: Retain the literal phrase 'the seven spirits of God' in the main
    text without collapsing it into an interpretive paraphrase.
  alternative_readings:
  - a symbolic reference to the fullness of the Holy Spirit
  - seven angelic spirits before God
  rationale: The phrase is theologically debated, but the translation should preserve
    the wording of the Greek rather than resolve the symbolism. This follows the project's
    principle of preserving theological tension rather than importing a doctrinal
    conclusion not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'angel' in the address
  chosen_reading: Translate ἀγγέλῳ as 'angel' in the main text.
  alternative_readings:
  - messenger
  - human representative of the church
  rationale: The lexical default of ἄγγελος is 'angel,' and Revelation's apocalyptic
    setting supports that rendering. Because the referent is debated, the translation
    preserves the lexical form rather than deciding the interpretive question in the
    main text.
  doctrine_reference: Translation philosophy §1 and §3.
