id: REV.3.1
reference: Revelation 3:1
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ τῆς ἐν Σάρδεσιν ἐκκλησίας γράψον· Τάδε λέγει ὁ ἔχων τὰ ἑπτὰ
    πνεύματα τοῦ θεοῦ καὶ τοὺς ἑπτὰ ἀστέρας· Οἶδά σου τὰ ἔργα, ὅτι ὄνομα ἔχεις ὅτι
    ζῇς, καὶ νεκρὸς εἶ.
translation:
  text: 'And write to the angel of the church in Sardis: These things says the one
    who has the seven spirits of God and the seven stars: I know your works: you have
    a reputation that you are alive, but you are dead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger' for 'angel.' The Greek ἄγγελος can refer to either, though
      'angel' fits Revelation's apocalyptic setting most naturally.
    reason: alternative_reading
  - marker: b
    text: 'Or more literally, ''These things says.'' Also possible: ''This is what
      ... says'' or ''Thus says.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the seven spirits of God' is kept literal. It may refer symbolically
      to the fullness of the Holy Spirit, though some interpret it as seven heavenly
      spirits.
    reason: alternative_reading
  - marker: d
    text: More literally, 'you have a name that you live.' The expression means 'you
      have a reputation that you are alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: Rendered 'angel' because in Revelation's repeated address formula the
    term naturally evokes a heavenly or representative figure; 'messenger' is possible
    but less likely in this apocalyptic context, so it is preserved in a footnote-worthy
    alternative.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: Rendered 'church' as the established and contextually appropriate sense
    for the gathered Christian community in Sardis; 'assembly' is more literal but
    less idiomatic here.
- source_word: Τάδε λέγει
  chosen: These things says
  alternatives:
  - This is what ... says
  - Thus says
  lexicon: BDAG
  rationale: Kept a somewhat formal prophetic formula to reflect the Greek demonstrative
    plural and Revelation's oracular style. 'These things says' is slightly wooden
    in English but preserves the cadence; smoother alternatives are possible.
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - he who has
  - the one holding
  lexicon: BDAG
  rationale: Rendered with an English substantival participle that is natural and
    preserves the present participial force without archaic tone.
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  chosen: the seven spirits of God
  alternatives:
  - the sevenfold Spirit of God
  lexicon: BDAG
  rationale: Translated the phrase literally rather than interpretively. Although
    some understand this as a symbolic reference to the fullness of the Holy Spirit,
    the Greek is plural and should be preserved in the main text; the theological
    interpretation is documented separately.
- source_word: τοὺς ἑπτὰ ἀστέρας
  chosen: the seven stars
  lexicon: BDAG
  rationale: Straightforward literal rendering; the symbolic meaning is explained
    elsewhere in Revelation but need not be imported here.
- source_word: Οἶδά
  chosen: I know
  alternatives:
  - I am aware of
  lexicon: BDAG
  rationale: Standard rendering of οἶδα in this epistolary refrain; concise and idiomatic.
- source_word: τὰ ἔργα
  chosen: your works
  alternatives:
  - what you do
  - your deeds
  lexicon: BDAG
  rationale: Rendered 'works' to preserve lexical consistency with Revelation's repeated
    evaluation formula, while still being understandable in modern English.
- source_word: ὄνομα ἔχεις
  chosen: you have a reputation
  alternatives:
  - you have a name
  - you are named
  lexicon: BDAG
  rationale: Idiomatic rendering of the expression 'have a name' in the sense of possessing
    a public reputation. 'You have a name' is more literal but less clear in contemporary
    English.
- source_word: ζῇς
  chosen: you are alive
  alternatives:
  - you live
  lexicon: BDAG
  rationale: Predicative rendering fits the clause introduced by ὅτι and contrasts
    sharply with 'you are dead.'
- source_word: νεκρὸς εἶ
  chosen: you are dead
  alternatives:
  - you are lifeless
  lexicon: BDAG
  rationale: Direct and forceful rendering preserves the metaphorical spiritual verdict
    without softening it.
