theological_decisions:
- issue: Nuance of ταχύ in the promise of Christ's coming
  chosen_reading: soon
  alternative_readings:
  - quickly
  rationale: The verse can emphasize either temporal nearness or suddenness/swiftness.
    To preserve theological tension rather than over-resolve it, the main text uses
    'soon' for natural English and contextual imminence, while the alternative 'quickly'
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological
    tension rather than resolve it)'
