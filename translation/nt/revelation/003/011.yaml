id: REV.3.11
reference: Revelation 3:11
source:
  edition: SBLGNT
  text: ἔρχομαι ταχύ· κράτει ὃ ἔχεις, ἵνα μηδεὶς λάβῃ τὸν στέφανόν σου.
translation:
  text: I am coming soon; hold fast what you have, so that no one may take your crown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quickly.' The Greek adverb can emphasize either nearness in time or
      swiftness of action.
    reason: alternative_reading
  - marker: b
    text: The Greek word refers to a victor's wreath or honor-crown, not specifically
      a royal diadem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  lexicon: BDAG
  rationale: Present tense with imminent/futuristic force in context. 'I am coming'
    is natural modern English and preserves the sense of an impending arrival better
    than the more wooden 'I come.'
- source_word: ταχύ
  chosen: soon
  alternatives:
  - quickly
  lexicon: BDAG
  rationale: The adverb can denote either temporal nearness ('soon') or swiftness
    ('quickly'). In this exhortational context, 'soon' best conveys the warning/promise
    of imminent coming in idiomatic English, while the alternative is preserved in
    a footnote because the nuance is debated in Revelation.
- source_word: κράτει
  chosen: hold fast
  alternatives:
  - hold firmly
  - keep hold of
  lexicon: BDAG
  rationale: Imperative of κρατέω here calls for firm retention or perseverance. 'Hold
    fast' is concise, idiomatic, and preserves the exhortational force better than
    a flatter 'keep.'
- source_word: ὃ ἔχεις
  chosen: what you have
  alternatives:
  - what you possess
  lexicon: BDAG
  rationale: The relative pronoun plus ἔχω is naturally rendered 'what you have.'
    This leaves the object unspecified as in Greek, allowing the context to define
    it without over-interpretation.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose or intended result. 'So that' is natural modern English
    while retaining the clause's purposive force.
- source_word: μηδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard indefinite negative subject. 'No one' is the most neutral and
    readable choice.
- source_word: λάβῃ
  chosen: may take
  alternatives:
  - might take
  - seize
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα with μηδείς expresses the undesired outcome
    to be prevented. 'May take' fits the English purpose clause well. 'Seize' is possible
    but too forceful for the context.
- source_word: στέφανόν
  chosen: crown
  alternatives:
  - wreath
  - victor's crown
  lexicon: BDAG
  rationale: στέφανος denotes a wreath/crown awarded in honor or victory, distinct
    from a royal diadem. 'Crown' is the standard accessible rendering, while the more
    specific athletic/honorific nuance is preserved in a footnote.
