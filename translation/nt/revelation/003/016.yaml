theological_decisions:
- issue: Strength of the judgment image in ἐμέσαι
  chosen_reading: Retain the graphic image 'vomit' rather than soften it.
  alternative_readings:
  - spew
  - spit
  rationale: The verse uses intentionally shocking imagery for divine rejection. Softening
    the term would mute the rhetorical and theological force of the warning. This
    follows the translation philosophy of original-language primacy and avoiding paraphrastic
    dilution.
  doctrine_reference: Translation philosophy §1, §6
- issue: Temporal force of μέλλω
  chosen_reading: 'Render as imminent: ''I am about to.'''
  alternative_readings:
  - I will
  - I am going to
  rationale: The Greek presents impending judgment rather than a timeless general
    statement. Preserving that tension avoids flattening the warning's urgency.
  doctrine_reference: Translation philosophy §1, §5
