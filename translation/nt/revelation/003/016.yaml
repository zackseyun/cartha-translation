id: REV.3.16
reference: Revelation 3:16
source:
  edition: SBLGNT
  text: οὕτως, ὅτι χλιαρὸς εἶ καὶ ⸀οὔτε ζεστὸς οὔτε ψυχρός, μέλλω σε ἐμέσαι ἐκ τοῦ
    στόματός μου.
translation:
  text: So, because you are lukewarm, and neither hot nor cold, I am about to vomit
    you out of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spew you out of my mouth.' The Greek verb is more literally 'vomit,'
      a stronger image than 'spit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - Accordingly
  lexicon: BDAG
  rationale: Introduces the consequence drawn from the prior statement. 'So' is natural
    modern English and preserves the inferential force without sounding stiff.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  - since
  lexicon: BDAG
  rationale: Here it gives the reason for the announced judgment. 'Because' makes
    the causal sense explicit in English.
- source_word: χλιαρός
  chosen: lukewarm
  alternatives:
  - tepid
  lexicon: BDAG
  rationale: Standard and precise rendering for temperature imagery. 'Tepid' is possible
    but less natural for contemporary readers.
- source_word: οὔτε ζεστὸς οὔτε ψυχρός
  chosen: neither hot nor cold
  alternatives:
  - neither boiling nor cold
  - neither warm nor cold
  lexicon: BDAG
  rationale: Preserves the paired contrast in straightforward English. 'Hot' and 'cold'
    best match the metaphor without overinterpreting the degree of heat.
- source_word: μέλλω
  chosen: I am about to
  alternatives:
  - I am going to
  - I intend to
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly indicates imminence. 'I am about to' preserves
    the sense of impending action more clearly than the flatter 'I am going to.'
- source_word: ἐμέσαι
  chosen: vomit
  alternatives:
  - spit
  - spew
  lexicon: BDAG
  rationale: The verb means to vomit or throw up. 'Vomit' is the most direct lexical
    equivalent and avoids softening the force of the image. Traditional 'spew' is
    possible but less transparent in modern usage; 'spit' understates the severity.
- source_word: ἐκ τοῦ στόματός μου
  chosen: out of my mouth
  alternatives:
  - from my mouth
  lexicon: BDAG
  rationale: A natural rendering of the prepositional phrase that preserves the vivid
    bodily imagery of expulsion.
