theological_decisions:
- issue: Meaning of ἡ ἀρχὴ τῆς κτίσεως τοῦ θεοῦ in a christological title
  chosen_reading: the beginning of the creation of God
  alternative_readings:
  - the source/origin of God's creation
  - the ruler over God's creation
  rationale: Because ἀρχή is semantically broad and this phrase has been theologically
    contested, the main text preserves the most direct lexical rendering, 'beginning,'
    rather than resolving the ambiguity toward 'source' or 'ruler.' This follows the
    doctrine guideline to preserve theological tension rather than settle a contested
    interpretive question in translation. Since historic orthodoxy affirmed in DOCTRINE.md
    includes Nicene and Chalcedonian Christology, the translation must not imply a
    denial of Christ's full deity; therefore the viable alternatives are preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed, Chalcedon)
