id: REV.3.14
reference: Revelation 3:14
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ τῆς ἐν Λαοδικείᾳ ἐκκλησίας γράψον· Τάδε λέγει ὁ Ἀμήν, ὁ μάρτυς
    ὁ πιστὸς ⸀καὶ ἀληθινός, ἡ ἀρχὴ τῆς κτίσεως τοῦ θεοῦ·
translation:
  text: 'And write to the angel of the church in Laodicea: These things says the Amen,
    the faithful and true witness, the beginning of the creation of God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the source/origin of God's creation' or 'the ruler over God's creation.'
      The Greek word archē can mean 'beginning,' 'origin,' or 'ruler.'
    reason: alternative_reading
  - marker: b
    text: Or 'messenger' of the church in Laodicea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The term can mean either a heavenly angel or a human messenger. In Revelation's
    repeated address formula to the seven churches, 'angel' is the established and
    most natural rendering, while the alternative remains interpretively possible.
- source_word: Τάδε
  chosen: These things
  alternatives:
  - This is what
  - Thus
  lexicon: BDAG
  rationale: A formal but still readable rendering that preserves the prophetic announcement
    formula. 'This is what' is smoother English but slightly less transparent to the
    Greek idiom.
- source_word: ὁ Ἀμήν
  chosen: the Amen
  alternatives:
  - the Truly One
  lexicon: BDAG
  rationale: The title is left as 'Amen' because it functions as a distinctive christological
    title and echoes its Hebrew liturgical force of certainty and truth. Translating
    it more dynamically would lose the intertextual resonance.
- source_word: μάρτυς
  chosen: witness
  alternatives:
  - testifier
  lexicon: BDAG
  rationale: '''Witness'' is the standard and natural rendering here, preserving both
    legal-testimonial and revelatory senses.'
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: '''Faithful'' best preserves the covenantal and personal reliability
    implied in the adjective, especially in a christological title.'
- source_word: ἀληθινός
  chosen: 'true'
  alternatives:
  - genuine
  - real
  lexicon: BDAG
  rationale: '''True'' is the most idiomatic pairing with ''faithful'' and preserves
    the Johannine sense of what is genuine and fully corresponding to reality.'
- source_word: ἀρχὴ
  chosen: beginning
  alternatives:
  - origin
  - ruler
  - source
  lexicon: BDAG
  rationale: The noun can denote beginning, first cause, origin, or ruler. 'Beginning'
    is the most direct lexical rendering and preserves the text's theological tension
    without importing an interpretive expansion into the main text.
- source_word: κτίσεως
  chosen: creation
  alternatives:
  - created order
  lexicon: BDAG
  rationale: '''Creation'' is the straightforward rendering for κτίσις here and works
    naturally in the genitival construction.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  lexicon: BDAG
  rationale: The genitive is best rendered simply and directly as 'of God.'
