theological_decisions:
- issue: Representative masculine expression in the exhortation
  chosen_reading: let him hear
  alternative_readings:
  - let them hear
  - let the one hear
  rationale: The Greek is grammatically masculine singular and functions representatively.
    Per the translation philosophy's gender-accurate principle, the masculine singular
    is preserved rather than neutralized to plural. A more neutral alternative is
    possible in English, but the source form is better matched by 'let him hear.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Referent of 'the Spirit'
  chosen_reading: the Spirit
  alternative_readings:
  - the spirit
  rationale: Within Revelation's refrain to the churches, the referent is the Holy
    Spirit speaking to the churches. Capitalization reflects this theological identification
    while remaining faithful to contextual usage.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, point 1
