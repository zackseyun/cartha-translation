id: REV.3.22
reference: Revelation 3:22
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever has an ear, let him hear.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the spirit'; here the referent is understood to be the Holy Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: The article with present participle functions substantivally. 'The one
    who has' preserves the singular, representative force of the Greek while using
    natural modern English. 'He who has' is more traditional but less natural; 'whoever
    has' is possible but slightly more generalized than the Greek construction.
- source_word: οὖς
  chosen: an ear
  alternatives:
  - ears
  lexicon: BDAG
  rationale: Although the Greek noun is singular ('ear'), the idiom in this repeated
    exhortation is best preserved literally as 'has an ear.' English commonly uses
    the singular in this idiomatic sense. Rendering 'ears' would smooth the expression
    but move away from the Greek form.
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - let that one hear
  lexicon: BDAG
  rationale: Aorist active imperative, third person singular. 'Let him hear' is the
    standard and most accurate English equivalent for this exhortative imperative.
    It preserves the force without overinterpreting it as obligation ('must') or mere
    advice ('should').
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Introduces the content of what is to be heard. 'What' is idiomatic and
    accurate in modern English; 'that which' is overly formal.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated formula to the churches, πνεῦμα refers to the
    Holy Spirit, not a generic spirit. Capitalization in English appropriately signals
    this referent without adding content beyond the context.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: BDAG
  rationale: Present indicative denotes the Spirit's speech. 'Says' is the most natural
    English rendering in this formulaic context. 'Is saying' is possible but unnecessarily
    marked; 'speaks' is less direct than the Greek.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  lexicon: BDAG
  rationale: The dative marks the recipients of the Spirit's message. 'Churches' is
    the established and contextually appropriate rendering in Revelation 2–3 for the
    congregations addressed. 'Assemblies' is lexically possible but less fitting in
    this canonical context.
