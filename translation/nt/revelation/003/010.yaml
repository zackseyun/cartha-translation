theological_decisions:
- issue: Meaning of τηρήσω ἐκ in an eschatological context
  chosen_reading: will keep you from
  alternative_readings:
  - will preserve you through
  - will keep you out of
  rationale: The translation follows the most straightforward lexical rendering of
    τηρέω + ἐκ without deciding whether the promise implies removal before testing,
    protection through testing, or exemption from its force. This preserves theological
    tension rather than resolving a debated eschatological question beyond what the
    Greek itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Genitive sense in 'the word of endurance'
  chosen_reading: my word of endurance
  alternative_readings:
  - the word about my endurance
  - my word calling for endurance
  rationale: The Greek genitive permits multiple closely related readings. The main
    text keeps the ambiguity rather than selecting one theological nuance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
