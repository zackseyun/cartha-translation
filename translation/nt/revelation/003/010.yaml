id: REV.3.10
reference: Revelation 3:10
source:
  edition: SBLGNT
  text: ὅτι ἐτήρησας τὸν λόγον τῆς ὑπομονῆς μου, κἀγώ σε τηρήσω ἐκ τῆς ὥρας τοῦ πειρασμοῦ
    τῆς μελλούσης ἔρχεσθαι ἐπὶ τῆς οἰκουμένης ὅλης, πειράσαι τοὺς κατοικοῦντας ἐπὶ
    τῆς γῆς.
translation:
  text: Because you have kept my word of endurance, I also will keep you from the
    hour of testing that is about to come upon the whole inhabited world, to test
    those who dwell on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word about my endurance' or 'my message calling for endurance.'
      The Greek phrase can be understood in more than one closely related way.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will preserve you through the hour of testing' or 'I will keep you
      out of the hour of testing.' The Greek says 'keep ... from' and does not by
      itself settle later theological debates about how this protection occurs.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτήρησας
  chosen: have kept
  alternatives:
  - have observed
  - have guarded
  lexicon: BDAG
  rationale: Aorist indicative in context is naturally rendered with English present
    perfect after 'because' to express a completed act with present relevance. 'Kept'
    matches the semantic range of τηρέω and preserves the verbal link with future
    τηρήσω later in the verse.
- source_word: τὸν λόγον τῆς ὑπομονῆς μου
  chosen: my word of endurance
  alternatives:
  - the word about my endurance
  - my message calling for endurance
  - the word of my perseverance
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitival ambiguity rather than
    resolving it. The phrase may mean the word characterized by endurance, the word
    about Jesus' endurance, or the word that calls believers to endure. 'My word of
    endurance' keeps that tension in the main text.
- source_word: κἀγώ
  chosen: I also
  alternatives:
  - and I
  - I in turn
  lexicon: BDAG
  rationale: 'Captures the emphatic reciprocal force: because they kept, he also will
    keep.'
- source_word: τηρήσω ἐκ
  chosen: will keep you from
  alternatives:
  - will keep you out of
  - will preserve you through
  lexicon: BDAG
  rationale: The most direct rendering of τηρέω with ἐκ is 'keep from.' This preserves
    the Greek wording without importing a specific eschatological scheme. Because
    the phrase is theologically contested, alternatives are preserved in a footnote
    and documented separately.
- source_word: ὥρας
  chosen: hour
  alternatives:
  - time
  - period
  lexicon: BDAG
  rationale: Although idiomatic for a period of time, 'hour' is retained because it
    is the Greek term used and is common apocalyptic diction.
- source_word: πειρασμοῦ
  chosen: testing
  alternatives:
  - trial
  - temptation
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation. Here the global scope
    and the infinitive πειράσαι favor 'testing' as the broadest and least misleading
    option.
- source_word: τῆς μελλούσης ἔρχεσθαι
  chosen: that is about to come
  alternatives:
  - that is going to come
  - that is destined to come
  lexicon: BDAG
  rationale: μέλλω + infinitive commonly indicates imminence or futurity. 'Is about
    to come' is a natural English rendering that preserves the prospective force.
- source_word: ἐπὶ τῆς οἰκουμένης ὅλης
  chosen: upon the whole inhabited world
  alternatives:
  - upon the whole world
  - over the whole inhabited earth
  lexicon: BDAG
  rationale: οἰκουμένη often refers to the inhabited world, not necessarily the cosmos
    as such. 'Whole inhabited world' preserves that nuance while remaining readable.
- source_word: πειράσαι
  chosen: to test
  alternatives:
  - to try
  - to tempt
  lexicon: BDAG
  rationale: The infinitive expresses purpose/result of the coming hour. 'To test'
    aligns with the earlier πειρασμός and avoids the narrower moral sense of 'tempt'.
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those living on the land
  lexicon: BDAG
  rationale: This phrase is a recurring Revelation expression with theological resonance.
    'Those who dwell on the earth' preserves the verbal form and intertextual consistency
    better than the more compressed 'inhabitants of the earth.'
