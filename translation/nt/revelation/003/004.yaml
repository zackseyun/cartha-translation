theological_decisions:
- issue: Whether to render ὀνόματα idiomatically as 'people' or more literally as
    'names'
  chosen_reading: Retain 'a few names' in the main text
  alternative_readings:
  - a few people
  - a few persons
  rationale: The literal wording is striking and likely intentional, emphasizing identifiable
    individuals within a compromised church. Optimal equivalence favors preserving
    this imagery while keeping the sentence understandable through 'who have not soiled...'
  doctrine_reference: Translation philosophy §1, §5
- issue: How to express the moral/ritual imagery of μολύνω with clothing
  chosen_reading: '''have not soiled their garments'''
  alternative_readings:
  - have not defiled their garments
  rationale: The verse uses clothing imagery that symbolizes purity and faithfulness.
    'Soiled' preserves the metaphor in readable English; 'defiled' is a viable alternative
    with stronger ritual connotations and is preserved in a footnote.
  doctrine_reference: Translation philosophy §6
- issue: Whether ἄξιοί εἰσιν implies salvation by merit
  chosen_reading: Translate straightforwardly as 'they are worthy' without doctrinal
    expansion
  alternative_readings:
  - they are deserving
  - they are fit
  rationale: The text itself states worthiness in relation to faithful purity and
    promised fellowship. The translation should preserve the statement without importing
    a broader soteriological system or softening the term.
  doctrine_reference: Affirmations; Translation philosophy §3
