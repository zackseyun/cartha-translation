id: REV.3.4
reference: Revelation 3:4
source:
  edition: SBLGNT
  text: ἀλλὰ ⸂ἔχεις ὀλίγα⸃ ὀνόματα ἐν Σάρδεσιν ἃ οὐκ ἐμόλυναν τὰ ἱμάτια αὐτῶν, καὶ
    περιπατήσουσιν μετ’ ἐμοῦ ἐν λευκοῖς, ὅτι ἄξιοί εἰσιν.
translation:
  text: But you have a few names in Sardis who have not soiled their garments, and
    they will walk with me in white, because they are worthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a few people.' Greek literally says 'a few names.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have not defiled their garments.'
    reason: lexical_alternative
  - marker: c
    text: 'That is, likely ''in white garments''; the Greek is concise: ''in white.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding rebuke of Sardis; 'But' is
    the most natural concise English adversative here.
- source_word: ἔχεις
  chosen: you have
  alternatives:
  - you possess
  lexicon: BDAG
  rationale: Second-person singular addresses the church in Sardis directly. 'You
    have' is idiomatic and preserves the direct address.
- source_word: ὀλίγα ὀνόματα
  chosen: a few names
  alternatives:
  - a few people
  - a few persons
  lexicon: BDAG
  rationale: The Greek says literally 'a few names.' In context this is a metonymy
    for persons, but retaining 'names' preserves the wording and the possible nuance
    of recognized individual identity before Christ. The personal sense is clarified
    by the following relative clause 'who have not soiled...'.
- source_word: ἐν Σάρδεσιν
  chosen: in Sardis
  lexicon: BDAG
  rationale: Standard locative rendering of the city name.
- source_word: ἃ
  chosen: who
  alternatives:
  - which
  lexicon: BDAG
  rationale: Although the antecedent 'names' is grammatically neuter plural, the referent
    is persons, so English personal relative 'who' best reflects the sense.
- source_word: οὐκ ἐμόλυναν
  chosen: have not soiled
  alternatives:
  - have not defiled
  - did not stain
  lexicon: BDAG
  rationale: μολύνω can mean defile, stain, or soil. 'Soiled' works well with the
    clothing imagery and remains accessible modern English. The perfect-like English
    'have not soiled' fits the present relevance of their past faithfulness.
- source_word: τὰ ἱμάτια αὐτῶν
  chosen: their garments
  alternatives:
  - their clothes
  - their robes
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments/clothing. 'Garments' preserves the
    elevated symbolic register of Revelation better than 'clothes,' while avoiding
    the over-specific 'robes.'
- source_word: περιπατήσουσιν
  chosen: they will walk
  alternatives:
  - they will live
  - they will go about
  lexicon: BDAG
  rationale: Literally 'they will walk.' In Revelation this carries both literal imagery
    and metaphorical fellowship/vindication; the literal wording should be preserved.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: Simple accompaniment; no reason to expand.
- source_word: ἐν λευκοῖς
  chosen: in white
  alternatives:
  - in white garments
  - dressed in white
  lexicon: BDAG
  rationale: The Greek adjective stands substantivally/elliptically, likely implying
    white garments, but the text itself is concise. 'In white' preserves the compactness
    and symbolic force while allowing the clothing sense to be inferred from the prior
    mention of garments.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the promised honor. 'Because' is clearer in
    contemporary English than 'for.'
- source_word: ἄξιοί εἰσιν
  chosen: they are worthy
  alternatives:
  - they are deserving
  - they are fit
  lexicon: BDAG
  rationale: ἄξιος denotes worthiness or fitness. 'Worthy' is the standard and theologically
    appropriate rendering here, without implying merit apart from the immediate context
    of faithful perseverance.
