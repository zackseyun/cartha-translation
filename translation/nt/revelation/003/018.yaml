id: REV.3.18
reference: Revelation 3:18
source:
  edition: SBLGNT
  text: συμβουλεύω σοι ἀγοράσαι ⸂παρ’ ἐμοῦ χρυσίον⸃ πεπυρωμένον ἐκ πυρὸς ἵνα πλουτήσῃς,
    καὶ ἱμάτια λευκὰ ἵνα περιβάλῃ καὶ μὴ φανερωθῇ ἡ αἰσχύνη τῆς γυμνότητός σου, καὶ
    κολλούριον ⸀ἐγχρῖσαι τοὺς ὀφθαλμούς σου ἵνα βλέπῃς.
translation:
  text: I counsel you to buy from me gold refined by fire so that you may become rich,
    and white garments so that you may clothe yourself and the shame of your nakedness
    may not be exposed, and eye salve to anoint your eyes so that you may see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purified by fire' or 'tested in fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'white clothes' or, more specifically in some contexts, 'white robes.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'eye salve' refers to a medicinal preparation applied
      to the eyes.
    reason: cultural_note
lexical_decisions:
- source_word: συμβουλεύω
  chosen: I counsel
  alternatives:
  - I advise
  - I recommend
  lexicon: BDAG
  rationale: Present indicative first person singular; 'counsel' preserves the weight
    of authoritative advice better than the flatter 'advise' while remaining natural
    English.
- source_word: ἀγοράσαι
  chosen: to buy
  alternatives:
  - to purchase
  lexicon: BDAG
  rationale: Aorist infinitive after συμβουλεύω; 'buy' is the plain and idiomatic
    rendering. The metaphor of obtaining spiritual goods is preserved without paraphrase.
- source_word: παρ’ ἐμοῦ
  chosen: from me
  alternatives:
  - from my hand
  lexicon: BDAG
  rationale: παρά with genitive here indicates source. 'From me' is direct and sufficient.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - gold bullion
  lexicon: BDAG
  rationale: Standard rendering for the diminutive form functioning as a material
    noun; no need to over-specify in English.
- source_word: πεπυρωμένον ἐκ πυρός
  chosen: refined by fire
  alternatives:
  - purified by fire
  - tested in fire
  lexicon: BDAG
  rationale: The perfect passive participle with ἐκ πυρός conveys gold that has been
    refined through fire. 'Refined by fire' is idiomatic and preserves the metallurgical
    image.
- source_word: ἵνα πλουτήσῃς
  chosen: so that you may become rich
  alternatives:
  - so that you may be rich
  lexicon: BDAG
  rationale: The aorist subjunctive here points to entering the state of wealth; 'become
    rich' better reflects the ingressive sense than simply 'be rich'.
- source_word: ἱμάτια λευκά
  chosen: white garments
  alternatives:
  - white clothes
  - white robes
  lexicon: BDAG
  rationale: ἱμάτια is a broad term for garments/clothing. 'Garments' is slightly
    more formal and fits Revelation's imagery without prematurely narrowing to 'robes'.
- source_word: ἵνα περιβάλῃ
  chosen: so that you may clothe yourself
  alternatives:
  - so that you may put them on
  - so that you may be clothed
  lexicon: BDAG
  rationale: Middle voice is best represented reflexively. 'Clothe yourself' preserves
    the personal appropriation implied by the middle.
- source_word: μὴ φανερωθῇ
  chosen: may not be exposed
  alternatives:
  - may not be revealed
  - may not become visible
  lexicon: BDAG
  rationale: Passive subjunctive; 'exposed' fits the shame/nakedness context more
    naturally than the more neutral 'revealed'.
- source_word: ἡ αἰσχύνη τῆς γυμνότητός σου
  chosen: the shame of your nakedness
  alternatives:
  - the disgrace of your nakedness
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'Shame' is the most natural
    equivalent for αἰσχύνη in this moral-symbolic context.
- source_word: κολλούριον
  chosen: eye salve
  alternatives:
  - ointment for the eyes
  - collyrium
  lexicon: BDAG
  rationale: A medicinal term for salve applied to the eyes. 'Eye salve' is clear
    modern English; 'collyrium' would be too technical.
- source_word: ἐγχρῖσαι
  chosen: to anoint
  alternatives:
  - to apply
  - to smear on
  lexicon: BDAG
  rationale: The aorist infinitive denotes application by rubbing/anointing. 'Anoint'
    preserves the lexical sense and the possible symbolic resonance without overinterpreting
    it sacramentally.
- source_word: βλέπῃς
  chosen: so that you may see
  alternatives:
  - so that you may regain sight
  lexicon: BDAG
  rationale: Present subjunctive expressing intended result. 'See' is the direct rendering;
    'regain sight' would add a nuance not explicit in the Greek.
