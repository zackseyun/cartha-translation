theological_decisions:
- issue: Symbolic force of the commodities (gold, white garments, eye salve)
  chosen_reading: Retain the imagery literally in translation without explicating
    the spiritual referents in the main text.
  alternative_readings:
  - Interpret gold as true spiritual wealth, garments as righteousness/purity, and
    eye salve as spiritual perception within the translation itself
  rationale: The verse uses vivid metaphor addressed to Laodicea, but the Greek text
    itself does not explicitly unpack each symbol here. In keeping with optimal equivalence
    and the instruction not to import doctrinal claims the text does not make, the
    translation preserves the imagery and lets interpretation arise from context.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
- issue: Possible sacramental or christological overtones of ἐγχρῖσαι ('anoint')
  chosen_reading: Use 'anoint' lexically, without suggesting a formal sacramental
    act.
  alternative_readings:
  - Use 'apply' to avoid symbolic resonance
  - Use 'smear on' to stress the medical action
  rationale: The verb naturally means to apply by anointing/rubbing. Because the context
    is metaphorical and exhortational, retaining 'anoint' is faithful to the Greek
    while avoiding doctrinal elaboration beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
