theological_decisions:
- issue: Metaphorical meal fellowship imagery
  chosen_reading: Rendered the imagery straightforwardly as personal table fellowship
    ('dine with him, and he with me') without specifying sacramental, ecclesial, or
    merely evangelistic meaning.
  alternative_readings:
  - A Eucharistic allusion
  - A metaphor for conversion/initiation
  - A metaphor for restored fellowship with a believer or church
  rationale: The verse clearly presents intimate reciprocal fellowship, but the text
    itself does not explicitly identify the meal with the Lord's Supper or limit it
    to initial conversion. To preserve theological tension, the translation keeps
    the image without narrowing its referent.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
