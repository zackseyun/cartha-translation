id: REV.3.20
reference: Revelation 3:20
source:
  edition: SBLGNT
  text: ἰδοὺ ἕστηκα ἐπὶ τὴν θύραν καὶ κρούω· ἐάν τις ἀκούσῃ τῆς φωνῆς μου καὶ ἀνοίξῃ
    τὴν θύραν, ⸀καὶ εἰσελεύσομαι πρὸς αὐτὸν καὶ δειπνήσω μετ’ αὐτοῦ καὶ αὐτὸς μετ’
    ἐμοῦ.
translation:
  text: Look, I stand at the door and knock. If anyone hears my voice and opens the
    door, then I will come in to him and dine with him, and he with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Behold, I have stood at the door and am knocking.' The Greek uses a
      perfect verb ('have stood') with present force and a present verb ('am knocking'),
      emphasizing an ongoing posture and action.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will enter to him.' The wording 'come in to him' preserves the personal,
      relational force of the Greek, not merely entry into a place.
    reason: lexical_alternative
  - marker: c
    text: The meal imagery expresses intimate mutual fellowship. Interpreters differ
      on whether it alludes specifically to the Lord's Supper, to conversion, or to
      restored communion; the text itself does not explicitly decide the question.
    reason: cross_reference
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: An attention-getting particle. 'Look' preserves the immediacy in natural
    modern English better than the more archaic 'Behold.'
- source_word: ἕστηκα
  chosen: I stand
  alternatives:
  - I have stood
  - I am standing
  lexicon: BDAG
  rationale: 'Perfect form of ἵστημι with present stative force: the sense is a current
    standing position rather than a simple past action. ''I stand'' is idiomatic and
    captures the ongoing state.'
- source_word: ἐπὶ τὴν θύραν
  chosen: at the door
  alternatives:
  - upon the door
  - by the door
  lexicon: BDAG
  rationale: With θύρα in this context, English idiom favors 'at the door.' It conveys
    position relative to the entrance without wooden literalism.
- source_word: κρούω
  chosen: knock
  alternatives:
  - am knocking
  lexicon: BDAG
  rationale: Present tense coordinated with 'I stand' expresses ongoing action. English
    simple present in this vivid declaration is natural and sufficiently conveys the
    scene.
- source_word: ἐάν τις
  chosen: If anyone
  alternatives:
  - If someone
  - Whoever
  lexicon: BDAG
  rationale: τις is indefinite and inclusive. 'Anyone' best reflects the open conditional
    invitation without importing gender restriction.
- source_word: ἀκούσῃ τῆς φωνῆς μου
  chosen: hears my voice
  alternatives:
  - listens to my voice
  - hears the sound of my voice
  lexicon: BDAG
  rationale: φωνή here is 'voice,' not merely 'sound.' The genitive after ἀκούω is
    naturally rendered directly in English as 'hears my voice.'
- source_word: ἀνοίξῃ τὴν θύραν
  chosen: opens the door
  alternatives:
  - opens the doorway
  lexicon: BDAG
  rationale: Straightforward rendering of the aorist subjunctive in the conditional
    clause.
- source_word: καὶ εἰσελεύσομαι πρὸς αὐτόν
  chosen: then I will come in to him
  alternatives:
  - and I will enter to him
  - and I will come in to that person
  lexicon: BDAG
  rationale: εἰσελεύσομαι means 'I will come in/enter.' πρὸς αὐτόν is more personal
    than merely 'into the house'; 'to him' preserves the relational direction of the
    action. 'Then' makes the apodosis clear in English.
- source_word: δειπνήσω
  chosen: dine
  alternatives:
  - eat supper
  - share a meal
  lexicon: BDAG
  rationale: δειπνέω refers to taking the main meal, often the evening meal. 'Dine'
    preserves the meal fellowship sense with dignity and readability; 'eat supper'
    is more culturally narrow.
- source_word: μετ’ αὐτοῦ καὶ αὐτὸς μετ’ ἐμοῦ
  chosen: with him, and he with me
  alternatives:
  - with him, and he with me also
  - with him, and he will dine with me
  lexicon: BDAG
  rationale: The Greek second clause is elliptical but emphatic in reciprocity. Preserving
    the ellipsis in English keeps the mutual fellowship emphasis without overfilling
    the text.
