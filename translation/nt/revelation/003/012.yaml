id: REV.3.12
reference: Revelation 3:12
source:
  edition: SBLGNT
  text: ὁ νικῶν ποιήσω αὐτὸν στῦλον ἐν τῷ ναῷ τοῦ θεοῦ μου, καὶ ἔξω οὐ μὴ ἐξέλθῃ ἔτι,
    καὶ γράψω ἐπ’ αὐτὸν τὸ ὄνομα τοῦ θεοῦ μου καὶ τὸ ὄνομα τῆς πόλεως τοῦ θεοῦ μου,
    τῆς καινῆς Ἰερουσαλήμ, ἡ ⸀καταβαίνουσα ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ μου, καὶ τὸ
    ὄνομά μου τὸ καινόν.
translation:
  text: The one who conquers—I will make him a pillar in the temple of my God, and
    he will never go out from it anymore. And I will write on him the name of my God,
    and the name of the city of my God, the new Jerusalem, which comes down out of
    heaven from my God, and my own new name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.' The Greek verb νικάω is a recurring term in
      Revelation for faithful victory.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he will certainly never go out anymore,' an emphatic negation
      in Greek.
    reason: lexical_alternative
  - marker: c
    text: Or 'my new name.' The Greek wording is emphatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  chosen: The one who conquers
  alternatives:
  - The one who overcomes
  - The victor
  lexicon: BDAG
  rationale: Present participle used substantivally; 'the one who conquers' preserves
    the ongoing/representative force and matches Revelation's recurring νικάω motif
    better than the more idiomatic but less transparent 'victor.'
- source_word: ποιήσω
  chosen: I will make
  alternatives:
  - I will make into
  lexicon: BDAG
  rationale: Simple future of ποιέω with predicate accusative στῦλον; 'I will make'
    is natural English and adequately conveys transformation/appointment.
- source_word: στῦλον
  chosen: a pillar
  lexicon: BDAG
  rationale: Literal architectural image should be retained; the metaphor of permanence
    and honor is important and should not be paraphrased.
- source_word: ἐν τῷ ναῷ
  chosen: in the temple
  alternatives:
  - in the sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/sanctuary rather than the broader
    temple precincts. 'Temple' is clearer in English; 'sanctuary' is possible but
    less natural here. The possessive phrase 'of my God' clarifies whose temple is
    meant.
- source_word: ἔξω οὐ μὴ ἐξέλθῃ ἔτι
  chosen: he will never go out from it anymore
  alternatives:
  - he shall certainly never go out anymore
  - never again will he go out
  lexicon: BDAG
  rationale: οὐ μὴ with aorist subjunctive is an emphatic negation. 'He will never
    go out ... anymore' captures the force and the finality. 'From it' is supplied
    in English to make explicit the implied reference to the temple/pillar setting.
- source_word: γράψω ἐπ’ αὐτὸν
  chosen: I will write on him
  alternatives:
  - I will inscribe on him
  lexicon: BDAG
  rationale: γράφω with ἐπί here denotes marking/inscribing upon. 'Write on him' is
    straightforward and readable; 'inscribe' is possible but slightly more interpretive.
- source_word: τὸ ὄνομα τοῦ θεοῦ μου
  chosen: the name of my God
  lexicon: BDAG
  rationale: Retained literally; 'name' in biblical usage carries identity/ownership/association,
    and that theological weight should remain implicit rather than paraphrased.
- source_word: τὸ ὄνομα τῆς πόλεως τοῦ θεοῦ μου
  chosen: the name of the city of my God
  lexicon: BDAG
  rationale: Literal rendering preserves the parallel structure with the preceding
    and following 'name' phrases.
- source_word: τῆς καινῆς Ἰερουσαλήμ
  chosen: the new Jerusalem
  alternatives:
  - New Jerusalem
  lexicon: BDAG
  rationale: Article plus adjective+noun is naturally rendered 'the new Jerusalem.'
    Lowercase 'new' reflects adjectival force rather than treating it as a fixed English
    proper name.
- source_word: ἡ καταβαίνουσα
  chosen: which comes down
  alternatives:
  - coming down
  - descending
  lexicon: BDAG
  rationale: Attributive participle modifying 'the new Jerusalem.' 'Which comes down'
    is idiomatic and preserves the present participle's descriptive force without
    awkwardness.
- source_word: ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ μου
  chosen: out of heaven from my God
  alternatives:
  - from heaven, from my God
  lexicon: BDAG
  rationale: 'Both prepositions are preserved: ἐκ marks origin out of heaven, and
    ἀπό marks source from God. ''Out of heaven from my God'' keeps both without overexplaining.'
- source_word: τὸ ὄνομά μου τὸ καινόν
  chosen: my own new name
  alternatives:
  - my new name
  lexicon: BDAG
  rationale: The repeated article with possessive and adjective gives emphasis. 'My
    own new name' brings out that emphasis in natural English, though without adding
    doctrinal content beyond the Greek.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: The repeated 'my God' should be preserved exactly rather than smoothed
    away, since the repetition is rhetorically and theologically significant in the
    speaker's self-reference.
