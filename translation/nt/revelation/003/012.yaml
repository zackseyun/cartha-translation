theological_decisions:
- issue: Gendered singular in the promise formula
  chosen_reading: Use 'him' in the main text
  alternative_readings:
  - them
  - that person
  rationale: The Greek uses masculine singular forms (αὐτόν, ἐξέλθῃ) with a substantival
    masculine participle. Per doctrine, gender-accurate rendering is preferred over
    gender-neutral smoothing when the source is grammatically masculine and representative.
    The phrase remains representative in sense while preserving the Greek form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Repeated phrase 'my God' in the speech of the exalted Jesus
  chosen_reading: Preserve 'my God' four times exactly
  alternative_readings:
  - smooth repetition for style
  rationale: The Greek repeats τοῦ θεοῦ μου emphatically. The translation should not
    reduce or paraphrase this repetition, since it is textually explicit and theologically
    significant within Revelation's Christology. Preserving it maintains the text's
    own tension and wording without importing extra doctrinal explanation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of the final name phrase
  chosen_reading: '''my own new name'''
  alternative_readings:
  - my new name
  rationale: This wording reflects the emphatic structure τὸ ὄνομά μου τὸ καινόν while
    avoiding speculative interpretation about the content of the name. It preserves
    the text's theological mystery rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
