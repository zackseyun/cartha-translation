id: REV.3.13
reference: Revelation 3:13
source:
  edition: SBLGNT
  text: ὁ ἔχων οὖς ἀκουσάτω τί τὸ πνεῦμα λέγει ταῖς ἐκκλησίαις.
translation:
  text: The one who has an ear, let him hear what the Spirit says to the churches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'He who has an ear, let him hear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'assemblies' for 'churches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. 'The one who
    has' preserves the singular, proverbial force in natural modern English without
    unnecessary archaism.
- source_word: οὖς
  chosen: an ear
  alternatives:
  - ears
  - an ear to hear
  lexicon: BDAG
  rationale: Although the Greek noun is singular ('ear'), English idiom in this formula
    naturally uses 'an ear.' This preserves the singular form while conveying the
    call to attentive hearing.
- source_word: ἀκουσάτω
  chosen: let him hear
  alternatives:
  - must hear
  - should hear
  - let him listen
  lexicon: BDAG
  rationale: Aorist active imperative, third singular. 'Let him hear' is the established
    and accurate imperative sense. 'Listen' is possible dynamically, but 'hear' better
    preserves the repeated biblical formula and allows the fuller sense of heed/respond,
    not mere auditory reception.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Introduces the content of what is being spoken. 'What' is the most natural
    and accurate rendering in contemporary English.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Revelation's repeated message formula to the churches, πνεῦμα refers
    to the Holy Spirit. Capitalization in English appropriately signals this referent.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: BDAG
  rationale: Present indicative conveys the speech act in the message formula. 'Says'
    is idiomatic and sufficiently reflects the present tense without overemphasizing
    progressive aspect.
- source_word: ταῖς ἐκκλησίαις
  chosen: to the churches
  alternatives:
  - to the assemblies
  lexicon: BDAG
  rationale: The dative marks the recipients of the Spirit's address. 'Churches' is
    the standard and contextually appropriate rendering in Revelation's letters to
    the seven churches, though 'assemblies' is a lexical possibility.
