theological_decisions:
- issue: Referent of 'the Spirit'
  chosen_reading: the Holy Spirit speaking to the churches
  alternative_readings:
  - a human spirit
  - the spirit of prophecy in a non-personal sense
  rationale: Within Revelation's recurring exhortation formula, 'the Spirit' is best
    understood as the Holy Spirit addressing the churches through the prophetic message.
    This aligns with the book's usage and does not import a denominational distinctive
    beyond the text's likely referent.
  doctrine_reference: Affirmations; Translation philosophy §3
