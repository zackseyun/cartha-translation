theological_decisions:
- issue: Meaning of the 'opened door' image
  chosen_reading: Rendered literally as 'an opened door' without specifying whether
    it refers to mission opportunity, access, protection, or entrance into the kingdom.
  alternative_readings:
  - missionary opportunity
  - access into salvation/the kingdom
  - providential opportunity generally
  rationale: The metaphor is theologically suggestive but not explicitly interpreted
    within the verse itself. Per translation philosophy, the text should preserve
    the image and its tension rather than resolve it interpretively in translation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Force of the perfect forms in the verse
  chosen_reading: Used English present perfects ('I have set,' 'you have kept,' 'have
    not denied') to reflect completed action with present relevance.
  alternative_readings:
  - simple past forms such as 'I set' / 'you kept' / 'did not deny'
  rationale: The Greek perfects and related aspectual choices contribute to the ongoing
    significance of Christ's gift and the church's faithfulness. English present perfect
    best preserves that nuance in natural style.
