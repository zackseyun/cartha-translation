id: REV.3.8
reference: Revelation 3:8
source:
  edition: SBLGNT
  text: Οἶδά σου τὰ ἔργα— ἰδοὺ δέδωκα ἐνώπιόν σου θύραν ἠνεῳγμένην, ἣν οὐδεὶς δύναται
    κλεῖσαι αὐτήν— ὅτι μικρὰν ἔχεις δύναμιν, καὶ ἐτήρησάς μου τὸν λόγον, καὶ οὐκ ἠρνήσω
    τὸ ὄνομά μου.
translation:
  text: I know your works. Look, I have set before you an opened door, which no one
    is able to shut, because you have little strength, and you have kept my word,
    and have not denied my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an open door' or 'a door standing open.' The Greek participle explicitly
      indicates a door that has been opened.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  chosen: I know
  alternatives:
  - I have known
  lexicon: BDAG
  rationale: οἶδα is perfect in form but present in sense; standard English present
    best reflects the idiom.
- source_word: τὰ ἔργα
  chosen: your works
  alternatives:
  - what you do
  - your deeds
  lexicon: BDAG
  rationale: A straightforward rendering preserves the concrete plural noun and the
    repeated Revelation formula without unnecessary paraphrase.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse marker calling attention; 'Look' is readable modern English
    while retaining the force of the demonstrative summons.
- source_word: δέδωκα ἐνώπιόν σου
  chosen: I have set before you
  alternatives:
  - I have given before you
  - I have placed before you
  lexicon: BDAG
  rationale: Although δέδωκα is literally 'I have given,' with θύραν and ἐνώπιόν σου
    the idiomatic sense is that a door has been placed/opened before them. 'Set before
    you' is natural English and preserves the perfect aspect.
- source_word: θύραν ἠνεῳγμένην
  chosen: an opened door
  alternatives:
  - an open door
  - a door standing open
  lexicon: BDAG
  rationale: The participle ἠνεῳγμένην explicitly marks the door as having been opened.
    'An opened door' preserves that verbal force more closely than the flatter adjectival
    'open door,' while remaining intelligible.
- source_word: ἣν οὐδεὶς δύναται κλεῖσαι αὐτήν
  chosen: which no one is able to shut
  alternatives:
  - which no one can shut
  - and no one is able to close it
  lexicon: BDAG
  rationale: δύναται expresses ability; 'is able to' is slightly more formal and explicit
    than 'can.' 'Shut' fits θύρα idiomatically in English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι most naturally introduces the reason for Christ's action/assessment.
    'Because' makes the causal relation clear in English.
- source_word: μικρὰν ἔχεις δύναμιν
  chosen: you have little strength
  alternatives:
  - you have little power
  - your power is small
  lexicon: BDAG
  rationale: δύναμις can be 'power' or 'strength'; in this pastoral address to a church,
    'strength' better conveys limited capacity/resources without importing political
    overtones.
- source_word: ἐτήρησάς μου τὸν λόγον
  chosen: you have kept my word
  alternatives:
  - you have obeyed my word
  - you have kept my message
  lexicon: BDAG
  rationale: τηρέω is 'keep, observe, preserve'; 'kept' preserves the lexical link
    and allows both obedience and faithful adherence. λόγος here is best rendered
    'word' rather than expanded interpretively.
- source_word: οὐκ ἠρνήσω τὸ ὄνομά μου
  chosen: have not denied my name
  alternatives:
  - did not deny my name
  - have not disowned my name
  lexicon: BDAG
  rationale: ἀρνέομαι means 'deny, repudiate.' 'Denied my name' is the established
    and precise expression, with 'name' carrying representative allegiance rather
    than being paraphrased away.
