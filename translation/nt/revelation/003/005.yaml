id: REV.3.5
reference: Revelation 3:5
source:
  edition: SBLGNT
  text: ὁ νικῶν ⸀οὕτως περιβαλεῖται ἐν ἱματίοις λευκοῖς, καὶ οὐ μὴ ἐξαλείψω τὸ ὄνομα
    αὐτοῦ ἐκ τῆς βίβλου τῆς ζωῆς, καὶ ὁμολογήσω τὸ ὄνομα αὐτοῦ ἐνώπιον τοῦ πατρός
    μου καὶ ἐνώπιον τῶν ἀγγέλων αὐτοῦ.
translation:
  text: The one who conquers will thus be clothed in white garments, and I will certainly
    not erase his name from the book of life, and I will confess his name before my
    Father and before his angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never blot out his name from the book of life.' The Greek uses
      an emphatic negation.
    reason: lexical_alternative
  - marker: c
    text: That is, a heavenly register of those who belong to God and inherit life.
    reason: cultural_note
  - marker: d
    text: Or 'I will acknowledge his name.' Compare Matthew 10:32.
    reason: cross_reference
lexical_decisions:
- source_word: ὁ νικῶν
  chosen: The one who conquers
  alternatives:
  - The one who overcomes
  - He who conquers
  lexicon: BDAG
  rationale: Present participle used substantivally; 'the one who conquers' is natural
    modern English and preserves the ongoing/characterizing sense. 'Conquers' fits
    Revelation's victory motif slightly better than 'overcomes,' though the latter
    is a viable traditional alternative.
- source_word: οὕτως
  chosen: thus
  alternatives:
  - in this way
  - so
  lexicon: BDAG
  rationale: Included in the translation because it is present in the Greek and signals
    correspondence with the preceding promise/context. 'Thus' is concise and preserves
    the connective force without overexplaining.
- source_word: περιβαλεῖται
  chosen: will be clothed
  alternatives:
  - will be dressed
  - will clothe himself
  lexicon: BDAG
  rationale: 'Future middle/passive-form verb in this context is best rendered idiomatically
    as a passive/resultative expression in English: ''will be clothed.'' This avoids
    awkward reflexive wording while preserving the promise of investiture.'
- source_word: ἱματίοις λευκοῖς
  chosen: in white garments
  alternatives:
  - in white clothes
  - in white robes
  lexicon: BDAG
  rationale: ἱμάτια are garments/clothes broadly; 'garments' is slightly more elevated
    and fits apocalyptic imagery without importing the more specific 'robes' unless
    context demands it. 'White' is retained literally for symbolic purity/victory.
- source_word: οὐ μὴ ἐξαλείψω
  chosen: I will certainly not erase
  alternatives:
  - I will never erase
  - I will by no means blot out
  lexicon: BDAG
  rationale: οὐ μή with the future is an emphatic negation. 'Will certainly not erase'
    communicates the force in clear modern English. 'Blot out' is traditional and
    possible, but 'erase' is more immediately understandable while still fitting the
    book/register metaphor.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the person's name
  lexicon: BDAG
  rationale: Direct object retained literally. The masculine pronoun follows the singular
    masculine participial construction; this matches the source's grammar and representative
    force.
- source_word: ἐκ τῆς βίβλου τῆς ζωῆς
  chosen: from the book of life
  alternatives:
  - from the scroll of life
  lexicon: BDAG
  rationale: Established biblical expression; βίβλος can denote book/scroll, but 'book
    of life' is the clearest and most recognizable rendering in English and fits the
    metaphor of a heavenly register.
- source_word: ὁμολογήσω
  chosen: I will confess
  alternatives:
  - I will acknowledge
  - I will declare
  lexicon: BDAG
  rationale: The verb means to acknowledge/confess openly. 'Confess' preserves the
    verbal link to Jesus' saying in Matthew 10:32 and keeps the public, declarative
    sense. 'Acknowledge' is possible but slightly weaker.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: Standard prepositional rendering; 'before' is concise and natural in
    both occurrences.
- source_word: τοῦ πατρός μου
  chosen: my Father
  lexicon: BDAG
  rationale: Literal rendering preserves Jesus' filial relation without expansion.
- source_word: τῶν ἀγγέλων αὐτοῦ
  chosen: his angels
  alternatives:
  - the angels belonging to him
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to 'my Father' in the immediate
    syntax, so 'his angels' is retained literally rather than harmonized to 'the angels
    of God.'
