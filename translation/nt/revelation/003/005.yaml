theological_decisions:
- issue: Implication of 'I will certainly not erase his name from the book of life'
    in debates over perseverance/apostasy
  chosen_reading: Translate the statement straightforwardly as a promise of assurance
    without importing a doctrinal conclusion about whether true believers can or cannot
    finally fall away.
  alternative_readings:
  - A guarantee implying perseverance of the saints
  - A warning implying possible loss of salvation for some
  rationale: The verse presents Christ's promise to the conqueror in vivid register
    imagery. The translation should preserve the force of the promise while not resolving
    broader theological debates that the wording here alone does not unambiguously
    settle.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering for the singular masculine construction
  chosen_reading: Use 'his name' in keeping with the masculine singular grammar and
    representative force.
  alternative_readings:
  - their name
  rationale: DOCTRINE.md specifies gender-accurate over gender-neutral renderings
    where the source is grammatically masculine and representative/generic. A footnote
    can preserve the representative sense if needed, but the main text should follow
    the Greek form.
  doctrine_reference: Gender-accurate over gender-neutral.
