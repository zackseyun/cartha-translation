id: REV.3.9
reference: Revelation 3:9
source:
  edition: SBLGNT
  text: ἰδοὺ ⸀διδῶ ἐκ τῆς συναγωγῆς τοῦ Σατανᾶ, τῶν λεγόντων ἑαυτοὺς Ἰουδαίους εἶναι,
    καὶ οὐκ εἰσὶν ἀλλὰ ψεύδονται— ἰδοὺ ποιήσω αὐτοὺς ἵνα ⸂ἥξουσιν καὶ προσκυνήσουσιν⸃
    ἐνώπιον τῶν ποδῶν σου, καὶ γνῶσιν ὅτι ⸀ἐγὼ ἠγάπησά σε.
translation:
  text: Look, I am giving some from the synagogue of Satan—those who call themselves
    Jews and are not, but are lying—look, I will make them come and bow down before
    your feet, and they will know that I have loved you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those of the synagogue of Satan.' The Greek literally says 'I am giving
      from the synagogue of Satan,' which likely means that some from that group will
      be made to come.
    reason: lexical_alternative
  - marker: b
    text: Or 'come and worship before your feet.' The Greek verb can mean 'bow down'
      or 'worship'; here 'bow down' is used to avoid implying that believers receive
      divine worship.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as the attention-getting interjection 'Look' in contemporary
    English. 'Behold' is more traditional but archaic for the stated translation philosophy.
- source_word: διδῶ
  chosen: I am giving
  alternatives:
  - I give
  - I grant
  lexicon: BDAG
  rationale: Present tense is preserved with 'I am giving' rather than flattened to
    simple future. The sense is that Jesus is presently granting or handing over some
    from this group. 'Grant' is possible but less concrete than the Greek's basic
    'give'.
- source_word: ἐκ τῆς συναγωγῆς τοῦ Σατανᾶ
  chosen: some from the synagogue of Satan
  alternatives:
  - those of the synagogue of Satan
  - from the synagogue of Satan
  lexicon: BDAG
  rationale: 'The preposition ἐκ naturally means ''from/out of.'' Since no explicit
    object follows ''I am giving,'' English supplies ''some'' to make the construction
    intelligible while preserving the partitive force: certain people from that group
    are in view, not necessarily the whole body as an institution.'
- source_word: συναγωγῆς
  chosen: synagogue
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: Retained as 'synagogue' because the term here refers to a Jewish communal
    setting and is the established, contextually precise gloss.
- source_word: τοῦ Σατανᾶ
  chosen: of Satan
  alternatives:
  - belonging to Satan
  lexicon: BDAG
  rationale: A straightforward genitive preserved without interpretive expansion.
    The phrase is polemical and should not be softened, but neither should it be paraphrased
    beyond the Greek.
- source_word: τῶν λεγόντων ἑαυτοὺς Ἰουδαίους εἶναι
  chosen: those who call themselves Jews
  alternatives:
  - those who say that they are Jews
  - those claiming to be Jews
  lexicon: BDAG
  rationale: This participial phrase identifies the group by their claim. 'Call themselves'
    is idiomatic and accurately conveys the reflexive construction ἑαυτούς ... εἶναι.
- source_word: Ἰουδαίους
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In Revelation this term most naturally denotes Jewish identity rather
    than merely geographic origin. 'Judeans' is possible in some contexts, but here
    the issue is claimed covenant identity, so 'Jews' is the better rendering.
- source_word: καὶ οὐκ εἰσὶν ἀλλὰ ψεύδονται
  chosen: and are not, but are lying
  alternatives:
  - and are not, but lie
  - and are not, but are false
  lexicon: BDAG
  rationale: Preserves the sharp antithesis and the present middle/passive form ψεύδονται
    with a natural English progressive/resultative sense. 'Are false' is too interpretive.
- source_word: ποιήσω αὐτοὺς
  chosen: I will make them
  alternatives:
  - I will cause them
  - I will make them become
  lexicon: BDAG
  rationale: Future active with causative force is best represented by 'I will make
    them.' No complement such as 'become' is present in the Greek.
- source_word: ἵνα ἥξουσιν καὶ προσκυνήσουσιν
  chosen: come and bow down
  alternatives:
  - come and worship
  - arrive and prostrate themselves
  lexicon: BDAG
  rationale: προσκυνέω can mean worship or prostrate oneself/bow down. Because the
    object is believers ('before your feet') rather than God directly, 'bow down'
    avoids implying divine worship of the church while preserving the gesture of homage.
    'Come' naturally renders ἥξουσιν.
- source_word: ἐνώπιον τῶν ποδῶν σου
  chosen: before your feet
  alternatives:
  - at your feet
  - in front of your feet
  lexicon: BDAG
  rationale: A fairly literal rendering of the prepositional phrase. 'At your feet'
    is idiomatic but slightly less explicit than ἐνώπιον ('before/in the presence
    of').
- source_word: γνῶσιν
  chosen: they will know
  alternatives:
  - they will come to know
  - they will recognize
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα in this context expresses the intended result.
    English future 'they will know' communicates the sense clearly in sequence with
    the preceding futures.
- source_word: ἐγὼ ἠγάπησά σε
  chosen: I have loved you
  alternatives:
  - I loved you
  lexicon: BDAG
  rationale: The aorist can be rendered simply 'loved,' but in English 'have loved'
    better conveys a past action with abiding significance in this context of Christ's
    demonstrated favor. This also preserves the theological weight of ἀγαπάω as 'love'
    per project defaults.
