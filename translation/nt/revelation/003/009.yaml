theological_decisions:
- issue: Meaning of 'those who call themselves Jews and are not'
  chosen_reading: The statement is rendered as a polemical claim about false covenant
    identity or unfaithfulness, without implying an ethnic denial of Jewishness beyond
    what the text itself states.
  alternative_readings:
  - A strictly spiritual redefinition of 'Jew'
  - An ethnic denial of Jewish identity
  rationale: The verse itself makes a sharp theological judgment, but the translation
    should not import anti-Jewish claims beyond the wording. Keeping the phrase close
    to the Greek preserves the text's force while avoiding interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of προσκυνήσουσιν before believers' feet
  chosen_reading: Rendered as 'bow down' rather than 'worship' to indicate homage/submission,
    not divine worship offered to the church.
  alternative_readings:
  - worship before your feet
  rationale: Because the action is directed 'before your feet,' 'worship' in English
    could misleadingly suggest idolatrous worship of believers. 'Bow down' preserves
    the embodied act and fits biblical homage language, likely echoing Isaianic reversal
    motifs.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    meaning without importing doctrinal confusion.
