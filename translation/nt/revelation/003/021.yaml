theological_decisions:
- issue: Gendered representative singular in the promise to the conqueror
  chosen_reading: Retain masculine singular ('him') in the main text
  alternative_readings:
  - them
  - that person
  rationale: The Greek uses a masculine singular participle and pronoun in a representative
    sense. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral language. A footnote can clarify representative force without altering
    the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relation of believers to Christ's throne and Christ to the Father's throne
  chosen_reading: Render the parallel straightforwardly without softening or expanding
    it
  alternative_readings:
  - Interpret the believer's sitting as merely symbolic
  - Explain ontological distinctions within the translation itself
  rationale: The verse presents a strong parallel between the conqueror's promised
    participation with Messiah and Jesus' own victorious session with the Father.
    Historic orthodoxy affirms this without collapsing the distinction between the
    Son and the Father. The translation should preserve the text's force and not import
    explanatory doctrinal qualifiers into the main text.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
