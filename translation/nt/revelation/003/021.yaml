id: REV.3.21
reference: Revelation 3:21
source:
  edition: SBLGNT
  text: ὁ νικῶν δώσω αὐτῷ καθίσαι μετ’ ἐμοῦ ἐν τῷ θρόνῳ μου, ὡς κἀγὼ ἐνίκησα καὶ ἐκάθισα
    μετὰ τοῦ πατρός μου ἐν τῷ θρόνῳ αὐτοῦ.
translation:
  text: The one who conquers—I will grant him to sit with me on my throne, just as
    I also conquered and sat down with my Father on his throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.' The Greek verb νικάω is repeated twice in this
      verse; 'conquers' was chosen to preserve the victory motif consistently.
    reason: lexical_alternative
  - marker: b
    text: 'The masculine singular (''him'') is representative: the promise is to every
      believer who conquers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  chosen: The one who conquers
  alternatives:
  - The one who overcomes
  - The victor
  lexicon: BDAG
  rationale: Present participle used substantivally; rendered as a representative
    singular. 'Conquers' preserves the repeated νικάω motif in Revelation more consistently
    than 'overcomes,' while remaining natural English.
- source_word: δώσω
  chosen: I will grant
  alternatives:
  - I will give
  lexicon: BDAG
  rationale: Though δίδωμι literally means 'give,' in this construction with an infinitive
    it conveys granting a privilege or right. 'Grant' better reflects the idiomatic
    sense without over-paraphrasing.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - that one
  - the one
  lexicon: BDAG
  rationale: Masculine singular pronoun agrees with the substantival masculine participle.
    Per doctrine, gender-accurate rendering is preferred; here the masculine form
    has representative force, but English keeps 'him' to match the source.
- source_word: καθίσαι
  chosen: to sit
  alternatives:
  - to sit down
  - to take a seat
  lexicon: BDAG
  rationale: Aorist infinitive after δίδωμι/δώσω expresses the granted action. 'To
    sit' is the most natural English complement here; the enthronement context is
    already clear from 'on my throne.'
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: Standard rendering of μετά with genitive indicating association.
- source_word: ἐν τῷ θρόνῳ μου
  chosen: on my throne
  alternatives:
  - in my throne
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' English idiom for enthronement uses 'on
    a throne.' This is an optimal-equivalence adjustment preserving the image accurately.
- source_word: ὡς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces the comparison between the believer's promised participation
    and Jesus' own victorious exaltation. 'Just as' makes the comparative force explicit.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  - even I
  lexicon: BDAG
  rationale: Captures both the pronoun and the additive καί compressed in κἀγώ.
- source_word: ἐνίκησα
  chosen: conquered
  alternatives:
  - overcame
  - was victorious
  lexicon: BDAG
  rationale: Kept consistent with νικῶν earlier in the verse to preserve the lexical
    link and Revelation's victory theme.
- source_word: ἐκάθισα
  chosen: sat down
  alternatives:
  - sat
  - took my seat
  lexicon: BDAG
  rationale: Aorist indicative referring to completed exaltation. 'Sat down' is idiomatic
    and echoes enthronement language found elsewhere in the New Testament.
- source_word: μετὰ τοῦ πατρός μου
  chosen: with my Father
  lexicon: BDAG
  rationale: Straightforward associative use of μετά with genitive. 'My Father' preserves
    the filial relation central to the verse.
- source_word: ἐν τῷ θρόνῳ αὐτοῦ
  chosen: on his throne
  alternatives:
  - in his throne
  lexicon: BDAG
  rationale: As above, English enthronement idiom requires 'on his throne' rather
    than the more wooden 'in his throne.'
