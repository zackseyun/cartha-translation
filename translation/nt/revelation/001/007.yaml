id: REV.1.7
reference: Revelation 1:7
source:
  edition: SBLGNT
  text: Ἰδοὺ ἔρχεται μετὰ τῶν νεφελῶν, καὶ ὄψεται αὐτὸν πᾶς ὀφθαλμὸς καὶ οἵτινες αὐτὸν
    ἐξεκέντησαν, καὶ κόψονται ἐπ’ αὐτὸν πᾶσαι αἱ φυλαὶ τῆς γῆς. ναί, ἀμήν.
translation:
  text: Look, he is coming with the clouds, and every eye will see him, even those
    who pierced him, and all the tribes of the earth will mourn over him. Yes, amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the tribes of the land will mourn over him.' The phrase may echo
      Zechariah 12:10-12, where 'land' is contextually possible.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Introduces a vivid summons to attention. 'Look' preserves the force in
    readable modern English better than the more archaic 'Behold.'
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Present tense used with imminent/future force. 'Is coming' conveys the
    vividness of the Greek present more naturally in English than a simple 'comes.'
- source_word: μετὰ τῶν νεφελῶν
  chosen: with the clouds
  alternatives:
  - with clouds
  - amid the clouds
  lexicon: BDAG
  rationale: Retains the article and the allusive imagery from Daniel 7:13. 'With
    the clouds' is the most natural and sufficiently formal rendering.
- source_word: ὄψεται
  chosen: will see
  alternatives:
  - shall see
  lexicon: BDAG
  rationale: Future middle of ὁράω is idiomatically rendered 'will see.' 'Shall' is
    avoided as archaic.
- source_word: πᾶς ὀφθαλμὸς
  chosen: every eye
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: Keeps the concrete singular distributive expression of the Greek rather
    than flattening it into an abstract collective.
- source_word: οἵτινες
  chosen: those who
  alternatives:
  - the ones who
  - even they who
  lexicon: BDAG
  rationale: Refers specifically to a subset within 'every eye.' 'Those who' is natural
    English and preserves the relative force.
- source_word: ἐξεκέντησαν
  chosen: pierced
  alternatives:
  - stabbed
  - wounded
  lexicon: BDAG
  rationale: '''Pierced'' best preserves the verbal and intertextual connection to
    Zechariah 12:10 and John 19:37.'
- source_word: κόψονται
  chosen: will mourn
  alternatives:
  - will wail
  - will beat their breasts in grief
  lexicon: BDAG
  rationale: The verb denotes lamentation or mourning. 'Will mourn' is clear and broad
    enough to preserve the solemn sense without over-specifying gesture.
- source_word: ἐπ’ αὐτὸν
  chosen: over him
  alternatives:
  - because of him
  - for him
  lexicon: BDAG
  rationale: In this mourning context, ἐπί with the accusative is well represented
    by 'over him,' echoing the likely Zechariah background. 'Because of him' is possible
    but less directly tied to lamentation language.
- source_word: πᾶσαι αἱ φυλαὶ τῆς γῆς
  chosen: all the tribes of the earth
  alternatives:
  - all the tribes of the land
  - all the peoples of the earth
  lexicon: BDAG
  rationale: φυλαί is more specifically 'tribes' than 'peoples.' γῆ can mean 'land'
    or 'earth'; here 'earth' best fits the universal scope of the verse, while 'land'
    remains a viable alternative worth preserving in a footnote because of the Zechariah
    allusion.
- source_word: ναί, ἀμήν
  chosen: Yes, amen
  alternatives:
  - Yes, truly
  - Surely, amen
  lexicon: BDAG
  rationale: Preserves the emphatic double affirmation. 'Amen' is retained rather
    than paraphrased because it is well understood in English and carries liturgical
    weight.
