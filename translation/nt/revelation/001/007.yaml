theological_decisions:
- issue: Scope of τῆς γῆς in the allusion-rich phrase πᾶσαι αἱ φυλαὶ τῆς γῆς
  chosen_reading: Rendered as 'all the tribes of the earth' in the main text
  alternative_readings:
  - all the tribes of the land
  rationale: The verse combines Danielic and Zecharian imagery and presents a globally
    visible coming ('every eye will see him'), which favors 'earth' in the main text.
    However, because the wording echoes Zechariah 12:10-12, where 'land' can be contextually
    appropriate, the alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
