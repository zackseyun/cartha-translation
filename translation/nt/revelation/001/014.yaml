theological_decisions:
- issue: Symbolic description of the exalted Son of Man
  chosen_reading: Retain the imagery literally in translation without interpreting
    its symbolism in the main text.
  alternative_readings:
  - Translate with interpretive expansion suggesting purity, eternity, or judgment
  rationale: The verse presents visionary similes rather than explicit doctrinal explanation.
    Preserving the imagery maintains theological tension and avoids importing an interpretation
    the text itself does not state here.
  doctrine_reference: Translation philosophy §3
