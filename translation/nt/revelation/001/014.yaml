id: REV.1.14
reference: Revelation 1:14
source:
  edition: SBLGNT
  text: ἡ δὲ κεφαλὴ αὐτοῦ καὶ αἱ τρίχες λευκαὶ ὡς ἔριον λευκόν, ὡς χιών, καὶ οἱ ὀφθαλμοὶ
    αὐτοῦ ὡς φλὸξ πυρός,
translation:
  text: Now his head and hair were white, like white wool, like snow, and his eyes
    were like a flame of fire,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his head and his hair were white as white wool, as snow.'
    reason: lexical_alternative
  - marker: b
    text: The imagery echoes Daniel 7:9 and emphasizes the visionary character of
      the description.
    reason: cross_reference
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: Rendered as a mild connective that advances the description without over-translating;
    'now' gives natural English discourse flow in this visionary sequence.
- source_word: κεφαλὴ
  chosen: head
  lexicon: BDAG
  rationale: Straightforward anatomical term; retained literally in the vision description.
- source_word: τρίχες
  chosen: hair
  alternatives:
  - hairs
  lexicon: BDAG
  rationale: English idiom prefers the collective singular 'hair' rather than 'hairs'
    for appearance.
- source_word: λευκαὶ
  chosen: white
  alternatives:
  - bright
  - gleaming white
  lexicon: BDAG
  rationale: Basic color term; 'white' preserves the repeated emphasis in the Greek
    without interpretive expansion.
- source_word: ὡς ἔριον λευκόν
  chosen: like white wool
  alternatives:
  - as white wool
  - like wool, white
  lexicon: BDAG
  rationale: Keeps the simile explicit and natural in English. The adjective λευκόν
    modifies ἔριον, so 'white wool' is the most direct rendering.
- source_word: ὡς χιών
  chosen: like snow
  alternatives:
  - as snow
  lexicon: BDAG
  rationale: Retains the second simile and the cumulative imagery of whiteness.
- source_word: ὀφθαλμοὶ
  chosen: eyes
  lexicon: BDAG
  rationale: Standard rendering of the anatomical term.
- source_word: ὡς φλὸξ πυρός
  chosen: like a flame of fire
  alternatives:
  - like a fiery flame
  - like a flame
  lexicon: BDAG
  rationale: A formally close rendering that preserves the vivid genitive construction
    and traditional apocalyptic imagery. 'A flame of fire' is slightly more literal
    than smoothing to 'fiery flame.'
