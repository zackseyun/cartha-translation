id: REV.1.6
reference: Revelation 1:6
source:
  edition: SBLGNT
  text: καὶ ἐποίησεν ἡμᾶς βασιλείαν, ἱερεῖς τῷ θεῷ καὶ πατρὶ αὐτοῦ— αὐτῷ ἡ δόξα καὶ
    τὸ κράτος εἰς τοὺς αἰῶνας ⸂τῶν αἰώνων⸃· ἀμήν.
translation:
  text: and made us a kingdom, priests to his God and Father—to him be the glory and
    the dominion forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'unto the ages of ages.'
    reason: lexical_alternative
  - marker: b
    text: Some later manuscripts read 'kings and priests' instead of 'a kingdom, priests.'
      The main text follows the provided Greek reading.
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - has made
  lexicon: BDAG
  rationale: Aorist active indicative is best rendered as a simple past in English
    here within the doxological sequence of vv. 5–6. English present perfect is possible,
    but simple past keeps the Greek aspectual value without overinterpreting continuing
    result.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - kingship
  - royal realm
  lexicon: BDAG
  rationale: The noun denotes a kingdom/reign rather than 'kings.' The singular accusative
    after ἐποίησεν naturally yields 'made us a kingdom.' This also aligns with the
    likely allusion to Exod 19:6 and avoids importing the textual variant 'kings'
    found in some traditions.
- source_word: ἱερεῖς
  chosen: priests
  lexicon: BDAG
  rationale: The plural noun straightforwardly means 'priests.' It is retained literally
    because the cultic and covenantal identity is central to the verse.
- source_word: τῷ θεῷ καὶ πατρὶ αὐτοῦ
  chosen: to his God and Father
  alternatives:
  - for his God and Father
  lexicon: BDAG
  rationale: 'The dative is rendered ''to'' to express orientation/service: believers
    are constituted priests in relation to God. The genitive αὐτοῦ is taken with both
    nouns: ''his God and Father.'' This preserves the Greek wording without softening
    its force.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to him belongs
  lexicon: BDAG
  rationale: The dative in the doxology is naturally rendered 'to him,' with the verbless
    clause understood idiomatically in English as an ascription.
- source_word: δόξα
  chosen: glory
  lexicon: BDAG
  rationale: Standard doxological rendering; concise and natural in English.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: In doxological contexts κράτος often denotes ruling power or dominion.
    'Dominion' best captures enduring sovereign might here better than the more generic
    'power.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - unto the ages of ages
  lexicon: BDAG
  rationale: This idiom means unending duration. 'Forever and ever' is the clearest
    natural English equivalent, while the more literal 'ages of ages' is preserved
    as an alternative because of its formal value.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained by longstanding English usage and because it functions as a
    liturgical affirmation rather than requiring translation.
