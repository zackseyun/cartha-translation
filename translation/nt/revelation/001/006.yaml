theological_decisions:
- issue: Referent of 'his God and Father'
  chosen_reading: The phrase refers to Jesus Messiah, so believers are made a kingdom
    and priests to the God and Father of Jesus.
  alternative_readings:
  - The phrase could be flattened to 'to God his Father' in English.
  rationale: The nearest antecedent in context is Jesus Messiah from vv. 5–6. Rendering
    the phrase transparently preserves the text's Christological and relational wording
    without doctrinally smoothing over the distinction of persons.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §1, §3'
- issue: Nature of the community's status
  chosen_reading: The main text keeps 'a kingdom, priests' rather than interpreting
    it as 'kings and priests.'
  alternative_readings:
  - '''kings and priests'' (from later textual tradition or interpretive paraphrase)'
  rationale: The supplied Greek text reads βασιλείαν, ἱερεῖς. The translation must
    reflect the source text rather than familiar traditional renderings. This preserves
    the corporate identity of the redeemed as a kingdom composed of priests.
  doctrine_reference: Translation philosophy §1, §5
