id: REV.1.8
reference: Revelation 1:8
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι τὸ Ἄλφα καὶ τὸ Ὦ, λέγει κύριος, ὁ θεός, ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος,
    ὁ παντοκράτωρ.
translation:
  text: “I am the Alpha and the Omega,” says the Lord God, “the one who is and who
    was and who is coming, the Almighty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the one who is and who was and who is to come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I myself am
  lexicon: BDAG
  rationale: Standard rendering of the emphatic pronoun plus copula. English can preserve
    the emphasis adequately with 'I am' in this solemn self-declaration without overtranslating
    the pronoun.
- source_word: τὸ Ἄλφα καὶ τὸ Ὦ
  chosen: the Alpha and the Omega
  alternatives:
  - the A and the O
  lexicon: BDAG
  rationale: Retains the Greek letter names rather than substituting English letters,
    preserving the symbolic force and established apocalyptic idiom. The repeated
    articles are naturally represented once in English.
- source_word: λέγει
  chosen: says
  alternatives:
  - declares
  lexicon: BDAG
  rationale: Present tense is best represented as 'says' in English narrative quotation
    formula. 'Declares' is possible but slightly more interpretive.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' Here it
    functions as a divine title, and 'Lord' best matches both NT usage and the theological
    register.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: 'Straightforward rendering of the appositional title following κύριος:
    ''the Lord God.'''
- source_word: ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος
  chosen: the one who is and who was and who is coming
  alternatives:
  - the one who is and who was and who is to come
  lexicon: BDAG
  rationale: The articular participial/finite sequence is rendered with 'the one who...'
    for natural English while preserving the triadic formula. For ἐρχόμενος, 'is coming'
    reflects the present participle more directly than the traditional 'is to come,'
    though the latter is preserved in a footnote because it is a familiar and viable
    alternative.
- source_word: ὁ παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Ruler
  - the Omnipotent One
  lexicon: BDAG
  rationale: '''The Almighty'' is the most idiomatic and established English equivalent
    for παντοκράτωρ in biblical contexts, preserving divine sovereignty without awkward
    literalism.'
