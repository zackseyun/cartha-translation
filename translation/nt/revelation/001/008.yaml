theological_decisions:
- issue: Rendering the divine self-designation in relation to God's eternal being
    and future advent
  chosen_reading: the one who is and who was and who is coming
  alternative_readings:
  - the one who is and who was and who is to come
  rationale: The Greek ὁ ἐρχόμενος is a present participle, so 'is coming' better
    reflects the verbal aspect and the active eschatological movement in the text.
    The traditional 'is to come' remains a legitimate interpretive rendering and is
    preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
