theological_decisions:
- issue: Nature of ἐκκλησίαις in Revelation 1:11
  chosen_reading: churches
  alternative_readings:
  - assemblies
  rationale: The term refers to concrete Christian congregations addressed by the
    risen Jesus through John. Rendering it 'churches' communicates the ecclesial referent
    without importing denominational distinctives.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
