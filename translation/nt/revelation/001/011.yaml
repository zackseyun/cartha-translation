id: REV.1.11
reference: Revelation 1:11
source:
  edition: SBLGNT
  text: λεγούσης· Ὃ βλέπεις γράψον εἰς βιβλίον καὶ πέμψον ταῖς ἑπτὰ ἐκκλησίαις, εἰς
    Ἔφεσον καὶ εἰς Σμύρναν καὶ εἰς Πέργαμον καὶ εἰς Θυάτειρα καὶ εἰς Σάρδεις καὶ εἰς
    Φιλαδέλφειαν καὶ εἰς Λαοδίκειαν.
translation:
  text: 'saying, “What you see, write in a book and send it to the seven churches:
    to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to
    Philadelphia and to Laodicea.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a scroll”; Greek βιβλίον can refer to a scroll or book/document.
    reason: lexical_alternative
  - marker: b
    text: Pergamum is traditionally rendered “Pergamos” in some older English versions.
    reason: alternative_reading
lexical_decisions:
- source_word: λεγούσης
  chosen: saying
  alternatives:
  - which said
  - saying with a voice
  lexicon: BDAG
  rationale: Present active participle feminine genitive singular, continuing the
    prior description of the voice. English uses the participle 'saying' naturally
    to introduce the quotation without over-specifying the antecedent in this verse
    alone.
- source_word: Ὃ βλέπεις
  chosen: What you see
  alternatives:
  - That which you see
  - What you are seeing
  lexicon: BDAG
  rationale: The neuter relative pronoun with the present verb is best rendered idiomatically
    as 'What you see.' This preserves the broad scope of the visionary content without
    wooden phrasing.
- source_word: γράψον
  chosen: write
  alternatives:
  - record
  lexicon: BDAG
  rationale: Aorist imperative of γράφω; 'write' is the direct and standard rendering.
    'Record' is possible but less immediate than the Greek command.
- source_word: εἰς βιβλίον
  chosen: in a book
  alternatives:
  - into a scroll
  - in a scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a book, scroll, or written document. 'Book' is a readable
    modern rendering, but because first-century material culture would commonly involve
    a scroll, that alternative is preserved in a footnote.
- source_word: πέμψον
  chosen: send it
  alternatives:
  - send
  lexicon: BDAG
  rationale: Aorist imperative of πέμπω. English normally supplies the object pronoun
    from context ('what you write'), yielding smooth and accurate sense.
- source_word: ταῖς ἑπτὰ ἐκκλησίαις
  chosen: to the seven churches
  alternatives:
  - to the seven assemblies
  lexicon: BDAG
  rationale: ἐκκλησία is conventionally and appropriately rendered 'church' here,
    referring to identifiable Christian congregations in Asia. 'Assemblies' is lexically
    possible but less natural in this canonical context.
- source_word: εἰς Ἔφεσον ... εἰς Λαοδίκειαν
  chosen: to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and
    to Philadelphia and to Laodicea
  alternatives:
  - for Ephesus ... Laodicea
  lexicon: BDAG
  rationale: The repeated εἰς before each city is preserved with repeated 'to' for
    rhetorical force and clarity, reflecting the distributive sense of individual
    destinations.
- source_word: Πέργαμον
  chosen: Pergamum
  alternatives:
  - Pergamos
  lexicon: BDAG
  rationale: Standard modern transliteration favors 'Pergamum.' 'Pergamos' reflects
    older English tradition and is preserved as an alternative in a footnote.
