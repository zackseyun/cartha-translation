theological_decisions:
- issue: Public-reading setting implied by singular reader and plural hearers
  chosen_reading: Render ἀναγινώσκων as 'the one who reads aloud' to reflect likely
    congregational reading.
  alternative_readings:
  - '''the one who reads'' with no explicit oral nuance'
  rationale: The verse distinguishes one reader from multiple hearers, which strongly
    suggests liturgical/public reading. Making the oral aspect explicit clarifies
    the syntax and historical setting without adding doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Eschatological force of καιρός ἐγγύς
  chosen_reading: Translate straightforwardly as 'the time is near' without resolving
    debates about prophetic imminence or fulfillment chronology.
  alternative_readings:
  - '''the appointed time is near'''
  rationale: The text asserts nearness but does not specify a detailed eschatological
    scheme. The translation should preserve that tension rather than encode a particular
    interpretive system.
  doctrine_reference: Translation philosophy §3
