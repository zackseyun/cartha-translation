id: REV.1.3
reference: Revelation 1:3
source:
  edition: SBLGNT
  text: μακάριος ὁ ἀναγινώσκων καὶ οἱ ἀκούοντες τοὺς λόγους τῆς προφητείας καὶ τηροῦντες
    τὰ ἐν αὐτῇ γεγραμμένα, ὁ γὰρ καιρὸς ἐγγύς.
translation:
  text: Blessed is the one who reads aloud, and those who hear the words of this prophecy
    and keep what is written in it, for the time is near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who reads'; the Greek likely refers to a public reader in the
      assembly, hence 'reads aloud.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the appointed time is near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude language in the NT carries covenantal/spiritual favor
    more than mere emotional happiness. 'Blessed' preserves that weight and matches
    apocalyptic exhortation.
- source_word: ὁ ἀναγινώσκων
  chosen: the one who reads aloud
  alternatives:
  - the one who reads
  - the reader
  lexicon: BDAG
  rationale: In early Christian assembly context, singular participle likely refers
    to the public reader of the book. 'Reads aloud' makes the likely oral setting
    explicit without overparaphrasing, and explains the singular reader paired with
    plural hearers.
- source_word: οἱ ἀκούοντες
  chosen: those who hear
  alternatives:
  - those who listen
  lexicon: BDAG
  rationale: '''Hear'' preserves the biblical sense of receiving spoken words and
    pairs naturally with public reading. It also leaves room for the obedience nuance
    reinforced by the following participle.'
- source_word: τοὺς λόγους τῆς προφητείας
  chosen: the words of this prophecy
  alternatives:
  - the words of the prophecy
  - the message of this prophecy
  lexicon: BDAG
  rationale: 'λόγοι is best kept as ''words'' rather than generalized ''message.''
    Adding ''this'' reflects the referential force in context: the prophecy contained
    in this book.'
- source_word: τηροῦντες
  chosen: keep
  alternatives:
  - obey
  - observe
  - guard
  lexicon: BDAG
  rationale: τηρέω here means to keep/observe faithfully what has been written. 'Keep'
    is concise and preserves the broader sense of obedient adherence without narrowing
    it to mere rule-following.
- source_word: τὰ ἐν αὐτῇ γεγραμμένα
  chosen: what is written in it
  alternatives:
  - the things written in it
  - what has been written in it
  lexicon: BDAG
  rationale: This idiomatic English rendering captures the neuter plural perfect passive
    participle naturally. 'In it' refers to the prophecy/book just mentioned.
- source_word: ὁ γὰρ καιρὸς
  chosen: for the time
  alternatives:
  - for the appointed time
  - for the season
  lexicon: BDAG
  rationale: καιρός often denotes a decisive or appointed time, but 'the time' is
    sufficiently natural and broad here, allowing the eschatological force to remain
    without interpretive over-specification.
- source_word: ἐγγύς
  chosen: is near
  alternatives:
  - has drawn near
  - is at hand
  lexicon: BDAG
  rationale: '''Is near'' is clear modern English and preserves the temporal imminence
    expressed by ἐγγύς without archaic phrasing.'
