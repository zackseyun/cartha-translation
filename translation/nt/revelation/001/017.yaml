id: REV.1.17
reference: Revelation 1:17
source:
  edition: SBLGNT
  text: Καὶ ὅτε εἶδον αὐτόν, ἔπεσα πρὸς τοὺς πόδας αὐτοῦ ὡς νεκρός· καὶ ἔθηκεν τὴν
    δεξιὰν αὐτοῦ ἐπ’ ἐμὲ λέγων· Μὴ φοβοῦ· ἐγώ εἰμι ὁ πρῶτος καὶ ὁ ἔσχατος,
translation:
  text: And when I saw him, I fell at his feet like a dead man. And he placed his
    right hand on me, saying, “Do not fear. I am the First and the Last,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as though dead.”
    reason: lexical_alternative
  - marker: b
    text: Or, “Do not be afraid.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ὅτε
  chosen: And when
  alternatives:
  - When
  - Now when
  lexicon: BDAG
  rationale: Retains the narrative connective καί while rendering ὅτε temporally.
    'And when' preserves the flow from the previous verse without sounding overly
    wooden.
- source_word: εἶδον αὐτόν
  chosen: I saw him
  alternatives:
  - I looked at him
  lexicon: BDAG
  rationale: 'ὁράω in the aorist here is straightforward perception: ''I saw him.''
    This is the plainest English equivalent.'
- source_word: ἔπεσα πρὸς τοὺς πόδας αὐτοῦ
  chosen: I fell at his feet
  alternatives:
  - I fell before his feet
  - I fell down at his feet
  lexicon: BDAG
  rationale: πρὸς with 'feet' in this idiom indicates collapse before someone. 'At
    his feet' is idiomatic English and preserves the posture of reverence/overwhelm.
- source_word: ὡς νεκρός
  chosen: like a dead man
  alternatives:
  - as though dead
  - like one dead
  lexicon: BDAG
  rationale: The comparison is explicit with ὡς. 'Like a dead man' is vivid, natural
    English and preserves the simile without overstating that John literally died.
- source_word: ἔθηκεν τὴν δεξιὰν αὐτοῦ ἐπ’ ἐμέ
  chosen: he placed his right hand on me
  alternatives:
  - he laid his right hand on me
  - he put his right hand on me
  lexicon: BDAG
  rationale: τίθημι here means to place/lay. 'Placed' is slightly more neutral and
    readable; 'right hand' is retained literally because it is symbolically significant
    and explicit in the Greek.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the action. 'Saying' preserves
    the Greek structure naturally in English.
- source_word: Μὴ φοβοῦ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: BDAG
  rationale: φοβέομαι can be rendered either way. 'Do not fear' is slightly more formal
    and solemn, fitting the revelatory context, while remaining clear modern English.
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  lexicon: BDAG
  rationale: The explicit pronoun plus verb is best rendered 'I am.' This preserves
    the emphatic self-identification without importing more than the text states.
- source_word: ὁ πρῶτος καὶ ὁ ἔσχατος
  chosen: the First and the Last
  alternatives:
  - the first and the last
  lexicon: BDAG
  rationale: The articular adjectives function as titles. Capitalization reflects
    titular usage in English for a divine/self-revelatory designation, while the wording
    remains a direct translation.
