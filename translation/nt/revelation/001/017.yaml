theological_decisions:
- issue: Rendering of ὁ πρῶτος καὶ ὁ ἔσχατος as a title
  chosen_reading: the First and the Last
  alternative_readings:
  - the first and the last
  rationale: In context this is a self-designation of the exalted Jesus and echoes
    divine title language in Isaiah. Capitalizing the phrase in English signals titular
    force without altering the lexical content. This aligns with historic orthodox
    Christology while remaining grounded in the Greek text itself.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Force of ἐγώ εἰμι
  chosen_reading: I am
  alternative_readings:
  - It is I
  rationale: Although ἐγώ εἰμι can sometimes function idiomatically, here it introduces
    a formal self-identification followed by titles. 'I am' best preserves the theological
    and literary weight without overinterpreting it as a direct allusion beyond what
    the verse itself states.
  doctrine_reference: Translation philosophy §3
