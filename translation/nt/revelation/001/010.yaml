theological_decisions:
- issue: Whether ἐν πνεύματι should be rendered as a visionary state such as 'in a
    trance' or more literally
  chosen_reading: in the Spirit
  alternative_readings:
  - in spirit
  - in a trance
  rationale: The phrase likely signals prophetic inspiration by the Holy Spirit, but
    the Greek itself does not explicitly say 'trance.' To preserve theological tension
    and avoid importing a stronger experiential claim than the text states, the main
    text keeps the literal phrase 'in the Spirit.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether κυριακῇ ἡμέρᾳ refers to the weekly Christian day of worship or the
    eschatological day of the Lord
  chosen_reading: the Lord’s day
  alternative_readings:
  - the day of the Lord
  rationale: The Greek adjective κυριακός naturally yields 'Lord’s,' not the more
    common eschatological construction for 'day of the Lord.' The translation therefore
    reflects the lexical form without deciding beyond the phrase itself how John and
    his audience identified the day.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation
    tradition.'
