id: REV.1.10
reference: Revelation 1:10
source:
  edition: SBLGNT
  text: ἐγενόμην ἐν πνεύματι ἐν τῇ κυριακῇ ἡμέρᾳ, καὶ ἤκουσα ⸂ὀπίσω μου φωνὴν⸃ μεγάλην
    ὡς σάλπιγγος
translation:
  text: I came to be in the Spirit on the Lord’s day, and I heard behind me a loud
    voice like a trumpet,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'on the day of the Lord.' The Greek here is κυριακῇ ἡμέρᾳ
      ('the Lord’s day'), not the more usual expression for the eschatological 'day
      of the Lord.'
    reason: alternative_reading
  - marker: b
    text: Or 'in spirit.' The phrase may denote being under the Holy Spirit’s prophetic
      influence; the text does not explicitly say 'in a trance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενόμην
  chosen: I came to be
  alternatives:
  - I was
  - I came
  - I became
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι often denotes coming into a state. 'I came to
    be' preserves the ingressive sense better than the flatter 'I was,' while avoiding
    overinterpretation such as ecstatic trance language not explicit in the verb itself.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  - in the spirit
  lexicon: BDAG
  rationale: Capitalized 'Spirit' reflects the likely reference to the Holy Spirit
    in Johannine apocalyptic usage, especially in Revelation's visionary formulas,
    while preserving the Greek prepositional phrase without expanding it to 'in a
    trance' or similar interpretive paraphrase.
- source_word: ἐν τῇ κυριακῇ ἡμέρᾳ
  chosen: on the Lord’s day
  alternatives:
  - on the day of the Lord
  lexicon: BDAG
  rationale: κυριακός means 'belonging to the Lord.' The adjectival phrase is best
    rendered 'the Lord’s day,' the standard sense of κυριακῇ ἡμέρᾳ. It should be distinguished
    from the eschatological expression 'day of the Lord,' which uses different Greek
    wording.
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: Simple aorist of ἀκούω here reports perception, not attentive listening;
    'I heard' is the natural English equivalent.
- source_word: ὀπίσω μου
  chosen: behind me
  alternatives:
  - after me
  - at my back
  lexicon: BDAG
  rationale: Spatial sense fits the context of hearing a voice from behind; 'after
    me' would suggest sequence rather than location.
- source_word: φωνὴν μεγάλην
  chosen: a loud voice
  alternatives:
  - a great voice
  - a loud sound
  lexicon: BDAG
  rationale: μέγας with φωνή idiomatically means loudness or force in context. 'A
    loud voice' is idiomatic modern English and preserves the auditory emphasis.
- source_word: ὡς σάλπιγγος
  chosen: like a trumpet
  alternatives:
  - like a trumpet blast
  - as of a trumpet
  lexicon: BDAG
  rationale: The comparison is to the quality of the voice. 'Like a trumpet' is sufficiently
    literal and clear; 'blast' adds an element not explicit in the Greek noun alone.
