id: REV.1.15
reference: Revelation 1:15
source:
  edition: SBLGNT
  text: καὶ οἱ πόδες αὐτοῦ ὅμοιοι χαλκολιβάνῳ, ὡς ἐν καμίνῳ ⸀πεπυρωμένης, καὶ ἡ φωνὴ
    αὐτοῦ ὡς φωνὴ ὑδάτων πολλῶν,
translation:
  text: and his feet were like burnished bronze, as if refined in a furnace, and his
    voice was like the sound of many waters,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'like the voice of many waters.'
    reason: lexical_alternative
  - marker: b
    text: The rare term translated 'burnished bronze' may refer to a highly refined
      or glowing metal alloy; alternatives include 'fine brass' or 'polished bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόδες
  chosen: feet
  alternatives:
  - legs
  lexicon: BDAG
  rationale: πούς normally means 'foot'; although the broader image includes the lower
    limbs, 'feet' is the direct lexical equivalent and matches the visionary description.
- source_word: ὅμοιοι
  chosen: were like
  alternatives:
  - like
  - similar to
  lexicon: BDAG
  rationale: The adjective ὅμοιος expresses resemblance. Supplying 'were' makes idiomatic
    English while preserving the simile.
- source_word: χαλκολιβάνῳ
  chosen: burnished bronze
  alternatives:
  - fine brass
  - polished bronze
  - electrum
  lexicon: BDAG
  rationale: χαλκολίβανον is a rare term of uncertain precise referent, likely denoting
    a bright metal alloy or highly refined bronze/brass. 'Burnished bronze' communicates
    glowing, polished metallic brilliance in readable modern English without overclaiming
    a specific metallurgy.
- source_word: ὡς ἐν καμίνῳ πεπυρωμένης
  chosen: as if refined in a furnace
  alternatives:
  - as having been fired in a furnace
  - as glowing in a furnace
  - as refined in a smelting furnace
  lexicon: BDAG
  rationale: κάμινος is a furnace/smelting furnace, and πεπυρωμένης from πυρόομαι
    conveys being ignited, heated, or refined by fire. 'Refined in a furnace' fits
    the metallurgical imagery and natural English. 'As if' reflects the comparative
    force of ὡς.
- source_word: φωνή
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: φωνή can mean either 'voice' or 'sound.' For the first instance, because
    it refers to 'his voice,' the personal sense should be retained.
- source_word: ὡς φωνὴ ὑδάτων πολλῶν
  chosen: like the sound of many waters
  alternatives:
  - like the voice of many waters
  - like the roar of many waters
  lexicon: BDAG
  rationale: Although φωνή is repeated, English style is improved by rendering the
    second occurrence as 'sound' to convey the auditory comparison. 'Many waters'
    is kept formally rather than paraphrased as 'ocean waves,' preserving biblical
    imagery also found in Ezekiel and Revelation.
