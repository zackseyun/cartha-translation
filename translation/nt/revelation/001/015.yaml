theological_decisions:
- issue: Rendering of the repeated φωνή in the final simile
  chosen_reading: his voice was like the sound of many waters
  alternative_readings:
  - his voice was like the voice of many waters
  - his voice was like the roar of many waters
  rationale: The verse is descriptive rather than doctrinally contested, but the imagery
    bears theological weight in portraying the majesty of the exalted Son of Man.
    'Sound of many waters' preserves the metaphor's force in contemporary English
    without narrowing it to a specific natural phenomenon such as surf. The more literal
    'voice of many waters' is preserved in a footnote because it is a viable formal
    rendering.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; §6, readable modern English
