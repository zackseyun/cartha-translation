id: REV.1.13
reference: Revelation 1:13
source:
  edition: SBLGNT
  text: καὶ ἐν μέσῳ ⸀τῶν λυχνιῶν ὅμοιον ⸀υἱὸν ἀνθρώπου, ἐνδεδυμένον ποδήρη καὶ περιεζωσμένον
    πρὸς τοῖς μαστοῖς ζώνην χρυσᾶν·
translation:
  text: and in the midst of the lampstands, one like a son of man, clothed in a robe
    reaching to the feet and girded across the chest with a golden sash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one like the Son of Man.' The Greek wording echoes Daniel 7:13 and
      is applied here to the exalted Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν μέσῳ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: BDAG
  rationale: Retains the spatial sense with slightly elevated but natural English.
    'Among' is possible and idiomatic, but 'in the midst of' more closely reflects
    the noun-preposition construction and suits the visionary style.
- source_word: λυχνιῶν
  chosen: lampstands
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: λυχνία refers to a lampstand rather than the lamp itself; this is important
    for consistency with the imagery explained in the context of Revelation.
- source_word: ὅμοιον υἱὸν ἀνθρώπου
  chosen: one like a son of man
  alternatives:
  - one like the Son of Man
  - someone like a human son
  - one like a human being
  lexicon: BDAG
  rationale: The Greek lacks the article before υἱὸν, so the phrase is rendered in
    a way that preserves the Danielic allusion without over-specifying it as a fixed
    titular form in the main text. 'One like the Son of Man' is a traditional christological
    rendering and a viable interpretive alternative, but the anarthrous Greek is better
    reflected by 'a son of man' here.
- source_word: ἐνδεδυμένον
  chosen: clothed in
  alternatives:
  - dressed in
  - wearing
  lexicon: BDAG
  rationale: 'A natural rendering of the perfect/middle participial form that preserves
    the stative result: the figure is seen as clothed in this way.'
- source_word: ποδήρη
  chosen: a robe reaching to the feet
  alternatives:
  - a long robe
  - a full-length robe
  lexicon: BDAG
  rationale: The adjective literally denotes something reaching to the feet. Expanding
    it slightly in English communicates the sense clearly without requiring specialized
    vocabulary.
- source_word: περιεζωσμένον
  chosen: girded
  alternatives:
  - belted
  - wrapped
  lexicon: BDAG
  rationale: Keeps the clothing imagery and solemn register. 'Belted' is simpler but
    slightly flatter; 'girded' remains understandable in context.
- source_word: πρὸς τοῖς μαστοῖς
  chosen: across the chest
  alternatives:
  - around the chest
  - at the breasts
  lexicon: BDAG
  rationale: This phrase indicates the location of the sash high on the torso. 'Across
    the chest' is clear, natural English and avoids awkwardness while preserving the
    anatomical reference. 'At the breasts' is more literal but less idiomatic in English.
- source_word: ζώνην χρυσᾶν
  chosen: with a golden sash
  alternatives:
  - with a golden belt
  lexicon: BDAG
  rationale: ζώνη can mean belt or sash; 'sash' better fits the elevated visionary
    description and the placement across the chest.
