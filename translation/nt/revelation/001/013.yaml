theological_decisions:
- issue: Christological force of ὅμοιον υἱὸν ἀνθρώπου
  chosen_reading: Render the phrase as 'one like a son of man' in the main text while
    preserving the traditional titular reading in a footnote.
  alternative_readings:
  - one like the Son of Man
  rationale: This preserves the Greek wording and its Daniel 7 allusion without importing
    a more explicit title than the immediate syntax states. At the same time, because
    Revelation clearly applies the vision to the exalted Jesus, the traditional christological
    reading is worth preserving in a footnote rather than suppressing.
  doctrine_reference: Translation philosophy §§1, 3, 4
