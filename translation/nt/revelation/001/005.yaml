theological_decisions:
- issue: Textual variant in the participle after 'loves us'
  chosen_reading: λύσαντι ... 'freed us'
  alternative_readings:
  - λούσαντι ... 'washed us'
  rationale: The provided SBLGNT text reads λύσαντι ('freed/released'). Because the
    variant λούσαντι ('washed') is both well known and theologically significant,
    the main text follows the base text while preserving the alternative in a footnote.
    This preserves textual transparency without importing a harmonized or traditional
    reading into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Christological title rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine directs that Christological titles be translated rather
    than merely transliterated where context supports. Here Χριστός is titular, so
    'Messiah' is used in the main text.
  doctrine_reference: Translation philosophy §2
