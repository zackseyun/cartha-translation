id: REV.1.5
reference: Revelation 1:5
source:
  edition: SBLGNT
  text: καὶ ἀπὸ Ἰησοῦ Χριστοῦ, ὁ μάρτυς ὁ πιστός, ὁ πρωτότοκος τῶν νεκρῶν καὶ ὁ ἄρχων
    τῶν βασιλέων τῆς γῆς. Τῷ ἀγαπῶντι ἡμᾶς καὶ ⸀λύσαντι ἡμᾶς ⸀ἐκ τῶν ἁμαρτιῶν ἡμῶν
    ἐν τῷ αἵματι αὐτοῦ—
translation:
  text: and from Jesus Messiah, the faithful witness, the firstborn from the dead,
    and the ruler of the kings of the earth. To him who loves us and freed us from
    our sins by his blood—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'washed us from our sins in his blood' instead of
      'freed us from our sins by his blood.'
    reason: textual_variant
  - marker: b
    text: Or 'Jesus Christ.' The Greek title is 'Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than a fixed surname-like name.
    Per doctrine, titles are translated where context supports, so 'Messiah' is preferred
    over the traditional 'Christ.'
- source_word: μάρτυς
  chosen: witness
  alternatives:
  - martyr
  lexicon: BDAG
  rationale: In this context the sense is one who bears testimony, not specifically
    one who dies for that testimony. 'Witness' best matches the lexical sense and
    the immediate appositional titles.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - 'true'
  lexicon: BDAG
  rationale: As a descriptor of μάρτυς, 'faithful' preserves both reliability and
    steadfastness and matches common Johannine usage without flattening the covenantal
    nuance.
- source_word: πρωτότοκος τῶν νεκρῶν
  chosen: the firstborn from the dead
  alternatives:
  - the firstborn of the dead
  - the first to be born from among the dead
  lexicon: BDAG
  rationale: '''Firstborn from the dead'' is the most natural English rendering and
    preserves the metaphorical-biblical force of πρωτότοκος as preeminent one emerging
    from death, without overexplaining in the main text.'
- source_word: ἄρχων
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: BDAG
  rationale: '''Ruler'' clearly conveys authority over ''the kings of the earth.''
    ''Prince'' can sound subordinate or archaic in English and is less precise here.'
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In Revelation's cosmic scope, 'earth' is more likely than 'land,' especially
    in the phrase 'kings of the earth.'
- source_word: ἀγαπῶντι
  chosen: loves
  alternatives:
  - is loving
  lexicon: BDAG
  rationale: The present participle conveys ongoing action. English simple present
    'loves' communicates this naturally without awkwardness.
- source_word: λύσαντι
  chosen: freed
  alternatives:
  - released
  - loosed
  lexicon: BDAG
  rationale: The verb λύω means to loose or release. 'Freed' gives the idiomatic sense
    in relation to sins while preserving the liberation imagery.
- source_word: ἐκ τῶν ἁμαρτιῶν ἡμῶν
  chosen: from our sins
  alternatives:
  - out of our sins
  lexicon: BDAG
  rationale: ἐκ marks separation/source. 'From our sins' is idiomatic and fits the
    liberation sense of λύσαντι.
- source_word: ἐν τῷ αἵματι αὐτοῦ
  chosen: by his blood
  alternatives:
  - in his blood
  - with his blood
  lexicon: BDAG
  rationale: Here ἐν is best rendered instrumentally. 'By his blood' communicates
    means clearly in modern English while preserving sacrificial atonement language.
