id: REV.1.9
reference: Revelation 1:9
source:
  edition: SBLGNT
  text: Ἐγὼ Ἰωάννης, ὁ ἀδελφὸς ὑμῶν καὶ ⸀συγκοινωνὸς ἐν τῇ θλίψει καὶ βασιλείᾳ καὶ
    ὑπομονῇ ⸀ἐν Ἰησοῦ, ἐγενόμην ἐν τῇ νήσῳ τῇ καλουμένῃ Πάτμῳ διὰ τὸν λόγον τοῦ θεοῦ
    ⸀καὶ τὴν μαρτυρίαν ⸀Ἰησοῦ.
translation:
  text: I, John, your brother and fellow participant in the tribulation and kingdom
    and endurance in Jesus, was on the island called Patmos because of the word of
    God and the testimony of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the testimony about Jesus.' The Greek genitive can mean either testimony
      given by Jesus or testimony concerning Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: συγκοινωνός
  chosen: fellow participant
  alternatives:
  - partner
  - sharer
  - fellow partaker
  lexicon: BDAG
  rationale: The term denotes shared participation in something. 'Fellow participant'
    is natural modern English and preserves the idea that John shares with his readers
    in the realities named next, without the commercial overtones 'partner' can carry.
- source_word: ἐν τῇ θλίψει καὶ βασιλείᾳ καὶ ὑπομονῇ
  chosen: in the tribulation and kingdom and endurance
  alternatives:
  - in the affliction and kingdom and perseverance
  - in the suffering and kingdom and patient endurance
  lexicon: BDAG
  rationale: The repeated article governs the three coordinated nouns as a shared
    sphere of participation. 'Tribulation' preserves the weight of θλῖψις in apocalyptic
    context better than the flatter 'trouble.' 'Endurance' is concise and accurate
    for ὑπομονή; 'patient endurance' is possible but slightly interpretive since patience
    is implicit in the noun.
- source_word: ἐν Ἰησοῦ
  chosen: in Jesus
  alternatives:
  - in union with Jesus
  - in Jesus Messiah
  lexicon: BDAG
  rationale: The prepositional phrase most naturally modifies the preceding triad,
    locating tribulation, kingdom, and endurance in relation to Jesus. 'In Jesus'
    preserves the compact theological expression without over-expanding it. 'Messiah'
    is not used here because Ἰησοῦ is the personal name alone, not the title Χριστός.
- source_word: ἐγενόμην ἐν τῇ νήσῳ
  chosen: was on the island
  alternatives:
  - came to be on the island
  - found myself on the island
  lexicon: BDAG
  rationale: γίνομαι here functions idiomatically for being or coming to be in a location.
    'Was on the island' is the clearest English in context and avoids implying a specific
    manner of arrival not stated by the Greek.
- source_word: τῇ καλουμένῃ Πάτμῳ
  chosen: called Patmos
  alternatives:
  - named Patmos
  lexicon: BDAG
  rationale: A standard rendering of the participle καλουμένῃ in apposition to 'island.'
    'Called Patmos' is idiomatic and transparent.
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  chosen: because of the word of God
  alternatives:
  - on account of the word of God
  - for the sake of the word of God
  lexicon: BDAG
  rationale: διά with the accusative indicates cause or reason. 'Because of' is the
    most natural English equivalent here and leaves open whether the cause was proclamation,
    allegiance, or persecution related to God's word.
- source_word: τὴν μαρτυρίαν Ἰησοῦ
  chosen: the testimony of Jesus
  alternatives:
  - the testimony about Jesus
  - the witness of Jesus
  lexicon: BDAG
  rationale: 'The genitive Ἰησοῦ is genuinely ambiguous: it may be subjective (''Jesus''
    testimony'') or objective (''testimony about Jesus''). Following the translation
    philosophy, the main text preserves the more literal ''of Jesus'' and the alternative
    is retained in a footnote rather than being resolved interpretively.'
- source_word: ἀδελφὸς ὑμῶν
  chosen: your brother
  alternatives:
  - your fellow brother
  lexicon: BDAG
  rationale: Singular ἀδελφός refers to John's familial solidarity with the audience
    in Christ. 'Your brother' is direct and natural; no gender-neutral expansion is
    warranted because John refers to himself personally, not to a mixed group with
    a masculine plural.
