theological_decisions:
- issue: Ambiguity of the genitive in 'μαρτυρίαν Ἰησοῦ'
  chosen_reading: Render literally as 'the testimony of Jesus' in the main text
  alternative_readings:
  - the testimony about Jesus
  - the witness of Jesus
  rationale: The phrase is theologically and exegetically disputed in Revelation.
    To preserve the source-text tension rather than resolve it, the main text keeps
    the formal ambiguity, while a footnote preserves the objective-genitive alternative.
    This aligns with the stated philosophy of preserving theological tension where
    the Greek is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
