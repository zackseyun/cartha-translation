theological_decisions:
- issue: Referent of ἄγγελοι τῶν ἑπτὰ ἐκκλησιῶν
  chosen_reading: angels of the seven churches
  alternative_readings:
  - messengers of the seven churches
  rationale: The noun ἄγγελος can denote either heavenly angels or human messengers.
    Because Revelation frequently uses the term for heavenly beings and the text does
    not explicitly identify these as human leaders, the main text keeps 'angels.'
    To preserve interpretive tension, the human-oriented alternative 'messengers'
    is retained in a footnote rather than being excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
