id: REV.1.20
reference: Revelation 1:20
source:
  edition: SBLGNT
  text: τὸ μυστήριον τῶν ἑπτὰ ἀστέρων ⸀οὓς εἶδες ἐπὶ τῆς δεξιᾶς μου, καὶ τὰς ἑπτὰ
    λυχνίας τὰς χρυσᾶς· οἱ ἑπτὰ ἀστέρες ἄγγελοι τῶν ἑπτὰ ἐκκλησιῶν εἰσίν, καὶ αἱ λυχνίαι
    αἱ ἑπτὰ ἑπτὰ ἐκκλησίαι εἰσίν.
translation:
  text: 'As for the mystery of the seven stars that you saw in my right hand, and
    the seven golden lampstands: the seven stars are the angels of the seven churches,
    and the seven lampstands are the seven churches.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messengers of the seven churches.' The Greek word can refer either to
      angels or to human messengers.
    reason: alternative_reading
lexical_decisions:
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  - symbolic meaning
  lexicon: BDAG
  rationale: Retains the apocalyptic/theological term rather than flattening it to
    'symbolic meaning.' In context it refers to the revealed significance of the vision,
    but 'mystery' preserves the source term and biblical resonance.
- source_word: ἀστέρων / ἀστέρες
  chosen: stars
  lexicon: BDAG
  rationale: Straightforward literal rendering of the visionary symbol; the following
    clause explains their referent.
- source_word: οὓς εἶδες
  chosen: that you saw
  alternatives:
  - which you saw
  lexicon: BDAG
  rationale: Uses natural modern English while preserving the relative clause modifying
    'stars.'
- source_word: ἐπὶ τῆς δεξιᾶς μου
  chosen: in my right hand
  alternatives:
  - on my right hand
  - at my right hand
  lexicon: BDAG
  rationale: Although ἐπί with genitive can be rendered variously, in this visionary
    context English idiom strongly favors 'in my right hand,' matching the image established
    in the immediate context.
- source_word: λυχνίας
  chosen: lampstands
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: λυχνία denotes a lampstand rather than the lamp itself; 'lampstands'
    preserves the concrete image used throughout the passage.
- source_word: χρυσᾶς
  chosen: golden
  alternatives:
  - made of gold
  lexicon: BDAG
  rationale: '''Golden'' is concise, natural, and adequately conveys the adjectival
    description.'
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: The Greek term can mean either 'angels' or 'messengers.' In Revelation,
    the supernatural sense is common and traditional; the text itself does not resolve
    the referent, so 'angels' is kept in the main text and 'messengers' preserved
    in a footnote.
- source_word: ἐκκλησιῶν / ἐκκλησίαι
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: '''Churches'' is the standard and contextually appropriate rendering
    for the congregations addressed in Revelation. ''Assemblies'' is lexically possible
    but less idiomatic here.'
- source_word: τὸ μυστήριον ... καὶ ...
  chosen: 'As for the mystery of ... and ...:'
  alternatives:
  - 'The mystery of ... and ... is this:'
  lexicon: BDAG
  rationale: The Greek presents the topic and then gives its explanation. 'As for
    ...:' is a natural English way to introduce the explanatory identification that
    follows without adding content not present in the text.
