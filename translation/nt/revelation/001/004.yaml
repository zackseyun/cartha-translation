id: REV.1.4
reference: Revelation 1:4
source:
  edition: SBLGNT
  text: Ἰωάννης ταῖς ἑπτὰ ἐκκλησίαις ταῖς ἐν τῇ Ἀσίᾳ· χάρις ὑμῖν καὶ εἰρήνη ⸀ἀπὸ ὁ
    ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος, καὶ ἀπὸ τῶν ἑπτὰ πνευμάτων ἃ ἐνώπιον τοῦ θρόνου αὐτοῦ,
translation:
  text: 'John, to the seven churches in Asia: Grace to you and peace from him who
    is, and who was, and who is coming, and from the seven spirits who are before
    his throne,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'from the one who is and who was and who is to come.'
    reason: lexical_alternative
  - marker: b
    text: '''The seven spirits'' may refer symbolically to the fullness of the Holy
      Spirit, or to seven heavenly spirits; the Greek text itself reads ''seven spirits.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰωάννης
  chosen: John
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: ταῖς ἑπτὰ ἐκκλησίαις
  chosen: to the seven churches
  alternatives:
  - to the seven assemblies
  lexicon: BDAG
  rationale: ἐκκλησία can mean assembly or church. In Revelation's epistolary and
    Christian context, 'churches' is the most natural and established sense without
    obscuring meaning.
- source_word: ἐν τῇ Ἀσίᾳ
  chosen: in Asia
  alternatives:
  - in the province of Asia
  lexicon: BDAG
  rationale: Ἀσία here refers to the Roman province in Asia Minor, not the modern
    continent. The simple 'Asia' preserves the Greek wording; the provincial sense
    can be clarified in a footnote if needed, but the phrase is commonly understood
    in this context.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  chosen: Grace to you and peace
  alternatives:
  - Grace and peace to you
  lexicon: BDAG
  rationale: This preserves the conventional epistolary blessing while following the
    Greek order closely enough. 'Grace to you and peace' is natural English and keeps
    the dative ὑμῖν explicit.
- source_word: ἀπὸ ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος
  chosen: from him who is, and who was, and who is coming
  alternatives:
  - from the one who is and who was and who is to come
  lexicon: BDAG
  rationale: The Greek is intentionally irregular after ἀπό, likely preserving a divine
    title rather than conforming grammar. 'Him who is' communicates the personal referent
    clearly in English. For ὁ ἐρχόμενος, 'who is coming' is more directly verbal than
    the traditional 'who is to come' and preserves the present participial force.
- source_word: τῶν ἑπτὰ πνευμάτων
  chosen: the seven spirits
  alternatives:
  - the sevenfold Spirit
  lexicon: BDAG
  rationale: The Greek is plural and should be rendered as such in the main text.
    Rendering it 'sevenfold Spirit' would interpret rather than translate. Because
    the phrase is theologically debated, the alternative interpretive understanding
    is better preserved in a footnote or theological note rather than adopted in the
    text.
- source_word: ἃ ἐνώπιον τοῦ θρόνου αὐτοῦ
  chosen: who are before his throne
  alternatives:
  - which are before his throne
  lexicon: BDAG
  rationale: Although the relative pronoun is neuter plural, English commonly uses
    'who' for personal/spiritual beings. Given the exalted heavenly context, 'who'
    reads more naturally than 'which' without overdefining the ontology.
