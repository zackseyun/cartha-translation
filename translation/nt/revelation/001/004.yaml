theological_decisions:
- issue: Identity of 'him who is, and who was, and who is coming'
  chosen_reading: A divine title for God, expressed personally as 'him who is, and
    who was, and who is coming.'
  alternative_readings:
  - 'A more literal but less idiomatic rendering: ''the one who is and who was and
    who is to come'''
  rationale: The phrase functions as a reverential divine designation and is grammatically
    unusual in Greek. The translation preserves its titular force and personal reference
    without smoothing away the solemnity.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Identity of 'the seven spirits'
  chosen_reading: Retain the literal phrase 'the seven spirits' in the main text.
  alternative_readings:
  - A symbolic reference to the fullness of the Holy Spirit
  - Seven angelic spirits before God's throne
  rationale: The phrase is debated, and the Greek text itself says 'seven spirits.'
    To preserve theological tension rather than resolve it, the main text remains
    literal and alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3
