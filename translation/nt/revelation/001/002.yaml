theological_decisions:
- issue: Genitive ambiguity in 'ἡ μαρτυρία Ἰησοῦ Χριστοῦ'
  chosen_reading: Preserved as 'the testimony of Jesus the Messiah' without resolving
    whether it means testimony from Jesus or testimony about Jesus.
  alternative_readings:
  - the testimony from Jesus the Messiah
  - the testimony about Jesus the Messiah
  rationale: The Greek genitive is genuinely ambiguous, and the translation philosophy
    requires preserving theological tension rather than resolving it where the source
    does not force a choice. The main text keeps the ambiguity; alternatives are preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Rendering Χριστοῦ as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt specifies 'Messiah' where Χριστός functions as a
    title. Here the title sense is still active, so 'Jesus the Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
