id: REV.1.2
reference: Revelation 1:2
source:
  edition: SBLGNT
  text: ὃς ἐμαρτύρησεν τὸν λόγον τοῦ θεοῦ καὶ τὴν μαρτυρίαν Ἰησοῦ Χριστοῦ, ὅσα εἶδεν.
translation:
  text: who testified to the word of God and to the testimony of Jesus the Messiah—all
    that he saw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the testimony from Jesus the Messiah' or 'the testimony about Jesus
      the Messiah.' The Greek can be read either way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμαρτύρησεν
  chosen: testified
  alternatives:
  - bore witness
  - gave testimony
  lexicon: BDAG
  rationale: Aorist indicative of μαρτυρέω. 'Testified' is clear modern English and
    preserves the forensic/witness sense without sounding overly wooden. 'Bore witness'
    is viable but less natural here.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος here most naturally means 'word' in the sense of God's communicated
    word. 'Message' is possible, but 'word of God' is a stable biblical expression
    and fits the likely allusion to prophetic revelation.
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Cognate with ἐμαρτύρησεν; rendering it 'testimony' preserves the noun-verb
    relationship while sounding natural in English. 'Witness' is possible but less
    idiomatic after 'testified to.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  - Jesus Messiah
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. In Revelation 1:1–2 the title sense remains
    strong, so 'Jesus the Messiah' best preserves meaning.
- source_word: ὅσα εἶδεν
  chosen: all that he saw
  alternatives:
  - what he saw
  - everything he saw
  lexicon: BDAG
  rationale: ὅσα is plural/neuter and has an expansive sense, so 'all that he saw'
    captures the comprehensiveness of the relative clause. It also reads smoothly
    as an appositional summary of the preceding objects.
- source_word: τὸν λόγον τοῦ θεοῦ καὶ τὴν μαρτυρίαν Ἰησοῦ Χριστοῦ
  chosen: the word of God and the testimony of Jesus the Messiah
  alternatives:
  - the word from God and the testimony about Jesus the Messiah
  - the word of God, that is, the testimony of Jesus the Messiah
  lexicon: BDAG
  rationale: The two accusatives are retained as coordinated objects of 'testified
    to.' The genitive in 'testimony of Jesus' is potentially ambiguous (subjective
    or objective), but a formally closer rendering preserves that tension in the main
    text.
