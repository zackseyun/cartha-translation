theological_decisions:
- issue: Nature of the sword-from-the-mouth imagery
  chosen_reading: Retain the visionary metaphor without interpretive expansion.
  alternative_readings:
  - Explicitly interpret the sword as Christ's judging word
  rationale: The verse presents symbolic apocalyptic imagery. While the broader canon
    supports the association of the sword with divine judgment or the word of God,
    the translation should not import that interpretation into the main text here.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
