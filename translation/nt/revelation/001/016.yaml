id: REV.1.16
reference: Revelation 1:16
source:
  edition: SBLGNT
  text: καὶ ἔχων ἐν τῇ δεξιᾷ ⸂χειρὶ αὐτοῦ⸃ ἀστέρας ἑπτά, καὶ ἐκ τοῦ στόματος αὐτοῦ
    ῥομφαία δίστομος ὀξεῖα ἐκπορευομένη, καὶ ἡ ὄψις αὐτοῦ ὡς ὁ ἥλιος φαίνει ἐν τῇ
    δυνάμει αὐτοῦ.
translation:
  text: And he had seven stars in his right hand, and from his mouth came a sharp
    two-edged sword, and his appearance was like the sun shining in its strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a sharp double-edged sword."
    reason: lexical_alternative
  - marker: b
    text: Or "shining in its full strength."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  chosen: he had
  alternatives:
  - having
  lexicon: BDAG
  rationale: The participle is coordinated with the surrounding visionary description.
    English finite verb style reads naturally here while preserving the ongoing descriptive
    force.
- source_word: ἐν τῇ δεξιᾷ χειρὶ αὐτοῦ
  chosen: in his right hand
  alternatives:
  - in his right
  lexicon: BDAG
  rationale: χείρ is explicit in the Greek and should be retained in English. δεξιᾷ
    is rendered adjectivally with 'hand' for natural English.
- source_word: ἀστέρας ἑπτά
  chosen: seven stars
  alternatives:
  - seven stars
  lexicon: BDAG
  rationale: Straightforward rendering; English reverses the order for idiomatic style.
- source_word: ῥομφαία
  chosen: sword
  alternatives:
  - large sword
  - broadsword
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword, but 'sword' is the standard clear English
    rendering in Revelation. The modifying imagery carries the force without over-specifying
    the weapon type.
- source_word: δίστομος
  chosen: two-edged
  alternatives:
  - double-edged
  lexicon: BDAG
  rationale: Literally 'two-mouthed,' idiomatically 'two-edged.' This preserves the
    established metaphor in accessible English.
- source_word: ὀξεῖα
  chosen: sharp
  alternatives:
  - keen
  - sharp
  lexicon: BDAG
  rationale: Natural rendering of the adjective modifying sword; retained because
    the Greek includes both edge-description and sharpness.
- source_word: ἐκπορευομένη
  chosen: came
  alternatives:
  - coming out
  - proceeding
  lexicon: BDAG
  rationale: The participle describes the sword as issuing from his mouth. 'Came'
    in English with 'from his mouth' gives a natural finite clause while preserving
    the image. 'Proceeding' is more formal but less readable.
- source_word: ἡ ὄψις αὐτοῦ
  chosen: his appearance
  alternatives:
  - his face
  - his countenance
  - his appearance
  lexicon: BDAG
  rationale: ὄψις refers to visible appearance or aspect, not strictly the face alone.
    'Appearance' best matches the lexical range without narrowing the image.
- source_word: ὡς ὁ ἥλιος φαίνει
  chosen: like the sun shining
  alternatives:
  - as the sun shines
  - like the sun when it shines
  lexicon: BDAG
  rationale: The present verb φαίνει is rendered with an English participial construction
    for smooth comparison while preserving the ongoing brilliance.
- source_word: ἐν τῇ δυνάμει αὐτοῦ
  chosen: in its strength
  alternatives:
  - in its full strength
  - in its power
  lexicon: BDAG
  rationale: δύναμις here refers to the sun's full force or intensity. 'In its strength'
    is close to the Greek and idiomatic; 'full strength' is interpretive but worth
    preserving in a footnote.
