id: REV.1.1
reference: Revelation 1:1
source:
  edition: SBLGNT
  text: Ἀποκάλυψις Ἰησοῦ Χριστοῦ, ἣν ἔδωκεν αὐτῷ ὁ θεὸς δεῖξαι τοῖς δούλοις αὐτοῦ,
    ἃ δεῖ γενέσθαι ἐν τάχει, καὶ ἐσήμανεν ἀποστείλας διὰ τοῦ ἀγγέλου αὐτοῦ τῷ δούλῳ
    αὐτοῦ Ἰωάννῃ,
translation:
  text: The revelation of Jesus Messiah, which God gave him to show his slaves what
    must happen soon, and he signified it by sending it through his angel to his slave
    John,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The revelation from Jesus Messiah' or 'The revelation about Jesus Messiah.'
      The Greek genitive can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Or 'quickly.' The phrase may mean either that these things will happen soon
      or that they will happen swiftly once they begin.
    reason: lexical_alternative
  - marker: c
    text: The verb can also be rendered 'made it known'; 'signified' preserves the
      nuance of communication by signs, fitting the symbolic character of the book.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκάλυψις
  chosen: revelation
  alternatives:
  - unveiling
  - disclosure
  lexicon: BDAG
  rationale: Standard sense is an uncovering or disclosure. 'Revelation' is natural
    English and preserves the book's traditional incipit without distorting the noun's
    meaning.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  - the Messiah Jesus
  lexicon: BDAG
  rationale: 'The genitive phrase is best rendered with the title translated per project
    guidance: Χριστός as ''Messiah'' where title is in view rather than a fixed surname-like
    form. The genitive itself is ambiguous (''from Jesus Messiah'' or ''about Jesus
    Messiah''), but in context the following clause ''which God gave him'' favors
    possession/source in a broad sense, so ''of Jesus Messiah'' is retained in English.'
- source_word: ἣν ἔδωκεν αὐτῷ ὁ θεὸς
  chosen: which God gave him
  alternatives:
  - which God gave to him
  lexicon: BDAG
  rationale: Straightforward relative clause. 'Him' refers to Jesus Messiah, preserving
    the text's distinction between God and Jesus without importing further doctrinal
    explanation.
- source_word: δεῖξαι
  chosen: to show
  alternatives:
  - to make known
  - to reveal
  lexicon: BDAG
  rationale: Infinitive of purpose after 'gave him.' 'Show' is the plain sense and
    fits the visionary context.
- source_word: τοῖς δούλοις αὐτοῦ
  chosen: his slaves
  alternatives:
  - his servants
  - his bondservants
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    belonging is theologically salient. In Revelation, believers are repeatedly designated
    as belonging to God/Christ in a master-slave relation, so 'slaves' best preserves
    that force.
- source_word: ἃ δεῖ γενέσθαι
  chosen: what must happen
  alternatives:
  - the things that must take place
  - what must come to pass
  lexicon: BDAG
  rationale: This compresses the neuter plural relative with impersonal δεῖ into idiomatic
    English while preserving necessity.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in a short time
  lexicon: BDAG
  rationale: The phrase can denote temporal nearness or rapidity. In this context,
    'soon' is the most natural English rendering for what is to happen in the near/impending
    future, while an alternative is worth preserving in a footnote because some understand
    it as 'quickly' once begun.
- source_word: ἐσήμανεν
  chosen: signified it
  alternatives:
  - made it known
  - communicated it by signs
  lexicon: BDAG
  rationale: σημαίνω can mean to make known, often with the nuance of indicating by
    signs. Because Revelation is a symbolic apocalypse, 'signified it' preserves that
    nuance better than the flatter 'made it known.'
- source_word: ἀποστείλας
  chosen: by sending it
  alternatives:
  - having sent it
  - sending
  lexicon: BDAG
  rationale: Aorist participle expressing means attendant to ἐσήμανεν. 'By sending
    it' makes the instrumental force clear in natural English.
- source_word: διὰ τοῦ ἀγγέλου αὐτοῦ
  chosen: through his angel
  alternatives:
  - by means of his angel
  lexicon: BDAG
  rationale: διά with genitive indicates agency/intermediary. 'Angel' is the standard
    rendering for ἄγγελος here.
- source_word: τῷ δούλῳ αὐτοῦ Ἰωάννῃ
  chosen: to his slave John
  alternatives:
  - to his servant John
  - to John his slave
  lexicon: BDAG
  rationale: For consistency with τοῖς δούλοις above, δοῦλος is rendered 'slave' here
    as well. The dative marks the recipient John.
