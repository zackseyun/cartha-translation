theological_decisions:
- issue: Genitive in Ἀποκάλυψις Ἰησοῦ Χριστοῦ
  chosen_reading: Rendered 'The revelation of Jesus Messiah' without resolving whether
    the genitive is primarily subjective ('from') or objective ('about').
  alternative_readings:
  - The revelation from Jesus Messiah
  - The revelation about Jesus Messiah
  rationale: The Greek genitive permits more than one nuance, and the immediate clause
    shows that God gave the revelation to Jesus. Retaining 'of' preserves the ambiguity/tension
    rather than over-resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering δοῦλος in Revelation 1:1
  chosen_reading: slave/slaves
  alternative_readings:
  - servant/servants
  - bondservant/bondservants
  rationale: The project default allows 'servant / slave' context-dependently. Here
    the belonging relation to God/Jesus is prominent, so 'slave' better preserves
    the bonded nature of the term.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος.
