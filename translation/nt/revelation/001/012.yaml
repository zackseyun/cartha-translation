theological_decisions:
- issue: Rendering the symbolic object λυχνίας in an apocalyptic context
  chosen_reading: lampstands
  alternative_readings:
  - lamps
  rationale: The term should remain concrete and precise because Revelation 1:20 later
    identifies the seven lampstands symbolically. Rendering it as 'lamps' would blur
    the imagery and weaken intertextual/theological coherence.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
