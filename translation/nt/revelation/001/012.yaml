id: REV.1.12
reference: Revelation 1:12
source:
  edition: SBLGNT
  text: ⸀Καὶ ἐπέστρεψα βλέπειν τὴν φωνὴν ἥτις ἐλάλει μετ’ ἐμοῦ· καὶ ἐπιστρέψας εἶδον
    ἑπτὰ λυχνίας χρυσᾶς,
translation:
  text: And I turned to see the voice that was speaking with me, and when I turned,
    I saw seven golden lampstands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was speaking to me.' The Greek literally says 'was speaking with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψα
  chosen: I turned
  alternatives:
  - I turned around
  lexicon: BDAG
  rationale: Aorist active indicative of ἐπιστρέφω, here in a physical sense of turning
    oneself. 'I turned' is natural and sufficiently precise; 'turned around' is possible
    but slightly more expansive than the Greek requires.
- source_word: βλέπειν
  chosen: to see
  alternatives:
  - to look at
  lexicon: BDAG
  rationale: 'The complementary infinitive after ἐπέστρεψα expresses purpose/result:
    John turned in order to perceive the source of the voice. ''To see'' fits idiomatic
    English in this construction better than ''to look at.'''
- source_word: φωνὴν
  chosen: the voice
  alternatives:
  - the sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' in contexts of speech. Since the relative
    clause specifies that it 'was speaking with me,' 'voice' is the most contextually
    accurate rendering.
- source_word: ἥτις
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: The qualitative/indefinite relative is naturally rendered in English
    by 'that' here. 'Which' is possible but less idiomatic in contemporary Bible English.
- source_word: ἐλάλει μετ’ ἐμοῦ
  chosen: was speaking with me
  alternatives:
  - was speaking to me
  - was talking with me
  lexicon: BDAG
  rationale: The imperfect ἐλάλει conveys ongoing action, well represented by 'was
    speaking.' μετά with the genitive can mean association ('with'), though in English
    'speaking to me' is also idiomatic. 'With me' preserves the Greek preposition
    more closely without distorting sense.
- source_word: ἐπιστρέψας
  chosen: when I turned
  alternatives:
  - having turned
  - after turning
  lexicon: BDAG
  rationale: The aorist participle is adverbial and antecedent to εἶδον. 'When I turned'
    is smooth modern English and preserves the temporal sequence.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Simple aorist of ὁράω, straightforwardly 'I saw.' No expansion is needed.
- source_word: ἑπτὰ
  chosen: seven
  lexicon: BDAG
  rationale: Direct cardinal numeral; no ambiguity.
- source_word: λυχνίας
  chosen: lampstands
  alternatives:
  - lamps
  - lampstands/candelabra
  lexicon: BDAG
  rationale: λυχνία denotes a lampstand rather than the lamp itself. 'Lampstands'
    is the standard and most precise rendering, especially important in Revelation
    where the image is later interpreted.
- source_word: χρυσᾶς
  chosen: golden
  alternatives:
  - of gold
  lexicon: BDAG
  rationale: The adjective χρυσᾶς can be rendered either attributively ('golden')
    or as a material phrase ('of gold'). 'Golden lampstands' is concise and natural,
    while still conveying material/splendor.
