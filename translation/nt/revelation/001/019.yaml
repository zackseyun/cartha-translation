id: REV.1.19
reference: Revelation 1:19
source:
  edition: SBLGNT
  text: γράψον οὖν ἃ εἶδες καὶ ἃ εἰσὶν καὶ ἃ μέλλει ⸀γίνεσθαι μετὰ ταῦτα.
translation:
  text: Therefore write what you have seen, and what is, and what is about to happen
    after these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what will happen after these things.' The verb may in some contexts
      function nearly as a simple future, though it often carries the sense of what
      is about to occur.
    reason: alternative_reading
lexical_decisions:
- source_word: γράψον
  chosen: write
  alternatives:
  - record
  - write down
  lexicon: BDAG
  rationale: Aorist active imperative, second person singular; the straightforward
    command 'write' best preserves the force without adding interpretive nuance.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference or continuation from the preceding commissioning vision.
    'Therefore' preserves the connective force more clearly than the looser 'then'.
- source_word: ἃ εἶδες
  chosen: what you have seen
  alternatives:
  - the things you saw
  - what you saw
  lexicon: BDAG
  rationale: The relative pronoun with aorist verb refers to the visionary content
    already seen. 'What you have seen' is idiomatic English and keeps the relation
    to the present commission.
- source_word: ἃ εἰσὶν
  chosen: what is
  alternatives:
  - the things that are
  - what exists now
  lexicon: BDAG
  rationale: Neuter plural relative with plural verb is rendered idiomatically in
    English as singular collective 'what is.' This preserves the sense of present
    realities without awkwardness.
- source_word: μέλλει γίνεσθαι
  chosen: is about to happen
  alternatives:
  - will happen
  - is going to take place
  - is destined to happen
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys imminence or impending action. 'Is
    about to happen' preserves that force better than the flatter future 'will happen.'
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: BDAG
  rationale: A temporal phrase meaning 'after these things.' This more formally reflects
    the plural demonstrative and matches Revelation's recurring phrasing.
