theological_decisions:
- issue: Temporal force of μέλλει in apocalyptic context
  chosen_reading: 'Render with imminence: ''is about to happen'''
  alternative_readings:
  - 'Render as simple future: ''will happen'''
  rationale: The Greek construction naturally carries a sense of what is impending.
    Retaining that force avoids flattening the text's temporal tension, while not
    resolving broader eschatological debates beyond what the wording itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
