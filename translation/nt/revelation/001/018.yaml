id: REV.1.18
reference: Revelation 1:18
source:
  edition: SBLGNT
  text: καὶ ὁ ζῶν— καὶ ἐγενόμην νεκρὸς καὶ ἰδοὺ ζῶν εἰμι εἰς τοὺς αἰῶνας τῶν ⸀αἰώνων—
    καὶ ἔχω τὰς κλεῖς τοῦ θανάτου καὶ τοῦ ᾅδου.
translation:
  text: and the Living One—I became dead, and behold, I am alive forever and ever—and
    I have the keys of death and of Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I was dead'; the Greek says 'I became dead,' emphasizing
      the transition into death.
    reason: lexical_alternative
  - marker: b
    text: Greek 'to the ages of the ages,' an idiom meaning unending duration.
    reason: lexical_alternative
  - marker: c
    text: '''Hades'' refers to the realm of the dead, not specifically to final punishment.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ζῶν
  chosen: the Living One
  alternatives:
  - the one who lives
  - the living one
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally as a title. 'The
    Living One' preserves the titular force and echoes divine self-description without
    flattening it into a mere verbal clause.
- source_word: ἐγενόμην νεκρός
  chosen: I became dead
  alternatives:
  - I became dead
  - I was dead
  lexicon: BDAG
  rationale: γίνομαι with predicate adjective is more literally 'became dead' rather
    than simple stative 'was dead.' This preserves the transition into death, fitting
    the death-resurrection sequence. Although 'I was dead' is smoother English, the
    chosen rendering better reflects the Greek verbal nuance.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the vivid deictic/interjectional force of the Greek in an elevated
    but still intelligible register appropriate to Revelation.
- source_word: ζῶν εἰμι
  chosen: I am alive
  alternatives:
  - I live
  - I am living
  lexicon: BDAG
  rationale: Idiomatic English for the present state expressed by participle plus
    εἰμί, while preserving the contrast with 'became dead.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the emphatic eternal-duration formula.
    The more literal alternatives are preserved conceptually but are less natural
    in modern English.
- source_word: κλεῖς
  chosen: keys
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; in context it signifies authority
    or control.
- source_word: τοῦ θανάτου
  chosen: of death
  alternatives:
  - of Death
  lexicon: BDAG
  rationale: Genitive after 'keys' is rendered directly. Lowercase 'death' is preferred
    because the Greek does not require personification here, though the imagery may
    evoke it.
- source_word: τοῦ ᾅδου
  chosen: of Hades
  alternatives:
  - of the grave
  - of the realm of the dead
  - of hell
  lexicon: BDAG
  rationale: ᾅδης is best rendered 'Hades' to distinguish it from final punishment
    and to avoid collapsing it into either mere burial ('grave') or Gehenna-like 'hell.'
    This preserves the Greek term's conceptual specificity.
