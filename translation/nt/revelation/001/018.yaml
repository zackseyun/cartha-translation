theological_decisions:
- issue: Rendering ᾅδης in an eschatological context
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: To remain theologically precise, the verse distinguishes death and ᾅδης
    as related but not identical realities. 'Hades' avoids importing later doctrinal
    associations of 'hell' and avoids reducing the term to the physical grave alone.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
