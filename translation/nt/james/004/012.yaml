id: JAS.4.12
reference: James 4:12
source:
  edition: SBLGNT
  text: εἷς ⸀ἐστιν νομοθέτης ⸂καὶ κριτής⸃, ὁ δυνάμενος σῶσαι καὶ ἀπολέσαι· σὺ δὲ τίς
    εἶ, ⸂ὁ κρίνων⸃ τὸν ⸀πλησίον;
translation:
  text: There is one Lawgiver and Judge, the one who is able to save and to destroy.
    But who are you, judging your neighbor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only one Lawgiver and Judge.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one judging the neighbor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς
  chosen: one
  alternatives:
  - only one
  lexicon: BDAG
  rationale: 'Predicate emphasis: ''There is one...'' naturally conveys the singularity
    asserted by εἷς without over-expanding the text. ''Only one'' is interpretively
    equivalent but slightly more explicit than the Greek wording.'
- source_word: νομοθέτης
  chosen: Lawgiver
  alternatives:
  - lawgiver
  - one who gives the law
  lexicon: BDAG
  rationale: Rendered as the title 'Lawgiver' to preserve the compact nominative predicate
    and the judicial-legislative force of the term. Capitalized because it functions
    here as a divine title in context.
- source_word: κριτής
  chosen: Judge
  alternatives:
  - judge
  lexicon: BDAG
  rationale: Rendered 'Judge' as a coordinate divine title with νομοθέτης. Capitalized
    for the same reason as 'Lawgiver.'
- source_word: ὁ δυνάμενος
  chosen: the one who is able
  alternatives:
  - who is able
  - the one able
  lexicon: BDAG
  rationale: The article plus participle is substantival; 'the one who is able' preserves
    that structure and links the titles to God's unique authority.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to rescue
  lexicon: BDAG
  rationale: '''Save'' is the standard gloss and preserves the broader theological
    and judicial range of σῴζω better than the narrower ''rescue.'''
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to ruin
  - to bring to destruction
  lexicon: BDAG
  rationale: '''Destroy'' is the most direct and idiomatic rendering here, matching
    the antithesis with ''save'' and preserving the gravity of divine judgment without
    specifying annihilation.'
- source_word: σὺ δὲ τίς εἶ
  chosen: But who are you
  alternatives:
  - But you—who are you
  - And who are you
  lexicon: BDAG
  rationale: δέ is adversative in context, contrasting human presumption with divine
    prerogative; 'But who are you' is natural English and preserves the rebuking force.
- source_word: ὁ κρίνων
  chosen: judging
  alternatives:
  - the one judging
  - who judge
  lexicon: BDAG
  rationale: An English participial construction after 'who are you' is the most natural
    equivalent and retains the ongoing/characterizing force of the present participle.
- source_word: τὸν πλησίον
  chosen: your neighbor
  alternatives:
  - the neighbor
  - your fellow man
  lexicon: BDAG
  rationale: Although the article is present, English idiom in this direct rebuke
    favors 'your neighbor.' It captures the relational sense of πλησίον in context
    and echoes biblical ethical usage.
