theological_decisions:
- issue: Divine identity of the 'one Lawgiver and Judge'
  chosen_reading: The phrase refers to God as the uniquely authoritative giver of
    law and judge.
  alternative_readings:
  - A more generic statement about singular judicial authority
  rationale: In James 4:11–12 the warning against judging a brother/neighbor grounds
    itself in God's sole authority over law and judgment. The translation preserves
    this without adding doctrinal material beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Force of 'destroy'
  chosen_reading: '''Destroy'' denotes God''s authority to bring final judgment/ruin,
    without specifying the metaphysical nature of that destruction.'
  alternative_readings:
  - annihilate
  - condemn
  rationale: The text states divine ability 'to save and to destroy' but does not
    define the mechanics of judgment. The rendering preserves the theological tension
    and avoids importing a specific doctrine of final punishment.
  doctrine_reference: Translation philosophy §3
