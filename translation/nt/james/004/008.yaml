id: JAS.4.8
reference: James 4:8
source:
  edition: SBLGNT
  text: ἐγγίσατε τῷ θεῷ, καὶ ⸀ἐγγιεῖ ὑμῖν. καθαρίσατε χεῖρας, ἁμαρτωλοί, καὶ ἁγνίσατε
    καρδίας, δίψυχοι.
translation:
  text: Draw near to God, and he will draw near to you. Cleanse your hands, sinners,
    and purify your hearts, double-minded people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “two-souled.” The term describes a person divided in
      loyalty or inner commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίσατε
  chosen: Draw near
  alternatives:
  - Come near
  - Approach
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural. 'Draw near' is idiomatic,
    preserves the relational/spiritual sense of approaching God, and matches the parallel
    future clause.
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Simple dative object after ἐγγίζω; rendered straightforwardly.
- source_word: ἐγγιεῖ
  chosen: he will draw near
  alternatives:
  - he will come near
  lexicon: BDAG
  rationale: Future active indicative, third person singular, with God as the implied
    subject from the prior clause. Repeating 'draw near' preserves the verbal parallelism
    in Greek.
- source_word: καθαρίσατε
  chosen: Cleanse
  alternatives:
  - Wash clean
  - Purify
  lexicon: BDAG
  rationale: Aorist active imperative. 'Cleanse' fits both ritual and moral overtones
    without over-paraphrasing. It also preserves the sharp imperative force.
- source_word: χεῖρας
  chosen: your hands
  alternatives:
  - hands
  lexicon: BDAG
  rationale: Although 'your' is not explicit in Greek, English idiom naturally supplies
    it in direct address. 'Hands' likely carries metaphorical force for outward conduct
    while retaining the literal image.
- source_word: ἁμαρτωλοί
  chosen: sinners
  alternatives:
  - you sinners
  lexicon: BDAG
  rationale: Vocative plural. 'Sinners' preserves the direct rebuke. Adding 'you'
    is possible in English but not necessary.
- source_word: ἁγνίσατε
  chosen: purify
  alternatives:
  - make pure
  - cleanse
  lexicon: BDAG
  rationale: 'Aorist active imperative. Distinguished from καθαρίσατε to preserve
    James''s lexical variation: outward cleansing (''hands'') and inward purification
    (''hearts'').'
- source_word: καρδίας
  chosen: your hearts
  alternatives:
  - hearts
  lexicon: BDAG
  rationale: As with 'hands,' English idiom naturally supplies 'your.' 'Hearts' in
    biblical usage denotes the inner person, especially motives and loyalties.
- source_word: δίψυχοι
  chosen: double-minded people
  alternatives:
  - double-minded
  - two-souled
  lexicon: BDAG
  rationale: Vocative plural adjective meaning divided in inner loyalty or allegiance.
    'Double-minded people' makes the sense clear in natural English while avoiding
    the opaque literalism of 'two-souled.'
