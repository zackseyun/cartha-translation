theological_decisions:
- issue: Metaphorical versus overly literal rendering of moral exhortation
  chosen_reading: Retain the bodily imagery ('hands,' 'hearts') while allowing its
    ethical force to stand without interpretive expansion.
  alternative_readings:
  - Paraphrase as outward actions and inward motives
  rationale: James likely invokes purification language with both moral and possibly
    cultic resonance. The translation preserves the imagery and theological tension
    rather than resolving it into a paraphrase.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering δίψυχοι in accessible modern English
  chosen_reading: Translate as 'double-minded people' in the main text.
  alternative_readings:
  - double-minded
  - two-souled
  rationale: The Greek denotes divided inner allegiance. 'Double-minded people' is
    clearer for modern readers while preserving the rebuke. The more literal 'two-souled'
    is worth preserving in a footnote because it reflects the vivid Greek image.
  doctrine_reference: Translation philosophy §6
