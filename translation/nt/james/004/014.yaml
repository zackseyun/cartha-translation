id: JAS.4.14
reference: James 4:14
source:
  edition: SBLGNT
  text: οἵτινες οὐκ ἐπίστασθε ⸀τὸ τῆς αὔριον ⸀ποία ἡ ζωὴ ὑμῶν· ἀτμὶς γάρ ⸀ἐστε ⸀ἡ
    πρὸς ὀλίγον φαινομένη, ⸀ἔπειτα καὶ ἀφανιζομένη·
translation:
  text: You do not know what tomorrow will bring. What is your life? For you are a
    mist that appears for a little while and then vanishes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vapor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστασθε
  chosen: you do not know
  alternatives:
  - you do not understand
  - you are not acquainted with
  lexicon: BDAG
  rationale: The verb denotes knowing or understanding. In this context of human ignorance
    about the future, 'know' is the most natural and direct English rendering.
- source_word: τὸ τῆς αὔριον
  chosen: what tomorrow will bring
  alternatives:
  - the thing of tomorrow
  - what belongs to tomorrow
  - tomorrow's circumstances
  lexicon: BDAG
  rationale: The idiom is elliptical and refers to what pertains to tomorrow. A too-literal
    rendering ('the thing of tomorrow') is awkward in English; 'what tomorrow will
    bring' captures the sense without over-paraphrasing.
- source_word: ποία ἡ ζωὴ ὑμῶν
  chosen: What is your life?
  alternatives:
  - What kind of thing is your life?
  - What is your life like?
  lexicon: BDAG
  rationale: The interrogative ποία asks about the nature or quality of life. 'What
    is your life?' preserves the rhetorical force and traditional compactness while
    remaining clear.
- source_word: ἀτμὶς
  chosen: mist
  alternatives:
  - vapor
  - breath
  lexicon: BDAG
  rationale: '''Mist'' communicates something insubstantial and short-lived in contemporary
    English. ''Vapor'' is also possible and worth preserving as a lexical alternative.'
- source_word: πρὸς ὀλίγον
  chosen: for a little while
  alternatives:
  - for a short time
  - briefly
  lexicon: BDAG
  rationale: The phrase indicates a brief duration. 'For a little while' is idiomatic
    and preserves the temporal sense.
- source_word: φαινομένη
  chosen: appears
  alternatives:
  - is seen
  - becomes visible
  lexicon: BDAG
  rationale: The participle describes temporary visibility. 'Appears' is the most
    natural English equivalent in this image.
- source_word: ἔπειτα καὶ ἀφανιζομένη
  chosen: and then vanishes
  alternatives:
  - then disappears
  - and afterward is gone
  lexicon: BDAG
  rationale: The sequence marker ἔπειτα and passive/middle participle together express
    subsequent disappearance. 'And then vanishes' is concise, vivid, and faithful
    to the metaphor.
