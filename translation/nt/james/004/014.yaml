theological_decisions:
- issue: Metaphorical description of human life’s transience
  chosen_reading: Retain the image as a rhetorical statement about the brevity and
    uncertainty of human life, without importing additional doctrinal claims about
    mortality or judgment.
  alternative_readings:
  - Render more interpretively as 'your life is fleeting'
  rationale: The verse emphasizes human limitation and transience in the context of
    boasting about future plans. Preserving the metaphor ('mist') maintains the text's
    literary and theological tension better than flattening it into abstraction.
  doctrine_reference: Translation philosophy §3, §6
