id: JAS.4.10
reference: James 4:10
source:
  edition: SBLGNT
  text: ταπεινώθητε ἐνώπιον ⸀κυρίου, καὶ ὑψώσει ὑμᾶς.
translation:
  text: Humble yourselves before the Lord, and he will exalt you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will lift you up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταπεινώθητε
  chosen: Humble yourselves
  alternatives:
  - Be humbled
  - Lower yourselves
  lexicon: BDAG
  rationale: Aorist passive imperative of ταπεινόω can function with reflexive/middle
    force in context, especially in paraenesis. 'Humble yourselves' is idiomatic English
    and fits the surrounding imperatives in James 4, while preserving the call to
    voluntary self-humbling rather than merely describing an experience of being humbled
    by another.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: BDAG
  rationale: ἐνώπιον regularly means 'before' or 'in the presence of.' 'Before' is
    concise, natural English and adequately conveys relational and locative sense
    here.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' The article is
    represented in English as 'the Lord,' which is natural in this construction and
    signals the definite referent without over-specifying beyond the Greek.
- source_word: ὑψώσει
  chosen: will exalt
  alternatives:
  - will lift up
  - will raise up
  lexicon: BDAG
  rationale: ὑψόω here is metaphorical for elevation/honor following humility. 'Will
    exalt' best preserves the elevated theological and moral sense, whereas 'lift
    up' could sound merely emotional and 'raise up' may suggest resurrection in some
    contexts.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object. English 'you' preserves the direct address,
    though number is not marked explicitly in modern English.
