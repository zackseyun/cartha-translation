theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Rendered generically as 'the Lord' without specifying in the main
    text whether the referent is God or the Lord Jesus.
  alternative_readings:
  - God
  - the Lord Jesus
  rationale: James can use κύριος with reference to God and also to Jesus in the letter.
    The immediate phrase does not require resolving the referent more narrowly than
    the Greek does. Preserving 'the Lord' maintains the source-text ambiguity and
    avoids importing a doctrinally unnecessary specification.
  doctrine_reference: 'Preserve theological tension rather than resolve it; Contested
    terms: κύριος → Lord'
