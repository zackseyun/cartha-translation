theological_decisions:
- issue: Repentance language and emotional force
  chosen_reading: The verse is rendered as a forceful call to sorrowful repentance
    without softening the imperatives.
  alternative_readings:
  - A milder exhortation to seriousness or sobriety
  rationale: In context (James 4:6–10), the imperatives call for humble repentance
    before God. The translation preserves the severity of the summons without importing
    extra doctrinal explanation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
