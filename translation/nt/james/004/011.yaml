theological_decisions:
- issue: Scope of ἀδελφοί in address to the church
  chosen_reading: Render as 'brothers' in the main text, with inclusive sense preserved
    in a footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek form is masculine plural and likely representative in context.
    The translation follows the project's gender-accurate policy by keeping the source-shaped
    term while noting the likely mixed-gender referent for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Referent of 'the law'
  chosen_reading: Translate as 'the law' without specifying further in the main text.
  alternative_readings:
  - the Mosaic law
  - the royal law
  - God's law
  rationale: James likely has in view the divine law already discussed in the letter,
    especially the ethical demand summarized in love of neighbor, but the verse itself
    does not explicitly narrow the referent. The translation preserves that theological
    breadth rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
