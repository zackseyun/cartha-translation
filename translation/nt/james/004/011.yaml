id: JAS.4.11
reference: James 4:11
source:
  edition: SBLGNT
  text: Μὴ καταλαλεῖτε ἀλλήλων, ἀδελφοί· ὁ καταλαλῶν ἀδελφοῦ ⸀ἢ κρίνων τὸν ἀδελφὸν
    αὐτοῦ καταλαλεῖ νόμου καὶ κρίνει νόμον· εἰ δὲ νόμον κρίνεις, οὐκ εἶ ποιητὴς νόμου
    ἀλλὰ κριτής.
translation:
  text: Do not speak against one another, brothers. The one who speaks against a brother
    or judges his brother speaks against the law and judges the law. But if you judge
    the law, you are not a doer of the law but a judge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not slander one another'; the Greek verb can mean to speak against
      someone in a defamatory way.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here is the Greek masculine plural form and likely addresses
      the whole community, that is, brothers and sisters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλαλεῖτε / καταλαλῶν / καταλαλεῖ
  chosen: speak against
  alternatives:
  - slander
  - speak evil against
  lexicon: BDAG
  rationale: The verb denotes speaking against someone in a hostile or defamatory
    way. 'Speak against' preserves the repeated verbal link across the verse and avoids
    narrowing the sense to formal slander alone, while remaining natural English.
- source_word: ἀλλήλων
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering; 'one another' fits the paraenetic tone
    and reads naturally with the prohibition.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate policy, the vocative masculine plural is rendered
    'brothers.' Because the address likely includes the whole believing community,
    an inclusive alternative is worth preserving in a footnote rather than replacing
    the source-shaped form in the main text.
- source_word: ἀδελφοῦ / τὸν ἀδελφὸν αὐτοῦ
  chosen: a brother / his brother
  alternatives:
  - a fellow believer / his fellow believer
  lexicon: BDAG
  rationale: The singular noun is kept as 'brother' for lexical consistency with the
    vocative and to preserve the familial metaphor in James. More interpretive renderings
    like 'fellow believer' explain but go beyond the immediate wording.
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: NA28/SBLGNT textual tradition
  rationale: 'The conjunction is best taken disjunctively: speaking against a brother
    or judging him are parallel actions. This reading is well supported in the provided
    text and yields coherent argumentation.'
- source_word: κρίνων / κρίνει / κρίνεις
  chosen: judges / judge
  alternatives:
  - condemns
  - passes judgment on
  lexicon: BDAG
  rationale: '''Judge'' preserves the lexical repetition with νόμος and keeps the
    statement broad. ''Condemn'' is too narrow, and ''pass judgment on'' is more expansive
    than necessary in the main text.'
- source_word: νόμου / νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: The article is not explicit in every occurrence in Greek, but English
    idiom and the conceptual reference favor 'the law' throughout. This likely refers
    to God's moral instruction as already framed in James, not law in the abstract.
- source_word: ποιητὴς
  chosen: doer
  alternatives:
  - one who does
  - observer
  lexicon: BDAG
  rationale: '''Doer'' is concise, idiomatic in James, and preserves the author''s
    established contrast between hearing/judging and doing.'
- source_word: κριτής
  chosen: judge
  alternatives:
  - one who judges
  lexicon: BDAG
  rationale: The noun form sharpens the contrast with 'doer.' 'Judge' is the most
    direct and natural rendering.
