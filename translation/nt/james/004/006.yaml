theological_decisions:
- issue: Quotation formula subject in λέγει
  chosen_reading: Therefore it says
  alternative_readings:
  - Therefore he says
  - Therefore Scripture says
  rationale: The Greek leaves the subject implicit. Rendering it impersonally avoids
    importing a more specific subject than the text states, while still signaling
    a scriptural citation. This preserves interpretive restraint.
  doctrine_reference: Translation philosophy §1, §3
