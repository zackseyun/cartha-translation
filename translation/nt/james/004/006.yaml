id: JAS.4.6
reference: James 4:6
source:
  edition: SBLGNT
  text: μείζονα δὲ δίδωσιν χάριν· διὸ λέγει· Ὁ θεὸς ὑπερηφάνοις ἀντιτάσσεται ταπεινοῖς
    δὲ δίδωσιν χάριν.
translation:
  text: But he gives greater grace. Therefore it says, “God opposes the proud, but
    gives grace to the humble.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Therefore he says,” or “Therefore Scripture says.” The Greek leaves
      the subject of “says” implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: μείζονα
  chosen: greater
  alternatives:
  - more
  lexicon: BDAG
  rationale: Comparative of μέγας; 'greater' is idiomatic with 'grace' in English
    and preserves the comparative force without sounding colloquial.
- source_word: δίδωσιν χάριν
  chosen: gives grace
  alternatives:
  - grants grace
  lexicon: BDAG
  rationale: A straightforward rendering of the verb-object pair that preserves the
    repeated wording in the verse for rhetorical effect and consistency.
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: BDAG
  rationale: Marks inference from the preceding statement; 'Therefore' is concise
    and natural in modern English.
- source_word: λέγει
  chosen: it says
  alternatives:
  - he says
  - Scripture says
  lexicon: BDAG
  rationale: The Greek has an implicit subject. In citation formulas, English commonly
    uses the impersonal 'it says,' which avoids over-specifying the referent while
    fitting the context of a scriptural quotation.
- source_word: ὑπερηφάνοις
  chosen: the proud
  alternatives:
  - proud people
  - the arrogant
  lexicon: BDAG
  rationale: '''The proud'' is the standard adjectival substantive rendering and matches
    the contrast with ''the humble.'' ''Arrogant'' is possible but slightly narrower
    in tone.'
- source_word: ἀντιτάσσεται
  chosen: opposes
  alternatives:
  - sets himself against
  - resists
  lexicon: BDAG
  rationale: Conveys active opposition clearly in contemporary English. 'Resists'
    is traditional and possible, but 'opposes' is more direct and natural for modern
    readers.
- source_word: ταπεινοῖς
  chosen: the humble
  alternatives:
  - humble people
  - the lowly
  lexicon: BDAG
  rationale: Best captures the adjectival substantive and the ethical sense in context.
    'Lowly' could suggest social status more strongly than intended here.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: The conjunction marks contrast both at the start of the verse and within
    the quotation; 'but' preserves that adversative force.
