id: JAS.4.15
reference: James 4:15
source:
  edition: SBLGNT
  text: ἀντὶ τοῦ λέγειν ὑμᾶς· Ἐὰν ὁ κύριος ⸀θελήσῃ, καὶ ⸀ζήσομεν καὶ ⸀ποιήσομεν τοῦτο
    ἢ ἐκεῖνο.
translation:
  text: Instead, you ought to say, “If the Lord wills, we will live and also do this
    or that.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “instead of your saying.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ τοῦ λέγειν ὑμᾶς
  chosen: Instead, you ought to say
  alternatives:
  - instead of your saying
  - instead of saying
  lexicon: BDAG
  rationale: The construction ἀντὶ τοῦ + infinitive literally means 'instead of saying,'
    with ὑμᾶς supplying the understood subject ('you'). In English, 'you ought to
    say' makes the contrast with the previous verse explicit and idiomatic without
    adding content beyond the implied corrective force.
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the aorist subjunctive θελήσῃ. 'If'
    is the natural English equivalent here.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this context
    it most naturally refers to the sovereign Lord whose will governs human plans.
- source_word: θελήσῃ
  chosen: wills
  alternatives:
  - desires
  - wants
  lexicon: BDAG
  rationale: θέλω here expresses volition. 'Wills' best preserves the gravity and
    theological sense of divine willing in context, more fitting than the colloquial
    'wants.'
- source_word: καὶ ζήσομεν
  chosen: we will live
  alternatives:
  - and we will live
  - we shall live
  lexicon: BDAG
  rationale: Future indicative stating dependence even of continued life on the Lord's
    will. English can omit the initial conjunction for smoother style, but here it
    is retained in the larger clause by 'and also' to preserve the sequence.
- source_word: καὶ ποιήσομεν
  chosen: and also do
  alternatives:
  - and do
  - and carry out
  lexicon: BDAG
  rationale: ποιέω is broad ('do, make, carry out'). 'Do' is the most direct equivalent.
    'Also' reflects the second καί and clarifies that both living and acting depend
    on the Lord's will.
- source_word: τοῦτο ἢ ἐκεῖνο
  chosen: this or that
  alternatives:
  - this or that thing
  - one thing or another
  lexicon: BDAG
  rationale: An idiomatic pair referring generally to planned activities. 'This or
    that' is natural English and preserves the indefinite scope.
