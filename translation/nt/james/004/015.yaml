theological_decisions:
- issue: Referent and force of 'the Lord' in the conditional statement
  chosen_reading: Render as 'the Lord' without specifying further, preserving the
    text's emphasis on divine sovereignty over life and plans.
  alternative_readings:
  - God
  - the Lord Jesus
  rationale: The Greek says only ὁ κύριος. Given project policy, κύριος is translated
    'Lord.' The verse teaches dependence on the Lord's will but does not require the
    translator to resolve whether James has the Father specifically or the Lord Jesus
    specifically in view.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Preserve
    theological tension rather than resolve it.'
