theological_decisions:
- issue: Whether to make explicit that the asking is directed to God in prayer
  chosen_reading: 'Leave the object implicit: ''You ask and do not receive'''
  alternative_readings:
  - You ask God and do not receive
  rationale: The context strongly suggests prayer, but the Greek does not explicitly
    state 'God' here. To avoid importing words not present in the text, the translation
    keeps the implied object unstated.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Whether κακῶς should be expanded to motive language
  chosen_reading: Render as 'wrongly' in the main text
  alternative_readings:
  - with wrong motives
  - amiss
  rationale: The adverb itself is broader than motive alone. The following purpose
    clause explains the wrongful nature of the asking, so the main text should not
    narrow the meaning prematurely.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
