id: JAS.4.3
reference: James 4:3
source:
  edition: SBLGNT
  text: αἰτεῖτε καὶ οὐ λαμβάνετε, διότι κακῶς αἰτεῖσθε, ἵνα ἐν ταῖς ἡδοναῖς ὑμῶν δαπανήσητε.
translation:
  text: You ask and do not receive, because you ask wrongly, so that you may spend
    it on your pleasures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ask amiss' or 'ask with wrong motives.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spend it in your pleasures'; 'pleasures' can also carry the sense of
      self-indulgent desires or passions.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτεῖτε
  chosen: you ask
  alternatives:
  - you request
  lexicon: BDAG
  rationale: Present active indicative, second person plural; 'ask' is the natural
    and direct English equivalent in this context of petition, likely prayerful asking
    of God. 'Request' is possible but less idiomatic here.
- source_word: λαμβάνετε
  chosen: do not receive
  alternatives:
  - do not get
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'receive' or 'get'; 'receive' better matches the
    register of the verse and keeps the implied relation between asking and receiving.
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason they do not receive. 'Because' is the clearest
    modern English causal connector.
- source_word: κακῶς
  chosen: wrongly
  alternatives:
  - badly
  - with wrong motives
  - amiss
  lexicon: BDAG
  rationale: The adverb means 'badly' or 'wrongly.' 'Wrongly' preserves the moral
    and qualitative sense without over-interpreting it as exclusively motive, though
    the following clause explains the wrongful aim.
- source_word: αἰτεῖσθε
  chosen: you ask
  alternatives:
  - you ask for yourselves
  lexicon: BDAG
  rationale: Middle voice here does not require an explicitly reflexive English rendering.
    Repeating 'you ask' preserves the Greek parallelism and avoids adding emphasis
    not demanded by the text.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is idiomatic modern English and preserves
    the purposive force.
- source_word: ἐν ταῖς ἡδοναῖς ὑμῶν
  chosen: on your pleasures
  alternatives:
  - in your pleasures
  - on your passions
  lexicon: BDAG
  rationale: ἡδονή denotes pleasure, enjoyment, or self-indulgent desire. In this
    context, 'pleasures' is the most straightforward rendering. Using 'on' with δαπανήσητε
    gives natural English for expenditure. 'Passions' is possible but less directly
    tied to the lexical sense of ἡδονή.
- source_word: δαπανήσητε
  chosen: you may spend it
  alternatives:
  - you may squander it
  - you may consume it
  lexicon: BDAG
  rationale: Aorist active subjunctive after ἵνα; the verb means to spend or expend.
    'Spend it' is the most neutral rendering. 'Squander' would add a stronger evaluative
    nuance than the verb itself necessarily carries, though the context is negative.
