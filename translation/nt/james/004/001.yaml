theological_decisions:
- issue: Whether to interpret the opening conflicts as internal passions only or as
    communal disputes
  chosen_reading: The main text renders the first ἐν ὑμῖν as 'among you' and the later
    bodily phrase as 'in your members,' preserving both communal and internal dimensions.
  alternative_readings:
  - Render both phrases inwardly ('in you')
  - Render the final phrase dynamically as 'within you'
  rationale: James's rhetoric links outward community strife with inward disordered
    desires. The translation preserves that tension rather than resolving the verse
    into either purely social conflict or purely psychological struggle.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
