id: JAS.4.1
reference: James 4:1
source:
  edition: SBLGNT
  text: Πόθεν πόλεμοι καὶ ⸀πόθεν μάχαι ἐν ὑμῖν; οὐκ ἐντεῦθεν, ἐκ τῶν ἡδονῶν ὑμῶν τῶν
    στρατευομένων ἐν τοῖς μέλεσιν ὑμῶν;
translation:
  text: From where come wars and from where come fights among you? Is it not from
    here—from your pleasures that wage war in your members?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conflicts ... quarrels.' The Greek uses military terms, literally 'wars'
      and 'fights,' for disputes within the community.
    reason: lexical_alternative
  - marker: b
    text: Or 'in you' for the first phrase; the Greek can denote either conflict among
      the readers or conflict within them. The verse as a whole links outward strife
      with inward desires.
    reason: alternative_reading
  - marker: c
    text: '''Members'' is literal; it can refer to bodily parts or, more broadly,
      the faculties within a person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  chosen: From where come
  alternatives:
  - Where do ... come from
  - Whence come
  lexicon: BDAG
  rationale: Retains the repeated interrogative adverb and the sense of origin/source.
    'From where come' preserves the rhetorical force and repetition better than smoothing
    both instances into a single modern idiom.
- source_word: πόλεμοι
  chosen: wars
  alternatives:
  - conflicts
  - quarrels
  lexicon: BDAG
  rationale: The noun literally denotes wars/battles. Here it is likely metaphorical
    for serious communal conflicts, but 'wars' preserves James's heightened imagery
    rather than reducing it prematurely.
- source_word: μάχαι
  chosen: fights
  alternatives:
  - battles
  - quarrels
  lexicon: BDAG
  rationale: Distinguished from πόλεμοι by using a narrower term. 'Fights' is natural
    modern English and preserves the paired escalation/intensification without collapsing
    both nouns into the same gloss.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: In this first occurrence the context is interpersonal strife within the
    community, so 'among you' best reflects the communal sense rather than an inward
    psychological sense.
- source_word: οὐκ ἐντεῦθεν
  chosen: Is it not from here
  alternatives:
  - Do they not come from this
  - Is it not from this source
  lexicon: BDAG
  rationale: Captures the rhetorical question expecting a positive answer. 'From here'
    reflects ἐντεῦθεν as pointing to the immediately following source.
- source_word: ἡδονῶν
  chosen: pleasures
  alternatives:
  - passions
  - desires
  lexicon: BDAG
  rationale: ἡδονή denotes pleasures, often self-indulgent pleasures. 'Pleasures'
    is the most direct lexical equivalent; 'passions' is interpretive and better reserved
    for contexts where desire rather than enjoyment is foregrounded.
- source_word: στρατευομένων
  chosen: that wage war
  alternatives:
  - that are at war
  - that battle
  lexicon: BDAG
  rationale: The participle from στρατεύομαι carries military imagery. 'That wage
    war' preserves the active, ongoing conflict and echoes the earlier 'wars' language.
- source_word: ἐν τοῖς μέλεσιν ὑμῶν
  chosen: in your members
  alternatives:
  - in your body parts
  - within you
  lexicon: BDAG
  rationale: μέλη literally means members/limbs. 'In your members' preserves the bodily
    metaphor and leaves open whether James means bodily faculties or the inner sphere
    of the person, without over-interpreting.
