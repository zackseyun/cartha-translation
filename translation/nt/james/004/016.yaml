theological_decisions:
- issue: Nature of the condemned boasting
  chosen_reading: The verse condemns boastful self-confidence in human plans apart
    from submission to the Lord, without importing a broader doctrine beyond the immediate
    context.
  alternative_readings:
  - A general condemnation of all self-confidence
  - A narrower condemnation only of commercial planning
  rationale: The immediate context (4:13–15) concerns presumptuous planning, so the
    translation reflects that contextual specificity in 'arrogant schemes' while keeping
    the moral principle broad enough to match James's concluding generalization.
  doctrine_reference: Translation philosophy §§1, 3, 5
