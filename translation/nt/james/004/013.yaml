theological_decisions:
- issue: Tone of apostrophic rebuke
  chosen_reading: Direct address ('you who say') rather than impersonal description
  alternative_readings:
  - those who say
  rationale: James is confronting presumptuous planners directly. This is not a doctrinally
    contested issue, but it affects the force of the exhortation and is best represented
    as direct address in English.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-language
    primacy)
