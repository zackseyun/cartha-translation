id: JAS.4.13
reference: James 4:13
source:
  edition: SBLGNT
  text: Ἄγε νῦν οἱ λέγοντες· Σήμερον ⸀ἢ αὔριον ⸀πορευσόμεθα εἰς τήνδε τὴν πόλιν καὶ
    ⸀ποιήσομεν ἐκεῖ ⸀ἐνιαυτὸν καὶ ⸀ἐμπορευσόμεθα καὶ ⸀κερδήσομεν·
translation:
  text: Come now, you who say, “Today or tomorrow we will go into this city and spend
    a year there and do business and make a profit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “to such-and-such a city.” The Greek says “this
      city,” using a demonstrative for a particular city in the speakers’ plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγε νῦν
  chosen: Come now
  alternatives:
  - Now listen
  - Come now then
  lexicon: BDAG
  rationale: Idiomatic attention-getting expression introducing a rebuke or admonition.
    'Come now' preserves the directness and rhetorical force without paraphrasing
    beyond the Greek.
- source_word: οἱ λέγοντες
  chosen: you who say
  alternatives:
  - those who say
  lexicon: BDAG
  rationale: The articular participle functions vocatively toward the audience James
    addresses. 'You who say' brings out the direct address more naturally in English
    than the more detached 'those who say.'
- source_word: Σήμερον ἢ αὔριον
  chosen: Today or tomorrow
  alternatives:
  - Today and tomorrow
  lexicon: BDAG
  rationale: The conjunction ἢ is disjunctive, so 'or' is required. This preserves
    the sense of presumptive planning about the near future.
- source_word: πορευσόμεθα
  chosen: we will go
  alternatives:
  - we will travel
  - we will journey
  lexicon: BDAG
  rationale: Future middle of πορεύομαι commonly means 'go' in straightforward movement
    contexts. 'Go' is the most natural and sufficiently precise English rendering
    here.
- source_word: εἰς τήνδε τὴν πόλιν
  chosen: into this city
  alternatives:
  - to this city
  - into such-and-such a city
  lexicon: BDAG
  rationale: τήνδε is a demonstrative meaning 'this,' pointing to a particular city
    in the speakers' plan. 'Into this city' follows εἰς closely, though English could
    also allow 'to this city.' The wording preserves the specificity of the Greek
    better than the idiomatic but more interpretive 'such-and-such a city.'
- source_word: ποιήσομεν ἐκεῖ ἐνιαυτόν
  chosen: spend a year there
  alternatives:
  - do a year there
  - stay there a year
  lexicon: BDAG
  rationale: ποιέω with a temporal accusative is an idiom meaning to spend or pass
    a period of time. 'Spend a year there' conveys the idiomatic sense in clear modern
    English while retaining the temporal detail.
- source_word: ἐμπορευσόμεθα
  chosen: do business
  alternatives:
  - trade
  - engage in commerce
  lexicon: BDAG
  rationale: The verb denotes commercial activity or trading. 'Do business' is natural
    modern English and broad enough to cover the mercantile sense without sounding
    overly technical.
- source_word: κερδήσομεν
  chosen: make a profit
  alternatives:
  - make money
  - gain
  lexicon: BDAG
  rationale: In this commercial context, the verb refers to gaining financially. 'Make
    a profit' best matches the mercantile setting established by ἐμπορευσόμεθα and
    avoids the broader, less specific 'gain'.
