theological_decisions:
- issue: Whether φονεύετε should be softened to a metaphorical or less severe expression
  chosen_reading: Retain the main-text rendering 'you murder'
  alternative_readings:
  - you kill
  - you commit murder in your hearts (interpretive)
  rationale: The Greek verb itself is strong and should not be diluted in translation.
    Any metaphorical, rhetorical, or allusive interpretation belongs to exegesis rather
    than the main text. Preserving the stark wording also maintains James's prophetic
    force.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether αἰτεῖσθαι should explicitly include God as the object
  chosen_reading: 'Leave the object implicit: ''you do not ask'''
  alternative_readings:
  - you do not ask God
  rationale: The immediate literary context makes God the implied one asked, especially
    with v.3 following, but the Greek text does not state θεόν here. Optimal equivalence
    preserves the implication without adding an explicit object absent from the source.
  doctrine_reference: Translation philosophy §1, §3
