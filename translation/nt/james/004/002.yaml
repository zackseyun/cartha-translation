id: JAS.4.2
reference: James 4:2
source:
  edition: SBLGNT
  text: ἐπιθυμεῖτε, καὶ οὐκ ἔχετε· φονεύετε καὶ ζηλοῦτε, καὶ οὐ δύνασθε ἐπιτυχεῖν·
    μάχεσθε καὶ πολεμεῖτε. οὐκ ἔχετε διὰ τὸ μὴ αἰτεῖσθαι ὑμᾶς·
translation:
  text: You desire, and do not have. You murder and envy, and are not able to obtain.
    You fight and wage war. You do not have because you do not ask.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You covet' for 'You desire'; the Greek can denote strong desire, often
      in a wrongful sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'You kill'; the Greek verb more specifically often means 'murder.' Some
      interpreters understand the wording rhetorically, but the translation preserves
      the stronger lexical sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'you are jealous' for 'you envy.'
    reason: lexical_alternative
  - marker: d
    text: The implied object of 'ask' is God from the surrounding context, though
      the Greek does not state it explicitly here.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπιθυμεῖτε
  chosen: you desire
  alternatives:
  - you covet
  - you lust
  lexicon: BDAG
  rationale: ἐπιθυμέω denotes strong desire; in this context it is morally disordered,
    but 'desire' preserves the lexical breadth without importing a specifically sexual
    sense ('lust') or narrowing too quickly to property-focused 'covet.' The negative
    context supplies the wrongful force.
- source_word: ἔχετε
  chosen: you have
  alternatives:
  - you possess
  lexicon: BDAG
  rationale: Simple, direct rendering of ἔχω. In English idiom within negation, 'do
    not have' is more natural than 'do not possess.'
- source_word: φονεύετε
  chosen: you murder
  alternatives:
  - you kill
  lexicon: BDAG
  rationale: φονεύω normally carries the sense of murder rather than generic killing.
    'Murder' preserves the moral gravity of the verb. Some interpreters take it metaphorically
    or as hyperbolic rhetoric, but the translation should reflect the lexical force
    of the word itself.
- source_word: ζηλοῦτε
  chosen: you envy
  alternatives:
  - you are jealous
  - you zealously desire
  lexicon: BDAG
  rationale: ζηλόω can be positive ('be zealous') or negative ('be jealous/envy').
    Here the hostile context and parallel with frustrated desire favor the negative
    sense. 'Envy' is concise and idiomatic in English.
- source_word: οὐ δύνασθε ἐπιτυχεῖν
  chosen: are not able to obtain
  alternatives:
  - cannot attain
  - cannot succeed in getting
  lexicon: BDAG
  rationale: The combination expresses inability to reach or obtain the desired object.
    'Are not able to obtain' stays close to the Greek while remaining readable.
- source_word: μάχεσθε
  chosen: you fight
  alternatives:
  - you quarrel
  - you battle
  lexicon: BDAG
  rationale: μάχομαι can denote fighting or quarreling. Since the previous verse already
    uses cognate conflict language and this verse pairs it with πολεμεῖτε, 'fight'
    preserves the force without over-domesticating it to mere verbal disagreement.
- source_word: πολεμεῖτε
  chosen: you wage war
  alternatives:
  - you make war
  - you go to war
  lexicon: BDAG
  rationale: πολεμέω is stronger than μάχομαι and suggests warfare/hostile campaigning.
    'Wage war' preserves the escalation and avoids flattening the pair into two near-identical
    English verbs.
- source_word: διὰ τὸ μὴ αἰτεῖσθαι ὑμᾶς
  chosen: because you do not ask
  alternatives:
  - because of your not asking
  - because you do not request
  lexicon: BDAG
  rationale: 'The articular infinitive with διά gives causal force: ''because.'' αἰτέω
    here naturally means asking, implicitly of God from the context carried into v.3.
    English does not require the reflexive subject pronoun to be explicit; ''because
    you do not ask'' is idiomatic and accurate.'
