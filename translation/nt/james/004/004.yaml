id: JAS.4.4
reference: James 4:4
source:
  edition: SBLGNT
  text: ⸀μοιχαλίδες, οὐκ οἴδατε ὅτι ἡ φιλία τοῦ κόσμου ἔχθρα τοῦ θεοῦ ἐστιν; ὃς ⸀ἐὰν
    οὖν βουληθῇ φίλος εἶναι τοῦ κόσμου, ἐχθρὸς τοῦ θεοῦ καθίσταται.
translation:
  text: Adulteresses, do you not know that friendship with the world is hostility
    toward God? Therefore, whoever wants to be a friend of the world makes himself
    an enemy of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You adulteresses.' The term likely functions metaphorically for spiritual
      unfaithfulness, echoing prophetic covenant language.
    reason: lexical_alternative
  - marker: b
    text: Or 'enmity with God.'
    reason: alternative_reading
  - marker: c
    text: '''The world'' here refers to the human order in opposition to God, not
      to creation itself.'
    reason: cultural_note
  - marker: d
    text: Or 'becomes an enemy of God.'
    reason: alternative_reading
lexical_decisions:
- source_word: μοιχαλίδες
  chosen: Adulteresses
  alternatives:
  - You adulteresses
  - Adulterous people
  lexicon: BDAG
  rationale: Vocative feminine plural of 'adulteress.' The direct lexical sense is
    retained rather than softened. Although the address likely carries metaphorical
    covenant-unfaithfulness overtones, the translation keeps the concrete term in
    the main text and lets context convey the metaphor. 'Adulterous people' is interpretive
    and loses the marked feminine form.
- source_word: οὐκ οἴδατε
  chosen: do you not know
  alternatives:
  - do you not understand
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the negative question with οἶδα, preserving
    the rhetorical force.
- source_word: φιλία
  chosen: friendship
  alternatives:
  - affection
  - alliance
  lexicon: BDAG
  rationale: '''Friendship'' best matches the noun and coheres with the later φίλος
    (''friend''). It preserves the relational sense rather than reducing it to mere
    sentiment.'
- source_word: κόσμου
  chosen: the world
  alternatives:
  - the present world order
  lexicon: BDAG
  rationale: κόσμος here refers not to the physical creation but to the human order
    opposed to God. 'The world' is the standard and sufficiently broad rendering;
    a more explicit paraphrase would over-interpret.
- source_word: ἔχθρα τοῦ θεοῦ
  chosen: hostility toward God
  alternatives:
  - enmity with God
  - hatred of God
  lexicon: BDAG
  rationale: 'The genitive is best taken as objective in context: friendship with
    the world constitutes hostility directed toward God. ''Hostility toward God''
    is clear modern English. ''Enmity with God'' is possible and traditional, but
    slightly less natural in contemporary usage.'
- source_word: ὃς ἐὰν οὖν
  chosen: Therefore, whoever
  alternatives:
  - So whoever
  - Whoever then
  lexicon: BDAG
  rationale: This combination draws an inference from the preceding statement and
    introduces an indefinite relative clause. 'Therefore, whoever' captures both the
    inferential οὖν and the generalizing force.
- source_word: βουληθῇ
  chosen: wants
  alternatives:
  - wishes
  - chooses
  - intends
  lexicon: BDAG
  rationale: Aorist subjunctive of βούλομαι expresses volition. 'Wants' is natural
    English and preserves the sense of deliberate desire without sounding stilted.
- source_word: φίλος εἶναι τοῦ κόσμου
  chosen: to be a friend of the world
  alternatives:
  - to be worldly
  - to befriend the world
  lexicon: BDAG
  rationale: This preserves the nominal expression and the lexical link with φιλία.
    'To be worldly' is too interpretive; 'to befriend the world' shifts the syntax
    and emphasis.
- source_word: ἐχθρὸς τοῦ θεοῦ
  chosen: an enemy of God
  alternatives:
  - hostile to God
  lexicon: BDAG
  rationale: The predicate adjective functions substantivally in English. 'An enemy
    of God' is the most direct and forceful rendering, matching the relational contrast
    with 'friend of the world.'
- source_word: καθίσταται
  chosen: makes himself
  alternatives:
  - becomes
  - is constituted
  lexicon: BDAG
  rationale: In this context the verb conveys entering or being placed into a status.
    'Makes himself' highlights the reflexive/resultative force implied by the subject's
    chosen alignment. 'Becomes' is possible but less explicit about moral agency.
