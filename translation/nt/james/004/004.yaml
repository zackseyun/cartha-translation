theological_decisions:
- issue: Metaphorical force of μοιχαλίδες
  chosen_reading: Retain the literal term 'Adulteresses' in the main text while allowing
    the context to signal spiritual/covenantal unfaithfulness.
  alternative_readings:
  - Adulterous people
  - Unfaithful people
  rationale: James likely uses adultery metaphorically for covenant infidelity, echoing
    prophetic usage. However, replacing the term with an interpretive paraphrase would
    go beyond the source text. The translation preserves the sharp metaphor and its
    gendered vocative form.
  doctrine_reference: Translation philosophy §§1, 4, 6
- issue: Sense of κόσμος
  chosen_reading: Translate as 'the world' without expanding it in the main text.
  alternative_readings:
  - the world-system opposed to God
  - the present evil order
  rationale: Theologically, κόσμος here denotes the sphere of values in rebellion
    against God, not creation itself. But the Greek says 'the world,' and the translation
    preserves that wording rather than importing a fuller interpretive gloss into
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
