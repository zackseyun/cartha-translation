theological_decisions:
- issue: Referent of τὸ πνεῦμα
  chosen_reading: The Spirit refers to the Holy Spirit indwelling believers.
  alternative_readings:
  - the human spirit that God caused to dwell in us
  rationale: James 4:5 is one of the NT's most disputed clauses. The grammar permits
    either reading. The main text adopts the Holy Spirit reading because 'caused to
    dwell in us' naturally evokes divine indwelling language, and 'yearns jealously'
    can express God's rightful jealous claim over his people. However, because the
    ambiguity is genuine and doctrinally significant, the alternative is preserved
    in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Moral valence of φθόνος language
  chosen_reading: Render the longing as 'jealously' rather than 'enviously.'
  alternative_readings:
  - with envy
  - to envy
  rationale: English 'envy' is almost always morally vicious, whereas biblical jealousy
    can be righteous when attributed to God. Since the chosen reading takes τὸ πνεῦμα
    as the Holy Spirit, 'jealously' better communicates the likely sense without importing
    sinful desire into God. The more literal alternatives are preserved in a footnote
    because the Greek wording remains difficult.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
