id: JAS.4.5
reference: James 4:5
source:
  edition: SBLGNT
  text: ἢ δοκεῖτε ὅτι κενῶς ἡ γραφὴ λέγει· Πρὸς φθόνον ἐπιποθεῖ τὸ πνεῦμα ὃ ⸀κατῴκισεν
    ἐν ἡμῖν;
translation:
  text: Or do you think that the Scripture speaks for nothing? The Spirit whom he
    caused to dwell in us yearns jealously.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the spirit that he caused to dwell in us longs with envy.' The Greek
      may refer either to the Holy Spirit or to the human spirit, and the phrase translated
      'jealously' can also be rendered 'with envy.'
    reason: alternative_reading
lexical_decisions:
- source_word: κενῶς
  chosen: for nothing
  alternatives:
  - in vain
  - emptily
  - without purpose
  lexicon: BDAG
  rationale: κενῶς here modifies λέγει and asks whether Scripture speaks to no effect
    or without purpose. 'For nothing' is idiomatic modern English that preserves the
    rhetorical force better than the more archaic 'in vain,' while still reflecting
    the adverb's sense of emptiness/pointlessness.
- source_word: ἡ γραφὴ
  chosen: the Scripture
  alternatives:
  - Scripture
  lexicon: BDAG
  rationale: The singular with article is a standard NT way of referring to Scripture
    as authoritative written revelation. 'The Scripture' preserves that conventional
    force.
- source_word: Πρὸς φθόνον
  chosen: jealously
  alternatives:
  - to envy
  - with envy
  - unto envy
  lexicon: BDAG
  rationale: 'The phrase is notoriously difficult. Rendering the prepositional phrase
    adverbially with ἐπιποθεῖ yields natural English: ''yearns jealously.'' This avoids
    the misleadingly negative English ''envy'' in the main text while preserving the
    idea of intense jealous longing. The lexical ambiguity is preserved in a footnote.'
- source_word: ἐπιποθεῖ
  chosen: yearns
  alternatives:
  - longs
  - desires intensely
  lexicon: BDAG
  rationale: ἐπιποθέω denotes strong desire or longing. 'Yearns' is natural, strong,
    and suitable for the elevated tone.
- source_word: τὸ πνεῦμα
  chosen: The Spirit
  alternatives:
  - the spirit
  - the spirit he caused to dwell in us
  lexicon: BDAG
  rationale: This clause is grammatically ambiguous between the Holy Spirit and the
    human spirit. The main text takes it as the divine Spirit because the wording
    about God causing the Spirit to dwell in believers fits common NT usage, but the
    alternative is preserved in a footnote per the instruction to preserve theological
    tension where genuine ambiguity exists.
- source_word: κατῴκισεν
  chosen: caused to dwell
  alternatives:
  - made dwell
  - placed to live
  - caused to live
  lexicon: BDAG
  rationale: The causative force of κατοικίζω is better represented by 'caused to
    dwell' than by a simple 'dwells.' This preserves the aorist active sense and the
    implied divine agency.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: ἐν with the dative here most naturally indicates indwelling rather than
    mere corporate presence, especially if τὸ πνεῦμα refers to the Holy Spirit.
