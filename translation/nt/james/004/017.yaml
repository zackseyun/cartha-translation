id: JAS.4.17
reference: James 4:17
source:
  edition: SBLGNT
  text: εἰδότι οὖν καλὸν ποιεῖν καὶ μὴ ποιοῦντι, ἁμαρτία αὐτῷ ἐστιν.
translation:
  text: So, for the one who knows to do good and does not do it, it is sin for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Therefore whoever knows the good he ought to do and does not do it,
      for him it is sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότι
  chosen: for the one who knows
  alternatives:
  - to the one who knows
  - therefore whoever knows
  lexicon: BDAG
  rationale: Dative singular participle of οἶδα functions substantivally, referring
    to a person characterized by knowing. Rendering with 'the one who knows' preserves
    the singular and generic force without over-paraphrasing.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding discussion. 'So' is
    natural modern English while still conveying the logical connection.
- source_word: καλὸν
  chosen: good
  alternatives:
  - the good thing
  - what is right
  - a good thing
  lexicon: BDAG
  rationale: καλός here denotes what is morally good/right. 'Good' is concise and
    idiomatic with the infinitive 'to do good,' preserving the broad ethical sense.
- source_word: ποιεῖν
  chosen: to do
  alternatives:
  - to practice
  - to carry out
  lexicon: BDAG
  rationale: Infinitive complements καλὸν in the idiom 'to do good.' 'To do' is the
    most direct and natural rendering.
- source_word: μὴ ποιοῦντι
  chosen: and does not do it
  alternatives:
  - and not doing it
  - and does not do so
  lexicon: BDAG
  rationale: Present participle with μή contrasts known duty with failure to act.
    Finite English verb is smoother in translation while preserving the ongoing/general
    force. 'It' makes explicit the omitted object from context.
- source_word: ἁμαρτία
  chosen: sin
  alternatives:
  - a sin
  lexicon: BDAG
  rationale: Anarthrous predicate nominative can be qualitative; 'it is sin' communicates
    that such omission is truly sinful, not merely unfortunate. This is more idiomatic
    than 'it is a sin' while preserving the force.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  - for that person
  lexicon: BDAG
  rationale: 'Dative of reference/disadvantage: with respect to that person, the failure
    is sin. ''For him'' is a natural English equivalent and keeps the singular personal
    application.'
- source_word: ἐστιν
  chosen: it is
  alternatives:
  - is
  lexicon: BDAG
  rationale: Supplies the copula explicitly in English, linking the omitted action
    to the predicate 'sin'.
