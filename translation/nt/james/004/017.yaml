theological_decisions:
- issue: Nature of the statement about omitted good
  chosen_reading: The verse states that knowingly failing to do good is sin, without
    narrowing the principle to a specific doctrinal system.
  alternative_readings:
  - The verse refers only to the immediate context of boastful planning
  - The verse establishes a broad principle of sins of omission
  rationale: The immediate context concerns arrogant self-directed planning, but the
    wording is general and proverbial enough to support a broader ethical principle.
    The translation preserves that breadth without importing a denominational framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
