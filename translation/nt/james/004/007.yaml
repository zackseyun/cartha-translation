id: JAS.4.7
reference: James 4:7
source:
  edition: SBLGNT
  text: ὑποτάγητε οὖν τῷ θεῷ· ἀντίστητε δὲ τῷ διαβόλῳ, καὶ φεύξεται ἀφ’ ὑμῶν·
translation:
  text: Submit yourselves, therefore, to God. But resist the devil, and he will flee
    from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be subject to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτάγητε
  chosen: Submit yourselves
  alternatives:
  - Be subject
  - Subject yourselves
  lexicon: BDAG
  rationale: Aorist passive imperative of ὑποτάσσω used with reflexive force in paraenesis;
    'submit yourselves' is idiomatic modern English and preserves the call to voluntary
    yielding under God's authority better than the more wooden 'be subject.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument; 'therefore' best preserves
    the logical connection in clear English.
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Simple dative complement after ὑποτάγητε; no article is needed in English.
- source_word: ἀντίστητε
  chosen: resist
  alternatives:
  - stand against
  - oppose
  lexicon: BDAG
  rationale: Aorist active imperative meaning to set oneself against or resist. 'Resist'
    is concise, standard, and fits the moral exhortation.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' brings out the adversative
    nuance between submission to God and opposition to the devil.
- source_word: τῷ διαβόλῳ
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: διάβολος here functions as the personal title for Satan, not merely a
    common noun. 'The devil' is the established and contextually correct rendering.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Connects the imperative with its promised result; 'and' is sufficient
    and natural.
- source_word: φεύξεται
  chosen: he will flee
  alternatives:
  - he will run away
  lexicon: BDAG
  rationale: Future middle indicative of φεύγω expressing the result of resistance.
    The subject is naturally the devil from the preceding clause; English requires
    explicit pronoun for clarity.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - away from you
  lexicon: BDAG
  rationale: ἀπό with genitive indicates movement away. 'From you' is direct and idiomatic;
    'away' is already implied by 'flee.'
