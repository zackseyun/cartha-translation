theological_decisions:
- issue: Rendering διάβολος
  chosen_reading: the devil as a personal supernatural adversary
  alternative_readings:
  - the slanderer as a more generic personal or impersonal force
  rationale: In James 4:7 the term is articular and used in a context of spiritual
    conflict. Historic Christian orthodoxy recognizes the devil as a real personal
    being, and the Greek usage here supports that reading rather than a merely abstract
    principle of evil.
  doctrine_reference: Affirmations; Translation philosophy §1
