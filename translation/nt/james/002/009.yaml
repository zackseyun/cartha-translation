id: JAS.2.9
reference: James 2:9
source:
  edition: SBLGNT
  text: εἰ δὲ προσωπολημπτεῖτε, ἁμαρτίαν ἐργάζεσθε, ἐλεγχόμενοι ὑπὸ τοῦ νόμου ὡς παραβάται.
translation:
  text: But if you show partiality, you commit sin and are convicted by the law as transgressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show favoritism.' The Greek verb προσωπολημπτέω refers to judging or treating people according to outward status or appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'being exposed' or 'being reproved' by the law. The participle carries the sense of having one's wrongdoing brought to light and shown guilty.
    reason: lexical_alternative
  - marker: c
    text: Or 'as lawbreakers.'
    reason: lexical_alternative
  - marker: d
    text: Or 'you are committing sin, being convicted by the law'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - But when
  lexicon: BDAG
  rationale: εἰ introduces a conditional clause, and δέ marks mild contrast or continuation. 'But if' preserves both the conditional force and the adversative/continuative connection to the preceding argument.
- source_word: προσωπολημπτεῖτε
  chosen: you show partiality
  alternatives:
  - you show favoritism
  - you receive persons
  lexicon: BDAG
  rationale: The verb denotes showing favoritism or partiality on the basis of outward status. 'Show partiality' is clear modern English and closely reflects the idiom without woodenly reproducing the Semitic background.
- source_word: ἁμαρτίαν
  chosen: sin
  lexicon: BDAG
  rationale: Direct object of ἐργάζεσθε; the standard gloss 'sin' is straightforward and contextually exact.
- source_word: ἐργάζεσθε
  chosen: you are committing
  alternatives:
  - you are working
  - you are practicing
  - you commit
  lexicon: BDAG
  rationale: Though literally 'work/do,' with ἁμαρτίαν the idiom means to do or commit sin. 'Are committing' captures the present tense and idiomatic sense in natural English.
- source_word: ἐλεγχόμενοι
  chosen: being convicted
  alternatives:
  - being exposed
  - being reproved
  - being convicted of wrongdoing
  lexicon: BDAG
  rationale: The participle indicates the law's action in exposing and proving guilt. 'Being convicted' best fits the legal context created by νόμος and παραβάται, while retaining the passive sense.
- source_word: ὑπὸ τοῦ νόμου
  chosen: by the law
  alternatives:
  - by the Law
  lexicon: BDAG
  rationale: νόμος here refers to the moral demand of God's law in James's argument, not necessarily the Mosaic code as a proper title in a narrow sense. Lowercase 'law' keeps the reference broad while preserving the legal framework.
- source_word: ὡς παραβάται
  chosen: as transgressors
  alternatives:
  - as lawbreakers
  - as violators
  lexicon: BDAG
  rationale: παραβάται are those who step across a boundary or violate a law. 'Transgressors' preserves the juridical and biblical register; 'lawbreakers' is possible but slightly more interpretive since 'law' is not repeated in the noun itself.
