id: JAS.2.1
reference: James 2:1
source:
  edition: SBLGNT
  text: Ἀδελφοί μου, μὴ ἐν προσωπολημψίαις ἔχετε τὴν πίστιν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ τῆς δόξης;
translation:
  text: My brothers, do not hold the faith of our glorious Lord Jesus Messiah, with partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' but addresses the believing community more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the faith in our Lord Jesus Messiah.' The Greek construction can be understood in more than one way.
    reason: alternative_reading
  - marker: c
    text: Or 'our glorious Lord Jesus Messiah.'
    reason: lexical_alternative
  - marker: d
    text: Or 'our Lord Jesus Messiah, the Lord of glory'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀδελφοί μου
  chosen: My brothers
  alternatives:
  - My brothers and sisters
  - My siblings
  lexicon: BDAG
  rationale: Grammatically masculine plural with direct address; per doctrine, render gender-accurately rather than neutralize. Because James addresses the Christian community broadly, an inclusive alternative is worth preserving in a footnote rather than moving it into the main text.
- source_word: μὴ ... ἔχετε
  chosen: do not hold
  alternatives:
  - do not have
  - must not hold
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. 'Hold' works idiomatically with πίστιν in English and preserves the sense of maintaining or practicing faith in a certain manner better than the flatter 'have'.
- source_word: ἐν προσωπολημψίαις
  chosen: with partiality
  alternatives:
  - with favoritism
  - in acts of favoritism
  - with respect of persons
  lexicon: BDAG
  rationale: προσωπολημψία denotes favoritism/partiality, literally receiving the face/person. 'With partiality' is concise, natural, and preserves the ethical force without archaic wording. The plural is represented idiomatically rather than woodenly.
- source_word: τὴν πίστιν
  chosen: the faith
  alternatives:
  - faith
  - your faith
  lexicon: BDAG
  rationale: Default rendering of πίστις is 'faith' per doctrine. The article supports 'the faith' here, referring to the believers' faith directed toward and defined by the Lord Jesus Messiah, not merely a subjective act in abstraction.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: of our Lord Jesus Messiah
  alternatives:
  - in our Lord Jesus Messiah
  - of our Lord Jesus Christ
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine. Χριστός is rendered 'Messiah' because it functions as a title here rather than a mere name-like element. The genitive can be understood in relation to πίστις as objective ('faith in') or more generally possessive/defining; to preserve the Greek structure and avoid over-resolving the debated construction, the main text keeps 'the faith of our Lord Jesus Messiah' while a footnote preserves 'faith in our Lord Jesus Messiah'.
- source_word: τῆς δόξης
  chosen: the Lord of glory
  alternatives:
  - the glorious Lord
  - our glorious Lord
  lexicon: BDAG
  rationale: 'The genitive δόξης is best taken as attached appositionally or attributively to the Lord Jesus Messiah: ''the Lord of glory.'' This preserves the elevated christological force and echoes biblical idiom better than the smoother but more interpretive ''glorious Lord''.'
