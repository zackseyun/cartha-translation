theological_decisions:
- issue: Genitive relation in 'τὴν πίστιν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ'
  chosen_reading: Rendered formally as 'the faith of our Lord Jesus Messiah' in the main text, with 'faith in our Lord Jesus Messiah' preserved in a footnote.
  alternative_readings:
  - faith in our Lord Jesus Messiah
  rationale: Because πίστις plus a following genitive can be interpreted in more than one way, the translation preserves the Greek's ambiguity as much as readable English allows rather than collapsing it into a single interpretive option. This follows the doctrine's instruction to preserve theological tension where the source is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine specifies 'Messiah' where Χριστός functions as a title and 'Christ' where it is name-like. In this solemn titular sequence with 'Lord Jesus,' the messianic title remains semantically active, so 'Messiah' is preferred.
  doctrine_reference: 'Translation philosophy §2; Contested terms: Χριστός'
- issue: Gendered address Ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The doctrine requires gender-accurate rendering in the main text while allowing annotation where inclusivity is contextually relevant. James likely addresses the mixed Christian assembly, so the inclusive sense is preserved in a footnote rather than replacing the masculine form in translation.
  doctrine_reference: Translation philosophy §4
revisions:
- timestamp: '2026-04-21T03:33:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/james/002/001.json
  category: awkward_english
  tier: 1
  from: our Lord Jesus Messiah, the Lord of glory
  to: our glorious Lord Jesus Messiah
  rationale: The current rendering, while reflecting a classic and theologically rich interpretation, creates a slightly cumbersome and redundant phrase ('our Lord..., the Lord of glory'). It achieves this by supplying the word 'Lord' to form a title from the genitive 'τῆς δόξης'. A more direct and smoother rendering, treating 'τῆς δόξης' as a standard attributive genitive, is 'our glorious Lord Jesus Messiah.' This is already noted as an alternative but would improve the flow of the main text without losing the essential meaning that the Lord is glorious. The current rendering is not incorrect, but it is less elegant.
