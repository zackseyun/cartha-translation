id: JAS.3.3
reference: James 3:3
source:
  edition: SBLGNT
  text: ⸂εἰ δὲ⸃ τῶν ἵππων τοὺς χαλινοὺς εἰς τὰ στόματα βάλλομεν ⸀εἰς τὸ πείθεσθαι
    αὐτοὺς ἡμῖν, καὶ ὅλον τὸ σῶμα αὐτῶν μετάγομεν.
translation:
  text: Now if we put bits into the mouths of horses so that they obey us, we also
    guide their whole bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bridles,' though the immediate reference is more precisely to the bit
      placed in a horse's mouth.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: Now if
  alternatives:
  - If
  - But if
  lexicon: BDAG
  rationale: Introduces an illustrative conditional with mild discourse progression.
    'Now if' preserves both the conditional force of εἰ and the connective nuance
    of δέ in natural English.
- source_word: χαλινοὺς
  chosen: bits
  alternatives:
  - bridles
  - bits and bridles
  lexicon: BDAG
  rationale: In this context the object placed 'into the mouths' of horses is specifically
    the bit, not the whole bridle. 'Bits' is the most precise English equivalent.
- source_word: εἰς τὰ στόματα
  chosen: into the mouths
  alternatives:
  - in the mouths
  lexicon: BDAG
  rationale: εἰς with βάλλομεν naturally expresses motion into. The plural 'mouths'
    matches the Greek and reads idiomatically in English.
- source_word: βάλλομεν
  chosen: we put
  alternatives:
  - we place
  - we cast
  lexicon: BDAG
  rationale: A common verb meaning 'put/place' in this construction. 'Cast' would
    be overly literal and unnatural here.
- source_word: εἰς τὸ πείθεσθαι αὐτοὺς ἡμῖν
  chosen: so that they obey us
  alternatives:
  - for them to obey us
  - to make them obey us
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose/result. πείθεσθαι
    with dative ἡμῖν means 'obey us' here. 'So that they obey us' is natural and preserves
    the purposive sense without overstating causation.
- source_word: μετάγομεν
  chosen: we guide
  alternatives:
  - we direct
  - we turn
  lexicon: BDAG
  rationale: The verb denotes directing or guiding movement. 'Guide' fits the horse
    imagery and the broader argument about controlling something larger by means of
    something small.
- source_word: ὅλον τὸ σῶμα αὐτῶν
  chosen: their whole bodies
  alternatives:
  - their entire bodies
  - their whole body
  lexicon: BDAG
  rationale: Although σώμα is singular, it is distributive with the plural pronoun
    αὐτῶν in context; English idiom prefers the plural 'their whole bodies.'
