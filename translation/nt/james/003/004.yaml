theological_decisions:
- issue: Degree of literalness in the ship metaphor
  chosen_reading: Retained the somewhat literal phrase 'the impulse of the one steering
    wills' rather than fully paraphrasing to 'wherever the pilot wants to go.'
  alternative_readings:
  - wherever the pilot wants to go
  - wherever the helmsman directs
  rationale: This verse is metaphorical but not doctrinally contested. Preserving
    the lexical texture of ὁρμή and βούλεται keeps James's emphasis on inward volition
    guiding a large object by a small instrument, which supports the analogy in context
    without over-paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
