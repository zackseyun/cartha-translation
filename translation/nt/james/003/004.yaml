id: JAS.3.4
reference: James 3:4
source:
  edition: SBLGNT
  text: ἰδοὺ καὶ τὰ πλοῖα, τηλικαῦτα ὄντα καὶ ὑπὸ ⸂ἀνέμων σκληρῶν⸃ ἐλαυνόμενα, μετάγεται
    ὑπὸ ἐλαχίστου πηδαλίου ὅπου ⸂ἡ ὁρμὴ τοῦ εὐθύνοντος βούλεται⸃·
translation:
  text: 'Look also at the ships: though they are so large and are driven by strong
    winds, they are steered by a very small rudder wherever the impulse of the one
    steering wills.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wherever the pilot wants to go.' The Greek more literally reads 'wherever
      the impulse of the one steering wills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as an attention-getting imperative in natural modern English.
    'Look' preserves the demonstrative force without archaic tone.
- source_word: καὶ τὰ πλοῖα
  chosen: also at the ships
  alternatives:
  - also the ships
  - even the ships
  lexicon: BDAG
  rationale: The combination with ἰδοὺ introduces another illustrative example parallel
    to the previous verse. 'Look also at the ships' makes the discourse function clear
    in English.
- source_word: τηλικαῦτα ὄντα
  chosen: though they are so large
  alternatives:
  - being so large
  - although they are such large things
  lexicon: BDAG
  rationale: τηλικαῦτα emphasizes impressive size. 'Though they are so large' captures
    both the descriptive force and the concessive sense created in context by the
    contrast with the tiny rudder.
- source_word: ὑπὸ ἀνέμων σκληρῶν ἐλαυνόμενα
  chosen: are driven by strong winds
  alternatives:
  - are driven by harsh winds
  - are propelled by fierce winds
  lexicon: BDAG
  rationale: σκληρῶν literally can mean 'hard/harsh,' but with winds 'strong' is idiomatic
    and communicates the force involved. ἐλαυνόμενα is passive, hence 'are driven.'
- source_word: μετάγεται
  chosen: they are steered
  alternatives:
  - they are guided
  - they are directed
  - they are turned
  lexicon: BDAG
  rationale: In nautical context with πηδάλιον, 'are steered' is the most precise
    and natural English equivalent.
- source_word: ὑπὸ ἐλαχίστου πηδαλίου
  chosen: by a very small rudder
  alternatives:
  - by the smallest rudder
  - by a tiny rudder
  lexicon: BDAG
  rationale: ἐλαχίστου is a superlative, but in idiomatic English 'very small' better
    conveys the contrast without implying an absolute smallest rudder in existence.
    πηδάλιον is specifically 'rudder.'
- source_word: ὅπου
  chosen: wherever
  alternatives:
  - where
  - to where
  lexicon: BDAG
  rationale: The relative adverb here introduces destination according to the pilot's
    intention; 'wherever' best fits the generalized sense.
- source_word: ἡ ὁρμὴ
  chosen: the impulse
  alternatives:
  - the inclination
  - the urge
  - the direction
  lexicon: BDAG
  rationale: ὁρμή denotes impulse, drive, or inclination. 'Impulse' preserves the
    noun's force more closely than smoothing it to 'direction,' while still making
    sense in context.
- source_word: τοῦ εὐθύνοντος
  chosen: of the one steering
  alternatives:
  - of the pilot
  - of the helmsman
  - of the one directing
  lexicon: BDAG
  rationale: The participle literally means 'the one steering/directing.' This rendering
    preserves the verbal imagery and avoids importing a more specific technical title
    than the Greek requires.
- source_word: βούλεται
  chosen: wills
  alternatives:
  - wants
  - desires
  - intends
  lexicon: BDAG
  rationale: βούλομαι expresses volition or intention. 'Wills' preserves the deliberate
    sense and the compactness of the Greek, though in a non-theological, ordinary
    volitional sense here.
