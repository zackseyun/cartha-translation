id: JAS.3.8
reference: James 3:8
source:
  edition: SBLGNT
  text: τὴν δὲ γλῶσσαν οὐδεὶς ⸂δαμάσαι δύναται ἀνθρώπων⸃· ⸀ἀκατάστατον κακόν, μεστὴ
    ἰοῦ θανατηφόρου.
translation:
  text: But no man among men is able to tame the tongue. It is an unstable evil, full
    of deadly poison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'no human being can tame the tongue.'
    reason: alternative_reading
  - marker: b
    text: Or 'restless evil' or 'unruly evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσαν
  chosen: the tongue
  alternatives:
  - the language
  - the speech
  lexicon: BDAG
  rationale: The literal body-part term is retained, since in context it functions
    as James's established metaphor for human speech. 'Tongue' preserves the imagery
    and continuity with the surrounding passage better than the more interpretive
    'speech'.
- source_word: οὐδεὶς
  chosen: no man
  alternatives:
  - no one
  - nobody
  lexicon: BDAG
  rationale: The Greek is singular and masculine in form. Following the project's
    gender-accurate principle, 'no man' preserves the source form while still carrying
    representative force in context. A more idiomatic but less form-sensitive alternative
    would be 'no one'.
- source_word: δαμάσαι
  chosen: to tame
  alternatives:
  - to subdue
  - to control
  lexicon: BDAG
  rationale: '''Tame'' is the natural gloss for δαμάζω and matches the immediate context
    in James 3, where animals are said to be tamed. It preserves the verbal link with
    the preceding discussion.'
- source_word: δύναται ἀνθρώπων
  chosen: is able to tame ... among men
  alternatives:
  - can any human being tame
  - can be tamed by mankind
  - no human being can tame
  lexicon: BDAG
  rationale: The phrase is syntactically compressed. The genitive ἀνθρώπων is best
    taken as a partitive genitive with οὐδείς ('no one of men / no human being').
    The translation 'no man among men is able' preserves that relation, though the
    smoother English sense is 'no human being can tame.'
- source_word: ἀκατάστατον
  chosen: unstable
  alternatives:
  - restless
  - unruly
  lexicon: BDAG
  rationale: The adjective can denote instability, disorder, or restlessness. 'Unstable'
    closely reflects the lexical core and avoids over-specifying the nuance, though
    'restless' is a strong contextual alternative and common in translation tradition.
- source_word: κακόν
  chosen: evil
  alternatives:
  - bad thing
  - harm
  lexicon: BDAG
  rationale: '''Evil'' best captures the moral force of κακόν here. The phrase describes
    the tongue not merely as harmful but as morally corrupt and destructive.'
- source_word: μεστὴ
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the adjective, preserving the
    vivid descriptive force.
- source_word: ἰοῦ
  chosen: poison
  alternatives:
  - venom
  - rust
  lexicon: BDAG
  rationale: In this context, with θανατηφόρου ('deadly'), the sense is clearly poisonous
    venom rather than 'rust.' 'Poison' is the broadest accessible English rendering;
    'venom' is possible but slightly narrower.
- source_word: θανατηφόρου
  chosen: deadly
  alternatives:
  - death-bearing
  - bringing death
  lexicon: BDAG
  rationale: '''Deadly'' is the most natural English equivalent and preserves the
    lethal force of the genitive phrase ''of deadly poison.'''
