theological_decisions:
- issue: Gender-accurate rendering of οὐδεὶς with ἀνθρώπων
  chosen_reading: no man among men
  alternative_readings:
  - no one can tame the tongue
  - no human being can tame the tongue
  rationale: The Greek uses masculine/generic human language. Per the project's stated
    philosophy, the translation preserves the gendered form where it carries representative
    force rather than flattening it to a neutral expression. Because this may sound
    less idiomatic in English, a smoother alternative is preserved in a footnote.
