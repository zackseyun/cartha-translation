theological_decisions:
- issue: Gendered imperative and representative force
  chosen_reading: Let him show
  alternative_readings:
  - Let them show
  - Such a person should show
  rationale: The Greek uses a masculine singular imperative with generic/representative
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral language. The representative sense can be noted in a footnote rather
    than altered in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
