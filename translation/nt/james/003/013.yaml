id: JAS.3.13
reference: James 3:13
source:
  edition: SBLGNT
  text: Τίς σοφὸς καὶ ἐπιστήμων ἐν ὑμῖν; δειξάτω ἐκ τῆς καλῆς ἀναστροφῆς τὰ ἔργα αὐτοῦ
    ἐν πραΰτητι σοφίας.
translation:
  text: Who is wise and understanding among you? Let him show his works by his good
    way of life, in the meekness of wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the gentleness that comes from wisdom.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'let him show,' using a masculine singular form with representative
      force for any such person in the community.
    reason: cultural_note
lexical_decisions:
- source_word: Τίς
  chosen: Who
  alternatives:
  - Which one
  lexicon: BDAG
  rationale: Introduces a rhetorical question asking for the person characterized
    by the following qualities. 'Who' is the natural English equivalent.
- source_word: σοφὸς
  chosen: wise
  alternatives:
  - skilled
  lexicon: BDAG
  rationale: Standard rendering for σοφός in wisdom contexts; here it refers to practical
    and moral wisdom, not merely intelligence.
- source_word: ἐπιστήμων
  chosen: understanding
  alternatives:
  - knowledgeable
  - learned
  - expert
  lexicon: BDAG
  rationale: Chosen to pair naturally with 'wise' and to convey one who has understanding
    or expertise. 'Understanding' fits the moral-exhortational context better than
    the more technical-sounding 'expert' or merely informational 'knowledgeable'.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  lexicon: BDAG
  rationale: Idiomatic English for membership within the community addressed by James.
- source_word: δειξάτω
  chosen: Let him show
  alternatives:
  - He must show
  - Let that one show
  lexicon: BDAG
  rationale: Aorist imperative, third singular. 'Let him show' preserves the imperative
    force in natural English. The masculine singular reflects the Greek form and representative
    force.
- source_word: ἐκ
  chosen: by
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: 'Here ἐκ expresses source or manner: the works are to be shown as arising
    from a good conduct. ''By'' communicates this idiomatically in English.'
- source_word: τῆς καλῆς ἀναστροφῆς
  chosen: his good way of life
  alternatives:
  - good conduct
  - good behavior
  lexicon: BDAG
  rationale: ἀναστροφή denotes conduct or manner of life. 'Way of life' is readable
    modern English and broad enough to include habitual conduct. 'His' is supplied
    for smooth English because αὐτοῦ later governs 'works,' and the sense is that
    the works are demonstrated through the person's own good conduct.
- source_word: τὰ ἔργα αὐτοῦ
  chosen: his works
  alternatives:
  - his deeds
  lexicon: BDAG
  rationale: ἔργα commonly means deeds/works. 'Works' preserves the lexical link with
    James's broader emphasis on works, while remaining natural here.
- source_word: ἐν πραΰτητι σοφίας
  chosen: in the meekness of wisdom
  alternatives:
  - with the gentleness that comes from wisdom
  - in wisdom's gentleness
  lexicon: BDAG
  rationale: 'πραΰτης is best rendered ''meekness'' or ''gentleness.'' ''Meekness''
    preserves the virtue''s moral texture without reducing it to mere softness. The
    genitive σοφίας is taken as attributive or source-related: meekness characterized
    by wisdom. A more dynamic alternative is preserved in a footnote.'
