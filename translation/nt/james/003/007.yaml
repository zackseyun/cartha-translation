id: JAS.3.7
reference: James 3:7
source:
  edition: SBLGNT
  text: πᾶσα γὰρ φύσις θηρίων τε καὶ πετεινῶν ἑρπετῶν τε καὶ ἐναλίων δαμάζεται καὶ
    δεδάμασται τῇ φύσει τῇ ἀνθρωπίνῃ·
translation:
  text: For every kind of wild animal and bird, of reptile and sea creature, is being
    tamed and has been tamed by the human race.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by human nature' or 'by humanity.' The Greek phrase τῇ φύσει τῇ ἀνθρωπίνῃ
      can be understood collectively of humankind or more abstractly of the human
      sphere/nature; the main text takes it collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ... φύσις
  chosen: every kind
  alternatives:
  - every nature
  - all kinds
  lexicon: BDAG
  rationale: Although φύσις often means 'nature,' in this zoological catalog the idiomatic
    sense is 'kind' or 'species/class.' 'Every kind' is natural English and fits the
    distributive force of πᾶσα.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the preceding statement, and 'For'
    preserves that logical connection straightforwardly.
- source_word: θηρίων
  chosen: wild animal
  alternatives:
  - beast
  - animal
  lexicon: BDAG
  rationale: θηρίον commonly denotes a beast or wild animal. 'Wild animal' is clearer
    in modern English than 'beast' and preserves the untamed-creature sense.
- source_word: πετεινῶν
  chosen: bird
  alternatives:
  - flying creature
  - bird kind
  lexicon: BDAG
  rationale: The term refers to birds/flying creatures. 'Bird' is the most natural
    concise rendering in this list.
- source_word: ἑρπετῶν
  chosen: reptile
  alternatives:
  - creeping thing
  - crawler
  lexicon: BDAG
  rationale: While the word can broadly mean creeping things, 'reptile' is the standard
    modern category in English and suits the catalog style here.
- source_word: ἐναλίων
  chosen: sea creature
  alternatives:
  - creature of the sea
  - marine animal
  lexicon: BDAG
  rationale: The adjective/substantival form denotes things in the sea. 'Sea creature'
    is idiomatic and broad enough to match the Greek.
- source_word: δαμάζεται
  chosen: is being tamed
  alternatives:
  - is tamed
  - is subdued
  lexicon: BDAG
  rationale: The present passive indicates an ongoing/general process. 'Is being tamed'
    preserves the aspect better than a simple present stative rendering.
- source_word: δεδάμασται
  chosen: has been tamed
  alternatives:
  - is tamed
  - has been subdued
  lexicon: BDAG
  rationale: 'The perfect passive highlights a completed state resulting from taming.
    Rendering both verbs distinctly preserves James''s rhetorical force: humanity
    both tames and has tamed the animal world.'
- source_word: τῇ φύσει τῇ ἀνθρωπίνῃ
  chosen: by the human race
  alternatives:
  - by human nature
  - by mankind
  - by humanity
  lexicon: BDAG
  rationale: Here φύσις with ἀνθρωπίνῃ is best taken collectively of humankind rather
    than abstract 'human nature.' 'By the human race' clearly expresses the agent
    as humanity as a whole. 'Mankind' is possible, but 'human race' avoids ambiguity
    while retaining collective force.
