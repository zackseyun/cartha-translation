id: JAS.3.14
reference: James 3:14
source:
  edition: SBLGNT
  text: εἰ δὲ ζῆλον πικρὸν ἔχετε καὶ ἐριθείαν ἐν τῇ καρδίᾳ ὑμῶν, μὴ κατακαυχᾶσθε καὶ
    ψεύδεσθε κατὰ τῆς ἀληθείας.
translation:
  text: But if you have bitter jealousy and selfish ambition in your hearts, do not
    boast and lie against the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bitter zeal' or 'bitter envy' for 'bitter jealousy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rivalry' or 'factiousness' for 'selfish ambition.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lie contrary to the truth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in your heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: ζῆλον πικρὸν
  chosen: bitter jealousy
  alternatives:
  - bitter zeal
  - bitter envy
  lexicon: BDAG
  rationale: ζῆλος can denote zeal or jealousy depending on context. Here, paired
    with ἐριθείαν and presented negatively, the hostile sense is primary. 'Jealousy'
    communicates the vice more clearly than 'zeal,' while 'bitter' preserves πικρόν
    directly.
- source_word: ἐριθείαν
  chosen: selfish ambition
  alternatives:
  - rivalry
  - factiousness
  lexicon: BDAG
  rationale: ἐριθεία often carries the sense of self-seeking partisanship or ambition.
    'Selfish ambition' is established, readable English that captures both the inward
    motive and divisive social effect.
- source_word: ἐν τῇ καρδίᾳ ὑμῶν
  chosen: in your heart
  alternatives:
  - in your hearts
  lexicon: BDAG
  rationale: 'The Greek uses singular καρδίᾳ with plural ὑμῶν, a common distributive
    construction. English idiom prefers singular here: each person is addressed as
    having such motives ''in your heart.'''
- source_word: μὴ κατακαυχᾶσθε
  chosen: do not boast
  alternatives:
  - do not boast arrogantly
  - do not exult over
  lexicon: BDAG
  rationale: The verb means to boast or glory over/against. In this context James
    warns against arrogant self-exaltation flowing from bitter jealousy and selfish
    ambition. 'Do not boast' is concise and natural, with the adversative nuance supplied
    by the following phrase.
- source_word: ψεύδεσθε κατὰ τῆς ἀληθείας
  chosen: lie against the truth
  alternatives:
  - be false to the truth
  - lie contrary to the truth
  lexicon: BDAG
  rationale: ψεύδομαι means 'to lie' or 'to speak falsely.' With κατά + genitive,
    the sense is opposition to the truth. 'Lie against the truth' preserves both the
    verbal force and the adversative preposition more transparently than a looser
    paraphrase.
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - If, however
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding description of heavenly wisdom.
    'But if' clearly signals that contrast in natural English.
