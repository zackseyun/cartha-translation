theological_decisions:
- issue: Nature of 'the truth'
  chosen_reading: Rendered generically as 'the truth' without specifying a doctrinal
    system or merely subjective sincerity.
  alternative_readings:
  - the gospel truth
  - the true way of wisdom
  - truthfulness in speech
  rationale: ἀλήθεια here should remain broad enough to include God's truth over against
    self-deceptive boasting. Narrowing it to a specific doctrinal formula would import
    more than the verse states; reducing it to mere honesty would flatten the theological
    weight.
  doctrine_reference: Preserve theological tension rather than resolve it.
