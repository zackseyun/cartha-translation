  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/james/003/014.json
  category: awkward_english
  tier: 1
  from: in your heart
  to: in your hearts
  rationale: The Greek uses a distributive singular ('the heart of you' plural), which
    can be rendered in English as singular or plural. However, the singular 'in your
    heart' can be ambiguous, potentially suggesting a single addressee. Since James
    is addressing a group, the plural 'in your hearts' is clearer, less awkward, and
    aligns with common English idiom for addressing groups (e.g., 'search your hearts').
