id: JAS.3.12
reference: James 3:12
source:
  edition: SBLGNT
  text: μὴ δύναται, ἀδελφοί μου, συκῆ ἐλαίας ποιῆσαι ἢ ἄμπελος σῦκα; ⸂οὔτε ἁλυκὸν⸃
    γλυκὺ ποιῆσαι ὕδωρ.
translation:
  text: My brothers, can a fig tree produce olives, or a grapevine figs? Neither can
    salt water produce fresh water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My brothers and sisters.' The Greek says 'brothers,' a masculine plural
      form that can address a mixed group.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sweet water'; in this context the sense is 'fresh water' in contrast
      to salt water.
    reason: lexical_alternative
  - marker: c
    text: 'The final clause is elliptical in Greek and may also be understood in light
      of the previous verse''s spring imagery: ''Nor can a salt spring produce fresh
      water.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἀδελφοί μου
  chosen: My brothers
  alternatives:
  - My brothers and sisters
  - My brethren
  lexicon: BDAG
  rationale: Gender-accurate rendering follows the source's masculine plural vocative
    and the project's stated philosophy. In James, the address is representative to
    the whole community, but the main text preserves the masculine form; an inclusive
    alternative is worth noting in a footnote.
- source_word: μὴ δύναται
  chosen: can
  alternatives:
  - is able to
  - surely cannot
  lexicon: BDAG
  rationale: In a rhetorical question introduced by μή, the sense expects a negative
    answer. English idiom is best conveyed by 'can ... ?' rather than a more wooden
    'is able to ... ?' The impossibility is carried by the rhetorical form.
- source_word: συκῆ
  chosen: fig tree
  alternatives:
  - fig
  lexicon: BDAG
  rationale: The noun denotes the tree, not the fruit. 'Fig tree' is the natural English
    equivalent and preserves the agricultural image.
- source_word: ἐλαίας ποιῆσαι
  chosen: produce olives
  alternatives:
  - bear olives
  - make olives
  lexicon: BDAG
  rationale: ποιέω here refers to producing or yielding fruit. 'Produce' is clear
    modern English; 'bear' is possible but slightly more traditional. 'Make' would
    sound unnatural in English for a tree's fruit.
- source_word: ἄμπελος
  chosen: grapevine
  alternatives:
  - vine
  lexicon: BDAG
  rationale: '''Grapevine'' makes explicit the kind of vine intended and matches the
    parallel agricultural imagery.'
- source_word: σῦκα
  chosen: figs
  lexicon: BDAG
  rationale: Straightforward plural object meaning the fruit 'figs.'
- source_word: οὔτε ἁλυκὸν
  chosen: Neither can salt water
  alternatives:
  - Nor can a salt spring
  - Neither can something salty
  lexicon: BDAG
  rationale: The Greek is compressed and elliptical. ἁλυκόν is an adjective used substantivally,
    'salt' or 'salty [water/spring].' Because ὕδωρ appears later as the object and
    the immediate context in James 3:11 concerns springs pouring out water, English
    requires some unpacking. 'Salt water' best preserves the sense without over-specifying
    beyond the text.
- source_word: γλυκὺ ποιῆσαι ὕδωρ
  chosen: produce fresh water
  alternatives:
  - produce sweet water
  lexicon: BDAG
  rationale: γλυκύς literally means 'sweet,' but in water imagery it idiomatically
    contrasts with salty water as 'fresh.' 'Fresh water' is the clearest natural English
    rendering while preserving the contrast.
