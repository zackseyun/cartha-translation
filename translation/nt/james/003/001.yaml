theological_decisions:
- issue: Scope of ἀδελφοί μου in a mixed congregation
  chosen_reading: Render as 'my brothers' in the main text, with inclusive sense noted
    in a footnote.
  alternative_readings:
  - my brothers and sisters
  rationale: The translation philosophy requires gender-accurate rendering over gender-neutral
    smoothing. Since ἀδελφοί often addresses the whole believing community, the likely
    inclusive force is preserved by annotation rather than replacing the masculine
    form in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Force of κρίμα in warning to teachers
  chosen_reading: Render as 'judgment' rather than 'condemnation.'
  alternative_readings:
  - condemnation
  - sentence
  rationale: The verse warns of heightened accountability for teachers, but the noun
    itself does not require the stronger sense of final condemnation. 'Judgment' preserves
    theological tension and avoids importing a more specific doctrinal claim than
    the Greek states.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
