id: JAS.3.15
reference: James 3:15
source:
  edition: SBLGNT
  text: οὐκ ἔστιν αὕτη ἡ σοφία ἄνωθεν κατερχομένη, ἀλλὰ ἐπίγειος, ψυχική, δαιμονιώδης·
translation:
  text: This wisdom is not coming down from above, but is earthly, unspiritual, demonic.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'natural.' The Greek adjective can denote what belongs merely to natural
      life, in contrast to what is spiritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη ἡ σοφία
  chosen: This wisdom
  alternatives:
  - This kind of wisdom
  - Such wisdom
  lexicon: BDAG
  rationale: The demonstrative with the article and noun points to the kind of 'wisdom'
    just described in context. 'This wisdom' is the most direct rendering; alternatives
    are possible but slightly more interpretive.
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: ἄνωθεν commonly means 'from above' and in James carries theological resonance
    with divine origin (cf. 1:17). 'From heaven' is interpretive and less textually
    precise.
- source_word: κατερχομένη
  chosen: coming down
  alternatives:
  - descending
  lexicon: BDAG
  rationale: The present middle/passive participle modifying 'wisdom' is naturally
    rendered 'coming down.' 'Descending' is more formal but less idiomatic in modern
    English.
- source_word: ἐπίγειος
  chosen: earthly
  alternatives:
  - worldly
  lexicon: BDAG
  rationale: The adjective contrasts with 'from above' and denotes what belongs to
    the earth. 'Earthly' preserves the lexical contrast more exactly than 'worldly,'
    which adds interpretive nuance.
- source_word: ψυχική
  chosen: unspiritual
  alternatives:
  - natural
  - soulish
  lexicon: BDAG
  rationale: In NT usage ψυχικός often contrasts with what is of the Spirit; 'unspiritual'
    communicates that contrast clearly in modern English. 'Natural' is possible but
    can sound morally neutral; 'soulish' is too opaque for most readers.
- source_word: δαιμονιώδης
  chosen: demonic
  alternatives:
  - of demons
  - devilish
  lexicon: BDAG
  rationale: The adjective denotes that which pertains to or is characterized by demons.
    'Demonic' is concise, standard, and avoids the archaic or potentially misleading
    connotations of 'devilish'.
