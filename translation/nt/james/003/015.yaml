theological_decisions:
- issue: Force of ψυχική in relation to spiritual/moral contrast
  chosen_reading: Rendered as 'unspiritual' to reflect contrast with what comes from
    above and, by implication in James, from God rather than the Spirit-less merely
    natural realm.
  alternative_readings:
  - natural
  - sensual
  rationale: The verse stacks three adjectives in descending moral/theological evaluation.
    'Unspiritual' best captures the negative contrast in accessible English without
    importing a specific doctrinal system. 'Sensual' reflects older English tradition
    but is misleading in contemporary usage because it suggests sexual indulgence
    specifically.
  doctrine_reference: Translation philosophy §§1, 5, 6; Preserve theological tension
    rather than resolve it where ambiguity is genuine.
