id: JAS.3.16
reference: James 3:16
source:
  edition: SBLGNT
  text: ὅπου γὰρ ζῆλος καὶ ἐριθεία, ἐκεῖ ἀκαταστασία καὶ πᾶν φαῦλον πρᾶγμα.
translation:
  text: For where jealousy and selfish ambition are, there is disorder and every vile
    practice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy.' The Greek term can also mean 'zeal,' but here
      the context is clearly negative.
    reason: lexical_alternative
  - marker: b
    text: Or 'every evil thing/deed.' Literally, 'every vile thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - wherever
  lexicon: BDAG
  rationale: Introduces a general locative condition. 'Where' is natural English and
    preserves the sense without adding distributive force beyond the Greek.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse. 'For' is concise
    and suitably formal in context.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: BDAG
  rationale: In this context James is describing corrupt, earthly wisdom (vv. 14-15),
    so the negative sense is required. 'Jealousy' fits the vice context better than
    the more ambiguous 'zeal'; 'envy' is possible but 'jealousy' aligns well with
    the immediate contrast.
- source_word: ἐριθεία
  chosen: selfish ambition
  alternatives:
  - rivalry
  - factiousness
  - self-seeking
  lexicon: BDAG
  rationale: This term commonly denotes partisan self-advancement or selfish rivalry.
    'Selfish ambition' is established, clear modern English that captures motive and
    social effect.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: 'Correlates with ὅπου and keeps the aphoristic structure: ''where...
    there...''.'
- source_word: ἀκαταστασία
  chosen: disorder
  alternatives:
  - confusion
  - instability
  - unrest
  lexicon: BDAG
  rationale: The noun denotes disturbance or disorder rather than mere mental confusion.
    'Disorder' best captures communal disruption in the context of interpersonal sin.
- source_word: πᾶν
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: With singular πρᾶγμα, 'every' is the most idiomatic rendering in English.
- source_word: φαῦλον
  chosen: vile
  alternatives:
  - evil
  - worthless
  - base
  lexicon: BDAG
  rationale: φαῦλος can denote moral badness or baseness. 'Vile' conveys moral corruption
    strongly and pairs naturally with 'practice.' 'Evil' is possible but more generic.
- source_word: πρᾶγμα
  chosen: practice
  alternatives:
  - thing
  - deed
  - activity
  lexicon: BDAG
  rationale: Although literally 'thing' or 'matter,' in this vice-context an abstractly
    literal rendering would sound wooden in English. 'Practice' communicates concrete
    wrongful conduct and is a common idiomatic equivalent for the phrase πᾶν φαῦλον
    πρᾶγμα.
