theological_decisions:
- issue: Moral force of ζῆλος in context
  chosen_reading: Negative vice term rendered as 'jealousy'
  alternative_readings:
  - '''zeal'' in a neutral or positive sense'
  - '''envy'''
  rationale: The immediate context (3:14-15) speaks of 'bitter jealousy' and selfish
    ambition as marks of earthly, unspiritual wisdom. Rendering the term positively
    would contradict James's argument. 'Jealousy' preserves the vice sense without
    overinterpreting beyond the context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense.'
