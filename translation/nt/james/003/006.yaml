theological_decisions:
- issue: Rendering of γέεννα
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: The Greek uses γέεννα specifically, and preserving the term maintains
    historical and conceptual precision while avoiding importing later systematic
    associations beyond the text. Because many English readers expect 'hell,' that
    alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
