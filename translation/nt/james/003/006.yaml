id: JAS.3.6
reference: James 3:6
source:
  edition: SBLGNT
  text: καὶ ἡ γλῶσσα πῦρ, ὁ κόσμος τῆς ⸀ἀδικίας ἡ γλῶσσα καθίσταται ἐν τοῖς μέλεσιν
    ἡμῶν, ἡ σπιλοῦσα ὅλον τὸ σῶμα καὶ φλογίζουσα τὸν τροχὸν τῆς γενέσεως καὶ φλογιζομένη
    ὑπὸ τῆς γεέννης.
translation:
  text: And the tongue is a fire. The tongue is set among our members as a world of
    unrighteousness, staining the whole body and setting on fire the wheel of birth,
    and being set on fire by Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defiling the whole body.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the course of life' or 'the cycle of life' for 'the wheel of birth.'
    reason: lexical_alternative
  - marker: c
    text: Gehenna is the Greek term; traditionally rendered 'hell.'
    reason: alternative_reading
lexical_decisions:
- source_word: γλῶσσα
  chosen: tongue
  alternatives:
  - speech
  lexicon: BDAG
  rationale: Rendered literally as 'tongue' because James uses the body part metaphor
    concretely throughout the context while also implying speech by metonymy.
- source_word: πῦρ
  chosen: a fire
  alternatives:
  - fire
  lexicon: BDAG
  rationale: Anarthrous predicate noun is naturally rendered 'a fire' in English,
    preserving the metaphor of destructive potency.
- source_word: κόσμος τῆς ἀδικίας
  chosen: a world of unrighteousness
  alternatives:
  - the world of unrighteousness
  - a world of injustice
  - the world of iniquity
  lexicon: BDAG
  rationale: Kept the vivid idiom 'world of unrighteousness' rather than flattening
    it to 'full of evil.' The genitive is taken qualitatively/descriptively. 'Unrighteousness'
    fits ἀδικία well here and preserves moral breadth better than 'injustice' alone.
- source_word: καθίσταται
  chosen: is set
  alternatives:
  - is established
  - is appointed
  - is placed
  lexicon: BDAG
  rationale: In context the verb describes the tongue's position/status among the
    body's members. 'Is set' is concise and idiomatic, preserving the passive/middle
    sense without overinterpreting.
- source_word: ἐν τοῖς μέλεσιν ἡμῶν
  chosen: among our members
  alternatives:
  - among our body parts
  - among our limbs
  lexicon: BDAG
  rationale: '''Members'' is the standard anatomical rendering in this kind of context
    and keeps the connection with the body''s parts in the following clause.'
- source_word: σπιλοῦσα
  chosen: staining
  alternatives:
  - defiling
  - spotting
  - polluting
  lexicon: BDAG
  rationale: The participle conveys moral contamination with imagery of staining/defilement.
    'Staining' preserves the metaphor and remains readable; 'defiling' is a viable
    alternative preserved in a footnote.
- source_word: ὅλον τὸ σῶμα
  chosen: the whole body
  alternatives:
  - the entire body
  lexicon: BDAG
  rationale: Straightforward literal rendering preserving the totalizing force of
    ὅλον.
- source_word: φλογίζουσα
  chosen: setting on fire
  alternatives:
  - igniting
  - burning up
  lexicon: BDAG
  rationale: This keeps the repeated fire imagery and matches the participial action
    clearly in English.
- source_word: τὸν τροχὸν τῆς γενέσεως
  chosen: the wheel of birth
  alternatives:
  - the cycle of life
  - the course of life
  - the wheel of existence
  lexicon: BDAG
  rationale: This difficult phrase is rendered more literally to preserve the metaphorical
    strangeness of the Greek. 'Birth' reflects γένεσις directly. Because 'course of
    life' is a common interpretive rendering, it is preserved in a footnote.
- source_word: φλογιζομένη
  chosen: being set on fire
  alternatives:
  - being ignited
  - being inflamed
  lexicon: BDAG
  rationale: Passive participle rendered transparently to show that the tongue's destructive
    activity is itself fueled by another source.
- source_word: ὑπὸ τῆς γεέννης
  chosen: by Gehenna
  alternatives:
  - by hell
  lexicon: BDAG
  rationale: Translated rather than interpreted by retaining 'Gehenna,' the specific
    term used in the Greek, avoiding premature flattening into the broader English
    theological term 'hell.' The common rendering 'hell' is preserved in a footnote.
