id: JAS.3.11
reference: James 3:11
source:
  edition: SBLGNT
  text: μήτι ἡ πηγὴ ἐκ τῆς αὐτῆς ὀπῆς βρύει τὸ γλυκὺ καὶ τὸ πικρόν;
translation:
  text: A spring does not pour out both sweet and bitter water from the same opening,
    does it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Does the spring gush forth the sweet and the bitter
      from the same opening?'
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτι
  chosen: does not ... does it?
  alternatives:
  - surely ... not?
  - can ... ?
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. In English, a
    negative tag question best preserves the rhetorical force without sounding wooden.
- source_word: πηγή
  chosen: spring
  alternatives:
  - fountain
  - source
  lexicon: BDAG
  rationale: πηγή commonly denotes a spring or fountain as a natural water source.
    'Spring' is the most natural modern English equivalent in this context.
- source_word: ἐκ τῆς αὐτῆς ὀπῆς
  chosen: from the same opening
  alternatives:
  - from the same hole
  - from the same mouth
  lexicon: BDAG
  rationale: ὀπή literally means an opening or hole. 'Opening' is idiomatic and fits
    the image of a spring's outlet without over-literal awkwardness. 'Mouth' is possible
    metaphorically but is less directly tied to the physical image here.
- source_word: βρύει
  chosen: pour out
  alternatives:
  - gush forth
  - bubble up
  - produce
  lexicon: BDAG
  rationale: βρύω refers to gushing or welling forth. 'Pour out' communicates the
    action clearly in modern English while preserving the image of water issuing from
    a spring.
- source_word: τὸ γλυκύ
  chosen: sweet water
  alternatives:
  - fresh water
  - sweet
  lexicon: BDAG
  rationale: γλυκύ literally means 'sweet,' especially in contrast with bitter. Adding
    'water' in English makes explicit the implied object and clarifies the parallel
    with 'bitter water.' 'Fresh' is interpretive and less directly lexical.
- source_word: τὸ πικρόν
  chosen: bitter water
  alternatives:
  - bitter
  lexicon: BDAG
  rationale: πικρός means 'bitter.' As with τὸ γλυκύ, supplying 'water' is natural
    in English because the adjectives function substantivally in reference to what
    the spring emits.
