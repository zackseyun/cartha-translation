theological_decisions:
- issue: Rendering of generic ἀνθρώπους
  chosen_reading: people
  alternative_readings:
  - men
  - human beings
  rationale: The verse speaks of humans generally as those made in God's likeness.
    Using 'people' preserves the generic sense without restricting the referent to
    males, consistent with the project's gender-accurate principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relation of 'Lord and Father'
  chosen_reading: the Lord and Father
  alternative_readings:
  - the Lord, namely the Father
  - the Lord and the Father
  rationale: The Greek permits an appositional sense, but the translation preserves
    the wording without forcing a more interpretive expansion. This maintains theological
    clarity while avoiding over-resolution.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
