id: JAS.3.9
reference: James 3:9
source:
  edition: SBLGNT
  text: ἐν αὐτῇ εὐλογοῦμεν τὸν ⸀κύριον καὶ πατέρα, καὶ ἐν αὐτῇ καταρώμεθα τοὺς ἀνθρώπους
    τοὺς καθ’ ὁμοίωσιν θεοῦ γεγονότας·
translation:
  text: With it we bless the Lord and Father, and with it we curse people who have
    been made according to the likeness of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Lord and Father'; the phrase may be understood
      appositionally as 'the Lord, who is Father' or as a paired designation for God.
    reason: alternative_reading
  - marker: b
    text: Or 'human beings'; Greek 'men/people' here refers to humanity in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ
  chosen: with it
  alternatives:
  - by it
  - in it
  lexicon: BDAG
  rationale: Refers back to the tongue in the preceding context. English idiom prefers
    'with it' for instrumentality over the more literal but less natural 'in it.'
- source_word: εὐλογοῦμεν
  chosen: we bless
  alternatives:
  - we praise
  - we speak well of
  lexicon: BDAG
  rationale: '''Bless'' preserves the lexical connection with biblical blessing language
    and fits the God-directed object better than the flatter ''praise'' alone.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' Here it
    functions as a divine title.
- source_word: καὶ πατέρα
  chosen: and Father
  alternatives:
  - even Father
  - that is, the Father
  lexicon: BDAG
  rationale: The coordinate construction is best carried over straightforwardly as
    'and Father.' This preserves the appositional force without over-interpreting
    the relationship between the two nouns.
- source_word: καταρώμεθα
  chosen: we curse
  alternatives:
  - we call down curses on
  lexicon: BDAG
  rationale: '''Curse'' is the direct and natural English equivalent, preserving the
    moral force of the contrast with ''bless.'''
- source_word: ἀνθρώπους
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although grammatically masculine, the referent is generic humanity. 'People'
    accurately conveys inclusive human reference in idiomatic English without implying
    only males.
- source_word: καθ’ ὁμοίωσιν θεοῦ
  chosen: according to the likeness of God
  alternatives:
  - in the likeness of God
  - after the likeness of God
  lexicon: BDAG
  rationale: This closely reflects the prepositional phrase while remaining natural
    English. 'According to' preserves the formal correspondence language and echoes
    creation terminology.
- source_word: γεγονότας
  chosen: have been made
  alternatives:
  - have come to be
  - have become
  lexicon: BDAG
  rationale: Given the context of humanity bearing God's likeness, 'have been made'
    best conveys resultant state with implicit divine agency, and aligns with the
    likely allusion to creation language.
