id: JAS.3.5
reference: James 3:5
source:
  edition: SBLGNT
  text: οὕτως καὶ ἡ γλῶσσα μικρὸν μέλος ἐστὶν καὶ ⸂μεγάλα αὐχεῖ⸃. Ἰδοὺ ⸀ἡλίκον πῦρ
    ἡλίκην ὕλην ἀνάπτει·
translation:
  text: So also the tongue is a small member, and yet it boasts of great things. See
    how small a fire sets ablaze so great a forest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "See how great a fire sets ablaze how great a forest." The Greek wording
      can be taken exclamatorily, but the main text follows the sense of a small cause
      producing a large effect, which fits the immediate comparison with the tongue
      as a small member.
    reason: alternative_reading
  - marker: b
    text: Or "wood," "timber," or "brush." The Greek word can refer broadly to combustible
      material or woodland; "forest" best fits the image in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  chosen: tongue
  alternatives:
  - speech
  lexicon: BDAG
  rationale: Rendered literally as "tongue" to preserve James's concrete body-part
    metaphor, which grounds the comparison with "small member." "Speech" would interpret
    the image rather than translate it.
- source_word: μικρὸν μέλος
  chosen: a small member
  alternatives:
  - a small part of the body
  - a small organ
  lexicon: BDAG
  rationale: '"Member" preserves the bodily imagery and the connection to the preceding
    analogy in the context. "Part of the body" is clearer but less concise and slightly
    more interpretive.'
- source_word: μεγάλα αὐχεῖ
  chosen: it boasts of great things
  alternatives:
  - it makes great boasts
  - it boasts greatly
  lexicon: BDAG
  rationale: The idiom combines the neuter plural adjective with the verb "boast"
    to express grand claims or proud speech. "Boasts of great things" is natural English
    and preserves the sense without over-paraphrasing.
- source_word: Ἰδοὺ
  chosen: See
  alternatives:
  - Behold
  - Look
  lexicon: BDAG
  rationale: '"See" is a natural modern equivalent that retains the demonstrative
    force of drawing attention to the illustration. "Behold" is too archaic for the
    stated translation philosophy.'
- source_word: ἡλίκον πῦρ
  chosen: how small a fire
  alternatives:
  - what a small fire
  - how great a fire
  lexicon: BDAG
  rationale: In context the point is the disproportion between a small cause and a
    large effect, matching the tongue as a "small member." Rendering ἡλίκον here as
    "how small" best captures the rhetorical force in this comparison. Some take it
    exclamatorily as "how great a fire," but that weakens the small-cause/large-effect
    parallel.
- source_word: ἡλίκην ὕλην
  chosen: so great a forest
  alternatives:
  - such a large forest
  - so much timber
  - a great woodland
  lexicon: BDAG
  rationale: ὕλη can denote forest, wood, or fuel. In this image, "forest" best communicates
    the large mass ignited by a small fire in idiomatic English. "Timber" is possible
    but sounds more like cut wood than standing woodland.
- source_word: ἀνάπτει
  chosen: sets ablaze
  alternatives:
  - kindles
  - ignites
  lexicon: BDAG
  rationale: '"Sets ablaze" is vivid, readable modern English and fits the image of
    a fire spreading through a forest. "Kindles" is more formal but less natural for
    many readers.'
