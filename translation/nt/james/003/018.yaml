theological_decisions:
- issue: Sense of 'fruit of righteousness'
  chosen_reading: An ethical result or yield characterized by righteousness, flowing
    from heavenly wisdom and peaceable conduct.
  alternative_readings:
  - A harvest that consists in righteousness
  - Fruit that produces righteousness
  rationale: 'The genitive δικαιοσύνης is best taken as descriptive or appositional
    in context: the yield is righteous in character. The translation preserves the
    phrase without over-interpreting the exact genitival nuance.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
