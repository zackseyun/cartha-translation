id: JAS.3.18
reference: James 3:18
source:
  edition: SBLGNT
  text: καρπὸς ⸀δὲ δικαιοσύνης ἐν εἰρήνῃ σπείρεται τοῖς ποιοῦσιν εἰρήνην.
translation:
  text: And the fruit of righteousness is sown in peace by those who make peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fruit of justice.' The Greek word can carry both moral and relational/legal
      overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'for those who make peace.' The Greek dative may be understood differently,
      though 'by those who make peace' best fits the passive verb here.
    reason: alternative_reading
lexical_decisions:
- source_word: καρπὸς
  chosen: fruit
  alternatives:
  - harvest
  - produce
  lexicon: BDAG
  rationale: The singular noun is naturally rendered 'fruit.' 'Harvest' is possible
    in context, but 'fruit' better preserves the metaphor and the Greek lexical form.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild connective rather than a strong contrast. 'And'
    fits the flow from the preceding description of heavenly wisdom into its result.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the project's default for δικαιοσύνη, 'righteousness' is used
    in the main text. In this context it can denote right conduct or the outcome of
    godly wisdom; 'justice' is a viable alternative nuance and is preserved in a footnote.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - with peace
  - in a peaceful way
  lexicon: BDAG
  rationale: The prepositional phrase is kept fairly literal as 'in peace,' preserving
    the imagery and allowing the phrase to modify the manner or sphere of the sowing.
- source_word: σπείρεται
  chosen: is sown
  alternatives:
  - is being sown
  lexicon: BDAG
  rationale: The present passive is well represented by the English present passive
    'is sown.' A progressive rendering is possible but unnecessary in idiomatic English.
- source_word: τοῖς ποιοῦσιν εἰρήνην
  chosen: by those who make peace
  alternatives:
  - for those who make peace
  - for peacemakers
  lexicon: BDAG
  rationale: 'Although the dative can be taken in more than one way, the agentive
    sense with the passive verb is the most natural here: the fruit is sown by the
    ones producing peace. ''Make peace'' closely reflects ποιέω + εἰρήνην; ''peacemakers''
    is smoother but less explicit to the Greek verbal construction.'
