id: JAS.3.10
reference: James 3:10
source:
  edition: SBLGNT
  text: ἐκ τοῦ αὐτοῦ στόματος ἐξέρχεται εὐλογία καὶ κατάρα. οὐ χρή, ἀδελφοί μου, ταῦτα
    οὕτως γίνεσθαι.
translation:
  text: From the same mouth come blessing and cursing. My brothers, these things ought
    not to be so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My brothers and sisters'; the Greek says 'brothers,' but in context
      James is likely addressing the whole believing community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ αὐτοῦ στόματος
  chosen: From the same mouth
  alternatives:
  - Out of the same mouth
  - From the very same mouth
  lexicon: BDAG
  rationale: A straightforward spatial/source expression. 'From' is natural modern
    English while preserving the image of speech issuing from one source.
- source_word: ἐξέρχεται
  chosen: come
  alternatives:
  - comes forth
  - proceeds
  lexicon: BDAG
  rationale: 'Although singular in Greek, the verb governs two coordinated nominatives
    (''blessing and cursing'') and is idiomatically rendered in English with a plural
    sense: ''come.'' ''Comes forth'' is more formal but less natural.'
- source_word: εὐλογία
  chosen: blessing
  alternatives:
  - praise
  - blessing speech
  lexicon: BDAG
  rationale: In this context of speech from the tongue/mouth, the noun refers to uttered
    blessing. 'Blessing' is the most direct and idiomatic rendering and preserves
    the contrast with 'cursing.'
- source_word: κατάρα
  chosen: cursing
  alternatives:
  - curse
  lexicon: BDAG
  rationale: Rendered as the verbal-noun 'cursing' to match the speech-act sense and
    to pair naturally with 'blessing.' 'Curse' is possible, but 'cursing' better reflects
    the ongoing/characteristic utterance implied in context.
- source_word: οὐ χρή
  chosen: ought not
  alternatives:
  - should not
  - it is not fitting
  lexicon: BDAG
  rationale: χρή expresses what is necessary, proper, or fitting. 'Ought not' preserves
    the moral impropriety James is stressing without sounding overly wooden. 'Should
    not' is possible but slightly weaker; 'it is not fitting' is more interpretive.
- source_word: ἀδελφοί μου
  chosen: My brothers
  alternatives:
  - My brothers and sisters
  - My siblings
  lexicon: BDAG
  rationale: Per the gender-accurate policy, the grammatically masculine plural is
    retained as 'brothers' in the main text. Because the address likely includes the
    whole Christian community, an inclusive alternative is worth preserving in a footnote
    rather than replacing the source-shaped form.
- source_word: ταῦτα οὕτως γίνεσθαι
  chosen: these things ought not to be so
  alternatives:
  - this ought not to happen this way
  - these things should not be like this
  lexicon: BDAG
  rationale: This keeps the demonstrative plural ('these things') and the adverb οὕτως
    ('so/in this way') while producing natural English. It preserves James's evaluative
    conclusion without paraphrasing beyond the Greek.
