theological_decisions:
- issue: Gendered familial address in ἀδελφοί μου
  chosen_reading: My brothers
  alternative_readings:
  - My brothers and sisters
  - My siblings
  rationale: The Greek form is masculine plural and should be represented in the main
    text according to the project's gender-accurate policy. Since James commonly addresses
    the mixed Christian assembly with ἀδελφοί, the inclusive sense is preserved in
    a footnote rather than neutralized in the main text.
