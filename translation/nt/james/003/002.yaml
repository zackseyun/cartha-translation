theological_decisions:
- issue: Meaning of τέλειος in ethical context
  chosen_reading: mature rather than absolutely perfect/sinless
  alternative_readings:
  - perfect
  - complete
  rationale: James uses τέλειος in a moral-formation sense (cf. 1:4), emphasizing
    completeness or maturity of character. Rendering it 'perfect' in modern English
    could imply sinless impeccability, which the immediate context ('we all stumble')
    undercuts. 'Mature' preserves the theological tension of real moral growth without
    overstating sinlessness.
  doctrine_reference: Translation philosophy §3, §6
- issue: Representative masculine ἀνήρ
  chosen_reading: man with generic force
  alternative_readings:
  - person
  rationale: The Greek explicitly uses masculine ἀνήρ, not a gender-neutral term.
    Per doctrine, gender-accurate rendering is preferred where the masculine has representative
    force. The verse remains generically applicable because it is introduced by εἴ
    τις ('if anyone').
  doctrine_reference: Translation philosophy §4
