theological_decisions:
- issue: Interpretation of ἀδιάκριτος
  chosen_reading: impartial
  alternative_readings:
  - undivided
  - without uncertainty
  rationale: The adjective can be understood as 'without partiality' or, less likely
    in context, 'without wavering/doubting' or 'undivided.' Because James elsewhere
    addresses favoritism (2:1–4) and double-mindedness (1:6–8; 4:8), both semantic
    possibilities have contextual support. In this ethical catalog, 'impartial' best
    fits the social-moral flow alongside mercy, good fruits, and sincerity, while
    alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
