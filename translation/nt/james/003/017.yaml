id: JAS.3.17
reference: James 3:17
source:
  edition: SBLGNT
  text: ἡ δὲ ἄνωθεν σοφία πρῶτον μὲν ἁγνή ἐστιν, ἔπειτα εἰρηνική, ἐπιεικής, εὐπειθής,
    μεστὴ ἐλέους καὶ καρπῶν ἀγαθῶν, ⸀ἀδιάκριτος, ἀνυπόκριτος·
translation:
  text: But the wisdom from above is first pure, then peaceable, gentle, open to reason,
    full of mercy and good fruits, impartial, sincere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without partiality'; the Greek adjective ἀδιάκριτος may also be understood
      as 'undivided' or 'without uncertainty/doubt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: The adverb commonly means 'from above' and in James contrasts heavenly
    wisdom with earthly wisdom (cf. context in 3:15). 'From above' preserves the spatial-metaphorical
    wording without over-specifying 'heaven.'
- source_word: σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering; in context it denotes the quality or kind of wisdom
    being described.
- source_word: πρῶτον μὲν
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Marks the first item in an ordered description. 'First' is concise and
    natural in English while preserving the sequence.
- source_word: ἁγνή
  chosen: pure
  alternatives:
  - chaste
  - undefiled
  lexicon: BDAG
  rationale: Here the term describes moral purity or unmixed integrity of heavenly
    wisdom. 'Pure' is the clearest modern English equivalent.
- source_word: ἔπειτα
  chosen: then
  alternatives:
  - next
  - after that
  lexicon: BDAG
  rationale: Signals the subsequent qualities in sequence; 'then' is idiomatic and
    sufficiently formal.
- source_word: εἰρηνική
  chosen: peaceable
  alternatives:
  - peace-loving
  - peaceful
  lexicon: BDAG
  rationale: '''Peaceable'' captures a disposition inclined toward peace rather than
    merely a tranquil state. It fits the ethical list well.'
- source_word: ἐπιεικής
  chosen: gentle
  alternatives:
  - forbearing
  - considerate
  lexicon: BDAG
  rationale: The word can denote gentleness, fairness, or yieldingness. 'Gentle' is
    accessible and preserves the ethical tone, though some nuance of forbearance remains
    implicit.
- source_word: εὐπειθής
  chosen: open to reason
  alternatives:
  - compliant
  - yielding
  - willing to listen
  lexicon: BDAG
  rationale: This rare adjective suggests being receptive, teachable, and not stubborn.
    'Open to reason' communicates that the wisdom is persuadable in the sense of being
    reasonable and willing to heed what is right, without implying gullibility.
- source_word: μεστὴ ἐλέους
  chosen: full of mercy
  alternatives:
  - filled with mercy
  lexicon: BDAG
  rationale: A straightforward rendering of the adjective plus genitive construction,
    preserving the abundance implied by μεστή.
- source_word: καρπῶν ἀγαθῶν
  chosen: good fruits
  alternatives:
  - good fruit
  - good deeds
  lexicon: BDAG
  rationale: The plural 'fruits' reflects the Greek and preserves the metaphor of
    visible outcomes or results. 'Good deeds' would interpret rather than translate
    the image.
- source_word: ἀδιάκριτος
  chosen: impartial
  alternatives:
  - without partiality
  - undivided
  - without uncertainty
  lexicon: BDAG
  rationale: In this context, especially given James's concern with favoritism and
    double-mindedness, 'impartial' best fits the ethical list and common contextual
    understanding. The term is lexically difficult, so alternatives are preserved
    in a footnote.
- source_word: ἀνυπόκριτος
  chosen: sincere
  alternatives:
  - without hypocrisy
  - genuine
  lexicon: BDAG
  rationale: The adjective means unhypocritical or genuine. 'Sincere' is natural modern
    English and conveys the absence of pretense.
