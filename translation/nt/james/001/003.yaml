id: JAS.1.3
reference: James 1:3
source:
  edition: SBLGNT
  text: γινώσκοντες ὅτι τὸ δοκίμιον ὑμῶν τῆς πίστεως κατεργάζεται ὑπομονήν·
translation:
  text: because you know that the testing of your faith produces endurance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proven genuineness of your faith.' The Greek term can refer either
      to the testing process or to the quality shown by testing.
    reason: lexical_alternative
  - marker: b
    text: Or 'steadfastness' or 'perseverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκοντες
  chosen: because you know
  alternatives:
  - knowing
  - since you know
  lexicon: BDAG
  rationale: 'Present active participle nominative plural, linked to the imperative
    context of v.2. In English, an explicit causal sense is most natural here: the
    readers can count trials as joy because they know something. ''Because you know''
    captures the participial force idiomatically without losing the connection.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what the readers know. Since the causal nuance
    is already carried by rendering γινώσκοντες as 'because you know,' 'that' is the
    clearest complementizer here.
- source_word: τὸ δοκίμιον
  chosen: the testing
  alternatives:
  - the proven genuineness
  - the trial
  - the proving
  lexicon: BDAG
  rationale: δοκίμιον can denote the process or result of testing. In this context,
    with faith producing endurance through trials, 'the testing' best fits natural
    English and the immediate argument. It avoids the more abstract 'proven genuineness'
    while preserving the refining/proving sense.
- source_word: ὑμῶν τῆς πίστεως
  chosen: of your faith
  alternatives:
  - of your trust
  - of your faithfulness
  lexicon: BDAG
  rationale: 'The genitive construction is straightforward: the testing pertains to
    the readers'' faith. Per doctrine defaults, πίστις is rendered ''faith'' in the
    main text. ''Trust'' and ''faithfulness'' are possible in some contexts, but here
    ''faith'' is the standard and clearest rendering.'
- source_word: κατεργάζεται
  chosen: produces
  alternatives:
  - works
  - brings about
  - accomplishes
  lexicon: BDAG
  rationale: 'The middle/passive-form verb here has active sense: the testing effects
    a result. ''Produces'' is clear modern English and preserves the causal/resultative
    force without sounding wooden.'
- source_word: ὑπομονήν
  chosen: endurance
  alternatives:
  - steadfastness
  - perseverance
  - patient endurance
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under difficulty. 'Endurance' is
    concise and natural, while still broad enough to include perseverance under trial.
    'Steadfastness' is also strong, but slightly less idiomatic for many readers.
