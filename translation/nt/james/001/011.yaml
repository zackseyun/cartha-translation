theological_decisions:
- issue: Gendered reference in ὁ πλούσιος
  chosen_reading: the rich man
  alternative_readings:
  - the rich person
  - the rich one
  rationale: The singular masculine is retained as a representative figure in keeping
    with the project's gender-accurate policy, without implying exclusion of women
    from the warning's scope.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Scope of πορείαις in the warning to the rich
  chosen_reading: pursuits
  alternative_readings:
  - journeys
  - business activities
  rationale: The verse warns that the rich person fades amid his ongoing course of
    life and activity. Rendering the term broadly avoids narrowing the warning to
    literal travel while preserving the metaphorical force of life's undertakings.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
