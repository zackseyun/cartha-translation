id: JAS.1.11
reference: James 1:11
source:
  edition: SBLGNT
  text: ἀνέτειλεν γὰρ ὁ ἥλιος σὺν τῷ καύσωνι καὶ ἐξήρανεν τὸν χόρτον, καὶ τὸ ἄνθος
    αὐτοῦ ἐξέπεσεν καὶ ἡ εὐπρέπεια τοῦ προσώπου αὐτοῦ ἀπώλετο· οὕτως καὶ ὁ πλούσιος
    ἐν ταῖς πορείαις αὐτοῦ μαρανθήσεται.
translation:
  text: For the sun rose with its scorching heat and dried up the grass, and its flower
    fell off and the beauty of its appearance perished; so also the rich man will
    wither away in the midst of his pursuits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the scorching wind'; the Greek καύσων can refer to burning heat
      and, in some contexts, the hot wind associated with it.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his journeys.' The Greek can refer literally to journeys or more
      broadly to one's course of activity or pursuits.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέτειλεν
  chosen: rose
  alternatives:
  - has risen
  - came up
  lexicon: BDAG
  rationale: Aorist indicative in a vivid illustrative statement; 'rose' is natural
    English and preserves the simple past sense.
- source_word: σὺν τῷ καύσωνι
  chosen: with its scorching heat
  alternatives:
  - with the scorching wind
  - with the burning heat
  lexicon: BDAG
  rationale: καύσων denotes burning heat, often associated with a hot wind. In this
    context the sun is the subject, so 'with its scorching heat' reads naturally while
    preserving the causal force of the phrase.
- source_word: ἐξήρανεν τὸν χόρτον
  chosen: dried up the grass
  alternatives:
  - withered the grass
  - dried the grass
  lexicon: BDAG
  rationale: ξηραίνω here describes the effect of heat on vegetation. 'Dried up' is
    idiomatic and keeps the concrete image.
- source_word: τὸ ἄνθος αὐτοῦ ἐξέπεσεν
  chosen: its flower fell off
  alternatives:
  - its blossom fell
  - its flower dropped
  lexicon: BDAG
  rationale: ἐκπίπτω literally means 'fall off/out.' 'Fell off' preserves the physical
    imagery better than a more interpretive rendering.
- source_word: ἡ εὐπρέπεια
  chosen: the beauty
  alternatives:
  - the splendor
  - the attractiveness
  lexicon: BDAG
  rationale: εὐπρέπεια refers to comeliness or beauty. 'Beauty' is the clearest modern
    English equivalent.
- source_word: τοῦ προσώπου αὐτοῦ
  chosen: of its appearance
  alternatives:
  - of its face
  - of its outward form
  lexicon: BDAG
  rationale: πρόσωπον can mean 'face,' but for a flower/plant image English idiom
    prefers 'appearance.' This preserves the metaphor without awkward anthropomorphism.
- source_word: ἀπώλετο
  chosen: perished
  alternatives:
  - was destroyed
  - vanished
  lexicon: BDAG
  rationale: Middle form here conveys disappearance/loss. 'Perished' fits the elevated
    but readable tone and matches the image of beauty passing away.
- source_word: ὁ πλούσιος
  chosen: the rich man
  alternatives:
  - the rich person
  - the rich one
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and functions as a representative
    individual. Per translation philosophy, a gender-accurate rendering is preferred.
- source_word: ἐν ταῖς πορείαις αὐτοῦ
  chosen: in the midst of his pursuits
  alternatives:
  - in his journeys
  - in his ways
  - in his business activities
  lexicon: BDAG
  rationale: πορεία can denote a journey or course of activity. In context, James
    applies the image to the rich person's active undertakings rather than literal
    travel alone. 'In the midst of his pursuits' captures the broader sense while
    remaining close to the metaphorical extension.
- source_word: μαρανθήσεται
  chosen: will wither away
  alternatives:
  - will fade away
  - will be made to wither
  lexicon: BDAG
  rationale: The future passive/deponent form continues the vegetation metaphor. 'Will
    wither away' preserves the image and the inevitability of the future statement.
