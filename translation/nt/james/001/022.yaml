theological_decisions:
- issue: Meaning of λόγος in James 1:22
  chosen_reading: '''the word'' as God''s spoken/received message, retaining biblical-theological
    resonance rather than reducing it to a generic ''message.'''
  alternative_readings:
  - '''the message'''
  - '''the teaching'''
  rationale: The context in James 1 includes receiving the implanted word (1:21),
    so 'the word' preserves continuity and theological weight without importing a
    narrower doctrinal claim.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the imperative Γίνεσθε
  chosen_reading: An ongoing exhortation to live as doers, not merely a one-time act.
  alternative_readings:
  - ingressive 'become doers'
  rationale: The present imperative naturally suggests continued practice. English
    'be doers' communicates this well in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
