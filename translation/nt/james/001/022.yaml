id: JAS.1.22
reference: James 1:22
source:
  edition: SBLGNT
  text: Γίνεσθε δὲ ποιηταὶ λόγου καὶ μὴ ⸂ἀκροαταὶ μόνον⸃ παραλογιζόμενοι ἑαυτούς.
translation:
  text: But be doers of the word, and not hearers only, deceiving yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deluding yourselves' or 'reasoning yourselves into error.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γίνεσθε
  chosen: be
  alternatives:
  - become
  - prove yourselves to be
  lexicon: BDAG
  rationale: Present middle imperative, second person plural, calls for an ongoing
    state or pattern of life. 'Be' is idiomatic in English and preserves the imperative
    force without overtranslating the middle voice.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous exhortation. 'But'
    best captures the adversative turn in context.
- source_word: ποιηταὶ
  chosen: doers
  alternatives:
  - those who do
  - practitioners
  lexicon: BDAG
  rationale: Standard rendering for ποιητής in this context; concise and idiomatic,
    and it preserves the contrast with 'hearers.'
- source_word: λόγου
  chosen: of the word
  alternatives:
  - of the message
  - of the teaching
  lexicon: BDAG
  rationale: 'The genitive is best taken as object/content: those who do what the
    word says. ''Word'' preserves the biblical resonance of λόγος here, especially
    in James''s immediate context, better than the flatter ''message.'''
- source_word: ἀκροαταὶ μόνον
  chosen: hearers only
  alternatives:
  - only hearers
  - mere hearers
  lexicon: BDAG
  rationale: Captures both the noun and the limiting force of μόνον. 'Hearers only'
    is natural English and preserves the rhetorical contrast with 'doers.'
- source_word: παραλογιζόμενοι
  chosen: deceiving
  alternatives:
  - deluding
  - misleading by false reasoning
  lexicon: BDAG
  rationale: The participle conveys self-deception through faulty reasoning. 'Deceiving'
    is clear, idiomatic, and sufficiently strong; the more explicit nuance of false
    reasoning is preserved as an alternative.
- source_word: ἑαυτούς
  chosen: yourselves
  alternatives:
  - your own selves
  lexicon: BDAG
  rationale: Direct reflexive object of the participle; 'yourselves' is the natural
    English equivalent.
