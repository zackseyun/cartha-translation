id: JAS.1.10
reference: James 1:10
source:
  edition: SBLGNT
  text: ὁ δὲ πλούσιος ἐν τῇ ταπεινώσει αὐτοῦ, ὅτι ὡς ἄνθος χόρτου παρελεύσεται.
translation:
  text: and the rich man in his humiliation, because like a flower of grass he will
    pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, supplying the ellipsis from the previous verse: ''but the rich man
      is to boast in his humiliation.'''
    reason: alternative_reading
  - marker: b
    text: '''Flower of grass'' is a literal rendering of the Greek image, emphasizing
      how quickly the rich fade like vegetation in bloom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πλούσιος
  chosen: and the rich man
  alternatives:
  - but the rich man
  - and the rich person
  lexicon: BDAG
  rationale: δέ is carried with a simple connective in context, linking with the previous
    verse's exhortation. πλούσιος is substantival masculine singular, and per gender-accurate
    policy is rendered 'rich man' rather than a neutral abstraction. 'But' is possible
    for δέ, but 'and' better fits the parallel structure with v.9 in English without
    overstating contrast.
- source_word: ἐν τῇ ταπεινώσει αὐτοῦ
  chosen: in his humiliation
  alternatives:
  - in his lowliness
  - in his being humbled
  lexicon: BDAG
  rationale: ταπείνωσις can denote low status, humiliation, or humbling. Here the
    phrase is elliptical from v.9 ('let him boast'), so the rich man is to boast in
    the condition of being brought low. 'Humiliation' preserves both the social lowering
    and the shame-laden force better than the softer 'lowliness.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: ὅτι introduces the reason the rich man should boast in humiliation. 'Because'
    is clear modern English and preserves the causal force.
- source_word: ὡς ἄνθος χόρτου
  chosen: like a flower of grass
  alternatives:
  - like a wildflower
  - like a flower of the field
  lexicon: BDAG
  rationale: The phrase is an allusive image common in Scripture. A more literal rendering,
    'flower of grass,' preserves the Greek genitive and the transient imagery without
    importing 'field,' which is not present here. 'Wildflower' is smoother but too
    interpretive.
- source_word: παρελεύσεται
  chosen: he will pass away
  alternatives:
  - he will disappear
  - he will pass by
  lexicon: BDAG
  rationale: Future middle of παρέρχομαι here conveys transience and disappearance
    from earthly prominence. 'Pass away' is idiomatic and fits the mortality/ephemerality
    image in context better than the more spatial 'pass by.'
