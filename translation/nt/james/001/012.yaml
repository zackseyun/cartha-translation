id: JAS.1.12
reference: James 1:12
source:
  edition: SBLGNT
  text: Μακάριος ἀνὴρ ὃς ὑπομένει πειρασμόν, ὅτι δόκιμος γενόμενος λήμψεται τὸν στέφανον
    τῆς ζωῆς, ὃν ⸀ἐπηγγείλατο τοῖς ἀγαπῶσιν αὐτόν.
translation:
  text: Blessed is the man who endures trial, because after he has been approved,
    he will receive the crown of life, which he promised to those who love him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temptation' or 'testing'; the Greek word can cover both the idea of
      a trial and a temptation, but here the context emphasizes enduring under testing.
    reason: lexical_alternative
  - marker: b
    text: The Greek term for 'crown' can refer to a victor's wreath, not necessarily
      a royal crown.
    reason: cultural_note
lexical_decisions:
- source_word: Μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the beatitude-like force and theological weight
    better than the more subjective ''happy'' or the flatter ''fortunate''.'
- source_word: ἀνὴρ
  chosen: the man
  alternatives:
  - the person
  - one
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and, in context, representative/generic.
    Per doctrine, a gender-accurate rendering is preferred over flattening to a gender-neutral
    term. English singular generic 'the man' preserves the source form while remaining
    natural.
- source_word: ὑπομένει
  chosen: endures
  alternatives:
  - perseveres under
  - remains steadfast under
  lexicon: BDAG
  rationale: '''Endures'' is concise and natural, while still conveying steadfast
    persistence under pressure. The fuller alternatives are possible but less direct
    in this sentence.'
- source_word: πειρασμόν
  chosen: trial
  alternatives:
  - temptation
  - testing
  lexicon: BDAG
  rationale: In James 1 the semantic range of πειρασμός includes both testing and
    temptation, but here the context emphasizes steadfast endurance under adversity
    and the resulting approval. 'Trial' best captures that sense without importing
    the narrower idea of enticement to sin.
- source_word: δόκιμος γενόμενος
  chosen: after he has been approved
  alternatives:
  - having become approved
  - having stood the test
  - having been proven genuine
  lexicon: BDAG
  rationale: The phrase denotes emerging from testing as approved/proven. 'After he
    has been approved' communicates the temporal force of the participle plus the
    evaluative sense of δόκιμος in clear English. 'Having stood the test' is idiomatic
    but slightly more interpretive.
- source_word: λήμψεται
  chosen: he will receive
  alternatives:
  - he will obtain
  lexicon: BDAG
  rationale: Standard future sense of λαμβάνω; 'receive' fits the context of a promised
    reward.
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - victor's crown
  lexicon: BDAG
  rationale: '''Crown'' is the established and natural rendering. The term can denote
    a victor''s wreath rather than a royal diadem, but ''crown'' communicates adequately
    in English; the cultural nuance is worth preserving in a footnote rather than
    replacing the main-text term.'
- source_word: τῆς ζωῆς
  chosen: of life
  alternatives:
  - which is life
  - that gives life
  lexicon: BDAG
  rationale: The genitive is most naturally rendered straightforwardly as 'of life.'
    More interpretive expansions are possible but not required by the Greek.
- source_word: ἐπηγγείλατο
  chosen: he promised
  alternatives:
  - he has promised
  lexicon: BDAG
  rationale: The aorist middle is well represented by simple past in English. The
    subject is most naturally God, carried over from the broader context and the relative
    clause's antecedent.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  chosen: to those who love him
  alternatives:
  - for those who love him
  lexicon: BDAG
  rationale: The dative with ἐπαγγέλλομαι is naturally rendered 'to those who love
    him.' The present participle conveys characteristic love, which English expresses
    adequately with the simple present.
