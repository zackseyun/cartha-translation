theological_decisions:
- issue: Semantic force of πειρασμός in James 1:12
  chosen_reading: trial
  alternative_readings:
  - temptation
  - testing
  rationale: Given the immediate context of endurance, approval, and reward, the emphasis
    is on a testing/trial that is borne faithfully rather than specifically on enticement
    to sin. This also maintains coherence with the distinction developed in the surrounding
    passage.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it) and §6 (readable modern English)
