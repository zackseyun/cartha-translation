id: JAS.1.24
reference: James 1:24
source:
  edition: SBLGNT
  text: κατενόησεν γὰρ ἑαυτὸν καὶ ἀπελήλυθεν καὶ εὐθέως ἐπελάθετο ὁποῖος ἦν.
translation:
  text: For he looked at himself and went away, and immediately forgot what kind of
    person he was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what he was like.' The Greek expression refers to the kind or sort
      of person he was.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατενόησεν
  chosen: looked at
  alternatives:
  - considered
  - observed carefully
  - noticed
  lexicon: BDAG
  rationale: The aorist of κατανοέω can mean to notice, observe, or consider attentively.
    In this mirror analogy, 'looked at' is natural English and fits the concrete action,
    while still allowing the irony that the looking did not lead to lasting self-awareness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the explanation for the previous comparison. 'For' preserves
    the explanatory connection in a relatively formal but still readable way.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - his own face
  - his own self
  lexicon: BDAG
  rationale: The reflexive pronoun directly means 'himself.' Although the broader
    context involves a face in a mirror, this verse itself states the reflexive object
    without repeating 'face,' so 'himself' is the most text-faithful rendering.
- source_word: ἀπελήλυθεν
  chosen: went away
  alternatives:
  - has gone away
  - departed
  lexicon: BDAG
  rationale: The perfect of ἀπέρχομαι literally has a present-result nuance ('has
    gone away'), but in English narrative sequence after an aorist and before another
    past verb, 'went away' reads naturally without distorting the sense.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως marks promptness. 'Immediately' is clear, standard, and preserves
    the force of the adverb.
- source_word: ἐπελάθετο
  chosen: forgot
  alternatives:
  - became forgetful of
  - lost memory of
  lexicon: BDAG
  rationale: The middle form of ἐπιλανθάνομαι means 'forgot' or 'ceased to remember.'
    'Forgot' is the most idiomatic and direct English equivalent.
- source_word: ὁποῖος ἦν
  chosen: what kind of person he was
  alternatives:
  - what he was like
  - what sort of man he was
  lexicon: BDAG
  rationale: ὁποῖος asks about quality or sort, not merely identity. 'What kind of
    person he was' brings out the qualitative sense. 'Man' was avoided because the
    referent in the analogy is generic rather than specifically male, and 'person'
    best conveys the intended representative force in English.
