theological_decisions:
- issue: Meaning of the lowly believer's 'exaltation'
  chosen_reading: The phrase refers to the lowly brother's elevated status or honor
    before God, likely with social-reversal overtones, without restricting it to either
    present material uplift or only future eschatological exaltation.
  alternative_readings:
  - present social elevation
  - spiritual status before God
  - future eschatological exaltation
  rationale: James juxtaposes the lowly and the rich in vv. 9–10 and uses reversal
    language. The translation should preserve this breadth rather than resolve it
    into a single doctrinally narrower option.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of ἀδελφός
  chosen_reading: Render as 'brother' in the main text, preserving the masculine singular
    form while recognizing representative force in context.
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The source is grammatically masculine singular. Per the stated policy,
    the English should match the source's gender and number rather than flatten it
    into an inclusive paraphrase; inclusivity can be signaled in a footnote if helpful.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
