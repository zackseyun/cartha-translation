theological_decisions:
- issue: Rendering Χριστοῦ in the address
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah'
    where it functions as a title. In this opening identification of Jesus, the titular
    sense is still alive and worth preserving in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering δοῦλος in James's self-identification
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrinal guidance allows 'servant / slave' context-dependently and
    specifically prefers 'slave' where bonded belonging is theologically salient.
    James's self-description emphasizes total allegiance to God and the Lord Jesus
    Messiah.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    for δοῦλος'
