id: JAS.1.1
reference: James 1:1
source:
  edition: SBLGNT
  text: Ἰάκωβος θεοῦ καὶ κυρίου Ἰησοῦ Χριστοῦ δοῦλος ταῖς δώδεκα φυλαῖς ταῖς ἐν τῇ
    διασπορᾷ χαίρειν.
translation:
  text: 'James, a slave of God and of the Lord Jesus Messiah, to the twelve tribes
    in the Dispersion: greetings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered either 'Messiah'
      or, in more name-like usage, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'servant.' The Greek δοῦλος denotes one who belongs to a master; 'slave'
      is used here to preserve that stronger sense.
    reason: lexical_alternative
  - marker: c
    text: That is, the Jewish people living outside the land of Israel.
    reason: cultural_note
lexical_decisions:
- source_word: Ἰάκωβος
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Standard English transliteration for the NT author; although the form
    corresponds historically to 'Jacob,' established English usage for this person
    is 'James.'
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Simple possessive genitive with δοῦλος: ''slave of God.'' No reason
    to expand or paraphrase.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος. In this christological title
    context, 'Lord' best preserves both authority and established NT usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than a mere name-like second
    element, so 'Messiah' is preferred per translation philosophy. 'Jesus Messiah'
    preserves the title's meaning.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, 'slave' is used where the bonded nature is theologically
    salient. In an epistolary self-designation expressing total belonging to God and
    the Lord Jesus Messiah, the stronger term is warranted.
- source_word: ταῖς δώδεκα φυλαῖς
  chosen: to the twelve tribes
  lexicon: BDAG
  rationale: Formal and natural rendering of the dative phrase; preserves Israelite
    covenantal language rather than generalizing to 'people' or 'groups.'
- source_word: διασπορᾷ
  chosen: the Dispersion
  alternatives:
  - the diaspora
  - the scattered among the nations
  lexicon: BDAG
  rationale: Capitalized 'Dispersion' preserves the likely semi-technical Jewish sense
    while remaining readable. 'Diaspora' is possible but less idiomatic in Bible translation
    English.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: BDAG
  rationale: Standard epistolary infinitive conventionally rendered 'greetings.' A
    more literal 'rejoice' would miss the letter-opening idiom.
