theological_decisions:
- issue: Rendering πειράζω language in this verse
  chosen_reading: Use 'tempt/tempted' throughout the verse rather than 'test/tested.'
  alternative_readings:
  - Use 'test/tested' in one or more occurrences
  - Differentiate first occurrence as 'tested' and later one as 'tempted'
  rationale: James 1:13 is specifically denying that God is the source of morally
    evil solicitation, especially in light of the following verse's focus on desire
    conceiving sin. Rendering the repeated πειράζω language as 'tempt' best preserves
    the theological point without importing the distinct biblical theme that God may
    test people in other senses.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Meaning of ἀπείραστός ἐστιν κακῶν
  chosen_reading: Translate as 'God is untemptable by evils.'
  alternative_readings:
  - God cannot be tempted by evil
  - God is inexperienced in evils
  - God is not to be tempted with evils
  rationale: The phrase is lexically difficult and has received several interpretations.
    In this context, the sense that God is not susceptible to evil temptation best
    explains the following clause 'and he himself tempts no one.' This avoids implying
    evil has any inward leverage on God, while not overextending the statement beyond
    the verse's immediate argument.
  doctrine_reference: 'Affirmations: historic ecumenical Christian orthodoxy'
