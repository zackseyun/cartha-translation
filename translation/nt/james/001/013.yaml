id: JAS.1.13
reference: James 1:13
source:
  edition: SBLGNT
  text: μηδεὶς πειραζόμενος λεγέτω ὅτι Ἀπὸ θεοῦ πειράζομαι· ὁ γὰρ θεὸς ἀπείραστός
    ἐστιν κακῶν, πειράζει δὲ αὐτὸς οὐδένα.
translation:
  text: Let no one who is being tempted say, “I am being tempted by God,” for God
    is untemptable by evils, and he himself tempts no one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'for God cannot be tempted by evil.' The Greek reads
      more literally, 'for God is untemptable by evils.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  chosen: Let no one
  alternatives:
  - No one should
  - Let nobody
  lexicon: BDAG
  rationale: Negative indefinite subject with imperative force; paired with λεγέτω,
    the idiomatic English prohibition is 'Let no one...'.
- source_word: πειραζόμενος
  chosen: who is being tempted
  alternatives:
  - when tempted
  - being tested
  lexicon: BDAG
  rationale: Present passive participle modifying μηδείς. In this immediate context,
    the surrounding references to evil desire and God's non-involvement favor 'tempted'
    rather than the broader 'tested,' while preserving the passive ongoing sense with
    'is being tempted'.
- source_word: λεγέτω
  chosen: say
  alternatives:
  - be saying
  - declare
  lexicon: BDAG
  rationale: Third person present active imperative; English prohibition is naturally
    expressed with 'Let no one ... say'.
- source_word: Ἀπὸ θεοῦ
  chosen: by God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: Although ἀπό often means 'from,' with πειράζομαι in this construction
    it indicates source/agency. 'By God' is the clearest idiomatic English rendering
    for the claim being denied.
- source_word: πειράζομαι
  chosen: I am being tempted
  alternatives:
  - I am tempted
  - I am being tested
  lexicon: BDAG
  rationale: Matches the passive present form and keeps verbal consistency with πειραζόμενος.
    'Being tempted' preserves the ongoing/passive nuance.
- source_word: ἀπείραστός
  chosen: untemptable
  alternatives:
  - cannot be tempted
  - untested
  lexicon: BDAG
  rationale: The adjective is rare and difficult. In context it most naturally means
    God is not susceptible to temptation with respect to evil. 'Untemptable' preserves
    the compact adjectival force better than expanding to a clause, while a smoother
    alternative is preserved in a footnote.
- source_word: κακῶν
  chosen: by evils
  alternatives:
  - by evil things
  - with evils
  - by evil
  lexicon: BDAG
  rationale: Genitive plural of κακός. The plural is retained to reflect the Greek
    form and to avoid prematurely collapsing the phrase into an abstract singular.
    'By evils' is somewhat literal but transparent; a smoother English alternative
    is footnoted.
- source_word: πειράζει
  chosen: tempts
  alternatives:
  - tests
  lexicon: BDAG
  rationale: Context controls the sense. Since the verse denies that God is the source
    of morally evil enticement, 'tempts' is the appropriate rendering here rather
    than the broader 'tests'.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - God himself
  lexicon: BDAG
  rationale: Emphatic pronoun; 'he himself' preserves the emphasis that God personally
    tempts no one.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  - anyone
  lexicon: BDAG
  rationale: Straightforward accusative object of πειράζει; 'no one' is clear and
    formal enough for the register.
