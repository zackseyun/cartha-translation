id: JAS.1.25
reference: James 1:25
source:
  edition: SBLGNT
  text: ὁ δὲ παρακύψας εἰς νόμον τέλειον τὸν τῆς ἐλευθερίας καὶ παραμείνας, ⸀οὐκ ἀκροατὴς
    ἐπιλησμονῆς γενόμενος ἀλλὰ ποιητὴς ἔργου, οὗτος μακάριος ἐν τῇ ποιήσει αὐτοῦ ἔσται.
translation:
  text: But the one who has looked intently into the perfect law, the law of freedom,
    and has continued in it—not becoming a forgetful hearer but a doer of work—this
    one will be blessed in his doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the perfect law of liberty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'not becoming a hearer who forgets.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'a doer of work'; some translations render more idiomatically,
      'a doer who acts' or 'an effectual doer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακύψας
  chosen: has looked intently into
  alternatives:
  - has looked into
  - has stooped to look into
  - has peered into
  lexicon: BDAG
  rationale: The participle conveys more than a casual glance; it suggests bending
    down or looking carefully. 'Looked intently into' preserves the vividness while
    remaining natural English.
- source_word: νόμον τέλειον τὸν τῆς ἐλευθερίας
  chosen: the perfect law, the law of freedom
  alternatives:
  - the perfect law of freedom
  - the perfect law that gives freedom
  - the flawless law, the law of liberty
  lexicon: BDAG
  rationale: The appositional structure is best preserved by repeating 'the law.'
    'Freedom' is preferred over 'liberty' for modern readability. 'Perfect' retains
    τέλειον without overinterpreting it as merely 'mature' here.
- source_word: παραμείνας
  chosen: has continued in it
  alternatives:
  - has remained
  - has persevered
  - has abided by it
  lexicon: BDAG
  rationale: The participle indicates ongoing persistence with respect to the law
    just mentioned. 'Continued in it' is idiomatic and captures sustained adherence.
- source_word: οὐκ ἀκροατὴς ἐπιλησμονῆς γενόμενος
  chosen: not becoming a forgetful hearer
  alternatives:
  - not having become a hearer of forgetfulness
  - not becoming a hearer who forgets
  lexicon: BDAG
  rationale: The genitive ἐπιλησμονῆς is idiomatically rendered adjectivally in English.
    'Forgetful hearer' communicates the sense clearly without wooden awkwardness.
- source_word: ποιητὴς ἔργου
  chosen: a doer of work
  alternatives:
  - a doer who acts
  - an effectual doer
  - a doer of the work
  lexicon: BDAG
  rationale: The Greek is not merely 'doer of the word' as in nearby context, but
    specifically 'doer of work/deed.' Rendering ἔργου explicitly preserves the textual
    wording and James's emphasis on action. The phrase is somewhat unusual in English,
    but it is retained to avoid smoothing away the lexical distinction.
- source_word: μακάριος
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  - flourishing
  lexicon: BDAG
  rationale: '''Blessed'' is the standard rendering and preserves the covenantal and
    theological resonance better than ''happy'' or ''fortunate''.'
- source_word: ἐν τῇ ποιήσει αὐτοῦ
  chosen: in his doing
  alternatives:
  - in his practice
  - in what he does
  - in his deed
  lexicon: BDAG
  rationale: ποίησις denotes doing, making, or practice. 'In his doing' closely reflects
    the noun form and links naturally with the earlier 'doer,' preserving James's
    emphasis on enacted obedience.
- source_word: ὁ ... οὗτος
  chosen: the one ... this one
  alternatives:
  - whoever ... he
  - the man ... this man
  lexicon: BDAG
  rationale: The masculine singular construction is representative/generic. 'The one'
    avoids falsely narrowing the reference to males while remaining faithful to the
    generic force of the Greek, in line with gender-accurate translation philosophy.
