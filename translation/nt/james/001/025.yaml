theological_decisions:
- issue: Meaning of 'law of freedom'
  chosen_reading: Retain the phrase as 'the law of freedom' without resolving whether
    James emphasizes the gospel, the moral law as fulfilled, or God's revealed instruction
    more broadly.
  alternative_readings:
  - the law that gives freedom
  - the gospel as liberating law
  - the moral law rightly understood
  rationale: The phrase carries theological richness and interpretive debate, but
    the Greek itself does not force a narrower doctrinal explanation. Preserving the
    wording maintains the text's tension rather than importing a denominational reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender representation in generic masculine forms
  chosen_reading: Use inclusive-generic English ('the one') while preserving the singular
    representative force.
  alternative_readings:
  - the man
  - he who
  rationale: The Greek masculine singular is generic rather than male-exclusive in
    this context. This follows the stated gender-accurate principle without flattening
    the singularity of the construction.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
