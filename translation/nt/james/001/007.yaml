id: JAS.1.7
reference: James 1:7
source:
  edition: SBLGNT
  text: μὴ γὰρ οἰέσθω ὁ ἄνθρωπος ἐκεῖνος ὅτι λήμψεταί τι παρὰ τοῦ κυρίου
translation:
  text: For that man must not suppose that he will receive anything from the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that person.' The Greek is masculine singular ('that man') but refers
      representatively to the doubting individual described in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γὰρ
  chosen: For ... must not
  alternatives:
  - For ... let ... not
  - for ... should not
  lexicon: BDAG
  rationale: γάρ is explanatory, linking this verse to the preceding description of
    the doubting person; 'For' preserves that connection. μή with the imperative/middle
    verb gives a prohibition. Rendering with 'must not' communicates the force naturally
    in English without sounding archaic.
- source_word: οἰέσθω
  chosen: suppose
  alternatives:
  - think
  - imagine
  - expect
  lexicon: BDAG
  rationale: οἴομαι commonly means 'to think, suppose, consider.' 'Suppose' fits the
    warning tone and pairs well with the following content clause. 'Expect' is possible
    contextually, but it slightly anticipates the result clause rather than translating
    the mental act itself.
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  chosen: that man
  alternatives:
  - that person
  - that one
  lexicon: BDAG
  rationale: ἄνθρωπος is grammatically masculine singular here and refers back to
    the singular masculine description in the immediate context. Per the gender-accurate
    policy, 'that man' best matches the source form and discourse reference. 'That
    person' would smooth the gender marking present in Greek.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what the man is not to suppose. English idiom
    naturally retains 'that' here.
- source_word: λήμψεταί
  chosen: he will receive
  alternatives:
  - he will get
  lexicon: BDAG
  rationale: Future middle indicative of λαμβάνω. 'Receive' is the standard and suitably
    formal rendering in this context, especially with the prepositional phrase 'from
    the Lord.'
- source_word: τι
  chosen: anything
  alternatives:
  - something
  - any thing
  lexicon: BDAG
  rationale: 'In a negated context, τις/τι is best rendered ''anything,'' conveying
    the comprehensive force: not even one thing is to be expected.'
- source_word: παρὰ τοῦ κυρίου
  chosen: from the Lord
  alternatives:
  - from Lord
  - from the Master
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, 'from.' κύριος is rendered 'Lord'
    per the project's default for Kyrios. In James, the referent may be God generally
    in context, but the title should remain translated rather than interpreted more
    specifically than the text states.
