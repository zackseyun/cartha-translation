theological_decisions:
- issue: Referent of 'the Lord' (τοῦ κυρίου)
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the Lord God
  rationale: The Greek uses κύριος without further specification. Translating as 'the
    Lord' preserves the text's wording and avoids importing a more explicit identification
    than the verse itself makes. This also aligns with the project's default rendering
    of κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gender rendering of ὁ ἄνθρωπος ἐκεῖνος
  chosen_reading: that man
  alternative_readings:
  - that person
  rationale: The Greek is masculine singular and refers to a representative individual.
    Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing, while the representative force can be noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
