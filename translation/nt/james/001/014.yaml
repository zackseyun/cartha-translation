theological_decisions:
- issue: Source of temptation in relation to God
  chosen_reading: The verse attributes temptation to a person's own desire, not to
    God.
  alternative_readings:
  - The verse could be softened to speak merely of external testing circumstances.
  rationale: The immediate literary context (v. 13) denies that God tempts anyone,
    and v. 14 explains temptation's proximate source as one's own desire. The translation
    therefore preserves the moral and theological contrast without importing a broader
    doctrine of causation beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
- issue: Gender rendering of representative singular
  chosen_reading: Used 'his own' with representative singular force.
  alternative_readings:
  - their own
  rationale: The Greek is grammatically masculine singular and functions generically.
    Per the doctrine's gender-accurate policy, the translation keeps the singular
    masculine form rather than replacing it with a plural or singular 'their.'
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
