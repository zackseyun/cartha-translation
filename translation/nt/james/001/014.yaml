id: JAS.1.14
reference: James 1:14
source:
  edition: SBLGNT
  text: ἕκαστος δὲ πειράζεται ὑπὸ τῆς ἰδίας ἐπιθυμίας ἐξελκόμενος καὶ δελεαζόμενος·
translation:
  text: But each one is tempted by his own desire, being drawn away and enticed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by his own craving' or 'by his own lust.' The Greek term can denote
      strong desire generally, not only sexual desire.
    reason: lexical_alternative
  - marker: b
    text: The paired participles evoke the imagery of being lured out and baited,
      like prey or a fish drawn into a trap.
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each person
  - everyone
  lexicon: BDAG
  rationale: Rendered distributively as 'each one' to preserve the singular force
    of the Greek while remaining natural in English. This also avoids flattening the
    individualizing emphasis of the verse.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: 'Rendered ''But'' to mark the mild contrast with the preceding statement
    in v. 13: God does not tempt anyone; rather, each person is tempted by his own
    desire.'
- source_word: πειράζεται
  chosen: is tempted
  alternatives:
  - is tested
  - is tried
  lexicon: BDAG
  rationale: In this immediate context, the sense is solicitation to sin rather than
    general testing, especially in contrast to v. 13 and followed by 'desire' conceiving
    sin in v. 15. Therefore 'is tempted' best fits the semantic and theological context.
- source_word: ὑπὸ τῆς ἰδίας ἐπιθυμίας
  chosen: by his own desire
  alternatives:
  - by his own craving
  - by his own lust
  lexicon: BDAG
  rationale: The prepositional phrase indicates the effective source/instrument of
    the temptation. 'Desire' is broad and readable, preserving the morally charged
    sense without restricting it only to sexual lust. 'His own' reflects the singular
    masculine form and the doctrine's gender-accurate policy for representative singulars.
- source_word: ἰδίας
  chosen: own
  alternatives:
  - personal
  - one's own
  lexicon: BDAG
  rationale: '''Own'' preserves the emphatic reflexive nuance: the desire belongs
    to the person himself, underscoring personal responsibility.'
- source_word: ἐπιθυμίας
  chosen: desire
  alternatives:
  - craving
  - lust
  lexicon: BDAG
  rationale: Chose 'desire' as the most contextually appropriate and sufficiently
    broad rendering. 'Lust' is too narrow in modern English, often implying sexual
    desire only, while James speaks more generally of sinful desire.
- source_word: ἐξελκόμενος
  chosen: being drawn away
  alternatives:
  - being dragged away
  - being lured away
  lexicon: BDAG
  rationale: The participle carries imagery of being drawn out or dragged away. 'Being
    drawn away' is idiomatic and preserves the metaphor without over-intensifying
    it. It also pairs well with the following hunting/fishing image in 'enticed.'
- source_word: καὶ δελεαζόμενος
  chosen: and enticed
  alternatives:
  - and lured
  - and baited
  lexicon: BDAG
  rationale: '''Enticed'' captures the metaphor of baiting or alluring into a trap
    and is natural in English. ''Baited'' is vivid but too wooden in the main text;
    the imagery is worth preserving in a footnote.'
