theological_decisions:
- issue: Divine initiative in new birth
  chosen_reading: The verse is rendered to emphasize that God's willing is the source
    of believers' new birth, without importing a specific denominational account of
    predestination or regeneration.
  alternative_readings:
  - A more tradition-shaped rendering such as 'Of his own will he brought us forth'
  - A more interpretive rendering linking the phrase explicitly to regeneration theology
  rationale: The Greek clearly presents God's volition as prior to and causative of
    the action, but it does not itself specify a full theological system. The translation
    preserves the text's emphasis while avoiding doctrinal overreach, in keeping with
    the instruction to preserve theological tension rather than resolve it beyond
    the source.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Scope of κτισμάτων
  chosen_reading: '''his creatures'' is retained broadly, allowing the phrase to refer
    to the wider created order rather than narrowing it to humanity alone.'
  alternative_readings:
  - '''of all his creation'''
  - '''of the people he created'''
  rationale: James likely contrasts believers as firstfruits with the rest of what
    God has made. Narrowing the phrase to humanity would add specificity not demanded
    by the Greek.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
