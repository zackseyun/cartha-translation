id: JAS.1.27
reference: James 1:27
source:
  edition: SBLGNT
  text: θρησκεία καθαρὰ καὶ ἀμίαντος παρὰ ⸀τῷ θεῷ καὶ πατρὶ αὕτη ἐστίν, ἐπισκέπτεσθαι
    ὀρφανοὺς καὶ χήρας ἐν τῇ θλίψει αὐτῶν, ἄσπιλον ἑαυτὸν τηρεῖν ἀπὸ τοῦ κόσμου.
translation:
  text: 'Religion that is pure and undefiled before God the Father is this: to care
    for orphans and widows in their affliction, and to keep oneself unstained from
    the world.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to visit orphans and widows in their affliction'; the Greek verb can
      include both visiting and actively caring for them.
    reason: lexical_alternative
  - marker: b
    text: '''The world'' here refers to the morally corrupt order opposed to God,
      not to creation itself.'
    reason: cultural_note
lexical_decisions:
- source_word: θρησκεία
  chosen: Religion
  alternatives:
  - religious devotion
  - worship
  lexicon: BDAG
  rationale: The term denotes outward religious practice/devotion rather than generic
    faith. 'Religion' is the most natural English equivalent here and fits James's
    concern with lived piety.
- source_word: καθαρὰ
  chosen: pure
  alternatives:
  - clean
  lexicon: BDAG
  rationale: '''Pure'' is idiomatic in English for moral/religious purity and pairs
    naturally with ''undefiled.'''
- source_word: ἀμίαντος
  chosen: undefiled
  alternatives:
  - unstained
  - unpolluted
  lexicon: BDAG
  rationale: Used predicatively with θρησκεία; 'undefiled' preserves the cultic/moral
    sense and the rhetorical pairing with 'pure.'
- source_word: παρὰ τῷ θεῷ καὶ πατρὶ
  chosen: before God the Father
  alternatives:
  - in the sight of God and Father
  - before our God and Father
  lexicon: BDAG
  rationale: παρά with the dative here conveys evaluation in someone's sight/presence.
    'Before God the Father' is clear modern English. The single article with θεῷ καὶ
    πατρὶ supports the appositional sense 'God the Father' rather than two separate
    referents.
- source_word: ἐπισκέπτεσθαι
  chosen: to care for
  alternatives:
  - to visit
  - to look after
  lexicon: BDAG
  rationale: The verb can mean more than paying a social visit; in this context it
    implies active concern and aid. 'To care for' best conveys practical compassionate
    attention, while 'visit' is preserved as an alternative nuance.
- source_word: ὀρφανοὺς
  chosen: orphans
  alternatives:
  - fatherless children
  lexicon: BDAG
  rationale: Standard and accurate rendering for children deprived of parents/protection;
    concise and natural in English.
- source_word: χήρας
  chosen: widows
  lexicon: BDAG
  rationale: Direct lexical equivalent; a socially vulnerable group commonly paired
    with orphans in biblical ethics.
- source_word: ἐν τῇ θλίψει αὐτῶν
  chosen: in their affliction
  alternatives:
  - in their distress
  - in their trouble
  lexicon: BDAG
  rationale: θλῖψις denotes trouble, oppression, or distress. 'Affliction' preserves
    the gravity and biblical resonance without becoming archaic.
- source_word: ἄσπιλον
  chosen: unstained
  alternatives:
  - spotless
  - undefiled
  lexicon: BDAG
  rationale: With τηρεῖν ἑαυτόν, the image is of remaining free from moral contamination.
    'Unstained' is vivid and idiomatic in English.
- source_word: ἑαυτὸν
  chosen: oneself
  alternatives:
  - himself
  lexicon: BDAG
  rationale: Although grammatically masculine singular in Greek, the infinitival construction
    states a general principle. 'Oneself' communicates the representative force in
    natural English without implying a male-only referent.
- source_word: τηρεῖν
  chosen: to keep
  alternatives:
  - to preserve
  - to guard
  lexicon: BDAG
  rationale: '''Keep oneself unstained'' is standard English and preserves the sense
    of watchful moral maintenance.'
- source_word: ἀπὸ τοῦ κόσμου
  chosen: from the world
  alternatives:
  - from the world's corruption
  - from the present world order
  lexicon: BDAG
  rationale: κόσμος here refers to the morally corrupt human order opposed to God,
    but the simple phrase 'the world' should be retained in the main text to avoid
    over-interpretation; the fuller sense can be noted theologically.
