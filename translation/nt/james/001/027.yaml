theological_decisions:
- issue: Meaning of 'the world' (κόσμος) in ethical context
  chosen_reading: Retain 'the world' in the main text as the sphere of moral contamination
    opposed to God, without expanding it to material creation or society as such.
  alternative_readings:
  - the world's corruption
  - secular society
  rationale: James uses κόσμος ethically, but translating more explicitly would interpret
    beyond the wording. Preserving 'the world' maintains the text's theological tension
    and avoids importing a sectarian withdrawal-from-creation reading.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Generic force of ἑαυτόν
  chosen_reading: Render as 'oneself' rather than 'himself.'
  alternative_readings:
  - himself
  rationale: The Greek masculine singular functions generically in a moral maxim.
    Per the gender-accurate policy, English should match the source's intent rather
    than its grammatical gender alone.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
