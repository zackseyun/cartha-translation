id: JAS.1.26
reference: James 1:26
source:
  edition: SBLGNT
  text: Εἴ τις δοκεῖ θρησκὸς ⸀εἶναι μὴ χαλιναγωγῶν γλῶσσαν ⸀αὐτοῦ ἀλλὰ ἀπατῶν καρδίαν
    ⸀αὐτοῦ, τούτου μάταιος ἡ θρησκεία.
translation:
  text: If anyone thinks he is religious while not bridling his tongue but deceiving
    his heart, this person's religion is worthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seems to be religious.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'bridling his tongue,' preserving the image of a bridle used
      to control an animal.
    reason: lexical_alternative
  - marker: c
    text: Or 'vain' or 'useless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκεῖ
  chosen: thinks
  alternatives:
  - seems
  - supposes
  lexicon: BDAG
  rationale: Rendered as 'thinks' to express personal self-assessment rather than
    mere outward appearance. In this context James critiques someone's own estimation
    of his religiosity.
- source_word: θρησκὸς
  chosen: religious
  alternatives:
  - devout
  - observant
  lexicon: BDAG
  rationale: Rendered adjectivally as 'religious' to match the predicate adjective
    and to preserve the focus on outward religious practice or identity rather than
    specifically inner piety.
- source_word: χαλιναγωγῶν
  chosen: bridling
  alternatives:
  - controlling
  - restraining
  lexicon: BDAG
  rationale: '''Bridling'' preserves the metaphor of putting a bridle on an animal,
    which James uses explicitly again in 3:2. It is more vivid and textually grounded
    than the flatter ''controlling.'''
- source_word: γλῶσσαν αὐτοῦ
  chosen: his tongue
  alternatives:
  - his speech
  lexicon: BDAG
  rationale: Translated literally as 'his tongue' to preserve the concrete metaphor
    and its thematic connection to James's later discussion of the tongue.
- source_word: ἀπατῶν
  chosen: deceiving
  alternatives:
  - misleading
  - deluding
  lexicon: BDAG
  rationale: '''Deceiving'' is the straightforward lexical equivalent and fits the
    reflexive-like sense here when paired with ''his heart''.'
- source_word: καρδίαν αὐτοῦ
  chosen: his heart
  alternatives:
  - himself
  lexicon: BDAG
  rationale: Rendered literally as 'his heart' rather than idiomatically as 'himself'
    because καρδία in biblical usage often denotes the inner person, and the concrete
    term should be preserved where natural in English.
- source_word: τούτου
  chosen: this person's
  alternatives:
  - his
  - of this one
  lexicon: BDAG
  rationale: Rendered as 'this person's' to make the genitive construction natural
    in English while preserving the demonstrative force that points back to the kind
    of person just described.
- source_word: μάταιος
  chosen: worthless
  alternatives:
  - vain
  - useless
  - empty
  lexicon: BDAG
  rationale: '''Worthless'' communicates the evaluative force in clear modern English.
    ''Vain'' is traditional but can sound archaic or suggest mere pride rather than
    futility.'
- source_word: ἡ θρησκεία
  chosen: religion
  alternatives:
  - religious practice
  - religious observance
  lexicon: BDAG
  rationale: Rendered as 'religion' as the most direct equivalent for θρησκεία, referring
    here to one's religious practice or observance. The context clarifies that James
    is evaluating the validity of professed religion, not rejecting religion as such.
