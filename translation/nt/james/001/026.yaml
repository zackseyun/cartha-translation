theological_decisions:
- issue: Gendered generic reference
  chosen_reading: If anyone thinks he is religious ... his tongue ... his heart
  alternative_readings:
  - If anyone thinks they are religious ... their tongue ... their heart
  rationale: The Greek uses grammatically masculine singular forms with generic force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
    'Anyone' signals the generic scope, while 'he/his' reflects the source grammar
    and representative singular construction.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Meaning of θρησκεία/θρησκός
  chosen_reading: religious / religion
  alternative_readings:
  - devout / devotion
  - observant / observance
  rationale: The verse critiques the worth of outwardly professed religious practice
    when speech is uncontrolled. 'Religion' best preserves the lexical link between
    θρησκός and θρησκεία without importing a narrower denominational or purely inward
    sense.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
