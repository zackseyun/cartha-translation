id: JAS.1.20
reference: James 1:20
source:
  edition: SBLGNT
  text: ὀργὴ γὰρ ἀνδρὸς δικαιοσύνην θεοῦ ⸂οὐκ ἐργάζεται⸃.
translation:
  text: For a man's anger does not produce God's righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's justice.' The Greek word can denote righteousness or justice;
      here the main text follows the project's default rendering 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'a man's anger'; the singular masculine form may function generically
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργὴ
  chosen: anger
  alternatives:
  - wrath
  lexicon: BDAG
  rationale: Rendered as 'anger' to reflect ordinary human anger in context rather
    than the more weighty or judicial-sounding 'wrath.' The verse concerns human disposition
    and conduct.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Rendered 'For' to preserve the explanatory connection with the preceding
    exhortation in a natural but still fairly formal way.
- source_word: ἀνδρὸς
  chosen: a man's
  alternatives:
  - human
  - a person's
  lexicon: BDAG
  rationale: The Greek is singular masculine genitive of ἀνήρ. Following the gender-accurate
    policy, 'a man's' preserves the source form while still functioning generically
    in context. More inclusive alternatives are possible interpretively, but the Greek
    wording is masculine.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The doctrine table gives δικαιοσύνη the default rendering 'righteousness,'
    with 'justice' preserved as an alternative where relevant. Here the phrase likely
    refers to what accords with God's righteous will or the righteous life God requires/produces,
    so 'righteousness' best preserves the theological breadth without narrowing it
    to social justice alone.
- source_word: θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Rendered with the English possessive for natural style while preserving
    the genitival relationship. The genitive may be understood as righteousness belonging
    to God, approved by God, or produced by God; the English leaves that breadth intact.
- source_word: οὐκ ἐργάζεται
  chosen: does not produce
  alternatives:
  - does not accomplish
  - does not work
  lexicon: BDAG
  rationale: ἐργάζομαι here means to bring about or accomplish. 'Does not produce'
    is idiomatic modern English and fits the object 'God's righteousness' better than
    the wooden 'work.'
