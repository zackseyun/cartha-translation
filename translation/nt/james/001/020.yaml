theological_decisions:
- issue: Meaning of 'God's righteousness' (δικαιοσύνην θεοῦ)
  chosen_reading: Rendered broadly as 'God's righteousness' without interpretive expansion.
  alternative_readings:
  - the righteousness God requires
  - the righteous life approved by God
  - the justice of God
  rationale: The genitive construction is semantically broad, and the verse does not
    force a single theological construal. In keeping with the translation philosophy,
    the English preserves the tension rather than resolving it into a narrower doctrinal
    paraphrase.
