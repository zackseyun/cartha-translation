- issue: Rendering of πίστις in an exhortational context
  chosen_reading: faith
  alternative_readings:
  - trust
  rationale: The doctrine guidelines specify 'faith' as the default rendering for
    πίστις, with alternatives preserved in footnotes where relevant. Here the verse
    concerns confident reliance on God in prayer, so 'trust' is a viable nuance, but
    the main text retains 'faith' for consistency and theological continuity.
