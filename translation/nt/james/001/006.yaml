id: JAS.1.6
reference: James 1:6
source:
  edition: SBLGNT
  text: αἰτείτω δὲ ἐν πίστει, μηδὲν διακρινόμενος, ὁ γὰρ διακρινόμενος ἔοικεν κλύδωνι
    θαλάσσης ἀνεμιζομένῳ καὶ ῥιπιζομένῳ·
translation:
  text: But let him ask in faith, doubting nothing, for the one who doubts is like
    a wave of the sea, driven by the wind and tossed about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with trust.' The Greek phrase 'in faith' uses pistis, which can also
      carry the sense of trustful reliance in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτείτω
  chosen: let him ask
  alternatives:
  - he must ask
  - let him request
  lexicon: BDAG
  rationale: Third-person present imperative; rendered with English 'let him ask'
    to preserve the exhortational force in natural English. 'Ask' fits the immediate
    context of requesting wisdom from God in the previous verse.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous statement; 'But'
    best captures the transition from the promise of giving to the condition on asking.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - with faith
  - in trust
  lexicon: BDAG
  rationale: Retains the prepositional phrase closely while using the default rendering
    of πίστις as 'faith' per doctrine guidelines. 'In faith' is idiomatic and preserves
    the theological weight of reliance on God.
- source_word: πίστει
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per the contested-terms table, πίστις defaults to 'faith.' In this context
    the sense overlaps with trustful reliance, but 'faith' remains the main-text rendering;
    'trust' is preserved in a footnote as a lexical alternative.
- source_word: μηδὲν διακρινόμενος
  chosen: doubting nothing
  alternatives:
  - without doubting at all
  - wavering in nothing
  lexicon: BDAG
  rationale: The participle διακρινόμενος here carries the sense of inner hesitation
    or doubt rather than merely intellectual discernment. 'Doubting nothing' closely
    reflects μηδέν while remaining readable.
- source_word: ὁ γὰρ διακρινόμενος
  chosen: for the one who doubts
  alternatives:
  - for the doubting man
  - for the one who wavers
  lexicon: BDAG
  rationale: Substantival participle rendered generically as 'the one who doubts'
    to avoid importing male-specific force where the Greek construction is representative.
    This preserves the generic sense while remaining natural English.
- source_word: ἔοικεν
  chosen: is like
  alternatives:
  - resembles
  - is comparable to
  lexicon: BDAG
  rationale: Common comparative sense; 'is like' is the most natural modern English
    equivalent.
- source_word: κλύδωνι θαλάσσης
  chosen: a wave of the sea
  alternatives:
  - a surging sea-wave
  - a billow of the sea
  lexicon: BDAG
  rationale: κλύδων denotes a wave/surge of the sea. 'A wave of the sea' is clear,
    vivid, and sufficiently formal without sounding archaic.
- source_word: ἀνεμιζομένῳ
  chosen: driven by the wind
  alternatives:
  - wind-driven
  - blown by the wind
  lexicon: BDAG
  rationale: Passive participle from a wind-related verb; 'driven by the wind' makes
    the image explicit and idiomatic in English.
- source_word: καὶ ῥιπιζομένῳ
  chosen: and tossed about
  alternatives:
  - and blown about
  - and tossed back and forth
  lexicon: BDAG
  rationale: Completes the image of instability. 'Tossed about' is vivid, natural,
    and avoids overtranslation while conveying agitation and lack of steadiness.
