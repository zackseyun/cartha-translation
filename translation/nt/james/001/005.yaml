theological_decisions:
- issue: Representative masculine singular language
  chosen_reading: let him ask ... it will be given to him
  alternative_readings:
  - let them ask ... it will be given to them
  - that person should ask ... it will be given to that person
  rationale: The Greek uses masculine singular forms (τις, αἰτείτω, αὐτῷ) with generic
    force. Per translation philosophy, the rendering remains gender-accurate to the
    source rather than shifting to plural or fully gender-neutral language.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of God's giving in ἁπλῶς
  chosen_reading: generously
  alternative_readings:
  - simply
  - liberally
  rationale: The verse emphasizes God's character in giving wisdom freely and unstintingly.
    'Generously' best conveys the likely semantic force in context without importing
    a prosperity-oriented or overly interpretive nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
