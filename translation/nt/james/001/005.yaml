id: JAS.1.5
reference: James 1:5
source:
  edition: SBLGNT
  text: Εἰ δέ τις ὑμῶν λείπεται σοφίας, αἰτείτω παρὰ τοῦ διδόντος θεοῦ πᾶσιν ἁπλῶς
    καὶ ⸀μὴ ὀνειδίζοντος, καὶ δοθήσεται αὐτῷ·
translation:
  text: But if any of you lacks wisdom, let him ask from God, who gives to all generously
    and without reproach, and it will be given to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without finding fault.'
    reason: lexical_alternative
  - marker: b
    text: The Greek uses masculine singular forms ('him') in a representative sense
      for any person among you.
    reason: cultural_note
lexical_decisions:
- source_word: Εἰ δέ
  chosen: But if
  alternatives:
  - Now if
  - And if
  lexicon: BDAG
  rationale: δέ marks a mild development or contrast from the previous verse; 'But
    if' preserves the connective force in natural English without overstating contrast.
- source_word: τις ὑμῶν
  chosen: any of you
  alternatives:
  - someone among you
  lexicon: BDAG
  rationale: Indefinite τις with the partitive genitive ὑμῶν is naturally rendered
    'any of you.' This keeps the direct pastoral address.
- source_word: λείπεται
  chosen: lacks
  alternatives:
  - is lacking
  - falls short of
  lexicon: BDAG
  rationale: Middle/passive form here functions idiomatically for being in need of
    something. 'Lacks' is concise, idiomatic, and fits the conditional statement.
- source_word: σοφίας
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering of σοφία. In context it refers to practical, God-given
    wisdom for enduring trials, but the translation should not narrow the term beyond
    the Greek.
- source_word: αἰτείτω
  chosen: let him ask
  alternatives:
  - he should ask
  - let him keep asking
  lexicon: BDAG
  rationale: Third-person present imperative is well represented by 'let him ask.'
    The present imperative may imply ongoing disposition, but English should not over-interpret
    that aspect here.
- source_word: παρὰ τοῦ διδόντος θεοῦ
  chosen: from God, who gives
  alternatives:
  - of God who gives
  - from the giving God
  lexicon: BDAG
  rationale: παρά with genitive after αἰτέω is naturally 'from.' The participle διδόντος
    is attributive, describing God as the one who gives; 'from God, who gives' is
    clear modern English.
- source_word: πᾶσιν
  chosen: to all
  alternatives:
  - to everyone
  lexicon: BDAG
  rationale: Dative plural of πᾶς is broad and indefinite. 'To all' preserves the
    open scope without importing a narrower or more individualized nuance.
- source_word: ἁπλῶς
  chosen: generously
  alternatives:
  - simply
  - openly
  - single-mindedly
  - liberally
  lexicon: BDAG
  rationale: In this context of divine giving, ἁπλῶς most naturally conveys generosity
    or liberality rather than mere simplicity. 'Generously' communicates the sense
    in accessible English.
- source_word: μὴ ὀνειδίζοντος
  chosen: without reproach
  alternatives:
  - without rebuking
  - without finding fault
  - without insulting
  lexicon: BDAG
  rationale: The participle means not reproaching or reviling. 'Without reproach'
    is concise and preserves the idea that God does not shame the asker. A more colloquial
    alternative is worth preserving in a footnote.
- source_word: δοθήσεται αὐτῷ
  chosen: it will be given to him
  alternatives:
  - it will be given to that person
  lexicon: BDAG
  rationale: Future passive straightforwardly promises divine response. 'It' refers
    to wisdom. Masculine singular αὐτῷ is retained as 'him' under the project's gender-accurate
    policy for representative singulars.
