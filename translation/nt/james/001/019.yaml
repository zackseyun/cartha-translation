- issue: Gendered representative language in address and exhortation
  chosen_reading: 'Retain masculine forms in the main text: ''brothers'' and ''every
    man'''
  alternative_readings:
  - brothers and sisters
  - everyone
  - every person
  rationale: The Greek uses masculine forms with representative/generic force. Per
    the translation philosophy, gender-accurate renderings are preferred over gender-neutral
    ones, while inclusivity relevant to the audience may be noted in a footnote rather
    than absorbed into the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
