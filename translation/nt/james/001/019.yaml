id: JAS.1.19
reference: James 1:19
source:
  edition: SBLGNT
  text: ⸀Ἴστε, ἀδελφοί μου ἀγαπητοί. ἔστω ⸀δὲ πᾶς ἄνθρωπος ταχὺς εἰς τὸ ἀκοῦσαι, βραδὺς
    εἰς τὸ λαλῆσαι, βραδὺς εἰς ὀργήν,
translation:
  text: 'Know this, my beloved brothers: let every man be quick to hear, slow to speak,
    slow to anger,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my beloved brothers and sisters'; the Greek says 'brothers,' but James
      is likely addressing the whole believing community.
    reason: alternative_reading
  - marker: b
    text: Or 'everyone' / 'every person'; Greek 'every man' uses a masculine singular
      form with generic force.
    reason: lexical_alternative
  - marker: c
    text: Or 'You know this, my beloved brothers'; the opening verb may also be taken
      as indicative rather than imperative.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἴστε
  chosen: Know this
  alternatives:
  - You know
  - Understand this
  lexicon: BDAG
  rationale: The form can be taken as imperative or indicative in context. Rendering
    it as an imperative-like exhortation ('Know this') fits the paraenetic flow and
    the transition into the commands that follow. 'This' is supplied idiomatically
    to make the English natural and to reflect the discourse function.
- source_word: ἀδελφοί μου ἀγαπητοί
  chosen: my beloved brothers
  alternatives:
  - my beloved brothers and sisters
  - my dear brothers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and often represents a mixed
    Christian audience. Per the gender-accurate policy, 'brothers' is retained in
    the main text rather than neutralizing it; 'beloved' straightforwardly renders
    ἀγαπητοί. An inclusive alternative is preserved in a footnote because the audience
    is likely mixed.
- source_word: ἔστω δὲ
  chosen: let ... be
  alternatives:
  - but let ... be
  - now let ... be
  lexicon: BDAG
  rationale: This is a third-person imperative introducing exhortation. English 'let
    ... be' best captures the force. δέ is lightly connective; it is not necessary
    to represent it with a strong adversative in English, though 'but' is possible.
- source_word: πᾶς ἄνθρωπος
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: BDAG
  rationale: ἄνθρωπος here is singular generic, and the doctrine calls for gender-accurate
    rendering over gender-neutral where the Greek uses masculine representative language.
    'Every man' preserves the singular generic force better than the pluralizing or
    neutralizing alternatives.
- source_word: ταχὺς εἰς τὸ ἀκοῦσαι
  chosen: quick to hear
  alternatives:
  - quick to listen
  - ready to hear
  lexicon: BDAG
  rationale: The construction means 'quick with respect to hearing/listening.' 'Quick
    to hear' is slightly more formal and preserves the lexical link to ἀκούω; 'quick
    to listen' is idiomatic but less formally tied to the Greek wording.
- source_word: βραδὺς εἰς τὸ λαλῆσαι
  chosen: slow to speak
  alternatives:
  - slow to talk
  lexicon: BDAG
  rationale: A direct and natural rendering of the adjective plus infinitive construction.
    'Speak' is preferable to 'talk' for register and consistency with λαλέω in exhortational
    contexts.
- source_word: βραδὺς εἰς ὀργήν
  chosen: slow to anger
  alternatives:
  - slow toward anger
  - slow to wrath
  lexicon: BDAG
  rationale: This is the standard and natural English equivalent for the Greek idiom.
    'Wrath' would sound overly elevated here and could imply a more settled judicial
    sense than the context requires.
