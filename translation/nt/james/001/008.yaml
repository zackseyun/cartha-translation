- issue: Gendered representative language
  chosen_reading: Retain 'man' in the main text
  alternative_readings:
  - a double-minded person, unstable in all their ways
  rationale: The Greek uses masculine singular language with generic force. Following
    the doctrine's gender-accurate principle, the translation preserves the masculine
