id: JAS.1.8
reference: James 1:8
source:
  edition: SBLGNT
  text: ἀνὴρ δίψυχος, ἀκατάστατος ἐν πάσαις ταῖς ὁδοῖς αὐτοῦ.
translation:
  text: a double-minded man, unstable in all his ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a double-minded person, unstable in all their ways.' The Greek is masculine
      singular but likely representative in force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and, in context, refers
    back to the generic petitioner of the previous verse. Per the doctrine's gender-accurate
    principle, 'man' preserves the Greek form and representative force better than
    a neutral recasting, while remaining natural English.
- source_word: δίψυχος
  chosen: double-minded
  alternatives:
  - double-souled
  - divided in soul
  - two-souled
  lexicon: BDAG
  rationale: This rare adjective literally suggests 'two-souled,' but idiomatic English
    'double-minded' best conveys inner division without wooden awkwardness. It also
    fits James's emphasis on divided loyalty and wavering.
- source_word: ἀκατάστατος
  chosen: unstable
  alternatives:
  - restless
  - unsettled
  - disorderly
  lexicon: BDAG
  rationale: '''Unstable'' captures the sense of being inconsistent and unreliable
    in conduct. ''Disorderly'' can sound more moralistic or social-order oriented
    than the context warrants; James here stresses lack of steadiness.'
- source_word: ἐν πάσαις ταῖς ὁδοῖς αὐτοῦ
  chosen: in all his ways
  alternatives:
  - in all his paths
  - throughout all his conduct
  lexicon: BDAG
  rationale: '''Ways'' is the most natural rendering of ὁδοῖς in this figurative sense,
    referring to the whole pattern of life and conduct. ''Paths'' is possible but
    less idiomatic here; ''conduct'' is interpretive rather than translational.'
