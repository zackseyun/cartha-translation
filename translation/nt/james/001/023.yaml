id: JAS.1.23
reference: James 1:23
source:
  edition: SBLGNT
  text: ὅτι εἴ τις ἀκροατὴς λόγου ἐστὶν καὶ οὐ ποιητής, οὗτος ἔοικεν ἀνδρὶ κατανοοῦντι
    τὸ πρόσωπον τῆς γενέσεως αὐτοῦ ἐν ἐσόπτρῳ,
translation:
  text: For if anyone is a hearer of the word and not a doer, this one is like a man
    carefully looking at the face of his birth in a mirror,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural face he was born with.' The Greek phrase is literally 'the
      face of his birth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροατὴς
  chosen: hearer
  alternatives:
  - listener
  lexicon: BDAG
  rationale: Rendered 'hearer' to preserve the verbal parallel with 'doer' (ποιητής)
    and the traditional ethical contrast in James between hearing and doing.
- source_word: λόγου
  chosen: of the word
  alternatives:
  - of the message
  lexicon: BDAG
  rationale: Kept 'word' as the most direct rendering of λόγος here; in James this
    naturally refers to the proclaimed word of God, and 'word' preserves intertextual
    continuity with the surrounding context.
- source_word: ποιητής
  chosen: doer
  alternatives:
  - one who does it
  - practitioner
  lexicon: BDAG
  rationale: Rendered 'doer' to match the established hearing/doing contrast and to
    reflect the substantival force of the noun rather than a finite verb.
- source_word: ἔοικεν
  chosen: is like
  alternatives:
  - resembles
  lexicon: BDAG
  rationale: Used idiomatic modern English for the perfect-form verb with present
    sense, preserving the comparison without awkwardness.
- source_word: ἀνδρὶ
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: Rendered with the gender-accurate masculine 'man' in keeping with the
    Greek term ἀνήρ and the project's stated preference for gender-accurate translation
    where the source is masculine.
- source_word: κατανοοῦντι
  chosen: carefully looking at
  alternatives:
  - observing
  - considering
  - looking at
  lexicon: BDAG
  rationale: The participle conveys attentive observation, not merely a glance. 'Carefully
    looking at' brings out the force of κατανοέω in readable English.
- source_word: τὸ πρόσωπον
  chosen: the face
  alternatives:
  - the appearance
  lexicon: BDAG
  rationale: Rendered literally as 'the face,' the natural sense in a mirror image
    context.
- source_word: τῆς γενέσεως αὐτοῦ
  chosen: of his birth
  alternatives:
  - of his natural face
  - with which he was born
  lexicon: BDAG
  rationale: Translated formally as 'of his birth' to reflect the genitive construction
    closely. In context it refers to one's natural face or native appearance, but
    the more literal rendering preserves the source wording and imagery.
- source_word: ἐν ἐσόπτρῳ
  chosen: in a mirror
  alternatives:
  - in a looking-glass
  lexicon: BDAG
  rationale: Used standard modern English for ἔσοπτρον. 'Mirror' is clear and natural
    for contemporary readers.
