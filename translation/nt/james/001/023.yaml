theological_decisions:
- issue: Gendered representative language in ἀνδρὶ
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The Greek uses the specifically masculine ἀνήρ rather than a generic
    human term. Following the doctrine's gender-accurate principle, the translation
    preserves the masculine form while allowing readers to understand the comparison
    generically from context.
