theological_decisions:
- issue: Meaning of ψυχὰς ὑμῶν in a salvation context
  chosen_reading: your souls
  alternative_readings:
  - your lives
  - you yourselves
  rationale: James uses ψυχή in a context of salvation language. Rendering it 'souls'
    preserves the theological weight and avoids flattening the term to mere temporal
    life, while not denying that the word can sometimes mean 'lives' or 'selves.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Sense of ἔμφυτον λόγον
  chosen_reading: the implanted word
  alternative_readings:
  - the inborn word
  - the engrafted word
  rationale: The phrase could be heard as either the word implanted by God or the
    word now rooted within the hearers. 'Implanted word' preserves that theological
    breadth without specifying the mechanism beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
