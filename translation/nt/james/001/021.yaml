id: JAS.1.21
reference: James 1:21
source:
  edition: SBLGNT
  text: διὸ ἀποθέμενοι πᾶσαν ῥυπαρίαν καὶ περισσείαν κακίας ἐν πραΰτητι δέξασθε τὸν
    ἔμφυτον λόγον τὸν δυνάμενον σῶσαι τὰς ψυχὰς ὑμῶν.
translation:
  text: Therefore, having put away all filthiness and the overflow of wickedness,
    receive with meekness the implanted word, which is able to save your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the abundance of evil' or 'the surplus of malice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with gentleness' or 'in humility.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''the inborn word''; traditional: ''the engrafted word.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'your lives' or 'you yourselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding exhortation; 'Therefore' is natural
    and preserves the logical connection.
- source_word: ἀποθέμενοι
  chosen: having put away
  alternatives:
  - putting away
  - laying aside
  lexicon: BDAG
  rationale: Aorist middle participle, attendant to the main imperative δέξασθε; 'having
    put away' conveys prior or accompanying action without flattening the participial
    force.
- source_word: πᾶσαν ῥυπαρίαν
  chosen: all filthiness
  alternatives:
  - all moral uncleanness
  - all impurity
  lexicon: BDAG
  rationale: ῥυπαρία denotes dirtiness or moral filth. 'Filthiness' preserves the
    vivid metaphor and moral sense without overinterpreting.
- source_word: περισσείαν κακίας
  chosen: the overflow of wickedness
  alternatives:
  - abundance of evil
  - surplus of malice
  lexicon: BDAG
  rationale: περισσεία suggests abundance or excess; κακία can mean wickedness, evil,
    or malice. 'Overflow of wickedness' preserves the image of excess and fits the
    ethical context better than the narrower 'malice'.
- source_word: ἐν πραΰτητι
  chosen: with meekness
  alternatives:
  - in humility
  - with gentleness
  lexicon: BDAG
  rationale: πραΰτης includes gentleness and humble teachability. 'With meekness'
    is a traditional but still understandable rendering that best matches the receptive
    posture James commands.
- source_word: δέξασθε
  chosen: receive
  alternatives:
  - welcome
  - accept
  lexicon: BDAG
  rationale: Aorist middle imperative calling for active reception. 'Receive' is concise
    and preserves the imperative force without adding interpretive nuance.
- source_word: τὸν ἔμφυτον λόγον
  chosen: the implanted word
  alternatives:
  - the inborn word
  - the engrafted word
  lexicon: BDAG
  rationale: ἔμφυτος means implanted or inborn. 'Implanted' best fits the agricultural
    imagery and the idea of the word placed within believers; 'engrafted' is traditional
    but less transparent in modern English.
- source_word: τὸν δυνάμενον σῶσαι
  chosen: which is able to save
  alternatives:
  - that is able to save
  - which can save
  lexicon: BDAG
  rationale: The participial phrase modifies 'word.' 'Which is able to save' is natural
    English and preserves the statement of capability without overstating mechanism.
- source_word: τὰς ψυχὰς ὑμῶν
  chosen: your souls
  alternatives:
  - your lives
  - you
  lexicon: BDAG
  rationale: ψυχή can denote soul, life, or self. Here 'your souls' preserves the
    traditional and likely intended sense of the inner life/person before God, while
    avoiding reduction to mere physical life.
