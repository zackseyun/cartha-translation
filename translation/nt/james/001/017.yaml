theological_decisions:
- issue: Imagery of 'the Father of lights' and divine immutability
  chosen_reading: Retain the metaphor and the statement of unchangeableness without
    expanding it into a doctrinal paraphrase.
  alternative_readings:
  - Interpret 'lights' explicitly as heavenly bodies in the main text
  - Render the final clause more abstractly as 'with whom there is no change'
  rationale: The verse presents God as the source of all good gifts and contrasts
    him with changing created lights. The translation preserves the metaphor and the
    tension of the imagery rather than resolving it into explanatory theology in the
    main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
