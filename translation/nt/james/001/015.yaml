theological_decisions:
- issue: Nature of the metaphor linking desire, sin, and death
  chosen_reading: Preserve James's personified conception-and-birth imagery without
    softening it into abstract causation.
  alternative_readings:
  - Then desire leads to sin, and sin leads to death.
  rationale: A purely causal paraphrase would flatten the inspired metaphor and reduce
    the rhetorical force. The verse depicts desire and sin as personified agents in
    a reproductive sequence, emphasizing the organic progression of temptation into
    death.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; optimal equivalence.'
- issue: Meaning of θάνατος
  chosen_reading: Render simply as 'death' without specifying physical, spiritual,
    or eternal death.
  alternative_readings:
  - spiritual death
  - eternal death
  rationale: The Greek text states only 'death.' James may intentionally leave the
    term weighty and comprehensive. The translation should not import a narrower doctrinal
    specification not explicit in the verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
