id: JAS.1.15
reference: James 1:15
source:
  edition: SBLGNT
  text: εἶτα ἡ ἐπιθυμία συλλαβοῦσα τίκτει ἁμαρτίαν, ἡ δὲ ἁμαρτία ἀποτελεσθεῖσα ἀποκύει
    θάνατον.
translation:
  text: Then desire, after it has conceived, gives birth to sin; and sin, when it
    is fully grown, brings forth death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having conceived.' The Greek participle keeps the conception imagery
      tightly linked to desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'when it is completed' or 'when it has come to maturity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - After that
  - Next
  lexicon: BDAG
  rationale: Marks sequence in James's temptation-to-death progression. 'Then' is
    natural English and preserves the logical development from the previous verse.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: '''Desire'' is the broadest and most contextually fitting rendering.
    ''Lust'' is too narrow and overly sexualized here; the term refers to wrongful
    desire more generally in the temptation metaphor.'
- source_word: συλλαβοῦσα
  chosen: after it has conceived
  alternatives:
  - having conceived
  - conceiving
  lexicon: BDAG
  rationale: 'The aorist participle in this birth metaphor is best rendered with prior
    action relative to the main verb: desire first conceives, then gives birth. ''After
    it has conceived'' makes the temporal sequence explicit in idiomatic English.'
- source_word: τίκτει
  chosen: gives birth to
  alternatives:
  - bears
  - brings forth
  lexicon: BDAG
  rationale: Maintains the childbirth imagery clearly and naturally. 'Gives birth
    to' is more transparent to modern readers than 'bears' and pairs well with the
    participle and later verb.
- source_word: ἁμαρτίαν
  chosen: sin
  lexicon: BDAG
  rationale: Standard and contextually exact rendering for moral evil produced by
    desire.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ continues the sequence rather than sharply contrasting. 'And'
    best preserves the flow of the metaphor.
- source_word: ἀποτελεσθεῖσα
  chosen: when it is fully grown
  alternatives:
  - when it is completed
  - when it is full-grown
  - having come to maturity
  lexicon: BDAG
  rationale: The participle conveys reaching completion or maturity. In the organic
    birth-growth metaphor, 'fully grown' best captures the image and sense, avoiding
    a wooden 'completed' while preserving the idea of sin reaching its full development.
- source_word: ἀποκύει
  chosen: brings forth
  alternatives:
  - gives birth to
  - produces
  lexicon: BDAG
  rationale: This verb also belongs to the birth imagery, but varying the English
    slightly avoids awkward repetition while preserving the metaphor. 'Brings forth'
    is idiomatic and vivid.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Direct and standard rendering. The text leaves the scope of 'death' stark
    and unqualified, so the translation should do the same.
