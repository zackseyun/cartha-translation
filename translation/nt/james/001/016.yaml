theological_decisions:
- issue: Gendered address to the Christian audience
  chosen_reading: Render ἀδελφοί as 'brothers' in the main text, with inclusive force
    preserved in a footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine plural and likely addresses the
    mixed Christian assembly representatively. Following the stated doctrine, the
    main text remains gender-accurate to the source while a footnote can clarify the
    inclusive referent for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
