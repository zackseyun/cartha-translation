id: JAS.1.16
reference: James 1:16
source:
  edition: SBLGNT
  text: μὴ πλανᾶσθε, ἀδελφοί μου ἀγαπητοί.
translation:
  text: Do not be deceived, my beloved brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek word 'brothers' can address fellow
      believers collectively, including women.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: Do not
  alternatives:
  - Do not ever
  - Stop
  lexicon: BDAG
  rationale: With the present imperative, μή marks a prohibition. In idiomatic English,
    'Do not' best conveys the negative command without adding aspectual nuance beyond
    what the context warrants.
- source_word: πλανᾶσθε
  chosen: be deceived
  alternatives:
  - go astray
  - be led astray
  - be misled
  lexicon: BDAG
  rationale: πλανάω in the passive/middle here most naturally means 'be deceived'
    or 'be led astray.' In this context, following the warning that God is not the
    source of evil temptation (vv. 13–15), the sense is against adopting a false belief.
    'Be deceived' is concise, natural English and preserves the passive force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural ἀδελφοί literally means 'brothers.' Per the translation
    philosophy, gender-accurate rendering is preferred over gender-neutral smoothing.
    Because James addresses the Christian community broadly, the representative force
    can be noted in a footnote rather than changed in the main text.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: 'The possessive pronoun is straightforward and expresses pastoral affection
    and relational closeness: ''my.'''
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: ἀγαπητοί is a warm term of affection meaning 'beloved.' 'Beloved' preserves
    both the emotional and covenantal resonance better than the flatter 'dear.' Its
    placement in English as 'my beloved brothers' is natural and keeps the vocative
    force.
