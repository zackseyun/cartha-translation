id: JAS.5.8
reference: James 5:8
source:
  edition: SBLGNT
  text: μακροθυμήσατε καὶ ὑμεῖς, στηρίξατε τὰς καρδίας ὑμῶν, ὅτι ἡ παρουσία τοῦ κυρίου
    ἤγγικεν.
translation:
  text: You also be patient; strengthen your hearts, because the coming of the Lord
    has drawn near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the presence of the Lord.' The Greek word can mean 'presence' or 'coming';
      in this context it refers to the Lord's eschatological arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακροθυμήσατε
  chosen: be patient
  alternatives:
  - be long-suffering
  - be steadfast
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural. The verb denotes patient
    endurance over time, especially under provocation or hardship. 'Be patient' is
    clear modern English and fits the agricultural/endurance context of the surrounding
    verses better than the less natural 'be long-suffering.'
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - and you
  - you too
  lexicon: BDAG
  rationale: The combination adds emphasis and links the readers with the example
    just given in the previous verse. 'You also' preserves both the connective and
    the emphatic pronoun naturally in English.
- source_word: στηρίξατε
  chosen: strengthen
  alternatives:
  - establish
  - set firm
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural. The verb can mean to
    strengthen, establish, or make firm. 'Strengthen' works idiomatically with 'your
    hearts' in contemporary English while preserving the sense of inward resolve.
- source_word: τὰς καρδίας ὑμῶν
  chosen: your hearts
  alternatives:
  - your inner selves
  - your minds
  lexicon: BDAG
  rationale: A direct rendering of the Greek phrase. 'Hearts' in biblical usage refers
    to the inner person, including will and courage; retaining 'hearts' preserves
    the biblical metaphor and theological texture.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the imperatives. 'Because' is the clearest
    modern English causal connector here.
- source_word: ἡ παρουσία
  chosen: the coming
  alternatives:
  - the presence
  - the arrival
  lexicon: BDAG
  rationale: In this eschatological context παρουσία refers to the Lord's coming/arrival
    rather than mere abstract presence. 'The coming' is the standard and contextually
    appropriate rendering.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the Master
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' in keeping with the project's default for this
    title and with New Testament usage for Jesus in an eschatological context.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: Perfect active indicative, third person singular. The perfect conveys
    a state resulting from nearness already established. 'Has drawn near' preserves
    that aspect better than the simpler 'is near,' while remaining natural English.
