theological_decisions:
- issue: Meaning of παρουσία in an eschatological statement about the Lord
  chosen_reading: the coming of the Lord
  alternative_readings:
  - the presence of the Lord
  rationale: Although παρουσία can lexically mean 'presence,' in James 5:7–8 the context
    is future-oriented exhortation grounded in the Lord's imminent eschatological
    arrival. Rendering it as 'coming' best reflects the contextual sense without flattening
    the term's lexical range.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Lord'
