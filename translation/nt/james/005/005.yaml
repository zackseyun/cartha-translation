id: JAS.5.5
reference: James 5:5
source:
  edition: SBLGNT
  text: ἐτρυφήσατε ἐπὶ τῆς γῆς καὶ ἐσπαταλήσατε, ἐθρέψατε τὰς καρδίας ⸀ὑμῶν ἐν ἡμέρᾳ
    σφαγῆς.
translation:
  text: You have lived in luxury on the earth and indulged yourselves; you have fattened
    your hearts in a day of slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have lived in pleasure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have lived in self-indulgence' for 'indulged yourselves.'
    reason: lexical_alternative
  - marker: c
    text: The image is of animals being fattened before slaughter, likely implying
      impending judgment.
    reason: cultural_note
  - marker: d
    text: Or 'for the day of slaughter.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτρυφήσατε
  chosen: have lived in luxury
  alternatives:
  - have lived in pleasure
  - have lived self-indulgently
  lexicon: BDAG
  rationale: Aorist indicative addressing the rich with a completed characterization.
    τρυφάω conveys luxurious, pleasure-seeking living rather than mere enjoyment.
    'Lived in luxury' is idiomatic modern English and preserves the moral force.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on the land
  - on earth
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here the broader sense fits the denunciation
    of worldly luxury. 'On the earth' closely reflects the Greek while remaining natural.
- source_word: ἐσπαταλήσατε
  chosen: indulged yourselves
  alternatives:
  - lived in self-indulgence
  - lived wantonly
  lexicon: BDAG
  rationale: σπαταλάω intensifies the previous verb, denoting self-indulgent, extravagant
    living. 'Indulged yourselves' captures the reflexive sense and avoids archaic
    'wanton' while preserving the rebuke.
- source_word: ἐθρέψατε
  chosen: have fattened
  alternatives:
  - have nourished
  - have fed
  lexicon: BDAG
  rationale: τρέφω often means 'nourish/feed,' but in this context the irony points
    to fattening for slaughter, not wholesome nourishment. 'Have fattened' best prepares
    for the closing image.
- source_word: τὰς καρδίας ὑμῶν
  chosen: your hearts
  alternatives:
  - yourselves inwardly
  lexicon: BDAG
  rationale: A literal rendering preserves the biblical anthropology and rhetorical
    force. The phrase is metaphorical but should not be flattened into a paraphrase.
- source_word: ἐν ἡμέρᾳ σφαγῆς
  chosen: in a day of slaughter
  alternatives:
  - for the day of slaughter
  - on a day of slaughter
  lexicon: BDAG
  rationale: The phrase is metaphorical and allusive, likely evoking animals being
    fattened for slaughter and impending judgment. 'In a day of slaughter' is a close
    rendering of ἐν and preserves the stark imagery without over-interpreting. 'For
    the day of slaughter' is interpretively possible but less formally aligned.
