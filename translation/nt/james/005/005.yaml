theological_decisions:
- issue: Metaphorical force of 'day of slaughter'
  chosen_reading: Retain the metaphor of impending slaughter/judgment without making
    the referent explicit in the main text.
  alternative_readings:
  - an explicit reference to divine judgment
  - an allusion to the slaughter of the innocent in the surrounding context
  rationale: The verse strongly suggests judgment, but the Greek image itself is vivid
    and should stand without explanatory expansion. This preserves theological tension
    and avoids importing more specificity than the text states.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
