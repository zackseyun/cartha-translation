theological_decisions:
- issue: Whether κρίσις should be rendered as 'judgment' or the stronger 'condemnation'
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  rationale: The Greek κρίσις can denote judgment in a broad sense and does not itself
    require the stronger, more final sense of condemnation. To avoid importing a narrower
    doctrinal claim than the text states, the main text keeps 'judgment,' with the
    stronger alternative preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
- issue: How to render ἀδελφοί in a mixed-community address
  chosen_reading: my brothers
  alternative_readings:
  - my brothers and sisters
  rationale: The project's stated policy is gender-accurate over gender-neutral. Because
    the masculine plural here likely has representative force for the whole community,
    the main text preserves 'brothers' while a footnote can clarify inclusive reference.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
