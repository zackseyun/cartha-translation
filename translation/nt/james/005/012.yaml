id: JAS.5.12
reference: James 5:12
source:
  edition: SBLGNT
  text: Πρὸ πάντων δέ, ἀδελφοί μου, μὴ ὀμνύετε, μήτε τὸν οὐρανὸν μήτε τὴν γῆν μήτε
    ἄλλον τινὰ ὅρκον· ἤτω δὲ ὑμῶν τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ, ἵνα μὴ ⸂ὑπὸ κρίσιν⸃ πέσητε.
translation:
  text: But above all, my brothers, do not swear, either by heaven or by earth or
    by any other oath. Instead, let your yes be yes and your no, no, so that you may
    not fall under judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my brothers and sisters'; the Greek says 'brothers' and likely addresses
      the whole believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that you may not fall under condemnation.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πρὸ πάντων
  chosen: above all
  alternatives:
  - before all things
  - especially
  lexicon: BDAG
  rationale: Idiomatic expression marking priority or chief importance in the exhortation;
    'above all' is natural English and preserves the emphatic force better than a
    more wooden 'before all things.'
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my siblings
  lexicon: BDAG
  rationale: Rendered gender-accurately per project philosophy. The Greek is grammatically
    masculine plural and commonly addresses the mixed Christian community representatively.
    'My brothers' preserves the source form; inclusivity can be noted in a footnote.
- source_word: μὴ ὀμνύετε
  chosen: do not swear
  alternatives:
  - do not take oaths
  - stop swearing
  lexicon: BDAG
  rationale: The present imperative with μή gives a general prohibition. 'Do not swear'
    is concise and idiomatic, while the following phrase about heaven, earth, and
    'any other oath' clarifies that oath-taking is in view, not profanity.
- source_word: μήτε τὸν οὐρανὸν μήτε τὴν γῆν
  chosen: either by heaven or by earth
  alternatives:
  - neither by heaven nor by earth
  lexicon: BDAG
  rationale: English coordination is smoothed idiomatically while preserving the paired
    prohibitions and the sense of swearing by created realities.
- source_word: μήτε ἄλλον τινὰ ὅρκον
  chosen: or by any other oath
  alternatives:
  - nor with any other oath
  - nor any other oath
  lexicon: BDAG
  rationale: The preposition 'by' is carried through elliptically from the previous
    clauses for clear English sense. 'Any other oath' captures the comprehensive prohibition.
- source_word: ἤτω δὲ ὑμῶν τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ
  chosen: Instead, let your yes be yes and your no, no
  alternatives:
  - But let your yes be yes and your no be no
  - let your 'yes' be 'yes' and your 'no' be 'no'
  lexicon: BDAG
  rationale: This preserves the terse, proverbial force of the Greek. 'Instead' brings
    out the contrastive δέ naturally. Repeating 'be' only once keeps the line crisp
    while retaining the meaning of straightforward truthfulness.
- source_word: ἵνα μὴ ὑπὸ κρίσιν πέσητε
  chosen: so that you may not fall under judgment
  alternatives:
  - so that you may not come under condemnation
  - lest you fall into judgment
  lexicon: BDAG
  rationale: ὑπὸ κρίσιν is most naturally 'under judgment.' 'Judgment' is broader
    and closer to the Greek than 'condemnation,' which can over-specify final damnation.
    'Fall under judgment' preserves the metaphor of πέσητε.
