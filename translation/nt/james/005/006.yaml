id: JAS.5.6
reference: James 5:6
source:
  edition: SBLGNT
  text: κατεδικάσατε, ἐφονεύσατε τὸν δίκαιον. οὐκ ἀντιτάσσεται ὑμῖν;
translation:
  text: You condemned, you murdered the righteous man. He does not resist you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the righteous one.' Some interpreters take this as a possible echo
      of Jesus, 'the Righteous One,' though the immediate context also supports a
      representative righteous person oppressed by the rich.
    reason: alternative_reading
  - marker: b
    text: 'Greek: ''Does he not resist you?'' The clause may be read as a rhetorical
      question with the sense given in the main text.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδικάσατε
  chosen: you condemned
  alternatives:
  - you have condemned
  - you pronounced judgment against
  lexicon: BDAG
  rationale: Aorist active indicative, second person plural. 'Condemned' is the plain
    and forceful English equivalent of καταδικάζω, preserving the judicial sense without
    unnecessary expansion. Simple past fits the denunciatory style.
- source_word: ἐφονεύσατε
  chosen: you murdered
  alternatives:
  - you killed
  - you put to death
  lexicon: BDAG
  rationale: φονεύω commonly carries the sense of unlawful killing or murder. 'Murdered'
    preserves the moral weight of the accusation better than the more neutral 'killed.'
    It may include exploitative actions leading to death, but the stronger term should
    stand in the main text.
- source_word: τὸν δίκαιον
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  - the innocent man
  lexicon: BDAG
  rationale: With the article and singular adjective used substantivally, the phrase
    most naturally means 'the righteous man' or 'the righteous one.' 'The righteous
    man' is gender-accurate to the masculine singular form and fits the epistle's
    style. It may function generically for the righteous poor person rather than as
    a title for Jesus specifically.
- source_word: οὐκ ἀντιτάσσεται ὑμῖν
  chosen: He does not resist you
  alternatives:
  - he does not oppose you
  - does he not resist you?
  lexicon: BDAG
  rationale: ἀντιτάσσομαι means to set oneself against, oppose, or resist. 'Resist'
    is concise and natural. The clause is punctuated as a question in SBLGNT, but
    in context it is commonly understood as a rhetorical question expecting a negative
    answer and can be rendered idiomatically as a statement in English. The singular
    subject is retained as 'He,' referring back to the righteous man.
