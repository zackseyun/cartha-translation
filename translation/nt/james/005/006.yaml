theological_decisions:
- issue: Referent of 'the righteous man'
  chosen_reading: A representative righteous person oppressed by the rich, not explicitly
    a christological title in the main text.
  alternative_readings:
  - A veiled reference to Jesus as 'the Righteous One'
  rationale: James is denouncing wealthy oppressors in general, and the singular can
    function representatively. While some interpreters hear an echo of Jesus as the
    Righteous One, the immediate context does not require that identification. The
    translation therefore preserves the broader sense in the main text and notes the
    possible christological reading in a footnote, preserving theological tension
    rather than resolving it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
- issue: Force of the final clause
  chosen_reading: 'Declarative English rendering of a rhetorical Greek question: ''He
    does not resist you.'''
  alternative_readings:
  - 'Interrogative rendering: ''Does he not resist you?'''
  rationale: The Greek wording with οὐκ can be read as a rhetorical question, but
    many English readers will understand the intended sense more clearly as a statement.
    This is an optimal-equivalence choice for readability while preserving the substance
    of the clause. The interrogative alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
