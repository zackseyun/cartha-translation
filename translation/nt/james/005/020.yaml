theological_decisions:
- issue: Antecedent of αὐτοῦ in ψυχὴν αὐτοῦ
  chosen_reading: the pronoun is rendered 'his' without specifying the antecedent
    in the main text
  alternative_readings:
  - the sinner's soul
  - the restorer's soul
  rationale: The Greek pronoun can be read as referring either to the sinner being
    turned back or, less likely, to the one who turns him back. The main text preserves
    the ambiguity with 'his soul,' and a footnote documents the alternatives rather
    than resolving the tension beyond the wording of the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Sense of ψυχή and θάνατος
  chosen_reading: retain 'soul' and 'death' in broad terms
  alternative_readings:
  - life ... from death
  - soul ... from spiritual death
  rationale: The verse can be read in terms of life preserved, spiritual salvation,
    or both. The translation avoids narrowing the statement to one doctrinal scheme
    and keeps the source text's breadth.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
