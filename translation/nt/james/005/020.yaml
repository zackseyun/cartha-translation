id: JAS.5.20
reference: James 5:20
source:
  edition: SBLGNT
  text: ⸀γινωσκέτω ὅτι ὁ ἐπιστρέψας ἁμαρτωλὸν ἐκ πλάνης ὁδοῦ αὐτοῦ σώσει ψυχὴν ⸀αὐτοῦ
    ἐκ θανάτου καὶ καλύψει πλῆθος ἁμαρτιῶν.
translation:
  text: let him know that whoever turns a sinner back from the error of his way will
    save his soul from death and will cover a multitude of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will save his life from death.' The Greek word can mean 'soul' or 'life.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'his' may refer to the sinner who is turned back; some understand
      it to refer to the one who turns him back.
    reason: alternative_reading
lexical_decisions:
- source_word: γινωσκέτω
  chosen: let him know
  alternatives:
  - let him recognize
  - he should know
  lexicon: BDAG
  rationale: Third-person present active imperative singular; rendered as an exhortation
    directed to the one envisioned in v. 19–20. 'Let him know' preserves the imperative
    force in natural English.
- source_word: ὁ ἐπιστρέψας
  chosen: whoever turns ... back
  alternatives:
  - the one who turns
  - whoever brings ... back
  - the one who converts
  lexicon: BDAG
  rationale: Articular aorist participle functioning substantivally. 'Whoever turns
    ... back' communicates the generic force and the restoration sense of ἐπιστρέφω
    without importing later technical overtones of 'convert.' 'Back' is supplied because
    the context is restoring one who has wandered.
- source_word: ἁμαρτωλὸν
  chosen: a sinner
  alternatives:
  - the sinner
  lexicon: BDAG
  rationale: Anarthrous accusative singular used generically; 'a sinner' is idiomatic
    and preserves the category reference.
- source_word: ἐκ πλάνης ὁδοῦ αὐτοῦ
  chosen: from the error of his way
  alternatives:
  - from the wandering of his way
  - from his erroneous path
  - from the straying of his way
  lexicon: BDAG
  rationale: πλάνη denotes error, wandering, or deception; ὁδός here is metaphorical
    for manner of life/conduct. 'The error of his way' preserves both the moral and
    directional imagery with readable English.
- source_word: σώσει
  chosen: will save
  alternatives:
  - will rescue
  lexicon: BDAG
  rationale: Future active indicative of σῴζω. 'Will save' is the standard rendering
    and preserves the theological weight; 'rescue' is possible but weaker in this
    context.
- source_word: ψυχὴν αὐτοῦ
  chosen: his soul
  alternatives:
  - his life
  lexicon: BDAG
  rationale: ψυχή can mean 'soul' or 'life.' Here the phrase 'save ... from death'
    could support either, but 'soul' best preserves the lexical form and the spiritual
    seriousness of the warning without excluding holistic life. Because αὐτοῦ is ambiguous,
    a footnote preserves the alternative antecedent ('his' = the sinner's or the restorer's).
- source_word: ἐκ θανάτου
  chosen: from death
  alternatives:
  - from deadly ruin
  lexicon: BDAG
  rationale: Literal rendering of the prepositional phrase. The text does not specify
    physical versus spiritual death, so the translation preserves the broader term
    'death' rather than narrowing it interpretively.
- source_word: καλύψει
  chosen: will cover
  alternatives:
  - will conceal
  lexicon: BDAG
  rationale: Future active indicative of καλύπτω. 'Will cover' preserves the biblical
    idiom and echoes OT/Jewish usage about sins being covered, without overexplaining.
- source_word: πλῆθος ἁμαρτιῶν
  chosen: a multitude of sins
  alternatives:
  - many sins
  lexicon: BDAG
  rationale: A natural but still formal rendering of the idiom; 'multitude' retains
    the elevated biblical resonance and matches the singular collective noun πλῆθος.
