theological_decisions:
- issue: Gendered vocative ἀδελφοί in a congregational address
  chosen_reading: Brothers in the main text, with inclusive force noted in a footnote
  alternative_readings:
  - Brothers and sisters
  - siblings
  rationale: The doctrine requires gender-accurate rather than gender-neutral rendering.
    Because ἀδελφοί is grammatically masculine but often representative in epistolary
    address, the main text keeps 'Brothers' while a footnote can clarify likely mixed-gender
    reference.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Semantic relation of the prophets to ὑπόδειγμα
  chosen_reading: take the prophets ... as an example of suffering and patience
  alternative_readings:
  - take as an example of suffering and patience the prophets ...
  - take the prophets as an example in suffering and patience
  rationale: The Greek syntax places 'the prophets' as the object to be taken as an
    example, with the genitives specifying the respect in which they are exemplary.
    The chosen English preserves that structure while remaining readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
