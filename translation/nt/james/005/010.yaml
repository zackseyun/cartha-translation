id: JAS.5.10
reference: James 5:10
source:
  edition: SBLGNT
  text: ὑπόδειγμα λάβετε, ⸀ἀδελφοί, τῆς κακοπαθίας καὶ τῆς μακροθυμίας τοὺς προφήτας,
    οἳ ἐλάλησαν ⸀ἐν τῷ ὀνόματι κυρίου.
translation:
  text: Brothers, take the prophets who spoke in the name of the Lord as an example
    of suffering and patience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine plural ἀδελφοί; in context James
      is likely addressing the whole believing community, including women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόδειγμα
  chosen: example
  alternatives:
  - pattern
  - model
  lexicon: BDAG
  rationale: ὑπόδειγμα denotes an example or model to be imitated. 'Example' is the
    most natural modern English rendering here and fits the exhortational force of
    the verse.
- source_word: λάβετε
  chosen: take
  alternatives:
  - consider
  - take ... as
  lexicon: BDAG
  rationale: Aorist imperative of λαμβάνω. Literally 'take'; in idiomatic English
    with ὑπόδειγμα and the accusative object, 'take ... as' conveys the intended sense
    without over-paraphrase.
- source_word: ἀδελφοί
  chosen: Brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Following the gender-accurate policy, the vocative masculine plural is
    rendered 'Brothers.' In James the address likely includes the whole believing
    community, but the source form is masculine; inclusivity is preserved in a footnote
    rather than neutralized in the main text.
- source_word: κακοπαθίας
  chosen: suffering
  alternatives:
  - hardship
  - affliction
  lexicon: BDAG
  rationale: κακοπαθία refers to enduring suffering or hardship. 'Suffering' is broad,
    natural English and pairs well with μακροθυμία in this context.
- source_word: μακροθυμίας
  chosen: patience
  alternatives:
  - steadfastness
  - longsuffering
  lexicon: BDAG
  rationale: μακροθυμία commonly denotes patience, especially patient endurance toward
    difficult circumstances or people. 'Patience' is accessible modern English; 'longsuffering'
    is more traditional but less natural.
- source_word: τοὺς προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Direct object identifying the exemplars James invokes; straightforwardly
    rendered 'the prophets.'
- source_word: ἐλάλησαν
  chosen: spoke
  alternatives:
  - spoke out
  - proclaimed
  lexicon: BDAG
  rationale: λαλέω is the ordinary verb 'to speak.' 'Spoke' preserves the simplicity
    of the Greek without importing a more formal nuance such as 'proclaimed.'
- source_word: ἐν τῷ ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - for the Lord
  - by the authority of the Lord
  lexicon: BDAG
  rationale: This prepositional phrase is a standard biblical expression indicating
    representation and authority. The idiom 'in the name of the Lord' should be preserved
    in the main text; explanatory alternatives are possible but less direct.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: 'Per doctrine, κύριος is rendered ''Lord.'' The English phrase naturally
    takes the article here: ''the Lord.'''
