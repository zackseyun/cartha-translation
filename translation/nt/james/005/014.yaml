id: JAS.5.14
reference: James 5:14
source:
  edition: SBLGNT
  text: ἀσθενεῖ τις ἐν ὑμῖν; προσκαλεσάσθω τοὺς πρεσβυτέρους τῆς ἐκκλησίας, καὶ προσευξάσθωσαν
    ἐπ’ αὐτὸν ἀλείψαντες ⸀αὐτὸν ἐλαίῳ ἐν τῷ ὀνόματι τοῦ κυρίου·
translation:
  text: Is anyone among you sick? Let him call for the elders of the church, and let
    them pray over him, anointing him with oil in the name of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Is anyone among you weak?' The Greek verb can denote weakness more broadly,
      but here likely refers to sickness in view of prayer, anointing with oil, and
      the healing context of the next verse.
    reason: lexical_alternative
  - marker: b
    text: The anointing with oil may be understood as medicinal, symbolic, or both;
      the text itself does not specify the mechanism.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσθενεῖ
  chosen: is sick
  alternatives:
  - is weak
  - is ill
  lexicon: BDAG
  rationale: In this context of calling elders, prayer, anointing with oil, and the
    following verse's reference to healing/raising up, the verb most naturally refers
    to physical illness rather than generalized weakness. 'Is sick' is idiomatic modern
    English and fits the immediate context.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any man
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' is natural English and
    preserves the open, indefinite sense without over-specifying gender in the predicate;
    the following imperative is rendered with 'him' to reflect the masculine singular
    discourse pattern.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - among yourselves
  - in your midst
  lexicon: BDAG
  rationale: Standard idiomatic rendering for membership within the community addressed.
- source_word: προσκαλεσάσθω
  chosen: let him call for
  alternatives:
  - let him summon
  - he should call
  lexicon: BDAG
  rationale: Aorist middle imperative, third singular. 'Let him call for' preserves
    the imperative force in clear English and fits the sense of requesting the presence
    of the elders.
- source_word: τοὺς πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the older men
  - the presbyters
  lexicon: BDAG
  rationale: In conjunction with 'of the church,' the term clearly denotes recognized
    church leaders rather than merely older males. 'Elders' is the standard and most
    transparent rendering.
- source_word: τῆς ἐκκλησίας
  chosen: of the church
  alternatives:
  - of the assembly
  - of the congregation
  lexicon: BDAG
  rationale: ἐκκλησία in James refers to the Christian gathered community. 'Church'
    is the clearest contemporary rendering, while 'assembly' is possible but less
    natural here.
- source_word: προσευξάσθωσαν
  chosen: let them pray
  alternatives:
  - let them offer prayer
  - they should pray
  lexicon: BDAG
  rationale: Aorist middle imperative, third plural. 'Let them pray' preserves the
    hortatory-imperative force and remains readable.
- source_word: ἐπ’ αὐτόν
  chosen: over him
  alternatives:
  - for him
  - over him while standing by
  lexicon: BDAG
  rationale: With prayer in healing contexts, ἐπί with accusative can naturally be
    rendered 'over,' suggesting prayer directed over the sick person. This is the
    conventional and contextually fitting sense.
- source_word: ἀλείψαντες
  chosen: anointing
  alternatives:
  - rubbing
  - applying oil to
  lexicon: BDAG
  rationale: The participle denotes applying oil. 'Anointing' is the most concise
    and natural rendering in this religious-healing context, while not by itself deciding
    whether the act is medicinal, symbolic, or both.
- source_word: ἐλαίῳ
  chosen: with oil
  alternatives:
  - with olive oil
  lexicon: BDAG
  rationale: The noun denotes oil, ordinarily olive oil in the ancient Mediterranean
    context. 'With oil' is sufficient in English; specifying 'olive' would add detail
    not explicit in the text.
- source_word: ἐν τῷ ὀνόματι τοῦ κυρίου
  chosen: in the name of the Lord
  alternatives:
  - by the authority of the Lord
  - in the Lord's name
  lexicon: BDAG
  rationale: This phrase commonly denotes action undertaken in relation to the Lord's
    authority and person. 'In the name of the Lord' preserves the biblical idiom and
    theological resonance. 'Lord' follows the project's default rendering for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' In James this most naturally
    refers to the Lord Jesus in the Christian community context, though the translation
    leaves the title itself as in the Greek.
