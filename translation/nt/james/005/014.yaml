theological_decisions:
- issue: Nature of ἀσθενεῖ in context
  chosen_reading: physical sickness/illness is primary
  alternative_readings:
  - spiritual weakness
  - general weakness including non-physical frailty
  rationale: The immediate context includes elders, prayer over the person, anointing
    with oil, and the next verse's language of saving the sick person and the Lord
    raising him up. These contextual markers favor bodily illness as the primary sense,
    though the broader semantic range of ἀσθενέω is acknowledged.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine; here the context sufficiently favors illness in the main text.
- issue: Function of anointing with oil
  chosen_reading: render neutrally as 'anointing him with oil' without specifying
    sacramental, symbolic, or medicinal function
  alternative_readings:
  - a medicinal application
  - a symbolic act accompanying prayer
  - a sacramental rite
  rationale: The Greek states the action but does not explicitly define its theological
    mechanism. A neutral rendering preserves the text's wording without importing
    denominational conclusions.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Greek unambiguously supports one reading over another.
- issue: Gender rendering of singular masculine forms
  chosen_reading: use 'anyone' with subsequent 'him'
  alternative_readings:
  - 'use fully gender-neutral singular throughout: ''they/them'''
  - use 'any man'
  rationale: 'This follows the project''s gender-accurate principle: the indefinite
    opening is naturally inclusive in English, while the masculine singular pronominal
    flow in Greek is still reflected in ''him.'''
  doctrine_reference: Gender-accurate over gender-neutral.
