id: JAS.5.2
reference: James 5:2
source:
  edition: SBLGNT
  text: ὁ πλοῦτος ὑμῶν σέσηπεν, καὶ τὰ ἱμάτια ὑμῶν σητόβρωτα γέγονεν,
translation:
  text: Your wealth has rotted, and your clothes have become moth-eaten.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  lexicon: BDAG
  rationale: '"Wealth" is natural modern English for accumulated material possessions
    and fits James''s denunciation of the rich. "Riches" is possible but sounds more
    traditional and slightly less idiomatic here.'
- source_word: σέσηπεν
  chosen: has rotted
  alternatives:
  - has decayed
  - is rotten
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from decay. "Has rotted"
    preserves both the vivid physical imagery and the completed-result force better
    than the stative "is rotten."
- source_word: ἱμάτια
  chosen: clothes
  alternatives:
  - garments
  - robes
  lexicon: BDAG
  rationale: Refers broadly to articles of clothing. "Clothes" is clear, contemporary,
    and sufficiently broad; "garments" is more formal but less natural in modern English.
- source_word: σητόβρωτα
  chosen: moth-eaten
  alternatives:
  - eaten by moths
  - moth-consumed
  lexicon: BDAG
  rationale: A compound adjective meaning consumed by moths. "Moth-eaten" is the standard
    concise English equivalent and preserves the concrete image.
- source_word: γέγονεν
  chosen: have become
  alternatives:
  - are
  - have turned into
  lexicon: BDAG
  rationale: 'The perfect of γίνομαι marks a resulting state: the clothes have come
    to be moth-eaten. "Have become" reflects that development more precisely than
    a simple "are."'
