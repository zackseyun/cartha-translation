theological_decisions:
- issue: Gendered singular imperatives in generic exhortation
  chosen_reading: Retain singular exhortation with 'let him'
  alternative_readings:
  - Let them pray
  - let that person pray
  rationale: The Greek uses τις with third-person singular imperatives, a grammatically
    masculine generic construction. Per the translation philosophy's gender-accurate
    principle, the English keeps the singular representative form rather than flattening
    it into a plural. The generic force is preserved by 'anyone.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of ψαλλέτω
  chosen_reading: sing praise
  alternative_readings:
  - sing psalms
  - make melody
  rationale: The term can historically carry the sense of singing psalms or making
    music, but in this exhortational context the broader devotional sense is most
    likely and most accessible. This avoids importing a narrower liturgical prescription
    not explicit in the text while preserving the act of God-directed praise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
