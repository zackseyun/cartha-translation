id: JAS.5.13
reference: James 5:13
source:
  edition: SBLGNT
  text: Κακοπαθεῖ τις ἐν ὑμῖν; προσευχέσθω· εὐθυμεῖ τις; ψαλλέτω.
translation:
  text: Is anyone among you suffering? Let him pray. Is anyone cheerful? Let him sing
    praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "let him sing psalms"; the Greek verb can refer specifically to singing
      psalms or, more broadly, to singing praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κακοπαθεῖ
  chosen: is suffering
  alternatives:
  - is in trouble
  - is afflicted
  - is enduring hardship
  lexicon: BDAG
  rationale: The verb κακοπαθέω denotes experiencing hardship or suffering. 'Is suffering'
    is natural modern English and broad enough to include adversity without narrowing
    it to persecution or illness alone.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any man
  lexicon: BDAG
  rationale: The indefinite pronoun is singular and generic. 'Anyone' conveys the
    representative force in idiomatic English without implying restriction to males,
    while still matching the generic sense of the Greek.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - among yourselves
  - in your midst
  lexicon: BDAG
  rationale: This phrase locates the hypothetical person within the community addressed.
    'Among you' is the most direct and natural rendering.
- source_word: προσευχέσθω
  chosen: let him pray
  alternatives:
  - he should pray
  - let that person pray
  lexicon: BDAG
  rationale: The present middle imperative gives an exhortation directed to the individual
    in that condition. 'Let him pray' preserves the imperative force and the singular,
    matching the Greek's representative masculine form.
- source_word: εὐθυμεῖ
  chosen: is cheerful
  alternatives:
  - is encouraged
  - is in good spirits
  - is glad
  lexicon: BDAG
  rationale: The verb εὐθυμέω refers to being in good heart or good spirits. 'Is cheerful'
    is concise and fits the contrast with suffering in the verse.
- source_word: ψαλλέτω
  chosen: let him sing praise
  alternatives:
  - let him sing psalms
  - he should sing
  - let him make melody
  lexicon: BDAG
  rationale: ψάλλω in this context refers to vocal praise to God. 'Sing praise' communicates
    the devotional sense clearly in modern English without overcommitting to the narrower
    idea of canonical psalms, though that nuance remains possible.
