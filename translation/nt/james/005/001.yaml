theological_decisions:
- issue: Tone and referent of the address to the rich
  chosen_reading: A prophetic denunciation of wealthy people facing impending misery/judgment,
    without specifying whether they are believers or unbelievers beyond what the verse
    itself states.
  alternative_readings:
  - An address specifically to oppressive unbelieving landowners
  - A warning to wealthy members within the Christian community
  rationale: The verse itself directly addresses 'the rich' and announces coming miseries,
    but does not explicitly identify their covenant status in this line alone. The
    translation therefore preserves the broad address and judgment tone without importing
    a narrower doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
