id: JAS.5.1
reference: James 5:1
source:
  edition: SBLGNT
  text: Ἄγε νῦν οἱ πλούσιοι, κλαύσατε ὀλολύζοντες ἐπὶ ταῖς ταλαιπωρίαις ὑμῶν ταῖς
    ἐπερχομέναις.
translation:
  text: Come now, you rich, weep, wailing over your miseries that are coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'howling.' The Greek participle conveys loud, public lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'calamities' or 'distresses' for 'miseries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγε νῦν
  chosen: Come now
  alternatives:
  - Now then
  - Listen now
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing a sharp summons or denunciation.
    'Come now' preserves the force of direct address without sounding archaic.
- source_word: οἱ πλούσιοι
  chosen: you rich
  alternatives:
  - you rich people
  - the rich
  lexicon: BDAG
  rationale: The nominative with direct address functions vocatively. 'You rich' keeps
    the abrupt prophetic address and avoids adding 'people' unless needed for English
    clarity.
- source_word: κλαύσατε
  chosen: weep
  alternatives:
  - cry
  - lament
  lexicon: BDAG
  rationale: Aorist imperative calling for overt mourning. 'Weep' is the standard
    and suitably weighty English equivalent.
- source_word: ὀλολύζοντες
  chosen: wailing
  alternatives:
  - howling
  - crying aloud
  lexicon: BDAG
  rationale: Present participle intensifying the command with the sense of loud lament.
    'Wailing' is natural modern English and preserves the mournful force. 'Howling'
    is possible and traditional, but can sound animalistic in contemporary English.
- source_word: ἐπὶ
  chosen: over
  alternatives:
  - because of
  - for
  lexicon: BDAG
  rationale: With the dative here it marks the basis or occasion of lament. 'Over'
    is idiomatic in English for mourning in view of coming calamities.
- source_word: ταλαιπωρίαις
  chosen: miseries
  alternatives:
  - distresses
  - hardships
  - calamities
  lexicon: BDAG
  rationale: The noun denotes severe troubles or wretched conditions. 'Miseries' fits
    the denunciatory tone and traditional usage, while remaining understandable.
- source_word: ταῖς ἐπερχομέναις
  chosen: that are coming
  alternatives:
  - that are about to come
  - coming upon you
  lexicon: BDAG
  rationale: Present middle participle modifying 'miseries,' indicating impending
    arrival. 'That are coming' preserves the aspect of approaching judgment without
    overstating imminence beyond the Greek.
