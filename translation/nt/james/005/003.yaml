theological_decisions:
- issue: Relation of ὡς πῦρ within the sentence
  chosen_reading: 'Attached to the preceding clause: the corrosion will eat their
    flesh ''like fire.'''
  alternative_readings:
  - 'Attached to the following clause: ''You have stored up treasure as fire in the
    last days.'''
  rationale: The immediate syntax and sense favor linking ὡς πῦρ with φάγεται, yielding
    a coherent image of destructive judgment. The alternative is possible and has
    translation history, but is less natural in English and syntactically more difficult.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where genuine.
