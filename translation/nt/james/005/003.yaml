id: JAS.5.3
reference: James 5:3
source:
  edition: SBLGNT
  text: ὁ χρυσὸς ὑμῶν καὶ ὁ ἄργυρος κατίωται, καὶ ὁ ἰὸς αὐτῶν εἰς μαρτύριον ὑμῖν ἔσται
    καὶ φάγεται τὰς σάρκας ὑμῶν· ὡς πῦρ ἐθησαυρίσατε ἐν ἐσχάταις ἡμέραις.
translation:
  text: Your gold and silver have rusted, and their corrosion will be evidence against
    you and will eat your flesh like fire. You have stored up treasure in the last
    days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their rust will be a witness against you.' The Greek can be rendered
      more literally with 'rust' and 'witness,' though 'corrosion' and 'evidence'
      better fit the metal imagery and modern English.
    reason: lexical_alternative
  - marker: b
    text: Or, 'You have stored up treasure like fire in the last days.' Some take
      'like fire' with the final clause rather than with 'will eat your flesh.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατίωται
  chosen: have rusted
  alternatives:
  - have corroded
  - are rusted
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior action.
    Although gold and silver do not literally rust in normal usage, the verb denotes
    corrosion/tarnishing more broadly; 'have rusted' is idiomatic English and preserves
    James's prophetic imagery of decayed wealth.
- source_word: ἰὸς
  chosen: corrosion
  alternatives:
  - rust
  - poison
  - verdigris
  lexicon: BDAG
  rationale: In this context, with metals, the sense is the corrosive product/effect
    on metal rather than 'poison.' 'Corrosion' avoids the scientific awkwardness of
    'rust' for gold and silver while matching the broader semantic range.
- source_word: εἰς μαρτύριον ὑμῖν
  chosen: will be evidence against you
  alternatives:
  - will be a witness against you
  - will testify against you
  lexicon: BDAG
  rationale: The phrase is forensic. 'Evidence against you' communicates the legal
    sense naturally in modern English, while preserving the adversative force of ὑμῖν
    in context.
- source_word: φάγεται τὰς σάρκας ὑμῶν
  chosen: will eat your flesh
  alternatives:
  - will consume your flesh
  lexicon: BDAG
  rationale: The future middle is vivid and metaphorical. 'Eat your flesh' preserves
    the shocking imagery and keeps close to the Greek; 'consume' is possible but less
    concrete.
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - bodies
  lexicon: BDAG
  rationale: Per translation policy, σάρξ is rendered 'flesh' in literal contexts.
    Here the image is bodily destruction/judgment, not the Pauline metaphor of sinful
    nature.
- source_word: ὡς πῦρ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: BDAG
  rationale: This most naturally modifies the preceding clause ('will eat your flesh
    like fire'), preserving the simile and the verse's judgment imagery in clear English.
- source_word: ἐθησαυρίσατε
  chosen: have stored up treasure
  alternatives:
  - have hoarded
  - stored up
  lexicon: BDAG
  rationale: The verb means to store up treasure. Including 'treasure' reflects the
    lexical content of the verb in English; 'hoarded' captures the negative sense
    but adds interpretive coloring beyond the verb itself.
- source_word: ἐν ἐσχάταις ἡμέραις
  chosen: in the last days
  alternatives:
  - in these last days
  - in the final days
  lexicon: BDAG
  rationale: This is a standard eschatological phrase. 'In the last days' is the most
    direct and recognizable rendering without adding 'these,' which is not explicit
    in the Greek.
