theological_decisions:
- issue: Rendering of the divine title Κυρίου Σαβαὼθ
  chosen_reading: the Lord of Hosts
  alternative_readings:
  - the Lord Sabaoth
  rationale: The phrase is a title for God drawn from the OT/LXX background. Following
    the translation philosophy to translate titles and transliterate names, 'Lord
    of Hosts' preserves the meaning of the title in accessible English, while the
    traditional transliteration 'Sabaoth' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms: κύριος → Lord.'
