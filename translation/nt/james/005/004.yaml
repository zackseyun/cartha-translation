id: JAS.5.4
reference: James 5:4
source:
  edition: SBLGNT
  text: ἰδοὺ ὁ μισθὸς τῶν ἐργατῶν τῶν ἀμησάντων τὰς χώρας ὑμῶν ὁ ⸀ἀφυστερημένος ἀφ’
    ὑμῶν κράζει, καὶ αἱ βοαὶ τῶν θερισάντων εἰς τὰ ὦτα Κυρίου Σαβαὼθ ⸀εἰσεληλύθασιν·
translation:
  text: Look, the wages of the workers who harvested your fields, which have been
    withheld by you, are crying out, and the cries of those who did the harvesting
    have entered into the ears of the Lord of Hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord Sabaoth.' The Greek preserves the Hebrew title Σαβαώθ, traditionally
      left transliterated in some English versions.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Introduces an emphatic attention-getting statement. 'Look' is natural
    modern English while preserving the force better than the more archaic 'Behold.'
- source_word: μισθὸς
  chosen: wages
  alternatives:
  - pay
  - wage
  lexicon: BDAG
  rationale: Refers to compensation owed to laborers. 'Wages' fits the plural sense
    idiomatic in English even though the Greek noun is singular collective.
- source_word: ἐργατῶν
  chosen: workers
  alternatives:
  - laborers
  - workmen
  lexicon: BDAG
  rationale: A general term for laborers. 'Workers' is clear modern English and fits
    the agricultural context.
- source_word: ἀμησάντων
  chosen: harvested
  alternatives:
  - reaped
  - mowed
  lexicon: BDAG
  rationale: The verb can refer to reaping/harvesting. 'Harvested' is more broadly
    understandable than 'reaped' and suits the field context.
- source_word: χώρας
  chosen: fields
  alternatives:
  - lands
  - farms
  lexicon: BDAG
  rationale: In this context it refers to cultivated land belonging to the rich landowners.
    'Fields' is the most natural contextual rendering.
- source_word: ἀφυστερημένος ἀφ’ ὑμῶν
  chosen: which have been withheld by you
  alternatives:
  - which you have kept back
  - defrauded by you
  lexicon: BDAG
  rationale: The participle denotes being withheld or kept back unjustly. 'Withheld
    by you' preserves the passive form and the direct accusation without overtranslating
    to the more interpretive 'defrauded.'
- source_word: κράζει
  chosen: are crying out
  alternatives:
  - cries out
  - is crying out
  lexicon: BDAG
  rationale: Although the Greek subject is singular ('wages'), English commonly treats
    'wages' as plural. The progressive form conveys the vivid personification of the
    unpaid wages calling for justice.
- source_word: βοαὶ
  chosen: cries
  alternatives:
  - outcries
  - shouts
  lexicon: BDAG
  rationale: Conveys urgent cries for help or justice. 'Cries' is direct and natural.
- source_word: θερισάντων
  chosen: those who did the harvesting
  alternatives:
  - reapers
  - harvesters
  lexicon: BDAG
  rationale: The participle refers to the laborers engaged in harvesting. This rendering
    is explicit and readable; 'reapers' is possible but less common in contemporary
    English.
- source_word: εἰς τὰ ὦτα
  chosen: into the ears
  alternatives:
  - to the ears
  lexicon: BDAG
  rationale: A semitic idiom preserved in Greek. 'Into the ears' keeps the vivid biblical
    imagery rather than flattening it.
- source_word: Κυρίου Σαβαὼθ
  chosen: the Lord of Hosts
  alternatives:
  - the Lord Sabaoth
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults, and Σαβαώθ here reflects
    the traditional title meaning 'Hosts/armies.' Translating the title preserves
    meaning better than leaving 'Sabaoth' untranslated in the main text.
- source_word: εἰσεληλύθασιν
  chosen: have entered
  alternatives:
  - have reached
  - have come
  lexicon: BDAG
  rationale: Perfect tense indicates completed entry with present effect. 'Have entered'
    preserves the metaphor and verbal aspect more closely than the idiomatic 'have
    reached.'
