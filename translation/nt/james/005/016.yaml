theological_decisions:
- issue: Whether the verse mandates sacramental confession to clergy or mutual confession
    among believers
  chosen_reading: mutual confession to one another
  alternative_readings:
  - confession mediated through ordained clergy
  rationale: The reciprocal pronoun ἀλλήλοις explicitly indicates mutuality among
    the addressed community. The translation therefore reflects interpersonal confession
    within the body, without denying that traditions may apply the verse in broader
    ecclesial practice.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Scope of healing in ἰαθῆτε
  chosen_reading: healed, preserving broad sense
  alternative_readings:
  - physically healed only
  - spiritually healed only
  rationale: In the immediate context of James 5, physical sickness is prominent,
    yet the mention of sins broadens the frame. The translation keeps 'healed' rather
    than narrowing to either bodily or spiritual healing alone, preserving the text's
    theological tension.
  doctrine_reference: Translation philosophy §3
- issue: Gender rendering of δικαίου
  chosen_reading: righteous person
  alternative_readings:
  - righteous man
  rationale: Although the Greek form is masculine singular, it functions generically
    in proverbial style. Rendering it as 'person' best matches the source intent in
    English while honoring the project's gender-accurate principle.
  doctrine_reference: Translation philosophy §4
