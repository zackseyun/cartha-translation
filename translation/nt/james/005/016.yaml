id: JAS.5.16
reference: James 5:16
source:
  edition: SBLGNT
  text: ἐξομολογεῖσθε ⸀οὖν ἀλλήλοις ⸂τὰς ἁμαρτίας⸃ καὶ ⸀εὔχεσθε ὑπὲρ ἀλλήλων, ὅπως
    ἰαθῆτε. πολὺ ἰσχύει δέησις δικαίου ἐνεργουμένη.
translation:
  text: Therefore, confess your sins to one another and pray for one another, so that
    you may be healed. The prayer of a righteous person is very powerful as it is
    at work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The supplication of a righteous person has great force when it is at
      work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  chosen: confess
  alternatives:
  - acknowledge openly
  - admit
  lexicon: BDAG
  rationale: The middle imperative calls for open acknowledgment, and in context with
    'sins' the idiomatic English equivalent is 'confess.' This preserves the interpersonal
    and moral force without importing a formal sacramental setting.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding context about prayer, sin, and restoration.
    'Therefore' best preserves the logical connection in natural English.
- source_word: ἀλλήλοις
  chosen: to one another
  alternatives:
  - to each other
  lexicon: BDAG
  rationale: Reciprocal dative is best rendered with explicit mutuality. 'One another'
    is standard and clear.
- source_word: τὰς ἁμαρτίας
  chosen: your sins
  alternatives:
  - the sins
  - your trespasses
  lexicon: BDAG
  rationale: With the reciprocal command, English idiom naturally supplies 'your.'
    'Sins' is the direct and standard rendering of ἁμαρτίας; 'trespasses' is too interpretive
    here.
- source_word: εὔχεσθε
  chosen: pray
  alternatives:
  - offer prayers
  lexicon: BDAG
  rationale: Straightforward imperative. 'Pray' is concise and natural, matching the
    reciprocal exhortation.
- source_word: ὑπὲρ ἀλλήλων
  chosen: for one another
  alternatives:
  - on behalf of one another
  lexicon: BDAG
  rationale: ὑπέρ with genitive commonly means 'for/on behalf of.' 'For one another'
    is idiomatic and preserves intercessory sense.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose/result. 'So that' is natural modern English while preserving
    the clause's force.
- source_word: ἰαθῆτε
  chosen: you may be healed
  alternatives:
  - you may be cured
  - you may be restored to health
  lexicon: BDAG
  rationale: Passive subjunctive of ἰάομαι denotes healing. 'Healed' preserves the
    broad sense, which may include physical restoration in the immediate context and
    should not be narrowed unnecessarily.
- source_word: πολὺ ἰσχύει
  chosen: is very powerful
  alternatives:
  - has great strength
  - accomplishes much
  - is strong
  lexicon: BDAG
  rationale: The idiom conveys great efficacy or force. 'Is very powerful' fits contemporary
    English and pairs well with the following participle. 'Accomplishes much' is possible
    but more interpretive regarding outcome.
- source_word: δέησις
  chosen: prayer
  alternatives:
  - petition
  - supplication
  lexicon: BDAG
  rationale: δέησις can mean petition or supplication, but 'prayer' is the clearest
    broad rendering in English here. A footnote preserves the more specific nuance.
- source_word: δικαίου
  chosen: of a righteous person
  alternatives:
  - of a righteous man
  lexicon: BDAG
  rationale: The genitive singular adjective functions substantivally. 'Person' communicates
    the generic force accurately in English without implying maleness, consistent
    with source intent rather than grammatical gender alone.
- source_word: ἐνεργουμένη
  chosen: as it is at work
  alternatives:
  - when it is working
  - being effective
  - in its working
  lexicon: BDAG
  rationale: The present middle/passive participle modifies 'prayer' and is syntactically
    difficult. 'As it is at work' preserves the sense of operative effectiveness without
    overcommitting to either a purely middle ('working') or passive ('being energized')
    nuance.
