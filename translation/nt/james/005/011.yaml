id: JAS.5.11
reference: James 5:11
source:
  edition: SBLGNT
  text: ἰδοὺ μακαρίζομεν τοὺς ⸀ὑπομείναντας· τὴν ὑπομονὴν Ἰὼβ ἠκούσατε, καὶ τὸ τέλος
    κυρίου ⸀εἴδετε, ὅτι πολύσπλαγχνός ἐστιν ⸂ὁ κύριος⸃ καὶ οἰκτίρμων.
translation:
  text: Behold, we count those who have endured as blessed. You have heard of Job’s
    endurance, and you have seen the Lord’s outcome, that the Lord is very compassionate
    and merciful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Lord’s purpose” or “the end intended by the Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the discourse-marking force of the Greek interjection, signaling
    attention. Though 'Look' is more colloquial, 'Behold' better preserves the emphatic
    literary tone without becoming unintelligible.
- source_word: μακαρίζομεν
  chosen: we count ... as blessed
  alternatives:
  - we call ... blessed
  - we consider ... blessed
  lexicon: BDAG
  rationale: The verb means to regard or pronounce someone blessed/happy. 'Count ...
    as blessed' is natural English and preserves the evaluative sense better than
    a mere emotional gloss like 'happy.'
- source_word: ὑπομείναντας
  chosen: those who have endured
  alternatives:
  - those who have persevered
  - those who remained steadfast
  lexicon: BDAG
  rationale: Aorist participle of ὑπομένω denotes enduring under trial. 'Endured'
    is concise and matches the context of suffering in James 5. 'Persevered' is possible,
    but 'endured' better aligns with the verbal connection to Job's ὑπομονή.
- source_word: ὑπομονὴν
  chosen: endurance
  alternatives:
  - steadfastness
  - perseverance
  - patience
  lexicon: BDAG
  rationale: In James, ὑπομονή regularly carries the sense of steadfast endurance
    under trial. 'Endurance' is clearer in modern English than 'patience' and avoids
    reducing the term to passive waiting.
- source_word: Ἰὼβ
  chosen: Job’s
  rationale: Standard transliteration of the personal name, with the genitive rendered
    naturally in English as a possessive.
- source_word: ἠκούσατε
  chosen: you have heard of
  alternatives:
  - you heard of
  - you have heard
  lexicon: BDAG
  rationale: The aorist is rendered idiomatically in English as a present-perfect
    in this exhortational context, referring to shared knowledge already received.
    'Heard of' fits the object 'Job’s endurance' naturally.
- source_word: τέλος
  chosen: outcome
  alternatives:
  - end
  - purpose
  - goal
  lexicon: BDAG
  rationale: τέλος can mean end, outcome, goal, or result. Here, in connection with
    Job and the Lord's dealings, 'outcome' best captures the observable result of
    the Lord's purpose without over-interpreting teleology. It also avoids the ambiguity
    of 'the end of the Lord,' which could be misunderstood in English.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord' per doctrine guidelines.
    The genitive is rendered possessively for natural English. In context this most
    likely refers to the Lord's dealing/result in Job's case.
- source_word: εἴδετε
  chosen: you have seen
  alternatives:
  - you saw
  - you perceived
  lexicon: BDAG
  rationale: As with ἠκούσατε, the aorist is rendered idiomatically as present-perfect
    to express shared recognition. 'Seen' may include perceptive understanding, but
    the concrete English verb preserves the Greek wording.
- source_word: πολύσπλαγχνός
  chosen: very compassionate
  alternatives:
  - full of compassion
  - tenderly compassionate
  lexicon: BDAG
  rationale: This rare adjective intensifies compassion. 'Very compassionate' is readable
    modern English and preserves the intensifying force of πολύ-. 'Full of compassion'
    is also possible but slightly more paraphrastic.
- source_word: οἰκτίρμων
  chosen: merciful
  alternatives:
  - compassionate
  - full of mercy
  lexicon: BDAG
  rationale: Distinct from πολύσπλαγχνός, this term emphasizes mercy/pity. 'Merciful'
    preserves the semantic distinction so the paired adjectives are not collapsed
    into a single idea.
- source_word: ὁ κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: 'Uses the doctrinally specified default rendering for κύριος. The repeated
    explicit subject in Greek is retained for emphasis: the Lord is the one characterized
    as compassionate and merciful.'
