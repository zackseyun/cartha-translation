theological_decisions:
- issue: Meaning of τὸ τέλος κυρίου
  chosen_reading: the Lord’s outcome
  alternative_readings:
  - the Lord’s purpose
  - the end intended by the Lord
  rationale: The phrase is interpretively difficult. Rendering it as 'the Lord’s outcome'
    preserves the lexical breadth of τέλος and the connection to what happened in
    Job's story, while avoiding a stronger theological narrowing to 'purpose' alone.
    Because 'purpose' is a viable interpretive alternative with theological significance,
    it is preserved in a footnote rather than resolved absolutely in the main text.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms: κύριος → Lord'
