id: JAS.5.7
reference: James 5:7
source:
  edition: SBLGNT
  text: Μακροθυμήσατε οὖν, ἀδελφοί, ἕως τῆς παρουσίας τοῦ κυρίου. ἰδοὺ ὁ γεωργὸς ἐκδέχεται
    τὸν τίμιον καρπὸν τῆς γῆς, μακροθυμῶν ἐπ’ ⸀αὐτῷ ἕως ⸀λάβῃ πρόϊμον καὶ ὄψιμον.
translation:
  text: Be patient, therefore, brothers, until the coming of the Lord. Look, the farmer
    waits for the precious fruit of the earth, being patient about it until it receives
    the early and late rains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often addresses
      the whole believing community this way.
    reason: alternative_reading
  - marker: b
    text: Or 'presence' for 'coming' (παρουσία), though here it likely refers to the
      Lord's future arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακροθυμήσατε
  chosen: Be patient
  alternatives:
  - Be long-suffering
  - Be patient in suffering
  lexicon: BDAG
  rationale: Aorist imperative calling for enduring patience. 'Be patient' is natural
    modern English and fits the repeated μακροθυμ- wordplay in the verse without becoming
    archaic.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding context; 'therefore' preserves
    the logical connection more clearly than a looser 'then'.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per gender-accurate policy, the grammatically masculine vocative is rendered
    'brothers.' The mixed-gender application can be noted in a footnote rather than
    neutralized in the main text.
- source_word: παρουσίας
  chosen: coming
  alternatives:
  - arrival
  - presence
  lexicon: BDAG
  rationale: In this eschatological context παρουσία commonly denotes the Lord's coming.
    'Presence' is lexically possible but less idiomatic here in English.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces an illustrative example. 'Look' is readable modern English
    and preserves the attention-getting force without archaic tone.
- source_word: γεωργὸς
  chosen: farmer
  alternatives:
  - cultivator
  - vinedresser
  lexicon: BDAG
  rationale: General agricultural worker; 'farmer' is the most natural equivalent
    in context.
- source_word: ἐκδέχεται
  chosen: waits for
  alternatives:
  - expects
  - awaits
  lexicon: BDAG
  rationale: Expresses sustained expectation. 'Waits for' is idiomatic and matches
    the patience theme.
- source_word: τίμιον
  chosen: precious
  alternatives:
  - valuable
  - costly
  lexicon: BDAG
  rationale: Conveys worth and desirability of the crop; 'precious' is the standard
    idiomatic choice here.
- source_word: καρπὸν τῆς γῆς
  chosen: fruit of the earth
  alternatives:
  - produce of the land
  - crop of the land
  lexicon: BDAG
  rationale: A fairly literal rendering that remains understandable. It preserves
    the imagery broadly rather than narrowing immediately to a specific crop term.
- source_word: μακροθυμῶν
  chosen: being patient
  alternatives:
  - waiting patiently
  - showing patience
  lexicon: BDAG
  rationale: Participial form echoes the opening imperative. 'Being patient' preserves
    the lexical repetition and the ongoing manner of the farmer's waiting.
- source_word: ἐπ’ αὐτῷ
  chosen: about it
  alternatives:
  - for it
  - over it
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the fruit/crop, and 'about it' gives
    acceptable English with the sense of patient concern regarding the crop's development.
- source_word: ἕως λάβῃ
  chosen: until it receives
  alternatives:
  - until he receives
  - until it gets
  lexicon: BDAG
  rationale: The subject of λάβῃ is syntactically ambiguous in isolation, but the
    nearest sensible referent in context is the crop/earth receiving rain. This yields
    the most coherent agricultural image in English.
- source_word: πρόϊμον καὶ ὄψιμον
  chosen: the early and late rains
  alternatives:
  - the early and late rain
  lexicon: BDAG
  rationale: These adjectives are conventionally understood substantivally for seasonal
    rains in an agricultural setting. Supplying 'rains' makes the sense explicit in
    English.
