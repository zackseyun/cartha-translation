theological_decisions:
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The vocative masculine plural is retained in the main text under the
    project's gender-accurate policy, while acknowledging that James addresses the
    whole believing community.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: παρουσία τοῦ κυρίου
  chosen_reading: the coming of the Lord
  alternative_readings:
  - the presence of the Lord
  - the arrival of the Lord
  rationale: In James's eschatological exhortation, 'coming' best captures the expected
    future advent without importing a narrower doctrinal scheme beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
