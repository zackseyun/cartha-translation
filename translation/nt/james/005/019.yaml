id: JAS.5.19
reference: James 5:19
source:
  edition: SBLGNT
  text: Ἀδελφοί ⸀μου, ἐάν τις ἐν ὑμῖν πλανηθῇ ἀπὸ τῆς ἀληθείας καὶ ἐπιστρέψῃ τις αὐτόν,
translation:
  text: My brothers, if anyone among you is led astray from the truth and someone
    turns him back,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek has 'brothers' as a masculine plural
      form of address that can include the whole community.
    reason: lexical_alternative
  - marker: b
    text: Or 'wanders away from the truth' or 'is deceived from the truth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'someone brings him back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί μου
  chosen: My brothers
  alternatives:
  - My brothers and sisters
  - My brethren
  lexicon: BDAG
  rationale: Grammatically masculine plural with direct-address force. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral; in James this address
    likely includes the whole believing community, but the main text preserves the
    masculine form. Inclusive sense can be noted in a footnote.
- source_word: ἐάν τις ἐν ὑμῖν
  chosen: if anyone among you
  alternatives:
  - if someone among you
  lexicon: BDAG
  rationale: τις is indefinite and singular; 'anyone' is natural modern English and
    preserves the conditional, indefinite sense.
- source_word: πλανηθῇ
  chosen: is led astray
  alternatives:
  - wanders away
  - goes astray
  - is deceived
  lexicon: BDAG
  rationale: Aorist passive subjunctive of πλανάω can mean either being led astray/deceived
    or going astray. 'Is led astray' preserves the passive form more clearly than
    'wanders away,' while still fitting the moral/spiritual context.
- source_word: ἀπὸ τῆς ἀληθείας
  chosen: from the truth
  alternatives:
  - away from the truth
  lexicon: BDAG
  rationale: Straightforward prepositional phrase. 'The truth' likely refers to the
    truth of the gospel/Christian way, but the translation should not over-specify
    beyond the Greek.
- source_word: καὶ ἐπιστρέψῃ τις αὐτόν
  chosen: and someone turns him back
  alternatives:
  - and someone brings him back
  - and someone turns him around
  lexicon: BDAG
  rationale: ἐπιστρέφω in this context means to turn/bring back from error. 'Turns
    him back' preserves the verbal imagery and prepares for the continuation in v.20.
    'Someone' reflects the indefinite τις. 'Him' matches the singular masculine object
    in Greek.
