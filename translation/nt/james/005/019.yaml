theological_decisions:
- issue: Gendered language in direct address and pronouns
  chosen_reading: 'Retain masculine forms in the main text: ''brothers'' and ''him'''
  alternative_readings:
  - brothers and sisters
  - them
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    translation. The Greek uses masculine forms that likely have representative force,
    but the translation should preserve the source form in the main text while allowing
    inclusive sense to be noted.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nuance of πλανηθῇ
  chosen_reading: 'Render with passive nuance: ''is led astray'''
  alternative_readings:
  - wanders away
  - goes astray
  - is deceived
  rationale: The passive morphology is significant and should not be flattened without
    reason. At the same time, the context concerns departure from truth, so 'is led
    astray' captures both deception and deviation without importing a stronger doctrinal
    claim about agency.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
