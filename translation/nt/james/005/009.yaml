id: JAS.5.9
reference: James 5:9
source:
  edition: SBLGNT
  text: μὴ στενάζετε, ⸂ἀδελφοί, κατ’ ἀλλήλων⸃, ἵνα μὴ κριθῆτε· ἰδοὺ ὁ κριτὴς πρὸ τῶν
    θυρῶν ἕστηκεν.
translation:
  text: Do not grumble against one another, brothers, so that you may not be judged.
    Look, the Judge is standing at the doors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Brothers" renders Greek adelphoi, which can address fellow believers collectively,
      including women depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στενάζετε
  chosen: grumble
  alternatives:
  - groan
  - complain
  lexicon: BDAG
  rationale: In this context, with κατ’ ἀλλήλων ('against one another'), the verb
    refers not merely to inward groaning but to resentful complaint directed at fellow
    believers. 'Grumble' captures the interpersonal and ethical force better than
    the more literal but potentially ambiguous 'groan.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural is grammatically masculine but commonly addresses
    the mixed Christian community. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language. 'Brothers' preserves the source form,
    while inclusivity can be noted in a footnote.
- source_word: κατ’ ἀλλήλων
  chosen: against one another
  alternatives:
  - against each other
  - about one another
  lexicon: BDAG
  rationale: κατά with the genitive here conveys opposition or hostility directed
    toward others. 'Against one another' best reflects the relational tension implied
    by the warning.
- source_word: κριθῆτε
  chosen: you may not be judged
  alternatives:
  - you may not come under judgment
  - you may not be condemned
  lexicon: BDAG
  rationale: The passive aorist subjunctive from κρίνω is naturally rendered 'be judged.'
    'Condemned' is too strong, since the verb can denote judgment without specifying
    the outcome. The clause expresses purpose/result after ἵνα μή.
- source_word: κριτὴς
  chosen: the Judge
  alternatives:
  - the judge
  lexicon: BDAG
  rationale: The noun refers to the eschatological divine judge, and capitalization
    in English helps signal titular force without adding content. In James's context
    this most naturally points to the Lord's imminent judicial presence.
- source_word: πρὸ τῶν θυρῶν
  chosen: at the doors
  alternatives:
  - before the doors
  - at the door
  lexicon: BDAG
  rationale: The plural θυρῶν is retained as 'doors.' The idiom conveys nearness and
    imminence rather than precise spatial description. 'At the doors' is idiomatic
    English and preserves the plural better than the traditional singular 'at the
    door.'
- source_word: ἕστηκεν
  chosen: is standing
  alternatives:
  - stands
  - has taken his stand
  lexicon: BDAG
  rationale: The perfect form of ἵστημι conveys a present state resulting from a completed
    action. 'Is standing' communicates the current, vivid posture of readiness in
    natural English.
