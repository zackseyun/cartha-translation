theological_decisions:
- issue: Referent of 'the Judge'
  chosen_reading: An eschatological divine judge, most naturally the Lord/Christ in
    context
  alternative_readings:
  - God generically as judge
  rationale: James uses imminent-judgment language consistent with early Christian
    expectation of the Lord's coming. The translation leaves the referent as 'the
    Judge' rather than specifying beyond the Greek, preserving the theological force
    without over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
