id: JAS.5.15
reference: James 5:15
source:
  edition: SBLGNT
  text: καὶ ἡ εὐχὴ τῆς πίστεως σώσει τὸν κάμνοντα, καὶ ἐγερεῖ αὐτὸν ὁ κύριος· κἂν
    ἁμαρτίας ᾖ πεποιηκώς, ἀφεθήσεται αὐτῷ.
translation:
  text: And the prayer of faith will save the one who is sick, and the Lord will raise
    him up. And if he has committed sins, he will be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will heal' or 'will make well'; Greek 'will save.'
    reason: lexical_alternative
  - marker: b
    text: '''Prayer of faith'' could also be understood as prayer marked by trust
      or, less likely here, faithfulness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'even if he has committed sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχὴ
  chosen: prayer
  alternatives:
  - vow
  - petition
  lexicon: BDAG
  rationale: In this context of elders praying over the sick (v. 14), εὐχή refers
    to prayer rather than a vow. 'Prayer' is the natural contextual sense in modern
    English.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the genitive is rendered
    'of faith.' Here it most naturally denotes prayer characterized by faith/trust
    in God. 'Faithfulness' is possible in principle but less likely in this healing
    context, so it is preserved as an alternative rather than adopted in the main
    text.
- source_word: σώσει
  chosen: will save
  alternatives:
  - will heal
  - will make well
  lexicon: BDAG
  rationale: σῴζω commonly means 'save,' but in contexts of sickness it can also denote
    healing or restoration. 'Will save' preserves the Greek term and the theological
    breadth of possible physical and spiritual rescue, while the surrounding context
    makes clear that bodily recovery is in view as well.
- source_word: τὸν κάμνοντα
  chosen: the one who is sick
  alternatives:
  - the weary one
  - the one who is weak
  - the one who is exhausted
  lexicon: BDAG
  rationale: κάμνω can mean to be weary or sick. In the immediate context of illness,
    anointing, and raising up, 'the one who is sick' best captures the intended sense
    in idiomatic English.
- source_word: ἐγερεῖ
  chosen: will raise up
  alternatives:
  - will restore
  - will awaken
  lexicon: BDAG
  rationale: ἐγείρω literally means 'raise up.' In this context it likely refers to
    restoration from a sickbed, but 'raise up' preserves the verbal imagery and leaves
    open the fuller resonance of divine restoration.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project default, κύριος is rendered 'Lord.' This matches standard
    NT usage and preserves the theological force of divine agency.
- source_word: κἂν ἁμαρτίας ᾖ πεποιηκώς
  chosen: if he has committed sins
  alternatives:
  - even if he has committed sins
  - if he should be one who has committed sins
  lexicon: BDAG
  rationale: The construction κἄν with the perfect participle expresses a conditional
    concession. 'If he has committed sins' is clear modern English; the concessive
    nuance ('even if') is possible but not required to make the sense plain.
- source_word: ἀφεθήσεται
  chosen: he will be forgiven
  alternatives:
  - it will be forgiven him
  - they will be forgiven him
  lexicon: BDAG
  rationale: The passive future of ἀφίημι here refers to forgiveness of sins. English
    idiom prefers 'he will be forgiven,' though the sense is that his sins are forgiven.
    This keeps the statement natural while preserving the passive divine action.
