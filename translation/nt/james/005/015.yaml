theological_decisions:
- issue: Whether σώσει should be rendered narrowly as physical healing or more broadly
    as salvation/restoration
  chosen_reading: Rendered as 'will save' in the main text, with the illness context
    supplying the healing sense.
  alternative_readings:
  - will heal
  - will make well
  rationale: The verse concerns sickness, yet James uses σῴζω rather than a more narrowly
    medical verb. Translating 'save' preserves the lexical choice and theological
    breadth without denying the immediate bodily context.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: πίστις'
- issue: Whether the verse guarantees automatic healing through prayer
  chosen_reading: The translation states the future promises as written without adding
    explanatory qualifiers or absolutizing language beyond the text.
  alternative_readings:
  - Interpretive paraphrases such as 'can restore' or 'will certainly heal in every
    case'
  rationale: The translation must not import a denominational doctrine of guaranteed
    healing, nor weaken the text's direct assertion. The Greek future indicatives
    are preserved straightforwardly.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Whether forgiveness is tied causally to all sickness
  chosen_reading: 'The conditional clause is translated conditionally: ''if he has
    committed sins, he will be forgiven.'''
  alternative_readings:
  - Implying that sickness is always caused by personal sin
  - Detaching forgiveness entirely from the conditional structure
  rationale: The Greek presents sin as a possible, not universal, factor. The translation
    preserves that tension and avoids overreading a universal causal link between
    sickness and personal sin.
  doctrine_reference: Translation philosophy §3
