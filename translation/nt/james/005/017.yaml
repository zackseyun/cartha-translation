id: JAS.5.17
reference: James 5:17
source:
  edition: SBLGNT
  text: Ἠλίας ἄνθρωπος ἦν ὁμοιοπαθὴς ἡμῖν, καὶ προσευχῇ προσηύξατο τοῦ μὴ βρέξαι,
    καὶ οὐκ ἔβρεξεν ἐπὶ τῆς γῆς ἐνιαυτοὺς τρεῖς καὶ μῆνας ἕξ·
translation:
  text: Elijah was a man with a nature like ours, and he prayed earnestly that it
    would not rain, and it did not rain on the land for three years and six months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Elijah was a man like us,' or 'Elijah had the same feelings/passions
      as we do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name; personal names
    are transliterated rather than translated.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a human being
  - a person
  lexicon: BDAG
  rationale: The singular noun here identifies Elijah as an ordinary human. 'A man'
    is the most natural and source-near rendering, and it fits the gender-accurate
    policy since Elijah is specifically male.
- source_word: ὁμοιοπαθὴς ἡμῖν
  chosen: with a nature like ours
  alternatives:
  - like us
  - with the same feelings as we do
  - subject to the same passions as we are
  lexicon: BDAG
  rationale: The adjective denotes sharing the same human condition/experience. 'With
    a nature like ours' preserves the comparison without over-specifying emotion alone
    ('feelings') or using archaic phrasing ('subject to like passions').
- source_word: προσευχῇ προσηύξατο
  chosen: he prayed earnestly
  alternatives:
  - he prayed with prayer
  - he prayed fervently
  lexicon: BDAG
  rationale: This cognate construction intensifies the act of prayer. A literal rendering
    ('he prayed with prayer') is awkward in English; 'prayed earnestly' captures the
    emphatic force in readable modern English.
- source_word: τοῦ μὴ βρέξαι
  chosen: that it would not rain
  alternatives:
  - for it not to rain
  - that rain might not fall
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses the content/purpose of the
    prayer. 'That it would not rain' is idiomatic English and accurately conveys the
    requested outcome.
- source_word: οὐκ ἔβρεξεν
  chosen: it did not rain
  alternatives:
  - rain did not fall
  lexicon: BDAG
  rationale: Impersonal English expression best matches the Greek verb in context.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - on the earth
  - upon the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'ground,' or 'land.' Here 'land' best fits the Elijah
    narrative background of drought in the land, while avoiding an unnecessarily global
    sense.
- source_word: ἐνιαυτοὺς τρεῖς καὶ μῆνας ἕξ
  chosen: for three years and six months
  alternatives:
  - three years and six months
  lexicon: BDAG
  rationale: This accusative of duration is naturally rendered with 'for' in English
    to mark the period of drought.
