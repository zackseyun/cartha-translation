theological_decisions:
- issue: Sense of ὁμοιοπαθὴς in relation to Elijah's humanity
  chosen_reading: Elijah is presented as an ordinary human sharing the same human
    nature/condition as the readers.
  alternative_readings:
  - Elijah had the same emotions/passions as we do.
  rationale: The verse's theological point is to encourage believers by stressing
    Elijah's ordinary humanity, not to diminish his prophetic role. 'With a nature
    like ours' preserves that broader force without narrowing the statement to emotional
    similarity alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy (preserve theological tension;
    gender-accurate over gender-neutral)
