theological_decisions:
- issue: Temporal/aspectual force of Jesus' statement about Satan's fall
  chosen_reading: 'Render the imperfect as an ongoing vision/report: ''I was watching
    Satan fall like lightning from heaven,'' without specifying whether this refers
    to a primordial fall, the disciples'' present ministry, or a prophetic vision
    of defeat.'
  alternative_readings:
  - I saw Satan fall like lightning from heaven
  - I was seeing Satan already fallen from heaven
  rationale: The verse is theologically debated, but the Greek itself does not force
    a single interpretive timeline. The translation preserves the verbal aspect and
    imagery without importing a doctrinally specific explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
