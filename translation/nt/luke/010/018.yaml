id: LUK.10.18
reference: Luke 10:18
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτοῖς· Ἐθεώρουν τὸν Σατανᾶν ὡς ἀστραπὴν ἐκ τοῦ οὐρανοῦ πεσόντα.
translation:
  text: And he said to them, “I was watching Satan fall like lightning from heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I saw Satan fall like lightning from heaven.' The Greek imperfect verb
      can be rendered more simply as 'I saw,' though 'I was watching' better preserves
      the ongoing aspect.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: 'Aorist indicative of λέγω is best rendered as a simple past narrative
    main verb: ''he said.'''
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' preserves narrative flow without overinterpreting
    the discourse relation.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to these
  lexicon: BDAG
  rationale: Dative plural pronoun referring to the returning disciples; standard
    indirect-object rendering is 'to them.'
- source_word: Ἐθεώρουν
  chosen: I was watching
  alternatives:
  - I saw
  - I was seeing
  - I was observing
  lexicon: BDAG
  rationale: Imperfect of θεωρέω carries durative/imperfective force. 'I was watching'
    preserves the ongoing aspect better than the traditional simple 'I saw,' while
    remaining natural English.
- source_word: τὸν Σατανᾶν
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Σατανᾶς is a proper name/title used here as a personal designation; standard
    English transliteration 'Satan' fits the policy to transliterate names.
- source_word: ὡς ἀστραπὴν
  chosen: like lightning
  alternatives:
  - as lightning
  lexicon: BDAG
  rationale: ὡς introduces comparison; 'like lightning' is idiomatic modern English
    and preserves the simile.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven,' but in this context involving Satan
    and a heavenly fall, 'heaven' best preserves the theological and cosmological
    sense.
- source_word: πεσόντα
  chosen: fall
  alternatives:
  - having fallen
  - falling
  lexicon: BDAG
  rationale: Aorist participle accusative modifying Σατανᾶν within the object-complement
    construction after θεωρέω. In English, an infinitival complement ('watching Satan
    fall') is the most natural equivalent and preserves the event sense.
