theological_decisions:
- issue: Rendering the divine title κύριος in a quotation of the Shema-like command
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this context the term refers to the God of Israel in scriptural citation, so
    'Lord' preserves both theological weight and canonical resonance.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Anthropological terms καρδία, ψυχή, ἰσχύς, διάνοια
  chosen_reading: Retain the fourfold expression as heart, soul, strength, and mind
    without collapsing terms
  alternative_readings:
  - Combine terms dynamically as whole being
  - Interpret ψυχή as life
  rationale: The verse stacks overlapping human faculties in a scriptural command.
    Preserving the distinct terms maintains the rhetorical fullness of total devotion
    and avoids importing a rigid anthropology while also not flattening the text into
    paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
