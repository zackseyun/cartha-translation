id: LUK.10.27
reference: Luke 10:27
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Ἀγαπήσεις κύριον τὸν θεόν σου ἐξ ὅλης ⸀τῆς καρδίας
    σου καὶ ⸂ἐν ὅλῃ τῇ ψυχῇ⸃ σου καὶ ⸂ἐν ὅλῃ τῇ ἰσχύϊ⸃ σου καὶ ⸂ἐν ὅλῃ τῇ διανοίᾳ⸃
    σου, καὶ τὸν πλησίον σου ὡς σεαυτόν.
translation:
  text: And he answered, “You shall love the Lord your God from all your heart and
    with all your soul and with all your strength and with all your mind, and your
    neighbor as yourself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English often reads 'with all your heart' here. The Greek uses
      'from all your heart' (ἐξ ὅλης τῆς καρδίας), while the following phrases use
      'with/in' (ἐν).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: he answered
  alternatives:
  - answering, he said
  - he replied
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the participle + finite verb construction
    in narrative Greek; English normally compresses this to 'he answered' without
    loss of meaning.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - You must love
  - Love
  lexicon: BDAG
  rationale: Future indicative here functions as the wording of the scriptural command
    being quoted. 'You shall love' preserves the formal force and intertextual echo
    of the commandment better than the more interpretive 'You must love' or imperative
    'Love'.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
    In this scriptural citation referring to Israel's God, 'Lord' is the appropriate
    English equivalent.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct and standard rendering of θεός in this covenantal address.
- source_word: ἐξ ὅλης τῆς καρδίας σου
  chosen: from all your heart
  alternatives:
  - with all your heart
  - out of all your heart
  lexicon: BDAG
  rationale: The preposition ἐξ literally means 'from/out of.' Rendering it as 'from
    all your heart' preserves the distinct prepositional choice in Luke's wording,
    while remaining natural English. 'With all your heart' is more traditional but
    smooths over the source-text distinction.
- source_word: ἐν ὅλῃ τῇ ψυχῇ σου
  chosen: with all your soul
  alternatives:
  - in all your soul
  - with your whole life
  lexicon: BDAG
  rationale: ψυχή here denotes the whole inner life/self rather than merely an immaterial
    component in a technical anthropological sense. 'Soul' preserves the traditional
    and lexical sense best in this commandment context.
- source_word: ἐν ὅλῃ τῇ ἰσχύϊ σου
  chosen: with all your strength
  alternatives:
  - with all your might
  - with all your power
  lexicon: BDAG
  rationale: ἰσχύς refers to strength or might. 'Strength' is clear modern English
    and aligns well with established commandment language.
- source_word: ἐν ὅλῃ τῇ διανοίᾳ σου
  chosen: with all your mind
  alternatives:
  - with all your understanding
  - with all your thought
  lexicon: BDAG
  rationale: διάνοια denotes mind, understanding, or intellectual faculty. 'Mind'
    is the most direct and idiomatic rendering here.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - the one near you
  lexicon: BDAG
  rationale: Established and accurate rendering in ethical contexts; it conveys the
    relational category intended in the Levitical citation.
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - like yourself
  lexicon: BDAG
  rationale: Standard idiomatic rendering preserving the comparative force of ὡς.
