id: LUK.10.23
reference: Luke 10:23
source:
  edition: SBLGNT
  text: Καὶ στραφεὶς πρὸς τοὺς μαθητὰς κατ’ ἰδίαν εἶπεν· Μακάριοι οἱ ὀφθαλμοὶ οἱ βλέποντες
    ἃ βλέπετε.
translation:
  text: And turning to the disciples privately, he said, “Blessed are the eyes that
    see what you see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in private.”
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turning
  alternatives:
  - having turned
  - turning around
  lexicon: BDAG
  rationale: Aorist participle introducing Jesus' action before speaking. 'Turning'
    is natural English and preserves the participial linkage without over-formal stiffness.
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: BDAG
  rationale: Idiomatic expression meaning apart from others. 'Privately' is concise
    and captures that Jesus addressed the disciples separately.
- source_word: μαθητάς
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: Standard NT rendering that preserves the relational and instructional
    sense of μαθητής.
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: In beatitude-style sayings, 'Blessed' best preserves the covenantal and
    theological weight of divine favor; 'happy' is too subjective and weak.
- source_word: ὀφθαλμοὶ
  chosen: the eyes
  alternatives:
  - the people whose eyes
  - your eyes
  lexicon: BDAG
  rationale: The Greek explicitly says 'the eyes,' a vivid metonymy for those granted
    perception. Retaining 'the eyes' preserves the imagery while remaining intelligible
    in English.
- source_word: οἱ βλέποντες
  chosen: that see
  alternatives:
  - which are seeing
  - seeing
  lexicon: BDAG
  rationale: The articular participle functions adjectivally, describing the eyes.
    'That see' is idiomatic English and preserves the present participle's descriptive
    force.
- source_word: ἃ βλέπετε
  chosen: what you see
  alternatives:
  - the things you are seeing
  - what you are looking at
  lexicon: BDAG
  rationale: Natural rendering of the relative pronoun plus present verb. 'What you
    see' keeps the directness and avoids unnecessary expansion.
