theological_decisions:
- issue: Force of the beatitude
  chosen_reading: A pronouncement of blessedness on the disciples' privileged perception
    of Jesus' works and revelation.
  alternative_readings:
  - A merely emotional statement of happiness
  rationale: μακάριοι in this context is a beatitude-like declaration of divine favor,
    not simply a comment on emotional state. The translation 'Blessed' preserves that
    theological weight without adding interpretation beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 6
