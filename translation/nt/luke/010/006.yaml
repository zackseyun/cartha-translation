id: LUK.10.6
reference: Luke 10:6
source:
  edition: SBLGNT
  text: καὶ ἐὰν ⸂ᾖ ἐκεῖ⸃ υἱὸς εἰρήνης, ἐπαναπαήσεται ἐπ’ αὐτὸν ἡ εἰρήνη ὑμῶν· εἰ δὲ
    μήγε, ἐφ’ ὑμᾶς ἀνακάμψει.
translation:
  text: And if a son of peace is there, your peace will rest upon him; but if not,
    it will return to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person of peace'—that is, someone receptive to the peace-bearing message.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱὸς εἰρήνης
  chosen: a son of peace
  alternatives:
  - a peaceful man
  - a person of peace
  - one worthy of peace
  lexicon: BDAG
  rationale: A semitic-style genitive expression meaning a person characterized by
    peace or receptive to the peace-bearing message. 'Son of peace' preserves the
    idiom and the masculine singular form of the Greek, in keeping with the gender-accurate
    policy. More idiomatic alternatives are possible, but this phrase is transparent
    enough in English and preserves the source texture.
- source_word: ἐπαναπαήσεται
  chosen: will rest upon
  alternatives:
  - will come to rest on
  - will remain on
  lexicon: BDAG
  rationale: The future middle/passive conveys the idea of settling or resting upon
    someone. 'Will rest upon' is natural English and preserves the image of the spoken
    peace abiding on the recipient.
- source_word: ἡ εἰρήνη ὑμῶν
  chosen: your peace
  alternatives:
  - the peace you offer
  - your blessing of peace
  lexicon: BDAG
  rationale: The phrase refers to the peace-greeting or blessing spoken by the disciples.
    'Your peace' is sufficiently clear and keeps the direct possessive structure of
    the Greek without over-interpreting it as merely a greeting formula.
- source_word: μήγε
  chosen: if not
  alternatives:
  - if indeed not
  - otherwise
  lexicon: BDAG
  rationale: This particle combination strengthens the negative condition. In smooth
    English, 'if not' captures the sense adequately without awkwardness.
- source_word: ἀνακάμψει
  chosen: it will return
  alternatives:
  - it will turn back
  - it will come back
  lexicon: BDAG
  rationale: The verb means to return or turn back. 'It will return' is the most natural
    rendering here for the peace not finding a resting place and coming back to the
    speakers.
- source_word: ἐφ’ ὑμᾶς
  chosen: to you
  alternatives:
  - upon you
  - back on you
  lexicon: BDAG
  rationale: Although the preposition is literally 'upon,' English idiom with 'return'
    prefers 'to you.' This is a justified shift for readability while preserving the
    sense.
- source_word: καὶ ἐὰν ᾖ ἐκεῖ
  chosen: And if ... is there
  alternatives:
  - And if there is
  - If indeed there is there
  lexicon: BDAG
  rationale: This conditional opening is straightforward. 'And if ... is there' preserves
    the connective καί and the locative emphasis of ἐκεῖ.
