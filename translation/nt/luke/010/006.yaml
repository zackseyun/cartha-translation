theological_decisions:
- issue: Whether to neutralize the masculine idiom υἱὸς εἰρήνης
  chosen_reading: Retain 'son of peace' in the main text
  alternative_readings:
  - person of peace
  - peaceful person
  rationale: The Greek is grammatically masculine singular and uses a recognizable
    idiom. Per the translation philosophy, gender-accurate renderings are preferred
    over gender-neutral smoothing unless context clearly demands otherwise. A footnote
    preserves the more idiomatic inclusive alternative for readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
