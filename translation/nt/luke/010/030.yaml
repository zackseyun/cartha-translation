id: LUK.10.30
reference: Luke 10:30
source:
  edition: SBLGNT
  text: ὑπολαβὼν ⸀δὲ ὁ Ἰησοῦς εἶπεν· Ἄνθρωπός τις κατέβαινεν ἀπὸ Ἰερουσαλὴμ εἰς Ἰεριχὼ
    καὶ λῃσταῖς περιέπεσεν, οἳ καὶ ἐκδύσαντες αὐτὸν καὶ πληγὰς ἐπιθέντες ἀπῆλθον ἀφέντες
    ⸀ἡμιθανῆ.
translation:
  text: Jesus replied, “A certain man was going down from Jerusalem to Jericho, and
    he fell among robbers, who also stripped him, beat him, and went away, leaving
    him half dead.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπολαβὼν δὲ
  chosen: replied
  alternatives:
  - answered
  - took up and said
  lexicon: BDAG
  rationale: The participle ὑπολαβών with δέ before εἶπεν is an idiomatic narrative
    introduction meaning to respond or take up the conversation. 'Replied' is natural
    modern English and preserves the responsive force better than a wooden 'answering,
    said.'
- source_word: Ἄνθρωπός τις
  chosen: A certain man
  alternatives:
  - A man
  - A certain person
  lexicon: BDAG
  rationale: ἄνθρωπος is singular masculine here and refers to an individual male
    within the story. Following the gender-accurate principle, 'man' is preferable
    to 'person.' τις adds indefiniteness with a slight narrative specificity, well
    conveyed by 'a certain man.'
- source_word: κατέβαινεν
  chosen: was going down
  alternatives:
  - went down
  - was descending
  lexicon: BDAG
  rationale: The imperfect portrays ongoing movement in the narrative background.
    'Was going down' reflects the imperfect aspect and also matches the literal topography
    from Jerusalem down to Jericho.
- source_word: λῃσταῖς
  chosen: robbers
  alternatives:
  - bandits
  - brigands
  lexicon: BDAG
  rationale: λῃστής denotes violent robbers rather than mere thieves. 'Robbers' is
    clear and idiomatic; 'bandits' is possible but slightly more interpretive in tone.
- source_word: περιέπεσεν
  chosen: fell among
  alternatives:
  - fell into the hands of
  - encountered
  lexicon: BDAG
  rationale: The idiom literally means 'fell among' and is well established in English.
    'Fell into the hands of' is interpretive expansion not required by the Greek.
- source_word: ἐκδύσαντες αὐτὸν
  chosen: stripped him
  alternatives:
  - having stripped him
  - took off his clothes
  lexicon: BDAG
  rationale: The participle indicates one action in the sequence of the assault. 'Stripped
    him' is concise and idiomatic, implying removal of clothing and possessions in
    context.
- source_word: πληγὰς ἐπιθέντες
  chosen: beat him
  alternatives:
  - inflicted blows on him
  - wounded him
  lexicon: BDAG
  rationale: Literally 'having placed blows on him.' 'Beat him' is the most natural
    English rendering of the idiom. 'Wounded him' is too general and loses the violent
    action.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: A straightforward narrative verb of departure. 'Went away' is natural
    modern English.
- source_word: ἀφέντες ἡμιθανῆ
  chosen: leaving him half dead
  alternatives:
  - having left him half dead
  - leaving him nearly dead
  lexicon: BDAG
  rationale: ἡμιθανής means 'half dead,' that is, severely injured and near death.
    The traditional and literal 'half dead' is clear in English and preserves the
    vividness of the Greek.
- source_word: οἳ καὶ
  chosen: who also
  alternatives:
  - and they
  - who
  lexicon: BDAG
  rationale: καί here adds emphasis to the relative clause, marking the further actions
    of the robbers. 'Who also' preserves that additive force without awkwardness.
