  from: they would have changed their thinking long ago, sitting in sackcloth and ashes.
  to: long ago they would have repented, sitting in sackcloth and ashes.
  rationale: The current word order places 'long ago' between the main verb and the modifying participial phrase, which is slightly awkward. Moving 'long ago' to the front of the clause ('long ago they would have repented...') creates a more natural English flow without altering the meaning.
