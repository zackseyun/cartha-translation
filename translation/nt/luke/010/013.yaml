id: LUK.10.13
reference: Luke 10:13
source:
  edition: SBLGNT
  text: Οὐαί σοι, Χοραζίν· οὐαί σοι, Βηθσαϊδά· ὅτι εἰ ἐν Τύρῳ καὶ Σιδῶνι ⸀ἐγενήθησαν αἱ δυνάμεις αἱ γενόμεναι ἐν ὑμῖν, πάλαι ἂν ἐν σάκκῳ καὶ σποδῷ ⸀καθήμενοι μετενόησαν.
translation:
  text: Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works that happened among you had happened in Tyre and Sidon, long ago they would have repented, sitting in sackcloth and ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "miracles"; Greek "mighty works" or "works of power."
    reason: lexical_alternative
  - marker: b
    text: Or 'they would have changed their thinking long ago, sitting in sackcloth and ashes.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: '"Woe" best preserves the prophetic denunciation and lament force of οὐαί in judgment contexts; "alas" is too weak here.'
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative after οὐαί is naturally rendered "to you" in idiomatic English and matches the direct address.
- source_word: Χοραζίν / Βηθσαϊδά
  chosen: Chorazin / Bethsaida
  rationale: Personal/place names are transliterated by standard English conventions per project philosophy.
- source_word: δυνάμεις
  chosen: mighty works
  alternatives:
  - miracles
  - works of power
  lexicon: BDAG
  rationale: In the Synoptic context δυνάμεις commonly refers to acts of divine power. "Mighty works" preserves both the deed aspect and the power nuance better than the more interpretive "miracles," while remaining natural English.
- source_word: ἐγενήθησαν ... αἱ γενόμεναι
  chosen: had happened ... that happened
  alternatives:
  - were done ... done
  - took place ... took place
  lexicon: BDAG
  rationale: The repeated forms of γίνομαι are rendered with "happen" to reflect occurrence rather than a more agent-focused verb like "do." This preserves the Greek wording while reading smoothly in English.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - in your midst
  lexicon: BDAG
  rationale: Here ἐν with plural pronoun refers to the towns/people as the sphere where the works occurred. "Among you" is idiomatic and clear.
- source_word: πάλαι
  chosen: long ago
  alternatives:
  - already long ago
  - formerly
  lexicon: BDAG
  rationale: '"Long ago" naturally conveys the temporal force in this contrary-to-fact statement.'
- source_word: ἐν σάκκῳ καὶ σποδῷ
  chosen: in sackcloth and ashes
  alternatives:
  - with sackcloth and ashes
  lexicon: BDAG
  rationale: This is a conventional biblical expression for mourning and repentance. "In sackcloth and ashes" preserves the imagery and standard idiom.
- source_word: καθήμενοι
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: The participle is retained as "sitting," preserving the vivid posture associated with mourning rather than flattening it into a mere state.
- source_word: μετενόησαν
  chosen: would have repented
  alternatives:
  - would have turned back
  lexicon: BDAG
  rationale: '"Repented" is the standard and contextually appropriate rendering for μετανοέω in Luke, expressing moral-spiritual turning without unnecessary paraphrase.'
