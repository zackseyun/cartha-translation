theological_decisions:
- issue: Nature of δυνάμεις in Jesus' ministry
  chosen_reading: Rendered as "mighty works" rather than the more interpretive "miracles."
  alternative_readings:
  - miracles
  - works of power
  rationale: The verse refers to extraordinary acts evidencing divine power, but the Greek term itself emphasizes power/deeds. "Mighty works" preserves that nuance without reducing the term to a later technical category.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the repentance image
  chosen_reading: Kept the concrete imagery "sitting in sackcloth and ashes" in the main text.
  alternative_readings:
  - repented in sackcloth and ashes
  - shown repentance in mourning clothes and ashes
  rationale: The Greek includes a participial image that should be preserved rather than abstracted away. This maintains the text's historical and prophetic texture without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
revisions:
