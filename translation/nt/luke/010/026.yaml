id: LUK.10.26
reference: Luke 10:26
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν πρὸς αὐτόν· Ἐν τῷ νόμῳ τί γέγραπται; πῶς ἀναγινώσκεις;
translation:
  text: And he said to him, “What is written in the Law? How do you read it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How do you interpret it?” The Greek more literally says, “How do you
      read it?” and may include the sense of understanding or interpretation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: And he
  alternatives:
  - But he
  - Then he
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' gives natural English narrative flow without
    overstating contrast. The article functions pronominally with the implied subject,
    yielding 'he.'
- source_word: εἶπεν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - said to him in reply
  - said to him
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with πρός + accusative marking the
    addressee. No added nuance beyond direct address is warranted.
- source_word: Ἐν τῷ νόμῳ
  chosen: in the Law
  alternatives:
  - in the law
  - in the Torah
  lexicon: BDAG
  rationale: νόμος here refers specifically to the Jewish Law/Scripture as recognized
    by the expert in the law. Capitalizing 'Law' signals this recognized body without
    importing a narrower transliteration like 'Torah' into the main text.
- source_word: τί γέγραπται
  chosen: What is written
  alternatives:
  - What has been written
  - What stands written
  lexicon: BDAG
  rationale: The perfect passive γέγραπται emphasizes the written state of Scripture.
    'What is written' is idiomatic English that preserves the scriptural appeal.
- source_word: πῶς
  chosen: How
  alternatives:
  - In what way
  - How is it
  lexicon: BDAG
  rationale: πῶς asks about manner or interpretation. 'How' is concise and preserves
    the open-ended question about the man's reading.
- source_word: ἀναγινώσκεις
  chosen: do you read it
  alternatives:
  - do you interpret it
  - are you reading
  lexicon: BDAG
  rationale: ἀναγινώσκω ordinarily means 'read.' In context it may imply understanding
    or interpretation, but the main text should preserve the lexical sense while allowing
    the interpretive nuance to be heard. 'It' is supplied naturally in English from
    the preceding reference to the Law.
