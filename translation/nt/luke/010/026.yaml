theological_decisions:
- issue: Sense of νόμος in Jesus' question
  chosen_reading: Law as the recognized scriptural law given to Israel, rendered 'the
    Law'
  alternative_readings:
  - Torah
  - law in a generic sense
  rationale: The context is a dialogue with a legal expert within Second Temple Judaism.
    'The Law' preserves the scriptural reference in accessible English without over-specifying
    beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Interpretive nuance of πῶς ἀναγινώσκεις
  chosen_reading: Retain the literal 'How do you read it?'
  alternative_readings:
  - How do you interpret it?
  rationale: The question likely probes not only recitation but understanding, yet
    the Greek verb itself is 'read.' Preserving the literal wording maintains the
    text's theological and rhetorical openness rather than resolving it into explicit
    interpretation.
  doctrine_reference: Translation philosophy §3
