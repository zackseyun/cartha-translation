id: LUK.10.8
reference: Luke 10:8
source:
  edition: SBLGNT
  text: καὶ εἰς ἣν ἂν πόλιν εἰσέρχησθε καὶ δέχωνται ὑμᾶς, ἐσθίετε τὰ παρατιθέμενα
    ὑμῖν,
translation:
  text: And into whatever city you enter, if they receive you, eat what is set before
    you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcome you' for 'receive you.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the things being set before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν ἂν πόλιν
  chosen: into whatever city
  alternatives:
  - into any city
  - into whichever city
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν gives an indefinite/general sense: ''whatever
    city'' or ''whichever city.'' ''Into'' preserves εἰς, and ''city'' is the straightforward
    sense of πόλις.'
- source_word: εἰσέρχησθε
  chosen: you enter
  alternatives:
  - you go into
  - you come into
  lexicon: BDAG
  rationale: Present subjunctive in a general condition after ἄν; 'you enter' is natural
    modern English and preserves the movement into the city without over-paraphrase.
- source_word: δέχωνται ὑμᾶς
  chosen: if they receive you
  alternatives:
  - if they welcome you
  - and they receive you
  lexicon: BDAG
  rationale: 'δέχομαι can mean ''receive'' or ''welcome.'' ''Receive'' is chosen for
    closer lexical correspondence, while still idiomatic in context. Although καί
    is present, English naturally renders the clause conditionally after the indefinite
    construction: ''if they receive you.'''
- source_word: ἐσθίετε
  chosen: eat
  alternatives:
  - you are to eat
  - keep eating
  lexicon: BDAG
  rationale: Present imperative gives an instruction. Simple imperative 'eat' is the
    most natural English equivalent here.
- source_word: τὰ παρατιθέμενα ὑμῖν
  chosen: what is set before you
  alternatives:
  - the things set before you
  - what is served to you
  lexicon: BDAG
  rationale: The participle from παρατίθημι in meal context means food placed before
    someone. 'What is set before you' is a standard, accurate English idiom that preserves
    the passive sense without unnecessary stiffness. 'What is served to you' is possible
    but slightly more interpretive.
