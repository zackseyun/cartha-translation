id: LUK.10.33
reference: Luke 10:33
source:
  edition: SBLGNT
  text: Σαμαρίτης δέ τις ὁδεύων ἦλθεν κατ’ αὐτὸν καὶ ⸀ἰδὼν ἐσπλαγχνίσθη,
translation:
  text: But a Samaritan, as he traveled, came to where he was, and when he saw him,
    he was moved with compassion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "he had compassion."'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαμαρίτης
  chosen: a Samaritan
  alternatives:
  - a man from Samaria
  lexicon: BDAG
  rationale: Standard transliteration of the ethnoreligious identity term; 'Samaritan'
    is the established and precise English equivalent, preserving the social and narrative
    force of the contrast in the parable.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the priest and Levite in the preceding verses; 'But'
    best brings out the adversative force in readable English.
- source_word: τις
  chosen: a
  alternatives:
  - a certain
  - someone
  lexicon: BDAG
  rationale: Indefinite pronoun used with Σαμαρίτης; English idiom normally expresses
    this simply with the indefinite article rather than the more wooden 'a certain.'
- source_word: ὁδεύων
  chosen: as he traveled
  alternatives:
  - traveling
  - on a journey
  lexicon: BDAG
  rationale: Present participle expressing attendant circumstance/background action.
    'As he traveled' is natural English and preserves the ongoing sense without awkwardness.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Basic aorist of ἔρχομαι; 'came' is the straightforward rendering and
    fits the narrative flow.
- source_word: κατ’ αὐτόν
  chosen: to where he was
  alternatives:
  - upon him
  - near him
  - to him
  lexicon: BDAG
  rationale: In this context κατά with the accusative idiomatically indicates movement
    to the injured man's location. 'To where he was' communicates the sense clearly
    in modern English better than the more ambiguous 'to him' or overly literal 'upon
    him.'
- source_word: ἰδών
  chosen: when he saw him
  alternatives:
  - seeing him
  - after seeing him
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'when he saw him' expresses
    the temporal sequence naturally in English.
- source_word: ἐσπλαγχνίσθη
  chosen: he was moved with compassion
  alternatives:
  - he had compassion
  - he felt compassion
  lexicon: BDAG
  rationale: This verb denotes deep pity/compassion. 'Was moved with compassion' preserves
    the emotional force more fully than the flatter 'had compassion,' while remaining
    idiomatic.
