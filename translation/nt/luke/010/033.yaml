theological_decisions:
- issue: Rendering the Samaritan's compassionate response without importing later
    moral or doctrinal interpretation
  chosen_reading: he was moved with compassion
  alternative_readings:
  - he had compassion
  - he felt pity
  rationale: The verse emphasizes the Samaritan's visceral merciful response. The
    translation preserves that affective force without expanding into interpretive
    language about mercy, grace, or neighbor-love beyond what the Greek explicitly
    states.
  doctrine_reference: Translation philosophy §§1, 3, 6
