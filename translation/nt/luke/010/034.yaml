id: LUK.10.34
reference: Luke 10:34
source:
  edition: SBLGNT
  text: καὶ προσελθὼν κατέδησεν τὰ τραύματα αὐτοῦ ἐπιχέων ἔλαιον καὶ οἶνον, ἐπιβιβάσας
    δὲ αὐτὸν ἐπὶ τὸ ἴδιον κτῆνος ἤγαγεν αὐτὸν εἰς πανδοχεῖον καὶ ἐπεμελήθη αὐτοῦ.
translation:
  text: And coming near, he bound up his wounds, pouring on olive oil and wine. Then
    he put him on his own animal, brought him to an inn, and took care of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bandaged his wounds.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'animal' refers to a beast of burden or riding animal.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  chosen: coming near
  alternatives:
  - approaching
  - going to him
  - came near
  lexicon: BDAG
  rationale: Aorist participle indicating prior/contemporaneous action before the
    main verb. 'Coming near' preserves the physical movement toward the wounded man
    without overformal wording.
- source_word: κατέδησεν
  chosen: bound up
  alternatives:
  - bandaged
  - bound
  lexicon: BDAG
  rationale: The verb means to bind up, especially wounds. 'Bound up' is slightly
    more literal than 'bandaged' while remaining natural English.
- source_word: τραύματα
  chosen: wounds
  alternatives:
  - injuries
  lexicon: BDAG
  rationale: Standard rendering for physical wounds; fits the immediate context of
    roadside assault and treatment.
- source_word: ἐπιχέων
  chosen: pouring on
  alternatives:
  - pouring over
  - applying
  lexicon: BDAG
  rationale: Present participle expressing attendant manner. 'Pouring on' naturally
    conveys the act of applying the substances to the wounds.
- source_word: ἔλαιον
  chosen: olive oil
  alternatives:
  - oil
  lexicon: BDAG
  rationale: In this context the referent is olive oil. Specifying 'olive oil' gives
    modern readers the concrete sense of the Greek without distortion.
- source_word: οἶνον
  chosen: wine
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; likely used medicinally here, but
    that implication need not be imported into the main text.
- source_word: ἐπιβιβάσας
  chosen: he put him on
  alternatives:
  - having set him on
  - mounted him on
  lexicon: BDAG
  rationale: Aorist participle indicating the next action. 'Put him on' is idiomatic
    and accurately conveys placing the injured man onto the beast.
- source_word: ἴδιον
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: ἴδιος adds emphasis of personal possession. 'His own' preserves that
    emphasis.
- source_word: κτῆνος
  chosen: animal
  alternatives:
  - beast
  - pack animal
  - mount
  lexicon: BDAG
  rationale: The term denotes a beast of burden or riding animal. 'Animal' is broad
    but clear and avoids archaic 'beast'; 'mount' is possible but slightly more interpretive.
- source_word: πανδοχεῖον
  chosen: inn
  alternatives:
  - lodging place
  lexicon: BDAG
  rationale: Standard equivalent for a place receiving travelers. 'Inn' is concise
    and idiomatic.
- source_word: ἐπεμελήθη
  chosen: took care of
  alternatives:
  - cared for
  - looked after
  lexicon: BDAG
  rationale: The middle verb conveys personal care and attention. 'Took care of' is
    natural modern English and preserves the compassionate action.
