id: LUK.10.5
reference: Luke 10:5
source:
  edition: SBLGNT
  text: εἰς ἣν δ’ ἂν ⸂εἰσέλθητε οἰκίαν⸃ πρῶτον λέγετε· Εἰρήνη τῷ οἴκῳ τούτῳ.
translation:
  text: Into whatever house you enter, first say, ‘Peace to this house.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Peace be to this house' or 'Peace upon this house.' The Greek is a
      concise blessing formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν
  chosen: Into whatever
  alternatives:
  - Into whichever
  - In whatever
  lexicon: BDAG
  rationale: 'The combination of εἰς + relative pronoun ἣν with ἄν introduces an indefinite
    relative clause: ''into whatever [house]''. ''Into'' preserves the directional
    force of εἰς better than a flatter ''in.'''
- source_word: εἰσέλθητε
  chosen: you enter
  alternatives:
  - you go into
  - you come into
  lexicon: BDAG
  rationale: Aorist subjunctive in an indefinite relative clause after ἄν gives a
    general future-oriented sense. 'You enter' is natural modern English and preserves
    the action without over-paraphrase.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  - household
  lexicon: BDAG
  rationale: οἰκία here most naturally refers to the dwelling entered by the disciples.
    'House' keeps the concrete sense and also fits the repeated οἶκος in the blessing
    formula.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - at first
  lexicon: BDAG
  rationale: 'πρῶτον marks priority in sequence: the first thing they are to do upon
    entering is speak the greeting. ''First'' is concise and accurate.'
- source_word: λέγετε
  chosen: say
  alternatives:
  - speak
  - declare
  lexicon: BDAG
  rationale: The present imperative calls for the prescribed verbal greeting. 'Say'
    is the most idiomatic English equivalent in this context.
- source_word: Εἰρήνη
  chosen: Peace
  alternatives:
  - May there be peace
  - Peace be
  lexicon: BDAG
  rationale: The nominative used as a greeting/blessing is well represented by the
    simple formula 'Peace'. This preserves the terseness and Semitic flavor of the
    saying without adding words not present in the Greek.
- source_word: τῷ οἴκῳ τούτῳ
  chosen: to this house
  alternatives:
  - upon this house
  - to this household
  lexicon: BDAG
  rationale: The dative marks the recipient of the blessing. 'To this house' is straightforward
    and matches the concrete noun choice above. 'Upon this house' is possible but
    less natural in contemporary English.
