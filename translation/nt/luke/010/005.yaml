theological_decisions:
- issue: Nature of the peace formula
  chosen_reading: 'Render as a spoken blessing/greeting: ''Peace to this house.'''
  alternative_readings:
  - Render more explicitly as 'May peace be to this house'
  - Render idiomatically as 'Peace be on this house'
  rationale: The text gives an imperative to pronounce peace over the house, echoing
    Jewish greeting/blessing usage. The chosen wording preserves the performative
    blessing without importing extra liturgical wording or weakening it into a mere
    casual hello.
