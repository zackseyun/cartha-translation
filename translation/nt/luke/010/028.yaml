theological_decisions:
- issue: Scope of 'live' in context of eternal life
  chosen_reading: Render ζήσῃ as 'you will live' without expanding it to 'you will
    inherit eternal life' in the main text.
  alternative_readings:
  - you will inherit eternal life
  - you will have life
  rationale: The immediate Greek says simply 'you will live.' Since the surrounding
    context concerns inheriting eternal life, that implication may be noted, but the
    translation should not import additional wording not present in this clause. This
    preserves theological tension and lexical transparency.
  doctrine_reference: Translation philosophy §§1, 3, 6
