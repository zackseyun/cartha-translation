id: LUK.10.28
reference: Luke 10:28
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῷ· Ὀρθῶς ἀπεκρίθης· τοῦτο ποίει καὶ ζήσῃ.
translation:
  text: And he said to him, “You have answered correctly. Do this, and you will live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You answered rightly.'
    reason: lexical_alternative
  - marker: b
    text: The broader context concerns eternal life (see Luke 10:25), but the Greek
      here says simply, 'you will live.'
    reason: cross_reference
lexical_decisions:
- source_word: εἶπεν δὲ αὐτῷ
  chosen: And he said to him
  alternatives:
  - Then he said to him
  - So he said to him
  lexicon: BDAG
  rationale: εἶπεν is the simple aorist of λέγω, best rendered 'he said.' δέ is a
    mild connective; 'and' preserves the narrative flow without overstating contrast
    or sequence. αὐτῷ is dative indirect object, 'to him.'
- source_word: Ὀρθῶς
  chosen: correctly
  alternatives:
  - rightly
  - well
  lexicon: BDAG
  rationale: The adverb means 'correctly/rightly.' 'Correctly' is natural modern English
    and fits Jesus' evaluation of the lawyer's answer.
- source_word: ἀπεκρίθης
  chosen: you have answered
  alternatives:
  - you answered
  - you replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent from ἀποκρίνομαι, second singular. English
    present perfect ('have answered') works idiomatically with 'correctly' in direct
    speech, conveying completed action with present relevance.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  - these things
  lexicon: BDAG
  rationale: Neuter singular demonstrative referring back to the summarized command
    just cited. 'This' is the most natural and sufficiently specific rendering.
- source_word: ποίει
  chosen: Do
  alternatives:
  - Keep doing
  - Practice
  lexicon: BDAG
  rationale: Present active imperative can imply ongoing practice, but concise English
    imperative 'Do' best matches idiom here while still allowing the command's durative
    force in context.
- source_word: καὶ ζήσῃ
  chosen: and you will live
  alternatives:
  - and you will have life
  - and you will live on
  lexicon: BDAG
  rationale: Future middle indicative of ζάω is straightforwardly 'you will live.'
    This preserves the wording without importing a narrower interpretive gloss such
    as 'inherit eternal life,' though the broader context concerns eternal life.
