id: LUK.10.31
reference: Luke 10:31
source:
  edition: SBLGNT
  text: κατὰ συγκυρίαν δὲ ἱερεύς τις κατέβαινεν ἐν τῇ ὁδῷ ἐκείνῃ, καὶ ἰδὼν αὐτὸν ἀντιπαρῆλθεν·
translation:
  text: Now by chance a certain priest was going down on that road, and when he saw
    him, he passed by on the opposite side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he passed by,' though the Greek verb suggests passing by while keeping
      to the opposite side, implying deliberate avoidance.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ συγκυρίαν
  chosen: by chance
  alternatives:
  - coincidentally
  - by coincidence
  lexicon: BDAG
  rationale: The idiom κατὰ συγκυρίαν denotes happening by coincidence or chance.
    'By chance' is natural English and preserves the narrative irony without overstating
    philosophical claims about randomness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the story. 'Now' gives a natural
    narrative transition in English better than a wooden 'but' or leaving it untranslated.
- source_word: ἱερεύς τις
  chosen: a certain priest
  alternatives:
  - a priest
  - some priest
  lexicon: BDAG
  rationale: τις marks an indefinite individual. 'A certain priest' preserves the
    specificity of an unnamed person better than simply 'a priest,' while remaining
    idiomatic.
- source_word: κατέβαινεν
  chosen: was going down
  alternatives:
  - was traveling down
  - went down
  lexicon: BDAG
  rationale: The imperfect indicates ongoing movement in the background of the scene.
    'Was going down' preserves the imperfective aspect better than the simple past
    'went down.'
- source_word: ἐν τῇ ὁδῷ ἐκείνῃ
  chosen: on that road
  alternatives:
  - along that road
  - on that way
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with ὁδός it is idiomatically rendered
    'on' or 'along' a road. 'On that road' is concise and natural.
- source_word: ἰδὼν αὐτὸν
  chosen: when he saw him
  alternatives:
  - seeing him
  - after seeing him
  lexicon: BDAG
  rationale: 'The aorist participle is most naturally rendered temporally here: upon
    seeing the wounded man, the priest acted. ''When he saw him'' is clear modern
    English.'
- source_word: ἀντιπαρῆλθεν
  chosen: he passed by on the opposite side
  alternatives:
  - he passed by
  - he went past opposite him
  lexicon: BDAG
  rationale: ἀντιπαρέρχομαι conveys not merely passing by but passing opposite or
    avoiding by keeping to the other side. The fuller rendering preserves the avoidance
    implied in the verb.
