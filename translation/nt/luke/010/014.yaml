id: LUK.10.14
reference: Luke 10:14
source:
  edition: SBLGNT
  text: πλὴν Τύρῳ καὶ Σιδῶνι ἀνεκτότερον ἔσται ἐν τῇ κρίσει ἢ ὑμῖν.
translation:
  text: But it will be more bearable for Tyre and Sidon in the judgment than for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “more tolerable.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Introduces a strong adversative or exception-like contrast with the preceding
    denunciation. 'But' is natural modern English and preserves the force without
    sounding overly formal.
- source_word: Τύρῳ καὶ Σιδῶνι
  chosen: for Tyre and Sidon
  alternatives:
  - to Tyre and Sidon
  lexicon: BDAG
  rationale: Dative forms function with the comparative adjective to indicate those
    for whom the coming judgment will be more tolerable. 'For Tyre and Sidon' is idiomatic
    in English in this construction.
- source_word: ἀνεκτότερον
  chosen: more bearable
  alternatives:
  - more tolerable
  - more endurable
  lexicon: BDAG
  rationale: Comparative of ἀνεκτός, meaning 'bearable' or 'tolerable.' 'More bearable'
    is clear modern English and fits the future judgment context well. 'More tolerable'
    is traditional and viable, but 'bearable' is slightly more natural for contemporary
    readers.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί functioning as the copula for the comparative statement.
    'It will be' is standard modern English; 'shall' is unnecessarily archaic.
- source_word: ἐν τῇ κρίσει
  chosen: in the judgment
  alternatives:
  - at the judgment
  - in judgment
  lexicon: BDAG
  rationale: The phrase refers to the eschatological judgment. The article supports
    a definite sense, so 'the judgment' best reflects the Greek while remaining readable.
    'At the judgment' is also possible but slightly less literal.
- source_word: ἢ ὑμῖν
  chosen: than for you
  alternatives:
  - than you
  - than to you
  lexicon: BDAG
  rationale: Completes the comparison implied by ἀνεκτότερον. English idiom prefers
    'than for you' to make explicit the dative sense and avoid awkwardness.
