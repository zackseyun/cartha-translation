theological_decisions:
- issue: Nature of κρίσις in context
  chosen_reading: the judgment refers to the final or eschatological judgment
  alternative_readings:
  - judgment in a more general sense
  rationale: In context Jesus compares the fate of unrepentant towns with notorious
    Gentile cities, which strongly suggests a final divine assize rather than merely
    temporal judgment. The translation 'the judgment' preserves this without over-expanding
    the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
