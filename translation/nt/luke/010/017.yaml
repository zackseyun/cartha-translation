id: LUK.10.17
reference: Luke 10:17
source:
  edition: SBLGNT
  text: Ὑπέστρεψαν δὲ οἱ ἑβδομήκοντα ⸀δύο μετὰ χαρᾶς λέγοντες· Κύριε, καὶ τὰ δαιμόνια
    ὑποτάσσεται ἡμῖν ἐν τῷ ὀνόματί σου.
translation:
  text: Then the seventy-two returned with joy, saying, “Lord, even the demons submit
    to us in your name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “the seventy” instead of “the seventy-two.”
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπέστρεψαν
  chosen: returned
  alternatives:
  - came back
  lexicon: BDAG
  rationale: Aorist indicative of ὑποστρέφω denotes returning from the mission. 'Returned'
    is natural modern English and sufficiently formal.
- source_word: δὲ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative development. 'Then' fits the flow in English better
    than a bare 'and' while preserving continuity.
- source_word: οἱ ἑβδομήκοντα δύο
  chosen: the seventy-two
  alternatives:
  - the seventy
  lexicon: BDAG
  rationale: The SBLGNT text reads 'seventy-two.' Because a well-known textual alternative
    'seventy' exists, the main text follows the printed Greek and the alternative
    is preserved in a footnote.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: The prepositional phrase is straightforwardly rendered 'with joy.' This
    preserves the noun and avoids over-paraphrase.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing direct speech is naturally rendered 'saying'
    in English, preserving the participial linkage.
- source_word: Κύριε
  chosen: Lord
  alternatives: []
  lexicon: BDAG
  rationale: Vocative of κύριος addressed to Jesus. Per doctrine defaults, κύριος
    is rendered 'Lord,' not 'Master.'
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  lexicon: BDAG
  rationale: 'In this exclamatory context καί has an ascensive force: ''even the demons...''
    This best captures the disciples'' amazement.'
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  - evil spirits
  lexicon: BDAG
  rationale: δαιμόνια refers to hostile spiritual beings. 'The demons' preserves the
    article and standard New Testament usage; 'evil spirits' is interpretive and less
    direct.
- source_word: ὑποτάσσεται
  chosen: submit
  alternatives:
  - are subject
  - are subjected
  lexicon: BDAG
  rationale: Present passive/middle form here conveys ongoing subjection. English
    present 'submit' is idiomatic with a plural neuter subject translated as plural
    and avoids the stiffer 'are subject.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - under us
  lexicon: BDAG
  rationale: Dative after ὑποτάσσω is well represented by 'to us' in English.
- source_word: ἐν τῷ ὀνόματί σου
  chosen: in your name
  alternatives:
  - by your name
  - through your name
  lexicon: BDAG
  rationale: This idiom denotes agency/authority exercised in relation to Jesus' name.
    'In your name' is the standard and sufficiently transparent rendering.
