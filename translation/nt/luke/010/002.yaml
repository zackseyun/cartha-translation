theological_decisions:
- issue: Referent and force of 'Lord of the harvest'
  chosen_reading: Retain the metaphorical title 'Lord of the harvest' without explicating
    the referent.
  alternative_readings:
  - God as the one who owns and directs the mission
  - Jesus implicitly identifying divine authority over the mission
  rationale: The text clearly presents a divine authority who owns the harvest and
    commissions workers, but it does not explicitly unpack the christological implication
    here. Preserving the title without interpretive expansion maintains the text's
    theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
