id: LUK.10.2
reference: Luke 10:2
source:
  edition: SBLGNT
  text: ἔλεγεν ⸀δὲ πρὸς αὐτούς· Ὁ μὲν θερισμὸς πολύς, οἱ δὲ ἐργάται ὀλίγοι· δεήθητε
    οὖν τοῦ κυρίου τοῦ θερισμοῦ ὅπως ⸂ἐργάτας ἐκβάλῃ⸃ εἰς τὸν θερισμὸν αὐτοῦ.
translation:
  text: And he said to them, “The harvest is plentiful, but the workers are few. Therefore
    pray to the Lord of the harvest that he would send out workers into his harvest.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send out forcefully'; the Greek verb can carry a stronger sense than
      simply 'send.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: Imperfect can be rendered more literally as 'was saying,' but in narrative
    introduction idiomatic English prefers simple past 'said' without significant
    loss.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is natural
    English and preserves continuity better than leaving it untranslated.
- source_word: θερισμός
  chosen: harvest
  alternatives:
  - reaping
  lexicon: BDAG
  rationale: Standard sense in both literal and metaphorical usage. 'Harvest' fits
    the agricultural metaphor and common English biblical usage.
- source_word: πολύς
  chosen: plentiful
  alternatives:
  - great
  - abundant
  - large
  lexicon: BDAG
  rationale: With 'harvest,' 'plentiful' is idiomatic English and conveys abundance
    more naturally than 'great' or 'large.'
- source_word: ἐργάται
  chosen: workers
  alternatives:
  - laborers
  - workmen
  lexicon: BDAG
  rationale: '''Workers'' is clear modern English and preserves the sense of those
    who do the harvesting. ''Laborers'' is traditional but slightly less natural for
    the target audience.'
- source_word: ὀλίγοι
  chosen: few
  alternatives:
  - not many
  lexicon: BDAG
  rationale: Direct and idiomatic contrast with 'plentiful.'
- source_word: δεήθητε
  chosen: pray
  alternatives:
  - beg
  - implore
  - ask
  lexicon: BDAG
  rationale: Aorist passive deponent imperative carries the sense of earnest petition.
    'Pray' fits the religious context and avoids overstatement while preserving the
    imperative force.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding statement; 'therefore' makes the logic
    explicit in natural English.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the standard rendering and
    best fits both authority and theological resonance here.
- source_word: ὅπως
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the prayer. 'That' is concise and natural
    in English after 'pray.'
- source_word: ἐκβάλῃ
  chosen: would send out
  alternatives:
  - may send out
  - would thrust out
  - would cast out
  lexicon: BDAG
  rationale: ἐκβάλλω is stronger than a bare 'send,' often meaning 'drive out' or
    'send out.' In this context, 'send out' preserves the outward movement without
    importing harshness that would sound unnatural in English prayer language. The
    stronger nuance is worth preserving in a footnote.
- source_word: εἰς τὸν θερισμὸν αὐτοῦ
  chosen: into his harvest
  alternatives:
  - into his harvest field
  - for his harvest
  lexicon: BDAG
  rationale: A close rendering of the prepositional phrase. 'Into his harvest' preserves
    the metaphor and possessive force without over-specifying 'field,' which is not
    explicit in the Greek.
