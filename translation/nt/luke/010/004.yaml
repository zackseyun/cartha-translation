theological_decisions:
- issue: Force of the prohibition on greeting others during travel
  chosen_reading: Render as a straightforward prohibition ('greet no one along the
    road') without softening or expanding it.
  alternative_readings:
  - Interpret idiomatically as 'do not be delayed by customary greetings'
  rationale: The Greek gives a direct imperative. The translation preserves that force
    in the main text rather than importing an explanatory paraphrase. The likely cultural
    nuance—that greetings could be lengthy and delay the mission—is better preserved
    in a footnote than in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text says without paraphrastic expansion.'
