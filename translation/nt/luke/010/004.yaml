id: LUK.10.4
reference: Luke 10:4
source:
  edition: SBLGNT
  text: μὴ βαστάζετε βαλλάντιον, μὴ πήραν, ⸀μὴ ὑποδήματα, καὶ μηδένα κατὰ τὴν ὁδὸν
    ἀσπάσησθε.
translation:
  text: Do not carry a money bag, a travel bag, or sandals, and greet no one along
    the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'greet no one on the way.' The sense is likely not a ban on ordinary
      courtesy, but an urgency that leaves no room for time-consuming social greetings
      customary in that culture.
    reason: cultural_note
  - marker: b
    text: '''Travel bag'' could also be rendered ''knapsack'' or simply ''bag.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: βαστάζετε
  chosen: carry
  alternatives:
  - take
  - bear
  lexicon: BDAG
  rationale: βαστάζω commonly means to carry or bear. In this travel-instruction context,
    'carry' is the most natural modern English equivalent and fits the prohibition
    on bringing supplies.
- source_word: βαλλάντιον
  chosen: money bag
  alternatives:
  - purse
  - wallet
  lexicon: BDAG
  rationale: Refers to a bag for money. 'Money bag' is clearer than 'purse' in contemporary
    English and avoids gendered or potentially misleading modern associations.
- source_word: πήραν
  chosen: travel bag
  alternatives:
  - bag
  - knapsack
  lexicon: BDAG
  rationale: πήρα denotes a bag used for provisions on a journey. 'Travel bag' communicates
    the function clearly in readable modern English; 'knapsack' is possible but less
    natural for many readers.
- source_word: ὑποδήματα
  chosen: sandals
  alternatives:
  - shoes
  - footwear
  lexicon: BDAG
  rationale: ὑπόδημα refers to what is worn on the feet, often specifically sandals
    in the ancient Mediterranean setting. 'Sandals' best fits the historical context
    and common Gospel usage.
- source_word: μηδένα
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Accusative singular of μηδείς, functioning as the object of the greeting
    prohibition. 'No one' is standard, clear English.
- source_word: κατὰ τὴν ὁδόν
  chosen: along the road
  alternatives:
  - on the way
  - along the way
  lexicon: BDAG
  rationale: The phrase literally means 'according to the road/along the road,' idiomatically
    referring to travel en route. 'Along the road' preserves the concrete travel imagery
    while remaining natural English.
- source_word: ἀσπάσησθε
  chosen: greet
  alternatives:
  - embrace
  - exchange greetings with
  lexicon: BDAG
  rationale: ἀσπάζομαι means to greet or welcome. In this missionary-instruction context,
    'greet' is the appropriate concise rendering; the point is not forbidding politeness
    absolutely but discouraging time-consuming social greetings.
