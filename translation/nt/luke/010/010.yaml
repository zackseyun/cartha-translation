id: LUK.10.10
reference: Luke 10:10
source:
  edition: SBLGNT
  text: εἰς ἣν δ’ ἂν πόλιν ⸀εἰσέλθητε καὶ μὴ δέχωνται ὑμᾶς, ἐξελθόντες εἰς τὰς πλατείας
    αὐτῆς εἴπατε·
translation:
  text: But whatever city you enter and they do not receive you, go out into its streets
    and say,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its public squares' or 'its broad streets.' The Greek πλατείας refers
      to open, public thoroughfares.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν πόλιν
  chosen: whatever city
  alternatives:
  - any city
  - the city into which
  lexicon: BDAG
  rationale: The relative construction with ἄν is indefinite/generic, referring to
    any case that may arise. 'Whatever city' captures the open-ended conditional sense
    more naturally than a more wooden rendering.
- source_word: εἰσέλθητε
  chosen: you enter
  alternatives:
  - you go into
  - you come into
  lexicon: BDAG
  rationale: Aorist subjunctive in a conditional-relative clause; 'enter' is concise
    and idiomatic in English while preserving the movement into the city.
- source_word: μὴ δέχωνται ὑμᾶς
  chosen: they do not receive you
  alternatives:
  - they do not welcome you
  - they do not accept you
  lexicon: BDAG
  rationale: δέχομαι here denotes receiving or welcoming the messengers. 'Receive'
    preserves the broader sense and echoes mission-language in the immediate context;
    'welcome' is possible but slightly more interpretive.
- source_word: ἐξελθόντες
  chosen: go out
  alternatives:
  - having gone out
  - leave
  lexicon: BDAG
  rationale: 'The participle is attendant/circumstantial before the imperative εἴπατε.
    English commonly renders this with a coordinate imperative sense: ''go out ...
    and say.'' This preserves the sequence without awkward literalism.'
- source_word: τὰς πλατείας αὐτῆς
  chosen: its streets
  alternatives:
  - its broad streets
  - its public squares
  lexicon: BDAG
  rationale: πλατεῖα can refer to broad streets or open public streets/squares. 'Streets'
    is the most natural English in this context, while still fitting the public setting
    where a pronouncement is made. The nuance 'public squares' is worth preserving
    in a footnote.
- source_word: εἴπατε
  chosen: say
  alternatives:
  - speak
  - declare
  lexicon: BDAG
  rationale: Aorist imperative of λέγω; 'say' is the straightforward and idiomatic
    command introducing the quoted speech in the next verse.
