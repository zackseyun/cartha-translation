theological_decisions:
- issue: Sense of the kingdom announcement
  chosen_reading: The proclamation announces God's saving reign as having drawn near
    in the mission of Jesus' messengers, without specifying a fully realized or exclusively
    future eschatology.
  alternative_readings:
  - The kingdom is fully present now
  - The kingdom is only imminently future
  rationale: The perfect Ἤγγικεν expresses nearness/present relevance, but the verse
    itself does not force a complete resolution of inaugurated-versus-future kingdom
    theology. The translation preserves that tension by rendering the phrase straightforwardly.
  doctrine_reference: Preserve theological tension rather than resolve it.
