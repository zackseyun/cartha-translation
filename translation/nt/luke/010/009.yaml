id: LUK.10.9
reference: Luke 10:9
source:
  edition: SBLGNT
  text: καὶ θεραπεύετε τοὺς ἐν αὐτῇ ἀσθενεῖς, καὶ λέγετε αὐτοῖς· Ἤγγικεν ἐφ’ ὑμᾶς
    ἡ βασιλεία τοῦ θεοῦ.
translation:
  text: And heal the sick in it, and say to them, ‘The kingdom of God has come near
    to you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has drawn near to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεραπεύετε
  chosen: heal
  alternatives:
  - cure
  - care for
  lexicon: BDAG
  rationale: Present active imperative, calling for ongoing action. 'Heal' best fits
    the immediate context of ministry to the sick and is the most natural English
    equivalent here; 'care for' is too broad, and 'cure' can sound overly absolute.
- source_word: τοὺς ἐν αὐτῇ ἀσθενεῖς
  chosen: the sick in it
  alternatives:
  - those in it who are sick
  - the weak in it
  lexicon: BDAG
  rationale: ἀσθενεῖς can mean 'weak' or 'sick'; in this mission context with θεραπεύετε,
    physical illness is primary, so 'the sick' is the clearest rendering. ἐν αὐτῇ
    refers back to the town/city of the previous verse, hence 'in it.'
- source_word: λέγετε αὐτοῖς
  chosen: say to them
  alternatives:
  - tell them
  lexicon: BDAG
  rationale: A straightforward imperative of speech. 'Say to them' preserves the verbal
    simplicity and directness of λέγετε better than the slightly more interpretive
    'tell them.'
- source_word: Ἤγγικεν
  chosen: has come near
  alternatives:
  - has drawn near
  - is near
  lexicon: BDAG
  rationale: Perfect tense indicates a completed approach with present relevance.
    'Has come near' communicates both the event and its current significance in idiomatic
    modern English. 'Has drawn near' is more traditional but less natural; 'is near'
    underrepresents the perfect aspect.
- source_word: ἐφ’ ὑμᾶς
  chosen: to you
  alternatives:
  - upon you
  - against you
  lexicon: BDAG
  rationale: With ἐγγίζω in this proclamation formula, ἐπί + accusative conveys movement/arrival
    in relation to the hearers. 'To you' is the most natural English expression here.
    'Upon you' is more literal but stilted; 'against you' is contextually inappropriate
    in this positive mission announcement.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering. 'Kingdom
    of God' preserves the established biblical phrase while remaining understandable.
    'Reign of God' highlights dynamic rule but is less idiomatic and may narrow the
    semantic range too much.
