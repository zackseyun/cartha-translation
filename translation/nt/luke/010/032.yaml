id: LUK.10.32
reference: Luke 10:32
source:
  edition: SBLGNT
  text: ὁμοίως δὲ καὶ ⸀Λευίτης κατὰ τὸν τόπον ἐλθὼν καὶ ἰδὼν ἀντιπαρῆλθεν.
translation:
  text: Likewise, a Levite also came to the place, and when he saw him, he passed
    by on the opposite side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by that place' or 'to that spot.'
    reason: lexical_alternative
  - marker: b
    text: The verb can be rendered simply 'passed by,' but the compound form suggests
      deliberate avoidance, hence 'passed by on the opposite side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Adverb linking this action to the prior example of the priest; 'Likewise'
    is concise and natural while preserving the comparative force.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective. Its discourse force is adequately
    conveyed in English by punctuation and sentence flow, so it is not separately
    translated.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: With Λευίτης, καί adds the Levite as another example parallel to the
    priest. 'Also' captures the additive force clearly.
- source_word: Λευίτης
  chosen: a Levite
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish cultic class; the indefinite
    article fits English narrative style.
- source_word: κατὰ τὸν τόπον
  chosen: to the place
  alternatives:
  - by that place
  - to that spot
  lexicon: BDAG
  rationale: The phrase indicates arrival at the location in question. 'To the place'
    is a natural rendering that preserves the sense without over-specifying.
- source_word: ἐλθὼν
  chosen: came
  alternatives:
  - having come
  - arrived
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in English it is best smoothed
    into the finite verb 'came' before the next action.
- source_word: ἰδὼν
  chosen: when he saw him
  alternatives:
  - and seeing
  - after seeing
  lexicon: BDAG
  rationale: The participle marks attendant circumstance prior to the main action.
    'When he saw him' makes the temporal sequence explicit and supplies 'him' from
    context, which English requires.
- source_word: ἀντιπαρῆλθεν
  chosen: he passed by on the opposite side
  alternatives:
  - he passed by
  - he went past opposite him
  lexicon: BDAG
  rationale: The compound verb includes the idea of passing by in avoidance, not merely
    moving past. 'On the opposite side' preserves the force of deliberate avoidance
    familiar from the context.
