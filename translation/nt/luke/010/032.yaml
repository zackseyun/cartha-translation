theological_decisions:
- issue: Social-religious identity of Λευίτης
  chosen_reading: Levite is retained as a transliterated group designation rather
    than generalized as 'temple assistant' or similar.
  alternative_readings:
  - temple servant
  - member of the tribe of Levi
  rationale: The verse identifies a recognizable Jewish religious figure in parallel
    with the priest. Transliteration preserves the historical and narrative specificity
    without importing extra explanation into the main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
