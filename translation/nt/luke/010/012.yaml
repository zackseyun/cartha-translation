id: LUK.10.12
reference: Luke 10:12
source:
  edition: SBLGNT
  text: λέγω ὑμῖν ὅτι Σοδόμοις ἐν τῇ ἡμέρᾳ ἐκείνῃ ἀνεκτότερον ἔσται ἢ τῇ πόλει ἐκείνῃ.
translation:
  text: I tell you, it will be more bearable for Sodom on that day than for that city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more tolerable.' The Greek comparative ἀνεκτότερον can be rendered either
      way.
    reason: lexical_alternative
  - marker: b
    text: '''On that day'' refers to the day of divine judgment; some parallel passages
      state this explicitly.'
    reason: cross_reference
lexical_decisions:
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Present indicative used as a direct solemn assertion. 'I tell you' is
    idiomatic modern English while preserving the force of direct address.
- source_word: Σοδόμοις
  chosen: for Sodom
  alternatives:
  - for the people of Sodom
  - for Sodom's inhabitants
  lexicon: BDAG
  rationale: Although the Greek is dative plural ('to/for Sodomites' or 'for Sodom'),
    English commonly uses the place name metonymically. 'Sodom' is concise and natural,
    preserving the corporate reference without over-specifying.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Standard temporal idiom. 'On that day' is natural English and preserves
    the eschatological/judicial reference without importing extra wording such as
    'judgment' not present in this verse.
- source_word: ἀνεκτότερον
  chosen: more bearable
  alternatives:
  - more tolerable
  lexicon: BDAG
  rationale: Comparative adjective meaning more endurable or tolerable. 'More bearable'
    is clearer in contemporary English, while 'more tolerable' remains a viable traditional
    alternative.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Future of 'to be' introducing the comparative judgment statement. 'Will'
    is preferred for readable modern English.
- source_word: ἢ τῇ πόλει ἐκείνῃ
  chosen: than for that city
  alternatives:
  - than for that town
  lexicon: BDAG
  rationale: Dative of comparison after the impersonal future expression. 'City' is
    the straightforward rendering of πόλις here; 'that city' preserves the demonstrative
    reference to the previously addressed locality.
