theological_decisions:
- issue: Nature of 'that day'
  chosen_reading: Retain the phrase 'on that day' without expanding it to 'on the
    day of judgment' in the main text.
  alternative_readings:
  - on the day of judgment
  rationale: The immediate context implies final judgment, but this verse itself says
    only 'on that day.' Preserving the wording avoids importing explicit content from
    nearby parallels while maintaining the judicial force.
  doctrine_reference: Preserve theological tension rather than resolve it.
