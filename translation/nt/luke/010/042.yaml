theological_decisions:
- issue: Interpretation of 'few things ... or one' in relation to Martha's service
    and Mary's choice
  chosen_reading: Retain the wording as a statement about what is necessary without
    specifying whether Jesus means few dishes, one dish, or one essential thing.
  alternative_readings:
  - Only a few dishes are needed, or even one dish.
  - Only one thing is necessary.
  rationale: The Greek wording allows both a practical reference to meal preparation
    and a broader spiritual contrast. The translation preserves the textual tension
    rather than resolving it beyond what the wording warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
