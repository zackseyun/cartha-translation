id: LUK.10.42
reference: Luke 10:42
source:
  edition: SBLGNT
  text: ⸂ὀλίγων δέ ἐστιν χρεία ἢ ἑνός⸃· ⸂Μαριὰμ γὰρ⸃ τὴν ἀγαθὴν μερίδα ἐξελέξατο ἥτις
    οὐκ ἀφαιρεθήσεται ⸀αὐτῆς.
translation:
  text: But few things are needed—or one. For Mary has chosen the good portion, which
    will not be taken away from her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'only one thing is necessary.' The Greek can also be understood more
      specifically in the meal setting as 'few dishes are needed—or only one.'
    reason: alternative_reading
  - marker: b
    text: Or, 'the good part.' 'Portion' may intentionally echo both a meal portion
      and a figurative share in what is truly valuable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγων
  chosen: few things
  alternatives:
  - few
  - a few things
  lexicon: BDAG
  rationale: Genitive plural with χρεία idiomatically expresses that only a small
    number of things are necessary. Supplying 'things' makes the English natural while
    preserving the likely reference to the immediate context of meal preparations.
- source_word: χρεία
  chosen: are needed
  alternatives:
  - is need of
  - is necessary
  lexicon: BDAG
  rationale: The construction ἐστιν χρεία is idiomatic for necessity/need. 'Are needed'
    gives clear modern English and matches the plural sense with ὀλίγων.
- source_word: ἢ ἑνός
  chosen: or one
  alternatives:
  - or only one thing
  lexicon: BDAG
  rationale: The phrase is textually and syntactically difficult, but the plain sense
    contrasts 'few things' with 'one.' 'Or one' preserves the compactness and ambiguity
    of the Greek without over-interpreting whether 'one dish' or 'one thing' is intended.
- source_word: Μαριὰμ
  chosen: Mary
  rationale: Standard English transliteration of the personal name Μαριάμ.
- source_word: τὴν ἀγαθὴν μερίδα
  chosen: the good portion
  alternatives:
  - the better portion
  - the good part
  lexicon: BDAG
  rationale: 'μερίς commonly means ''portion, share, part.'' ''Portion'' preserves
    the likely double sense: a meal portion in the immediate setting and a figurative
    share in what truly matters. ''Good'' reflects ἀγαθή directly; ''better'' would
    import a comparative not present in the Greek.'
- source_word: ἐξελέξατο
  chosen: has chosen
  alternatives:
  - chose
  lexicon: BDAG
  rationale: Aorist middle indicates Mary's deliberate personal choice. English present
    perfect works well in context, highlighting the abiding result of her decision
    as the next clause states it will not be taken away.
- source_word: ἥτις
  chosen: which
  alternatives:
  - and it
  - that which
  lexicon: BDAG
  rationale: The qualitative relative pronoun points back to the chosen portion and
    introduces its defining characteristic. 'Which' is natural English and preserves
    the connection.
- source_word: οὐκ ἀφαιρεθήσεται αὐτῆς
  chosen: will not be taken away from her
  alternatives:
  - will not be removed from her
  lexicon: BDAG
  rationale: Future passive of ἀφαιρέω naturally means removal or taking away. 'Taken
    away from her' is idiomatic and preserves the promise of permanence.
