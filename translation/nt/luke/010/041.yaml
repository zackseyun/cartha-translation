id: LUK.10.41
reference: Luke 10:41
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ εἶπεν αὐτῇ ὁ ⸀κύριος· Μάρθα Μάρθα, μεριμνᾷς καὶ ⸀θορυβάζῃ περὶ
    πολλά,
translation:
  text: But the Lord answered her, “Martha, Martha, you are anxious and troubled about
    many things,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worried and upset.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: A common participial idiom with εἶπεν in narrative, naturally rendered
    in English as a finite verb, 'answered,' rather than a more wooden 'having answered.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks mild contrast or transition from Martha's complaint to Jesus' response.
    'But' best reflects the responsive contrast in context.
- source_word: εἶπεν
  chosen: answered
  alternatives:
  - said
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς as an idiomatic expression. English typically
    collapses the participle + verb into 'answered' rather than 'answered and said.'
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - to her
  lexicon: BDAG
  rationale: The indirect object is naturally expressed in English after 'answered'
    as 'answered her,' though 'answered to her' would be unnatural.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' In Luke's narrative this is also the standard christological/narrative
    title.
- source_word: Μάρθα Μάρθα
  chosen: Martha, Martha
  lexicon: BDAG
  rationale: The repeated vocative is preserved to reflect the tenderness and emphasis
    of direct address.
- source_word: μεριμνᾷς
  chosen: you are anxious
  alternatives:
  - you are worried
  - you are concerned
  lexicon: BDAG
  rationale: Conveys inward anxiety or worry. 'Anxious' preserves the stronger emotional
    sense without becoming overly colloquial.
- source_word: θορυβάζῃ
  chosen: troubled
  alternatives:
  - disturbed
  - upset
  - agitated
  lexicon: BDAG
  rationale: This verb suggests being inwardly disturbed or in turmoil. 'Troubled'
    pairs well with 'anxious' and preserves the distinction between worry and agitation.
- source_word: περὶ πολλά
  chosen: about many things
  alternatives:
  - about many matters
  - over many things
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'Many things'
    is idiomatic and preserves the broad scope of Martha's concerns.
