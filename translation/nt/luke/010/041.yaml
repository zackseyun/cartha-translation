- issue: Rendering of κύριος as a title for Jesus
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In Luke this title carries
    both respectful and christological force; 'master' would under-translate that
    resonance here.
