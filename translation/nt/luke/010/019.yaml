id: LUK.10.19
reference: Luke 10:19
source:
  edition: SBLGNT
  text: ἰδοὺ ⸀δέδωκα ὑμῖν τὴν ἐξουσίαν τοῦ πατεῖν ἐπάνω ὄφεων καὶ σκορπίων, καὶ ἐπὶ
    πᾶσαν τὴν δύναμιν τοῦ ἐχθροῦ, καὶ οὐδὲν ὑμᾶς οὐ μὴ ⸀ἀδικήσῃ.
translation:
  text: Behold, I have given you the authority to tread on snakes and scorpions, and
    over all the power of the enemy, and nothing will ever harm you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'serpents and scorpions.' The imagery may also evoke hostile spiritual
      forces in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'nothing will ever injure you' or 'nothing will by any means harm you.'
      The Greek uses an emphatic double negative.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδού
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the attention-getting force of the discourse marker. 'Behold'
    is slightly elevated but still understandable and preserves the emphatic introduction
    better than omitting it.
- source_word: δέδωκα
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with present effect; 'I have
    given' best preserves that nuance.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or right, distinct from
    δύναμις later in the verse. 'Authority' preserves that contrast.
- source_word: τοῦ πατεῖν
  chosen: to tread
  alternatives:
  - to walk on
  - to trample
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/content of the granted authority.
    'To tread' is concise and preserves the imagery without over-intensifying to 'trample'.
- source_word: ἐπάνω ὄφεων καὶ σκορπίων
  chosen: on snakes and scorpions
  alternatives:
  - over snakes and scorpions
  - upon serpents and scorpions
  lexicon: BDAG
  rationale: Natural English for the spatial image. 'Snakes' is more readable modern
    English than 'serpents' while preserving the literal referent.
- source_word: ἐπὶ πᾶσαν τὴν δύναμιν
  chosen: over all the power
  alternatives:
  - against all the power
  - over the whole power
  lexicon: BDAG
  rationale: Here ἐπί with accusative conveys extension or dominion in context. 'Over
    all the power' preserves the sense of superiority over the enemy's might.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - might
  - force
  lexicon: BDAG
  rationale: 'Maintains the lexical distinction from ἐξουσία earlier: the disciples
    receive ''authority'' over the enemy''s ''power.'''
- source_word: τοῦ ἐχθροῦ
  chosen: the enemy
  alternatives:
  - the adversary
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the singular personalizing
    force. In context it likely refers to Satan, but the translation should not over-specify
    beyond the text.
- source_word: οὐδὲν ... οὐ μὴ ἀδικήσῃ
  chosen: nothing will ever harm you
  alternatives:
  - nothing shall by any means injure you
  - nothing will wrong you
  lexicon: BDAG
  rationale: The combination οὐδέν with οὐ μή is emphatically negative. 'Will ever
    harm' captures both the future sense and emphatic denial in natural English. 'Harm'
    fits the context better than the more general 'wrong' or 'injure'.
