theological_decisions:
- issue: Referent of 'the enemy'
  chosen_reading: Rendered generically as 'the enemy' without identifying Satan in
    the main text.
  alternative_readings:
  - Satan
  - the devil
  rationale: The immediate context of demonic submission suggests Satanic opposition,
    but the Greek text itself says only 'the enemy.' To avoid importing a doctrinally
    true but textually unstated identification into the translation, the broader term
    is retained.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Literal versus symbolic sense of 'snakes and scorpions'
  chosen_reading: Retained the literal imagery in the main text.
  alternative_readings:
  - A metaphor for demonic forces
  - A mixed literal-symbolic image
  rationale: The wording is plainly literal at the lexical level, though the context
    may invite symbolic or representative interpretation. The translation preserves
    the image and leaves interpretation open.
  doctrine_reference: Preserve theological tension rather than resolve it.
