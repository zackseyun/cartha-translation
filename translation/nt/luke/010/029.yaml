id: LUK.10.29
reference: Luke 10:29
source:
  edition: SBLGNT
  text: Ὁ δὲ θέλων ⸀δικαιῶσαι ἑαυτὸν εἶπεν πρὸς τὸν Ἰησοῦν· Καὶ τίς ἐστίν μου πλησίον;
translation:
  text: But he, wanting to justify himself, said to Jesus, “And who is my neighbor?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who counts as my neighbor?'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλων
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: Present participle expressing the man's motive or intent. 'Wanting' is
    natural modern English and preserves the participial sense without overformal
    stiffness.
- source_word: δικαιῶσαι
  chosen: to justify
  alternatives:
  - to declare righteous
  - to vindicate
  lexicon: BDAG
  rationale: In this context the verb means to show oneself to be in the right before
    others, not necessarily a full technical Pauline sense of forensic justification.
    'To justify himself' is the most idiomatic and contextually accurate rendering,
    while preserving the lexical link to δικαιόω.
- source_word: ἑαυτὸν
  chosen: himself
  lexicon: BDAG
  rationale: Reflexive pronoun referring back to the speaker; standard English reflexive
    rendering.
- source_word: εἶπεν πρὸς τὸν Ἰησοῦν
  chosen: said to Jesus
  alternatives:
  - said to Yeshua
  - spoke to Jesus
  lexicon: BDAG
  rationale: Straightforward narrative speech formula. 'Jesus' follows standard English
    transliteration convention for the personal name Ἰησοῦς.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: The conjunction is retained rather than omitted, since it introduces
    the follow-up question and reflects the Greek discourse flow. 'And' is simple
    and sufficiently natural in dialogue.
- source_word: τίς ἐστίν μου πλησίον
  chosen: who is my neighbor
  alternatives:
  - who is my fellow man
  - who counts as my neighbor
  lexicon: BDAG
  rationale: πλησίον here functions substantivally for 'neighbor,' the standard and
    contextually appropriate rendering in light of the Torah citation in the surrounding
    context. 'Who is my neighbor?' preserves the directness of the question; 'who
    counts as my neighbor' is interpretive and therefore left as an alternative only.
