theological_decisions:
- issue: Sense of δικαιῶσαι ἑαυτόν
  chosen_reading: The phrase is rendered as the man's attempt to show himself to be
    in the right.
  alternative_readings:
  - to justify himself in a broader moral sense
  - to vindicate himself before the crowd
  rationale: The immediate context is a legal-ethical exchange, and the phrase signals
    self-exoneration rather than introducing a technical doctrine of justification.
    The translation preserves the lexical form 'justify' while allowing readers to
    hear the narrative irony.
  doctrine_reference: Translation philosophy §1, §3, §5
