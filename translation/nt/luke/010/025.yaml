id: LUK.10.25
reference: Luke 10:25
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ νομικός τις ἀνέστη ἐκπειράζων ⸀αὐτὸν λέγων· Διδάσκαλε, τί ποιήσας
    ζωὴν αἰώνιον κληρονομήσω;
translation:
  text: And behold, a lawyer stood up, testing him, saying, “Teacher, what must I
    do to inherit eternal life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an expert in the law.' The Greek term refers to a specialist in the
      Jewish law.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: BDAG
  rationale: Retains the discourse marker and attention-getting force of ἰδού rather
    than omitting it. 'Behold' is slightly formal but still transparent and preserves
    the narrative vividness better than flattening it to nothing.
- source_word: νομικός τις
  chosen: a lawyer
  alternatives:
  - an expert in the law
  - a legal scholar
  lexicon: BDAG
  rationale: νομικός in this context refers to a specialist in the Mosaic law, not
    a modern civil attorney. 'Lawyer' is the traditional concise rendering; the specifically
    Jewish/religious sense is clarified by context. Alternatives are possible, but
    'lawyer' remains readable and idiomatic.
- source_word: ἀνέστη
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb that fits the narrative
    setting and natural English style.
- source_word: ἐκπειράζων αὐτὸν
  chosen: testing him
  alternatives:
  - putting him to the test
  - tempting him
  lexicon: BDAG
  rationale: ἐκπειράζω here indicates testing with hostile or probing intent. 'Testing
    him' is clear modern English. 'Tempting him' could suggest enticement to sin too
    strongly in English, while 'putting him to the test' is more formal.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Keeps the participial flow of the Greek while remaining natural in English.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Διδάσκαλε is best rendered 'Teacher' in contemporary English. 'Master'
    is potentially misleading or archaic in this context.
- source_word: τί ποιήσας
  chosen: what must I do
  alternatives:
  - what, having done, shall I
  - what should I do
  lexicon: BDAG
  rationale: The aorist participle with the future verb expresses the means or prerequisite
    for the result. Idiomatic English requires restructuring. 'What must I do' captures
    the sense without woodenly reproducing the participle.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: Standard and accurate rendering. 'Life of the age' is more literal to
    the adjective's background but less natural here and not required by context.
- source_word: κληρονομήσω
  chosen: inherit
  alternatives:
  - receive as an inheritance
  - obtain
  lexicon: BDAG
  rationale: Preserves the inheritance metaphor present in the Greek, which is theologically
    and narratively significant and should not be flattened to 'get' or 'obtain'.
