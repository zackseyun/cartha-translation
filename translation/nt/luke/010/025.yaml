theological_decisions:
- issue: Sense of νομικός in Second Temple Jewish context
  chosen_reading: Rendered as 'lawyer' meaning a specialist in the law of Moses, not
    a modern secular attorney.
  alternative_readings:
  - expert in the law
  rationale: The verse introduces a figure trained in Torah interpretation. The translation
    keeps the concise traditional term while understanding it within the Jewish legal-religious
    setting.
- issue: Force of τί ποιήσας ... κληρονομήσω
  chosen_reading: Idiomatic English 'what must I do to inherit eternal life?'
  alternative_readings:
  - what shall I do to inherit eternal life?
  - what, having done, will I inherit eternal life?
  rationale: This preserves the man's works-oriented framing without overinterpreting
    it. The translation reflects the Greek syntax's practical sense while remaining
    readable.
  doctrine_reference: Preserve theological tension rather than resolve it.
