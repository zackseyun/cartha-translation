id: LUK.10.3
reference: Luke 10:3
source:
  edition: SBLGNT
  text: ὑπάγετε· ⸀ἰδοὺ ἀποστέλλω ὑμᾶς ὡς ἄρνας ἐν μέσῳ λύκων.
translation:
  text: Go. Look, I am sending you out like lambs among wolves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the midst of wolves.'
    reason: lexical_alternative
  - marker: b
    text: Some familiar English renderings have 'sheep among wolves,' but the Greek
      here specifically says 'lambs.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπάγετε
  chosen: Go
  alternatives:
  - Go on your way
  - Depart
  lexicon: BDAG
  rationale: Second person plural present imperative of ὑπάγω functioning as a commissioning
    command. 'Go' is the most natural concise English imperative here. 'Go on your
    way' is possible but less idiomatic in modern English and unnecessarily expands
    the wording.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Discourse particle drawing attention to what follows. 'Look' preserves
    the deictic force in readable modern English. 'Behold' is too archaic for the
    stated philosophy; 'See' is possible but less idiomatic in this alerting function.
- source_word: ἀποστέλλω
  chosen: am sending ... out
  alternatives:
  - send
  - commission
  lexicon: BDAG
  rationale: Present indicative first singular. In context of mission, English naturally
    expresses the action as 'am sending ... out.' The added 'out' reflects the missional
    force often carried by ἀποστέλλω in context without over-paraphrasing. 'Commission'
    is interpretive and too formal for the immediate action.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object pronoun. English 'you' does not mark number,
    but the plural is clear from context (Jesus addressing the group). No expansion
    such as 'you all' was used in the main text to maintain natural style.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces a comparison, not an identity statement. 'Like' is the clearest
    modern English marker of simile here.
- source_word: ἄρνας
  chosen: lambs
  alternatives:
  - young sheep
  lexicon: BDAG
  rationale: Accusative plural of ἀρήν, meaning 'lamb.' 'Lambs' is the standard and
    vivid English equivalent, preserving the image of vulnerability. 'Young sheep'
    is semantically possible but stylistically weak.
- source_word: ἐν μέσῳ λύκων
  chosen: among wolves
  alternatives:
  - in the midst of wolves
  lexicon: BDAG
  rationale: The phrase literally means 'in the midst of wolves.' 'Among wolves' is
    a natural English rendering that preserves the hostile-surroundings imagery without
    archaic stiffness. The fuller literal alternative is worth preserving in a footnote
    for auditability.
