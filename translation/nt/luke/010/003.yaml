theological_decisions:
- issue: Metaphorical animal imagery for the disciples' mission
  chosen_reading: 'Retain the simile straightforwardly: ''like lambs among wolves'''
  alternative_readings:
  - like sheep among wolves
  rationale: The Greek specifically uses ἄρνας ('lambs'), not the more general πρόβατα
    ('sheep'). Retaining 'lambs' preserves the heightened vulnerability in Jesus'
    warning and avoids harmonizing to similar sayings in other passages.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense over inherited English familiarity.'
