id: LUK.10.38
reference: Luke 10:38
source:
  edition: SBLGNT
  text: ⸂Ἐν δὲ⸃ τῷ πορεύεσθαι ⸀αὐτοὺς αὐτὸς εἰσῆλθεν εἰς κώμην τινά· γυνὴ δέ τις ὀνόματι
    Μάρθα ὑπεδέξατο ⸀αὐτὸν.
translation:
  text: Now as they were traveling along, he entered a certain village, and a woman
    named Martha welcomed him into her home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'welcomed him' or 'received him.' The Greek verb carries
      the sense of receiving someone hospitably as a guest.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ πορεύεσθαι αὐτοὺς
  chosen: Now as they were traveling along
  alternatives:
  - While they were going
  - As they went
  - Now as they were on their way
  lexicon: BDAG
  rationale: The construction ἐν + articular infinitive expresses contemporaneous
    action ('while/as ...'). δέ is rendered with a light discourse marker ('Now')
    to preserve narrative flow without overtranslating. The plural αὐτούς indicates
    the group traveling, not Jesus alone.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek, distinguishing Jesus from the plural
    'they.' English can preserve the sense adequately with 'he' in context; explicitly
    supplying 'Jesus' would be interpretive rather than necessary.
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι is straightforwardly rendered 'entered.' This is
    natural modern English and keeps the narrative movement concise.
- source_word: εἰς κώμην τινά
  chosen: a certain village
  alternatives:
  - a village
  - some village
  lexicon: BDAG
  rationale: κώμη denotes a village rather than a town in most contexts. τινά adds
    indefiniteness with a slight specificity ('a certain'), which is worth preserving
    because Luke often uses this idiom narratively.
- source_word: γυνὴ δέ τις
  chosen: and a woman
  alternatives:
  - now a woman
  - but a woman
  - and a certain woman
  lexicon: BDAG
  rationale: δέ here advances the narrative with mild contrast/new participant introduction.
    'And a woman' is idiomatic English. The indefiniteness of τις is sufficiently
    conveyed without forcing 'a certain woman,' since the following naming identifies
    her.
- source_word: ὀνόματι Μάρθα
  chosen: named Martha
  alternatives:
  - by the name Martha
  lexicon: BDAG
  rationale: This dative idiom is naturally rendered 'named Martha.' The personal
    name is transliterated in keeping with the translation philosophy.
- source_word: ὑπεδέξατο
  chosen: welcomed him into her home
  alternatives:
  - received him
  - welcomed him
  lexicon: BDAG
  rationale: ὑποδέχομαι can mean receive as a guest or welcome hospitably. In this
    context of Martha hosting Jesus, 'welcomed him' best conveys the hospitable nuance.
    'Into her home' is supplied because the verb in this context commonly implies
    receiving someone as a guest, and it makes explicit in natural English what is
    contextually inherent.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; simple pronoun is sufficient and natural.
