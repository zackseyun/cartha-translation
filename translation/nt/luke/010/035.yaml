id: LUK.10.35
reference: Luke 10:35
source:
  edition: SBLGNT
  text: καὶ ἐπὶ τὴν ⸀αὔριον ἐκβαλὼν ⸂δύο δηνάρια ἔδωκεν⸃ τῷ πανδοχεῖ καὶ ⸀εἶπεν· Ἐπιμελήθητι
    αὐτοῦ, καὶ ὅ τι ἂν προσδαπανήσῃς ἐγὼ ἐν τῷ ἐπανέρχεσθαί με ἀποδώσω σοι.
translation:
  text: And on the next day, taking out two denarii, he gave them to the innkeeper
    and said, ‘Take care of him, and whatever more you spend, I will repay you when
    I return.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard Roman silver coin, roughly a day's wage for a
      laborer.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ τὴν αὔριον
  chosen: on the next day
  alternatives:
  - the next day
  - on the morrow
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning the following day. 'On the next
    day' preserves the prepositional force while remaining natural modern English.
- source_word: ἐκβαλών
  chosen: taking out
  alternatives:
  - bringing out
  - pulling out
  lexicon: BDAG
  rationale: The participle here describes producing money from one's possession.
    'Taking out' is natural in context and avoids the overly forceful literal sense
    'casting out.'
- source_word: δύο δηνάρια
  chosen: two denarii
  alternatives:
  - two denarius coins
  - two days' wages
  lexicon: BDAG
  rationale: The Greek names the coin directly. 'Denarii' preserves the historical
    monetary term better than interpretive paraphrase such as 'two days' wages.'
- source_word: πανδοχεῖ
  chosen: innkeeper
  alternatives:
  - host
  - keeper of the inn
  lexicon: BDAG
  rationale: πανδοχεύς refers to the person managing the lodging place, not the building
    itself. 'Innkeeper' is the standard and precise rendering.
- source_word: Ἐπιμελήθητι αὐτοῦ
  chosen: Take care of him
  alternatives:
  - Care for him
  - Look after him
  lexicon: BDAG
  rationale: The aorist middle imperative calls for attentive care. 'Take care of
    him' is clear, natural, and adequately reflects the imperative force.
- source_word: ὅ τι ἂν προσδαπανήσῃς
  chosen: whatever more you spend
  alternatives:
  - whatever additional expense you incur
  - whatever you spend besides this
  lexicon: BDAG
  rationale: The construction expresses an indefinite amount of additional expenditure.
    'Whatever more you spend' is concise and faithful to both the indefiniteness and
    the comparative sense of προσ-.
- source_word: ἐν τῷ ἐπανέρχεσθαί με
  chosen: when I return
  alternatives:
  - upon my return
  - as I come back
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is a temporal construction. 'When I
    return' renders the sense naturally in English.
- source_word: ἀποδώσω σοι
  chosen: I will repay you
  alternatives:
  - I will pay you back
  - I will reimburse you
  lexicon: BDAG
  rationale: ἀποδίδωμι here means to pay back or repay. 'Repay' is straightforward
    and fits the financial context without sounding overly technical.
