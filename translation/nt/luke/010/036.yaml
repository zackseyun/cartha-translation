theological_decisions:
- issue: Ethical focus of the question in the Good Samaritan parable
  chosen_reading: Render γίνομαι with 'have become' to preserve Jesus' reframing from
    identifying one's neighbor to becoming a neighbor.
  alternative_readings:
  - Render more statically as 'was neighbor to'
  rationale: The Greek wording intentionally shifts the issue from the object of neighbor-love
    to the subject who acts neighborly. Preserving 'become' maintains the theological
    and ethical force of the passage without adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §3, §5
