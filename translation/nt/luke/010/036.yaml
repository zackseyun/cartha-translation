id: LUK.10.36
reference: Luke 10:36
source:
  edition: SBLGNT
  text: ⸀τίς τούτων τῶν τριῶν πλησίον δοκεῖ σοι γεγονέναι τοῦ ἐμπεσόντος εἰς τοὺς
    λῃστάς;
translation:
  text: Which of these three seems to you to have become a neighbor to the man who
    fell among the robbers?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who of these three do you think was neighbor to the man who fell among
      the robbers?' The Greek more literally says 'seems to you to have become a neighbor,'
      highlighting the act of becoming neighborly.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: Which
  alternatives:
  - Who
  lexicon: BDAG
  rationale: Introduces a selection from a defined set ('of these three'), so 'Which'
    is more idiomatic and precise in English than 'Who.'
- source_word: τούτων τῶν τριῶν
  chosen: of these three
  alternatives:
  - of these three men
  lexicon: BDAG
  rationale: A straightforward partitive genitive. 'Men' is not explicit in the Greek
    and is therefore omitted.
- source_word: πλησίον
  chosen: a neighbor
  alternatives:
  - neighbor
  lexicon: BDAG
  rationale: 'Although πλησίον can function adverbially (''near'') or substantivally
    (''neighbor''), here it is predicate-like with γεγονέναι and clearly means ''neighbor.''
    The English article makes the clause natural: ''have become a neighbor to.'''
- source_word: δοκεῖ σοι
  chosen: seems to you
  alternatives:
  - do you think
  - appears to you
  lexicon: BDAG
  rationale: This preserves the explicit δοκεῖ ('seems') and σοι ('to you') without
    collapsing it into the more interpretive 'do you think.' It keeps Jesus' wording
    slightly more formal and reflective.
- source_word: γεγονέναι
  chosen: to have become
  alternatives:
  - to be
  - to prove to be
  lexicon: BDAG
  rationale: 'Perfect infinitive of γίνομαι points to becoming or coming to be, not
    merely static being. ''Have become'' preserves the verbal aspect and the ethical
    reversal in the parable: the question is not ''Who is my neighbor?'' but ''Who
    became neighbor?''.'
- source_word: τοῦ ἐμπεσόντος
  chosen: to the man who fell
  alternatives:
  - to the one who fell
  - to the man who fell in
  lexicon: BDAG
  rationale: The genitive participle with article refers to the victim. 'The man'
    is contextually natural in English because the preceding story concerns a specific
    wounded man. 'Fell' is retained rather than paraphrased.
- source_word: εἰς τοὺς λῃστάς
  chosen: among the robbers
  alternatives:
  - into the hands of robbers
  - among bandits
  lexicon: BDAG
  rationale: Literally 'into the robbers,' an idiom meaning to fall among or into
    the power of robbers. 'Among the robbers' is a standard, accurate English idiom
    that avoids adding 'hands of,' which is interpretive though contextually valid.
