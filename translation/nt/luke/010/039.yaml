id: LUK.10.39
reference: Luke 10:39
source:
  edition: SBLGNT
  text: καὶ τῇδε ἦν ἀδελφὴ καλουμένη ⸀Μαριάμ, ἣ καὶ ⸂παρακαθεσθεῖσα πρὸς⸃ τοὺς πόδας
    τοῦ ⸀Ἰησοῦ ἤκουεν τὸν λόγον αὐτοῦ.
translation:
  text: And she had a sister called Mary, who also sat at the Lord’s feet and was
    listening to his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Jesus' instead of 'the Lord.'
    reason: textual_variant
lexical_decisions:
- source_word: τῇδε
  chosen: she
  alternatives:
  - this woman
  - this one
  lexicon: BDAG
  rationale: Dative feminine singular demonstrative referring back to Martha in the
    previous verse. English idiom prefers the pronoun 'she' rather than the more wooden
    'to this woman/one.'
- source_word: ἀδελφὴ
  chosen: sister
  lexicon: BDAG
  rationale: Straightforward kinship term; 'sister' is the natural and accurate rendering.
- source_word: καλουμένη Μαριάμ
  chosen: called Mary
  alternatives:
  - named Mary
  lexicon: BDAG
  rationale: The participle καλουμένη commonly introduces a person's name. 'Called
    Mary' is slightly more formal and close to the Greek, while remaining natural
    English.
- source_word: παρακαθεσθεῖσα πρὸς τοὺς πόδας
  chosen: sat at ... feet
  alternatives:
  - having seated herself beside ... feet
  - sat beside ... feet
  lexicon: BDAG
  rationale: The aorist participle from παρακαθέζομαι with πρὸς τοὺς πόδας conveys
    taking a seated position at someone's feet. In English, 'sat at [someone's] feet'
    is both idiomatic and faithful, and it preserves the disciple-like posture without
    over-paraphrase.
- source_word: τοῦ Ἰησοῦ
  chosen: the Lord
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: A well-attested variant reads 'the Lord' here rather than 'Jesus,' and
    the phrase 'at the Lord's feet' is strongly supported and contextually coherent.
    This follows the contested reading in the main text while preserving the alternative
    in a footnote.
- source_word: ἤκουεν
  chosen: was listening
  alternatives:
  - listened
  - kept listening
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action. 'Was listening' best captures
    the progressive aspect in natural English.
- source_word: τὸν λόγον αὐτοῦ
  chosen: his word
  alternatives:
  - what he was saying
  - his teaching
  - his message
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' spoken instruction. 'His word' is a close
    rendering that preserves the Greek term's breadth without narrowing it too quickly
    to 'teaching' or 'message.'
