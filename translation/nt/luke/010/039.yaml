- issue: Textual reading for the name/title in the phrase 'at the feet of ...'
  chosen_reading: the Lord
  alternative_readings:
  - Jesus
  rationale: The main text uses 'the Lord' to reflect the adopted Greek reading and
    because κύριος is the default rendering for this title per doctrine. The alternative
    'Jesus' is preserved in a footnote because it is a meaningful textual variant
    affecting whether the verse emphasizes title or personal name.
