theological_decisions:
- issue: Gendered pronoun in τοῦ μισθοῦ αὐτοῦ
  chosen_reading: his wages
  alternative_readings:
  - their wages
  - the wages due him
  rationale: The Greek uses a masculine singular pronoun agreeing with ὁ ἐργάτης.
    Per the doctrine's gender-accurate policy, the masculine form is retained rather
    than neutralized. The phrase is generic in force but grammatically singular masculine.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
