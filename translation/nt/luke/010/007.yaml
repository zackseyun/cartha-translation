id: LUK.10.7
reference: Luke 10:7
source:
  edition: SBLGNT
  text: ἐν αὐτῇ δὲ τῇ οἰκίᾳ μένετε, ἐσθίοντες καὶ πίνοντες τὰ παρ’ αὐτῶν, ἄξιος γὰρ
    ὁ ἐργάτης τοῦ μισθοῦ ⸀αὐτοῦ. μὴ μεταβαίνετε ἐξ οἰκίας εἰς οἰκίαν.
translation:
  text: Stay in that same house, eating and drinking what they provide, for the worker
    is worthy of his wages. Do not move from house to house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the worker is worthy of the wages due him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ δὲ τῇ οἰκίᾳ
  chosen: in that same house
  alternatives:
  - in that house
  - in the same house
  lexicon: BDAG
  rationale: The dative phrase with αὐτῇ is naturally demonstrative/anaphoric, referring
    back to the house that received them. 'That same house' captures both the referential
    force and the emphasis on remaining in one place.
- source_word: μένετε
  chosen: Stay
  alternatives:
  - remain
  - keep staying
  lexicon: BDAG
  rationale: Present imperative calls for continued action. 'Stay' is idiomatic modern
    English and preserves the command without sounding wooden.
- source_word: ἐσθίοντες καὶ πίνοντες
  chosen: eating and drinking
  alternatives:
  - while eating and drinking
  - eat and drink
  lexicon: BDAG
  rationale: The participles are contemporaneous with the imperative and are best
    represented as attendant ongoing activity. The participial form is preserved in
    natural English.
- source_word: τὰ παρ’ αὐτῶν
  chosen: what they provide
  alternatives:
  - what is from them
  - the things from them
  - what they set before you
  lexicon: BDAG
  rationale: The idiom refers to what the hosts supply. 'What they provide' is clear
    and faithful without importing the fuller wording found in some translation traditions
    from nearby parallels.
- source_word: ἄξιος γὰρ ὁ ἐργάτης
  chosen: for the worker is worthy
  alternatives:
  - for the laborer deserves
  - because the worker is worthy
  lexicon: BDAG
  rationale: ἐργάτης is straightforwardly 'worker' or 'laborer.' 'Worker' is accessible
    modern English. ἄξιος with γάρ introduces the rationale for accepting hospitality.
- source_word: τοῦ μισθοῦ αὐτοῦ
  chosen: of his wages
  alternatives:
  - of his pay
  - of his reward
  lexicon: BDAG
  rationale: μισθός here denotes compensation for labor. 'Wages' best fits the economic
    sense in context. αὐτοῦ is rendered 'his' in line with the masculine singular
    grammar and the project's gender-accurate policy.
- source_word: μὴ μεταβαίνετε ἐξ οἰκίας εἰς οἰκίαν
  chosen: Do not move from house to house
  alternatives:
  - Do not go from house to house
  - Do not keep transferring from one house to another
  lexicon: BDAG
  rationale: The prohibition forbids changing lodging in search of better accommodations.
    'Move from house to house' is natural English and preserves the sense of relocating
    between households.
