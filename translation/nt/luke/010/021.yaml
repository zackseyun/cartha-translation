id: LUK.10.21
reference: Luke 10:21
source:
  edition: SBLGNT
  text: Ἐν αὐτῇ τῇ ὥρᾳ ἠγαλλιάσατο ⸀τῷ πνεύματι ⸂τῷ ἁγίῳ⸃ καὶ εἶπεν· Ἐξομολογοῦμαί
    σοι, πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς, ὅτι ἀπέκρυψας ταῦτα ἀπὸ σοφῶν καὶ συνετῶν,
    καὶ ἀπεκάλυψας αὐτὰ νηπίοις· ναί, ὁ πατήρ, ὅτι οὕτως ⸂εὐδοκία ἐγένετο⸃ ἔμπροσθέν
    σου.
translation:
  text: In that same hour he rejoiced in the Holy Spirit and said, “I praise you,
    Father, Lord of heaven and earth, because you hid these things from the wise and
    understanding, and revealed them to little children. Yes, Father, because this
    was well-pleasing before you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I thank you.' The Greek verb can express thanksgiving as well as praise
      in prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'infants.' The expression is likely metaphorical for those who are humble
      or socially insignificant rather than literally only young children.
    reason: lexical_alternative
  - marker: c
    text: Or 'because such was your gracious will' or 'because this was your good
      pleasure.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν αὐτῇ τῇ ὥρᾳ
  chosen: In that same hour
  alternatives:
  - At that very time
  - In that very hour
  lexicon: BDAG
  rationale: A temporal idiom. 'In that same hour' preserves the Greek demonstrative
    emphasis and remains natural English.
- source_word: ἠγαλλιάσατο
  chosen: he rejoiced
  alternatives:
  - he exulted
  - he was overjoyed
  lexicon: BDAG
  rationale: The verb denotes strong joy or exultation. 'Rejoiced' is clear modern
    English; 'exulted' is possible but less natural for the target audience.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - in spirit
  lexicon: BDAG
  rationale: Given the article with both noun and adjective, the phrase most naturally
    refers to the Holy Spirit, not merely Jesus' human spirit. 'In the Holy Spirit'
    preserves the dative's likely sphere/instrument nuance without over-specifying.
    The capitalization reflects the personal divine referent in line with orthodox
    Trinitarian reading.
- source_word: Ἐξομολογοῦμαί σοι
  chosen: I praise you
  alternatives:
  - I thank you
  - I confess to you
  lexicon: BDAG
  rationale: In this context of prayer addressed to the Father, the verb carries the
    sense of praise/thanksgiving. 'I praise you' best fits the following doxological
    address and avoids narrowing the sense to mere gratitude, though 'I thank you'
    is a common viable rendering.
- source_word: πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς
  chosen: Father, Lord of heaven and earth
  alternatives:
  - Father, Master of heaven and earth
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for this contested
    term. The appositional vocatives are preserved straightforwardly.
- source_word: ἀπέκρυψας
  chosen: you hid
  alternatives:
  - you concealed
  lexicon: BDAG
  rationale: Aorist active with God as subject; 'hid' is the plain and direct equivalent.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  lexicon: BDAG
  rationale: English idiom prefers 'these things' here to make the object explicit.
- source_word: σοφῶν καὶ συνετῶν
  chosen: the wise and understanding
  alternatives:
  - the wise and intelligent
  - the wise and learned
  lexicon: BDAG
  rationale: The pair denotes those regarded as wise and discerning. 'Understanding'
    closely reflects συνετῶν without importing educational status too strongly.
- source_word: ἀπεκάλυψας
  chosen: revealed
  alternatives:
  - made known
  - unveiled
  lexicon: BDAG
  rationale: Standard rendering that preserves the contrast with 'hid' and the theological
    weight of disclosure.
- source_word: νηπίοις
  chosen: little children
  alternatives:
  - infants
  - babes
  lexicon: BDAG
  rationale: Literally 'infants,' but here metaphorically for the lowly, dependent,
    or unpretentious recipients of revelation. 'Little children' is idiomatic and
    readable while preserving the image.
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  lexicon: BDAG
  rationale: A simple affirmative particle; 'Yes' is the most natural equivalent in
    direct address.
- source_word: οὕτως εὐδοκία ἐγένετο ἔμπροσθέν σου
  chosen: because this was well-pleasing before you
  alternatives:
  - because such was your gracious will
  - because this was your good pleasure
  lexicon: BDAG
  rationale: The clause expresses divine good pleasure or approval. 'Well-pleasing
    before you' stays close to the Greek wording, especially ἔμπροσθέν σου ('before
    you' / 'in your sight'), while remaining understandable. The alternatives are
    smoother but more interpretive.
