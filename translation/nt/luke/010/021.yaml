theological_decisions:
- issue: Referent of 'the Holy Spirit' in τῷ πνεύματι τῷ ἁγίῳ
  chosen_reading: A reference to the Holy Spirit, rendered with capitalization
  alternative_readings:
  - his spirit
  - in spirit
  rationale: The article-noun-adjective construction strongly supports 'the Holy Spirit.'
    Rendering it this way aligns with the Greek form and does not import doctrine
    beyond the text; it recognizes the explicit wording rather than reducing it to
    a statement about Jesus' inner disposition.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Rendering of κύριος in address to the Father
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine file lists κύριος with default rendering 'Lord.' This preserves
    both the lexical sense and the theological register of divine sovereignty without
    denominational overreach.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
