id: LUK.10.15
reference: Luke 10:15
source:
  edition: SBLGNT
  text: καὶ σύ, Καφαρναούμ, ⸂μὴ ἕως οὐρανοῦ ὑψωθήσῃ⸃; ἕως ⸀τοῦ ᾅδου ⸀καταβιβασθήσῃ.
translation:
  text: And you, Capernaum, will you be exalted to heaven? You will be brought down
    to Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the realm of the dead.' Greek 'Hades,' not Gehenna ('hell').
    reason: lexical_alternative
lexical_decisions:
- source_word: Καφαρναούμ
  chosen: Capernaum
  rationale: Proper place name is transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: μὴ ... ὑψωθήσῃ
  chosen: will you be exalted
  alternatives:
  - will you be lifted up
  - you will not be exalted
  lexicon: BDAG
  rationale: 'The construction is best taken as a rhetorical question expecting a
    negative answer: ''will you be exalted...?'' rather than a flat negation. ''Exalted''
    fits ὑψόω in a figurative sense of being raised to high status. ''Lifted up''
    is possible but can sound overly literal or ambiguous in English.'
- source_word: ἕως οὐρανοῦ
  chosen: to heaven
  alternatives:
  - up to heaven
  lexicon: BDAG
  rationale: ἕως with the genitive here marks extent, and οὐρανός is best rendered
    'heaven' in this idiomatic contrast with descent to Hades. 'To heaven' is natural
    modern English and preserves the vertical imagery.
- source_word: ἕως τοῦ ᾅδου
  chosen: to Hades
  alternatives:
  - to the realm of the dead
  - to hell
  lexicon: BDAG
  rationale: ᾅδης refers to Hades/the realm of the dead, not necessarily the final
    place of punishment denoted by Gehenna. 'Hades' preserves the lexical distinction
    and avoids importing later doctrinal associations of 'hell.' The article is not
    carried into English because 'to Hades' is the most idiomatic rendering.
- source_word: καταβιβασθήσῃ
  chosen: you will be brought down
  alternatives:
  - you will be cast down
  - you will go down
  lexicon: BDAG
  rationale: The future passive indicates being caused to descend, so 'be brought
    down' preserves both the passive force and the humiliation/judgment nuance. 'Cast
    down' is stronger and possible, but 'brought down' is more neutral and closer
    to the Greek.
