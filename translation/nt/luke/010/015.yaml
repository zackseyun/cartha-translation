theological_decisions:
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the realm of the dead
  - hell
  rationale: To preserve the distinction between ᾅδης and terms for final judgment,
    the main text uses 'Hades.' This avoids importing a more developed concept of
    'hell' where the Greek specifically names Hades. A clarifying footnote preserves
    the more explanatory alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
