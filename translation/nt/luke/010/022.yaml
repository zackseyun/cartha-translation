theological_decisions:
- issue: Mutual exclusive knowledge between Father and Son
  chosen_reading: Retained the straightforward wording of unique reciprocal knowledge
    without expansion.
  alternative_readings:
  - Added interpretive wording such as 'fully knows' or 'truly knows'
  rationale: The verse strongly supports the unique mutual knowledge of Father and
    Son, consonant with historic orthodoxy, but the translation should not intensify
    the wording beyond γινώσκει. The theological weight is preserved by the syntax
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it; Affirmations
    on Nicene orthodoxy
- issue: Scope of the Son's revelatory will
  chosen_reading: Rendered βούληται as 'chooses' without softening or systematizing
    the statement.
  alternative_readings:
  - '''wills'''
  - '''desires'''
  - interpretive paraphrases minimizing the Son's agency
  rationale: The Greek presents the Son as the decisive revealer of the Father. The
    translation preserves that agency and does not dilute the christological claim,
    while also avoiding doctrinal over-specification beyond the text.
  doctrine_reference: 'Affirmations on Nicene orthodoxy; Translation philosophy: original-language
    primacy over translation tradition'
