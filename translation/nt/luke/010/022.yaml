id: LUK.10.22
reference: Luke 10:22
source:
  edition: SBLGNT
  text: ⸀πάντα μοι παρεδόθη ὑπὸ τοῦ πατρός μου, καὶ οὐδεὶς γινώσκει τίς ἐστιν ὁ υἱὸς
    εἰ μὴ ὁ πατήρ, καὶ τίς ἐστιν ὁ πατὴρ εἰ μὴ ὁ υἱὸς καὶ ᾧ ⸀ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι.
translation:
  text: All things have been handed over to me by my Father, and no one knows who
    the Son is except the Father, and who the Father is except the Son and anyone
    to whom the Son chooses to reveal him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Everything has been handed over to me by my Father.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and anyone to whom the Son wills to reveal him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: All things
  alternatives:
  - Everything
  lexicon: BDAG
  rationale: Neuter plural with broad scope; 'All things' preserves the comprehensive
    sense and echoes the formal weight of the statement better than the slightly more
    idiomatic 'Everything'.
- source_word: παρεδόθη
  chosen: have been handed over
  alternatives:
  - were handed over
  - have been entrusted
  lexicon: BDAG
  rationale: Aorist passive of παραδίδωμι. 'Handed over' is the core sense and avoids
    importing the narrower stewardship nuance of 'entrusted.' Present perfect English
    conveys a completed act with abiding result in context.
- source_word: ὑπὸ τοῦ πατρός μου
  chosen: by my Father
  alternatives:
  - from my Father
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency in a passive construction, so
    'by my Father' is more precise than 'from my Father'.
- source_word: γινώσκει
  chosen: knows
  alternatives:
  - fully knows
  - recognizes
  lexicon: BDAG
  rationale: The verb denotes knowing; while the context implies unique and exhaustive
    mutual knowledge, adding 'fully' would interpret beyond the explicit wording.
- source_word: τίς ἐστιν ὁ υἱὸς
  chosen: who the Son is
  alternatives:
  - the identity of the Son
  - who the Son really is
  lexicon: BDAG
  rationale: This clause is more naturally rendered in English as 'who the Son is.'
    It preserves the personal and relational force without overexplication.
- source_word: ὁ υἱός
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: The article with the christological context indicates a titular use,
    not an indefinite filial reference. Capitalization in English signals the recognized
    title.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Likewise a titular and relational designation in this context; capitalization
    reflects the referent without altering meaning.
- source_word: ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι
  chosen: anyone to whom the Son chooses to reveal him
  alternatives:
  - whomever the Son wills to reveal him to
  - anyone to whom the Son desires to reveal him
  lexicon: BDAG
  rationale: This construction expresses an indefinite recipient conditioned by the
    Son's volition. 'Chooses' is natural modern English for βούληται here, while 'reveal
    him' correctly takes the Father as the implied object from the preceding clause.
- source_word: βούληται
  chosen: chooses
  alternatives:
  - wills
  - desires
  lexicon: BDAG
  rationale: '''Chooses'' communicates volition in readable modern English. ''Wills''
    is more formal but can sound archaic; ''desires'' can weaken the decisional force.'
- source_word: ἀποκαλύψαι
  chosen: to reveal
  alternatives:
  - to disclose
  - to make known
  lexicon: BDAG
  rationale: '''Reveal'' is the standard rendering and preserves the theological resonance
    of divine disclosure without becoming technical.'
