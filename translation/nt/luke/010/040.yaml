id: LUK.10.40
reference: Luke 10:40
source:
  edition: SBLGNT
  text: ἡ δὲ Μάρθα περιεσπᾶτο περὶ πολλὴν διακονίαν· ἐπιστᾶσα δὲ εἶπεν· Κύριε, οὐ
    μέλει σοι ὅτι ἡ ἀδελφή μου μόνην με ⸀κατέλειπεν διακονεῖν; ⸀εἰπὲ οὖν αὐτῇ ἵνα
    μοι συναντιλάβηται.
translation:
  text: But Martha was distracted with much serving. And she came up and said, “Lord,
    does it not matter to you that my sister has left me to serve alone? Tell her,
    then, to help me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “do you not care that my sister has left me alone to do the serving?”
    reason: lexical_alternative
lexical_decisions:
- source_word: περιεσπᾶτο
  chosen: was distracted
  alternatives:
  - was pulled away
  - was busy
  - was worried
  lexicon: BDAG
  rationale: The imperfect middle/passive conveys an ongoing state of being drawn
    away or distracted. 'Was distracted' is idiomatic modern English and fits the
    contrast with Mary’s attention in context better than the vaguer 'was busy.'
- source_word: περὶ πολλὴν διακονίαν
  chosen: with much serving
  alternatives:
  - with much service
  - with many preparations
  - about much ministry
  lexicon: BDAG
  rationale: διακονία here refers to practical service in the household setting, not
    formal ministry. 'With much serving' preserves the concrete activity while sounding
    natural in English; 'many preparations' is interpretive and narrower than the
    Greek.
- source_word: ἐπιστᾶσα
  chosen: she came up
  alternatives:
  - she stood by
  - she approached
  lexicon: BDAG
  rationale: The participle indicates approaching or coming near before speaking.
    'She came up' is concise and natural; 'approached' is possible but slightly more
    formal.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this address to
    Jesus, 'Lord' is the standard and contextually appropriate title.
- source_word: οὐ μέλει σοι
  chosen: does it not matter to you
  alternatives:
  - do you not care
  - is it no concern to you
  lexicon: BDAG
  rationale: The idiom asks whether something is a matter of concern. 'Does it not
    matter to you' is a clear modern rendering that preserves Martha’s complaint without
    overstating emotional force.
- source_word: μόνην με κατέλειπεν διακονεῖν
  chosen: has left me to serve alone
  alternatives:
  - left me alone to do the serving
  - abandoned me to serve by myself
  lexicon: BDAG
  rationale: This captures both μόνην ('alone') and the complementary infinitive διακονεῖν
    ('to serve'). 'Abandoned' is too strong in English for this domestic context.
- source_word: εἰπὲ οὖν αὐτῇ
  chosen: Tell her, then
  alternatives:
  - Therefore say to her
  - So tell her
  lexicon: BDAG
  rationale: The aorist imperative is direct. 'Tell her, then' preserves the inferential
    force of οὖν in natural English.
- source_word: συναντιλάβηται
  chosen: to help me
  alternatives:
  - to take hold together with me
  - to assist me
  - to lend me a hand
  lexicon: BDAG
  rationale: The verb means to join in helping or to assist together with someone.
    'To help me' is the clearest idiomatic rendering; the fuller sense of shared assistance
    is implicit in context.
