theological_decisions:
- issue: Rendering of κύριος in Martha’s address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance sets 'Lord' as the default for κύριος. Nothing
    in this verse requires deviation, and 'Lord' preserves both respectful address
    and the broader Lukan usage for Jesus.
