theological_decisions:
- issue: Identification of Jesus with his commissioned messengers
  chosen_reading: 'Retain the direct personal chain: hearing/rejecting the disciples
    is hearing/rejecting Jesus, and rejecting Jesus is rejecting the one who sent
    him.'
  alternative_readings:
  - Paraphrasing as hearing/rejecting only the disciples' message
  rationale: The Greek uses personal pronouns ('you,' 'me') rather than abstract nouns
    such as 'message' or 'teaching.' The translation therefore preserves the representative
    authority structure without reducing it to mere agreement with content.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Reference of 'the one who sent me'
  chosen_reading: Leave the referent implicit as 'the one who sent me.'
  alternative_readings:
  - Explicitly identify as 'the Father who sent me'
  rationale: In context the referent is God the Father, but the Greek does not state
    'Father' here. Leaving it implicit preserves the wording and theological force
    without adding interpretive material.
  doctrine_reference: Translation philosophy §1
