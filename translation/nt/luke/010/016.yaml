id: LUK.10.16
reference: Luke 10:16
source:
  edition: SBLGNT
  text: Ὁ ἀκούων ὑμῶν ἐμοῦ ἀκούει, καὶ ὁ ἀθετῶν ὑμᾶς ἐμὲ ἀθετεῖ· ὁ δὲ ἐμὲ ἀθετῶν ἀθετεῖ
    τὸν ἀποστείλαντά με.
translation:
  text: The one who hears you hears me, and the one who rejects you rejects me; but
    the one who rejects me rejects the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disregards' or 'sets aside' for 'rejects' (Greek ἀθετέω).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀκούων
  chosen: The one who hears
  alternatives:
  - Whoever hears
  - The one listening to
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    generically to any person characterized by the action. 'The one who hears' preserves
    the Greek structure and representative singular better than the more idiomatic
    'whoever hears,' while remaining natural English.
- source_word: ὑμῶν
  chosen: you
  alternatives:
  - your message
  - from you
  lexicon: BDAG
  rationale: The genitive after ἀκούω commonly marks the person heard. 'You' is the
    most direct rendering and avoids importing 'message,' which is implied by context
    but not explicit in the Greek.
- source_word: ἐμοῦ
  chosen: me
  alternatives:
  - my voice
  lexicon: BDAG
  rationale: The genitive with ἀκούω parallels ὑμῶν. 'Me' preserves the personal identification
    Jesus makes between reception of the disciples and reception of himself.
- source_word: ἀκούει
  chosen: hears
  alternatives:
  - listens to
  lexicon: BDAG
  rationale: '''Hears'' best matches the lexical repetition with ἀκούων and keeps
    the saying concise. ''Listens to'' can suggest attentiveness rather than reception
    and is less direct.'
- source_word: ὁ ἀθετῶν
  chosen: the one who rejects
  alternatives:
  - the one who disregards
  - the one who sets aside
  lexicon: BDAG
  rationale: ἀθετέω can mean reject, nullify, set aside, or disregard. In this relational
    and representative context, 'rejects' most clearly conveys refusal of authorized
    messengers without sounding overly technical.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - your message
  lexicon: BDAG
  rationale: The direct object is the disciples themselves as Jesus' representatives.
    'You' preserves the personal force; 'your message' would narrow the sense beyond
    the wording.
- source_word: ἐμὲ ἀθετεῖ
  chosen: rejects me
  alternatives:
  - disregards me
  - sets me aside
  lexicon: BDAG
  rationale: Maintains the repeated verb for rhetorical force and preserves the personal
    identification between Jesus and his emissaries.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or progression to the climactic final clause.
    'But' best signals the rhetorical step from rejecting the disciples to rejecting
    the Sender through rejecting Jesus.
- source_word: τὸν ἀποστείλαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The articular aorist participle is naturally rendered as a substantive
    phrase. 'The one who sent me' is clear, idiomatic, and preserves the personal
    reference to the Father without making it explicit beyond the text.
