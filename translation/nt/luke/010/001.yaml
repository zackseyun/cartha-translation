theological_decisions:
- issue: Textual variant in the number of those appointed
  chosen_reading: seventy-two
  alternative_readings:
  - seventy
  rationale: The provided base text (SBLGNT) reads ἑβδομήκοντα δύο ('seventy-two').
    Because 'seventy' is a significant and well-known variant, it is preserved in
    a footnote rather than ignored. This is a textual, not doctrinal, issue.
  doctrine_reference: Preserve theological tension/alternatives in footnotes where
    genuine ambiguity or contested reading exists.
