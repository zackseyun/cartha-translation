id: LUK.10.1
reference: Luke 10:1
source:
  edition: SBLGNT
  text: Μετὰ δὲ ταῦτα ἀνέδειξεν ὁ κύριος ⸀καὶ ἑτέρους ἑβδομήκοντα ⸀δύο καὶ ἀπέστειλεν
    αὐτοὺς ἀνὰ δύο ⸁δύο πρὸ προσώπου αὐτοῦ εἰς πᾶσαν πόλιν καὶ τόπον οὗ ἤμελλεν αὐτὸς
    ἔρχεσθαι.
translation:
  text: After these things, the Lord appointed seventy-two others also, and sent them
    two by two ahead of him into every town and place where he himself was about to
    go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'seventy' instead of 'seventy-two.'
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: Retains the temporal transition with moderate formality. 'After these
    things' closely reflects the plural demonstrative while remaining natural English.
- source_word: ἀνέδειξεν
  chosen: appointed
  alternatives:
  - designated
  - selected
  lexicon: BDAG
  rationale: The verb here conveys appointing or designating persons for a task, not
    merely showing or revealing. 'Appointed' is clear modern English and fits the
    commissioning context.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' In Luke
    this title naturally refers to Jesus here.
- source_word: καὶ ἑτέρους ἑβδομήκοντα δύο
  chosen: seventy-two others also
  alternatives:
  - seventy others also
  - another seventy-two
  lexicon: BDAG
  rationale: ἑτέρους means 'others' or 'additional ones,' and καί here adds the sense
    'also.' The SBLGNT text reads 'seventy-two'; because 'seventy' is a well-known
    textual variant, the alternative is preserved in a footnote rather than adopted
    in the main text.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - commissioned
  - dispatched
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the action without overinterpreting
    apostolic nuance. 'Sent' is idiomatic and sufficient in context.
- source_word: ἀνὰ δύο δύο
  chosen: two by two
  alternatives:
  - in pairs
  lexicon: BDAG
  rationale: This distributive expression idiomatically means sending them in pairs.
    'Two by two' preserves the repetitive Greek emphasis and familiar cadence.
- source_word: πρὸ προσώπου αὐτοῦ
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: BDAG
  rationale: The phrase means in advance of his arrival. 'Ahead of him' is natural
    modern English and captures the preparatory sense.
- source_word: εἰς πᾶσαν πόλιν καὶ τόπον
  chosen: into every town and place
  alternatives:
  - to every city and place
  - into every city and place
  lexicon: BDAG
  rationale: πόλις can be rendered 'town' or 'city'; 'town' is more natural in this
    itinerant mission setting without implying major urban centers only. Retaining
    both 'town and place' reflects Luke's paired nouns rather than collapsing them.
- source_word: οὗ ἤμελλεν αὐτὸς ἔρχεσθαι
  chosen: where he himself was about to go
  alternatives:
  - where he was going to come
  - where he himself intended to go
  lexicon: BDAG
  rationale: μέλλω with infinitive expresses imminence or intended future action.
    'Was about to go' is idiomatic and preserves the forward-looking sense. αὐτός
    is emphatic, so 'he himself' is retained.
