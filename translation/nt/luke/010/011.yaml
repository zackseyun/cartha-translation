theological_decisions:
- issue: Force of the dust-wiping gesture
  chosen_reading: A symbolic act of testimony and judgment against the rejecting city
  alternative_readings:
  - A purely hygienic or travel-related action
  rationale: The phrase ὑμῖν together with the broader mission discourse indicates
    a judicial witness against those who reject the message. The translation 'against
    you' preserves this force without expanding beyond the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of the kingdom's nearness
  chosen_reading: The kingdom of God has drawn near in the mission and message of
    Jesus' envoys, even where it is rejected
  alternative_readings:
  - The kingdom is merely temporally imminent
  - The kingdom is fully consummated already
  rationale: The perfect ἤγγικεν signals realized nearness without requiring a claim
    of final consummation. The wording preserves the text's eschatological tension
    rather than resolving it.
  doctrine_reference: Translation philosophy §3
