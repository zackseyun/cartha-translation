  from: Even the dust that clung to us from your city, on our feet, we wipe off against
    you.
  to: Even the dust from your city that clung to our feet, we wipe off against you.
  rationale: The phrase 'on our feet' is grammatically acceptable but its placement
    creates an awkward flow. It reads as a somewhat disjointed appositive or an adverbial
    phrase modifying 'we wipe off' (which would be incorrect). Integrating it directly
    into the description of the dust (e.g., 'clung to our feet') improves clarity
    and naturalness, aligning better with the lexical decision that 'on our feet'
    describes dust adhering to their feet.
