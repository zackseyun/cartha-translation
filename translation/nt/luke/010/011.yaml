id: LUK.10.11
reference: Luke 10:11
source:
  edition: SBLGNT
  text: Καὶ τὸν κονιορτὸν τὸν κολληθέντα ἡμῖν ἐκ τῆς πόλεως ὑμῶν ⸂εἰς τοὺς πόδας⸃
    ἀπομασσόμεθα ὑμῖν· πλὴν τοῦτο γινώσκετε ὅτι ⸀ἤγγικεν ἡ βασιλεία τοῦ θεοῦ.
translation:
  text: 'Even the dust from your city that clung to our feet, we wipe off against
    you. Nevertheless know this: the kingdom of God has come near.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from our feet'; the Greek wording is idiomatic and describes the dust
      from their city as adhering to the messengers' feet.
    reason: lexical_alternative
  - marker: b
    text: Many English translations render the verb as 'shake off,' but the Greek
      verb here more specifically means 'wipe off.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has drawn near.' The perfect tense indicates that God's kingdom has
      come near with continuing significance.
    reason: lexical_alternative
  - marker: d
    text: Or 'Even the dust that clung to us from your city, on our feet, we wipe
      off against you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: κονιορτός
  chosen: dust
  alternatives:
  - dirt
  lexicon: BDAG
  rationale: The noun refers specifically to dust rather than generic soil or dirt.
    'Dust' also preserves the symbolic force of the gesture in this mission context.
- source_word: κολληθέντα
  chosen: clung
  alternatives:
  - stuck
  - attached
  lexicon: BDAG
  rationale: The participle from κολλάομαι denotes something adhering closely. 'Clung'
    is natural English and preserves the sense of dust adhering to the messengers.
- source_word: ἐκ τῆς πόλεως ὑμῶν
  chosen: from your city
  alternatives:
  - out of your city
  lexicon: BDAG
  rationale: '''From your city'' is idiomatic and accurately reflects ἐκ with source/origin.'
- source_word: εἰς τοὺς πόδας
  chosen: on our feet
  alternatives:
  - from our feet
  - off our feet
  lexicon: BDAG
  rationale: The Greek phrase is somewhat awkward literally ('onto the feet') in this
    idiom. In context it describes dust adhering to their feet, so 'on our feet' best
    captures the sense while remaining close to the wording.
- source_word: ἀπομασσόμεθα
  chosen: we wipe off
  alternatives:
  - we shake off
  - we wipe away
  lexicon: BDAG
  rationale: The verb means to wipe off or wipe away. Although English tradition often
    has 'shake off' in similar passages, this specific verb points to wiping rather
    than shaking, so the source text is better represented by 'wipe off'.
- source_word: ὑμῖν
  chosen: against you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: 'In this context the dative marks hostile or testimonial direction: the
    act is performed as a witness against the hearers, not merely in their presence.
    ''Against you'' brings out that force.'
- source_word: πλήν
  chosen: Nevertheless
  alternatives:
  - Yet
  - Still
  lexicon: BDAG
  rationale: 'The conjunction marks a strong qualification: despite the act of judgment,
    an important truth remains to be known.'
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - understand
  - be sure of
  lexicon: BDAG
  rationale: The present imperative calls for recognition or acknowledgment. 'Know'
    is direct and idiomatic in English.
- source_word: ἤγγικεν
  chosen: has come near
  alternatives:
  - has drawn near
  - is near
  lexicon: BDAG
  rationale: The perfect tense indicates a nearness that has arrived and remains in
    effect. 'Has come near' communicates both the event and its present relevance
    in accessible English.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and sufficiently transparent rendering.
    ''Reign of God'' captures dynamic rule but is less natural here and not required
    by the context.'
