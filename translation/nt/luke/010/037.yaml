theological_decisions:
- issue: Identification of the neighbor by merciful action rather than ethnic or social
    category
  chosen_reading: The translation preserves the lawyer's circumlocution, 'The one
    who showed mercy to him,' rather than supplying 'the Samaritan.'
  alternative_readings:
  - The Samaritan
  rationale: The Greek answer intentionally identifies the true neighbor by action.
    Supplying 'the Samaritan' would import an interpretive summary and soften the
    rhetorical force of the speaker's wording.
  doctrine_reference: Translation philosophy §1, §3
