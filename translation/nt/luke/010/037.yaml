id: LUK.10.37
reference: Luke 10:37
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὁ ποιήσας τὸ ἔλεος μετ’ αὐτοῦ. εἶπεν ⸀δὲ αὐτῷ ὁ Ἰησοῦς· Πορεύου
    καὶ σὺ ποίει ὁμοίως.
translation:
  text: And he said, “The one who showed mercy to him.” Then Jesus said to him, “Go,
    and you do likewise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the one who did mercy with him,' an idiom meaning 'the one who
      showed mercy to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιήσας
  chosen: the one who showed
  alternatives:
  - the one who did
  - he who showed
  lexicon: BDAG
  rationale: The articular aorist participle functions substantivally, identifying
    the person by his action. English idiom prefers 'the one who showed' rather than
    a more wooden 'the one who did.'
- source_word: τὸ ἔλεος
  chosen: mercy
  alternatives:
  - kindness
  - compassion
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy shown to someone in need. 'Mercy' preserves
    the moral and relational weight of the term better than the softer 'kindness'
    or more emotional 'compassion.'
- source_word: ποιήσας τὸ ἔλεος
  chosen: showed mercy
  alternatives:
  - did mercy
  - acted mercifully
  lexicon: BDAG
  rationale: The Greek idiom literally says 'did the mercy,' but natural English expresses
    this as 'showed mercy.' This is an optimal-equivalence rendering of a semitic/Greek
    idiom without loss of meaning.
- source_word: μετ’ αὐτοῦ
  chosen: to him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: Although μετά with the genitive is literally 'with,' in this idiom the
    sense is the person toward whom mercy was exercised. 'To him' communicates the
    relational direction clearly in English.
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Be on your way
  - Depart
  lexicon: BDAG
  rationale: The present middle imperative here functions as a straightforward command
    to go. 'Go' is the natural concise English equivalent.
- source_word: καὶ σὺ
  chosen: and you
  alternatives:
  - you also
  - and you too
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis. 'And you' preserves the direct
    personal application from Jesus to the hearer; the emphasis is carried naturally
    in English without overtranslation.
- source_word: ποίει
  chosen: do
  alternatives:
  - keep doing
  - act
  lexicon: BDAG
  rationale: The present imperative can imply ongoing or characteristic action. 'Do'
    is concise and idiomatic here; the broader force of continued imitation is sufficiently
    conveyed by the command in context.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: '''Likewise'' is a natural and sufficiently formal English adverb that
    preserves the comparative force of imitation.'
- source_word: εἶπεν ... εἶπεν
  chosen: said ... said
  alternatives:
  - answered ... said
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say' in both clauses. Although the first instance
    is responsive in context, 'answered' would add interpretive nuance not explicit
    in the verb itself.
