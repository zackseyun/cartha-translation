- issue: Rendering of πίστις in a context where nuance could be trust
  chosen_reading: faith
  alternative_readings:
  - trust
  rationale: The doctrine table sets “faith” as the default rendering for πίστις,
    with alternatives preserved where relevant. Here “faith” keeps consistency while
    still allowing readers to understand trust as the contextual sense.
