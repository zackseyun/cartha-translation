id: LUK.8.23
reference: Luke 8:23
source:
  edition: SBLGNT
  text: πλεόντων δὲ αὐτῶν ἀφύπνωσεν. καὶ κατέβη λαῖλαψ ἀνέμου εἰς τὴν λίμνην, καὶ
    συνεπληροῦντο καὶ ἐκινδύνευον.
translation:
  text: And as they were sailing, he fell asleep. And a windstorm came down on the
    lake, and they were being swamped and were in danger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were filling up,' that is, the boat was filling with water.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεόντων δὲ αὐτῶν
  chosen: as they were sailing
  alternatives:
  - while they were sailing
  - as they sailed
  lexicon: BDAG
  rationale: Genitive absolute with present participle πλεόντων indicates contemporaneous
    ongoing action; 'as they were sailing' captures the backgrounded, progressive
    sense in natural English.
- source_word: ἀφύπνωσεν
  chosen: he fell asleep
  alternatives:
  - he went to sleep
  - he slept
  lexicon: BDAG
  rationale: Aorist ingressive sense is best conveyed by 'fell asleep' rather than
    the stative 'slept.' The subject is Jesus from the context.
- source_word: κατέβη
  chosen: came down
  alternatives:
  - descended
  - swept down
  lexicon: BDAG
  rationale: The verb literally means 'came down/descended.' 'Came down' preserves
    the imagery and fits the geography of sudden winds descending onto the lake.
- source_word: λαῖλαψ ἀνέμου
  chosen: a windstorm
  alternatives:
  - a storm of wind
  - a violent windstorm
  - a squall
  lexicon: BDAG
  rationale: The phrase denotes a violent storm characterized by wind. 'Windstorm'
    is concise and idiomatic while preserving the emphasis on wind rather than rain.
- source_word: εἰς τὴν λίμνην
  chosen: on the lake
  alternatives:
  - into the lake
  - upon the lake
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with κατέβη and a weather event the
    idiomatic sense in English is that the storm came down 'on the lake.' This avoids
    awkwardness while preserving the scene.
- source_word: συνεπληροῦντο
  chosen: they were being swamped
  alternatives:
  - they were filling with water
  - the boat was filling up
  - they were being flooded
  lexicon: BDAG
  rationale: Imperfect passive/plural likely refers to those in the boat as affected
    by the boat filling. 'They were being swamped' communicates the ongoing peril
    in idiomatic English without over-specifying the implied object 'boat.'
- source_word: ἐκινδύνευον
  chosen: were in danger
  alternatives:
  - were at risk
  - were in peril
  lexicon: BDAG
  rationale: Imperfect denotes continuing danger. 'Were in danger' is clear, natural,
    and preserves the seriousness without archaic diction.
