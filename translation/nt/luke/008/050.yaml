id: LUK.8.50
reference: Luke 8:50
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἀκούσας ἀπεκρίθη ⸀αὐτῷ· Μὴ φοβοῦ, μόνον ⸀πίστευσον, καὶ σωθήσεται.
translation:
  text: But Jesus, hearing this, answered him, “Do not fear; only believe, and she
    will be saved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only have faith' or 'only trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she will be healed' or 'she will be made well.' The Greek verb can mean
      save, rescue, or heal, and in this context includes restoration from the brink
      of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: hearing this
  alternatives:
  - having heard
  - when he heard
  lexicon: BDAG
  rationale: Aorist participle indicating antecedent action. 'Hearing this' is natural
    English and makes explicit the implied object from context without over-paraphrasing.
- source_word: ἀπεκρίθη αὐτῷ
  chosen: answered him
  alternatives:
  - replied to him
  - answered
  lexicon: BDAG
  rationale: Standard idiom for ἀποκρίνομαι with dative indirect object. 'Answered
    him' is concise and idiomatic.
- source_word: Μὴ φοβοῦ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: BDAG
  rationale: Present middle/passive imperative with μή gives a prohibition. 'Do not
    fear' is slightly more formal and concise, preserving the gravity of Jesus' command;
    'Do not be afraid' is a valid idiomatic alternative.
- source_word: μόνον
  chosen: only
  alternatives:
  - just
  - merely
  lexicon: BDAG
  rationale: μόνον restricts the command that follows. 'Only' preserves the exclusivity
    without sounding colloquial.
- source_word: πίστευσον
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: BDAG
  rationale: Aorist imperative of πιστεύω. The default family rendering tied to πίστις
    in the doctrine is 'faith'; here the verbal form is best rendered 'believe' in
    the main text. 'Have faith' and 'trust' are legitimate contextual alternatives
    and are preserved in a footnote because the semantic range includes trust/reliance.
- source_word: σωθήσεται
  chosen: she will be saved
  alternatives:
  - she will be healed
  - she will be made well
  lexicon: BDAG
  rationale: Future passive of σῴζω, whose range includes save, rescue, heal, make
    well. In this immediate narrative context about Jairus's daughter, the sense is
    restoration to life/wholeness. 'She will be saved' preserves the Greek term and
    its broader semantic-theological resonance, while a footnote preserves the more
    context-specific alternatives 'healed'/'made well'.
