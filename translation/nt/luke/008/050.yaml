theological_decisions:
- issue: Rendering πιστεύω in Jesus' command
  chosen_reading: believe
  alternative_readings:
  - have faith
  - trust
  rationale: The doctrine excerpt gives πίστις the default rendering 'faith' while
    preserving alternatives where contested. For the verbal form πιστεύω, 'believe'
    is the most direct English equivalent; however, because English 'believe' can
    sound merely cognitive, the relational nuance 'trust' and the doctrinally aligned
    phrase 'have faith' are preserved in a footnote rather than elevated into the
    main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
- issue: Rendering σωθήσεται in a healing/resuscitation context
  chosen_reading: she will be saved
  alternative_readings:
  - she will be healed
  - she will be made well
  rationale: The translation preserves the lexical link to σῴζω ('save') rather than
    narrowing it to physical healing alone. In Luke, σῴζω can carry both physical
    and broader salvific senses. Because the immediate context naturally suggests
    healing/restoration, the narrower alternatives are preserved in a footnote to
    maintain the text's tension rather than resolving it reductively.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3 and #5'
