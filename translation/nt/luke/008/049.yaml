theological_decisions:
- issue: Rendering of ἀρχισυνάγωγος in relation to Jairus
  chosen_reading: the synagogue leader
  alternative_readings:
  - the ruler of the synagogue
  - the synagogue official
  rationale: This is an institutional title, not a theological one. 'Synagogue leader'
    communicates the role clearly in contemporary English without importing later
    ecclesiastical connotations.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
- issue: Rendering of διδάσκαλος
  chosen_reading: the teacher
  alternative_readings:
  - the master
  rationale: The Greek uses the ordinary title 'teacher.' Translating it plainly avoids
    importing heightened christological nuance not explicit in this clause, while
    remaining fully compatible with orthodox doctrine.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
