id: LUK.8.49
reference: Luke 8:49
source:
  edition: SBLGNT
  text: Ἔτι αὐτοῦ λαλοῦντος ἔρχεταί τις παρὰ τοῦ ἀρχισυναγώγου ⸀λέγων ὅτι Τέθνηκεν
    ἡ θυγάτηρ σου, ⸀μηκέτι σκύλλε τὸν διδάσκαλον.
translation:
  text: While he was still speaking, someone came from the synagogue leader, saying,
    “Your daughter has died; do not trouble the teacher any longer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the ruler of the synagogue.”
    reason: lexical_alternative
  - marker: b
    text: Or “do not bother the teacher any longer.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι αὐτοῦ λαλοῦντος
  chosen: While he was still speaking
  alternatives:
  - As he was still speaking
  - While he was yet speaking
  lexicon: BDAG
  rationale: Genitive absolute expressing contemporaneous action. 'While he was still
    speaking' is natural modern English and preserves the temporal force of ἔτι ('still').
- source_word: ἔρχεταί τις
  chosen: someone came
  alternatives:
  - a person came
  - someone arrives
  lexicon: BDAG
  rationale: Historic present ἔρχεται is naturally rendered as past in English narrative.
    τις is indefinite, so 'someone' is the most idiomatic equivalent.
- source_word: παρὰ τοῦ ἀρχισυναγώγου
  chosen: from the synagogue leader
  alternatives:
  - from the ruler of the synagogue
  - from the synagogue official
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, 'from.' ἀρχισυνάγωγος denotes
    the leader/presiding official of a synagogue. 'Synagogue leader' is clear modern
    English and avoids archaic phrasing.
- source_word: λέγων
  chosen: saying
  alternatives:
  - who said
  lexicon: BDAG
  rationale: Present participle introducing the content of the message; 'saying' preserves
    the participial linkage smoothly.
- source_word: Τέθνηκεν
  chosen: has died
  alternatives:
  - is dead
  - died
  lexicon: BDAG
  rationale: Perfect tense conveys a present state resulting from death. 'Has died'
    preserves both the event and its resulting condition better than the stative-only
    'is dead.'
- source_word: ἡ θυγάτηρ σου
  chosen: Your daughter
  lexicon: BDAG
  rationale: Direct and straightforward rendering of the nominative subject with possessive
    pronoun.
- source_word: μηκέτι
  chosen: any longer
  alternatives:
  - no longer
  - any more
  lexicon: BDAG
  rationale: Adverb modifying the imperative, indicating cessation from this point
    onward. In English it is best attached to the prohibition as 'do not ... any longer.'
- source_word: σκύλλε
  chosen: do not trouble
  alternatives:
  - do not bother
  - stop troubling
  - do not disturb
  lexicon: BDAG
  rationale: σκύλλω can mean to trouble, bother, or cause difficulty. 'Do not trouble'
    preserves the gravity and respectfulness of the message better than the more casual
    'bother.'
- source_word: τὸν διδάσκαλον
  chosen: the teacher
  alternatives:
  - the master
  lexicon: BDAG
  rationale: διδάσκαλος ordinarily means 'teacher.' This is the plain lexical sense
    and should be translated rather than elevated to a more interpretive title.
