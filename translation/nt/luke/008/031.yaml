theological_decisions:
- issue: Meaning of ἄβυσσος in a demonic context
  chosen_reading: the abyss as the place of supernatural confinement/judgment for
    evil spirits
  alternative_readings:
  - the deep in a more general spatial sense
  rationale: The immediate context concerns demons addressing Jesus and fearing his
    authoritative command. Rendering ἄβυσσος as 'the abyss' preserves the text's spiritual-cosmic
    dimension without overdefining the term beyond what Luke states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
