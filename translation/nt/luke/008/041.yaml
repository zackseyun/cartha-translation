theological_decisions:
- issue: Posture before Jesus
  chosen_reading: Rendered the action straightforwardly as urgent supplication without
    adding worship language.
  alternative_readings:
  - falling before Jesus as an act of worship
  rationale: The verse clearly depicts Jairus falling at Jesus's feet in desperation,
    but the text itself does not explicitly state that this act was worship. The translation
    preserves the action without importing a stronger theological claim than the wording
    requires.
  doctrine_reference: Affirmations; Translation philosophy item 3
