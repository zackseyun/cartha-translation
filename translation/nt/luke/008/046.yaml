id: LUK.8.46
reference: Luke 8:46
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν· Ἥψατό μού τις, ἐγὼ γὰρ ἔγνων δύναμιν ⸀ἐξεληλυθυῖαν ἀπ’
    ἐμοῦ.
translation:
  text: But Jesus said, “Someone touched me, for I knew that power had gone out from
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I perceived that power had gone out from me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἥψατό
  chosen: touched
  alternatives:
  - took hold of
  - laid hold of
  lexicon: BDAG
  rationale: From ἅπτω in the middle voice, here meaning to make physical contact
    with. 'Touched' is the natural and contextually precise English rendering in this
    healing narrative.
- source_word: μού
  chosen: me
  alternatives:
  - of me
  lexicon: BDAG
  rationale: Genitive pronoun dependent on ἅπτομαι, which commonly takes the genitive
    for the object touched. English idiom requires the direct-object form 'me' rather
    than a more literal but unnatural 'of me.'
- source_word: τις
  chosen: someone
  alternatives:
  - someone or other
  - a certain person
  lexicon: BDAG
  rationale: Indefinite pronoun indicating an unidentified person. 'Someone' is the
    clearest modern English equivalent.
- source_word: ἔγνων
  chosen: I knew
  alternatives:
  - I perceived
  - I recognized
  lexicon: BDAG
  rationale: Aorist of γινώσκω. In context it denotes Jesus' immediate awareness.
    'I knew' is straightforward and preserves the force without over-interpreting
    the mode of perception.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - power for healing
  - miraculous power
  lexicon: BDAG
  rationale: δύναμις here refers to effective power proceeding from Jesus in connection
    with healing. 'Power' is the standard and sufficiently broad rendering; adding
    'healing' or 'miraculous' would interpret beyond the explicit wording.
- source_word: ἐξεληλυθυῖαν
  chosen: had gone out
  alternatives:
  - had proceeded out
  - had come out
  lexicon: BDAG
  rationale: Perfect active participle of ἐξέρχομαι modifying δύναμιν, indicating
    completed movement outward with present-result nuance. English past perfect 'had
    gone out' best captures the sense in idiomatic narrative English.
- source_word: ἀπ’ ἐμοῦ
  chosen: from me
  alternatives:
  - out of me
  lexicon: BDAG
  rationale: ἀπό with the genitive marks source/origin. 'From me' is the most natural
    English expression here; 'out of me' is possible but less idiomatic in this context.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding denial by
    others. 'But' appropriately signals Jesus' contrasting response.
