theological_decisions:
- issue: Description of δύναμις leaving Jesus
  chosen_reading: Jesus states that power had gone out from him, without further explanation
    of mechanism.
  alternative_readings:
  - Jesus sensed healing power proceeding from him
  - Jesus perceived divine power at work through him
  rationale: The verse presents a real outgoing of δύναμις from Jesus in the healing
    event. The translation preserves the statement as written without importing a
    more developed theological explanation about Christology, divine attributes, or
    the mechanics of miracles.
  doctrine_reference: Preserve theological tension rather than resolve it.
