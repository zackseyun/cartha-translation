theological_decisions:
- issue: Scope of Jesus's redefined family
  chosen_reading: Jesus identifies his true family as those characterized by hearing God's word and doing it, without denying his biological family.
  alternative_readings:
  - Jesus rejects his biological family outright
  - Jesus refers only to a male group of disciples
  rationale: The verse expands kinship around responsiveness to God's word. The wording should preserve the relational force without importing a repudiation of Mary and his relatives that the text itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate over gender-neutral.
revisions:
- timestamp: '2026-04-21T12:39:21Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/008/021.json
  category: awkward_english
  tier: 1
  from: 'are these: those who'
  to: are those who
  rationale: 'The current rendering, ''My mother and my brothers are these: those who...'', is slightly redundant and stilted in English due to the ''these... those'' construction. The Greek ''οὗτοί εἰσιν οἱ...'' can be rendered more naturally and concisely as ''are those who...'', which is a common and effective translation strategy that merges the demonstrative pronoun and the article of the substantival participle. This improves flow without losing the essential meaning.'
