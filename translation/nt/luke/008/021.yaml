id: LUK.8.21
reference: Luke 8:21
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν πρὸς αὐτούς· Μήτηρ μου καὶ ἀδελφοί μου οὗτοί εἰσιν οἱ τὸν λόγον τοῦ θεοῦ ἀκούοντες καὶ ⸀ποιοῦντες.
translation:
  text: But he answered and said to them, “My mother and my brothers are those who hear the word of God and do it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my siblings.' The Greek says 'brothers,' but the statement's application may extend beyond males.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''are these: those who''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: Retains the common Semitic-Greek narrative pairing rather than collapsing it entirely; this preserves the formal texture while remaining natural in English.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to those people
  lexicon: BDAG
  rationale: Standard prepositional sense with indirect addressees; 'to them' is the natural and sufficiently literal rendering.
- source_word: Μήτηρ μου
  chosen: My mother
  lexicon: BDAG
  rationale: Direct, literal rendering of the singular noun with possessive pronoun.
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my siblings
  lexicon: BDAG
  rationale: Rendered gender-accurately as 'brothers' because the Greek is grammatically masculine plural and the saying intentionally echoes Jesus's literal male relatives while also extending to disciples. An inclusive alternative is possible by implication, but the main text follows the source form per doctrine.
- source_word: οὗτοί εἰσιν
  chosen: are these
  alternatives:
  - are the ones
  - are those
  lexicon: BDAG
  rationale: Keeps the demonstrative force of οὗτοι. 'Are these' is slightly marked in English but best reflects the emphatic identification in the Greek; the following colon helps readability.
- source_word: οἱ ... ἀκούοντες καὶ ποιοῦντες
  chosen: those who hear ... and do it
  alternatives:
  - the ones hearing ... and doing it
  - those who listen ... and act on it
  lexicon: BDAG
  rationale: The substantival present participles describe an ongoing characteristic group. 'Those who hear ... and do it' preserves both the participial force and the parallelism without over-paraphrasing.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering of λόγος here as 'word,' referring to God's spoken message or instruction. 'Word of God' preserves the theological resonance and the genitival structure.
- source_word: ποιοῦντες
  chosen: do it
  alternatives:
  - put it into practice
  - obey it
  lexicon: BDAG
  rationale: ποιέω here means to do or carry out what is heard. 'Do it' is concise and close to the Greek; 'obey it' is interpretive, and 'put it into practice' is more dynamic than necessary.
