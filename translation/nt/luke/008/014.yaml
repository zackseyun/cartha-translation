id: LUK.8.14
reference: Luke 8:14
source:
  edition: SBLGNT
  text: τὸ δὲ εἰς τὰς ἀκάνθας πεσόν, οὗτοί εἰσιν οἱ ἀκούσαντες, καὶ ὑπὸ μεριμνῶν καὶ
    πλούτου καὶ ἡδονῶν τοῦ βίου πορευόμενοι συμπνίγονται καὶ οὐ τελεσφοροῦσιν.
translation:
  text: And the one that fell among the thorns—these are those who have heard, but
    as they go on their way they are choked by the cares and riches and pleasures
    of life, and they do not bear fruit to maturity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worries' for 'cares.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not produce ripe fruit' or 'they do not bring fruit to completion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... πεσόν
  chosen: the one that fell
  alternatives:
  - what fell
  - the seed that fell
  lexicon: BDAG
  rationale: The neuter singular participial expression refers back to the seed in
    the parable, but English can render it idiomatically as 'the one that fell' to
    match the explanatory style of the interpretation. 'The seed that fell' is possible
    but adds an explicit noun not present here.
- source_word: ἀκάνθας
  chosen: thorns
  alternatives:
  - thorn bushes
  lexicon: BDAG
  rationale: Standard rendering in the parable context; concise and natural in English.
- source_word: οὗτοί εἰσιν οἱ ἀκούσαντες
  chosen: these are those who have heard
  alternatives:
  - these are the ones who heard
  lexicon: BDAG
  rationale: The aorist participle ἀκούσαντες is well represented by English perfect
    'have heard' in this explanatory context, indicating those who did hear the word.
    This is smoother than a simple past while preserving the completed action.
- source_word: ὑπὸ μεριμνῶν
  chosen: by the cares
  alternatives:
  - by anxieties
  - by worries
  lexicon: BDAG
  rationale: μέριμνα denotes cares, worries, anxieties. 'Cares' is broad, idiomatic,
    and fits the triad with riches and pleasures.
- source_word: πλούτου
  chosen: riches
  alternatives:
  - wealth
  lexicon: BDAG
  rationale: '''Riches'' is the conventional and natural rendering here, matching
    the moral-spiritual sense of material abundance as a choking influence.'
- source_word: ἡδονῶν τοῦ βίου
  chosen: pleasures of life
  alternatives:
  - life's pleasures
  - pleasures of this life
  lexicon: BDAG
  rationale: ἡδοναί are pleasures; βίος here refers to ordinary earthly life/livelihood
    rather than eternal life. 'Pleasures of life' is clear and preserves the genitival
    relation.
- source_word: πορευόμενοι
  chosen: as they go on their way
  alternatives:
  - while going along
  - as they continue through life
  lexicon: BDAG
  rationale: The present middle participle conveys ongoing movement/process. 'As they
    go on their way' captures the durative sense without overinterpreting it as a
    metaphor for all of life, though that nuance may be present.
- source_word: συμπνίγονται
  chosen: they are choked
  alternatives:
  - they are crowded out
  - they are completely choked
  lexicon: BDAG
  rationale: The passive vividly continues the plant metaphor. 'Choked' preserves
    the agricultural imagery better than more interpretive alternatives.
- source_word: οὐ τελεσφοροῦσιν
  chosen: they do not bear fruit to maturity
  alternatives:
  - they do not mature
  - they do not bring fruit to completion
  - they do not produce ripe fruit
  lexicon: BDAG
  rationale: τελεσφορέω means to bring to completion in fruit-bearing, not merely
    to begin producing. 'Bear fruit to maturity' preserves both the fruit metaphor
    and the idea of incomplete development.
