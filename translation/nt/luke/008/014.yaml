theological_decisions:
- issue: Nature of the failure described in the thorny-soil hearers
  chosen_reading: The translation preserves the agricultural metaphor of being choked
    and failing to bear fruit to maturity without specifying a doctrinal conclusion
    about apostasy, false conversion, or loss of reward.
  alternative_readings:
  - The hearers prove unregenerate
  - The hearers are true believers who become unfruitful
  - The hearers begin well but fall away
  rationale: The verse describes the effect of worldly cares, riches, and pleasures
    on hearers, but does not explicitly settle later theological debates about perseverance
    or regeneration. The wording should preserve the text's tension rather than resolve
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
