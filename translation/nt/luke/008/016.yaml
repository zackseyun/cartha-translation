id: LUK.8.16
reference: Luke 8:16
source:
  edition: SBLGNT
  text: Οὐδεὶς δὲ λύχνον ἅψας καλύπτει αὐτὸν σκεύει ἢ ὑποκάτω κλίνης τίθησιν, ἀλλ’
    ἐπὶ λυχνίας ⸀τίθησιν, ἵνα οἱ εἰσπορευόμενοι βλέπωσιν τὸ φῶς.
translation:
  text: Now no one, after lighting a lamp, covers it with a container or puts it under
    a bed, but puts it on a lampstand, so that those who come in may see the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a vessel.' The Greek term is broad and can refer to various kinds
      of household containers.
    reason: lexical_alternative
  - marker: b
    text: Or 'under a couch.' The Greek word can denote a bed or a couch used for
      reclining.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  chosen: no one
  alternatives:
  - no man
  - nobody
  lexicon: BDAG
  rationale: Indefinite negative referring generically to any person. 'No one' is
    natural modern English and preserves the universal force without unnecessary masculine
    wording.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a discourse transition rather than strong contrast. 'Now'
    signals continuation in readable English; 'but' would overstate adversative force.
- source_word: λύχνον
  chosen: lamp
  alternatives:
  - oil lamp
  - light
  lexicon: BDAG
  rationale: λύχνος denotes a lamp, likely a small household oil lamp. 'Lamp' is the
    standard, concise rendering; 'oil lamp' is more specific than the text requires.
- source_word: ἅψας
  chosen: after lighting
  alternatives:
  - having lit
  - when he has lit
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verbs. 'After lighting' expresses
    the temporal sequence idiomatically in English while preserving the participial
    sense.
- source_word: καλύπτει
  chosen: covers
  alternatives:
  - hides
  - conceals
  lexicon: BDAG
  rationale: The verb literally means to cover. 'Covers' preserves the concrete imagery
    better than the more interpretive 'hides'.
- source_word: σκεύει
  chosen: with a container
  alternatives:
  - with a vessel
  - with a jar
  lexicon: BDAG
  rationale: σκεῦος is a broad term for vessel/container/implement. 'Container' is
    clear modern English and suitably general; 'vessel' is more formal, while 'jar'
    is too specific.
- source_word: ὑποκάτω κλίνης
  chosen: under a bed
  alternatives:
  - under a couch
  - beneath a bed
  lexicon: BDAG
  rationale: κλίνη can denote bed or couch. In this domestic saying, 'bed' is the
    most natural English equivalent; 'couch' is possible but less standard in this
    context.
- source_word: τίθησιν
  chosen: puts
  alternatives:
  - places
  - sets
  lexicon: BDAG
  rationale: Common verb of placing. 'Puts' is simple, natural, and fits both occurrences
    in the verse.
- source_word: ἐπὶ λυχνίας
  chosen: on a lampstand
  alternatives:
  - on a stand
  - on the lampstand
  lexicon: BDAG
  rationale: λυχνία is specifically a lampstand. The anarthrous construction does
    not require 'the' in English; 'a lampstand' communicates the generic practice.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic and clearly purposive in modern
    English.
- source_word: οἱ εἰσπορευόμενοι
  chosen: those who come in
  alternatives:
  - those entering
  - those who enter
  lexicon: BDAG
  rationale: Present middle/passive participle used substantivally for people entering
    the house/room. 'Those who come in' is natural English and preserves the ongoing/generic
    sense.
- source_word: βλέπωσιν τὸ φῶς
  chosen: may see the light
  alternatives:
  - may see the lamp's light
  - can see the light
  lexicon: BDAG
  rationale: Subjunctive after ἵνα expresses intended result/purpose. 'May see the
    light' is the most direct rendering and preserves both literal imagery and possible
    metaphorical resonance without making the metaphor explicit.
