theological_decisions:
- issue: Literal versus metaphorical force of the lamp saying
  chosen_reading: Render the imagery literally in the main text without importing
    an interpretive explanation.
  alternative_readings:
  - Translate more interpretively to foreground revelation/discipleship themes
  rationale: The verse functions proverbially within Jesus's teaching, but the Greek
    itself presents concrete household imagery. Preserving the literal image allows
    the theological implication to emerge from context rather than from the translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
