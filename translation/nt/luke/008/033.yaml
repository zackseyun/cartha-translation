id: LUK.8.33
reference: Luke 8:33
source:
  edition: SBLGNT
  text: ἐξελθόντα δὲ τὰ δαιμόνια ἀπὸ τοῦ ἀνθρώπου εἰσῆλθον εἰς τοὺς χοίρους, καὶ ὥρμησεν
    ἡ ἀγέλη κατὰ τοῦ κρημνοῦ εἰς τὴν λίμνην καὶ ἀπεπνίγη.
translation:
  text: Then the demons came out of the man and entered the pigs, and the herd rushed
    down the steep bank into the lake and was drowned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'down the cliff' or 'over the precipice'; the Greek denotes a steep descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντα
  chosen: came out
  alternatives:
  - having come out
  - went out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in natural English, 'came
    out' best conveys the action sequence without awkwardness. 'Having come out' is
    more formally precise but less readable.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The noun is specifically 'demons,' not the broader expression 'unclean
    spirits' used elsewhere. This preserves the lexical distinction in the Greek.
- source_word: ἀπὸ τοῦ ἀνθρώπου
  chosen: out of the man
  alternatives:
  - from the man
  lexicon: BDAG
  rationale: With ἐξέρχομαι, English idiom prefers 'out of the man.' The singular
    ἀνθρώπου refers to the previously mentioned possessed man, not humanity in general.
- source_word: εἰσῆλθον εἰς τοὺς χοίρους
  chosen: entered the pigs
  alternatives:
  - went into the pigs
  - entered into the pigs
  lexicon: BDAG
  rationale: '''Entered the pigs'' is idiomatic modern English and accurately reflects
    the motion into the animals. ''Pigs'' is more natural and accessible than the
    more formal ''swine'' while remaining precise.'
- source_word: χοίρους
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: Readable modern English favors 'pigs.' 'Swine' is accurate but more traditional/literary
    than necessary.
- source_word: ὥρμησεν
  chosen: rushed
  alternatives:
  - charged
  - hurled itself
  lexicon: BDAG
  rationale: The verb denotes a sudden, forceful movement. 'Rushed' captures the abruptness
    without overinterpreting motive or manner.
- source_word: ἡ ἀγέλη
  chosen: the herd
  alternatives:
  - the drove
  lexicon: BDAG
  rationale: For a group of pigs, 'herd' is the standard clear English collective
    noun.
- source_word: κατὰ τοῦ κρημνοῦ
  chosen: down the steep bank
  alternatives:
  - down the cliff
  - over the precipice
  lexicon: BDAG
  rationale: The phrase indicates downward movement along or over a steep slope. 'Steep
    bank' preserves the topographical sense without overstating it as a sheer vertical
    cliff.
- source_word: λίμνην
  chosen: lake
  alternatives:
  - sea
  lexicon: BDAG
  rationale: λίμνη normally means 'lake.' Since Luke uses λίμνη rather than θάλασσα
    here, 'lake' should be preserved.
- source_word: ἀπεπνίγη
  chosen: was drowned
  alternatives:
  - was choked
  - was drowned to death
  lexicon: BDAG
  rationale: In this context of animals plunging into water, the passive verb means
    being drowned. 'Was drowned' is the clearest idiomatic rendering in English.
