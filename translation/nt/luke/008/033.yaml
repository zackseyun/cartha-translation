theological_decisions:
- issue: Rendering of δαιμόνια in a demonic-possession narrative
  chosen_reading: demons
  alternative_readings:
  - unclean spirits
  rationale: The Greek term in this verse is δαιμόνια, so the translation should not
    substitute a different though related category. This preserves the text's own
    wording without importing additional theological nuance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Degree of specificity in κρημνός
  chosen_reading: steep bank
  alternative_readings:
  - cliff
  - precipice
  rationale: The topographical term can suggest a steep descent, but the verse does
    not require the strongest possible image of a sheer cliff. 'Steep bank' preserves
    the event without embellishment.
  doctrine_reference: Translation philosophy §1, §6
