theological_decisions:
- issue: Moral description of the receptive heart
  chosen_reading: with a good and noble heart
  alternative_readings:
  - with an honest and good heart
  - in a good and upright heart
  rationale: The verse commends the hearers' inner disposition without specifying
    a doctrinal mechanism for how such a heart is formed. The translation preserves
    the positive moral description while avoiding denominationally loaded inferences
    about innate goodness, regeneration order, or merit. The paired adjectives are
    rendered distinctly to preserve the Greek's twofold characterization.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
