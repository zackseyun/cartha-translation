id: LUK.8.15
reference: Luke 8:15
source:
  edition: SBLGNT
  text: τὸ δὲ ἐν τῇ καλῇ γῇ, οὗτοί εἰσιν οἵτινες ἐν καρδίᾳ καλῇ καὶ ἀγαθῇ ἀκούσαντες
    τὸν λόγον κατέχουσιν καὶ καρποφοροῦσιν ἐν ὑπομονῇ.
translation:
  text: But the seed in the good soil—these are the ones who, having heard the word
    with a good and noble heart, hold fast to it and bear fruit with perseverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with an honest and good heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... ἐν τῇ καλῇ γῇ
  chosen: the seed in the good soil
  alternatives:
  - what was sown in the good soil
  - that in the good soil
  lexicon: BDAG
  rationale: The neuter article with the prepositional phrase is elliptical in the
    parable context, referring back to the seed/sowing. Supplying 'the seed' makes
    the English natural while preserving the referent established in the preceding
    explanation. 'Soil' fits the agricultural image more idiomatically than 'ground,'
    though 'ground' is possible.
- source_word: καλῇ γῇ
  chosen: good soil
  alternatives:
  - good ground
  lexicon: BDAG
  rationale: γῆ here refers to arable earth in the parable, so 'soil' is the most
    contextually precise modern English rendering. καλῇ is retained as 'good' to preserve
    the moral/agricultural contrast across the parable.
- source_word: οὗτοί εἰσιν οἵτινες
  chosen: these are the ones who
  alternatives:
  - these are those who
  lexicon: BDAG
  rationale: This construction identifies the referent class. 'The ones who' is clear,
    contemporary English and preserves the explanatory force without unnecessary stiffness.
- source_word: ἐν καρδίᾳ καλῇ καὶ ἀγαθῇ
  chosen: with a good and noble heart
  alternatives:
  - in a good and good heart
  - in an honest and good heart
  - with a good and upright heart
  lexicon: BDAG
  rationale: The phrase describes the inner disposition in which the word is received.
    καρδίᾳ is rendered 'heart' in its common biblical sense of the inner person. καλῇ
    and ἀγαθῇ are near-synonyms; rendering them identically would sound wooden in
    English, so 'good and noble' preserves the twofold commendation. 'Honest and good'
    reflects older tradition but 'honest' can mislead modern readers toward mere truth-telling
    rather than moral quality.
- source_word: ἀκούσαντες τὸν λόγον
  chosen: having heard the word
  alternatives:
  - when they hear the word
  - after hearing the word
  lexicon: BDAG
  rationale: 'The aorist participle is best represented as antecedent to the main
    verbs: they first hear, then hold fast and bear fruit. ''The word'' is retained
    as the established expression in the parable explanation.'
- source_word: κατέχουσιν
  chosen: hold fast to it
  alternatives:
  - hold it fast
  - retain it
  - keep it
  lexicon: BDAG
  rationale: κατέχω here conveys firm retention rather than mere possession. 'Hold
    fast' captures the active, persevering sense. 'To it' is supplied in English because
    the object 'the word' is understood from the previous clause.
- source_word: καρποφοροῦσιν
  chosen: bear fruit
  alternatives:
  - are fruitful
  - produce fruit
  lexicon: BDAG
  rationale: '''Bear fruit'' is the standard and natural English equivalent in agricultural
    and metaphorical contexts, preserving the imagery of the parable.'
- source_word: ἐν ὑπομονῇ
  chosen: with perseverance
  alternatives:
  - in perseverance
  - with endurance
  - patiently
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance or perseverance. 'With perseverance'
    expresses the manner of fruit-bearing in idiomatic English. 'Patiently' is too
    narrow, and 'in perseverance' is less natural.
