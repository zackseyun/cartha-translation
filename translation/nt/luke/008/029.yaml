theological_decisions:
- issue: Rendering of demonic terminology
  chosen_reading: Translate both ἀκάθαρτον πνεῦμα and δαιμόνιον straightforwardly
    as 'unclean spirit' and 'demon' without softening or psychologizing.
  alternative_readings:
  - evil spirit
  - impure spirit
  rationale: The verse presents personal demonic agency as part of the narrative world.
    Historic orthodox doctrine permits and the text requires this direct rendering;
    the translation should not reduce it to metaphor or mere illness.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
revisions:
- timestamp: '2026-04-21T12:39:21Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
