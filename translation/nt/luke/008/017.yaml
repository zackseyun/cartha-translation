theological_decisions:
- issue: Scope of disclosure saying
  chosen_reading: A general principle that what is hidden or secret will eventually
    be disclosed.
  alternative_readings:
  - A specifically eschatological disclosure at final judgment
  - A contextual reference to the revelation of Jesus' teaching and the response to
    it
  rationale: The verse itself states the principle without specifying the exact temporal
    horizon. The translation therefore preserves the broad wording and does not narrow
    it to final judgment alone or to one immediate contextual application.
  doctrine_reference: Preserve theological tension rather than resolve it.
