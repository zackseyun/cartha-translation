id: LUK.8.17
reference: Luke 8:17
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν κρυπτὸν ὃ οὐ φανερὸν γενήσεται, οὐδὲ ἀπόκρυφον ὃ οὐ ⸂μὴ γνωσθῇ⸃
    καὶ εἰς φανερὸν ἔλθῃ.
translation:
  text: For nothing is hidden that will not become evident, nor is anything secret
    that will not be known and come to light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'become manifest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will certainly be known'; the Greek construction strongly denies that
      anything secret will remain unknown.
    reason: lexical_alternative
  - marker: c
    text: Or 'come into the open.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτὸν
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: BDAG
  rationale: κρυπτός denotes what is hidden or concealed. 'Hidden' is natural English
    and pairs well with the future disclosure in the clause.
- source_word: φανερὸν
  chosen: evident
  alternatives:
  - manifest
  - plain
  - visible
  lexicon: BDAG
  rationale: In the first clause φανερός contrasts with κρυπτός. 'Evident' communicates
    becoming openly apparent in readable modern English; 'manifest' is more traditional
    but less natural.
- source_word: γενήσεται
  chosen: will become
  alternatives:
  - will be
  - will come to be
  lexicon: BDAG
  rationale: 'γίνομαι here marks a change of state: what is hidden will come into
    an open condition. ''Will become'' preserves that nuance better than a simple
    stative ''will be''.'
- source_word: ἀπόκρυφον
  chosen: secret
  alternatives:
  - hidden
  - concealed
  lexicon: BDAG
  rationale: Using 'secret' here gives a slight lexical distinction from κρυπτόν while
    preserving the close parallelism of the two clauses.
- source_word: οὐ μὴ γνωσθῇ
  chosen: will not be known
  alternatives:
  - will certainly be known
  - will fail to be known
  lexicon: BDAG
  rationale: The construction is a strong negation with an aorist passive subjunctive
    in a relative clause, yielding the sense that there is nothing secret that will
    remain unknown. In idiomatic English, 'will not be known' within the larger negative-relative
    structure conveys the meaning clearly.
- source_word: εἰς φανερὸν ἔλθῃ
  chosen: come to light
  alternatives:
  - come into the open
  - come into plain view
  lexicon: BDAG
  rationale: This idiom expresses public disclosure. 'Come to light' is a standard
    English equivalent that is both clear and appropriately literary.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ connects this verse as a ground or explanation for the preceding
    saying. 'For' preserves that explanatory force succinctly.
