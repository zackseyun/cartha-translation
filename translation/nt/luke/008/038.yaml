theological_decisions:
- issue: Rendering of δαιμόνια in a miracle/exorcism context
  chosen_reading: the demons
  alternative_readings:
  - the evil spirits
  rationale: The text presents personal demonic entities leaving the man. Rendering
    as 'demons' preserves the supernatural ontology assumed by the passage and avoids
    softening the claim into a vaguer category.
