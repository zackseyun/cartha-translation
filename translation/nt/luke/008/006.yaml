id: LUK.8.6
reference: Luke 8:6
source:
  edition: SBLGNT
  text: καὶ ἕτερον ⸀κατέπεσεν ἐπὶ τὴν πέτραν, καὶ φυὲν ἐξηράνθη διὰ τὸ μὴ ἔχειν ἰκμάδα.
translation:
  text: And another fell on the rock, and after it sprang up, it withered because
    it had no moisture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon the rock.' The Greek has the singular 'rock,' preserving the image
      of seed landing on a rocky surface rather than using the broader phrase 'rocky
      ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  chosen: another
  alternatives:
  - other
  lexicon: BDAG
  rationale: Neuter singular adjective used substantivally in the parable sequence;
    'another' is idiomatic English for the next seed/instance in a series.
- source_word: κατέπεσεν
  chosen: fell
  alternatives:
  - fell down
  lexicon: BDAG
  rationale: Aorist of καταπίπτω, straightforwardly describing the seed's falling.
    'Fell' is natural and sufficient in English without adding unnecessary emphasis.
- source_word: ἐπὶ τὴν πέτραν
  chosen: on the rock
  alternatives:
  - upon the rock
  - on the rocky ground
  lexicon: BDAG
  rationale: πέτρα is singular 'rock,' not the broader idea 'rocky ground.' The article
    supports a definite expression. 'On the rock' preserves the concrete imagery of
    the Greek.
- source_word: φυὲν
  chosen: after it sprang up
  alternatives:
  - having grown
  - when it came up
  - having sprouted
  lexicon: BDAG
  rationale: Aorist passive participle from φύω, functioning temporally prior to the
    main verb. 'After it sprang up' captures the sequence and fits seed imagery idiomatically.
- source_word: ἐξηράνθη
  chosen: it withered
  alternatives:
  - it dried up
  - it was dried up
  lexicon: BDAG
  rationale: 'Passive/intransitive sense in context: the plant dried out. ''Withered''
    is the most natural English for vegetation and preserves the agricultural image.'
- source_word: διὰ τὸ μὴ ἔχειν
  chosen: because it had no
  alternatives:
  - because it did not have
  - for lack of
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses cause. Rendering as 'because
    it had no' is smooth modern English while preserving the causal force.
- source_word: ἰκμάδα
  chosen: moisture
  alternatives:
  - dampness
  - sap
  lexicon: BDAG
  rationale: ἰκμάς denotes moisture needed for growth. 'Moisture' is clear, accessible,
    and contextually precise; 'sap' would be too specific and potentially misleading.
