id: LUK.8.30
reference: Luke 8:30
source:
  edition: SBLGNT
  text: ἐπηρώτησεν δὲ αὐτὸν ὁ ⸀Ἰησοῦς· Τί σοι ⸂ὄνομά ἐστιν⸃; ὁ δὲ εἶπεν· Λεγιών, ὅτι
    ⸂εἰσῆλθεν δαιμόνια πολλὰ⸃ εἰς αὐτόν.
translation:
  text: Then Jesus asked him, “What is your name?” And he said, “Legion,” because
    many demons had entered into him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because many demons entered into him.”
    reason: lexical_alternative
  - marker: b
    text: “Legion” is a Latin loanword referring to a large Roman military unit; here
      it signifies that many demons were in the man.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐπερωτάω here introduces a direct question in straightforward
    narrative. 'Asked' is natural modern English and sufficiently reflects the verb
    without unnecessary stiffness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative progression. 'Then' conveys the mild continuative
    force in readable English better than leaving it untranslated, while avoiding
    overemphasis.
- source_word: Τί σοι ὄνομά ἐστιν
  chosen: What is your name?
  alternatives:
  - What is your name called?
  - What name do you have?
  lexicon: BDAG
  rationale: This idiomatic Greek expression is best rendered by the standard English
    question 'What is your name?' preserving sense rather than wooden form.
- source_word: Λεγιών
  chosen: Legion
  lexicon: BDAG
  rationale: Proper designation is transliterated, in keeping with the translation
    philosophy to transliterate names. The term also carries its recognizable Roman
    military association, which English readers can infer or receive by footnote if
    needed.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the name 'Legion.' 'Because' is clearer
    in contemporary English than 'for' and preserves the causal sense.
- source_word: εἰσῆλθεν
  chosen: had entered
  alternatives:
  - entered
  - came into
  lexicon: BDAG
  rationale: 'Although the Greek is aorist, English past perfect fits the discourse
    relation: the demons'' entering precedes the present naming explanation. This
    is an optimal-equivalence adjustment for temporal clarity.'
- source_word: δαιμόνια πολλὰ
  chosen: many demons
  alternatives:
  - many evil spirits
  lexicon: BDAG
  rationale: δαιμόνια is most directly and consistently rendered 'demons.' 'Many demons'
    preserves both lexical specificity and the emphasis of plurality.
- source_word: εἰς αὐτόν
  chosen: into him
  alternatives:
  - in him
  lexicon: BDAG
  rationale: εἰς normally indicates movement into. 'Into him' preserves the directional
    force of possession/entry more precisely than the flatter 'in him.'
