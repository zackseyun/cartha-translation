theological_decisions:
- issue: Rendering δαιμόνια in a demonic-possession context
  chosen_reading: demons
  alternative_readings:
  - evil spirits
  rationale: The text refers to personal malevolent spiritual beings entering the
    man. 'Demons' is the most direct rendering and avoids softening the supernatural
    claim made by the Greek.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Temporal relation of εἰσῆλθεν to the naming explanation
  chosen_reading: had entered
  alternative_readings:
  - entered
  rationale: Using the English past perfect clarifies that the demons' entry is prior
    to the answer 'Legion.' This is a translation-level temporal clarification, not
    a doctrinal addition.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
