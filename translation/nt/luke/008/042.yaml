id: LUK.8.42
reference: Luke 8:42
source:
  edition: SBLGNT
  text: ὅτι θυγάτηρ μονογενὴς ἦν αὐτῷ ὡς ἐτῶν δώδεκα καὶ αὐτὴ ἀπέθνῃσκεν. Ἐν δὲ τῷ
    ὑπάγειν αὐτὸν οἱ ὄχλοι συνέπνιγον αὐτόν.
translation:
  text: because he had an only daughter, about twelve years old, and she was dying.
    And as he went, the crowds were pressing in on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one and only daughter.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'about twelve years.'
    reason: lexical_alternative
  - marker: c
    text: The Greek verb can suggest the crowd was pressing so tightly as to nearly
      crush him.
    reason: lexical_alternative
lexical_decisions:
- source_word: μονογενὴς
  chosen: only
  alternatives:
  - one and only
  - only-begotten
  lexicon: BDAG
  rationale: With θυγάτηρ, the sense is an only child/unique daughter, not a metaphysical
    or begetting-focused nuance. 'Only daughter' is natural English and preserves
    the familial force.
- source_word: ὡς ἐτῶν δώδεκα
  chosen: about twelve years old
  alternatives:
  - about twelve years of age
  - approximately twelve years old
  lexicon: BDAG
  rationale: ὡς with a number indicates approximation. Rendering it as 'about' preserves
    that nuance better than a flat 'twelve years old.'
- source_word: ἀπέθνῃσκεν
  chosen: was dying
  alternatives:
  - was at the point of death
  - was dying away
  lexicon: BDAG
  rationale: The imperfect portrays an ongoing process rather than a completed death.
    'Was dying' is the clearest natural English equivalent.
- source_word: Ἐν δὲ τῷ ὑπάγειν αὐτὸν
  chosen: as he went
  alternatives:
  - while he was going
  - as he was on his way
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous action. 'As
    he went' is concise and natural, though the sense is specifically movement toward
    Jairus's house.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: The plural noun is best preserved as 'the crowds,' reflecting multiple
    pressing groups rather than a singular collective.
- source_word: συνέπνιγον
  chosen: were pressing in on
  alternatives:
  - were crowding around
  - were almost crushing
  - were choking
  lexicon: BDAG
  rationale: The verb literally suggests pressing together so as to crowd or nearly
    suffocate. In this narrative context, 'were pressing in on' communicates the physical
    crush without overstating beyond the immediate scene.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: This explains the urgency of Jairus's plea from the previous verse. 'Because'
    clearly marks the causal connection.
- source_word: αὐτῷ
  chosen: he had
  alternatives:
  - to him there was
  - belonging to him was
  lexicon: BDAG
  rationale: The dative with ἦν is idiomatically possessive. English expresses this
    most naturally as 'he had.'
