theological_decisions:
- issue: Reference of 'brothers' in relation to Jesus's family
  chosen_reading: Render ἀδελφοί as 'brothers' without interpretive expansion.
  alternative_readings:
  - kinsmen
  - relatives
  - siblings
  rationale: The verse itself uses the ordinary term ἀδελφοί. Because debates about
    Jesus's family relations extend beyond what this verse alone states, the translation
    preserves the lexical sense and does not import a harmonizing doctrinal interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
