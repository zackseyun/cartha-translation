id: LUK.8.20
reference: Luke 8:20
source:
  edition: SBLGNT
  text: ⸂ἀπηγγέλη δὲ⸃ ⸀αὐτῷ· Ἡ μήτηρ σου καὶ οἱ ἀδελφοί σου ἑστήκασιν ἔξω ἰδεῖν ⸂σε
    θέλοντες⸃.
translation:
  text: And it was reported to him, “Your mother and your brothers are standing outside,
    wanting to see you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relatives,' if ἀδελφοί is understood more broadly in context; the Greek
      term ordinarily means 'brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπηγγέλη
  chosen: it was reported
  alternatives:
  - it was told
  - word came
  - it was announced
  lexicon: BDAG
  rationale: Aorist passive of ἀπαγγέλλω naturally conveys that a report was brought
    to Jesus. 'It was reported' preserves the passive and remains idiomatic in English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is a natural, unobtrusive rendering in modern English.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative is retained explicitly in English to reflect the indirect
    object of the report.
- source_word: μήτηρ
  chosen: mother
  alternatives:
  - mom
  lexicon: BDAG
  rationale: '''Mother'' is the standard, dignified rendering and fits the narrative
    register.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this context refers
    to Jesus's male family members as presented in the narrative. Per translation
    philosophy, a gender-accurate rendering is preferred over a gender-neutral one.
- source_word: ἑστήκασιν
  chosen: are standing
  alternatives:
  - stand
  - have been standing
  lexicon: BDAG
  rationale: Perfect form of ἵστημι with present-state force; 'are standing' best
    captures the resulting state in idiomatic English.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - outdoors
  - outside the house
  lexicon: BDAG
  rationale: Simple spatial adverb; 'outside' is direct and sufficient without adding
    location details not explicit in the text.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to meet
  - to speak with
  lexicon: BDAG
  rationale: Infinitive of ὁράω is most basically 'to see.' Broader paraphrases like
    'to meet' are possible in context but go beyond the lexical sense.
- source_word: θέλοντες
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: Present participle modifying 'mother and brothers'; 'wanting' gives the
    contemporaneous sense naturally in English.
