id: LUK.8.28
reference: Luke 8:28
source:
  edition: SBLGNT
  text: ἰδὼν δὲ τὸν ⸀Ἰησοῦν ἀνακράξας προσέπεσεν αὐτῷ καὶ φωνῇ μεγάλῃ εἶπεν· Τί ἐμοὶ
    καὶ σοί, Ἰησοῦ υἱὲ τοῦ θεοῦ τοῦ ὑψίστου; δέομαί σου, μή με βασανίσῃς·
translation:
  text: But when he saw Jesus, he cried out, fell down before him, and said with a
    loud voice, “What do you have to do with me, Jesus, Son of the Most High God?
    I beg you, do not torment me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “What is there between me and you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when he saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verbs.
    'When he saw' is natural English and preserves the temporal force without awkwardness.
- source_word: ἀνακράξας
  chosen: he cried out
  alternatives:
  - crying out
  - shouting
  lexicon: BDAG
  rationale: The participle denotes a loud vocal outburst. 'Cried out' fits the narrative
    register and pairs well with the later explicit 'with a loud voice' without collapsing
    the two expressions.
- source_word: προσέπεσεν αὐτῷ
  chosen: fell down before him
  alternatives:
  - fell before him
  - fell at his feet
  lexicon: BDAG
  rationale: προσπίπτω commonly means to fall before someone in a posture of submission
    or desperation. 'Before him' is slightly broader than 'at his feet' and stays
    close to the Greek dative.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: This is a straightforward dative of manner/instrument. 'With a loud voice'
    preserves the vividness and formal shape of the Greek.
- source_word: Τί ἐμοὶ καὶ σοί
  chosen: What do you have to do with me
  alternatives:
  - What is there between me and you
  - What have I to do with you
  lexicon: BDAG
  rationale: This Semitic-influenced idiom expresses dissociation or protest. 'What
    do you have to do with me' is idiomatic modern English while preserving the confrontational
    sense. A more literal alternative is preserved in a footnote.
- source_word: υἱὲ τοῦ θεοῦ τοῦ ὑψίστου
  chosen: Son of the Most High God
  alternatives:
  - Son of God Most High
  - Son of God, the Most High
  lexicon: BDAG
  rationale: The genitive construction is best rendered as the established title 'the
    Most High God.' This preserves the demon's recognition of Jesus' identity without
    adding doctrinal explanation beyond the text.
- source_word: δέομαί σου
  chosen: I beg you
  alternatives:
  - I implore you
  - I plead with you
  lexicon: BDAG
  rationale: The middle/passive form here conveys earnest entreaty. 'I beg you' is
    direct, natural, and appropriately urgent.
- source_word: μή με βασανίσῃς
  chosen: do not torment me
  alternatives:
  - do not torture me
  - do not afflict me
  lexicon: BDAG
  rationale: βασανίζω can denote severe torment or torture. In this exorcism context,
    'torment' is the most natural English choice and matches the spiritual-judicial
    sense without over-specifying physical torture.
