theological_decisions:
- issue: Rendering the demon's confession of Jesus' identity
  chosen_reading: Jesus, Son of the Most High God
  rationale: The translation preserves the full christological force of the address
    as spoken in the text, neither softening it nor expanding it into later doctrinal
    formulae. This aligns with orthodox Christology while remaining text-bound.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
