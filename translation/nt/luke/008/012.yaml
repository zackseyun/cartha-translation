theological_decisions:
- issue: Relation of believing and salvation
  chosen_reading: Rendered the clause as 'so that they may not believe and be saved'
    without importing a denominational explanation of how faith and salvation relate
    causally.
  alternative_readings:
  - More interpretive renderings that stress perseverance, effectual calling, or merely
    intellectual assent
  rationale: 'The Greek states the devil''s purpose in removing the word: preventing
    belief unto salvation. The translation preserves that statement without resolving
    broader debates between Christian traditions.'
  doctrine_reference: Preserve theological tension rather than resolve it.
