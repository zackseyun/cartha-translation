id: LUK.8.12
reference: Luke 8:12
source:
  edition: SBLGNT
  text: οἱ δὲ παρὰ τὴν ὁδόν εἰσιν οἱ ⸀ἀκούσαντες, εἶτα ἔρχεται ὁ διάβολος καὶ αἴρει
    τὸν λόγον ἀπὸ τῆς καρδίας αὐτῶν, ἵνα μὴ πιστεύσαντες σωθῶσιν.
translation:
  text: And those beside the road are the ones who have heard; then the devil comes
    and takes away the word from their heart, so that they may not believe and be
    saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest they believe and be saved.'
    reason: lexical_alternative
  - marker: b
    text: '''The word'' here means the proclaimed message of God in the parable.'
    reason: cross_reference
lexical_decisions:
- source_word: παρὰ τὴν ὁδόν
  chosen: beside the road
  alternatives:
  - along the path
  - by the wayside
  lexicon: BDAG
  rationale: A spatial rendering is required by the preposition παρά with the accusative.
    'Beside the road' is natural modern English and preserves the image of seed falling
    adjacent to the traveled way without archaic 'wayside'.
- source_word: ἀκούσαντες
  chosen: have heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: The aorist participle refers to those characterized as having heard the
    message. English present perfect fits the explanatory sense in Jesus' interpretation
    and reads naturally.
- source_word: εἶτα
  chosen: then
  alternatives:
  - afterward
  - next
  lexicon: BDAG
  rationale: Marks the subsequent action in straightforward sequence.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In this context διάβολος is the personal evil being, not merely a descriptive
    adjective. 'The devil' is the standard and clearest English rendering.
- source_word: αἴρει
  chosen: takes away
  alternatives:
  - removes
  - snatches away
  lexicon: BDAG
  rationale: αἴρω here means to remove or carry off. 'Takes away' is idiomatic and
    sufficiently forceful without overinterpreting the manner as violent.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: In the parable's interpretation λόγος refers to the proclaimed word of
    God. 'The word' preserves the biblical idiom; the more explicit sense is clear
    from context.
- source_word: καρδίας
  chosen: heart
  alternatives:
  - inner being
  - mind
  lexicon: BDAG
  rationale: '''Heart'' best preserves the biblical anthropology of the center of
    thought, will, and response, rather than narrowing it to intellect alone.'
- source_word: ἵνα μὴ πιστεύσαντες σωθῶσιν
  chosen: so that they may not believe and be saved
  alternatives:
  - lest they believe and be saved
  lexicon: BDAG
  rationale: ἵνα with μή expresses purpose/result from the devil's action. The aorist
    participle πιστεύσαντες preceding σωθῶσιν is naturally rendered in English as
    coordinated verbal action, 'believe and be saved,' without forcing a wooden participial
    structure.
- source_word: πιστεύσαντες
  chosen: believe
  alternatives:
  - trust
  - have faith
  lexicon: BDAG; Louw-Nida
  rationale: The default rendering for πιστεύω/πίστις in the project is 'believe/faith'
    unless context strongly favors another nuance. 'Believe' is the most direct verbal
    equivalent here.
- source_word: σωθῶσιν
  chosen: be saved
  alternatives:
  - be delivered
  lexicon: BDAG
  rationale: In Luke's soteriological context, σῴζω here refers to salvation in the
    full redemptive sense, not merely temporal rescue. 'Be saved' is the clearest
    and most established rendering.
