id: LUK.8.52
reference: Luke 8:52
source:
  edition: SBLGNT
  text: ἔκλαιον δὲ πάντες καὶ ἐκόπτοντο αὐτήν. ὁ δὲ εἶπεν· Μὴ κλαίετε, ⸂οὐ γὰρ⸃ ἀπέθανεν
    ἀλλὰ καθεύδει.
translation:
  text: And they were all weeping and mourning for her. But he said, “Do not weep,
    for she has not died, but is sleeping.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is asleep.' Jesus' wording uses sleep as a metaphorical description
      in the context of her impending restoration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαιον
  chosen: were weeping
  alternatives:
  - were crying
  - wept
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing action; 'were weeping' preserves the
    durative sense better than simple past 'wept.'
- source_word: πάντες
  chosen: they were all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: Explicitly preserves the universal scope of the mourners in natural English.
- source_word: ἐκόπτοντο αὐτήν
  chosen: mourning for her
  alternatives:
  - lamenting her
  - beating themselves for her
  lexicon: BDAG
  rationale: κόπτομαι in mourning contexts refers to lamentation, often with breast-beating
    or ritual mourning. 'Mourning for her' communicates the sense clearly in modern
    English without over-specifying the physical gesture that is only implicit here.
- source_word: Μὴ κλαίετε
  chosen: Do not weep
  alternatives:
  - Stop weeping
  - Do not cry
  lexicon: BDAG
  rationale: Present imperative with μή can imply cessation of an ongoing action,
    but English 'Do not weep' is a natural prohibition that fits the context without
    becoming overly interpretive.
- source_word: οὐ γὰρ
  chosen: for ... not
  alternatives:
  - because ... not
  - for indeed ... not
  lexicon: BDAG
  rationale: γάρ gives the reason for Jesus' command; 'for' preserves the explanatory
    force in concise English.
- source_word: ἀπέθανεν
  chosen: has not died
  alternatives:
  - did not die
  - is not dead
  lexicon: BDAG
  rationale: Aorist is rendered idiomatically in English as present perfect here because
    the present state resulting from death is in view and contrasts with 'is sleeping.'
- source_word: καθεύδει
  chosen: is sleeping
  alternatives:
  - sleeps
  - is asleep
  lexicon: BDAG
  rationale: Present tense is best conveyed as 'is sleeping.' This preserves the metaphor
    Jesus uses without flattening it into a mere adjective.
