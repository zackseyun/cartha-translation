theological_decisions:
- issue: Jesus' statement that the girl 'has not died, but is sleeping'
  chosen_reading: Retain the literal wording as spoken by Jesus, preserving the metaphor
    of sleep for death/reversal without interpretively resolving it in the main text.
  alternative_readings:
  - She is not permanently dead but only sleeping
  - She appears dead but is actually asleep
  rationale: The verse presents Jesus' own metaphorical or revelatory framing of the
    girl's condition. The translation should preserve the theological tension rather
    than explain it away. Rendering 'is sleeping' keeps the wording transparent and
    allows readers to see the narrative claim without importing a doctrinal explanation
    into the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
