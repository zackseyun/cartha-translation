theological_decisions:
- issue: Whether to make explicit the girl's identity in English though the Greek
    clause only says 'she had died'
  chosen_reading: Retain 'she had died' in the main clause, with the feminine referent
    understood from context.
  alternative_readings:
  - the child had died
  - the girl was dead
  rationale: The Greek verb is third person singular without an explicit noun, but
    the feminine referent is clear from the surrounding narrative. Rendering 'she
    had died' preserves the source's economy without importing extra wording into
    the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
