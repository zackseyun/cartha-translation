id: LUK.8.53
reference: Luke 8:53
source:
  edition: SBLGNT
  text: καὶ κατεγέλων αὐτοῦ, εἰδότες ὅτι ἀπέθανεν.
translation:
  text: And they were laughing at him, because they knew that she had died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατεγέλων
  chosen: were laughing at
  alternatives:
  - were mocking
  - were ridiculing
  - laughed at
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action, so 'were laughing
    at' better reflects the verbal aspect than a simple past 'laughed at.' The verb
    carries derisive force, but 'laughing at' is the most natural modern English rendering
    here and fits the immediate context of scorn toward Jesus' statement.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - at him
  lexicon: BDAG
  rationale: The genitive pronoun depends on καταγελάω, which idiomatically takes
    the person mocked. In English this is naturally expressed as 'laughing at him,'
    making the object explicit in idiomatic form.
- source_word: εἰδότες
  chosen: because they knew
  alternatives:
  - since they knew
  - knowing
  lexicon: BDAG
  rationale: Although formally a participle ('knowing'), in context it gives the reason
    for their reaction. 'Because they knew' communicates the causal sense clearly
    in natural English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what they knew: ''that she had died.''
    The causal relation is already conveyed by the participle εἰδότες, so ''that''
    is the best fit here.'
- source_word: ἀπέθανεν
  chosen: had died
  alternatives:
  - died
  - was dead
  lexicon: BDAG
  rationale: The aorist states the completed event of death. In English, 'had died'
    fits the narrative sequence and the reason for their certainty. 'Was dead' would
    shift from event to state, which is not the verb's primary force.
