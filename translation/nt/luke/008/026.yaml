id: LUK.8.26
reference: Luke 8:26
source:
  edition: SBLGNT
  text: Καὶ κατέπλευσαν εἰς τὴν χώραν τῶν ⸀Γερασηνῶν, ἥτις ἐστὶν ἀντιπέρα τῆς Γαλιλαίας.
translation:
  text: And they sailed down to the region of the Gerasenes, which is opposite Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and parallel Gospel passages read 'Gadarenes' or 'Gergesenes.'
    reason: textual_variant
lexical_decisions:
- source_word: κατέπλευσαν
  chosen: sailed down
  alternatives:
  - sailed
  - came by boat
  - landed
  lexicon: BDAG
  rationale: The aorist of καταπλέω denotes traveling by water to a place, often with
    the nuance of coming down to shore or arriving by ship. 'Sailed down' preserves
    the directional force of κατά better than simply 'sailed,' while remaining natural
    English.
- source_word: χώραν
  chosen: region
  alternatives:
  - country
  - land
  - territory
  lexicon: BDAG
  rationale: χώρα commonly refers to a district or region rather than a modern nation-state.
    'Region' is idiomatic and avoids the potentially misleading 'country.'
- source_word: Γερασηνῶν
  chosen: Gerasenes
  alternatives:
  - people of Gerasa
  lexicon: BDAG
  rationale: This is the standard transliteration of the ethnicon/genitival designation.
    Following the translation philosophy, names are transliterated rather than translated.
- source_word: ἥτις
  chosen: which
  alternatives:
  - that region which
  - which indeed
  lexicon: BDAG
  rationale: ἥτις introduces a descriptive relative clause referring back to the region.
    'Which' is sufficient in English; the slightly qualitative force does not require
    expansion here.
- source_word: ἀντιπέρα
  chosen: opposite
  alternatives:
  - across from
  - on the other side of
  lexicon: BDAG
  rationale: ἀντιπέρα indicates being opposite or across from. 'Opposite' is concise
    and accurate, though 'across from' is a viable idiomatic alternative.
- source_word: Γαλιλαίας
  chosen: Galilee
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
