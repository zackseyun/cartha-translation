theological_decisions:
- issue: Place-name textual/geographical variation in the Synoptic tradition
  chosen_reading: Gerasenes
  alternative_readings:
  - Gadarenes
  - Gergesenes
  rationale: The SBLGNT text reads Γερασηνῶν here, so the main text follows that reading.
    Because parallel passages and manuscript traditions preserve other place names,
    the alternatives are worth preserving in a footnote for transparency rather than
    harmonizing the text.
