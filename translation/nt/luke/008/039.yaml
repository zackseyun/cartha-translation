theological_decisions:
- issue: Parallel between 'God' in Jesus' command and 'Jesus' in the man's proclamation
  chosen_reading: 'Preserve the wording exactly as a narrative parallel: God has done
    for you / Jesus had done for him'
  alternative_readings:
  - Harmonize both clauses to 'God'
  - Harmonize both clauses to 'Jesus'
  - Make the implication explicit by adding 'that is, Jesus'
  rationale: Luke's wording intentionally places 'God' and 'Jesus' in parallel without
    editorial explanation. The translation should preserve this theological force
    without adding interpretive glosses beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
