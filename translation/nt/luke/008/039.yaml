id: LUK.8.39
reference: Luke 8:39
source:
  edition: SBLGNT
  text: Ὑπόστρεφε εἰς τὸν οἶκόν σου, καὶ διηγοῦ ὅσα ⸂σοι ἐποίησεν⸃ ὁ θεός. καὶ ἀπῆλθεν
    καθ’ ὅλην τὴν πόλιν κηρύσσων ὅσα ἐποίησεν αὐτῷ ὁ Ἰησοῦς.
translation:
  text: Return to your house, and tell what great things God has done for you. And
    he went away, proclaiming throughout the whole city what Jesus had done for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that God has done for you.' The Greek is literally 'what things
      God did for you'; 'great things' brings out the magnitude implied in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπόστρεφε
  chosen: Return
  alternatives:
  - Go back
  lexicon: BDAG
  rationale: Present imperative of ὑποστρέφω calls for a direct command to go back
    to a prior place. 'Return' is concise and natural.
- source_word: εἰς τὸν οἶκόν σου
  chosen: to your house
  alternatives:
  - to your home
  lexicon: BDAG
  rationale: οἶκος can mean house or household/home. Here the spatial sense with εἰς
    favors 'house,' though in English it also implies returning home.
- source_word: διηγοῦ
  chosen: tell
  alternatives:
  - recount
  - describe fully
  lexicon: BDAG
  rationale: The middle imperative of διηγέομαι means to relate or recount in detail.
    'Tell' is the most readable modern English equivalent in this command context.
- source_word: ὅσα σοι ἐποίησεν ὁ θεός
  chosen: what great things God has done for you
  alternatives:
  - all that God did for you
  - what God has done for you
  lexicon: BDAG
  rationale: ὅσα is literally 'what things' or 'all that.' English idiom often supplies
    'great things' in such contexts to reflect the magnitude implied by the narrative
    setting, while still staying close to the sense of the command.
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - he departed
  - he went
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι indicates departure from the scene. 'Went away' preserves
    that nuance better than simply 'went.'
- source_word: καθ’ ὅλην τὴν πόλιν
  chosen: throughout the whole city
  alternatives:
  - through the whole city
  - all over the city
  lexicon: BDAG
  rationale: κατά with the accusative here has a distributive sense, indicating movement
    or proclamation throughout the city.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: κηρύσσω is stronger than merely 'telling'; 'proclaiming' preserves the
    public heralding sense without importing formal sermonic overtones.
- source_word: ὅσα ἐποίησεν αὐτῷ ὁ Ἰησοῦς
  chosen: what Jesus had done for him
  alternatives:
  - all that Jesus did for him
  - what Jesus did for him
  lexicon: BDAG
  rationale: This mirrors the earlier clause about God, preserving Luke's deliberate
    parallel. 'Had done' is natural English in narrative sequence after 'he went away.'
