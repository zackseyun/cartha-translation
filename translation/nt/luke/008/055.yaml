id: LUK.8.55
reference: Luke 8:55
source:
  edition: SBLGNT
  text: καὶ ἐπέστρεψεν τὸ πνεῦμα αὐτῆς, καὶ ἀνέστη παραχρῆμα, καὶ διέταξεν αὐτῇ δοθῆναι
    φαγεῖν.
translation:
  text: And her spirit returned, and she got up immediately, and he directed that
    food be given to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that she be given something to eat.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'her breath returned.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: BDAG
  rationale: The aorist of ἐπιστρέφω here describes the restoration of the girl's
    life/spirit. 'Returned' is the most natural English equivalent and preserves the
    concrete sense without adding interpretation.
- source_word: τὸ πνεῦμα αὐτῆς
  chosen: her spirit
  alternatives:
  - her breath
  - the spirit of her
  lexicon: BDAG
  rationale: πνεῦμα can mean spirit, breath, or wind, but in this resurrection context
    'her spirit' best reflects the Greek and the narrative's implication of life returning.
    'Breath' is possible but narrower and less idiomatic here.
- source_word: ἀνέστη
  chosen: she got up
  alternatives:
  - she arose
  - she stood up
  lexicon: BDAG
  rationale: ἀνίστημι commonly means 'rise' or 'get up.' 'She got up' is clear modern
    English and fits the immediate physical action after restoration to life.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb emphasizes the immediacy of the miracle. 'Immediately' is
    a standard, natural rendering.
- source_word: διέταξεν
  chosen: he directed
  alternatives:
  - he ordered
  - he commanded
  lexicon: BDAG
  rationale: διατάσσω can denote giving an order or instruction. 'He directed' preserves
    the authoritative sense while fitting the practical instruction that follows.
    'Ordered' or 'commanded' are possible but slightly harsher in English tone.
- source_word: αὐτῇ δοθῆναι φαγεῖν
  chosen: that food be given to her
  alternatives:
  - that she be given something to eat
  - to give her food to eat
  lexicon: BDAG
  rationale: The infinitive construction expresses Jesus' instruction that she receive
    food. 'That food be given to her' is concise and faithful; the idea 'to eat' is
    naturally implied by 'food,' though the Greek explicitly includes φαγεῖν.
- source_word: φαγεῖν
  chosen: food be given to her
  alternatives:
  - something to eat
  - to eat
  lexicon: BDAG
  rationale: φαγεῖν explicitly means 'to eat.' In English, the idiom 'food be given
    to her' communicates the same practical sense in combination with δοθῆναι. The
    alternative 'something to eat' is slightly more expansive and is preserved in
    a footnote as a lexical alternative.
