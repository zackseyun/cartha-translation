theological_decisions:
- issue: Meaning of πνεῦμα in a resurrection context
  chosen_reading: her spirit returned
  alternative_readings:
  - her breath returned
  rationale: The verse describes restoration from death, and 'spirit' best preserves
    the lexical range and theological weight of πνεῦμα without reducing it to mere
    respiration. The alternative is possible lexically but less fitting in context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
