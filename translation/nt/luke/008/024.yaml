theological_decisions:
- issue: Rendering Jesus' address title Ἐπιστάτα
  chosen_reading: Master
  alternative_readings:
  - Teacher
  - Commander
  rationale: The term signals authority and respectful address to Jesus in Luke. 'Master'
    preserves this nuance without importing later ecclesiastical terminology or diminishing
    the force to mere pedagogy.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Portrayal of Jesus' authority over creation in ἐπετίμησεν
  chosen_reading: rebuked
  alternative_readings:
  - commanded
  - spoke to
  rationale: The text presents Jesus exercising direct authority over wind and water.
    'Rebuked' preserves the verbal force used elsewhere in the Gospels for authoritative
    restraint, without adding doctrinal explanation beyond the text itself.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
