theological_decisions:
- issue: Scope of σῴζω in a healing context
  chosen_reading: Rendered broadly as 'has saved you' in the main text
  alternative_readings:
  - has made you well
  - has healed you
  rationale: The verse concerns physical healing, but σῴζω regularly carries a wider
    sense than bodily cure alone. Using 'saved' preserves the narrative's theological
    depth and avoids flattening the term to mere physical recovery. Because English
    readers may otherwise miss the healing nuance, the narrower alternatives are preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3; Contested terms table for πίστις
    encourages preserving theological tension rather than resolving it prematurely.
