id: LUK.8.48
reference: Luke 8:48
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῇ· ⸀Θυγάτηρ, ἡ πίστις σου σέσωκέν σε· πορεύου εἰς εἰρήνην.
translation:
  text: But he said to her, “Daughter, your faith has saved you; go in peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “your faith has made you well” or “your faith has healed you.” The Greek
      verb can refer to healing as well as saving.
    reason: alternative_reading
lexical_decisions:
- source_word: Θυγάτηρ
  chosen: Daughter
  alternatives:
  - Dear woman
  lexicon: BDAG
  rationale: Literal vocative retained. It conveys tenderness and relational address
    without needing expansion. 'Dear woman' is more interpretive and less directly
    tied to the noun.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this healing context, the sense is her believing trust in Jesus. 'Trust' is possible
    stylistically, and 'faithfulness' is less likely here but preserved as a lexical
    alternative because the term is theologically significant.
- source_word: σέσωκέν
  chosen: has saved
  alternatives:
  - has made well
  - has healed
  lexicon: BDAG
  rationale: The perfect of σῴζω can denote rescue, healing, or salvation. 'Has saved'
    preserves the broader semantic range and the theological resonance of the verb,
    while still fitting the immediate healing context. The narrower alternatives are
    preserved in a footnote because the context clearly includes physical healing.
- source_word: πορεύου
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: A natural imperative in modern English. 'Go' is concise and faithful;
    the alternatives are more idiomatic or formal without adding meaning.
- source_word: εἰς εἰρήνην
  chosen: in peace
  alternatives:
  - into peace
  - with peace
  lexicon: BDAG
  rationale: The idiom is well represented by 'in peace' in English, expressing departure
    under the condition or blessing of peace. 'Into peace' is overly literal and awkward.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'But' works well here after the woman's fearful
    confession and Jesus' reassuring response, signaling contrast without overstating
    it.
