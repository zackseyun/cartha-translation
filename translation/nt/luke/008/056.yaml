id: LUK.8.56
reference: Luke 8:56
source:
  edition: SBLGNT
  text: καὶ ἐξέστησαν οἱ γονεῖς αὐτῆς· ὁ δὲ παρήγγειλεν αὐτοῖς μηδενὶ εἰπεῖν τὸ γεγονός.
translation:
  text: And her parents were astonished, but he instructed them to tell no one what
    had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were amazed' or 'were beside themselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'ordered' or 'commanded them to tell no one.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the thing that had happened' or 'the event.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέστησαν
  chosen: were astonished
  alternatives:
  - were amazed
  - were beside themselves
  lexicon: BDAG
  rationale: The aorist of ἐξίστημι here denotes being overwhelmed with amazement.
    'Were astonished' is natural modern English and preserves the strength of the
    reaction without sounding idiomatic to the point of obscurity ('beside themselves').
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: γονεῖς is the standard plural term for 'parents.' 'Parents' is the most
    direct and idiomatic rendering.
- source_word: παρήγγειλεν
  chosen: instructed
  alternatives:
  - ordered
  - commanded
  - strictly charged
  lexicon: BDAG
  rationale: παραγγέλλω can mean command, order, or instruct. In this narrative context,
    'instructed' preserves the directive force without overstating harshness. The
    following infinitive clause carries the content of the instruction.
- source_word: μηδενὶ
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: The dative with εἰπεῖν is naturally rendered 'tell no one.' This is idiomatic
    English and accurately reflects the prohibition.
- source_word: εἰπεῖν
  chosen: to tell
  alternatives:
  - to say
  lexicon: BDAG
  rationale: Although λέγω commonly means 'say,' with a personal indirect object (μηδενί)
    English idiom prefers 'tell.' This better reflects the communicative sense in
    context.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - what had taken place
  - the event
  lexicon: BDAG
  rationale: The perfect participle used substantivally refers to the thing that has
    occurred. 'What had happened' is clear, natural English and captures the completed
    event with present relevance.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast between the parents' astonishment and Jesus'
    directive. 'But' brings out that contrast more clearly than a simple 'and' in
    English.
