theological_decisions:
- issue: Messianic secrecy motif / scope of Jesus' directive
  chosen_reading: Render the statement straightforwardly as a directive not to tell
    anyone what had happened, without importing a broader theological explanation
    into the translation.
  alternative_readings:
  - Interpret as a strict public silence command tied to the messianic secret theme
  - Interpret as a temporary or limited instruction to the immediate circle
  rationale: The verse itself states only that he instructed them not to tell anyone
    what had happened. The translation should preserve that wording without embedding
    a theory about motive or duration.
  doctrine_reference: Preserve theological tension rather than resolve it.
