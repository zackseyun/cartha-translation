id: LUK.8.18
reference: Luke 8:18
source:
  edition: SBLGNT
  text: βλέπετε οὖν πῶς ἀκούετε· ὃς ⸂ἂν γὰρ⸃ ἔχῃ, δοθήσεται αὐτῷ, καὶ ὃς ⸀ἂν μὴ ἔχῃ,
    καὶ ὃ δοκεῖ ἔχειν ἀρθήσεται ἀπ’ αὐτοῦ.
translation:
  text: Therefore, pay attention to how you listen. For whoever has, more will be
    given to him, and whoever does not have, even what he thinks he has will be taken
    away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'even what he seems to have will be taken away from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  chosen: pay attention
  alternatives:
  - see
  - watch out
  - take care
  lexicon: BDAG
  rationale: Imperative calling for careful heed rather than literal visual seeing;
    in idiomatic English 'pay attention' best conveys the warning force in context.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding teaching about hearing and receptivity;
    'Therefore' preserves the logical connection clearly.
- source_word: πῶς ἀκούετε
  chosen: how you listen
  alternatives:
  - how you hear
  lexicon: BDAG
  rationale: ἀκούω can be rendered 'hear' or 'listen'; 'listen' better captures the
    active, responsive sense Jesus is stressing, while πῶς emphasizes manner rather
    than mere fact of hearing.
- source_word: ὃς ἂν ... ἔχῃ
  chosen: whoever has
  alternatives:
  - the one who has
  - whoever should have
  lexicon: BDAG
  rationale: The relative clause with ἄν and subjunctive expresses an indefinite general
    condition; 'whoever has' is natural English and preserves the proverbial force.
- source_word: δοθήσεται αὐτῷ
  chosen: more will be given to him
  alternatives:
  - will be given to him
  - it will be given to him
  lexicon: BDAG
  rationale: The Greek omits an explicit object, but the sense in context is increase;
    English normally supplies 'more' to make the idiom intelligible and to reflect
    the comparative sense implied by the saying's parallelism.
- source_word: ὃς ἂν μὴ ἔχῃ
  chosen: whoever does not have
  alternatives:
  - the one who does not have
  - whoever should not have
  lexicon: BDAG
  rationale: Matches the first clause's indefinite general construction and preserves
    the antithesis.
- source_word: ὃ δοκεῖ ἔχειν
  chosen: what he thinks he has
  alternatives:
  - what he seems to have
  - what he supposes he has
  lexicon: BDAG
  rationale: δοκέω can mean 'seem' or 'think/suppose.' Here the idiom points to perceived
    possession that is not secure or substantial. 'Thinks he has' is clearer in modern
    English, while the alternative 'seems to have' is worth preserving in a footnote.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  chosen: will be taken away from him
  alternatives:
  - will be removed from him
  lexicon: BDAG
  rationale: Future passive of αἴρω here denotes removal/deprivation; 'taken away'
    is the standard and clear English equivalent.
- source_word: αὐτῷ / αὐτοῦ
  chosen: him / from him
  alternatives:
  - them / from them
  lexicon: BDAG
  rationale: The Greek singular masculine is generic. Per translation philosophy,
    gender-accurate rendering is retained rather than neutralized.
