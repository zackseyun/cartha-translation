theological_decisions:
- issue: Interpretive force of the proverbial saying about having and not having
  chosen_reading: Rendered without importing a doctrine of predestination, merit,
    or material prosperity; the saying is left in its immediate context of receptivity
    to Jesus' word.
  alternative_readings:
  - A broader principle of spiritual receptivity
  - A general proverb about stewardship
  rationale: The verse itself states a paradoxical principle tied to hearing. The
    translation preserves that tension and does not resolve it into a specific theological
    system beyond what the context warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
