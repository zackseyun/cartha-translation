id: LUK.8.40
reference: Luke 8:40
source:
  edition: SBLGNT
  text: ⸂Ἐν δὲ⸃ τῷ ⸀ὑποστρέφειν τὸν Ἰησοῦν ἀπεδέξατο αὐτὸν ὁ ὄχλος, ἦσαν γὰρ πάντες
    προσδοκῶντες αὐτόν.
translation:
  text: Now when Jesus returned, the crowd welcomed him, for they were all waiting
    for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the crowd received him"; the Greek verb can denote receiving or welcoming,
      with a positive sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or "for all were expecting him."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ ὑποστρέφειν
  chosen: Now when ... returned
  alternatives:
  - And when ... returned
  - As ... was returning
  lexicon: BDAG
  rationale: The construction ἐν + articular infinitive is a temporal clause, naturally
    rendered 'when.' δέ is carried by 'Now' to mark narrative development without
    overtranslating.
- source_word: ὑποστρέφειν
  chosen: returned
  alternatives:
  - was returning
  - came back
  lexicon: BDAG
  rationale: ὑποστρέφω commonly means 'return' or 'go back.' 'Returned' is concise,
    idiomatic, and fits the completed action in context.
- source_word: ἀπεδέξατο
  chosen: welcomed
  alternatives:
  - received
  - welcomed gladly
  lexicon: BDAG
  rationale: ἀποδέχομαι here conveys favorable reception. 'Welcomed' communicates
    the positive sense more clearly in modern English than the more formal 'received.'
    'Gladly' is not explicit in the Greek and is therefore omitted from the main text.
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος in Luke regularly denotes a gathered crowd. 'The crowd' is natural
    modern English and preserves the collective sense.
- source_word: ἦσαν γὰρ πάντες προσδοκῶντες αὐτόν
  chosen: for they were all waiting for him
  alternatives:
  - for all were expecting him
  - because they were all awaiting him
  lexicon: BDAG
  rationale: γάρ gives the reason for the crowd's welcome. προσδοκάω can mean 'wait
    for' or 'expect.' 'Waiting for him' best fits the narrative setting of people
    anticipating Jesus' arrival, while preserving the durative force of the participle
    with 'were ... waiting.'
- source_word: πάντες
  chosen: they were all
  alternatives:
  - all of them were
  lexicon: BDAG
  rationale: πάντες is retained explicitly as 'all' to preserve the emphasis that
    the whole crowd was in expectation.
- source_word: Ἰησοῦν
  chosen: Jesus
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
