id: LUK.8.5
reference: Luke 8:5
source:
  edition: SBLGNT
  text: Ἐξῆλθεν ὁ σπείρων τοῦ σπεῖραι τὸν σπόρον αὐτοῦ. καὶ ἐν τῷ σπείρειν αὐτὸν ὃ
    μὲν ἔπεσεν παρὰ τὴν ὁδόν, καὶ κατεπατήθη καὶ τὰ πετεινὰ τοῦ οὐρανοῦ κατέφαγεν
    αὐτό.
translation:
  text: The sower went out to sow his seed. And as he was sowing, some fell beside
    the path and was trampled, and the birds of the sky devoured it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of heaven.' Many English versions also render this idiom as
      'the birds of the air.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξῆλθεν
  chosen: went out
  alternatives:
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is naturally rendered 'went out' in modern English.
    'Went forth' is more traditional but archaic.
- source_word: ὁ σπείρων
  chosen: the sower
  alternatives:
  - the one sowing
  - the man sowing
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'The sower' is idiomatic
    English and fits the parabolic setting without unnecessary expansion.
- source_word: τοῦ σπεῖραι
  chosen: to sow
  alternatives:
  - for sowing
  lexicon: BDAG
  rationale: The genitive articular infinitive after a verb of motion commonly expresses
    purpose. 'To sow' is the clearest English rendering.
- source_word: τὸν σπόρον αὐτοῦ
  chosen: his seed
  alternatives:
  - his seed grain
  - the seed he had
  lexicon: BDAG
  rationale: σπόρος means 'seed' or 'seed grain.' In this agricultural context, 'his
    seed' is natural and sufficiently specific without overtranslating.
- source_word: ἐν τῷ σπείρειν αὐτὸν
  chosen: as he was sowing
  alternatives:
  - while he sowed
  - in his sowing
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous action. 'As
    he was sowing' gives the temporal sense in natural English.
- source_word: ὃ μὲν
  chosen: some
  alternatives:
  - one part
  - what indeed
  lexicon: BDAG
  rationale: Neuter singular relative with μέν refers distributively to a portion
    of the seed. English idiom uses 'some' here, anticipating the later divisions
    in the parable.
- source_word: ἔπεσεν παρὰ τὴν ὁδόν
  chosen: fell beside the path
  alternatives:
  - fell along the road
  - fell by the wayside
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. 'Beside the
    path' is clear modern English. 'Wayside' is traditional but dated.
- source_word: κατεπατήθη
  chosen: was trampled
  alternatives:
  - was trodden underfoot
  lexicon: BDAG
  rationale: The passive of καταπατέω means to be trampled down. 'Was trampled' is
    concise and natural; 'underfoot' is implicit and need not be added.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: πετεινά denotes birds. τοῦ οὐρανοῦ is literally 'of the sky/heaven.'
    'Of the sky' preserves the imagery straightforwardly; 'of the air' is a familiar
    idiom but less literal.
- source_word: κατέφαγεν αὐτό
  chosen: devoured it
  alternatives:
  - ate it up
  - consumed it
  lexicon: BDAG
  rationale: κατεσθίω intensifies the act of eating. 'Devoured it' captures the force
    better than the flatter 'ate it.'
