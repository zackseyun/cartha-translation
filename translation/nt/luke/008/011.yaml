theological_decisions:
- issue: Whether to render παραβολή as 'parable' or expand it to 'meaning/explanation
    of the parable' in context
  chosen_reading: parable
  alternative_readings:
  - meaning of the parable
  - explanation of the parable
  rationale: Although Jesus is clearly interpreting the story, the Greek text itself
    says 'this is the parable.' Following optimal equivalence and original-language
    primacy, the translation preserves the wording rather than resolving it into a
    fuller interpretive paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
