id: LUK.8.11
reference: Luke 8:11
source:
  edition: SBLGNT
  text: Ἔστιν δὲ αὕτη ἡ παραβολή· Ὁ σπόρος ἐστὶν ὁ λόγος τοῦ θεοῦ.
translation:
  text: 'Now this is the parable: the seed is the word of God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this is the meaning of the parable.' The Greek reads more literally,
      'this is the parable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔστιν
  chosen: is
  alternatives:
  - means
  lexicon: BDAG
  rationale: The copula straightforwardly introduces Jesus' explanation. 'Is' preserves
    the formal structure; 'means' would be more interpretive and is unnecessary here.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'Now' gives natural English discourse flow
    without overstating sequence. It is better than omitting the particle entirely
    because the verse shifts from parable to explanation.
- source_word: αὕτη ἡ παραβολή
  chosen: this is the parable
  alternatives:
  - this is the meaning of the parable
  - this is the parable's meaning
  lexicon: BDAG
  rationale: A formally close rendering is preferred because the Greek says literally
    'this is the parable.' In context Jesus is giving the explanation, but expanding
    to 'meaning' imports an interpretive noun not present in the text.
- source_word: σπόρος
  chosen: seed
  alternatives:
  - sown seed
  lexicon: BDAG
  rationale: The singular noun is best rendered 'seed.' English can use singular 'seed'
    collectively, matching the Greek and the imagery of the parable.
- source_word: λόγος
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος here refers to God's communicated word/message. 'Word' preserves
    biblical diction and intertextual resonance, while remaining clear in modern English.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of God.' 'From God' is possible
    as an interpretive gloss, but the more direct rendering better preserves the source
    text.
