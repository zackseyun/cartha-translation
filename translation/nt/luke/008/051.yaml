id: LUK.8.51
reference: Luke 8:51
source:
  edition: SBLGNT
  text: ἐλθὼν δὲ εἰς τὴν οἰκίαν οὐκ ἀφῆκεν εἰσελθεῖν ⸂τινα σὺν αὐτῷ⸃ εἰ μὴ Πέτρον
    καὶ Ἰωάννην καὶ Ἰάκωβον καὶ τὸν πατέρα τῆς παιδὸς καὶ τὴν μητέρα.
translation:
  text: When he came into the house, he did not allow anyone to enter with him except
    Peter and John and James, and the girl's father and mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the child's father and mother.' The Greek word can mean 'child' more
      generally, but the context identifies the child as a girl.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: When he came
  alternatives:
  - And when he came
  - After he came
  - Having come
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/temporal sequence. 'When
    he came' gives natural English while preserving the temporal force without sounding
    wooden.
- source_word: οἰκίαν
  chosen: the house
  alternatives:
  - the home
  lexicon: BDAG
  rationale: Standard sense is 'house, home.' 'House' is retained as the more direct
    and common narrative rendering.
- source_word: οὐκ ἀφῆκεν
  chosen: he did not allow
  alternatives:
  - he did not permit
  - he did not let
  lexicon: BDAG
  rationale: ἀφίημι here means to permit/allow. 'Did not allow' is clear modern English
    and slightly more formal than 'did not let.'
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go in
  lexicon: BDAG
  rationale: Infinitive complements ἀφῆκεν. 'Enter' is concise and fits the narrative
    register.
- source_word: τινα σὺν αὐτῷ
  chosen: anyone to enter with him
  alternatives:
  - anyone with him
  - anyone to go in with him
  - someone with him
  lexicon: BDAG
  rationale: 'τινα is an indefinite singular in a negative construction with generic
    force, best rendered ''anyone.'' σὺν αὐτῷ is naturally attached to the entering
    action in English: ''to enter with him.'''
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this exclusion construction after a negative, εἰ μὴ means 'except,'
    not conditional 'unless.'
- source_word: Πέτρον καὶ Ἰωάννην καὶ Ἰάκωβον
  chosen: Peter and John and James
  alternatives:
  - Peter, John, and James
  lexicon: BDAG
  rationale: Names are transliterated per project philosophy. The repeated καὶ can
    be represented either polysyndetically or with standard English punctuation; the
    chosen form keeps the Greek rhythm while remaining readable.
- source_word: τῆς παιδὸς
  chosen: the girl's
  alternatives:
  - the child's
  lexicon: BDAG
  rationale: παῖς can mean 'child,' 'boy,' or 'girl' depending on context. Here the
    context is Jairus's daughter, so 'girl' is more specific and natural than the
    generic 'child.'
- source_word: πατέρα ... καὶ τὴν μητέρα
  chosen: father and mother
  alternatives:
  - the father and the mother
  - parents
  lexicon: BDAG
  rationale: The singular nouns with articles refer specifically to this girl's parents.
    'Father and mother' preserves the individual mention better than collapsing to
    'parents,' while English idiom does not require repeating the article before both
    nouns.
