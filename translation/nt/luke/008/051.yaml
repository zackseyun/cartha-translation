theological_decisions:
- issue: Specificity of παῖς in context
  chosen_reading: the girl's father and mother
  alternative_readings:
  - the child's father and mother
  rationale: This is not a doctrinally contested issue, but context in the immediate
    narrative identifies the child as Jairus's daughter, so the feminine-specific
    rendering is justified and clearer in English.
