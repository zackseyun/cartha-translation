theological_decisions:
- issue: Narrative portrayal of the Gerasene population's response to Jesus
  chosen_reading: The verse is rendered as a straightforward report that fear motivated
    the crowd to ask Jesus to leave, without adding interpretive explanation for the
    fear.
  alternative_readings:
  - The fear was specifically awe at divine power
  - The fear was hostility toward economic loss or social disruption
  rationale: The text states only that they were gripped by great fear. It does not
    explicitly define whether this fear was reverential, hostile, or mixed, so the
    translation preserves that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
