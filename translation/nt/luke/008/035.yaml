theological_decisions:
- issue: Rendering δαιμόνια in a miracle/exorcism context
  chosen_reading: demons
  alternative_readings:
  - evil spirits
  rationale: The text presents actual demonic expulsion, not merely illness or metaphor.
    'Demons' best preserves the narrative and theological force without reductionism.
  doctrine_reference: Affirmations; original-language primacy over translation tradition
- issue: Nuance of σωφρονοῦντα after exorcism
  chosen_reading: in his right mind
  alternative_readings:
  - of sound mind
  - thinking clearly
  rationale: The phrase communicates restored sanity and self-possession after demonic
    oppression. The chosen idiom is natural English while preserving the reality of
    restoration without importing modern clinical categories.
  doctrine_reference: Readable modern English, not archaic or academic
