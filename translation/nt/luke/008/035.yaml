id: LUK.8.35
reference: Luke 8:35
source:
  edition: SBLGNT
  text: ἐξῆλθον δὲ ἰδεῖν τὸ γεγονὸς καὶ ἦλθον πρὸς τὸν Ἰησοῦν, καὶ εὗρον καθήμενον
    τὸν ἄνθρωπον ἀφ’ οὗ τὰ δαιμόνια ⸀ἐξῆλθεν ἱματισμένον καὶ σωφρονοῦντα παρὰ τοὺς
    πόδας τοῦ Ἰησοῦ, καὶ ἐφοβήθησαν.
translation:
  text: Then they went out to see what had happened, and they came to Jesus and found
    the man from whom the demons had gone out sitting, clothed, and in his right mind
    at Jesus’s feet, and they were afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of sound mind.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read the verb as plural ('the demons had gone out'); the
      printed text has a singular verb with a plural subject, but the sense is unchanged.
    reason: textual_variant
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: they went out
  alternatives:
  - they came out
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, narrating the crowd's movement from the town/area
    to inspect the event. 'Went out' is idiomatic and preserves the directional sense.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to look at
  lexicon: BDAG
  rationale: Infinitive of purpose after ἐξῆλθον; 'to see' is the natural English
    equivalent.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - the thing that had happened
  - what had taken place
  lexicon: BDAG
  rationale: Perfect participle used substantivally. 'What had happened' is clear
    modern English and captures the completed event with present relevance.
- source_word: πρὸς τὸν Ἰησοῦν
  chosen: to Jesus
  alternatives:
  - toward Jesus
  lexicon: BDAG
  rationale: With motion verb ἦλθον, πρός indicates movement toward a person; 'to
    Jesus' is idiomatic.
- source_word: εὗρον
  chosen: found
  alternatives:
  - discovered
  lexicon: BDAG
  rationale: Standard narrative sense of εὑρίσκω.
- source_word: καθήμενον
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present participle describing the man's posture when found. 'Sitting'
    is vivid and straightforward.
- source_word: τὸν ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: Specific male individual in context; gender-accurate rendering is required
    by the translation philosophy.
- source_word: ἀφ’ οὗ τὰ δαιμόνια ἐξῆλθεν
  chosen: from whom the demons had gone out
  alternatives:
  - from whom the demons went out
  lexicon: BDAG
  rationale: The clause identifies the formerly demonized man. English past perfect
    fits the sequence relative to 'found.' Although the verb is singular in this text,
    the plural subject 'the demons' is retained in translation as the sense is clear.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: '''Demons'' is the direct lexical equivalent and preserves the supernatural/personal
    dimension of the term.'
- source_word: ἱματισμένον
  chosen: clothed
  alternatives:
  - dressed
  lexicon: BDAG
  rationale: Perfect/passive participle emphasizing his now-restored condition. 'Clothed'
    echoes the contrast with his prior nakedness in the context.
- source_word: σωφρονοῦντα
  chosen: in his right mind
  alternatives:
  - thinking clearly
  - of sound mind
  lexicon: BDAG
  rationale: The participle denotes soundness of mind, self-control, and sanity. 'In
    his right mind' is idiomatic, readable, and contextually apt.
- source_word: παρὰ τοὺς πόδας τοῦ Ἰησοῦ
  chosen: at Jesus’s feet
  alternatives:
  - beside Jesus's feet
  - near the feet of Jesus
  lexicon: BDAG
  rationale: παρά with accusative here conveys position by/at. 'At Jesus’s feet' is
    natural English and may also suggest a posture of submission or discipleship without
    overtranslating.
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they became afraid
  - they were filled with fear
  lexicon: BDAG
  rationale: Aorist passive/deponent of φοβέομαι. 'They were afraid' is simple and
    accurate; stronger expansions would add emphasis not explicit in the Greek.
