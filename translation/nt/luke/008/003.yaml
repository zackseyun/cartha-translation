theological_decisions:
- issue: Referent of αὐτοῖς
  chosen_reading: 'plural: the women were serving Jesus and those with him'
  alternative_readings:
  - 'singular: the women were serving him (Jesus)'
  rationale: The supplied Greek text has the plural αὐτοῖς, so the translation follows
    the source text rather than harmonizing to the singular reading found in some
    witnesses. This is a textual/interpretive decision, not a doctrinal one, but it
    affects the English rendering.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve tension where ambiguity exists)
