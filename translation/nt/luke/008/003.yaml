id: LUK.8.3
reference: Luke 8:3
source:
  edition: SBLGNT
  text: καὶ Ἰωάννα γυνὴ Χουζᾶ ἐπιτρόπου Ἡρῴδου καὶ Σουσάννα καὶ ἕτεραι πολλαί, αἵτινες
    διηκόνουν αὐτοῖς ⸀ἐκ τῶν ὑπαρχόντων αὐταῖς.
translation:
  text: and Joanna, the wife of Chuza, Herod’s steward, and Susanna, and many others,
    who were serving them from what they owned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “him” instead of “them.”
    reason: textual_variant
  - marker: b
    text: Or “from their possessions” or “from their means.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ
  chosen: the wife of
  alternatives:
  - woman of
  lexicon: BDAG
  rationale: In apposition to Joanna and followed by a genitive personal name, γυνή
    most naturally means 'wife,' identifying Joanna by her marital relation to Chuza
    rather than merely as a 'woman.'
- source_word: ἐπιτρόπου
  chosen: steward
  alternatives:
  - manager
  - administrator
  - household manager
  lexicon: BDAG
  rationale: ἐπίτροπος denotes one placed over affairs or property. 'Steward' is concise,
    natural English and fits a court/estate context tied to Herod. 'Manager' is possible
    but slightly flatter and more modern-corporate in tone.
- source_word: Ἡρῴδου
  chosen: Herod’s
  alternatives:
  - of Herod
  lexicon: BDAG
  rationale: 'The genitive is rendered possessively in idiomatic English: Chuza is
    identified as the steward belonging to or serving Herod.'
- source_word: ἕτεραι πολλαί
  chosen: many others
  alternatives:
  - many other women
  - many more
  lexicon: BDAG
  rationale: The feminine plural refers back to the women just named, so 'many others'
    is sufficient in English without repeating 'women.' 'Many other women' is more
    explicit but slightly heavier.
- source_word: αἵτινες
  chosen: who
  alternatives:
  - and these
  - who indeed
  lexicon: BDAG
  rationale: The relative pronoun introduces a descriptive clause about these women.
    Simple 'who' communicates the sense naturally.
- source_word: διηκόνουν
  chosen: were serving
  alternatives:
  - were ministering
  - were providing for
  lexicon: BDAG
  rationale: διακονέω broadly means to serve or attend to. 'Were serving' preserves
    the verbal idea without importing later ecclesial overtones of 'ministering.'
    Because the following phrase specifies material support, the exact mode of service
    is left broad in the main text.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - him
  lexicon: NA28/SBLGNT textual tradition
  rationale: The printed Greek text reads the plural αὐτοῖς, referring most naturally
    to Jesus and his companions. Some manuscripts read the singular, but the given
    source text supports 'them.'
- source_word: ἐκ τῶν ὑπαρχόντων αὐταῖς
  chosen: from what they owned
  alternatives:
  - out of their possessions
  - from their means
  - from what belonged to them
  lexicon: BDAG
  rationale: The phrase denotes support drawn from the women's own resources or property.
    'From what they owned' is clear, idiomatic, and concrete. 'From their means' is
    common in English versions but slightly more interpretive and less directly tied
    to possessions.
