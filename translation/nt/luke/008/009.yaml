id: LUK.8.9
reference: Luke 8:9
source:
  edition: SBLGNT
  text: Ἐπηρώτων δὲ αὐτὸν οἱ μαθηταὶ ⸀αὐτοῦ τίς ⸂αὕτη εἴη ἡ παραβολή⸃.
translation:
  text: Then his disciples asked him what this parable meant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'what this parable might be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπηρώτων
  chosen: asked
  alternatives:
  - were asking
  - questioned
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing or iterative past action; English simple
    past is the most natural rendering here, while preserving the sense that the disciples
    put a question to him.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Then' fits the narrative flow in readable modern
    English without overstating contrast.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  - his learners
  lexicon: BDAG
  rationale: Standard idiomatic rendering of μαθηταί with possessive αὐτοῦ. 'Disciples'
    preserves the established relational and instructional sense better than 'learners.'
- source_word: τίς ... ἡ παραβολή
  chosen: what this parable meant
  alternatives:
  - what this parable was
  - what this parable might be
  lexicon: BDAG
  rationale: The Greek literally asks 'what this parable might be,' with εἴη in an
    indirect question. In English, 'what this parable meant' best conveys the disciples'
    request for interpretation rather than identity.
- source_word: παραβολή
  chosen: parable
  alternatives:
  - illustration
  - comparison
  lexicon: BDAG
  rationale: '''Parable'' is the standard and most contextually precise rendering
    in the Gospel tradition.'
- source_word: εἴη
  chosen: meant
  alternatives:
  - was
  - might be
  lexicon: BDAG
  rationale: Optative in indirect discourse after a past-tense main verb reflects
    reported inquiry. Rendering it as 'meant' communicates the sense of asking for
    the parable's significance in natural English.
