id: LUK.8.1
reference: Luke 8:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ καθεξῆς καὶ αὐτὸς διώδευεν κατὰ πόλιν καὶ κώμην κηρύσσων
    καὶ εὐαγγελιζόμενος τὴν βασιλείαν τοῦ θεοῦ, καὶ οἱ δώδεκα σὺν αὐτῷ,
translation:
  text: And it happened soon afterward that he was traveling through city after city
    and village after village, proclaiming and bringing the good news of the kingdom
    of God, and the Twelve were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from city to city and village to village.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the reign of God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And it happened soon afterward that he was traveling'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ καθεξῆς
  chosen: it happened soon afterward
  alternatives:
  - it came to pass afterward
  - in the next sequence
  - soon after this
  lexicon: BDAG
  rationale: This Lukan temporal formula introduces the next event in sequence. 'It
    happened' preserves the narrative marker without archaic English, and 'soon afterward'
    captures ἐν τῷ καθεξῆς idiomatically as temporal succession.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek but does not require emphatic 'he himself'
    in English here. Simple 'he' communicates the subject naturally.
- source_word: διώδευεν
  chosen: was traveling through
  alternatives:
  - went through
  - journeyed through
  - was going about
  lexicon: BDAG
  rationale: The imperfect indicates ongoing/repeated action, and the compound verb
    suggests movement through various places. 'Was traveling through' reflects the
    durative sense in readable English.
- source_word: κατὰ πόλιν καὶ κώμην
  chosen: through city after city and village after village
  alternatives:
  - from city to city and village to village
  - through every city and village
  lexicon: BDAG
  rationale: The distributive κατά with singular nouns conveys repeated movement from
    one place to another. 'City after city and village after village' preserves the
    iterative force more clearly than a flatter expression.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - heralding
  lexicon: BDAG
  rationale: '''Proclaiming'' preserves the public-announcement sense of κηρύσσω without
    narrowing it to sermonic ''preaching'' alone.'
- source_word: εὐαγγελιζόμενος
  chosen: bringing the good news
  alternatives:
  - preaching the good news
  - announcing the good news
  - evangelizing
  lexicon: BDAG
  rationale: The participle is distinct from κηρύσσων, so the English should avoid
    collapsing both into the same word. 'Bringing the good news' keeps the gospel
    sense while maintaining stylistic distinction.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering. 'Kingdom
    of God' preserves both the concrete and dynamic dimensions of βασιλεία without
    over-interpreting it as only 'reign'.
- source_word: οἱ δώδεκα
  chosen: the Twelve
  alternatives:
  - the twelve disciples
  - the twelve apostles
  lexicon: BDAG
  rationale: Luke uses the recognized group designation here. 'The Twelve' is concise,
    accurate, and avoids importing 'apostles' where the text does not say it.
- source_word: σὺν αὐτῷ
  chosen: were with him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: English requires an explicit finite verb to complete the clause naturally.
    'Were with him' accurately conveys accompaniment.
