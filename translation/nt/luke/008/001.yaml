theological_decisions:
- issue: Rendering βασιλεία τοῦ θεοῦ
  chosen_reading: the kingdom of God
  alternative_readings:
  - the reign of God
  rationale: The phrase can emphasize either realm or rule, but the traditional and
    lexically broad rendering 'kingdom of God' best preserves the theological breadth
    without resolving the nuance too narrowly in one direction.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
