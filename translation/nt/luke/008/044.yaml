theological_decisions:
- issue: Potential ritual/Jewish-garment nuance in κράσπεδον
  chosen_reading: Render as 'fringe' in the main text
  alternative_readings:
  - hem
  - tassel
  rationale: The term may refer generally to the garment's edge or more specifically
    to the tassel/fringe associated with Jewish dress. The verse itself does not require
    an explicit allusion to Torah tassels, so the main text keeps a broadly accurate
    rendering while preserving the more specific alternatives in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
