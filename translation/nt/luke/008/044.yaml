id: LUK.8.44
reference: Luke 8:44
source:
  edition: SBLGNT
  text: προσελθοῦσα ὄπισθεν ἥψατο τοῦ κρασπέδου τοῦ ἱματίου αὐτοῦ, καὶ παραχρῆμα ἔστη
    ἡ ῥύσις τοῦ αἵματος αὐτῆς.
translation:
  text: Coming up behind him, she touched the fringe of his garment, and immediately
    her flow of blood stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hem' or 'tassel' of his garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθοῦσα
  chosen: Coming up
  alternatives:
  - Having come up
  - Approaching
  lexicon: BDAG
  rationale: Aorist participle from προσέρχομαι, indicating attendant action prior
    to the main verb. 'Coming up' is natural English and preserves the movement toward
    Jesus without overformal wording.
- source_word: ὄπισθεν
  chosen: behind him
  alternatives:
  - from behind
  - behind
  lexicon: BDAG
  rationale: The adverb indicates position to the rear. 'Behind him' makes the implied
    object explicit in idiomatic English and matches the narrative context.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - took hold of
  - touched lightly
  lexicon: BDAG
  rationale: Middle of ἅπτω in this construction commonly means 'touch.' 'Touched'
    is the standard and contextually appropriate rendering without implying a grasp
    stronger than the text states.
- source_word: τοῦ κρασπέδου
  chosen: the fringe
  alternatives:
  - the edge
  - the tassel
  - the hem
  lexicon: BDAG
  rationale: κράσπεδον can denote edge, border, hem, or tassel/fringe. 'Fringe' best
    preserves the likely referent at the border of the garment while avoiding overprecision
    in the main text; alternatives are worth preserving because the term may evoke
    the tassels on Jewish garments.
- source_word: τοῦ ἱματίου αὐτοῦ
  chosen: of his garment
  alternatives:
  - of his cloak
  - of his robe
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment or cloak. 'Garment' is broad and natural,
    avoiding unwarranted specificity.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb marks immediate temporal effect. 'Immediately' is clear modern
    English and preserves the suddenness.
- source_word: ἔστη
  chosen: stopped
  alternatives:
  - ceased
  - came to a stop
  lexicon: BDAG
  rationale: Aorist of ἵστημι here means 'stopped' or 'ceased' with reference to the
    flow. 'Stopped' is idiomatic and direct in English.
- source_word: ἡ ῥύσις τοῦ αἵματος αὐτῆς
  chosen: her flow of blood
  alternatives:
  - the flow of her blood
  - her bleeding
  - the discharge of her blood
  lexicon: BDAG
  rationale: The phrase denotes the ongoing hemorrhage described in context. 'Her
    flow of blood' stays close to the Greek while remaining readable; 'her bleeding'
    is possible but slightly more interpretive.
