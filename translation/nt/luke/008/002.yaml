theological_decisions:
- issue: Rendering of demonic affliction language
  chosen_reading: The verse is translated with personal demonic language ('evil spirits,'
    'demons') rather than reduced to metaphor for illness.
  alternative_readings:
  - metaphorical language for psychological or physical conditions
  rationale: The Greek distinguishes πνευμάτων πονηρῶν and δαιμόνια from ἀσθενειῶν,
    presenting spiritual affliction and bodily sickness as related but distinct categories.
    The translation preserves that distinction without adding interpretive explanation.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
