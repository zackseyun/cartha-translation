id: LUK.8.2
reference: Luke 8:2
source:
  edition: SBLGNT
  text: καὶ γυναῖκές τινες αἳ ἦσαν τεθεραπευμέναι ἀπὸ πνευμάτων πονηρῶν καὶ ἀσθενειῶν,
    Μαρία ἡ καλουμένη Μαγδαληνή, ἀφ’ ἧς δαιμόνια ἑπτὰ ἐξεληλύθει,
translation:
  text: 'and some women who had been healed from evil spirits and sicknesses: Mary,
    called Magdalene, from whom seven demons had gone out,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'certain women.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from whom seven demons had come out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκές τινες
  chosen: some women
  alternatives:
  - certain women
  lexicon: BDAG
  rationale: τινες with the plural noun indicates an indefinite subset. 'Some women'
    is natural modern English; 'certain women' is more formal but less idiomatic here.
- source_word: τεθεραπευμέναι
  chosen: had been healed
  alternatives:
  - had been cured
  lexicon: BDAG
  rationale: Perfect passive participle with ἦσαν forms a periphrastic pluperfect
    sense, indicating a prior completed healing with continuing result. 'Healed' fits
    both spiritual and physical afflictions in this context.
- source_word: ἀπὸ πνευμάτων πονηρῶν
  chosen: from evil spirits
  alternatives:
  - from unclean spirits
  - from wicked spirits
  lexicon: BDAG
  rationale: πονῆρος means 'evil' or 'wicked'; the text does not use ἀκάθαρτος ('unclean'),
    so 'evil spirits' is the most direct rendering.
- source_word: καὶ ἀσθενειῶν
  chosen: and sicknesses
  alternatives:
  - and diseases
  - and infirmities
  lexicon: BDAG
  rationale: ἀσθένεια here refers to bodily weakness/illness. 'Sicknesses' is clear
    modern English and pairs well with 'healed.'
- source_word: ἡ καλουμένη Μαγδαληνή
  chosen: called Magdalene
  alternatives:
  - who was called Magdalene
  - known as Magdalene
  lexicon: BDAG
  rationale: The participle καλουμένη identifies Mary by the designation 'Magdalene.'
    'Called Magdalene' is concise and faithful.
- source_word: ἀφ’ ἧς
  chosen: from whom
  alternatives:
  - out of whom
  lexicon: BDAG
  rationale: ἀπό with the relative pronoun marks separation/source. 'From whom' is
    idiomatic; 'out of whom' is possible and slightly more vivid.
- source_word: δαιμόνια ἑπτὰ
  chosen: seven demons
  alternatives:
  - seven evil spirits
  lexicon: BDAG
  rationale: δαιμόνια specifically denotes demons, distinct from the broader πνεύματα
    earlier in the verse. The numeral is retained directly.
- source_word: ἐξεληλύθει
  chosen: had gone out
  alternatives:
  - had come out
  lexicon: BDAG
  rationale: Pluperfect of ἐξέρχομαι indicates that the demons had already departed
    prior to the narrative setting. 'Had gone out' is a natural rendering of the completed
    departure.
