theological_decisions:
- issue: Rendering of Jesus' address title Ἐπιστάτα
  chosen_reading: Master
  alternative_readings:
  - Teacher
  - Lord
  rationale: The verse uses Ἐπιστάτα, not κύριος. To avoid importing a stronger christological
    title than the Greek explicitly states here, 'Master' is retained as a respectful
    address indicating authority. This aligns with the translation philosophy of original-language
    primacy and not importing doctrinal claims the text does not make.
  doctrine_reference: Translation philosophy §1, §2; Affirmations (non-sectarian restraint)
