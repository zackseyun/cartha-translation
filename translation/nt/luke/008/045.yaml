id: LUK.8.45
reference: Luke 8:45
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ Ἰησοῦς· Τίς ὁ ἁψάμενός μου; ἀρνουμένων δὲ πάντων εἶπεν ὁ ⸀Πέτρος·
    Ἐπιστάτα, οἱ ὄχλοι συνέχουσίν σε καὶ ⸀ἀποθλίβουσιν.
translation:
  text: And Jesus said, “Who touched me?” But while everyone was denying it, Peter
    said, “Master, the crowds are hemming you in and pressing against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are crowding around you and pressing in on you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁψάμενός
  chosen: touched
  alternatives:
  - laid hold of
  - took hold of
  lexicon: BDAG
  rationale: In this context ἅπτω in the middle voice refers to physical contact.
    'Touched' is the natural and idiomatic English rendering and fits the narrative
    setup of the woman touching Jesus.
- source_word: ἀρνουμένων δὲ πάντων
  chosen: But while everyone was denying it
  alternatives:
  - and when all denied it
  - but as all were denying it
  lexicon: BDAG
  rationale: The present middle participle with πάντων conveys ongoing denial by all
    present. 'While everyone was denying it' preserves the durative sense better than
    a simple past, while 'it' is supplied naturally in English from the context of
    Jesus' question.
- source_word: Ἐπιστάτα
  chosen: Master
  alternatives:
  - Teacher
  - Chief
  lexicon: BDAG
  rationale: Ἐπιστάτης is a Lukan form of address for Jesus, often conveying recognized
    authority rather than merely instructional role. 'Master' best captures the respectful
    address in idiomatic English without importing a stronger title like 'Lord' where
    the Greek does not use κύριος.
- source_word: ὄχλοι
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: The plural noun is best represented by 'the crowds,' preserving the Greek
    number and the sense of many people surrounding Jesus.
- source_word: συνέχουσίν
  chosen: are hemming you in
  alternatives:
  - are crowding around you
  - are pressing in on you
  lexicon: BDAG
  rationale: συνέχω here conveys being enclosed or constrained by surrounding people.
    'Are hemming you in' preserves the image of being enclosed more distinctly than
    a generic 'crowding around.'
- source_word: ἀποθλίβουσιν
  chosen: pressing against
  alternatives:
  - crushing
  - pressing hard on
  lexicon: BDAG
  rationale: ἀποθλίβω intensifies the idea of pressure from the crowd. 'Pressing against'
    is natural English and avoids overstating the force with 'crushing,' while still
    distinguishing it from the previous verb.
