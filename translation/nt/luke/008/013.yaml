id: LUK.8.13
reference: Luke 8:13
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπὶ τῆς πέτρας οἳ ὅταν ἀκούσωσιν μετὰ χαρᾶς δέχονται τὸν λόγον, καὶ
    οὗτοι ῥίζαν οὐκ ἔχουσιν, οἳ πρὸς καιρὸν πιστεύουσιν καὶ ἐν καιρῷ πειρασμοῦ ἀφίστανται.
translation:
  text: And the ones on the rock are those who, when they hear, receive the word with
    joy. But these have no root; they believe for a time, and in a time of testing
    they fall away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a time of temptation' or 'when trial comes.' The Greek term can refer
      to testing, trial, or temptation depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τῆς πέτρας
  chosen: on the rock
  alternatives:
  - on the rocky ground
  - upon the rock
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the imagery of the parable and matches
    the prepositional phrase directly. 'Rock' is preferable to 'rocky ground' here
    because πέτρα is singular and concrete in the Greek, while the broader parable
    context already supplies the sowing imagery.
- source_word: ἀκούσωσιν
  chosen: they hear
  alternatives:
  - they have heard
  - they listen
  lexicon: BDAG
  rationale: Although the aorist subjunctive with ὅταν can be rendered 'when they
    hear,' idiomatic English uses the present in this general condition. 'Hear' fits
    the immediate reception of the message better than 'listen,' which can imply ongoing
    attentiveness.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  - with gladness
  lexicon: BDAG
  rationale: '''With joy'' closely reflects the prepositional phrase and preserves
    the emotional force without over-paraphrasing.'
- source_word: δέχονται τὸν λόγον
  chosen: receive the word
  alternatives:
  - welcome the word
  - accept the message
  lexicon: BDAG
  rationale: '''Receive'' is a standard and transparent rendering of δέχομαι here.
    λόγος in this parabolic context refers to the proclaimed message; ''the word''
    preserves the biblical idiom while remaining understandable.'
- source_word: ῥίζαν οὐκ ἔχουσιν
  chosen: have no root
  alternatives:
  - do not have a root
  - have no roots
  lexicon: BDAG
  rationale: The singular 'root' matches the Greek accusative singular and keeps the
    metaphor compact. English idiom favors 'have no root' over the more wooden 'do
    not have a root.'
- source_word: πρὸς καιρὸν
  chosen: for a time
  alternatives:
  - for a while
  - temporarily
  lexicon: BDAG
  rationale: This phrase denotes limited duration. 'For a time' is natural English
    and preserves the temporary nature without sounding colloquial.
- source_word: πιστεύουσιν
  chosen: they believe
  alternatives:
  - they have faith
  - they trust
  lexicon: BDAG
  rationale: The default rendering for πίστις-family terms is 'faith'; for the verb
    πιστεύω, 'believe' is the most direct equivalent. This avoids importing a more
    specific theological nuance than the text itself states.
- source_word: ἐν καιρῷ πειρασμοῦ
  chosen: in a time of testing
  alternatives:
  - in time of temptation
  - when trial comes
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation depending on context.
    Here the agricultural-parabolic setting and the result of apostasy favor the broader
    'testing' rather than specifically inward 'temptation.' 'A time of testing' is
    idiomatic and preserves the temporal phrase.
- source_word: ἀφίστανται
  chosen: they fall away
  alternatives:
  - they turn away
  - they withdraw
  - they apostatize
  lexicon: BDAG
  rationale: In context, the verb describes abandoning prior belief under pressure.
    'Fall away' is clear, idiomatic, and preserves the serious spiritual sense without
    using the more technical 'apostatize' in the main text.
