theological_decisions:
- issue: Whether πιστεύουσιν implies genuine saving faith or merely superficial belief
  chosen_reading: Rendered neutrally as 'they believe' without specifying whether
    the faith is saving or temporary-only in a doctrinal sense.
  alternative_readings:
  - they seem to believe
  - they believe genuinely but later fall away
  - they believe superficially
  rationale: The verse states that they 'believe for a time' and later 'fall away,'
    but it does not itself resolve later theological debates about perseverance, apostasy,
    or the nature of saving faith. Per translation philosophy, the wording preserves
    the tension rather than importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of πειρασμός in this context
  chosen_reading: Rendered as 'testing' in the main text.
  alternative_readings:
  - temptation
  - trial
  rationale: The term can cover both external trial and internal temptation. 'Testing'
    best preserves the breadth of the Greek in this context, while an alternative
    is preserved in a footnote.
