theological_decisions:
- issue: Rendering of δαιμόνια in a demonic-oppression context
  chosen_reading: demons
  alternative_readings:
  - unclean spirits
  rationale: The Greek term here is specifically δαιμόνια, not πνεύματα ἀκάθαρτα.
    'Demons' is the direct lexical equivalent and avoids conflating distinct expressions
    used elsewhere in the Gospels.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
- issue: Whether to render ἔχων δαιμόνια as the idiom 'possessed by demons'
  chosen_reading: who had demons
  alternative_readings:
  - possessed by demons
  rationale: The text states literally that the man was 'having demons.' Because the
    translation philosophy prioritizes original-language primacy and avoids importing
    claims beyond the source wording, the less interpretive rendering is preferred
    in the main text while the common idiom is preserved as an alternative.
  doctrine_reference: 'Translation philosophy #1 and #3'
