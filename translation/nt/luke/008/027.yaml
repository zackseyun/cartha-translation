id: LUK.8.27
reference: Luke 8:27
source:
  edition: SBLGNT
  text: ἐξελθόντι δὲ αὐτῷ ἐπὶ τὴν γῆν ⸀ὑπήντησεν ἀνήρ τις ἐκ τῆς πόλεως ⸀ἔχων δαιμόνια·
    ⸂καὶ χρόνῳ ἱκανῷ οὐκ ἐνεδύσατο ἱμάτιον⸃, καὶ ἐν οἰκίᾳ οὐκ ἔμενεν ἀλλ’ ἐν τοῖς
    μνήμασιν.
translation:
  text: And when he came out onto the land, a certain man from the city met him, who
    had demons. For a considerable time he had not put on clothing, and he did not
    stay in a house but among the tombs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'possessed by demons.' The Greek reads literally
      'having demons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he stepped ashore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντι ... αὐτῷ ἐπὶ τὴν γῆν
  chosen: when he came out onto the land
  alternatives:
  - when he stepped ashore
  - when he came out onto the shore
  lexicon: BDAG
  rationale: The dative participial construction is temporal/circumstantial with reference
    to Jesus. ἐπὶ τὴν γῆν is literally 'onto the land'; this avoids over-specifying
    'shore' while still conveying disembarkation from the boat.
- source_word: ὑπήντησεν
  chosen: met him
  alternatives:
  - encountered him
  - came to meet him
  lexicon: BDAG
  rationale: A straightforward narrative verb meaning to meet or encounter. 'Met him'
    is natural English and preserves the directness of the action.
- source_word: ἀνήρ τις
  chosen: a certain man
  alternatives:
  - a man
  - a certain male
  lexicon: BDAG
  rationale: τις adds indefiniteness with some specificity; 'a certain man' reflects
    Luke's narrative style better than the flatter 'a man.' 'Man' is gender-accurate
    to ἀνήρ.
- source_word: ἐκ τῆς πόλεως
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: BDAG
  rationale: The phrase identifies the man's origin/association. 'From the city' is
    idiomatic and sufficiently precise.
- source_word: ἔχων δαιμόνια
  chosen: who had demons
  alternatives:
  - possessed by demons
  - having demons
  lexicon: BDAG
  rationale: The Greek says literally 'having demons.' 'Who had demons' stays close
    to the wording without importing the more interpretive idiom 'possessed,' though
    the sense overlaps.
- source_word: χρόνῳ ἱκανῷ
  chosen: for a considerable time
  alternatives:
  - for a long time
  - for quite some time
  lexicon: BDAG
  rationale: The dative phrase expresses duration. 'For a considerable time' captures
    ἱκανός as substantial/sizable duration without sounding colloquial.
- source_word: οὐκ ἐνεδύσατο ἱμάτιον
  chosen: he had not put on clothing
  alternatives:
  - he had worn no clothes
  - he had not dressed himself
  lexicon: BDAG
  rationale: ἐνδύω in the middle means to put on or dress oneself. 'Put on clothing'
    reflects the verbal action more directly than the idiomatic but slightly interpretive
    'worn no clothes.' The pluperfect-like English 'had not put on' fits the background
    description.
- source_word: ἐν οἰκίᾳ οὐκ ἔμενεν
  chosen: he did not stay in a house
  alternatives:
  - he did not live in a house
  - he was not staying in a house
  lexicon: BDAG
  rationale: μένω can mean remain, stay, or live. 'Did not stay in a house' preserves
    the imperfect's customary sense without overcommitting to permanent residence.
- source_word: ἀλλ’ ἐν τοῖς μνήμασιν
  chosen: but among the tombs
  alternatives:
  - but in the tombs
  - but among the graves
  lexicon: BDAG
  rationale: μνῆμα refers to tombs/burial places. 'Among the tombs' is idiomatic and
    evokes the setting clearly; 'graves' is less precise for the likely rock-cut burial
    context.
