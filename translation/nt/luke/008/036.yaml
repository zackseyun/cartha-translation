id: LUK.8.36
reference: Luke 8:36
source:
  edition: SBLGNT
  text: ἀπήγγειλαν δὲ ⸀αὐτοῖς οἱ ἰδόντες πῶς ἐσώθη ὁ δαιμονισθείς.
translation:
  text: And those who had seen it reported to them how the demon-possessed man had
    been saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how the demon-possessed man had been healed' or 'had been delivered.'
      The Greek verb can mean save, heal, or deliver, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: Aorist indicative of ἀπαγγέλλω, meaning to report or tell. 'Reported'
    fits the eyewitness-testimony context and is slightly more formal than 'told'
    without becoming stilted.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural English and preserves the flow without overstating contrast.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative pronoun indicating the recipients of the report; 'to them' is
    the straightforward rendering.
- source_word: οἱ ἰδόντες
  chosen: those who had seen it
  alternatives:
  - the ones who saw
  - the eyewitnesses
  lexicon: BDAG
  rationale: The articular participle refers to the people who witnessed the event.
    'Those who had seen it' renders the participial construction naturally in English
    and makes the prior event-reference explicit.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: BDAG
  rationale: Introduces the content of the report concerning the manner or fact of
    what happened. 'How' is the most idiomatic and direct rendering.
- source_word: ἐσώθη
  chosen: had been saved
  alternatives:
  - was healed
  - was delivered
  - was made well
  lexicon: BDAG
  rationale: Passive of σῴζω, whose semantic range includes save, rescue, heal, and
    deliver. In this exorcism context, the result is deliverance/restoration, but
    'saved' preserves the Greek term and its broader resonance. Because 'saved' could
    be heard narrowly in a spiritual sense, an alternative is preserved in a footnote.
- source_word: ὁ δαιμονισθείς
  chosen: the demon-possessed man
  alternatives:
  - the man who had been demon-possessed
  - the demoniac
  lexicon: BDAG
  rationale: Perfect/passive participial form used substantivally for the man under
    demonic influence. 'The demon-possessed man' is clear, contemporary, and more
    accessible than 'demoniac,' while preserving the personal reference implied by
    the masculine singular.
