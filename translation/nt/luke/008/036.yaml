theological_decisions:
- issue: Rendering of ἐσώθη (σῴζω) in an exorcism-healing context
  chosen_reading: had been saved
  alternative_readings:
  - had been healed
  - had been delivered
  rationale: The Greek verb σῴζω can denote rescue, deliverance, healing, or salvation.
    To preserve lexical continuity and theological breadth, the main text keeps 'saved,'
    while a footnote preserves 'healed'/'delivered' as contextually plausible alternatives.
    This avoids collapsing the term into either purely physical healing or purely
    spiritual salvation beyond what the text itself states.
  doctrine_reference: Translation philosophy §§1, 3, 5
