theological_decisions:
- issue: Referent of the plural subject 'they' in 'they begged him'
  chosen_reading: The plural refers to the demons/unclean spirits speaking through
    the possessed man, left implicit as in the Greek context.
  alternative_readings:
  - Make the subject explicit as 'the demons begged him'
  rationale: The immediate literary context identifies the speakers, but this verse
    itself uses only the plural verb. Retaining 'they' respects the Greek wording
    while remaining intelligible in context.
  doctrine_reference: Preserve theological tension rather than resolve it where the
    source leaves wording implicit.
