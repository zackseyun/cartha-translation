id: LUK.8.32
reference: Luke 8:32
source:
  edition: SBLGNT
  text: Ἦν δὲ ἐκεῖ ἀγέλη χοίρων ἱκανῶν ⸀βοσκομένη ἐν τῷ ὄρει· καὶ ⸀παρεκάλεσαν αὐτὸν
    ἵνα ἐπιτρέψῃ αὐτοῖς εἰς ἐκείνους εἰσελθεῖν· καὶ ἐπέτρεψεν αὐτοῖς.
translation:
  text: Now there was a large herd of pigs feeding there on the mountain, and they
    begged him to permit them to enter those pigs, and he permitted them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many pigs' or 'a considerable herd of pigs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the hillside.'
    reason: lexical_alternative
  - marker: c
    text: The subject 'they' refers to the demons/unclean spirits in the surrounding
      context; some translations make this explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγέλη
  chosen: herd
  alternatives:
  - drove
  lexicon: BDAG
  rationale: Refers to a group of swine; 'herd' is the natural modern English collective
    term for pigs.
- source_word: χοίρων
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: '''Pigs'' is the clear, readable modern English equivalent; ''swine''
    is more formal/archaic.'
- source_word: ἱκανῶν
  chosen: large
  alternatives:
  - many
  - considerable
  lexicon: BDAG
  rationale: In this context ἱκανός modifies the size/number of the herd; 'large'
    communicates the sense idiomatically in English.
- source_word: βοσκομένη
  chosen: feeding
  alternatives:
  - grazing
  - being fed
  lexicon: BDAG
  rationale: The participle describes the herd's activity. 'Feeding' is broad and
    natural for pigs, whereas 'grazing' can sound too specific to pasture animals.
- source_word: ἐν τῷ ὄρει
  chosen: on the mountain
  alternatives:
  - on the hillside
  - in the hill country
  lexicon: BDAG
  rationale: A relatively formal rendering of ὄρος is retained. 'On the mountain'
    follows the Greek closely; 'hillside' is possible but more interpretive.
- source_word: παρεκάλεσαν
  chosen: begged
  alternatives:
  - implored
  - pleaded with
  lexicon: BDAG
  rationale: In context the demons urgently request permission. 'Begged' captures
    the force more vividly than the weaker 'asked.'
- source_word: ἐπιτρέψῃ / ἐπέτρεψεν
  chosen: permit / permitted
  alternatives:
  - allow / allowed
  - give leave to
  lexicon: BDAG
  rationale: Using 'permit' preserves the formal correspondence between the request
    and Jesus' response while remaining natural English.
- source_word: εἰς ἐκείνους εἰσελθεῖν
  chosen: to enter those pigs
  alternatives:
  - to go into them
  - to enter into those pigs
  lexicon: BDAG
  rationale: The infinitive phrase expresses entry into the pigs. 'Those pigs' reflects
    ἐκείνους and keeps the referent explicit in English.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δὲ here marks narrative development. 'Now' is a natural discourse marker
    in English without overstating sequence.
