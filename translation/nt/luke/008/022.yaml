id: LUK.8.22
reference: Luke 8:22
source:
  edition: SBLGNT
  text: ⸂Ἐγένετο δὲ⸃ ἐν μιᾷ τῶν ἡμερῶν καὶ αὐτὸς ἐνέβη εἰς πλοῖον καὶ οἱ μαθηταὶ αὐτοῦ,
    καὶ εἶπεν πρὸς αὐτούς· Διέλθωμεν εἰς τὸ πέραν τῆς λίμνης, καὶ ἀνήχθησαν.
translation:
  text: Now it happened on one of those days that he got into a boat, and his disciples
    with him, and he said to them, “Let us go across to the other side of the lake.”
    And they set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let us cross over to the far side of the lake.”
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can mean “put out,” “set sail,” or “launched out.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: BDAG
  rationale: A common Lukan narrative transition. 'Now it happened' preserves the
    event-introducing force without archaic diction like 'came to pass.' 'δέ' is lightly
    represented by 'Now' rather than omitted entirely.
- source_word: ἐν μιᾷ τῶν ἡμερῶν
  chosen: on one of those days
  alternatives:
  - on one of the days
  - one day
  lexicon: BDAG
  rationale: This idiom indicates an indefinite time within a known period. 'On one
    of those days' is natural English and preserves the partitive sense better than
    the flatter 'one day.'
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek but not necessarily emphatic enough
    in English to require 'he himself.' Simple 'he' communicates the subject naturally.
- source_word: ἐνέβη εἰς πλοῖον
  chosen: got into a boat
  alternatives:
  - boarded a boat
  - went into a boat
  lexicon: BDAG
  rationale: '''Got into a boat'' is idiomatic modern English and accurately reflects
    the ingressive action of ἐμβαίνω. The anarthrous πλοῖον is well rendered as ''a
    boat.'''
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples with him
  alternatives:
  - and his disciples
  - together with his disciples
  lexicon: BDAG
  rationale: The Greek coordinates 'his disciples' with the subject's boarding. 'With
    him' makes explicit in smooth English that they joined him in the boat, without
    adding new content beyond the syntax.
- source_word: εἶπεν πρὸς αὐτούς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω + πρός. 'Said to them' is slightly
    more formal and closer to the Greek than 'told them.'
- source_word: Διέλθωμεν
  chosen: Let us go across
  alternatives:
  - Let us cross over
  - Let us go over
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive functions as a hortatory proposal.
    'Let us go across' is natural and preserves the directional sense of διέρχομαι
    in this context.
- source_word: εἰς τὸ πέραν τῆς λίμνης
  chosen: to the other side of the lake
  alternatives:
  - to the far side of the lake
  - across the lake
  lexicon: BDAG
  rationale: τὸ πέραν idiomatically means 'the other side/far side.' 'Of the lake'
    preserves the genitive explicitly. 'Lake' is preferred because λίμνη specifically
    denotes a lake, not the more generic 'sea' here.
- source_word: ἀνήχθησαν
  chosen: they set out
  alternatives:
  - they put out to sea
  - they launched out
  - they sailed away
  lexicon: BDAG
  rationale: ἀνάγω in nautical usage means to put out or set sail. 'They set out'
    is clear modern English and avoids the misleading 'to sea' since the body of water
    is a lake.
