id: LUK.8.19
reference: Luke 8:19
source:
  edition: SBLGNT
  text: ⸀Παρεγένετο δὲ πρὸς αὐτὸν ἡ μήτηρ καὶ οἱ ἀδελφοὶ αὐτοῦ, καὶ οὐκ ἠδύναντο συντυχεῖν
    αὐτῷ διὰ τὸν ὄχλον.
translation:
  text: Then his mother and his brothers came to him, but they were not able to reach
    him because of the crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet with him' or 'to get to him.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'brothers'; some interpret this more broadly as 'relatives' or 'kinsmen,'
      but the text itself says 'brothers.'
    reason: alternative_reading
lexical_decisions:
- source_word: Παρεγένετο
  chosen: came
  alternatives:
  - arrived
  - came up
  lexicon: BDAG
  rationale: παραγίνομαι here introduces the arrival of Jesus' family. English singular
    'came' is adjusted to plural in idiomatic translation because the explicit subject
    is 'his mother and his brothers.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative progression. 'Then' gives a natural transitional sense
    in modern English without over-translating.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - toward him
  - to see him
  lexicon: BDAG
  rationale: πρός with accusative commonly indicates movement toward a person. 'To
    him' is the most natural rendering here; 'to see him' would add an unstated purpose.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Straightforward kinship term; 'his mother' reflects the possessive relation
    implied by context and explicit with the following αὐτοῦ.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this context refers
    to Jesus' male siblings/kinsmen as presented by the text. Per translation philosophy,
    gender-accurate rendering favors 'brothers' rather than an inclusive paraphrase.
- source_word: οὐκ ἠδύναντο
  chosen: they were not able
  alternatives:
  - they could not
  lexicon: BDAG
  rationale: This imperfect of δύναμαι expresses inability. 'They were not able' preserves
    the verbal force clearly; English style could also compress to 'could not.'
- source_word: συντυχεῖν αὐτῷ
  chosen: to reach him
  alternatives:
  - to meet with him
  - to get to him
  lexicon: BDAG
  rationale: συντυγχάνω can mean to meet with or come into contact with someone. In
    this context, blocked by the crowd, 'reach him' best captures the practical sense
    without implying a formal meeting.
- source_word: διὰ τὸν ὄχλον
  chosen: because of the crowd
  alternatives:
  - on account of the crowd
  lexicon: BDAG
  rationale: διά with the accusative indicates cause or reason. 'Because of the crowd'
    is clear, natural English.
