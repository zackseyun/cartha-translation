theological_decisions:
- issue: Reference of 'his brothers'
  chosen_reading: Render literally as 'his brothers' without resolving broader doctrinal
    debates about whether these were biological brothers, stepbrothers, or other relatives.
  alternative_readings:
  - kinsmen
  - relatives
  rationale: The verse itself uses ἀδελφοί, whose ordinary sense is 'brothers.' Historic
    doctrinal discussions about Mary's perpetual virginity or the exact familial relationship
    should not be imported into the translation where the Greek does not specify further.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
