id: LUK.8.34
reference: Luke 8:34
source:
  edition: SBLGNT
  text: Ἰδόντες δὲ οἱ βόσκοντες τὸ ⸀γεγονὸς ἔφυγον καὶ ἀπήγγειλαν εἰς τὴν πόλιν καὶ
    εἰς τοὺς ἀγρούς.
translation:
  text: When the herdsmen saw what had happened, they fled and reported it in the
    city and in the countryside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what had taken place.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the fields'; here it refers to the surrounding rural area
      or countryside.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδόντες
  chosen: When ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in natural English:
    ''When ... saw.'' This preserves the participial relation to the main verbs without
    awkward literalism.'
- source_word: οἱ βόσκοντες
  chosen: the herdsmen
  alternatives:
  - those who were tending them
  - the ones feeding them
  - the shepherds
  lexicon: BDAG
  rationale: Substantival present participle of βόσκω refers to those tending the
    herd of pigs in context. 'Herdsmen' is concise and idiomatic; 'shepherds' would
    mislead because the animals are swine, not sheep.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - what had taken place
  - the thing that had happened
  - the event
  lexicon: BDAG
  rationale: Perfect participle of γίνομαι used substantivally denotes the event that
    occurred. 'What had happened' is the most natural modern English rendering and
    preserves the completed-event sense.
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - they ran away
  - they escaped
  lexicon: BDAG
  rationale: Aorist of φεύγω is straightforwardly 'fled.' 'Ran away' is possible but
    slightly more colloquial; 'escaped' adds a nuance not required by the text.
- source_word: ἀπήγγειλαν
  chosen: reported it
  alternatives:
  - announced it
  - told about it
  - reported
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce. 'Reported it' fits the narrative
    context of relaying news and supplies the implied object from context in idiomatic
    English.
- source_word: εἰς τὴν πόλιν
  chosen: in the city
  alternatives:
  - to the city
  - into the city
  lexicon: BDAG
  rationale: Although εἰς often means 'into/to,' with verbs of reporting the sense
    is effectively locative/directional toward the people there. 'In the city' is
    idiomatic English for the sphere where the report was spread.
- source_word: καὶ εἰς τοὺς ἀγρούς
  chosen: and in the countryside
  alternatives:
  - and in the fields
  - and to the farms
  - and in the rural area
  lexicon: BDAG
  rationale: ἀγροί literally means 'fields,' but in this contrast with 'the city'
    it denotes the surrounding rural districts. 'Countryside' communicates the intended
    geographic contrast more clearly than the overly literal 'fields.'
