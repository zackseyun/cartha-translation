id: LUK.8.4
reference: Luke 8:4
source:
  edition: SBLGNT
  text: Συνιόντος δὲ ὄχλου πολλοῦ καὶ τῶν κατὰ πόλιν ἐπιπορευομένων πρὸς αὐτὸν εἶπεν
    διὰ παραβολῆς·
translation:
  text: 'And when a large crowd was gathering, and people from town after town were
    coming to him, he spoke by a parable:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he spoke in a parable.' The Greek expression διὰ παραβολῆς can be understood
      as indicating means or manner.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιόντος
  chosen: was gathering
  alternatives:
  - was coming together
  - was assembling
  lexicon: BDAG
  rationale: Genitive absolute with ὄχλου πολλοῦ; an imperfective English rendering
    best captures the ongoing action prior to εἶπεν. 'Was gathering' is natural modern
    English and reflects the intransitive sense of people coming together.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here marks narrative continuation rather than strong contrast. 'And'
    preserves the flow without overstating a transition.
- source_word: ὄχλου πολλοῦ
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd' and πολλοῦ intensifies size. 'Large crowd' is idiomatic
    contemporary English; 'great crowd' is possible but sounds more traditional than
    necessary.
- source_word: τῶν κατὰ πόλιν ἐπιπορευομένων
  chosen: people from town after town were coming
  alternatives:
  - those from each city were coming
  - those according to city were making their way
  lexicon: BDAG
  rationale: The articular participial phrase refers to people coming from various
    towns/cities. κατὰ πόλιν is distributive ('city by city' / 'from town after town').
    'People from town after town were coming' communicates the distributive force
    in natural English.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward Jesus; 'to him' is
    the most natural idiomatic rendering in context.
- source_word: εἶπεν
  chosen: he spoke
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Either is possible, but with the following διὰ παραβολῆς, 'spoke' fits
    the manner expression slightly better in English than 'said.'
- source_word: διὰ παραβολῆς
  chosen: by a parable
  alternatives:
  - in a parable
  - with a parable
  lexicon: BDAG
  rationale: διά with genitive expresses means or manner. 'By a parable' is a fairly
    direct rendering; 'in a parable' is also idiomatic and worth preserving as an
    alternative because many English versions use it.
