theological_decisions:
- issue: Nature of the woman's public confession
  chosen_reading: The verse is translated descriptively, without importing repentance
    or worship language beyond what the Greek states.
  alternative_readings:
  - She confessed in repentance
  - She worshiped him explicitly
  rationale: The text says she came trembling, fell before him, and declared publicly
    why she touched him and how she was healed. While the posture may imply reverence
    or supplication, the verse itself does not explicitly state repentance or worship,
    so the translation preserves the narrative description without doctrinal expansion.
  doctrine_reference: Translation philosophy items 1 and 3
