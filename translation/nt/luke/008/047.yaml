id: LUK.8.47
reference: Luke 8:47
source:
  edition: SBLGNT
  text: ἰδοῦσα δὲ ἡ γυνὴ ὅτι οὐκ ἔλαθεν τρέμουσα ἦλθεν καὶ προσπεσοῦσα αὐτῷ δι’ ἣν
    αἰτίαν ἥψατο αὐτοῦ ⸀ἀπήγγειλεν ἐνώπιον παντὸς τοῦ λαοῦ καὶ ὡς ἰάθη παραχρῆμα.
translation:
  text: And when the woman saw that she had not escaped notice, she came trembling,
    and falling down before him, declared before all the people why she had touched
    him and how she was healed immediately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not gone unnoticed' or 'was not hidden.'
    reason: lexical_alternative
  - marker: b
    text: Or 'falling at his feet before him.' The Greek says 'falling before him'
      without explicitly mentioning feet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  chosen: when ... saw
  alternatives:
  - seeing
  - having seen
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main action; 'when
    ... saw' is natural English and preserves the temporal force better than a wooden
    'having seen.'
- source_word: οὐκ ἔλαθεν
  chosen: had not escaped notice
  alternatives:
  - was not hidden
  - had not gone unnoticed
  lexicon: BDAG
  rationale: λανθάνω here means to escape someone's notice or remain hidden. The idiom
    is that the woman realized her act had not remained concealed. 'Had not escaped
    notice' is idiomatic and precise.
- source_word: τρέμουσα
  chosen: trembling
  alternatives:
  - shaking
  - afraid
  lexicon: BDAG
  rationale: Present participle expressing her physical and emotional state. 'Trembling'
    preserves the vividness without over-interpreting it as merely internal fear.
- source_word: προσπεσοῦσα αὐτῷ
  chosen: falling down before him
  alternatives:
  - falling at his feet
  - prostrating herself before him
  lexicon: BDAG
  rationale: προσπίπτω commonly denotes falling before someone in supplication or
    reverence. 'Before him' is directly supported by the dative and avoids adding
    'feet,' which is implied but not explicit.
- source_word: δι’ ἣν αἰτίαν
  chosen: why
  alternatives:
  - for what reason
  - the reason why
  lexicon: BDAG
  rationale: The phrase means 'for what reason/cause.' 'Why' is concise modern English
    that fully conveys the sense.
- source_word: ἥψατο αὐτοῦ
  chosen: had touched him
  alternatives:
  - touched him
  - took hold of him
  lexicon: BDAG
  rationale: ἅπτομαι with genitive means 'touch.' The pluperfect-like English 'had
    touched' fits the sequence from her perspective after realizing she was discovered.
- source_word: ἀπήγγειλεν
  chosen: declared
  alternatives:
  - reported
  - told
  - announced
  lexicon: BDAG
  rationale: The verb denotes reporting or telling publicly. 'Declared' fits the public
    setting and solemn tone without sounding overly formal.
- source_word: ἐνώπιον παντὸς τοῦ λαοῦ
  chosen: before all the people
  alternatives:
  - in the presence of all the people
  - before the whole crowd
  lexicon: BDAG
  rationale: ἐνώπιον means 'before/in the presence of.' λαός here refers to the gathered
    people. 'Before all the people' is clear and close to the Greek.
- source_word: ὡς ἰάθη
  chosen: how she was healed
  alternatives:
  - that she was healed
  - how she had been healed
  lexicon: BDAG
  rationale: ὡς here introduces the content of what she declared, namely the manner/fact
    of her healing. 'How she was healed' preserves the connective sense naturally
    in English.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb denotes something occurring at once. 'Immediately' is standard,
    clear English and matches Luke's emphasis on sudden healing.
