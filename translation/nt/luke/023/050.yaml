id: LUK.23.50
reference: Luke 23:50
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ ἀνὴρ ὀνόματι Ἰωσὴφ βουλευτὴς ὑπάρχων, ⸀ἀνὴρ ἀγαθὸς καὶ δίκαιος—
translation:
  text: And behold, a man named Joseph, who was a council member, a good and righteous
    man—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a good and just man."
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: BDAG
  rationale: Retains Luke's discourse marker and attention-getting particle rather
    than smoothing it away. 'Behold' is slightly formal but still readable and preserves
    the narrative force of ἰδού.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - someone
  - a certain man
  lexicon: BDAG
  rationale: ἀνήρ here refers to an adult male individual, not generic humanity. 'A
    man' is the gender-accurate rendering required by context.
- source_word: ὀνόματι Ἰωσὴφ
  chosen: named Joseph
  alternatives:
  - by the name of Joseph
  lexicon: BDAG
  rationale: Idiomatic English rendering of the dative expression ὀνόματι while preserving
    the introduction formula. The personal name is transliterated per translation
    policy.
- source_word: βουλευτὴς ὑπάρχων
  chosen: who was a council member
  alternatives:
  - being a council member
  - a member of the council
  - a councillor
  lexicon: BDAG
  rationale: βουλευτής denotes a member of a governing council; in this context, likely
    the Jewish council mentioned in the passion narrative. 'Who was' naturally renders
    the participle ὑπάρχων in English, and 'council member' is clearer for modern
    readers than 'councillor' while remaining faithful.
- source_word: ἀνὴρ ἀγαθὸς καὶ δίκαιος
  chosen: a good and righteous man
  alternatives:
  - a good and just man
  - a noble and righteous man
  lexicon: BDAG
  rationale: The repeated ἀνήρ is retained rather than omitted, since Luke restates
    the noun for emphasis. ἀγαθός is well rendered by 'good'; δίκαιος can be 'righteous'
    or 'just,' but 'righteous' better preserves the moral-religious nuance in this
    narrative description.
