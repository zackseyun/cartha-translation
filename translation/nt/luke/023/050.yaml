theological_decisions:
- issue: Rendering of δίκαιος in a character description
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: δίκαιος can denote uprightness in both ethical and juridical senses.
    In this context Joseph is being commended as morally upright before God and others,
    so 'righteous' best preserves the fuller biblical resonance without importing
    a technical doctrinal claim.
