theological_decisions:
- issue: Nature of Pilate's declaration
  chosen_reading: Render as a judicial finding of no valid charge, not as an absolute
    moral verdict detached from the legal context.
  alternative_readings:
  - I find no guilt in this man
  - I find nothing deserving condemnation in this man
  rationale: The verse is framed by legal vocabulary (ἀνακρίνω, αἴτιον, κατηγορεῖτε).
    The translation should preserve the courtroom setting and not import broader theological
    conclusions beyond the text's immediate claim.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
