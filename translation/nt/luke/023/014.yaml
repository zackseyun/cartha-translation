id: LUK.23.14
reference: Luke 23:14
source:
  edition: SBLGNT
  text: εἶπεν πρὸς αὐτούς· Προσηνέγκατέ μοι τὸν ἄνθρωπον τοῦτον ὡς ἀποστρέφοντα τὸν
    λαόν, καὶ ἰδοὺ ἐγὼ ἐνώπιον ὑμῶν ἀνακρίνας ⸀οὐθὲν εὗρον ἐν τῷ ἀνθρώπῳ τούτῳ αἴτιον
    ὧν κατηγορεῖτε κατ’ αὐτοῦ.
translation:
  text: he said to them, “You brought this man to me as one who was misleading the
    people, and look, after examining him before you, I found in this man no basis
    for the charges you bring against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as one who was turning the people away.” The Greek verb can mean to
      turn away or lead astray.
    reason: lexical_alternative
  - marker: b
    text: Or, “I found in this man no guilt regarding the things of which you accuse
      him.”
    reason: alternative_reading
lexical_decisions:
- source_word: Προσηνέγκατέ μοι
  chosen: You brought ... to me
  alternatives:
  - You presented ... to me
  - You brought before me
  lexicon: BDAG
  rationale: The aorist indicative refers to their completed act of bringing Jesus
    before Pilate. 'Brought ... to me' is natural English and preserves the direct
    address and forensic setting.
- source_word: τὸν ἄνθρωπον τοῦτον
  chosen: this man
  alternatives:
  - this person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to an individual male, so 'this man'
    is gender-accurate and contextually precise.
- source_word: ὡς ἀποστρέφοντα τὸν λαόν
  chosen: as one who was misleading the people
  alternatives:
  - as one who was turning the people away
  - as one who was inciting the people
  lexicon: BDAG
  rationale: ἀποστρέφω literally means 'turn away' or 'mislead/lead astray' in this
    accusatory context. 'Misleading the people' best captures the charge without overtranslating
    into the stronger 'inciting,' which is not the plain lexical sense.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the nation
  - the crowd
  lexicon: BDAG
  rationale: λαός in Luke commonly refers to the people collectively. 'The people'
    is the most straightforward rendering here.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English better than the archaic 'behold.'
- source_word: ἐνώπιον ὑμῶν
  chosen: before you
  alternatives:
  - in your presence
  - in front of you
  lexicon: BDAG
  rationale: This phrase emphasizes that Pilate's examination occurred openly in their
    presence. 'Before you' is concise and idiomatic.
- source_word: ἀνακρίνας
  chosen: after examining him
  alternatives:
  - having examined him
  - after questioning him
  lexicon: BDAG
  rationale: ἀνακρίνω in judicial contexts means to examine or interrogate. 'After
    examining him' fits the participial relation to the main verb and sounds natural
    in English. 'Him' is supplied because the object is implicit from context.
- source_word: οὐθὲν εὗρον
  chosen: I found no
  alternatives:
  - I found nothing
  - I discovered no
  lexicon: BDAG
  rationale: This is a standard negated finding formula. Rendering with 'I found no
    ...' prepares naturally for the object αἴτιον.
- source_word: αἴτιον
  chosen: basis for the charges
  alternatives:
  - guilt
  - grounds for accusation
  - cause
  lexicon: BDAG
  rationale: αἴτιον in legal contexts refers to a charge, cause, or basis of guilt.
    'Basis for the charges' makes the judicial sense explicit in idiomatic English
    and connects clearly with the following relative clause.
- source_word: ὧν κατηγορεῖτε κατ’ αὐτοῦ
  chosen: the charges you bring against him
  alternatives:
  - what you accuse him of
  - the accusations you make against him
  lexicon: BDAG
  rationale: κατηγορέω is a legal verb meaning 'accuse.' The relative pronoun ὧν is
    smoothly represented by 'the charges ... against him' in English, preserving the
    forensic tone.
