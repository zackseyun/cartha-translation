theological_decisions:
- issue: Placement and force of σήμερον ('today') in a punctuation-dependent saying
    with doctrinal implications for the intermediate state
  chosen_reading: Attach 'today' to 'you will be with me in paradise'
  alternative_readings:
  - Attach 'today' to 'I tell you'
  rationale: The Greek manuscripts lacked modern punctuation, so English punctuation
    reflects interpretation. The most natural reading in Koine usage and in the flow
    of the sentence is that 'today' qualifies the promise of being with Jesus in paradise,
    not the act of speaking. This preserves the plain sense without importing more
    detail than the text states. Because the alternative has been historically argued
    and affects theological interpretation, it is preserved in a footnote rather than
    ignored.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; document contested interpretive questions and preserve alternatives
    in footnotes.'
