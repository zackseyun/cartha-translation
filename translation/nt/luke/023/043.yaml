id: LUK.23.43
reference: Luke 23:43
source:
  edition: SBLGNT
  text: καὶ εἶπεν ⸀αὐτῷ· Ἀμήν ⸂σοι λέγω⸃ σήμερον μετ’ ἐμοῦ ἔσῃ ἐν τῷ παραδείσῳ.
translation:
  text: And he said to him, “Truly I tell you, today you will be with me in paradise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, less likely: “Truly I tell you today, you will be with me in paradise.”
      The Greek text originally lacked punctuation; this alternative takes “today”
      with “I tell you” rather than with “you will be.”'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀμήν
  chosen: Truly
  alternatives:
  - Amen
  - Certainly
  lexicon: BDAG
  rationale: In Jesus' sayings, ἀμήν functions as a solemn affirmation introducing
    an authoritative declaration. 'Truly' is idiomatic modern English that preserves
    the force without merely transliterating the term.
- source_word: σοι λέγω
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: The phrase is a common discourse formula in the Gospels. 'I tell you'
    is slightly more natural contemporary English while remaining close to the Greek.
- source_word: σήμερον
  chosen: today
  alternatives:
  - today (with the sense 'I tell you today')
  lexicon: BDAG
  rationale: 'The adverb most naturally modifies the future verb ''you will be,''
    yielding the traditional and syntactically straightforward sense: the promise
    concerns that very day. Because punctuation is interpretive in English and some
    construe σήμερον with ''I tell you,'' the alternative is preserved in a footnote
    rather than adopted in the main text.'
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: A direct and transparent rendering of the prepositional phrase, preserving
    the personal communion emphasized in the Greek.
- source_word: ἔσῃ
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: BDAG
  rationale: Future of εἰμί is best rendered with standard modern English future.
    'Shall' is possible but less natural for the target register.
- source_word: παραδείσῳ
  chosen: paradise
  alternatives:
  - the garden
  - Paradise
  lexicon: BDAG
  rationale: '''Paradise'' is the established and accurate rendering for παράδεισος
    in this eschatological context. Lowercase is used as a common noun denoting the
    blessed place of the righteous, not necessarily as a formal proper name.'
