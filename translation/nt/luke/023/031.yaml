theological_decisions:
- issue: Metaphorical image of green and dry wood
  chosen_reading: Retain the metaphor without interpreting it in the main text.
  alternative_readings:
  - Jesus refers to himself as the 'green wood' and Jerusalem or its people as the
    'dry' wood
  - A general proverb about lesser-to-greater judgment
  rationale: The saying is metaphorical and likely points from Jesus' unjust suffering
    to a greater coming judgment, but the exact referents are interpretive. To preserve
    theological tension and avoid importing a specific explanation into the translation,
    the imagery is left intact in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
