id: LUK.23.31
reference: Luke 23:31
source:
  edition: SBLGNT
  text: ὅτι εἰ ἐν ⸀τῷ ὑγρῷ ξύλῳ ταῦτα ποιοῦσιν, ἐν τῷ ξηρῷ τί γένηται;
translation:
  text: For if they do these things when the wood is green, what will happen when
    it is dry?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the green wood ... in the dry.' The Greek preserves the image more
      literally; the translation renders it idiomatically as a contrast between green
      and dry wood.
    reason: lexical_alternative
  - marker: b
    text: 'The image likely moves from the lesser to the greater: if such things are
      done in the case of ''green'' wood, what will happen in the case of ''dry''
      wood?'
    reason: cultural_note
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this introduces the reason for the preceding lament and warning,
    so 'For' works idiomatically in English while preserving the causal force.
- source_word: ἐν τῷ ὑγρῷ ξύλῳ
  chosen: when the wood is green
  alternatives:
  - in the green wood
  - with the green tree
  lexicon: BDAG
  rationale: The phrase is metaphorical/proverbial. A strictly formal 'in the green
    wood' is less natural in English and may obscure the sense. 'When the wood is
    green' preserves the imagery while making the conditional contrast intelligible.
    'Wood' is retained rather than 'tree' because ξύλον commonly means wood/timber
    and the saying likely evokes combustible material.
- source_word: ὑγρῷ
  chosen: green
  alternatives:
  - wet
  - fresh
  lexicon: BDAG
  rationale: Although ὑγρός can mean 'wet' or 'moist,' in this fire-related contrast
    with ξηρός, 'green' is the most natural English idiom for unseasoned wood that
    does not burn readily.
- source_word: ξύλῳ
  chosen: wood
  alternatives:
  - tree
  - timber
  lexicon: BDAG
  rationale: ξύλον can denote wood, timber, tree, or even the cross in some contexts.
    Here the proverb contrasts green and dry combustible material, so 'wood' best
    fits the image without over-specifying.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The plural demonstrative is preserved. It refers broadly to the actions
    now being done, likely including Jesus' unjust suffering and the events surrounding
    it.
- source_word: ποιοῦσιν
  chosen: they do
  alternatives:
  - they are doing
  - people do
  lexicon: BDAG
  rationale: The present active indicative is rendered simply. The subject is indefinite
    in Greek; 'they' is the natural English equivalent and preserves the open reference.
- source_word: ἐν τῷ ξηρῷ
  chosen: when it is dry
  alternatives:
  - in the dry wood
  - with the dry tree
  lexicon: BDAG
  rationale: This mirrors the earlier phrase and keeps the proverb's contrast clear
    in idiomatic English. The pronoun 'it' is supplied naturally in English to refer
    back to the wood.
- source_word: τί γένηται
  chosen: what will happen
  alternatives:
  - what may happen
  - what will become
  lexicon: BDAG
  rationale: The aorist middle subjunctive in this rhetorical question expresses anticipated
    outcome. 'What will happen' communicates the force clearly in contemporary English.
