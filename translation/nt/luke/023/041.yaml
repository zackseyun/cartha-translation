theological_decisions:
- issue: Rendering the criminal's statement about Jesus' innocence
  chosen_reading: but this man has done nothing wrong
  alternative_readings:
  - but this man has done nothing improper
  - but this man has done nothing out of place
  rationale: The verse presents a human testimony to Jesus' innocence in the immediate
    judicial context. The translation should preserve that claim plainly without importing
    broader doctrinal conclusions not explicit in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
