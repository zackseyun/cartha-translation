id: LUK.23.41
reference: Luke 23:41
source:
  edition: SBLGNT
  text: καὶ ἡμεῖς μὲν δικαίως, ἄξια γὰρ ὧν ἐπράξαμεν ἀπολαμβάνομεν· οὗτος δὲ οὐδὲν
    ἄτοπον ἔπραξεν.
translation:
  text: And we indeed justly, for we are receiving what our deeds deserve; but this
    man has done nothing wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we are receiving the due things for what we did.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'this one has done nothing improper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαίως
  chosen: justly
  alternatives:
  - rightly
  - with justice
  lexicon: BDAG
  rationale: Adverb indicating that their punishment is deserved. 'Justly' is concise
    and preserves the judicial sense better than the more colloquial 'rightly.'
- source_word: ἄξια
  chosen: what ... deserve
  alternatives:
  - things worthy of
  - what is fitting for
  lexicon: BDAG
  rationale: With ἀπολαμβάνομεν, the phrase expresses receiving consequences proportionate
    to prior actions. English idiom is best captured by 'what our deeds deserve' rather
    than a wooden 'worthy things of what we did.'
- source_word: ὧν ἐπράξαμεν
  chosen: our deeds
  alternatives:
  - what we did
  - the things we practiced/did
  lexicon: BDAG
  rationale: The relative clause specifies the basis of deserved punishment. 'Our
    deeds' is a natural compression in English that still reflects the completed actions
    denoted by the aorist ἐπράξαμεν.
- source_word: ἀπολαμβάνομεν
  chosen: we are receiving
  alternatives:
  - we receive
  - we are getting back
  lexicon: BDAG
  rationale: Present tense indicates current reception of punishment. 'We are receiving'
    preserves the ongoing aspect more clearly than simple present 'we receive.'
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: In context the speaker contrasts himself and the other criminal with
    Jesus. 'This man' is idiomatic English and preserves the demonstrative force better
    than bare 'he.'
- source_word: οὐδὲν ἄτοπον
  chosen: nothing wrong
  alternatives:
  - nothing improper
  - nothing out of place
  - nothing criminal
  lexicon: BDAG
  rationale: ἄτοπος here denotes something improper or wrong, especially in a judicial
    context. 'Nothing wrong' is clear modern English and fits the speaker's declaration
    of Jesus' innocence without over-specifying legal terminology.
- source_word: ἔπραξεν
  chosen: has done
  alternatives:
  - did
  - committed
  lexicon: BDAG
  rationale: English present perfect works naturally in context to describe Jesus'
    record up to the present moment. 'Committed' would sound overly legalistic; 'did'
    is possible but less idiomatic with 'nothing wrong' here.
