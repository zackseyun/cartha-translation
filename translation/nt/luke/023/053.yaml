id: LUK.23.53
reference: Luke 23:53
source:
  edition: SBLGNT
  text: καὶ ⸀καθελὼν ἐνετύλιξεν αὐτὸ σινδόνι, καὶ ἔθηκεν ⸀αὐτὸν ἐν μνήματι λαξευτῷ
    οὗ οὐκ ἦν ⸂οὐδεὶς οὔπω⸃ κείμενος.
translation:
  text: And after taking him down, he wrapped him in a linen cloth and placed him
    in a tomb cut in stone, where no one had yet been laid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a hewn tomb" or "a tomb cut out of rock."
    reason: lexical_alternative
  - marker: b
    text: Or "where no one had ever lain."
    reason: lexical_alternative
lexical_decisions:
- source_word: καθελὼν
  chosen: after taking him down
  alternatives:
  - having taken him down
  - taking him down
  lexicon: BDAG
  rationale: Aorist participle of καθαιρέω here refers to removing Jesus' body from
    the cross. 'After taking him down' gives natural English sequence while preserving
    the participial action prior to the main verbs.
- source_word: ἐνετύλιξεν
  chosen: wrapped
  alternatives:
  - wrapped up
  - swathed
  lexicon: BDAG
  rationale: The verb ἐντυλίσσω means to wrap or roll up in cloth. 'Wrapped' is clear
    modern English and fits burial context without adding detail not explicit in the
    Greek.
- source_word: σινδόνι
  chosen: in a linen cloth
  alternatives:
  - in linen
  - in a linen shroud
  lexicon: BDAG
  rationale: Dative of means/instrument. σινδών denotes a linen cloth, often a burial
    cloth. 'Linen cloth' is accurate and accessible; 'shroud' is possible but slightly
    more interpretive.
- source_word: ἔθηκεν
  chosen: placed
  alternatives:
  - laid
  - put
  lexicon: BDAG
  rationale: τίθημι here means to put/place the body in the tomb. 'Placed' is idiomatic
    and dignified; 'laid' is also possible but is reserved in the final clause to
    reflect κείμενος.
- source_word: μνήματι
  chosen: in a tomb
  alternatives:
  - in a grave
  - in a burial tomb
  lexicon: BDAG
  rationale: μνῆμα refers to a tomb or burial place. 'Tomb' best matches the first-century
    rock-hewn burial setting.
- source_word: λαξευτῷ
  chosen: cut in stone
  alternatives:
  - hewn
  - rock-cut
  - cut out of rock
  lexicon: BDAG
  rationale: λαξευτός means hewn or cut out, especially of stone/rock. 'Cut in stone'
    is natural modern English and conveys the material without archaic tone.
- source_word: οὗ
  chosen: where
  alternatives:
  - in which
  lexicon: BDAG
  rationale: Relative adverb referring to the tomb. 'Where' is the most natural English
    equivalent.
- source_word: οὐδεὶς οὔπω κείμενος
  chosen: where no one had yet been laid
  alternatives:
  - where no one had yet been placed
  - where no one had ever lain
  lexicon: BDAG
  rationale: The construction states that no person had yet been lying/laid there.
    In burial context, English idiom favors 'had yet been laid,' which communicates
    prior non-use of the tomb.
