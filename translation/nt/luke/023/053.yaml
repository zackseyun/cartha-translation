theological_decisions:
- issue: Burial description and tomb type
  chosen_reading: Joseph placed Jesus in a tomb cut in stone that had not yet been
    used for anyone.
  alternative_readings:
  - Joseph placed Jesus in a hewn tomb where no one had ever lain.
  rationale: The verse is descriptive rather than doctrinally contested. The translation
    preserves the historical burial detail without importing harmonizations from parallel
    accounts or additional theological claims.
  doctrine_reference: Translation philosophy §§1, 5, 6
