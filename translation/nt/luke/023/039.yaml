id: LUK.23.39
reference: Luke 23:39
source:
  edition: SBLGNT
  text: Εἷς δὲ τῶν κρεμασθέντων κακούργων ἐβλασφήμει αὐτόν ⸀λέγων· ⸀Οὐχὶ σὺ εἶ ὁ χριστός;
    σῶσον σεαυτὸν καὶ ἡμᾶς.
translation:
  text: Now one of the criminals who were hanging there was reviling him, saying,
    “Are you not the Messiah? Save yourself and us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “the Christ.” Greek: ho christos.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εἷς δὲ
  chosen: Now one
  alternatives:
  - But one
  - And one
  lexicon: BDAG
  rationale: δέ here marks a mild development/contrast in the narrative. 'Now one'
    gives natural English discourse flow without overstating adversative force.
- source_word: τῶν κρεμασθέντων κακούργων
  chosen: of the criminals who were hanging there
  alternatives:
  - of the hanged criminals
  - of the criminals who had been crucified
  lexicon: BDAG
  rationale: κακοῦργοι are 'criminals/evildoers'; 'criminals' is the most natural
    modern rendering. κρεμασθέντων literally means 'having been hung,' but in this
    crucifixion context 'who were hanging there' preserves the scene without importing
    a more specific verb than the Greek uses.
- source_word: ἐβλασφήμει
  chosen: was reviling
  alternatives:
  - was blaspheming
  - kept insulting
  lexicon: BDAG
  rationale: In context the sense is abusive speech directed at Jesus, not necessarily
    a technical act of blasphemy against God in English usage. The imperfect is represented
    with 'was reviling,' conveying ongoing action.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward object pronoun referring to Jesus.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Standard participial speech introduction in English narrative.
- source_word: Οὐχὶ σὺ εἶ
  chosen: Are you not
  alternatives:
  - Are you not indeed
  - Isn't it you who are
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer or expressing
    taunt/irony. 'Are you not' preserves the rhetorical force cleanly.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ'
    to preserve its meaning in context.
- source_word: σῶσον
  chosen: Save
  alternatives:
  - Rescue
  lexicon: BDAG
  rationale: The imperative calls for deliverance from immediate death. 'Save' is
    both natural and preserves the verbal link with broader salvation language.
- source_word: σεαυτὸν καὶ ἡμᾶς
  chosen: yourself and us
  alternatives:
  - yourself—and us too
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the coordinated objects; the criminal's
    self-interest and mockery are preserved.
