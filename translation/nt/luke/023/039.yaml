theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this taunt, Χριστός functions as a title rather than a name-like designation.
    Following the project's contested-terms guidance, 'Messiah' preserves the title's
    meaning and Jewish messianic context.
