id: LUK.23.10
reference: Luke 23:10
source:
  edition: SBLGNT
  text: εἱστήκεισαν δὲ οἱ ἀρχιερεῖς καὶ οἱ γραμματεῖς εὐτόνως κατηγοροῦντες αὐτοῦ.
translation:
  text: And the chief priests and the scribes stood there, vehemently accusing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bringing charges against him with intensity' / 'fiercely accusing him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκεισαν
  chosen: stood there
  alternatives:
  - were standing
  - stood by
  lexicon: BDAG
  rationale: 'Pluperfect/intransitive form of ἵστημι functions as a stative past:
    they were in a standing position/present on the scene. ''Stood there'' is natural
    English and preserves the scene-setting force without overcomplicating the tense.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' best fits smooth modern English while preserving continuity.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural title referring to the leading priestly
    authorities, not a claim that multiple individuals simultaneously held the singular
    office of high priest.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct and established rendering of γραμματεῖς
    in Gospel narrative. Alternatives are more interpretive and context-expanding
    than the Greek requires.'
- source_word: εὐτόνως
  chosen: vehemently
  alternatives:
  - fiercely
  - earnestly
  - with intensity
  lexicon: BDAG
  rationale: The adverb conveys intensity and forcefulness. 'Vehemently' captures
    the hostile vigor of the accusations in concise English.
- source_word: κατηγοροῦντες
  chosen: accusing
  alternatives:
  - bringing charges against
  - denouncing
  lexicon: BDAG
  rationale: Present participle indicates ongoing action accompanying their standing
    there. 'Accusing' is the straightforward legal/narrative equivalent and works
    well with the adverb.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - against him
  lexicon: BDAG
  rationale: The genitive after κατηγορέω idiomatically means 'accuse someone' or
    'bring charges against someone.' In English, 'accusing him' is idiomatic and sufficiently
    conveys the sense; the prepositional expansion is not necessary in the main text.
