theological_decisions:
- issue: Sense of αὐτῷ with πεπραγμένον
  chosen_reading: 'agent: ''done by him'''
  alternative_readings:
  - 'reference: ''found in him'''
  - 'relation: ''done to him'''
  rationale: In context Pilate is declaring Jesus innocent of a capital crime, so
    the statement concerns deeds attributable to Jesus, not actions done to Jesus.
    Rendering the dative as agent best communicates the judicial verdict in idiomatic
    English.
