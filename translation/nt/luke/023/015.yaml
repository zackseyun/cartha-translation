id: LUK.23.15
reference: Luke 23:15
source:
  edition: SBLGNT
  text: ἀλλ’ οὐδὲ Ἡρῴδης, ⸂ἀνέπεμψεν γὰρ αὐτὸν πρὸς ἡμᾶς⸃· καὶ ἰδοὺ οὐδὲν ἄξιον θανάτου
    ἐστὶν πεπραγμένον αὐτῷ·
translation:
  text: But neither did Herod, for he sent him back to us. And look, nothing deserving
    of death has been done by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But not even Herod, for he sent him back to us; and see, nothing worthy
      of death has been done by him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ οὐδὲ
  chosen: But neither did
  alternatives:
  - But not even
  - But neither
  lexicon: BDAG
  rationale: The combination marks continuation with contrast and adds Herod as another
    authority who likewise found no capital offense. English supplies 'did' to make
    the ellipsis natural.
- source_word: Ἡρῴδης
  chosen: Herod
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy for names.
- source_word: ἀνέπεμψεν
  chosen: sent ... back
  alternatives:
  - referred
  - returned
  - sent
  lexicon: BDAG
  rationale: In this judicial context ἀναπέμπω can mean send back or refer upward/back.
    Given the narrative setting, 'sent ... back' is the clearest idiomatic rendering
    and matches the direction implied by πρὸς ἡμᾶς.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory clause giving the reason Pilate can appeal
    to Herod's judgment.
- source_word: αὐτὸν πρὸς ἡμᾶς
  chosen: him back to us
  alternatives:
  - him to us
  lexicon: BDAG
  rationale: πρὸς ἡμᾶς is literally 'to us'; 'back' is supplied in English because
    ἀναπέμπω in context implies return to Pilate and his court.
- source_word: καὶ ἰδοὺ
  chosen: And look
  alternatives:
  - Indeed
  - See
  - And behold
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to the conclusion. 'And
    look' preserves the immediacy in readable modern English better than the archaic
    'behold.'
- source_word: οὐδὲν ἄξιον θανάτου
  chosen: nothing deserving of death
  alternatives:
  - nothing worthy of death
  - nothing deserving death
  lexicon: BDAG
  rationale: This phrase denotes no act meriting capital punishment. 'Deserving of
    death' is natural English and preserves the judicial force.
- source_word: ἐστὶν πεπραγμένον
  chosen: has been done
  alternatives:
  - has been committed
  - has been carried out
  lexicon: BDAG
  rationale: The periphrastic perfect expresses a completed action with present relevance.
    'Has been done' is broad and fits the unspecified offense under investigation.
- source_word: αὐτῷ
  chosen: by him
  alternatives:
  - by this man
  - by Jesus
  - in him
  lexicon: BDAG
  rationale: 'Here the dative is best taken as agent with the perfect passive participle:
    nothing deserving death has been done by him. This avoids the misleading sense
    ''done to him.'''
