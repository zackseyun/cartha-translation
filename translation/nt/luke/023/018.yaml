id: LUK.23.18
reference: Luke 23:18
source:
  edition: SBLGNT
  text: ⸀Ἀνέκραγον δὲ παμπληθεὶ λέγοντες· Αἶρε τοῦτον, ἀπόλυσον δὲ ἡμῖν ⸀τὸν Βαραββᾶν·
translation:
  text: But they all cried out together, saying, “Take this man away, and release
    Barabbas to us!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Away with this man.” The Greek imperative can be rendered more tersely,
      but the sense is that they demand his removal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέκραγον
  chosen: cried out
  alternatives:
  - shouted
  - cried aloud
  lexicon: BDAG
  rationale: The verb denotes a loud outcry. 'Cried out' is natural modern English
    and preserves the intensity without over-specifying volume beyond the Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Here δέ marks narrative contrast or development from the preceding exchange.
    'But' best captures the adversative turn in English.
- source_word: παμπληθεὶ
  chosen: all together
  alternatives:
  - as a whole crowd
  - all at once
  - with one voice
  lexicon: BDAG
  rationale: The adverb conveys collective unanimity. 'All together' communicates
    the corporate action clearly in idiomatic English. 'With one voice' is possible
    but slightly more interpretive.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle introduces the content of the cry. 'Saying' is a straightforward
    participial rendering in English.
- source_word: Αἶρε
  chosen: Take ... away
  alternatives:
  - Take
  - Remove
  - Away with
  lexicon: BDAG
  rationale: The imperative from αἴρω here means to remove this person from before
    them, likely for execution. 'Take this man away' is idiomatic and reflects the
    force better than the less natural bare 'Take this one.'
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: The demonstrative is accusative masculine singular and points contemptuously
    to Jesus. 'This man' is more natural English than 'this one' and preserves the
    deictic force better than simply 'him'.
- source_word: ἀπόλυσον
  chosen: release
  alternatives:
  - set free
  - free
  lexicon: BDAG
  rationale: The imperative means to release or free from custody. 'Release' fits
    the legal/judicial context well.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: The dative indicates the beneficiary/recipient of the requested action.
    'To us' is the most direct rendering with 'release.'
- source_word: τὸν Βαραββᾶν
  chosen: Barabbas
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
