id: LUK.23.13
reference: Luke 23:13
source:
  edition: SBLGNT
  text: Πιλᾶτος δὲ συγκαλεσάμενος τοὺς ἀρχιερεῖς καὶ τοὺς ἄρχοντας καὶ τὸν λαὸν
translation:
  text: But Pilate, having called together the chief priests and the rulers and the
    people,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or development in the narrative. 'But' fits
    the immediate shift back to Pilate's action after the preceding scene, while preserving
    the connective force.
- source_word: συγκαλεσάμενος
  chosen: having called together
  alternatives:
  - after calling together
  - summoning together
  - convening
  lexicon: BDAG
  rationale: The aorist middle participle from συγκαλέω denotes gathering or summoning
    people together. 'Having called together' preserves the participial structure
    and temporal sense without over-paraphrasing. 'Convening' is possible but slightly
    more interpretive and less transparent to the Greek verbal form.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: In NT usage the plural refers to the leading priestly authorities, not
    multiple holders of the singular office of high priest at one time. 'Chief priests'
    is the standard and most accurate rendering in context.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - leaders
  - authorities
  lexicon: BDAG
  rationale: ἄρχοντες refers to civic or governing leaders. 'Rulers' is a direct and
    readable rendering that preserves the official sense better than the broader 'leaders'.
- source_word: λαὸν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός commonly means 'people' in a collective sense. 'The people' is the
    most straightforward rendering and avoids narrowing the reference to merely a
    crowd if Luke intends the broader public group present.
