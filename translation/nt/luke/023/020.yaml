id: LUK.23.20
reference: Luke 23:20
source:
  edition: SBLGNT
  text: πάλιν ⸀δὲ ὁ Πιλᾶτος ⸀προσεφώνησεν, θέλων ἀπολῦσαι τὸν Ἰησοῦν.
translation:
  text: But Pilate called out again, wanting to release Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'addressed them again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Adverb indicating repetition; 'again' is the most natural concise English
    equivalent here.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development in the narrative. 'But' fits the
    context of Pilate's response to the crowd better than a simple continuative 'and.'
- source_word: Πιλᾶτος
  chosen: Pilate
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: προσεφώνησεν
  chosen: called out
  alternatives:
  - addressed
  - spoke to
  - appealed to
  lexicon: BDAG
  rationale: The verb προσφωνέω means to address or call out to someone. 'Called out'
    captures the public, vocal sense in this trial scene more vividly than the flatter
    'addressed.'
- source_word: θέλων
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: Present participle expressing Pilate's intent or desire contemporaneous
    with the main verb. 'Wanting' is natural modern English and preserves the participial
    nuance without overformal wording.
- source_word: ἀπολῦσαι
  chosen: to release
  alternatives:
  - to set free
  lexicon: BDAG
  rationale: Infinitive of purpose/complement after θέλων. 'Release' fits the legal-custodial
    context especially well.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  rationale: Standard English transliteration of the personal name with the article
    omitted as normal in English.
