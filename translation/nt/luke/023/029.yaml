id: LUK.23.29
reference: Luke 23:29
source:
  edition: SBLGNT
  text: ὅτι ἰδοὺ ἔρχονται ἡμέραι ἐν αἷς ἐροῦσιν Μακάριαι αἱ στεῖραι καὶ ⸀αἱ κοιλίαι
    αἳ οὐκ ἐγέννησαν καὶ μαστοὶ οἳ οὐκ ⸀ἔθρεψαν.
translation:
  text: For look, days are coming in which they will say, ‘Blessed are the barren
    women, and the wombs that never bore, and the breasts that never nursed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy' or 'fortunate'; Greek 'blessed,' expressing a shocking reversal
      in view of coming distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for the preceding lament/exhortation. 'For' fits
    the discourse connection in English more naturally than 'because' at the head
    of the sentence.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A deictic attention-getter. 'Look' preserves the force in readable modern
    English; 'behold' is too archaic for the stated philosophy.
- source_word: ἔρχονται ἡμέραι
  chosen: days are coming
  alternatives:
  - the days are coming
  - days will come
  lexicon: BDAG
  rationale: A common prophetic idiom. Present tense with future sense is well represented
    by 'days are coming,' preserving the vividness of the Greek.
- source_word: ἐν αἷς
  chosen: in which
  alternatives:
  - when
  lexicon: BDAG
  rationale: More formally reflects the relative construction while remaining natural
    English. 'When' is possible but slightly less transparent to the Greek syntax.
- source_word: ἐροῦσιν
  chosen: they will say
  alternatives:
  - people will say
  - one will say
  lexicon: BDAG
  rationale: The Greek has an indefinite third person plural. 'They will say' preserves
    that idiom without over-specifying the speakers.
- source_word: Μακάριαι
  chosen: Blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: Standard rendering for μακάριος in solemn pronouncement contexts. 'Happy'
    is too weak; 'fortunate' misses the beatitude-like tone.
- source_word: αἱ στεῖραι
  chosen: the barren women
  alternatives:
  - the barren
  - the infertile women
  lexicon: BDAG
  rationale: στεῖραι refers to women unable to bear children. 'The barren women' makes
    the referent explicit in English and avoids the potentially harsh standalone nominal
    adjective 'the barren,' while staying close to the source.
- source_word: κοιλίαι
  chosen: the wombs
  alternatives:
  - the bellies
  lexicon: BDAG
  rationale: In this childbirth context, κοιλία refers specifically to the womb rather
    than the abdomen generally. 'Wombs' best matches the contextual sense.
- source_word: αἳ οὐκ ἐγέννησαν
  chosen: that never bore
  alternatives:
  - that did not give birth
  - that never gave birth
  lexicon: BDAG
  rationale: γεννάω here refers to bearing children. 'Never bore' is concise, idiomatic,
    and preserves the absolute negation implied in context.
- source_word: μαστοὶ
  chosen: the breasts
  alternatives:
  - the breasts of women
  lexicon: BDAG
  rationale: Literal anatomical term; no euphemism is needed. The context already
    makes the female referent clear.
- source_word: οἳ οὐκ ἔθρεψαν
  chosen: that never nursed
  alternatives:
  - that never fed
  - that never suckled
  lexicon: BDAG
  rationale: τρέφω means 'nourish/feed,' but with 'breasts' as subject the idiomatic
    English expression is 'nursed.' 'Suckled' is possible but less natural in contemporary
    English.
