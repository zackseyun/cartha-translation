theological_decisions:
- issue: Rendering of μακάριαι in a reversal saying about childlessness under coming
    judgment
  chosen_reading: Blessed
  alternative_readings:
  - fortunate
  - happy
  rationale: The verse expresses a shocking reversal in light of impending distress,
    not a doctrinal commendation of childlessness in itself. 'Blessed' preserves the
    solemn, beatitude-like force without flattening the prophetic irony and lament.
  doctrine_reference: Translation philosophy §§3, 6
