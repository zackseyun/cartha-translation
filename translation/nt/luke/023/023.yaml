id: LUK.23.23
reference: Luke 23:23
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπέκειντο φωναῖς μεγάλαις αἰτούμενοι αὐτὸν σταυρωθῆναι, καὶ κατίσχυον
    αἱ φωναὶ ⸀αὐτῶν.
translation:
  text: But they kept pressing with loud voices, asking that he be crucified, and
    their voices were prevailing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their cries were prevailing.' The Greek repeats the word for 'voices'
      in both clauses, which may also be rendered 'cries' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέκειντο
  chosen: kept pressing
  alternatives:
  - insisted
  - were urgent
  - pressed upon him
  lexicon: BDAG
  rationale: The imperfect middle of ἐπίκειμαι conveys continued pressure or insistence,
    not merely a single request. 'Kept pressing' preserves the durative force and
    the sense of aggressive persistence in context before Pilate.
- source_word: φωναῖς μεγάλαις
  chosen: with loud voices
  alternatives:
  - with great shouts
  - in loud voices
  lexicon: BDAG
  rationale: φωνή can mean 'voice,' 'cry,' or 'sound.' With μέγας in the dative of
    manner/instrument, the phrase describes the manner of their pressure. 'With loud
    voices' is natural English and keeps the auditory emphasis without overinterpreting
    as a specific kind of shout.
- source_word: αἰτούμενοι
  chosen: asking
  alternatives:
  - demanding
  - requesting
  lexicon: BDAG
  rationale: αἰτέω commonly means 'ask' or 'request.' In this hostile judicial setting,
    'demanding' is contextually possible, but 'asking' better reflects the lexical
    core while the surrounding verbs already convey their forcefulness.
- source_word: αὐτὸν σταυρωθῆναι
  chosen: that he be crucified
  alternatives:
  - for him to be crucified
  lexicon: BDAG
  rationale: The accusative plus infinitive construction is naturally rendered in
    English as a content clause. 'That he be crucified' is clear, idiomatic, and preserves
    the passive sense of σταυρωθῆναι.
- source_word: κατίσχυον
  chosen: were prevailing
  alternatives:
  - were winning out
  - were overpowering
  - prevailed
  lexicon: BDAG
  rationale: 'The imperfect indicates an ongoing process: their cries were gaining
    the upper hand in the proceeding. ''Were prevailing'' preserves both the aspect
    and the judicial pressure implied by the context.'
- source_word: αἱ φωναὶ αὐτῶν
  chosen: their voices
  alternatives:
  - their cries
  lexicon: BDAG
  rationale: The repeated use of φωνή links the first and second clauses. Retaining
    'voices' preserves that repetition and shows that the narrative emphasizes the
    force of their outcry itself as prevailing.
