id: LUK.23.28
reference: Luke 23:28
source:
  edition: SBLGNT
  text: στραφεὶς δὲ πρὸς αὐτὰς ⸀ὁ Ἰησοῦς εἶπεν· Θυγατέρες Ἰερουσαλήμ, μὴ κλαίετε ἐπ’
    ἐμέ· πλὴν ἐφ’ ἑαυτὰς κλαίετε καὶ ἐπὶ τὰ τέκνα ὑμῶν,
translation:
  text: But turning toward them, Jesus said, “Daughters of Jerusalem, do not weep
    for me; instead, weep for yourselves and for your children,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Women of Jerusalem.” The Greek literally says “Daughters of Jerusalem,”
      a prophetic-style address preserved in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turning
  alternatives:
  - having turned
  - turned
  lexicon: BDAG
  rationale: Aorist participle of στρέφω, introducing Jesus' physical reorientation
    toward the women. 'Turning' is natural English and preserves the participial connection
    to the main verb.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast. 'But' fits the narrative shift and
    the contrast between the women's mourning and Jesus' response.
- source_word: πρὸς αὐτὰς
  chosen: toward them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: πρός with accusative commonly indicates direction toward. 'Toward them'
    preserves the physical sense alongside the participle 'turning.'
- source_word: Θυγατέρες Ἰερουσαλήμ
  chosen: Daughters of Jerusalem
  alternatives:
  - Daughters, Jerusalem
  - Women of Jerusalem
  lexicon: BDAG
  rationale: A vocative expression echoing prophetic address. 'Daughters of Jerusalem'
    preserves the literal familial/corporate idiom and its biblical resonance better
    than the flatter 'Women of Jerusalem.'
- source_word: μὴ κλαίετε
  chosen: do not weep
  alternatives:
  - do not cry
  - stop weeping
  lexicon: BDAG
  rationale: Present imperative with μή can prohibit an action, either generally or
    already in progress. 'Do not weep' is a clear, idiomatic rendering that avoids
    overcommitting to the ingressive nuance of 'stop weeping.'
- source_word: ἐπ’ ἐμέ
  chosen: for me
  alternatives:
  - over me
  - because of me
  lexicon: BDAG
  rationale: ἐπί with accusative after κλαίω conveys the object/cause of weeping.
    'For me' is the most natural English equivalent here.
- source_word: πλὴν
  chosen: instead
  alternatives:
  - but
  - nevertheless
  - except
  lexicon: BDAG
  rationale: 'πλήν here introduces a corrective contrast: not for me, but rather for
    yourselves. ''Instead'' captures that adversative force clearly in modern English.'
- source_word: ἐφ’ ἑαυτὰς
  chosen: for yourselves
  alternatives:
  - over yourselves
  lexicon: BDAG
  rationale: Reflexive pronoun with ἐπί parallels the earlier phrase ἐπ’ ἐμέ. 'For
    yourselves' keeps the parallelism and reads naturally.
- source_word: τὰ τέκνα ὑμῶν
  chosen: your children
  alternatives:
  - your offspring
  lexicon: BDAG
  rationale: τέκνα denotes children in a familial sense. 'Your children' is the plain
    and contextually appropriate rendering.
