theological_decisions:
- issue: Rendering the address Θυγατέρες Ἰερουσαλήμ
  chosen_reading: Daughters of Jerusalem
  alternative_readings:
  - Women of Jerusalem
  rationale: The phrase is not merely demographic but carries prophetic and covenantal
    resonance from Israel's scriptural idiom. Retaining 'Daughters' preserves that
    intertextual weight without importing extra doctrine.
  doctrine_reference: Translation philosophy §§1, 6
