theological_decisions:
- issue: Scope of παιδεύω in Pilate's proposal
  chosen_reading: Rendered in a penal/judicial sense as 'punishing' rather than educational
    'disciplining.'
  alternative_readings:
  - disciplining
  - chastising
  - flogging
  rationale: The immediate trial context requires a punitive action before release.
    The translation avoids importing a more specific punishment than the Greek itself
    states, while still reflecting the judicial force of the verb.
  doctrine_reference: Translation philosophy §1, §5
