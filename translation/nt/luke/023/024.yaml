theological_decisions:
- issue: Judicial nuance of Pilate's action
  chosen_reading: Pilate decided that their demand should be granted
  alternative_readings:
  - Pilate gave judgment that their request should be carried out
  - Pilate passed sentence that what they asked should happen
  rationale: The verse describes Pilate's formal judicial approval of the crowd's
    will. The chosen rendering preserves that legal sense in readable modern English
    without importing extra doctrinal or historical claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
