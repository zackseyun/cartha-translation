id: LUK.23.24
reference: Luke 23:24
source:
  edition: SBLGNT
  text: ⸀καὶ Πιλᾶτος ἐπέκρινεν γενέσθαι τὸ αἴτημα αὐτῶν·
translation:
  text: And Pilate decided that their demand should be granted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Pilate gave judgment that their request should be carried
      out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard connective linking this verdict to the preceding scene. 'And'
    preserves the narrative flow without adding temporal nuance not explicit in the
    Greek.
- source_word: Πιλᾶτος
  chosen: Pilate
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: ἐπέκρινεν
  chosen: decided
  alternatives:
  - gave judgment
  - passed sentence
  - ruled
  lexicon: BDAG
  rationale: The verb ἐπικρίνω here denotes issuing a judicial decision. 'Decided'
    is clear modern English and fits optimal equivalence; 'gave judgment' is more
    formal, while 'passed sentence' could over-specify penal sentencing rather than
    the broader judicial ruling in favor of the crowd's request.
- source_word: γενέσθαι
  chosen: should be granted
  alternatives:
  - should happen
  - should take place
  - be done
  lexicon: BDAG
  rationale: As the complementary infinitive with ἐπέκρινεν, γενέσθαι expresses that
    the requested outcome was to come about. In idiomatic English legal context, 'should
    be granted' best conveys the sense of authorizing the request's fulfillment, rather
    than the more wooden 'should happen.'
- source_word: τὸ αἴτημα
  chosen: their demand
  alternatives:
  - their request
  - their petition
  lexicon: BDAG
  rationale: αἴτημα means a request, demand, or petition. Given the hostile pressure
    of the crowd in context, 'demand' better reflects the force of what they were
    pressing Pilate to do, while remaining within the lexical range.
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: Genitive plural possessive referring to the accusers/crowd and leaders
    whose request Pilate approved.
