id: LUK.23.40
reference: Luke 23:40
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ ἕτερος ⸂ἐπιτιμῶν αὐτῷ ἔφη⸃· Οὐδὲ φοβῇ σὺ τὸν θεόν, ὅτι ἐν
    τῷ αὐτῷ κρίματι εἶ;
translation:
  text: But the other answered, rebuking him, “Do you not even fear God, since you
    are under the same sentence?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “under the same condemnation” or “in the same judgment.” The Greek κρίμα
      can denote judgment, verdict, or sentence; here it refers to the shared penal
      outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces direct speech with
    the sense 'answered' or 'replied.' 'Answered' is idiomatic and concise in English
    narrative style.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks mild contrast between the two criminals' responses. 'But'
    best brings out the adversative force in context.
- source_word: ὁ ἕτερος
  chosen: the other
  alternatives:
  - the other one
  lexicon: BDAG
  rationale: ἕτερος distinguishes the second criminal from the first. 'The other'
    is the natural English rendering.
- source_word: ἐπιτιμῶν αὐτῷ
  chosen: rebuking him
  alternatives:
  - reproving him
  - warning him sharply
  lexicon: BDAG
  rationale: The present participle conveys attendant manner as he speaks. ἐπιτιμάω
    regularly means 'rebuke' or 'reprove'; 'rebuking him' preserves both tone and
    syntax.
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  lexicon: BDAG
  rationale: φημί in narrative often functions as a simple speech introducer. 'Said'
    is the most natural English equivalent here.
- source_word: Οὐδὲ
  chosen: not even
  alternatives:
  - not at all even
  lexicon: BDAG
  rationale: 'οὐδέ adds an emphatic ''not even,'' heightening the rebuke: despite
    their situation, the man still lacks fear of God.'
- source_word: φοβῇ
  chosen: fear
  alternatives:
  - revere
  lexicon: BDAG
  rationale: φοβέομαι with τὸν θεόν in this moral context refers to fearing God in
    the sense of reverent accountability. 'Fear' preserves the direct lexical force
    better than the interpretive 'revere.'
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can convey this
    adequately within the rhetorical question without special formatting.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. No article is needed in English.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - seeing that
  lexicon: BDAG
  rationale: Here ὅτι introduces the ground for the rebuke. 'Since' reads naturally
    and clearly expresses causal force.
- source_word: ἐν τῷ αὐτῷ κρίματι
  chosen: under the same sentence
  alternatives:
  - in the same judgment
  - under the same condemnation
  lexicon: BDAG
  rationale: κρίμα can mean judgment, verdict, or sentence. In this crucifixion context,
    the focus is the penal sentence both men share. 'Under the same sentence' is clear
    modern English and fits the legal setting.
- source_word: εἶ
  chosen: you are
  lexicon: BDAG
  rationale: Present indicative of εἰμί, rendered straightforwardly.
