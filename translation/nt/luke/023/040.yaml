theological_decisions:
- issue: Meaning of fear of God in the rebuke
  chosen_reading: Rendered as 'fear God' without softening to 'respect' or expanding
    into doctrinal language.
  alternative_readings:
  - revere God
  - have no respect for God
  rationale: The text itself states a moral-religious rebuke grounded in divine accountability.
    Preserving 'fear God' maintains the biblical idiom and theological weight without
    importing a fuller doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
