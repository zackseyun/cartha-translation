id: LUK.23.1
reference: Luke 23:1
source:
  edition: SBLGNT
  text: Καὶ ἀναστὰν ἅπαν τὸ πλῆθος αὐτῶν ἤγαγον αὐτὸν ἐπὶ τὸν Πιλᾶτον.
translation:
  text: And the whole assembly of them rose and led him to Pilate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole multitude of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next event in sequence; 'And' preserves
    Luke's narrative flow without adding interpretive force.
- source_word: ἀναστὰν
  chosen: rose
  alternatives:
  - having risen
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, functioning adverbially before the main
    verb. 'Rose' gives natural English while preserving the action preceding 'led.'
    'Having risen' is more formally precise but less readable.
- source_word: ἅπαν τὸ πλῆθος αὐτῶν
  chosen: the whole assembly of them
  alternatives:
  - their whole multitude
  - the whole crowd of them
  - all their company
  lexicon: BDAG
  rationale: πλῆθος denotes a multitude/group; in this judicial context 'assembly'
    captures the gathered body more naturally than 'multitude' while retaining collective
    force. ἅπαν intensifies totality as 'the whole.' αὐτῶν is retained with 'of them'
    to reflect the genitive rather than smoothing it away entirely.
- source_word: ἤγαγον
  chosen: led
  alternatives:
  - brought
  - took
  lexicon: BDAG
  rationale: Aorist of ἄγω commonly means 'lead' or 'bring.' 'Led' fits the direct
    object plus destination and preserves the sense of escorting Jesus under custody.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronoun rendering.
- source_word: ἐπὶ τὸν Πιλᾶτον
  chosen: to Pilate
  alternatives:
  - before Pilate
  - to Pilate's presence
  lexicon: BDAG
  rationale: With ἐπί and accusative after a verb of motion, the phrase indicates
    movement toward a person. 'To Pilate' is the most direct and natural English rendering;
    'before Pilate' is interpretive but contextually implied.
- source_word: Πιλᾶτον
  chosen: Pilate
  lexicon: BDAG
  rationale: Personal name transliterated according to the translation philosophy.
