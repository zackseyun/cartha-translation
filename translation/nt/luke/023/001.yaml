theological_decisions:
- issue: Collective subject rendering in a judicial context
  chosen_reading: the whole assembly of them
  alternative_readings:
  - the whole multitude of them
  - the whole company of them
  rationale: The verse describes the gathered body that has just concluded proceedings
    against Jesus. 'Assembly' avoids implying a random crowd while not over-specifying
    an official institution beyond the Greek. No doctrinal issue is at stake, but
    the wording affects how formal the scene appears.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
