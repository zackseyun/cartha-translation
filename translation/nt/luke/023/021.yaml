theological_decisions:
- issue: Rendering the execution demand σταύρου
  chosen_reading: Crucify
  alternative_readings:
  - Execute on a cross
  rationale: The verb σταυρόω specifically denotes crucifixion/cross-execution. 'Crucify'
    is the established and precise English equivalent and does not import extra theological
    interpretation beyond the lexical sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
