id: LUK.23.21
reference: Luke 23:21
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπεφώνουν λέγοντες· ⸂Σταύρου σταύρου⸃ αὐτόν.
translation:
  text: But they kept shouting, saying, “Crucify, crucify him!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “Execute him on a cross, execute him on a cross.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - But those people
  - And they
  lexicon: BDAG
  rationale: οἱ functions substantivally, referring back to the crowd/opponents in
    context; δέ is best rendered as a mild adversative/continuative, here 'But' to
    mark contrast with the preceding speech.
- source_word: ἐπεφώνουν
  chosen: kept shouting
  alternatives:
  - were shouting
  - cried out
  - kept calling out
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action. The compound verb
    ἐπιφωνέω conveys loud calling or shouting; 'kept shouting' captures both force
    and iterative/imperfect aspect in natural English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - crying out
  - and saying
  lexicon: BDAG
  rationale: The participle is contemporaneous with ἐπεφώνουν and introduces the content
    of the shout. 'Saying' is sufficiently literal and idiomatic in English.
- source_word: Σταύρου σταύρου
  chosen: Crucify, crucify
  alternatives:
  - Crucify him, crucify him
  - Execute him on a cross, execute him on a cross
  lexicon: BDAG
  rationale: Second-person singular present active imperative, repeated for urgency
    and mob insistence. English imperative 'Crucify' preserves the directness and
    rhetorical repetition. Expanding to 'execute him on a cross' is more explanatory
    than the Greek wording warrants.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - this man
  lexicon: BDAG
  rationale: Simple accusative pronoun object of the imperative; 'him' is the direct
    and natural rendering.
