theological_decisions:
- issue: Rendering of Κρανίον
  chosen_reading: Skull
  alternative_readings:
  - the Skull
  - Cranium
  rationale: This is a place-name formed from a common noun. Per translation philosophy,
    titles are translated and names transliterated; here the semantic content is important
    and traditionally reflected in translation. 'Skull' preserves the meaning without
    importing later traditional forms from parallel passages.
  doctrine_reference: Translation philosophy §2
- issue: Description of the two men crucified with Jesus
  chosen_reading: criminals
  alternative_readings:
  - evildoers
  - malefactors
  rationale: Luke's κακοῦργοι is broader than 'robbers' or 'rebels' used in some other
    passages/traditions. Rendering it as 'criminals' avoids harmonizing Luke with
    other Gospel terminology and preserves original-language primacy.
  doctrine_reference: Translation philosophy §1
