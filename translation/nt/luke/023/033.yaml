id: LUK.23.33
reference: Luke 23:33
source:
  edition: SBLGNT
  text: καὶ ὅτε ⸀ἦλθον ἐπὶ τὸν τόπον τὸν καλούμενον Κρανίον, ἐκεῖ ἐσταύρωσαν αὐτὸν
    καὶ τοὺς κακούργους, ὃν μὲν ἐκ δεξιῶν ὃν δὲ ἐξ ἀριστερῶν.
translation:
  text: And when they came to the place called Skull, there they crucified him and
    the criminals, one on the right and one on the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'called the Skull.' The Greek place designation Κρανίον literally means
      'skull.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'one from the right and one from the left.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is naturally rendered 'came' in narrative English;
    'arrived' is possible but less idiomatic here.
- source_word: ἐπὶ τὸν τόπον
  chosen: to the place
  alternatives:
  - at the place
  lexicon: BDAG
  rationale: With motion verb ἦλθον, ἐπί + accusative is best rendered directionally
    as 'to the place,' though the resulting state is arrival at it.
- source_word: τὸν καλούμενον Κρανίον
  chosen: called Skull
  alternatives:
  - called the Skull
  - called Cranium
  lexicon: BDAG
  rationale: κρανίον means 'skull.' Translating the common noun preserves meaning
    better than transliterating. The article is not required in English apposition
    after 'place called.'
- source_word: ἐσταύρωσαν
  chosen: they crucified
  alternatives:
  - they nailed to a cross
  lexicon: BDAG
  rationale: The standard and precise rendering of σταυρόω is 'crucify.' A more expansive
    gloss would add interpretive detail not explicit in the verb itself.
- source_word: κακούργους
  chosen: criminals
  alternatives:
  - evildoers
  - wrongdoers
  - malefactors
  lexicon: BDAG
  rationale: κακοῦργος denotes criminals or evildoers. 'Criminals' is clear, modern,
    and contextually apt, avoiding the archaic 'malefactors.'
- source_word: ὃν μὲν ἐκ δεξιῶν ὃν δὲ ἐξ ἀριστερῶν
  chosen: one on the right and one on the left
  alternatives:
  - one at his right and one at his left
  lexicon: BDAG
  rationale: The correlative construction distributes the two criminals by position.
    English idiom prefers 'one on the right and one on the left.' Adding 'his' is
    contextually implied but not explicit in the Greek, so it is omitted in the main
    text.
