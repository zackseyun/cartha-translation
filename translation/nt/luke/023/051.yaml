theological_decisions:
- issue: Nature of Joseph's dissociation from the Sanhedrin's role in Jesus' death
  chosen_reading: Render the text as Joseph not agreeing with their plan and action,
    without expanding it into a broader doctrinal statement.
  alternative_readings:
  - Joseph did not vote for their decision
  - Joseph did not approve of their counsel and deed
  rationale: The Greek states his non-participation/non-consent in relation to their
    βουλή and πρᾶξις. It does not explicitly specify voting procedure, so the translation
    avoids importing a narrower historical reconstruction while still making his dissociation
    clear.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
