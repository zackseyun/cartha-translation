id: LUK.23.51
reference: Luke 23:51
source:
  edition: SBLGNT
  text: οὗτος οὐκ ἦν συγκατατεθειμένος τῇ βουλῇ καὶ τῇ πράξει αὐτῶν— ἀπὸ Ἁριμαθαίας
    πόλεως τῶν Ἰουδαίων, ὃς ⸀προσεδέχετο τὴν βασιλείαν τοῦ θεοῦ,
translation:
  text: This man had not agreed with their plan and action—he was from Arimathea,
    a city of the Jews, and he was waiting for the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not consented to their decision and deed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκατατεθειμένος
  chosen: had not agreed
  alternatives:
  - had not consented
  - had not gone along
  lexicon: BDAG
  rationale: The perfect participle with ἦν expresses a settled prior stance of non-consent.
    'Had not agreed' is natural modern English and captures refusal to concur without
    sounding archaic. 'Consented' is possible but slightly more formal.
- source_word: βουλῇ
  chosen: plan
  alternatives:
  - council
  - decision
  - purpose
  lexicon: BDAG
  rationale: Here βουλή refers to the leaders' deliberative resolve rather than the
    governing body itself. 'Plan' communicates the content of their counsel in clear
    English. 'Council' could be misread as the institution rather than the decision.
- source_word: πράξει
  chosen: action
  alternatives:
  - deed
  - act
  lexicon: BDAG
  rationale: Paired with βουλή, πρᾶξις points to what they actually did. 'Action'
    preserves the distinction between their intention/decision and its execution.
- source_word: ἀπὸ Ἁριμαθαίας πόλεως τῶν Ἰουδαίων
  chosen: from Arimathea, a city of the Jews
  alternatives:
  - from the Jewish town of Arimathea
  - from Arimathea, a Judean city
  lexicon: BDAG
  rationale: This follows the Greek appositional structure closely. 'Of the Jews'
    is retained rather than paraphrased away, though in English it is smoothed as
    'a city of the Jews.' 'Judean' is possible but less direct and could over-specify
    ethnicity/geography.
- source_word: προσεδέχετο
  chosen: was waiting for
  alternatives:
  - was expecting
  - was looking for
  lexicon: BDAG
  rationale: The imperfect middle denotes an ongoing posture of expectant waiting.
    'Was waiting for' is idiomatic and preserves the durative sense. 'Looking for'
    can sound like active searching rather than hopeful expectation.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''The kingdom of God'' is the standard and clear rendering in Luke,
    preserving both continuity and theological weight. ''Reign of God'' highlights
    dynamic rule but is less idiomatic here.'
- source_word: οὗτος
  chosen: This man
  alternatives:
  - He
  - This one
  lexicon: BDAG
  rationale: The demonstrative resumes Joseph from the previous verse with emphasis.
    'This man' preserves that marked reference better than a simple pronoun while
    remaining natural in English.
