id: LUK.23.12
reference: Luke 23:12
source:
  edition: SBLGNT
  text: ἐγένοντο δὲ φίλοι ὅ τε ⸂Ἡρῴδης καὶ ὁ Πιλᾶτος⸃ ἐν αὐτῇ τῇ ἡμέρᾳ μετ’ ἀλλήλων·
    προϋπῆρχον γὰρ ἐν ἔχθρᾳ ὄντες πρὸς ⸀αὑτούς.
translation:
  text: And Herod and Pilate became friends with each other on that very day, for
    previously they had been in hostility toward one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became friendly with each other.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had previously been at enmity with one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένοντο
  chosen: became
  alternatives:
  - came to be
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι here marks a change of relationship status;
    'became' is the most natural English equivalent.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - friendly
  lexicon: BDAG
  rationale: Predicate nominative plural indicating actual friendship or alliance;
    'friends' is more direct and idiomatic than the adjectival 'friendly.'
- source_word: ὅ τε Ἡρῴδης καὶ ὁ Πιλᾶτος
  chosen: Herod and Pilate
  alternatives:
  - both Herod and Pilate
  lexicon: BDAG
  rationale: The correlative construction marks both parties together. English can
    express this naturally without an explicit 'both,' though that remains a viable
    alternative.
- source_word: ἐν αὐτῇ τῇ ἡμέρᾳ
  chosen: on that very day
  alternatives:
  - on that same day
  - that very day
  lexicon: BDAG
  rationale: The demonstrative with repeated article gives emphasis; 'that very day'
    preserves the stress better than a flatter 'that day.'
- source_word: μετ’ ἀλλήλων
  chosen: with each other
  alternatives:
  - with one another
  lexicon: BDAG
  rationale: Reciprocal sense is explicit; 'with each other' is clear modern English.
- source_word: προϋπῆρχον
  chosen: previously they had been
  alternatives:
  - they had formerly been
  - they were previously
  lexicon: BDAG
  rationale: Imperfect of προϋπάρχω indicates a prior ongoing state. 'Previously they
    had been' captures the temporal contrast with the friendship formed that day.
- source_word: ἐν ἔχθρᾳ
  chosen: in hostility
  alternatives:
  - at enmity
  - in enmity
  lexicon: BDAG
  rationale: ἔχθρα denotes hostility/enmity. 'In hostility' is natural modern English
    while preserving the relational antagonism. 'At enmity' is possible but slightly
    more idiomatic/traditional.
- source_word: ὄντες
  chosen: had been
  alternatives:
  - being
  lexicon: BDAG
  rationale: The participle is folded into smooth English with the finite verb phrase
    'had been,' preserving the sense without awkwardness.
- source_word: πρὸς αὑτούς
  chosen: toward one another
  alternatives:
  - with each other
  - against each other
  lexicon: BDAG
  rationale: The reflexive/reciprocal sense in context is mutual hostility. 'Toward
    one another' preserves the directional force of πρός while sounding natural in
    English.
