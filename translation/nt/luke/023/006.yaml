id: LUK.23.6
reference: Luke 23:6
source:
  edition: SBLGNT
  text: Πιλᾶτος δὲ ⸀ἀκούσας ἐπηρώτησεν εἰ ὁ ἄνθρωπος Γαλιλαῖός ἐστιν,
translation:
  text: But Pilate, hearing this, asked whether the man was a Galilean,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'having heard, he asked if the man is a Galilean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Standard transliteration of the personal name into English, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild development or contrast in the narrative. 'But' fits
    the immediate narrative turn as Pilate responds to what he has just heard.
- source_word: ἀκούσας
  chosen: hearing this
  alternatives:
  - having heard
  - when he heard
  lexicon: BDAG
  rationale: Aorist active participle modifying Pilate. 'Hearing this' is natural
    English and captures the participial sense in context. 'This' is supplied idiomatically
    from the discourse context, since English commonly requires an object where Greek
    can leave it implicit.
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - inquired
  - questioned
  lexicon: BDAG
  rationale: The verb means to ask or inquire. 'Asked' is the most natural and direct
    rendering in modern English.
- source_word: εἰ
  chosen: whether
  alternatives:
  - if
  lexicon: BDAG
  rationale: Introduces an indirect question after 'asked'; in English, 'whether'
    is more idiomatic than 'if' in this construction.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - this man
  lexicon: BDAG
  rationale: Literally 'the man.' In context it refers to Jesus, but the Greek expression
    itself is not demonstrative. 'The man' preserves the wording without adding emphasis
    not present in the source.
- source_word: Γαλιλαῖός
  chosen: a Galilean
  alternatives:
  - from Galilee
  lexicon: BDAG
  rationale: The adjective used predicatively denotes regional identity. 'A Galilean'
    is the most straightforward English equivalent.
- source_word: ἐστιν
  chosen: was
  alternatives:
  - is
  lexicon: BDAG
  rationale: Although the Greek present is 'is,' English commonly backshifts to 'was'
    in indirect discourse after a past-tense reporting verb ('asked whether'). This
    is an optimal-equivalence choice for natural English without changing the sense.
