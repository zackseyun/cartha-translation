theological_decisions:
- issue: Rendering Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase is clearly titular, not name-like. Following the doctrine's
    contested-terms guidance, the title is translated to preserve its messianic meaning
    in context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → ''Messiah'' (where
    title; Christ where name-like)'
- issue: Force of ὁ ἐκλεκτός
  chosen_reading: the Chosen One
  alternative_readings:
  - the Elect One
  rationale: The text presents a christological title used mockingly by the rulers.
    'Chosen One' preserves the theological weight while remaining accessible modern
    English, without importing additional doctrinal interpretation beyond the title
    itself.
  doctrine_reference: 'DOCTRINE.md: Readable modern English; preserve theological
    tension rather than resolve it'
