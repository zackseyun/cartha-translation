id: LUK.23.35
reference: Luke 23:35
source:
  edition: SBLGNT
  text: καὶ εἱστήκει ὁ λαὸς θεωρῶν. ἐξεμυκτήριζον δὲ καὶ οἱ ⸀ἄρχοντες λέγοντες· Ἄλλους
    ἔσωσεν, σωσάτω ἑαυτόν, εἰ οὗτός ἐστιν ὁ χριστὸς ⸂τοῦ θεοῦ, ὁ⸃ ἐκλεκτός.
translation:
  text: And the people stood watching. But even the rulers were mocking him, saying,
    “He saved others; let him save himself, if this is God’s Messiah, the Chosen One.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ of God, the Elect One.”
    reason: alternative_reading
lexical_decisions:
- source_word: εἱστήκει
  chosen: stood
  alternatives:
  - was standing
  - had stood
  lexicon: BDAG
  rationale: Imperfect/pluperfect-form verb from ἵστημι here conveys a stative scene-setting
    sense. 'Stood' is natural English and preserves the posture without overcomplicating
    the aspect.
- source_word: θεωρῶν
  chosen: watching
  alternatives:
  - looking on
  - observing
  lexicon: BDAG
  rationale: The participle describes the people's ongoing visual attention. 'Watching'
    is idiomatic modern English and fits the durative sense.
- source_word: ἐξεμυκτήριζον
  chosen: were mocking him
  alternatives:
  - were ridiculing him
  - were sneering at him
  lexicon: BDAG
  rationale: The verb denotes derisive mockery or sneering. 'Were mocking him' is
    clear, natural, and captures the hostile contempt; 'him' is supplied from context
    in English.
- source_word: ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the authorities
  lexicon: BDAG
  rationale: In Luke this commonly refers to ruling authorities, especially Jewish
    leaders in context. 'Rulers' is a straightforward and sufficiently formal rendering.
- source_word: Ἄλλους ἔσωσεν
  chosen: He saved others
  alternatives:
  - He rescued others
  lexicon: BDAG
  rationale: σῴζω can mean save/rescue, but 'saved' preserves the verbal repetition
    with σωσάτω and allows the irony of the taunt to remain visible.
- source_word: σωσάτω ἑαυτόν
  chosen: let him save himself
  alternatives:
  - let him rescue himself
  lexicon: BDAG
  rationale: The aorist imperative is well represented by 'let him save himself.'
    Keeping 'save' matches the previous clause and preserves the rhetorical force.
- source_word: εἰ οὗτός ἐστιν
  chosen: if this is
  alternatives:
  - if he is
  - if this man is
  lexicon: BDAG
  rationale: οὗτός is demonstrative and slightly contemptuous in this setting. 'This
    is' preserves the demonstrative force better than simply 'he is,' while remaining
    natural in direct speech.
- source_word: ὁ χριστὸς τοῦ θεοῦ
  chosen: God’s Messiah
  alternatives:
  - the Messiah of God
  - the Christ of God
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' rather than
    transliterated 'Christ.' The genitive is naturally rendered possessively in English
    as 'God’s Messiah.'
- source_word: ὁ ἐκλεκτός
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: BDAG
  rationale: ἐκλεκτός here functions as a messianic title. 'The Chosen One' is clear
    modern English and preserves titular force better than the less idiomatic 'the
    Elect One.'
