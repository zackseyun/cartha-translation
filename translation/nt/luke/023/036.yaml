id: LUK.23.36
reference: Luke 23:36
source:
  edition: SBLGNT
  text: ⸀ἐνέπαιξαν δὲ αὐτῷ καὶ οἱ στρατιῶται προσερχόμενοι, ⸀ὄξος προσφέροντες αὐτῷ
translation:
  text: The soldiers also mocked him, coming up and offering him sour wine,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vinegar.' The Greek ὄξος refers to sour wine, a common cheap drink;
      traditional English often renders it 'vinegar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  chosen: mocked
  alternatives:
  - ridiculed
  - made fun of
  lexicon: BDAG
  rationale: The aorist verb ἐμπαίζω denotes mocking or deriding in a hostile sense.
    'Mocked' is the most natural modern English equivalent and preserves the contemptuous
    action without sounding trivial.
- source_word: δὲ
  chosen: also
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks continuation, while καί with the subject adds the soldiers
    to the group already mocking Jesus. Rendering the combined discourse effect as
    'also' communicates that the soldiers joined in as well.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Simple dative object referring to Jesus; 'him' is the natural English
    rendering.
- source_word: οἱ στρατιῶται
  chosen: the soldiers
  alternatives:
  - the troops
  lexicon: BDAG
  rationale: στρατιῶται refers to soldiers. 'The soldiers' is standard, clear, and
    contextually appropriate for the Roman execution scene.
- source_word: προσερχόμενοι
  chosen: coming up
  alternatives:
  - approaching
  - coming near
  lexicon: BDAG
  rationale: The participle describes their movement toward Jesus. 'Coming up' is
    idiomatic modern English and fits the narrative action better than the more formal
    'approaching,' while preserving the participial sense.
- source_word: ὄξος
  chosen: sour wine
  alternatives:
  - vinegar
  - wine vinegar
  lexicon: BDAG
  rationale: ὄξος denotes sour wine, the common diluted acidic drink of soldiers.
    'Sour wine' is more precise than the traditional 'vinegar,' which can mislead
    modern readers into thinking of a condiment rather than a drink.
- source_word: προσφέροντες
  chosen: offering
  alternatives:
  - bringing
  - presenting
  lexicon: BDAG
  rationale: The participle indicates they were offering the drink to him. 'Offering'
    best captures both the action and the narrative irony in context.
