id: LUK.23.42
reference: Luke 23:42
source:
  edition: SBLGNT
  text: καὶ ⸀ἔλεγεν· Ἰησοῦ, μνήσθητί ⸀μου ὅταν ἔλθῃς ⸂ἐν τῇ βασιλείᾳ⸃ σου.
translation:
  text: And he said, “Jesus, remember me when you come into your kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when you come in your kingdom.” Some manuscripts read “into your kingdom”
      more explicitly, while the SBLGNT text reads “in your kingdom.”
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple narrative coordination without
    adding interpretive force.
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: Imperfect of λέγω can be rendered progressively ('was saying'), but in
    English narrative this often functions idiomatically as simple past. 'He said'
    is more natural while preserving the speech introduction.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Vocative singular of the personal name Ἰησοῦς. Per translation philosophy,
    names are transliterated rather than translated.
- source_word: μνήσθητί
  chosen: remember
  alternatives:
  - remember favorably
  - keep in mind
  lexicon: BDAG
  rationale: Aorist middle imperative of μιμνῄσκομαι. 'Remember' is the natural direct
    English equivalent and in prayer/request contexts can imply acting with regard
    for the person remembered without overtranslating that implication into the main
    text.
- source_word: μου
  chosen: me
  lexicon: BDAG
  rationale: Genitive pronoun dependent on μνήσθητί in the idiom 'remember me.' English
    requires the object form 'me.'
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the subjunctive ἔλθῃς, ὅταν introduces a future contingency. 'When'
    is the most idiomatic English rendering in this context.
- source_word: ἔλθῃς
  chosen: you come
  alternatives:
  - you arrive
  lexicon: BDAG
  rationale: Aorist subjunctive of ἔρχομαι following ὅταν. 'You come' preserves the
    straightforward motion sense and fits the eschatological request.
- source_word: ἐν τῇ βασιλείᾳ σου
  chosen: into your kingdom
  alternatives:
  - in your kingdom
  - with your kingdom
  lexicon: BDAG
  rationale: Although ἐν commonly means 'in,' with verbs of coming and βασιλεία this
    phrase can be understood as entry into or arrival in royal reign. 'Into your kingdom'
    communicates the directional nuance naturally in English. Because many manuscripts
    read εἰς and many translations render 'in your kingdom,' that alternative is preserved
    in a footnote.
- source_word: βασιλείᾳ
  chosen: kingdom
  alternatives:
  - reign
  - royal rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign, rule, or kingdom. Here 'kingdom' is the most
    idiomatic and traditional English rendering, while still allowing the royal and
    eschatological sense to be heard.
