theological_decisions:
- issue: Eschatological nuance of the request to Jesus
  chosen_reading: The speaker asks to be remembered at Jesus' future coming into his
    kingdom, without specifying timing beyond the text.
  alternative_readings:
  - The speaker asks to be remembered when Jesus comes in kingly power
  - The speaker asks to be remembered in the consummated kingdom
  rationale: The verse clearly attributes a future kingdom to Jesus, but it does not
    itself define the chronology or full theological framework. The translation preserves
    that expectation without importing a more detailed eschatological scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
