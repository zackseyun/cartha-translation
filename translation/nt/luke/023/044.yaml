theological_decisions:
- issue: Scope of γῆ in the darkness saying
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The Greek noun permits either a regional or universal sense. To preserve
    theological tension rather than resolve the historical/cosmic scope too strongly,
    the main text uses the more contextually restrained 'land' and the broader alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
