id: LUK.23.44
reference: Luke 23:44
source:
  edition: SBLGNT
  text: ⸂Καὶ ἦν⸃ ⸀ἤδη ὡσεὶ ὥρα ἕκτη καὶ σκότος ἐγένετο ἐφ’ ὅλην τὴν γῆν ἕως ὥρας ἐνάτης
translation:
  text: And it was already about the sixth hour, and darkness came over the whole
    land until the ninth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole earth.' The Greek word γῆ can mean either 'land' or 'earth.'
    reason: alternative_reading
  - marker: b
    text: That is, from about noon until about three in the afternoon.
    reason: cultural_note
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - now
  - by this time
  lexicon: BDAG
  rationale: Marks that this point in the narrative had already been reached; 'already'
    is the most natural modern equivalent here.
- source_word: ὡσεὶ
  chosen: about
  alternatives:
  - approximately
  - around
  lexicon: BDAG
  rationale: Signals approximation rather than exact clock time. 'About' is concise
    and idiomatic in English.
- source_word: ὥρα ἕκτη
  chosen: the sixth hour
  alternatives:
  - noon
  lexicon: BDAG
  rationale: A more formal rendering preserves the source expression and its narrative
    texture. Because ancient hour-counting may be unfamiliar, the idiomatic equivalent
    'noon' is preserved in a footnote rather than substituted into the main text.
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: The standard and most transparent rendering for the noun in this context.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - fell
  - occurred
  - came to be
  lexicon: BDAG
  rationale: With 'darkness' as subject, English idiom prefers 'came' or 'fell.' 'Came'
    preserves the eventive force of γίνομαι without sounding overly interpretive.
- source_word: ἐφ’ ὅλην τὴν γῆν
  chosen: over the whole land
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: BDAG
  rationale: γῆ can mean 'land' or 'earth.' In this passion context, 'land' avoids
    overstating the scope as necessarily global while still allowing readers to understand
    a broad regional darkness. The alternative 'earth' is preserved in a footnote
    because it remains lexically possible.
- source_word: ἕως ὥρας ἐνάτης
  chosen: until the ninth hour
  alternatives:
  - until three in the afternoon
  lexicon: BDAG
  rationale: Retains the source's time expression in the main text for transparency
    and consistency with 'the sixth hour.' The modern-time equivalent is preserved
    in a footnote.
