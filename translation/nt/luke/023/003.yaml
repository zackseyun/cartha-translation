id: LUK.23.3
reference: Luke 23:3
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος ⸀ἠρώτησεν αὐτὸν λέγων· Σὺ εἶ ὁ βασιλεὺς τῶν Ἰουδαίων; ὁ δὲ ἀποκριθεὶς
    αὐτῷ ἔφη· Σὺ λέγεις.
translation:
  text: Then Pilate asked him, saying, “Are you the king of the Jews?” And in answer
    he said to him, “You say so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Judeans.' The Greek term can denote either Jews or Judeans depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'You say it' or 'Yes, it is as you say.' The Greek reply is concise and
      can be understood as a qualified affirmation.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'Then' gives natural English flow in narrative while
    preserving sequence.
- source_word: ἠρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: The aorist of ἐρωτάω here introduces Pilate's direct question. 'Asked'
    is the most natural and sufficiently precise English rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - with the words
  lexicon: BDAG
  rationale: The participle is redundant in idiomatic English but still contributes
    to the discourse structure. Retaining 'saying' keeps the Greek texture without
    sounding overly wooden.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are
  lexicon: BDAG
  rationale: In context this is clearly an interrogative, and English requires inversion
    to express the question naturally.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly denotes a king. 'Ruler' would weaken the royal
    claim under examination.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖος can mean 'Jew' or 'Judean' depending on context. In the passion
    narrative, the charge is the conventional political-religious title 'king of the
    Jews,' so the traditional and contextually fitting rendering is retained, while
    the geographical-ethnic alternative is preserved in a footnote.
- source_word: ἀποκριθεὶς
  chosen: in answer
  alternatives:
  - answering
  - replying
  lexicon: BDAG
  rationale: The participle marks Jesus' response. 'In answer' yields smooth modern
    English while preserving the responsive force.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he replied
  - he declared
  lexicon: BDAG
  rationale: φημί is a common verb of speaking. 'He said' is the most neutral rendering
    and avoids overstating tone.
- source_word: Σὺ λέγεις
  chosen: You say so
  alternatives:
  - You say it
  - You say
  - That is what you say
  lexicon: BDAG
  rationale: 'The expression is elliptical and somewhat indirect. ''You say so'' preserves
    the ambiguity: Jesus does not deny the title, yet he frames it as Pilate''s formulation.
    This best preserves the theological and rhetorical tension without overinterpreting
    it.'
