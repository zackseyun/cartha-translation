theological_decisions:
- issue: Force of Jesus' reply Σὺ λέγεις
  chosen_reading: An intentionally qualified affirmation rendered as 'You say so.'
  alternative_readings:
  - 'A simple affirmation: ''Yes, it is as you say'''
  - 'A distancing repetition: ''You say it'''
  rationale: The Greek is terse and can function as a qualified assent rather than
    an unambiguous bare 'yes.' To preserve the text's tension and avoid importing
    a stronger or weaker christological claim than the wording itself makes, the translation
    keeps the ambiguity in the main text and notes alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
