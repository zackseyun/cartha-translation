id: LUK.23.9
reference: Luke 23:9
source:
  edition: SBLGNT
  text: ἐπηρώτα δὲ αὐτὸν ἐν λόγοις ἱκανοῖς· αὐτὸς δὲ οὐδὲν ἀπεκρίνατο αὐτῷ.
translation:
  text: So he questioned him at considerable length, but he answered him nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with many words' or 'with many questions.' The Greek expression emphasizes
      prolonged verbal questioning.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτα
  chosen: questioned
  alternatives:
  - was questioning
  - kept questioning
  - asked
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Questioned' in English
    can naturally cover this in context, while the following phrase 'at considerable
    length' conveys the sustained nature. 'Asked' is possible but weaker and less
    probing than ἐπερωτάω.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'So' gives natural narrative flow in modern
    English without overstating contrast. The second δέ is represented by 'but' to
    mark the contrast between Herod's questioning and Jesus' silence.
- source_word: ἐν λόγοις ἱκανοῖς
  chosen: at considerable length
  alternatives:
  - with many words
  - with many questions
  - extensively
  lexicon: BDAG
  rationale: Literally, the phrase is 'in sufficient/many words.' In idiomatic English,
    'at considerable length' best captures the sense of prolonged verbal questioning.
    'With many words' is more formal but less natural; 'with many questions' interprets
    λόγοις more narrowly than the Greek states.
- source_word: λόγοις
  chosen: length
  alternatives:
  - words
  - matters
  - questions
  lexicon: BDAG
  rationale: Within the idiom ἐν λόγοις ἱκανοῖς, λόγοις refers to extended speech
    rather than isolated 'words.' Rendering the whole phrase idiomatically avoids
    wooden English while preserving the sense.
- source_word: ἱκανοῖς
  chosen: considerable
  alternatives:
  - many
  - sufficient
  - numerous
  lexicon: BDAG
  rationale: ἱκανός can mean sufficient, considerable, or many depending on context.
    Here it modifies λόγοις in a way that emphasizes quantity/extent. 'Considerable'
    fits the idiom 'at considerable length' and communicates prolonged duration.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is slightly emphatic in Greek, contrasting Jesus with Herod's
    activity. English can convey the contrast adequately with 'but he' without adding
    the heavier 'he himself,' which would sound marked.
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - not anything
  - no answer
  lexicon: BDAG
  rationale: οὐδέν is an accusative of respect/content with ἀπεκρίνατο, meaning he
    answered nothing. 'Nothing' is the most direct and natural rendering.
- source_word: ἀπεκρίνατο
  chosen: answered
  alternatives:
  - replied
  - gave an answer
  lexicon: BDAG
  rationale: A standard rendering for ἀποκρίνομαι. 'Answered' is concise and idiomatic.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative indirect object is naturally rendered in English either explicitly
    or implicitly. 'Answered him nothing' is acceptable modern English and keeps the
    line compact; the indirect object remains clear from context.
