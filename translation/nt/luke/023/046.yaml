id: LUK.23.46
reference: Luke 23:46
source:
  edition: SBLGNT
  text: καὶ φωνήσας φωνῇ μεγάλῃ ὁ Ἰησοῦς εἶπεν· Πάτερ, εἰς χεῖράς σου ⸀παρατίθεμαι
    τὸ πνεῦμά μου. ⸂τοῦτο δὲ⸃ εἰπὼν ἐξέπνευσεν.
translation:
  text: And Jesus, crying out with a loud voice, said, “Father, into your hands I
    commit my spirit.” Having said this, he breathed his last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I entrust my spirit.” The verb can mean to place something in another's
      care.
    reason: lexical_alternative
  - marker: b
    text: 'This saying echoes Psalm 31:5 in the Greek Scriptures: “Into your hands
      I commit my spirit.”'
    reason: cross_reference
  - marker: c
    text: Or “he expired” or simply “he died”; literally, the verb refers to breathing
      out.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας
  chosen: crying out
  alternatives:
  - calling out
  - shouting
  lexicon: BDAG
  rationale: Aorist participle from φωνέω denotes uttering a cry/call. 'Crying out'
    fits the solemn, forceful context and works naturally with the following dative
    phrase.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: Instrumental dative phrase indicating manner. 'With a loud voice' is
    idiomatic English and preserves the emphasis on audibility and strength.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My Father
  lexicon: BDAG
  rationale: Direct vocative address. The possessive 'my' is not present in the Greek
    and should not be added.
- source_word: εἰς χεῖράς σου
  chosen: into your hands
  alternatives:
  - into your hand
  lexicon: BDAG
  rationale: Plural 'hands' is the Greek form and echoes the scriptural idiom from
    Psalm 31:5 LXX, which this saying alludes to.
- source_word: παρατίθεμαι
  chosen: I commit
  alternatives:
  - I entrust
  - I place in trust
  lexicon: BDAG
  rationale: Present middle indicative here expresses entrusting something to another's
    care. 'I commit' preserves the traditional and scripturally resonant sense without
    obscuring the personal entrustment implied by the middle voice.
- source_word: τὸ πνεῦμά μου
  chosen: my spirit
  alternatives:
  - my breath
  - my life-spirit
  lexicon: BDAG
  rationale: πνεῦμα can denote spirit, breath, or inner life, but in this prayerful
    context 'my spirit' best preserves both the lexical range and the theological
    weight of Jesus entrusting himself to the Father.
- source_word: τοῦτο δὲ εἰπών
  chosen: Having said this
  alternatives:
  - And after saying this
  - When he had said this
  lexicon: BDAG
  rationale: Aorist participle construction marking action prior to the main verb.
    'Having said this' is concise and natural.
- source_word: ἐξέπνευσεν
  chosen: he breathed his last
  alternatives:
  - he expired
  - he died
  lexicon: BDAG
  rationale: The verb literally relates to breathing out, and idiomatically refers
    to death. 'He breathed his last' preserves the imagery and is clear modern English.
