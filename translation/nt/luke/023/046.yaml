theological_decisions:
- issue: Rendering of πνεῦμά μου in Jesus' final saying
  chosen_reading: my spirit
  alternative_readings:
  - my breath
  rationale: The immediate context is Jesus' conscious address to the Father and intentional
    entrusting of himself, which favors 'spirit' over a merely physiological 'breath.'
    This preserves the text's theological depth without importing later doctrinal
    formulations beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Verbal aspect of παρατίθεμαι
  chosen_reading: I commit
  alternative_readings:
  - I am committing
  - I entrust
  rationale: Although the Greek form is present middle, in this solemn utterance English
    simple present best conveys a performative declaration. This avoids awkwardness
    while preserving the force of Jesus' intentional self-entrustment.
  doctrine_reference: Optimal equivalence; readable modern English, not archaic or
    academic.
