theological_decisions:
- issue: Meaning of ἐκλιπόντος with reference to the sun
  chosen_reading: Rendered non-technically as 'the sun having failed' rather than
    specifying an eclipse.
  alternative_readings:
  - the sun was darkened
  - the sun was eclipsed
  rationale: The verse describes cosmic darkness at Jesus' death, but the Greek verb
    does not require a technical astronomical reading. A non-technical rendering preserves
    the event described by Luke without importing a scientific explanation the text
    itself does not explicitly make.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering καταπέτασμα
  chosen_reading: Rendered as 'curtain' in the main text.
  alternative_readings:
  - veil
  rationale: The event is the tearing of the temple divider, a theologically significant
    sign, but the translation should use accessible modern English unless the source
    demands traditional ecclesiastical wording. 'Curtain' preserves meaning without
    diminishing significance; the traditional 'veil' is preserved in a footnote.
  doctrine_reference: Translation philosophy §6
