id: LUK.23.45
reference: Luke 23:45
source:
  edition: SBLGNT
  text: ⸂τοῦ ἡλίου ἐκλιπόντος⸃, ἐσχίσθη ⸀δὲ τὸ καταπέτασμα τοῦ ναοῦ μέσον.
translation:
  text: the sun having failed, and the curtain of the temple was torn in the middle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sun being darkened.' Some translate more specifically, 'the sun
      eclipsed,' but that is more interpretive than the Greek requires.
    reason: alternative_reading
  - marker: b
    text: Or, 'the veil of the temple.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'was torn down the middle' or 'was torn in two.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ἡλίου ἐκλιπόντος
  chosen: the sun having failed
  alternatives:
  - the sun being darkened
  - the sun failing
  - the sun eclipsed
  lexicon: BDAG
  rationale: This genitive absolute is rendered with a participial clause to preserve
    the compressed Greek syntax and the causal/circumstantial force. ἐκλείπω can mean
    fail, cease, or be eclipsed/darkened. 'Having failed' stays close to the lexical
    core without over-specifying an astronomical mechanism. 'The sun being darkened'
    is smoother English and contextually plausible, but it shifts from the verb's
    basic sense to an interpretive result; 'eclipsed' is too specific.
- source_word: ἐσχίσθη
  chosen: was torn
  alternatives:
  - was split
  - was torn apart
  lexicon: BDAG
  rationale: Passive aorist of σχίζω, naturally rendered 'was torn.' This is the standard
    and clearest English equivalent for the rending of fabric. 'Was split' is possible
    but less idiomatic for a curtain.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  - ''
  lexicon: BDAG
  rationale: δέ here functions as a mild connective. 'And' gives natural English linkage
    to the preceding circumstantial clause without implying strong contrast. It is
    not necessary to represent it with a heavier adversative.
- source_word: τὸ καταπέτασμα
  chosen: the curtain
  alternatives:
  - the veil
  lexicon: BDAG
  rationale: καταπέτασμα refers to the temple curtain/veil. 'Curtain' is preferred
    as readable modern English and avoids ecclesiastical archaism, while still accurately
    denoting a hanging divider. 'Veil' is preserved as a traditional alternative in
    a footnote.
- source_word: τοῦ ναοῦ
  chosen: of the temple
  alternatives:
  - of the sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple proper rather than the broader temple
    complex. 'Temple' is the most natural and recognizable English rendering here;
    'sanctuary' is more precise in some contexts but less idiomatic in this collocation.
    The specific cultic nuance is noted by the lexical alternative.
- source_word: μέσον
  chosen: in the middle
  alternatives:
  - down the middle
  - in two
  lexicon: BDAG
  rationale: μέσον here indicates the location or manner of the tearing. 'In the middle'
    is a direct rendering. 'Down the middle' is idiomatic and vivid but slightly more
    interpretive; 'in two' reflects the likely result but is not the exact wording.
