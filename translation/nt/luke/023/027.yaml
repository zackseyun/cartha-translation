id: LUK.23.27
reference: Luke 23:27
source:
  edition: SBLGNT
  text: Ἠκολούθει δὲ αὐτῷ πολὺ πλῆθος τοῦ λαοῦ καὶ γυναικῶν ⸀αἳ ἐκόπτοντο καὶ ἐθρήνουν
    αὐτόν.
translation:
  text: And a large crowd of the people and of women was following him, who were beating
    their breasts and mourning for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'were beating themselves and lamenting him'; the Greek
      likely refers to the customary act of beating the breast in mourning.
    reason: cultural_note
  - marker: b
    text: The relative pronoun 'who' is feminine plural, indicating that the mourning
      actions are specifically attributed to the women.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing action in past time; 'was following'
    preserves the progressive sense better than simple 'followed'.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ here marks narrative continuation. 'And' is natural English and preserves
    the connective force without overtranslating.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - after him
  lexicon: BDAG
  rationale: Dative with ἀκολουθέω means the crowd was following Jesus. English idiom
    prefers direct object 'him' with 'follow'.
- source_word: πολὺ πλῆθος
  chosen: a large crowd
  alternatives:
  - a great multitude
  - a large multitude
  lexicon: BDAG
  rationale: The phrase denotes a sizable mass of people. 'A large crowd' is natural
    modern English and fits optimal equivalence better than the more traditional but
    less current 'great multitude'.
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the populace
  - of the crowd
  lexicon: BDAG
  rationale: λαός commonly means 'people.' The genitive is retained with 'of the people,'
    distinguishing this group from the women also mentioned.
- source_word: γυναικῶν
  chosen: and of women
  alternatives:
  - and women
  lexicon: BDAG
  rationale: The genitive coordinates with τοῦ λαοῦ under πλῆθος. Rendering 'and of
    women' preserves the structure and makes clear that women formed a notable part
    of the following crowd.
- source_word: αἳ
  chosen: who
  alternatives:
  - and they
  lexicon: BDAG
  rationale: The feminine plural relative pronoun most naturally refers to 'women,'
    not to the whole mixed crowd. 'Who' preserves that the lamenting actions are specifically
    attributed to the women.
- source_word: ἐκόπτοντο
  chosen: were beating their breasts
  alternatives:
  - were beating themselves
  - were wailing
  lexicon: BDAG
  rationale: In mourning contexts κόπτομαι can refer idiomatically to beating one's
    breast as a sign of grief. This makes the cultural action explicit in clear English
    rather than leaving the more opaque literal 'were beating themselves.'
- source_word: ἐθρήνουν
  chosen: mourning
  alternatives:
  - lamenting
  - wailing
  lexicon: BDAG
  rationale: θρηνέω denotes lamenting or mourning, often in audible grief. 'Mourning'
    is accessible modern English; 'lamenting' is possible but slightly less natural
    here.
- source_word: αὐτόν
  chosen: for him
  alternatives:
  - him
  - over him
  lexicon: BDAG
  rationale: With verbs of lament in English, 'mourning for him' communicates the
    object of grief idiomatically. 'Over him' is also possible, but 'for him' is more
    natural in contemporary English.
