id: LUK.23.19
reference: Luke 23:19
source:
  edition: SBLGNT
  text: ὅστις ἦν διὰ στάσιν τινὰ γενομένην ἐν τῇ πόλει καὶ φόνον ⸂βληθεὶς ἐν τῇ φυλακῇ⸃.
translation:
  text: who had been thrown into prison because of a certain uprising that had taken
    place in the city, and for murder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'insurrection.' The Greek στάσις can denote a revolt, uprising, or insurrection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: who
  alternatives:
  - the man who
  - whoever
  lexicon: BDAG
  rationale: In context this relative pronoun refers back to Barabbas specifically,
    so simple 'who' is the most natural English rendering.
- source_word: διὰ
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: BDAG
  rationale: With the accusative it expresses reason/cause here; 'because of' clearly
    conveys the causal sense in modern English.
- source_word: στάσιν
  chosen: uprising
  alternatives:
  - insurrection
  - riot
  - rebellion
  lexicon: BDAG
  rationale: στάσις here denotes a violent civic disturbance or revolt. 'Uprising'
    is readable modern English and preserves the political-revolutionary sense without
    sounding overly technical. 'Insurrection' is viable but less natural for the target
    audience.
- source_word: τινὰ
  chosen: a certain
  alternatives:
  - some
  lexicon: BDAG
  rationale: The indefinite τις adds nonspecificity. 'A certain' preserves that nuance
    more formally; it also matches the Greek word order and emphasis better than simply
    omitting it.
- source_word: γενομένην ἐν τῇ πόλει
  chosen: that had taken place in the city
  alternatives:
  - that had happened in the city
  - in the city
  lexicon: BDAG
  rationale: The participle γενομένην modifies στάσιν and is best made explicit in
    English with a relative clause. 'Had taken place' is idiomatic and preserves the
    eventive sense. 'In the city' is retained rather than specifying Jerusalem, since
    the Greek leaves it implicit.
- source_word: φόνον
  chosen: murder
  alternatives:
  - killing
  lexicon: BDAG
  rationale: φόνος denotes murder/homicide, not merely killing in general. 'Murder'
    best captures the criminal sense in this judicial context.
- source_word: βληθεὶς ἐν τῇ φυλακῇ
  chosen: had been thrown into prison
  alternatives:
  - had been put in prison
  - had been cast into prison
  - was in prison
  lexicon: BDAG
  rationale: The aorist passive participle of βάλλω literally means 'having been thrown'
    and idiomatically refers to being put into prison. 'Thrown into prison' preserves
    the force of the verb better than the flatter 'put in prison,' while remaining
    natural English.
