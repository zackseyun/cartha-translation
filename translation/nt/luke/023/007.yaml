id: LUK.23.7
reference: Luke 23:7
source:
  edition: SBLGNT
  text: καὶ ἐπιγνοὺς ὅτι ἐκ τῆς ἐξουσίας Ἡρῴδου ἐστὶν ἀνέπεμψεν αὐτὸν πρὸς Ἡρῴδην,
    ὄντα καὶ αὐτὸν ἐν Ἱεροσολύμοις ἐν ταύταις ταῖς ἡμέραις.
translation:
  text: And when he learned that he was under Herod’s jurisdiction, he sent him to
    Herod, who himself was also in Jerusalem in those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “under the authority of Herod.” The Greek expression refers to Herod’s
      governing domain or legal authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοὺς
  chosen: when he learned
  alternatives:
  - having learned
  - when he found out
  - recognizing
  lexicon: BDAG
  rationale: Aorist participle of ἐπιγινώσκω indicating prior action relative to the
    main verb. 'When he learned' gives natural English temporal force without over-literalness.
- source_word: ἐκ τῆς ἐξουσίας Ἡρῴδου ἐστὶν
  chosen: he was under Herod’s jurisdiction
  alternatives:
  - he belonged to Herod’s authority
  - he was from Herod’s jurisdiction
  - he was under the authority of Herod
  lexicon: BDAG
  rationale: The idiom with ἐκ + ἐξουσία here refers to administrative domain or legal
    authority, not merely abstract power. 'Under Herod’s jurisdiction' best captures
    the forensic-political sense in context.
- source_word: ἀνέπεμψεν
  chosen: he sent him
  alternatives:
  - he referred him
  - he remanded him
  - he sent him on
  lexicon: BDAG
  rationale: In this judicial context the verb can imply sending up or referring a
    case, but plain 'sent him' is sufficiently accurate and readable. The legal nuance
    is already conveyed by 'under Herod’s jurisdiction.'
- source_word: πρὸς Ἡρῴδην
  chosen: to Herod
  alternatives:
  - over to Herod
  lexicon: BDAG
  rationale: πρός with accusative here marks movement toward a person. 'To Herod'
    is the standard and natural rendering.
- source_word: ὄντα καὶ αὐτὸν
  chosen: who himself was also
  alternatives:
  - he too being
  - who also was himself
  - who was also
  lexicon: BDAG
  rationale: The participial phrase modifies Herod and καὶ αὐτόν adds emphasis that
    Herod too was present there. 'Who himself was also' preserves both the relative
    connection and the emphasis.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard rendering of the place name in English.
- source_word: ἐν ταύταις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  - at that time
  lexicon: BDAG
  rationale: Though literally 'in these days,' in narrative English this deictic expression
    is idiomatically rendered 'in those days' from the narrator’s perspective. This
    avoids awkwardness while preserving temporal reference.
