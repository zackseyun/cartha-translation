theological_decisions:
- issue: Political/legal sense of ἐξουσία in relation to Herod
  chosen_reading: jurisdiction
  alternative_readings:
  - authority
  - domain
  rationale: The verse concerns Pilate's recognition of Herod Antipas's governing
    authority over Jesus's region of origin. 'Jurisdiction' best reflects the legal-administrative
    setting without importing theological meaning into ἐξουσία here.
  doctrine_reference: Translation philosophy §1, §5
