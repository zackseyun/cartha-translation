id: LUK.23.56
reference: Luke 23:56
source:
  edition: SBLGNT
  text: ὑποστρέψασαι δὲ ἡτοίμασαν ἀρώματα καὶ μύρα. Καὶ τὸ μὲν σάββατον ἡσύχασαν κατὰ
    τὴν ἐντολήν,
translation:
  text: Then after returning, they prepared spices and ointments. And on the Sabbath
    they rested according to the commandment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having returned.' The Greek participle indicates action preceding the
      main verb.
    reason: lexical_alternative
  - marker: b
    text: '''Ointments'' may also be rendered ''perfumes'' or ''fragrant oils.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποστρέψασαι
  chosen: after returning
  alternatives:
  - having returned
  - when they returned
  lexicon: BDAG
  rationale: Aorist active participle, nominative feminine plural, referring to the
    women from the previous context. 'After returning' captures the participial action
    antecedent to the main verb in natural English without over-paraphrase.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' conveys the mild continuative
    force in readable English.
- source_word: ἡτοίμασαν
  chosen: they prepared
  alternatives:
  - they made ready
  lexicon: BDAG
  rationale: Standard rendering of ἑτοιμάζω in narrative context; simple and natural
    modern English.
- source_word: ἀρώματα
  chosen: spices
  alternatives:
  - aromatics
  - fragrant spices
  lexicon: BDAG
  rationale: In burial context, ἄρωμα commonly refers to spices/aromatic substances
    used for anointing a body. 'Spices' is the clearest idiomatic rendering.
- source_word: μύρα
  chosen: ointments
  alternatives:
  - perfumes
  - fragrant oils
  - myrrh-based ointments
  lexicon: BDAG
  rationale: μύρον denotes perfumed oil/ointment. 'Ointments' distinguishes it from
    ἀρώματα while fitting the burial-preparation context better than the broader 'perfumes'.
- source_word: τὸ μὲν σάββατον
  chosen: on the Sabbath
  alternatives:
  - during the Sabbath
  - the Sabbath day
  lexicon: BDAG
  rationale: The article with σάββατον is naturally rendered as a temporal expression.
    The particle μέν is lightly transitional here and need not be separately represented
    in English.
- source_word: ἡσύχασαν
  chosen: they rested
  alternatives:
  - they kept quiet
  - they were still
  lexicon: BDAG
  rationale: In Sabbath context, ἡσυχάζω means to rest/cease from activity. 'They
    rested' best matches the contextual sense.
- source_word: κατὰ τὴν ἐντολήν
  chosen: according to the commandment
  alternatives:
  - in accordance with the commandment
  - as the commandment required
  lexicon: BDAG
  rationale: A straightforward rendering preserving the singular ἐντολήν and the sense
    of conformity to the Mosaic command regarding Sabbath rest.
