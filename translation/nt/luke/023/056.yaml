theological_decisions:
- issue: Reference of 'the commandment'
  chosen_reading: the Mosaic commandment concerning Sabbath observance
  alternative_readings:
  - a general divine command
  - their customary rule
  rationale: In context, Luke refers to the Sabbath commandment of the Torah/Decalogue,
    not a vague moral principle. The translation preserves the singular 'the commandment'
    without expanding it interpretively in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing extra doctrinal claims.'
