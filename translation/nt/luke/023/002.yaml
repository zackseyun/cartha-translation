id: LUK.23.2
reference: Luke 23:2
source:
  edition: SBLGNT
  text: ἤρξαντο δὲ κατηγορεῖν αὐτοῦ λέγοντες· Τοῦτον εὕραμεν διαστρέφοντα τὸ ἔθνος
    ⸀ἡμῶν καὶ κωλύοντα ⸂φόρους Καίσαρι⸃ διδόναι ⸀καὶ λέγοντα ⸀αὑτὸν χριστὸν βασιλέα
    εἶναι.
translation:
  text: And they began to accuse him, saying, “We found this man misleading our nation
    and forbidding the payment of taxes to Caesar, and saying that he himself is Messiah,
    a king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “subverting our nation” or “leading our nation astray.”
    reason: lexical_alternative
  - marker: b
    text: Greek φόρους, referring to taxes or tribute paid to the Roman ruler.
    reason: cultural_note
  - marker: c
    text: Or “claiming that he himself is Christ, a king.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with complementary infinitive κατηγορεῖν is naturally
    rendered 'began to accuse,' preserving the ingressive sense.
- source_word: κατηγορεῖν
  chosen: to accuse
  alternatives:
  - to bring charges against
  lexicon: BDAG
  rationale: Standard forensic sense in this trial context; 'accuse' is concise and
    natural.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - against him
  lexicon: BDAG
  rationale: Genitive after κατηγορέω can be represented in English simply by the
    object 'him'; the adversative force is already conveyed by 'accuse.'
- source_word: Τοῦτον
  chosen: this man
  alternatives:
  - this one
  lexicon: BDAG
  rationale: Deictic demonstrative used contemptuously in accusation; 'this man' sounds
    natural in English and preserves the dismissive force better than the bare 'this
    one.'
- source_word: εὕραμεν
  chosen: we found
  alternatives:
  - we discovered
  lexicon: BDAG
  rationale: Simple aorist of finding/discovering; 'we found' matches the legal accusation
    formula.
- source_word: διαστρέφοντα
  chosen: misleading
  alternatives:
  - perverting
  - subverting
  - leading astray
  lexicon: BDAG
  rationale: The participle describes alleged corrupting influence on the people.
    'Misleading' is readable modern English; 'perverting' is archaic-sounding here,
    while 'subverting' may over-specify political rebellion.
- source_word: τὸ ἔθνος ἡμῶν
  chosen: our nation
  alternatives:
  - our people
  lexicon: BDAG
  rationale: ἔθνος can mean nation/people. In this political accusation before Pilate,
    'nation' best fits the public-political sense.
- source_word: κωλύοντα
  chosen: forbidding
  alternatives:
  - preventing
  - hindering
  lexicon: BDAG
  rationale: The charge is framed as prohibition; 'forbidding' best matches the infinitive
    construction and accusation.
- source_word: φόρους Καίσαρι διδόναι
  chosen: the payment of taxes to Caesar
  alternatives:
  - to pay taxes to Caesar
  - tribute to Caesar
  lexicon: BDAG
  rationale: φόρος refers to tribute/tax. 'Taxes' is the clearest modern rendering;
    'the payment of' smooths the infinitive into idiomatic English while preserving
    the sense.
- source_word: λέγοντα
  chosen: saying
  alternatives:
  - claiming
  lexicon: BDAG
  rationale: λέγω is semantically broad; 'saying' stays close to the Greek without
    importing evaluative nuance.
- source_word: αὑτὸν
  chosen: he himself
  alternatives:
  - himself
  lexicon: BDAG
  rationale: The reflexive pronoun is emphatic in the accusation; 'he himself' preserves
    that emphasis.
- source_word: χριστὸν
  chosen: Messiah
  alternatives:
  - Christ
  - anointed one
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title.
    Here it is part of the claim about royal identity, so the titular sense is clear.
- source_word: βασιλέα
  chosen: a king
  alternatives:
  - king
  lexicon: BDAG
  rationale: Anarthrous predicate accusative after εἶναι is naturally rendered 'a
    king' in English. This preserves the accusatory claim of royal pretension without
    overstating it as a formal title.
- source_word: εἶναι
  chosen: is
  alternatives:
  - to be
  lexicon: BDAG
  rationale: In indirect discourse after λέγοντα, English idiom prefers finite 'is'
    rather than infinitival 'to be' in this context.
