theological_decisions:
- issue: Rendering of χριστὸν in a politically charged accusation
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is used as a title, not yet as a name-like designation. Rendering
    it 'Messiah' preserves the Jewish royal-anointed context and aligns with the project's
    contested-terms guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of βασιλέα with χριστόν
  chosen_reading: Messiah, a king
  alternative_readings:
  - the Messiah, the king
  - an anointed king
  rationale: The Greek presents two accusative complements in reported speech. 'Messiah,
    a king' preserves both elements without collapsing them into a single fixed title
    or importing a more developed christological formula than the accusers intend.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it'
