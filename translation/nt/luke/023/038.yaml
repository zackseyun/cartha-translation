id: LUK.23.38
reference: Luke 23:38
source:
  edition: SBLGNT
  text: ἦν δὲ καὶ ⸀ἐπιγραφὴ ἐπ’ ⸀αὐτῷ· Ὁ βασιλεὺς τῶν Ἰουδαίων ⸀οὗτος.
translation:
  text: 'And there was also an inscription over him: “This is the King of the Jews.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sign,” “notice,” or “written charge.”
    reason: lexical_alternative
  - marker: b
    text: Or “above him.”
    reason: lexical_alternative
  - marker: c
    text: Greek is literally “The King of the Jews, this one.”
    reason: lexical_alternative
  - marker: d
    text: “Jews” could in some contexts be rendered “Judeans,” but in this fixed crucifixion
      title the traditional and contextually fitting sense is “Jews.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγραφή
  chosen: inscription
  alternatives:
  - notice
  - written charge
  - sign
  lexicon: BDAG
  rationale: Refers to a written statement posted on or over the crucified person.
    'Inscription' is natural English and preserves the formal sense better than the
    broader 'sign' while avoiding overinterpretation as a legal 'charge' in the main
    text.
- source_word: ἐπ’ αὐτῷ
  chosen: over him
  alternatives:
  - on him
  - above him
  lexicon: BDAG
  rationale: In context of a crucifixion placard, ἐπί with the dative indicates position
    relative to Jesus. 'Over him' is idiomatic and fits the likely placement of the
    inscription.
- source_word: Ὁ βασιλεὺς τῶν Ἰουδαίων οὗτος
  chosen: This is the King of the Jews
  alternatives:
  - The King of the Jews, this man
  - This man is the King of the Jews
  lexicon: BDAG
  rationale: The Greek is verbless and appositional, with οὗτος adding demonstrative
    emphasis. English normally supplies 'is.' This rendering preserves the deictic
    force and matches clear modern English.
- source_word: Ἰουδαίων
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In the fixed title placed over Jesus at the crucifixion, 'King of the
    Jews' is the established and contextually appropriate rendering. 'Judeans' is
    lexically possible in some contexts, but here the title is ethnic-political and
    is best represented by 'Jews'.
- source_word: δὲ καὶ
  chosen: and there was also
  alternatives:
  - now there was also
  - and also there was
  lexicon: BDAG
  rationale: This combination adds a further detail in the narrative. 'And there was
    also' captures both connective and additive force in readable English.
