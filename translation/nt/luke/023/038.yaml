theological_decisions:
- issue: Nature of the crucifixion notice
  chosen_reading: Render the posted text straightforwardly as an inscription identifying
    Jesus as 'the King of the Jews' without adding interpretive commentary about irony,
    accusation, or messianic confession.
  alternative_readings:
  - Translate as a formal legal charge
  - Expand to make explicit the ironic or political force
  rationale: The verse itself reports the existence and wording of the inscription.
    The translation should preserve the wording without importing theological or narrative
    interpretation beyond the Greek text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
