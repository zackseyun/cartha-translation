id: LUK.23.52
reference: Luke 23:52
source:
  edition: SBLGNT
  text: οὗτος προσελθὼν τῷ Πιλάτῳ ᾐτήσατο τὸ σῶμα τοῦ Ἰησοῦ,
translation:
  text: This man went to Pilate and asked for the body of Jesus.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὗτος
  chosen: This man
  alternatives:
  - He
  - This one
  lexicon: BDAG
  rationale: The demonstrative refers back to Joseph of Arimathea in the previous
    verse. 'This man' preserves the anaphoric force more clearly than a bare 'he'
    while remaining natural English. 'This one' is too wooden in this narrative context.
- source_word: προσελθὼν
  chosen: went to
  alternatives:
  - approached
  - came to
  lexicon: BDAG
  rationale: The aorist participle of προσέρχομαι is attendant to the main verb and
    is best rendered idiomatically in English as a finite action preceding the request.
    'Went to' is natural and contextually clear; 'approached' is possible but slightly
    stiffer.
- source_word: τῷ Πιλάτῳ
  chosen: to Pilate
  alternatives:
  - to Pontius Pilate
  lexicon: BDAG
  rationale: The dative with προσέρχομαι marks the person approached. 'Pilate' is
    sufficient because the referent is already established in context; expanding to
    'Pontius Pilate' would add information not present in this verse.
- source_word: ᾐτήσατο
  chosen: asked for
  alternatives:
  - requested
  - asked
  lexicon: BDAG
  rationale: The middle form of αἰτέω here means to ask for or request. 'Asked for'
    naturally takes the direct object 'the body of Jesus' in English and avoids overly
    formal diction.
- source_word: τὸ σῶμα
  chosen: the body
  alternatives:
  - the corpse
  lexicon: BDAG
  rationale: σῶμα literally means 'body.' Although the referent is Jesus' dead body,
    'corpse' would be more interpretive and harsher in tone than the Greek requires.
    'The body' is both accurate and idiomatic.
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - belonging to Jesus
  lexicon: BDAG
  rationale: The genitive is straightforwardly possessive/relational. 'Of Jesus' is
    the natural English rendering and preserves the simplicity of the Greek.
