id: LUK.23.49
reference: Luke 23:49
source:
  edition: SBLGNT
  text: εἱστήκεισαν δὲ πάντες οἱ γνωστοὶ ⸀αὐτῷ ⸀μακρόθεν, καὶ γυναῖκες αἱ ⸀συνακολουθοῦσαι
    αὐτῷ ἀπὸ τῆς Γαλιλαίας, ὁρῶσαι ταῦτα.
translation:
  text: But all those who knew him, and the women who had followed him from Galilee,
    were standing at a distance, watching these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all his acquaintances.' The Greek γνωστοί can denote those known to
      someone, that is, acquaintances or associates.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκεισαν
  chosen: were standing
  alternatives:
  - stood
  lexicon: BDAG
  rationale: Pluperfect/imperfective force of ἵστημι here conveys a continuing posture
    rather than a simple punctiliar act. 'Were standing' preserves the scene-setting
    aspect better than the more static English 'stood.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the immediately preceding
    scene. 'But' suitably signals the shift to the observers at the crucifixion.
- source_word: πάντες οἱ γνωστοὶ αὐτῷ
  chosen: all those who knew him
  alternatives:
  - all his acquaintances
  - all his acquaintances/friends
  lexicon: BDAG
  rationale: γνωστοί can mean 'acquaintances' or 'those known/known ones.' In natural
    English, 'all those who knew him' is clearer and avoids implying a narrower category
    of intimate friendship than the Greek requires.
- source_word: μακρόθεν
  chosen: at a distance
  alternatives:
  - from afar
  - far away
  lexicon: BDAG
  rationale: The adverb denotes spatial distance. 'At a distance' is idiomatic modern
    English and fits the scene naturally.
- source_word: γυναῖκες
  chosen: the women
  alternatives:
  - women
  lexicon: BDAG
  rationale: With the article and participial modifier, the phrase points to a definite
    group already known in the narrative. 'The women' reflects that specificity.
- source_word: συνακολουθοῦσαι αὐτῷ
  chosen: who had followed him
  alternatives:
  - who were following him
  - who accompanied him
  lexicon: BDAG
  rationale: The participle identifies the women by their prior ongoing association
    with Jesus from Galilee. English past perfect 'had followed' naturally conveys
    antecedent action relative to the crucifixion scene.
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: BDAG
  rationale: A straightforward source/origin phrase indicating the region from which
    they had accompanied him.
- source_word: ὁρῶσαι ταῦτα
  chosen: watching these things
  alternatives:
  - seeing these things
  - observing this
  lexicon: BDAG
  rationale: The participle expresses their visual witnessing of the events. 'Watching
    these things' preserves the ongoing observational sense and keeps the plural demonstrative
    ταῦτα explicit.
