id: LUK.23.54
reference: Luke 23:54
source:
  edition: SBLGNT
  text: καὶ ἡμέρα ἦν ⸂παρασκευῆς, καὶ⸃ σάββατον ἐπέφωσκεν.
translation:
  text: And it was the day of Preparation, and the Sabbath was beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Sabbath was dawning.' The Greek verb can mean 'was
      dawning' or 'was beginning'; here it refers to the Sabbath's onset at evening.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρασκευῆς
  chosen: Preparation
  alternatives:
  - preparation
  - Friday
  lexicon: BDAG
  rationale: παρασκευή in Jewish-Greek usage commonly denotes the day of preparation
    before the Sabbath. Capitalizing 'Preparation' treats it as a recognized day designation
    while still preserving the lexical sense rather than replacing it with the interpretive
    equivalent 'Friday.' 'Friday' is contextually possible but less transparent to
    the Greek wording.
- source_word: σάββατον
  chosen: the Sabbath
  alternatives:
  - Sabbath
  lexicon: BDAG
  rationale: With no article in Greek but clear contextual definiteness, English idiom
    naturally supplies 'the.' The referent is the weekly Sabbath in the passion narrative
    context.
- source_word: ἐπέφωσκεν
  chosen: was beginning
  alternatives:
  - was dawning
  - was drawing near
  lexicon: BDAG
  rationale: Although the verb can literally mean 'to dawn' or 'grow light,' in this
    context it refers to the onset of the Sabbath at evening. 'Was beginning' communicates
    the sense clearly in modern English without misleading readers into thinking this
    was morning. The more literal 'was dawning' is worth preserving in a footnote
    because of its traditional use and lexical transparency.
- source_word: ἡμέρα ἦν παρασκευῆς
  chosen: it was the day of Preparation
  alternatives:
  - it was Preparation day
  - it was the day of preparation
  lexicon: BDAG
  rationale: This clause is rendered idiomatically in English while preserving the
    genitival construction's sense. 'The day of Preparation' is slightly more formal
    and aligns with common Second Temple Jewish calendrical terminology.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: The conjunction is retained at both clause boundaries to reflect Luke's
    narrative coordination without overinterpreting discourse flow.
