theological_decisions:
- issue: Meaning of ἐπέφωσκεν in relation to the Sabbath's onset
  chosen_reading: The verse refers to the Sabbath beginning at evening, not to morning
    dawn.
  alternative_readings:
  - the Sabbath was dawning
  rationale: The Jewish reckoning of days from evening to evening governs the context
    of burial before Sabbath rest. Rendering the verb as 'was beginning' preserves
    this temporal sense and avoids a misleadingly literal English expression, while
    the traditional alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
