theological_decisions:
- issue: Whether σταυρός should be rendered more specifically as 'crossbeam' in the
    crucifixion narrative
  chosen_reading: the cross
  alternative_readings:
  - the crossbeam
  rationale: The source text uses σταυρός, not a more specific term for a beam. Rendering
    it 'the cross' follows the plain lexical sense and avoids over-specifying a historical
    reconstruction not explicit in the verse.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition/source plain sense
