id: LUK.23.26
reference: Luke 23:26
source:
  edition: SBLGNT
  text: Καὶ ὡς ἀπήγαγον αὐτόν, ἐπιλαβόμενοι ⸂Σίμωνά τινα Κυρηναῖον ἐρχόμενον⸃ ἀπ’
    ἀγροῦ ἐπέθηκαν αὐτῷ τὸν σταυρὸν φέρειν ὄπισθεν τοῦ Ἰησοῦ.
translation:
  text: And as they led him away, they seized a certain Simon of Cyrene, coming in
    from the countryside, and laid the cross on him to carry behind Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coming in from the field.' The Greek may refer either to a field specifically
      or more generally to the countryside outside the city.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'the cross' here more specifically as 'the crossbeam,' but
      the Greek text says simply 'the cross.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  chosen: led ... away
  alternatives:
  - took away
  - led off
  lexicon: BDAG
  rationale: The verb ἀπάγω commonly means to lead or take away. 'Led ... away' is
    natural English and preserves the sense of escorting Jesus under custody.
- source_word: ἐπιλαβόμενοι
  chosen: they seized
  alternatives:
  - they took hold of
  - they laid hold of
  lexicon: BDAG
  rationale: The middle participle of ἐπιλαμβάνομαι here conveys taking hold of someone
    physically. 'Seized' reflects the forceful action in context better than the more
    wooden 'took hold of.'
- source_word: Σίμωνά τινα Κυρηναῖον
  chosen: a certain Simon of Cyrene
  alternatives:
  - someone named Simon, a Cyrenian
  - Simon, a man from Cyrene
  lexicon: BDAG
  rationale: τινα adds the sense 'a certain,' introducing an otherwise unknown individual.
    'Of Cyrene' is the standard and clear way to render Κυρηναῖον while preserving
    the place association.
- source_word: ἐρχόμενον ἀπ’ ἀγροῦ
  chosen: coming in from the countryside
  alternatives:
  - coming from the field
  - coming in from the field
  lexicon: BDAG
  rationale: ἀγρός can mean field or country area. In idiomatic English, 'coming in
    from the countryside' best conveys that Simon was arriving from outside the city.
    'From the field' is possible but sounds overly literal and may suggest a single
    plot of land.
- source_word: ἐπέθηκαν αὐτῷ τὸν σταυρὸν
  chosen: laid the cross on him
  alternatives:
  - put the cross on him
  - placed the cross on him
  lexicon: BDAG
  rationale: ἐπιτίθημι means to put or lay upon. 'Laid ... on him' is idiomatic and
    preserves the imposed burden.
- source_word: τὸν σταυρὸν
  chosen: the cross
  alternatives:
  - the crossbeam
  lexicon: BDAG
  rationale: σταυρός is most straightforwardly rendered 'cross.' Although some argue
    for 'crossbeam' in passion contexts, the Greek term itself here is σταυρός, and
    'cross' is the clearest direct rendering without importing a reconstruction.
- source_word: φέρειν
  chosen: to carry
  alternatives:
  - to bear
  lexicon: BDAG
  rationale: φέρειν means to carry or bear. 'Carry' is more natural modern English
    while retaining the physical sense.
- source_word: ὄπισθεν τοῦ Ἰησοῦ
  chosen: behind Jesus
  alternatives:
  - after Jesus
  lexicon: BDAG
  rationale: ὄπισθεν primarily denotes spatial position, 'behind.' While 'after' can
    sometimes work, 'behind Jesus' best fits the procession scene and avoids unnecessary
    interpretive extension.
