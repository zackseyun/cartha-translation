theological_decisions:
- issue: Narrative sequencing of the participle κατακολουθήσασαι with the main verb
    ἐθεάσαντο
  chosen_reading: 'Rendered as coordinate past actions: ''followed and saw'''
  alternative_readings:
  - Rendered more formally as 'having followed ... they saw'
  rationale: 'This is a stylistic translation decision rather than a doctrinal one.
    Optimal equivalence favors natural English while preserving the sequence of events:
    the women followed and then observed the tomb and the placement of the body.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
