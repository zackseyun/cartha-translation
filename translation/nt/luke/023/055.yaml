id: LUK.23.55
reference: Luke 23:55
source:
  edition: SBLGNT
  text: κατακολουθήσασαι δὲ ⸀αἱ γυναῖκες, αἵτινες ἦσαν συνεληλυθυῖαι ⸂ἐκ τῆς Γαλιλαίας
    αὐτῷ⸃, ἐθεάσαντο τὸ μνημεῖον καὶ ὡς ἐτέθη τὸ σῶμα αὐτοῦ,
translation:
  text: Now the women who had come with him from Galilee followed and saw the tomb
    and how his body was laid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had accompanied him from Galilee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακολουθήσασαι
  chosen: followed
  alternatives:
  - having followed
  - followed along
  lexicon: BDAG
  rationale: Aorist participle modifying 'the women.' In English, an adverbial participle
    here is most naturally carried by a finite verb in sequence with the main verb.
    'Followed' preserves the sense without awkwardness; 'followed along' is possible
    but less concise.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition. 'Now' signals continuation in readable
    modern English without overstating coordination.
- source_word: γυναῖκες
  chosen: the women
  alternatives:
  - women
  lexicon: BDAG
  rationale: The article is present and points to a known group in the narrative,
    so 'the women' is appropriate.
- source_word: αἵτινες
  chosen: who
  alternatives:
  - who indeed
  - the ones who
  lexicon: BDAG
  rationale: The relative pronoun identifies the women more specifically. Simple 'who'
    is idiomatic English and captures the restrictive function.
- source_word: συνεληλυθυῖαι ἐκ τῆς Γαλιλαίας αὐτῷ
  chosen: had come with him from Galilee
  alternatives:
  - had accompanied him from Galilee
  - had come from Galilee with him
  lexicon: BDAG
  rationale: The periphrastic pluperfect-like construction describes prior accompanying
    action. 'Had come with him from Galilee' preserves both the origin ('from Galilee')
    and association ('with him'). 'Accompanied him' is possible, but the Greek more
    literally speaks of coming together/with him.
- source_word: ἐθεάσαντο
  chosen: saw
  alternatives:
  - looked at
  - observed
  - watched
  lexicon: BDAG
  rationale: θεάομαι can imply attentive viewing, but in this context 'saw' is natural
    and sufficient, especially since the following clause specifies what they observed.
    The fuller nuance is preserved by the object and complement.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - burial place
  lexicon: BDAG
  rationale: In the burial context of Jesus, 'tomb' is the standard and most precise
    rendering.
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - in what manner
  lexicon: BDAG
  rationale: Here ὡς introduces the manner in which the body was placed. 'How' is
    the most natural English equivalent.
- source_word: ἐτέθη
  chosen: was laid
  alternatives:
  - was placed
  - was put
  lexicon: BDAG
  rationale: Passive of τίθημι in a burial context. 'Was laid' is idiomatic and appropriately
    dignified for placing a body in a tomb.
- source_word: σῶμα αὐτοῦ
  chosen: his body
  alternatives:
  - the body of him
  lexicon: BDAG
  rationale: Standard English possessive rendering of the genitive pronoun; clear
    and natural.
