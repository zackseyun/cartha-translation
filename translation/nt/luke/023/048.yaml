id: LUK.23.48
reference: Luke 23:48
source:
  edition: SBLGNT
  text: καὶ πάντες οἱ συμπαραγενόμενοι ὄχλοι ἐπὶ τὴν θεωρίαν ταύτην, ⸀θεωρήσαντες
    τὰ γενόμενα, ⸀τύπτοντες τὰ στήθη ὑπέστρεφον.
translation:
  text: And all the crowds that had gathered for this spectacle, after seeing what
    had happened, were returning, beating their chests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for this sight.'
    reason: lexical_alternative
  - marker: b
    text: A gesture of grief, mourning, or shock.
    reason: cultural_note
lexical_decisions:
- source_word: συμπαραγενόμενοι
  chosen: had gathered
  alternatives:
  - had come together
  - had assembled
  - had gathered together
  lexicon: BDAG
  rationale: The participle describes people who had come together at the scene. 'Had
    gathered' is natural English and preserves the collective sense without over-translating
    the σύν- prefix.
- source_word: ὄχλοι
  chosen: crowds
  alternatives:
  - multitudes
  - crowd
  lexicon: BDAG
  rationale: Plural 'crowds' reflects the Greek plural and Luke's common usage for
    groups of people. 'Multitudes' is more traditional but less natural in contemporary
    English.
- source_word: ἐπὶ τὴν θεωρίαν ταύτην
  chosen: for this spectacle
  alternatives:
  - for this sight
  - for this event
  - to see this spectacle
  lexicon: BDAG
  rationale: θεωρία can denote a viewing, spectacle, or public sight. In context of
    the crucifixion scene, 'spectacle' captures the public viewing aspect. Because
    'spectacle' can sound slightly interpretive in English, the more literal 'sight'
    is preserved in a footnote.
- source_word: θεωρήσαντες
  chosen: after seeing
  alternatives:
  - having seen
  - when they saw
  - watching
  lexicon: BDAG
  rationale: 'The aorist participle is best represented as antecedent action relative
    to the main verb: they returned after seeing what had happened. ''After seeing''
    is idiomatic and preserves the sequence.'
- source_word: τὰ γενόμενα
  chosen: what had happened
  alternatives:
  - the things that had happened
  - what had taken place
  lexicon: BDAG
  rationale: This idiomatic rendering communicates the eventive sense of the substantival
    participle in clear modern English.
- source_word: τύπτοντες τὰ στήθη
  chosen: beating their chests
  alternatives:
  - striking their breasts
  - beating their breasts
  lexicon: BDAG
  rationale: The expression denotes a gesture of grief, shock, or lament. 'Beating
    their chests' is contemporary, vivid, and faithful to the physical action; 'breasts'
    is more literal but less natural in current English.
- source_word: ὑπέστρεφον
  chosen: were returning
  alternatives:
  - returned
  - went back
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action in the scene. 'Were
    returning' preserves the imperfective aspect better than simple past 'returned'.
