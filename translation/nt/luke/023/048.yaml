theological_decisions:
- issue: Emotional force of the crowd's reaction
  chosen_reading: The translation leaves the gesture as a physical act of lament ('beating
    their chests') without specifying repentance, guilt, or mere shock.
  alternative_readings:
  - They were repenting
  - They were expressing grief or horror
  rationale: The Greek describes the action but does not explicitly interpret the
    inner spiritual state. Preserving the gesture avoids importing a theological conclusion
    the text itself does not state.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
