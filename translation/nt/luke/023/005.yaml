id: LUK.23.5
reference: Luke 23:5
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπίσχυον λέγοντες ὅτι Ἀνασείει τὸν λαὸν διδάσκων καθ’ ὅλης τῆς Ἰουδαίας,
    ⸀καὶ ἀρξάμενος ἀπὸ τῆς Γαλιλαίας ἕως ὧδε.
translation:
  text: But they kept insisting, saying, “He stirs up the people, teaching throughout
    all Judea, beginning from Galilee even to here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “incites the people.” The Greek verb can mean to arouse or stir up in
      a disruptive sense.
    reason: lexical_alternative
  - marker: b
    text: “Judea” may refer either to the region of Judea specifically or, more broadly
      in some contexts, to the Jewish territory under discussion; here the wording
      likely stresses the breadth of his activity.
    reason: cultural_note
  - marker: c
    text: Or “all the way here” or “up to this place.” The phrase points from Galilee
      to the present location before Pilate.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίσχυον
  chosen: kept insisting
  alternatives:
  - were becoming more urgent
  - pressed strongly
  lexicon: BDAG
  rationale: The imperfect verb conveys continued or repeated forceful insistence.
    'Kept insisting' captures both the ongoing aspect and the pressure of the accusation
    in natural English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - declaring
  - arguing
  lexicon: BDAG
  rationale: A participle of attendant manner introducing the content of their insistence.
    'Saying' is the most direct and transparent rendering.
- source_word: Ἀνασείει
  chosen: stirs up
  alternatives:
  - incites
  - agitates
  lexicon: BDAG
  rationale: The verb denotes arousing or stirring up people, especially in a disruptive
    sense. 'Stirs up' preserves the metaphor and accusation without over-specifying
    sedition; 'incites' is possible but slightly more interpretive.
- source_word: τὸν λαὸν
  chosen: the people
  alternatives:
  - the crowd
  - the nation
  lexicon: BDAG
  rationale: λαός here refers broadly to the populace rather than a specific gathered
    crowd. 'The people' best fits the accusation's scope.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  lexicon: BDAG
  rationale: The present participle explains the manner or means associated with the
    accusation. 'Teaching' is concise and preserves the participial force.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας
  chosen: throughout all Judea
  alternatives:
  - through all Judea
  - throughout the whole of Judea
  lexicon: BDAG
  rationale: κατά with the genitive here has a distributive/spatial sense, indicating
    extent over the region. 'Throughout all Judea' is natural English and preserves
    the comprehensive scope.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - the Jewish region
  lexicon: BDAG
  rationale: As a proper regional name, it should be transliterated in standard English
    form.
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - starting
  - having begun
  lexicon: BDAG
  rationale: The aorist middle participle marks the starting point of the activity
    being described. 'Beginning' works smoothly with the following prepositional phrase
    in English.
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - in Galilee
  lexicon: BDAG
  rationale: ἀπό marks point of origin. 'From Galilee' preserves the geographical
    starting point of the alleged activity.
- source_word: ἕως ὧδε
  chosen: even to here
  alternatives:
  - all the way here
  - up to this place
  lexicon: BDAG
  rationale: The phrase emphasizes extension from Galilee to Pilate's present location.
    'Even to here' preserves the deictic force of ὧδε and the rhetorical escalation.
