theological_decisions:
- issue: Nature of the accusation against Jesus
  chosen_reading: Render the charge in terms of social agitation ('stirs up the people')
    without importing a more specific political crime than the Greek states.
  alternative_readings:
  - He incites the people
  - He is misleading the nation
  rationale: The accusers are intensifying their case before Pilate, but ἀνασείει
    does not itself require a fully technical charge of insurrection. The translation
    preserves the hostile accusation while avoiding doctrinal or historical overstatement.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
