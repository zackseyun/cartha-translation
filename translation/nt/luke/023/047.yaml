id: LUK.23.47
reference: Luke 23:47
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ ὁ ἑκατοντάρχης τὸ γενόμενον ⸀ἐδόξαζεν τὸν θεὸν λέγων· Ὄντως ὁ ἄνθρωπος
    οὗτος δίκαιος ἦν.
translation:
  text: Now when the centurion saw what had happened, he began glorifying God, saying,
    “Certainly this man was righteous.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “innocent” or “just.” The Greek word can denote moral righteousness or
      legal innocence in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω, rendered with a temporal sense in smooth
    English: ''when ... saw.'' This preserves the participial relation to the main
    verb without woodenly retaining ''having seen.'''
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' gives natural narrative progression in
    English without overstating contrast. It also avoids an overly mechanical 'and'
    at the start.
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: Standard and precise rendering for the Roman military rank; more specific
    than a generic 'officer.'
- source_word: τὸ γενόμενον
  chosen: what had happened
  alternatives:
  - what had taken place
  - what had occurred
  - the event that had happened
  lexicon: BDAG
  rationale: The articular participle from γίνομαι refers to the event(s) just witnessed.
    'What had happened' is idiomatic and accurately captures the completed occurrence.
- source_word: ἐδόξαζεν
  chosen: began glorifying
  alternatives:
  - was glorifying
  - praised
  - glorified
  lexicon: BDAG
  rationale: Imperfect of δοξάζω suggests ongoing or inceptive action. 'Began glorifying'
    preserves the imperfective force better than a simple past 'glorified,' while
    retaining the stronger theological sense of δοξάζω over the flatter 'praised.'
- source_word: τὸν θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἐδόξαζεν; standard rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of speech; 'saying' preserves
    the Greek structure naturally.
- source_word: Ὄντως
  chosen: Certainly
  alternatives:
  - truly
  - really
  - indeed
  lexicon: BDAG
  rationale: Adverb expressing strong affirmation. 'Certainly' fits contemporary English
    and the centurion's emphatic conclusion.
- source_word: ὁ ἄνθρωπος οὗτος
  chosen: this man
  alternatives:
  - this person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to Jesus as a male individual, so 'this
    man' is the gender-accurate rendering.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - innocent
  - just
  lexicon: BDAG
  rationale: The adjective can mean 'righteous,' 'just,' or in some contexts 'innocent.'
    'Righteous' is the default lexical sense and best preserves the moral/theological
    weight of the Greek. Because 'innocent' is a plausible contextual alternative,
    it is preserved in a footnote rather than adopted in the main text.
- source_word: ἦν
  chosen: was
  lexicon: BDAG
  rationale: Imperfect of εἰμί in past-time narration; straightforwardly rendered
    'was.'
