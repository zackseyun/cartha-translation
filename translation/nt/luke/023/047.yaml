theological_decisions:
- issue: Rendering of δίκαιος in the centurion's confession
  chosen_reading: righteous
  alternative_readings:
  - innocent
  - just
  rationale: The verse does not explicitly present a full christological confession
    like 'Son of God' (cf. parallels in other Gospels), but Luke's wording δίκαιος
    naturally carries moral and theological force. Rendering it 'righteous' preserves
    that force without importing more than the text states. Since some interpreters
    prefer 'innocent' in light of Luke's emphasis on Jesus' unjust condemnation, that
    alternative is preserved in a footnote rather than resolved dogmatically in the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
