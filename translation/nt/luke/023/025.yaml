theological_decisions:
- issue: Rendering the contrast between the released insurrectionist and Jesus without
    importing atonement interpretation
  chosen_reading: Kept the narrative contrast explicit in the wording but did not
    add explanatory theological language.
  alternative_readings:
  - Expanded paraphrase such as 'in his place' or 'instead of Jesus'
  rationale: The verse itself narrates Pilate's action and the crowd's will. While
    substitution themes may be theologically inferred from the broader passion narrative,
    this verse does not explicitly state them, so the translation avoids importing
    doctrinal explanation beyond the text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
