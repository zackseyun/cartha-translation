id: LUK.23.25
reference: Luke 23:25
source:
  edition: SBLGNT
  text: ἀπέλυσεν δὲ τὸν διὰ στάσιν καὶ φόνον βεβλημένον ⸀εἰς φυλακὴν ὃν ᾐτοῦντο, τὸν
    δὲ Ἰησοῦν παρέδωκεν τῷ θελήματι αὐτῶν.
translation:
  text: So he released the man who had been thrown into prison for insurrection and
    murder, whom they were asking for; but he handed Jesus over to their will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been put in prison.' The Greek is more vividly 'had been thrown
      into prison.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to what they wanted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλυσεν
  chosen: released
  alternatives:
  - set free
  - freed
  lexicon: BDAG
  rationale: Aorist active of ἀπολύω here refers to releasing a prisoner. 'Released'
    is precise and idiomatic in legal/custodial context, without adding interpretive
    color.
- source_word: διὰ στάσιν καὶ φόνον
  chosen: for insurrection and murder
  alternatives:
  - because of rebellion and murder
  - for revolt and murder
  lexicon: BDAG
  rationale: 'διά with accusative gives reason/cause: he was imprisoned on account
    of these acts. στάσις in this context is not mere ''dispute'' but civil unrest/revolt;
    ''insurrection'' best fits the political-criminal setting of Barabbas in Luke.'
- source_word: βεβλημένον εἰς φυλακήν
  chosen: had been thrown into prison
  alternatives:
  - had been put in prison
  - had been cast into prison
  lexicon: BDAG
  rationale: 'Perfect passive participle of βάλλω with εἰς φυλακήν is vivid: literally
    ''thrown into prison.'' Retaining ''thrown'' preserves the force of the Greek
    better than the flatter ''put,'' while ''had been'' reflects the prior completed
    state.'
- source_word: ὃν ᾐτοῦντο
  chosen: whom they were asking for
  alternatives:
  - whom they had asked for
  - whom they were demanding
  lexicon: BDAG
  rationale: Imperfect middle of αἰτέω suggests ongoing/requesting action in the scene.
    'Were asking for' preserves the imperfect aspect without overstating to 'demanding,'
    though the context is hostile.
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered over
  - gave over
  lexicon: BDAG
  rationale: παραδίδωμι is a key passion verb meaning to hand over/deliver up. 'Handed
    over' is natural English and preserves the judicial-transfer sense.
- source_word: τῷ θελήματι αὐτῶν
  chosen: to their will
  alternatives:
  - to what they wanted
  - to their desire
  lexicon: BDAG
  rationale: θέλημα is 'will, desire, what one wishes.' 'To their will' is slightly
    more formal but preserves the moral and volitional weight of the Greek better
    than the more colloquial 'what they wanted'.
- source_word: δὲ ... δὲ
  chosen: So ... but
  alternatives:
  - and ... but
  - now ... but
  lexicon: BDAG
  rationale: The paired δέ marks progression and contrast. Rendering the first as
    'So' gives smooth narrative continuation in English, while the second is adversative
    and is best rendered 'but'.
