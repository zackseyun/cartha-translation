id: LUK.23.34
reference: Luke 23:34
source:
  edition: SBLGNT
  text: ⸂ὁ δὲ Ἰησοῦς ἔλεγεν· Πάτερ, ἄφες αὐτοῖς, οὐ γὰρ οἴδασιν τί ποιοῦσιν.⸃ διαμεριζόμενοι
    δὲ τὰ ἱμάτια αὐτοῦ ἔβαλον ⸀κλήρους.
translation:
  text: But Jesus was saying, “Father, forgive them, for they do not know what they
    are doing.” And dividing his garments, they cast lots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts omit: “Father, forgive them, for they do not know what
      they are doing.”'
    reason: textual_variant
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or ongoing speech rather than a simple
    punctiliar statement. 'Was saying' preserves that aspect better than the traditional
    simple past 'said.'
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My Father
  lexicon: BDAG
  rationale: Vocative of direct address. 'Father' is the natural English equivalent
    and does not add possessive nuance not present in the Greek.
- source_word: ἄφες
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: In prayer addressed to God concerning offenders, ἀφίημι is best rendered
    'forgive.' Alternatives like 'release' are too literal for this context and 'pardon'
    is less idiomatic here.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - these people
  lexicon: BDAG
  rationale: The dative pronoun is indefinite as to the exact group in the immediate
    wording. 'Them' preserves the Greek's lack of further specification.
- source_word: οὐ γὰρ οἴδασιν τί ποιοῦσιν
  chosen: for they do not know what they are doing
  alternatives:
  - for they do not understand what they are doing
  lexicon: BDAG
  rationale: οἶδα normally denotes knowledge; 'know' is the most direct rendering.
    'Understand' is interpretive and slightly expands the sense.
- source_word: διαμεριζόμενοι
  chosen: dividing
  alternatives:
  - apportioning
  - distributing
  lexicon: BDAG
  rationale: The participle describes the action of dividing up Jesus' clothing. 'Dividing'
    is straightforward and idiomatic in English.
- source_word: ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - clothing
  lexicon: BDAG
  rationale: ἱμάτια refers to articles of clothing. 'Garments' preserves the dignity
    and register of the narrative better than the more casual 'clothes,' while remaining
    understandable.
- source_word: ἔβαλον κλήρους
  chosen: cast lots
  alternatives:
  - threw lots
  lexicon: BDAG
  rationale: This is the standard idiomatic English rendering for the ancient practice
    indicated by the Greek expression.
- source_word: δὲ
  chosen: But / And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: The first δέ marks mild contrast or transition from the preceding context,
    well represented by 'But.' The second δέ continues the narrative, naturally rendered
    'And.' English style permits contextual variation for the same connective.
