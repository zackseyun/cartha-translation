id: LUK.23.30
reference: Luke 23:30
source:
  edition: SBLGNT
  text: τότε ἄρξονται λέγειν τοῖς ὄρεσιν· Πέσετε ἐφ’ ἡμᾶς, καὶ τοῖς βουνοῖς· Καλύψατε
    ἡμᾶς·
translation:
  text: Then they will begin to say to the mountains, ‘Fall on us,’ and to the hills,
    ‘Cover us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This wording echoes prophetic judgment language, especially Hosea 10:8.
    reason: cross_reference
  - marker: b
    text: Or 'Hide us.' The verb literally means 'cover,' but in context it carries
      the sense of concealment from coming judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence from the preceding context; 'Then' is
    natural, concise English and preserves the forward-looking force.
- source_word: ἄρξονται
  chosen: they will begin
  alternatives:
  - they will start
  lexicon: BDAG
  rationale: Future middle of ἄρχω with complementary infinitive λέγειν. 'Will begin'
    preserves the ingressive sense better than a simple future 'they will say.'
- source_word: λέγειν
  chosen: to say
  alternatives:
  - to speak
  lexicon: BDAG
  rationale: With ἄρξονται, the infinitive is best rendered straightforwardly as 'to
    say,' introducing the quoted speech.
- source_word: τοῖς ὄρεσιν
  chosen: to the mountains
  alternatives:
  - to the hills
  lexicon: BDAG
  rationale: ὄρος denotes mountains/hills, but since βουνοῖς follows and is better
    rendered 'hills,' translating ὄρεσιν as 'mountains' preserves the distinction
    between the two terms.
- source_word: Πέσετε
  chosen: Fall
  alternatives:
  - Fall down
  lexicon: BDAG
  rationale: Aorist active imperative, second plural, addressed to the mountains.
    'Fall' is the direct and idiomatic English imperative in this prophetic quotation.
- source_word: ἐφ’ ἡμᾶς
  chosen: on us
  alternatives:
  - upon us
  lexicon: BDAG
  rationale: ἐπί with accusative here expresses motion onto/against. 'On us' is idiomatic
    modern English; 'upon us' is possible but more elevated.
- source_word: τοῖς βουνοῖς
  chosen: to the hills
  alternatives:
  - to the mountains
  lexicon: BDAG
  rationale: βουνός commonly denotes hill rather than mountain. Rendering it 'hills'
    preserves the lexical contrast with ὄρεσιν.
- source_word: Καλύψατε
  chosen: Cover
  alternatives:
  - Hide
  - Conceal
  lexicon: BDAG
  rationale: The verb means to cover or conceal. 'Cover us' is the most direct rendering
    and also preserves the wording familiar from the prophetic allusion.
