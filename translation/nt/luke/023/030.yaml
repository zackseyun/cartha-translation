theological_decisions:
- issue: Intertextual prophetic/judgment language
  chosen_reading: Retain the literal cry to mountains and hills without interpretive
    expansion.
  alternative_readings:
  - Render more dynamically as a plea to be hidden from judgment
  rationale: The verse echoes prophetic judgment language (notably Hos 10:8) and is
    later echoed in apocalyptic context. The translation preserves the concrete imagery
    and theological tension rather than explaining it in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
