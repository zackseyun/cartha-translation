id: LUK.23.4
reference: Luke 23:4
source:
  edition: SBLGNT
  text: ὁ δὲ Πιλᾶτος εἶπεν πρὸς τοὺς ἀρχιερεῖς καὶ τοὺς ὄχλους· Οὐδὲν εὑρίσκω αἴτιον
    ἐν τῷ ἀνθρώπῳ τούτῳ.
translation:
  text: Then Pilate said to the chief priests and the crowds, “I find no basis for
    a charge against this man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “I find no fault in this man.” The Greek αἴτιον can mean “fault,” but
      here it carries a judicial sense: no valid ground for accusation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Then' fits Luke's narrative progression in
    natural English better than a wooden 'but' or simple 'and' here.
- source_word: Πιλᾶτος
  chosen: Pilate
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: εἶπεν πρὸς
  chosen: said to
  alternatives:
  - said
  - spoke to
  lexicon: BDAG
  rationale: The combination λέγω + πρός commonly means 'said to/addressed.' 'Said
    to' is the most natural and sufficiently formal rendering.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the senior priestly leadership,
    not multiple holders of the singular office of high priest.
- source_word: ὄχλους
  chosen: the crowds
  alternatives:
  - the crowd
  - the people
  lexicon: BDAG
  rationale: The Greek is plural, so 'the crowds' preserves the form better than singular
    'the crowd.' 'The people' is broader and less precise.
- source_word: Οὐδὲν εὑρίσκω
  chosen: I find no
  alternatives:
  - I find nothing
  - I do not find any
  lexicon: BDAG
  rationale: This is idiomatic English for the present-tense judicial assessment.
    It preserves the force of the negation without awkwardness.
- source_word: αἴτιον
  chosen: basis for a charge
  alternatives:
  - fault
  - cause
  - grounds for accusation
  lexicon: BDAG
  rationale: In this legal context αἴτιον refers to a chargeable cause or legal basis.
    'Basis for a charge' communicates the forensic sense more clearly in modern English
    than the traditional but potentially vague 'fault.'
- source_word: ἐν τῷ ἀνθρώπῳ τούτῳ
  chosen: against this man
  alternatives:
  - in this man
  - in the case of this man
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with εὑρίσκω αἴτιον in a judicial setting
    English idiom is 'against this man.' 'This man' preserves the demonstrative and
    the gender-accurate singular ἄνθρωπος.
