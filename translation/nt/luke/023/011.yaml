theological_decisions:
- issue: Nature of Herod's mockery through the clothing
  chosen_reading: Render the garment phrase in a way that preserves the irony of mock
    honor without specifying more than the Greek states.
  alternative_readings:
  - Interpret the clothing specifically as a royal robe
  - Interpret the clothing primarily as a sign of insanity or frivolity
  rationale: The verse depicts contempt and mockery, and the splendid garment likely
    contributes to that mockery. However, the Greek only states that Jesus was clothed
    in bright/splendid clothing. The translation should preserve the humiliation and
    irony without importing a more detailed symbolic interpretation into the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
