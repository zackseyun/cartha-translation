id: LUK.23.11
reference: Luke 23:11
source:
  edition: SBLGNT
  text: ἐξουθενήσας δὲ αὐτὸν ⸀καὶ ὁ Ἡρῴδης σὺν τοῖς στρατεύμασιν αὐτοῦ καὶ ἐμπαίξας
    ⸀περιβαλὼν ἐσθῆτα λαμπρὰν ἀνέπεμψεν αὐτὸν τῷ Πιλάτῳ.
translation:
  text: But Herod, together with his soldiers, treated him with contempt and mocked
    him. Dressing him in splendid clothing, he sent him back to Pilate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a splendid robe'; λαμπρὰν can also mean 'bright,' and the clothing likely
      serves Herod's mockery by giving Jesus an appearance of mock honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουθενήσας
  chosen: treated him with contempt
  alternatives:
  - despised him
  - scorned him
  lexicon: BDAG
  rationale: The participle denotes regarding someone as of no account or with contempt.
    'Treated him with contempt' brings out the verbal force in natural English better
    than the somewhat more internal 'despised him,' while preserving the public humiliation
    implied in context.
- source_word: σὺν τοῖς στρατεύμασιν αὐτοῦ
  chosen: together with his soldiers
  alternatives:
  - with his troops
  - with his military forces
  lexicon: BDAG
  rationale: στράτευμα can denote troops or soldiers. 'Soldiers' is the clearest contemporary
    rendering in this narrative setting and avoids sounding overly formal or abstract.
- source_word: ἐμπαίξας
  chosen: mocked him
  alternatives:
  - ridiculed him
  - made fun of him
  lexicon: BDAG
  rationale: The verb means to mock or ridicule. 'Mocked him' is the standard, dignified
    rendering that fits the passion narrative.
- source_word: περιβαλὼν
  chosen: dressing him in
  alternatives:
  - clothing him in
  - putting on him
  lexicon: BDAG
  rationale: The participle means to put clothing around/on someone. 'Dressing him
    in' is idiomatic English and clearly connects with the object ἐσθῆτα λαμπράν.
- source_word: ἐσθῆτα λαμπρὰν
  chosen: splendid clothing
  alternatives:
  - a splendid robe
  - bright clothing
  - gorgeous apparel
  lexicon: BDAG
  rationale: ἐσθής is a garment/clothing, and λαμπρός can mean bright, splendid, or
    magnificent. 'Splendid clothing' preserves the lexical breadth without over-specifying
    a single robe, since the Greek does not explicitly use a robe-specific term here.
    The phrase also leaves room for the mocking irony of regal display.
- source_word: ἀνέπεμψεν
  chosen: sent him back
  alternatives:
  - returned him
  - sent him on
  lexicon: BDAG
  rationale: In this judicial context the verb means to send back to a previous authority.
    'Sent him back' best captures the procedural sense and is natural in English.
- source_word: τῷ Πιλάτῳ
  chosen: to Pilate
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the instruction
    to transliterate names rather than translate titles.
