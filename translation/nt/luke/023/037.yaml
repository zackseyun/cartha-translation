theological_decisions:
- issue: Rendering the mock royal title βασιλεὺς τῶν Ἰουδαίων
  chosen_reading: the King of the Jews
  alternative_readings:
  - the king of the Judeans
  rationale: The phrase is a charged title in the crucifixion context, tied to the
    accusation against Jesus and the irony of his kingship. 'Jews' best reflects the
    established Gospel passion wording in English and the likely sense for most readers,
    while preserving 'Judeans' as an alternative because Ἰουδαῖος can bear regional/ethnic
    nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
