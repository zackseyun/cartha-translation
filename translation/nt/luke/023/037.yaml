id: LUK.23.37
reference: Luke 23:37
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Εἰ σὺ εἶ ὁ βασιλεὺς τῶν Ἰουδαίων, σῶσον σεαυτόν.
translation:
  text: and saying, “If you are the King of the Jews, save yourself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the King of the Judeans.” The Greek Ἰουδαίων can refer to Jews or Judeans
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this participial clause to
    the preceding narrative action.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - calling out
  - mocking, saying
  lexicon: BDAG
  rationale: Present active participle, nominative masculine plural, modifying the
    subject from the previous verse. 'Saying' preserves the participial form and leaves
    the mocking force to context rather than importing it into the verb itself.
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: Introduces a conditional challenge. 'If' best preserves the taunting
    conditional force; 'since' would overstate acceptance of the claim.
- source_word: σὺ εἶ
  chosen: you are
  alternatives:
  - you yourself are
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but normal English conveys this adequately
    as 'you are' in this context without awkwardness.
- source_word: ὁ βασιλεὺς
  chosen: the King
  alternatives:
  - king
  lexicon: BDAG
  rationale: 'The article is significant and idiomatic in English here: this is a
    specific royal title being thrown back at Jesus.'
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: In the passion narrative this phrase functions as the established political-messianic
    title used in the accusation and mockery before a broader Roman setting. 'Jews'
    is the conventional and contextually fitting rendering, while 'Judeans' is a viable
    geographical/ethnic alternative worth preserving in a footnote.
- source_word: σῶσον
  chosen: save
  alternatives:
  - rescue
  lexicon: BDAG
  rationale: Aorist active imperative, second singular. 'Save' is the natural direct
    rendering and preserves the verbal link with broader Lukan usage of σῴζω.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: BDAG
  rationale: Direct reflexive object of the imperative; straightforwardly rendered
    'yourself'.
