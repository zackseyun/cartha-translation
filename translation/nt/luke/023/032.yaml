id: LUK.23.32
reference: Luke 23:32
source:
  edition: SBLGNT
  text: Ἤγοντο δὲ καὶ ἕτεροι ⸂κακοῦργοι δύο⸃ σὺν αὐτῷ ἀναιρεθῆναι.
translation:
  text: And two others, criminals, were being led with him to be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evildoers' or 'malefactors.' The Greek term refers to wrongdoers under
      criminal condemnation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be executed.' The Greek says 'to be put to death' and does not itself
      specify the method here, though the context shows crucifixion.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤγοντο
  chosen: were being led
  alternatives:
  - were led
  - were brought away
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing action in past time; 'were being
    led' preserves the processive sense better than simple 'were led.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural modern English without overstating contrast.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: 'καί adds inclusion: others were led along in addition to Jesus. In English
    this sense is adequately conveyed in the sentence structure with ''And two others...''.'
- source_word: ἕτεροι
  chosen: others
  alternatives:
  - other men
  - different ones
  lexicon: BDAG
  rationale: ἕτεροι marks these as others besides Jesus. 'Others' is concise and natural;
    'different ones' is too wooden.
- source_word: κακοῦργοι
  chosen: criminals
  alternatives:
  - evildoers
  - wrongdoers
  - malefactors
  lexicon: BDAG
  rationale: The term denotes those guilty of serious wrongdoing, here likely condemned
    offenders. 'Criminals' is clear modern English; 'malefactors' is archaic, and
    'evildoers' is less specific.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Cardinal numeral directly modifying 'criminals/others'; rendered straightforwardly
    as 'two.'
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - along with him
  - together with him
  lexicon: BDAG
  rationale: σύν with dative expresses accompaniment. 'With him' is the most natural
    concise rendering.
- source_word: ἀναιρεθῆναι
  chosen: to be put to death
  alternatives:
  - to be executed
  - to be killed
  lexicon: BDAG
  rationale: The aorist passive infinitive of ἀναιρέω here refers to official killing
    in the judicial context of crucifixion. 'To be put to death' is accurate and idiomatic,
    preserving the formal gravity without over-specifying method in this verse.
