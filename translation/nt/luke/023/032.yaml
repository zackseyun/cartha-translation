theological_decisions:
- issue: Whether to specify crucifixion in the translation of ἀναιρεθῆναι
  chosen_reading: Use the broader 'to be put to death' rather than 'to be crucified.'
  alternative_readings:
  - to be executed
  - to be crucified
  rationale: Although the broader context makes crucifixion clear, the verb ἀναιρεθῆναι
    itself means to kill/remove by death rather than explicitly 'crucify.' Optimal
    equivalence favors preserving the lexical scope of the Greek in this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
