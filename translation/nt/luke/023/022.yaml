id: LUK.23.22
reference: Luke 23:22
source:
  edition: SBLGNT
  text: ὁ δὲ τρίτον εἶπεν πρὸς αὐτούς· Τί γὰρ κακὸν ἐποίησεν οὗτος; οὐδὲν αἴτιον θανάτου
    εὗρον ἐν αὐτῷ· παιδεύσας οὖν αὐτὸν ἀπολύσω.
translation:
  text: And he said to them a third time, “Why? What evil has this man done? I have
    found in him no grounds for death. Therefore, after disciplining him, I will release
    him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For what evil has this man done?” The opening Τί may be taken as an
      elliptical protest introducing the fuller question.
    reason: lexical_alternative
  - marker: b
    text: Or “no cause for death,” “nothing deserving death,” or “no basis for a death
      sentence.”
    reason: lexical_alternative
  - marker: c
    text: Or “after punishing him”; possibly more specifically “after flogging him.”
      The Greek παιδεύσας denotes disciplinary punishment, but the exact form is not
      specified by this word alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: τρίτον
  chosen: a third time
  alternatives:
  - for the third time
  - thirdly
  lexicon: BDAG
  rationale: Adverbial accusative indicating repetition. 'A third time' is natural
    modern English and preserves the narrative emphasis.
- source_word: Τί γὰρ κακὸν ἐποίησεν οὗτος;
  chosen: Why? What evil has this man done?
  alternatives:
  - For what evil has this man done?
  - What evil has he done?
  lexicon: BDAG
  rationale: Τί here functions elliptically as an exclamation/question introducing
    objection ('Why?' or 'What then?'). Retaining both the brief protest and the fuller
    question best reflects the Greek discourse flow. κακόν is rendered 'evil' rather
    than merely 'wrong' to preserve the moral force.
- source_word: οὐδὲν αἴτιον θανάτου
  chosen: no grounds for death
  alternatives:
  - no cause for death
  - nothing deserving death
  - no basis for a death sentence
  lexicon: BDAG
  rationale: αἴτιον in legal context denotes cause, charge, or grounds. 'No grounds
    for death' communicates the judicial sense clearly in modern English without overexpanding
    the phrase.
- source_word: εὗρον ἐν αὐτῷ
  chosen: I have found in him
  alternatives:
  - I found in him
  - I have found against him
  lexicon: BDAG
  rationale: The aorist is naturally rendered in English here with present relevance
    as 'I have found,' fitting Pilate's current verdict. 'In him' reflects the Greek
    closely; 'against him' is interpretive and therefore left as an alternative.
- source_word: παιδεύσας
  chosen: after disciplining him
  alternatives:
  - after punishing him
  - after chastising him
  - after flogging him
  lexicon: BDAG
  rationale: παιδεύω can mean discipline, punish, or instruct depending on context.
    Here it refers to punitive treatment short of execution. 'Disciplining' stays
    close to the lexical range without specifying a precise form of punishment not
    explicit in this word alone; stronger alternatives are preserved.
- source_word: ἀπολύσω
  chosen: I will release him
  alternatives:
  - I will set him free
  lexicon: BDAG
  rationale: In judicial context ἀπολύω means release or set free. 'Release' is slightly
    more formal and fits the legal setting.
