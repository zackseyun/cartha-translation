theological_decisions:
- issue: Nature of Pilate's proposed action in παιδεύσας
  chosen_reading: Render generally as punitive discipline without specifying the exact
    penalty.
  alternative_readings:
  - after punishing him
  - after flogging him
  rationale: The verse presents Pilate as declaring Jesus not worthy of death while
    still proposing a lesser punitive action. The Greek verb allows a range of disciplinary/punitive
    senses. To avoid importing a more specific historical reconstruction than the
    word itself requires, the main text keeps the broader sense and preserves more
    specific options in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than resolve it'
