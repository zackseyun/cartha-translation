theological_decisions:
- issue: Force of Jesus' mission statement
  chosen_reading: The verse presents a divinely necessary mission to proclaim God's
    kingdom in multiple cities, without specifying more than the text states about
    the sender in the main line.
  alternative_readings:
  - The necessity may be understood broadly as divine necessity
  - The passive 'I was sent' may imply God as the sender
  rationale: Luke frequently uses δεῖ for divine necessity, and ἀπεστάλην strongly
    suggests commissioned mission. The translation preserves this theological weight
    through 'I must' and 'I was sent' without expanding the statement into a fuller
    doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
