id: LUK.4.43
reference: Luke 4:43
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν πρὸς αὐτοὺς ὅτι Καὶ ταῖς ἑτέραις πόλεσιν εὐαγγελίσασθαί με δεῖ
    τὴν βασιλείαν τοῦ θεοῦ, ὅτι ⸀ἐπὶ τοῦτο ⸀ἀπεστάλην.
translation:
  text: But he said to them, “I must also proclaim the good news of the kingdom of
    God to the other cities, because I was sent for this.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “preach the good news.”
    reason: lexical_alternative
  - marker: b
    text: Or “for this purpose I was sent.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτέραις πόλεσιν
  chosen: the other cities
  alternatives:
  - other towns
  - the rest of the cities
  lexicon: BDAG
  rationale: ἕτερος with πόλεσιν refers to cities other than the present one(s). 'Cities'
    is the straightforward gloss for πόλις; 'other cities' is natural English and
    preserves the contrast.
- source_word: εὐαγγελίσασθαί
  chosen: proclaim the good news
  alternatives:
  - preach the good news
  - announce the good news
  lexicon: BDAG
  rationale: The infinitive of εὐαγγελίζω means to bring or announce good news. 'Proclaim
    the good news' preserves the verbal force without importing overly church-specific
    diction. It also avoids reducing the term to a technical formula while keeping
    its gospel sense.
- source_word: δεῖ
  chosen: I must
  alternatives:
  - it is necessary for me to
  - I am obliged to
  lexicon: BDAG
  rationale: δεῖ expresses necessity, often with divine or mission-related force in
    Luke. 'I must' is concise, idiomatic, and preserves that strong necessity.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: This is a central Lukan phrase. 'The kingdom of God' is the standard
    and most transparent rendering, preserving both the theological weight and the
    likely sense of God's reign/realm without over-interpreting.
- source_word: ἐπὶ τοῦτο
  chosen: for this
  alternatives:
  - for this purpose
  - for this very thing
  lexicon: BDAG
  rationale: The prepositional phrase indicates purpose or goal. 'For this' is natural
    English and sufficiently precise; the fuller 'for this purpose' is possible but
    slightly heavier than the context requires.
- source_word: ἀπεστάλην
  chosen: I was sent
  alternatives:
  - I was commissioned
  lexicon: BDAG
  rationale: The aorist passive of ἀποστέλλω is best rendered 'I was sent.' This preserves
    the mission language that is important in Luke without importing later technical
    apostolic terminology.
- source_word: Καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Here καί modifies the scope of Jesus' mission beyond the present location.
    'Also' captures the additive sense clearly in English.
- source_word: ὁ δὲ εἶπεν πρὸς αὐτοὺς
  chosen: But he said to them
  alternatives:
  - And he said to them
  - But he told them
  lexicon: BDAG
  rationale: δέ often marks mild contrast or transition. 'But he said to them' fits
    the narrative context, where Jesus responds contrary to the crowd's desire to
    keep him.
