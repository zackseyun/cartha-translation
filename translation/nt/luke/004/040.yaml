theological_decisions:
- issue: Rendering the laying on of hands
  chosen_reading: he laid his hands on each one of them
  alternative_readings:
  - he was laying hands on each of them
  rationale: The text describes Jesus' personal, embodied healing action without requiring
    sacramental or later ecclesial overtones. The translation preserves the concrete
    action and the individual attention emphasized by the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
