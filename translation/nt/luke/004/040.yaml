id: LUK.4.40
reference: Luke 4:40
source:
  edition: SBLGNT
  text: Δύνοντος δὲ τοῦ ἡλίου ⸀ἅπαντες ὅσοι εἶχον ἀσθενοῦντας νόσοις ποικίλαις ἤγαγον
    αὐτοὺς πρὸς αὐτόν· ὁ δὲ ἑνὶ ἑκάστῳ αὐτῶν τὰς χεῖρας ⸂ἐπιτιθεὶς ἐθεράπευεν⸃ αὐτούς.
translation:
  text: Now when the sun was setting, all who had people sick with various diseases
    brought them to him; and he laid his hands on each one of them and healed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As the sun was setting.' The Greek uses a genitive absolute with a present
      participle, expressing the time when these events took place.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δύνοντος δὲ τοῦ ἡλίου
  chosen: Now when the sun was setting
  alternatives:
  - As the sun was setting
  - At sunset
  lexicon: BDAG
  rationale: 'Genitive absolute with present participle δύνω indicates contemporaneous
    action: the setting of the sun. ''Now when'' smoothly represents δέ plus the temporal
    construction in readable English. ''At sunset'' is possible but compresses the
    verbal aspect.'
- source_word: ἅπαντες ὅσοι
  chosen: all who
  alternatives:
  - everyone who
  - all those who
  lexicon: BDAG
  rationale: 'The combination intensifies comprehensiveness: all those who. ''All
    who'' is concise and preserves the distributive force without sounding cumbersome.'
- source_word: εἶχον ἀσθενοῦντας
  chosen: had people sick
  alternatives:
  - had those who were sick
  - had sick people
  lexicon: BDAG
  rationale: ἔχω with a participle here means 'had' in the sense of having persons
    in one's care/household who were ill. 'People sick' makes explicit the implied
    object in natural English while preserving the relational sense.
- source_word: ἀσθενοῦντας
  chosen: sick
  alternatives:
  - ill
  - weak
  lexicon: BDAG
  rationale: In this healing context ἀσθενέω refers to being ill rather than weak
    in a broader sense. 'Sick' is the most natural modern rendering.
- source_word: νόσοις ποικίλαις
  chosen: with various diseases
  alternatives:
  - with many kinds of diseases
  - with diverse illnesses
  lexicon: BDAG
  rationale: Dative phrase specifies the kinds of ailments affecting the sick persons.
    'Various diseases' is clear and idiomatic, preserving ποικίλαις as diversity of
    conditions.
- source_word: ἤγαγον αὐτοὺς πρὸς αὐτόν
  chosen: brought them to him
  alternatives:
  - led them to him
  lexicon: BDAG
  rationale: ἄγω commonly means bring/lead. In this context of bringing the sick to
    Jesus for healing, 'brought' is the most idiomatic English choice.
- source_word: ἑνὶ ἑκάστῳ αὐτῶν
  chosen: each one of them
  alternatives:
  - every one of them
  - to each of them
  lexicon: BDAG
  rationale: The doubled distributive expression emphasizes individual attention.
    'Each one of them' preserves that emphasis clearly.
- source_word: τὰς χεῖρας ἐπιτιθεὶς
  chosen: he laid his hands on
  alternatives:
  - placing his hands on
  - laying hands on
  lexicon: BDAG
  rationale: ἐπιτίθημι with χεῖρας is the standard idiom for laying hands on someone.
    'He laid his hands on' is natural English and retains the embodied action.
- source_word: ἐθεράπευεν
  chosen: healed
  alternatives:
  - was healing
  - cured
  lexicon: BDAG
  rationale: Imperfect verb portrays ongoing/repeated action as he attended to each
    person. English simple past 'healed' works idiomatically in sequence with the
    distributive phrase; the iterative sense is already conveyed by 'each one of them.'
    'Cured' is possible but less standard in Gospel healing narratives.
