theological_decisions:
- issue: Plural pronoun ἡμᾶς in demonic speech
  chosen_reading: Retained simply as 'us' without specifying the referent.
  alternative_readings:
  - the demon speaking for the demonic realm
  - the demon speaking for itself and the possessed man
  rationale: The Greek uses a first-person plural, but the text does not explicitly
    identify the scope of that plural. To preserve theological tension and avoid over-interpretation,
    the translation leaves it unelaborated.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological title ὁ ἅγιος τοῦ θεοῦ
  chosen_reading: Rendered as 'the Holy One of God' without doctrinal expansion.
  alternative_readings:
  - a messianic title
  - a title emphasizing consecration and divine mission
  rationale: The phrase clearly functions as a significant christological confession,
    but the verse itself does not unpack its full doctrinal implications. The translation
    preserves the title as stated, consistent with orthodox Christology while not
    importing later creedal language into the text.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
