id: LUK.4.34
reference: Luke 4:34
source:
  edition: SBLGNT
  text: ⸀Ἔα, τί ἡμῖν καὶ σοί, Ἰησοῦ Ναζαρηνέ; ἦλθες ἀπολέσαι ἡμᾶς; οἶδά σε τίς εἶ,
    ὁ ἅγιος τοῦ θεοῦ.
translation:
  text: Ha! What do you have to do with us, Jesus of Nazareth? Have you come to destroy
    us? I know who you are—the Holy One of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ah!' The interjection Ἔα is an abrupt cry of alarm or protest; some
      translations render the sense more interpretively as 'Leave us alone!'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'What to us and to you?'—a Semitic idiom expressing dissociation
      or hostile protest.
    reason: cultural_note
  - marker: c
    text: Or 'Jesus the Nazarene.'
    reason: alternative_reading
  - marker: d
    text: The plural 'us' is left unspecified in Greek and may refer to the demon
      alone in representative speech or more broadly to the demonic realm.
    reason: alternative_reading
  - marker: e
    text: Or 'God's Holy One.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔα
  chosen: Ha!
  alternatives:
  - Ah!
  - Leave us alone!
  lexicon: BDAG
  rationale: An exclamatory interjection expressing alarm or protest. 'Ha!' preserves
    the abrupt outcry without importing the fuller interpretive sense 'Leave us alone,'
    which is possible in context but less directly lexical.
- source_word: τί ἡμῖν καὶ σοί
  chosen: What do you have to do with us
  alternatives:
  - What have we to do with each other?
  - What is that to us and to you?
  lexicon: BDAG
  rationale: This idiom literally means 'what to us and to you,' a Semitic-style expression
    of dissociation or protest. The chosen rendering is idiomatic modern English while
    preserving the confrontational distance.
- source_word: Ἰησοῦ Ναζαρηνέ
  chosen: Jesus of Nazareth
  alternatives:
  - Jesus the Nazarene
  lexicon: BDAG
  rationale: Vocative address identifying Jesus by origin or epithet. 'Jesus of Nazareth'
    is the most natural English rendering and standard transliteration practice for
    names/titles of place association.
- source_word: ἦλθες
  chosen: Have you come
  alternatives:
  - Did you come
  lexicon: BDAG
  rationale: Aorist in direct question can be rendered idiomatically in English as
    present perfect, especially where the focus is on the present threatening arrival
    rather than simple past action.
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to ruin
  - to wipe out
  lexicon: BDAG
  rationale: Infinitive of ἀπόλλυμι here denotes destructive judgment. 'Destroy' is
    the clearest and most theologically neutral English equivalent in this confrontation
    scene.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Retained as plural, reflecting the demon's speech either for itself and
    other demons or for itself and the possessed man/the demonic realm. The text leaves
    the plural referent unstated, so the translation preserves that tension.
- source_word: οἶδά σε τίς εἶ
  chosen: I know who you are
  alternatives:
  - I know you—who you are
  lexicon: BDAG
  rationale: Straightforward rendering of the clause, preserving the demon's claim
    of recognition without embellishment.
- source_word: ὁ ἅγιος τοῦ θεοῦ
  chosen: the Holy One of God
  alternatives:
  - God's Holy One
  lexicon: BDAG
  rationale: A christological designation emphasizing consecration and unique relation
    to God. 'The Holy One of God' is more formally transparent to the Greek and preserves
    the title's weight.
