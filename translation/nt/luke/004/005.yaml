theological_decisions:
- issue: Nature of the devil's showing of the kingdoms
  chosen_reading: Render the event descriptively without specifying whether the showing
    was visionary, supernatural, or from a literal geographic vantage point.
  alternative_readings:
  - A visionary display
  - A literal sight from a high place
  rationale: The Greek states only that he 'showed him all the kingdoms of the inhabited
    world in a moment of time.' The translation should preserve the narrative claim
    without resolving the mechanism beyond what the text says.
  doctrine_reference: Preserve theological tension rather than resolve it.
