id: LUK.4.5
reference: Luke 4:5
source:
  edition: SBLGNT
  text: Καὶ ἀναγαγὼν ⸀αὐτὸν ἔδειξεν αὐτῷ πάσας τὰς βασιλείας τῆς οἰκουμένης ἐν στιγμῇ
    χρόνου·
translation:
  text: And after leading him up, he showed him all the kingdoms of the inhabited
    world in a moment of time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the world.' The Greek term often means 'the inhabited world' and
      can, in some contexts, refer more specifically to the civilized or imperial
      world.
    reason: lexical_alternative
  - marker: b
    text: Or 'in an instant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγαγὼν
  chosen: after leading him up
  alternatives:
  - taking him up
  - bringing him up
  lexicon: BDAG
  rationale: Aorist participle of ἀνάγω, literally 'to lead up' or 'bring up.' 'After
    leading him up' preserves the participial sequence and the upward movement without
    importing the location 'mountain,' which is explicit in Matthew's parallel but
    not here in Luke.
- source_word: ἔδειξεν
  chosen: he showed
  alternatives:
  - he displayed
  - he pointed out
  lexicon: BDAG
  rationale: Standard narrative sense of δείκνυμι. 'Showed' is natural modern English
    and fits the direct-object construction.
- source_word: πάσας τὰς βασιλείας
  chosen: all the kingdoms
  alternatives:
  - every kingdom
  - all the realms
  lexicon: BDAG
  rationale: βασιλεία here refers to kingdoms/realms rather than abstract kingship.
    The plural with πάσας is best rendered straightforwardly as 'all the kingdoms.'
- source_word: τῆς οἰκουμένης
  chosen: of the inhabited world
  alternatives:
  - of the world
  - of the whole world
  - of the empire
  lexicon: BDAG
  rationale: οἰκουμένη often denotes the inhabited world, sometimes with the nuance
    of the civilized or imperial world. 'Inhabited world' preserves the lexical specificity
    better than the flatter 'world,' while avoiding over-narrowing to 'Roman Empire'
    in this context.
- source_word: ἐν στιγμῇ χρόνου
  chosen: in a moment of time
  alternatives:
  - in an instant
  - in a flash
  lexicon: BDAG
  rationale: στιγμή denotes a point or instant; with χρόνου the phrase emphasizes
    extreme brevity. 'In a moment of time' is slightly more formal but closely reflects
    the Greek expression and preserves the temporal emphasis.
