id: LUK.4.25
reference: Luke 4:25
source:
  edition: SBLGNT
  text: ἐπ’ ἀληθείας δὲ λέγω ὑμῖν, πολλαὶ χῆραι ἦσαν ἐν ταῖς ἡμέραις Ἠλίου ἐν τῷ Ἰσραήλ,
    ὅτε ἐκλείσθη ὁ οὐρανὸς ⸀ἐπὶ ἔτη τρία καὶ μῆνας ἕξ, ὡς ἐγένετο λιμὸς μέγας ἐπὶ
    πᾶσαν τὴν γῆν,
translation:
  text: But I tell you truly, there were many widows in Israel in the days of Elijah,
    when the sky was shut up for three years and six months, as a great famine came
    over all the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavens were shut up.' The Greek uses 'heaven/sky' in an idiom for
      the withholding of rain.
    reason: lexical_alternative
  - marker: b
    text: Or 'over all the earth.' The Greek word can mean 'land' or 'earth'; here
      'land' fits the Elijah context best.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἀληθείας
  chosen: truly
  alternatives:
  - in truth
  - truthfully
  lexicon: BDAG
  rationale: Idiomatic prepositional expression meaning 'truly' or 'in truth.' 'Truly'
    is concise, natural English and preserves the emphatic force introducing a solemn
    assertion.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast or development from the preceding statement. 'But' best
    reflects the adversative force in context as Jesus sharpens his point.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common direct-speech formula. 'I tell you' is natural modern English
    while preserving the personal address and solemnity.
- source_word: πολλαὶ χῆραι
  chosen: many widows
  lexicon: BDAG
  rationale: Straightforward plural noun phrase; no reason to soften or expand.
- source_word: ἐν ταῖς ἡμέραις Ἠλίου
  chosen: in the days of Elijah
  alternatives:
  - during Elijah's days
  lexicon: BDAG
  rationale: Standard temporal idiom. 'Elijah' is the conventional English transliteration
    of Ἠλίας in this OT-prophet context.
- source_word: ἐν τῷ Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: BDAG
  rationale: Locative sense is primary here, referring to the nation/land of Israel.
    'In Israel' is the most natural and sufficiently precise rendering.
- source_word: ἐκλείσθη ὁ οὐρανός
  chosen: the sky was shut up
  alternatives:
  - heaven was shut
  - the heavens were shut up
  lexicon: BDAG
  rationale: Passive idiom referring to the withholding of rain. 'Sky' communicates
    the meteorological sense clearly in modern English, while 'shut up' preserves
    the metaphor of closure.
- source_word: ἐπὶ ἔτη τρία καὶ μῆνας ἕξ
  chosen: for three years and six months
  lexicon: BDAG
  rationale: ἐπί with an accusative of duration is naturally rendered 'for.' The phrase
    is kept fully explicit.
- source_word: ὡς ἐγένετο
  chosen: as ... came
  alternatives:
  - when ... came
  - so that ... came about
  lexicon: BDAG
  rationale: 'Here ὡς introduces the resulting circumstance/time: the shutting of
    the sky coincided with a great famine arising. ''As ... came'' preserves the flow
    without overformal wording.'
- source_word: λιμὸς μέγας
  chosen: a great famine
  alternatives:
  - a severe famine
  lexicon: BDAG
  rationale: Literal and natural. 'Great famine' preserves the adjective directly;
    'severe famine' is possible but slightly more interpretive.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  chosen: over all the land
  alternatives:
  - over the whole land
  - over all the earth
  lexicon: BDAG
  rationale: γῆ can mean 'land' or 'earth.' In the Elijah narrative setting, the reference
    is best understood as the affected land/region rather than the entire globe. 'Over
    all the land' preserves the scope without overstating it.
