theological_decisions:
- issue: Scope of γῆ in the famine statement
  chosen_reading: land/region rather than the entire earth
  alternative_readings:
  - earth/world
  rationale: The immediate allusion is to the Elijah narrative in Israel's historical
    setting. Rendering γῆ as 'land' avoids implying a global famine when the context
    points to a regional judgment. This is a contextual lexical decision, not a doctrinal
    narrowing.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
