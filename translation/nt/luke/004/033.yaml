id: LUK.4.33
reference: Luke 4:33
source:
  edition: SBLGNT
  text: καὶ ἐν τῇ συναγωγῇ ἦν ἄνθρωπος ἔχων πνεῦμα δαιμονίου ἀκαθάρτου, καὶ ἀνέκραξεν
    φωνῇ μεγάλῃ·
translation:
  text: And in the synagogue there was a man having an unclean spirit of a demon,
    and he cried out with a loud voice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an unclean spirit of a demon.' The Greek includes both 'spirit' and
      'demon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an unclean demon-spirit'.
    reason: previous_rendering
lexical_decisions:
- source_word: συναγωγῇ
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: Refers to the Jewish place of gathering/worship; 'synagogue' is the standard
    and contextually precise rendering.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The singular masculine refers to an adult male individual in the narrative,
    so 'man' is gender-accurate rather than generic.
- source_word: ἔχων
  chosen: having
  alternatives:
  - possessed by
  - with
  lexicon: BDAG
  rationale: The participle literally means 'having.' This preserves the Greek expression
    without importing the fuller interpretive gloss 'possessed by,' though the context
    clearly concerns demonic affliction.
- source_word: πνεῦμα δαιμονίου ἀκαθάρτου
  chosen: an unclean demon-spirit
  alternatives:
  - an unclean spirit of a demon
  - an unclean demonic spirit
  - an evil spirit
  lexicon: BDAG
  rationale: The phrase is somewhat pleonastic in Greek and combines πνεῦμα with the
    genitive δαιμονίου modified by ἀκαθάρτου. 'Unclean demon-spirit' preserves both
    elements compactly and avoids flattening the wording to merely 'evil spirit.'
- source_word: ἀνέκραξεν
  chosen: cried out
  alternatives:
  - shouted
  - screamed out
  lexicon: BDAG
  rationale: Aorist narrative verb meaning to cry out loudly; 'cried out' is natural
    English and preserves the force without overdramatizing.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: This dative phrase is idiomatically rendered 'with a loud voice.' It
    preserves the concrete imagery better than the adverb 'loudly'.
