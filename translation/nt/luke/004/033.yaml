theological_decisions:
- issue: Rendering of demonic terminology
  chosen_reading: an unclean demon-spirit
  alternative_readings:
  - an unclean spirit of a demon
  - an unclean spirit
  rationale: The Greek explicitly includes both πνεῦμα and δαιμόνιον, with ἀκαθάρτου
    modifying δαιμονίου. The chosen rendering preserves the text's full demonic terminology
    rather than simplifying it. This avoids minimizing the supernatural dimension
    while also not adding doctrinal claims beyond the wording.
  doctrine_reference: Translation philosophy §§1, 3, 5
revisions:
- timestamp: '2026-04-21T03:37:54Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/004/033.json
  category: awkward_english
  tier: 1
  from: an unclean demon-spirit
  to: an unclean spirit of a demon
  rationale: The Greek phrase is πνεῦμα δαιμονίου ἀκαθάρτου. While the drafter's intention
    to preserve both 'spirit' and 'demon' is commendable, the compound 'demon-spirit'
    is not a natural English construction and can sound awkward. Furthermore, the
    adjective ἀκαθάρτου ('unclean') most naturally modifies πνεῦμα ('spirit') in this
    construction (as supported by standard lexicons like BDAG). The rendering 'an
    unclean spirit of a demon' more accurately reflects this grammatical relationship
    in Greek and is more natural English, while still preserving all the original
    elements. This alternative is already present in the footnote.
