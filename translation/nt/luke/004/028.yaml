id: LUK.4.28
reference: Luke 4:28
source:
  edition: SBLGNT
  text: καὶ ἐπλήσθησαν πάντες θυμοῦ ἐν τῇ συναγωγῇ ἀκούοντες ταῦτα,
translation:
  text: And all in the synagogue were filled with anger when they heard these things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were filled with rage.' The Greek θυμός can denote intense anger or
      rage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθησαν
  chosen: were filled
  alternatives:
  - were filled up
  - became full
  lexicon: BDAG
  rationale: Aorist passive of πίμπλημι commonly means to be filled with something.
    'Were filled' is idiomatic and preserves the passive sense better than a more
    interpretive rendering like 'became furious'.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: The nominative plural refers collectively to the people present. 'All'
    works naturally with the implied group in the synagogue and keeps the concise
    force of the Greek.
- source_word: θυμοῦ
  chosen: with anger
  alternatives:
  - with wrath
  - with rage
  lexicon: BDAG
  rationale: θυμός here denotes intense anger. 'Anger' is the most natural modern
    English rendering and avoids overstating the term with 'wrath,' while 'rage' is
    possible but slightly more heightened than the context requires.
- source_word: ἐν τῇ συναγωγῇ
  chosen: in the synagogue
  alternatives:
  - at the synagogue
  lexicon: BDAG
  rationale: The prepositional phrase locates the group within the synagogue setting.
    'In the synagogue' is the straightforward spatial rendering.
- source_word: ἀκούοντες
  chosen: when they heard
  alternatives:
  - hearing
  - as they heard
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and gives
    the occasion for their anger. 'When they heard' is smoother English than a bare
    participle while preserving the temporal sense.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: The demonstrative plural points back to Jesus' preceding statements.
    'These things' is a standard and sufficiently broad rendering; 'these words' is
    possible but slightly more specific than the Greek requires.
