id: LUK.4.44
reference: Luke 4:44
source:
  edition: SBLGNT
  text: καὶ ἦν κηρύσσων ⸂εἰς τὰς συναγωγὰς⸃ τῆς ⸀Ἰουδαίας.
translation:
  text: And he was preaching in the synagogues of Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Galilee' instead of 'Judea.' The main text follows
      the reading 'Judea' in the Greek text used here.
    reason: textual_variant
lexical_decisions:
- source_word: ἦν κηρύσσων
  chosen: was preaching
  alternatives:
  - kept preaching
  - was proclaiming
  lexicon: BDAG
  rationale: The imperfect of εἰμί with the present participle κηρύσσων forms a periphrastic
    imperfect, conveying ongoing or repeated action in past time. 'Was preaching'
    preserves this aspect in natural English. 'Kept preaching' is possible but slightly
    more interpretive; 'was proclaiming' is lexically valid but 'preaching' better
    fits the public synagogue context.
- source_word: κηρύσσων
  chosen: preaching
  alternatives:
  - proclaiming
  - heralding
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. In synagogue ministry context, 'preaching'
    is the most idiomatic modern English rendering while still preserving the formal
    sense of proclamation.
- source_word: εἰς τὰς συναγωγάς
  chosen: in the synagogues
  alternatives:
  - into the synagogues
  - throughout the synagogues
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into,' with verbs of activity in Koine it
    can function idiomatically where English prefers 'in.' Here it indicates the location/sphere
    of his preaching rather than motion into the buildings. 'In the synagogues' is
    therefore the clearest and most natural rendering.
- source_word: συναγωγάς
  chosen: synagogues
  alternatives:
  - assembly halls
  lexicon: BDAG
  rationale: συναγωγή in this context refers to Jewish synagogue gatherings/places.
    'Synagogues' is the standard and transparent rendering.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - the land of the Jews
  - Galilee
  lexicon: BDAG
  rationale: Ἰουδαία normally denotes Judea/Judaea. Although the narrative context
    might lead some readers to expect 'Galilee,' the Greek text here reads 'Judea.'
    The translation follows the source text directly. Because this may reflect a broader
    regional usage or a textual/narrative tension, the issue is preserved in a footnote
    rather than harmonized.
