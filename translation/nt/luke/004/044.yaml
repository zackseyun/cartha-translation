theological_decisions:
- issue: Geographical reference τῆς Ἰουδαίας in light of the surrounding Galilean
    context
  chosen_reading: Judea
  alternative_readings:
  - Galilee (as found in some manuscripts/traditions or inferred by harmonization)
  - Judea in a broader sense including Jewish territory
  rationale: Original-language primacy requires retaining the attested SBLGNT reading
    'Judea' rather than harmonizing to the immediate context. The apparent tension
    should be preserved, not resolved by translation. An explanatory footnote records
    the alternative and the contextual issue.
  doctrine_reference: Translation philosophy §§1, 3
