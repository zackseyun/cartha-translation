id: LUK.4.4
reference: Luke 4:4
source:
  edition: SBLGNT
  text: καὶ ἀπεκρίθη ⸂πρὸς αὐτὸν ὁ Ἰησοῦς⸃· Γέγραπται ὅτι Οὐκ ἐπ’ ἄρτῳ μόνῳ ζήσεται
    ⸀ὁ ⸀ἄνθρωπος.
translation:
  text: 'And Jesus answered him, “It is written: Man will not live by bread alone.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “A person will not live by bread alone,” with the same generic sense
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: Jesus is quoting Deuteronomy 8:3.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπεκρίθη πρὸς αὐτόν
  chosen: answered him
  alternatives:
  - answered to him
  - replied to him
  lexicon: BDAG
  rationale: The idiom ἀποκρίνομαι with πρός + accusative is naturally rendered in
    English as 'answered him' rather than the more wooden 'answered to him.' This
    preserves the sense without unnecessary literalism.
- source_word: Γέγραπται
  chosen: It is written
  alternatives:
  - It stands written
  lexicon: BDAG
  rationale: The perfect passive is a standard citation formula in the Gospels. 'It
    is written' is idiomatic, readable, and preserves the enduring authority implied
    by the perfect tense.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: After a citation formula, ὅτι often functions to introduce quoted content.
    In English, punctuation with a colon is more natural than retaining 'that' before
    the quotation.
- source_word: ἐπ’ ἄρτῳ μόνῳ
  chosen: by bread alone
  alternatives:
  - on bread alone
  - by only bread
  lexicon: BDAG
  rationale: With ζήσεται, ἐπί here expresses the basis or means of sustaining life.
    'By bread alone' is idiomatic English and reflects the sense of dependence for
    life.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - shall live
  lexicon: BDAG
  rationale: The future middle is well represented by 'will live' in contemporary
    English. 'Shall live' is possible but sounds archaic for the stated translation
    philosophy.
- source_word: ὁ ἄνθρωπος
  chosen: Man
  alternatives:
  - the man
  - a person
  - humanity
  - humankind
  lexicon: BDAG
  rationale: Here ὁ ἄνθρωπος echoes the scriptural citation in a representative, generic
    sense. Per the project's gender-accurate philosophy, 'Man' preserves the masculine
    singular generic force better than flattening it to an abstract collective. Because
    modern readers may hear it narrowly, an inclusive alternative is worth preserving
    in a footnote.
