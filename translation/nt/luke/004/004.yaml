theological_decisions:
- issue: Rendering the generic singular ὁ ἄνθρωπος in a Scripture citation
  chosen_reading: Man
  alternative_readings:
  - a person
  - one
  - humanity
  - humankind
  rationale: The verse quotes Deut 8:3 and uses the masculine singular generically.
    The project's doctrine calls for gender-accurate rendering over gender-neutral
    smoothing where the source has representative masculine force. Retaining 'Man'
    preserves the wording and intertextual resonance, while an inclusive explanatory
    alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
