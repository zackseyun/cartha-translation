id: LUK.4.2
reference: Luke 4:2
source:
  edition: SBLGNT
  text: ἡμέρας τεσσεράκοντα πειραζόμενος ὑπὸ τοῦ διαβόλου. καὶ οὐκ ἔφαγεν οὐδὲν ἐν
    ταῖς ἡμέραις ἐκείναις, καὶ συντελεσθεισῶν ⸀αὐτῶν ἐπείνασεν.
translation:
  text: for forty days, being tempted by the devil. And he ate nothing during those
    days, and when they were completed, he was hungry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being tested.' The Greek verb can mean either 'tempt' or 'test,' though
      'tempted' best fits the context here because the agent is the devil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας τεσσεράκοντα
  chosen: for forty days
  alternatives:
  - forty days
  lexicon: BDAG
  rationale: Accusative of extent/duration is naturally rendered in English with 'for.'
    This makes the temporal force explicit and idiomatic without adding meaning.
- source_word: πειραζόμενος
  chosen: being tempted
  alternatives:
  - being tested
  lexicon: BDAG
  rationale: πειράζω can mean 'tempt' or 'test.' In this context, with ὑπὸ τοῦ διαβόλου
    ('by the devil'), 'tempted' best fits the hostile moral sense. 'Tested' is possible
    lexically but weaker in this immediate context.
- source_word: ὑπὸ τοῦ διαβόλου
  chosen: by the devil
  alternatives:
  - by the slanderer
  lexicon: BDAG
  rationale: διάβολος here functions as the recognized personal designation/title
    for Satan in the Gospel context, so 'the devil' is the clearest standard English
    rendering. The more etymological 'slanderer' would obscure the referent.
- source_word: οὐκ ἔφαγεν οὐδὲν
  chosen: he ate nothing
  alternatives:
  - he did not eat anything
  lexicon: BDAG
  rationale: This preserves the emphatic negation straightforwardly in natural English.
    Both alternatives are accurate; 'ate nothing' is slightly more concise and forceful.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: during those days
  alternatives:
  - in those days
  lexicon: BDAG
  rationale: The phrase marks the time span of the fasting. 'During those days' communicates
    duration more clearly in contemporary English than the more literal 'in those
    days.'
- source_word: συντελεσθεισῶν αὐτῶν
  chosen: when they were completed
  alternatives:
  - when they had ended
  - after they were finished
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a temporal clause. 'When they
    were completed' closely reflects the passive verbal idea of the Greek while remaining
    readable.
- source_word: ἐπείνασεν
  chosen: he was hungry
  alternatives:
  - he became hungry
  - he hungered
  lexicon: BDAG
  rationale: The aorist verb denotes the onset/result of hunger after the forty days.
    'He was hungry' is idiomatic modern English and captures the sense well; 'he became
    hungry' is more wooden, and 'he hungered' is archaic.
