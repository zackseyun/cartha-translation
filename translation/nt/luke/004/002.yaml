theological_decisions:
- issue: Rendering πειραζόμενος in relation to Jesus' experience in the wilderness
  chosen_reading: being tempted
  alternative_readings:
  - being tested
  rationale: The translation preserves the plain lexical sense in context without
    importing a broader doctrinal explanation about the nature of Christ's temptability.
    The agent 'the devil' makes 'tempted' the most contextually appropriate rendering,
    while the alternative is preserved because πειράζω can bear either nuance in some
    contexts.
  doctrine_reference: Preserve theological tension rather than resolve it.
