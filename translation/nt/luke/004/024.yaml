id: LUK.4.24
reference: Luke 4:24
source:
  edition: SBLGNT
  text: εἶπεν δέ· Ἀμὴν λέγω ὑμῖν ὅτι οὐδεὶς προφήτης δεκτός ἐστιν ἐν τῇ πατρίδι αὐτοῦ.
translation:
  text: And he said, “Truly I tell you, no prophet is accepted in his hometown.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his native place” or “in his homeland.” The Greek πατρίς can refer
      to one’s hometown, home region, or homeland; here “hometown” fits the Nazareth
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δέ
  chosen: And he said
  alternatives:
  - But he said
  - Then he said
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative discourse. 'And he
    said' is natural modern English and preserves the flow without overstating contrast.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  - Certainly
  lexicon: BDAG
  rationale: In Jesus' sayings, ἀμήν introduces a solemn affirmation. 'Truly' communicates
    the force idiomatically in English better than a bare transliteration 'Amen' in
    this context.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: The phrase is a common discourse formula. 'I tell you' is slightly more
    natural in contemporary English while preserving the direct address and solemnity.
- source_word: οὐδεὶς προφήτης
  chosen: no prophet
  alternatives:
  - not one prophet
  lexicon: BDAG
  rationale: This is the straightforward negated subject construction. 'No prophet'
    is concise and idiomatic.
- source_word: δεκτός
  chosen: accepted
  alternatives:
  - welcome
  - received
  - favorable
  lexicon: BDAG
  rationale: δεκτός here refers to being favorably received. 'Accepted' best captures
    the social and evaluative sense in a concise way. 'Welcome' is possible, but 'accepted'
    better matches the predicate adjective's broader sense.
- source_word: ἐν τῇ πατρίδι αὐτοῦ
  chosen: in his hometown
  alternatives:
  - in his own country
  - in his native place
  - in his homeland
  lexicon: BDAG
  rationale: πατρίς can denote one's home region, native place, or homeland. In Luke
    4 the immediate setting is Nazareth, so 'hometown' best fits the local narrative
    context and reads naturally in English.
