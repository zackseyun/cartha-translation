theological_decisions:
- issue: Implication of Simon’s marital status from πενθερά
  chosen_reading: Render the kinship term directly as 'mother-in-law' without drawing
    further doctrinal or historical conclusions in the translation.
  rationale: The verse plainly identifies Simon as having a mother-in-law, which implies
    marriage, but the translation should not expand beyond the lexical meaning of
    the term.
  doctrine_reference: Affirmations; Translation philosophy 1, 6
- issue: Nuance of the request in ἠρώτησαν αὐτὸν περὶ αὐτῆς
  chosen_reading: Use 'asked him about her' in the main text.
  alternative_readings:
  - appealed to him for her
  - asked him to help her
  rationale: The context suggests an appeal for healing, but the Greek expression
    is less explicit than those fuller renderings. Preserving the lighter wording
    maintains textual restraint while allowing the contextual nuance to be noted in
    a footnote.
  doctrine_reference: Translation philosophy 1, 3, 6
