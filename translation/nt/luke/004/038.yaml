id: LUK.4.38
reference: Luke 4:38
source:
  edition: SBLGNT
  text: Ἀναστὰς δὲ ⸀ἀπὸ τῆς συναγωγῆς εἰσῆλθεν εἰς τὴν οἰκίαν Σίμωνος. πενθερὰ δὲ
    τοῦ Σίμωνος ἦν συνεχομένη πυρετῷ μεγάλῳ, καὶ ἠρώτησαν αὐτὸν περὶ αὐτῆς.
translation:
  text: And after rising from the synagogue, he entered Simon’s house. Now Simon’s
    mother-in-law was afflicted with a high fever, and they asked him about her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they appealed to him for her.' The Greek wording is literally 'they
      asked him concerning/about her,' and in context likely implies a request for
      help.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστὰς
  chosen: after rising
  alternatives:
  - having risen
  - getting up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, used here as a temporal participle preceding
    the main verb. 'After rising' preserves the sequence naturally in English without
    over-literal stiffness.
- source_word: ἀπὸ τῆς συναγωγῆς
  chosen: from the synagogue
  alternatives:
  - away from the synagogue
  lexicon: BDAG
  rationale: ἀπό with the genitive marks movement away from a place. 'From the synagogue'
    is the plain and idiomatic rendering.
- source_word: εἰσῆλθεν εἰς τὴν οἰκίαν Σίμωνος
  chosen: he entered Simon’s house
  alternatives:
  - he went into Simon’s house
  - he entered the house of Simon
  lexicon: BDAG
  rationale: εἰσέρχομαι with εἰς indicates entry into a location. 'Entered Simon’s
    house' is concise and natural while preserving the motion.
- source_word: πενθερὰ τοῦ Σίμωνος
  chosen: Simon’s mother-in-law
  alternatives:
  - the mother-in-law of Simon
  lexicon: BDAG
  rationale: πενθερά specifically means 'mother-in-law.' The genitive indicates possession/relationship.
    This straightforwardly implies Simon was married, but the translation should simply
    render the kinship term.
- source_word: ἦν συνεχομένη
  chosen: was afflicted
  alternatives:
  - was suffering
  - was being held fast
  - was oppressed
  lexicon: BDAG
  rationale: The periphrastic construction with συνέχω in the passive participle conveys
    being gripped or afflicted by an illness. 'Was afflicted' communicates the passive
    force and the seriousness of the condition in readable English.
- source_word: πυρετῷ μεγάλῳ
  chosen: with a high fever
  alternatives:
  - by a great fever
  - with a severe fever
  lexicon: BDAG
  rationale: πυρετός is 'fever'; μέγας here idiomatically intensifies the illness.
    'High fever' is standard modern English and reflects the medical sense well.
- source_word: ἠρώτησαν αὐτὸν περὶ αὐτῆς
  chosen: they asked him about her
  alternatives:
  - they appealed to him for her
  - they asked him concerning her
  lexicon: BDAG
  rationale: ἐρωτάω can mean ask/request. In this healing context, the sense likely
    includes an appeal on her behalf, but 'asked him about her' stays close to the
    Greek wording and avoids importing more than the text explicitly states.
