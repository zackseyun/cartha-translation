theological_decisions:
- issue: Scripture citation formula (Εἴρηται)
  chosen_reading: It is said
  alternative_readings:
  - It is written
  - It has been said
  rationale: The Greek verb is λέγω in the perfect passive, not γράφω. Because the
    translation philosophy prioritizes original-language primacy over inherited tradition,
    the main text keeps 'said.' The traditional 'It is written' is preserved in a
    footnote because readers may expect it in a Scripture-quotation context.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
- issue: Rendering of κύριος in a citation of Deuteronomy 6:16
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek text has κύριον, and the doctrine defaults specify 'Lord' for
    κύριος. Since this quotation ultimately refers to YHWH in the Hebrew source, 'the
    LORD' is a meaningful contextual alternative, but the translation follows the
    Greek form in the main text.
  doctrine_reference: 'Contested terms table: κύριος → Lord; יְהוָה → the LORD'
