id: LUK.4.12
reference: Luke 4:12
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς εἶπεν αὐτῷ ὁ Ἰησοῦς ὅτι Εἴρηται· Οὐκ ἐκπειράσεις κύριον τὸν
    θεόν σου.
translation:
  text: 'And Jesus answered him, “It is said: You shall not put the Lord your God
    to the test.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English often has “It is written.” The Greek here literally
      says “It is said.”
    reason: alternative_reading
  - marker: b
    text: This quotes Deuteronomy 6:16, where the Hebrew has the divine name YHWH,
      often rendered “the LORD.”
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered
  alternatives:
  - answered and said
  - replying, said
  lexicon: BDAG
  rationale: This participle + finite verb is a common Semitic-influenced Greek idiom
    meaning 'answered' or 'replied.' Rendering it simply as 'answered' gives natural
    modern English without losing meaning.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun referring to the devil/tempting interlocutor in context;
    standard English object pronoun is appropriate.
- source_word: ὅτι
  chosen: —
  alternatives:
  - that
  lexicon: BDAG
  rationale: After 'answered him,' English idiom does not require an explicit 'that.'
    The content of the quotation is introduced directly.
- source_word: Εἴρηται
  chosen: It is said
  alternatives:
  - It has been said
  - It is written
  lexicon: BDAG
  rationale: Perfect passive of λέγω literally means 'it has been said' / 'it stands
    said.' In citation formulae it refers to authoritative Scripture. 'It is said'
    preserves the Greek wording more closely than the traditional 'It is written,'
    while still conveying scriptural authority.
- source_word: Οὐκ ἐκπειράσεις
  chosen: You shall not put ... to the test
  alternatives:
  - You shall not test
  - You shall not tempt
  lexicon: BDAG
  rationale: ἐκπειράζω means to test thoroughly, put to the test, or try. 'Put to
    the test' is clear modern English and avoids the misleading English sense of 'tempt'
    as enticing to sin.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' With the article and
    following apposition 'your God,' English reads naturally as 'the Lord your God.'
- source_word: τὸν θεόν σου
  chosen: your God
  lexicon: BDAG
  rationale: Standard rendering of the accusative phrase in apposition to 'the Lord,'
    preserving the covenantal wording of the Deuteronomy citation.
