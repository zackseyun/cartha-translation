id: LUK.4.36
reference: Luke 4:36
source:
  edition: SBLGNT
  text: καὶ ἐγένετο θάμβος ἐπὶ πάντας, καὶ συνελάλουν πρὸς ἀλλήλους λέγοντες· Τίς
    ὁ λόγος οὗτος ὅτι ἐν ἐξουσίᾳ καὶ δυνάμει ἐπιτάσσει τοῖς ἀκαθάρτοις πνεύμασιν,
    καὶ ἐξέρχονται;
translation:
  text: And amazement came upon everyone, and they were speaking with one another,
    saying, “What is this word, that with authority and power he commands the unclean
    spirits, and they come out?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What is this message?” The Greek word logos can mean “word,” “message,”
      or “matter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: θάμβος
  chosen: amazement
  alternatives:
  - astonishment
  - wonder
  lexicon: BDAG
  rationale: θάμβος denotes a state of astonishment or amazement. 'Amazement' is natural
    modern English and preserves the force without sounding archaic.
- source_word: ἐγένετο ... ἐπὶ πάντας
  chosen: came upon everyone
  alternatives:
  - fell on all
  - came over everyone
  lexicon: BDAG
  rationale: The idiom ἐγένετο ... ἐπί conveys something coming upon people. 'Came
    upon everyone' is idiomatic and reflects the Greek construction better than a
    flat 'there was.'
- source_word: πάντας
  chosen: everyone
  alternatives:
  - all
  - everyone present
  lexicon: BDAG
  rationale: The masculine plural has collective force here, referring to the gathered
    people generally. 'Everyone' communicates the inclusive sense in natural English.
- source_word: συνελάλουν πρὸς ἀλλήλους
  chosen: they were speaking with one another
  alternatives:
  - they discussed among themselves
  - they kept talking to each other
  lexicon: BDAG
  rationale: The imperfect suggests ongoing exchange, and the reciprocal phrase πρὸς
    ἀλλήλους means mutual conversation. 'Were speaking with one another' preserves
    both features without overinterpreting the content as formal 'discussion.'
- source_word: Τίς ὁ λόγος οὗτος
  chosen: What is this word
  alternatives:
  - What is this message
  - What kind of word is this
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'matter.' Here the crowd reacts
    to Jesus' authoritative utterance/command. 'What is this word' keeps the Greek's
    compactness and leaves the nuance broad enough to include both speech and message.
- source_word: ὅτι
  chosen: that
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content explaining the crowd''s astonishment:
    namely, that Jesus commands with authority and power. ''That'' best fits the explanatory
    content clause.'
- source_word: ἐν ἐξουσίᾳ καὶ δυνάμει
  chosen: with authority and power
  alternatives:
  - in authority and power
  - with power and authority
  lexicon: BDAG
  rationale: ἐν plus dative here is instrumental or modal. 'With authority and power'
    is idiomatic English. The order follows the Greek, preserving the emphasis on
    rightful authority alongside effective power.
- source_word: ἐξουσίᾳ
  chosen: authority
  alternatives:
  - rightful authority
  - commanding authority
  lexicon: BDAG
  rationale: ἐξουσία denotes authority, right, or delegated power. 'Authority' is
    the standard and sufficiently broad rendering here.
- source_word: δυνάμει
  chosen: power
  alternatives:
  - might
  - force
  lexicon: BDAG
  rationale: δύναμις here refers to effective power. 'Power' is the clearest modern
    equivalent and pairs naturally with 'authority.'
- source_word: ἐπιτάσσει
  chosen: he commands
  alternatives:
  - he orders
  - he gives orders to
  lexicon: BDAG
  rationale: ἐπιτάσσω means to command or order. 'He commands' is concise and preserves
    the present-tense vividness of the report.
- source_word: τοῖς ἀκαθάρτοις πνεύμασιν
  chosen: the unclean spirits
  alternatives:
  - impure spirits
  lexicon: BDAG
  rationale: ἀκάθαρτος is literally 'unclean.' In Gospel exorcism contexts, 'unclean
    spirits' is the established and accurate rendering, preserving the Jewish purity
    background better than the more interpretive 'impure spirits.'
- source_word: ἐξέρχονται
  chosen: they come out
  alternatives:
  - they go out
  - they depart
  lexicon: BDAG
  rationale: ἐξέρχομαι literally means 'go out/come out.' In English exorcism contexts,
    'come out' is the most natural rendering for spirits leaving a person.
