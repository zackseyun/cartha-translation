theological_decisions:
- issue: Rendering of demonic beings in exorcism context
  chosen_reading: the unclean spirits
  alternative_readings:
  - impure spirits
  rationale: The phrase should preserve the Gospel's terminology without reducing
    it to a vague psychological or metaphorical expression. 'Unclean spirits' reflects
    the Greek and the narrative's supernatural framework in line with historic Christian
    orthodoxy, while avoiding unnecessary paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
