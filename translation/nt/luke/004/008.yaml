theological_decisions:
- issue: Rendering of κύριος in a Scripture citation referring to God
  chosen_reading: Lord
  alternative_readings:
  - Master
  - LORD
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default. Although
    the underlying Hebrew in Deuteronomy refers to YHWH, the Greek text here reads
    κύριον, and the project's contested-terms guidance prefers 'Lord' rather than
    importing 'LORD' into the NT main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; YHWH → the LORD
    in Hebrew contexts'
