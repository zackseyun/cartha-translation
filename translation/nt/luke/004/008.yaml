id: LUK.4.8
reference: Luke 4:8
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ⸂ὁ Ἰησοῦς εἶπεν αὐτῷ⸃· Γέγραπται· ⸂Κύριον τὸν θεόν σου προσκυνήσεις⸃
    καὶ αὐτῷ μόνῳ λατρεύσεις.
translation:
  text: 'And Jesus answered him, “It is written: ‘You shall worship the Lord your
    God, and you shall serve him only.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “You shall bow down to the Lord your God.”
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Deuteronomy 6:13.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι introducing Jesus' response. English
    idiom is best served by folding the participle into the finite verb phrase 'answered,'
    preserving the responsive sense without awkwardness.
- source_word: Γέγραπται
  chosen: It is written
  alternatives:
  - It has been written
  lexicon: BDAG
  rationale: Perfect passive commonly functions as a scriptural citation formula.
    'It is written' is the established and natural English equivalent that preserves
    the abiding authority implied by the perfect.
- source_word: Κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, render as 'Lord.' In this citation from
    Deuteronomy, the term carries covenantal and scriptural weight rather than the
    weaker 'master.'
- source_word: θεόν σου
  chosen: your God
  lexicon: BDAG
  rationale: Direct rendering of the accusative phrase with possessive pronoun, preserving
    the covenantal relationship expressed in the source.
- source_word: προσκυνήσεις
  chosen: you shall worship
  alternatives:
  - you shall bow down to
  lexicon: BDAG
  rationale: In context of exclusive devotion to God, προσκυνέω is best rendered 'worship.'
    'Bow down to' is more literal but can understate the religious force in English.
- source_word: λατρεύσεις
  chosen: you shall serve
  alternatives:
  - you shall render sacred service to
  lexicon: BDAG
  rationale: λατρεύω denotes service rendered to a deity. 'Serve' is concise and natural,
    while the surrounding context of worship and exclusivity preserves the cultic
    sense.
- source_word: μόνῳ
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: 'Placed with αὐτῷ, the adjective conveys exclusivity: ''him only.'' This
    is idiomatic English and preserves the emphasis that service belongs exclusively
    to God.'
- source_word: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτῷ
  chosen: And Jesus answered him
  alternatives:
  - And answering, Jesus said to him
  lexicon: BDAG
  rationale: 'The Greek uses a participle plus main verb construction common in narrative.
    The chosen rendering is smoother modern English while preserving all semantic
    components: conjunction, subject, response, and indirect object.'
