theological_decisions:
- issue: Whether the verse should imply a miraculous escape or remain descriptively
    neutral
  chosen_reading: 'Descriptively neutral wording: ''passing through their midst, went
    on his way'''
  alternative_readings:
  - Miraculous implication such as 'supernaturally passed through them'
  rationale: The Greek narrates Jesus' movement through the crowd without explicitly
    stating the mechanism. To preserve theological tension and avoid importing a miracle
    claim the text does not directly make, the translation remains neutral while allowing
    readers to infer the significance from context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
