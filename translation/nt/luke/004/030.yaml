id: LUK.4.30
reference: Luke 4:30
source:
  edition: SBLGNT
  text: αὐτὸς δὲ διελθὼν διὰ μέσου αὐτῶν ἐπορεύετο.
translation:
  text: But he, passing through their midst, went on his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the middle of them.' The Greek describes Jesus moving through
      the crowd without stating how this occurred.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicitly present and somewhat emphatic in Greek. English
    naturally requires the subject pronoun, so 'he' carries the sense without overloading
    the line. The stronger alternative 'he himself' is possible but sounds more marked
    in English than the context requires.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the crowd's hostile intent
    in the previous verse to Jesus' unharmed departure. 'But' best captures that adversative
    force here.
- source_word: διελθὼν
  chosen: passing through
  alternatives:
  - going through
  - having passed through
  lexicon: BDAG
  rationale: The aorist participle from διέρχομαι denotes movement through a space.
    'Passing through' is idiomatic modern English and preserves the participial relation
    to the main verb without sounding wooden.
- source_word: διὰ μέσου αὐτῶν
  chosen: through their midst
  alternatives:
  - through the middle of them
  - through among them
  lexicon: BDAG
  rationale: The phrase means movement through the middle or midst of the group. 'Through
    their midst' is concise and slightly elevated but still readable, preserving the
    vivid spatial sense better than the flatter 'among them.'
- source_word: ἐπορεύετο
  chosen: went on his way
  alternatives:
  - went away
  - was going
  - continued on
  lexicon: BDAG
  rationale: The imperfect middle/passive form of πορεύομαι presents ongoing or progressive
    movement. 'Went on his way' communicates continued departure in natural English
    better than the overly bare 'went away' or the awkwardly literal 'was going.'
