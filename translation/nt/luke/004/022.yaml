id: LUK.4.22
reference: Luke 4:22
source:
  edition: SBLGNT
  text: καὶ πάντες ἐμαρτύρουν αὐτῷ καὶ ἐθαύμαζον ἐπὶ τοῖς λόγοις τῆς χάριτος τοῖς
    ἐκπορευομένοις ἐκ τοῦ στόματος αὐτοῦ, καὶ ἔλεγον· ⸂Οὐχὶ υἱός ἐστιν Ἰωσὴφ οὗτος⸃;
translation:
  text: And all were speaking well of him and were marveling at the gracious words
    coming from his mouth, and they were saying, “Is this not Joseph’s son?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were bearing witness to him.' The Greek expression can mean either that
      they spoke favorably of him or that they testified about him; in this context
      the favorable sense best fits the parallel 'were marveling.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the words of grace'—that is, words marked by grace, favor, or attractiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρουν αὐτῷ
  chosen: were speaking well of him
  alternatives:
  - were bearing witness to him
  - were testifying about him
  lexicon: BDAG
  rationale: The idiom here most naturally conveys a favorable response rather than
    formal testimony. In this context, paired with 'were marveling,' it indicates
    approval or commendation of Jesus rather than courtroom-like witness. English
    'speaking well of him' captures the sense clearly for modern readers.
- source_word: ἐθαύμαζον
  chosen: were marveling
  alternatives:
  - were amazed
  - were wondering
  lexicon: BDAG
  rationale: The imperfect suggests ongoing reaction. 'Marveling' preserves the sense
    of astonished admiration without overstating it as shock alone.
- source_word: ἐπὶ τοῖς λόγοις
  chosen: at the ... words
  alternatives:
  - because of the ... words
  - over the ... words
  lexicon: BDAG
  rationale: With ἐπί and the dative, the phrase marks the basis or occasion of their
    amazement. 'At the words' is idiomatic English and fits the emotional response.
- source_word: τῆς χάριτος
  chosen: gracious
  alternatives:
  - of grace
  - grace-filled
  - graciously spoken
  lexicon: BDAG
  rationale: 'The genitive can be understood qualitatively: words characterized by
    grace or favor. ''Gracious words'' is natural English and preserves the likely
    sense of attractive, favor-laden speech. ''Words of grace'' is more literal but
    less idiomatic and can sound overly technical in English.'
- source_word: τοῖς ἐκπορευομένοις ἐκ τοῦ στόματος αὐτοῦ
  chosen: coming from his mouth
  alternatives:
  - proceeding from his mouth
  - coming out of his mouth
  lexicon: BDAG
  rationale: The participial phrase modifies 'words' and emphasizes their source.
    'Coming from his mouth' is readable modern English while retaining the concrete
    imagery of the Greek.
- source_word: Οὐχὶ
  chosen: Is this not
  alternatives:
  - Isn't this
  - Surely this is
  lexicon: BDAG
  rationale: Οὐχί introduces a question expecting an affirmative answer. 'Is this
    not' preserves that rhetorical force more transparently than the contraction 'Isn't
    this,' while remaining natural enough in English Bible style.
- source_word: υἱός ἐστιν Ἰωσὴφ οὗτος
  chosen: Joseph’s son
  alternatives:
  - the son of Joseph
  - a son of Joseph
  lexicon: BDAG
  rationale: The genitive Ἰωσὴφ is possessive. 'Joseph’s son' is concise and idiomatic.
    The anarthrous construction does not require the English article here.
