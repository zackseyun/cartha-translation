theological_decisions:
- issue: Reference to Jesus as Joseph's son in light of the virgin conception
  chosen_reading: Render the crowd's statement straightforwardly as 'Joseph’s son'
    without qualification.
  alternative_readings:
  - Render more distantly, such as 'the son of Joseph' with explanatory nuance
  - Add interpretive wording to avoid misunderstanding
  rationale: The verse reports the crowd's perception, not the narrator's doctrinal
    correction. Historic orthodoxy affirmed in the project includes the virgin conception,
    but the translation must not import that clarification into the crowd's speech.
    The text's dramatic tension is preserved by translating their statement plainly.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
