theological_decisions:
- issue: Whether Jesus' rebuke of the fever should be rendered in a way that implies
    personification or demonic causation
  chosen_reading: Retain the literal wording 'rebuked the fever' without adding explanation
  alternative_readings:
  - He spoke sharply to her fever
  - He rebuked the illness
  rationale: The Greek directly states that Jesus rebuked the fever. Rendering it
    literally preserves Luke's presentation of Jesus' authority without importing
    a specific theory about whether the illness was demonic or merely personified.
  doctrine_reference: Preserve theological tension rather than resolve it.
