id: LUK.4.39
reference: Luke 4:39
source:
  edition: SBLGNT
  text: καὶ ἐπιστὰς ἐπάνω αὐτῆς ἐπετίμησεν τῷ πυρετῷ, καὶ ἀφῆκεν αὐτήν· παραχρῆμα
    δὲ ἀναστᾶσα διηκόνει αὐτοῖς.
translation:
  text: And standing over her, he rebuked the fever, and it left her. Immediately
    she got up and began serving them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fever left her.' The Greek explicitly presents the fever as the
      thing rebuked and the implied subject that departed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστὰς
  chosen: standing over
  alternatives:
  - having stood over
  - coming and standing over
  lexicon: BDAG
  rationale: Aorist participle of ἐφίστημι here describes Jesus' physical position
    relative to the woman. 'Standing over' is natural English and preserves the concrete
    scene better than a more interpretive rendering.
- source_word: ἐπάνω αὐτῆς
  chosen: over her
  alternatives:
  - above her
  lexicon: BDAG
  rationale: The prepositional phrase reinforces proximity and position. 'Over her'
    is idiomatic and fits the healing setting without adding interpretive detail.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned
  - commanded sternly
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means 'rebuke' in exorcism and healing contexts in
    the Gospels. Retaining 'rebuked' preserves Luke's wording and the authoritative
    tone of Jesus' action.
- source_word: τῷ πυρετῷ
  chosen: the fever
  alternatives:
  - her fever
  lexicon: BDAG
  rationale: The dative object with the article is most directly 'the fever.' Although
    English often says 'her fever,' the Greek presents the fever itself as the addressed
    object, which fits the verb 'rebuked.'
- source_word: ἀφῆκεν αὐτήν
  chosen: it left her
  alternatives:
  - the fever left her
  - it departed from her
  lexicon: BDAG
  rationale: The understood subject is the fever. 'It left her' is concise, natural
    English and preserves the result without overformal wording.
- source_word: παραχρῆμα
  chosen: Immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb emphasizes the immediacy of the healing. 'Immediately' is
    clear modern English and matches Luke's stress on sudden restoration.
- source_word: ἀναστᾶσα
  chosen: she got up
  alternatives:
  - rising
  - having risen
  - she stood up
  lexicon: BDAG
  rationale: The participle marks her prompt response after healing. 'She got up'
    is idiomatic and readable while preserving the action.
- source_word: διηκόνει
  chosen: began serving
  alternatives:
  - served
  - was serving
  - ministered to
  lexicon: BDAG
  rationale: The imperfect verb conveys ongoing or inceptive action. 'Began serving'
    captures the onset of her service in response to immediate healing better than
    a simple past, while avoiding the churchly ambiguity of 'ministered.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative plural refers to the group present. English naturally expresses
    this with 'serving them'; adding 'to' is possible but less smooth.
