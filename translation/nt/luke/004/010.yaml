theological_decisions:
- issue: Rendering of the Psalm citation in Satan's quotation
  chosen_reading: A close rendering that preserves the scriptural citation form without importing the omitted continuation from Psalm 91:11.
  alternative_readings:
  - Traditional phrasing such as 'give his angels charge over thee'
  - Expanded harmonization with the fuller Psalm wording
  rationale: The verse quotes Scripture, but Luke records only the portion cited here. The translation should reflect Luke's wording as given, not silently complete the Psalm quotation. This preserves textual integrity and avoids importing words not present in the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 5
revisions:
- timestamp: '2026-04-21T12:39:21Z'
