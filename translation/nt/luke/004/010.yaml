id: LUK.4.10
reference: Luke 4:10
source:
  edition: SBLGNT
  text: γέγραπται γὰρ ὅτι Τοῖς ἀγγέλοις αὐτοῦ ἐντελεῖται περὶ σοῦ τοῦ διαφυλάξαι σε,
translation:
  text: 'For it is written: ‘He will command his angels concerning you—to guard you,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “about you.”
    reason: lexical_alternative
  - marker: b
    text: Or “to protect you.”
    reason: lexical_alternative
  - marker: c
    text: Or 'concerning you, to guard you'.
    reason: previous_rendering
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the perfect passive used for Scripture citation; preserves the ongoing authority implied by the perfect without awkward English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this quotation to the preceding temptation statement.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: After 'it is written,' English naturally introduces the quotation with punctuation rather than an explicit 'that,' while preserving the content-introducing function.
- source_word: Τοῖς ἀγγέλοις αὐτοῦ
  chosen: his angels
  alternatives:
  - the angels of him
  lexicon: BDAG
  rationale: Natural English possessive rendering of the dative phrase; 'angels' is the straightforward lexical equivalent of ἄγγελοι here.
- source_word: ἐντελεῖται
  chosen: he will command
  alternatives:
  - he will give orders
  - he will instruct
  lexicon: BDAG
  rationale: Future middle of ἐντέλλομαι conveys giving a charge or command. 'He will command' is concise, natural, and matches the Psalm citation tradition without becoming wooden.
- source_word: περὶ σοῦ
  chosen: concerning you
  alternatives:
  - about you
  - for you
  lexicon: BDAG
  rationale: περί with genitive here means 'concerning/about.' 'Concerning you' best reflects the Greek and the wording of the cited Scripture.
- source_word: τοῦ διαφυλάξαι σε
  chosen: to guard you
  alternatives:
  - to protect you
  - to keep you safe
  lexicon: BDAG
  rationale: 'Articular infinitive expressing purpose/result: the angels are commanded with reference to guarding Jesus. ''Guard'' preserves the protective sense of διαφυλάσσω more formally than ''keep you safe'' while remaining readable.'
