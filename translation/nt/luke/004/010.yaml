  from: concerning you, to guard you
  to: concerning you—to guard you
  rationale: The Greek `τοῦ διαφυλάξαι σε` is an articular infinitive of purpose, explaining the goal of the command issued 'concerning you.' While the comma in the current draft is grammatically correct and used in other major translations (e.g., ESV), an em-dash could more emphatically signal this explanatory relationship to the modern reader. It clearly sets off the purpose clause, potentially improving readability and flow.
