theological_decisions:
- issue: Nature of fulfillment claim
  chosen_reading: Render Jesus' statement as a present declaration of scriptural fulfillment
    without expanding what or how the fulfillment occurs.
  alternative_readings:
  - Interpretively expanding to 'Today this prophecy is fulfilled by me as you hear
    it'
  rationale: The Greek states fulfillment of 'this Scripture' in the audience's hearing
    but does not explicitly add 'prophecy' or 'by me,' though the context implies
    Jesus' self-identification. The translation preserves the text's theological force
    without importing explanatory wording not present in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
