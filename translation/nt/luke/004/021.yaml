id: LUK.4.21
reference: Luke 4:21
source:
  edition: SBLGNT
  text: ἤρξατο δὲ λέγειν πρὸς αὐτοὺς ὅτι Σήμερον πεπλήρωται ἡ γραφὴ αὕτη ἐν τοῖς ὠσὶν
    ὑμῶν.
translation:
  text: Then he began to say to them, “Today this Scripture has been fulfilled in
    your hearing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in your ears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω idiomatically introduces the beginning of Jesus'
    speech. 'Began' is the standard natural English equivalent and preserves the narrative
    sense without overtranslation.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    gives smooth English discourse flow and reflects the transition from the reading
    to Jesus' statement.
- source_word: λέγειν
  chosen: to say
  alternatives:
  - to speak
  lexicon: BDAG
  rationale: The complementary infinitive with ἤρξατο is best rendered 'began to say.'
    'Say' fits the direct quotation that follows more precisely than the broader 'speak.'
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - to those present
  lexicon: BDAG
  rationale: πρός with the accusative after a speech verb commonly indicates the audience
    addressed. 'To them' is direct and sufficient.
- source_word: Σήμερον
  chosen: Today
  alternatives:
  - This day
  lexicon: BDAG
  rationale: σήμερον is temporal and emphatic in position. 'Today' is the natural
    modern English rendering and preserves the immediacy of fulfillment.
- source_word: πεπλήρωται
  chosen: has been fulfilled
  alternatives:
  - is fulfilled
  - has come to fulfillment
  lexicon: BDAG
  rationale: Perfect passive indicative of πληρόω denotes a completed action with
    present result. 'Has been fulfilled' captures both the passive form and the perfect
    aspect better than the more static 'is fulfilled.'
- source_word: ἡ γραφὴ αὕτη
  chosen: this Scripture
  alternatives:
  - this passage of Scripture
  - this writing
  lexicon: BDAG
  rationale: γραφή in this context refers to the scriptural text just read from Isaiah.
    'This Scripture' is concise, idiomatic, and preserves the recognized sacred-text
    sense.
- source_word: ἐν τοῖς ὠσὶν ὑμῶν
  chosen: in your hearing
  alternatives:
  - in your ears
  - while you hear it
  lexicon: BDAG
  rationale: The idiom literally reads 'in your ears,' but in English 'in your hearing'
    better conveys that the fulfillment is occurring as they hear the text/read proclamation.
    This is an optimal-equivalence rendering of the Greek idiom.
