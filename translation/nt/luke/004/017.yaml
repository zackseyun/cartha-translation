id: LUK.4.17
reference: Luke 4:17
source:
  edition: SBLGNT
  text: καὶ ἐπεδόθη αὐτῷ βιβλίον ⸂τοῦ προφήτου Ἠσαΐου⸃ καὶ ⸀ἀναπτύξας τὸ βιβλίον εὗρεν
    τὸν τόπον οὗ ἦν γεγραμμένον·
translation:
  text: 'And the scroll of the prophet Isaiah was handed to him, and after unrolling
    the scroll, he found the place where it was written:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'book.' The Greek word βιβλίον can denote a written document generally,
      but in this synagogue setting it most likely refers to a scroll.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδόθη
  chosen: was handed
  alternatives:
  - was given
  - was handed over
  lexicon: BDAG
  rationale: A passive verb meaning to give or hand over. 'Was handed' fits the synagogue-reading
    setting naturally and reads idiomatically in English without overstating the force
    of the verb.
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  - scroll-roll
  lexicon: BDAG
  rationale: In this first-century synagogue context, βιβλίον refers to a scroll rather
    than a codex-style book. 'Scroll' reflects the historical form of the object more
    accurately than the traditional 'book'.
- source_word: τοῦ προφήτου Ἠσαΐου
  chosen: of the prophet Isaiah
  alternatives:
  - of Isaiah the prophet
  lexicon: BDAG
  rationale: The genitive construction is most naturally rendered 'of the prophet
    Isaiah.' This preserves both the identification of the scroll and Isaiah's prophetic
    title.
- source_word: ἀναπτύξας
  chosen: after unrolling
  alternatives:
  - having unrolled
  - opening
  lexicon: BDAG
  rationale: The aorist participle denotes action prior to the main verb εὗρεν. 'After
    unrolling' clearly conveys sequence and suits a scroll better than the more generic
    'opening.'
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he located
  lexicon: BDAG
  rationale: A straightforward rendering of εὑρίσκω. 'Found' is natural English and
    does not imply difficulty beyond the Greek.
- source_word: τόπον
  chosen: the place
  alternatives:
  - the passage
  - the section
  lexicon: BDAG
  rationale: Literally 'place.' While it refers to a location in the text, 'the place'
    preserves the concrete wording and remains clear in English.
- source_word: οὗ ἦν γεγραμμένον
  chosen: where it was written
  alternatives:
  - where this had been written
  - where it stood written
  lexicon: BDAG
  rationale: This relative clause introduces the quotation that follows. 'Where it
    was written' is clear modern English and adequately reflects the periphrastic
    perfect sense without sounding archaic.
