theological_decisions:
- issue: Rendering of the Psalm citation in readable modern English while preserving
    its protective imagery
  chosen_reading: Use 'they will carry you' rather than the more traditional 'they
    will bear you up'
  alternative_readings:
  - they will bear you up
  rationale: No doctrinal issue is altered; the choice is stylistic within optimal
    equivalence. The main aim is accessible modern English while preserving the sense
    of angelic protection in the quoted Scripture.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
