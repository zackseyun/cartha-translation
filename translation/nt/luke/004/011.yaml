id: LUK.4.11
reference: Luke 4:11
source:
  edition: SBLGNT
  text: καὶ ⸀ὅτι Ἐπὶ χειρῶν ἀροῦσίν σε μήποτε προσκόψῃς πρὸς λίθον τὸν πόδα σου.
translation:
  text: and, ‘On their hands they will carry you, lest you strike your foot against
    a stone.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will bear you up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you dash your foot against a stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction continuing the quotation from the previous
    verse.
- source_word: ὅτι
  chosen: ‘
  alternatives:
  - that
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of the cited Scripture rather than functioning
    as a separately translated conjunction in smooth English. Its force is represented
    by continuing the quotation.
- source_word: Ἐπὶ χειρῶν
  chosen: On their hands
  alternatives:
  - Upon their hands
  - In their hands
  lexicon: BDAG
  rationale: A fairly literal rendering of the prepositional phrase. 'On their hands'
    preserves the imagery of being borne up by angelic hands.
- source_word: ἀροῦσίν σε
  chosen: they will carry you
  alternatives:
  - they will bear you up
  - they will lift you up
  lexicon: BDAG
  rationale: Future of αἴρω here means to lift/carry. 'Carry you' is clear modern
    English; 'bear you up' is traditional and possible, but slightly more archaic.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: BDAG
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and accurately
    reflects the warning/preventive sense.
- source_word: προσκόψῃς
  chosen: you strike
  alternatives:
  - you stumble
  - you dash
  lexicon: BDAG
  rationale: In context with 'foot' and 'against a stone,' the verb refers to striking
    or hitting against something. 'Strike' is natural and sufficiently concrete. 'Stumble'
    is possible but less direct with the object phrase; 'dash' is stronger and more
    traditional from some English versions.
- source_word: πρὸς λίθον
  chosen: against a stone
  alternatives:
  - on a stone
  - toward a stone
  lexicon: BDAG
  rationale: With προσκόπτω, πρός conveys contact against an object. 'Against a stone'
    best matches idiomatic English.
- source_word: τὸν πόδα σου
  chosen: your foot
  alternatives:
  - your feet
  lexicon: BDAG
  rationale: Singular in Greek, so singular is retained in English.
