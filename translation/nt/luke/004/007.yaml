theological_decisions:
- issue: Whether προσκυνέω should be rendered as a neutral gesture ('bow down') or
    as religious homage ('worship')
  chosen_reading: worship
  alternative_readings:
  - bow down before me
  - prostrate yourself before me
  rationale: In Luke 4:7 the temptation concerns giving to the devil the homage due
    to God alone, as confirmed by Jesus' reply in the following verse citing worship
    of the Lord. Rendering προσκυνέω as 'worship' preserves the theological gravity
    without importing more than the context warrants.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
