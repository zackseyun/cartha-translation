id: LUK.4.7
reference: Luke 4:7
source:
  edition: SBLGNT
  text: σὺ οὖν ἐὰν προσκυνήσῃς ἐνώπιον ἐμοῦ, ἔσται σοῦ πᾶσα.
translation:
  text: Therefore, if you worship before me, it will all be yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bow down before me.' The Greek verb can denote prostration or worship;
      here 'worship' is used because the context concerns giving religious homage
      to the devil.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: Second-person singular pronoun is explicit in Greek for emphasis, but
    English normally conveys this without adding an emphatic reflexive. The emphasis
    is sufficiently carried by word order and the direct address.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν marks an inferential or consequential step in the devil's offer.
    'Therefore' preserves the logical connection more clearly than the lighter 'then'
    or 'so'.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - if indeed
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. Simple 'if' is
    the natural English equivalent.
- source_word: προσκυνήσῃς
  chosen: worship
  alternatives:
  - bow down
  - prostrate yourself
  lexicon: BDAG
  rationale: προσκυνέω can denote bowing/prostration or worship. In this temptation
    context, the act is not mere physical obeisance but religious homage offered to
    the devil, so 'worship' best captures the theological force.
- source_word: ἐνώπιον ἐμοῦ
  chosen: before me
  alternatives:
  - in my presence
  lexicon: BDAG
  rationale: 'The prepositional phrase is spatial-relational: ''before me'' is concise
    and idiomatic, preserving the sense of rendering homage in Satan''s presence.'
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί functions as a simple future copula here. 'It will
    be' is natural modern English.
- source_word: σοῦ
  chosen: yours
  alternatives:
  - belonging to you
  lexicon: BDAG
  rationale: Genitive pronoun after ἔσται is idiomatically possessive in English.
    'Yours' is the clearest rendering.
- source_word: πᾶσα
  chosen: all
  alternatives:
  - the whole of it
  - all of it
  lexicon: BDAG
  rationale: Feminine singular πᾶσα refers back elliptically to the domain/glory of
    the kingdoms mentioned in the previous verse. English requires an explicit or
    idiomatic object; 'all' captures the totality without over-specifying a noun absent
    in this verse.
