theological_decisions:
- issue: Meaning of cleansing language in relation to leprosy
  chosen_reading: Render ἐκαθαρίσθη as 'was cleansed' rather than reducing it to merely
    medical 'was healed.'
  alternative_readings:
  - was healed
  - was purified
  rationale: The verse echoes the biblical idiom in which leprosy involves both physical
    affliction and ceremonial uncleanness. 'Was cleansed' preserves that scriptural
    register without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Force of Naaman's ethnic designation
  chosen_reading: Retain 'the Syrian' in the main text.
  alternative_readings:
  - a Syrian
  rationale: 'The article in Greek supports an identifying designation. Keeping ''the
    Syrian'' preserves the rhetorical force of Jesus'' example: the recipient of cleansing
    was a known foreigner rather than one of the many in Israel.'
  doctrine_reference: Translation philosophy §1, §5
