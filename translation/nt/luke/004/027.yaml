id: LUK.4.27
reference: Luke 4:27
source:
  edition: SBLGNT
  text: καὶ πολλοὶ λεπροὶ ἦσαν ⸂ἐν τῷ Ἰσραὴλ ἐπὶ Ἐλισαίου τοῦ προφήτου⸃, καὶ οὐδεὶς
    αὐτῶν ἐκαθαρίσθη, εἰ μὴ Ναιμὰν ὁ Σύρος.
translation:
  text: And there were many lepers in Israel in the time of Elisha the prophet, and
    none of them was cleansed except Naaman the Syrian.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λεπροὶ
  chosen: lepers
  alternatives:
  - people with leprosy
  - leprous people
  lexicon: BDAG
  rationale: A conventional, concise rendering of the substantival adjective meaning
    those afflicted with a skin disease identified as leprosy in biblical usage. 'People
    with leprosy' is possible in modern English, but 'lepers' preserves the compactness
    and directness of the Greek.
- source_word: ἐν τῷ Ἰσραὴλ
  chosen: in Israel
  alternatives:
  - among Israel
  - in the land of Israel
  lexicon: BDAG
  rationale: The prepositional phrase most naturally denotes location or sphere. 'In
    Israel' is idiomatic and sufficiently broad, matching the Greek without over-specifying
    land or people.
- source_word: ἐπὶ Ἐλισαίου τοῦ προφήτου
  chosen: in the time of Elisha the prophet
  alternatives:
  - during Elisha the prophet
  - in the days of Elisha the prophet
  lexicon: BDAG
  rationale: With ἐπί plus genitive in a temporal expression, the sense is 'in the
    time/days of.' 'In the time of' is clear modern English and avoids awkward literalism.
- source_word: ἐκαθαρίσθη
  chosen: was cleansed
  alternatives:
  - was purified
  - was healed
  lexicon: BDAG
  rationale: καθαρίζω in this context refers to ritual/physical cleansing from leprosy.
    'Was cleansed' preserves the biblical and theological resonance better than the
    flatter 'was healed,' while remaining natural English.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - if not
  lexicon: BDAG
  rationale: 'Here the idiom marks an exception: none was cleansed except Naaman.
    ''Except'' is the most natural English equivalent.'
- source_word: Ναιμὰν ὁ Σύρος
  chosen: Naaman the Syrian
  alternatives:
  - Naaman, the Syrian
  lexicon: BDAG
  rationale: Standard transliteration of the personal name with the ethnic designation
    rendered as an appositional title. This preserves the contrast that the one cleansed
    was a Syrian, not an Israelite.
