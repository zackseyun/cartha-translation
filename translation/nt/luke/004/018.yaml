theological_decisions:
- issue: Meaning of ἄφεσις in this Isaianic citation
  chosen_reading: release/liberation
  alternative_readings:
  - forgiveness
  rationale: In Luke 4:18 the immediate collocations are captives, blind, and the
    broken/oppressed, all pointing to liberation imagery from Isaiah. While Luke elsewhere
    uses ἄφεσις prominently for forgiveness of sins, here the lexical field is broader
    and social-restorative. The translation preserves that tension by using 'release'
    in the main text and noting the alternative in a footnote.
  doctrine_reference: Translation philosophy §3; Contested terms table encourages
    preserving theological tension where ambiguity is genuine.
