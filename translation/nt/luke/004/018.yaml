id: LUK.4.18
reference: Luke 4:18
source:
  edition: SBLGNT
  text: Πνεῦμα κυρίου ἐπ’ ἐμέ, οὗ εἵνεκεν ἔχρισέν με εὐαγγελίσασθαι πτωχοῖς, ἀπέσταλκέν
    ⸀με κηρύξαι αἰχμαλώτοις ἄφεσιν καὶ τυφλοῖς ἀνάβλεψιν, ἀποστεῖλαι τεθραυσμένους
    ἐν ἀφέσει,
translation:
  text: The Spirit of the Lord is upon me, because he has anointed me to proclaim
    good news to the poor. He has sent me to proclaim release to the captives and
    recovery of sight to the blind, to send out the oppressed in release,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgiveness' for 'release' (Greek ἄφεσις); here the context of captives
      and the oppressed favors liberation language.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who have been broken'; 'the oppressed' renders the idiomatic
      sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πνεῦμα κυρίου
  chosen: The Spirit of the Lord
  alternatives:
  - The Lord's Spirit
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered as possession/source: ''the
    Spirit of the Lord.'' This preserves the Isaianic background and standard NT sense
    of πνεῦμα with κύριος.'
- source_word: ἐπ’ ἐμέ
  chosen: is upon me
  alternatives:
  - rests on me
  lexicon: BDAG
  rationale: Although no explicit finite verb appears in Greek, English idiom requires
    one. 'Is upon me' closely reflects ἐπί with accusative in this citation context
    and preserves the scriptural cadence.
- source_word: οὗ εἵνεκεν
  chosen: because
  alternatives:
  - for this reason
  - on account of which
  lexicon: BDAG
  rationale: This idiom gives the reason for the Spirit's being upon Jesus. 'Because'
    is natural modern English and accurately conveys the causal force.
- source_word: ἔχρισέν με
  chosen: he has anointed me
  alternatives:
  - he anointed me
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect here to fit the ongoing
    force of the commissioning in context and the following perfect ἀπέσταλκέν. 'Anointed'
    preserves the messianic resonance of χρίω.
- source_word: εὐαγγελίσασθαι πτωχοῖς
  chosen: to proclaim good news to the poor
  alternatives:
  - to preach the gospel to the poor
  - to bring good news to the poor
  lexicon: BDAG
  rationale: εὐαγγελίζω means to announce good news. 'Proclaim good news' is clear
    modern English and avoids ecclesiastical jargon while preserving the heraldic
    sense. πτωχοῖς is rendered 'the poor,' whether materially poor or socially lowly,
    without over-specifying.
- source_word: ἀπέσταλκέν με
  chosen: He has sent me
  alternatives:
  - he sent me
  lexicon: BDAG
  rationale: The perfect indicates a completed sending with continuing effect. English
    present perfect best captures that nuance.
- source_word: κηρύξαι
  chosen: to proclaim
  alternatives:
  - to preach
  - to announce
  lexicon: BDAG
  rationale: κηρύσσω is public heralding. 'Proclaim' is both accurate and readable,
    and it matches the formal public sense better than the narrower ecclesial 'preach.'
- source_word: αἰχμαλώτοις ἄφεσιν
  chosen: release to the captives
  alternatives:
  - freedom to the captives
  - forgiveness to the captives
  lexicon: BDAG
  rationale: ἄφεσις can mean release, liberation, or forgiveness depending on context.
    Here, with αἰχμαλώτοις and the Isaianic liberation context, 'release' is the best
    primary rendering. 'Forgiveness' would import a narrower moral sense not explicit
    here.
- source_word: τυφλοῖς ἀνάβλεψιν
  chosen: recovery of sight to the blind
  alternatives:
  - sight to the blind
  lexicon: BDAG
  rationale: ἀνάβλεψις specifically denotes receiving sight or regaining sight. 'Recovery
    of sight' preserves the lexical force more precisely than the simpler 'sight.'
- source_word: ἀποστεῖλαι
  chosen: to send out
  alternatives:
  - to send away
  - to set free
  lexicon: BDAG
  rationale: The infinitive continues the purpose/result sequence. 'Send out' keeps
    the verbal connection to ἀποστέλλω rather than collapsing it immediately into
    an interpretive paraphrase.
- source_word: τεθραυσμένους
  chosen: the oppressed
  alternatives:
  - those who have been broken
  - the crushed
  lexicon: BDAG
  rationale: Perfect passive participle from θραύω literally means 'having been broken/shattered.'
    In this liberation context, 'the oppressed' communicates the idiomatic sense in
    readable English, while the more literal alternative is worth preserving in a
    footnote.
- source_word: ἐν ἀφέσει
  chosen: in release
  alternatives:
  - free
  - in freedom
  - with release
  lexicon: BDAG
  rationale: The phrase is somewhat wooden if translated hyper-literally. 'In release'
    preserves the repeated noun ἄφεσις and the rhetorical linkage with the earlier
    clause better than smoothing it to 'free.'
