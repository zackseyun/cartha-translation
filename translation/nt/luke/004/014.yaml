theological_decisions:
- issue: Referent of πνεύματος
  chosen_reading: the Spirit refers to the Holy Spirit
  alternative_readings:
  - a non-specific spirit
  rationale: Luke 4 is saturated with references to the Holy Spirit in Jesus' temptation
    and ministry inauguration. Rendering 'the Spirit' preserves the Greek wording
    while recognizing the contextual referent without importing extra wording into
    the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
