id: LUK.4.14
reference: Luke 4:14
source:
  edition: SBLGNT
  text: Καὶ ὑπέστρεψεν ὁ Ἰησοῦς ἐν τῇ δυνάμει τοῦ πνεύματος εἰς τὴν Γαλιλαίαν. καὶ
    φήμη ἐξῆλθεν καθ’ ὅλης τῆς περιχώρου περὶ αὐτοῦ.
translation:
  text: And Jesus returned to Galilee in the power of the Spirit, and a report about
    him went out through all the surrounding region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'news,' 'fame,' or 'rumor' for 'a report.' The Greek term can denote
      a report that spreads widely, without specifying whether it is positive or negative.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέστρεψεν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: Aorist indicative of ὑποστρέφω commonly means 'return' in narrative movement.
    'Returned' is natural modern English and preserves the directional sense without
    unnecessary expansion.
- source_word: ἐν τῇ δυνάμει
  chosen: in the power
  alternatives:
  - with power
  - by the power
  lexicon: BDAG
  rationale: The prepositional phrase is retained fairly formally as 'in the power,'
    which preserves Luke's wording and conveys the sphere or manner of Jesus' return
    without over-interpreting instrumentality.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - of the Holy Spirit
  - of the spirit
  lexicon: BDAG
  rationale: In Luke's immediate context, πνεῦμα refers to the Holy Spirit (cf. preceding
    verses), so 'the Spirit' is the clearest and most contextually faithful rendering.
    'Holy' is not explicit here, so it is not added to the main text.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: to Galilee
  alternatives:
  - into Galilee
  lexicon: BDAG
  rationale: English idiom prefers 'to Galilee' for travel destination. 'Into' is
    possible but less natural here.
- source_word: φήμη
  chosen: a report
  alternatives:
  - news
  - fame
  - rumor
  lexicon: BDAG
  rationale: φήμη denotes report/news spreading about someone. 'A report' avoids the
    potentially misleading positive connotation of 'fame' and the potentially negative
    connotation of 'rumor,' while fitting the narrative context.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: BDAG
  rationale: The literal motion metaphor is preserved with 'went out.' 'Spread' is
    interpretive and smoother, but 'went out' better reflects the Greek while remaining
    understandable.
- source_word: καθ’ ὅλης τῆς περιχώρου
  chosen: through all the surrounding region
  alternatives:
  - throughout the whole surrounding region
  - through all that region around
  lexicon: BDAG
  rationale: περίχωρος refers to the surrounding district/region. The phrase 'through
    all the surrounding region' captures κατά with the genitive ('throughout') and
    keeps the geographic sense clear in natural English.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: '''About him'' is the most natural contemporary rendering and fully conveys
    the referential sense of περί with the genitive.'
