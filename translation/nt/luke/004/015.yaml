id: LUK.4.15
reference: Luke 4:15
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ἐδίδασκεν ἐν ταῖς συναγωγαῖς αὐτῶν, δοξαζόμενος ὑπὸ πάντων.
translation:
  text: And he was teaching in their synagogues, being glorified by all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being praised by all' or 'being honored by all.' The Greek participle
      δοξαζόμενος can denote public praise or honor; 'being glorified' preserves the
      word's connection to glory language.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this verse to the preceding narrative. 'And'
    preserves the simple coordination without adding temporal nuance not explicit
    in the Greek.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and can be mildly emphatic, but in English
    the subject pronoun is required anyway. Rendering simply as 'he' avoids overstating
    emphasis while preserving the referent to Jesus.
- source_word: ἐδίδασκεν
  chosen: was teaching
  alternatives:
  - taught
  lexicon: BDAG
  rationale: Imperfect verb form indicates ongoing or customary action in past time.
    'Was teaching' preserves the imperfective aspect better than the simple past 'taught.'
- source_word: ἐν ταῖς συναγωγαῖς αὐτῶν
  chosen: in their synagogues
  alternatives:
  - in the synagogues of them
  - in their synagogue assemblies
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'Their synagogues' is natural English
    and preserves the genitive pronoun, likely referring to the communities of Galilee
    just mentioned in context.
- source_word: δοξαζόμενος
  chosen: being glorified
  alternatives:
  - being praised
  - being honored
  lexicon: BDAG
  rationale: The participle from δοξάζω literally carries the sense of being glorified,
    honored, or praised. 'Being glorified' keeps the lexical connection to glory and
    avoids flattening the term, while still fitting the context of public acclaim.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  lexicon: BDAG
  rationale: The preposition ὑπό with genitive marks agency. 'By all' is concise and
    formally close; it conveys broad public approval without specifying every individual
    exhaustively.
