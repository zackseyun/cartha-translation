theological_decisions:
- issue: Rendering δοξαζόμενος in relation to Jesus
  chosen_reading: being glorified by all
  alternative_readings:
  - being praised by all
  - being honored by all
  rationale: Because δοξάζω can denote praise or honor in human response, the phrase
    here describes widespread favorable reception of Jesus' teaching. 'Being glorified'
    preserves the stronger lexical sense and allows Luke's glory language to remain
    visible without importing a fuller theological claim beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §5
