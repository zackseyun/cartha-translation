theological_decisions:
- issue: Whether to smooth the plural σάββασιν into an English singular for idiom
  chosen_reading: on the Sabbaths
  alternative_readings:
  - on the Sabbath
  rationale: This is not a major doctrinal issue, but it affects how the reader perceives
    Jesus's ministry pattern. Preserving the plural maintains the Greek's likely iterative
    sense and avoids collapsing repeated synagogue teaching into a single event.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
