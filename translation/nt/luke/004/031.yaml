id: LUK.4.31
reference: Luke 4:31
source:
  edition: SBLGNT
  text: Καὶ κατῆλθεν εἰς Καφαρναοὺμ πόλιν τῆς Γαλιλαίας. καὶ ἦν διδάσκων αὐτοὺς ἐν
    τοῖς σάββασιν·
translation:
  text: And he went down to Capernaum, a city of Galilee. And he was teaching them
    on the Sabbaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically in English, ''on the Sabbath.'' The Greek is plural:
      ''on the Sabbaths,'' likely indicating repeated Sabbath occasions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῆλθεν
  chosen: went down
  alternatives:
  - came down
  - went to
  lexicon: BDAG
  rationale: The aorist of κατέρχομαι commonly means 'go down' or 'come down.' 'Went
    down' preserves the directional sense present in the Greek, likely reflecting
    travel from the higher elevation of Nazareth to Capernaum, without overinterpreting
    perspective.
- source_word: Καφαρναοὺμ
  chosen: Capernaum
  alternatives:
  - Kapharnaoum
  rationale: Personal and place names are transliterated by standard English convention
    per translation philosophy.
- source_word: πόλιν τῆς Γαλιλαίας
  chosen: a city of Galilee
  alternatives:
  - a city in Galilee
  - the city of Galilee
  lexicon: BDAG
  rationale: The anarthrous πόλιν is best rendered indefinitely as 'a city.' The genitive
    τῆς Γαλιλαίας is naturally adjectival or locative in sense; 'of Galilee' is slightly
    more formal and closely follows the Greek while remaining natural English.
- source_word: ἦν διδάσκων
  chosen: was teaching
  alternatives:
  - taught
  - continued teaching
  lexicon: BDAG
  rationale: The imperfect of εἰμί with a present participle conveys ongoing or progressive
    action. 'Was teaching' preserves the durative aspect better than the simple past
    'taught.'
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - the people
  lexicon: BDAG
  rationale: The pronoun has no explicit antecedent noun in this verse, so the simple
    pronoun 'them' best reflects the Greek without adding interpretive specificity.
- source_word: ἐν τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath days
  lexicon: BDAG
  rationale: The dative plural σάββασιν is most naturally rendered 'on the Sabbaths,'
    indicating repeated Sabbath occasions rather than a single Sabbath. This fits
    the imperfect-progressive sense of the clause. Although English often idiomatically
    uses the singular 'on the Sabbath,' the plural nuance is significant enough to
    preserve in the main text.
