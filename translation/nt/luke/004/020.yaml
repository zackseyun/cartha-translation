theological_decisions:
- issue: Historical form of βιβλίον in synagogue worship
  chosen_reading: Rendered as 'scroll' rather than the more generic 'book.'
  alternative_readings:
  - book
  rationale: This is not a doctrinal dispute but a translation-philosophy decision
    favoring the source setting over inherited English tradition. It improves historical
    precision without changing meaning.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
