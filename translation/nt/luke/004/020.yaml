id: LUK.4.20
reference: Luke 4:20
source:
  edition: SBLGNT
  text: καὶ πτύξας τὸ βιβλίον ἀποδοὺς τῷ ὑπηρέτῃ ἐκάθισεν· καὶ πάντων ⸂οἱ ὀφθαλμοὶ
    ἐν τῇ συναγωγῇ⸃ ἦσαν ἀτενίζοντες αὐτῷ.
translation:
  text: And after rolling up the scroll, giving it back to the attendant, he sat down.
    And the eyes of everyone in the synagogue were fixed on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'book.' The Greek word can mean a written document more generally, but
      in this synagogue setting it would have been a scroll.
    reason: lexical_alternative
  - marker: b
    text: That is, the synagogue attendant responsible for handling the scrolls.
    reason: cultural_note
lexical_decisions:
- source_word: πτύξας
  chosen: rolling up
  alternatives:
  - closing
  - folding up
  lexicon: BDAG
  rationale: Refers to rolling up a scroll rather than closing a codex; 'rolling up'
    best matches the physical object in this synagogue setting and is more precise
    than the traditional 'closed.'
- source_word: βιβλίον
  chosen: scroll
  alternatives:
  - book
  lexicon: BDAG
  rationale: Although βιβλίον can mean 'book' broadly, in a first-century synagogue
    reading context the object read from Isaiah would have been a scroll. This is
    an optimal-equivalence rendering that reflects the historical form of the object.
- source_word: ἀποδοὺς
  chosen: giving ... back
  alternatives:
  - returning
  - handing back
  lexicon: BDAG
  rationale: The compound verb implies returning something to its proper holder after
    use. 'Giving it back' is natural English and preserves that sense.
- source_word: ὑπηρέτῃ
  chosen: attendant
  alternatives:
  - servant
  - assistant
  - officer
  lexicon: BDAG
  rationale: In synagogue context this refers to the attendant who handled the scrolls
    and assisted in the service. 'Attendant' is clearer and less misleading than 'servant'
    in modern English.
- source_word: ἐκάθισεν
  chosen: he sat down
  alternatives:
  - he sat
  lexicon: BDAG
  rationale: Straightforward narrative action. 'Sat down' is idiomatic English and
    fits the teaching posture implied in the setting without overexplaining it in
    the main text.
- source_word: πάντων
  chosen: everyone
  alternatives:
  - all
  - all the people
  lexicon: BDAG
  rationale: 'Used with ''the eyes'' as a genitive of the whole: ''the eyes of everyone.''
    This avoids awkwardly literal English while preserving the universal scope.'
- source_word: οἱ ὀφθαλμοὶ
  chosen: the eyes
  alternatives:
  - everyone's eyes
  - their eyes
  lexicon: BDAG
  rationale: The Greek explicitly uses 'the eyes' as the subject; retaining it preserves
    the vividness of the scene.
- source_word: ἀτενίζοντες
  chosen: were fixed on
  alternatives:
  - were looking intently at
  - were staring at
  lexicon: BDAG
  rationale: The participle conveys sustained, intent gaze. 'Were fixed on' is natural
    English that preserves the intensity without implying hostility or rudeness as
    'staring' might.
- source_word: συναγωγῇ
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this narrative setting the institutional and physical sense 'synagogue'
    is clearly intended.
