id: LUK.4.23
reference: Luke 4:23
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτούς· Πάντως ἐρεῖτέ μοι τὴν παραβολὴν ταύτην· Ἰατρέ, θεράπευσον
    σεαυτόν· ὅσα ἠκούσαμεν γενόμενα ⸂εἰς τὴν Καφαρναοὺμ⸃ ποίησον καὶ ὧδε ἐν τῇ πατρίδι
    σου.
translation:
  text: And he said to them, “Surely you will say to me this proverb, ‘Physician,
    heal yourself.’ Whatever we have heard happened in Capernaum, do here also in
    your hometown.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the things we heard happened to/in Capernaum.' The Greek
      uses εἰς ('to/into'), but the sense in context is locative.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντως
  chosen: Surely
  alternatives:
  - Certainly
  - No doubt
  lexicon: BDAG
  rationale: Conveys the adverb's emphatic sense that Jesus anticipates their response
    with confidence. 'Surely' is natural modern English and fits the predictive force
    of the future verb.
- source_word: ἐρεῖτέ μοι
  chosen: you will say to me
  alternatives:
  - you will tell me
  lexicon: BDAG
  rationale: Future indicative is best preserved as prediction rather than command
    or possibility. 'Say to me' is the most direct rendering of λέγω + dative.
- source_word: παραβολὴν
  chosen: proverb
  alternatives:
  - parable
  - illustration
  - saying
  lexicon: BDAG
  rationale: In this context παραβολή refers to a proverbial saying rather than an
    extended narrative parable. 'Proverb' best matches the concise maxim 'Physician,
    heal yourself.'
- source_word: Ἰατρέ
  chosen: Physician
  alternatives:
  - Doctor
  - Healer
  lexicon: BDAG
  rationale: Vocative noun referring to a medical practitioner. 'Physician' preserves
    the proverbial tone and avoids the modern casual feel of 'Doctor.'
- source_word: θεράπευσον σεαυτόν
  chosen: heal yourself
  alternatives:
  - cure yourself
  lexicon: BDAG
  rationale: Aorist imperative gives a direct proverbial command. 'Heal yourself'
    is idiomatic English and preserves the force of the saying.
- source_word: ὅσα ἠκούσαμεν γενόμενα
  chosen: Whatever we have heard happened
  alternatives:
  - What we have heard took place
  - The things we heard happened
  lexicon: BDAG
  rationale: ὅσα introduces the content of what was heard; γενόμενα denotes events
    that occurred. 'Whatever we have heard happened' is concise and natural while
    preserving the reported nature of the knowledge.
- source_word: εἰς τὴν Καφαρναοὺμ
  chosen: in Capernaum
  alternatives:
  - at Capernaum
  - into Capernaum
  lexicon: BDAG
  rationale: Although εἰς literally means 'into/to,' with verbs of happening it can
    function idiomatically for location. English 'happened in Capernaum' best conveys
    the sense. The more literal preposition is preserved in a footnote as a lexical
    alternative.
- source_word: ποίησον καὶ ὧδε
  chosen: do here also
  alternatives:
  - do also here
  - do here too
  lexicon: BDAG
  rationale: 'Aorist imperative ποίησον is broad: ''do'' rather than specifically
    ''perform.'' Word order is adjusted for natural English while retaining the added
    force of καί.'
- source_word: ἐν τῇ πατρίδι σου
  chosen: in your hometown
  alternatives:
  - in your homeland
  - in your native place
  - in your own country
  lexicon: BDAG
  rationale: πατρίς here refers to one's home region/town in context, not nation-state.
    'Hometown' is the clearest modern equivalent in this Nazareth setting.
