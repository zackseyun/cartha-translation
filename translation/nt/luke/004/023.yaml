theological_decisions:
- issue: Nature of παραβολή in this context
  chosen_reading: Rendered as 'proverb' rather than 'parable'
  alternative_readings:
  - parable
  - saying
  rationale: The saying 'Physician, heal yourself' is a brief proverbial maxim, not
    a narrative parable. This is a contextual lexical decision, not a doctrinal one,
    but it affects interpretation and should be documented for auditability.
