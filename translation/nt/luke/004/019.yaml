id: LUK.4.19
reference: Luke 4:19
source:
  edition: SBLGNT
  text: κηρύξαι ἐνιαυτὸν κυρίου δεκτόν.
translation:
  text: to proclaim the Lord’s favorable year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to proclaim the year of the Lord’s favor.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''the acceptable year of the Lord.'' The phrase echoes Isaiah
      61:2 and may evoke Jubilee themes.'
    reason: cross_reference
lexical_decisions:
- source_word: κηρύξαι
  chosen: to proclaim
  alternatives:
  - to preach
  - to announce
  lexicon: BDAG
  rationale: The aorist infinitive continues the purpose sequence from the prior verse.
    'Proclaim' preserves the heraldic/public sense of κηρύσσω without narrowing it
    to sermonic 'preach' or flattening it to mere 'announce'.
- source_word: ἐνιαυτὸν
  chosen: year
  alternatives:
  - season
  lexicon: BDAG
  rationale: ἐνιαυτός normally denotes a year. Although the phrase is idiomatic and
    alludes to Isa 61:2, 'year' should be retained rather than generalized to 'season'.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The genitive is expressed
    naturally in English as a possessive. In this Isaianic allusion, the phrase denotes
    the year belonging to or characterized by the Lord.
- source_word: δεκτόν
  chosen: favorable
  alternatives:
  - acceptable
  - welcome
  lexicon: BDAG
  rationale: δεκτός here means acceptable or favorably received. 'Favorable' communicates
    the sense in contemporary English more clearly than the traditional 'acceptable,'
    while preserving the idea of divine favor rather than human mere toleration.
