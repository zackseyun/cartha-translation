theological_decisions:
- issue: Allusion to Isaiah 61:2 and Jubilee resonance
  chosen_reading: Retain 'year' in the main text without explicitly inserting 'Jubilee.'
  alternative_readings:
  - to proclaim the year of the Lord's favor
  - to proclaim the Lord's acceptable year
  - to proclaim the Jubilee of the Lord
  rationale: The Greek echoes Isa 61:2 and may evoke Jubilee themes, but it does not
    explicitly use the term 'Jubilee.' Optimal equivalence preserves the allusive
    wording without importing an interpretive expansion into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per the contested-terms table, κύριος defaults to 'Lord.' Here that rendering
    also fits the Isaianic citation tradition and avoids over-specifying whether the
    emphasis is on the divine name convention ('LORD') in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
