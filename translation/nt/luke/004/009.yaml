id: LUK.4.9
reference: Luke 4:9
source:
  edition: SBLGNT
  text: ⸂Ἤγαγεν δὲ⸃ αὐτὸν εἰς Ἰερουσαλὴμ καὶ ⸀ἔστησεν ἐπὶ τὸ πτερύγιον τοῦ ἱεροῦ,
    καὶ εἶπεν αὐτῷ· Εἰ υἱὸς εἶ τοῦ θεοῦ, βάλε σεαυτὸν ἐντεῦθεν κάτω·
translation:
  text: Then he led him to Jerusalem and set him on the pinnacle of the temple, and
    said to him, “If you are the Son of God, throw yourself down from here;”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the wing of the temple.' The Greek term refers to a projecting extremity
      or high point of the temple complex.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'Since you are the Son of God.' The Greek condition can be read that
      way, but here it is rendered 'If' to preserve the tempter's challenge.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἤγαγεν
  chosen: led
  alternatives:
  - brought
  - took
  lexicon: BDAG
  rationale: Aorist of ἄγω commonly means to lead or bring. 'Led' fits the narrative
    movement and keeps the tempter's active guidance of Jesus without over-specifying
    manner.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' conveys sequential development
    more naturally in English than a bare 'and.'
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: ἔστησεν
  chosen: set him
  alternatives:
  - placed him
  - stood him
  lexicon: BDAG
  rationale: The causative sense of ἵστημι in the aorist is best represented by 'set'
    or 'placed.' 'Set him' is concise and idiomatic; 'stood him' would be too wooden
    in English.
- source_word: ἐπὶ τὸ πτερύγιον
  chosen: on the pinnacle
  alternatives:
  - on the wing
  - on the highest point
  lexicon: BDAG
  rationale: πτερύγιον literally denotes a little wing, but in this architectural
    context it refers to an extremity or projecting high point. 'Pinnacle' is the
    established and contextually accurate English rendering, while the more literal
    'wing' would be obscure.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the temple complex
  - of the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple' is the natural English rendering, with the broader sense noted in a footnote
    because English readers may otherwise assume the inner shrine.
- source_word: Εἰ υἱὸς εἶ τοῦ θεοῦ
  chosen: If you are the Son of God
  alternatives:
  - Since you are the Son of God
  lexicon: BDAG
  rationale: The conditional clause uses εἰ with the indicative. In temptation contexts,
    English 'if' preserves the challenge without prematurely resolving whether the
    force is argumentative ('since') or provocative. The definite article is not repeated
    before υἱός in Greek, but the genitival construction clearly yields the titular
    sense 'the Son of God.'
- source_word: βάλε σεαυτὸν
  chosen: throw yourself
  alternatives:
  - cast yourself
  lexicon: BDAG
  rationale: βάλλω in the imperative here means to hurl or throw. 'Throw yourself'
    is clear modern English; 'cast yourself' is traditional but more archaic.
- source_word: ἐντεῦθεν
  chosen: from here
  alternatives:
  - from this place
  lexicon: BDAG
  rationale: The adverb points to the present location. 'From here' is direct and
    idiomatic.
- source_word: κάτω
  chosen: down
  alternatives:
  - below
  lexicon: BDAG
  rationale: κάτω functions adverbially with the motion verb to indicate downward
    movement. 'Down' is the natural English equivalent.
