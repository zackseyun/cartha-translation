theological_decisions:
- issue: Rendering the devil's challenge to Jesus' identity
  chosen_reading: If you are the Son of God
  alternative_readings:
  - Since you are the Son of God
  rationale: The Greek conditional form can in some contexts carry a sense close to
    'since,' but in this temptation narrative the force is best preserved as a challenge
    or test rather than a straightforward assertion. This keeps the rhetorical tension
    of the scene without implying uncertainty about Jesus' true identity on the narrator's
    part.
  doctrine_reference: Preserve theological tension rather than resolve it.
