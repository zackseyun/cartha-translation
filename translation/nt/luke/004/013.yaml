theological_decisions:
- issue: Nuance of πειρασμός in relation to Jesus' experience
  chosen_reading: temptation
  alternative_readings:
  - testing
  rationale: πειρασμός can denote either testing or temptation depending on context.
    In Luke 4, the agent is the devil and the episodes involve enticement away from
    faithful obedience, so 'temptation' is the most contextually accurate main-text
    rendering. The alternative 'testing' is preserved in a footnote because the term
    can carry both senses and the scene also functions as a proving of Jesus.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    genuine ambiguity exists)
