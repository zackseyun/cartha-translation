id: LUK.4.13
reference: Luke 4:13
source:
  edition: SBLGNT
  text: καὶ συντελέσας πάντα πειρασμὸν ὁ διάβολος ἀπέστη ἀπ’ αὐτοῦ ἄχρι καιροῦ.
translation:
  text: And after finishing every temptation, the devil departed from him until an
    opportune time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "every testing." The Greek term can mean either "temptation" or "testing,"
      though here the devil's role makes "temptation" the more natural rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: συντελέσας
  chosen: after finishing
  alternatives:
  - having finished
  - when he had finished
  - after completing
  lexicon: BDAG
  rationale: Aorist active participle, nominative masculine singular, modifying ὁ
    διάβολος and indicating action prior to the main verb ἀπέστη. 'After finishing'
    gives clear temporal force in natural English while preserving the participial
    relationship.
- source_word: πάντα πειρασμόν
  chosen: every temptation
  alternatives:
  - all temptation
  - the whole temptation
  - every testing
  lexicon: BDAG
  rationale: The adjective πᾶς with singular πειρασμόν is best rendered distributively
    as 'every temptation' or comprehensively as 'the whole temptation.' In this narrative
    context, 'every temptation' communicates that the devil had brought the full range
    of temptations in view. 'Testing' is possible semantically, but 'temptation' fits
    the immediate context of the devil's enticements in Luke 4.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In Luke's narrative this is the personal supernatural adversary, not
    merely a descriptive label. 'The devil' is the standard and contextually precise
    rendering.
- source_word: ἀπέστη ἀπ’ αὐτοῦ
  chosen: departed from him
  alternatives:
  - withdrew from him
  - left him
  lexicon: BDAG
  rationale: ἀφίστημι here means to leave or withdraw from someone. 'Departed from
    him' preserves the formal sense and fits the narrative register better than the
    more colloquial 'left him.'
- source_word: ἄχρι καιροῦ
  chosen: until an opportune time
  alternatives:
  - until a time
  - until the right time
  - for a season
  lexicon: BDAG
  rationale: καιρός commonly denotes a fitting, appointed, or opportune time rather
    than mere chronological time. 'Until an opportune time' preserves the nuance that
    the devil's departure was temporary and strategic.
