id: LUK.4.41
reference: Luke 4:41
source:
  edition: SBLGNT
  text: ἐξήρχετο δὲ καὶ δαιμόνια ἀπὸ πολλῶν ⸀κραυγάζοντα καὶ λέγοντα ὅτι Σὺ ⸀εἶ ὁ
    υἱὸς τοῦ θεοῦ. καὶ ἐπιτιμῶν οὐκ εἴα αὐτὰ λαλεῖν, ὅτι ᾔδεισαν τὸν χριστὸν αὐτὸν
    εἶναι.
translation:
  text: Demons also were coming out of many, crying out and saying, “You are the Son
    of God!” But rebuking them, he would not allow them to speak, because they knew
    that he was the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “the Christ.” Greek: “the Messiah/Anointed One” (Χριστός).'
    reason: alternative_reading
lexical_decisions:
- source_word: δαιμόνια
  chosen: Demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The noun directly denotes demons. 'Unclean spirits' is used elsewhere
    when the Greek has that expression, but here δαιμόνια should be rendered straightforwardly
    as 'demons'.
- source_word: ἐξήρχετο
  chosen: were coming out
  alternatives:
  - went out
  - came out
  lexicon: BDAG
  rationale: Imperfect middle/passive-form verb conveys ongoing/repeated action in
    narrative. 'Were coming out' captures the iterative/imperfect sense better than
    a simple past.
- source_word: ἀπὸ πολλῶν
  chosen: of many
  alternatives:
  - from many people
  lexicon: BDAG
  rationale: The Greek leaves the object implicit; in English, 'of many' is concise
    and natural after 'coming out,' with the human referent understood from context.
    'From many people' is possible but slightly more explicit than the Greek.
- source_word: κραυγάζοντα
  chosen: crying out
  alternatives:
  - shouting
  - screaming
  lexicon: BDAG
  rationale: The participle denotes loud vocal outcry. 'Crying out' is idiomatic,
    preserves the intensity, and fits biblical narrative style without over-dramatizing.
- source_word: λέγοντα
  chosen: saying
  alternatives:
  - declaring
  lexicon: BDAG
  rationale: A standard speech participle best rendered simply as 'saying' in coordination
    with 'crying out'.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is a christological title. 'The Son of God' preserves the formal
    titular force and matches common English recognition without reducing theological
    weight.
- source_word: ἐπιτιμῶν
  chosen: rebuking
  alternatives:
  - warning sternly
  - censuring
  lexicon: BDAG
  rationale: The participle commonly means to rebuke or command sharply. 'Rebuking'
    preserves both the verbal force and the narrative connection to Jesus' authoritative
    speech.
- source_word: οὐκ εἴα
  chosen: he would not allow
  alternatives:
  - he did not permit
  - he was not allowing
  lexicon: BDAG
  rationale: The imperfect of ἐάω suggests repeated or customary refusal. 'Would not
    allow' captures the ongoing narrative force naturally in English.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: '''To speak'' is the natural and appropriately weighty rendering in this
    context.'
- source_word: ᾔδεισαν
  chosen: they knew
  alternatives:
  - they had known
  lexicon: BDAG
  rationale: Pluperfect-form with imperfective force from οἶδα is commonly rendered
    as a simple past stative in English. 'They knew' is idiomatic and accurate.
- source_word: τὸν χριστὸν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ'
    to preserve its meaning in context. Here it is clearly titular, not functioning
    as a name.
- source_word: αὐτὸν εἶναι
  chosen: that he was
  alternatives:
  - him to be
  lexicon: BDAG
  rationale: This is the natural English rendering of the accusative-infinitive construction
    after 'knew.' The predicate title 'the Messiah' is carried in the clause.
