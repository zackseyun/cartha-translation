theological_decisions:
- issue: Rendering of Χριστός in a confessional identification by demons
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not a name, and the doctrine excerpt specifies
    'Messiah' as the default where title is intended, with 'Christ' as an alternative
    preserved. This also avoids importing later name-like usage into Luke's narrative
    setting.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Relation between 'Son of God' and 'Messiah' in the verse
  chosen_reading: 'Retain both titles distinctly: the demons say ''You are the Son
    of God,'' and the narrator explains that they knew he was the Messiah'
  alternative_readings:
  - Conflate the two titles into a single explanatory phrase
  rationale: The Greek presents two related but distinct christological designations.
    The translation preserves the narrative distinction without flattening their theological
    relationship or over-explaining it.
  doctrine_reference: Preserve theological tension rather than resolve it
