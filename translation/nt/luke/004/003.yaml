theological_decisions:
- issue: Force of the conditional clause εἰ υἱὸς εἶ τοῦ θεοῦ
  chosen_reading: If you are the Son of God
  alternative_readings:
  - Since you are the Son of God
  rationale: The translation preserves the conditional form rather than resolving
    it into an assumed fact. This maintains the narrative and theological tension
    of the temptation scene without denying Jesus' sonship.
  doctrine_reference: Preserve theological tension rather than resolve it.
