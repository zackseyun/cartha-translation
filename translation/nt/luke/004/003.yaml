id: LUK.4.3
reference: Luke 4:3
source:
  edition: SBLGNT
  text: ⸂εἶπεν δὲ⸃ αὐτῷ ὁ διάβολος· Εἰ υἱὸς εἶ τοῦ θεοῦ, εἰπὲ τῷ λίθῳ τούτῳ ἵνα γένηται
    ἄρτος.
translation:
  text: Then the devil said to him, “If you are the Son of God, tell this stone to
    become bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Since you are the Son of God.' The Greek condition can be understood
      as assuming the premise for the sake of the challenge, but the main text preserves
      the conditional form.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Then' fits the narrative progression in readable
    modern English better than the more wooden 'And' or discourse-marking 'Now'.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  - the accuser
  lexicon: BDAG
  rationale: In this narrative context διάβολος functions as the recognized personal
    designation for Satan. 'The devil' is the standard, clear English rendering; the
    more etymological alternatives are possible but less idiomatic here.
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The Greek conditional particle εἰ is most naturally rendered 'If.' Although
    some interpreters take the clause rhetorically ('Since you are...'), the text
    itself presents a conditional challenge, and 'If' best preserves the temptation's
    force without resolving the nuance.
- source_word: υἱὸς ... τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - a son of God
  lexicon: BDAG
  rationale: The anarthrous predicate υἱός before εἶ is qualitative/definite in sense
    in this christological context, not indefinite. 'The Son of God' reflects the
    recognized title and aligns with orthodox Christological usage without overtranslating.
- source_word: εἰπὲ
  chosen: tell
  alternatives:
  - say
  - command
  lexicon: BDAG
  rationale: The aorist imperative of λέγω here governs an indirect command directed
    toward the stone. 'Tell this stone' is natural English and preserves the speech-act
    sense. 'Command' is interpretive and stronger than the verb itself; 'say' is possible
    but less idiomatic with the object construction.
- source_word: τῷ λίθῳ τούτῳ
  chosen: this stone
  alternatives:
  - this rock
  lexicon: BDAG
  rationale: 'λίθος commonly denotes ''stone'' rather than the larger or more mass-like
    ''rock.'' The demonstrative is retained: ''this stone.'''
- source_word: ἵνα γένηται
  chosen: to become
  alternatives:
  - that it may become
  - so that it may become
  lexicon: BDAG
  rationale: ἵνα with the subjunctive after a verb of speaking can express content/result
    in a way that idiomatic English often renders with an infinitive. 'Tell this stone
    to become' is smoother modern English while preserving the intended sense.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - a loaf of bread
  - food
  lexicon: BDAG
  rationale: ἄρτος is straightforwardly 'bread.' Adding 'loaf' would be more specific
    than the Greek warrants, and 'food' is too broad.
