id: LUK.4.16
reference: Luke 4:16
source:
  edition: SBLGNT
  text: Καὶ ἦλθεν ⸀εἰς Ναζαρά, οὗ ἦν τεθραμμένος, καὶ εἰσῆλθεν κατὰ τὸ εἰωθὸς αὐτῷ
    ἐν τῇ ἡμέρᾳ τῶν σαββάτων εἰς τὴν συναγωγήν, καὶ ἀνέστη ἀναγνῶναι.
translation:
  text: And he came to Nazara, where he had been brought up, and as was his custom,
    he entered the synagogue on the Sabbath day, and stood up to read.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nazareth.' The Greek here reads Nazara.
    reason: alternative_reading
lexical_decisions:
- source_word: Ναζαρά
  chosen: Nazara
  alternatives:
  - Nazareth
  lexicon: BDAG
  rationale: The Greek form here is Ναζαρά, which is more directly represented by
    'Nazara' than the traditional 'Nazareth.' Following original-language primacy
    over translation tradition, the transliteration reflects the form actually present
    in this verse. Because 'Nazareth' is the familiar English place-name and appears
    in other passages/forms, it is preserved in a footnote as an alternative.
- source_word: τεθραμμένος
  chosen: had been brought up
  alternatives:
  - had been raised
  - had been reared
  lexicon: BDAG
  rationale: The perfect passive participle from τρέφω here refers to being nourished/reared
    in the sense of upbringing. 'Had been brought up' is idiomatic modern English
    and captures the resultant state implied by the perfect.
- source_word: κατὰ τὸ εἰωθὸς αὐτῷ
  chosen: as was his custom
  alternatives:
  - according to his custom
  - as he was accustomed
  lexicon: BDAG
  rationale: This idiom expresses customary practice. 'As was his custom' is natural
    English while preserving the sense of habitual action, without over-paraphrasing.
- source_word: ἐν τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the Sabbath
  lexicon: BDAG
  rationale: 'Although the Greek uses the plural σαββάτων in an idiomatic expression,
    the sense in context is singular: the Sabbath day. ''On the Sabbath day'' communicates
    the idiomatic meaning clearly in English.'
- source_word: συναγωγήν
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this Jewish setting the institutional/place sense 'synagogue' is the
    standard and clearest rendering.
- source_word: ἀνέστη ἀναγνῶναι
  chosen: stood up to read
  alternatives:
  - rose to read
  lexicon: BDAG
  rationale: The aorist verb plus infinitive indicates that he got up for the purpose
    of reading. 'Stood up to read' is clear, natural, and close to the Greek.
