theological_decisions:
- issue: Rendering the place-name Ναζαρά
  chosen_reading: Nazara
  alternative_readings:
  - Nazareth
  rationale: This is not a doctrinally weighty issue, but it is a significant translation
    decision. The chosen form follows the Greek spelling in this verse rather than
    harmonizing to the more familiar English traditional form. This aligns with the
    stated principle of original-language primacy over translation tradition.
  doctrine_reference: Translation philosophy §1, §2
