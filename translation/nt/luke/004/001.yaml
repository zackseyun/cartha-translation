id: LUK.4.1
reference: Luke 4:1
source:
  edition: SBLGNT
  text: Ἰησοῦς δὲ ⸂πλήρης πνεύματος ἁγίου⸃ ὑπέστρεψεν ἀπὸ τοῦ Ἰορδάνου, καὶ ἤγετο
    ἐν τῷ πνεύματι ⸂ἐν τῇ ἐρήμῳ⸃
translation:
  text: And Jesus, full of the Holy Spirit, returned from the Jordan and was being
    led by the Spirit in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit.' The Greek expression can be rendered more literally
      this way, though here it likely means that the Spirit was leading him.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήρης πνεύματος ἁγίου
  chosen: full of the Holy Spirit
  alternatives:
  - filled with the Holy Spirit
  lexicon: BDAG
  rationale: πλήρης with a genitive denotes being full of something. 'Full of the
    Holy Spirit' is the most direct and idiomatic rendering in English and preserves
    the descriptive force without implying a momentary filling event.
- source_word: ὑπέστρεψεν
  chosen: returned
  alternatives:
  - came back
  - went back
  lexicon: BDAG
  rationale: The aorist of ὑποστρέφω commonly means 'return.' 'Returned' is concise,
    natural, and formally close to the Greek.
- source_word: ἀπὸ τοῦ Ἰορδάνου
  chosen: from the Jordan
  alternatives:
  - from the Jordan River
  lexicon: BDAG
  rationale: The Greek names the Jordan without adding 'river.' English can naturally
    say 'the Jordan'; 'Jordan River' is possible but adds an explanatory element not
    present in the text.
- source_word: ἤγετο
  chosen: was being led
  alternatives:
  - was led
  - was guided
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing action in past time. 'Was being
    led' best preserves the progressive sense better than the simpler 'was led.'
- source_word: ἐν τῷ πνεύματι
  chosen: by the Spirit
  alternatives:
  - in the Spirit
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' with ἄγω in the passive this phrase
    is naturally understood instrumentally or agentively: the Spirit is the one leading
    Jesus. ''By the Spirit'' communicates the sense clearly in English while preserving
    the referent as the Holy Spirit from the immediate context.'
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος can denote desert, wilderness, or desolate region. 'Wilderness'
    fits biblical usage well and avoids over-specifying a sandy desert landscape while
    preserving the setting of solitude and testing.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'And' is a natural connective in narrative
    English and keeps the flow from the preceding context.
