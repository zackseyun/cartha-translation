theological_decisions:
- issue: Referent of 'the Spirit' in ἐν τῷ πνεύματι
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Jesus' inner spiritual state
  rationale: Given the immediate phrase 'full of the Holy Spirit' and Luke's consistent
    emphasis on the Holy Spirit as active agent, the most natural reading is that
    the same Spirit leads Jesus. This preserves the narrative's pneumatological emphasis
    without importing later doctrinal claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
