id: LUK.4.6
reference: Luke 4:6
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ ὁ διάβολος· Σοὶ δώσω τὴν ἐξουσίαν ταύτην ἅπασαν καὶ τὴν δόξαν
    αὐτῶν, ὅτι ἐμοὶ παραδέδοται καὶ ᾧ ⸀ἂν θέλω δίδωμι αὐτήν·
translation:
  text: And the devil said to him, “I will give you all this authority and their glory,
    because it has been handed over to me, and I give it to whomever I want.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their splendor.” The Greek word can denote glory, splendor, or magnificence
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In Luke this functions as the personal designation of Satan in the temptation
    narrative, so the established title 'the devil' best conveys the referent rather
    than the etymological sense 'slanderer.'
- source_word: Σοὶ δώσω
  chosen: I will give you
  alternatives:
  - to you I will give
  lexicon: BDAG
  rationale: The dative pronoun is fronted for emphasis, but natural English expresses
    this adequately as 'I will give you.'
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - domain
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated ruling power.
    'Authority' best matches the political/ruling sense in context without overstating
    raw force as 'power' might.
- source_word: ταύτην ἅπασαν
  chosen: all this
  alternatives:
  - this whole
  - this entire
  lexicon: BDAG
  rationale: The combination of demonstrative plus ἅπας intensifies totality. 'All
    this' is idiomatic English and preserves the comprehensive sense.
- source_word: δόξαν αὐτῶν
  chosen: their glory
  alternatives:
  - their splendor
  - their magnificence
  lexicon: BDAG
  rationale: δόξα here refers to the splendor or prestige of the kingdoms just shown
    (cf. v. 5). 'Glory' preserves the lexical link and biblical resonance, while 'their'
    correctly refers to those realms.
- source_word: παραδέδοται
  chosen: it has been handed over to me
  alternatives:
  - it has been delivered to me
  - it has been entrusted to me
  lexicon: BDAG
  rationale: The perfect passive indicates a prior act with continuing result. 'Handed
    over' is natural and preserves the passive sense without implying legitimacy beyond
    the devil's claim.
- source_word: ᾧ ἂν θέλω
  chosen: to whomever I want
  alternatives:
  - to anyone I wish
  - to whomever I choose
  lexicon: BDAG
  rationale: The relative pronoun with ἄν and θέλω expresses an indefinite object
    of volition. 'Whomever I want' is idiomatic and preserves the devil's claim of
    discretionary control.
- source_word: δίδωμι αὐτήν
  chosen: I give it
  alternatives:
  - I am giving it
  lexicon: BDAG
  rationale: The present tense here expresses customary or general action. English
    simple present communicates this well.
