theological_decisions:
- issue: Whether the verse should be translated in a way that endorses the devil's
    claim to possess authority over the kingdoms
  chosen_reading: Render the statement straightforwardly as the devil's own claim
    without adding qualifiers in the main text
  alternative_readings:
  - Insert distancing language such as 'claims' or 'said that it had been handed over
    to him'
  rationale: The Greek presents direct speech from the devil; the translator should
    not editorialize by weakening or endorsing the claim. The narrative context already
    identifies the speaker as the devil, so readers understand this as his assertion.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
