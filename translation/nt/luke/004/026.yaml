theological_decisions:
- issue: Implied sender of Elijah in the passive verb
  chosen_reading: 'Retain the divine passive as an unstated agent: ''Elijah was sent'''
  alternative_readings:
  - 'Make God explicit: ''God sent Elijah'''
  rationale: The Greek uses a passive without naming the sender. Since the context
    implies God's action but does not state it directly, the translation preserves
    that textual restraint rather than importing the subject into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
