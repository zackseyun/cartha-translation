id: LUK.4.26
reference: Luke 4:26
source:
  edition: SBLGNT
  text: καὶ πρὸς οὐδεμίαν αὐτῶν ἐπέμφθη Ἠλίας εἰ μὴ εἰς Σάρεπτα τῆς ⸀Σιδωνίας πρὸς
    γυναῖκα χήραν.
translation:
  text: And Elijah was sent to none of them, except to Zarephath in Sidon, to a widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'Sarepta of Sidon'; traditionally identified with OT Zarephath (1
      Kings 17:9).
    reason: cross_reference
lexical_decisions:
- source_word: ἐπέμφθη
  chosen: was sent
  alternatives:
  - was dispatched
  lexicon: BDAG
  rationale: Passive of πέμπω is most naturally rendered 'was sent.' This preserves
    the implied divine agency without making it explicit beyond the Greek.
- source_word: πρὸς οὐδεμίαν αὐτῶν
  chosen: to none of them
  alternatives:
  - to not one of them
  lexicon: BDAG
  rationale: The preposition πρὸς with the accusative here marks direction toward
    persons; 'to none of them' is idiomatic English and preserves the exclusion emphasized
    by οὐδεμίαν.
- source_word: Ἠλίας
  chosen: Elijah
  rationale: Standard English transliteration of the personal name Ἠλίας.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this exceptive construction, 'except' is the clearest English equivalent.
    'Unless' would sound conditional rather than exceptive in this context.
- source_word: Σάρεπτα
  chosen: Zarephath
  alternatives:
  - Sarepta
  rationale: Although the Greek form is Σάρεπτα/Sarepta, 'Zarephath' better reflects
    the well-known OT place name behind the reference (1 Kgs 17) and is the more recognizable
    English form for readers.
- source_word: τῆς Σιδωνίας
  chosen: in Sidon
  alternatives:
  - of Sidon
  - in the region of Sidon
  lexicon: BDAG
  rationale: The genitive identifies Zarephath by its association with Sidon. 'In
    Sidon' is natural English shorthand for location/region, while still conveying
    the geographic identification.
- source_word: γυναῖκα χήραν
  chosen: a widow
  alternatives:
  - a widowed woman
  lexicon: BDAG
  rationale: The phrase literally means 'a woman, a widow,' but English normally compresses
    this appositional expression to 'a widow' without loss of meaning.
