theological_decisions:
- issue: Referent and portrayal of δαιμόνιον in exorcism context
  chosen_reading: Render as 'demon' and preserve the text's presentation of a personal
    evil spirit being directly addressed by Jesus.
  alternative_readings:
  - Render more abstractly as 'evil force' or 'mental affliction'
  rationale: The Greek text narrates an exorcism with direct address and departure
    language. Historic Christian orthodoxy affirms the reality of demonic beings,
    and the translation should not demythologize the passage beyond what the text
    warrants.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
