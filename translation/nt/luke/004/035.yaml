id: LUK.4.35
reference: Luke 4:35
source:
  edition: SBLGNT
  text: καὶ ἐπετίμησεν αὐτῷ ὁ Ἰησοῦς λέγων· Φιμώθητι καὶ ἔξελθε ⸀ἀπ’ αὐτοῦ. καὶ ῥίψαν
    αὐτὸν τὸ δαιμόνιον εἰς ⸀τὸ μέσον ἐξῆλθεν ἀπ’ αὐτοῦ μηδὲν βλάψαν αὐτόν.
translation:
  text: And Jesus rebuked it, saying, “Be silent and come out of him.” And after throwing
    him into the midst, the demon came out of him, having harmed him in no way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “Be muzzled.”
    reason: lexical_alternative
  - marker: b
    text: Or “having done him no harm.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - commanded
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means to rebuke or sternly charge. In exorcism contexts,
    'rebuked' preserves the forceful authoritative speech without over-paraphrasing.
- source_word: αὐτῷ
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun refers back to the unclean demon/spirit in context. English
    idiom commonly uses 'it' for a demon as a non-human entity, while avoiding unnecessary
    personalization beyond the Greek pronoun's referent.
- source_word: Φιμώθητι
  chosen: Be silent
  alternatives:
  - Be muzzled
  - Be quiet
  lexicon: BDAG
  rationale: φιμόω literally evokes muzzling, but as an imperative to speech it idiomatically
    means to be silent. 'Be silent' is natural modern English and preserves the command's
    sharpness; the more literal image is worth preserving in a footnote.
- source_word: ἔξελθε ἀπ’ αὐτοῦ
  chosen: come out of him
  alternatives:
  - go out from him
  lexicon: BDAG
  rationale: A direct exorcistic command. 'Come out of him' is standard, clear English
    and reflects the imperative plus ἀπό construction.
- source_word: ῥίψαν αὐτὸν
  chosen: after throwing him
  alternatives:
  - having thrown him
  - throwing him down
  lexicon: BDAG
  rationale: The aorist participle denotes action accompanying or preceding the main
    verb. 'After throwing him' captures the sequence naturally. 'Throwing him down'
    is possible in context, but 'down' is not explicit in the Greek of this verse.
- source_word: εἰς τὸ μέσον
  chosen: into the midst
  alternatives:
  - into the middle
  - into the center of them
  lexicon: BDAG
  rationale: The phrase literally means 'into the midst/middle.' 'Into the midst'
    preserves the vividness and likely public setting without adding 'of them,' which
    is implied by context but not explicit here.
- source_word: τὸ δαιμόνιον
  chosen: the demon
  alternatives:
  - the unclean spirit
  - the demonic spirit
  lexicon: BDAG
  rationale: δαιμόνιον is best rendered 'demon' here. Although the broader context
    mentions an unclean demon/spirit, this clause itself uses δαιμόνιον, and 'demon'
    is the most direct lexical equivalent.
- source_word: μηδὲν βλάψαν αὐτόν
  chosen: having harmed him in no way
  alternatives:
  - without harming him at all
  - having done him no harm
  lexicon: BDAG
  rationale: The participial phrase emphasizes that despite the violent manifestation,
    the demon did not injure the man. 'Having harmed him in no way' preserves the
    participial linkage and the force of μηδέν.
