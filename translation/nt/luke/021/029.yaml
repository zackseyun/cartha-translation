id: LUK.21.29
reference: Luke 21:29
source:
  edition: SBLGNT
  text: Καὶ εἶπεν παραβολὴν αὐτοῖς· Ἴδετε τὴν συκῆν καὶ πάντα τὰ δένδρα·
translation:
  text: 'And he told them a parable: “Look at the fig tree, and all the trees.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “See the fig tree and all the trees.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: told
  alternatives:
  - said
  - spoke
  lexicon: BDAG
  rationale: Although λέγω commonly means 'say,' English idiom with a direct object
    plus παραβολή is more natural as 'told ... a parable' than 'said ... a parable.'
    This preserves the sense without unnecessary stiffness.
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - illustration
  - comparison
  lexicon: BDAG
  rationale: '''Parable'' is the standard and contextually appropriate rendering for
    παραβολή in the Synoptic Gospels. Alternatives like ''illustration'' flatten the
    literary and teaching category signaled by the Greek.'
- source_word: Ἴδετε
  chosen: Look at
  alternatives:
  - See
  - Notice
  - Consider
  lexicon: BDAG
  rationale: The aorist imperative calls for directed attention. 'Look at' is clear,
    natural modern English and fits the immediate visual example Jesus is introducing.
- source_word: συκῆν
  chosen: fig tree
  alternatives:
  - fig
  lexicon: BDAG
  rationale: The noun refers to the tree, not merely its fruit. 'Fig tree' is the
    precise and idiomatic English equivalent.
- source_word: πάντα τὰ δένδρα
  chosen: all the trees
  alternatives:
  - every tree
  - all the other trees
  lexicon: BDAG
  rationale: The plural phrase is best rendered straightforwardly as 'all the trees.'
    'Every tree' is possible but less natural here, and 'other' is not explicit in
    the Greek.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: The conjunction simply continues the narrative. 'And' preserves the discourse
    flow without adding temporal nuance not required by the Greek.
