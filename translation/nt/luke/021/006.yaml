id: LUK.21.6
reference: Luke 21:6
source:
  edition: SBLGNT
  text: Ταῦτα ἃ θεωρεῖτε, ἐλεύσονται ἡμέραι ἐν αἷς οὐκ ἀφεθήσεται λίθος ἐπὶ ⸀λίθῳ
    ὃς οὐ καταλυθήσεται.
translation:
  text: As for these things that you are looking at, days will come in which not one
    stone will be left upon another that will not be torn down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These things that you see.' The verb can be rendered more generally
      as 'see' or more specifically as 'look at/observe.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not a stone upon a stone will be left which will not be torn
      down,' an idiom expressing complete destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα ἃ θεωρεῖτε
  chosen: As for these things that you are looking at
  alternatives:
  - These things that you see
  - What you are looking at here
  lexicon: BDAG
  rationale: Ταῦτα fronted for emphasis introduces the objects in view; θεωρεῖτε can
    mean 'see, observe, look at.' 'Looking at' preserves the durative present and
    the visual focus better than the flatter 'see.' 'As for' reflects the topical
    force without overparaphrasing.
- source_word: ἐλεύσονται ἡμέραι
  chosen: days will come
  alternatives:
  - the days will come
  - days are coming
  lexicon: BDAG
  rationale: A common idiom for impending future events. The anarthrous ἡμέραι is
    naturally rendered 'days will come' rather than 'the days.' Future 'will come'
    matches the Greek future middle.
- source_word: ἐν αἷς
  chosen: in which
  alternatives:
  - when
  - during which
  lexicon: BDAG
  rationale: The relative phrase is temporal, but 'in which' keeps closer formal correspondence
    while remaining natural in English.
- source_word: οὐκ ἀφεθήσεται
  chosen: will be left
  alternatives:
  - will remain
  - will be allowed to stand
  lexicon: BDAG
  rationale: Passive future of ἀφίημι here means 'be left, remain.' 'Will be left'
    is the standard and clearest rendering in this demolition context.
- source_word: λίθος ἐπὶ λίθῳ
  chosen: stone upon another
  alternatives:
  - stone on stone
  - one stone upon another
  lexicon: BDAG
  rationale: This is an idiom of total destruction. 'Stone upon another' is idiomatic
    English when paired with 'not one' earlier in the clause.
- source_word: ὃς οὐ καταλυθήσεται
  chosen: that will not be torn down
  alternatives:
  - that will not be thrown down
  - that will not be demolished
  lexicon: BDAG
  rationale: 'The relative clause intensifies the totality: no stone will remain that
    is not destroyed. καταλύω in this context refers to dismantling or demolishing
    structures. ''Torn down'' is vivid, natural, and fits building language better
    than the more literal but less idiomatic ''thrown down.'''
