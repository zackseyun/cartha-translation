theological_decisions:
- issue: Scope and force of Jesus' prediction about the temple structures
  chosen_reading: Render the saying as a concrete prophecy of total structural destruction
    without importing a specific eschatological system.
  alternative_readings:
  - A primarily symbolic judgment saying
  - A prediction tied to a particular later theological framework
  rationale: The Greek speaks plainly of visible structures being dismantled stone
    by stone. The translation should preserve that concrete force while avoiding doctrinal
    elaboration beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
