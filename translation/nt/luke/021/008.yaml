theological_decisions:
- issue: Rendering of Ἐγώ εἰμι in a context of false claimants
  chosen_reading: I am he
  alternative_readings:
  - I am
  - I am the Messiah
  rationale: The phrase could be left starkly as 'I am,' but in context the claim
    is not primarily a theological echo of the divine self-designation; it is a deceptive
    self-identification by false claimants. 'I am he' communicates the implied claim
    without importing the more explicit 'Messiah,' which the Greek does not state.
    The stronger interpretive alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
