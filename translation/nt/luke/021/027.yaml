theological_decisions:
- issue: Rendering the christological title τὸν υἱὸν τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a recognized self-designation/title of Jesus
    and carries strong intertextual resonance with Daniel 7. Retaining 'Son of Man'
    preserves that theological and literary connection without interpretive reduction.
  doctrine_reference: 'Affirmations; Translation philosophy #2'
- issue: Cloud imagery and Danielic/theophanic resonance
  chosen_reading: in a cloud
  alternative_readings:
  - on a cloud
  - with the clouds
  rationale: The translation follows Luke's singular νεφέλῃ rather than harmonizing
    to other passages or to traditional phrasing. This preserves original-language
    primacy while still allowing readers to hear the allusion to divine-coming imagery.
  doctrine_reference: 'Translation philosophy #1'
