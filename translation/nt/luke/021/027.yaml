id: LUK.21.27
reference: Luke 21:27
source:
  edition: SBLGNT
  text: καὶ τότε ὄψονται τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐν νεφέλῃ μετὰ δυνάμεως καὶ
    δόξης πολλῆς.
translation:
  text: And then they will see the Son of Man coming in a cloud with power and great
    glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a cloud.' The Greek reads singular 'in a cloud,' while the imagery
      echoes Daniel 7 and related passages about the Son of Man coming with the clouds.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  chosen: they will see
  alternatives:
  - they will catch sight of
  - they will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω here denotes future visual perception. 'They will
    see' is the most natural modern English rendering and preserves the straightforward
    force without adding elevated diction.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is the established and most accurate rendering of the titular expression,
    preserving both its idiomatic force and its Danielic resonance. 'The Human One'
    is possible but weaker in preserving intertextual continuity and christological
    title usage.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - arriving
  lexicon: BDAG
  rationale: The present participle conveys an ongoing action viewed in connection
    with what is seen. 'Coming' is the standard and contextually appropriate rendering,
    especially in apocalyptic and eschatological contexts.
- source_word: ἐν νεφέλῃ
  chosen: in a cloud
  alternatives:
  - on a cloud
  - with a cloud
  - in the clouds
  lexicon: BDAG
  rationale: 'The Greek is singular and uses ἐν with the dative: literally ''in a
    cloud.'' Although the Daniel 7 background and some English tradition favor ''with/on
    the clouds,'' Luke''s wording here is singular, so ''in a cloud'' best reflects
    the source text''s plain sense while still evoking the theophanic imagery.'
- source_word: μετὰ δυνάμεως
  chosen: with power
  alternatives:
  - with might
  lexicon: BDAG
  rationale: μετά with the genitive indicates accompaniment. 'With power' is the clearest
    and most idiomatic rendering of δύναμις here.
- source_word: δόξης πολλῆς
  chosen: great glory
  alternatives:
  - much glory
  - abundant glory
  lexicon: BDAG
  rationale: The adjective πολλῆς modifies δόξης and is idiomatically rendered in
    English as 'great' rather than 'much' in this collocation. This preserves the
    exalted register without sounding unnatural.
