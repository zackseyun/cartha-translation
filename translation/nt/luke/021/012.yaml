id: LUK.21.12
reference: Luke 21:12
source:
  edition: SBLGNT
  text: Πρὸ δὲ τούτων πάντων ἐπιβαλοῦσιν ἐφ’ ὑμᾶς τὰς χεῖρας αὐτῶν καὶ διώξουσιν,
    παραδιδόντες εἰς ⸀τὰς συναγωγὰς καὶ φυλακάς, ⸀ἀπαγομένους ἐπὶ βασιλεῖς καὶ ἡγεμόνας
    ἕνεκεν τοῦ ὀνόματός μου·
translation:
  text: But before all these things, they will lay their hands on you and persecute
    you, handing you over to the synagogues and prisons, being led before kings and
    governors because of my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will seize you.' The Greek literally says 'they will lay their
      hands on you,' an idiom for hostile arrest or mistreatment.
    reason: lexical_alternative
  - marker: b
    text: '''Because of my name'' can also be rendered ''for the sake of my name''
      or more interpretively ''because of me.'' The main text preserves the biblical
      expression linking Jesus'' name with his person and authority.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πρὸ δὲ τούτων πάντων
  chosen: But before all these things
  alternatives:
  - But before all this
  - Now before all these things
  lexicon: BDAG
  rationale: πρό with the genitive marks temporal priority; πάντων supports the fuller
    'all these things.' δέ is rendered 'But' to mark contrast/transition with the
    preceding discourse.
- source_word: ἐπιβαλοῦσιν ἐφ’ ὑμᾶς τὰς χεῖρας αὐτῶν
  chosen: they will lay their hands on you
  alternatives:
  - they will seize you
  - they will put their hands on you
  lexicon: BDAG
  rationale: This is an idiomatic expression for hostile arrest or violent action.
    'Lay their hands on you' preserves the concrete imagery of the Greek while remaining
    natural English; 'seize you' is interpretive and therefore kept as an alternative
    rather than the main text.
- source_word: διώξουσιν
  chosen: persecute
  alternatives:
  - pursue
  - harass
  lexicon: BDAG
  rationale: In this context of opposition to disciples for Jesus' sake, διώκω clearly
    carries the sense of persecution rather than mere pursuit.
- source_word: παραδιδόντες
  chosen: handing you over
  alternatives:
  - delivering you up
  - turning you over
  lexicon: BDAG
  rationale: The participle explains the manner of the persecution. 'Handing you over'
    is idiomatic modern English and preserves the juridical/hostile nuance of παραδίδωμι.
- source_word: εἰς τὰς συναγωγὰς καὶ φυλακάς
  chosen: to the synagogues and prisons
  alternatives:
  - into synagogues and prisons
  lexicon: BDAG
  rationale: εἰς can be rendered 'to' or 'into'; with παραδιδόντες, 'to' is more natural
    in English for being handed over to authorities/institutions. 'Synagogues' likely
    implies synagogue authorities or proceedings there, but the institutional term
    is retained rather than expanded.
- source_word: ἀπαγομένους
  chosen: being led
  alternatives:
  - being brought
  - being taken away
  lexicon: BDAG
  rationale: The passive participle continues the sequence of hostile actions. 'Being
    led' is concise and fits the legal setting before rulers. 'Being brought' is possible
    but slightly less vivid.
- source_word: ἐπὶ βασιλεῖς καὶ ἡγεμόνας
  chosen: before kings and governors
  alternatives:
  - to kings and governors
  lexicon: BDAG
  rationale: With verbs of movement in judicial contexts, ἐπί commonly means appearance
    before authorities. 'Before' best captures the forensic sense.
- source_word: ἕνεκεν τοῦ ὀνόματός μου
  chosen: because of my name
  alternatives:
  - for the sake of my name
  - on account of my name
  lexicon: BDAG
  rationale: '''Because of my name'' is clear modern English and preserves the biblical
    sense that Jesus'' ''name'' stands for his person, authority, and confession.
    ''For the sake of my name'' is more formal and is preserved as an alternative.'
