id: LUK.21.23
reference: Luke 21:23
source:
  edition: SBLGNT
  text: ⸀οὐαὶ ταῖς ἐν γαστρὶ ἐχούσαις καὶ ταῖς θηλαζούσαις ἐν ἐκείναις ταῖς ἡμέραις·
    ἔσται γὰρ ἀνάγκη μεγάλη ἐπὶ τῆς γῆς καὶ ⸀ὀργὴ τῷ λαῷ τούτῳ,
translation:
  text: Woe to those who are pregnant and to those who are nursing infants in those
    days! For there will be great distress upon the land, and wrath against this people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon the earth.' The Greek word γῆ can mean 'land' or 'earth'; here
      'land' is chosen because the surrounding context focuses on Jerusalem and Judea.
    reason: lexical_alternative
  - marker: b
    text: Or 'wrath for this people' or 'wrath upon this people.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic exclamation of lament/judgment more forcefully
    than the softer 'alas.'
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  chosen: those who are pregnant
  alternatives:
  - women who are with child
  - those carrying a child in the womb
  lexicon: BDAG
  rationale: Idiomatic English for the participial expression 'having in the womb,'
    preserving the reference to pregnancy without archaic phrasing.
- source_word: ταῖς θηλαζούσαις
  chosen: those who are nursing infants
  alternatives:
  - those who are breastfeeding
  - those nursing babies
  lexicon: BDAG
  rationale: Makes explicit the object implied by the verb 'to nurse/suckle' and uses
    natural modern English while preserving the maternal sense.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: Standard temporal rendering that is both natural and close to the Greek
    structure.
- source_word: ἀνάγκη μεγάλη
  chosen: great distress
  alternatives:
  - great necessity
  - great calamity
  - great anguish
  lexicon: BDAG
  rationale: In this eschatological/disaster context, ἀνάγκη denotes severe distress
    or pressing calamity rather than mere necessity.
- source_word: ἐπὶ τῆς γῆς
  chosen: upon the land
  alternatives:
  - upon the earth
  - in the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here 'land' better fits the local judgment
    context connected with 'this people,' likely referring to the land of Judea/Israel,
    while preserving the prepositional force with 'upon.'
- source_word: ὀργὴ
  chosen: wrath
  alternatives:
  - anger
  - judgment
  lexicon: BDAG
  rationale: '''Wrath'' best preserves the weight of impending divine/judicial anger
    in context; ''judgment'' would interpret beyond the lexical sense.'
- source_word: τῷ λαῷ τούτῳ
  chosen: against this people
  alternatives:
  - for this people
  - upon this people
  lexicon: BDAG
  rationale: The dative with ὀργή is naturally rendered in English as the object affected
    by wrath; 'this people' preserves the demonstrative force and likely reference
    to the covenant people in context.
