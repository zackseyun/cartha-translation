theological_decisions:
- issue: Referent and scope of γῆ / 'this people'
  chosen_reading: 'A primarily local judgment is in view: ''the land'' and ''this
    people'' refer most directly to Israel/Judea and the Jewish people in the immediate
    discourse context.'
  alternative_readings:
  - 'A universal scope: ''the earth'' meaning all humanity'
  rationale: The immediate Lukan context concerns Jerusalem's surrounding, desolation,
    and the fate of its inhabitants. Rendering γῆ as 'land' preserves this likely
    local reference without denying broader theological implications.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Nature of ὀργή
  chosen_reading: Rendered as 'wrath' without explicitly adding 'God's' in the main
    text.
  alternative_readings:
  - '''God''s wrath'''
  - '''judgment'''
  rationale: Although many interpreters understand divine wrath here, the Greek text
    states only 'wrath.' The translation preserves the theological tension and avoids
    importing an explicit subject not present in the verse.
  doctrine_reference: Translation philosophy §3
