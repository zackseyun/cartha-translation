id: LUK.21.1
reference: Luke 21:1
source:
  edition: SBLGNT
  text: Ἀναβλέψας δὲ εἶδεν τοὺς βάλλοντας ⸂εἰς τὸ γαζοφυλάκιον τὰ δῶρα αὐτῶν⸃ πλουσίους.
translation:
  text: Then he looked up and saw rich people putting their gifts into the treasury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their offerings' for 'their gifts.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'treasury' can refer to the temple treasury area
      or to offering receptacles.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀναβλέψας
  chosen: looked up
  alternatives:
  - raised his eyes
  - looked up
  lexicon: BDAG
  rationale: Aorist participle of ἀναβλέπω here has the concrete sense of lifting
    one's gaze upward. 'Looked up' is idiomatic modern English and preserves the narrative
    action without over-literal awkwardness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Then' fits the narrative progression in readable
    English better than a bare 'and,' while not overstating contrast.
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - noticed
  lexicon: BDAG
  rationale: The aorist of ὁράω is straightforwardly perceptive here. 'Saw' is the
    plainest rendering and avoids adding interpretive nuance such as heightened attentiveness.
- source_word: τοὺς βάλλοντας
  chosen: people putting
  alternatives:
  - those casting
  - those putting
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast,' but in this offering context idiomatic
    English prefers 'putting.' 'People' is supplied because the participle with article
    functions substantivally; the later adjective πλουσίους specifies that these people
    are rich.
- source_word: εἰς τὸ γαζοφυλάκιον
  chosen: into the treasury
  alternatives:
  - into the offering box
  - into the temple treasury
  lexicon: BDAG
  rationale: γαζοφυλάκιον refers to the treasury area or receptacles associated with
    temple offerings. 'Treasury' is concise and standard; 'temple' is contextually
    true but not explicit in this verse, so it is left implicit.
- source_word: τὰ δῶρα αὐτῶν
  chosen: their gifts
  alternatives:
  - their offerings
  lexicon: BDAG
  rationale: δῶρα means 'gifts' and in this context refers to monetary or material
    offerings. 'Gifts' preserves the lexical sense while remaining natural; 'offerings'
    is possible but slightly more interpretive.
- source_word: πλουσίους
  chosen: rich people
  alternatives:
  - the rich
  - wealthy people
  lexicon: BDAG
  rationale: The adjective functions substantivally/appositionally describing those
    observed. 'Rich people' makes explicit in natural English what Greek marks by
    adjective, and avoids the slightly class-label feel of 'the rich' while preserving
    meaning.
