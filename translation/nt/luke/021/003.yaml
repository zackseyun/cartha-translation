id: LUK.21.3
reference: Luke 21:3
source:
  edition: SBLGNT
  text: καὶ εἶπεν· Ἀληθῶς λέγω ὑμῖν ὅτι ἡ χήρα ⸂ἡ πτωχὴ αὕτη⸃ πλεῖον πάντων ἔβαλεν·
translation:
  text: And he said, “Truly I tell you that this poor widow put in more than all of
    them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'cast in more than all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀληθῶς
  chosen: Truly
  alternatives:
  - Certainly
  - Amen/truly
  lexicon: BDAG
  rationale: Adverb introducing a solemn, emphatic assertion. 'Truly' preserves the
    weight and familiar discourse function in Jesus' speech without sounding archaic.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common idiom in Jesus' sayings. 'I tell you' is natural modern English
    while preserving the direct address and authoritative force.
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard and precise rendering for a woman whose husband has died.
- source_word: πτωχή
  chosen: poor
  alternatives:
  - destitute
  - needy
  lexicon: BDAG
  rationale: The adjective denotes poverty. 'Poor' is the most natural rendering here;
    'destitute' would over-specify the degree in the main text, though the context
    suggests severe poverty.
- source_word: αὕτη
  chosen: this
  lexicon: BDAG
  rationale: Demonstrative pointing out the specific widow in view; 'this' preserves
    the deictic force.
- source_word: πλεῖον
  chosen: more
  alternatives:
  - a greater amount
  - more than
  lexicon: BDAG
  rationale: Comparative neuter used adverbially/quantitatively. 'More' is concise
    and idiomatic in English.
- source_word: πάντων
  chosen: than all of them
  alternatives:
  - than all
  - than everyone else
  lexicon: BDAG
  rationale: Genitive of comparison after πλεῖον. In context it refers to all the
    other contributors, so 'than all of them' makes the comparison explicit and natural.
- source_word: ἔβαλεν
  chosen: put in
  alternatives:
  - threw in
  - cast in
  lexicon: BDAG
  rationale: In the temple offering context, 'put in' communicates depositing money
    into the treasury in clear modern English. 'Cast in' is traditional but archaic;
    'threw in' can sound too physical or casual.
