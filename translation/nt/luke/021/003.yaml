theological_decisions:
- issue: Comparative statement about the widow's gift
  chosen_reading: 'Rendered as a quantitative comparison in context: ''put in more
    than all of them.'''
  alternative_readings:
  - put in more than all
  - put in more than any of them
  rationale: The Greek πλεῖον πάντων naturally expresses comparison with the other
    donors present. The wording preserves Jesus' evaluative statement without importing
    an explicit explanation about proportion until the following verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not yet make.
