theological_decisions:
- issue: Meaning of κατισχύσητε in relation to eschatological endurance
  chosen_reading: Rendered as 'may have strength' rather than 'may be counted worthy.'
  alternative_readings:
  - may be counted worthy
  rationale: The SBLGNT text reads κατισχύσητε, which speaks of strength or prevailing,
    not worthiness. Because 'be counted worthy' is a well-known variant in the Byzantine/TR
    tradition and affects interpretation, it is preserved in a footnote rather than
    adopted into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of σταθῆναι ἔμπροσθεν τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen_reading: Kept as 'to stand before the Son of Man' without specifying acquittal
    or acceptance.
  alternative_readings:
  - to stand accepted before the Son of Man
  - to appear before the Son of Man
  rationale: The phrase may imply eschatological vindication, but the Greek itself
    does not explicitly state the manner of standing. Preserving the image maintains
    theological tension without overinterpretation.
  doctrine_reference: Translation philosophy §3
