id: LUK.21.36
reference: Luke 21:36
source:
  edition: SBLGNT
  text: ἀγρυπνεῖτε ⸀δὲ ἐν παντὶ καιρῷ δεόμενοι ἵνα ⸀κατισχύσητε ἐκφυγεῖν ⸀ταῦτα πάντα
    τὰ μέλλοντα γίνεσθαι, καὶ σταθῆναι ἔμπροσθεν τοῦ υἱοῦ τοῦ ἀνθρώπου.
translation:
  text: But stay awake at all times, praying that you may have strength to escape
    all these things that are about to happen, and to stand before the Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'that you may be counted worthy to escape all these
      things...' instead of 'that you may have strength to escape all these things...'
    reason: textual_variant
  - marker: b
    text: Or 'that are going to take place.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'stand before the Son of Man' may imply standing accepted or
      vindicated before him, but the Greek leaves this implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγρυπνεῖτε
  chosen: stay awake
  alternatives:
  - be watchful
  - keep alert
  lexicon: BDAG
  rationale: Imperative calling for vigilant wakefulness. 'Stay awake' is idiomatic
    modern English that preserves the metaphor of alertness better than the more abstract
    'be watchful.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition from the preceding warning material;
    'But' fits the discourse flow.
- source_word: ἐν παντὶ καιρῷ
  chosen: at all times
  alternatives:
  - at every time
  - always
  lexicon: BDAG
  rationale: Natural English rendering of the distributive sense; preserves the continual
    aspect without sounding wooden.
- source_word: δεόμενοι
  chosen: praying
  alternatives:
  - begging
  - asking
  lexicon: BDAG
  rationale: The participle denotes petitionary prayer. 'Praying' is the best contextual
    rendering; the nuance of entreaty is present but need not be overtranslated.
- source_word: ἵνα κατισχύσητε
  chosen: that you may have strength
  alternatives:
  - that you may prevail
  - that you may be strong enough
  - that you may be counted worthy
  lexicon: BDAG
  rationale: κατισχύω commonly means to be strong enough, prevail, or have power over.
    The reading 'be counted worthy' reflects a textual variant found in some traditions,
    but the SBLGNT reads κατισχύσητε. 'Have strength' best fits the infinitives that
    follow.
- source_word: ἐκφυγεῖν
  chosen: to escape
  alternatives:
  - to flee from
  - to avoid
  lexicon: BDAG
  rationale: Aorist infinitive expressing the desired result of having strength; 'escape'
    is the standard and clear rendering.
- source_word: ταῦτα πάντα τὰ μέλλοντα γίνεσθαι
  chosen: all these things that are about to happen
  alternatives:
  - all these things that are going to take place
  - all these things that are destined to happen
  lexicon: BDAG
  rationale: μέλλω + infinitive often conveys imminence or futurity. 'About to happen'
    preserves the force naturally in English, while 'take place' is a viable alternative.
- source_word: σταθῆναι
  chosen: to stand
  alternatives:
  - to stand firm
  - to appear
  lexicon: BDAG
  rationale: Passive infinitive of ἵστημι in this context conveys standing before
    someone, likely with the sense of being presented or standing accepted. 'To stand'
    keeps the image and avoids importing interpretive expansion into the main text.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in the presence of
  - before the presence of
  lexicon: BDAG
  rationale: Simple spatial-relational term; 'before' is concise and natural.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established translation of the titular expression, preserving both the
    Semitic background and the christological self-designation used in the Gospels.
