theological_decisions:
- issue: Apparent tension with nearby predictions of death/persecution in context
  chosen_reading: Render the statement as a proverbial assurance of ultimate preservation
    rather than as a denial of any physical harm.
  alternative_readings:
  - A strictly literal promise that no physical injury at all will occur
  rationale: The immediate context includes persecution and even death for some disciples,
    so the verse should not be translated in a way that falsely resolves that tension.
    'Not a hair from your head will ever perish' preserves the idiomatic, emphatic
    assurance without importing an interpretive explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
