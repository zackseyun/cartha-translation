id: LUK.21.18
reference: Luke 21:18
source:
  edition: SBLGNT
  text: καὶ θρὶξ ἐκ τῆς κεφαλῆς ὑμῶν οὐ μὴ ἀπόληται.
translation:
  text: And not a hair from your head will ever perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'not a hair from your head will certainly not perish';
      the Greek uses an emphatic double negative to express strong assurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - But
  - Indeed
  lexicon: BDAG
  rationale: Standard connective carried over straightforwardly; 'And' preserves the
    flow from the preceding context without adding contrast not explicit in the conjunction.
- source_word: θρὶξ
  chosen: a hair
  alternatives:
  - one hair
  - a single hair
  lexicon: BDAG
  rationale: Singular noun used idiomatically in English as 'a hair.' This preserves
    the proverbial sense of complete protection without sounding wooden.
- source_word: ἐκ τῆς κεφαλῆς ὑμῶν
  chosen: from your head
  alternatives:
  - of your head
  - from your heads
  lexicon: BDAG
  rationale: The phrase is a partitive expression meaning 'from your head.' English
    idiom prefers singular 'your head' with plural possessive 'your' when addressing
    multiple people collectively.
- source_word: οὐ μὴ
  chosen: will ever ... not
  alternatives:
  - will certainly not
  - shall by no means
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. The final
    English clause is rendered idiomatically as 'will ever perish' with the negation
    built into the whole expression, preserving the force without archaic wording.
- source_word: ἀπόληται
  chosen: perish
  alternatives:
  - be lost
  - be destroyed
  lexicon: BDAG
  rationale: ἀπόλλυμι here denotes perishing/loss. 'Perish' best preserves the solemn
    register and avoids over-literal 'be lost,' while not overstating physical destruction.
    In context it functions proverbially to express ultimate preservation despite
    suffering.
