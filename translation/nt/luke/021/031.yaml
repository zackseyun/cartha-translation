theological_decisions:
- issue: Meaning of 'the kingdom of God' in an eschatological context
  chosen_reading: Retain the phrase 'the kingdom of God' without interpretive expansion.
  alternative_readings:
  - the reign of God
  - God's kingly rule is near in consummation
  rationale: The verse signals the nearness of God's kingdom in connection with the
    described signs, but the text itself does not specify whether this refers primarily
    to manifestation, consummation, or vindication. Preserving the biblical phrase
    maintains the theological tension rather than resolving an eschatological debate.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
