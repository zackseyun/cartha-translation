id: LUK.21.31
reference: Luke 21:31
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ὅταν ἴδητε ταῦτα γινόμενα, γινώσκετε ὅτι ἐγγύς ἐστιν ἡ βασιλεία
    τοῦ θεοῦ.
translation:
  text: So also you, when you see these things happening, know that the kingdom of
    God is near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these things taking place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the reign of God is near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So also
  alternatives:
  - Likewise
  - In the same way
  lexicon: BDAG
  rationale: Introduces the application of the preceding comparison. 'So also' preserves
    the inferential force and reads naturally in English.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis. English can convey this without
    an awkwardly emphatic form; the emphasis is sufficiently carried by word order
    with 'So also you'.
- source_word: ὅταν ἴδητε
  chosen: when you see
  alternatives:
  - whenever you see
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive expresses a future contingency. 'When
    you see' is idiomatic and fits the predictive context better than the more repetitive
    'whenever'.
- source_word: ταῦτα γινόμενα
  chosen: these things happening
  alternatives:
  - these things taking place
  - these things coming to pass
  lexicon: BDAG
  rationale: γινόμενα here denotes events occurring. 'Happening' is clear modern English;
    'taking place' is also possible but slightly more formal. 'These things' preserves
    the demonstrative reference to the signs just described.
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - recognize
  - be aware
  lexicon: BDAG
  rationale: The present imperative calls for the disciples to understand or recognize
    the significance of the signs. 'Know' is the most direct and traditional rendering,
    while remaining natural.
- source_word: ἐγγύς ἐστιν
  chosen: is near
  alternatives:
  - is close
  - has drawn near
  lexicon: BDAG
  rationale: ἐγγύς with εἰμί expresses nearness. 'Is near' is concise and preserves
    the spatial-temporal metaphor without overinterpreting aspect.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering. 'Kingdom'
    preserves both realm and reign connotations without narrowing the phrase; 'reign
    of God' is interpretive and less idiomatic here.
