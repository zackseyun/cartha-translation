id: LUK.21.38
reference: Luke 21:38
source:
  edition: SBLGNT
  text: καὶ πᾶς ὁ λαὸς ὤρθριζεν πρὸς αὐτὸν ἐν τῷ ἱερῷ ἀκούειν αὐτοῦ.
translation:
  text: And all the people would come early in the morning to him in the temple to
    hear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or courts, not specifically the
      inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶς ὁ λαὸς
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: BDAG
  rationale: The phrase is distributive/collective, referring broadly to the populace
    gathering around Jesus. 'All the people' is natural English and preserves the
    comprehensive sense without overstating it as every individual without exception.
- source_word: ὤρθριζεν
  chosen: would come early in the morning
  alternatives:
  - came early
  - was arriving at dawn
  - would rise early
  lexicon: BDAG
  rationale: The imperfect indicates customary/repeated action. The verb ὀρθρίζω carries
    the sense of being up early or coming at daybreak. 'Would come early in the morning'
    captures both the iterative imperfect and the temporal nuance in idiomatic English.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  - to Jesus
  lexicon: BDAG
  rationale: πρός with the accusative here marks movement toward a person. 'To him'
    is the most natural rendering and preserves the anaphoric reference without unnecessarily
    repeating the name.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - at the temple precincts
  - in the temple courts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'In the temple' is standard and readable; the broader precinct sense is
    worth preserving in a footnote because English readers may otherwise imagine the
    sanctuary proper.
- source_word: ἀκούειν αὐτοῦ
  chosen: to hear him
  alternatives:
  - to listen to him
  - to hear from him
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the people came in order to hear Jesus.
    The genitive after ἀκούω is a normal construction meaning ''hear/listen to.''
    ''To hear him'' is concise and idiomatic.'
