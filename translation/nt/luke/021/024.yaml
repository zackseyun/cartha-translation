theological_decisions:
- issue: Rendering of ἔθνη throughout the verse
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The same Greek noun occurs three times, and the verse speaks both of
    exile 'into all the nations' and Jerusalem being trampled 'by the nations.' Rendering
    all three consistently as 'nations' preserves lexical cohesion and avoids prematurely
    resolving whether the emphasis is geopolitical or specifically non-Jewish peoples.
    Because 'Gentiles' is a longstanding and contextually plausible rendering, it
    is preserved in footnotes rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §5 (Consistency of key
    terms, or documented exception) and §3 (Preserve theological tension rather than
    resolve it).'
- issue: Sense of καιροὶ ἐθνῶν
  chosen_reading: the times of the nations are fulfilled
  alternative_readings:
  - the times of the Gentiles are fulfilled
  - the appointed times of the nations are completed
  rationale: The phrase likely refers to a divinely bounded period related to the
    nations, but the exact theological scheme should not be imported into the translation.
    'Are fulfilled' preserves the passive and eschatological weight without specifying
    a particular end-times framework.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve theological
    tension rather than resolve it).'
