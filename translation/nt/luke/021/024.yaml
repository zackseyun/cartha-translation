id: LUK.21.24
reference: Luke 21:24
source:
  edition: SBLGNT
  text: καὶ πεσοῦνται στόματι μαχαίρης καὶ αἰχμαλωτισθήσονται εἰς ⸂τὰ ἔθνη πάντα⸃,
    καὶ Ἰερουσαλὴμ ἔσται πατουμένη ὑπὸ ἐθνῶν, ἄχρι ⸀οὗ ⸀πληρωθῶσιν καιροὶ ἐθνῶν.
translation:
  text: And they will fall by the edge of the sword and will be led captive into all
    the nations, and Jerusalem will be trampled by the nations until the times of
    the nations are fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into all the Gentiles' / 'among all the Gentiles'; the Greek ἔθνη can
      mean 'nations' or 'Gentiles' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jerusalem will be trampled by the Gentiles.'
    reason: alternative_reading
  - marker: c
    text: Or 'until the times of the Gentiles are fulfilled.'
    reason: alternative_reading
lexical_decisions:
- source_word: πεσοῦνται
  chosen: they will fall
  alternatives:
  - they will die
  - they will be struck down
  lexicon: BDAG
  rationale: Future middle of πίπτω, here in a warfare context. 'Fall' preserves the
    idiomatic sense of being killed in battle without over-paraphrasing; the following
    phrase specifies the manner.
- source_word: στόματι μαχαίρης
  chosen: by the edge of the sword
  alternatives:
  - by the mouth of the sword
  - by the sword
  lexicon: BDAG
  rationale: A standard Semitic/Greek idiom literally 'mouth of a sword.' 'By the
    edge of the sword' is the established natural English equivalent that preserves
    the concrete imagery better than the flatter 'by the sword.'
- source_word: αἰχμαλωτισθήσονται
  chosen: will be led captive
  alternatives:
  - will be taken captive
  - will be carried away captive
  lexicon: BDAG
  rationale: Future passive of αἰχμαλωτίζω. 'Will be led captive' reflects both the
    passive and the sense of being taken away as prisoners; it is natural modern English
    without losing the force of deportation.
- source_word: εἰς τὰ ἔθνη πάντα
  chosen: into all the nations
  alternatives:
  - among all the nations
  - to all the Gentiles
  lexicon: BDAG
  rationale: εἰς with accusative suggests movement into/among the nations. Because
    ἔθνη appears repeatedly in this verse, rendering it consistently as 'nations'
    is preferable here; 'Gentiles' is possible in context but would narrow the sense
    and introduce an interpretive distinction not demanded by the Greek.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: πατουμένη
  chosen: will be trampled
  alternatives:
  - will be trodden down
  - will be underfoot
  lexicon: BDAG
  rationale: Present passive participle with ἔσται forms a periphrastic future, expressing
    an ongoing state. 'Will be trampled' is clear modern English and preserves the
    image of subjugation.
- source_word: ὑπὸ ἐθνῶν
  chosen: by the nations
  alternatives:
  - by Gentiles
  - by the Gentiles
  lexicon: BDAG
  rationale: For consistency with the earlier ἔθνη in the same verse, 'nations' is
    retained. 'Gentiles' is a viable contextual alternative and is preserved in a
    footnote because many readers will hear the Jewish/non-Jewish contrast here.
- source_word: ἄχρι οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction in this construction; 'until' is the most
    natural concise rendering.
- source_word: πληρωθῶσιν
  chosen: are fulfilled
  alternatives:
  - are completed
  - reach their full measure
  lexicon: BDAG
  rationale: Aorist passive subjunctive of πληρόω. 'Are fulfilled' preserves the passive
    and allows either completion or fulfillment of a divinely appointed period without
    over-interpreting.
- source_word: καιροὶ ἐθνῶν
  chosen: the times of the nations
  alternatives:
  - the times of the Gentiles
  - the appointed times of the nations
  lexicon: BDAG
  rationale: καιροί denotes appointed or significant times/seasons, not merely chronological
    duration. 'Times of the nations' is a transparent rendering that preserves the
    genitive ambiguity; 'Gentiles' is a traditional alternative worth preserving in
    a footnote.
