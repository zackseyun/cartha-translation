id: LUK.21.35
reference: Luke 21:35
source:
  edition: SBLGNT
  text: ὡς παγίς· ⸂ἐπεισελεύσεται γὰρ⸃ ἐπὶ πάντας τοὺς καθημένους ἐπὶ πρόσωπον πάσης
    τῆς γῆς.
translation:
  text: like a trap. For it will come upon all those dwelling on the face of the whole
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a snare.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all those sitting/living on the face of the whole earth.' The Greek
      idiom refers to those dwelling or residing on the earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'the whole land,' though 'the whole earth' best fits the scope of the
      phrase here.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς παγίς
  chosen: like a trap
  alternatives:
  - as a snare
  lexicon: BDAG
  rationale: παγίς denotes a trap or snare. 'Trap' is clearer in modern English, while
    preserving the sudden, inescapable force of the image. 'Like' reflects ὡς straightforwardly.
- source_word: ἐπεισελεύσεται
  chosen: it will come upon
  alternatives:
  - it will come in upon
  - it will overtake
  lexicon: BDAG
  rationale: Future middle of ἐπεισέρχομαι conveys something coming upon or overtaking
    people. In context, the implied subject is the day just mentioned in the preceding
    verse. 'Come upon' is idiomatic English and fits the warning context without over-paraphrasing.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding warning. 'For' preserves the connective
    force in a natural but still fairly formal way.
- source_word: ἐπὶ πάντας
  chosen: upon all
  alternatives:
  - on all
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates movement onto/upon. 'Upon all' matches
    the solemn tone and pairs naturally with the verb phrase 'come upon.'
- source_word: τοὺς καθημένους
  chosen: those dwelling
  alternatives:
  - those sitting
  - those living
  lexicon: BDAG
  rationale: Although κάθημαι literally means 'sit,' in this idiom with ἐπὶ πρόσωπον
    τῆς γῆς it refers to those who reside or dwell on the earth. 'Dwelling' preserves
    the participial feel while communicating the idiomatic sense better than a wooden
    'sitting.'
- source_word: ἐπὶ πρόσωπον
  chosen: on the face of
  alternatives:
  - over
  - upon the surface of
  lexicon: BDAG
  rationale: This is a common Semitic-influenced expression meaning 'on the face/surface
    of.' Retaining 'on the face of' preserves the biblical idiom and solemn register.
- source_word: πάσης τῆς γῆς
  chosen: the whole earth
  alternatives:
  - all the earth
  - the whole land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In this eschatological context with 'all
    those dwelling on the face of,' the global sense 'earth' is most natural. 'Whole
    earth' renders πάσης with appropriate scope.
