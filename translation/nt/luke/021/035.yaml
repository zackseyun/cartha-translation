theological_decisions:
- issue: Scope of γῆ in an eschatological warning
  chosen_reading: the whole earth
  alternative_readings:
  - the whole land
  rationale: While γῆ can denote either 'land' or 'earth,' the phrase 'all those dwelling
    on the face of the whole earth' strongly favors a universal scope rather than
    a merely regional one. This preserves the breadth of Jesus's warning without importing
    a narrower interpretive scheme.
  doctrine_reference: Translation philosophy §1, §3
