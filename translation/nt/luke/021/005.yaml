id: LUK.21.5
reference: Luke 21:5
source:
  edition: SBLGNT
  text: Καί τινων λεγόντων περὶ τοῦ ἱεροῦ, ὅτι λίθοις καλοῖς καὶ ἀναθήμασιν κεκόσμηται
    εἶπεν·
translation:
  text: And as some were speaking about the temple, that it had been adorned with
    beautiful stones and votive offerings, he said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicated gifts.' The Greek term refers to offerings devoted to God
      and displayed at the temple.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple precincts generally, not specifically the
      inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: τινων λεγόντων
  chosen: as some were speaking
  alternatives:
  - while some were speaking
  - some saying
  lexicon: BDAG
  rationale: The genitive absolute is best rendered with a temporal circumstantial
    clause in natural English. 'As some were speaking' preserves the ongoing aspect
    of λεγόντων without sounding wooden.
- source_word: τοῦ ἱεροῦ
  chosen: the temple
  alternatives:
  - the temple complex
  - the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers broadly to the temple precincts rather than specifically
    the inner sanctuary (ναός). 'The temple' is the standard readable rendering; the
    broader sense is contextually understood.
- source_word: λίθοις καλοῖς
  chosen: with beautiful stones
  alternatives:
  - with fine stones
  - with splendid stones
  lexicon: BDAG
  rationale: καλοῖς here describes the impressive quality/beauty of the stones used
    in the temple. 'Beautiful' is natural and preserves the evaluative sense.
- source_word: ἀναθήμασιν
  chosen: votive offerings
  alternatives:
  - dedicated gifts
  - offerings dedicated to God
  lexicon: BDAG
  rationale: ἀνάθημα in this context refers to gifts dedicated in the temple. 'Votive
    offerings' is precise and idiomatic, though slightly formal; it best captures
    the cultic sense without confusion with ordinary sacrifices.
- source_word: κεκόσμηται
  chosen: had been adorned
  alternatives:
  - was adorned
  - had been decorated
  lexicon: BDAG
  rationale: 'The perfect passive indicates a completed action with present result:
    the temple stood adorned. ''Had been adorned'' fits the English indirect discourse
    after ''that'' and preserves the stative-result nuance better than a simple present.'
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - Jesus said
  lexicon: BDAG
  rationale: The Greek has only the pronoun implied in the verb, not the explicit
    name. 'He said' preserves the discourse flow and avoids adding what is not in
    the text.
