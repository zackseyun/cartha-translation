theological_decisions:
- issue: Meaning of οὐρανός in an apocalyptic context
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: The phrase may denote phenomena in the sky, but Luke frequently uses
    'heaven' with theological resonance. 'From heaven' preserves that resonance while
    remaining textually faithful and not forcing a specific supernatural mechanism.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
