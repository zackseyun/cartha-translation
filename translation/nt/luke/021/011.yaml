id: LUK.21.11
reference: Luke 21:11
source:
  edition: SBLGNT
  text: σεισμοί τε μεγάλοι ⸂καὶ κατὰ τόπους⸃ ⸂λιμοὶ καὶ λοιμοὶ⸃ ἔσονται, φόβητρά τε
    καὶ ⸂σημεῖα ἀπ’ οὐρανοῦ μεγάλα⸃ ἔσται.
translation:
  text: There will be great earthquakes, and in various places famines and plagues;
    and there will be terrors and great signs from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek οὐρανός can refer either to heaven or to the
      sky, and the phrase may describe visible celestial phenomena.
    reason: lexical_alternative
  - marker: b
    text: Or 'pestilences.' The Greek λοιμοί refers to epidemic outbreaks or plagues.
    reason: lexical_alternative
  - marker: c
    text: Or 'portents' for 'signs,' especially in an apocalyptic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: σεισμοί
  chosen: earthquakes
  alternatives:
  - seismic events
  lexicon: BDAG
  rationale: The standard sense is literal earthquakes. 'Earthquakes' is natural modern
    English and fits the eschatological context.
- source_word: μεγάλοι
  chosen: great
  alternatives:
  - large
  - severe
  lexicon: BDAG
  rationale: With 'earthquakes,' μέγας can denote magnitude or severity. 'Great' preserves
    the Greek wording and biblical register without over-interpreting.
- source_word: κατὰ τόπους
  chosen: in various places
  alternatives:
  - in different places
  - from place to place
  lexicon: BDAG
  rationale: The idiom means distributed by location. 'In various places' is idiomatic
    English and preserves the sense of geographic spread.
- source_word: λιμοὶ
  chosen: famines
  alternatives:
  - food shortages
  lexicon: BDAG
  rationale: The noun denotes famine rather than a milder shortage. 'Famines' is the
    direct and established rendering.
- source_word: λοιμοὶ
  chosen: plagues
  alternatives:
  - pestilences
  - diseases
  lexicon: BDAG
  rationale: λοιμός can denote plague, pestilence, or epidemic disease. 'Plagues'
    is clear modern English and retains the severity better than the more archaic
    'pestilences.'
- source_word: φόβητρά
  chosen: terrors
  alternatives:
  - terrifying things
  - frightening events
  lexicon: BDAG
  rationale: The rare neuter plural denotes objects or occurrences that inspire fear.
    'Terrors' is concise, natural, and preserves the ominous force.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - portents
  lexicon: BDAG
  rationale: σημεῖον commonly means 'sign.' Although 'portents' could fit an apocalyptic
    context, 'signs' is broader and more consistent with NT usage.
- source_word: ἀπ’ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean sky or heaven, but in Luke's theological idiom 'heaven'
    is preferable and preserves the elevated register and possible divine association
    without over-specifying.
- source_word: μεγάλα
  chosen: great
  alternatives:
  - mighty
  - large
  lexicon: BDAG
  rationale: With 'signs,' 'great' preserves the Greek adjective straightforwardly
    and avoids adding interpretive nuance such as miraculous power.
- source_word: τε ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: Greek grammar
  rationale: The paired particles link items in a cumulative list. In English, simple
    coordination with repeated 'and' best reflects the flow without sounding wooden.
- source_word: ἔσονται / ἔσται
  chosen: there will be
  alternatives:
  - will occur
  - will happen
  lexicon: BDAG
  rationale: Using existential 'there will be' naturally renders future forms of εἰμί
    in a list of coming events. The singular ἔσται likely agrees with the final compound
    subject, but English can smoothly render both clauses existentially.
