id: LUK.21.26
reference: Luke 21:26
source:
  edition: SBLGNT
  text: ἀποψυχόντων ἀνθρώπων ἀπὸ φόβου καὶ προσδοκίας τῶν ἐπερχομένων τῇ οἰκουμένῃ,
    αἱ γὰρ δυνάμεις τῶν οὐρανῶν σαλευθήσονται.
translation:
  text: with people fainting from fear and expectation of the things coming upon the
    inhabited world, for the powers of the heavens will be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the world' or 'the earth'; Greek 'the inhabited world.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the heavenly powers' or 'the powers of heaven.' The phrase may refer
      broadly to cosmic or celestial powers.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποψυχόντων
  chosen: fainting
  alternatives:
  - failing
  - expiring
  - swooning
  lexicon: BDAG
  rationale: Present participle genitive plural modifying ἀνθρώπων in a genitive absolute-like
    construction. The sense is people collapsing or losing heart/strength from terror.
    'Fainting' is natural modern English and preserves the physical-psychological
    force better than the traditional but less idiomatic 'men's hearts failing.'
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although grammatically masculine plural, the referent is generic humanity
    rather than males specifically. Per gender-accurate policy, 'people' best reflects
    the representative force in idiomatic English.
- source_word: ἀπὸ φόβου
  chosen: from fear
  alternatives:
  - because of fear
  - out of fear
  lexicon: BDAG
  rationale: ἀπό with the genitive marks cause/source here. 'From fear' is concise
    and natural, preserving the causal sense.
- source_word: προσδοκίας
  chosen: expectation
  alternatives:
  - foreboding
  - anticipation
  lexicon: BDAG
  rationale: The noun denotes expectation or anxious waiting. In this context the
    expectation is ominous, but the Greek itself does not explicitly add 'dread' or
    'foreboding,' so 'expectation' keeps the lexical core while the context supplies
    the fearfulness.
- source_word: τῶν ἐπερχομένων
  chosen: of the things coming
  alternatives:
  - of what is coming
  - of the things about to come
  lexicon: BDAG
  rationale: Substantival participle, neuter plural, referring to impending events.
    'The things coming' is slightly formal but transparent and preserves the plural/eventive
    force better than a singular abstraction.
- source_word: τῇ οἰκουμένῃ
  chosen: upon the inhabited world
  alternatives:
  - upon the world
  - upon the earth
  lexicon: BDAG
  rationale: οἰκουμένη often denotes the inhabited world, the world of human society,
    not merely the physical earth. 'Inhabited world' preserves that nuance, though
    'world' remains a viable smoother alternative.
- source_word: αἱ ... δυνάμεις τῶν οὐρανῶν
  chosen: the powers of the heavens
  alternatives:
  - the powers of heaven
  - the heavenly powers
  lexicon: BDAG
  rationale: This phrase can denote cosmic powers or the heavenly bodies/powers associated
    with the skies. 'The powers of the heavens' stays close to the Greek and preserves
    the ambiguity rather than prematurely resolving it.
- source_word: σαλευθήσονται
  chosen: will be shaken
  alternatives:
  - will be moved
  - will be thrown into turmoil
  lexicon: BDAG
  rationale: Future passive indicative. 'Will be shaken' is the standard and clearest
    rendering for cosmic disturbance imagery, preserving both literal and apocalyptic
    resonance.
