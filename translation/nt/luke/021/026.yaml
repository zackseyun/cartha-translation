theological_decisions:
- issue: Meaning of 'the powers of the heavens' in apocalyptic context
  chosen_reading: Retain the ambiguous cosmic expression 'the powers of the heavens'
    rather than interpret it as either angelic beings or astronomical bodies alone.
  alternative_readings:
  - the heavenly bodies
  - the angelic powers
  rationale: The phrase participates in prophetic-apocalyptic imagery and may evoke
    cosmic structures, heavenly luminaries, or celestial powers. The translation preserves
    the text's theological tension rather than narrowing it beyond what the Greek
    requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
