theological_decisions:
- issue: Meaning of 'your redemption' in an eschatological discourse
  chosen_reading: Rendered as 'your redemption,' understood as the approaching final
    deliverance/vindication of Jesus' disciples at the consummation.
  alternative_readings:
  - your deliverance from the immediate historical crisis only
  - your redemption in a fully spiritualized, non-eschatological sense
  rationale: The immediate context is apocalyptic and future-oriented; ἀπολύτρωσις
    retains theological depth and should not be reduced either to merely political
    escape or to an abstract spiritual state. The translation preserves the term without
    over-specifying the mechanism.
  doctrine_reference: Translation philosophy §§1, 3, 6
