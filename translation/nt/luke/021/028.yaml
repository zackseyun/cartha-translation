id: LUK.21.28
reference: Luke 21:28
source:
  edition: SBLGNT
  text: ἀρχομένων δὲ τούτων γίνεσθαι ἀνακύψατε καὶ ἐπάρατε τὰς κεφαλὰς ὑμῶν, διότι
    ἐγγίζει ἡ ἀπολύτρωσις ὑμῶν.
translation:
  text: But when these things begin to happen, straighten up and lift up your heads,
    because your redemption is drawing near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as these things begin to take place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'look up and raise your heads.'
    reason: lexical_alternative
  - marker: c
    text: '''Redemption'' may also be rendered ''deliverance''; here it refers to
      the approaching final deliverance of Jesus'' people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχομένων ... τούτων γίνεσθαι
  chosen: when these things begin to happen
  alternatives:
  - as these things begin to take place
  - when these things start happening
  lexicon: BDAG
  rationale: 'The genitive absolute marks a temporal circumstance: ''when/as these
    things begin to happen.'' ''Begin to happen'' preserves both ἀρχομένων and γίνεσθαι
    without awkwardness.'
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild transition/contrast with the preceding distress;
    'But' fits the shift to encouragement.
- source_word: ἀνακύψατε
  chosen: straighten up
  alternatives:
  - look up
  - stand upright
  lexicon: BDAG
  rationale: The verb can mean to straighten oneself up or lift oneself after being
    bent down. 'Straighten up' captures the bodily and metaphorical sense of renewed
    courage better than the more interpretive 'look up.'
- source_word: ἐπάρατε τὰς κεφαλὰς ὑμῶν
  chosen: lift up your heads
  alternatives:
  - raise your heads
  lexicon: BDAG
  rationale: This is a natural English rendering that preserves the plural imperative
    and the idiomatic image of confidence/hope.
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: '''Because'' gives clear contemporary English causal force.'
- source_word: ἐγγίζει
  chosen: is drawing near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: The present tense here conveys approaching nearness. 'Is drawing near'
    expresses the processive sense more naturally than the static 'is near.'
- source_word: ἀπολύτρωσις
  chosen: redemption
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Redemption'' is the standard and theologically weighty rendering,
    preserving the salvation/liberation sense without flattening it to mere rescue.
    In this Lukan eschatological context it refers to the believers'' final deliverance.'
