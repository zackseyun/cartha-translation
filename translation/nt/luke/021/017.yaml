id: LUK.21.17
reference: Luke 21:17
source:
  edition: SBLGNT
  text: καὶ ἔσεσθε μισούμενοι ὑπὸ πάντων διὰ τὸ ὄνομά μου.
translation:
  text: And you will be hated by all because of my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of me' / 'on account of my name.' The phrase 'my name' can refer
      to Jesus' identity, authority, and the confession of allegiance to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσεσθε
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: BDAG
  rationale: Future middle indicative of εἰμί functioning as a future copula with
    the participle μισούμενοι. Rendered with standard modern English future 'will
    be' rather than archaic 'shall be' for readability.
- source_word: μισούμενοι
  chosen: hated
  alternatives:
  - being hated
  lexicon: BDAG
  rationale: Present passive participle plural from μισέω, complementing ἔσεσθε. English
    idiom prefers the finite passive construction 'will be hated' rather than the
    more wooden 'will be being hated.' The participle's durative sense is adequately
    conveyed by the passive future construction in context.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  - by all people
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency; πάντων is a broad plural genitive
    meaning 'all' or 'everyone.' 'By all' preserves the compact force of the Greek
    and echoes the universal hostility envisioned, without adding 'people,' which
    is implied but not explicit.
- source_word: διὰ
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or cause. 'Because of'
    is the clearest contemporary rendering; 'for' is possible but more ambiguous in
    modern English.
- source_word: τὸ ὄνομά μου
  chosen: my name
  alternatives:
  - the name of me
  lexicon: BDAG
  rationale: A standard idiomatic rendering of the accusative object of διά. In biblical
    usage 'name' often carries the sense of person, identity, authority, and allegiance;
    the literal 'my name' preserves that theological resonance without over-interpreting
    it in the main text.
