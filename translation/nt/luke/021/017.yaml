theological_decisions:
- issue: Sense of 'my name' in discipleship/persecution context
  chosen_reading: Retain the literal expression 'my name' rather than interpretively
    expanding it to 'because you belong to me' or 'because of me.'
  alternative_readings:
  - because of me
  - because you bear my name
  rationale: The Greek explicitly says 'because of my name.' In Luke-Acts, 'name'
    can denote Jesus' identity, authority, and the confession attached to him. Preserving
    the literal wording maintains that theological richness and avoids narrowing the
    cause of persecution to only one aspect.
  doctrine_reference: Translation philosophy §§1, 3, 6
