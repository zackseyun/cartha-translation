id: LUK.21.25
reference: Luke 21:25
source:
  edition: SBLGNT
  text: Καὶ ⸀ἔσονται σημεῖα ἐν ἡλίῳ καὶ σελήνῃ καὶ ἄστροις, καὶ ἐπὶ τῆς γῆς συνοχὴ
    ἐθνῶν ἐν ἀπορίᾳ ⸀ἤχους θαλάσσης καὶ σάλου,
translation:
  text: And there will be signs in sun and moon and stars, and on the earth distress
    of nations in perplexity at the roaring of the sea and the surging waves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sun and moon and stars.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'at the sound of the sea and its surging.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - portents
  lexicon: BDAG
  rationale: '''Signs'' is the standard and broad rendering, fitting extraordinary
    phenomena without over-specifying ominous meaning. ''Portents'' is possible in
    apocalyptic context but is narrower and more interpretive.'
- source_word: ἐν ἡλίῳ καὶ σελήνῃ καὶ ἄστροις
  chosen: in sun and moon and stars
  alternatives:
  - in the sun and moon and stars
  lexicon: BDAG
  rationale: The Greek uses singular/dative forms without articles. English can naturally
    omit the articles in elevated apocalyptic style while preserving the coordinate
    structure. The alternative with articles is also idiomatic.
- source_word: συνοχὴ
  chosen: distress
  alternatives:
  - anguish
  - constraint
  lexicon: BDAG
  rationale: In context συνοχή denotes a state of pressing distress or constriction.
    'Distress' is clear modern English and fits the collective plight of the nations.
- source_word: ἐθνῶν
  chosen: of nations
  alternatives:
  - of the nations
  - among the nations
  - of Gentiles
  lexicon: BDAG
  rationale: Here ἔθνη refers broadly to peoples/nations of the world, not specifically
    Gentiles in contrast to Jews. The genitive is best rendered 'of nations' modifying
    'distress.'
- source_word: ἐν ἀπορίᾳ
  chosen: in perplexity
  alternatives:
  - in bewilderment
  - at a loss
  lexicon: BDAG
  rationale: ἀπορία conveys being at a loss, without a way forward. 'In perplexity'
    preserves the formal structure and the sense of bewildered helplessness.
- source_word: ἤχους
  chosen: at the roaring
  alternatives:
  - because of the sound
  - at the noise
  lexicon: BDAG
  rationale: Although literally 'sound/noise,' in context with sea and surge the sense
    is the tumultuous roar. Rendering with 'roaring' communicates the natural force
    implied by the genitive construction in idiomatic English.
- source_word: θαλάσσης
  chosen: of the sea
  lexicon: BDAG
  rationale: Straightforward genitive dependent on ἤχους.
- source_word: σάλου
  chosen: and the surging waves
  alternatives:
  - and the surge
  - and the tossing
  lexicon: BDAG
  rationale: σάλος denotes surging, tossing, or agitation, especially of the sea.
    'Surging waves' makes the image explicit in natural English, since 'the sea and
    the surge' is awkward and potentially obscure. This is a modest dynamic adjustment
    within optimal equivalence.
