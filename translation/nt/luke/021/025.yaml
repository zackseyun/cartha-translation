theological_decisions:
- issue: Nature of the cosmic phenomena
  chosen_reading: Render the language straightforwardly as apocalyptic signs without
    explaining whether they are literal astronomical events, symbolic imagery, or
    both.
  alternative_readings:
  - Literal cosmic disturbances
  - Primarily symbolic-political imagery
  rationale: The verse itself announces signs in heavenly bodies and distress on earth
    but does not resolve the interpretive debate over literal versus symbolic fulfillment.
    The translation preserves that tension rather than importing a specific eschatological
    system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
