theological_decisions:
- issue: Meaning of βίος in the widow's gift
  chosen_reading: Rendered as material means of living ('livelihood'), not 'life'
    in an existential sense.
  alternative_readings:
  - all her life
  rationale: The context concerns monetary giving, and βίος commonly denotes one's
    means of subsistence. Rendering it as 'life' could invite an overstated theological
    reading that she literally gave her life rather than all she had to live on.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Reference of τὰ δῶρα
  chosen_reading: Rendered closely as 'the gifts' rather than interpretively as 'the
    temple treasury' or simply 'the offering.'
  alternative_readings:
  - the offerings
  - the temple treasury
  rationale: The immediate context makes clear these are donated gifts in the temple
    setting, but the Greek term itself is 'gifts.' A closer rendering avoids importing
    more specificity than the verse states, while context can clarify the setting.
  doctrine_reference: Translation philosophy §1, §5
