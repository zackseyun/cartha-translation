id: LUK.21.4
reference: Luke 21:4
source:
  edition: SBLGNT
  text: ⸀πάντες γὰρ οὗτοι ἐκ τοῦ περισσεύοντος αὐτοῖς ἔβαλον εἰς τὰ ⸀δῶρα, αὕτη δὲ
    ἐκ τοῦ ὑστερήματος αὐτῆς ⸀πάντα τὸν βίον ὃν εἶχεν ἔβαλεν.
translation:
  text: For all these gave into the gifts out of their abundance, but she, out of
    her lack, put in all the livelihood she had.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offerings.' The Greek says 'the gifts,' referring to donated gifts
      in the temple context.
    reason: lexical_alternative
  - marker: b
    text: Or 'out of her poverty' or 'out of her need.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all her living' or 'her whole means of living'; not 'all her life' in
      the sense of her entire existence.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες γὰρ οὗτοι
  chosen: For all these
  alternatives:
  - For all of these
  - Because all these
  lexicon: BDAG
  rationale: γάρ is rendered as 'For' to preserve the explanatory connection to the
    previous verse. πάντες with οὗτοι is naturally 'all these' rather than a more
    expanded paraphrase.
- source_word: ἐκ τοῦ περισσεύοντος αὐτοῖς
  chosen: out of their abundance
  alternatives:
  - from what was surplus to them
  - out of what they had in excess
  lexicon: BDAG
  rationale: The participle περισσεύοντος denotes that which is in excess or abundance.
    'Out of their abundance' is idiomatic English and preserves the contrast with
    the widow's lack.
- source_word: ἔβαλον εἰς τὰ δῶρα
  chosen: gave into the gifts
  alternatives:
  - put into the offering gifts
  - threw into the temple gifts
  - gave into the offerings
  lexicon: BDAG
  rationale: ἔβαλον literally means 'threw/put,' but in this donation context 'gave'
    is natural English. τὰ δῶρα is literally 'the gifts'; this likely refers to the
    temple gift treasury/offering receptacle context from the preceding verse. I retained
    'gifts' in the main text to stay close to the Greek, while preserving 'offerings'
    as a lexical alternative in a footnote-worthy option.
- source_word: αὕτη δὲ
  chosen: but she
  alternatives:
  - but this woman
  - but this one
  lexicon: BDAG
  rationale: The feminine demonstrative refers to the widow already identified in
    context. 'But she' is natural and preserves the contrastive δέ without unnecessary
    repetition.
- source_word: ἐκ τοῦ ὑστερήματος αὐτῆς
  chosen: out of her lack
  alternatives:
  - out of her poverty
  - out of her need
  - out of what she lacked
  lexicon: BDAG
  rationale: ὑστέρημα denotes deficiency, want, or lack. 'Out of her lack' preserves
    the lexical contrast with 'abundance' more directly than 'poverty,' though 'poverty'
    is a strong contextual alternative.
- source_word: πάντα τὸν βίον
  chosen: all the livelihood
  alternatives:
  - all her living
  - her whole means of living
  - all her life
  lexicon: BDAG
  rationale: βίος here refers not to biological life in the abstract but to one's
    means of life, livelihood, or resources for living. 'All the livelihood' aims
    to preserve that concrete sense. 'All her living' is traditional but less clear
    in contemporary English; 'all her life' could be misunderstood.
- source_word: ὃν εἶχεν
  chosen: she had
  alternatives:
  - that she had
  lexicon: BDAG
  rationale: The relative clause modifies βίον and is naturally rendered in English
    as 'she had.' The explicit relative pronoun can be absorbed idiomatically without
    loss.
- source_word: ἔβαλεν
  chosen: put in
  alternatives:
  - gave
  - threw in
  lexicon: BDAG
  rationale: For the widow's action, 'put in' preserves the physical imagery of depositing
    coins while remaining natural English. Using 'put in' here also highlights the
    concrete act after the earlier summary 'gave' for the rich donors.
