theological_decisions:
- issue: Apocalyptic conflict formula
  chosen_reading: Render the saying as a straightforward prediction of geopolitical
    upheaval without importing a specific end-times system.
  alternative_readings:
  - Treat as exclusively referring to the fall of Jerusalem
  - Treat as a detailed timetable of the end
  rationale: The verse itself states a general pattern of nation and kingdom rising
    against one another. The translation should preserve the wording without resolving
    broader eschatological debates not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
