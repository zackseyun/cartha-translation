id: LUK.21.10
reference: Luke 21:10
source:
  edition: SBLGNT
  text: τότε ἔλεγεν αὐτοῖς· Ἐγερθήσεται ἔθνος ἐπ’ ἔθνος καὶ βασιλεία ἐπὶ βασιλείαν,
translation:
  text: Then he said to them, “Nation will rise against nation, and kingdom against
    kingdom,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will arise.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker linking this saying to the preceding context;
    'Then' is natural modern English and preserves the narrative sequence.
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect of λέγω can be iterative or progressive, but in English narrative
    introducing direct speech, 'he said' is the most idiomatic rendering without overstating
    aspect.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to them.'
- source_word: Ἐγερθήσεται
  chosen: will rise
  alternatives:
  - will be raised
  - will arise
  lexicon: BDAG
  rationale: Future passive/middle form of ἐγείρω in this conflict formula is idiomatically
    rendered 'will rise' or 'will arise.' 'Will be raised' is too wooden and may imply
    an external agent in a way English does not require here.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: BDAG
  rationale: In this geopolitical context, ἔθνος refers to a nation/people-group as
    a collective political entity. 'Nation' best fits the parallel with 'kingdom'
    and the conflict formula.
- source_word: ἐπ’ ἔθνος
  chosen: against nation
  alternatives:
  - upon nation
  lexicon: BDAG
  rationale: ἐπί with accusative in this idiom expresses hostile opposition; English
    'against' captures the sense clearly.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - realm
  - royal power
  lexicon: BDAG
  rationale: Here βασιλεία denotes a kingdom or political dominion, not abstract kingship.
    'Kingdom' preserves the concrete geopolitical sense and the traditional apocalyptic
    formula.
- source_word: ἐπὶ βασιλείαν
  chosen: against kingdom
  alternatives:
  - upon kingdom
  lexicon: BDAG
  rationale: As with ἐπ’ ἔθνος, the prepositional phrase is adversative in this context;
    'against kingdom' is the natural English equivalent within the repeated formula.
