id: LUK.21.9
reference: Luke 21:9
source:
  edition: SBLGNT
  text: ὅταν δὲ ἀκούσητε πολέμους καὶ ἀκαταστασίας, μὴ πτοηθῆτε· δεῖ γὰρ ταῦτα γενέσθαι
    πρῶτον, ἀλλ’ οὐκ εὐθέως τὸ τέλος.
translation:
  text: But when you hear of wars and upheavals, do not be terrified; for these things
    must happen first, but the end is not at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'disturbances,' 'tumults,' or 'disorders' for 'upheavals.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'but the end will not come immediately.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅταν introduces an indefinite future temporal clause ('when/whenever'),
    and δέ is a mild connective best represented here by 'But' to mark development
    from the prior warning without overstating contrast.
- source_word: ἀκούσητε
  chosen: you hear of
  alternatives:
  - you hear
  - you hear about
  lexicon: BDAG
  rationale: 'Aorist subjunctive in a temporal clause: ''when you hear.'' In English,
    ''hear of'' idiomatically fits reports of events such as wars and disturbances.'
- source_word: πολέμους
  chosen: wars
  lexicon: BDAG
  rationale: Straightforward plural accusative of πόλεμος, referring to armed conflicts.
- source_word: ἀκαταστασίας
  chosen: upheavals
  alternatives:
  - disturbances
  - tumults
  - disorders
  - insurrections
  lexicon: BDAG
  rationale: ἀκαταστασία can denote disorder, unrest, or turmoil. 'Upheavals' communicates
    broad social and political instability in natural modern English without narrowing
    the sense too specifically to riots or rebellions.
- source_word: μὴ πτοηθῆτε
  chosen: do not be terrified
  alternatives:
  - do not be alarmed
  - do not be frightened
  lexicon: BDAG
  rationale: The passive/deponent imperative conveys being frightened or thrown into
    panic. 'Do not be terrified' preserves the emotional force more strongly than
    the milder 'alarmed.'
- source_word: δεῖ γὰρ
  chosen: for ... must
  alternatives:
  - for it is necessary that
  - because ... must
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'Must' is the clearest natural rendering; γάρ
    gives explanatory force, hence 'for.'
- source_word: ταῦτα γενέσθαι
  chosen: these things must happen
  alternatives:
  - these things must take place
  - these things must come to pass
  lexicon: BDAG
  rationale: γίνομαι in this context refers to events occurring. 'Happen' is idiomatic
    and accessible; 'take place' is a close alternative.
- source_word: πρῶτον
  chosen: first
  lexicon: BDAG
  rationale: 'Adverbial accusative indicating sequence: these events precede what
    follows.'
- source_word: ἀλλ’ οὐκ εὐθέως τὸ τέλος
  chosen: but the end is not at once
  alternatives:
  - but the end will not come immediately
  - but the end is not immediately
  lexicon: BDAG
  rationale: εὐθέως means immediately/at once. The Greek is verbless after ἀλλά, literally
    'but not immediately the end.' 'The end is not at once' stays close to the Greek
    structure while remaining understandable; the more explicit 'will not come immediately'
    is interpretive but worth preserving in a footnote.
