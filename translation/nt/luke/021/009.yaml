theological_decisions:
- issue: Eschatological timing statement
  chosen_reading: Jesus says wars and upheavals are necessary precursors, but they
    do not mean the end follows immediately.
  alternative_readings:
  - The end will not come immediately after these events
  - These events are signs within the period before the end, not the end itself
  rationale: The verse cautions against equating reports of turmoil with the immediate
    arrival of 'the end.' The translation preserves the temporal tension without importing
    a specific end-times system.
  doctrine_reference: Preserve theological tension rather than resolve it.
