theological_decisions:
- issue: Meaning of 'this generation' in an eschatological saying
  chosen_reading: Render the phrase lexically as 'this generation' without resolving
    whether it refers to Jesus' contemporaries, the generation that sees the signs,
    or a people-group.
  alternative_readings:
  - this age
  - this people
  - the generation that sees these things
  rationale: The Greek phrase itself is straightforward, but its referent is debated.
    Per translation philosophy, the translation preserves the textual wording and
    does not settle the interpretive debate in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
