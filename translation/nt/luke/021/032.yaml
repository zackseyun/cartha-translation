id: LUK.21.32
reference: Luke 21:32
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ὅτι οὐ μὴ παρέλθῃ ἡ γενεὰ αὕτη ἕως ἂν πάντα γένηται.
translation:
  text: Truly I say to you, this generation will certainly not pass away until all
    things have happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this people' or 'this age'; the Greek word can be understood in more
      than one way, though 'generation' is the most direct rendering.
    reason: alternative_reading
  - marker: b
    text: Some translations read 'all these things,' supplying 'these' from the surrounding
      context; the Greek here simply says 'all things.'
    reason: lexical_alternative
  - marker: c
    text: Or 'take place' or 'come to pass.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative affirmation. 'Truly' is idiomatic
    modern English and preserves the force without unnecessary transliteration.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A standard direct-speech formula. 'I say to you' stays closer to the
    Greek while remaining natural English.
- source_word: οὐ μὴ παρέλθῃ
  chosen: will certainly not pass away
  alternatives:
  - will by no means pass away
  - will never pass away
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not pass away' conveys the strong denial in clear modern English.
- source_word: ἡ γενεὰ αὕτη
  chosen: this generation
  alternatives:
  - this age
  - this people
  lexicon: BDAG
  rationale: γενεά most naturally means 'generation' here. Because the phrase is interpretively
    disputed in eschatological contexts, the main text keeps the straightforward lexical
    sense, while alternatives are preserved in a footnote.
- source_word: ἕως ἂν
  chosen: until
  alternatives:
  - until such time as
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the limit up to which the preceding
    statement holds.
- source_word: πάντα
  chosen: all things
  alternatives:
  - all these things
  - everything
  lexicon: BDAG
  rationale: The neuter plural means 'all things.' In context it likely refers to
    the matters just described, but the Greek text here does not explicitly include
    'these,' so 'all things' is preferred.
- source_word: γένηται
  chosen: have happened
  alternatives:
  - take place
  - come to pass
  - be fulfilled
  lexicon: BDAG
  rationale: γίνομαι here denotes occurrence or coming about. 'Have happened' is natural
    English after 'until' and avoids importing the stronger theological nuance of
    'be fulfilled' unless context explicitly demands it.
