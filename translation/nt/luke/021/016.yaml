id: LUK.21.16
reference: Luke 21:16
source:
  edition: SBLGNT
  text: παραδοθήσεσθε δὲ καὶ ὑπὸ γονέων καὶ ⸂ἀδελφῶν καὶ συγγενῶν καὶ φίλων⸃, καὶ
    θανατώσουσιν ἐξ ὑμῶν,
translation:
  text: But you will be handed over even by parents and brothers and relatives and
    friends, and they will put some of you to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters' / 'siblings,' since the Greek masculine plural
      can sometimes refer to a mixed group of siblings.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοθήσεσθε
  chosen: you will be handed over
  alternatives:
  - you will be delivered up
  - you will be betrayed
  lexicon: BDAG
  rationale: Future passive of παραδίδωμι. 'Handed over' is natural modern English
    and preserves the sense of being turned over to hostile authorities or opponents.
    'Betrayed' is possible in context because the agents are intimates, but the verb
    itself more basically denotes handing over; the betrayal nuance is carried by
    the named relations.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast from the preceding assurance;
    'But' captures the adversative turn without overstating it.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  lexicon: BDAG
  rationale: 'The first καὶ after δέ has an ascensive force in context: not only outsiders,
    but even close relations will hand them over. Rendering it as ''even'' brings
    out that emphasis.'
- source_word: ὑπὸ
  chosen: by
  lexicon: BDAG
  rationale: With the passive verb, ὑπό marks personal agency; 'by' is the standard
    and clear rendering.
- source_word: γονέων
  chosen: parents
  alternatives:
  - fathers and mothers
  lexicon: BDAG
  rationale: Plural of γονεύς refers collectively to parents. 'Parents' is idiomatic
    and accurately inclusive of both father and mother.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate policy, the masculine plural is rendered with
    the English form matching the source. In kinship lists ἀδελφοί can be representative,
    but the translation keeps 'brothers' in the main text and preserves the broader
    familial possibility in a footnote.
- source_word: συγγενῶν
  chosen: relatives
  alternatives:
  - kinsmen
  - kinsfolk
  lexicon: BDAG
  rationale: This term denotes those of the same family or kin group. 'Relatives'
    is clear, modern, and broad enough for the Greek.
- source_word: φίλων
  chosen: friends
  lexicon: BDAG
  rationale: Straightforward rendering of φίλος in the plural genitive after ὑπό.
- source_word: θανατώσουσιν
  chosen: they will put ... to death
  alternatives:
  - they will kill
  lexicon: BDAG
  rationale: Future active of θανατόω means to cause death. 'Put to death' preserves
    the gravity and can imply execution or deliberate killing without narrowing the
    mode too much.
- source_word: ἐξ ὑμῶν
  chosen: some of you
  alternatives:
  - from among you
  lexicon: BDAG
  rationale: The idiom ἐξ ὑμῶν after a verb of killing means 'some of you' rather
    than a wooden 'from among you.' This is the natural English equivalent.
