theological_decisions:
- issue: Rendering of ἀδελφῶν in a kinship list
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the stated gender-accurate policy, the masculine plural is
    retained as 'brothers' in the main text rather than neutralizing it. Because kinship
    terms can function representatively and modern readers may infer a broader sense,
    the alternative is preserved in a footnote rather than moved into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
