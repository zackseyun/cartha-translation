theological_decisions:
- issue: Eschatological reference of 'that day'
  chosen_reading: that day
  alternative_readings:
  - that day of judgment
  - the day
  rationale: The phrase clearly points to the climactic day in Jesus' discourse, but
    the translation preserves the text's own wording without expanding it into a fuller
    doctrinal label.
  doctrine_reference: Preserve theological tension rather than resolve it.
