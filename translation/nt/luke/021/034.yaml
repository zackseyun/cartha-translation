id: LUK.21.34
reference: Luke 21:34
source:
  edition: SBLGNT
  text: Προσέχετε δὲ ἑαυτοῖς μήποτε βαρηθῶσιν ⸂ὑμῶν αἱ καρδίαι⸃ ἐν κραιπάλῃ καὶ μέθῃ
    καὶ μερίμναις βιωτικαῖς, καὶ ⸂ἐπιστῇ ἐφ’ ὑμᾶς αἰφνίδιος⸃ ἡ ἡμέρα ἐκείνη
translation:
  text: But watch yourselves, lest your hearts be weighed down with dissipation and
    drunkenness and the worries of life, and that day come upon you suddenly
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carousing'; the Greek term can refer to the excess and aftereffects
      of overindulgence in drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: watch
  alternatives:
  - be on guard
  - pay attention
  lexicon: BDAG
  rationale: Imperative calling for vigilance. 'Watch yourselves' is natural modern
    English and preserves the warning force without sounding archaic.
- source_word: ἑαυτοῖς
  chosen: yourselves
  alternatives:
  - to yourselves
  lexicon: BDAG
  rationale: Dative reflexive with προσέχω gives the sense 'watch yourselves' or 'be
    on guard for yourselves.' English idiom favors 'watch yourselves.'
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that not
  - in case
  lexicon: BDAG
  rationale: Introduces a negative warning clause. 'Lest' is concise and accurately
    conveys preventive force.
- source_word: βαρηθῶσιν
  chosen: be weighed down
  alternatives:
  - be burdened
  - be dulled
  lexicon: BDAG
  rationale: Passive subjunctive of βαρέω. The image is of hearts becoming heavy or
    burdened. 'Be weighed down' preserves the metaphor and fits the listed causes.
- source_word: καρδίαι
  chosen: hearts
  lexicon: BDAG
  rationale: Standard rendering; in context refers to the inner life, attention, and
    moral-spiritual responsiveness, not merely emotion.
- source_word: κραιπάλῃ
  chosen: dissipation
  alternatives:
  - carousing
  - hangover
  - debauchery
  lexicon: BDAG
  rationale: The term can denote the nausea/headache of excess drinking or, by extension,
    revelry/intemperance. 'Dissipation' captures the broader moral-spiritual excess
    in a readable way, while avoiding overprecision toward only the aftereffects.
- source_word: μέθῃ
  chosen: drunkenness
  alternatives:
  - intoxication
  lexicon: BDAG
  rationale: Straightforward rendering of the noun for drunkenness; pairs naturally
    with κραιπάλῃ.
- source_word: μερίμναις βιωτικαῖς
  chosen: the worries of life
  alternatives:
  - the anxieties of daily life
  - worldly cares
  lexicon: BDAG
  rationale: μερίμναις are cares/anxieties; βιωτικαῖς qualifies them as pertaining
    to ordinary earthly life. 'The worries of life' is clear, natural, and broad enough
    to include daily concerns without importing a pejorative beyond the context.
- source_word: ἐπιστῇ ἐφ’ ὑμᾶς
  chosen: come upon you
  alternatives:
  - overtake you
  - fall upon you
  lexicon: BDAG
  rationale: Aorist subjunctive of ἐφίστημι with ἐπί conveys sudden arrival upon someone.
    'Come upon you' is idiomatic and preserves the warning.
- source_word: αἰφνίδιος
  chosen: suddenly
  alternatives:
  - unexpectedly
  lexicon: BDAG
  rationale: 'Though formally an adjective modifying ''day,'' English idiom often
    renders the effect adverbially: the day comes ''suddenly.'' This best communicates
    the sense in natural English.'
- source_word: ἡ ἡμέρα ἐκείνη
  chosen: that day
  alternatives:
  - that day of judgment
  lexicon: BDAG
  rationale: The Greek says simply 'that day.' The eschatological reference is clear
    from context, but the translation should not add 'of judgment' where the text
    does not explicitly do so.
