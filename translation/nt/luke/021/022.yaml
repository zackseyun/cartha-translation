id: LUK.21.22
reference: Luke 21:22
source:
  edition: SBLGNT
  text: ὅτι ἡμέραι ἐκδικήσεως αὗταί εἰσιν τοῦ πλησθῆναι πάντα τὰ γεγραμμένα.
translation:
  text: For these are days of vengeance, so that all the things written may be fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because these are days of retribution.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for all that has been written to be fulfilled.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanation for the preceding warning. 'For' fits natural
    English while preserving the causal/explanatory force; 'because' is possible but
    slightly heavier in this context.
- source_word: ἡμέραι
  chosen: days
  lexicon: BDAG
  rationale: Straightforward plural noun; retained formally as 'days' rather than
    paraphrasing as 'time' or 'period.'
- source_word: ἐκδικήσεως
  chosen: vengeance
  alternatives:
  - avenging
  - retribution
  - justice
  lexicon: BDAG
  rationale: The genitive denotes the character of these days as days of divine requital/judgment.
    'Vengeance' is the most direct and traditional rendering in this eschatological/judicial
    context. 'Retribution' is possible but less idiomatic here; 'justice' is too broad
    and softens the punitive sense.
- source_word: αὗταί
  chosen: these
  lexicon: BDAG
  rationale: Demonstrative referring emphatically to the days just mentioned/in view;
    rendered directly as 'these.'
- source_word: εἰσιν
  chosen: are
  lexicon: BDAG
  rationale: Simple copula; no expansion needed.
- source_word: τοῦ πλησθῆναι
  chosen: so that ... may be fulfilled
  alternatives:
  - for ... to be fulfilled
  - in order that ... might be fulfilled
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses purpose/result. In context,
    'so that ... may be fulfilled' gives clear modern English while preserving the
    teleological/resultative sense. A more formal 'for ... to be fulfilled' is less
    natural.
- source_word: πλησθῆναι
  chosen: may be fulfilled
  alternatives:
  - may be completed
  - may be accomplished
  lexicon: BDAG
  rationale: In relation to 'the things written,' the idiomatic biblical English equivalent
    is 'be fulfilled.' 'Accomplished' is possible, but 'fulfilled' better matches
    scriptural prediction/completion language.
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Rendered with comprehensive force. Because English idiom benefits from
    an explicit object with the participle phrase, it is expressed as 'all the things
    written.'
- source_word: τὰ γεγραμμένα
  chosen: the things written
  alternatives:
  - what has been written
  - the Scriptures written
  lexicon: BDAG
  rationale: Perfect passive participle functioning substantivally. 'The things written'
    preserves the formal sense and leaves the referent broad—written prophetic/scriptural
    matters—without over-specifying as 'Scriptures' in the main text.
