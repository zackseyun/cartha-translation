theological_decisions:
- issue: Nature of ἐκδικήσεως in Jesus' prophecy
  chosen_reading: Rendered as 'vengeance' with the sense of divine judicial retribution
    tied to fulfillment of what is written.
  alternative_readings:
  - justice
  - punishment
  rationale: The verse presents these days as judicial and scripturally grounded.
    'Vengeance' best preserves the severity and biblical register without importing
    a merely human vindictive sense; the following clause anchors it in God's righteous
    fulfillment of Scripture.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of τοῦ + infinitive
  chosen_reading: 'Expressed as purpose/result: ''so that all the things written may
    be fulfilled.'''
  alternative_readings:
  - for all the things written to be fulfilled
  rationale: The construction can shade toward purpose or result; English 'so that
    ... may be fulfilled' preserves that tension without forcing a narrower interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
