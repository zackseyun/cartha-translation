id: LUK.21.14
reference: Luke 21:14
source:
  edition: SBLGNT
  text: ⸀θέτε οὖν ⸂ἐν ταῖς καρδίαις⸃ ὑμῶν μὴ προμελετᾶν ἀπολογηθῆναι,
translation:
  text: Therefore, settle it in your hearts not to prepare beforehand to defend yourselves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set it in your hearts' or 'resolve in your hearts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'not to rehearse beforehand how to make your defense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέτε
  chosen: settle it
  alternatives:
  - set
  - resolve
  lexicon: BDAG
  rationale: Aorist active imperative of τίθημι used idiomatically with ἐν ταῖς καρδίαις,
    meaning to fix or determine something internally. 'Set' is more literal, but 'settle
    it' better conveys the idiomatic force in natural English while preserving the
    imperative sense.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding context. 'Therefore' preserves the
    logical connection clearly and formally enough for the discourse flow.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  alternatives:
  - in your heart
  - within yourselves
  lexicon: BDAG
  rationale: Plural in Greek, addressed to multiple disciples. 'Hearts' preserves
    the anthropological idiom of inner resolve rather than reducing it to mere cognition.
- source_word: μὴ
  chosen: not
  alternatives:
  - do not
  lexicon: BDAG
  rationale: Negates the infinitival idea dependent on the imperative. English idiom
    is best expressed as 'settle it ... not to ...' rather than a second imperative.
- source_word: προμελετᾶν
  chosen: to prepare beforehand
  alternatives:
  - to rehearse beforehand
  - to premeditate
  lexicon: BDAG
  rationale: The verb denotes thinking out or practicing in advance. 'Prepare beforehand'
    is clear modern English and avoids the misleading criminal connotations of 'premeditate.'
    'Rehearse beforehand' is possible but slightly narrower.
- source_word: ἀπολογηθῆναι
  chosen: to defend yourselves
  alternatives:
  - to make your defense
  - to answer in your defense
  lexicon: BDAG
  rationale: Aorist middle infinitive of ἀπολογέομαι, commonly used for giving a legal
    or formal defense. 'Defend yourselves' is concise and natural in context, while
    preserving the reflexive sense implied by the middle voice.
