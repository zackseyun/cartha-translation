id: LUK.21.7
reference: Luke 21:7
source:
  edition: SBLGNT
  text: Ἐπηρώτησαν δὲ αὐτὸν λέγοντες· Διδάσκαλε, πότε οὖν ταῦτα ἔσται, καὶ τί τὸ σημεῖον
    ὅταν μέλλῃ ταῦτα γίνεσθαι;
translation:
  text: And they asked him, saying, “Teacher, when then will these things be, and
    what will be the sign when these things are about to happen?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is the sign when these things are going to happen?' The Greek verb
      may be rendered more generally than 'are about to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπηρώτησαν
  chosen: they asked
  alternatives:
  - they questioned
  - they inquired of
  lexicon: BDAG
  rationale: Aorist indicative narrates a simple past action. 'Asked' is the most
    natural modern English equivalent and fits the direct-question context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'And'
    preserves the flow without overstating contrast.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - with the words
  lexicon: BDAG
  rationale: The participle introduces the content of their question. 'Saying' is
    slightly more formal but natural and closely reflects the Greek construction.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος denotes an instructor/teacher. 'Teacher' is the plain lexical
    sense and avoids importing the stronger authority nuance of 'Master'.
- source_word: πότε οὖν
  chosen: when then
  alternatives:
  - when, then
  - so when
  lexicon: BDAG
  rationale: πότε asks about time; οὖν draws an inference from the preceding discourse.
    'When then' preserves both elements with readable English.
- source_word: ταῦτα ἔσται
  chosen: these things will be
  alternatives:
  - these things will happen
  - this will take place
  lexicon: BDAG
  rationale: The future of εἰμί with neuter plural demonstrative is idiomatic for
    future occurrence. In the final English sentence, 'be' is retained in the first
    clause to stay close to the Greek, while the second clause uses 'happen' for naturalness
    with γίνεσθαι.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: σημεῖον commonly means a sign indicating something significant. 'Sign'
    is the standard and clearest rendering in eschatological discourse.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the subjunctive it introduces a future-oriented temporal clause.
    'When' is the most natural English equivalent here.
- source_word: μέλλῃ
  chosen: are about to
  alternatives:
  - are going to
  - are destined to
  lexicon: BDAG
  rationale: μέλλω conveys imminence or impending occurrence. 'Are about to' best
    captures that nuance more precisely than the broader 'are going to'.
- source_word: γίνεσθαι
  chosen: happen
  alternatives:
  - take place
  - come to pass
  lexicon: BDAG
  rationale: γίνομαι in this context refers to events occurring. 'Happen' is clear
    modern English; 'take place' is possible but slightly more formal.
