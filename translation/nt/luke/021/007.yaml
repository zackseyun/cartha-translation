theological_decisions:
- issue: Eschatological wording and temporal nuance
  chosen_reading: Retain the disciples' request for a 'sign' and preserve μέλλῃ as
    'are about to,' without resolving how immediate or distant the events are.
  alternative_readings:
  - Render μέλλῃ more weakly as 'will' or 'are going to'
  rationale: The verse asks about timing and indication of future events. Translating
    μέλλῃ with an imminence nuance preserves the Greek's tension without forcing a
    specific eschatological scheme.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
