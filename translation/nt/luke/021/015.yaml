theological_decisions:
- issue: Idiomatic force of στόμα in Jesus' promise
  chosen_reading: Rendered idiomatically as 'words' rather than literally as 'mouth'
  alternative_readings:
  - a mouth
  - speech
  rationale: The verse promises divinely supplied utterance and wisdom in persecution.
    Translating literally as 'mouth' risks obscuring the meaning in English and may
    sound anatomical rather than idiomatic. The rendering does not add doctrine; it
    clarifies the source idiom in line with optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
