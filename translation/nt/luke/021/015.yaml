id: LUK.21.15
reference: Luke 21:15
source:
  edition: SBLGNT
  text: ἐγὼ γὰρ δώσω ὑμῖν στόμα καὶ σοφίαν ᾗ οὐ δυνήσονται ⸂ἀντιστῆναι ἢ ἀντειπεῖν⸃
    ⸀ἅπαντες οἱ ἀντικείμενοι ὑμῖν.
translation:
  text: For I will give you words and wisdom that all who oppose you will not be able
    to withstand or contradict.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a mouth and wisdom.' The phrase means the ability to speak,
      together with wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ γὰρ
  chosen: For I
  alternatives:
  - For I myself
  - Because I
  lexicon: BDAG
  rationale: γάρ is best carried forward as an explanatory 'for.' The explicit ἐγώ
    adds emphasis, but normal English can preserve this without an overly heavy 'I
    myself'; the subject pronoun 'I' is retained.
- source_word: δώσω
  chosen: will give
  alternatives:
  - am going to give
  lexicon: BDAG
  rationale: Future active indicative of δίδωμι, straightforwardly rendered as a simple
    future promise.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative indirect object is naturally expressed in English without repeating
    'to' in this sentence.
- source_word: στόμα
  chosen: words
  alternatives:
  - a mouth
  - speech
  lexicon: BDAG
  rationale: Literally 'mouth,' but in this idiom it refers to the capacity or utterance
    given for speaking. 'Words' communicates the sense in natural English while preserving
    the promise of divinely supplied speech. 'A mouth' would sound opaque in contemporary
    English.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - insight
  lexicon: BDAG
  rationale: σοφία regularly means 'wisdom.' It pairs naturally with the idiomatic
    στόμα to express both utterance and discernment.
- source_word: ᾗ
  chosen: that
  alternatives:
  - with which
  - by which
  lexicon: BDAG
  rationale: The relative pronoun is feminine singular, referring back to the combined
    gift of speech and wisdom. English idiom is smoother with 'that' introducing the
    clause, while the instrumental sense is still conveyed by the whole construction.
- source_word: οὐ δυνήσονται
  chosen: will not be able to
  alternatives:
  - cannot
  - will be unable to
  lexicon: BDAG
  rationale: Future middle of δύναμαι is well represented by 'will not be able to,'
    preserving the future orientation and inability.
- source_word: ἀντιστῆναι
  chosen: withstand
  alternatives:
  - resist
  - stand against
  lexicon: BDAG
  rationale: In this forensic/disputational context, 'withstand' fits the sense of
    being unable to hold out against the disciples' God-given speech and wisdom.
- source_word: ἢ ἀντειπεῖν
  chosen: or contradict
  alternatives:
  - or speak against
  - or oppose verbally
  lexicon: BDAG
  rationale: ἀντειπεῖν adds the verbal dimension of speaking in opposition. 'Contradict'
    is concise and natural alongside 'withstand.'
- source_word: ἅπαντες οἱ ἀντικείμενοι ὑμῖν
  chosen: all who oppose you
  alternatives:
  - all your adversaries
  - all those set against you
  lexicon: BDAG
  rationale: The participial phrase denotes those who are opposed to the disciples.
    'All who oppose you' is clear, accurate, and contemporary. 'Adversaries' is possible
    but slightly more formal and less transparent for modern readers.
