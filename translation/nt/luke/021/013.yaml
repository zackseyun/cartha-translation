id: LUK.21.13
reference: Luke 21:13
source:
  edition: SBLGNT
  text: ⸀ἀποβήσεται ὑμῖν εἰς μαρτύριον.
translation:
  text: This will turn out for you as a testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This will result in an opportunity for witness for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποβήσεται
  chosen: will turn out
  alternatives:
  - will result
  - will happen
  - will become
  lexicon: BDAG
  rationale: Future middle of ἀποβαίνω here carries the sense of an outcome or result
    rather than simple occurrence. 'Will turn out' preserves the idiomatic idea that
    the preceding persecution/events will have a particular outcome for the disciples.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative is naturally rendered 'for you' with ἀποβαίνω in this construction,
    expressing the event's result with reference to the disciples. 'To you' is possible
    but less idiomatic in English here.
- source_word: εἰς
  chosen: as
  alternatives:
  - for
  - into
  lexicon: BDAG
  rationale: In the phrase εἰς μαρτύριον, εἰς marks result or purpose. 'As a testimony'
    is idiomatic English and captures the resultant function of the events.
- source_word: μαρτύριον
  chosen: a testimony
  alternatives:
  - witness
  - evidence
  lexicon: BDAG
  rationale: μαρτύριον denotes testimony or witness-bearing. 'Testimony' fits the
    noun form and preserves the legal/public sense of bearing witness in context.
    'Witness' is possible, but in English it can sound more like a person than the
    act or content of witness.
