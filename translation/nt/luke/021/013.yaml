theological_decisions:
- issue: Sense of the disciples' suffering before authorities
  chosen_reading: The events Jesus predicts will become an occasion for the disciples
    to bear testimony.
  alternative_readings:
  - The events will serve as evidence against their opponents.
  rationale: In Luke's context of arrest and examination before rulers, μαρτύριον
    most naturally points to witness borne by the disciples concerning Jesus. The
    wording avoids over-specifying whether the testimony is primarily evangelistic
    or judicial, preserving the text's breadth.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
