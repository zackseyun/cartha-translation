theological_decisions:
- issue: Strength of Jesus' claim about the permanence of his words
  chosen_reading: The verse is rendered to preserve the stark contrast between the
    transience of heaven and earth and the absolute permanence of Jesus' words, without
    softening the emphatic negation.
  alternative_readings:
  - Heaven and earth will pass away, but my words will never pass away.
  rationale: The Greek οὐ μὴ is stronger than a simple negation. 'Certainly not' was
    chosen to make the emphasis explicit while retaining readable modern English.
    This preserves the theological weight of Jesus' authority without adding interpretation
    beyond the text.
  doctrine_reference: Translation philosophy §§3, 6
