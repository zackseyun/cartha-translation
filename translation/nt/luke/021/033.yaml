id: LUK.21.33
reference: Luke 21:33
source:
  edition: SBLGNT
  text: ὁ οὐρανὸς καὶ ἡ γῆ ⸀παρελεύσονται, οἱ δὲ λόγοι μου οὐ μὴ παρελεύσονται.
translation:
  text: Heaven and earth will pass away, but my words will certainly not pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my words will never pass away.' The Greek uses an emphatic negation
      (οὐ μὴ).
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In this eschatological saying paired with 'earth,' the singular οὐρανός
    refers to the created heaven as part of the cosmos, not merely the visible sky.
    'Heaven and earth' is the established and accurate English equivalent for the
    merism.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In the fixed pair 'heaven and earth,' γῆ denotes the earth/world rather
    than a particular land. 'Earth' preserves the cosmic scope of the statement.
- source_word: παρελεύσονται
  chosen: will pass away
  alternatives:
  - will pass by
  - will disappear
  lexicon: BDAG
  rationale: παρέρχομαι here means to pass away or come to an end. 'Will pass away'
    is idiomatic, preserves the future sense, and fits both the cosmic subjects and
    the contrast with Jesus' words.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks contrast here between the transience of creation and the permanence
    of Jesus' words. 'But' best conveys that adversative force in English.
- source_word: λόγοι
  chosen: words
  alternatives:
  - sayings
  - statements
  lexicon: BDAG
  rationale: λόγοι in this context refers to Jesus' spoken words/utterances. 'Words'
    is the most direct and natural rendering and preserves the solemnity of the claim.
- source_word: οὐ μὴ
  chosen: certainly not
  alternatives:
  - by no means
  - never
  lexicon: BDAG
  rationale: The double negative οὐ μὴ with the future verb is an emphatic negation.
    Rendering it with 'certainly not' preserves the strong force without sounding
    archaic. Because English requires a smoother clause, the emphasis is expressed
    adverbially rather than by a literal double negative.
- source_word: παρελεύσονται
  chosen: will pass away
  alternatives:
  - will pass by
  - will come to an end
  lexicon: BDAG
  rationale: 'The repeated verb is rendered consistently to preserve the rhetorical
    parallel: creation may pass away, but Jesus'' words will not.'
