id: LUK.21.20
reference: Luke 21:20
source:
  edition: SBLGNT
  text: Ὅταν δὲ ἴδητε κυκλουμένην ὑπὸ ⸀στρατοπέδων Ἰερουσαλήμ, τότε γνῶτε ὅτι ἤγγικεν
    ἡ ἐρήμωσις αὐτῆς.
translation:
  text: But when you see Jerusalem surrounded by armies, then know that her desolation
    has drawn near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surrounded by military encampments.' The Greek term can refer to camps
      or encamped armies; here it denotes the forces besieging Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''Desolation'' echoes prophetic judgment language; compare the related
      wording in Matthew 24:15 and Mark 13:14.'
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a future contingency with the subjunctive; 'when' is the most
    natural English rendering in this prophetic warning context.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild transition/contrast from the preceding discourse. 'But'
    preserves the discourse shift without overstating it.
- source_word: ἴδητε
  chosen: you see
  alternatives:
  - you catch sight of
  - you perceive
  lexicon: BDAG
  rationale: Aorist subjunctive of ὁράω after ὅταν; idiomatic English uses present
    'you see' in a future-condition setting.
- source_word: κυκλουμένην
  chosen: surrounded
  alternatives:
  - encircled
  - being surrounded
  lexicon: BDAG
  rationale: Present passive participle describing Jerusalem's condition. 'Surrounded'
    is clear, natural, and preserves the military sense.
- source_word: ὑπὸ στρατοπέδων
  chosen: by armies
  alternatives:
  - by camps
  - by military encampments
  lexicon: BDAG
  rationale: στρατόπεδον can denote a camp/encampment, but in this context the referent
    is the military forces besieging the city. 'By armies' communicates the sense
    more clearly in modern English while remaining faithful to the scene.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Temporal adverb marking the consequent action; 'then' is concise and
    natural.
- source_word: γνῶτε
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: BDAG
  rationale: Aorist imperative calling for recognition of the sign's meaning. 'Know'
    is direct and preserves the force of the command.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: Perfect tense of ἐγγίζω conveys a state resulting from approach. 'Has
    drawn near' preserves the aspect better than the simpler 'is near.'
- source_word: ἡ ἐρήμωσις αὐτῆς
  chosen: her desolation
  alternatives:
  - its desolation
  - her devastation
  lexicon: BDAG
  rationale: ἐρήμωσις denotes desolation/devastation. 'Desolation' preserves the biblical
    resonance, including links to prophetic judgment language. 'Her' follows the feminine
    grammatical reference to Jerusalem and is idiomatic for cities in English.
