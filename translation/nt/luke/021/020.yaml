theological_decisions:
- issue: Reference of Jerusalem's coming judgment
  chosen_reading: Render ἐρήμωσις as 'desolation' without specifying a later interpretive
    framework beyond the city's impending devastation.
  alternative_readings:
  - Render more dynamically as 'destruction'
  - Tie explicitly to 'the abomination of desolation' in the main text
  rationale: The verse itself speaks of Jerusalem's desolation approaching when armies
    surround her. 'Desolation' preserves the lexical and prophetic weight without
    importing a fuller eschatological scheme not stated in this verse. Any connection
    to related prophetic passages is better preserved in a footnote than embedded
    in the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
