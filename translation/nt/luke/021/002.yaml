id: LUK.21.2
reference: Luke 21:2
source:
  edition: SBLGNT
  text: εἶδεν δέ ⸀τινα χήραν πενιχρὰν βάλλουσαν ἐκεῖ ⸂λεπτὰ δύο⸃,
translation:
  text: And he saw a poor widow putting in two small copper coins there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''two lepta,'' that is, two very small copper coins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he observed
  - he noticed
  lexicon: BDAG
  rationale: Aorist of ὁράω is straightforwardly rendered 'saw.' 'Observed' is possible
    but slightly more interpretive; 'saw' preserves the simple narrative movement.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. 'And' preserves
    continuity without overstating contrast.
- source_word: τινα
  chosen: a
  alternatives:
  - a certain
  - someone who was
  lexicon: BDAG
  rationale: Indefinite τις introduces an unspecified person. In idiomatic English,
    the indefiniteness is naturally conveyed by 'a' before 'poor widow' rather than
    the more wooden 'a certain.'
- source_word: χήραν
  chosen: widow
  lexicon: BDAG
  rationale: χήρα directly means 'widow' and carries social vulnerability that is
    important in context.
- source_word: πενιχρὰν
  chosen: poor
  alternatives:
  - needy
  - destitute
  lexicon: BDAG
  rationale: πενιχρός denotes poverty or meagerness of means. 'Poor' is the most natural
    and sufficiently precise English equivalent here; 'destitute' may overstate the
    term.
- source_word: βάλλουσαν
  chosen: putting in
  alternatives:
  - casting in
  - throwing in
  lexicon: BDAG
  rationale: βάλλω literally means 'throw' or 'cast,' but in the context of depositing
    money into the treasury, 'putting in' is idiomatic modern English and preserves
    the action without archaic phrasing.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - into it
  lexicon: BDAG
  rationale: ἐκεῖ is an adverb meaning 'there.' Since the location is established
    by the preceding context, 'there' is the most direct rendering.
- source_word: λεπτὰ δύο
  chosen: two small copper coins
  alternatives:
  - two lepta
  - two mites
  - two very small coins
  lexicon: BDAG
  rationale: λεπτά were very small copper coins. 'Two small copper coins' communicates
    both the number and the low value in accessible English. 'Mites' is traditional
    but archaic; 'lepta' would require explanation.
