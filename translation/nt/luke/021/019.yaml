id: LUK.21.19
reference: Luke 21:19
source:
  edition: SBLGNT
  text: ἐν τῇ ὑπομονῇ ὑμῶν ⸀κτήσασθε τὰς ψυχὰς ὑμῶν.
translation:
  text: By your endurance you will gain your lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'In your endurance, gain your lives,' reflecting the
      imperative form of the verb.
    reason: textual_variant
  - marker: b
    text: Or 'souls'; the Greek word can mean 'lives,' 'selves,' or 'souls' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομονῇ
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  - perseverance
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under trial. 'Endurance' is concise,
    natural English and fits the persecution context of Luke 21 better than the more
    abstract 'patience.'
- source_word: κτήσασθε
  chosen: you will gain
  alternatives:
  - gain
  - acquire
  - win
  - possess
  lexicon: BDAG
  rationale: 'Although the form is aorist middle imperative in many manuscripts, the
    sense in context is commonly taken as future-like or resultative in English: through
    endurance they will come to gain/preserve life. ''You will gain'' communicates
    the outcome clearly in modern English. The imperative-like alternative is preserved
    in a footnote because of the textual/formal issue.'
- source_word: ψυχὰς
  chosen: lives
  alternatives:
  - souls
  - selves
  lexicon: BDAG
  rationale: ψυχή can mean 'life,' 'self,' or 'soul' depending on context. In this
    discourse about persecution, death, and ultimate preservation, 'lives' best conveys
    the holistic sense without importing a narrower body-soul distinction. The traditional
    'souls' is preserved in a footnote as a lexical alternative.
- source_word: ἐν
  chosen: By
  alternatives:
  - in
  - through
  lexicon: BDAG
  rationale: ἐν with the dative here expresses means or instrument. 'By your endurance'
    is idiomatic English and conveys the means more clearly than the more wooden 'in
    your endurance.'
