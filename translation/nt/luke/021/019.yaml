theological_decisions:
- issue: Meaning of ψυχή in an eschatological persecution context
  chosen_reading: holistic 'lives' rather than narrowly immaterial 'souls'
  alternative_readings:
  - souls
  - selves
  rationale: The verse concerns faithful endurance amid suffering and the ultimate
    preservation of the disciples. Rendering ψυχάς as 'lives' preserves the broader
    semantic range and avoids implying that only the immaterial aspect is in view.
    This keeps the theological tension of bodily danger and ultimate preservation
    without over-specifying anthropology.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
