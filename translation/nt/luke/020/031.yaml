id: LUK.20.31
reference: Luke 20:31
source:
  edition: SBLGNT
  text: καὶ ὁ τρίτος ἔλαβεν ⸀αὐτήν, ὡσαύτως δὲ καὶ οἱ ἑπτὰ οὐ κατέλιπον τέκνα καὶ
    ἀπέθανον·
translation:
  text: And the third took her, and likewise all seven left no children and died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'married her.' The Greek literally says 'took her,' an idiom for taking
      a woman as wife in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  chosen: the third
  alternatives:
  - the third brother
  lexicon: BDAG
  rationale: The Greek explicitly says 'the third' without repeating 'brother.' English
    can preserve the ellipsis naturally. 'The third brother' is interpretive and supplied
    from context, so it is not placed in the main text.
- source_word: ἔλαβεν αὐτήν
  chosen: took her
  alternatives:
  - married her
  lexicon: BDAG
  rationale: In this levirate-marriage context, the idiom means taking the woman as
    wife. 'Took her' stays closer to the Greek while remaining understandable; 'married
    her' is a valid contextual alternative but slightly more interpretive.
- source_word: ὡσαύτως δὲ καὶ
  chosen: and likewise
  alternatives:
  - and in the same way
  - likewise also
  lexicon: BDAG
  rationale: This combination marks continuation with similarity. 'And likewise' is
    concise, natural English that preserves the connective force without overtranslating
    each particle separately.
- source_word: οἱ ἑπτὰ
  chosen: all seven
  alternatives:
  - the seven
  lexicon: BDAG
  rationale: The phrase refers to the full set of seven brothers in sequence. 'All
    seven' makes the totalizing sense explicit in idiomatic English; 'the seven' is
    possible but less natural here.
- source_word: οὐ κατέλιπον τέκνα
  chosen: left no children
  alternatives:
  - left no offspring
  - had no children
  lexicon: BDAG
  rationale: καταλείπω with τέκνα here means leaving descendants behind at death.
    'Left no children' best captures both the familial sense of τέκνα and the implication
    of surviving offspring. 'Had no children' is possible but weakens the connection
    to death implied by 'left.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  - descendants
  lexicon: BDAG
  rationale: τέκνα most straightforwardly means 'children.' In context it refers to
    offspring/descendants, but 'children' is the clearest and most natural rendering.
- source_word: ἀπέθανον
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The verb simply means 'died.' 'Passed away' is softer and less direct
    than the Greek.
