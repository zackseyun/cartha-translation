id: LUK.20.34
reference: Luke 20:34
source:
  edition: SBLGNT
  text: ⸀Καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς· Οἱ υἱοὶ τοῦ αἰῶνος τούτου γαμοῦσιν καὶ ⸀γαμίσκονται,
translation:
  text: And Jesus said to them, “The sons of this age marry and are given in marriage,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The people of this age.” Greek “The sons of this age,” a masculine representative
      expression for those who belong to the present age.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing Jesus' reply; 'And' preserves the simple
    narrative linkage without adding temporal nuance.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - answered
  - told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said.' Although the broader
    context is responsive, the verb itself does not require 'answered.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to these people
  lexicon: BDAG
  rationale: Dative plural pronoun referring to Jesus' interlocutors; 'to them' is
    the straightforward English equivalent.
- source_word: Οἱ υἱοὶ
  chosen: The sons
  alternatives:
  - The people
  - The children
  - The men and women
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'sons.' Per the gender-accurate
    philosophy, the masculine representative expression is preserved rather than neutralized.
    Here it denotes those characterized by belonging to 'this age,' not merely males.
- source_word: τοῦ αἰῶνος τούτου
  chosen: of this age
  alternatives:
  - of this world
  - belonging to this age
  lexicon: BDAG
  rationale: αἰών here refers to the present age/order rather than the physical world.
    'This age' preserves the Jewish eschatological contrast with the age to come,
    which is important in context.
- source_word: γαμοῦσιν
  chosen: marry
  alternatives:
  - take wives
  lexicon: BDAG
  rationale: General verb for marrying. 'Marry' is idiomatic modern English and fits
    the paired contrast with the following passive.
- source_word: γαμίσκονται
  chosen: are given in marriage
  alternatives:
  - are married off
  - are taken in marriage
  lexicon: BDAG
  rationale: Passive form traditionally and accurately rendered 'are given in marriage.'
    This preserves the distinction between the active and passive verbs in Greek,
    likely reflecting conventional male/female roles in marriage idiom without over-paraphrasing.
