theological_decisions:
- issue: Gendered expression in an apparently generic statement
  chosen_reading: The sons of this age
  alternative_readings:
  - The people of this age
  - Those of this age
  rationale: The Greek uses the masculine plural υἱοὶ. In keeping with the project's
    gender-accurate policy, the translation preserves the source's form while understanding
    it representatively. This also maintains the idiom of belonging/characterization
    that 'sons of' conveys.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: αἰών as eschatological category
  chosen_reading: this age
  alternative_readings:
  - this world
  rationale: Rendering αἰών as 'age' preserves the theological contrast between the
    present order and the coming age, which is central to Jesus' argument in the surrounding
    verses. 'World' would be understandable but less precise.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #3'
