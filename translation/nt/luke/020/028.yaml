theological_decisions:
- issue: Rendering of levirate-marriage legal language without importing later doctrinal
    or cultural explanation into the main text
  chosen_reading: 'Use straightforward legal phrasing: ''his brother should take the
    wife and raise up offspring for his brother'''
  alternative_readings:
  - his brother must marry the widow and produce children for his brother
  rationale: The verse cites Mosaic legislation (cf. Deut 25:5) and should sound legal
    but not over-expanded. 'Should take the wife' and 'raise up offspring' preserve
    the biblical idiom and theological-cultural setting without paraphrastic explanation
    in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    meaning without paraphrase beyond what the text warrants.'
