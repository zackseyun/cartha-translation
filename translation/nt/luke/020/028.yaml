id: LUK.20.28
reference: Luke 20:28
source:
  edition: SBLGNT
  text: λέγοντες· Διδάσκαλε, Μωϋσῆς ἔγραψεν ἡμῖν, ἐάν τινος ἀδελφὸς ἀποθάνῃ ἔχων γυναῖκα,
    καὶ οὗτος ἄτεκνος ⸀ᾖ, ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα καὶ ἐξαναστήσῃ σπέρμα
    τῷ ἀδελφῷ αὐτοῦ.
translation:
  text: saying, “Teacher, Moses wrote for us that if someone's brother dies having
    a wife, and he is childless, his brother should take the wife and raise up offspring
    for his brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leave a wife'; the Greek literally says 'dies having a wife.'
    reason: lexical_alternative
  - marker: b
    text: '''Raise up offspring'' echoes the legal idiom of Deuteronomy 25:5 for providing
      descendants in the deceased brother''s name; literally, ''raise up seed.'''
    reason: cross_reference
lexical_decisions:
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct vocative address to Jesus; 'Teacher' is the plain and natural
    rendering in context, avoiding the more archaic or potentially misleading 'Master'.
- source_word: Μωϋσῆς ἔγραψεν ἡμῖν
  chosen: Moses wrote for us
  alternatives:
  - Moses wrote to us
  lexicon: BDAG
  rationale: The dative ἡμῖν here is best taken as advantage/reference in citing the
    Mosaic law given to Israel; 'for us' is idiomatic and reflects covenantal relevance
    rather than direct epistolary address.
- source_word: ἐάν τινος ἀδελφὸς ἀποθάνῃ
  chosen: if someone's brother dies
  alternatives:
  - if any man's brother dies
  lexicon: BDAG
  rationale: τινος is indefinite and generic. 'Someone's brother' preserves the singular,
    generic force in readable modern English without importing unnecessary male-marked
    phrasing beyond what the Greek requires.
- source_word: ἔχων γυναῖκα
  chosen: having a wife
  alternatives:
  - while married
  - leaving a wife
  lexicon: BDAG
  rationale: The participle is most directly rendered 'having a wife.' This keeps
    close to the Greek while remaining intelligible; 'leaving a wife' is interpretive
    and slightly more dynamic.
- source_word: οὗτος ἄτεκνος ᾖ
  chosen: and he is childless
  alternatives:
  - and this man is childless
  - and he should be childless
  lexicon: BDAG
  rationale: οὗτος refers to the deceased brother just mentioned. 'He is childless'
    is the most natural English rendering of the clause and captures ἄτεκνος without
    over-specifying gender of children.
- source_word: ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα
  chosen: his brother should take the wife
  alternatives:
  - his brother should take his wife
  - his brother may marry the wife
  lexicon: BDAG
  rationale: The ἵνα clause expresses the prescribed purpose/result of the law. 'Should
    take the wife' reflects the legal obligation more clearly than permissive 'may,'
    while avoiding over-paraphrase. Repeating 'the wife' mirrors the Greek article
    and keeps the legal tone.
- source_word: ἐξαναστήσῃ σπέρμα
  chosen: raise up offspring
  alternatives:
  - raise up seed
  - produce descendants
  lexicon: BDAG
  rationale: This idiom refers to providing progeny for the deceased brother. 'Raise
    up offspring' preserves the idiomatic and legal-biblical sense in accessible English;
    'seed' is more formal but less clear to modern readers.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: for his brother
  alternatives:
  - for the sake of his brother
  - to his brother
  lexicon: BDAG
  rationale: 'The dative marks benefit/reference: the offspring is reckoned on behalf
    of the deceased brother. ''For his brother'' is concise and accurate.'
