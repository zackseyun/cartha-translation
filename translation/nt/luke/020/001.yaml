id: LUK.20.1
reference: Luke 20:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν μιᾷ τῶν ⸀ἡμερῶν διδάσκοντος αὐτοῦ τὸν λαὸν ἐν τῷ ἱερῷ καὶ εὐαγγελιζομένου
    ἐπέστησαν οἱ ⸀ἀρχιερεῖς καὶ οἱ γραμματεῖς σὺν τοῖς πρεσβυτέροις,
translation:
  text: And it happened, on one of those days, while he was teaching the people in
    the temple and proclaiming the good news, that the chief priests and the scribes,
    together with the elders, came up to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "preaching the gospel."
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex, not specifically the inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: BDAG
  rationale: A common Lukan narrative transition. 'And it happened' preserves the
    Greek idiom without archaic English; 'came to pass' is too traditional/archaic,
    while omitting it would lose the discourse marker.
- source_word: ἐν μιᾷ τῶν ἡμερῶν
  chosen: on one of those days
  alternatives:
  - on one of the days
  - one day
  lexicon: BDAG
  rationale: This idiom refers to an unspecified day within the current sequence.
    'On one of those days' is natural English and preserves the partitive sense better
    than the flatter 'one day'.
- source_word: διδάσκοντος αὐτοῦ
  chosen: while he was teaching
  alternatives:
  - as he was teaching
  - during his teaching
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a contemporaneous circumstantial
    clause. 'While he was teaching' is clear and natural.
- source_word: τὸν λαὸν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός here refers to the people generally, not merely a gathered crowd.
    'The people' is the standard and most accurate rendering in this context.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν denotes the temple complex rather than the inner sanctuary. 'In
    the temple' is acceptable idiomatic shorthand in English; the more precise alternatives
    are possible but somewhat heavier for the main text.
- source_word: εὐαγγελιζομένου
  chosen: proclaiming the good news
  alternatives:
  - preaching the gospel
  - announcing the good news
  lexicon: BDAG
  rationale: This participle denotes announcing good news. 'Proclaiming the good news'
    preserves the verbal force and remains accessible; 'preaching the gospel' is traditional
    but more ecclesiastical.
- source_word: ἐπέστησαν
  chosen: came up to him
  alternatives:
  - approached
  - confronted
  - stood by
  lexicon: BDAG
  rationale: In context, the verb indicates their sudden or direct arrival before
    Jesus. 'Came up to him' captures the movement naturally and anticipates the challenge
    that follows without overstating hostility as 'confronted' would.
- source_word: ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple usage refers to the chief-priestly
    leadership, not multiple officeholders of the singular high priesthood in a strict
    sense. 'Chief priests' is the established and accurate rendering.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the legal experts
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct rendering and preserves the historical
    group designation. Functional paraphrases are possible but less transparent.'
- source_word: σὺν τοῖς πρεσβυτέροις
  chosen: together with the elders
  alternatives:
  - with the elders
  lexicon: BDAG
  rationale: σύν explicitly marks accompaniment. 'Together with the elders' slightly
    foregrounds the coalition of leadership groups present.
