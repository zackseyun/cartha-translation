theological_decisions:
- issue: Rendering εὐαγγελιζομένου in a non-technical narrative setting
  chosen_reading: proclaiming the good news
  alternative_readings:
  - preaching the gospel
  rationale: The verse describes Jesus' public ministry activity rather than invoking
    later ecclesiastical terminology. The chosen rendering preserves the semantic
    content of εὐαγγελίζω in accessible English without importing unnecessary church
    jargon.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
