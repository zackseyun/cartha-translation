id: LUK.20.26
reference: Luke 20:26
source:
  edition: SBLGNT
  text: καὶ οὐκ ἴσχυσαν ἐπιλαβέσθαι ⸀τοῦ ῥήματος ἐναντίον τοῦ λαοῦ, καὶ θαυμάσαντες
    ἐπὶ τῇ ἀποκρίσει αὐτοῦ ἐσίγησαν.
translation:
  text: And they were not able to seize on his statement before the people, and marveling
    at his answer, they became silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to catch him in what he said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσχυσαν
  chosen: were not able
  alternatives:
  - did not have the strength
  - could not
  lexicon: BDAG
  rationale: The verb denotes capability or power. 'Were not able' is clear modern
    English and preserves the sense of inability without adding nuance beyond the
    Greek.
- source_word: ἐπιλαβέσθαι
  chosen: to seize on
  alternatives:
  - to catch
  - to take hold of
  - to lay hold of
  lexicon: BDAG
  rationale: With a genitive object, the verb can mean to seize or take hold of something.
    Here the object is 'the statement/word,' so 'seize on' idiomatically conveys attempting
    to catch him by what he said, while staying close to the Greek image.
- source_word: τοῦ ῥήματος
  chosen: his statement
  alternatives:
  - the word
  - what he said
  - his saying
  lexicon: BDAG
  rationale: ῥῆμα here refers to a spoken utterance rather than 'Word' in a theological
    sense. 'His statement' is natural in context and makes explicit that they sought
    grounds in his spoken reply. The possessive 'his' is supplied from context because
    the statement is clearly Jesus'.
- source_word: ἐναντίον τοῦ λαοῦ
  chosen: before the people
  alternatives:
  - in the presence of the people
  - before the crowd
  lexicon: BDAG
  rationale: ἐναντίον commonly means 'before' or 'in the presence of.' 'The people'
    reflects λαός and fits Luke's usage for the public populace, without narrowing
    it to a mere crowd.
- source_word: θαυμάσαντες
  chosen: marveling
  alternatives:
  - being amazed
  - astonished
  lexicon: BDAG
  rationale: The participle indicates their reaction of amazement. 'Marveling' preserves
    the elevated but still readable tone and links smoothly to the main verb.
- source_word: ἀποκρίσει
  chosen: answer
  alternatives:
  - reply
  - response
  lexicon: BDAG
  rationale: The noun denotes an answer or reply. 'Answer' is the most straightforward
    rendering in this dispute context.
- source_word: ἐσίγησαν
  chosen: they became silent
  alternatives:
  - they were silent
  - they kept quiet
  - they fell silent
  lexicon: BDAG
  rationale: The aorist verb marks the resulting action after their amazement. 'They
    became silent' captures the transition into silence more clearly than the stative
    'were silent'.
