id: LUK.20.39
reference: Luke 20:39
source:
  edition: SBLGNT
  text: ἀποκριθέντες δέ τινες τῶν γραμματέων εἶπαν· Διδάσκαλε, καλῶς εἶπας·
translation:
  text: Then some of the scribes answered, “Teacher, you have spoken well.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Teacher, you said rightly,” or “Teacher, you spoke correctly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  chosen: answered
  alternatives:
  - responded
  - replying
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces a spoken response.
    English idiom is smoother with the finite verb 'answered' rather than a more wooden
    'answering.'
- source_word: δέ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild discourse transition. 'Then' fits the narrative flow
    after Jesus' preceding argument without overstating contrast.
- source_word: τινες τῶν γραμματέων
  chosen: some of the scribes
  alternatives:
  - some scribes
  - certain of the scribes
  lexicon: BDAG
  rationale: The partitive construction with τινες + genitive is best represented
    as 'some of the scribes,' making clear that only a subset responded.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. The alternatives are interpretive expansions
    and are unnecessary here.'
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of διδάσκαλος. 'Teacher' is the plain lexical sense and avoids
    the potentially misleading social connotations of 'Master' in modern English.
- source_word: καλῶς
  chosen: well
  alternatives:
  - rightly
  - correctly
  lexicon: BDAG
  rationale: The adverb commends the quality or correctness of Jesus' statement. 'Well'
    is natural English and preserves the broad commendatory force.
- source_word: εἶπας
  chosen: you have spoken
  alternatives:
  - you said
  - you spoke
  lexicon: BDAG
  rationale: Although the Greek aorist can be rendered simply as 'you said,' English
    present perfect 'you have spoken' works naturally in direct commendation and pairs
    idiomatically with 'well.'
