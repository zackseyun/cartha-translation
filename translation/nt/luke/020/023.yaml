id: LUK.20.23
reference: Luke 20:23
source:
  edition: SBLGNT
  text: κατανοήσας δὲ αὐτῶν τὴν πανουργίαν εἶπεν πρὸς ⸀αὐτούς·
translation:
  text: But perceiving their cunning, he said to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'craftiness,' 'trickery,' or 'deceit.' The Greek term carries the sense
      of shrewd, unscrupulous scheming.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσας
  chosen: perceiving
  alternatives:
  - noticing
  - understanding
  - recognizing
  lexicon: BDAG
  rationale: Aorist participle of κατανοέω, indicating that Jesus discerned or noticed
    something about them before speaking. 'Perceiving' captures both mental recognition
    and insight without overtranslating to something stronger like 'seeing through.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition. 'But' fits the narrative
    turn as Jesus responds to their hostile intent more naturally than a simple 'and.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: Genitive pronoun modifying πανουργίαν. English idiom prefers the possessive
    'their' rather than the more wooden 'of them.'
- source_word: πανουργίαν
  chosen: cunning
  alternatives:
  - craftiness
  - trickery
  - deceit
  lexicon: BDAG
  rationale: πανουργία denotes unscrupulous cleverness or scheming. 'Cunning' is concise
    and natural, preserving the negative moral sense without becoming too interpretive.
    'Trickery' is possible but slightly narrower; 'deceit' misses the element of crafty
    calculation.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he spoke
  lexicon: BDAG
  rationale: Standard narrative aorist of λέγω. 'He said' is the normal and most natural
    English rendering.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to these men
  - to them directly
  lexicon: BDAG
  rationale: πρός with accusative after a speech verb commonly indicates the addressee.
    'To them' is accurate and idiomatic.
