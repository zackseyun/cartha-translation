id: LUK.20.29
reference: Luke 20:29
source:
  edition: SBLGNT
  text: ἑπτὰ οὖν ἀδελφοὶ ἦσαν· καὶ ὁ πρῶτος λαβὼν γυναῖκα ἀπέθανεν ἄτεκνος·
translation:
  text: Now there were seven brothers; and the first, having taken a wife, died childless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having married.' The Greek literally says 'having taken a wife,' an
      idiom for marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτὰ
  chosen: seven
  lexicon: BDAG
  rationale: Straightforward cardinal number modifying 'brothers.'
- source_word: οὖν
  chosen: Now
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks continuation/inference in the narrative setup. 'Now' gives natural
    English discourse flow without overstating logical force.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - siblings
  lexicon: BDAG
  rationale: Masculine plural in context refers specifically to male siblings in the
    levirate marriage scenario, so 'brothers' is both gender-accurate and contextually
    precise.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first one
  - the oldest
  lexicon: BDAG
  rationale: Ordinal reference to the first brother in sequence, not necessarily explicitly
    the oldest by age, so 'the first' is best.
- source_word: λαβὼν γυναῖκα
  chosen: having taken a wife
  alternatives:
  - having married a wife
  - after marrying
  lexicon: BDAG
  rationale: λαμβάνω with γυναῖκα is an idiomatic way to express taking/marrying a
    wife. 'Having taken a wife' preserves the participial structure and the idiom's
    formal texture while remaining understandable.
- source_word: γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: In marital context γυνή clearly means 'wife,' not merely 'woman.'
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: Direct rendering of the aorist verb; 'died' is plain and appropriately
    unsoftened.
- source_word: ἄτεκνος
  chosen: childless
  alternatives:
  - without children
  - without offspring
  lexicon: BDAG
  rationale: Concise predicate adjective meaning he died without having children;
    'childless' is natural English and preserves the legal/narrative significance.
