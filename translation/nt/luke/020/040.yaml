id: LUK.20.40
reference: Luke 20:40
source:
  edition: SBLGNT
  text: οὐκέτι ⸀γὰρ ἐτόλμων ἐπερωτᾶν αὐτὸν οὐδέν.
translation:
  text: For they no longer dared to ask him anything.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  - not anymore
  lexicon: BDAG
  rationale: Adverb indicating cessation from this point onward. 'No longer' is idiomatic
    modern English and preserves the temporal force.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  - ', for'
  lexicon: BDAG
  rationale: Connective giving the reason or explanatory basis for the preceding context.
    'For' preserves the explanatory link succinctly.
- source_word: ἐτόλμων
  chosen: dared
  alternatives:
  - were daring
  - had the courage
  lexicon: BDAG
  rationale: Imperfect of τολμάω conveys ongoing or customary willingness/courage
    in past time. In English, 'dared' naturally communicates the sense here; the accompanying
    'no longer' captures the cessation without requiring an explicitly progressive
    form.
- source_word: ἐπερωτᾶν
  chosen: to ask
  alternatives:
  - to question
  - to interrogate
  lexicon: BDAG
  rationale: Infinitive complement to ἐτόλμων. In this context of public challenge
    and inquiry, 'ask' is the most natural English rendering; 'question' is possible
    but slightly stiffer. The object 'anything' supplies the breadth of what they
    refrained from asking.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforwardly rendered
    'him'.
- source_word: οὐδέν
  chosen: anything
  alternatives:
  - nothing
  - at all
  lexicon: BDAG
  rationale: With the infinitive 'to ask' after a negated main verb, idiomatic English
    expresses the sense as 'ask him anything' rather than the less natural 'ask him
    nothing.' This preserves the emphatic totality of οὐδέν in context.
