id: LUK.20.22
reference: Luke 20:22
source:
  edition: SBLGNT
  text: ἔξεστιν ⸀ἡμᾶς Καίσαρι φόρον δοῦναι ἢ οὔ;
translation:
  text: Is it lawful for us to give tribute tax to Caesar, or not?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tax' or 'tribute.' The Greek term refers to a tax paid to a ruling power.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξεστιν
  chosen: Is it lawful
  alternatives:
  - Is it permitted
  - Is it allowed
  lexicon: BDAG
  rationale: In this context the question concerns what is religiously or legally
    permissible, not mere ability. 'Lawful' best captures the force of ἔξεστιν in
    a dispute about whether paying Caesar is permitted under Jewish obligations.
- source_word: ἡμᾶς
  chosen: for us
  alternatives:
  - for us Jews
  - for us
  lexicon: BDAG
  rationale: The accusative with infinitive construction after ἔξεστιν is naturally
    rendered 'for us to...'. The explicit ethnic qualifier is not in the Greek and
    should not be added to the main text.
- source_word: Καίσαρι
  chosen: to Caesar
  alternatives:
  - to the emperor
  lexicon: BDAG
  rationale: Καῖσαρ is a title/name for the Roman ruler. 'Caesar' preserves the historical
    and political specificity better than the more generalized 'the emperor'.
- source_word: φόρον
  chosen: tribute tax
  alternatives:
  - tax
  - tribute
  lexicon: BDAG
  rationale: φόρος refers to a tax or tribute paid to a ruling power. 'Tribute tax'
    preserves both the fiscal sense and the political subjection implied in the term,
    which is central to the trap being set for Jesus.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to pay
  lexicon: BDAG
  rationale: The infinitive of δίδωμι is literally 'to give.' While English often
    says 'pay tax,' 'give tribute tax' stays closer to the Greek without becoming
    unnatural.
- source_word: ἢ οὔ
  chosen: or not
  alternatives:
  - or no
  lexicon: BDAG
  rationale: This is the standard idiomatic way to render the disjunctive question
    ending in English.
