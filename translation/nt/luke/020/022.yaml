theological_decisions:
- issue: Nature of 'lawful' in the question
  chosen_reading: Rendered as a question of permissibility ('Is it lawful...') without
    specifying whether the law in view is Roman civil law or Jewish religious law.
  alternative_readings:
  - Is it legal under Roman law...
  - Is it lawful under the law of God...
  rationale: The Greek leaves the frame of reference implicit. In context the opponents
    are testing Jesus on a politically and religiously charged issue, so the translation
    should preserve that ambiguity rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
