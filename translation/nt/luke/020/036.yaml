theological_decisions:
- issue: Rendering filial language in an eschatological context
  chosen_reading: Retain 'sons of God' and 'sons of the resurrection' in the main
    text
  alternative_readings:
  - children of God
  - children of the resurrection
  rationale: The Greek uses masculine υἱοί twice, and the translation philosophy calls
    for gender-accurate rendering rather than neutralization. In this context the
    phrase denotes status derived from resurrection life, not male exclusivity; this
    can be clarified in a footnote rather than flattening the source wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
