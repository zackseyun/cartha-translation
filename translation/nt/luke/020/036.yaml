id: LUK.20.36
reference: Luke 20:36
source:
  edition: SBLGNT
  text: ⸀οὐδὲ γὰρ ἀποθανεῖν ἔτι δύνανται, ἰσάγγελοι γάρ εἰσιν καὶ υἱοί ⸀εἰσιν θεοῦ
    τῆς ἀναστάσεως υἱοὶ ὄντες.
translation:
  text: For they cannot die anymore, because they are like the angels and are sons
    of God, being sons of the resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'equal to angels.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'sons of God' and 'sons of the resurrection'; the masculine form here
      expresses status and identity, not male-only inclusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποθανεῖν ἔτι δύνανται
  chosen: cannot die anymore
  alternatives:
  - are no longer able to die
  - cannot die again
  lexicon: BDAG
  rationale: 'The infinitive with δύνανται expresses ability: ''are not able to die.''
    ἔτι is best rendered ''anymore''/''any longer,'' indicating the end of mortality
    rather than repetition, so ''cannot die anymore'' is natural modern English.'
- source_word: ἰσάγγελοι
  chosen: like the angels
  alternatives:
  - equal to angels
  - angel-like
  lexicon: BDAG
  rationale: The adjective means 'equal to angels' or 'like angels.' 'Like the angels'
    is clearer and more idiomatic in English while preserving the comparison without
    implying identity.
- source_word: υἱοί ... θεοῦ
  chosen: sons of God
  alternatives:
  - children of God
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural υἱοί. Per the gender-accurate
    policy, 'sons' should be retained rather than neutralized to 'children,' especially
    since the verse repeats υἱοί for rhetorical effect.
- source_word: τῆς ἀναστάσεως υἱοὶ ὄντες
  chosen: being sons of the resurrection
  alternatives:
  - since they are sons of the resurrection
  - as sons of the resurrection
  lexicon: BDAG
  rationale: The participial phrase explains why they are called sons of God. A relatively
    formal rendering preserves the metaphor and the structure of the Greek. 'Being'
    keeps the participial force without overinterpreting it as strictly causal, though
    the causal nuance is present.
- source_word: γάρ ... γάρ
  chosen: For ... because
  alternatives:
  - for ... for
  lexicon: BDAG
  rationale: The verse uses γάρ twice. Rendering the first as 'For' connects to the
    prior statement, while the second is better expressed as 'because' in English
    to avoid awkward repetition and to show explanatory flow.
