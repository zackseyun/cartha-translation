id: LUK.20.19
reference: Luke 20:19
source:
  edition: SBLGNT
  text: καὶ ἐζήτησαν οἱ ⸂γραμματεῖς καὶ οἱ ἀρχιερεῖς⸃ ἐπιβαλεῖν ἐπ’ αὐτὸν τὰς χεῖρας
    ἐν αὐτῇ τῇ ὥρᾳ, καὶ ἐφοβήθησαν ⸂τὸν λαόν⸃, ἔγνωσαν γὰρ ὅτι πρὸς αὐτοὺς ⸂εἶπεν
    τὴν παραβολὴν ταύτην⸃.
translation:
  text: And the scribes and the chief priests sought to lay hands on him in that very
    hour, but they feared the people, for they knew that he had told this parable
    against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to seize him' or 'to arrest him'; literally, 'to lay hands on him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to them'; the phrase likely carries the sense that the parable was directed
      against them.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐζήτησαν
  chosen: sought
  alternatives:
  - were seeking
  - tried
  lexicon: BDAG
  rationale: Aorist indicative summarizes their intent/action. 'Sought' preserves
    the sense of attempted purpose without overstating success; 'were seeking' would
    overemphasize progressive aspect not explicit in the aorist.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. Alternatives are more interpretive and can blur
    the specific social group named.'
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in the Gospels usually refers to the chief-priestly
    leadership class, not multiple officeholders simultaneously serving as high priest.
    'Chief priests' best matches established historical usage and the likely referent.
- source_word: ἐπιβαλεῖν ἐπ’ αὐτὸν τὰς χεῖρας
  chosen: to lay hands on him
  alternatives:
  - to seize him
  - to arrest him
  lexicon: BDAG
  rationale: This is an idiom for hostile physical action. 'Lay hands on him' preserves
    the Greek imagery and leaves the exact legal/physical nuance slightly open. 'Seize'
    or 'arrest' are plausible contextual interpretations but are more specific than
    the wording itself.
- source_word: ἐν αὐτῇ τῇ ὥρᾳ
  chosen: in that very hour
  alternatives:
  - at that very moment
  - immediately
  lexicon: BDAG
  rationale: The phrase emphasizes immediacy tied to the present occasion. 'In that
    very hour' is a close, natural rendering that preserves the temporal force without
    flattening it to a mere adverb.
- source_word: ἐφοβήθησαν τὸν λαόν
  chosen: they feared the people
  alternatives:
  - they were afraid of the crowd
  lexicon: BDAG
  rationale: λαός here is best rendered 'people,' referring to the populace generally
    rather than merely a gathered crowd. 'Feared' preserves the direct object construction
    and the political/social concern in context.
- source_word: ἔγνωσαν
  chosen: they knew
  alternatives:
  - they realized
  - they understood
  lexicon: BDAG
  rationale: Aorist of γινώσκω here marks recognition of Jesus' target in the parable.
    'Knew' is simple and direct; 'realized' is possible but slightly more interpretive.
- source_word: πρὸς αὐτοὺς
  chosen: against them
  alternatives:
  - about them
  - to them
  lexicon: BDAG
  rationale: 'Although πρός can mean ''to'' or ''toward,'' in this hostile narrative
    context the sense is adversative: they recognized the parable was directed against
    them. ''Against them'' best conveys the force in idiomatic English. The more literal
    ''to them'' would under-communicate the confrontational sense.'
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - illustration
  lexicon: BDAG
  rationale: '''Parable'' is the established and accurate rendering for παραβολή in
    the Synoptic context.'
