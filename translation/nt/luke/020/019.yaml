theological_decisions:
- issue: Force of πρὸς αὐτοὺς in relation to Jesus' parable
  chosen_reading: The parable was spoken against the religious leaders, not merely
    addressed to them.
  alternative_readings:
  - The parable was spoken to them
  - The parable was about them
  rationale: The immediate narrative reaction shows they perceived themselves as the
    condemned tenants in the preceding parable. Rendering πρὸς αὐτοὺς as 'against
    them' preserves the confrontational thrust without adding doctrinal content beyond
    the context.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence guided by context.
