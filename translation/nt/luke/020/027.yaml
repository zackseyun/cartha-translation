theological_decisions:
- issue: Rendering the Sadducees' doctrinal position on resurrection
  chosen_reading: who deny that there is a resurrection
  alternative_readings:
  - who say there is no resurrection
  - who oppose the resurrection
  rationale: The Greek states their denial of resurrection as a doctrinal claim. The
    chosen wording preserves the historical-theological point without importing later
    doctrinal elaboration. 'Deny' best matches the force of ἀντιλέγοντες in this context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
