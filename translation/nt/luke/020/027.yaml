id: LUK.20.27
reference: Luke 20:27
source:
  edition: SBLGNT
  text: Προσελθόντες δέ τινες τῶν Σαδδουκαίων, οἱ ⸀ἀντιλέγοντες ἀνάστασιν μὴ εἶναι,
    ἐπηρώτησαν αὐτὸν
translation:
  text: Then some of the Sadducees, who deny that there is a resurrection, came up
    and questioned him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who say there is no resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσελθόντες
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι introducing the action prior to the
    main verb. 'Came up' is natural modern English and preserves the movement toward
    Jesus without sounding overly formal.
- source_word: δέ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    fits the flow in readable English.
- source_word: τινες τῶν Σαδδουκαίων
  chosen: some of the Sadducees
  alternatives:
  - some Sadducees
  - certain ones of the Sadducees
  lexicon: BDAG
  rationale: The partitive expression is best represented as 'some of the Sadducees,'
    though English could also compress it to 'some Sadducees.' The fuller rendering
    reflects the Greek structure more transparently.
- source_word: οἱ ἀντιλέγοντες
  chosen: who deny
  alternatives:
  - who oppose
  - who speak against
  - who contradict
  lexicon: BDAG
  rationale: The participle identifies the Sadducees by their stance. In context,
    the object clause makes clear this is not mere verbal contradiction but doctrinal
    denial, so 'who deny' is the clearest idiomatic rendering.
- source_word: ἀνάστασιν
  chosen: a resurrection
  alternatives:
  - resurrection
  lexicon: BDAG
  rationale: Anarthrous accusative with infinitive construction after ἀντιλέγοντες.
    English idiom commonly uses 'there is a resurrection' in this construction. The
    indefinite article is natural in English and does not deny the concept's specificity.
- source_word: μὴ εἶναι
  chosen: that there is
  alternatives:
  - to exist
  - to be
  lexicon: BDAG
  rationale: With ἀντιλέγοντες and ἀνάστασιν, the infinitive clause expresses the
    content denied. 'That there is' is idiomatic English for the content of denial.
- source_word: ἐπηρώτησαν
  chosen: questioned
  alternatives:
  - asked
  - inquired of
  lexicon: BDAG
  rationale: ἐπερωτάω can mean 'ask' or 'question.' Since the following context is
    a challenge scenario, 'questioned' better anticipates the probing nature of their
    interaction while remaining faithful.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforwardly rendered
    'him'.
