id: LUK.20.14
reference: Luke 20:14
source:
  edition: SBLGNT
  text: ἰδόντες δὲ αὐτὸν οἱ γεωργοὶ διελογίζοντο πρὸς ⸀ἀλλήλους λέγοντες· Οὗτός ἐστιν
    ὁ κληρονόμος· ⸀ἀποκτείνωμεν αὐτόν, ἵνα ἡμῶν γένηται ἡ κληρονομία·
translation:
  text: But when the vine-growers saw him, they reasoned with one another, saying,
    ‘This is the heir. Let us kill him, so that the inheritance may become ours.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tenants' or 'farmers.' The Greek word refers to agricultural workers;
      in this parable they are specifically workers in a vineyard.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  chosen: vine-growers
  alternatives:
  - farmers
  - tenants
  - cultivators
  lexicon: BDAG
  rationale: In the immediate parable context the γεωργοί are those working a vineyard,
    so 'vine-growers' preserves the agricultural specificity better than the generic
    'farmers.' 'Tenants' captures their legal role from the broader context but is
    not the lexical sense of the noun itself in this verse.
- source_word: διελογίζοντο
  chosen: they reasoned
  alternatives:
  - they discussed
  - they deliberated
  - they argued
  lexicon: BDAG
  rationale: The imperfect middle indicates an internal exchange of deliberation among
    themselves. 'Reasoned' preserves the reflective, calculating sense without overstating
    conflict as 'argued' would.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - among themselves
  - to one another
  lexicon: BDAG
  rationale: This idiom marks reciprocal interaction. 'With one another' reads naturally
    in English and fits the deliberative force of διελογίζοντο.
- source_word: κληρονόμος
  chosen: heir
  alternatives:
  - inheritor
  lexicon: BDAG
  rationale: '''Heir'' is the standard concise English equivalent and fits both legal
    and narrative senses.'
- source_word: ἀποκτείνωμεν
  chosen: Let us kill
  alternatives:
  - let us murder
  - let us put to death
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive functions hortatorily. 'Let
    us kill' is the most direct and idiomatic rendering. 'Murder' adds a moral evaluation
    already inferable from context but not lexically explicit in the verb.
- source_word: ἵνα ἡμῶν γένηται ἡ κληρονομία
  chosen: so that the inheritance may become ours
  alternatives:
  - so that the inheritance will be ours
  - that the inheritance may become ours
  lexicon: BDAG
  rationale: This preserves the purpose clause introduced by ἵνα and the ingressive
    nuance of γένηται ('become'). 'May become ours' reflects the subjunctive without
    sounding unnatural.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative development with mild contrast. 'But' fits the
    turn in the story after the son's arrival.
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered temporally in smooth English:
    ''when they saw him.'''
