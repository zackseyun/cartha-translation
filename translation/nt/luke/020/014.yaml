theological_decisions:
- issue: Parable terminology for γεωργοὶ in context of a vineyard
  chosen_reading: Rendered as 'vine-growers' rather than the more traditional 'tenants.'
  alternative_readings:
  - tenants
  - farmers
  rationale: The translation follows original-language primacy by rendering the lexical
    sense of γεωργοί directly. The broader parable context does imply tenancy, but
    that idea comes from surrounding verses rather than this noun alone. This avoids
    importing a legal nuance not explicit in the word here while preserving the vineyard
    setting.
  doctrine_reference: Translation philosophy §1, §5
