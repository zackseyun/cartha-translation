id: LUK.20.30
reference: Luke 20:30
source:
  edition: SBLGNT
  text: καὶ ⸂ὁ δεύτερος⸃
translation:
  text: and the second
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, 'the second brother'; the Greek is elliptical and simply says 'the
      second.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Standard coordinating conjunction. In this elliptical narrative sequence,
    'and' most naturally carries forward the list of brothers in the Sadducees' scenario.
- source_word: ὁ δεύτερος
  chosen: the second
  alternatives:
  - the second one
  - the second brother
  lexicon: BDAG
  rationale: The article with the ordinal functions substantivally, literally 'the
    second.' English can preserve the ellipsis cleanly as 'the second.' 'The second
    brother' is interpretively explicit from context but adds a noun not present in
    the Greek, so it is kept as an alternative rather than the main text.
