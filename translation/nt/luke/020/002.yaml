id: LUK.20.2
reference: Luke 20:2
source:
  edition: SBLGNT
  text: καὶ εἶπαν ⸂λέγοντες πρὸς αὐτόν⸃· Εἰπὸν ἡμῖν ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιεῖς,
    ἢ τίς ἐστιν ὁ δούς σοι τὴν ἐξουσίαν ταύτην;
translation:
  text: And they said to him, “Tell us, by what authority are you doing these things?
    Or who is the one who gave you this authority?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this challenge to the preceding narrative.
    'And' preserves the simple narrative flow without adding temporal nuance.
- source_word: εἶπαν ⸂λέγοντες πρὸς αὐτόν⸃
  chosen: they said to him
  alternatives:
  - they spoke to him, saying
  - they said, saying to him
  lexicon: BDAG
  rationale: The participial construction λέγοντες is somewhat redundant with εἶπαν
    in English. Rendering the sense as 'they said to him' preserves the direct address
    naturally. The speech introduction is not omitted in meaning, only smoothed idiomatically.
- source_word: Εἰπὸν ἡμῖν
  chosen: Tell us
  alternatives:
  - Say to us
  lexicon: BDAG
  rationale: Aorist imperative of λέγω is most natural here as 'Tell us' in contemporary
    English. 'Say to us' is more wooden and less idiomatic.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - with what authority
  lexicon: BDAG
  rationale: The preposition ἐν with dative here expresses the sphere or basis of
    authorized action. English idiom strongly favors 'by what authority' for this
    challenge question.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative should be preserved. 'These things' reflects the
    Greek number and points to Jesus' recent actions in the temple context.
- source_word: ποιεῖς
  chosen: are you doing
  alternatives:
  - do you do
  lexicon: BDAG
  rationale: Present tense is well represented by the English progressive in this
    immediate confrontational context, sounding natural while preserving aspect.
- source_word: ἢ
  chosen: Or
  alternatives:
  - And
  lexicon: BDAG
  rationale: 'Introduces the second, closely related challenge as an alternative formulation:
    either identify the basis of authority or the giver of it.'
- source_word: τίς ἐστιν ὁ δούς
  chosen: who is the one who gave
  alternatives:
  - who gave
  - who is he who gave
  lexicon: BDAG
  rationale: The articular participle ὁ δούς is slightly more explicit than a bare
    finite verb. 'The one who gave' preserves that substantival force while remaining
    readable.
- source_word: σοι
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: English can absorb the dative into the verb phrase 'gave you' naturally.
- source_word: τὴν ἐξουσίαν ταύτην
  chosen: this authority
  alternatives:
  - this right
  - this power
  lexicon: BDAG
  rationale: ἐξουσία in this context refers to delegated right or authority, not merely
    raw power. 'This authority' best matches the leaders' challenge concerning authorization.
