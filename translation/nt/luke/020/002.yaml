theological_decisions:
- issue: Meaning of ἐξουσία in Jesus' temple confrontation
  chosen_reading: authority
  alternative_readings:
  - power
  - right
  rationale: The context is a challenge from religious leaders about the legitimacy
    and source of Jesus' actions. 'Authority' best preserves the institutional and
    theological force of the question without reducing it to mere ability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
