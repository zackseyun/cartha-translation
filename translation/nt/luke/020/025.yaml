id: LUK.20.25
reference: Luke 20:25
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν ⸂πρὸς αὐτούς· Τοίνυν ἀπόδοτε⸃ τὰ Καίσαρος Καίσαρι καὶ τὰ τοῦ θεοῦ
    τῷ θεῷ.
translation:
  text: But he said to them, “Then give back to Caesar the things that are Caesar’s,
    and to God the things that are God’s.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “render to Caesar … and to God …” The verb can mean to give, pay, or
      give back what is due.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  chosen: But he said
  alternatives:
  - And he said
  lexicon: BDAG
  rationale: δέ is mildly adversative or continuative; 'But' fits the exchange context
    and natural English discourse flow without overstating contrast.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: Standard idiomatic rendering with λέγω in direct speech contexts is 'said
    to them.'
- source_word: Τοίνυν
  chosen: Then
  alternatives:
  - Therefore
  - So
  - Well then
  lexicon: BDAG
  rationale: τοίνυν marks an inferential or resumptive conclusion. 'Then' preserves
    the rhetorical force in readable modern English; 'therefore' is more formal, while
    'well then' is more colloquial.
- source_word: ἀπόδοτε
  chosen: give back
  alternatives:
  - render
  - repay
  - give
  lexicon: BDAG
  rationale: ἀποδίδωμι commonly carries the sense of giving back what is due or owed.
    'Give back' preserves that nuance more transparently for modern readers than the
    traditional 'render,' while avoiding over-interpretation.
- source_word: τὰ Καίσαρος Καίσαρι
  chosen: to Caesar the things that are Caesar’s
  alternatives:
  - Caesar's things to Caesar
  - what belongs to Caesar to Caesar
  lexicon: BDAG
  rationale: The articular neuter plural τὰ is idiomatically represented as 'the things
    that are ...' in English. This preserves the broad scope of what belongs to Caesar
    without narrowing it to taxes alone.
- source_word: Καίσαρος / Καίσαρι
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: Καῖσαρ is a proper imperial title/name and is best transliterated per
    project philosophy on names. 'The emperor' is interpretive rather than lexical.
- source_word: τὰ τοῦ θεοῦ τῷ θεῷ
  chosen: to God the things that are God’s
  alternatives:
  - God's things to God
  - what belongs to God to God
  lexicon: BDAG
  rationale: Mirrors the Greek parallelism and preserves the contrastive balance with
    the Caesar clause. 'God' is capitalized in English as the referent is the one
    true God.
- source_word: θεοῦ / θεῷ
  chosen: God
  alternatives:
  - god
  lexicon: BDAG
  rationale: In context θεός refers to Israel's God, not a generic deity; English
    convention appropriately capitalizes 'God'.
