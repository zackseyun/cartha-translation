theological_decisions:
- issue: Political and theological scope of Jesus' saying
  chosen_reading: The translation preserves the parallel obligation to civil authority
    and to God without specifying the exact limits of either sphere.
  alternative_readings:
  - A strict separation of religion and state
  - An endorsement of unlimited state authority
  - A statement limited only to paying taxes
  rationale: The Greek states a principle of giving each party what belongs to each,
    but does not itself define a full political theology. The wording should preserve
    the tension and breadth of the saying rather than resolve later debates.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
