theological_decisions:
- issue: Whether καταξιωθέντες implies meritorious earning of resurrection life
  chosen_reading: The phrase is rendered in a way that preserves divine evaluation
    ('are considered worthy') without implying that people earn the age to come by
    their own merit.
  alternative_readings:
  - Those worthy of that age
  rationale: The context concerns those judged fit to share in the resurrection life.
    The translation avoids importing a doctrine of merit while also not flattening
    the Greek passive into a vague description.
  doctrine_reference: Preserve theological tension rather than resolve it.
