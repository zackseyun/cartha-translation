id: LUK.20.35
reference: Luke 20:35
source:
  edition: SBLGNT
  text: οἱ δὲ καταξιωθέντες τοῦ αἰῶνος ἐκείνου τυχεῖν καὶ τῆς ἀναστάσεως τῆς ἐκ νεκρῶν
    οὔτε γαμοῦσιν οὔτε ⸀γαμίζονται·
translation:
  text: But those who are considered worthy to attain that age and the resurrection
    from the dead neither marry nor are given in marriage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are counted worthy' or 'are deemed worthy.' The Greek is passive, indicating
      those judged worthy.
    reason: lexical_alternative
  - marker: b
    text: Or 'the age to come.' Literally, 'that age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταξιωθέντες
  chosen: are considered worthy
  alternatives:
  - are counted worthy
  - are deemed worthy
  lexicon: BDAG
  rationale: The passive participle indicates being judged or regarded as worthy rather
    than asserting intrinsic worthiness. 'Considered worthy' is natural modern English
    and preserves the passive sense.
- source_word: τοῦ αἰῶνος ἐκείνου
  chosen: that age
  alternatives:
  - that world
  - the age to come
  lexicon: BDAG
  rationale: αἰών here refers to an age or era, contrasting the present age with the
    coming one. 'That age' closely follows the Greek demonstrative and preserves the
    eschatological contrast without over-interpreting.
- source_word: τυχεῖν
  chosen: to attain
  alternatives:
  - to obtain
  - to have a share in
  lexicon: BDAG
  rationale: τυγχάνω with a genitive can mean to obtain or attain. 'Attain' fits the
    idiom in English and works smoothly with both 'that age' and 'the resurrection'
    as coordinated objects.
- source_word: ἀναστάσεως τῆς ἐκ νεκρῶν
  chosen: the resurrection from the dead
  alternatives:
  - the resurrection out from among the dead
  lexicon: BDAG
  rationale: This is the standard and clear rendering of the phrase. The fuller alternative
    is more wooden and not necessary in the main text, though it reflects the force
    of ἐκ.
- source_word: γαμοῦσιν
  chosen: marry
  alternatives:
  - take wives
  lexicon: BDAG
  rationale: The verb broadly means to marry; in some contexts it can emphasize men
    marrying, but in contemporary English 'marry' is the clearest concise rendering
    in this paired expression.
- source_word: γαμίζονται
  chosen: are given in marriage
  alternatives:
  - are married off
  lexicon: BDAG
  rationale: The passive verb is distinct from γαμοῦσιν and traditionally refers to
    being given in marriage. Preserving the distinction reflects the Greek pairing
    and the social idiom of the time.
