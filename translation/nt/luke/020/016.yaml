id: LUK.20.16
reference: Luke 20:16
source:
  edition: SBLGNT
  text: ἐλεύσεται καὶ ἀπολέσει τοὺς γεωργοὺς τούτους, καὶ δώσει τὸν ἀμπελῶνα ἄλλοις.
    ἀκούσαντες δὲ εἶπαν· Μὴ γένοιτο.
translation:
  text: He will come and destroy these tenant farmers, and will give the vineyard
    to others.” But when they heard this, they said, “May it never be!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'farmers' or 'tenants'; the Greek term refers to those who worked land
      belonging to another.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Certainly not!'' or ''By no means!'' The Greek expression is a strong
      rejection: literally, ''May it not happen.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλεύσεται
  chosen: He will come
  alternatives:
  - He will come back
  - He will arrive
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι, here referring to the owner in the parable.
    'He will come' is the plain and natural English equivalent without adding interpretive
    nuance such as 'back.'
- source_word: ἀπολέσει
  chosen: destroy
  alternatives:
  - kill
  - bring to ruin
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean destroy, kill, or ruin depending on context. 'Destroy'
    preserves the severity of judgment while remaining broad enough for the parabolic
    context and common NT usage.
- source_word: γεωργοὺς
  chosen: tenant farmers
  alternatives:
  - farmers
  - vine-growers
  - tenants
  lexicon: BDAG
  rationale: In the context of the vineyard parable, γεωργός refers not merely to
    agricultural workers but to those leasing and working the land. 'Tenant farmers'
    makes the social role explicit for modern readers and fits the narrative context.
- source_word: τούτους
  chosen: these
  alternatives:
  - those
  lexicon: BDAG
  rationale: The demonstrative is proximal in Greek. 'These' preserves the force of
    direct reference to the specific tenants under discussion.
- source_word: δώσει
  chosen: will give
  alternatives:
  - will hand over
  - will entrust
  lexicon: BDAG
  rationale: δίδωμι is straightforwardly 'give.' In context it implies transfer of
    stewardship, but 'will give' best preserves the lexical simplicity of the Greek.
- source_word: ἀμπελῶνα
  chosen: the vineyard
  alternatives:
  - the vine field
  lexicon: BDAG
  rationale: Standard rendering for ἀμπελών. It is both literal and idiomatic in English,
    and it preserves the parable's imagery and OT resonance.
- source_word: ἄλλοις
  chosen: to others
  alternatives:
  - to other people
  - to others instead
  lexicon: BDAG
  rationale: The dative plural indefinite is naturally rendered 'to others.' This
    keeps the statement concise and leaves unspecified who the recipients are, as
    in the Greek.
- source_word: ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - hearing this
  - after hearing
  lexicon: BDAG
  rationale: The aorist participle is temporal in context. 'When they heard this'
    is smooth modern English and accurately conveys the sequence.
- source_word: Μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Certainly not!
  - By no means!
  - Let it not happen!
  lexicon: BDAG
  rationale: This optative expression is a strong repudiation or horrified rejection.
    In this narrative setting, 'May it never be!' best captures both the idiomatic
    force and the hearers' shocked response, more naturally than the more epistolary
    'By no means!'
