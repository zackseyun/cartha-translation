theological_decisions:
- issue: Force of the crowd's response Μὴ γένοιτο
  chosen_reading: 'Rendered as a wish-like repudiation: ''May it never be!'''
  alternative_readings:
  - Certainly not!
  - By no means!
  rationale: In Luke 20:16 the phrase functions as an emotional rejection of the announced
    judgment rather than a mere logical denial. The chosen rendering preserves the
    dramatic and volitional force of the Greek optative without importing extra doctrinal
    content.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §3 (preserve
    tension rather than resolve it)
