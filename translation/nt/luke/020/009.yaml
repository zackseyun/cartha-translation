theological_decisions:
- issue: Gendered introductory noun Ἄνθρωπος
  chosen_reading: A man
  alternative_readings:
  - A person
  rationale: The parable introduces a specific male landowner figure, not generic
    humanity. Following the gender-accurate policy, the masculine form is retained
    rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
