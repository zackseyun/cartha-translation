id: LUK.20.9
reference: Luke 20:9
source:
  edition: SBLGNT
  text: Ἤρξατο δὲ πρὸς τὸν λαὸν λέγειν τὴν παραβολὴν ταύτην· ⸀Ἄνθρωπος ἐφύτευσεν ἀμπελῶνα,
    καὶ ἐξέδετο αὐτὸν γεωργοῖς, καὶ ἀπεδήμησεν χρόνους ἱκανούς.
translation:
  text: 'Then he began to tell the people this parable: “A man planted a vineyard,
    and leased it to farmers, and went away for a considerable time.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “went to another country for a long time.” The verb can imply being away
      from one's home region, even abroad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω introducing the beginning of Jesus' speech act;
    'began' is the natural English equivalent.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression; 'Then' conveys the transition smoothly
    in modern English.
- source_word: πρὸς τὸν λαὸν
  chosen: to the people
  alternatives:
  - to the crowd
  lexicon: BDAG
  rationale: πρός with accusative after verbs of speaking can indicate address toward
    an audience. λαός is best rendered 'people' here, preserving the collective sense
    without over-specifying 'crowd'.
- source_word: λέγειν
  chosen: to tell
  alternatives:
  - to say
  - to speak
  lexicon: BDAG
  rationale: Although λέγω is broadly 'say/speak,' with παραβολήν as object English
    idiom prefers 'tell' a parable.
- source_word: τὴν παραβολὴν ταύτην
  chosen: this parable
  alternatives:
  - this illustration
  lexicon: BDAG
  rationale: παραβολή is the standard Gospel term 'parable'; retaining it preserves
    genre and intertextual resonance.
- source_word: Ἄνθρωπος
  chosen: A man
  alternatives:
  - A person
  lexicon: BDAG
  rationale: Singular masculine noun introducing a male figure in the story. Per gender-accurate
    policy, 'A man' matches the source better than gender-neutral 'A person'.
- source_word: ἐφύτευσεν ἀμπελῶνα
  chosen: planted a vineyard
  alternatives:
  - established a vineyard
  lexicon: BDAG
  rationale: φυτεύω commonly means 'plant'; with ἀμπελών, 'planted a vineyard' is
    the straightforward idiomatic rendering.
- source_word: ἐξέδετο
  chosen: leased
  alternatives:
  - rented out
  - let out
  lexicon: BDAG
  rationale: ἐκδίδωμι in this context means to lease out property to tenants. 'Leased'
    is concise and clear in modern English.
- source_word: γεωργοῖς
  chosen: farmers
  alternatives:
  - vine-growers
  - tenants
  lexicon: BDAG
  rationale: γεωργός denotes agricultural workers/cultivators. 'Farmers' is the broad
    lexical sense; the tenant aspect is already conveyed by 'leased it to.' 'Tenants'
    would foreground a role supplied more by context than by the noun itself.
- source_word: ἀπεδήμησεν
  chosen: went away
  alternatives:
  - went to another country
  - traveled abroad
  lexicon: BDAG
  rationale: ἀποδημέω means to be away from one's home region, often travel abroad.
    'Went away' preserves the basic sense without over-translating details not explicit
    in this verse.
- source_word: χρόνους ἱκανούς
  chosen: for a considerable time
  alternatives:
  - for a long time
  - for many days
  lexicon: BDAG
  rationale: The plural χρόνους with ἱκανούς indicates a substantial duration. 'For
    a considerable time' captures the idiom naturally and with appropriate weight.
