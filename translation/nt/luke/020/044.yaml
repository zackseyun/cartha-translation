id: LUK.20.44
reference: Luke 20:44
source:
  edition: SBLGNT
  text: Δαυὶδ οὖν ⸂αὐτὸν κύριον⸃ καλεῖ, καὶ πῶς ⸂αὐτοῦ υἱός⸃ ἐστιν;
translation:
  text: David therefore calls him Lord, so how is he his son?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his descendant.' The Greek says 'his son,' which can carry dynastic
      force, but the main text preserves the explicit wording of the argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Standard transliteration of the proper name Δαυίδ, following the policy
    to transliterate names rather than translate them.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding citation and argument. 'Therefore'
    preserves the logical force more explicitly than 'then,' while remaining natural
    English.
- source_word: αὐτὸν κύριον
  chosen: him Lord
  alternatives:
  - him master
  lexicon: BDAG
  rationale: The construction means 'calls him Lord.' κύριος is a contested term in
    the project guidelines and defaults to 'Lord.' 'Master' is possible lexically
    but weaker here, especially in this messianic argument drawn from Psalm 110.
- source_word: καλεῖ
  chosen: calls
  alternatives:
  - speaks of as
  - addresses as
  lexicon: BDAG
  rationale: Simple present 'calls' directly reflects καλεῖ and preserves the verbal
    simplicity of the Greek.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: πῶς introduces the rhetorical question plainly. 'How' is the most direct
    and idiomatic rendering.
- source_word: αὐτοῦ υἱός
  chosen: his son
  alternatives:
  - a son of him
  - his descendant
  lexicon: BDAG
  rationale: The genitive pronoun with υἱός is naturally rendered 'his son.' Although
    'descendant' can reflect broader Semitic/royal lineage usage in some contexts,
    the Greek here explicitly says 'son,' and the argument depends on that filial
    designation.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Straightforward present of εἰμί; retained as 'is' in the rhetorical question.
