theological_decisions:
- issue: Rendering κύριος in a messianic/Christological argument
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default for κύριος is 'Lord.' In this context Jesus' argument
    depends on David's designation of the Messiah with a title of superiority and
    honor. 'Lord' preserves both the lexical value and the theological weight without
    over-interpreting the verse beyond its wording.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to expand υἱός to 'descendant' for dynastic sense
  chosen_reading: his son
  alternative_readings:
  - his descendant
  rationale: The verse's rhetorical force rests on the explicit filial term υἱός.
    While 'son' can imply descendant in royal genealogical discourse, expanding it
    in the main text would soften the wording Jesus actually uses. The theological
    tension is preserved by keeping 'son.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
