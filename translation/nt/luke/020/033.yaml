theological_decisions:
- issue: Meaning of resurrection language in the Sadducees' question
  chosen_reading: Render ἀνάστασις plainly as 'resurrection' without interpretive
    qualification.
  alternative_readings:
  - resurrection of the dead
  rationale: The verse itself uses only ἀναστάσει, and the translation should not
    import additional wording from the broader context into this verse. This preserves
    the Sadducees' stated premise without adding doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
