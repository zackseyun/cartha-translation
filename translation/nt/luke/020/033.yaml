id: LUK.20.33
reference: Luke 20:33
source:
  edition: SBLGNT
  text: ⸂ἡ γυνὴ οὖν ἐν τῇ⸃ ἀναστάσει τίνος αὐτῶν γίνεται γυνή; οἱ γὰρ ἑπτὰ ἔσχον αὐτὴν
    γυναῖκα.
translation:
  text: In the resurrection, then, whose wife does the woman become? For all seven
    had her as wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'At the resurrection.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'which of them is she wife to?'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'had her as wife'; alternatively, 'married her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife' depending on context. Here the
    first occurrence refers to the woman under discussion in the levirate-marriage
    scenario, so 'the woman' is the most natural English referent. The marital sense
    is then made explicit in the predicate noun later in the clause.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks an inferential or resumptive step in the Sadducees' argument.
    'Then' preserves the argumentative flow in natural English without overstating
    logical force.
- source_word: ἐν τῇ ἀναστάσει
  chosen: in the resurrection
  alternatives:
  - at the resurrection
  lexicon: BDAG
  rationale: The prepositional phrase is rendered straightforwardly. 'In the resurrection'
    is a natural and sufficiently formal rendering that preserves the Greek wording
    and the Sadducees' framing of the issue.
- source_word: τίνος αὐτῶν
  chosen: whose ... of them / whose ... among them
  alternatives:
  - which of them
  lexicon: BDAG
  rationale: 'τίνος is genitive singular interrogative, asking possession or relation:
    ''whose.'' In idiomatic English, ''whose wife'' best captures the sense. ''Which
    of them'' is possible conceptually, but ''whose'' more directly reflects the Greek
    construction with γυνή.'
- source_word: γίνεται
  chosen: does ... become
  alternatives:
  - is
  - comes to be
  lexicon: BDAG
  rationale: γίνομαι often means 'become' or 'come to be.' Here it expresses resulting
    marital status in the Sadducees' hypothetical. 'Does ... become' preserves the
    verbal nuance better than a simple stative 'is.'
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: 'In the predicate position after τίνος αὐτῶν γίνεται, the marital sense
    is explicit: the question is whose wife she is in the resurrection. Therefore
    ''wife'' is required here.'
- source_word: οἱ γὰρ ἑπτὰ
  chosen: for all seven
  alternatives:
  - for the seven
  - for the seven men
  lexicon: BDAG
  rationale: The article with numeral refers to the seven brothers already introduced
    in context. 'All seven' makes explicit the totality implied in the argument and
    reads naturally in English.
- source_word: ἔσχον αὐτὴν γυναῖκα
  chosen: had her as wife
  alternatives:
  - had her as their wife
  - married her
  lexicon: BDAG
  rationale: The idiom ἔχω + accusative + γυναῖκα means to have someone as wife. 'Had
    her as wife' is a close, idiomatic rendering. 'Married her' is possible but shifts
    from the state/relationship emphasized by the Greek to the act of marrying.
