id: LUK.20.13
reference: Luke 20:13
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ κύριος τοῦ ἀμπελῶνος· Τί ποιήσω; πέμψω τὸν υἱόν μου τὸν ἀγαπητόν·
    ἴσως ⸀τοῦτον ἐντραπήσονται.
translation:
  text: Then the owner of the vineyard said, ‘What shall I do? I will send my beloved
    son; perhaps they will respect him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the lord of the vineyard.'
    reason: lexical_alternative
  - marker: b
    text: '''Respect'' renders a verb that can also mean ''be ashamed before'' or
      ''show deference to.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: owner
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord' as a title, in this parabolic
    agrarian context τοῦ ἀμπελῶνος specifies possession, so 'owner of the vineyard'
    best conveys the referent idiomatically in English without importing a christological
    title into the character within the story.
- source_word: ἀμπελῶνος
  chosen: vineyard
  alternatives:
  - vineyard field
  lexicon: BDAG
  rationale: Standard rendering for ἀμπελών in agricultural contexts.
- source_word: Τί ποιήσω;
  chosen: What shall I do?
  alternatives:
  - What am I to do?
  - What should I do?
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive is naturally rendered as a self-directed
    question. 'Shall' preserves the deliberative nuance with readable modern English.
- source_word: πέμψω
  chosen: I will send
  alternatives:
  - I shall send
  lexicon: BDAG
  rationale: Future indicative expressing the owner's decided course of action.
- source_word: υἱόν
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: υἱός specifically means 'son'; gender-accurate rendering is required
    by the translation philosophy.
- source_word: ἀγαπητόν
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: '''Beloved'' preserves the weight and possible echo of divine-son language
    in Luke while remaining natural English.'
- source_word: ἴσως
  chosen: perhaps
  alternatives:
  - maybe
  lexicon: BDAG
  rationale: '''Perhaps'' fits the register and expresses expectation without certainty.'
- source_word: τοῦτον
  chosen: him
  alternatives:
  - this one
  lexicon: BDAG
  rationale: The demonstrative points to the son emphatically, but idiomatic English
    uses the pronoun 'him' here; the emphasis is sufficiently carried by context.
- source_word: ἐντραπήσονται
  chosen: they will respect
  alternatives:
  - they will be ashamed before
  - they will reverence
  lexicon: BDAG
  rationale: In this context ἐντρέπω in the passive/middle sense means to show deference
    or respect toward someone. 'Respect' is the clearest modern English equivalent;
    more literal options like 'be ashamed before' are possible but less natural here.
