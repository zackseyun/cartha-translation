theological_decisions:
- issue: Rendering κύριος in a parable where the figure may typologically represent
    God
  chosen_reading: owner
  alternative_readings:
  - lord of the vineyard
  rationale: The immediate narrative sense is a property owner in a parable. Rendering
    κύριος as 'owner' preserves the story-level meaning while allowing readers to
    perceive the theological analogy without the translation forcing it through title
    language. This is a contextual exception to the default 'Lord' rendering and is
    documented accordingly.
  doctrine_reference: Translation philosophy §5; Contested terms table for κύριος
- issue: Potential christological resonance of 'the beloved son'
  chosen_reading: my beloved son
  alternative_readings:
  - my son, the beloved one
  rationale: The Greek wording naturally carries both parabolic and christological
    resonance, likely echoing baptism/transfiguration language in Luke. The translation
    preserves that resonance without expanding it interpretively.
  doctrine_reference: Affirmations; Translation philosophy §3
