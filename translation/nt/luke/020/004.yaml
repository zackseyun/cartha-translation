id: LUK.20.4
reference: Luke 20:4
source:
  edition: SBLGNT
  text: Τὸ βάπτισμα Ἰωάννου ἐξ οὐρανοῦ ἦν ἢ ἐξ ἀνθρώπων;
translation:
  text: Was John's baptism from heaven or from men?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from God'; Greek literally, 'from heaven,' a reverential way of speaking
      of divine origin or authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - baptizing
  - washing
  lexicon: BDAG
  rationale: The noun refers to the rite/practice associated with John, not merely
    the act in abstraction. 'Baptism' is the standard and most precise English equivalent
    in this context.
- source_word: Ἰωάννου
  chosen: John's
  alternatives:
  - of John
  rationale: 'The genitive is naturally rendered as an English possessive: the baptism
    associated with John.'
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from God
  lexicon: BDAG
  rationale: Literally 'from heaven.' This preserves the Jewish reverential idiom
    and the wording of the Greek rather than interpreting it more explicitly as 'from
    God.'
- source_word: ἐξ ἀνθρώπων
  chosen: from men
  alternatives:
  - from human beings
  - from people
  lexicon: BDAG
  rationale: The contrast is between heavenly/divine origin and merely human origin.
    'Men' is concise and reflects the generic plural ἀνθρώπων here; it is not male-specific
    in sense but anthropological. This follows the project's gender-accurate principle
    by preserving the source's generic human reference in idiomatic English.
- source_word: ἦν
  chosen: was
  alternatives:
  - did it come
  lexicon: BDAG
  rationale: 'The Greek uses the copula with source phrases: literally, ''was it from
    heaven or from men?'' English can mirror this directly and naturally.'
- source_word: ἢ
  chosen: or
  rationale: Standard disjunctive conjunction marking the two alternatives in Jesus'
    question.
