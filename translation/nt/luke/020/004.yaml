theological_decisions:
- issue: Meaning of 'from heaven' in relation to John's baptism
  chosen_reading: Retain the idiomatic expression 'from heaven' in the main text.
  alternative_readings:
  - from God
  rationale: The phrase denotes divine authorization/origin, but the Greek explicitly
    says 'from heaven.' Preserving the idiom avoids over-interpretation while allowing
    readers to hear the Jewish reverential expression used in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
