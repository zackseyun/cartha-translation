theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse concerns the expected Davidic royal deliverer, so the titular
    and Jewish-messianic sense is foregrounded. This follows the doctrine's default
    for Χριστός when used as a title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, Χριστός → ''Messiah'' where
    title; ''Christ'' where name-like'
- issue: Davidic sonship language
  chosen_reading: David’s son
  alternative_readings:
  - the Son of David
  - a son of David
  rationale: The phrase refers to the common claim about the Messiah's descent from
    David. 'David’s son' preserves the literal filial language and the theological
    tension of the passage, which Jesus will probe further, without importing a fixed
    honorific capitalization not explicit in the Greek here.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
