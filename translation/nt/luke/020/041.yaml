id: LUK.20.41
reference: Luke 20:41
source:
  edition: SBLGNT
  text: Εἶπεν δὲ πρὸς αὐτούς· Πῶς λέγουσιν τὸν χριστὸν ⸂εἶναι Δαυὶδ υἱόν⸃;
translation:
  text: But he said to them, “How do they say that the Messiah is David’s son?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title Χριστός is rendered “Messiah” here because
      the context is explicitly about the expected Davidic deliverer.
    reason: alternative_reading
  - marker: b
    text: Or “a son of David” or “the Son of David.” The Greek reads literally “David’s
      son.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the discourse turn here as Jesus
    introduces a challenging question in response to the preceding exchange.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to these people
  lexicon: BDAG
  rationale: Standard directional/speech construction; 'to them' is the natural English
    equivalent.
- source_word: Πῶς
  chosen: How
  alternatives:
  - In what way
  lexicon: BDAG
  rationale: Introduces the manner or logic of the claim being questioned. 'How' is
    concise and idiomatic.
- source_word: λέγουσιν
  chosen: do they say
  alternatives:
  - are they saying
  - do people say
  lexicon: BDAG
  rationale: Present active indicative with an indefinite plural subject. English
    idiom commonly renders this as 'do they say,' preserving the unspecified subject.
- source_word: τὸν χριστόν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' where context
    supports. Here it is clearly titular and tied to Davidic expectation.
- source_word: εἶναι
  chosen: is
  alternatives:
  - to be
  lexicon: BDAG
  rationale: 'The infinitive after λέγουσιν is naturally rendered in English as a
    finite clause: ''say that ... is'' rather than the less idiomatic ''say ... to
    be.'''
- source_word: Δαυὶδ υἱόν
  chosen: David’s son
  alternatives:
  - a son of David
  - the son of David
  lexicon: BDAG
  rationale: The anarthrous genitive construction can be represented idiomatically
    as 'David’s son.' This preserves the messianic-Davidic lineage claim without over-specifying
    definiteness beyond the Greek.
