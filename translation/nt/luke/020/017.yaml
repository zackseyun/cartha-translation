theological_decisions:
- issue: Architectural metaphor in Psalm 118:22 citation
  chosen_reading: the head of the corner
  alternative_readings:
  - the cornerstone
  - the capstone
  rationale: The phrase κεφαλὴ γωνίας has been understood in multiple ways in Christian
    interpretation. To preserve theological and lexical tension rather than resolve
    it, the main text keeps the more transparent expression 'the head of the corner,'
    while alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3; §5
