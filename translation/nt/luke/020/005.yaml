theological_decisions:
- issue: Meaning of John's baptism/source in the implied answer 'From heaven'
  chosen_reading: Retain the idiom 'From heaven' without expanding it to 'from God.'
  alternative_readings:
  - From God
  rationale: The expression points to divine authority, but the text itself uses the
    reverential circumlocution 'heaven.' Preserving the wording avoids importing interpretation
    beyond the Greek while leaving the theological implication clear in context.
  doctrine_reference: Translation philosophy §1, §3
