id: LUK.20.5
reference: Luke 20:5
source:
  edition: SBLGNT
  text: οἱ δὲ συνελογίσαντο πρὸς ἑαυτοὺς λέγοντες ὅτι Ἐὰν εἴπωμεν· Ἐξ οὐρανοῦ, ἐρεῖ·
    Διὰ τί οὐκ ἐπιστεύσατε αὐτῷ;
translation:
  text: But they reasoned among themselves, saying, “If we say, ‘From heaven,’ he
    will say, ‘Why did you not believe him?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why did you not trust him?' The Greek verb can mean 'believe' or 'trust'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνελογίσαντο
  chosen: reasoned
  alternatives:
  - discussed
  - considered
  - debated
  lexicon: BDAG
  rationale: The verb συλλογίζομαι denotes reasoning or deliberating. 'Reasoned' preserves
    the cognitive, calculating sense better than the more conversational 'discussed,'
    while remaining natural English.
- source_word: πρὸς ἑαυτοὺς
  chosen: among themselves
  alternatives:
  - to themselves
  - with one another
  lexicon: BDAG
  rationale: The phrase literally means 'toward themselves,' but in context refers
    to internal group deliberation. 'Among themselves' best captures that they were
    conferring within their own circle.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered 'saying' in English narrative style.
- source_word: Ἐὰν εἴπωμεν
  chosen: If we say
  alternatives:
  - If we should say
  lexicon: BDAG
  rationale: This is a third-class conditional construction. 'If we say' is idiomatic
    English and adequately conveys the contingency without unnecessary stiffness.
- source_word: Ἐξ οὐρανοῦ
  chosen: From heaven
  alternatives:
  - From God
  - From the sky
  lexicon: BDAG
  rationale: The phrase refers to divine origin/authorization, but the Greek says
    'from heaven.' Retaining 'heaven' preserves the idiom and avoids interpretive
    overtranslation to 'God.'
- source_word: ἐρεῖ
  chosen: he will say
  alternatives:
  - he will ask
  - he will reply
  lexicon: BDAG
  rationale: Although the following clause is a question, the verb is simply 'say.'
    'He will say' preserves the Greek wording and lets the quoted question carry the
    interrogative force.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the interrogative phrase.
- source_word: ἐπιστεύσατε αὐτῷ
  chosen: did you not believe him
  alternatives:
  - did you not trust him
  - did you not believe in him
  lexicon: BDAG
  rationale: πιστεύω with the dative commonly means to believe or trust a person.
    'Believe him' fits the immediate context of accepting John's testimony; 'believe
    in him' would suggest a stronger personal-faith construction not required by the
    syntax.
