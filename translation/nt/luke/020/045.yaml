id: LUK.20.45
reference: Luke 20:45
source:
  edition: SBLGNT
  text: Ἀκούοντος δὲ παντὸς τοῦ λαοῦ εἶπεν τοῖς ⸀μαθηταῖς·
translation:
  text: 'And while all the people were listening, he said to the disciples:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As all the people listened, he said to the disciples.' The Greek uses
      a genitive absolute to mark the circumstance of his speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούοντος
  chosen: while ... were listening
  alternatives:
  - as ... listened
  - with ... listening
  - hearing
  lexicon: BDAG
  rationale: Genitive absolute with present participle of ἀκούω indicates contemporaneous
    action setting the scene. 'While ... were listening' is natural English and preserves
    the ongoing aspect better than a bare 'hearing'.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is a simple,
    readable rendering that preserves continuity without overstating contrast.
- source_word: παντὸς τοῦ λαοῦ
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: BDAG
  rationale: πᾶς with singular λαός means the people as a whole. 'All the people'
    is idiomatic English and retains the collective sense. 'Crowd' is possible in
    some contexts but λαός more naturally refers to the people rather than merely
    a gathered mass.
- source_word: λαοῦ
  chosen: people
  alternatives:
  - crowd
  - folk
  lexicon: BDAG
  rationale: λαός commonly denotes 'people' in Luke, often with covenantal or communal
    overtones. Here 'people' is the most direct and contextually appropriate rendering.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is straightforwardly rendered 'he said.' This is the standard
    narrative English equivalent.
- source_word: τοῖς μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to his disciples
  - to the learners
  lexicon: BDAG
  rationale: μαθηταῖς is best rendered 'disciples.' The possessive 'his' is not explicit
    in the Greek and is therefore omitted. 'Learners' is too weak and non-idiomatic
    in Gospel context.
