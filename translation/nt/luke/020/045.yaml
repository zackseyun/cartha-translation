theological_decisions:
- issue: Audience distinction in the scene
  chosen_reading: Jesus addresses the disciples in the hearing of all the people.
  alternative_readings:
  - Jesus addresses all the people directly
  - Jesus speaks privately to the disciples apart from the crowd
  rationale: The genitive absolute 'while all the people were listening' sets the
    public setting, while the dative 'to the disciples' identifies the direct addressees.
    The translation preserves both elements without collapsing them into one audience.
  doctrine_reference: Preserve theological tension rather than resolve it.
