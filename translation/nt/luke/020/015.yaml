id: LUK.20.15
reference: Luke 20:15
source:
  edition: SBLGNT
  text: καὶ ἐκβαλόντες αὐτὸν ἔξω τοῦ ἀμπελῶνος ἀπέκτειναν. τί οὖν ποιήσει αὐτοῖς ὁ
    κύριος τοῦ ἀμπελῶνος;
translation:
  text: And after throwing him out of the vineyard, they killed him. What then will
    the owner of the vineyard do to them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lord of the vineyard' or 'the master of the vineyard.' The Greek
      word is kyrios, commonly rendered 'Lord' when used as a title, but here it refers
      to the vineyard's human proprietor within the parable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλόντες
  chosen: after throwing ... out
  alternatives:
  - having cast ... out
  - after casting ... out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates action prior to the
    killing. 'Throwing out' is natural modern English and preserves the force of expulsion.
- source_word: ἔξω τοῦ ἀμπελῶνος
  chosen: out of the vineyard
  alternatives:
  - outside the vineyard
  lexicon: BDAG
  rationale: The phrase denotes movement from inside to outside. 'Out of the vineyard'
    is the most direct idiomatic rendering in English.
- source_word: ἀπέκτειναν
  chosen: they killed him
  alternatives:
  - they put him to death
  - they murdered him
  lexicon: BDAG
  rationale: The verb straightforwardly means 'kill.' 'Put him to death' is possible
    but slightly more formal; 'murdered' adds a moral nuance not explicit in the verb
    itself.
- source_word: τί οὖν
  chosen: What then
  alternatives:
  - What therefore
  - What, then
  lexicon: BDAG
  rationale: This preserves the inferential force of οὖν while keeping the question
    natural in contemporary English.
- source_word: ποιήσει
  chosen: will ... do
  alternatives:
  - will ... do to
  - will ... bring about for
  lexicon: BDAG
  rationale: ποιέω here is broad and contextually means what action the owner will
    take in response. 'Will do' is the clearest idiomatic equivalent, with 'to them'
    supplied from αὐτοῖς.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: 'The dative here is best taken as indirect object/adversative reference
    in context: what the owner will do to the tenants.'
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  chosen: the owner of the vineyard
  alternatives:
  - the lord of the vineyard
  - the master of the vineyard
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord' as a title, here it refers
    to the human proprietor in a parable, not a divine title. 'Owner' best conveys
    the contextual sense in readable English; alternatives are preserved because 'lord/master'
    are lexically possible.
