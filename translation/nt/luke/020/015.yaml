theological_decisions:
- issue: Rendering κύριος in a parabolic, non-divine referent
  chosen_reading: owner
  alternative_readings:
  - lord
  - master
  rationale: The doctrine default for κύριος is 'Lord,' but context governs. In this
    verse the referent is the proprietor of a vineyard within Jesus' parable, so translating
    the sense rather than mechanically using 'Lord' avoids misleading readers into
    hearing a direct divine title in the narrative wording. The theological significance
    of the parable is preserved without importing title-language the immediate context
    does not require.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος → Lord) with per-verse
    variance documented; Translation philosophy #5'
