id: LUK.20.8
reference: Luke 20:8
source:
  edition: SBLGNT
  text: καὶ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Οὐδὲ ἐγὼ λέγω ὑμῖν ἐν ποίᾳ ἐξουσίᾳ ταῦτα ποιῶ.
translation:
  text: And Jesus said to them, “Neither will I tell you by what authority I do these
    things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with what authority.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδὲ
  chosen: Neither will
  alternatives:
  - Nor do
  - Neither do
  lexicon: BDAG
  rationale: In this dialogue, οὐδέ links Jesus’ reply to the leaders’ refusal in
    the previous verse. English future 'Neither will I tell you' best conveys the
    responsive force and fits natural discourse better than a strictly present-tense
    rendering.
- source_word: λέγω
  chosen: tell
  alternatives:
  - say
  lexicon: BDAG
  rationale: 'Although λέγω commonly means ''say,'' with an indirect object and implied
    content it is idiomatic in English to render it ''tell'' here: Jesus refuses to
    disclose the answer to them.'
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  chosen: by what authority
  alternatives:
  - in what authority
  - with what authority
  lexicon: BDAG
  rationale: This prepositional phrase is idiomatically rendered 'by what authority'
    in English, expressing the basis or warrant under which Jesus acts. 'With what
    authority' is also possible, but 'by' slightly better reflects agency/basis in
    this context.
- source_word: ἐξουσίᾳ
  chosen: authority
  alternatives:
  - right
  - power
  lexicon: BDAG
  rationale: ἐξουσία here denotes delegated or rightful authority rather than mere
    raw power. 'Authority' is the standard and contextually precise rendering.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The plural demonstrative points back to Jesus’ actions under dispute.
    'These things' preserves the plural explicitly present in Greek.
- source_word: ποιῶ
  chosen: I do
  alternatives:
  - I am doing
  lexicon: BDAG
  rationale: The present tense here is naturally rendered as a simple present in English.
    Progressive aspect is possible but unnecessary and less idiomatic in this exchange.
- source_word: καὶ ὁ Ἰησοῦς εἶπεν αὐτοῖς
  chosen: And Jesus said to them
  alternatives:
  - Then Jesus said to them
  lexicon: BDAG
  rationale: This straightforward narrative introduction is best kept close to the
    Greek. 'And' preserves καί without overinterpreting sequence; 'said to them' reflects
    the dative αὐτοῖς.
