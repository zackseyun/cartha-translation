theological_decisions:
- issue: Jesus’ refusal to answer the leaders
  chosen_reading: Render as a direct refusal to disclose the source of his authority
    without adding interpretive explanation.
  alternative_readings:
  - Imply that Jesus is evading the question
  - Imply that Jesus is judging their unbelief explicitly in the translation
  rationale: The verse itself states only that Jesus refuses to tell them by what
    authority he does these things. The translation should preserve the narrative
    and rhetorical force without importing a doctrinal or moral explanation not explicit
    in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
