id: LUK.20.18
reference: Luke 20:18
source:
  edition: SBLGNT
  text: πᾶς ὁ πεσὼν ἐπ’ ἐκεῖνον τὸν λίθον συνθλασθήσεται· ἐφ’ ὃν δ’ ἂν πέσῃ, λικμήσει
    αὐτόν.
translation:
  text: Everyone who falls on that stone will be broken to pieces, but the one on
    whom it falls, it will crush him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be shattered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will grind him to powder' or 'will scatter him like chaff'; the Greek
      verb carries a stronger sense than simple impact.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ πεσὼν
  chosen: Everyone who falls
  alternatives:
  - Whoever falls
  - Every one who falls
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally and generically: ''everyone/whoever
    who falls.'' ''Everyone'' is natural modern English while preserving the universal
    scope.'
- source_word: ἐπ’ ἐκεῖνον τὸν λίθον
  chosen: on that stone
  alternatives:
  - upon that stone
  - against that stone
  lexicon: BDAG
  rationale: ἐπί with the accusative after πίπτω here conveys movement onto/upon the
    stone. 'On that stone' is idiomatic and preserves the demonstrative force of ἐκεῖνον.
- source_word: συνθλασθήσεται
  chosen: will be broken to pieces
  alternatives:
  - will be shattered
  - will be crushed
  lexicon: BDAG
  rationale: The future passive of συνθλάω/συνθλάομαι denotes being broken up or shattered.
    'Broken to pieces' captures the severe passive result without over-specifying
    the mechanism.
- source_word: ἐφ’ ὃν δ’ ἂν πέσῃ
  chosen: but the one on whom it falls
  alternatives:
  - but whoever it falls on
  - but if it falls on anyone
  lexicon: BDAG
  rationale: 'The relative clause with ἄν and aorist subjunctive expresses an indefinite
    condition: ''whoever/on whomever it may fall.'' The chosen wording keeps the parallel
    structure with the first clause and reads smoothly in English.'
- source_word: λικμήσει
  chosen: will crush
  alternatives:
  - will scatter like chaff
  - will grind to powder
  lexicon: BDAG
  rationale: λικμάω can denote crushing/winnowing so as to scatter. In this judgment
    image, 'will crush' is the clearest accessible rendering in the main text; the
    stronger nuance of pulverizing/scattering is preserved in a footnote.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is masculine singular, referring back to the generic singular
    antecedent. Per the project's gender-accurate policy, 'him' preserves the source
    grammar and representative force better than a neutral recast.
