theological_decisions:
- issue: Judgment imagery of the stone
  chosen_reading: Retain the stone as an agent of destructive judgment without softening
    the metaphor.
  alternative_readings:
  - Interpret the language more mildly as mere stumbling or injury
  rationale: In context, the stone from the preceding citation functions as a figure
    of decisive judgment. The verbs συνθλασθήσεται and λικμήσει are severe and should
    not be diluted. The translation preserves the theological force while avoiding
    interpretive expansion beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine reference
  chosen_reading: Use 'him' in the second clause.
  alternative_readings:
  - Use 'them' for contemporary inclusivity
  - Repeat 'that person'
  rationale: The Greek uses a masculine singular pronoun with generic force. The project's
    policy is gender-accurate over gender-neutral where the source is grammatically
    masculine and representative.
  doctrine_reference: Translation philosophy §4
