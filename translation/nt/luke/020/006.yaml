theological_decisions:
- issue: Rendering the people's assessment of John
  chosen_reading: that John was a prophet
  alternative_readings:
  - that John is a prophet
  rationale: This is not a doctrinally contested term, but the tense choice can subtly
    affect how the statement is heard. The Greek infinitive εἶναι does not itself
    mark tense; English normally backshifts after a past-oriented reporting context.
    'Was a prophet' reads naturally without denying John's prophetic status.
  doctrine_reference: Preserve theological tension rather than resolve it
