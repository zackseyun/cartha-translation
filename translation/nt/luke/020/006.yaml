id: LUK.20.6
reference: Luke 20:6
source:
  edition: SBLGNT
  text: ἐὰν δὲ εἴπωμεν· Ἐξ ἀνθρώπων, ⸂ὁ λαὸς ἅπας⸃ καταλιθάσει ἡμᾶς, πεπεισμένος γάρ
    ἐστιν Ἰωάννην προφήτην εἶναι·
translation:
  text: But if we say, ‘From men,’ all the people will stone us, for they are convinced
    that John was a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that John is a prophet.” The Greek infinitive does not itself specify
      tense; English may render it either way depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ εἴπωμεν
  chosen: But if we say
  alternatives:
  - But if we should say
  - And if we say
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive εἴπωμεν introduces a conditional possibility.
    'But if we say' is natural English and preserves the adversative/continuative
    force of δέ in context.
- source_word: Ἐξ ἀνθρώπων
  chosen: From men
  alternatives:
  - Of human origin
  - From human beings
  - From people
  lexicon: BDAG
  rationale: The phrase is elliptical, referring back to the source of John's baptism/authority.
    'From men' is a concise, formally close rendering that matches the parallel expression
    in the surrounding context. 'Of human origin' is interpretive and smoother, but
    less direct.
- source_word: ὁ λαὸς ἅπας
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: BDAG
  rationale: λαός commonly means 'people' in a collective sense; ἅπας intensifies
    comprehensiveness. 'All the people' is idiomatic and preserves the collective
    force better than the less natural 'the whole people.'
- source_word: καταλιθάσει
  chosen: will stone us
  alternatives:
  - will stone us to death
  - will pelt us with stones
  lexicon: BDAG
  rationale: The future verb means to stone. English 'stone us' is the standard rendering
    and leaves the severity implicit as in the Greek. Adding 'to death' may be contextually
    plausible but is more explicit than the source text here.
- source_word: πεπεισμένος γάρ ἐστιν
  chosen: for they are convinced
  alternatives:
  - for it is convinced
  - for they are persuaded
  lexicon: BDAG
  rationale: 'Although the Greek has singular πεπεισμένος ἐστιν, it refers collectively
    to ὁ λαὸς ἅπας. English naturally uses a plural pronoun with the collective antecedent:
    ''they are convinced.'' ''Persuaded'' is possible but slightly less idiomatic
    in contemporary English here.'
- source_word: Ἰωάννην προφήτην εἶναι
  chosen: that John was a prophet
  alternatives:
  - that John is a prophet
  lexicon: BDAG
  rationale: The accusative-infinitive construction after 'are convinced' is rendered
    with a finite clause in English. 'Was a prophet' fits the narrative setting and
    common English sequence of tense, though the Greek infinitive itself is tenseless.
    'Is a prophet' is possible and preserved as an alternative.
