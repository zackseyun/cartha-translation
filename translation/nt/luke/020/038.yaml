theological_decisions:
- issue: Sense of αὐτῷ in the clause πάντες γὰρ αὐτῷ ζῶσιν
  chosen_reading: for all live to him
  alternative_readings:
  - for all live for him
  - for all are alive before him
  rationale: The dative αὐτῷ is semantically compressed and has been rendered variously
    in English tradition. The chosen reading stays close to the Greek while preserving
    the theological point that those in covenant relation to God are living in relation
    to him, supporting Jesus' argument for resurrection without importing a more developed
    doctrinal formulation than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
