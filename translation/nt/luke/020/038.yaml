id: LUK.20.38
reference: Luke 20:38
source:
  edition: SBLGNT
  text: θεὸς δὲ οὐκ ἔστιν νεκρῶν ἀλλὰ ζώντων, πάντες γὰρ αὐτῷ ζῶσιν.
translation:
  text: Now he is not God of the dead, but of the living, for all live to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for all are alive before him.'
    reason: alternative_reading
lexical_decisions:
- source_word: θεὸς
  chosen: God
  alternatives:
  - a god
  lexicon: BDAG
  rationale: Anarthrous θεός here is definite in sense within a Jewish monotheistic
    context and in predicate relation to the implied referent from the preceding context;
    'God' is the natural English rendering.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or continuation. 'Now' preserves the discourse
    movement without overstating contrast; 'but' is possible, but the stronger contrast
    is already carried by οὐκ ... ἀλλὰ.
- source_word: νεκρῶν
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: 'The genitive plural after θεός is idiomatic: ''God of the dead.'' Using
    the substantival adjective ''the dead'' is both natural and close to the Greek.'
- source_word: ζώντων
  chosen: the living
  alternatives:
  - living people
  lexicon: BDAG
  rationale: As with νεκρῶν, the participle is substantival. 'The living' preserves
    the concise contrast with 'the dead.'
- source_word: πάντες
  chosen: all
  alternatives:
  - all people
  - all of them
  lexicon: BDAG
  rationale: πάντες is broad and contextually refers to the patriarchs under discussion,
    while also supporting the general principle Jesus states. 'All' preserves the
    Greek's compactness and leaves the scope as stated rather than over-specifying
    it.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  - before him
  lexicon: BDAG
  rationale: The dative can be rendered in several ways here. 'To him' is a transparent,
    literal rendering that preserves the relational sense without forcing an interpretive
    expansion. It also reflects the common understanding that in relation to God they
    are living.
- source_word: ζῶσιν
  chosen: live
  alternatives:
  - are alive
  lexicon: BDAG
  rationale: Present active indicative is best rendered simply as 'live.' 'Are alive'
    is possible but slightly more interpretive and less direct.
