id: LUK.20.12
reference: Luke 20:12
source:
  edition: SBLGNT
  text: καὶ προσέθετο ⸂τρίτον πέμψαι⸃· οἱ δὲ καὶ τοῦτον τραυματίσαντες ἐξέβαλον.
translation:
  text: And he sent a third; but they wounded this one too and threw him out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he added to send a third,' an idiom meaning 'he sent a
      third' or 'he proceeded to send a third.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθετο
  chosen: he sent
  alternatives:
  - he added to send
  - he proceeded to send
  - he sent again
  lexicon: BDAG
  rationale: The idiom προστίθημι + infinitive means to continue or proceed with an
    action. In English, 'he sent' with the object supplied from context communicates
    the sense naturally; the iterative force is already clear from 'a third.' 'He
    added to send' would be overly literal and awkward.
- source_word: τρίτον πέμψαι
  chosen: a third
  alternatives:
  - a third servant
  - a third one
  lexicon: BDAG
  rationale: The Greek literally has 'to send a third,' with the object omitted because
    it is understood from the preceding context of servants being sent. English normally
    supplies the implied object or leaves it elliptical. 'A third' is concise and
    preserves the narrative flow; the referent is clear from context.
- source_word: οἱ δὲ
  chosen: but they
  alternatives:
  - and they
  - but those tenants
  lexicon: BDAG
  rationale: δέ here marks contrast or development. 'But they' captures the adversative
    turn from the owner's action to the tenants' response. The subject 'they' is contextually
    the tenants.
- source_word: καὶ τοῦτον
  chosen: this one too
  alternatives:
  - this one also
  - even this one
  lexicon: BDAG
  rationale: 'καί adds the sense of repetition or addition: the same mistreatment
    happened to this servant as well. ''This one too'' is natural modern English and
    preserves the emphasis.'
- source_word: τραυματίσαντες
  chosen: wounded
  alternatives:
  - injured
  - beat and wounded
  lexicon: BDAG
  rationale: τραυματίζω specifically denotes causing a wound or injury. 'Wounded'
    is the most direct rendering and is stronger and more precise than the broader
    'injured.'
- source_word: ἐξέβαλον
  chosen: threw him out
  alternatives:
  - cast him out
  - drove him out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means to throw out or cast out. 'Threw him out' is clear,
    idiomatic modern English, and fits the violent action in the parable.
