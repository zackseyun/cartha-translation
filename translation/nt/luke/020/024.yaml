id: LUK.20.24
reference: Luke 20:24
source:
  edition: SBLGNT
  text: ⸀Δείξατέ μοι δηνάριον· τίνος ἔχει εἰκόνα καὶ ἐπιγραφήν; ⸀ἀποκριθέντες δὲ εἶπαν·
    Καίσαρος.
translation:
  text: Show me a denarius. Whose image and inscription does it have? And they answered,
    'Caesar's.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a Roman coin commonly used in the period; the term is kept
      rather than generalized to preserve the historical setting.
    reason: cultural_note
lexical_decisions:
- source_word: Δείξατέ μοι
  chosen: Show me
  alternatives:
  - Bring me
  - Display to me
  lexicon: BDAG
  rationale: The aorist imperative of δείκνυμι is a direct command. 'Show me' is natural
    modern English and preserves the force without unnecessary stiffness.
- source_word: δηνάριον
  chosen: a denarius
  alternatives:
  - a Roman coin
  - a silver coin
  lexicon: BDAG
  rationale: Using the transliterated coin name preserves the historical specificity
    of the text. More interpretive renderings like 'Roman coin' are understandable
    but less precise.
- source_word: τίνος
  chosen: Whose
  alternatives:
  - Of whom
  lexicon: BDAG
  rationale: The genitive interrogative asks about ownership or association. 'Whose'
    is the idiomatic English equivalent in this context.
- source_word: εἰκόνα
  chosen: image
  alternatives:
  - likeness
  - portrait
  lexicon: BDAG
  rationale: '''Image'' is the standard and sufficiently broad rendering, fitting
    both the physical likeness on a coin and the wider lexical range of εἰκών.'
- source_word: ἐπιγραφήν
  chosen: inscription
  alternatives:
  - writing
  - legend
  lexicon: BDAG
  rationale: On a coin, ἐπιγραφή refers to the written legend or inscription. 'Inscription'
    is precise and readable.
- source_word: ἀποκριθέντες δὲ εἶπαν
  chosen: And they answered
  alternatives:
  - And answering, they said
  - They replied
  lexicon: BDAG
  rationale: This participle-plus-verb construction is commonly rendered with a finite
    English verb. 'And they answered' preserves the narrative flow without wooden
    literalism.
- source_word: Καίσαρος
  chosen: Caesar's
  alternatives:
  - It is Caesar's
  - Of Caesar
  lexicon: BDAG
  rationale: The Greek gives only the genitive noun as a concise answer to 'Whose...?'
    English idiom supplies this naturally as 'Caesar's.'
