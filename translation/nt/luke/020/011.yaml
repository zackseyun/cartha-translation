theological_decisions:
- issue: Rendering of δοῦλος in the parable
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The project's default allows 'servant / slave' context-dependently. In
    this parable the ownership relation to the vineyard owner is salient enough that
    'slave' best reflects the social reality of δοῦλος without importing extra doctrinal
    claims.
