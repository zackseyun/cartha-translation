id: LUK.20.11
reference: Luke 20:11
source:
  edition: SBLGNT
  text: καὶ προσέθετο ⸂ἕτερον πέμψαι⸃ δοῦλον· οἱ δὲ κἀκεῖνον δείραντες καὶ ἀτιμάσαντες
    ἐξαπέστειλαν κενόν.
translation:
  text: And he proceeded to send another slave; but they also beat and dishonored
    that one, and sent him away empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' (Greek δοῦλος); 'slave' is used here to preserve the bonded
      status of the figure in the parable.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθετο
  chosen: he proceeded
  alternatives:
  - he added
  - he went on
  lexicon: BDAG
  rationale: The idiom προστίθημι with an infinitive commonly means to continue or
    proceed to do something. 'He proceeded' captures the narrative sense in natural
    English better than the more wooden 'he added.'
- source_word: ἕτερον
  chosen: another
  alternatives:
  - a different
  lexicon: BDAG
  rationale: ἕτερος here marks an additional servant distinct from the first. 'Another'
    is idiomatic and sufficient in context.
- source_word: πέμψαι
  chosen: to send
  alternatives:
  - to dispatch
  lexicon: BDAG
  rationale: The aorist infinitive complements προσέθετο. 'To send' is the standard,
    clear rendering.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Following the project's contested-terms guidance, δοῦλος is rendered
    context-dependently. In this parable the figure is an owned household agent sent
    by the master, so 'slave' better preserves the bonded status than 'servant,' while
    remaining natural English.
- source_word: κἀκεῖνον
  chosen: that one also
  alternatives:
  - him also
  - that one too
  lexicon: BDAG
  rationale: The compound form intensifies the parallel with the previous slave. In
    the final English sentence this is expressed as 'they also ... that one' for natural
    flow while preserving the sense.
- source_word: δείραντες
  chosen: beat
  alternatives:
  - flogged
  - struck
  lexicon: BDAG
  rationale: δέρω denotes beating physically. 'Beat' is the clearest general rendering
    and does not over-specify the manner as 'flogged' might.
- source_word: ἀτιμάσαντες
  chosen: dishonored
  alternatives:
  - treated shamefully
  - insulted
  lexicon: BDAG
  rationale: ἀτιμάζω involves treating someone with dishonor or shame. 'Dishonored'
    is concise and preserves the social-shame dimension; 'treated shamefully' is a
    viable alternative but less compact.
- source_word: ἐξαπέστειλαν
  chosen: sent away
  alternatives:
  - sent off
  - dismissed
  lexicon: BDAG
  rationale: The compound verb conveys sending out/from. 'Sent away' fits the context
    and pairs well with the following predicate.
- source_word: κενόν
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: BDAG
  rationale: κενός here functions adverbially/predicatively describing the slave's
    return without receiving the expected fruit. 'Empty-handed' is the natural English
    equivalent and makes the implied sense explicit without adding foreign content.
