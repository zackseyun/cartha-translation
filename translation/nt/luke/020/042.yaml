theological_decisions:
- issue: Rendering the first κύριος in the Psalm citation where the Hebrew underlying
    Psalm 110:1 uses the divine name
  chosen_reading: The Lord
  alternative_readings:
  - the LORD
  rationale: The Greek text before us has κύριος, and DOCTRINE.md sets the default
    rendering of κύριος as 'Lord.' Because the cited Hebrew text uses YHWH, the covenantal
    form 'the LORD' is worth preserving in a footnote, but the main text follows the
    Greek source and the project's default for κύριος.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms: κύριος → Lord, יְהוָה → the LORD'
- issue: Rendering the second κύριος in a christologically significant citation
  chosen_reading: my Lord
  alternative_readings:
  - my master
  rationale: The verse is central to Jesus' argument about the Messiah's status, and
    'Lord' preserves that theological weight without importing more than the Greek
    states. 'Master' is possible lexically but weakens the intertextual and christological
    force of the citation.
  doctrine_reference: 'DOCTRINE.md: Contested terms: κύριος → Lord; Preserve theological
    tension rather than resolve it'
