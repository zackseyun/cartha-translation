id: LUK.20.42
reference: Luke 20:42
source:
  edition: SBLGNT
  text: ⸂αὐτὸς γὰρ⸃ Δαυὶδ λέγει ἐν βίβλῳ ψαλμῶν· ⸀Εἶπεν κύριος τῷ κυρίῳ μου· Κάθου
    ἐκ δεξιῶν μου
translation:
  text: For David himself says in the Book of Psalms, ‘The Lord said to my Lord, “Sit
    at my right hand”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew of Psalm 110:1, 'The LORD said to my Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς γὰρ
  chosen: For ... himself
  alternatives:
  - for David himself
  - David himself indeed
  lexicon: BDAG
  rationale: γάρ is rendered 'for' to introduce the explanation, and αὐτός is emphatic,
    best reflected by 'himself' modifying David.
- source_word: Δαυὶδ
  chosen: David
  rationale: Personal name transliterated by standard English convention.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: 'Present tense in citation formula is naturally rendered as historical/literary
    present in English: ''says.'''
- source_word: ἐν βίβλῳ ψαλμῶν
  chosen: in the Book of Psalms
  alternatives:
  - in the book of psalms
  - in the Psalms
  lexicon: BDAG
  rationale: βίβλος is 'book' and ψαλμῶν is a genitive plural, yielding the established
    but source-faithful phrase 'Book of Psalms.' Capitalization reflects the recognized
    scriptural book.
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Aorist is best rendered as simple past within the quoted Psalm.
- source_word: κύριος
  chosen: The Lord
  alternatives:
  - Lord
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here the first κύριος refers
    to God in the Psalm citation; 'The Lord' is idiomatic and distinguishes the speaker
    in English. 'the LORD' is preserved as an alternative because the underlying Psalm
    (Ps 110:1) reflects the divine name in Hebrew.
- source_word: τῷ κυρίῳ μου
  chosen: to my Lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: κύριος again defaults to 'Lord' per contested-terms guidance. The dative
    with possessive pronoun is straightforwardly 'to my Lord.' 'Master' is lexically
    possible but less fitting in this messianic citation.
- source_word: Κάθου
  chosen: Sit
  alternatives:
  - Sit down
  - Be seated
  lexicon: BDAG
  rationale: Imperative of κάθημαι; 'Sit' is concise and natural, preserving the command
    without overexpansion.
- source_word: ἐκ δεξιῶν μου
  chosen: at my right hand
  alternatives:
  - at my right side
  - on my right
  lexicon: BDAG
  rationale: This idiom conventionally means a position at the speaker's right hand.
    Although ἐκ is literally 'from/out of,' the established idiomatic sense in this
    construction is 'at my right hand.'
