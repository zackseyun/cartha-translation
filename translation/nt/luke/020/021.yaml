theological_decisions:
- issue: Idiomatic expression about impartiality
  chosen_reading: Rendered οὐ λαμβάνεις πρόσωπον as 'you do not show partiality'
  alternative_readings:
  - you are not swayed by appearances
  - you do not favor persons
  rationale: The phrase is a Semitic/Greek idiom for impartiality. Translating the
    idiom rather than preserving a literal form avoids obscurity while maintaining
    the ethical-theological point that Jesus is not influenced by social standing.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic) and §1 (original-language primacy over translation tradition)
