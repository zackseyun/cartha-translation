id: LUK.20.21
reference: Luke 20:21
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησαν αὐτὸν λέγοντες· Διδάσκαλε, οἴδαμεν ὅτι ὀρθῶς λέγεις καὶ διδάσκεις
    καὶ οὐ λαμβάνεις πρόσωπον, ἀλλ’ ἐπ’ ἀληθείας τὴν ὁδὸν τοῦ θεοῦ διδάσκεις·
translation:
  text: And they questioned him, saying, “Teacher, we know that you speak and teach
    rightly, and you do not show partiality, but truly teach the way of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you do not receive a face,' an idiom meaning 'you do not show
      favoritism' or 'you are not swayed by appearances.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in truth teach the way of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησαν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: The verb denotes asking or questioning. 'Questioned' fits the context
    of a deliberate inquiry meant to test Jesus, while remaining natural English and
    not overstating hostility as 'interrogated' might.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The vocative of διδάσκαλος is best rendered 'Teacher' in modern English.
    'Master' can suggest authority or ownership beyond the lexical sense here.
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we are aware
  lexicon: BDAG
  rationale: A straightforward rendering of οἶδα. The speakers profess certainty,
    even though the narrative context implies flattery.
- source_word: ὀρθῶς
  chosen: rightly
  alternatives:
  - correctly
  - properly
  lexicon: BDAG
  rationale: '''Rightly'' preserves both correctness and uprightness in a concise
    way and pairs well with both ''speak'' and ''teach.'''
- source_word: λέγεις καὶ διδάσκεις
  chosen: you speak and teach
  alternatives:
  - you say and teach
  lexicon: BDAG
  rationale: Retaining both verbs reflects the Greek coordination and avoids collapsing
    near-synonyms. 'Speak and teach' is idiomatic and preserves the rhetorical fullness
    of the compliment.
- source_word: οὐ λαμβάνεις πρόσωπον
  chosen: you do not show partiality
  alternatives:
  - you do not receive a face
  - you are not swayed by appearances
  - you do not favor persons
  lexicon: BDAG
  rationale: This idiom literally involves 'receiving a face' and means showing favoritism
    or judging by status/appearance. 'Show partiality' is the clearest idiomatic English
    equivalent. A more literal rendering would be opaque, so the idiom is translated
    for sense.
- source_word: ἐπ’ ἀληθείας
  chosen: truly
  alternatives:
  - in truth
  - truthfully
  lexicon: BDAG
  rationale: The phrase modifies the manner of Jesus' teaching. 'Truly' gives natural
    English while preserving the sense of accordance with truth. 'In truth' is possible
    but less idiomatic in contemporary English.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  chosen: the way of God
  alternatives:
  - God's way
  - the path of God
  lexicon: BDAG
  rationale: '''The way of God'' preserves the definite expression and its theological
    resonance as God''s way, will, or path of life. ''God''s way'' is possible but
    slightly less formal and less transparent to the Greek structure.'
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: The conjunction marks contrast between refusing partiality and teaching
    according to truth. 'But' is the most natural English connector here.
