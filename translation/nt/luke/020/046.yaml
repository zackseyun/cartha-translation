id: LUK.20.46
reference: Luke 20:46
source:
  edition: SBLGNT
  text: Προσέχετε ἀπὸ τῶν γραμματέων τῶν θελόντων περιπατεῖν ἐν στολαῖς καὶ φιλούντων
    ἀσπασμοὺς ἐν ταῖς ἀγοραῖς καὶ πρωτοκαθεδρίας ἐν ταῖς συναγωγαῖς καὶ πρωτοκλισίας
    ἐν τοῖς δείπνοις,
translation:
  text: Beware of the scribes, who want to walk around in long robes, and who love
    greetings in the marketplaces and the best seats in the synagogues and places
    of honor at banquets,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Watch out for the scribes.'
    reason: lexical_alternative
  - marker: b
    text: '''Long robes'' refers to conspicuous, status-marking garments.'
    reason: cultural_note
  - marker: c
    text: Or 'chief seats' in the synagogues.
    reason: lexical_alternative
  - marker: d
    text: Or 'best places' or 'chief places' at banquets.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: Beware
  alternatives:
  - Watch out
  - Be on guard
  lexicon: BDAG
  rationale: Imperative plural calling for caution against a group. 'Beware' is concise,
    idiomatic, and preserves the warning force better than the more literal but less
    natural 'pay attention to yourselves from.'
- source_word: ἀπὸ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With προσέχω in this warning construction, English idiom is 'beware of.'
    This preserves the sense of guarding oneself against the scribes.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. ''Teachers of the law'' is interpretive and
    broader than the lexical form.'
- source_word: τῶν θελόντων
  chosen: who want to
  alternatives:
  - who desire to
  - wanting to
  lexicon: BDAG
  rationale: The participle characterizes the scribes by their preference and ambition.
    'Who want to' is natural modern English and captures the volitional nuance.
- source_word: περιπατεῖν
  chosen: walk around
  alternatives:
  - walk about
  - go about
  lexicon: BDAG
  rationale: In context this refers to public display rather than mere locomotion.
    'Walk around' is idiomatic and preserves the social-showing nuance without over-paraphrasing.
- source_word: ἐν στολαῖς
  chosen: in long robes
  alternatives:
  - in robes
  - in flowing robes
  lexicon: BDAG
  rationale: στολή commonly denotes a long robe or stately garment. 'Long robes' makes
    explicit the garment type implied in context and matches the social-prestige connotation.
- source_word: φιλούντων
  chosen: who love
  alternatives:
  - loving
  - who are fond of
  lexicon: BDAG
  rationale: The participle continues the characterization of the scribes. 'Who love'
    is direct and preserves the moral critique of their preference for honor.
- source_word: ἀσπασμοὺς
  chosen: greetings
  alternatives:
  - formal greetings
  - public greetings
  - salutations
  lexicon: BDAG
  rationale: Refers not merely to saying hello but to honorific public greetings.
    'Greetings' is the most natural base rendering; the honorific nuance is carried
    by context.
- source_word: ἐν ταῖς ἀγοραῖς
  chosen: in the marketplaces
  alternatives:
  - in the market squares
  lexicon: BDAG
  rationale: ἀγορά here denotes public market areas where social recognition occurs.
    'Marketplaces' is clear modern English.
- source_word: πρωτοκαθεδρίας
  chosen: the best seats
  alternatives:
  - front seats
  - chief seats
  - seats of honor
  lexicon: BDAG
  rationale: Denotes places of highest honor in synagogues. 'Best seats' is idiomatic
    and clear; the honor aspect is reinforced by the parallel phrase later in the
    verse.
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  lexicon: BDAG
  rationale: Straightforward locative phrase; standard rendering retained.
- source_word: πρωτοκλισίας
  chosen: places of honor
  alternatives:
  - best places
  - chief places
  - places at the head table
  lexicon: BDAG
  rationale: Refers to the most honored reclining places at meals. 'Places of honor'
    best communicates the cultural function in accessible English.
- source_word: ἐν τοῖς δείπνοις
  chosen: at banquets
  alternatives:
  - at dinners
  - at feasts
  lexicon: BDAG
  rationale: δεῖπνον can mean dinner/banquet, but in this honor-shame context 'banquets'
    better conveys formal social meals where status is displayed.
