theological_decisions:
- issue: Social-religious critique of the scribes
  chosen_reading: The verse is rendered as a warning against scribes characterized
    by ostentatious dress and pursuit of public honor, without expanding the critique
    beyond the stated behaviors.
  alternative_readings:
  - A broader condemnation of all scribes as a class
  - A narrower critique limited only to clothing customs
  rationale: The Greek targets 'the scribes' as characterized by the following participles
    and honor-seeking behaviors. The translation preserves the warning and moral force
    without importing a totalizing doctrinal claim about every individual scribe.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition
