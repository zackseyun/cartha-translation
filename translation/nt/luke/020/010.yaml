id: LUK.20.10
reference: Luke 20:10
source:
  edition: SBLGNT
  text: ⸀καὶ καιρῷ ἀπέστειλεν πρὸς τοὺς γεωργοὺς δοῦλον, ἵνα ἀπὸ τοῦ καρποῦ τοῦ ἀμπελῶνος
    ⸀δώσουσιν αὐτῷ· οἱ δὲ γεωργοὶ ⸂ἐξαπέστειλαν αὐτὸν δείραντες⸃ κενόν.
translation:
  text: And at the proper time he sent a slave to the vine-growers, so that they would
    give him some of the fruit of the vineyard. But the vine-growers sent him away
    empty after beating him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλον); the Greek term can denote either, but
      'slave' better preserves the bonded status in this context.
    reason: alternative_reading
  - marker: b
    text: Literally 'sent him away empty'; that is, without giving him any of the
      vineyard's fruit.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρῷ
  chosen: at the proper time
  alternatives:
  - in season
  - at the appointed time
  - at harvest time
  lexicon: BDAG
  rationale: Dative of time with καιρός indicates the fitting or appointed time. 'At
    the proper time' is natural English and preserves the sense without over-specifying
    'harvest' beyond what the Greek explicitly states.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he sent out
  lexicon: BDAG
  rationale: Simple aorist of ἀποστέλλω. 'Sent' is sufficient in English; 'sent out'
    is possible but unnecessary here.
- source_word: γεωργούς
  chosen: vine-growers
  alternatives:
  - farmers
  - tenants
  - tenant farmers
  lexicon: BDAG
  rationale: In the context of an ἀμπελών ('vineyard'), 'vine-growers' keeps the agricultural
    specificity of γεωργοί without importing the legal status of 'tenants,' which
    is contextually inferable but not lexically explicit in this word alone.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    In this parabolic setting the bonded status is part of the social reality, and
    'slave' is the more transparent lexical equivalent. The term is not softened to
    'servant' merely by tradition.
- source_word: ἵνα ... δώσουσιν αὐτῷ
  chosen: so that they would give him
  alternatives:
  - that they might give him
  - in order that they would give him
  lexicon: BDAG
  rationale: ἵνα with future indicative here expresses purpose/result in idiomatic
    Koine usage. 'So that they would give him' is clear modern English and preserves
    the intended purpose.
- source_word: ἀπὸ τοῦ καρποῦ τοῦ ἀμπελῶνος
  chosen: some of the fruit of the vineyard
  alternatives:
  - from the fruit of the vineyard
  - his share of the vineyard's fruit
  lexicon: BDAG
  rationale: ἀπό with the genitive here naturally conveys a portion taken from the
    produce. 'Some of the fruit' makes the partitive sense explicit in idiomatic English
    without adding a specific legal claim not stated in the text.
- source_word: ἐξαπέστειλαν
  chosen: sent him away
  alternatives:
  - dismissed him
  - sent him off
  lexicon: BDAG
  rationale: The compound verb ἐξαποστέλλω adds the sense of sending away/out. 'Sent
    him away' captures that force better than simply 'sent him.'
- source_word: δείραντες
  chosen: after beating him
  alternatives:
  - having beaten him
  - after flogging him
  lexicon: BDAG
  rationale: Aorist participle of δέρω denotes striking/beating. 'After beating him'
    expresses the participial action in smooth English. 'Flogging' is too specific.
- source_word: κενόν
  chosen: empty
  alternatives:
  - empty-handed
  lexicon: BDAG
  rationale: κενόν literally means 'empty.' In context it means he returned without
    receiving anything. 'Empty' is concise and faithful; the fuller idiom 'empty-handed'
    is preserved as a lexical alternative.
