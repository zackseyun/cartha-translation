id: LUK.20.43
reference: Luke 20:43
source:
  edition: SBLGNT
  text: ἕως ἂν θῶ τοὺς ἐχθρούς σου ὑποπόδιον τῶν ποδῶν σου.
translation:
  text: until I make your enemies a footstool for your feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until I put your enemies as a footstool of your feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἂν
  chosen: until
  alternatives:
  - until such time as
  - until when
  lexicon: BDAG
  rationale: The combination ἕως with ἄν introduces a future contingency/terminus,
    naturally rendered in English as 'until.' Expanding it would sound wooden without
    adding meaning.
- source_word: θῶ
  chosen: I make
  alternatives:
  - I put
  - I place
  lexicon: BDAG
  rationale: From τίθημι, literally 'put/place.' In the idiom of Psalm 110:1, English
    commonly and clearly expresses the resultative sense as 'make ... a footstool,'
    which is more natural than 'put ... a footstool' while preserving the meaning.
- source_word: τοὺς ἐχθρούς σου
  chosen: your enemies
  lexicon: BDAG
  rationale: 'Straightforward accusative object with possessive pronoun: ''your enemies.''
    No contextual reason to soften or reinterpret the hostility.'
- source_word: ὑποπόδιον
  chosen: a footstool
  alternatives:
  - the footstool
  lexicon: BDAG
  rationale: 'The noun means ''footstool.'' The anarthrous form is well represented
    by the English indefinite article here: ''a footstool.'' This also matches the
    idiomatic force of the Psalm citation.'
- source_word: τῶν ποδῶν σου
  chosen: for your feet
  alternatives:
  - of your feet
  - under your feet
  lexicon: BDAG
  rationale: Literally 'of your feet,' but idiomatic English with 'footstool' is 'for
    your feet.' 'Under your feet' interprets the image more explicitly than the Greek
    wording itself, so 'for your feet' better preserves the metaphor while remaining
    natural.
