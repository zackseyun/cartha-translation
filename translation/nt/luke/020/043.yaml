theological_decisions:
- issue: Psalm 110:1 citation imagery of subjugation
  chosen_reading: Retain the metaphor 'make your enemies a footstool for your feet'
    without paraphrasing it as total defeat or domination.
  alternative_readings:
  - until I put your enemies under your feet
  - until I make your enemies your footstool
  rationale: The verse is a direct continuation of Jesus' citation of Psalm 110:1.
    The translation preserves the royal-messianic imagery and does not over-explain
    the theological implication beyond the text itself. This maintains the christological
    force while avoiding interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
