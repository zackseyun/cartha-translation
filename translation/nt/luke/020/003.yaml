id: LUK.20.3
reference: Luke 20:3
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ εἶπεν πρὸς αὐτούς· Ἐρωτήσω ὑμᾶς ⸀κἀγὼ λόγον, καὶ εἴπατέ μοι·
translation:
  text: But in reply he said to them, “I also will ask you a question, and you tell
    me:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I also will ask you a matter/word.” The Greek uses λόγον,
      literally “word” or “matter,” but here it functions idiomatically as “question.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: in reply
  alternatives:
  - answering
  - having answered
  lexicon: BDAG
  rationale: A participial form of ἀποκρίνομαι introducing Jesus' response. 'In reply'
    gives natural English while preserving the responsive force without woodenly reproducing
    the participle.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the adversarial exchange
    in context better than a simple connective.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he answered
  - he spoke
  lexicon: BDAG
  rationale: λέγω here is the main speech verb following the participle. 'He said'
    is the most straightforward rendering in English.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: Standard idiomatic rendering of πρός with persons in direct speech contexts.
- source_word: Ἐρωτήσω
  chosen: I will ask
  alternatives:
  - I will question
  lexicon: BDAG
  rationale: Future of ἐρωτάω, introducing Jesus' counter-question. 'Ask' is natural
    and sufficiently precise.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of 'I will ask'; no special nuance beyond the plural addressees.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - I too
  - and I
  lexicon: BDAG
  rationale: 'Contraction of καὶ ἐγώ. ''I also'' preserves the emphatic reciprocal
    sense: as they questioned him, he will question them.'
- source_word: λόγον
  chosen: a question
  alternatives:
  - a word
  - a matter
  - one thing
  lexicon: BDAG
  rationale: Although λόγος often means 'word' or 'matter,' in this idiom with ἐρωτάω
    it refers to something asked, effectively 'a question.' This best conveys the
    sense in contemporary English.
- source_word: καὶ εἴπατέ μοι
  chosen: and you tell me
  alternatives:
  - and tell me
  - and answer me
  lexicon: BDAG
  rationale: Aorist imperative plural plus dative pronoun. 'You tell me' preserves
    the directness and the explicit second-person plural subject, matching the challenge
    Jesus gives them.
