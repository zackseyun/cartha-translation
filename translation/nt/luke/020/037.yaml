id: LUK.20.37
reference: Luke 20:37
source:
  edition: SBLGNT
  text: ὅτι δὲ ἐγείρονται οἱ νεκροὶ καὶ Μωϋσῆς ἐμήνυσεν ἐπὶ τῆς βάτου, ὡς λέγει κύριον
    τὸν θεὸν Ἀβραὰμ ⸀καὶ θεὸν Ἰσαὰκ ⸁καὶ θεὸν Ἰακώβ·
translation:
  text: But that the dead are raised, even Moses made known in the passage about the
    bush, where he calls the Lord the God of Abraham and the God of Isaac and the
    God of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the bush'—the Greek expression can refer either to the scene itself
      or, idiomatically, to the Scripture passage about the burning bush (Exod 3).
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Lord'; this reflects the Septuagint's customary rendering of
      the divine name in Exodus 3.
    reason: cross_reference
lexical_decisions:
- source_word: ἐγείρονται
  chosen: are raised
  alternatives:
  - rise
  - are awakened
  lexicon: BDAG
  rationale: Present passive is best rendered 'are raised' in this context of resurrection,
    matching the implied divine action and Jesus' argument about the resurrection
    of the dead.
- source_word: οἱ νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: Idiomatic and standard English equivalent for the substantival adjective;
    preserves the collective sense without unnecessary expansion.
- source_word: ἐμήνυσεν
  chosen: made known
  alternatives:
  - showed
  - indicated
  - declared
  lexicon: BDAG
  rationale: μηνύω means to make known or disclose. 'Made known' preserves the evidential
    force of Moses' testimony without overstating it as a formal proclamation.
- source_word: ἐπὶ τῆς βάτου
  chosen: in the passage about the bush
  alternatives:
  - at the bush
  - in the section about the bush
  lexicon: BDAG
  rationale: This idiom refers to the scriptural passage concerning the burning bush
    rather than merely the physical location. 'In the passage about the bush' communicates
    the literary reference clearly in modern English.
- source_word: ὡς λέγει
  chosen: where he calls
  alternatives:
  - as he says
  - where he says
  lexicon: BDAG
  rationale: In context, λέγει introduces the wording of Scripture cited by Moses.
    'Where he calls' fits the construction with the double accusative ('the Lord the
    God of Abraham...') and reads naturally in English.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' The article
    is retained because the Greek has κύριον with the sense of the divine title in
    the cited formula.
- source_word: θεὸν Ἀβραὰμ καὶ θεὸν Ἰσαὰκ καὶ θεὸν Ἰακώβ
  chosen: the God of Abraham and the God of Isaac and the God of Jacob
  alternatives:
  - God of Abraham, Isaac, and Jacob
  lexicon: BDAG
  rationale: The repeated θεόν is preserved for emphasis, reflecting the cadence of
    the Greek and the Exodus citation that undergirds Jesus' argument.
