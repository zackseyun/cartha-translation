theological_decisions:
- issue: Resurrection language in Jesus' argument against the Sadducees
  chosen_reading: '''the dead are raised'''
  alternative_readings:
  - the dead rise
  rationale: Both are possible in English, but 'are raised' better reflects the passive
    form and preserves the theological emphasis on resurrection as an act of God without
    adding doctrinal content beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Rendering κύριος in a citation about Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - LORD
  rationale: The doctrine excerpt sets κύριος default as 'Lord.' Although the citation
    echoes the divine name tradition from Exodus, the Greek text here reads κύριον,
    so 'the Lord' is used in the main text while the covenant-name nuance may be noted
    in a footnote.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
