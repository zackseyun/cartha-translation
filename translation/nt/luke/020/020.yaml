theological_decisions:
- issue: Rendering δίκαιος in a context of feigned moral standing
  chosen_reading: righteous
  alternative_readings:
  - upright
  - just
  rationale: Although this is not the noun δικαιοσύνη from the contested-terms table,
    the adjective carries related moral-religious weight. 'Righteous' preserves the
    religious coloration of the accusation and avoids reducing the pretense to mere
    civic respectability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
