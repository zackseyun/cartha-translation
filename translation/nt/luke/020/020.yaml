id: LUK.20.20
reference: Luke 20:20
source:
  edition: SBLGNT
  text: Καὶ παρατηρήσαντες ἀπέστειλαν ἐγκαθέτους ὑποκρινομένους ἑαυτοὺς δικαίους εἶναι,
    ἵνα ἐπιλάβωνται αὐτοῦ λόγου, ⸀ὥστε παραδοῦναι αὐτὸν τῇ ἀρχῇ καὶ τῇ ἐξουσίᾳ τοῦ
    ἡγεμόνος.
translation:
  text: And after watching him closely, they sent spies who pretended to be righteous,
    so that they might catch him in something he said, and thus hand him over to the
    rule and authority of the governor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'catch him in a word' or 'seize upon his word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hand him over to the governing rule and authority of the governor.'
      The paired terms likely emphasize official jurisdiction and power.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρατηρήσαντες
  chosen: after watching him closely
  alternatives:
  - having watched closely
  - keeping watch on him
  lexicon: BDAG
  rationale: Aorist participle indicating prior action to the main verb. 'Watching
    him closely' captures the hostile surveillance nuance better than a neutral 'observing.'
    'Him' is supplied from context in English though implicit in Greek.
- source_word: ἐγκαθέτους
  chosen: spies
  alternatives:
  - agents
  - plants
  - men lying in wait
  lexicon: BDAG
  rationale: The term refers to persons secretly set in place for entrapment. 'Spies'
    is concise, idiomatic, and conveys covert hostile intent better than the more
    opaque 'plants' or broader 'agents.'
- source_word: ὑποκρινομένους ἑαυτοὺς δικαίους εἶναι
  chosen: who pretended to be righteous
  alternatives:
  - pretending themselves to be upright
  - feigning that they were just
  lexicon: BDAG
  rationale: The participial phrase describes deceptive self-presentation. 'Righteous'
    preserves the moral-religious sense of δίκαιος better than merely civic 'honest'
    or 'upright,' and fits Luke's context of religious leaders.
- source_word: ἵνα ἐπιλάβωνται αὐτοῦ λόγου
  chosen: so that they might catch him in something he said
  alternatives:
  - so that they might seize upon his word
  - so that they might take hold of a statement from him
  lexicon: BDAG
  rationale: The idiom means to trap someone on the basis of his speech. A more literal
    'seize his word' is awkward in English; this rendering preserves the forensic-entrapment
    sense.
- source_word: ὥστε
  chosen: and thus
  alternatives:
  - so as to
  - with the result that
  lexicon: BDAG
  rationale: Here ὥστε introduces the intended result of the trap. 'And thus' reads
    naturally in English while preserving the consequential force.
- source_word: παραδοῦναι
  chosen: hand him over
  alternatives:
  - deliver him up
  - turn him over
  lexicon: BDAG
  rationale: Standard rendering for παραδίδωμι in judicial/betrayal contexts. 'Hand
    him over' is clear modern English and preserves the legal-hostile sense.
- source_word: τῇ ἀρχῇ
  chosen: the rule
  alternatives:
  - the jurisdiction
  - the governing authority
  - the magistrate
  lexicon: BDAG
  rationale: ἀρχή here denotes ruling power or official rule rather than a beginning.
    Because ἐξουσία follows, a differentiated rendering avoids flattening the pair
    into a single English term.
- source_word: τῇ ἐξουσίᾳ
  chosen: authority
  alternatives:
  - power
  - jurisdiction
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or right to exercise power.
    'Authority' is the most natural and precise gloss here.
- source_word: τοῦ ἡγεμόνος
  chosen: of the governor
  alternatives:
  - of the ruler
  - of the prefect
  lexicon: BDAG
  rationale: ἡγεμών is a governing official; 'governor' is the standard and most accessible
    English equivalent in this Roman provincial context.
