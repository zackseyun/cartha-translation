id: LUK.2.23
reference: Luke 2:23
source:
  edition: SBLGNT
  text: καθὼς γέγραπται ἐν νόμῳ κυρίου ὅτι Πᾶν ἄρσεν διανοῖγον μήτραν ἅγιον τῷ κυρίῳ κληθήσεται,
translation:
  text: as it is written in the Law of the Lord that every male opening the womb shall be called holy to the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every male child that opens the womb.'
    reason: lexical_alternative
  - marker: b
    text: That is, the firstborn male is regarded as holy, or consecrated, to the Lord; compare Exodus 13:2, 12.
    reason: cross_reference
  - marker: c
    text: Or 'in the Law of the Lord, that'.
    reason: previous_rendering
lexical_decisions:
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces correspondence with the written law citation. 'As' is concise and natural in English while preserving the comparative force.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula for Scripture citation. English idiom favors 'it is written' for an abiding written authority.
- source_word: ἐν νόμῳ κυρίου
  chosen: in the Law of the Lord
  alternatives:
  - in the Lord's law
  lexicon: BDAG
  rationale: νόμος here refers specifically to the Mosaic law as scriptural authority. Capitalizing 'Law' signals the recognized body of divine instruction. κύριος is rendered 'Lord' per doctrine defaults.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what is written. Simple 'that' best fits the citation structure.
- source_word: Πᾶν ἄρσεν
  chosen: every male
  alternatives:
  - every male child
  - every male offspring
  lexicon: BDAG
  rationale: The Greek is explicitly masculine and singular/generic. 'Every male' is the most direct and gender-accurate rendering; adding 'child' would slightly interpret beyond the wording, though the context concerns newborns.
- source_word: διανοῖγον μήτραν
  chosen: opening the womb
  alternatives:
  - that opens the womb
  - opening a womb
  lexicon: BDAG
  rationale: A participial phrase modifying 'every male.' 'Opening the womb' preserves the idiomatic biblical expression for the firstborn male. The article is absent before μήτραν, but English idiom commonly uses 'the womb' in this fixed expression.
- source_word: ἅγιον
  chosen: holy
  alternatives:
  - consecrated
  - set apart as holy
  lexicon: BDAG
  rationale: Retains the core holiness language of the text. 'Consecrated' is interpretive and may obscure the lexical link to holiness terminology.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: BDAG
  rationale: The dative here marks relation/dedication. 'To the Lord' is the conventional and sufficiently precise rendering, preserving the citation's covenantal language.
- source_word: κληθήσεται
  chosen: shall be called
  alternatives:
  - will be called
  - shall be designated
  lexicon: BDAG
  rationale: Future passive in a formal citation context is well represented by 'shall be called.' This preserves the scriptural-register tone without becoming archaic overall.
