  from: in the Law of the Lord, that
  to: in the Law of the Lord that
  rationale: The comma after 'Lord' creates a slight pause that feels somewhat unnatural in modern English when introducing an epexegetical 'that' clause. Removing the comma would create a smoother, more direct flow between the introductory formula ('it is written') and the content of the citation, which is a more common construction.
