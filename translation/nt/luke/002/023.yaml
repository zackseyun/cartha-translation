theological_decisions:
- issue: Rendering of κύριος in a citation from Israel's law
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek text has κύριος, and the doctrine default for κύριος is 'Lord.' Although the underlying Hebrew source would reflect the divine name in Exodus 13:2, this translation works from the Greek text and follows the stated default while preserving the covenantal sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Holiness language versus interpretive dedication language
  chosen_reading: holy to the Lord
  alternative_readings:
  - consecrated to the Lord
  - set apart to the Lord
  rationale: The text explicitly uses ἅγιον, so the main text preserves 'holy' rather than replacing it with a more interpretive gloss. This maintains lexical transparency and theological continuity with holiness categories in the Law.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
