id: LUK.9.27
reference: Luke 9:27
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ἀληθῶς, εἰσίν τινες τῶν ⸀αὐτοῦ ⸀ἑστηκότων οἳ οὐ μὴ γεύσωνται
    θανάτου ἕως ἂν ἴδωσιν τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: But I tell you truly, there are some standing here who will certainly not
    taste death until they see the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'of those standing here.'
    reason: lexical_alternative
  - marker: b
    text: '''Taste death'' is an idiom meaning ''experience death'' or ''die.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν ἀληθῶς
  chosen: But I tell you truly
  alternatives:
  - But I tell you in truth
  - Truly I tell you
  lexicon: BDAG
  rationale: Retains the discourse marker δέ with 'But' and renders ἀληθῶς adverbially
    as 'truly.' 'Truly I tell you' is idiomatic, but the chosen wording more transparently
    reflects the Greek order and emphasis.
- source_word: εἰσίν τινες
  chosen: there are some
  alternatives:
  - some are
  - there are certain ones
  lexicon: BDAG
  rationale: Idiomatic English existential construction best represents the Greek
    while preserving the indefinite force of τινες.
- source_word: τῶν αὐτοῦ ἑστηκότων
  chosen: standing here
  alternatives:
  - of those standing here
  - of those who are standing here
  - standing
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι denotes persons presently standing.
    'Here' is supplied to make the deictic force natural in English, reflecting the
    sense of those present with him. The genitive partitive construction is absorbed
    idiomatically into English rather than rendered woodenly.
- source_word: οἳ οὐ μὴ γεύσωνται θανάτου
  chosen: who will certainly not taste death
  alternatives:
  - who will by no means taste death
  - who will certainly not die
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation, represented
    by 'will certainly not.' 'Taste death' is a well-established idiom in English
    and preserves the metaphor of γεύομαι rather than flattening it to 'die' in the
    main text.
- source_word: ἕως ἂν ἴδωσιν
  chosen: until they see
  alternatives:
  - until they have seen
  - before they see
  lexicon: BDAG
  rationale: Standard rendering of ἕως ἄν with aorist subjunctive in a future-oriented
    clause. 'Until they see' is both accurate and natural.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and sufficiently transparent rendering
    of βασιλεία here. ''Reign'' captures dynamic rule but is narrower than the term''s
    full semantic range and less natural in this context.'
