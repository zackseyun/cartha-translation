theological_decisions:
- issue: Meaning of 'see the kingdom of God' in context
  chosen_reading: Retained the phrase without interpretive expansion.
  alternative_readings:
  - see the kingdom manifested in the transfiguration
  - see the kingdom in the resurrection/ascension
  - see the kingdom in the destruction of Jerusalem
  - see the kingdom in the spread of the church
  rationale: The verse has multiple plausible referents in interpretation history.
    To preserve theological tension and avoid importing a specific eschatological
    scheme, the translation leaves the phrase as stated in the Greek without explanatory
    paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
