theological_decisions:
- issue: Scope of Jesus' rebuke to 'generation'
  chosen_reading: Render the address collectively as 'generation' without specifying
    whether Jesus rebukes the crowd, the disciples, or Israel as a whole.
  alternative_readings:
  - Addressed primarily to the disciples
  - Addressed primarily to the father/crowd
  - Addressed to Israel generally
  rationale: The Greek vocative γενεὰ leaves the referent broad. To preserve interpretive
    tension, the translation keeps the collective term and does not narrow the audience
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
