id: LUK.9.52
reference: Luke 9:52
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν ἀγγέλους πρὸ προσώπου αὐτοῦ. καὶ πορευθέντες εἰσῆλθον εἰς κώμην
    Σαμαριτῶν, ⸀ὡς ἑτοιμάσαι αὐτῷ·
translation:
  text: And he sent messengers ahead of him. And after going, they entered a village
    of the Samaritans to prepare for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'before him' for the idiom 'before his face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a Samaritan village.' The Greek more literally says 'a village of the
      Samaritans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Aorist active indicative of ἀποστέλλω is straightforwardly rendered 'sent.'
    'Dispatched' is possible but less natural in modern English.
- source_word: ἀγγέλους
  chosen: messengers
  alternatives:
  - angels
  lexicon: BDAG
  rationale: In this narrative context the referent is clearly human envoys sent ahead
    to a Samaritan village, not heavenly beings. 'Messengers' best reflects the contextual
    sense while preserving the lexical range of ἄγγελος.
- source_word: πρὸ προσώπου αὐτοῦ
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: BDAG
  rationale: The idiom literally means 'before his face/presence' but in English idiomatic
    narrative style 'ahead of him' best conveys movement in advance of Jesus without
    awkward literalism.
- source_word: πορευθέντες
  chosen: after going
  alternatives:
  - having gone
  - when they went
  lexicon: BDAG
  rationale: The aorist participle is temporally prior to the main verb. 'After going'
    preserves that sequence in readable English. 'Having gone' is more formal but
    less natural.
- source_word: εἰσῆλθον
  chosen: entered
  alternatives:
  - went into
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι is naturally rendered 'entered.' This is concise
    and idiomatic.
- source_word: κώμην
  chosen: village
  alternatives:
  - town
  lexicon: BDAG
  rationale: κώμη commonly denotes a village or small settlement rather than a larger
    town. 'Village' is the more precise choice.
- source_word: Σαμαριτῶν
  chosen: of the Samaritans
  alternatives:
  - Samaritan
  lexicon: BDAG
  rationale: The genitive plural is most directly represented as 'of the Samaritans,'
    indicating a village belonging to or inhabited by Samaritans. English could compress
    this to 'a Samaritan village,' but the chosen rendering stays closer to the Greek
    form.
- source_word: ὡς ἑτοιμάσαι αὐτῷ
  chosen: to prepare for him
  alternatives:
  - in order to make preparations for him
  - to prepare things for him
  lexicon: BDAG
  rationale: ὡς with the infinitive here expresses purpose. 'To prepare for him' is
    concise and natural, leaving implicit the object of preparation as the Greek does.
