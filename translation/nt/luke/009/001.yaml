id: LUK.9.1
reference: Luke 9:1
source:
  edition: SBLGNT
  text: Συγκαλεσάμενος δὲ τοὺς δώδεκα ἔδωκεν αὐτοῖς δύναμιν καὶ ἐξουσίαν ἐπὶ πάντα
    τὰ δαιμόνια καὶ νόσους θεραπεύειν,
translation:
  text: And after calling the twelve together, he gave them power and authority over
    all the demons and to heal diseases,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having called the twelve together.'
    reason: lexical_alternative
  - marker: b
    text: Or 'over every demon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συγκαλεσάμενος
  chosen: after calling ... together
  alternatives:
  - having called ... together
  - summoning
  lexicon: BDAG
  rationale: Aorist middle participle, nominative singular masculine, modifying the
    main verb ἔδωκεν. 'After calling ... together' gives natural English while preserving
    the participial action antecedent to the giving. 'Together' reflects the συν-
    prefix.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective. 'And' preserves narrative continuity without
    overstating contrast. It is not strongly adversative in this context.
- source_word: τοὺς δώδεκα
  chosen: the twelve
  alternatives:
  - the twelve disciples
  - the Twelve
  lexicon: BDAG
  rationale: The Greek simply says 'the twelve.' Lowercase 'the twelve' is transparent
    and avoids adding 'disciples,' which is not explicit here. Capitalized 'the Twelve'
    is possible as a quasi-title, but lowercase is more neutral in this draft.
- source_word: ἔδωκεν
  chosen: he gave
  alternatives:
  - he granted
  lexicon: BDAG
  rationale: Straightforward aorist of δίδωμι. 'Gave' is the plainest and most direct
    rendering.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - ability
  - might
  lexicon: BDAG
  rationale: δύναμις commonly denotes power or capability. 'Power' is the standard
    and best fits the context of miraculous ministry.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - jurisdiction
  lexicon: BDAG
  rationale: 'ἐξουσία denotes delegated authority or the right to exercise power.
    Rendering it distinctly from δύναμις preserves the paired nuance: capacity and
    authorization.'
- source_word: ἐπὶ πάντα τὰ δαιμόνια
  chosen: over all the demons
  alternatives:
  - over every demon
  - over all demons
  lexicon: BDAG
  rationale: ἐπί with the accusative here conveys authority over. The article and
    plural are naturally represented by 'all the demons,' though 'all demons' is also
    idiomatic. 'Demons' is preferable to more interpretive alternatives.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The source term is δαιμόνια, not specifically 'unclean spirits.' 'Demons'
    is the direct lexical equivalent.
- source_word: νόσους
  chosen: diseases
  alternatives:
  - sicknesses
  - illnesses
  lexicon: BDAG
  rationale: νόσος refers to disease or sickness. 'Diseases' is slightly more concrete
    and pairs well with θεραπεύειν.
- source_word: θεραπεύειν
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: Present infinitive expressing the purpose/content of what he gave them
    power and authority to do. 'To heal' is idiomatic and broad enough for the range
    of θεραπεύω.
