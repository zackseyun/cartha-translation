theological_decisions:
- issue: Distinction between δύναμις and ἐξουσία
  chosen_reading: rendered as 'power and authority'
  alternative_readings:
  - authority and power
  - power and right
  rationale: The verse distinguishes capability from delegated authority. Preserving
    both terms avoids flattening the text's portrayal of Jesus' commission to the
    twelve.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Reference of 'the twelve'
  chosen_reading: kept as 'the twelve' without adding 'disciples' or 'apostles'
  alternative_readings:
  - the twelve disciples
  - the twelve apostles
  rationale: The Greek text does not explicitly include 'disciples' or 'apostles'
    in this verse. Avoiding expansion follows original-language primacy and resists
    importing information from nearby contexts.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
