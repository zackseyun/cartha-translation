theological_decisions:
- issue: Sense of οὐρανός in a prayer context
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: The upward gaze accompanies blessing directed toward God, so 'heaven'
    preserves the reverential and theological dimension of the scene without adding
    doctrinal content.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning in context.'
- issue: Rendering εὐλόγησεν
  chosen_reading: he blessed them
  alternative_readings:
  - he gave thanks for them
  rationale: The Greek verb is 'blessed,' and the translation should not flatten it
    into a different verb merely for harmonization with parallel accounts. This preserves
    source-language specificity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
