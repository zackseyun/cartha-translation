id: LUK.9.16
reference: Luke 9:16
source:
  edition: SBLGNT
  text: λαβὼν δὲ τοὺς πέντε ἄρτους καὶ τοὺς δύο ἰχθύας ἀναβλέψας εἰς τὸν οὐρανὸν εὐλόγησεν
    αὐτοὺς καὶ κατέκλασεν καὶ ἐδίδου τοῖς μαθηταῖς ⸀παραθεῖναι τῷ ὄχλῳ.
translation:
  text: Then, taking the five loaves and the two fish, and looking up to heaven, he
    blessed them and broke them and kept giving them to the disciples to set before
    the crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he gave thanks for them.' The Greek verb here is 'blessed,' while some
      parallel accounts use 'gave thanks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  chosen: taking
  alternatives:
  - having taken
  - after taking
  lexicon: BDAG
  rationale: Aorist participle introducing attendant action prior to the main verbs.
    'Taking' is natural English and preserves the sequence without overformal stiffness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks narrative progression. 'Then' conveys the mild connective force
    in readable English.
- source_word: ἄρτους
  chosen: loaves
  alternatives:
  - bread
  lexicon: BDAG
  rationale: In feeding contexts ἄρτος commonly refers to individual loaves rather
    than bread in the abstract; 'loaves' is the idiomatic and contextually precise
    rendering.
- source_word: ἰχθύας
  chosen: fish
  alternatives:
  - fishes
  lexicon: BDAG
  rationale: English normally uses 'fish' as the plural in ordinary narrative style.
- source_word: ἀναβλέψας εἰς τὸν οὐρανὸν
  chosen: looking up to heaven
  alternatives:
  - looking up into heaven
  - raising his eyes to heaven
  lexicon: BDAG
  rationale: This participial phrase describes Jesus' upward gaze in prayerful posture.
    'To heaven' is idiomatic and sufficiently literal.
- source_word: οὐρανὸν
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In this context of blessing before God, 'heaven' better reflects the
    theological sense than the merely physical 'sky'.
- source_word: εὐλόγησεν αὐτοὺς
  chosen: he blessed them
  alternatives:
  - he gave thanks for them
  - he blessed it
  lexicon: BDAG
  rationale: The direct object αὐτούς is masculine plural, naturally referring to
    the loaves and fish together. 'Blessed them' follows the Greek directly. Although
    some English traditions render the sense as 'gave thanks,' Luke's verb is εὐλογέω,
    not εὐχαριστέω.
- source_word: κατέκλασεν
  chosen: broke them
  alternatives:
  - broke
  lexicon: BDAG
  rationale: The verb means to break, here referring to the food for distribution.
    Supplying 'them' makes the English explicit and coherent with the preceding plural
    object.
- source_word: ἐδίδου
  chosen: kept giving them
  alternatives:
  - gave them
  - was giving them
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action during the distribution.
    'Kept giving' captures the iterative force clearly in modern English.
- source_word: μαθηταῖς
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article is present, but possessive 'his' is not explicit. 'The disciples'
    is sufficiently clear in context and closer to the Greek wording.
- source_word: παραθεῖναι
  chosen: to set before
  alternatives:
  - to serve
  - to place before
  lexicon: BDAG
  rationale: 'The infinitive expresses the purpose of giving to the disciples: they
    were to place the food before the people. ''Set before'' is a natural rendering
    that preserves the concrete sense better than the more interpretive ''serve''.'
- source_word: ὄχλῳ
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος in Luke commonly denotes a crowd. 'Crowd' is clear, modern, and
    contextually fitting.
