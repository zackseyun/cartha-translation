theological_decisions:
- issue: Variant christological descriptor in the heavenly voice
  chosen_reading: ἐκλελεγμένος rendered as 'Chosen One'
  alternative_readings:
  - ἀγαπητός rendered as 'beloved' or 'beloved Son'
  rationale: The SBLGNT text reads ἐκλελεγμένος, and the translation follows the provided
    source text rather than harmonizing to the more familiar Synoptic wording 'beloved.'
    This preserves the distinct wording of Luke's text while noting the alternative
    in a footnote. The rendering does not diminish sonship; both titles are retained
    as the Greek presents them.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
