id: LUK.9.35
reference: Luke 9:35
source:
  edition: SBLGNT
  text: καὶ φωνὴ ἐγένετο ἐκ τῆς νεφέλης λέγουσα· Οὗτός ἐστιν ὁ υἱός μου ὁ ⸀ἐκλελεγμένος,
    αὐτοῦ ἀκούετε.
translation:
  text: And a voice came from the cloud, saying, “This is my Son, my Chosen One; listen
    to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'my beloved Son' instead of 'my Son, my Chosen One.'
    reason: textual_variant
lexical_decisions:
- source_word: φωνὴ ἐγένετο
  chosen: a voice came
  alternatives:
  - a voice came to be
  - a voice sounded
  - there came a voice
  lexicon: BDAG
  rationale: The idiom ἐγένετο with φωνή is naturally rendered in English as the occurrence
    of a voice rather than a wooden 'came to be.' 'Came' preserves the eventive force
    without sounding unnatural.
- source_word: ἐκ τῆς νεφέλης
  chosen: from the cloud
  alternatives:
  - out of the cloud
  lexicon: BDAG
  rationale: ἐκ denotes source/origin. 'From the cloud' is idiomatic and sufficiently
    precise; 'out of' is possible but not necessary here.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - which said
  lexicon: BDAG
  rationale: The present participle introduces the content of the voice. 'Saying'
    is the most natural participial equivalent in English narrative style.
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  lexicon: BDAG
  rationale: Standard demonstrative-copula construction. 'This is' is idiomatic and
    preserves the identificational force.
- source_word: ὁ υἱός μου
  chosen: my Son
  alternatives:
  - the Son of me
  lexicon: BDAG
  rationale: The articular noun with possessive pronoun is best rendered straightforwardly
    as 'my Son.' Capitalization reflects its use as a christological designation in
    context, not a change in lexical meaning.
- source_word: ὁ ἐκλελεγμένος
  chosen: my Chosen One
  alternatives:
  - the Chosen One
  - the Elect One
  - the one who has been chosen
  - my beloved
  lexicon: BDAG
  rationale: The perfect passive participle of ἐκλέγομαι means 'chosen/elected.' Because
    it stands in apposition to 'my Son' and the possessive sense is implicit from
    the surrounding declaration, 'my Chosen One' reads naturally in English and preserves
    the semantic force. 'Beloved' reflects a different textual reading found in parallels
    and some manuscripts, so it is preserved only in a footnote as an alternative
    reading, not adopted in the main text.
- source_word: αὐτοῦ ἀκούετε
  chosen: listen to him
  alternatives:
  - hear him
  - keep listening to him
  lexicon: BDAG
  rationale: The present imperative ἀκούετε can mean 'listen to' in the sense of heed/obey.
    'Listen to him' is clear modern English and preserves the command's force better
    than the less idiomatic 'hear him.'
