id: LUK.9.37
reference: Luke 9:37
source:
  edition: SBLGNT
  text: Ἐγένετο ⸀δὲ τῇ ἑξῆς ἡμέρᾳ κατελθόντων αὐτῶν ἀπὸ τοῦ ὄρους συνήντησεν αὐτῷ
    ὄχλος πολύς.
translation:
  text: Now on the next day, when they had come down from the mountain, a large crowd
    met him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the following day."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now
  alternatives:
  - And it happened
  - Then
  lexicon: BDAG
  rationale: The idiom ἐγένετο δὲ commonly functions as a narrative transition rather
    than foregrounding the event of 'becoming/happening.' 'Now' gives natural modern
    English while preserving the discourse shift. 'And it happened' is more formally
    literal but less idiomatic in contemporary English.
- source_word: τῇ ἑξῆς ἡμέρᾳ
  chosen: on the next day
  alternatives:
  - the following day
  - on the following day
  lexicon: BDAG
  rationale: This dative temporal expression denotes time when. 'On the next day'
    is clear, natural, and close to the Greek sense.
- source_word: κατελθόντων αὐτῶν
  chosen: when they had come down
  alternatives:
  - after they came down
  - as they were coming down
  lexicon: BDAG
  rationale: The genitive absolute gives circumstantial background. 'When they had
    come down' fits the aorist participle's completed action relative to the main
    verb and avoids over-specifying sequence beyond the Greek.
- source_word: ἀπὸ τοῦ ὄρους
  chosen: from the mountain
  alternatives:
  - from the hill
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain' or 'mountain region.' In this narrative
    context, 'mountain' is the standard and most fitting rendering.
- source_word: συνήντησεν αὐτῷ
  chosen: met him
  alternatives:
  - encountered him
  - came to meet him
  lexicon: BDAG
  rationale: The verb means 'meet' or 'go to meet.' 'Met him' is the most straightforward
    English equivalent here. 'Came to meet him' is possible but slightly more expansive
    than necessary.
- source_word: ὄχλος πολύς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd' and πολύς here intensifies size. 'A large crowd' is
    natural modern English and preserves the sense without archaic tone.
