theological_decisions:
- issue: Nature of 'cross' language in discipleship
  chosen_reading: Retain the literal 'cross' rather than paraphrasing as suffering,
    burden, or sacrifice.
  alternative_readings:
  - his burden
  - the instrument of suffering/death assigned to him
  rationale: σταυρός is a concrete term and should remain 'cross.' While the phrase
    carries metaphorical implications for discipleship, the translation should not
    resolve or flatten that symbolism into a paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine in ἀρνησάσθω ... ἀράτω ... ἀκολουθείτω
  chosen_reading: Use 'anyone' for τις and retain singular masculine in the dependent
    imperatives as 'let him... himself.'
  alternative_readings:
  - let them deny themselves and take up their cross daily
  - must deny themselves
  rationale: The Greek begins with a generic indefinite singular and continues with
    grammatically masculine singular imperatives/reflexive forms. Per the gender-accurate
    policy, the English should reflect the source's singular representative force
    rather than flattening to plural.
  doctrine_reference: Translation philosophy §4
