id: LUK.9.23
reference: Luke 9:23
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ πρὸς πάντας· Εἴ τις θέλει ὀπίσω μου ⸂ἔρχεσθαι, ἀρνησάσθω⸃ ἑαυτὸν
    καὶ ἀράτω τὸν σταυρὸν αὐτοῦ ⸂καθ’ ἡμέραν⸃, καὶ ἀκολουθείτω μοι.
translation:
  text: And he was saying to all, “If anyone wants to come after me, let him deny
    himself and take up his cross daily, and follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “let them deny themselves and take up their cross daily and follow
      me.” The Greek uses a generic singular (“if anyone ... let him ... himself”),
      which is represented in the main text.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in context; 'was
    saying' preserves that aspect better than simple past 'said,' while remaining
    natural English.
- source_word: πρὸς πάντας
  chosen: to all
  alternatives:
  - to everyone
  lexicon: BDAG
  rationale: A straightforward rendering of the preposition plus accusative plural;
    'all' is concise and preserves the collective scope of Jesus' address.
- source_word: Εἴ τις θέλει
  chosen: If anyone wants
  alternatives:
  - If anyone desires
  - If someone wants
  lexicon: BDAG
  rationale: τις is indefinite and generic, well rendered by 'anyone.' θέλει denotes
    willing/wanting; 'wants' is idiomatic modern English without overstating volition.
- source_word: ὀπίσω μου ἔρχεσθαι
  chosen: to come after me
  alternatives:
  - to follow after me
  - to come behind me
  lexicon: BDAG
  rationale: This idiom expresses discipleship. 'Come after me' preserves the metaphor
    and avoids prematurely collapsing it into the later explicit verb 'follow.'
- source_word: ἀρνησάσθω ἑαυτὸν
  chosen: let him deny himself
  alternatives:
  - he must deny himself
  - let him renounce himself
  lexicon: BDAG
  rationale: The aorist middle imperative is naturally rendered as a third-person
    command, 'let him deny himself.' 'Deny' is the standard and sufficiently precise
    sense; 'renounce' is possible but less idiomatic here.
- source_word: ἀράτω
  chosen: take up
  alternatives:
  - pick up
  - carry
  lexicon: BDAG
  rationale: In context of σταυρός, 'take up' is the established and accurate idiom
    for assuming the burden/instrument associated with discipleship. 'Carry' would
    shift the verbal nuance from taking to bearing.
- source_word: τὸν σταυρὸν αὐτοῦ
  chosen: his cross
  alternatives:
  - his own cross
  lexicon: BDAG
  rationale: σταυρός is literally 'cross.' The possessive αὐτοῦ is adequately represented
    by 'his.' Adding 'own' is interpretive emphasis not required by the Greek.
- source_word: καθ’ ἡμέραν
  chosen: daily
  alternatives:
  - day by day
  - each day
  lexicon: BDAG
  rationale: The phrase means 'each day' or 'daily.' 'Daily' is concise, natural,
    and preserves Luke's distinctive emphasis on continual discipleship.
- source_word: ἀκολουθείτω μοι
  chosen: and follow me
  alternatives:
  - and let him follow me
  lexicon: BDAG
  rationale: A second third-person imperative coordinated with the previous commands.
    In English, 'and follow me' after 'let him deny... and take up...' reads naturally
    and still carries imperative force.
