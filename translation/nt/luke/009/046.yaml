id: LUK.9.46
reference: Luke 9:46
source:
  edition: SBLGNT
  text: Εἰσῆλθεν δὲ διαλογισμὸς ἐν αὐτοῖς, τὸ τίς ἂν εἴη μείζων αὐτῶν.
translation:
  text: Then a dispute arose among them as to which of them might be the greatest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reasoning' or 'a discussion arose among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσῆλθεν
  chosen: arose
  alternatives:
  - entered
  - came up
  lexicon: BDAG
  rationale: Literally 'entered,' but in English the idiom with διαλογισμός is better
    conveyed as a discussion or dispute 'arose' among them. This preserves the eventive
    sense without woodenly reproducing an unnatural expression.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: A mild connective marking narrative progression. 'Then' fits the flow
    in readable modern English.
- source_word: διαλογισμὸς
  chosen: dispute
  alternatives:
  - reasoning
  - discussion
  - argument
  lexicon: BDAG
  rationale: The noun can denote inward reasoning or a discussion/debate. In context,
    the content clause about who is greater suggests a competitive argument among
    the disciples, so 'dispute' best captures the interpersonal force.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  - within them
  lexicon: BDAG
  rationale: Though literally 'in them,' the plural personal referent in this context
    is idiomatically rendered 'among them,' indicating something taking place within
    the group.
- source_word: τὸ τίς ἂν εἴη
  chosen: as to which ... might be
  alternatives:
  - about who ... would be
  - concerning who ... was
  lexicon: BDAG
  rationale: The article with the indirect question introduces the content of the
    dispute. 'As to which ... might be' naturally renders the construction and preserves
    the potential nuance of ἄν with the optative.
- source_word: τίς
  chosen: which
  alternatives:
  - who
  lexicon: BDAG
  rationale: Because the comparison is within a defined group ('of them'), English
    idiom prefers 'which of them' rather than 'who of them,' while preserving the
    personal reference.
- source_word: ἂν εἴη
  chosen: might be
  alternatives:
  - would be
  - were
  lexicon: BDAG
  rationale: The combination of ἄν with the optative conveys potentiality in indirect
    discourse. 'Might be' reflects that nuance better than the flatter 'was' or the
    more deterministic 'would be.'
- source_word: μείζων
  chosen: the greatest
  alternatives:
  - greater
  - the greater one
  lexicon: BDAG
  rationale: Although the Greek comparative is literally 'greater,' English commonly
    uses the superlative in this idiom ('which of them might be the greatest'). This
    communicates the intended sense of rank within the group.
- source_word: αὐτῶν
  chosen: of them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: This genitive marks the group within which the comparison is made; 'of
    them' is the most direct rendering in the comparative construction.
