theological_decisions:
- issue: Nature of the disciples' interaction
  chosen_reading: dispute
  alternative_readings:
  - reasoning
  - discussion
  rationale: The verse does not present a doctrinally charged issue, but the choice
    affects tone. Given the competitive question of greatness, 'dispute' best reflects
    the likely interpersonal contention without overstating beyond the Greek.
