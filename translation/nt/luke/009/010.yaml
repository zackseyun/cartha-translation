theological_decisions:
- issue: Sense of κατ’ ἰδίαν in relation to the apostles accompanying Jesus
  chosen_reading: Rendered as 'by himself' in the sense of withdrawing apart from
    the public, not in absolute solitude.
  alternative_readings:
  - privately
  - apart
  rationale: The Greek phrase often means 'privately' or 'apart.' Since the text explicitly
    says Jesus took the apostles with him, the rendering must not imply he was entirely
    alone. The chosen English preserves the separation from the crowds while remaining
    readable.
  doctrine_reference: Translation philosophy §3, §6
