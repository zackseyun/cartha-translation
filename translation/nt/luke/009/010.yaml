id: LUK.9.10
reference: Luke 9:10
source:
  edition: SBLGNT
  text: Καὶ ὑποστρέψαντες οἱ ἀπόστολοι διηγήσαντο αὐτῷ ὅσα ἐποίησαν. καὶ παραλαβὼν
    αὐτοὺς ὑπεχώρησεν κατ’ ἰδίαν εἰς ⸂πόλιν καλουμένην Βηθσαϊδά⸃.
translation:
  text: And when the apostles returned, they reported to him what they had done. And
    taking them with him, he withdrew by himself to a town called Bethsaida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'privately' or 'apart.' The phrase indicates withdrawal from the crowds,
      not necessarily complete solitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποστρέψαντες
  chosen: when ... returned
  alternatives:
  - having returned
  - after returning
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; rendered temporally in natural
    English while preserving sequence.
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  - sent ones
  lexicon: BDAG
  rationale: In Luke this is a recognized designation for the Twelve in mission context;
    'apostles' is the standard and contextually precise rendering.
- source_word: διηγήσαντο
  chosen: reported
  alternatives:
  - told
  - recounted in detail
  - related
  lexicon: BDAG
  rationale: The verb can imply narrating or recounting; 'reported' fits the context
    of returning from mission and giving Jesus an account without overstating formality.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object referring to Jesus; straightforwardly rendered.
- source_word: ὅσα ἐποίησαν
  chosen: what they had done
  alternatives:
  - all that they had done
  - the things they had done
  lexicon: BDAG
  rationale: ὅσα denotes the things/whatever they did. English past perfect reflects
    prior action relative to their reporting.
- source_word: παραλαβὼν αὐτούς
  chosen: taking them with him
  alternatives:
  - taking them along
  - taking them
  lexicon: BDAG
  rationale: παραλαμβάνω here conveys taking companions along. 'With him' makes the
    relational sense explicit and natural in English.
- source_word: ὑπεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - retreated
  - went away
  lexicon: BDAG
  rationale: Commonly used for withdrawing from crowds or public activity; 'withdrew'
    preserves that nuance better than the more neutral 'departed'.
- source_word: κατ’ ἰδίαν
  chosen: by himself
  alternatives:
  - privately
  - in private
  - apart
  lexicon: BDAG
  rationale: The phrase means privately/apart. Because Jesus takes the apostles with
    him, 'by himself' here is idiomatic for withdrawing separately from others, not
    absolute solitude; this preserves the contrast with the crowds.
- source_word: πόλιν καλουμένην Βηθσαϊδά
  chosen: to a town called Bethsaida
  alternatives:
  - to a city called Bethsaida
  lexicon: BDAG
  rationale: πόλις can mean city or town. 'Town' is more natural and avoids overstating
    size in English, while still accurately denoting an inhabited place. The participle
    καλουμένην is naturally rendered 'called.'
- source_word: Βηθσαϊδά
  chosen: Bethsaida
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
