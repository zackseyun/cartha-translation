id: LUK.9.39
reference: Luke 9:39
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ πνεῦμα λαμβάνει αὐτόν, καὶ ἐξαίφνης κράζει, καὶ σπαράσσει αὐτὸν μετὰ
    ἀφροῦ καὶ ⸀μόγις ἀποχωρεῖ ἀπ’ αὐτοῦ συντρῖβον αὐτόν·
translation:
  text: and look, a spirit seizes him, and suddenly he cries out, and it convulses
    him with foaming, and it scarcely departs from him, crushing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an evil spirit' or 'a demon'; the Greek here says simply 'a spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  lexicon: BDAG
  rationale: Rendered as the discourse marker 'look' to preserve the vividness of
    the father's description in natural modern English. 'Behold' is more traditional
    but too archaic for the stated philosophy.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - an evil spirit
  - a demon
  lexicon: BDAG
  rationale: The Greek says only 'spirit' here, without an explicit adjective such
    as 'unclean' or the noun 'demon.' The broader context implies a hostile spirit,
    but the translation avoids importing a more specific term than the text states.
- source_word: λαμβάνει
  chosen: seizes
  alternatives:
  - takes
  - grasps
  lexicon: BDAG
  rationale: In context of spirit possession/attack, 'seizes' best conveys sudden
    overpowering control, more idiomatic and forceful than the overly general 'takes.'
- source_word: ἐξαίφνης
  chosen: suddenly
  alternatives:
  - at once
  - unexpectedly
  lexicon: BDAG
  rationale: Standard adverbial rendering conveying abrupt onset.
- source_word: κράζει
  chosen: he cries out
  alternatives:
  - it makes him cry out
  - he screams
  lexicon: BDAG
  rationale: The Greek verb is active with the boy as understood subject from the
    father's description after the spirit seizes him. English can naturally render
    the result as 'he cries out.' 'It makes him cry out' is interpretive and more
    explicit than the Greek syntax requires; 'screams' is possible but slightly more
    specific.
- source_word: σπαράσσει
  chosen: it convulses him
  alternatives:
  - it tears him
  - it throws him into convulsions
  lexicon: BDAG
  rationale: In this medical/demonic-affliction context, 'convulses' communicates
    the bodily effect clearly in modern English. 'Tears' is more literal but less
    clear to contemporary readers.
- source_word: μετὰ ἀφροῦ
  chosen: with foaming
  alternatives:
  - with foam
  - so that he foams
  lexicon: BDAG
  rationale: This compact phrase naturally modifies the convulsing, indicating foaming
    accompanies the episode. 'With foaming' is concise and idiomatic.
- source_word: μόγις
  chosen: scarcely
  alternatives:
  - hardly
  - with difficulty
  lexicon: BDAG
  rationale: Conveys that the spirit leaves only reluctantly or rarely. 'Scarcely'
    preserves the adverb's force with a slightly more formal precision than 'hardly.'
- source_word: ἀποχωρεῖ ἀπ’ αὐτοῦ
  chosen: departs from him
  alternatives:
  - leaves him
  - goes away from him
  lexicon: BDAG
  rationale: '''Departs from him'' preserves the verbal sense while fitting the subject
    ''spirit.'' ''Leaves him'' is also good but slightly less vivid.'
- source_word: συντρῖβον αὐτόν
  chosen: crushing him
  alternatives:
  - bruising him badly
  - shattering him
  lexicon: BDAG
  rationale: The participle denotes severe damaging action accompanying departure.
    'Crushing him' preserves the violence without over-specifying physical injury.
    'Bruising him badly' is interpretive; 'shattering' may sound too absolute in English.
