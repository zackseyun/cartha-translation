theological_decisions:
- issue: Whether to identify πνεῦμα explicitly as demonic in the main text
  chosen_reading: a spirit
  alternative_readings:
  - an evil spirit
  - a demon
  rationale: Although the larger narrative context indicates a hostile supernatural
    being, this verse itself uses the less specific term πνεῦμα. Following original-language
    primacy, the translation retains the lexical level of the Greek rather than harmonizing
    to a more explicit label.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §3 (Preserve theological tension rather than resolve it)
