id: LUK.9.6
reference: Luke 9:6
source:
  edition: SBLGNT
  text: ἐξερχόμενοι δὲ διήρχοντο κατὰ τὰς κώμας εὐαγγελιζόμενοι καὶ θεραπεύοντες πανταχοῦ.
translation:
  text: So they went out and traveled through the villages, proclaiming the good news
    and healing everywhere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from village to village.' The Greek expression can emphasize movement
      among the villages distributively.
    reason: lexical_alternative
  - marker: b
    text: Or 'preaching the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξερχόμενοι
  chosen: went out
  alternatives:
  - departing
  - going out
  lexicon: BDAG
  rationale: Aoristic/sequential participle introducing the action after Jesus' commissioning;
    'went out' is natural modern English and preserves the sense of setting out from
    their prior location.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: δέ here marks narrative continuation with mild progression. 'So' captures
    the consequential flow from the previous verse in readable English better than
    a bare 'and'.
- source_word: διήρχοντο
  chosen: traveled through
  alternatives:
  - went through
  - passed through
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing movement from place to place.
    'Traveled through' conveys iterative progress through multiple locations more
    idiomatically than 'passed through'.
- source_word: κατὰ τὰς κώμας
  chosen: through the villages
  alternatives:
  - from village to village
  - throughout the villages
  lexicon: BDAG
  rationale: κατά with the accusative here is distributive/spatial, indicating movement
    among the villages. 'Through the villages' is concise and fits the travel sense
    of διήρχοντο; 'from village to village' is a plausible dynamic alternative.
- source_word: εὐαγγελιζόμενοι
  chosen: proclaiming the good news
  alternatives:
  - preaching the gospel
  - announcing good news
  lexicon: BDAG
  rationale: The participle denotes gospel proclamation. 'Proclaiming the good news'
    is clear modern English and avoids unnecessary ecclesiastical jargon while preserving
    the evangelistic sense.
- source_word: θεραπεύοντες
  chosen: healing
  alternatives:
  - curing
  lexicon: BDAG
  rationale: θεραπεύω in this context refers to physical healing accompanying the
    disciples' ministry. 'Healing' is the most natural and broad rendering.
- source_word: πανταχοῦ
  chosen: everywhere
  alternatives:
  - in every place
  - throughout
  lexicon: BDAG
  rationale: The adverb emphasizes the widespread extent of their ministry activity.
    'Everywhere' is direct and idiomatic.
