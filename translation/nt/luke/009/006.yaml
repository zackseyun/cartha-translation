theological_decisions:
- issue: Nature of εὐαγγελιζόμενοι in apostolic mission
  chosen_reading: proclaiming the good news
  alternative_readings:
  - preaching the gospel
  rationale: The verse describes the disciples' proclamation without specifying a
    later fully developed technical sense of 'gospel' terminology. The chosen rendering
    preserves the evangelistic content while remaining accessible and not importing
    later doctrinal formulation beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
