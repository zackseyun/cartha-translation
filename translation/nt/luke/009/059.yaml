id: LUK.9.59
reference: Luke 9:59
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς ἕτερον· Ἀκολούθει μοι. ὁ δὲ εἶπεν· ⸀Κύριε, ἐπίτρεψόν μοι ⸂ἀπελθόντι
    πρῶτον⸃ θάψαι τὸν πατέρα μου.
translation:
  text: Then he said to another, “Follow me.” But he said, “Lord, permit me first
    to go and bury my father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “allow me to go first and bury my father.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  chosen: another
  alternatives:
  - someone else
  - a different person
  lexicon: BDAG
  rationale: ἕτερος commonly means 'another' or 'other' with a sense of distinctness.
    'Another' is natural English here and preserves the narrative sense without over-specifying.
- source_word: Ἀκολούθει
  chosen: Follow
  alternatives:
  - Come after
  - Keep following
  lexicon: BDAG
  rationale: Present imperative of ἀκολουθέω is idiomatically rendered 'Follow.' English
    does not need to mark the imperfective force explicitly here; 'keep following'
    would over-interpret.
- source_word: μοι
  chosen: me
  lexicon: BDAG
  rationale: 'Dative pronoun after ἀκολουθέω is naturally rendered in English as the
    object of ''follow'': ''follow me.'''
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - Sir
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus this preserves both respect and the title's theological resonance, while
    'Sir' or 'Master' would under-translate the established NT usage.
- source_word: ἐπίτρεψόν
  chosen: permit
  alternatives:
  - allow
  - let
  lexicon: BDAG
  rationale: Aorist imperative of ἐπιτρέπω requests permission. 'Permit' is slightly
    more formal and fits the respectful address; 'allow' would also be possible. 'Let
    me' is smoother but less transparent to the lexical form.
- source_word: ἀπελθόντι πρῶτον
  chosen: first to go
  alternatives:
  - to go first
  - first, after going
  lexicon: BDAG
  rationale: 'The participle ἀπελθόντι with πρῶτον expresses prior action relative
    to the infinitive θάψαι. ''First to go'' gives clear modern English while preserving
    the sequence: he asks to go away first and then bury his father.'
- source_word: θάψαι
  chosen: bury
  alternatives:
  - conduct the burial for
  - inter
  lexicon: BDAG
  rationale: The infinitive θάψαι straightforwardly means 'to bury.' 'Bury' is the
    plain and sufficient English equivalent.
- source_word: τὸν πατέρα μου
  chosen: my father
  lexicon: BDAG
  rationale: Direct and literal rendering of the accusative object with possessive
    pronoun.
