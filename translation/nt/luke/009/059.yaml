theological_decisions:
- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  - Sir
  rationale: The project default for κύριος is 'Lord.' In Luke's narrative this title
    can carry both respectful address and christological weight; rendering it 'Lord'
    preserves that tension rather than flattening it to a merely social honorific.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological
    tension rather than resolve it.'
