id: LUK.9.49
reference: Luke 9:49
source:
  edition: SBLGNT
  text: Ἀποκριθεὶς ⸀δὲ Ἰωάννης εἶπεν· Ἐπιστάτα, εἴδομέν τινα ⸀ἐν τῷ ὀνόματί σου ἐκβάλλοντα
    δαιμόνια, καὶ ⸀ἐκωλύομεν αὐτὸν ὅτι οὐκ ἀκολουθεῖ μεθ’ ἡμῶν.
translation:
  text: Then John answered, “Master, we saw someone casting out demons in your name,
    and we tried to stop him because he does not follow with us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because he does not follow us.' The Greek more literally says 'with
      us,' which may emphasize that he was not part of the disciples' company.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  chosen: Then ... answered
  alternatives:
  - And ... answered
  - But ... answered
  lexicon: BDAG
  rationale: ἀποκριθεὶς with δέ is a common narrative transition. 'Then ... answered'
    gives natural English while preserving the responsive sense and forward movement
    of the discourse.
- source_word: Ἐπιστάτα
  chosen: Master
  alternatives:
  - Teacher
  - Chief
  lexicon: BDAG
  rationale: In Luke, ἐπιστάτης is a distinctive address to Jesus by disciples, conveying
    authority and leadership more than didactic function alone. 'Master' best fits
    Luke's usage and standard English idiom here.
- source_word: εἴδομέν τινα
  chosen: we saw someone
  alternatives:
  - we saw a certain man
  - we noticed someone
  lexicon: BDAG
  rationale: τινα is indefinite, not specifying gender beyond grammatical form in
    a way that requires 'man' in English. 'Someone' is the most natural equivalent.
- source_word: ἐν τῷ ὀνόματί σου
  chosen: in your name
  alternatives:
  - by your name
  - using your name
  lexicon: BDAG
  rationale: This idiom denotes acting on the basis of or under the authority of Jesus'
    name. 'In your name' is both accurate and idiomatic, while preserving the theological
    weight of the phrase.
- source_word: ἐκβάλλοντα δαιμόνια
  chosen: casting out demons
  alternatives:
  - driving out demons
  - expelling demons
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts is commonly rendered 'cast out' or 'drive
    out.' 'Casting out demons' preserves familiar biblical diction without sounding
    archaic.
- source_word: ἐκωλύομεν
  chosen: we tried to stop him
  alternatives:
  - we were stopping him
  - we hindered him
  - we forbade him
  lexicon: BDAG
  rationale: The imperfect indicates attempted or ongoing action in past time. 'We
    tried to stop him' captures the imperfective nuance better than a simple past
    'we stopped him' and is clearer than 'forbade' in modern English.
- source_word: ὅτι οὐκ ἀκολουθεῖ μεθ’ ἡμῶν
  chosen: because he does not follow with us
  alternatives:
  - because he is not following us
  - because he does not accompany us
  lexicon: BDAG
  rationale: ἀκολουθέω means 'follow,' and μετά with the genitive here is 'with us,'
    not merely 'after us.' The wording preserves that the complaint is about not joining
    the disciples' company, not necessarily refusal to follow Jesus at all.
