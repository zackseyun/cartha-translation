theological_decisions:
- issue: Potential ambiguity in the complaint about discipleship allegiance
  chosen_reading: Render the phrase as 'he does not follow with us' rather than 'he
    does not follow us.'
  alternative_readings:
  - he does not follow us
  rationale: The Greek μεθ’ ἡμῶν explicitly includes 'with us.' This avoids implying
    that the man was rejecting Jesus himself; the complaint is that he was not part
    of the disciples' group. This preserves the narrative's theological tension without
    overstating sectarian exclusivity.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
