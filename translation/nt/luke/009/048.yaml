id: LUK.9.48
reference: Luke 9:48
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Ὃς ⸀ἂν δέξηται τοῦτο τὸ παιδίον ἐπὶ τῷ ὀνόματί μου ἐμὲ δέχεται,
    καὶ ὃς ⸁ἂν ἐμὲ δέξηται δέχεται τὸν ἀποστείλαντά με· ὁ γὰρ μικρότερος ἐν πᾶσιν
    ὑμῖν ὑπάρχων οὗτός ⸀ἐστιν μέγας.
translation:
  text: And he said to them, “Whoever receives this child in my name receives me,
    and whoever receives me receives the one who sent me. For the one who is least
    among all of you—this one is great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “welcomes” for “receives” throughout the verse; the Greek verb can carry
      both acceptance and hospitality.
    reason: lexical_alternative
  - marker: b
    text: “In my name” can also mean “on the basis of my name” or “because of my name,”
      implying reception in relation to Jesus’ authority and allegiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέξηται / δέχεται
  chosen: receives
  alternatives:
  - welcomes
  - accepts
  lexicon: BDAG
  rationale: δέχομαι can mean receive, welcome, or accept. 'Receives' preserves the
    repeated verbal linkage in the saying and keeps both hospitable and representative
    senses without over-paraphrasing.
- source_word: παιδίον
  chosen: child
  alternatives:
  - little child
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'child' is the plain sense. 'Little child' is
    possible from context, but the diminutive nuance is not required in English here.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - because of my name
  lexicon: BDAG
  rationale: The phrase indicates reception in relation to Jesus' name, authority,
    or allegiance. 'In my name' is the most natural English equivalent and preserves
    the representative/authority nuance without narrowing it.
- source_word: τὸν ἀποστείλαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The articular participle is best rendered as a substantive phrase. 'The
    one who sent me' is clear modern English and preserves the personal referent without
    importing a title.
- source_word: μικρότερος
  chosen: least
  alternatives:
  - smaller
  - lesser
  - youngest
  lexicon: BDAG
  rationale: Although literally comparative ('smaller/lesser'), in this social-status
    context 'least' best conveys humble rank rather than physical size or age.
- source_word: ἐν πᾶσιν ὑμῖν
  chosen: among all of you
  alternatives:
  - among you all
  - in all of you
  lexicon: BDAG
  rationale: The phrase is distributive/social, referring to position within the group.
    'Among all of you' communicates this clearly in idiomatic English.
- source_word: ὑπάρχων
  chosen: who is
  alternatives:
  - being
  - existing as
  lexicon: BDAG
  rationale: The participle functions predicatively with μικρότερος. English naturally
    renders it with a relative clause, avoiding wooden phrasing.
- source_word: οὗτός ἐστιν μέγας
  chosen: this one is great
  alternatives:
  - he is great
  - that one is great
  lexicon: BDAG
  rationale: οὗτος is emphatic. 'This one is great' preserves the demonstrative emphasis
    better than a simple pronoun, while remaining readable.
- source_word: Ὃς ἂν ... καὶ ὃς ἂν
  chosen: Whoever ... and whoever
  alternatives:
  - Anyone who ... and anyone who
  lexicon: BDAG
  rationale: The relative clause with ἄν expresses an indefinite general condition.
    'Whoever' is concise and idiomatic.
- source_word: καὶ εἶπεν αὐτοῖς
  chosen: And he said to them
  alternatives:
  - Then he said to them
  lexicon: BDAG
  rationale: A straightforward narrative introduction. 'And' reflects καί without
    adding temporal nuance not explicit in the Greek.
