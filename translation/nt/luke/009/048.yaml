theological_decisions:
- issue: Referent of 'the one who sent me'
  chosen_reading: An implicit reference to the Father/God is preserved without making
    it more explicit in the translation.
  alternative_readings:
  - the Father who sent me
  - God who sent me
  rationale: The Greek uses an articular participle rather than naming the Father
    directly. The translation should preserve the relational claim of Jesus' mission
    without expanding the wording beyond the text.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Meaning of receiving a child 'in my name'
  chosen_reading: Reception is framed in relation to Jesus' name/authority/representation,
    not merely personal kindness.
  alternative_readings:
  - because the child belongs to me
  - for my sake
  rationale: The phrase carries representative and authority-laden force. 'In my name'
    preserves that theological breadth and avoids reducing the saying to generic hospitality.
  doctrine_reference: Translation philosophy 1 and 3
- issue: Paradox of greatness
  chosen_reading: Greatness is defined by lowliness within the community, rendered
    without softening the reversal.
  alternative_readings:
  - the youngest among you all is great
  rationale: μικρότερος here is best understood in terms of humble status rather than
    age alone. The translation preserves Jesus' ethical-theological reversal without
    importing later doctrinal formulations.
  doctrine_reference: Translation philosophy 1 and 6
