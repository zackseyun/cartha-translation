theological_decisions:
- issue: Rendering of demonic affliction language
  chosen_reading: Translate both δαιμόνιον and πνεῦμα ἀκάθαρτον straightforwardly
    as personal evil-spirit terminology ('demon,' 'unclean spirit').
  alternative_readings:
  - Render more generically as 'evil force' or 'mental affliction'
  rationale: The Greek text presents a personal demonic agent and then identifies
    it as an unclean spirit. Historic orthodox doctrine affirms the reality of personal
    spiritual beings, and the translation should not naturalize the text into a merely
    impersonal condition. At the same time, the verse also states that Jesus healed
    the boy, so both exorcistic and healing dimensions are preserved.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
