id: LUK.9.4
reference: Luke 9:4
source:
  edition: SBLGNT
  text: καὶ εἰς ἣν ἂν οἰκίαν εἰσέλθητε, ἐκεῖ μένετε καὶ ἐκεῖθεν ἐξέρχεσθε.
translation:
  text: And whatever house you enter, stay there, and leave from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any house you enter.' The Greek indefinite relative construction conveys
      a general instruction.
    reason: lexical_alternative
  - marker: b
    text: That is, remain in the same lodging until you depart, rather than moving
      from house to house.
    reason: cultural_note
lexical_decisions:
- source_word: εἰς ἣν ἂν οἰκίαν
  chosen: whatever house
  alternatives:
  - any house
  - the house that
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν gives an indefinite/general sense: ''whatever
    house'' or ''any house.'' ''Whatever house'' preserves the open-ended force naturally
    in English.'
- source_word: εἰσέλθητε
  chosen: you enter
  alternatives:
  - you go into
  - you come into
  lexicon: BDAG
  rationale: Aorist subjunctive after ἄν in an indefinite relative clause refers to
    whichever house the disciples may enter. 'Enter' is concise and idiomatic.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that house
  - in that place
  lexicon: BDAG
  rationale: The adverb points back to the house just mentioned. 'There' is the most
    natural English equivalent and avoids unnecessary repetition.
- source_word: μένετε
  chosen: stay
  alternatives:
  - remain
  - keep staying
  lexicon: BDAG
  rationale: Present imperative calls for continued action. 'Stay' is clear modern
    English; the durative force is adequately conveyed in context without a more cumbersome
    form.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that house
  - from that place
  lexicon: BDAG
  rationale: The adverb means 'from there,' referring to the same lodging place. This
    preserves the spatial linkage in the Greek.
- source_word: ἐξέρχεσθε
  chosen: leave
  alternatives:
  - depart
  - go out
  lexicon: BDAG
  rationale: Present middle/passive-form imperative here functions deponently with
    active sense. 'Leave' is idiomatic in English and fits the instruction about departing
    from the same house where they stayed.
