theological_decisions:
- issue: Interpretive force of the lodging instruction
  chosen_reading: A practical command to remain in the same house until departure
    from that locality
  alternative_readings:
  - A narrower command only about physically exiting the house
  rationale: The sequence 'stay there, and leave from there' in context naturally
    instructs the disciples not to move from house to house seeking better accommodations.
    The translation keeps the wording close to the Greek while allowing the contextual
    sense to stand without over-paraphrase.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
