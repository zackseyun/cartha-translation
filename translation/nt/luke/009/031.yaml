id: LUK.9.31
reference: Luke 9:31
source:
  edition: SBLGNT
  text: οἳ ὀφθέντες ἐν δόξῃ ἔλεγον τὴν ἔξοδον αὐτοῦ ἣν ἤμελλεν πληροῦν ἐν Ἰερουσαλήμ.
translation:
  text: who, appearing in glory, were speaking about his departure, which he was about
    to fulfill in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his exodus.' The Greek term can mean 'departure' and may allude to the
      Exodus pattern while referring to what Jesus was to accomplish in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθέντες
  chosen: appearing
  alternatives:
  - having appeared
  - being seen
  lexicon: BDAG
  rationale: Aorist passive participle of ὁράω used in an intransitive/passive sense
    ('appeared'/'were seen'). 'Appearing' gives smooth English while preserving the
    participial connection to the main verb.
- source_word: ἐν δόξῃ
  chosen: in glory
  alternatives:
  - in splendor
  - gloriously
  lexicon: BDAG
  rationale: Retains the noun δόξα rather than converting it to an adverb. 'In glory'
    preserves the theological resonance of visible heavenly majesty in the transfiguration
    context.
- source_word: ἔλεγον
  chosen: were speaking
  alternatives:
  - were saying
  - kept talking
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing discourse. 'Were speaking' conveys continued
    conversation more naturally than simple 'said.'
- source_word: ἔξοδον
  chosen: departure
  alternatives:
  - exodus
  - death
  - departure from this life
  lexicon: BDAG
  rationale: The noun can denote 'departure' and likely alludes to Jesus' coming death,
    resurrection, and ascension. 'Departure' preserves the lexical sense without over-narrowing
    it to death alone; the more literal 'exodus' is important as an allusive alternative
    and is preserved in a footnote.
- source_word: ἤμελλεν
  chosen: was about to
  alternatives:
  - was going to
  - was destined to
  lexicon: BDAG
  rationale: μέλλω indicates imminence or intended future action. 'Was about to' is
    a natural rendering that preserves prospective force without importing a stronger
    notion of fate.
- source_word: πληροῦν
  chosen: fulfill
  alternatives:
  - accomplish
  - complete
  lexicon: BDAG
  rationale: πληρόω here carries the sense of bringing to fulfillment or completion.
    'Fulfill' preserves possible scriptural/theological overtones while remaining
    idiomatic in English.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Standard locative rendering of ἐν with a place name; 'in Jerusalem' is
    idiomatic modern English.
