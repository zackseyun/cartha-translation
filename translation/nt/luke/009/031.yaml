theological_decisions:
- issue: Scope of 'his departure' (ἔξοδος αὐτοῦ)
  chosen_reading: Rendered broadly as 'his departure' rather than narrowly as 'his
    death.'
  alternative_readings:
  - his death
  - his exodus
  rationale: The term likely includes Jesus' death and may also evoke a larger salvific
    departure motif. Using 'departure' preserves the text's breadth and possible allusion
    without collapsing it into a single doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
