id: LUK.9.55
reference: Luke 9:55
source:
  edition: SBLGNT
  text: στραφεὶς δὲ ἐπετίμησεν ⸀αὐτοῖς.
translation:
  text: But he turned and rebuked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some later manuscripts add: ''and said, “You do not know what sort of spirit
      you are of; for the Son of Man did not come to destroy people''s lives but to
      save them.”'''
    reason: textual_variant
lexical_decisions:
- source_word: στραφεὶς
  chosen: turned
  alternatives:
  - turned around
  - having turned
  lexicon: BDAG
  rationale: Aorist participle of στρέφω, here describing Jesus' physical reorientation
    toward the disciples before speaking. 'Turned' is natural modern English and preserves
    the participial sense without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or narrative development. 'But' fits the immediate
    contrast with the disciples' prior request and is idiomatic in English narrative.
- source_word: ἐπετίμησεν
  chosen: rebuked
  alternatives:
  - warned
  - censured
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means to rebuke or reprimand sharply. 'Rebuked' is
    the standard and best contextual rendering here, conveying verbal correction without
    overtranslation.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to James and John or the disciples addressed
    in context. English idiom with 'rebuke' normally takes a direct object ('rebuked
    them'), though the Greek uses the dative.
