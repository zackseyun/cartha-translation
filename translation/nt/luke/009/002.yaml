id: LUK.9.2
reference: Luke 9:2
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν αὐτοὺς κηρύσσειν τὴν βασιλείαν τοῦ θεοῦ καὶ ἰᾶσθαι ⸂τοὺς ἀσθενεῖς⸃,
translation:
  text: And he sent them out to proclaim the kingdom of God and to heal the sick,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the reign of God."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent ... out
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Aorist of ἀποστέλλω means 'send' or 'send out.' 'Sent them out' captures
    the commissioning nuance in context without overtranslating.
- source_word: κηρύσσειν
  chosen: to proclaim
  alternatives:
  - to preach
  - to announce
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaim' is clear modern English
    and preserves the heraldic force better than the more church-coded 'preach'.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and most transparent rendering. 'Kingdom' preserves
    the established biblical concept; 'reign' is possible but narrower and less idiomatic
    here.
- source_word: ἰᾶσθαι
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: ἰάομαι commonly means to heal, especially in contexts of bodily restoration.
    'Heal' is the natural English equivalent.
- source_word: τοὺς ἀσθενεῖς
  chosen: the sick
  alternatives:
  - the weak
  - the infirm
  lexicon: BDAG
  rationale: Although ἀσθενής can mean 'weak' more broadly, in this healing context
    it refers to those who are ill. 'The sick' best matches the contextual sense and
    reads naturally in English.
