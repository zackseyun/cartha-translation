theological_decisions:
- issue: Nature of βασιλεία τοῦ θεοῦ
  chosen_reading: the kingdom of God
  alternative_readings:
  - the reign of God
  rationale: The phrase can emphasize either realm or rule, but the traditional and
    contextually adequate rendering 'kingdom of God' preserves the theological breadth
    without narrowing the concept. No doctrinal tension requires a footnote here,
    but the lexical alternative is noted.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
