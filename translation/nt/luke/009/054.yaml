id: LUK.9.54
reference: Luke 9:54
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ ⸀μαθηταὶ Ἰάκωβος καὶ Ἰωάννης εἶπαν· Κύριε, θέλεις εἴπωμεν πῦρ
    καταβῆναι ἀπὸ τοῦ οὐρανοῦ καὶ ἀναλῶσαι ⸀αὐτούς;
translation:
  text: When the disciples James and John saw this, they said, “Lord, do you want
    us to tell fire to come down from heaven and consume them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'call down fire from heaven and destroy them.' The Greek says literally,
      'say fire to come down from heaven and consume them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: saw this
  alternatives:
  - seeing
  - when they saw
  lexicon: BDAG
  rationale: 'Aorist participle is rendered temporally in natural English: ''When
    ... saw this.'' ''This'' is supplied from context to make the participle''s object
    explicit in English, referring to the Samaritan refusal in the preceding verse.'
- source_word: δὲ
  chosen: when
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Though δέ often marks simple transition, in combination with the participle
    ἰδόντες it is best absorbed into the temporal clause in English rather than translated
    woodenly.
- source_word: οἱ μαθηταὶ Ἰάκωβος καὶ Ἰωάννης
  chosen: the disciples James and John
  alternatives:
  - his disciples James and John
  - James and John, the disciples
  lexicon: BDAG
  rationale: The appositional construction identifies which disciples are in view.
    'The disciples James and John' preserves that they are disciples while naming
    them directly.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In direct address to
    Jesus here, 'Lord' is the standard and contextually fitting title.
- source_word: θέλεις
  chosen: do you want
  alternatives:
  - do you wish
  - are you willing
  lexicon: BDAG
  rationale: θέλω here expresses desire/intention. 'Do you want' is clear modern English
    and fits the disciples' request for authorization.
- source_word: εἴπωμεν
  chosen: us to tell
  alternatives:
  - that we should say
  - for us to say
  - us to command
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive after θέλεις is idiomatically
    rendered as an infinitival complement in English. 'Tell' is chosen rather than
    'command' because the verb itself is λέγω, not an explicit command verb; the force
    of command is implied by the content.
- source_word: πῦρ καταβῆναι ἀπὸ τοῦ οὐρανοῦ
  chosen: fire to come down from heaven
  alternatives:
  - fire to descend from heaven
  - fire from heaven to come down
  lexicon: BDAG
  rationale: This preserves the vivid imagery and allusion to prophetic judgment language
    while using natural English word order.
- source_word: ἀναλῶσαι
  chosen: consume
  alternatives:
  - destroy
  - burn up
  lexicon: BDAG
  rationale: ἀναλίσκω can mean consume or destroy. 'Consume' preserves the fire imagery
    more directly than the more general 'destroy.'
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward plural object referring to the Samaritan villagers.
