theological_decisions:
- issue: Implied object of 'saw'
  chosen_reading: Added 'this' in English to refer to the Samaritan rejection in the
    previous verse.
  alternative_readings:
  - When James and John saw
  - Seeing
  rationale: The Greek participle lacks an explicit object, but English normally requires
    one or a more awkward absolute construction. Supplying 'this' clarifies the narrative
    connection without adding new content.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
- issue: Force of the disciples' proposal
  chosen_reading: Rendered εἴπωμεν as 'tell fire to come down' rather than 'command
    fire to come down.'
  alternative_readings:
  - command fire to come down
  - call down fire from heaven
  rationale: The Greek uses λέγω ('say/tell'), not a stronger command verb. 'Tell
    fire to come down' preserves the wording while still conveying the disciples'
    intent to invoke judgment.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
