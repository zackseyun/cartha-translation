theological_decisions:
- issue: Apparent tension between Jesus praying 'alone' and the disciples being 'with
    him'
  chosen_reading: 'Render both clauses straightforwardly without harmonizing: Jesus
    was praying alone, and the disciples were with him.'
  alternative_readings:
  - Interpret κατὰ μόνας as 'in private' and smooth the sentence to imply only relative
    seclusion
  - Paraphrase to resolve the tension by stating the disciples were nearby
  rationale: 'The Greek preserves a narrative tension or nuance: Jesus is in solitary
    prayer, yet the disciples are present with him. In keeping with the translation
    philosophy, the rendering preserves that tension rather than resolving it by paraphrase.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
