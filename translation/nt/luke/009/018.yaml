id: LUK.9.18
reference: Luke 9:18
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ εἶναι αὐτὸν προσευχόμενον κατὰ μόνας συνῆσαν αὐτῷ οἱ μαθηταί,
    καὶ ἐπηρώτησεν αὐτοὺς λέγων· Τίνα με ⸂οἱ ὄχλοι λέγουσιν⸃ εἶναι;
translation:
  text: And it happened that while he was praying alone, the disciples were with him,
    and he asked them, saying, “Who do the crowds say that I am?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in private' for 'alone' (κατὰ μόνας). The phrase can denote seclusion
      rather than absolute physical solitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Common Lukan narrative formula; rendered in natural modern English while
    preserving the discourse-marking function.
- source_word: ἐν τῷ εἶναι αὐτὸν προσευχόμενον
  chosen: while he was praying
  alternatives:
  - as he was praying
  - when he was praying
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous circumstance;
    English 'while he was praying' captures the temporal sense idiomatically.
- source_word: κατὰ μόνας
  chosen: alone
  alternatives:
  - by himself
  - in private
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'alone' or 'in private.' 'Alone' is concise
    and fits the immediate context of Jesus praying.
- source_word: συνῆσαν αὐτῷ οἱ μαθηταί
  chosen: the disciples were with him
  alternatives:
  - his disciples were with him
  - the disciples joined him
  lexicon: BDAG
  rationale: Although Jesus is described as praying alone, the phrase indicates the
    disciples were present with him, likely nearby rather than participating in the
    solitude of prayer. 'Were with him' best preserves the simple relational sense
    without overinterpreting.
- source_word: ἐπηρώτησεν
  chosen: he asked
  alternatives:
  - he questioned
  - he inquired of
  lexicon: BDAG
  rationale: Standard verb for asking a question; 'asked' is the most natural modern
    equivalent.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retained as a participial speech introducer in smooth English, matching
    the Greek structure without awkwardness.
- source_word: Τίνα με ... εἶναι
  chosen: Who ... say that I am
  alternatives:
  - Who ... say me to be
  lexicon: BDAG
  rationale: English requires an idiomatic complement clause; 'say that I am' accurately
    conveys the indirect-question construction.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the people
  - the multitudes
  lexicon: BDAG
  rationale: ὄχλοι refers to gathered masses or crowds. 'The crowds' is natural, specific,
    and avoids flattening the social scene into the more generic 'people'.
