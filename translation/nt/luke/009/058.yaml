theological_decisions:
- issue: Rendering of Jesus' self-designation υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: In keeping with the translation philosophy, titles are translated, and
    this expression is preserved in its historically recognized form rather than recast
    into a more interpretive contemporary equivalent. This maintains both the literal
    wording and possible messianic/apocalyptic resonance without over-explaining it
    in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
