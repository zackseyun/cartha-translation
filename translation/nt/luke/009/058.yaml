id: LUK.9.58
reference: Luke 9:58
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ ὁ Ἰησοῦς· Αἱ ἀλώπεκες φωλεοὺς ἔχουσιν καὶ τὰ πετεινὰ τοῦ οὐρανοῦ
    κατασκηνώσεις, ὁ δὲ υἱὸς τοῦ ἀνθρώπου οὐκ ἔχει ποῦ τὴν κεφαλὴν κλίνῃ.
translation:
  text: And Jesus said to him, “Foxes have dens, and the birds of the sky have nests,
    but the Son of Man has nowhere to lay his head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holes' for 'dens.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the birds of heaven'; traditional English often has 'the birds
      of the air.'
    reason: lexical_alternative
  - marker: c
    text: '''Son of Man'' is Jesus'' self-designation and may echo Daniel 7:13–14.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀλώπεκες
  chosen: foxes
  lexicon: BDAG
  rationale: Straightforward animal term; no contextual reason to generalize or paraphrase.
- source_word: φωλεοὺς
  chosen: dens
  alternatives:
  - holes
  lexicon: BDAG
  rationale: Refers to animal lairs or dens. 'Dens' is more idiomatic for foxes in
    contemporary English, while 'holes' preserves traditional wording; the sense is
    unchanged.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: Literally 'the birds of the heaven/sky.' 'Of the sky' is clear modern
    English and stays close to the Greek genitive. Traditional 'of the air' is possible
    but less directly tied to οὐρανός.
- source_word: κατασκηνώσεις
  chosen: nests
  alternatives:
  - roosting places
  - lodgings
  lexicon: BDAG
  rationale: The noun denotes places of settling or lodging; in this bird context,
    'nests' is the most natural and contextually appropriate English rendering.
- source_word: υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and a recognized title with possible
    Danielic resonance. It should be translated, not paraphrased, and preserved in
    its established form.
- source_word: ποῦ
  chosen: nowhere
  alternatives:
  - no place where
  lexicon: BDAG
  rationale: Although literally 'where,' the negated idiom οὐκ ἔχει ποῦ naturally
    means 'has nowhere.' This is an idiomatic but faithful rendering.
- source_word: κλίνῃ τὴν κεφαλήν
  chosen: to lay his head
  alternatives:
  - to rest his head
  - to recline his head
  lexicon: BDAG
  rationale: An idiomatic expression for having a place to rest or sleep. 'Lay his
    head' is natural English and preserves the concrete imagery of the Greek.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  lexicon: BDAG
  rationale: Marks contrast between animals having places of shelter and the Son of
    Man lacking one; 'but' best conveys the adversative force in context.
- source_word: εἶπεν αὐτῷ ὁ Ἰησοῦς
  chosen: And Jesus said to him
  alternatives:
  - And Jesus told him
  lexicon: BDAG
  rationale: Standard narrative introduction. 'Said to him' is the most direct rendering
    of the Greek wording.
