id: LUK.9.25
reference: Luke 9:25
source:
  edition: SBLGNT
  text: τί γὰρ ὠφελεῖται ἄνθρωπος κερδήσας τὸν κόσμον ὅλον ἑαυτὸν δὲ ἀπολέσας ἢ ζημιωθείς;
translation:
  text: For what does a man gain if he gains the whole world, but loses or forfeits
    himself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''his life'' or ''his soul''; Greek: ''himself.'' The text uses the
      reflexive pronoun rather than the usual word for ''soul'' or ''life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: what
  alternatives:
  - how
  lexicon: BDAG
  rationale: Introduces a rhetorical question about benefit or advantage. 'What' is
    the most natural English equivalent in this idiom ('what does ... gain/profit').
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Retains the explanatory/grounding force connecting this verse to the
    preceding saying. 'For' is concise and natural in English.
- source_word: ὠφελεῖται
  chosen: does ... gain
  alternatives:
  - is benefited
  - profits
  lexicon: BDAG
  rationale: The verb denotes benefit or advantage. Because English idiom commonly
    expresses this with 'what does a man gain,' this rendering captures the sense
    clearly. 'Profits' is traditional but less natural for modern readers.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  - a human being
  lexicon: BDAG
  rationale: The Greek singular masculine is generic/representative. Per the translation
    philosophy's gender-accurate principle, 'a man' preserves the source form and
    representative force better than a flattened gender-neutral substitute.
- source_word: κερδήσας
  chosen: if he gains
  alternatives:
  - having gained
  - after gaining
  - were to gain
  lexicon: BDAG
  rationale: Aorist participle expressing the hypothetical circumstance. 'If he gains'
    renders the sense idiomatically in English within the rhetorical question.
- source_word: τὸν κόσμον ὅλον
  chosen: the whole world
  alternatives:
  - the entire world
  lexicon: BDAG
  rationale: Standard and natural rendering of κόσμος with ὅλος. Here it refers to
    the totality of worldly possession/advantage, not the created order in a technical
    sense.
- source_word: ἑαυτόν
  chosen: himself
  alternatives:
  - his life
  - his own self
  - his soul
  lexicon: BDAG
  rationale: The reflexive pronoun directly means 'himself.' This should not be narrowed
    to 'soul' or 'life' without lexical warrant. It points to the person's very self.
- source_word: δὲ
  chosen: but
  alternatives:
  - and yet
  - while
  lexicon: BDAG
  rationale: Marks contrast between gaining the world and losing oneself. 'But' is
    the clearest English connector here.
- source_word: ἀπολέσας
  chosen: loses
  alternatives:
  - having lost
  - destroys
  lexicon: BDAG
  rationale: From ἀπόλλυμι, here in the sense of losing/ruining. 'Loses' fits the
    rhetorical contrast and avoids over-specifying the mode of destruction.
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Preserves the disjunctive relation between the two participles: ''loses
    or forfeits.'''
- source_word: ζημιωθείς
  chosen: forfeits
  alternatives:
  - suffers loss
  - is damaged
  - is ruined
  lexicon: BDAG
  rationale: The passive participle conveys suffering loss or forfeiture. 'Forfeits'
    pairs well with 'loses' while preserving a distinct nuance of incurring loss with
    respect to oneself.
