theological_decisions:
- issue: Meaning of ἑαυτόν in relation to human destiny
  chosen_reading: himself
  alternative_readings:
  - his soul
  - his life
  rationale: The Greek text uses the reflexive pronoun, not ψυχή. Rendering it as
    'himself' preserves the broader anthropological force and avoids importing a narrower
    doctrinal reading about the immaterial soul alone.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
