id: LUK.9.5
reference: Luke 9:5
source:
  edition: SBLGNT
  text: καὶ ὅσοι ⸀ἂν μὴ ⸀δέχωνται ὑμᾶς, ἐξερχόμενοι ἀπὸ τῆς πόλεως ⸀ἐκείνης τὸν κονιορτὸν
    ἀπὸ τῶν ποδῶν ὑμῶν ⸀ἀποτινάσσετε εἰς μαρτύριον ἐπ’ αὐτούς.
translation:
  text: And as for all who do not receive you, as you leave that town, shake off the
    dust from your feet as a testimony against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who do not welcome you.' The verb can include both receiving and welcoming
      the messengers.
    reason: lexical_alternative
  - marker: b
    text: Or 'that city.' Greek πόλις can refer to a town or a city depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι ἂν μὴ δέχωνται
  chosen: all who do not receive
  alternatives:
  - whoever do not welcome
  - as many as do not accept
  lexicon: BDAG
  rationale: ὅσοι with ἄν gives an indefinite/generalizing sense, referring to any
    people of whatever number. δέχομαι here is best rendered 'receive' in the sense
    of welcoming and accepting the messengers. 'Receive' preserves the broader sense
    without narrowing it only to hospitality.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object referring to the disciples/apostolic messengers; simple
    second-person plural in English is adequately represented by 'you'.
- source_word: ἐξερχόμενοι
  chosen: as you leave
  alternatives:
  - when you go out
  - upon leaving
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main imperative and functions
    adverbially. 'As you leave' gives natural English while preserving the temporal
    force.
- source_word: ἀπὸ τῆς πόλεως ἐκείνης
  chosen: that town
  alternatives:
  - that city
  - that village
  lexicon: BDAG
  rationale: πόλις can denote a town or city. In this mission context, 'town' is more
    natural modern English and avoids implying a large urban center, while ἐκείνης
    is preserved by 'that'.
- source_word: τὸν κονιορτὸν
  chosen: the dust
  alternatives:
  - the dirt
  lexicon: BDAG
  rationale: κονιορτός refers to dust, especially loose dust stirred from the ground.
    'Dust' is the standard and idiomatic rendering in this symbolic action.
- source_word: ἀπὸ τῶν ποδῶν ὑμῶν
  chosen: from your feet
  alternatives:
  - off your feet
  lexicon: BDAG
  rationale: The phrase specifies the dust's source/location. 'From your feet' is
    straightforward and idiomatic in English.
- source_word: ἀποτινάσσετε
  chosen: shake off
  alternatives:
  - shake away
  - wipe off
  lexicon: BDAG
  rationale: The imperative calls for a symbolic act of forcefully removing dust.
    'Shake off' best matches both the physical image and established idiom.
- source_word: εἰς μαρτύριον
  chosen: as a testimony
  alternatives:
  - for a testimony
  - as witness
  lexicon: BDAG
  rationale: The phrase expresses purpose/result of the symbolic act. 'As a testimony'
    is clear modern English and preserves the evidentiary sense of μαρτύριον.
- source_word: ἐπ’ αὐτούς
  chosen: against them
  alternatives:
  - to them
  - over them
  lexicon: BDAG
  rationale: 'With μαρτύριον in this context, ἐπί with accusative carries an adversative
    sense: the testimony stands against those who rejected the messengers. This reflects
    the warning/judgment nuance present in the idiom.'
