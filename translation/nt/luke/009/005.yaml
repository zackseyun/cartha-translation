theological_decisions:
- issue: Force of the symbolic dust-shaking act
  chosen_reading: The act is rendered as a testimony against those who reject the
    messengers, preserving its warning/judicial force without expanding it into an
    explicit pronouncement of final condemnation.
  alternative_readings:
  - a neutral sign to them
  - an explicit declaration of divine judgment
  rationale: The Greek phrase εἰς μαρτύριον ἐπ’ αὐτούς indicates more than a neutral
    gesture, yet the verse itself does not spell out the full extent of judgment.
    The translation preserves the text's solemn witness function without importing
    more than the wording states.
  doctrine_reference: Preserve theological tension rather than resolve it.
