theological_decisions:
- issue: Rendering of Jesus' title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: Historic and literal rendering best preserves the title's established
    usage, its ambiguity, and its likely allusion to Daniel 7. A more interpretive
    alternative would reduce intertextual and christological resonance.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Scope of παραδίδοσθαι
  chosen_reading: be handed over
  alternative_readings:
  - be betrayed
  rationale: The verse predicts Jesus' transfer into human power broadly, not only
    the act of betrayal by Judas. The broader rendering preserves theological tension
    and narrative development without narrowing the referent too early.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - human beings
  - people
  rationale: The Greek is masculine plural and the phrase creates a pointed contrast
    with 'the Son of Man.' Following the gender-accurate principle, 'men' is retained
    in the main text, while a footnote can note the broader human sense.
  doctrine_reference: Translation philosophy §4
