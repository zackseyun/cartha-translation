id: LUK.9.44
reference: Luke 9:44
source:
  edition: SBLGNT
  text: Θέσθε ὑμεῖς εἰς τὰ ὦτα ὑμῶν τοὺς λόγους τούτους, ὁ γὰρ υἱὸς τοῦ ἀνθρώπου μέλλει
    παραδίδοσθαι εἰς χεῖρας ἀνθρώπων.
translation:
  text: You must put these words into your ears, for the Son of Man is about to be
    handed over into the hands of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be betrayed.' The Greek verb can mean 'hand over,' 'deliver up,' or,
      in some contexts, 'betray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into the hands of human beings.' Greek 'men' can function more broadly
      for humans here, though the masculine form is retained in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέσθε
  chosen: put
  alternatives:
  - take
  - place
  - lay
  lexicon: BDAG
  rationale: Aorist middle imperative of τίθημι used idiomatically with 'into your
    ears.' 'Put' preserves the force of a deliberate act of receiving and retaining
    Jesus' words without over-paraphrasing.
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis. English can reflect this sufficiently
    with 'You must...' rather than a separate emphatic expression, keeping the sentence
    natural while preserving the direct address.
- source_word: εἰς τὰ ὦτα ὑμῶν
  chosen: into your ears
  alternatives:
  - in your ears
  - to heart
  lexicon: BDAG
  rationale: This is a vivid Greek idiom for attentive hearing. 'Into your ears' preserves
    the metaphor more transparently than interpretive renderings like 'take to heart.'
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these sayings
  - these matters
  lexicon: BDAG
  rationale: λόγοι here refers to the specific statement Jesus is about to make. 'Words'
    is the most direct and natural rendering in context.
- source_word: ὁ γὰρ
  chosen: for
  alternatives:
  - because
  - indeed for
  lexicon: BDAG
  rationale: γάρ introduces the reason for the command to listen carefully. 'For'
    is concise and preserves the explanatory connection.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and should be translated literally as
    a title. It preserves both the idiomatic expression and its Danielic/theological
    resonance without interpretive expansion.
- source_word: μέλλει
  chosen: is about to
  alternatives:
  - is going to
  - is destined to
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly indicates imminence or impending action.
    'Is about to' best captures the forward-looking force here without importing a
    stronger notion of fate.
- source_word: παραδίδοσθαι
  chosen: be handed over
  alternatives:
  - be delivered up
  - be betrayed
  lexicon: BDAG
  rationale: παραδίδωμι can mean hand over, deliver, or betray depending on context.
    Here the passive points to Jesus being given into others' power; 'handed over'
    preserves the breadth of the term without prematurely narrowing it to Judas's
    betrayal alone.
- source_word: εἰς χεῖρας ἀνθρώπων
  chosen: into the hands of men
  alternatives:
  - into men's hands
  - into the hands of human beings
  lexicon: BDAG
  rationale: The idiom 'into the hands of' is standard for being delivered into someone's
    power and should be retained. ἀνθρώπων is grammatically masculine plural and here
    contrasts the Son of Man with human agents; 'men' is gender-accurate and preserves
    the rhetorical force better than a flattened neutral rendering.
