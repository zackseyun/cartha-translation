id: LUK.9.12
reference: Luke 9:12
source:
  edition: SBLGNT
  text: Ἡ δὲ ἡμέρα ἤρξατο κλίνειν· προσελθόντες δὲ οἱ δώδεκα εἶπαν αὐτῷ· Ἀπόλυσον
    τὸν ὄχλον, ἵνα ⸀πορευθέντες εἰς τὰς κύκλῳ κώμας ⸀καὶ ἀγροὺς καταλύσωσιν καὶ εὕρωσιν
    ἐπισιτισμόν, ὅτι ὧδε ἐν ἐρήμῳ τόπῳ ἐσμέν.
translation:
  text: Now the day began to decline, and the twelve came and said to him, “Send the
    crowd away, so that they may go into the surrounding villages and countryside,
    find lodging, and get provisions, because we are here in a desolate place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a deserted place.” The Greek ἔρημος can denote an uninhabited or sparsely
      inhabited area.
    reason: lexical_alternative
  - marker: b
    text: Or “find food.” The Greek ἐπισιτισμός refers to provisions or food supplies.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡ δὲ ἡμέρα ἤρξατο κλίνειν
  chosen: Now the day began to decline
  alternatives:
  - Now the day began to wear away
  - Now the day began to draw to a close
  - The day was beginning to decline
  lexicon: BDAG
  rationale: κλίνειν literally means 'to bend/decline'; with ἡμέρα it idiomatically
    refers to the day moving toward evening. 'Began to decline' preserves the metaphor
    and temporal sense without over-paraphrase.
- source_word: προσελθόντες δὲ οἱ δώδεκα
  chosen: and the twelve came
  alternatives:
  - and the twelve approached
  - then the twelve came near
  lexicon: BDAG
  rationale: προσέρχομαι means 'come to/approach.' 'Came' is smooth modern English
    in context, while still implying approach to Jesus; 'the twelve' preserves the
    titular reference to the apostles.
- source_word: Ἀπόλυσον τὸν ὄχλον
  chosen: Send the crowd away
  alternatives:
  - Dismiss the crowd
  - Release the crowd
  lexicon: BDAG
  rationale: ἀπολύω here means to dismiss or send away. 'Send the crowd away' is the
    most natural English imperative in this narrative setting.
- source_word: ἵνα πορευθέντες
  chosen: so that they may go
  alternatives:
  - so that, after going, they may
  - in order that they may go
  lexicon: BDAG
  rationale: The participle plus ἵνα clause expresses intended action. English idiom
    is best served by folding the participial nuance into 'so that they may go' rather
    than a wooden 'having gone.'
- source_word: εἰς τὰς κύκλῳ κώμας καὶ ἀγρούς
  chosen: into the surrounding villages and countryside
  alternatives:
  - into the villages and fields around here
  - into the nearby villages and farms
  lexicon: BDAG
  rationale: κύκλῳ conveys 'around/about, surrounding.' κώμαι are villages. ἀγροί
    can mean fields, farms, or country places; 'countryside' captures the broader
    rural sense in a way that reads naturally alongside 'villages.'
- source_word: καταλύσωσιν
  chosen: find lodging
  alternatives:
  - stay
  - lodge
  lexicon: BDAG
  rationale: καταλύω in this context refers to obtaining a place to stay rather than
    merely stopping. 'Find lodging' makes the implied object explicit in natural English.
- source_word: εὕρωσιν ἐπισιτισμόν
  chosen: get provisions
  alternatives:
  - find food
  - obtain supplies
  lexicon: BDAG
  rationale: ἐπισιτισμός denotes provisions/food supply. 'Get provisions' preserves
    the broader sense of securing needed sustenance, not merely locating a meal.
- source_word: ὅτι ὧδε ἐν ἐρήμῳ τόπῳ ἐσμέν
  chosen: because we are here in a desolate place
  alternatives:
  - because we are here in a deserted place
  - because we are in a wilderness place here
  lexicon: BDAG
  rationale: ἔρημος can mean deserted, desolate, or wilderness. 'Desolate place' preserves
    the lack of habitation/resources without overloading the term with Sinai/wilderness
    theology not explicit here. ὧδε is retained with 'here.'
