theological_decisions:
- issue: Scope of Jesus' saying
  chosen_reading: Render the statement as a general principle ('whoever') rather than
    narrowing it only to the unnamed exorcist.
  alternative_readings:
  - Render more specifically as 'the one who is not against you is for you'
  rationale: The relative pronoun can refer to the immediate case while also expressing
    a broader principle. 'Whoever' preserves that wider force without importing extra
    doctrine.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
