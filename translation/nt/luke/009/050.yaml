id: LUK.9.50
reference: Luke 9:50
source:
  edition: SBLGNT
  text: ⸂εἶπεν δὲ⸃ πρὸς αὐτὸν ⸀ὁ Ἰησοῦς· Μὴ κωλύετε, ὃς γὰρ οὐκ ἔστιν καθ’ ⸂ὑμῶν ὑπὲρ
    ὑμῶν⸃ ἐστιν.
translation:
  text: But Jesus said to him, “Do not stop him, for whoever is not against you is
    for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not hinder him' or 'Do not forbid him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here. 'But' fits the response to
    the preceding objection and reads naturally in English without overstating contrast.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - to John
  lexicon: BDAG
  rationale: The pronoun refers back to the immediately preceding speaker. The text
    has the pronoun, not the proper name, so 'to him' preserves the Greek wording.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the philosophy
    of transliterating names rather than translating them.
- source_word: Μὴ κωλύετε
  chosen: Do not stop him
  alternatives:
  - Do not hinder him
  - Do not forbid him
  - Stop forbidding him
  lexicon: BDAG
  rationale: κωλύω can mean stop, hinder, or forbid. In this context Jesus responds
    to the disciples' attempt to prevent the unnamed exorcist from acting. 'Do not
    stop him' is clear modern English and captures the practical force. Although the
    Greek plural verb addresses more than one disciple, English idiom commonly uses
    singular 'him' for the object being stopped; the plural addressees are implicit
    in the imperative.
- source_word: ὃς γὰρ
  chosen: for whoever
  alternatives:
  - for he who
  - because whoever
  lexicon: BDAG
  rationale: ὃς introduces a general principle rather than merely a statement about
    one individual. 'Whoever' communicates the gnomic force in natural English; γάρ
    is well represented by 'for'.
- source_word: οὐκ ἔστιν καθ’ ὑμῶν
  chosen: is not against you
  alternatives:
  - is not opposed to you
  - is not against us
  lexicon: BDAG
  rationale: κατά with the genitive here expresses opposition. 'Against you' is the
    plain sense. The second person plural should be preserved as 'you' in English,
    with plurality understood from context.
- source_word: ὑπὲρ ὑμῶν
  chosen: is for you
  alternatives:
  - is on your side
  - is in your favor
  lexicon: BDAG
  rationale: ὑπέρ here conveys support or alignment. 'For you' is concise and preserves
    the antithetical parallel with 'against you'.
