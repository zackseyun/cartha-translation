id: LUK.9.15
reference: Luke 9:15
source:
  edition: SBLGNT
  text: καὶ ἐποίησαν οὕτως καὶ ⸀κατέκλιναν ἅπαντας.
translation:
  text: And they did so, and had them all sit down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'seated them all' or 'made them all recline.' The Greek
      verb refers to arranging people for a meal, often in a reclining posture.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this action to the previous
    instruction and its execution.
- source_word: ἐποίησαν
  chosen: they did
  alternatives:
  - they did it
  - they acted
  lexicon: BDAG
  rationale: Aorist active indicative of ποιέω here refers back to Jesus' command
    in the previous verse; 'they did so' is natural English that preserves the resumptive
    sense.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Used adverbially with ἐποίησαν to mean 'in this manner'; 'so' is concise
    modern English and idiomatic in the phrase 'did so.'
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Coordinates the second finite verb with the first. 'And' preserves the
    simple narrative sequence without adding interpretive force.
- source_word: κατέκλιναν
  chosen: had them all sit down
  alternatives:
  - seated them all
  - reclined them all
  lexicon: BDAG
  rationale: The verb κατακλίνω literally refers to causing people to recline for
    a meal. In contemporary English, 'sit down' communicates the intended action clearly,
    while 'had them' preserves the causative sense better than a simple intransitive
    rendering.
- source_word: ἅπαντας
  chosen: them all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: Accusative masculine plural functioning as the object of κατέκλιναν;
    'them all' preserves totality and fits the causative construction in English.
