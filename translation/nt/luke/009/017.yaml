id: LUK.9.17
reference: Luke 9:17
source:
  edition: SBLGNT
  text: καὶ ἔφαγον καὶ ἐχορτάσθησαν πάντες, καὶ ἤρθη τὸ περισσεῦσαν αὐτοῖς κλασμάτων
    κόφινοι δώδεκα.
translation:
  text: 'And they all ate and were satisfied, and what was left over for them of the
    broken pieces was picked up: twelve baskets.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fragments' for 'broken pieces' (κλασμάτων).
    reason: lexical_alternative
  - marker: b
    text: Or 'was taken up' instead of 'was picked up' for ἤρθη.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - had eaten
  lexicon: BDAG
  rationale: Aorist indicative narrates the event simply; 'ate' is the natural English
    past tense.
- source_word: ἐχορτάσθησαν
  chosen: were satisfied
  alternatives:
  - were filled
  - had their fill
  lexicon: BDAG
  rationale: Conveys being fed to fullness in idiomatic modern English without sounding
    wooden. 'Were filled' is possible but less natural here.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  lexicon: BDAG
  rationale: Makes the implied subject explicit in English and preserves the emphasis
    that everyone present ate.
- source_word: ἤρθη
  chosen: was picked up
  alternatives:
  - was taken up
  - was collected
  lexicon: BDAG
  rationale: Passive of αἴρω here refers to gathering up leftovers. 'Was picked up'
    is clear, idiomatic, and fits the context of collecting fragments.
- source_word: τὸ περισσεῦσαν
  chosen: what was left over
  alternatives:
  - the surplus
  - the excess that remained
  lexicon: BDAG
  rationale: The articular participle functions substantivally; this rendering captures
    the sense naturally in English.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - by them
  - to them
  lexicon: BDAG
  rationale: The dative is somewhat awkward in English; 'for them' best reflects the
    relation of the leftovers to those who had eaten, i.e., what remained for them/after
    they had eaten.
- source_word: κλασμάτων
  chosen: of the broken pieces
  alternatives:
  - of the fragments
  - of the pieces
  lexicon: BDAG
  rationale: κλάσματα refers to pieces broken off from the bread/fish. 'Broken pieces'
    is transparent and concrete; 'fragments' is traditional and viable.
- source_word: κόφινοι δώδεκα
  chosen: twelve baskets
  alternatives:
  - twelve wicker baskets
  lexicon: BDAG
  rationale: κόφινος denotes a basket; 'twelve baskets' is the standard clear rendering.
    More specific material description is possible but not necessary in the main text.
