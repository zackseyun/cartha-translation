id: LUK.9.9
reference: Luke 9:9
source:
  edition: SBLGNT
  text: ⸂εἶπεν δὲ⸃ ⸀ὁ Ἡρῴδης· Ἰωάννην ἐγὼ ἀπεκεφάλισα· τίς δέ ἐστιν οὗτος περὶ ⸀οὗ
    ἀκούω τοιαῦτα; καὶ ἐζήτει ἰδεῖν αὐτόν.
translation:
  text: But Herod said, “John I beheaded; but who is this about whom I hear such things?”
    And he kept seeking to see him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he was seeking to see him.” The Greek imperfect may indicate ongoing
      or repeated action.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Used adversatively/discourse-connectively to mark continuation with a
    slight contrast from the preceding report; 'But' is natural English here and preserves
    the turn to Herod's response.
- source_word: Ἡρῴδης
  chosen: Herod
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: Ἰωάννην
  chosen: John
  rationale: Personal name transliterated rather than translated.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: 'Explicit pronoun is retained for emphasis: ''John I beheaded,'' reflecting
    Herod''s self-reference and contrast with the unknown figure.'
- source_word: ἀπεκεφάλισα
  chosen: beheaded
  alternatives:
  - had beheaded
  - executed by beheading
  lexicon: BDAG
  rationale: The verb specifically denotes beheading. Simple past fits the aorist
    in idiomatic English; 'had beheaded' would over-specify relative time beyond what
    the Greek requires.
- source_word: τίς ... ἐστιν οὗτος
  chosen: who is this
  alternatives:
  - who then is this
  - who is this man
  lexicon: BDAG
  rationale: Directly reflects the Greek question without adding 'man,' which is not
    explicit. The demonstrative 'this' preserves Herod's puzzled, somewhat distancing
    tone.
- source_word: περὶ οὗ
  chosen: about whom
  alternatives:
  - concerning whom
  lexicon: BDAG
  rationale: Natural English rendering of περί with the genitive in a report/hearsay
    context.
- source_word: ἀκούω
  chosen: I hear
  alternatives:
  - I am hearing
  lexicon: BDAG
  rationale: Present tense rendered as simple present in idiomatic English.
- source_word: τοιαῦτα
  chosen: such things
  alternatives:
  - these things
  - such reports
  lexicon: BDAG
  rationale: Broad demonstrative expression best rendered 'such things.' 'Such reports'
    is interpretive; the Greek leaves the content general.
- source_word: ἐζήτει
  chosen: he kept seeking
  alternatives:
  - he was seeking
  - he tried
  lexicon: BDAG
  rationale: Imperfect indicates ongoing/repeated action. 'Kept seeking' captures
    the durative sense more clearly than simple past.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to meet
  - to look at
  lexicon: BDAG
  rationale: Infinitive of ὁράω is straightforwardly 'to see'; broader senses like
    'meet' are possible in context but less direct.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Standard pronoun referring to Jesus in context.
