theological_decisions:
- issue: Herod's statement about John and his curiosity regarding Jesus
  chosen_reading: Render as a straightforward historical statement and question without
    importing speculation about resurrection or identity beyond the immediate wording.
  alternative_readings:
  - Paraphrastic renderings that make explicit Herod's fear that John has risen
  rationale: The preceding context supplies Herod's perplexity, but this verse itself
    states only that Herod says he beheaded John and asks who this is about whom he
    hears such things. The translation preserves the text's restraint and does not
    add doctrinal or narrative inference into the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
