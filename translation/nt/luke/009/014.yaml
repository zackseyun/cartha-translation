id: LUK.9.14
reference: Luke 9:14
source:
  edition: SBLGNT
  text: ἦσαν γὰρ ὡσεὶ ἄνδρες πεντακισχίλιοι. εἶπεν δὲ πρὸς τοὺς μαθητὰς αὐτοῦ· Κατακλίνατε
    αὐτοὺς κλισίας ⸀ὡσεὶ ἀνὰ πεντήκοντα.
translation:
  text: For there were about five thousand men. And he said to his disciples, “Have
    them recline in groups of about fifty each.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'men,' specifying adult males rather than the whole crowd; women and
      children are not included in this number.
    reason: lexical_alternative
  - marker: b
    text: Or 'Have them sit down in groups of about fifty each.' The Greek verb specifically
      suggests reclining for a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσεὶ
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: Marks approximation rather than an exact count; 'about' is natural modern
    English and fits both occurrences in the verse.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: ἀνήρ refers specifically to adult males, not people in general. Per gender-accurate
    policy, 'men' preserves the source's specificity.
- source_word: πεντακισχίλιοι
  chosen: five thousand
  lexicon: BDAG
  rationale: Straightforward cardinal number modifying 'men'.
- source_word: Κατακλίνατε
  chosen: Have them recline
  alternatives:
  - Have them sit down
  - Seat them
  lexicon: BDAG
  rationale: The verb means to cause to recline or lie down for a meal. 'Have them
    recline' preserves the meal-setting nuance better than the more generic 'sit down,'
    while remaining readable.
- source_word: κλισίας
  chosen: in groups
  alternatives:
  - by groups
  - in dining groups
  lexicon: BDAG
  rationale: The plural noun denotes arranged groups or divisions. 'In groups' gives
    the sense clearly in idiomatic English; the meal connotation is already suggested
    by 'recline'.
- source_word: ἀνὰ πεντήκοντα
  chosen: of about fifty each
  alternatives:
  - by fifties
  - about fifty at a time
  lexicon: BDAG
  rationale: ἀνά with a numeral expresses distribution. 'Of about fifty each' makes
    the distributive sense explicit and works smoothly with 'groups.'
- source_word: γὰρ ... δὲ
  chosen: For ... And
  alternatives:
  - Now ... then
  - For ... then
  lexicon: BDAG
  rationale: These particles structure the narrative. 'For' preserves the explanatory
    force of γάρ, and 'And' gives a natural continuation for δέ in English narrative.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive pronoun is explicit in Greek and should be retained.
