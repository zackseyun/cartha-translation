id: LUK.9.32
reference: Luke 9:32
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος καὶ οἱ σὺν αὐτῷ ἦσαν βεβαρημένοι ὕπνῳ· διαγρηγορήσαντες δὲ εἶδον
    τὴν δόξαν αὐτοῦ καὶ τοὺς δύο ἄνδρας τοὺς συνεστῶτας αὐτῷ.
translation:
  text: Now Peter and those with him were weighed down with sleep; but when they became
    fully awake, they saw his glory and the two men standing with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after waking up' or 'once they were fully awake.' The Greek verb is
      rare and may emphasize becoming fully alert rather than having remained awake
      throughout.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβαρημένοι ὕπνῳ
  chosen: were weighed down with sleep
  alternatives:
  - were heavy with sleep
  - were burdened with sleep
  - were sleepy
  lexicon: BDAG
  rationale: The perfect passive participle of βαρέω with dative ὕπνῳ conveys a state
    of being oppressed or burdened by sleep, stronger than a simple 'were sleepy.'
    'Weighed down with sleep' preserves the metaphor naturally in English.
- source_word: διαγρηγορήσαντες
  chosen: when they became fully awake
  alternatives:
  - having stayed awake
  - after waking up
  - once they were fully awake
  lexicon: BDAG
  rationale: The aorist participle from the rare διαγρηγορέω most naturally indicates
    coming into a fully wakeful state here, in contrast to being weighed down with
    sleep. 'Having stayed awake' is less likely in context because the previous clause
    indicates drowsiness rather than successful vigilance.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: BDAG
  rationale: '''Glory'' is the standard rendering of δόξα and preserves the theological
    resonance of the transfiguration context. Alternatives like ''splendor'' capture
    appearance but lose some biblical-theological continuity.'
- source_word: τοὺς δύο ἄνδρας
  chosen: the two men
  alternatives:
  - the two males
  lexicon: BDAG
  rationale: ἀνήρ here refers to adult male persons, specifically Moses and Elijah
    in context. 'The two men' is idiomatic and accurate.
- source_word: συνεστῶτας αὐτῷ
  chosen: standing with him
  alternatives:
  - who were with him
  - present with him
  lexicon: BDAG
  rationale: The perfect active participle of συνίστημι in this intransitive sense
    denotes being present/standing by. 'Standing with him' fits the visual scene and
    is a natural English rendering, while preserving the participial force.
- source_word: δὲ
  chosen: Now / but
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: δέ marks mild discourse development and contrast. 'Now' introduces the
    new focus on Peter and companions; the second δέ is best rendered 'but' to mark
    the contrast between drowsiness and seeing the vision.
