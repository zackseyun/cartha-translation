theological_decisions:
- issue: Rendering δόξα in the transfiguration context
  chosen_reading: his glory
  alternative_readings:
  - his splendor
  - his majesty
  rationale: The verse refers to the visible manifestation of Jesus' divine glory
    at the transfiguration. 'Glory' preserves the canonical and theological connection
    without over-explaining the nature of that glory in the translation itself.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Interpretation of διαγρηγορήσαντες
  chosen_reading: when they became fully awake
  alternative_readings:
  - having remained awake
  rationale: The translation avoids implying that Peter and the others successfully
    kept watch the whole time, which would sit awkwardly with 'weighed down with sleep.'
    The chosen reading preserves the narrative tension rather than harmonizing it.
  doctrine_reference: 'Translation philosophy #3'
