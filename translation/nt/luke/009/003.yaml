id: LUK.9.3
reference: Luke 9:3
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτούς· Μηδὲν αἴρετε εἰς τὴν ὁδόν, μήτε ⸀ῥάβδον μήτε πήραν
    μήτε ἄρτον μήτε ἀργύριον, μήτε ⸀ἀνὰ δύο χιτῶνας ἔχειν.
translation:
  text: And he said to them, “Take nothing for the journey—neither a staff, nor a
    bag, nor bread, nor money; and do not have two tunics each.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a traveler’s bag' for 'a bag.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'silver'; here it refers to money.
    reason: lexical_alternative
  - marker: c
    text: The Greek expression means 'two tunics each' or 'two tunics apiece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδὲν
  chosen: nothing
  alternatives:
  - nothing at all
  lexicon: BDAG
  rationale: Indefinite negative accusative functioning as the object of the command;
    'nothing' is the natural concise English equivalent.
- source_word: αἴρετε
  chosen: take
  alternatives:
  - carry
  lexicon: BDAG
  rationale: In travel-instruction context, αἴρω idiomatically means to take or carry
    along. 'Take' is more idiomatic in English with the following list of provisions.
- source_word: εἰς τὴν ὁδόν
  chosen: for the journey
  alternatives:
  - on the road
  - for the road
  lexicon: BDAG
  rationale: The phrase is idiomatic for travel preparations. 'For the journey' communicates
    purpose naturally in English while staying close to the Greek sense.
- source_word: ῥάβδον
  chosen: a staff
  alternatives:
  - a walking stick
  - a rod
  lexicon: BDAG
  rationale: In this travel context, ῥάβδος most likely refers to a traveler's staff.
    'Staff' is concise and standard.
- source_word: πήραν
  chosen: a bag
  alternatives:
  - a traveler's bag
  - a knapsack
  lexicon: BDAG
  rationale: πήρα denotes a bag used for provisions. 'Bag' is readable modern English;
    the more specific nuance can be preserved in a footnote.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: The literal item is bread, and there is no need to generalize beyond
    the source text.
- source_word: ἀργύριον
  chosen: money
  alternatives:
  - silver
  lexicon: BDAG
  rationale: Though literally 'silver,' in context it refers to money/cash. 'Money'
    best conveys the practical sense in contemporary English.
- source_word: ἀνὰ δύο χιτῶνας ἔχειν
  chosen: do not have two tunics each
  alternatives:
  - do not have two tunics
  - do not take two tunics apiece
  lexicon: BDAG
  rationale: ἀνά with a distributive numeral indicates 'two each/apiece.' χιτών is
    the inner garment or tunic. Rendering the distributive force explicitly avoids
    flattening the Greek construction.
- source_word: χιτῶνας
  chosen: tunics
  alternatives:
  - shirts
  - garments
  lexicon: BDAG
  rationale: '''Tunics'' preserves the historical garment reference better than the
    more generic ''garments'' or the overly modern ''shirts''.'
