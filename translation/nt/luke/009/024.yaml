theological_decisions:
- issue: Meaning of ψυχή in Jesus' paradox
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: The immediate context concerns discipleship, self-denial, and the paradox
    of preserving versus losing one's life for Jesus. Rendering ψυχή as 'life' best
    captures the saying's force without narrowing it to the immaterial soul alone.
    The broader semantic range is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
- issue: Generic masculine reference
  chosen_reading: his life
  alternative_readings:
  - their life
  rationale: The Greek uses grammatically masculine singular forms with representative
    force. Per the doctrine's gender-accurate principle, the translation keeps the
    singular masculine rather than flattening it into plural-generic English.
  doctrine_reference: Translation philosophy §4
