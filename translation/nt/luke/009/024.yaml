id: LUK.9.24
reference: Luke 9:24
source:
  edition: SBLGNT
  text: ὃς γὰρ ⸀ἂν θέλῃ τὴν ψυχὴν αὐτοῦ σῶσαι, ἀπολέσει αὐτήν· ὃς δ’ ἂν ἀπολέσῃ τὴν
    ψυχὴν αὐτοῦ ἕνεκεν ἐμοῦ, οὗτος σώσει αὐτήν.
translation:
  text: For whoever wants to save his life will lose it, but whoever loses his life
    for my sake, this one will save it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul' or 'his self'; the Greek word can mean life, soul, or self
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ἂν θέλῃ
  chosen: For whoever wants
  alternatives:
  - For whoever desires
  - For whoever would want
  lexicon: BDAG
  rationale: ὃς ... ἂν with the subjunctive expresses an indefinite/general condition,
    best rendered 'whoever.' γάρ is retained as 'For' to preserve the explanatory
    connection to the preceding saying. θέλω here denotes volition or desire; 'wants'
    is natural modern English.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: ψυχή can mean 'life,' 'self,' or 'soul' depending on context. In this
    paradox about preserving or losing one's earthly existence in discipleship, 'life'
    best fits the immediate sense and avoids importing a narrower anthropological
    reading. The possessive αὐτοῦ is rendered 'his' in keeping with the grammatically
    masculine generic construction.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to preserve
  lexicon: BDAG
  rationale: σῴζω commonly means 'save,' but in this context carries the nuance of
    preserving one's life. 'Save' is retained because it preserves the verbal link
    with the final σώσει and keeps the paradox intact in English.
- source_word: ἀπολέσει
  chosen: will lose
  alternatives:
  - will destroy
  - will forfeit
  lexicon: BDAG
  rationale: ἀπόλλυμι in this future active context is best rendered 'will lose.'
    'Destroy' would sound too active toward oneself, and 'forfeit' is interpretive.
    'Lose' preserves the paradoxical reversal Jesus states.
- source_word: ὃς δ’ ἂν ἀπολέσῃ
  chosen: but whoever loses
  alternatives:
  - but whoever should lose
  - but whoever destroys
  lexicon: BDAG
  rationale: δέ marks contrast, naturally rendered 'but.' The aorist subjunctive with
    ἄν again gives a general condition. 'Loses' matches the first clause and preserves
    the rhetorical symmetry.
- source_word: ἕνεκεν ἐμοῦ
  chosen: for my sake
  alternatives:
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: ἕνεκεν with the genitive indicates cause or motive. 'For my sake' is
    idiomatic and preserves the personal discipleship focus of Jesus' statement.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that person
  lexicon: BDAG
  rationale: οὗτος is emphatic, singling out the person described. Rendering it explicitly
    as 'this one' preserves the emphasis better than a simple pronoun, while remaining
    understandable in English.
- source_word: σώσει αὐτήν
  chosen: will save it
  alternatives:
  - will preserve it
  - will save his life
  lexicon: BDAG
  rationale: σώσει mirrors σῶσαι and should be rendered consistently as 'save.' The
    pronoun αὐτήν refers back to ψυχήν; 'it' preserves the Greek pronominal structure,
    though English readers will understand the antecedent as 'life.'
