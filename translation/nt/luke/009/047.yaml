id: LUK.9.47
reference: Luke 9:47
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸀εἰδὼς τὸν διαλογισμὸν τῆς καρδίας αὐτῶν ἐπιλαβόμενος ⸀παιδίον
    ἔστησεν αὐτὸ παρ’ ἑαυτῷ,
translation:
  text: But Jesus, knowing the reasoning of their heart, took hold of a child and
    stood him beside himself,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their hearts.' The Greek is literally 'of their heart,' with a singular
      'heart' and plural 'their.'
    reason: lexical_alternative
  - marker: b
    text: Or 'set him by his side' / 'placed him beside him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - perceiving
  - seeing
  lexicon: BDAG
  rationale: Although from ὁράω, the participle commonly carries the sense of mental
    perception or awareness in context. 'Knowing' is natural English and fits Jesus'
    awareness of an internal dispute.
- source_word: διαλογισμὸν
  chosen: reasoning
  alternatives:
  - thought
  - argument
  - discussion
  lexicon: BDAG
  rationale: The noun can denote inward reasoning or deliberation. 'Reasoning' preserves
    the cognitive/disputational nuance better than the flatter 'thought'.
- source_word: τῆς καρδίας αὐτῶν
  chosen: of their heart
  alternatives:
  - in their hearts
  - of their hearts
  lexicon: BDAG
  rationale: The Greek is singular καρδίας with plural possessive, literally 'of their
    heart.' The singular may reflect a collective inner disposition. The rendering
    keeps the source structure more closely, though idiomatic English might use the
    plural.
- source_word: ἐπιλαβόμενος
  chosen: took hold of
  alternatives:
  - took
  - taking
  lexicon: BDAG
  rationale: The middle participle often means to take hold of or grasp. 'Took hold
    of' preserves the concrete action more clearly than the generic 'took'.
- source_word: παιδίον
  chosen: child
  alternatives:
  - little child
  lexicon: BDAG
  rationale: παιδίον denotes a child, often young. 'Child' is the clearest default;
    'little child' is possible but adds emphasis not explicit in the noun itself.
- source_word: ἔστησεν
  chosen: stood
  alternatives:
  - set
  - placed
  lexicon: BDAG
  rationale: The verb ἵστημι in the causative aorist means 'caused to stand' or 'set/placed.'
    'Stood him' is a more literal retention of the standing imagery, though less common
    in modern English.
- source_word: παρ’ ἑαυτῷ
  chosen: beside himself
  alternatives:
  - by his side
  - next to him
  lexicon: BDAG
  rationale: The phrase means near or beside himself, i.e., Jesus. 'Beside himself'
    is formally close to the Greek, though in English it can also suggest emotional
    distress; this ambiguity is preserved in a footnote with a clearer alternative.
