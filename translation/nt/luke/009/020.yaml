id: LUK.9.20
reference: Luke 9:20
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτοῖς· Ὑμεῖς δὲ τίνα με λέγετε εἶναι; ⸂Πέτρος δὲ ἀποκριθεὶς⸃ εἶπεν·
    Τὸν χριστὸν τοῦ θεοῦ.
translation:
  text: And he said to them, “But who do you say that I am?” Peter answered, “The
    Messiah of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “the Christ of God.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun is explicit and emphatic in Greek. English
    can convey the contrast adequately with word order and 'But,' without needing
    an overly heavy 'you yourselves.'
- source_word: τίνα με λέγετε εἶναι
  chosen: who do you say that I am
  alternatives:
  - who do you say I am
  lexicon: BDAG
  rationale: This is the natural English rendering of the indirect discourse construction
    with λέγετε + infinitive εἶναι. Including 'that' preserves clarity without sounding
    archaic.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  lexicon: BDAG
  rationale: Aorist participle with following finite verb is idiomatically rendered
    in English as a simple finite verb, avoiding wooden style while preserving the
    sense.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here it is clearly titular in Peter's confession, not a name-like usage.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is preserved straightforwardly as 'of God.' This keeps the
    formal relation intact and matches the confessional force of the phrase.
- source_word: δέ
  chosen: And / But
  alternatives:
  - now
  - then
  lexicon: BDAG
  rationale: δέ is discourse connective rather than strongly adversative in the first
    clause ('And he said'), but marks contrast in the question ('But who do you say').
    Rendering varies by clause for natural English while documenting the exception.
