theological_decisions:
- issue: Rendering of χριστός in Peter's confession
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse presents a confessional title identifying Jesus in Israel's
    messianic framework. Following the project's contested-terms guidance, the title
    is translated rather than transliterated. The traditional 'Christ' is preserved
    in a footnote as a lexical alternative.
