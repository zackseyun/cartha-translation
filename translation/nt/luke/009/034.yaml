theological_decisions:
- issue: Nature of the cloud and its action
  chosen_reading: Translate descriptively as 'a cloud appeared and began to overshadow
    them' without explicitly identifying the cloud as the divine presence in the main
    text.
  alternative_readings:
  - a cloud came and overshadowed them, implying the Shekinah/glory cloud
  rationale: The context strongly evokes Old Testament theophany imagery, but the
    verse itself states only that a cloud came and overshadowed them. The translation
    preserves the imagery without importing a doctrinal explanation into the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
