id: LUK.9.34
reference: Luke 9:34
source:
  edition: SBLGNT
  text: ταῦτα δὲ αὐτοῦ λέγοντος ἐγένετο νεφέλη καὶ ⸀ἐπεσκίαζεν αὐτούς· ἐφοβήθησαν
    δὲ ἐν τῷ ⸂εἰσελθεῖν αὐτοὺς⸃ εἰς τὴν νεφέλην.
translation:
  text: While he was saying these things, a cloud appeared and began to overshadow
    them; and they were afraid as they entered into the cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cloud came and overshadowed them.' The verb can be rendered more simply
      without the inceptive nuance.
    reason: lexical_alternative
  - marker: b
    text: The cloud likely echoes Old Testament scenes of God's manifest presence,
      though the verse itself does not state this explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative accusative; 'these things' preserves the plural
    reference to Peter's preceding words more precisely than the smoother singular
    'this'.
- source_word: αὐτοῦ λέγοντος
  chosen: while he was saying
  alternatives:
  - as he was saying
  - while he said
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous action.
    'While he was saying' gives natural English and preserves the ongoing sense.
- source_word: ἐγένετο νεφέλη
  chosen: a cloud appeared
  alternatives:
  - a cloud came
  - there came a cloud
  - a cloud formed
  lexicon: BDAG
  rationale: ἐγένετο with a nominative subject often introduces the emergence or arrival
    of something. 'Appeared' is idiomatic English that conveys the onset without overinterpreting
    the cloud's origin.
- source_word: ἐπεσκίαζεν
  chosen: began to overshadow
  alternatives:
  - overshadowed
  - was overshadowing
  - covered with shadow
  lexicon: BDAG
  rationale: Imperfect tense suggests an inceptive or progressive nuance. 'Began to
    overshadow' captures the developing action of the cloud enveloping them. 'Overshadow'
    also preserves intertextual resonance with divine overshadowing language.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative object referring to the disciples present.
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they became afraid
  - they feared
  lexicon: BDAG
  rationale: Aorist passive/deponent commonly conveys the onset of fear. 'They were
    afraid' is natural English and fits the narrative flow; 'became afraid' is possible
    but slightly more wooden.
- source_word: ἐν τῷ εἰσελθεῖν αὐτοὺς
  chosen: as they entered
  alternatives:
  - when they entered
  - in their entering
  - as those men entered
  lexicon: BDAG
  rationale: 'Articular infinitive with ἐν expresses contemporaneous time. The accusative
    subject αὐτούς is best rendered as the subject of the infinitive in English: ''as
    they entered.'''
- source_word: εἰς τὴν νεφέλην
  chosen: into the cloud
  alternatives:
  - into the cloud mass
  - into that cloud
  lexicon: BDAG
  rationale: εἰς marks movement into the cloud, not merely under it. 'Into the cloud'
    preserves the vivid spatial sense of the Greek.
