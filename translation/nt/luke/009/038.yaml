id: LUK.9.38
reference: Luke 9:38
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἀνὴρ ἀπὸ τοῦ ὄχλου ⸀ἐβόησεν λέγων· Διδάσκαλε, δέομαί σου ἐπιβλέψαι
    ἐπὶ τὸν υἱόν μου, ὅτι μονογενής ⸂μοί ἐστιν⸃,
translation:
  text: And behold, a man from the crowd cried out, saying, “Teacher, I beg you to
    look upon my son, because he is my only child.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my only son.” The Greek says literally that he is ‘only-begotten/only
      one’ to me; in context, since the child has already been identified as a son,
      both renderings are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-getter. 'Behold'
    is slightly formal but still readable and reflects Luke's narrative style better
    than omitting it.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - someone
  - a male person
  lexicon: BDAG
  rationale: The noun specifically denotes a man, not merely a person, so the gendered
    rendering is preserved in keeping with the gender-accurate policy.
- source_word: ἀπὸ τοῦ ὄχλου
  chosen: from the crowd
  alternatives:
  - out of the crowd
  lexicon: BDAG
  rationale: Natural English rendering of source and context; indicates the man emerged
    as one among the gathered multitude.
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: Conveys a loud, urgent vocal appeal. 'Cried out' fits the desperation
    of the scene without over-paraphrasing.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Keeps the participial linkage in a natural English way and reflects the
    Greek narrative flow.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Διδάσκαλος most directly means 'teacher.' 'Master' would add a nuance
    not required by the Greek here.
- source_word: δέομαί σου
  chosen: I beg you
  alternatives:
  - I implore you
  - I ask you
  lexicon: BDAG
  rationale: δέομαι expresses earnest entreaty stronger than a simple request. 'I
    beg you' captures the urgency and pathos.
- source_word: ἐπιβλέψαι ἐπὶ
  chosen: to look upon
  alternatives:
  - to look at
  - to pay attention to
  - to take notice of
  lexicon: BDAG
  rationale: The expression can mean more than visual glance, carrying the sense of
    giving attentive regard. 'Look upon' preserves that weight while remaining idiomatic.
- source_word: τὸν υἱόν μου
  chosen: my son
  lexicon: BDAG
  rationale: Direct and standard rendering of the phrase.
- source_word: μονογενής
  chosen: only child
  alternatives:
  - only son
  - one and only
  lexicon: BDAG
  rationale: Although modifying 'son' in context, μονογενής with the dative pronoun
    means the child is his only one. 'Only child' best captures the semantic force
    without redundancy and matches the father's perspective. 'Only son' is possible
    and traditional, but the Greek emphasis is on uniqueness/sole offspring rather
    than maleness, already supplied by 'son' earlier in the sentence.
- source_word: μοί ἐστιν
  chosen: he is my
  alternatives:
  - he is to me
  lexicon: BDAG
  rationale: The dative pronoun with εἰμί is idiomatically possessive in English.
    Rendering it as 'my' communicates the sense naturally.
