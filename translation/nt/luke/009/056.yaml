id: LUK.9.56
reference: Luke 9:56
source:
  edition: SBLGNT
  text: ⸀καὶ ἐπορεύθησαν εἰς ἑτέραν κώμην.
translation:
  text: And they went on to another village.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a different village.' The Greek adjective can emphasize otherness as
      well as simple addition.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard coordinating conjunction. 'And' preserves the simple narrative
    linkage without adding temporal nuance beyond the Greek.
- source_word: ἐπορεύθησαν
  chosen: they went on
  alternatives:
  - they went
  - they traveled
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of πορεύομαι, meaning 'to go, travel,
    proceed.' 'Went on' fits the narrative context of moving away after rejection
    and sounds natural in English while preserving the basic motion sense.
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  lexicon: BDAG
  rationale: With a verb of motion and destination, εἰς marks movement toward a place.
    English idiom prefers 'to' with 'went on' here.
- source_word: ἑτέραν
  chosen: another
  alternatives:
  - a different
  lexicon: BDAG
  rationale: ἕτερος often carries the sense of 'another' or 'different/other.' In
    this context, 'another' is idiomatic and sufficiently conveys movement to a different
    village from the one just mentioned.
- source_word: κώμην
  chosen: village
  alternatives:
  - town
  lexicon: BDAG
  rationale: κώμη refers to a village or rural settlement rather than a larger city.
    'Village' is the most precise and natural rendering.
