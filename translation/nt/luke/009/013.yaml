id: LUK.9.13
reference: Luke 9:13
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτούς· Δότε αὐτοῖς ⸂ὑμεῖς φαγεῖν⸃. οἱ δὲ εἶπαν· Οὐκ εἰσὶν ἡμῖν
    πλεῖον ἢ ⸂ἄρτοι πέντε⸃ καὶ ἰχθύες δύο, εἰ μήτι πορευθέντες ἡμεῖς ἀγοράσωμεν εἰς
    πάντα τὸν λαὸν τοῦτον βρώματα.
translation:
  text: But he said to them, “You give them something to eat.” But they said, “We
    have no more than five loaves and two fish—unless we go and buy food for all this
    people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “You yourselves give them something to eat.”
    reason: lexical_alternative
  - marker: b
    text: Or “all this crowd.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Δότε
  chosen: give
  alternatives:
  - provide
  lexicon: BDAG
  rationale: Aorist imperative of δίδωμι; 'give' is the direct and natural English
    equivalent. In context with φαγεῖν, English idiom requires expansion to 'give
    ... something to eat' rather than a wooden 'give ... to eat.'
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: 'The explicit pronoun is emphatic. English can convey this adequately
    by placing ''You'' first: ''You give them...''. A fuller ''you yourselves'' is
    possible but sounds overstated here.'
- source_word: φαγεῖν
  chosen: something to eat
  alternatives:
  - to eat
  - food
  lexicon: BDAG
  rationale: The infinitive after δίδωμι forms an idiom meaning 'give [someone] something
    to eat.' This is clearer and more idiomatic in modern English than the more literal
    'give them to eat.'
- source_word: πλεῖον ἢ
  chosen: no more than
  alternatives:
  - nothing more than
  - more than
  lexicon: BDAG
  rationale: 'With the negated clause (''Οὐκ εἰσὶν ἡμῖν πλεῖον ἢ''), the sense is
    limitation: ''we have no more than.'' This preserves the force better than a barely
    literal rendering.'
- source_word: ἄρτοι
  chosen: loaves
  alternatives:
  - bread loaves
  - breads
  lexicon: BDAG
  rationale: ἄρτος here refers to individual loaves of bread, not bread as a mass
    noun. 'Loaves' is the standard and precise English rendering.
- source_word: ἰχθύες
  chosen: fish
  lexicon: BDAG
  rationale: Straightforward plural noun; English 'fish' serves as the normal plural
    in this context.
- source_word: εἰ μήτι
  chosen: unless
  alternatives:
  - unless perhaps
  - if not
  lexicon: BDAG
  rationale: The phrase introduces an exception with a nuance of uncertainty or rhetorical
    protest. 'Unless' captures the main force cleanly in English; the tentative nuance
    is minor and need not be made explicit in the main text.
- source_word: πορευθέντες
  chosen: we go
  alternatives:
  - having gone
  - go off
  lexicon: BDAG
  rationale: 'The participle is subordinate to ἀγοράσωμεν and is naturally rendered
    in English as a finite verb coordinated with the main action: ''we go and buy.'''
- source_word: ἀγοράσωμεν
  chosen: buy
  alternatives:
  - purchase
  lexicon: BDAG
  rationale: Simple aorist subjunctive after εἰ μήτι; 'buy' is the natural modern
    English equivalent.
- source_word: λαὸν
  chosen: people
  alternatives:
  - crowd
  - population
  lexicon: BDAG
  rationale: λαός often means 'people.' Here 'all this people' preserves the demonstrative
    force and collective sense better than 'crowd,' which would be more interpretive.
- source_word: βρώματα
  chosen: food
  alternatives:
  - provisions
  - things to eat
  lexicon: BDAG
  rationale: Plural noun meaning food items. English idiom prefers the mass noun 'food'
    in this context.
