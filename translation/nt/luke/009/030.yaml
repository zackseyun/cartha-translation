id: LUK.9.30
reference: Luke 9:30
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἄνδρες δύο συνελάλουν αὐτῷ, οἵτινες ἦσαν Μωϋσῆς καὶ Ἠλίας,
translation:
  text: And behold, two men were talking with him, who were Moses and Elijah,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains Luke's discourse marker of sudden attention and vividness. 'Behold'
    is slightly traditional but still understandable and better preserves the narrative
    force than omitting it.
- source_word: ἄνδρες δύο
  chosen: two men
  alternatives:
  - two males
  - two persons
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man' or 'male person'; here it refers specifically
    to Moses and Elijah appearing as identifiable male figures, so 'two men' is the
    most natural and accurate rendering.
- source_word: συνελάλουν
  chosen: were talking
  alternatives:
  - were speaking
  - were conversing
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Were talking' gives natural
    modern English while preserving the sense of continued conversation.
- source_word: αὐτῷ
  chosen: with him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: With συλλαλέω, the dative commonly indicates the person with whom one
    is speaking. 'With him' best reflects the reciprocal sense of conversation.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - and they
  lexicon: BDAG
  rationale: The relative pronoun identifies the two men. English idiom prefers simple
    'who' here; stronger distinctions carried by ὅστις are not prominent enough in
    this context to require expansion.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: Ἠλίας
  chosen: Elijah
  alternatives:
  - Elias
  rationale: Standard English transliteration reflecting the Hebrew prophet's familiar
    name; preferable to the older form 'Elias' for readability and consistency.
