theological_decisions:
- issue: Identification of the two figures at the transfiguration
  chosen_reading: The text straightforwardly identifies the two men as Moses and Elijah.
  rationale: No doctrinally contested term or ambiguity requires interpretive expansion.
    The translation preserves the direct identification without adding explanatory
    material about symbolism or eschatological significance.
  doctrine_reference: Preserve theological tension rather than resolve it.
