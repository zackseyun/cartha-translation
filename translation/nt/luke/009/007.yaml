id: LUK.9.7
reference: Luke 9:7
source:
  edition: SBLGNT
  text: Ἤκουσεν δὲ Ἡρῴδης ὁ τετραάρχης τὰ ⸀γινόμενα πάντα, καὶ διηπόρει διὰ τὸ λέγεσθαι
    ὑπό τινων ὅτι Ἰωάννης ⸀ἠγέρθη ἐκ νεκρῶν,
translation:
  text: Now Herod the tetrarch heard about all that was happening, and he was perplexed
    because it was being said by some that John had been raised from the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'John had risen from the dead.' The Greek verb is passive, literally
      'had been raised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσεν
  chosen: heard about
  alternatives:
  - heard
  lexicon: BDAG
  rationale: The verb ἀκούω can mean simply 'hear,' but in English 'heard about' naturally
    conveys receiving reports concerning events, which fits the object 'all that was
    happening.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Now'
    gives natural English discourse flow without overstating contrast.
- source_word: ὁ τετραάρχης
  chosen: the tetrarch
  alternatives:
  - the ruler of a fourth part
  lexicon: BDAG
  rationale: τετραάρχης is a historical-political title. Translating it directly preserves
    the specific office rather than flattening it to 'king' or generic 'ruler.'
- source_word: τὰ γινόμενα πάντα
  chosen: all that was happening
  alternatives:
  - all the things that were happening
  - everything that was taking place
  lexicon: BDAG
  rationale: The participial phrase refers to ongoing events/reports surrounding Jesus'
    ministry. 'All that was happening' is idiomatic and preserves the imperfective
    sense.
- source_word: διηπόρει
  chosen: was perplexed
  alternatives:
  - was greatly puzzled
  - was at a loss
  lexicon: BDAG
  rationale: διαπορέω denotes being in a state of puzzlement or uncertainty. 'Was
    perplexed' is clear modern English and fits the narrative tone.
- source_word: διὰ τὸ λέγεσθαι ὑπό τινων
  chosen: because it was being said by some
  alternatives:
  - because some were saying
  - because of what was being said by some
  lexicon: BDAG
  rationale: The articular infinitive with διά expresses cause. The passive infinitive
    λέγεσθαι is retained in sense with 'it was being said,' while 'by some' preserves
    ὑπό τινων.
- source_word: ἠγέρθη
  chosen: had been raised
  alternatives:
  - was raised
  - had risen
  lexicon: BDAG
  rationale: The passive of ἐγείρω here is best rendered 'had been raised,' preserving
    the passive form and the resurrection sense. 'Had risen' would shift to an intransitive
    active nuance not present in the Greek.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering in English for resurrection
    language. 'From among the dead' is more literal but less natural in running text.
