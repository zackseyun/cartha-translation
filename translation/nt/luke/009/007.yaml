theological_decisions:
- issue: Resurrection wording in report about John
  chosen_reading: had been raised from the dead
  alternative_readings:
  - had risen from the dead
  rationale: The Greek uses a passive verb (ἠγέρθη), so the translation preserves
    that form rather than resolving it into an active intransitive expression. This
    maintains the text's wording without importing further theological nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
