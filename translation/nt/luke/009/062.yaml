theological_decisions:
- issue: Implication of εὔθετός ἐστιν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen_reading: Rendered as suitability for the kingdom's demands, not as an explicit
    statement about final salvation or exclusion.
  alternative_readings:
  - is not worthy of entering the kingdom
  - is not useful in the service of the kingdom
  rationale: The saying uses a plowing metaphor to stress undivided commitment in
    discipleship. The Greek adjective εὔθετος denotes fitness/suitability; the translation
    should preserve the warning's force without importing a more specific doctrinal
    claim about soteriological status than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
