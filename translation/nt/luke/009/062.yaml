id: LUK.9.62
reference: Luke 9:62
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸂ὁ Ἰησοῦς⸃· Οὐδεὶς ἐπιβαλὼν τὴν ⸀χεῖρα ἐπ’ ἄροτρον καὶ βλέπων εἰς
    τὰ ὀπίσω εὔθετός ἐστιν ⸂τῇ βασιλείᾳ⸃ τοῦ θεοῦ.
translation:
  text: But Jesus said, “No one who has put his hand to the plow and looks back is
    fit for the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having put his hand on the plow.' The image is of beginning the work
      of plowing and then turning one's attention backward.
    reason: lexical_alternative
  - marker: b
    text: Or 'well-suited' or 'useful' for the kingdom of God.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐδεὶς
  chosen: No one
  alternatives:
  - No man
  - Nobody
  lexicon: BDAG
  rationale: Indefinite negative pronoun referring generically to any person. 'No
    one' is natural modern English and preserves the universal force without unnecessary
    gendering.
- source_word: ἐπιβαλὼν τὴν χεῖρα ἐπ’ ἄροτρον
  chosen: has put his hand to the plow
  alternatives:
  - puts his hand to the plow
  - having put his hand on the plow
  lexicon: BDAG
  rationale: The aorist participle ἐπιβαλών denotes the initiating act of taking hold
    for plowing. The idiom 'put one's hand to the plow' is clear English and preserves
    the agricultural image. 'Has put' brings out the completed action with present
    relevance before the following present participle.
- source_word: ἄροτρον
  chosen: plow
  alternatives:
  - plough
  lexicon: BDAG
  rationale: Standard agricultural implement. 'Plow' is the standard modern American
    spelling and suits readable modern English.
- source_word: βλέπων εἰς τὰ ὀπίσω
  chosen: looks back
  alternatives:
  - looking back
  - turning back
  lexicon: BDAG
  rationale: The present participle conveys ongoing or characteristic action. 'Looks
    back' is idiomatic and captures both the literal image and the metaphorical sense
    of divided commitment.
- source_word: εὔθετός
  chosen: fit
  alternatives:
  - well-suited
  - useful
  - ready
  lexicon: BDAG
  rationale: εὔθετος here means suitable or fit for a purpose. 'Fit' is concise, idiomatic,
    and preserves the evaluative force without overinterpreting toward moral worth
    or salvation status.
- source_word: τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: for the kingdom of God
  alternatives:
  - for God's kingdom
  - for the reign of God
  lexicon: BDAG
  rationale: With εὔθετος, the dative is naturally rendered 'fit for.' 'Kingdom of
    God' is the standard and sufficiently transparent rendering of βασιλεία τοῦ θεοῦ;
    'reign' is possible but less natural here and not required by the context.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the immediate corrective
    response of Jesus to the preceding statement.
