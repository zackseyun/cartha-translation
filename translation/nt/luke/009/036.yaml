theological_decisions:
- issue: Narrative implication of Jesus' solitary presence after the heavenly voice
  chosen_reading: Render descriptively as 'Jesus was found alone' without adding interpretive
    explanation.
  alternative_readings:
  - Jesus alone remained
  - they saw only Jesus
  rationale: The verse reports the scene's outcome, not an explicit theological interpretation.
    A restrained rendering preserves the narrative fact without importing doctrinal
    commentary.
  doctrine_reference: Preserve theological tension rather than resolve it.
