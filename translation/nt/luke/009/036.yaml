id: LUK.9.36
reference: Luke 9:36
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ γενέσθαι τὴν φωνὴν ⸀εὑρέθη Ἰησοῦς μόνος. καὶ αὐτοὶ ἐσίγησαν καὶ
    οὐδενὶ ἀπήγγειλαν ἐν ἐκείναις ταῖς ἡμέραις οὐδὲν ὧν ἑώρακαν.
translation:
  text: And when the voice had come, Jesus was found alone. And they kept silent and
    told no one in those days anything of what they had seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus alone remained' / 'only Jesus was seen.' The Greek says literally,
      'Jesus was found alone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ γενέσθαι
  chosen: when ... had come
  alternatives:
  - as ... came
  - when ... occurred
  lexicon: BDAG
  rationale: The articular infinitive with ἐν commonly expresses time ('when/as').
    Rendering it as 'when the voice had come' gives natural English while preserving
    the temporal sense tied to the sounding of the voice.
- source_word: φωνή
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: φωνή here refers to the heavenly utterance in the transfiguration scene,
    so 'voice' is the most direct and contextually appropriate rendering.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - was seen
  - appeared
  lexicon: BDAG
  rationale: The aorist passive of εὑρίσκω is most naturally 'was found.' In context
    it conveys the result that, after the voice, only Jesus remained visible. 'Was
    seen' is interpretive; 'was found' better preserves the Greek form and narrative
    restraint.
- source_word: μόνος
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: BDAG
  rationale: μόνος predicates Jesus' solitary presence after Moses and Elijah are
    gone. 'Alone' is concise and idiomatic.
- source_word: ἐσίγησαν
  chosen: kept silent
  alternatives:
  - were silent
  - said nothing
  lexicon: BDAG
  rationale: σιγάω means to be silent or keep silent. 'Kept silent' captures the ingressive/resultative
    force in context without overtranslating.
- source_word: οὐδενὶ ἀπήγγειλαν
  chosen: told no one
  alternatives:
  - reported to no one
  - announced to no one
  lexicon: BDAG
  rationale: ἀπαγγέλλω can mean report or tell. 'Told no one' is natural modern English
    and fits the narrative register.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In those days' preserves the wording
    and rhythm of the Greek.
- source_word: οὐδὲν ὧν ἑώρακαν
  chosen: anything of what they had seen
  alternatives:
  - anything they had seen
  - nothing of what they had seen
  lexicon: BDAG
  rationale: The construction combines οὐδέν with a partitive relative clause. 'Anything
    of what they had seen' preserves the relation closely, though idiomatic English
    could shorten it. The negative force is already carried by 'told no one,' so 'anything'
    works naturally in English.
