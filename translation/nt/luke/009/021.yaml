id: LUK.9.21
reference: Luke 9:21
source:
  edition: SBLGNT
  text: Ὁ δὲ ἐπιτιμήσας αὐτοῖς παρήγγειλεν μηδενὶ ⸀λέγειν τοῦτο,
translation:
  text: But he rebuked them and commanded them to tell this to no one,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strictly warned them and ordered them to tell this to no one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτιμήσας
  chosen: rebuked
  alternatives:
  - warned
  - strictly warned
  - censured
  lexicon: BDAG
  rationale: The aorist participle from ἐπιτιμάω commonly means to rebuke or sharply
    warn. In this context, paired with παρήγγειλεν, it conveys a forceful corrective
    word preceding the command. 'Rebuked' preserves the verbal sharpness better than
    the softer 'warned.'
- source_word: παρήγγειλεν
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  - charged
  lexicon: BDAG
  rationale: παραγγέλλω denotes giving an authoritative directive. 'Commanded' best
    reflects the force of the verb in clear modern English; 'charged' is possible
    but less natural for contemporary readers.
- source_word: μηδενὶ
  chosen: to no one
  alternatives:
  - to nobody
  - to anyone
  lexicon: BDAG
  rationale: 'The dative of μηδείς with λέγειν expresses the indirect object of speaking:
    ''to no one.'' ''To anyone'' would normally require explicit negation in English
    and is less direct here.'
- source_word: λέγειν
  chosen: to tell
  alternatives:
  - to say
  - to speak
  lexicon: BDAG
  rationale: Although λέγω is often 'say,' in this construction with a personal indirect
    object and τοῦτο as content, idiomatic English prefers 'tell this to no one.'
    This is a documented contextual variation under optimal equivalence.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  - it
  lexicon: BDAG
  rationale: The demonstrative points back to Peter's confession in the immediate
    context. 'This' preserves the Greek deixis without over-specifying the referent
    in the main text.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding confession and Jesus' response.
    'But' brings out that contrast naturally in English.
