theological_decisions:
- issue: Force of Jesus' prohibition after Peter's confession
  chosen_reading: A strong prohibition against public disclosure at this point in
    the narrative
  alternative_readings:
  - A milder warning not to mention it
  rationale: The combination of ἐπιτιμήσας and παρήγγειλεν indicates more than a casual
    request. The translation preserves the narrative tension of the so-called messianic
    secrecy motif without importing a broader theory into the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
