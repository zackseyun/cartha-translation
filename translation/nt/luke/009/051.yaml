id: LUK.9.51
reference: Luke 9:51
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ συμπληροῦσθαι τὰς ἡμέρας τῆς ἀναλήμψεως αὐτοῦ καὶ αὐτὸς τὸ
    ⸀πρόσωπον ⸀ἐστήρισεν τοῦ πορεύεσθαι εἰς Ἰερουσαλήμ,
translation:
  text: Now it happened, when the days of his being taken up were being fulfilled,
    that he set his face to go to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of his ascension.' The Greek literally says 'of his being taken up.'
    reason: alternative_reading
  - marker: b
    text: '''Set his face'' is an idiom expressing firm resolve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: BDAG
  rationale: Formulaic narrative transition. 'Now it happened' preserves the event-marking
    force without archaic diction like 'came to pass.'
- source_word: ἐν τῷ συμπληροῦσθαι
  chosen: when ... were being fulfilled
  alternatives:
  - as ... were being fulfilled
  - when ... were approaching fulfillment
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal ('when/as'). συμπληρόω here
    conveys completion/fulfillment of a period. 'Were being fulfilled' keeps the processive
    sense of the present infinitive better than a simple 'had come.'
- source_word: τὰς ἡμέρας
  chosen: the days
  alternatives:
  - the time
  - the period
  lexicon: BDAG
  rationale: Retained literally because Luke speaks of a defined period reaching completion;
    'time' is possible but less textually transparent.
- source_word: τῆς ἀναλήμψεως αὐτοῦ
  chosen: of his being taken up
  alternatives:
  - of his ascension
  - of his departure
  lexicon: BDAG
  rationale: ἀνάλημψις denotes 'taking up.' 'Being taken up' is more transparent to
    the Greek and avoids prematurely narrowing the reference to the ascension alone,
    since Luke may be viewing the coming death, resurrection, and ascension as a unified
    movement toward exaltation. 'Ascension' is preserved as an alternative in a footnote
    because it is a traditional and plausible rendering.
- source_word: καὶ αὐτὸς
  chosen: that he
  alternatives:
  - and he himself
  lexicon: BDAG
  rationale: The pronoun adds emphasis. In English, explicit 'he himself' can sound
    awkward here; the clause structure and following idiom carry the emphasis sufficiently.
    The emphatic nuance is reflected in the decisive wording that follows.
- source_word: τὸ πρόσωπον ἐστήρισεν
  chosen: set his face
  alternatives:
  - set his face firmly
  - determined resolutely
  lexicon: BDAG
  rationale: This is a Semitic-style idiom for firm resolve. 'Set his face' preserves
    the vivid metaphor and intertextual resonance, especially with prophetic language,
    while remaining understandable in modern English.
- source_word: τοῦ πορεύεσθαι
  chosen: to go
  alternatives:
  - to journey
  - to travel
  lexicon: BDAG
  rationale: The genitive articular infinitive expresses purpose/result after the
    idiom. 'To go' is the most natural and sufficiently broad rendering in context.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - for Jerusalem
  lexicon: BDAG
  rationale: Standard directional sense of εἰς with a city destination.
