theological_decisions:
- issue: Scope of 'his being taken up' (ἀναλήμψεως αὐτοῦ)
  chosen_reading: Rendered broadly as 'his being taken up' rather than narrowly as
    'his ascension.'
  alternative_readings:
  - his ascension
  - his departure
  rationale: The Greek noun literally denotes being taken up, and in Luke's narrative
    theology this can plausibly summarize the climactic movement of Jesus toward death,
    resurrection, and exaltation. A broader rendering preserves that tension rather
    than resolving it too narrowly. The traditional 'ascension' is preserved in a
    footnote as a legitimate interpretive alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Idiomatic force of 'set his face'
  chosen_reading: Preserved the idiom in the main text.
  alternative_readings:
  - was determined
  - resolved firmly
  rationale: The phrase communicates Jesus' resolute intention without reducing the
    expression to a flat abstraction. Preserving the idiom maintains literary and
    theological resonance with prophetic resolve while not importing extra doctrinal
    claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    meaning and texture where understandable.'
