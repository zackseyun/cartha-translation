theological_decisions:
- issue: Potentially heightened discipleship language in ἀκολουθέω
  chosen_reading: Rendered as 'follow' with no added theological expansion
  alternative_readings:
  - I will become your disciple wherever you go
  rationale: The verb certainly carries discipleship significance in Luke, but the
    translation should not paraphrase beyond the lexical content. 'Follow' preserves
    both literal movement and discipleship resonance without importing interpretive
    expansion.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
