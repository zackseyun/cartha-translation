id: LUK.9.57
reference: Luke 9:57
source:
  edition: SBLGNT
  text: ⸀Καὶ πορευομένων αὐτῶν ἐν τῇ ὁδῷ εἶπέν τις πρὸς αὐτόν· Ἀκολουθήσω σοι ὅπου
    ⸀ἐὰν ⸀ἀπέρχῃ.
translation:
  text: And as they were going along the road, someone said to him, “I will follow
    you wherever you go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “wherever you may go” or “wherever you depart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευομένων αὐτῶν
  chosen: as they were going along
  alternatives:
  - while they were going
  - as they were traveling
  lexicon: BDAG
  rationale: Genitive absolute with present middle participle indicates contemporaneous
    ongoing movement. 'As they were going along' is natural English that preserves
    the temporal sense without over-literal awkwardness.
- source_word: ἐν τῇ ὁδῷ
  chosen: along the road
  alternatives:
  - on the road
  - in the way
  lexicon: BDAG
  rationale: Literally 'in the road/way.' In Luke this can be spatially concrete while
    also resonating with journey motif. 'Along the road' fits idiomatic English and
    keeps the concrete travel setting.
- source_word: εἶπέν τις
  chosen: someone said
  alternatives:
  - a certain man said
  - someone spoke
  lexicon: BDAG
  rationale: τις is indefinite, not specific. 'Someone said' best reflects the nonspecific
    subject without importing 'man,' which is not explicit in the Greek of this verse.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of πρός with a verb of speaking in this
    context.
- source_word: Ἀκολουθήσω σοι
  chosen: I will follow you
  alternatives:
  - I shall follow you
  lexicon: BDAG
  rationale: Future indicative expresses stated intention/commitment. 'Follow' is
    the established and contextually precise gloss for ἀκολουθέω in discipleship contexts.
- source_word: ὅπου ἐὰν ἀπέρχῃ
  chosen: wherever you go
  alternatives:
  - wherever you may go
  - wherever you depart
  lexicon: BDAG
  rationale: ὅπου with ἐάν and subjunctive gives an indefinite relative sense, 'wherever.'
    Although ἀπέρχομαι can more literally mean 'go away' or 'depart,' in this context
    simple 'go' is the most natural English and matches the disciple's pledge of unrestricted
    following.
