id: LUK.9.61
reference: Luke 9:61
source:
  edition: SBLGNT
  text: εἶπεν δὲ καὶ ἕτερος· Ἀκολουθήσω σοι, κύριε· πρῶτον δὲ ἐπίτρεψόν μοι ἀποτάξασθαι
    τοῖς εἰς τὸν οἶκόν μου.
translation:
  text: And another also said, “I will follow you, Lord, but first permit me to say
    farewell to those at my house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “allow me” for “permit me.”
    reason: lexical_alternative
  - marker: b
    text: Or “to take leave of” or “to bid farewell to.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “those into my house,” meaning the people at or belonging to
      his home.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος
  chosen: another
  alternatives:
  - someone else
  - a different one
  lexicon: BDAG
  rationale: ἕτερος introduces an additional person distinct from the previous speakers.
    'Another' is the most natural concise rendering in context.
- source_word: Ἀκολουθήσω
  chosen: I will follow
  alternatives:
  - I shall follow
  lexicon: BDAG
  rationale: Future indicative expresses the speaker's stated intention. 'I will follow'
    is natural modern English and preserves the volitional force.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  - sir
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus here, 'Lord' preserves both respect and possible theological weight without
    flattening it to merely 'sir.'
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - before that
  lexicon: BDAG
  rationale: The adverbial accusative marks priority. 'First' is the clearest and
    most idiomatic rendering.
- source_word: ἐπίτρεψόν μοι
  chosen: permit me
  alternatives:
  - allow me
  - let me
  lexicon: BDAG
  rationale: The aorist imperative is a request for permission. 'Permit me' preserves
    the formal request and fits the tone of address to Jesus. 'Let me' is possible
    but slightly less explicit.
- source_word: ἀποτάξασθαι
  chosen: to say farewell
  alternatives:
  - to take leave
  - to bid farewell
  lexicon: BDAG
  rationale: The middle infinitive here means to take leave of or say goodbye to someone,
    not merely to arrange matters. 'To say farewell' is idiomatic and precise.
- source_word: τοῖς εἰς τὸν οἶκόν μου
  chosen: to those at my house
  alternatives:
  - to those in my house
  - to my household
  - to those at home
  lexicon: BDAG
  rationale: The phrase refers to the people belonging to or present at his home.
    'Those at my house' preserves the relational reference without over-specifying
    'household,' which could imply servants and family as a fixed social unit beyond
    the Greek's immediate wording.
- source_word: δὲ καὶ
  chosen: And another also said
  alternatives:
  - Then another also said
  - And another said also
  lexicon: BDAG
  rationale: The particles link this statement with the preceding dialogue and add
    one more example. 'And another also said' preserves both connective and additive
    force in readable English.
