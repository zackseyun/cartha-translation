theological_decisions:
- issue: Rendering κύριε in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  - sir
  rationale: The translation follows the project's default rendering of κύριος as
    'Lord.' In Luke, address to Jesus can carry a range from respectful address to
    fuller recognition; 'Lord' preserves that theological tension rather than resolving
    it downward to 'sir' or merely functional 'Master.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy #3'
