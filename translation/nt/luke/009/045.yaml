id: LUK.9.45
reference: Luke 9:45
source:
  edition: SBLGNT
  text: οἱ δὲ ἠγνόουν τὸ ῥῆμα τοῦτο, καὶ ἦν παρακεκαλυμμένον ἀπ’ αὐτῶν ἵνα μὴ αἴσθωνται
    αὐτό, καὶ ἐφοβοῦντο ἐρωτῆσαι αὐτὸν περὶ τοῦ ῥήματος τούτου.
translation:
  text: But they did not understand this saying, and it was concealed from them so
    that they might not perceive it, and they were afraid to ask him about this saying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'word,' 'statement,' or 'matter' for 'saying' (ῥῆμα).
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'it was concealed from them' without naming who concealed
      it.
    reason: alternative_reading
lexical_decisions:
- source_word: ἠγνόουν
  chosen: did not understand
  alternatives:
  - were ignorant of
  - did not know
  lexicon: BDAG
  rationale: In context, the verb refers not merely to lack of information but failure
    to grasp Jesus' statement. 'Did not understand' is idiomatic modern English and
    fits the object τὸ ῥῆμα τοῦτο.
- source_word: ῥῆμα
  chosen: saying
  alternatives:
  - word
  - statement
  - matter
  lexicon: BDAG
  rationale: ῥῆμα here refers to the specific utterance Jesus has just spoken. 'Saying'
    is natural English and preserves the focus on spoken words better than the more
    wooden 'word'.
- source_word: παρακεκαλυμμένον
  chosen: was concealed
  alternatives:
  - was hidden
  - had been veiled
  lexicon: BDAG
  rationale: The perfect passive participle with ἦν expresses a state of hiddenness.
    'Was concealed' preserves the passive and avoids overinterpreting the agent.
- source_word: ἀπ’ αὐτῶν
  chosen: from them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The preposition ἀπό most naturally means 'from.' The phrase indicates
    that the meaning was concealed from them, not merely hidden in a general sense.
- source_word: ἵνα μὴ αἴσθωνται αὐτό
  chosen: so that they might not perceive it
  alternatives:
  - so that they might not understand it
  - so that they might not grasp it
  lexicon: BDAG
  rationale: αἰσθάνομαι carries the sense of perceiving or becoming aware. 'Perceive'
    preserves a distinction from the earlier ἠγνόουν ('did not understand'), avoiding
    flattening two different Greek verbs into the same English gloss.
- source_word: ἐφοβοῦντο
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: BDAG
  rationale: Imperfect middle/passive here describes their ongoing disposition. 'They
    were afraid' is idiomatic and clear.
- source_word: ἐρωτῆσαι
  chosen: to ask
  alternatives:
  - to question
  lexicon: BDAG
  rationale: The infinitive denotes asking Jesus for clarification. 'Ask' is the most
    natural English equivalent in this context.
