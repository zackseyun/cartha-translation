theological_decisions:
- issue: Agency of the concealment
  chosen_reading: The text states that the saying was concealed from them without
    specifying the agent.
  alternative_readings:
  - God concealed it from them
  - it remained obscure to them without explicit divine agency
  rationale: The passive construction does not name who concealed it. To preserve
    theological tension and avoid importing a claim the verse itself does not make,
    the translation keeps the passive 'it was concealed from them.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
