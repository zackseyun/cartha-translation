id: LUK.9.29
reference: Luke 9:29
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ προσεύχεσθαι αὐτὸν τὸ εἶδος τοῦ προσώπου αὐτοῦ ἕτερον καὶ
    ὁ ἱματισμὸς αὐτοῦ λευκὸς ἐξαστράπτων.
translation:
  text: And as he was praying, the appearance of his face became different, and his
    clothing became white, flashing like lightning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appearance of his face was altered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his clothing was white and dazzling'; the Greek participle evokes lightning-like
      flashing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ προσεύχεσθαι αὐτὸν
  chosen: as he was praying
  alternatives:
  - while he was praying
  - it happened as he was praying
  lexicon: BDAG
  rationale: The construction ἐγένετο + ἐν τῷ + infinitive is a Lukan idiom introducing
    an event during an action. Rendering it as 'as he was praying' preserves the temporal
    sense in natural English without the wooden 'it happened.'
- source_word: τὸ εἶδος
  chosen: the appearance
  alternatives:
  - the form
  - the look
  lexicon: BDAG
  rationale: εἶδος here refers to visible appearance rather than ontological form.
    'Appearance' is the clearest modern English equivalent in context.
- source_word: τοῦ προσώπου αὐτοῦ
  chosen: of his face
  alternatives:
  - of his countenance
  lexicon: BDAG
  rationale: πρόσωπον literally means 'face.' 'Countenance' is possible but less natural
    for modern readers.
- source_word: ἕτερον
  chosen: became different
  alternatives:
  - was altered
  - became other
  lexicon: BDAG
  rationale: ἕτερον means 'different/other.' Because English normally requires a verbal
    expression here, 'became different' makes explicit the change implied by the clause.
    'Was altered' is interpretive and leans toward the wording of the parallels rather
    than Luke's own diction.
- source_word: ὁ ἱματισμὸς αὐτοῦ
  chosen: his clothing
  alternatives:
  - his garments
  - his clothes
  lexicon: BDAG
  rationale: ἱματισμός denotes clothing/garments. 'Clothing' is natural, slightly
    elevated, and fits the narrative register.
- source_word: λευκὸς
  chosen: white
  alternatives:
  - bright white
  lexicon: BDAG
  rationale: λευκός straightforwardly means 'white.' The brightness is further specified
    by the participle, so 'white' should stand without expansion.
- source_word: ἐξαστράπτων
  chosen: flashing like lightning
  alternatives:
  - gleaming
  - dazzling
  - flashing
  lexicon: BDAG
  rationale: The participle derives from the idea of lightning-like flashing. 'Flashing
    like lightning' preserves the vivid imagery better than the more generic 'dazzling,'
    while remaining readable.
