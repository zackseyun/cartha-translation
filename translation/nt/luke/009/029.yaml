theological_decisions:
- issue: Description of Jesus' transfiguration
  chosen_reading: Render Luke's wording as a visible change in appearance without
    importing fuller phrasing from the Synoptic parallels.
  alternative_readings:
  - his face was altered
  - his face shone
  rationale: The verse describes a real visible transformation, but Luke's wording
    is more restrained than Matthew's. The translation should preserve the event's
    significance without harmonizing to other Gospel accounts.
  doctrine_reference: Translation philosophy §1, §3
