theological_decisions:
- issue: Idiomatic force of 'his face was ... toward Jerusalem'
  chosen_reading: Render the phrase as indicating determined orientation toward Jerusalem
    without importing extra theological explanation into the main text.
  alternative_readings:
  - Render more literally as 'his face was going to Jerusalem'
  - Render more dynamically as 'he was determined to go to Jerusalem'
  rationale: The phrase carries narrative and theological weight in Luke's travel
    section, echoing determined movement toward Jerusalem. 'His face was set toward
    Jerusalem' preserves that tension and allusive force better than a flat travel
    notice, while avoiding over-interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
