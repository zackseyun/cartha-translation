id: LUK.9.53
reference: Luke 9:53
source:
  edition: SBLGNT
  text: καὶ οὐκ ἐδέξαντο αὐτόν, ὅτι τὸ πρόσωπον αὐτοῦ ἦν πορευόμενον εἰς Ἰερουσαλήμ.
translation:
  text: And they did not receive him, because his face was set toward Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not welcome him.' The verb can denote receiving, accepting,
      or welcoming, here likely referring to refusal of hospitality.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his face was toward Jerusalem' or 'his face was going to Jerusalem,'
      an idiom expressing fixed direction or resolve.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδέξαντο
  chosen: did not receive
  alternatives:
  - did not welcome
  - did not accept
  lexicon: BDAG
  rationale: δέχομαι commonly means receive, welcome, or accept. In this travel-context,
    the sense is refusal of hospitality/reception. 'Receive' preserves the lexical
    core while remaining natural English and allowing the implied refusal of lodging
    or welcome to be inferred from context.
- source_word: τὸ πρόσωπον αὐτοῦ
  chosen: his face
  alternatives:
  - his countenance
  - he
  lexicon: BDAG
  rationale: πρόσωπον is literally 'face.' Here it participates in a Semitic-style
    expression indicating determined orientation or destination. Retaining 'his face'
    preserves the vivid idiom and Luke's wording better than flattening it to a simple
    pronoun.
- source_word: ἦν πορευόμενον
  chosen: was set toward
  alternatives:
  - was going toward
  - was traveling to
  lexicon: BDAG
  rationale: The periphrastic construction with πορευόμενον literally indicates movement
    or journeying. In context, linked with 'his face,' the idiom conveys fixed direction
    and resolve toward Jerusalem, not merely physical motion. 'Was set toward' captures
    the idiomatic force in readable English while remaining anchored in the source.
- source_word: εἰς Ἰερουσαλήμ
  chosen: toward Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: BDAG
  rationale: εἰς normally means 'into/to,' but with the idiom 'his face was set' English
    more naturally uses 'toward.' This preserves the directional force without awkwardness.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: ὅτι introduces the reason for the villagers' refusal. 'Because' is the
    clearest modern English causal connector.
