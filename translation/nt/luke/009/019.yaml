theological_decisions:
- issue: Whether ἀνέστη should be rendered in a way that explicitly states resurrection
  chosen_reading: has risen
  alternative_readings:
  - has arisen
  - has come back
  rationale: The verb ἀνίστημι can denote rising or arising and, in some contexts,
    resurrection. Here the crowd's speculation concerns the reappearance of an ancient
    prophet. 'Has risen' preserves the wording's possible resonance with resurrection
    language without forcing a more explicit doctrinal claim than the verse itself
    makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
