theological_decisions:
- issue: Gendered resumptive pronoun after the generic masculine construction
  chosen_reading: the Son of Man will be ashamed of him
  alternative_readings:
  - the Son of Man will be ashamed of that person
  - the Son of Man will be ashamed of them
  rationale: The Greek uses masculine singular forms (ὃς, τοῦτον) with representative
    force. Per the translation philosophy, gender-accurate rendering is preferred
    over flattening to a plural or neutral form. 'Him' preserves the source grammar
    without implying exclusion of women from the warning's scope.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Eschatological glory shared among the Son of Man, the Father, and the holy
    angels
  chosen_reading: when he comes in his glory and the glory of the Father and of the
    holy angels
  alternative_readings:
  - when he comes in his glory, and in the Father's, and that of the holy angels
  rationale: The wording preserves the text's high christological and eschatological
    claim without expanding it beyond what is stated. The verse presents the Son of
    Man as coming in a glory associated with himself, the Father, and the holy angels;
    the translation keeps that tension and grandeur without interpretive paraphrase.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
