id: LUK.9.26
reference: Luke 9:26
source:
  edition: SBLGNT
  text: ὃς γὰρ ἂν ἐπαισχυνθῇ με καὶ τοὺς ἐμοὺς λόγους, τοῦτον ὁ υἱὸς τοῦ ἀνθρώπου
    ἐπαισχυνθήσεται, ὅταν ἔλθῃ ἐν τῇ δόξῃ αὐτοῦ καὶ τοῦ πατρὸς καὶ τῶν ἁγίων ἀγγέλων.
translation:
  text: For whoever is ashamed of me and of my words, the Son of Man will be ashamed
    of him when he comes in his glory and the glory of the Father and of the holy
    angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Son of Man will be ashamed of this one.'
    reason: lexical_alternative
  - marker: b
    text: The Greek construction can also be represented as 'when he comes in his
      glory, and in the glory of the Father and of the holy angels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ἂν
  chosen: For whoever
  alternatives:
  - For whoever it may be
  - Whoever, for
  lexicon: BDAG
  rationale: 'Combines the explanatory γάρ (''for'') with the indefinite relative
    construction ὃς ... ἄν, which here has a generalizing sense: ''whoever.'' This
    is natural English and preserves the conditional-general force.'
- source_word: ἐπαισχυνθῇ
  chosen: is ashamed of
  alternatives:
  - is embarrassed by
  - is disgraced by
  - is unwilling to acknowledge
  lexicon: BDAG
  rationale: The verb ἐπαισχύνομαι commonly means 'be ashamed' or 'feel shame with
    reference to.' 'Is ashamed of' is the standard, clear rendering and fits the relational/object
    construction with με and τοὺς ἐμοὺς λόγους.
- source_word: με καὶ τοὺς ἐμοὺς λόγους
  chosen: me and of my words
  alternatives:
  - me and my words
  - me and what I say
  lexicon: BDAG
  rationale: The repeated sense of the object after ἐπαισχυνθῇ is carried smoothly
    in English by 'of me and of my words.' 'Words' preserves λόγους more directly
    than the more interpretive 'what I say.'
- source_word: τοῦτον
  chosen: him
  alternatives:
  - that person
  - this one
  lexicon: BDAG
  rationale: τοῦτον points back to the indefinite 'whoever.' English idiom prefers
    the resumptive pronoun 'him' here. This keeps the masculine singular representative
    force of the Greek, in line with the gender-accurate policy.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and most transparent rendering of the self-designation/title.
    It preserves the Greek wording and its intertextual resonance, especially with
    Danielic background, without paraphrase.
- source_word: ἐπαισχυνθήσεται
  chosen: will be ashamed of
  alternatives:
  - will reject
  - will disown
  lexicon: BDAG
  rationale: Future passive/deponent form corresponding to the earlier ἐπαισχυνθῇ.
    Rendering it with the same English expression preserves the deliberate reciprocity
    in the verse. Stronger interpretive options like 'reject' or 'disown' overstate
    the lexical sense.
- source_word: ὅταν ἔλθῃ
  chosen: when he comes
  alternatives:
  - whenever he comes
  - when he has come
  lexicon: BDAG
  rationale: 'ὅταν with the aorist subjunctive gives a future temporal sense: ''when
    he comes.'' This is the most natural English equivalent in context.'
- source_word: ἐν τῇ δόξῃ αὐτοῦ
  chosen: in his glory
  alternatives:
  - with his glory
  - in the glory that is his
  lexicon: BDAG
  rationale: ἐν with δόξα here expresses the sphere or manifestation accompanying
    his coming. 'In his glory' is idiomatic and preserves the solemn eschatological
    sense.
- source_word: καὶ τοῦ πατρὸς καὶ τῶν ἁγίων ἀγγέλων
  chosen: and the glory of the Father and of the holy angels
  alternatives:
  - and in the glory of the Father and of the holy angels
  lexicon: BDAG
  rationale: 'Although ἐν appears only once, the genitive sequence naturally continues
    the single noun δόξῃ: literally, ''in his glory and of the Father and of the holy
    angels.'' English requires supplying ''the glory of'' to make the coordination
    clear. This avoids the misleading impression of three separate prepositional phrases
    while preserving the shared-glory construction.'
- source_word: ἅγιοι ἄγγελοι
  chosen: holy angels
  alternatives:
  - the angels who are holy
  lexicon: BDAG
  rationale: A straightforward adjectival rendering. 'Holy angels' is natural English
    and preserves the consecrated/heavenly characterization.
