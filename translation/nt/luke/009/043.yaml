theological_decisions:
- issue: Referent of 'he' in οἷς ἐποίει / εἶπεν
  chosen_reading: '''he'' refers to Jesus'
  alternative_readings:
  - implicit divine agency emphasized through the preceding phrase 'the majesty of
    God'
  rationale: In the narrative context, Jesus is the immediate actor and speaker. The
    verse attributes the displayed power to 'the majesty of God' while still describing
    Jesus' actions, preserving Luke's theological pattern without collapsing the distinction
    between God and Jesus.
  doctrine_reference: Preserve theological tension rather than resolve it.
