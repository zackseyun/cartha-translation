id: LUK.9.43
reference: Luke 9:43
source:
  edition: SBLGNT
  text: ἐξεπλήσσοντο δὲ πάντες ἐπὶ τῇ μεγαλειότητι τοῦ θεοῦ. Πάντων δὲ θαυμαζόντων
    ἐπὶ πᾶσιν οἷς ⸀ἐποίει εἶπεν πρὸς τοὺς μαθητὰς αὐτοῦ·
translation:
  text: 'And they were all astonished at the majesty of God. But while everyone was
    marveling at all that he was doing, he said to his disciples:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greatness of God.' The Greek μεγαλειότης denotes greatness, grandeur,
      or majesty; 'majesty' was chosen for its natural fit in English and its suitability
      for divine splendor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were overwhelmed with amazement
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates an ongoing state of strong amazement.
    'Were astonished' is natural English and preserves the force without over-paraphrasing.
- source_word: πάντες
  chosen: they were all
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: Rendered explicitly with the verb phrase to preserve the nominative subject
    and emphasize the universality of the reaction.
- source_word: ἐπὶ τῇ μεγαλειότητι
  chosen: at the majesty
  alternatives:
  - because of the greatness
  - at the grandeur
  lexicon: BDAG
  rationale: The preposition with the dative here expresses the basis/object of astonishment.
    'Majesty' fits μεγαλειότης well and carries the sense of divine greatness without
    sounding inflated.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward genitive; the majesty belongs to or is displayed by God.
- source_word: Πάντων δὲ θαυμαζόντων
  chosen: But while everyone was marveling
  alternatives:
  - And while all were marveling
  - But as everyone marveled
  lexicon: BDAG
  rationale: Genitive absolute rendered with a temporal circumstantial clause. 'Marveling'
    distinguishes θαυμάζω from the stronger ἐκπλήσσομαι in the previous clause while
    keeping the narrative flow.
- source_word: ἐπὶ πᾶσιν
  chosen: at all
  alternatives:
  - over all
  - because of all
  lexicon: BDAG
  rationale: Here ἐπί with the dative marks the object/cause of marveling. 'At all'
    is idiomatic with 'marveling' in English.
- source_word: οἷς ἐποίει
  chosen: that he was doing
  alternatives:
  - the things he did
  - what he was doing
  lexicon: BDAG
  rationale: The relative pronoun with imperfect ἐποίει points to Jesus' ongoing actions
    in context. 'That he was doing' preserves the imperfective sense better than a
    simple past.
- source_word: εἶπεν πρὸς
  chosen: he said to
  alternatives:
  - he spoke to
  lexicon: BDAG
  rationale: Standard narrative introduction; 'said to' is the most natural rendering.
- source_word: τοὺς μαθητὰς αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Idiomatic English rendering of the accusative object with possessive
    pronoun.
