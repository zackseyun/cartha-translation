id: LUK.9.22
reference: Luke 9:22
source:
  edition: SBLGNT
  text: εἰπὼν ὅτι Δεῖ τὸν υἱὸν τοῦ ἀνθρώπου πολλὰ παθεῖν καὶ ἀποδοκιμασθῆναι ἀπὸ τῶν
    πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων καὶ ἀποκτανθῆναι καὶ τῇ τρίτῃ ἡμέρᾳ ⸀ἐγερθῆναι.
translation:
  text: saying, “It is necessary for the Son of Man to suffer many things and to be
    rejected by the elders, chief priests, and scribes, and to be killed, and on the
    third day to be raised.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It must be that the Son of Man suffers many things …'
    reason: lexical_alternative
  - marker: b
    text: Greek 'be raised,' preserving the passive form; compare the alternative
      English rendering 'rise.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰπὼν
  chosen: saying
  alternatives:
  - having said
  - he said
  lexicon: BDAG
  rationale: Aorist participle of λέγω introducing the content of Jesus' statement.
    'Saying' is natural in English and preserves the participial linkage to the preceding
    narrative without overformal stiffness.
- source_word: Δεῖ
  chosen: It is necessary
  alternatives:
  - it must be
  - it is required
  lexicon: BDAG
  rationale: δέω here expresses divine necessity rather than mere convenience. 'It
    is necessary' preserves the force of necessity while remaining readable; 'must'
    is possible but slightly less explicit in English about the impersonal construction.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard translation of the self-designation/title, preserving both its
    idiomatic form and its intertextual resonance with Danielic and Gospel usage.
    It should not be paraphrased as 'the human one' here because the title's established
    messianic and apocalyptic associations are significant.
- source_word: πολλὰ παθεῖν
  chosen: to suffer many things
  alternatives:
  - to suffer much
  lexicon: BDAG
  rationale: The neuter plural πολλὰ is best represented explicitly as 'many things,'
    preserving the breadth of suffering indicated by the Greek rather than compressing
    it into the more idiomatic but less formally transparent 'suffer much.'
- source_word: ἀποδοκιμασθῆναι
  chosen: to be rejected
  alternatives:
  - to be repudiated
  - to be disapproved
  lexicon: BDAG
  rationale: The passive infinitive conveys being rejected after evaluation. 'Rejected'
    is the clearest modern English equivalent and fits the context of official repudiation
    by leadership.
- source_word: ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων
  chosen: by the elders, chief priests, and scribes
  alternatives:
  - from the elders, chief priests, and scribes
  lexicon: BDAG
  rationale: Although ἀπό often means 'from,' with a passive verb it commonly marks
    agency/source. 'By' is the most natural English rendering here and clearly identifies
    the rejecting parties.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - leaders
  lexicon: BDAG
  rationale: Refers to the recognized Jewish elders as a leadership group. 'Elders'
    preserves the institutional term without unnecessary paraphrase.
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple usage commonly refers to the chief-priestly
    class, not multiple simultaneous high priests in the strict singular office sense.
    'Chief priests' is the standard and contextually accurate rendering.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct lexical equivalent and preserves the recognizable
    Gospel group designation. ''Teachers of the law'' is interpretive and broader
    than the Greek term itself.'
- source_word: ἀποκτανθῆναι
  chosen: to be killed
  alternatives:
  - to be put to death
  lexicon: BDAG
  rationale: Passive infinitive indicating that the Son of Man will be killed. 'To
    be killed' is direct, natural, and faithful; 'put to death' is possible but slightly
    more formal/juridical than the Greek requires.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after
  lexicon: BDAG
  rationale: Standard temporal dative. 'On the third day' is the natural English equivalent
    and preserves the familiar resurrection formula.
- source_word: ἐγερθῆναι
  chosen: to be raised
  alternatives:
  - to rise
  - to be resurrected
  lexicon: BDAG
  rationale: The passive infinitive of ἐγείρω is best rendered 'to be raised,' preserving
    the passive form that in context implies God's action without making the agent
    explicit. 'To rise' would shift to an active nuance not present in the Greek.
