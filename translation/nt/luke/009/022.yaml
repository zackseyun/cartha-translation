theological_decisions:
- issue: Rendering of the resurrection verb in passive voice
  chosen_reading: to be raised
  alternative_readings:
  - to rise
  - to be resurrected
  rationale: The Greek uses a passive infinitive (ἐγερθῆναι). Rendering it as 'to
    be raised' preserves the text's wording and theological nuance of divine action,
    without importing an explicit subject not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of Δεῖ
  chosen_reading: It is necessary
  alternative_readings:
  - The Son of Man must
  rationale: The verse presents Jesus' suffering, rejection, death, and resurrection
    as necessary within God's redemptive plan. 'It is necessary' preserves the impersonal
    Greek construction and the sense of divine necessity without overinterpreting
    the mechanism of that necessity.
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
