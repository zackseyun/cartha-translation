theological_decisions:
- issue: Nature of the crowd's claim about the prophet
  chosen_reading: rendered as 'had risen' rather than a vaguer 'appeared again'
  alternative_readings:
  - had come back
  - had been raised
  rationale: The verb ἀνέστη naturally suggests rising, and in this context refers
    to the belief that a prophet from former times had returned from death. The translation
    preserves that claim without endorsing it or specifying which prophet.
  doctrine_reference: Preserve theological tension rather than resolve it.
