id: LUK.9.8
reference: Luke 9:8
source:
  edition: SBLGNT
  text: ὑπό τινων δὲ ὅτι Ἠλίας ἐφάνη, ἄλλων δὲ ὅτι προφήτης ⸀τις τῶν ἀρχαίων ἀνέστη.
translation:
  text: and by some, that Elijah had appeared, and by others, that one of the ancient
    prophets had risen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a prophet of old had risen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπό τινων ... ἄλλων
  chosen: by some ... by others
  alternatives:
  - some said ... others said
  - by some people ... by others
  lexicon: BDAG
  rationale: 'The preposition ὑπό with genitive marks agency/source of the report:
    ''by some'' and ''by others.'' This preserves the elliptical structure from the
    previous verse, where opinions about Jesus are being reported.'
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in a list of reported opinions.
    'And' is natural English and preserves the additive force without overstating
    contrast.
- source_word: ὅτι
  chosen: that
  alternatives:
  - — (content clause left implicit)
  lexicon: BDAG
  rationale: Introduces the content of what was being said. Retaining 'that' keeps
    the reported-speech structure clear in English.
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name, in keeping with
    the policy to transliterate personal names.
- source_word: ἐφάνη
  chosen: had appeared
  alternatives:
  - appeared
  - was seen
  - had been revealed
  lexicon: BDAG
  rationale: Aorist passive of φαίνω here means 'appeared' or 'became visible.' 'Had
    appeared' fits the reported claim in idiomatic English and distinguishes it from
    the second clause's resurrection language.
- source_word: προφήτης τις
  chosen: one ... prophets
  alternatives:
  - a certain prophet
  - some prophet
  - a prophet
  lexicon: BDAG
  rationale: The indefinite τις after the noun gives the sense 'a certain/one of.'
    Because the following genitive phrase specifies the group, English is best rendered
    'one of the ... prophets' rather than the less natural 'a certain prophet of the
    ancients.'
- source_word: τῶν ἀρχαίων
  chosen: the ancient
  alternatives:
  - of old
  - from long ago
  - the former
  lexicon: BDAG
  rationale: ἀρχαῖος denotes something ancient or belonging to former times. 'Ancient'
    is concise, natural, and preserves the temporal contrast with the present.
- source_word: ἀνέστη
  chosen: had risen
  alternatives:
  - rose
  - had been raised
  - came back
  lexicon: BDAG
  rationale: ἀνίστημι can mean 'rise' or, in context of the dead, 'rise up'/'be raised.'
    Here the crowd's claim is that an ancient prophet had come back to life. 'Had
    risen' is idiomatic and preserves the resurrection nuance without importing a
    passive not present in the Greek.
