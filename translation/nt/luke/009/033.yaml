theological_decisions:
- issue: Rendering σκηνάς in a transfiguration context with possible festival/tabernacle
    associations
  chosen_reading: shelters
  alternative_readings:
  - booths
  - tabernacles
  - tents
  rationale: The verse itself does not explicitly identify the structures with the
    Feast of Booths or the tabernacle tradition, so the main text should not over-interpret.
    A neutral but accurate rendering in modern English is preferred, while preserving
    the more traditional alternatives in a footnote for readers aware of the biblical
    resonance.
  doctrine_reference: Translation philosophy §§1, 5, 6
