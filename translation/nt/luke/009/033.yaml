id: LUK.9.33
reference: Luke 9:33
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ διαχωρίζεσθαι αὐτοὺς ἀπ’ αὐτοῦ εἶπεν ⸀ὁ Πέτρος πρὸς τὸν
    Ἰησοῦν· Ἐπιστάτα, καλόν ἐστιν ἡμᾶς ὧδε εἶναι, καὶ ποιήσωμεν σκηνὰς τρεῖς, μίαν
    σοὶ καὶ μίαν Μωϋσεῖ καὶ μίαν Ἠλίᾳ, μὴ εἰδὼς ὃ λέγει.
translation:
  text: 'And as they were departing from him, Peter said to Jesus, “Master, it is
    good for us to be here. Let us make three shelters: one for you, one for Moses,
    and one for Elijah” — not knowing what he was saying.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “booths,” “tents,” or traditionally “tabernacles.” The Greek skēnai refers
      to temporary shelters and may echo biblical festival imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ διαχωρίζεσθαι
  chosen: as they were departing
  alternatives:
  - it happened as they were separating
  - while they were leaving
  lexicon: BDAG
  rationale: The construction ἐγένετο ἐν τῷ + infinitive is a common narrative idiom
    marking contemporaneous action. Rendering it smoothly as 'as they were departing'
    preserves the temporal sense without woodenly reproducing 'it happened.'
- source_word: διαχωρίζεσθαι αὐτοὺς ἀπ’ αὐτοῦ
  chosen: they were departing from him
  alternatives:
  - they were separating from him
  - they were leaving him
  lexicon: BDAG
  rationale: The middle/passive infinitive with ἀπό indicates separation from Jesus
    by Moses and Elijah. 'Departing from him' is natural English and keeps the directional
    nuance.
- source_word: Ἐπιστάτα
  chosen: Master
  alternatives:
  - Teacher
  - Chief
  lexicon: BDAG
  rationale: Luke uniquely uses ἐπιστάτης as a respectful address for Jesus. 'Master'
    best captures authoritative address in readable English without flattening it
    to the more common διδάσκαλε ('Teacher').
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  chosen: it is good for us to be here
  alternatives:
  - it is good that we are here
  - it is fitting for us to be here
  lexicon: BDAG
  rationale: This preserves the straightforward evaluative sense of καλόν and the
    infinitival construction while sounding natural in English.
- source_word: ποιήσωμεν
  chosen: Let us make
  alternatives:
  - let us build
  - we should make
  lexicon: BDAG
  rationale: The first person aorist subjunctive is hortatory. 'Let us make' reflects
    Peter's proposal directly. 'Build' is possible by implication but goes beyond
    the lexical force of ποιέω.
- source_word: σκηνὰς
  chosen: shelters
  alternatives:
  - booths
  - tabernacles
  - tents
  lexicon: BDAG
  rationale: σκηνή denotes a temporary shelter or tent. 'Shelters' is clear modern
    English and avoids the archaic or overly tradition-bound 'tabernacles,' while
    'booths' may sound too specific or unfamiliar. The possible Feast of Booths resonance
    is worth preserving in a footnote.
- source_word: μὴ εἰδὼς ὃ λέγει
  chosen: not knowing what he was saying
  alternatives:
  - not knowing what he said
  - not understanding what he was saying
  lexicon: BDAG
  rationale: 'The participle explains Peter''s lack of comprehension at the moment.
    The present tense λέγει is best represented as ongoing speech: ''was saying.'''
