theological_decisions:
- issue: Interpretation of 'the dead' in the first and second occurrences
  chosen_reading: Retain 'the dead' in both places without explicating metaphorical
    versus literal senses in the main text.
  alternative_readings:
  - Leave the spiritually dead to bury their own dead
  rationale: Jesus' saying is intentionally stark and paradoxical. The likely sense
    is that those spiritually unresponsive may handle ordinary burial duties, while
    the disciple is called to kingdom proclamation; however, making 'spiritually'
    explicit in the main text resolves an interpretive tension not overtly marked
    in Greek. Per translation philosophy, the tension is preserved and the interpretive
    alternative is footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
