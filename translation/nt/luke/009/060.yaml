id: LUK.9.60
reference: Luke 9:60
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸀αὐτῷ· Ἄφες τοὺς νεκροὺς θάψαι τοὺς ἑαυτῶν νεκρούς, σὺ δὲ ἀπελθὼν
    διάγγελλε τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: But he said to him, “Leave the dead to bury their own dead, but you, after
    going, proclaim the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The first 'dead' is likely metaphorical (those spiritually unresponsive),
      while the second refers to the physically dead. Greek uses the same word in
      both places, and the translation preserves that effect.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄφες
  chosen: Leave
  alternatives:
  - Let
  - Allow
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here functions as a sharp command to disengage
    from the requested task. 'Leave' is concise and forceful, fitting the context
    better than the softer 'allow.'
- source_word: τοὺς νεκροὺς ... τοὺς ἑαυτῶν νεκρούς
  chosen: the dead ... their own dead
  alternatives:
  - the dead ... their dead
  - the spiritually dead ... their own dead
  lexicon: BDAG
  rationale: The repetition of νεκρούς is preserved to retain the striking paradox.
    The first instance is commonly understood metaphorically and the second literally,
    but the Greek uses the same word both times; the translation preserves that tension
    rather than resolving it in the main text.
- source_word: θάψαι
  chosen: to bury
  lexicon: BDAG
  rationale: Standard infinitive complement after Ἄφες, expressing what the dead are
    left to do.
- source_word: ἑαυτῶν
  chosen: their own
  alternatives:
  - their
  lexicon: BDAG
  rationale: The reflexive pronoun adds emphasis; 'their own' preserves that force
    more clearly than simply 'their.'
- source_word: ἀπελθὼν
  chosen: after going
  alternatives:
  - go
  - as you go
  - having gone
  lexicon: BDAG
  rationale: Aorist participle preceding the main imperative. 'After going' preserves
    the participial sequence in readable English without collapsing it entirely into
    a second imperative.
- source_word: διάγγελλε
  chosen: proclaim
  alternatives:
  - announce
  - report widely
  - declare
  lexicon: BDAG
  rationale: The present imperative calls for ongoing/public declaration. 'Proclaim'
    best captures the heralding sense in kingdom context.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering. 'Kingdom'
    preserves the established biblical expression while still communicating God's
    rule.
