id: LUK.15.30
reference: Luke 15:30
source:
  edition: SBLGNT
  text: ὅτε δὲ ὁ υἱός σου οὗτος ὁ καταφαγών σου τὸν βίον ⸀μετὰ πορνῶν ἦλθεν, ἔθυσας
    αὐτῷ τὸν ⸂σιτευτὸν μόσχον⸃.
translation:
  text: But when this son of yours came, the one who devoured your livelihood with
    prostitutes, you slaughtered the fattened calf for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ate up your estate'; the Greek verb is vivid, literally 'devoured,'
      and the noun can mean means of living, property, or estate.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - Now when
  - But when
  lexicon: BDAG
  rationale: Combines temporal ὅτε ('when') with mildly adversative/continuative δέ.
    'But when' fits the older brother's contrastive complaint in natural English.
- source_word: ὁ υἱός σου οὗτος
  chosen: this son of yours
  alternatives:
  - this your son
  - your son here
  lexicon: BDAG
  rationale: Preserves the demonstrative force and emotional distancing of οὗτος.
    The older brother avoids saying 'my brother'; 'this son of yours' best conveys
    the contempt.
- source_word: ὁ καταφαγών
  chosen: the one who devoured
  alternatives:
  - who consumed
  - who squandered
  - who ate up
  lexicon: BDAG
  rationale: The participle from κατεσθίω is vivid and forceful, literally 'eat down/up.'
    'Devoured' preserves the metaphorical harshness better than the more interpretive
    'squandered,' while remaining idiomatic in English.
- source_word: σου τὸν βίον
  chosen: your livelihood
  alternatives:
  - your life
  - your property
  - your estate
  lexicon: BDAG
  rationale: In this context βίος refers to means of living, possessions, or estate
    rather than biological life. 'Livelihood' captures the sense of the father's substance/resources
    that sustain life. 'Estate' is possible, but 'livelihood' better reflects the
    lexical range and the son's destructive consumption.
- source_word: μετὰ πορνῶν
  chosen: with prostitutes
  alternatives:
  - with harlots
  lexicon: BDAG
  rationale: πόρνη means 'prostitute.' 'With prostitutes' is clear, contemporary,
    and direct. This also preserves the older brother's accusation without softening
    it.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - returned
  - arrived
  lexicon: BDAG
  rationale: The Greek simply says 'came.' Although the narrative context implies
    return, 'came' avoids adding interpretive nuance not explicit in this clause.
- source_word: ἔθυσας
  chosen: you slaughtered
  alternatives:
  - you killed
  - you sacrificed
  lexicon: BDAG
  rationale: θύω here refers to slaughtering an animal for a meal/feast. 'Slaughtered'
    is more precise than 'killed' and avoids the cultic overtones that 'sacrificed'
    might wrongly suggest in this context.
- source_word: τὸν σιτευτὸν μόσχον
  chosen: the fattened calf
  alternatives:
  - the fattened young bull
  - the stall-fed calf
  lexicon: BDAG
  rationale: This is the standard and accurate rendering for a specially fattened
    calf prepared for a celebratory meal. It is both precise and natural in English.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - for this one
  - for your son
  lexicon: BDAG
  rationale: 'The dative here is naturally rendered as beneficiary: the calf was slaughtered
    for his benefit, i.e., in his honor.'
