theological_decisions:
- issue: Whether to render the older brother's accusation as established fact or as
    accusation
  chosen_reading: Retain the accusation straightforwardly in the main text without
    adding qualifiers
  alternative_readings:
  - who allegedly devoured your livelihood with prostitutes
  - after wasting your property in immoral living
  rationale: The Greek presents the older brother's speech as his own charge, not
    as narrator-confirmed detail in this verse. English can preserve this simply by
    translating his words directly, without inserting 'allegedly' or harmonizing with
    v. 13. This preserves narrative tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
