theological_decisions:
- issue: Whether to interpret 'heaven' as an explicit substitution for God in the
    main text
  chosen_reading: 'Retain ''heaven'' in the main text: ''I have sinned against heaven
    and before you'''
  alternative_readings:
  - I have sinned against God and against you
  rationale: The Greek uses οὐρανός, likely as a reverential circumlocution for God,
    but the translation philosophy prioritizes original-language primacy and preserving
    theological tension rather than resolving it. Keeping 'heaven' lets readers see
    the idiom while still understanding the son's confession in relation to God and
    his father.
  doctrine_reference: Translation philosophy §§1, 3
