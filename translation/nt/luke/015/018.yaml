id: LUK.15.18
reference: Luke 15:18
source:
  edition: SBLGNT
  text: ἀναστὰς πορεύσομαι πρὸς τὸν πατέρα μου καὶ ἐρῶ αὐτῷ· Πάτερ, ἥμαρτον εἰς τὸν
    οὐρανὸν καὶ ἐνώπιόν σου,
translation:
  text: I will get up and go to my father, and I will say to him, ‘Father, I have
    sinned against heaven and before you,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against God'; 'heaven' here likely functions as a reverential way of
      referring to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: I will get up
  alternatives:
  - after getting up
  - rising
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main future verb, expressing the first
    action in the son''s resolved plan. English idiom naturally renders the participle
    with a finite future coordinated to the next verb: ''I will get up and go.'' ''Get
    up'' is more natural modern English than ''arise'' while preserving the concrete
    movement.'
- source_word: πορεύσομαι
  chosen: go
  alternatives:
  - set out
  - travel
  lexicon: BDAG
  rationale: Future middle of πορεύομαι, here denoting movement toward the father.
    'Go' is the clearest and most natural rendering in context; 'set out' is possible
    but adds a nuance of departure not explicit in the Greek.
- source_word: πρὸς τὸν πατέρα μου
  chosen: to my father
  alternatives:
  - toward my father
  lexicon: BDAG
  rationale: πρός with the accusative commonly indicates movement toward or to a person.
    In this context of intended arrival and speech, 'to my father' is idiomatic and
    sufficient.
- source_word: ἐρῶ αὐτῷ
  chosen: I will say to him
  alternatives:
  - I will tell him
  lexicon: BDAG
  rationale: Future of λέγω with dative indirect object. 'Say to him' is slightly
    more formal and closer to the Greek than 'tell him,' which can imply fuller narration.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My father
  lexicon: BDAG
  rationale: Vocative direct address. 'Father' preserves the son's personal address
    without adding the possessive, which is not present in the vocative form here.
- source_word: ἥμαρτον
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: Aorist indicative of ἁμαρτάνω. In English confession formulae, the present-perfect
    'I have sinned' best conveys a completed act with present moral relevance, matching
    the son's acknowledgment.
- source_word: εἰς τὸν οὐρανὸν
  chosen: against heaven
  alternatives:
  - against God
  - toward heaven
  lexicon: BDAG
  rationale: This is a reverential Jewish circumlocution in which 'heaven' stands
    for God. The idiom 'sin against heaven' is well established in English and preserves
    the source expression without flattening it to an interpretive substitution like
    'against God.'
- source_word: ἐνώπιόν σου
  chosen: before you
  alternatives:
  - in your sight
  - against you
  lexicon: BDAG
  rationale: ἐνώπιον with genitive means 'before, in the presence of, in the sight
    of.' 'Before you' is concise and preserves the relational and judicial sense.
    'Against you' would over-assimilate it to the previous phrase and lose the distinct
    wording.
