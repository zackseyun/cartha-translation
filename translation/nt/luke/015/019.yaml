theological_decisions:
- issue: Status language in the son's confession
  chosen_reading: Retain 'worthy' and 'son' without softening the filial and honor-shame
    dimensions.
  alternative_readings:
  - I no longer deserve to be called your child
  rationale: The verse expresses the son's perceived unworthiness to retain filial
    status, not a generalized feeling of shame alone. Preserving 'son' and 'worthy'
    keeps the relational and social force of the Greek without importing doctrinal
    conclusions beyond the text.
  doctrine_reference: Translation philosophy §§3-4
