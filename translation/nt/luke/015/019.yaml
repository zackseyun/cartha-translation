id: LUK.15.19
reference: Luke 15:19
source:
  edition: SBLGNT
  text: ⸀οὐκέτι εἰμὶ ἄξιος κληθῆναι υἱός σου· ποίησόν με ὡς ἕνα τῶν μισθίων σου.
translation:
  text: I am no longer worthy to be called your son. Make me like one of your hired
    workers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of your hired servants' or 'one of your wage laborers.' The Greek
      refers to paid workers rather than household slaves.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed status from the speaker's
    prior condition. 'No longer' is natural modern English and preserves the force.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - fit
  - deserving
  lexicon: BDAG
  rationale: '''Worthy'' best matches the moral/social sense of being deserving of
    a status. It is the established and most precise rendering here.'
- source_word: κληθῆναι
  chosen: to be called
  alternatives:
  - to be named
  lexicon: BDAG
  rationale: The passive infinitive of καλέω here refers to being designated or regarded
    as something. 'To be called' preserves both the literal wording and the idiomatic
    sense.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: The Greek is specifically masculine singular and refers to the filial
    relationship in the parable. Per gender-accurate policy, 'son' should be retained
    rather than neutralized to 'child'.
- source_word: ποίησόν
  chosen: Make
  alternatives:
  - appoint
  - treat
  lexicon: BDAG
  rationale: The aorist imperative asks the father to cause him to assume a new status.
    'Make' is the most direct rendering; 'treat' is interpretive and weaker than the
    Greek.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Here ὡς introduces comparison rather than identity. 'Like one of' communicates
    the comparative force more naturally in English than 'as one of,' while preserving
    the son's request for lowered status.
- source_word: ἕνα τῶν μισθίων
  chosen: one of your hired workers
  alternatives:
  - one of your hired servants
  - one of your wage laborers
  lexicon: BDAG
  rationale: μίσθιος denotes a hired worker paid wages, distinct from a household
    slave/servant. 'Hired workers' best conveys the economic and social distinction
    in accessible modern English. 'Hired servants' is traditional but can blur the
    wage-based nuance.
