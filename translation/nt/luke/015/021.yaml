theological_decisions:
- issue: Meaning of 'heaven' in the confession
  chosen_reading: Treat 'against heaven' as a reverential circumlocution for sin against
    God while translating it literally.
  alternative_readings:
  - Render interpretively as 'against God'
  rationale: The Greek says 'against heaven,' and the translation philosophy prioritizes
    original-language primacy while avoiding unnecessary paraphrase. The idiom should
    be preserved in the main text rather than resolved into an explicit theological
    interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Extent of the son's speech in this verse
  chosen_reading: End the son's statement with 'your son' as in the SBLGNT text.
  alternative_readings:
  - Include the longer continuation 'Treat me as one of your hired servants' from
    the fuller form reflected in Luke 15:19 and some manuscript traditions
  rationale: The provided source text ends the speech here, so the draft follows that
    text. A textual-variant footnote preserves awareness of the longer reading without
    importing it into the main text.
  doctrine_reference: Translation philosophy §1, §3
