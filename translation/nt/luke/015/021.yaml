id: LUK.15.21
reference: Luke 15:21
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸂ὁ υἱὸς αὐτῷ⸃· Πάτερ, ἥμαρτον εἰς τὸν οὐρανὸν καὶ ἐνώπιόν σου, ⸀οὐκέτι
    εἰμὶ ἄξιος κληθῆναι υἱός ⸀σου.
translation:
  text: But the son said to him, ‘Father, I have sinned against heaven and before
    you. I am no longer worthy to be called your son.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'against heaven' uses 'heaven' as a reverential way of referring to
      God; some translations render it interpretively as 'against God.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts continue the son's speech with words equivalent to 'Treat
      me as one of your hired servants,' harmonizing with v. 19; the SBLGNT text ends
      the sentence at 'your son.'
    reason: textual_variant
lexical_decisions:
- source_word: εἶπεν δὲ
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  - Now ... said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the narrative turn and contrasts
    the son's speech with the father's prior action without overstating the connection.
- source_word: ὁ υἱὸς αὐτῷ
  chosen: the son said to him
  alternatives:
  - his son said to him
  - the son said to the father
  lexicon: BDAG
  rationale: The article with υἱός naturally yields 'the son' in this narrative context.
    αὐτῷ is retained as 'to him' rather than replacing it with 'to the father,' preserving
    the Greek wording while remaining clear.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My father
  lexicon: BDAG
  rationale: Vocative πατήρ is directly and naturally rendered 'Father.' Adding 'my'
    would go beyond the explicit Greek.
- source_word: ἥμαρτον
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: The aorist is rendered idiomatically in English as 'I have sinned' in
    a confession formula, matching natural English and the son's acknowledgment of
    completed guilt with present relevance.
- source_word: εἰς τὸν οὐρανὸν
  chosen: against heaven
  alternatives:
  - against Heaven
  - toward heaven
  lexicon: BDAG
  rationale: This is a Jewish reverential circumlocution for God. 'Against heaven'
    is the established and semantically accurate idiom in English. Lowercase 'heaven'
    is preferred here because the phrase is idiomatic rather than a direct proper-name
    usage.
- source_word: καὶ ἐνώπιόν σου
  chosen: and before you
  alternatives:
  - and in your sight
  - and against you
  lexicon: BDAG
  rationale: ἐνώπιον literally means 'before, in the presence of.' 'Before you' preserves
    the relational and spatial nuance better than the more interpretive 'against you,'
    while still conveying personal offense.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the adverb in contemporary English.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - fit
  - deserving
  lexicon: BDAG
  rationale: '''Worthy'' best matches the moral and relational sense in this penitential
    context.'
- source_word: κληθῆναι
  chosen: to be called
  alternatives:
  - to be named
  lexicon: BDAG
  rationale: The passive infinitive of καλέω is most naturally 'to be called'; 'named'
    is possible but less idiomatic in this filial context.
- source_word: υἱός σου
  chosen: your son
  alternatives:
  - a son of yours
  lexicon: BDAG
  rationale: The anarthrous predicate noun with possessive is naturally rendered 'your
    son.' This preserves the familial claim the speaker now feels unworthy to bear.
