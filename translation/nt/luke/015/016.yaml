id: LUK.15.16
reference: Luke 15:16
source:
  edition: SBLGNT
  text: καὶ ἐπεθύμει ⸂γεμίσαι τὴν κοιλίαν αὐτοῦ ἀπὸ⸃ τῶν κερατίων ὧν ἤσθιον οἱ χοῖροι,
    καὶ οὐδεὶς ἐδίδου αὐτῷ.
translation:
  text: And he longed to fill his stomach with the carob pods that the pigs were eating,
    and no one was giving him anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pods'; the Greek term refers specifically to carob pods, commonly used
      as animal fodder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεθύμει
  chosen: longed
  alternatives:
  - desired
  - yearned
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing desire. 'Longed' conveys strong craving
    in natural English without overstating beyond the context.
- source_word: γεμίσαι
  chosen: to fill
  alternatives:
  - to satisfy
  - to stuff
  lexicon: BDAG
  rationale: The infinitive means 'to fill.' 'Satisfy' is more interpretive, while
    'stuff' is too colloquial. 'To fill' preserves the concrete imagery.
- source_word: τὴν κοιλίαν αὐτοῦ
  chosen: his stomach
  alternatives:
  - his belly
  - his abdomen
  lexicon: BDAG
  rationale: κοιλία here refers to the stomach/belly as the seat of hunger. 'Stomach'
    is clearer and more natural in modern English than 'belly,' while retaining the
    physical sense.
- source_word: ἀπὸ τῶν κερατίων
  chosen: with the carob pods
  alternatives:
  - from the pods
  - with the pods
  - with the carob beans
  lexicon: BDAG
  rationale: κεράτια refers to carob pods, a known feed for animals. Specifying 'carob
    pods' makes the referent clear for modern readers. 'With' fits English idiom with
    'fill his stomach,' though the Greek preposition is literally 'from.'
- source_word: κερατίων
  chosen: carob pods
  alternatives:
  - pods
  - carob beans
  lexicon: BDAG
  rationale: The term denotes the pods of the carob tree, commonly used as fodder.
    'Carob pods' is precise and readable.
- source_word: οἱ χοῖροι
  chosen: the pigs
  alternatives:
  - the swine
  - the hogs
  lexicon: BDAG
  rationale: '''Pigs'' is the most natural contemporary equivalent. ''Swine'' is more
    formal/literary.'
- source_word: ἤσθιον
  chosen: were eating
  alternatives:
  - ate
  - used to eat
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing action in the scene. 'Were eating'
    captures that progressive sense.
- source_word: οὐδεὶς ἐδίδου αὐτῷ
  chosen: no one was giving him anything
  alternatives:
  - no one gave him anything
  - no one was giving to him
  lexicon: BDAG
  rationale: The imperfect ἐδίδου suggests continued lack of provision, not merely
    a single refusal. Adding 'anything' makes explicit the implied object in idiomatic
    English.
