id: LUK.15.17
reference: Luke 15:17
source:
  edition: SBLGNT
  text: εἰς ἑαυτὸν δὲ ἐλθὼν ⸀ἔφη· Πόσοι μίσθιοι τοῦ πατρός μου ⸀περισσεύονται ἄρτων,
    ἐγὼ δὲ ⸂λιμῷ ὧδε⸃ ἀπόλλυμαι·
translation:
  text: But when he came to himself, he said, ‘How many of my father’s hired workers
    have more than enough bread, but here I am perishing with hunger!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he came to his senses.' The Greek literally says 'when he came
      to himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have bread to spare.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I am dying from hunger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἑαυτὸν ... ἐλθὼν
  chosen: when he came to himself
  alternatives:
  - when he came to his senses
  - coming to himself
  lexicon: BDAG
  rationale: Idiomatic expression meaning a return to clear self-awareness or sober
    realization. 'Came to himself' preserves the Greek image and the narrative force
    better than the more interpretive 'came to his senses.'
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: Aorist narrative verb is naturally rendered as simple past in English.
- source_word: μίσθιοι
  chosen: hired workers
  alternatives:
  - hired servants
  - day laborers
  lexicon: BDAG
  rationale: Refers to wage-earning laborers rather than household slaves. 'Hired
    workers' is clear modern English and distinguishes them from δοῦλοι.
- source_word: περισσεύονται ἄρτων
  chosen: have more than enough bread
  alternatives:
  - abound in bread
  - have bread to spare
  lexicon: BDAG
  rationale: The verb indicates abundance or surplus; the genitive with ἄρτων conveys
    plentiful food. 'Have more than enough bread' is natural English while preserving
    the idea of surplus provision.
- source_word: ἄρτων
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: Bread is the concrete term in the Greek and should be retained rather
    than generalized to 'food,' though the sense implies sustenance.
- source_word: λιμῷ
  chosen: with hunger
  alternatives:
  - from hunger
  - in famine
  lexicon: BDAG
  rationale: Here λιμός denotes hunger/starvation rather than the broader circumstance
    of a famine. The dative is well represented by 'with hunger' in idiomatic English.
- source_word: ὧδε
  chosen: here I am
  alternatives:
  - here
  - in this place
  lexicon: BDAG
  rationale: The adverb marks his present miserable situation. 'Here I am' brings
    out the contrast with the hired workers and fits the exclamatory tone.
- source_word: ἀπόλλυμαι
  chosen: I am perishing
  alternatives:
  - I am dying
  - I am being ruined
  lexicon: BDAG
  rationale: The present middle/passive conveys ongoing ruin or destruction. 'I am
    perishing' preserves the severity without over-specifying literal death.
