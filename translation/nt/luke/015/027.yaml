id: LUK.15.27
reference: Luke 15:27
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ ὅτι Ὁ ἀδελφός σου ἥκει, καὶ ἔθυσεν ὁ πατήρ σου τὸν μόσχον
    τὸν σιτευτόν, ὅτι ὑγιαίνοντα αὐτὸν ἀπέλαβεν.
translation:
  text: He said to him, “Your brother has come, and your father slaughtered the fattened
    calf, because he received him back safe and sound.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'healthy.' The Greek participle ὑγιαίνοντα can mean 'being healthy' or,
      in context, more broadly 'safe and sound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥκει
  chosen: has come
  alternatives:
  - has arrived
  - is here
  lexicon: BDAG
  rationale: Perfective-present force of ἥκω in context indicates arrival with present
    result. 'Has come' is natural English that preserves the sense that the brother
    is now present.
- source_word: ἔθυσεν
  chosen: slaughtered
  alternatives:
  - killed
  - sacrificed
  lexicon: BDAG
  rationale: θύω literally refers to slaughtering, often for sacrifice or festal preparation.
    In this parable's meal context, 'slaughtered' is more precise than the generic
    'killed' and avoids implying a formal cultic sacrifice with 'sacrificed'.
- source_word: μόσχον τὸν σιτευτόν
  chosen: the fattened calf
  alternatives:
  - the fattened young bull
  - the stall-fed calf
  lexicon: BDAG
  rationale: This is the idiomatic expression for a specially fattened animal reserved
    for celebration. 'The fattened calf' is both accurate and natural English.
- source_word: ὑγιαίνοντα
  chosen: safe and sound
  alternatives:
  - healthy
  - well
  lexicon: BDAG
  rationale: The participle means being healthy or sound. In the context of a family
    member's return, English idiom 'safe and sound' captures both physical well-being
    and the father's relief better than the narrower 'healthy,' while still fitting
    the semantic range.
- source_word: ἀπέλαβεν
  chosen: received him back
  alternatives:
  - got him back
  - received him
  lexicon: BDAG
  rationale: ἀπολαμβάνω here conveys receiving back or recovering someone. 'Received
    him back' preserves the restorative nuance better than simply 'received him'.
- source_word: ὁ δὲ εἶπεν αὐτῷ ὅτι
  chosen: He said to him,
  alternatives:
  - But he said to him that
  - And he told him,
  lexicon: BDAG
  rationale: δέ is lightly connective here and need not be represented with an explicit
    'but' in smooth English. The following ὅτι introduces direct discourse, best rendered
    with quotation marks rather than a wooden 'that'.
