theological_decisions:
- issue: Familial address in the father's reply
  chosen_reading: Render τέκνον as 'Child' rather than 'Son'
  alternative_readings:
  - Son
  - My son
  rationale: Theologically and narratively, the father's affectionate address is important,
    but the translation should not sharpen the wording beyond the Greek. Since τέκνον
    is broader than υἱός and emphasizes relationship and tenderness, 'Child' best
    preserves the source text's nuance while avoiding unnecessary doctrinal or emotional
    overstatement.
  doctrine_reference: Translation philosophy §§1, 6
