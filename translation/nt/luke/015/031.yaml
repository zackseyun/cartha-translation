id: LUK.15.31
reference: Luke 15:31
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ· Τέκνον, σὺ πάντοτε μετ’ ἐμοῦ εἶ, καὶ πάντα τὰ ἐμὰ σά ἐστιν·
translation:
  text: And he said to him, ‘Child, you are always with me, and all that is mine is
    yours.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Son.' The Greek says 'Child,' an affectionate familial address.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: BDAG
  rationale: Vocative τέκνον is an affectionate familial address meaning 'child.'
    'Child' preserves the tenderness of the father's speech without adding the explicit
    male term 'son,' which the Greek does not use here, even though the addressee
    is male in context. 'My child' would make the affection more explicit but adds
    a possessive not present in the Greek.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: πάντοτε straightforwardly means 'always' or 'at all times.' 'Always'
    is the most natural modern English equivalent and fits the father's ongoing relationship
    with the elder son.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - by my side
  lexicon: BDAG
  rationale: μετά with the genitive denotes association or accompaniment. 'With me'
    is the direct and idiomatic rendering.
- source_word: πάντα τὰ ἐμὰ
  chosen: all that is mine
  alternatives:
  - all my things
  - everything that is mine
  lexicon: BDAG
  rationale: The neuter plural phrase refers comprehensively to the father's possessions
    or estate. 'All that is mine' is idiomatic English that preserves the totalizing
    sense without sounding awkward.
- source_word: σά ἐστιν
  chosen: is yours
  alternatives:
  - belongs to you
  lexicon: BDAG
  rationale: The predicate adjective σά means 'yours.' 'Is yours' closely follows
    the Greek structure and leaves the exact legal or relational nuance appropriately
    broad within the parable.
- source_word: ὁ δὲ εἶπεν αὐτῷ
  chosen: And he said to him
  alternatives:
  - But he said to him
  lexicon: BDAG
  rationale: δέ often marks mild contrast or continuation. In English narrative here,
    'And he said to him' reads naturally while still carrying the discourse forward
    from the son's complaint. 'But' is possible, but the contrast is not strong enough
    to require it.
