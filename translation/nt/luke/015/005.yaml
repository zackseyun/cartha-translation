id: LUK.15.5
reference: Luke 15:5
source:
  edition: SBLGNT
  text: καὶ εὑρὼν ἐπιτίθησιν ἐπὶ τοὺς ὤμους ⸀αὐτοῦ χαίρων,
translation:
  text: And when he has found it, he lays it on his shoulders, rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the lost sheep from the preceding context.
    reason: cross_reference
lexical_decisions:
- source_word: εὑρὼν
  chosen: when he has found it
  alternatives:
  - having found it
  - after finding it
  lexicon: BDAG
  rationale: Aorist active participle, nominative masculine singular, modifying the
    implied subject ('he'). In English, a temporal clause is more natural than a bare
    participial construction. The object 'it' is supplied from the immediate context
    of the lost sheep in the preceding verse.
- source_word: ἐπιτίθησιν
  chosen: he lays
  alternatives:
  - he places
  - he puts
  lexicon: BDAG
  rationale: Present active indicative gives the main action. 'Lays' is idiomatic
    with the following phrase 'on his shoulders' and preserves the vividness of the
    shepherd's action better than the more generic 'puts' or 'places'.
- source_word: ἐπὶ τοὺς ὤμους
  chosen: on his shoulders
  alternatives:
  - upon his shoulders
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates movement onto or placement upon.
    'On his shoulders' is natural modern English and accurately reflects the plural
    noun ὤμους.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: Genitive singular pronoun referring to the shepherd, not the sheep. English
    possessive 'his' is the straightforward rendering in this construction.
- source_word: χαίρων
  chosen: rejoicing
  alternatives:
  - while rejoicing
  - joyfully
  lexicon: BDAG
  rationale: Present active participle expresses accompanying manner or circumstance.
    'Rejoicing' preserves the participial force and keeps the emotional emphasis without
    over-paraphrasing into an adverb.
