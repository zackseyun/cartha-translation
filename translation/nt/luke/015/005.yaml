theological_decisions:
- issue: Supplying the direct object in English
  chosen_reading: Included 'it' after 'found' to refer to the lost sheep from context.
  alternative_readings:
  - And when he has found, he lays on his shoulders, rejoicing.
  rationale: Greek can leave the object implicit where context makes it obvious; English
    normally requires it for clarity. The supplied object does not add theology or
    alter meaning, but makes the sentence intelligible and faithful to the immediate
    context of the parable.
  doctrine_reference: Translation philosophy §1, §6
