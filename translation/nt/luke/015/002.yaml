id: LUK.15.2
reference: Luke 15:2
source:
  edition: SBLGNT
  text: καὶ διεγόγγυζον οἵ ⸀τε Φαρισαῖοι καὶ οἱ γραμματεῖς λέγοντες ὅτι Οὗτος ἁμαρτωλοὺς
    προσδέχεται καὶ συνεσθίει αὐτοῖς.
translation:
  text: And both the Pharisees and the scribes were grumbling, saying, “This man welcomes
    sinners and eats with them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receives sinners and eats with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεγόγγυζον
  chosen: were grumbling
  alternatives:
  - were complaining
  - were murmuring
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action, best conveyed with
    'were grumbling.' 'Grumbling' preserves the negative, muttering nuance of διαγογγύζω
    better than the flatter 'complaining.'
- source_word: οἵ τε Φαρισαῖοι καὶ οἱ γραμματεῖς
  chosen: both the Pharisees and the scribes
  alternatives:
  - the Pharisees and the scribes
  lexicon: BDAG
  rationale: The correlative force of τε ... καί is brought out with 'both ... and
    ...' rather than omitted. 'Scribes' is the standard rendering of γραμματεῖς in
    the Gospel context.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered 'saying' in English without overcomplicating the syntax.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: In context, the demonstrative is slightly dismissive or distancing. 'This
    man' captures that tone better than the more neutral 'he' or the wooden 'this
    one.'
- source_word: ἁμαρτωλοὺς
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The substantival adjective is idiomatically rendered 'sinners.' This
    preserves the social-religious category implied in the accusation.
- source_word: προσδέχεται
  chosen: welcomes
  alternatives:
  - receives
  - accepts
  lexicon: BDAG
  rationale: '''Welcomes'' communicates more naturally in modern English the sense
    of receiving people favorably. ''Receives'' is more formal but less idiomatic
    here; ''accepts'' risks importing modern psychological connotations.'
- source_word: συνεσθίει αὐτοῖς
  chosen: eats with them
  alternatives:
  - shares meals with them
  - dines with them
  lexicon: BDAG
  rationale: The compound verb with dative indicates table fellowship. 'Eats with
    them' is clear, direct, and preserves the social significance without paraphrasing
    beyond the Greek.
