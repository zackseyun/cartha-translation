theological_decisions:
- issue: Social and theological force of Jesus' association with sinners
  chosen_reading: Render the accusation in straightforward terms without softening
    the scandal of table fellowship.
  alternative_readings:
  - This one receives sinners and eats with them
  rationale: The verse presents the Pharisees' complaint about Jesus' welcome of socially
    and religiously marked 'sinners.' The translation should preserve the offense
    implied by shared meals, but not add interpretive language beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
