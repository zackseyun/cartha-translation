id: LUK.15.26
reference: Luke 15:26
source:
  edition: SBLGNT
  text: καὶ προσκαλεσάμενος ἕνα τῶν παίδων ἐπυνθάνετο τί ⸀ἂν εἴη ταῦτα·
translation:
  text: And calling one of the servants, he asked what these things might be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what this might mean.' The Greek more literally says, 'what these things
      might be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: calling
  alternatives:
  - summoning
  - calling over
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι, indicating that he called someone
    to himself before asking. 'Calling' is natural modern English and preserves the
    participial sequence without overtranslating.
- source_word: παίδων
  chosen: servants
  alternatives:
  - servant-boys
  - household servants
  - children
  lexicon: BDAG
  rationale: παῖς can mean 'child' or 'servant,' but in this household setting and
    with one being summoned to explain the celebration, 'servants' best fits the context.
    'Children' would be misleading here.
- source_word: ἐπυνθάνετο
  chosen: he asked
  alternatives:
  - he inquired
  - he was asking
  lexicon: BDAG
  rationale: Imperfect middle of πυνθάνομαι conveys inquiry. 'He asked' is idiomatic
    English; the imperfect nuance is not strongly foregrounded in this context, though
    'was asking' is possible.
- source_word: τί ἂν εἴη ταῦτα
  chosen: what these things might be
  alternatives:
  - what this might mean
  - what these things were
  lexicon: BDAG
  rationale: The construction τί ἂν εἴη expresses an indirect question with potential
    nuance. 'What these things might be' preserves the Greek wording and uncertainty
    better than the more interpretive 'what this might mean.'
