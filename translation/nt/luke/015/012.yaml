id: LUK.15.12
reference: Luke 15:12
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ νεώτερος αὐτῶν τῷ πατρί· Πάτερ, δός μοι τὸ ἐπιβάλλον μέρος τῆς
    οὐσίας· ⸂ὁ δὲ⸃ διεῖλεν αὐτοῖς τὸν βίον.
translation:
  text: And the younger of them said to his father, ‘Father, give me the share of
    the estate that falls to me.’ So he divided his livelihood between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the portion of the property that belongs to me' or 'the share due me.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'his life/livelihood' (βίον), referring here to the father's property
      or means of living.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεώτερος
  chosen: the younger
  alternatives:
  - the younger son
  - the younger one
  lexicon: BDAG
  rationale: 'Comparative adjective functioning substantivally: ''the younger [one]''.
    ''Son'' is implied by context but not explicit here, so ''the younger'' best preserves
    the Greek while remaining natural English.'
- source_word: δός μοι
  chosen: give me
  alternatives:
  - give to me
  lexicon: BDAG
  rationale: Aorist imperative of δίδωμι with dative pronoun; straightforward request/command.
    'Give me' is idiomatic modern English.
- source_word: τὸ ἐπιβάλλον μέρος
  chosen: the share ... that falls to me
  alternatives:
  - the portion that belongs to me
  - the part that is coming to me
  - the share due me
  lexicon: BDAG
  rationale: The participle ἐπιβάλλον conveys what falls to or is due to someone.
    Rendering it with a relative clause preserves the sense of allotted entitlement
    without sounding wooden.
- source_word: οὐσία
  chosen: estate
  alternatives:
  - property
  - wealth
  - substance
  lexicon: BDAG
  rationale: In this inheritance context, οὐσία refers to property/assets. 'Estate'
    best fits the legal-familial setting and reads naturally in English.
- source_word: διεῖλεν
  chosen: divided
  alternatives:
  - distributed
  - apportioned
  lexicon: BDAG
  rationale: Aorist of διαιρέω means to divide or distribute. 'Divided' is the most
    direct rendering and fits the narrative action.
- source_word: αὐτοῖς
  chosen: between them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Although formally dative plural 'to them,' the context is division of
    property among the two sons. 'Between them' makes explicit in idiomatic English
    what the Greek implies.
- source_word: βίον
  chosen: his livelihood
  alternatives:
  - his property
  - his living
  - his estate
  lexicon: BDAG
  rationale: βίος can denote means of living, possessions, or livelihood. Here it
    refers to the father's living assets/property. 'Livelihood' preserves the sense
    that he divided what sustained his life, not merely abstract wealth.
