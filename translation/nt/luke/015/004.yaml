theological_decisions:
- issue: Representative masculine language in a parabolic question
  chosen_reading: Retain 'man' in the main text
  alternative_readings:
  - person
  rationale: The Greek uses ἄνθρωπος in a masculine singular representative construction.
    Following the doctrine's gender-accurate principle, the translation keeps the
    masculine form rather than neutralizing it, while the context makes clear that
    the example is representative rather than restrictive.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
