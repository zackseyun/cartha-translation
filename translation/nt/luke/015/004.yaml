id: LUK.15.4
reference: Luke 15:4
source:
  edition: SBLGNT
  text: Τίς ἄνθρωπος ἐξ ὑμῶν ἔχων ἑκατὸν πρόβατα καὶ ⸀ἀπολέσας ⸂ἐξ αὐτῶν ἓν⸃ οὐ καταλείπει
    τὰ ἐνενήκοντα ἐννέα ἐν τῇ ἐρήμῳ καὶ πορεύεται ἐπὶ τὸ ἀπολωλὸς ἕως εὕρῃ αὐτό;
translation:
  text: What man among you, having a hundred sheep and losing one of them, does not
    leave the ninety-nine in the open country and go after the lost one until he finds
    it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wilderness.' The Greek term can refer to open country, pastureland,
      or a deserted place.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἄνθρωπος ἐξ ὑμῶν
  chosen: What man among you
  alternatives:
  - Which man among you
  - What person among you
  lexicon: BDAG
  rationale: ἄνθρωπος is grammatically masculine singular and here introduces a representative
    example. Per the doctrine's gender-accurate principle, 'man' is preferred over
    a gender-neutral recasting such as 'person,' while still conveying the generic
    force of the question.
- source_word: ἔχων
  chosen: having
  alternatives:
  - who has
  lexicon: BDAG
  rationale: The present participle is naturally rendered with an English participial
    construction to preserve the flow of the Greek sentence.
- source_word: ἑκατὸν πρόβατα
  chosen: a hundred sheep
  lexicon: BDAG
  rationale: Straightforward numerical and nominal rendering; 'sheep' is the normal
    English equivalent for πρόβατα.
- source_word: ἀπολέσας
  chosen: losing
  alternatives:
  - having lost
  lexicon: BDAG
  rationale: The aorist participle can be rendered 'having lost,' but in idiomatic
    English within this rhetorical question 'losing' reads more naturally while preserving
    the event of one sheep becoming lost. This also avoids implying deliberate destruction,
    which ἀπόλλυμι does not mean in this context.
- source_word: ἐξ αὐτῶν ἓν
  chosen: one of them
  alternatives:
  - one from among them
  lexicon: BDAG
  rationale: This phrase specifies that a single sheep out of the hundred is in view;
    'one of them' is clear and idiomatic.
- source_word: οὐ καταλείπει
  chosen: does not leave
  alternatives:
  - does he not leave
  lexicon: BDAG
  rationale: 'In English rhetorical questions, ''does not leave'' communicates the
    expected positive answer. The sense is not negation of action but a rhetorical
    appeal: of course he leaves the ninety-nine.'
- source_word: τὰ ἐνενήκοντα ἐννέα
  chosen: the ninety-nine
  lexicon: BDAG
  rationale: Standard rendering of the numeral phrase.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the open country
  alternatives:
  - in the wilderness
  - in the pastureland
  lexicon: BDAG
  rationale: ἔρημος can mean wilderness, deserted place, or open uncultivated country.
    Here 'open country' best fits a shepherding setting in readable modern English
    and avoids suggesting an absolute abandonment in a barren desert. 'Wilderness'
    remains a viable alternative and is preserved in a footnote.
- source_word: πορεύεται ἐπὶ
  chosen: go after
  alternatives:
  - goes to
  - goes after in search of
  lexicon: BDAG
  rationale: The combination conveys movement directed toward the lost sheep with
    the purpose of pursuit/search. 'Go after' is concise and idiomatic.
- source_word: τὸ ἀπολωλός
  chosen: the lost one
  alternatives:
  - the lost sheep
  - that which is lost
  lexicon: BDAG
  rationale: The perfect participle from ἀπόλλυμι denotes the sheep in its lost condition.
    'The lost one' preserves the substantival participle while keeping the referent
    clear from context. 'The lost sheep' would be slightly more explicit but less
    formally aligned with the Greek wording.
- source_word: ἕως εὕρῃ αὐτό
  chosen: until he finds it
  alternatives:
  - until he finds that one
  lexicon: BDAG
  rationale: A natural rendering of the temporal clause; 'it' clearly refers back
    to the lost sheep.
