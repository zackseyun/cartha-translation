theological_decisions:
- issue: Generic or specific force of Ἄνθρωπός τις
  chosen_reading: A certain man
  alternative_readings:
  - A man
  rationale: The phrase introduces a parabolic character with slight individuation.
    Retaining 'certain' reflects the Greek indefinite τις without importing extra
    symbolism or allegory.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
    and §6 (Readable modern English)
