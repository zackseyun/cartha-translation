id: LUK.15.11
reference: Luke 15:11
source:
  edition: SBLGNT
  text: Εἶπεν δέ· Ἄνθρωπός τις εἶχεν δύο υἱούς.
translation:
  text: Then he said, “A certain man had two sons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “A man had two sons.” The Greek phrase includes an indefinite τις, which
      can be represented more fully as “a certain man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: Then he said
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: Aorist of λέγω introducing the next part of Jesus' discourse. Rendered
    with 'said'; 'Then' reflects the discourse progression in natural English when
    combined with δέ.
- source_word: δέ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective marking continuation or transition. 'Then' gives
    smooth narrative/discourse flow in English without overstating contrast.
- source_word: Ἄνθρωπός τις
  chosen: A certain man
  alternatives:
  - A man
  - A certain person
  lexicon: BDAG
  rationale: The indefinite τις adds specificity without identifying the person. 'A
    certain man' preserves that nuance better than the flatter 'a man.' 'Man' is gender-accurate
    because the referent is explicitly male and is the father of 'two sons.'
- source_word: εἶχεν
  chosen: had
  alternatives:
  - was having
  lexicon: BDAG
  rationale: Imperfect of ἔχω here states the circumstance of the parable in idiomatic
    English. Simple past 'had' is the natural narrative rendering.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Straightforward cardinal numeral.
- source_word: υἱούς
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: υἱούς specifically means 'sons,' not the gender-neutral 'children.' This
    follows the gender-accurate principle and preserves the familial detail central
    to the parable.
