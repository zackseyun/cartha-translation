theological_decisions:
- issue: Rendering of δουλεύω in the elder son's speech
  chosen_reading: have been slaving for you
  alternative_readings:
  - have been serving you
  - have worked for you
  rationale: The verse is not making a doctrinal statement about literal slavery but
    portraying the elder son's resentful self-understanding. Because the Greek verb
    belongs to the doulos word-group and carries a strong sense of subordination,
    'slaving' preserves the emotional and rhetorical force better than the softer
    'serving.' This is a contextual application of the doctrine's servant/slave guidance
    rather than a theological claim.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος; Translation philosophy
    items 1 and 5'
