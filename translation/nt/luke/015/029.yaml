id: LUK.15.29
reference: Luke 15:29
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν τῷ πατρὶ ⸀αὐτοῦ· Ἰδοὺ τοσαῦτα ἔτη δουλεύω σοι καὶ οὐδέποτε
    ἐντολήν σου παρῆλθον, καὶ ἐμοὶ οὐδέποτε ἔδωκας ἔριφον ἵνα μετὰ τῶν φίλων μου εὐφρανθῶ·
translation:
  text: But he answered his father, ‘Look, for so many years I have been slaving for
    you, and I never disobeyed your command; yet you never gave me even a young goat
    so that I might celebrate with my friends.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have been serving you.” The Greek verb δουλεύω can mean “serve” or,
      in a stronger sense, “be enslaved / slave.” Here “slaving” reflects the elder
      son’s bitter tone.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered
  alternatives:
  - answered and said
  - replying, said
  lexicon: BDAG
  rationale: Standard Semitic-influenced Greek idiom; concise English 'answered' preserves
    the sense without unnecessary duplication.
- source_word: τῷ πατρὶ αὐτοῦ
  chosen: his father
  alternatives:
  - to his father
  lexicon: BDAG
  rationale: English idiom naturally incorporates the indirect object after 'answered'
    without loss of meaning.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse marker drawing attention; 'Look' is natural modern English
    and preserves the emphatic force better than archaic 'Behold.'
- source_word: τοσαῦτα ἔτη
  chosen: for so many years
  alternatives:
  - these many years
  - so many years
  lexicon: BDAG
  rationale: Idiomatic English expression for duration with the present-tense verb
    δουλεύω.
- source_word: δουλεύω
  chosen: have been slaving
  alternatives:
  - have been serving
  - am serving
  - have worked
  lexicon: BDAG
  rationale: The verb denotes service in a bonded or subordinate sense. In this complaint,
    the elder son's self-description is intentionally harsh and resentful; 'slaving'
    best conveys that force. This aligns with the doctrine's context-dependent handling
    of doulos-family terms.
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - not ever
  lexicon: BDAG
  rationale: Straightforward adverb of negation; 'never' is the natural English equivalent.
- source_word: ἐντολήν σου παρῆλθον
  chosen: disobeyed your command
  alternatives:
  - transgressed your command
  - went against your command
  - passed over your command
  lexicon: BDAG
  rationale: παρέρχομαι with ἐντολή here means to violate or disregard a command.
    'Disobeyed your command' is clear modern English and captures the sense better
    than a more literal but opaque rendering.
- source_word: ἐμοὶ
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered in English as 'me' after 'gave.'
- source_word: ἔδωκας ἔριφον
  chosen: gave me even a young goat
  alternatives:
  - gave me a goat kid
  - gave me a kid
  lexicon: BDAG
  rationale: ἔριφος refers to a young goat. 'Young goat' is clearer for modern readers
    than 'kid,' which can be misunderstood, and 'even' brings out the implied minimization
    in the complaint.
- source_word: ἵνα ... εὐφρανθῶ
  chosen: so that I might celebrate
  alternatives:
  - so that I might rejoice
  - so that I might make merry
  lexicon: BDAG
  rationale: Purpose clause with aorist passive/subjunctive in a deponent-like festive
    sense. 'Celebrate' fits the banquet context and reads naturally in contemporary
    English.
- source_word: μετὰ τῶν φίλων μου
  chosen: with my friends
  alternatives:
  - together with my friends
  lexicon: BDAG
  rationale: Simple accompaniment phrase; concise rendering is sufficient.
