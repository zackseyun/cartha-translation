theological_decisions:
- issue: Potential sacrificial nuance of θύσατε
  chosen_reading: Rendered as a feast-preparation command ('slaughter it') rather
    than explicit sacrificial language.
  alternative_readings:
  - Render as 'sacrifice it' to preserve possible ritual nuance
  rationale: Although θύω can carry sacrificial associations, in the narrative context
    of the father's household celebration the focus is on preparing the animal for
    a communal feast. Using 'sacrifice it' could suggest cultic theology not explicit
    in the text. This preserves the parable's plain sense without denying the verb's
    broader semantic range.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
