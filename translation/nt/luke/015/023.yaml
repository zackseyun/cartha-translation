id: LUK.15.23
reference: Luke 15:23
source:
  edition: SBLGNT
  text: καὶ ⸀φέρετε τὸν μόσχον τὸν σιτευτόν, θύσατε, καὶ φαγόντες εὐφρανθῶμεν,
translation:
  text: And bring the fattened calf, slaughter it, and let us eat and celebrate,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrifice it'; the Greek verb can refer to slaughtering an animal and
      in some contexts carries sacrificial overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρετε
  chosen: bring
  alternatives:
  - bring here
  - bring out
  lexicon: BDAG
  rationale: Imperative plural of φέρω. 'Bring' is the natural English command here;
    'bring here' or 'bring out' are possible contextual expansions but are not required
    by the Greek.
- source_word: μόσχον τὸν σιτευτόν
  chosen: the fattened calf
  alternatives:
  - the fattened young bull
  - the stall-fed calf
  lexicon: BDAG
  rationale: μόσχος denotes a calf/young bovine; σιτευτός means fattened or fed up
    for a special occasion. 'The fattened calf' is idiomatic, accurate, and preserves
    the festive connotation.
- source_word: θύσατε
  chosen: slaughter it
  alternatives:
  - kill it
  - sacrifice it
  lexicon: BDAG
  rationale: θύω can mean slaughter for sacrifice or kill. In this banquet context,
    'slaughter it' best conveys preparation of an animal for a feast without importing
    explicit cultic sacrificial overtones that the parable does not require.
- source_word: φαγόντες
  chosen: eat
  alternatives:
  - having eaten
  - feast
  lexicon: BDAG
  rationale: Aorist participle from ἐσθίω, literally 'having eaten' or 'after eating,'
    but in coordinated imperative-style English it is best rendered smoothly as 'eat'
    before the following hortatory subjunctive. 'Feast' would over-interpret the verb.
- source_word: εὐφρανθῶμεν
  chosen: let us celebrate
  alternatives:
  - let us rejoice
  - let us be merry
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive. The verb denotes rejoicing/celebrating.
    'Celebrate' fits the banquet setting in clear modern English; 'be merry' is traditional
    but archaic, while 'rejoice' is possible but less concrete in this immediate context.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - then ... and
  lexicon: BDAG
  rationale: The repeated καί links the sequence of commands and the final hortatory
    clause. Retaining 'and' preserves the cumulative movement of the father's instructions.
