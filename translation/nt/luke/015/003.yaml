id: LUK.15.3
reference: Luke 15:3
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτοὺς τὴν παραβολὴν ταύτην λέγων·
translation:
  text: 'So he told them this parable, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And he said to them this parable, saying:'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he told
  alternatives:
  - he said
  - he spoke
  lexicon: BDAG
  rationale: Aorist of λέγω introducing direct discourse. 'Told' fits idiomatic English
    when the object is 'this parable,' while still preserving the speech act.
- source_word: δὲ
  chosen: So
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective. 'So' gives a natural narrative transition in
    English here, connecting Jesus' response to the preceding complaint without overstating
    contrast.
- source_word: πρὸς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: πρός with accusative marks the addressees. English can express this naturally
    with the indirect object 'them' after 'told'; the directional nuance is preserved
    in idiomatic form.
- source_word: τὴν παραβολὴν ταύτην
  chosen: this parable
  alternatives:
  - this illustration
  - this figure
  lexicon: BDAG
  rationale: παραβολή is regularly rendered 'parable' in the Synoptics and is the
    established contextual sense here. The demonstrative ταύτην is naturally placed
    before the noun in English.
- source_word: λέγων
  chosen: 'saying:'
  alternatives:
  - 'and said:'
  - 'with these words:'
  lexicon: BDAG
  rationale: The participle introduces the content of the parable. Retaining 'saying:'
    reflects the Greek structure and smoothly introduces the following quotation.
