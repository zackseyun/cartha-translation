id: LUK.15.8
reference: Luke 15:8
source:
  edition: SBLGNT
  text: Ἢ τίς γυνὴ δραχμὰς ἔχουσα δέκα, ἐὰν ἀπολέσῃ δραχμὴν μίαν, οὐχὶ ἅπτει λύχνον
    καὶ σαροῖ τὴν οἰκίαν καὶ ζητεῖ ἐπιμελῶς ἕως ⸀οὗ εὕρῃ;
translation:
  text: Or what woman, having ten drachmas, if she loses one drachma, does not light
    a lamp and sweep the house and search carefully until she finds it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A drachma was a Greek silver coin.
    reason: cultural_note
  - marker: b
    text: Or 'search diligently.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  chosen: Or
  alternatives:
  - Or else
  - Or what
  lexicon: BDAG
  rationale: Introduces the next parallel illustration in Jesus' discourse. 'Or' preserves
    the connective force linking this parable to the preceding one.
- source_word: τίς γυνὴ
  chosen: what woman
  alternatives:
  - which woman
  - what woman among you
  lexicon: BDAG
  rationale: Idiomatic interrogative construction introducing a rhetorical example.
    'What woman' is natural English and preserves the rhetorical setup without importing
    'among you,' which is not present here.
- source_word: δραχμὰς
  chosen: drachmas
  alternatives:
  - silver coins
  - coins
  lexicon: BDAG
  rationale: Kept as 'drachmas' to preserve the specific coin term rather than flattening
    it to a generic 'coins.' This maintains historical specificity; the value can
    be clarified in a footnote if needed.
- source_word: ἔχουσα δέκα
  chosen: having ten
  alternatives:
  - who has ten
  - with ten
  lexicon: BDAG
  rationale: The participial phrase is rendered straightforwardly as 'having ten,'
    preserving the Greek structure while remaining natural in English.
- source_word: ἐὰν ἀπολέσῃ
  chosen: if she loses
  alternatives:
  - if she should lose
  - if she has lost
  lexicon: BDAG
  rationale: Aorist subjunctive with ἐάν expresses a general conditional situation.
    'If she loses' is idiomatic and fits the rhetorical present sequence that follows.
- source_word: δραχμὴν μίαν
  chosen: one drachma
  alternatives:
  - one coin
  - a single drachma
  lexicon: BDAG
  rationale: Preserves both the specific coin term and the emphasis on a single lost
    item.
- source_word: οὐχὶ
  chosen: does not
  alternatives:
  - will she not
  - does she not
  lexicon: BDAG
  rationale: Marks a rhetorical question expecting a positive answer. 'Does not' works
    naturally with the singular subject in English.
- source_word: ἅπτει λύχνον
  chosen: light a lamp
  alternatives:
  - kindle a lamp
  - light the lamp
  lexicon: BDAG
  rationale: ἅπτω here means to ignite or light. 'Light a lamp' is clear modern English.
    The anarthrous λύχνον does not require 'the lamp.'
- source_word: σαροῖ τὴν οἰκίαν
  chosen: sweep the house
  alternatives:
  - sweep the room
  - sweep the home
  lexicon: BDAG
  rationale: οἰκία can mean house/home; 'house' fits the concrete domestic scene,
    and 'sweep' accurately renders σαρόω.
- source_word: ζητεῖ ἐπιμελῶς
  chosen: search carefully
  alternatives:
  - seek diligently
  - look carefully
  lexicon: BDAG
  rationale: '''Search carefully'' is readable modern English and captures the adverb
    ἐπιμελῶς (''carefully, diligently'') without sounding archaic.'
- source_word: ἕως οὗ εὕρῃ
  chosen: until she finds it
  alternatives:
  - until she finds
  - until she should find it
  lexicon: BDAG
  rationale: The clause expresses the endpoint of the search. English naturally supplies
    'it' as the object from context, making the sentence complete and clear.
