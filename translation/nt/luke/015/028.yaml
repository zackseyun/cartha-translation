id: LUK.15.28
reference: Luke 15:28
source:
  edition: SBLGNT
  text: ὠργίσθη δὲ καὶ οὐκ ἤθελεν εἰσελθεῖν. ὁ ⸀δὲ πατὴρ αὐτοῦ ἐξελθὼν παρεκάλει αὐτόν.
translation:
  text: But he became angry and was unwilling to go in. So his father came out and
    pleaded with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not want to go in' or 'refused to go in.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'pleaded' can also be rendered 'urged' or 'entreated';
      the imperfect tense suggests continued appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  chosen: became angry
  alternatives:
  - was angry
  - was enraged
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζομαι here denotes the onset of anger.
    'Became angry' captures the ingressive sense better than the flatter 'was angry,'
    while avoiding the stronger nuance of 'was enraged.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding celebration. 'But' communicates
    the adversative force naturally in English.
- source_word: οὐκ ἤθελεν εἰσελθεῖν
  chosen: was unwilling to go in
  alternatives:
  - did not want to go in
  - refused to go in
  lexicon: BDAG
  rationale: θέλω with infinitive expresses volition. 'Was unwilling to go in' preserves
    the internal volitional sense without overstating it as an explicit act of refusal,
    though 'refused' is contextually possible.
- source_word: ὁ δὲ πατὴρ αὐτοῦ
  chosen: So his father
  alternatives:
  - But his father
  - And his father
  lexicon: BDAG
  rationale: The second δέ introduces the father's responsive action. 'So his father'
    reads smoothly in English and conveys narrative progression from the son's anger
    to the father's response.
- source_word: ἐξελθὼν
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: The participle of ἐξέρχομαι indicates movement outward from the house.
    'Came out' is idiomatic from the narrator's perspective and fits the scene naturally.
- source_word: παρεκάλει
  chosen: pleaded with him
  alternatives:
  - urged him
  - entreated him
  - begged him
  lexicon: BDAG
  rationale: Imperfect of παρακαλέω suggests repeated or continued appeal. In this
    context of a father appealing to an offended son, 'pleaded with him' best conveys
    earnest, ongoing entreaty. 'Urged him' is weaker; 'begged him' may overstate the
    humility implied.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to the older son and is straightforwardly rendered
    'him'.
