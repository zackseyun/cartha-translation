theological_decisions:
- issue: Tone of the father's appeal in the parable
  chosen_reading: Rendered παρακαλέω as 'pleaded with him' to preserve the father's
    gracious, earnest initiative without importing additional doctrinal meaning.
  alternative_readings:
  - urged him
  - entreated him
  rationale: The verse portrays the father's compassionate pursuit of the older son.
    The translation should preserve that relational force while remaining lexical
    rather than interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
