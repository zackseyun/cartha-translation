id: LUK.15.32
reference: Luke 15:32
source:
  edition: SBLGNT
  text: εὐφρανθῆναι δὲ καὶ χαρῆναι ἔδει, ὅτι ὁ ἀδελφός σου οὗτος νεκρὸς ἦν καὶ ⸀ἔζησεν,
    καὶ ⸀ἀπολωλὼς καὶ εὑρέθη.
translation:
  text: But it was necessary to celebrate and rejoice, because this brother of yours
    was dead and has come to life again; he was lost and has been found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it was fitting to celebrate and rejoice.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'lived' or 'came to life'; the phrase is likely metaphorical for restoration
      in the parable.
    reason: lexical_alternative
  - marker: c
    text: Or 'was found.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφρανθῆναι
  chosen: to celebrate
  alternatives:
  - to make merry
  - to be glad
  lexicon: BDAG
  rationale: The aorist passive infinitive here functions idiomatically in an impersonal
    expression with ἔδει, indicating what was fitting or necessary. 'Celebrate' captures
    the festive sense in the parable's banquet context better than the archaic 'make
    merry,' while remaining closer to the source than a looser paraphrase.
- source_word: χαρῆναι
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: Paired with εὐφρανθῆναι, this verb adds a second near-synonymous expression
    for joy. 'Rejoice' preserves the elevated but still readable tone and avoids collapsing
    the double expression into a single English term.
- source_word: ἔδει
  chosen: it was necessary
  alternatives:
  - it was fitting
  - we had to
  lexicon: BDAG
  rationale: The impersonal imperfect conveys moral or situational necessity. 'It
    was necessary' preserves the force of obligation without over-specifying the subject.
    'It was fitting' is possible, but 'necessary' better reflects the stronger force
    of ἔδει in this context.
- source_word: ὁ ἀδελφός σου οὗτος
  chosen: this brother of yours
  alternatives:
  - your brother here
  - this your brother
  lexicon: BDAG
  rationale: This preserves both the demonstrative οὗτος ('this') and the possessive
    σου ('of yours'), reflecting the father's pointed reminder of relationship. The
    English order is adjusted for natural readability.
- source_word: νεκρὸς ἦν
  chosen: was dead
  lexicon: BDAG
  rationale: This is the straightforward predicate expression. In the parable it likely
    carries metaphorical force for estrangement, but the translation should preserve
    the literal wording and let the narrative context convey the figurative sense.
- source_word: ἔζησεν
  chosen: has come to life again
  alternatives:
  - lived again
  - came back to life
  lexicon: BDAG
  rationale: Although the Greek simply says 'lived,' the parable's antithetical pairing
    with 'was dead' naturally yields the sense 'came to life again.' Adding 'again'
    makes explicit the restoration implied by the contrast and matches common English
    idiom without distorting the sense.
- source_word: ἀπολωλὼς
  chosen: was lost
  alternatives:
  - had been lost
  - was ruined
  lexicon: BDAG
  rationale: 'The perfect participle of ἀπόλλυμι here describes a resulting state:
    ''lost.'' This is the established and contextually apt sense in the parable, preferable
    to stronger renderings like ''destroyed'' or ''ruined,'' which would overstate
    the nuance here.'
- source_word: εὑρέθη
  chosen: has been found
  alternatives:
  - was found
  lexicon: BDAG
  rationale: The aorist passive can be rendered simply 'was found,' but 'has been
    found' brings out the present relevance of the restored condition in idiomatic
    English and balances well with 'has come to life again.'
