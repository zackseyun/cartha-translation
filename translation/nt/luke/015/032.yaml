theological_decisions:
- issue: Whether to make explicit the metaphorical/restorative sense of ἔζησεν in
    the parable
  chosen_reading: Rendered as 'has come to life again' rather than the more wooden
    'lived again.'
  alternative_readings:
  - has lived again
  - came back to life
  rationale: The verse is part of the father's interpretive summary of the prodigal's
    return. The language is metaphorical within the parable, not a doctrinal statement
    about bodily resurrection in this immediate context. 'Has come to life again'
    preserves the death/life contrast while communicating restoration clearly in modern
    English.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
