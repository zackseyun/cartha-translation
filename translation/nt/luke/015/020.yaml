id: LUK.15.20
reference: Luke 15:20
source:
  edition: SBLGNT
  text: καὶ ἀναστὰς ἦλθεν πρὸς τὸν πατέρα ⸀ἑαυτοῦ. ἔτι δὲ αὐτοῦ μακρὰν ἀπέχοντος εἶδεν
    αὐτὸν ὁ πατὴρ αὐτοῦ καὶ ἐσπλαγχνίσθη καὶ δραμὼν ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ
    καὶ κατεφίλησεν αὐτόν.
translation:
  text: And he arose and came to his father. But while he was still far away, his
    father saw him and was moved with compassion, and ran and fell on his neck and
    kissed him fervently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was still a long way off.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can imply affectionate intensity, possibly 'kissed him repeatedly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here marking the son's decisive action
    before coming to his father. 'Arose' preserves the narrative sequence more formally
    than 'set out,' which would import the following motion verb.
- source_word: ἦλθεν πρὸς τὸν πατέρα ἑαυτοῦ
  chosen: came to his father
  alternatives:
  - went to his father
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come/go' depending on viewpoint. 'Came to his
    father' is idiomatic in English and fits the relational focus of the clause. ἑαυτοῦ
    is reflexive, naturally rendered 'his' in English.
- source_word: ἔτι δὲ αὐτοῦ μακρὰν ἀπέχοντος
  chosen: while he was still far away
  alternatives:
  - while he was still a long way off
  - while he was still distant
  lexicon: BDAG
  rationale: Genitive absolute expressing contemporaneous circumstance. 'Still far
    away' is clear modern English; 'a long way off' is also strong and traditional,
    but the chosen rendering is slightly more contemporary without loss of sense.
- source_word: ἐσπλαγχνίσθη
  chosen: was moved with compassion
  alternatives:
  - felt compassion
  - had compassion
  lexicon: BDAG
  rationale: This verb denotes deep inward compassion. 'Was moved with compassion'
    preserves the affective force better than the flatter 'had compassion.'
- source_word: δραμὼν
  chosen: ran
  lexicon: BDAG
  rationale: Simple aorist participle of τρέχω; 'ran' is direct and natural.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ
  chosen: fell on his neck
  alternatives:
  - threw his arms around his neck
  - embraced him
  lexicon: BDAG
  rationale: The Greek idiom is literally 'fell upon his neck.' The chosen rendering
    keeps the vividness and imagery of the source. More idiomatic expansions like
    'threw his arms around his neck' are interpretive and go beyond the explicit wording.
- source_word: κατεφίλησεν
  chosen: kissed him fervently
  alternatives:
  - kissed him repeatedly
  - kissed him warmly
  lexicon: BDAG
  rationale: The compound verb καταφιλέω can intensify the action, often suggesting
    repeated or affectionate kissing. 'Kissed him fervently' captures the warmth and
    intensity in readable English without over-specifying repetition.
