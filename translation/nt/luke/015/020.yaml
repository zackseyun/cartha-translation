theological_decisions:
- issue: Portrayal of the father's compassion in the parable
  chosen_reading: Render the father's response in emotionally vivid but non-allegorizing
    language.
  alternative_readings:
  - Use more restrained wording that minimizes emotional intensity
  - Expand the language to make explicit theological symbolism about God
  rationale: The verse itself presents the father's compassionate initiative with
    strong narrative verbs. The translation should preserve that force without importing
    doctrinal interpretation beyond the text. This aligns with preserving theological
    tension and avoiding paraphrastic expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
