id: LUK.15.25
reference: Luke 15:25
source:
  edition: SBLGNT
  text: Ἦν δὲ ὁ υἱὸς αὐτοῦ ὁ πρεσβύτερος ἐν ἀγρῷ· καὶ ὡς ἐρχόμενος ἤγγισεν τῇ οἰκίᾳ,
    ἤκουσεν συμφωνίας καὶ χορῶν,
translation:
  text: Now his older son was in the field; and as he came and drew near to the house,
    he heard music and dancing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instrumental music and dancers.' The Greek terms can refer more specifically
      to musical performance and dancing groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: BDAG
  rationale: δέ here marks a narrative transition. 'Now' gives natural English discourse
    flow without overstating contrast.
- source_word: ὁ υἱὸς αὐτοῦ ὁ πρεσβύτερος
  chosen: his older son
  alternatives:
  - his elder son
  - his eldest son
  lexicon: BDAG
  rationale: πρεσβύτερος is the comparative 'older/elder,' not necessarily the superlative
    'eldest.' 'Older son' is clear modern English and preserves the family contrast
    with the younger son in the parable.
- source_word: ἐν ἀγρῷ
  chosen: in the field
  alternatives:
  - out in the field
  - in the countryside
  lexicon: BDAG
  rationale: ἀγρός refers to a field/farmland. 'In the field' is the most direct rendering;
    the singular works idiomatically in English.
- source_word: ὡς ἐρχόμενος
  chosen: as he came
  alternatives:
  - as he was coming
  - when he came
  lexicon: BDAG
  rationale: The participle with ὡς conveys the circumstance of his approach. 'As
    he came' is concise and natural, preserving the ongoing movement toward the house.
- source_word: ἤγγισεν τῇ οἰκίᾳ
  chosen: drew near to the house
  alternatives:
  - approached the house
  - came near the house
  lexicon: BDAG
  rationale: ἐγγίζω means to come near/approach. 'Drew near' preserves the verbal
    nuance and fits the narrative cadence; 'to the house' reflects the dative complement
    naturally in English.
- source_word: ἤκουσεν
  chosen: he heard
  alternatives:
  - he began to hear
  lexicon: BDAG
  rationale: Simple aorist narrative verb; 'he heard' is sufficient without adding
    ingressive force.
- source_word: συμφωνίας
  chosen: music
  alternatives:
  - instrumental music
  - a symphony
  lexicon: BDAG
  rationale: συμφωνία can denote music, especially instrumental music or musical sound.
    'Music' is the clearest idiomatic rendering here; 'symphony' would be misleadingly
    anachronistic in English.
- source_word: χορῶν
  chosen: dancing
  alternatives:
  - dancers
  - dancing groups
  lexicon: BDAG
  rationale: χορός can refer to a dance or a dancing group/chorus. In this context,
    paired with 'music,' the event sense 'dancing' is the most natural English rendering
    while still covering the presence of dancers.
