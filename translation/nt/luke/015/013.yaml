id: LUK.15.13
reference: Luke 15:13
source:
  edition: SBLGNT
  text: καὶ μετ’ οὐ πολλὰς ἡμέρας συναγαγὼν ⸀πάντα ὁ νεώτερος υἱὸς ἀπεδήμησεν εἰς
    χώραν μακράν, καὶ ἐκεῖ διεσκόρπισεν τὴν οὐσίαν αὐτοῦ ζῶν ἀσώτως.
translation:
  text: And after not many days, the younger son gathered everything together and
    went away to a distant country, and there he squandered his property while living
    recklessly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after a few days.' The Greek expression is literally 'after not many
      days.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his estate' or 'his wealth' for 'his property.'
    reason: lexical_alternative
  - marker: c
    text: Or 'living wastefully' or 'in reckless living.' The text does not specify
      particular sins here, only a dissipated manner of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ’ οὐ πολλὰς ἡμέρας
  chosen: after not many days
  alternatives:
  - a few days later
  - after a few days
  lexicon: BDAG
  rationale: Retains the Greek negated expression with natural English. 'After not
    many days' is slightly more formal and transparent to the source than the idiomatic
    'a few days later,' while still readable.
- source_word: συναγαγὼν πάντα
  chosen: gathered everything together
  alternatives:
  - having gathered all things
  - collected everything
  lexicon: BDAG
  rationale: The participle indicates prior action before departure. 'Everything'
    reflects πάντα broadly; in context it likely refers to converting or assembling
    all that belonged to him for departure. 'Together' preserves the force of συνάγω.
- source_word: ὁ νεώτερος υἱός
  chosen: the younger son
  alternatives:
  - the younger of the sons
  lexicon: BDAG
  rationale: Standard, natural rendering of the comparative adjective with υἱός in
    this narrative context.
- source_word: ἀπεδήμησεν
  chosen: went away
  alternatives:
  - traveled away
  - left home
  - went abroad
  lexicon: BDAG
  rationale: The verb denotes going to a foreign or distant place. 'Went away' is
    clear modern English and avoids the archaic feel of 'went abroad' while fitting
    the following phrase 'to a distant country.'
- source_word: εἰς χώραν μακράν
  chosen: to a distant country
  alternatives:
  - into a far country
  - to a far land
  lexicon: BDAG
  rationale: '''Country'' is idiomatic here for χώρα, and ''distant'' is contemporary
    English for μακράν. ''Far country'' is traditional but less natural in current
    usage.'
- source_word: διεσκόρπισεν
  chosen: squandered
  alternatives:
  - scattered
  - wasted
  - spent wastefully
  lexicon: BDAG
  rationale: Although the verb literally means 'scatter,' in this context of wealth
    it carries the sense of dissipating or squandering resources. 'Squandered' best
    captures the idiomatic force.
- source_word: τὴν οὐσίαν αὐτοῦ
  chosen: his property
  alternatives:
  - his estate
  - his wealth
  - his possessions
  lexicon: BDAG
  rationale: οὐσία here refers to what he owned, his substance or estate. 'Property'
    is broad and natural, avoiding overprecision while matching the context of inherited
    assets.
- source_word: ζῶν ἀσώτως
  chosen: while living recklessly
  alternatives:
  - living wastefully
  - in reckless living
  - in debauchery
  lexicon: BDAG
  rationale: The participle plus adverb describes the manner in which he squandered
    his property. 'Recklessly' captures ἀσώτως without importing the narrower sexual
    connotations of 'debauchery,' which are not explicit in this verse. 'While living'
    preserves the participial construction.
