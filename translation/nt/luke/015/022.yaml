id: LUK.15.22
reference: Luke 15:22
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ πατὴρ πρὸς τοὺς δούλους αὐτοῦ· ⸀Ταχὺ ⸀ἐξενέγκατε στολὴν τὴν πρώτην
    καὶ ἐνδύσατε αὐτόν, καὶ δότε δακτύλιον εἰς τὴν χεῖρα αὐτοῦ καὶ ὑποδήματα εἰς τοὺς
    πόδας,
translation:
  text: But the father said to his slaves, ‘Quickly, bring out the best robe and put
    it on him, and put a ring on his hand and sandals on his feet.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' for 'slaves' (Greek doulous). The term denotes household bondservants/slaves;
      'slaves' is used here to preserve that social reality.
    reason: alternative_reading
  - marker: b
    text: Literally 'the first robe'; idiomatically, likely 'the best robe' or 'the
      foremost robe.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says simply 'a ring'; some understand this as a signet ring symbolizing
      restored status.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  lexicon: BDAG
  rationale: δοῦλος commonly denotes a slave or bonded servant. In this household
    setting, the bonded status is still present and the translation philosophy prefers
    preserving that social reality unless context clearly softens it. 'Slaves' is
    therefore chosen over the more traditional but less precise 'servants'.
- source_word: Ταχὺ
  chosen: Quickly
  alternatives:
  - Quick
  - At once
  lexicon: BDAG
  rationale: Used adverbially here to urge immediate action. 'Quickly' is natural
    modern English and preserves the father's urgency better than the more abrupt
    standalone 'Quick' in a formal translation.
- source_word: ἐξενέγκατε
  chosen: bring out
  alternatives:
  - bring forth
  - carry out
  lexicon: BDAG
  rationale: Aorist imperative plural from ἐκφέρω, here meaning to bring something
    out from inside storage or the house. 'Bring out' is idiomatic and sufficiently
    concrete.
- source_word: στολὴν τὴν πρώτην
  chosen: the best robe
  alternatives:
  - the first robe
  - the finest robe
  lexicon: BDAG
  rationale: Although πρῶτος often means 'first,' in this context with a robe it most
    naturally means the foremost or best robe, likely the robe of highest status.
    'Best robe' communicates the idiomatic sense in clear English better than the
    overly literal 'first robe.'
- source_word: ἐνδύσατε αὐτόν
  chosen: put it on him
  alternatives:
  - clothe him
  - dress him
  lexicon: BDAG
  rationale: The verb means to clothe or dress someone. Because the direct object
    robe has just been mentioned, 'put it on him' is the most natural English continuation
    and preserves the concrete action.
- source_word: δακτύλιον
  chosen: a ring
  alternatives:
  - signet ring
  lexicon: BDAG
  rationale: The noun denotes a ring. While some interpreters infer a signet ring
    symbolizing restored status, the Greek text itself says only 'ring,' so the translation
    should not import that inference into the main text.
- source_word: εἰς τὴν χεῖρα αὐτοῦ
  chosen: on his hand
  alternatives:
  - for his hand
  - upon his hand
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with items of clothing or adornment
    English idiom uses 'on.' This preserves the sense without wooden phrasing.
- source_word: ὑποδήματα
  chosen: sandals
  alternatives:
  - shoes
  lexicon: BDAG
  rationale: The term refers to footwear, especially sandals in the ancient Mediterranean
    context. 'Sandals' is more historically and culturally precise than the generic
    'shoes'.
- source_word: εἰς τοὺς πόδας
  chosen: on his feet
  alternatives:
  - for his feet
  - upon his feet
  lexicon: BDAG
  rationale: As with 'on his hand,' English idiom for clothing/footwear uses 'on his
    feet.' This is a natural rendering of the intended sense.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition from the son's prepared speech
    to the father's interrupting action. 'But' captures that narrative turn more clearly
    than a simple 'And'.
