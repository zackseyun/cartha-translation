theological_decisions:
- issue: Whether to render δούλους as 'slaves' or 'servants'
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: Following the project's doctrine on δοῦλος, the bonded nature should
    be preserved where context allows. In this parable's estate setting, 'slaves'
    better reflects the social reality without making a theological claim beyond the
    text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1'
- issue: Whether πρῶτην in στολὴν τὴν πρώτην should be rendered literally as 'first'
    or idiomatically as 'best'
  chosen_reading: the best robe
  alternative_readings:
  - the first robe
  - the foremost robe
  rationale: The phrase likely refers to the robe of highest rank or quality, not
    merely the first in sequence. 'Best robe' preserves the sense in readable English
    without overinterpreting its symbolic significance.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy on optimal equivalence
    and readable modern English'
- issue: Whether δακτύλιον should be expanded to 'signet ring'
  chosen_reading: a ring
  alternative_readings:
  - a signet ring
  rationale: The narrative may imply restored sonship and authority, but the Greek
    noun itself does not specify a signet ring. The translation therefore keeps the
    lexical value in the main text and leaves stronger symbolic interpretation out
    of the wording.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not
    make'
