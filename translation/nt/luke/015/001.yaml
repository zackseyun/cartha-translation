theological_decisions:
- issue: Social-religious force of 'tax collectors and sinners'
  chosen_reading: Retained the paired categories without interpretive expansion.
  alternative_readings:
  - tax collectors and other outcasts
  - tax collectors and notorious sinners
  rationale: The verse names two recognizable groups in the Gospel context; expanding
    them in the main text would import interpretation beyond the Greek. The plain
    wording preserves the narrative tension without adding doctrinal or sociological
    commentary.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
