id: LUK.15.1
reference: Luke 15:1
source:
  edition: SBLGNT
  text: Ἦσαν δὲ ⸂αὐτῷ ἐγγίζοντες⸃ πάντες οἱ τελῶναι καὶ οἱ ἁμαρτωλοὶ ἀκούειν αὐτοῦ.
translation:
  text: Now all the tax collectors and sinners were drawing near to him to hear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were coming near to him.' The Greek uses an ongoing form, suggesting
      repeated or continual approach.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  chosen: Now ... were
  alternatives:
  - And ... were
  - Then ... were
  lexicon: BDAG
  rationale: Imperfect εἰμί with δέ sets the scene in ongoing past time. 'Now' is
    natural modern English for the discourse transition without over-translating δέ.
- source_word: αὐτῷ ἐγγίζοντες
  chosen: drawing near to him
  alternatives:
  - coming near to him
  - approaching him
  lexicon: BDAG
  rationale: The periphrastic construction (Ἦσαν + present participle) conveys ongoing/repeated
    action. 'Drawing near' preserves the aspect and the slightly marked wording of
    ἐγγίζω better than the flatter 'coming'.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of the
  lexicon: BDAG
  rationale: πάντες modifies the grouped subjects and is naturally rendered 'all,'
    emphasizing the breadth of those coming to Jesus.
- source_word: οἱ τελῶναι
  chosen: the tax collectors
  alternatives:
  - the toll collectors
  - the tax farmers
  lexicon: BDAG
  rationale: τελώναι refers to those collecting taxes/revenues under Roman administration.
    'Tax collectors' is the standard clear English rendering.
- source_word: οἱ ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - the sinners
  lexicon: BDAG
  rationale: Used substantivally for those regarded as sinful or morally disreputable.
    English idiom prefers 'sinners' without repeating the article.
- source_word: ἀκούειν αὐτοῦ
  chosen: to hear him
  alternatives:
  - to listen to him
  lexicon: BDAG
  rationale: The infinitive expresses purpose. Although ἀκούω with genitive can mean
    'hear/listen to,' 'to hear him' is concise and idiomatic while preserving the
    sense of coming to hear his teaching.
