id: LUK.15.10
reference: Luke 15:10
source:
  edition: SBLGNT
  text: οὕτως, λέγω ὑμῖν, ⸂γίνεται χαρὰ⸃ ἐνώπιον τῶν ἀγγέλων τοῦ θεοῦ ἐπὶ ἑνὶ ἁμαρτωλῷ
    μετανοοῦντι.
translation:
  text: In the same way, I tell you, there is joy before the angels of God over one sinner who has a change of mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus' or 'So' at the start of the sentence.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of the angels of God.' The wording does not explicitly
      say that the angels themselves are the ones rejoicing.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - Thus
  - So
  lexicon: BDAG
  rationale: Introduces an analogy/application from the preceding parable. 'In the
    same way' is natural English and preserves the comparative force better than the
    more abrupt 'thus'.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common discourse formula. 'I tell you' is idiomatic modern English
    while retaining the direct address and emphatic transition.
- source_word: γίνεται χαρά
  chosen: there is joy
  alternatives:
  - joy arises
  - joy happens
  - joy comes to be
  lexicon: BDAG
  rationale: γίνομαι with a nominative predicate here expresses occurrence/existence.
    'There is joy' is clear, idiomatic, and captures the sense without woodenness.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - in the sight of
  lexicon: BDAG
  rationale: The preposition denotes presence or sphere before someone. 'Before' is
    concise and natural; 'in the presence of' is possible but heavier.
- source_word: τῶν ἀγγέλων τοῦ θεοῦ
  chosen: the angels of God
  alternatives:
  - God's angels
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'The angels of God' preserves
    the formal phrasing and echoes biblical style without obscurity.
- source_word: ἐπὶ ἑνὶ ἁμαρτωλῷ
  chosen: over one sinner
  alternatives:
  - because of one sinner
  - concerning one sinner
  lexicon: BDAG
  rationale: ἐπί with the dative here marks the occasion or basis for rejoicing. 'Over
    one sinner' is the standard and most natural English expression for joy occasioned
    by someone.
- source_word: μετανοοῦντι
  chosen: who has a change of mind
  alternatives:
  - repenting
  - who is repenting
  lexicon: BDAG
  rationale: The present participle modifies 'sinner' and denotes the sinner in the
    act/state of repentance. Relative clause English is smoother than a bare participle
    here and preserves the verbal force.
