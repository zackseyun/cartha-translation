theological_decisions:
- issue: Meaning of repentance language
  chosen_reading: Render μετανοοῦντι as 'who repents' without expanding it into fuller
    theological explanation.
  alternative_readings:
  - who changes his mind
  - who turns back
  rationale: The verse states heavenly joy over a sinner's repentance but does not
    itself define repentance in doctrinally expanded terms. 'Repents' preserves the
    established biblical concept and theological breadth without reduction or paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Location/agent of the joy
  chosen_reading: Translate ἐνώπιον τῶν ἀγγέλων τοῦ θεοῦ as 'before the angels of
    God' rather than specifying that the angels themselves are rejoicing.
  alternative_readings:
  - among the angels of God
  - the angels of God rejoice
  rationale: The Greek says literally that joy occurs 'before' the angels of God,
    which may imply divine joy in their presence or joy in the heavenly court more
    generally. The translation preserves that nuance rather than narrowing the subject
    of the joy.
  doctrine_reference: Preserve theological tension rather than resolve it.
