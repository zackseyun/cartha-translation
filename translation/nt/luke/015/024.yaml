theological_decisions:
- issue: Metaphorical force of 'dead' and 'come to life again' in the parable
  chosen_reading: Retain the literal life/death language in English without interpretive
    paraphrase.
  alternative_readings:
  - Paraphrase as 'was as good as dead and is alive again spiritually/socially'
  rationale: The father's words are metaphorical within the story, describing the
    son's restoration from alienation, but the text intentionally uses strong death/life
    language. Preserving that tension aligns with the translation philosophy of not
    resolving interpretive force beyond what the Greek states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
