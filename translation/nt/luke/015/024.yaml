id: LUK.15.24
reference: Luke 15:24
source:
  edition: SBLGNT
  text: ὅτι οὗτος ὁ υἱός μου νεκρὸς ἦν καὶ ἀνέζησεν, ⸂ἦν ἀπολωλὼς⸃ καὶ εὑρέθη. καὶ
    ἤρξαντο εὐφραίνεσθαι.
translation:
  text: because this son of mine was dead and has come to life again; he was lost
    and has been found. And they began to celebrate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came to life again' for 'has come to life again.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was found' for 'has been found.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the father's explanation for the celebration. 'Because' is
    the most natural causal connector in modern English here.
- source_word: οὗτος ὁ υἱός μου
  chosen: this son of mine
  alternatives:
  - this my son
  - my son here
  lexicon: BDAG
  rationale: Keeps the demonstrative emphasis of οὗτος while preserving natural English
    word order. 'This son of mine' reflects both affection and emphatic identification.
- source_word: νεκρὸς ἦν
  chosen: was dead
  alternatives:
  - had been dead
  lexicon: BDAG
  rationale: The imperfect of εἰμί with predicate adjective is best rendered simply
    as a past state. In the parable this is metaphorical for estrangement, but the
    text itself uses 'dead' starkly and should not be softened.
- source_word: ἀνέζησεν
  chosen: has come to life again
  alternatives:
  - came to life again
  - revived
  - lived again
  lexicon: BDAG
  rationale: The verb means to live again/revive. 'Has come to life again' communicates
    the restoration with idiomatic English and pairs well with the prior 'was dead.'
    The English present perfect captures the son's now-restored state, though the
    Greek aorist is simple past.
- source_word: ἦν ἀπολωλὼς
  chosen: he was lost
  alternatives:
  - he had been lost
  - he was ruined
  lexicon: BDAG
  rationale: The periphrastic construction denotes a prior state. 'Lost' is the established
    and contextually precise sense in this chapter's lost/found motif; 'ruined' would
    overstate and disrupt the thematic linkage.
- source_word: εὑρέθη
  chosen: has been found
  alternatives:
  - was found
  lexicon: BDAG
  rationale: Passive 'was found' is the most literal sense, but 'has been found' better
    mirrors the present celebratory result in English and balances 'has come to life
    again.' It also preserves the divine/passive openness without specifying an agent.
- source_word: ἤρξαντο εὐφραίνεσθαι
  chosen: they began to celebrate
  alternatives:
  - they began to rejoice
  - they began to make merry
  lexicon: BDAG
  rationale: The ingressive sense of ἤρξαντο is preserved by 'began.' εὐφραίνεσθαι
    here refers to festive rejoicing; 'celebrate' is clear modern English and fits
    the banquet context better than the archaic 'make merry.'
