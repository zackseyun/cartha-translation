theological_decisions:
- issue: Rendering κύριος in a parable
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: The verse is part of a parable, and κύριος functions as the human householder
    within the story world. Rendering it 'master' avoids implying that every occurrence
    of κύριος in the narrative should be read as a direct divine title, while still
    allowing the parable's theological significance to emerge from context.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος default ''Lord'')
    with per-verse variance documented when context demands'
- issue: Force of ἀνάγκασον
  chosen_reading: compel them to come in
  alternative_readings:
  - urge them to come in
  - press them to come in
  rationale: The Greek verb is strong and should not be softened in the main text.
    At the same time, the translation should not import a doctrine of physical coercion;
    the footnote preserves the likely invitational/social-pressure nuance in context.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
