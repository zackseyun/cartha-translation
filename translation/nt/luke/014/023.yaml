id: LUK.14.23
reference: Luke 14:23
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ κύριος πρὸς τὸν δοῦλον· Ἔξελθε εἰς τὰς ὁδοὺς καὶ φραγμοὺς καὶ
    ἀνάγκασον εἰσελθεῖν, ἵνα γεμισθῇ ⸂μου ὁ οἶκος⸃·
translation:
  text: And the master said to the slave, ‘Go out into the roads and hedges, and compel
    them to come in, so that my house may be filled.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'urge them strongly to come in.' The Greek verb is strong ('compel, press'),
      but in this parable it need not imply physical force.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord,' in this parabolic context
    it refers to the owner/master of the house rather than a direct christological
    title. 'Master' best conveys the social role within the story while avoiding an
    over-theologized reading.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Given the household setting and the translation philosophy's preference
    to preserve bonded status where salient, 'slave' better reflects δοῦλος here than
    the softer 'servant.'
- source_word: Ἔξελθε
  chosen: Go out
  alternatives:
  - Go
  lexicon: BDAG
  rationale: The aorist imperative of ἐξέρχομαι explicitly includes movement outward;
    'Go out' preserves that directional force.
- source_word: ὁδοὺς
  chosen: roads
  alternatives:
  - streets
  - highways
  lexicon: BDAG
  rationale: ὁδός here refers to travel ways outside the immediate town setting. 'Roads'
    is natural modern English and fits the paired image with φραγμοί.
- source_word: φραγμοὺς
  chosen: hedges
  alternatives:
  - fences
  - hedgerows
  lexicon: BDAG
  rationale: φραγμός can denote a fence or hedge; in this idiom ('roads and hedges')
    'hedges' is the most idiomatic and traditional English rendering, evoking the
    outskirts and boundary places where people might be found.
- source_word: ἀνάγκασον
  chosen: compel
  alternatives:
  - urge strongly
  - press
  lexicon: BDAG
  rationale: ἀναγκάζω most directly means 'compel' or 'force/press.' 'Compel' preserves
    the strength of the imperative without paraphrasing it away. Because English readers
    may misconstrue this as coercive violence, the nuance is preserved in a footnote
    rather than weakened in the main text.
- source_word: εἰσελθεῖν
  chosen: to come in
  alternatives:
  - to enter
  lexicon: BDAG
  rationale: After 'compel,' English idiom prefers 'to come in.' This still accurately
    reflects εἰσέρχομαι while reading naturally.
- source_word: ἵνα γεμισθῇ
  chosen: so that ... may be filled
  alternatives:
  - that ... may be filled
  lexicon: BDAG
  rationale: This construction expresses purpose/result. 'So that ... may be filled'
    clearly conveys the intended purpose of the command.
- source_word: μου ὁ οἶκος
  chosen: my house
  alternatives:
  - my household
  - my home
  lexicon: BDAG
  rationale: οἶκος here refers to the house as the banquet venue. 'My house' is the
    most direct and contextually fitting rendering.
