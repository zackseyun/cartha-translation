id: LUK.14.30
reference: Luke 14:30
source:
  edition: SBLGNT
  text: λέγοντες ὅτι Οὗτος ὁ ἄνθρωπος ἤρξατο οἰκοδομεῖν καὶ οὐκ ἴσχυσεν ἐκτελέσαι.
translation:
  text: saying, ‘This man began to build and was not able to finish.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was not strong enough to complete it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - saying that
  - while saying
  lexicon: BDAG
  rationale: Present participle modifying the implied subject from the previous verse;
    'saying' is the natural English participial connection and preserves the ongoing/mockery
    context without over-specifying.
- source_word: ὅτι
  chosen: ‘
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct content of speech. In English, quotation punctuation
    is more idiomatic than retaining 'that' after 'saying'.
- source_word: Οὗτος ὁ ἄνθρωπος
  chosen: This man
  alternatives:
  - This person
  - This fellow
  lexicon: BDAG
  rationale: Demonstrative plus noun is naturally rendered 'This man.' It preserves
    the slightly pointed, public tone. 'Person' is less gender-accurate than the Greek
    masculine singular, and 'fellow' adds coloring not required by the text.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with infinitive means 'began to.' 'Began' is slightly
    more neutral and literary than 'started' and fits the register.
- source_word: οἰκοδομεῖν
  chosen: to build
  alternatives:
  - to build it
  - to construct
  lexicon: BDAG
  rationale: Infinitive complement to ἤρξατο. 'To build' is the plain sense; adding
    'it' is interpretive, and 'construct' is unnecessarily technical.
- source_word: οὐκ ἴσχυσεν
  chosen: was not able
  alternatives:
  - could not
  - did not have the strength
  lexicon: BDAG
  rationale: ἰσχύω here denotes capability rather than physical strength specifically.
    'Was not able' closely reflects the Greek while remaining natural; 'could not'
    is possible but slightly less explicit.
- source_word: ἐκτελέσαι
  chosen: to finish
  alternatives:
  - to complete
  - to carry through to completion
  lexicon: BDAG
  rationale: In this building context, ἐκτελέω means to bring to completion. 'Finish'
    is the most natural modern English equivalent; 'complete' is viable but slightly
    stiffer.
