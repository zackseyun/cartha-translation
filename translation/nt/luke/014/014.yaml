id: LUK.14.14
reference: Luke 14:14
source:
  edition: SBLGNT
  text: καὶ μακάριος ἔσῃ, ὅτι οὐκ ἔχουσιν ἀνταποδοῦναί σοι, ἀνταποδοθήσεται γάρ σοι
    ἐν τῇ ἀναστάσει τῶν δικαίων.
translation:
  text: And you will be blessed, because they do not have the means to repay you;
    for you will be repaid at the resurrection of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they cannot repay you.' The Greek literally says they 'do not have'
      to repay you, expressing inability or lack of means.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the resurrection of the righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: '''Blessed'' best preserves the covenantal and eschatological weight
    of μακάριος in Jesus'' sayings. ''Happy'' is too subjective and weak; ''fortunate''
    is possible but less natural in this context.'
- source_word: ἔσῃ
  chosen: you will be
  lexicon: BDAG
  rationale: Future middle of εἰμί is naturally rendered 'you will be,' linking with
    the predicate adjective μακάριος.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the blessedness. 'Because' makes the
    causal sense explicit in clear modern English.
- source_word: οὐκ ἔχουσιν ἀνταποδοῦναί σοι
  chosen: they do not have the means to repay you
  alternatives:
  - they cannot repay you
  - they do not have to repay you
  lexicon: BDAG
  rationale: The construction literally means 'they do not have to repay you,' idiomatically
    expressing inability or lack of resources/opportunity. 'Do not have the means
    to repay you' preserves that nuance better than the flatter 'cannot repay you.'
    'Do not have to repay you' would wrongly suggest absence of obligation rather
    than inability.
- source_word: ἀνταποδοθήσεται
  chosen: you will be repaid
  alternatives:
  - it will be repaid to you
  - you will be recompensed
  lexicon: BDAG
  rationale: The future passive is naturally rendered with an English passive. 'You
    will be repaid' is clear and preserves the reciprocity with the earlier infinitive
    ἀνταποδοῦναί. 'Recompensed' is more formal but less readable.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the explanatory ground for the prior statement. 'For'
    works well after the semicolon and preserves the explanatory flow.
- source_word: ἐν τῇ ἀναστάσει
  chosen: at the resurrection
  alternatives:
  - in the resurrection
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' temporal English idiom here is better
    expressed as 'at the resurrection,' indicating the time of repayment. This is
    an optimal-equivalence adjustment for natural English.
- source_word: τῶν δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: BDAG
  rationale: The genitive specifies whose resurrection is in view. 'The righteous'
    is concise, natural, and preserves the moral-theological sense of δίκαιος. 'The
    just' is possible but less idiomatic in contemporary English.
