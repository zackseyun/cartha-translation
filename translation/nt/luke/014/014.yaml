theological_decisions:
- issue: Meaning of 'the resurrection of the righteous'
  chosen_reading: Rendered straightforwardly as a future resurrection associated with
    the righteous, without importing a more detailed eschatological scheme.
  alternative_readings:
  - a general resurrection with emphasis on the righteous
  - a distinct resurrection of the righteous prior to others
  rationale: The phrase itself affirms future divine vindication/reward connected
    with the resurrection and the righteous. The verse does not require the translation
    to settle broader debates about the timing or structure of resurrection events,
    so the wording preserves the text's theological claim without denominational elaboration.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
