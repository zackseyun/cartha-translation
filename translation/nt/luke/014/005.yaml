id: LUK.14.5
reference: Luke 14:5
source:
  edition: SBLGNT
  text: ⸀καὶ πρὸς αὐτοὺς εἶπεν· Τίνος ὑμῶν υἱὸς ἢ βοῦς εἰς φρέαρ ⸀πεσεῖται, καὶ οὐκ
    εὐθέως ἀνασπάσει αὐτὸν ⸀ἐν ἡμέρᾳ τοῦ σαββάτου;
translation:
  text: And he said to them, “Which of you, if a son or an ox falls into a well, will
    not immediately pull him out on the Sabbath day?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “donkey” instead of “son.”
    reason: textual_variant
lexical_decisions:
- source_word: Τίνος ὑμῶν
  chosen: Which of you
  alternatives:
  - Whose among you
  - Who among you
  lexicon: BDAG
  rationale: Idiomatic interrogative in this rhetorical question; English 'Which of
    you' best captures the sense of asking what person among them would act differently.
- source_word: υἱὸς
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: The Greek is specifically masculine singular 'son,' not the more general
    'child.' This follows the gender-accurate principle and preserves the concrete
    familial example in the source text.
- source_word: βοῦς
  chosen: ox
  alternatives:
  - cow
  - cattle animal
  lexicon: BDAG
  rationale: Standard gloss for βοῦς in this singular example. 'Ox' is the conventional
    and sufficiently clear rendering for a bovine work animal in this context.
- source_word: φρέαρ
  chosen: well
  alternatives:
  - pit
  - cistern
  lexicon: BDAG
  rationale: φρέαρ most naturally denotes a well. Although some parallel passages
    use language often rendered 'pit,' this verse's wording specifically points to
    a well, so the translation follows the source text rather than harmonizing with
    parallels.
- source_word: πεσεῖται
  chosen: falls
  alternatives:
  - will fall
  - should fall
  lexicon: BDAG
  rationale: 'Future middle in a conditional/rhetorical setting can be rendered naturally
    in English as a present in a real-condition style: ''if ... falls.'' This is idiomatic
    and preserves the force of the example.'
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: '''Immediately'' preserves the temporal urgency of the Greek and fits
    the rhetorical point that rescue would not be delayed because of Sabbath scruples.'
- source_word: ἀνασπάσει
  chosen: pull ... out
  alternatives:
  - lift ... out
  - draw ... up
  lexicon: BDAG
  rationale: The verb denotes drawing or pulling up from below. 'Pull out' is natural
    modern English and clearly fits the image of rescue from a well.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is masculine singular, agreeing with either 'son' or 'ox,'
    both grammatically masculine in Greek. English 'him' preserves the singular masculine
    form, though in English it may sound more natural with 'son' than 'ox.'
- source_word: ἐν ἡμέρᾳ τοῦ σαββάτου
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  - on a Sabbath day
  lexicon: BDAG
  rationale: This phrase is naturally rendered 'on the Sabbath day.' Including 'day'
    reflects ἡμέρᾳ while remaining idiomatic English.
