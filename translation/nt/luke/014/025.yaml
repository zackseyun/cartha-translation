id: LUK.14.25
reference: Luke 14:25
source:
  edition: SBLGNT
  text: Συνεπορεύοντο δὲ αὐτῷ ὄχλοι πολλοί, καὶ στραφεὶς εἶπεν πρὸς αὐτούς·
translation:
  text: 'Now large crowds were traveling with him, and turning, he said to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many crowds were going along with him.' The Greek emphasizes that numerous
      crowds were accompanying Jesus as he traveled.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνεπορεύοντο
  chosen: were traveling with
  alternatives:
  - were going along with
  - were accompanying
  - were journeying with
  lexicon: BDAG
  rationale: 'The imperfect middle indicates ongoing action in past time: the crowds
    were in the process of going along with Jesus. ''Were traveling with'' is natural
    modern English and preserves the sense of accompanying him on the way better than
    the more wooden ''were going with.'''
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition rather than strong contrast.
    'Now' signals the scene shift smoothly in English without overstating adversative
    force.
- source_word: αὐτῷ
  chosen: with him
  alternatives:
  - with Jesus
  lexicon: BDAG
  rationale: The dative with συμπορεύομαι expresses accompaniment. 'Him' preserves
    the Greek pronoun and avoids unnecessarily repeating the name where the referent
    is clear from context.
- source_word: ὄχλοι πολλοί
  chosen: large crowds
  alternatives:
  - many crowds
  - great crowds
  - many people
  lexicon: BDAG
  rationale: The noun-adjective combination denotes numerous people in crowd form.
    'Large crowds' is idiomatic English and preserves both plurality and size better
    than the awkwardly literal 'many crowds.'
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Simple connective linking the accompanying circumstance to Jesus' response.
    No stronger inferential nuance is required here.
- source_word: στραφεὶς
  chosen: turning
  alternatives:
  - having turned
  - turning around
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous enough in narrative sequence
    to be rendered smoothly as 'turning.' 'Turning around' is possible but slightly
    more specific than the Greek requires.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he spoke
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in the aorist. 'He said' is the
    most natural and accurate English equivalent here.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to those people
  - to the crowds
  lexicon: BDAG
  rationale: πρός with the accusative after a speech verb marks the addressees. 'To
    them' preserves the pronoun of the Greek; the antecedent is clearly the crowds.
