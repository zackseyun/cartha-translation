id: LUK.14.4
reference: Luke 14:4
source:
  edition: SBLGNT
  text: οἱ δὲ ἡσύχασαν. καὶ ἐπιλαβόμενος ἰάσατο αὐτὸν καὶ ἀπέλυσεν.
translation:
  text: But they kept silent. And taking hold of him, he healed him and sent him away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "were silent" or "said nothing."
    reason: lexical_alternative
  - marker: b
    text: Or "released him" or "dismissed him."
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - But those men
  lexicon: BDAG
  rationale: οἱ functions substantivally, referring back to the previously mentioned
    interlocutors. δέ is mildly adversative or continuative; 'But they' fits the narrative
    contrast after Jesus' question.
- source_word: ἡσύχασαν
  chosen: kept silent
  alternatives:
  - were silent
  - said nothing
  - became quiet
  lexicon: BDAG
  rationale: Aorist of ἡσυχάζω here denotes refraining from response. 'Kept silent'
    captures their non-answer in context better than the more stative 'were silent,'
    while remaining natural English.
- source_word: ἐπιλαβόμενος
  chosen: taking hold of
  alternatives:
  - taking him
  - laying hold of
  - grasping
  lexicon: BDAG
  rationale: The participle from ἐπιλαμβάνομαι often means to take hold of or grasp.
    'Taking hold of' preserves the physicality without overtranslating the manner.
- source_word: ἰάσατο
  chosen: he healed
  alternatives:
  - he cured
  - he restored
  lexicon: BDAG
  rationale: ἰάομαι commonly means to heal, especially in physical healing contexts.
    'He healed' is the standard, clear rendering.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward masculine singular object pronoun referring to the man
    with dropsy mentioned in the context.
- source_word: ἀπέλυσεν
  chosen: sent him away
  alternatives:
  - released him
  - dismissed him
  - let him go
  lexicon: BDAG
  rationale: ἀπολύω can mean release, dismiss, or send away. In this narrative setting
    after healing, 'sent him away' is the most idiomatic and contextually fitting
    English, without implying imprisonment or formal legal release.
