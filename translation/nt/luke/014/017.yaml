id: LUK.14.17
reference: Luke 14:17
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν τὸν δοῦλον αὐτοῦ τῇ ὥρᾳ τοῦ δείπνου εἰπεῖν τοῖς κεκλημένοις·
    Ἔρχεσθε, ὅτι ἤδη ἕτοιμά ⸀ἐστιν.
translation:
  text: And at the hour of the dinner he sent his servant to say to those who had
    been invited, ‘Come, because it is already ready.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'everything is ready now.' The Greek leaves the
      subject implicit and uses a collective neuter plural expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Aorist indicative of ἀποστέλλω is straightforwardly rendered 'sent.'
    'Dispatched' is possible but less natural in modern English and adds a slightly
    sharper nuance not required by the context.
- source_word: δοῦλον
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: DOCTRINE.md allows 'servant / slave' context-dependently for δοῦλος.
    In this parabolic household setting, the bonded status is not theologically salient;
    the narrative function is that of a household servant/messenger. 'Servant' is
    therefore the best optimal-equivalence rendering, while preserving 'slave' as
    a lexical alternative.
- source_word: τῇ ὥρᾳ τοῦ δείπνου
  chosen: at the hour of the dinner
  alternatives:
  - at dinnertime
  - at the time of the banquet
  lexicon: BDAG
  rationale: This phrase marks the specific appointed time of the meal. 'At the hour
    of the dinner' preserves the temporal expression more formally than 'at dinnertime,'
    while remaining intelligible. 'Banquet' is possible from context, but δείπνον
    itself is more basically 'dinner/supper/meal.'
- source_word: εἰπεῖν
  chosen: to say
  alternatives:
  - to tell
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose after ''sent'': he sent the servant
    ''to say.'' ''To tell'' is possible, but ''to say'' stays closer to the Greek
    and fits the direct quotation that follows.'
- source_word: τοῖς κεκλημένοις
  chosen: to those who had been invited
  alternatives:
  - to the invited guests
  - to those invited
  lexicon: BDAG
  rationale: Perfect passive participle of καλέω indicates persons already invited
    prior to this summons. 'Those who had been invited' clearly conveys the prior
    completed invitation. 'Guests' is interpretive and slightly more expansive than
    the Greek.
- source_word: Ἔρχεσθε
  chosen: Come
  alternatives:
  - Come now
  - Be coming
  lexicon: BDAG
  rationale: Present middle imperative here functions as a summons. Simple 'Come'
    is idiomatic English and captures the force without overtranslating aspect.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the summons. 'Because' is clear modern English;
    'for' is more traditional but less natural for the target audience.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - now
  lexicon: BDAG
  rationale: ἤδη emphasizes that the preparations are complete at this point. 'Already'
    is the most direct rendering.
- source_word: ἕτοιμά ἐστιν
  chosen: it is already ready
  alternatives:
  - everything is ready already
  - all is now ready
  lexicon: BDAG
  rationale: The neuter plural adjective with singular verb is idiomatically collective.
    English often supplies an implicit subject. 'It is already ready' is a close rendering,
    though the implied sense is that the meal/preparations are ready. A more idiomatic
    alternative is preserved in a footnote.
