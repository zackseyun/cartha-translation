id: LUK.14.27
reference: Luke 14:27
source:
  edition: SBLGNT
  text: ⸀ὅστις οὐ βαστάζει τὸν σταυρὸν ⸀ἑαυτοῦ καὶ ἔρχεται ὀπίσω μου, οὐ δύναται εἶναί
    μου μαθητής.
translation:
  text: Whoever does not carry his own cross and come after me cannot be my disciple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear his own cross.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'come behind me'; compare the common discipleship expression 'follow
      me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  chosen: Whoever
  alternatives:
  - Anyone who
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general condition. 'Whoever'
    is concise and natural in English while preserving the universal force.
- source_word: βαστάζει
  chosen: carry
  alternatives:
  - bear
  lexicon: BDAG
  rationale: The verb commonly means 'carry' or 'bear.' 'Carry' is clearer in contemporary
    English and fits the concrete image of taking up a cross, while still allowing
    the metaphorical force of discipleship cost.
- source_word: σταυρόν
  chosen: cross
  lexicon: BDAG
  rationale: Standard rendering of σταυρός. In Luke's context it evokes the instrument
    of execution and thus the cost and shame of discipleship; 'cross' preserves both
    the literal term and its established metaphorical resonance.
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - their own
  - his
  lexicon: BDAG
  rationale: The reflexive pronoun is singular masculine, matching the grammatically
    masculine generic subject. Per translation philosophy, a gender-accurate rendering
    is preferred over flattening to plural. 'Own' preserves the reflexive emphasis.
- source_word: ἔρχεται ὀπίσω μου
  chosen: come after me
  alternatives:
  - follow me
  - comes behind me
  lexicon: BDAG
  rationale: Literally 'comes behind me.' 'Come after me' preserves the movement imagery
    and close relation to discipleship language without collapsing it entirely into
    the interpretive gloss 'follow me.'
- source_word: οὐ δύναται εἶναί μου μαθητής
  chosen: cannot be my disciple
  alternatives:
  - is not able to be my disciple
  lexicon: BDAG
  rationale: This construction expresses inability rather than mere prohibition. 'Cannot
    be my disciple' is idiomatic English and preserves the force of incapacity/incompatibility.
- source_word: μαθητής
  chosen: disciple
  alternatives:
  - learner
  lexicon: BDAG
  rationale: '''Disciple'' is the established and most accurate rendering in Gospel
    contexts, conveying committed apprenticeship rather than mere classroom learning.'
