theological_decisions:
- issue: Gendered generic force of the singular masculine reflexive pronoun
  chosen_reading: 'Retain singular masculine in English: ''his own cross'''
  alternative_readings:
  - their own cross
  rationale: The Greek uses a grammatically masculine singular form with representative
    force. Following the stated philosophy of gender-accurate over gender-neutral,
    the translation keeps the singular masculine rather than pluralizing or neutralizing
    it. The generic sense remains clear from 'Whoever.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
