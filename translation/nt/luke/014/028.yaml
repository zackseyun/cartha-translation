id: LUK.14.28
reference: Luke 14:28
source:
  edition: SBLGNT
  text: τίς γὰρ ἐξ ⸀ὑμῶν θέλων πύργον οἰκοδομῆσαι οὐχὶ πρῶτον καθίσας ψηφίζει τὴν
    δαπάνην, εἰ ⸀ἔχει εἰς ἀπαρτισμόν;
translation:
  text: For which of you, wanting to build a tower, does not first sit down and calculate
    the cost, whether he has enough to complete it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'count the expense' or 'compute the cost.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whether he has for completion.' The sense is whether he has
      sufficient means to finish the project.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ ἐξ ὑμῶν
  chosen: For which of you
  alternatives:
  - For who among you
  - Which one of you
  lexicon: BDAG
  rationale: τίς with ἐξ ὑμῶν introduces a rhetorical question addressed to the audience.
    'Which of you' is idiomatic English and preserves the direct second-person engagement;
    γάρ is carried by 'For' to connect with the preceding teaching.
- source_word: θέλων
  chosen: wanting
  alternatives:
  - desiring
  - intending
  lexicon: BDAG
  rationale: The present participle denotes the person's intention or desire. 'Wanting'
    is concise and natural in English while preserving the participial sense.
- source_word: πύργον
  chosen: a tower
  lexicon: BDAG
  rationale: πύργος normally means 'tower.' No contextual reason warrants a looser
    rendering; the image is retained as stated.
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to construct
  lexicon: BDAG
  rationale: The infinitive expresses the intended action. 'To build' is the standard,
    natural equivalent.
- source_word: οὐχὶ
  chosen: does not
  alternatives:
  - will not
  lexicon: BDAG
  rationale: οὐχί marks a question expecting a positive answer. In English, 'does
    not' effectively conveys the rhetorical force.
- source_word: πρῶτον καθίσας
  chosen: first sit down
  alternatives:
  - first sits down
  - having first sat down
  lexicon: BDAG
  rationale: The aorist participle indicates prior action relative to the main verb.
    English idiom in this rhetorical question is best served by 'first sit down,'
    with the finite verb supplied by the main clause.
- source_word: ψηφίζει
  chosen: calculate
  alternatives:
  - count
  - compute
  lexicon: BDAG
  rationale: ψηφίζω can mean to count or calculate. In context of construction expenses,
    'calculate' best conveys deliberate estimation rather than mere counting.
- source_word: τὴν δαπάνην
  chosen: the cost
  alternatives:
  - the expense
  lexicon: BDAG
  rationale: δαπάνη refers to expenditure or cost. 'The cost' is the most natural
    English expression in this context.
- source_word: εἰ ἔχει
  chosen: whether he has enough
  alternatives:
  - if he has
  - whether he has the means
  lexicon: BDAG
  rationale: 'Although ''enough'' is not a separate Greek word, it is implied by the
    idiom in context: the question is whether the builder possesses sufficient resources.
    This makes the English intelligible without over-paraphrasing.'
- source_word: εἰς ἀπαρτισμόν
  chosen: to complete it
  alternatives:
  - for completion
  - to finish
  lexicon: BDAG
  rationale: ἀπαρτισμός denotes completion or finishing. Rendering the phrase verbally
    as 'to complete it' produces natural English and makes explicit the implied object
    from the building context.
