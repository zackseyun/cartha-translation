id: LUK.14.24
reference: Luke 14:24
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν ὅτι οὐδεὶς τῶν ἀνδρῶν ἐκείνων τῶν κεκλημένων γεύσεταί μου τοῦ
    ⸀δείπνου.
translation:
  text: For I tell you that none of those men who were invited will taste my dinner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my banquet' or traditionally 'my supper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  - Because I tell you
  lexicon: BDAG
  rationale: λέγω with γάρ and dative ὑμῖν is naturally rendered as a direct address
    formula. 'For I tell you' preserves γάρ as explanatory and gives idiomatic modern
    English without losing the personal address.
- source_word: οὐδεὶς
  chosen: none
  alternatives:
  - no one
  - not one
  lexicon: BDAG
  rationale: οὐδείς is an emphatic negation meaning 'no one' or 'none.' 'None' fits
    smoothly with the following partitive phrase 'of those men'.
- source_word: τῶν ἀνδρῶν
  chosen: those men
  alternatives:
  - those people
  - those persons
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man' or 'male person,' not a generic term for
    humanity here. In keeping with the gender-accurate philosophy, the masculine reference
    is preserved as 'men.'
- source_word: ἐκείνων
  chosen: those
  alternatives:
  - those particular
  - those there
  lexicon: BDAG
  rationale: ἐκεῖνος functions demonstratively, pointing back to the previously referenced
    invitees. 'Those' is the natural English equivalent.
- source_word: τῶν κεκλημένων
  chosen: who were invited
  alternatives:
  - who had been invited
  - the invited ones
  - who were called
  lexicon: BDAG
  rationale: The perfect passive participle of καλέω refers to those who had received
    the invitation. In this banquet context, 'invited' is clearer and more contextually
    precise than the more literal but potentially misleading 'called.'
- source_word: γεύσεταί
  chosen: will taste
  alternatives:
  - will partake of
  - will eat
  lexicon: BDAG
  rationale: γεύομαι literally means 'taste,' and in banquet contexts can imply experiencing
    or partaking. 'Will taste' preserves the metaphorical force and verbal imagery
    of the Greek.
- source_word: μου τοῦ δείπνου
  chosen: my dinner
  alternatives:
  - my banquet
  - my supper
  lexicon: BDAG
  rationale: δεῖπνον denotes the main meal, often an evening meal or banquet. 'Dinner'
    is natural modern English and fits the immediate parable context. 'Banquet' is
    possible but slightly more interpretive; 'supper' is traditional but less current.
