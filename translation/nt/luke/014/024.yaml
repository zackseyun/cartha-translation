theological_decisions:
- issue: Rendering the host's statement in relation to the parable's imagery
  chosen_reading: Retain the first-person possessive 'my dinner' without explicitly
    allegorizing it in the translation.
  alternative_readings:
  - my banquet
  rationale: The verse is spoken within a parable, and the translation should preserve
    the narrative voice of the host rather than import an explicit theological interpretation
    into the main text. The possessive 'my' is maintained because it is present in
    the Greek and contributes to the force of exclusion.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
