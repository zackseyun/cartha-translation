id: LUK.14.1
reference: Luke 14:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ ἐλθεῖν αὐτὸν εἰς οἶκόν τινος τῶν ἀρχόντων τῶν Φαρισαίων
    σαββάτῳ φαγεῖν ἄρτον καὶ αὐτοὶ ἦσαν παρατηρούμενοι αὐτόν.
translation:
  text: And it happened that when he went into the house of one of the rulers of the
    Pharisees on the Sabbath to eat bread, they were watching him closely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to eat a meal'; literally 'to eat bread.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they were carefully observing him'; the Greek may imply suspicious or
      hostile watching.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Common Lukan narrative formula; rendered in readable modern English while
    preserving the event-introducing function.
- source_word: ἐν τῷ ἐλθεῖν αὐτὸν
  chosen: when he went
  alternatives:
  - as he came
  - upon his entering
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal; 'when he went' gives natural
    English and preserves the temporal sense without over-literal awkwardness.
- source_word: οἶκόν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: '''House'' is the straightforward lexical equivalent and fits the social
    setting of a hosted meal.'
- source_word: τινος τῶν ἀρχόντων τῶν Φαρισαίων
  chosen: one of the rulers of the Pharisees
  alternatives:
  - a leader of the Pharisees
  - one of the Pharisee rulers
  lexicon: BDAG
  rationale: ἀρχόντων denotes leading figures or rulers; the genitive construction
    is best represented by 'rulers of the Pharisees' rather than flattening to merely
    'important Pharisee.'
- source_word: σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  lexicon: BDAG
  rationale: The dative is temporal. English idiom favors 'on the Sabbath.' The anarthrous
    Greek can be generic, but in context the customary English singular definite form
    is natural and clear.
- source_word: φαγεῖν ἄρτον
  chosen: to eat bread
  alternatives:
  - to dine
  - to eat a meal
  lexicon: BDAG
  rationale: Literally 'to eat bread,' an idiom for taking a meal. The more formal
    wording is retained in the main text to preserve the source expression, while
    still being understandable in English.
- source_word: παρατηρούμενοι
  chosen: watching him closely
  alternatives:
  - carefully observing him
  - keeping close watch on him
  lexicon: BDAG
  rationale: The verb often carries the sense of watching attentively, sometimes with
    hostile or suspicious intent. 'Watching him closely' preserves the tension without
    overstating motive.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic in Greek, but standard English can absorb
    the emphasis without awkwardness. The subject contrast is adequately conveyed
    by 'they' in context.
