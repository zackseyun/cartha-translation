theological_decisions:
- issue: Implied hostility in the Pharisees' observation of Jesus
  chosen_reading: they were watching him closely
  alternative_readings:
  - they were watching him carefully
  - they were spying on him
  rationale: The participle παρατηρούμενοι can suggest hostile surveillance, but the
    verse itself does not explicitly state malicious intent. The chosen rendering
    preserves narrative tension without importing a stronger accusation than the text
    requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
