id: LUK.14.7
reference: Luke 14:7
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ πρὸς τοὺς κεκλημένους παραβολήν, ἐπέχων πῶς τὰς πρωτοκλισίας ἐξελέγοντο,
    λέγων πρὸς αὐτούς·
translation:
  text: 'Now he was telling a parable to those who had been invited, noticing how
    they were choosing the places of honor, saying to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief seats.' The Greek refers to the most honored places at a banquet.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was telling
  alternatives:
  - he said
  - he was saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or scene-setting action rather than
    a simple punctiliar 'said.' 'Was telling' fits the narrative flow and introduces
    the discourse that follows.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective marking transition in the narrative. 'Now'
    gives natural English discourse movement without overstating contrast.
- source_word: τοὺς κεκλημένους
  chosen: those who had been invited
  alternatives:
  - the invited guests
  - those invited
  lexicon: BDAG
  rationale: The perfect participle of καλέω denotes people in the state of having
    been invited. This rendering preserves that sense clearly. 'Guests' is possible
    by implication, but the Greek more directly emphasizes their invited status.
- source_word: παραβολήν
  chosen: a parable
  alternatives:
  - an illustration
  - a figure
  lexicon: BDAG
  rationale: παραβολή is the standard Gospel term 'parable.' Although the following
    teaching is proverb-like and situational, retaining 'parable' preserves the Evangelist's
    categorization.
- source_word: ἐπέχων
  chosen: noticing
  alternatives:
  - observing
  - paying attention to
  lexicon: BDAG
  rationale: The participle introduces the circumstance prompting the parable. 'Noticing'
    is idiomatic and captures attentive observation without awkward literalism.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: BDAG
  rationale: πῶς introduces the manner in which they acted. 'How' is the most direct
    and natural rendering.
- source_word: πρωτοκλισίας
  chosen: the places of honor
  alternatives:
  - the chief seats
  - the best places
  lexicon: BDAG
  rationale: The term refers to the most prominent reclining places at a meal. 'Places
    of honor' communicates the social significance in contemporary English better
    than the more literal but less transparent 'chief seats.'
- source_word: ἐξελέγοντο
  chosen: they were choosing
  alternatives:
  - they were selecting for themselves
  - they chose
  lexicon: BDAG
  rationale: The imperfect middle indicates repeated or ongoing action, with some
    reflexive nuance. 'They were choosing' preserves the imperfect aspect naturally;
    the reflexive force is not strong enough to require an awkward explicit 'for themselves'
    in the main text.
- source_word: λέγων πρὸς αὐτούς
  chosen: saying to them
  alternatives:
  - and he said to them
  lexicon: BDAG
  rationale: This participial construction smoothly introduces the direct speech that
    follows. 'Saying to them' keeps close to the Greek syntax while remaining readable.
