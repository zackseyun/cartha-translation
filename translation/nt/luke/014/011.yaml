theological_decisions:
- issue: Implicit agent in the future passives
  chosen_reading: Retain passive forms without supplying 'by God'
  alternative_readings:
  - will be humbled by God
  - will be exalted by God
  rationale: The Greek uses passives and does not explicitly name the agent. While
    divine agency is strongly implied in the biblical theme, adding 'by God' would
    import an interpretive element not stated in the text. This preserves theological
    tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine representation
  chosen_reading: Use 'himself' in the main text
  alternative_readings:
  - themselves
  - oneself
  rationale: The Greek singular masculine forms function generically. Following the
    stated philosophy, the translation keeps the gender-accurate representative masculine
    in the main text rather than neutralizing it.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
