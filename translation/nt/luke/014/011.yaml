id: LUK.14.11
reference: Luke 14:11
source:
  edition: SBLGNT
  text: ὅτι πᾶς ὁ ὑψῶν ἑαυτὸν ταπεινωθήσεται καὶ ὁ ταπεινῶν ἑαυτὸν ὑψωθήσεται.
translation:
  text: For everyone who exalts himself will be humbled, and the one who humbles himself
    will be exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because everyone who exalts himself will be humbled, and the one who
      humbles himself will be exalted.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses singular masculine forms generically: ''himself.'''
    reason: cultural_note
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this introduces the reason for the preceding instruction,
    so 'For' reads naturally in English while preserving the explanatory force.
- source_word: πᾶς ὁ ὑψῶν
  chosen: everyone who exalts
  alternatives:
  - everyone exalting
  - whoever exalts
  lexicon: BDAG
  rationale: The articular present participle has a generic substantival sense. 'Everyone
    who exalts' is idiomatic English and preserves the proverbial, universal force
    of πᾶς.
- source_word: ὑψῶν
  chosen: exalts
  alternatives:
  - lifts up
  - raises high
  lexicon: BDAG
  rationale: Here ὑψόω is metaphorical for self-promotion or self-exaltation, not
    literal elevation. 'Exalts' best matches the moral and rhetorical contrast with
    'humbles' and the future passive 'will be exalted.'
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - oneself
  lexicon: BDAG
  rationale: The reflexive pronoun is singular masculine, used generically. Per the
    gender-accurate philosophy, 'himself' preserves the source form and representative
    force better than flattening to a gender-neutral reflexive in the main text.
- source_word: ταπεινωθήσεται
  chosen: will be humbled
  alternatives:
  - will be brought low
  lexicon: BDAG
  rationale: The future passive indicates the subject will undergo humbling. 'Will
    be humbled' preserves both the passive form and the lexical contrast with 'exalted.'
    'Brought low' is possible but less formally parallel.
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: The conjunction coordinates the two halves of the antithetical saying.
    'And' preserves the Greek connective while the contrast is clear from the paired
    clauses themselves.
- source_word: ὁ ταπεινῶν
  chosen: the one who humbles
  alternatives:
  - whoever humbles
  - the one humbling
  lexicon: BDAG
  rationale: The articular participle is substantival and generic. 'The one who humbles'
    gives natural English while maintaining the balanced parallelism with the first
    clause.
- source_word: ταπεινῶν
  chosen: humbles
  alternatives:
  - lowers
  - makes low
  lexicon: BDAG
  rationale: In this context ταπεινόω refers to voluntary self-humbling rather than
    humiliation by another. 'Humbles' is the standard and clearest rendering.
- source_word: ὑψωθήσεται
  chosen: will be exalted
  alternatives:
  - will be lifted up
  lexicon: BDAG
  rationale: The future passive mirrors the first clause and conveys vindication or
    elevation by another, implicitly by God in the broader biblical motif, without
    making that agent explicit in translation.
