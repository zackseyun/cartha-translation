id: LUK.14.19
reference: Luke 14:19
source:
  edition: SBLGNT
  text: καὶ ἕτερος εἶπεν· Ζεύγη βοῶν ἠγόρασα πέντε καὶ πορεύομαι δοκιμάσαι αὐτά· ἐρωτῶ
    σε, ἔχε με παρῃτημένον.
translation:
  text: And another said, ‘I have bought five yoke of oxen, and I am going to test
    them. I ask you, consider me excused.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “five pairs of oxen” or “five teams of oxen.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “have me excused.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος
  chosen: another
  alternatives:
  - someone else
  - a different one
  lexicon: BDAG
  rationale: In this sequence of invitees giving excuses, ἕτερος naturally means another
    person in the series. 'Another' is concise and idiomatic.
- source_word: Ζεύγη βοῶν
  chosen: five yoke of oxen
  alternatives:
  - five pairs of oxen
  - five teams of oxen
  lexicon: BDAG
  rationale: ζεῦγος denotes a pair/yoke; with βοῶν it refers to oxen yoked in pairs
    for work. 'Yoke of oxen' preserves the concrete agrarian image and matches natural
    English. Singular 'yoke' after a numeral is idiomatic ('five yoke of oxen').
- source_word: ἠγόρασα
  chosen: I have bought
  alternatives:
  - I bought
  - I purchased
  lexicon: BDAG
  rationale: The aorist can be rendered as simple past, but English present perfect
    fits the immediate relevance of the recent purchase to the excuse. 'Bought' is
    more natural than 'purchased' in readable modern English.
- source_word: πορεύομαι
  chosen: I am going
  alternatives:
  - I am on my way
  - I go
  lexicon: BDAG
  rationale: Present middle here conveys current intention or movement. 'I am going'
    is straightforward and idiomatic, preserving the sense of immediate action.
- source_word: δοκιμάσαι
  chosen: to test
  alternatives:
  - to examine
  - to try out
  - to prove
  lexicon: BDAG
  rationale: δοκιμάζω here means to test or try something to assess it. 'Test' is
    clear modern English and fits the context of newly purchased oxen.
- source_word: ἐρωτῶ σε
  chosen: I ask you
  alternatives:
  - I beg you
  - I request of you
  lexicon: BDAG
  rationale: ἐρωτάω can express asking or requesting. 'I ask you' preserves the polite
    directness without overstating the tone.
- source_word: ἔχε με παρῃτημένον
  chosen: consider me excused
  alternatives:
  - have me excused
  - regard me as excused
  lexicon: BDAG
  rationale: This idiom combines ἔχω with a perfect passive participle of παραιτέομαι
    to mean 'treat me as having been excused.' 'Consider me excused' is idiomatic
    modern English that preserves the resultant state. 'Have me excused' is more traditional
    but less natural today.
