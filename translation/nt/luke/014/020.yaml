id: LUK.14.20
reference: Luke 14:20
source:
  edition: SBLGNT
  text: καὶ ἕτερος εἶπεν· Γυναῖκα ἔγημα καὶ διὰ τοῦτο οὐ δύναμαι ἐλθεῖν.
translation:
  text: And another said, ‘I have married a wife, and for this reason I cannot come.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I married a wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος
  chosen: another
  alternatives:
  - someone else
  - a different one
  lexicon: BDAG
  rationale: ἕτερος here introduces an additional respondent in the sequence of excuses.
    'Another' is the most natural English equivalent in this narrative context.
- source_word: Γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife' depending on context. Because
    it is the object of ἔγημα ('I married'), the marital sense is required. English
    idiom prefers 'married a wife' over the less natural 'married a woman' in a context
    emphasizing the new marriage relationship.
- source_word: ἔγημα
  chosen: I have married
  alternatives:
  - I married
  lexicon: BDAG
  rationale: Aorist 1st singular of γαμέω. In English, the present perfect can naturally
    convey a recent completed action with present relevance, which fits the excuse
    being offered. This preserves the force without sounding wooden.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: BDAG
  rationale: The phrase gives the stated ground for the refusal. 'For this reason'
    is clear, natural, and slightly more explicit than 'therefore' while preserving
    the causal connection.
- source_word: οὐ δύναμαι ἐλθεῖν
  chosen: I cannot come
  alternatives:
  - I am not able to come
  lexicon: BDAG
  rationale: δύναμαι + infinitive expresses ability. 'I cannot come' is the standard
    natural English rendering and preserves the speaker's claimed inability.
