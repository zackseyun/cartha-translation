id: LUK.14.13
reference: Luke 14:13
source:
  edition: SBLGNT
  text: ἀλλ’ ὅταν ⸂δοχὴν ποιῇς⸃, κάλει πτωχούς, ἀναπείρους, χωλούς, τυφλούς·
translation:
  text: But whenever you give a banquet, invite the poor, the disabled, the lame,
    the blind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you give a feast' or 'when you host a reception.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the maimed' for 'the disabled.' The Greek term refers to those with
      physical impairments.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Adversative conjunction linking this instruction in contrast to the prior
    command about whom not to invite. 'But' is the most natural concise English equivalent.
- source_word: ὅταν
  chosen: whenever
  alternatives:
  - when
  lexicon: BDAG
  rationale: 'Introduces an indefinite temporal clause with subjunctive force: not
    a one-time event but any such occasion. ''Whenever'' better captures the iterative/indefinite
    sense than simple ''when''.'
- source_word: δοχὴν ποιῇς
  chosen: you give a banquet
  alternatives:
  - you make a feast
  - you host a reception
  - you give a dinner
  lexicon: BDAG
  rationale: The idiom literally means 'make/hold a reception/banquet.' 'Give a banquet'
    is idiomatic modern English and preserves the sense of hosting a formal meal.
    'Dinner' would be too narrow in light of the broader hospitality context.
- source_word: κάλει
  chosen: invite
  alternatives:
  - call
  lexicon: BDAG
  rationale: Imperative of καλέω in meal-invitation context clearly means 'invite,'
    not merely 'call.' This is the natural contextual rendering.
- source_word: πτωχούς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: Substantival adjective referring to poor persons. 'The poor' is concise,
    idiomatic, and preserves the class reference.
- source_word: ἀναπείρους
  chosen: the disabled
  alternatives:
  - the crippled
  - those with disabilities
  - the maimed
  lexicon: BDAG
  rationale: Refers to those with physical impairments. 'The disabled' is clear modern
    English and avoids archaic or potentially misleading wording like 'maimed,' while
    still conveying bodily disability.
- source_word: χωλούς
  chosen: the lame
  alternatives:
  - those who are lame
  - the crippled
  lexicon: BDAG
  rationale: Standard rendering for those impaired in walking. 'The lame' remains
    understandable in modern English and distinguishes this term from ἀναπείρους.
- source_word: τυφλούς
  chosen: the blind
  alternatives:
  - blind people
  lexicon: BDAG
  rationale: Substantival adjective for blind persons. 'The blind' is the standard
    concise rendering.
