id: LUK.14.18
reference: Luke 14:18
source:
  edition: SBLGNT
  text: καὶ ἤρξαντο ἀπὸ μιᾶς ⸂πάντες παραιτεῖσθαι⸃. ὁ πρῶτος εἶπεν αὐτῷ· Ἀγρὸν ἠγόρασα
    καὶ ἔχω ἀνάγκην ⸀ἐξελθὼν ἰδεῖν αὐτόν· ἐρωτῶ σε, ἔχε με παρῃτημένον.
translation:
  text: But they all alike began to excuse themselves. The first said to him, ‘I have
    bought a field, and I need to go out and see it. I ask you, consider me excused.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “began to make excuses.” The Greek verb can denote declining an invitation
      by offering an excuse.
    reason: lexical_alternative
  - marker: b
    text: Literally “from one,” an idiom meaning “all together” or “with one accord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο ... παραιτεῖσθαι
  chosen: began to excuse themselves
  alternatives:
  - began to decline
  - began to make excuses
  lexicon: BDAG
  rationale: The middle infinitive construction conveys the start of a process of
    refusing by offering excuses. 'Excuse themselves' preserves the reflexive sense
    and fits the following examples; 'make excuses' is possible but slightly more
    idiomatic than the Greek wording.
- source_word: ἀπὸ μιᾶς
  chosen: alike
  alternatives:
  - with one accord
  - all at once
  - from one [impulse]
  lexicon: BDAG
  rationale: This idiom means 'all together' or 'as one.' 'Alike' in the phrase 'they
    all alike' gives natural English while preserving the collective force without
    importing a stronger unanimity formula than necessary.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: Explicitly renders the nominative plural adjective and keeps the emphasis
    on the universality of the response.
- source_word: Ἀγρόν
  chosen: a field
  alternatives:
  - a piece of land
  - a farm
  lexicon: BDAG
  rationale: ἀγρός commonly denotes a field or tract of land. 'Field' is the most
    direct rendering; 'farm' would add an agricultural nuance not required by the
    term.
- source_word: ἠγόρασα
  chosen: I have bought
  alternatives:
  - I bought
  lexicon: BDAG
  rationale: English present perfect fits the discourse naturally, expressing a recent
    completed purchase with present relevance. The aorist itself is simply past, but
    this rendering sounds idiomatic in context.
- source_word: ἔχω ἀνάγκην
  chosen: I need
  alternatives:
  - I have necessity
  - it is necessary for me
  lexicon: BDAG
  rationale: This idiom expresses necessity. 'I need' is clear modern English and
    preserves the force without wooden phrasing.
- source_word: ἐξελθὼν ἰδεῖν αὐτόν
  chosen: to go out and see it
  alternatives:
  - after going out, to look at it
  - to go and inspect it
  lexicon: BDAG
  rationale: The participle plus infinitive expresses attendant action/purpose. 'Go
    out and see it' is natural and sufficiently literal. 'Inspect' may overstate the
    nuance.
- source_word: ἐρωτῶ σε
  chosen: I ask you
  alternatives:
  - I beg you
  - please
  lexicon: BDAG
  rationale: The verb means 'ask, request.' 'I ask you' preserves the explicit politeness
    formula without paraphrasing it away into merely 'please.'
- source_word: ἔχε με παρῃτημένον
  chosen: consider me excused
  alternatives:
  - have me excused
  - regard me as having been excused
  lexicon: BDAG
  rationale: This idiom asks the host to accept the speaker's refusal. 'Consider me
    excused' is idiomatic modern English that captures the perfect participle's resultant
    state better than the stiffer 'have me excused.'
- source_word: καὶ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: At the start of the verse, καί links to the preceding invitation scene,
    but in English 'But' better reflects the adversative turn introduced by the guests'
    refusal.
- source_word: ὁ πρῶτος
  chosen: The first
  alternatives:
  - The first one
  lexicon: BDAG
  rationale: Straightforward rendering of the ordinal substantive, introducing the
    first excuse in the sequence.
