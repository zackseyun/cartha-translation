theological_decisions:
- issue: Nature of the saying
  chosen_reading: Render as practical instruction within a parabolic teaching on humility
    and honor, without importing later doctrinal categories.
  alternative_readings:
  - Treat as merely etiquette advice
  - Over-spiritualize as exclusively eschatological reward
  rationale: The verse uses banquet imagery to teach humility and reversal of honor,
    but the translation should not force either a purely social or purely eschatological
    interpretation beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
