id: LUK.14.10
reference: Luke 14:10
source:
  edition: SBLGNT
  text: ἀλλ’ ὅταν κληθῇς πορευθεὶς ἀνάπεσε εἰς τὸν ἔσχατον τόπον, ἵνα ὅταν ἔλθῃ ὁ
    κεκληκώς σε ⸀ἐρεῖ σοι· Φίλε, προσανάβηθι ἀνώτερον· τότε ἔσται σοι δόξα ἐνώπιον
    ⸀πάντων τῶν συνανακειμένων σοι.
translation:
  text: But when you are invited, go and recline in the lowest place, so that when
    the one who invited you comes, he will say to you, ‘Friend, move up higher.’ Then
    there will be honor for you in the presence of all who are reclining with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit down in the lowest seat.' The Greek verb refers specifically to
      reclining at a meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'come up higher.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κληθῇς
  chosen: are invited
  alternatives:
  - are called
  lexicon: BDAG
  rationale: In banquet context καλέω refers to being invited rather than merely called.
    'Invited' fits the social setting of the parable and is natural English.
- source_word: πορευθεὶς
  chosen: go
  alternatives:
  - having gone
  - after going
  lexicon: BDAG
  rationale: 'The participle is attendant to the main imperative and is best rendered
    idiomatically in English as a coordinate action: ''go and recline.'''
- source_word: ἀνάπεσε
  chosen: recline
  alternatives:
  - sit down
  - take your place
  lexicon: BDAG
  rationale: The verb literally refers to reclining at table, which matches first-century
    dining practice better than the more generalized 'sit down.' This preserves the
    cultural setting without becoming obscure.
- source_word: ἔσχατον τόπον
  chosen: the lowest place
  alternatives:
  - the last place
  - the lowest seat
  lexicon: BDAG
  rationale: ἔσχατος here denotes the least prominent position in seating order. 'Lowest
    place' communicates social rank clearly in English while remaining close to the
    Greek.
- source_word: ὁ κεκληκώς σε
  chosen: the one who invited you
  alternatives:
  - your host
  - the one who called you
  lexicon: BDAG
  rationale: The perfect participle identifies the inviter. 'The one who invited you'
    is explicit and transparent; 'host' is possible but slightly more interpretive.
- source_word: Φίλε
  chosen: Friend
  alternatives:
  - My friend
  - Companion
  lexicon: BDAG
  rationale: Friend is the straightforward vocative rendering and preserves the polite
    address without adding possessive nuance absent in Greek.
- source_word: προσανάβηθι ἀνώτερον
  chosen: move up higher
  alternatives:
  - come up higher
  - go up to a better place
  lexicon: BDAG
  rationale: The expression means to move to a more honored position. 'Move up higher'
    is natural modern English and preserves the upward/honor imagery.
- source_word: δόξα
  chosen: honor
  alternatives:
  - glory
  - credit
  lexicon: BDAG
  rationale: In this social setting δόξα refers to public honor or esteem rather than
    divine glory. 'Honor' best fits the immediate context.
- source_word: ἐνώπιον πάντων τῶν συνανακειμένων σοι
  chosen: in the presence of all who are reclining with you
  alternatives:
  - before all who are at table with you
  - in front of all your fellow guests
  lexicon: BDAG
  rationale: This keeps the public aspect ('in the presence of all') and preserves
    the meal imagery with 'reclining.' 'Fellow guests' is smoother but less explicit
    than the Greek participle.
