id: LUK.14.32
reference: Luke 14:32
source:
  edition: SBLGNT
  text: εἰ δὲ μήγε, ἔτι ⸂αὐτοῦ πόρρω⸃ ὄντος πρεσβείαν ἀποστείλας ἐρωτᾷ ⸀τὰ πρὸς εἰρήνην.
translation:
  text: But if not, while the other is still far away, he sends a delegation and asks
    for terms of peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an embassy' or 'envoys' for 'a delegation.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the things pertaining to peace'; that is, terms that would secure
      peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήγε
  chosen: if not
  alternatives:
  - otherwise
  lexicon: BDAG
  rationale: 'In the construction εἰ δὲ μήγε, the sense is adversative/conditional:
    ''but if not'' or ''otherwise if not.'' ''But if not'' preserves the Greek structure
    naturally in English.'
- source_word: ἔτι αὐτοῦ πόρρω ὄντος
  chosen: while the other is still far away
  alternatives:
  - while he is still far off
  - while that one is still far away
  lexicon: BDAG
  rationale: This genitive absolute marks contemporaneous circumstance. αὐτοῦ refers
    to the opposing king in the parable, not the subject king; 'the other' makes the
    referent clear in English without over-specifying. πόρρω is best rendered 'far
    away/far off.'
- source_word: πρεσβείαν
  chosen: a delegation
  alternatives:
  - an embassy
  - envoys
  lexicon: BDAG
  rationale: πρεσβεία can denote an embassy, delegation, or body of envoys. 'Delegation'
    is idiomatic modern English and fits the narrative setting better than the more
    formal 'embassy.'
- source_word: ἀποστείλας
  chosen: he sends
  alternatives:
  - having sent
  - sending
  lexicon: BDAG
  rationale: 'The aorist participle is contemporaneous or antecedent to the main verb
    and is naturally rendered in English with a finite verb coordinated to the main
    action: ''he sends ... and asks.'' This avoids awkwardness while preserving the
    sequence.'
- source_word: ἐρωτᾷ
  chosen: asks for
  alternatives:
  - requests
  - seeks
  lexicon: BDAG
  rationale: ἐρωτάω here carries the sense of asking/requesting rather than merely
    inquiring. 'Asks for' works smoothly with the following object phrase in English.
- source_word: τὰ πρὸς εἰρήνην
  chosen: terms of peace
  alternatives:
  - peace
  - the things pertaining to peace
  lexicon: BDAG
  rationale: The idiom literally means 'the things toward peace,' that is, matters
    making for peace or peace terms. 'Terms of peace' is concise, idiomatic, and contextually
    appropriate in a military-political scenario.
