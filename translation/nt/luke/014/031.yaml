id: LUK.14.31
reference: Luke 14:31
source:
  edition: SBLGNT
  text: ἢ τίς βασιλεὺς πορευόμενος ⸂ἑτέρῳ βασιλεῖ συμβαλεῖν⸃ εἰς πόλεμον οὐχὶ καθίσας
    πρῶτον ⸀βουλεύσεται εἰ δυνατός ἐστιν ἐν δέκα χιλιάσιν ⸀ὑπαντῆσαι τῷ μετὰ εἴκοσι
    χιλιάδων ἐρχομένῳ ἐπ’ αὐτόν;
translation:
  text: Or what king, going to meet another king in war, will not first sit down and
    consider whether he is able with ten thousand to oppose the one coming against
    him with twenty thousand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet' (for 'to oppose'); the Greek verb can be rendered more literally,
      but here it refers to meeting an advancing army in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  lexicon: BDAG
  rationale: Introduces the second illustrative comparison in Jesus' discourse; simple
    'Or' preserves the rhetorical flow.
- source_word: τίς βασιλεὺς
  chosen: what king
  alternatives:
  - which king
  lexicon: BDAG
  rationale: Idiomatic English for the rhetorical question; 'what king' matches the
    generic force of τίς with βασιλεύς.
- source_word: πορευόμενος
  chosen: going
  alternatives:
  - setting out
  - marching
  lexicon: BDAG
  rationale: The participle denotes movement with purpose. 'Going' is natural and
    sufficiently broad; the military sense is supplied by the surrounding phrase 'to
    meet another king in war.'
- source_word: ἑτέρῳ βασιλεῖ
  chosen: another king
  alternatives:
  - a different king
  lexicon: BDAG
  rationale: ἕτερος can stress 'another/different'; in idiomatic English 'another
    king' is natural while still conveying an opposing ruler.
- source_word: συμβαλεῖν εἰς πόλεμον
  chosen: to meet another king in war
  alternatives:
  - to engage another king in war
  - to go to war against another king
  lexicon: BDAG
  rationale: The infinitive with εἰς πόλεμον expresses entering into armed conflict.
    'Meet ... in war' preserves the imagery and leaves room for the later verb ὑπαντῆσαι
    to carry the sense of direct opposition.
- source_word: οὐχὶ
  chosen: will not
  alternatives:
  - does not
  lexicon: BDAG
  rationale: οὐχί expects an affirmative answer in a rhetorical question. Future 'will
    not' matches the future middle βουλεύσεται.
- source_word: καθίσας πρῶτον
  chosen: first sit down
  alternatives:
  - sit down first
  lexicon: BDAG
  rationale: Aorist participle plus πρῶτον indicates prior action before deliberation.
    'First sit down' is idiomatic and preserves sequence.
- source_word: βουλεύσεται
  chosen: consider
  alternatives:
  - deliberate
  - take counsel
  - plan
  lexicon: BDAG
  rationale: The middle verb denotes deliberation/counseling. 'Consider' is clear
    modern English and fits the parabolic point about counting the cost.
- source_word: εἰ δυνατός ἐστιν
  chosen: whether he is able
  alternatives:
  - whether he can
  - if he is strong enough
  lexicon: BDAG
  rationale: Expresses capability rather than mere permission. 'Whether he is able'
    is slightly more formal and matches the evaluative tone.
- source_word: ἐν δέκα χιλιάσιν
  chosen: with ten thousand
  alternatives:
  - by means of ten thousand
  - having ten thousand
  lexicon: BDAG
  rationale: ἐν here is instrumental/associative in context, referring to the force
    at his disposal. 'With ten thousand' is the most natural military English.
- source_word: ὑπαντῆσαι
  chosen: to oppose
  alternatives:
  - to meet
  - to confront
  lexicon: BDAG
  rationale: Though literally 'to meet,' in this military context the sense is to
    meet in opposition. 'Oppose' makes the conflict explicit for modern readers without
    over-paraphrasing.
- source_word: τῷ μετὰ εἴκοσι χιλιάδων ἐρχομένῳ ἐπ’ αὐτόν
  chosen: the one coming against him with twenty thousand
  alternatives:
  - the one advancing against him with twenty thousand
  - the one coming upon him with twenty thousand
  lexicon: BDAG
  rationale: The participial phrase describes the opposing king approaching with a
    larger force. 'Coming against him' clearly renders ἐρχομένῳ ἐπ’ αὐτόν as hostile
    advance.
