id: LUK.14.22
reference: Luke 14:22
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ δοῦλος· Κύριε, γέγονεν ⸀ὃ ἐπέταξας, καὶ ἔτι τόπος ἐστίν.
translation:
  text: And the servant said, ‘Lord, what you commanded has been done, and there is
    still room.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slave' for 'servant' (δοῦλος).
    reason: lexical_alternative
  - marker: b
    text: Or 'Master' for 'Lord' (Κύριε).
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  chosen: servant
  alternatives:
  - slave
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave,' in this parable the bonded status is
    not theologically foregrounded as it is in some epistolary self-designations.
    'Servant' fits natural English dialogue while preserving the master-servant relationship.
    The alternative is worth preserving because the term can denote a slave.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: κύριος is vocative here, addressed to the householder in the parable.
    Per doctrine defaults, 'Lord' is the standard rendering. 'Master' is contextually
    possible in a parable of household authority, but 'Lord' maintains consistency
    with the default and remains idiomatic.
- source_word: γέγονεν
  chosen: has been done
  alternatives:
  - has happened
  - has come to pass
  lexicon: BDAG
  rationale: The perfect of γίνομαι here reports completed fulfillment of the command.
    'Has been done' best captures the resultative sense in English in connection with
    the following relative clause.
- source_word: ὃ ἐπέταξας
  chosen: what you commanded
  alternatives:
  - what you ordered
  lexicon: BDAG
  rationale: The neuter relative pronoun with ἐπιτάσσω refers to the content of the
    master's prior instruction. 'What you commanded' is clear, natural, and preserves
    the authoritative force of the verb.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: '''Still'' is the most natural modern English adverb here, expressing
    that space remains even after the command has been carried out.'
- source_word: τόπος
  chosen: room
  alternatives:
  - space
  - place
  lexicon: BDAG
  rationale: In the banquet setting, τόπος refers to available capacity. 'Room' is
    idiomatic in English for available space at a meal. 'Space' is possible but less
    natural in this context.
