id: LUK.14.16
reference: Luke 14:16
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ· Ἄνθρωπός τις ⸀ἐποίει δεῖπνον μέγα, καὶ ἐκάλεσεν πολλούς,
translation:
  text: But he said to him, “A certain man was preparing a great dinner and invited
    many,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a great banquet” or “a large supper.” The Greek δεῖπνον denotes the
      main meal; the context is a formal hosted meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν αὐτῷ
  chosen: But he said to him
  alternatives:
  - And he said to him
  - Then he said to him
  lexicon: BDAG
  rationale: δέ is a mild connective that can be rendered 'but,' 'and,' or sometimes
    left untranslated. Here 'But' preserves the discourse turn in response to the
    prior speaker without overstating contrast.
- source_word: Ἄνθρωπός τις
  chosen: A certain man
  alternatives:
  - A man
  - Someone
  lexicon: BDAG
  rationale: The indefinite τις adds specificity beyond a bare 'man,' a common narrative/parabolic
    idiom best represented by 'a certain man.' This also preserves the masculine singular
    form in line with the gender-accurate policy.
- source_word: ἐποίει
  chosen: was preparing
  alternatives:
  - made
  - gave
  - was making
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action in past time. In
    this banquet context, 'was preparing' communicates the process more naturally
    than the wooden 'was making' and avoids the possible over-interpretation of 'gave'
    before the meal is actually underway.
- source_word: δεῖπνον μέγα
  chosen: a great dinner
  alternatives:
  - a great banquet
  - a large supper
  lexicon: BDAG
  rationale: δεῖπνον refers to the main meal, often the evening meal. 'Dinner' is
    clear modern English; 'great' preserves μέγα straightforwardly. 'Banquet' is possible
    contextually, but the Greek noun itself is 'dinner/meal,' with the largeness conveyed
    by μέγα.
- source_word: καὶ ἐκάλεσεν πολλούς
  chosen: and invited many
  alternatives:
  - and called many
  - and invited many people
  lexicon: BDAG
  rationale: In meal-hosting context, καλέω means 'invite' rather than the more generic
    'call.' 'Many' adequately represents πολλούς without adding 'people,' which is
    implied.
