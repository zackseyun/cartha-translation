theological_decisions:
- issue: Metaphorical force of the salt saying
  chosen_reading: Retain the proverb literally without explicating its discipleship
    meaning in the translation.
  alternative_readings:
  - Interpretively expand to 'if disciples lose their distinctiveness...'
  rationale: The verse uses a literal image whose application is supplied by the surrounding
    context. Optimal equivalence here preserves the metaphorical tension rather than
    resolving it in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
