id: LUK.14.34
reference: Luke 14:34
source:
  edition: SBLGNT
  text: Καλὸν ⸀οὖν τὸ ἅλας· ἐὰν δὲ ⸀καὶ τὸ ἅλας μωρανθῇ, ἐν τίνι ἀρτυθήσεται;
translation:
  text: Salt, then, is good; but if even the salt becomes tasteless, with what will
    it be seasoned?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if salt loses its taste.' The Greek verb can literally mean 'become
      foolish,' but here it refers to salt becoming insipid or tasteless.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καλὸν
  chosen: good
  alternatives:
  - useful
  - fine
  lexicon: BDAG
  rationale: καλός here evaluates salt positively in a general sense. 'Good' is the
    most natural English equivalent and fits the proverbial statement without over-specifying
    utility or beauty.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding teaching. 'Then' preserves
    the connective force in readable English without sounding overly formal like 'therefore.'
- source_word: ἅλας
  chosen: salt
  lexicon: BDAG
  rationale: Literal reference to salt, used proverbially. No reason to paraphrase.
- source_word: ἐὰν δὲ καὶ
  chosen: but if even
  alternatives:
  - but if
  - and if even
  lexicon: BDAG
  rationale: 'The combination heightens the conditional: even something as characteristically
    useful as salt may fail. ''But if even'' preserves both contrast (δέ) and emphasis
    (καί).'
- source_word: μωρανθῇ
  chosen: becomes tasteless
  alternatives:
  - loses its taste
  - becomes foolish
  lexicon: BDAG
  rationale: Although μωραίνω literally can mean 'become foolish,' in this context
    with salt it is an idiomatic extension meaning to become insipid or tasteless.
    'Becomes tasteless' is direct and idiomatic English. 'Loses its taste' is also
    possible, but 'becomes tasteless' more closely reflects the passive/inchoative
    form.
- source_word: ἐν τίνι
  chosen: with what
  alternatives:
  - by what means
  - in what
  lexicon: BDAG
  rationale: This prepositional phrase introduces the means or instrument by which
    seasoning could occur. 'With what' is the natural English idiom in this rhetorical
    question.
- source_word: ἀρτυθήσεται
  chosen: will it be seasoned
  alternatives:
  - will it be made salty
  - will it be restored
  lexicon: BDAG
  rationale: ἀρτύω means to season or make fit by seasoning. 'Will it be seasoned'
    preserves the culinary metaphor and avoids over-interpretive renderings like 'restored.'
