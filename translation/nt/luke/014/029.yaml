id: LUK.14.29
reference: Luke 14:29
source:
  edition: SBLGNT
  text: ἵνα μήποτε θέντος αὐτοῦ θεμέλιον καὶ μὴ ἰσχύοντος ἐκτελέσαι πάντες οἱ θεωροῦντες
    ἄρξωνται ⸂αὐτῷ ἐμπαίζειν⸃
translation:
  text: otherwise, after he has laid a foundation and is not able to finish, all who
    see it may begin to mock him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest perhaps, after he has laid a foundation and is unable to complete
      it, all who see begin to ridicule him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα μήποτε
  chosen: otherwise
  alternatives:
  - lest perhaps
  - so that not
  lexicon: BDAG
  rationale: In this parabolic warning context, ἵνα μήποτε introduces the undesirable
    outcome to be avoided. 'Otherwise' gives natural modern English while preserving
    the cautionary force better than a wooden 'lest perhaps.'
- source_word: θέντος αὐτοῦ
  chosen: after he has laid
  alternatives:
  - when he has laid
  - having laid
  lexicon: BDAG
  rationale: The genitive absolute marks prior action relative to the main verb. 'After
    he has laid' clearly conveys the temporal sequence in idiomatic English.
- source_word: θεμέλιον
  chosen: a foundation
  alternatives:
  - the foundation
  lexicon: BDAG
  rationale: The anarthrous accusative is naturally rendered indefinitely here in
    English. The sense is beginning construction by laying foundation work.
- source_word: μὴ ἰσχύοντος
  chosen: is not able
  alternatives:
  - does not have strength
  - is unable
  lexicon: BDAG
  rationale: ἰσχύω here denotes capability rather than physical strength alone. 'Is
    not able' is clear and idiomatic.
- source_word: ἐκτελέσαι
  chosen: to finish
  alternatives:
  - to complete
  - to carry through to the end
  lexicon: BDAG
  rationale: In building context, 'finish' is the most natural English equivalent,
    while still reflecting the idea of bringing the project to completion.
- source_word: πάντες οἱ θεωροῦντες
  chosen: all who see it
  alternatives:
  - all who observe
  - everyone watching
  lexicon: BDAG
  rationale: θεωρέω means to observe or see. Because the object of observation is
    the unfinished building situation implied by the context, 'see it' makes the English
    natural without materially adding to the sense.
- source_word: ἄρξωνται
  chosen: may begin
  alternatives:
  - will begin
  lexicon: BDAG
  rationale: The aorist middle subjunctive follows the warning construction and is
    well represented by 'may begin' in English, preserving the potential-result nuance.
- source_word: αὐτῷ ἐμπαίζειν
  chosen: to mock him
  alternatives:
  - to ridicule him
  - to make fun of him
  lexicon: BDAG
  rationale: ἐμπαίζω carries the sense of mocking or ridiculing. 'Mock him' is concise,
    dignified, and fits the tone of the saying.
