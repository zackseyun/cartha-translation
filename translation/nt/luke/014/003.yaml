id: LUK.14.3
reference: Luke 14:3
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν πρὸς τοὺς νομικοὺς καὶ Φαρισαίους λέγων· ⸀Ἔξεστιν
    τῷ σαββάτῳ ⸂θεραπεῦσαι ἢ οὔ⸃;
translation:
  text: And Jesus answered and said to the lawyers and Pharisees, “Is it lawful to
    heal on the Sabbath, or not?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “experts in the law.” The Greek term refers to specialists in the Jewish
      law.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in Greek narrative ('answered and said'). 'Answered' preserves
    the idiom and the narrative sense that Jesus is replying to the situation or unspoken
    challenge.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative introduction. Kept alongside
    'answered' to preserve the Greek double expression rather than collapsing it.
- source_word: νομικοὺς
  chosen: lawyers
  alternatives:
  - experts in the law
  - legal experts
  lexicon: BDAG
  rationale: νομικός here refers to specialists in the Mosaic law, not modern civil
    attorneys. 'Lawyers' is concise and traditional, while the context with Pharisees
    makes the religious-legal sense clear. Alternatives are viable but less concise.
- source_word: Φαρισαίους
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: Ἔξεστιν
  chosen: Is it lawful
  alternatives:
  - Is it permitted
  - Is it allowed
  lexicon: BDAG
  rationale: ἔξεστιν denotes what is permitted or lawful. In a Sabbath controversy
    context, 'lawful' best captures the halakhic/legal force of the question.
- source_word: τῷ σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on the Sabbath day
  lexicon: BDAG
  rationale: Dative with temporal force; 'on the Sabbath' is natural English and preserves
    the specific day in view.
- source_word: θεραπεῦσαι
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: θεραπεύω in Gospel healing contexts is best rendered 'heal.' It preserves
    both the physical-restorative sense and the established Gospel usage.
- source_word: ἢ οὔ
  chosen: or not
  alternatives:
  - or is it not
  lexicon: BDAG
  rationale: Direct, idiomatic rendering of the disjunctive question ending.
