theological_decisions:
- issue: Rendering the Sabbath-law question without importing Jesus' conclusion
  chosen_reading: Is it lawful to heal on the Sabbath, or not?
  alternative_readings:
  - Is it permitted to heal on the Sabbath or not?
  rationale: The verse presents a legal-theological question in a controversy setting.
    The translation preserves the question's force without adding interpretive material
    about mercy, necessity, or Jesus' authority beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
