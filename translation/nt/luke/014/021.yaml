id: LUK.14.21
reference: Luke 14:21
source:
  edition: SBLGNT
  text: καὶ παραγενόμενος ὁ ⸀δοῦλος ἀπήγγειλεν τῷ κυρίῳ αὐτοῦ ταῦτα. τότε ὀργισθεὶς
    ὁ οἰκοδεσπότης εἶπεν τῷ δούλῳ αὐτοῦ· Ἔξελθε ταχέως εἰς τὰς πλατείας καὶ ῥύμας
    τῆς πόλεως, καὶ τοὺς πτωχοὺς καὶ ἀναπείρους καὶ ⸂τυφλοὺς καὶ χωλοὺς⸃ εἰσάγαγε
    ὧδε.
translation:
  text: And when the servant came back, he reported these things to his lord. Then
    the master of the house, becoming angry, said to his servant, ‘Go out quickly
    into the broad streets and lanes of the city, and bring in here the poor and disabled
    and blind and lame.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “master” for “lord” (κύριος); the term here refers to the servant’s human
      superior, not to God.
    reason: lexical_alternative
  - marker: b
    text: Or “maimed” for “disabled” (ἀναπείρους).
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  chosen: came back
  alternatives:
  - arrived
  - returned
  - came
  lexicon: BDAG
  rationale: In this narrative context the servant is returning from carrying out
    instructions and reporting back. 'Came back' makes the implicit return sense clear
    in natural English without overparaphrasing.
- source_word: δοῦλος
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave,' here the bonded status is not theologically
    salient; the focus is the household role within the parable. Per doctrine, 'servant
    / slave' is context-dependent, so 'servant' is appropriate and readable here.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  - informed
  lexicon: BDAG
  rationale: '''Reported'' fits the sense of relaying information back to a superior
    and matches the narrative sequence.'
- source_word: κυρίῳ
  chosen: lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: κύριος normally defaults to 'Lord' per doctrine, but here it refers to
    the servant's human superior in a parable, not a divine or christological title.
    Lowercase 'lord' preserves the relational sense. 'Master' was possible, but 'lord'
    keeps closer lexical continuity with κύριος while avoiding confusion by capitalization.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these matters
  lexicon: BDAG
  rationale: A straightforward rendering of the plural demonstrative, preserving the
    reference to the previously stated excuses.
- source_word: ὀργισθεὶς
  chosen: becoming angry
  alternatives:
  - being angry
  - angered
  - furious
  lexicon: BDAG
  rationale: The participle marks the master's reaction prior to speaking. 'Becoming
    angry' preserves the ingressive nuance better than the flatter 'being angry.'
- source_word: οἰκοδεσπότης
  chosen: master of the house
  alternatives:
  - householder
  - head of the household
  lexicon: BDAG
  rationale: This term specifically denotes the head/master of a household. 'Master
    of the house' is idiomatic and preserves the household setting better than the
    less natural 'householder.'
- source_word: Ἔξελθε
  chosen: Go out
  alternatives:
  - Go
  - Go forth
  lexicon: BDAG
  rationale: The compound verb explicitly includes the outward movement; 'Go out'
    preserves that force.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - at once
  - swiftly
  lexicon: BDAG
  rationale: A natural adverbial rendering that preserves urgency.
- source_word: πλατείας
  chosen: broad streets
  alternatives:
  - streets
  - squares
  lexicon: BDAG
  rationale: πλατεῖα refers to wide/open streets or public squares. 'Broad streets'
    preserves the lexical contrast with narrower lanes in the next term.
- source_word: ῥύμας
  chosen: lanes
  alternatives:
  - alleys
  - narrow streets
  lexicon: BDAG
  rationale: This term denotes smaller streets or lanes. 'Lanes' is concise and preserves
    the contrast with πλατείας.
- source_word: πτωχοὺς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: A standard rendering that preserves the substantival adjective.
- source_word: ἀναπείρους
  chosen: disabled
  alternatives:
  - crippled
  - maimed
  lexicon: BDAG
  rationale: The term refers to those with physical impairment. 'Disabled' is clear
    modern English and avoids the dated or potentially pejorative force of 'crippled';
    'maimed' is narrower and may imply injury rather than disability generally.
- source_word: τυφλοὺς
  chosen: blind
  alternatives:
  - the blind
  lexicon: BDAG
  rationale: A direct rendering of the substantival adjective; in English the coordinated
    series reads naturally without repeating 'the' before each item.
- source_word: χωλοὺς
  chosen: lame
  alternatives:
  - the lame
  - crippled
  lexicon: BDAG
  rationale: A standard rendering for those unable to walk properly; it preserves
    the distinct term from ἀναπείρους.
- source_word: εἰσάγαγε
  chosen: bring in
  alternatives:
  - lead in
  - bring
  lexicon: BDAG
  rationale: The verb explicitly means to bring into a place; 'bring in' preserves
    that directional force.
- source_word: ὧδε
  chosen: here
  alternatives:
  - to this place
  lexicon: BDAG
  rationale: A simple and natural rendering of the adverb indicating destination toward
    the speaker's location.
