theological_decisions:
- issue: Rendering of δοῦλος in a parabolic household setting
  chosen_reading: servant
  alternative_readings:
  - slave
  - bondservant
  rationale: The doctrine statement allows 'servant / slave' context-dependently.
    In this verse the social role within the story is foregrounded, not the bonded
    status as a theological motif, so 'servant' best fits the context while remaining
    faithful.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Rendering of κύριος for a human referent
  chosen_reading: lord
  alternative_readings:
  - master
  rationale: The default 'Lord' applies especially to covenantal and NT usage. Here
    the referent is a human superior in a parable, so lowercase 'lord' is used to
    avoid implying divinity while preserving lexical continuity. The distinct term
    οἰκοδεσπότης is rendered 'master of the house,' preventing confusion between the
    two nouns.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy §5'
