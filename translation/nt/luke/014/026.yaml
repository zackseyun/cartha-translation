id: LUK.14.26
reference: Luke 14:26
source:
  edition: SBLGNT
  text: Εἴ τις ἔρχεται πρός με καὶ οὐ μισεῖ τὸν πατέρα ⸀ἑαυτοῦ καὶ τὴν μητέρα καὶ
    τὴν γυναῖκα καὶ τὰ τέκνα καὶ τοὺς ἀδελφοὺς καὶ τὰς ἀδελφάς, ἔτι ⸀τε καὶ τὴν ⸂ψυχὴν
    ἑαυτοῦ⸃, οὐ δύναται ⸂εἶναί μου μαθητής⸃.
translation:
  text: If anyone comes to me and does not hate his own father and mother and wife
    and children and brothers and sisters—and even his own life—he cannot be my disciple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not love ... less.' The verb is literally 'hate,' but in this context
      it expresses a demand that loyalty to Jesus take precedence over even the closest
      family ties; compare Matt 10:37.
    reason: lexical_alternative
  - marker: b
    text: Or 'his own soul.' Here 'life' reflects the likely sense of ψυχή in the
      context of the cost of discipleship.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισεῖ
  chosen: hate
  alternatives:
  - love less
  - renounce
  lexicon: BDAG
  rationale: The verb's plain lexical sense is 'hate.' Although in Semitic-influenced
    comparative contexts it can convey preference by contrast ('love less'), replacing
    it in the main text would soften the force of Jesus' wording beyond the Greek
    expression. The comparative sense is preserved in a footnote for auditability
    and to reflect the parallel idea in Matt 10:37.
- source_word: ἔρχεται πρός με
  chosen: comes to me
  alternatives:
  - comes after me
  lexicon: BDAG
  rationale: A straightforward rendering of the present middle indicative with πρός.
    'Comes to me' preserves the direct relational movement without importing the more
    idiomatic discipleship wording 'comes after me,' which is not the phrase used
    here.
- source_word: πατέρα ἑαυτοῦ
  chosen: his own father
  alternatives:
  - his father
  lexicon: BDAG
  rationale: The reflexive ἑαυτοῦ is represented by 'his own' to preserve the personal
    force and the comprehensiveness of the demand.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this household list, 'wife' is the natural contextual sense of γυνή
    rather than the more general 'woman.'
- source_word: ἀδελφοὺς καὶ ἀδελφάς
  chosen: brothers and sisters
  alternatives:
  - brothers and sisters of his own
  lexicon: BDAG
  rationale: Both masculine and feminine sibling terms are explicitly present, so
    English should preserve both. This is not a generic-inclusive rendering but a
    direct reflection of the source.
- source_word: ἔτι τε καὶ
  chosen: and even
  alternatives:
  - yes, even
  - and also
  lexicon: BDAG
  rationale: This combination heightens the final item in the list. 'And even' captures
    the climactic emphasis in natural English.
- source_word: ψυχὴν ἑαυτοῦ
  chosen: his own life
  alternatives:
  - his own soul
  - himself
  lexicon: BDAG
  rationale: In this context of discipleship cost, ψυχή most naturally refers to one's
    life/self rather than the immaterial soul in a narrow sense. 'Life' is clearer
    modern English and fits the saying's demand of ultimate allegiance.
- source_word: οὐ δύναται εἶναί μου μαθητής
  chosen: he cannot be my disciple
  alternatives:
  - he is not able to be my disciple
  lexicon: BDAG
  rationale: This is a natural but accurate rendering of the idiom. 'Cannot be' preserves
    the force of inability/incompatibility rather than mere prohibition.
