theological_decisions:
- issue: Whether to soften Jesus' demand by rendering μισεῖ as a comparative expression
    in the main text
  chosen_reading: Retain 'hate' in the main text and explain the comparative/priority
    sense in a footnote.
  alternative_readings:
  - Render 'hate' as 'love less' in the main text
  rationale: The translation philosophy prioritizes original-language primacy and
    preserving theological tension rather than resolving it. Jesus' wording is intentionally
    stark; rendering 'love less' in the main text would interpret the figure rather
    than translate it. A footnote preserves the likely comparative sense without flattening
    the saying.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Meaning of ψυχή in this verse
  chosen_reading: Translate as 'life' rather than 'soul.'
  alternative_readings:
  - soul
  - self
  rationale: The context is the cost of discipleship and relinquishing ultimate claim
    over one's own life. 'Life' best communicates the sense in contemporary English
    without importing a narrower anthropological claim about the soul.
  doctrine_reference: Translation philosophy §6
