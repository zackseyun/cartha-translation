id: LUK.14.12
reference: Luke 14:12
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ καὶ τῷ κεκληκότι αὐτόν· Ὅταν ποιῇς ἄριστον ἢ δεῖπνον, μὴ φώνει τοὺς
    φίλους σου μηδὲ τοὺς ἀδελφούς σου μηδὲ τοὺς συγγενεῖς σου μηδὲ γείτονας πλουσίους,
    μήποτε καὶ αὐτοὶ ⸂ἀντικαλέσωσίν σε⸃ καὶ γένηται ⸂ἀνταπόδομά σοι⸃.
translation:
  text: And he was also saying to the one who had invited him, “When you give a luncheon
    or a dinner, do not invite your friends or your brothers or your relatives or
    rich neighbors, lest they also invite you in return and it become repayment to
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'breakfast' for 'luncheon'; the Greek ἄριστον refers to an earlier meal,
      often around midday rather than a modern morning breakfast.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they invite you back.' The Greek verb means to invite in return.
    reason: lexical_alternative
  - marker: c
    text: Or, 'you be repaid.' The Greek more literally says, 'it become repayment
      to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν δὲ καὶ
  chosen: And he was also saying
  alternatives:
  - And he also said
  - Then he also said
  lexicon: BDAG
  rationale: Imperfect Ἔλεγεν is rendered with progressive force ('was saying') to
    preserve the narrative aspect, while δὲ is represented by 'And' as a mild connective
    and καὶ by 'also'.
- source_word: τῷ κεκληκότι αὐτόν
  chosen: to the one who had invited him
  alternatives:
  - to his host
  - to the man who had invited him
  lexicon: BDAG
  rationale: The perfect participle of καλέω refers to the person who had invited
    Jesus. 'The one who had invited him' is explicit and transparent; 'host' is idiomatic
    but slightly more interpretive.
- source_word: Ὅταν ποιῇς
  chosen: When you give
  alternatives:
  - Whenever you make
  - When you prepare
  lexicon: BDAG
  rationale: ποιέω with meal terms idiomatically means to give or host a meal, not
    merely to make one. 'When you give' is natural English and fits the social setting.
- source_word: ἄριστον
  chosen: luncheon
  alternatives:
  - breakfast
  - midday meal
  - banquet
  lexicon: BDAG
  rationale: ἄριστον denotes an earlier meal, often midday rather than modern breakfast.
    'Luncheon' best distinguishes it from δεῖπνον ('dinner') in contemporary readable
    English without collapsing the contrast.
- source_word: δεῖπνον
  chosen: dinner
  alternatives:
  - evening meal
  - banquet
  lexicon: BDAG
  rationale: δεῖπνον is the main meal, typically later in the day. 'Dinner' is the
    most straightforward modern equivalent here.
- source_word: μὴ φώνει
  chosen: do not invite
  alternatives:
  - do not call
  - do not summon
  lexicon: BDAG
  rationale: φωνέω literally means 'call,' but in meal-invitation context 'invite'
    conveys the intended social action in idiomatic English.
- source_word: τοὺς φίλους σου
  chosen: your friends
  lexicon: BDAG
  rationale: Standard rendering of φίλοι in this social context.
- source_word: τοὺς ἀδελφούς σου
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this list likely refers
    to family males specifically or family members under masculine form. Per translation
    philosophy, the gendered form is retained rather than neutralized.
- source_word: τοὺς συγγενεῖς σου
  chosen: your relatives
  alternatives:
  - your kinsmen
  - your kin
  lexicon: BDAG
  rationale: συγγενεῖς refers to relatives/kinsfolk. 'Relatives' is clear modern English.
- source_word: γείτονας πλουσίους
  chosen: rich neighbors
  alternatives:
  - wealthy neighbors
  - neighbors who are rich
  lexicon: BDAG
  rationale: The adjective πλουσίους directly qualifies γείτονας. 'Rich neighbors'
    is concise and natural.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: BDAG
  rationale: μήποτε introduces a negative purpose/result warning. 'Lest' is concise
    and preserves the cautionary nuance, though somewhat elevated; it remains readable
    here.
- source_word: ἀντικαλέσωσίν σε
  chosen: they also invite you in return
  alternatives:
  - they invite you back
  - they reciprocally invite you
  lexicon: BDAG
  rationale: The compound verb carries the sense of inviting in return. 'Invite you
    in return' preserves reciprocity clearly and slightly more formally than 'invite
    you back'.
- source_word: γένηται ἀνταπόδομά σοι
  chosen: it become repayment to you
  alternatives:
  - you be repaid
  - it become your repayment
  - there be repayment for you
  lexicon: BDAG
  rationale: 'The construction is somewhat impersonal/literal: ''and it become repayment
    to you.'' This preserves the idea that the returned invitation functions as recompense.
    A smoother rendering like ''you be repaid'' is possible but less transparent to
    the Greek structure.'
