id: LUK.14.2
reference: Luke 14:2
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἄνθρωπός τις ἦν ὑδρωπικὸς ἔμπροσθεν αὐτοῦ.
translation:
  text: And behold, a certain man who had edema was before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'suffering from dropsy.' The Greek ὑδρωπικός refers to a person afflicted
      with abnormal fluid swelling; 'edema' gives the sense in current English.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the narrative linkage without adding
    temporal nuance not explicit in the conjunction.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse marker's attention-directing force. Though somewhat
    elevated, it remains understandable and preserves Luke's narrative vividness better
    than omitting it.
- source_word: ἄνθρωπός τις
  chosen: a certain man
  alternatives:
  - a man
  - someone
  lexicon: BDAG
  rationale: The combination of the noun with the indefinite τις often introduces
    a particular but unnamed individual. 'A certain man' preserves that specificity
    better than the flatter 'a man' or less literal 'someone'.
- source_word: ἦν
  chosen: was
  alternatives:
  - there was
  lexicon: BDAG
  rationale: Simple imperfect of εἰμί. 'Was' fits the clause naturally in English
    with the fronted locative phrase following; 'there was' is possible but less direct
    here.
- source_word: ὑδρωπικὸς
  chosen: who had edema
  alternatives:
  - dropsical
  - suffering from dropsy
  - swollen with fluid
  lexicon: BDAG
  rationale: The adjective denotes a person afflicted with edema/dropsy. 'Who had
    edema' communicates the medical condition in clear modern English without archaic
    terminology like 'dropsy' or the obscure 'dropsical.'
- source_word: ἔμπροσθεν αὐτοῦ
  chosen: was before him
  alternatives:
  - was in front of him
  - was in his presence
  lexicon: BDAG
  rationale: The phrase can denote spatial position and, by extension, presence. 'Before
    him' preserves the Greek wording and leaves both the spatial and situational sense
    available in context.
