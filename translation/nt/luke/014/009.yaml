id: LUK.14.9
reference: Luke 14:9
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ὁ σὲ καὶ αὐτὸν καλέσας ἐρεῖ σοι· Δὸς τούτῳ τόπον, καὶ τότε ἄρξῃ
    μετὰ αἰσχύνης τὸν ἔσχατον τόπον κατέχειν.
translation:
  text: and the one who invited both you and him will come and say to you, ‘Give this
    man your place,’ and then you will begin with shame to take the last place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lowest place.' The Greek expression τὸν ἔσχατον τόπον can denote
      the last position in order, and in this banquet setting therefore the lowest
      seat of honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ σὲ καὶ αὐτὸν καλέσας
  chosen: the one who invited both you and him
  alternatives:
  - the host who invited you both
  - the one who had invited you and him
  lexicon: BDAG
  rationale: The articular participial construction functions substantivally, referring
    to the inviter/host. 'The one who invited both you and him' preserves the Greek
    structure and the contrast between the two invitees without over-paraphrasing.
- source_word: ἐλθὼν
  chosen: will come
  alternatives:
  - having come
  - when he comes
  lexicon: BDAG
  rationale: Although formally an aorist participle, in sequence with the future main
    verb ἐρεῖ it is naturally rendered in English as a coordinated future action,
    'will come,' for readable modern English.
- source_word: ἐρεῖ σοι
  chosen: will say to you
  alternatives:
  - will tell you
  lexicon: BDAG
  rationale: λέγω here is straightforward speech reporting. 'Say to you' is slightly
    more formal and closer to the Greek than 'tell you.'
- source_word: Δὸς τούτῳ τόπον
  chosen: Give this man your place
  alternatives:
  - Give this one a place
  - Give place to this man
  - Yield your place to this man
  lexicon: BDAG
  rationale: The idiom in context is not merely to make room but to surrender one's
    seat/place of honor to the other guest. Supplying 'your' makes explicit what the
    context requires in English. 'This man' renders the masculine demonstrative naturally
    in context.
- source_word: τόπον
  chosen: place
  alternatives:
  - seat
  lexicon: BDAG
  rationale: τόπος literally means 'place.' In this banquet context it refers to seating
    position, but 'place' preserves the lexical sense while still reading naturally.
    The seating nuance is clear from context.
- source_word: ἄρξῃ
  chosen: you will begin
  alternatives:
  - you will have to begin
  lexicon: BDAG
  rationale: Future middle of ἄρχω is idiomatically 'you will begin.' The compulsion
    is implied by the situation, but not explicitly encoded, so it is not added to
    the main text.
- source_word: μετὰ αἰσχύνης
  chosen: with shame
  alternatives:
  - in shame
  - with embarrassment
  - in disgrace
  lexicon: BDAG
  rationale: αἰσχύνη denotes shame/disgrace. 'With shame' is concise and close to
    the Greek prepositional phrase; 'embarrassment' is weaker than the social-honor
    force of the term.
- source_word: τὸν ἔσχατον τόπον
  chosen: the last place
  alternatives:
  - the lowest place
  - the final place
  lexicon: BDAG
  rationale: ἔσχατος means 'last' or 'lowest' depending on context. In a seating-order
    context, 'last place' is both literal and idiomatic, while allowing the implied
    social lowering to remain evident.
- source_word: κατέχειν
  chosen: to take
  alternatives:
  - to occupy
  - to hold
  lexicon: BDAG
  rationale: κατέχω can mean hold, occupy, or keep. In this seating context, 'to take'
    is the most natural English infinitive after 'begin' and accurately conveys moving
    into that place.
