theological_decisions:
- issue: Representative masculine in the closing exhortation
  chosen_reading: The one who has ears to hear, let him hear
  alternative_readings:
  - Whoever has ears to hear, let them hear
  rationale: The Greek is grammatically masculine singular and functions generically.
    Per the translation philosophy's gender-accurate principle, the masculine form
    is retained rather than neutralized, while the representative force is understood
    from context.
