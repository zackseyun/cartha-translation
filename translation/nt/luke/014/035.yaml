id: LUK.14.35
reference: Luke 14:35
source:
  edition: SBLGNT
  text: οὔτε εἰς γῆν οὔτε εἰς κοπρίαν εὔθετόν ἐστιν· ἔξω βάλλουσιν αὐτό. ὁ ἔχων ὦτα
    ἀκούειν ἀκουέτω.
translation:
  text: It is fit neither for the soil nor for the manure pile; they throw it outside.
    The one who has ears to hear, let him hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dung heap' / 'the manure heap.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Whoever has ears to hear, let him hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γῆν
  chosen: the soil
  alternatives:
  - the ground
  - the land
  - the earth
  lexicon: BDAG
  rationale: In this agricultural saying about salt's usefulness, γῆ refers to soil/ground
    for cultivation rather than 'earth' in a cosmic sense. 'Soil' best fits the immediate
    farming context and pairs naturally with 'manure pile.'
- source_word: κοπρίαν
  chosen: the manure pile
  alternatives:
  - the dung heap
  - the manure heap
  lexicon: BDAG
  rationale: κοπρία denotes manure/dung, likely in an agricultural setting. 'Manure
    pile' is clear modern English and preserves the earthy concreteness of the image
    without archaic tone.
- source_word: εὔθετόν
  chosen: fit
  alternatives:
  - useful
  - suitable
  - good for
  lexicon: BDAG
  rationale: εὔθετος means suitable or fit for use. 'Fit' is concise and preserves
    the evaluative sense without overinterpreting toward mere utility.
- source_word: ἔξω βάλλουσιν αὐτό
  chosen: they throw it outside
  alternatives:
  - it is thrown out
  - they cast it out
  lexicon: BDAG
  rationale: The Greek uses an active plural verb with an indefinite subject. 'They
    throw it outside' preserves the active form and the concrete image better than
    an English passive. 'Outside' reflects ἔξω naturally in context.
- source_word: ὁ ἔχων ὦτα ἀκούειν ἀκουέτω
  chosen: The one who has ears to hear, let him hear
  alternatives:
  - Whoever has ears to hear, let him hear
  - If anyone has ears to hear, let him hear
  lexicon: BDAG
  rationale: This formulaic saying is rendered in a way that stays close to the Greek
    structure. 'The one who has...' reflects the articular participle ὁ ἔχων. 'Let
    him hear' preserves the imperative force of ἀκουέτω. The masculine singular is
    retained per the project's gender-accurate policy while functioning representatively.
