id: LUK.14.8
reference: Luke 14:8
source:
  edition: SBLGNT
  text: Ὅταν κληθῇς ὑπό τινος εἰς γάμους, μὴ κατακλιθῇς εἰς τὴν πρωτοκλισίαν, μήποτε
    ἐντιμότερός σου ᾖ κεκλημένος ὑπ’ αὐτοῦ
translation:
  text: When you are invited by someone to a wedding feast, do not recline in the
    place of honor, lest someone more honored than you has been invited by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to a wedding.' The Greek plural can refer to the wedding festivities,
      especially the banquet.
    reason: lexical_alternative
  - marker: b
    text: That is, the most honored place at the table.
    reason: cultural_note
  - marker: c
    text: Ancient formal meals commonly involved reclining rather than sitting upright.
    reason: cultural_note
lexical_decisions:
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a general conditional situation. 'When' is natural modern
    English and fits the instructional context; 'whenever' is possible but slightly
    more repetitive in English.
- source_word: κληθῇς
  chosen: you are invited
  alternatives:
  - you are called
  - you are summoned
  lexicon: BDAG
  rationale: In banquet context καλέω means to invite. 'Called' would sound overly
    literal and obscure the social setting.
- source_word: ὑπό τινος
  chosen: by someone
  alternatives:
  - by anyone
  - by a certain person
  lexicon: BDAG
  rationale: τινος is indefinite; 'by someone' preserves the indefinite personal agent
    naturally.
- source_word: εἰς γάμους
  chosen: to a wedding feast
  alternatives:
  - to a wedding
  - to wedding celebrations
  lexicon: BDAG
  rationale: Plural γάμοι commonly refers to wedding festivities/banquet, not merely
    the marriage event itself. 'Wedding feast' best conveys the meal setting that
    matches the surrounding context about seating.
- source_word: μὴ κατακλιθῇς
  chosen: do not recline
  alternatives:
  - do not sit down
  - do not take your place
  lexicon: BDAG
  rationale: The verb specifically refers to reclining at table in ancient dining
    practice. Retaining 'recline' preserves the cultural setting more accurately than
    the generic 'sit down'.
- source_word: εἰς τὴν πρωτοκλισίαν
  chosen: in the place of honor
  alternatives:
  - in the seat of honor
  - in the chief place
  lexicon: BDAG
  rationale: πρωτοκλισία refers to the most honored place at a meal. 'Place of honor'
    is idiomatic modern English and captures the social meaning better than a more
    wooden rendering.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - otherwise
  - in case
  lexicon: BDAG
  rationale: Introduces the warning that motivates the command. 'Lest' is concise
    and still understandable here; it preserves the cautionary force well.
- source_word: ἐντιμότερός σου
  chosen: more honored than you
  alternatives:
  - more distinguished than you
  - more esteemed than you
  lexicon: BDAG
  rationale: Comparative of ἔντιμος denotes greater honor or status. 'More honored'
    aligns closely with the honor-shame banquet context.
- source_word: ᾖ κεκλημένος
  chosen: has been invited
  alternatives:
  - may have been invited
  - is invited
  lexicon: BDAG
  rationale: Periphrastic perfect conveys a completed invitation with present relevance.
    English present perfect communicates this naturally.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by that person
  - by the host
  lexicon: BDAG
  rationale: Refers back to the one who invited the guest. 'By him' is formally close;
    'host' is interpretive though contextually true.
