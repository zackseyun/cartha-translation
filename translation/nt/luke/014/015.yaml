id: LUK.14.15
reference: Luke 14:15
source:
  edition: SBLGNT
  text: Ἀκούσας δέ τις τῶν συνανακειμένων ταῦτα εἶπεν αὐτῷ· Μακάριος ⸀ὅστις φάγεται
    ⸀ἄρτον ἐν τῇ βασιλείᾳ τοῦ θεοῦ.
translation:
  text: But when one of those reclining at the table with him heard these things,
    he said to him, “Blessed is whoever will eat bread in the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Happy is the one who will eat bread in the kingdom of God.”
    reason: lexical_alternative
  - marker: b
    text: “Eat bread” is a natural Greek expression that can refer to sharing a meal;
      the wording here preserves the literal image.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀκούσας
  chosen: when ... heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/temporal force; rendered
    with a natural English temporal clause to preserve sequence without awkwardness.
- source_word: δέ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild development/transition in the narrative; 'But' fits the
    responsive turn after Jesus' preceding statement.
- source_word: τις
  chosen: one
  alternatives:
  - someone
  - a certain one
  lexicon: BDAG
  rationale: Indefinite singular referring to one unnamed guest; 'one' is concise
    and idiomatic in context.
- source_word: τῶν συνανακειμένων
  chosen: of those reclining at the table with him
  alternatives:
  - of those dining with him
  - of the fellow dinner guests
  lexicon: BDAG
  rationale: The participle refers to those sharing the meal in the ancient reclining
    posture. The rendering keeps the meal setting explicit while remaining readable.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - what he said
  lexicon: BDAG
  rationale: Plural demonstrative points back to Jesus' preceding remarks; 'these
    things' is a standard and sufficiently transparent rendering.
- source_word: εἶπεν αὐτῷ
  chosen: he said to him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: Straightforward narrative speech formula; no reason to compress further
    in the draft.
- source_word: Μακάριος
  chosen: Blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: In beatitude-like sayings, 'Blessed' preserves the theological and eschatological
    weight better than the more psychological 'happy' or merely circumstantial 'fortunate'.
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - the one who
  - he who
  lexicon: BDAG
  rationale: Indefinite relative with generic force; 'whoever' is natural modern English
    and preserves the open-ended reference.
- source_word: φάγεται
  chosen: will eat
  alternatives:
  - eats
  - shall eat
  lexicon: BDAG
  rationale: Future middle indicative points to a future eschatological meal; 'will
    eat' is clear modern English.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - a meal
  - food
  lexicon: BDAG
  rationale: Literally 'bread.' While it can metonymically imply a meal, the Greek
    noun is singular and concrete; retaining 'bread' preserves the idiom and imagery.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - at the banquet in the kingdom of God
  lexicon: BDAG
  rationale: Direct rendering of the prepositional phrase. Although banquet imagery
    is implied by context, it should not be imported into the main text beyond what
    is explicitly stated.
