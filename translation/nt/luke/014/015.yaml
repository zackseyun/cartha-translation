theological_decisions:
- issue: Beatitude force of Μακάριος in an eschatological banquet saying
  chosen_reading: Blessed is whoever will eat bread in the kingdom of God
  alternative_readings:
  - Happy is the one who will eat bread in the kingdom of God
  rationale: The speaker pronounces a state of divine favor tied to future participation
    in God's kingdom. 'Blessed' preserves the theological register and avoids reducing
    the saying to subjective happiness.
  doctrine_reference: Translation philosophy §6; preserve theological weight without
    archaic diction.
