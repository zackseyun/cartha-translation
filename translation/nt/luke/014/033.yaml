id: LUK.14.33
reference: Luke 14:33
source:
  edition: SBLGNT
  text: οὕτως οὖν πᾶς ἐξ ὑμῶν ὃς οὐκ ἀποτάσσεται πᾶσιν τοῖς ἑαυτοῦ ὑπάρχουσιν οὐ δύναται
    ⸂εἶναί μου⸃ μαθητής.
translation:
  text: So then, every one of you who does not renounce all his own possessions cannot
    be my disciple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not give up all that he has.' The Greek verb can mean 'say farewell
      to' and here conveys renouncing one's claim to possessions.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses a masculine singular form ('his own') in a generic sense,
      applying to every disciple.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως οὖν
  chosen: So then
  alternatives:
  - Therefore
  - In the same way, then
  lexicon: BDAG
  rationale: Combines the inferential force of οὖν with οὕτως, linking this saying
    to the preceding illustrations and drawing a concluding application. 'So then'
    is natural modern English and preserves the discourse connection.
- source_word: πᾶς ἐξ ὑμῶν
  chosen: every one of you
  alternatives:
  - everyone among you
  - each of you
  lexicon: BDAG
  rationale: This phrase is distributive and individualizing. 'Every one of you' preserves
    the emphasis that the demand applies to each hearer personally.
- source_word: ὃς οὐκ ἀποτάσσεται
  chosen: who does not renounce
  alternatives:
  - who does not say farewell to
  - who does not give up
  - who does not part with
  lexicon: BDAG
  rationale: ἀποτάσσομαι can literally mean 'take leave of' or 'say farewell,' but
    in this context of discipleship and possessions it carries the sense of relinquishing
    claim or bidding farewell to attachment. 'Renounce' best captures decisive disavowal
    without overstating physical disposal of property.
- source_word: πᾶσιν τοῖς ἑαυτοῦ ὑπάρχουσιν
  chosen: all his own possessions
  alternatives:
  - all that he has
  - all his belongings
  lexicon: BDAG
  rationale: ὑπάρχοντα/ὑπάρχουσιν in this idiom refers to one's property or possessions.
    'Possessions' is more precise than the broader 'all that he has,' while 'his own'
    reflects ἑαυτοῦ.
- source_word: οὐ δύναται εἶναί μου μαθητής
  chosen: cannot be my disciple
  alternatives:
  - is not able to be my disciple
  lexicon: BDAG
  rationale: This is a statement of inability or impossibility, not mere impropriety.
    'Cannot be my disciple' is idiomatic and preserves the force of οὐ δύναται with
    the infinitive εἶναι.
- source_word: μαθητής
  chosen: disciple
  alternatives:
  - follower
  - learner
  lexicon: BDAG
  rationale: '''Disciple'' is the established and most accurate rendering in Gospel
    contexts, preserving both relational and formative dimensions of following Jesus.'
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - their own
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular in a generic construction.
    Per translation philosophy, the rendering remains gender-accurate rather than
    flattened to plural; the representative force can be noted in a footnote.
