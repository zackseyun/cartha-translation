theological_decisions:
- issue: Nature of the demand regarding possessions
  chosen_reading: Render the saying as a call to renounce claim to all possessions
    rather than as an absolute command that every disciple must literally dispose
    of all property in every circumstance.
  alternative_readings:
  - Render as 'give up all his possessions' to stress literal divestment
  rationale: The verb ἀποτάσσεται in context emphasizes decisive relinquishment of
    allegiance and claim. This preserves the radical demand of discipleship without
    importing a universalized economic program beyond the wording of the text. The
    translation still leaves the saying severe and uncompromised.
  doctrine_reference: Preserve theological tension rather than resolve it.
