id: LUK.11.4
reference: Luke 11:4
source:
  edition: SBLGNT
  text: καὶ ἄφες ἡμῖν τὰς ἁμαρτίας ἡμῶν, καὶ γὰρ αὐτοὶ ἀφίομεν παντὶ ὀφείλοντι ἡμῖν·
    καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς ⸀πειρασμόν.
translation:
  text: And forgive us our sins, for we ourselves also forgive everyone indebted to
    us. And do not bring us into temptation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who owes us'; the Greek uses debt language here, even though
      the first clause says 'sins.'
    reason: lexical_alternative
  - marker: b
    text: Or 'testing' or 'trial.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄφες
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι in a prayer context naturally means 'forgive.'
    'Release' is too wooden here, while 'pardon' is less idiomatic in the prayer's
    direct address to God.
- source_word: τὰς ἁμαρτίας
  chosen: sins
  alternatives:
  - trespasses
  lexicon: BDAG
  rationale: The Greek explicitly says 'sins' (ἁμαρτίας), not 'debts' in this clause.
    'Trespasses' reflects later liturgical tradition more than the plain lexical sense
    here.
- source_word: καὶ γὰρ
  chosen: for
  alternatives:
  - because
  - for indeed
  lexicon: BDAG
  rationale: The combination introduces the ground for the preceding request. 'For'
    is concise and natural English; 'because' is possible but slightly heavier.
- source_word: αὐτοὶ
  chosen: we ourselves
  alternatives:
  - we too
  - we ourselves also
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'We ourselves' preserves the emphasis; the added
    'also' is represented in the sentence flow with 'also forgive'.
- source_word: ἀφίομεν
  chosen: forgive
  alternatives:
  - release
  - cancel
  lexicon: BDAG
  rationale: Using 'forgive' maintains the verbal link with ἄφες and fits the interpersonal
    context. 'Cancel' would over-specify a financial metaphor not explicit in the
    main clause.
- source_word: παντὶ ὀφείλοντι ἡμῖν
  chosen: everyone indebted to us
  alternatives:
  - everyone who owes us
  - every debtor to us
  lexicon: BDAG
  rationale: ὀφείλω denotes owing or being indebted. 'Everyone indebted to us' preserves
    the debt imagery present in this clause while remaining readable. It also avoids
    flattening the distinction between 'sins' in the first clause and 'indebted' in
    the second.
- source_word: μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν
  chosen: do not bring us into temptation
  alternatives:
  - do not lead us into temptation
  - do not bring us into testing
  lexicon: BDAG
  rationale: εἰσφέρω literally means 'bring in/into.' 'Bring us into' is closer to
    the Greek than the traditional 'lead us into,' while still idiomatic. πειρασμός
    can mean 'temptation' or 'testing'; in this prayer context 'temptation' is the
    most familiar and plausible main-text rendering, with 'testing' preserved in a
    footnote.
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός has a semantic range including temptation and testing/trial.
    Because the petition is traditionally and contextually understood as asking preservation
    from enticement or ordeal, 'temptation' is retained in the main text, while the
    broader sense is noted in a footnote.
