theological_decisions:
- issue: Meaning of the final petition concerning πειρασμός
  chosen_reading: Render the petition as 'do not bring us into temptation' without
    softening or resolving the theological tension.
  alternative_readings:
  - do not lead us into temptation
  - do not bring us into testing
  rationale: The Greek wording should be preserved without importing a doctrinal explanation
    about God's relation to temptation. Following the translation philosophy, the
    text keeps the tension and allows readers to see the petition as stated, while
    a footnote preserves the lexical alternative 'testing.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
