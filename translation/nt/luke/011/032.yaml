id: LUK.11.32
reference: Luke 11:32
source:
  edition: SBLGNT
  text: ἄνδρες ⸀Νινευῖται ἀναστήσονται ἐν τῇ κρίσει μετὰ τῆς γενεᾶς ταύτης καὶ κατακρινοῦσιν
    αὐτήν· ὅτι μετενόησαν εἰς τὸ κήρυγμα Ἰωνᾶ, καὶ ἰδοὺ πλεῖον Ἰωνᾶ ὧδε.
translation:
  text: The men of Nineveh will rise up in the judgment with this generation and will
    condemn it, because they changed their thinking at Jonah’s proclamation, and behold, something
    greater than Jonah is here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one greater than Jonah is here' or 'more than Jonah is here.' The Greek
      uses a neuter form ('greater/more'), which may point broadly to the greater
      reality present in Jesus and his ministry, not only to a personal comparison.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄνδρες Νινευῖται
  chosen: The men of Nineveh
  alternatives:
  - The Ninevite men
  - The people of Nineveh
  lexicon: BDAG
  rationale: ἄνδρες is explicitly masculine plural ('men'), and Νινευῖται identifies
    them as Ninevites. Following the gender-accurate policy, the masculine reference
    is preserved rather than neutralized to 'people,' though that alternative reflects
    the broader group in Jonah.
- source_word: ἀναστήσονται
  chosen: will rise up
  alternatives:
  - will arise
  - will stand up
  lexicon: BDAG
  rationale: Future middle of ἀνίστημι here refers to rising in the eschatological/judicial
    setting. 'Rise up' is natural English and preserves the vividness without over-specifying
    'be resurrected,' though resurrection is implied by context.
- source_word: ἐν τῇ κρίσει
  chosen: in the judgment
  alternatives:
  - at the judgment
  - in the condemnation
  lexicon: BDAG
  rationale: κρίσις here denotes the final judicial event. 'In the judgment' is a
    standard and clear rendering; 'at the judgment' is possible, but 'in' more closely
    follows ἐν.
- source_word: μετὰ τῆς γενεᾶς ταύτης
  chosen: with this generation
  alternatives:
  - along with this generation
  lexicon: BDAG
  rationale: μετά with the genitive means association, 'with/along with.' 'This generation'
    is retained as the common Synoptic expression with moral and historical force.
- source_word: κατακρινοῦσιν αὐτήν
  chosen: will condemn it
  alternatives:
  - will pass judgment on it
  lexicon: BDAG
  rationale: κατακρίνω means to condemn, not merely to judge. The pronoun αὐτήν refers
    back to 'this generation' (grammatically feminine singular), rendered idiomatically
    as 'it' in English.
- source_word: μετενόησαν
  chosen: they repented
  alternatives:
  - they changed their minds
  - they turned back
  lexicon: BDAG
  rationale: μετανοέω in this prophetic context carries moral-spiritual repentance,
    not merely cognitive reconsideration. 'Repented' best preserves the theological
    force.
- source_word: εἰς τὸ κήρυγμα Ἰωνᾶ
  chosen: at Jonah’s proclamation
  alternatives:
  - at the preaching of Jonah
  - in response to Jonah's preaching
  lexicon: BDAG
  rationale: κήρυγμα denotes proclamation/preaching. With εἰς after μετανοέω, the
    sense is repentance occasioned by or in response to Jonah's message. 'At Jonah’s
    proclamation' is concise and idiomatic while preserving the causal-response sense.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing emphatic attention. 'Behold' preserves
    the solemn rhetorical force better than the more casual 'look' or 'see.'
- source_word: πλεῖον Ἰωνᾶ ὧδε
  chosen: something greater than Jonah is here
  alternatives:
  - one greater than Jonah is here
  - more than Jonah is here
  lexicon: BDAG
  rationale: πλεῖον is neuter singular, literally 'something greater' or idiomatically
    'something more/greater than.' The neuter likely points to the greater reality
    present in Jesus and his ministry, not merely a masculine comparison. 'Something
    greater than Jonah is here' preserves the Greek form and theological breadth.
