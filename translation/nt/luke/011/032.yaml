theological_decisions:
- issue: Referent and force of πλεῖον Ἰωνᾶ
  chosen_reading: something greater than Jonah is here
  alternative_readings:
  - one greater than Jonah is here
  - more than Jonah is here
  rationale: 'The neuter πλεῖον is preserved rather than harmonized to a masculine
    personal comparison. This keeps the text''s theological tension: Jesus is certainly
    in view, yet the wording may encompass not only his person but the greater kingdom
    reality and revelation present in him. The translation avoids flattening that
    nuance.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
