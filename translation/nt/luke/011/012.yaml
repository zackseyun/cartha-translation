id: LUK.11.12
reference: Luke 11:12
source:
  edition: SBLGNT
  text: ἢ καὶ ⸀αἰτήσει ᾠόν, ⸀ἐπιδώσει αὐτῷ σκορπίον;
translation:
  text: Or if he asks for an egg, will he give him a scorpion?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἢ καὶ
  chosen: Or if
  alternatives:
  - Or even if
  - Or also if
  lexicon: BDAG
  rationale: Introduces the next parallel example in Jesus' rhetorical sequence. 'Or
    if' is natural English and preserves the disjunctive progression without overtranslating
    καί.
- source_word: αἰτήσει
  chosen: he asks for
  alternatives:
  - he requests
  - he should ask for
  lexicon: BDAG
  rationale: Future indicative in a conditional-like rhetorical question; present
    English 'asks for' is idiomatic in this series and matches the sense of requesting
    something from a father.
- source_word: ᾠόν
  chosen: an egg
  lexicon: BDAG
  rationale: Direct, standard gloss for the accusative object.
- source_word: ἐπιδώσει
  chosen: will he give
  alternatives:
  - will he hand over
  - will he present
  lexicon: BDAG
  rationale: In context the verb means to give or hand over in response to a request.
    'Will he give' is the most natural English rendering in this rhetorical question.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative indirect object. English commonly expresses this naturally as
    'give him,' though 'to him' would also be possible.
- source_word: σκορπίον
  chosen: a scorpion
  lexicon: BDAG
  rationale: Standard gloss. The contrast with 'egg' preserves the vivid absurdity
    of the image in Jesus' argument from lesser to greater.
