theological_decisions:
- issue: Rhetorical force of the father-child analogy
  chosen_reading: Render as a straightforward rhetorical question without adding interpretive
    explanation.
  alternative_readings:
  - Expand the contrast to make the implied 'instead' explicit
  rationale: The Greek leaves the absurd contrast implicit. English readers readily
    understand the rhetorical force, so no added wording is needed. This preserves
    the text's theological point about the Father's goodness without paraphrastic
    expansion.
