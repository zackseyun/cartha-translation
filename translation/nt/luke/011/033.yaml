theological_decisions:
- issue: Interpretation of κρύπτη
  chosen_reading: generic 'hidden place' rather than a specific architectural 'cellar'
  alternative_readings:
  - cellar
  - storeroom
  rationale: The saying's force is the absurdity of concealing light, not the precise
    type of room. A broader rendering preserves the metaphor's clarity without narrowing
    the image beyond what is necessary.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of μόδιος
  chosen_reading: '''basket'' in the main text'
  alternative_readings:
  - measuring basket
  - bushel basket
  - bushel
  rationale: Optimal equivalence favors a clear modern term while preserving the image
    of covering a lamp. The more literal/measure-specific alternatives are preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §6
