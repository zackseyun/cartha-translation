id: LUK.11.33
reference: Luke 11:33
source:
  edition: SBLGNT
  text: ⸀Οὐδεὶς λύχνον ἅψας εἰς κρύπτην τίθησιν οὐδὲ ὑπὸ τὸν μόδιον ἀλλ’ ἐπὶ τὴν λυχνίαν,
    ἵνα οἱ εἰσπορευόμενοι τὸ ⸀φέγγος βλέπωσιν.
translation:
  text: No one, after lighting a lamp, puts it in a hidden place or under a basket,
    but on a lampstand, so that those who enter may see the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a cellar' or 'in a secret place'; the Greek κρύπτη can refer to a
      hidden place, including an underground storage area.
    reason: lexical_alternative
  - marker: b
    text: Greek μόδιος, a measuring container; traditionally 'bushel' or 'bushel basket.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  chosen: No one
  alternatives:
  - No person
  - Nobody
  lexicon: BDAG
  rationale: Natural English equivalent for the indefinite negative pronoun; preserves
    the universal negation without unnecessary formality.
- source_word: λύχνον
  chosen: a lamp
  alternatives:
  - a lamp
  lexicon: BDAG
  rationale: λύχνος refers to a portable oil lamp, not specifically a candle. 'Lamp'
    is the standard and accurate rendering.
- source_word: ἅψας
  chosen: after lighting
  alternatives:
  - having lit
  - when he has lit
  lexicon: BDAG
  rationale: Aorist participle prior to the main verb indicates antecedent action.
    'After lighting' is idiomatic English that preserves the sequence.
- source_word: εἰς κρύπτην
  chosen: in a hidden place
  alternatives:
  - in a cellar
  - in a secret place
  - in a hiding place
  lexicon: BDAG
  rationale: κρύπτη can denote a hidden place or cellar/storage area. In this context
    the emphasis is concealment rather than architecture, so 'hidden place' best conveys
    the point without over-specifying.
- source_word: τίθησιν
  chosen: puts
  alternatives:
  - places
  - sets
  lexicon: BDAG
  rationale: Simple present verb of placing; 'puts' is clear, natural, and sufficiently
    formal.
- source_word: ὑπὸ τὸν μόδιον
  chosen: under a basket
  alternatives:
  - under the measuring basket
  - under a bushel basket
  - under a bushel
  lexicon: BDAG
  rationale: μόδιος is a dry measure and by extension the measuring container. 'Basket'
    communicates the object clearly in modern English; the more traditional 'bushel'
    is less accessible and reflects an English measure rather than the Greek item.
- source_word: ἐπὶ τὴν λυχνίαν
  chosen: on a lampstand
  alternatives:
  - on the lampstand
  - on a stand
  lexicon: BDAG
  rationale: λυχνία is specifically a lampstand. The anarthrous sense in English is
    naturally rendered with the indefinite article here.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic and preserves the purposive
    force.
- source_word: οἱ εἰσπορευόμενοι
  chosen: those who enter
  alternatives:
  - those coming in
  - those who come in
  lexicon: BDAG
  rationale: Present participle used substantivally for people entering. 'Those who
    enter' is concise and natural.
- source_word: τὸ φέγγος
  chosen: the light
  alternatives:
  - the brightness
  - the radiance
  lexicon: BDAG
  rationale: φέγγος denotes light/brightness. 'The light' is the most natural English
    expression in this lamp image and matches the concrete sense.
- source_word: βλέπωσιν
  chosen: may see
  alternatives:
  - might see
  - can see
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα expresses intended result/purpose. 'May
    see' preserves that nuance better than the more colloquial 'can see'.
