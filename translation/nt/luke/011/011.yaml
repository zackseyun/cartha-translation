id: LUK.11.11
reference: Luke 11:11
source:
  edition: SBLGNT
  text: τίνα δὲ ⸀ἐξ ὑμῶν τὸν πατέρα αἰτήσει ὁ ⸀υἱὸς ἰχθύν, ⸀καὶ ἀντὶ ἰχθύος ὄφιν ⸂αὐτῷ
    ἐπιδώσει⸃;
translation:
  text: What father among you, if his son asks for a fish, will give him a snake instead
    of a fish?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'serpent' for 'snake.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα δὲ ἐξ ὑμῶν τὸν πατέρα
  chosen: What father among you
  alternatives:
  - Which of you fathers
  - What man among you, being a father
  lexicon: BDAG
  rationale: The idiom asks which person from among the hearers fits the description
    of 'the father.' In natural English, 'What father among you' preserves the rhetorical
    force better than a more wooden rendering.
- source_word: αἰτήσει
  chosen: asks for
  alternatives:
  - will ask
  - requests
  lexicon: BDAG
  rationale: With ἰχθύν as the object requested from the father, English idiom prefers
    'asks for.' Although the future tense is present in Greek, the conditional-like
    rhetorical question is naturally expressed in English with 'if his son asks for...'.
- source_word: ὁ υἱὸς
  chosen: his son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: The article in context is relational and generic; 'his son' makes the
    father-son relationship explicit in idiomatic English without adding meaning beyond
    the Greek sense.
- source_word: ἰχθύν / ἰχθύος
  chosen: a fish / a fish
  alternatives:
  - fish / fish
  lexicon: BDAG
  rationale: The singular is retained to match the Greek and the concrete example
    in the saying.
- source_word: ἀντὶ
  chosen: instead of
  alternatives:
  - in place of
  lexicon: BDAG
  rationale: This clearly conveys substitution and fits natural modern English in
    the rhetorical question.
- source_word: ὄφιν
  chosen: a snake
  alternatives:
  - a serpent
  lexicon: BDAG
  rationale: '''Snake'' is more readable modern English, while still accurately rendering
    ὄφις here without importing extra symbolic overtones that ''serpent'' may carry
    in English.'
- source_word: αὐτῷ ἐπιδώσει
  chosen: will give him
  alternatives:
  - will hand to him
  - will give to him
  lexicon: BDAG
  rationale: ἐπιδίδωμι here means to give or hand over. 'Will give him' is the most
    natural English equivalent and preserves the future rhetorical question structure.
