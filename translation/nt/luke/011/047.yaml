theological_decisions:
- issue: Whether to make explicit the implied hypocrisy/complicity between building
    the prophets' tombs and the fathers' killing of them
  chosen_reading: 'Keep the statement concise and implicit: ''you build the tombs
    of the prophets, but your fathers killed them.'''
  alternative_readings:
  - you build the tombs of the prophets whom your fathers killed
  - you build the tombs of the prophets, and so you testify against your fathers
  rationale: The verse itself states the juxtaposition without yet making the inference
    explicit; that implication is developed in the following verse. The translation
    therefore preserves the rhetorical tension rather than importing the interpretation
    into this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
