id: LUK.11.47
reference: Luke 11:47
source:
  edition: SBLGNT
  text: οὐαὶ ὑμῖν, ὅτι οἰκοδομεῖτε τὰ μνημεῖα τῶν προφητῶν οἱ δὲ πατέρες ὑμῶν ἀπέκτειναν
    αὐτούς.
translation:
  text: Woe to you, because you build the tombs of the prophets, but your fathers
    killed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'memorial tombs.' The Greek term can refer to tombs or grave monuments.
    reason: lexical_alternative
  - marker: b
    text: Or 'ancestors' for 'fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of οὐαί. 'Woe' is the standard
    and most semantically weighty English equivalent in judgment contexts; 'alas'
    is too weak and lament-oriented here.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: With οὐαί, the dative is naturally rendered 'to you' in idiomatic English.
    This preserves the direct address of Jesus' denunciation.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the woe. 'Because' is clearer in modern English
    than the more formal 'for,' and better reflects the causal sense here than simple
    'that.'
- source_word: οἰκοδομεῖτε
  chosen: you build
  alternatives:
  - you are building
  - you construct
  lexicon: BDAG
  rationale: Present tense is rendered simply as an English present for a general/current
    practice. 'Build' is straightforward and natural; 'are building' would over-specify
    progressive aspect not required by the Greek.
- source_word: τὰ μνημεῖα
  chosen: the tombs
  alternatives:
  - the monuments
  - the memorial tombs
  lexicon: BDAG
  rationale: μνημεῖον commonly denotes a tomb or grave monument. 'Tombs' is the clearest
    natural English rendering; 'monuments' could obscure the funerary sense, while
    'memorial tombs' is overly expansive for the main text.
- source_word: τῶν προφητῶν
  chosen: of the prophets
  lexicon: BDAG
  rationale: A straightforward possessive genitive indicating the tombs belonging
    to or associated with the prophets.
- source_word: οἱ δὲ πατέρες ὑμῶν
  chosen: but your fathers
  alternatives:
  - and your fathers
  - yet your fathers
  - but your ancestors
  lexicon: BDAG
  rationale: δέ marks contrast, so 'but' best captures the adversative force. 'Fathers'
    preserves the familial and ancestral language of the Greek more directly than
    'ancestors,' though the latter is a viable interpretive alternative.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - murdered
  - put to death
  lexicon: BDAG
  rationale: The verb means 'killed' or 'put to death.' 'Killed' is the most direct
    and idiomatic choice. 'Murdered' adds a legal/moral nuance stronger than the lexical
    core, though context implies guilt.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Refers back to 'the prophets' and is naturally rendered 'them.'
