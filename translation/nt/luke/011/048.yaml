id: LUK.11.48
reference: Luke 11:48
source:
  edition: SBLGNT
  text: ἄρα ⸂μάρτυρές ἐστε⸃ καὶ συνευδοκεῖτε τοῖς ἔργοις τῶν πατέρων ὑμῶν, ὅτι αὐτοὶ
    μὲν ἀπέκτειναν αὐτοὺς ὑμεῖς δὲ ⸀οἰκοδομεῖτε.
translation:
  text: So you are witnesses and approve of the deeds of your fathers, because they
    killed them, but you build.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, build the tombs of the prophets, as stated in the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἄρα
  chosen: So
  alternatives:
  - Therefore
  - Thus
  lexicon: BDAG
  rationale: Draws an inferential conclusion from the preceding accusation. 'So' is
    natural modern English and preserves the logical force without sounding overly
    formal.
- source_word: μάρτυρές ἐστε
  chosen: you are witnesses
  alternatives:
  - you testify
  - you are testifying
  lexicon: BDAG
  rationale: The predicate noun construction is best rendered literally as 'you are
    witnesses.' In context this means they stand as witnesses against themselves by
    their actions, not merely that they verbally testify.
- source_word: συνευδοκεῖτε
  chosen: approve of
  alternatives:
  - consent to
  - agree with
  - take pleasure in
  lexicon: BDAG
  rationale: Conveys active approval or consent. 'Approve of' is clear idiomatic English
    and fits the moral force of aligning themselves with their ancestors' actions.
- source_word: τοῖς ἔργοις
  chosen: the deeds
  alternatives:
  - the works
  - the actions
  lexicon: BDAG
  rationale: '''Deeds'' communicates concrete acts in a morally charged context better
    than the more neutral ''works.'''
- source_word: τῶν πατέρων ὑμῶν
  chosen: of your fathers
  alternatives:
  - of your ancestors
  lexicon: BDAG
  rationale: Retains the familial and rhetorical force of the Greek. 'Fathers' is
    gender-accurate to the source and matches the polemical linkage to prior generations.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the charge. 'Because' makes the
    logic explicit in contemporary English.
- source_word: αὐτοὶ μὲν ἀπέκτειναν αὐτοὺς
  chosen: they killed them
  alternatives:
  - those men killed them
  - they indeed killed them
  lexicon: BDAG
  rationale: The pronouns contrast the fathers with the present audience. English
    can omit the emphatic particle μέν in the main clause while preserving the contrast
    with 'but' in the next clause.
- source_word: ὑμεῖς δὲ
  chosen: but you
  alternatives:
  - and you
  - while you
  lexicon: BDAG
  rationale: Preserves the adversative contrast between the ancestors' killing and
    the present generation's corresponding action.
- source_word: οἰκοδομεῖτε
  chosen: build
  alternatives:
  - build their tombs
  - construct
  lexicon: BDAG
  rationale: The verb means 'build.' The direct object is not repeated in this verse
    but is supplied from the immediate context (the tombs of the prophets, v. 47).
    To avoid adding words not present in this verse, the main text keeps the concise
    verb, while the contextual object can be clarified in a footnote.
