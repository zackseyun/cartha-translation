theological_decisions:
- issue: Whether to supply the implied object of 'build' from the previous verse
  chosen_reading: 'Leave the object implicit in the main text: ''but you build.'''
  alternative_readings:
  - 'Explicitly supply the contextual object: ''but you build their tombs.'''
  rationale: The Greek text in this verse ends with the bare verb οἰκοδομεῖτε, whose
    object is understood from the immediately preceding context. Because the object
    is not stated here, the main text preserves the terseness of the Greek, while
    an explanatory footnote can note the implied object. This avoids over-interpretive
    expansion while keeping the verse auditable.
  doctrine_reference: Translation philosophy §1, §5
