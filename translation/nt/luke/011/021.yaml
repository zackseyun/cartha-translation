theological_decisions:
- issue: Metaphorical force of the saying in context
  chosen_reading: Translate the imagery straightforwardly without making the satanic
    referent explicit in the verse itself.
  alternative_readings:
  - Interpret 'the strong man' explicitly as Satan in the main text
  rationale: In the immediate context Jesus' saying functions metaphorically, but
    this verse itself presents the image rather than its interpretation. The translation
    should preserve the metaphor and let the surrounding context supply the identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
