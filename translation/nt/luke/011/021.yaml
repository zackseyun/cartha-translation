id: LUK.11.21
reference: Luke 11:21
source:
  edition: SBLGNT
  text: ὅταν ὁ ἰσχυρὸς καθωπλισμένος φυλάσσῃ τὴν ἑαυτοῦ αὐλήν, ἐν εἰρήνῃ ἐστὶν τὰ
    ὑπάρχοντα αὐτοῦ·
translation:
  text: When the strong man, fully armed, guards his own courtyard, his possessions
    are at peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own palace' or 'his own estate'; the Greek word can refer to a courtyard
      or the residence/precinct it belongs to.
    reason: lexical_alternative
  - marker: b
    text: Literally 'are in peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a general conditional/temporal scenario. 'When' is natural
    English and fits the illustrative saying; 'whenever' is possible but slightly
    more repetitive in English.
- source_word: ὁ ἰσχυρός
  chosen: the strong man
  alternatives:
  - the strong one
  - the mighty man
  lexicon: BDAG
  rationale: With the article and adjective used substantivally, the phrase refers
    to a strong person. 'The strong man' is idiomatic English and preserves the masculine
    singular form present in the Greek.
- source_word: καθωπλισμένος
  chosen: fully armed
  alternatives:
  - well armed
  - having been fully armed
  lexicon: BDAG
  rationale: Perfect participle of καθοπλίζω, indicating a state of being equipped
    with weapons. 'Fully armed' is concise, natural, and preserves the sense of completed
    preparation resulting in a present state.
- source_word: φυλάσσῃ
  chosen: guards
  alternatives:
  - keeps watch over
  - protects
  lexicon: BDAG
  rationale: Present subjunctive in the ὅταν clause conveys the ongoing action in
    the scenario. 'Guards' best matches the security/watchfulness sense without overexpanding.
- source_word: τὴν ἑαυτοῦ αὐλήν
  chosen: his own courtyard
  alternatives:
  - his own palace
  - his own estate
  - his own court
  lexicon: BDAG
  rationale: αὐλή can denote a courtyard, court, or by extension a residence/palace
    precinct. In this context of guarding property, 'courtyard' is the most direct
    lexical rendering and avoids importing grandeur not explicit in the term itself.
    ἑαυτοῦ is reflected by 'his own' for emphasis.
- source_word: ἐν εἰρήνῃ
  chosen: are at peace
  alternatives:
  - are safe
  - remain in peace
  lexicon: BDAG
  rationale: Literally 'in peace,' an idiom expressing security and undisturbed condition.
    'Are at peace' preserves the peace-language of the Greek while still making sense
    for possessions in context.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  chosen: his possessions
  alternatives:
  - his goods
  - what belongs to him
  - his property
  lexicon: BDAG
  rationale: The participial substantive refers to one's belongings or property. 'His
    possessions' is clear modern English and broad enough to cover the full sense.
