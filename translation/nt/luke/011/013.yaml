id: LUK.11.13
reference: Luke 11:13
source:
  edition: SBLGNT
  text: εἰ οὖν ὑμεῖς πονηροὶ ὑπάρχοντες οἴδατε δόματα ἀγαθὰ διδόναι τοῖς τέκνοις ὑμῶν,
    πόσῳ μᾶλλον ὁ πατὴρ ὁ ἐξ οὐρανοῦ δώσει πνεῦμα ἅγιον τοῖς αἰτοῦσιν αὐτόν.
translation:
  text: If you, then, being evil, know how to give good gifts to your children, how
    much more will the Father from heaven give the Holy Spirit to those who ask him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions read 'your heavenly Father' by analogy with Matthew
      7:11, but Luke's Greek says 'the Father from heaven.'
    reason: alternative_reading
  - marker: b
    text: Matthew 7:11 has 'good things' where Luke here has 'the Holy Spirit,' preserving
      each Gospel's distinct wording.
    reason: cross_reference
lexical_decisions:
- source_word: πονηροὶ ὑπάρχοντες
  chosen: being evil
  alternatives:
  - though you are evil
  - evil as you are
  lexicon: BDAG
  rationale: The participial construction is concessive/descriptive in context, characterizing
    human moral condition without over-paraphrase. 'Being evil' stays close to the
    Greek while remaining natural English.
- source_word: οἴδατε
  chosen: know how
  alternatives:
  - know
  lexicon: BDAG
  rationale: With the complementary infinitive διδόναι, English idiom requires 'know
    how to give' to express practical knowledge/ability, not mere abstract knowledge.
- source_word: δόματα ἀγαθὰ
  chosen: good gifts
  alternatives:
  - good things
  - beneficial gifts
  lexicon: BDAG
  rationale: δόματα specifically denotes gifts rather than the broader 'things.' 'Good
    gifts' preserves the noun's concrete sense and the contrast with the Father's
    greater giving.
- source_word: τέκνοις
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: '''Children'' is the natural and accurate rendering for τέκνα in a family
    setting.'
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - how much rather
  lexicon: BDAG
  rationale: Standard comparative idiom expressing an a fortiori argument.
- source_word: ὁ πατὴρ ὁ ἐξ οὐρανοῦ
  chosen: the Father from heaven
  alternatives:
  - your heavenly Father
  - the Father in heaven
  - the Father out of heaven
  lexicon: BDAG
  rationale: The Greek text here lacks ὑμῶν ('your') and uses ἐξ οὐρανοῦ, more literally
    'from heaven.' 'The Father from heaven' preserves the wording of Luke rather than
    harmonizing to Matthew's 'your Father in heaven.'
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: In this context the phrase refers to the divine Spirit, not a generic
    spirit. English convention normally uses the article here after 'give,' and capitalization
    reflects the personal divine referent in accord with historic Christian orthodoxy.
- source_word: τοῖς αἰτοῦσιν αὐτόν
  chosen: to those who ask him
  alternatives:
  - to the ones asking him
  - to those who ask of him
  lexicon: BDAG
  rationale: 'The present participle is naturally rendered as a substantival present:
    ''those who ask him.'' Retaining ''him'' reflects the explicit object αὐτόν.'
