theological_decisions:
- issue: Referent and capitalization of πνεῦμα ἅγιον
  chosen_reading: the Holy Spirit as the personal divine Spirit
  alternative_readings:
  - a holy spirit
  rationale: Although anarthrous in Greek, the phrase in this Lukan context refers
    to God's Spirit as the gift the Father gives. Rendering it as 'the Holy Spirit'
    best reflects the idiomatic and theological sense without importing more than
    the text states.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Relation to Matthean parallel
  chosen_reading: retain Luke's distinct wording 'the Father from heaven' and 'the
    Holy Spirit'
  alternative_readings:
  - harmonized renderings such as 'your heavenly Father' or 'good things'
  rationale: The translation should follow the Lukan Greek rather than assimilate
    it to Matthew 7:11. Luke's wording emphasizes the specific gift of the Holy Spirit.
  doctrine_reference: Translation philosophy §1
