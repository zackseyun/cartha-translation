theological_decisions:
- issue: Force of Jesus' response to the woman's blessing
  chosen_reading: Jesus redirects the focus from biological relation to the true blessedness
    of hearing and keeping God's word, without denying that his mother was blessed.
  alternative_readings:
  - Jesus flatly rejects the woman's statement
  - Jesus merely adds another blessing without correction
  rationale: 'μενοῦν signals a corrective intensification: Jesus does not deny the
    prior blessing but identifies the deeper basis of blessedness. The translation
    ''Rather'' preserves this tension without overstating repudiation.'
  doctrine_reference: Preserve theological tension rather than resolve it.
