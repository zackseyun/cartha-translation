id: LUK.11.28
reference: Luke 11:28
source:
  edition: SBLGNT
  text: αὐτὸς δὲ εἶπεν· ⸀Μενοῦν μακάριοι οἱ ἀκούοντες τὸν λόγον τοῦ θεοῦ καὶ ⸀φυλάσσοντες.
translation:
  text: But he said, “Rather, blessed are those who hear the word of God and keep
    it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Indeed, blessed are …” or “Yes, rather, blessed are …” The Greek particle
      can affirm while redirecting emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μενοῦν
  chosen: Rather
  alternatives:
  - Indeed
  - On the contrary
  - Yes, rather
  lexicon: BDAG
  rationale: μενοῦν here introduces a corrective or heightening response to the woman's
    blessing in the previous verse. 'Rather' captures Jesus' redirection without implying
    a harsh contradiction. 'Indeed' is too weak by itself, while 'on the contrary'
    can sound overly adversative.
- source_word: μακάριοι
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the covenantal and theological weight of μακάριοι
    in Jesus'' sayings. ''Happy'' is too psychological and ''fortunate'' too circumstantial.'
- source_word: οἱ ἀκούοντες
  chosen: those who hear
  alternatives:
  - the ones hearing
  - those who listen
  lexicon: BDAG
  rationale: The substantival present participle denotes a class characterized by
    hearing. 'Those who hear' is natural English and preserves the ongoing, characteristic
    sense better than a more wooden rendering.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: λόγος here most naturally refers to God's spoken message or revelation.
    'The word of God' is both accurate and idiomatic, while retaining biblical resonance.
    'God's word' is possible but slightly less formal; 'message' narrows the semantic
    range.
- source_word: φυλάσσοντες
  chosen: keep it
  alternatives:
  - obey it
  - guard it
  - observe it
  lexicon: BDAG
  rationale: φυλάσσω can mean keep, guard, or observe. In this context it refers to
    preserving and practicing God's word. 'Keep it' is broad enough to include obedient
    observance without reducing the term to mere rule-following. The object 'it' is
    supplied in English from the prior phrase for clarity.
- source_word: αὐτὸς δὲ εἶπεν
  chosen: But he said
  alternatives:
  - And he said
  - But he replied
  lexicon: BDAG
  rationale: δὲ is mildly adversative or transitional here; 'But he said' reflects
    the contrast with the preceding exclamation. 'Replied' is interpretive but possible;
    'said' stays closer to εἶπεν.
