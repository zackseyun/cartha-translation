theological_decisions:
- issue: Meaning of 'the love of God' (τὴν ἀγάπην τοῦ θεοῦ)
  chosen_reading: Preserve the genitival ambiguity in the main text as 'the love of
    God.'
  alternative_readings:
  - love for God
  - God's love
  rationale: The Greek genitive can plausibly be read as objective or subjective.
    The verse does not force a single interpretation, so the translation preserves
    the theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
