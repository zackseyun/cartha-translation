id: LUK.11.42
reference: Luke 11:42
source:
  edition: SBLGNT
  text: Ἀλλὰ οὐαὶ ὑμῖν τοῖς Φαρισαίοις, ὅτι ἀποδεκατοῦτε τὸ ἡδύοσμον καὶ τὸ πήγανον
    καὶ πᾶν λάχανον, καὶ παρέρχεσθε τὴν κρίσιν καὶ τὴν ἀγάπην τοῦ θεοῦ· ταῦτα ⸀δὲ
    ἔδει ποιῆσαι κἀκεῖνα μὴ ⸀παρεῖναι.
translation:
  text: But woe to you Pharisees, because you tithe mint and rue and every herb, and
    you pass by justice and the love of God. These things you ought to have done,
    without neglecting those things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love for God'; the Greek could also mean 'God's love.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαὶ
  chosen: woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of the interjection better than
    the softer 'alas.'
- source_word: ἀποδεκατοῦτε
  chosen: tithe
  alternatives:
  - give a tenth of
  lexicon: BDAG
  rationale: '''Tithe'' is the standard concise rendering for giving a tenth and fits
    the religious context naturally in English.'
- source_word: ἡδύοσμον
  chosen: mint
  lexicon: BDAG
  rationale: Standard botanical rendering in this context.
- source_word: πήγανον
  chosen: rue
  lexicon: BDAG
  rationale: Standard rendering of the herb name; preserves the specificity of the
    list.
- source_word: πᾶν λάχανον
  chosen: every herb
  alternatives:
  - every garden plant
  - every vegetable
  lexicon: BDAG
  rationale: A broad term for garden produce/herbs. 'Every herb' preserves the sense
    of meticulous tithing even of small edible plants, and reads naturally alongside
    mint and rue.
- source_word: παρέρχεσθε
  chosen: pass by
  alternatives:
  - neglect
  - overlook
  lexicon: BDAG
  rationale: The verb literally conveys passing by or disregarding. 'Pass by' preserves
    the metaphorical vividness while still communicating neglect.
- source_word: κρίσιν
  chosen: justice
  alternatives:
  - judgment
  lexicon: BDAG
  rationale: In this ethical context, 'justice' better conveys the demanded moral
    practice than the more ambiguous 'judgment.'
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη and best reflects the
    Greek in contemporary English.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: The genitive can be understood in more than one way, but 'the love of
    God' is the most direct formal rendering and preserves the ambiguity between God's
    love and love directed toward God.
- source_word: ἔδει
  chosen: ought
  alternatives:
  - it was necessary
  - it was binding
  lexicon: BDAG
  rationale: Expresses moral obligation in idiomatic English without sounding wooden.
- source_word: παρεῖναι
  chosen: neglecting
  alternatives:
  - leaving aside
  - omitting
  lexicon: BDAG
  rationale: In the idiom μὴ παρεῖναι, 'without neglecting' communicates that the
    latter duties were not to be set aside while doing the former.
- source_word: κἀκεῖνα
  chosen: those things
  alternatives:
  - the others
  - those as well
  lexicon: BDAG
  rationale: Keeps the contrast with 'these things' explicit and mirrors the Greek
    demonstrative structure.
