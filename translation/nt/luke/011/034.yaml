id: LUK.11.34
reference: Luke 11:34
source:
  edition: SBLGNT
  text: ὁ λύχνος τοῦ σώματός ἐστιν ὁ ὀφθαλμός ⸀σου. ⸀ὅταν ὁ ὀφθαλμός σου ἁπλοῦς ᾖ,
    καὶ ὅλον τὸ σῶμά σου φωτεινόν ἐστιν· ἐπὰν δὲ πονηρὸς ᾖ, καὶ τὸ σῶμά σου σκοτεινόν.
translation:
  text: The lamp of your body is your eye. When your eye is healthy, your whole body
    also is full of light; but when it is bad, your body also is dark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clear,' 'sound,' or traditionally 'single.' The Greek adjective can
      carry the sense of being undivided or sound; here it describes the eye in contrast
      to a 'bad' eye.
    reason: lexical_alternative
  - marker: b
    text: Or 'evil.' The Greek word can mean 'bad' or 'evil'; here it may suggest
      both a defective eye and morally distorted perception.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  lexicon: BDAG
  rationale: λύχνος denotes a lamp or lampstand light-source rather than abstract
    'light.' 'Lamp' preserves the concrete metaphor.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard sense here is the physical body, used metaphorically in relation
    to perception and moral/spiritual condition.
- source_word: ὀφθαλμός
  chosen: eye
  lexicon: BDAG
  rationale: Literal 'eye' is retained; the verse builds a metaphor from the bodily
    organ to inner perception.
- source_word: ὅταν ... ᾖ
  chosen: When ... is
  alternatives:
  - Whenever ... is
  lexicon: BDAG
  rationale: ὅταν with subjunctive expresses a general conditional/temporal sense.
    'When' is natural English; 'whenever' is possible but less smooth here.
- source_word: ἁπλοῦς
  chosen: healthy
  alternatives:
  - clear
  - sound
  - single
  - generous
  lexicon: BDAG
  rationale: In this context, contrasted with πονηρός and linked to the eye as the
    body's lamp, ἁπλοῦς most naturally conveys a properly functioning, sound eye.
    'Single' is too opaque in modern English, and 'generous' reflects a semantic extension
    not primary in this bodily metaphor.
- source_word: ὅλον ... φωτεινόν
  chosen: your whole body also is full of light
  alternatives:
  - your whole body also is bright
  - your whole body also is light
  lexicon: BDAG
  rationale: φωτεινός means 'full of light, bright.' 'Full of light' best conveys
    the predicate adjective in idiomatic English while preserving the imagery.
- source_word: ἐπὰν δὲ
  chosen: but when
  alternatives:
  - but if
  lexicon: BDAG
  rationale: Introduces the contrasting conditional clause. 'But when' matches the
    earlier temporal-conditional structure and reads naturally in parallel.
- source_word: πονηρός
  chosen: bad
  alternatives:
  - evil
  - diseased
  - unhealthy
  lexicon: BDAG
  rationale: πονηρός can mean 'evil' or 'bad.' Here, because it modifies 'eye' in
    contrast to ἁπλοῦς within a bodily metaphor, 'bad' preserves the ambiguity between
    moral and functional deficiency without over-specifying either.
- source_word: σκοτεινόν
  chosen: dark
  alternatives:
  - full of darkness
  lexicon: BDAG
  rationale: σκοτεινός means 'dark.' 'Dark' is concise and preserves the antithesis
    with 'full of light.'
