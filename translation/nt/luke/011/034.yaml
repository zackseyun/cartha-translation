theological_decisions:
- issue: Meaning of ἁπλοῦς in the phrase 'your eye is ἁπλοῦς'
  chosen_reading: Render as 'healthy' in the main text
  alternative_readings:
  - single
  - clear
  - generous
  rationale: The immediate metaphor concerns the eye as the lamp of the body and the
    resulting condition of the whole body as light or dark. In this context, a functional
    rendering ('healthy') best communicates the sense to modern readers while preserving
    the moral implication through the broader image. More literal 'single' is traditional
    but obscure in contemporary English; 'generous' is a known semantic possibility
    but fits less directly with the eye/body-light imagery in this verse.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
