theological_decisions:
- issue: Referent of 'the one who made'
  chosen_reading: An implicit reference to God as Creator is preserved without explicit
    interpretive expansion.
  alternative_readings:
  - A more immediate reference only to the maker of the vessel/cup
  rationale: The saying operates on the level of the object lesson (cup/dish) while
    grounding the rebuke in the broader truth that God made both outward and inward
    aspects. The translation keeps the wording general enough to preserve both the
    immediate image and the theological implication, without inserting 'God' where
    the Greek does not.
  doctrine_reference: Preserve theological tension rather than resolve it.
