id: LUK.11.40
reference: Luke 11:40
source:
  edition: SBLGNT
  text: ἄφρονες, οὐχ ὁ ποιήσας τὸ ἔξωθεν καὶ τὸ ἔσωθεν ἐποίησεν;
translation:
  text: Fools! Did not the one who made the outside also make the inside?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exterior ... the interior.' The wording can refer both to the outside
      and inside of the vessel in the immediate context and, by extension, to outward
      and inward human life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφρονες
  chosen: Fools
  alternatives:
  - You fools
  - Senseless ones
  lexicon: BDAG
  rationale: Vocative plural adjective used substantivally as a direct rebuke. 'Fools'
    is natural, forceful English and preserves the sharpness of Jesus' address without
    unnecessary expansion.
- source_word: οὐχ ... ἐποίησεν;
  chosen: Did not ... make?
  alternatives:
  - Has not ... made?
  - didn't ... make?
  lexicon: BDAG
  rationale: The negative particle with a question expects an affirmative answer.
    English idiom is best represented by 'Did not ... ?' rather than a flat declarative.
    Aorist is rendered with simple past in this gnomic/theological statement.
- source_word: ὁ ποιήσας
  chosen: the one who made
  alternatives:
  - he who made
  - the maker of
  lexicon: BDAG
  rationale: Articular aorist participle functioning substantivally. 'The one who
    made' is clear modern English and preserves the personal reference to God without
    overformal diction.
- source_word: τὸ ἔξωθεν
  chosen: the outside
  alternatives:
  - the exterior
  - what is outside
  lexicon: BDAG
  rationale: Here the neuter substantive refers to the outward aspect, in context
    the external part/appearance associated with the cup and dish and, by implication,
    outward religious cleanliness. 'The outside' is concise and idiomatic while preserving
    the metaphorical breadth.
- source_word: τὸ ἔσωθεν
  chosen: the inside
  alternatives:
  - the interior
  - what is inside
  lexicon: BDAG
  rationale: Parallel to τὸ ἔξωθεν and referring to the inward aspect. 'The inside'
    preserves the contrast and allows the saying to apply both to the vessel image
    and to inner moral reality.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Though καί can be simply ''and,'' in this rhetorical question ''also''
    brings out the implied logic: the maker of the outside is likewise maker of the
    inside. This is a natural English way to preserve the argument''s force.'
