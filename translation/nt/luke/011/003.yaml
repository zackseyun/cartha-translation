theological_decisions:
- issue: Meaning of ἐπιούσιον in the Lord's Prayer
  chosen_reading: daily
  alternative_readings:
  - for the coming day
  - necessary for existence
  - supersubstantial
  rationale: The adjective is lexically disputed, but Luke's added τὸ καθ’ ἡμέραν
    favors an ordinary sense tied to daily provision. The translation preserves the
    ambiguity in a footnote rather than importing a sacramental or metaphysical reading
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
