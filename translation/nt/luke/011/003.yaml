id: LUK.11.3
reference: Luke 11:3
source:
  edition: SBLGNT
  text: τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον δίδου ἡμῖν τὸ καθ’ ἡμέραν·
translation:
  text: Give us each day our daily bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread for the coming day,' 'bread we need,' or, less likely here, 'supersubstantial
      bread.' The Greek adjective is rare and debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: The noun literally means 'bread,' and in prayer context it can stand
    concretely for basic sustenance. 'Bread' preserves the metaphorical and traditional
    force without over-paraphrasing to 'food' in the main text.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Straightforward possessive pronoun modifying 'bread.'
- source_word: ἐπιούσιον
  chosen: daily
  alternatives:
  - for the coming day
  - necessary for existence
  - needful
  lexicon: BDAG
  rationale: This rare adjective is famously difficult. In Luke, the following phrase
    τὸ καθ’ ἡμέραν ('day by day / each day') strongly supports the sense of regular
    daily provision rather than a more obscure rendering. 'Daily' is the clearest
    optimal-equivalence choice, while preserving alternatives in a footnote because
    the term is lexically contested.
- source_word: δίδου
  chosen: Give
  alternatives:
  - keep giving
  lexicon: BDAG
  rationale: Present imperative can imply ongoing or habitual action. English 'Give'
    in this prayer context is idiomatic and sufficient, while the durative nuance
    is reflected by 'each day' in the sentence.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Straightforward indirect object of the imperative.
- source_word: τὸ καθ’ ἡμέραν
  chosen: each day
  alternatives:
  - day by day
  - daily
  lexicon: BDAG
  rationale: This adverbial expression explicitly marks repeated daily provision.
    Rendering it as 'each day' avoids awkward repetition if ἐπιούσιον is also rendered
    'daily,' while preserving Luke's emphasis on continual dependence.
