id: LUK.11.31
reference: Luke 11:31
source:
  edition: SBLGNT
  text: βασίλισσα νότου ἐγερθήσεται ἐν τῇ κρίσει μετὰ τῶν ἀνδρῶν τῆς γενεᾶς ταύτης
    καὶ κατακρινεῖ αὐτούς· ὅτι ἦλθεν ἐκ τῶν περάτων τῆς γῆς ἀκοῦσαι τὴν σοφίαν Σολομῶνος,
    καὶ ἰδοὺ πλεῖον Σολομῶνος ὧδε.
translation:
  text: The queen of the South will rise up in the judgment with the men of this generation
    and will condemn them, because she came from the ends of the earth to hear the
    wisdom of Solomon, and behold, something greater than Solomon is here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the figure commonly identified with the Queen of Sheba (see 1 Kings
      10:1–13; 2 Chronicles 9:1–12).
    reason: cross_reference
  - marker: b
    text: Or 'one greater than Solomon.' Greek has a neuter expression, literally
      'something greater than Solomon,' which may emphasize more than a direct personal
      comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασίλισσα νότου
  chosen: the queen of the South
  alternatives:
  - the Queen of Sheba
  - the southern queen
  lexicon: BDAG
  rationale: A literal rendering of the genitive construction preserves the wording
    of the Greek and echoes the known OT figure without importing the identification
    into the main text. 'Queen of Sheba' is interpretive, though contextually likely
    from 1 Kgs 10 / 2 Chr 9.
- source_word: ἐγερθήσεται
  chosen: will rise up
  alternatives:
  - will be raised
  - will stand up
  lexicon: BDAG
  rationale: Future passive/middle form of ἐγείρω here idiomatically refers to appearing
    or rising in judgment, not necessarily making explicit resurrection in the English
    wording. 'Rise up' preserves the judicial scene and possible eschatological resonance.
- source_word: ἐν τῇ κρίσει
  chosen: in the judgment
  alternatives:
  - at the judgment
  - in judgment
  lexicon: BDAG
  rationale: The article points to a definite eschatological judgment. 'In the judgment'
    is a natural and fairly formal rendering.
- source_word: μετὰ τῶν ἀνδρῶν
  chosen: with the men
  alternatives:
  - with the people
  - alongside the men
  lexicon: BDAG
  rationale: ἀνδρῶν is specifically masculine ('men'), not the more generic 'people'
    or 'humans.' Per gender-accurate policy, the masculine form is retained.
- source_word: τῆς γενεᾶς ταύτης
  chosen: of this generation
  alternatives:
  - of this age
  lexicon: BDAG
  rationale: γενεά in the Synoptic context commonly refers to the present generation
    of Jesus' contemporaries. 'Generation' is the standard and contextually precise
    rendering.
- source_word: κατακρινεῖ αὐτούς
  chosen: will condemn them
  alternatives:
  - will pass judgment on them
  lexicon: BDAG
  rationale: κατακρίνω carries the stronger sense of condemning rather than merely
    judging. This fits the contrastive force of her example against their unbelief.
- source_word: ἐκ τῶν περάτων τῆς γῆς
  chosen: from the ends of the earth
  alternatives:
  - from the farthest parts of the earth
  - from the ends of the land
  lexicon: BDAG
  rationale: This is a conventional idiom for a very distant place. 'Earth' is preferable
    to 'land' here because the expression is global/hyperbolic rather than local.
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: The aorist infinitive after ἦλθεν expresses purpose. 'To hear' is concise
    and idiomatic in English.
- source_word: τὴν σοφίαν Σολομῶνος
  chosen: the wisdom of Solomon
  alternatives:
  - Solomon's wisdom
  lexicon: BDAG
  rationale: Both are possible; the chosen form stays close to the Greek structure
    and preserves emphasis on 'wisdom' as the object sought.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker calling attention to a climactic statement.
    'Behold' preserves the solemn rhetorical force better than the more casual 'look'
    or 'see.'
- source_word: πλεῖον Σολομῶνος
  chosen: something greater than Solomon
  alternatives:
  - one greater than Solomon
  - more than Solomon
  lexicon: BDAG
  rationale: 'The neuter πλεῖον is best represented by ''something greater'' rather
    than the masculine ''one greater,'' preserving the Greek form while allowing the
    saying''s broad force: more than merely a person comparable to Solomon is present.'
- source_word: ὧδε
  chosen: is here
  alternatives:
  - is in this place
  - is present here
  lexicon: BDAG
  rationale: A simple locative adverb indicating present presence. 'Is here' is natural
    and sufficiently formal.
