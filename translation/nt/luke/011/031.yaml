theological_decisions:
- issue: Whether to make the queen's identity explicit as the Queen of Sheba
  chosen_reading: Kept the Greek expression 'the queen of the South' in the main text
  alternative_readings:
  - the Queen of Sheba
  rationale: The OT allusion is strong, but the Greek text itself says 'queen of the
    South.' Retaining the textual wording avoids importing an identification into
    the main text while allowing the allusion to be preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
- issue: Whether πλεῖον Σολομῶνος should be personalized as 'one greater than Solomon'
  chosen_reading: Rendered as 'something greater than Solomon'
  alternative_readings:
  - one greater than Solomon
  - more than Solomon
  rationale: The Greek adjective is neuter, not masculine. The neuter may point to
    the reality present in Jesus and his kingdom/message rather than only to his person
    in isolation. The translation preserves that tension rather than resolving it.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
- issue: Whether ἐγερθήσεται should explicitly mention resurrection
  chosen_reading: Rendered as 'will rise up'
  alternative_readings:
  - will be raised
  rationale: The verb can evoke resurrection in an eschatological setting, but in
    this judicial context it also naturally means appearing or rising in witness/judgment.
    The English keeps the resonance without over-specifying.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
