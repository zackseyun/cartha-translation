id: LUK.11.10
reference: Luke 11:10
source:
  edition: SBLGNT
  text: πᾶς γὰρ ὁ αἰτῶν λαμβάνει, καὶ ὁ ζητῶν εὑρίσκει, καὶ τῷ κρούοντι ἀνοιγήσεται.
translation:
  text: For everyone who asks receives, and the one who seeks finds, and to the one
    who knocks it will be opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the context, 'the door will be opened to the one
      who knocks.' The Greek leaves the object unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - every one
  - all
  lexicon: BDAG
  rationale: Used distributively with the substantival participle construction; 'everyone'
    is natural modern English and preserves the universal scope.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this verse to the preceding
    exhortation.
- source_word: ὁ αἰτῶν
  chosen: the one who asks
  alternatives:
  - everyone who asks
  - he who asks
  lexicon: BDAG
  rationale: Substantival present participle rendered as a generic person characterized
    by asking. 'The one who asks' preserves the participial force and avoids archaic
    'he who.'
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - gets
  lexicon: BDAG
  rationale: Standard gloss matching the request-and-response context; more fitting
    than the colloquial 'gets.'
- source_word: ὁ ζητῶν
  chosen: the one who seeks
  alternatives:
  - the one searching
  - he who seeks
  lexicon: BDAG
  rationale: Present participle indicates ongoing/generic action; 'seeks' is the established
    and accurate rendering.
- source_word: εὑρίσκει
  chosen: finds
  alternatives:
  - discovers
  lexicon: BDAG
  rationale: Direct and idiomatic equivalent in this proverbial triad.
- source_word: τῷ κρούοντι
  chosen: to the one who knocks
  alternatives:
  - for the one who knocks
  - to him who knocks
  lexicon: BDAG
  rationale: Dative complements the passive verb ἀνοιγήσεται; 'to the one who knocks'
    preserves the Greek syntax better than flattening it to 'the one who knocks.'
- source_word: ἀνοιγήσεται
  chosen: it will be opened
  alternatives:
  - will be opened
  - the door will be opened
  lexicon: BDAG
  rationale: Future passive with an implied object. 'It' is supplied in English because
    the object is unstated in Greek; 'the door' would over-specify beyond the text,
    though contextually implied.
