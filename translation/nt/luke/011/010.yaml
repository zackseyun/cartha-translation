theological_decisions:
- issue: Scope and force of the universal promise
  chosen_reading: Render the statement as a general universal principle without adding
    qualifications.
  alternative_readings:
  - Render as a hyperbolic encouragement
  - Add interpretive qualifiers such as 'everyone who asks rightly'
  rationale: The Greek states an unqualified universal maxim in the context of prayer
    exhortation. The translation should preserve that tension and not import theological
    conditions not expressed in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
