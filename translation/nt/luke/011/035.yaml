theological_decisions:
- issue: Metaphorical sense of 'light' and 'darkness'
  chosen_reading: Preserve the metaphor in the main text without specifying a doctrinally
    narrowed meaning such as conscience, understanding, or spiritual state alone.
  alternative_readings:
  - the understanding in you
  - your inner light
  - your conscience
  rationale: Jesus' saying operates through a broad metaphor connected to the preceding
    context about perception and inner condition. Translating more explicitly would
    import interpretation beyond what the Greek states. The translation therefore
    preserves the theological tension and breadth of the image.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
