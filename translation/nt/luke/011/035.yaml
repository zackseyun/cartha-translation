id: LUK.11.35
reference: Luke 11:35
source:
  edition: SBLGNT
  text: σκόπει οὖν μὴ τὸ φῶς τὸ ἐν σοὶ σκότος ἐστίν.
translation:
  text: Therefore, watch out lest the light in you is darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'See to it that the light in you is not darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκόπει
  chosen: watch out
  alternatives:
  - see to it
  - take care
  - look carefully
  lexicon: BDAG
  rationale: Present active imperative, second singular, calling for ongoing vigilance.
    'Watch out' is natural modern English and preserves the warning force better than
    the more wooden 'look' or 'see.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding teaching about the eye and light.
    'Therefore' clearly signals the logical connection.
- source_word: μὴ
  chosen: lest
  alternatives:
  - that not
  - so that not
  lexicon: BDAG
  rationale: With the imperative, μή introduces a warning about an undesirable possibility.
    'Lest' is concise and accurately conveys the cautionary sense.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Literal rendering of φῶς. In context it refers metaphorically to what
    is perceived as inner illumination or moral/spiritual light, but the metaphor
    should be preserved rather than paraphrased.
- source_word: τὸ ἐν σοὶ
  chosen: in you
  alternatives:
  - within you
  - inside you
  lexicon: BDAG
  rationale: A straightforward rendering of the articular phrase with preposition.
    'In you' is idiomatic and leaves the metaphor open without over-interpreting it
    psychologically or spiritually.
- source_word: σκότος
  chosen: darkness
  lexicon: BDAG
  rationale: Literal rendering matching the light/darkness contrast in the immediate
    context. Preserves the metaphorical and moral force without narrowing it.
- source_word: ἐστίν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula; no expansion is needed.
