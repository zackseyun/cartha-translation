id: LUK.11.37
reference: Luke 11:37
source:
  edition: SBLGNT
  text: Ἐν δὲ τῷ λαλῆσαι ⸀ἐρωτᾷ αὐτὸν ⸀Φαρισαῖος ὅπως ἀριστήσῃ παρ’ αὐτῷ· εἰσελθὼν
    δὲ ἀνέπεσεν.
translation:
  text: While he was speaking, a Pharisee asks him to dine at his house; so he went
    in and reclined at the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to eat breakfast' or 'to have a morning meal'; the Greek verb can refer
      to an earlier meal, but here it broadly denotes dining.
    reason: lexical_alternative
  - marker: b
    text: That is, reclined in the customary posture for a formal meal.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν δὲ τῷ λαλῆσαι
  chosen: While he was speaking
  alternatives:
  - As he was speaking
  - While he spoke
  lexicon: BDAG
  rationale: The construction ἐν + articular infinitive commonly expresses contemporaneous
    time. 'While he was speaking' is natural modern English and preserves the ongoing
    temporal sense better than a more wooden rendering.
- source_word: ἐρωτᾷ
  chosen: asks
  alternatives:
  - asked
  - invites
  - requests
  lexicon: BDAG
  rationale: The present-tense historical present is common in narrative. English
    can retain vividness with 'asks.' The verb means 'ask/request,' and the invitation
    sense is supplied by the following clause rather than by translating the verb
    itself as 'invites.'
- source_word: Φαρισαῖος
  chosen: a Pharisee
  lexicon: BDAG
  rationale: Standard transliteration of the group designation; the anarthrous singular
    is naturally rendered with the English indefinite article.
- source_word: ὅπως ἀριστήσῃ
  chosen: to dine
  alternatives:
  - to eat breakfast
  - to have a meal
  lexicon: BDAG
  rationale: ἀριστάω can denote taking the morning or midday meal, but in this context
    a general invitation to a meal is best conveyed by 'to dine.' This avoids overprecision
    about time of day while preserving the hospitality setting.
- source_word: παρ’ αὐτῷ
  chosen: at his house
  alternatives:
  - with him
  - at his place
  lexicon: BDAG
  rationale: Literally 'with him' or 'at his place,' but in an invitation to a meal
    the idiomatic English sense is that Jesus is invited to the Pharisee's home. 'At
    his house' makes the social setting explicit without adding foreign content.
- source_word: εἰσελθὼν
  chosen: he went in
  alternatives:
  - entering
  - after entering
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as an attendant circumstance
    preceding the main verb. 'He went in' is clear and idiomatic.
- source_word: ἀνέπεσεν
  chosen: reclined at the table
  alternatives:
  - reclined
  - sat down to eat
  lexicon: BDAG
  rationale: In first-century meal contexts ἀναπίπτω refers to reclining for a meal,
    not merely sitting. 'Reclined at the table' preserves the historical dining posture
    while remaining readable.
