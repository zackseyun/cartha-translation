id: LUK.11.18
reference: Luke 11:18
source:
  edition: SBLGNT
  text: εἰ δὲ καὶ ὁ Σατανᾶς ἐφ’ ἑαυτὸν διεμερίσθη, πῶς σταθήσεται ἡ βασιλεία αὐτοῦ;
    ὅτι λέγετε ἐν Βεελζεβοὺλ ἐκβάλλειν με τὰ δαιμόνια.
translation:
  text: But if Satan also is divided against himself, how will his kingdom stand?
    For you say that I cast out the demons by Beelzebul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Beelzebul; some English traditions use Beelzebub.
    reason: alternative_reading
lexical_decisions:
- source_word: Σατανᾶς
  chosen: Satan
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title in Greek; a proper
    name is transliterated rather than translated.
- source_word: ἐφ’ ἑαυτὸν
  chosen: against himself
  alternatives:
  - against his own self
  - with himself
  lexicon: BDAG
  rationale: With διαμερίζω in this context, ἐπί + reflexive conveys internal opposition
    or division. English idiom is best captured by 'against himself' rather than a
    more wooden 'upon himself.'
- source_word: διεμερίσθη
  chosen: is divided
  alternatives:
  - has been divided
  - was divided
  lexicon: BDAG
  rationale: Aorist passive is rendered with an English present passive in this conditional
    argument to express the state resulting from division in a natural way. 'Is divided'
    fits the logic of the rhetorical question better than a simple past in English.
- source_word: πῶς σταθήσεται
  chosen: how will ... stand
  alternatives:
  - how can ... stand
  - how will ... remain standing
  lexicon: BDAG
  rationale: Future middle/passive of ἵστημι here means continue, endure, or remain
    established. 'How will ... stand' preserves the metaphor and rhetorical force
    with readable English.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - rule
  - reign
  lexicon: BDAG
  rationale: '''Kingdom'' is the most natural and established rendering here, referring
    to Satan''s dominion or realm. ''Rule'' or ''reign'' are possible but less fitting
    in this parallel with a divided kingdom.'
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the reason for the rhetorical question: Jesus is
    grounding the statement in their accusation. ''For'' preserves the explanatory
    force cleanly.'
- source_word: ἐν Βεελζεβοὺλ
  chosen: by Beelzebul
  alternatives:
  - in Beelzebul
  - by the power of Beelzebul
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' in this idiom it expresses agency or instrumentality
    in the accusation. 'By Beelzebul' is the clearest English rendering without over-expanding
    the text.
- source_word: Βεελζεβοὺλ
  chosen: Beelzebul
  alternatives:
  - Beelzebub
  lexicon: BDAG
  rationale: The SBLGNT reading is Βεελζεβούλ, so the translation follows the Greek
    form directly. The more familiar 'Beelzebub' is preserved in a footnote as an
    alternative form.
- source_word: ἐκβάλλειν
  chosen: cast out
  alternatives:
  - drive out
  lexicon: BDAG
  rationale: '''Cast out'' is the standard and accurate rendering for exorcistic contexts,
    preserving both the force and biblical idiom.'
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: '''Demons'' is the direct and conventional rendering of δαιμόνια in this
    context; ''evil spirits'' is interpretive rather than lexical.'
