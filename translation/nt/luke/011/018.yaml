theological_decisions:
- issue: Nature of Jesus' opponents' accusation
  chosen_reading: The accusation is rendered as claiming Jesus casts out demons by
    Beelzebul, without adding interpretive material about demonic empowerment beyond
    what the Greek states.
  alternative_readings:
  - that I cast out demons in association with Beelzebul
  - that I cast out demons by the power of Beelzebul
  rationale: The verse reports the accusation plainly. The translation avoids importing
    a fuller theological explanation while still rendering ἐν idiomatically as agency/instrumentality
    in English.
  doctrine_reference: Preserve theological tension rather than resolve it.
