theological_decisions:
- issue: Sense of ἀναίδεια in the parable
  chosen_reading: The term refers to the petitioner's shameless persistence rather
    than a commendation of morally improper behavior.
  alternative_readings:
  - impudence
  - boldness
  - shamelessness
  rationale: The verse does not teach that friendship is irrelevant or that God rewards
    rudeness as such; rather, the parable's logic highlights persistent, socially
    unembarrassed asking. The translation preserves the lexical force with 'shameless'
    while clarifying the contextual nuance with 'persistence.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
