id: LUK.11.8
reference: Luke 11:8
source:
  edition: SBLGNT
  text: λέγω ὑμῖν, εἰ καὶ οὐ δώσει αὐτῷ ἀναστὰς διὰ τὸ εἶναι ⸂φίλον αὐτοῦ⸃, διά γε
    τὴν ἀναίδειαν αὐτοῦ ἐγερθεὶς δώσει αὐτῷ ⸀ὅσων χρῄζει.
translation:
  text: I tell you, even if he will not get up and give him anything because he is
    his friend, yet because of his shameless persistence he will get up and give him
    whatever he needs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of his boldness,' 'because of his impudence,' or more literally
      'because of his shamelessness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Standard introductory formula in Jesus' speech. 'I tell you' is idiomatic
    modern English while preserving the direct address.
- source_word: εἰ καὶ οὐ δώσει αὐτῷ
  chosen: even if he will not ... give him
  alternatives:
  - although he will not ... give him
  - even though he does not ... give him
  lexicon: BDAG
  rationale: εἰ καί introduces a concessive idea. 'Even if' preserves the rhetorical
    force of the condition in this parabolic statement.
- source_word: ἀναστὰς
  chosen: get up
  alternatives:
  - rise
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι in this domestic scene refers to physically
    getting up from bed. 'Get up' is natural modern English.
- source_word: διὰ τὸ εἶναι φίλον αὐτοῦ
  chosen: because he is his friend
  alternatives:
  - because of their friendship
  - because he is a friend of his
  lexicon: BDAG
  rationale: The construction expresses cause. Rendering the predicate relation directly
    keeps the personal force of φίλον αὐτοῦ rather than abstracting it to 'friendship.'
- source_word: διά γε
  chosen: yet because of
  alternatives:
  - but because of
  - indeed because of
  lexicon: BDAG
  rationale: The combination marks emphatic contrast or concession. 'Yet because of'
    captures the turn from friendship as insufficient to another motive as effective.
- source_word: ἀναίδειαν
  chosen: shameless persistence
  alternatives:
  - boldness
  - impudence
  - shamelessness
  lexicon: BDAG
  rationale: ἀναίδεια literally denotes shamelessness or lack of sensitivity to what
    is proper, but in this context it refers to the petitioner's socially unembarrassed
    insistence. 'Shameless persistence' preserves the lexical edge of 'shameless'
    while making the contextual sense clear in English.
- source_word: ἐγερθεὶς
  chosen: he will get up
  alternatives:
  - having been awakened, he will give
  - rising, he will give
  lexicon: BDAG
  rationale: Though from ἐγείρω rather than ἀνίστημι, in context it overlaps with
    the previous participle and refers to getting up from bed. English naturally renders
    both with 'get up.'
- source_word: δώσει αὐτῷ
  chosen: give him
  alternatives:
  - give to him
  lexicon: BDAG
  rationale: Simple dative object; idiomatic English omits 'to' here.
- source_word: ὅσων χρῄζει
  chosen: whatever he needs
  alternatives:
  - as much as he needs
  - whatever things he needs
  lexicon: BDAG
  rationale: The genitive plural relative with χρῄζω conveys the full amount of needed
    things. 'Whatever he needs' is idiomatic and sufficiently comprehensive.
- source_word: τι implied after δώσει in the first clause
  chosen: anything
  alternatives:
  - him what he asks for
  - him
  lexicon: BDAG
  rationale: English normally requires an object after 'give' in the first clause.
    'Anything' is supplied to make the sentence natural and reflects the implied object
    carried by context and the later explicit 'whatever he needs.'
