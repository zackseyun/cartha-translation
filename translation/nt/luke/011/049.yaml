id: LUK.11.49
reference: Luke 11:49
source:
  edition: SBLGNT
  text: διὰ τοῦτο καὶ ἡ σοφία τοῦ θεοῦ εἶπεν· Ἀποστελῶ εἰς αὐτοὺς προφήτας καὶ ἀποστόλους,
    καὶ ἐξ αὐτῶν ἀποκτενοῦσιν καὶ ⸀διώξουσιν,
translation:
  text: For this reason also the wisdom of God said, ‘I will send to them prophets
    and apostles, and some of them they will kill and persecute,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God’s wisdom.' The phrase may be understood as a personification of
      divine wisdom, as God’s wise decree, or as an implicit self-reference by Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: Idiomatic causal expression introducing the explanation of the preceding
    indictment. 'For this reason' preserves the inferential force without sounding
    wooden.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: Placed with 'For this reason also' to reflect the additive force here;
    it slightly intensifies the statement rather than simply linking clauses.
- source_word: ἡ σοφία τοῦ θεοῦ
  chosen: the wisdom of God
  alternatives:
  - God's wisdom
  lexicon: BDAG
  rationale: A formally close rendering that preserves the genitival construction
    and leaves open whether this is a personification of divine wisdom or a way of
    referring to God's wise decree. Avoids over-interpreting the phrase.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - declared
  - spoke
  lexicon: BDAG
  rationale: Simple past narrative verb; 'said' is the most natural and least interpretively
    loaded rendering.
- source_word: Ἀποστελῶ
  chosen: I will send
  alternatives:
  - I will send out
  lexicon: BDAG
  rationale: Future active of ἀποστέλλω. 'Send' is sufficient in English; 'send out'
    is possible but unnecessary here.
- source_word: εἰς αὐτούς
  chosen: to them
  alternatives:
  - among them
  - against them
  lexicon: BDAG
  rationale: Although εἰς can be rendered in various ways, with verbs of sending it
    commonly has the sense 'to' or 'toward.' 'To them' best fits the context.
- source_word: προφήτας
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering of προφήτης; no contextual reason to vary.
- source_word: ἀποστόλους
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Luke-Acts and early Christian usage, ἀπόστολος is a recognized title/function.
    'Apostles' preserves the likely technical sense better than the more generic 'messengers.'
- source_word: ἐξ αὐτῶν
  chosen: some of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: 'Partitive sense: not all the prophets and apostles sent will suffer
    the same fate. ''Some of them'' is idiomatic English and preserves the partitive
    force.'
- source_word: ἀποκτενοῦσιν
  chosen: they will kill
  alternatives:
  - they will put to death
  lexicon: BDAG
  rationale: Direct and natural rendering of the future verb. 'Put to death' is possible
    but less immediate.
- source_word: διώξουσιν
  chosen: persecute
  alternatives:
  - pursue
  - hunt down
  lexicon: BDAG
  rationale: In this hostile context following 'kill,' διώκω clearly carries the sense
    of persecution rather than neutral pursuit.
