theological_decisions:
- issue: Meaning of 'the wisdom of God'
  chosen_reading: Rendered as 'the wisdom of God' without identifying it explicitly
    as Jesus, Scripture, or a separate hypostatic figure.
  alternative_readings:
  - a personification of divine wisdom
  - a reference to God's wise decree
  - an implicit self-reference by Jesus
  rationale: The phrase is capable of more than one interpretive construal in context.
    To preserve theological tension rather than resolve it, the translation keeps
    the wording transparent and non-speculative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
