id: LUK.11.54
reference: Luke 11:54
source:
  edition: SBLGNT
  text: ἐνεδρεύοντες ⸀αὐτὸν θηρεῦσαί τι ἐκ τοῦ στόματος ⸀αὐτοῦ.
translation:
  text: lying in wait for him, to catch something from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lying in ambush for him' or 'waiting to trap him.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to catch something out of his mouth,' that is, to seize on something
      he said.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεδρεύοντες
  chosen: lying in wait
  alternatives:
  - lying in ambush
  - waiting to trap
  lexicon: BDAG
  rationale: The participle denotes hostile lurking with intent to ensnare. 'Lying
    in wait' preserves the adversarial nuance in natural English without over-paraphrasing.
- source_word: αὐτόν
  chosen: for him
  alternatives:
  - for Jesus
  - against him
  lexicon: BDAG
  rationale: The pronoun refers back to Jesus. 'For him' fits the idiom with 'lying
    in wait.' 'Against him' is interpretive and stronger than the Greek object alone.
- source_word: θηρεῦσαί
  chosen: to catch
  alternatives:
  - to trap
  - to hunt
  lexicon: BDAG
  rationale: The infinitive literally evokes hunting or catching prey. In this context
    of verbal entrapment, 'to catch' communicates the metaphor clearly in idiomatic
    English.
- source_word: τι
  chosen: something
  alternatives:
  - anything
  lexicon: BDAG
  rationale: The indefinite pronoun is naturally rendered 'something' here, indicating
    they hoped to seize on some statement from him.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  chosen: from his mouth
  alternatives:
  - out of his mouth
  - from what he said
  lexicon: BDAG
  rationale: The phrase is a common idiom for spoken words. 'From his mouth' keeps
    the concrete imagery of the Greek; 'from what he said' is smoother but less formally
    transparent.
