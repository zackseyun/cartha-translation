  rationale: While literal, 'catch something from his mouth' can sound physically awkward in modern English, evoking the image of catching a falling object. 'Seize on something from his mouth' preserves the literal elements (the object 'something' and the prepositional phrase 'from his mouth') while using a more natural English idiom for verbal entrapment.
