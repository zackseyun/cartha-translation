theological_decisions:
- issue: Nature of the requested sign
  chosen_reading: a sign from heaven
  alternative_readings:
  - a heavenly sign
  rationale: The text presents the opponents as demanding a sign whose origin or authentication
    is heavenly. Rendering the phrase straightforwardly preserves the narrative tension
    without importing a more specific theological claim than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
