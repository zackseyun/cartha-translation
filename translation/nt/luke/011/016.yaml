id: LUK.11.16
reference: Luke 11:16
source:
  edition: SBLGNT
  text: ἕτεροι δὲ πειράζοντες σημεῖον ⸂ἐξ οὐρανοῦ ἐζήτουν παρ’ αὐτοῦ⸃.
translation:
  text: But others, testing him, were asking for a sign from heaven from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a heavenly sign.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  chosen: others
  alternatives:
  - some others
  lexicon: BDAG
  rationale: ἕτεροι contrasts this group with the previous speakers; 'others' is the
    natural English rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' best reflects the adversative
    sense in context, distinguishing this group's response from the prior one.
- source_word: πειράζοντες
  chosen: testing him
  alternatives:
  - tempting him
  - putting him to the test
  lexicon: BDAG
  rationale: In this hostile context, πειράζω means to test or try with negative intent.
    'Testing him' is idiomatic modern English and avoids the narrower moral sense
    of 'tempting' in contemporary usage. The object 'him' is supplied from context
    because the participle's target is clearly Jesus.
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - miraculous sign
  lexicon: BDAG
  rationale: σημεῖον commonly means 'sign.' The simpler rendering preserves the Greek
    term without over-interpreting, while the context already implies a miraculous
    sign.
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: The phrase denotes heavenly origin. 'From heaven' is standard and natural
    English.
- source_word: ἐζήτουν
  chosen: were asking for
  alternatives:
  - were seeking
  - kept asking for
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Were asking for'
    captures the durative sense in idiomatic English better than the more wooden 'were
    seeking.'
- source_word: παρ’ αὐτοῦ
  chosen: from him
  alternatives:
  - of him
  lexicon: BDAG
  rationale: 'παρά with the genitive here indicates source: they were asking for the
    sign from Jesus. ''From him'' is the clearest rendering, even though it creates
    repetition with ''from heaven''; both prepositional ideas are present in Greek
    and should be preserved.'
