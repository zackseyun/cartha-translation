id: LUK.11.43
reference: Luke 11:43
source:
  edition: SBLGNT
  text: οὐαὶ ὑμῖν τοῖς Φαρισαίοις, ὅτι ἀγαπᾶτε τὴν πρωτοκαθεδρίαν ἐν ταῖς συναγωγαῖς
    καὶ τοὺς ἀσπασμοὺς ἐν ταῖς ἀγοραῖς.
translation:
  text: Woe to you Pharisees, because you love the best seats in the synagogues and
    greetings in the marketplaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the chief seats" or "the places of honor."
    reason: lexical_alternative
  - marker: b
    text: That is, public greetings that conveyed social honor and recognition.
    reason: cultural_note
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of the interjection better than
    softer English alternatives.
- source_word: ὑμῖν τοῖς Φαρισαίοις
  chosen: to you Pharisees
  alternatives:
  - to you, Pharisees
  lexicon: BDAG
  rationale: Direct address is preserved naturally in English; omission of the comma
    in the main text keeps the line flowing while maintaining the vocative sense.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the woe in clear modern English.
- source_word: ἀγαπᾶτε
  chosen: you love
  alternatives:
  - you are fond of
  - you cherish
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω; here it conveys strong preference or desire
    for honor rather than theological 'love,' but 'love' remains the most direct and
    idiomatic choice.
- source_word: πρωτοκαθεδρίαν
  chosen: the best seats
  alternatives:
  - the chief seats
  - the places of honor
  - the front seats
  lexicon: BDAG
  rationale: Refers to places of highest honor in a synagogue setting. 'Best seats'
    is natural modern English and communicates status without archaic phrasing; 'places
    of honor' is possible but less concrete.
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  alternatives:
  - in synagogues
  lexicon: BDAG
  rationale: The article is naturally represented in English, and 'synagogues' is
    the standard rendering for συναγωγαῖς.
- source_word: ἀσπασμοὺς
  chosen: greetings
  alternatives:
  - formal greetings
  - public greetings
  - salutations
  lexicon: BDAG
  rationale: The term denotes greeting gestures or spoken salutations, especially
    honorific public acknowledgment. 'Greetings' is concise and idiomatic; the honorific
    nuance is supplied by context.
- source_word: ἐν ταῖς ἀγοραῖς
  chosen: in the marketplaces
  alternatives:
  - in the market squares
  - in the markets
  lexicon: BDAG
  rationale: ἀγορά refers to public market spaces or squares. 'Marketplaces' is clear
    modern English and preserves the public-social setting where honor would be displayed.
