theological_decisions:
- issue: Nature of Jesus' denunciation
  chosen_reading: A prophetic woe against the Pharisees' love of public honor.
  alternative_readings:
  - A merely social critique of bad manners
  rationale: οὐαί plus the stated reasons frames the saying as a moral-spiritual denunciation,
    not just etiquette criticism. The translation preserves this force without adding
    interpretive expansion.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
