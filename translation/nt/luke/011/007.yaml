id: LUK.11.7
reference: Luke 11:7
source:
  edition: SBLGNT
  text: κἀκεῖνος ἔσωθεν ἀποκριθεὶς εἴπῃ· Μή μοι κόπους πάρεχε· ἤδη ἡ θύρα κέκλεισται,
    καὶ τὰ παιδία μου μετ’ ἐμοῦ εἰς τὴν κοίτην εἰσίν· οὐ δύναμαι ἀναστὰς δοῦναί σοι.
translation:
  text: and he from inside answers and says, ‘Do not trouble me. The door has already
    been shut, and my children are with me in bed. I am not able to get up and give
    you anything.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not cause me trouble' or 'Do not keep bothering me.' The Greek idiom
      literally involves 'providing troubles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the door is already shut.' The Greek perfect verb can emphasize either
      the completed action ('has been shut') or the resulting state ('is shut').
    reason: lexical_alternative
  - marker: c
    text: '''In bed'' refers to the shared sleeping place in a household setting,
      not to marital intimacy.'
    reason: cultural_note
lexical_decisions:
- source_word: κἀκεῖνος
  chosen: and he
  alternatives:
  - and that one
  - then he
  lexicon: BDAG
  rationale: Carries forward the narrative with an additive sense plus demonstrative
    reference. 'And he' is natural English while preserving the referent.
- source_word: ἔσωθεν
  chosen: from inside
  alternatives:
  - inside
  - from within
  lexicon: BDAG
  rationale: Expresses location/source of the reply. 'From inside' preserves the spatial
    contrast with the person outside knocking.
- source_word: ἀποκριθεὶς εἴπῃ
  chosen: answers and says
  alternatives:
  - answered and said
  - replied
  lexicon: BDAG
  rationale: A common Semitic-influenced narrative expression. Present-tense English
    is used here for vividness within the parable setting, while retaining both verbal
    elements rather than collapsing them entirely to 'replied'.
- source_word: Μή μοι κόπους πάρεχε
  chosen: Do not trouble me
  alternatives:
  - Do not cause me trouble
  - Do not keep bothering me
  lexicon: BDAG
  rationale: κόπους πάρεχε is an idiomatic expression meaning to cause trouble or
    inconvenience. 'Do not trouble me' is concise and idiomatic without over-paraphrasing.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: Marks the state as already in effect; 'already' is the most direct equivalent.
- source_word: ἡ θύρα κέκλεισται
  chosen: The door has already been shut
  alternatives:
  - the door is already shut
  - the door has been locked
  lexicon: BDAG
  rationale: The perfect verb indicates a completed action with present result. 'Has
    already been shut' preserves that nuance better than a simple stative rendering;
    'locked' would overstate κλείω.
- source_word: τὰ παιδία μου
  chosen: my children
  alternatives:
  - my little children
  - my kids
  lexicon: BDAG
  rationale: παιδία refers to children; 'my children' is accurate and suitably neutral
    in register. 'Kids' is too informal; 'little children' may over-specify age.
- source_word: μετ’ ἐμοῦ εἰς τὴν κοίτην εἰσίν
  chosen: are with me in bed
  alternatives:
  - are in bed with me
  - are with me in the bed
  lexicon: BDAG
  rationale: κοίτη here refers to the bed/sleeping place, not sexual union. 'Are with
    me in bed' is natural English and preserves the domestic setting.
- source_word: οὐ δύναμαι ἀναστὰς δοῦναί σοι
  chosen: I am not able to get up and give you anything
  alternatives:
  - I cannot get up and give to you
  - I am unable, after getting up, to give to you
  lexicon: BDAG
  rationale: ἀναστὰς is an attendant participle expressing the action required before
    giving. 'Get up and give you anything' communicates the practical refusal naturally.
    'Anything' is supplied idiomatically in English because the object is implicit
    from context.
