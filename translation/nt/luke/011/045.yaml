id: LUK.11.45
reference: Luke 11:45
source:
  edition: SBLGNT
  text: Ἀποκριθεὶς δέ τις τῶν νομικῶν λέγει αὐτῷ· Διδάσκαλε, ταῦτα λέγων καὶ ἡμᾶς
    ὑβρίζεις.
translation:
  text: Then one of the lawyers answered and said to him, “Teacher, in saying these
    things you insult us also.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “experts in the law.” The Greek term refers to specialists in the Jewish
      law, not necessarily lawyers in the modern professional sense.
    reason: lexical_alternative
  - marker: b
    text: Or “you treat us with contempt also.” The verb can carry the sense of insulting
      or humiliating, not merely causing offense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  - replying
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces a reply in narrative.
    'Answered' is idiomatic in English and preserves the discourse function without
    overtranslating the participial form.
- source_word: δέ
  chosen: Then
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: δέ marks a mild development in the narrative. 'Then' gives natural English
    flow and signals continuation without implying strong contrast.
- source_word: τις τῶν νομικῶν
  chosen: one of the lawyers
  alternatives:
  - one of the experts in the law
  - a legal expert among them
  lexicon: BDAG
  rationale: νομικός in Luke refers to a specialist in the Mosaic law, not a modern
    civil attorney. 'Lawyers' is concise and traditional, while the context in Luke
    makes clear the religious-legal sense. The plural genitive with τις is naturally
    rendered 'one of the lawyers.'
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present (historical present), English narrative commonly
    smooths this to past tense. 'Said to him' fits the surrounding narrative style
    in natural English.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος as a form of address is best rendered 'Teacher' in contemporary
    English. 'Master' can mislead modern readers and carries social connotations not
    primary here.
- source_word: ταῦτα λέγων
  chosen: in saying these things
  alternatives:
  - by saying these things
  - when you say these things
  lexicon: BDAG
  rationale: The participial construction is contemporaneous with the main verb and
    refers to Jesus' just-spoken denunciations. 'In saying these things' is natural
    and preserves the connection between speech and offense.
- source_word: καὶ ἡμᾶς
  chosen: us also
  alternatives:
  - also us
  - even us
  lexicon: BDAG
  rationale: καί here adds the lawyers to those already targeted by Jesus' words.
    'Us also' is idiomatic and preserves the additive force.
- source_word: ὑβρίζεις
  chosen: insult
  alternatives:
  - treat with contempt
  - outrage
  - dishonor
  - offend
  lexicon: BDAG
  rationale: ὑβρίζω denotes insulting, mistreating, or treating arrogantly/contemptuously.
    'Insult' best fits the immediate speech context and is stronger and more precise
    than the weaker English 'offend.'
