theological_decisions:
- issue: Force of Jesus' saying about neutrality toward him
  chosen_reading: A person not aligned with Jesus is presented as being in opposition
    to him; the translation preserves the stark binary without softening it.
  alternative_readings:
  - A softer paraphrase implying mere lack of support
  - A contextual limitation only to exorcism without preserving the general wording
  rationale: The Greek is absolute in form and should remain so. The translation avoids
    importing later doctrinal formulations while preserving the direct claim made
    by Jesus.
  doctrine_reference: Preserve theological tension rather than resolve it.
