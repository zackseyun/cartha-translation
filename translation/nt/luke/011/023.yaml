id: LUK.11.23
reference: Luke 11:23
source:
  edition: SBLGNT
  text: ὁ μὴ ὢν μετ’ ἐμοῦ κατ’ ἐμοῦ ἐστιν, καὶ ὁ μὴ συνάγων μετ’ ἐμοῦ σκορπίζει.
translation:
  text: The one who is not with me is against me, and the one who does not gather
    with me scatters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever is not with me is against me, and whoever does not gather with
      me scatters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ὢν
  chosen: the one who is not
  alternatives:
  - whoever is not
  - he who is not
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by not being with Jesus. 'The one who is not' preserves
    the generic singular force without archaic tone. 'He who is not' would sound dated;
    'whoever is not' is possible but slightly less formally tied to the Greek structure.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: μετά with the genitive commonly denotes association or accompaniment.
    'With me' is the plain and natural rendering, preserving the relational alignment
    implied in the saying.
- source_word: κατ’ ἐμοῦ
  chosen: against me
  alternatives:
  - opposed to me
  lexicon: BDAG
  rationale: κατά with the genitive here expresses opposition. 'Against me' is the
    standard and clearest English equivalent, matching the antithesis with 'with me.'
- source_word: συνάγων
  chosen: gather
  alternatives:
  - bring together
  - collect
  lexicon: BDAG
  rationale: The participle denotes gathering together. 'Gather' is concise, idiomatic,
    and preserves the likely metaphor of assembling rather than dispersing. It also
    pairs well with 'scatters' in the second clause.
- source_word: σκορπίζει
  chosen: scatters
  alternatives:
  - disperses
  lexicon: BDAG
  rationale: σκορπίζω means to scatter or disperse. 'Scatters' is vivid, idiomatic,
    and preserves the contrast with 'gather.'
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  lexicon: BDAG
  rationale: The conjunction simply links the two parallel clauses. 'And' best preserves
    the straightforward coordination and rhetorical parallelism.
