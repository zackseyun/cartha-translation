theological_decisions:
- issue: Address to God as 'Father' without 'our'
  chosen_reading: Father
  alternative_readings:
  - Our Father
  rationale: The Greek text provided reads only Πάτερ. The translation follows the
    source text rather than harmonizing with Matthew 6:9 or later liturgical tradition.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
- issue: Rendering of ἁγιασθήτω τὸ ὄνομά σου
  chosen_reading: may your name be kept holy
  alternative_readings:
  - hallowed be your name
  - may your name be sanctified
  rationale: This preserves the petitionary force and communicates clearly in modern
    English that God's name is to be treated as holy, without implying a change in
    God's intrinsic holiness.
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic
    or academic; Preserve theological tension rather than resolve it.'
