id: LUK.11.2
reference: Luke 11:2
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτοῖς· Ὅταν προσεύχησθε, λέγετε· ⸀Πάτερ, ἁγιασθήτω τὸ ὄνομά σου·
    ἐλθέτω ἡ βασιλεία ⸀σου·
translation:
  text: 'And he said to them, “When you pray, say: ‘Father, may your name be kept
    holy. May your kingdom come.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English traditions read 'Our Father,' influenced by the parallel in
      Matthew 6:9, but the Greek here reads simply 'Father.'
    reason: alternative_reading
  - marker: b
    text: Or 'hallowed be your name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a general temporal condition. 'When' is idiomatic in English
    and fits Jesus' instruction without overemphasizing repetition, though 'whenever'
    is also possible.
- source_word: προσεύχησθε
  chosen: you pray
  alternatives:
  - you are praying
  lexicon: BDAG
  rationale: Present middle subjunctive in a general condition; 'you pray' gives the
    natural English sense of repeated or customary action.
- source_word: λέγετε
  chosen: say
  alternatives:
  - keep saying
  lexicon: BDAG
  rationale: Present imperative can suggest customary action, but in English the simple
    imperative 'say' best conveys the instruction without awkwardness.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - Our Father
  lexicon: BDAG
  rationale: The SBLGNT text here reads simply 'Father,' not 'Our Father.' The shorter
    vocative should be reflected in the main text; the longer traditional form belongs
    to the Matthean parallel, not this verse.
- source_word: ἁγιασθήτω
  chosen: may be kept holy
  alternatives:
  - may be hallowed
  - may be sanctified
  lexicon: BDAG
  rationale: Aorist passive imperative expressing a petition that God's name be regarded
    as holy. 'May be kept holy' is clear modern English and preserves the passive
    sense better than the archaic 'hallowed,' while avoiding the potentially misleading
    'sanctified' as though God's name lacked holiness.
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: BDAG
  rationale: A standard biblical expression referring not merely to the spoken name
    but to God's revealed identity, reputation, and honor. The literal rendering 'your
    name' should be retained, with the fuller sense left implicit as in the source.
- source_word: ἐλθέτω
  chosen: may ... come
  alternatives:
  - let ... come
  lexicon: BDAG
  rationale: Aorist imperative expressing petition. 'May your kingdom come' is natural
    prayer language in English and preserves the volitional force.
- source_word: ἡ βασιλεία σου
  chosen: your kingdom
  alternatives:
  - your reign
  - your kingship
  lexicon: BDAG
  rationale: βασιλεία can denote reign, rule, or kingdom. 'Kingdom' is the established
    and still accurate rendering in Gospel contexts, preserving both the dynamic rule
    of God and its eschatological dimension.
