id: LUK.11.29
reference: Luke 11:29
source:
  edition: SBLGNT
  text: Τῶν δὲ ὄχλων ἐπαθροιζομένων ἤρξατο λέγειν· Ἡ γενεὰ αὕτη ⸀γενεὰ πονηρά ἐστιν·
    σημεῖον ⸀ζητεῖ, καὶ σημεῖον οὐ δοθήσεται αὐτῇ εἰ μὴ τὸ σημεῖον ⸀Ἰωνᾶ.
translation:
  text: As the crowds were gathering, he began to say, “This generation is an evil
    generation. It seeks a sign, and no sign will be given to it except the sign of
    Jonah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wicked generation.'
    reason: lexical_alternative
  - marker: b
    text: '''The sign of Jonah'' may refer to Jonah himself as a sign through his
      prophetic mission, and in light of Gospel parallels may also evoke typological
      connections to Jesus''s death and resurrection.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαθροιζομένων
  chosen: were gathering
  alternatives:
  - were crowding together
  - were increasing in number
  lexicon: BDAG
  rationale: Present participle in the genitive absolute indicates an ongoing action
    concurrent with the main verb. 'Were gathering' is natural English and preserves
    the sense of crowds assembling.
- source_word: ἤρξατο λέγειν
  chosen: began to say
  alternatives:
  - began saying
  lexicon: BDAG
  rationale: A standard inceptive construction. 'Began to say' keeps the aspectual
    force without overinterpreting repeated speech.
- source_word: γενεά
  chosen: generation
  alternatives:
  - people of this age
  lexicon: BDAG
  rationale: '''Generation'' is the normal rendering and preserves the temporal/moral
    corporate sense in Jesus''s saying.'
- source_word: πονηρά
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is direct, readable modern English and fits the moral evaluation
    in context. ''Wicked'' is possible but slightly more traditionalized.'
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miraculous sign
  lexicon: BDAG
  rationale: '''Sign'' is the standard rendering and preserves the Johannine/Synoptic
    theological nuance of a validating wonder without importing ''miraculous'' into
    every occurrence.'
- source_word: ζητεῖ
  chosen: seeks
  alternatives:
  - demands
  - looks for
  lexicon: BDAG
  rationale: The verb literally means 'seeks.' While context implies a demanding posture,
    'seeks' stays closer to the Greek and lets the context carry the negative force.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - shall be given
  lexicon: BDAG
  rationale: Future passive is straightforward. 'Will be given' is contemporary English.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this exclusionary construction after a negated statement, 'except'
    is the most idiomatic and precise English equivalent.
- source_word: τὸ σημεῖον Ἰωνᾶ
  chosen: the sign of Jonah
  alternatives:
  - the sign given by Jonah
  - Jonah's sign
  lexicon: BDAG
  rationale: The genitive is best left somewhat open as 'of Jonah,' preserving the
    phrase as used in the Gospel context and allowing the following verse to clarify
    its sense.
