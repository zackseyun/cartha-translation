theological_decisions:
- issue: Force of Jesus's condemnation of 'this generation'
  chosen_reading: A corporate moral assessment of Jesus's contemporaries, rendered
    without softening.
  alternative_readings:
  - A narrower reference only to specific opponents present
  rationale: The repeated noun phrase 'This generation is an evil generation' emphasizes
    a broad corporate indictment. The translation preserves that force without narrowing
    the referent beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'the sign of Jonah'
  chosen_reading: Retained as an untranslated genitival expression in the main text.
  alternative_readings:
  - A direct reference to Jonah's preaching/repentance
  - A typological reference to Jesus's death and resurrection
  rationale: Luke's immediate context explains the phrase in a particular way, while
    broader Gospel parallels invite typological connections. The main text preserves
    the wording without importing a full interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
