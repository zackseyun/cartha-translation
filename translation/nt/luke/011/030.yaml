theological_decisions:
- issue: Implicit predicate in the second clause
  chosen_reading: 'The translation supplies the implied idea from the first clause:
    ''the Son of Man will be [a sign] to this generation.'''
  alternative_readings:
  - the Son of Man will be to this generation
  - the Son of Man will become a sign to this generation
  rationale: Although σημεῖον is not repeated in Greek, the parallelism strongly implies
    it. Supplying it in English yields a clear and faithful translation without adding
    a new theological claim. 'Will become a sign' is possible, but because ἔσται is
    from εἰμί rather than γίνομαι, 'will be' is closer while still carrying the implied
    predicate.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of 'the Son of Man'
  chosen_reading: Retain the traditional title 'the Son of Man' without interpretive
    expansion.
  alternative_readings:
  - the Human One
  rationale: The phrase is both literal and title-like in the Gospels. Preserving
    the traditional rendering maintains the theological tension and intertextual resonance
    rather than resolving it into a single interpretive paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §3
