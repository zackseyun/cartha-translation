id: LUK.11.30
reference: Luke 11:30
source:
  edition: SBLGNT
  text: καθὼς γὰρ ἐγένετο ⸀Ἰωνᾶς ⸂τοῖς Νινευίταις σημεῖον⸃, οὕτως ἔσται καὶ ὁ υἱὸς
    τοῦ ἀνθρώπου τῇ γενεᾷ ταύτῃ.
translation:
  text: For just as Jonah became a sign to the Ninevites, so also the Son of Man will
    be to this generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'so also the Son of Man will be to this generation';
      the sense 'will be a sign to this generation' is implied by the parallel with
      Jonah.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Combines the explanatory γάρ with the comparative καθώς in natural English
    while preserving the logical connection and comparison.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: BDAG
  rationale: γίνομαι here is ingressive/resultative, indicating Jonah came to function
    as a sign. 'Became' preserves that nuance better than the flatter 'was.'
- source_word: Ἰωνᾶς
  chosen: Jonah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: τοῖς Νινευίταις
  chosen: to the Ninevites
  alternatives:
  - for the Ninevites
  lexicon: BDAG
  rationale: 'The dative is naturally rendered ''to'' here, expressing relation/reference:
    Jonah served as a sign to them. ''For'' is possible but less direct.'
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - an omen
  - a proof
  lexicon: BDAG
  rationale: σημεῖον in Luke commonly denotes a sign with revelatory significance.
    'Sign' is the standard and contextually appropriate rendering.
- source_word: οὕτως
  chosen: so also
  alternatives:
  - so
  - in the same way
  lexicon: BDAG
  rationale: Captures the correlative force with καθώς and the added καί, making the
    parallel explicit in idiomatic English.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - will become
  lexicon: BDAG
  rationale: 'Future of εἰμί is straightforwardly existential/copulative here. English
    idiom supplies the understood predicate relation from the first clause: ''will
    be [a sign].'''
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - —
  lexicon: BDAG
  rationale: Retained as 'also' to reflect the additive force in the comparison rather
    than leaving it untranslated.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established translation of the self-designation/title, preserving both
    the literal wording and its messianic/apocalyptic resonance. It should not be
    flattened to 'the human one' here.
- source_word: τῇ γενεᾷ ταύτῃ
  chosen: to this generation
  alternatives:
  - for this generation
  - to the people of this generation
  lexicon: BDAG
  rationale: Dative of reference/advantage is best rendered 'to this generation.'
    'Generation' preserves the lexical and prophetic force of γενεά in Luke.
