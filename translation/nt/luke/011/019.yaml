theological_decisions:
- issue: Identity of 'your sons'
  chosen_reading: Retain the literal rendering 'your sons' rather than resolving it
    to 'your followers' or 'your disciples.'
  alternative_readings:
  - your followers
  - your disciples
  - your fellow Jews
  rationale: The verse refers to exorcists associated with Jesus' opponents, but the
    Greek says 'your sons.' In keeping with optimal equivalence and the instruction
    to preserve theological tension rather than resolve interpretive ambiguity, the
    literal expression is kept in the main text.
  doctrine_reference: Translation philosophy §§3–4
