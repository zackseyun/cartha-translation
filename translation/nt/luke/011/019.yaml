id: LUK.11.19
reference: Luke 11:19
source:
  edition: SBLGNT
  text: εἰ δὲ ἐγὼ ἐν Βεελζεβοὺλ ἐκβάλλω τὰ δαιμόνια, οἱ υἱοὶ ὑμῶν ἐν τίνι ἐκβάλλουσιν;
    διὰ τοῦτο ⸂αὐτοὶ ὑμῶν κριταὶ⸃ ἔσονται.
translation:
  text: But if I cast out the demons by Beelzebul, by whom do your sons cast them
    out? Therefore they will be your judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by what' or 'by what power' do your sons cast them out?
    reason: lexical_alternative
  - marker: b
    text: Or 'they themselves will be your judges,' preserving the emphasis of the
      Greek pronoun.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - And if
  lexicon: BDAG
  rationale: δέ is mildly adversative here, continuing Jesus' rebuttal; 'But if' preserves
    the argumentative contrast better than a simple 'and if.'
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained in English because it contributes to
    the contrast in Jesus' argument, though English does not need extra emphasis beyond
    normal word order.
- source_word: ἐν Βεελζεβοὺλ
  chosen: by Beelzebul
  alternatives:
  - in Beelzebul
  - by the power of Beelzebul
  lexicon: BDAG
  rationale: In this context ἐν with a personal agent/instrument is best rendered
    instrumentally as 'by.' 'Beelzebul' is transliterated as a proper name per translation
    philosophy. 'By the power of' is interpretive and expands beyond the Greek.
- source_word: ἐκβάλλω τὰ δαιμόνια
  chosen: cast out the demons
  alternatives:
  - drive out the demons
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts commonly means 'cast out' or 'drive out.'
    'Cast out' preserves established exorcism language without becoming archaic, and
    τὰ δαιμόνια is best rendered 'the demons,' referring to demonic spirits rather
    than generic evil influences.
- source_word: οἱ υἱοὶ ὑμῶν
  chosen: your sons
  alternatives:
  - your followers
  - your people
  lexicon: BDAG
  rationale: The literal sense of υἱοί is 'sons.' While some interpret this idiomatically
    as disciples or fellow Jews, the Greek expression is straightforward and should
    remain gender-accurate and formally transparent. Broader interpretive possibilities
    are better handled in notes, not the main text.
- source_word: ἐν τίνι
  chosen: by whom
  alternatives:
  - by what
  - by what power
  lexicon: BDAG
  rationale: The dative interrogative with ἐν here asks for the agency or means by
    which exorcisms are performed. Because the comparison is with Beelzebul, a personal
    referent, 'by whom' best matches the rhetorical force. 'By what power' is possible
    but more interpretive.
- source_word: ἐκβάλλουσιν
  chosen: cast them out
  alternatives:
  - drive them out
  lexicon: BDAG
  rationale: The verb repeats ἐκβάλλω from the first clause; 'cast out' maintains
    lexical consistency. The object 'them' is supplied naturally in English from the
    prior mention of demons.
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: This inferential phrase introduces Jesus' conclusion from the rhetorical
    question. 'Therefore' is concise and natural.
- source_word: αὐτοὶ ὑμῶν κριταὶ ἔσονται
  chosen: they will be your judges
  alternatives:
  - they themselves will be your judges
  lexicon: BDAG
  rationale: The predicate construction means 'they will be your judges.' The pronoun
    αὐτοί adds emphasis, but English can convey the sense adequately without 'themselves'
    in the main text; the more emphatic alternative is preserved as a lexical alternative.
