id: LUK.11.27
reference: Luke 11:27
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ λέγειν αὐτὸν ταῦτα ἐπάρασά τις ⸂φωνὴν γυνὴ⸃ ἐκ τοῦ ὄχλου
    εἶπεν αὐτῷ· Μακαρία ἡ κοιλία ἡ βαστάσασά σε καὶ μαστοὶ οὓς ἐθήλασας·
translation:
  text: And it happened, as he was saying these things, that a woman from the crowd
    raised her voice and said to him, “Blessed is the womb that carried you, and the
    breasts that nursed you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lifted up her voice.' The Greek idiom means 'raised her voice' or 'cried
      out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that bore you.' The Greek verb can mean 'carried' or 'bore' in the sense
      of pregnancy and childbirth.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: BDAG
  rationale: Retains Luke’s narrative transition formula without archaic diction.
    'And it happened' preserves the event-marking force better than omitting it.
- source_word: ἐν τῷ λέγειν αὐτὸν ταῦτα
  chosen: as he was saying these things
  alternatives:
  - while he was saying these things
  - when he said these things
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous action. 'As
    he was saying' best captures the ongoing sense; 'these things' preserves the demonstrative.
- source_word: ἐπάρασά τις φωνὴν γυνὴ
  chosen: a woman ... raised her voice
  alternatives:
  - a certain woman ... lifted up her voice
  - a woman ... cried out
  lexicon: BDAG
  rationale: The idiom ἐπαίρω φωνήν means to raise/lift one's voice. 'Raised her voice'
    is natural modern English and preserves the idiomatic sense. τις is rendered indefinitely
    as 'a woman' rather than woodenly 'a certain woman.'
- source_word: ἐκ τοῦ ὄχλου
  chosen: from the crowd
  alternatives:
  - out of the crowd
  lexicon: BDAG
  rationale: Straightforward spatial/source expression; 'from the crowd' is idiomatic
    English.
- source_word: Μακαρία
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: μακάριος in beatitude-like contexts carries a sense of favored or blessed
    status before God, not mere subjective happiness. 'Blessed' preserves the biblical
    register.
- source_word: ἡ κοιλία
  chosen: the womb
  alternatives:
  - the belly
  lexicon: BDAG
  rationale: In this maternal context κοιλία refers specifically to the womb. 'Womb'
    is more precise than the broader 'belly.'
- source_word: ἡ βαστάσασά σε
  chosen: that carried you
  alternatives:
  - that bore you
  - that carried you in the womb
  lexicon: BDAG
  rationale: βαστάζω here refers to bearing/carrying in pregnancy. 'Carried you' is
    clear modern English; 'bore you' is possible but slightly less transparent to
    contemporary readers.
- source_word: μαστοὶ
  chosen: the breasts
  alternatives:
  - the breasts of the mother
  lexicon: BDAG
  rationale: Literal anatomical term; no euphemism is needed, and the maternal image
    should remain concrete as in the Greek.
- source_word: οὓς ἐθήλασας
  chosen: that nursed you
  alternatives:
  - which you sucked
  - that you suckled from
  lexicon: BDAG
  rationale: The Greek verb refers to nursing/suckling. English idiom naturally expresses
    the relation as 'the breasts that nursed you,' preserving the meaning without
    awkward literalism.
