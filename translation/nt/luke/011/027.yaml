theological_decisions:
- issue: Rendering of μακαρία in a saying that honors Jesus' mother
  chosen_reading: Blessed is the womb that carried you, and the breasts that nursed
    you.
  alternative_readings:
  - Happy is the womb...
  - Fortunate is the womb...
  rationale: The verse records a woman's exclamation honoring the mother of Jesus,
    but the translation should neither diminish nor amplify Marian significance beyond
    the text. 'Blessed' accurately reflects μακαρία and preserves the statement's
    honorific force without importing later doctrinal formulations.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
