theological_decisions:
- issue: Referent of 'unclean spirit'
  chosen_reading: Rendered as 'the unclean spirit,' preserving the text's presentation
    of a personal evil spirit without reduction to mere metaphor.
  alternative_readings:
  - a metaphor for moral relapse
  - an impersonal force
  rationale: The Gospel context treats unclean spirits as personal agents that speak,
    depart, and return. The translation should not demythologize the text or import
    a non-personal reading.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Gender rendering of ἀνθρώπου
  chosen_reading: Rendered 'the man' rather than 'the person.'
  alternative_readings:
  - the person
  - someone
  rationale: The Greek is grammatically masculine singular and functions as a representative
    case. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing.
  doctrine_reference: 'Translation philosophy #4'
