id: LUK.11.24
reference: Luke 11:24
source:
  edition: SBLGNT
  text: Ὅταν τὸ ἀκάθαρτον πνεῦμα ἐξέλθῃ ἀπὸ τοῦ ἀνθρώπου, διέρχεται δι’ ἀνύδρων τόπων
    ζητοῦν ἀνάπαυσιν, καὶ μὴ ⸀εὑρίσκον λέγει· Ὑποστρέψω εἰς τὸν οἶκόν μου ὅθεν ἐξῆλθον·
translation:
  text: When the unclean spirit has gone out from the man, it passes through waterless
    places seeking rest, and not finding any, it says, ‘I will return to my house,
    from which I came out.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dry places.' The Greek literally refers to waterless places.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a general temporal condition with subjunctive ἐξέλθῃ. 'When'
    is natural English and fits the illustrative saying; 'whenever' is possible but
    more repetitive in English.
- source_word: ἀκάθαρτον πνεῦμα
  chosen: the unclean spirit
  alternatives:
  - the impure spirit
  lexicon: BDAG
  rationale: Standard NT expression for a demonic spirit. 'Unclean' preserves the
    moral/ritual impurity nuance better than the flatter 'impure' and matches Gospel
    usage consistently.
- source_word: ἐξέλθῃ
  chosen: has gone out
  alternatives:
  - goes out
  - comes out
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ὅταν is well rendered in English by present
    perfect in a temporal clause: ''has gone out.'' ''Comes out'' is possible, but
    ''gone out'' better matches the deictic sense from the man''s perspective and
    pairs with later ''return.'''
- source_word: ἀπὸ τοῦ ἀνθρώπου
  chosen: from the man
  alternatives:
  - from a man
  - from the person
  lexicon: BDAG
  rationale: The article is present, and the saying depicts a representative case.
    Per gender-accurate policy, 'man' is retained rather than neutralizing to 'person';
    the phrase is generic but grammatically masculine singular.
- source_word: διέρχεται
  chosen: it passes through
  alternatives:
  - it goes through
  - it travels through
  lexicon: BDAG
  rationale: '''Passes through'' is a natural rendering of the middle/passive-form
    verb here and preserves the sense of moving through a region.'
- source_word: δι’ ἀνύδρων τόπων
  chosen: through waterless places
  alternatives:
  - through dry places
  - through arid regions
  lexicon: BDAG
  rationale: '''Waterless'' is slightly more literal than traditional ''dry'' and
    preserves the imagery of desolation without overinterpreting. ''Places'' matches
    τόπων straightforwardly.'
- source_word: ζητοῦν ἀνάπαυσιν
  chosen: seeking rest
  alternatives:
  - looking for rest
  lexicon: BDAG
  rationale: Participial phrase expressing purpose or attendant circumstance. 'Seeking
    rest' is concise and preserves the lexical connection to ἀνάπαυσις.
- source_word: καὶ μὴ εὑρίσκον
  chosen: and not finding any
  alternatives:
  - and finding none
  - but not finding any
  lexicon: BDAG
  rationale: The participle continues the narrative flow. 'Any' is supplied idiomatically
    in English to complete the object implied from 'rest.'
- source_word: λέγει
  chosen: it says
  alternatives:
  - it said
  lexicon: BDAG
  rationale: Historical present in Greek is best preserved here with English present
    for vividness and narrative immediacy.
- source_word: Ὑποστρέψω
  chosen: I will return
  alternatives:
  - I will go back
  lexicon: BDAG
  rationale: Future verb expressing resolve. 'Return' is more formal and matches the
    thematic repetition of departure and re-entry.
- source_word: εἰς τὸν οἶκόν μου
  chosen: to my house
  alternatives:
  - into my house
  - to my home
  lexicon: BDAG
  rationale: '''House'' preserves the metaphorical image used in the saying and aligns
    with the following verse''s description of the house. ''Home'' would soften the
    concrete metaphor.'
- source_word: ὅθεν ἐξῆλθον
  chosen: from which I came out
  alternatives:
  - from which I went out
  - where I came from
  lexicon: BDAG
  rationale: Keeps the relative construction explicit and echoes the earlier ἐξέλθῃ.
    'Came out' is idiomatic in direct speech and preserves the exit imagery.
