theological_decisions:
- issue: Identity/reference of Zechariah and the scope of Jesus' indictment
  chosen_reading: The verse is translated without identifying which Zechariah is meant,
    and 'this generation' is left as the generation addressed by Jesus, without importing
    a broader theological system.
  alternative_readings:
  - Zechariah son of Jehoiada
  - Zechariah son of Berechiah
  - a representative prophetic martyr figure
  rationale: The Greek text names Zechariah but does not further identify him here.
    The translation should not resolve a debated historical identification in the
    main text. Likewise, 'this generation' should remain as stated, preserving the
    text's own rhetoric of covenantal/judicial accountability without extending or
    narrowing it doctrinally beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
