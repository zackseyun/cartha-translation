id: LUK.11.51
reference: Luke 11:51
source:
  edition: SBLGNT
  text: ⸀ἀπὸ αἵματος Ἅβελ ⸀ἕως αἵματος Ζαχαρίου τοῦ ἀπολομένου μεταξὺ τοῦ θυσιαστηρίου
    καὶ τοῦ οἴκου· ναί, λέγω ὑμῖν, ἐκζητηθήσεται ἀπὸ τῆς γενεᾶς ταύτης.
translation:
  text: from the blood of Abel to the blood of Zechariah, who perished between the
    altar and the house. Yes, I tell you, it will be required from this generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the altar and the temple'; Greek literally, 'between the altar
      and the house.'
    reason: lexical_alternative
  - marker: b
    text: The Zechariah mentioned here is debated; possibilities include Zechariah
      son of Jehoiada (2 Chronicles 24:20–22) or Zechariah son of Berechiah.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπὸ αἵματος Ἅβελ
  chosen: from the blood of Abel
  alternatives:
  - from Abel's blood
  lexicon: BDAG
  rationale: Retains the genitive construction with αἷμα and the preposition ἀπό in
    a natural but still fairly formal English rendering. 'Blood of Abel' preserves
    the idiomatic biblical sense of bloodshed/guilt.
- source_word: ἕως αἵματος Ζαχαρίου
  chosen: to the blood of Zechariah
  alternatives:
  - to Zechariah's blood
  - as far as the blood of Zechariah
  lexicon: BDAG
  rationale: Pairs naturally with the opening 'from the blood of Abel' to preserve
    the rhetorical range. 'To' is smoother than 'until' here in English while keeping
    the sense of extent.
- source_word: τοῦ ἀπολομένου
  chosen: who perished
  alternatives:
  - who was killed
  - who was destroyed
  lexicon: BDAG
  rationale: The middle participle of ἀπόλλυμι can denote perishing or being killed.
    'Who perished' preserves the Greek wording without over-specifying agency in the
    main text, while the context clearly implies violent death.
- source_word: μεταξὺ τοῦ θυσιαστηρίου καὶ τοῦ οἴκου
  chosen: between the altar and the house
  alternatives:
  - between the altar and the temple
  - between the altar and the sanctuary
  lexicon: BDAG
  rationale: οἶκος literally means 'house.' In this temple context it refers to the
    house of God/temple building, but 'house' preserves the source wording and echoes
    biblical idiom. The more explicit 'temple' is preserved in a footnote as a contextual
    alternative.
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  - Certainly
  lexicon: BDAG
  rationale: Captures the emphatic affirmation naturally in modern English and fits
    Jesus' solemn pronouncement.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard idiomatic rendering that remains close to the Greek while
    sounding natural in contemporary English.
- source_word: ἐκζητηθήσεται
  chosen: it will be required
  alternatives:
  - it will be demanded
  - it will be exacted
  - it will be sought out
  lexicon: BDAG
  rationale: In this context of bloodguilt and divine reckoning, the passive conveys
    that accountability will be exacted. 'It will be required' is idiomatic and preserves
    the judicial sense without adding an explicit subject.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  chosen: from this generation
  alternatives:
  - of this generation
  - from among this generation
  lexicon: BDAG
  rationale: Preserves the preposition ἀπό and the concrete force of γενεά as the
    contemporaneous generation held accountable.
