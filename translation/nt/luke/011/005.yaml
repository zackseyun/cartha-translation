id: LUK.11.5
reference: Luke 11:5
source:
  edition: SBLGNT
  text: Καὶ εἶπεν πρὸς αὐτούς· Τίς ἐξ ὑμῶν ἕξει φίλον καὶ πορεύσεται πρὸς αὐτὸν μεσονυκτίου
    καὶ εἴπῃ αὐτῷ· Φίλε, χρῆσόν μοι τρεῖς ἄρτους,
translation:
  text: And he said to them, “Which of you will have a friend and will go to him at
    midnight and say to him, ‘Friend, lend me three loaves,’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Who among you has a friend and goes to him at midnight…” The Greek uses
      future forms in a rhetorical question, which may be rendered more idiomatically
      in English with present tense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἐξ ὑμῶν
  chosen: Which of you
  alternatives:
  - Who among you
  lexicon: BDAG
  rationale: Introduces a rhetorical question addressed to the audience. 'Which of
    you' is idiomatic English for this construction and preserves the direct challenge
    better than a flatter 'who among you.'
- source_word: ἕξει
  chosen: will have
  alternatives:
  - has
  lexicon: BDAG
  rationale: 'Future indicative is retained. In this rhetorical setup, English can
    naturally keep the future: ''will have a friend and will go…'' rather than smoothing
    to present tense.'
- source_word: φίλον / Φίλε
  chosen: friend
  alternatives:
  - companion
  lexicon: BDAG
  rationale: Standard and natural rendering for both the accusative noun and vocative
    address. Using the same English term preserves the lexical repetition in Greek.
- source_word: πορεύσεται πρὸς αὐτόν
  chosen: will go to him
  alternatives:
  - will go over to him
  - will make his way to him
  lexicon: BDAG
  rationale: Simple motion verb rendered plainly in readable modern English without
    adding nuance not explicit in the Greek.
- source_word: μεσονυκτίου
  chosen: at midnight
  alternatives:
  - in the middle of the night
  lexicon: BDAG
  rationale: The genitive functions adverbially/temporally. 'At midnight' is the most
    direct and idiomatic equivalent; the longer alternative is interpretive rather
    than necessary.
- source_word: εἴπῃ αὐτῷ
  chosen: say to him
  alternatives:
  - tell him
  lexicon: BDAG
  rationale: Subjunctive after the rhetorical setup is well represented by English
    future sequence 'and say to him.' 'Tell' would be less formally aligned with λέγω.
- source_word: χρῆσόν μοι
  chosen: lend me
  alternatives:
  - loan me
  - provide me with
  lexicon: BDAG
  rationale: In context the aorist imperative ζητά a temporary provision from a neighbor;
    'lend me' best captures the social and transactional sense in natural English.
    'Provide me with' is too broad, and 'loan me' is less idiomatic here.
- source_word: τρεῖς ἄρτους
  chosen: three loaves
  alternatives:
  - three bread loaves
  - three pieces of bread
  lexicon: BDAG
  rationale: ἄρτους refers to loaves of bread in ordinary usage. 'Three loaves' is
    concise and idiomatic; 'pieces of bread' would undertranslate the noun.
