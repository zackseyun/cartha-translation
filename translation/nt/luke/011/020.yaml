id: LUK.11.20
reference: Luke 11:20
source:
  edition: SBLGNT
  text: εἰ δὲ ἐν δακτύλῳ ⸀θεοῦ ἐκβάλλω τὰ δαιμόνια, ἄρα ἔφθασεν ἐφ’ ὑμᾶς ἡ βασιλεία
    τοῦ θεοῦ.
translation:
  text: But if I cast out the demons by the finger of God, then the kingdom of God
    has come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the finger of God.' The phrase is an idiom for God's direct power
      and echoes Exodus 8:19.
    reason: lexical_alternative
  - marker: b
    text: Or 'has overtaken you' or 'has reached you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν δακτύλῳ θεοῦ
  chosen: by the finger of God
  alternatives:
  - with the finger of God
  lexicon: BDAG
  rationale: The idiom denotes agency/instrumentality. 'By the finger of God' is natural
    English and preserves the vivid metaphor and likely allusion to God's direct power
    (cf. Exod 8:19; Luke's parallel to Matt 12:28 differs here).
- source_word: ἐκβάλλω
  chosen: cast out
  alternatives:
  - drive out
  lexicon: BDAG
  rationale: Standard exorcism language in the Gospels. 'Cast out' is both idiomatic
    and consistent with common NT usage, without becoming archaic in this context.
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  - unclean spirits
  lexicon: BDAG
  rationale: The article is retained naturally in English. 'Demons' is the direct
    lexical equivalent of δαιμόνια; 'unclean spirits' would translate a different
    expression.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks an inference from the conditional clause. 'Then' is concise and
    natural in English while preserving the logical force.
- source_word: ἔφθασεν ἐφ’ ὑμᾶς
  chosen: has come upon you
  alternatives:
  - has overtaken you
  - has reached you
  lexicon: BDAG
  rationale: The aorist with ἐπί here conveys arrival/reaching in a decisive sense.
    'Has come upon you' preserves both the completed force and the directional nuance
    toward the hearers. 'Has overtaken you' is possible but sounds more adversative
    than the context requires.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering that preserves both the concrete and
    dynamic aspects of βασιλεία. 'Reign of God' highlights rule but is less idiomatic
    here; 'kingdom of God' remains the best optimal-equivalence choice.
