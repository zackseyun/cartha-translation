theological_decisions:
- issue: Meaning of 'the finger of God'
  chosen_reading: A metaphor for God's direct power/agency in Jesus' exorcisms, left
    as an image rather than interpreted in the translation.
  alternative_readings:
  - A specific reference to the Holy Spirit by comparison with Matt 12:28
  rationale: Luke's wording should be translated as written, preserving the biblical
    image and intertextual resonance without collapsing it into Matthew's wording.
    The translation avoids importing an interpretive gloss into the main text while
    remaining fully compatible with orthodox Trinitarian doctrine.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Force of 'the kingdom of God has come upon you'
  chosen_reading: The verse declares the present arrival/inbreaking of God's kingdom
    in Jesus' ministry.
  alternative_readings:
  - The kingdom is only future
  - The phrase is purely condemnatory ('has overtaken you')
  rationale: The Greek indicates realized arrival in the present context of exorcism.
    The wording preserves that inaugurated-kingdom sense without over-specifying a
    full eschatological system.
  doctrine_reference: Affirmations; Translation philosophy §3
