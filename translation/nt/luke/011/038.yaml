id: LUK.11.38
reference: Luke 11:38
source:
  edition: SBLGNT
  text: ὁ δὲ Φαρισαῖος ἰδὼν ἐθαύμασεν ὅτι οὐ πρῶτον ἐβαπτίσθη πρὸ τοῦ ἀρίστου.
translation:
  text: But the Pharisee, when he saw it, was astonished that he had not first washed
    before the meal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not first performed the ceremonial washing before the meal.' The
      Greek verb is the same one often used for 'baptize,' but here it refers to ritual
      washing in the context of Pharisaic purity practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild narrative contrast or development from the previous verse.
    'But' fits the Pharisee's reaction to Jesus' action and reads naturally in English.
- source_word: Φαρισαῖος
  chosen: the Pharisee
  lexicon: BDAG
  rationale: Standard rendering of the group designation; the article is preserved
    naturally in English.
- source_word: ἰδὼν
  chosen: when he saw it
  alternatives:
  - seeing this
  - having seen
  lexicon: BDAG
  rationale: Aorist participle giving attendant circumstance prior to the main verb.
    'When he saw it' makes the temporal relation clear and supplies the implied object
    from context in idiomatic English.
- source_word: ἐθαύμασεν
  chosen: was astonished
  alternatives:
  - marveled
  - was amazed
  lexicon: BDAG
  rationale: Conveys surprised reaction. 'Was astonished' better captures the Pharisee's
    startled disapproval in context than the somewhat archaic 'marveled.'
- source_word: οὐ πρῶτον
  chosen: had not first
  alternatives:
  - did not first
  - not first
  lexicon: BDAG
  rationale: The adverb πρῶτον modifies the action as something expected prior to
    eating. English past perfect fits the sequence naturally after the Pharisee's
    observation.
- source_word: ἐβαπτίσθη
  chosen: washed
  alternatives:
  - washed himself
  - performed a washing
  - was baptized
  lexicon: BDAG
  rationale: In this context the verb refers to ritual washing before a meal, not
    Christian baptism. 'Washed' is the clearest contextual rendering; 'washed himself'
    is possible but unnecessarily explicit in English.
- source_word: πρὸ τοῦ ἀρίστου
  chosen: before the meal
  alternatives:
  - before lunch
  - before the midday meal
  lexicon: BDAG
  rationale: ἄριστον commonly refers to a meal, often the morning or midday meal.
    'Before the meal' preserves the sense without over-specifying time in a way the
    context does not require.
