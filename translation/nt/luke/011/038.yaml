theological_decisions:
- issue: Meaning of ἐβαπτίσθη in a Pharisaic dining context
  chosen_reading: ritual washing before eating, rendered 'washed'
  alternative_readings:
  - was baptized
  - immersed himself
  rationale: The immediate context is Pharisaic concern over purity customs before
    a meal, not sacramental baptism. Rendering with 'washed' avoids importing later
    Christian theological associations foreign to the scene.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it only where genuine
    ambiguity exists.'
