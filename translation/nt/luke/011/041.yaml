theological_decisions:
- issue: Interpretation of τὰ ἐνόντα in relation to purity and almsgiving
  chosen_reading: 'an inward moral sense: ''the things that are within'''
  alternative_readings:
  - '''what you have'' referring to possessions'
  rationale: The immediate context contrasts the outside and inside of the cup and
    dish (Luke 11:39), so an inward reading preserves the rhetorical and moral force
    of Jesus' rebuke without flattening it into a merely economic statement. At the
    same time, because the phrase has been understood by many as 'what you have,'
    that alternative is preserved in a footnote rather than excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
