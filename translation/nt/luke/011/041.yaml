id: LUK.11.41
reference: Luke 11:41
source:
  edition: SBLGNT
  text: πλὴν τὰ ἐνόντα δότε ἐλεημοσύνην, καὶ ἰδοὺ πάντα καθαρὰ ὑμῖν ἐστιν.
translation:
  text: But give as alms the things that are within, and behold, everything is clean
    for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'give as alms what you have.' The Greek phrase can be understood as
      referring either to what is inside or to one's possessions on hand.
    reason: alternative_reading
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Rather
  lexicon: BDAG
  rationale: Introduces a corrective contrast to the preceding discussion of external
    cleansing. 'But' is concise modern English and preserves the adversative force.
- source_word: τὰ ἐνόντα
  chosen: the things that are within
  alternatives:
  - what is inside
  - the inner things
  - what you have
  lexicon: BDAG
  rationale: This phrase is the crux of the verse. Literally it refers to 'the things
    being within.' In context, after criticism of cleansing the outside of cup and
    dish while the inside is full of greed and wickedness (v. 39), an inward sense
    fits best. 'The things that are within' preserves the Greek form and the contextual
    contrast with outward ritual purity. 'What you have' is a known interpretive alternative,
    likely taking the phrase as possessions on hand, but it is less directly tied
    to the immediate context and is therefore preserved in a footnote rather than
    adopted in the main text.
- source_word: δότε
  chosen: give
  alternatives:
  - give away
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action. 'Give' is the natural
    English imperative and does not over-interpret the aspect.
- source_word: ἐλεημοσύνην
  chosen: as alms
  alternatives:
  - alms
  - to the poor
  - charity
  lexicon: BDAG
  rationale: The noun denotes charitable giving, especially almsgiving. Rendering
    it with 'as alms' allows the construction 'give ... as alms' to reflect the Greek
    syntax. 'Charity' is broader and can sound abstract; 'to the poor' imports an
    object not stated explicitly.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Marks an emphatic result or attention-getter. 'Behold' preserves the
    rhetorical force without paraphrase, though slightly elevated; it remains understandable
    in modern English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'Everything' is idiomatic modern
    English.
- source_word: καθαρὰ
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: In this context the term relates to purity/cleanness in the dispute over
    ritual washing. 'Clean' best preserves the connection to the preceding concern
    about cleansing vessels.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: 'The dative is best taken as reference or advantage: things are clean
    with respect to them / for them. ''For you'' is more idiomatic than ''to you''
    in English.'
