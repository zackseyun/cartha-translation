theological_decisions:
- issue: Whether to make the stronger figure explicitly 'a stronger man' and thereby
    tie the imagery more directly to the preceding parable context.
  chosen_reading: Keep the wording as 'one stronger than he' without adding 'man'
    in the main text.
  alternative_readings:
  - a stronger man than he
  rationale: The Greek here uses a comparative adjective substantivally without an
    explicit noun. Since the previous verse already supplies the imagery of the strong
    man, the referent is clear enough without adding a noun not present in this clause.
    This preserves the text's wording while allowing the broader context to inform
    interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: How strongly to render νικάω in this conflict image.
  chosen_reading: Render as 'overpowers him.'
  alternative_readings:
  - defeats him
  - conquers him
  rationale: The verse depicts not merely abstract victory but the practical subduing
    that results in disarmament and seizure of goods. 'Overpowers' best preserves
    that concrete narrative force without importing extra theological interpretation
    about Satan or exorcism beyond the immediate image.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
