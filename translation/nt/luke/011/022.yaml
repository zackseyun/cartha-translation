id: LUK.11.22
reference: Luke 11:22
source:
  edition: SBLGNT
  text: ἐπὰν ⸀δὲ ἰσχυρότερος ⸀αὐτοῦ ἐπελθὼν νικήσῃ αὐτόν, τὴν πανοπλίαν αὐτοῦ αἴρει
    ἐφ’ ᾗ ἐπεποίθει, καὶ τὰ σκῦλα αὐτοῦ διαδίδωσιν.
translation:
  text: But when one stronger than he comes upon him and overpowers him, he takes
    away his full armor, on which he had relied, and distributes his plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defeats him' or 'conquers him.'
    reason: lexical_alternative
  - marker: b
    text: '''Full armor'' translates a term for a complete set of armor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his spoils.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὰν δὲ
  chosen: But when
  alternatives:
  - But whenever
  - Yet when
  lexicon: BDAG
  rationale: Renders the conditional-temporal force naturally in English, with δέ
    marking contrast from the previous scenario.
- source_word: ἰσχυρότερος αὐτοῦ
  chosen: one stronger than he
  alternatives:
  - someone stronger than him
  - a stronger man than he
  lexicon: BDAG
  rationale: The comparative adjective with implied substantive is best represented
    by 'one stronger than he.' 'Man' is possible from context (cf. prior verse) but
    is not explicit here, so the translation avoids adding a noun unnecessarily.
- source_word: ἐπελθὼν
  chosen: comes upon him
  alternatives:
  - attacks him
  - comes against him
  lexicon: BDAG
  rationale: The participle denotes coming upon/against someone. 'Comes upon him'
    preserves the imagery without over-interpreting it as a military attack, though
    the context is conflict.
- source_word: νικήσῃ αὐτόν
  chosen: overpowers him
  alternatives:
  - defeats him
  - conquers him
  lexicon: BDAG
  rationale: In this immediate context of a stronger assailant disarming another,
    'overpowers' communicates the concrete sense well in modern English. 'Defeats'
    and 'conquers' are viable but slightly less vivid for the scene.
- source_word: τὴν πανοπλίαν αὐτοῦ
  chosen: his full armor
  alternatives:
  - his armor
  - his panoply
  lexicon: BDAG
  rationale: πανοπλία refers to the complete set of armor. 'Full armor' preserves
    that completeness better than simply 'armor' while remaining readable.
- source_word: αἴρει
  chosen: he takes away
  alternatives:
  - he removes
  - he carries off
  lexicon: BDAG
  rationale: 'A straightforward rendering of αἴρω in context: the stronger one removes
    the armor from the defeated man.'
- source_word: ἐφ’ ᾗ ἐπεποίθει
  chosen: on which he had relied
  alternatives:
  - in which he had trusted
  - on which he had been confident
  lexicon: BDAG
  rationale: The imperfect of πείθω in the perfective sense conveys settled reliance
    in past time. 'Relied' is idiomatic with the preposition 'on' and fits the military
    metaphor.
- source_word: τὰ σκῦλα αὐτοῦ
  chosen: his plunder
  alternatives:
  - his spoil
  - his spoils
  lexicon: BDAG
  rationale: σκῦλα denotes spoils taken from a defeated enemy. 'Plunder' is clear
    modern English; 'spoils' is also possible but slightly more traditional.
- source_word: διαδίδωσιν
  chosen: distributes
  alternatives:
  - divides
  - hands out
  lexicon: BDAG
  rationale: The verb means to distribute or apportion. 'Distributes' preserves the
    sense of dividing the spoils among others.
