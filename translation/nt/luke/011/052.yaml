id: LUK.11.52
reference: Luke 11:52
source:
  edition: SBLGNT
  text: οὐαὶ ὑμῖν τοῖς νομικοῖς, ὅτι ἤρατε τὴν κλεῖδα τῆς γνώσεως· αὐτοὶ οὐκ εἰσήλθατε
    καὶ τοὺς εἰσερχομένους ἐκωλύσατε.
translation:
  text: Woe to you lawyers, because you took away the key of knowledge; you yourselves
    did not enter, and you hindered those who were entering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'experts in the law.' The term refers to specialists in the Jewish law,
      not modern civil attorneys.
    reason: lexical_alternative
  - marker: b
    text: Or 'the key to knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation force of οὐαί better than softer English
    options.
- source_word: νομικοῖς
  chosen: lawyers
  alternatives:
  - experts in the law
  - legal scholars
  lexicon: BDAG
  rationale: Refers to specialists in the Mosaic law, not modern attorneys. 'Lawyers'
    is concise and traditional, while the context makes clear the religious setting;
    an alternative is preserved in a footnote for clarity.
- source_word: ἤρατε
  chosen: took away
  alternatives:
  - took
  - removed
  lexicon: BDAG
  rationale: The verb αἴρω here conveys removal rather than mere carrying. 'Took away'
    best fits the image of depriving others of access.
- source_word: κλεῖδα τῆς γνώσεως
  chosen: the key of knowledge
  alternatives:
  - the key to knowledge
  lexicon: BDAG
  rationale: A close rendering of the genitive construction that preserves the metaphor.
    'Of knowledge' is slightly more formal and mirrors the Greek structure, while
    'to knowledge' is a natural English alternative.
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'yourselves' preserves the contrast and accusation.
- source_word: οὐκ εἰσήλθατε
  chosen: did not enter
  alternatives:
  - did not go in
  lexicon: BDAG
  rationale: Keeps the entrance metaphor concise and natural in English without overinterpreting
    what is being entered.
- source_word: τοὺς εἰσερχομένους
  chosen: those who were entering
  alternatives:
  - those entering
  - the ones trying to enter
  lexicon: BDAG
  rationale: The present participle suggests ongoing action; 'were entering' captures
    the progressive sense without adding unwarranted nuance like 'trying'.
- source_word: ἐκωλύσατε
  chosen: hindered
  alternatives:
  - prevented
  - stopped
  lexicon: BDAG
  rationale: Conveys obstruction without overstating the result. 'Prevented' is possible,
    but 'hindered' better matches the verb's broad sense and preserves the image of
    blocking access.
