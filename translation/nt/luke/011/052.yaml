theological_decisions:
- issue: Metaphorical referent of 'enter' and 'key of knowledge'
  chosen_reading: Retained the access/entrance metaphor without specifying 'the kingdom'
    in the main text.
  alternative_readings:
  - understood as entering the kingdom of God
  - understood as entering into true knowledge of God
  rationale: The immediate Greek does not explicitly name the object of entry. Preserving
    the metaphor avoids importing a doctrinally specific explanation the verse itself
    leaves implicit, while allowing readers to infer the broader salvific and revelatory
    context from Luke's narrative.
  doctrine_reference: Translation philosophy §1, §3
