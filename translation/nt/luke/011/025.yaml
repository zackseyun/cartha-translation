id: LUK.11.25
reference: Luke 11:25
source:
  edition: SBLGNT
  text: καὶ ἐλθὸν ⸀εὑρίσκει σεσαρωμένον καὶ κεκοσμημένον.
translation:
  text: And when it comes, it finds it swept clean and put in order.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swept out and adorned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὸν
  chosen: when it comes
  alternatives:
  - having come
  - and coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, referring to the returning unclean spirit
    from the previous verse. Rendered temporally in smooth English as 'when it comes'
    rather than the more wooden 'having come.' The neuter participle agrees with the
    spirit as grammatically neuter.
- source_word: εὑρίσκει
  chosen: it finds
  alternatives:
  - he finds
  - finds
  lexicon: BDAG
  rationale: Present indicative gives vivid narrative force ('it finds'). The subject
    is the unclean spirit, grammatically neuter in Greek, so 'it' is appropriate in
    English.
- source_word: σεσαρωμένον
  chosen: swept clean
  alternatives:
  - swept
  - swept out
  lexicon: BDAG
  rationale: Perfect passive participle of σαρόω, describing the house as having been
    swept and remaining in that condition. 'Swept clean' communicates both the cleaning
    action and resultant state in natural English. 'Swept out' is possible and traditional,
    but can sound spatial rather than hygienic in contemporary English.
- source_word: κεκοσμημένον
  chosen: put in order
  alternatives:
  - adorned
  - decorated
  - arranged
  lexicon: BDAG
  rationale: Perfect passive participle of κοσμέω. In this context of a house, the
    sense is orderly arrangement rather than ornamental beautification alone. 'Put
    in order' best captures the domestic/resultative sense for modern readers, while
    preserving the idea that the house has been made ready.
