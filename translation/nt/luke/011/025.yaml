theological_decisions:
- issue: Referent of the implied object
  chosen_reading: it finds it
  alternative_readings:
  - it finds the house
  - he finds it
  rationale: The Greek leaves the object implicit, but the immediate context (vv.
    24, 26) identifies the referent as the 'house.' Using 'it' preserves the compactness
    of the Greek while remaining intelligible from context. 'He' is avoided because
    the subject, the unclean spirit, is grammatically neuter in Greek and English
    does not require personalizing it here.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
