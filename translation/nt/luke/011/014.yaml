id: LUK.11.14
reference: Luke 11:14
source:
  edition: SBLGNT
  text: Καὶ ἦν ἐκβάλλων ⸀δαιμόνιον κωφόν· ἐγένετο δὲ τοῦ δαιμονίου ἐξελθόντος ἐλάλησεν
    ὁ κωφός. καὶ ἐθαύμασαν οἱ ὄχλοι·
translation:
  text: And he was casting out a mute demon. Then, when the demon had gone out, the
    mute man spoke, and the crowds marveled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deaf'; the Greek adjective can mean either 'deaf' or 'mute,' but here
      'mute' best fits the context because the man speaks after the demon departs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἐκβάλλων
  chosen: he was casting out
  alternatives:
  - he cast out
  - he was driving out
  lexicon: BDAG
  rationale: The periphrastic imperfect (ἦν + present participle) naturally conveys
    ongoing action in past time, best represented by 'was casting out.' 'Driving out'
    is possible for ἐκβάλλω in exorcism contexts, but 'casting out' preserves familiar
    exorcism language without becoming archaic.
- source_word: δαιμόνιον
  chosen: demon
  alternatives:
  - unclean spirit
  lexicon: BDAG
  rationale: δαιμόνιον directly denotes a demon or evil spirit. 'Demon' is the most
    direct and standard rendering here; 'unclean spirit' would import wording not
    present in this verse.
- source_word: κωφόν
  chosen: mute
  alternatives:
  - unable to speak
  - dumb
  lexicon: BDAG
  rationale: Although κωφός can denote 'deaf' or 'mute' depending on context, the
    immediate result is that the afflicted person speaks (ἐλάλησεν), which indicates
    muteness is the focus here. 'Mute' is accurate and readable; 'dumb' is outdated
    and potentially misleading.
- source_word: ἐγένετο δὲ ... ἐξελθόντος
  chosen: Then, when the demon had gone out
  alternatives:
  - and it happened that, when the demon had gone out
  - and when the demon came out
  lexicon: BDAG
  rationale: This construction marks the next event in narrative sequence. 'Then,
    when...' gives natural English while preserving the temporal force of the genitive
    absolute. 'Had gone out' reflects the aorist participle's completed action prior
    to the main verb.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - began to speak
  - talked
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak.' 'Spoke' is the straightforward rendering.
    'Began to speak' is interpretive and not required by the Greek.
- source_word: ὁ κωφός
  chosen: the mute man
  alternatives:
  - the mute one
  - the man who had been mute
  lexicon: BDAG
  rationale: The substantival adjective refers to the afflicted person. In English,
    'the mute man' is clearer and more natural than 'the mute one.' 'Man' is supplied
    idiomatically because the referent is a person, not because the adjective itself
    explicitly marks sex.
- source_word: ἐθαύμασαν
  chosen: marveled
  alternatives:
  - were amazed
  - wondered
  lexicon: BDAG
  rationale: ἐθαύμασαν denotes astonishment or wonder. 'Marveled' preserves the sense
    of amazed wonder and fits the narrative tone. 'Were amazed' is also possible but
    slightly flattens the nuance.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: The plural noun is best represented by 'the crowds.' 'The crowd' would
    lose the plural, and 'the multitudes' sounds less natural in contemporary English.
