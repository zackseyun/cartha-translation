theological_decisions:
- issue: Nature of the affliction and exorcism language
  chosen_reading: Render the text as describing an actual demon being cast out, resulting
    in restored speech.
  alternative_readings:
  - Render in a more phenomenological way, such as 'an evil spirit' or avoid explicit
    supernatural framing
  rationale: The Greek explicitly says δαιμόνιον and narrates its departure as the
    cause of the man's restored speech. The translation should preserve the text's
    supernatural claim without reduction or embellishment.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
