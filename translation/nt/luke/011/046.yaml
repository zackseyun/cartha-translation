id: LUK.11.46
reference: Luke 11:46
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Καὶ ὑμῖν τοῖς νομικοῖς οὐαί, ὅτι φορτίζετε τοὺς ἀνθρώπους φορτία
    δυσβάστακτα, καὶ αὐτοὶ ἑνὶ τῶν δακτύλων ὑμῶν οὐ προσψαύετε τοῖς φορτίοις.
translation:
  text: But he said, “Woe also to you lawyers, because you load people with burdens
    hard to bear, and you yourselves do not touch the burdens with one of your fingers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'experts in the law.' The Greek term refers to specialists in the Jewish
      law.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not lay a finger on the burdens.' The expression emphasizes that
      they make no effort to help with what they impose on others.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομικοῖς
  chosen: lawyers
  alternatives:
  - experts in the law
  - legal scholars
  lexicon: BDAG
  rationale: In Luke, νομικός refers to specialists in the Mosaic law rather than
    secular attorneys. 'Lawyers' is concise and traditional in this context, while
    the alternatives make the referent more explicit. The immediate context makes
    clear these are religious law experts.
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: '''Woe'' preserves the prophetic force of denunciation better than the
    softer ''alas.'' It matches Jesus'' judgment-saying style in this context.'
- source_word: φορτίζετε
  chosen: you load
  alternatives:
  - you burden
  - you place on
  lexicon: BDAG
  rationale: 'The verb is causative and concrete: they are loading burdens onto people.
    ''You load'' keeps the metaphor vivid and pairs naturally with ''burdens.'''
- source_word: ἀνθρώπους
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Here ἄνθρωπος is generic for human beings, not specifically males. 'People'
    conveys the representative sense in natural modern English.
- source_word: φορτία
  chosen: burdens
  alternatives:
  - loads
  lexicon: BDAG
  rationale: '''Burdens'' is the natural English equivalent in this metaphorical context
    and fits the repeated noun later in the verse.'
- source_word: δυσβάστακτα
  chosen: hard to bear
  alternatives:
  - difficult to carry
  - unbearable
  lexicon: BDAG
  rationale: The adjective means difficult to carry or endure. 'Hard to bear' is idiomatic
    English and avoids overstating the term as absolutely 'unbearable.'
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you yourselves personally
  lexicon: BDAG
  rationale: The pronoun is emphatic and contrasts the lawyers with the people they
    burden. 'You yourselves' brings out that emphasis.
- source_word: ἑνὶ τῶν δακτύλων ὑμῶν
  chosen: with one of your fingers
  alternatives:
  - with a single finger
  - with one finger of yours
  lexicon: BDAG
  rationale: This phrase is idiomatic and emphasizes minimal effort. 'With one of
    your fingers' is a natural rendering that preserves the partitive construction.
- source_word: προσψαύετε
  chosen: do not touch
  alternatives:
  - do not lay a finger on
  - do not help move
  lexicon: BDAG
  rationale: The verb literally means to touch or make contact with. 'Do not touch'
    preserves the image; 'do not help move' interprets the implication too far in
    the main text.
- source_word: Καὶ ὑμῖν
  chosen: also to you
  alternatives:
  - and to you too
  lexicon: BDAG
  rationale: The καί adds that the woe extends to another group in addition to the
    previous addressees. 'Also to you' preserves that additive force.
