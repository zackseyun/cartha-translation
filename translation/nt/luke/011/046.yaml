theological_decisions:
- issue: Identity of νομικοῖς
  chosen_reading: Rendered as 'lawyers' referring to experts in the Jewish law, not
    modern civil attorneys.
  alternative_readings:
  - experts in the law
  - scribes
  rationale: The verse critiques religious legal specialists who impose interpretive
    burdens. 'Scribes' would be too specific and not identical with νομικοί in every
    context; 'experts in the law' is explanatory but less concise.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the final clause
  chosen_reading: Kept the concrete metaphor 'do not touch the burdens with one of
    your fingers' rather than making the implied meaning explicit.
  alternative_readings:
  - do not help with the burdens at all
  - do not lift a finger to help
  rationale: Optimal equivalence favors preserving the source metaphor where it remains
    intelligible in English. The implied hypocrisy is clear without paraphrastic expansion.
  doctrine_reference: Translation philosophy §1, §6
