id: LUK.11.15
reference: Luke 11:15
source:
  edition: SBLGNT
  text: τινὲς δὲ ἐξ αὐτῶν εἶπον· Ἐν Βεελζεβοὺλ ⸀τῷ ἄρχοντι τῶν δαιμονίων ἐκβάλλει
    τὰ δαιμόνια·
translation:
  text: But some of them said, “By Beelzebul, the ruler of the demons, he casts out
    demons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beelzebub: a traditional English form of the name rendered here as Beelzebul,
      following the Greek text.'
    reason: alternative_reading
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of the crowd; 'some'
    is natural modern English and sufficiently precise.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the positive reaction in the surrounding context;
    'But' best conveys the adversative force here.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: Identifies these speakers as arising from the larger group present. 'Of
    them' is idiomatic and preserves the partitive sense.
- source_word: εἶπον
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: Aorist indicative presents the accusation as a simple event; 'said' is
    the most straightforward rendering.
- source_word: Ἐν
  chosen: By
  alternatives:
  - In
  - Through
  - By means of
  lexicon: BDAG
  rationale: 'Here ἐν with a personal name expresses agency or instrumentality: the
    accusation is that Jesus expels demons by Beelzebul''s power. ''By'' is concise
    and idiomatic in English.'
- source_word: Βεελζεβοὺλ
  chosen: Beelzebul
  alternatives:
  - Beelzebub
  lexicon: BDAG
  rationale: The Greek text reads Βεελζεβούλ, so the transliteration 'Beelzebul' follows
    original-language primacy. The more familiar 'Beelzebub' reflects a variant/traditional
    form and is preserved in a footnote.
- source_word: τῷ ἄρχοντι τῶν δαιμονίων
  chosen: the ruler of the demons
  alternatives:
  - the prince of the demons
  - the chief of the demons
  lexicon: BDAG
  rationale: 'ἄρχων denotes a ruler or authority figure. ''Ruler'' is clear modern
    English; ''prince'' is traditional but less transparent today. The genitive τῶν
    δαιμονίων is possessive/subordinating: he rules over the demons.'
- source_word: ἐκβάλλει
  chosen: he casts out
  alternatives:
  - he drives out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'cast out' in exorcism contexts. This preserves
    the established exorcistic sense without becoming archaic in this context.
- source_word: τὰ δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: δαιμόνια is directly 'demons.' 'Evil spirits' is interpretive and less
    formally tied to the Greek term.
