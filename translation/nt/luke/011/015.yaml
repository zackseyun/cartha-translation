theological_decisions:
- issue: Rendering the demonic title Βεελζεβούλ
  chosen_reading: Beelzebul
  alternative_readings:
  - Beelzebub
  rationale: The translation follows the Greek form in the main text, consistent with
    original-language primacy and the policy to transliterate names. Because 'Beelzebub'
    is a familiar traditional form and may reflect a related textual/traditional variant,
    it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names.'
- issue: Rendering ἄρχων as 'ruler' rather than 'prince'
  chosen_reading: the ruler of the demons
  alternative_readings:
  - the prince of the demons
  rationale: The verse reports an accusation about satanic authority structure but
    does not require importing later demonological precision. 'Ruler' communicates
    authority clearly in modern English while avoiding unnecessary traditionalism.
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic
    or academic.'
