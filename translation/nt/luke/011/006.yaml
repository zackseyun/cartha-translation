id: LUK.11.6
reference: Luke 11:6
source:
  edition: SBLGNT
  text: ἐπειδὴ φίλος ⸀μου παρεγένετο ἐξ ὁδοῦ πρός με καὶ οὐκ ἔχω ὃ παραθήσω αὐτῷ·
translation:
  text: because a friend of mine has come to me from a journey, and I have nothing
    to set before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'from the road.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  chosen: because
  alternatives:
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the request in the parable. 'Because' is the
    most natural modern English causal conjunction here.
- source_word: φίλος μου
  chosen: a friend of mine
  alternatives:
  - my friend
  lexicon: BDAG
  rationale: The anarthrous φίλος with possessive μου is naturally rendered 'a friend
    of mine,' which fits the idiomatic English sense and preserves the indefinite
    force better than 'my friend.'
- source_word: παρεγένετο
  chosen: has come
  alternatives:
  - arrived
  - came
  lexicon: BDAG
  rationale: 'Aorist middle of παραγίνομαι here denotes arrival/presence. English
    present perfect (''has come'') fits the current-result sense in context: the friend
    has arrived and is now present.'
- source_word: ἐξ ὁδοῦ
  chosen: from a journey
  alternatives:
  - from the road
  - off the road
  lexicon: BDAG
  rationale: Literally 'from the road,' but idiomatically refers to travel. 'From
    a journey' communicates the sense clearly in natural English without unnecessary
    literalism.
- source_word: πρός με
  chosen: to me
  alternatives:
  - to my house
  - to visit me
  lexicon: BDAG
  rationale: The prepositional phrase indicates movement toward the speaker. 'To me'
    is sufficiently literal and avoids adding 'house' or 'visit,' which are implied
    but not explicit.
- source_word: οὐκ ἔχω
  chosen: I have nothing
  alternatives:
  - I do not have anything
  lexicon: BDAG
  rationale: Straightforward negated possession. 'I have nothing' is concise, natural,
    and fully equivalent.
- source_word: ὃ παραθήσω αὐτῷ
  chosen: to set before him
  alternatives:
  - to place before him
  - to serve him
  lexicon: BDAG
  rationale: παρατίθημι in meal/hospitality contexts means to set food before someone.
    'To set before him' preserves the hospitality imagery more directly than the more
    interpretive 'to serve him.'
