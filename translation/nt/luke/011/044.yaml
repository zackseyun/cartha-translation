theological_decisions:
- issue: Purity-impurity imagery behind the comparison to tombs
  chosen_reading: Render the image concretely as 'unmarked tombs' without importing
    an explanatory statement about ritual defilement into the main text.
  alternative_readings:
  - Translate more literally as 'hidden tombs/graves' and leave the implication entirely
    implicit
  rationale: The verse alludes to the danger of unknowingly contacting impurity associated
    with graves/tombs, but the text itself states only the comparison and the ignorance
    of those walking over them. 'Unmarked tombs' preserves the likely force of the
    image without adding interpretive material to the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of οἱ ἄνθρωποι
  chosen_reading: Use 'the men' in the main text with a footnote indicating representative/generic
    force.
  alternative_readings:
  - the people
  - people
  rationale: The source is grammatically masculine plural. The project's policy prefers
    gender-accurate rendering over neutralization, while allowing annotation where
    inclusivity is contextually relevant.
  doctrine_reference: Translation philosophy §4
