id: LUK.11.44
reference: Luke 11:44
source:
  edition: SBLGNT
  text: οὐαὶ ⸀ὑμῖν, ὅτι ἐστὲ ὡς τὰ μνημεῖα τὰ ἄδηλα, καὶ οἱ ἄνθρωποι ⸀οἱ περιπατοῦντες
    ἐπάνω οὐκ οἴδασιν.
translation:
  text: Woe to you, because you are like unmarked tombs, and the men walking over
    them do not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden tombs' or 'unseen graves.' The sense in context is tombs not
      recognized by passersby.
    reason: lexical_alternative
  - marker: b
    text: '''The men'' reflects the masculine plural Greek and may function representatively
      here, that is, of people walking over them.'
    reason: lexical_alternative
  - marker: c
    text: The image likely alludes to the danger of becoming ceremonially defiled
      by contact with graves without realizing it; compare Numbers 19:16.
    reason: cross_reference
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic/judicial force of denunciation better than the
    softer 'alas.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Idiomatic with οὐαί in English ('Woe to you') while preserving the dative
    addressee.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the woe in clear modern English.
- source_word: μνημεῖα
  chosen: tombs
  alternatives:
  - graves
  - sepulchers
  lexicon: BDAG
  rationale: '''Tombs'' is natural modern English and fits burial monuments/places;
    ''sepulchers'' is archaic, while ''graves'' is possible but less fitting with
    the image as used here.'
- source_word: ἄδηλα
  chosen: unmarked
  alternatives:
  - hidden
  - unseen
  - inconspicuous
  lexicon: BDAG
  rationale: In context the point is that people do not recognize the tombs and so
    unknowingly incur impurity by walking over them. 'Unmarked' brings out the practical
    sense more clearly than the more abstract 'hidden' or 'unseen.'
- source_word: οἱ ἄνθρωποι
  chosen: the men
  alternatives:
  - the people
  - the humans
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural. Per the project's gender-accurate
    policy, 'men' is retained rather than neutralizing to 'people,' while the representative
    force can be noted in a footnote.
- source_word: περιπατοῦντες ἐπάνω
  chosen: walking over them
  alternatives:
  - walking above them
  - walking on top of them
  lexicon: BDAG
  rationale: Expresses the participial phrase naturally in English and makes explicit
    the understood object from the preceding 'tombs.'
- source_word: οὐκ οἴδασιν
  chosen: do not know it
  alternatives:
  - do not know
  - are unaware
  lexicon: BDAG
  rationale: English idiom benefits from an object; 'it' makes explicit that they
    do not know they are walking over tombs.
