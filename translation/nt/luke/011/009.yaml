theological_decisions:
- issue: Aspect of the present imperatives αἰτεῖτε, ζητεῖτε, κρούετε
  chosen_reading: Rendered as simple English imperatives ('ask,' 'seek,' 'knock')
    without explicit iterative expansion in the main text.
  alternative_readings:
  - keep asking
  - keep seeking
  - keep knocking
  rationale: The Greek present imperatives may suggest ongoing action, but making
    that explicit in English risks overinterpreting aspect. The simple imperatives
    preserve the command faithfully while allowing the surrounding context to convey
    persistence.
  doctrine_reference: Translation philosophy §3, §6
