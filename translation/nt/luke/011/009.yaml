id: LUK.11.9
reference: Luke 11:9
source:
  edition: SBLGNT
  text: Κἀγὼ ὑμῖν λέγω, αἰτεῖτε, καὶ δοθήσεται ὑμῖν· ζητεῖτε, καὶ εὑρήσετε· κρούετε,
    καὶ ἀνοιγήσεται ὑμῖν·
translation:
  text: And I tell you, ask, and it will be given to you; seek, and you will find;
    knock, and it will be opened to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly reflecting the Greek present imperatives: ''keep asking
      ... keep seeking ... keep knocking.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγὼ
  chosen: And I
  alternatives:
  - And I also
  - So I
  lexicon: BDAG
  rationale: Κἀγώ is a crasis of καὶ ἐγώ, adding emphasis and continuity with the
    preceding teaching. 'And I' preserves the connective force without overtranslating
    the emphasis.
- source_word: λέγω
  chosen: tell
  alternatives:
  - say
  lexicon: BDAG
  rationale: Present indicative introducing direct discourse is naturally rendered
    'I tell you' in contemporary English. This preserves the solemn introductory formula
    while remaining readable.
- source_word: αἰτεῖτε
  chosen: ask
  alternatives:
  - keep asking
  - request
  lexicon: BDAG
  rationale: The present imperative can carry iterative or ongoing force, but in English
    the simple imperative 'ask' best preserves the command without importing an overly
    interpretive aspectual nuance. The durative sense is contextually present in the
    series of imperatives.
- source_word: δοθήσεται
  chosen: it will be given
  alternatives:
  - it shall be given
  lexicon: BDAG
  rationale: Future passive of δίδωμι is straightforwardly rendered 'it will be given.'
    'Shall' is more traditional but less natural in modern English.
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - keep seeking
  - look for
  lexicon: BDAG
  rationale: ζητέω here carries the sense of earnest seeking. 'Seek' is the established
    and accurate English equivalent, preserving both literal and metaphorical breadth.
- source_word: εὑρήσετε
  chosen: you will find
  alternatives:
  - you shall find
  lexicon: BDAG
  rationale: Future active is naturally rendered 'you will find.' This keeps the direct
    promise structure parallel to the surrounding clauses.
- source_word: κρούετε
  chosen: knock
  alternatives:
  - keep knocking
  lexicon: BDAG
  rationale: κρούω in this context refers to knocking at a door. The simple imperative
    'knock' is idiomatic and preserves the metaphor without adding interpretive emphasis.
- source_word: ἀνοιγήσεται
  chosen: it will be opened
  alternatives:
  - it will be opened up
  lexicon: BDAG
  rationale: Future passive of ἀνοίγω leaves the implied object unstated in Greek;
    English likewise can preserve the impersonal passive 'it will be opened,' with
    the understood reference being the door implied by 'knock.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative pronoun is best rendered 'to you' in each clause, preserving
    the personal direction of the promise and the repeated parallelism of the Greek.
