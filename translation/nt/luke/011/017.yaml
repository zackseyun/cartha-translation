id: LUK.11.17
reference: Luke 11:17
source:
  edition: SBLGNT
  text: αὐτὸς δὲ εἰδὼς αὐτῶν τὰ διανοήματα εἶπεν αὐτοῖς· Πᾶσα βασιλεία ἐφ’ ἑαυτὴν
    διαμερισθεῖσα ἐρημοῦται, καὶ οἶκος ἐπὶ οἶκον πίπτει.
translation:
  text: But he, knowing their thoughts, said to them, “Every kingdom divided against
    itself is laid waste, and house falls upon house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'household falls against household.' The Greek οἶκος can mean either
      a physical house or a household/family.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - perceiving
  - being aware of
  lexicon: BDAG
  rationale: Although from οἶδα/ὁράω in form, in context it denotes cognitive awareness.
    'Knowing' is natural English and preserves the participial connection to the main
    verb.
- source_word: διανοήματα
  chosen: thoughts
  alternatives:
  - reasonings
  - intentions
  lexicon: BDAG
  rationale: Refers to inner thoughts or mental deliberations. 'Thoughts' is the clearest
    modern rendering without over-specifying hostile intent.
- source_word: Πᾶσα βασιλεία
  chosen: Every kingdom
  alternatives:
  - Any kingdom
  lexicon: BDAG
  rationale: A general maxim is in view. 'Every kingdom' preserves the distributive
    force of πᾶσα.
- source_word: ἐφ’ ἑαυτὴν
  chosen: against itself
  alternatives:
  - against its own self
  - in conflict with itself
  lexicon: BDAG
  rationale: In this idiom with διαμερίζω, the sense is internal opposition, not mere
    spatial relation. 'Against itself' is the standard and most natural English equivalent.
- source_word: διαμερισθεῖσα
  chosen: divided
  alternatives:
  - split
  - partitioned
  lexicon: BDAG
  rationale: The participle describes internal division. 'Divided' is idiomatic in
    English and fits the proverbial saying.
- source_word: ἐρημοῦται
  chosen: is laid waste
  alternatives:
  - is devastated
  - becomes desolate
  lexicon: BDAG
  rationale: The verb conveys ruin/desolation rather than simple collapse. 'Is laid
    waste' preserves the passive sense and the severity of the result.
- source_word: οἶκος ἐπὶ οἶκον
  chosen: house falls upon house
  alternatives:
  - house against house falls
  - a household falls against a household
  lexicon: BDAG
  rationale: The compressed Greek is difficult, but the image is of one house/household
    falling upon another in mutual collapse. This rendering keeps the concrete imagery
    while remaining readable. 'Household against household' is possible interpretively,
    but the bare noun 'house' better reflects the Greek wording.
- source_word: πίπτει
  chosen: falls
  alternatives:
  - collapses
  lexicon: BDAG
  rationale: A simple present verb matching the proverbial style. 'Falls' preserves
    the metaphor and avoids over-interpretation.
