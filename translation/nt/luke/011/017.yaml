theological_decisions:
- issue: Meaning of οἶκος in the proverb's second clause
  chosen_reading: Rendered literally as 'house' rather than interpretively as 'household'
    in the main text.
  alternative_readings:
  - household
  - family
  rationale: The immediate Greek uses οἶκος without explicit markers requiring the
    social sense. Since the saying is proverbial and compressed, the literal 'house'
    preserves the imagery and leaves open the broader application to households or
    factions. An alternative is worth preserving in a footnote because many readers
    will understand a relational/social sense here, especially in light of the Matthean
    parallel.
  doctrine_reference: Translation philosophy §§1, 3, 5
