theological_decisions:
- issue: Nature of the clause about prophetic blood being 'required'
  chosen_reading: A statement of divine judicial accountability placed on 'this generation'
    for the accumulated bloodguilt of rejecting God's messengers.
  alternative_readings:
  - A merely rhetorical statement of historical continuity without strong judicial
    force
  rationale: The passive of ἐκζητέω in bloodguilt contexts naturally conveys reckoning
    or exacting accountability. The translation preserves that judicial sense without
    importing a detailed theory of corporate guilt beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
