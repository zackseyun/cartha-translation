id: LUK.11.50
reference: Luke 11:50
source:
  edition: SBLGNT
  text: ἵνα ἐκζητηθῇ τὸ αἷμα πάντων τῶν προφητῶν τὸ ἐκκεχυμένον ἀπὸ καταβολῆς κόσμου
    ἀπὸ τῆς γενεᾶς ταύτης,
translation:
  text: so that the blood of all the prophets, shed from the foundation of the world,
    may be required from this generation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may be demanded from this generation.' The verb carries the sense of
      calling to account for bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result in relation to the preceding context. 'So that'
    is natural English and preserves the clause's telic force without sounding overly
    wooden.
- source_word: ἐκζητηθῇ
  chosen: may be required
  alternatives:
  - may be demanded
  - may be sought out
  - may be exacted
  lexicon: BDAG
  rationale: 'Passive subjunctive of ἐκζητέω here carries judicial/accounting force:
    bloodguilt is called to account. ''May be required'' best reflects biblical idiom
    in English for divine reckoning of bloodshed.'
- source_word: τὸ αἷμα
  chosen: the blood
  lexicon: BDAG
  rationale: Literal rendering is appropriate; in context it stands metonymically
    for the bloodguilt associated with the murder of the prophets, but the Greek says
    'blood' and should be preserved.
- source_word: πάντων τῶν προφητῶν
  chosen: of all the prophets
  lexicon: BDAG
  rationale: Straightforward genitive construction. 'All' is retained to preserve
    the comprehensive scope of the indictment.
- source_word: τὸ ἐκκεχυμένον
  chosen: shed
  alternatives:
  - poured out
  lexicon: BDAG
  rationale: Perfect passive participle modifying 'blood.' 'Shed' is the idiomatic
    English collocation with blood in contexts of violent death; 'poured out' is more
    literal but less natural here.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: from the foundation of the world
  alternatives:
  - since the world's foundation
  lexicon: BDAG
  rationale: This is a standard biblical expression. 'Foundation of the world' preserves
    the established sense of καταβολή in this phrase and remains clear in modern English.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  chosen: from this generation
  alternatives:
  - of this generation
  - at the hands of this generation
  lexicon: BDAG
  rationale: The repeated ἀπό with passive ἐκζητηθῇ indicates the party from whom
    accountability is demanded. 'From this generation' is the most direct and idiomatic
    rendering.
