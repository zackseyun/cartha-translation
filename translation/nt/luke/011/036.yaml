theological_decisions:
- issue: Metaphorical force of 'body' and 'light' in Jesus' saying
  chosen_reading: Retain the bodily/light imagery without explicating it as a doctrinal
    statement about the soul or moral state.
  alternative_readings:
  - Paraphrase as inner life or spiritual condition
  rationale: The verse uses metaphorical language connected to the preceding context
    about the eye as the lamp of the body. The translation preserves the imagery and
    theological tension rather than resolving it into an interpretive paraphrase.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
