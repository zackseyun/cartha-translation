id: LUK.11.36
reference: Luke 11:36
source:
  edition: SBLGNT
  text: εἰ οὖν τὸ σῶμά σου ὅλον φωτεινόν, μὴ ἔχον ⸂μέρος τι⸃ σκοτεινόν, ἔσται φωτεινὸν
    ὅλον ὡς ὅταν ὁ λύχνος τῇ ἀστραπῇ φωτίζῃ σε.
translation:
  text: If, then, your whole body is full of light, having no dark part, it will be
    wholly full of light, as when a lamp lights you with its brightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as when a lamp illumines you with a flash'; the Greek term can denote
      a flash or brightness, though here it likely refers to the lamp's shining rather
      than literal lightning.
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶμά
  chosen: body
  alternatives:
  - whole person
  - self
  lexicon: BDAG
  rationale: The literal term is 'body.' In this context it functions metaphorically
    for the person’s inner condition, but 'body' preserves the imagery Jesus is using
    in the surrounding saying about the eye and light.
- source_word: ὅλον
  chosen: whole
  alternatives:
  - entire
  - completely
  lexicon: BDAG
  rationale: Used twice for emphasis. 'Whole' is natural English and preserves the
    totalizing force without over-paraphrase.
- source_word: φωτεινόν
  chosen: full of light
  alternatives:
  - bright
  - luminous
  lexicon: BDAG
  rationale: Rather than the less idiomatic 'luminous,' 'full of light' clearly conveys
    the predicate adjective in context and matches the contrast with 'dark part.'
- source_word: μὴ ἔχον μέρος τι σκοτεινόν
  chosen: having no dark part
  alternatives:
  - having no part dark
  - with no dark part in it
  lexicon: BDAG
  rationale: This participial phrase is rendered in smooth English while preserving
    the concrete imagery of a 'part' that is dark. 'Dark part' best reflects μέρος
    τι σκοτεινόν.
- source_word: μέρος τι
  chosen: part
  alternatives:
  - any part
  - some part
  lexicon: BDAG
  rationale: The indefinite expression means 'some part/any part.' English idiom prefers
    'no dark part' after the negated participle.
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  lexicon: BDAG
  rationale: Simple future of εἰμί; 'will be' is standard modern English.
- source_word: ὡς ὅταν
  chosen: as when
  alternatives:
  - just as when
  - like when
  lexicon: BDAG
  rationale: This comparative-temporal combination introduces the illuminating comparison.
    'As when' is concise and natural.
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  - lampstand
  lexicon: BDAG
  rationale: λύχνος is a portable lamp, not the abstract 'light' and not a lampstand.
    'Lamp' preserves the concrete image.
- source_word: τῇ ἀστραπῇ
  chosen: with its brightness
  alternatives:
  - with its flash
  - by its shining
  - with lightning
  lexicon: BDAG
  rationale: ἀστραπή can denote lightning or a flash/brightness. Here, with a lamp
    as subject, the sense is its radiant shining rather than literal lightning. 'With
    its brightness' communicates the instrumental dative naturally.
- source_word: φωτίζῃ σε
  chosen: lights you
  alternatives:
  - gives you light
  - illumines you
  lexicon: BDAG
  rationale: The verb means to give light/illumine. 'Lights you' is direct, readable
    modern English, and preserves the personal object σε.
