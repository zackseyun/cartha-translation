- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' This maintains
    consistency and preserves the title's semantic range in Luke without flattening
    it to a merely pedagogical address.
