id: LUK.11.1
reference: Luke 11:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ εἶναι αὐτὸν ἐν τόπῳ τινὶ προσευχόμενον, ὡς ἐπαύσατο, εἶπέν
    τις τῶν μαθητῶν αὐτοῦ πρὸς αὐτόν· Κύριε, δίδαξον ἡμᾶς προσεύχεσθαι, καθὼς καὶ
    Ἰωάννης ἐδίδαξεν τοὺς μαθητὰς αὐτοῦ.
translation:
  text: And it happened that while he was praying in a certain place, when he stopped,
    one of his disciples said to him, “Lord, teach us to pray, just as John also taught
    his disciples.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: BDAG
  rationale: This Lukan narrative formula is best rendered with natural modern English
    while preserving its event-introducing function. 'And it came to pass' is overly
    archaic; 'Now it happened' is possible but less directly reflects καί.
- source_word: ἐν τῷ εἶναι αὐτὸν ... προσευχόμενον
  chosen: while he was praying
  alternatives:
  - as he was praying
  - when he was praying
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous circumstance.
    'While he was praying' is idiomatic and preserves the ongoing aspect signaled
    by the construction and participle.
- source_word: ἐν τόπῳ τινὶ
  chosen: in a certain place
  alternatives:
  - in some place
  - somewhere
  lexicon: BDAG
  rationale: The phrase is intentionally indefinite. 'In a certain place' preserves
    the Greek wording and narrative feel better than the more colloquial 'somewhere.'
- source_word: ὡς ἐπαύσατο
  chosen: when he stopped
  alternatives:
  - when he finished
  - after he ceased
  lexicon: BDAG
  rationale: ἐπαύσατο means 'stopped/ceased.' In context it refers to ending the act
    of praying. 'When he stopped' is a clear, direct rendering; 'when he finished'
    is smoother but slightly interpretive.
- source_word: τις τῶν μαθητῶν αὐτοῦ
  chosen: one of his disciples
  alternatives:
  - a certain one of his disciples
  lexicon: BDAG
  rationale: The partitive construction naturally means 'one of his disciples.' The
    indefinite τις does not require the awkwardly literal 'a certain one' in English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος defaults to 'Lord.' In direct address
    to Jesus this preserves both respect and the title's established NT significance
    without overinterpreting the degree of christological weight in this immediate
    context.
- source_word: δίδαξον ἡμᾶς προσεύχεσθαι
  chosen: teach us to pray
  alternatives:
  - teach us how to pray
  lexicon: BDAG
  rationale: The infinitive complement after διδάσκω is straightforwardly rendered
    'teach us to pray.' Adding 'how' is acceptable English but slightly expands beyond
    the Greek.
- source_word: καθὼς καὶ Ἰωάννης ἐδίδαξεν τοὺς μαθητὰς αὐτοῦ
  chosen: just as John also taught his disciples
  alternatives:
  - as John also taught his disciples
  - just as even John taught his disciples
  lexicon: BDAG
  rationale: καθώς introduces comparison, and καί here is naturally rendered 'also.'
    'Just as' captures the comparative force clearly in modern English.
