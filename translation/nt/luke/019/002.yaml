id: LUK.19.2
reference: Luke 19:2
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἀνὴρ ὀνόματι ⸀καλούμενος Ζακχαῖος, καὶ αὐτὸς ἦν ἀρχιτελώνης καὶ ⸀αὐτὸς
    πλούσιος·
translation:
  text: And behold, a man named Zacchaeus was there, and he was a chief tax collector
    and was rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'called Zacchaeus.' The Greek idiom literally includes 'called,' but
      'named' is the most natural English equivalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve Luke's attention-directing discourse
    marker and the narrative vividness of the Greek, rather than omitting it or flattening
    it into mere punctuation.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a person
  - a certain man
  lexicon: BDAG
  rationale: The noun is specifically masculine singular and refers to an individual
    male, so 'a man' is the gender-accurate rendering.
- source_word: ὀνόματι καλούμενος
  chosen: named
  alternatives:
  - called by name
  - whose name was called
  lexicon: BDAG
  rationale: This idiom naturally means 'named' or 'called.' 'Named' is idiomatic
    modern English and preserves the sense without wooden redundancy.
- source_word: Ζακχαῖος
  chosen: Zacchaeus
  rationale: Personal names are transliterated by standard English convention.
- source_word: αὐτὸς ἦν
  chosen: he was
  alternatives:
  - this man was
  - he himself was
  lexicon: BDAG
  rationale: The pronoun adds emphasis or resumes the subject. In English, simple
    'he was' communicates the predication naturally; stronger reflexive emphasis would
    be overstated here.
- source_word: ἀρχιτελώνης
  chosen: chief tax collector
  alternatives:
  - head tax collector
  - arch-tax collector
  lexicon: BDAG
  rationale: The compound denotes a leading or senior tax collector. 'Chief tax collector'
    is clear, natural English and preserves the hierarchical sense of ἀρχι-.
- source_word: αὐτὸς πλούσιος
  chosen: was rich
  alternatives:
  - was wealthy
  - he himself was rich
  lexicon: BDAG
  rationale: πλούσιος denotes being rich or wealthy. 'Was rich' is the most direct
    and idiomatic rendering. The repeated αὐτός likely adds mild emphasis; English
    does not require repeating 'he himself' here.
