id: LUK.19.14
reference: Luke 19:14
source:
  edition: SBLGNT
  text: οἱ δὲ πολῖται αὐτοῦ ἐμίσουν αὐτόν, καὶ ἀπέστειλαν πρεσβείαν ὀπίσω αὐτοῦ λέγοντες·
    Οὐ θέλομεν τοῦτον βασιλεῦσαι ἐφ’ ἡμᾶς.
translation:
  text: But his citizens hated him, and sent a delegation after him, saying, ‘We do
    not want this man to reign over us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an embassy.' The Greek term refers to a representative body sent on
      an official mission.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολῖται
  chosen: citizens
  alternatives:
  - subjects
  - countrymen
  lexicon: BDAG
  rationale: πολίτης denotes a citizen, a member of a political community. 'Citizens'
    best preserves the civic-political sense of the parable; 'subjects' would prematurely
    imply the very kingship they reject.
- source_word: ἐμίσουν
  chosen: hated
  alternatives:
  - were hating
  - detested
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or characteristic hostility. English
    simple past 'hated' is the most natural rendering here; 'were hating' is too wooden,
    while 'detested' is stronger than necessary.
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Aorist narrative verb; 'sent' is the clear, idiomatic equivalent without
    adding formality.
- source_word: πρεσβείαν
  chosen: a delegation
  alternatives:
  - an embassy
  - a delegation of representatives
  lexicon: BDAG
  rationale: πρεσβεία can mean an embassy or delegation. 'A delegation' is natural
    modern English and fits the political setting without sounding archaic.
- source_word: ὀπίσω αὐτοῦ
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: BDAG
  rationale: In context this indicates that the delegation was sent after him, i.e.,
    in pursuit/following his departure. 'After him' is concise and idiomatic.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - with the message
  - declaring
  lexicon: BDAG
  rationale: The participle introduces the content of the delegation's message. 'Saying'
    preserves the straightforward narrative linkage.
- source_word: Οὐ θέλομεν
  chosen: We do not want
  alternatives:
  - We are unwilling
  - We do not wish
  lexicon: BDAG
  rationale: θέλω expresses will/desire. 'We do not want' is natural modern English
    and adequately conveys their refusal.
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative is slightly distancing and dismissive. 'This man' captures
    that tone in idiomatic English without becoming overly colloquial or contemptuous.
- source_word: βασιλεῦσαι ἐφ’ ἡμᾶς
  chosen: to reign over us
  alternatives:
  - to be king over us
  - to rule over us
  lexicon: BDAG
  rationale: βασιλεύω means to reign or be king. 'To reign over us' preserves the
    royal nuance better than the more general 'rule over us'; 'to be king over us'
    is possible but less idiomatic in this clause.
