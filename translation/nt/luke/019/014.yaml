theological_decisions:
- issue: Political/royal nuance in the parable
  chosen_reading: Retain explicit royal language with 'reign over us' rather than
    flattening to generic authority.
  alternative_readings:
  - rule over us
  - govern us
  rationale: The parable's imagery depends on kingship language, which also prepares
    for the broader Lukan context of rejected royal authority. The translation preserves
    that imagery without importing allegorical conclusions beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
