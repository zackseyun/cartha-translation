theological_decisions:
- issue: Rendering of δοῦλος in a parabolic master-servant context
  chosen_reading: servant
  alternative_readings:
  - slave
  - bondservant
  rationale: Following the doctrine's context-dependent policy, this verse does not
    require emphasizing the bonded nature as strongly as passages where identity as
    a slave is theologically salient. 'Servant' best balances lexical accuracy and
    readable modern English, while the stronger alternative is preserved in a footnote.
