id: LUK.19.17
reference: Luke 19:17
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ· ⸀Εὖγε, ἀγαθὲ δοῦλε, ὅτι ἐν ἐλαχίστῳ πιστὸς ἐγένου, ἴσθι ἐξουσίαν
    ἔχων ἐπάνω δέκα πόλεων.
translation:
  text: And he said to him, “Well done, good servant; because you proved faithful
    in a very small matter, have authority over ten cities.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “slave.” The Greek word is doulos, which can mean either “servant” or
      “slave” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὖγε
  chosen: Well done
  alternatives:
  - Good
  - Excellent
  lexicon: BDAG
  rationale: Idiomatic exclamation of approval; 'Well done' is natural modern English
    and preserves commendation better than a bare 'Good.'
- source_word: ἀγαθὲ
  chosen: good
  alternatives:
  - worthy
  - excellent
  lexicon: BDAG
  rationale: Direct adjectival commendation modifying δοῦλε; 'good' is the straightforward
    lexical equivalent in this vocative address.
- source_word: δοῦλε
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: DOCTRINE.md allows 'servant / slave' context-dependently for δοῦλος.
    In this parabolic setting, the bonded status is present but not theologically
    foregrounded as in self-designations like Rom 1:1; 'servant' reads naturally while
    preserving the master-subordinate relationship. Alternative preserved in footnote
    for auditability.
- source_word: ἐν ἐλαχίστῳ
  chosen: in a very small matter
  alternatives:
  - in very little
  - with a very little thing
  - in the least
  lexicon: BDAG
  rationale: The phrase is idiomatic for faithfulness in something minimal or small.
    'In a very small matter' communicates scope clearly in contemporary English while
    staying close to the Greek.
- source_word: πιστὸς ἐγένου
  chosen: you proved faithful
  alternatives:
  - you were faithful
  - you became faithful
  lexicon: BDAG
  rationale: The combination of πιστός with middle ἐγένου can be rendered more dynamically
    as demonstrated faithfulness. 'You proved faithful' captures the evaluative sense
    in context without overstating aspect.
- source_word: ἴσθι ἐξουσίαν ἔχων
  chosen: have authority
  alternatives:
  - be having authority
  - be in authority
  - take authority
  lexicon: BDAG
  rationale: Periphrastic imperative construction meaning to be in a state of possessing
    authority. 'Have authority' is concise, idiomatic, and preserves the command/result
    sense.
- source_word: ἐπάνω δέκα πόλεων
  chosen: over ten cities
  alternatives:
  - over ten towns
  lexicon: BDAG
  rationale: πόλις is best rendered 'city/cities' here; 'over' correctly reflects
    ἐπάνω in a governance context.
