theological_decisions:
- issue: Nature of the kingdom's expected manifestation
  chosen_reading: Render the crowd's expectation as that the kingdom of God 'was about
    to appear immediately,' without specifying a political, apocalyptic, or spiritual
    form.
  alternative_readings:
  - that the kingdom was about to be established politically
  - that the kingdom was about to be fully revealed eschatologically
  rationale: The verse reports their expectation of imminent manifestation but does
    not define its exact mode. The translation preserves that tension rather than
    importing a specific doctrinal interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
