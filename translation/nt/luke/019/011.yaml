id: LUK.19.11
reference: Luke 19:11
source:
  edition: SBLGNT
  text: Ἀκουόντων δὲ αὐτῶν ταῦτα προσθεὶς εἶπεν παραβολὴν διὰ τὸ ἐγγὺς ⸂εἶναι Ἰερουσαλὴμ
    αὐτὸν⸃ καὶ δοκεῖν αὐτοὺς ὅτι παραχρῆμα μέλλει ἡ βασιλεία τοῦ θεοῦ ἀναφαίνεσθαι·
translation:
  text: As they were hearing these things, he went on and told a parable, because
    he was near Jerusalem and because they supposed that the kingdom of God was about
    to appear immediately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was about to be revealed immediately.' The verb can denote becoming
      visible or manifest.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκουόντων δὲ αὐτῶν ταῦτα
  chosen: As they were hearing these things
  alternatives:
  - While they were hearing these things
  - As they listened to these things
  lexicon: BDAG
  rationale: Genitive absolute with present participle conveys contemporaneous action;
    'As they were hearing' preserves the ongoing sense better than a simple past.
- source_word: προσθεὶς εἶπεν
  chosen: he went on and told
  alternatives:
  - he added and said
  - he proceeded to say
  lexicon: BDAG
  rationale: Idiomatic construction meaning continuation or addition in speech/action.
    'Went on and told' is natural English and fits the following direct introduction
    of a parable.
- source_word: παραβολὴν
  chosen: a parable
  alternatives:
  - an illustration
  lexicon: BDAG
  rationale: Standard Gospel term; 'parable' preserves genre and intertextual consistency.
- source_word: διὰ τὸ ἐγγὺς εἶναι Ἰερουσαλὴμ αὐτὸν
  chosen: because he was near Jerusalem
  alternatives:
  - because he was near to Jerusalem
  - because he was close to Jerusalem
  lexicon: BDAG
  rationale: διά + articular infinitive gives causal force. The construction means
    Jesus was near Jerusalem, not that Jerusalem was near in some abstract sense.
- source_word: δοκεῖν αὐτοὺς
  chosen: they supposed
  alternatives:
  - they thought
  - they assumed
  lexicon: BDAG
  rationale: 'Infinitive coordinated with the previous causal phrase: the parable
    is told because of their expectation. ''Supposed'' captures an opinion or expectation
    without implying certainty.'
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Adverb stressing immediacy; 'immediately' is the clearest modern equivalent.
- source_word: μέλλει ... ἀναφαίνεσθαι
  chosen: was about to appear
  alternatives:
  - was going to appear
  - was about to be revealed
  lexicon: BDAG
  rationale: μέλλω with infinitive expresses imminence; ἀναφαίνεσθαι here denotes
    becoming manifest/appearing. 'Was about to appear' preserves both ideas in idiomatic
    English.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Established and accurate rendering for βασιλεία τοῦ θεοῦ; preserves theological
    and narrative continuity in Luke.
