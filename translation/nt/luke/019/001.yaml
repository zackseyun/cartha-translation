id: LUK.19.1
reference: Luke 19:1
source:
  edition: SBLGNT
  text: Καὶ εἰσελθὼν διήρχετο τὴν Ἰεριχώ.
translation:
  text: And after entering, he was passing through Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And having entered, he was passing through Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing the next event in narrative sequence.
    'And' preserves the simple coordination without adding interpretive nuance.
- source_word: εἰσελθὼν
  chosen: after entering
  alternatives:
  - having entered
  - when he entered
  lexicon: BDAG
  rationale: Aorist active participle of εἰσέρχομαι, temporally prior to the main
    verb. 'After entering' expresses the participle's antecedent action in natural
    English while preserving the sequence.
- source_word: διήρχετο
  chosen: was passing through
  alternatives:
  - passed through
  - was going through
  lexicon: BDAG
  rationale: Imperfect middle/passive form of διέρχομαι in narrative context suggests
    ongoing or in-progress movement. 'Was passing through' preserves the imperfective
    aspect better than the simple past 'passed through.'
- source_word: τὴν Ἰεριχώ
  chosen: Jericho
  lexicon: BDAG
  rationale: Proper place name in the accusative as the object of motion with διέρχομαι.
    English idiom does not require the article here, so it is rendered simply as 'Jericho.'
