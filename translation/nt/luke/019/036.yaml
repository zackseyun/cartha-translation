id: LUK.19.36
reference: Luke 19:36
source:
  edition: SBLGNT
  text: πορευομένου δὲ αὐτοῦ ὑπεστρώννυον τὰ ἱμάτια ⸀ἑαυτῶν ἐν τῇ ὁδῷ.
translation:
  text: And as he went, they were spreading their cloaks on the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments' or 'their outer garments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευομένου δὲ αὐτοῦ
  chosen: as he went
  alternatives:
  - as he was going
  - while he went along
  lexicon: BDAG
  rationale: Genitive absolute with present middle participle of πορεύομαι indicates
    contemporaneous action. 'As he went' is natural modern English and preserves the
    temporal sense without over-literal awkwardness.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    preserves the flow in readable English better than leaving it untranslated, while
    avoiding an overly strong contrast.
- source_word: ὑπεστρώννυον
  chosen: were spreading
  alternatives:
  - spread
  - were laying down
  lexicon: BDAG
  rationale: Imperfect active conveys ongoing/repeated action in the scene. 'Were
    spreading' captures the progressive aspect better than simple past 'spread.'
- source_word: τὰ ἱμάτια ἑαυτῶν
  chosen: their cloaks
  alternatives:
  - their garments
  - their outer garments
  - their robes
  lexicon: BDAG
  rationale: ἱμάτια commonly refers to garments, often outer garments/cloaks. In this
    procession context, 'cloaks' is idiomatic and concrete in English, fitting the
    action of laying them on the road.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - in the road
  - on the way
  lexicon: BDAG
  rationale: With ἐν plus dative, the phrase denotes location. English idiom prefers
    'on the road' for garments laid in Jesus' path. 'On the way' could sound metaphorical,
    so 'on the road' is clearer.
