theological_decisions:
- issue: Whether to preserve the grammatical feminine of πόλις in the pronoun
  chosen_reading: Use 'it' rather than 'her'
  alternative_readings:
  - over her
  rationale: The Greek feminine pronoun agrees grammatically with πόλις, but the verse
    does not explicitly personify Jerusalem in a way that requires 'her' in English.
    'It' is more natural modern English while still conveying Jesus' lament over the
    city. The alternative is worth preserving because some English traditions use
    'her' to highlight the city's personified role in the surrounding lament.
  doctrine_reference: Translation philosophy §6; §5 documented exception/consistency
