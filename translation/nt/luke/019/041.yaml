id: LUK.19.41
reference: Luke 19:41
source:
  edition: SBLGNT
  text: Καὶ ὡς ἤγγισεν, ἰδὼν τὴν πόλιν ἔκλαυσεν ἐπ’ ⸀αὐτήν,
translation:
  text: And as he drew near, seeing the city, he wept over it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over her,' preserving the grammatical feminine of 'the city' and the
      possible personification of Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἤγγισεν
  chosen: as he drew near
  alternatives:
  - when he came near
  - as he approached
  lexicon: BDAG
  rationale: ἐγγίζω means to come near or approach. 'Drew near' is natural English
    and preserves the movement toward Jerusalem without over-specifying the object,
    which is supplied by context.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous or slightly antecedent to the
    main verb here. 'Seeing' keeps the participial flow of the Greek and links his
    perception of the city directly to his emotional response.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - the city of Jerusalem
  lexicon: BDAG
  rationale: πόλις is simply 'city.' Because Jerusalem is already clear from context,
    the translation preserves the Greek's concise expression rather than expanding
    it in the main text.
- source_word: ἔκλαυσεν
  chosen: he wept
  alternatives:
  - he cried
  - he wept bitterly
  lexicon: BDAG
  rationale: κλαίω denotes weeping or crying aloud. 'Wept' is the most idiomatic and
    dignified rendering here, preserving the emotional weight without adding intensity
    not explicit in the verb itself.
- source_word: ἐπ’ αὐτήν
  chosen: over it
  alternatives:
  - for it
  - over her
  lexicon: BDAG
  rationale: With κλαίω, ἐπί plus accusative can express weeping over someone or something.
    'Over it' is the most natural English rendering. 'For it' is possible but less
    direct. Although πόλις is grammatically feminine, English normally refers to a
    city as 'it' unless personification is being foregrounded.
