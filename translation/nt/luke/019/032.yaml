id: LUK.19.32
reference: Luke 19:32
source:
  edition: SBLGNT
  text: ἀπελθόντες δὲ οἱ ἀπεσταλμένοι εὗρον καθὼς εἶπεν αὐτοῖς.
translation:
  text: So those who were sent went away and found it just as he had told them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or simply, ''found,'' with the object understood from the context: the
      colt Jesus had described.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθόντες
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι, indicating the action of leaving/going.
    'Went away' preserves the sense of departure more clearly than the bare 'went,'
    while remaining natural English.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'So' gives a natural English connective
    showing continuation and result from the prior instruction, without overtranslating.
- source_word: οἱ ἀπεσταλμένοι
  chosen: those who were sent
  alternatives:
  - the ones sent
  - the messengers
  - the sent ones
  lexicon: BDAG
  rationale: The articular perfect passive participle functions substantivally. 'Those
    who were sent' is the most transparent and natural rendering, preserving the passive
    idea without importing the more interpretive 'messengers.'
- source_word: εὗρον
  chosen: found it
  alternatives:
  - found
  lexicon: BDAG
  rationale: The Greek verb means 'found.' English idiom commonly supplies the object
    in this context; 'it' refers to the colt mentioned in the surrounding context
    and makes the sentence read naturally without materially altering the sense.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - exactly as
  lexicon: BDAG
  rationale: καθώς introduces comparison/correspondence. 'Just as' communicates the
    precise correspondence between Jesus' words and what they encountered.
- source_word: εἶπεν αὐτοῖς
  chosen: he had told them
  alternatives:
  - he said to them
  - he told them
  lexicon: BDAG
  rationale: λέγω can be rendered 'say' or 'tell' depending on English idiom. Because
    the content of Jesus' prior instruction is in view, 'told them' is more natural.
    The English past perfect 'had told' appropriately reflects prior action relative
    to 'found,' even though the Greek uses the aorist.
