id: LUK.19.18
reference: Luke 19:18
source:
  edition: SBLGNT
  text: καὶ ἦλθεν ὁ δεύτερος λέγων· ⸂Ἡ μνᾶ σου, κύριε⸃, ἐποίησεν πέντε μνᾶς.
translation:
  text: And the second came, saying, ‘Your mina, Lord, has made five minas.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Master.' The Greek κύριε can function as a respectful address to a superior
      in this parable.
    reason: alternative_reading
  - marker: b
    text: A mina was an ancient unit of money.
    reason: cultural_note
  - marker: c
    text: Or 'has made five more minas.' The Greek does not explicitly include 'more,'
      though the sense is implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is naturally rendered 'came' in narrative sequence.
    'Arrived' is possible but less idiomatic here.
- source_word: ὁ δεύτερος
  chosen: the second
  alternatives:
  - the second one
  lexicon: BDAG
  rationale: Ordinal adjective with article refers to the second servant in sequence.
    'The second' is concise and natural English.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing direct speech is commonly rendered 'saying'
    in a moderately formal narrative style; 'and said' would be slightly more dynamic.
- source_word: μνᾶ
  chosen: mina
  alternatives:
  - pound
  lexicon: BDAG
  rationale: A mina is an ancient monetary unit. Transliteration preserves the historical
    specificity better than the traditional but potentially misleading 'pound'.
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: 'Genitive second-person pronoun marks possession: the mina belongs to
    the master, not the servant.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this parable 'Master'
    would fit the social setting, but the project's default favors 'Lord,' and the
    address remains natural in English.
- source_word: ἐποίησεν
  chosen: has made
  alternatives:
  - made
  - earned
  lexicon: BDAG
  rationale: ποιέω here expresses result produced by the mina. 'Has made' captures
    the completed gain with present relevance in the servant's report. 'Earned' is
    interpretive and less literal; simple 'made' is possible but slightly less natural
    in this report formula.
- source_word: πέντε μνᾶς
  chosen: five minas
  alternatives:
  - five more minas
  - five additional minas
  lexicon: BDAG
  rationale: The Greek states the amount produced without an explicit word for 'more/additional.'
    English can supply 'more' from context, but the more transparent rendering keeps
    the Greek wording.
