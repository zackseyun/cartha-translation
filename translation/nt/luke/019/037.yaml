theological_decisions:
- issue: Rendering δύναμις in a miracle context
  chosen_reading: mighty works
  alternative_readings:
  - miracles
  - mighty deeds
  rationale: The term can denote powers, deeds of power, or miracles. 'Mighty works'
    preserves the source's emphasis on divine power manifested in acts, without importing
    a narrower technical gloss where the Greek itself remains broader.
  doctrine_reference: Preserve theological tension rather than resolve it.
