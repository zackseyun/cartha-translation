id: LUK.19.37
reference: Luke 19:37
source:
  edition: SBLGNT
  text: ἐγγίζοντος δὲ αὐτοῦ ἤδη πρὸς τῇ καταβάσει τοῦ Ὄρους τῶν Ἐλαιῶν ἤρξαντο ἅπαν
    τὸ πλῆθος τῶν μαθητῶν χαίροντες αἰνεῖν τὸν θεὸν φωνῇ μεγάλῃ περὶ ⸀πασῶν ὧν εἶδον
    δυνάμεων,
translation:
  text: And as he was already drawing near, at the descent of the Mount of Olives,
    the whole multitude of the disciples began rejoicing to praise God with a loud
    voice for all the mighty works that they had seen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "miracles" or "mighty deeds"; the Greek says "works/powers" and emphasizes
      acts of divine power.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίζοντος ... αὐτοῦ
  chosen: as he was already drawing near
  alternatives:
  - as he approached
  - when he came near
  lexicon: BDAG
  rationale: The genitive absolute sets temporal background. 'Drawing near' preserves
    the verbal aspect and movement more closely than the flatter 'approached,' while
    remaining natural English.
- source_word: πρὸς τῇ καταβάσει
  chosen: at the descent
  alternatives:
  - near the descent
  - at the place of descent
  - on the descent
  lexicon: BDAG
  rationale: The phrase locates Jesus near the downward slope. 'At the descent' is
    concise and reflects the dative construction without over-interpreting the exact
    topography.
- source_word: τοῦ Ὄρους τῶν Ἐλαιῶν
  chosen: the Mount of Olives
  alternatives:
  - the mountain of the olive trees
  lexicon: BDAG
  rationale: Standard English rendering of the place name; names are transliterated/translated
    by established convention for readability.
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Captures the ingressive sense of the middle verb and fits the following
    infinitive construction.
- source_word: ἅπαν τὸ πλῆθος τῶν μαθητῶν
  chosen: the whole multitude of the disciples
  alternatives:
  - the whole crowd of the disciples
  - the entire multitude of the disciples
  lexicon: BDAG
  rationale: πλῆθος denotes a large group/crowd. 'Multitude' preserves the elevated
    narrative tone and avoids implying a random public crowd detached from the disciples.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - joyfully
  - with rejoicing
  lexicon: BDAG
  rationale: The participle expresses attendant manner. 'Rejoicing' keeps the verbal
    force and links naturally to the act of praise.
- source_word: αἰνεῖν τὸν θεὸν
  chosen: to praise God
  alternatives:
  - to give praise to God
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the infinitive phrase.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: A common Semitic/Greek idiom best rendered straightforwardly. 'With a
    loud voice' preserves the concrete expression.
- source_word: περὶ πασῶν ... δυνάμεων
  chosen: for all the mighty works
  alternatives:
  - because of all the miracles
  - concerning all the mighty deeds
  lexicon: BDAG
  rationale: δύναμις in Gospel miracle contexts often refers to acts of power. 'Mighty
    works' preserves the lexical connection to power without narrowing too quickly
    to a technical term, while still communicating miraculous deeds.
- source_word: ὧν εἶδον
  chosen: that they had seen
  alternatives:
  - which they saw
  lexicon: BDAG
  rationale: English past perfect fits the narrative perspective and clarifies that
    these works preceded the present praise.
