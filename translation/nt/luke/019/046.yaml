id: LUK.19.46
reference: Luke 19:46
source:
  edition: SBLGNT
  text: λέγων αὐτοῖς· Γέγραπται· ⸂Καὶ ἔσται⸃ ὁ οἶκός μου οἶκος ⸀προσευχῆς, ὑμεῖς δὲ
    αὐτὸν ἐποιήσατε σπήλαιον λῃστῶν.
translation:
  text: saying to them, “It is written, ‘And my house shall be a house of prayer,’
    but you have made it a den of robbers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “my temple shall be a house of prayer.” The Greek says “my house,” echoing
      Isaiah 56:7.
    reason: lexical_alternative
  - marker: b
    text: “Den of robbers” echoes Jeremiah 7:11; “robbers” may also be rendered “bandits.”
    reason: cross_reference
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present participle linked to the preceding narrative; 'saying' preserves
    the participial flow more closely than converting to a finite verb.
- source_word: Γέγραπται
  chosen: It is written
  alternatives:
  - It stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture;
    idiomatic and preserves the authoritative scriptural citation sense.
- source_word: Καὶ ἔσται
  chosen: And ... shall be
  alternatives:
  - And ... will be
  lexicon: BDAG
  rationale: Retains the wording of the cited Scripture, including the initial conjunction
    καί. 'Shall' fits the elevated register of a formal quotation without becoming
    archaic in context.
- source_word: ὁ οἶκός μου
  chosen: my house
  alternatives:
  - my temple
  lexicon: BDAG
  rationale: οἶκος is literally 'house.' Although the referent is the temple, 'my
    house' preserves the scriptural quotation and its theological force as God's dwelling
    place.
- source_word: οἶκος προσευχῆς
  chosen: a house of prayer
  alternatives:
  - a prayer house
  lexicon: BDAG
  rationale: Natural English rendering of the genitive construction while preserving
    the recognizable scriptural phrase.
- source_word: ὑμεῖς δὲ
  chosen: but you
  alternatives:
  - yet you
  lexicon: BDAG
  rationale: Captures the adversative contrast and the emphatic subject pronoun.
- source_word: ἐποιήσατε
  chosen: have made
  alternatives:
  - made
  lexicon: BDAG
  rationale: English present perfect conveys the resulting state implied in context,
    while remaining natural in direct speech.
- source_word: σπήλαιον
  chosen: den
  alternatives:
  - cave
  lexicon: BDAG
  rationale: 'In the idiom from Jeremiah 7:11, ''den'' is the established and contextually
    apt sense: a hideout or lair, not merely a geological cave.'
- source_word: λῃστῶν
  chosen: robbers
  alternatives:
  - bandits
  lexicon: BDAG
  rationale: λῃστής can denote robber, brigand, or bandit. 'Robbers' preserves the
    familiar prophetic phrase and fits the temple-abuse context without over-specifying
    political insurrection.
