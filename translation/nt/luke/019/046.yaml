theological_decisions:
- issue: Rendering the temple citation with 'house' rather than 'temple'
  chosen_reading: my house ... a house of prayer
  alternative_readings:
  - my temple ... a house of prayer
  rationale: The Greek cites Scripture using οἶκος, and preserving 'house' maintains
    the intertextual link to Isaiah 56:7 and Jeremiah 7:11. This avoids interpretive
    smoothing while still clearly referring to the temple in context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
