theological_decisions:
- issue: Referent of second-person pronouns in Jesus' lament over Jerusalem
  chosen_reading: The singular 'you' is retained, addressing Jerusalem personified.
  alternative_readings:
  - The pronouns could be generalized to the city's inhabitants collectively.
  rationale: The Greek singular pronouns fit the personification of Jerusalem in the
    immediate context. Retaining 'you' preserves the prophetic and poetic force without
    expanding the referent beyond the text.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
