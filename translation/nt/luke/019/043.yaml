id: LUK.19.43
reference: Luke 19:43
source:
  edition: SBLGNT
  text: ὅτι ἥξουσιν ἡμέραι ἐπὶ σὲ καὶ ⸀παρεμβαλοῦσιν οἱ ἐχθροί σου χάρακά σοι καὶ
    περικυκλώσουσίν σε καὶ συνέξουσίν σε πάντοθεν,
translation:
  text: For days will come upon you when your enemies will build an embankment against
    you and surround you and hem you in on every side,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set up a siege rampart against you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content/reason for Jesus' lament and prediction. 'For'
    works naturally in English to connect with the preceding statement while preserving
    causal force.
- source_word: ἥξουσιν ἡμέραι
  chosen: days will come
  alternatives:
  - the days will come
  - days are coming
  lexicon: BDAG
  rationale: A standard idiom for impending future events. 'Days will come' is natural
    and preserves the prophetic tone without over-paraphrase.
- source_word: ἐπὶ σὲ
  chosen: upon you
  alternatives:
  - against you
  - on you
  lexicon: BDAG
  rationale: With temporal idiom 'days will come upon you,' the phrase conveys events
    overtaking Jerusalem. 'Upon you' preserves the idiomatic force and solemnity better
    than flattening it to merely 'against you.'
- source_word: παρεμβαλοῦσιν
  chosen: will build
  alternatives:
  - will set up
  - will cast up
  - will throw up
  lexicon: BDAG
  rationale: In context with χάρακα, the verb refers to constructing siege works.
    'Will build' is clear modern English and avoids archaic military phrasing while
    preserving the action.
- source_word: οἱ ἐχθροί σου
  chosen: your enemies
  lexicon: BDAG
  rationale: Straightforward possessive phrase referring to hostile forces against
    Jerusalem.
- source_word: χάρακά
  chosen: an embankment
  alternatives:
  - a barricade
  - a palisade
  - a siege rampart
  lexicon: BDAG
  rationale: χάραξ in this context denotes a siege work or rampart. 'Embankment' is
    accessible modern English and fits the military context better than the overly
    broad 'barricade' or the more technical 'siege rampart.'
- source_word: σοι
  chosen: against you
  alternatives:
  - around you
  - for you
  lexicon: BDAG
  rationale: 'The dative here is disadvantageous in context: the embankment is constructed
    against Jerusalem. Rendering it explicitly as ''against you'' communicates the
    hostile force implied by the Greek construction.'
- source_word: περικυκλώσουσίν σε
  chosen: surround you
  alternatives:
  - encircle you
  lexicon: BDAG
  rationale: A direct and natural rendering of the military verb. 'Surround' is idiomatic
    and clear.
- source_word: συνέξουσίν σε
  chosen: hem you in
  alternatives:
  - press you hard
  - confine you
  - close in on you
  lexicon: BDAG
  rationale: In this siege context, the verb conveys constricting or pressing in from
    all directions. 'Hem you in' captures the military pressure in readable English.
- source_word: πάντοθεν
  chosen: on every side
  alternatives:
  - from every side
  - all around
  lexicon: BDAG
  rationale: This adverb emphasizes total encirclement. 'On every side' is idiomatic
    and pairs well with 'hem you in.'
