id: LUK.19.44
reference: Luke 19:44
source:
  edition: SBLGNT
  text: καὶ ἐδαφιοῦσίν σε καὶ τὰ τέκνα σου ἐν σοί, καὶ οὐκ ἀφήσουσιν ⸂λίθον ἐπὶ λίθον
    ἐν σοί⸃, ἀνθ’ ὧν οὐκ ἔγνως τὸν καιρὸν τῆς ἐπισκοπῆς σου.
translation:
  text: and they will level you to the ground, and your children within you, and they
    will not leave one stone upon another within you, because you did not recognize
    the time of your visitation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the time of your inspection.' The Greek term can denote a visitation
      or inspection, especially a divine visitation that may bring either mercy or
      judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδαφιοῦσίν
  chosen: will level ... to the ground
  alternatives:
  - will dash down
  - will raze
  - will demolish
  lexicon: BDAG
  rationale: ἐδαφίζω conveys bringing something down to the ground, devastating or
    razing it. 'Level ... to the ground' is idiomatic modern English that preserves
    the force better than a weaker 'destroy.'
- source_word: σε
  chosen: you
  alternatives:
  - your city
  lexicon: BDAG
  rationale: The direct object is second-person singular, addressing Jerusalem personified.
    'You' preserves the rhetoric; specifying 'your city' would over-interpret.
- source_word: τὰ τέκνα σου ἐν σοί
  chosen: your children within you
  alternatives:
  - your children in you
  - your inhabitants within you
  lexicon: BDAG
  rationale: τέκνα literally means 'children.' In context it refers to the people
    within Jerusalem, but the maternal/city-personification image should be preserved
    rather than flattened to 'inhabitants.' 'Within you' renders ἐν σοί naturally
    for a city addressed as a person.
- source_word: οὐκ ἀφήσουσιν λίθον ἐπὶ λίθον ἐν σοί
  chosen: they will not leave one stone upon another within you
  alternatives:
  - they will not leave stone upon stone in you
  - not one stone will be left upon another within you
  lexicon: BDAG
  rationale: This is a standard idiom for total destruction. Adding 'one' makes the
    idiom natural in English while preserving the singular λίθον ... λίθον. 'Within
    you' keeps ἐν σοί explicit, referring again to Jerusalem.
- source_word: ἀνθ’ ὧν
  chosen: because
  alternatives:
  - because of which things
  - in return for which
  - for this reason that
  lexicon: BDAG
  rationale: Here ἀνθ’ ὧν introduces the reason for judgment. 'Because' communicates
    the causal sense clearly in modern English.
- source_word: ἔγνως
  chosen: did not recognize
  alternatives:
  - did not know
  - did not understand
  lexicon: BDAG
  rationale: γινώσκω can mean know/recognize. In this context of failing to perceive
    God's decisive action, 'recognize' best captures the nuance.
- source_word: καιρὸν
  chosen: time
  alternatives:
  - season
  - appointed time
  - opportune time
  lexicon: BDAG
  rationale: καιρός denotes a significant or appointed time. 'Time' is concise and
    natural; the significance is carried by the genitive phrase that follows.
- source_word: τῆς ἐπισκοπῆς σου
  chosen: of your visitation
  alternatives:
  - of your inspection
  - of your oversight
  - when God visited you
  lexicon: BDAG
  rationale: 'ἐπισκοπή can denote visitation, inspection, or oversight, often in a
    divine sense. ''Visitation'' preserves the biblical-theological resonance and
    ambiguity of gracious/divine visitation without over-specifying. The possessive
    ''your'' reflects σου: the visitation pertaining to Jerusalem.'
