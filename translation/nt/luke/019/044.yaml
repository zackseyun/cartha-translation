theological_decisions:
- issue: Meaning of ἐπισκοπή in a judgment context
  chosen_reading: Rendered as 'visitation' with divine-visit nuance left implicit
  alternative_readings:
  - inspection
  - the time when God visited you
  rationale: The term can imply divine visitation for salvation or judgment. The context
    here is judgment on Jerusalem for failing to recognize God's coming in Jesus,
    but the Greek noun itself is broader than an explicit paraphrase. 'Visitation'
    preserves the theological tension rather than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
