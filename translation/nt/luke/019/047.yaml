id: LUK.19.47
reference: Luke 19:47
source:
  edition: SBLGNT
  text: Καὶ ἦν διδάσκων τὸ καθ’ ἡμέραν ἐν τῷ ἱερῷ· οἱ δὲ ἀρχιερεῖς καὶ οἱ γραμματεῖς
    ἐζήτουν αὐτὸν ἀπολέσαι καὶ οἱ πρῶτοι τοῦ λαοῦ,
translation:
  text: And he was teaching day by day in the temple. But the chief priests and the
    scribes, and the leading men of the people, were seeking to destroy him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders of the people.' The Greek phrase is literally 'the first
      ones of the people,' referring to prominent or influential members of the populace.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν διδάσκων
  chosen: he was teaching
  alternatives:
  - he taught
  - he kept teaching
  lexicon: BDAG
  rationale: Periphrastic imperfect conveys ongoing/repeated action in past time.
    'He was teaching' preserves the durative sense without over-paraphrasing.
- source_word: τὸ καθ’ ἡμέραν
  chosen: day by day
  alternatives:
  - every day
  - daily
  lexicon: BDAG
  rationale: Idiomatic expression meaning on a day-by-day basis. 'Day by day' preserves
    the distributive force and reads naturally in English.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'Temple'
    is the standard concise rendering; more specific alternatives are possible but
    not required by the immediate context.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard plural rendering for the priestly leadership class; 'high priests'
    is less idiomatic in English for this collective group.
- source_word: οἱ γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the direct and established rendering of γραμματεῖς. ''Teachers
    of the law'' is interpretive and broader.'
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were trying
  - were looking for a way
  lexicon: BDAG
  rationale: Imperfect indicates ongoing attempt. 'Were seeking' preserves both the
    lexical sense and the aspect.
- source_word: ἀπολέσαι
  chosen: to destroy him
  alternatives:
  - to kill him
  - to put him to death
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean destroy/kill depending on context. Here hostile intent
    toward Jesus is clear; 'destroy him' stays close to the Greek while allowing the
    broader sense that includes lethal removal.
- source_word: οἱ πρῶτοι τοῦ λαοῦ
  chosen: the leading men of the people
  alternatives:
  - the leaders of the people
  - the prominent men of the people
  lexicon: BDAG
  rationale: πρῶτοι literally means 'first ones,' here denoting socially or politically
    prominent persons. 'Leading men' preserves the masculine plural and elite-status
    nuance more closely than the generic 'leaders'.
