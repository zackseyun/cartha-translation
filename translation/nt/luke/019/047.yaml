- issue: Gendered reference in οἱ πρῶτοι τοῦ λαοῦ
  chosen_reading: the leading men of the people
  alternative_readings:
  - the leaders of the people
  rationale: Following the gender-accurate principle, the masculine plural is retained
    rather than neutralized, since the phrase likely refers to male civic notables
    in this historical setting.
