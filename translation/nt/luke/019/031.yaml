theological_decisions:
- issue: Referent and force of Ὁ κύριος
  chosen_reading: Rendered as 'The Lord,' referring to Jesus and preserving the title's
    theological resonance.
  alternative_readings:
  - '''The master,'' referring more generally to an owner or superior'
  rationale: The narrative context in Luke commonly uses κύριος for Jesus, and the
    doctrine default specifies 'Lord' for κύριος. While some readers may hear a more
    immediate practical sense ('master'), the title 'Lord' best reflects both Luke's
    usage and the likely intended referent without overexplaining.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
