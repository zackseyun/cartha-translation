id: LUK.19.31
reference: Luke 19:31
source:
  edition: SBLGNT
  text: καὶ ἐάν τις ὑμᾶς ἐρωτᾷ· Διὰ τί λύετε; οὕτως ⸀ἐρεῖτε ὅτι Ὁ κύριος αὐτοῦ χρείαν
    ἔχει.
translation:
  text: 'And if anyone asks you, ‘Why are you untying it?’ you shall say this: ‘The
    Lord has need of it.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The master has need of it.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτᾷ
  chosen: asks
  alternatives:
  - questions
  lexicon: BDAG
  rationale: Common verb for asking a question; 'asks' is natural modern English and
    fits the direct-speech setting.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic interrogative phrase best rendered simply as 'Why' in English.
- source_word: λύετε
  chosen: are you untying it
  alternatives:
  - are you loosing it
  - are you releasing it
  lexicon: BDAG
  rationale: In context of a tied colt, λύω refers to untying/releasing from its tether.
    'Untying it' is the clearest contextual rendering in modern English. The object
    is implicit in Greek but explicit in English for clarity.
- source_word: οὕτως
  chosen: this
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Introduces the content of the reply. 'You shall say this' is idiomatic
    English; 'thus' would sound stilted.
- source_word: ἐρεῖτε
  chosen: you shall say
  alternatives:
  - you will say
  - say
  lexicon: BDAG
  rationale: Future indicative used imperativally/instructionally. 'You shall say'
    preserves the directive force while remaining natural.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, render as 'Lord.' In this narrative
    context it likely refers to Jesus, and 'Lord' preserves both the title and possible
    theological resonance better than 'master'.
- source_word: αὐτοῦ
  chosen: of it
  alternatives:
  - for it
  - of him
  lexicon: BDAG
  rationale: 'Genitive pronoun most naturally refers to the colt/donkey colt being
    untied: ''has need of it.'' English idiom requires an explicit object. Some construe
    it as ''has need of him,'' but the animal/object reference best fits the immediate
    context.'
- source_word: χρείαν ἔχει
  chosen: has need of
  alternatives:
  - needs
  lexicon: BDAG
  rationale: The idiom literally means 'has need of.' This preserves the wording and
    solemn tone better than the simpler 'needs,' while remaining clear.
