id: LUK.19.20
reference: Luke 19:20
source:
  edition: SBLGNT
  text: καὶ ⸀ὁ ἕτερος ἦλθεν λέγων· Κύριε, ἰδοὺ ἡ μνᾶ σου ἣν εἶχον ἀποκειμένην ἐν σουδαρίῳ·
translation:
  text: And the other came, saying, ‘Lord, look, here is your mina, which I kept laid
    away in a cloth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a handkerchief.” The Greek σουδάριον refers to a cloth, often used
      as a face cloth or handkerchief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἕτερος
  chosen: the other
  alternatives:
  - another one
  - the other one
  lexicon: BDAG
  rationale: ἕτερος here refers to the remaining servant in contrast to the previous
    ones. 'The other' is natural English and preserves the contrast without over-specifying.
- source_word: ἦλθεν λέγων
  chosen: came, saying
  alternatives:
  - came and said
  - arrived, saying
  lexicon: BDAG
  rationale: This participial construction is commonly smoothed in English, but 'came,
    saying' preserves the narrative sequence and speech introduction with only light
    adjustment.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this parable the
    address is to the master figure; 'Master' is possible, but 'Lord' preserves consistency
    with the stated default and remains idiomatic.
- source_word: ἰδοὺ
  chosen: look, here is
  alternatives:
  - behold
  - look
  lexicon: BDAG
  rationale: ἰδού is a deictic attention-getter. 'Look, here is' communicates both
    the call for attention and the presentation of the mina in readable modern English
    better than the archaic 'behold.'
- source_word: ἡ μνᾶ σου
  chosen: your mina
  alternatives:
  - your mina coin
  - your pound
  lexicon: BDAG
  rationale: μνᾶ is an ancient monetary unit. 'Mina' transliterates the term accurately
    without importing misleading modern equivalents; 'pound' reflects older tradition
    rather than the Greek term itself.
- source_word: ἣν εἶχον ἀποκειμένην
  chosen: which I kept laid away
  alternatives:
  - which I had put away
  - which I kept stored away
  - which I was keeping put aside
  lexicon: BDAG
  rationale: 'The imperfect εἶχον with participle ἀποκειμένην expresses a continuing
    state: he had the mina kept in storage. ''Kept laid away'' preserves that durative
    sense better than a simple past ''put away.'''
- source_word: ἐν σουδαρίῳ
  chosen: in a cloth
  alternatives:
  - in a handkerchief
  - in a kerchief
  lexicon: BDAG
  rationale: σουδάριον denotes a cloth used for wiping/sweat, often a handkerchief.
    'In a cloth' is natural and avoids an overly specific modern image while still
    conveying the basic object. The more specific alternative is preserved in a footnote.
