- issue: Rendering of κύριος in direct address within a parable
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Although the referent in-context is the nobleman/master of the parable
    rather than a direct christological confession, the translation follows the project's
    default rendering for κύριος as 'Lord' unless context strongly requires otherwise.
    This preserves consistency and leaves the parable's possible resonance intact
    without importing extra doctrine.
