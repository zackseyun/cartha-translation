id: LUK.19.39
reference: Luke 19:39
source:
  edition: SBLGNT
  text: καί τινες τῶν Φαρισαίων ἀπὸ τοῦ ὄχλου εἶπαν πρὸς αὐτόν· Διδάσκαλε, ἐπιτίμησον
    τοῖς μαθηταῖς σου.
translation:
  text: And some of the Pharisees from the crowd said to him, “Teacher, rebuke your
    disciples.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “out of the crowd.”
    reason: lexical_alternative
  - marker: b
    text: Or “Master, rebuke your disciples.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural pronoun indicating an unspecified subset. 'Some' is
    natural modern English and preserves the partial reference without overformal
    wording.
- source_word: τῶν Φαρισαίων
  chosen: of the Pharisees
  alternatives:
  - from the Pharisees
  lexicon: BDAG
  rationale: Partitive genitive after τινες, indicating that these speakers were a
    subset of the Pharisees. 'Of the Pharisees' best reflects the Greek structure
    in idiomatic English.
- source_word: ἀπὸ τοῦ ὄχλου
  chosen: from the crowd
  alternatives:
  - out of the crowd
  lexicon: BDAG
  rationale: ἀπό marks source/origin; here it locates these Pharisees within the larger
    crowd. 'From the crowd' is concise and natural while preserving the sense.
- source_word: εἶπαν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: BDAG
  rationale: Standard narrative speech formula. 'Said to him' is the most straightforward
    rendering of λέγω with πρός + accusative in this context.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of διδάσκαλος. 'Teacher' is the clearest modern equivalent and
    avoids the potentially misleading authority nuance of 'Master' in contemporary
    English.
- source_word: ἐπιτίμησον
  chosen: rebuke
  alternatives:
  - reprimand
  - silence
  lexicon: BDAG
  rationale: Aorist imperative calling for a direct verbal censure. 'Rebuke' preserves
    the force of the command better than the weaker 'reprimand'; 'silence' is more
    interpretive than the Greek itself.
- source_word: τοῖς μαθηταῖς σου
  chosen: your disciples
  alternatives:
  - your followers
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Gospel contexts to preserve
    the teacher-disciple relationship and established NT usage. The dative after ἐπιτίμησον
    is naturally expressed in English as the direct object of 'rebuke'.
