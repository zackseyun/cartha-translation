theological_decisions:
- issue: Rendering of Διδάσκαλε as a respectful title for Jesus
  chosen_reading: Teacher
  alternative_readings:
  - Master
  rationale: The term here is pedagogical rather than explicitly christological. Rendering
    it 'Teacher' preserves the speakers' address without importing a stronger confessional
    claim than the text states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
