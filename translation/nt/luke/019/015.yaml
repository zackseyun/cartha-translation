id: LUK.19.15
reference: Luke 19:15
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ ἐπανελθεῖν αὐτὸν λαβόντα τὴν βασιλείαν καὶ εἶπεν φωνηθῆναι
    αὐτῷ τοὺς δούλους τούτους οἷς ⸀δεδώκει τὸ ἀργύριον, ἵνα ⸀γνοῖ τί ⸀διεπραγματεύσαντο.
translation:
  text: And it happened, when he returned after receiving the kingdom, that he ordered
    these slaves to whom he had given the money to be called to him, so that he might
    know what they had gained by trading.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants.' The Greek word is doulous, which can mean either 'servants'
      or 'slaves' depending on context; here 'slaves' was chosen to reflect their
      bonded status under the nobleman.
    reason: lexical_alternative
  - marker: b
    text: Or 'what business they had done' or 'what profit they had made.' The Greek
      verb refers to engaging in trade or business and the result of it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Common narrative formula in Luke. 'It happened' preserves the idiomatic
    force without archaic English.
- source_word: ἐν τῷ ἐπανελθεῖν αὐτὸν
  chosen: when he returned
  alternatives:
  - upon his return
  - in his returning
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is naturally temporal here. 'When he
    returned' is idiomatic and accurate.
- source_word: λαβόντα τὴν βασιλείαν
  chosen: after receiving the kingdom
  alternatives:
  - having received the kingdom
  - after taking the kingdom
  lexicon: BDAG
  rationale: The participle is antecedent to the main action. 'Receiving the kingdom'
    fits the political sense in the parable better than the more forceful 'taking.'
    'After' makes the temporal relation clear in English.
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - royal power
  - kingship
  - reign
  lexicon: BDAG
  rationale: In this context the word refers to royal rule received by the nobleman.
    'Kingdom' is the most natural English rendering and matches the narrative setting,
    though 'kingship' is a possible nuance.
- source_word: φωνηθῆναι αὐτῷ
  chosen: to be called to him
  alternatives:
  - to be summoned to him
  - to be brought before him
  lexicon: BDAG
  rationale: Passive infinitive of φωνέω here means to summon/call. 'To be called
    to him' stays close to the Greek while remaining clear.
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'slave' where bonded status is salient.
    In this parable they are under the nobleman's authority and entrusted with his
    assets, so 'slaves' best preserves the social reality.
- source_word: δεδώκει
  chosen: had given
  alternatives:
  - had entrusted
  lexicon: BDAG
  rationale: Pluperfect indicates prior completed action relative to the return. 'Had
    given' is the straightforward lexical sense; the entrusted nuance is conveyed
    by context.
- source_word: ἀργύριον
  chosen: the money
  alternatives:
  - the silver
  - the mina
  lexicon: BDAG
  rationale: The noun literally denotes silver/money. In this verse the focus is on
    the funds previously distributed. 'The money' is clear modern English. 'Mina'
    is more specific from the broader context, but this verse itself uses the generic
    term rather than naming the unit.
- source_word: ἵνα γνοῖ
  chosen: so that he might know
  alternatives:
  - in order that he might learn
  - so that he could find out
  lexicon: BDAG
  rationale: Standard purpose clause with aorist subjunctive. 'Might know' is natural
    and preserves the purposive force.
- source_word: τί
  chosen: what
  alternatives:
  - how much
  lexicon: BDAG
  rationale: Interrogative pronoun introducing the content of what he wanted to know.
    'What' is broad enough to cover the result of their activity without over-specifying.
- source_word: διεπραγματεύσαντο
  chosen: had gained by trading
  alternatives:
  - had accomplished in business
  - had made in trade
  - had profited
  lexicon: BDAG
  rationale: The middle verb refers to engaging in business/trade and achieving a
    result. In context the concern is the profit produced from the entrusted money.
    'Had gained by trading' captures both the commercial activity and its outcome.
