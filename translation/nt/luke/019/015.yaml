theological_decisions:
- issue: Rendering of δοῦλος in a parabolic-economic context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The doctrinal guidance allows 'servant / slave' context-dependently and
    prefers 'slave' where bonded status is salient. Since the nobleman exercises ownership-like
    authority and evaluates their stewardship of his money, 'slaves' better reflects
    the social relation without importing additional theology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
