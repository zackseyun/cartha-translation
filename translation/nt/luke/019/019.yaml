id: LUK.19.19
reference: Luke 19:19
source:
  edition: SBLGNT
  text: εἶπεν δὲ καὶ τούτῳ· Καὶ σὺ ⸂ἐπάνω γίνου⸃ πέντε πόλεων.
translation:
  text: And he said to this one also, ‘And you, be over five cities.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be in authority over five cities' or 'be appointed over five cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in straightforward narrative
    dialogue.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative sequence; 'And' preserves
    the flow without overstating contrast.
- source_word: καὶ τούτῳ
  chosen: to this one also
  alternatives:
  - to this one too
  - to him also
  lexicon: BDAG
  rationale: τούτῳ is demonstrative ('this one'), and καί adds 'also.' Rendering it
    explicitly preserves the distributive pattern from the preceding servant in the
    parable.
- source_word: Καὶ σὺ
  chosen: And you
  alternatives:
  - You also
  - And as for you
  lexicon: BDAG
  rationale: The phrase gives emphatic personal address. 'And you' keeps the directness
    and parallelism of the Greek.
- source_word: ἐπάνω γίνου
  chosen: be over
  alternatives:
  - be in authority over
  - have authority over
  - be appointed over
  lexicon: BDAG
  rationale: The present middle imperative γίνου with ἐπάνω idiomatically conveys
    appointment to a position of authority. 'Be over' is concise and close to the
    Greek, while still natural in English.
- source_word: πέντε πόλεων
  chosen: five cities
  alternatives:
  - five towns
  lexicon: BDAG
  rationale: πόλις normally means 'city.' The genitive depends on ἐπάνω, indicating
    jurisdiction or authority over five cities.
