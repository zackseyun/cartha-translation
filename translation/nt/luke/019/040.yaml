id: LUK.19.40
reference: Luke 19:40
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ⸀εἶπεν· Λέγω ὑμῖν, ⸀ὅτι ἐὰν οὗτοι ⸀σιωπήσουσιν, οἱ λίθοι ⸀κράξουσιν.
translation:
  text: And answering, he said, “I tell you, if these become silent, the stones will
    cry out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fall silent' or 'keep silent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: A participial form meaning 'answering' or 'replying.' Rendered with a
    participial sense to reflect the Greek structure together with the following finite
    verb, while remaining natural in English when paired with 'he said.'
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he answered
  - he replied
  lexicon: BDAG
  rationale: The main finite verb is λέγω, here in aorist, best rendered 'he said.'
    Since ἀποκριθεὶς already carries the responsive nuance, 'he said' avoids redundancy
    while preserving both Greek elements.
- source_word: Λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common emphatic discourse formula in the Gospels. 'I tell you' is idiomatic
    modern English and preserves the direct, authoritative force without sounding
    archaic.
- source_word: ὅτι
  chosen: if
  alternatives:
  - that, if
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what Jesus says and is immediately
    followed by a conditional clause. English normally omits an explicit 'that' before
    'if,' so the sense is best conveyed simply by beginning the clause with 'if.'
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these people
  - these ones
  lexicon: BDAG
  rationale: The demonstrative refers to the disciples/praisers in context. 'These'
    is sufficiently clear and avoids adding interpretive material into the main text.
- source_word: σιωπήσουσιν
  chosen: become silent
  alternatives:
  - are silent
  - keep silent
  - fall silent
  lexicon: BDAG
  rationale: 'Future active of σιωπάω. ''Become silent'' captures the ingressive sense
    naturally in context: if those presently praising cease their speech. ''Keep silent''
    is possible, but ''become silent'' better reflects the shift implied by the condition.'
- source_word: λίθοι
  chosen: the stones
  alternatives:
  - stones
  - the rocks
  lexicon: BDAG
  rationale: λίθοι is literally 'stones.' The article is retained as 'the stones,'
    matching the Greek and preserving the vivid concreteness of the image.
- source_word: κράξουσιν
  chosen: will cry out
  alternatives:
  - will shout
  - will call out
  lexicon: BDAG
  rationale: κράζω denotes a loud cry or outcry. 'Will cry out' is the most natural
    and semantically accurate rendering in this prophetic, vivid context.
