theological_decisions:
- issue: Whether to make the statement explicitly metaphorical or miraculous in the
    main text
  chosen_reading: Retain the literal image 'the stones will cry out' without interpretive
    qualification.
  alternative_readings:
  - the stones would metaphorically testify
  - creation itself would praise God
  rationale: The Greek presents a stark image without explanation. Preserving the
    literal wording maintains the theological and rhetorical force without resolving
    whether Jesus intends hyperbole, prophetic imagery, or miraculous possibility.
  doctrine_reference: Preserve theological tension rather than resolve it.
