id: LUK.19.22
reference: Luke 19:22
source:
  edition: SBLGNT
  text: ⸀λέγει αὐτῷ· Ἐκ τοῦ στόματός σου κρίνω σε, πονηρὲ δοῦλε· ᾔδεις ὅτι ἐγὼ ἄνθρωπος
    αὐστηρός εἰμι, αἴρων ὃ οὐκ ἔθηκα καὶ θερίζων ὃ οὐκ ἔσπειρα;
translation:
  text: He said to him, ‘Out of your own mouth I will judge you, wicked slave. You
    knew that I am a harsh man, taking what I did not lay down and reaping what I
    did not sow?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By your own words I will judge you.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “wicked servant.” Greek: δοῦλος; rendered “slave” here because the bonded
      status is contextually salient.'
    reason: alternative_reading
  - marker: c
    text: Or “taking what I did not deposit” for “lay down.”
    reason: lexical_alternative
  - marker: d
    text: Some English versions render the final clause “reaping where I did not sow,”
      but the Greek here is more literally “reaping what I did not sow.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκ τοῦ στόματός σου
  chosen: Out of your own mouth
  alternatives:
  - By your own words
  - From your own mouth
  lexicon: BDAG
  rationale: A literal rendering preserves the idiom that judgment is based on the
    servant's own statement. Adding 'own' makes explicit the reflexive force natural
    in English without exceeding the Greek sense.
- source_word: κρίνω
  chosen: I will judge
  alternatives:
  - I judge
  - I condemn
  lexicon: BDAG
  rationale: The morphology is future indicative, so 'I will judge' is preferred.
    'Condemn' is too specific, since the verb broadly denotes judging; the context
    may imply condemnation, but the Greek term itself is wider.
- source_word: πονηρὲ
  chosen: wicked
  alternatives:
  - evil
  - bad
  lexicon: BDAG
  rationale: '''Wicked'' best conveys moral blame in direct address. ''Bad'' is too
    weak, and ''evil'' is possible but slightly less idiomatic here in modern English.'
- source_word: δοῦλε
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'slave' where bonded status is salient.
    In this parabolic master-slave setting, the hierarchical and owned relationship
    is foregrounded, so 'slave' is more accurate than 'servant'.
- source_word: ᾔδεις
  chosen: You knew
  alternatives:
  - Did you know
  - You had known
  lexicon: BDAG
  rationale: The form is imperfect/pluperfect in sense from οἶδα, but in context it
    functions naturally as 'You knew.' This fits the master's rhetorical use of the
    slave's own claim.
- source_word: αὐστηρός
  chosen: harsh
  alternatives:
  - strict
  - severe
  - austere
  lexicon: BDAG
  rationale: '''Harsh'' best captures the negative, demanding character attributed
    by the slave. ''Austere'' is too archaic in contemporary English; ''strict'' may
    sound more neutral than the context suggests.'
- source_word: αἴρων
  chosen: taking
  alternatives:
  - taking up
  - collecting
  lexicon: BDAG
  rationale: The participle is rendered with a simple English participle to mirror
    the Greek structure. 'Taking' is broad enough to fit the accusation of appropriating
    what was not one's own.
- source_word: ὃ οὐκ ἔθηκα
  chosen: what I did not lay down
  alternatives:
  - what I did not deposit
  - what I did not place
  lexicon: BDAG
  rationale: τίθημι here likely refers to putting down or depositing. 'Lay down' preserves
    the verbal imagery and avoids over-interpreting as a technical financial deposit,
    though that nuance is possible in context.
- source_word: θερίζων
  chosen: reaping
  alternatives:
  - harvesting
  lexicon: BDAG
  rationale: '''Reaping'' is the standard and natural rendering, especially paired
    with ''sow,'' preserving the agricultural metaphor.'
- source_word: ὃ οὐκ ἔσπειρα
  chosen: what I did not sow
  alternatives:
  - where I did not sow
  lexicon: BDAG
  rationale: The relative pronoun is accusative neuter ('what'), matching the first
    clause structurally. Some English tradition uses 'where I did not sow,' likely
    by assimilation to parallel sayings, but 'what I did not sow' more closely follows
    this Greek text.
