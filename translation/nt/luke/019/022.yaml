theological_decisions:
- issue: Rendering δοῦλος in a parabolic master-slave context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse depicts a socially subordinate figure under a master in a way
    that makes bonded status salient. Following the doctrine's contested-terms guidance,
    'slave' better preserves the force of δοῦλος here.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος; Translation philosophy
    §1'
- issue: Whether the master's self-description should be translated as an affirmed
    fact or as the servant's reported characterization
  chosen_reading: The wording is retained as the master's rhetorical citation of the
    servant's claim without adding interpretive qualifiers in the main text.
  alternative_readings:
  - You claim that I am a harsh man
  - If you knew that I am a harsh man
  rationale: The Greek presents the statement directly after 'You knew that...,' and
    the translation preserves that form. Because this is within a parable and may
    function rhetorically, the translation avoids importing a theological judgment
    about the nobleman's moral character beyond the text itself.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
