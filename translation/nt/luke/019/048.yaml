id: LUK.19.48
reference: Luke 19:48
source:
  edition: SBLGNT
  text: καὶ οὐχ ⸀εὕρισκον τὸ τί ποιήσωσιν, ὁ λαὸς γὰρ ἅπας ἐξεκρέματο αὐτοῦ ἀκούων.
translation:
  text: And they could not find what they might do, because all the people were hanging
    on his words as they listened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all the people were hanging on him, listening.' The
      Greek idiom expresses intense, eager attention to Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ εὕρισκον
  chosen: could not find
  alternatives:
  - were not finding
  - did not find
  lexicon: BDAG
  rationale: Imperfect εὕρισκον with negation conveys ongoing inability or failure
    to discover a course of action. 'Could not find' captures the practical sense
    in idiomatic English better than a wooden 'were not finding.'
- source_word: τὸ τί ποιήσωσιν
  chosen: what they might do
  alternatives:
  - what to do
  - what they should do
  lexicon: BDAG
  rationale: 'The articular infinitive-like construction with τί plus aorist subjunctive
    expresses the content of what they were seeking: a course of action. ''What they
    might do'' preserves the deliberative nuance more closely than the flatter ''what
    to do.'''
- source_word: ὁ λαὸς γὰρ ἅπας
  chosen: because all the people
  alternatives:
  - for the whole people
  - for all the crowd
  lexicon: BDAG
  rationale: 'γάρ gives the reason for their inability; ''because'' makes that causal
    force explicit in natural English. λαός is best rendered ''people'' here, and
    ἅπας intensifies comprehensiveness: ''all the people.'''
- source_word: ἐξεκρέματο αὐτοῦ
  chosen: were hanging on his words
  alternatives:
  - were hanging on him
  - were clinging to him
  lexicon: BDAG
  rationale: The idiom ἐκκρέμαμαι with a genitive can mean to hang upon someone in
    absorbed attention. In English, 'hanging on his words' communicates the sense
    clearly; the object 'words' is supplied idiomatically from the listening context
    rather than left as the less natural 'hanging on him.'
- source_word: ἀκούων
  chosen: as they listened
  alternatives:
  - listening
  - while listening to him
  lexicon: BDAG
  rationale: The present participle explains the manner of the people's absorbed attention.
    'As they listened' gives smooth English and reflects the contemporaneous action.
    The plural subject is carried over from the collective singular 'the people' in
    idiomatic English.
