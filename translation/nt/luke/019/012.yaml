theological_decisions:
- issue: βασιλείαν nuance in a politically charged parable with possible allusion
    to receiving royal authority
  chosen_reading: a kingdom
  alternative_readings:
  - kingship
  - royal power
  rationale: The term can denote either realm or royal rule. Here the nobleman goes
    away in order to receive recognized royal status and then come back. 'A kingdom'
    preserves the familiar and natural English expression while leaving the broader
    semantic range intact; alternatives are preserved because the nuance affects interpretation
    of the parable's political imagery.
  doctrine_reference: Translation philosophy §3, §5
