id: LUK.19.12
reference: Luke 19:12
source:
  edition: SBLGNT
  text: εἶπεν οὖν· Ἄνθρωπός τις εὐγενὴς ἐπορεύθη εἰς χώραν μακρὰν λαβεῖν ἑαυτῷ βασιλείαν
    καὶ ὑποστρέψαι.
translation:
  text: So he said, “A certain nobleman went to a distant country to receive a kingdom
    for himself and then return.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kingship” or “royal power.” The Greek βασιλείαν can refer to the kingdom
      itself or to royal rule/authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation. 'So' is natural modern English
    and preserves the inferential/sequential force without sounding wooden.
- source_word: Ἄνθρωπός τις
  chosen: A certain
  alternatives:
  - A man
  - A certain man
  lexicon: BDAG
  rationale: The combination introduces an indefinite character in a parabolic setting.
    Because εὐγενής immediately specifies status, 'A certain nobleman' is smoother
    than 'A certain man, noble...,' while still reflecting the indefinite introduction.
- source_word: εὐγενὴς
  chosen: nobleman
  alternatives:
  - man of noble birth
  - noble person
  lexicon: BDAG
  rationale: Refers to one of high birth/status. 'Nobleman' is idiomatic and fits
    the masculine singular referent and the royal context of receiving a kingdom.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: BDAG
  rationale: Aorist middle/passive-form deponent with straightforward movement sense.
    'Went' is the clearest natural rendering in English.
- source_word: εἰς χώραν μακρὰν
  chosen: to a distant country
  alternatives:
  - into a far country
  - to a far-off land
  lexicon: BDAG
  rationale: Denotes travel to a far region. 'Distant country' is readable modern
    English and preserves the geographical remoteness.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to obtain
  - to take
  lexicon: BDAG
  rationale: In this political context the sense is to receive royal authority/kingdom
    status, not to seize it. 'Receive' best matches the infinitive's force here.
- source_word: ἑαυτῷ
  chosen: for himself
  alternatives:
  - for his own part
  - for himself personally
  lexicon: BDAG
  rationale: The reflexive dative indicates that the kingdom is received for his own
    possession/status. 'For himself' is the natural English equivalent.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - royal power
  - kingship
  lexicon: BDAG
  rationale: βασιλεία can denote reign, kingship, or kingdom. In this allusive parabolic
    setting, 'receive a kingdom' is the most idiomatic English and matches the political
    scenario of being granted royal rule.
- source_word: ὑποστρέψαι
  chosen: return
  alternatives:
  - come back
  lexicon: BDAG
  rationale: Aorist infinitive coordinated with λαβεῖν, expressing subsequent action.
    'Return' is concise and appropriately formal for the narrative.
