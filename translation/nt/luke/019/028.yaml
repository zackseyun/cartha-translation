id: LUK.19.28
reference: Luke 19:28
source:
  edition: SBLGNT
  text: Καὶ εἰπὼν ταῦτα ἐπορεύετο ἔμπροσθεν ἀναβαίνων εἰς Ἱεροσόλυμα.
translation:
  text: And after saying these things, he went on ahead, going up to Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next event in sequence. 'And' preserves
    the narrative flow without adding interpretive nuance.
- source_word: εἰπὼν
  chosen: after saying
  alternatives:
  - having said
  - when he had said
  lexicon: BDAG
  rationale: Aorist participle of λέγω, temporally prior to the main verb. 'After
    saying' gives natural English while preserving the participial sense of antecedent
    action.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: Plural demonstrative referring back to the preceding discourse. 'These
    things' is a natural and sufficiently broad rendering that does not narrow the
    reference to words alone.
- source_word: ἐπορεύετο
  chosen: he went on
  alternatives:
  - he was going
  - he proceeded
  - he journeyed
  lexicon: BDAG
  rationale: Imperfect middle/passive form of πορεύομαι in narrative context. 'He
    went on' captures continued movement in the storyline more idiomatically than
    the more wooden 'he was going,' while avoiding overtranslation.
- source_word: ἔμπροσθεν
  chosen: ahead
  alternatives:
  - before them
  - in front
  - forward
  lexicon: BDAG
  rationale: Adverb meaning 'ahead' or 'in front.' In context, Jesus is moving before
    the others on the road. 'Ahead' is concise and natural English.
- source_word: ἀναβαίνων
  chosen: going up
  alternatives:
  - ascending
  - as he went up
  lexicon: BDAG
  rationale: Present participle indicating accompanying action. 'Going up' preserves
    the literal travel idiom used for ascent to Jerusalem, which is both geographically
    and theologically resonant in Luke's narrative.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς with a place name commonly denotes movement toward/destination. 'To
    Jerusalem' is the most natural English rendering here; 'into Jerusalem' would
    suggest entry rather than approach, which the verse does not require.
