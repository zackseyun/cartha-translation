theological_decisions:
- issue: Whether to preserve the literal ascent language to Jerusalem
  chosen_reading: Render ἀναβαίνων literally as 'going up' rather than flattening
    it to 'traveling' or omitting it.
  alternative_readings:
  - traveling to Jerusalem
  - on the way to Jerusalem
  rationale: Luke intentionally uses ascent language for Jerusalem. While geographically
    natural, it also fits the narrative significance of Jesus' approach to the city.
    Retaining 'going up' preserves the source text's wording and theological texture
    without importing extra meaning.
  doctrine_reference: Translation philosophy §§1, 3, 5
