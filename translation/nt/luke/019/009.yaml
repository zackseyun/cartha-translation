theological_decisions:
- issue: Meaning of 'son of Abraham'
  chosen_reading: The phrase is retained as a covenantal/identity expression without
    specifying whether Jesus means ethnic descent, faithful belonging within Abraham's
    line, or both.
  alternative_readings:
  - ethnic descendant of Abraham
  - true member of Abraham's faith-family
  rationale: The verse itself does not force a narrow doctrinal resolution. Preserving
    the idiom maintains the theological tension and lets the immediate Lukan context
    inform interpretation without importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
