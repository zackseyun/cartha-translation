id: LUK.19.9
reference: Luke 19:9
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτὸν ὁ Ἰησοῦς ὅτι Σήμερον σωτηρία τῷ οἴκῳ τούτῳ ἐγένετο, καθότι
    καὶ αὐτὸς υἱὸς Ἀβραάμ ἐστιν·
translation:
  text: And Jesus said to him, “Today salvation has come to this house, because he
    too is a son of Abraham.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to this household.” The Greek word can refer to the house itself or
      the household associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  - Now ... said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' preserves the narrative flow without overstating
    contrast or sequence.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - to Zacchaeus
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek; 'to him' is the direct translation.
    Naming Zacchaeus would clarify but would add information not present in this verse.
- source_word: Σήμερον
  chosen: Today
  alternatives:
  - This day
  lexicon: BDAG
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    temporal emphasis at the front of the clause.'
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία in Luke commonly carries theological weight beyond mere rescue;
    'salvation' best preserves that sense in readable modern English.
- source_word: τῷ οἴκῳ τούτῳ
  chosen: to this house
  alternatives:
  - for this house
  - to this household
  - for this household
  lexicon: BDAG
  rationale: The dative with ἐγένετο can be rendered 'to this house/household.' 'House'
    is retained in the main text because it is the direct lexical equivalent of οἶκος
    and can naturally include the household. The broader social sense is worth preserving
    in a footnote.
- source_word: ἐγένετο
  chosen: has come
  alternatives:
  - has happened
  - has come about
  - came
  lexicon: BDAG
  rationale: Although γίνομαι literally means 'became/came to be/happened,' in this
    idiom with σωτηρία English 'has come' best conveys the arrival of salvation in
    idiomatic yet faithful form.
- source_word: καθότι
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: BDAG
  rationale: The conjunction gives the reason for Jesus' declaration; 'because' is
    the clearest modern rendering.
- source_word: καὶ αὐτὸς
  chosen: he too
  alternatives:
  - he also
  - even he
  lexicon: BDAG
  rationale: The combination emphasizes inclusion; 'he too' captures the force naturally
    in English.
- source_word: υἱὸς Ἀβραάμ
  chosen: a son of Abraham
  alternatives:
  - a descendant of Abraham
  - a child of Abraham
  lexicon: BDAG
  rationale: The singular masculine expression is preserved as 'son of Abraham' in
    keeping with gender-accurate translation philosophy and the likely covenantal/identity
    resonance. Alternatives flatten the idiom or reduce its rhetorical force.
