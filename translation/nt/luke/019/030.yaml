theological_decisions:
- issue: Gendered force of ἀνθρώπων
  chosen_reading: Rendered as 'men' in the phrase 'no one among men has ever sat'
  alternative_readings:
  - '''no one has ever sat on it'''
  - '''no human being has ever sat on it'''
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural ἀνθρώπων is not flattened without notice. The phrase is somewhat
    wooden in English, but it preserves the source's explicit human reference. A smoother
    inclusive alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Specific identification of πῶλον
  chosen_reading: Rendered as 'colt' rather than 'young donkey' in the main text
  alternative_readings:
  - '''young donkey'''
  - '''foal'''
  rationale: Luke's Greek says πῶλος, a young animal, without explicitly naming the
    species in this verse. Because the broader Gospel context and parallels identify
    it as a donkey, that clarification is suitable for a footnote rather than the
    main text, preserving original-language primacy.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
