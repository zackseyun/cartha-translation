id: LUK.19.30
reference: Luke 19:30
source:
  edition: SBLGNT
  text: ⸀λέγων· Ὑπάγετε εἰς τὴν κατέναντι κώμην, ἐν ᾗ εἰσπορευόμενοι εὑρήσετε πῶλον
    δεδεμένον, ἐφ’ ὃν οὐδεὶς πώποτε ἀνθρώπων ἐκάθισεν, ⸀καὶ λύσαντες αὐτὸν ἀγάγετε.
translation:
  text: saying, “Go into the village opposite you, in which, as you enter, you will
    find a colt tied up, on which no one among men has ever sat. Untie it and bring
    it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a young donkey.' The Greek word means a young animal, and in the triumphal-entry
      context it refers to a donkey colt.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on which no one among men has ever sat'; more idiomatically,
      'on which no human being has ever sat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Proceed
  lexicon: BDAG
  rationale: Imperative of movement; simple 'Go' is natural modern English and fits
    the command without adding nuance.
- source_word: κατέναντι
  chosen: opposite you
  alternatives:
  - opposite
  - across from you
  - facing you
  lexicon: BDAG
  rationale: The adverb indicates the village lying opposite the speakers. 'Opposite
    you' preserves the relational sense more clearly than bare 'opposite'.
- source_word: κώμην
  chosen: village
  alternatives:
  - hamlet
  - settlement
  lexicon: BDAG
  rationale: Standard rendering for a small rural inhabited place; 'village' is idiomatic
    and accurate.
- source_word: ἐν ᾗ εἰσπορευόμενοι
  chosen: in which, as you enter
  alternatives:
  - where, upon entering
  - in it, when you go in
  lexicon: BDAG
  rationale: The participle is temporal/circumstantial. 'As you enter' gives clear
    English while preserving the sense of entering the village.
- source_word: εὑρήσετε
  chosen: you will find
  alternatives:
  - you will come upon
  lexicon: BDAG
  rationale: Straightforward future indicative; 'find' is the normal equivalent.
- source_word: πῶλον
  chosen: a colt
  alternatives:
  - a young donkey
  - a foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this triumphal-entry context it
    is specifically a donkey colt by parallel context, but Luke's word itself is broader.
    'Colt' preserves the Greek wording without over-specifying in the main text.
- source_word: δεδεμένον
  chosen: tied up
  alternatives:
  - tied
  - bound
  lexicon: BDAG
  rationale: Perfect passive participle indicating the colt is in a tied state. 'Tied
    up' is natural English and conveys the resultant condition.
- source_word: ἐφ’ ὃν
  chosen: on which
  alternatives:
  - upon which
  lexicon: BDAG
  rationale: Literal and clear rendering of the prepositional relative phrase.
- source_word: οὐδεὶς πώποτε ἀνθρώπων
  chosen: no one among men has ever
  alternatives:
  - no person has ever
  - no human being has ever
  - none of men has ever
  lexicon: BDAG
  rationale: The genitive ἀνθρώπων is partitive after οὐδείς. To remain gender-accurate
    to the Greek while still readable, 'no one among men' preserves the masculine/plural
    human reference better than a fully neutral paraphrase.
- source_word: ἐκάθισεν
  chosen: sat
  alternatives:
  - sat on
  - mounted
  lexicon: BDAG
  rationale: The verb is simply 'sat'; the object of sitting is already supplied by
    ἐφ’ ὃν. Adding 'mounted' would interpret beyond the wording.
- source_word: λύσαντες αὐτὸν
  chosen: Untie it
  alternatives:
  - Loose it
  - Release it
  lexicon: BDAG
  rationale: 'Aorist participle with imperative force in sequence: first untie, then
    bring. ''Untie it'' is the clearest modern equivalent.'
- source_word: ἀγάγετε
  chosen: bring it
  alternatives:
  - lead it here
  - bring it here
  lexicon: BDAG
  rationale: Imperative of ἄγω. 'Bring it' is concise and accurate; 'here' is implied
    by context but not explicit in this verse, so it is omitted.
