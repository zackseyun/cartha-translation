theological_decisions:
- issue: Scope of ἱερόν in relation to Jesus' temple action
  chosen_reading: Rendered as 'temple' in the main text, understood as the broader
    temple precincts rather than the inner sanctuary.
  alternative_readings:
  - temple courts
  - temple precincts
  - sanctuary
  rationale: The Greek term ἱερόν normally denotes the temple complex. Using 'temple'
    keeps the translation readable while not importing a narrower picture of the inner
    shrine. A footnote preserves the more precise alternative.
  doctrine_reference: Translation philosophy §1, §6
