id: LUK.19.45
reference: Luke 19:45
source:
  edition: SBLGNT
  text: Καὶ εἰσελθὼν εἰς τὸ ἱερὸν ἤρξατο ἐκβάλλειν τοὺς ⸀πωλοῦντας,
translation:
  text: And after entering the temple, he began to drive out those who were selling,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple precincts' or 'the temple courts'; Greek ἱερόν refers to
      the temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: after entering
  alternatives:
  - having entered
  - when he entered
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After entering' is clear modern English and preserves the
    sequence without over-literal awkwardness.
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - temple courts
  - temple precincts
  - sanctuary
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple' is the standard concise rendering; 'temple courts/precincts'
    is more explicit but slightly interpretive. A footnote preserves the more precise
    spatial nuance.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι with an infinitive is straightforwardly
    'began.' This preserves the narrative aspect that the action commenced at this
    point.
- source_word: ἐκβάλλειν
  chosen: to drive out
  alternatives:
  - to cast out
  - to throw out
  - to expel
  lexicon: BDAG
  rationale: ἐκβάλλω is forceful. 'Drive out' communicates decisive removal in natural
    English without sounding overly archaic ('cast out') or too colloquial ('throw
    out').
- source_word: πωλοῦντας
  chosen: those who were selling
  alternatives:
  - the sellers
  - those selling
  lexicon: BDAG
  rationale: The present participle denotes the people engaged in selling. 'Those
    who were selling' captures the ongoing activity and reads naturally in English.
    It also avoids prematurely specifying what they were selling, which this verse
    does not state.
