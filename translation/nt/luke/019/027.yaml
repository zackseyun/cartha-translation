id: LUK.19.27
reference: Luke 19:27
source:
  edition: SBLGNT
  text: πλὴν τοὺς ἐχθρούς μου ⸀τούτους τοὺς μὴ θελήσαντάς με βασιλεῦσαι ἐπ’ αὐτοὺς
    ἀγάγετε ὧδε καὶ κατασφάξατε ⸀αὐτοὺς ἔμπροσθέν μου.
translation:
  text: But as for these enemies of mine, who did not want me to reign over them,
    bring them here and slaughter them in front of me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were unwilling for me to reign over them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'slay them before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But as for
  alternatives:
  - But
  - Nevertheless
  - Except that
  lexicon: BDAG
  rationale: Here πλήν marks a strong transition to a final, climactic item in the
    nobleman's speech. 'But as for' captures the adversative and topical force more
    naturally than a bare 'but.'
- source_word: ἐχθρούς
  chosen: enemies
  alternatives:
  - foes
  lexicon: BDAG
  rationale: Standard rendering for ἐχθρός in personal opposition contexts; clear
    and natural in modern English.
- source_word: τούτους
  chosen: these
  alternatives:
  - these here
  lexicon: BDAG
  rationale: The demonstrative adds specificity and emphasis to 'enemies'; 'these'
    preserves that force without awkwardness.
- source_word: τοὺς μὴ θελήσαντάς με βασιλεῦσαι ἐπ’ αὐτοὺς
  chosen: who did not want me to reign over them
  alternatives:
  - who were unwilling for me to reign over them
  - who did not want me to be king over them
  lexicon: BDAG
  rationale: The articular participial phrase is naturally rendered as a relative
    clause. θέλω is best expressed as 'want' here. βασιλεύω means 'to reign, rule
    as king'; 'reign over' preserves the verbal sense better than the more nominal
    'be king over,' though that remains a viable alternative.
- source_word: ἀγάγετε ὧδε
  chosen: bring them here
  alternatives:
  - lead them here
  lexicon: BDAG
  rationale: ἄγω can mean 'lead' or 'bring'; in this command context 'bring them here'
    is idiomatic and fits the direct object plus destination adverb ὧδε.
- source_word: κατασφάξατε
  chosen: slaughter
  alternatives:
  - kill
  - execute
  - slay
  lexicon: BDAG
  rationale: κατασφάζω is stronger and more graphic than a generic 'kill.' 'Slaughter'
    preserves the severity of the verb without archaic diction. 'Execute' would import
    judicial nuance not explicit in the verb itself.
- source_word: ἔμπροσθέν μου
  chosen: in front of me
  alternatives:
  - before me
  - in my presence
  lexicon: BDAG
  rationale: The phrase denotes spatial/personal presence. 'In front of me' is vivid,
    natural English and preserves the scene's force; 'before me' is possible but slightly
    more formal and potentially less concrete.
