theological_decisions:
- issue: Speaker reference within the parable
  chosen_reading: Translate the nobleman's command directly without softening its
    violence or explicitly identifying it with Jesus' own direct command outside the
    parable.
  alternative_readings:
  - Render in a way that distances the statement more overtly as merely parabolic
    imagery
  rationale: The Greek presents the nobleman speaking within the parable, and the
    translation should preserve that narrative force without adding interpretive hedges.
    At the same time, the wording should not import theological conclusions beyond
    the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
