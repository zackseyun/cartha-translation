theological_decisions:
- issue: Referent of κύριος in the disciples' reply
  chosen_reading: Rendered as 'The Lord,' understood in context as referring to Jesus.
  alternative_readings:
  - The master, referring to the colt's owner
  rationale: The immediate Lukan context presents this phrase as the prearranged explanation
    Jesus gave his disciples to use, and Luke commonly uses κύριος for Jesus. Because
    κύριος can also mean 'master/owner,' the alternative is preserved in a footnote
    rather than resolved dogmatically beyond the narrative context.
  doctrine_reference: 'Contested terms: κύριος → Lord; preserve ambiguity where genuine'
