id: LUK.19.34
reference: Luke 19:34
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν ⸀ὅτι Ὁ κύριος αὐτοῦ χρείαν ἔχει.
translation:
  text: And they said, “The Lord has need of it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The master has need of it,” if κύριος is taken in the sense of owner/master
      rather than as a title for Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - But they
  - So they
  lexicon: BDAG
  rationale: δέ is a mild connective; in natural English narrative flow, 'And' best
    carries the continuation without overstating contrast. The article οἱ functions
    substantivally for the previously mentioned speakers, hence 'they.'
- source_word: εἶπαν
  chosen: said
  alternatives:
  - answered
  - told
  lexicon: BDAG
  rationale: Aorist of λέγω is straightforwardly rendered 'said' here; the context
    is direct speech in reply, but 'answered' would add a nuance not explicit in the
    verb itself.
- source_word: ὅτι
  chosen: '[represented by quotation punctuation and omitted as a separate English
    word]'
  alternatives:
  - that
  lexicon: BDAG
  rationale: ὅτι introduces direct discourse. In idiomatic English, direct quotation
    marks convey this function more naturally than an explicit 'that.'
- source_word: Ὁ κύριος
  chosen: The Lord
  alternatives:
  - The master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this narrative
    it may refer either to Jesus or to the colt's owner/master, but the Gospel context
    strongly points to Jesus, and the established default title should be preserved
    in the main text.
- source_word: αὐτοῦ
  chosen: of it
  alternatives:
  - of him
  - of this colt
  lexicon: BDAG
  rationale: The genitive pronoun most naturally refers to the colt just mentioned.
    English idiom requires an object complement with 'need,' so 'of it' is the clearest
    rendering. 'Of him' would misleadingly personalize the animal, while 'of this
    colt' would be more explicit than the Greek.
- source_word: χρείαν ἔχει
  chosen: has need
  alternatives:
  - needs
  lexicon: BDAG
  rationale: The idiom literally means 'has need.' This preserves the Greek expression
    while remaining natural English. 'Needs it' is possible, but 'has need of it'
    better reflects the source wording and solemn tone.
