id: LUK.19.8
reference: Luke 19:8
source:
  edition: SBLGNT
  text: σταθεὶς δὲ Ζακχαῖος εἶπεν πρὸς τὸν κύριον· Ἰδοὺ τὰ ⸀ἡμίσιά ⸂μου τῶν ὑπαρχόντων⸃,
    κύριε, ⸂τοῖς πτωχοῖς δίδωμι⸃, καὶ εἴ τινός τι ἐσυκοφάντησα ἀποδίδωμι τετραπλοῦν.
translation:
  text: But Zacchaeus stood and said to the Lord, “Look, Lord, I give half of my possessions
    to the poor, and if I have extorted anything from anyone, I repay it fourfold.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if I have defrauded anyone of anything.' The Greek verb can refer to
      extortion, exploitation, or defrauding, sometimes by false accusation.
    reason: lexical_alternative
  - marker: b
    text: The Greek present-tense verbs can also be understood as 'I will give' and
      'I will repay,' expressing immediate resolve.
    reason: alternative_reading
lexical_decisions:
- source_word: σταθεὶς
  chosen: stood
  alternatives:
  - stopped
  - stood up
  lexicon: BDAG
  rationale: Aorist passive participle of ἵστημι used intransitively here; 'stood'
    is the most natural concise English and preserves the narrative action without
    overinterpreting posture.
- source_word: κύριον / κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, render as 'Lord.' In Luke this can carry
    respectful address and, in context of Jesus, appropriately preserves the title
    without flattening it to mere politeness.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Introduces emphatic attention-getting speech. 'Look' is readable modern
    English and preserves the force better than archaic 'behold.'
- source_word: τὰ ἡμίσιά μου τῶν ὑπαρχόντων
  chosen: half of my possessions
  alternatives:
  - half of my goods
  - half of what belongs to me
  lexicon: BDAG
  rationale: ὑπάρχοντα in this context refers to property/possessions. 'Half of my
    possessions' is idiomatic and accurately reflects the partitive sense of the phrase.
- source_word: τοῖς πτωχοῖς
  chosen: to the poor
  alternatives:
  - to poor people
  - to the needy
  lexicon: BDAG
  rationale: Standard substantive use of πτωχός. 'The poor' is natural English and
    preserves the social-economic reference.
- source_word: δίδωμι
  chosen: I give
  alternatives:
  - I am giving
  - I will give
  lexicon: BDAG
  rationale: 'Present indicative most straightforwardly rendered as present: ''I give.''
    This preserves the Greek form and leaves the debated nuance (present practice
    vs immediate resolve) untranslated rather than resolved in the main text.'
- source_word: εἴ τινός τι
  chosen: if I have extorted anything from anyone
  alternatives:
  - if I have defrauded anyone of anything
  - if I have taken anything from anyone by false accusation
  lexicon: BDAG
  rationale: The indefinite construction means 'if from anyone anything.' English
    idiom reverses the order. 'Anything from anyone' is clear and complete.
- source_word: ἐσυκοφάντησα
  chosen: have extorted
  alternatives:
  - have defrauded
  - have cheated by false accusation
  lexicon: BDAG
  rationale: συκοφαντέω can denote extorting, exploiting, or defrauding, often by
    abuse of power or false accusation. 'Extorted' best fits Zacchaeus as a chief
    tax collector and the restitution context, while a footnote preserves 'defrauded'
    as a viable alternative.
- source_word: ἀποδίδωμι
  chosen: I repay
  alternatives:
  - I restore
  - I pay back
  lexicon: BDAG
  rationale: The verb means to give back/repay. 'I repay' is concise and fits the
    legal-restitution sense in context.
- source_word: τετραπλοῦν
  chosen: fourfold
  alternatives:
  - four times as much
  - four times over
  lexicon: BDAG
  rationale: Traditional and precise rendering of the adverbial accusative indicating
    quadruple restitution.
