theological_decisions:
- issue: Force of the present-tense verbs δίδωμι and ἀποδίδωμι
  chosen_reading: Render as simple present ('I give ... I repay')
  alternative_readings:
  - Render as futuristic present ('I will give ... I will repay')
  - Render as progressive ('I am giving ... I am repaying')
  rationale: The Greek uses present indicatives. Translating them as simple present
    best preserves the form and leaves open whether Zacchaeus is describing current
    practice, immediate resolve, or both. This avoids importing a theological conclusion
    about whether his words prove prior righteousness or newly awakened repentance.
  doctrine_reference: Preserve theological tension rather than resolve it.
