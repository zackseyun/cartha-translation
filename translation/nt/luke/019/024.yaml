id: LUK.19.24
reference: Luke 19:24
source:
  edition: SBLGNT
  text: καὶ τοῖς παρεστῶσιν εἶπεν· Ἄρατε ἀπ’ αὐτοῦ τὴν μνᾶν καὶ δότε τῷ τὰς δέκα μνᾶς
    ἔχοντι—
translation:
  text: And he said to those standing by, ‘Take the mina from him and give it to the
    one who has the ten minas.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “pound.” The Greek term denotes an ancient monetary
      unit, a mina.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεστῶσιν
  chosen: those standing by
  alternatives:
  - those present
  - the bystanders
  lexicon: BDAG
  rationale: Perfect active participle dative plural of παρίστημι used substantivally
    with the article; refers to those present nearby. 'Those standing by' preserves
    the concrete scene while remaining natural English.
- source_word: Ἄρατε
  chosen: Take
  alternatives:
  - Lift
  - Remove
  lexicon: BDAG
  rationale: Aorist imperative plural of αἴρω here means to take away/remove. 'Take'
    is idiomatic in the command sequence and naturally pairs with 'from him.'
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - away from him
  lexicon: BDAG
  rationale: ἀπό with genitive marks separation. 'From him' is the most direct and
    natural rendering in English.
- source_word: μνᾶν
  chosen: mina
  alternatives:
  - pound
  lexicon: BDAG
  rationale: μνᾶ is an ancient monetary unit. Per translation philosophy, transliterating
    the unit as 'mina' preserves the historical setting better than using the traditional
    but potentially misleading 'pound.'
- source_word: δότε
  chosen: give
  alternatives:
  - hand over
  lexicon: BDAG
  rationale: Aorist imperative plural of δίδωμι; simple transfer is intended. 'Give'
    is the plain and sufficient English equivalent.
- source_word: τῷ ... ἔχοντι
  chosen: to the one who has
  alternatives:
  - to him who has
  - to the man who has
  lexicon: BDAG
  rationale: Articular participle in the dative singular functions substantivally.
    'The one who has' is natural modern English and avoids adding 'man,' which is
    not explicit here.
- source_word: τὰς δέκα μνᾶς
  chosen: the ten minas
  alternatives:
  - ten minas
  lexicon: BDAG
  rationale: The article is present in Greek and can be represented naturally in English
    as 'the ten minas,' identifying the previously mentioned amount held by this servant.
