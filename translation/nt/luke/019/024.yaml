theological_decisions:
- issue: Rendering of μνᾶ as a monetary unit
  chosen_reading: mina
  alternative_readings:
  - pound
  rationale: This is not a doctrinally contested term, but it is a significant translation-tradition
    issue. 'Mina' preserves the ancient unit directly from the Greek rather than replacing
    it with an English monetary term that may suggest a modern or exact equivalent
    value.
  doctrine_reference: Translation philosophy §1, §6
