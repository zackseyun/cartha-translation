id: LUK.19.42
reference: Luke 19:42
source:
  edition: SBLGNT
  text: λέγων ὅτι Εἰ ἔγνως ⸂ἐν τῇ ἡμέρᾳ ταύτῃ καὶ σὺ⸃ τὰ πρὸς ⸀εἰρήνην— νῦν δὲ ἐκρύβη
    ἀπὸ ὀφθαλμῶν σου.
translation:
  text: saying, “If you had known on this day, even you, the things that make for
    peace—but now they have been hidden from your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If only you had known on this day, even you, the things that make for
      peace.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'the things toward peace,' meaning what pertains to or
      leads to peace.
    reason: lexical_alternative
  - marker: c
    text: Some translations render the final clause in the singular, 'now it has been
      hidden from your eyes,' taking the preceding phrase conceptually.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present participle linked to the previous narrative clause; 'saying'
    preserves the participial flow better than converting to a finite verb.
- source_word: Εἰ ἔγνως
  chosen: If you had known
  alternatives:
  - If only you had known
  - If you knew
  lexicon: BDAG
  rationale: Aorist indicative in this lament context functions as a contrary-to-fact
    or unfulfilled condition. 'If you had known' is natural English and preserves
    the pathos without adding the interpretive particle 'only,' though that sense
    is implicit.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  chosen: on this day
  alternatives:
  - in this day
  - on this very day
  lexicon: BDAG
  rationale: Idiomatic English prefers 'on this day' for temporal ἐν with 'day.' 'This
    very day' would heighten emphasis beyond what is necessary.
- source_word: καὶ σὺ
  chosen: even you
  alternatives:
  - you also
  - you too
  lexicon: BDAG
  rationale: The phrase is emphatic in the lament over Jerusalem. 'Even you' best
    conveys the emotional force and surprise.
- source_word: τὰ πρὸς εἰρήνην
  chosen: the things that make for peace
  alternatives:
  - the things belonging to peace
  - the things for peace
  - what leads to peace
  lexicon: BDAG
  rationale: The idiom refers to what pertains to or leads toward peace. 'The things
    that make for peace' is established, clear English that preserves the plural substantive
    force better than a singular abstraction.
- source_word: εἰρήνην
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '''Peace'' is the standard and contextually rich rendering, encompassing
    both covenantal well-being and the immediate sense of what would avert judgment.'
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - yet now
  - but as it is now
  lexicon: BDAG
  rationale: Marks the sharp contrast between what might have been known and the present
    state of concealment.
- source_word: ἐκρύβη
  chosen: they have been hidden
  alternatives:
  - it has been hidden
  - they were hidden
  lexicon: BDAG
  rationale: The passive verb most naturally takes τὰ πρὸς εἰρήνην as its implied
    subject, hence plural in English. Perfect-like English 'have been hidden' communicates
    the present result of the aorist passive in context. Singular 'it' would flatten
    the plural antecedent.
- source_word: ἀπὸ ὀφθαλμῶν σου
  chosen: from your eyes
  alternatives:
  - from your sight
  lexicon: BDAG
  rationale: A literal but natural rendering that preserves the biblical idiom of
    perception and recognition.
