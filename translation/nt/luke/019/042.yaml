theological_decisions:
- issue: Implied subject of ἐκρύβη
  chosen_reading: The hidden object is 'the things that make for peace,' rendered
    with plural English 'they have been hidden.'
  alternative_readings:
  - 'An impersonal singular sense: ''it is hidden from your eyes'''
  rationale: Although ἐκρύβη is singular, the nearest and most coherent implied referent
    is the preceding neuter plural phrase τὰ πρὸς εἰρήνην, which can be resumed conceptually
    in the singular in Greek. English reads more clearly by making the referent explicit
    in the plural. This avoids obscuring the connection while not importing additional
    theology.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Force of the conditional lament
  chosen_reading: Render as 'If you had known' without adding 'only' to the main text.
  alternative_readings:
  - '''If only you had known'''
  rationale: The lamenting force is real, but the Greek text does not explicitly include
    a particle equivalent to 'only.' The chosen rendering preserves the sense while
    avoiding interpretive expansion in the main text.
  doctrine_reference: Translation philosophy §1, §6
