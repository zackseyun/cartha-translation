theological_decisions:
- issue: Rendering of κύριος in a parabolic address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Although the speaker addresses a nobleman in a parable rather than directly
    making a christological confession, the project's contested-terms guidance sets
    κύριος to 'Lord' by default. 'Master' is a viable contextual alternative, but
    not required by the Greek, so it is preserved as an alternative rather than adopted
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
