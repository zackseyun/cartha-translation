id: LUK.19.16
reference: Luke 19:16
source:
  edition: SBLGNT
  text: παρεγένετο δὲ ὁ πρῶτος λέγων· Κύριε, ἡ μνᾶ σου ⸂δέκα προσηργάσατο⸃ μνᾶς.
translation:
  text: Then the first came, saying, ‘Lord, your mina has earned ten minas.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Master.” The Greek title κύριε can be a respectful address to a superior
      as well as “Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: παρεγένετο
  chosen: came
  alternatives:
  - appeared
  - arrived
  - presented himself
  lexicon: BDAG
  rationale: The verb παραγίνομαι commonly means to come or arrive. In this narrative
    reporting context, 'came' is natural modern English and fits the servant's approach
    to the master.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' conveys the sequential movement
    more idiomatically than a bare 'and'.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first one
  lexicon: BDAG
  rationale: This refers to the first servant in sequence. 'The first' is concise
    and sufficient in English.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered 'saying' in English narrative style.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this parable it
    can denote respectful address to a superior; 'Master' is possible, but 'Lord'
    preserves consistency with the project's default and remains idiomatic.
- source_word: ἡ μνᾶ σου
  chosen: your mina
  alternatives:
  - your mina coin
  - the mina of yours
  lexicon: BDAG
  rationale: μνᾶ is a unit of money, best transliterated as 'mina' to avoid flattening
    the historical specificity into a modern equivalent. The possessive σου indicates
    the mina belongs to the master, not the servant.
- source_word: δέκα προσηργάσατο μνᾶς
  chosen: has earned ten minas
  alternatives:
  - has made ten minas more
  - has gained ten minas
  - has produced ten minas
  lexicon: BDAG
  rationale: προσεργάζομαι here means to gain or earn in addition through activity.
    'Has earned ten minas' is clear, idiomatic, and preserves the sense that the original
    mina generated additional return. The perfect-like English present perfect suits
    the completed result now being reported.
