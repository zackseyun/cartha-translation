id: LUK.19.25
reference: Luke 19:25
source:
  edition: SBLGNT
  text: καὶ εἶπαν αὐτῷ· Κύριε, ἔχει δέκα μνᾶς—
translation:
  text: And they said to him, ‘Lord, he has ten minas—’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sir' or 'Master' for the address 'Lord.'
    reason: lexical_alternative
  - marker: b
    text: A mina was an ancient unit of money, roughly about one hundred days' wages.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - But
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative coordination
    without adding temporal or adversative nuance not explicit in the Greek.
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: 'Aorist indicative is best rendered as a simple past in English narrative:
    ''they said.'''
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to him/her/it
  lexicon: BDAG
  rationale: Dative indirect object referring to the nobleman/king figure in the parable;
    'to him' is the natural English rendering.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this parabolic address 'Sir' is possible, but 'Lord' best preserves both the
    lexical value and the narrative resonance of authority.
- source_word: ἔχει
  chosen: he has
  alternatives:
  - he already has
  - he is holding
  lexicon: BDAG
  rationale: Present indicative of possession; 'he has' is the plain sense. English
    can preserve the immediacy of the objection without adding emphasis such as 'already'
    unless supplied by context.
- source_word: δέκα
  chosen: ten
  lexicon: BDAG
  rationale: Cardinal numeral straightforwardly rendered 'ten.'
- source_word: μνᾶς
  chosen: minas
  alternatives:
  - pounds
  - minae
  lexicon: BDAG
  rationale: A μνᾶ is an ancient monetary unit. Following the philosophy to transliterate
    culturally specific terms rather than replace them with potentially misleading
    modern equivalents, 'minas' preserves the historical setting better than traditional
    'pounds.'
