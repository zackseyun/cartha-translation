theological_decisions:
- issue: Rendering of κύριος in direct address within a parable
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrine excerpt gives κύριος the default rendering 'Lord.' Although
    this occurrence may function as a respectful address to the parable's master rather
    than an explicit christological confession, retaining 'Lord' preserves lexical
    consistency and the authority nuance without importing additional doctrine.
