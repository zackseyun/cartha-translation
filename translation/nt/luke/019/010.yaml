theological_decisions:
- issue: Scope and nuance of τὸ ἀπολωλός
  chosen_reading: the lost
  alternative_readings:
  - what was lost
  - the one who was lost
  rationale: The Greek neuter singular with article can be understood generically/collectively
    rather than referring only to a single male individual. In context, it applies
    immediately to Zacchaeus but also states Jesus' broader mission. Rendering it
    'the lost' preserves that theological breadth without narrowing the referent.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
