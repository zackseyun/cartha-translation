id: LUK.19.10
reference: Luke 19:10
source:
  edition: SBLGNT
  text: ἦλθεν γὰρ ὁ υἱὸς τοῦ ἀνθρώπου ζητῆσαι καὶ σῶσαι τὸ ἀπολωλός.
translation:
  text: For the Son of Man came to seek and to save the lost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what was lost.' The Greek expression is singular and can be understood
      generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - has come
  lexicon: BDAG
  rationale: Aorist indicative of ἔρχομαι is best rendered as simple past in this
    narrative-summarizing statement. 'Came' is idiomatic and preserves the incarnational/missional
    force without adding aspect not explicit in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement. 'For'
    preserves the explanatory connection concisely and naturally in English Bible
    style.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and a recognized title with Danielic
    resonance. It should be translated, not paraphrased, and retained in its traditional
    form to preserve both the idiom and theological depth.
- source_word: ζητῆσαι
  chosen: to seek
  alternatives:
  - to look for
  lexicon: BDAG
  rationale: The aorist infinitive expresses purpose after ἦλθεν. 'To seek' is the
    standard and most fitting rendering, carrying both the sense of searching and
    intentional pursuit.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to rescue
  - to deliver
  lexicon: BDAG
  rationale: σῴζω in Luke commonly carries salvific weight beyond mere physical rescue.
    'To save' preserves the theological breadth and matches the immediate context
    of Zacchaeus and salvation in 19:9.
- source_word: τὸ ἀπολωλός
  chosen: the lost
  alternatives:
  - what was lost
  - the one that was lost
  - that which was lost
  lexicon: BDAG
  rationale: The articular perfect participle from ἀπόλλυμι is neuter singular and
    can function collectively or generically. 'The lost' is natural English and preserves
    the broad category sense, while avoiding an overly wooden 'that which was lost.'
    The perfect participle conveys a state of being lost; English idiom captures this
    adequately with 'the lost'.
