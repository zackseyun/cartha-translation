id: LUK.19.26
reference: Luke 19:26
source:
  edition: SBLGNT
  text: ⸀λέγω ὑμῖν ὅτι παντὶ τῷ ἔχοντι δοθήσεται, ἀπὸ δὲ τοῦ μὴ ἔχοντος καὶ ὃ ἔχει
    ⸀ἀρθήσεται.
translation:
  text: I tell you that to everyone who has, more will be given; but from the one
    who does not have, even what he has will be taken away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'will be given.' The Greek does not explicitly include 'more,'
      though the sense of increase is widely understood in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω
  chosen: I tell
  alternatives:
  - I say
  lexicon: BDAG
  rationale: Present indicative used as direct discourse introduction. 'I tell' is
    idiomatic modern English while preserving the force of Jesus' emphatic statement.
- source_word: παντὶ τῷ ἔχοντι
  chosen: to everyone who has
  alternatives:
  - to everyone having
  - to everyone who possesses
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally: ''the one who has.''
    ''Everyone who has'' is natural English and preserves the generic scope of πᾶς
    with the participle.'
- source_word: δοθήσεται
  chosen: more will be given
  alternatives:
  - will be given
  lexicon: BDAG
  rationale: The passive future means 'will be given.' English commonly supplies 'more'
    in this proverbial construction to make the implied increase explicit, especially
    in light of the contrast with loss in the second clause and the Matthean parallel.
    This is a minimal, contextually warranted expansion rather than a paraphrase.
- source_word: ἀπὸ δὲ τοῦ μὴ ἔχοντος
  chosen: but from the one who does not have
  alternatives:
  - but from the one not having
  - but from whoever has not
  lexicon: BDAG
  rationale: Articular participle with μή expresses the generic person lacking. 'The
    one who does not have' is the clearest natural rendering. δέ is adversative here,
    hence 'but.'
- source_word: καὶ ὃ ἔχει
  chosen: even what he has
  alternatives:
  - also what he has
  - even what he possesses
  lexicon: BDAG
  rationale: καί is intensive in this context, best rendered 'even.' The relative
    clause refers to what the person presently has. The masculine singular generic
    participle is represented with singular 'he' to remain gender-accurate to the
    source while functioning generically.
- source_word: ἀρθήσεται
  chosen: will be taken away
  alternatives:
  - will be taken
  - will be removed
  lexicon: BDAG
  rationale: Future passive of αἴρω here carries the sense of removal/deprivation.
    'Will be taken away' is the standard and clearest English expression for this
    passive loss.
