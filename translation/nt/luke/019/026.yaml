theological_decisions:
- issue: Interpretive force of the saying as a general principle of increase and loss
  chosen_reading: Render the proverb straightforwardly without importing a doctrinal
    explanation about salvation, merit, or predestination.
  alternative_readings:
  - Read as specifically about stewardship in the parable context
  - Read as a broader kingdom principle
  rationale: The verse states the principle without specifying a systematic theological
    mechanism. The translation should preserve the saying's terseness and leave contextual/theological
    application to interpretation rather than embedding it in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
