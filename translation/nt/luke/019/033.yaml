theological_decisions:
- issue: Rendering κύριοι in a non-theological, human-ownership context
  chosen_reading: owners
  alternative_readings:
  - masters
  - lords
  rationale: Although κύριος defaults to 'Lord' when used as a title or in theologically
    significant contexts, here the referent is the human possessors of the colt. Translating
    it as 'owners' avoids false theological resonance and matches the plain contextual
    sense.
