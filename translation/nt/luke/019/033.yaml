id: LUK.19.33
reference: Luke 19:33
source:
  edition: SBLGNT
  text: λυόντων δὲ αὐτῶν τὸν πῶλον εἶπαν οἱ κύριοι αὐτοῦ πρὸς αὐτούς· Τί λύετε τὸν
    πῶλον;
translation:
  text: And as they were untying the colt, its owners said to them, “Why are you untying
    the colt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its masters.' The Greek word is the plural of 'lord/master' (κύριος),
      but here it refers to the colt’s human proprietors.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυόντων
  chosen: as they were untying
  alternatives:
  - while they were untying
  - as they were loosening
  lexicon: BDAG
  rationale: Present active participle in the genitive absolute, contemporaneous with
    the main verb. 'Untying' fits the concrete action on an animal better than the
    more general 'loosening,' while preserving the repeated verbal link with λύετε
    later in the verse.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural modern English and preserves the flow without overstating contrast.
- source_word: αὐτῶν
  chosen: they
  alternatives:
  - the disciples
  - those men
  lexicon: BDAG
  rationale: The pronoun refers back to the two disciples from the prior context.
    English requires an explicit subject in translation of the genitive absolute;
    'they' is sufficient here without importing more than the immediate context warrants.
- source_word: πῶλον
  chosen: colt
  alternatives:
  - young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal, and in this context specifically the donkey
    of the preceding verse. 'Colt' is concise and idiomatic, while the broader context
    already identifies the animal type.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: λέγω is the standard verb 'say.' Although the content is interrogative,
    'said' is the more direct lexical equivalent and keeps the Greek wording visible.
- source_word: οἱ κύριοι αὐτοῦ
  chosen: its owners
  alternatives:
  - its masters
  - its lords
  lexicon: BDAG
  rationale: κύριος has the default rendering 'Lord' in the doctrinal guidance when
    functioning as a title or theologically weighty term, but here it refers to human
    proprietors of the animal. 'Owners' best conveys the contextual sense in natural
    English. 'Masters' is possible but sounds stilted here; 'lords' would be misleading.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to the men
  lexicon: BDAG
  rationale: Standard directional use of πρός with accusative after a speech verb.
    'To them' is the natural English equivalent.
- source_word: Τί
  chosen: Why
  alternatives:
  - What for
  - For what reason
  lexicon: BDAG
  rationale: 'Although τί is literally ''what,'' in this idiom with the present verb
    it asks for reason: ''Why are you untying...?'' This is standard, clear English
    and reflects the force of the question.'
- source_word: λύετε
  chosen: are you untying
  alternatives:
  - are you loosening
  - do you untie
  lexicon: BDAG
  rationale: Present indicative in a direct question, best rendered as progressive
    in English. Repeating 'untying' preserves the lexical correspondence with λυόντων
    earlier in the verse.
