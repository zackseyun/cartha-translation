id: LUK.19.6
reference: Luke 19:6
source:
  edition: SBLGNT
  text: καὶ σπεύσας κατέβη, καὶ ὑπεδέξατο αὐτὸν χαίρων.
translation:
  text: And he hurried down and welcomed him joyfully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he hurried and came down, and received him with joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπεύσας
  chosen: hurried
  alternatives:
  - hastened
  - quickly
  lexicon: BDAG
  rationale: Aorist participle from σπεύδω conveys promptness and eagerness. 'Hurried'
    is natural modern English and preserves the sense of immediate action without
    sounding archaic like 'hastened.'
- source_word: κατέβη
  chosen: down
  alternatives:
  - came down
  - descended
  lexicon: BDAG
  rationale: The verb means 'came down' or 'went down.' In English, after 'hurried,'
    the object of motion can be carried by 'down' ('hurried down'), which preserves
    the directional sense while avoiding redundancy. The full clause still reflects
    the aorist main verb.
- source_word: ὑπεδέξατο
  chosen: welcomed
  alternatives:
  - received
  - received as a guest
  lexicon: BDAG
  rationale: Middle voice of ὑποδέχομαι commonly means to receive or welcome, often
    with hospitable overtones. 'Welcomed' best captures the hospitable sense in clear
    modern English; 'received' is possible but less idiomatic here.
- source_word: αὐτόν
  chosen: him
  rationale: Straightforward accusative pronoun referring to Jesus.
- source_word: χαίρων
  chosen: joyfully
  alternatives:
  - rejoicing
  - with joy
  - gladly
  lexicon: BDAG
  rationale: Present participle from χαίρω expresses the manner accompanying the welcome.
    Rendering it adverbially as 'joyfully' is idiomatic English and preserves the
    ongoing emotional state. 'Gladly' is possible, but 'joyfully' more directly reflects
    χαίρω.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Then ... and
  rationale: The repeated καί links the sequence of actions simply and narratively.
    Retaining 'And' at the start reflects Luke's coordination style without overinterpreting
    the connection.
