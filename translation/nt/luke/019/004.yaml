id: LUK.19.4
reference: Luke 19:4
source:
  edition: SBLGNT
  text: καὶ προδραμὼν ⸂εἰς τὸ⸃ ἔμπροσθεν ἀνέβη ἐπὶ συκομορέαν ἵνα ἴδῃ αὐτόν, ὅτι ἐκείνης
    ἤμελλεν διέρχεσθαι.
translation:
  text: So he ran on ahead and climbed up into a sycamore tree so that he might see
    him, because he was about to pass that way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more precisely, 'a sycamore-fig tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προδραμὼν
  chosen: ran on ahead
  alternatives:
  - ran ahead
  - ran forward
  lexicon: BDAG
  rationale: Aorist participle of προτρέχω denotes going ahead by running. 'Ran on
    ahead' captures both the motion and the comparative sense of getting in front.
- source_word: εἰς τὸ ἔμπροσθεν
  chosen: on ahead
  alternatives:
  - ahead
  - to the front
  lexicon: BDAG
  rationale: This idiomatic phrase reinforces the idea of moving to a point in front.
    In English, folding it into 'ran on ahead' is natural and preserves the sense
    without awkward literalism.
- source_word: ἀνέβη ἐπὶ
  chosen: climbed up into
  alternatives:
  - climbed up on
  - went up into
  lexicon: BDAG
  rationale: ἀναβαίνω means 'go up/climb,' and with ἐπί plus a tree the sense is climbing
    up into/on it. 'Climbed up into' is idiomatic for a tree and communicates the
    action clearly.
- source_word: συκομορέαν
  chosen: a sycamore tree
  alternatives:
  - a sycamore-fig tree
  - a mulberry-fig tree
  lexicon: BDAG
  rationale: The term refers to the sycamore-fig (Ficus sycomorus). 'Sycamore tree'
    is the familiar and readable English rendering; the more botanically precise alternative
    is worth preserving in a footnote.
- source_word: ἵνα ἴδῃ αὐτόν
  chosen: so that he might see him
  alternatives:
  - in order that he might see him
  - so he could see him
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose. 'So that he might
    see him' preserves the purposive nuance with natural English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason Zacchaeus climbed the tree. 'Because'
    is the clearest modern English equivalent.
- source_word: ἐκείνης
  chosen: that way
  alternatives:
  - through there
  - by that route
  lexicon: BDAG
  rationale: Genitive feminine singular likely refers elliptically to 'way/road/street'
    understood from context. 'That way' is idiomatic English and avoids supplying
    an overly specific noun not present in the Greek.
- source_word: ἤμελλεν διέρχεσθαι
  chosen: he was about to pass that way
  alternatives:
  - he was going to pass that way
  - he was about to go through there
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates imminence or intended future action.
    'Was about to pass that way' preserves the near-future sense and fits the narrative
    context.
