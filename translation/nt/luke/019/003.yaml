id: LUK.19.3
reference: Luke 19:3
source:
  edition: SBLGNT
  text: καὶ ἐζήτει ἰδεῖν τὸν Ἰησοῦν τίς ἐστιν, καὶ οὐκ ἠδύνατο ἀπὸ τοῦ ὄχλου ὅτι τῇ
    ἡλικίᾳ μικρὸς ἦν.
translation:
  text: And he was trying to see who Jesus was, but he could not because of the crowd,
    because he was small in stature.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was short.' The Greek expression literally refers to being small
      with respect to stature; in this context it concerns physical height, not age.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτει
  chosen: was trying
  alternatives:
  - was seeking
  - wanted
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated effort, not merely a simple
    desire. 'Was trying' captures the attempted action naturally in English.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to catch sight of
  lexicon: BDAG
  rationale: The aorist infinitive with ζητέω expresses the goal of his effort. 'To
    see' is the plain and sufficient rendering.
- source_word: τίς ἐστιν
  chosen: who Jesus was
  alternatives:
  - what sort of man Jesus was
  - who he was
  lexicon: BDAG
  rationale: The phrase can mean either identity or what kind of person someone is.
    In context Zacchaeus is attempting to see Jesus and learn who he is; 'who Jesus
    was' preserves the Greek wording without overinterpreting.
- source_word: οὐκ ἠδύνατο
  chosen: he could not
  alternatives:
  - he was not able
  lexicon: BDAG
  rationale: Standard rendering of imperfect middle of δύναμαι. English idiom favors
    'could not'.
- source_word: ἀπὸ τοῦ ὄχλου
  chosen: because of the crowd
  alternatives:
  - on account of the crowd
  - from the crowd
  lexicon: BDAG
  rationale: Here ἀπό expresses the obstructing cause. 'Because of the crowd' communicates
    the sense clearly in modern English better than a more literal but less idiomatic
    'from the crowd'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: The conjunction introduces the reason he could not see. 'Because' is
    clear modern English.
- source_word: τῇ ἡλικίᾳ μικρὸς ἦν
  chosen: he was small in stature
  alternatives:
  - he was short
  - he was small in height
  lexicon: BDAG
  rationale: ἡλικία can refer to age or physical stature, but the crowd-obstruction
    context strongly favors stature/height. 'Small in stature' is accurate and natural,
    while preserving slightly more formality than the simpler 'short'.
