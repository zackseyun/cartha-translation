id: LUK.19.23
reference: Luke 19:23
source:
  edition: SBLGNT
  text: καὶ διὰ τί οὐκ ἔδωκάς ⸂μου τὸ ἀργύριον⸃ ἐπὶ τράπεζαν; κἀγὼ ἐλθὼν σὺν τόκῳ
    ἂν ⸂αὐτὸ ἔπραξα⸃.
translation:
  text: And why did you not put my money in the bank? Then when I came, I would have
    collected it with interest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deposit my money with bankers'; literally, 'give my money upon a table.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Idiomatic interrogative asking for the reason; 'why' is natural modern
    English and preserves the rebuke.
- source_word: ἔδωκάς ... ἐπὶ τράπεζαν
  chosen: put ... in the bank
  alternatives:
  - give ... to the bank
  - deposit ... with bankers
  - place ... on a banker's table
  lexicon: BDAG
  rationale: The phrase literally involves giving money 'upon a table,' but in this
    financial context τράπεζα refers to a banking table or institution. 'Put ... in
    the bank' communicates the intended economic action in clear modern English.
- source_word: μου τὸ ἀργύριον
  chosen: my money
  alternatives:
  - my silver
  - my coin money
  lexicon: BDAG
  rationale: ἀργύριον literally denotes silver/money. In this parable's commercial
    setting, 'money' is the most natural English equivalent; 'silver' would sound
    overly literal and potentially misleading.
- source_word: κἀγὼ ἐλθὼν
  chosen: Then when I came
  alternatives:
  - and I, having come
  - and when I came
  lexicon: BDAG
  rationale: The participial construction is rendered as a temporal clause in idiomatic
    English. 'Then' reflects the consequential flow from the prior question.
- source_word: σὺν τόκῳ
  chosen: with interest
  alternatives:
  - with profit from interest
  - with usury
  lexicon: BDAG
  rationale: τόκος in this context means interest on deposited money. 'With interest'
    is the standard and clearest rendering; 'usury' is archaic and carries misleading
    connotations in modern English.
- source_word: αὐτὸ ἔπραξα
  chosen: I would have collected it
  alternatives:
  - I would have exacted it
  - I would have recovered it
  - I would have received it back
  lexicon: BDAG
  rationale: πράσσω here has the commercial sense of obtaining or collecting a sum
    due. 'Collected it' fits the financial context and the implied action of reclaiming
    the principal together with interest.
