theological_decisions:
- issue: Whether the servant's description of the master should be softened to protect
    the nobleman's image in the parable
  chosen_reading: Retain the servant's accusatory wording without softening
  alternative_readings:
  - Use milder language such as 'strict' or 'demanding' throughout to reduce the negative
    force
  rationale: The verse reports the servant's own explanation and accusation. The translation
    should preserve that rhetorical force without deciding whether the accusation
    is objectively true of the master beyond the narrative context.
  doctrine_reference: Preserve theological tension rather than resolve it.
