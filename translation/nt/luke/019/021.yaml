id: LUK.19.21
reference: Luke 19:21
source:
  edition: SBLGNT
  text: ἐφοβούμην γάρ σε ὅτι ἄνθρωπος αὐστηρὸς εἶ, αἴρεις ὃ οὐκ ἔθηκας καὶ θερίζεις
    ὃ οὐκ ἔσπειρας.
translation:
  text: 'for I was afraid of you, because you are a severe man: you take what you
    did not put down, and you reap what you did not sow.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strict' or 'harsh' for 'severe.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'you take what you did not put down.' Some translations render
      the phrase more interpretively as 'you take up what you did not lay down' or
      'you collect what you did not deposit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβούμην
  chosen: I was afraid
  alternatives:
  - I feared
  - I was fearing
  lexicon: BDAG
  rationale: Imperfect middle/passive of φοβέομαι expresses the servant's ongoing
    state in past time. 'I was afraid' is natural modern English and preserves the
    imperfect sense better than the stiffer 'I feared.'
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the previous statement. 'For' preserves the
    explanatory connection in a concise way.
- source_word: αὐστηρὸς
  chosen: severe
  alternatives:
  - strict
  - harsh
  - stern
  lexicon: BDAG
  rationale: αὐστηρός denotes someone exacting, strict, or harsh. 'Severe' preserves
    the negative, demanding sense without overinterpreting the master's character
    beyond the servant's accusation.
- source_word: αἴρεις
  chosen: you take
  alternatives:
  - you pick up
  - you take away
  lexicon: BDAG
  rationale: αἴρω here means to take or take up. In this economic saying, 'you take'
    is the clearest idiomatic rendering and pairs well with the following relative
    clause.
- source_word: ὃ οὐκ ἔθηκας
  chosen: what you did not put down
  alternatives:
  - what you did not lay down
  - what you did not deposit
  lexicon: BDAG
  rationale: τίθημι literally means 'put' or 'place.' In this context of money and
    gain, 'put down' preserves the concrete verbal image and avoids importing a more
    specific commercial term like 'deposit' that the Greek itself does not require.
- source_word: θερίζεις
  chosen: you reap
  alternatives:
  - you harvest
  lexicon: BDAG
  rationale: θερίζω commonly means 'reap' in agricultural imagery. 'Reap' also preserves
    the proverbial parallelism with 'sow.'
- source_word: ὃ οὐκ ἔσπειρας
  chosen: what you did not sow
  alternatives:
  - what you did not plant
  lexicon: BDAG
  rationale: σπείρω means 'sow.' Retaining 'sow' keeps the direct agricultural metaphor
    and the familiar pairing with 'reap'.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The Greek is singular masculine and refers to a specific male figure
    in the parable, not generic humanity. 'Man' is therefore gender-accurate per the
    translation philosophy.
