id: LUK.19.7
reference: Luke 19:7
source:
  edition: SBLGNT
  text: καὶ ἰδόντες πάντες διεγόγγυζον λέγοντες ὅτι Παρὰ ἁμαρτωλῷ ἀνδρὶ εἰσῆλθεν καταλῦσαι.
translation:
  text: And when they all saw it, they began to grumble, saying, “He has gone in to
    stay with a sinful man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He has gone in to be the guest of a sinner.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when they all saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered temporally in natural English.
    'When they all saw it' captures the circumstance that prompted the response; 'it'
    is supplied idiomatically to refer to Jesus going with Zacchaeus.
- source_word: πάντες
  chosen: they all
  alternatives:
  - everyone
  - all of them
  lexicon: BDAG
  rationale: Placed with the participle-response clause to emphasize the universal
    reaction of the crowd. 'They all' is natural and preserves the scope.
- source_word: διεγόγγυζον
  chosen: began to grumble
  alternatives:
  - were grumbling
  - murmured
  - complained
  lexicon: BDAG
  rationale: The imperfect indicates ongoing/inceptive action; 'began to grumble'
    conveys the crowd's reaction as it arose. 'Grumble' fits the negative murmuring
    sense and echoes biblical usage better than the flatter 'complained.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Standard participial complement to the main verb, introducing the content
    of the grumbling.
- source_word: παρὰ ἁμαρτωλῷ ἀνδρὶ
  chosen: with a sinful man
  alternatives:
  - with a sinner
  - with a sinful person
  lexicon: BDAG
  rationale: παρά with the dative here indicates staying/lodging with someone. ἁμαρτωλῷ
    ἀνδρί is rendered 'a sinful man' to preserve both the adjective and the explicitly
    masculine noun ἀνήρ, in keeping with the gender-accurate policy. 'Sinner' is possible
    but compresses the two-word expression.
- source_word: εἰσῆλθεν
  chosen: He has gone in
  alternatives:
  - he entered
  - he went in
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι refers to Jesus' entering Zacchaeus's house. Present
    perfect English ('has gone in') works well in reported complaint, highlighting
    the completed action with present relevance.
- source_word: καταλῦσαι
  chosen: to stay
  alternatives:
  - to lodge
  - to be a guest
  - to spend the night
  lexicon: BDAG
  rationale: The infinitive denotes lodging/staying as a guest. 'To stay' is clear
    modern English; 'to be a guest' is interpretive but possible, while 'to lodge'
    is more formal.
