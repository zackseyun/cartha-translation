theological_decisions:
- issue: Rendering the crowd's characterization of Zacchaeus
  chosen_reading: a sinful man
  alternative_readings:
  - a sinner
  rationale: The Greek uses adjective + noun rather than the substantival adjective
    alone. Rendering both terms preserves the crowd's disparaging judgment without
    importing additional theological nuance.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 4 and 5
