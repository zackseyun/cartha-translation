id: LUK.19.35
reference: Luke 19:35
source:
  edition: SBLGNT
  text: καὶ ἤγαγον αὐτὸν πρὸς τὸν Ἰησοῦν, καὶ ἐπιρίψαντες ⸀αὐτῶν τὰ ἱμάτια ἐπὶ τὸν
    πῶλον ἐπεβίβασαν τὸν Ἰησοῦν·
translation:
  text: And they brought it to Jesus, and after throwing their cloaks on the colt,
    they put Jesus on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'him' for 'it'; the Greek pronoun is masculine, referring to the colt.
    reason: lexical_alternative
  - marker: b
    text: '''Colt'' can mean a young donkey here; compare the surrounding context.'
    reason: cross_reference
lexical_decisions:
- source_word: ἤγαγον
  chosen: brought
  alternatives:
  - led
  lexicon: BDAG
  rationale: Aorist of ἄγω here refers to bringing the colt to Jesus. 'Brought' is
    natural English and fits the direct object αὐτόν ('it/him') in context better
    than the more process-oriented 'led.'
- source_word: αὐτὸν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: Although grammatically masculine, the pronoun refers back to the colt
    in the preceding context (v. 34). English idiom uses 'it' for an animal in this
    narrative setting, avoiding misleading personification.
- source_word: πρὸς τὸν Ἰησοῦν
  chosen: to Jesus
  alternatives:
  - before Jesus
  lexicon: BDAG
  rationale: πρός with the accusative commonly indicates movement toward a person.
    'To Jesus' is the most straightforward rendering here.
- source_word: ἐπιρίψαντες
  chosen: after throwing
  alternatives:
  - having thrown
  - throwing
  lexicon: BDAG
  rationale: The aorist participle is antecedent in sense to the main verb ἐπεβίβασαν.
    'After throwing' communicates the sequence clearly in natural English.
- source_word: αὐτῶν τὰ ἱμάτια
  chosen: their cloaks
  alternatives:
  - their garments
  - their outer garments
  lexicon: BDAG
  rationale: ἱμάτια refers to outer garments/cloaks. 'Cloaks' is more precise and
    vivid in this scene than the broader 'garments.'
- source_word: ἐπὶ τὸν πῶλον
  chosen: on the colt
  alternatives:
  - upon the colt
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates placement onto the animal. 'On
    the colt' is idiomatic modern English.
- source_word: πῶλον
  chosen: colt
  alternatives:
  - young donkey
  - foal
  lexicon: BDAG
  rationale: πῶλος denotes a young animal; in the immediate context of the triumphal
    entry it is specifically a donkey's colt, but Luke's wording here simply says
    'colt.' Retaining 'colt' stays close to the Greek while remaining clear.
- source_word: ἐπεβίβασαν
  chosen: they put
  alternatives:
  - they set
  - they mounted
  lexicon: BDAG
  rationale: The verb means to cause someone to get on or mount. 'They put Jesus on
    it' is clear, natural, and preserves the causative sense better than the potentially
    ambiguous 'mounted.'
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἰησοῦς, following the translation
    philosophy of transliterating names.
