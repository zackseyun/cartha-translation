id: LUK.19.29
reference: Luke 19:29
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὡς ἤγγισεν εἰς Βηθφαγὴ καὶ Βηθανίαν πρὸς τὸ ὄρος τὸ καλούμενον
    Ἐλαιῶν, ἀπέστειλεν δύο τῶν ⸀μαθητῶν
translation:
  text: And it happened that, as he came near to Bethphage and Bethany, toward the
    mount called Olives, he sent two of the disciples
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'toward the mount called the Mount of Olives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: BDAG
  rationale: This Lukan narrative formula is retained in a natural but still transparent
    English form. 'And it came to pass' is overly archaic; 'Now it happened' is possible
    but less directly reflects the connective καί.
- source_word: ὡς
  chosen: as
  alternatives:
  - when
  lexicon: BDAG
  rationale: Here ὡς introduces a temporal clause. 'As' preserves the sense of the
    approach in progress without overinterpreting the timing.
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: BDAG
  rationale: Aorist of ἐγγίζω denotes nearing a place. 'Came near' is idiomatic modern
    English and avoids the slightly archaic 'drew near.'
- source_word: εἰς Βηθφαγὴ καὶ Βηθανίαν
  chosen: to Bethphage and Bethany
  alternatives:
  - near Bethphage and Bethany
  lexicon: BDAG
  rationale: εἰς with place names is most straightforwardly rendered 'to.' The names
    are transliterated per project policy.
- source_word: πρὸς τὸ ὄρος
  chosen: toward the mount
  alternatives:
  - toward the mountain
  - at the mount
  lexicon: BDAG
  rationale: πρός here indicates direction/location in relation to the hill. 'Toward
    the mount' is concise and fits the narrative movement. 'Mountain' is possible,
    but 'mount' works naturally with the following designation.
- source_word: τὸ καλούμενον Ἐλαιῶν
  chosen: called Olives
  alternatives:
  - called the Mount of Olives
  - called Olive Grove
  lexicon: BDAG
  rationale: The Greek literally says 'called Olives,' with Ἐλαιῶν as a genitive plural.
    To keep the wording auditable while remaining readable, the main text preserves
    the compressed expression 'called Olives'; the more familiar expanded English
    is preserved in a footnote.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Simple narrative aorist; 'sent' is the normal and sufficiently precise
    rendering.
- source_word: δύο τῶν μαθητῶν
  chosen: two of the disciples
  alternatives:
  - two of his disciples
  lexicon: BDAG
  rationale: The genitive construction naturally means 'two of the disciples.' Although
    the referent is clearly Jesus' disciples from context, 'his' is not explicit in
    the Greek and is therefore not added to the main text.
