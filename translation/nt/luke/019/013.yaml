id: LUK.19.13
reference: Luke 19:13
source:
  edition: SBLGNT
  text: καλέσας δὲ δέκα δούλους ἑαυτοῦ ἔδωκεν αὐτοῖς δέκα μνᾶς καὶ εἶπεν πρὸς αὐτούς·
    ⸀Πραγματεύσασθε ⸂ἐν ᾧ⸃ ἔρχομαι.
translation:
  text: After calling ten of his own slaves, he gave them ten minas and said to them,
    “Do business until I come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servants” or “bondservants.” The Greek word is doulos, which can denote
      a servant or a slave depending on context.
    reason: alternative_reading
  - marker: b
    text: A mina was an ancient monetary unit.
    reason: cultural_note
  - marker: c
    text: Or “Trade until I come” or “Engage in business until I come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσας
  chosen: After calling
  alternatives:
  - having called
  - when he had called
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'After calling' gives natural
    English sequence while preserving the participial relationship.
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave; here the social relation is one of
    ownership ('his own'), and the parable's master-slave framework is better preserved
    by 'slaves' per the project's contextual policy.
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: The reflexive adds emphasis of possession/relation; 'his own' preserves
    that force idiomatically.
- source_word: μνᾶς
  chosen: minas
  alternatives:
  - pounds
  - minas (a monetary unit)
  lexicon: BDAG
  rationale: A mina is an ancient monetary unit; transliteration avoids misleading
    equivalence with modern currency and preserves historical specificity.
- source_word: Πραγματεύσασθε
  chosen: Do business
  alternatives:
  - Engage in trade
  - Trade
  - Conduct business
  lexicon: BDAG
  rationale: The imperative calls for commercial activity with the money entrusted.
    'Do business' is natural modern English and broad enough to cover trading/investing
    without over-specifying the method.
- source_word: ἐν ᾧ ἔρχομαι
  chosen: until I come
  alternatives:
  - while I am coming
  - during the time in which I come back
  lexicon: BDAG
  rationale: This idiom means 'until I come/return.' English requires an idiomatic
    temporal rendering rather than a wooden 'in which.'
