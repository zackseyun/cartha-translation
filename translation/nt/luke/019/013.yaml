theological_decisions:
- issue: Rendering δοῦλος in a parabolic master-slave context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse depicts persons belonging to a master and entrusted with his
    resources. The bonded nature is contextually salient, so 'slaves' best reflects
    the social reality without importing later theological nuance.
