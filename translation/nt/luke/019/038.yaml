id: LUK.19.38
reference: Luke 19:38
source:
  edition: SBLGNT
  text: λέγοντες· Εὐλογημένος ὁ ἐρχόμενος ⸀βασιλεὺς ἐν ὀνόματι κυρίου· ⸂ἐν οὐρανῷ
    εἰρήνη⸃ καὶ δόξα ἐν ὑψίστοις.
translation:
  text: saying, “Blessed is the King who comes in the name of the Lord! Peace in heaven
    and glory in the highest!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations follow the more familiar wording, 'Blessed is he who comes
      in the name of the Lord,' but Luke explicitly includes 'the King.'
    reason: alternative_reading
  - marker: b
    text: 'This echoes Luke 2:14 but reverses the location: there, ''peace on earth'';
      here, ''peace in heaven.'''
    reason: cross_reference
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  - crying out
  lexicon: BDAG
  rationale: Present participle introducing the crowd’s acclamation; 'saying' is concise
    and natural in English while preserving the participial linkage to the previous
    verse.
- source_word: Εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  - Favored
  lexicon: BDAG
  rationale: Standard and contextually fitting rendering for a benedictory acclamation,
    echoing Psalmic and triumphal-entry language without unnecessary paraphrase.
- source_word: ὁ ἐρχόμενος
  chosen: who comes
  alternatives:
  - the one who comes
  - the coming one
  lexicon: BDAG
  rationale: With the article and participle, the phrase can be substantival; here
    'who comes' reads smoothly in apposition to 'the King' and preserves the present
    participial sense.
- source_word: βασιλεὺς
  chosen: the King
  alternatives:
  - king
  lexicon: BDAG
  rationale: The noun is explicit in Luke’s wording and should be retained. The article
    in English helps mark the royal, likely messianic identification rather than a
    merely indefinite king.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - by the authority of the Lord
  lexicon: BDAG
  rationale: This is the established idiom and best preserves both the Semitic background
    and the theological force of acting/coming under the Lord’s authority. 'Lord'
    follows the doctrine default for κύριος.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The article is natural
    in this idiom in English.
- source_word: ἐν οὐρανῷ εἰρήνη
  chosen: Peace in heaven
  alternatives:
  - In heaven, peace
  - There is peace in heaven
  lexicon: BDAG
  rationale: A verbless exclamatory clause. 'Peace in heaven' preserves the compact
    poetic structure and echoes Luke 2:14 while reflecting the reversal from 'on earth'
    to 'in heaven.'
- source_word: δόξα ἐν ὑψίστοις
  chosen: glory in the highest
  alternatives:
  - glory in the highest places
  - glory in the highest heaven
  lexicon: BDAG
  rationale: Traditional phrasing accurately reflects the dative plural ὑψίστοις as
    an idiom for the highest realms. It is both intelligible and intertextually resonant
    with Luke 2:14.
