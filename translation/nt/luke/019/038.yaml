theological_decisions:
- issue: Messianic royal acclamation in the triumphal entry
  chosen_reading: Render βασιλεὺς explicitly as 'the King' rather than smoothing to
    a generic blessing formula.
  alternative_readings:
  - Blessed is he who comes in the name of the Lord
  rationale: Luke’s text includes βασιλεὺς, unlike the shorter wording familiar from
    Psalm 118:26 and some parallel formulations. Retaining 'the King' preserves Luke’s
    explicit royal and messianic emphasis without adding doctrinal interpretation
    beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §5
- issue: Relation to Luke 2:14
  chosen_reading: Translate the second clause as 'Peace in heaven and glory in the
    highest' without harmonizing it to 'on earth peace.'
  alternative_readings:
  - Peace on earth and glory in the highest
  rationale: The source text distinctly reads 'in heaven,' and the translation should
    preserve Luke’s deliberate wording and theological tension/intertextual contrast
    rather than assimilate it to the nativity hymn.
  doctrine_reference: Translation philosophy §1, §3
