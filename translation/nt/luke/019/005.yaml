id: LUK.19.5
reference: Luke 19:5
source:
  edition: SBLGNT
  text: καὶ ὡς ἦλθεν ἐπὶ τὸν τόπον, ἀναβλέψας ὁ ⸀Ἰησοῦς εἶπεν πρὸς αὐτόν· Ζακχαῖε,
    σπεύσας κατάβηθι, σήμερον γὰρ ἐν τῷ οἴκῳ σου δεῖ με μεῖναι.
translation:
  text: And when Jesus came to the place, he looked up and said to him, “Zacchaeus,
    hurry and come down, because today I must stay at your house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your house' or 'in your home.'
    reason: lexical_alternative
  - marker: b
    text: The Greek 'I must' (δεῖ) can carry a sense of necessity tied to Jesus's
      mission or divine purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - once
  lexicon: BDAG
  rationale: In narrative sequence, ὡς commonly introduces a temporal clause. 'When'
    is the most natural modern English rendering here.
- source_word: ἐπὶ τὸν τόπον
  chosen: to the place
  alternatives:
  - upon the place
  - to that spot
  lexicon: BDAG
  rationale: A straightforward locative expression. 'To the place' preserves the Greek
    sense without awkward literalism.
- source_word: ἀναβλέψας
  chosen: he looked up
  alternatives:
  - looking up
  - raising his eyes
  lexicon: BDAG
  rationale: The participle indicates Jesus directing his gaze upward toward Zacchaeus
    in the tree. 'He looked up' is idiomatic and contextually precise.
- source_word: εἶπεν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: BDAG
  rationale: Standard speech formula; 'said to him' is the clearest natural equivalent.
- source_word: Ζακχαῖε
  chosen: Zacchaeus
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: σπεύσας κατάβηθι
  chosen: hurry and come down
  alternatives:
  - hurry down
  - quickly come down
  lexicon: BDAG
  rationale: 'The aorist participle plus imperative conveys urgency. English commonly
    expresses this with coordinated imperatives: ''hurry and come down.'''
- source_word: σήμερον γὰρ
  chosen: because today
  alternatives:
  - for today
  - today, for
  lexicon: BDAG
  rationale: γάρ gives the reason for the command. 'Because today' makes the logic
    explicit in natural English while preserving the causal force.
- source_word: ἐν τῷ οἴκῳ σου
  chosen: at your house
  alternatives:
  - in your house
  - in your home
  lexicon: BDAG
  rationale: οἶκος can denote the household/home, but in this immediate context Jesus
    is speaking of lodging/visiting at Zacchaeus's dwelling. 'At your house' is idiomatic
    and fits the scene.
- source_word: δεῖ
  chosen: I must
  alternatives:
  - it is necessary for me to
  - I need to
  lexicon: BDAG
  rationale: δεῖ often conveys necessity, sometimes with divine or mission-oriented
    overtones in Luke. 'I must' preserves that stronger sense better than 'I need
    to.'
- source_word: μεῖναι
  chosen: stay
  alternatives:
  - remain
  - lodge
  lexicon: BDAG
  rationale: μένω here refers to remaining/staying with Zacchaeus. 'Stay' is natural
    modern English and broad enough to include table fellowship and lodging.
