theological_decisions:
- issue: Force of δεῖ in Luke's narrative theology
  chosen_reading: Rendered as 'I must' to preserve necessity without over-specifying
    it as explicit divine compulsion in the main text.
  alternative_readings:
  - I need to stay
  - it is necessary for me to stay
  rationale: Luke frequently uses δεῖ for necessity tied to Jesus's mission and God's
    purpose. The verse itself signals strong necessity, but the translation should
    not import a fuller theological explanation beyond the word's force. 'I must'
    preserves the tension appropriately.
  doctrine_reference: Preserve theological tension rather than resolve it.
