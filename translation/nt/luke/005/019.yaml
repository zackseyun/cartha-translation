id: LUK.5.19
reference: Luke 5:19
source:
  edition: SBLGNT
  text: καὶ μὴ εὑρόντες ποίας εἰσενέγκωσιν αὐτὸν διὰ τὸν ὄχλον ἀναβάντες ἐπὶ τὸ δῶμα
    διὰ τῶν κεράμων καθῆκαν αὐτὸν σὺν τῷ κλινιδίῳ εἰς τὸ μέσον ἔμπροσθεν τοῦ Ἰησοῦ.
translation:
  text: And not finding a way to bring him in because of the crowd, they went up on
    the roof and lowered him with his mat through the tiles into the middle, in front
    of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not finding how to bring him in because of the crowd.' The Greek idiom
      can emphasize the manner or means as well as the access route.
    reason: lexical_alternative
  - marker: b
    text: That is, through the roof tiles. Luke's wording reflects a tiled roof structure.
    reason: cultural_note
  - marker: c
    text: Or 'with the little bed' or 'with the stretcher.' The Greek term refers
      to a small bed or sleeping mat.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίας
  chosen: a way
  alternatives:
  - how
  - by what way
  lexicon: BDAG
  rationale: In the idiom μὴ εὑρόντες ποίας εἰσενέγκωσιν, ποίας functions elliptically
    for 'by what way/how.' 'A way' gives natural English while preserving the sense
    of seeking an access route rather than merely a method in the abstract.
- source_word: εἰσενέγκωσιν
  chosen: to bring him in
  alternatives:
  - to carry him in
  - to take him in
  lexicon: BDAG
  rationale: The aorist subjunctive after the idiom of finding a way expresses intended
    entry. 'Bring him in' is broad and natural; 'carry him in' is possible but slightly
    over-specifies the manner, which is already implied by context.
- source_word: διὰ τὸν ὄχλον
  chosen: because of the crowd
  alternatives:
  - through the crowd
  - on account of the crowd
  lexicon: BDAG
  rationale: With διά + accusative here the sense is causal, not spatial. The obstacle
    is the crowd itself, so 'because of the crowd' best reflects the syntax.
- source_word: ἀναβάντες ἐπὶ τὸ δῶμα
  chosen: they went up on the roof
  alternatives:
  - having gone up onto the housetop
  - they climbed onto the roof
  lexicon: BDAG
  rationale: δῶμα refers to the roof/flat housetop area. 'Went up on the roof' is
    idiomatic modern English and preserves the upward movement without unnecessary
    archaism.
- source_word: διὰ τῶν κεράμων
  chosen: through the tiles
  alternatives:
  - through the roof tiles
  - through the tiling
  lexicon: BDAG
  rationale: κέραμος can denote clay tile; the plural here naturally refers to roof
    tiles. 'Through the tiles' is concise and contextually clear, while making explicit
    the architectural detail Luke includes.
- source_word: καθῆκαν
  chosen: lowered
  alternatives:
  - let down
  - sent down
  lexicon: BDAG
  rationale: The verb means to lower from above. 'Lowered' is clear contemporary English
    and fits the physical action from the roof into the room.
- source_word: σὺν τῷ κλινιδίῳ
  chosen: with his mat
  alternatives:
  - with the stretcher
  - with the little bed
  - with his pallet
  lexicon: BDAG
  rationale: κλινίδιον is a diminutive for a small bed or couch. In this healing context,
    'mat' is natural and avoids archaic 'pallet'; 'stretcher' may imply a more medicalized
    object than the term requires. 'His' is supplied naturally in English from the
    context of the paralytic being carried on it.
- source_word: εἰς τὸ μέσον
  chosen: into the middle
  alternatives:
  - into the midst
  - into the center
  lexicon: BDAG
  rationale: The phrase indicates placement in the central area of the gathering.
    'Into the middle' is straightforward modern English.
- source_word: ἔμπροσθεν τοῦ Ἰησοῦ
  chosen: in front of Jesus
  alternatives:
  - before Jesus
  lexicon: BDAG
  rationale: The preposition marks spatial position before Jesus. 'In front of Jesus'
    is clearer for modern readers than the potentially more formal 'before Jesus,'
    which can also sound temporal or judicial in English.
