theological_decisions:
- issue: Whether to specify the object carried as 'bed' or 'mat' in the main text
  chosen_reading: Keep the main text closer to the Greek with 'what he had been lying
    on' and preserve a more explicit object in a footnote.
  alternative_readings:
  - the mat he had been lying on
  - the bed he had been lying on
  rationale: The verse itself uses a relative expression rather than an explicit noun.
    Retaining that in the main text avoids adding specificity not present in this
    clause, while a footnote can aid readability by connecting with the broader context.
  doctrine_reference: Translation philosophy §1, §5
