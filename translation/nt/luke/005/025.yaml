id: LUK.5.25
reference: Luke 5:25
source:
  edition: SBLGNT
  text: καὶ παραχρῆμα ἀναστὰς ἐνώπιον αὐτῶν, ἄρας ἐφ’ ὃ κατέκειτο, ἀπῆλθεν εἰς τὸν
    οἶκον αὐτοῦ δοξάζων τὸν θεόν.
translation:
  text: And immediately he stood up before them, picked up what he had been lying
    on, and went away to his house, glorifying God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mat he had been lying on' (literally, 'that on which he was lying').
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb denotes something happening without delay. 'Immediately' is
    natural modern English and preserves Luke's emphasis on the instant effect of
    the healing.
- source_word: ἀναστὰς
  chosen: he stood up
  alternatives:
  - having risen
  - he got up
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having risen'), English idiom
    is clearer with the finite verb 'he stood up' in sequence with the following actions.
    This preserves the event order without awkwardness.
- source_word: ἐνώπιον αὐτῶν
  chosen: before them
  alternatives:
  - in their presence
  - before their eyes
  lexicon: BDAG
  rationale: The phrase indicates public visibility in front of the gathered people.
    'Before them' is concise and faithful; the more interpretive 'before their eyes'
    is possible but not required by the Greek.
- source_word: ἄρας
  chosen: picked up
  alternatives:
  - having taken up
  - carried away
  lexicon: BDAG
  rationale: From αἴρω, here referring to lifting and taking the mat/bed. 'Picked
    up' is idiomatic and fits the concrete action. 'Having taken up' is more formal
    but less natural in English narrative.
- source_word: ἐφ’ ὃ κατέκειτο
  chosen: what he had been lying on
  alternatives:
  - the mat he had been lying on
  - that on which he had been lying
  lexicon: BDAG
  rationale: The Greek is literally 'that on which he was lying.' Because no explicit
    noun for bed/mat appears in this verse, 'what he had been lying on' preserves
    the source wording without importing a specific object into the main text. A more
    explicit alternative is worth preserving in a footnote for readability.
- source_word: κατέκειτο
  chosen: had been lying
  alternatives:
  - was lying
  - lay
  lexicon: BDAG
  rationale: The imperfect middle/passive-form verb depicts his prior ongoing state.
    'Had been lying' fits the narrative retrospectively in English better than the
    flatter 'lay'.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: The verb means to go away/depart. 'Went away' preserves the directional
    nuance better than simply 'went,' while remaining natural.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: BDAG
  rationale: οἶκος commonly means 'house' or 'home.' 'To his house' is a straightforward
    rendering of the concrete noun and fits the narrative setting.
- source_word: δοξάζων τὸν θεόν
  chosen: glorifying God
  alternatives:
  - praising God
  - giving glory to God
  lexicon: BDAG
  rationale: δοξάζω is best rendered 'glorify' here to preserve the God-directed honor
    language. 'Praising God' is possible but slightly narrows the semantic range from
    honoring/exalting to verbal praise alone.
