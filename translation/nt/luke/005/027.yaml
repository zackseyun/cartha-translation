theological_decisions:
- issue: Force of Jesus’ imperative as discipleship summons
  chosen_reading: Rendered as a direct call, 'Follow me,' without expanding it into
    a fuller theological paraphrase.
  alternative_readings:
  - Become my disciple
  - Follow after me as my disciple
  rationale: The Greek imperative Ἀκολούθει is sufficient on its own and should not
    be paraphrased beyond the text. In context it clearly functions as a summons to
    discipleship, but the translation preserves the wording rather than importing
    explanatory language.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
