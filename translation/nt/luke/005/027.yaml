id: LUK.5.27
reference: Luke 5:27
source:
  edition: SBLGNT
  text: Καὶ μετὰ ταῦτα ἐξῆλθεν καὶ ἐθεάσατο τελώνην ὀνόματι Λευὶν καθήμενον ἐπὶ τὸ
    τελώνιον, καὶ εἶπεν αὐτῷ· Ἀκολούθει μοι.
translation:
  text: And after these things he went out and saw a tax collector named Levi sitting
    at the tax booth, and he said to him, “Follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'noticed' or 'looked at'; the Greek verb can imply more than a passing
      glance.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the toll booth' or 'at the customs station.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: BDAG
  rationale: A relatively formal rendering preserves Luke’s narrative transition without
    over-smoothing it. 'After these things' reflects the plural demonstrative and
    keeps the sequence explicit.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he went away
  - he departed
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι is straightforwardly rendered 'went out.' This
    preserves the concrete movement implied by the verb better than the more interpretive
    'departed.'
- source_word: ἐθεάσατο
  chosen: saw
  alternatives:
  - looked at
  - noticed
  - observed
  lexicon: BDAG
  rationale: θεάομαι can suggest looking attentively, but in this narrative context
    'saw' is natural modern English and does not overstate the nuance. The alternatives
    are possible, but 'saw' best balances readability and fidelity.
- source_word: τελώνην
  chosen: tax collector
  alternatives:
  - toll collector
  - revenue officer
  lexicon: BDAG
  rationale: '''Tax collector'' is the standard and clearest rendering for τελώνης
    in the Gospels. It communicates the social role without unnecessary technicality.'
- source_word: ὀνόματι Λευὶν
  chosen: named Levi
  alternatives:
  - by the name of Levi
  lexicon: BDAG
  rationale: The dative construction with ὄνομα is idiomatically rendered 'named Levi'
    in English. This is concise and accurate.
- source_word: καθήμενον
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: The present participle depicts Levi in the act/state of being at his
    station. 'Sitting' is the most natural equivalent and preserves the scene’s immediacy.
- source_word: ἐπὶ τὸ τελώνιον
  chosen: at the tax booth
  alternatives:
  - at the tax office
  - at the toll booth
  - at the customs station
  lexicon: BDAG
  rationale: τελώνιον refers to the place where taxes/tolls were collected. 'Tax booth'
    is vivid, idiomatic, and fits the likely setting better than the broader 'tax
    office.'
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Come after me
  lexicon: BDAG
  rationale: The present imperative naturally functions here as a call to discipleship.
    'Follow me' is the established and accurate English rendering, preserving both
    literal sense and discipleship force.
