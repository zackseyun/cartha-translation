id: LUK.5.2
reference: Luke 5:2
source:
  edition: SBLGNT
  text: καὶ εἶδεν ⸂δύο πλοῖα⸃ ἑστῶτα παρὰ τὴν λίμνην, οἱ δὲ ἁλιεῖς ⸂ἀπ’ αὐτῶν ἀποβάντες⸃
    ⸀ἔπλυνον τὰ δίκτυα.
translation:
  text: And he saw two boats standing by the lake, but the fishermen had gotten out
    of them and were washing the nets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having disembarked from them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - looked at
  - noticed
  lexicon: BDAG
  rationale: Aorist of ὁράω is naturally rendered 'saw' in narrative. 'Noticed' is
    possible but adds a nuance of sudden perception not required by the text.
- source_word: πλοῖα
  chosen: boats
  alternatives:
  - ships
  lexicon: BDAG
  rationale: πλοῖον can mean boat or ship, but in the fishing context on the Lake
    of Gennesaret, 'boats' is the natural modern English rendering.
- source_word: ἑστῶτα
  chosen: standing
  alternatives:
  - lying
  - moored
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι describes the boats as being in a
    stationary position. 'Standing' is a conventional and sufficiently literal English
    rendering for inanimate objects in this context; 'moored' is interpretive and
    more specific than the Greek states.
- source_word: παρὰ τὴν λίμνην
  chosen: by the lake
  alternatives:
  - beside the lake
  - along the lake
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. 'By the lake'
    is idiomatic and accurate. λίμνη is best rendered 'lake,' not 'sea,' in this immediate
    lexical context.
- source_word: οἱ δὲ ἁλιεῖς
  chosen: but the fishermen
  alternatives:
  - and the fishermen
  - now the fishermen
  lexicon: BDAG
  rationale: δέ marks a mild contrast or scene shift between the boats and the fishermen.
    'But' preserves that contrast more clearly in English than a simple 'and.' ἁλιεῖς
    is straightforwardly 'fishermen' in this occupational setting.
- source_word: ἀπ’ αὐτῶν ἀποβάντες
  chosen: had gotten out of them
  alternatives:
  - having disembarked from them
  - having gone ashore from them
  lexicon: BDAG
  rationale: The aorist participle denotes action prior to the main verb. English
    past perfect ('had gotten out') conveys that sequence naturally. 'Them' refers
    to the boats. 'Disembarked' is accurate but less readable; 'gone ashore' adds
    a shoreline nuance implied by context but not explicit in the wording.
- source_word: ἔπλυνον
  chosen: were washing
  alternatives:
  - washed
  lexicon: BDAG
  rationale: Imperfect of πλύνω indicates ongoing or customary action in the scene.
    'Were washing' best captures the progressive aspect in English.
- source_word: τὰ δίκτυα
  chosen: the nets
  alternatives:
  - their nets
  lexicon: BDAG
  rationale: δίκτυα means 'nets.' The possessive 'their' is implied by context but
    absent in Greek, so 'the nets' is preferred as the more transparent rendering.
