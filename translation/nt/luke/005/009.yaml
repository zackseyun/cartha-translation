id: LUK.5.9
reference: Luke 5:9
source:
  edition: SBLGNT
  text: θάμβος γὰρ περιέσχεν αὐτὸν καὶ πάντας τοὺς σὺν αὐτῷ ἐπὶ τῇ ἄγρᾳ τῶν ἰχθύων
    ⸀ὧν συνέλαβον,
translation:
  text: For astonishment had seized him and all those with him because of the catch
    of fish that they had taken,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which they had caught.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θάμβος
  chosen: astonishment
  alternatives:
  - amazement
  - wonder
  lexicon: BDAG
  rationale: The noun denotes a state of amazement or astonishment. 'Astonishment'
    preserves the force of a sudden overwhelming reaction without sounding overly
    elevated. It fits the narrative response to the miraculous catch.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: This conjunction gives the reason for Simon's reaction in the preceding
    verse. 'For' preserves the explanatory connection in a concise, natural way.
- source_word: περιέσχεν
  chosen: had seized
  alternatives:
  - gripped
  - overcame
  - surrounded
  lexicon: BDAG
  rationale: The verb literally has the sense of enclosing or taking hold of; in this
    idiom with an emotion-like subject, it means that astonishment took hold of him.
    'Had seized' conveys the sudden, overpowering nature of the experience and works
    well in English narrative style.
- source_word: πάντας τοὺς σὺν αὐτῷ
  chosen: all those with him
  alternatives:
  - everyone with him
  - all who were with him
  lexicon: BDAG
  rationale: This phrase refers to Simon's companions present with him. 'All those
    with him' is a clear and natural rendering that preserves the collective scope.
- source_word: ἐπὶ τῇ ἄγρᾳ τῶν ἰχθύων
  chosen: because of the catch of fish
  alternatives:
  - at the catch of fish
  - over the haul of fish
  - because of the haul of fish
  lexicon: BDAG
  rationale: ἄγρα refers to a catch, especially of fish in this context. The preposition
    ἐπί here expresses cause or basis, so 'because of' is preferable to a more wooden
    'upon' or 'at.' 'Catch of fish' is straightforward and idiomatic.
- source_word: ὧν συνέλαβον
  chosen: that they had taken
  alternatives:
  - which they had caught
  - that they had caught together
  lexicon: BDAG
  rationale: The relative pronoun refers back to the fish, and συνέλαβον means they
    caught/took together. 'That they had taken' is slightly more formal and avoids
    repeating 'catch/caught' immediately after 'catch of fish,' while still accurately
    conveying the action. The plural verb shows the group participated, so 'they'
    is required.
