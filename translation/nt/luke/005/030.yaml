theological_decisions:
- issue: Social-religious force of table fellowship with 'tax collectors and sinners'
  chosen_reading: Retain the concrete accusation without explanatory expansion
  alternative_readings:
  - Paraphrase to make explicit ritual or moral offense
  rationale: The verse presents the Pharisees' objection through the categories 'tax
    collectors and sinners' and the act of eating and drinking with them. The translation
    preserves the historical and theological tension of table fellowship without importing
    a fuller explanation not stated in the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
