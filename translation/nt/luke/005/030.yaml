id: LUK.5.30
reference: Luke 5:30
source:
  edition: SBLGNT
  text: καὶ ἐγόγγυζον οἱ ⸂Φαρισαῖοι καὶ οἱ γραμματεῖς αὐτῶν⸃ πρὸς τοὺς μαθητὰς αὐτοῦ
    λέγοντες· Διὰ τί μετὰ τῶν τελωνῶν καὶ ἁμαρτωλῶν ἐσθίετε καὶ πίνετε;
translation:
  text: And the Pharisees and their scribes were grumbling to his disciples, saying,
    “Why do you eat and drink with tax collectors and sinners?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were murmuring.' The Greek verb can denote muttering complaint, not
      merely formal objection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγόγγυζον
  chosen: were grumbling
  alternatives:
  - were complaining
  - were murmuring
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action, best reflected with
    'were grumbling.' 'Grumbling' preserves the negative, muttering nuance of γογγύζω
    better than the flatter 'complaining.'
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct lexical equivalent and preserves the
    historical group designation. More interpretive alternatives explain function
    rather than translate the term.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: 'The genitive pronoun most naturally modifies ''scribes'' in relation
    to the Pharisees: ''their scribes.'' This follows the Greek syntax and avoids
    awkward English.'
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - against his disciples
  - with his disciples
  lexicon: BDAG
  rationale: πρός with the accusative here marks direction of speech. 'To his disciples'
    is the natural English rendering in this dialogue context.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic English interrogative equivalent; no need for a more wooden
    rendering.
- source_word: τελωνῶν
  chosen: tax collectors
  alternatives:
  - toll collectors
  - revenue agents
  lexicon: BDAG
  rationale: Standard and clear rendering for τελώνης in Gospel contexts, preserving
    the social stigma associated with the group.
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Direct and conventional rendering. In context it likely reflects a socially
    and morally marked class as perceived by the speakers; 'sinners' preserves that
    force without paraphrase.
- source_word: ἐσθίετε καὶ πίνετε
  chosen: eat and drink
  alternatives:
  - are eating and drinking
  - share meals
  lexicon: BDAG
  rationale: Present tense is well represented by simple English present in a generalizing
    question. 'Eat and drink' preserves the concrete wording better than the more
    interpretive 'share meals.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Simple connective retained to reflect the Greek narrative flow without
    overinterpreting discourse function.
