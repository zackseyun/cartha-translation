theological_decisions:
- issue: Rendering of λέπρα / καθαρίζω in a healing context
  chosen_reading: Use 'leprosy' and 'cleanse me' rather than reducing the request
    to mere physical healing.
  alternative_readings:
  - Use 'skin disease' and 'heal me'
  rationale: The Greek emphasizes not only illness but also cleansing language with
    ritual overtones. 'Cleanse' preserves the theological and social dimension of
    restoration without denying the physical healing involved. 'Leprosy' is traditional
    and recognizable, though broader ancient usage is acknowledged.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  - Sir
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    This preserves both respect and possible christological resonance without overstating
    what the immediate context alone proves.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
