id: LUK.5.12
reference: Luke 5:12
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ εἶναι αὐτὸν ἐν μιᾷ τῶν πόλεων καὶ ἰδοὺ ἀνὴρ πλήρης λέπρας·
    ⸂καὶ ἰδὼν⸃ τὸν Ἰησοῦν πεσὼν ἐπὶ πρόσωπον ἐδεήθη αὐτοῦ λέγων· Κύριε, ἐὰν θέλῃς
    δύνασαί με καθαρίσαι.
translation:
  text: And it happened that while he was in one of the towns, behold, there was a
    man full of leprosy. And when he saw Jesus, he fell on his face and begged him,
    saying, “Lord, if you are willing, you can cleanse me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “covered with leprosy.” The Greek says “full of leprosy,” emphasizing
      the severity of his condition.
    reason: lexical_alternative
  - marker: b
    text: Or “make me clean.” The verb can refer to cleansing in both physical and
      ritual/social senses, not merely medical healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Uses natural modern English while preserving Luke’s narrative formula
    introducing a scene.
- source_word: ἐν τῷ εἶναι αὐτὸν
  chosen: while he was
  alternatives:
  - as he was
  - when he was
  lexicon: BDAG
  rationale: Renders the articular infinitive construction idiomatically as a temporal
    clause without over-literal awkwardness.
- source_word: μιᾷ τῶν πόλεων
  chosen: one of the towns
  alternatives:
  - one of the cities
  lexicon: BDAG
  rationale: πόλις can be rendered 'city' or 'town'; 'towns' is more natural in this
    narrative setting and avoids implying a major urban center beyond what the Greek
    requires.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: BDAG
  rationale: Preserves the discourse marker’s vividness and suddenness. Though somewhat
    marked in English, it remains understandable and reflects Luke’s narrative emphasis.
- source_word: ἀνὴρ
  chosen: a man
  lexicon: BDAG
  rationale: Straightforward rendering of the singular masculine noun referring to
    an adult male individual.
- source_word: πλήρης λέπρας
  chosen: full of leprosy
  alternatives:
  - covered with leprosy
  - completely leprous
  lexicon: BDAG
  rationale: Keeps the metaphorically intensive πλήρης ('full of') and the traditional
    disease term λέπρα. This reflects the severity of the condition without expanding
    beyond the Greek.
- source_word: ἰδὼν
  chosen: when he saw
  alternatives:
  - seeing
  lexicon: BDAG
  rationale: The aorist participle is rendered as a temporal clause for smooth English
    narrative sequence.
- source_word: πεσὼν ἐπὶ πρόσωπον
  chosen: he fell on his face
  alternatives:
  - falling on his face
  - he fell facedown
  lexicon: BDAG
  rationale: Preserves the physical posture of humility and urgent supplication in
    idiomatic English.
- source_word: ἐδεήθη αὐτοῦ
  chosen: begged him
  alternatives:
  - implored him
  - pleaded with him
  lexicon: BDAG
  rationale: Conveys earnest petition. 'Begged' captures the desperation of the request
    more vividly than the more formal 'asked'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - Sir
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος. In this context it functions
    as a respectful address to Jesus and is appropriately rendered 'Lord.'
- source_word: ἐὰν θέλῃς
  chosen: if you are willing
  alternatives:
  - if you will
  - if you want to
  lexicon: BDAG
  rationale: Expresses volition in clear modern English. 'If you will' is more formal/traditional
    but less natural for contemporary readers.
- source_word: δύνασαί
  chosen: you can
  alternatives:
  - you are able to
  lexicon: BDAG
  rationale: Simple and natural rendering of ability/power; no theological nuance
    is lost here.
- source_word: καθαρίσαι
  chosen: cleanse me
  alternatives:
  - make me clean
  - purify me
  lexicon: BDAG
  rationale: Retains the ritual and physical sense of cleansing associated with skin
    disease in biblical usage. 'Heal me' would narrow the meaning and miss the purity
    dimension.
