theological_decisions:
- issue: Nature of the healing language
  chosen_reading: Render θεραπεύεσθαι and ἀσθενειῶν in straightforward bodily-healing
    terms without expanding into spiritual healing.
  alternative_readings:
  - Use broader language such as 'made whole' that could imply spiritual restoration
  rationale: In this immediate narrative context, the crowds gather for hearing and
    physical healing from ailments. The text itself does not explicitly state spiritual
    healing here, so the translation should not import that implication.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
