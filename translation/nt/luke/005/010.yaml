id: LUK.5.10
reference: Luke 5:10
source:
  edition: SBLGNT
  text: ὁμοίως δὲ καὶ Ἰάκωβον καὶ Ἰωάννην υἱοὺς Ζεβεδαίου, οἳ ἦσαν κοινωνοὶ τῷ Σίμωνι.
    καὶ εἶπεν πρὸς τὸν Σίμωνα ⸀ὁ Ἰησοῦς· Μὴ φοβοῦ· ἀπὸ τοῦ νῦν ἀνθρώπους ἔσῃ ζωγρῶν.
translation:
  text: and likewise also James and John, Zebedee’s sons, who were partners with Simon.
    And Jesus said to Simon, “Do not be afraid; from now on you will be catching people
    alive.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “catching men alive.” The Greek uses a term meaning to capture or take
      alive, preserving a life-giving nuance distinct from the more familiar “fishers
      of men” in Matthew 4:19 and Mark 1:17.
    reason: lexical_alternative
  - marker: b
    text: Compare Matthew 4:19 and Mark 1:17, where Jesus says, “I will make you fishers
      of men.” Luke’s wording here is distinct and should not be flattened into the
      parallel phrasing.
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως δὲ καὶ
  chosen: and likewise also
  alternatives:
  - and likewise
  - and so also
  lexicon: BDAG
  rationale: Retains the additive and comparative force of the Greek sequence, linking
    James and John to the same reaction already described. Slightly formal, but still
    natural enough in context.
- source_word: υἱοὺς Ζεβεδαίου
  chosen: Zebedee’s sons
  alternatives:
  - sons of Zebedee
  lexicon: BDAG
  rationale: A natural English genitive that preserves the familial identification
    without loss of meaning.
- source_word: κοινωνοὶ
  chosen: partners
  alternatives:
  - companions
  - associates
  - sharers
  lexicon: BDAG
  rationale: In this fishing-business context, κοινωνοί most naturally refers to business
    partners rather than merely friends or companions. 'Partners' best fits the immediate
    narrative setting.
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  - Stop being afraid
  lexicon: BDAG
  rationale: Idiomatic modern English for the present middle/passive imperative with
    μή. It preserves the pastoral reassurance without archaic tone.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time on
  - from now
  lexicon: BDAG
  rationale: Standard idiomatic rendering marking a decisive transition in Simon’s
    vocation.
- source_word: ἀνθρώπους
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although grammatically masculine, ἄνθρωπος here refers to human beings
    generally, not specifically males. 'People' accurately conveys the referent in
    natural English while matching the source intent.
- source_word: ζωγρῶν
  chosen: catching people alive
  alternatives:
  - catching men alive
  - taking alive
  - capturing alive
  lexicon: BDAG
  rationale: ζωγρέω specifically carries the sense of taking alive rather than killing
    or merely catching. 'Catching people alive' preserves the verbal image from fishing
    while making explicit the life-preserving nuance important to the metaphor.
