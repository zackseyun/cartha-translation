theological_decisions:
- issue: Rendering the metaphor of ζωγρέω in Jesus’ call to Simon
  chosen_reading: you will be catching people alive
  alternative_readings:
  - you will catch men
  - you will be a fisher of men
  rationale: Luke’s wording differs from the more familiar Matthean/Markan expression
    'fishers of men.' The Greek here uses ζωγρέω, which emphasizes taking alive. The
    translation preserves Luke’s distinct metaphor and avoids harmonizing with parallel
    passages.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gender rendering of ἀνθρώπους
  chosen_reading: people
  alternative_readings:
  - men
  - human beings
  rationale: Per the gender-accurate principle, the term is rendered according to
    intended referent rather than grammatical gender. The context concerns human beings
    generally who will be brought into life through Jesus’ mission.
  doctrine_reference: Translation philosophy §4
