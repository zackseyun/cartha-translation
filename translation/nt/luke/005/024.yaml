id: LUK.5.24
reference: Luke 5:24
source:
  edition: SBLGNT
  text: ἵνα δὲ εἰδῆτε ὅτι ⸂ὁ υἱὸς τοῦ ἀνθρώπου ἐξουσίαν ἔχει⸃ ἐπὶ τῆς γῆς ἀφιέναι
    ἁμαρτίας— εἶπεν τῷ παραλελυμένῳ· Σοὶ λέγω, ⸀ἔγειρε καὶ ἄρας τὸ κλινίδιόν σου πορεύου
    εἰς τὸν οἶκόν σου.
translation:
  text: But so that you may know that the Son of Man has authority on earth to forgive
    sins—he said to the paralyzed man, “I say to you, rise, pick up your mat, and
    go to your house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Human One.' The Greek title 'the Son of Man' is retained because
      it is Jesus' self-designation and carries important biblical resonance, especially
      with Daniel 7.
    reason: alternative_reading
  - marker: b
    text: Or 'take up your bed.' The Greek κλινίδιον refers to a small bed, pallet,
      or mat.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ
  chosen: But so that
  alternatives:
  - But that
  - Yet so that
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result here, and δέ marks a mild transition. 'But
    so that' preserves both the contrastive flow and the purpose clause naturally
    in English.
- source_word: εἰδῆτε
  chosen: you may know
  alternatives:
  - you may realize
  - you may understand
  lexicon: BDAG
  rationale: From οἶδα, expressing knowledge/certainty. 'You may know' is the most
    direct and idiomatic rendering in this context.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and a recognized title with Danielic
    resonance. It should be translated, not paraphrased, and retained in its traditional
    form to preserve its theological and intertextual weight.
- source_word: ἐξουσίαν ἔχει
  chosen: has authority
  alternatives:
  - has the authority
  - has power
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated or rightful authority rather than mere raw
    power. 'Has authority' best captures the legal-right dimension central to the
    dispute about forgiving sins.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  - on the earth
  lexicon: BDAG
  rationale: A straightforward locative expression. 'On earth' is idiomatic and preserves
    the contrast implied with divine prerogative exercised in the earthly sphere.
- source_word: ἀφιέναι ἁμαρτίας
  chosen: to forgive sins
  alternatives:
  - to release sins
  - to pardon sins
  lexicon: BDAG
  rationale: ἀφίημι in this context means forgive/remit. 'To forgive sins' is the
    standard and clearest rendering, matching the immediate controversy in the passage.
- source_word: τῷ παραλελυμένῳ
  chosen: to the paralyzed man
  alternatives:
  - to the paralytic
  - to the man who was paralyzed
  lexicon: BDAG
  rationale: The perfect participle functions substantivally for the afflicted person.
    'The paralyzed man' is clear modern English; 'paralytic' is accurate but less
    natural for the target readership.
- source_word: Σοὶ λέγω
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A direct emphatic address. 'I say to you' preserves the solemnity and
    directness of the Greek.
- source_word: ἔγειρε
  chosen: rise
  alternatives:
  - get up
  - stand up
  lexicon: BDAG
  rationale: The imperative calls for immediate action. 'Rise' is concise and dignified,
    fitting the miracle context; 'get up' is possible but slightly less elevated.
- source_word: ἄρας
  chosen: pick up
  alternatives:
  - take up
  - carry
  lexicon: BDAG
  rationale: The participle αἴρω here means to lift and carry away the mat. 'Pick
    up' is natural modern English and accurately conveys the action.
- source_word: κλινίδιόν σου
  chosen: your mat
  alternatives:
  - your stretcher
  - your bed
  lexicon: BDAG
  rationale: κλινίδιον is a diminutive for a small bed or pallet. 'Mat' best fits
    the likely object in context and avoids the heavier connotations of a full bed;
    'stretcher' is possible but too medically specific.
- source_word: πορεύου
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: A common imperative of movement. 'Go' is the simplest and most natural
    rendering.
- source_word: εἰς τὸν οἶκόν σου
  chosen: to your house
  alternatives:
  - to your home
  lexicon: BDAG
  rationale: οἶκος can mean house or home. 'To your house' is slightly more literal
    and fits the concrete movement commanded here, while still sounding natural.
