theological_decisions:
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a christological title and likely evokes Daniel
    7. Retaining 'the Son of Man' preserves both the title's established recognition
    and its theological ambiguity/tension without interpretive reduction.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Nuance of ἐξουσία in relation to forgiving sins
  chosen_reading: authority
  alternative_readings:
  - power
  rationale: The context concerns Jesus' rightful prerogative to forgive sins, not
    merely miraculous ability. 'Authority' better preserves the theological claim
    being demonstrated by the healing.
  doctrine_reference: Translation philosophy §1
- issue: Referent of ἐπὶ τῆς γῆς
  chosen_reading: on earth
  alternative_readings:
  - in the earthly realm
  rationale: The phrase is left straightforward rather than expanded interpretively.
    This preserves the text's claim that the Son of Man exercises divine-forgiveness
    authority within the earthly sphere.
  doctrine_reference: Translation philosophy §3
