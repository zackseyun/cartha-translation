id: LUK.5.28
reference: Luke 5:28
source:
  edition: SBLGNT
  text: καὶ καταλιπὼν ⸀πάντα ἀναστὰς ⸀ἠκολούθει αὐτῷ.
translation:
  text: And leaving everything behind, he got up and began to follow him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having left everything, he rose and followed him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλιπὼν
  chosen: leaving ... behind
  alternatives:
  - having left
  - abandoning
  lexicon: BDAG
  rationale: Aorist participle of καταλείπω, indicating prior action relative to the
    main verb. 'Leaving ... behind' is natural modern English and conveys decisive
    renunciation without overstating the sense as 'abandoning.'
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: BDAG
  rationale: Neuter plural accusative functioning comprehensively. 'Everything' is
    idiomatic English and captures the totality of what Levi left.
- source_word: ἀναστὰς
  chosen: he got up
  alternatives:
  - rising
  - standing up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι. In narrative context it commonly means
    getting up to act. 'He got up' is clearer and more natural than the more formal
    'rising.'
- source_word: ἠκολούθει
  chosen: began to follow
  alternatives:
  - followed
  - was following
  lexicon: BDAG
  rationale: Imperfect of ἀκολουθέω. The imperfect suggests ongoing or inceptive action.
    'Began to follow' captures the narrative transition into discipleship better than
    a simple past, while still remaining readable.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: Dative pronoun referring to Jesus from the immediate context. The Greek
    uses a pronoun, so 'him' preserves the source-text cohesion without unnecessarily
    repeating the name.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Simple connective linking this verse to the previous call narrative.
    'And' preserves the straightforward coordination of the Greek without adding interpretive
    nuance.
