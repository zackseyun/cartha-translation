theological_decisions:
- issue: Extent of Levi's renunciation in discipleship
  chosen_reading: The text states that he left 'everything' and followed Jesus, without
    specifying a doctrine of permanent dispossession beyond the narrative moment.
  alternative_readings:
  - He temporarily left his work
  - He permanently renounced all possessions
  rationale: The verse emphasizes decisive response to Jesus' call. The translation
    preserves the totalizing language of πάντα but does not import a fuller theological
    claim about property or vocation than the text itself states.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
