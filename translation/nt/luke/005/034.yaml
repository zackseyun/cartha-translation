id: LUK.5.34
reference: Luke 5:34
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ εἶπεν πρὸς αὐτούς· Μὴ δύνασθε τοὺς υἱοὺς τοῦ νυμφῶνος ἐν ᾧ ὁ νυμφίος
    μετ’ αὐτῶν ἐστιν ποιῆσαι ⸀νηστεῦσαι;
translation:
  text: And he said to them, “You cannot make the wedding guests fast while the bridegroom
    is with them, can you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the sons of the bridal chamber,' an idiom for the bridegroom's
      companions or wedding guests.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ δύνασθε
  chosen: You cannot ... can you?
  alternatives:
  - Can you ... ?
  - Surely you cannot ...
  lexicon: BDAG
  rationale: μή with the indicative in a question expects a negative answer. English
    can reflect this either with 'Can you...?' in context or more explicitly with
    'You cannot..., can you?' The chosen rendering preserves the rhetorical force
    and expected negative answer.
- source_word: υἱοὺς τοῦ νυμφῶνος
  chosen: the wedding guests
  alternatives:
  - the sons of the bridal chamber
  - the attendants of the bridegroom
  lexicon: BDAG
  rationale: The idiom literally reads 'sons of the wedding hall/bridal chamber' and
    refers to those associated with the wedding celebration, especially the bridegroom's
    companions. 'Wedding guests' communicates the sense in natural modern English
    without wooden literalism.
- source_word: νυμφῶνος
  chosen: wedding
  alternatives:
  - bridal chamber
  - wedding hall
  lexicon: BDAG
  rationale: Within the idiom 'sons of the νυμφών,' the focus is not the room itself
    but the wedding setting and celebration. Rendering the whole phrase idiomatically
    avoids misleadingly spatial language in English.
- source_word: νυμφίος
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and clearest equivalent, preserving the
    formal wedding imagery that is important in the saying.'
- source_word: μετ’ αὐτῶν ἐστιν
  chosen: is with them
  alternatives:
  - is among them
  lexicon: BDAG
  rationale: The phrase denotes the bridegroom's present company with the guests.
    'Is with them' is the most direct and natural rendering.
- source_word: ποιῆσαι νηστεῦσαι
  chosen: make ... fast
  alternatives:
  - cause ... to fast
  - have ... fast
  lexicon: BDAG
  rationale: ποιέω followed by an infinitive can mean 'cause/make someone do something.'
    'Make the wedding guests fast' is concise, idiomatic, and preserves the causative
    sense better than simply 'can the wedding guests fast,' which would omit ποιῆσαι.
- source_word: νηστεῦσαι
  chosen: fast
  alternatives:
  - go without food as a religious fast
  lexicon: BDAG
  rationale: '''Fast'' is the standard concise English equivalent and fits the religious
    context without unnecessary expansion.'
