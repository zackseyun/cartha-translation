theological_decisions:
- issue: Metaphorical identification of Jesus as the bridegroom
  chosen_reading: Retain 'bridegroom' imagery without explicating its theological
    significance in the main text.
  alternative_readings:
  - Interpretively expand to make explicit that Jesus identifies himself with the
    bridegroom figure
  rationale: The verse itself presents the metaphor and implies Jesus' special role,
    but the translation should not import explanatory theology into the text. Preserving
    the image allows readers to see the claim without over-translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
