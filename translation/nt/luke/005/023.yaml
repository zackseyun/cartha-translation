theological_decisions:
- issue: Rendering the forgiveness statement without importing extra doctrinal nuance
    from the Greek perfect/passive form
  chosen_reading: Your sins are forgiven you
  alternative_readings:
  - Your sins have been forgiven you
  rationale: The verse contrasts the pronouncement of forgiveness with the command
    to heal. The translation preserves the declarative force of forgiveness without
    making the English tense carry more theological weight than the context requires.
    The wording does not resolve questions about agency beyond what the passive form
    implies in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
