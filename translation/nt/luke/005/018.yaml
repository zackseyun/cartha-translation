id: LUK.5.18
reference: Luke 5:18
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἄνδρες φέροντες ἐπὶ κλίνης ἄνθρωπον ὃς ἦν παραλελυμένος, καὶ ἐζήτουν
    αὐτὸν εἰσενεγκεῖν καὶ ⸀θεῖναι ἐνώπιον αὐτοῦ.
translation:
  text: And behold, men were carrying on a bed a man who was paralyzed, and they were
    seeking to bring him in and set him before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a stretcher' or 'on a couch'; the Greek κλίνη can denote a bed-like
      pallet or couch.
    reason: lexical_alternative
  - marker: b
    text: That is, before Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-getting particle.
    'Behold' is slightly formal but still readable and preserves the narrative vividness
    better than omitting it.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - some men
  - people
  lexicon: BDAG
  rationale: ἀνήρ specifically denotes adult males, not people in general. 'Men' is
    gender-accurate and matches the source.
- source_word: φέροντες
  chosen: were carrying
  alternatives:
  - carrying
  - brought
  lexicon: BDAG
  rationale: The present participle is rendered with progressive force in English
    to convey ongoing action within the scene. 'Brought' would over-compress the participial
    nuance.
- source_word: ἐπὶ κλίνης
  chosen: on a bed
  alternatives:
  - on a stretcher
  - on a couch
  - on a mat
  lexicon: BDAG
  rationale: κλίνη commonly refers to a bed or couch. 'Bed' is the most straightforward
    rendering here; 'stretcher' is possible contextually but more interpretive than
    the Greek requires.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: In this context ἄνθρωπος refers to an individual male, as confirmed by
    the relative clause and participle. 'A man' is natural and specific.
- source_word: παραλελυμένος
  chosen: was paralyzed
  alternatives:
  - was paralyzed and bedridden
  - was disabled
  lexicon: BDAG
  rationale: The perfect passive participle indicates a resulting state from paralysis.
    'Was paralyzed' is idiomatic English and accurately conveys the condition without
    over-specifying.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were trying
  - sought
  lexicon: BDAG
  rationale: The imperfect indicates ongoing attempt. 'Were seeking' preserves that
    aspect more transparently than the simple past.
- source_word: εἰσενεγκεῖν
  chosen: to bring him in
  alternatives:
  - to carry him in
  - to take him inside
  lexicon: BDAG
  rationale: The infinitive from εἰσφέρω means to bring in or carry in. 'Bring him
    in' is natural English and leaves the manner implied by the context.
- source_word: θεῖναι
  chosen: set him
  alternatives:
  - place him
  - lay him
  lexicon: BDAG
  rationale: τίθημι here means to place or set. 'Set him' works well with the following
    prepositional phrase and avoids overcommitting to posture beyond the Greek.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in front of him
  - before Jesus
  lexicon: BDAG
  rationale: The phrase literally means 'before him.' The pronoun likely refers to
    Jesus from context, but the Greek uses a pronoun, so the translation preserves
    that wording rather than substituting the name.
