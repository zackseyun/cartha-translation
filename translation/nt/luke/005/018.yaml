theological_decisions:
- issue: Referent of αὐτοῦ at the end of the verse
  chosen_reading: before him
  alternative_readings:
  - before Jesus
  rationale: The narrative context makes Jesus the referent, but the Greek text uses
    a pronoun rather than the explicit name. Preserving 'him' follows the source closely
    without altering the sense.
  doctrine_reference: Translation philosophy §1, §5
