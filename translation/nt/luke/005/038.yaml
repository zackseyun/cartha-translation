theological_decisions:
- issue: Distinguishing νέος and καινός in the same sentence
  chosen_reading: Render νέος as 'new' and καινός as 'fresh'
  alternative_readings:
  - Render both as 'new'
  rationale: The Greek uses two different adjectives. Preserving some distinction
    is preferable under optimal equivalence, especially in a saying built on the suitability
    of one thing to another. 'Fresh wineskins' communicates usable, supple skins appropriate
    for new wine.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception;
    Original-language primacy over translation tradition'
