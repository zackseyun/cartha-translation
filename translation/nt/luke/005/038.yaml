id: LUK.5.38
reference: Luke 5:38
source:
  edition: SBLGNT
  text: ἀλλὰ οἶνον νέον εἰς ἀσκοὺς καινοὺς ⸀βλητέον.
translation:
  text: But new wine must be put into fresh wineskins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''new wine must be put into new wineskins.'' The Greek uses two different
      adjectives: νέος (''new,'' especially in time) for the wine and καινός (''new/fresh,''
      especially in quality or condition) for the wineskins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: BDAG
  rationale: Adversative conjunction contrasting the improper action implied in the
    previous verse with the proper one here. 'But' is natural and sufficiently strong
    in English.
- source_word: οἶνον νέον
  chosen: new wine
  lexicon: BDAG
  rationale: The adjective νέον modifies οἶνον directly. 'New wine' is the standard
    and accurate rendering in this context, referring to freshly made wine not yet
    fully fermented.
- source_word: εἰς
  chosen: into
  alternatives:
  - in
  lexicon: BDAG
  rationale: The preposition indicates movement into a container. 'Into' better reflects
    the directional force than the more static 'in'.
- source_word: ἀσκοὺς
  chosen: wineskins
  alternatives:
  - skins
  lexicon: BDAG
  rationale: ἀσκός refers here to skin containers used for holding liquids, especially
    wine. 'Wineskins' makes the cultural object explicit for modern readers.
- source_word: καινοὺς
  chosen: fresh
  alternatives:
  - new
  lexicon: BDAG
  rationale: καινός often emphasizes newness in kind or freshness, while νέος in the
    same verse already expresses temporal newness for the wine. Rendering καινούς
    as 'fresh' preserves the distinction in English and avoids the awkward repetition
    'new ... new.'
- source_word: βλητέον
  chosen: must be put
  alternatives:
  - is to be put
  - should be put
  lexicon: BDAG
  rationale: The verbal adjective βλητέον conveys necessity or what ought to be done.
    'Must be put' best captures the impersonal sense of necessity in clear modern
    English.
