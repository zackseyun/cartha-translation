theological_decisions:
- issue: Nature of Jesus' knowledge of others' inner thoughts
  chosen_reading: Render the text straightforwardly as Jesus perceiving their thoughts
    without adding explanatory language about the mode of knowledge.
  alternative_readings:
  - A more explicit supernatural reading such as 'knowing supernaturally their thoughts'
  - A minimized reading such as 'guessing what they were thinking'
  rationale: The verse presents Jesus as aware of their internal reasoning, but it
    does not explicitly explain how. To preserve theological tension and avoid importing
    claims beyond the text, the translation states the fact of his perception without
    interpretive expansion or reduction.
  doctrine_reference: Affirmations; Translation philosophy §3
