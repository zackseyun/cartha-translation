id: LUK.5.22
reference: Luke 5:22
source:
  edition: SBLGNT
  text: ἐπιγνοὺς δὲ ὁ Ἰησοῦς τοὺς διαλογισμοὺς αὐτῶν ἀποκριθεὶς εἶπεν πρὸς αὐτούς·
    Τί διαλογίζεσθε ἐν ταῖς καρδίαις ὑμῶν;
translation:
  text: But Jesus, perceiving their thoughts, answered and said to them, “Why are
    you reasoning in your hearts?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “knowing their reasonings.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοὺς
  chosen: perceiving
  alternatives:
  - knowing
  - recognizing
  - becoming aware of
  lexicon: BDAG
  rationale: Aorist participle of ἐπιγινώσκω indicates Jesus' full awareness of what
    they were thinking. 'Perceiving' is natural English and preserves the cognitive
    nuance without overstating the mechanism.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast with the preceding scene. 'But' fits
    the narrative turn as Jesus responds to their internal objections.
- source_word: διαλογισμοὺς
  chosen: thoughts
  alternatives:
  - reasonings
  - deliberations
  lexicon: BDAG
  rationale: In context this refers to their inward deliberations. 'Thoughts' is idiomatic
    and clear, while the later verb διαλογίζεσθε retains the more active sense with
    'reasoning.'
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - responded and said
  lexicon: BDAG
  rationale: This is a common Semitic-influenced narrative expression in Greek. Retaining
    both verbs reflects the source text while remaining acceptable English.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: Although τί is formally 'what,' in this idiom with διαλογίζεσθε it functions
    as 'why,' asking the reason for their inward reasoning. This is the most natural
    and contextually accurate English rendering.
- source_word: διαλογίζεσθε
  chosen: are you reasoning
  alternatives:
  - are you debating
  - are you thinking through
  - do you reason
  lexicon: BDAG
  rationale: Present middle conveys ongoing internal deliberation. 'Are you reasoning'
    preserves the active mental process better than the flatter 'thinking.'
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  alternatives:
  - within yourselves
  - in your inner selves
  lexicon: BDAG
  rationale: καρδία in biblical usage commonly denotes the inner person, including
    thought and will. 'In your hearts' preserves the biblical anthropological expression
    rather than reducing it to a modern paraphrase.
