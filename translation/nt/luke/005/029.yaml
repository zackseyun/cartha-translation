id: LUK.5.29
reference: Luke 5:29
source:
  edition: SBLGNT
  text: Καὶ ἐποίησεν δοχὴν μεγάλην Λευὶς αὐτῷ ἐν τῇ οἰκίᾳ αὐτοῦ· καὶ ἦν ὄχλος ⸂πολὺς
    τελωνῶν⸃ καὶ ἄλλων οἳ ἦσαν μετ’ αὐτῶν κατακείμενοι.
translation:
  text: And Levi made a great banquet for him in his house, and there was a large
    crowd of tax collectors and others who were reclining at table with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with him.' The Greek reads 'with them,' but English readers may understand
      the reference differently depending on whether the pronoun points to the guests
      as a group or to the meal setting centered on Jesus.
    reason: alternative_reading
  - marker: b
    text: '''Reclining at table'' reflects the customary posture for dining at formal
      meals in the ancient Mediterranean world.'
    reason: cultural_note
lexical_decisions:
- source_word: δοχήν μεγάλην
  chosen: a great banquet
  alternatives:
  - a great feast
  - a large reception
  lexicon: BDAG
  rationale: δοχή denotes a reception or feast/banquet. 'Banquet' is natural modern
    English and fits the meal setting better than the less common 'reception,' while
    preserving the sense of a significant hosted meal.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - for Jesus
  - for him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from the immediate context. The translation
    keeps the pronoun rather than supplying the name, preserving the Greek's cohesion
    and avoiding unnecessary expansion.
- source_word: ἐν τῇ οἰκίᾳ αὐτοῦ
  chosen: in his house
  alternatives:
  - at his house
  - in his home
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'In his house'
    is slightly more formal and closer to the Greek wording than 'at his house,' while
    remaining natural English.
- source_word: ὄχλος πολὺς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a large multitude
  lexicon: BDAG
  rationale: ὄχλος commonly means crowd. 'Large crowd' is idiomatic contemporary English
    and reflects πολὺς without sounding archaic.
- source_word: τελωνῶν
  chosen: tax collectors
  alternatives:
  - tax farmers
  - revenue agents
  lexicon: BDAG
  rationale: The standard and clearest rendering in Gospel contexts. It preserves
    the social identity of the group without importing extra explanatory wording into
    the main text.
- source_word: ἄλλων
  chosen: others
  alternatives:
  - other people
  - others like them
  lexicon: BDAG
  rationale: The Greek is indefinite and concise. 'Others' preserves that brevity
    and leaves unspecified who the additional guests were, as the text does.
- source_word: μετ’ αὐτῶν
  chosen: with them
  alternatives:
  - with him
  - together with them
  lexicon: BDAG
  rationale: The plural pronoun most naturally refers to the group just mentioned
    in the scene. 'With them' reflects the Greek form directly. Because the antecedent
    can be understood in slightly different ways in English, the alternative is preserved
    in a footnote.
- source_word: κατακείμενοι
  chosen: reclining at table
  alternatives:
  - reclining
  - sitting down to eat
  lexicon: BDAG
  rationale: The participle refers to the customary dining posture at a formal meal.
    'Reclining at table' communicates both the meal context and the ancient practice
    better than simply 'sitting'.
