id: LUK.5.21
reference: Luke 5:21
source:
  edition: SBLGNT
  text: καὶ ἤρξαντο διαλογίζεσθαι οἱ γραμματεῖς καὶ οἱ Φαρισαῖοι λέγοντες· Τίς ἐστιν
    οὗτος ὃς λαλεῖ βλασφημίας; τίς δύναται ⸂ἁμαρτίας ἀφεῖναι⸃ εἰ μὴ μόνος ὁ θεός;
translation:
  text: And the scribes and the Pharisees began to reason among themselves, saying,
    “Who is this who speaks blasphemies? Who can forgive sins except God alone?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤρξαντο διαλογίζεσθαι
  chosen: began to reason among themselves
  alternatives:
  - began to question
  - began to discuss
  - began to reason
  lexicon: BDAG
  rationale: The construction ἄρχομαι + infinitive means 'began to.' διαλογίζομαι
    can denote inward reasoning, disputing, or deliberation. In this context it introduces
    their evaluative objection, so 'reason among themselves' preserves the deliberative
    sense without overcommitting to either purely internal thought or spoken debate.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in Gospel contexts, referring to recognized experts in the law. ''Teachers
    of the law'' is interpretive and less formally tied to the lexical item.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; personal/group names are
    transliterated by policy.
- source_word: λαλεῖ βλασφημίας
  chosen: speaks blasphemies
  alternatives:
  - speaks blasphemy
  - utters blasphemies
  lexicon: BDAG
  rationale: The plural noun βλασφημίας is retained as 'blasphemies' rather than flattened
    to the English idiom 'blasphemy,' preserving the Greek number and the force of
    repeated or multiple blasphemous utterances as perceived by the speakers.
- source_word: ἁμαρτίας ἀφεῖναι
  chosen: forgive sins
  alternatives:
  - release sins
  - send away sins
  lexicon: BDAG
  rationale: ἀφίημι with ἁμαρτίας is the standard idiom for forgiving sins. 'Forgive'
    is the natural and theologically accurate English equivalent here; more literal
    options like 'release' would be obscure.
- source_word: εἰ μὴ μόνος ὁ θεός
  chosen: except God alone
  alternatives:
  - except only God
  - if not God alone
  lexicon: BDAG
  rationale: 'This idiom expresses exception: ''except God alone.'' The wording preserves
    the exclusivity of μόνος while remaining idiomatic in English.'
- source_word: Τίς ἐστιν οὗτος
  chosen: Who is this
  alternatives:
  - Who is this man
  lexicon: BDAG
  rationale: The Greek does not include 'man'; adding it would overtranslate. 'Who
    is this' preserves the abrupt, dismissive tone of the objection.
