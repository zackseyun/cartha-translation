id: LUK.5.31
reference: Luke 5:31
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν πρὸς αὐτούς· Οὐ χρείαν ἔχουσιν οἱ ὑγιαίνοντες
    ἰατροῦ ἀλλὰ οἱ κακῶς ἔχοντες·
translation:
  text: And Jesus answered them, “Those who are healthy have no need of a physician,
    but those who are sick do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those who are ill.” The Greek expression literally means “those who
      are doing badly,” an idiom for being sick.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in Greek narrative. In natural English, 'answered' captures
    the responsive force without awkwardly reproducing both participle and finite
    verb as 'answering, Jesus said.'
- source_word: εἶπεν πρὸς αὐτούς
  chosen: them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: The speech introduction as a whole is rendered 'Jesus answered them'
    in English for readability, since the combination of ἀποκριθεὶς ... εἶπεν πρὸς
    αὐτούς is a standard Semitic/Greek narrative formula. The addressee αὐτούς is
    preserved in 'them.'
- source_word: Οὐ χρείαν ἔχουσιν
  chosen: have no need
  alternatives:
  - do not need
  lexicon: BDAG
  rationale: This closely reflects the noun χρεία ('need') with ἔχω ('have'), preserving
    the Greek expression while remaining idiomatic English.
- source_word: οἱ ὑγιαίνοντες
  chosen: those who are healthy
  alternatives:
  - the healthy
  - those who are well
  lexicon: BDAG
  rationale: The present participle denotes people in a state of health. 'Those who
    are healthy' is clear modern English and preserves the substantival participle's
    reference to a class of people.
- source_word: ἰατροῦ
  chosen: a physician
  alternatives:
  - a doctor
  lexicon: BDAG
  rationale: Ἰατρός means 'physician' or 'doctor.' 'Physician' fits the proverbial
    tone and avoids sounding overly casual, while remaining understandable to modern
    readers.
- source_word: οἱ κακῶς ἔχοντες
  chosen: those who are sick
  alternatives:
  - those who are ill
  - those who are unwell
  - those who are badly off
  lexicon: BDAG
  rationale: The idiom κακῶς ἔχειν means 'to be ill/sick.' Rendering it literally
    as 'those who are badly' or 'badly off' would be unclear here. 'Those who are
    sick' best conveys the established idiomatic sense in context.
