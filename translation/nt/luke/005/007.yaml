id: LUK.5.7
reference: Luke 5:7
source:
  edition: SBLGNT
  text: καὶ κατένευσαν τοῖς ⸀μετόχοις ἐν τῷ ἑτέρῳ πλοίῳ τοῦ ἐλθόντας συλλαβέσθαι αὐτοῖς·
    καὶ ἦλθον, καὶ ἔπλησαν ἀμφότερα τὰ πλοῖα ὥστε βυθίζεσθαι αὐτά.
translation:
  text: So they signaled to their partners in the other boat to come and help them.
    And they came and filled both boats, so that they began to sink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'motioned' or 'beckoned' to their partners.
    reason: lexical_alternative
  - marker: b
    text: Or 'come and assist them'; literally, 'come to help them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that they were sinking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατένευσαν
  chosen: signaled
  alternatives:
  - motioned
  - beckoned
  lexicon: BDAG
  rationale: The verb denotes making a sign or gesture, likely at a distance on the
    water. 'Signaled' is natural modern English and fits the boating context better
    than the more wooden 'beckoned.'
- source_word: μετόχοις
  chosen: partners
  alternatives:
  - companions
  - associates
  - shareholders
  lexicon: BDAG
  rationale: In this fishing context, the term refers to business associates or fishing
    partners rather than generic companions. 'Partners' best captures the practical
    relationship.
- source_word: ἐν τῷ ἑτέρῳ πλοίῳ
  chosen: in the other boat
  alternatives:
  - in the second boat
  lexicon: BDAG
  rationale: ἕτερος here distinguishes the other boat involved in the scene. 'The
    other boat' is the most idiomatic rendering in English narrative.
- source_word: τοῦ ἐλθόντας
  chosen: to come
  alternatives:
  - that they should come
  lexicon: BDAG
  rationale: The articular infinitival construction with the accusative participle
    expresses purpose. In English, 'to come' communicates the purpose smoothly without
    unnecessary grammatical heaviness.
- source_word: συλλαβέσθαι αὐτοῖς
  chosen: help them
  alternatives:
  - assist them
  - take hold with them
  lexicon: BDAG
  rationale: συλλαμβάνω can mean to help or assist by joining in. In context of hauling
    in an overwhelming catch, 'help them' conveys the practical sense clearly. A more
    literal 'take hold with them' is awkward in English.
- source_word: ἔπλησαν
  chosen: filled
  alternatives:
  - loaded
  lexicon: BDAG
  rationale: The verb means to fill. 'Filled' preserves the image and leaves implicit
    that the boats were filled with fish from the context.
- source_word: ἀμφότερα τὰ πλοῖα
  chosen: both boats
  alternatives:
  - the two boats
  lexicon: BDAG
  rationale: ἀμφότερα specifically means both. 'Both boats' is concise and idiomatic.
- source_word: ὥστε βυθίζεσθαι αὐτά
  chosen: so that they began to sink
  alternatives:
  - so that they were sinking
  - so that they started to go under
  lexicon: BDAG
  rationale: The present infinitive after ὥστε expresses resulting process. 'Began
    to sink' captures the inceptive/resultative sense in natural English better than
    the stiffer 'were sinking,' while preserving that the boats had not necessarily
    fully sunk.
