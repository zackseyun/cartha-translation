theological_decisions:
- issue: Whether to imply that Jesus denies the existence of any truly righteous people
    or speaks phenomenologically/socially
  chosen_reading: Retain the literal categories 'the righteous' and 'sinners' without
    interpretive qualification.
  alternative_readings:
  - those who think they are righteous
  - those considered righteous
  rationale: The verse itself states the contrast without explicit irony markers.
    Adding qualification would import an interpretive conclusion from broader context
    rather than translate the Greek as given. This preserves theological tension rather
    than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
