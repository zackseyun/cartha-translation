id: LUK.5.32
reference: Luke 5:32
source:
  edition: SBLGNT
  text: οὐκ ἐλήλυθα καλέσαι δικαίους ἀλλὰ ἁμαρτωλοὺς εἰς μετάνοιαν.
translation:
  text: I have not come to call the righteous, but sinners to a change of mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for repentance.' The Greek phrase εἰς μετάνοιαν expresses purpose or
      goal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθα
  chosen: I have not come
  alternatives:
  - I did not come
  - I have not arrived
  lexicon: BDAG
  rationale: Perfect tense of ἔρχομαι conveys a present state resulting from coming;
    in idiomatic English, 'I have come' is the standard way to express mission/purpose
    in Jesus' sayings. With οὐκ, 'I have not come' preserves both aspect and the force
    of Jesus' stated purpose.
- source_word: καλέσαι
  chosen: to call
  alternatives:
  - to invite
  - to summon
  lexicon: BDAG
  rationale: The aorist infinitive expresses purpose after ἐλήλυθα. 'Call' is the
    most direct and contextually appropriate rendering, preserving the verbal link
    to Jesus' summons of disciples and sinners without narrowing it to either invitation
    or command alone.
- source_word: δικαίους
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: BDAG
  rationale: As an accusative plural adjective used substantivally, it refers to 'righteous
    ones.' 'The righteous' is concise, natural English and preserves the moral/religious
    category without overinterpreting whether Jesus means those truly righteous or
    those regarded as such.
- source_word: ἁμαρτωλοὺς
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Standard substantive use meaning those characterized as sinners. 'Sinners'
    is the established and clearest rendering, matching the social and moral force
    of the term in the Gospel context.
- source_word: εἰς μετάνοιαν
  chosen: to a change of mind
  alternatives:
  - for repentance
  - to repent
  lexicon: BDAG
  rationale: The preposition εἰς with μετάνοιαν expresses goal or result. 'To repentance'
    is a natural English rendering after 'call' and preserves the noun 'repentance'
    rather than converting it into the verb 'repent,' which would slightly restructure
    the Greek.
