theological_decisions:
- issue: Rendering of χρηστός in a proverb about old and new wine
  chosen_reading: good
  alternative_readings:
  - better
  rationale: The printed Greek text reads χρηστός, whose plain sense is 'good' or
    'pleasant,' not the comparative 'better.' Because many readers know the traditional
    English rendering 'better,' that alternative is preserved in a footnote rather
    than imported into the main text. This is a lexical/text-critical decision, not
    a doctrinal one, and preserves source-language primacy over translation tradition.
  doctrine_reference: Translation philosophy §1, §3
