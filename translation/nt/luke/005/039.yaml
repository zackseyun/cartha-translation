id: LUK.5.39
reference: Luke 5:39
source:
  edition: SBLGNT
  text: ⸀καὶ οὐδεὶς πιὼν ⸀παλαιὸν θέλει νέον· λέγει γάρ· Ὁ παλαιὸς ⸀χρηστός ἐστιν.
translation:
  text: And no one, after drinking old wine, wants new, for he says, ‘The old is good.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'The old is better.'
    reason: textual_variant
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no man
  lexicon: BDAG
  rationale: Indefinite negative referring generically to any person. 'No one' is
    natural modern English and avoids unnecessary archaic or overly gendered phrasing
    while preserving the universal sense.
- source_word: πιὼν
  chosen: after drinking
  alternatives:
  - having drunk
  - when he has drunk
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb, best expressed in idiomatic
    English as prior action: ''after drinking.'' This preserves the temporal relationship
    without wooden phrasing.'
- source_word: παλαιὸν
  chosen: old wine
  alternatives:
  - old
  lexicon: BDAG
  rationale: Although 'wine' is implied rather than repeated in Greek, English normally
    supplies it for clarity from the immediate context of the wineskin/wine saying.
    'Old wine' makes the object explicit without adding foreign content.
- source_word: θέλει
  chosen: wants
  alternatives:
  - desires
  - is willing
  - wishes
  lexicon: BDAG
  rationale: θέλω here expresses preference/desire. 'Wants' is the most natural contemporary
    equivalent and fits the proverb-like statement.
- source_word: νέον
  chosen: new
  alternatives:
  - new wine
  lexicon: BDAG
  rationale: The adjective stands elliptically for 'new wine.' In English, 'wants
    new' is concise and preserves the Greek ellipsis after 'old wine'; the implied
    noun remains clear from context. The fuller alternative is viable but less reflective
    of the source structure.
- source_word: λέγει γάρ
  chosen: for he says
  alternatives:
  - for he says that
  - because he says
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For he says' preserves
    the explanatory force and the direct-speech introduction.
- source_word: Ὁ παλαιὸς
  chosen: The old
  alternatives:
  - The old wine
  lexicon: BDAG
  rationale: The Greek leaves 'wine' implicit in the second clause. Retaining 'The
    old' mirrors the concise proverbial style while remaining understandable in context.
- source_word: χρηστός
  chosen: good
  alternatives:
  - better
  - pleasant
  - fit
  - mellow
  lexicon: BDAG
  rationale: χρηστός commonly means 'good,' 'kind,' 'useful,' or 'pleasant.' Here
    it describes the old wine favorably. 'Good' is the broadest and least interpretively
    loaded rendering. 'Better' reflects a known variant/traditional reading but is
    not the SBLGNT wording and should be preserved only in a footnote.
