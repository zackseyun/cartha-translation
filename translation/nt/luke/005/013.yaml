id: LUK.5.13
reference: Luke 5:13
source:
  edition: SBLGNT
  text: καὶ ἐκτείνας τὴν χεῖρα ἥψατο αὐτοῦ ⸀εἰπών· Θέλω, καθαρίσθητι· καὶ εὐθέως ἡ
    λέπρα ἀπῆλθεν ἀπ’ αὐτοῦ.
translation:
  text: And stretching out his hand, he touched him, saying, “I am willing; be cleansed.”
    And immediately the leprosy left him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'a skin disease'; the Greek term λέπρα in biblical usage
      may refer to a range of serious skin conditions, not only modern leprosy.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκτείνας
  chosen: stretching out
  alternatives:
  - reaching out
  - extending
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'stretching out' is a natural,
    fairly formal rendering that preserves the physical action without unnecessary
    paraphrase.
- source_word: χεῖρα
  chosen: hand
  lexicon: BDAG
  rationale: Standard gloss for χείρ in this concrete bodily context.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - laid hold of
  lexicon: BDAG
  rationale: Middle form of ἅπτω in this idiom means 'touch.' 'Touched' is the plain
    sense and preserves the significance of Jesus making contact with the unclean
    man.
- source_word: αὐτοῦ
  chosen: him
  lexicon: BDAG
  rationale: 'Genitive object after ἅπτομαι is idiomatically rendered as the direct
    object in English: ''touched him.'''
- source_word: εἰπών
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Aorist participle introducing direct speech; 'saying' keeps the participial
    flow of the Greek while remaining natural in English.
- source_word: Θέλω
  chosen: I am willing
  alternatives:
  - I will
  - I want to
  lexicon: BDAG
  rationale: In this healing context, θέλω expresses willingness rather than mere
    futurity. 'I am willing' communicates Jesus' readiness and intent more clearly
    than the archaic-sounding 'I will.'
- source_word: καθαρίσθητι
  chosen: be cleansed
  alternatives:
  - be made clean
  - be purified
  lexicon: BDAG
  rationale: Aorist passive imperative of καθαρίζω. 'Be cleansed' preserves both the
    passive form and the ritual/cleanliness dimension that is stronger than merely
    'be healed.'
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Standard temporal adverb; 'immediately' is clear and idiomatic.
- source_word: λέπρα
  chosen: leprosy
  alternatives:
  - skin disease
  lexicon: BDAG
  rationale: Traditional rendering of λέπρα. While the ancient term may cover a broader
    range of skin diseases than modern Hansen's disease, 'leprosy' remains the most
    recognizable translation in Gospel healing narratives; the broader nuance is worth
    preserving in a footnote.
- source_word: ἀπῆλθεν ἀπ’ αὐτοῦ
  chosen: left him
  alternatives:
  - departed from him
  - went away from him
  lexicon: BDAG
  rationale: Idiomatic English rendering of the disease's departure. 'Left him' is
    natural and preserves the sense of immediate removal.
