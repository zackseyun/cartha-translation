theological_decisions:
- issue: Rendering καθαρίσθητι in a healing of a leper
  chosen_reading: be cleansed
  alternative_readings:
  - be healed
  - be made clean
  rationale: The Greek emphasizes cleansing, which in this context includes both physical
    healing and restoration from ritual impurity. 'Be cleansed' preserves that theological
    and social dimension without reducing the statement to medical healing alone.
  doctrine_reference: 'Translation philosophy: preserve source-text meaning and theological
    tension rather than flattening it.'
