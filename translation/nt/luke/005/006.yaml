id: LUK.5.6
reference: Luke 5:6
source:
  edition: SBLGNT
  text: καὶ τοῦτο ποιήσαντες συνέκλεισαν πλῆθος ἰχθύων πολύ, ⸀διερρήσσετο δὲ ⸂τὰ δίκτυα⸃
    αὐτῶν.
translation:
  text: And when they had done this, they enclosed a great multitude of fish, and
    their nets were tearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they caught a large number of fish.' The Greek verb more literally means
      'they enclosed' or 'shut in,' highlighting the image of the fish being surrounded
      in the nets.
    reason: lexical_alternative
  - marker: b
    text: Or 'their nets were beginning to tear.' The Greek imperfect verb portrays
      the tearing as in progress, not necessarily completed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαντες
  chosen: when they had done
  alternatives:
  - having done
  - after doing
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb is rendered temporally in
    natural English: ''when they had done this.'' This preserves the sequence without
    awkward literalism.'
- source_word: συνέκλεισαν
  chosen: they enclosed
  alternatives:
  - they caught
  - they shut in
  lexicon: BDAG
  rationale: The verb literally conveys enclosing or hemming in. 'Enclosed' preserves
    the image of surrounding the fish in the net better than the more interpretive
    'caught,' while remaining understandable in English.
- source_word: πλῆθος ἰχθύων πολύ
  chosen: a great multitude of fish
  alternatives:
  - a large number of fish
  - many fish
  lexicon: BDAG
  rationale: The construction intensifies quantity. 'A great multitude of fish' reflects
    both πλῆθος and πολύ, preserving the emphatic abundance more fully than the flatter
    'many fish.'
- source_word: διερρήσσετο
  chosen: were tearing
  alternatives:
  - were beginning to tear
  - were breaking
  - were being torn
  lexicon: BDAG
  rationale: 'The imperfect indicates an ongoing process rather than a completed rupture.
    ''Were tearing'' captures the progressive sense: the nets were under such strain
    that they were starting to rip. ''Were being torn'' is possible, but the middle/passive
    form here is naturally rendered intransitively in English.'
- source_word: τὰ δίκτυα αὐτῶν
  chosen: their nets
  alternatives:
  - the nets of theirs
  lexicon: BDAG
  rationale: Standard possessive rendering in idiomatic English. The plural is retained
    because the Greek explicitly has 'nets,' not a singular collective.
