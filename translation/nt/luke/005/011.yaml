id: LUK.5.11
reference: Luke 5:11
source:
  edition: SBLGNT
  text: καὶ καταγαγόντες τὰ πλοῖα ἐπὶ τὴν γῆν ἀφέντες ⸀πάντα ἠκολούθησαν αὐτῷ.
translation:
  text: And after bringing the boats to land, they left everything and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having brought the boats onto the land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'left all things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταγαγόντες
  chosen: after bringing
  alternatives:
  - having brought
  - when they had brought
  lexicon: BDAG
  rationale: Aorist active participle of κατάγω, here describing prior action relative
    to the main verb. 'After bringing' gives natural English while preserving the
    participial sequence.
- source_word: τὰ πλοῖα
  chosen: the boats
  alternatives:
  - the boats/ships
  lexicon: BDAG
  rationale: πλοῖον can mean boat or ship; in the Galilean fishing context, 'boats'
    is the natural and contextually precise rendering.
- source_word: ἐπὶ τὴν γῆν
  chosen: to land
  alternatives:
  - onto the land
  - to the shore
  lexicon: BDAG
  rationale: Literally 'onto the land.' 'To land' is idiomatic English for beaching
    or docking boats and preserves the sense without awkwardness. 'To the shore' is
    possible but γῆ is broader than shoreline.
- source_word: ἀφέντες
  chosen: they left
  alternatives:
  - having left
  - leaving behind
  lexicon: BDAG
  rationale: Aorist participle from ἀφίημι, here meaning to leave behind or abandon.
    Rendering it with a finite verb in coordination with the main verb produces clear
    English while preserving the sequence of actions.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'Everything' is the most natural
    English equivalent and conveys the totality of what they left.
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: ἀκολουθέω commonly means to follow, both physically and in discipleship
    contexts. 'Followed him' preserves the narrative action and the discipleship implication
    without over-explication.
