theological_decisions:
- issue: Scope of renunciation in πάντα
  chosen_reading: they left everything
  alternative_readings:
  - they left all things
  - they left it all
  rationale: The text presents a comprehensive abandonment in response to Jesus' call.
    'Everything' preserves the force of totality without adding interpretive detail
    about whether this was permanent dispossession beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
