id: LUK.5.1
reference: Luke 5:1
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ τὸν ὄχλον ἐπικεῖσθαι αὐτῷ ⸀καὶ ἀκούειν τὸν λόγον τοῦ θεοῦ
    καὶ αὐτὸς ἦν ἑστὼς παρὰ τὴν λίμνην Γεννησαρέτ,
translation:
  text: Now it happened that while the crowd was pressing in on him and listening
    to the word of God, he was standing by the lake of Gennesaret,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the crowd was pressing upon him and hearing the word of God.'
    reason: lexical_alternative
  - marker: b
    text: Gennesaret is the lake also known as the Sea of Galilee.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened that
  alternatives:
  - And it happened that
  - Now it came about that
  lexicon: BDAG
  rationale: A common Lukan narrative formula. 'Now it happened that' preserves the
    event-introducing function without sounding overly wooden. δέ is lightly represented
    by 'Now' rather than omitted entirely.
- source_word: ἐν τῷ ... ἐπικεῖσθαι ... καὶ ἀκούειν
  chosen: while the crowd was pressing in on him and listening
  alternatives:
  - when the crowd was pressing upon him and hearing
  - as the crowd was crowding around him to hear
  lexicon: BDAG
  rationale: 'The articular infinitive with ἐν is temporal, best rendered ''while''
    or ''when.'' Keeping both infinitives explicit preserves the Greek structure:
    the crowd was both pressing in and listening.'
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: '''Crowd'' is natural modern English and accurately reflects ὄχλος here.'
- source_word: ἐπικεῖσθαι αὐτῷ
  chosen: was pressing in on him
  alternatives:
  - was pressing upon him
  - was crowding around him
  lexicon: BDAG
  rationale: The verb conveys physical pressure or pressing upon someone. 'Pressing
    in on him' captures the sense vividly and idiomatically.
- source_word: ἀκούειν
  chosen: listening
  alternatives:
  - hearing
  lexicon: BDAG
  rationale: In English narrative, 'listening' better conveys active attention than
    the more bare 'hearing,' while remaining faithful to the infinitive's sense.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: This is a standard biblical expression. 'The word of God' preserves the
    formal weight and familiar theological resonance without distortion.
- source_word: καὶ αὐτὸς ἦν ἑστὼς
  chosen: he was standing
  alternatives:
  - and he himself was standing
  - and he was standing there
  lexicon: BDAG
  rationale: The periphrastic construction indicates ongoing posture. The pronoun
    αὐτός is not strongly emphatic in English here, so a simple 'he was standing'
    is the clearest rendering.
- source_word: παρὰ τὴν λίμνην
  chosen: by the lake
  alternatives:
  - beside the lake
  - along the lake
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. 'By the lake'
    is concise and natural.
- source_word: Γεννησαρέτ
  chosen: Gennesaret
  alternatives:
  - the Sea of Galilee
  lexicon: BDAG
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with interpretive equivalents. 'Gennesaret' preserves the proper name used in
    the Greek text.
