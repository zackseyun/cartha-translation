theological_decisions:
- issue: Rendering τὸν λόγον τοῦ θεοῦ
  chosen_reading: the word of God
  alternative_readings:
  - God's message
  rationale: The phrase can denote God's proclaimed message, but no doctrinally charged
    ambiguity requires resolution here. The more literal rendering preserves both
    theological breadth and intertextual resonance.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Treatment of Γεννησαρέτ
  chosen_reading: Gennesaret
  alternative_readings:
  - Sea of Galilee
  rationale: The Greek names the lake as Gennesaret. To substitute 'Sea of Galilee'
    would import a harmonizing or explanatory identification not present in the wording
    of this verse.
  doctrine_reference: Translation philosophy §2
