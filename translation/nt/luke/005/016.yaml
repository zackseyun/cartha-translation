theological_decisions:
- issue: Aspect of Jesus' action
  chosen_reading: The verse describes Jesus' customary practice of withdrawing for
    prayer, not merely a single occasion.
  alternative_readings:
  - The verse narrates a specific instance of withdrawal and prayer.
  rationale: The Greek imperfect construction (ἦν + present participles) most naturally
    conveys repeated or customary action. This is a grammatical decision with narrative
    significance, highlighting Jesus' regular pattern of prayer without importing
    further doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
