id: LUK.5.16
reference: Luke 5:16
source:
  edition: SBLGNT
  text: αὐτὸς δὲ ἦν ὑποχωρῶν ἐν ταῖς ἐρήμοις καὶ προσευχόμενος.
translation:
  text: But he would withdraw to deserted places and pray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he himself was withdrawing in the wildernesses and praying.' The Greek
      more literally uses an imperfect construction with participles, expressing ongoing
      or customary action.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and mildly emphatic, but English idiom
    does not require repeating the subject with strong emphasis here. 'He' preserves
    the referent naturally; the contrastive force is sufficiently carried by 'But.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or development with the surrounding narrative.
    'But' best reflects the adversative nuance in context, showing that despite growing
    publicity, Jesus regularly withdrew.
- source_word: ἦν ὑποχωρῶν
  chosen: would withdraw
  alternatives:
  - was withdrawing
  - used to withdraw
  - kept withdrawing
  lexicon: BDAG
  rationale: The imperfect of εἰμί with a present participle conveys ongoing or customary
    action in past time. 'Would withdraw' captures the habitual sense in idiomatic
    English better than the more wooden 'was withdrawing.'
- source_word: ἐν ταῖς ἐρήμοις
  chosen: to deserted places
  alternatives:
  - in the wildernesses
  - in desolate places
  - in lonely places
  lexicon: BDAG
  rationale: ἔρημος in the plural refers to uninhabited or solitary areas. Although
    ἐν is literally 'in,' English commonly uses 'to' with a verb of withdrawal to
    express movement toward such places. 'Deserted places' preserves the sense without
    implying a specific desert biome.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination linking the two customary actions.
- source_word: προσευχόμενος
  chosen: pray
  alternatives:
  - be praying
  - was praying
  lexicon: BDAG
  rationale: As coordinated with the customary sense of ἦν ὑποχωρῶν, the participle
    describes a concurrent habitual activity. 'Pray' works idiomatically with 'would
    withdraw' to express repeated practice.
