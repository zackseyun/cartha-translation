id: LUK.5.37
reference: Luke 5:37
source:
  edition: SBLGNT
  text: καὶ οὐδεὶς βάλλει οἶνον νέον εἰς ἀσκοὺς παλαιούς· εἰ δὲ μήγε, ῥήξει ὁ ⸂οἶνος
    ὁ νέος⸃ τοὺς ἀσκούς, καὶ αὐτὸς ἐκχυθήσεται καὶ οἱ ἀσκοὶ ἀπολοῦνται·
translation:
  text: And no one puts new wine into old wineskins. Otherwise, the new wine will
    burst the wineskins, and it will be spilled, and the wineskins will be ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'old skins.' The Greek refers to skin containers used
      for wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be poured out.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be destroyed' or 'will perish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάλλει
  chosen: puts
  alternatives:
  - throws
  - pours
  lexicon: BDAG
  rationale: A general verb of placing/putting. In English, 'puts' is natural and
    idiomatic for placing wine into wineskins; 'pours' is possible by implication
    but is more interpretive than the Greek verb itself.
- source_word: οἶνον νέον
  chosen: new wine
  lexicon: BDAG
  rationale: Standard rendering preserving the adjective-noun order in natural English.
    'New wine' fits the agricultural and fermentation context of the saying.
- source_word: ἀσκοὺς παλαιούς
  chosen: old wineskins
  alternatives:
  - old skins
  lexicon: BDAG
  rationale: ἀσκός refers specifically to a skin container, commonly for liquids;
    'wineskins' makes the referent explicit and is standard, clear English in this
    context.
- source_word: εἰ δὲ μήγε
  chosen: Otherwise
  alternatives:
  - if not indeed
  - but if not
  lexicon: BDAG
  rationale: This compact conditional idiom introduces the consequence if the prior
    action is done. 'Otherwise' conveys the sense smoothly in modern English without
    unnecessary literal awkwardness.
- source_word: ῥήξει
  chosen: will burst
  alternatives:
  - will tear open
  - will break
  lexicon: BDAG
  rationale: The future verb denotes causing rupture. 'Will burst' best matches the
    image of fermenting wine splitting skin containers.
- source_word: ἐκχυθήσεται
  chosen: will be spilled
  alternatives:
  - will be poured out
  lexicon: BDAG
  rationale: The passive future here describes the wine being lost from the ruptured
    skins. 'Will be spilled' is the most natural English consequence in context; 'poured
    out' is more neutral and less contextually vivid.
- source_word: ἀπολοῦνται
  chosen: will be ruined
  alternatives:
  - will perish
  - will be destroyed
  - will be lost
  lexicon: BDAG
  rationale: For containers, 'ruined' communicates practical destruction in idiomatic
    English. 'Destroyed' is possible, but 'ruined' better reflects the loss of usefulness
    rather than annihilation.
- source_word: καὶ αὐτός
  chosen: and it
  alternatives:
  - and the wine itself
  lexicon: BDAG
  rationale: The pronoun refers back to the new wine and adds emphasis. English can
    represent this naturally with 'it'; the emphasis is sufficiently retained by the
    sentence structure without overtranslating.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: '''No one'' is the clearest standard English equivalent and suits the
    proverbial tone.'
