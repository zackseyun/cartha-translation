theological_decisions:
- issue: Rendering of Jesus' title Ἐπιστάτα
  chosen_reading: Master
  alternative_readings:
  - Lord
  rationale: This verse does not require importing the fuller christological force
    often associated with κύριος. Since the source uses ἐπιστάτης, not κύριος, 'Master'
    better reflects the lexical choice and preserves narrative development without
    diminishing Jesus' authority.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate titles.'
