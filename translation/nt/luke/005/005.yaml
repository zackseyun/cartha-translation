id: LUK.5.5
reference: Luke 5:5
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ⸀Σίμων ⸀εἶπεν· Ἐπιστάτα, δι’ ⸀ὅλης νυκτὸς κοπιάσαντες οὐδὲν
    ἐλάβομεν, ἐπὶ δὲ τῷ ῥήματί σου χαλάσω ⸂τὰ δίκτυα⸃.
translation:
  text: And Simon answered, “Master, though we worked hard all night, we caught nothing;
    but at your word I will let down the nets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “toiled” instead of “worked hard.” The Greek emphasizes strenuous effort.
    reason: lexical_alternative
  - marker: b
    text: Or “on your word” / “because of your word.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Standard participial idiom introducing direct speech; English normally
    renders this with a finite verb alongside εἶπεν rather than preserving a wooden
    'answering, said.'
- source_word: Ἐπιστάτα
  chosen: Master
  alternatives:
  - chief
  - overseer
  - commander
  lexicon: BDAG
  rationale: In Luke this address for Jesus conveys recognized authority without necessarily
    carrying the fuller theological weight of 'Lord' in every context. 'Master' is
    the most natural contextual equivalent here.
- source_word: δι’ ὅλης νυκτός
  chosen: all night
  alternatives:
  - through the whole night
  - throughout the night
  lexicon: BDAG
  rationale: The phrase denotes duration through the entire night. 'All night' is
    idiomatic modern English and preserves the sense.
- source_word: κοπιάσαντες
  chosen: worked hard
  alternatives:
  - toiled
  - labored
  lexicon: BDAG
  rationale: The verb emphasizes strenuous effort. 'Worked hard' communicates the
    exertion in accessible modern English; 'toiled' is possible but less natural for
    the target readership.
- source_word: οὐδὲν ἐλάβομεν
  chosen: we caught nothing
  alternatives:
  - we took nothing
  - we got nothing
  lexicon: BDAG
  rationale: In fishing context λαμβάνω naturally refers to taking/catching fish.
    'Caught nothing' makes the implied object explicit in idiomatic English without
    adding foreign content.
- source_word: ἐπὶ δὲ τῷ ῥήματί σου
  chosen: but at your word
  alternatives:
  - yet because of your word
  - nevertheless on your word
  lexicon: BDAG
  rationale: The dative construction with ἐπί expresses basis or grounds for action.
    'At your word' is concise, idiomatic, and preserves Simon's deference to Jesus'
    directive.
- source_word: χαλάσω
  chosen: I will let down
  alternatives:
  - I will lower
  lexicon: BDAG
  rationale: The future verb refers to lowering the nets into the water. 'Let down'
    is the standard natural English expression in this setting.
- source_word: τὰ δίκτυα
  chosen: the nets
  alternatives:
  - the fishing nets
  lexicon: BDAG
  rationale: Plural is well attested in the SBLGNT text and should be preserved. 'The
    nets' is sufficient in context; 'fishing' is unnecessary expansion.
- source_word: δὲ
  chosen: but
  alternatives:
  - yet
  - nevertheless
  lexicon: BDAG
  rationale: Here δέ marks mild contrast between the fruitless labor and Simon's willingness
    to obey. 'But' is the clearest natural connector.
