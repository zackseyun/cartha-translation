theological_decisions:
- issue: Scope of 'their faith'
  chosen_reading: The main text preserves the plural reference without deciding whether it refers to the paralytic alone by representation or to the paralytic together with those who brought him.
  alternative_readings:
  - It refers specifically to the faith of the men who carried him.
  - It refers to the shared faith of the paralytic and his companions.
  rationale: The Greek plural αὐτῶν should be preserved rather than interpreted away. This maintains the narrative and theological tension without importing a narrower doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the forgiveness statement
  chosen_reading: 'A declarative passive: ''your sins are forgiven you.'''
  alternative_readings:
  - A performative declaration implying immediate forgiveness at that moment.
  - An evidentiary declaration announcing forgiveness already granted.
  rationale: The Greek perfect passive states the reality of forgiveness without explicitly resolving the precise temporal mechanics. The translation should preserve the declaration without adding theological explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T12:37:01Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/005/020.json
  category: awkward_english
  tier: 1
  from: are forgiven you
  to: are forgiven
  rationale: The rendering 'your sins are forgiven you' formally accounts for both the genitive pronoun (σου) in 'your' and the dative pronoun (σοι) in 'you'. However, the resulting English phrase is slightly redundant and less idiomatic. The possessive 'your' already makes it clear to whom the forgiveness is directed. Simplifying to 'your sins are forgiven' improves the natural flow of the English sentence without any significant loss of meaning, as the dative of interest is strongly implied.
