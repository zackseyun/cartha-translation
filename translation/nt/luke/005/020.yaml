id: LUK.5.20
reference: Luke 5:20
source:
  edition: SBLGNT
  text: καὶ ἰδὼν τὴν πίστιν αὐτῶν ⸀εἶπεν· Ἄνθρωπε, ἀφέωνταί σοι αἱ ἁμαρτίαι σου.
translation:
  text: And seeing their faith, he said, “Man, your sins are forgiven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust'; Greek 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have been forgiven.' The Greek perfect passive can emphasize a present state resulting from completed action.
    reason: lexical_alternative
  - marker: c
    text: Or 'are forgiven you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: A participial rendering preserves the Greek structure and temporal flow without over-specifying sequence. 'Seeing' is natural English and keeps the connection to Jesus' perception of the situation.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here the sense is the trust/confident belief shown by the paralytic and those with him, not primarily 'faithfulness.' The alternative 'trust' is possible but less standard in this context.
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: The plural pronoun naturally refers to the group associated with the paralytic. 'Their faith' preserves the Greek and avoids narrowing the referent to the man alone.
- source_word: Ἄνθρωπε
  chosen: Man
  alternatives:
  - Friend
  - Sir
  lexicon: BDAG
  rationale: Vocative ἄνθρωπε is literally 'man.' In context it is a direct but not harsh form of address. 'Friend' is smoother English but imports warmth not explicit in the Greek; 'Sir' is too formal and socially marked. This also aligns with the gender-accurate principle.
- source_word: ἀφέωνταί
  chosen: are forgiven
  alternatives:
  - have been forgiven
  lexicon: BDAG
  rationale: The perfect/passive form conveys a present state resulting from completed action. 'Are forgiven' is idiomatic English and adequately communicates the resulting state; 'have been forgiven' is possible but slightly heavier in English style.
- source_word: ἁμαρτίαι
  chosen: sins
  lexicon: BDAG
  rationale: Standard and direct rendering of ἁμαρτίαι, preserving the moral and theological sense without dilution.
- source_word: σοι ... σου
  chosen: you ... your
  lexicon: BDAG
  rationale: 'The dative and genitive pronouns are both represented in natural English: ''your sins are forgiven you.'' Retaining both reflects the personal address and the Greek emphasis on the recipient.'
