id: LUK.5.36
reference: Luke 5:36
source:
  edition: SBLGNT
  text: ἔλεγεν δὲ καὶ παραβολὴν πρὸς αὐτοὺς ὅτι Οὐδεὶς ἐπίβλημα ⸀ἀπὸ ἱματίου καινοῦ
    ⸀σχίσας ἐπιβάλλει ἐπὶ ἱμάτιον παλαιόν· εἰ δὲ μήγε, καὶ τὸ καινὸν ⸀σχίσει καὶ τῷ
    παλαιῷ οὐ ⸂συμφωνήσει τὸ ἐπίβλημα⸃ τὸ ἀπὸ τοῦ καινοῦ.
translation:
  text: 'He was also telling them a parable: “No one tears a patch from a new garment
    and puts it on an old garment. Otherwise, he will tear the new one, and the patch
    from the new will not match the old.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'No one, having torn a patch from a new garment, puts
      it on an old garment.' The Greek uses an aorist participle ('having torn') before
      the main verb.
    reason: lexical_alternative
  - marker: b
    text: '''Will not match'' could also be rendered ''will not fit'' or ''will not
      agree with.'' The Greek verb conveys lack of correspondence or suitability between
      the patch and the old garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: He was also telling
  alternatives:
  - He said
  - He was saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or iterative speech in narrative; 'was
    telling' preserves that aspect more naturally than simple past. 'Also' is included
    with καὶ/δὲ in the clause.
- source_word: παραβολὴν
  chosen: a parable
  alternatives:
  - an illustration
  - a comparison
  lexicon: BDAG
  rationale: '''Parable'' is the standard and sufficiently transparent rendering for
    παραβολή here, preserving the literary category used by Luke.'
- source_word: πρὸς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: English idiom does not require repeating the preposition after 'telling';
    the indirect object is naturally expressed as 'them'.
- source_word: Οὐδεὶς
  chosen: No one
  alternatives:
  - Nobody
  lexicon: BDAG
  rationale: '''No one'' is clear, standard, and fits the proverbial force of the
    saying.'
- source_word: ἐπίβλημα
  chosen: a patch
  alternatives:
  - a piece
  - a patch-piece
  lexicon: BDAG
  rationale: In clothing context, ἐπίβλημα refers to a piece used as a patch. 'Patch'
    communicates the practical sense better than the more generic 'piece.'
- source_word: ἀπὸ ἱματίου καινοῦ
  chosen: from a new garment
  alternatives:
  - from a new cloak
  - from a new piece of clothing
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment or article of clothing. 'Garment'
    is broad enough and idiomatic in English; 'new' renders καινοῦ straightforwardly.
- source_word: σχίσας
  chosen: tears
  alternatives:
  - having torn
  - rips
  lexicon: BDAG
  rationale: 'Although formally an aorist participle (''having torn''), English idiom
    in this construction is best expressed with a finite verb coordinated with the
    main action: ''tears ... and puts.'' This preserves the sequence without awkwardness.'
- source_word: ἐπιβάλλει ἐπὶ ἱμάτιον παλαιόν
  chosen: puts it on an old garment
  alternatives:
  - applies it to an old garment
  - sews it onto an old garment
  lexicon: BDAG
  rationale: ἐπιβάλλω literally means 'put/place upon.' 'Puts it on' is natural and
    does not over-specify the method. 'Sews' would import an action not stated explicitly.
- source_word: εἰ δὲ μήγε
  chosen: Otherwise
  alternatives:
  - If not
  - Or else
  lexicon: BDAG
  rationale: This idiomatic conditional introduces the negative consequence of the
    hypothetical action. 'Otherwise' is concise and natural.
- source_word: καὶ τὸ καινὸν σχίσει
  chosen: he will tear the new one
  alternatives:
  - it will tear the new garment
  - he will also tear the new garment
  lexicon: BDAG
  rationale: 'The verb is active future singular with an implicit human subject carried
    from ''No one.'' Rendering with ''he'' keeps the logic clear: the person damages
    the new garment by tearing from it. ''The new one'' avoids unnecessary repetition
    while referring back to the new garment.'
- source_word: καὶ τῷ παλαιῷ οὐ συμφωνήσει
  chosen: will not match the old
  alternatives:
  - will not fit the old
  - will not agree with the old
  - will not be suitable for the old
  lexicon: BDAG
  rationale: συμφωνέω here conveys suitability or correspondence. In clothing context,
    'match' is the most natural English expression, covering both fit and compatibility
    without over-technical wording.
- source_word: τὸ ἐπίβλημα τὸ ἀπὸ τοῦ καινοῦ
  chosen: the patch from the new
  alternatives:
  - the patch from the new garment
  - the piece from the new
  lexicon: BDAG
  rationale: This phrase identifies the source of the patch. 'The patch from the new'
    is concise and clear in context; 'garment' is implied from the earlier clause.
