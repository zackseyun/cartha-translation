theological_decisions:
- issue: Referent and force of 'δύναμις κυρίου ἦν εἰς τὸ ἰᾶσθαι αὐτόν'
  chosen_reading: The clause is rendered to mean that the Lord's power was present
    so that Jesus might heal.
  alternative_readings:
  - the Lord's power was present to heal them
  - the Lord's power was with him for healing
  rationale: The Greek text provided reads αὐτόν rather than a plural object. The
    translation therefore avoids supplying 'them' in the main text. At the same time,
    the clause clearly presents divine power operative in Jesus' healing ministry,
    so the English expresses purpose without making a stronger doctrinal claim than
    the syntax warrants.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Lord'
