id: LUK.5.17
reference: Luke 5:17
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν μιᾷ τῶν ἡμερῶν καὶ αὐτὸς ἦν διδάσκων, καὶ ἦσαν καθήμενοι Φαρισαῖοι
    καὶ νομοδιδάσκαλοι οἳ ἦσαν ἐληλυθότες ἐκ πάσης κώμης τῆς Γαλιλαίας καὶ Ἰουδαίας
    καὶ Ἰερουσαλήμ· καὶ δύναμις κυρίου ἦν εἰς τὸ ἰᾶσθαι ⸀αὐτόν.
translation:
  text: And it happened on one of those days that he was teaching, and Pharisees and
    teachers of the law were sitting there, who had come from every village of Galilee
    and Judea and from Jerusalem; and the power of the Lord was present for him to
    heal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'to heal them' instead of 'for him to heal.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο ἐν μιᾷ τῶν ἡμερῶν
  chosen: it happened on one of those days
  alternatives:
  - it came to pass on one of the days
  - on one of those days it happened
  lexicon: BDAG
  rationale: This is a common Lukan narrative formula. 'It happened' preserves the
    event-introducing force without archaic English. 'Those days' reflects the idiomatic
    sense in context better than a wooden 'the days.'
- source_word: αὐτὸς ἦν διδάσκων
  chosen: he was teaching
  alternatives:
  - he himself was teaching
  lexicon: BDAG
  rationale: The pronoun αὐτός is not emphatic enough here to require 'himself' in
    English; the clause simply advances the narrative with an imperfect periphrastic
    construction indicating ongoing action.
- source_word: καθήμενοι
  chosen: were sitting there
  alternatives:
  - were sitting
  - were seated
  lexicon: BDAG
  rationale: The participle describes their settled presence in the scene. 'Sitting
    there' makes the scene natural in English and conveys more than a bare stative
    'seated' without overinterpreting.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish group; this is the established
    English form.
- source_word: νομοδιδάσκαλοι
  chosen: teachers of the law
  alternatives:
  - law-teachers
  - experts in the law
  lexicon: BDAG
  rationale: This rendering is clear, idiomatic, and accurately conveys those who
    teach the Mosaic law. 'Experts in the law' is possible but slightly more interpretive
    than the compound itself requires.
- source_word: ἐληλυθότες
  chosen: had come
  alternatives:
  - had arrived
  lexicon: BDAG
  rationale: The perfect participle indicates a prior coming with present result;
    English past perfect fits the narrative relation well.
- source_word: ἐκ πάσης κώμης
  chosen: from every village
  alternatives:
  - out of every village
  - from every town
  lexicon: BDAG
  rationale: κώμη refers to a village or rural settlement rather than a city. 'Every
    village' preserves the distributive force of πάσης.
- source_word: Γαλιλαίας καὶ Ἰουδαίας καὶ Ἰερουσαλήμ
  chosen: of Galilee and Judea and from Jerusalem
  alternatives:
  - of Galilee and Judea and Jerusalem
  lexicon: BDAG
  rationale: Because Jerusalem is a city while Galilee and Judea are regions, adding
    'from' before 'Jerusalem' in English clarifies the mixed geography without altering
    the sense.
- source_word: δύναμις κυρίου
  chosen: the power of the Lord
  alternatives:
  - the Lord's power
  lexicon: BDAG
  rationale: This preserves the genitival construction and the theological weight
    of δύναμις as divine power at work. 'Lord' follows the project's default rendering
    for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord' by default. Here it most naturally
    refers to God/the divine Lord whose power is operative in Jesus' ministry, and
    'Lord' preserves that resonance without narrowing the referent beyond the text.
- source_word: ἦν εἰς τὸ ἰᾶσθαι αὐτόν
  chosen: was present for him to heal
  alternatives:
  - was there for him to heal
  - was with him to heal
  - was present to heal them
  lexicon: BDAG
  rationale: 'The infinitival construction εἰς τὸ ἰᾶσθαι expresses purpose/result.
    The textual reading αὐτόν is best taken with an implied subject for healing activity:
    the Lord''s power was present so that he (Jesus) might heal. ''Was present for
    him to heal'' is concise and reflects the Greek without importing an explicit
    object like ''them,'' which is absent from this text form.'
