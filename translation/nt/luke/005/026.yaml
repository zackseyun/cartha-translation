theological_decisions:
- issue: Nuance of φόβος in response to divine action
  chosen_reading: Render directly as 'fear' rather than interpretively softening to
    'awe.'
  alternative_readings:
  - awe
  rationale: The verse depicts a reverent, unsettling response to Jesus' miraculous
    authority. Preserving 'fear' maintains the biblical tension between dread and
    worship without resolving it into a less demanding emotional category.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
