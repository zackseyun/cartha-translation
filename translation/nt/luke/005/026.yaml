id: LUK.5.26
reference: Luke 5:26
source:
  edition: SBLGNT
  text: καὶ ἔκστασις ἔλαβεν ἅπαντας καὶ ἐδόξαζον τὸν θεόν, καὶ ἐπλήσθησαν φόβου λέγοντες
    ὅτι Εἴδομεν παράδοξα σήμερον.
translation:
  text: And amazement seized them all, and they were glorifying God, and they were
    filled with fear, saying, “We have seen extraordinary things today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “remarkable things” or “strange things”; the Greek means things beyond
      ordinary expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκστασις
  chosen: amazement
  alternatives:
  - astonishment
  - ecstasy
  lexicon: BDAG
  rationale: In this context the noun denotes overwhelming astonishment rather than
    the English sense of mystical 'ecstasy.' 'Amazement' is natural modern English
    and fits the crowd's reaction to the healing and forgiveness miracle.
- source_word: ἔλαβεν ἅπαντας
  chosen: seized them all
  alternatives:
  - took hold of everyone
  - came upon them all
  lexicon: BDAG
  rationale: The idiom literally 'took all' is well represented by 'seized them all,'
    preserving the vividness of the Greek while remaining idiomatic in English.
- source_word: ἐδόξαζον
  chosen: they were glorifying
  alternatives:
  - they glorified
  - they were praising
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'They were glorifying'
    preserves that aspect more clearly than a simple past. 'Glorifying' also stays
    closer to δοξάζω than the looser 'praising.'
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός here, with the article functioning normally.
- source_word: ἐπλήσθησαν φόβου
  chosen: they were filled with fear
  alternatives:
  - they were filled with awe
  - fear filled them
  lexicon: BDAG
  rationale: The passive plus genitive is naturally rendered 'were filled with fear.'
    Although the sense includes awe, φόβος should be translated directly as 'fear'
    unless context requires softening; here the reverential shock is best left as
    the text states.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: A participle of attendant circumstance/content introducing the quotation.
    'Saying' is sufficient and idiomatic.
- source_word: Εἴδομεν
  chosen: We have seen
  alternatives:
  - We saw
  lexicon: BDAG
  rationale: Although formally aorist, idiomatic English often uses the present perfect
    for a present reaction to what has just occurred. This captures the immediacy
    of the crowd's statement.
- source_word: παράδοξα
  chosen: extraordinary things
  alternatives:
  - remarkable things
  - strange things
  - paradoxical things
  lexicon: BDAG
  rationale: The adjective here refers to things contrary to ordinary expectation,
    hence 'extraordinary things.' 'Paradoxical' is too wooden in English, and 'strange'
    can sound pejorative rather than wondrous.
- source_word: σήμερον
  chosen: today
  lexicon: BDAG
  rationale: Straightforward temporal adverb; 'today' preserves the immediacy of the
    eyewitness response.
