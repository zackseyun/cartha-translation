id: LUK.5.14
reference: Luke 5:14
source:
  edition: SBLGNT
  text: καὶ αὐτὸς παρήγγειλεν αὐτῷ μηδενὶ εἰπεῖν, ἀλλὰ ἀπελθὼν δεῖξον σεαυτὸν τῷ ἱερεῖ,
    καὶ προσένεγκε περὶ τοῦ καθαρισμοῦ σου καθὼς προσέταξεν Μωϋσῆς εἰς μαρτύριον αὐτοῖς.
translation:
  text: And he ordered him to tell no one, but, after going, show yourself to the
    priest and offer for your cleansing as Moses commanded, for a testimony to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a testimony to them'; the phrase may refer to testimony to the priests
      or others, and some understand it as evidence against them.
    reason: alternative_reading
  - marker: b
    text: See Leviticus 14 for the offering Moses commanded for cleansing from leprosy.
    reason: cross_reference
lexical_decisions:
- source_word: παρήγγειλεν
  chosen: ordered
  alternatives:
  - commanded
  - instructed
  - strictly charged
  lexicon: BDAG
  rationale: Conveys a direct authoritative instruction without adding intensity not
    explicit in the verb itself. 'Commanded' is possible, but 'ordered' reads naturally
    in modern English and preserves the force.
- source_word: μηδενὶ εἰπεῖν
  chosen: to tell no one
  alternatives:
  - to say to no one
  - to tell nobody
  lexicon: BDAG
  rationale: Idiomatic English rendering of the infinitival clause with dative μηδενί.
    'Tell no one' is natural and preserves the prohibition.
- source_word: ἀπελθὼν
  chosen: after going
  alternatives:
  - go
  - having gone
  - when you have gone
  lexicon: BDAG
  rationale: The aorist participle is temporally prior to the following imperatives.
    'After going' preserves that sequence more clearly than a simple coordinate 'go'
    while remaining readable.
- source_word: δεῖξον σεαυτὸν τῷ ἱερεῖ
  chosen: show yourself to the priest
  alternatives:
  - present yourself to the priest
  lexicon: BDAG
  rationale: A direct and transparent rendering of the imperative plus reflexive pronoun.
    'Present yourself' is smoother but slightly interpretive; 'show yourself' stays
    closer to the Greek.
- source_word: προσένεγκε
  chosen: offer
  alternatives:
  - bring
  - present
  lexicon: BDAG
  rationale: In sacrificial/cultic context, 'offer' best communicates the priestly
    offering required by the law.
- source_word: περὶ τοῦ καθαρισμοῦ σου
  chosen: for your cleansing
  alternatives:
  - concerning your cleansing
  - for your purification
  lexicon: BDAG
  rationale: περί here introduces the matter for which the offering is made. 'Cleansing'
    fits the immediate context of healing from leprosy and is accessible modern English.
    'Purification' is possible but slightly more formal.
- source_word: καθὼς προσέταξεν Μωϋσῆς
  chosen: as Moses commanded
  alternatives:
  - just as Moses commanded
  - as Moses prescribed
  lexicon: BDAG
  rationale: Straightforward rendering that preserves the appeal to Mosaic legal instruction,
    likely echoing Leviticus 14.
- source_word: εἰς μαρτύριον αὐτοῖς
  chosen: for a testimony to them
  alternatives:
  - as a testimony to them
  - for evidence to them
  - for a witness to them
  lexicon: BDAG
  rationale: A formally close rendering that preserves the ambiguity of whether the
    testimony is favorable, evidentiary, or implicitly confrontational. 'To them'
    is retained rather than specifying the referent beyond the Greek.
