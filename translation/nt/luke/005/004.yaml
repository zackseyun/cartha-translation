id: LUK.5.4
reference: Luke 5:4
source:
  edition: SBLGNT
  text: ὡς δὲ ἐπαύσατο λαλῶν, εἶπεν πρὸς τὸν Σίμωνα· Ἐπανάγαγε εἰς τὸ βάθος καὶ χαλάσατε
    τὰ δίκτυα ὑμῶν εἰς ἄγραν.
translation:
  text: When he had finished speaking, he said to Simon, “Put out into the deep water,
    and let down your nets for a catch.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the deep.” The Greek literally says “into the depth,” referring
      here to deep water.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: When
  alternatives:
  - And when
  - Now when
  - After
  lexicon: BDAG
  rationale: Introduces the next event with mild narrative progression. 'When' gives
    natural English without overtranslating δέ.
- source_word: ἐπαύσατο λαλῶν
  chosen: he had finished speaking
  alternatives:
  - he stopped speaking
  - he ceased speaking
  lexicon: BDAG
  rationale: The combination of παύω with the present participle means to stop/finish
    an ongoing action. 'Had finished speaking' is idiomatic English that preserves
    the temporal sense.
- source_word: εἶπεν πρὸς τὸν Σίμωνα
  chosen: he said to Simon
  alternatives:
  - he told Simon
  lexicon: BDAG
  rationale: A straightforward speech introduction. 'Said to' is closer to λέγω than
    the more interpretive 'told.'
- source_word: Ἐπανάγαγε
  chosen: Put out
  alternatives:
  - Put out to sea
  - Take the boat out
  - Put out farther
  lexicon: BDAG
  rationale: In this fishing context ἐπανάγω refers to putting a boat out from shore.
    'Put out' is concise and natural; 'to sea' would be too specific for a lake setting.
- source_word: εἰς τὸ βάθος
  chosen: into the deep water
  alternatives:
  - into the deep
  - to deep water
  lexicon: BDAG
  rationale: βάθος here refers to deep water rather than abstract 'depth.' Adding
    'water' makes the sense explicit in natural English.
- source_word: χαλάσατε
  chosen: let down
  alternatives:
  - lower
  - drop
  lexicon: BDAG
  rationale: In context of nets from a boat, 'let down' is the most idiomatic English
    equivalent.
- source_word: τὰ δίκτυα ὑμῶν
  chosen: your nets
  alternatives:
  - the nets of yours
  lexicon: BDAG
  rationale: The possessive pronoun is naturally rendered attributively in English.
- source_word: εἰς ἄγραν
  chosen: for a catch
  alternatives:
  - for catching fish
  - for a haul
  lexicon: BDAG
  rationale: ἄγρα denotes a catch, especially of fish in this context. 'For a catch'
    preserves purpose and remains idiomatic.
