id: LUK.5.3
reference: Luke 5:3
source:
  edition: SBLGNT
  text: ἐμβὰς δὲ εἰς ἓν τῶν πλοίων, ὃ ⸀ἦν Σίμωνος, ἠρώτησεν αὐτὸν ἀπὸ τῆς γῆς ἐπαναγαγεῖν
    ὀλίγον, ⸂καθίσας δὲ ἐκ τοῦ πλοίου ἐδίδασκεν⸃ τοὺς ὄχλους.
translation:
  text: Then he got into one of the boats, which belonged to Simon, and asked him
    to put out a little from the land. Then he sat down and was teaching the crowds
    from the boat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the shore.' The Greek says literally 'from the land,' contrasting
      the boat with the dry ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβὰς
  chosen: got into
  alternatives:
  - boarded
  - stepped into
  lexicon: BDAG
  rationale: Aorist participle of ἐμβαίνω, indicating the action of entering the boat
    prior to the main verb. 'Got into' is natural modern English and preserves the
    concrete movement without sounding overly formal.
- source_word: πλοίων / πλοίου
  chosen: boats / boat
  alternatives:
  - ships
  lexicon: BDAG
  rationale: πλοῖον here refers to small fishing vessels on the lake, so 'boat' fits
    the setting better than the broader 'ship.' Singular/plural are preserved according
    to the Greek occurrences.
- source_word: ὃ ἦν Σίμωνος
  chosen: which belonged to Simon
  alternatives:
  - which was Simon's
  - which was of Simon
  lexicon: BDAG
  rationale: The genitive Σίμωνος expresses possession. 'Belonged to Simon' is clear
    contemporary English and slightly more explicit than the literal 'was Simon's'
    while preserving the possessive sense.
- source_word: ἠρώτησεν
  chosen: asked
  alternatives:
  - requested
  lexicon: BDAG
  rationale: ἐρωτάω commonly means 'ask' or 'request.' 'Asked' is the most straightforward
    rendering and avoids overstating formality.
- source_word: ἐπαναγαγεῖν
  chosen: to put out
  alternatives:
  - to put out to sea
  - to move out
  - to put out from shore
  lexicon: BDAG
  rationale: In boating context ἐπανάγω means to put out or move a vessel away from
    shore. 'To put out' is idiomatic English for launching slightly from land; the
    following phrase supplies the distance.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the land
  alternatives:
  - from shore
  - from the shore
  lexicon: BDAG
  rationale: γῆ literally means 'land' or 'ground.' Here it contrasts with the boat
    on the water. 'From the land' is slightly more literal; 'shore' is possible but
    not required by the noun itself.
- source_word: ὀλίγον
  chosen: a little
  alternatives:
  - a short distance
  - a bit
  lexicon: BDAG
  rationale: The adverbial accusative indicates a small extent. 'A little' is concise
    and natural in context.
- source_word: καθίσας
  chosen: he sat down
  alternatives:
  - having sat down
  - sitting down
  lexicon: BDAG
  rationale: Aorist participle preceding the imperfect main verb. In English narrative,
    'he sat down' communicates the sequential action clearly and reflects the common
    teaching posture.
- source_word: ἐδίδασκεν
  chosen: was teaching
  alternatives:
  - taught
  - began teaching
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action. 'Was teaching' preserves the
    progressive aspect better than simple past 'taught.'
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: Plural ὄχλους is retained as 'crowds,' reflecting multiple gathered groups
    or the mass of people. 'Multitudes' is traditional but less natural in contemporary
    English.
