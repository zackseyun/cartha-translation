id: LUK.5.8
reference: Luke 5:8
source:
  edition: SBLGNT
  text: ἰδὼν δὲ Σίμων Πέτρος προσέπεσεν τοῖς γόνασιν Ἰησοῦ λέγων· Ἔξελθε ἀπ’ ἐμοῦ,
    ὅτι ἀνὴρ ἁμαρτωλός εἰμι, κύριε·
translation:
  text: But when Simon Peter saw it, he fell at Jesus’s knees, saying, “Go away from
    me, because I am a sinful man, Lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Depart from me.”
    reason: lexical_alternative
  - marker: b
    text: The Greek says “a sinful man,” with the specifically masculine term “man,”
      referring to Simon Peter himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered temporally in smooth English. The
    object is implicit from context (the miraculous catch), so 'it' is supplied in
    English to avoid an unnatural absolute 'when Simon Peter saw.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative development with mild contrast or transition. 'But'
    fits the shift from the miracle to Simon Peter's reaction.
- source_word: Σίμων Πέτρος
  chosen: Simon Peter
  alternatives:
  - Simon
  lexicon: BDAG
  rationale: Both names are present in the Greek and should be retained in translation.
- source_word: προσέπεσεν
  chosen: he fell
  alternatives:
  - fell down
  - fell before
  lexicon: BDAG
  rationale: The verb προσπίπτω means to fall toward/before someone. 'He fell' is
    concise, with the following phrase 'at Jesus’s knees' supplying the direction
    and posture.
- source_word: τοῖς γόνασιν Ἰησοῦ
  chosen: at Jesus’s knees
  alternatives:
  - before Jesus's knees
  - to Jesus's knees
  lexicon: BDAG
  rationale: Dative plural with προσπίπτω expresses the place at which he fell. 'At
    Jesus’s knees' is idiomatic English and preserves the vivid bodily posture.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle is naturally rendered 'saying,' preserving the attendant
    action without overformal stiffness.
- source_word: Ἔξελθε ἀπ’ ἐμοῦ
  chosen: Go away from me
  alternatives:
  - Depart from me
  - Leave me
  lexicon: BDAG
  rationale: The aorist imperative of ἐξέρχομαι here is an urgent request for separation.
    'Go away from me' is clear modern English; 'Depart from me' is traditional but
    more archaic.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Simon Peter's plea. 'Because' is more natural
    in contemporary English than 'for.'
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun is specifically masculine singular, referring to Simon Peter
    himself. Per the gender-accurate principle, 'man' is the appropriate rendering.
- source_word: ἁμαρτωλός
  chosen: sinful
  alternatives:
  - a sinner
  lexicon: BDAG
  rationale: 'As a predicate adjective modifying ἀνήρ, ''sinful'' yields a natural
    English expression: ''a sinful man.'' ''A sinner'' is possible but would require
    a more restructuring translation.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per the doctrine's contested-terms guidance, κύριος defaults to 'Lord.'
    In Luke this can carry respect and emerging recognition of Jesus's authority;
    'sir' would undertranslate, while 'master' is less fitting here.
