theological_decisions:
- issue: Rendering of κύριε in Simon Peter's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - sir
  - master
  rationale: The project default for κύριος is 'Lord.' In this context Simon Peter
    responds to a revelatory miracle with fear and confession of sin, so 'Lord' best
    preserves both reverence and the possible theological depth without overstating
    a fully developed confession.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
