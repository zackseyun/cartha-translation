theological_decisions:
- issue: Whether to supply 'disciples' in the second and third clauses for clarity
  chosen_reading: Preserve the Greek ellipsis in the main text with 'those of the
    Pharisees' and 'yours'
  alternative_readings:
  - supply 'disciples' explicitly in both clauses
  rationale: This is not a doctrinally contested issue, but it affects transparency
    to the source text. Preserving the ellipsis better reflects the Greek structure
    while remaining understandable in English.
  doctrine_reference: Translation philosophy §1, §5
