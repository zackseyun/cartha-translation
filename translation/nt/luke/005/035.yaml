id: LUK.5.35
reference: Luke 5:35
source:
  edition: SBLGNT
  text: ἐλεύσονται δὲ ἡμέραι, καὶ ὅταν ἀπαρθῇ ἀπ’ αὐτῶν ὁ νυμφίος τότε νηστεύσουσιν
    ἐν ἐκείναις ταῖς ἡμέραις.
translation:
  text: But days will come when the bridegroom is taken away from them; then they
    will fast in those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is removed from them.' The Greek verb suggests the bridegroom is taken
      away, not merely that he leaves.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται ... ἡμέραι
  chosen: days will come
  alternatives:
  - the days will come
  - days are coming
  lexicon: BDAG
  rationale: The Greek idiom literally reads 'days will come.' English can preserve
    this naturally. Omitting the article reflects the anarthrous ἡμέραι and keeps
    the saying proverbial and forward-looking.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the present situation in the preceding
    context. 'But' best signals the shift from current non-fasting to future fasting.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  - at the time when
  lexicon: BDAG
  rationale: With the aorist subjunctive ἀπαρθῇ, ὅταν introduces a future contingency
    best rendered 'when' in idiomatic English.
- source_word: ἀπαρθῇ
  chosen: is taken away
  alternatives:
  - is removed
  - is taken
  lexicon: BDAG
  rationale: The passive of ἀπαίρω conveys forcible removal rather than mere departure.
    'Is taken away' preserves both the passive form and the ominous nuance, fitting
    Jesus' metaphor and likely foreshadowing his death.
- source_word: ἀπ’ αὐτῶν
  chosen: from them
  alternatives:
  - away from them
  lexicon: BDAG
  rationale: The prepositional phrase indicates separation from the bridegroom's companions/disciples.
    'From them' is sufficient because 'taken away' already includes the sense of removal.
- source_word: ὁ νυμφίος
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and more precise rendering for νυμφίος
    in biblical wedding imagery, preserving the metaphor Jesus uses for himself.'
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: τότε marks the temporal consequence following the bridegroom's removal.
    'Then' is concise and natural.
- source_word: νηστεύσουσιν
  chosen: they will fast
  alternatives:
  - they will go without food
  lexicon: BDAG
  rationale: νηστεύω specifically denotes religious fasting, not merely abstaining
    from food. 'Fast' preserves the established religious sense.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: This phrase reiterates the future period already introduced and is best
    kept rather than smoothed away, since the repetition is present in the Greek and
    adds emphasis.
