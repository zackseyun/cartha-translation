theological_decisions:
- issue: Whether the passive 'is taken away' should be softened to a neutral departure
  chosen_reading: 'Retain the passive and forceful sense: ''the bridegroom is taken
    away from them'''
  alternative_readings:
  - the bridegroom leaves them
  - the bridegroom departs
  rationale: The Greek passive ἀπαρθῇ suggests removal done to the bridegroom, not
    merely his voluntary absence. Preserving this wording maintains the text's anticipatory
    tension and likely allusion to Jesus' coming death without over-explaining it.
  doctrine_reference: Preserve theological tension rather than resolve it.
