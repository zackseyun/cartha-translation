id: LUK.1.4
reference: Luke 1:4
source:
  edition: SBLGNT
  text: ἵνα ἐπιγνῷς περὶ ὧν κατηχήθης λόγων τὴν ἀσφάλειαν.
translation:
  text: so that you may know the certainty of the things about which you were instructed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the reliability"; the Greek noun can denote certainty, security, or
      trustworthiness.
    reason: lexical_alternative
  - marker: b
    text: Or "you were taught"; the verb is the source of the English term "catechized."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces Luke's purpose clause. 'So that' is natural modern English
    while preserving the telic force.
- source_word: ἐπιγνῷς
  chosen: you may know
  alternatives:
  - you may come to know
  - you may know fully
  lexicon: BDAG
  rationale: Aorist subjunctive of ἐπιγινώσκω in a purpose clause. 'Know' is the clearest
    idiomatic rendering; 'fully know' may overstate the intensifying force in English,
    though the compound verb can suggest fuller recognition.
- source_word: περὶ ὧν
  chosen: about which
  alternatives:
  - concerning which
  - about the things that
  lexicon: BDAG
  rationale: περί with the genitive indicates reference/concerning. Rendering with
    'about which' preserves the relation to the following relative clause.
- source_word: κατηχήθης
  chosen: you were instructed
  alternatives:
  - you were taught
  - you were catechized
  lexicon: BDAG
  rationale: Passive of κατηχέω, the source of 'catechize.' 'Instructed' communicates
    formal oral teaching without importing later ecclesial terminology into the main
    text.
- source_word: λόγων
  chosen: the things
  alternatives:
  - the words
  - the matters
  - the accounts
  lexicon: BDAG
  rationale: Although λόγος often means 'word/statement,' here the idiom περὶ ὧν ...
    λόγων with τὴν ἀσφάλειαν points to the content or matters taught. 'The things'
    is idiomatic English and fits the sense of the instruction's content better than
    a wooden 'words.'
- source_word: τὴν ἀσφάλειαν
  chosen: the certainty
  alternatives:
  - the reliability
  - the truth
  - the assurance
  lexicon: BDAG
  rationale: 'ἀσφάλεια denotes certainty, security, or reliability. ''Certainty''
    best fits Luke''s stated aim: confidence in the trustworthiness of what Theophilus
    has been taught.'
