theological_decisions:
- issue: Nature of Luke's stated purpose in writing
  chosen_reading: Luke writes so that Theophilus may know the certainty/reliability
    of prior instruction, without specifying whether this is subjective assurance
    alone or objective historical certainty alone.
  alternative_readings:
  - subjective assurance
  - objective historical reliability
  rationale: The noun ἀσφάλεια can support both assurance and reliability/certainty.
    The translation preserves this theological and epistemic breadth rather than narrowing
    it to either inward confidence or merely factual verification.
  doctrine_reference: Preserve theological tension rather than resolve it.
