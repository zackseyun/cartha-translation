id: LUK.1.56
reference: Luke 1:56
source:
  edition: SBLGNT
  text: Ἔμεινεν δὲ Μαριὰμ σὺν αὐτῇ ⸀ὡς μῆνας τρεῖς, καὶ ὑπέστρεψεν εἰς τὸν οἶκον αὐτῆς.
translation:
  text: And Mary stayed with her about three months, and returned to her home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “about three months”; the Greek uses ὡς with a time expression, which
      can indicate approximation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔμεινεν
  chosen: stayed
  alternatives:
  - remained
  lexicon: BDAG
  rationale: Aorist of μένω here denotes continuing in a place for a period of time.
    'Stayed' is natural modern English; 'remained' is slightly more formal but not
    required by the context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' preserves the narrative linkage in readable
    English without overstating contrast. It could be left untranslated, but an explicit
    connector reads smoothly in English narrative.
- source_word: Μαριὰμ
  chosen: Mary
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: σὺν αὐτῇ
  chosen: with her
  alternatives:
  - together with her
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With her' is the plain
    and sufficient rendering; the referent in context is Elizabeth.
- source_word: ὡς μῆνας τρεῖς
  chosen: about three months
  alternatives:
  - approximately three months
  - some three months
  lexicon: BDAG
  rationale: ὡς before a measure often signals approximation rather than exactness.
    'About three months' best captures that nuance in idiomatic English.
- source_word: ὑπέστρεψεν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: The verb means to return to a prior place. 'Returned' is concise and
    fits the narrative register.
- source_word: εἰς τὸν οἶκον αὐτῆς
  chosen: to her home
  alternatives:
  - to her house
  - to her household
  lexicon: BDAG
  rationale: οἶκος can mean house, home, or household depending on context. Here the
    movement is spatial and personal, so 'home' is the most natural English expression.
    'House' is possible but sounds more wooden; 'household' would shift the sense
    from place to family unit.
