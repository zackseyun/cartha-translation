id: LUK.1.37
reference: Luke 1:37
source:
  edition: SBLGNT
  text: ὅτι οὐκ ἀδυνατήσει παρὰ ⸂τοῦ θεοῦ⸃ πᾶν ῥῆμα.
translation:
  text: For no word from God will be impossible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For nothing will be impossible with God.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this clause gives the ground for Gabriel's preceding statement,
    so 'For' works naturally in English while preserving the explanatory force of
    ὅτι.
- source_word: οὐκ ἀδυνατήσει
  chosen: will be impossible
  alternatives:
  - will be powerless
  - will fail
  lexicon: BDAG
  rationale: The future of ἀδυνατέω means 'to be impossible' or 'to be unable.' Rendering
    the verbal idea idiomatically with 'will be impossible' fits English and matches
    the construction with πᾶν ῥῆμα. Alternatives like 'will fail' are possible in
    some contexts but are less direct here.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - with God
  - before God
  lexicon: BDAG
  rationale: The preposition παρά with the genitive can denote source or association.
    In this clause, paired with ῥῆμα ('word'), 'from God' best captures the sense
    that no spoken matter originating with God is impossible. 'With God' is a traditional
    rendering and remains viable, but in English it can shift the focus from God's
    utterance to God's capability.
- source_word: πᾶν
  chosen: 'no'
  alternatives:
  - every
  lexicon: BDAG
  rationale: Although πᾶν is formally 'every/all,' English idiom with the negated
    verb is best expressed as 'no ... will be impossible' rather than 'every ... will
    not be impossible.' This preserves the universal force in natural English.
- source_word: ῥῆμα
  chosen: word
  alternatives:
  - thing
  - matter
  - promise
  lexicon: BDAG
  rationale: ῥῆμα commonly means 'word,' 'statement,' or 'matter.' In Luke's infancy
    narrative it can carry the sense of a spoken declaration, and here 'word' preserves
    the lexical link while allowing the implication of divine promise. 'Thing' is
    broader but less textually transparent; 'promise' is interpretive and too narrow
    for the main text.
