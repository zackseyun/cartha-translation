theological_decisions:
- issue: Sense of the clause παρὰ τοῦ θεοῦ πᾶν ῥῆμα
  chosen_reading: The verse speaks of no word from God being impossible.
  alternative_readings:
  - Nothing will be impossible with God.
  rationale: Both readings are grammatically defensible and well represented in translation
    tradition. Because ῥῆμα is explicitly present in the Greek, the main text should
    preserve 'word' rather than flatten it to 'nothing.' This also fits the immediate
    context of Gabriel's announced word to Mary. The traditional alternative is preserved
    in a footnote to maintain the interpretive tension rather than erase it.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
