theological_decisions:
- issue: Rendering ναός in a temple-cult context
  chosen_reading: temple
  alternative_readings:
  - sanctuary
  rationale: The Greek ναός often refers specifically to the inner temple/sanctuary
    rather than the broader temple precincts (ἱερόν). Since Zechariah is entering
    to burn incense, the narrower sense is contextually likely. The main text keeps
    'temple' for readability, while a footnote preserves 'sanctuary' to maintain precision
    and auditability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
