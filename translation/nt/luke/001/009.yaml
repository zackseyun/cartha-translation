id: LUK.1.9
reference: Luke 1:9
source:
  edition: SBLGNT
  text: κατὰ τὸ ἔθος τῆς ἱερατείας ἔλαχε τοῦ θυμιᾶσαι εἰσελθὼν εἰς τὸν ναὸν τοῦ κυρίου,
translation:
  text: according to the custom of the priesthood, he was chosen by lot to burn incense
    when he entered into the temple of the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "into the sanctuary of the Lord." The Greek word here is ναός, which
      often refers to the temple building itself rather than the wider temple courts.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὸ ἔθος
  chosen: according to the custom
  alternatives:
  - according to the practice
  - in keeping with the custom
  lexicon: BDAG
  rationale: κατά with the accusative plus ἔθος expresses conformity to an established
    custom or practice. 'According to the custom' is natural English and preserves
    the formal sense.
- source_word: τῆς ἱερατείας
  chosen: of the priesthood
  alternatives:
  - of the priestly service
  - of the priests
  lexicon: BDAG
  rationale: ἱερατεία denotes priestly office/service rather than merely individual
    priests. 'Of the priesthood' best preserves the institutional sense, though in
    context it refers to priestly procedure.
- source_word: ἔλαχε
  chosen: he was chosen by lot
  alternatives:
  - he obtained by lot
  - the lot fell to him
  lexicon: BDAG
  rationale: λαγχάνω commonly refers to obtaining something by lot. English needs
    the lot-casting idea made explicit; 'he was chosen by lot' is clear and idiomatic
    while preserving the passive/result sense.
- source_word: τοῦ θυμιᾶσαι
  chosen: to burn incense
  alternatives:
  - to offer incense
  lexicon: BDAG
  rationale: The articular infinitive expresses the content/purpose of what he obtained
    by lot. θυμιάω refers specifically to burning or offering incense; 'burn incense'
    is concrete and straightforward.
- source_word: εἰσελθὼν
  chosen: when he entered
  alternatives:
  - after entering
  - upon entering
  lexicon: BDAG
  rationale: The aorist participle is temporally related to the main verb in context.
    'When he entered' gives smooth English and avoids over-specifying sequence beyond
    what the participle requires.
- source_word: εἰς τὸν ναὸν
  chosen: into the temple
  alternatives:
  - into the sanctuary
  lexicon: BDAG
  rationale: ναός can mean the temple sanctuary specifically, not the whole temple
    complex. Because the incense offering took place in the sanctuary, 'sanctuary'
    is a strong contextual option; however, 'temple' remains more immediately accessible
    in English. The more specific alternative is preserved in a footnote.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the LORD
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. Here it refers to God
    in a temple context. 'LORD' could evoke the divine name more explicitly, but the
    Greek text has κύριος, and the project's default is 'Lord'.
