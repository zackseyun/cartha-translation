id: LUK.1.66
reference: Luke 1:66
source:
  edition: SBLGNT
  text: καὶ ἔθεντο πάντες οἱ ἀκούσαντες ἐν τῇ καρδίᾳ αὐτῶν, λέγοντες· Τί ἄρα τὸ παιδίον
    τοῦτο ἔσται; καὶ ⸀γὰρ χεὶρ κυρίου ἦν μετ’ αὐτοῦ.
translation:
  text: And all who heard it laid it up in their hearts, saying, “What then will this
    child become?” For the hand of the Lord was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will this child be?' The Greek verb is simply 'will be,' but in context
      it asks about the child's future identity or role.
    reason: lexical_alternative
  - marker: b
    text: '''The hand of the Lord'' is a biblical idiom for God''s active power, favor,
      or guidance.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔθεντο ... ἐν τῇ καρδίᾳ αὐτῶν
  chosen: laid it up in their hearts
  alternatives:
  - took it to heart
  - stored it in their hearts
  - kept it in mind
  lexicon: BDAG
  rationale: The idiom literally means 'placed in their heart.' 'Laid it up in their
    hearts' preserves the metaphor while remaining natural English and reflects deliberate
    remembrance rather than a momentary feeling.
- source_word: πάντες οἱ ἀκούσαντες
  chosen: all who heard it
  alternatives:
  - all who heard
  - everyone who heard these things
  lexicon: BDAG
  rationale: The participial phrase refers to all the people hearing the reported
    events. 'It' is supplied naturally in English to complete the sense from context.
- source_word: Τί ἄρα
  chosen: What then
  alternatives:
  - What, then,
  - What therefore
  lexicon: BDAG
  rationale: ἄρα adds an inferential or consequential nuance. 'What then' is idiomatic
    and captures the sense of drawing a conclusion from the preceding events.
- source_word: τὸ παιδίον τοῦτο
  chosen: this child
  alternatives:
  - this little child
  - this boy
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'this child' is the most natural and contextually
    appropriate rendering without over-specifying age or sex.
- source_word: ἔσται
  chosen: will ... become
  alternatives:
  - will be
  lexicon: BDAG
  rationale: Although the verb is simply 'will be,' in this context the question concerns
    the child's future role or destiny. 'Will become' communicates the idiomatic force
    in English without exceeding the Greek sense.
- source_word: καὶ γὰρ
  chosen: For
  alternatives:
  - indeed
  - and indeed
  - for indeed
  lexicon: BDAG
  rationale: The combination introduces the reason for the people's question. English
    typically expresses this smoothly with 'For' rather than preserving both particles
    woodenly.
- source_word: χεὶρ κυρίου
  chosen: the hand of the Lord
  alternatives:
  - the Lord's hand
  lexicon: BDAG
  rationale: This is a biblical idiom for divine power, favor, or guidance. Retaining
    'hand' preserves the metaphor and intertextual resonance rather than flattening
    it to an interpretation.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' Here it refers to God in a reverent
    biblical idiom.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - upon him
  - with this child
  lexicon: BDAG
  rationale: μετά with genitive means 'with.' 'Him' naturally refers back to the child,
    and the simple rendering preserves the statement's theological restraint.
