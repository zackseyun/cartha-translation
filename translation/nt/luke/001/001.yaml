theological_decisions:
- issue: Sense of πεπληροφορημένων in Luke's prologue
  chosen_reading: fulfilled
  alternative_readings:
  - accomplished
  - fully confirmed
  rationale: The participle can bear either an accomplishment/fulfillment sense or,
    in some contexts, a sense of full certainty. In Luke 1:1, with πραγμάτων and the
    ensuing narrative of redemptive events, 'fulfilled' best captures the likely sense
    while preserving Luke's salvation-historical framing. The alternative 'fully confirmed'
    is preserved in a footnote because the lexical range is discussed by interpreters.
  doctrine_reference: Preserve theological tension rather than resolve it
