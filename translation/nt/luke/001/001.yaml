id: LUK.1.1
reference: Luke 1:1
source:
  edition: SBLGNT
  text: Ἐπειδήπερ πολλοὶ ἐπεχείρησαν ἀνατάξασθαι διήγησιν περὶ τῶν πεπληροφορημένων
    ἐν ἡμῖν πραγμάτων,
translation:
  text: Since many have undertaken to compile an account concerning the matters that
    have been fulfilled among us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that have been accomplished' or 'that have been fully confirmed among
      us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπειδήπερ
  chosen: Since
  alternatives:
  - Inasmuch as
  - Because
  - Since indeed
  lexicon: BDAG
  rationale: Introduces Luke's formal preface with a causal/background sense. 'Since'
    is natural modern English and preserves the logical connection without the archaic
    feel of 'inasmuch as.' The enclitic intensifier -περ is not separately represented
    but contributes to the formal tone.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  - many others
  lexicon: BDAG
  rationale: Simple quantitative adjective; 'many' is sufficient and idiomatic. 'Others'
    is not explicit in the Greek.
- source_word: ἐπεχείρησαν
  chosen: have undertaken
  alternatives:
  - have attempted
  - set their hand
  - have tried
  lexicon: BDAG
  rationale: The verb can mean attempt or undertake. In this literary context, 'have
    undertaken' avoids implying failure while still reflecting the initiation of a
    project. 'Attempted' can sound dismissive in English, which the context does not
    require.
- source_word: ἀνατάξασθαι
  chosen: to compile
  alternatives:
  - to draw up
  - to arrange in order
  - to set forth
  lexicon: BDAG
  rationale: Refers to composing or arranging a narrative account. 'Compile' communicates
    the literary activity clearly in modern English, while still fitting Luke's polished
    prologue.
- source_word: διήγησιν
  chosen: an account
  alternatives:
  - a narrative
  - a report
  lexicon: BDAG
  rationale: Denotes a narrative or orderly account. 'An account' is readable modern
    English and fits the historiographic tone. 'Narrative' is possible but slightly
    more technical.
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - regarding
  lexicon: BDAG
  rationale: A formal preposition matching the elevated style of the sentence. 'Concerning'
    preserves the literary register better than the more colloquial 'about.'
- source_word: τῶν πεπληροφορημένων
  chosen: that have been fulfilled
  alternatives:
  - that have been accomplished
  - that have been fully confirmed
  lexicon: BDAG
  rationale: The perfect passive participle of πληροφορέω here most naturally refers
    to events brought to fulfillment/accomplishment, especially in salvation-history
    context. 'Fulfilled' also resonates with Luke's broader theological emphasis without
    overtranslating. 'Fully confirmed' is lexically possible in some contexts but
    less fitting with 'matters/events' here.
- source_word: ἐν ἡμῖν
  chosen: among us
  alternatives:
  - in our midst
  - among us believers
  lexicon: BDAG
  rationale: 'Best taken corporately: the events occurred in the community''s midst
    or among those connected with them. ''Among us'' is idiomatic and does not overdefine
    the referent. Adding ''believers'' would import interpretation not explicit in
    the text.'
- source_word: πραγμάτων
  chosen: the matters
  alternatives:
  - the events
  - the things
  lexicon: BDAG
  rationale: πρᾶγμα is broad, covering matters, events, or things done. 'Matters'
    preserves the breadth and pairs well with 'fulfilled.' 'Events' is also strong,
    but 'matters' leaves room for both deeds and realities narrated in the Gospel.
