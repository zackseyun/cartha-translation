theological_decisions:
- issue: Rendering of ἄγγελος
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: Although ἄγγελος can mean 'messenger,' the immediate context is Gabriel's
    appearance and speech, so 'angel' is contextually required and carries no unnecessary
    doctrinal expansion beyond the text.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
