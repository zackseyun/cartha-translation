id: LUK.1.18
reference: Luke 1:18
source:
  edition: SBLGNT
  text: καὶ εἶπεν Ζαχαρίας πρὸς τὸν ἄγγελον· Κατὰ τί γνώσομαι τοῦτο; ἐγὼ γάρ εἰμι
    πρεσβύτης καὶ ἡ γυνή μου προβεβηκυῖα ἐν ταῖς ἡμέραις αὐτῆς.
translation:
  text: And Zechariah said to the angel, “How will I know this? For I am an old man,
    and my wife is advanced in her days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “my wife is advanced in years.” The Greek literally
      says “advanced in her days.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard narrative speech verb; 'said' is the natural modern English
    rendering.
- source_word: πρὸς τὸν ἄγγελον
  chosen: to the angel
  alternatives:
  - toward the angel
  lexicon: BDAG
  rationale: With a speech verb, πρός commonly marks the addressee; 'to the angel'
    is idiomatic and accurate.
- source_word: Κατὰ τί
  chosen: How
  alternatives:
  - By what means
  - How can
  lexicon: BDAG
  rationale: The idiom asks for the basis or means by which Zechariah will know the
    announced thing. 'How' communicates this naturally in English without over-paraphrasing.
- source_word: γνώσομαι
  chosen: will I know
  alternatives:
  - can I know
  - shall I know
  lexicon: BDAG
  rationale: Future middle of γινώσκω here expresses future coming-to-know or assurance.
    'Will I know' preserves the future sense better than 'can I know,' which would
    shift toward ability.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: Simple demonstrative referring to the angel's announcement; 'this' is
    sufficient in English.
- source_word: πρεσβύτης
  chosen: an old man
  alternatives:
  - elderly man
  - aged man
  lexicon: BDAG
  rationale: The noun denotes an old man in age, not an office-holder. 'Old man' is
    the most direct and natural rendering in context.
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In context with possessive 'my,' the relational sense 'wife' is clearly
    intended rather than the more general 'woman'.
- source_word: προβεβηκυῖα ἐν ταῖς ἡμέραις αὐτῆς
  chosen: is advanced in her days
  alternatives:
  - is advanced in years
  - is well along in years
  lexicon: BDAG
  rationale: The Greek expression is literally 'having advanced in her days,' an idiom
    for old age. 'Advanced in her days' preserves the source imagery more closely
    than the smoother English idiom 'advanced in years,' while remaining understandable.
