id: LUK.1.17
reference: Luke 1:17
source:
  edition: SBLGNT
  text: καὶ αὐτὸς προελεύσεται ἐνώπιον αὐτοῦ ἐν πνεύματι καὶ δυνάμει Ἠλίου, ἐπιστρέψαι
    καρδίας πατέρων ἐπὶ τέκνα καὶ ἀπειθεῖς ἐν φρονήσει δικαίων, ἑτοιμάσαι κυρίῳ λαὸν
    κατεσκευασμένον.
translation:
  text: And he will go before him in the spirit and power of Elijah, to turn the hearts
    of fathers to children, and the disobedient to the wisdom of the righteous, to
    prepare for the Lord a people made ready.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward children.' The phrase echoes Malachi 4:6 and may carry the sense
      of restored family reconciliation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the mindset of the righteous' or 'in the prudence of the righteous.'
    reason: lexical_alternative
  - marker: c
    text: '''In the spirit and power of Elijah'' refers to Elijah-like prophetic ministry
      and empowerment, not necessarily Elijah''s literal personal return.'
    reason: cross_reference
lexical_decisions:
- source_word: προελεύσεται
  chosen: will go before
  alternatives:
  - will go ahead of
  - will precede
  lexicon: BDAG
  rationale: Future middle of προέρχομαι with ἐνώπιον αὐτοῦ expresses preceding someone
    in mission or presence. 'Go before' is natural English and preserves the directional/representative
    sense.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - ahead of him
  lexicon: BDAG
  rationale: The phrase can mean either spatially 'before/in the presence of' or functionally
    'ahead of.' Here, in prophetic commissioning language, 'before him' preserves
    the Greek compactly while allowing the allusion to going ahead of the Lord/Messiah.
- source_word: ἐν πνεύματι καὶ δυνάμει Ἠλίου
  chosen: in the spirit and power of Elijah
  alternatives:
  - with the spirit and power of Elijah
  lexicon: BDAG
  rationale: This is the standard and most transparent rendering. It indicates prophetic
    likeness/empowerment associated with Elijah, not identity with Elijah himself.
- source_word: ἐπιστρέψαι
  chosen: to turn
  alternatives:
  - to turn back
  - to bring back
  - to restore
  lexicon: BDAG
  rationale: The aorist infinitive gives purpose. 'Turn' is concise and echoes the
    Malachi background; 'turn back' is possible but slightly more interpretive.
- source_word: καρδίας πατέρων ἐπὶ τέκνα
  chosen: the hearts of fathers to children
  alternatives:
  - the hearts of fathers toward children
  - fathers to their children
  lexicon: BDAG
  rationale: This closely follows the Greek and preserves the Malachi 4:6 allusion.
    'To children' is more literal than 'toward children,' while still intelligible
    in English.
- source_word: ἀπειθεῖς
  chosen: the disobedient
  alternatives:
  - the rebellious
  - the unbelieving
  lexicon: BDAG
  rationale: ἀπειθής often denotes refusal to be persuaded, hence disobedience/rebellion.
    'The disobedient' best fits the ethical parallel with 'the righteous' and remains
    broad enough to include obstinacy.
- source_word: ἐν φρονήσει δικαίων
  chosen: to the wisdom of the righteous
  alternatives:
  - to the mindset of the righteous
  - in the prudence of the righteous
  lexicon: BDAG
  rationale: 'Although ἐν can be rendered ''in,'' the construction after ἐπιστρέψαι
    is idiomatically directional in sense: turning people into the sphere or pattern
    of righteous understanding. ''Wisdom'' is more idiomatic English than ''mindset''
    while preserving moral discernment.'
- source_word: ἑτοιμάσαι
  chosen: to prepare
  alternatives:
  - to make ready
  lexicon: BDAG
  rationale: A second purpose infinitive parallel to ἐπιστρέψαι. 'Prepare' is the
    clearest English equivalent and sets up the object phrase naturally.
- source_word: κυρίῳ
  chosen: for the Lord
  alternatives:
  - for Lord
  - for Yahweh
  lexicon: BDAG
  rationale: 'Per doctrine, κύριος is rendered ''Lord.'' The dative here is best taken
    as advantage/reference: the people are prepared for the Lord.'
- source_word: λαὸν κατεσκευασμένον
  chosen: a people made ready
  alternatives:
  - a prepared people
  - a people fully prepared
  lexicon: BDAG
  rationale: κατεσκευασμένον is a perfect passive participle indicating a state of
    readiness resulting from preparation. 'Made ready' is readable modern English
    and preserves the resultant-state nuance better than the flatter 'prepared'.
