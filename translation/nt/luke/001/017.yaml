theological_decisions:
- issue: Identity and role of Elijah language
  chosen_reading: John is described as going in the spirit and power of Elijah, not
    as Elijah literally returned.
  alternative_readings:
  - A more literalistic reading that Elijah himself is in view
  rationale: The Greek says 'in the spirit and power of Elijah,' which indicates prophetic
    continuity and empowerment. This preserves the Malachi allusion without importing
    a doctrine of literal reincarnation or identity.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Referent of 'him' / 'the Lord'
  chosen_reading: 'The verse leaves the pronouns/titles as in Greek: John goes before
    ''him'' and prepares a people ''for the Lord.'''
  alternative_readings:
  - Expanding the text to specify 'before the Messiah/Jesus' in the main text
  rationale: The immediate context identifies the referent, but the verse itself uses
    pronoun and title. The translation preserves that wording rather than resolving
    it by expansion, while maintaining 'Lord' for κύριος per doctrine.
  doctrine_reference: Translation philosophy §1, §3; Contested terms table for κύριος
