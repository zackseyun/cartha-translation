theological_decisions:
- issue: Referent of the passive 'has been heard'
  chosen_reading: 'Implicit divine passive: God has heard Zechariah''s prayer.'
  alternative_readings:
  - Indefinite passive without explicit theological emphasis
  rationale: Although God is not named, in this Jewish prayer context the passive
    naturally implies God's action. The translation leaves the subject implicit, as
    in the Greek, and does not over-specify beyond what the text warrants.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
