id: LUK.1.13
reference: Luke 1:13
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτὸν ὁ ἄγγελος· Μὴ φοβοῦ, Ζαχαρία, διότι εἰσηκούσθη ἡ δέησίς
    σου, καὶ ἡ γυνή σου Ἐλισάβετ γεννήσει υἱόν σοι, καὶ καλέσεις τὸ ὄνομα αὐτοῦ Ἰωάννην·
translation:
  text: But the angel said to him, “Do not be afraid, Zechariah, because your prayer
    has been heard, and your wife Elizabeth will bear you a son, and you shall call
    his name John.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your petition has been heard.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you shall call his name John.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  chosen: But ... said
  alternatives:
  - And ... said
  - Now ... said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' preserves the slight discourse shift after
    Zechariah's fear without overstating contrast.
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In this narrative context the referent is a heavenly angelic being, so
    'angel' is the natural and established sense of ἄγγελος.
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: The present middle/passive imperative with μή is a standard prohibition.
    'Do not be afraid' is idiomatic modern English and fits the immediate emotional
    context.
- source_word: Ζαχαρία
  chosen: Zechariah
  alternatives:
  - Zachariah
  lexicon: BDAG
  rationale: Standard English transliteration for Ζαχαρίας in New Testament contexts
    is 'Zechariah.'
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: διότι introduces the reason Zechariah need not fear; 'because' is clear
    contemporary English.
- source_word: εἰσηκούσθη
  chosen: has been heard
  alternatives:
  - was heard
  lexicon: BDAG
  rationale: The aorist passive states that the prayer received a hearing from God.
    English present perfect ('has been heard') communicates the completed action with
    present relevance in context.
- source_word: ἡ δέησίς σου
  chosen: your prayer
  alternatives:
  - your petition
  - your supplication
  lexicon: BDAG
  rationale: δέησις denotes an earnest request or petition, often in prayer to God.
    'Prayer' is the most natural rendering here, while the more specific nuance is
    noted as an alternative.
- source_word: ἡ γυνή σου Ἐλισάβετ
  chosen: your wife Elizabeth
  alternatives:
  - your woman Elizabeth
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; with possessive σου and personal context,
    'wife' is clearly intended.
- source_word: γεννήσει
  chosen: will bear
  alternatives:
  - will give birth to
  lexicon: BDAG
  rationale: γεννάω with a female subject means to bear/give birth. 'Will bear' is
    concise and natural.
- source_word: υἱόν σοι
  chosen: you a son
  alternatives:
  - a son for you
  lexicon: BDAG
  rationale: The dative σοι is a dative of advantage/relationship. 'Bear you a son'
    is idiomatic English and preserves the personal promise.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ Ἰωάννην
  chosen: you shall call his name John
  alternatives:
  - you will name him John
  - you shall name him John
  lexicon: BDAG
  rationale: The Greek idiom is literally 'you shall call his name John.' This is
    understandable in English and preserves the formal, annunciation-style wording;
    'name him John' is a viable smoother alternative.
- source_word: Ἰωάννην
  chosen: John
  alternatives:
  - Johanan
  lexicon: BDAG
  rationale: Standard English transliteration of the Greek name Ἰωάννης is 'John.'
