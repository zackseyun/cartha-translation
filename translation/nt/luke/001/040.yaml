id: LUK.1.40
reference: Luke 1:40
source:
  edition: SBLGNT
  text: καὶ εἰσῆλθεν εἰς τὸν οἶκον Ζαχαρίου καὶ ἠσπάσατο τὴν Ἐλισάβετ.
translation:
  text: and entered the house of Zechariah and greeted Elizabeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went into the house of Zechariah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'greeted' could be rendered 'welcomed' or more formally 'saluted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  lexicon: BDAG
  rationale: Aorist active indicative of εἰσέρχομαι, denoting entry into a place.
    'Entered' is concise, natural English and preserves the straightforward narrative
    action.
- source_word: οἶκον
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: οἶκος commonly means 'house' or 'household/home.' Here the physical location
    is in view with εἰς, so 'house' best matches the Greek while remaining natural.
- source_word: Ζαχαρίου
  chosen: Zechariah
  alternatives:
  - Zacharias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Zechariah' is the standard contemporary English form.
- source_word: ἠσπάσατο
  chosen: greeted
  alternatives:
  - welcomed
  - saluted
  lexicon: BDAG
  rationale: ἀσπάζομαι means to greet or welcome. 'Greeted' is the most direct and
    idiomatic rendering in this context, without adding warmth or ceremony beyond
    the Greek.
- source_word: Ἐλισάβετ
  chosen: Elizabeth
  alternatives:
  - Elisabeth
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention; 'Elizabeth'
    is the familiar and accepted form.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Both instances of καί are simple coordinators linking sequential actions.
    'And' preserves the narrative flow and paratactic style of Luke.
