id: LUK.1.79
reference: Luke 1:79
source:
  edition: SBLGNT
  text: ἐπιφᾶναι τοῖς ἐν σκότει καὶ σκιᾷ θανάτου καθημένοις, τοῦ κατευθῦναι τοὺς πόδας
    ἡμῶν εἰς ὁδὸν εἰρήνης.
translation:
  text: to shine on those sitting in darkness and the shadow of death, to guide our
    feet into the way of peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "death's shadow"; some understand the phrase more broadly as "deep darkness,"
      but the Greek explicitly includes "death."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφᾶναι
  chosen: to shine on
  alternatives:
  - to appear to
  - to give light to
  - to dawn upon
  lexicon: BDAG
  rationale: The aorist infinitive of ἐπιφαίνω here expresses the purpose/result of
    the coming one in the Benedictus. 'Shine on' preserves the imagery of light breaking
    into darkness better than the flatter 'appear to,' while remaining natural English.
- source_word: τοῖς ἐν σκότει ... καθημένοις
  chosen: those sitting in darkness
  alternatives:
  - those dwelling in darkness
  - those seated in darkness
  lexicon: BDAG
  rationale: The participle καθημένοις is literally 'sitting' or 'seated.' 'Sitting'
    is retained to preserve the vivid image and its intertextual resonance with Isaianic
    language, rather than smoothing to 'living' or 'dwelling.'
- source_word: σκότει
  chosen: darkness
  lexicon: BDAG
  rationale: Standard rendering of σκότος in the dative after ἐν. It carries both
    literal and metaphorical force in context and should not be overinterpreted in
    translation.
- source_word: σκιᾷ θανάτου
  chosen: the shadow of death
  alternatives:
  - death's shadow
  - deep darkness
  lexicon: BDAG
  rationale: This phrase strongly echoes biblical idiom familiar from the Septuagint
    and English Bible tradition. 'The shadow of death' preserves the imagery and likely
    intertextual resonance. 'Deep darkness' is possible in some OT contexts, but here
    the explicit genitive θανάτου favors retaining 'death' in the rendering.
- source_word: τοῦ κατευθῦναι
  chosen: to guide
  alternatives:
  - to direct
  - to make straight
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'Guide' fits the idiom with
    'our feet' in English and conveys directional leadership. 'Direct' is possible
    but less vivid; 'make straight' would over-literalize and suggest a different
    nuance.
- source_word: τοὺς πόδας ἡμῶν
  chosen: our feet
  lexicon: BDAG
  rationale: A literal rendering is clear and idiomatic in English. The plural 'feet'
    should be retained rather than abstracting to 'us,' since the bodily metaphor
    is part of the verse's poetic force.
- source_word: εἰς ὁδὸν εἰρήνης
  chosen: into the way of peace
  alternatives:
  - in the path of peace
  - into a way of peace
  lexicon: BDAG
  rationale: ὁδός is literally 'way' or 'road.' 'The way of peace' preserves the metaphor
    and sounds natural in English. The anarthrous Greek noun does not require an indefinite
    English article here; the phrase functions qualitatively and idiomatically.
