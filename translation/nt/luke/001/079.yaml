theological_decisions:
- issue: Metaphorical versus overly interpretive rendering of darkness imagery
  chosen_reading: Retain the imagery of darkness, shadow of death, feet, and way without
    explicating them as spiritual ignorance, mortal danger, or ethical conduct in
    the main text.
  alternative_readings:
  - to give light to those in spiritual darkness and death
  - to lead us in the path that brings peace
  rationale: The verse is poetic and allusive. The translation should preserve theological
    tension and imagery rather than resolve the metaphors into a single interpretive
    paraphrase.
  doctrine_reference: Translation philosophy §3, §6
