id: LUK.1.24
reference: Luke 1:24
source:
  edition: SBLGNT
  text: Μετὰ δὲ ταύτας τὰς ἡμέρας συνέλαβεν Ἐλισάβετ ἡ γυνὴ αὐτοῦ· καὶ περιέκρυβεν
    ἑαυτὴν μῆνας πέντε, λέγουσα
translation:
  text: After these days Elizabeth his wife conceived, and she kept herself hidden
    for five months, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After those days.' The Greek demonstrative can be rendered either way
      in English temporal narration.
    reason: lexical_alternative
  - marker: b
    text: Or 'she hid herself' or 'she secluded herself.' The Greek imperfect suggests
      continued action over the five-month period.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταύτας τὰς ἡμέρας
  chosen: After these days
  alternatives:
  - After those days
  - And after these days
  lexicon: BDAG
  rationale: μετά with the accusative indicates temporal sequence, 'after.' ταύτας
    is deictic ('these'), though English idiom could also use 'those' for past reference.
    δέ is lightly connective and is not required to be separately represented in smooth
    English, though 'and' is possible.
- source_word: συνέλαβεν
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: BDAG
  rationale: In this context συλλαμβάνω refers to conception of a child. 'Conceived'
    is the most direct and idiomatic rendering; 'became pregnant' is interpretive
    and slightly less formally tied to the Greek verb.
- source_word: Ἐλισάβετ
  chosen: Elizabeth
  rationale: Standard English transliteration of the personal name.
- source_word: ἡ γυνὴ αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: 'γυνή can mean ''woman'' or ''wife''; with the possessive αὐτοῦ in this
    context it clearly means ''wife.'' English naturally places the possessive first:
    ''Elizabeth his wife.'''
- source_word: περιέκρυβεν ἑαυτὴν
  chosen: she kept herself hidden
  alternatives:
  - she hid herself
  - she secluded herself
  lexicon: BDAG
  rationale: The imperfect verb suggests ongoing or durative action, not merely a
    single act. 'Kept herself hidden' captures both the reflexive sense and the imperfect
    aspect better than the simple past 'hid herself.' 'Secluded herself' is possible
    but slightly more interpretive.
- source_word: μῆνας πέντε
  chosen: for five months
  alternatives:
  - five months
  lexicon: BDAG
  rationale: The accusative expresses duration of time. English normally supplies
    'for' to make this explicit.
- source_word: λέγουσα
  chosen: saying,
  alternatives:
  - and said,
  lexicon: BDAG
  rationale: The present participle introduces the content of Elizabeth's speech in
    the following verse. 'Saying' preserves the participial linkage more closely than
    converting it to a finite verb.
