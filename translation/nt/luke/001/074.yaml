theological_decisions:
- issue: Scope of λατρεύειν in relation to God
  chosen_reading: serve him
  alternative_readings:
  - worship him
  rationale: The term can denote worshipful service specifically directed to God.
    Rendering it as 'serve him' preserves both devotion and obedience without narrowing
    the sense to liturgical worship alone.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather
    than over-resolve.
