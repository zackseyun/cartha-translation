id: LUK.1.74
reference: Luke 1:74
source:
  edition: SBLGNT
  text: ἀφόβως ἐκ χειρὸς ⸀ἐχθρῶν ῥυσθέντας λατρεύειν αὐτῷ
translation:
  text: that, having been rescued from the hand of our enemies, we might serve him
    without fear
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearlessly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having been delivered from the power of our enemies.'
    reason: lexical_alternative
  - marker: c
    text: The verb can also be rendered 'worship,' especially in contexts of service
      directed to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφόβως
  chosen: without fear
  alternatives:
  - fearlessly
  lexicon: BDAG
  rationale: Adverb meaning 'without fear' or 'fearlessly.' 'Without fear' is more
    natural in this clause and preserves the relation to the preceding purpose statement.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - out of the power of
  - from
  lexicon: BDAG
  rationale: A common idiom for deliverance from someone's power or control. 'From
    the hand of' preserves the biblical imagery while remaining understandable in
    English.
- source_word: ἐχθρῶν
  chosen: our enemies
  alternatives:
  - enemies
  lexicon: BDAG
  rationale: The Greek lacks an explicit possessive here, but the broader sentence
    context in Zechariah's prophecy speaks of deliverance for God's people from their
    enemies (cf. preceding verse). Supplying 'our' makes the English idiomatic and
    reflects the implied first-person plural reference carried by the surrounding
    infinitival construction.
- source_word: ῥυσθέντας
  chosen: having been rescued
  alternatives:
  - having been delivered
  - being rescued
  lexicon: BDAG
  rationale: Aorist passive participle of ῥύομαι, denoting prior action relative to
    the infinitive 'to serve.' 'Having been rescued' captures the completed deliverance
    that grounds the ensuing service.
- source_word: λατρεύειν
  chosen: serve
  alternatives:
  - worship
  - render sacred service
  lexicon: BDAG
  rationale: λατρεύω often denotes service/worship rendered to God. 'Serve' fits the
    immediate syntax and preserves the broader covenantal sense; 'worship' is a possible
    narrower alternative but could understate the whole-life service implied.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: 'Dative pronoun referring to God in the preceding context. English idiom
    after ''serve'' normally takes a direct object form: ''serve him.'''
