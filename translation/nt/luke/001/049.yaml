id: LUK.1.49
reference: Luke 1:49
source:
  edition: SBLGNT
  text: ὅτι ἐποίησέν μοι ⸀μεγάλα ὁ δυνατός, καὶ ἅγιον τὸ ὄνομα αὐτοῦ,
translation:
  text: because the Mighty One has done great things for me, and holy is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "and his name is holy." The Greek places "holy" before "his name" for
      emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Mary's magnifying the Lord in the preceding
    verse. 'Because' is clear modern English and preserves the causal force.
- source_word: ἐποίησέν
  chosen: has done
  alternatives:
  - did
  - has made
  lexicon: BDAG
  rationale: Aorist of ποιέω here refers to God's decisive action on Mary's behalf.
    English present perfect ('has done') naturally conveys a completed act with present
    significance in this praise context.
- source_word: μοι
  chosen: for me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: 'The dative pronoun is best rendered idiomatically as benefactive here:
    God has done great things ''for me,'' not merely ''to me.'''
- source_word: μεγάλα
  chosen: great things
  alternatives:
  - great deeds
  - great things
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'Great things' is the most
    natural and traditional English equivalent and fits the broad sense of mighty
    acts without over-specifying.
- source_word: ὁ δυνατός
  chosen: the Mighty One
  alternatives:
  - the Powerful One
  - the one who is mighty
  lexicon: BDAG
  rationale: The articular adjective functions as a divine title. 'The Mighty One'
    is concise, reverent, and preserves the titular force better than a more paraphrastic
    rendering.
- source_word: ἅγιον
  chosen: holy
  alternatives:
  - set apart
  - sacred
  lexicon: BDAG
  rationale: Predicative adjective describing God's name. 'Holy' is the standard and
    theologically appropriate rendering, preserving both moral purity and consecrated
    distinctness.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering. In biblical usage 'name' can stand for
    the person's revealed character and reputation, but the text itself says 'name,'
    which should be retained.
