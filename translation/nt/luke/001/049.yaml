theological_decisions:
- issue: Rendering ὁ δυνατός as a divine title
  chosen_reading: the Mighty One
  alternative_readings:
  - the one who is mighty
  - the Powerful One
  rationale: The Greek uses the article with the adjective as a substantive, functioning
    here as a reverent designation for God. Capitalization in English signals titular
    use without importing extra doctrinal content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Word order in καὶ ἅγιον τὸ ὄνομα αὐτοῦ
  chosen_reading: and holy is his name
  alternative_readings:
  - and his name is holy
  rationale: The Greek places 'holy' first for emphasis. The chosen English preserves
    some of that emphasis while remaining natural. It also echoes biblical praise
    style without becoming archaic.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning while using readable modern English.'
