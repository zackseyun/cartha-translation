id: LUK.1.10
reference: Luke 1:10
source:
  edition: SBLGNT
  text: καὶ πᾶν τὸ πλῆθος ἦν τοῦ λαοῦ προσευχόμενον ἔξω τῇ ὥρᾳ τοῦ θυμιάματος·
translation:
  text: And the whole multitude of the people was praying outside at the hour of the
    incense offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time of burning incense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν τὸ πλῆθος
  chosen: the whole multitude
  alternatives:
  - all the multitude
  - the whole crowd
  lexicon: BDAG
  rationale: πᾶν with the singular noun πλῆθος emphasizes the entirety of the assembled
    group. 'Whole multitude' preserves both the collective singular and the sense
    of a large gathered body better than the flatter 'everyone'.
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the people of Israel
  - of the populace
  lexicon: BDAG
  rationale: λαός here most naturally means 'the people,' likely the covenant people
    in the temple setting, but the text does not explicitly say 'Israel,' so that
    is not imported into the main text.
- source_word: προσευχόμενον
  chosen: was praying
  alternatives:
  - was in prayer
  - was praying together
  lexicon: BDAG
  rationale: The present participle with ἦν forms a periphrastic construction expressing
    ongoing action. 'Was praying' is the most natural English equivalent and avoids
    adding 'together,' though the collective subject already implies corporate action.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - outdoors
  - outside the sanctuary
  lexicon: BDAG
  rationale: ἔξω simply means 'outside.' In context it contrasts the people outside
    with Zechariah inside offering incense, but 'outside the sanctuary' would specify
    more than the Greek explicitly states.
- source_word: τῇ ὥρᾳ
  chosen: at the hour
  alternatives:
  - at the time
  lexicon: BDAG
  rationale: ὥρα can mean 'hour' or more generally 'time.' 'At the hour' preserves
    the cultic and scheduled sense of a set time of worship, while remaining natural
    in English when followed by a genitive qualifier.
- source_word: τοῦ θυμιάματος
  chosen: of the incense offering
  alternatives:
  - of incense
  - of burning incense
  lexicon: BDAG
  rationale: θυμίαμα denotes incense, and in this temple context refers to the ritual
    offering of incense. 'Incense offering' makes the cultic sense explicit in idiomatic
    English without overparaphrasing.
