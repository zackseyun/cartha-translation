theological_decisions:
- issue: Temple-cult terminology in θυμίαμα
  chosen_reading: incense offering
  alternative_readings:
  - incense
  - burning of incense
  rationale: The verse describes the liturgical moment associated with priestly incense
    in the temple. Rendering it as 'incense offering' preserves the sacrificial/worship
    context without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
