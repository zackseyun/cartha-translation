theological_decisions:
- issue: Mary’s statement and the conception of Jesus
  chosen_reading: Retain the literal idiom “I do not know a man” in the main text,
    allowing the verse to express Mary’s virginal status without paraphrastic expansion.
  alternative_readings:
  - since I have not had relations with a man
  - since I am a virgin
  rationale: Historic Christian orthodoxy affirms the virgin conception, and this
    verse is one textual basis for that doctrine. However, the translation should
    not import more than the Greek says. The Greek uses the idiom οὐ γινώσκω ἄνδρα,
    literally “I do not know a man,” which implies sexual inexperience in context.
    Rendering it literally in the main text preserves transparency to the source,
    while a footnote can make the idiomatic sense explicit for modern readers.
  doctrine_reference: 'Affirmations: Apostles'' Creed; Nicene Creed; Translation philosophy
    §§1, 3, 6'
