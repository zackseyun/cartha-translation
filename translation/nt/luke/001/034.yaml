id: LUK.1.34
reference: Luke 1:34
source:
  edition: SBLGNT
  text: εἶπεν δὲ Μαριὰμ πρὸς τὸν ἄγγελον· Πῶς ἔσται τοῦτο, ἐπεὶ ἄνδρα οὐ γινώσκω;
translation:
  text: But Mary said to the angel, “How will this be, since I do not know a man?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “since I have not had relations with a man.” The
      Greek “know a man” is a modest expression referring to sexual relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as “But” to mark the slight discourse contrast between Gabriel’s
    announcement and Mary’s question. “And” is possible, but “But” better reflects
    the responsive turn in natural English without overstating contrast.
- source_word: Μαριὰμ
  chosen: Mary
  rationale: Standard English transliteration of the personal name Μαριάμ, following
    the translation philosophy of transliterating names rather than translating them.
- source_word: πρὸς τὸν ἄγγελον
  chosen: to the angel
  alternatives:
  - to the messenger
  lexicon: BDAG
  rationale: ἄγγελος can mean “messenger,” but in Luke’s infancy narrative the referent
    is clearly a heavenly angelic being, so “angel” is the most accurate and natural
    rendering.
- source_word: Πῶς
  chosen: How
  lexicon: BDAG
  rationale: Direct interrogative of manner or means; “How” is the straightforward
    equivalent.
- source_word: ἔσται
  chosen: will this be
  alternatives:
  - will this happen
  - shall this be
  lexicon: BDAG
  rationale: Future middle of εἰμί here asks how the announced reality will come about.
    “Will this be” preserves the verbal simplicity and echoes the Greek structure
    more closely than “happen.”
- source_word: τοῦτο
  chosen: this
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to the announced conception and birth.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - seeing that
  lexicon: BDAG
  rationale: Introduces the reason for Mary’s question. “Since” is idiomatic modern
    English and preserves the causal sense.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a husband
  lexicon: BDAG
  rationale: ἀνήρ can mean either “man” or “husband.” Here the anarthrous accusative
    with γινώσκω in this idiom points to sexual relations with a male rather than
    specifically marital status. “A man” preserves the literal expression and avoids
    importing an interpretive narrowing to “husband,” though that sense is contextually
    related.
- source_word: οὐ γινώσκω
  chosen: I do not know
  alternatives:
  - I have not had relations with
  - I am not knowing
  lexicon: BDAG
  rationale: γινώσκω literally means “know,” and in this context functions as a modest
    idiom for sexual relations. The main text preserves the literal wording for transparency
    and biblical resonance; the idiomatic sexual sense is important and therefore
    preserved in a footnote.
