theological_decisions:
- issue: Force of the emphatic negation οὐ μὴ πίῃ in a prophetic announcement
  chosen_reading: 'Rendered as obligation/prohibition: "he must never drink"'
  alternative_readings:
  - 'Rendered as simple future prediction: "he will certainly not drink"'
  rationale: In context the angel is describing John's divinely appointed consecration,
    not merely forecasting a personal habit. English prohibition language best conveys
    the force for modern readers while remaining faithful to the Greek emphasis.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referent and capitalization of πνεύματος ἁγίου
  chosen_reading: 'Personal divine referent: "the Holy Spirit"'
  alternative_readings:
  - holy spirit as a non-personal empowering force
  rationale: Luke’s usage strongly supports reference to the divine Spirit rather
    than an impersonal disposition. This aligns with historic Christian orthodoxy
    while arising from the immediate literary context, not imported doctrine.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
