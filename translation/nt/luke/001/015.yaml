id: LUK.1.15
reference: Luke 1:15
source:
  edition: SBLGNT
  text: ἔσται γὰρ μέγας ἐνώπιον ⸀τοῦ κυρίου, καὶ οἶνον καὶ σίκερα οὐ μὴ πίῃ, καὶ πνεύματος
    ἁγίου πλησθήσεται ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ,
translation:
  text: For he will be great before the Lord, and he must never drink wine or strong
    drink, and he will be filled with the Holy Spirit even from his mother’s womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "he will certainly not drink wine or strong drink." The Greek emphatically
      denies the action; the main text renders the sense as a prohibition fitting
      his consecrated calling.
    reason: lexical_alternative
  - marker: b
    text: '"Strong drink" refers to intoxicating drink other than wine.'
    reason: cultural_note
  - marker: c
    text: Or "already from his mother’s womb" or "while still in his mother’s womb."
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  chosen: great
  alternatives:
  - important
  - prominent
  lexicon: BDAG
  rationale: '"Great" is the standard and most transparent rendering, preserving both
    stature and significance without over-interpreting the nature of his greatness.'
- source_word: ἐνώπιον τοῦ κυρίου
  chosen: before the Lord
  alternatives:
  - in the sight of the Lord
  - in the presence of the Lord
  lexicon: BDAG
  rationale: '"Before the Lord" is concise and natural while preserving the relational/judicial
    sense of being evaluated in the Lord’s sight. κύριος is rendered "Lord" per doctrine
    defaults.'
- source_word: τοῦ κυρίου
  chosen: the Lord
  lexicon: BDAG
  rationale: The default rendering for κύριος in DOCTRINE.md is "Lord." In Luke 1
    this most naturally refers to God, and "the Lord" preserves both Jewish-Greek
    and NT usage without importing a narrower doctrinal specification into the verse
    itself.
- source_word: οἶνον
  chosen: wine
  lexicon: BDAG
  rationale: Straightforward lexical equivalent for οἶνος.
- source_word: σίκερα
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: BDAG
  rationale: σίκερα refers broadly to intoxicating beverage other than wine, traditionally
    rendered "strong drink." This preserves the likely allusion to Nazirite-like abstinence
    language without narrowing the beverage type too specifically.
- source_word: οὐ μὴ πίῃ
  chosen: he must never drink
  alternatives:
  - he will certainly not drink
  - he shall by no means drink
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is emphatic negation. "He must never
    drink" communicates the force idiomatically in English and fits the angelic declaration
    of divinely imposed vocation better than a merely predictive "will not drink."
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article, English idiom normally uses the
    article in this construction. Capitalization reflects the personal divine referent
    in Luke’s usage.
- source_word: πλησθήσεται
  chosen: he will be filled
  alternatives:
  - he will be full
  lexicon: BDAG
  rationale: Future passive of πίμπλημι is well rendered "will be filled," preserving
    the passive sense of divine action.
- source_word: ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ
  chosen: even from his mother’s womb
  alternatives:
  - already from his mother’s womb
  - while still in his mother’s womb
  lexicon: BDAG
  rationale: This phrase indicates an exceptionally early point of Spirit-filling.
    "Even from his mother’s womb" preserves both the temporal force and the emphatic
    ἔτι without over-specifying prenatal timing beyond the Greek.
