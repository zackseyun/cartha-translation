id: LUK.1.43
reference: Luke 1:43
source:
  edition: SBLGNT
  text: καὶ πόθεν μοι τοῦτο ἵνα ἔλθῃ ἡ μήτηρ τοῦ κυρίου μου πρὸς ⸀ἐμέ;
translation:
  text: And why is this granted to me, that the mother of my Lord should come to me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And from where is this to me...?'—an idiom expressing
      astonishment at receiving such an honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόθεν
  chosen: why
  alternatives:
  - from where
  - how is it
  lexicon: BDAG
  rationale: Literally denotes source ('from where'), but in this idiomatic exclamation
    it asks how such a thing could be so or why such favor should come. 'Why' gives
    natural English while preserving Elizabeth's astonishment. The nuance of source/occasion
    is reflected by pairing it with 'is this granted to me.'
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: The dative marks the person to whom this unexpected privilege comes.
    'To me' is the most natural English rendering in this construction.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this honor
  - this privilege
  lexicon: BDAG
  rationale: The pronoun is left relatively bare in Greek. Rather than importing an
    interpretive noun into the main text, 'this' preserves the source terseness; the
    sense of privilege is conveyed by 'is this granted to me.'
- source_word: ἵνα ἔλθῃ
  chosen: that ... should come
  alternatives:
  - that ... may come
  - that ... came
  lexicon: BDAG
  rationale: After an idiomatic expression like this, ἵνα introduces the content/result
    of the astonishing circumstance. 'That ... should come' is idiomatic English and
    preserves the sense of wonder better than a more wooden 'that ... may come.'
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Straightforward lexical rendering with no need for expansion.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Luke's infancy narrative
    this title carries reverential and christological weight; 'Master' would understate
    that. The possessive 'my Lord' reflects Elizabeth's confession and the Greek genitive
    with μου.
- source_word: πρὸς ἐμέ
  chosen: to me
  alternatives:
  - to my house
  - toward me
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward Elizabeth. English
    'to me' is the natural equivalent. 'To my house' would over-specify what the Greek
    does not say.
