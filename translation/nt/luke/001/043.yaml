theological_decisions:
- issue: Rendering of κυρίου in the phrase ἡ μήτηρ τοῦ κυρίου μου
  chosen_reading: my Lord
  alternative_readings:
  - my master
  rationale: The phrase is translated straightforwardly as 'the mother of my Lord,'
    preserving the title κύριος as 'Lord' in line with the doctrine's contested-terms
    guidance. This allows the text's christological force to stand without either
    diminishing it or importing later doctrinal formulations beyond the verse itself.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to render the idiom more literally or more naturally
  chosen_reading: And why is this granted to me, that the mother of my Lord should
    come to me?
  alternative_readings:
  - And from where is this to me, that the mother of my Lord should come to me?
  - And how is this to me, that the mother of my Lord comes to me?
  rationale: The Greek expression is idiomatic and exclamatory. A highly literal rendering
    would sound opaque in modern English. 'Is this granted to me' makes explicit the
    implied sense of bestowed privilege without adding doctrinal content, fitting
    optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
