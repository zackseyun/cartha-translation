id: LUK.1.68
reference: Luke 1:68
source:
  edition: SBLGNT
  text: Εὐλογητὸς κύριος ὁ θεὸς τοῦ Ἰσραήλ, ὅτι ἐπεσκέψατο καὶ ἐποίησεν λύτρωσιν τῷ
    λαῷ αὐτοῦ,
translation:
  text: Blessed is the Lord, the God of Israel, because he has visited and brought
    redemption to his people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has come to help'; the Greek 'has visited' is a biblical expression
      for God's attentive intervention.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed is
  alternatives:
  - Praised be
  - Blessed be
  lexicon: BDAG
  rationale: Predicate adjective used in a benedictory exclamation. 'Blessed is' gives
    clear modern English while preserving the doxological force. 'Blessed be' is traditional
    and possible, but the finite verb is naturally supplied in English.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
    Here it refers to Israel's God in a blessing formula, so 'Lord' best preserves
    both Jewish-scriptural resonance and NT usage.
- source_word: ὁ θεὸς τοῦ Ἰσραήλ
  chosen: the God of Israel
  lexicon: BDAG
  rationale: A standard biblical designation for the covenant God. Rendering it straightforwardly
    preserves the appositional relationship to 'Lord' and the Old Testament liturgical
    echo.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the blessing. 'Because' is more natural in
    contemporary English than 'for' and clearer than a bare 'that' in this context.
- source_word: ἐπεσκέψατο
  chosen: has visited
  alternatives:
  - has come to help
  - has looked upon
  lexicon: BDAG
  rationale: The verb can mean to visit with concern, often with the sense of intervening
    graciously. 'Has visited' preserves the biblical idiom and allows the theological
    richness of divine visitation without over-paraphrasing.
- source_word: ἐποίησεν λύτρωσιν
  chosen: brought redemption
  alternatives:
  - accomplished redemption
  - made redemption
  - worked redemption
  lexicon: BDAG
  rationale: The idiom literally is 'made redemption,' but English prefers a more
    natural collocation. 'Brought redemption' preserves the action and result without
    sounding wooden. 'Accomplished redemption' is also strong but slightly more interpretive
    and elevated.
- source_word: λύτρωσιν
  chosen: redemption
  alternatives:
  - deliverance
  - release
  lexicon: BDAG
  rationale: '''Redemption'' best preserves the term''s deliverance-by-ransom resonance
    and its theological weight in this salvation context. ''Deliverance'' is possible
    but weaker in preserving the lexical connection.'
- source_word: τῷ λαῷ αὐτοῦ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: BDAG
  rationale: The dative is naturally rendered here as the beneficiary/goal of the
    action. 'To his people' is a close and readable rendering; 'for his people' is
    also possible but slightly less direct.
