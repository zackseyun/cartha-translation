theological_decisions:
- issue: Divine visitation language
  chosen_reading: has visited
  alternative_readings:
  - has come to help
  - has looked favorably on
  rationale: The verse speaks of God's saving intervention in covenantal terms. The
    translation preserves the scriptural metaphor of visitation rather than resolving
    it into a narrower explanatory paraphrase.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
