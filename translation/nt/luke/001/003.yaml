theological_decisions:
- issue: Sense of καθεξῆς in relation to historical ordering
  chosen_reading: Rendered as 'in orderly sequence' rather than a stricter 'in chronological
    order.'
  alternative_readings:
  - in order
  - in chronological order
  rationale: The term can indicate sequence or orderly arrangement, but the verse
    does not require a claim of exhaustively strict chronology. The chosen rendering
    preserves Luke's literary and historiographic intent without importing a stronger
    modern historiographical claim than the Greek demands.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
