id: LUK.1.64
reference: Luke 1:64
source:
  edition: SBLGNT
  text: ἀνεῴχθη δὲ τὸ στόμα αὐτοῦ παραχρῆμα καὶ ἡ γλῶσσα αὐτοῦ, καὶ ἐλάλει εὐλογῶν
    τὸν θεόν.
translation:
  text: And immediately his mouth was opened, and his tongue also, and he began speaking,
    blessing God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was speaking, blessing God.' The imperfect verb may emphasize continued
      speaking rather than the beginning of speech.
    reason: lexical_alternative
  - marker: b
    text: Some translations render 'and his tongue was loosed,' but the Greek here
      literally says 'and his tongue also,' explicitly mentioning the restoration
      of speech without adding 'was loosed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεῴχθη
  chosen: was opened
  alternatives:
  - was opened up
  - opened
  lexicon: BDAG
  rationale: Aorist passive of ἀνοίγω; passive English best reflects the Greek form
    and the sudden restoration of speech without over-specifying the agent.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is natural
    in English and preserves continuity without implying contrast.
- source_word: στόμα
  chosen: mouth
  lexicon: BDAG
  rationale: Straightforward anatomical term; literal rendering fits the narrative
    of restored speech.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Conveys the temporal force of suddenness and direct sequence in readable
    modern English.
- source_word: γλῶσσα
  chosen: his tongue also
  alternatives:
  - his tongue
  - and his tongue was loosed
  lexicon: BDAG
  rationale: The Greek explicitly mentions both mouth and tongue. 'Also' helps reflect
    καὶ before ἡ γλῶσσα, while avoiding importing 'was loosed,' which is not stated
    in this text though it appears in some translation traditions.
- source_word: ἐλάλει
  chosen: he began speaking
  alternatives:
  - he was speaking
  - he spoke
  lexicon: BDAG
  rationale: Imperfect of λαλέω can denote the onset or continuation of speech. In
    this context, after muteness, 'began speaking' best captures the narrative force
    in idiomatic English.
- source_word: εὐλογῶν
  chosen: blessing
  alternatives:
  - praising
  lexicon: BDAG
  rationale: Present participle modifying the manner/content of his speaking. 'Blessing'
    is the more direct lexical equivalent; 'praising' is possible but less precise.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of εὐλογῶν; standard rendering with no article carried
    over, as English idiom does not require 'the God' here.
