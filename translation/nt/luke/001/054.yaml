id: LUK.1.54
reference: Luke 1:54
source:
  edition: SBLGNT
  text: ἀντελάβετο Ἰσραὴλ παιδὸς αὐτοῦ, μνησθῆναι ἐλέους,
translation:
  text: He has helped Israel his servant, remembering mercy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel his child.' The Greek word pais can mean either 'servant' or
      'child'; here 'servant' is preferred because of the Old Testament pattern of
      calling Israel God's servant.
    reason: lexical_alternative
  - marker: b
    text: '''Mercy'' may also carry the sense of covenant mercy or compassionate faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντελάβετο
  chosen: has helped
  alternatives:
  - has taken hold of
  - has come to the aid of
  - has upheld
  lexicon: BDAG
  rationale: The verb ἀντιλαμβάνομαι here means to take hold of in order to help or
    support. In idiomatic English, 'has helped' best conveys the aorist summary of
    God's saving aid in Mary's song without sounding wooden. 'Has come to the aid
    of' is possible but more expansive than the Greek.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Proper name retained by standard transliteration. In context it refers
    corporately to the people of Israel rather than the patriarch Jacob individually.
- source_word: παῖς
  chosen: servant
  alternatives:
  - child
  - boy
  lexicon: BDAG
  rationale: Although παῖς can mean 'child' or 'servant,' in this covenantal context
    with Israel as God's people, 'servant' fits the idiom of Israel as the Lord's
    servant (cf. Isaianic usage). 'Child' would be possible lexically but is less
    likely here because it weakens the servant-language echoed from the Scriptures.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: 'Straightforward possessive pronoun referring to God: Israel is ''his''
    servant.'
- source_word: μνησθῆναι
  chosen: remembering
  alternatives:
  - to remember
  - in remembrance of
  lexicon: BDAG
  rationale: The aorist infinitive functions adverbially, expressing attendant circumstance
    or purpose/result connected to God's helping action. 'Remembering' is concise
    and natural in English while preserving the connection to divine covenant remembrance.
- source_word: ἐλέους
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy, compassion, or covenantal mercy. 'Mercy'
    is the most direct and consistent rendering. Because the term may carry covenant
    overtones in this context, that nuance is best explained in notes rather than
    expanded in the main text.
