theological_decisions:
- issue: Meaning of παῖς with reference to Israel
  chosen_reading: Israel his servant
  alternative_readings:
  - Israel his child
  rationale: The immediate context alludes to God's covenant faithfulness to Israel
    and resonates with Septuagint/Isaianic servant language. Rendering παῖς as 'servant'
    preserves that intertextual and theological texture without denying the familial
    relationship elsewhere expressed in Scripture.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension where ambiguity exists'
- issue: Force of μνησθῆναι ἐλέους
  chosen_reading: remembering mercy
  alternative_readings:
  - to remember his mercy
  - in remembrance of mercy
  rationale: The phrase points to God's covenantal remembrance expressed in merciful
    action. The translation keeps the wording compact and close to the Greek, avoiding
    over-interpretation while allowing the covenant nuance to remain available.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make'
