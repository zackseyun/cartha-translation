- issue: Rendering the naming formula καλέσεις τὸ ὄνομα αὐτοῦ
  chosen_reading: you will call his name Jesus
  alternative_readings:
  - you will name him Jesus
  rationale: No doctrinal dispute is at stake, but the more literal rendering preserves
    the biblical annunciation style and intertextual resonance with scriptural naming
    formulas. The alternative is preserved as a lexical/style option rather than adopted
    in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
