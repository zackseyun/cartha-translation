id: LUK.1.31
reference: Luke 1:31
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ συλλήμψῃ ἐν γαστρὶ καὶ τέξῃ υἱόν, καὶ καλέσεις τὸ ὄνομα αὐτοῦ Ἰησοῦν.
translation:
  text: And behold, you will conceive in your womb and bear a son, and you will call
    his name Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'you will name him Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού as an attention-directing
    particle. 'Behold' is slightly formal but still recognizable and preserves the
    solemn annunciation tone better than the flatter 'look' or 'see'.
- source_word: συλλήμψῃ
  chosen: you will conceive
  alternatives:
  - you will become pregnant
  lexicon: BDAG
  rationale: Future middle of συλλαμβάνω here refers to conception. 'Conceive' is
    the most precise and traditional English equivalent; 'become pregnant' is clearer
    dynamically but less formally tied to the lexical sense.
- source_word: ἐν γαστρὶ
  chosen: in your womb
  alternatives:
  - in the womb
  - in your belly
  lexicon: BDAG
  rationale: The idiom ἐν γαστρί means being pregnant/conceiving in the womb. 'Your
    womb' is idiomatic in English and makes explicit the second-person reference implied
    by the surrounding verbs. 'Belly' would be too physical and less idiomatic in
    this context.
- source_word: τέξῃ
  chosen: bear
  alternatives:
  - give birth to
  lexicon: BDAG
  rationale: τίκτω means to bear or give birth. 'Bear' is concise and natural when
    followed by 'a son,' while preserving the formal connection to the Greek.
- source_word: υἱόν
  chosen: a son
  alternatives:
  - a male child
  lexicon: BDAG
  rationale: υἱός specifically means 'son.' This is gender-specific and should be
    preserved per the gender-accurate translation philosophy.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ
  chosen: you will call his name
  alternatives:
  - you will name him
  lexicon: BDAG
  rationale: The Greek construction is literally 'you will call his name.' This draft
    keeps the Hebraic/biblical naming formula rather than smoothing fully to 'name
    him,' since the expression is clear in English and preserves source texture.
- source_word: Ἰησοῦν
  chosen: Jesus
  alternatives:
  - Joshua
  lexicon: BDAG
  rationale: As a personal name, it is transliterated according to standard English
    convention, in keeping with the translation philosophy to transliterate names.
    'Joshua' reflects the Hebrew equivalent but is not the conventional NT English
    form.
