id: LUK.1.11
reference: Luke 1:11
source:
  edition: SBLGNT
  text: ὤφθη δὲ αὐτῷ ἄγγελος κυρίου ἑστὼς ἐκ δεξιῶν τοῦ θυσιαστηρίου τοῦ θυμιάματος.
translation:
  text: Then an angel of the Lord appeared to him, standing at the right side of the
    altar of incense.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: Aorist passive of ὁράω commonly functions intransitively as 'appeared'
    in narrative contexts. 'Appeared' is idiomatic modern English and preserves the
    event of sudden visible manifestation better than the wooden 'was seen.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' communicates the sequential
    development naturally in English without overstating contrast.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The dative with ὤφθη is regularly rendered 'appeared to him.' This keeps
    the personal recipient of the appearance explicit.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this temple-vision context, the referent is clearly a heavenly being,
    so 'angel' is the appropriate contextual rendering rather than the more general
    'messenger.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, the genitive construction
    ἄγγελος κυρίου is rendered 'angel of the Lord.' The article is natural in English
    for this established biblical expression.
- source_word: ἑστὼς
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι describes the angel's posture/location
    at the moment of appearing. 'Standing' is the most natural participial rendering
    in English.
- source_word: ἐκ δεξιῶν
  chosen: at the right side
  alternatives:
  - on the right side
  - to the right
  lexicon: BDAG
  rationale: The idiom ἐκ δεξιῶν indicates position at/on the right side. 'At the
    right side' is clear and idiomatic while preserving the locative sense.
- source_word: θυσιαστηρίου
  chosen: altar
  lexicon: BDAG
  rationale: Standard rendering for θυσιαστήριον. The following genitive specifies
    which altar is meant.
- source_word: τοῦ θυμιάματος
  chosen: of incense
  alternatives:
  - for incense
  lexicon: BDAG
  rationale: The genitive identifies the altar as the incense altar. 'Altar of incense'
    is the conventional and accurate English expression.
