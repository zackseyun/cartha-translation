theological_decisions:
- issue: Rendering κύριος in the phrase ἄγγελος κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project default for κύριος is 'Lord.' In this genitival phrase, English
    idiom strongly favors 'an angel of the Lord.' This does not add doctrinal content
    but preserves the familiar biblical title construction.
