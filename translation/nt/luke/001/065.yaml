theological_decisions:
- issue: Nuance of φόβος in response to divine activity
  chosen_reading: Rendered as 'fear' without expanding to 'awe' in the main text.
  alternative_readings:
  - awe
  - reverent fear
  rationale: The verse reports a common biblical reaction to perceived divine action.
    Translating simply as 'fear' preserves the lexical form and leaves the theological
    texture intact without interpretive expansion. The context allows readers to perceive
    awe as part of that fear.
  doctrine_reference: Preserve theological tension rather than resolve it.
