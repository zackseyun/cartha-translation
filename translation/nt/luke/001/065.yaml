id: LUK.1.65
reference: Luke 1:65
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐπὶ πάντας φόβος τοὺς περιοικοῦντας αὐτούς, καὶ ἐν ὅλῃ τῇ ὀρεινῇ
    τῆς Ἰουδαίας διελαλεῖτο πάντα τὰ ῥήματα ταῦτα,
translation:
  text: And fear came upon all those living around them, and throughout all the hill
    country of Judea all these things were being talked about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these words' or 'all these matters.' The Greek term can refer either
      to spoken words or to the events being spoken about.
    reason: lexical_alternative
  - marker: b
    text: '''Fear'' here may include the sense of awe in response to God''s evident
      activity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - arose
  - fell
  lexicon: BDAG
  rationale: In the idiom ἐγένετο ἐπὶ ... φόβος, English naturally expresses the onset
    of fear as 'fear came upon.' This preserves the eventive force without woodenly
    rendering 'it happened.'
- source_word: ἐπὶ πάντας
  chosen: upon all
  alternatives:
  - on everyone
  - over all
  lexicon: BDAG
  rationale: With φόβος, ἐπί plus accusative conveys movement or extension onto persons.
    'Upon all' keeps the biblical idiom and matches the Greek construction closely.
- source_word: φόβος
  chosen: fear
  alternatives:
  - awe
  - reverent fear
  lexicon: BDAG
  rationale: φόβος can denote fear or awe. Here the immediate context is astonishment
    at divine activity surrounding Yohanan's birth, so 'fear' is the most direct rendering
    while still allowing the sense of awe to be inferred.
- source_word: τοὺς περιοικοῦντας αὐτούς
  chosen: those living around them
  alternatives:
  - their neighbors
  - those dwelling nearby them
  lexicon: BDAG
  rationale: περιοικέω means to live around or nearby. 'Those living around them'
    is transparent to the Greek and avoids over-compressing the phrase into 'neighbors,'
    though that is a plausible idiomatic alternative.
- source_word: ἐν ὅλῃ τῇ ὀρεινῇ τῆς Ἰουδαίας
  chosen: throughout all the hill country of Judea
  alternatives:
  - in all the mountainous region of Judea
  - throughout the Judean hill country
  lexicon: BDAG
  rationale: ἡ ὀρεινή refers to the hill country/highland region. 'Hill country of
    Judea' is natural English and reflects the geographic sense better than a more
    literal but awkward 'mountainous region.' 'Throughout' brings out the distributive
    force of ἐν ὅλῃ in context.
- source_word: διελαλεῖτο
  chosen: were being talked about
  alternatives:
  - were being discussed
  - was spread abroad
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing circulation in speech. 'Were
    being talked about' captures the iterative/public-discussion sense in accessible
    English better than the archaic 'was noised abroad' or the less specific 'was
    spread abroad.'
- source_word: πάντα τὰ ῥήματα ταῦτα
  chosen: all these things
  alternatives:
  - all these words
  - all these matters
  lexicon: BDAG
  rationale: ῥήματα can mean spoken words, sayings, or matters/events. In this narrative
    summary, the reference is to the reported happenings and sayings surrounding the
    birth account, so 'all these things' best fits idiomatic English while preserving
    the breadth of the Greek.
