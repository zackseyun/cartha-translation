theological_decisions:
- issue: Meaning of πνεύματι in John's development
  chosen_reading: Rendered generally as 'in spirit' rather than specifically as a
    reference to the Holy Spirit.
  alternative_readings:
  - in the Spirit
  - spiritually
  rationale: The text lacks the article and does not explicitly identify the Holy
    Spirit here. The translation preserves the broader sense of inner/spiritual strengthening
    without narrowing the referent beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
