id: LUK.1.80
reference: Luke 1:80
source:
  edition: SBLGNT
  text: Τὸ δὲ παιδίον ηὔξανε καὶ ἐκραταιοῦτο πνεύματι, καὶ ἦν ἐν ταῖς ἐρήμοις ἕως
    ἡμέρας ἀναδείξεως αὐτοῦ πρὸς τὸν Ἰσραήλ.
translation:
  text: And the child kept growing and becoming strong in spirit, and he was in the
    wilderness regions until the day of his public appearance to Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit.' The Greek can be understood more generally as inner
      or spiritual strength, or more specifically as strength in relation to the Holy
      Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'in the wilderness.' Greek has the plural, literally 'in the wilderness
      regions' or 'in the desolate places.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until the day of his manifestation before Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίον
  chosen: the child
  alternatives:
  - the boy
  lexicon: BDAG
  rationale: Refers to John in his youth without specifying a later age stage strongly
    enough to require 'boy.' 'The child' is natural and sufficiently broad.
- source_word: ηὔξανε
  chosen: kept growing
  alternatives:
  - grew
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing development; 'kept growing' preserves
    the progressive sense better than a simple past.
- source_word: ἐκραταιοῦτο
  chosen: becoming strong
  alternatives:
  - grew strong
  - was strengthened
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing process. 'Becoming
    strong' pairs well with the previous imperfect and avoids over-specifying whether
    the force is passive ('was strengthened') or intransitive ('grew strong').
- source_word: πνεύματι
  chosen: in spirit
  alternatives:
  - in the spirit
  - spiritually
  lexicon: BDAG
  rationale: Anarthrous dative is best rendered 'in spirit,' expressing the sphere
    or respect in which he became strong. 'Spiritually' is interpretive; 'in the spirit'
    could suggest the Holy Spirit more specifically than the Greek requires.
- source_word: ἐν ταῖς ἐρήμοις
  chosen: in the wilderness regions
  alternatives:
  - in the wilderness
  - in the deserts
  lexicon: BDAG
  rationale: The plural ἐρήμοις is retained by 'wilderness regions,' which sounds
    natural in English while preserving the plural nuance better than the traditional
    singular 'wilderness.' 'Deserts' is possible but too geographically narrow for
    the broader sense of desolate places.
- source_word: ἀναδείξεως
  chosen: public appearance
  alternatives:
  - manifestation
  - presentation
  - appearing
  lexicon: BDAG
  rationale: The noun denotes a showing forth or public emergence. 'Public appearance'
    communicates this clearly in modern English without importing later ecclesiastical
    jargon. 'Manifestation' is possible but less natural.
- source_word: πρὸς τὸν Ἰσραήλ
  chosen: to Israel
  alternatives:
  - before Israel
  - for Israel
  lexicon: BDAG
  rationale: With ἀνάδειξις, πρός here indicates orientation toward the people of
    Israel as the audience/recipient of his public emergence. 'To Israel' is concise
    and natural.
