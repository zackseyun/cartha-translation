id: LUK.1.6
reference: Luke 1:6
source:
  edition: SBLGNT
  text: ἦσαν δὲ δίκαιοι ἀμφότεροι ⸀ἐναντίον τοῦ θεοῦ, πορευόμενοι ἐν πάσαις ταῖς ἐντολαῖς
    καὶ δικαιώμασιν τοῦ κυρίου ἄμεμπτοι.
translation:
  text: And both of them were righteous before God, walking blamelessly in all the
    commandments and ordinances of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the sight of God."
    reason: lexical_alternative
  - marker: b
    text: Or "walking blameless in all the commandments and ordinances of the Lord."
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: '"Righteous" best preserves the moral and covenantal sense of δίκαιοι
    in biblical usage without reducing it to merely legal fairness ("just") or general
    integrity ("upright"). It fits Luke''s characterization of Zechariah and Elizabeth
    as genuinely faithful before God.'
- source_word: ἀμφότεροι
  chosen: both of them
  alternatives:
  - both
  lexicon: BDAG
  rationale: The phrase explicitly marks both individuals together. "Both of them"
    is slightly fuller and natural in English, preserving the emphasis that the description
    applies equally to Zechariah and Elizabeth.
- source_word: ἐναντίον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: '"Before God" is concise and idiomatic, preserving the relational and
    evaluative sense: their righteousness is measured in God''s sight, not merely
    by human standards.'
- source_word: πορευόμενοι
  chosen: walking
  alternatives:
  - living
  - conducting themselves
  lexicon: BDAG
  rationale: Although literally "going/walking," in this ethical context it denotes
    manner of life. "Walking" preserves the biblical metaphor and remains clear in
    modern English.
- source_word: ἐν πάσαις ταῖς ἐντολαῖς
  chosen: in all the commandments
  alternatives:
  - according to all the commandments
  - in all the commands
  lexicon: BDAG
  rationale: The dative with ἐν after πορευόμενοι expresses conduct within the sphere
    of obedience. "In all the commandments" is a fairly literal rendering that remains
    intelligible and preserves the comprehensive scope marked by πάσαις.
- source_word: δικαιώμασιν
  chosen: ordinances
  alternatives:
  - requirements
  - righteous decrees
  - regulations
  lexicon: BDAG
  rationale: δικαιώματα here likely refers to prescribed statutes or ordinances alongside
    ἐντολαί. "Ordinances" preserves the distinction between commandments and enacted
    requirements better than the broader "requirements" or the more interpretive "righteous
    decrees."
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: Following the project's default rendering of κύριος as "Lord." In this
    context it refers to the God of Israel as the covenant Lord, and "of the Lord"
    is the natural English genitive rendering.
- source_word: ἄμεμπτοι
  chosen: blamelessly
  alternatives:
  - blameless
  - without blame
  lexicon: BDAG
  rationale: 'Syntactically ἄμεμπτοι is adjectival and could be rendered "blameless,"
    but in English placing it adverbially with "walking" yields a more natural sentence:
    they were walking blamelessly. This does not imply sinless perfection, but irreproachable
    conduct in covenant faithfulness.'
- source_word: ἦσαν δὲ
  chosen: And ... were
  alternatives:
  - Now ... were
  - And ... was
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. "And" is natural
    English narrative linkage and avoids overemphasizing contrast. The plural verb
    is reflected in "were."
