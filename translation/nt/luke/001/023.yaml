id: LUK.1.23
reference: Luke 1:23
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ὡς ἐπλήσθησαν αἱ ἡμέραι τῆς λειτουργίας αὐτοῦ, ἀπῆλθεν εἰς τὸν
    οἶκον αὐτοῦ.
translation:
  text: And it happened that when the days of his service were completed, he went
    to his home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his house.' The Greek can refer to the house itself or, more broadly,
      his home/household.
    reason: lexical_alternative
  - marker: b
    text: '''Service'' refers to Zechariah''s appointed temple duty as a priest.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it was
  lexicon: BDAG
  rationale: A common Lukan narrative formula. 'It happened' preserves the discourse
    function without archaic English like 'it came to pass.'
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - after
  lexicon: BDAG
  rationale: Here ὡς introduces a temporal clause. 'When' is the most natural English
    equivalent in this context.
- source_word: ἐπλήσθησαν
  chosen: were completed
  alternatives:
  - were fulfilled
  - were finished
  lexicon: BDAG
  rationale: The passive of πίμπλημι here refers to the allotted days reaching their
    full number. 'Were completed' is clear modern English and fits the temporal sense.
- source_word: λειτουργίας
  chosen: service
  alternatives:
  - ministry
  - priestly service
  - public service
  lexicon: BDAG
  rationale: In context this refers specifically to Zechariah's temple duty. 'Service'
    is concise and accurate; 'priestly service' is interpretively fuller but somewhat
    redundant given the immediate context of Luke 1. The cultic nuance is preserved
    by context.
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: A straightforward aorist of movement. 'Went' is idiomatic English; 'departed'
    is more formal than needed.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  chosen: to his home
  alternatives:
  - to his house
  - into his house
  lexicon: BDAG
  rationale: οἶκος can mean either the physical house or household/home. In this narrative,
    'to his home' communicates the destination naturally in English without implying
    only the building.
