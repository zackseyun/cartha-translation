theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The project default for κύριος is 'Lord.' In this context the title carries
    biblical-theological weight and likely echoes scriptural praise language directed
    to God; 'Master' is possible lexically but too narrow and less fitting for the
    hymn-like register.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Anthropological expression in ἡ ψυχή μου
  chosen_reading: My soul
  alternative_readings:
  - I
  - my inner being
  rationale: The translation preserves the text's theological-poetic diction rather
    than resolving ψυχή into a modern psychological or purely idiomatic equivalent.
    This maintains the biblical register and avoids importing a reductionistic anthropology.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
