id: LUK.1.46
reference: Luke 1:46
source:
  edition: SBLGNT
  text: Καὶ εἶπεν Μαριάμ· Μεγαλύνει ἡ ψυχή μου τὸν κύριον,
translation:
  text: And Mary said, “My soul magnifies the Lord,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “My soul proclaims the greatness of the Lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple coordination to reflect the Greek
    narrative flow without adding temporal nuance.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in narrative introduction.
    'Spoke' is possible but less idiomatic here.
- source_word: Μαριάμ
  chosen: Mary
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: Μεγαλύνει
  chosen: magnifies
  alternatives:
  - exalts
  - glorifies
  - proclaims the greatness of
  lexicon: BDAG
  rationale: Present tense is preserved with 'magnifies.' This keeps the vivid, poetic
    force of μεγαλύνω and reflects the traditional and lexical sense of making great/praising
    as great. 'Exalts' and 'glorifies' are possible, but 'magnifies' best matches
    the metaphor and the established biblical idiom without becoming archaic in this
    context.
- source_word: ἡ ψυχή μου
  chosen: My soul
  alternatives:
  - I
  - my inner being
  lexicon: BDAG
  rationale: A formally closer rendering preserves the Semitic-poetic expression and
    avoids flattening the anthropological language into a mere pronoun. 'My inner
    being' is interpretive; 'I' is too reductive.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; default rendering
    is 'Lord.' Here it functions as a reverential divine title and should be translated,
    not paraphrased.
