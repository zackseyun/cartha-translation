theological_decisions:
- issue: Aspect/tense in the Magnificat's aorists
  chosen_reading: Render the Greek aorists as English present perfects ('has brought
    down ... and exalted')
  alternative_readings:
  - simple past ('brought down ... and exalted')
  - gnomic present-like rendering in poetic paraphrase
  rationale: In Mary's song, the aorists are commonly understood as describing God's
    decisive acts, whether viewed as prophetic, summary, or timeless in praise. The
    present perfect in English preserves the sense of completed divine action with
    continuing significance, without forcing a narrower interpretive claim about exact
    temporal reference.
  doctrine_reference: Preserve theological tension rather than resolve it.
