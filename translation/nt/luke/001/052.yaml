id: LUK.1.52
reference: Luke 1:52
source:
  edition: SBLGNT
  text: καθεῖλεν δυνάστας ἀπὸ θρόνων καὶ ὕψωσεν ταπεινούς,
translation:
  text: He has brought down rulers from thrones and exalted the humble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty' for 'rulers.' The Greek term can refer more broadly to powerful
      people, though 'from thrones' favors the sense of rulers.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lowly' for 'the humble.' The Greek can denote those who are humble
      and/or those of low social status.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεῖλεν
  chosen: has brought down
  alternatives:
  - brought down
  - cast down
  - pulled down
  - deposed
  lexicon: BDAG
  rationale: Aorist indicative in the Magnificat functions within a series describing
    God's decisive action; English present perfect captures the vivid, completed force
    in natural English. 'Brought down' preserves the sense of removal from high status
    without over-specifying violent overthrow. 'Cast down' is traditional but slightly
    archaic; 'deposed' is possible but narrower and more political than the Greek
    requires.
- source_word: δυνάστας
  chosen: rulers
  alternatives:
  - the mighty
  - princes
  - powerful ones
  lexicon: BDAG
  rationale: The noun denotes powerful persons, rulers, or potentates. In this context,
    paired with 'from thrones,' the political/social sense is foregrounded, so 'rulers'
    best reflects the referent. 'The mighty' is broader and more traditional, but
    less explicit about the throne imagery.
- source_word: ἀπὸ θρόνων
  chosen: from thrones
  alternatives:
  - from their thrones
  - from seats of power
  lexicon: BDAG
  rationale: The prepositional phrase is rendered straightforwardly. 'From thrones'
    preserves the concrete royal image. Adding 'their' is interpretive, though natural
    in English; it is omitted to stay closer to the Greek. 'Seats of power' explains
    the metaphor but loses the vivid biblical imagery.
- source_word: ὕψωσεν
  chosen: exalted
  alternatives:
  - lifted up
  - raised high
  lexicon: BDAG
  rationale: The verb means to raise or exalt. 'Exalted' matches the reversal theme
    and preserves both social and theological resonance. 'Lifted up' is also good,
    but 'exalted' better balances readability and formal correspondence.
- source_word: ταπεινούς
  chosen: the humble
  alternatives:
  - the lowly
  - humble people
  - those of low status
  lexicon: BDAG
  rationale: The adjective can denote humility or low social position; here both senses
    likely overlap in the Magnificat's reversal motif. 'The humble' is concise and
    preserves that productive ambiguity. 'The lowly' is a strong alternative and traditional,
    but can sound slightly literary in contemporary English.
