theological_decisions:
- issue: Nature of Zechariah's judgment
  chosen_reading: The verse presents a divinely imposed inability to speak until the
    promise is fulfilled.
  alternative_readings:
  - The silence could be read as merely voluntary quietness
  rationale: The combination of 'you will be silent' with 'unable to speak' indicates
    an enforced condition rather than a simple command to remain quiet. The translation
    preserves both elements without overexplaining.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
