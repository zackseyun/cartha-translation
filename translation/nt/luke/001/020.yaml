id: LUK.1.20
reference: Luke 1:20
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἔσῃ σιωπῶν καὶ μὴ δυνάμενος λαλῆσαι ἄχρι ἧς ἡμέρας γένηται ταῦτα,
    ἀνθ’ ὧν οὐκ ἐπίστευσας τοῖς λόγοις μου, οἵτινες πληρωθήσονται εἰς τὸν καιρὸν αὐτῶν.
translation:
  text: And behold, you will be silent and unable to speak until the day these things
    happen, because you did not believe my words, which will be fulfilled in their
    appointed time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be mute.' The Greek combines 'silent' with 'unable to speak,'
      emphasizing enforced speechlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'at their proper time.' The phrase refers to the fitting or appointed
      time for these words to be fulfilled.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force and solemnity of the angelic announcement.
    'Behold' is still readable here and better preserves the abrupt attention signal
    than a flatter 'look' or omission.
- source_word: ἔσῃ σιωπῶν
  chosen: you will be silent
  alternatives:
  - you will be mute
  - you will keep silent
  lexicon: BDAG
  rationale: The periphrastic future conveys a resulting state. 'Silent' is natural
    English and pairs well with the following clause about inability to speak. 'Mute'
    is possible but can sound more clinical or absolute than the context requires.
- source_word: μὴ δυνάμενος λαλῆσαι
  chosen: unable to speak
  alternatives:
  - not able to speak
  lexicon: BDAG
  rationale: Expresses the participial phrase idiomatically in English while preserving
    the sense of incapacity. It clarifies that the silence is enforced inability,
    not merely voluntary quietness.
- source_word: ἄχρι ἧς ἡμέρας
  chosen: until the day
  alternatives:
  - until that day when
  - up to the day
  lexicon: BDAG
  rationale: A straightforward temporal rendering that preserves the construction
    without unnecessary expansion.
- source_word: γένηται ταῦτα
  chosen: these things happen
  alternatives:
  - these things come to pass
  - these things take place
  lexicon: BDAG
  rationale: '''Happen'' is clear modern English for γίνομαι here. ''Come to pass''
    is traditional but archaic; ''take place'' is also viable but slightly more formal.'
- source_word: ἀνθ’ ὧν
  chosen: because
  alternatives:
  - for this reason that
  - in return for which
  lexicon: BDAG
  rationale: In this context the phrase introduces the reason for Zechariah's imposed
    silence. 'Because' communicates the causal force naturally in English.
- source_word: οὐκ ἐπίστευσας
  chosen: you did not believe
  alternatives:
  - you did not trust
  - you did not have faith in
  lexicon: BDAG
  rationale: πιστεύω with the dative of words here most naturally means believing
    what was said. 'Believe' is the most direct and contextually precise rendering.
- source_word: τοῖς λόγοις μου
  chosen: my words
  alternatives:
  - what I said
  - my message
  lexicon: BDAG
  rationale: '''My words'' preserves the lexical form λόγοι while remaining natural.
    It also keeps the focus on the angel''s spoken announcement.'
- source_word: οἵτινες
  chosen: which
  alternatives:
  - and they
  - words that
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause referring back to 'my words.'
    'Which' is concise and natural in English.
- source_word: πληρωθήσονται
  chosen: will be fulfilled
  alternatives:
  - will come true
  - will be accomplished
  lexicon: BDAG
  rationale: '''Will be fulfilled'' preserves the passive and carries the biblical
    sense of divine realization. ''Come true'' is understandable but lighter in tone;
    ''accomplished'' is possible but less idiomatic with ''words.'''
- source_word: εἰς τὸν καιρὸν αὐτῶν
  chosen: in their appointed time
  alternatives:
  - at their proper time
  - in their season
  lexicon: BDAG
  rationale: καιρός denotes a fitting or appointed time, not merely chronological
    time. 'Appointed time' preserves the sense of divine timing implicit in the context.
