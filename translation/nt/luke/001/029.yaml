id: LUK.1.29
reference: Luke 1:29
source:
  edition: SBLGNT
  text: ἡ δὲ ⸂ἐπὶ τῷ λόγῳ διεταράχθη⸃ καὶ διελογίζετο ποταπὸς εἴη ὁ ἀσπασμὸς οὗτος.
translation:
  text: But she was greatly troubled at the message, and kept considering what kind
    of greeting this might be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the word' or 'because of the saying.' The Greek λόγος can mean 'word,'
      'statement,' or 'message.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was pondering' or 'was wondering.' The Greek imperfect suggests ongoing
      reflection.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative development from the angel's preceding
    greeting. 'But' captures the shift to Mary's reaction more clearly than simple
    'and'.
- source_word: ἐπὶ τῷ λόγῳ
  chosen: at the message
  alternatives:
  - at the word
  - because of the saying
  lexicon: BDAG
  rationale: λόγος here refers to the content just spoken by the angel, not merely
    a single lexical 'word.' 'Message' is natural English and fits optimal equivalence
    while preserving the causal sense with ἐπί + dative.
- source_word: διεταράχθη
  chosen: was greatly troubled
  alternatives:
  - was disturbed
  - was deeply troubled
  lexicon: BDAG
  rationale: The verb indicates being thoroughly disturbed or agitated. The prefixed
    form intensifies the reaction, so 'greatly troubled' reflects that force better
    than a flatter 'disturbed'.
- source_word: διελογίζετο
  chosen: kept considering
  alternatives:
  - was pondering
  - was reasoning
  - was wondering
  lexicon: BDAG
  rationale: The imperfect middle portrays ongoing internal deliberation. 'Kept considering'
    preserves the iterative/imperfective sense more explicitly than a simple past.
- source_word: ποταπὸς
  chosen: what kind of
  alternatives:
  - what sort of
  - of what kind
  lexicon: BDAG
  rationale: This interrogative adjective asks about the quality or nature of the
    greeting. 'What kind of' is idiomatic modern English and preserves the sense well.
- source_word: εἴη
  chosen: might be
  alternatives:
  - was
  - could be
  lexicon: BDAG
  rationale: The optative in indirect discourse after a past-tense main verb conveys
    a more tentative or reported sense. 'Might be' reflects that nuance better than
    a flat 'was.'
- source_word: ἀσπασμὸς
  chosen: greeting
  alternatives:
  - salutation
  lexicon: BDAG
  rationale: Refers to the angel's spoken greeting. 'Greeting' is clear modern English;
    'salutation' is accurate but less natural.
- source_word: οὗτος
  chosen: this
  alternatives:
  - such a
  lexicon: BDAG
  rationale: The demonstrative points to the specific greeting just given. 'This'
    is the most direct rendering.
