theological_decisions:
- issue: Nature of Mary's reaction
  chosen_reading: Mary is portrayed as troubled by the angel's message/greeting and
    reflecting on its meaning, without specifying sinful fear, disbelief, or moral
    fault.
  alternative_readings:
  - Mary was troubled by the angel's appearance
  - Mary's reaction implies unbelief
  rationale: The Greek explicitly ties her disturbance to 'the message/greeting' rather
    than directly to the angel's appearance, and the verse presents reflective deliberation
    rather than a theological judgment on her response.
  doctrine_reference: Preserve theological tension rather than resolve it.
