id: LUK.1.72
reference: Luke 1:72
source:
  edition: SBLGNT
  text: ποιῆσαι ἔλεος μετὰ τῶν πατέρων ἡμῶν καὶ μνησθῆναι διαθήκης ἁγίας αὐτοῦ,
translation:
  text: to show mercy to our fathers and to remember his holy covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with our fathers'; the Greek expression means to show mercy in relation
      to Israel's forefathers.
    reason: lexical_alternative
  - marker: b
    text: '''Remember'' in biblical covenant language often implies acting faithfully
      on a prior promise, not merely mental recollection.'
    reason: cultural_note
  - marker: c
    text: '''Our fathers'' refers to Israel''s forefathers or patriarchs; alternatively,
      ''our ancestors.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ποιῆσαι
  chosen: to show
  alternatives:
  - to do
  - to perform
  lexicon: BDAG
  rationale: Although ποιέω is broadly 'do/make,' in the idiom ποιεῖν ἔλεος the natural
    sense is 'show mercy' or 'act mercifully.' English 'do mercy' is not idiomatic,
    so 'show' best conveys the established expression while preserving the infinitival
    purpose sense.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy or compassion. 'Mercy' is the most direct
    and biblically resonant rendering here, especially in covenantal context, without
    importing the fuller OT covenant term 'steadfast love' into the Greek.
- source_word: μετὰ τῶν πατέρων ἡμῶν
  chosen: to our fathers
  alternatives:
  - with our fathers
  - for our fathers
  - to our ancestors
  lexicon: BDAG
  rationale: μετά with the genitive is literally 'with,' but in the idiom 'show mercy
    with/to someone' English idiom favors 'to our fathers.' 'Ancestors' is possible
    for modern clarity, but 'fathers' better preserves the covenantal and patriarchal
    resonance of the Greek and aligns with gender-accurate policy.
- source_word: πατέρων
  chosen: fathers
  alternatives:
  - ancestors
  lexicon: BDAG
  rationale: The term refers to Israel's forefathers/patriarchs. 'Fathers' preserves
    the source's masculine covenantal language and biblical intertextuality better
    than the more generic 'ancestors.'
- source_word: μνησθῆναι
  chosen: to remember
  alternatives:
  - to call to mind
  - to keep in mind
  lexicon: BDAG
  rationale: 'The aorist passive infinitive of μιμνῄσκομαι here functions with God
    as the implied subject in a Semitic-covenantal sense: ''to remember.'' In biblical
    usage, divine remembering often implies faithful action, but the translation should
    not over-interpret that implication in the main text.'
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  - agreement
  lexicon: BDAG
  rationale: In this salvation-historical context, διαθήκη clearly refers to God's
    covenant, not a testament in the later legal sense. 'Covenant' is the standard
    and theologically appropriate rendering.
- source_word: ἁγίας
  chosen: holy
  alternatives:
  - sacred
  lexicon: BDAG
  rationale: ἅγιος here qualifies the covenant as holy, emphasizing its consecrated
    divine character. 'Holy' is the most direct and biblically consistent rendering.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun refers to God in context. 'His' preserves the Greek wording
    and avoids unnecessarily replacing the pronoun with an explicit noun.
