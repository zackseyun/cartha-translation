theological_decisions:
- issue: Divine 'remembering' as covenant action
  chosen_reading: to remember his holy covenant
  alternative_readings:
  - to act in remembrance of his holy covenant
  - to fulfill his holy covenant
  rationale: Biblical language of God 'remembering' often entails acting faithfully
    on prior promises, but the Greek itself says 'remember.' To preserve theological
    tension and avoid interpretive expansion, the main text keeps the literal covenantal
    expression.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Rendering πατέρων ἡμῶν
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek is grammatically masculine and refers to Israel's forefathers.
    Per the gender-accurate policy, the translation preserves 'fathers' rather than
    neutralizing to 'ancestors,' while recognizing the broader referent in a footnote.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral.
