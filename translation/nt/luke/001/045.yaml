theological_decisions:
- issue: Relation of Mary's blessedness to her faith and the promised word
  chosen_reading: Mary is pronounced blessed because she believed that the Lord's
    spoken promise would be fulfilled.
  alternative_readings:
  - Mary is blessed because there is fulfillment for the things spoken to her, with
    less emphasis on belief as the content clause
  rationale: The syntax most naturally links πιστεύσασα with a content clause introduced
    by ὅτι. This preserves Luke's emphasis on faith in God's promise without importing
    later doctrinal claims beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
