id: LUK.1.41
reference: Luke 1:41
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ὡς ἤκουσεν ⸂τὸν ἀσπασμὸν τῆς Μαρίας ἡ Ἐλισάβετ⸃, ἐσκίρτησεν τὸ
    βρέφος ἐν τῇ κοιλίᾳ αὐτῆς, καὶ ἐπλήσθη πνεύματος ἁγίου ἡ Ἐλισάβετ,
translation:
  text: And it happened that, when Elizabeth heard Mary’s greeting, the baby leaped
    in her womb, and Elizabeth was filled with the Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “salutation.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Common Lukan narrative formula. 'It happened' preserves the discourse
    function without archaic English like 'it came to pass.' The following 'that'
    is retained in the full clause structure.
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - just as
  lexicon: BDAG
  rationale: In this temporal construction with aorist verb, 'when' gives the natural
    English sense of immediate temporal sequence.
- source_word: ἀσπασμός
  chosen: greeting
  alternatives:
  - salutation
  lexicon: BDAG
  rationale: Refers to Mary's spoken greeting. 'Greeting' is clear modern English;
    'salutation' is more formal and less natural.
- source_word: Μαρίας
  chosen: Mary’s
  rationale: 'Standard English possessive rendering of the genitive: ''Mary’s greeting.''
    Personal name is transliterated per project philosophy.'
- source_word: ἐσκίρτησεν
  chosen: leaped
  alternatives:
  - jumped
  - stirred
  lexicon: BDAG
  rationale: The verb denotes a sudden lively movement. 'Leaped' preserves the vividness
    better than the weaker 'stirred' and is idiomatic in English biblical narrative.
- source_word: βρέφος
  chosen: baby
  alternatives:
  - child
  - infant
  lexicon: BDAG
  rationale: Refers to the unborn John in Elizabeth's womb. 'Baby' is the most natural
    and precise modern English equivalent here; 'infant' is less idiomatic, and 'child'
    is broader.
- source_word: κοιλία
  chosen: womb
  alternatives:
  - belly
  lexicon: BDAG
  rationale: In this context it specifically denotes the womb. 'Womb' is both accurate
    and appropriately dignified.
- source_word: ἐπλήσθη
  chosen: was filled
  alternatives:
  - was filled up
  lexicon: BDAG
  rationale: Standard passive rendering of the aorist passive. 'Was filled' is idiomatic
    and preserves the divine-action implication without overexplaining it.
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article, English idiom normally uses the
    definite form for the personal divine referent. Capitalization reflects the referent
    as God's Spirit rather than a generic holy spirit.
