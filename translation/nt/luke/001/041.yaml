theological_decisions:
- issue: Referent of πνεύματος ἁγίου
  chosen_reading: the Holy Spirit as the divine Spirit
  alternative_readings:
  - a holy spirit
  rationale: In Luke-Acts this expression regularly refers to the divine Holy Spirit,
    and the narrative context concerns prophetic inspiration. English capitalization
    and the article communicate the personal referent naturally without importing
    extra doctrinal content beyond the text's usage.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Rendering βρέφος for the unborn John
  chosen_reading: baby
  alternative_readings:
  - child
  - infant
  rationale: The term denotes a very young child and here refers to John in utero.
    'Baby' is lexically accurate and natural English, preserving the text's concrete
    reference without adding theological commentary.
  doctrine_reference: Translation philosophy §1, §6
