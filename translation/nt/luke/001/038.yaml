id: LUK.1.38
reference: Luke 1:38
source:
  edition: SBLGNT
  text: εἶπεν δὲ Μαριάμ· Ἰδοὺ ἡ δούλη κυρίου· γένοιτό μοι κατὰ τὸ ῥῆμά σου. καὶ ἀπῆλθεν
    ἀπ’ αὐτῆς ὁ ἄγγελος.
translation:
  text: And Mary said, “Behold, I am the Lord’s servant. May it happen to me according
    to your word.” And the angel departed from her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Lord’s slave.” The Greek δούλη can denote a female slave or servant;
      here the main text uses “servant” because the context emphasizes humble submission
      to God.
    reason: alternative_reading
  - marker: b
    text: Or “Let it be to me according to your word.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: A mild connective; 'And' preserves the narrative flow without adding
    temporal specificity that 'Then' might suggest.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the marked, solemn self-presentation in Mary's response. Though
    somewhat elevated, it remains understandable and preserves the force better than
    the more casual 'Look.'
- source_word: δούλη
  chosen: servant
  alternatives:
  - slave
  lexicon: BDAG
  rationale: The feminine form means a female slave/servant. Although the project
    often prefers 'slave' where bonded status is theologically salient, here Mary's
    humble self-identification before the Lord is foregrounded more than legal bondage.
    'Servant' is natural English while preserving submission; the stronger alternative
    is preserved in a footnote.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project default for the divine title. The
    possessive form is idiomatic English and clearly expresses Mary's relation to
    God.
- source_word: γένοιτό μοι
  chosen: May it happen to me
  alternatives:
  - Let it be to me
  - May it be to me
  lexicon: BDAG
  rationale: The aorist middle optative expresses willing assent or wish. 'May it
    happen to me' communicates the optative force in clear modern English. The more
    traditional 'Let it be to me' is preserved in a footnote as a lexical alternative.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  lexicon: BDAG
  rationale: Standard rendering that preserves the sense of conformity between the
    event and the angel's message.
- source_word: ῥῆμά
  chosen: word
  alternatives:
  - message
  - statement
  lexicon: BDAG
  rationale: ῥῆμα here refers to the specific spoken announcement just given by the
    angel. 'Word' is concise and traditional, while still accurate in context.
- source_word: ἀπῆλθεν ἀπ’ αὐτῆς
  chosen: departed from her
  alternatives:
  - went away from her
  - left her
  lexicon: BDAG
  rationale: A straightforward narrative conclusion. 'Departed' fits the elevated
    tone and avoids the flatness of 'left.'
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In Luke's infancy narrative, ἄγγελος clearly refers to an angelic being,
    not merely a human messenger.
