theological_decisions:
- issue: Rendering Mary's self-designation δούλη
  chosen_reading: the Lord’s servant
  alternative_readings:
  - the Lord’s slave
  rationale: The term can denote a female slave, but in this context the emphasis
    is Mary's humble submission to God's will rather than the social institution of
    slavery. This follows the doctrine's context-dependent handling of δοῦλος/δούλη
    while preserving the stronger bonded nuance in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy points 1 and 5'
- issue: Force of γένοιτό μοι
  chosen_reading: May it happen to me according to your word
  alternative_readings:
  - Let it be to me according to your word
  rationale: The optative expresses consentful wish rather than mere futurity. The
    chosen rendering communicates Mary's willing acceptance in natural English without
    importing later liturgical phrasing into the main text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy points 1 and 6'
