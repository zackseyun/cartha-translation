id: LUK.1.58
reference: Luke 1:58
source:
  edition: SBLGNT
  text: καὶ ἤκουσαν οἱ περίοικοι καὶ οἱ συγγενεῖς αὐτῆς ὅτι ἐμεγάλυνεν κύριος τὸ ἔλεος
    αὐτοῦ μετ’ αὐτῆς, καὶ συνέχαιρον αὐτῇ.
translation:
  text: And her neighbors and relatives heard that the Lord had greatly magnified
    his mercy with her, and they rejoiced with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Lord had shown great mercy to her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περίοικοι
  chosen: neighbors
  alternatives:
  - those living around her
  - people nearby
  lexicon: BDAG
  rationale: Refers to those living in the surrounding area. 'Neighbors' is the most
    natural modern English equivalent and fits the social setting.
- source_word: συγγενεῖς
  chosen: relatives
  alternatives:
  - kinsfolk
  - family members
  lexicon: BDAG
  rationale: Denotes kin or relatives. 'Relatives' is clear modern English; 'kinsfolk'
    is archaic, and 'family members' is slightly more interpretive.
- source_word: ἐμεγάλυνεν
  chosen: had greatly magnified
  alternatives:
  - had shown great
  - had made great
  lexicon: BDAG
  rationale: The verb μεγαλύνω literally means 'make great, magnify.' Here it idiomatically
    expresses that the Lord made his mercy great toward Elizabeth. I retained 'magnified'
    to preserve the lexical connection and rhetorical force, while adding 'greatly'
    to reflect the intensifying sense in context.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: The noun is anarthrous in Greek but functions as a definite divine title
    in context. Per doctrine defaults, κύριος is rendered 'Lord.' English idiom here
    naturally takes 'the Lord.'
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - kindness
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy or compassionate kindness. 'Mercy' is the
    standard and most theologically resonant rendering, especially in Luke's infancy
    narrative.
- source_word: μετ’ αὐτῆς
  chosen: with her
  alternatives:
  - toward her
  - for her
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with.' In this idiom, 'magnified
    his mercy with her' is somewhat wooden but still intelligible and preserves the
    Greek construction better than the more interpretive 'toward her' or 'for her.'
- source_word: συνέχαιρον αὐτῇ
  chosen: they rejoiced with her
  alternatives:
  - they shared her joy
  - they congratulated her
  lexicon: BDAG
  rationale: συγχαίρω means to rejoice together with someone. 'They rejoiced with
    her' is the most direct and transparent rendering; 'shared her joy' is smoother
    but more dynamic, and 'congratulated her' is too narrow.
