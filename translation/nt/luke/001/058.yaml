theological_decisions:
- issue: Rendering the idiom ἐμεγάλυνεν...τὸ ἔλεος αὐτοῦ μετ’ αὐτῆς
  chosen_reading: the Lord had greatly magnified his mercy with her
  alternative_readings:
  - the Lord had shown great mercy to her
  - the Lord had made his mercy great toward her
  rationale: The Greek idiom can be expressed more idiomatically in English as 'shown
    great mercy to her,' but the chosen wording preserves the lexical force of μεγαλύνω
    ('magnify/make great') and the prepositional phrase μετά ('with') more transparently.
    This keeps the wording auditable and maintains intertextual resonance with Luke's
    use of magnifying language in the surrounding context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
