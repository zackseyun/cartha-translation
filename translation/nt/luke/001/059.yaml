id: LUK.1.59
reference: Luke 1:59
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῇ ⸂ἡμέρᾳ τῇ ὀγδόῃ⸃ ἦλθον περιτεμεῖν τὸ παιδίον, καὶ ἐκάλουν
    αὐτὸ ἐπὶ τῷ ὀνόματι τοῦ πατρὸς αὐτοῦ Ζαχαρίαν.
translation:
  text: And it happened that on the eighth day they came to circumcise the child,
    and they were calling him Zechariah, after the name of his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they called him Zechariah.' The Greek imperfect ('they were calling')
      may suggest an attempted or ongoing naming, which fits the correction in the
      following verse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they were calling him by/after the name of his father, Zechariah,'
      referring to the custom of naming a child after a family member.
    reason: cultural_note
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it was
  lexicon: BDAG
  rationale: Common Lukan narrative formula. 'It happened' preserves the event-introducing
    force without archaic English like 'it came to pass.'
- source_word: ἐν τῇ ἡμέρᾳ τῇ ὀγδόῃ
  chosen: on the eighth day
  alternatives:
  - in the eighth day
  lexicon: BDAG
  rationale: Idiomatic temporal dative with ἐν is best rendered 'on the eighth day'
    in natural English while preserving the specific timing.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - people came
  - they arrived
  lexicon: BDAG
  rationale: The Greek leaves the subject implicit and plural; 'they came' preserves
    that indefiniteness without adding an explicit group not named in the text.
- source_word: περιτεμεῖν
  chosen: to circumcise
  alternatives:
  - for circumcision
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To circumcise' is the most direct
    and clear rendering.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the baby
  lexicon: BDAG
  rationale: '''The child'' is a straightforward rendering of παιδίον and fits both
    the immediate context and readable modern English. ''Baby'' is possible contextually
    but slightly more interpretive.'
- source_word: ἐκάλουν
  chosen: they were calling
  alternatives:
  - they called
  - they began to call
  lexicon: BDAG
  rationale: The imperfect suggests an in-progress or attempted action rather than
    a simple completed naming. 'They were calling' preserves that aspect and fits
    the narrative tension resolved in the next verse.
- source_word: ἐπὶ τῷ ὀνόματι
  chosen: after the name of
  alternatives:
  - by the name of
  - according to the name of
  - with the name of
  lexicon: BDAG
  rationale: This idiom indicates naming someone after another person. 'After the
    name of' is slightly more explicit than simply 'by the name of' and clarifies
    the familial naming custom.
- source_word: τοῦ πατρὸς αὐτοῦ
  chosen: his father
  alternatives:
  - the father of him
  lexicon: BDAG
  rationale: Standard possessive rendering in natural English.
- source_word: Ζαχαρίαν
  chosen: Zechariah
  alternatives:
  - Zacharias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions. 'Zechariah'
    is the familiar English form aligned with the Hebrew-derived name, while 'Zacharias'
    reflects a more Greek/Latinized tradition.
