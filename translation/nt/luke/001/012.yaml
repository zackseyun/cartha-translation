id: LUK.1.12
reference: Luke 1:12
source:
  edition: SBLGNT
  text: καὶ ἐταράχθη Ζαχαρίας ἰδών, καὶ φόβος ἐπέπεσεν ἐπ’ αὐτόν.
translation:
  text: And Zechariah was troubled when he saw him, and fear fell upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeing him'; the Greek participle ἰδών may be rendered more literally,
      but 'when he saw him' brings out its temporal force in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  chosen: was troubled
  alternatives:
  - was disturbed
  - was shaken
  - was alarmed
  lexicon: BDAG
  rationale: Aorist passive of ταράσσω here denotes being inwardly disturbed or agitated.
    'Was troubled' is natural English and preserves the emotional disturbance without
    overstating it as terror, which is then expressed explicitly by φόβος.
- source_word: Ζαχαρίας
  chosen: Zechariah
  alternatives:
  - Zacharias
  rationale: Standard English transliteration of the personal name, following the
    project's practice of transliterating names rather than translating them.
- source_word: ἰδών
  chosen: when he saw him
  alternatives:
  - seeing him
  - when he saw
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered temporally in English
    here. The object 'him' is implied by context (the angel in the previous verse)
    and makes the English idiomatic and clear.
- source_word: φόβος
  chosen: fear
  alternatives:
  - terror
  - dread
  lexicon: BDAG
  rationale: φόβος broadly denotes fear. 'Fear' is the most direct and least interpretively
    loaded rendering; stronger options like 'terror' would intensify the text beyond
    what the noun itself requires.
- source_word: ἐπέπεσεν ἐπ’ αὐτόν
  chosen: fell upon him
  alternatives:
  - came over him
  - fell on him
  lexicon: BDAG
  rationale: The idiom ἐπιπίπτω with ἐπί literally means 'fall upon.' Retaining this
    imagery is both faithful and readable, while also matching common biblical English
    usage.
