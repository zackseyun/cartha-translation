id: LUK.1.19
reference: Luke 1:19
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ ἄγγελος εἶπεν αὐτῷ· Ἐγώ εἰμι Γαβριὴλ ὁ παρεστηκὼς ἐνώπιον
    τοῦ θεοῦ, καὶ ἀπεστάλην λαλῆσαι πρὸς σὲ καὶ εὐαγγελίσασθαί σοι ταῦτα·
translation:
  text: And the angel answered him, “I am Gabriel, who stands in the presence of God,
    and I was sent to speak to you and to bring you this good news.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “these things.” The Greek says “to proclaim good news to you these things,”
      with “these things” referring to the message Gabriel has just announced.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle introducing direct speech; idiomatic English prefers
    finite 'answered' rather than a more wooden 'answering.'
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this narrative context the referent is a heavenly being, confirmed
    by the self-identification as Gabriel, so 'angel' is the natural and specific
    rendering.
- source_word: Ἐγώ εἰμι Γαβριὴλ
  chosen: I am Gabriel
  lexicon: BDAG
  rationale: Personal name is transliterated per translation philosophy; the explicit
    pronoun adds emphasis, which English preserves adequately with the simple clause.
- source_word: ὁ παρεστηκὼς
  chosen: who stands
  alternatives:
  - who has stood
  - the one standing
  lexicon: BDAG
  rationale: Perfect active participle of παρίστημι conveys a standing/present position
    with ongoing force. English present 'who stands' best communicates Gabriel's continuing
    status before God without awkwardness.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: in the presence of God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: Both are possible, but 'in the presence of God' clearly conveys proximity
    and courtly setting, fitting the angelic self-description.
- source_word: ἀπεστάλην
  chosen: I was sent
  lexicon: BDAG
  rationale: Aorist passive; straightforward passive rendering preserves the sense
    of divine commissioning.
- source_word: λαλῆσαι πρὸς σὲ
  chosen: to speak to you
  alternatives:
  - to tell you
  - to talk to you
  lexicon: BDAG
  rationale: Infinitive of purpose after 'was sent'; 'speak to you' is a natural and
    sufficiently formal equivalent.
- source_word: εὐαγγελίσασθαί σοι
  chosen: to bring you this good news
  alternatives:
  - to announce this good news to you
  - to proclaim good news to you
  lexicon: BDAG
  rationale: The verb εὐαγγελίζω means to announce or bring good news. Rendering it
    with 'good news' preserves the lexical connection without importing later technical
    jargon. 'Bring you this good news' is idiomatic with the dative σοι.
- source_word: ταῦτα
  chosen: this good news
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Literally 'these things,' but in immediate connection with εὐαγγελίζασθαί
    the demonstrative points to the announced message as good news. Rendering the
    phrase together produces natural English while preserving the sense of the Greek.
