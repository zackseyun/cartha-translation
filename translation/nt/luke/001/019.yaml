theological_decisions:
- issue: Rendering εὐαγγελίζω in an angelic announcement context
  chosen_reading: good news
  alternative_readings:
  - gospel
  - announce glad tidings
  rationale: The verb denotes proclaiming good news. 'Gospel' could sound overly technical
    or anachronistically fixed as a later Christian term in this immediate narrative
    setting. 'Good news' preserves the lexical meaning and theological resonance without
    overloading the verse.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; original-language primacy over translation tradition.'
