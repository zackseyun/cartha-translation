theological_decisions:
- issue: Rendering the covenant expression τῶν υἱῶν Ἰσραὴλ
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - Israelites
  rationale: The Greek is explicitly masculine plural and evokes established biblical
    covenant language. Per the translation philosophy, gender-accurate rendering is
    preferred over flattening to a neutral collective, while alternatives remain viable
    in more idiomatic English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referent of κύριον τὸν θεὸν αὐτῶν
  chosen_reading: the Lord their God
  rationale: The phrase identifies the God of Israel, not merely a human master. Rendering
    κύριος as 'Lord' aligns with the project's contested-terms guidance and preserves
    the covenantal/theological force of the expression.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος'
