id: LUK.1.16
reference: Luke 1:16
source:
  edition: SBLGNT
  text: καὶ πολλοὺς τῶν υἱῶν Ἰσραὴλ ἐπιστρέψει ἐπὶ κύριον τὸν θεὸν αὐτῶν·
translation:
  text: And he will turn many of the sons of Israel to the Lord their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the children of Israel” or “of the Israelites.” The Greek reads “sons
      of Israel,” preserving the traditional covenant expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and
  lexicon: BDAG
  rationale: Standard connective; retained at the head of the clause to preserve the
    narrative flow from the preceding verse.
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  - a great many
  lexicon: BDAG
  rationale: The adjective functions substantivally with the following genitive phrase;
    'many' is the most natural concise English rendering.
- source_word: τῶν υἱῶν Ἰσραὴλ
  chosen: of the sons of Israel
  alternatives:
  - of the children of Israel
  - of the Israelites
  lexicon: BDAG
  rationale: Rendered gender-accurately per project philosophy. Although idiomatic
    English could use 'Israelites,' the Greek explicitly says 'sons of Israel,' a
    common biblical expression that preserves the scriptural register and intertextual
    resonance.
- source_word: ἐπιστρέψει
  chosen: will turn
  alternatives:
  - will bring back
  - will turn back
  - will convert
  lexicon: BDAG
  rationale: Future active indicative, with John as the agent causing many to return.
    'Will turn' preserves the transitive force better than an intransitive 'will return,'
    and avoids the more interpretive 'convert'.
- source_word: ἐπὶ
  chosen: to
  alternatives:
  - toward
  - back to
  lexicon: BDAG
  rationale: With the verb ἐπιστρέφω and accusative, the sense is movement or redirection
    toward a person. 'To' is idiomatic and clear in English.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In this
    context it refers to Israel's God, carrying covenantal weight rather than the
    lesser sense 'master'.
- source_word: τὸν θεὸν αὐτῶν
  chosen: their God
  alternatives:
  - the God of them
  lexicon: BDAG
  rationale: Appositional to 'the Lord' and naturally rendered in English as 'their
    God.' This preserves the covenantal phraseology common in Scripture.
