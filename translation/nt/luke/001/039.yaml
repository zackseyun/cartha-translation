id: LUK.1.39
reference: Luke 1:39
source:
  edition: SBLGNT
  text: Ἀναστᾶσα δὲ Μαριὰμ ἐν ταῖς ἡμέραις ταύταις ἐπορεύθη εἰς τὴν ὀρεινὴν μετὰ σπουδῆς
    εἰς πόλιν Ἰούδα,
translation:
  text: Now in those days Mary arose and went with haste into the hill country, to
    a town of Judah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a city of Judah' or 'to a Judean town.' The Greek πόλις can mean
      either 'city' or 'town,' and Ἰούδα may denote the region of Judah/Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστᾶσα
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here functioning as an attendant circumstance
    preceding the main verb. 'Arose' preserves the narrative sequence and is idiomatic
    in biblical narrative without over-paraphrasing to 'set out.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition. 'Now' conveys continuation with
    slight development better than a bare 'and' in modern English.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  chosen: in those days
  alternatives:
  - during those days
  - at that time
  lexicon: BDAG
  rationale: A temporal expression best rendered idiomatically as 'in those days.'
    This preserves the deictic force of ταύταις without awkward literalism.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: BDAG
  rationale: Aorist middle/passive form of πορεύομαι commonly means 'went' or 'traveled.'
    'Went' is the most natural and sufficiently broad English equivalent here.
- source_word: εἰς τὴν ὀρεινὴν
  chosen: into the hill country
  alternatives:
  - to the hill country
  - into the mountainous region
  lexicon: BDAG
  rationale: ὀρεινός used substantivally refers to the hill country/highland region.
    'Hill country' is standard, natural English and fits the Judean setting.
- source_word: μετὰ σπουδῆς
  chosen: with haste
  alternatives:
  - quickly
  - eagerly
  lexicon: BDAG
  rationale: σπουδή can denote eagerness, diligence, or haste. In this travel context,
    'with haste' best captures the adverbial sense of promptness while preserving
    the narrative tone.
- source_word: εἰς πόλιν Ἰούδα
  chosen: to a town of Judah
  alternatives:
  - to a city of Judah
  - to a Judean town
  lexicon: BDAG
  rationale: πόλις can mean city or town; here the specific settlement is unnamed,
    so 'town' is more natural in English. Ἰούδα is best taken as a genitive of region/tribe,
    'of Judah,' rather than as the personal name Judas.
