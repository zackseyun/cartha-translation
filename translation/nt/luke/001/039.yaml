theological_decisions:
- issue: Identification of Ἰούδα
  chosen_reading: Judah as the regional/tribal designation
  alternative_readings:
  - Judea as a regional rendering in smoother English
  - a town named Judah
  rationale: The Greek form is Ἰούδα, which can represent Judah/Judea depending on
    context. Here it most naturally denotes the Judean/tribal region. Rendering it
    'Judah' stays closer to the Greek form and avoids importing a more interpretive
    geographical label than necessary.
  doctrine_reference: Original-language primacy over translation tradition; optimal
    equivalence
