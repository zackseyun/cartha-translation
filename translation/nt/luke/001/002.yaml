id: LUK.1.2
reference: Luke 1:2
source:
  edition: SBLGNT
  text: καθὼς παρέδοσαν ἡμῖν οἱ ἀπ’ ἀρχῆς αὐτόπται καὶ ὑπηρέται γενόμενοι τοῦ λόγου,
translation:
  text: just as those who from the beginning were eyewitnesses and servants of the
    word handed them down to us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'message.' Greek λόγος can mean 'word,' 'message,' or 'account'; here
      it likely refers to the proclaimed message about Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - just as
  - even as
  - according as
  lexicon: BDAG
  rationale: Introduces comparison/correspondence with the preceding statement in
    v.1; 'just as' is natural modern English and preserves the connective force.
- source_word: παρέδοσαν
  chosen: handed ... down
  alternatives:
  - delivered
  - passed on
  - transmitted
  lexicon: BDAG
  rationale: Aorist of παραδίδωμι here refers to the transmission of received tradition/information.
    'Handed down' captures the sense of authoritative transmission better than the
    more ambiguous 'delivered.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: Dative indirect object; straightforwardly rendered 'to us.' In English
    word order it follows the verb phrase naturally.
- source_word: οἱ ἀπ’ ἀρχῆς
  chosen: those who from the beginning
  alternatives:
  - those from the beginning
  - the ones who were from the beginning
  lexicon: BDAG
  rationale: The article with the prepositional phrase identifies a group characterized
    as being present 'from the beginning.' 'Those who from the beginning' preserves
    both the substantival force and the temporal phrase.
- source_word: αὐτόπται
  chosen: eyewitnesses
  alternatives:
  - those who saw for themselves
  - eye-witnesses
  lexicon: BDAG
  rationale: Standard and precise rendering for αὐτόπται; it conveys direct personal
    observation.
- source_word: ὑπηρέται
  chosen: servants
  alternatives:
  - ministers
  - attendants
  - assistants
  lexicon: BDAG
  rationale: Here the term denotes those in service to the message/gospel. 'Servants'
    is the most transparent modern rendering and avoids importing formal ecclesial
    office language that 'ministers' might suggest.
- source_word: γενόμενοι
  chosen: were
  alternatives:
  - having become
  - becoming
  lexicon: BDAG
  rationale: The participle modifies 'eyewitnesses and servants' and is smoothed idiomatically
    in English as 'were' to avoid awkwardness ('having become eyewitnesses and servants').
    This preserves the sense without over-literal stiffness.
- source_word: τοῦ λόγου
  chosen: of the word
  alternatives:
  - of the message
  - of the proclamation
  lexicon: BDAG
  rationale: λόγος here likely refers to the apostolic message about Jesus. 'The word'
    preserves the traditional and lexical breadth of λόγος while remaining understandable;
    'message' is a viable interpretive alternative but narrows the term.
