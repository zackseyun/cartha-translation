theological_decisions:
- issue: Referent of 'the word' (τοῦ λόγου)
  chosen_reading: the apostolic message/gospel proclamation, rendered formally as
    'the word'
  alternative_readings:
  - the message
  - the account
  rationale: The phrase likely refers not to the preincarnate Logos as a christological
    title, but to the proclaimed message concerning Jesus. The main text keeps the
    more literal 'the word' to preserve lexical transparency and avoid over-interpretation,
    while the rationale clarifies the probable sense.
  doctrine_reference: Translation philosophy §§1, 3, 5
