theological_decisions:
- issue: Nature of the promised salvation in Zechariah's prophecy
  chosen_reading: Render in a way that preserves both concrete deliverance from hostile
    enemies and the broader theological sense of salvation without narrowing it to
    merely political or merely spiritual rescue.
  alternative_readings:
  - purely political/national deliverance
  - purely spiritual salvation from sin
  rationale: The verse itself speaks of enemies and those who hate us, but within
    Luke 1 the language of salvation also carries redemptive significance. The translation
    should preserve this tension rather than resolve it beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
