id: LUK.1.71
reference: Luke 1:71
source:
  edition: SBLGNT
  text: σωτηρίαν ἐξ ἐχθρῶν ἡμῶν καὶ ἐκ χειρὸς πάντων τῶν μισούντων ἡμᾶς,
translation:
  text: salvation from our enemies and from the hand of all who hate us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance from our enemies and from the power of all who hate us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  lexicon: BDAG
  rationale: The accusative noun is best rendered 'salvation' to preserve the theological
    weight of Zechariah's prophecy while still allowing its concrete sense of deliverance
    from hostile powers. 'Deliverance' is possible, but 'salvation' better matches
    Luke's broader usage and the surrounding canticle.
- source_word: ἐξ ἐχθρῶν ἡμῶν
  chosen: from our enemies
  alternatives:
  - out of our enemies
  - from the power of our enemies
  lexicon: BDAG
  rationale: ἐξ with the genitive marks source/separation, naturally rendered 'from.'
    The simple phrase 'our enemies' is sufficient; adding 'power of' would overtranslate
    what is not explicit here.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: BDAG
  rationale: χείρ in this idiom commonly denotes power or control. Rendering it literally
    as 'hand' preserves the biblical idiom and intertextual resonance with Septuagint-style
    salvation language, while remaining understandable in English.
- source_word: πάντων τῶν μισούντων ἡμᾶς
  chosen: all who hate us
  alternatives:
  - all those hating us
  - all our haters
  lexicon: BDAG
  rationale: The present active participle functions substantivally. 'All who hate
    us' is natural modern English and preserves the ongoing or characteristic sense
    of the participle better than a more wooden rendering.
- source_word: καὶ
  chosen: and
  alternatives:
  - even
  - also
  lexicon: BDAG
  rationale: The conjunction straightforwardly coordinates the two prepositional phrases;
    'and' is the most accurate and least interpretive rendering.
