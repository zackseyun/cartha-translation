id: LUK.1.63
reference: Luke 1:63
source:
  edition: SBLGNT
  text: καὶ αἰτήσας πινακίδιον ἔγραψεν λέγων· Ἰωάννης ⸀ἐστὶν ὄνομα αὐτοῦ. καὶ ἐθαύμασαν
    πάντες.
translation:
  text: And after asking for a writing tablet, he wrote, saying, “John is his name.”
    And they all marveled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “His name is John.” The Greek more literally reads,
      “John is his name,” preserving Zechariah’s emphatic affirmation of the divinely
      given name.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτήσας
  chosen: after asking for
  alternatives:
  - having asked for
  - requesting
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb naturally conveys prior action.
    'After asking for' is idiomatic English that preserves the sequence without over-literal
    stiffness.
- source_word: πινακίδιον
  chosen: writing tablet
  alternatives:
  - tablet
  - writing board
  lexicon: BDAG
  rationale: Refers to a small tablet used for writing. 'Writing tablet' is clear
    modern English and avoids ambiguity that bare 'tablet' might have for contemporary
    readers.
- source_word: ἔγραψεν
  chosen: he wrote
  alternatives:
  - he wrote down
  lexicon: BDAG
  rationale: Straightforward aorist indicative of γράφω; simple past best fits the
    narrative style.
- source_word: λέγων
  chosen: saying
  alternatives:
  - as follows
  - with these words
  lexicon: BDAG
  rationale: Though somewhat redundant in English, it is present in the Greek and
    introduces the written content. Retaining 'saying' preserves the source structure
    without awkwardness.
- source_word: Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ἐστὶν ὄνομα αὐτοῦ
  chosen: is his name
  alternatives:
  - shall be his name
  - his name is
  lexicon: BDAG
  rationale: 'The Greek word order gives emphasis to the name itself: ''John is his
    name.'' This preserves the force of Zechariah''s decisive written declaration
    better than the smoother but less emphatic ''his name is John.'' ''Shall be his
    name'' is interpretive and less directly supported by the present tense.'
- source_word: ἐθαύμασαν
  chosen: they all marveled
  alternatives:
  - they all were amazed
  - they all wondered
  lexicon: BDAG
  rationale: Conveys astonishment in response to Zechariah's statement. 'Marveled'
    is natural, suitably elevated narrative English, and close to the semantic range
    of θαυμάζω.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: Modifies the subject of ἐθαύμασαν. 'They all' is idiomatic and preserves
    the collective emphasis.
