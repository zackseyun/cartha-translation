theological_decisions:
- issue: Relation of salvation to forgiveness
  chosen_reading: The verse presents salvation as known in connection with, and concretely
    expressed by, the forgiveness of sins.
  alternative_readings:
  - The verse could be rendered more instrumentally as salvation known 'through' forgiveness
    of sins.
  - The verse could be rendered more causally as salvation known 'by' forgiveness
    of sins.
  rationale: The prepositional phrase ἐν ἀφέσει ἁμαρτιῶν αὐτῶν is syntactically capable
    of several close English renderings. Preserving 'in the forgiveness' maintains
    the theological connection without narrowing it to a single interpretive category
    beyond what the Greek requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
