id: LUK.1.77
reference: Luke 1:77
source:
  edition: SBLGNT
  text: τοῦ δοῦναι γνῶσιν σωτηρίας τῷ λαῷ αὐτοῦ ἐν ἀφέσει ἁμαρτιῶν αὐτῶν,
translation:
  text: to give knowledge of salvation to his people in the forgiveness of their sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the forgiveness of their sins' or 'by the forgiveness of their
      sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δοῦναι
  chosen: to give
  alternatives:
  - for giving
  - to grant
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose dependent on the previous
    verse; 'to give' preserves the infinitival force naturally in English. 'Grant'
    is possible but less direct.
- source_word: γνῶσιν
  chosen: knowledge
  alternatives:
  - understanding
  - recognition
  lexicon: BDAG
  rationale: γνῶσις denotes knowledge or understanding. 'Knowledge' is the most straightforward
    and preserves the lexical link without over-interpreting the kind of knowing.
- source_word: σωτηρίας
  chosen: of salvation
  alternatives:
  - about salvation
  - of deliverance
  lexicon: BDAG
  rationale: The genitive is well represented by 'of salvation' after 'knowledge.'
    'Deliverance' is possible lexically, but 'salvation' best fits Luke's theological
    context and standard soteriological sense here.
- source_word: τῷ λαῷ αὐτοῦ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: BDAG
  rationale: The dative marks the recipients of the knowledge. 'His people' is the
    natural rendering of λαός with the possessive αὐτοῦ in this covenantal context.
- source_word: ἐν ἀφέσει
  chosen: in the forgiveness
  alternatives:
  - by the forgiveness
  - through forgiveness
  lexicon: BDAG
  rationale: 'ἐν with the dative here is best taken as expressing sphere or manner:
    the knowledge of salvation consists in or is found in forgiveness. ''In the forgiveness''
    preserves the Greek preposition without forcing a more interpretive causal or
    instrumental nuance.'
- source_word: ἁμαρτιῶν αὐτῶν
  chosen: of their sins
  alternatives:
  - of their sin
  lexicon: BDAG
  rationale: The plural ἁμαρτιῶν should be retained as 'sins.' The possessive αὐτῶν
    clearly refers to the people's sins.
