theological_decisions:
- issue: Rendering χάριν in a Marian context
  chosen_reading: favor
  alternative_readings:
  - grace
  rationale: The phrase εὑρίσκω χάριν παρά + dative is a conventional expression meaning
    'find favor with.' Rendering χάριν as 'favor' avoids importing later doctrinal
    formulations into the verse while still preserving the positive divine disposition
    expressed by the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
