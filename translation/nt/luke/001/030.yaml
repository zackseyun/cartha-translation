id: LUK.1.30
reference: Luke 1:30
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ ἄγγελος αὐτῇ· Μὴ φοβοῦ, Μαριάμ, εὗρες γὰρ χάριν παρὰ τῷ θεῷ·
translation:
  text: And the angel said to her, “Do not be afraid, Mary, for you have found favor
    with God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “grace”: the Greek noun χάρις can mean either “grace” or “favor,” but
      in the expression “find favor with God,” “favor” best matches the idiom here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard narrative aorist of λέγω; 'said' is the natural modern English
    rendering in direct speech.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Luke's infancy narrative the referent is a heavenly being, so 'angel'
    is contextually specific and idiomatic rather than the more general 'messenger'.
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: The present middle/passive imperative with μή functions as a prohibition.
    'Do not be afraid' is idiomatic contemporary English and preserves the sense without
    archaism.
- source_word: Μαριάμ
  chosen: Mary
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: εὗρες
  chosen: you have found
  alternatives:
  - you found
  - you have obtained
  lexicon: BDAG
  rationale: 'Although the Greek aorist is formally past, English present perfect
    fits the resulting present state in this announcement context: Mary now stands
    as one who has found favor.'
- source_word: χάριν
  chosen: favor
  alternatives:
  - grace
  lexicon: BDAG
  rationale: χάρις can mean 'grace' or 'favor.' In the idiom 'find favor with' someone,
    'favor' is the most natural English equivalent and best reflects the relational
    sense here.
- source_word: παρὰ τῷ θεῷ
  chosen: with God
  alternatives:
  - before God
  - from God
  lexicon: BDAG
  rationale: With παρά plus dative after 'find favor,' the idiomatic sense is favor
    in God's sight/presence. 'With God' is the standard concise English rendering.
