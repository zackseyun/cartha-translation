id: LUK.1.28
reference: Luke 1:28
source:
  edition: SBLGNT
  text: καὶ ⸀εἰσελθὼν πρὸς αὐτὴν εἶπεν· Χαῖρε, κεχαριτωμένη, ὁ κύριος μετὰ ⸀σοῦ.
translation:
  text: And coming in to her, he said, “Greetings, favored one; the Lord is with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rejoice” or traditionally “Hail.” The Greek word is an idiomatic greeting,
      though it is formally an imperative meaning “rejoice.”
    reason: lexical_alternative
  - marker: b
    text: Or “highly favored,” “graced one,” or traditionally “full of grace.” The
      Greek indicates one who has been shown grace or favor.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: coming in
  alternatives:
  - having entered
  - entering
  lexicon: BDAG
  rationale: Aorist participle of εἰσέρχομαι, introducing the attendant action before
    the main verb. 'Coming in' is natural modern English and preserves the movement
    into Mary's presence without overformal wording.
- source_word: πρὸς αὐτὴν
  chosen: to her
  alternatives:
  - into her presence
  - toward her
  lexicon: BDAG
  rationale: πρός with the accusative here marks direction toward Mary. In English,
    'to her' is the most natural complement to 'coming in' and adequately conveys
    approach.
- source_word: Χαῖρε
  chosen: Greetings
  alternatives:
  - Rejoice
  - Hail
  lexicon: BDAG
  rationale: Though formally an imperative of χαίρω ('rejoice'), in greeting contexts
    it functions idiomatically as a salutation. 'Greetings' best reflects ordinary
    sense in readable modern English. 'Hail' is traditional but archaic; 'Rejoice'
    is more literal but can mislead readers into hearing a command rather than a greeting.
- source_word: κεχαριτωμένη
  chosen: favored one
  alternatives:
  - highly favored
  - graced one
  - full of grace
  lexicon: BDAG
  rationale: Perfect passive participle of χαριτόω, indicating one who has been shown
    favor/grace. 'Favored one' captures the passive sense that Mary is the recipient
    of divine favor. 'Full of grace' reflects later translation tradition more than
    the plain lexical force here and can be heard as describing an intrinsic reservoir
    of grace rather than bestowed favor.
- source_word: ὁ κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: Per project default, κύριος is rendered 'Lord.' Here it refers to God
    in the angelic announcement, and the standard title preserves both reverence and
    biblical continuity.
- source_word: μετὰ σοῦ
  chosen: is with you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: 'μετά with the genitive means ''with.'' English idiom normally supplies
    the copula here: ''the Lord is with you.'' This preserves the sense of divine
    presence in a natural clause.'
