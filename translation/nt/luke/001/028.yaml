theological_decisions:
- issue: Rendering of κεχαριτωμένη in a theologically sensitive Marian text
  chosen_reading: favored one
  alternative_readings:
  - full of grace
  - highly favored
  - graced one
  rationale: 'The translation follows the Greek participle''s passive sense from χαριτόω:
    Mary is one who has been graced or favored by God. This avoids importing later
    doctrinal formulations not explicit in the text while still preserving the text''s
    strong affirmation of divine favor toward Mary. Because ''full of grace'' is a
    historically influential rendering, it is preserved in a footnote as an alternative.'
  doctrine_reference: Translation philosophy §§1, 3, 6
