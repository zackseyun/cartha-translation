id: LUK.1.61
reference: Luke 1:61
source:
  edition: SBLGNT
  text: καὶ εἶπαν πρὸς αὐτὴν ὅτι Οὐδείς ἐστιν ⸂ἐκ τῆς συγγενείας⸃ σου ὃς καλεῖται
    τῷ ὀνόματι τούτῳ.
translation:
  text: And they said to her, “None of your relatives is called by this name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “No one from your family is named this.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they told
  lexicon: BDAG
  rationale: Aorist of λέγω is naturally rendered 'said' in narrative. 'Told' is possible
    but adds a nuance of informing/directing not required by the context.
- source_word: πρὸς αὐτὴν
  chosen: to her
  alternatives:
  - toward her
  lexicon: BDAG
  rationale: With verbs of speaking, πρός + accusative commonly marks the person addressed;
    idiomatic English is 'to her.'
- source_word: Οὐδείς ἐστιν
  chosen: None ... is
  alternatives:
  - No one ... is
  lexicon: BDAG
  rationale: Both are valid. 'None' fits smoothly with the following partitive phrase
    and keeps the statement concise. The singular verb in Greek is preserved in sense.
- source_word: ἐκ τῆς συγγενείας σου
  chosen: of your relatives
  alternatives:
  - from your kin
  - from your family
  - from your kindred
  lexicon: BDAG
  rationale: συγγένεια refers to kinship/relatives. 'Relatives' is clear modern English
    and best captures the social/familial reference without archaic tone. 'Of your
    relatives' is idiomatic for the Greek partitive construction with ἐκ.
- source_word: ὃς καλεῖται
  chosen: is called
  alternatives:
  - is named
  - bears the name
  lexicon: BDAG
  rationale: The present passive of καλέω with a name commonly means 'is called' or
    'is named.' 'Is called' closely follows the Greek while remaining natural English.
- source_word: τῷ ὀνόματι τούτῳ
  chosen: by this name
  alternatives:
  - with this name
  - by that name
  lexicon: BDAG
  rationale: The dative construction is idiomatically rendered 'by this name.' 'This'
    reflects τούτῳ, pointing to the specific proposed name just mentioned.
