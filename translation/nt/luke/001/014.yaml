id: LUK.1.14
reference: Luke 1:14
source:
  edition: SBLGNT
  text: καὶ ἔσται χαρά σοι καὶ ἀγαλλίασις, καὶ πολλοὶ ἐπὶ τῇ ⸀γενέσει αὐτοῦ χαρήσονται·
translation:
  text: And there will be joy and exultation for you, and many will rejoice at his
    birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of his birth.' The Greek phrase can indicate the occasion of
      rejoicing or its basis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - will be
  lexicon: BDAG
  rationale: Impersonal future of εἰμί introducing what will come to pass; 'there
    will be' is natural English with the predicate nouns that follow.
- source_word: χαρά
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: Standard rendering for χαρά; concise and natural in English.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative pronoun indicating the person for whom the joy is experienced.
    'For you' is more idiomatic in this construction than the more literal 'to you.'
- source_word: ἀγαλλίασις
  chosen: exultation
  alternatives:
  - gladness
  - rejoicing
  lexicon: BDAG
  rationale: Chosen to preserve a distinction from χαρά ('joy') and to reflect the
    stronger, celebratory sense of ἀγαλλίασις.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Simple quantitative adjective used substantivally; 'many' is sufficient
    and natural.
- source_word: ἐπὶ τῇ γενέσει αὐτοῦ
  chosen: at his birth
  alternatives:
  - because of his birth
  - over his birth
  lexicon: BDAG
  rationale: ἐπί with the dative here expresses occasion or basis for rejoicing. 'At
    his birth' is the most natural English rendering, while still allowing the causal
    nuance implied by the Greek.
- source_word: χαρήσονται
  chosen: will rejoice
  alternatives:
  - will be glad
  lexicon: BDAG
  rationale: Future passive/deponent form of χαίρω; 'will rejoice' best matches the
    verbal connection with χαρά while sounding natural in English.
