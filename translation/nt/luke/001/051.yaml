theological_decisions:
- issue: Rendering the aorists in Mary's song
  chosen_reading: Use English present perfects ('has shown,' 'has scattered')
  alternative_readings:
  - Use simple pasts ('showed,' 'scattered')
  - Use English presents for timeless action
  rationale: The Greek aorists in the Magnificat likely summarize God's characteristic
    and decisive acts, with possible prophetic force. The English present perfect
    preserves the sense of completed divine action with continuing significance better
    than a bare simple past in this poetic context.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
