id: LUK.1.51
reference: Luke 1:51
source:
  edition: SBLGNT
  text: Ἐποίησεν κράτος ἐν βραχίονι αὐτοῦ, διεσκόρπισεν ὑπερηφάνους διανοίᾳ καρδίας
    αὐτῶν·
translation:
  text: He has shown strength with his arm; he has scattered the proud in the thoughts
    of their hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has done mighty deeds with his arm.' The Greek literally says 'did/made
      strength,' an idiom for displaying power.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has scattered the arrogant by the intention of their hearts' or 'in
      the imagination of their hearts.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐποίησεν
  chosen: He has shown
  alternatives:
  - He has done
  - He has performed
  - He has worked
  lexicon: BDAG
  rationale: Although the aorist indicative is formally past ('did/made'), in the
    Magnificat the aorists function as prophetic or summary declarations of God's
    decisive action. 'Has shown' idiomatically fits the collocation with κράτος in
    English ('show strength') better than 'has done strength' while preserving the
    completed-action force.
- source_word: κράτος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: κράτος denotes manifested strength or might. 'Strength' is natural English
    in the phrase 'shown strength with his arm' and preserves the concrete sense of
    displayed power.
- source_word: ἐν βραχίονι αὐτοῦ
  chosen: with his arm
  alternatives:
  - by his arm
  - in his arm
  lexicon: BDAG
  rationale: The preposition ἐν here is instrumental or associative in a Hebraic expression
    echoing OT language about God's mighty arm. 'With his arm' is idiomatic and preserves
    the anthropomorphic metaphor without over-literalizing 'in his arm'.
- source_word: διεσκόρπισεν
  chosen: he has scattered
  alternatives:
  - he scattered
  - he dispersed
  lexicon: BDAG
  rationale: The verb means to scatter or disperse. 'Has scattered' matches the aspectual
    presentation used in the first clause and keeps the poetic parallelism.
- source_word: ὑπερηφάνους
  chosen: the proud
  alternatives:
  - the arrogant
  - proud people
  lexicon: BDAG
  rationale: As a substantival adjective in the accusative plural, it refers to proud
    persons. 'The proud' is concise, idiomatic, and preserves the moral characterization.
- source_word: διανοίᾳ
  chosen: in the thoughts
  alternatives:
  - in the mind
  - by the intention
  - in the imagination
  lexicon: BDAG
  rationale: διάνοια refers to thought, understanding, or mindset. In this construction
    it expresses the sphere or instrument of their inner reasoning. 'In the thoughts'
    best fits the genitival phrase that follows and sounds natural in English.
- source_word: καρδίας αὐτῶν
  chosen: of their hearts
  alternatives:
  - of their heart
  - in their hearts
  lexicon: BDAG
  rationale: καρδία in biblical usage often denotes the inner self, will, or center
    of thought. The genitive is best retained as 'of their hearts,' yielding the full
    phrase 'in the thoughts of their hearts,' which preserves the Semitic-style expression
    rather than flattening it to a single English psychological term.
