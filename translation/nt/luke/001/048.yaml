id: LUK.1.48
reference: Luke 1:48
source:
  edition: SBLGNT
  text: ὅτι ἐπέβλεψεν ἐπὶ τὴν ταπείνωσιν τῆς δούλης αὐτοῦ, ἰδοὺ γὰρ ἀπὸ τοῦ νῦν μακαριοῦσίν
    με πᾶσαι αἱ γενεαί·
translation:
  text: because he has looked upon the humble state of his slave. For behold, from
    now on all generations will call me blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' or 'maidservant' for 'his slave.'
    reason: alternative_reading
  - marker: b
    text: Or 'lowliness' or 'humiliation' for 'humble state.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβλεψεν ἐπὶ
  chosen: has looked upon
  alternatives:
  - looked on
  - regarded
  - taken notice of
  lexicon: BDAG
  rationale: The verb with ἐπί conveys directing one's attention toward someone, often
    with favorable regard. 'Has looked upon' preserves the personal, gracious sense
    and works idiomatically in English. The English present perfect reflects the ongoing
    relevance of the aorist within Mary's present praise context.
- source_word: ταπείνωσιν
  chosen: humble state
  alternatives:
  - humiliation
  - lowliness
  - humble condition
  lexicon: BDAG
  rationale: The noun can denote humiliation, low status, or lowliness. Here the context
    is Mary's socially low condition before God's favor rather than an inward virtue
    alone. 'Humble state' communicates her lowly condition without overstating disgrace.
- source_word: δούλης
  chosen: slave
  alternatives:
  - servant
  - maidservant
  lexicon: BDAG
  rationale: Following the doctrine's contested-terms guidance for δοῦλος/δούλη, 'slave'
    is preferred where bonded belonging is salient. In Mary's self-description as
    belonging wholly to God, the possession expressed by 'his' makes that relation
    prominent. 'Maidservant' reflects older English tradition but is less transparent
    for modern readers.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: '''Behold'' preserves the deictic and emphatic force of ἰδού in elevated
    but still understandable English, fitting the poetic register of the Magnificat
    better than the more colloquial ''look'' or ''see''.'
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time forward
  - henceforth
  lexicon: BDAG
  rationale: This is the natural modern English equivalent and preserves the forward-looking
    temporal force.
- source_word: μακαριοῦσίν με
  chosen: will call me blessed
  alternatives:
  - will count me blessed
  - will pronounce me blessed
  lexicon: BDAG
  rationale: The verb means to declare or regard someone as blessed. 'Will call me
    blessed' is the most natural English rendering and preserves the public acknowledgment
    implied by the future plural verb.
- source_word: πᾶσαι αἱ γενεαί
  chosen: all generations
  alternatives:
  - every generation
  - all future generations
  lexicon: BDAG
  rationale: The phrase is idiomatic for successive generations of people. 'All generations'
    is concise and traditional without adding 'future,' which is already implied by
    'from now on'.
