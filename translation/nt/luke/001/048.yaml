theological_decisions:
- issue: Rendering Mary's self-designation δούλη
  chosen_reading: his slave
  alternative_readings:
  - his servant
  - his maidservant
  rationale: The translation avoids softening Mary's language of belonging to God
    while not importing later Marian doctrinal claims. The choice follows the project's
    guidance to render doulos-terms as 'slave' where bonded relation is salient, while
    preserving traditional alternatives in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy points 1 and 5'
- issue: Sense of ταπείνωσις in Mary's song
  chosen_reading: humble state
  alternative_readings:
  - humiliation
  - lowliness
  rationale: The verse speaks of God's regard for Mary's low social condition and
    insignificance, not merely her subjective humility. 'Humble state' preserves that
    theological tension without reducing the term to either external oppression alone
    or internal virtue alone.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy point 3'
