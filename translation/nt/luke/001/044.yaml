theological_decisions:
- issue: Rendering βρέφος for the unborn John
  chosen_reading: the baby
  alternative_readings:
  - the child
  - the infant
  rationale: The Greek term naturally denotes a baby/infant and is used here of the
    unborn John. The translation preserves the lexical force of the term without importing
    additional doctrinal claims beyond the text's own description.
  doctrine_reference: Translation philosophy §§1, 6
