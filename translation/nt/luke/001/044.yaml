id: LUK.1.44
reference: Luke 1:44
source:
  edition: SBLGNT
  text: ἰδοὺ γὰρ ὡς ἐγένετο ἡ φωνὴ τοῦ ἀσπασμοῦ σου εἰς τὰ ὦτά μου, ἐσκίρτησεν ⸂ἐν
    ἀγαλλιάσει τὸ βρέφος⸃ ἐν τῇ κοιλίᾳ μου.
translation:
  text: For look, when the sound of your greeting came into my ears, the baby leaped
    with joy in my womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the baby leaped in exultation in my womb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  lexicon: BDAG
  rationale: Rendered as the discourse marker 'look' to preserve the vivid attention-getting
    force in natural modern English without the archaic feel of 'behold.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Kept as 'for' to reflect explanatory linkage to the previous statement
    while remaining idiomatic.
- source_word: ὡς ἐγένετο
  chosen: when ... came
  alternatives:
  - as soon as ... came
  - when ... happened
  lexicon: BDAG
  rationale: The construction marks the time at which the event occurred. 'When ...
    came' is smoother English than a more literal 'when ... happened' and fits the
    idiom with 'sound' entering the ears.
- source_word: φωνὴ
  chosen: sound
  alternatives:
  - voice
  lexicon: BDAG
  rationale: In context the referent is the audible sound of Mary's greeting reaching
    Elizabeth's ears, not merely the abstract 'voice.' 'Sound' best matches the sensory
    emphasis of the clause.
- source_word: ἀσπασμοῦ
  chosen: greeting
  alternatives:
  - salutation
  lexicon: BDAG
  rationale: '''Greeting'' is the natural modern equivalent; ''salutation'' is accurate
    but stilted.'
- source_word: εἰς τὰ ὦτά μου
  chosen: into my ears
  alternatives:
  - in my ears
  - to my ears
  lexicon: BDAG
  rationale: '''Into my ears'' preserves the directional force of εἰς and the concrete
    bodily imagery of the Greek.'
- source_word: ἐσκίρτησεν
  chosen: leaped
  alternatives:
  - jumped
  - sprang
  lexicon: BDAG
  rationale: '''Leaped'' is the standard and vivid rendering for the sudden movement
    indicated by the verb, fitting both the physical and joyful sense in context.'
- source_word: ἐν ἀγαλλιάσει
  chosen: with joy
  alternatives:
  - in exultation
  - with exultation
  lexicon: BDAG
  rationale: This dative phrase expresses manner. 'With joy' is clear, natural English
    and captures the celebratory sense of ἀγαλλίασις without sounding overly formal.
- source_word: τὸ βρέφος
  chosen: the baby
  alternatives:
  - the child
  - the infant
  lexicon: BDAG
  rationale: βρέφος refers to an unborn or very young child. Here 'the baby' is the
    most natural English for the child in Elizabeth's womb and preserves the concreteness
    of the term.
- source_word: ἐν τῇ κοιλίᾳ μου
  chosen: in my womb
  alternatives:
  - inside me
  lexicon: BDAG
  rationale: '''Womb'' is the precise contextual sense here and should be retained
    rather than generalized.'
