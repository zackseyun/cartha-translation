id: LUK.1.76
reference: Luke 1:76
source:
  edition: SBLGNT
  text: καὶ σὺ ⸀δέ, παιδίον, προφήτης Ὑψίστου κληθήσῃ, προπορεύσῃ γὰρ ⸀ἐνώπιον κυρίου
    ἑτοιμάσαι ὁδοὺς αὐτοῦ,
translation:
  text: And you also, child, will be called a prophet of the Most High, for you will
    go before the Lord to prepare his ways,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the Lord.' The phrase can denote going before someone
      or ministering before them.
    reason: lexical_alternative
  - marker: b
    text: The wording echoes prophetic promises about preparing the way before the
      Lord (compare Isa 40:3; Mal 3:1). In Luke's narrative, this is fulfilled in
      John's ministry before Jesus.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ σὺ δέ
  chosen: And you also
  alternatives:
  - And you, too
  - And you
  lexicon: BDAG
  rationale: The combination marks a transition with emphasis on the addressee. 'Also'
    preserves the additive force of δέ with σὺ in natural English better than a bare
    'and you.'
- source_word: παιδίον
  chosen: child
  alternatives:
  - little child
  - boy
  lexicon: BDAG
  rationale: Vocative address to the infant John. 'Child' is natural, accurate, and
    avoids over-specifying sex or age beyond what the Greek requires in this direct
    address.
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering of the noun; no contextual reason to vary.
- source_word: Ὑψίστου
  chosen: of the Most High
  alternatives:
  - of the Highest
  lexicon: BDAG
  rationale: A reverential divine title. 'The Most High' is the established and natural
    English equivalent and preserves the genitive relation with 'prophet.'
- source_word: κληθήσῃ
  chosen: will be called
  alternatives:
  - will be named
  lexicon: BDAG
  rationale: Future passive of καλέω here denotes designation or recognition. 'Will
    be called' is both formally close and idiomatic.
- source_word: προπορεύσῃ
  chosen: will go before
  alternatives:
  - will go ahead
  - will precede
  lexicon: BDAG
  rationale: The verb denotes going in advance. 'Will go before' preserves the biblical
    cadence and fits the prophetic-forerunner context.
- source_word: ἐνώπιον κυρίου
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  lexicon: BDAG
  rationale: ἐνώπιον can mean 'before' spatially or 'in the presence of.' In this
    context of forerunner ministry, 'before the Lord' captures both the relational
    and preparatory sense. κύριος is rendered 'Lord' per doctrine default.
- source_word: ἑτοιμάσαι
  chosen: to prepare
  alternatives:
  - to make ready
  lexicon: BDAG
  rationale: Aorist infinitive expressing purpose after 'will go before.' 'To prepare'
    is the most direct and natural rendering.
- source_word: ὁδοὺς αὐτοῦ
  chosen: his ways
  alternatives:
  - his paths
  - the way for him
  lexicon: BDAG
  rationale: Plural ὁδοὺς is retained as 'ways,' echoing prophetic preparation language
    (especially Isa 40/Mal 3 resonances). 'Paths' is possible but less direct here;
    'the way for him' would flatten the plural.
