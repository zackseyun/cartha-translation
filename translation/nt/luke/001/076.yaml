theological_decisions:
- issue: Referent of 'the Lord' in the forerunner prophecy
  chosen_reading: Render κύριος as 'the Lord' without narrowing the referent in the
    translation line itself.
  alternative_readings:
  - the Lord (God) in light of the Isaiah/Malachi background
  - the Lord Jesus in Luke's narrative fulfillment
  rationale: The immediate wording alludes to OT texts about preparing the way before
    the Lord, while Luke's narrative presents John as the forerunner of Jesus. To
    preserve the theological tension rather than over-resolve it, the translation
    keeps the title 'the Lord' and allows the canonical context to inform interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering is 'Lord'.
