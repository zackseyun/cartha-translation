id: LUK.1.36
reference: Luke 1:36
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ Ἐλισάβετ ἡ ⸀συγγενίς σου καὶ αὐτὴ ⸀συνείληφεν υἱὸν ἐν γήρει αὐτῆς,
    καὶ οὗτος μὴν ἕκτος ἐστὶν αὐτῇ τῇ καλουμένῃ στείρᾳ·
translation:
  text: And look, Elizabeth your relative has also conceived a son in her old age,
    and this is the sixth month for her who was called barren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinswoman'; traditionally, some render συγγενίς as 'cousin,' but the
      Greek more generally means a female relative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'this month is the sixth for her.' That is, Elizabeth is in the
      sixth month of pregnancy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered with a natural modern attention-marker. 'Behold' is more traditional
    but archaic for the stated translation philosophy; 'look' preserves the deictic
    force.
- source_word: συγγενίς
  chosen: relative
  alternatives:
  - kinswoman
  - cousin
  lexicon: BDAG
  rationale: The term denotes a female relative/kinswoman, but not specifically a
    cousin. 'Relative' is accurate and avoids over-specification not warranted by
    the Greek.
- source_word: συνείληφεν
  chosen: has conceived
  alternatives:
  - has become pregnant
  - has conceived
  lexicon: BDAG
  rationale: In this context the verb refers to conception. The English present perfect
    matches the Greek perfect's resulting state. 'Has conceived' is slightly more
    formal and closer to the source than 'has become pregnant.'
- source_word: υἱὸν
  chosen: a son
  alternatives:
  - a male child
  lexicon: BDAG
  rationale: Standard rendering of υἱός. 'A son' is idiomatic and preserves the lexical
    meaning without unnecessary expansion.
- source_word: ἐν γήρει αὐτῆς
  chosen: in her old age
  alternatives:
  - when she was old
  - in old age
  lexicon: BDAG
  rationale: This idiom is naturally expressed in English as 'in her old age,' preserving
    both the temporal and emphatic sense.
- source_word: οὗτος μὴν ἕκτος ἐστὶν
  chosen: this is the sixth month
  alternatives:
  - this is month six
  - this is the sixth
  lexicon: BDAG
  rationale: μήν here means 'month,' not the asseverative particle. English requires
    'month' to make the sense explicit. The phrase refers to the sixth month of Elizabeth's
    pregnancy.
- source_word: αὐτῇ τῇ καλουμένῃ στείρᾳ
  chosen: for her who was called barren
  alternatives:
  - to her who was called barren
  - for the woman called barren
  lexicon: BDAG
  rationale: The dative is rendered idiomatically with 'for her' after 'this is the
    sixth month.' καλουμένῃ is passive/imperfective in sense, indicating her known
    reputation or designation. 'Barren' is the established and contextually fitting
    term for infertility here.
