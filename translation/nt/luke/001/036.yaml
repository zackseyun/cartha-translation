theological_decisions:
- issue: Whether to specify Elizabeth as 'cousin' of Mary
  chosen_reading: relative
  alternative_readings:
  - cousin
  rationale: The Greek συγγενίς indicates kinship but does not define the exact familial
    relationship. Rendering it as 'cousin' would import specificity the text does
    not provide.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
- issue: Whether to make explicit that 'the sixth month' refers to pregnancy
  chosen_reading: this is the sixth month for her
  alternative_readings:
  - she is six months pregnant
  rationale: The latter is a legitimate interpretive paraphrase, but the Greek expression
    is more literally 'this is the sixth month for her.' The chosen rendering preserves
    the source wording while remaining clear in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Never paraphrase
    beyond what the source text warrants'
