id: LUK.1.69
reference: Luke 1:69
source:
  edition: SBLGNT
  text: καὶ ἤγειρεν κέρας σωτηρίας ἡμῖν ⸀ἐν οἴκῳ ⸀Δαυὶδ παιδὸς αὐτοῦ,
translation:
  text: and has raised up a horn of salvation for us in the house of David his servant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty Savior.' Literally, 'a horn of salvation,' a biblical image
      for powerful deliverance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγειρεν
  chosen: has raised up
  alternatives:
  - raised up
  - brought forth
  lexicon: BDAG
  rationale: Aorist in Greek is rendered with English present perfect here to fit
    the prophetic-perfect/praise context of Zechariah's blessing in English discourse,
    where God's saving action is celebrated as now effected. 'Raised up' preserves
    the biblical idiom of God bringing forth a deliverer.
- source_word: κέρας σωτηρίας
  chosen: a horn of salvation
  alternatives:
  - a mighty savior
  - a horn that brings salvation
  lexicon: BDAG
  rationale: The phrase is an established Semitic/biblical metaphor for strength and
    victorious saving power. Retaining 'horn' preserves the imagery and intertextual
    resonance better than flattening it to 'mighty savior.' 'Of salvation' is kept
    formally to reflect the genitive.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - for us all
  - to us
  lexicon: BDAG
  rationale: Dative of advantage is best expressed as 'for us' in this context, emphasizing
    benefit rather than mere direction.
- source_word: ἐν οἴκῳ Δαυὶδ
  chosen: in the house of David
  alternatives:
  - from the house of David
  - in David's house
  lexicon: BDAG
  rationale: '''House'' here means lineage/dynasty, but the literal expression should
    be preserved because it is natural in English and carries Davidic covenant resonance.
    ''In'' follows the Greek preposition directly, though the sense is dynastic origin.'
- source_word: παιδὸς αὐτοῦ
  chosen: his servant
  alternatives:
  - his child
  - his attendant
  lexicon: BDAG
  rationale: For David, παῖς in biblical usage commonly means 'servant' in relation
    to God, echoing covenantal language from the Septuagint. 'Child' would be misleading
    here because the referent is David as God's chosen servant, not a literal minor.
