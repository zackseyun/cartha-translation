theological_decisions:
- issue: Whether to preserve the metaphor 'horn of salvation' or interpret it as a
    title like 'mighty Savior'
  chosen_reading: 'Preserve the metaphor in the main text: ''a horn of salvation'''
  alternative_readings:
  - a mighty Savior
  rationale: The Greek uses a concrete biblical image rooted in Old Testament royal
    and military salvation language. Preserving the metaphor maintains theological
    and literary continuity without importing a narrower interpretation. An explanatory
    alternative is worth preserving in a footnote for readability.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without flattening'
