theological_decisions:
- issue: Rendering the blessing formula addressed to Mary
  chosen_reading: Blessed are you among women
  alternative_readings:
  - You are blessed among women
  rationale: The verse presents Elizabeth's Spirit-inspired blessing without importing
    later doctrinal formulations beyond the text itself. The chosen wording preserves
    the biblical blessing formula and avoids either diminishing or expanding Mary's
    role.
