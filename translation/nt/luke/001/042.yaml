id: LUK.1.42
reference: Luke 1:42
source:
  edition: SBLGNT
  text: καὶ ἀνεφώνησεν ⸀κραυγῇ μεγάλῃ καὶ εἶπεν· Εὐλογημένη σὺ ἐν γυναιξίν, καὶ εὐλογημένος
    ὁ καρπὸς τῆς κοιλίας σου.
translation:
  text: And she cried out with a loud voice and said, “Blessed are you among women,
    and blessed is the fruit of your womb.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with a loud cry.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεφώνησεν
  chosen: cried out
  alternatives:
  - exclaimed
  - called out
  - spoke out
  lexicon: BDAG
  rationale: The aorist of ἀναφωνέω denotes speaking out loudly or exclaiming. 'Cried
    out' best captures the elevated, audible force without implying distress.
- source_word: κραυγῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - with a loud cry
  - in a loud voice
  lexicon: BDAG
  rationale: The dative phrase expresses manner. Although more literally 'with a great
    cry,' idiomatic English prefers 'with a loud voice,' which preserves the intensity
    and public audibility.
- source_word: Εὐλογημένη
  chosen: Blessed are you
  alternatives:
  - You are blessed
  - Favored are you
  lexicon: BDAG
  rationale: The perfect passive participle functions predicatively. 'Blessed are
    you' preserves the exclamatory blessing formula and echoes biblical diction more
    naturally than 'favored,' which would shift toward a different lexical field.
- source_word: ἐν γυναιξίν
  chosen: among women
  alternatives:
  - among all women
  - among womenfolk
  lexicon: BDAG
  rationale: The prepositional phrase indicates Mary's distinguished status in relation
    to women generally. 'Among women' is the natural and sufficiently formal rendering;
    'all' is not explicit in the Greek.
- source_word: εὐλογημένος
  chosen: blessed is
  alternatives:
  - is blessed
  lexicon: BDAG
  rationale: Matching the prior blessing formula preserves the parallelism between
    Mary and the child she bears.
- source_word: ὁ καρπὸς
  chosen: the fruit
  alternatives:
  - the offspring
  - the child
  lexicon: BDAG
  rationale: '''Fruit'' is the literal and idiomatic biblical expression here, preserving
    the metaphorical wording of the source. More interpretive alternatives like ''child''
    are understandable but less textually transparent.'
- source_word: τῆς κοιλίας σου
  chosen: of your womb
  alternatives:
  - of your body
  - in your womb
  lexicon: BDAG
  rationale: κοιλία here refers specifically to the womb in a pregnancy context. 'Of
    your womb' is the standard, precise English equivalent and preserves the maternal
    imagery of the Greek.
