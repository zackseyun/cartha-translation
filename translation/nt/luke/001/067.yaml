id: LUK.1.67
reference: Luke 1:67
source:
  edition: SBLGNT
  text: Καὶ Ζαχαρίας ὁ πατὴρ αὐτοῦ ἐπλήσθη πνεύματος ἁγίου καὶ ⸀ἐπροφήτευσεν λέγων·
translation:
  text: 'And Zechariah his father was filled with the Holy Spirit and prophesied,
    saying:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ζαχαρίας
  chosen: Zechariah
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: ὁ πατὴρ αὐτοῦ
  chosen: his father
  alternatives:
  - the father of him
  lexicon: BDAG
  rationale: Idiomatic English rendering of the articular noun phrase with genitive
    pronoun. 'His father' preserves the familial identification without wooden phrasing.
- source_word: ἐπλήσθη
  chosen: was filled
  alternatives:
  - was filled up
  lexicon: BDAG
  rationale: Aorist passive of πίμπλημι is naturally rendered 'was filled.' This preserves
    the passive sense and the event-like action without unnecessary expansion.
- source_word: πνεύματος ἁγίου
  chosen: with the Holy Spirit
  alternatives:
  - with holy spirit
  - with the Holy Ghost
  lexicon: BDAG
  rationale: The genitive after πίμπλημι is idiomatically rendered in English with
    'with.' Capitalized 'Holy Spirit' reflects the referent as God's Spirit in Luke's
    narrative, not merely a quality of spiritual inspiration.
- source_word: ἐπροφήτευσεν
  chosen: prophesied
  alternatives:
  - spoke prophetically
  lexicon: BDAG
  rationale: The verb προφητεύω is best rendered directly as 'prophesied.' This keeps
    the prophetic force of inspired utterance and matches normal English Bible usage
    without paraphrase.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the prophecy. 'Saying' preserves
    the Greek construction smoothly and prepares for the following speech.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Retaining 'And' reflects Luke's narrative continuity and is natural enough
    in English at this point in the discourse.
