theological_decisions:
- issue: Referent of πνεύματος ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a holy spirit
  rationale: In Luke-Acts, this expression in contexts of divine inspiration regularly
    refers to the Holy Spirit. Rendering it as 'the Holy Spirit' reflects the narrative
    and theological usage without importing extra doctrinal content beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
