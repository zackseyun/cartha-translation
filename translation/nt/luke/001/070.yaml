theological_decisions:
- issue: Scope of ἀπ’ αἰῶνος
  chosen_reading: temporal antiquity within salvation history ('from of old')
  alternative_readings:
  - eternal past ('from eternity')
  rationale: Given the immediate reference to 'prophets,' the phrase is best understood
    as referring to ancient times or long ago, not to an abstract statement about
    eternity. This preserves the historical-prophetic frame of Zechariah's song without
    overstating the term.
  doctrine_reference: Translation philosophy §1, §3
