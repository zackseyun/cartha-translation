id: LUK.1.70
reference: Luke 1:70
source:
  edition: SBLGNT
  text: καθὼς ἐλάλησεν διὰ στόματος τῶν ⸀ἁγίων ἀπ’ αἰῶνος προφητῶν αὐτοῦ,
translation:
  text: just as he spoke through the mouth of his holy prophets from of old,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from ancient times'; the phrase can denote remote antiquity. Some take
      it more strongly as 'from eternity,' but here the reference to the prophets
      favors the sense 'from of old.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces comparison/correspondence with the preceding statement. 'Just
    as' gives natural English while preserving the sense of fulfillment in accordance
    with prior divine speech.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: Aorist of λαλέω is naturally rendered 'spoke.' 'Said' is possible but
    less fitting with the following instrumental phrase 'through the mouth.'
- source_word: διὰ στόματος
  chosen: through the mouth
  alternatives:
  - by the mouth
  - through
  lexicon: BDAG
  rationale: This is a biblical idiom for mediated speech. Retaining 'mouth' preserves
    the concrete imagery and the prophetic mediation rather than flattening it to
    simply 'through.'
- source_word: τῶν ἁγίων ... προφητῶν
  chosen: his holy prophets
  alternatives:
  - his prophets, the holy ones
  - his consecrated prophets
  lexicon: BDAG
  rationale: ἁγίων attributively modifies προφητῶν. 'Holy prophets' is the standard
    and clear rendering, preserving the idea of prophets set apart to God.
- source_word: ἀπ’ αἰῶνος
  chosen: from of old
  alternatives:
  - from ancient times
  - from eternity
  - from the beginning of the age
  lexicon: BDAG
  rationale: In this context the phrase refers to long-standing prophetic witness
    in Israel's history, not necessarily metaphysical eternity. 'From of old' is concise,
    idiomatic, and preserves the temporal depth of the expression.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - belonging to him
  lexicon: BDAG
  rationale: 'The pronoun most naturally refers to God in context: the prophets are
    God''s prophets, through whom he spoke.'
