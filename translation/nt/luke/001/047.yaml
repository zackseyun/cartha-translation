id: LUK.1.47
reference: Luke 1:47
source:
  edition: SBLGNT
  text: καὶ ἠγαλλίασεν τὸ πνεῦμά μου ἐπὶ τῷ θεῷ τῷ σωτῆρί μου·
translation:
  text: and my spirit rejoiced in God my Savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exulted in God my Savior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγαλλίασεν
  chosen: rejoiced
  alternatives:
  - exulted
  - was overjoyed
  lexicon: BDAG
  rationale: Aorist active indicative, expressing a completed act of exuberant joy.
    'Rejoiced' is clear modern English and fits optimal equivalence; 'exulted' is
    possible but less natural for many readers, while 'was overjoyed' is more interpretive
    than the Greek requires.
- source_word: τὸ πνεῦμά μου
  chosen: my spirit
  alternatives:
  - my inner being
  lexicon: BDAG
  rationale: πνεῦμα here refers to Mary's inner self in parallel with 'my soul' in
    the previous verse. 'My spirit' preserves the lexical form and the poetic parallelism
    without over-interpreting it as a technical anthropological distinction.
- source_word: ἐπὶ τῷ θεῷ
  chosen: in God
  alternatives:
  - because of God
  - over God
  lexicon: BDAG
  rationale: With ἀγαλλιάω, ἐπί + dative can mark the basis or occasion of rejoicing.
    English idiom most naturally expresses this as 'rejoiced in God,' preserving the
    relational focus better than the more awkwardly literal 'over God.'
- source_word: σωτῆρί μου
  chosen: my Savior
  alternatives:
  - my deliverer
  lexicon: BDAG
  rationale: σωτήρ commonly means 'savior' in both ordinary and theological senses.
    'My Savior' is the most direct and contextually weighty rendering in Mary's praise,
    while 'deliverer' is possible but weaker and less consistent with established
    NT usage.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Simple connective linking this line with the previous verse in the poetic
    parallelism of the Magnificat. 'And' is the most straightforward rendering.
