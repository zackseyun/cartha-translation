theological_decisions:
- issue: Rendering Mary's address to God as 'my Savior'
  chosen_reading: God my Savior
  alternative_readings:
  - God my deliverer
  rationale: The Greek directly identifies God as Mary's Savior. The translation preserves
    this theological claim without softening it or importing further doctrinal conclusions
    beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Relation of 'my spirit' to 'my soul' in the surrounding parallelism
  chosen_reading: Retain distinct terms without collapsing them
  alternative_readings:
  - Treat 'soul' and 'spirit' as exact synonyms in translation
  rationale: The poetic parallelism suggests overlap, but the Greek uses distinct
    words. Preserving both maintains the text's literary and theological tension rather
    than resolving it.
  doctrine_reference: Translation philosophy §3
