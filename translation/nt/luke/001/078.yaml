theological_decisions:
- issue: Meaning of ἀνατολή in a messianic context
  chosen_reading: Rendered as 'the sunrise' in the main text
  alternative_readings:
  - the dawn
  - the Branch
  - the rising one
  rationale: The immediate context in vv. 78–79 emphasizes visitation and light shining
    on those in darkness, favoring the dawn/sunrise metaphor. However, because ἀνατολή
    can echo the LXX's messianic 'Branch' terminology (e.g., Zech 3:8; 6:12), that
    alternative is preserved in a footnote rather than imported into the main text.
    This preserves theological resonance without overstating lexical certainty.
  doctrine_reference: Preserve theological tension rather than resolve it
