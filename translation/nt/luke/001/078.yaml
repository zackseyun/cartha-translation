id: LUK.1.78
reference: Luke 1:78
source:
  edition: SBLGNT
  text: διὰ σπλάγχνα ἐλέους θεοῦ ἡμῶν, ἐν οἷς ⸀ἐπισκέψεται ἡμᾶς ἀνατολὴ ἐξ ὕψους,
translation:
  text: because of the tender mercy of our God, by which the sunrise from on high
    will visit us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dawn'; ἀνατολή can also echo the messianic title 'the Branch' in
      the Greek Old Testament.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: BDAG
  rationale: With the accusative σπλάγχνα, διά expresses cause or basis. 'Because
    of' is natural English and preserves the causal force leading from the previous
    clause.
- source_word: σπλάγχνα ἐλέους
  chosen: the tender mercy
  alternatives:
  - the compassion
  - the heartfelt mercy
  - the bowels of mercy
  lexicon: BDAG
  rationale: Literally 'bowels/guts of mercy,' an idiom for deep inward compassion.
    'Tender mercy' preserves both the affective depth and idiomatic English style
    without archaic literalism.
- source_word: θεοῦ ἡμῶν
  chosen: of our God
  alternatives:
  - of God, ours
  lexicon: BDAG
  rationale: Straightforward possessive genitive; standard English order is required.
- source_word: ἐν οἷς
  chosen: by which
  alternatives:
  - in which
  - through which
  lexicon: BDAG
  rationale: The relative phrase refers back to God's mercies as the sphere or means
    in connection with which the following visitation occurs. 'By which' communicates
    the instrumental/associative sense more idiomatically in English than a wooden
    'in which.'
- source_word: ἐπισκέψεται
  chosen: will visit
  alternatives:
  - will come to help
  - will look upon
  - has visited
  lexicon: BDAG
  rationale: Future middle indicative from ἐπισκέπτομαι. In biblical usage it can
    imply gracious intervention, but 'visit' preserves the lexical link and allows
    the context to supply the saving nuance.
- source_word: ἀνατολὴ
  chosen: the sunrise
  alternatives:
  - the dawn
  - the rising one
  - the branch
  lexicon: BDAG
  rationale: ἀνατολή can denote 'rising,' 'dawn/sunrise,' and in some contexts can
    echo messianic 'Branch' language from the prophets. Here, with 'from on high'
    and the following imagery of light in v. 79, the celestial/light sense is primary.
    'Sunrise' is vivid and natural English while preserving the metaphor.
- source_word: ἐξ ὕψους
  chosen: from on high
  alternatives:
  - from heaven
  - from the height
  lexicon: BDAG
  rationale: A reverent idiom for the heavenly realm. 'From on high' is both idiomatic
    and close to the Greek, avoiding over-interpretive expansion to 'from heaven'
    in the main text.
