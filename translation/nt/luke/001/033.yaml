id: LUK.1.33
reference: Luke 1:33
source:
  edition: SBLGNT
  text: καὶ βασιλεύσει ἐπὶ τὸν οἶκον Ἰακὼβ εἰς τοὺς αἰῶνας, καὶ τῆς βασιλείας αὐτοῦ
    οὐκ ἔσται τέλος.
translation:
  text: And he will reign over the house of Jacob forever, and of his kingdom there
    will be no end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the ages' / 'unto the ages.' The Greek idiom εἰς τοὺς αἰῶνας expresses
      unending duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεύσει
  chosen: will reign
  alternatives:
  - will rule as king
  lexicon: BDAG
  rationale: Future active of βασιλεύω denotes exercising royal rule. 'Will reign'
    is the most natural modern English rendering and preserves the kingly sense without
    awkward expansion.
- source_word: ἐπὶ τὸν οἶκον Ἰακώβ
  chosen: over the house of Jacob
  alternatives:
  - over Jacob's house
  - over the family of Jacob
  lexicon: BDAG
  rationale: With ἐπί plus accusative after βασιλεύω, the sense is dominion 'over.'
    'House of Jacob' preserves the biblical covenantal expression and its corporate
    sense better than the more interpretive 'family of Jacob.'
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  - for ever
  lexicon: BDAG
  rationale: The idiom expresses unending duration. 'Forever' is clear modern English
    and accurately conveys the force of the phrase without wooden literalism.
- source_word: βασιλείας
  chosen: kingdom
  alternatives:
  - reign
  - royal dominion
  lexicon: BDAG
  rationale: βασιλεία can denote either reign/rule or kingdom/realm. Here, paired
    with 'there will be no end,' 'kingdom' is the most idiomatic English and preserves
    both the royal and enduring dimensions.
- source_word: οὐκ ἔσται τέλος
  chosen: there will be no end
  alternatives:
  - it will have no end
  - there shall be no end
  lexicon: BDAG
  rationale: This is a standard existential construction. 'There will be no end' is
    natural English and keeps the emphatic negation and future sense.
