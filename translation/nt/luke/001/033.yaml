theological_decisions:
- issue: Scope of 'the house of Jacob'
  chosen_reading: Retained as 'the house of Jacob' without expanding it to 'Israel'
    or 'God's people.'
  alternative_readings:
  - the people of Israel
  - God's people
  rationale: The phrase is a traditional covenantal designation and should be preserved
    rather than interpreted more broadly in the main text. This maintains the wording
    of the angelic announcement and avoids importing later theological conclusions
    about scope.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Duration of the reign
  chosen_reading: Rendered εἰς τοὺς αἰῶνας as 'forever' and τῆς βασιλείας αὐτοῦ οὐκ
    ἔσται τέλος as 'of his kingdom there will be no end,' expressing an unending reign
    and kingdom.
  alternative_readings:
  - for the ages
  - unto the ages
  rationale: The verse presents the Messiah's reign as everlasting. 'Forever' and
    'there will be no end' communicate the text's plain sense in readable English
    without weakening its force.
  doctrine_reference: Readable modern English, not archaic or academic.
