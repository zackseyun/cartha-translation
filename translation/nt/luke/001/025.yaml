theological_decisions:
- issue: Referent of κύριος
  chosen_reading: Elizabeth refers to God as 'the Lord.'
  alternative_readings:
  - No major alternative in context
  rationale: In Luke 1, Elizabeth is speaking of God's action in removing her barrenness
    and social reproach. Rendering κύριος as 'the Lord' follows the project's default
    and preserves the theological weight without importing a narrower christological
    reading into this immediate context.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Social meaning of ὄνειδος
  chosen_reading: Render as 'reproach' rather than a more internal term like 'shame.'
  alternative_readings:
  - my disgrace
  - my shame
  rationale: The context concerns barrenness as a socially perceived dishonor. 'Reproach'
    preserves the external, communal dimension of dishonor while allowing readers
    to infer the emotional burden. This avoids overstating psychological interiority
    not explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
