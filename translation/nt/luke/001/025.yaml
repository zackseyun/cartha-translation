id: LUK.1.25
reference: Luke 1:25
source:
  edition: SBLGNT
  text: ὅτι Οὕτως μοι ⸀πεποίηκεν κύριος ἐν ἡμέραις αἷς ἐπεῖδεν ⸀ἀφελεῖν ὄνειδός μου
    ἐν ἀνθρώποις.
translation:
  text: because this is how the Lord has dealt with me in the days when he looked
    on me, to take away my reproach among people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my disgrace' or 'my shame.' The Greek term emphasizes social reproach
      or dishonor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content/reason of Elizabeth's statement. 'Because' fits
    the explanatory force in context after v.24 better than the more wooden 'that.'
- source_word: Οὕτως
  chosen: this is how
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Expresses manner emphatically. 'This is how' is natural modern English
    and preserves the deictic emphasis better than the archaic-sounding 'thus.'
- source_word: μοι
  chosen: with me
  alternatives:
  - to me
  - for me
  lexicon: BDAG
  rationale: With πεποίηκεν, the dative is idiomatically rendered in English as 'dealt
    with me' rather than the less natural 'done to me' or 'done for me.'
- source_word: πεποίηκεν
  chosen: has dealt
  alternatives:
  - has done
  - has acted
  lexicon: BDAG
  rationale: ποιέω is broad ('do/make'), but in this idiom with dative and adverbial
    οὕτως, 'has dealt' best conveys personal divine action in idiomatic English without
    over-paraphrasing.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. The article
    is natural in English here because Elizabeth refers to God by title.
- source_word: ἐν ἡμέραις αἷς
  chosen: in the days when
  alternatives:
  - in the days in which
  - at the time when
  lexicon: BDAG
  rationale: A temporal relative construction. 'In the days when' is a close but readable
    rendering.
- source_word: ἐπεῖδεν
  chosen: he looked on me
  alternatives:
  - he looked upon me
  - he took notice of me
  - he regarded me
  lexicon: BDAG
  rationale: The verb conveys looking upon with attention/regard. 'Looked on me' preserves
    the visual metaphor and divine regard without becoming overly interpretive. The
    object 'me' is supplied from context in English.
- source_word: ἀφελεῖν
  chosen: to take away
  alternatives:
  - to remove
  lexicon: BDAG
  rationale: Infinitive of purpose/result after ἐπεῖδεν. 'To take away' is the most
    transparent and idiomatic equivalent.
- source_word: ὄνειδός μου
  chosen: my reproach
  alternatives:
  - my disgrace
  - my shame
  lexicon: BDAG
  rationale: ὄνειδος denotes reproach/disgrace, especially social disgrace. 'Reproach'
    preserves the interpersonal and honor-shame dimension; 'shame' is possible but
    more internalized in English.
- source_word: ἐν ἀνθρώποις
  chosen: among people
  alternatives:
  - among men
  - before people
  - in the sight of people
  lexicon: BDAG
  rationale: The phrase marks the social sphere in which the reproach was experienced.
    'Among people' is gender-accurate and natural modern English; 'among men' would
    sound male-specific in contemporary English though the Greek is generic.
