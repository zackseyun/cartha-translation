theological_decisions:
- issue: Socio-theological reversal in Mary's song
  chosen_reading: Retain the concrete contrast 'the hungry' / 'the rich' without spiritualizing
    either term.
  alternative_readings:
  - Render 'the hungry' as spiritually needy
  - Render 'the rich' as the self-satisfied or proud
  rationale: The verse participates in Luke's theme of divine reversal and speaks
    in concrete social terms. While spiritual implications may be drawn canonically,
    the Greek itself names hungry people and rich people. The translation therefore
    preserves the plain sense and does not import a narrower allegorical interpretation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
