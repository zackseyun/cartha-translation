id: LUK.1.53
reference: Luke 1:53
source:
  edition: SBLGNT
  text: πεινῶντας ἐνέπλησεν ἀγαθῶν καὶ πλουτοῦντας ἐξαπέστειλεν κενούς.
translation:
  text: He has filled the hungry with good things, and sent the rich away empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent the rich away empty-handed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινῶντας
  chosen: the hungry
  alternatives:
  - those who are hungry
  - the starving
  lexicon: BDAG
  rationale: Present active participle used substantivally; 'the hungry' is natural
    English and preserves the class description without over-specifying intensity.
    'Starving' is too strong for the lexical sense.
- source_word: ἐνέπλησεν
  chosen: has filled
  alternatives:
  - filled
  - satisfied
  lexicon: BDAG
  rationale: Aorist indicative in the Magnificat's prophetic-perfect style is well
    rendered in English present perfect ('has filled'), matching the surrounding song's
    depiction of God's decisive action. 'Satisfied' interprets the result more than
    the verb itself.
- source_word: ἀγαθῶν
  chosen: with good things
  alternatives:
  - with good gifts
  - with good things
  lexicon: BDAG
  rationale: Genitive after verb of filling indicates content. 'Good things' is the
    most direct and idiomatic rendering; 'good gifts' adds the nuance of gifting not
    explicit in the adjective alone.
- source_word: πλουτοῦντας
  chosen: the rich
  alternatives:
  - those who are rich
  - the wealthy
  lexicon: BDAG
  rationale: Present active participle used substantivally. 'The rich' is concise,
    idiomatic, and preserves the social contrast with 'the hungry.'
- source_word: ἐξαπέστειλεν
  chosen: sent away
  alternatives:
  - sent off
  - dismissed
  lexicon: BDAG
  rationale: The compound verb conveys sending away/out. 'Sent away' is the clearest
    natural English equivalent; 'dismissed' can imply a formal audience not present
    in the text.
- source_word: κενούς
  chosen: empty
  alternatives:
  - empty-handed
  - with nothing
  lexicon: BDAG
  rationale: Predicate adjective describing the condition in which the rich are sent
    away. 'Empty' is literal and broad; 'empty-handed' is a plausible interpretive
    expansion but adds imagery not explicit in the Greek.
