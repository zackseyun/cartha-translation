id: LUK.1.5
reference: Luke 1:5
source:
  edition: SBLGNT
  text: Ἐγένετο ἐν ταῖς ἡμέραις ⸀Ἡρῴδου βασιλέως τῆς Ἰουδαίας ἱερεύς τις ὀνόματι Ζαχαρίας
    ἐξ ἐφημερίας Ἀβιά, ⸀καὶ γυνὴ ⸀αὐτῷ ἐκ τῶν θυγατέρων Ἀαρών, καὶ τὸ ὄνομα αὐτῆς
    Ἐλισάβετ.
translation:
  text: In the days of Herod, king of Judea, there was a priest named Zechariah, from
    the division of Abijah. He had a wife from the daughters of Aaron, and her name
    was Elizabeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the descendants of Aaron.' The Greek reads more literally, 'from
      the daughters of Aaron,' an idiom for priestly lineage.
    reason: lexical_alternative
  - marker: b
    text: '''Division of Abijah'' refers to one of the priestly service groups established
      for temple ministry.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο
  chosen: there was
  alternatives:
  - it happened
  - there came to be
  lexicon: BDAG
  rationale: Narrative γίνομαι here functions as an introductory formula. 'There was'
    gives natural English while preserving the existence/introduction sense without
    the awkwardness of a wooden 'it happened' in this context.
- source_word: ἐν ταῖς ἡμέραις
  chosen: In the days of
  alternatives:
  - during the days of
  lexicon: BDAG
  rationale: This is a standard temporal idiom. 'In the days of' is both natural and
    formally close to the Greek.
- source_word: Ἡρῴδου βασιλέως τῆς Ἰουδαίας
  chosen: Herod, king of Judea
  alternatives:
  - Herod the king of Judea
  lexicon: BDAG
  rationale: The genitive construction identifies Herod by office and territory. 'King
    of Judea' is the most direct rendering. 'Judea' reflects Ἰουδαία more precisely
    than broader traditional 'Judah' in this historical setting.
- source_word: ἱερεύς τις
  chosen: a priest
  alternatives:
  - a certain priest
  lexicon: BDAG
  rationale: τις marks an indefinite introduction of a new character. English usually
    conveys this naturally with 'a' rather than the slightly stilted 'a certain,'
    while still preserving the indefinite force.
- source_word: ὀνόματι Ζαχαρίας
  chosen: named Zechariah
  alternatives:
  - by the name of Zechariah
  lexicon: BDAG
  rationale: The dative ὀνόματι is idiomatic for naming. 'Named Zechariah' is concise,
    natural, and accurate.
- source_word: ἐξ ἐφημερίας Ἀβιά
  chosen: from the division of Abijah
  alternatives:
  - of the priestly division of Abijah
  - from the order of Abijah
  lexicon: BDAG
  rationale: ἐφημερία refers to a priestly division or course of service. 'Division'
    is clear modern English and preserves the institutional sense without overexplaining
    in the main text.
- source_word: γυνὴ αὐτῷ
  chosen: He had a wife
  alternatives:
  - and a wife to him
  - and his wife was
  lexicon: BDAG
  rationale: The dative αὐτῷ is possessive ('to him' = 'he had'). Rendering it as
    'He had a wife' is idiomatic English and preserves the relational sense.
- source_word: ἐκ τῶν θυγατέρων Ἀαρών
  chosen: from the daughters of Aaron
  alternatives:
  - from the descendants of Aaron
  - of the daughters of Aaron
  lexicon: BDAG
  rationale: The phrase denotes descent from Aaron. 'From the daughters of Aaron'
    stays close to the Greek and preserves the familial imagery; the genealogical
    implication is clear in context.
- source_word: τὸ ὄνομα αὐτῆς Ἐλισάβετ
  chosen: her name was Elizabeth
  alternatives:
  - and her name was Elizabeth
  lexicon: BDAG
  rationale: This is a standard naming formula. 'Her name was Elizabeth' is the natural
    English equivalent.
- source_word: Ζαχαρίας / Ἐλισάβετ / Ἀβιά / Ἀαρών
  chosen: Zechariah / Elizabeth / Abijah / Aaron
  alternatives:
  - Zacharias / Elisabeth / Abia / Aaron
  lexicon: standard transliteration conventions
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated. These forms follow standard English biblical transliteration
    while avoiding older tradition-bound spellings where appropriate.
