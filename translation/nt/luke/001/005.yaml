theological_decisions:
- issue: Genealogical phrasing for Elizabeth's lineage
  chosen_reading: from the daughters of Aaron
  alternative_readings:
  - from the descendants of Aaron
  rationale: The Greek uses the concrete familial expression 'daughters of Aaron.'
    Retaining it preserves the text's priestly lineage emphasis without importing
    additional doctrinal claims. The more interpretive 'descendants' is possible but
    less textually transparent.
  doctrine_reference: Translation philosophy §§1, 5
