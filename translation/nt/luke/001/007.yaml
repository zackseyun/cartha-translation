id: LUK.1.7
reference: Luke 1:7
source:
  edition: SBLGNT
  text: καὶ οὐκ ἦν αὐτοῖς τέκνον, καθότι ⸂ἦν ἡ Ἐλισάβετ⸃ στεῖρα, καὶ ἀμφότεροι προβεβηκότες
    ἐν ταῖς ἡμέραις αὐτῶν ἦσαν.
translation:
  text: And they had no child, because Elizabeth was barren, and both of them were
    advanced in years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advanced in age.' Literally, 'having progressed in their days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον
  chosen: child
  alternatives:
  - children
  - offspring
  lexicon: BDAG
  rationale: Singular τέκνον is best rendered 'child' in natural English. 'Children'
    would overtranslate the singular, while 'offspring' is more formal and less idiomatic
    here.
- source_word: καθότι
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the reason for their childlessness. 'Because' is the clearest
    modern English causal connector.
- source_word: στεῖρα
  chosen: barren
  alternatives:
  - unable to conceive
  - childless
  lexicon: BDAG
  rationale: στεῖρα specifically describes infertility. 'Barren' is concise and traditional
    without being obscure; 'childless' would blur the distinction between the condition
    and the result already stated in the first clause.
- source_word: ἀμφότεροι
  chosen: both of them
  alternatives:
  - both
  - the two of them
  lexicon: BDAG
  rationale: The phrase emphasizes that the statement applies to Zechariah and Elizabeth
    together. 'Both of them' is slightly fuller and natural in English.
- source_word: προβεβηκότες ἐν ταῖς ἡμέραις αὐτῶν
  chosen: advanced in years
  alternatives:
  - well along in years
  - old
  - advanced in age
  lexicon: BDAG
  rationale: This idiom means they were elderly. 'Advanced in years' preserves the
    idiomatic and respectful tone better than the blunter 'old.' 'Advanced in age'
    is possible, but 'years' more closely reflects ἡμέραις while remaining idiomatic.
- source_word: οὐκ ἦν αὐτοῖς
  chosen: they had no
  alternatives:
  - there was not for them
  - they did not have
  lexicon: BDAG
  rationale: 'The Greek literally says ''there was not to them,'' an idiom naturally
    expressed in English as possession: ''they had no.'' This is an optimal-equivalence
    rendering.'
