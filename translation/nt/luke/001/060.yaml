id: LUK.1.60
reference: Luke 1:60
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεῖσα ἡ μήτηρ αὐτοῦ εἶπεν· Οὐχί, ἀλλὰ κληθήσεται Ἰωάννης.
translation:
  text: And his mother answered, “No; rather, he shall be called John.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he will be called John.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεῖσα
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces direct speech with
    the sense 'answered' or 'replied.' English idiom prefers a finite verb here rather
    than a more wooden participial construction ('and answering').
- source_word: μήτηρ αὐτοῦ
  chosen: his mother
  alternatives:
  - the mother of him
  lexicon: BDAG
  rationale: Natural English possessive rendering of the noun phrase; preserves the
    definite reference without awkward literalism.
- source_word: Οὐχί
  chosen: 'No'
  alternatives:
  - Certainly not
  - Not so
  lexicon: BDAG
  rationale: In this dialogue context οὐχί is a strong negative response. 'No' is
    the most natural and direct English equivalent.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: BDAG
  rationale: Here ἀλλά marks correction of the prior assumption in v. 59. 'Rather'
    captures the adversative and corrective force more precisely than a simple 'but.'
- source_word: κληθήσεται
  chosen: he shall be called
  alternatives:
  - he will be called
  - his name shall be
  lexicon: BDAG
  rationale: Future passive of καλέω. 'He shall be called' preserves the verbal form
    and the naming sense. 'His name shall be' is idiomatic but less formally tied
    to the Greek verb.
- source_word: Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation policy to transliterate names rather than translate them.
