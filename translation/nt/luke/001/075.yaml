theological_decisions:
- issue: Rendering δικαιοσύνη in a non-Pauline ethical context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default for δικαιοσύνη is 'righteousness.' Here the term
    is paired with ὁσιότης and describes covenantal uprightness before God, so 'righteousness'
    better preserves the vertical ethical sense. 'Justice' remains a viable lexical
    alternative but is less fitting in this immediate context.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved as alternative where relevant'
