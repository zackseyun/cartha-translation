theological_decisions:
- issue: Meaning of κωφός in relation to Zechariah's judgment
  chosen_reading: Render the resulting condition as inability to speak rather than
    explicitly 'deaf.'
  alternative_readings:
  - mute
  - deaf and mute
  rationale: The verse itself highlights speechlessness and sign-making. While κωφός
    can sometimes include deafness, this line does not require that fuller sense in
    the main text. The translation preserves the explicit emphasis of the immediate
    context without over-resolving the broader narrative question.
  doctrine_reference: Preserve theological tension rather than resolve it.
