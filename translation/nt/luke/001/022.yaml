id: LUK.1.22
reference: Luke 1:22
source:
  edition: SBLGNT
  text: ἐξελθὼν δὲ οὐκ ⸀ἐδύνατο λαλῆσαι αὐτοῖς, καὶ ἐπέγνωσαν ὅτι ὀπτασίαν ἑώρακεν
    ἐν τῷ ναῷ· καὶ αὐτὸς ἦν διανεύων αὐτοῖς, καὶ διέμενεν κωφός.
translation:
  text: But when he came out, he was not able to speak to them, and they realized
    that he had seen a vision in the sanctuary. And he kept making signs to them and
    remained unable to speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple'; the Greek word here more specifically denotes the sanctuary
      proper rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'remained mute.' The Greek adjective can denote one who is unable to
      speak, and in some contexts may also imply deafness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: when he came out
  alternatives:
  - after he came out
  - having come out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered temporally
    in English. 'When he came out' is idiomatic and preserves the sequence without
    woodenness.
- source_word: οὐκ ἐδύνατο λαλῆσαι
  chosen: he was not able to speak
  alternatives:
  - he could not speak
  lexicon: BDAG
  rationale: This preserves the force of inability in δύναμαι + infinitive. 'Could
    not speak' is possible, but 'was not able to speak' slightly better reflects the
    explicit verbal construction while remaining natural.
- source_word: ἐπέγνωσαν
  chosen: they realized
  alternatives:
  - they understood
  - they recognized
  lexicon: BDAG
  rationale: The verb here indicates coming to a clear understanding from the evidence
    before them. 'Realized' fits the narrative context better than the more literal
    but less natural 'recognized'.
- source_word: ὀπτασίαν
  chosen: a vision
  alternatives:
  - an appearance
  lexicon: BDAG
  rationale: In this context the noun refers to a supernatural sight or revelatory
    experience, so 'vision' is the clearest and most standard English rendering.
- source_word: ἐν τῷ ναῷ
  chosen: in the sanctuary
  alternatives:
  - in the temple
  lexicon: BDAG
  rationale: ναός commonly refers to the temple sanctuary proper rather than the broader
    temple complex (for which ἱερόν is more typical). 'Sanctuary' preserves that distinction
    and follows original-language primacy over translation tradition.
- source_word: διανεύων
  chosen: kept making signs
  alternatives:
  - was making signs
  - was gesturing
  lexicon: BDAG
  rationale: The participle with ἦν forms a periphrastic imperfect, conveying ongoing
    action. 'Kept making signs' captures the durative sense better than a simple past.
- source_word: διέμενεν
  chosen: remained
  alternatives:
  - continued to be
  lexicon: BDAG
  rationale: The imperfect of διαμένω indicates continued state. 'Remained' is concise
    and natural.
- source_word: κωφός
  chosen: unable to speak
  alternatives:
  - mute
  - speechless
  - deaf and mute
  lexicon: BDAG
  rationale: Although κωφός can denote 'mute' or in some contexts 'deaf,' the immediate
    context emphasizes inability to speak (οὐκ ἐδύνατο λαλῆσαι). Rendering it 'unable
    to speak' avoids importing deafness where this verse does not explicitly foreground
    it, while preserving the narrative point.
