theological_decisions:
- issue: Rendering Abrahamic covenant language
  chosen_reading: our father
  alternative_readings:
  - our ancestor
  rationale: The verse invokes Israel's covenant history through Abraham. 'Our father'
    preserves the biblical-theological idiom without importing extra doctrinal claims,
    and matches the communal voice of Zechariah's prophecy.
  doctrine_reference: Translation philosophy §§1, 6
