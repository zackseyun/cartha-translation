id: LUK.1.73
reference: Luke 1:73
source:
  edition: SBLGNT
  text: ὅρκον ὃν ὤμοσεν πρὸς Ἀβραὰμ τὸν πατέρα ἡμῶν, τοῦ δοῦναι ἡμῖν
translation:
  text: the oath that he swore to Abraham our father, to grant to us
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "our ancestor." The Greek literally says "our father," preserving the
      covenantal language about Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρκον
  chosen: the oath
  alternatives:
  - an oath
  lexicon: BDAG
  rationale: Accusative object carried over from the previous verse's syntax; rendered
    with the definite article in English because it refers to a specific oath already
    in view.
- source_word: ὃν
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: Relative pronoun linking 'oath' to the following clause. 'That' is more
    natural in modern English than 'which' here.
- source_word: ὤμοσεν
  chosen: he swore
  alternatives:
  - he pledged with an oath
  lexicon: BDAG
  rationale: Aorist active indicative of ὀμνύω, straightforwardly rendered 'swore.'
    This preserves the formal connection to 'oath' without unnecessary expansion.
- source_word: πρὸς Ἀβραὰμ
  chosen: to Abraham
  alternatives:
  - toward Abraham
  - with regard to Abraham
  lexicon: BDAG
  rationale: With verbs of swearing, πρός here is idiomatically directional toward
    the person addressed; 'to Abraham' is the clearest English rendering.
- source_word: τὸν πατέρα ἡμῶν
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: BDAG
  rationale: Retains the familial-covenantal language of the Greek and the biblical
    idiom regarding Abraham. 'Ancestor' is possible but weakens the covenantal resonance.
- source_word: τοῦ δοῦναι ἡμῖν
  chosen: to grant to us
  alternatives:
  - to give us
  - granting to us
  lexicon: BDAG
  rationale: Articular infinitive expressing purpose or result connected with the
    oath. 'To grant to us' fits the elevated style of Zechariah's song and anticipates
    the content completed in the next verse. 'Give us' is possible but slightly flatter.
