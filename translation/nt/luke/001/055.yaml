id: LUK.1.55
reference: Luke 1:55
source:
  edition: SBLGNT
  text: καθὼς ἐλάλησεν πρὸς τοὺς πατέρας ἡμῶν, τῷ Ἀβραὰμ καὶ τῷ σπέρματι αὐτοῦ εἰς
    τὸν αἰῶνα.
translation:
  text: just as he spoke to our fathers—to Abraham and to his offspring forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to our ancestors.' The Greek is literally 'to our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to his seed.' The Greek uses a singular collective noun that can mean
      'seed,' 'offspring,' or 'descendants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces comparison/correspondence with the preceding statement; 'just
    as' is natural modern English and preserves the sense of fulfillment in accordance
    with prior speech.
- source_word: ἐλάλησεν
  chosen: he spoke
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Aorist of λαλέω is straightforwardly rendered 'spoke.' 'Said' is possible,
    but 'spoke' better matches the verbal act with πρὸς ('to') and preserves the formal
    link to divine speech.
- source_word: πρὸς τοὺς πατέρας ἡμῶν
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: BDAG
  rationale: The phrase is literally 'to our fathers.' Per the translation philosophy,
    gender-accurate rendering is preferred where the source is masculine and representative.
    'Ancestors' is smoother in contemporary English but loses the explicit patriarchal
    wording and covenantal resonance.
- source_word: τῷ Ἀβραὰμ
  chosen: to Abraham
  lexicon: BDAG
  rationale: Dative after the implied extension of 'spoke'; Abraham is transliterated
    as a personal name per project philosophy.
- source_word: τῷ σπέρματι αὐτοῦ
  chosen: to his offspring
  alternatives:
  - to his seed
  - to his descendants
  lexicon: BDAG
  rationale: σπέρμα can denote seed/offspring/descendants. 'Offspring' preserves the
    singular collective form of the Greek better than 'descendants' while remaining
    natural English. 'Seed' is more formally literal and theologically resonant in
    some intertexts, but sounds less idiomatic here; it is preserved in a footnote.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - to the age
  lexicon: BDAG
  rationale: Idiomatic expression meaning enduring perpetually. 'Forever' is clear
    modern English; 'to the age' is overly literal and unnatural here.
