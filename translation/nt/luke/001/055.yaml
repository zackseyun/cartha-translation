theological_decisions:
- issue: Rendering πατέρας ἡμῶν with masculine covenantal language
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek is explicitly masculine plural and evokes Israel's patriarchal
    forebears in covenant history. Following the project's gender-accurate principle,
    the masculine form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering σπέρματι αὐτοῦ in covenantal context
  chosen_reading: his offspring
  alternative_readings:
  - his seed
  - his descendants
  rationale: The singular collective 'offspring' best balances natural English with
    the Greek singular and preserves possible covenantal/theological resonance with
    the Abrahamic promise. Because 'seed' is a meaningful biblical alternative, it
    is preserved in a footnote rather than resolved away.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
