id: LUK.1.35
reference: Luke 1:35
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ ἄγγελος εἶπεν αὐτῇ· Πνεῦμα ἅγιον ἐπελεύσεται ἐπὶ σέ, καὶ
    δύναμις Ὑψίστου ἐπισκιάσει σοι· διὸ καὶ τὸ γεννώμενον ἅγιον κληθήσεται, υἱὸς θεοῦ·
translation:
  text: And the angel answered and said to her, “The Holy Spirit will come upon you,
    and the power of the Most High will overshadow you; therefore also the holy one
    being born will be called the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the child to be born.” The Greek phrase τὸ γεννώμενον is literally “the
      one being born” or “what is being born.”
    reason: lexical_alternative
  - marker: b
    text: “The Son of God” translates a Greek expression without the article before
      “Son,” but in context it functions as a title, not as an indefinite expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: 'Aorist passive participle of ἀποκρίνομαι functions idiomatically as
    an active deponent: ''answering.'' ''Answered'' is natural English and preserves
    the responsive force.'
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Luke's infancy narrative the referent is a heavenly angelic being,
    not merely a human messenger, so 'angel' is the plain contextual sense.
- source_word: Πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: The phrase refers to the divine Spirit, not an impersonal force or merely
    a holy disposition. English idiom normally includes the article here. Capitalization
    reflects personal divine reference consistent with historic Christian orthodoxy
    and Luke's usage.
- source_word: ἐπελεύσεται ἐπὶ σέ
  chosen: will come upon you
  alternatives:
  - will come over you
  - will come to you
  lexicon: BDAG
  rationale: This future middle verb with ἐπί conveys coming upon someone in a powerful,
    active sense. 'Come upon you' is both natural and close to the Greek.
- source_word: δύναμις Ὑψίστου
  chosen: the power of the Most High
  alternatives:
  - power of the Most High
  - the Most High's power
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly. 'Most High' preserves
    the titular force of Ὑψίστου as a divine title rather than flattening it to a
    mere adjective.
- source_word: ἐπισκιάσει
  chosen: will overshadow you
  alternatives:
  - will cover you with shadow
  - will overshadow
  lexicon: BDAG
  rationale: '''Overshadow'' is the established and lexically fitting rendering, preserving
    the imagery of divine presence without importing sexualized language not present
    in the text.'
- source_word: διὸ καὶ
  chosen: therefore also
  alternatives:
  - therefore
  - for this reason also
  - so also
  lexicon: BDAG
  rationale: The combination marks consequence with slight emphasis. 'Therefore also'
    preserves both inferential and additive force, though in smooth English it functions
    much like 'therefore.'
- source_word: τὸ γεννώμενον
  chosen: the one being born
  alternatives:
  - the child to be born
  - what is being born
  lexicon: BDAG
  rationale: The present passive participle with neuter article is somewhat formal
    and can denote the child in view. 'The one being born' stays close to the Greek
    while remaining intelligible. In the final English text, this is combined with
    ἅγιον as 'the holy one being born' for readability.
- source_word: ἅγιον
  chosen: the holy one
  alternatives:
  - holy
  - set apart
  lexicon: BDAG
  rationale: Here ἅγιον predicates or qualifies the child. Rendering it substantivally
    as 'the holy one' makes good English and preserves the emphasis on the child's
    holiness.
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - will be named
  - will be known as
  lexicon: BDAG
  rationale: Future passive of καλέω commonly means 'will be called/named.' 'Will
    be called' preserves the biblical idiom and leaves room for both naming and recognized
    identity.
- source_word: υἱὸς θεοῦ
  chosen: the Son of God
  alternatives:
  - Son of God
  - a son of God
  lexicon: BDAG
  rationale: Although the Greek lacks the article before υἱός, the expression is qualitative/titular
    in this context, not indefinite. English idiom and christological context strongly
    favor 'the Son of God.'
