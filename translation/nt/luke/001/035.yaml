theological_decisions:
- issue: Rendering Πνεῦμα ἅγιον as a personal divine reference
  chosen_reading: the Holy Spirit
  alternative_readings:
  - holy spirit
  rationale: Luke's context presents God's Spirit as the divine agent in Jesus' conception.
    The translation should not reduce the phrase to an impersonal force. This aligns
    with orthodox Trinitarian reading while remaining faithful to the text's plain
    sense.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD)'
- issue: Rendering υἱὸς θεοῦ with definite force in English
  chosen_reading: the Son of God
  alternative_readings:
  - Son of God
  rationale: The anarthrous Greek does not require indefiniteness. In this annunciation
    context the phrase functions as a christological title. English normally uses
    the definite article for this title, and doing so avoids suggesting merely one
    son among others.
  doctrine_reference: 'Affirmations: Apostles'' Creed; Nicene Creed (381 AD); Definition
    of Chalcedon (451 AD)'
- issue: Avoiding biologically or sexually explicit paraphrase of divine action
  chosen_reading: will overshadow you
  alternative_readings:
  - will cover you
  - will envelop you
  rationale: The text uses reverent, metaphorical language for divine agency. The
    translation preserves that theological restraint and does not import mechanistic
    explanations the Greek does not provide.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants.'
