id: LUK.1.57
reference: Luke 1:57
source:
  edition: SBLGNT
  text: Τῇ δὲ Ἐλισάβετ ἐπλήσθη ὁ χρόνος τοῦ τεκεῖν αὐτήν, καὶ ἐγέννησεν υἱόν.
translation:
  text: Now the time was fulfilled for Elizabeth to give birth, and she bore a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the time came for Elizabeth to give birth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: Used as a mild discourse connector marking narrative progression. 'Now'
    reads naturally in English while preserving the transitional force better than
    omitting it.
- source_word: ἐπλήσθη ὁ χρόνος
  chosen: the time was fulfilled
  alternatives:
  - her time was completed
  - the time came
  - the days were fulfilled
  lexicon: BDAG
  rationale: The Greek is literally 'the time was fulfilled,' a Semitic-style expression
    for the completion of the period of pregnancy. This preserves the source wording
    more closely than the idiomatic 'the time came' while remaining natural English.
- source_word: τοῦ τεκεῖν αὐτήν
  chosen: for Elizabeth to give birth
  alternatives:
  - for her to bear
  - for her delivery
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/result with reference to childbirth.
    'To give birth' is clear modern English and accurately conveys τίκτω in this context.
- source_word: ἐγέννησεν
  chosen: she bore
  alternatives:
  - she gave birth to
  - she delivered
  lexicon: BDAG
  rationale: Aorist narrative verb describing the completed act of childbirth. 'She
    bore' is concise and idiomatic, and pairs naturally with 'a son.'
- source_word: υἱόν
  chosen: a son
  alternatives:
  - a male child
  lexicon: BDAG
  rationale: The noun specifically denotes a son, not merely a child. The gender-specific
    rendering should be preserved per the translation philosophy's gender-accurate
    principle.
- source_word: Ἐλισάβετ
  chosen: Elizabeth
  rationale: Personal names are transliterated by standard English convention.
