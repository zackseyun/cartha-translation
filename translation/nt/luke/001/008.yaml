id: LUK.1.8
reference: Luke 1:8
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ ἱερατεύειν αὐτὸν ἐν τῇ τάξει τῆς ἐφημερίας αὐτοῦ ἔναντι τοῦ
    θεοῦ
translation:
  text: Now it happened, while he was serving as priest before God in the order of
    his division,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was performing priestly service before God in the rotation
      of his division.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  - Now it came about
  lexicon: BDAG
  rationale: Narrative formula introducing a new development. 'Now it happened' preserves
    the event-marking force without archaic English like 'it came to pass.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - but
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative progression rather
    than strong contrast. 'Now' captures the transition naturally in English when
    paired with Ἐγένετο.
- source_word: ἐν τῷ ἱερατεύειν αὐτὸν
  chosen: while he was serving as priest
  alternatives:
  - when he was performing priestly service
  - in his serving as priest
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal ('while/when'). ἱερατεύω
    specifically denotes priestly service, so 'serving as priest' is clearer and more
    natural than a wooden infinitive rendering.
- source_word: τάξει
  chosen: order
  alternatives:
  - arrangement
  - appointed order
  - rank
  lexicon: BDAG
  rationale: In this cultic context, τάξις refers to the prescribed order or arrangement
    of priestly service. 'Order' is concise and idiomatic, especially with the following
    genitive.
- source_word: ἐφημερίας
  chosen: division
  alternatives:
  - course
  - rotation
  - service group
  lexicon: BDAG
  rationale: Refers to the priestly division or scheduled rotation. 'Division' is
    more transparent to modern readers than the traditional 'course' while preserving
    the institutional sense.
- source_word: ἔναντι τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  - in God's sight
  lexicon: BDAG
  rationale: A standard expression indicating service carried out in God's presence.
    'Before God' is both accurate and suitably concise.
