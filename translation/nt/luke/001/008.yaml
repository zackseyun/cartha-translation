theological_decisions:
- issue: Cultic terminology for Zechariah's temple service
  chosen_reading: serving as priest before God in the order of his division
  alternative_readings:
  - performing priestly service before God in the rotation of his division
  rationale: The verse is descriptive rather than doctrinally contested. The chosen
    wording preserves the historical temple-service setting without importing later
    ecclesiastical concepts.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms, or documented exception.'
