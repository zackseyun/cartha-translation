theological_decisions:
- issue: Christological title in υἱὸς Ὑψίστου
  chosen_reading: Rendered as 'Son of the Most High' as a titular designation without
    weakening or paraphrasing the filial claim.
  alternative_readings:
  - '''a son of the Most High'''
  rationale: The context is the angelic announcement concerning Jesus and the phrase
    functions as a royal/divine title. The translation preserves the elevated christological
    force recognized within historic orthodoxy without importing later creedal wording
    beyond the text itself.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering of κύριος
  chosen_reading: Translated as 'Lord' in 'the Lord God.'
  alternative_readings:
  - '''LORD God'''
  - '''Master God'''
  rationale: The doctrine table specifies κύριος defaulting to 'Lord.' Here the referent
    is God, but the Greek text does not use the tetragrammaton, so 'LORD' would over-specify.
  doctrine_reference: 'Contested terms: κύριος → Lord'
- issue: Davidic fatherhood language
  chosen_reading: Retained 'his father' rather than interpretive 'his ancestor.'
  alternative_readings:
  - '''his ancestor'''
  rationale: This preserves the dynastic and covenantal connection to David while
    staying close to the Greek. It avoids flattening the royal-sonship motif into
    mere genealogy.
  doctrine_reference: 'Translation philosophy #1, #5'
