id: LUK.1.32
reference: Luke 1:32
source:
  edition: SBLGNT
  text: οὗτος ἔσται μέγας καὶ υἱὸς Ὑψίστου κληθήσεται, καὶ δώσει αὐτῷ κύριος ὁ θεὸς
    τὸν θρόνον Δαυὶδ τοῦ πατρὸς αὐτοῦ,
translation:
  text: He will be great and will be called Son of the Most High, and the Lord God
    will give him the throne of David his father,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''This one will be great.'' The Greek begins with a demonstrative pronoun:
      ''This one.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'will be named Son of the Most High.'
    reason: lexical_alternative
  - marker: c
    text: '''His father'' refers to David as Jesus'' royal ancestor in the Davidic
      line.'
    reason: cultural_note
lexical_decisions:
- source_word: οὗτος
  chosen: He
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to the child just announced. English
    idiom prefers the personal pronoun 'He' rather than the more wooden 'This one.'
- source_word: ἔσται
  chosen: will be
  lexicon: BDAG
  rationale: Future of εἰμί is straightforwardly rendered 'will be.'
- source_word: μέγας
  chosen: great
  alternatives:
  - important
  - mighty
  lexicon: BDAG
  rationale: '''Great'' preserves the broad sense of exalted significance without
    narrowing the term to power alone.'
- source_word: υἱὸς Ὑψίστου
  chosen: Son of the Most High
  alternatives:
  - a son of the Most High
  lexicon: BDAG
  rationale: Anarthrous υἱός in a titular/predicative construction is best rendered
    without the indefinite article in English. 'Most High' is a standard translation
    of Ὑψίστου and preserves the divine title's biblical resonance.
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - will be named
  lexicon: BDAG
  rationale: Passive future of καλέω here denotes designation/title. 'Will be called'
    is the most natural and transparent rendering.
- source_word: κύριος ὁ θεὸς
  chosen: the Lord God
  alternatives:
  - Lord God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for Kyrios. With
    the article and θεός, the phrase is naturally 'the Lord God' in English.
- source_word: δώσει αὐτῷ
  chosen: will give him
  alternatives:
  - will grant to him
  lexicon: BDAG
  rationale: Simple future of δίδωμι with dative pronoun; 'will give him' is clear
    and idiomatic.
- source_word: τὸν θρόνον Δαυὶδ
  chosen: the throne of David
  alternatives:
  - David's throne
  lexicon: BDAG
  rationale: The genitival construction is preserved more formally as 'the throne
    of David,' which also echoes biblical royal-promise language.
- source_word: τοῦ πατρὸς αὐτοῦ
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: BDAG
  rationale: πατήρ can denote ancestor as well as immediate father, but 'father' is
    the direct lexical equivalent and is conventional in Davidic lineage contexts.
    The dynastic sense can be understood from context without paraphrasing.
