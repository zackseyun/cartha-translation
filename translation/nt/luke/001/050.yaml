id: LUK.1.50
reference: Luke 1:50
source:
  edition: SBLGNT
  text: καὶ τὸ ἔλεος αὐτοῦ εἰς γενεὰς ⸂καὶ γενεὰς⸃ τοῖς φοβουμένοις αὐτόν.
translation:
  text: And his mercy is for generation after generation toward those who fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from generation to generation.' The Greek literally says 'to generations
      and generations,' expressing continuing mercy across successive generations.
    reason: lexical_alternative
  - marker: b
    text: '''Those who fear him'' refers to those who live in reverent awe of God;
      alternatively, ''those who revere him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy, compassion, or kindness shown to one in
    need. 'Mercy' is the most direct and natural rendering here and fits the covenantal
    tone of Mary's song without over-specifying the nuance.
- source_word: εἰς γενεὰς καὶ γενεὰς
  chosen: for generation after generation
  alternatives:
  - to generations and generations
  - from generation to generation
  lexicon: BDAG
  rationale: The phrase expresses extension across successive generations. 'Generation
    after generation' is idiomatic modern English that preserves the distributive
    sense. 'From generation to generation' is traditional and possible, but εἰς more
    directly points to extension 'for' or 'unto' generations rather than source-to-source
    movement.
- source_word: τοῖς φοβουμένοις αὐτόν
  chosen: toward those who fear him
  alternatives:
  - for those who fear him
  - to those who fear him
  - toward those who revere him
  lexicon: BDAG
  rationale: φοβέομαι in relation to God often means reverent fear rather than terror.
    'Those who fear him' preserves the biblical idiom and theological weight better
    than 'revere him,' while 'toward' reflects the directional sense of the clause
    in natural English.
- source_word: καὶ
  chosen: And
  alternatives:
  - —
  lexicon: BDAG
  rationale: The conjunction links this line with the preceding statements in the
    Magnificat. Retaining 'And' preserves the poetic flow and cumulative structure.
- source_word: αὐτοῦ / αὐτόν
  chosen: his / him
  lexicon: BDAG
  rationale: Both pronouns refer to God in the immediate context. Standard English
    pronouns preserve the referential clarity without adding interpretive material.
