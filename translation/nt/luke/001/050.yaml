theological_decisions:
- issue: Meaning of 'fear' in relation to God
  chosen_reading: Rendered as 'fear him' in the main text, understood as reverent
    fear rather than servile terror.
  alternative_readings:
  - revere him
  rationale: The Greek φοβουμένοις can denote fear in the sense of reverence and piety
    when God is the object. Preserving 'fear' maintains biblical diction and theological
    depth, while the rationale clarifies that the sense is covenantal reverence, not
    mere fright.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
