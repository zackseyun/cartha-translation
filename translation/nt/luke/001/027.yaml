id: LUK.1.27
reference: Luke 1:27
source:
  edition: SBLGNT
  text: πρὸς παρθένον ⸀ἐμνηστευμένην ἀνδρὶ ᾧ ὄνομα Ἰωσὴφ ἐξ οἴκου Δαυίδ, καὶ τὸ ὄνομα
    τῆς παρθένου Μαριάμ.
translation:
  text: to a virgin pledged in marriage to a man whose name was Joseph, from the house
    of David; and the virgin’s name was Mary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'betrothed.' The Greek denotes a formal pledged state prior to full marriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'Mariam,' a closer transliteration of the Greek form of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρθένον / παρθένου
  chosen: virgin
  alternatives:
  - young woman
  lexicon: BDAG
  rationale: The standard sense here is 'virgin,' and Luke’s repetition of the term
    in the same verse underscores that meaning. 'Young woman' is possible in some
    contexts for related vocabulary, but here the Greek term and Lukan context support
    'virgin' clearly.
- source_word: ἐμνηστευμένην
  chosen: pledged in marriage
  alternatives:
  - betrothed
  - engaged
  lexicon: BDAG
  rationale: The perfect participle indicates an established state of formal betrothal.
    'Pledged in marriage' communicates the legal/social weight more clearly for modern
    readers than 'engaged,' while remaining more accessible than 'betrothed.'
- source_word: ἀνδρὶ
  chosen: to a man
  alternatives:
  - to a husband
  lexicon: BDAG
  rationale: 'Although ἀνήρ can mean ''man'' or ''husband,'' the syntax with the betrothal
    participle favors ''to a man'' in idiomatic English: she was pledged in marriage
    to a man named Joseph. ''Husband'' would overstate the marriage as already consummated.'
- source_word: ᾧ ὄνομα Ἰωσὴφ
  chosen: whose name was Joseph
  alternatives:
  - to whom the name was Joseph
  lexicon: BDAG
  rationale: This is the natural English rendering of the Greek naming formula. A
    more literal rendering would be awkward and add no transparency.
- source_word: ἐξ οἴκου Δαυίδ
  chosen: from the house of David
  alternatives:
  - of the house of David
  - from the lineage of David
  lexicon: BDAG
  rationale: '''House of David'' preserves the biblical covenantal and dynastic language
    better than the more interpretive ''lineage.'' ''From'' reflects ἐξ naturally.'
- source_word: Μαριάμ
  chosen: Mary
  alternatives:
  - Mariam
  lexicon: BDAG
  rationale: Per translation philosophy, personal names are transliterated by standard
    English conventions. 'Mary' is the established English form; 'Mariam' is closer
    to the Greek form but less standard in English Bible style.
