theological_decisions:
- issue: Whether παρθένος should be rendered in a way that preserves the virginal
    sense relevant to Luke’s infancy narrative
  chosen_reading: virgin
  alternative_readings:
  - young woman
  rationale: Given Luke’s wording and immediate context, rendering παρθένος as 'virgin'
    best reflects the lexical sense and preserves the text’s theological significance
    without importing anything beyond the verse itself.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
