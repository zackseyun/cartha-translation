id: LUK.1.21
reference: Luke 1:21
source:
  edition: SBLGNT
  text: Καὶ ἦν ὁ λαὸς προσδοκῶν τὸν Ζαχαρίαν, καὶ ἐθαύμαζον ἐν τῷ χρονίζειν ⸂ἐν τῷ
    ναῷ αὐτόν⸃.
translation:
  text: And the people were waiting for Zechariah, and they were marveling that he
    was delaying in the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more precisely, “in the sanctuary,” referring to the temple proper rather
      than the wider temple courts.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸς
  chosen: the people
  alternatives:
  - the crowd
  - the people there
  lexicon: BDAG
  rationale: ὁ λαὸς is a collective singular referring to the assembled people outside;
    English idiom prefers the collective sense 'the people' rather than a wooden singular.
- source_word: προσδοκῶν
  chosen: were waiting for
  alternatives:
  - were expecting
  - were awaiting
  lexicon: BDAG
  rationale: The participle with ἦν forms a periphrastic imperfect, conveying ongoing
    action. 'Were waiting for' is natural English and preserves the durative sense
    better than the more formal 'were awaiting.'
- source_word: Ζαχαρίαν
  chosen: Zechariah
  alternatives:
  - Zacharias
  rationale: Personal names are transliterated by standard English convention. 'Zechariah'
    is the familiar modern transliteration for this figure.
- source_word: ἐθαύμαζον
  chosen: they were marveling
  alternatives:
  - they were amazed
  - they were wondering
  lexicon: BDAG
  rationale: The imperfect indicates continued reaction. 'Marveling' preserves the
    sense of astonishment without overinterpreting the cause; 'wondering' would weaken
    the force, while 'amazed' is possible but slightly more result-oriented.
- source_word: ἐν τῷ χρονίζειν
  chosen: that he was delaying
  alternatives:
  - at his delaying
  - because he was taking so long
  - while he was lingering
  lexicon: BDAG
  rationale: The articular infinitive with ἐν can express contemporaneous circumstance
    or occasion. In idiomatic English here, 'that he was delaying' best conveys the
    reason for their marveling while preserving the sense that Zechariah was taking
    longer than expected.
- source_word: ναῷ
  chosen: the temple
  alternatives:
  - the sanctuary
  lexicon: BDAG
  rationale: ναός can denote the inner sanctuary or temple proper, distinct from the
    broader temple precincts (ἱερόν). Since Zechariah had entered the priestly sacred
    space, 'sanctuary' is more precise, but 'temple' is clearer in modern English.
    The more precise alternative is preserved in a footnote.
- source_word: αὐτόν
  chosen: he
  alternatives:
  - him
  lexicon: Greek grammar
  rationale: 'The accusative pronoun is the subject of the infinitive χρονίζειν in
    accusative-and-infinitive construction. English requires a nominative subject
    in the subordinate clause: ''that he was delaying.'''
