id: LUK.1.26
reference: Luke 1:26
source:
  edition: SBLGNT
  text: Ἐν δὲ τῷ μηνὶ τῷ ἕκτῳ ἀπεστάλη ὁ ἄγγελος Γαβριὴλ ⸀ἀπὸ τοῦ θεοῦ εἰς πόλιν τῆς
    Γαλιλαίας ᾗ ὄνομα Ναζαρὲθ
translation:
  text: Now in the sixth month, the angel Gabriel was sent from God to a city of Galilee
    named Nazareth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the sixth month of Elizabeth's pregnancy; see Luke 1:24, 36.
    reason: cross_reference
  - marker: b
    text: Or 'to a city in Galilee named Nazareth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ μηνὶ τῷ ἕκτῳ
  chosen: Now in the sixth month
  alternatives:
  - And in the sixth month
  - In the sixth month
  lexicon: BDAG
  rationale: Ἐν + dative gives the temporal phrase 'in the sixth month.' δέ is a mild
    connective; 'Now' preserves discourse movement in readable English without overstating
    contrast. The article with ἕκτῳ is naturally rendered as 'the sixth month.'
- source_word: ἀπεστάλη
  chosen: was sent
  alternatives:
  - was dispatched
  lexicon: BDAG
  rationale: Aorist passive of ἀποστέλλω is best rendered straightforwardly as 'was
    sent.' This preserves the passive voice and the sense of divine commissioning
    without adding interpretive nuance.
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In this narrative context, ἄγγελος clearly refers to a heavenly angelic
    being, not merely a human messenger, so 'the angel' is the most accurate and natural
    rendering.
- source_word: Γαβριὴλ
  chosen: Gabriel
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἀπὸ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - by God
  lexicon: BDAG
  rationale: 'ἀπό with the genitive most naturally denotes source/origin here: Gabriel
    was sent ''from God.'' ''By God'' would shift toward agency; while implied, the
    Greek wording emphasizes source.'
- source_word: εἰς πόλιν τῆς Γαλιλαίας
  chosen: to a city of Galilee
  alternatives:
  - to a city in Galilee
  lexicon: BDAG
  rationale: εἰς marks destination, 'to.' The genitive τῆς Γαλιλαίας can be rendered
    either 'of Galilee' or idiomatically 'in Galilee.' 'Of Galilee' stays slightly
    closer to the Greek while remaining natural enough in English.
- source_word: ᾗ ὄνομα Ναζαρὲθ
  chosen: named Nazareth
  alternatives:
  - whose name was Nazareth
  - called Nazareth
  lexicon: BDAG
  rationale: This relative construction literally means 'whose name [was] Nazareth.'
    'Named Nazareth' is concise, idiomatic English that preserves the sense without
    awkwardness. 'Called Nazareth' is also possible but slightly less formally tied
    to ὄνομα.
