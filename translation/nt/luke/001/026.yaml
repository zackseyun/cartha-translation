theological_decisions:
- issue: Reference of 'the sixth month'
  chosen_reading: Understood as the sixth month of Elizabeth's pregnancy in the immediate
    narrative context, but translated simply as 'the sixth month' without expansion.
  alternative_readings:
  - A generic sixth month of the year
  rationale: The broader context in Luke 1 points to Elizabeth's pregnancy, but the
    Greek text itself does not restate that referent here. To avoid importing explanatory
    material into the main text, the translation preserves the wording as given.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
