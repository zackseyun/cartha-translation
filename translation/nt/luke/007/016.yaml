id: LUK.7.16
reference: Luke 7:16
source:
  edition: SBLGNT
  text: ἔλαβεν δὲ φόβος πάντας, καὶ ἐδόξαζον τὸν θεὸν λέγοντες ὅτι Προφήτης μέγας ⸀ἠγέρθη ἐν ἡμῖν, καὶ ὅτι Ἐπεσκέψατο ὁ θεὸς τὸν λαὸν αὐτοῦ.
translation:
  text: And fear seized them all, and they were glorifying God, saying, “A great prophet has arisen among us, and God has visited his people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has been raised up among us,” highlighting God’s raising up of a prophet.
    reason: lexical_alternative
  - marker: b
    text: “Has visited” is biblical language for God coming to his people with attention and saving concern.
    reason: cultural_note
  - marker: c
    text: Or '“A great prophet has arisen among us,” and, “God has visited his people.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔλαβεν ... φόβος πάντας
  chosen: fear seized them all
  alternatives:
  - fear took hold of everyone
  - awe seized them all
  lexicon: BDAG
  rationale: The idiom literally reads 'fear took all,' with φόβος as subject. 'Fear seized them all' is natural English and preserves the sudden overpowering sense better than a wooden rendering. 'Awe' is possible contextually after a miracle, but 'fear' more directly reflects φόβος and preserves the tension of reverent fear without interpretation.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective. 'And' is the most natural English link in this narrative context without overemphasizing sequence.
- source_word: ἐδόξαζον τὸν θεὸν
  chosen: they were glorifying God
  alternatives:
  - they glorified God
  - they praised God
  lexicon: BDAG
  rationale: The imperfect ἐδόξαζον suggests ongoing or repeated action, so 'were glorifying' preserves aspect better than simple past. 'Praised' is smoother English but weakens the lexical connection to δοξάζω ('glorify').
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle introduces the content of their glorifying. 'Saying' is concise and natural in English.
- source_word: Προφήτης μέγας
  chosen: A great prophet
  alternatives:
  - A mighty prophet
  - A prophet, great
  lexicon: BDAG
  rationale: This is a straightforward predicate expression. 'Great prophet' is the most idiomatic and preserves the evaluative force of μέγας.
- source_word: ἠγέρθη
  chosen: has arisen
  alternatives:
  - has been raised up
  - was raised up
  - arose
  lexicon: BDAG
  rationale: The passive of ἐγείρω can mean 'be raised up' in the sense of God bringing forth a prophet, echoing biblical prophetic language. 'Has arisen' is idiomatic English and can carry that sense without awkwardness. 'Has been raised up' is more formally transparent and is preserved as an alternative because it may better reflect divine agency.
- source_word: ἐν ἡμῖν
  chosen: among us
  alternatives:
  - in our midst
  - among our people
  lexicon: BDAG
  rationale: '''Among us'' is the most direct and natural rendering of ἐν ἡμῖν in this communal setting.'
- source_word: Ἐπεσκέψατο
  chosen: has visited
  alternatives:
  - has come to help
  - has looked upon
  lexicon: BDAG
  rationale: ἐπισκέπτομαι in biblical usage often carries the sense of visiting with concern, care, or intervention. 'Has visited' preserves the biblical-theological resonance, especially in Luke, without over-specifying the nature of the visitation. More interpretive expansions are avoided in the main text.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - the people belonging to him
  lexicon: BDAG
  rationale: This is the natural English rendering and preserves covenantal overtones present in 'his people'.
