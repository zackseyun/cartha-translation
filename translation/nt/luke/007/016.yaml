theological_decisions:
- issue: Rendering φόβος after a miracle
  chosen_reading: fear
  alternative_readings:
  - awe
  rationale: The verse reports the crowd's response in terms of φόβος. Rendering it as 'fear' preserves the text's stronger and more theologically charged reaction, while readers may infer reverent awe from context. Choosing 'awe' in the main text would resolve that tension interpretively.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sense of ἠγέρθη in reference to a prophet
  chosen_reading: has arisen
  alternative_readings:
  - has been raised up
  rationale: The wording likely evokes God raising up a prophet, but the Greek expression is also idiomatically rendered 'has arisen.' The main text uses the idiomatic English expression while preserving the more formally transparent alternative in documentation, avoiding unnecessary doctrinal over-reading while retaining possible divine agency.
  doctrine_reference: Translation philosophy §1 and §3
- issue: Sense of Ἐπεσκέψατο in divine action
  chosen_reading: has visited his people
  alternative_readings:
  - has come to help his people
  - has looked upon his people
  rationale: Luke often uses visitation language with salvation-historical significance. 'Has visited' preserves that biblical idiom and theological richness without collapsing it into a single explanatory gloss such as 'helped' or 'rescued.'
  doctrine_reference: Translation philosophy §1 and §3
revisions:
- timestamp: '2026-04-21T12:37:01Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/007/016.json
  category: awkward_english
  tier: 1
  from: “A great prophet has arisen among us,” and, “God has visited his people.”
  to: “A great prophet has arisen among us, and God has visited his people.”
  rationale: The Greek presents two parallel clauses (ὅτι... καὶ ὅτι...) as the content of what the people were 'saying' (λέγοντες). Rendering this as two separate quotations connected by 'and,' is grammatically possible but stylistically awkward in English. It fragments what is likely a single, continuous utterance. Combining the two clauses into one quotation creates a more natural and fluid reading that better reflects the unified act of proclamation.
