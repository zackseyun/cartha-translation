theological_decisions:
- issue: Meaning of wisdom's 'children'
  chosen_reading: A metaphor for those who align with or embody God's wisdom, rendered
    literally as 'children' in the main text.
  alternative_readings:
  - The outcomes or fruits produced by wisdom
  - A textual/conceptual harmonization toward 'works' as in Matthew 11:19
  rationale: The Greek text in Luke reads τέκνων ('children'), and the translation
    preserves that image rather than interpreting it in the main text. This maintains
    the saying's metaphorical and theological tension while allowing readers to infer
    that wisdom is shown right by those who respond rightly to God's purposes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
