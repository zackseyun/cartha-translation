id: LUK.7.35
reference: Luke 7:35
source:
  edition: SBLGNT
  text: καὶ ἐδικαιώθη ἡ σοφία ἀπὸ ⸂πάντων τῶν τέκνων αὐτῆς⸃.
translation:
  text: Yet wisdom was vindicated by all her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was justified' or 'was proved right.'
    reason: lexical_alternative
  - marker: b
    text: '''Children'' is a metaphor for those who show the truth of wisdom by their
      response or way of life.'
    reason: lexical_alternative
  - marker: c
    text: Matthew 11:19 reads, 'wisdom is vindicated by her works.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐδικαιώθη
  chosen: was vindicated
  alternatives:
  - was justified
  - was proved right
  lexicon: BDAG
  rationale: Passive aorist of δικαιόω here refers not to forensic justification in
    the Pauline sense but to being shown or acknowledged as right. 'Vindicated' preserves
    the passive form and the public-confirmation sense in context.
- source_word: σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering of σοφία. In context it is personified, so the English
    keeps the abstract noun and allows the following feminine pronoun to carry the
    personification.
- source_word: ἀπὸ πάντων
  chosen: by all
  alternatives:
  - from all
  lexicon: BDAG
  rationale: Although ἀπό commonly means 'from,' with passive verbs it can mark personal
    agency or source. In idiomatic English, 'by all' best conveys that wisdom is vindicated
    by the testimony/evidence of those associated with her.
- source_word: τέκνων
  chosen: children
  alternatives:
  - offspring
  - deeds
  lexicon: BDAG
  rationale: The direct lexical sense of τέκνον is 'child.' Some manuscripts in the
    Matthean parallel read 'works,' and some interpreters take 'children' metaphorically
    for followers or results, but the Lukan text here is best rendered straightforwardly
    as 'children,' preserving the personification of wisdom.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: BDAG
  rationale: The pronoun agrees with the grammatically feminine σοφία. English 'her'
    best preserves the personified portrayal of wisdom in this saying.
- source_word: καὶ
  chosen: Yet
  alternatives:
  - And
  lexicon: BDAG
  rationale: While καί often means 'and,' here a mildly adversative sense fits the
    discourse after Jesus' critique of the generation's inconsistency. 'Yet' brings
    out the contrast without overtranslating.
