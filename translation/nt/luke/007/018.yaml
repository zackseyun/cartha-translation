id: LUK.7.18
reference: Luke 7:18
source:
  edition: SBLGNT
  text: Καὶ ἀπήγγειλαν Ἰωάννῃ οἱ μαθηταὶ αὐτοῦ περὶ πάντων τούτων. καὶ προσκαλεσάμενος
    δύο τινὰς τῶν μαθητῶν αὐτοῦ ὁ Ἰωάννης
translation:
  text: And his disciples reported all these things to John. And John, calling two
    of his disciples to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoning two of his disciples.'
    reason: lexical_alternative
  - marker: b
    text: The Greek sentence continues into the next verse; this translation preserves
      the unfinished sense with a trailing comma.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: The verb means to report or bring news. 'Reported' fits the narrative
    register and preserves the sense of relaying information without overstating formality.
- source_word: Ἰωάννῃ
  chosen: to John
  rationale: Dative indirect object; standard English idiom requires 'to John.' The
    personal name is transliterated per project philosophy.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί
    in Gospel contexts, preserving the teacher-follower relationship better than ''students''
    or the broader ''followers.'''
- source_word: περὶ πάντων τούτων
  chosen: all these things
  alternatives:
  - about all these things
  - concerning all these things
  lexicon: BDAG
  rationale: English naturally omits an explicit preposition after 'reported' while
    still conveying περὶ. 'All these things' preserves the comprehensiveness of πάντων
    and the demonstrative force of τούτων.
- source_word: προσκαλεσάμενος
  chosen: calling ... to him
  alternatives:
  - summoning
  - calling
  lexicon: BDAG
  rationale: The middle participle indicates John initiated the action of calling
    for certain disciples. 'Calling ... to him' makes the directional sense explicit
    and reads naturally in English.
- source_word: δύο τινὰς
  chosen: two
  alternatives:
  - two certain
  - two of them
  lexicon: BDAG
  rationale: τινάς here is an indefinite nuance accompanying the numeral, but in English
    'two of his disciples' sufficiently conveys the selection without awkwardness.
    The specificity is not strong enough to require 'two certain disciples' in the
    main text.
- source_word: τῶν μαθητῶν αὐτοῦ
  chosen: of his disciples
  alternatives:
  - from among his disciples
  rationale: 'The genitive is partitive: John selected two from the group of his disciples.
    ''Of his disciples'' is concise and idiomatic.'
- source_word: ὁ Ἰωάννης
  chosen: John
  rationale: Though the Greek repeats the subject explicitly after the participle,
    English style normally omits a second full expression and uses 'And John' to begin
    the clause naturally while preserving the subject identification.
