theological_decisions:
- issue: Rendering of δαιμόνιον in an accusation against John
  chosen_reading: demon
  alternative_readings:
  - unclean spirit
  rationale: δαιμόνιον is best rendered 'demon' in this Gospel context. 'Unclean spirit'
    is a related but distinct expression not used here, so the translation should
    not harmonize terminology.
