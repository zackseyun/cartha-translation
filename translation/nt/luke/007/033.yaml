id: LUK.7.33
reference: Luke 7:33
source:
  edition: SBLGNT
  text: ἐλήλυθεν γὰρ Ἰωάννης ὁ βαπτιστὴς ⸀μὴ ⸂ἐσθίων ἄρτον μήτε πίνων οἶνον⸃, καὶ
    λέγετε· Δαιμόνιον ἔχει·
translation:
  text: For John the Baptist has come eating no bread and drinking no wine, and you
    say, ‘He has a demon.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “He is demon-possessed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθεν
  chosen: has come
  alternatives:
  - came
  lexicon: BDAG
  rationale: Perfect tense of ἔρχομαι is rendered with present relevance ('has come'),
    preserving the force of John's arrival and presence in the discourse rather than
    flattening it to a simple past.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation for the preceding statement; 'For' is natural and sufficiently
    formal in context.
- source_word: Ἰωάννης ὁ βαπτιστὴς
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: Standard English transliteration plus recognized title. 'Baptist' is
    idiomatic and identifies the historical figure clearly, though 'Baptizer' is more
    transparently verbal.
- source_word: μὴ ἐσθίων ἄρτον μήτε πίνων οἶνον
  chosen: eating no bread and drinking no wine
  alternatives:
  - not eating bread or drinking wine
  - eating no food and drinking no wine
  lexicon: BDAG
  rationale: The participial construction describes John's ascetic manner. 'Eating
    no bread and drinking no wine' closely follows the Greek while remaining natural.
    ἄρτον is kept as 'bread' rather than generalized to 'food' to preserve the concrete
    wording.
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Present indicative addressing the audience's characteristic response;
    simple present is idiomatic in English.
- source_word: Δαιμόνιον ἔχει
  chosen: He has a demon
  alternatives:
  - He is demon-possessed
  lexicon: BDAG
  rationale: A direct, transparent rendering of the Greek expression. 'He is demon-possessed'
    is interpretive and more idiomatic, but 'has a demon' better preserves the source
    wording and rhetorical force.
