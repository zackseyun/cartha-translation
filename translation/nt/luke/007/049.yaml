theological_decisions:
- issue: Implication of Jesus's authority to forgive sins
  chosen_reading: 'Retain the guests'' question without interpretive expansion: ''Who
    is this, who even forgives sins?'''
  alternative_readings:
  - Who is this man, who even forgives sins?
  rationale: The verse presents the astonished reaction of the dinner guests and implicitly
    raises Christological questions, but it does not itself state an explanatory conclusion.
    The translation therefore preserves the tension and does not import doctrinal
    commentary into the text, while still rendering the force of their astonishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
