id: LUK.7.49
reference: Luke 7:49
source:
  edition: SBLGNT
  text: καὶ ἤρξαντο οἱ συνανακείμενοι λέγειν ἐν ἑαυτοῖς· Τίς οὗτός ἐστιν ὃς καὶ ἁμαρτίας
    ἀφίησιν;
translation:
  text: And those reclining at the table with him began to say among themselves, “Who
    is this, who even forgives sins?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to say to themselves.' The Greek expression may suggest either private
      reflection or discussion among the guests.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive aorist of ἄρχω with an infinitive commonly marks the beginning
    of an action. 'Began' is natural modern English and preserves the aspectual force.
- source_word: συνανακείμενοι
  chosen: those reclining at the table with him
  alternatives:
  - those reclining together
  - the fellow guests
  - those who were at table with him
  lexicon: BDAG
  rationale: The participle refers to those dining with Jesus in the ancient posture
    of reclining at table. Rendering the cultural action explicitly preserves the
    meal setting better than the vaguer 'those who sat at table,' while adding 'with
    him' brings out the συν- prefix and the narrative context.
- source_word: λέγειν ἐν ἑαυτοῖς
  chosen: to say among themselves
  alternatives:
  - to say within themselves
  - to say to themselves
  lexicon: BDAG
  rationale: The idiom can denote internal or mutual speech. Because the subject is
    plural dinner guests reacting together, 'among themselves' best fits the social
    setting without overstating whether the speech was fully public.
- source_word: Τίς οὗτός ἐστιν
  chosen: Who is this
  alternatives:
  - Who is this man
  lexicon: BDAG
  rationale: The Greek does not include ἄνθρωπος ('man'), so the shorter rendering
    is preferable and preserves the abruptness of the question.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  lexicon: BDAG
  rationale: Here καί is ascensive, expressing surprise at the scope of Jesus's action.
    'Even' captures the rhetorical force better than the flatter 'also.'
- source_word: ἁμαρτίας ἀφίησιν
  chosen: forgives sins
  alternatives:
  - releases sins
  - pardons sins
  lexicon: BDAG
  rationale: ἀφίημι in this context is the standard idiom for forgiving sins. 'Forgives'
    is the clearest and most established English equivalent, and it preserves the
    theological significance of the claim.
