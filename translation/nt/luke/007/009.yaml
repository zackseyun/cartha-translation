theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. In this context the centurion's believing
    confidence in Jesus' authority is in view, not primarily his faithfulness as a
    trait.
