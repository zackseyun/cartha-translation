id: LUK.7.9
reference: Luke 7:9
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ταῦτα ὁ Ἰησοῦς ἐθαύμασεν αὐτόν, καὶ στραφεὶς τῷ ἀκολουθοῦντι αὐτῷ
    ὄχλῳ εἶπεν· Λέγω ὑμῖν, ⸀οὐδὲ ἐν τῷ Ἰσραὴλ τοσαύτην πίστιν εὗρον.
translation:
  text: When Jesus heard these things, he marveled at him, and turning to the crowd
    following him, he said, “I tell you, not even in Israel have I found such faith.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “so great a faith.”
    reason: lexical_alternative
  - marker: b
    text: Or “trust”; the Greek word is the same term often translated “faith.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  chosen: When Jesus heard
  alternatives:
  - After Jesus heard
  - Hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    'When Jesus heard' is natural English and preserves the temporal sense without
    awkwardness.
- source_word: δὲ
  chosen: '[implicit transition]'
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition. English does not require an explicit
    connective here; the flow is preserved without adding stiffness.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - what he heard
  lexicon: BDAG
  rationale: Plural demonstrative is best retained as 'these things,' referring to
    the centurion's reported words.
- source_word: ἐθαύμασεν
  chosen: marveled
  alternatives:
  - was amazed
  - wondered at
  lexicon: BDAG
  rationale: θαυμάζω denotes amazement or wonder. 'Marveled' preserves the elevated
    narrative tone and avoids implying ignorance in Jesus while still reflecting genuine
    astonishment.
- source_word: αὐτόν
  chosen: at him
  alternatives:
  - at this man
  - at him/the centurion
  lexicon: BDAG
  rationale: The pronoun refers to the centurion. English idiom with 'marveled' normally
    takes 'at him,' making the object relation clear.
- source_word: στραφεὶς
  chosen: turning
  alternatives:
  - having turned
  - and he turned
  lexicon: BDAG
  rationale: 'Aorist passive participle used in a deponent-like sense in narrative:
    ''turning'' is concise and natural in English.'
- source_word: τῷ ἀκολουθοῦντι αὐτῷ ὄχλῳ
  chosen: to the crowd following him
  alternatives:
  - to the crowd that was following him
  - to the crowd accompanying him
  lexicon: BDAG
  rationale: The present participle ἀκολουθοῦντι conveys ongoing action. 'Following
    him' is the most direct and idiomatic rendering.
- source_word: Λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common discourse formula. 'I tell you' is idiomatic modern English
    while preserving the force of direct address.
- source_word: οὐδὲ ἐν τῷ Ἰσραὴλ
  chosen: not even in Israel
  alternatives:
  - not even among Israel
  - not even in the people of Israel
  lexicon: BDAG
  rationale: The phrase is locative and conventional. 'In Israel' is the most natural
    rendering, with the understood sense of within Israel/the people of Israel.
- source_word: τοσαύτην πίστιν
  chosen: such faith
  alternatives:
  - so great a faith
  - such great faith
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine guidance. τοσαύτην intensifies
    the quality/degree; 'such faith' is concise and faithful, while 'so great a faith'
    is a viable traditional alternative.
- source_word: εὗρον
  chosen: have I found
  alternatives:
  - I found
  lexicon: BDAG
  rationale: 'Although the Greek aorist is formally past, in this declaration English
    present perfect naturally conveys the force of experience up to the present: ''have
    I found.'' This is a standard optimal-equivalence adjustment.'
