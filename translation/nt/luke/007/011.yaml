id: LUK.7.11
reference: Luke 7:11
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ ἑξῆς ⸀ἐπορεύθη εἰς πόλιν καλουμένην Ναΐν, καὶ συνεπορεύοντο
    αὐτῷ οἱ μαθηταὶ ⸀αὐτοῦ καὶ ὄχλος πολύς.
translation:
  text: And it happened on the next day that he went into a town called Nain, and
    his disciples and a large crowd were going with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'soon afterward' instead of 'on the next day.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: A common Lukan narrative formula. 'It happened' preserves the event-introducing
    function without archaic English like 'it came to pass.'
- source_word: ἐν τῷ ἑξῆς
  chosen: on the next day
  alternatives:
  - soon afterward
  - on the following day
  lexicon: BDAG
  rationale: The phrase literally means 'in the next [time],' and in context most
    naturally refers to the next day. 'Soon afterward' reflects a variant reading
    in some manuscripts, but the SBLGNT text supports 'on the next day.'
- source_word: ἐπορεύθη
  chosen: he went
  alternatives:
  - he traveled
  - he journeyed
  lexicon: BDAG
  rationale: Aorist middle of πορεύομαι commonly means 'go' or 'travel.' 'Went' is
    the most natural English narrative rendering here.
- source_word: εἰς πόλιν
  chosen: into a town
  alternatives:
  - to a town
  - into a city
  lexicon: BDAG
  rationale: πόλις can mean either 'city' or 'town.' Since Nain was a smaller settlement,
    'town' is more natural in modern English. 'Into' reflects εἰς straightforwardly.
- source_word: καλουμένην Ναΐν
  chosen: called Nain
  alternatives:
  - named Nain
  lexicon: BDAG
  rationale: The participle καλουμένην is idiomatically rendered 'called.' 'Nain'
    is transliterated as a place name in keeping with the translation philosophy.
- source_word: συνεπορεύοντο
  chosen: were going with him
  alternatives:
  - were traveling with him
  - accompanied him
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing accompanying movement. 'Were going
    with him' preserves both the motion and the durative sense better than the more
    compressed 'accompanied him.'
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the noun phrase; μαθηταί in the Gospels
    is consistently rendered 'disciples.'
- source_word: ὄχλος πολύς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is 'crowd' and πολύς intensifies size. 'Large crowd' is clear modern
    English; 'great crowd' is possible but can sound slightly elevated or ambiguous
    in contemporary usage.
