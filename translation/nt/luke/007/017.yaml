id: LUK.7.17
reference: Luke 7:17
source:
  edition: SBLGNT
  text: καὶ ἐξῆλθεν ὁ λόγος οὗτος ἐν ὅλῃ τῇ Ἰουδαίᾳ περὶ αὐτοῦ ⸀καὶ πάσῃ τῇ περιχώρῳ.
translation:
  text: And this report about him went out through all Judea and all the surrounding
    region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this news about him' or 'this word about him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is literally 'went out.' 'Spread' captures the idiom
    but is less formally transparent; 'went out' preserves the imagery while remaining
    natural in English.
- source_word: ὁ λόγος οὗτος
  chosen: this report
  alternatives:
  - this word
  - this news
  - this account
  lexicon: BDAG
  rationale: λόγος here refers not to a single spoken 'word' but to the matter or
    report concerning Jesus' act. 'Report' best fits the narrative context of news
    circulating after the miracle.
- source_word: ἐν ὅλῃ τῇ Ἰουδαίᾳ
  chosen: through all Judea
  alternatives:
  - in all Judea
  - throughout all Judea
  lexicon: BDAG
  rationale: With a verb of movement/dissemination, English idiom prefers 'through
    all Judea' or 'throughout all Judea.' 'Through all Judea' preserves the distributive
    sense of ἐν with ὅλῃ in context.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' 'About
    him' is the most natural modern English rendering.
- source_word: πάσῃ τῇ περιχώρῳ
  chosen: all the surrounding region
  alternatives:
  - the whole surrounding area
  - all the neighboring district
  - all the surrounding country
  lexicon: BDAG
  rationale: περίχωρος used substantivally denotes the surrounding area/region. 'Region'
    is clear and natural; 'country' may sound archaic or overly rural, and 'district'
    can sound too administrative.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates two geographic spheres. Simple repetition
    in English preserves the cumulative force without overformalizing the sentence.
