id: LUK.7.44
reference: Luke 7:44
source:
  edition: SBLGNT
  text: καὶ στραφεὶς πρὸς τὴν γυναῖκα τῷ Σίμωνι ἔφη· Βλέπεις ταύτην τὴν γυναῖκα; εἰσῆλθόν
    σου εἰς τὴν οἰκίαν, ὕδωρ ⸀μοι ἐπὶ ⸀πόδας οὐκ ἔδωκας· αὕτη δὲ τοῖς δάκρυσιν ἔβρεξέν
    μου τοὺς πόδας καὶ ταῖς ⸀θριξὶν αὐτῆς ἐξέμαξεν.
translation:
  text: And turning toward the woman, he said to Simon, “Do you see this woman? I
    entered your house; you gave me no water for my feet, but she has wet my feet
    with her tears and wiped them with her hair.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'you gave me no water upon my feet.' The sense is the
      customary provision of water for foot washing.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turning toward
  alternatives:
  - having turned
  - turning
  lexicon: BDAG
  rationale: Aorist participle introducing the action preceding the speech. 'Turning
    toward' is natural English and preserves the physical reorientation toward the
    woman.
- source_word: γυναῖκα
  chosen: woman
  alternatives:
  - wife
  - lady
  lexicon: BDAG
  rationale: In context this clearly refers to the female person present, not 'wife.'
    'Woman' is the plain and accurate rendering.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: Idiomatic narrative rendering of the imperfect of φημί in this context;
    English simple past best fits the discourse flow.
- source_word: Βλέπεις
  chosen: Do you see
  alternatives:
  - Do you notice
  - Are you looking at
  lexicon: BDAG
  rationale: Retains the direct force of the present indicative as a rhetorical question
    addressed to Simon.
- source_word: ταύτην τὴν γυναῖκα
  chosen: this woman
  alternatives:
  - this woman here
  lexicon: BDAG
  rationale: The demonstrative ταύτην is preserved by 'this,' highlighting the contrast
    Jesus is drawing.
- source_word: εἰσῆλθόν σου εἰς τὴν οἰκίαν
  chosen: I entered your house
  alternatives:
  - I came into your house
  - I entered your home
  lexicon: BDAG
  rationale: Straightforward aorist narrative statement. 'House' is preferred over
    'home' for closer correspondence to οἰκία while remaining natural.
- source_word: ὕδωρ μοι ἐπὶ πόδας οὐκ ἔδωκας
  chosen: you gave me no water for my feet
  alternatives:
  - you did not give me water for my feet
  - you gave me no water to wash my feet
  lexicon: BDAG
  rationale: The Greek explicitly mentions giving water, not the act of washing; 'for
    my feet' captures ἐπὶ πόδας without over-specifying beyond the text.
- source_word: αὕτη δὲ
  chosen: but she
  alternatives:
  - but this woman
  - yet she
  lexicon: BDAG
  rationale: Marks the contrast with Simon succinctly and naturally in English.
- source_word: τοῖς δάκρυσιν ἔβρεξέν μου τοὺς πόδας
  chosen: has wet my feet with her tears
  alternatives:
  - has drenched my feet with her tears
  - wet my feet with tears
  lexicon: BDAG
  rationale: βρέχω means to wet or moisten. 'Has wet' is accurate and, with the present
    relevance in the scene, reads naturally in English. 'With her tears' makes explicit
    the instrumental dative.
- source_word: ταῖς θριξὶν αὐτῆς ἐξέμαξεν
  chosen: wiped them with her hair
  alternatives:
  - wiped them dry with her hair
  - wiped them with the hair of her head
  lexicon: BDAG
  rationale: ἐκμάσσω means to wipe off or wipe dry. 'Wiped them with her hair' is
    idiomatic and sufficiently precise; 'them' refers back to 'my feet' to avoid awkward
    repetition.
