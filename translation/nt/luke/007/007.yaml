id: LUK.7.7
reference: Luke 7:7
source:
  edition: SBLGNT
  text: διὸ οὐδὲ ἐμαυτὸν ἠξίωσα πρὸς σὲ ἐλθεῖν· ἀλλὰ εἰπὲ λόγῳ, καὶ ⸀ἰαθήτω ὁ παῖς
    μου·
translation:
  text: Therefore I did not even consider myself worthy to come to you. But say the
    word, and let my servant be healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my boy' or 'my child'; the Greek word can refer to a child, youth, or
      servant, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inference from the previous statement; 'Therefore' preserves
    the logical connection in natural English.
- source_word: οὐδὲ
  chosen: did not even
  alternatives:
  - not even
  - nor
  lexicon: BDAG
  rationale: 'With the verb, it intensifies the negation: the speaker did not even
    regard himself as fit to come.'
- source_word: ἐμαυτὸν ἠξίωσα
  chosen: I considered myself worthy
  alternatives:
  - I counted myself worthy
  - I thought myself fit
  lexicon: BDAG
  rationale: ἀξιόω here means to regard as worthy or deserving. The reflexive object
    requires an English reflexive construction.
- source_word: πρὸς σὲ ἐλθεῖν
  chosen: to come to you
  alternatives:
  - to approach you
  lexicon: BDAG
  rationale: A straightforward infinitival phrase indicating personal approach to
    Jesus.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Introduces the contrasting request in simple, natural English.
- source_word: εἰπὲ λόγῳ
  chosen: say the word
  alternatives:
  - speak a word
  - give the command
  lexicon: BDAG
  rationale: An idiomatic dative construction. 'Say the word' is natural English and
    captures the centurion's confidence in Jesus' authoritative speech. The definite
    article is not present in Greek, but English idiom strongly favors 'the word'
    here.
- source_word: ἰαθήτω
  chosen: let ... be healed
  alternatives:
  - and ... will be healed
  - heal
  lexicon: BDAG
  rationale: Aorist passive imperative, third singular. 'Let ... be healed' preserves
    the imperative force directed toward the desired result. Some English versions
    smooth this to a future ('will be healed'), but the Greek form is imperative,
    not indicative.
- source_word: ὁ παῖς μου
  chosen: my servant
  alternatives:
  - my boy
  - my child
  lexicon: BDAG
  rationale: παῖς can mean child, boy, or servant depending on context. In this centurion
    narrative, the social relationship and the parallel in the immediate context favor
    'servant' as the clearest rendering, while preserving the lexical range in a footnote.
