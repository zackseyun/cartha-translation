theological_decisions:
- issue: Rendering of παῖς in the centurion narrative
  chosen_reading: my servant
  alternative_readings:
  - my boy
  - my child
  rationale: The term is semantically broad, but in context the centurion is speaking
    of someone under his authority within his household. Rendering it as 'servant'
    best fits the narrative setting without importing additional theological claims.
    Because the term can also carry a more affectionate or familial nuance, the alternatives
    are preserved in a footnote.
