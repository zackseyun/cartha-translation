theological_decisions:
- issue: Social-honor contrast in Jesus' rebuke
  chosen_reading: Render the contrast plainly without importing symbolic sacramental
    or christological overtones into the wording.
  alternative_readings:
  - Use more ceremonially loaded language that could imply formal consecration
  rationale: The verse contrasts Simon's failure to offer customary hospitality with
    the woman's extravagant honor. While 'anoint' is appropriate lexically, the translation
    should not overstate the act beyond what the immediate context warrants.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
