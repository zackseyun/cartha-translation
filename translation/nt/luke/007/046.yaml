id: LUK.7.46
reference: Luke 7:46
source:
  edition: SBLGNT
  text: ἐλαίῳ τὴν κεφαλήν μου οὐκ ἤλειψας· αὕτη δὲ μύρῳ ἤλειψεν ⸂τοὺς πόδας μου⸃.
translation:
  text: You did not anoint my head with oil, but she has anointed my feet with perfume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fragrant oil' or 'with ointment' for 'with perfume.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαίῳ
  chosen: with oil
  alternatives:
  - with olive oil
  lexicon: BDAG
  rationale: Dative of means/instrument from ἔλαιον. 'Oil' is the natural English
    rendering here; 'olive oil' is more specific but unnecessary in context.
- source_word: ἤλειψας / ἤλειψεν
  chosen: anoint / has anointed
  alternatives:
  - rubbed
  - smeared
  lexicon: BDAG
  rationale: ἀλείφω commonly means to anoint or apply oil/ointment. 'Anoint' best
    fits both the social custom of honoring a guest and the parallel with perfume.
    The English present perfect in the second clause reflects the action's relevance
    in the present scene, while remaining natural in English narrative.
- source_word: κεφαλήν μου
  chosen: my head
  lexicon: BDAG
  rationale: Direct and literal rendering of the accusative object with possessive
    pronoun.
- source_word: αὕτη δὲ
  chosen: but she
  alternatives:
  - but this woman
  lexicon: BDAG
  rationale: αὕτη points emphatically to the woman present. 'But she' preserves the
    contrast with the preceding 'you' and reads naturally in English; 'this woman'
    is possible but slightly more marked than required here.
- source_word: μύρῳ
  chosen: with perfume
  alternatives:
  - with fragrant oil
  - with ointment
  lexicon: BDAG
  rationale: μύρον denotes perfumed oil/ointment. 'Perfume' is concise, idiomatic,
    and preserves the contrast with ordinary oil in the first clause.
- source_word: τοὺς πόδας μου
  chosen: my feet
  lexicon: BDAG
  rationale: Literal rendering of the accusative object with possessive pronoun; the
    plural 'feet' is required by English idiom.
