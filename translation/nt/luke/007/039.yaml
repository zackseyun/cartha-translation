theological_decisions:
- issue: Force of the conditional statement about Jesus being a prophet
  chosen_reading: 'Rendered as a contrary-to-fact condition: ''If this man were a
    prophet, he would know ...'''
  alternative_readings:
  - 'More neutral English: ''If this man is a prophet, he knows/would know ...'''
  rationale: The combination εἰ ἦν ... ἐγίνωσκεν ἂν naturally conveys the Pharisee's
    skeptical, unreal condition. This preserves the narrative tension without endorsing
    the Pharisee's judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
