id: LUK.7.39
reference: Luke 7:39
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ὁ Φαρισαῖος ὁ καλέσας αὐτὸν εἶπεν ἐν ἑαυτῷ λέγων· Οὗτος εἰ ⸀ἦν προφήτης,
    ἐγίνωσκεν ἂν τίς καὶ ποταπὴ ἡ γυνὴ ἥτις ἅπτεται αὐτοῦ, ὅτι ἁμαρτωλός ἐστιν.
translation:
  text: Now when the Pharisee who had invited him saw this, he said to himself, “If
    this man were a prophet, he would know who and what sort of woman this is who
    is touching him, because she is a sinner.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who and what kind of woman this is.' The Greek stresses both her identity
      and her character/reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'that she is a sinner.' The clause may be heard either as the content
      of what he would know or as the reason for the woman's character.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw this
  alternatives:
  - seeing
  - when he saw
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verb; in
    English, 'when ... saw this' naturally conveys the temporal force. 'This' is supplied
    from context because the participle is absolute in English and refers to the immediately
    preceding action.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative development rather than strong contrast; 'Now'
    is a natural discourse marker in modern English.
- source_word: ὁ Φαρισαῖος
  chosen: the Pharisee
  lexicon: BDAG
  rationale: Standard rendering of the group designation; definite article retained
    in sense.
- source_word: ὁ καλέσας αὐτὸν
  chosen: who had invited him
  alternatives:
  - who had called him
  - who invited him
  lexicon: BDAG
  rationale: καλέω in meal-hosting context means 'invite' rather than merely 'call.'
    Pluperfect-like English ('had invited') clarifies prior action relative to 'saw'
    and 'said'.
- source_word: εἶπεν ἐν ἑαυτῷ λέγων
  chosen: he said to himself
  alternatives:
  - he said within himself
  - he spoke to himself, saying
  lexicon: BDAG
  rationale: The idiom ἐν ἑαυτῷ indicates internal speech. English does not need to
    reproduce both εἶπεν and λέγων woodenly; 'said to himself' captures the sense
    cleanly.
- source_word: Οὗτος
  chosen: this man
  alternatives:
  - this one
  - this
  lexicon: BDAG
  rationale: Demonstrative used dismissively of Jesus; 'this man' conveys the Pharisee's
    distancing tone better than bare 'this' in English.
- source_word: εἰ ἦν προφήτης
  chosen: If this man were a prophet
  alternatives:
  - if he were a prophet
  - if this one were a prophet
  lexicon: BDAG
  rationale: The condition is contrary to the Pharisee's assumption; English subjunctive
    'were' best reflects that nuance.
- source_word: ἐγίνωσκεν ἂν
  chosen: he would know
  alternatives:
  - he would be knowing
  - he would recognize
  lexicon: BDAG
  rationale: Imperfect with ἄν in the apodosis expresses a contrary-to-fact result;
    'would know' is the idiomatic English equivalent.
- source_word: τίς καὶ ποταπὴ
  chosen: who and what sort of
  alternatives:
  - who and what kind of
  - who and of what sort
  lexicon: BDAG
  rationale: The paired interrogatives stress both identity and character/reputation.
    'Who and what sort of' preserves both elements.
- source_word: ἡ γυνὴ ἥτις ἅπτεται αὐτοῦ
  chosen: woman this is who is touching him
  alternatives:
  - woman this is who touches him
  - woman who is touching him
  lexicon: BDAG
  rationale: ἥτις is qualitative/indefinite relative, and ἅπτεται is present middle,
    indicating ongoing contact. 'Who is touching him' preserves the present aspect
    better than a simple past.
- source_word: ἅπτεται
  chosen: is touching
  alternatives:
  - touches
  - is laying hold of
  lexicon: BDAG
  rationale: Present tense suggests the action is in progress in the scene. 'Touching'
    is the natural rendering here.
- source_word: ὅτι ἁμαρτωλός ἐστιν
  chosen: because she is a sinner
  alternatives:
  - that she is a sinner
  - for she is a sinner
  lexicon: BDAG
  rationale: ὅτι here gives the content/reason underlying the Pharisee's judgment.
    'Because' makes explicit the causal force in context. ἁμαρτωλός, feminine in agreement
    with γυνή, is rendered idiomatically as 'a sinner.'
