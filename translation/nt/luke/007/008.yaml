theological_decisions:
- issue: Rendering of δοῦλος in the centurion's analogy
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse is not making a doctrinal claim about slavery, but the authority
    structure is central to the analogy. Following the project's contested-terms guidance,
    'slave' is preferred where bonded status is salient. Because English readers may
    also understand δοῦλος more broadly as household servant in some contexts, the
    alternative is preserved in a footnote rather than silently resolved.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy points 1 and 5'
