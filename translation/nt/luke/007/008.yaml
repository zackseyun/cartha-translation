id: LUK.7.8
reference: Luke 7:8
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐγὼ ἄνθρωπός εἰμι ὑπὸ ἐξουσίαν τασσόμενος, ἔχων ὑπ’ ἐμαυτὸν στρατιώτας,
    καὶ λέγω τούτῳ· Πορεύθητι, καὶ πορεύεται, καὶ ἄλλῳ· Ἔρχου, καὶ ἔρχεται, καὶ τῷ
    δούλῳ μου· Ποίησον τοῦτο, καὶ ποιεῖ.
translation:
  text: For I too am a man placed under authority, with soldiers under me; and I say
    to this one, ‘Go,’ and he goes; and to another, ‘Come,’ and he comes; and to my
    slave, ‘Do this,’ and he does it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (Greek doulos). The term denotes a subordinate
      in a bonded or owned status, though in some contexts it can be rendered more
      generally as 'servant.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For
  alternatives:
  - For indeed
  - Because
  lexicon: BDAG
  rationale: The combination introduces the centurion's explanation or grounds for
    his statement. 'For' is natural English and preserves the explanatory force without
    overtranslating γάρ or awkwardly retaining καί.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek for emphasis. English can carry the
    emphasis adequately in context without adding 'myself'; the following 'too' captures
    the comparative emphasis.
- source_word: ἄνθρωπός εἰμι
  chosen: am a man
  alternatives:
  - am human
  - am a person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a human being in ordinary status, contrasted
    implicitly with Jesus' authority. 'A man' is the most natural and gender-accurate
    rendering in context, since the speaker is male and speaking personally, not generically.
- source_word: ὑπὸ ἐξουσίαν τασσόμενος
  chosen: placed under authority
  alternatives:
  - under authority
  - appointed under authority
  - set under authority
  lexicon: BDAG
  rationale: The participle τασσόμενος conveys being appointed/ordered in a structure.
    'Placed under authority' preserves both the passive sense and the military chain-of-command
    nuance better than the flatter 'under authority' alone.
- source_word: ἔχων ὑπ’ ἐμαυτὸν στρατιώτας
  chosen: with soldiers under me
  alternatives:
  - having soldiers under me
  - with soldiers under my command
  lexicon: BDAG
  rationale: This participial phrase explains the centurion's own delegated authority.
    'With soldiers under me' is concise, idiomatic, and preserves the hierarchical
    sense. 'Under my command' is interpretive but possible; the more literal 'under
    me' better matches the Greek.
- source_word: λέγω τούτῳ
  chosen: I say to this one
  alternatives:
  - I tell this one
  - I say to one
  lexicon: BDAG
  rationale: τούτῳ is demonstrative, not merely an indefinite pronoun. 'This one'
    preserves the deictic force and the stylized example structure of the saying.
- source_word: Πορεύθητι
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: The aorist middle imperative of πορεύομαι commonly functions as a straightforward
    command to depart. 'Go' is the standard and sufficient English equivalent here.
- source_word: πορεύεται
  chosen: he goes
  alternatives:
  - he departs
  lexicon: BDAG
  rationale: The present tense here states the expected result of the command. 'He
    goes' is simple and mirrors the command-response pattern.
- source_word: ἄλλῳ
  chosen: another
  alternatives:
  - another one
  lexicon: BDAG
  rationale: A straightforward dative of indirect object. 'Another' is idiomatic and
    keeps the parallelism.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: The imperative is direct and simple. Adding 'here' would be slightly
    more explicit than the Greek requires.
- source_word: ἔρχεται
  chosen: he comes
  alternatives:
  - he arrives
  lexicon: BDAG
  rationale: This keeps the command-response parallelism with minimal interpretation.
- source_word: τῷ δούλῳ μου
  chosen: to my slave
  alternatives:
  - to my servant
  - to my bondservant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this authority-chain illustration, the subordinate status
    is central, so 'slave' best preserves the social reality. 'Servant' remains a
    viable alternative and is preserved in a footnote because English readers may
    hear 'slave' with modern racialized associations not specific to the ancient context.
- source_word: Ποίησον τοῦτο
  chosen: Do this
  alternatives:
  - Do this thing
  - Make this
  lexicon: BDAG
  rationale: ποιέω with τοῦτο is naturally rendered 'Do this.' It is idiomatic and
    preserves the directness of the command.
- source_word: ποιεῖ
  chosen: he does it
  alternatives:
  - he does so
  - he does it
  lexicon: BDAG
  rationale: The object is implicit from the prior τοῦτο. 'He does it' makes the English
    complete while preserving the command-response pattern.
