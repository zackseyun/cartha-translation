id: LUK.7.32
reference: Luke 7:32
source:
  edition: SBLGNT
  text: ὅμοιοί εἰσιν παιδίοις τοῖς ἐν ἀγορᾷ καθημένοις καὶ προσφωνοῦσιν ἀλλήλοις,
    ⸂ἃ λέγει⸃· Ηὐλήσαμεν ὑμῖν καὶ οὐκ ὠρχήσασθε· ⸀ἐθρηνήσαμεν καὶ οὐκ ἐκλαύσατε·
translation:
  text: 'They are like children sitting in the marketplace and calling to one another,
    who say: ‘We played the flute for you, and you did not dance; we sang a lament,
    and you did not weep.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'We piped for you.' The Greek verb specifically
      refers to playing a flute or pipe.
    reason: lexical_alternative
  - marker: b
    text: Or 'we sang a dirge' / 'we mourned.' The Greek can denote lamenting, including
      a funeral lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμοιοί εἰσιν
  chosen: They are like
  alternatives:
  - They are similar to
  lexicon: BDAG
  rationale: Standard comparative expression introducing the simile; 'like' is natural
    modern English and sufficiently formal.
- source_word: παιδίοις
  chosen: children
  alternatives:
  - little children
  - boys and girls
  lexicon: BDAG
  rationale: Dative plural of παιδίον refers broadly to children; 'children' is idiomatic
    and avoids over-specifying age or sex.
- source_word: ἐν ἀγορᾷ
  chosen: in the marketplace
  alternatives:
  - in the market
  lexicon: BDAG
  rationale: ἀγορά denotes the public market/open square; 'marketplace' best captures
    the social setting in readable English.
- source_word: καθημένοις
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present participle describing the children's posture/location; 'sitting'
    is simple and natural.
- source_word: προσφωνοῦσιν ἀλλήλοις
  chosen: calling to one another
  alternatives:
  - calling out to each other
  - addressing one another
  lexicon: BDAG
  rationale: προσφωνέω here conveys calling out or addressing; with ἀλλήλοις, 'calling
    to one another' fits the scene and preserves the reciprocal sense.
- source_word: ἃ λέγει
  chosen: who say
  alternatives:
  - which say
  - saying
  lexicon: BDAG
  rationale: Although the relative pronoun is neuter plural, idiomatic English refers
    back to the children personally as 'who say.' Singular λέγει likely reflects a
    collective sense; English plural 'say' matches the antecedent naturally.
- source_word: Ηὐλήσαμεν
  chosen: We played the flute for you
  alternatives:
  - We piped for you
  - We played music for you
  lexicon: BDAG
  rationale: αὐλέω specifically refers to playing the flute/pipe. 'Played the flute'
    makes the instrument explicit for modern readers; 'piped' is traditional but less
    transparent.
- source_word: ὠρχήσασθε
  chosen: you did not dance
  alternatives:
  - you did not begin to dance
  lexicon: BDAG
  rationale: Aorist middle here is well represented by simple past in English; no
    need to force aspect beyond the context.
- source_word: ἐθρηνήσαμεν
  chosen: we sang a lament
  alternatives:
  - we mourned
  - we wailed a funeral song
  lexicon: BDAG
  rationale: θρηνέω can mean lament or sing a dirge. In this children's-game context,
    'sang a lament' preserves the performative contrast with flute-playing better
    than the more general 'mourned.'
- source_word: ἐκλαύσατε
  chosen: you did not weep
  alternatives:
  - you did not cry
  - you did not mourn
  lexicon: BDAG
  rationale: κλαίω means to weep/cry. 'Weep' pairs well with 'lament' and retains
    the solemn tone without paraphrase.
