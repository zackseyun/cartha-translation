theological_decisions:
- issue: Rendering the children's contrasting actions in a way that preserves the
    parabolic force without over-interpreting Jesus' application
  chosen_reading: Use concrete activity language ('played the flute,' 'sang a lament,'
    'did not dance,' 'did not weep')
  alternative_readings:
  - Use more interpretive language such as 'celebrated' and 'mourned'
  rationale: The verse itself presents an analogy, not its interpretation. Concrete
    renderings preserve the imagery and theological tension without importing explanatory
    conclusions.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
