id: LUK.7.22
reference: Luke 7:22
source:
  edition: SBLGNT
  text: καὶ ⸀ἀποκριθεὶς εἶπεν αὐτοῖς· Πορευθέντες ἀπαγγείλατε Ἰωάννῃ ἃ εἴδετε καὶ
    ἠκούσατε· ⸀τυφλοὶ ἀναβλέπουσιν, χωλοὶ περιπατοῦσιν, λεπροὶ καθαρίζονται, ⸀κωφοὶ
    ἀκούουσιν, νεκροὶ ἐγείρονται, πτωχοὶ εὐαγγελίζονται·
translation:
  text: 'And in answer he said to them, “Go and report to John what you have seen
    and heard: the blind receive sight, the lame walk, lepers are cleansed, the deaf
    hear, the dead are raised, the poor have good news proclaimed to them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the blind see again.” The Greek verb can mean to regain sight or to
      look up; here it denotes receiving sight.
    reason: lexical_alternative
  - marker: b
    text: 'Or, “good news is preached to the poor.” The Greek is passive: “the poor
      are evangelized / have good news announced to them.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: in answer
  alternatives:
  - answering
  - in reply
  lexicon: BDAG
  rationale: The participle introduces Jesus' response. 'In answer' is idiomatic modern
    English that preserves the responsive force without awkwardness.
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - Having gone
  - Go your way
  lexicon: BDAG
  rationale: The attendant participle before the imperative functions idiomatically
    with the main command. English naturally renders this as a simple imperative,
    'Go,' rather than the more wooden 'having gone.'
- source_word: ἀπαγγείλατε
  chosen: report
  alternatives:
  - tell
  - announce
  lexicon: BDAG
  rationale: '''Report'' fits the sense of conveying back what has been observed,
    matching the evidentiary tone of Jesus'' instruction to John''s messengers.'
- source_word: ἃ εἴδετε καὶ ἠκούσατε
  chosen: what you have seen and heard
  alternatives:
  - the things you saw and heard
  lexicon: BDAG
  rationale: The perfect-like force in English suits the completed observations with
    present relevance. This is natural and faithful to the relative clause.
- source_word: τυφλοὶ ἀναβλέπουσιν
  chosen: the blind receive sight
  alternatives:
  - the blind see again
  - blind people regain sight
  lexicon: BDAG
  rationale: ἀναβλέπω here means to recover or gain sight. 'Receive sight' is concise,
    idiomatic, and echoes prophetic restoration language without over-paraphrase.
- source_word: χωλοὶ περιπατοῦσιν
  chosen: the lame walk
  alternatives:
  - cripples walk
  - the lame are walking
  lexicon: BDAG
  rationale: A straightforward rendering of the adjective-subject plus verb. 'Lame'
    is the standard respectful and accurate gloss for χωλοί in this context.
- source_word: λεπροὶ καθαρίζονται
  chosen: lepers are cleansed
  alternatives:
  - people with leprosy are cleansed
  - lepers are made clean
  lexicon: BDAG
  rationale: καθαρίζονται is more than medical healing language; it includes restoration
    to ritual cleanness. 'Are cleansed' preserves that fuller sense better than simply
    'are healed.'
- source_word: κωφοὶ ἀκούουσιν
  chosen: the deaf hear
  alternatives:
  - the deaf are hearing
  lexicon: BDAG
  rationale: κωφός can denote deaf or mute depending on context; with ἀκούουσιν, 'the
    deaf hear' is clearly intended.
- source_word: νεκροὶ ἐγείρονται
  chosen: the dead are raised
  alternatives:
  - dead people are raised up
  - the dead are being raised
  lexicon: BDAG
  rationale: The passive naturally renders as divine or unspecified agency. 'Are raised'
    is the standard and clear English equivalent.
- source_word: πτωχοὶ εὐαγγελίζονται
  chosen: the poor have good news proclaimed to them
  alternatives:
  - the poor are evangelized
  - good news is preached to the poor
  - the poor receive good news
  lexicon: BDAG
  rationale: The passive of εὐαγγελίζω means to have good news announced to someone.
    This rendering preserves the passive sense and avoids ecclesiastical jargon like
    'evangelized.' 'Proclaimed' retains the heraldic force better than the flatter
    'receive good news.'
