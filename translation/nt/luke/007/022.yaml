theological_decisions:
- issue: Nature of the miracle list as evidence for Jesus' identity and mission
  chosen_reading: Render the statements straightforwardly as observable acts of restoration
    without adding an explicit messianic interpretation in the main text.
  alternative_readings:
  - Translate with more overt fulfillment language to foreground Isaiah allusions
  rationale: The verse itself presents Jesus' works as the report to be given to John.
    The translation preserves the allusive texture to Isaiah through recognizable
    wording ('receive sight,' 'the poor have good news proclaimed to them') without
    importing interpretive conclusions not explicitly stated in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of passive verbs in the final list
  chosen_reading: Use English passives ('are cleansed,' 'are raised,' 'have good news
    proclaimed to them') without making God the explicit subject.
  alternative_readings:
  - Use active paraphrases such as 'God raises the dead' or 'I proclaim good news
    to the poor'
  rationale: The Greek uses passives, and preserving them maintains the text's wording
    and theological restraint. Making the agent explicit would add interpretation
    beyond the source text.
  doctrine_reference: Translation philosophy §§1, 3
