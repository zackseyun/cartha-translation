theological_decisions:
- issue: Tone of Jesus' command to the dead man
  chosen_reading: Rendered ἐγέρθητι as 'arise' rather than a more colloquial 'get
    up.'
  alternative_readings:
  - get up
  - be raised
  rationale: The verse depicts Jesus directly commanding a dead young man to rise.
    'Arise' preserves the solemnity and miraculous authority of the utterance without
    importing extra doctrinal explanation. The translation leaves the miracle's significance
    to the narrative rather than embellishing it.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight; preserve theological tension rather than resolve it.'
