id: LUK.7.14
reference: Luke 7:14
source:
  edition: SBLGNT
  text: καὶ προσελθὼν ἥψατο τῆς σοροῦ, οἱ δὲ βαστάζοντες ἔστησαν, καὶ εἶπεν· Νεανίσκε,
    σοὶ λέγω, ἐγέρθητι.
translation:
  text: And coming up, he touched the bier, and the men carrying it stood still, and
    he said, “Young man, I say to you, arise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “coffin” or “funeral stretcher.” The Greek term refers to the bier or
      carrying frame used in a funeral procession.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: coming up
  alternatives:
  - approaching
  - coming near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating Jesus' movement toward the
    funeral procession before the main action. 'Coming up' is natural modern English
    and preserves the sequential force without sounding overly formal.
- source_word: ἥψατο
  chosen: touched
  alternatives:
  - took hold of
  lexicon: BDAG
  rationale: Middle form of ἅπτω in this construction commonly means 'touch' or 'take
    hold of.' 'Touched' best fits the scene and avoids overstating the action; the
    text does not require a prolonged grasp.
- source_word: σοροῦ
  chosen: bier
  alternatives:
  - coffin
  - funeral stretcher
  lexicon: BDAG
  rationale: σορός here refers to the frame or open funeral pallet on which the dead
    man was being carried, not necessarily an enclosed coffin in the modern sense.
    'Bier' is the most precise English term, though somewhat less common; it preserves
    the historical setting better than 'coffin.'
- source_word: οἱ δὲ βαστάζοντες
  chosen: the men carrying it
  alternatives:
  - those carrying it
  - the bearers
  lexicon: BDAG
  rationale: βαστάζοντες means those carrying or bearing the bier. Supplying 'it'
    is required in English from the context. 'The men carrying it' is clear and idiomatic;
    'bearers' is possible but less transparent for modern readers.
- source_word: ἔστησαν
  chosen: stood still
  alternatives:
  - stopped
  - came to a halt
  lexicon: BDAG
  rationale: Aorist of ἵστημι here means they stopped and stood in place. 'Stood still'
    preserves both the cessation of movement and the resulting posture better than
    the simpler 'stopped.'
- source_word: Νεανίσκε
  chosen: Young man
  alternatives:
  - Youth
  - Young fellow
  lexicon: BDAG
  rationale: Vocative singular of νεανίσκος, a direct address to a male in the prime
    of youth. 'Young man' is the most natural and accurate modern rendering.
- source_word: σοὶ λέγω
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: This explicit dative pronoun plus λέγω adds directness and solemnity.
    'I say to you' preserves the formal force and familiar narrative cadence.
- source_word: ἐγέρθητι
  chosen: arise
  alternatives:
  - get up
  - be raised
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative of ἐγείρω. In this miracle context
    it is a command to rise from death. 'Arise' preserves the elevated tone appropriate
    to the scene and avoids the casual feel of 'get up,' while 'be raised' would sound
    less natural as direct speech.
