id: LUK.7.19
reference: Luke 7:19
source:
  edition: SBLGNT
  text: ἔπεμψεν πρὸς τὸν ⸀κύριον λέγων· Σὺ εἶ ὁ ἐρχόμενος ἢ ⸀ἄλλον προσδοκῶμεν;
translation:
  text: He sent to the Lord, saying, “Are you the Coming One, or should we expect
    another?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the one who is coming.” The Greek expression can be read more descriptively,
      but here likely functions as a messianic title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψεν
  chosen: He sent
  alternatives:
  - he sent word
  - he dispatched
  lexicon: BDAG
  rationale: Aorist active indicative of πέμπω, rendered simply as a past narrative
    action. English can leave the object implicit because the following πρὸς phrase
    supplies the destination.
- source_word: πρὸς τὸν κύριον
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: BDAG
  rationale: πρός with accusative marks direction toward a person. κύριος is rendered
    'Lord' per the project's default for Kyrios; in Luke's narrative this is the standard
    respectful and christologically weighty title for Jesus.
- source_word: λέγων
  chosen: saying
  alternatives:
  - with this message
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of the message. 'Saying' preserves
    the participial linkage naturally in English.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are
  lexicon: BDAG
  rationale: 'Although formally ''you are,'' in direct discourse followed by ἢ and
    a contrasting question, idiomatic English requires interrogative word order: ''Are
    you ... ?'''
- source_word: ὁ ἐρχόμενος
  chosen: the Coming One
  alternatives:
  - the one who is coming
  - the one to come
  lexicon: BDAG
  rationale: Substantival present participle with the article. 'The Coming One' preserves
    its titular, messianic force better than a flatter descriptive phrase, while remaining
    readable.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Standard disjunctive conjunction introducing the alternative question.
- source_word: ἄλλον
  chosen: another
  alternatives:
  - someone else
  lexicon: BDAG
  rationale: Direct object of προσδοκῶμεν. 'Another' is concise and natural; 'someone
    else' is possible but slightly more expansive than the Greek.
- source_word: προσδοκῶμεν
  chosen: should we expect
  alternatives:
  - are we to expect
  - shall we wait for
  lexicon: BDAG
  rationale: Present active indicative first plural. In this deliberative question,
    English 'should we expect' best conveys the sense of ongoing expectation without
    sounding wooden. 'Wait for' is interpretive and less precise than 'expect.'
