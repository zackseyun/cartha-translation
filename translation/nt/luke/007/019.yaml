theological_decisions:
- issue: Rendering of κύριος as a title for Jesus
  chosen_reading: Lord
  alternative_readings:
  - master
  rationale: The doctrine file specifies κύριος → 'Lord' as the default rendering.
    In Luke this title also carries christological significance, and 'master' would
    under-translate that weight here.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος *Kyrios* → Lord'
- issue: Whether ὁ ἐρχόμενος should be rendered as a messianic title or a generic
    description
  chosen_reading: the Coming One
  alternative_readings:
  - the one who is coming
  - the expected one
  rationale: In this context the phrase functions as a recognized eschatological/messianic
    designation. Capitalizing 'Coming One' signals titular force without importing
    more than the Greek states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2, §3
