id: LUK.7.41
reference: Luke 7:41
source:
  edition: SBLGNT
  text: δύο χρεοφειλέται ἦσαν δανιστῇ τινι· ὁ εἷς ὤφειλεν δηνάρια πεντακόσια, ὁ δὲ
    ἕτερος πεντήκοντα.
translation:
  text: 'Two debtors owed a certain moneylender: one owed five hundred denarii, and
    the other fifty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard Roman silver coin, commonly associated with about
      a day's wage for a laborer.
    reason: cultural_note
lexical_decisions:
- source_word: χρεοφειλέται
  chosen: debtors
  alternatives:
  - those in debt
  lexicon: BDAG
  rationale: The noun denotes people who owe a debt. 'Debtors' is the most direct
    and natural English equivalent and fits the parabolic setup.
- source_word: δανιστῇ τινι
  chosen: a certain moneylender
  alternatives:
  - a certain lender
  - a creditor
  lexicon: BDAG
  rationale: δανιστής is specifically one who lends money, not merely any creditor.
    'A certain' reflects τινι idiomatically, introducing an indefinite but particular
    figure in the story.
- source_word: ὤφειλεν
  chosen: owed
  alternatives:
  - was owing
  lexicon: BDAG
  rationale: The imperfect here states the debt relation in narrative form. English
    simple past 'owed' is the most natural rendering.
- source_word: δηνάρια
  chosen: denarii
  alternatives:
  - silver coins
  - days' wages
  lexicon: BDAG
  rationale: A denarius is a specific coin/unit, so transliteration preserves the
    historical referent better than flattening it to a generic monetary term. Explanatory
    alternatives are better suited to a note than the main text.
- source_word: πεντακόσια
  chosen: five hundred
  lexicon: BDAG
  rationale: Straightforward cardinal number modifying δηνάρια.
- source_word: ἕτερος
  chosen: the other
  alternatives:
  - the second
  lexicon: BDAG
  rationale: In contrast with ὁ εἷς ('the one'), 'the other' is the most idiomatic
    paired rendering in English.
- source_word: πεντήκοντα
  chosen: fifty
  lexicon: BDAG
  rationale: Straightforward cardinal number; the object 'denarii' is understood from
    the previous clause and need not be repeated in English.
