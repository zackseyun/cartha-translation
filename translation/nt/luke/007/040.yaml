id: LUK.7.40
reference: Luke 7:40
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν πρὸς αὐτόν· Σίμων, ἔχω σοί τι εἰπεῖν. ὁ δέ·
    ⸂Διδάσκαλε, εἰπέ, φησίν⸃.
translation:
  text: And Jesus answered and said to him, “Simon, I have something to say to you.”
    And he said, “Teacher, say it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Master, speak.” The Greek Διδάσκαλε is more literally “Teacher,” and
      εἰπέ is simply “say” or “speak.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative ('answered and said'). Retaining 'answered'
    preserves the Greek discourse pattern without over-paraphrasing.
- source_word: εἶπεν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω with πρὸς + accusative. 'Said to
    him' is natural English and sufficiently formal.
- source_word: Σίμων
  chosen: Simon
  rationale: Personal name is transliterated per translation philosophy.
- source_word: ἔχω σοί τι εἰπεῖν
  chosen: I have something to say to you
  alternatives:
  - I have something to tell you
  - I have something to say
  lexicon: BDAG
  rationale: This reproduces the Greek idiom closely while remaining natural in English.
    Including 'to you' reflects σοί explicitly.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος denotes 'teacher/instructor.' 'Teacher' is the plain lexical
    sense and avoids importing the stronger authority nuance of 'Master' unless context
    requires it.
- source_word: εἰπέ
  chosen: say it
  alternatives:
  - speak
  - say on
  lexicon: BDAG
  rationale: The imperative asks Jesus to proceed with what he intends to say. 'Say
    it' makes the implied object explicit in idiomatic English while staying close
    to the sense.
- source_word: φησίν
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although φησίν is present tense (historical present), English narrative
    normally renders it with a past tense for readability. This is a standard optimal-equivalence
    adjustment.
