id: LUK.7.37
reference: Luke 7:37
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ γυνὴ ⸂ἥτις ἦν ἐν τῇ πόλει⸃ ἁμαρτωλός, ⸀καὶ ἐπιγνοῦσα ὅτι ⸀κατάκειται
    ἐν τῇ οἰκίᾳ τοῦ Φαρισαίου, κομίσασα ἀλάβαστρον μύρου
translation:
  text: And behold, a woman who was in the city, a sinner, having learned that he
    was reclining at table in the Pharisee’s house, brought an alabaster jar of perfume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sinful woman.' The Greek says simply 'a sinner' and does not specify
      her particular sin.
    reason: lexical_alternative
  - marker: b
    text: That is, reclining in the customary posture for a formal meal.
    reason: cultural_note
  - marker: c
    text: Or 'an alabaster flask of ointment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of surprise or vivid introduction.
    'Behold' is slightly formal but still readable and preserves Luke’s narrative
    emphasis better than omitting it.
- source_word: γυνὴ
  chosen: a woman
  alternatives:
  - a wife
  - woman
  lexicon: BDAG
  rationale: In context the generic sense 'woman' is clearly intended, introducing
    a female figure into the scene.
- source_word: ἥτις ἦν ἐν τῇ πόλει
  chosen: who was in the city
  alternatives:
  - who was from the city
  - who lived in the city
  lexicon: BDAG
  rationale: A straightforward rendering of the relative clause. 'In the city' is
    preserved rather than interpreted more specifically, since the Greek does not
    explicitly say 'from' or 'well known in' the city.
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - sinful
  - a sinful woman
  lexicon: BDAG
  rationale: Used substantivally/predicatively of the woman. 'A sinner' preserves
    the noun-like force and avoids importing a more interpretive phrase such as 'a
    woman of immoral life.'
- source_word: ἐπιγνοῦσα
  chosen: having learned
  alternatives:
  - having found out
  - having come to know
  - when she learned
  lexicon: BDAG
  rationale: The aorist participle indicates prior action relative to the main verb.
    'Having learned' is natural English and preserves the sense of coming to know
    the information.
- source_word: κατάκειται
  chosen: was reclining at table
  alternatives:
  - was reclining
  - was dining
  lexicon: BDAG
  rationale: In this meal setting the verb refers to the ancient posture for dining.
    'Reclining at table' communicates the cultural practice more precisely than simply
    'sitting' or the more interpretive 'dining' alone.
- source_word: οἰκίᾳ τοῦ Φαρισαίου
  chosen: the Pharisee’s house
  alternatives:
  - the house of the Pharisee
  lexicon: BDAG
  rationale: Natural English possessive construction that preserves the definite reference
    to a particular Pharisee already implied by the narrative context.
- source_word: κομίσασα
  chosen: brought
  alternatives:
  - carried
  - came bringing
  lexicon: BDAG
  rationale: The participle denotes bringing something with her. 'Brought' is idiomatic
    and concise in English.
- source_word: ἀλάβαστρον μύρου
  chosen: an alabaster jar of perfume
  alternatives:
  - an alabaster flask of ointment
  - an alabaster vial of fragrant oil
  lexicon: BDAG
  rationale: ἀλάβαστρον refers to an alabaster container, and μύρον to perfumed ointment/perfume.
    'Jar of perfume' is accessible modern English while preserving the material and
    contents.
