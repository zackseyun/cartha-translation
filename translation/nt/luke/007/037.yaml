theological_decisions:
- issue: Moral characterization of the woman
  chosen_reading: a sinner
  alternative_readings:
  - a sinful woman
  - a woman of immoral life
  - a prostitute
  rationale: The Greek identifies her as ἁμαρτωλός but does not specify the nature
    of her sin. The translation avoids importing a traditional but unstated identification
    such as prostitution.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
