id: LUK.7.48
reference: Luke 7:48
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῇ· Ἀφέωνταί σου αἱ ἁμαρτίαι.
translation:
  text: Then he said to her, “Your sins are forgiven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Your sins have been forgiven.” The Greek perfect passive
      can emphasize the completed act with its continuing result.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said.' 'Told' is possible
    in some contexts but is less direct here.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then'
    gives natural English flow without overstating contrast.
- source_word: αὐτῇ
  chosen: to her
  alternatives:
  - her
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object; English idiom normally
    expresses this as 'to her' after 'said.'
- source_word: Ἀφέωνταί
  chosen: are forgiven
  alternatives:
  - have been forgiven
  - stand forgiven
  lexicon: BDAG
  rationale: Perfect passive indicative of ἀφίημι expresses a present state resulting
    from a completed act. 'Are forgiven' is idiomatic and preserves the stative force
    in readable English. 'Have been forgiven' is more explicitly perfect but less
    natural in this direct saying.
- source_word: σου
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Genitive second-person pronoun modifying 'sins'; standard English possessive
    is 'your.'
- source_word: αἱ ἁμαρτίαι
  chosen: sins
  alternatives:
  - the sins
  lexicon: BDAG
  rationale: The Greek article is naturally omitted in English with a possessive construction.
    'Sins' accurately renders ἁμαρτίαι in this context of moral offenses before God.
