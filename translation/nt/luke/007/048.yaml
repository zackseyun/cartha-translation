theological_decisions:
- issue: Force of the perfect passive Ἀφέωνταί in a pronouncement of forgiveness
  chosen_reading: 'Render as a present-result declaration: ''Your sins are forgiven.'''
  alternative_readings:
  - Your sins have been forgiven.
  rationale: The Greek perfect passive can emphasize either the completed act or the
    present state resulting from it. In this context Jesus' declaration is best conveyed
    in idiomatic English as a present state, while still implying completed divine
    forgiveness. This preserves the text's theological weight without adding interpretive
    explanation about timing beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
