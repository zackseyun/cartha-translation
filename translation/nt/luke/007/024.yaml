id: LUK.7.24
reference: Luke 7:24
source:
  edition: SBLGNT
  text: Ἀπελθόντων δὲ τῶν ἀγγέλων Ἰωάννου ἤρξατο λέγειν ⸂πρὸς τοὺς ὄχλους⸃ περὶ Ἰωάννου·
    Τί ⸀ἐξήλθατε εἰς τὴν ἔρημον θεάσασθαι; κάλαμον ὑπὸ ἀνέμου σαλευόμενον;
translation:
  text: 'After John''s messengers had gone away, he began to speak to the crowds about
    John: “What did you go out into the wilderness to look at? A reed shaken by the
    wind?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to see' or 'to behold' for 'to look at.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπελθόντων
  chosen: After ... had gone away
  alternatives:
  - when ... departed
  - after ... left
  lexicon: BDAG
  rationale: Aorist participle in the genitive absolute is best rendered temporally.
    'Had gone away' gives clear English sequence prior to Jesus' speaking.
- source_word: ἀγγέλων
  chosen: messengers
  alternatives:
  - angels
  lexicon: BDAG
  rationale: In context these are human envoys sent by John, not heavenly beings,
    so 'messengers' is the plain contextual sense.
- source_word: Ἰωάννου
  chosen: John's / John
  rationale: Standard transliteration of the personal name Ἰωάννης. The genitive first
    indicates possession ('John's messengers'); later περί Ἰωάννου is 'about John.'
- source_word: ἤρξατο λέγειν
  chosen: he began to speak
  alternatives:
  - he began to say
  lexicon: BDAG
  rationale: This common inceptive construction marks the start of a discourse. 'Speak'
    is more natural in English for an address to crowds while preserving the inceptive
    force.
- source_word: πρὸς τοὺς ὄχλους
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: Plural ὄχλους is naturally 'crowds.' 'To' reflects πρός with a verb of
    speaking.
- source_word: περὶ Ἰωάννου
  chosen: about John
  alternatives:
  - concerning John
  lexicon: BDAG
  rationale: Standard sense of περί with genitive in discourse context.
- source_word: Τί ἐξήλθατε
  chosen: What did you go out
  alternatives:
  - Why did you go out
  lexicon: BDAG
  rationale: τί here asks what object they went out to see, not primarily their motive.
    'What did you go out' fits the following infinitive and object.
- source_word: εἰς τὴν ἔρημον
  chosen: into the wilderness
  alternatives:
  - into the desert
  lexicon: BDAG
  rationale: ἔρημος here refers to the sparsely inhabited region associated with John's
    ministry. 'Wilderness' is the established and contextually apt rendering in the
    Gospels.
- source_word: θεάσασθαι
  chosen: to look at
  alternatives:
  - to see
  - to behold
  lexicon: BDAG
  rationale: The verb can mean to view attentively or behold. 'Look at' is natural
    modern English and fits the rhetorical question without sounding archaic.
- source_word: κάλαμον
  chosen: a reed
  alternatives:
  - a cane
  - a stalk
  lexicon: BDAG
  rationale: The literal image is a reed plant, which carries the metaphor of instability.
- source_word: ὑπὸ ἀνέμου σαλευόμενον
  chosen: shaken by the wind
  alternatives:
  - swayed by the wind
  - moved by the wind
  lexicon: BDAG
  rationale: This participial phrase describes the reed as unstable under wind. 'Shaken'
    is vivid and idiomatic, preserving the rhetorical force.
