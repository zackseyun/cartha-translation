theological_decisions:
- issue: Metaphorical force of the rhetorical question about John
  chosen_reading: Retain the literal image 'A reed shaken by the wind?' without explicating
    the metaphor in the main text.
  alternative_readings:
  - A weak or vacillating man? (interpretive paraphrase)
  rationale: The text itself presents the image and leaves the audience to infer that
    Jesus denies John was fickle. Optimal equivalence preserves the metaphorical tension
    rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
