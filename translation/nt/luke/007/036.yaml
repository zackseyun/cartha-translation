id: LUK.7.36
reference: Luke 7:36
source:
  edition: SBLGNT
  text: Ἠρώτα δέ τις αὐτὸν τῶν Φαρισαίων ἵνα φάγῃ μετ’ αὐτοῦ· καὶ εἰσελθὼν εἰς ⸂τὸν
    οἶκον⸃ τοῦ Φαρισαίου ⸀κατεκλίθη.
translation:
  text: Now one of the Pharisees was asking him to eat with him, and after entering
    the Pharisee’s house, he reclined at the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'asked him that he might eat with him.'
    reason: lexical_alternative
  - marker: b
    text: That is, he took the customary posture for a formal meal, reclining rather
      than sitting upright.
    reason: cultural_note
lexical_decisions:
- source_word: Ἠρώτα
  chosen: was asking
  alternatives:
  - asked
  - invited
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action in past time; 'was
    asking' preserves that aspect better than simple 'asked.' In context it functions
    as an invitation, but 'was asking' stays closer to the Greek wording.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: Used as a mild connective advancing the narrative. 'Now' gives natural
    English discourse flow without overstating contrast.
- source_word: τις
  chosen: one
  alternatives:
  - someone
  - a certain one
  lexicon: BDAG
  rationale: With the partitive genitive 'of the Pharisees,' 'one of the Pharisees'
    is the most natural English rendering.
- source_word: τῶν Φαρισαίων / τοῦ Φαρισαίου
  chosen: of the Pharisees / the Pharisee’s
  alternatives:
  - from the Pharisees / the Pharisee
  lexicon: BDAG
  rationale: The first phrase is partitive ('one of the Pharisees'); the second is
    possessive/genitival ('the Pharisee’s house'). 'Pharisee' is the standard transliteration
    for the group name Φαρισαῖος.
- source_word: ἵνα φάγῃ μετ’ αὐτοῦ
  chosen: to eat with him
  alternatives:
  - that he might eat with him
  - to dine with him
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose. 'To eat with him' is straightforward
    and close to the Greek; 'dine' is possible but slightly more interpretive.
- source_word: εἰσελθὼν
  chosen: after entering
  alternatives:
  - having entered
  - when he entered
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates action prior to the
    main verb. 'After entering' is natural English and preserves the sequence.
- source_word: οἶκον
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: οἶκος here denotes the Pharisee's dwelling. 'House' is the more direct
    and less interpretive rendering.
- source_word: κατεκλίθη
  chosen: reclined at the table
  alternatives:
  - reclined
  - sat down to eat
  lexicon: BDAG
  rationale: In first-century meal settings, the verb refers to reclining for a meal
    rather than merely sitting. 'Reclined at the table' makes the cultural sense explicit
    for modern readers while remaining faithful to the historical practice.
