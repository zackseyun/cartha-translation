theological_decisions:
- issue: Potential interpretive softening of offense language toward Jesus
  chosen_reading: Retain stumbling/offense imagery rather than paraphrasing to mere
    disagreement
  alternative_readings:
  - And blessed is whoever is not offended by me.
  - And blessed is the one who does not fall away because of me.
  rationale: The saying warns against taking offense at Jesus and thereby stumbling.
    The chosen rendering preserves that theological tension without reducing it to
    emotional offense alone or resolving it fully into apostasy.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
