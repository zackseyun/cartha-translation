id: LUK.7.23
reference: Luke 7:23
source:
  edition: SBLGNT
  text: καὶ μακάριός ἐστιν ὃς ἐὰν μὴ σκανδαλισθῇ ἐν ἐμοί.
translation:
  text: And blessed is the one who is not caused to stumble by me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is not offended by me' or 'does not fall away because of me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: '''Blessed'' best preserves the covenantal/religious weight of μακάριος
    in Jesus'' sayings, whereas ''happy'' is too shallow and ''fortunate'' too secular.'
- source_word: ὃς
  chosen: the one who
  alternatives:
  - whoever
  - he who
  lexicon: BDAG
  rationale: The substantival relative is rendered idiomatically as 'the one who'
    in clear modern English. This preserves the singular representative force without
    archaic diction like 'he who.'
- source_word: ἐὰν μὴ
  chosen: is not
  alternatives:
  - does not
  - may not be
  lexicon: BDAG
  rationale: With the aorist passive subjunctive, ἐὰν μή introduces a general condition.
    In English, 'is not caused to stumble' naturally conveys the conditional sense
    in this beatitude without awkward literalism.
- source_word: σκανδαλισθῇ
  chosen: is not caused to stumble
  alternatives:
  - does not stumble
  - is not offended
  - does not fall away
  lexicon: BDAG
  rationale: The verb is passive here, so 'is not caused to stumble' better reflects
    the Greek form than the intransitive 'does not stumble.' In context, the sense
    includes taking offense at Jesus to the point of stumbling; 'offended' is possible
    but narrower and more modernly misleading.
- source_word: ἐν ἐμοί
  chosen: by me
  alternatives:
  - in me
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: Here ἐν with a personal pronoun in this idiom conveys occasion or cause
    with reference to Jesus. 'By me' is concise and idiomatic in English, expressing
    stumbling occasioned by Jesus. 'In me' is more literal but less natural and potentially
    obscure.
