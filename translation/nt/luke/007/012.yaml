id: LUK.7.12
reference: Luke 7:12
source:
  edition: SBLGNT
  text: ὡς δὲ ἤγγισεν τῇ πύλῃ τῆς πόλεως, καὶ ἰδοὺ ἐξεκομίζετο τεθνηκὼς ⸂μονογενὴς
    υἱὸς⸃ τῇ μητρὶ αὐτοῦ, καὶ αὐτὴ ⸀ἦν χήρα, καὶ ὄχλος τῆς πόλεως ἱκανὸς ⸁ἦν σὺν αὐτῇ.
translation:
  text: As he came near to the gate of the city, behold, a dead man was being carried
    out, the only son of his mother, and she was a widow, and a considerable crowd
    from the city was with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his one and only son."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: As
  alternatives:
  - Now as
  - And as
  lexicon: BDAG
  rationale: Renders the temporal conjunction naturally in English while keeping the
    narrative flow. The mild connective force of δέ is absorbed into smooth English
    rather than separately represented with 'now' or 'and'.
- source_word: ἤγγισεν
  chosen: he came near
  alternatives:
  - he approached
  - he drew near
  lexicon: BDAG
  rationale: Aorist of ἐγγίζω indicates approach. 'Came near' is clear modern English
    and preserves the motion toward the city gate without sounding archaic like 'drew
    near'.
- source_word: τῇ πύλῃ τῆς πόλεως
  chosen: to the gate of the city
  alternatives:
  - to the city gate
  lexicon: BDAG
  rationale: Both are viable; 'to the gate of the city' stays slightly closer to the
    Greek structure while remaining natural.
- source_word: καὶ ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to a sudden scene. 'Behold'
    preserves that force better than the more colloquial 'look.' The preceding καί
    is not separately rendered to avoid stiffness.
- source_word: ἐξεκομίζετο
  chosen: was being carried out
  alternatives:
  - was being taken out
  - was being borne out
  lexicon: BDAG
  rationale: The imperfect passive conveys an ongoing action in progress. 'Was being
    carried out' fits a funeral procession context and is idiomatic.
- source_word: τεθνηκώς
  chosen: a dead man
  alternatives:
  - one who had died
  - the deceased
  lexicon: BDAG
  rationale: The perfect participle denotes a person in the state of having died.
    'A dead man' is concise and natural in English, matching the narrative scene.
- source_word: μονογενὴς υἱός
  chosen: the only son
  alternatives:
  - an only son
  - his one and only son
  lexicon: BDAG
  rationale: μονογενής here denotes an only child in relation to his mother, not directly
    invoking the specialized theological resonance it can have in Johannine contexts.
    'The only son' is the most straightforward rendering in context.
- source_word: τῇ μητρὶ αὐτοῦ
  chosen: of his mother
  alternatives:
  - to his mother
  lexicon: BDAG
  rationale: The dative is relational here, indicating whose only son he was. English
    idiom expresses this best as 'of his mother' after 'the only son.'
- source_word: καὶ αὐτὴ ἦν χήρα
  chosen: and she was a widow
  alternatives:
  - and his mother was a widow
  lexicon: BDAG
  rationale: The explicit pronoun αὐτή highlights the mother's condition. 'And she
    was a widow' preserves the Greek emphasis and the pathos of the scene.
- source_word: ὄχλος τῆς πόλεως ἱκανός
  chosen: a considerable crowd from the city
  alternatives:
  - a large crowd of the city
  - a sizable crowd from the city
  lexicon: BDAG
  rationale: ἱκανός here means considerable or sizable in amount. 'Considerable crowd'
    is natural and avoids overstating with 'large' while still conveying substantial
    attendance.
- source_word: ἦν σὺν αὐτῇ
  chosen: was with her
  alternatives:
  - was accompanying her
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'Was with her' is simple
    and accurate; the funeral-procession sense is already supplied by context.
