theological_decisions:
- issue: Rendering of μονογενής in a non-Christological context
  chosen_reading: the only son
  alternative_readings:
  - his one and only son
  rationale: In this verse μονογενής describes the widow's son and most naturally
    means 'only' in the familial sense. A more expansive rendering like 'one and only'
    is possible but not necessary. No doctrinally contested Christological issue is
    at stake here, so the translation follows plain contextual sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve meaning according to context.'
