theological_decisions:
- issue: Rendering χαρίζομαι in a debt-forgiveness parable
  chosen_reading: Use 'graciously forgave both' rather than a purely financial 'canceled
    both debts.'
  alternative_readings:
  - he canceled the debts of both
  - he freely forgave both
  rationale: The immediate context is financial debt, but the wider Lukan setting
    uses the parable to illuminate forgiveness and love. 'Graciously forgave' preserves
    both the debt-remission sense and the grace nuance of χαρίζομαι without importing
    extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5, 6; Contested terms table for
    ἀγάπη/love consistency indirectly relevant
