id: LUK.7.42
reference: Luke 7:42
source:
  edition: SBLGNT
  text: μὴ ⸀ἐχόντων αὐτῶν ἀποδοῦναι ἀμφοτέροις ἐχαρίσατο. τίς οὖν ⸀αὐτῶν πλεῖον ⸂ἀγαπήσει
    αὐτόν⸃;
translation:
  text: Since they did not have the means to repay, he graciously forgave both. So
    which of them will love him more?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he canceled the debts of both.' The Greek verb can denote freely granting
      or remitting what is owed.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἐχόντων αὐτῶν
  chosen: Since they did not have the means
  alternatives:
  - When they did not have
  - As they had nothing
  lexicon: BDAG
  rationale: The genitive absolute with μή and present participle conveys the circumstance
    of lacking ability/resources. 'Since' fits the explanatory flow in English; 'have
    the means' makes explicit the implied financial capacity without overtranslating.
- source_word: ἀποδοῦναι
  chosen: to repay
  alternatives:
  - to pay back
  - to return
  lexicon: BDAG
  rationale: In a debt context, ἀποδίδωμι naturally means 'repay' or 'pay back.' 'Repay'
    is concise and idiomatic.
- source_word: ἀμφοτέροις
  chosen: both
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Refers to the two debtors. 'Both' is sufficient in English because the
    referent is immediately clear.
- source_word: ἐχαρίσατο
  chosen: he graciously forgave
  alternatives:
  - he forgave
  - he freely forgave
  - he canceled the debts of
  lexicon: BDAG
  rationale: χαρίζομαι carries the sense of granting freely, showing favor, or forgiving/remitting.
    In this debt parable, 'forgave' preserves the cancellation idea while 'graciously'
    reflects the verb's favor/grace nuance. 'Canceled the debts of' is contextually
    accurate but more interpretive than the Greek wording.
- source_word: τίς οὖν αὐτῶν
  chosen: So which of them
  alternatives:
  - Therefore which of them
  - Which of them then
  lexicon: BDAG
  rationale: οὖν marks inference or continuation. 'So' gives natural modern English
    while preserving the logical connection.
- source_word: πλεῖον
  chosen: more
  alternatives:
  - the more
  - greater love
  lexicon: BDAG
  rationale: Comparative adverbial/accusative usage here means 'more' in relation
    to love. English expresses this naturally with 'love him more.'
- source_word: ἀγαπήσει αὐτόν
  chosen: will love him
  alternatives:
  - will have love for him
  lexicon: BDAG
  rationale: Future active of ἀγαπάω is straightforwardly 'will love.' This also preserves
    the lexical connection to ἀγάπη ('love') per translation consistency.
