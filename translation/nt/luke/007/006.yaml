theological_decisions:
- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The doctrine excerpt specifies κύριος → 'Lord' as the default. In this
    context the centurion's address is respectful and may imply recognition of Jesus'
    authority; 'Lord' preserves the title without forcing a fully developed christological
    confession into the verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
