id: LUK.7.6
reference: Luke 7:6
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἐπορεύετο σὺν αὐτοῖς. ἤδη δὲ αὐτοῦ οὐ μακρὰν ἀπέχοντος ἀπὸ τῆς
    οἰκίας ἔπεμψεν ⸂φίλους ὁ ἑκατοντάρχης⸃ λέγων αὐτῷ· Κύριε, μὴ σκύλλου, οὐ γὰρ ⸂ἱκανός
    εἰμι⸃ ἵνα ὑπὸ τὴν στέγην μου εἰσέλθῃς·
translation:
  text: So Jesus went with them. But when he was already not far from the house, the
    centurion sent friends, saying to him, “Lord, do not trouble yourself, for I am
    not worthy that you should come under my roof.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “sir.” Greek: “Lord” (κύριε), which can function as a respectful address
      and may also imply recognition of Jesus’ authority.'
    reason: alternative_reading
  - marker: b
    text: Or “fit” / “qualified.” The Greek expression can denote adequacy or worthiness;
      here it conveys the centurion’s humility before Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύετο
  chosen: went
  alternatives:
  - was going
  - traveled
  lexicon: BDAG
  rationale: Imperfect middle/passive here narrates Jesus' movement in a straightforward
    way. 'Went' is natural modern English and fits optimal equivalence; 'was going'
    is possible but less smooth in context.
- source_word: σὺν αὐτοῖς
  chosen: with them
  lexicon: BDAG
  rationale: Direct rendering of the prepositional phrase, preserving the accompaniment
    sense.
- source_word: ἤδη ... οὐ μακρὰν ἀπέχοντος ἀπὸ τῆς οἰκίας
  chosen: when he was already not far from the house
  alternatives:
  - when he was already near the house
  - when he was already a short distance from the house
  lexicon: BDAG
  rationale: This genitive absolute marks time/circumstance. 'Not far from the house'
    closely reflects οὐ μακράν while remaining idiomatic. 'Near' is smoother but slightly
    less formally transparent.
- source_word: ἔπεμψεν φίλους
  chosen: sent friends
  alternatives:
  - sent some friends
  lexicon: BDAG
  rationale: φίλους is anarthrous plural and naturally rendered 'friends.' 'Some friends'
    is interpretive and not required by the Greek.
- source_word: ὁ ἑκατοντάρχης
  chosen: the centurion
  alternatives:
  - the captain
  lexicon: BDAG
  rationale: Standard rendering for the Roman military rank; precise and familiar
    in Gospel contexts.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - sir
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this narrative it functions
    as a respectful address to Jesus and may carry more than mere politeness; 'Lord'
    preserves that possible depth without overstating it.
- source_word: μὴ σκύλλου
  chosen: do not trouble yourself
  alternatives:
  - do not trouble yourself further
  - do not bother yourself
  lexicon: BDAG
  rationale: σκύλλω in this idiom means to cause trouble or bother. 'Do not trouble
    yourself' is idiomatic, respectful, and fits the middle/passive form in address.
- source_word: ἱκανός εἰμι
  chosen: I am not worthy
  alternatives:
  - I am not fit
  - I am not sufficient
  lexicon: BDAG
  rationale: Although ἱκανός can denote sufficiency or adequacy, in this social and
    honor-shame context the centurion expresses unworthiness before Jesus. 'Worthy'
    best captures the idiomatic sense in English and aligns with the parallel in the
    passage.
- source_word: ἵνα ... εἰσέλθῃς
  chosen: that you should come
  alternatives:
  - to have you come
  - for you to enter
  lexicon: BDAG
  rationale: The ἵνα clause expresses the content of what he regards himself unworthy
    for. 'That you should come' is natural English and preserves the subordinate force.
- source_word: ὑπὸ τὴν στέγην μου
  chosen: under my roof
  alternatives:
  - into my house
  lexicon: BDAG
  rationale: A vivid idiom preserved literally enough to retain the image of entering
    one's dwelling. 'Into my house' is interpretive and loses the concrete metaphor.
