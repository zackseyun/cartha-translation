theological_decisions:
- issue: Rendering Jesus' title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: This is a christological title with established usage and likely intertextual
    resonance; translating it more dynamically would risk muting its titular force.
    The chosen rendering preserves theological tension and traditional recognizability
    while remaining source-faithful.
  doctrine_reference: 'Affirmations; Translation philosophy #2 and #3'
- issue: Force of the accusations against Jesus
  chosen_reading: glutton and a drunkard
  alternative_readings:
  - gluttonous man and wine-drinker
  rationale: The verse reports hostile slander, not an endorsed moral judgment. Idiomatic
    English should preserve the sharpness of the accusation without softening it.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
