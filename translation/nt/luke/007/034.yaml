id: LUK.7.34
reference: Luke 7:34
source:
  edition: SBLGNT
  text: ἐλήλυθεν ὁ υἱὸς τοῦ ἀνθρώπου ἐσθίων καὶ πίνων, καὶ λέγετε· Ἰδοὺ ἄνθρωπος φάγος
    καὶ οἰνοπότης, φίλος τελωνῶν καὶ ἁμαρτωλῶν.
translation:
  text: The Son of Man has come eating and drinking, and you say, ‘Look, a glutton
    and a drunkard, a friend of tax collectors and sinners!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “Look, a man, a glutton and a wine-drinker.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθεν
  chosen: has come
  alternatives:
  - came
  - has arrived
  lexicon: BDAG
  rationale: Perfect tense of ἔρχομαι is well represented by English present perfect
    here, highlighting the arrived-and-present force in the comparison with John.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering of Jesus' self-designation;
    preserves the title's idiomatic and possibly Danielic resonance without paraphrase.
- source_word: ἐσθίων καὶ πίνων
  chosen: eating and drinking
  alternatives:
  - while eating and drinking
  lexicon: BDAG
  rationale: Present participles describe manner/accompaniment of his coming; simple
    English participial phrase is natural and sufficiently formal.
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Present indicative in direct address is naturally rendered as simple
    present in English.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Readable modern English that preserves the deictic/exclamatory force
    without archaic diction.
- source_word: ἄνθρωπος
  chosen: a
  alternatives:
  - a man
  lexicon: BDAG
  rationale: In the idiom Ἰδοὺ ἄνθρωπος φάγος καὶ οἰνοπότης, explicit 'man' is not
    required in idiomatic English; the sense is carried by the predicate nouns. This
    avoids awkwardness while preserving the accusation.
- source_word: φάγος
  chosen: glutton
  alternatives:
  - gluttonous man
  lexicon: BDAG
  rationale: Established lexical sense; concise English noun matches the insult.
- source_word: οἰνοπότης
  chosen: drunkard
  alternatives:
  - wine-drinker
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the pejorative accusation; 'wine-drinker'
    is more literal but less natural and less clearly pejorative in modern English.
- source_word: φίλος
  chosen: a friend
  alternatives:
  - friend
  lexicon: BDAG
  rationale: Predicate nominative in apposition to the prior insults; English article
    smooths the series naturally.
- source_word: τελωνῶν
  chosen: tax collectors
  alternatives:
  - tax gatherers
  lexicon: BDAG
  rationale: Standard modern rendering for τελώνης; clear and idiomatic.
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Direct and conventional rendering; preserves the social-religious label
    used by Jesus' opponents.
