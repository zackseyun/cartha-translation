id: LUK.7.47
reference: Luke 7:47
source:
  edition: SBLGNT
  text: οὗ χάριν, λέγω σοι, ἀφέωνται αἱ ἁμαρτίαι αὐτῆς αἱ πολλαί, ὅτι ἠγάπησεν πολύ·
    ᾧ δὲ ὀλίγον ἀφίεται, ὀλίγον ἀγαπᾷ.
translation:
  text: For this reason I tell you, her many sins have been forgiven, because she
    loved much. But the one who is forgiven little loves little.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'therefore she loved much.' The Greek conjunction can be understood in
      a way that highlights her love as evidence of her forgiven state rather than
      its cause.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗ χάριν
  chosen: For this reason
  alternatives:
  - therefore
  - for which reason
  lexicon: BDAG
  rationale: Idiomatic causal/inferential expression. 'For this reason' preserves
    the connective force in natural English without sounding wooden.
- source_word: ἀφέωνται
  chosen: have been forgiven
  alternatives:
  - are forgiven
  - have been released
  lexicon: BDAG
  rationale: Perfect passive indicates a completed act with present result. 'Have
    been forgiven' best captures the aspect and the context of an already-existing
    forgiven state.
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - offenses
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering for ἁμαρτίαι.
- source_word: αἱ πολλαί
  chosen: many
  alternatives:
  - the many
  - numerous
  lexicon: BDAG
  rationale: Attributive adjective modifying 'sins.' English idiom prefers 'her many
    sins' rather than the more literal 'her sins, the many.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - therefore that
  lexicon: BDAG
  rationale: Rendered causally in the flow of Jesus' explanation. This is the most
    natural reading in English, while the broader context guards against taking her
    love as the meritorious cause of forgiveness.
- source_word: ἠγάπησεν πολύ
  chosen: she loved much
  alternatives:
  - she loved greatly
  - she has loved much
  lexicon: BDAG
  rationale: Uses the lexical cognate of ἀγάπη as 'love' per project guidance. Aorist
    is naturally rendered as simple past here.
- source_word: ᾧ δὲ
  chosen: But the one who
  alternatives:
  - but he who
  - and the one who
  lexicon: BDAG
  rationale: Generic singular relative construction. 'The one who' is natural English
    and avoids importing male specificity not required by the Greek.
- source_word: ὀλίγον ἀφίεται
  chosen: is forgiven little
  alternatives:
  - has little forgiven
  - is forgiven a little
  lexicon: BDAG
  rationale: Passive present with neuter accusative functioning adverbially/quantitatively.
    'Is forgiven little' is the clearest idiomatic English equivalent.
- source_word: ὀλίγον ἀγαπᾷ
  chosen: loves little
  alternatives:
  - loves a little
  - has little love
  lexicon: BDAG
  rationale: Maintains the parallelism with the previous clause and preserves the
    concise proverbial force.
