theological_decisions:
- issue: Whether ὅτι ('because') implies that the woman's love is the meritorious
    cause of her forgiveness
  chosen_reading: Translate ὅτι as 'because' while understanding her love as evidential/confirmatory
    within the discourse, not as earning forgiveness.
  alternative_readings:
  - Translate more loosely as 'therefore' or 'hence' to avoid a causal misunderstanding
  rationale: The immediate context (especially the parable and v. 50) presents forgiveness
    as preceding and generating love, while this verse states the observable relation
    in a compressed way. Preserving 'because' respects the Greek conjunction and retains
    the theological tension rather than resolving it by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
