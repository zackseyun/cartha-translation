id: LUK.7.13
reference: Luke 7:13
source:
  edition: SBLGNT
  text: καὶ ἰδὼν αὐτὴν ὁ κύριος ἐσπλαγχνίσθη ἐπ’ αὐτῇ καὶ εἶπεν αὐτῇ· Μὴ κλαῖε.
translation:
  text: And when the Lord saw her, he was moved with compassion for her and said to
    her, “Do not weep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not cry” or “Stop weeping.” The Greek may be heard either as a general
      prohibition or as telling her to cease her present mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, temporally prior to the main verb. English
    idiom is smoother with the temporal clause 'when ... saw' rather than the more
    wooden 'having seen.'
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; default rendering
    is 'Lord.' In Luke's narrative this functions as a christological title for Jesus,
    not merely 'master.'
- source_word: ἐσπλαγχνίσθη
  chosen: was moved with compassion
  alternatives:
  - had compassion
  - felt compassion
  lexicon: BDAG
  rationale: σπλαγχνίζομαι denotes deep inward compassion or pity. 'Was moved with
    compassion' preserves the affective force better than the flatter 'had compassion,'
    while remaining natural English.
- source_word: ἐπ’ αὐτῇ
  chosen: for her
  alternatives:
  - toward her
  - over her
  - on her account
  lexicon: BDAG
  rationale: With σπλαγχνίζομαι, ἐπί + dative marks the person toward whom compassion
    is directed. 'For her' is the most natural English expression here.
- source_word: εἶπεν αὐτῇ
  chosen: said to her
  alternatives:
  - told her
  lexicon: BDAG
  rationale: λέγω is the standard verb 'say.' 'Said to her' is more formally aligned
    than 'told her,' which can imply a fuller directive.
- source_word: Μὴ κλαῖε
  chosen: Do not weep
  alternatives:
  - Do not cry
  - Stop weeping
  lexicon: BDAG
  rationale: Present imperative with μή can convey prohibition of an action in progress
    or a general prohibition. 'Do not weep' preserves the lexical sense of κλαίω and
    leaves the aspectual nuance less over-specified than 'Stop weeping.'
