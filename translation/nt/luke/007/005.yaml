id: LUK.7.5
reference: Luke 7:5
source:
  edition: SBLGNT
  text: ἀγαπᾷ γὰρ τὸ ἔθνος ἡμῶν καὶ τὴν συναγωγὴν αὐτὸς ᾠκοδόμησεν ἡμῖν.
translation:
  text: For he loves our nation, and he himself built the synagogue for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had the synagogue built for us.' The Greek says simply 'built,' which
      may refer either to personal involvement or to patronage/funding.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has affection for
  - cares for
  lexicon: BDAG
  rationale: Rendered with the straightforward cognate 'loves,' matching the default
    treatment of ἀγάπη-family terms in DOCTRINE.md and preserving the strength of
    the commendation without softening it to mere goodwill.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason the Jewish elders give for their appeal in the
    previous verse. 'For' preserves the explanatory connection in a natural English
    way.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  lexicon: BDAG
  rationale: Here the speakers refer to their own Jewish community as a collective
    people. 'Nation' best reflects ἔθνος in this self-referential civic/ethnic sense
    and matches the article-plus-possessive construction 'our nation.' 'People' is
    possible but less specific.
- source_word: συναγωγήν
  chosen: the synagogue
  alternatives:
  - our synagogue
  - meeting place
  lexicon: BDAG
  rationale: Rendered as 'the synagogue' because the Greek has the article but not
    an explicit possessive. In context it likely refers to the local synagogue known
    to speaker and hearer. 'Meeting place' would undertranslate the established Jewish
    institutional sense of συναγωγή.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic in position and form. 'He himself' preserves
    the emphasis that the centurion personally undertook or funded the building, rather
    than omitting the stress.
- source_word: ᾠκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  - had built
  lexicon: BDAG
  rationale: The aorist is naturally rendered as simple past, 'built.' 'Had built'
    is possible if one wishes to make explicit that a patron may have financed the
    work rather than physically performed it, but the Greek itself simply states the
    action and should not be expanded beyond that.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: 'The dative here is best taken as advantage/benefit: he built the synagogue
    ''for us,'' that is, for their community''s benefit. ''To us'' is less idiomatic
    in English.'
