id: LUK.7.31
reference: Luke 7:31
source:
  edition: SBLGNT
  text: Τίνι οὖν ὁμοιώσω τοὺς ἀνθρώπους τῆς γενεᾶς ταύτης, καὶ τίνι εἰσὶν ὅμοιοι;
translation:
  text: To what, then, shall I compare the men of this generation, and what are they
    like?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of this generation.' The Greek has 'the men of this generation,'
      using a masculine plural with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνι
  chosen: To what
  alternatives:
  - To whom
  - With what
  lexicon: BDAG
  rationale: Dative of τίς used interrogatively with ὁμοιόω asks for the standard
    of comparison. In English, 'to what' is the most natural idiom with 'compare.'
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks an inferential or transitional connection to the preceding context.
    'Then' preserves the discourse flow without sounding overly formal.
- source_word: ὁμοιώσω
  chosen: shall I compare
  alternatives:
  - will I compare
  - should I liken
  lexicon: BDAG
  rationale: Future active indicative first singular of ὁμοιόω. In an English rhetorical
    question, 'shall I compare' best conveys the deliberative force and remains natural.
- source_word: τοὺς ἀνθρώπους
  chosen: the men
  alternatives:
  - the people
  - the humans
  lexicon: BDAG
  rationale: ἄνθρωπος can mean 'human being/person,' but here the phrase is governed
    by the following genitive 'of this generation' and refers to the people under
    discussion. Per the project's gender-accurate policy, 'men' is retained as a representative
    term rather than flattening to a gender-neutral expression, since the Greek is
    grammatically masculine and generic.
- source_word: τῆς γενεᾶς ταύτης
  chosen: of this generation
  alternatives:
  - of this age
  - of these people
  lexicon: BDAG
  rationale: γενεά commonly denotes a generation or contemporaneous group. 'Of this
    generation' is the standard and contextually precise rendering in Jesus' saying.
- source_word: καὶ
  chosen: and
  alternatives:
  - and indeed
  - also
  lexicon: BDAG
  rationale: Simple connective joining the two parallel questions.
- source_word: τίνι
  chosen: what
  alternatives:
  - to what
  - to whom
  lexicon: BDAG
  rationale: Repeated interrogative continuing the comparison. English idiom with
    'are they like' naturally uses 'what' rather than repeating 'to what.'
- source_word: εἰσὶν ὅμοιοι
  chosen: are they like
  alternatives:
  - are they similar
  - are they comparable
  lexicon: BDAG
  rationale: Predicate adjective construction meaning 'to be like/similar to.' 'What
    are they like?' is idiomatic English and preserves the rhetorical parallelism.
