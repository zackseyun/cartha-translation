theological_decisions:
- issue: Generic masculine ἀνθρώπους
  chosen_reading: the men
  alternative_readings:
  - the people
  rationale: The Greek uses a grammatically masculine plural with representative force.
    Following the stated gender-accurate policy, the translation keeps a masculine
    English form rather than neutralizing it, while recognizing that the referent
    is the people of that generation generally.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
