theological_decisions:
- issue: Rendering of the citation from Malachi/Exodus language applied by Jesus to
    John in relation to himself
  chosen_reading: Retain the second-person pronouns ('your face,' 'your way,' 'before
    you') without interpretive expansion
  alternative_readings:
  - Paraphrastic expansion identifying explicitly that the messenger prepares the
    way for the Lord/Messiah
  rationale: The verse itself applies the scriptural wording directly and should not
    be expanded beyond the Greek. Preserving the pronouns maintains the theological
    force of Jesus' application while avoiding imported commentary.
  doctrine_reference: Preserve theological tension rather than resolve it.
