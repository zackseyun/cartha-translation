id: LUK.7.27
reference: Luke 7:27
source:
  edition: SBLGNT
  text: οὗτός ἐστιν περὶ οὗ γέγραπται· ⸀Ἰδοὺ ἀποστέλλω τὸν ἄγγελόν μου πρὸ προσώπου
    σου, ὃς κατασκευάσει τὴν ὁδόν σου ἔμπροσθέν σου.
translation:
  text: 'This is he about whom it is written: ‘Behold, I am sending my messenger before
    your face, who will prepare your way before you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'before you.' The Greek literally says 'before your face.'
    reason: lexical_alternative
  - marker: b
    text: '''Messenger'' could also be rendered ''angel,'' but here it refers to a
      human envoy, namely John.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring emphatically to John; 'This' is natural English
    and preserves the deictic force.
- source_word: περὶ οὗ γέγραπται
  chosen: about whom it is written
  alternatives:
  - concerning whom it has been written
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the prepositional relative clause plus
    perfect passive; preserves the scriptural citation formula without awkwardness.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the elevated, citation-like force of the prophetic quotation.
    'Behold' is still intelligible in modern English and suits the solemn register.
- source_word: ἀποστέλλω
  chosen: I am sending
  alternatives:
  - I send
  lexicon: BDAG
  rationale: Present tense in a prophetic citation is well represented by an English
    progressive here, conveying vivid immediacy.
- source_word: ἄγγελόν
  chosen: messenger
  alternatives:
  - angel
  lexicon: BDAG
  rationale: In this context the referent is John the Baptist as a human envoy, so
    'messenger' best reflects the sense and avoids misleading readers toward a heavenly
    being.
- source_word: πρὸ προσώπου σου
  chosen: before your face
  alternatives:
  - before you
  - in front of you
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the concrete imagery of the Greek
    and the OT citation background. Because this may sound unusual in English, a smoother
    alternative is preserved in a footnote.
- source_word: κατασκευάσει
  chosen: will prepare
  alternatives:
  - will make ready
  lexicon: BDAG
  rationale: Captures the future action of making ready in a clear, natural way.
- source_word: τὴν ὁδόν σου
  chosen: your way
  alternatives:
  - your road
  - your path
  lexicon: BDAG
  rationale: In prophetic and metaphorical usage, 'way' is the established and most
    fitting English equivalent.
- source_word: ἔμπροσθέν σου
  chosen: before you
  alternatives:
  - in front of you
  lexicon: BDAG
  rationale: Natural rendering of the final prepositional phrase; keeping it distinct
    from the earlier more literal 'before your face' preserves both the citation's
    imagery and readable English.
