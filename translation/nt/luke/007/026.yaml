theological_decisions:
- issue: Identity and status of John the Baptist in Jesus' description
  chosen_reading: Jesus declares John to be a prophet and indeed more than a prophet,
    without specifying in this verse alone the exact nature of that superiority.
  alternative_readings:
  - John is the greatest prophet
  - John is the eschatological messenger specifically
  rationale: The phrase 'more than a prophet' should be translated as stated and not
    expanded into a fuller theological explanation within the verse. The immediate
    context explains the comparison, but this verse itself should preserve the concise
    formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
