id: LUK.7.26
reference: Luke 7:26
source:
  edition: SBLGNT
  text: ἀλλὰ τί ⸀ἐξήλθατε ἰδεῖν; προφήτην; ναί, λέγω ὑμῖν, καὶ περισσότερον προφήτου.
translation:
  text: But what did you go out to see? A prophet? Yes, I tell you, and more than
    a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'something greater than a prophet.' The Greek comparative expression
      can be rendered more literally this way, but 'more than a prophet' is the most
      natural English equivalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Adversative particle marking a contrast with the previous rhetorical
    question. 'But' is the most natural English transition here.
- source_word: τί
  chosen: what
  alternatives:
  - why
  lexicon: BDAG
  rationale: Interrogative pronoun in the accusative neuter, functioning as the object
    of 'go out to see.' The sense is clearly 'what' rather than 'why' in this repeated
    question formula.
- source_word: ἐξήλθατε
  chosen: did you go out
  alternatives:
  - did you go forth
  - went out
  lexicon: BDAG
  rationale: Aorist active indicative, second plural, from ἐξέρχομαι. Rendered with
    English auxiliary 'did' to form a natural question while preserving the past action.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to look at
  - to behold
  lexicon: BDAG
  rationale: Aorist infinitive of ὁράω expressing purpose after ἐξήλθατε. 'To see'
    is the most straightforward and idiomatic rendering.
- source_word: προφήτην
  chosen: A prophet
  lexicon: BDAG
  rationale: 'Accusative singular used elliptically in a rhetorical question: ''A
    prophet?'' Capitalization is not warranted, since it is a common noun, not a title
    here.'
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  - Indeed
  lexicon: BDAG
  rationale: Strong affirmative response to the rhetorical question. 'Yes' is direct
    and idiomatic.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common discourse formula in the Gospels. 'I tell you' is more natural
    modern English while preserving the force of direct address.
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the affirmation to the climactic
    comparative statement. 'And' preserves the Greek structure without overinterpreting.
- source_word: περισσότερον προφήτου
  chosen: more than a prophet
  alternatives:
  - something greater than a prophet
  - one more than a prophet
  lexicon: BDAG
  rationale: The comparative περισσότερον with the genitive προφήτου yields the idiomatic
    sense 'more than a prophet.' This preserves the emphatic comparison without adding
    interpretive material.
