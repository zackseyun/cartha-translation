theological_decisions:
- issue: Rendering δοῦλος in a healing narrative
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt allows context-dependent rendering of δοῦλος. In
    this narrative the bonded social status remains relevant, and nothing in the verse
    softens the term into mere hired service. Therefore 'slave' is preferred, with
    'servant' preserved as an alternative in a footnote for readers aware of traditional
    English renderings.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1 and §5'
