id: LUK.7.10
reference: Luke 7:10
source:
  edition: SBLGNT
  text: καὶ ὑποστρέψαντες ⸂εἰς τὸν οἶκον οἱ πεμφθέντες⸃ εὗρον ⸀τὸν δοῦλον ὑγιαίνοντα.
translation:
  text: And when those who had been sent returned to the house, they found the slave
    healthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "servant." The Greek word is doulos, which can mean either "slave" or
      "servant" depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποστρέψαντες
  chosen: when ... returned
  alternatives:
  - having returned
  - returned
  lexicon: BDAG
  rationale: Aorist participle of ὑποστρέφω, functioning temporally before the main
    verb εὗρον. English 'when ... returned' conveys the participial temporal sense
    naturally while preserving sequence.
- source_word: εἰς τὸν οἶκον
  chosen: to the house
  alternatives:
  - into the house
  - home
  lexicon: BDAG
  rationale: εἰς with accusative marks motion toward/into a place. 'To the house'
    is natural English and keeps the concrete location without overinterpreting as
    'home.'
- source_word: οἱ πεμφθέντες
  chosen: those who had been sent
  alternatives:
  - the ones sent
  - the messengers
  lexicon: BDAG
  rationale: Articular aorist passive participle from πέμπω. 'Those who had been sent'
    preserves the passive and identifies the group without adding the interpretive
    noun 'messengers,' though that sense is contextually true.
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they discovered
  lexicon: BDAG
  rationale: Standard rendering of εὑρίσκω in narrative context.
- source_word: τὸν δοῦλον
  chosen: the slave
  alternatives:
  - the servant
  - the bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    Here the centurion's δοῦλος is socially subordinate and owned/under authority;
    'slave' better preserves the bonded status than 'servant,' while remaining natural
    in English.
- source_word: ὑγιαίνοντα
  chosen: healthy
  alternatives:
  - well
  - in good health
  - healed
  lexicon: BDAG
  rationale: Present active participle from ὑγιαίνω, meaning to be healthy/sound.
    'Healthy' is concise and avoids importing the stronger interpretive term 'healed,'
    though the context implies restoration.
