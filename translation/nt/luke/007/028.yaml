id: LUK.7.28
reference: Luke 7:28
source:
  edition: SBLGNT
  text: ⸀λέγω ὑμῖν, μείζων ἐν γεννητοῖς γυναικῶν ⸀Ἰωάννου οὐδείς ἐστιν· ὁ δὲ μικρότερος
    ἐν τῇ βασιλείᾳ τοῦ θεοῦ μείζων αὐτοῦ ἐστιν.
translation:
  text: I tell you, among those born of women no one is greater than John; yet the
    least in the kingdom of God is greater than he is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I say to you.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'born of women' is an idiom for human beings generally.
    reason: cultural_note
  - marker: c
    text: Or 'the one who is least in the kingdom of God.' The Greek expression can
      be rendered more explicitly with a relative phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard discourse formula. 'I tell you' is natural modern English
    while preserving the directness of the present-tense Greek.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - greater one
  lexicon: BDAG
  rationale: Comparative of μέγας. 'Greater' preserves the comparative force without
    over-interpreting the basis of greatness.
- source_word: ἐν γεννητοῖς γυναικῶν
  chosen: among those born of women
  alternatives:
  - among those born by women
  - among the offspring of women
  lexicon: BDAG
  rationale: This idiom refers to human beings in general. 'Among those born of women'
    is a clear, fairly literal rendering that preserves the Semitic flavor.
- source_word: Ἰωάννου
  chosen: John
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: οὐδείς ἐστιν
  chosen: no one is
  alternatives:
  - there is no one
  lexicon: BDAG
  rationale: Natural English expression of the existential/comparative statement.
- source_word: ὁ δὲ μικρότερος
  chosen: yet the least
  alternatives:
  - but the smaller one
  - but the lesser one
  - but the one who is least
  lexicon: BDAG
  rationale: The article plus comparative functions substantivally. 'The least' is
    idiomatic English and fits the contrast with John's greatness. 'Yet' renders δέ
    with a mildly adversative force suitable to the sentence.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - in God's kingdom
  lexicon: BDAG
  rationale: Standard rendering of βασιλεία τοῦ θεοῦ. Retains the familiar biblical
    expression and the locative sense of ἐν.
- source_word: μείζων αὐτοῦ ἐστιν
  chosen: is greater than he is
  alternatives:
  - is greater than him
  lexicon: BDAG
  rationale: Explicitly supplies the comparison in idiomatic English while keeping
    αὐτοῦ as a comparison with John. 'Than he is' is slightly more formal and avoids
    ambiguity.
