theological_decisions:
- issue: Meaning of the comparison between John and 'the least in the kingdom of God'
  chosen_reading: The translation preserves the text's paradoxical comparison without
    explaining whether 'greater' refers to status, privilege, redemptive-historical
    position, or another dimension.
  alternative_readings:
  - The least kingdom member has greater covenant privilege than John
  - The least kingdom member is morally/spiritually greater than John
  - The saying is hyperbolic and honor-shame rhetorical
  rationale: The Greek states the comparison but does not specify the exact basis
    of greatness. To avoid importing a denominational or interpretive resolution,
    the English keeps the ambiguity intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
