theological_decisions:
- issue: Rendering δοῦλος in a narrative household context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The text refers to the centurion's δοῦλος, a household dependent under
    his authority. The bonded nature is part of the social reality of the passage,
    so 'slave' is preferred under the project's contested-terms guidance. 'Servant'
    is preserved in a footnote because it is a common traditional rendering and may
    be argued from context where emphasis falls on service rather than legal status.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy items 1 and 5'
