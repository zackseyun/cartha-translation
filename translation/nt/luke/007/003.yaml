id: LUK.7.3
reference: Luke 7:3
source:
  edition: SBLGNT
  text: ἀκούσας δὲ περὶ τοῦ Ἰησοῦ ἀπέστειλεν πρὸς αὐτὸν πρεσβυτέρους τῶν Ἰουδαίων,
    ἐρωτῶν αὐτὸν ὅπως ἐλθὼν διασώσῃ τὸν δοῦλον αὐτοῦ.
translation:
  text: When he heard about Jesus, he sent to him elders of the Jews, asking him to
    come and save his slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Greek word is doulos, which can mean 'servant' or 'slave'
      depending on context; here 'slave' was chosen to preserve the bonded status
      implied by the term.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  chosen: When he heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    'When he heard' is natural English and preserves the temporal sense without over-literal
    awkwardness.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective. In smooth modern English it is best left
    untranslated, with the connection carried by the sentence flow.
- source_word: περὶ τοῦ Ἰησοῦ
  chosen: about Jesus
  alternatives:
  - concerning Jesus
  - about Yeshua
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' 'About
    Jesus' is idiomatic and clear. The personal name is transliterated by standard
    English convention per translation philosophy.
- source_word: ἀπέστειλεν πρὸς αὐτὸν
  chosen: he sent to him
  alternatives:
  - he sent messengers to him
  - he sent word to him
  lexicon: BDAG
  rationale: The verb means 'sent,' and the object 'elders of the Jews' specifies
    whom he sent. 'Messengers' would be interpretive; the Greek directly says he sent
    elders to Jesus.
- source_word: πρεσβυτέρους τῶν Ἰουδαίων
  chosen: elders of the Jews
  alternatives:
  - Jewish elders
  - the elders of the Jews
  lexicon: BDAG
  rationale: πρεσβύτεροι here refers to recognized community leaders, not merely older
    men. 'Elders of the Jews' closely follows the Greek genitive construction and
    avoids prematurely specifying an institutional nuance beyond the text.
- source_word: ἐρωτῶν αὐτὸν
  chosen: asking him
  alternatives:
  - appealing to him
  - requesting him
  lexicon: BDAG
  rationale: The participle expresses the purpose/content accompanying the sending.
    'Asking him' is the straightforward sense in this context of polite request.
- source_word: ὅπως ἐλθὼν
  chosen: to come
  alternatives:
  - that he might come
  - so that, after coming
  lexicon: BDAG
  rationale: ὅπως with the subjunctive expresses intended result/purpose, and the
    participle ἐλθών is naturally folded into English infinitival style here. 'To
    come' is concise and preserves the request's content.
- source_word: διασώσῃ
  chosen: save
  alternatives:
  - heal
  - rescue
  - bring safely through
  lexicon: BDAG
  rationale: διασῴζω can mean save, rescue, preserve, or heal depending on context.
    Since the immediate context concerns a gravely ill slave (vv. 2, 10), 'save' preserves
    the broader Greek sense without narrowing it only to physical healing, while still
    fitting the narrative.
- source_word: τὸν δοῦλον αὐτοῦ
  chosen: his slave
  alternatives:
  - his servant
  - his bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος is rendered context-dependently as
    'servant' or 'slave.' Here it denotes a socially subordinate household dependent
    owned by the centurion; 'slave' better preserves the bonded status. Because English
    readers may expect 'servant' from tradition, that alternative is preserved in
    a footnote.
