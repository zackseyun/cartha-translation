theological_decisions:
- issue: Nature of Jesus' acts toward those with πνεύματα πονηρά
  chosen_reading: The verse presents Jesus as exercising authority over evil spirits
    as part of his healing ministry, without reducing the phrase to mere illness metaphor.
  alternative_readings:
  - Treating 'evil spirits' as a non-personal description of mental or physical maladies
  rationale: Because πνευμάτων πονηρῶν is a straightforward expression for evil spirits,
    the translation preserves the personal-spiritual sense rather than demythologizing
    it. This aligns with the text’s plain sense and avoids importing a modern reductionistic
    reading.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
