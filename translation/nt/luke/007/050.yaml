id: LUK.7.50
reference: Luke 7:50
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς τὴν γυναῖκα· Ἡ πίστις σου σέσωκέν σε· πορεύου εἰς εἰρήνην.
translation:
  text: And he said to the woman, “Your faith has saved you; go in peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your trust has saved you'; less likely here, 'Your faithfulness has
      saved you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has made you well.' The Greek verb can mean 'save,' 'rescue,' or 'make
      well,' but here the context emphasizes forgiveness and salvation.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said.' 'Told' is possible
    but less direct and less formally aligned with the Greek.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ here marks simple narrative continuation. 'And' preserves the connective
    force in readable English without overstating contrast.
- source_word: πρὸς τὴν γυναῖκα
  chosen: to the woman
  alternatives:
  - to the wife
  - to the lady
  lexicon: BDAG
  rationale: γυνή here clearly refers to the woman in the scene, not 'wife.' 'To the
    woman' is the plain contextual sense.
- source_word: Ἡ πίστις σου
  chosen: Your faith
  alternatives:
  - Your trust
  - Your faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context it denotes her trusting response to Jesus. 'Trust' is a viable nuance,
    and 'faithfulness' is less likely here, so alternatives are preserved in a footnote.
- source_word: σέσωκέν σε
  chosen: has saved you
  alternatives:
  - has made you well
  - has rescued you
  lexicon: BDAG
  rationale: Perfect of σῴζω indicates a completed action with abiding result. In
    this forgiveness/salvation context, 'has saved you' best captures both the lexical
    sense and theological setting. 'Has made you well' is possible for σῴζω in healing
    contexts, but here the immediate context centers on forgiveness rather than physical
    healing.
- source_word: πορεύου
  chosen: go
  alternatives:
  - be on your way
  - depart
  lexicon: BDAG
  rationale: Present middle imperative of πορεύομαι is idiomatically rendered 'go.'
    Expanded English expressions are unnecessary.
- source_word: εἰς εἰρήνην
  chosen: in peace
  alternatives:
  - into peace
  - with peace
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' the idiom πορεύου εἰς εἰρήνην is best
    rendered 'go in peace' in natural English, conveying a state of peace accompanying
    her departure.
