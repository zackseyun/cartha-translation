theological_decisions:
- issue: Meaning of σῴζω in relation to forgiveness and salvation
  chosen_reading: Rendered as 'has saved you' rather than a merely therapeutic sense
    such as 'has made you well.'
  alternative_readings:
  - has made you well
  - has healed you
  rationale: The broader context in Luke 7:36–50 emphasizes forgiveness of sins and
    the woman's trusting response to Jesus. Translating σῴζω as 'saved' preserves
    that theological weight without importing more than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence; πίστις default rendering 'faith'.
