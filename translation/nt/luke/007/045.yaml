theological_decisions:
- issue: Hospitality custom implied by the greeting kiss
  chosen_reading: Render the action plainly without expanding it into a cultural explanation
    in the main text.
  alternative_readings:
  - You gave me no customary kiss of greeting
  rationale: The verse contrasts Simon's failure in hospitality with the woman's devotion.
    The cultural significance is real, but the Greek itself simply states the act.
    Optimal equivalence keeps the main text uncluttered and preserves the cultural
    nuance in a footnote rather than importing explanation into the translation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
