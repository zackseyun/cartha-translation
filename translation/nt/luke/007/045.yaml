id: LUK.7.45
reference: Luke 7:45
source:
  edition: SBLGNT
  text: φίλημά μοι οὐκ ἔδωκας· αὕτη δὲ ἀφ’ ἧς εἰσῆλθον οὐ διέλιπεν καταφιλοῦσά μου
    τοὺς πόδας.
translation:
  text: You gave me no kiss, but from the time I came in, she has not stopped kissing
    my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no kiss of greeting'; the kiss was a customary act of hospitality.
    reason: cultural_note
  - marker: b
    text: 'The verb can imply affectionate or repeated kissing: ''has not stopped
      covering my feet with kisses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλημά
  chosen: kiss
  alternatives:
  - a kiss
  - kiss of greeting
  lexicon: BDAG
  rationale: The accusative noun with ἔδωκας idiomatically means giving a kiss, especially
    a customary greeting. 'Kiss' is concise and natural in English; 'kiss of greeting'
    is interpretive and better left implicit from context.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object of ἔδωκας. English idiom
    prefers 'You gave me no kiss' over the more wooden 'You gave no kiss to me.'
- source_word: ἔδωκας
  chosen: gave
  alternatives:
  - offered
  lexicon: BDAG
  rationale: δίδωμι is straightforwardly 'give.' In this idiom it refers to offering
    a greeting kiss. 'Gave' preserves the Greek wording without unnecessary paraphrase.
- source_word: αὕτη δὲ
  chosen: but she
  alternatives:
  - but this woman
  - yet she
  lexicon: BDAG
  rationale: αὕτη points contrastively to the woman in the scene. 'But she' captures
    the contrast with Simon naturally; 'this woman' is possible but slightly more
    demonstrative than needed in English here.
- source_word: ἀφ’ ἧς
  chosen: from the time
  alternatives:
  - since
  - from when
  lexicon: BDAG
  rationale: 'The preposition with relative pronoun introduces a temporal sense: ''from
    the time that/since.'' ''From the time'' preserves the temporal force clearly.'
- source_word: εἰσῆλθον
  chosen: I came in
  alternatives:
  - I entered
  lexicon: BDAG
  rationale: εἰσέρχομαι means 'enter/go in.' 'I came in' is idiomatic modern English
    in this hospitality setting; 'I entered' is more formal but less natural.
- source_word: οὐ διέλιπεν
  chosen: has not stopped
  alternatives:
  - did not cease
  - has not ceased
  lexicon: BDAG
  rationale: 'διαλείπω means to stop, cease, or leave off. Given the action continuing
    from Jesus'' entrance up to the present speech situation, English present perfect
    best conveys the ongoing sense: ''has not stopped.'''
- source_word: καταφιλοῦσά
  chosen: kissing
  alternatives:
  - covering with kisses
  - kissing repeatedly
  lexicon: BDAG
  rationale: καταφιλέω intensifies φιλέω and can imply affectionate or repeated kissing.
    Because English 'kissing' in context can carry iterative force, it works well
    in the main text; the stronger nuance is worth preserving in a footnote.
- source_word: μου τοὺς πόδας
  chosen: my feet
  alternatives:
  - my foot
  lexicon: BDAG
  rationale: The plural object is explicit in Greek and should be retained. 'My feet'
    is the natural rendering.
