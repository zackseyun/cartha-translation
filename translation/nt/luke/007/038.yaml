id: LUK.7.38
reference: Luke 7:38
source:
  edition: SBLGNT
  text: καὶ στᾶσα ⸂ὀπίσω παρὰ τοὺς πόδας αὐτοῦ⸃ κλαίουσα, ⸂τοῖς δάκρυσιν ἤρξατο βρέχειν
    τοὺς πόδας αὐτοῦ⸃ καὶ ταῖς θριξὶν τῆς κεφαλῆς αὐτῆς ἐξέμασσεν, καὶ κατεφίλει τοὺς
    πόδας αὐτοῦ καὶ ἤλειφεν τῷ μύρῳ.
translation:
  text: and standing behind him at his feet, weeping, she began to wet his feet with
    her tears, and she was wiping them with the hair of her head, and was kissing
    his feet fervently and anointing them with the perfume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept kissing his feet'; the Greek verb is intensive and the imperfect
      tense suggests repeated action.
    reason: lexical_alternative
  - marker: b
    text: Or 'with ointment' or 'with fragrant oil'; the Greek word refers to perfumed
      oil or ointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: στᾶσα
  chosen: standing
  alternatives:
  - having stood
  - after standing
  lexicon: BDAG
  rationale: Aorist participle of ἵστημι used adverbially; 'standing' is natural English
    and preserves the scene-setting force without overformal stiffness.
- source_word: ὀπίσω παρὰ τοὺς πόδας αὐτοῦ
  chosen: behind him at his feet
  alternatives:
  - behind, beside his feet
  - behind him by his feet
  lexicon: BDAG
  rationale: Combines ὀπίσω ('behind') with παρά + accusative in a locative sense
    near the feet. 'At his feet' is idiomatic English and fits the posture implied
    by reclining at table.
- source_word: κλαίουσα
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: '''Weeping'' better conveys sustained emotional crying than the more
    general ''crying.'''
- source_word: τοῖς δάκρυσιν ἤρξατο βρέχειν
  chosen: she began to wet
  alternatives:
  - she began to drench
  - she began to moisten
  lexicon: BDAG
  rationale: ἄρχομαι + infinitive marks the inception of the action. βρέχω literally
    means 'to wet' or 'to moisten'; 'wet' is the clearest natural rendering without
    exaggeration.
- source_word: ἐξέμασσεν
  chosen: she was wiping
  alternatives:
  - she wiped
  - she dried
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action. The verb means 'wipe off' or
    'wipe dry'; 'wiping' preserves the process, while 'dried' would interpret the
    result more than the action.
- source_word: ταῖς θριξὶν τῆς κεφαλῆς αὐτῆς
  chosen: with the hair of her head
  alternatives:
  - with her hair
  lexicon: BDAG
  rationale: The fuller phrase is retained because the Greek explicitly says 'the
    hair of her head'; this sounds natural enough in English and preserves the vividness.
- source_word: κατεφίλει
  chosen: was kissing ... fervently
  alternatives:
  - kept kissing
  - was kissing repeatedly
  - kissed affectionately
  lexicon: BDAG
  rationale: The compound καταφιλέω intensifies φιλέω and often implies repeated or
    affectionate kissing. 'Was kissing ... fervently' preserves both the imperfect
    aspect and the intensified sense without sounding awkward.
- source_word: ἤλειφεν
  chosen: anointing
  alternatives:
  - was anointing
  - applying
  lexicon: BDAG
  rationale: Imperfect again indicates ongoing action. 'Anointing' is the standard
    rendering of ἀλείφω in this context and preserves the cultural and narrative significance.
- source_word: τῷ μύρῳ
  chosen: with the perfume
  alternatives:
  - with ointment
  - with fragrant oil
  lexicon: BDAG
  rationale: μύρον refers to perfumed ointment/oil. 'Perfume' is accessible modern
    English and fits the narrative, though 'ointment' remains a viable more traditional
    alternative.
