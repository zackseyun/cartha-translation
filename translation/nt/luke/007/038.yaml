theological_decisions:
- issue: Rendering of the woman's actions toward Jesus' feet
  chosen_reading: Retained the concrete bodily actions without softening their emotional
    intensity or importing devotional interpretation.
  alternative_readings:
  - More restrained wording that minimizes the repeated kissing
  - More interpretive wording such as 'showing devotion'
  rationale: The verse presents vivid, humble, and emotionally charged actions. The
    translation should preserve that force while avoiding added theological commentary
    not explicit in the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
