theological_decisions:
- issue: Meaning of 'justified God'
  chosen_reading: The phrase means that the people acknowledged or affirmed that God
    was righteous and in the right.
  alternative_readings:
  - The phrase could be rendered more formally as 'justified God'.
  rationale: The verse describes a human response to God's message and John's baptism,
    not any change in God's status. The chosen rendering avoids suggesting that humans
    somehow make God righteous, while preserving the judicial nuance of δικαιόω.
  doctrine_reference: 'Translation philosophy: preserve source meaning in readable
    modern English; do not import doctrinal claims the text does not make.'
- issue: Force of the participle 'having been baptized'
  chosen_reading: The participle is rendered as circumstantial/background rather than
    explicitly causal.
  alternative_readings:
  - 'It may be understood causally: ''because they had been baptized with John''s
    baptism.'''
  rationale: The Greek participle can imply cause in context, but the form itself
    does not require that interpretation. The main text preserves the connection without
    over-resolving the syntax.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
