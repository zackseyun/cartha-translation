id: LUK.7.29
reference: Luke 7:29
source:
  edition: SBLGNT
  text: (καὶ πᾶς ὁ λαὸς ἀκούσας καὶ οἱ τελῶναι ἐδικαίωσαν τὸν θεόν, βαπτισθέντες τὸ
    βάπτισμα Ἰωάννου·
translation:
  text: And all the people, when they heard this, even the tax collectors, declared
    God to be righteous, having been baptized with John's baptism.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'justified God.' The sense is that they acknowledged that
      God was in the right.
    reason: lexical_alternative
  - marker: b
    text: 'The participle may also be understood causally: ''because they had been
      baptized with John''s baptism.'''
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ λαὸς
  chosen: all the people
  alternatives:
  - the whole people
  - everyone among the people
  lexicon: BDAG
  rationale: The singular collective expression is best rendered as a collective in
    English. 'All the people' preserves the broad scope without awkwardness.
- source_word: ἀκούσας
  chosen: when they heard this
  alternatives:
  - having heard
  - on hearing
  lexicon: BDAG
  rationale: The aorist participle is adverbial and naturally temporal here. Supplying
    'this' is idiomatic in English and reflects the implied object from context.
- source_word: τελῶναι
  chosen: tax collectors
  alternatives:
  - tax gatherers
  lexicon: BDAG
  rationale: Standard modern rendering; clear and natural English.
- source_word: ἐδικαίωσαν τὸν θεόν
  chosen: declared God to be righteous
  alternatives:
  - justified God
  - acknowledged God's justice
  - declared God just
  lexicon: BDAG
  rationale: Here δικαιόω with God as object does not mean making God righteous, but
    recognizing or affirming him as in the right. 'Declared God to be righteous' preserves
    the forensic sense while remaining intelligible. 'Justified God' is more literal
    but potentially misleading in modern English.
- source_word: βαπτισθέντες
  chosen: having been baptized
  alternatives:
  - because they had been baptized
  - after being baptized
  lexicon: BDAG
  rationale: The aorist passive participle is best kept as a participial clause in
    English. It likely gives the circumstance/background for their response rather
    than an explicitly causal statement, so a neutral participial rendering is preferred.
- source_word: τὸ βάπτισμα Ἰωάννου
  chosen: with John's baptism
  alternatives:
  - in John's baptism
  - with the baptism of John
  lexicon: BDAG
  rationale: This is a natural English rendering of the cognate construction. 'John's
    baptism' is concise and clear; 'with' fits English idiom for the rite received.
