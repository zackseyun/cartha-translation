id: LUK.7.4
reference: Luke 7:4
source:
  edition: SBLGNT
  text: οἱ δὲ παραγενόμενοι πρὸς τὸν Ἰησοῦν παρεκάλουν αὐτὸν σπουδαίως λέγοντες ὅτι
    Ἄξιός ἐστιν ᾧ ⸀παρέξῃ τοῦτο,
translation:
  text: When they came to Jesus, they earnestly appealed to him, saying, “He is worthy
    that you should grant this to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He is worthy for you to do this for him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  chosen: came
  alternatives:
  - arrived
  - came to him
  lexicon: BDAG
  rationale: The participle denotes arriving or coming to be present. 'Came' is natural
    modern English and fits the temporal participial sense when paired with 'to Jesus.'
- source_word: παρεκάλουν
  chosen: appealed
  alternatives:
  - urged
  - begged
  - entreated
  lexicon: BDAG
  rationale: παρακαλέω can mean urge, appeal to, exhort, or implore. In this context
    the elders are making a respectful but urgent request on behalf of the centurion.
    'Appealed' preserves both the request and the respectful tone better than the
    stronger 'begged.'
- source_word: σπουδαίως
  chosen: earnestly
  alternatives:
  - diligently
  - seriously
  - urgently
  lexicon: BDAG
  rationale: The adverb conveys earnestness or zeal. 'Earnestly' idiomatically modifies
    their appeal in English and captures the intensity without overstating it.
- source_word: Ἄξιός
  chosen: worthy
  alternatives:
  - deserving
  - fit
  lexicon: BDAG
  rationale: ἄξιος commonly means worthy or deserving. 'Worthy' is the most direct
    rendering and preserves the evaluative force of the speakers' claim.
- source_word: ᾧ
  chosen: to him
  alternatives:
  - for whom
  - for him
  lexicon: BDAG
  rationale: The dative relative pronoun refers to the centurion. English requires
    the relation to be made explicit in the clause; 'to him' works naturally with
    'grant this.'
- source_word: παρέξῃ
  chosen: you should grant
  alternatives:
  - you should do
  - you should provide
  - you should bestow
  lexicon: BDAG
  rationale: παρέχω means provide, grant, offer, or cause. Here it refers to Jesus
    doing the requested favor. 'Grant' fits the indirect-object construction and the
    deferential tone of the request. The future middle indicative functions in a relative
    clause with a sense naturally expressed in English as 'should grant.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this favor
  - this request
  lexicon: BDAG
  rationale: The demonstrative points to the requested action just mentioned in context.
    'This' is sufficiently literal in the main text; more explicit expansions would
    move toward paraphrase.
