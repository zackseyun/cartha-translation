theological_decisions:
- issue: Meaning of μαλακοῖς in context
  chosen_reading: Literal reference to soft/fine clothing, not a moral characterization.
  alternative_readings:
  - effeminate clothing
  - delicate garments
  rationale: In this context Jesus contrasts wilderness austerity with courtly luxury.
    The immediate mention of splendid clothing and royal palaces confirms a socioeconomic
    contrast, not a moral judgment about effeminacy.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Social setting of βασιλείοις
  chosen_reading: royal palaces
  alternative_readings:
  - kings' courts
  rationale: The term denotes royal residences; rendering it as 'royal palaces' communicates
    the setting clearly in modern English without changing the sense.
  doctrine_reference: Translation philosophy §6
