id: LUK.7.25
reference: Luke 7:25
source:
  edition: SBLGNT
  text: ἀλλὰ τί ⸀ἐξήλθατε ἰδεῖν; ἄνθρωπον ἐν μαλακοῖς ἱματίοις ἠμφιεσμένον; ἰδοὺ οἱ
    ἐν ἱματισμῷ ἐνδόξῳ καὶ τρυφῇ ὑπάρχοντες ἐν τοῖς βασιλείοις εἰσίν.
translation:
  text: But what did you go out to see? A man dressed in soft clothing? Look, those
    who are in splendid clothing and luxury are in royal palaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soft garments.' The phrase refers to fine, delicate clothing associated
      with luxury, not to moral weakness.
    reason: lexical_alternative
  - marker: b
    text: Or 'kings' courts.' The Greek refers to royal residences or court settings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Adversative transition continuing Jesus' rhetorical questions; 'But'
    is natural and concise in English.
- source_word: τί
  chosen: what
  lexicon: BDAG
  rationale: Interrogative accusative introducing the object of 'go out to see.'
- source_word: ἐξήλθατε
  chosen: did you go out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: Aorist indicative in a rhetorical question; English auxiliary 'did' fits
    the interrogative idiom and preserves the past action.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to look at
  lexicon: BDAG
  rationale: Infinitive of purpose after 'go out'; 'to see' is the standard and most
    natural rendering.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Singular accusative referring to an individual male figure in the rhetorical
    contrast, not generic humanity; gender-accurate rendering is appropriate.
- source_word: ἐν μαλακοῖς ἱματίοις
  chosen: in soft clothing
  alternatives:
  - in soft garments
  - wearing soft clothes
  lexicon: BDAG
  rationale: μαλακοῖς literally means 'soft,' here describing fine, delicate garments
    rather than moral softness. 'Soft clothing' preserves the concrete image and avoids
    importing the pejorative sense found in other contexts.
- source_word: ἠμφιεσμένον
  chosen: dressed
  alternatives:
  - clothed
  - wearing
  lexicon: BDAG
  rationale: Perfect participle describing the man's state of being clothed. 'Dressed'
    is idiomatic modern English and fits the rhetorical question.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic particle drawing attention to the explanation. 'Look' is readable
    modern English, in line with translation philosophy.
- source_word: οἱ ... ὑπάρχοντες
  chosen: those who are
  alternatives:
  - those living
  - those found
  lexicon: BDAG
  rationale: Substantival participial construction; 'those who are' cleanly represents
    the present participle with the prepositional phrases that follow.
- source_word: ἐν ἱματισμῷ ἐνδόξῳ
  chosen: in splendid clothing
  alternatives:
  - in glorious clothing
  - wearing splendid clothes
  lexicon: BDAG
  rationale: ἔνδοξος conveys splendor or magnificence. 'Splendid' communicates social
    opulence naturally in English.
- source_word: τρυφῇ
  chosen: luxury
  alternatives:
  - luxurious living
  - self-indulgence
  lexicon: BDAG
  rationale: The noun denotes luxury, refinement, or indulgent living. 'Luxury' is
    concise and fits the social contrast Jesus is making.
- source_word: βασιλείοις
  chosen: royal palaces
  alternatives:
  - palaces
  - kingly courts
  lexicon: BDAG
  rationale: βασίλειον refers to a royal residence or palace. 'Royal palaces' makes
    the regal setting explicit and preserves the plural.
