id: LUK.7.30
reference: Luke 7:30
source:
  edition: SBLGNT
  text: οἱ δὲ Φαρισαῖοι καὶ οἱ νομικοὶ τὴν βουλὴν τοῦ θεοῦ ἠθέτησαν εἰς ἑαυτούς, μὴ
    βαπτισθέντες ὑπ’ αὐτοῦ.)
translation:
  text: But the Pharisees and the lawyers rejected God's purpose for themselves, not
    having been baptized by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's counsel against themselves' or 'God's plan concerning themselves.'
    reason: alternative_reading
  - marker: b
    text: That is, by John the Baptist.
    reason: cross_reference
lexical_decisions:
- source_word: νομικοὶ
  chosen: lawyers
  alternatives:
  - experts in the law
  - scribes
  lexicon: BDAG
  rationale: νομικός here denotes those skilled in the Mosaic law. 'Lawyers' is concise
    modern English and preserves the juridical sense better than 'scribes,' which
    is a different group, while 'experts in the law' is a viable but more expansive
    alternative.
- source_word: βουλὴν
  chosen: purpose
  alternatives:
  - plan
  - counsel
  lexicon: BDAG
  rationale: βουλή can mean purpose, plan, or counsel. 'Purpose' communicates God's
    intended design here in natural English without sounding overly abstract or archaic.
    'Counsel' is more formal and can suggest advice rather than decree.
- source_word: ἠθέτησαν
  chosen: rejected
  alternatives:
  - set aside
  - nullified
  lexicon: BDAG
  rationale: ἀθετέω means to reject, set aside, or invalidate. 'Rejected' is the clearest
    idiomatic rendering in context, expressing their refusal of God's purpose. 'Set
    aside' is possible but slightly less direct in English.
- source_word: εἰς ἑαυτούς
  chosen: for themselves
  alternatives:
  - against themselves
  - with respect to themselves
  lexicon: BDAG
  rationale: The phrase is idiomatic and indicates that God's purpose concerned them
    personally. 'For themselves' best captures that sense in clear English. Some take
    it as 'against themselves,' but that is more interpretive and less directly tied
    to the preposition εἰς.
- source_word: μὴ βαπτισθέντες ὑπ’ αὐτοῦ
  chosen: not having been baptized by him
  alternatives:
  - because they had not been baptized by him
  - since they were not baptized by him
  lexicon: BDAG
  rationale: The aorist passive participle with μή is most straightforwardly rendered
    as a circumstantial participial clause. 'Not having been baptized by him' preserves
    the Greek form and leaves the precise nuance (means, attendant circumstance, or
    implicit cause) less overdetermined than an explicitly causal translation.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - John
  lexicon: BDAG
  rationale: The pronoun refers contextually to John the Baptist from the preceding
    verse. Retaining 'him' follows the Greek text directly; identifying him as 'John'
    would be an interpretive clarification not present in the wording.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks contrast with the previous verse, where tax collectors justified
    God after receiving John's baptism. 'But' best signals that contrast in English.
