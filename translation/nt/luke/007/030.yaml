theological_decisions:
- issue: Sense of God's βουλή in relation to the Pharisees and lawyers
  chosen_reading: God's purpose for themselves
  alternative_readings:
  - God's counsel against themselves
  - God's plan concerning themselves
  rationale: The verse states that they repudiated what God intended with respect
    to them, without requiring a stronger doctrinal claim about decretive will being
    thwarted in an absolute sense. Rendering εἰς ἑαυτούς as 'for themselves' preserves
    the personal reference and avoids importing a theological resolution beyond the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
