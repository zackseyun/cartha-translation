theological_decisions:
- issue: Messianic force of ὁ ἐρχόμενος
  chosen_reading: Render as the title 'the Coming One'
  alternative_readings:
  - the one who is to come
  - the expected one
  rationale: In this context the phrase is not merely descriptive but evokes an eschatological/messianic
    expectation. Capitalizing 'Coming One' signals titular force in English without
    importing more than the text implies.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological
    tension rather than resolve it.'
