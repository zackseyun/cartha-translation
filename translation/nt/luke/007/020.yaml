id: LUK.7.20
reference: Luke 7:20
source:
  edition: SBLGNT
  text: παραγενόμενοι δὲ πρὸς αὐτὸν οἱ ἄνδρες εἶπαν· Ἰωάννης ὁ βαπτιστὴς ⸀ἀπέστειλεν
    ἡμᾶς πρὸς σὲ λέγων· Σὺ εἶ ὁ ἐρχόμενος ἢ ἄλλον προσδοκῶμεν;
translation:
  text: When the men came to him, they said, “John the Baptist has sent us to you,
    saying, ‘Are you the Coming One, or should we expect another?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the one who is to come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  chosen: came
  alternatives:
  - arrived
  - came up
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance of their approach. 'Came'
    is natural modern English and fits the narrative sequence without overtranslating.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - up to him
  - before him
  lexicon: BDAG
  rationale: Standard directional use of πρός with accusative. 'To him' is the most
    straightforward rendering in context.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - the men who had been sent
  lexicon: BDAG
  rationale: ἀνήρ here refers specifically to male messengers, not generic people.
    'The men' preserves the masculine reference without unnecessary expansion.
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they told him
  lexicon: BDAG
  rationale: Default narrative speech verb; 'said' is the most direct equivalent.
- source_word: Ἰωάννης ὁ βαπτιστής
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: Traditional and widely understood English title for ὁ βαπτιστής. 'Baptizer'
    is possible but less idiomatic in standard English.
- source_word: ἀπέστειλεν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Although the Greek aorist is formally past, English present perfect works
    well in reported speech where the sending has present relevance at the moment
    of speaking.
- source_word: λέγων
  chosen: saying
  alternatives:
  - with this message
  - asking
  lexicon: BDAG
  rationale: The participle introduces the content of the commission. 'Saying' preserves
    the Greek structure cleanly.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are?
  lexicon: BDAG
  rationale: Direct interrogative in English requires inversion; the emphatic pronoun
    is naturally carried by 'you' in context.
- source_word: ὁ ἐρχόμενος
  chosen: the Coming One
  alternatives:
  - the one who is to come
  - the one coming
  lexicon: BDAG
  rationale: This expression functions as a recognized messianic designation in context.
    'The Coming One' preserves its titular force and theological resonance better
    than a flatter paraphrase.
- source_word: ἄλλον
  chosen: another
  alternatives:
  - someone else
  lexicon: BDAG
  rationale: Simple accusative object after ἢ. 'Another' is concise and sufficiently
    clear.
- source_word: προσδοκῶμεν
  chosen: should we expect
  alternatives:
  - are we to expect
  - should we wait for
  lexicon: BDAG
  rationale: προσδοκάω denotes expectation or waiting for someone. 'Expect' is idiomatic
    and matches the question's sense without implying passive delay alone.
