id: LUK.7.15
reference: Luke 7:15
source:
  edition: SBLGNT
  text: καὶ ἀνεκάθισεν ὁ νεκρὸς καὶ ἤρξατο λαλεῖν, καὶ ἔδωκεν αὐτὸν τῇ μητρὶ αὐτοῦ.
translation:
  text: And the dead man sat up and began to speak, and he gave him to his mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he gave him back to his mother' / 'he returned him to his mother.' The
      Greek simply says 'he gave him to his mother,' with the restorative sense implied
      by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκάθισεν
  chosen: sat up
  alternatives:
  - sat upright
  - rose up
  lexicon: BDAG
  rationale: The verb ἀνακαθίζω in this context refers to moving from a lying position
    to a seated one. 'Sat up' is natural modern English and accurately conveys the
    resurrection sign without adding more than the Greek states.
- source_word: ὁ νεκρός
  chosen: the dead man
  alternatives:
  - the dead one
  - the corpse
  lexicon: BDAG
  rationale: Although literally 'the dead one,' English idiom prefers 'the dead man'
    here, referring to the previously deceased young man. 'Corpse' is too clinical
    and may over-specify; 'dead man' preserves both the prior state and the personal
    referent.
- source_word: ἤρξατο λαλεῖν
  chosen: began to speak
  alternatives:
  - started speaking
  - began speaking
  lexicon: BDAG
  rationale: This is a standard ingressive construction with ἄρχομαι plus infinitive.
    'Began to speak' is clear, idiomatic, and slightly more formal than 'started speaking,'
    fitting the narrative tone.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: λαλέω often means 'speak' or 'talk.' 'Speak' better suits the register
    of the passage and avoids casual tone.
- source_word: ἔδωκεν αὐτὸν τῇ μητρὶ αὐτοῦ
  chosen: he gave him to his mother
  alternatives:
  - he returned him to his mother
  - he gave him back to his mother
  lexicon: BDAG
  rationale: The Greek verb is simply 'gave.' While the context implies restoration,
    the text itself does not include an explicit 'back' or 'returned.' The more literal
    rendering preserves the wording while allowing readers to infer the compassionate
    restoration.
