theological_decisions:
- issue: Whether to make explicit that Jesus restored the son to his mother by adding
    'back' or 'returned'
  chosen_reading: Retain the simple wording 'he gave him to his mother'
  alternative_readings:
  - he gave him back to his mother
  - he returned him to his mother
  rationale: The narrative clearly implies restoration after resurrection, but the
    Greek text uses δίδωμι without an explicit restorative particle. To avoid importing
    interpretive emphasis beyond the wording, the translation keeps the simpler expression
    while preserving the more interpretive alternatives as footnotes.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Never paraphrase
    beyond what the source text warrants.'
