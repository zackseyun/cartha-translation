theological_decisions:
- issue: Rendering δοῦλος in a household-slavery context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse refers to a centurion's δοῦλος in a first-century social setting
    where ownership/subordination is part of the meaning. Following the project's
    doctrine, 'slave' is preferred when the bonded nature is salient; 'servant' is
    preserved as an alternative because some English traditions use it to avoid misleading
    modern connotations.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
