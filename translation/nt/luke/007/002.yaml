id: LUK.7.2
reference: Luke 7:2
source:
  edition: SBLGNT
  text: Ἑκατοντάρχου δέ τινος δοῦλος κακῶς ἔχων ἤμελλεν τελευτᾶν, ὃς ἦν αὐτῷ ἔντιμος.
translation:
  text: Now a certain centurion’s slave, who was sick and about to die, was highly
    valued by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servant.” The Greek word is doulos, which can mean either “slave” or
      “servant” depending on context; here “slave” was chosen to preserve the bonded
      relationship implied by the term.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑκατοντάρχου ... τινος
  chosen: a certain centurion’s
  alternatives:
  - of a certain centurion
  - a centurion’s
  lexicon: BDAG
  rationale: The genitive phrase introduces the possessor of the slave. 'A certain
    centurion’s' is natural English and preserves the indefiniteness of τινος.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  - ', (untranslated)'
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition. 'Now' conveys the shift in scene
    without overstating logical connection.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where the bonded
    status is in view. Here the term denotes a socially subordinate household slave
    belonging to the centurion; 'servant' could soften that relation too much.
- source_word: κακῶς ἔχων
  chosen: was sick
  alternatives:
  - was ill
  - was in a bad condition
  - was suffering severely
  lexicon: BDAG
  rationale: The idiom literally means 'being badly' or 'being in a bad way.' 'Was
    sick' is clear, idiomatic English that fits the medical context and avoids awkward
    literalism.
- source_word: ἤμελλεν τελευτᾶν
  chosen: was about to die
  alternatives:
  - was going to die
  - was at the point of death
  lexicon: BDAG
  rationale: μέλλω with the infinitive indicates imminence. 'Was about to die' captures
    the impending sense more directly than the more interpretive 'at the point of
    death,' while remaining natural English.
- source_word: ὃς ἦν αὐτῷ ἔντιμος
  chosen: who was highly valued by him
  alternatives:
  - who was dear to him
  - who was precious to him
  - who was honored by him
  lexicon: BDAG
  rationale: ἔντιμος denotes being honored, valued, or precious. In this context,
    the centurion's regard for the slave is emphasized. 'Highly valued by him' preserves
    that esteem without importing sentimental overtones beyond the Greek.
