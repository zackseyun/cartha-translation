id: LUK.7.43
reference: Luke 7:43
source:
  edition: SBLGNT
  text: ⸀ἀποκριθεὶς Σίμων εἶπεν· Ὑπολαμβάνω ὅτι ᾧ τὸ πλεῖον ἐχαρίσατο. ὁ δὲ εἶπεν
    αὐτῷ· Ὀρθῶς ἔκρινας.
translation:
  text: Simon answered, “I suppose the one to whom he forgave more.” And he said to
    him, “You have judged rightly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I assume” or “I take it”; the Greek expresses a tentative inference.
    reason: lexical_alternative
  - marker: b
    text: Or “the one he canceled more debt for”; the verb can carry the sense of
      graciously remitting a debt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι used idiomatically with εἶπεν to introduce
    a response. English commonly renders the participle + finite verb as a simple
    finite verb for natural style without loss of meaning.
- source_word: Ὑπολαμβάνω
  chosen: I suppose
  alternatives:
  - I assume
  - I take it
  lexicon: BDAG
  rationale: ὑπολαμβάνω here signals a tentative inference rather than strong certainty.
    'I suppose' preserves Simon's cautious, somewhat hesitant answer better than the
    firmer 'I assume'.
- source_word: ᾧ τὸ πλεῖον
  chosen: the one to whom he forgave more
  alternatives:
  - the one he forgave more
  - the one to whom he granted the greater favor
  lexicon: BDAG
  rationale: The dative relative pronoun ᾧ is retained with 'to whom' to reflect the
    indirect-object structure, while τὸ πλεῖον is rendered idiomatically as 'more'
    rather than woodenly 'the more' or 'the greater amount.'
- source_word: ἐχαρίσατο
  chosen: he forgave
  alternatives:
  - he graciously forgave
  - he freely forgave
  - he canceled
  lexicon: BDAG
  rationale: χαρίζομαι can mean to give graciously or forgive/remit a debt. In this
    immediate parable context of debt cancellation, 'forgave' is the clearest idiomatic
    English and matches the semantic force of gracious remission. The gracious nuance
    is implicit in the verb and context.
- source_word: Ὀρθῶς
  chosen: rightly
  alternatives:
  - correctly
  - well
  lexicon: BDAG
  rationale: ὀρθῶς means 'correctly/rightly.' 'Rightly' pairs naturally with 'judged'
    and preserves the evaluative sense of Jesus' affirmation.
- source_word: ἔκρινας
  chosen: you have judged
  alternatives:
  - you judged
  - you decided
  lexicon: BDAG
  rationale: Aorist ἔκρινας refers to Simon's just-given assessment. English present
    perfect ('you have judged') idiomatically conveys a completed judgment with present
    relevance, fitting Jesus' immediate response. 'Judged' is preferable to 'decided'
    because it preserves the lexical link to κρίνω.
