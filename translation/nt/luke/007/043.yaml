theological_decisions:
- issue: Nature of the forgiveness language in the parable
  chosen_reading: Render ἐχαρίσατο as 'forgave' in line with debt-remission imagery
    and the broader forgiveness theme of the passage.
  alternative_readings:
  - graciously gave
  - canceled the debt
  rationale: The verse sits within Jesus' interpretation of a parable about debtors
    and forgiveness. Translating with explicit forgiveness language preserves the
    theological connection to the woman's sins in the surrounding context without
    importing extra doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
