theological_decisions:
- issue: Referent and force of the comparison with the false prophets
  chosen_reading: The verse warns that universal human praise is a mark associated
    with how previous generations treated false prophets.
  alternative_readings:
  - The verse condemns any positive speech from others without qualification
  - The verse primarily critiques popularity rather than false approval
  rationale: 'The comparison introduced by γάρ and κατὰ τὰ αὐτά grounds the woe in
    a historical pattern: false prophets received broad approval. The translation
    preserves that warning without overstating it into a blanket rejection of all
    commendation.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
