id: LUK.6.26
reference: Luke 6:26
source:
  edition: SBLGNT
  text: Οὐαὶ ὅταν ⸂καλῶς ὑμᾶς⸃ εἴπωσιν ⸀πάντες οἱ ἄνθρωποι, κατὰ ⸂τὰ αὐτὰ⸃ γὰρ ἐποίουν
    τοῖς ψευδοπροφήταις οἱ πατέρες αὐτῶν.
translation:
  text: Woe when all people speak well of you, for their fathers used to do the same
    to the false prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speak favorably about you.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'their fathers'; that is, the previous generations of their people.
    reason: cultural_note
lexical_decisions:
- source_word: Οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic denunciation/exclamation force of οὐαί. 'Woe' is
    the standard concise English equivalent and fits the solemn warning context better
    than the softer 'alas.'
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a general future contingency. 'When' is idiomatic in English
    here and preserves the warning force without overcomplicating the sentence.
- source_word: καλῶς ὑμᾶς εἴπωσιν
  chosen: speak well of you
  alternatives:
  - say good things about you
  - speak favorably about you
  lexicon: BDAG
  rationale: This idiom means to speak positively of someone, not merely to speak
    correctly. 'Speak well of you' is natural English and preserves the evaluative
    sense of καλῶς with λέγω.
- source_word: πάντες οἱ ἄνθρωποι
  chosen: all people
  alternatives:
  - everyone
  - all men
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human beings. 'All people' is gender-accurate
    to the source intent and avoids the potentially misleading male-specific sense
    of modern English 'men.' 'Everyone' is possible but slightly less formally tied
    to the plural noun phrase.
- source_word: κατὰ τὰ αὐτά
  chosen: the same
  alternatives:
  - in the same way
  - likewise
  lexicon: BDAG
  rationale: The phrase means 'according to the same things,' idiomatically 'in the
    same way' or 'the same.' In this construction with ποιέω, 'do the same' is the
    most natural English equivalent.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks the explanatory ground for the preceding woe. 'For' preserves the
    concise connective force and suits the literary register.
- source_word: ἐποίουν
  chosen: used to do
  alternatives:
  - did
  - were doing
  lexicon: BDAG
  rationale: The imperfect indicates customary past action. 'Used to do' brings out
    the iterative/habitual sense better than the simple past 'did.'
- source_word: τοῖς ψευδοπροφήταις
  chosen: to the false prophets
  alternatives:
  - for the false prophets
  lexicon: BDAG
  rationale: The dative with ποιέω here indicates the persons toward whom the action
    was directed. 'To the false prophets' is the most straightforward rendering in
    English.
- source_word: οἱ πατέρες αὐτῶν
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: BDAG
  rationale: A literal rendering is appropriate and preserves the intergenerational
    polemical force. 'Ancestors' is broader and smoother, but 'fathers' better reflects
    the Greek and the biblical idiom.
