theological_decisions:
- issue: Cultic/legal restriction of the sacred bread
  chosen_reading: Rendered ἔξεστιν as 'it is not lawful' to preserve the verse's appeal
    to priestly law rather than mere social custom.
  alternative_readings:
  - it is not permitted
  - it is not allowed
  rationale: The point of Jesus' example depends on a recognized legal-sacral restriction
    from Israel's worship law. 'Lawful' best communicates that theological/legal background
    without adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §6
