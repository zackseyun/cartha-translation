id: LUK.6.4
reference: Luke 6:4
source:
  edition: SBLGNT
  text: ⸀ὡς εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ καὶ τοὺς ἄρτους τῆς προθέσεως ⸀λαβὼν ἔφαγεν
    καὶ ⸀ἔδωκεν τοῖς μετ’ αὐτοῦ, οὓς οὐκ ἔξεστιν φαγεῖν εἰ μὴ μόνους τοὺς ἱερεῖς;
translation:
  text: how he entered into the house of God, and took and ate the bread of the Presence,
    and also gave some to those with him—which it is not lawful to eat except for
    the priests alone?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the consecrated bread'; traditionally, 'the showbread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - in what way
  lexicon: BDAG
  rationale: In this indirect-question context following Jesus' appeal to what David
    did, ὡς is best rendered 'how,' introducing the manner/content of the action rather
    than a simple conjunction like 'that.'
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  chosen: entered into the house of God
  alternatives:
  - entered the house of God
  lexicon: BDAG
  rationale: A fairly formal rendering preserves the motion expressed by εἰσῆλθεν
    with εἰς. 'House of God' is retained rather than 'temple' because οἶκος is the
    actual term used and reflects the wording of the scriptural precedent.
- source_word: ἄρτους τῆς προθέσεως
  chosen: the bread of the Presence
  alternatives:
  - the consecrated bread
  - the bread of presentation
  - the showbread
  lexicon: BDAG
  rationale: This phrase refers to the sacred bread set before God in the tabernacle/temple.
    'Bread of the Presence' is both accurate and understandable, preserving the cultic
    sense better than the archaic 'showbread.'
- source_word: λαβὼν ἔφαγεν
  chosen: took and ate
  alternatives:
  - having taken, he ate
  lexicon: BDAG
  rationale: The participle plus main verb is naturally rendered in English as coordinated
    finite verbs for readability while preserving sequence.
- source_word: ἔδωκεν τοῖς μετ’ αὐτοῦ
  chosen: also gave some to those with him
  alternatives:
  - gave to those with him
  - gave also to his companions
  lexicon: BDAG
  rationale: '''Those with him'' closely reflects the Greek. ''Some'' is implied by
    English idiom when giving bread, though not explicit in Greek; it clarifies the
    sense without materially expanding the meaning. ''Also'' reflects the additive
    καί.'
- source_word: οὓς
  chosen: which
  alternatives:
  - that bread which
  - them, which
  lexicon: BDAG
  rationale: This relative pronoun refers back to the bread. English idiom prefers
    'which' for the explanatory clause.
- source_word: οὐκ ἔξεστιν
  chosen: it is not lawful
  alternatives:
  - it is not permitted
  - it is not allowed
  lexicon: BDAG
  rationale: The expression concerns legal/religious permissibility under the law,
    so 'lawful' preserves the juridical nuance better than the more generic 'allowed.'
- source_word: φαγεῖν
  chosen: to eat
  lexicon: BDAG
  rationale: Standard infinitive rendering.
- source_word: εἰ μὴ μόνους τοὺς ἱερεῖς
  chosen: except for the priests alone
  alternatives:
  - except only the priests
  - except for only the priests
  lexicon: BDAG
  rationale: This preserves the exclusivity conveyed by εἰ μὴ and μόνους. 'For the
    priests alone' is idiomatic and keeps the emphasis that only priests may eat it.
