id: LUK.6.32
reference: Luke 6:32
source:
  edition: SBLGNT
  text: Καὶ εἰ ἀγαπᾶτε τοὺς ἀγαπῶντας ὑμᾶς, ποία ὑμῖν χάρις ἐστίν; καὶ γὰρ οἱ ἁμαρτωλοὶ
    τοὺς ἀγαπῶντας αὐτοὺς ἀγαπῶσιν.
translation:
  text: And if you love those who love you, what credit is that to you? For even sinners
    love those who love them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what grace is that to you?' The Greek word can mean 'grace,' 'credit,'
      or 'favor'; here it refers to what is commendable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶτε / ἀγαπῶντας / ἀγαπῶσιν
  chosen: love
  alternatives:
  - care for
  lexicon: BDAG
  rationale: Rendered consistently as 'love' to preserve the lexical connection across
    all three occurrences and to align with the default rendering of ἀγάπη/ἀγαπάω
    in the doctrine guidance. 'Care for' is possible in some contexts but weakens
    the rhetorical force and repetition here.
- source_word: ποία
  chosen: what
  alternatives:
  - what kind of
  - what sort of
  lexicon: BDAG
  rationale: The interrogative asks about the quality or kind of the benefit/reward.
    Simple 'what' is idiomatic in English and preserves the rhetorical question without
    overtranslating.
- source_word: χάρις
  chosen: credit
  alternatives:
  - grace
  - benefit
  - thanks
  lexicon: BDAG
  rationale: In this context χάρις does not primarily denote salvific grace but favorable
    regard, credit, or commendation. 'Credit' best fits the immediate sense of Jesus'
    rhetorical question in parallel with the following examples in the discourse.
    'Grace' would likely mislead modern readers into a theological sense not foregrounded
    here.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The substantive adjective is naturally rendered 'sinners.' This preserves
    the moral category used in the Greek and matches common New Testament usage without
    unnecessary paraphrase.
- source_word: καὶ γὰρ
  chosen: For even
  alternatives:
  - for also
  - indeed even
  lexicon: BDAG
  rationale: This combination introduces supporting explanation with emphasis. 'For
    even' is natural English and captures both the explanatory force of γάρ and the
    emphatic inclusion of καί.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: 'The dative is rendered idiomatically as ''to you'' with ''credit,''
    yielding natural English: ''what credit is that to you?'' ''For you'' is possible
    but less idiomatic with this noun in English.'
