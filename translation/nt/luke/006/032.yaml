theological_decisions:
- issue: Sense of χάρις in Jesus' saying
  chosen_reading: non-soteriological 'credit/commendation' rather than theological
    'grace'
  alternative_readings:
  - grace
  - thanks
  rationale: The immediate context concerns what is distinctive or commendable about
    loving only those who reciprocate. Rendering χάρις as 'grace' could import Pauline
    or doctrinal associations not intended here. 'Credit' preserves the ethical contrast
    without adding theological claims the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
