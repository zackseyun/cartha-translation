theological_decisions:
- issue: Whether ἀποστόλους should be rendered as the more literal 'sent ones' or
    the established title 'apostles'
  chosen_reading: apostles
  alternative_readings:
  - sent ones
  - messengers
  rationale: In Luke 6:13 the term functions as a designation Jesus gives to the twelve,
    not merely a generic description of people sent on a task. Rendering it 'apostles'
    preserves the narrative and ecclesial significance without importing extra doctrinal
    claims.
  doctrine_reference: Translation philosophy §2 (translate titles; transliterate names)
    and §6 (readable modern English)
