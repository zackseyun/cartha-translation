id: LUK.6.13
reference: Luke 6:13
source:
  edition: SBLGNT
  text: καὶ ὅτε ἐγένετο ἡμέρα, προσεφώνησεν τοὺς μαθητὰς αὐτοῦ, καὶ ἐκλεξάμενος ἀπ’
    αὐτῶν δώδεκα, οὓς καὶ ἀποστόλους ὠνόμασεν,
translation:
  text: And when day came, he called his disciples, and chose twelve from among them,
    whom he also named apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned his disciples.' The Greek verb can mean 'called to' or 'addressed,'
      but here the context favors gathering them for selection.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom he also called apostles.' The verb means 'named' or 'called'; 'named'
      is used in the main text to distinguish it from the earlier 'called' for summoning
      the disciples.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε ἐγένετο ἡμέρα
  chosen: when day came
  alternatives:
  - when it became day
  - when morning came
  lexicon: BDAG
  rationale: A natural English rendering of the temporal clause that preserves the
    Greek sense of the arrival of daytime without sounding wooden.
- source_word: προσεφώνησεν
  chosen: called
  alternatives:
  - summoned
  - addressed
  lexicon: BDAG
  rationale: In this context Jesus is gathering his disciples to himself for selection,
    so 'called' best fits the action. 'Addressed' is possible lexically but is less
    suitable here because the following clause focuses on choosing twelve from the
    larger group.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and clearest rendering in Gospel context,
    preserving the relational and formative sense of μαθητής.'
- source_word: ἐκλεξάμενος
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: BDAG
  rationale: '''Chose'' is concise, idiomatic, and preserves the deliberative force
    of the middle participle in context.'
- source_word: ἀπ’ αὐτῶν
  chosen: from among them
  alternatives:
  - from them
  lexicon: BDAG
  rationale: '''From among them'' makes explicit that the twelve were selected out
    of the larger body of disciples, which is the contextual force of ἀπό here.'
- source_word: δώδεκα
  chosen: twelve
  lexicon: BDAG
  rationale: Straightforward numeral; no reason to vary.
- source_word: ἀποστόλους
  chosen: apostles
  alternatives:
  - messengers
  - sent ones
  lexicon: BDAG
  rationale: Although the underlying sense is 'sent ones,' 'apostles' is the established
    and contextually precise term for the Twelve in Luke's narrative. Translating
    it more generically here would flatten its emerging technical force.
- source_word: ὠνόμασεν
  chosen: named
  alternatives:
  - called
  lexicon: BDAG
  rationale: The verb indicates designation or naming. 'Named' avoids ambiguity with
    the earlier verb rendered 'called' and clearly conveys that Jesus gave them the
    designation 'apostles'.
