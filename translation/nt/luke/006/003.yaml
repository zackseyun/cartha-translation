id: LUK.6.3
reference: Luke 6:3
source:
  edition: SBLGNT
  text: καὶ ἀποκριθεὶς πρὸς αὐτοὺς εἶπεν ὁ Ἰησοῦς· Οὐδὲ τοῦτο ἀνέγνωτε ὃ ἐποίησεν
    Δαυὶδ ⸀ὁπότε ἐπείνασεν αὐτὸς καὶ οἱ μετ’ αὐτοῦ ⸀ὄντες;
translation:
  text: And Jesus answered them, “Have you not even read this—what David did when
    he was hungry, he and those who were with him?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπεν
  chosen: answered
  alternatives:
  - answered and said
  - replying, said
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic/Koine idiom meaning
    'answered and said.' In natural English, 'answered' sufficiently conveys the sense
    without unnecessary redundancy.
- source_word: πρὸς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: English 'answered them' is idiomatic and preserves the object of Jesus'
    response.
- source_word: Οὐδὲ τοῦτο
  chosen: not even read this
  alternatives:
  - never read this
  - not read even this
  lexicon: BDAG
  rationale: Οὐδὲ adds an emphatic 'not even.' The wording preserves Jesus' pointed
    rhetorical challenge better than the flatter 'have you never read.'
- source_word: ἀνέγνωτε
  chosen: Have you ... read
  alternatives:
  - Did you read
  - Have you read
  lexicon: BDAG
  rationale: Rendered as an English present perfect in this rhetorical question to
    match idiomatic English and the force of appealing to Scripture familiarity.
- source_word: ὃ ἐποίησεν Δαυὶδ
  chosen: what David did
  alternatives:
  - that which David did
  lexicon: BDAG
  rationale: Natural English relative construction; preserves the content of the scriptural
    example.
- source_word: Δαυὶδ
  chosen: David
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation philosophy to transliterate names.
- source_word: ὁπότε
  chosen: when
  alternatives:
  - at the time when
  lexicon: BDAG
  rationale: Simple temporal conjunction is sufficient here; no need for a more cumbersome
    rendering.
- source_word: ἐπείνασεν
  chosen: was hungry
  alternatives:
  - became hungry
  - was famished
  lexicon: BDAG
  rationale: Idiomatic English for the aorist of πεινάω in narrative context.
- source_word: αὐτὸς καὶ οἱ μετ’ αὐτοῦ ὄντες
  chosen: he and those who were with him
  alternatives:
  - he and his companions
  - he himself and those with him
  lexicon: BDAG
  rationale: This preserves both the explicit pronoun and the participial phrase without
    over-literal awkwardness. 'Those who were with him' is closer to the Greek than
    the more interpretive 'his companions.'
