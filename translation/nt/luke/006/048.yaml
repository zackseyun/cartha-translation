id: LUK.6.48
reference: Luke 6:48
source:
  edition: SBLGNT
  text: ὅμοιός ἐστιν ἀνθρώπῳ οἰκοδομοῦντι οἰκίαν ὃς ἔσκαψεν καὶ ἐβάθυνεν καὶ ἔθηκεν
    θεμέλιον ἐπὶ τὴν πέτραν· πλημμύρης δὲ γενομένης προσέρηξεν ὁ ποταμὸς τῇ οἰκίᾳ
    ἐκείνῃ, καὶ οὐκ ἴσχυσεν σαλεῦσαι αὐτὴν ⸂διὰ τὸ καλῶς οἰκοδομῆσθαι αὐτήν⸃.
translation:
  text: He is like a man building a house, who dug deep and laid a foundation on the
    rock. And when a flood came, the river burst against that house and was not able
    to shake it, because it had been well built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person.' The Greek uses the masculine singular 'man' as the representative
      figure in the comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμοιός ἐστιν
  chosen: He is like
  alternatives:
  - He is similar to
  - He is comparable to
  lexicon: BDAG
  rationale: Standard comparison formula in parabolic/simile context; 'like' is natural
    modern English and preserves the direct comparison.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and refers to an individual
    male figure in the illustration. Per doctrine, gender-accurate rendering is preferred
    over neutralizing.
- source_word: οἰκοδομοῦντι οἰκίαν
  chosen: building a house
  alternatives:
  - constructing a house
  lexicon: BDAG
  rationale: Straightforward participial phrase; 'building a house' is idiomatic and
    clear.
- source_word: ἔσκαψεν καὶ ἐβάθυνεν
  chosen: dug deep
  alternatives:
  - dug and went deep
  - dug down deep
  lexicon: BDAG
  rationale: The paired verbs intensify the action of excavation. 'Dug deep' captures
    the sense concisely in natural English without losing the emphasis.
- source_word: ἔθηκεν θεμέλιον
  chosen: laid a foundation
  alternatives:
  - set a foundation
  lexicon: BDAG
  rationale: Conventional English collocation for construction imagery and faithful
    to the Greek.
- source_word: ἐπὶ τὴν πέτραν
  chosen: on the rock
  alternatives:
  - upon the rock
  - on bedrock
  lexicon: BDAG
  rationale: πέτρα commonly denotes rock/rock mass. 'The rock' preserves the definite
    article and the vivid image; 'bedrock' is interpretive.
- source_word: πλημμύρης δὲ γενομένης
  chosen: when a flood came
  alternatives:
  - when a flood arose
  - when flooding occurred
  lexicon: BDAG
  rationale: Genitive absolute indicating circumstance/time. 'When a flood came' is
    natural and preserves the event.
- source_word: προσέρηξεν ὁ ποταμὸς
  chosen: the river burst against
  alternatives:
  - the river broke against
  - the river struck against
  - the stream burst against
  lexicon: BDAG
  rationale: The verb conveys violent impact. 'Burst against' communicates force better
    than a flatter 'struck,' while ποταμός is well rendered 'river' here.
- source_word: οὐκ ἴσχυσεν σαλεῦσαι αὐτὴν
  chosen: was not able to shake it
  alternatives:
  - could not shake it
  - was not strong enough to move it
  lexicon: BDAG
  rationale: ἰσχύω + infinitive expresses inability; σαλεύω here is 'shake' in the
    sense of destabilize. This rendering is both accurate and readable.
- source_word: διὰ τὸ καλῶς οἰκοδομῆσθαι αὐτήν
  chosen: because it had been well built
  alternatives:
  - because it was well built
  - because it had been founded well
  lexicon: BDAG
  rationale: διά + articular infinitive gives reason. The passive infinitive points
    to the house as having been built well. 'Had been well built' fits the prior narrative
    sequence and preserves the passive sense.
