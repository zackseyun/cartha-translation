- issue: Gender rendering of ἀνθρώπῳ in a representative simile
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The verse uses a masculine singular exemplar in Jesus's comparison. Following
    the doctrine's gender-accurate principle, the masculine form is retained rather
    than neutralized, while the representative force remains clear from context.
