theological_decisions:
- issue: Rendering the Sabbath expression
  chosen_reading: on the Sabbaths
  alternative_readings:
  - on the Sabbath
  rationale: The Greek uses the plural τοῖς σάββασιν. Preserving the plural in the
    main text maintains formal transparency to the source, while the singular idiomatic
    sense is preserved in a footnote since English commonly uses 'Sabbath' singular
    for the weekly day.
  doctrine_reference: 'Translation philosophy #1 and #5'
