id: LUK.6.2
reference: Luke 6:2
source:
  edition: SBLGNT
  text: τινὲς δὲ τῶν Φαρισαίων ⸀εἶπαν· Τί ποιεῖτε ὃ οὐκ ⸀ἔξεστιν τοῖς σάββασιν;
translation:
  text: But some of the Pharisees said, “Why are you doing what is not lawful on the
    Sabbaths?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'on the Sabbaths,' a common idiom meaning 'on the Sabbath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to a subset of the Pharisees, not the whole
    group. 'Some' is natural and sufficiently precise.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks mild contrast or narrative development from the previous verse.
    'But' fits the confrontational turn better than a simple connective.
- source_word: Φαρισαίων
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name; names are transliterated
    by project policy.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: Aorist indicative presents the speech event simply. 'Said' is the most
    straightforward narrative rendering.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: Although literally 'what,' in this idiom with ποιεῖτε introducing a challenge,
    the sense is 'Why are you doing...?' This is idiomatic English and reflects the
    force of the question.
- source_word: ποιεῖτε
  chosen: are you doing
  alternatives:
  - do you do
  lexicon: BDAG
  rationale: Present tense in direct speech is best rendered progressively in English
    here, matching the immediate action under scrutiny.
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Neuter relative pronoun referring to the action in question. 'What' is
    natural modern English; 'that which' is overly formal.
- source_word: ἔξεστιν
  chosen: is lawful
  alternatives:
  - is permitted
  - is allowed
  lexicon: BDAG
  rationale: In disputes about Sabbath observance, the issue is framed in terms of
    what is permitted by law/custom. 'Lawful' preserves the legal-religious tone better
    than the more generic 'allowed.'
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: The Greek is plural, a common idiomatic way of referring to the Sabbath
    day/Sabbath observance. The main text preserves the plural form for transparency
    to the source, while a footnote preserves the idiomatic singular English alternative.
