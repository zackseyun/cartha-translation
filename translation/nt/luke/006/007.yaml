id: LUK.6.7
reference: Luke 6:7
source:
  edition: SBLGNT
  text: ⸀παρετηροῦντο ⸀δὲ οἱ γραμματεῖς καὶ οἱ Φαρισαῖοι εἰ ἐν τῷ σαββάτῳ ⸀θεραπεύει,
    ἵνα εὕρωσιν ⸀κατηγορεῖν αὐτοῦ.
translation:
  text: And the scribes and the Pharisees were watching him closely to see whether
    he would heal on the Sabbath, so that they might find grounds to accuse him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were observing carefully.' The Greek verb can carry the sense of close,
      even hostile, watching.
    reason: lexical_alternative
  - marker: b
    text: Or, 'find an accusation against him' or simply 'accuse him.' The Greek expression
      implies seeking a basis for a charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρετηροῦντο
  chosen: were watching him closely
  alternatives:
  - were watching
  - were observing carefully
  - were keeping close watch on him
  lexicon: BDAG
  rationale: The imperfect middle conveys ongoing, intent observation, often with
    hostile or suspicious nuance in context. 'Were watching him closely' captures
    both the progressive aspect and the adversarial scrutiny. 'Him' is supplied from
    context in English, since the object of their surveillance is Jesus, though not
    explicitly repeated with the verb in Greek.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in Gospel narrative. Alternatives interpret their function more explicitly,
    but the more direct term better preserves the source wording.'
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; this is a proper designation
    rather than a title to be translated.
- source_word: εἰ
  chosen: to see whether
  alternatives:
  - whether
  - if
  lexicon: BDAG
  rationale: In English, εἰ after a verb of watching is most naturally expressed as
    'to see whether,' making the syntax idiomatic while preserving the sense of testing
    what Jesus would do.
- source_word: ἐν τῷ σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - during the Sabbath
  lexicon: BDAG
  rationale: Although the preposition is literally 'in,' idiomatic English for time
    here is 'on the Sabbath.' The singular reflects the Greek form in this instance.
- source_word: θεραπεύει
  chosen: he would heal
  alternatives:
  - he heals
  - he was healing
  lexicon: BDAG
  rationale: 'The present indicative in indirect-question context can be rendered
    with an English future-in-the-past (''would heal'') to match the narrative perspective:
    they were watching to see whether he would perform a healing. This is more natural
    than a wooden present in English.'
- source_word: ἵνα εὕρωσιν
  chosen: so that they might find
  alternatives:
  - in order that they might find
  - so that they could find
  lexicon: BDAG
  rationale: This expresses purpose. 'So that they might find' preserves the purposive
    force of ἵνα with readable modern English.
- source_word: κατηγορεῖν αὐτοῦ
  chosen: grounds to accuse him
  alternatives:
  - to accuse him
  - an accusation against him
  lexicon: BDAG
  rationale: The infinitive κατηγορεῖν with εὕρωσιν implies finding a basis or opportunity
    for accusation. 'Grounds to accuse him' makes explicit what English idiom expects
    without adding content beyond the Greek sense.
