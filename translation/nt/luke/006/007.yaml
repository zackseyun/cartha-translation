theological_decisions:
- issue: Portrayal of the opponents' intent
  chosen_reading: The verse is rendered to show deliberate hostile scrutiny without
    overstating beyond the text.
  alternative_readings:
  - A more neutral rendering could say they were merely observing whether he healed.
  rationale: The combination of παρατηρέω in the imperfect and the purpose clause
    ἵνα εὕρωσιν κατηγορεῖν αὐτοῦ indicates not neutral observation but watchfulness
    aimed at accusation. The translation preserves that tension as stated in the text
    without importing broader polemic.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
