id: LUK.6.45
reference: Luke 6:45
source:
  edition: SBLGNT
  text: ὁ ἀγαθὸς ἄνθρωπος ἐκ τοῦ ἀγαθοῦ θησαυροῦ τῆς καρδίας ⸀αὐτοῦ προφέρει τὸ ἀγαθόν,
    καὶ ὁ ⸀πονηρὸς ἐκ τοῦ ⸀πονηροῦ προφέρει τὸ πονηρόν· ἐκ γὰρ ⸀περισσεύματος καρδίας
    λαλεῖ τὸ στόμα αὐτοῦ.
translation:
  text: The good man brings forth what is good out of the good treasure of his heart,
    and the evil man out of his evil treasure brings forth what is evil; for out of
    the overflow of the heart his mouth speaks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''abundance'': ''for out of the abundance of the heart his mouth speaks.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὸς ἄνθρωπος
  chosen: the good man
  alternatives:
  - the good person
  lexicon: BDAG
  rationale: Rendered gender-accurately as 'man' because ἄνθρωπος is singular masculine
    here and paired antithetically with 'the evil man.' While the sense is representative,
    the doctrine excerpt prefers matching the source's gendered form rather than flattening
    to gender-neutral language.
- source_word: θησαυροῦ
  chosen: treasure
  alternatives:
  - store
  - storehouse
  lexicon: BDAG
  rationale: '''Treasure'' preserves the metaphorical sense of an inner stored reserve
    from which actions and speech proceed. ''Storehouse'' is possible but more interpretive
    than the Greek requires.'
- source_word: καρδίας
  chosen: heart
  lexicon: BDAG
  rationale: Standard rendering for the inner person, will, and affections. No need
    to paraphrase as 'inner being,' since 'heart' remains clear and theologically
    resonant in English.
- source_word: προφέρει
  chosen: brings forth
  alternatives:
  - produces
  - brings out
  lexicon: BDAG
  rationale: '''Brings forth'' preserves the imagery of something emerging from an
    inner source and fits both clauses symmetrically. ''Produces'' is smoother but
    less vivid.'
- source_word: πονηρὸς / πονηροῦ / πονηρόν
  chosen: evil / his evil treasure / what is evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Rendered consistently as 'evil' to preserve the moral quality of πονηρός
    across adjectival and substantival uses. 'Bad' is too weak; 'wicked' is possible
    but stylistically heavier and less parallel to 'good.'
- source_word: περισσεύματος
  chosen: overflow
  alternatives:
  - abundance
  - fullness
  lexicon: BDAG
  rationale: '''Overflow'' captures the image of surplus spilling out and works naturally
    in English with speech issuing from the heart. ''Abundance'' is a viable formal
    alternative and worth preserving in a footnote.'
- source_word: λαλεῖ
  chosen: speaks
  alternatives:
  - talks
  lexicon: BDAG
  rationale: '''Speaks'' is the natural English equivalent in this proverbial saying
    and carries appropriate gravity. ''Talks'' is too casual.'
- source_word: τὸ στόμα αὐτοῦ
  chosen: his mouth
  lexicon: BDAG
  rationale: Kept literal rather than smoothing to 'he speaks,' because the Greek
    explicitly names 'mouth' to emphasize outward expression as the index of the heart.
