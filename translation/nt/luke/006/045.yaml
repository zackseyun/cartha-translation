theological_decisions:
- issue: Anthropological and ethical contrast in ἀγαθός/πονηρός
  chosen_reading: Retain the moral categories 'good' and 'evil' without softening
    them to merely functional categories such as 'healthy' and 'bad.'
  alternative_readings:
  - the healthy person ... the bad person
  rationale: The verse concerns moral character and its outward expression. Rendering
    πονηρός as 'evil' preserves the ethical force of Jesus' teaching and the parallel
    with ἀγαθός as moral good.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English without flattening theological weight).
