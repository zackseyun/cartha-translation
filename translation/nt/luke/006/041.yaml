id: LUK.6.41
reference: Luke 6:41
source:
  edition: SBLGNT
  text: τί δὲ βλέπεις τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ τοῦ ἀδελφοῦ σου, τὴν δὲ δοκὸν τὴν
    ἐν τῷ ἰδίῳ ὀφθαλμῷ οὐ κατανοεῖς;
translation:
  text: But why do you see the speck in your brother’s eye, yet do not notice the
    beam in your own eye?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splinter' or 'straw' for 'speck' (Greek κάρφος), a tiny particle contrasted
      with the much larger 'beam.'
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' translates the masculine singular Greek term; the teaching
      applies more broadly than to a male sibling alone.'
    reason: cultural_note
  - marker: c
    text: Or 'log' or 'plank' for 'beam' (Greek δοκός), a large piece of timber.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: why
  alternatives:
  - what
  lexicon: BDAG
  rationale: In this rhetorical question, τί with βλέπεις is idiomatically causal/challenging
    ('why do you see...?') rather than a simple 'what do you see?'. 'Why' best reflects
    the rebuking force in natural English.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast from the preceding context.
    'But' preserves the adversative turn in Jesus' teaching better than a simple connective.
- source_word: βλέπεις
  chosen: do you see
  alternatives:
  - are you looking at
  - do you notice
  lexicon: BDAG
  rationale: βλέπω is the ordinary verb 'see/look.' 'Do you see' keeps the concrete
    visual metaphor and works well with the rhetorical question.
- source_word: κάρφος
  chosen: speck
  alternatives:
  - splinter
  - straw
  lexicon: BDAG
  rationale: κάρφος denotes a small dry particle such as a bit of straw or chaff.
    'Speck' is idiomatic in English for the eye-metaphor and preserves the contrast
    with the much larger δοκός. Alternatives are viable and worth preserving.
- source_word: ὀφθαλμῷ
  chosen: eye
  lexicon: BDAG
  rationale: Standard rendering of ὀφθαλμός; the singular is retained as in Greek.
- source_word: ἀδελφοῦ
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: Per gender-accurate philosophy, the grammatically masculine singular
    is rendered 'brother.' The context may be representative, but the source uses
    masculine singular imagery, so the translation preserves it rather than neutralizing
    it.
- source_word: δοκόν
  chosen: beam
  alternatives:
  - log
  - plank
  lexicon: BDAG
  rationale: δοκός refers to a large beam of timber. 'Beam' is a strong, natural English
    equivalent that preserves the hyperbolic contrast with 'speck.' 'Log' is traditional
    in some English versions, but 'beam' more directly reflects structural timber.
- source_word: ἰδίῳ
  chosen: your own
  alternatives:
  - your
  lexicon: BDAG
  rationale: ἴδιος adds emphasis of possession ('one's own'). 'Your own' preserves
    that emphatic contrast with 'your brother's' eye.
- source_word: κατανοεῖς
  chosen: do not notice
  alternatives:
  - do not perceive
  - do not consider
  - do not observe
  lexicon: BDAG
  rationale: κατανοέω can mean to notice carefully, observe, or perceive. Here it
    contrasts with βλέπεις and suggests failure to take proper notice. 'Do not notice'
    is clear modern English and preserves the irony.
