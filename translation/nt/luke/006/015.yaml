theological_decisions:
- issue: Whether Ζηλωτής should be rendered as a political-party label or a descriptive
    epithet
  chosen_reading: Rendered as the identifying title 'the Zealot' without further interpretive
    expansion.
  alternative_readings:
  - '''the zealous one'' as a purely descriptive epithet'
  - '''member of the Zealot party'' as a more historically specific interpretation'
  rationale: The Greek supports an epithet but does not require the translator to
    decide the full historical question of formal party affiliation. 'The Zealot'
    preserves the ambiguity and matches common English usage while avoiding over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
