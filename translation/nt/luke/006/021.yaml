id: LUK.6.21
reference: Luke 6:21
source:
  edition: SBLGNT
  text: μακάριοι οἱ πεινῶντες νῦν, ὅτι χορτασθήσεσθε. μακάριοι οἱ κλαίοντες νῦν, ὅτι
    γελάσετε.
translation:
  text: Blessed are you who are hungry now, because you will be filled. Blessed are
    you who weep now, because you will laugh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed are the hungry now ... Blessed are those who weep now.' The
      Greek uses articular participles, but the immediate context supports direct
      address.
    reason: alternative_reading
  - marker: b
    text: Or 'you will be satisfied.' The verb can denote being filled with food and,
      by extension, being fully satisfied.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: '''Blessed'' best preserves the beatitude form and covenantal/theological
    weight of μακάριος in Jesus''s sayings. ''Happy'' is too subjective and weak;
    ''fortunate'' is too secular.'
- source_word: οἱ πεινῶντες
  chosen: you who are hungry
  alternatives:
  - the hungry
  - those who are hungry
  lexicon: BDAG
  rationale: Although the Greek uses the article with a participle ('the ones hungering'),
    the immediate context in Luke's beatitudes addresses the disciples directly in
    the second person. Rendering as 'you who are hungry' brings the English into alignment
    with the direct address implied by the future second-person verb and the surrounding
    context, while preserving the participial sense.
- source_word: πεινῶντες
  chosen: are hungry
  alternatives:
  - are starving
  - hunger
  lexicon: BDAG
  rationale: The present participle denotes an ongoing state of hunger. 'Are hungry'
    is natural modern English and avoids overstating the intensity with 'starving.'
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: '''Now'' is the plain temporal contrast marker, highlighting present
    deprivation over against future reversal.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason or ground for the blessing. 'Because'
    is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: χορτασθήσεσθε
  chosen: you will be filled
  alternatives:
  - you will be satisfied
  - you will be fed
  lexicon: BDAG
  rationale: The future passive of χορτάζω means to be filled or satisfied, especially
    with food. 'Filled' preserves the concrete imagery and leaves open the broader
    eschatological sense; 'satisfied' is possible but more interpretive.
- source_word: οἱ κλαίοντες
  chosen: you who weep
  alternatives:
  - the ones weeping
  - those who weep
  lexicon: BDAG
  rationale: As with οἱ πεινῶντες, the articular participle is rendered with direct
    address to fit Luke's second-person beatitude context.
- source_word: κλαίοντες
  chosen: weep
  alternatives:
  - are weeping
  - mourn
  lexicon: BDAG
  rationale: κλαίω commonly denotes weeping/crying aloud. 'Weep' is concise and dignified;
    'mourn' narrows the sense toward bereavement, which the Greek does not require.
- source_word: γελάσετε
  chosen: you will laugh
  alternatives:
  - you will rejoice
  lexicon: BDAG
  rationale: γελάω straightforwardly means 'laugh.' Retaining 'laugh' preserves the
    vivid reversal in the saying; 'rejoice' is interpretive and less concrete.
