theological_decisions:
- issue: Direct address versus third-person generic beatitude form
  chosen_reading: Render the subjects as 'you who are hungry/weep' rather than 'the
    hungry/those who weep.'
  alternative_readings:
  - Blessed are the hungry now...
  - Blessed are those who are hungry now...
  rationale: Luke's version of the beatitudes in this context is addressed directly
    to the disciples, and the future verbs are second person plural. Using 'you who...'
    preserves that discourse setting without adding content not present in the Greek.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of promised reversal
  chosen_reading: Keep the promises concrete ('filled,' 'laugh') without specifying
    whether the fulfillment is temporal, spiritual, or eschatological.
  alternative_readings:
  - Interpret as primarily spiritual satisfaction
  - Interpret as exclusively end-times reversal
  rationale: The verse promises reversal but does not explicitly define its timing
    or mode here. The translation preserves the theological tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
