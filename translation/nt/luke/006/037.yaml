id: LUK.6.37
reference: Luke 6:37
source:
  edition: SBLGNT
  text: Καὶ μὴ κρίνετε, καὶ οὐ μὴ κριθῆτε· ⸀καὶ μὴ καταδικάζετε, καὶ οὐ μὴ καταδικασθῆτε.
    ἀπολύετε, καὶ ἀπολυθήσεσθε·
translation:
  text: And do not judge, and you will certainly not be judged; and do not condemn,
    and you will certainly not be condemned. Release, and you will be released.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Forgive, and you will be forgiven.' The Greek verb can mean 'release,'
      'set free,' or in context be understood as 'forgive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνετε
  chosen: judge
  alternatives:
  - pass judgment
  lexicon: BDAG
  rationale: κρίνω commonly means to judge or evaluate. 'Judge' preserves the concise
    imperative form and matches the paired passive 'be judged.' 'Pass judgment' is
    possible but less direct in English.
- source_word: οὐ μὴ κριθῆτε
  chosen: you will certainly not be judged
  alternatives:
  - you will by no means be judged
  - you will not be judged
  lexicon: BDAG
  rationale: The οὐ μή construction with the aorist passive subjunctive is emphatic.
    'Will certainly not be judged' conveys the strong negation in natural modern English
    better than a flatter 'will not be judged.'
- source_word: καταδικάζετε
  chosen: condemn
  alternatives:
  - pronounce guilty
  - pass sentence on
  lexicon: BDAG
  rationale: καταδικάζω is stronger than κρίνω and carries the sense of condemning
    or pronouncing guilty. 'Condemn' preserves the semantic escalation from general
    judging to adverse judgment.
- source_word: οὐ μὴ καταδικασθῆτε
  chosen: you will certainly not be condemned
  alternatives:
  - you will by no means be condemned
  - you will not be condemned
  lexicon: BDAG
  rationale: As with the previous clause, οὐ μή marks emphatic negation. 'Certainly
    not' communicates the force while keeping the parallelism with the prior line.
- source_word: ἀπολύετε
  chosen: Release
  alternatives:
  - forgive
  - set free
  - pardon
  lexicon: BDAG
  rationale: ἀπολύω has a broad range including release, set free, dismiss, or acquit.
    In this context, paired with judging and condemning, it likely means releasing
    others from claims against them. 'Release' preserves the broader lexical sense
    without prematurely narrowing it to 'forgive,' though forgiveness is an interpretive
    possibility.
- source_word: ἀπολυθήσεσθε
  chosen: you will be released
  alternatives:
  - you will be forgiven
  - you will be set free
  lexicon: BDAG
  rationale: Using 'released' keeps the verbal correspondence with ἀπολύετε and preserves
    the reciprocity of the saying. 'Forgiven' is a common interpretive rendering,
    but it is narrower than the Greek term itself.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: The repeated καὶ structures the parallel imperatives and results. 'And'
    preserves the rhythm and coordination of the Greek better than a more interpretive
    connective like 'then'.
