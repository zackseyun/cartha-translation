theological_decisions:
- issue: Whether ἀπολύετε should be rendered narrowly as 'forgive' or more broadly
    as 'release'
  chosen_reading: Render as 'Release' in the main text
  alternative_readings:
  - Forgive
  - Set free
  - Pardon
  rationale: The immediate context concerns reciprocal treatment in judgment and condemnation,
    and ἀπολύω can denote release or acquittal. Rendering it as 'release' preserves
    the lexical breadth and avoids importing a narrower doctrinal or pastoral interpretation
    into the main text. Because 'forgive' is a familiar and contextually plausible
    interpretation, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
