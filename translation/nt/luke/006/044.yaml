theological_decisions:
- issue: Metaphorical force of fruit imagery
  chosen_reading: Retain the agricultural proverb without explicating its moral application
    in the translation.
  alternative_readings:
  - Interpretively expand to moral character or deeds
  rationale: The verse uses a transparent metaphor in context, but the translation
    should not paraphrase beyond what the Greek states. Preserving the image maintains
    the text's rhetorical force and theological openness within the immediate discourse.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never paraphrase beyond what the source text warrants.'
