id: LUK.6.44
reference: Luke 6:44
source:
  edition: SBLGNT
  text: ἕκαστον γὰρ δένδρον ἐκ τοῦ ἰδίου καρποῦ γινώσκεται· οὐ γὰρ ἐξ ἀκανθῶν συλλέγουσιν
    σῦκα, οὐδὲ ἐκ βάτου ⸂σταφυλὴν τρυγῶσιν⸃.
translation:
  text: For each tree is known by its own fruit. For they do not gather figs from
    thorns, nor do they harvest grapes from a bramble bush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thornbushes' for 'thorns.'
    reason: lexical_alternative
  - marker: b
    text: Or 'thornbush'; the Greek refers to a bramble-like thorny bush.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστον ... δένδρον
  chosen: each tree
  alternatives:
  - every tree
  lexicon: BDAG
  rationale: ἕκαστον with the singular noun δένδρον yields a distributive sense. 'Each
    tree' is natural English and preserves the individualizing force.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ is retained as 'for' in both clauses to preserve the explanatory
    connection and proverbial logic of the saying.
- source_word: ἐκ τοῦ ἰδίου καρποῦ
  chosen: by its own fruit
  alternatives:
  - from its own fruit
  - by its fruit
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' English idiom with γινώσκεται
    is better expressed as 'known by.' 'Own' translates ἰδίου and preserves the emphasis
    on correspondence between source and produce.
- source_word: γινώσκεται
  chosen: is known
  alternatives:
  - is recognized
  - is identified
  lexicon: BDAG
  rationale: The present passive indicates what is characteristically recognized.
    'Is known' is concise and idiomatic in proverbial speech.
- source_word: ἀκανθῶν
  chosen: thorns
  alternatives:
  - thornbushes
  - thorn plants
  lexicon: BDAG
  rationale: The plural noun broadly denotes thorny plants. 'Thorns' is the most direct
    and familiar rendering, matching common English proverbial style.
- source_word: συλλέγουσιν
  chosen: gather
  alternatives:
  - collect
  - pick
  lexicon: BDAG
  rationale: '''Gather'' fits agricultural produce and pairs naturally with figs.'
- source_word: σῦκα
  chosen: figs
  lexicon: BDAG
  rationale: Standard rendering of the accusative plural of σῦκον.
- source_word: βάτου
  chosen: bramble bush
  alternatives:
  - bush
  - thornbush
  - blackberry bush
  lexicon: BDAG
  rationale: βάτος denotes a thorny bush/bramble rather than a generic 'bush.' 'Bramble
    bush' communicates the plant type clearly in modern English without over-specifying
    a species.
- source_word: σταφυλήν
  chosen: grapes
  alternatives:
  - a cluster of grapes
  lexicon: BDAG
  rationale: Though singular in Greek, English commonly uses the mass/plural 'grapes'
    in this proverb. This preserves the sense rather than forcing an awkward singular.
- source_word: τρυγῶσιν
  chosen: harvest
  alternatives:
  - pick
  - gather
  lexicon: BDAG
  rationale: τρυγάω is specifically used of harvesting ripe produce, especially grapes.
    'Harvest' preserves that nuance and provides a slight lexical distinction from
    συλλέγουσιν.
