theological_decisions:
- issue: Whether υἱοὶ Ὑψίστου should be rendered with gender-neutral language
  chosen_reading: sons of the Most High
  alternative_readings:
  - children of the Most High
  rationale: The Greek text uses the masculine plural υἱοὶ. In keeping with the project's
    gender-accurate policy, the main text preserves 'sons' rather than neutralizing
    to 'children,' while recognizing the representative sense in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of μηδὲν ἀπελπίζοντες in the lending command
  chosen_reading: expecting nothing in return
  alternative_readings:
  - despairing of no one
  - not losing hope
  rationale: The immediate context concerns lending and reciprocity, so the participle
    is best understood as renouncing expectation of repayment or return. Because the
    phrase has a known interpretive difficulty, the alternative sense is preserved
    in a footnote rather than silently excluded.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
