id: LUK.6.35
reference: Luke 6:35
source:
  edition: SBLGNT
  text: πλὴν ἀγαπᾶτε τοὺς ἐχθροὺς ὑμῶν καὶ ἀγαθοποιεῖτε καὶ δανίζετε μηδὲν ἀπελπίζοντες·
    καὶ ἔσται ὁ μισθὸς ὑμῶν πολύς, καὶ ἔσεσθε υἱοὶ Ὑψίστου, ὅτι αὐτὸς χρηστός ἐστιν
    ἐπὶ τοὺς ἀχαρίστους καὶ πονηρούς.
translation:
  text: But love your enemies, and do good, and lend, expecting nothing in return;
    and your reward will be great, and you will be sons of the Most High, because
    he is kind to the ungrateful and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'despairing of no one' or 'never losing hope.' The Greek
      phrase μηδὲν ἀπελπίζοντες is difficult; in this context it is taken to mean
      not expecting repayment or return.
    reason: lexical_alternative
  - marker: b
    text: '''Sons'' translates the masculine plural Greek term and can carry a representative
      sense here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding reciprocal-love pattern; 'But'
    is natural modern English and preserves the adversative force.
- source_word: ἀγαπᾶτε
  chosen: love
  lexicon: BDAG
  rationale: Direct imperative from ἀγαπάω; aligns with the project's default rendering
    of ἀγάπη cognates as 'love'.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  chosen: your enemies
  lexicon: BDAG
  rationale: Straightforward object phrase; preserves the shock of the command without
    softening 'enemies' to 'opponents' or similar.
- source_word: ἀγαθοποιεῖτε
  chosen: do good
  alternatives:
  - do what is good
  lexicon: BDAG
  rationale: Idiomatic English imperative that preserves the active beneficence of
    the verb.
- source_word: δανίζετε
  chosen: lend
  alternatives:
  - lend money
  lexicon: BDAG
  rationale: The verb means to lend; adding 'money' would over-specify beyond the
    Greek.
- source_word: μηδὲν ἀπελπίζοντες
  chosen: expecting nothing in return
  alternatives:
  - despairing of no one
  - not expecting anything back
  lexicon: BDAG
  rationale: In this lending context, the participial phrase is best taken as not
    expecting repayment/return. This fits the immediate context and common modern
    English usage. The more literal but less likely sense related to 'despairing'
    is preserved in a footnote because the phrase has been interpreted differently.
- source_word: μισθὸς
  chosen: reward
  alternatives:
  - wage
  lexicon: BDAG
  rationale: '''Reward'' fits the ethical and eschatological context better than the
    more commercial ''wage'' while preserving the idea of recompense.'
- source_word: πολύς
  chosen: great
  alternatives:
  - large
  - abundant
  lexicon: BDAG
  rationale: Predicate adjective describing the reward; 'great' is idiomatic and suitably
    weighty.
- source_word: υἱοὶ Ὑψίστου
  chosen: sons of the Most High
  alternatives:
  - children of the Most High
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'sons.' Per doctrine, gender-accurate
    rendering is preferred over neutralization. The representative force can be noted
    in a footnote.
- source_word: Ὑψίστου
  chosen: the Most High
  lexicon: BDAG
  rationale: Standard rendering of the divine title Ὕψιστος, preserving its elevated
    theological sense.
- source_word: χρηστός
  chosen: kind
  alternatives:
  - good
  - gracious
  lexicon: BDAG
  rationale: In context of God's benevolent action toward the undeserving, 'kind'
    best captures the adjective's moral benevolence.
- source_word: ἀχαρίστους
  chosen: the ungrateful
  alternatives:
  - the thankless
  lexicon: BDAG
  rationale: Both are possible, but 'ungrateful' is clearer in contemporary English.
- source_word: πονηρούς
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is the broad, standard rendering and pairs naturally with ''the
    ungrateful''.'
