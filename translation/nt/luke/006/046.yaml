theological_decisions:
- issue: Rendering of κύριος as a christological title
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this context the
    title addresses Jesus directly and carries both respect and christological weight;
    'Master' is possible but weaker and less aligned with the project's stated default.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; Translation philosophy
    #2'
