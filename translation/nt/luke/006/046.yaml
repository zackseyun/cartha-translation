id: LUK.6.46
reference: Luke 6:46
source:
  edition: SBLGNT
  text: Τί δέ με καλεῖτε· Κύριε κύριε, καὶ οὐ ποιεῖτε ἃ λέγω;
translation:
  text: Why do you call me, ‘Lord, Lord,’ and not do what I say?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Master, Master.” Greek: “Kyrios, kyrios.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: 'Although τί is formally ''what,'' in the idiom Τί ... καλεῖτε it functions
    adverbially to ask reason: ''Why do you call...?'' This is the natural English
    equivalent and preserves the rebuking force of the question.'
- source_word: δέ
  chosen: —
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: δέ is a mild connective, but in English this question reads naturally
    without an explicit conjunction. Its discourse function is adequately conveyed
    by the flow from the preceding context, so it is left untranslated.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of καλεῖτε; straightforwardly rendered 'me.'
- source_word: καλεῖτε
  chosen: call
  alternatives:
  - address as
  lexicon: BDAG
  rationale: Present active indicative, second person plural. 'Call' is the most direct
    and idiomatic rendering in this vocative context.
- source_word: Κύριε κύριε
  chosen: Lord, Lord
  alternatives:
  - Master, Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; default rendering
    is 'Lord.' The repeated vocative is preserved to reflect emphasis and the rhetorical
    contrast between verbal confession and disobedience.
- source_word: καὶ οὐ
  chosen: and not
  alternatives:
  - but do not
  lexicon: BDAG
  rationale: The combination marks contrast between calling Jesus 'Lord' and failing
    to obey him. 'And not' keeps the Greek coordination while remaining natural in
    English.
- source_word: ποιεῖτε
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: 'ποιέω here refers to performing or obeying what Jesus says. ''Do'' is
    simple, direct, and matches common English idiom: ''do what I say.'''
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - whatever
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring to the content of Jesus' speech.
    English idiom prefers singular collective 'what' rather than the more wooden 'the
    things that.'
- source_word: λέγω
  chosen: I say
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: λέγω is best rendered simply as 'I say.' 'I tell you' would add a nuance
    not explicit in the Greek.
