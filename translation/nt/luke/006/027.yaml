theological_decisions:
- issue: Ethical imperatives toward opponents
  chosen_reading: Render the commands plainly as universal imperatives without narrowing
    their scope or importing qualifications not present in the Greek.
  alternative_readings:
  - Interpret as limited to personal enemies only
  - Interpret as rhetorical hyperbole
  rationale: The verse presents direct second-person plural imperatives with no explicit
    limitation in the wording. The translation should preserve the radical ethical
    force without resolving later interpretive debates in the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
