id: LUK.6.27
reference: Luke 6:27
source:
  edition: SBLGNT
  text: Ἀλλὰ ὑμῖν λέγω τοῖς ἀκούουσιν, ἀγαπᾶτε τοὺς ἐχθροὺς ὑμῶν, καλῶς ποιεῖτε τοῖς
    μισοῦσιν ὑμᾶς,
translation:
  text: 'But I say to you who are listening: love your enemies; do good to those who
    hate you,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who hear.' The Greek participle can be rendered more formally that way;
      'who are listening' brings out the ongoing sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding material; 'But' is the most
    natural concise English equivalent here.
- source_word: ὑμῖν λέγω
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering preserving the direct address and discourse
    formula without unnecessary paraphrase.
- source_word: τοῖς ἀκούουσιν
  chosen: who are listening
  alternatives:
  - who hear
  - who are hearing
  lexicon: BDAG
  rationale: The present participle is rendered progressively to reflect active receptivity
    in context. 'Who hear' is possible, but 'who are listening' better conveys the
    force in idiomatic modern English.
- source_word: ἀγαπᾶτε
  chosen: love
  lexicon: BDAG
  rationale: Consistent with the project's default rendering of ἀγάπη cognates as
    'love.' The imperative sense is preserved.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  chosen: your enemies
  lexicon: BDAG
  rationale: Direct and natural rendering of the accusative object with possessive
    pronoun.
- source_word: καλῶς ποιεῖτε
  chosen: do good
  alternatives:
  - do what is good
  - act kindly
  lexicon: BDAG
  rationale: This idiom is well represented by 'do good' in English and preserves
    both the verbal action and moral quality without overexpansion.
- source_word: τοῖς μισοῦσιν ὑμᾶς
  chosen: to those who hate you
  alternatives:
  - for those who hate you
  lexicon: BDAG
  rationale: The dative is naturally rendered with 'to' after 'do good.' 'Hate' is
    the plain lexical sense of μισέω and should not be softened.
