id: LUK.6.16
reference: Luke 6:16
source:
  edition: SBLGNT
  text: ⸀καὶ Ἰούδαν Ἰακώβου καὶ Ἰούδαν ⸀Ἰσκαριὼθ ⸀ὃς ἐγένετο προδότης.
translation:
  text: and Judas son of James, and Judas Iscariot, who became a traitor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judas brother of James'; the Greek simply says 'Judas of James.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰούδαν Ἰακώβου
  chosen: Judas son of James
  alternatives:
  - Judas of James
  - Judas brother of James
  lexicon: BDAG
  rationale: The genitive Ἰακώβου is elliptical and can indicate family relationship.
    In apostolic lists, English normally supplies the relationship. 'Son of James'
    is the most neutral and widely accepted here; 'brother of James' is possible but
    less likely from the Greek alone and would import specificity not explicit in
    the text.
- source_word: Ἰσκαριὼθ
  chosen: Iscariot
  lexicon: BDAG
  rationale: This is a proper name/designation and should be transliterated rather
    than translated, in keeping with the philosophy of transliterating personal names.
- source_word: ὃς ἐγένετο
  chosen: who became
  alternatives:
  - who was
  - who turned out to be
  lexicon: BDAG
  rationale: γίνομαι commonly means 'become' or 'come to be.' 'Became' preserves the
    verbal force better than a simple stative 'was' and reflects that Judas came to
    occupy the role described.
- source_word: προδότης
  chosen: traitor
  alternatives:
  - betrayer
  lexicon: BDAG
  rationale: προδότης denotes one who betrays, a traitor. 'Traitor' is concise, idiomatic,
    and fits the predicate after 'became.' 'Betrayer' is also possible, but 'traitor'
    better captures the noun's force as a characterization.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: The repeated conjunction links the final two names in the list straightforwardly
    and is best rendered with simple coordination.
