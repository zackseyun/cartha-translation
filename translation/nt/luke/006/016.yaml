theological_decisions:
- issue: Relationship implied by Ἰακώβου in 'Judas of James'
  chosen_reading: Render as 'Judas son of James' in the main text
  alternative_readings:
  - Judas brother of James
  rationale: The Greek genitive leaves the exact relationship implicit. To produce
    natural English in a disciple list, a relationship must be supplied. 'Son of James'
    is the more cautious default because it does not depend on harmonization with
    other passages or later tradition. The ambiguity is preserved in a footnote rather
    than resolved dogmatically.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
