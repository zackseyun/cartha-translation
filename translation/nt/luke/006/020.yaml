id: LUK.6.20
reference: Luke 6:20
source:
  edition: SBLGNT
  text: Καὶ αὐτὸς ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ εἰς τοὺς μαθητὰς αὐτοῦ ἔλεγεν· Μακάριοι
    οἱ πτωχοί, ὅτι ὑμετέρα ἐστὶν ἡ βασιλεία τοῦ θεοῦ.
translation:
  text: 'And he, lifting up his eyes toward his disciples, was saying: “Blessed are
    you poor, because yours is the kingdom of God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Blessed are the poor.” The Greek expression is third
      person in form, but the following “yours” makes the address direct.
    reason: lexical_alternative
  - marker: b
    text: Luke says “the poor,” not “the poor in spirit” (compare Matt 5:3).
    reason: cross_reference
lexical_decisions:
- source_word: ἐπάρας
  chosen: lifting up
  alternatives:
  - raising
  - having lifted up
  lexicon: BDAG
  rationale: Aorist participle of ἐπαίρω, introducing the manner/action preceding
    the main verb. 'Lifting up' preserves the concrete image and reads naturally in
    English without over-formalizing the participial sequence.
- source_word: εἰς
  chosen: toward
  alternatives:
  - to
  - upon
  lexicon: BDAG
  rationale: With 'eyes' and a personal object, εἰς here indicates direction of gaze.
    'Toward' is idiomatic and preserves the sense of directing his look to his disciples.
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - began to say
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or introductory speech rather than a
    simple punctiliar utterance. 'Was saying' preserves that aspect better than simple
    past 'said.'
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: '''Blessed'' is the standard and most theologically suitable rendering
    in beatitude contexts. ''Happy'' is too shallow emotionally, and ''fortunate''
    misses the covenantal/religious resonance.'
- source_word: οἱ πτωχοί
  chosen: you poor
  alternatives:
  - the poor
  - you who are poor
  lexicon: BDAG
  rationale: 'Although formally third person with the article (''the poor''), Luke''s
    immediate shift to second person in ὑμετέρα (''yours'') strongly supports rendering
    the beatitude directly to the audience: ''Blessed are you poor.'' This preserves
    Luke''s direct address more clearly than ''Blessed are the poor.'''
- source_word: πτωχοί
  chosen: poor
  alternatives:
  - destitute
  - the needy
  lexicon: BDAG
  rationale: '''Poor'' is the plain lexical sense and best matches Luke''s wording
    without importing a purely spiritual interpretation from Matthew''s parallel.
    More specific terms like ''destitute'' over-interpret the socioeconomic nuance.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the blessing. 'Because' is clear modern English
    and preserves the causal force.
- source_word: ὑμετέρα
  chosen: yours
  alternatives:
  - belongs to you
  - is your possession
  lexicon: BDAG
  rationale: The possessive adjective functions predicatively with ἐστίν. 'Yours is'
    is concise, natural, and close to the Greek structure.
- source_word: βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''The kingdom of God'' is the established and accurate rendering. ''Reign
    of God'' can highlight dynamic rule but is less idiomatic and may narrow the semantic
    range unnecessarily.'
