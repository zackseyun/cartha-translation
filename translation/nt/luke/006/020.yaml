theological_decisions:
- issue: Whether πτωχοί should be interpreted spiritually ('poor in spirit') or materially/socially
    ('poor')
  chosen_reading: poor
  alternative_readings:
  - poor in spirit
  rationale: Luke's text simply says 'the poor' and should not be harmonized with
    Matthew 5:3. The translation preserves Luke's wording and theological emphasis
    without importing an interpretive expansion absent from the Greek.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it
- issue: Whether the beatitude should be rendered in third person ('Blessed are the
    poor') or as direct address ('Blessed are you poor')
  chosen_reading: direct address
  alternative_readings:
  - Blessed are the poor
  - Blessed are you who are poor
  rationale: The article with adjective is formally third person, but the following
    ὑμετέρα ('yours') makes the saying directly address the disciples. Rendering it
    as direct address preserves the discourse flow and avoids obscuring Luke's second-person
    emphasis.
  doctrine_reference: Translation philosophy §6 Readable modern English, not archaic
    or academic
