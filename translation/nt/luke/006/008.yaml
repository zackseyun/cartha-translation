theological_decisions:
- issue: Jesus' knowledge of others' inner thoughts
  chosen_reading: Render straightforwardly as narrative knowledge without adding interpretive
    qualifiers.
  alternative_readings:
  - He perceived their intentions
  - He knew by supernatural insight their reasonings
  rationale: The verse states that Jesus knew their thoughts, but does not specify
    the mechanism. The translation should preserve the claim without importing an
    explanatory theological gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
