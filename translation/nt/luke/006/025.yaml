theological_decisions:
- issue: Nature of the woe saying
  chosen_reading: A prophetic warning of coming reversal and judgment on those presently
    satisfied and carefree
  alternative_readings:
  - A merely sociological observation about changing fortunes
  rationale: The repeated 'woe,' future verbs, and parallel with the surrounding blessings
    indicate more than a neutral observation; the saying warns of eschatological reversal.
    The translation preserves this without specifying the exact mechanism beyond what
    the text states.
  doctrine_reference: Preserve theological tension rather than resolve it
