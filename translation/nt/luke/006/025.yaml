id: LUK.6.25
reference: Luke 6:25
source:
  edition: SBLGNT
  text: οὐαὶ ὑμῖν, οἱ ἐμπεπλησμένοι ⸀νῦν, ὅτι πεινάσετε. ⸀οὐαί, οἱ γελῶντες νῦν, ὅτι
    πενθήσετε καὶ κλαύσετε.
translation:
  text: Woe to you who are full now, because you will be hungry. Woe, you who are
    laughing now, because you will mourn and weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will hunger.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Alas for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Retains the prophetic force of denunciation/judgment rather than softening
    it into mere pity. 'Woe' is standard, natural English for this interjection in
    judgment sayings.
- source_word: ἐμπεπλησμένοι
  chosen: are full
  alternatives:
  - have been filled
  - are satisfied
  lexicon: BDAG
  rationale: The perfect participle denotes a present state resulting from being filled.
    'Are full' is idiomatic and concise in English, preserving the contrast with future
    hunger. 'Are satisfied' is possible but slightly more interpretive and less concrete.
- source_word: νῦν
  chosen: now
  lexicon: BDAG
  rationale: Preserves the temporal contrast between present condition and future
    reversal, which is central to the beatitude/woe structure in this context.
- source_word: πεινάσετε
  chosen: you will be hungry
  alternatives:
  - you will hunger
  lexicon: BDAG
  rationale: Future indicative expressing coming deprivation. 'You will be hungry'
    is more natural contemporary English than 'you will hunger' while preserving the
    sense.
- source_word: γελῶντες
  chosen: are laughing
  alternatives:
  - laugh
  - rejoice
  lexicon: BDAG
  rationale: The present participle describes those presently engaged in laughter.
    'Are laughing' best reflects the ongoing present sense. 'Rejoice' is too broad
    and less literal.
- source_word: πενθήσετε
  chosen: you will mourn
  alternatives:
  - you will grieve
  lexicon: BDAG
  rationale: This verb commonly denotes mourning, often with the weight of lament.
    'Mourn' preserves the gravity and pairs well with the following 'weep' without
    collapsing the two verbs into one idea.
- source_word: κλαύσετε
  chosen: weep
  alternatives:
  - cry
  lexicon: BDAG
  rationale: Keeps a stronger, more formal distinction from 'mourn.' 'Weep' better
    conveys audible lament and preserves the rhetorical intensification of the paired
    verbs.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason/ground for the woe. 'Because' is clearer in modern
    English than 'for' while preserving the causal sense.
