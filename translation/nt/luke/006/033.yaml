theological_decisions:
- issue: Sense of χάρις in ethical teaching context
  chosen_reading: commendation or credit rather than theological grace
  alternative_readings:
  - grace
  - thanks
  rationale: Although χάρις often carries theological weight as 'grace,' here the
    rhetorical question concerns what favorable regard or commendation one receives
    for reciprocal goodness. Rendering it as 'credit' avoids importing soteriological
    meaning the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
