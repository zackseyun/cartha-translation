id: LUK.6.33
reference: Luke 6:33
source:
  edition: SBLGNT
  text: ⸀καὶ ἐὰν ἀγαθοποιῆτε τοὺς ἀγαθοποιοῦντας ὑμᾶς, ποία ὑμῖν χάρις ἐστίν; ⸁καὶ
    οἱ ἁμαρτωλοὶ τὸ αὐτὸ ποιοῦσιν.
translation:
  text: And if you do good to those who do good to you, what credit is that to you?
    Even sinners do the same.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what grace is that to you?' The Greek word can mean 'grace,' 'favor,'
      'thanks,' or 'credit'; here it refers to commendation for reciprocal kindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθοποιῆτε
  chosen: do good
  alternatives:
  - do what is good
  - act kindly
  lexicon: BDAG
  rationale: The verb means to do good or benefit others. 'Do good' is concise, natural
    English, and preserves the verbal connection with the participle later in the
    clause.
- source_word: ἀγαθοποιοῦντας
  chosen: those who do good
  alternatives:
  - those doing good
  - those who are kind to
  lexicon: BDAG
  rationale: Rendered with the same core gloss as ἀγαθοποιῆτε to preserve lexical
    consistency. The participial construction is naturally expressed in English as
    'those who do good'.
- source_word: ποία ... χάρις
  chosen: what credit
  alternatives:
  - what grace
  - what favor
  - what thanks
  lexicon: BDAG
  rationale: In this Lukan context χάρις refers not to saving grace but to credit,
    favor, or commendation due for an action. 'What credit' best fits the rhetorical
    question and parallels the surrounding sayings about actions that deserve no special
    commendation.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is idiomatically represented as 'to you' with 'credit,' yielding
    natural English while preserving the sense of benefit or commendation accruing
    to the hearers.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: '''Sinners'' is the standard and most direct rendering, matching the
    social-religious category in Luke without softening it.'
- source_word: τὸ αὐτὸ ποιοῦσιν
  chosen: do the same
  alternatives:
  - do the same thing
  lexicon: BDAG
  rationale: This is a straightforward idiomatic rendering of the Greek expression.
    'Do the same' is natural English and sufficiently precise.
- source_word: καὶ
  chosen: And / Even
  alternatives:
  - also
  - for
  lexicon: BDAG
  rationale: The first καὶ is retained as 'And' to preserve the discourse flow in
    Jesus' sequence of parallel statements. The second καὶ has an ascensive force
    in context, well conveyed by 'Even,' highlighting that sinners also meet this
    minimal standard.
