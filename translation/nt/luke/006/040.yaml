id: LUK.6.40
reference: Luke 6:40
source:
  edition: SBLGNT
  text: οὐκ ἔστιν μαθητὴς ὑπὲρ τὸν ⸀διδάσκαλον, κατηρτισμένος δὲ πᾶς ἔσται ὡς ὁ διδάσκαλος
    αὐτοῦ.
translation:
  text: A disciple is not above his teacher, but everyone who has been fully trained
    will be like his teacher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "A student is not above his teacher."
    reason: lexical_alternative
  - marker: b
    text: Or "everyone who has been equipped/prepared will be like his teacher."
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητής
  chosen: disciple
  alternatives:
  - student
  lexicon: BDAG
  rationale: '"Disciple" preserves the relational and formative sense of a learner
    attached to a master, which is stronger than the more academic "student."'
- source_word: ὑπὲρ
  chosen: above
  alternatives:
  - greater than
  - beyond
  lexicon: BDAG
  rationale: With a comparative sense here, ὑπέρ indicates status or rank. "Above"
    is concise and idiomatic in English for the saying's contrast between disciple
    and teacher.
- source_word: διδάσκαλον / διδάσκαλος
  chosen: teacher
  alternatives:
  - master
  - instructor
  lexicon: BDAG
  rationale: '"Teacher" is the plain lexical equivalent of διδάσκαλος and fits readable
    modern English. "Master" could suggest authority beyond the pedagogical emphasis
    of the term itself.'
- source_word: κατηρτισμένος
  chosen: who has been fully trained
  alternatives:
  - having been equipped
  - having been restored
  - having been perfected
  - fully prepared
  lexicon: BDAG
  rationale: The perfect passive participle of καταρτίζω conveys a completed process
    of being made ready or trained. In this context of disciple and teacher, "fully
    trained" best captures the educational formation in view. The relative clause
    makes the participle natural in English.
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - every disciple
  - everyone
  lexicon: BDAG
  rationale: Although grammatically masculine singular, πᾶς here has generic force.
    "Everyone" communicates the representative sense in natural English without changing
    the meaning of the proverb.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Here ὡς marks comparison. "Like" is the most natural English rendering
    in this proverbial statement.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - that person's
  lexicon: BDAG
  rationale: The pronoun refers back to the disciple/everyone in a grammatically masculine
    generic construction. Per the project's gender-accurate policy, "his" preserves
    the source form and representative force.
