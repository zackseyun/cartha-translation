id: LUK.6.17
reference: Luke 6:17
source:
  edition: SBLGNT
  text: Καὶ καταβὰς μετ’ αὐτῶν ἔστη ἐπὶ τόπου πεδινοῦ, καὶ ὄχλος ⸀πολὺς μαθητῶν αὐτοῦ,
    καὶ πλῆθος πολὺ τοῦ λαοῦ ἀπὸ πάσης τῆς Ἰουδαίας καὶ Ἰερουσαλὴμ καὶ τῆς παραλίου
    Τύρου καὶ Σιδῶνος,
translation:
  text: And coming down with them, he stood on a level place, with a large crowd of
    his disciples and a great multitude of the people from all Judea and Jerusalem
    and the coastal region of Tyre and Sidon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a plain.' The Greek phrase is literally 'on a level place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβὰς
  chosen: coming down
  alternatives:
  - having come down
  - descending
  lexicon: BDAG
  rationale: Aorist participle of καταβαίνω, indicating prior/concurrent motion before
    the main verb. 'Coming down' is natural English and preserves the directional
    sense without over-formal stiffness.
- source_word: ἔστη
  chosen: he stood
  alternatives:
  - he took his stand
  - he stood still
  lexicon: BDAG
  rationale: Aorist of ἵστημι here denotes taking a standing position. 'He stood'
    is the plain sense and fits the narrative sequence.
- source_word: ἐπὶ τόπου πεδινοῦ
  chosen: on a level place
  alternatives:
  - on a plain
  - on a flat place
  lexicon: BDAG
  rationale: τόπος is 'place' and πεδινός means 'level/flat, plain-like.' 'Level place'
    is a transparent rendering that preserves the Greek wording and avoids overcommitting
    to a broad geographical 'plain' while still conveying the terrain.
- source_word: ὄχλος πολὺς μαθητῶν αὐτοῦ
  chosen: a large crowd of his disciples
  alternatives:
  - a great crowd of his disciples
  - a large multitude of his disciples
  lexicon: BDAG
  rationale: ὄχλος commonly means 'crowd.' πολὺς intensifies size. The genitive μαθητῶν
    αὐτοῦ is best taken as a crowd consisting of his disciples.
- source_word: πλῆθος πολὺ τοῦ λαοῦ
  chosen: a great multitude of the people
  alternatives:
  - a large crowd of the people
  - a great number of the people
  lexicon: BDAG
  rationale: πλῆθος emphasizes a large number or multitude. Retaining 'the people'
    for τοῦ λαοῦ preserves the article and likely reference to the broader populace,
    distinguished from the disciples.
- source_word: λαοῦ
  chosen: the people
  alternatives:
  - the populace
  - the common people
  lexicon: BDAG
  rationale: λαός in Luke often refers to the people as a collective body. 'The people'
    is the most direct and least interpretively loaded rendering.
- source_word: ἀπὸ πάσης τῆς Ἰουδαίας
  chosen: from all Judea
  alternatives:
  - from the whole of Judea
  lexicon: BDAG
  rationale: πάσης with the region name conveys comprehensiveness. 'From all Judea'
    is idiomatic and accurate.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: τῆς παραλίου Τύρου καὶ Σιδῶνος
  chosen: the coastal region of Tyre and Sidon
  alternatives:
  - the seacoast of Tyre and Sidon
  - the region along the sea of Tyre and Sidon
  lexicon: BDAG
  rationale: παράλιος means 'by the sea, coastal.' Because it modifies the area associated
    with Tyre and Sidon, 'the coastal region of Tyre and Sidon' communicates the geographic
    sense clearly in modern English.
