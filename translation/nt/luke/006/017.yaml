theological_decisions:
- issue: Topographical wording in relation to the Sermon setting
  chosen_reading: on a level place
  alternative_readings:
  - on the plain
  rationale: The phrase should be translated according to its lexical sense without
    harmonizing or creating tension with Matthew's mountain setting beyond what Luke
    states. 'Level place' preserves the Greek and avoids importing a theological or
    harmonizing agenda.
  doctrine_reference: Translation philosophy §§1, 3
