theological_decisions:
- issue: Relation of the command to the Father's character
  chosen_reading: 'The verse presents the Father''s mercy as the pattern for the disciples''
    conduct: ''Be merciful, just as your Father is merciful.'''
  alternative_readings:
  - Be compassionate, because your Father is compassionate.
  rationale: καθώς is best taken comparatively ('just as') rather than causally ('because').
    This preserves the ethical imitation motif without adding explanatory theology
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
