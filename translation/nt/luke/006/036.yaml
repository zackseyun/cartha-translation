id: LUK.6.36
reference: Luke 6:36
source:
  edition: SBLGNT
  text: ⸀γίνεσθε οἰκτίρμονες ⸀καθὼς ὁ πατὴρ ὑμῶν οἰκτίρμων ἐστίν·
translation:
  text: Be merciful, just as your Father is merciful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compassionate.' The Greek adjective can denote one who is moved by pity
      and shows mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεσθε
  chosen: Be
  alternatives:
  - Become
  - Keep becoming
  lexicon: BDAG
  rationale: Present middle/deponent imperative, second person plural, from γίνομαι.
    In this hortatory context, English idiom favors the imperative 'Be' rather than
    the more wooden 'Become,' while still conveying an ongoing call to embody this
    quality.
- source_word: οἰκτίρμονες
  chosen: merciful
  alternatives:
  - compassionate
  - full of mercy
  lexicon: BDAG
  rationale: οἰκτίρμων denotes being characterized by mercy/compassion. 'Merciful'
    is the most direct and natural rendering here, and it preserves the lexical link
    with the predicate adjective later in the verse.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: καθώς introduces comparison or pattern. 'Just as' clearly marks the Father's
    mercy as the model for the disciples' conduct.
- source_word: πατὴρ ὑμῶν
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The Greek text reads simply 'your Father' without an explicit adjective
    such as 'heavenly.' The translation preserves the direct wording and relational
    force without importing language from parallels.
- source_word: οἰκτίρμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: BDAG
  rationale: Rendered consistently with the earlier occurrence of the same adjective
    in the verse, in keeping with the translation philosophy's preference for consistency
    of key terms unless context demands otherwise.
