theological_decisions:
- issue: Scope and force of Jesus' ethical commands in this saying
  chosen_reading: Render the commands straightforwardly as broad imperatives without
    softening or narrowing them by interpretation.
  alternative_readings:
  - Interpret as hyperbole and translate more loosely
  - Restrict to almsgiving only
  - Restrict the second clause to legal theft restitution contexts
  rationale: The Greek presents direct imperatives with universal language ('everyone
    who asks'; 'the one who takes away what is yours'). The translation should preserve
    the ethical tension and breadth of the saying rather than resolve debated application
    questions in the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
