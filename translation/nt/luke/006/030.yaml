id: LUK.6.30
reference: Luke 6:30
source:
  edition: SBLGNT
  text: ⸀παντὶ αἰτοῦντί σε δίδου, καὶ ἀπὸ τοῦ αἴροντος τὰ σὰ μὴ ἀπαίτει.
translation:
  text: Give to everyone who asks you, and from the one who takes away what is yours,
    do not demand it back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from whoever takes what is yours, do not ask for it back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παντὶ
  chosen: to everyone
  alternatives:
  - to each one
  - to anyone
  lexicon: BDAG
  rationale: Dative singular of πᾶς used distributively with the participle αἰτοῦντί;
    'to everyone' is natural English and preserves the broad, universal scope of the
    command.
- source_word: αἰτοῦντί
  chosen: who asks
  alternatives:
  - who requests
  - who begs
  lexicon: BDAG
  rationale: Present participle of αἰτέω denotes one making a request. 'Asks' is the
    most straightforward and idiomatic rendering here; 'begs' would over-specify social
    status not explicit in the verb.
- source_word: σε
  chosen: you
  rationale: Direct object of αἰτοῦντί, indicating the person being asked.
- source_word: δίδου
  chosen: Give
  alternatives:
  - keep giving
  - be giving
  lexicon: BDAG
  rationale: Present active imperative singular of δίδωμι. English simple imperative
    'Give' best conveys the command; the present tense may imply customary or ongoing
    action, but over-marking that in English would sound unnatural.
- source_word: ἀπὸ τοῦ αἴροντος
  chosen: from the one who takes away
  alternatives:
  - from the one who takes
  - from whoever takes away
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally. 'Takes away'
    captures αἴρω in a context of removal or seizure of possessions better than the
    bare 'takes,' while remaining broad enough not to force a legal category like
    theft.
- source_word: τὰ σὰ
  chosen: what is yours
  alternatives:
  - your things
  - your possessions
  - your property
  lexicon: BDAG
  rationale: Neuter plural article + possessive adjective, literally 'the things that
    are yours.' 'What is yours' is idiomatic and sufficiently broad, avoiding narrowing
    the referent to material goods only while still fitting the context of possessions.
- source_word: μὴ ἀπαίτει
  chosen: do not demand it back
  alternatives:
  - do not ask for it back
  - do not require it back
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. ἀπαιτέω can mean demand
    back, require, or claim back. 'Demand it back' best reflects the forceful sense
    of reclaiming what has been taken, while 'it' naturally refers to 'what is yours'
    in English.
