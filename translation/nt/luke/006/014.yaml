id: LUK.6.14
reference: Luke 6:14
source:
  edition: SBLGNT
  text: Σίμωνα ὃν καὶ ὠνόμασεν Πέτρον καὶ Ἀνδρέαν τὸν ἀδελφὸν αὐτοῦ ⸀καὶ Ἰάκωβον καὶ
    Ἰωάννην ⸁καὶ Φίλιππον καὶ Βαρθολομαῖον
translation:
  text: Simon, whom he also named Peter, and Andrew his brother, and James and John,
    and Philip and Bartholomew,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σίμωνα
  chosen: Simon
  alternatives:
  - Simeon
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Σίμων in the Gospel
    context is 'Simon.' 'Simeon' is possible as a transliteration but is not the conventional
    form for this apostle in Luke.
- source_word: ὃν καὶ ὠνόμασεν Πέτρον
  chosen: whom he also named Peter
  alternatives:
  - whom he also called Peter
  lexicon: BDAG
  rationale: ὀνομάζω commonly means 'to name' or 'to call by name.' 'Named' best reflects
    the act of assigning the name Peter, while 'called' is possible but slightly less
    precise in English for a naming action.
- source_word: Πέτρον
  chosen: Peter
  alternatives:
  - Petros
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Peter' is the established English form of Πέτρος.
- source_word: Ἀνδρέαν
  chosen: Andrew
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἀνδρέας.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - the brother of him
  lexicon: BDAG
  rationale: ἀδελφός here denotes a literal male sibling. 'His brother' is the natural
    and accurate English rendering; the more literal alternative is awkward and unnecessary.
- source_word: Ἰάκωβον
  chosen: James
  alternatives:
  - Jacob
  lexicon: BDAG
  rationale: Although Ἰάκωβος is historically related to 'Jacob,' the standard English
    New Testament name form is 'James,' and personal names are transliterated by standard
    conventions in context.
- source_word: Ἰωάννην
  chosen: John
  lexicon: BDAG
  rationale: Standard English transliteration of Ἰωάννης.
- source_word: Φίλιππον
  chosen: Philip
  lexicon: BDAG
  rationale: Standard English transliteration of Φίλιππος.
- source_word: Βαρθολομαῖον
  chosen: Bartholomew
  lexicon: BDAG
  rationale: Standard English transliteration of Βαρθολομαῖος.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: In this list καί functions primarily as the coordinating conjunction
    'and.' The earlier καί in ὃν καὶ ὠνόμασεν is retained as 'also' because it modifies
    the naming statement, while the repeated list conjunctions are rendered 'and'
    for straightforward coordination.
