theological_decisions:
- issue: Whether to harmonize Luke's wording with Matthew's more familiar 'turn the
    other cheek' phrasing
  chosen_reading: 'Retain Luke''s distinct wording: ''offer the other also'''
  alternative_readings:
  - turn the other cheek
  rationale: The Greek uses πάρεχε ('offer/present'), not a verb meaning 'turn.' Preserving
    Luke's wording avoids importing a parallel Gospel's phrasing and keeps the translation
    anchored in the source text.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
- issue: Whether the commands should be rendered as absolute legal prescriptions or
    as radical kingdom-ethic imperatives without added qualification
  chosen_reading: Translate the imperatives directly without interpretive softening
    or doctrinal qualification
  alternative_readings:
  - Add explanatory qualifiers about nonretaliation or hyperbole in the main text
  rationale: The verse presents direct second-person imperatives. The translation
    should preserve the force and tension of Jesus' teaching without resolving interpretive
    debates in the wording.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
