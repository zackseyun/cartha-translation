id: LUK.6.29
reference: Luke 6:29
source:
  edition: SBLGNT
  text: τῷ τύπτοντί σε ἐπὶ τὴν σιαγόνα πάρεχε καὶ τὴν ἄλλην, καὶ ἀπὸ τοῦ αἴροντός
    σου τὸ ἱμάτιον καὶ τὸν χιτῶνα μὴ κωλύσῃς.
translation:
  text: To the one who strikes you on the cheek, offer the other also; and from the
    one who takes away your cloak, do not withhold your tunic also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the jaw.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often reads 'turn the other also,' but the Greek here
      more literally says 'offer/present the other also.'
    reason: alternative_reading
  - marker: c
    text: The 'cloak' is the outer garment (ἱμάτιον); the 'tunic' is the inner garment
      (χιτών).
    reason: cultural_note
lexical_decisions:
- source_word: τῷ τύπτοντί
  chosen: to the one who strikes
  alternatives:
  - to the one striking
  - to him who hits
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    generically to a person characterized by the action. 'The one who strikes' is
    natural English and preserves the ongoing/generic force better than a more wooden
    'the one striking.'
- source_word: ἐπὶ τὴν σιαγόνα
  chosen: on the cheek
  alternatives:
  - on the jaw
  lexicon: BDAG
  rationale: σιαγών can denote jaw/cheek. In this idiomatic context of being struck,
    'cheek' is the established and most natural English equivalent, matching the sense
    of a facial blow without over-specifying anatomy.
- source_word: πάρεχε
  chosen: offer
  alternatives:
  - present
  - turn
  lexicon: BDAG
  rationale: παρέχω literally means provide/give/present. 'Offer' preserves the imperative
    of yielding the other cheek without importing the more interpretive verb 'turn'
    from Matt 5:39, since Luke's wording here is not στρέφω.
- source_word: καὶ τὴν ἄλλην
  chosen: the other also
  alternatives:
  - the other one too
  - the other
  lexicon: BDAG
  rationale: ἄλλην refers to the other cheek, and καί adds 'also.' Rendering both
    elements keeps the parallelism and emphasis of the Greek.
- source_word: ἀπὸ τοῦ αἴροντός σου
  chosen: from the one who takes away your
  alternatives:
  - from the one taking your
  - from the one who takes your
  lexicon: BDAG
  rationale: The preposition ἀπό with the articular participle yields 'from the one
    who takes away.' 'Takes away' reflects αἴρω's sense of removing or taking off/away,
    fitting the context of seizure better than a bare 'takes.'
- source_word: ἱμάτιον
  chosen: cloak
  alternatives:
  - outer garment
  - robe
  lexicon: BDAG
  rationale: ἱμάτιον commonly denotes the outer garment. 'Cloak' is concise, idiomatic,
    and preserves the distinction from χιτών as the inner garment.
- source_word: τὸν χιτῶνα
  chosen: your tunic
  alternatives:
  - your inner garment
  - your shirt
  lexicon: BDAG
  rationale: χιτών denotes the garment worn next to the skin, distinct from the outer
    cloak. 'Tunic' is the standard concise rendering that preserves the cultural distinction
    without flattening it into modern clothing categories.
- source_word: μὴ κωλύσῃς
  chosen: do not withhold
  alternatives:
  - do not hinder
  - do not refuse
  lexicon: BDAG
  rationale: κωλύω means hinder, prevent, forbid. In this context, where a person
    is taking garments, 'do not withhold' best conveys not resisting or refusing the
    additional garment, producing natural English while staying close to the sense.
