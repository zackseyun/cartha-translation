theological_decisions:
- issue: Nature of the warning to the rich
  chosen_reading: The verse is rendered as a direct woe against those who are rich,
    without softening it into a mere lament or importing a broader doctrinal explanation
    not stated in the text.
  alternative_readings:
  - Render οὐαί as a softer lament such as 'alas'
  - Expand the sense to 'rich in this age' or 'those who trust in riches'
  rationale: The Greek directly addresses 'you who are rich' and pronounces οὐαί upon
    them. The translation preserves the severity and directness of Jesus' saying while
    avoiding interpretive additions about the precise moral mechanism beyond what
    the verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Temporal force of ἀπέχετε
  chosen_reading: 'The main text keeps a present-oriented sense: ''you are receiving
    your comfort.'''
  alternative_readings:
  - '''you have received your comfort'''
  - '''you have received your consolation in full'''
  rationale: The present indicative naturally supports a present-state reading, though
    the verb can carry the idiomatic sense of receiving payment in full. To preserve
    the lexical tension without over-resolving it, the main text uses a readable present
    expression and the fuller idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§3, 5, 6
