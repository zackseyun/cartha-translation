id: LUK.6.24
reference: Luke 6:24
source:
  edition: SBLGNT
  text: πλὴν οὐαὶ ὑμῖν τοῖς πλουσίοις, ὅτι ἀπέχετε τὴν παράκλησιν ὑμῶν.
translation:
  text: But woe to you who are rich, because you are receiving your comfort.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have received your comfort in full.' The verb can carry the sense
      of receiving what is due in full.
    reason: lexical_alternative
  - marker: b
    text: Or, 'consolation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Introduces a strong contrast with the preceding beatitudes. 'But' is
    natural modern English and preserves the adversative force without sounding overly
    formal.
- source_word: οὐαὶ
  chosen: woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: '''Woe'' is the standard prophetic/judgment formula in English and best
    preserves the solemn denunciatory force of οὐαί. ''Alas'' is too weak and lament-like
    here.'
- source_word: ὑμῖν τοῖς πλουσίοις
  chosen: to you who are rich
  alternatives:
  - to you, the rich
  - to you rich people
  lexicon: BDAG
  rationale: The dative pronoun plus substantival adjective addresses a class directly.
    'To you who are rich' is idiomatic and preserves the direct second-person address
    better than the more compressed 'you, the rich' for contemporary readers.
- source_word: πλουσίοις
  chosen: rich
  alternatives:
  - wealthy
  lexicon: BDAG
  rationale: '''Rich'' is the most direct and natural equivalent. ''Wealthy'' is possible
    but slightly more formal and less idiomatic in this warning saying.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the woe. 'Because' makes the causal relation
    explicit in clear modern English; 'for' is possible but more traditional and slightly
    less transparent.
- source_word: ἀπέχετε
  chosen: are receiving
  alternatives:
  - have received in full
  - have your reward
  - are getting
  lexicon: BDAG
  rationale: ἀπέχω can mean 'receive in full' or 'have in full,' especially in contexts
    of recompense. In this present-tense saying, 'are receiving' preserves the verbal
    aspect and communicates that the rich presently possess their consolation. A more
    idiomatic but interpretive rendering like 'have received in full' is preserved
    in a footnote because it reflects the commercial nuance of the verb.
- source_word: παράκλησιν
  chosen: comfort
  alternatives:
  - consolation
  lexicon: BDAG
  rationale: παράκλησις can mean 'encouragement,' 'comfort,' or 'consolation.' In
    this context of present worldly satisfaction contrasted with eschatological reversal,
    'comfort' is accessible modern English while still conveying the sense of consolation.
    'Consolation' is viable and preserved in a footnote as a lexical alternative.
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: Simple possessive genitive modifying παράκλησιν; no expansion is needed.
