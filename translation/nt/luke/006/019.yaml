theological_decisions:
- issue: Nature of δύναμις proceeding from Jesus
  chosen_reading: Rendered as 'power was coming out from him' without further doctrinal
    expansion.
  alternative_readings:
  - power was going out from him
  - miraculous power was coming out from him
  rationale: The verse presents Jesus as the source of effective healing power. The
    translation preserves that claim directly but does not add explanatory theological
    language beyond the Greek. This aligns with the instruction not to import doctrinal
    claims the text does not make while remaining fully compatible with orthodox Christology.
  doctrine_reference: Affirmations; Translation philosophy sections 1 and 3
