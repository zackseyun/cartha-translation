id: LUK.6.19
reference: Luke 6:19
source:
  edition: SBLGNT
  text: καὶ πᾶς ὁ ὄχλος ⸀ἐζήτουν ἅπτεσθαι αὐτοῦ, ὅτι δύναμις παρ’ αὐτοῦ ἐξήρχετο καὶ
    ἰᾶτο πάντας.
translation:
  text: And the whole crowd was trying to touch him, because power was coming out
    from him and healing them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was going out from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire crowd
  lexicon: BDAG
  rationale: The singular collective noun ὄχλος with πᾶς is best rendered as a collective
    singular in English. 'The whole crowd' is natural modern English and preserves
    the sense that the entire assembled multitude was involved.
- source_word: ἐζήτουν
  chosen: was trying
  alternatives:
  - was seeking
  - kept trying
  - were trying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. Because the grammatical
    subject is the collective singular 'crowd,' singular English verbal agreement
    is used. 'Was trying' captures the imperfect well in idiomatic English; 'kept
    trying' is possible but slightly more interpretive.
- source_word: ἅπτεσθαι
  chosen: to touch
  alternatives:
  - to take hold of
  - to make contact with
  lexicon: BDAG
  rationale: In this healing context, ἅπτομαι commonly means 'touch' or 'take hold
    of.' 'Touch' is the standard and most natural rendering, especially given the
    crowd's desire for healing contact.
- source_word: δύναμις
  chosen: power
  alternatives:
  - miraculous power
  lexicon: BDAG
  rationale: δύναμις here refers to effective power proceeding from Jesus for healing.
    'Power' is sufficiently clear and avoids adding 'miraculous,' which is implied
    by context rather than explicitly stated.
- source_word: παρ’ αὐτοῦ ἐξήρχετο
  chosen: was coming out from him
  alternatives:
  - was going out from him
  - was proceeding from him
  lexicon: BDAG
  rationale: The imperfect middle/passive-form verb ἐξήρχετο with παρά conveys ongoing
    emanation from Jesus. 'Was coming out from him' is natural English and preserves
    the vivid sense of power issuing from him.
- source_word: ἰᾶτο
  chosen: was healing
  alternatives:
  - healed
  lexicon: BDAG
  rationale: The imperfect again suggests ongoing action. Rendering with the progressive
    'was healing' matches the aspect of the Greek and coordinates with 'was coming
    out.'
- source_word: πάντας
  chosen: them all
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: Although literally 'all,' the object refers to the people in the crowd
    affected by the healing power. 'Them all' makes the implied object explicit in
    natural English without changing the sense.
