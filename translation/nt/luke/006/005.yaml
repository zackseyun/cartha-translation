theological_decisions:
- issue: Christological force of Jesus' statement about the Sabbath
  chosen_reading: 'The clause is rendered as a direct assertion of the Son of Man''s
    lordship with respect to the Sabbath: ''The Son of Man is Lord of the Sabbath.'''
  alternative_readings:
  - The Son of Man is lord even of the Sabbath.
  rationale: The Greek word order foregrounds κύριος, but the core claim is Jesus'
    authority over the Sabbath. The translation preserves the strong christological
    claim without adding 'even,' which is interpretive and not explicit in this wording
    of Luke 6:5, though it appears in some English traditions influenced by parallels.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
