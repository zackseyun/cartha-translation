id: LUK.6.5
reference: Luke 6:5
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν ⸀αὐτοῖς· Κύριός ἐστιν ⸂τοῦ σαββάτου ὁ υἱὸς τοῦ ἀνθρώπου⸃.
translation:
  text: And he was saying to them, “The Son of Man is Lord of the Sabbath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The Son of Man is lord over the Sabbath.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative; 'was
    saying' preserves that aspect more transparently than the simple past 'said,'
    while remaining natural English.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. Here it
    functions as a christological title expressing authority, not merely polite address,
    so 'Lord' is the best fit.
- source_word: τοῦ σαββάτου
  chosen: of the Sabbath
  alternatives:
  - over the Sabbath
  - of the sabbath day
  lexicon: BDAG
  rationale: The genitive after κύριος is rendered straightforwardly as 'of the Sabbath.'
    This preserves the compact force of the Greek while clearly expressing authority
    with respect to the Sabbath. 'Sabbath' is capitalized as the recognized day/institution
    in context.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is the established and most transparent rendering of the idiomatic/self-referential
    title used by Jesus, preserving both its Semitic background and its possible allusion
    to Daniel 7. 'The Human One' is possible but loses intertextual continuity and
    traditional title recognition.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: A simple connective is sufficient. 'And' preserves the narrative flow
    without adding temporal nuance beyond the Greek.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to those men
  lexicon: BDAG
  rationale: The pronoun is dative plural and contextually refers to the interlocutors.
    'To them' is the direct and natural rendering without importing more specificity
    than the text states.
