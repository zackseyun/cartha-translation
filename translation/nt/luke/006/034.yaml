theological_decisions:
- issue: Sense of χάρις in Jesus' rhetorical question
  chosen_reading: Rendered as 'credit' in the sense of commendable favor or moral
    credit, not salvific grace.
  alternative_readings:
  - grace
  - thanks
  - benefit
  rationale: The immediate context repeats the question about what distinguishes the
    disciples' behavior from that of sinners. The point is commendable distinctiveness,
    not divine grace as a theological abstraction.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of the expected return in lending
  chosen_reading: Rendered neutrally as reciprocal repayment ('receive back the same
    amount') without implying interest or profit.
  alternative_readings:
  - receive usury
  - receive full repayment with gain
  rationale: The Greek states equivalence (τὰ ἴσα), indicating return in kind or amount.
    The translation avoids importing economic or ethical claims beyond the text.
  doctrine_reference: Translation philosophy §1, §3
