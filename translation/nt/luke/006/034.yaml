id: LUK.6.34
reference: Luke 6:34
source:
  edition: SBLGNT
  text: καὶ ἐὰν ⸀δανίσητε παρ’ ὧν ἐλπίζετε ⸀λαβεῖν, ποία ὑμῖν χάρις ἐστίν; ⸀καὶ ἁμαρτωλοὶ
    ἁμαρτωλοῖς δανίζουσιν ἵνα ἀπολάβωσιν τὰ ἴσα.
translation:
  text: And if you lend to those from whom you expect to receive, what credit is that
    to you? Even sinners lend to sinners so that they may receive back the same amount.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what thanks is that to you?' The Greek word can also mean 'thanks,'
      but here it likely refers to credit or favorable regard.
    reason: lexical_alternative
lexical_decisions:
- source_word: δανίσητε / δανίζουσιν
  chosen: lend
  alternatives:
  - loan
  lexicon: BDAG
  rationale: The verb denotes lending money or goods. 'Lend' is the natural modern
    English equivalent and preserves the financial sense without sounding technical.
- source_word: παρ’ ὧν
  chosen: to those from whom
  alternatives:
  - from those from whom
  - to those from whom you expect repayment
  lexicon: BDAG
  rationale: With δανείζω, παρά plus genitive marks the persons involved as those
    from whom a return is expected. In idiomatic English, lending is done 'to' someone,
    while the expected return comes 'from' them, so both relations are reflected.
- source_word: ἐλπίζετε λαβεῖν
  chosen: you expect to receive
  alternatives:
  - you hope to receive
  - you expect to get back
  lexicon: BDAG
  rationale: ἐλπίζω can mean 'hope' or 'expect.' In this context of reciprocal lending,
    'expect' better conveys anticipated return rather than mere wish. 'Receive' keeps
    the wording broad and close to the Greek.
- source_word: ποία ... χάρις ἐστίν
  chosen: what credit is that to you?
  alternatives:
  - what grace is that to you?
  - what benefit is that to you?
  - what thanks is that to you?
  lexicon: BDAG
  rationale: In this Lukan refrain, χάρις refers to favorable regard or credit rather
    than saving grace. 'Credit' best fits the rhetorical question about moral distinctiveness.
    'Thanks' is possible, but here the sense is not primarily gratitude expressed
    by others.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The adjective used substantivally is straightforwardly rendered 'sinners,'
    preserving the moral category used in Luke.
- source_word: ἵνα ἀπολάβωσιν
  chosen: so that they may receive back
  alternatives:
  - in order that they may get back
  - so that they may be repaid
  lexicon: BDAG
  rationale: ἀπολαμβάνω here carries the sense of receiving in return or getting back
    what was lent. 'Receive back' is clear and close to the Greek.
- source_word: τὰ ἴσα
  chosen: the same amount
  alternatives:
  - equal things
  - an equivalent amount
  lexicon: BDAG
  rationale: The phrase means an equivalent return, likely the principal amount lent.
    'The same amount' is idiomatic and communicates exact reciprocity without over-specifying
    interest.
