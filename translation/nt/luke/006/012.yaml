theological_decisions:
- issue: Rendering τοῦ θεοῦ in relation to Jesus' prayer
  chosen_reading: prayer to God
  alternative_readings:
  - God's prayer
  - the prayer of God
  rationale: The phrase describes Jesus directing prayer toward God, not possession
    or authorship. This preserves the plain sense of the Greek in context and avoids
    a misleading theological implication. It also coheres with historic Christology
    by presenting the incarnate Son as praying to the Father without importing extra
    doctrinal explanation into the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
