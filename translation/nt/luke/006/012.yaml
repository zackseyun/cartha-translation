id: LUK.6.12
reference: Luke 6:12
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν ταῖς ἡμέραις ταύταις ⸂ἐξελθεῖν αὐτὸν⸃ εἰς τὸ ὄρος προσεύξασθαι,
    καὶ ἦν διανυκτερεύων ἐν τῇ προσευχῇ τοῦ θεοῦ.
translation:
  text: Now it happened in those days that he went out to the mountain to pray, and
    he spent the whole night in prayer to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he continued through the night in prayer to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came about
  lexicon: BDAG
  rationale: A common Lukan narrative transition. 'Now it happened' preserves the
    event-introducing force without sounding overly wooden. 'δέ' is lightly represented
    by 'Now' rather than omitted entirely.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  chosen: in those days
  alternatives:
  - during those days
  - in these days
  lexicon: BDAG
  rationale: Idiomatic temporal expression. Although ταύταις is formally 'these,'
    English narrative style commonly renders the phrase as 'those days' when referring
    back to the surrounding period.
- source_word: ἐξελθεῖν αὐτὸν
  chosen: that he went out
  alternatives:
  - for him to go out
  - he departed
  lexicon: BDAG
  rationale: The infinitive with accusative after ἐγένετο is naturally rendered in
    English as a finite clause. 'Went out' preserves the motion sense of ἐξέρχομαι
    without overinterpreting destination beyond what follows.
- source_word: εἰς τὸ ὄρος
  chosen: to the mountain
  alternatives:
  - into the mountain region
  - to the hill
  lexicon: BDAG
  rationale: ὄρος is most directly 'mountain.' The article is retained as 'the mountain,'
    which may indicate a known elevated place in context, while avoiding unnecessary
    specificity.
- source_word: προσεύξασθαι
  chosen: to pray
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: 'Straightforward infinitive of purpose after motion: he went out to pray.'
- source_word: ἦν διανυκτερεύων
  chosen: he spent the whole night
  alternatives:
  - he continued through the night
  - he was staying up all night
  lexicon: BDAG
  rationale: The imperfect of εἰμί with present participle conveys ongoing action.
    'Spent the whole night' is idiomatic English that captures the durative sense
    of διανυκτερεύω ('pass the night, stay all night') in context.
- source_word: ἐν τῇ προσευχῇ τοῦ θεοῦ
  chosen: in prayer to God
  alternatives:
  - in the prayer of God
  - in God's prayer
  lexicon: BDAG
  rationale: 'The genitive τοῦ θεοῦ is best taken as objective/directional in idiomatic
    English: prayer directed to God. A more literal ''the prayer of God'' is awkward
    and misleading in English, potentially suggesting God''s own praying rather than
    Jesus praying to God.'
