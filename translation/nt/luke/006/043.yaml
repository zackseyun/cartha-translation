theological_decisions:
- issue: Moral/agricultural metaphor intensity
  chosen_reading: Render σαπρός as 'rotten' rather than 'bad' in both clauses
  alternative_readings:
  - bad
  - worthless
  rationale: The verse uses an agricultural image to support a moral point in context.
    'Rotten' preserves the concrete image and lets the moral implication arise from
    the metaphor rather than importing a more abstract evaluative term into the main
    text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms'
