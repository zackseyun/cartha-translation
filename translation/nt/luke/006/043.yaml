id: LUK.6.43
reference: Luke 6:43
source:
  edition: SBLGNT
  text: Οὐ γάρ ἐστιν δένδρον καλὸν ποιοῦν καρπὸν σαπρόν, οὐδὲ ⸀πάλιν δένδρον σαπρὸν
    ποιοῦν καρπὸν καλόν.
translation:
  text: For there is no good tree producing rotten fruit, nor again a rotten tree
    producing good fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bad fruit' / 'a bad tree.' The Greek σαπρός can mean spoiled, rotten,
      or bad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γάρ
  chosen: For there is no
  alternatives:
  - Indeed, there is no
  - Because there is no
  lexicon: BDAG
  rationale: γάρ is retained as explanatory/inferential, linking this saying to the
    preceding context; 'for' is the most natural concise English equivalent. Οὐ negates
    the existence statement.
- source_word: δένδρον
  chosen: tree
  alternatives:
  - tree/wood
  lexicon: BDAG
  rationale: The ordinary sense here is a fruit-bearing tree in a proverb-like image;
    'tree' is the clear natural rendering.
- source_word: καλὸν
  chosen: good
  alternatives:
  - sound
  - healthy
  - fine
  lexicon: BDAG
  rationale: καλός can mean good, fine, or sound. In this moral-illustrative context,
    'good' preserves both the agricultural and ethical resonance without over-interpreting.
- source_word: ποιοῦν
  chosen: producing
  alternatives:
  - bearing
  - making
  lexicon: BDAG
  rationale: ποιέω literally means 'doing/making,' but with καρπός in this context
    idiomatic English prefers 'producing' or 'bearing.' 'Producing' stays close to
    the participial force while remaining natural.
- source_word: καρπὸν
  chosen: fruit
  lexicon: BDAG
  rationale: Standard rendering in both literal agricultural and metaphorical moral
    contexts.
- source_word: σαπρόν
  chosen: rotten
  alternatives:
  - bad
  - decayed
  - worthless
  lexicon: BDAG
  rationale: σαπρός denotes something spoiled/rotten and, by extension, bad. 'Rotten'
    preserves the concrete agricultural image better than the more abstract 'bad.'
- source_word: οὐδὲ πάλιν
  chosen: nor again
  alternatives:
  - nor on the other hand
  - and again not
  - nor conversely
  lexicon: BDAG
  rationale: οὐδέ coordinates the second negative clause; πάλιν adds a sense of 'again'
    or 'on the other hand.' 'Nor again' is concise and reflects the Greek structure.
- source_word: δένδρον σαπρὸν
  chosen: a rotten tree
  alternatives:
  - a bad tree
  - a decayed tree
  lexicon: BDAG
  rationale: Using 'rotten' again maintains lexical consistency with σαπρόν in the
    first clause and keeps the imagery vivid.
- source_word: καρπὸν καλόν
  chosen: good fruit
  alternatives:
  - sound fruit
  - fine fruit
  lexicon: BDAG
  rationale: Mirrors the first clause and preserves the antithetical parallelism of
    the Greek.
