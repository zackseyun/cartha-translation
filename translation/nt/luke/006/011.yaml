theological_decisions:
- issue: Whether to render ἀνοίας in a way that psychologizes the opponents ('madness')
    or emphasizes moral irrationality
  chosen_reading: senseless rage
  alternative_readings:
  - madness
  - folly
  rationale: The verse depicts hostile opposition to Jesus after his healing on the
    Sabbath. Rendering ἄνοια as 'senseless rage' preserves the moral and emotional
    irrationality of their response without importing a modern clinical sense into
    'madness.' This is a lexical-contextual decision, not a doctrinal one, but it
    affects how the opposition to Jesus is understood.
