id: LUK.6.11
reference: Luke 6:11
source:
  edition: SBLGNT
  text: αὐτοὶ δὲ ἐπλήσθησαν ἀνοίας, καὶ διελάλουν πρὸς ἀλλήλους τί ἂν ποιήσαιεν τῷ
    Ἰησοῦ.
translation:
  text: But they were filled with senseless rage, and they discussed with one another
    what they might do to Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were filled with madness' or 'were filled with folly.' The Greek term
      can denote irrationality, foolishness, or a frenzied lack of sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek, contrasting these opponents with Jesus
    and the healed man in context. English can convey the sense adequately with 'they'
    after 'But'; 'they themselves' would be overly stiff here.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding scene, where Jesus acts rightly and
    publicly. 'But' best captures the adversative force in natural English.
- source_word: ἐπλήσθησαν ἀνοίας
  chosen: were filled with senseless rage
  alternatives:
  - were filled with madness
  - were filled with folly
  - were filled with fury
  lexicon: BDAG
  rationale: The passive idiom 'were filled with' should be preserved. ἄνοια denotes
    lack of sense, folly, or irrationality; in this hostile context it describes not
    mere intellectual foolishness but irrational, frenzied anger. 'Senseless rage'
    communicates both the semantic component of irrationality and the emotional force
    of the reaction better than the more clinical 'madness' or the weaker 'folly'.
- source_word: διελάλουν
  chosen: discussed
  alternatives:
  - were talking over
  - were conferring
  - were discussing
  lexicon: BDAG
  rationale: The imperfect indicates ongoing deliberation. 'Discussed' gives clear
    modern English for their back-and-forth consultation; the ongoing sense is supported
    by the surrounding syntax without requiring an awkward periphrastic form.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - to one another
  - among themselves
  lexicon: BDAG
  rationale: This reciprocal phrase indicates mutual conversation. 'With one another'
    is idiomatic with 'discussed' in English.
- source_word: τί ἂν ποιήσαιεν
  chosen: what they might do
  alternatives:
  - what they should do
  - what they could do
  lexicon: BDAG
  rationale: The combination of τί + ἄν + optative expresses deliberative potentiality
    in indirect discourse. 'What they might do' best reflects the tentative plotting
    sense without overstating obligation ('should') or mere ability ('could').
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - against Jesus
  lexicon: BDAG
  rationale: The dative after ποιέω here is naturally rendered 'do to Jesus,' indicating
    contemplated action directed toward him. 'Against Jesus' interprets the hostility
    more explicitly than the Greek states, so it is left implicit in the context.
