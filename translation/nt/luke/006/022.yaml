id: LUK.6.22
reference: Luke 6:22
source:
  edition: SBLGNT
  text: Μακάριοί ἐστε ὅταν μισήσωσιν ὑμᾶς οἱ ἄνθρωποι, καὶ ὅταν ἀφορίσωσιν ὑμᾶς καὶ
    ὀνειδίσωσιν καὶ ἐκβάλωσιν τὸ ὄνομα ὑμῶν ὡς πονηρὸν ἕνεκα τοῦ υἱοῦ τοῦ ἀνθρώπου·
translation:
  text: Blessed are you when people hate you, and when they exclude you and insult
    you and cast out your name as evil because of the Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reject your name as evil,' that is, publicly denounce or repudiate you
      as morally corrupt.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοί
  chosen: Blessed
  alternatives:
  - Fortunate
  - Happy
  lexicon: BDAG
  rationale: '''Blessed'' best preserves the beatitude register and covenantal/theological
    weight of μακάριος. ''Happy'' is too subjective and emotional; ''fortunate'' is
    too secular.'
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the subjunctives that follow, ὅταν marks an indefinite future circumstance.
    'When' is idiomatic in English and fits beatitude style; 'whenever' is possible
    but less natural here.
- source_word: μισήσωσιν
  chosen: hate
  alternatives:
  - detest
  lexicon: BDAG
  rationale: The verb denotes hostility or hatred. 'Hate' is the plain and strongest
    natural English equivalent and matches the force of the persecution context.
- source_word: οἱ ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although grammatically masculine, ἄνθρωποι here is generic for human
    beings in society at large, not specifically males. 'People' accurately conveys
    the representative sense in natural English while honoring the gender-accurate
    principle.
- source_word: ἀφορίσωσιν
  chosen: exclude
  alternatives:
  - separate
  - ostracize
  lexicon: BDAG
  rationale: In this social-persecution context, the sense is exclusion from communal
    association. 'Exclude' is clear and natural; 'separate' is too wooden, and 'ostracize'
    is interpretive though related.
- source_word: ὀνειδίσωσιν
  chosen: insult
  alternatives:
  - reproach
  - revile
  lexicon: BDAG
  rationale: The verb refers to verbal abuse or reproach. 'Insult' is contemporary
    and accessible; 'revile' is stronger but more archaic in feel.
- source_word: ἐκβάλωσιν τὸ ὄνομα ὑμῶν
  chosen: cast out your name
  alternatives:
  - reject your name
  - denounce your name
  - cast out your reputation
  lexicon: BDAG
  rationale: The expression is somewhat idiomatic and likely refers to repudiating
    or treating the disciples' name/reputation as unacceptable. 'Cast out your name'
    preserves the metaphor more transparently than smoothing it away, while remaining
    understandable in context.
- source_word: ὡς πονηρὸν
  chosen: as evil
  alternatives:
  - as wicked
  - as something evil
  lexicon: BDAG
  rationale: ὡς introduces the characterization under which their name is cast out.
    'As evil' is concise and preserves the moral judgment implied by πονηρός.
- source_word: ἕνεκα
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: BDAG
  rationale: The preposition marks cause or reason. 'Because of' is the most natural
    modern English rendering here.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and established title. It should be translated,
    not paraphrased, preserving both its idiomatic force and intertextual resonance
    with Danielic and Gospel usage.
