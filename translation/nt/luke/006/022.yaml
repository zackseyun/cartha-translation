theological_decisions:
- issue: Rendering the idiom ἐκβάλωσιν τὸ ὄνομα ὑμῶν ὡς πονηρόν
  chosen_reading: Retain the concrete expression 'cast out your name as evil' in the
    main text.
  alternative_readings:
  - '''defame you as evil'''
  - '''reject your name as evil'''
  - '''cast out your reputation as evil'''
  rationale: The phrase likely refers to public repudiation, treating the disciples'
    name/reputation as morally corrupt. A more interpretive rendering could clarify
    the social sense, but the chosen wording preserves the Greek imagery and leaves
    the precise social mechanism appropriately open.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering οἱ ἄνθρωποι generically
  chosen_reading: Use 'people' rather than 'men.'
  alternative_readings:
  - men
  - human beings
  rationale: The referent is generic humanity, not specifically males. This follows
    the gender-accurate principle without flattening meaning.
  doctrine_reference: Translation philosophy §4
- issue: Rendering τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen_reading: Translate as the title 'the Son of Man.'
  alternative_readings:
  - the Human One
  rationale: The traditional translated title best preserves the Greek wording, Gospel
    usage, and likely allusive force, while avoiding an unnecessarily novel rendering.
  doctrine_reference: Translation philosophy §2, §5
