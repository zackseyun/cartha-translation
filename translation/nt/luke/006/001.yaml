id: LUK.6.1
reference: Luke 6:1
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν ⸀σαββάτῳ διαπορεύεσθαι αὐτὸν ⸀διὰ σπορίμων, καὶ ἔτιλλον οἱ μαθηταὶ
    αὐτοῦ ⸂καὶ ἤσθιον τοὺς στάχυας⸃ ψώχοντες ταῖς χερσίν.
translation:
  text: Now it happened on a Sabbath that he was passing through grainfields, and
    his disciples were plucking and eating the heads of grain, rubbing them in their
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ears of grain.' The Greek στάχυας refers to the heads or ears of grain.
    reason: lexical_alternative
  - marker: b
    text: That is, they rubbed the grain in their hands to separate the edible kernels.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came about
  lexicon: BDAG
  rationale: A common narrative transition in Luke. 'Now it happened' preserves the
    event-introducing force without sounding overly wooden.
- source_word: ἐν σαββάτῳ
  chosen: on a Sabbath
  alternatives:
  - on the Sabbath
  - on a sabbath day
  lexicon: BDAG
  rationale: 'The anarthrous dative naturally allows an indefinite sense here: one
    Sabbath occasion, not necessarily a specific previously identified Sabbath. ''On
    a Sabbath'' is both accurate and natural.'
- source_word: διαπορεύεσθαι αὐτὸν
  chosen: that he was passing through
  alternatives:
  - as he was going through
  - that he went through
  lexicon: BDAG
  rationale: The infinitive construction after ἐγένετο is idiomatically rendered with
    a finite clause in English. The imperfective sense of the middle infinitive is
    well conveyed by 'was passing through.'
- source_word: διὰ σπορίμων
  chosen: through grainfields
  alternatives:
  - through grainfields
  - through fields of grain
  - through standing grain
  lexicon: BDAG
  rationale: σπόριμος refers to sown fields/cultivated grainfields. 'Grainfields'
    is concise, natural English and avoids over-specifying the crop.
- source_word: ἔτιλλον
  chosen: were plucking
  alternatives:
  - began to pluck
  - plucked
  lexicon: BDAG
  rationale: The imperfect verb suggests ongoing action. 'Were plucking' preserves
    the progressive sense.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard natural rendering of the possessive construction.
- source_word: καὶ ἤσθιον
  chosen: and eating
  alternatives:
  - and were eating
  - and ate
  lexicon: BDAG
  rationale: Linked with the prior imperfect, this describes concurrent ongoing action.
    English coordinates smoothly with 'were plucking and eating.'
- source_word: τοὺς στάχυας
  chosen: the heads of grain
  alternatives:
  - the ears of grain
  - the grain heads
  lexicon: BDAG
  rationale: στάχυς denotes an ear/head of grain. 'Heads of grain' is clear in contemporary
    English; 'ears' may sound dated or regionally marked.
- source_word: ψώχοντες ταῖς χερσίν
  chosen: rubbing them in their hands
  alternatives:
  - rubbing them with their hands
  - shelling them with their hands
  lexicon: BDAG
  rationale: The participle explains how they prepared the grain for eating by rubbing
    it with the hands. 'Rubbing them in their hands' is idiomatic and preserves the
    concrete action.
