id: LUK.6.18
reference: Luke 6:18
source:
  edition: SBLGNT
  text: οἳ ἦλθον ἀκοῦσαι αὐτοῦ καὶ ἰαθῆναι ἀπὸ τῶν νόσων αὐτῶν· καὶ οἱ ⸂ἐνοχλούμενοι
    ἀπὸ⸃ πνευμάτων ⸀ἀκαθάρτων ἐθεραπεύοντο·
translation:
  text: who came to hear him and to be healed from their diseases; and those troubled
    by unclean spirits were being healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those afflicted by unclean spirits were healed.' The Greek participle
      can be rendered 'troubled,' 'afflicted,' or 'tormented' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  chosen: who
  alternatives:
  - those who
  lexicon: BDAG
  rationale: Relative pronoun linking back to the crowd described in the previous
    verse. 'Who' is the most natural continuation in English, while still preserving
    the relative connection.
- source_word: ἦλθον
  chosen: came
  alternatives:
  - had come
  lexicon: BDAG
  rationale: Aorist indicative of ἔρχομαι, straightforwardly rendered 'came.' English
    simple past fits the narrative sequence without adding unnecessary aspect.
- source_word: ἀκοῦσαι αὐτοῦ
  chosen: to hear him
  alternatives:
  - to listen to him
  lexicon: BDAG
  rationale: 'The aorist infinitive expresses purpose: they came in order to hear
    Jesus. ''Hear him'' is concise and idiomatic, and preserves the directness of
    the Greek.'
- source_word: ἰαθῆναι
  chosen: to be healed
  alternatives:
  - to be cured
  lexicon: BDAG
  rationale: Passive infinitive of ἰάομαι. 'To be healed' is the standard and most
    theologically and narratively fitting rendering in Gospel healing contexts.
- source_word: ἀπὸ τῶν νόσων αὐτῶν
  chosen: from their diseases
  alternatives:
  - of their diseases
  - from their sicknesses
  lexicon: BDAG
  rationale: ἀπό marks separation/source, so 'from' is preferable to the more idiomatic
    but less literal 'of.' νόσος denotes disease/sickness; 'diseases' preserves the
    concrete medical sense.
- source_word: ἐνοχλούμενοι
  chosen: troubled
  alternatives:
  - tormented
  - harassed
  - afflicted
  lexicon: BDAG
  rationale: Present passive participle meaning those being troubled or afflicted.
    'Troubled' is broad enough to reflect the term without overstating the intensity
    in every case; stronger alternatives are possible but not required by the word
    itself.
- source_word: ἀπὸ πνευμάτων ἀκαθάρτων
  chosen: by unclean spirits
  alternatives:
  - by impure spirits
  - from unclean spirits
  lexicon: BDAG
  rationale: The phrase identifies the source/cause of their affliction. 'Unclean
    spirits' is the standard Gospel expression and preserves the ritual-moral force
    of ἀκάθαρτος better than 'impure spirits.' 'By' communicates agency/cause naturally
    in English.
- source_word: ἐθεραπεύοντο
  chosen: were being healed
  alternatives:
  - were healed
  - were cured
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing or repeated action in the scene.
    'Were being healed' preserves the imperfective aspect better than simple 'were
    healed.' θεραπεύω overlaps with healing/care; in this context 'healed' is the
    clearest fit.
