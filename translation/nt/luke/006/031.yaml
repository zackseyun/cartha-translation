id: LUK.6.31
reference: Luke 6:31
source:
  edition: SBLGNT
  text: καὶ καθὼς θέλετε ἵνα ποιῶσιν ὑμῖν οἱ ⸀ἄνθρωποι, ποιεῖτε αὐτοῖς ὁμοίως.
translation:
  text: And just as you want people to do for you, do the same for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And as you wish that others would do for you, do likewise for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: Introduces the standard of comparison. 'Just as' is natural modern English
    and preserves the comparative force.
- source_word: θέλετε
  chosen: you want
  alternatives:
  - you desire
  - you wish
  lexicon: BDAG
  rationale: θέλω here expresses ordinary desire or preference. 'Want' is the most
    idiomatic contemporary equivalent without sounding overly formal.
- source_word: ἵνα
  chosen: to
  alternatives:
  - that
  - so that
  lexicon: BDAG
  rationale: With θέλετε and the following subjunctive, ἵνα expresses the content
    of what is desired. In English, an infinitival construction ('want people to do')
    is the most natural equivalent.
- source_word: ποιῶσιν
  chosen: do
  alternatives:
  - act
  - treat
  lexicon: BDAG
  rationale: ποιέω is broad and here refers to what others do toward someone. 'Do'
    keeps the wording general and mirrors the repeated verb later in the verse. 'Treat'
    is interpretive and narrower.
- source_word: οἱ ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι is generic here, referring to human beings generally rather
    than males specifically. 'People' best conveys the representative sense in natural
    English while remaining faithful to the source intent.
- source_word: ποιεῖτε
  chosen: do
  alternatives:
  - keep doing
  - act
  lexicon: BDAG
  rationale: Present imperative calls for ongoing ethical practice. English imperative
    'do' adequately conveys the command without awkwardly overtranslating aspect.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Given the parallel with ὑμῖν ('for you'), 'for them' preserves the reciprocal
    sense more clearly in English than the more ambiguous 'to them'.
- source_word: ὁμοίως
  chosen: the same
  alternatives:
  - likewise
  - in the same way
  lexicon: BDAG
  rationale: ὁμοίως marks corresponding action. 'Do the same' is idiomatic English
    and fits the reciprocal structure of the saying.
