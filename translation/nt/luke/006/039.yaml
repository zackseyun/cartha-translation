theological_decisions:
- issue: Gendered substantive τυφλός
  chosen_reading: a blind man ... a blind man
  alternative_readings:
  - a blind person ... a blind person
  - the blind ... the blind
  rationale: The Greek is grammatically masculine singular used generically in a proverbial
    statement. Following the translation philosophy's gender-accurate principle, the
    draft keeps 'man' rather than neutralizing the expression, while understanding
    the saying as generally applicable.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
