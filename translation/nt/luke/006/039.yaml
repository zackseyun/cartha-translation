id: LUK.6.39
reference: Luke 6:39
source:
  edition: SBLGNT
  text: Εἶπεν δὲ ⸀καὶ παραβολὴν αὐτοῖς· Μήτι δύναται τυφλὸς τυφλὸν ὁδηγεῖν; οὐχὶ ἀμφότεροι
    εἰς βόθυνον ⸀ἐμπεσοῦνται;
translation:
  text: 'And he also told them a parable: “Can a blind man guide a blind man? Will
    not both fall into a pit?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a blind person ... a blind person.” The Greek uses masculine singular
      forms with representative force.
    reason: lexical_alternative
  - marker: b
    text: Or “ditch” for “pit.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: 'Included to reflect the additive force after δὲ: Jesus not only spoke,
    but also gave them a parable. ''Also'' is natural English and preserves the connective
    nuance better than omitting it.'
- source_word: παραβολὴν
  chosen: parable
  alternatives:
  - illustration
  - figure
  lexicon: BDAG
  rationale: The standard Gospel sense is a figurative saying or illustrative comparison.
    'Parable' preserves the recognized genre and is sufficiently clear in modern English.
- source_word: Μήτι
  chosen: Can
  alternatives:
  - Surely ... cannot
  - Is it possible that
  lexicon: BDAG
  rationale: Μήτι introduces a question expecting a negative answer. English commonly
    conveys this with 'Can ... ?' in context, especially when followed by the explanatory
    second question. A more explicit negative form would be heavier than the Greek
    requires.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: '''Can'' is the natural concise rendering of ability in this rhetorical
    question.'
- source_word: τυφλὸς ... τυφλὸν
  chosen: a blind man ... a blind man
  alternatives:
  - the blind ... the blind
  - a blind person ... a blind person
  lexicon: BDAG
  rationale: The Greek uses masculine singular adjective substantivally. Per gender-accurate
    philosophy, 'man' matches the source form and representative force better than
    a neutral recasting. The indefinite article fits the proverbial sense.
- source_word: ὁδηγεῖν
  chosen: guide
  alternatives:
  - lead
  lexicon: BDAG
  rationale: Both are possible, but 'guide' better fits the image of one blind person
    directing another's path.
- source_word: οὐχὶ
  chosen: Will not
  alternatives:
  - Will they not
  - Surely
  lexicon: BDAG
  rationale: οὐχί marks a question expecting a positive answer. 'Will not' is idiomatic
    and preserves the rhetorical force.
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Simple and direct rendering of the dual idea.
- source_word: βόθυνον
  chosen: pit
  alternatives:
  - ditch
  - hole
  lexicon: BDAG
  rationale: βόθυνος denotes a pit or ditch. 'Pit' is broad, vivid, and idiomatic
    in English; 'ditch' is a viable alternative but narrower.
- source_word: ἐμπεσοῦνται
  chosen: fall into
  alternatives:
  - fall in
  - come to fall into
  lexicon: BDAG
  rationale: Future middle here is naturally rendered as simple future active in English.
    'Fall into' matches the preposition εἰς and reads smoothly.
