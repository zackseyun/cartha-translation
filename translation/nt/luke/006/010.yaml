id: LUK.6.10
reference: Luke 6:10
source:
  edition: SBLGNT
  text: καὶ περιβλεψάμενος πάντας αὐτοὺς εἶπεν αὐτῷ· Ἔκτεινον τὴν χεῖρά σου· ὁ δὲ
    ἐποίησεν, καὶ ἀπεκατεστάθη ἡ χεὶρ ⸀αὐτοῦ.
translation:
  text: And after looking around at them all, he said to him, “Stretch out your hand.”
    And he did so, and his hand was restored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his hand was healed.” The Greek more literally says “his hand was restored,”
      emphasizing return to proper condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  chosen: after looking around
  alternatives:
  - looking around
  - having looked around
  - glancing around
  lexicon: BDAG
  rationale: Aorist middle participle indicating Jesus surveyed those present before
    speaking. 'After looking around' preserves the participial sequence naturally
    in English without overformal stiffness.
- source_word: πάντας αὐτούς
  chosen: at them all
  alternatives:
  - all of them
  - everyone around him
  lexicon: BDAG
  rationale: The phrase emphasizes the totality of those present whom Jesus looked
    at. 'At them all' is idiomatic and keeps the direct object of the looking.
- source_word: εἶπεν αὐτῷ
  chosen: he said to him
  alternatives:
  - he told him
  lexicon: BDAG
  rationale: Standard rendering of λέγω with dative indirect object. 'Said to him'
    is slightly more formal and leaves the speech-act unembellished.
- source_word: Ἔκτεινον
  chosen: Stretch out
  alternatives:
  - Extend
  - Hold out
  lexicon: BDAG
  rationale: Aorist active imperative, direct command. 'Stretch out' is clear modern
    English and fits the physical action requested.
- source_word: τὴν χεῖρά σου
  chosen: your hand
  alternatives:
  - your arm
  lexicon: BDAG
  rationale: χείρ normally means 'hand' and should not be broadened to 'arm' here.
    The possessive is retained explicitly.
- source_word: ὁ δὲ ἐποίησεν
  chosen: And he did so
  alternatives:
  - But he did it
  - And he did it
  lexicon: BDAG
  rationale: ποιέω here refers back to the commanded action rather than a generic
    'made/did.' 'Did so' is natural English for obedient response. δέ is lightly connective
    here and can be rendered simply with 'And' in narrative flow.
- source_word: ἀπεκατεστάθη
  chosen: was restored
  alternatives:
  - was healed
  - was made whole
  lexicon: BDAG
  rationale: Passive form of ἀποκαθίστημι means 'was restored' or 'was returned to
    its former condition.' 'Was restored' preserves the lexical sense better than
    the more interpretive 'was healed.'
- source_word: ἡ χεὶρ αὐτοῦ
  chosen: his hand
  alternatives:
  - the hand of him
  lexicon: BDAG
  rationale: Natural English rendering of the subject with possessive pronoun. Repeating
    'hand' maintains the Greek's explicitness and highlights the miracle's result.
