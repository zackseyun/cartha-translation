theological_decisions:
- issue: Nature of the miracle expression in ἀπεκατεστάθη
  chosen_reading: rendered as restoration language rather than explicit healing language
  alternative_readings:
  - his hand was healed
  - his hand was made whole
  rationale: The Greek verb emphasizes restoration to proper condition. Using 'restored'
    avoids importing a more interpretive medical term while still clearly conveying
    the miracle.
  doctrine_reference: Translation philosophy §1, §5
