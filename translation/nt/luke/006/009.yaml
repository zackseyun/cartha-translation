theological_decisions:
- issue: Meaning of ψυχή in the phrase ψυχὴν σῶσαι ἢ ἀπολέσαι
  chosen_reading: Rendered concretely as “a life ... destroy it” rather than “a soul
    ... lose it.”
  alternative_readings:
  - to save a soul or destroy it
  - to save a person or destroy him
  rationale: The immediate Sabbath-healing context concerns preserving or harming
    human life, not making an explicit anthropological statement about the soul. This
    preserves the practical ethical force of Jesus’ question without importing later
    doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
