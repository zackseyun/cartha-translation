id: LUK.6.9
reference: Luke 6:9
source:
  edition: SBLGNT
  text: εἶπεν ⸀δὲ ὁ Ἰησοῦς πρὸς αὐτούς· ⸀Ἐπερωτῶ ὑμᾶς, ⸀εἰ ἔξεστιν ⸂τῷ σαββάτῳ⸃ ἀγαθοποιῆσαι
    ἢ κακοποιῆσαι, ψυχὴν σῶσαι ἢ ⸀ἀπολέσαι;
translation:
  text: But Jesus said to them, “I ask you, is it lawful on the Sabbath to do good
    or to do harm, to save a life or to destroy it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to do evil” for “to do harm.” The Greek sets up an ethical contrast
      between doing good and doing bad/harmful action.
    reason: lexical_alternative
  - marker: b
    text: Or “to save a soul or destroy it.” Here “life” is preferred because the
      context is the preservation or destruction of a person’s life.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as “But” to mark the mild contrast and transition in the narrative
    as Jesus responds to the situation and his opponents’ scrutiny.
- source_word: Ἐπερωτῶ
  chosen: I ask
  alternatives:
  - I ask you
  - I question
  lexicon: BDAG
  rationale: The verb introduces a direct challenge or question. “I ask” is natural
    modern English and preserves the force without sounding overly formal.
- source_word: εἰ ἔξεστιν
  chosen: is it lawful
  alternatives:
  - is it permitted
  - is it allowed
  lexicon: BDAG
  rationale: In Sabbath controversy context, ἔξεστιν concerns what is permitted under
    the law/custom, so “is it lawful” best preserves the legal-ethical force of the
    dispute.
- source_word: τῷ σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on the Sabbath day
  - during the Sabbath
  lexicon: BDAG
  rationale: Idiomatic English for the dative of time in this context is “on the Sabbath.”
    This preserves the specific covenantal day in view.
- source_word: ἀγαθοποιῆσαι
  chosen: to do good
  alternatives:
  - to do what is good
  - to benefit
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the verbal contrast with κακοποιῆσαι
    and keeps the ethical polarity explicit.
- source_word: κακοποιῆσαι
  chosen: to do harm
  alternatives:
  - to do evil
  - to do what is bad
  lexicon: BDAG
  rationale: “To do harm” fits the immediate contrast with healing and with the following
    “save/destroy” pair. “Do evil” is possible, but “do harm” better captures concrete
    injurious action in context.
- source_word: ψυχὴν
  chosen: a life
  alternatives:
  - a soul
  - a person
  - life
  lexicon: BDAG
  rationale: Here ψυχή in the collocation with σῶσαι/ἀπολέσαι refers to life or personhood
    in a concrete sense, not specifically the immaterial soul. “A life” is the clearest
    idiomatic rendering in English.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to preserve
  - to rescue
  lexicon: BDAG
  rationale: “To save” preserves the lexical connection with broader biblical usage
    while still fitting the immediate sense of preserving life.
- source_word: ἀπολέσαι
  chosen: to destroy it
  alternatives:
  - to destroy
  - to kill
  - to ruin it
  lexicon: BDAG
  rationale: Rendered “to destroy it” to mirror the object implied from ψυχήν and
    to preserve the strong antithesis with “to save.” “Kill” is interpretive and narrower
    than the Greek term.
