theological_decisions:
- issue: Gendered kinship term ἀδελφός in ethical instruction
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The Greek is masculine singular in both address and reference. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing, while recognizing
    the teaching's broader applicability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Metaphorical contrast κάρφος vs. δοκός
  chosen_reading: speck ... beam
  alternative_readings:
  - splinter ... plank
  - speck ... log
  rationale: The translation preserves the hyperbolic moral contrast without flattening
    the imagery. 'Beam' better reflects δοκός as a substantial timber, while 'speck'
    communicates the minuteness of κάρφος in accessible English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
