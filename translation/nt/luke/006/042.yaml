id: LUK.6.42
reference: Luke 6:42
source:
  edition: SBLGNT
  text: ⸀πῶς δύνασαι λέγειν τῷ ἀδελφῷ σου· Ἀδελφέ, ἄφες ἐκβάλω τὸ κάρφος τὸ ἐν τῷ
    ὀφθαλμῷ σου, αὐτὸς τὴν ἐν τῷ ὀφθαλμῷ σοῦ δοκὸν οὐ βλέπων; ὑποκριτά, ἔκβαλε πρῶτον
    τὴν δοκὸν ἐκ τοῦ ὀφθαλμοῦ σοῦ, καὶ τότε διαβλέψεις ⸂τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ
    τοῦ ἀδελφοῦ σου ἐκβαλεῖν⸃.
translation:
  text: How can you say to your brother, ‘Brother, let me take out the speck that
    is in your eye,’ while you yourself do not see the beam that is in your own eye?
    Hypocrite, first take the beam out of your own eye, and then you will see clearly
    to take out the speck that is in your brother’s eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “splinter” for “speck”; the Greek κάρφος denotes a very small bit of
      dry material.
    reason: lexical_alternative
  - marker: b
    text: Or “log” or “plank” for “beam”; the Greek δοκός refers to a large piece
      of timber.
    reason: lexical_alternative
  - marker: c
    text: “Brother” translates Greek ἀδελφός, a masculine singular kinship term; the
      instruction may apply more broadly, but the Greek wording is masculine.
    reason: cultural_note
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - How is it that
  lexicon: BDAG
  rationale: Introduces a rhetorical question challenging possibility/propriety; simple
    'How' is natural and sufficiently formal.
- source_word: δύνασαι
  chosen: can
  alternatives:
  - are you able to
  lexicon: BDAG
  rationale: Idiomatic English for δύναμαι in a rhetorical question; preserves the
    sense of capability/propriety without stiffness.
- source_word: λέγειν
  chosen: say
  alternatives:
  - tell
  lexicon: BDAG
  rationale: Direct speech verb is best rendered 'say' here; 'tell' would slightly
    over-specify the interpersonal force.
- source_word: ἀδελφῷ / Ἀδελφέ / ἀδελφοῦ
  chosen: brother / Brother / brother’s
  alternatives:
  - fellow believer
  - brother or sister
  lexicon: BDAG
  rationale: Gender-accurate rendering follows the masculine singular form and direct
    address. In context it may be representative, but the source text is singular
    masculine, so 'brother' is retained per translation philosophy.
- source_word: ἄφες
  chosen: let me
  alternatives:
  - allow me
  - permit me
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here functions idiomatically as a request
    for permission. 'Let me' is the most natural English equivalent.
- source_word: ἐκβάλω / ἔκβαλε / ἐκβαλεῖν
  chosen: take out / take out / to take out
  alternatives:
  - remove
  - cast out
  lexicon: BDAG
  rationale: Although ἐκβάλλω can be stronger ('cast out'), in the eye-metaphor 'take
    out' is idiomatic and fits the physical image. Consistency is maintained across
    the verse.
- source_word: κάρφος
  chosen: speck
  alternatives:
  - splinter
  - straw
  lexicon: BDAG
  rationale: Refers to a tiny particle in the eye. 'Speck' is clear modern English
    and preserves the contrast with δοκός. 'Splinter' is possible but may suggest
    a larger object.
- source_word: ὀφθαλμός
  chosen: eye
  lexicon: BDAG
  rationale: Standard literal rendering in this metaphorical saying.
- source_word: αὐτὸς
  chosen: you yourself
  alternatives:
  - you
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'you yourself' preserves the contrastive force
    between the addressee's criticism and self-blindness.
- source_word: δοκός
  chosen: beam
  alternatives:
  - log
  - plank
  lexicon: BDAG
  rationale: Refers to a large beam of wood. 'Beam' is a natural English equivalent
    and preserves the hyperbolic contrast with 'speck.' 'Log' is common in tradition,
    but 'beam' better reflects δοκός.
- source_word: οὐ βλέπων
  chosen: do not see
  alternatives:
  - not noticing
  - while not seeing
  lexicon: BDAG
  rationale: Present participle with negation expresses the ongoing failure to perceive.
    English finite verb 'do not see' is the most natural rendering in this rhetorical
    question.
- source_word: ὑποκριτά
  chosen: Hypocrite
  alternatives:
  - You hypocrite
  lexicon: BDAG
  rationale: Vocative singular direct rebuke. 'Hypocrite' is concise and forceful;
    English can omit the explicit pronoun without loss.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - before anything else
  lexicon: BDAG
  rationale: Marks proper sequence in moral correction; straightforward rendering.
- source_word: τότε
  chosen: then
  alternatives:
  - after that
  lexicon: BDAG
  rationale: Temporal/sequential marker paired with πρῶτον; 'then' preserves the logic.
- source_word: διαβλέψεις
  chosen: you will see clearly
  alternatives:
  - you will see
  - you will see through
  lexicon: BDAG
  rationale: The compound verb intensifies βλέπω, conveying clear sight after obstruction
    is removed. 'See clearly' captures this nuance better than plain 'see'.
