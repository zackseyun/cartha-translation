id: LUK.6.6
reference: Luke 6:6
source:
  edition: SBLGNT
  text: Ἐγένετο ⸀δὲ ἐν ἑτέρῳ σαββάτῳ εἰσελθεῖν αὐτὸν εἰς τὴν συναγωγὴν καὶ διδάσκειν·
    καὶ ἦν ⸂ἄνθρωπος ἐκεῖ⸃ καὶ ἡ χεὶρ αὐτοῦ ἡ δεξιὰ ἦν ξηρά·
translation:
  text: Now it happened on another Sabbath that he entered the synagogue and was teaching.
    And a man was there whose right hand was withered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shriveled.' The Greek adjective can describe something dried up or withered;
      in this context it refers to the man's disabled right hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came about
  lexicon: BDAG
  rationale: A common Lukan narrative transition. 'Now it happened' preserves the
    event-introducing force without sounding overly wooden. Including 'Now' reflects
    δέ as a mild discourse connector.
- source_word: ἐν ἑτέρῳ σαββάτῳ
  chosen: on another Sabbath
  alternatives:
  - on another sabbath day
  - on a different Sabbath
  lexicon: BDAG
  rationale: ἕτερος here marks another occasion of the same kind. 'On another Sabbath'
    is natural English and preserves the temporal setting.
- source_word: εἰσελθεῖν αὐτὸν εἰς τὴν συναγωγὴν
  chosen: that he entered the synagogue
  alternatives:
  - for him to enter the synagogue
  - that he went into the synagogue
  lexicon: BDAG
  rationale: The infinitive after ἐγένετο is idiomatic in Luke and is best rendered
    as a finite clause in English. 'Entered the synagogue' is slightly more formal
    and fits the narrative style.
- source_word: καὶ διδάσκειν
  chosen: and was teaching
  alternatives:
  - and taught
  - and teaching
  lexicon: BDAG
  rationale: The present infinitive carries imperfective aspect; 'was teaching' better
    reflects ongoing action than the simple past 'taught'.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is grammatically and contextually masculine, referring to a
    specific male individual. Per the translation philosophy, gender-accurate rendering
    is preferred.
- source_word: ἐκεῖ
  chosen: was there
  alternatives:
  - was present there
  - was there in that place
  lexicon: BDAG
  rationale: Natural English rendering of the existential clause καὶ ἦν ἄνθρωπος ἐκεῖ.
- source_word: ἡ χεὶρ αὐτοῦ ἡ δεξιὰ
  chosen: whose right hand
  alternatives:
  - and his right hand
  - his right hand
  lexicon: BDAG
  rationale: 'English idiom prefers restructuring the clause with a relative expression.
    The repeated article in Greek marks specificity: it was his right hand in particular.'
- source_word: ξηρά
  chosen: withered
  alternatives:
  - shrivelled
  - paralyzed
  - dry
  lexicon: BDAG
  rationale: In healing contexts ξηρός commonly describes a hand that is withered
    or shriveled. 'Withered' is standard, clear modern English and avoids the overly
    literal 'dry,' which could mislead readers.
