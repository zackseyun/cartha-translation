id: LUK.6.38
reference: Luke 6:38
source:
  edition: SBLGNT
  text: δίδοτε, καὶ δοθήσεται ὑμῖν· μέτρον καλὸν πεπιεσμένον ⸀σεσαλευμένον ὑπερεκχυννόμενον
    δώσουσιν εἰς τὸν κόλπον ὑμῶν· ⸂ᾧ γὰρ μέτρῳ⸃ μετρεῖτε ἀντιμετρηθήσεται ὑμῖν.
translation:
  text: 'Give, and it will be given to you: a good measure—pressed down, shaken together,
    overflowing—they will give into your lap. For with the measure by which you measure,
    it will be measured back to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'running over.' The image is of a container filled so fully that its
      contents spill over.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the fold of your garment.' 'Lap' refers to the front fold of a
      robe used to receive measured goods.
    reason: cultural_note
lexical_decisions:
- source_word: δίδοτε
  chosen: Give
  alternatives:
  - Keep giving
  lexicon: BDAG
  rationale: Present active imperative plural. English imperative 'Give' is natural
    and preserves the general exhortation without over-translating iterative force;
    'Keep giving' is possible but too explicit for the Greek aspect here.
- source_word: δοθήσεται ὑμῖν
  chosen: it will be given to you
  alternatives:
  - you will be given
  lexicon: BDAG
  rationale: Future passive of δίδωμι with dative pronoun. Rendering with impersonal
    'it' fits the implied object supplied by the following image of measure and avoids
    awkward English.
- source_word: μέτρον καλὸν
  chosen: a good measure
  alternatives:
  - a fine measure
  - a generous measure
  lexicon: BDAG
  rationale: μέτρον refers to a measured quantity or measuring container; 'measure'
    preserves the metaphor. καλός here conveys quality/fittingness; 'good' is broad
    and faithful, while 'generous' would import an interpretive nuance.
- source_word: πεπιεσμένον
  chosen: pressed down
  alternatives:
  - packed down
  - compressed
  lexicon: BDAG
  rationale: Perfect passive participle from πιέζω, describing grain or goods compacted
    to maximize quantity. 'Pressed down' is idiomatic and preserves the market-measure
    imagery.
- source_word: σεσαλευμένον
  chosen: shaken together
  alternatives:
  - shaken
  - settled by shaking
  lexicon: BDAG
  rationale: Perfect passive participle from σαλεύω. In context of a container of
    grain, the sense is shaking so contents settle. 'Shaken together' captures the
    idiomatic English expression familiar in measure imagery and reflects the contextual
    force.
- source_word: ὑπερεκχυννόμενον
  chosen: overflowing
  alternatives:
  - running over
  - pouring over
  lexicon: BDAG
  rationale: Present participle describing excess spilling out. 'Overflowing' is clear
    modern English and preserves the vivid abundance without adding colloquial color.
- source_word: δώσουσιν
  chosen: they will give
  alternatives:
  - it will be given
  - people will give
  lexicon: BDAG
  rationale: The Greek has an active third person plural with unspecified subject.
    'They will give' preserves the indefinite plural rather than smoothing it into
    a passive, and leaves the agent appropriately unstated.
- source_word: εἰς τὸν κόλπον ὑμῶν
  chosen: into your lap
  alternatives:
  - into your bosom
  - into the fold of your garment
  lexicon: BDAG
  rationale: κόλπος can denote bosom, lap, or the fold of a robe used to hold goods.
    'Into your lap' is the most natural modern equivalent while still evoking the
    receiving fold of one's garment; a footnote preserves the cultural nuance.
- source_word: ᾧ γὰρ μέτρῳ
  chosen: For with the measure by which
  alternatives:
  - For by whatever measure
  - Because with the measure that
  lexicon: BDAG
  rationale: Relative construction introducing a principle of reciprocity. 'With the
    measure by which' stays close to the Greek syntax and keeps the metaphor explicit.
- source_word: μετρεῖτε
  chosen: you measure
  alternatives:
  - you use to measure
  lexicon: BDAG
  rationale: Present active indicative. Simple 'you measure' is sufficient and keeps
    the saying concise.
- source_word: ἀντιμετρηθήσεται ὑμῖν
  chosen: it will be measured back to you
  alternatives:
  - it will be measured to you in return
  - it will be repaid to you by measure
  lexicon: BDAG
  rationale: Future passive of ἀντιμετρέω conveys reciprocal measuring in return.
    'Measured back to you' preserves the reciprocity signaled by ἀντί and reads naturally
    in English.
