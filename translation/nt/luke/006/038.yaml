theological_decisions:
- issue: Whether to make the saying specifically about money/almsgiving or leave it
    broader
  chosen_reading: Retain the broader language of giving and reciprocal measure without
    restricting it to financial generosity.
  alternative_readings:
  - Interpret as specifically almsgiving/material generosity
  - Interpret as a general principle covering mercy, generosity, and judgment
  rationale: The immediate context in Luke 6 includes mercy, non-judgment, forgiveness,
    and generosity. The verse's market-measure imagery supports abundance in return,
    but the Greek does not explicitly limit the command to money. The translation
    therefore preserves the broader exhortation and avoids importing a prosperity-oriented
    or narrowly financial reading.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
