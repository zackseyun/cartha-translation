id: LUK.6.47
reference: Luke 6:47
source:
  edition: SBLGNT
  text: πᾶς ὁ ἐρχόμενος πρός με καὶ ἀκούων μου τῶν λόγων καὶ ποιῶν αὐτούς, ὑποδείξω
    ὑμῖν τίνι ἐστὶν ὅμοιος·
translation:
  text: 'Everyone who comes to me and hears my words and does them—I will show you
    what he is like:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''to whom he is like''; idiomatic English: ''what he is like.'''
    reason: lexical_alternative
  - marker: b
    text: The Greek uses a masculine singular form generically ('he') to speak of
      any person who comes, hears, and does.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶς ὁ ἐρχόμενος
  chosen: Everyone who comes
  alternatives:
  - Whoever comes
  - Every one who comes
  lexicon: BDAG
  rationale: 'The articular participle with πᾶς functions generically: ''everyone
    who comes.'' ''Everyone'' is natural modern English while preserving the universal
    scope.'
- source_word: ἐρχόμενος πρός με
  chosen: comes to me
  alternatives:
  - is coming to me
  - comes toward me
  lexicon: BDAG
  rationale: 'Present participle in a generic construction is best rendered as a customary/general
    present in English. πρός with accusative here indicates movement toward Jesus:
    ''to me.'''
- source_word: ἀκούων μου τῶν λόγων
  chosen: hears my words
  alternatives:
  - hears the words from me
  - listens to my words
  lexicon: BDAG
  rationale: 'The genitive μου with τῶν λόγων is most naturally possessive/source-related
    in context: ''my words.'' ''Hears'' keeps the verbal parallelism with ''does''
    and avoids overinterpreting as mere attentive listening.'
- source_word: λόγων
  chosen: words
  alternatives:
  - sayings
  - message
  lexicon: BDAG
  rationale: λόγοι here refers to Jesus's spoken teachings. 'Words' is the most direct
    rendering; 'sayings' is possible but slightly more stylized.
- source_word: ποιῶν αὐτούς
  chosen: does them
  alternatives:
  - acts on them
  - puts them into practice
  lexicon: BDAG
  rationale: ποιέω with reference to words/commands means to do/obey them. 'Does them'
    preserves the concrete verbal repetition and prepares for the simile that follows.
    More idiomatic alternatives are possible but slightly more interpretive.
- source_word: ὑποδείξω ὑμῖν
  chosen: I will show you
  alternatives:
  - I will point out to you
  - I will explain to you
  lexicon: BDAG
  rationale: Future indicative introduces the comparison Jesus is about to make. 'Show'
    is clear and natural; 'point out' is possible but less smooth in context.
- source_word: τίνι ἐστὶν ὅμοιος
  chosen: what he is like
  alternatives:
  - to whom he is like
  - what sort of person he is like
  lexicon: BDAG
  rationale: Although τίνι is formally dative ('to whom'), idiomatic English expresses
    the comparison as 'what he is like.' This preserves the sense without awkward
    literalism.
- source_word: implicit masculine singular in participles / ὅμοιος
  chosen: he
  alternatives:
  - that person
  - they
  lexicon: N/A
  rationale: The Greek is grammatically masculine singular but generic. Per doctrine,
    gender-accurate translation is preferred over flattening to singular 'they.' 'He'
    preserves the representative singular force.
