id: LUK.6.49
reference: Luke 6:49
source:
  edition: SBLGNT
  text: ὁ δὲ ἀκούσας καὶ μὴ ποιήσας ὅμοιός ἐστιν ἀνθρώπῳ οἰκοδομήσαντι οἰκίαν ἐπὶ
    τὴν γῆν χωρὶς θεμελίου, ᾗ προσέρηξεν ὁ ποταμός, καὶ ⸂εὐθὺς συνέπεσεν⸃, καὶ ἐγένετο
    τὸ ῥῆγμα τῆς οἰκίας ἐκείνης μέγα.
translation:
  text: But the one who heard and did not act is like a man who built a house on the
    ground without a foundation. When the river burst against it, it immediately collapsed,
    and the ruin of that house was great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not do' or 'did not put them into practice.' The Greek verb is simply
      'do/make,' here referring to acting on Jesus' words.
    reason: lexical_alternative
  - marker: b
    text: Or 'the breach of that house was great.' The Greek term can refer to a break
      or ruin; 'ruin' is chosen for natural English in this context of collapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀκούσας
  chosen: But the one who heard
  alternatives:
  - But the man who heard
  - But he who heard
  lexicon: BDAG
  rationale: The articular aorist participle functions substantivally. 'The one who
    heard' is natural modern English and preserves the representative singular without
    over-specifying gender at this point.
- source_word: καὶ μὴ ποιήσας
  chosen: and did not act
  alternatives:
  - and did not do
  - and did not put them into practice
  lexicon: BDAG
  rationale: ποιέω here refers to doing Jesus' words. 'Did not act' is concise and
    idiomatic in English, preserving the contrast with hearing while avoiding an overly
    wooden 'did not do.' 'Put them into practice' is interpretive and longer than
    the Greek warrants in this verse.
- source_word: ὅμοιός ἐστιν
  chosen: is like
  alternatives:
  - is comparable to
  - is similar to
  lexicon: BDAG
  rationale: Standard simile language; 'is like' is the clearest and most natural
    rendering.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: Per the doctrine's gender-accurate principle, the singular ἀνθρώπῳ in
    this illustrative comparison is rendered 'a man,' matching the source's masculine
    representative form.
- source_word: οἰκοδομήσαντι οἰκίαν
  chosen: who built a house
  alternatives:
  - who had built a house
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered with simple past in
    English in this narrative comparison.
- source_word: ἐπὶ τὴν γῆν
  chosen: on the ground
  alternatives:
  - on the earth
  - on the soil
  lexicon: BDAG
  rationale: γῆ here refers to the surface/ground on which the house was built, not
    'earth' in a global sense. 'On the ground' is the plain contextual sense.
- source_word: χωρὶς θεμελίου
  chosen: without a foundation
  alternatives:
  - without foundation
  lexicon: BDAG
  rationale: English idiom normally includes the article. The phrase is central to
    the image and is rendered straightforwardly.
- source_word: ᾗ προσέρηξεν ὁ ποταμός
  chosen: When the river burst against it
  alternatives:
  - against which the river broke
  - when the stream burst against it
  - when the flood struck it
  lexicon: BDAG
  rationale: ᾗ refers back to the house. προσρήγνυμι conveys violent impact. ποταμός
    is more naturally 'river' than 'stream' here, especially in a destructive scene.
    'When' smooths the relative construction into natural English without loss of
    meaning.
- source_word: καὶ εὐθὺς συνέπεσεν
  chosen: it immediately collapsed
  alternatives:
  - and immediately it fell
  - and at once it collapsed
  lexicon: BDAG
  rationale: συμπίπτω here denotes collapse/falling in. 'Collapsed' best fits a house.
    εὐθύς is preserved with 'immediately.'
- source_word: καὶ ἐγένετο τὸ ῥῆγμα τῆς οἰκίας ἐκείνης μέγα
  chosen: and the ruin of that house was great
  alternatives:
  - and the breach of that house became great
  - and the crash of that house was great
  - and the destruction of that house was great
  lexicon: BDAG
  rationale: ῥῆγμα can denote a break, breach, or ruin resulting from collapse. In
    this context of a house falling, 'ruin' communicates the resulting devastation
    in clear modern English better than the more literal but less natural 'breach.'
    'Great' is retained rather than paraphrased as 'complete' or 'severe'.
