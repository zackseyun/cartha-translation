id: LUK.6.28
reference: Luke 6:28
source:
  edition: SBLGNT
  text: εὐλογεῖτε τοὺς καταρωμένους ⸀ὑμᾶς, προσεύχεσθε ⸀περὶ τῶν ἐπηρεαζόντων ὑμᾶς.
translation:
  text: Bless those who curse you; pray for those who mistreat you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for those who abuse you' or 'for those who insult you.' The Greek verb
      can cover a range of hostile mistreatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Speak well of
  - Invoke blessing on
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' is the natural and established
    English equivalent and preserves both the verbal force and the ethical contrast
    with cursing.
- source_word: καταρωμένους ὑμᾶς
  chosen: those who curse you
  alternatives:
  - those cursing you
  - those who call down curses on you
  lexicon: BDAG
  rationale: 'The participle with article functions substantivally: ''the ones cursing
    you.'' ''Those who curse you'' is idiomatic English and preserves the active hostile
    speech denoted by καταράομαι.'
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Present middle/passive imperative plural. English imperative 'pray' best
    conveys the command without awkward aspectual overtranslation; the present tense
    suggests ongoing disposition, but standard English imperative is sufficient here.
- source_word: περὶ τῶν ἐπηρεαζόντων ὑμᾶς
  chosen: for those who mistreat you
  alternatives:
  - concerning those who abuse you
  - for those who insult you
  - for those who spitefully use you
  lexicon: BDAG
  rationale: περί with προσεύχομαι commonly means 'pray for/concerning.' ἐπηρεάζω
    denotes abusive, insulting, or mistreating behavior. 'Mistreat' is broad enough
    to cover the semantic range in readable modern English without narrowing it only
    to verbal insult or preserving archaic tradition ('despitefully use').
