theological_decisions:
- issue: Scope of enemy-love commands
  chosen_reading: Render the commands straightforwardly as ethical imperatives without
    importing additional doctrinal explanation.
  rationale: The verse gives direct commands regarding response to hostility. No contested
    doctrinal term or ambiguity requires theological expansion; the translation should
    preserve the force and tension of the commands themselves.
  doctrine_reference: Translation philosophy §3
