theological_decisions:
- issue: Rendering of θεῖον in a judgment context
  chosen_reading: sulfur
  alternative_readings:
  - brimstone
  rationale: The traditional phrase 'fire and brimstone' is well known, but 'brimstone'
    is archaic in contemporary English. 'Sulfur' is the plain lexical sense and better
    fits the project's readability goals while preserving the judgment imagery.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
- issue: Rendering of οὐρανός
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: '''Heaven'' preserves the biblical idiom and the Genesis allusion. It
    does not add a doctrinal claim beyond the text, but it retains the narrative''s
    sense of judgment coming from above in scriptural language.'
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §6
