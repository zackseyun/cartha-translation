id: LUK.17.29
reference: Luke 17:29
source:
  edition: SBLGNT
  text: ᾗ δὲ ἡμέρᾳ ἐξῆλθεν Λὼτ ἀπὸ Σοδόμων, ἔβρεξεν πῦρ καὶ θεῖον ἀπ’ οὐρανοῦ καὶ
    ἀπώλεσεν ⸀πάντας.
translation:
  text: but on the day Lot went out from Sodom, fire and sulfur rained from heaven
    and destroyed them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'fire and brimstone rained from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾗ δὲ ἡμέρᾳ
  chosen: but on the day
  alternatives:
  - and on the day
  - on the very day
  lexicon: BDAG
  rationale: The relative dative phrase is temporal, meaning 'on the day when.' δέ
    is rendered 'but' to preserve the mild contrast/continuation from the preceding
    comparison, though English could also use 'and.'
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι is straightforwardly 'went out.' 'Went out' preserves
    the concrete movement better than the more interpretive 'left' or formal 'departed.'
- source_word: Λὼτ
  chosen: Lot
  rationale: Standard English transliteration of the personal name.
- source_word: ἀπὸ Σοδόμων
  chosen: from Sodom
  alternatives:
  - out of Sodom
  lexicon: BDAG
  rationale: Although the Greek form is plural in origin, the place name is idiomatically
    rendered in English as singular 'Sodom.' 'From Sodom' is natural and accurate.
- source_word: ἔβρεξεν
  chosen: rained
  alternatives:
  - caused to rain
  lexicon: BDAG
  rationale: βρέχω here is used impersonally with the accusative objects 'fire and
    sulfur'; English idiom is 'it rained' or simply 'fire and sulfur rained.' This
    preserves the allusion to Genesis 19:24 without adding an explicit subject not
    present in Greek.
- source_word: πῦρ καὶ θεῖον
  chosen: fire and sulfur
  alternatives:
  - fire and brimstone
  lexicon: BDAG
  rationale: θεῖον denotes sulfur. 'Fire and sulfur' is more lexically transparent
    and modern than the traditional but archaic 'fire and brimstone.'
- source_word: ἀπ’ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean sky or heaven, but 'from heaven' best fits the biblical
    idiom and the Genesis background, while preserving the sense of divine judgment
    without overexplaining it.
- source_word: ἀπώλεσεν πάντας
  chosen: destroyed them all
  alternatives:
  - destroyed all
  - destroyed everyone
  lexicon: BDAG
  rationale: ἀπόλλυμι here means 'destroy.' Because πάντας is masculine plural accusative
    with an implied human referent, 'them all' is idiomatic English and makes the
    object explicit. 'Everyone' is possible, but 'them all' better reflects the Greek's
    directness and the narrative context.
