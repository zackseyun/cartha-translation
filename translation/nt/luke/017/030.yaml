id: LUK.17.30
reference: Luke 17:30
source:
  edition: SBLGNT
  text: κατὰ ⸂τὰ αὐτὰ⸃ ἔσται ᾗ ἡμέρᾳ ὁ υἱὸς τοῦ ἀνθρώπου ἀποκαλύπτεται.
translation:
  text: It will be the same on the day when the Son of Man is revealed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Likewise' or 'In the same way.' The Greek idiom refers back to the preceding
      examples.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὰ αὐτά
  chosen: It will be the same
  alternatives:
  - Likewise
  - According to the same pattern
  - In the same way
  lexicon: BDAG
  rationale: The idiom κατὰ τὰ αὐτά refers back to the preceding examples and means
    'in the same way' or 'likewise.' 'It will be the same' fits natural English while
    preserving the comparative force and the future orientation created by ἔσται.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is straightforwardly rendered 'will be.' 'Shall'
    is unnecessarily archaic for the project's style.
- source_word: ᾗ ἡμέρᾳ
  chosen: on the day when
  alternatives:
  - in the day when
  - the day that
  lexicon: BDAG
  rationale: 'The relative dative with ἡμέρᾳ is temporal: ''on the day when.'' This
    is idiomatic modern English and preserves the temporal specificity.'
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels. It should
    be translated, not paraphrased, and retained in its traditional form because it
    carries apocalyptic and messianic resonance tied to Daniel 7.
- source_word: ἀποκαλύπτεται
  chosen: is revealed
  alternatives:
  - is disclosed
  - is unveiled
  - is made known
  lexicon: BDAG
  rationale: Present passive is best rendered 'is revealed.' In this eschatological
    context it refers to the public manifestation of the Son of Man. 'Revealed' preserves
    both the passive form and the theological weight without overinterpreting.
