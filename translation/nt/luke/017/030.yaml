theological_decisions:
- issue: Rendering the eschatological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional rendering best preserves the title's intertextual connection
    to Daniel 7 and its established Gospel usage. 'The Human One' is possible as an
    interpretive rendering, but it weakens the title's recognizable messianic and
    apocalyptic force in this context.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Force of ἀποκαλύπτεται in context
  chosen_reading: is revealed
  alternative_readings:
  - comes
  - appears
  rationale: The verb denotes revelation/unveiling rather than merely motion or arrival.
    Although the context is eschatological and overlaps conceptually with the Son
    of Man's coming, translating it as 'comes' would import a different lexical idea
    not present in the Greek.
  doctrine_reference: Translation philosophy §1; §3
