id: LUK.17.2
reference: Luke 17:2
source:
  edition: SBLGNT
  text: λυσιτελεῖ αὐτῷ εἰ ⸂λίθος μυλικὸς⸃ περίκειται περὶ τὸν τράχηλον αὐτοῦ καὶ ἔρριπται
    εἰς τὴν θάλασσαν ἢ ἵνα σκανδαλίσῃ ⸂τῶν μικρῶν τούτων ἕνα⸃.
translation:
  text: It would be better for him if a millstone were hung around his neck and he
    were thrown into the sea than that he should cause one of these little ones to
    stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, 'a large millstone.' The Greek phrase can refer to
      the heavier millstone used in a mill.
    reason: lexical_alternative
  - marker: b
    text: Or 'cause one of these little ones to sin.' The Greek verb includes the
      sense of causing someone to fall into sin or spiritual ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυσιτελεῖ
  chosen: it would be better
  alternatives:
  - it is more profitable
  - it is advantageous
  lexicon: BDAG
  rationale: Idiomatic expression meaning that a given outcome is preferable or better
    for someone; 'it would be better' is natural modern English and preserves the
    comparative force.
- source_word: λίθος μυλικὸς
  chosen: a millstone
  alternatives:
  - a stone of a mill
  - a millstone turned by a donkey
  lexicon: BDAG
  rationale: The phrase denotes a millstone. 'Millstone' is the standard concise English
    equivalent. The adjective μυλικός specifies relation to a mill; the more specific
    sense of a large millstone can be preserved in a footnote rather than overloading
    the main text.
- source_word: περίκειται περὶ τὸν τράχηλον αὐτοῦ
  chosen: were hung around his neck
  alternatives:
  - is placed around his neck
  - lies around his neck
  lexicon: BDAG
  rationale: 'Although the Greek uses a present middle/passive form, in this conditional
    construction English idiom is best expressed with a passive perfective sense:
    ''were hung around his neck.'' This communicates the resulting state clearly.'
- source_word: ἔρριπται εἰς τὴν θάλασσαν
  chosen: he were thrown into the sea
  alternatives:
  - he has been cast into the sea
  - he is thrown into the sea
  lexicon: BDAG
  rationale: The perfect/passive form emphasizes the completed act/result, but in
    English the paired conditional sequence reads most naturally as 'were hung ...
    and were thrown.' 'Sea' is the direct equivalent of θάλασσα.
- source_word: σκανδαλίσῃ
  chosen: should cause ... to stumble
  alternatives:
  - should cause ... to sin
  - should ensnare
  - should offend
  lexicon: BDAG
  rationale: σκανδαλίζω here means to cause someone to fall into sin or spiritual
    ruin. 'Cause to stumble' preserves the metaphor present in the Greek while remaining
    understandable in English. The more interpretive 'cause to sin' is preserved as
    an alternative in a footnote.
- source_word: τῶν μικρῶν τούτων ἕνα
  chosen: one of these little ones
  alternatives:
  - one of these small ones
  - one of these little children
  lexicon: BDAG
  rationale: The phrase is literally 'one of these little/small ones.' 'Little ones'
    is established, natural English and does not over-specify age; 'little children'
    would narrow the referent beyond what the Greek requires.
- source_word: ἢ ἵνα
  chosen: than that
  alternatives:
  - rather than that
  - than for
  lexicon: BDAG
  rationale: 'This construction sets a comparison: one outcome is better than another.
    ''Than that'' captures the comparative relationship smoothly in English.'
