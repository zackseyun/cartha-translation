theological_decisions:
- issue: Referent of 'these little ones'
  chosen_reading: Render generically as 'these little ones' without specifying children
    only or believers only.
  alternative_readings:
  - these children
  - these humble believers/disciples
  rationale: The immediate wording does not explicitly identify the group beyond 'these
    little ones.' A translation should preserve that breadth rather than resolve the
    interpretive question in favor of a narrower theological reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
