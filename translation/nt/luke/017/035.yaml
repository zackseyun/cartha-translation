id: LUK.17.35
reference: Luke 17:35
source:
  edition: SBLGNT
  text: ⸂ἔσονται δύο⸃ ἀλήθουσαι ἐπὶ τὸ αὐτό, ⸀ἡ μία παραλημφθήσεται ⸂ἡ δὲ⸃ ἑτέρα ⸀ἀφεθήσεται.
translation:
  text: There will be two women grinding together; one will be taken, but the other
    will be left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the same place.' The Greek expression can mean 'together' or 'at
      the same place.'
    reason: lexical_alternative
  - marker: b
    text: '''Will be taken'' does not by itself specify whether the taking is for
      salvation or for judgment; the Greek leaves that to the broader context.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσονται
  chosen: There will be
  alternatives:
  - will be
  lexicon: BDAG
  rationale: Future of εἰμί introducing the scene. 'There will be' is idiomatic English
    for the existential setup and preserves the future sense.
- source_word: δύο
  chosen: two women
  alternatives:
  - two
  lexicon: BDAG
  rationale: The numeral itself is simply 'two,' but the feminine plural participle
    ἀλήθουσαι specifies female referents. Supplying 'women' in English makes the gender
    explicit and natural.
- source_word: ἀλήθουσαι
  chosen: grinding
  alternatives:
  - grinding grain
  - milling
  lexicon: BDAG
  rationale: Present participle of ἀλήθω, referring to grinding, typically grain or
    meal. 'Grinding' is concise and natural; 'grain' is implied by the activity and
    need not be added in the main text.
- source_word: ἐπὶ τὸ αὐτό
  chosen: together
  alternatives:
  - at the same place
  - in the same place
  lexicon: BDAG
  rationale: This idiom means being in the same place or together. 'Together' is the
    most natural English rendering here and fits the domestic work scene.
- source_word: ἡ μία
  chosen: one
  alternatives:
  - the one
  lexicon: BDAG
  rationale: With the article and numeral, the phrase distinguishes one of the two.
    English idiom prefers simply 'one' in this contrastive construction.
- source_word: παραλημφθήσεται
  chosen: will be taken
  alternatives:
  - will be taken along
  - will be received
  lexicon: BDAG
  rationale: Future passive of παραλαμβάνω. In this eschatological context, 'will
    be taken' is the standard and sufficiently transparent rendering without over-interpreting
    whether the taking is for salvation or judgment.
- source_word: ἡ δὲ ἑτέρα
  chosen: but the other
  alternatives:
  - and the other
  - the other one
  lexicon: BDAG
  rationale: δέ marks contrast, and ἑτέρα distinguishes the second woman from the
    first. 'But the other' captures the contrast clearly.
- source_word: ἀφεθήσεται
  chosen: will be left
  alternatives:
  - will be left behind
  - will be abandoned
  lexicon: BDAG
  rationale: Future passive of ἀφίημι. In this context the sense is being left or
    left behind. 'Will be left' is the most direct rendering and avoids adding interpretive
    nuance beyond the Greek.
