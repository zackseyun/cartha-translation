theological_decisions:
- issue: Whether παραλημφθήσεται / ἀφεθήσεται should be rendered in a way that implies
    salvation for the one taken and judgment for the one left, or vice versa.
  chosen_reading: Use the formally transparent 'one will be taken, but the other will
    be left' without specifying the theological valence of either state.
  alternative_readings:
  - one will be taken in judgment, but the other spared
  - one will be taken to salvation, but the other left for judgment
  rationale: The verse itself states only the separation, not the full theological
    meaning of 'taken' and 'left.' In context interpreters dispute the valence, so
    the translation should preserve the tension rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
