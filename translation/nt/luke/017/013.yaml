theological_decisions:
- issue: Rendering of ἐπιστάτα as a title for Jesus
  chosen_reading: Master
  alternative_readings:
  - Lord
  rationale: The Greek term here is ἐπιστάτης, not κύριος. To render it 'Lord' would
    blur an important lexical distinction and potentially import stronger christological
    overtones than this specific word itself encodes. 'Master' preserves the respectful
    address and authority implied by the term while remaining faithful to the source
    wording.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; original-language
    primacy over translation tradition.'
