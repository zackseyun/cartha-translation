id: LUK.17.13
reference: Luke 17:13
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ἦραν φωνὴν λέγοντες· Ἰησοῦ ἐπιστάτα, ἐλέησον ἡμᾶς.
translation:
  text: And they raised their voices, saying, “Jesus, Master, have mercy on us!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “lifted up their voice.”
    reason: lexical_alternative
  - marker: b
    text: “Master” translates Greek epistata, a term of address meaning one in authority;
      it is not the usual word for “Lord” (kyrios).
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; simple coordination best reflects the narrative
    flow without adding temporal force.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis, but English normally does not require
    a reflexive-like rendering here. The emphasis is sufficiently carried by the clause
    as a whole.
- source_word: ἦραν φωνὴν
  chosen: raised their voices
  alternatives:
  - lifted up their voices
  - cried out
  lexicon: BDAG
  rationale: This is an idiomatic expression meaning to call out loudly. 'Raised their
    voices' preserves the imagery while using natural modern English. 'Cried out'
    is possible but compresses the underlying idiom more than necessary.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered as 'saying' after the idiom 'raised
    their voices,' preserving the Greek structure in readable English.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Vocative of the personal name Ἰησοῦς; standard English transliteration
    is appropriate under the translation policy to transliterate names.
- source_word: ἐπιστάτα
  chosen: Master
  alternatives:
  - chief
  - commander
  - overseer
  lexicon: BDAG
  rationale: In Luke, ἐπιστάτης is a form of address for Jesus conveying authority
    and leadership. 'Master' is the most idiomatic and contextually fitting English
    equivalent here, without importing the covenantal/theological associations of
    κύριος ('Lord').
- source_word: ἐλέησον
  chosen: have mercy
  alternatives:
  - show mercy
  - take pity
  lexicon: BDAG
  rationale: Aorist imperative requesting compassionate help. 'Have mercy' is the
    standard and theologically weighty English rendering, preserving both urgency
    and the plea for compassionate intervention.
- source_word: ἡμᾶς
  chosen: on us
  alternatives:
  - us
  lexicon: BDAG
  rationale: English idiom with 'have mercy' normally takes 'on us'; this makes explicit
    the object relation conveyed in Greek.
