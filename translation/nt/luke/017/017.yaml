id: LUK.17.17
reference: Luke 17:17
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν· ⸀Οὐχὶ οἱ δέκα ἐκαθαρίσθησαν; οἱ δὲ ἐννέα ποῦ;
translation:
  text: Then Jesus answered, “Were not the ten cleansed? But where are the nine?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Were not all ten made clean?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces speech with the
    idiomatic sense 'answered.' English does not require a more wooden participial
    construction ('answering'), so 'answered' is natural and accurate.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ marks narrative progression after the Samaritan's return and
    thanksgiving. 'Then' conveys the mild continuative force in readable English better
    than leaving it untranslated or using the overly contrastive 'but' at the sentence
    opening.
- source_word: εἶπεν
  chosen: Jesus answered
  alternatives:
  - Jesus said
  lexicon: BDAG
  rationale: Combined with ἀποκριθεὶς, εἶπεν is best rendered as part of the standard
    narrative formula 'answered ... said.' In English, 'Jesus answered' sufficiently
    carries the force without awkward redundancy.
- source_word: Οὐχὶ
  chosen: Were not
  alternatives:
  - Did not
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer. 'Were not'
    matches the passive verb that follows and preserves the rhetorical expectation.
- source_word: οἱ δέκα
  chosen: the ten
  alternatives:
  - all ten
  lexicon: BDAG
  rationale: The article plus numeral refers to the known group of ten lepers mentioned
    in context. 'The ten' is direct and sufficient; 'all ten' is interpretive emphasis
    not explicit in the Greek.
- source_word: ἐκαθαρίσθησαν
  chosen: were cleansed
  alternatives:
  - were made clean
  - were healed
  lexicon: BDAG
  rationale: Passive of καθαρίζω means 'to cleanse, make clean.' In this leprosy context
    it carries ritual and physical overtones. 'Were cleansed' preserves the lexical
    link to the preceding narrative and avoids reducing the term to mere physical
    healing.
- source_word: οἱ δὲ ἐννέα
  chosen: But where are the nine?
  alternatives:
  - And the nine—where are they?
  lexicon: BDAG
  rationale: The phrase sets the remaining group in contrast with the one who returned.
    Rendering δέ here as 'But' communicates the contrast naturally in English.
- source_word: ποῦ
  chosen: where are
  alternatives:
  - where are they
  lexicon: BDAG
  rationale: ποῦ asks location. English idiom supplies the copula. 'Where are the
    nine?' is concise and preserves the rhetorical force.
