theological_decisions:
- issue: Meaning of καθαρίζω in the healing of lepers
  chosen_reading: Rendered as 'cleansed' rather than 'healed'
  alternative_readings:
  - healed
  - made clean
  rationale: The Greek specifically uses καθαρίζω, which in leprosy contexts includes
    ceremonial cleanness as well as restoration from disease. 'Cleansed' preserves
    this biblical-theological nuance without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
