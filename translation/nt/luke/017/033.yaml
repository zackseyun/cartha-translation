id: LUK.17.33
reference: Luke 17:33
source:
  edition: SBLGNT
  text: ὃς ἐὰν ζητήσῃ τὴν ψυχὴν αὐτοῦ ⸀περιποιήσασθαι ἀπολέσει αὐτήν, ⸂ὃς δ’ ἂν⸃ ⸀ἀπολέσῃ
    ζῳογονήσει αὐτήν.
translation:
  text: Whoever seeks to preserve his life will lose it, but whoever loses it will
    keep it alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' for 'life' (ψυχή), though here the sense is likely one's life/self
      rather than the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'will preserve it alive' or traditionally 'will save it'; the Greek verb
      literally means 'will keep alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήσῃ
  chosen: seeks
  alternatives:
  - tries
  - desires
  lexicon: BDAG
  rationale: ζητέω here conveys purposeful effort or striving, not mere wishing. 'Seeks'
    preserves the volitional sense without overtranslating.
- source_word: ψυχὴν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this context of preserving or losing oneself in eschatological crisis,
    ψυχή refers to one's life rather than the immaterial soul. 'Life' best fits the
    parallel with losing and keeping alive.
- source_word: περιποιήσασθαι
  chosen: to preserve
  alternatives:
  - to keep
  - to save for oneself
  - to secure
  lexicon: BDAG
  rationale: The middle infinitive carries the sense of preserving or securing for
    oneself. 'Preserve' captures the self-protective nuance in idiomatic English.
- source_word: ἀπολέσει
  chosen: will lose
  alternatives:
  - will destroy
  - will forfeit
  lexicon: BDAG
  rationale: ἀπόλλυμι in this saying is the standard paradox of losing life in order
    to gain it. 'Will lose' is the most natural and contextually fitting rendering.
- source_word: ἀπολέσῃ
  chosen: loses
  alternatives:
  - destroys
  - gives up
  lexicon: BDAG
  rationale: The aorist subjunctive in the second clause mirrors the first and should
    be rendered consistently. 'Loses' preserves the paradoxical saying without interpretive
    expansion.
- source_word: ζῳογονήσει
  chosen: will keep it alive
  alternatives:
  - will preserve it alive
  - will make it live
  - will save it
  lexicon: BDAG
  rationale: ζῳογονέω literally means to keep alive or preserve alive. Rendering it
    as 'keep it alive' preserves the vivid verbal contrast with 'lose' and avoids
    flattening it into the more traditional but less transparent 'save.'
- source_word: ὃς ἐὰν ... ὃς δ’ ἂν
  chosen: Whoever ... but whoever
  alternatives:
  - Whoever ... and whoever
  - Anyone who ... but anyone who
  lexicon: Greek grammar
  rationale: The construction is generic and conditional. 'Whoever' is concise and
    natural; δέ is adversative here, so 'but whoever' marks the contrast.
- source_word: αὐτοῦ / αὐτήν
  chosen: his ... it
  alternatives:
  - his ... his life
  - one's ... it
  lexicon: Greek grammar
  rationale: The first possessive is masculine singular and generic, so 'his' follows
    the project's gender-accurate policy. The repeated object pronoun is rendered
    'it' to avoid awkward repetition while clearly referring back to 'life'.
