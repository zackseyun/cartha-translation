theological_decisions:
- issue: Meaning of ψυχή in Jesus' paradoxical saying
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: The immediate context concerns preserving oneself in the face of judgment
    and the paradox of losing life to truly keep it. Rendering ψυχή as 'soul' would
    suggest a narrower anthropological claim not required by the context. 'Life' preserves
    the saying's existential and discipleship force without importing a body/soul
    dichotomy.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Rendering of ζῳογονήσει
  chosen_reading: Rendered transparently as 'will keep it alive'
  alternative_readings:
  - will save it
  - will preserve it
  rationale: The Greek verb is not the usual 'save' verb and more literally denotes
    causing to live or keeping alive. A transparent rendering better reflects original-language
    primacy and preserves the verbal tension of the saying.
  doctrine_reference: Translation philosophy §§1, 5
