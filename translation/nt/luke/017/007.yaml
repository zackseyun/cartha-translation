id: LUK.17.7
reference: Luke 17:7
source:
  edition: SBLGNT
  text: Τίς δὲ ἐξ ὑμῶν δοῦλον ἔχων ἀροτριῶντα ἢ ποιμαίνοντα, ὃς εἰσελθόντι ἐκ τοῦ
    ἀγροῦ ἐρεῖ ⸀αὐτῷ· Εὐθέως παρελθὼν ἀνάπεσε,
translation:
  text: But which of you, having a slave plowing or shepherding, will say to him when
    he has come in from the field, ‘Come at once and recline at the table’?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' or 'bondservant' for 'slave' (Greek doulos).
    reason: alternative_reading
  - marker: b
    text: '''Recline at the table'' reflects the ancient custom of reclining for a
      meal; more loosely, ''sit down to eat.'''
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: The term denotes a bonded household laborer, not a hired worker. In this
    parabolic setting the master's authority over the worker is central, so 'slave'
    better preserves the social force than 'servant,' in line with the doctrine's
    context-dependent default for δοῦλος.
- source_word: ἀροτριῶντα
  chosen: plowing
  alternatives:
  - plowing a field
  - tilling
  lexicon: BDAG
  rationale: The participle refers specifically to plowing, an agricultural task.
    'Plowing' is the most direct and natural English equivalent.
- source_word: ποιμαίνοντα
  chosen: shepherding
  alternatives:
  - tending sheep
  - pasturing
  lexicon: BDAG
  rationale: The verb means to act as a shepherd or tend a flock. 'Shepherding' preserves
    the verbal form and keeps the pastoral imagery without over-specifying the animals.
- source_word: εἰσελθόντι ἐκ τοῦ ἀγροῦ
  chosen: when he has come in from the field
  alternatives:
  - when he comes in from the field
  - after coming in from the field
  lexicon: BDAG
  rationale: 'The dative participle is temporal with αὐτῷ after ἐρεῖ: the sense is
    ''to him when he comes in from the field.'' The perfect-like English ''has come
    in'' fits the completed action prior to the master''s speech.'
- source_word: ἐρεῖ αὐτῷ
  chosen: will say to him
  alternatives:
  - will tell him
  lexicon: BDAG
  rationale: Future λέγω is straightforwardly rendered 'will say.' 'Tell' is possible,
    but 'say to him' stays closer to the Greek and fits the rhetorical question.
- source_word: Εὐθέως
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: The adverb marks immediacy. 'At once' is idiomatic and suitably direct
    in this command context.
- source_word: παρελθὼν
  chosen: Come
  alternatives:
  - come here
  - come over
  - step forward
  lexicon: BDAG
  rationale: In this idiom with ἀνάπεσε, the participle functions as an attendant
    circumstance introducing the command to take one's place at table. Rendering it
    simply as 'Come' produces natural English while preserving the movement implied
    by the Greek.
- source_word: ἀνάπεσε
  chosen: recline at the table
  alternatives:
  - recline
  - sit down to eat
  - take your place at the table
  lexicon: BDAG
  rationale: The verb literally refers to reclining for a meal in ancient dining posture.
    'Recline at the table' preserves the historical sense better than merely 'sit
    down,' while remaining understandable.
