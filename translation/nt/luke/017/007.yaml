- issue: Rendering of δοῦλος in a parabolic household setting
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse depends on the asymmetrical master-slave relationship to make
    its point. Using 'slave' preserves that social and rhetorical force without importing
    later theological claims.
