id: LUK.17.31
reference: Luke 17:31
source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ἡμέρᾳ ὃς ἔσται ἐπὶ τοῦ δώματος καὶ τὰ σκεύη αὐτοῦ ἐν τῇ οἰκίᾳ,
    μὴ καταβάτω ἆραι αὐτά, καὶ ὁ ⸀ἐν ἀγρῷ ὁμοίως μὴ ἐπιστρεψάτω εἰς τὰ ὀπίσω.
translation:
  text: On that day, whoever is on the housetop, with his belongings in the house,
    must not go down to take them away; and likewise, the one in the field must not
    turn back to the things behind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'must not turn back for what was left behind.'
    reason: lexical_alternative
  - marker: b
    text: The 'housetop' refers to the flat roof of a house, which in that setting
      was commonly accessible and usable space.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: On that day
  alternatives:
  - In that day
  lexicon: BDAG
  rationale: Standard temporal idiom. 'On that day' is natural modern English while
    preserving the demonstrative emphasis of ἐκείνῃ.
- source_word: ὃς ἔσται
  chosen: whoever is
  alternatives:
  - who is
  - the one who will be
  lexicon: BDAG
  rationale: The relative pronoun with future εἰμί has a generalizing force in context.
    'Whoever is' communicates the representative sense idiomatically in English without
    overemphasizing futurity.
- source_word: ἐπὶ τοῦ δώματος
  chosen: on the housetop
  alternatives:
  - on the roof
  - on the rooftop
  lexicon: BDAG
  rationale: δώμα here refers to the flat roof area of a house used as accessible
    living space. 'Housetop' preserves the traditional and culturally specific sense
    better than the more generic 'roof'.
- source_word: τὰ σκεύη αὐτοῦ
  chosen: his belongings
  alternatives:
  - his goods
  - his possessions
  - his household items
  lexicon: BDAG
  rationale: σκεύη can denote goods, equipment, or possessions. In this warning context,
    'belongings' is clear, natural English and captures movable personal property
    without sounding overly technical.
- source_word: μὴ καταβάτω
  chosen: must not go down
  alternatives:
  - let him not go down
  - should not go down
  lexicon: BDAG
  rationale: Third-person imperative/prohibitive is best rendered as a strong prohibition
    in English. 'Must not' conveys the urgency of Jesus' instruction.
- source_word: ἆραι αὐτά
  chosen: to take them away
  alternatives:
  - to take them
  - to pick them up
  lexicon: BDAG
  rationale: αἴρω here means to take up/remove. 'Take them away' makes explicit the
    sense of retrieving possessions from the house in context.
- source_word: ὁ ἐν ἀγρῷ
  chosen: the one in the field
  alternatives:
  - whoever is in the field
  - the one out in the field
  lexicon: BDAG
  rationale: Substantival article plus prepositional phrase identifies a representative
    person. 'The one in the field' is concise and parallel to the first clause.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Connects the second prohibition to the first with formal parallelism.
    'Likewise' is concise and readable.
- source_word: μὴ ἐπιστρεψάτω
  chosen: must not turn back
  alternatives:
  - let him not return
  - should not turn back
  lexicon: BDAG
  rationale: ἐπιστρέφω here carries the sense of returning/backtracking. 'Turn back'
    fits the urgent flight context and pairs well with the following phrase.
- source_word: εἰς τὰ ὀπίσω
  chosen: to the things behind
  alternatives:
  - back
  - to what was left behind
  lexicon: BDAG
  rationale: Literally 'to the things behind/back.' Rather than flattening it entirely
    to an adverb, this rendering preserves the object-like force of τὰ ὀπίσω, implying
    what has been left behind. Because this is somewhat interpretive in English, a
    smoother alternative is preserved in a footnote.
