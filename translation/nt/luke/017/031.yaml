theological_decisions:
- issue: Eschatological urgency imagery
  chosen_reading: Retain the concrete commands about not descending or turning back
    as immediate, practical prohibitions rather than paraphrasing them into a generalized
    call to detachment.
  alternative_readings:
  - Render more dynamically as a general warning not to cling to possessions
  rationale: The verse uses vivid situational imagery tied to 'that day.' Preserving
    the concrete scene maintains the text's urgency and avoids importing a broader
    moralizing paraphrase beyond what the Greek states.
  doctrine_reference: Translation philosophy items 1 and 3
