id: LUK.17.15
reference: Luke 17:15
source:
  edition: SBLGNT
  text: εἷς δὲ ἐξ αὐτῶν, ἰδὼν ὅτι ἰάθη, ὑπέστρεψεν μετὰ φωνῆς μεγάλης δοξάζων τὸν
    θεόν,
translation:
  text: But one of them, seeing that he had been healed, returned, glorifying God
    with a loud voice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praising God.' The Greek verb can mean 'glorifying' or 'giving praise/glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δὲ ἐξ αὐτῶν
  chosen: But one of them
  alternatives:
  - Now one of them
  - And one of them
  lexicon: BDAG
  rationale: εἷς ἐξ αὐτῶν is straightforwardly partitive, 'one of them.' δέ is mildly
    connective/adversative; 'But' fits the narrative contrast with the other nine
    while remaining natural English.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, contemporaneous or slightly antecedent to
    the main verb. 'Seeing' preserves the participial flow without over-specifying
    temporal sequence.
- source_word: ὅτι ἰάθη
  chosen: that he had been healed
  alternatives:
  - that he was healed
  - that he had been made well
  lexicon: BDAG
  rationale: ἰάθη is aorist passive of ἰάομαι, denoting healing. English past perfect
    ('had been healed') naturally conveys the completed healing perceived prior to
    his return. 'Healed' is more specific than the broader 'made well.'
- source_word: ὑπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: ὑποστρέφω in narrative commonly means 'return.' This is idiomatic English
    and matches the movement back to Jesus implied by the context.
- source_word: μετὰ φωνῆς μεγάλης
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: The idiom means speaking or crying out loudly. 'With a loud voice' is
    a close and natural rendering; 'great voice' would be overly literal and awkward
    in modern English.
- source_word: δοξάζων τὸν θεόν
  chosen: glorifying God
  alternatives:
  - praising God
  - giving glory to God
  lexicon: BDAG
  rationale: δοξάζω regularly means 'glorify' or 'give glory to.' 'Glorifying God'
    preserves the lexical connection to glory language and avoids flattening it to
    mere praise, though praise is included in the sense.
