id: LUK.17.20
reference: Luke 17:20
source:
  edition: SBLGNT
  text: Ἐπερωτηθεὶς δὲ ὑπὸ τῶν Φαρισαίων πότε ἔρχεται ἡ βασιλεία τοῦ θεοῦ ἀπεκρίθη
    αὐτοῖς καὶ εἶπεν· Οὐκ ἔρχεται ἡ βασιλεία τοῦ θεοῦ μετὰ παρατηρήσεως,
translation:
  text: Now when he was asked by the Pharisees when the kingdom of God is coming,
    he answered them and said, “The kingdom of God does not come with observable signs,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with observation,” “in a way that can be observed,” or “with careful
      watching.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπερωτηθεὶς
  chosen: when he was asked
  alternatives:
  - having been asked
  - being asked
  lexicon: BDAG
  rationale: Aorist passive participle introducing the circumstance prior to Jesus'
    reply. 'When he was asked' is natural English and preserves the passive sense
    without awkwardness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'Now' signals discourse movement in readable
    English without overstating sequence.
- source_word: ὑπὸ τῶν Φαρισαίων
  chosen: by the Pharisees
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency in the passive construction.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Direct temporal question; 'when' is the plain idiomatic rendering.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is to come
  lexicon: BDAG
  rationale: Present middle/passive indicative can be rendered as a present with future-oriented
    force. 'Is coming' fits the Pharisees' question about the arrival of God's kingdom.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering of the phrase; preserves the theological
    weight and recognizable NT expression.
- source_word: ἀπεκρίθη αὐτοῖς καὶ εἶπεν
  chosen: he answered them and said
  alternatives:
  - he answered them
  - he replied to them and said
  lexicon: BDAG
  rationale: The double verb is somewhat redundant in English but common in Greek
    narrative. Retaining both reflects the source text without sounding unnatural.
- source_word: Οὐκ ἔρχεται
  chosen: does not come
  alternatives:
  - is not coming
  lexicon: BDAG
  rationale: Gnomic/present statement about the manner of the kingdom's arrival. 'Does
    not come' is concise and idiomatic.
- source_word: μετὰ παρατηρήσεως
  chosen: with observable signs
  alternatives:
  - with observation
  - in a way that can be observed
  - with careful watching
  lexicon: BDAG
  rationale: παρατήρησις can denote observation, watching, or scrutiny. In context
    Jesus denies that the kingdom arrives in a manner detectable by outward signs
    to be monitored. 'With observable signs' communicates the sense clearly in modern
    English while avoiding the misleadingly vague traditional 'with observation.'
