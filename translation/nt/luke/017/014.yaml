theological_decisions:
- issue: Rendering of cleansing language in a leprosy-related context
  chosen_reading: they were cleansed
  alternative_readings:
  - they were healed
  - they were made clean
  rationale: The Greek emphasizes cleansing, which in this context carries both bodily
    restoration and restoration to ritual cleanness before the priests. Using 'cleansed'
    preserves that theological and cultural dimension without overexplaining in the
    main text.
  doctrine_reference: Translation philosophy §§1, 5, 6
