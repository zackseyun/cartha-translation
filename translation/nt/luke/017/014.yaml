id: LUK.17.14
reference: Luke 17:14
source:
  edition: SBLGNT
  text: καὶ ἰδὼν εἶπεν αὐτοῖς· Πορευθέντες ἐπιδείξατε ἑαυτοὺς τοῖς ἱερεῦσιν. καὶ ἐγένετο
    ἐν τῷ ὑπάγειν αὐτοὺς ἐκαθαρίσθησαν.
translation:
  text: And when he saw them, he said to them, “Go and show yourselves to the priests.”
    And as they were going, they were cleansed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they were made clean.” The Greek verb can denote cleansing in both a
      physical and ritual sense.
    reason: lexical_alternative
  - marker: b
    text: The instruction to show themselves to the priests reflects the priestly
      examination required for those healed of a skin disease; see Leviticus 14.
    reason: cross_reference
lexical_decisions:
- source_word: ἰδὼν
  chosen: when he saw them
  alternatives:
  - seeing
  - after he saw
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, coordinated with εἶπεν. English idiom is smoother
    with a temporal clause, and 'them' is supplied from context since αὐτοῖς follows
    immediately.
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - Having gone
  - As you go
  lexicon: BDAG
  rationale: Aorist participle used imperativally with the following imperative ἐπιδείξατε.
    In English, the natural command is 'Go and show yourselves,' preserving the sequence
    without awkward literalism.
- source_word: ἐπιδείξατε
  chosen: show yourselves
  alternatives:
  - present yourselves
  - display yourselves
  lexicon: BDAG
  rationale: In this context of priestly inspection for skin disease, 'show yourselves'
    is clear and idiomatic. 'Present yourselves' is possible but less direct for modern
    readers.
- source_word: ἱερεῦσιν
  chosen: the priests
  alternatives:
  - priests
  lexicon: BDAG
  rationale: The article is retained in natural English. The reference is to the priests
    who would examine and certify cleansing according to Torah practice.
- source_word: ἐγένετο ἐν τῷ ὑπάγειν αὐτοὺς
  chosen: as they were going
  alternatives:
  - while they were going
  - it happened as they went
  lexicon: BDAG
  rationale: This construction marks contemporaneous action. 'As they were going'
    is concise, natural English that preserves the sense that the cleansing occurred
    on the way.
- source_word: ἐκαθαρίσθησαν
  chosen: they were cleansed
  alternatives:
  - they were made clean
  - they were purified
  lexicon: BDAG
  rationale: Passive of καθαρίζω in a healing/purity context. 'Cleansed' preserves
    both the physical healing and the ritual-purity dimension better than the flatter
    'healed'.
