theological_decisions:
- issue: Whether the verse should imply that the one taken is saved and the one left
    is judged, or vice versa
  chosen_reading: 'The main text remains neutral: ''one will be taken, and the other
    will be left.'''
  alternative_readings:
  - The one taken is taken to salvation/deliverance
  - The one taken is taken in judgment
  rationale: The Greek verbs themselves do not resolve the theological question in
    this verse alone. In keeping with the translation philosophy, the rendering preserves
    the tension rather than importing a specific eschatological scheme into the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
