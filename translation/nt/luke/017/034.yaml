id: LUK.17.34
reference: Luke 17:34
source:
  edition: SBLGNT
  text: λέγω ὑμῖν, ταύτῃ τῇ νυκτὶ ἔσονται δύο ἐπὶ κλίνης μιᾶς, ⸀ὁ εἷς παραλημφθήσεται
    καὶ ὁ ἕτερος ἀφεθήσεται·
translation:
  text: I tell you, on that night there will be two on one bed; one will be taken,
    and the other will be left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one will be taken along' for παραλημφθήσεται; the verb itself does not
      specify here whether the taking is for deliverance or for judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be left behind'; the shorter 'will be left' is used in the main
      text to avoid importing later eschatological associations not explicit in the
      Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard discourse formula. 'I tell you' is natural modern English
    while preserving the direct, emphatic address.
- source_word: ταύτῃ τῇ νυκτί
  chosen: on that night
  alternatives:
  - in that night
  - this night
  lexicon: BDAG
  rationale: The demonstrative with dative temporal expression points to a specific
    night in view. 'On that night' is idiomatic English and fits the eschatological
    context better than the less natural 'in that night.'
- source_word: ἔσονται δύο
  chosen: there will be two
  alternatives:
  - two will be
  lexicon: BDAG
  rationale: English existential phrasing is more natural here while preserving the
    future sense.
- source_word: ἐπὶ κλίνης μιᾶς
  chosen: on one bed
  alternatives:
  - in one bed
  - upon one couch
  lexicon: BDAG
  rationale: κλίνη can denote a bed or couch. In this nighttime context, 'bed' is
    the most natural and contextually appropriate rendering. 'On one bed' follows
    the Greek preposition ἐπί more closely than 'in one bed' while remaining idiomatic
    enough in English.
- source_word: ὁ εἷς
  chosen: one
  alternatives:
  - the one
  lexicon: BDAG
  rationale: 'The article plus numeral functions substantivally. English normally
    omits the article here: ''one ... the other.'''
- source_word: παραλημφθήσεται
  chosen: will be taken
  alternatives:
  - will be taken along
  - will be received
  lexicon: BDAG
  rationale: The passive future of παραλαμβάνω means 'to take along/with oneself.'
    'Will be taken' is the clearest concise rendering in English. Because the verb
    itself does not specify whether the taking is for salvation or judgment, the translation
    preserves that ambiguity rather than interpreting it.
- source_word: ὁ ἕτερος
  chosen: the other
  alternatives:
  - the second
  lexicon: BDAG
  rationale: ἕτερος contrasts one person with another distinct person. 'The other'
    is the natural English counterpart in this paired contrast.
- source_word: ἀφεθήσεται
  chosen: will be left
  alternatives:
  - will be left behind
  - will be abandoned
  - will be forgiven
  lexicon: BDAG
  rationale: Although ἀφίημι often means 'forgive' in other contexts, here in contrast
    with παραλημφθήσεται and with persons as the referents, the sense is 'leave' or
    'leave behind.' 'Will be left' is concise and avoids adding interpretive weight
    that 'left behind' may carry in modern eschatological usage.
