id: LUK.17.37
reference: Luke 17:37
source:
  edition: SBLGNT
  text: καὶ ἀποκριθέντες λέγουσιν αὐτῷ· Ποῦ, κύριε; ὁ δὲ εἶπεν αὐτοῖς· Ὅπου τὸ σῶμα,
    ἐκεῖ ⸂καὶ οἱ ἀετοὶ ἐπισυναχθήσονται⸃.
translation:
  text: And answering, they say to him, “Where, Lord?” And he said to them, “Where
    the body is, there also the vultures will be gathered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “eagles.” The Greek word can denote eagles, but in this context of birds
      gathering around a body, “vultures” likely conveys the sense more clearly.
    reason: lexical_alternative
  - marker: b
    text: “Body” could also be rendered “corpse,” making the image of carrion birds
      more explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  chosen: answering
  alternatives:
  - in reply
  - responding
  lexicon: BDAG
  rationale: A participial form introducing the disciples' response. 'Answering' preserves
    the Greek structure and is natural enough in English when followed by 'they say.'
- source_word: λέγουσιν
  chosen: they say
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Present tense in narrative is retained as a historical present for vividness,
    since Luke uses it here and English can bear it.
- source_word: Ποῦ
  chosen: Where
  alternatives:
  - Where to
  - In what place
  lexicon: BDAG
  rationale: The adverb asks for location. The concise 'Where?' best matches the Greek.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this address to
    Jesus, 'Lord' is the most natural and contextually fitting title.
- source_word: Ὅπου
  chosen: Where
  alternatives:
  - Wherever
  lexicon: BDAG
  rationale: 'The construction is proverbial: ''Where the body is...'' ''Where'' is
    sufficiently general without adding the distributive nuance of ''wherever'' unless
    required.'
- source_word: σῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: σῶμα normally means 'body.' Although the context suggests a dead body/carcass,
    'body' preserves the Greek term more directly while allowing the ominous sense
    to emerge from the proverb.
- source_word: ἀετοὶ
  chosen: vultures
  alternatives:
  - eagles
  lexicon: BDAG
  rationale: Although the lexical form can denote 'eagles,' in a context of scavenging
    around a body the referent is more plausibly vultures or carrion birds. 'Vultures'
    best communicates the likely sense in contemporary English, while the traditional
    alternative is preserved in a footnote.
- source_word: ἐπισυναχθήσονται
  chosen: will be gathered
  alternatives:
  - will gather together
  - will assemble
  lexicon: BDAG
  rationale: Future passive form. 'Will be gathered' reflects the morphology closely
    and preserves the proverbial tone; English readers may also hear an impersonal/passive
    sense ('will gather') but the passive is retained here.
