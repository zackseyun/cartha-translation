theological_decisions:
- issue: Interpretation of the proverb about judgment imagery
  chosen_reading: Translate the imagery straightforwardly without specifying whether
    it refers to Roman armies, final judgment, or a general principle of inevitable
    exposure and judgment.
  alternative_readings:
  - Reference to carrion birds at a corpse as a general proverb
  - Allusion to eschatological judgment
  - Allusion to invading powers such as Rome
  rationale: The verse is metaphorical and interpretively contested, but the Greek
    itself does not identify the referent. Following the doctrine's instruction to
    preserve theological tension rather than resolve it, the translation leaves the
    image unexplained.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
