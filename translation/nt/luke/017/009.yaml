theological_decisions:
- issue: Rendering of δοῦλος in a parabolic/master-slave context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse's logic depends on the subordinate's obligated status under
    command. Using 'slave' preserves the asymmetry and avoids softening the social
    reality assumed by the parable. This is a lexical-theological choice governed
    by the project's contested-terms policy.
