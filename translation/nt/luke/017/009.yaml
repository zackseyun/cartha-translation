id: LUK.17.9
reference: Luke 17:9
source:
  edition: SBLGNT
  text: μὴ ⸂ἔχει χάριν⸃ τῷ ⸀δούλῳ ὅτι ἐποίησεν τὰ ⸀διαταχθέντα;
translation:
  text: Does he thank the slave because he did what was commanded?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' or 'bondservant' for 'slave' (Greek doulos).
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: Does ... ?
  alternatives:
  - Surely he does not ... ?
  - He does not ... , does he?
  lexicon: BDAG
  rationale: With the indicative verb, μή introduces a question expecting a negative
    answer. In idiomatic English, this is best conveyed by a simple interrogative
    whose context implies 'no,' rather than by an awkwardly explicit negative tag.
- source_word: ἔχει χάριν
  chosen: thank
  alternatives:
  - have gratitude toward
  - show favor to
  - be grateful to
  lexicon: BDAG
  rationale: The idiom ἔχειν χάριν τινί means 'to feel/show gratitude, thank.' 'Thank'
    is the most natural concise English rendering here and fits the rhetorical question.
- source_word: δούλῳ
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος is rendered 'slave' where the bonded status
    is salient. In this parable the figure is under the master's authority and obligated
    to obey commands, so 'slave' best preserves the social and rhetorical force.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the reason for the supposed gratitude: the slave
    did what was commanded. ''Because'' is the clearest English connector.'
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - carried out
  - performed
  lexicon: BDAG
  rationale: ποιέω is broad and here refers to carrying out instructions. 'Did' is
    simple, natural, and sufficiently precise when paired with 'what was commanded.'
- source_word: τὰ διαταχθέντα
  chosen: what was commanded
  alternatives:
  - the things commanded
  - what he was ordered to do
  lexicon: BDAG
  rationale: 'The articular perfect passive participle functions substantivally: ''the
    things having been commanded.'' ''What was commanded'' is idiomatic English that
    preserves the passive sense without unnecessary stiffness.'
