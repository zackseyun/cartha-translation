theological_decisions:
- issue: Rendering the title τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a christological title in the Gospels, with likely
    allusion to Daniel 7. 'The Son of Man' preserves both the literal form and the
    canonical/theological resonance without flattening it into a generic expression.
  doctrine_reference: Translate titles; transliterate names. Preserve theological
    tension rather than resolve it.
