id: LUK.17.26
reference: Luke 17:26
source:
  edition: SBLGNT
  text: καὶ καθὼς ἐγένετο ἐν ταῖς ἡμέραις Νῶε, οὕτως ἔσται καὶ ἐν ταῖς ἡμέραις τοῦ
    υἱοῦ τοῦ ἀνθρώπου·
translation:
  text: And just as it happened in the days of Noah, so it will be also in the days
    of the Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Human One." The Greek title traditionally rendered "the Son of Man"
      likely echoes Daniel 7 and is retained here for its established messianic and
      apocalyptic resonance.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - just as
  lexicon: BDAG
  rationale: Introduces a comparison; 'just as' gives the emphatic comparative force
    more naturally than bare 'as' in English.
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it was
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: γίνομαι here refers to what took place in Noah's time. 'It happened'
    is idiomatic modern English and preserves the eventive sense without archaic 'came
    to pass.'
- source_word: ἐν ταῖς ἡμέραις Νῶε
  chosen: in the days of Noah
  alternatives:
  - during Noah's days
  lexicon: BDAG
  rationale: This is a standard temporal idiom. 'In the days of Noah' is both natural
    and close to the Greek structure.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: BDAG
  rationale: Marks the apodosis of the comparison. 'So' is concise and natural in
    English, especially paired with 'just as.'
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it will happen
  - it will come about
  lexicon: BDAG
  rationale: Future existential/copular sense. 'It will be' mirrors the Greek closely
    and avoids adding interpretive nuance beyond the comparison.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  - —
  lexicon: BDAG
  rationale: 'The second καί intensifies/extends the comparison: ''so it will be also.''
    Retaining ''also'' reflects the Greek emphasis, though English could omit it.'
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation and a recognized title with
    Danielic resonance. Per translation philosophy, titles are translated; 'the Son
    of Man' preserves the wording and theological associations better than more interpretive
    alternatives.
