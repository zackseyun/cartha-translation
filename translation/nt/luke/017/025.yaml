id: LUK.17.25
reference: Luke 17:25
source:
  edition: SBLGNT
  text: πρῶτον δὲ δεῖ αὐτὸν πολλὰ παθεῖν καὶ ἀποδοκιμασθῆναι ἀπὸ τῆς γενεᾶς ταύτης.
translation:
  text: But first he must suffer many things and be rejected by this generation.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Adverbial accusative marking temporal priority. 'First' is concise and
    natural in English, preserving the sequence before the events just discussed.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks a mild contrast or transition with what precedes. 'But'
    best reflects the adversative nuance in context.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is necessary for him to
  lexicon: BDAG
  rationale: δεῖ expresses necessity, often with divine or salvific overtones in Luke.
    'Must' is the standard concise rendering and preserves the force without overexpanding.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: Although formally accusative as the subject of the infinitives with δεῖ,
    idiomatic English requires nominative 'he' in the finite clause 'he must suffer.'
- source_word: πολλὰ
  chosen: many things
  alternatives:
  - much
  - many
  lexicon: BDAG
  rationale: Neuter plural object of παθεῖν. 'Many things' preserves the breadth and
    concreteness of the coming sufferings better than the more abstract 'much.'
- source_word: παθεῖν
  chosen: suffer
  alternatives:
  - undergo suffering
  lexicon: BDAG
  rationale: Aorist infinitive of πάσχω. 'Suffer' is the direct and natural equivalent,
    preserving both brevity and gravity.
- source_word: ἀποδοκιμασθῆναι
  chosen: be rejected
  alternatives:
  - be repudiated
  - be disapproved
  lexicon: BDAG
  rationale: The verb conveys rejection after evaluation/testing. 'Be rejected' is
    the clearest idiomatic English rendering in this context and matches common NT
    usage without sounding technical.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  chosen: by this generation
  alternatives:
  - from this generation
  lexicon: BDAG
  rationale: Although ἀπό commonly means 'from,' with a passive verb it can mark personal
    agency or source. English idiom strongly favors 'by this generation' to express
    who rejects him. 'This generation' retains the temporal-contemporary reference
    of γενεά in Luke.
