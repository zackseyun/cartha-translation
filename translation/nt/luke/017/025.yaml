theological_decisions:
- issue: Force of δεῖ in relation to the Son of Man's suffering
  chosen_reading: Rendered as 'must' to preserve necessity without explicitly specifying
    divine decree in the translation.
  alternative_readings:
  - '''it is necessary'''
  - interpreting the necessity explicitly as fulfillment of God's plan
  rationale: Luke frequently uses δεῖ for events that occur in accordance with divine
    purpose, especially in passion predictions. The translation preserves that theological
    weight implicitly through 'must' without importing an explanatory gloss not stated
    in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
