theological_decisions:
- issue: Whether to include 'against you' after 'sins'
  chosen_reading: Omit 'against you' from the main text
  alternative_readings:
  - If your brother sins against you, rebuke him...
  rationale: The provided Greek text reads simply ἐὰν ἁμάρτῃ ὁ ἀδελφός σου, without
    εἰς σέ or equivalent. To preserve original-language primacy and avoid importing
    a harmonized or traditional expansion, the main text keeps the broader 'sins.'
    The common longer reading is preserved in a footnote as a textual variant.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gender rendering of ἀδελφός
  chosen_reading: your brother
  alternative_readings:
  - your brother or sister
  - your fellow believer
  rationale: The Greek is masculine singular. Per doctrine, gender-accurate rendering
    is preferred. Because the referent may be representative within the disciple community,
    an inclusive explanatory footnote is appropriate without altering the main text.
  doctrine_reference: Translation philosophy §4
