id: LUK.17.3
reference: Luke 17:3
source:
  edition: SBLGNT
  text: προσέχετε ἑαυτοῖς. ἐὰν ⸀ἁμάρτῃ ὁ ἀδελφός σου ἐπιτίμησον αὐτῷ, καὶ ἐὰν μετανοήσῃ
    ἄφες αὐτῷ·
translation:
  text: Pay attention to yourselves. If your brother sins, rebuke him, and if he repents,
    forgive him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'If your brother sins against you, rebuke him.'
    reason: textual_variant
  - marker: b
    text: '''Brother'' is masculine singular in Greek and may refer more broadly to
      a fellow disciple.'
    reason: cultural_note
lexical_decisions:
- source_word: προσέχετε
  chosen: Pay attention
  alternatives:
  - Watch out
  - Be on guard
  lexicon: BDAG
  rationale: Present imperative calling for ongoing vigilance. 'Pay attention' is
    natural modern English and preserves the warning force without sounding overly
    idiomatic.
- source_word: ἑαυτοῖς
  chosen: to yourselves
  alternatives:
  - to yourselves
  - to yourselves/among yourselves
  lexicon: BDAG
  rationale: Dative reflexive pronoun linked with προσέχετε. 'To yourselves' preserves
    the reflexive sense and leaves open both personal self-watchfulness and communal
    mutual awareness.
- source_word: ἁμάρτῃ
  chosen: sins
  alternatives:
  - sins against you
  - does wrong
  lexicon: BDAG
  rationale: The shorter SBLGNT reading lacks an explicit object such as 'against
    you.' Therefore the translation should not import that limitation into the main
    text. 'Sins' is the plain and sufficiently broad rendering.
- source_word: ἀδελφός σου
  chosen: your brother
  alternatives:
  - your brother or sister
  - your fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In context it likely refers to a fellow
    disciple, but 'your brother' best matches the source wording; inclusivity can
    be noted in a footnote.
- source_word: ἐπιτίμησον
  chosen: rebuke
  alternatives:
  - warn
  - correct
  lexicon: BDAG
  rationale: Aorist imperative calling for direct verbal correction. 'Rebuke' best
    captures the force of ἐπιτιμάω here without softening it to mere advice.
- source_word: μετανοήσῃ
  chosen: repents
  alternatives:
  - changes his mind
  - turns back
  lexicon: BDAG
  rationale: Standard rendering for μετανοέω in moral/spiritual context. 'Repents'
    preserves the ethical and relational dimension relevant to forgiveness.
- source_word: ἄφες
  chosen: forgive
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: In interpersonal context ἀφίημι commonly means forgive. 'Forgive' is
    the clearest and most idiomatic English equivalent here.
