id: LUK.17.12
reference: Luke 17:12
source:
  edition: SBLGNT
  text: καὶ εἰσερχομένου αὐτοῦ εἴς τινα κώμην ⸀ἀπήντησαν δέκα λεπροὶ ἄνδρες, οἳ ⸀ἔστησαν
    πόρρωθεν,
translation:
  text: And as he was entering a certain village, ten leprous men met him, who stood
    at a distance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten men with leprosy.' The Greek says 'ten leprous men,' using an adjectival
      description rather than a modern medical label.
    reason: lexical_alternative
  - marker: b
    text: Or 'far off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχομένου αὐτοῦ
  chosen: as he was entering
  alternatives:
  - while he was entering
  - when he entered
  lexicon: BDAG
  rationale: The genitive absolute with present participle conveys contemporaneous
    action. 'As he was entering' preserves the ongoing sense better than the more
    punctiliar 'when he entered.'
- source_word: εἴς τινα κώμην
  chosen: a certain village
  alternatives:
  - a village
  - some village
  lexicon: BDAG
  rationale: τινα is indefinite but not empty; 'a certain village' reflects the Greek
    more closely than simply 'a village,' while remaining natural English.
- source_word: ἀπήντησαν
  chosen: met
  alternatives:
  - encountered
  - went to meet
  lexicon: BDAG
  rationale: ἀπαντάω commonly means 'meet' or 'go to meet.' Here 'met' is concise
    and idiomatic, without over-specifying motion beyond the context.
- source_word: δέκα λεπροὶ ἄνδρες
  chosen: ten leprous men
  alternatives:
  - ten men with leprosy
  - ten men who were lepers
  lexicon: BDAG
  rationale: λεπροί is an adjectival designation modifying ἄνδρες. 'Leprous men' is
    a direct rendering that preserves the Greek form and avoids importing modern medical
    precision beyond the text. The alternatives are possible and more person-first
    in English, but less formally aligned.
- source_word: οἳ ἔστησαν
  chosen: who stood
  alternatives:
  - and they stood
  - who stopped
  lexicon: BDAG
  rationale: The relative clause naturally modifies 'ten leprous men.' 'Who stood'
    preserves the syntax and the simple force of ἵστημι here.
- source_word: πόρρωθεν
  chosen: at a distance
  alternatives:
  - far off
  - from afar
  lexicon: BDAG
  rationale: '''At a distance'' is clear modern English and captures the spatial separation
    implied by πόρρωθεν. ''Far off'' is traditional and viable, but slightly less
    contemporary.'
