theological_decisions:
- issue: Rendering of disease designation λεπροί
  chosen_reading: leprous men
  alternative_readings:
  - men with leprosy
  - men who were lepers
  rationale: This verse does not require resolving a doctrinal dispute, but the term
    can be over-modernized if rendered as a precise medical diagnosis. The chosen
    wording preserves the ancient descriptive category without importing claims the
    text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not paraphrase'
