theological_decisions:
- issue: Form of the warning/allusion
  chosen_reading: 'A concise imperative preserving Jesus''s direct appeal to the Genesis
    narrative: ''Remember Lot''s wife.'''
  alternative_readings:
  - Remember the wife of Lot.
  rationale: The verse is an allusive warning grounded in Genesis 19:26. No doctrinally
    contested term is present; the main decision is whether to preserve a more literal
    genitive construction or use natural English possessive style. The latter best
    fits optimal equivalence while retaining the theological force of the warning.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate names
    by transliteration, preserve the source''s plain sense.'
