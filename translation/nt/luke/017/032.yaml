id: LUK.17.32
reference: Luke 17:32
source:
  edition: SBLGNT
  text: μνημονεύετε τῆς γυναικὸς Λώτ.
translation:
  text: Remember Lot's wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Remember the wife of Lot.'
    reason: lexical_alternative
  - marker: b
    text: An allusion to Genesis 19:26, where Lot's wife looked back during the destruction
      of Sodom.
    reason: cross_reference
lexical_decisions:
- source_word: μνημονεύετε
  chosen: Remember
  alternatives:
  - Keep in mind
  - Recall
  lexicon: BDAG
  rationale: Present active imperative, second person plural. 'Remember' is the most
    natural and direct English imperative, preserving the force of an ongoing exhortation
    without awkwardly overtranslating the present aspect.
- source_word: τῆς γυναικὸς
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: 'γυνή can mean either ''woman'' or ''wife''; with the genitive of the
    proper name Λώτ, the relational sense ''wife'' is clearly intended: ''the wife
    of Lot.'' English idiom prefers the possessive construction ''Lot''s wife.'''
- source_word: Λώτ
  chosen: Lot
  rationale: Personal name transliterated according to standard English biblical convention,
    consistent with the translation philosophy to transliterate names.
