id: LUK.17.11
reference: Luke 17:11
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ ⸀πορεύεσθαι εἰς Ἰερουσαλὴμ καὶ αὐτὸς διήρχετο διὰ ⸀μέσον
    Σαμαρείας καὶ Γαλιλαίας.
translation:
  text: And it happened that, as he was going to Jerusalem, he was passing along between
    Samaria and Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was passing through the midst of Samaria and Galilee.' The Greek
      expression can be understood either as movement between the two regions or through
      the border area separating them.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Common Lukan narrative formula. 'It happened' preserves the event-introducing
    function in readable modern English without archaic tone.
- source_word: ἐν τῷ πορεύεσθαι
  chosen: as he was going
  alternatives:
  - while he was going
  - in the course of going
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous time. 'As
    he was going' is natural English and preserves the ongoing sense of the journey.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - toward Jerusalem
  lexicon: BDAG
  rationale: εἰς with a destination normally indicates movement toward/into a place.
    'To Jerusalem' is the standard and clear rendering.
- source_word: αὐτός
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and mildly emphatic, but English does
    not require 'he himself' here. Simple 'he' communicates the subject naturally
    without overemphasis.
- source_word: διήρχετο
  chosen: was passing along
  alternatives:
  - was passing through
  - was traveling
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing movement. 'Was passing along' preserves
    the progressive aspect and avoids overcommitting to 'through' in a way that could
    imply full traversal of both regions.
- source_word: διὰ μέσον
  chosen: between
  alternatives:
  - through the midst of
  - through the middle of
  lexicon: BDAG
  rationale: The idiom διὰ μέσον with two genitives can denote movement in the area
    between two regions. 'Between' is the most idiomatic English rendering here.
- source_word: Σαμαρείας καὶ Γαλιλαίας
  chosen: Samaria and Galilee
  alternatives:
  - Galilee and Samaria
  lexicon: BDAG
  rationale: Place names are transliterated per project philosophy. The Greek order
    is retained.
