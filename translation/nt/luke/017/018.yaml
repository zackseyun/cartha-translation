theological_decisions:
- issue: Ethnic/religious outsider status of the healed man
  chosen_reading: this foreigner
  alternative_readings:
  - this stranger
  - this man of another nation
  rationale: The verse emphasizes the irony that the only one who returned to honor
    God was the outsider, likely a Samaritan in context. 'Foreigner' preserves that
    social-religious contrast without importing extra polemic.
