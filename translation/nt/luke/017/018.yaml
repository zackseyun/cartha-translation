id: LUK.17.18
reference: Luke 17:18
source:
  edition: SBLGNT
  text: οὐχ εὑρέθησαν ὑποστρέψαντες δοῦναι δόξαν τῷ θεῷ εἰ μὴ ὁ ἀλλογενὴς οὗτος;
translation:
  text: Were none found to return and give glory to God except this foreigner?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this man of another nation' or 'this stranger'; the Greek term denotes
      a foreigner, an outsider to Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρέθησαν
  chosen: were found
  alternatives:
  - was there no one found
  - were there none found
  lexicon: BDAG
  rationale: 'Aorist passive of εὑρίσκω is rendered idiomatically in English as ''were
    found.'' In this rhetorical question, English naturally supplies the existential
    sense: ''Were none found...?'' preserving the passive nuance without awkwardness.'
- source_word: ὑποστρέψαντες
  chosen: to return
  alternatives:
  - having returned
  - turning back
  lexicon: BDAG
  rationale: The participle is attendant to the infinitive δοῦναι and expresses the
    action required before giving glory. 'To return' is smoother modern English than
    the more literal 'having returned' while preserving the sense.
- source_word: δοῦναι δόξαν
  chosen: give glory
  alternatives:
  - give praise
  - glorify
  lexicon: BDAG
  rationale: The idiom literally means 'to give glory.' This is a standard biblical
    expression and should be preserved rather than flattened to 'give praise,' though
    that is a near-contextual alternative.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - to the God
  lexicon: BDAG
  rationale: The article is naturally omitted in English before 'God' in this construction.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - if not
  - except for
  lexicon: BDAG
  rationale: In this exclusionary construction, εἰ μὴ is best rendered 'except,' which
    is concise and idiomatic.
- source_word: ἀλλογενής
  chosen: foreigner
  alternatives:
  - stranger
  - one of another nation
  - alien
  lexicon: BDAG
  rationale: ἀλλογενής denotes someone of another people, here highlighting that the
    grateful leper was not an Israelite. 'Foreigner' is clear modern English and preserves
    the ethnic/religious outsider sense better than 'stranger.'
- source_word: οὗτος
  chosen: this
  alternatives:
  - this one
  lexicon: BDAG
  rationale: 'The demonstrative adds emphasis: ''this foreigner.'' English can preserve
    the force without overtranslation.'
