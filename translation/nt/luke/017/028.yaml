id: LUK.17.28
reference: Luke 17:28
source:
  edition: SBLGNT
  text: ὁμοίως ⸀καθὼς ἐγένετο ἐν ταῖς ἡμέραις Λώτ· ἤσθιον, ἔπινον, ἠγόραζον, ἐπώλουν,
    ἐφύτευον, ᾠκοδόμουν·
translation:
  text: 'Likewise, just as it happened in the days of Lot: they were eating, drinking,
    buying, selling, planting, and building.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Similarly, as it was in the days of Lot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - Similarly
  lexicon: BDAG
  rationale: Adverb linking this example with the preceding comparison; 'Likewise'
    is concise and natural while preserving the comparative force.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces the manner/comparison clause. 'Just as' brings out the explicit
    comparison more clearly than the bare 'as'.
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it was
  - it came to pass
  - it took place
  lexicon: BDAG
  rationale: From γίνομαι in an eventive sense. 'It happened' is idiomatic modern
    English and fits the historical example without archaic tone.
- source_word: ἐν ταῖς ἡμέραις Λώτ
  chosen: in the days of Lot
  alternatives:
  - during Lot's days
  lexicon: BDAG
  rationale: Standard temporal idiom meaning the period associated with Lot. Retains
    the biblical phrasing and the transliterated personal name per house style.
- source_word: ἤσθιον
  chosen: they were eating
  alternatives:
  - they ate
  lexicon: BDAG
  rationale: Imperfect verb portrays ongoing customary activity. The progressive English
    form better reflects the durative/backgrounded aspect than a simple past.
- source_word: ἔπινον
  chosen: drinking
  alternatives:
  - they drank
  lexicon: BDAG
  rationale: Imperfect coordinated with the surrounding verbs, describing ordinary
    ongoing activity. Rendered progressively for aspectual consistency.
- source_word: ἠγόραζον
  chosen: buying
  alternatives:
  - they bought
  - they were purchasing
  lexicon: BDAG
  rationale: Imperfect of ἀγοράζω, denoting normal commercial activity. 'Buying' is
    the most natural modern gloss in this list.
- source_word: ἐπώλουν
  chosen: selling
  alternatives:
  - they sold
  lexicon: BDAG
  rationale: Imperfect of πωλέω, paired with 'buying' to depict routine marketplace
    life. Progressive participial-style sequence in English keeps the list flowing
    naturally.
- source_word: ἐφύτευον
  chosen: planting
  alternatives:
  - they planted
  lexicon: BDAG
  rationale: Imperfect of φυτεύω, referring to agricultural activity. 'Planting' matches
    the ongoing, ordinary-life emphasis of the verse.
- source_word: ᾠκοδόμουν
  chosen: building
  alternatives:
  - they built
  lexicon: BDAG
  rationale: Imperfect of οἰκοδομέω, here in its literal sense of construction rather
    than metaphorical edification. 'Building' preserves the ordinary-life catalogue
    and the imperfective sense.
