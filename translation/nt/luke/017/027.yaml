id: LUK.17.27
reference: Luke 17:27
source:
  edition: SBLGNT
  text: ἤσθιον, ἔπινον, ἐγάμουν, ⸀ἐγαμίζοντο, ἄχρι ἧς ἡμέρας εἰσῆλθεν Νῶε εἰς τὴν
    κιβωτόν, καὶ ἦλθεν ὁ κατακλυσμὸς καὶ ἀπώλεσεν ⸀πάντας.
translation:
  text: They were eating, they were drinking, they were marrying, they were being
    given in marriage, until the day Noah entered into the ark, and the flood came
    and destroyed them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more compactly, ''they were marrying and being married.'' The Greek
      distinguishes two verbs: one active (''marrying'') and one passive (''being
      given in marriage'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤσθιον
  chosen: they were eating
  alternatives:
  - they ate
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing/customary action in past time; English
    past progressive best captures the scene of ordinary life continuing.
- source_word: ἔπινον
  chosen: they were drinking
  alternatives:
  - they drank
  lexicon: BDAG
  rationale: Imperfect aspect is preserved with past progressive to match the series
    of habitual activities.
- source_word: ἐγάμουν
  chosen: they were marrying
  alternatives:
  - they married
  lexicon: BDAG
  rationale: The active form of γαμέω commonly refers to taking a spouse, often of
    men, but in a generalized plural list it can be rendered broadly as 'marrying'
    without over-specifying gender beyond the Greek's representative usage.
- source_word: ἐγαμίζοντο
  chosen: they were being given in marriage
  alternatives:
  - they were given in marriage
  lexicon: BDAG
  rationale: The passive of γαμίζω is distinct from ἐγάμουν and traditionally refers
    to being given in marriage. Retaining the passive preserves the paired social
    activities and avoids collapsing two different Greek verbs into one English expression.
- source_word: ἄχρι ἧς ἡμέρας
  chosen: until the day
  alternatives:
  - up to the day on which
  - until that day when
  lexicon: BDAG
  rationale: This idiom marks the temporal limit of the ongoing activities. 'Until
    the day' is natural English and sufficiently formal.
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  lexicon: BDAG
  rationale: Aorist narrative verb rendered simply as a completed event. 'Entered'
    is concise and idiomatic with 'into the ark.'
- source_word: κιβωτόν
  chosen: the ark
  alternatives:
  - the boat
  - the chest
  lexicon: BDAG
  rationale: In Noah context, κιβωτός conventionally and correctly refers to the ark;
    this is the established referent, not a generic vessel.
- source_word: κατακλυσμός
  chosen: the flood
  alternatives:
  - the deluge
  lexicon: BDAG
  rationale: '''The flood'' is the clearest modern English rendering and fits the
    Genesis allusion naturally.'
- source_word: ἀπώλεσεν πάντας
  chosen: destroyed them all
  alternatives:
  - destroyed all
  - destroyed everyone
  lexicon: BDAG
  rationale: The object πάντας is masculine plural 'all [people].' 'Destroyed them
    all' makes the implied human object explicit in natural English and preserves
    the totality of judgment.
