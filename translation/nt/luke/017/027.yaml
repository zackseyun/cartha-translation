theological_decisions:
- issue: Rendering the paired marriage verbs distinctly
  chosen_reading: they were marrying, they were being given in marriage
  alternative_readings:
  - they were marrying and being married
  rationale: The Greek uses two different imperfect verbs, one active and one passive.
    Distinguishing them preserves the texture of the source and the portrayal of normal
    social life continuing up to judgment, without importing extra doctrinal meaning.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Aspect of the opening verb series
  chosen_reading: past progressive throughout ('they were eating...')
  alternative_readings:
  - simple past throughout ('they ate...')
  rationale: The repeated imperfects portray ongoing customary activity. Preserving
    that aspect supports the verse's emphasis on ordinary life proceeding uninterrupted
    until sudden judgment.
  doctrine_reference: Translation philosophy §1
