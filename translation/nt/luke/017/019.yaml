theological_decisions:
- issue: Meaning of σέσωκέν σε in a healing context
  chosen_reading: has saved you
  alternative_readings:
  - has made you well
  - has healed you
  rationale: Although σῴζω can denote physical healing, the broader narrative contrast
    between the ten cleansed and the one who returns to glorify God supports retaining
    the fuller 'saved' wording. This preserves theological tension rather than reducing
    the statement to bodily recovery alone.
  doctrine_reference: Translation philosophy §3; Contested terms table for πίστις
    (preserve ambiguity where present)
