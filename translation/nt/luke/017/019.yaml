id: LUK.17.19
reference: Luke 17:19
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ· Ἀναστὰς πορεύου· ἡ πίστις σου σέσωκέν σε.
translation:
  text: And he said to him, “Rise and go; your faith has saved you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has made you well” or “has healed you.” The Greek verb can refer to
      rescue, healing, or salvation.
    reason: lexical_alternative
  - marker: b
    text: Or “trust.” The Greek word for “faith” can also denote trust or faithfulness,
      though “faith” is the default rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  - spoke
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in direct speech; 'said' is the
    most natural and least interpretively loaded English equivalent.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to that man
  lexicon: BDAG
  rationale: Simple dative pronoun referring to the healed Samaritan; explicit enough
    in English without adding interpretive detail.
- source_word: Ἀναστὰς
  chosen: Rise
  alternatives:
  - Get up
  - Stand up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι used imperativally with the following command.
    'Rise' preserves the concise force and dignified tone better than the more colloquial
    'get up.'
- source_word: πορεύου
  chosen: go
  alternatives:
  - be on your way
  - go your way
  lexicon: BDAG
  rationale: Present middle imperative of πορεύομαι. 'Go' is the clearest idiomatic
    command in English; 'go your way' is possible but sounds more traditional than
    necessary.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context it denotes the man's trusting response to Jesus. 'Trust' is possible,
    and 'faithfulness' is less likely here, so both are preserved as alternatives
    rather than adopted.
- source_word: σέσωκέν
  chosen: has saved
  alternatives:
  - has made well
  - has healed
  lexicon: BDAG
  rationale: Perfect active of σῴζω, whose semantic range includes save, rescue, heal,
    and make well. 'Has saved' best preserves the broader theological sense and the
    perfect aspect's abiding result, especially since all ten were physically cleansed
    already and this saying likely signals more than bodily healing alone.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object pronoun naturally rendered 'you' in English.
