id: LUK.17.4
reference: Luke 17:4
source:
  edition: SBLGNT
  text: καὶ ἐὰν ἑπτάκις τῆς ἡμέρας ⸀ἁμαρτήσῃ εἰς σὲ καὶ ⸀ἑπτάκις ἐπιστρέψῃ ⸂πρὸς σὲ⸃
    λέγων· Μετανοῶ, ἀφήσεις αὐτῷ.
translation:
  text: And if he sins against you seven times in the day, and seven times returns
    to you saying, ‘I repent,’ you shall forgive him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turns to you.' The verb can mean either 'return' or 'turn back' in this
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you must forgive him.' The Greek uses a future form that here carries
      imperative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτάκις
  chosen: seven times
  alternatives:
  - sevenfold
  lexicon: BDAG
  rationale: Adverb meaning 'seven times'; the idiomatic English expression is 'seven
    times,' preserving the repeated-action emphasis.
- source_word: τῆς ἡμέρας
  chosen: in the day
  alternatives:
  - in one day
  - that day
  lexicon: BDAG
  rationale: Genitive of time within which; 'in the day' is a close rendering of the
    Greek. 'In one day' is smoother English but adds 'one,' which is not explicit.
- source_word: ἁμαρτήσῃ εἰς σὲ
  chosen: sins against you
  alternatives:
  - sins toward you
  lexicon: BDAG
  rationale: ἁμαρτάνω with εἰς σέ here denotes committing an offense against the person
    addressed. 'Against you' is the natural and accurate English equivalent.
- source_word: ἐπιστρέψῃ πρὸς σὲ
  chosen: returns to you
  alternatives:
  - turns to you
  - comes back to you
  lexicon: BDAG
  rationale: ἐπιστρέφω can mean 'turn/return.' In this context of repeated offense
    followed by appeal, 'returns to you' best captures both movement back and renewed
    approach.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and says
  lexicon: BDAG
  rationale: Present participle expressing attendant manner; 'saying' preserves the
    participial linkage without over-paraphrasing.
- source_word: Μετανοῶ
  chosen: I repent
  alternatives:
  - I am repenting
  - I have repented
  - I change my mind
  lexicon: BDAG
  rationale: Present indicative first singular. 'I repent' is the standard concise
    rendering and preserves the moral/spiritual sense of μετανοέω better than the
    weaker 'change my mind.'
- source_word: ἀφήσεις
  chosen: you shall forgive
  alternatives:
  - forgive
  - you must forgive
  - you will forgive
  lexicon: BDAG
  rationale: Future indicative used imperativally in context. 'You shall forgive'
    preserves the form while clearly conveying Jesus' directive. 'Must forgive' is
    interpretive; bare 'forgive' would flatten the Greek form.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: Dative masculine singular pronoun referring back to the offender. 'Him'
    matches the grammatical gender and discourse reference.
