theological_decisions:
- issue: Force of the future indicative ἀφήσεις
  chosen_reading: 'Rendered as directive: ''you shall forgive him'''
  alternative_readings:
  - 'predictive: ''you will forgive him'''
  - 'more explicit command: ''you must forgive him'''
  rationale: In this instructional context, the future indicative functions as a command
    or obligation. 'You shall forgive him' preserves both the Greek form and the ethical
    force without adding interpretive intensity beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of Μετανοῶ
  chosen_reading: Translated 'I repent'
  alternative_readings:
  - '''I am sorry'''
  - '''I have changed my mind'''
  rationale: The text specifies repentance, not merely apology or regret. Rendering
    it as 'I repent' preserves the theological and ethical weight of μετανοέω without
    softening it into a lesser emotional response.
  doctrine_reference: Translation philosophy §1, §6
