theological_decisions:
- issue: Narrative emphasis on the healed man's identity
  chosen_reading: Retain the simple statement 'And he was a Samaritan' without adding
    interpretive wording.
  alternative_readings:
  - Now he was a Samaritan
  - and he was a Samaritan man
  rationale: The verse's theological and social force lies in the understated revelation
    that the thankful one belonged to a group often viewed as outsiders. The translation
    preserves that tension without importing commentary into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
