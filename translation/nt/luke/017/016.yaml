id: LUK.17.16
reference: Luke 17:16
source:
  edition: SBLGNT
  text: καὶ ἔπεσεν ἐπὶ πρόσωπον παρὰ τοὺς πόδας αὐτοῦ εὐχαριστῶν αὐτῷ· καὶ αὐτὸς ἦν
    Σαμαρίτης.
translation:
  text: And he fell on his face at his feet, thanking him. And he was a Samaritan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - threw himself down
  - prostrated himself
  lexicon: BDAG
  rationale: Aorist of πίπτω is most naturally rendered 'fell.' The surrounding phrase
    ἐπὶ πρόσωπον supplies the prostration nuance, so 'fell' keeps the verbal component
    concise without overtranslating.
- source_word: ἐπὶ πρόσωπον
  chosen: on his face
  alternatives:
  - face down
  - with his face to the ground
  lexicon: BDAG
  rationale: This idiom denotes a posture of prostration. 'On his face' is a clear,
    fairly literal English equivalent that preserves the vivid bodily posture.
- source_word: παρὰ τοὺς πόδας αὐτοῦ
  chosen: at his feet
  alternatives:
  - beside his feet
  - before his feet
  lexicon: BDAG
  rationale: Although παρά can mean 'beside,' in this reverential context with falling
    on one's face, idiomatic English is 'at his feet.' This preserves the sense of
    humble posture before Jesus.
- source_word: εὐχαριστῶν αὐτῷ
  chosen: thanking him
  alternatives:
  - giving thanks to him
  lexicon: BDAG
  rationale: The present participle expresses attendant action concurrent with the
    falling. 'Thanking him' is natural modern English and preserves the direct object
    relationship to Jesus.
- source_word: Σαμαρίτης
  chosen: Samaritan
  lexicon: BDAG
  rationale: Standard transliterated ethnoreligious designation. It should be preserved
    as 'Samaritan' because it carries the narrative and social significance of the
    group identity in Luke.
- source_word: καὶ αὐτὸς ἦν Σαμαρίτης
  chosen: And he was a Samaritan
  alternatives:
  - Now he was a Samaritan
  - and this man was a Samaritan
  lexicon: BDAG
  rationale: The explicit pronoun αὐτός adds emphasis, highlighting the surprising
    identity of the grateful leper. English can reflect this adequately with a simple
    clause; stronger expansions like 'this man' are possible but not necessary.
