id: LUK.17.22
reference: Luke 17:22
source:
  edition: SBLGNT
  text: Εἶπεν δὲ πρὸς τοὺς μαθητάς· Ἐλεύσονται ἡμέραι ὅτε ἐπιθυμήσετε μίαν τῶν ἡμερῶν
    τοῦ υἱοῦ τοῦ ἀνθρώπου ἰδεῖν καὶ οὐκ ὄψεσθε.
translation:
  text: Then he said to the disciples, “Days are coming when you will long to see
    one of the days of the Son of Man, and you will not see it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The days will come when you will desire to see one of the days of the
      Son of Man, and you will not see it.'
    reason: lexical_alternative
  - marker: b
    text: '''The days of the Son of Man'' may refer to the time of his presence and
      work, or more specifically to his future revelation; the Greek wording leaves
      the scope open.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εἶπεν δὲ
  chosen: Then he said
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then'
    gives natural English flow without overstating contrast.
- source_word: πρὸς τοὺς μαθητάς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The Greek has the article with 'disciples' but no explicit possessive
    pronoun. 'To the disciples' is the most textually precise rendering.
- source_word: Ἐλεύσονται ἡμέραι
  chosen: Days are coming
  alternatives:
  - The days will come
  - Days will come
  lexicon: BDAG
  rationale: This idiom introduces a future time. 'Days are coming' is idiomatic modern
    English and preserves the prophetic force of the future expression.
- source_word: ὅτε
  chosen: when
  alternatives:
  - in which
  lexicon: BDAG
  rationale: Temporal conjunction introducing the content of the coming days.
- source_word: ἐπιθυμήσετε
  chosen: you will long
  alternatives:
  - you will desire
  - you will yearn
  lexicon: BDAG
  rationale: '''Long'' best conveys strong desire in natural English without sounding
    overly formal. The context is emotional and eschatological, not merely volitional.'
- source_word: μίαν τῶν ἡμερῶν
  chosen: one of the days
  alternatives:
  - one day among the days
  - a single one of the days
  lexicon: BDAG
  rationale: The partitive genitive is best represented by 'one of the days.' This
    preserves the specificity of a single day within a larger set.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: of the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and should be translated literally as
    a title. It preserves both the idiomatic Greek and its Danielic/theological resonance.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  lexicon: BDAG
  rationale: Simple infinitive of purpose/complement after 'long.' 'To see' is clear
    and natural.
- source_word: καὶ οὐκ ὄψεσθε
  chosen: and you will not see it
  alternatives:
  - but you will not see it
  - and you will not see
  lexicon: BDAG
  rationale: The future middle of ὁράω is naturally rendered 'you will see.' English
    requires an object for smoothness; 'it' refers back to the desired sight of one
    of the Son of Man's days. 'And' preserves καί without importing stronger adversative
    force than the Greek states.
