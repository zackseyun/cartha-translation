theological_decisions:
- issue: Meaning of 'the days of the Son of Man'
  chosen_reading: An eschatologically charged reference to the time of the Son of
    Man, left somewhat open rather than narrowed to only Jesus' earthly ministry or
    only the final parousia.
  alternative_readings:
  - the days of Jesus' earthly presence with the disciples
  - the future days of the Son of Man's revelation/judgment
  rationale: The phrase is intentionally weighty and may evoke both the disciples'
    future longing for Jesus' presence and the broader eschatological manifestation
    of the Son of Man in the surrounding context. The translation preserves the literal
    wording rather than resolving the tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
