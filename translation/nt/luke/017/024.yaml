theological_decisions:
- issue: Meaning of 'the Son of Man ... in his day' in an eschatological context
  chosen_reading: Retain the phrase 'in his day' without expanding it to 'at his coming'
    or 'on the day of judgment.'
  alternative_readings:
  - at his coming
  - on the day of the Son of Man
  - on the day of judgment
  rationale: The context is eschatological, but the Greek here states only 'in his
    day.' Expanding the phrase would import interpretive specificity not explicit
    in the text. This preserves theological tension and avoids doctrinal overreach.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
