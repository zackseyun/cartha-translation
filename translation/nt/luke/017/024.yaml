id: LUK.17.24
reference: Luke 17:24
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ἡ ⸀ἀστραπὴ ἀστράπτουσα ἐκ τῆς ⸂ὑπὸ τὸν⸃ οὐρανὸν εἰς τὴν ὑπ’ οὐρανὸν
    λάμπει, οὕτως ἔσται ὁ υἱὸς τοῦ ἀνθρώπου ⸂ἐν τῇ ἡμέρᾳ αὐτοῦ⸃.
translation:
  text: For just as lightning, flashing from one part under heaven to the other part
    under heaven, shines, so will the Son of Man be in his day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'from one end of the sky to the other.' The Greek
      more literally repeats 'under heaven' in both halves of the expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'on his day.' The phrase refers to the time associated with the Son of
      Man and is left intentionally broad in the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Retains the explanatory force of γάρ and the comparative setup of ὥσπερ
    in natural English.
- source_word: ἀστραπὴ
  chosen: lightning
  alternatives:
  - a lightning flash
  lexicon: BDAG
  rationale: Standard sense in context; the image is the visible suddenness and universality
    of lightning.
- source_word: ἀστράπτουσα
  chosen: flashing
  alternatives:
  - as it flashes
  - gleaming
  lexicon: BDAG
  rationale: Participial form is preserved with an English participle to keep the
    vivid ongoing action tied to 'lightning'.
- source_word: ἐκ τῆς ὑπὸ τὸν οὐρανὸν ... εἰς τὴν ὑπ’ οὐρανόν
  chosen: from one part under heaven to the other part under heaven
  alternatives:
  - from one end of the sky to the other end of the sky
  - from one part of the sky to the other
  lexicon: BDAG
  rationale: The Greek literally repeats 'under heaven' in both phrases. This rendering
    preserves that repetition more transparently than the idiomatic 'from one end
    of the sky to the other,' while still reading naturally enough in English.
- source_word: λάμπει
  chosen: shines
  alternatives:
  - flashes
  - gives light
  lexicon: BDAG
  rationale: Distinguishes λάμπει from the earlier participle ἀστράπτουσα; the verse
    uses two related but not identical verbs, so English should reflect both.
- source_word: οὕτως ἔσται
  chosen: so will ... be
  alternatives:
  - so ... will be
  - thus ... will be
  lexicon: BDAG
  rationale: Simple future comparison matching the simile structure.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established and transparent rendering of Jesus' self-designation; preserves
    the title rather than paraphrasing it.
- source_word: ἐν τῇ ἡμέρᾳ αὐτοῦ
  chosen: in his day
  alternatives:
  - on his day
  - in the day that belongs to him
  lexicon: BDAG
  rationale: A natural rendering of the dative phrase that preserves the possessive
    force of αὐτοῦ. 'In his day' communicates the eschatological time associated with
    the Son of Man without over-interpreting.
