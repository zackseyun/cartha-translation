id: LUK.17.5
reference: Luke 17:5
source:
  edition: SBLGNT
  text: Καὶ εἶπαν οἱ ἀπόστολοι τῷ κυρίῳ· Πρόσθες ἡμῖν πίστιν.
translation:
  text: And the apostles said to the Lord, “Increase our faith.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Add faith to us.' The Greek verb is literally 'add,' but here it idiomatically
      means 'increase.'
    reason: lexical_alternative
  - marker: b
    text: '''Faith'' may also be understood as ''trust''; less likely here, the noun
      can in some contexts mean ''faithfulness.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without
    adding temporal nuance not explicit in the Greek.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - were saying
  - told
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past narrative verb, 'said.'
- source_word: οἱ ἀπόστολοι
  chosen: the apostles
  alternatives:
  - the emissaries
  - the messengers
  lexicon: BDAG
  rationale: '''Apostles'' is the established and accurate rendering for ἀπόστολοι
    in Luke-Acts when referring to Jesus'' commissioned inner circle; alternatives
    are possible etymologically but not idiomatic in this context.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Luke's narrative
    this is both the natural address/title and the standard Christological rendering.
- source_word: Πρόσθες
  chosen: Increase
  alternatives:
  - Add
  - Give more
  lexicon: BDAG
  rationale: Aorist imperative of προστίθημι literally means 'add,' but in idiomatic
    English with πίστιν the sense is 'increase.' This preserves the disciples' request
    for greater measure rather than suggesting a different object be added.
- source_word: ἡμῖν
  chosen: our
  alternatives:
  - to us
  lexicon: BDAG
  rationale: 'Although literally dative ''to us,'' English idiom with ''increase''
    takes a possessive object phrase: ''increase our faith.'' This is a natural optimal-equivalence
    rendering of the Greek construction.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the object of the apostles' request is most naturally their faith/trust in God
    rather than 'faithfulness,' though the semantic range is worth preserving in a
    footnote.
