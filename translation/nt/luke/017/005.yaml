theological_decisions:
- issue: Rendering of κύριος in reference to Jesus
  chosen_reading: Lord
  alternative_readings:
  - master
  rationale: The doctrinal guidance specifies κύριος → 'Lord' as the default. In Luke
    this title carries both respectful address and christological weight; 'master'
    would undertranslate that resonance here.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος *Kyrios* → Lord'
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrinal guidance specifies πίστις → 'faith' as the default, with
    alternatives preserved where relevant. In this verse 'faith' is the most natural
    English rendering, while 'trust' and especially 'faithfulness' remain semantic
    possibilities worth noting.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις *pistis* → faith'
