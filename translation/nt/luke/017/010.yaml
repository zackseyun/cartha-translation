theological_decisions:
- issue: Rendering δοῦλοι in a discipleship analogy
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The immediate literary context uses a master-slave scenario to teach
    humility and the absence of merit before God. Following the doctrine's contested-terms
    guidance, the bonded nature is salient here, so 'slaves' is preferred over the
    traditional but weaker 'servants.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος; Translation philosophy
    §1'
- issue: Sense of ἀχρεῖοι
  chosen_reading: unworthy
  alternative_readings:
  - unprofitable
  - worthless
  rationale: The verse teaches that obedience does not place God in one's debt. Rendering
    ἀχρεῖοι as 'unworthy' preserves that theological point without implying that disciples
    are intrinsically valueless, which could overstate the term in English.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §6'
