id: LUK.17.10
reference: Luke 17:10
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ὅταν ποιήσητε πάντα τὰ διαταχθέντα ὑμῖν, λέγετε ὅτι Δοῦλοι
    ἀχρεῖοί ἐσμεν, ⸂ὃ ὠφείλομεν⸃ ποιῆσαι πεποιήκαμεν.
translation:
  text: So also you, when you have done all that was commanded you, say, ‘We are unworthy
    slaves; we have done what we were obligated to do.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unprofitable slaves' or 'worthless slaves.' The Greek adjective can
      carry the sense of being of no profit or having no claim to reward.
    reason: lexical_alternative
  - marker: b
    text: Or 'what was our duty to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  chosen: So also you
  alternatives:
  - So you also
  - In the same way, you also
  lexicon: BDAG
  rationale: οὕτως with καὶ ὑμεῖς links this application to the preceding illustration.
    'So also you' is concise, natural, and preserves the inferential force.
- source_word: ὅταν ποιήσητε
  chosen: when you have done
  alternatives:
  - when you do
  - whenever you have done
  lexicon: BDAG
  rationale: ὅταν with aorist subjunctive commonly has a future-general sense. English
    perfect 'have done' fits the completed action prior to the commanded response
    'say'.
- source_word: πάντα τὰ διαταχθέντα ὑμῖν
  chosen: all that was commanded you
  alternatives:
  - everything commanded to you
  - all the things assigned to you
  lexicon: BDAG
  rationale: διαταχθέντα from διατάσσω denotes what has been ordered or commanded.
    'Commanded' preserves the authoritative sense better than softer options like
    'assigned.' The dative ὑμῖν is naturally rendered as the indirect object in English.
- source_word: λέγετε
  chosen: say
  alternatives:
  - keep saying
  - you should say
  lexicon: BDAG
  rationale: Present imperative can be iterative or customary, but simple 'say' is
    idiomatic in English and sufficient in this instructional context.
- source_word: Δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος is rendered according to context. Here
    the master-slave analogy is explicit in the surrounding context, so the bonded
    status is salient; 'slaves' best preserves the social and rhetorical force.
- source_word: ἀχρεῖοί
  chosen: unworthy
  alternatives:
  - unprofitable
  - worthless
  - without claim to reward
  lexicon: BDAG
  rationale: ἀχρεῖος can mean 'unprofitable/useless,' but in this context the point
    is not that the disciples are literally worthless; rather, they have no surplus
    merit or claim on the master. 'Unworthy' communicates that they are not entitled
    to special credit, while avoiding a misleadingly absolute statement of uselessness.
- source_word: ὃ ὠφείλομεν ποιῆσαι
  chosen: what we were obligated to do
  alternatives:
  - what we ought to have done
  - what was our duty to do
  lexicon: BDAG
  rationale: ὀφείλω expresses obligation or indebtedness. 'Were obligated to do' is
    clear modern English and preserves the sense of duty without archaic phrasing.
    'Duty' is possible but slightly more interpretive.
- source_word: πεποιήκαμεν
  chosen: we have done
  alternatives:
  - we did
  - we have accomplished
  lexicon: BDAG
  rationale: The perfect indicates completed action with present relevance. 'We have
    done' is the most natural equivalent and matches the preceding temporal structure.
