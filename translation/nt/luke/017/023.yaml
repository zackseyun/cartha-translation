theological_decisions:
- issue: Whether to leave διώξητε without an explicit object
  chosen_reading: 'Supply the implicit object in English: ''run after them'''
  alternative_readings:
  - nor pursue
  - nor chase after it
  rationale: The Greek leaves the object unstated, but English normally requires one
    for natural sense. In context, Jesus warns against following those making location
    claims ('Look, there!' 'Look, here!'), so 'them' refers to such claimants or reports
    without adding doctrinal content. This is a translation-level decision for clarity,
    not a theological expansion.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the paired deictic exclamations concisely
  chosen_reading: ‘Look, there!’ or ‘Look, here!’
  alternative_readings:
  - ‘Behold, there! Behold, here!’
  - ‘See there! See here!’
  rationale: The verse presents misleading reports about the coming of the Son of
    Man. The translation preserves the warning's immediacy without importing eschatological
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §6
