id: LUK.17.23
reference: Luke 17:23
source:
  edition: SBLGNT
  text: καὶ ἐροῦσιν ὑμῖν· Ἰδοὺ ⸂ἐκεῖ· Ἰδοὺ ὧδε⸃· μὴ ἀπέλθητε μηδὲ διώξητε.
translation:
  text: And they will say to you, ‘Look, there!’ or ‘Look, here!’ Do not go out or
    run after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Do not go away, nor pursue.” The Greek leaves the object of “pursue”
      unstated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐροῦσιν
  chosen: they will say
  alternatives:
  - they will tell
  lexicon: BDAG
  rationale: Future active of λέγω is most naturally rendered 'they will say.' 'Tell'
    is possible in context, but 'say' better preserves the direct-speech introduction
    without adding nuance.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a deictic attention-getter. 'Look' is natural modern English
    and fits the translation philosophy better than archaic 'Behold,' while preserving
    the force of drawing attention.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - over there
  lexicon: BDAG
  rationale: Simple distal adverb. 'There' is sufficient and idiomatic; 'over there'
    is possible but slightly more expansive than the Greek requires.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Deictic adverb contrasting with ἐκεῖ. 'Here' preserves the concise contrast
    in English.
- source_word: μὴ ἀπέλθητε
  chosen: Do not go out
  alternatives:
  - Do not go away
  - Do not leave
  lexicon: BDAG
  rationale: Aorist subjunctive with μή in prohibition. Given the context of people
    pointing to supposed locations of the Son of Man, 'go out' best captures movement
    in response to such claims. 'Leave' is possible but less contextually pointed.
- source_word: μηδὲ διώξητε
  chosen: or run after them
  alternatives:
  - nor pursue
  - nor chase after them
  lexicon: BDAG
  rationale: διώκω can mean 'pursue' or 'chase.' In this warning context, the sense
    is following after reported sightings or claimants. 'Run after them' makes the
    practical force clear in contemporary English. The object 'them' is implicit from
    the preceding speakers/claims and is supplied for natural English.
