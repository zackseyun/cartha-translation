theological_decisions:
- issue: Meaning of ἐντὸς ὑμῶν
  chosen_reading: the kingdom of God is in your midst
  alternative_readings:
  - the kingdom of God is within you
  - the kingdom of God is among you
  rationale: The phrase is interpretively contested. Because Jesus is speaking to
    a plural audience and the immediate context concerns observable signs and location,
    the corporate/present-among-you sense is preferred in the main text. This also
    avoids importing a purely inward, individualistic reading the context does not
    require. The traditional rendering 'within you' remains possible lexically and
    is preserved in a footnote to maintain the text's ambiguity where it genuinely
    exists.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
