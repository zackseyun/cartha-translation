id: LUK.17.21
reference: Luke 17:21
source:
  edition: SBLGNT
  text: οὐδὲ ἐροῦσιν· Ἰδοὺ ὧδε ἤ· ⸀Ἐκεῖ· ἰδοὺ γὰρ ἡ βασιλεία τοῦ θεοῦ ἐντὸς ὑμῶν ἐστιν.
translation:
  text: Nor will they say, ‘Look, here!’ or ‘There!’ For look, the kingdom of God
    is in your midst.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “within you.” The Greek phrase can mean either an inward sense or a
      corporate sense such as “among you / in your midst.”
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ
  chosen: Nor
  alternatives:
  - And not
  - Neither
  lexicon: BDAG
  rationale: Coordinates with the previous statement and continues the negation naturally
    in English. 'Nor' best preserves the flow from the preceding clause.
- source_word: ἐροῦσιν
  chosen: will they say
  alternatives:
  - they will say
  lexicon: BDAG
  rationale: Future active indicative of λέγω. In English, inversion after initial
    negative ('Nor will they say') is idiomatic and preserves the force of the Greek.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A deictic attention-getter. 'Look' is readable modern English and fits
    the translation philosophy better than the archaic 'Behold.'
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  - here it is
  lexicon: BDAG
  rationale: Simple locative adverb; 'here' is the most direct rendering.
- source_word: ἤ
  chosen: or
  alternatives:
  - or else
  lexicon: BDAG
  rationale: Standard disjunctive conjunction between the two quoted alternatives.
- source_word: Ἐκεῖ
  chosen: There
  alternatives:
  - There it is
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb parallel to ὧδε. 'There' keeps the symmetry of
    the saying.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the explanation for why people should not point to a visible
    location. 'For' preserves the explanatory connection.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and transparent rendering. 'Kingdom' preserves both
    the royal and eschatological dimensions without over-interpreting toward either
    abstract reign or spatial realm.
- source_word: ἐντὸς
  chosen: in the midst of
  alternatives:
  - within
  - among
  lexicon: BDAG
  rationale: In this context Jesus is addressing a plural audience including Pharisees,
    making an individualized interior sense ('within you') less likely as the main
    text. 'In your midst' captures a corporate, present-among-you sense while remaining
    natural English. The viable alternative 'within you' is preserved in a footnote
    because the phrase is genuinely debated.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - you
  lexicon: BDAG
  rationale: Second person plural genitive governed by ἐντός. In English, 'in your
    midst' best conveys the plural reference corporately.
- source_word: ἐστιν
  chosen: is
  alternatives:
  - exists
  - is present
  lexicon: BDAG
  rationale: Simple present of εἰμί. 'Is' is sufficient; the locative phrase carries
    the nuance of presence.
