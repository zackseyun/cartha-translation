- issue: Meaning of πίστις in a miracle saying
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: In keeping with the doctrine table, the main text uses 'faith.' The context
    concerns confidence sufficient to command the impossible, not primarily covenantal
    fidelity or moral steadfastness. The alternatives are lexical rather than doctrinally
    resolved here.
