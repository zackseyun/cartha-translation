id: LUK.17.6
reference: Luke 17:6
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ κύριος· Εἰ ἔχετε πίστιν ὡς κόκκον σινάπεως, ἐλέγετε ἂν τῇ συκαμίνῳ
    ταύτῃ· Ἐκριζώθητι καὶ φυτεύθητι ἐν τῇ θαλάσσῃ· καὶ ὑπήκουσεν ἂν ὑμῖν.
translation:
  text: And the Lord said, “If you have faith like a mustard seed, you would say to
    this mulberry tree, ‘Be uprooted and be planted in the sea,’ and it would obey
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sycamine tree,' a traditional rendering of the Greek term for a mulberry
      tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In Luke's
    narrative context this is a christological/narrative title best rendered 'Lord,'
    not 'Master.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: The doctrine table gives 'faith' as the default for πίστις, with alternatives
    preserved where contested. Here the sense is confidence/trust directed toward
    God rather than 'faithfulness' as steadfastness, so 'faith' fits best.
- source_word: ὡς κόκκον σινάπεως
  chosen: like a mustard seed
  alternatives:
  - as a grain of mustard seed
  - as small as a mustard seed
  lexicon: BDAG
  rationale: ὡς marks comparison, not necessarily explicit size alone. 'Like a mustard
    seed' preserves the simile without over-interpreting it as only smallness.
- source_word: συκαμίνῳ
  chosen: mulberry tree
  alternatives:
  - sycamine tree
  lexicon: BDAG
  rationale: συκάμινος refers to a mulberry tree, distinct from συκομορέα ('sycamore-fig').
    'Mulberry tree' is clearer modern English; the traditional transliteration 'sycamine
    tree' is preserved in a footnote as a lexical alternative.
- source_word: ἐλέγετε ἂν
  chosen: you would say
  alternatives:
  - you could say
  - you would be saying
  lexicon: BDAG
  rationale: The imperfect with ἄν expresses potentiality in a present contrary-to-fact
    or hypothetical condition. 'Would say' is the most natural English equivalent
    here.
- source_word: Ἐκριζώθητι
  chosen: Be uprooted
  alternatives:
  - Be pulled up by the roots
  - Be rooted out
  lexicon: BDAG
  rationale: Aorist passive imperative of ἐκριζόω; 'Be uprooted' is concise and preserves
    the passive imperative force.
- source_word: φυτεύθητι ἐν τῇ θαλάσσῃ
  chosen: be planted in the sea
  alternatives:
  - be transplanted into the sea
  lexicon: BDAG
  rationale: φυτεύω means 'plant.' 'Be planted in the sea' keeps the vivid, paradoxical
    imagery of the Greek; adding 'transplanted' would be interpretive.
- source_word: ὑπήκουσεν ἂν ὑμῖν
  chosen: it would obey you
  alternatives:
  - it would listen to you
  lexicon: BDAG
  rationale: ὑπακούω commonly means 'obey' or 'heed.' 'Obey' best fits the command
    imagery and preserves the force of the miracle saying.
