theological_decisions:
- issue: Social-role terminology in the parable
  chosen_reading: Render the actions and commands directly without inserting 'servant'
    or 'slave' into the verse beyond what the Greek explicitly states.
  alternative_readings:
  - Expand with 'that servant' for clarity
  - Use 'slave' to foreground the social status from the broader context
  rationale: Although the surrounding context concerns a δοῦλος, this verse itself
    uses only pronouns and imperatives. To avoid importing a noun not present in the
    Greek, the translation keeps the referent implicit while preserving the master-servant
    dynamic through the commands.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
