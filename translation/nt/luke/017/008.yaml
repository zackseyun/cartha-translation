id: LUK.17.8
reference: Luke 17:8
source:
  edition: SBLGNT
  text: ἀλλ’ οὐχὶ ἐρεῖ αὐτῷ· Ἑτοίμασον τί δειπνήσω καὶ περιζωσάμενος διακόνει μοι
    ἕως φάγω καὶ πίω, καὶ μετὰ ταῦτα φάγεσαι καὶ πίεσαι σύ;
translation:
  text: On the contrary, will he not say to him, ‘Prepare something for me to eat,
    and gird yourself and serve me until I have eaten and drunk, and after that you
    will eat and drink’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dress yourself for service'; literally 'gird yourself,' referring to
      tying up one's garments in preparation for work.
    reason: cultural_note
  - marker: b
    text: Or 'until I eat and drink.' The Greek can be rendered more literally this
      way; 'have eaten and drunk' brings out the sense of completed action before
      the servant's turn.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ οὐχὶ
  chosen: On the contrary, will he not
  alternatives:
  - But will he not
  - Rather, will he not
  lexicon: BDAG
  rationale: The combination introduces a contrasting rhetorical question expecting
    a positive answer. 'On the contrary' captures the adversative force of ἀλλά in
    context, while 'will he not' reflects οὐχί with the future verb as a rhetorical
    expectation.
- source_word: ἐρεῖ αὐτῷ
  chosen: will he ... say to him
  alternatives:
  - will he tell him
  - will he say to that servant
  lexicon: BDAG
  rationale: λέγω is most basically 'say'; 'say to him' preserves the direct-speech
    setup without overinterpreting. The indirect object αὐτῷ is retained explicitly.
- source_word: Ἑτοίμασον
  chosen: Prepare
  alternatives:
  - Get ready
  - Make ready
  lexicon: BDAG
  rationale: Aorist imperative calling for a concrete action. 'Prepare' is natural
    modern English and fits the meal context.
- source_word: τί δειπνήσω
  chosen: something for me to eat
  alternatives:
  - what I may dine on
  - my supper
  - what I will eat
  lexicon: BDAG
  rationale: Literally the phrase is 'what I may dine/eat.' In idiomatic English,
    'prepare something for me to eat' best conveys the sense without awkwardness.
    'Supper' is possible, but 'something for me to eat' avoids over-specifying the
    meal in contemporary English while preserving the object left implicit in English.
- source_word: περιζωσάμενος
  chosen: gird yourself
  alternatives:
  - dress yourself for service
  - tie up your garments
  lexicon: BDAG
  rationale: The participle literally refers to girding oneself, i.e., tucking up
    garments for work. 'Gird yourself' preserves the concrete image; a cultural note
    can clarify the idiom.
- source_word: διακόνει μοι
  chosen: serve me
  alternatives:
  - wait on me
  - minister to me
  lexicon: BDAG
  rationale: διακονέω here refers to table service. 'Serve me' is the clearest and
    most natural rendering in context; 'minister' would sound overly ecclesiastical.
- source_word: ἕως φάγω καὶ πίω
  chosen: until I have eaten and drunk
  alternatives:
  - until I eat and drink
  lexicon: BDAG
  rationale: The aorist subjunctives after ἕως denote the completion of the action.
    English present perfect ('have eaten and drunk') communicates that endpoint naturally.
- source_word: μετὰ ταῦτα
  chosen: after that
  alternatives:
  - after these things
  - then afterward
  lexicon: BDAG
  rationale: Standard temporal expression; 'after that' is idiomatic and accurate.
- source_word: φάγεσαι καὶ πίεσαι σύ
  chosen: you will eat and drink
  alternatives:
  - you may eat and drink
  - eat and drink yourself
  lexicon: BDAG
  rationale: The future middle forms are straightforwardly future in sense here. The
    explicit σύ adds emphasis, but English can convey this naturally without awkward
    overtranslation; the servant's turn comes only afterward.
