theological_decisions:
- issue: Meaning of σκάνδαλα in ethical teaching
  chosen_reading: Rendered as 'stumbling blocks' in the main text
  alternative_readings:
  - offenses
  - causes of sin
  - temptations to sin
  rationale: The verse warns about realities that lead others into moral or spiritual
    downfall, not merely personal annoyance. The metaphorical rendering preserves
    theological breadth and avoids prematurely resolving whether the emphasis is on
    temptation, offense, or entrapment.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Representative masculine expression in δι’ οὗ
  chosen_reading: Rendered as 'the one through whom'
  alternative_readings:
  - him through whom
  - the person through whom
  rationale: This preserves the singular personal reference without importing unnecessary
    gender specificity in English, while remaining faithful to the Greek's representative
    singular force.
  doctrine_reference: Translation philosophy §4
