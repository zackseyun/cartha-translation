id: LUK.17.1
reference: Luke 17:1
source:
  edition: SBLGNT
  text: Εἶπεν δὲ πρὸς τοὺς μαθητὰς ⸀αὐτοῦ· Ἀνένδεκτόν ἐστιν τοῦ ⸂τὰ σκάνδαλα μὴ ἐλθεῖν⸃,
    ⸂πλὴν οὐαὶ⸃ δι’ οὗ ἔρχεται·
translation:
  text: Then he said to his disciples, “It is impossible for stumbling blocks not
    to come, but woe to the one through whom they come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for offenses not to come,' 'for causes of sin not to come,' or 'for
      temptations to sin not to come.' The Greek σκάνδαλα carries the sense of things
      that trip people up morally or spiritually.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  chosen: Then he said
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: δέ is lightly connective; 'Then' gives natural English narrative progression
    without overstating contrast.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is present in the text and should be represented.
    'Disciples' is the standard rendering of μαθηταί in Luke.
- source_word: Ἀνένδεκτόν ἐστιν
  chosen: It is impossible
  alternatives:
  - It is unavoidable
  - It is not possible
  lexicon: BDAG
  rationale: ἀνένδεκτος denotes something inadmissible or impossible. In this context
    Jesus states the inevitability of offenses; 'impossible' preserves the Greek form,
    while the following infinitive clause conveys the sense that their non-occurrence
    is impossible.
- source_word: τοῦ τὰ σκάνδαλα μὴ ἐλθεῖν
  chosen: for stumbling blocks not to come
  alternatives:
  - that stumbling blocks should not come
  - for causes of sin not to come
  - for offenses not to come
  lexicon: BDAG
  rationale: 'The articular infinitive construction with μή expresses what is impossible:
    the non-coming of σκάνδαλα. ''Stumbling blocks'' preserves the concrete metaphor
    of σκάνδαλα better than the more interpretive ''causes of sin,'' while still allowing
    moral and relational offense to be heard.'
- source_word: σκάνδαλα
  chosen: stumbling blocks
  alternatives:
  - offenses
  - causes of sin
  - temptations to sin
  lexicon: BDAG
  rationale: σκάνδαλον literally refers to a trap or stumbling cause and metaphorically
    to something that leads into sin or downfall. 'Stumbling blocks' keeps the metaphor
    visible and avoids narrowing the sense to only subjective offense.
- source_word: πλὴν οὐαὶ
  chosen: but woe
  alternatives:
  - nevertheless, woe
  - except that, woe
  lexicon: BDAG
  rationale: πλήν marks an exception or adversative qualification; in idiomatic English
    here, 'but woe' best captures the turn from inevitability to denunciation.
- source_word: δι’ οὗ
  chosen: to the one through whom
  alternatives:
  - to him through whom
  - to the person through whom
  lexicon: BDAG
  rationale: The relative pronoun is masculine singular and refers to a person. 'The
    one through whom' is natural English and preserves the representative singular.
- source_word: ἔρχεται
  chosen: they come
  alternatives:
  - it comes
  lexicon: BDAG
  rationale: 'Although the verb is singular in Greek, τὰ σκάνδαλα is the conceptual
    antecedent. English idiom prefers plural agreement: ''they come.'' This is a documented
    smoothing for readability.'
