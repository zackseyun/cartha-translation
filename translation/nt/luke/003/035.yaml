id: LUK.3.35
reference: Luke 3:35
source:
  edition: SBLGNT
  text: τοῦ Σεροὺχ τοῦ Ῥαγαὺ τοῦ Φάλεκ τοῦ Ἔβερ τοῦ Σαλὰ
translation:
  text: the son of Serug, the son of Reu, the son of Peleg, the son of Eber, the son
    of Shelah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''of Seruch, of Ragau, of Phalek, of Eber, of Sala.'' Luke’s genealogy
      uses an elliptical genitive chain; ''the son of'' is supplied from context for
      clear English.'
    reason: lexical_alternative
  - marker: b
    text: 'The names appear here in their standard English Old Testament forms: Serug,
      Reu, Peleg, Eber, Shelah.'
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    continues the implied filial formula from the surrounding context. Rendering each
    bare genitive simply as 'of' would be unnatural and obscure the genealogical sense
    in English. 'The son of' makes explicit the relationship that is syntactically
    elliptical but contextually clear.
- source_word: Σεροὺχ
  chosen: Serug
  alternatives:
  - Seruch
  lexicon: BDAG
  rationale: This is a transliterated personal name. 'Serug' follows standard English
    biblical convention aligned with the Hebrew genealogical name, improving recognizability
    while preserving the proper-name form.
- source_word: Ῥαγαὺ
  chosen: Reu
  alternatives:
  - Ragau
  lexicon: BDAG
  rationale: Although the Greek form is Ragau, the underlying patriarch is commonly
    known in English from the Hebrew tradition as 'Reu' (cf. Gen 11 genealogies).
    Per the philosophy of transliterating names by standard conventions, 'Reu' is
    the clearest standard English form.
- source_word: Φάλεκ
  chosen: Peleg
  alternatives:
  - Phalek
  lexicon: BDAG
  rationale: This proper name corresponds to the Hebrew Peleg. 'Peleg' is the standard
    English biblical form and better connects Luke’s genealogy with the Old Testament
    lineage.
- source_word: Ἔβερ
  chosen: Eber
  alternatives:
  - Heber
  lexicon: BDAG
  rationale: The Greek name corresponds to the Hebrew Eber. 'Eber' is the more precise
    standard form for this patriarch in Genesis 10–11, whereas 'Heber' can suggest
    other biblical figures.
- source_word: Σαλὰ
  chosen: Shelah
  alternatives:
  - Sala
  lexicon: BDAG
  rationale: The Greek form Sala corresponds to the Hebrew Shelah in the Genesis genealogy.
    Using 'Shelah' preserves canonical recognizability across Testaments and follows
    standard English naming convention for this figure.
