id: LUK.3.6
reference: Luke 3:6
source:
  edition: SBLGNT
  text: καὶ ὄψεται πᾶσα σὰρξ τὸ σωτήριον τοῦ θεοῦ.
translation:
  text: and all flesh will see the salvation of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity.' The Greek literally says 'all flesh,' echoing Isaiah
      40:5 and referring here to all people.
    reason: lexical_alternative
  - marker: b
    text: Or 'the salvation from God.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄψεται
  chosen: will see
  alternatives:
  - will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω, here functioning with straightforward future sense.
    'Will see' is natural modern English and preserves the concrete visual language
    better than a more elevated 'will behold'.
- source_word: πᾶσα σὰρξ
  chosen: all flesh
  alternatives:
  - all humanity
  - everyone
  lexicon: BDAG
  rationale: The phrase is a Semitic/prophetic idiom meaning all human beings, echoing
    Isaiah 40:5. Because σάρξ is a contested term with default rendering 'flesh' when
    literal, and because the idiom is theologically and intertextually important,
    the main text preserves 'all flesh' rather than flattening it to 'everyone' or
    'all humanity'.
- source_word: σωτήριον
  chosen: salvation
  alternatives:
  - saving act
  - deliverance
  lexicon: BDAG
  rationale: 'Used substantivally with the article: ''the salvation.'' ''Salvation''
    is the most direct and established rendering, preserving both the Isaianic background
    and the theological breadth of God''s saving work. ''Deliverance'' is possible
    but narrower in English.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is rendered formally as 'of God,' which can naturally convey
    source or possession in English while preserving the Greek construction. 'From
    God' is interpretive and therefore kept as an alternative rather than the main
    text.
