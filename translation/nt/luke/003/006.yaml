theological_decisions:
- issue: Meaning of the idiom πᾶσα σὰρξ
  chosen_reading: 'A universal human scope: all humanity will see God''s salvation.'
  alternative_readings:
  - A more literal but less idiomatic reading focused on 'all flesh' as corporeal
    creatures
  rationale: The phrase in context is an Isaiah citation and denotes humanity universally.
    Retaining 'all flesh' in the main text preserves the scriptural idiom and intertextual
    resonance without denying its human referent.
  doctrine_reference: 'DOCTRINE.md: σάρξ default rendering; preserve theological tension
    and original-language primacy'
