id: LUK.3.26
reference: Luke 3:26
source:
  edition: SBLGNT
  text: τοῦ Μάαθ τοῦ Ματταθίου τοῦ Σεμεῒν τοῦ ⸀Ἰωσὴχ τοῦ Ἰωδὰ
translation:
  text: the son of Maath, the son of Mattathias, the son of Semein, the son of Josech,
    the son of Joda,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek text is elliptical, repeating only 'of' with each name; English supplies
      'the son of' to make the genealogical relationship explicit from the surrounding
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article functions elliptically,
    continuing the genealogical formula from the surrounding context ('...the son
    of...'). Rendering each instance as bare 'of' would be formally closer but unnatural
    and unclear in English; supplying 'the son of' makes the implied relationship
    explicit and matches the syntax of the genealogy.
- source_word: Μάαθ
  chosen: Maath
  lexicon: BDAG
  rationale: Personal name transliterated rather than translated, following the project
    principle to transliterate names by standard conventions.
- source_word: Ματταθίου
  chosen: Mattathias
  alternatives:
  - Matthatias
  lexicon: BDAG
  rationale: Standard English transliteration of the Greek personal name Ματταθίας
    in the genitive form Ματταθίου. 'Mattathias' is the conventional and recognizable
    form.
- source_word: Σεμεῒν
  chosen: Semein
  alternatives:
  - Semein/Shemein
  lexicon: BDAG
  rationale: Personal name transliterated directly from the Greek form. 'Semein' preserves
    the Greek spelling most transparently in English.
- source_word: Ἰωσὴχ
  chosen: Josech
  alternatives:
  - Josec
  - Jorim-related forms
  lexicon: BDAG
  rationale: The SBLGNT reads Ἰωσήχ here; 'Josech' is a straightforward transliteration
    of that form. Alternative English spellings exist depending on how final chi is
    represented, but 'Josech' best reflects the Greek consonant.
- source_word: Ἰωδὰ
  chosen: Joda
  alternatives:
  - Joada
  lexicon: BDAG
  rationale: Personal name transliterated from the Greek Ἰωδά. 'Joda' is the most
    direct transliteration; 'Joada' reflects harmonization toward Hebrew-like forms
    but is less directly tied to the Greek spelling here.
