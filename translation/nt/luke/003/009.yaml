id: LUK.3.9
reference: Luke 3:9
source:
  edition: SBLGNT
  text: ἤδη δὲ καὶ ἡ ἀξίνη πρὸς τὴν ῥίζαν τῶν δένδρων κεῖται· πᾶν οὖν δένδρον μὴ ποιοῦν
    καρπὸν καλὸν ἐκκόπτεται καὶ εἰς πῦρ βάλλεται.
translation:
  text: And already the ax is laid at the root of the trees. Therefore every tree
    not producing good fruit is cut down and thrown into the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the axe lies at the root of the trees.'
    reason: lexical_alternative
  - marker: b
    text: Or 'not bearing good fruit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'cast into the fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - even now
  - now already
  lexicon: BDAG
  rationale: Conveys the immediacy of impending judgment; 'already' is natural English
    and preserves the temporal force.
- source_word: δὲ καὶ
  chosen: And
  alternatives:
  - Now also
  - Indeed also
  lexicon: BDAG
  rationale: The combination marks continuation with added emphasis. In English, a
    simple 'And' best carries the discourse flow without awkwardness; the additive
    force is still reflected by 'already' and the sentence structure.
- source_word: ἡ ἀξίνη
  chosen: the ax
  alternatives:
  - the axe
  lexicon: BDAG
  rationale: Refers to a chopping tool used in the metaphor of judgment. 'Ax' is standard
    American English spelling and clear for modern readers.
- source_word: πρὸς τὴν ῥίζαν
  chosen: at the root
  alternatives:
  - to the root
  - against the root
  lexicon: BDAG
  rationale: The preposition with this idiom indicates position/readiness at the root
    for cutting. 'At the root' is idiomatic English and preserves the image of imminent
    action.
- source_word: τῶν δένδρων
  chosen: of the trees
  lexicon: BDAG
  rationale: Straightforward genitive dependent on 'root'; plural retained.
- source_word: κεῖται
  chosen: is laid
  alternatives:
  - lies
  - has been placed
  lexicon: BDAG
  rationale: Although literally 'lies/is situated,' in this context with 'ax' English
    idiom prefers 'is laid,' conveying that it has been set in place and is ready.
- source_word: πᾶν οὖν δένδρον
  chosen: Therefore every tree
  alternatives:
  - So every tree
  - Then every tree
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding warning. 'Therefore' makes the
    logical consequence explicit and natural in English.
- source_word: μὴ ποιοῦν
  chosen: not producing
  alternatives:
  - not bearing
  - that does not make
  lexicon: BDAG
  rationale: The participle from ποιέω literally means 'doing/making,' but with 'fruit'
    English idiom is 'producing' or 'bearing.' 'Producing' preserves the verbal force
    without sounding wooden.
- source_word: καρπὸν καλὸν
  chosen: good fruit
  alternatives:
  - fruit that is good
  - fine fruit
  lexicon: BDAG
  rationale: A standard metaphor in the context of ethical/spiritual outcome. 'Good
    fruit' is both literal enough and idiomatic.
- source_word: ἐκκόπτεται
  chosen: is cut down
  alternatives:
  - is cut off
  lexicon: BDAG
  rationale: In the tree metaphor, 'cut down' is the most natural and vivid English
    equivalent.
- source_word: εἰς πῦρ βάλλεται
  chosen: thrown into the fire
  alternatives:
  - cast into the fire
  - thrown into fire
  lexicon: BDAG
  rationale: Passive present indicates the fate of the unfruitful tree. 'Thrown into
    the fire' is clear modern English while preserving the severity of the image.
