theological_decisions:
- issue: Metaphorical judgment imagery
  chosen_reading: Retain the agricultural metaphor of an ax at the root and trees
    thrown into the fire as a warning of imminent divine judgment without specifying
    beyond the text whether the fire refers to temporal judgment, eschatological judgment,
    or both.
  alternative_readings:
  - Interpret the fire specifically as hell
  - Interpret the image only as historical judgment on Israel
  rationale: The verse clearly communicates severe and imminent judgment, but the
    text itself does not narrowly define the full referent of the fire. Preserving
    the metaphor avoids importing a denominationally specific eschatological scheme.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
