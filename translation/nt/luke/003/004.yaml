id: LUK.3.4
reference: Luke 3:4
source:
  edition: SBLGNT
  text: ὡς γέγραπται ἐν βίβλῳ λόγων Ἠσαΐου τοῦ ⸀προφήτου· Φωνὴ βοῶντος ἐν τῇ ἐρήμῳ·
    Ἑτοιμάσατε τὴν ὁδὸν κυρίου, εὐθείας ποιεῖτε τὰς τρίβους αὐτοῦ.
translation:
  text: 'as it is written in the book of the words of Isaiah the prophet, “A voice
    of one crying in the wilderness: ‘Prepare the way of the Lord; make his paths
    straight.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD.” The quotation echoes Isaiah 40:3, where the Hebrew has the
      divine name YHWH.
    reason: alternative_reading
  - marker: b
    text: 'The phrase “in the wilderness” may be understood with “crying” as here,
      or with the command that follows: “A voice of one crying, ‘In the wilderness
      prepare the way of the Lord.’”'
    reason: alternative_reading
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard English rendering of the perfect passive formula introducing
    Scripture citation; preserves the ongoing authority/result nuance without awkwardness.
- source_word: βίβλῳ λόγων
  chosen: the book of the words
  alternatives:
  - the scroll of the words
  - the book
  lexicon: BDAG
  rationale: A relatively formal rendering that reflects both nouns. 'Book' is idiomatic
    in English, though the ancient object would have been a scroll; 'of the words'
    is retained because Luke includes it.
- source_word: Ἠσαΐου τοῦ προφήτου
  chosen: Isaiah the prophet
  alternatives:
  - Isaiah the prophet's
  lexicon: BDAG
  rationale: Natural appositional rendering of the genitive phrase identifying the
    source of the cited words.
- source_word: Φωνὴ βοῶντος
  chosen: A voice of one crying
  alternatives:
  - The voice of one crying
  - A voice crying out
  lexicon: BDAG
  rationale: Anarthrous φωνή is well represented by 'A voice'; βοῶντος is rendered
    with an explicit personal sense ('of one crying') to match the participle's genitive
    construction.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: '''Wilderness'' is the established and contextually apt rendering for
    ἔρημος here, evoking the prophetic setting and John’s location. The phrase is
    attached here to ''crying'' in line with the Greek wording as cited by Luke.'
- source_word: Ἑτοιμάσατε
  chosen: Prepare
  alternatives:
  - Get ready
  - Make ready
  lexicon: BDAG
  rationale: Imperative preserved directly; 'Prepare' is both natural and suitably
    formal for prophetic exhortation.
- source_word: τὴν ὁδὸν κυρίου
  chosen: the way of the Lord
  alternatives:
  - the Lord's way
  lexicon: BDAG
  rationale: Retains the scriptural idiom and preserves κύριος as 'Lord' per doctrine.
    'Way' here carries the metaphor of an approach/road prepared for the coming Lord.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per the contested-terms guidance, κύριος defaults to 'Lord.' Although
    the citation echoes Isaiah's reference to YHWH, the Greek text here reads κύριος,
    and the project's default for κύριος is 'Lord'; the covenantal background is worth
    preserving in a footnote rather than changing the main text to 'the LORD.'
- source_word: εὐθείας ποιεῖτε
  chosen: make ... straight
  alternatives:
  - make ... level
  - make straight
  lexicon: BDAG
  rationale: A natural English rendering of the predicate adjective plus verb construction,
    preserving the imperative force.
- source_word: τὰς τρίβους αὐτοῦ
  chosen: his paths
  alternatives:
  - his roads
  - his tracks
  lexicon: BDAG
  rationale: '''Paths'' is the most idiomatic and traditional rendering of τρίβοι
    here, fitting the road-preparation metaphor and parallelism with ''way.'''
