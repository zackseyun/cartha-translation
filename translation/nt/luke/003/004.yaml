theological_decisions:
- issue: Rendering κύριος in an Isaiah citation that originally refers to YHWH
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The project's contested-terms table sets κύριος → 'Lord' as the default.
    Because Luke cites Isaiah in Greek, the main text follows the Greek title while
    preserving the covenantal-background alternative in a footnote. This also leaves
    intact the christological resonance of applying the Lord-language in Luke's context
    without over-specifying in translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; YHWH → the LORD'
