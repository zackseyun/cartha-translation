id: LUK.3.10
reference: Luke 3:10
source:
  edition: SBLGNT
  text: Καὶ ἐπηρώτων αὐτὸν οἱ ὄχλοι λέγοντες· Τί οὖν ⸀ποιήσωμεν;
translation:
  text: And the crowds were asking him, saying, “What then should we do?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “What then shall we do?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτων
  chosen: were asking
  alternatives:
  - kept asking
  - asked
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action. 'Were asking' preserves
    the imperfect aspect in natural English without overtranslating.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the multitudes
  - the people
  lexicon: BDAG
  rationale: ὄχλοι is plural and refers to gathered masses of people. 'The crowds'
    is natural modern English and preserves the plural better than the more traditional
    singular 'the multitude.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle introduces the content of their question. 'Saying' is
    a straightforward and readable rendering that preserves the participial linkage.
- source_word: Τί οὖν
  chosen: What then
  alternatives:
  - What, then
  - So what
  lexicon: BDAG
  rationale: οὖν marks inference from John’s preceding exhortation. 'What then' preserves
    the logical connection without becoming colloquial.
- source_word: ποιήσωμεν
  chosen: should we do
  alternatives:
  - shall we do
  - are we to do
  lexicon: BDAG
  rationale: The aorist subjunctive in deliberative question form is idiomatically
    rendered in English as 'should we do?' This communicates the crowd’s request for
    practical response while remaining faithful to the Greek sense.
