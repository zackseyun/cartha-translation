id: LUK.3.38
reference: Luke 3:38
source:
  edition: SBLGNT
  text: τοῦ Ἐνὼς τοῦ Σὴθ τοῦ Ἀδὰμ τοῦ θεοῦ.
translation:
  text: the son of Enosh, the son of Seth, the son of Adam, the son of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek simply repeats the genitive pattern 'of Enosh, of Seth, of Adam, of
      God'; 'the son of' is supplied in English from the genealogy’s established syntax.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ Ἐνὼς
  chosen: the son of Enosh
  alternatives:
  - of Enosh
  lexicon: BDAG
  rationale: The repeated genitive article + proper name continues Luke’s genealogical
    formula from the preceding verse, with the implied relational noun 'son' carried
    over elliptically. Supplying 'the son of' in English is necessary for clarity
    and reflects the established syntax of the genealogy. Ἐνώς is transliterated as
    'Enosh' by standard convention for the Hebrew name.
- source_word: τοῦ Σὴθ
  chosen: the son of Seth
  alternatives:
  - of Seth
  lexicon: BDAG
  rationale: As with the preceding names, the genitive construction is elliptical
    within the genealogy and implies filiation. 'Seth' is the standard English transliteration
    of Σήθ.
- source_word: τοῦ Ἀδὰμ
  chosen: the son of Adam
  alternatives:
  - of Adam
  lexicon: BDAG
  rationale: The genealogy continues with the same implied filial relationship. 'Adam'
    is retained as the standard transliteration of the personal name Ἀδάμ, not translated
    as 'man,' because this is a proper name in a genealogical list.
- source_word: τοῦ θεοῦ
  chosen: the son of God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The final genitive matches the repeated genealogical pattern, so English
    should supply the same implied 'son of' here. This preserves Luke’s climactic
    conclusion that Adam is from God in the genealogical sense. Capitalizing 'God'
    reflects θεοῦ as the divine referent.
