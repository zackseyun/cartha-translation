theological_decisions:
- issue: Rendering the final phrase τοῦ θεοῦ in Adam’s genealogy
  chosen_reading: the son of God
  alternative_readings:
  - of God
  - from God
  rationale: The Greek is formally just a genitive phrase, but within Luke’s repeated
    genealogical chain the implied relationship is filial throughout. Rendering 'the
    son of God' preserves the literary pattern and the theological force of Adam’s
    direct derivation from God without importing later Christological sonship categories
    into Adam beyond what the genealogy itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence; translate according to source syntax and context.
