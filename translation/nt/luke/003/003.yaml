id: LUK.3.3
reference: Luke 3:3
source:
  edition: SBLGNT
  text: καὶ ἦλθεν εἰς ⸀πᾶσαν περίχωρον τοῦ Ἰορδάνου κηρύσσων βάπτισμα μετανοίας εἰς
    ἄφεσιν ἁμαρτιῶν,
translation:
  text: And he came into all the surrounding region of the Jordan, proclaiming a baptism
    of repentance for the forgiveness of sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the whole region around the Jordan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'preaching' instead of 'proclaiming.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is most naturally rendered 'came.' English narrative
    style commonly uses 'came' here without needing to specify direction more dynamically.
- source_word: εἰς πᾶσαν περίχωρον τοῦ Ἰορδάνου
  chosen: into all the surrounding region of the Jordan
  alternatives:
  - throughout the whole region around the Jordan
  - into the entire district around the Jordan
  lexicon: BDAG
  rationale: περίχωρος denotes the surrounding region/district. Retaining 'all' reflects
    πᾶσαν, while 'of the Jordan' preserves the genitive construction closely. 'Into'
    reflects εἰς, though the phrase idiomatically implies movement throughout the
    area.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - heralding
  lexicon: BDAG
  rationale: κηρύσσω is the public announcement of a herald. 'Proclaiming' preserves
    that force in readable modern English better than the more church-associated 'preaching,'
    though that remains a valid alternative.
- source_word: βάπτισμα
  chosen: baptism
  lexicon: BDAG
  rationale: The noun directly denotes baptism/ritual washing. 'Baptism' is the standard
    and clearest rendering here.
- source_word: μετανοίας
  chosen: of repentance
  alternatives:
  - for repentance
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as 'of repentance,' preserving
    the close association between the baptism and repentance without over-interpreting
    the relationship.
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  chosen: for the forgiveness of sins
  alternatives:
  - unto forgiveness of sins
  - for release from sins
  lexicon: BDAG
  rationale: ἄφεσις commonly means forgiveness/remission/release. In this context,
    'for the forgiveness of sins' is the most natural English rendering and matches
    the phrase's established sense without forcing a sacramental or merely symbolic
    interpretation.
