theological_decisions:
- issue: Relation of baptism, repentance, and forgiveness
  chosen_reading: Rendered the phrase as 'a baptism of repentance for the forgiveness
    of sins' without specifying whether baptism is instrumental, evidential, or declarative
    with respect to forgiveness.
  alternative_readings:
  - a baptism signifying repentance leading to forgiveness
  - a baptism through which repentance is expressed for forgiveness
  rationale: The Greek construction βάπτισμα μετανοίας εἰς ἄφεσιν ἁμαρτιῶν should
    be translated transparently, preserving the theological tension rather than resolving
    later sacramental debates in the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
