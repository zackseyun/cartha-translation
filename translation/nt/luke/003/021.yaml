id: LUK.3.21
reference: Luke 3:21
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ βαπτισθῆναι ἅπαντα τὸν λαὸν καὶ Ἰησοῦ βαπτισθέντος καὶ προσευχομένου
    ἀνεῳχθῆναι τὸν οὐρανὸν
translation:
  text: Now it happened that when all the people were baptized, and Jesus also had
    been baptized and was praying, heaven was opened,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sky was opened.' The Greek can denote either the visible sky or
      heaven, but in this context the revelatory sense 'heaven' best fits the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: Now it happened
  alternatives:
  - And it happened
  - It happened
  lexicon: BDAG
  rationale: Common Lukan narrative formula introducing a new scene. 'Now it happened'
    is natural modern English while preserving the eventive force better than omitting
    the verb.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - then
  - ', (untranslated)'
  lexicon: BDAG
  rationale: δέ marks narrative progression. 'Now' conveys transition in readable
    English without overstating contrast.
- source_word: ἐν τῷ βαπτισθῆναι
  chosen: when ... were baptized
  alternatives:
  - in the baptizing of
  - during the being baptized
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal here. English idiom is best
    expressed with 'when' rather than a more wooden construction.
- source_word: ἅπαντα τὸν λαὸν
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: BDAG
  rationale: ἅπαντα with τὸν λαόν means the people as a whole. 'All the people' is
    the most natural and sufficiently broad rendering.
- source_word: καὶ Ἰησοῦ βαπτισθέντος
  chosen: and Jesus also had been baptized
  alternatives:
  - and Jesus having been baptized
  - and when Jesus too was baptized
  lexicon: BDAG
  rationale: The genitive absolute adds Jesus to the temporal setting. 'Also' reflects
    καί's additive force, and the pluperfect-like English 'had been baptized' fits
    the participial sequence before 'was praying.'
- source_word: καὶ προσευχομένου
  chosen: and was praying
  alternatives:
  - and praying
  - while he was praying
  lexicon: BDAG
  rationale: A second participle in the genitive absolute, contemporaneous with the
    main event. 'Was praying' makes the ongoing action clear in natural English.
- source_word: ἀνεῳχθῆναι
  chosen: was opened
  alternatives:
  - opened
  - was split open
  lexicon: BDAG
  rationale: Aorist passive infinitive dependent on Ἐγένετο, expressing what happened.
    'Was opened' preserves the passive and avoids importing Mark's stronger imagery
    of tearing.
- source_word: τὸν οὐρανὸν
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: BDAG
  rationale: 'Singular οὐρανός here refers to the heavenly realm, not merely the visible
    sky. English idiom normally omits the article: ''heaven was opened.'''
