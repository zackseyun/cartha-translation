theological_decisions:
- issue: Reference of οὐρανός in the baptism scene
  chosen_reading: heaven
  alternative_readings:
  - the sky
  rationale: The context is revelatory and theologically charged, immediately preceding
    the Spirit's descent and the divine voice. 'Heaven' preserves that vertical, divine
    sense without over-interpretation.
  doctrine_reference: 'Translation philosophy: preserve source-text sense and theological
    weight without flattening.'
