id: LUK.3.5
reference: Luke 3:5
source:
  edition: SBLGNT
  text: πᾶσα φάραγξ πληρωθήσεται καὶ πᾶν ὄρος καὶ βουνὸς ταπεινωθήσεται, καὶ ἔσται
    τὰ σκολιὰ εἰς ⸀εὐθείαν καὶ αἱ τραχεῖαι εἰς ὁδοὺς λείας·
translation:
  text: Every valley will be filled, and every mountain and hill will be made low,
    and the crooked places will become straight, and the rough ways smooth roads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every ravine will be filled ... the crooked things will become straight,
      and the rough places smooth roads.'
    reason: lexical_alternative
  - marker: b
    text: This line echoes Isaiah 40:4, using road-building imagery for the preparation
      of the Lord's way.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶσα φάραγξ
  chosen: Every valley
  alternatives:
  - Every ravine
  - Every gorge
  lexicon: BDAG
  rationale: φάραγξ denotes a valley, ravine, or gorge. 'Valley' is the most natural
    and readable English in this prophetic leveling image, while still fitting the
    Isaiah allusion behind the verse.
- source_word: πληρωθήσεται
  chosen: will be filled
  alternatives:
  - will be filled up
  lexicon: BDAG
  rationale: Future passive of πληρόω. 'Will be filled' is the plain sense and idiomatic
    in English for terrain imagery.
- source_word: πᾶν ὄρος καὶ βουνός
  chosen: every mountain and hill
  lexicon: BDAG
  rationale: 'ὄρος and βουνός are near-synonyms but distinct enough to preserve both:
    larger ''mountain'' and smaller ''hill.'' Retaining both reflects the poetic fullness
    of the source.'
- source_word: ταπεινωθήσεται
  chosen: will be made low
  alternatives:
  - will be humbled
  - will be lowered
  lexicon: BDAG
  rationale: In this topographical context, the passive of ταπεινόω refers to lowering
    elevated ground. 'Will be made low' preserves both the physical image and the
    prophetic resonance better than the more abstract 'humbled.'
- source_word: τὰ σκολιά
  chosen: the crooked places
  alternatives:
  - the crooked things
  - the crooked paths
  lexicon: BDAG
  rationale: The neuter plural adjective is used substantivally. Because the verse
    is describing landscape and roadway preparation, 'crooked places' best conveys
    the sense without over-specifying beyond the Greek.
- source_word: εἰς εὐθείαν
  chosen: will become straight
  alternatives:
  - into straightness
  - into a straight path
  lexicon: BDAG
  rationale: The construction expresses result or transformation. 'Will become straight'
    is idiomatic English and preserves the imagery of what is crooked being straightened.
- source_word: αἱ τραχεῖαι
  chosen: the rough ways
  alternatives:
  - the rough places
  - the rough roads
  lexicon: BDAG
  rationale: The feminine plural adjective is substantival and likely elliptical in
    relation to roads/ways. 'Ways' keeps the path imagery while avoiding adding a
    noun too early that the following ὁδοὺς already supplies.
- source_word: εἰς ὁδοὺς λείας
  chosen: smooth roads
  alternatives:
  - smooth ways
  - level roads
  lexicon: BDAG
  rationale: ὁδοὺς is explicitly present here, and λείας means smooth or level. 'Smooth
    roads' gives clear modern English and fits the road-preparation imagery of the
    context.
