theological_decisions:
- issue: Prophetic/topographical imagery from Isaiah 40:4 quoted in Luke
  chosen_reading: Retain the concrete terrain-and-road imagery rather than paraphrasing
    it into purely moral or spiritual language.
  alternative_readings:
  - Interpretive paraphrases such as 'the humble will be exalted and the proud brought
    low'
  rationale: Although the imagery can carry theological implications, Luke's wording
    here is a citation with concrete landscape language. Preserving the literal imagery
    maintains the text's poetic force and avoids importing an interpretation into
    the translation itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
