theological_decisions:
- issue: Relation of 'as was supposed' to Jesus' sonship and Joseph
  chosen_reading: Render the phrase parenthetically to indicate that Joseph's paternity was publicly assumed, not asserted by Luke as biological fact.
  alternative_readings:
  - Render without parentheses and leave the qualification less explicit
  - Interpret the phrase as merely a social note with no theological significance
  rationale: 'In Luke''s narrative context, especially after the virgin conception account, the parenthetical wording preserves the text''s tension: Jesus is legally/socially reckoned as Joseph''s son, while Luke has already indicated an extraordinary conception. This avoids importing more than the verse says while remaining consistent with historic orthodoxy.'
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Whether to add 'of age' or 'ministry' for clarity
  chosen_reading: Do not add 'ministry' to the main text; render only 'when he began.'
  alternative_readings:
  - when he began his ministry
  - being about thirty years of age, beginning
  rationale: The context strongly suggests the beginning of Jesus' public ministry, but the noun is absent. The main text should not import a doctrinally or narratively true detail beyond what the Greek explicitly states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
revisions:
- timestamp: '2026-04-21T12:34:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/003/023.json
  category: awkward_english
  tier: 1
  from: was about thirty years old when he began
  to: when he began, was about thirty years old
  rationale: The current word order makes the age the primary statement and the 'beginning' a subordinate temporal clause. The Greek structure, with the periphrastic construction 'ἦν...ἀρχόμενος' ('was beginning'), places more emphasis on the action of 'beginning.' Reordering the English clause to '...when he began, was about thirty years old' better reflects the Greek emphasis and results in a more natural and common English phrasing for this type of construction.
