id: LUK.3.19
reference: Luke 3:19
source:
  edition: SBLGNT
  text: ὁ δὲ Ἡρῴδης ὁ τετραάρχης, ἐλεγχόμενος ὑπ’ αὐτοῦ περὶ Ἡρῳδιάδος τῆς γυναικὸς
    τοῦ ἀδελφοῦ αὐτοῦ καὶ περὶ πάντων ὧν ἐποίησεν πονηρῶν ὁ Ἡρῴδης,
translation:
  text: But Herod the tetrarch, being rebuked by him concerning Herodias, his brother’s
    wife, and concerning all the evil things Herod had done,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being reproved' or 'being exposed.' The Greek participle can carry the
      sense of moral rebuke or exposure of wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: τετραάρχης
  chosen: tetrarch
  alternatives:
  - ruler of a fourth part
  - district ruler
  lexicon: BDAG
  rationale: Retained as the historical-political title rather than flattening to
    'ruler,' since it is a specific office and is reasonably accessible in English.
- source_word: ἐλεγχόμενος
  chosen: being rebuked
  alternatives:
  - being reproved
  - being exposed
  - being confronted
  lexicon: BDAG
  rationale: The participle indicates ongoing or contemporaneous action. 'Being rebuked'
    captures moral censure in context better than the more neutral 'confronted' or
    the more forensic 'exposed.'
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by John
  lexicon: BDAG
  rationale: The pronoun refers to John the Baptist from context, but the Greek uses
    a pronoun, so the translation preserves that form rather than making the referent
    explicit in the main text.
- source_word: περὶ Ἡρῳδιάδος
  chosen: concerning Herodias
  alternatives:
  - about Herodias
  lexicon: BDAG
  rationale: '''Concerning'' preserves the repeated περὶ structure and keeps the formal
    linkage with the following phrase.'
- source_word: τῆς γυναικὸς τοῦ ἀδελφοῦ αὐτοῦ
  chosen: his brother’s wife
  alternatives:
  - the wife of his brother
  lexicon: BDAG
  rationale: This is the most natural modern English rendering of the genitive chain
    while preserving the possessive relationship central to the accusation.
- source_word: καὶ περὶ πάντων ὧν ἐποίησεν πονηρῶν
  chosen: and concerning all the evil things Herod had done
  alternatives:
  - and about all the wicked things Herod did
  - and concerning all the evils that Herod committed
  lexicon: BDAG
  rationale: The construction refers broadly to Herod's evil deeds. 'Evil things'
    is clear modern English and preserves the plural sense of πονηρῶν.
- source_word: πονηρῶν
  chosen: evil things
  alternatives:
  - wicked things
  - evils
  lexicon: BDAG
  rationale: '''Evil'' is the most direct and broadly understandable rendering. ''Wicked''
    is possible but slightly more stylized; ''evils'' is less idiomatic in this context.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: '''But'' appropriately marks the narrative contrast with the preceding
    material and is idiomatic at the head of the sentence.'
