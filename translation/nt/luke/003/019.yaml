theological_decisions:
- issue: Moral force of John's criticism of Herod
  chosen_reading: Rendered ἐλεγχόμενος as 'being rebuked' to preserve the text's sense
    of prophetic moral censure without expanding into explicit legal or theological
    commentary.
  alternative_readings:
  - being reproved
  - being exposed
  rationale: The verse presents John as condemning Herod's conduct, especially regarding
    Herodias and other evils. The translation preserves that ethical force while avoiding
    interpretive overstatement.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
