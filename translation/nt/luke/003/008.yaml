theological_decisions:
- issue: Meaning of 'fruits worthy of repentance'
  chosen_reading: The phrase refers to outward actions that correspond to and demonstrate
    genuine repentance, without implying that such actions earn forgiveness.
  alternative_readings:
  - The phrase could be paraphrased more dynamically as 'fruit in keeping with repentance'
  rationale: The Greek joins 'fruits' with 'worthy of repentance,' emphasizing congruence
    between conduct and repentance. The translation preserves that ethical-theological
    tension without importing a doctrine of meritorious works.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Status of Abrahamic descent
  chosen_reading: John rejects reliance on physical descent from Abraham as sufficient
    grounds for security before God.
  rationale: The verse directly challenges confidence in ancestry while affirming
    God's freedom and power to create true children for Abraham apart from presumed
    lineage. The translation keeps this polemical force without adding later doctrinal
    formulations.
  doctrine_reference: Affirmations; Translation philosophy §3
