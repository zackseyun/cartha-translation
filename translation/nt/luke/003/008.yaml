id: LUK.3.8
reference: Luke 3:8
source:
  edition: SBLGNT
  text: ποιήσατε οὖν καρποὺς ἀξίους τῆς μετανοίας· καὶ μὴ ἄρξησθε λέγειν ἐν ἑαυτοῖς·
    Πατέρα ἔχομεν τὸν Ἀβραάμ, λέγω γὰρ ὑμῖν ὅτι δύναται ὁ θεὸς ἐκ τῶν λίθων τούτων
    ἐγεῖραι τέκνα τῷ Ἀβραάμ.
translation:
  text: Therefore produce fruits worthy of a changed mind, and do not begin to say among
    yourselves, ‘We have Abraham as our father,’ for I tell you that God is able to
    raise up children for Abraham from these stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fruit worthy of repentance' or 'fruit in keeping with repentance.' The
      Greek has the plural 'fruits' and emphasizes conduct that matches genuine repentance.
    reason: lexical_alternative
  - marker: b
    text: Or 'within yourselves' or 'to yourselves.' The phrase may refer either to
      inward self-talk or to what they say among their own group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσατε
  chosen: produce
  alternatives:
  - bear
  - make
  - do
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action. 'Produce' fits the idiom
    with 'fruits' in English better than the more literal 'make' or 'do,' while preserving
    the command's force.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding warning; 'Therefore' preserves the
    logical connection more explicitly than 'So' or 'Then'.
- source_word: καρποὺς
  chosen: fruits
  alternatives:
  - fruit
  lexicon: BDAG
  rationale: Plural in Greek; retaining 'fruits' reflects multiple evidences or outcomes
    rather than flattening to the collective singular.
- source_word: ἀξίους
  chosen: worthy of
  alternatives:
  - fit for
  - in keeping with
  lexicon: BDAG
  rationale: The adjective denotes correspondence or suitability. 'Worthy of' is direct
    and traditional; the sense is that the fruits must match genuine repentance.
- source_word: τῆς μετανοίας
  chosen: a changed mind
  alternatives:
  - a change of mind
  - turning
  lexicon: BDAG
  rationale: Standard rendering for μετάνοια in this context of moral and spiritual
    turning. Alternatives are possible but less idiomatic here.
- source_word: μὴ ἄρξησθε λέγειν
  chosen: do not begin to say
  alternatives:
  - do not start saying
  - do not presume to say
  lexicon: BDAG
  rationale: The construction with μή + aorist middle subjunctive of ἄρχω plus infinitive
    is naturally rendered 'do not begin to say.' It warns against even initiating
    this line of self-justifying speech.
- source_word: ἐν ἑαυτοῖς
  chosen: among yourselves
  alternatives:
  - to yourselves
  - within yourselves
  lexicon: BDAG
  rationale: The phrase can mean inwardly or within the group. Here it likely refers
    to what they say in their own circle or to one another; 'among yourselves' captures
    the plural reflexive setting without over-psychologizing the phrase.
- source_word: Πατέρα ἔχομεν τὸν Ἀβραάμ
  chosen: We have Abraham as our father
  alternatives:
  - Abraham is our father
  - We have Abraham for a father
  lexicon: BDAG
  rationale: This preserves the emphatic appeal to Abrahamic descent while using natural
    English. 'As our father' makes explicit the relational claim implied by the accusative
    construction.
- source_word: λέγω γὰρ ὑμῖν
  chosen: for I tell you
  alternatives:
  - for I say to you
  lexicon: BDAG
  rationale: Idiomatic modern English that preserves the solemn assertion formula.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: '''Is able'' preserves the sense of capability more fully and sounds
    weightier in this pronouncement.'
- source_word: ἐκ τῶν λίθων τούτων
  chosen: from these stones
  alternatives:
  - out of these stones
  lexicon: BDAG
  rationale: Both are possible for ἐκ; 'from' is smoother in contemporary English
    while preserving source meaning.
- source_word: ἐγεῖραι
  chosen: to raise up
  alternatives:
  - to bring forth
  - to create
  lexicon: BDAG
  rationale: The verb can mean raise up, bring into being, or cause to appear. 'Raise
    up' is the most natural and traditional choice here, conveying God's power to
    produce descendants unexpectedly.
- source_word: τέκνα
  chosen: children
  alternatives:
  - descendants
  - sons
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and denotes offspring. 'Children' preserves
    the familial image better than 'descendants,' though the latter is conceptually
    present.
- source_word: τῷ Ἀβραάμ
  chosen: for Abraham
  alternatives:
  - to Abraham
  lexicon: BDAG
  rationale: 'The dative here is best understood as advantage/reference: God can raise
    up children for Abraham, that is, belonging to him as offspring.'
