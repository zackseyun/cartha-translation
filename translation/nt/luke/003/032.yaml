id: LUK.3.32
reference: Luke 3:32
source:
  edition: SBLGNT
  text: τοῦ Ἰεσσαὶ τοῦ Ἰωβὴλ τοῦ Βόος τοῦ ⸀Σαλὰ τοῦ Ναασσὼν
translation:
  text: the son of Jesse, the son of Jobed, the son of Boaz, the son of Sala, the
    son of Nahshon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jobed is traditionally rendered Obed.
    reason: alternative_reading
  - marker: b
    text: Sala is traditionally identified with Salmon.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically, continuing the genealogical formula from the preceding
    verse(s). Supplying 'the son of' in English makes the relationship explicit and
    readable, rather than leaving a bare chain of genitives.
- source_word: Ἰεσσαὶ
  chosen: Jesse
  alternatives:
  - Jessee
  lexicon: BDAG
  rationale: Standard English transliteration/form for the biblical name Ἰεσσαί, matching
    established usage and corresponding to the OT figure Jesse.
- source_word: Ἰωβὴλ
  chosen: Jobed
  alternatives:
  - Obed
  - Iobed
  lexicon: BDAG
  rationale: The Greek form here is Ἰωβήλ, which is more directly represented in English
    as 'Jobed' than the traditional harmonized form 'Obed.' Following original-language
    primacy, the translation reflects Luke’s Greek form rather than conforming it
    to the more familiar OT spelling. The traditional equivalent is preserved in a
    footnote.
- source_word: Βόος
  chosen: Boaz
  alternatives:
  - Booz
  lexicon: BDAG
  rationale: Although the Greek form is Βόος, standard English biblical usage renders
    the name as 'Boaz,' corresponding to the well-known OT figure. This is a conventional
    transliteration/equivalent rather than a strict letter-for-letter transliteration.
- source_word: Σαλὰ
  chosen: Sala
  alternatives:
  - Salmon
  - Salah
  lexicon: BDAG
  rationale: The Greek text reads Σαλά. To preserve original-language primacy, the
    translation uses 'Sala' rather than harmonizing to the more familiar OT form 'Salmon.'
    The traditional equivalent is preserved in a footnote.
- source_word: Ναασσὼν
  chosen: Nahshon
  alternatives:
  - Naasson
  lexicon: BDAG
  rationale: Standard English form of the biblical name corresponding to Ναασσών,
    reflecting common transliteration practice and OT usage.
