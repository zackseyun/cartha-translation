id: LUK.3.12
reference: Luke 3:12
source:
  edition: SBLGNT
  text: ἦλθον δὲ καὶ τελῶναι βαπτισθῆναι καὶ εἶπαν πρὸς αὐτόν· Διδάσκαλε, τί ⸀ποιήσωμεν;
translation:
  text: Even tax collectors came to be baptized, and they said to him, “Teacher, what
    should we do?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tax collectors also came to be baptized.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  chosen: came
  alternatives:
  - were coming
  lexicon: BDAG
  rationale: 'Aorist indicative of ἔρχομαι is most naturally rendered as a simple
    past event here: they came.'
- source_word: δὲ
  chosen: Even
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: 'δέ marks progression, and with καὶ before τελῶναι the sense is additive/emphatic:
    ''even'' or ''also.'' ''Even'' best captures the surprising inclusion of tax collectors
    in context.'
- source_word: καὶ τελῶναι
  chosen: tax collectors
  alternatives:
  - tax collectors also
  - revenue agents
  lexicon: BDAG
  rationale: τελῶναι refers to tax collectors. The additive force of καὶ is absorbed
    into 'Even' at the start for natural English style while preserving emphasis.
- source_word: βαπτισθῆναι
  chosen: to be baptized
  alternatives:
  - for baptism
  lexicon: BDAG
  rationale: 'Aorist passive infinitive after ἦλθον expresses purpose: they came in
    order to be baptized.'
- source_word: εἶπαν πρὸς αὐτόν
  chosen: they said to him
  alternatives:
  - they asked him
  lexicon: BDAG
  rationale: λέγω with πρὸς + accusative is straightforwardly 'said to.' Although
    the content is a question, the Greek verb is not specifically 'ask,' so 'said
    to him' is retained.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  - Rabbi
  lexicon: BDAG
  rationale: διδάσκαλος as direct address is best rendered 'Teacher.' 'Master' can
    imply authority more than instruction, and 'Rabbi' would be a transliteration
    rather than a translation.
- source_word: τί ποιήσωμεν
  chosen: what should we do?
  alternatives:
  - what are we to do?
  - what shall we do?
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive asks for proper action. 'What should
    we do?' communicates the practical and ethical force in clear modern English.
