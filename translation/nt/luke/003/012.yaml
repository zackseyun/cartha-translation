theological_decisions:
- issue: Socially stigmatized group addressed in John's call to repentance
  chosen_reading: Render τελῶναι plainly as 'tax collectors' and preserve the emphatic
    inclusion with 'Even.'
  alternative_readings:
  - Tax collectors also came to be baptized
  rationale: The verse highlights that even a morally suspect group in the narrative
    setting responds to John's message. The translation should preserve that rhetorical
    force without adding interpretive commentary.
  doctrine_reference: Translation philosophy §§1, 6
