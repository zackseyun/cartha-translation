theological_decisions:
- issue: Contextual specification of the implied object in πράσσετε
  chosen_reading: 'Make the action explicit as tax collection: ''Collect no more than
    what has been ordered for you.'''
  alternative_readings:
  - Do no more than what has been ordered for you.
  - Exact no more than what has been appointed you.
  rationale: This is not a doctrinally contested issue but a translation-philosophy
    decision. Because the audience is tax collectors in the immediately preceding
    verse, English requires the implied activity to be supplied for clarity. This
    follows optimal equivalence without adding new content beyond what the discourse
    context warrants.
  doctrine_reference: Translation philosophy §1, §6
