id: LUK.3.13
reference: Luke 3:13
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν πρὸς αὐτούς· Μηδὲν πλέον παρὰ τὸ διατεταγμένον ὑμῖν πράσσετε.
translation:
  text: And he said to them, “Collect no more than what has been ordered for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Do nothing more than what has been ordered for you.”
      The verb refers specifically to their tax-collecting activity in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: And he
  alternatives:
  - But he
  - Then he
  lexicon: BDAG
  rationale: δέ is a mild connective that can be rendered variously depending on English
    flow. 'And he' preserves narrative continuity naturally in modern English without
    overstating contrast.
- source_word: εἶπεν πρὸς αὐτούς
  chosen: said to them
  alternatives:
  - told them
  - said to them all
  lexicon: BDAG
  rationale: A standard rendering of λέγω + πρός with indirect object. 'Said to them'
    is straightforward and sufficiently formal.
- source_word: Μηδὲν πλέον
  chosen: no more
  alternatives:
  - nothing more
  - not anything beyond
  lexicon: BDAG
  rationale: The combination expresses prohibition of excess. 'No more' is idiomatic
    English and pairs naturally with the implied object of tax collection in context.
- source_word: παρὰ τὸ διατεταγμένον ὑμῖν
  chosen: than what has been ordered for you
  alternatives:
  - than what has been appointed to you
  - than what has been prescribed for you
  - beyond what was authorized for you
  lexicon: BDAG
  rationale: διατεταγμένον, perfect passive participle of διατάσσω, denotes what has
    been ordered, prescribed, or appointed. 'Ordered for you' preserves the passive
    sense and official/regulatory nuance in context.
- source_word: πράσσετε
  chosen: Collect
  alternatives:
  - do
  - exact
  - collect taxes
  lexicon: BDAG
  rationale: Although πράσσω broadly means 'do/practice,' in this immediate context
    John is addressing tax collectors (v. 12), so the verb refers specifically to
    carrying out tax collection. Rendering it as 'Collect' makes explicit the contextual
    object required by natural English while staying within the source sense.
