theological_decisions:
- issue: Force of εὐηγγελίζετο in relation to John's ministry
  chosen_reading: Rendered as 'was proclaiming the good news' even though the speaker
    is John the Baptist, because the Greek explicitly presents his message as good
    news.
  alternative_readings:
  - was preaching
  - was announcing
  rationale: The text itself characterizes John's exhortatory preaching as gospel
    proclamation. The translation should preserve that theological nuance rather than
    flatten it to generic preaching.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
