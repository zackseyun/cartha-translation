id: LUK.3.24
reference: Luke 3:24
source:
  edition: SBLGNT
  text: τοῦ Μαθθὰτ τοῦ Λευὶ τοῦ Μελχὶ τοῦ Ἰανναὶ τοῦ Ἰωσὴφ
translation:
  text: the son of Matthat, the son of Levi, the son of Melchi, the son of Jannai,
    the son of Joseph,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'of Matthat, of Levi, of Melchi, of Jannai, of Joseph.'
      The Greek continues the genealogy with repeated genitives, implying 'the son
      of' from the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically within the larger formula established in the surrounding
    context ('...the son of...'). Supplying 'the son of' in English makes the genealogy
    intelligible and reflects the implied relationship rather than leaving a bare
    string of genitives.
- source_word: Μαθθὰτ
  chosen: Matthat
  alternatives:
  - Mattath
  lexicon: BDAG
  rationale: Personal names are transliterated rather than translated, following project
    philosophy. 'Matthat' is a standard English transliteration of Μαθθάτ.
- source_word: Λευὶ
  chosen: Levi
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Λευί.
- source_word: Μελχὶ
  chosen: Melchi
  alternatives:
  - Melchii
  lexicon: BDAG
  rationale: Standard English transliteration of Μελχί. 'Melchi' is the conventional
    readable form in English genealogical lists.
- source_word: Ἰανναὶ
  chosen: Jannai
  alternatives:
  - Janna
  lexicon: BDAG
  rationale: Transliterated as 'Jannai' to reflect the Greek form Ἰανναί. Some English
    versions simplify to 'Janna,' but 'Jannai' more closely represents the source
    form.
- source_word: Ἰωσὴφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Standard English transliteration of Ἰωσήφ.
