theological_decisions:
- issue: Genealogical ellipsis
  chosen_reading: Explicitly supply 'the son of' before each name
  alternative_readings:
  - Retain a more formal bare genitive chain such as 'of Matthat, of Levi, of Melchi,
    of Jannai, of Joseph'
  rationale: The Greek in this verse is a continuation of Luke’s genealogy and depends
    syntactically on the repeated filial formula from the surrounding verses. Supplying
    the implied relationship is necessary for clear English and does not add new content
    beyond what the genealogy conventionally expresses.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
