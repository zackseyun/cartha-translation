theological_decisions:
- issue: Referent and force of ἐπὶ πᾶσιν
  chosen_reading: The phrase refers to Herod adding this act to all his previous evil
    deeds.
  alternative_readings:
  - The phrase could be rendered more literally as 'upon all' or 'in addition to all
    these things.'
  rationale: The immediate context (vv. 19–20) recounts Herod's evils and then states
    that he added one more by imprisoning John. The translation makes the cumulative
    sense explicit in idiomatic English without importing extra theological content.
  doctrine_reference: Translation philosophy §1, §5
