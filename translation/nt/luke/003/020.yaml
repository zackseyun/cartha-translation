id: LUK.3.20
reference: Luke 3:20
source:
  edition: SBLGNT
  text: προσέθηκεν καὶ τοῦτο ἐπὶ πᾶσιν, ⸀καὶ κατέκλεισεν τὸν Ἰωάννην ⸀ἐν φυλακῇ.
translation:
  text: 'He added this also to them all: he locked John up in prison.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'He added this also to all of them.' The sense is that
      Herod added this act to all his other evil deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθηκεν
  chosen: added
  alternatives:
  - added on
  - went on to add
  lexicon: BDAG
  rationale: The aorist of προστίθημι here idiomatically means to add one more act
    to previous actions. 'Added' is concise and natural English while preserving the
    cumulative sense.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this too
  - this also
  lexicon: BDAG
  rationale: The demonstrative points to the specific further deed that follows. 'This'
    is retained in the main text, with the additive force carried by 'also' in English.
- source_word: ἐπὶ πᾶσιν
  chosen: to them all
  alternatives:
  - to all of them
  - on top of them all
  - in addition to them all
  lexicon: BDAG
  rationale: This idiom means 'in addition to all [the previous things].' Because
    the immediately preceding context concerns Herod's evil deeds, the phrase is best
    represented as adding this deed to all the others. 'To them all' is idiomatic
    English for the cumulative force, rather than a wooden 'upon all.'
- source_word: κατέκλεισεν
  chosen: locked ... up
  alternatives:
  - shut up
  - confined
  - imprisoned
  lexicon: BDAG
  rationale: κατακλείω literally means to shut in or confine. 'Locked ... up' preserves
    the concrete force and reads naturally in modern English. 'Imprisoned' is possible
    but would partially duplicate the following phrase 'in prison.'
- source_word: Ἰωάννην
  chosen: John
  rationale: Personal names are transliterated by standard English convention.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in a prison
  - in custody
  lexicon: BDAG
  rationale: φυλακή here denotes a place of confinement. 'In prison' is the most natural
    English expression and fits the narrative context.
