id: LUK.3.29
reference: Luke 3:29
source:
  edition: SBLGNT
  text: τοῦ ⸀Ἰησοῦ τοῦ Ἐλιέζερ τοῦ Ἰωρὶμ τοῦ Μαθθὰτ τοῦ Λευὶ
translation:
  text: the son of Jeshua, the son of Eliezer, the son of Jorim, the son of Matthat,
    the son of Levi,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek simply repeats 'of' with each name; the translation supplies 'the
      son of' to make the genealogical relationship explicit in English, following
      the pattern of the surrounding verses.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus' or 'Joshua.' The Greek name can represent any of these forms;
      'Jeshua' is used here to avoid confusion with Jesus the Messiah in this genealogy.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each name continues
    the implied filial formula from the surrounding context. Rendering each instance
    merely as 'of' would be formally possible but unnatural and unclear in English;
    'the son of' makes the genealogical relationship explicit without adding meaning
    beyond the established pattern.
- source_word: Ἰησοῦ
  chosen: Jeshua
  alternatives:
  - Jesus
  - Joshua
  lexicon: BDAG
  rationale: This is a personal name in a genealogy, not a christological title. The
    Greek form Ἰησοῦς can represent the Hebrew/Aramaic name Yeshua/Joshua. Here it
    refers to an ancestor in the list, not Jesus the Messiah, so 'Jeshua' avoids confusion
    with the Lord Jesus while preserving a standard Semitic-name form. 'Joshua' is
    also possible, but 'Jeshua' better reflects post-exilic name usage often represented
    by this Greek form.
- source_word: Ἐλιέζερ
  chosen: Eliezer
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the policy
    to transliterate names rather than translate them.
- source_word: Ἰωρὶμ
  chosen: Jorim
  alternatives:
  - Joram
  lexicon: BDAG
  rationale: Direct transliteration of the Greek name Ἰωρίμ. 'Joram' would reflect
    a different, more familiar biblical name form, but the Greek here supports 'Jorim'.
- source_word: Μαθθὰτ
  chosen: Matthat
  alternatives:
  - Mattath
  lexicon: BDAG
  rationale: Standard transliteration of the Greek form Μαθθάτ. 'Mattath' is a possible
    anglicization, but 'Matthat' more closely follows the Greek spelling.
- source_word: Λευὶ
  chosen: Levi
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
