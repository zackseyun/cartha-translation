theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: In this context the term functions clearly as a messianic title under
    popular expectation about John's identity, not as a name-like designation for
    Jesus. The project's contested-terms guidance directs 'Messiah' where title is
    in view.
