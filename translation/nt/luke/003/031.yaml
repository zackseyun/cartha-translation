theological_decisions:
- issue: Genealogical ellipsis
  chosen_reading: Supply 'the son of' for each genitive name in English.
  alternative_readings:
  - Render only 'of Melea, of Menna, of Mattatha, of Nathan, of David'
  rationale: The Greek genealogy uses an elliptical genitive chain dependent on the
    larger syntax of the passage. Explicitly supplying 'the son of' preserves the
    genealogical sense without adding new information beyond what the context clearly
    implies.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
