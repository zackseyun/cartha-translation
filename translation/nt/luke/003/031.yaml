id: LUK.3.31
reference: Luke 3:31
source:
  edition: SBLGNT
  text: τοῦ Μελεὰ τοῦ Μεννὰ τοῦ Ματταθὰ τοῦ Ναθὰμ τοῦ Δαυὶδ
translation:
  text: the son of Melea, the son of Menna, the son of Mattatha, the son of Nathan,
    the son of David,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''of Melea, of Menna, of Mattatha, of Nathan, of David''; Luke''s
      genealogy regularly implies ''the son of'' in this repeated structure.'
    reason: lexical_alternative
  - marker: b
    text: Some English versions have 'Menan' instead of 'Menna,' reflecting a different
      form of the name; the SBLGNT text here reads 'Menna.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke's genealogy, the repeated genitive article with each proper name
    functions elliptically within the larger genealogical formula established in the
    surrounding verses ('the son of ...'). Supplying 'the son of' in English makes
    the relationship explicit and readable, rather than leaving a bare chain of genitives.
- source_word: Μελεὰ
  chosen: Melea
  alternatives:
  - Meleas
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions. 'Melea' reflects
    the Greek form directly and fits common English NT naming practice.
- source_word: Μεννὰ
  chosen: Menna
  alternatives:
  - Menan
  lexicon: BDAG
  rationale: The Greek form Μεννά is best represented as 'Menna' by direct transliteration.
    'Menan' appears in some English traditions, likely influenced by variant forms
    or harmonization, but the given source text supports 'Menna'.
- source_word: Ματταθὰ
  chosen: Mattatha
  alternatives:
  - Mattathaas
  lexicon: BDAG
  rationale: This proper name is transliterated straightforwardly from the Greek.
    'Mattatha' is the standard concise English form corresponding to Ματταθά.
- source_word: Ναθὰμ
  chosen: Nathan
  alternatives:
  - Natham
  lexicon: BDAG
  rationale: Although the Greek form is Ναθάμ, the established English transliteration
    for this biblical name is 'Nathan,' which also preserves recognition of David's
    son in the genealogy. This is a standard transliteration choice rather than a
    theological expansion.
- source_word: Δαυὶδ
  chosen: David
  alternatives:
  - Dauid
  lexicon: BDAG
  rationale: The proper name Δαυίδ is conventionally transliterated as 'David' in
    English Bible translation.
