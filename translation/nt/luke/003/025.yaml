id: LUK.3.25
reference: Luke 3:25
source:
  edition: SBLGNT
  text: τοῦ Ματταθίου τοῦ Ἀμὼς τοῦ Ναοὺμ τοῦ Ἑσλὶ τοῦ Ναγγαὶ
translation:
  text: the son of Mattathias, the son of Amos, the son of Nahum, the son of Esli,
    the son of Naggai,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically within the larger genealogical formula established in the
    surrounding context ('...the son of...'). Supplying 'the son of' in English makes
    the relationship explicit and readable, rather than leaving a bare sequence of
    genitives.
- source_word: Ματταθίου
  chosen: Mattathias
  alternatives:
  - Matthatias
  lexicon: BDAG
  rationale: This is a personal name, so it is transliterated rather than translated,
    following the project principle for names. 'Mattathias' is the standard English
    form corresponding to Ματταθίας in the genitive Ματταθίου.
- source_word: Ἀμὼς
  chosen: Amos
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention. Although
    identical in form to the prophet's name in English, here it functions simply as
    an ancestor's name in the genealogy.
- source_word: Ναοὺμ
  chosen: Nahum
  alternatives:
  - Naum
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention. 'Nahum'
    is the familiar and natural English form.
- source_word: Ἑσλὶ
  chosen: Esli
  alternatives:
  - Hesli
  lexicon: BDAG
  rationale: Personal name transliterated. 'Esli' is the conventional English transliteration
    in Luke’s genealogy; adding initial 'H' is less standard in English Bible tradition
    and not required for readability.
- source_word: Ναγγαὶ
  chosen: Naggai
  alternatives:
  - Naggae
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention. 'Naggai' is the
    established English form for this genealogical name.
