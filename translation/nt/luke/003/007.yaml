theological_decisions:
- issue: Nature of ὀργή in John's warning
  chosen_reading: wrath refers to impending divine judgment without specifying a narrower
    doctrinal scheme
  alternative_readings:
  - eschatological judgment specifically
  - temporal judgment in history
  rationale: The immediate context in Luke 3 concerns repentance in view of God's
    judgment. The translation preserves the broad term 'wrath' and does not narrow
    it to a specific denominational eschatology beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
