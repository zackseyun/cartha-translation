id: LUK.3.7
reference: Luke 3:7
source:
  edition: SBLGNT
  text: Ἔλεγεν οὖν τοῖς ἐκπορευομένοις ὄχλοις βαπτισθῆναι ὑπ’ αὐτοῦ· Γεννήματα ἐχιδνῶν,
    τίς ὑπέδειξεν ὑμῖν φυγεῖν ἀπὸ τῆς μελλούσης ὀργῆς;
translation:
  text: So he was saying to the crowds coming out to be baptized by him, “Offspring
    of vipers, who warned you to flee from the coming wrath?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Brood of vipers.”
    reason: lexical_alternative
  - marker: b
    text: Or “from the wrath to come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech; 'was saying' preserves
    that aspect without overinterpreting frequency.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding context; 'So'
    is natural modern English.
- source_word: τοῖς ἐκπορευομένοις ὄχλοις
  chosen: to the crowds coming out
  alternatives:
  - to the crowds going out
  - to the crowds who were coming out
  lexicon: BDAG
  rationale: The participle ἐκπορευομένοις modifies ὄχλοις and indicates movement
    outward toward John; 'coming out' is idiomatic in English from the narrator's
    perspective.
- source_word: βαπτισθῆναι
  chosen: to be baptized
  alternatives:
  - for baptism
  lexicon: BDAG
  rationale: Aorist passive infinitive is best represented directly as purpose/result
    with passive force preserved.
- source_word: ὑπ’ αὐτοῦ
  chosen: by him
  alternatives:
  - by John
  lexicon: BDAG
  rationale: The pronoun refers to John; retaining 'him' follows the Greek text closely
    without adding the name.
- source_word: Γεννήματα ἐχιδνῶν
  chosen: Offspring of vipers
  alternatives:
  - Brood of vipers
  lexicon: BDAG
  rationale: γέννημα denotes that which is born/produced; 'offspring' is transparent
    and vivid. 'Brood of vipers' is traditional and idiomatic, but 'offspring' more
    directly reflects the lexical sense.
- source_word: τίς ὑπέδειξεν ὑμῖν
  chosen: who warned you
  alternatives:
  - who showed you
  - who instructed you
  lexicon: BDAG
  rationale: ὑποδείκνυμι here carries the sense of giving instruction or warning;
    in context of impending judgment, 'warned' best conveys the force.
- source_word: φυγεῖν
  chosen: to flee
  alternatives:
  - to escape
  lexicon: BDAG
  rationale: The infinitive retains the vivid image of flight from danger; 'flee'
    is more literal than 'escape'.
- source_word: ἀπὸ τῆς μελλούσης ὀργῆς
  chosen: from the coming wrath
  alternatives:
  - from the wrath to come
  - from the impending wrath
  lexicon: BDAG
  rationale: μέλλουσης indicates what is about to come or forthcoming; 'the coming
    wrath' is clear modern English while preserving eschatological force.
