theological_decisions:
- issue: Judgment imagery in the agricultural metaphor
  chosen_reading: The verse depicts the coming one decisively separating the righteous
    from the wicked, preserving both salvation and judgment imagery without specifying
    beyond the text how that judgment is finally worked out.
  alternative_readings:
  - A purely temporal judgment on Israel
  - A fully developed statement of final hell doctrine
  rationale: The language of wheat gathered and chaff burned clearly conveys separation
    and judgment. The translation preserves the force of 'unquenchable fire' without
    softening it, but it does not import a more systematized doctrinal formulation
    than the verse itself states.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
