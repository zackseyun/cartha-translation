id: LUK.3.17
reference: Luke 3:17
source:
  edition: SBLGNT
  text: οὗ τὸ πτύον ἐν τῇ χειρὶ αὐτοῦ ⸀διακαθᾶραι τὴν ἅλωνα αὐτοῦ καὶ ⸀συναγαγεῖν
    τὸν σῖτον εἰς τὴν ἀποθήκην αὐτοῦ, τὸ δὲ ἄχυρον κατακαύσει πυρὶ ἀσβέστῳ.
translation:
  text: His winnowing fork is in his hand to thoroughly clear his threshing floor
    and to gather the wheat into his storehouse, but the chaff he will burn up with
    unquenchable fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'winnowing shovel' or, traditionally, 'winnowing fan.' The Greek term
      refers to the implement used to toss grain into the air for separation.
    reason: lexical_alternative
  - marker: b
    text: Or 'barn' or 'granary' for 'storehouse.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with inextinguishable fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πτύον
  chosen: winnowing fork
  alternatives:
  - winnowing shovel
  - winnowing fan
  lexicon: BDAG
  rationale: Refers to the agricultural implement used to toss grain into the air
    for separation. 'Winnowing fork' is clear modern English and more precise than
    the traditional but potentially misleading 'fan.'
- source_word: διακαθᾶραι
  chosen: to thoroughly clear
  alternatives:
  - to cleanse completely
  - to clean out thoroughly
  lexicon: BDAG
  rationale: The compound verb intensifies the action of clearing/cleaning. 'Thoroughly
    clear' preserves the force of the prefix while fitting the threshing-floor image
    naturally in English.
- source_word: ἅλωνα
  chosen: threshing floor
  alternatives:
  - threshing area
  lexicon: BDAG
  rationale: Standard rendering for the place where grain is threshed and winnowed;
    preserves the agricultural metaphor used for judgment and separation.
- source_word: συναγαγεῖν
  chosen: to gather
  alternatives:
  - to bring together
  - to collect
  lexicon: BDAG
  rationale: A straightforward rendering that fits the image of collecting the usable
    grain after winnowing.
- source_word: σῖτον
  chosen: the wheat
  alternatives:
  - the grain
  lexicon: BDAG
  rationale: Although the term can denote grain more broadly, 'wheat' is the natural
    contrast to 'chaff' in this context and is the conventional, contextually accurate
    rendering.
- source_word: ἀποθήκην
  chosen: storehouse
  alternatives:
  - barn
  - granary
  lexicon: BDAG
  rationale: Denotes a storage place. 'Storehouse' is broad and accurate without over-specifying
    a rustic structure; 'barn' is possible but narrower.
- source_word: ἄχυρον
  chosen: chaff
  alternatives:
  - straw
  lexicon: BDAG
  rationale: In the winnowing context, 'chaff' is the proper term for the worthless
    husks separated from the grain; 'straw' would suggest stalks rather than husks.
- source_word: κατακαύσει
  chosen: he will burn up
  alternatives:
  - he will burn completely
  - he will consume by fire
  lexicon: BDAG
  rationale: The compound verb conveys complete burning. 'Burn up' is idiomatic and
    preserves the sense of total consumption.
- source_word: πυρὶ ἀσβέστῳ
  chosen: with unquenchable fire
  alternatives:
  - with inextinguishable fire
  lexicon: BDAG
  rationale: A standard and accurate rendering of the dative phrase. 'Unquenchable'
    communicates that the fire cannot be put out, matching the judgment imagery.
- source_word: οὗ
  chosen: His
  alternatives:
  - whose
  lexicon: BDAG
  rationale: The genitive relative pronoun introduces a descriptive clause about the
    coming one. English can render this smoothly as a possessive statement beginning
    'His...,' preserving the sense without awkwardness.
