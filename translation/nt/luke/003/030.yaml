id: LUK.3.30
reference: Luke 3:30
source:
  edition: SBLGNT
  text: τοῦ Συμεὼν τοῦ Ἰούδα τοῦ Ἰωσὴφ τοῦ Ἰωνὰμ τοῦ Ἐλιακὶμ
translation:
  text: the son of Simeon, the son of Judah, the son of Joseph, the son of Jonam,
    the son of Eliakim,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations read 'Judas' for 'Judah'; the same Greek name can be rendered
      either way, but 'Judah' better fits this genealogical context.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts or translation traditions reflect the name as 'Jonan' rather
      than 'Jonam.'
    reason: textual_variant
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically, continuing the genealogical formula from the surrounding
    verses. Rendering each instance as bare 'of' would be unnatural and unclear in
    English; 'the son of' makes the implied relationship explicit and matches the
    genealogy’s syntax and sense.
- source_word: Συμεὼν
  chosen: Simeon
  alternatives:
  - Symeon
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy. 'Simeon' is the established and recognizable English form.
- source_word: Ἰούδα
  chosen: Judah
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: Although the Greek form can correspond to 'Judas,' in genealogical and
    Semitic-name contexts 'Judah' better reflects the underlying Hebrew/Jewish name
    and avoids misleading association with Judas Iscariot.
- source_word: Ἰωσὴφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Ἰωνὰμ
  chosen: Jonam
  alternatives:
  - Jonan
  lexicon: BDAG
  rationale: The SBLGNT form Ἰωνάμ is most naturally represented as 'Jonam' in English
    transliteration. 'Jonan' reflects a different textual/form tradition and is worth
    preserving as an alternative.
- source_word: Ἐλιακὶμ
  chosen: Eliakim
  alternatives:
  - Eliachim
  lexicon: BDAG
  rationale: Standard English transliteration of the Semitic personal name; 'Eliakim'
    is the conventional and most readable form.
