id: LUK.3.16
reference: Luke 3:16
source:
  edition: SBLGNT
  text: ἀπεκρίνατο ⸂λέγων πᾶσιν ὁ Ἰωάννης⸃· Ἐγὼ μὲν ὕδατι βαπτίζω ὑμᾶς· ἔρχεται δὲ
    ὁ ἰσχυρότερός μου, οὗ οὐκ εἰμὶ ἱκανὸς λῦσαι τὸν ἱμάντα τῶν ὑποδημάτων αὐτοῦ· αὐτὸς
    ὑμᾶς βαπτίσει ἐν πνεύματι ἁγίῳ καὶ πυρί·
translation:
  text: John answered them all, saying, “I indeed baptize you with water, but one
    stronger than I is coming, whose sandal strap I am not worthy to untie. He will
    baptize you in the Holy Spirit and fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with water.' The Greek dative can express means or element here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one more powerful than I.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with the Holy Spirit and fire.' The Greek reads 'in the Holy Spirit
      and fire,' and the precise nuance of the preposition may be understood in more
      than one way.
    reason: lexical_alternative
  - marker: d
    text: '''Fire'' may be understood as purifying, as judgment, or as part of the
      single image of Spirit-and-fire baptism; the translation leaves the expression
      as written.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίνατο λέγων πᾶσιν
  chosen: answered them all, saying
  alternatives:
  - answered everyone
  - responded to all
  lexicon: BDAG
  rationale: ἀποκρίνομαι with λέγων is a common narrative formula. 'Answered them
    all, saying' preserves both the responsive sense and the participial introduction
    without sounding overly wooden. πᾶσιν is naturally represented by 'them all' in
    context.
- source_word: Ἐγὼ μὲν
  chosen: I indeed
  alternatives:
  - I for my part
  - I on the one hand
  lexicon: BDAG
  rationale: μέν marks contrast with the coming one. 'Indeed' preserves the emphatic,
    preparatory force in readable English without requiring an awkward 'on the one
    hand' construction.
- source_word: ὕδατι
  chosen: with water
  alternatives:
  - in water
  lexicon: BDAG
  rationale: The dative here expresses means or element. English idiom commonly says
    'baptize with water'; this also keeps a natural contrast with the later 'in the
    Holy Spirit and fire,' where ἐν is retained more directly.
- source_word: βαπτίζω / βαπτίσει
  chosen: baptize / will baptize
  alternatives:
  - immerse / will immerse
  lexicon: BDAG
  rationale: '''Baptize'' is the standard and contextually appropriate rendering in
    Gospel narrative. ''Immerse'' is lexically possible but would import a denominationally
    charged specificity beyond what this verse itself requires.'
- source_word: ὁ ἰσχυρότερός μου
  chosen: one stronger than I
  alternatives:
  - the one more powerful than I
  - my stronger one
  lexicon: BDAG
  rationale: The comparative adjective is best rendered explicitly. 'One stronger
    than I' is concise and natural, preserving the comparison without adding interpretive
    weight. 'More powerful' is possible, but 'stronger' stays closer to ἰσχυρότερος.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on his way
  lexicon: BDAG
  rationale: The present tense has a vivid or imminent force in context. 'Is coming'
    communicates that force more naturally in English than a simple present.
- source_word: οὗ οὐκ εἰμὶ ἱκανὸς
  chosen: whose ... I am not worthy
  alternatives:
  - whose ... I am not fit
  - whose ... I am not sufficient
  lexicon: BDAG
  rationale: ἱκανός can denote adequacy or worthiness; in this humility formula, 'worthy'
    best captures the idiomatic sense in English.
- source_word: λῦσαι τὸν ἱμάντα τῶν ὑποδημάτων αὐτοῦ
  chosen: to untie his sandal strap
  alternatives:
  - to loosen the strap of his sandals
  - to untie the thong of his sandals
  lexicon: BDAG
  rationale: This phrase refers to the lowly task of loosening footwear. 'Untie his
    sandal strap' is clear, contemporary, and faithful without archaic wording like
    'thong.'
- source_word: αὐτὸς
  chosen: He
  alternatives:
  - That one
  - He himself
  lexicon: BDAG
  rationale: αὐτός is emphatic, contrasting the coming one with John. English can
    convey the contrast adequately with 'He' following the prior contrastive clause;
    'He himself' would be possible but slightly heavy in this context.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - with the Holy Spirit
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve the Greek expression
    and avoid over-resolving whether the sense is means, sphere, or element. 'Holy
    Spirit' is capitalized because the phrase refers to the divine Spirit, not a merely
    holy disposition.
- source_word: καὶ πυρί
  chosen: and fire
  lexicon: BDAG
  rationale: The phrase is left literal and unexpanded. The text itself does not specify
    in this clause whether 'fire' is purifying, judicial, or both; preserving the
    wording maintains the theological tension of the immediate context.
