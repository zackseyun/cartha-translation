theological_decisions:
- issue: Meaning of 'He will baptize you in the Holy Spirit and fire'
  chosen_reading: Retain the literal phrasing without specifying whether 'fire' is
    purifying, judicial, or a second aspect of the same baptism.
  alternative_readings:
  - He will baptize you in the Holy Spirit, that is, with purifying fire
  - He will baptize some in the Holy Spirit and others in fire as judgment
  rationale: The verse's wording is concise and the immediate context allows interpretive
    debate. Per the translation philosophy, the draft preserves the theological tension
    rather than resolving it in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
