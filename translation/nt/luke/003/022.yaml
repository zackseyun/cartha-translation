theological_decisions:
- issue: Nature of the Spirit's manifestation
  chosen_reading: The text describes the Holy Spirit descending in visible bodily
    form, compared to a dove, without asserting that the Spirit literally became a
    dove.
  alternative_readings:
  - The Spirit descended as an actual dove
  rationale: The phrase σωματικῷ εἴδει ὡς περιστερὰν combines visible manifestation
    with simile. Rendering 'like a dove' preserves the comparison and avoids importing
    a stronger ontological claim than the Greek makes.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Force of the divine declaration εὐδόκησα
  chosen_reading: Rendered as 'I am well pleased' in the main text for idiomatic English,
    while preserving the more formally past-oriented alternative in a footnote.
  alternative_readings:
  - in you I was well pleased
  - in you I have taken delight
  rationale: The aorist can be represented more formally as a past action, but in
    this declaration English convention and sense favor a present expression of settled
    approval. The footnote preserves the more literal temporal nuance for auditability.
  doctrine_reference: Translation philosophy (optimal equivalence); §3 Preserve theological
    tension rather than resolve it
