id: LUK.3.22
reference: Luke 3:22
source:
  edition: SBLGNT
  text: καὶ καταβῆναι τὸ πνεῦμα τὸ ἅγιον σωματικῷ εἴδει ⸀ὡς περιστερὰν ἐπ’ αὐτόν,
    καὶ φωνὴν ἐξ οὐρανοῦ ⸀γενέσθαι· Σὺ εἶ ὁ υἱός μου ὁ ἀγαπητός, ἐν σοὶ εὐδόκησα.
translation:
  text: 'and the Holy Spirit descended on him in bodily form like a dove, and a voice
    came from heaven: “You are my beloved Son; in you I am well pleased.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “in you I was well pleased.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβῆναι
  chosen: descended
  alternatives:
  - came down
  lexicon: BDAG
  rationale: Aorist infinitive in narrative sequence, paired with γενέσθαι; 'descended'
    is natural modern English and preserves the downward movement without paraphrase.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the definite phrase; 'Holy Spirit'
    is clear, idiomatic, and theologically precise in modern English.
- source_word: σωματικῷ εἴδει
  chosen: in bodily form
  alternatives:
  - in physical form
  - in bodily appearance
  lexicon: BDAG
  rationale: This dative phrase indicates visible, embodied manifestation. 'In bodily
    form' is the most direct and established rendering, preserving that the descent
    was not merely visionary or inward.
- source_word: ὡς περιστερὰν
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: BDAG
  rationale: ὡς normally marks comparison here. 'Like a dove' preserves the simile
    and avoids overclaiming that the Spirit became a literal dove.
- source_word: ἐπ’ αὐτόν
  chosen: on him
  alternatives:
  - upon him
  lexicon: BDAG
  rationale: Simple prepositional phrase indicating movement/rest upon Jesus. 'On
    him' is natural modern English; 'upon him' is possible but slightly more archaic.
- source_word: φωνὴν ἐξ οὐρανοῦ γενέσθαι
  chosen: a voice came from heaven
  alternatives:
  - a voice came to be from heaven
  - there came a voice from heaven
  lexicon: BDAG
  rationale: γενέσθαι with φωνή is an idiomatic event expression. 'A voice came from
    heaven' conveys the occurrence clearly in readable English.
- source_word: Σὺ εἶ
  chosen: You are
  alternatives:
  - You yourself are
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but standard English can carry this
    without awkwardness. 'You are' is sufficient in the direct address.
- source_word: ὁ υἱός μου
  chosen: my Son
  alternatives:
  - the Son of me
  lexicon: BDAG
  rationale: Natural possessive rendering of the articular noun with genitive pronoun
    in direct address.
- source_word: ὁ ἀγαπητός
  chosen: beloved
  alternatives:
  - dearly loved
  - the beloved one
  lexicon: BDAG
  rationale: Traditional and accurate rendering of ἀγαπητός in filial/divine affirmation
    language; concise and weighty.
- source_word: ἐν σοὶ
  chosen: in you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: The preposition is ἐν, not μετά. 'In you' is the more literal rendering
    and fits the idiom of divine pleasure resting in the Son.
- source_word: εὐδόκησα
  chosen: I am well pleased
  alternatives:
  - I have taken delight
  - I was well pleased
  lexicon: BDAG
  rationale: Although the Greek is aorist ('I was pleased' / 'I took delight'), English
    idiom in this heavenly declaration is best represented by the present-state expression
    'I am well pleased,' which communicates abiding divine approval without distorting
    the sense. The more formal past rendering is preserved in a footnote.
