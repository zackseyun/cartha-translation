id: LUK.3.33
reference: Luke 3:33
source:
  edition: SBLGNT
  text: τοῦ ⸂Ἀμιναδὰβ τοῦ Ἀδμὶν τοῦ Ἀρνὶ⸃ τοῦ Ἑσρὼμ τοῦ Φαρὲς τοῦ Ἰούδα
translation:
  text: the son of Amminadab, the son of Admin, the son of Arni, the son of Hezron,
    the son of Perez, the son of Judah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the son of Amminadab, the son of Admin, the son of
      Aram,' while others omit 'Admin' and read 'the son of Amminadab, the son of
      Aram.'
    reason: textual_variant
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke's genealogy, the repeated genitive article with each name is
    elliptical, carrying forward the genealogical formula from the preceding verse.
    Rendering each instance as bare 'of' is formally possible but unnatural in English;
    'the son of' makes the implied relationship explicit and preserves the genealogy's
    structure.
- source_word: Ἀμιναδάβ
  chosen: Amminadab
  alternatives:
  - Aminadab
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name, aligned with familiar
    biblical usage and the underlying Semitic form.
- source_word: Ἀδμίν
  chosen: Admin
  alternatives:
  - Admin
  lexicon: BDAG
  rationale: Transliteration of the Greek proper name. This is the reading of the
    provided SBLGNT text and should be represented directly in the main text.
- source_word: Ἀρνί
  chosen: Arni
  alternatives:
  - Aram
  lexicon: BDAG
  rationale: Transliteration of the Greek proper name as printed in SBLGNT. Because
    this point in Luke's genealogy has a well-known textual variation, the alternative
    'Aram' is preserved in a footnote rather than adopted into the main text.
- source_word: Ἑσρώμ
  chosen: Hezron
  alternatives:
  - Esrom
  lexicon: BDAG
  rationale: Standard English OT-aligned transliteration rather than a more Greek-shaped
    form, improving canonical recognizability while still reflecting the same name.
- source_word: Φαρές
  chosen: Perez
  alternatives:
  - Phares
  - Pharez
  lexicon: BDAG
  rationale: Standard English OT-aligned form of the name, preferred over more directly
    Greek-based transliterations for readability and canonical consistency.
- source_word: Ἰούδα
  chosen: Judah
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: In genealogical/OT ancestral context, 'Judah' is the established English
    form and avoids confusion with NT figures commonly called Judas.
