id: LUK.3.14
reference: Luke 3:14
source:
  edition: SBLGNT
  text: ἐπηρώτων δὲ αὐτὸν καὶ στρατευόμενοι λέγοντες· ⸂Τί ποιήσωμεν καὶ ἡμεῖς⸃; καὶ
    εἶπεν ⸀αὐτοῖς· Μηδένα διασείσητε μηδὲ συκοφαντήσητε, καὶ ἀρκεῖσθε τοῖς ὀψωνίοις
    ὑμῶν.
translation:
  text: And soldiers also were asking him, saying, “What should we do, we also?” And
    he said to them, “Do not extort money from anyone, nor accuse anyone falsely,
    and be content with your wages.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “What should we do too?” The Greek explicitly emphasizes
      “we also.”
    reason: lexical_alternative
  - marker: b
    text: The verb translated “extort money” can literally suggest shaking or intimidating
      someone; here it refers to coercive abuse for gain.
    reason: lexical_alternative
  - marker: c
    text: “Wages” may also be rendered “pay”; the Greek term was often used for soldiers’
      pay or provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατευόμενοι
  chosen: soldiers
  alternatives:
  - those serving as soldiers
  - troops
  lexicon: BDAG
  rationale: The participle refers to people engaged in military service. 'Soldiers'
    is the most natural and precise English rendering in context.
- source_word: Τί ποιήσωμεν καὶ ἡμεῖς
  chosen: What should we do, we also?
  alternatives:
  - What should we do also?
  - And what are we to do?
  lexicon: BDAG
  rationale: The aorist subjunctive in deliberative question form is well represented
    by 'should we do.' The explicit καὶ ἡμεῖς adds emphasis that they, too, are asking
    alongside the other groups; retaining 'we also' preserves that emphasis, even
    if slightly less idiomatic in English.
- source_word: Μηδένα
  chosen: from anyone / anyone
  alternatives:
  - no one
  lexicon: BDAG
  rationale: The accusative object with the following prohibitions is distributive.
    In English, 'anyone' works naturally with both verbs and preserves the universal
    scope.
- source_word: διασείσητε
  chosen: extort money from
  alternatives:
  - shake down
  - intimidate for money
  - extort
  lexicon: BDAG
  rationale: The verb literally suggests shaking violently, but in this context it
    refers to coercive extraction, especially by abuse of power. 'Extort money from'
    makes the sense explicit and readable without slang.
- source_word: συκοφαντήσητε
  chosen: accuse anyone falsely
  alternatives:
  - make false accusations
  - blackmail
  - denounce falsely
  lexicon: BDAG
  rationale: In this context of abuses by soldiers or officials, the verb denotes
    wrongful accusation for gain or harm. 'Accuse anyone falsely' is clear and fits
    the legal-social setting. 'Blackmail' is possible in some contexts but is narrower
    and less certain here.
- source_word: ἀρκεῖσθε
  chosen: be content
  alternatives:
  - be satisfied
  lexicon: BDAG
  rationale: The present imperative/middle-passive form calls for an ongoing disposition
    of sufficiency. 'Be content' captures the ethical force well in idiomatic English.
- source_word: ὀψωνίοις
  chosen: wages
  alternatives:
  - pay
  - rations
  lexicon: BDAG
  rationale: The term originally referred to provisions/pay for soldiers and came
    to mean wages or pay. 'Wages' is clear modern English and fits the military context;
    'rations' is too narrow, while 'pay' is also possible but slightly less formal.
