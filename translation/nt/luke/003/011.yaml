theological_decisions:
- issue: Representative singular and gendered expression
  chosen_reading: The one who has ... the one who has ...
  alternative_readings:
  - He who has ... he who has ...
  - Whoever has ... whoever has ...
  rationale: The Greek uses masculine singular substantival participles generically.
    Following the project's gender-accurate philosophy, the translation preserves
    representative singular force without using archaic masculine generics that could
    miscommunicate in contemporary English.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
