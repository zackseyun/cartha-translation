id: LUK.3.11
reference: Luke 3:11
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ⸀ἔλεγεν αὐτοῖς· Ὁ ἔχων δύο χιτῶνας μεταδότω τῷ μὴ ἔχοντι, καὶ
    ὁ ἔχων βρώματα ὁμοίως ποιείτω.
translation:
  text: And answering, he said to them, “The one who has two tunics must share with
    the one who has none, and the one who has food must do likewise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shirts' or 'garments'; the Greek refers to a tunic, a basic item of
      clothing worn next to the body.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in reply
  - answered
  lexicon: BDAG
  rationale: A participial form introducing John's response. 'Answering' preserves
    the participial linkage to the main verb while remaining natural in English. 'Answered'
    would also be acceptable but slightly compresses the Greek structure.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective. 'And' preserves the narrative
    flow without implying strong contrast. An untranslated rendering is possible in
    English, but a simple connective best reflects the Greek discourse movement.
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  - he kept saying
  lexicon: BDAG
  rationale: The imperfect can suggest iterative or progressive aspect, but in English
    narrative 'he said' is the most natural rendering here. The participle plus imperfect
    together convey responsive speech without requiring an awkwardly durative English
    form.
- source_word: Ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - He who has
  lexicon: BDAG
  rationale: This substantival participle is generic and singular. 'The one who has'
    preserves the representative singular without archaic tone. It also aligns with
    the project's gender-accurate approach without over-neutralizing the form.
- source_word: δύο χιτῶνας
  chosen: two tunics
  alternatives:
  - two shirts
  - two garments
  - two coats
  lexicon: BDAG
  rationale: χιτών refers to an inner garment/tunic rather than specifically a modern
    'shirt' or outer 'coat.' 'Tunics' is slightly more formal but more accurate to
    the ancient clothing item.
- source_word: μεταδότω
  chosen: must share
  alternatives:
  - let him share
  - must give a share
  - should share
  lexicon: BDAG
  rationale: The third-person imperative carries exhortational force. 'Must share'
    communicates the command clearly in contemporary English. 'Let him share' is more
    formally literal but less natural for modern readers.
- source_word: τῷ μὴ ἔχοντι
  chosen: with the one who has none
  alternatives:
  - to the one who does not have
  - with the one who lacks
  lexicon: BDAG
  rationale: The dative with the negative participle refers to a person lacking the
    item in view. 'The one who has none' is concise and idiomatic, making explicit
    the implied object from context.
- source_word: βρώματα
  chosen: food
  alternatives:
  - provisions
  - things to eat
  lexicon: BDAG
  rationale: βρώματα is a broad term for food items. 'Food' is the clearest and most
    natural modern equivalent.
- source_word: ὁμοίως ποιείτω
  chosen: must do likewise
  alternatives:
  - let him do likewise
  - should do the same
  lexicon: BDAG
  rationale: This phrase extends the same ethical instruction to the second example.
    'Must do likewise' matches the imperative force already used for μεταδότω and
    keeps the parallelism clear.
