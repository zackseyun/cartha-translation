theological_decisions:
- issue: Supplying the implied filial relationship in an elliptical genealogy
  chosen_reading: Explicitly render each genitive link as 'the son of'
  alternative_readings:
  - Retain a bare sequence of names with 'of' only
  rationale: The Greek genealogy is syntactically elliptical, relying on the repeated
    article + genitive name pattern from the larger context. English normally requires
    the relationship to be made explicit. This is a translational, not doctrinal,
    decision, and it preserves the genealogical force without adding new theological
    content.
  doctrine_reference: Translation philosophy §1, §6
