id: LUK.3.34
reference: Luke 3:34
source:
  edition: SBLGNT
  text: τοῦ Ἰακὼβ τοῦ Ἰσαὰκ τοῦ Ἀβραὰμ τοῦ Θάρα τοῦ Ναχὼρ
translation:
  text: the son of Jacob, the son of Isaac, the son of Abraham, the son of Terah,
    the son of Nahor
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally repeats 'of' with each name; 'the son of' is supplied from
      the genealogy’s pattern for clear English.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Thara'; rendered 'Terah' to match the familiar Old Testament form
      of the name.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Nachor'; rendered 'Nahor' to match the familiar Old Testament form
      of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    continues the elliptical pattern established in the surrounding verses, where
    English requires the implied filial relationship to be supplied for clarity. Rendering
    each instance as 'the son of' makes the genealogy intelligible and preserves the
    structure.
- source_word: Ἰακώβ
  chosen: Jacob
  lexicon: BDAG
  rationale: Standard English transliteration of the patriarch’s name; personal names
    are transliterated rather than translated.
- source_word: Ἰσαάκ
  chosen: Isaac
  lexicon: BDAG
  rationale: Standard English transliteration of the patriarch’s name; this matches
    established English usage while reflecting the Greek form.
- source_word: Ἀβραάμ
  chosen: Abraham
  lexicon: BDAG
  rationale: Standard English transliteration of the patriarch’s name; no translation
    is appropriate for a personal name.
- source_word: Θάρα
  chosen: Terah
  alternatives:
  - Thara
  lexicon: BDAG
  rationale: Although the Greek form is Thara, standard English Bible convention follows
    the familiar OT name 'Terah,' which reflects the underlying Hebrew identity of
    the person named in the genealogy.
- source_word: Ναχώρ
  chosen: Nahor
  alternatives:
  - Nachor
  lexicon: BDAG
  rationale: Standard English transliteration aligned with the familiar OT patriarchal
    name. 'Nachor' would more closely mirror the Greek spelling, but 'Nahor' better
    matches established English recognition of the same figure.
