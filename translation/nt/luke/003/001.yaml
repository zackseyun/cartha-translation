id: LUK.3.1
reference: Luke 3:1
source:
  edition: SBLGNT
  text: Ἐν ἔτει δὲ πεντεκαιδεκάτῳ τῆς ἡγεμονίας Τιβερίου Καίσαρος, ἡγεμονεύοντος Ποντίου
    Πιλάτου τῆς Ἰουδαίας, καὶ τετρααρχοῦντος τῆς Γαλιλαίας Ἡρῴδου, Φιλίππου δὲ τοῦ
    ἀδελφοῦ αὐτοῦ τετρααρχοῦντος τῆς Ἰτουραίας καὶ Τραχωνίτιδος χώρας, καὶ Λυσανίου
    τῆς Ἀβιληνῆς τετρααρχοῦντος,
translation:
  text: Now in the fifteenth year of the reign of Tiberius Caesar, while Pontius Pilate
    was governing Judea, and Herod was tetrarch of Galilee, and Philip his brother
    was tetrarch of the region of Iturea and Trachonitis, and Lysanias was tetrarch
    of Abilene,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'during the fifteenth year.'
    reason: lexical_alternative
  - marker: b
    text: '''Tetrarch'' was a regional ruler under Roman authority.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν ἔτει ... πεντεκαιδεκάτῳ
  chosen: in the fifteenth year
  alternatives:
  - during the fifteenth year
  lexicon: BDAG
  rationale: A straightforward temporal dative construction. 'In the fifteenth year'
    is idiomatic English and preserves the chronological framing.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ here marks narrative transition rather than strong contrast. 'Now'
    gives a natural English scene-setting transition. The conjunction is not left
    entirely untranslated because Luke uses it to advance the narrative.
- source_word: ἡγεμονίας
  chosen: reign
  alternatives:
  - rule
  - governance
  lexicon: BDAG
  rationale: With Tiberius Caesar as the genitive complement, 'reign' is the most
    natural English expression for imperial rule. It is more idiomatic than 'governance'
    and more specific than 'rule'.
- source_word: Τιβερίου Καίσαρος
  chosen: Tiberius Caesar
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention, in keeping
    with project philosophy.
- source_word: ἡγεμονεύοντος
  chosen: was governing
  alternatives:
  - was governor of
  - was ruling
  lexicon: BDAG
  rationale: The genitive absolute is rendered with 'while ... was governing' to preserve
    the circumstantial force. 'Was governor of' would convert the participle into
    a title statement; 'was governing' better reflects the verbal form.
- source_word: τῆς Ἰουδαίας
  chosen: Judea
  alternatives:
  - of Judea
  lexicon: BDAG
  rationale: In English, 'governing Judea' is smoother than the more wooden 'governing
    of Judea' or repeating 'of' after the participle.
- source_word: τετρααρχοῦντος
  chosen: was tetrarch of
  alternatives:
  - was ruling as tetrarch over
  - ruled as tetrarch of
  lexicon: BDAG
  rationale: The term denotes the office of tetrarch, and translating it rather than
    flattening it to 'ruler' preserves the historical specificity. The participial
    force is represented with 'was tetrarch of' in parallel with the other clauses.
- source_word: Ἡρῴδου
  chosen: Herod
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: Φιλίππου ... τοῦ ἀδελφοῦ αὐτοῦ
  chosen: Philip his brother
  alternatives:
  - Philip, his brother
  - Philip the brother of Herod
  lexicon: BDAG
  rationale: This compact rendering preserves the appositional relationship and the
    pronoun's reference to Herod without overformal wording.
- source_word: τῆς Ἰτουραίας καὶ Τραχωνίτιδος χώρας
  chosen: the region of Iturea and Trachonitis
  alternatives:
  - Iturea and Trachonitis
  - the country of Iturea and Trachonitis
  lexicon: BDAG
  rationale: χώρας adds the sense of territory/region, so it should not be omitted.
    'Region' is natural modern English; 'country' could sound like a sovereign nation
    in contemporary usage.
- source_word: Λυσανίου
  chosen: Lysanias
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: τῆς Ἀβιληνῆς
  chosen: Abilene
  alternatives:
  - of Abilene
  lexicon: BDAG
  rationale: As with the other territorial genitives, English idiom prefers 'tetrarch
    of Abilene.' This refers to the district, not the modern U.S. place name.
