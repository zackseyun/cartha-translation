theological_decisions:
- issue: Rendering of the political title τετρααρχοῦντος
  chosen_reading: Translate as 'was tetrarch of' rather than generalizing to 'ruled'
    or 'was ruler of.'
  alternative_readings:
  - was ruling over
  - was ruler of
  rationale: This is primarily historical rather than doctrinal, but preserving the
    specific title avoids interpretive flattening and matches the translation philosophy's
    preference for source-text precision where readability permits.
  doctrine_reference: Translation philosophy §1, §6
