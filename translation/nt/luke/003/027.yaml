id: LUK.3.27
reference: Luke 3:27
source:
  edition: SBLGNT
  text: τοῦ Ἰωανὰν τοῦ Ῥησὰ τοῦ Ζοροβαβὲλ τοῦ Σαλαθιὴλ τοῦ Νηρὶ
translation:
  text: the son of Joanan, the son of Rhesa, the son of Zerubbabel, the son of Shealtiel,
    the son of Neri,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek simply repeats 'of' with each name; 'the son of' is supplied from
      the genealogy’s established pattern for clear English.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Salathiel'; traditionally identified with the Old Testament name
      'Shealtiel.'
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy the repeated genitive article with each proper name
    functions elliptically within the larger formula established in the surrounding
    context ('...the son of...'). Supplying 'the son of' in English makes the genealogy
    readable and accurately reflects the implied relationship rather than leaving
    a bare, unnatural string of genitives.
- source_word: Ἰωανὰν
  chosen: Joanan
  alternatives:
  - Johnanan
  - Joanan
  lexicon: BDAG
  rationale: Personal names are transliterated rather than translated. 'Joanan' is
    a standard English transliteration of the Greek form Ἰωανάν in this genealogical
    context.
- source_word: Ῥησὰ
  chosen: Rhesa
  alternatives:
  - Resa
  lexicon: BDAG
  rationale: The proper name is transliterated from Greek. 'Rhesa' preserves the rough
    breathing represented by rho-initial transliteration and is a conventional scholarly/English
    form.
- source_word: Ζοροβαβὲλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  lexicon: BDAG
  rationale: This is the established English transliteration corresponding to the
    biblical figure known from the Old Testament. Using 'Zerubbabel' preserves recognizability
    while remaining faithful to the Greek form.
- source_word: Σαλαθιὴλ
  chosen: Shealtiel
  alternatives:
  - Salathiel
  lexicon: BDAG
  rationale: Although the Greek form could be transliterated more directly as 'Salathiel,'
    'Shealtiel' reflects the standard English form of the same biblical name known
    from the Hebrew tradition. This aids canonical recognition in a genealogy.
- source_word: Νηρὶ
  chosen: Neri
  alternatives:
  - Nēri
  lexicon: BDAG
  rationale: The proper name is transliterated straightforwardly into standard English
    as 'Neri.'
