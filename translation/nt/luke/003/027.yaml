theological_decisions:
- issue: Genealogical ellipsis
  chosen_reading: Supply 'the son of' for each genitive name in English.
  alternative_readings:
  - Render a bare sequence of names with repeated 'of'
  rationale: The Greek genealogy relies on ellipsis from the surrounding context.
    Explicitly supplying the filial relationship is not a theological expansion but
    a necessary translation of the implied syntax into natural English.
  doctrine_reference: Translation philosophy § optimal equivalence; translate the
    source's plain sense in readable modern English.
