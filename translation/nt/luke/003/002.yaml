id: LUK.3.2
reference: Luke 3:2
source:
  edition: SBLGNT
  text: ἐπὶ ἀρχιερέως Ἅννα καὶ Καϊάφα, ἐγένετο ῥῆμα θεοῦ ἐπὶ Ἰωάννην τὸν Ζαχαρίου
    υἱὸν ἐν τῇ ἐρήμῳ.
translation:
  text: during the high priesthood of Annas and Caiaphas, the word of God came to
    John, the son of Zechariah, in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in the high priesthood of Annas and Caiaphas.' Luke
      names both men even though the office itself is singular.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ ἀρχιερέως Ἅννα καὶ Καϊάφα
  chosen: during the high priesthood of Annas and Caiaphas
  alternatives:
  - in the high priesthood of Annas and Caiaphas
  - when Annas and Caiaphas were high priests
  lexicon: BDAG
  rationale: ἐπί with the genitive in this temporal setting is best rendered 'during'
    or 'in the time of.' 'During the high priesthood' is natural English and preserves
    Luke's chronological framing. Although only one official high priest served at
    a time, Luke names both Annas and Caiaphas because Annas retained significant
    status and influence; the translation keeps the singular 'high priesthood' to
    reflect ἀρχιερέως.
- source_word: ἐγένετο ῥῆμα θεοῦ
  chosen: the word of God came
  alternatives:
  - the word of God happened
  - a word from God came
  lexicon: BDAG
  rationale: This is a standard biblical idiom for prophetic revelation. 'Came' communicates
    the eventive force of ἐγένετο idiomatically in English without woodenly rendering
    'happened.' 'The word of God' preserves the anarthrous ῥῆμα θεοῦ as a recognizable
    prophetic formula while remaining natural.
- source_word: ἐπὶ Ἰωάννην
  chosen: to John
  alternatives:
  - upon John
  lexicon: BDAG
  rationale: With verbs of coming/revelation, ἐπί plus the accusative can indicate
    movement toward or coming upon someone. 'To John' is the most natural English
    rendering here; 'upon John' is more literal but less idiomatic in contemporary
    English.
- source_word: τὸν Ζαχαρίου υἱὸν
  chosen: the son of Zechariah
  alternatives:
  - Zechariah's son
  lexicon: BDAG
  rationale: The appositional phrase identifies which John is meant. 'The son of Zechariah'
    is slightly more formal and matches Luke's narrative style better than the possessive
    alternative.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος in this context refers to the sparsely inhabited wilderness region
    associated with John's ministry, not necessarily a sandy desert. 'Wilderness'
    is the standard and contextually precise rendering.
