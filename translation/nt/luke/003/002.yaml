theological_decisions:
- issue: How to render Luke's reference to Annas and Caiaphas in relation to the singular
    ἀρχιερέως
  chosen_reading: 'Retain the singular institutionally: ''during the high priesthood
    of Annas and Caiaphas'''
  alternative_readings:
  - when Annas and Caiaphas were high priests
  rationale: The Greek uses singular ἀρχιερέως while naming two figures. Rendering
    it with singular 'high priesthood' preserves the historical and literary tension
    rather than smoothing it away. This avoids importing a harmonization while still
    producing readable English.
  doctrine_reference: Preserve theological tension rather than resolve it.
