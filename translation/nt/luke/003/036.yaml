id: LUK.3.36
reference: Luke 3:36
source:
  edition: SBLGNT
  text: τοῦ Καϊνὰμ τοῦ Ἀρφαξὰδ τοῦ Σὴμ τοῦ Νῶε τοῦ Λάμεχ
translation:
  text: the son of Cainan, the son of Arphaxad, the son of Shem, the son of Noah,
    the son of Lamech,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions spell this name 'Kainan.'
    reason: lexical_alternative
  - marker: b
    text: Some traditions omit Cainan here in order to align the genealogy more closely
      with certain Old Testament forms.
    reason: textual_variant
  - marker: c
    text: '''Arphaxad'' reflects the Greek form in Luke; compare the Old Testament
      name often rendered ''Arpachshad.'''
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically within the larger pattern of descent established in the
    surrounding verses. Supplying 'the son of' in English makes the genealogical relationship
    explicit and readable, rather than leaving a bare chain of genitives.
- source_word: Καϊνὰμ
  chosen: Cainan
  alternatives:
  - Kainan
  lexicon: BDAG
  rationale: This is a proper name and is therefore transliterated by standard English
    convention. 'Cainan' follows familiar English biblical usage, while 'Kainan' is
    a more direct letter-for-letter transliteration.
- source_word: Ἀρφαξὰδ
  chosen: Arphaxad
  alternatives:
  - Arpachshad
  lexicon: BDAG
  rationale: The Greek form Ἀρφαξάδ is transliterated as 'Arphaxad' to reflect the
    Greek name as it appears in Luke. 'Arpachshad' reflects the Hebrew/OT form more
    closely, but here the translation follows the Greek source text of Luke while
    preserving the common English form.
- source_word: Σὴμ
  chosen: Shem
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention.
- source_word: Νῶε
  chosen: Noah
  alternatives:
  - Noe
  lexicon: BDAG
  rationale: Proper name transliterated into its standard English biblical form. 'Noe'
    would mirror the Greek form more directly, but 'Noah' is the established English
    equivalent and best serves readability.
- source_word: Λάμεχ
  chosen: Lamech
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention.
