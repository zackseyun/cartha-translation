theological_decisions:
- issue: Inclusion of Cainan/Kainan in Luke’s genealogy between Arphaxad and Shem
  chosen_reading: Retain Cainan in the main text as part of the translated Greek text.
  alternative_readings:
  - Some textual or harmonizing traditions omit Cainan to align more closely with
    certain OT genealogical forms.
  rationale: The SBLGNT text for Luke 3:36 includes Καϊνάμ, so the translation should
    render the Greek text as given rather than harmonize Luke to Genesis. This is
    a textual/genealogical issue, not a doctrinal one, and transparency requires preserving
    Luke’s wording.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
