id: LUK.3.37
reference: Luke 3:37
source:
  edition: SBLGNT
  text: τοῦ Μαθουσαλὰ τοῦ Ἑνὼχ τοῦ Ἰάρετ τοῦ Μαλελεὴλ τοῦ Καϊνὰμ
translation:
  text: the son of Methuselah, the son of Enoch, the son of Jared, the son of Mahalaleel,
    the son of Cainan,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Καϊνάμ, also rendered 'Kainan' or, when harmonized with Old Testament
      genealogies, 'Kenan.' The Greek text of Luke includes this name.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each name functions
    elliptically to continue the genealogical formula from the preceding verse(s).
    Supplying 'the son of' in English makes the relationship explicit and readable,
    rather than leaving a bare chain of genitives.
- source_word: Μαθουσαλά
  chosen: Methuselah
  alternatives:
  - Mathusala
  rationale: Standard English transliteration follows familiar biblical name convention
    and aligns with the corresponding OT figure.
- source_word: Ἑνώχ
  chosen: Enoch
  alternatives:
  - Henoch
  rationale: Standard English transliteration of the personal name; familiar biblical
    form preferred for readability and recognizability.
- source_word: Ἰάρετ
  chosen: Jared
  alternatives:
  - Jaret
  rationale: Standard English biblical form of the name, reflecting conventional transliteration
    into readable modern English.
- source_word: Μαλελεήλ
  chosen: Mahalaleel
  alternatives:
  - Maleleel
  - Mahalalel
  rationale: Chose the familiar English biblical form corresponding to the genealogical
    name in Genesis, prioritizing recognizability in a genealogy.
- source_word: Καϊνάμ
  chosen: Cainan
  alternatives:
  - Kenan
  - Kainan
  rationale: Chose 'Cainan' as the conventional English form used in many NT genealogical
    translations. Because this name is textually and genealogically notable in Luke
    relative to some OT traditions, alternatives are preserved in a footnote.
