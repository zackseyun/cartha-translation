theological_decisions:
- issue: Genealogical ellipsis in Luke’s repeated genitives
  chosen_reading: Supply 'the son of' for each name
  alternative_readings:
  - Retain a more literal bare genitive chain with repeated 'of'
  rationale: This is not a doctrinal issue but affects how explicitly the genealogy
    is presented in English. Supplying 'the son of' reflects the understood sense
    of the Greek construction in context and matches the genealogy’s function.
  doctrine_reference: Translation philosophy §2, §6
- issue: Rendering of Καϊνάμ in Luke’s genealogy
  chosen_reading: Include the name in the main text as 'Cainan'
  alternative_readings:
  - Kenan
  - Kainan
  rationale: The Greek text includes Καϊνάμ, so the translation should represent it
    rather than harmonize to OT genealogical forms. Alternative English forms are
    preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
