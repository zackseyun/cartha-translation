id: LUK.3.28
reference: Luke 3:28
source:
  edition: SBLGNT
  text: τοῦ Μελχὶ τοῦ Ἀδδὶ τοῦ Κωσὰμ τοῦ Ἐλμαδὰμ τοῦ Ἢρ
translation:
  text: the son of Melchi, the son of Addi, the son of Cosam, the son of Elmadam,
    the son of Er
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally repeats only ‘of’ with each name; English supplies ‘the
      son of’ to make the genealogical relationship explicit from the surrounding
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  chosen: the son of
  alternatives:
  - of
  lexicon: BDAG
  rationale: In Luke’s genealogy, the repeated genitive article with each proper name
    functions elliptically, continuing the genealogical formula from the surrounding
    context (‘the son of ...’). Rendering merely ‘of’ would be formally closer at
    the word level but unclear and unnatural in English; supplying ‘the son of’ accurately
    conveys the implied relationship.
- source_word: Μελχὶ
  chosen: Melchi
  alternatives:
  - Melchi
  lexicon: BDAG
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the project’s policy to transliterate names rather than translate
    them.
- source_word: Ἀδδὶ
  chosen: Addi
  alternatives:
  - Adddi
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention. ‘Addi’ is the established
    and readable English form.
- source_word: Κωσὰμ
  chosen: Cosam
  alternatives:
  - Kosam
  lexicon: BDAG
  rationale: Personal name transliterated into a conventional English form. ‘Cosam’
    reflects common English Bible practice; ‘Kosam’ would be a more mechanically letter-for-letter
    transliteration, but standard convention favors ‘C’ here.
- source_word: Ἐλμαδὰμ
  chosen: Elmadam
  alternatives:
  - Elmadam
  lexicon: BDAG
  rationale: Personal name transliterated directly into standard English form.
- source_word: Ἢρ
  chosen: Er
  alternatives:
  - Her
  lexicon: BDAG
  rationale: Personal name transliterated as ‘Er,’ the conventional English form in
    genealogical contexts. Although the initial eta can sometimes invite a rougher
    representation in English tradition, the standard form here is ‘Er’.
