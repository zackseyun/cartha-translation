id: LUK.22.23
reference: Luke 22:23
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ἤρξαντο συζητεῖν πρὸς ἑαυτοὺς τὸ τίς ἄρα εἴη ἐξ αὐτῶν ὁ τοῦτο μέλλων
    πράσσειν.
translation:
  text: And they began to discuss among themselves which one of them, then, would
    be the one about to do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who it might be among them that was about to do this.' The context makes
      clear that 'this' refers to the act of betrayal announced in the preceding verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The ingressive aorist of ἄρχω with an infinitive commonly marks the beginning
    of an action. 'Began' is natural modern English and preserves the aspectual force.
- source_word: συζητεῖν
  chosen: to discuss
  alternatives:
  - to debate
  - to question together
  lexicon: BDAG
  rationale: συζητέω can denote discussing, debating, or arguing together. In this
    immediate context the disciples are trying to identify the betrayer; 'discuss'
    best fits without overstating the tone as hostile argument.
- source_word: πρὸς ἑαυτούς
  chosen: among themselves
  alternatives:
  - with one another
  - to themselves
  lexicon: BDAG
  rationale: The idiom indicates reciprocal interaction within the group. 'Among themselves'
    is idiomatic English and captures the mutual sense better than a more literal
    but less natural rendering.
- source_word: τὸ τίς
  chosen: which one
  alternatives:
  - who
  - who it might be
  lexicon: BDAG
  rationale: The article with the indirect question nominalizes the clause ('the question
    of who'). In English this is best represented by 'which one,' since the reference
    is to one member from a known group.
- source_word: ἄρα
  chosen: then
  alternatives:
  - indeed
  - possibly
  lexicon: BDAG
  rationale: ἄρα here adds inferential or deliberative force to the indirect question.
    'Then' conveys the sense naturally in English without overtranslation.
- source_word: εἴη
  chosen: would be
  alternatives:
  - might be
  - could be
  lexicon: BDAG
  rationale: The optative in indirect discourse after a past-tense main verb reflects
    reported deliberation. 'Would be' gives smooth English for the indirect question
    while preserving the uncertainty.
- source_word: μέλλων πράσσειν
  chosen: about to do
  alternatives:
  - going to do
  - intending to do
  lexicon: BDAG
  rationale: μέλλω with the infinitive often indicates imminence. 'About to do' preserves
    that force more closely than the more colloquial 'going to do.' 'Intending to
    do' would shift the emphasis from imminence to volition.
- source_word: πράσσειν
  chosen: do
  alternatives:
  - carry out
  - commit
  lexicon: BDAG
  rationale: πράσσω is a broad verb for doing or carrying out an action. Because τοῦτο
    already points back to the specific deed of betrayal announced in context, the
    simple 'do' is sufficient and avoids importing a more interpretive gloss.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: The demonstrative points to the act just mentioned by Jesus. 'This' is
    concise and natural; 'this thing' is unnecessarily wooden.
