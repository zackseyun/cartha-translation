theological_decisions:
- issue: Whether to make explicit that the act is betrayal
  chosen_reading: Keep the text's more general 'do this' rather than expanding to
    'betray him' in the main text.
  alternative_readings:
  - would be the one to betray him
  rationale: Although the context clearly concerns the betrayer, the Greek in this
    verse uses the more indirect expression τοῦτο μέλλων πράσσειν ('about to do this').
    Optimal equivalence preserves the wording of the verse itself and lets the context
    supply the referent, rather than importing an explicit object not stated here.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
