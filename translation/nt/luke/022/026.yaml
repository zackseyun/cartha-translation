theological_decisions:
- issue: Nature of Jesus's instruction on status and leadership
  chosen_reading: Render the verse as an ethical reversal of social rank within the
    disciple community, emphasizing humble service rather than hierarchical privilege.
  alternative_readings:
  - Render with stronger institutional language about office or rule
  rationale: The Greek contrasts the 'greater' and 'the one who leads' with the younger
    and the serving one. The wording should preserve the text's call to humility without
    importing later ecclesiastical structures or flattening the social-status reversal.
  doctrine_reference: Translation philosophy §§1, 3, 6
