id: LUK.22.26
reference: Luke 22:26
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ οὐχ οὕτως, ἀλλ’ ὁ μείζων ἐν ὑμῖν ⸀γινέσθω ὡς ὁ νεώτερος, καὶ ὁ ἡγούμενος
    ὡς ὁ διακονῶν·
translation:
  text: But you are not to be like that. Instead, let the greater among you become
    like the younger, and the one who leads like the one who serves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'But not so with you.' The Greek is elliptical and sharply contrasts
      Jesus's disciples with the status-seeking pattern just described.
    reason: alternative_reading
  - marker: b
    text: '''The younger'' refers to the socially junior person, not merely someone
      younger in age.'
    reason: cultural_note
lexical_decisions:
- source_word: ὑμεῖς δὲ οὐχ οὕτως
  chosen: But you are not to be like that
  alternatives:
  - But not so with you
  - But you are not so
  lexicon: BDAG
  rationale: Captures the emphatic contrast introduced by ὑμεῖς δὲ and the elliptical
    prohibition implied by οὐχ οὕτως in context. 'Like that' makes explicit the comparison
    to the Gentile rulers in the preceding verse without over-paraphrasing.
- source_word: ἀλλ’
  chosen: Instead
  alternatives:
  - But rather
  - Rather
  lexicon: BDAG
  rationale: Marks the strong adversative transition to Jesus's positive instruction
    in natural modern English.
- source_word: ὁ μείζων
  chosen: the greater
  alternatives:
  - the greatest
  - the older
  - the more prominent one
  lexicon: BDAG
  rationale: The comparative form μείζων is best represented as 'greater' rather than
    the superlative 'greatest.' It refers to the one regarded as higher in status
    among the group.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: Idiomatic English for relational position within the community.
- source_word: γινέσθω
  chosen: let ... become
  alternatives:
  - let ... be
  - must be
  lexicon: BDAG
  rationale: The present middle imperative of γίνομαι naturally conveys becoming or
    taking on a role/posture, not merely static being. 'Let ... become' preserves
    the imperative force without sounding wooden.
- source_word: ὡς ὁ νεώτερος
  chosen: like the younger
  alternatives:
  - as the younger one
  - like the youngest
  lexicon: BDAG
  rationale: νεώτερος is comparative ('younger'), not necessarily superlative ('youngest').
    In the cultural setting, the younger person typically held lower status, which
    is the point of comparison.
- source_word: ὁ ἡγούμενος
  chosen: the one who leads
  alternatives:
  - the leader
  - the one who rules
  lexicon: BDAG
  rationale: A participial expression is rendered with a natural English substantival
    phrase. 'Leads' fits the context of community leadership without importing harsher
    political overtones than the term requires here.
- source_word: ὡς ὁ διακονῶν
  chosen: like the one who serves
  alternatives:
  - as the servant
  - like one who ministers
  lexicon: BDAG
  rationale: διακονῶν denotes one who serves or waits on others. 'The one who serves'
    preserves the verbal, active sense better than the more institutional 'servant'
    in this context.
