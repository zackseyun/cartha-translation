id: LUK.22.13
reference: Luke 22:13
source:
  edition: SBLGNT
  text: ἀπελθόντες δὲ εὗρον καθὼς ⸀εἰρήκει αὐτοῖς, καὶ ἡτοίμασαν τὸ πάσχα.
translation:
  text: So they went and found it just as he had told them, and they prepared the
    Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover meal' or 'the Passover lamb.' The Greek term can refer
      broadly to the Passover observance or more specifically to its meal or sacrificial
      elements.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπελθόντες
  chosen: they went
  alternatives:
  - having gone
  - after going away
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι, functioning adverbially before the main
    verb. English idiom is smoother with a finite verb sequence ('they went and found')
    rather than a more wooden participial construction, while preserving the temporal
    progression.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'So' captures the flow from Jesus' prior instructions to their
    response in readable modern English.
- source_word: εὗρον
  chosen: found it
  alternatives:
  - found
  lexicon: BDAG
  rationale: The verb means 'found.' English commonly supplies the implied object
    from context; here 'it' refers to the situation/arrangements Jesus had described.
    This makes the sentence natural without materially adding content beyond what
    the context clearly implies.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - exactly as
  lexicon: BDAG
  rationale: καθώς introduces correspondence between Jesus' prior words and what they
    encountered. 'Just as' expresses that correspondence clearly and naturally.
- source_word: εἰρήκει αὐτοῖς
  chosen: he had told them
  alternatives:
  - he had said to them
  lexicon: BDAG
  rationale: Pluperfect of λέγω indicates prior speech with continuing relevance.
    'Had told them' is idiomatic English in this context of instructions previously
    given, and αὐτοῖς is naturally rendered 'them.'
- source_word: ἡτοίμασαν
  chosen: they prepared
  alternatives:
  - made ready
  - got ready
  lexicon: BDAG
  rationale: The aorist verb denotes preparation. 'Prepared' is both accurate and
    suitably concise.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  - the Passover lamb
  lexicon: BDAG
  rationale: πάσχα can refer to Passover broadly, including the meal/observance. In
    this context, the disciples are making preparations for the Passover observance/meal.
    'The Passover' preserves the Greek wording without over-specifying beyond the
    text.
