theological_decisions:
- issue: Scope of πάσχα in context
  chosen_reading: the Passover
  alternative_readings:
  - the Passover meal
  - the Passover lamb
  rationale: The term can denote the festival, the meal, or associated sacrificial
    elements. The immediate context concerns preparations for eating Passover, but
    the Greek itself uses the broader term. Rendering it 'the Passover' preserves
    that breadth and avoids importing a narrower liturgical interpretation into the
    main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
