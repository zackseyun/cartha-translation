theological_decisions:
- issue: Whether βλασφημοῦντες should be weakened to general abuse or retained with
    theological weight
  chosen_reading: Retain the stronger sense with 'blasphemous things'
  alternative_readings:
  - many other insulting things
  - many other abusive things
  rationale: In context the speakers are reviling Jesus. Since historic Christian
    orthodoxy affirms Jesus' true identity, language that preserves the seriousness
    of reviling him is appropriate, while still grounded in the lexical range of βλασφημέω.
    This does not import doctrine beyond the text but reflects the term's gravity.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
