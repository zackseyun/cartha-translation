id: LUK.22.65
reference: Luke 22:65
source:
  edition: SBLGNT
  text: καὶ ἕτερα πολλὰ βλασφημοῦντες ἔλεγον εἰς αὐτόν.
translation:
  text: And they kept saying many other blasphemous things against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many other insulting things' or 'many other abusive things.' The Greek
      participle can denote reviling speech more broadly, though 'blasphemous' best
      preserves its full force here.
    reason: lexical_alternative
  - marker: b
    text: Or 'to him.' The Greek preposition can be rendered more literally, but in
      this context 'against him' better conveys hostile speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Also
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding abuse; simple
    coordination is sufficient in English.
- source_word: ἕτερα πολλὰ
  chosen: many other
  alternatives:
  - many more
  - other many
  lexicon: BDAG
  rationale: The adjective-noun combination idiomatically means 'many other' or 'many
    more.' 'Many other' is natural English and preserves both plurality and addition
    to prior acts.
- source_word: βλασφημοῦντες
  chosen: blasphemous
  alternatives:
  - reviling
  - slanderous
  - abusive
  lexicon: BDAG
  rationale: The participle from βλασφημέω denotes speaking in a reviling, slanderous,
    or blasphemous way. Because the object is Jesus, 'blasphemous' preserves the gravity
    of speech directed against the Holy One without softening it to mere insult. It
    is rendered adjectivally in English to fit the idiom 'saying ... things.'
- source_word: ἔλεγον
  chosen: they kept saying
  alternatives:
  - they were saying
  - they said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action. 'They kept saying'
    captures the iterative force more clearly than simple past.
- source_word: εἰς αὐτόν
  chosen: against him
  alternatives:
  - to him
  - at him
  lexicon: BDAG
  rationale: Although εἰς often means 'to/into,' with hostile speech it can carry
    the sense 'against.' 'Against him' best conveys the adversative force in context;
    'to him' is possible but weaker in English.
