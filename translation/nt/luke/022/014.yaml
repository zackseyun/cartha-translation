theological_decisions:
- issue: Narrative meal posture at the Passover setting
  chosen_reading: he reclined at the table
  alternative_readings:
  - he sat down
  rationale: The translation preserves the historically specific dining posture implied
    by the Greek rather than flattening it into a generic modern action. This is a
    lexical-cultural decision, not a doctrinal expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English without flattening source meaning'
