id: LUK.22.14
reference: Luke 22:14
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἐγένετο ἡ ὥρα, ἀνέπεσεν καὶ ⸀οἱ ἀπόστολοι σὺν αὐτῷ.
translation:
  text: And when the hour came, he reclined at the table, and the apostles with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he reclined'; the verb refers to the customary posture
      for dining.
    reason: cultural_note
lexical_decisions:
- source_word: ὅτε ἐγένετο ἡ ὥρα
  chosen: when the hour came
  alternatives:
  - when the time came
  - when the hour had come
  lexicon: BDAG
  rationale: A natural English rendering of the idiom that preserves the definite
    article and the narrative sense of an appointed moment. 'Hour' is retained rather
    than generalized to 'time' because Luke often uses ὥρα with theological and narrative
    specificity.
- source_word: ἀνέπεσεν
  chosen: reclined at the table
  alternatives:
  - reclined
  - sat down
  lexicon: BDAG
  rationale: The verb ἀναπίπτω refers to reclining for a meal in ancient dining practice.
    'Reclined at the table' makes the cultural sense explicit for modern readers without
    over-paraphrasing. 'Sat down' is less precise and obscures the historical meal
    posture.
- source_word: οἱ ἀπόστολοι
  chosen: the apostles
  alternatives:
  - his apostles
  lexicon: BDAG
  rationale: The noun is articular and refers to the known group accompanying Jesus.
    'The apostles' is the most direct rendering; adding 'his' is interpretive and
    not required by the Greek.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'With him' is
    idiomatic and sufficiently captures the association expressed by σύν.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Luke uses καί as a simple connective here. 'And' preserves the narrative
    flow more formally, while remaining natural in English.
