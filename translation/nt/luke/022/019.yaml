theological_decisions:
- issue: Meaning of 'This is my body' in Eucharistic context
  chosen_reading: Preserved the literal wording 'This is my body' without interpretive
    expansion.
  alternative_readings:
  - This signifies my body
  - This represents my body
  rationale: The translation should not settle contested sacramental theology where
    the Greek itself states the phrase directly. Retaining 'is' preserves the textual
    form and theological tension, in line with the doctrine's instruction not to import
    denominational distinctives.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Text-critical status of the longer reading in Luke 22:19
  chosen_reading: Included the bracketed clause in the main text.
  alternative_readings:
  - Shorter text ending after 'This is my body'
  rationale: The provided SBLGNT source text includes the longer reading in brackets,
    indicating textual discussion but presenting it as the working text. The alternative
    shorter reading should be preserved in a footnote as a textual variant for auditability.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve alternatives in footnotes where significant.'
