id: LUK.22.19
reference: Luke 22:19
source:
  edition: SBLGNT
  text: καὶ λαβὼν ἄρτον εὐχαριστήσας ἔκλασεν καὶ ἔδωκεν αὐτοῖς λέγων· Τοῦτό ἐστιν
    τὸ σῶμά μου ⸂[τὸ ὑπὲρ ὑμῶν διδόμενον· τοῦτο ποιεῖτε εἰς τὴν ἐμὴν ἀνάμνησιν.
translation:
  text: And taking bread, after giving thanks he broke it and gave it to them, saying,
    “This is my body, which is given for you. Do this in remembrance of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts omit: ''which is given for you. Do this in remembrance
      of me.'''
    reason: textual_variant
  - marker: b
    text: Or 'which is being given for you.'
    reason: lexical_alternative
  - marker: c
    text: '''This is my body'' is translated as written; some interpret it as ''This
      signifies my body,'' but the Greek text itself uses ''is.'''
    reason: alternative_reading
lexical_decisions:
- source_word: λαβὼν
  chosen: taking
  alternatives:
  - having taken
  - took
  lexicon: BDAG
  rationale: A participial rendering preserves the Greek sequence and keeps the action
    flowing naturally in English without over-formal stiffness.
- source_word: ἄρτον
  chosen: bread
  lexicon: BDAG
  rationale: Standard and direct rendering of ἄρτος in this meal context.
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - after thanking God
  lexicon: BDAG
  rationale: The participle denotes thanksgiving preceding the breaking. 'After giving
    thanks' is idiomatic modern English and preserves the temporal sense without importing
    liturgical terminology.
- source_word: ἔκλασεν
  chosen: he broke
  alternatives:
  - broke
  lexicon: BDAG
  rationale: Direct rendering of the aorist verb κλάω in the bread-setting; explicit
    subject supplied naturally in English narrative.
- source_word: ἔδωκεν αὐτοῖς
  chosen: gave it to them
  alternatives:
  - gave to them
  lexicon: BDAG
  rationale: English requires the implied object 'it' for clarity; αὐτοῖς is naturally
    rendered 'to them.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial linkage to the preceding actions and matches
    common narrative English.
- source_word: Τοῦτό ἐστιν τὸ σῶμά μου
  chosen: This is my body
  alternatives:
  - This means my body
  lexicon: BDAG
  rationale: The straightforward copular statement should be preserved. Rendering
    ἐστιν as 'is' maintains the text's wording and avoids resolving sacramental debates
    by paraphrase.
- source_word: τὸ ὑπὲρ ὑμῶν διδόμενον
  chosen: which is given for you
  alternatives:
  - the one being given for you
  - which is being given on your behalf
  lexicon: BDAG
  rationale: The article-participle construction is naturally rendered as a relative
    clause in English. ὑπέρ here is best expressed as 'for' in a benefactive/substitutionary
    context, while 'given' keeps the sacrificial nuance without over-interpretation.
- source_word: τοῦτο ποιεῖτε
  chosen: Do this
  alternatives:
  - Keep doing this
  lexicon: BDAG
  rationale: The present imperative can imply ongoing practice, but idiomatic English
    in this institution context is 'Do this.' The iterative force is contextually
    understood without awkward expansion.
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  chosen: in remembrance of me
  alternatives:
  - for my remembrance
  - as my memorial
  lexicon: BDAG
  rationale: This is the most natural English rendering of the memorial sense of ἀνάμνησις
    here. 'In remembrance of me' is both accurate and clear, while avoiding archaic
    stiffness.
