id: LUK.22.60
reference: Luke 22:60
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ Πέτρος· Ἄνθρωπε, οὐκ οἶδα ὃ λέγεις. καὶ παραχρῆμα ἔτι λαλοῦντος
    αὐτοῦ ἐφώνησεν ἀλέκτωρ.
translation:
  text: But Peter said, “Man, I do not know what you are saying.” And immediately,
    while he was still speaking, a rooster crowed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a cock crowed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as “But” to mark the narrative turn and contrast with the preceding
    accusation/denial sequence; “And” is possible but weaker in English discourse.
- source_word: Ἄνθρωπε
  chosen: Man
  alternatives:
  - Sir
  - Fellow
  lexicon: BDAG
  rationale: Vocative singular of ἄνθρωπος is most directly “Man.” In this address
    to an individual male, “Man” is gender-accurate and preserves the blunt tone better
    than the more interpretive “Sir.”
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: A straightforward rendering of the negated perfect-form verb οἶδα in
    present sense. Expanded form suits the gravity and narrative register.
- source_word: ὃ λέγεις
  chosen: what you are saying
  alternatives:
  - what you mean
  - what you are talking about
  lexicon: BDAG
  rationale: The relative pronoun with λέγεις is naturally rendered “what you are
    saying.” This preserves the directness of Peter’s denial without paraphrasing
    into a more interpretive idiom.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Standard adverbial sense meaning something occurring without delay. “Immediately”
    is clear, natural, and suitably formal.
- source_word: ἔτι λαλοῦντος αὐτοῦ
  chosen: while he was still speaking
  alternatives:
  - while he was yet speaking
  - as he was still speaking
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. “While he was still
    speaking” is idiomatic modern English and preserves the temporal overlap emphasized
    by ἔτι.
- source_word: ἐφώνησεν ἀλέκτωρ
  chosen: a rooster crowed
  alternatives:
  - a cock crowed
  lexicon: BDAG
  rationale: English idiom normally expresses the action of a rooster as “crowed.”
    “Cock” is traditional but less natural in contemporary English; “rooster” is clearer
    for modern readers.
