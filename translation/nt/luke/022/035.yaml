id: LUK.22.35
reference: Luke 22:35
source:
  edition: SBLGNT
  text: Καὶ εἶπεν αὐτοῖς· Ὅτε ἀπέστειλα ὑμᾶς ἄτερ βαλλαντίου καὶ πήρας καὶ ὑποδημάτων,
    μή τινος ὑστερήσατε; οἱ δὲ εἶπαν· Οὐθενός.
translation:
  text: And he said to them, “When I sent you out without a money bag and a travel
    bag and sandals, did you lack anything?” And they said, “Nothing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “knapsack” for “travel bag.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄτερ
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: The preposition marks absence/lack. 'Without' is the most natural modern
    English equivalent in this context.
- source_word: βαλλαντίου
  chosen: money bag
  alternatives:
  - purse
  - money pouch
  lexicon: BDAG
  rationale: Refers to a bag for carrying money. 'Money bag' is clear, concrete, and
    avoids the potentially misleading modern sense of 'purse' as specifically feminine.
- source_word: πήρας
  chosen: travel bag
  alternatives:
  - bag
  - knapsack
  lexicon: BDAG
  rationale: πήρα denotes a bag or knapsack used for provisions on a journey. 'Travel
    bag' communicates function in readable modern English better than the more archaic
    or specific 'knapsack.'
- source_word: ὑποδημάτων
  chosen: sandals
  alternatives:
  - shoes
  - footwear
  lexicon: BDAG
  rationale: In Gospel travel contexts, 'sandals' is the standard and culturally fitting
    rendering for ὑπόδημα.
- source_word: μή τινος ὑστερήσατε
  chosen: did you lack anything?
  alternatives:
  - did you lack anything at all?
  - were you in need of anything?
  lexicon: BDAG
  rationale: The μή introduces a question expecting a negative answer. ὑστερέω here
    means to be lacking or in need. 'Did you lack anything?' preserves the straightforward
    sense and natural English idiom.
- source_word: Οὐθενός
  chosen: Nothing
  alternatives:
  - Nothing at all
  - Of nothing
  lexicon: BDAG
  rationale: A concise genitive response meaning 'nothing' or 'not anything.' 'Nothing'
    is idiomatic English and matches the brevity of the Greek reply.
- source_word: ἀπέστειλα
  chosen: I sent you out
  alternatives:
  - I sent you
  lexicon: BDAG
  rationale: In mission context, 'sent you out' captures the dispatching force of
    ἀποστέλλω more clearly than the flatter 'sent you'.
