id: LUK.22.34
reference: Luke 22:34
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Λέγω σοι, Πέτρε, οὐ ⸀φωνήσει σήμερον ἀλέκτωρ ⸀ἕως τρίς ⸂με ἀπαρνήσῃ
    εἰδέναι⸃.
translation:
  text: But he said, “I tell you, Peter, a rooster will not crow today until you deny
    three times that you know me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the rooster will not crow today before you deny three times that you
      know me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common direct-speech formula. 'I tell you' is natural modern English
    while preserving the force of the present λέγω.
- source_word: Πέτρε
  chosen: Peter
  rationale: Personal name is transliterated per project philosophy.
- source_word: φωνήσει
  chosen: will crow
  alternatives:
  - will sound
  - will call
  lexicon: BDAG
  rationale: With ἀλέκτωρ as subject, the idiomatic sense is the crowing of a rooster,
    not merely making a sound.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: Straightforward temporal adverb; 'today' is the natural modern equivalent.
- source_word: ἀλέκτωρ
  chosen: a rooster
  alternatives:
  - the rooster
  - cock
  lexicon: BDAG
  rationale: Indefinite English idiom works well here. 'Cock' is archaic/regionally
    marked in modern English. The anarthrous Greek does not require 'the rooster,'
    though that is also possible.
- source_word: ἕως
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: Temporal conjunction marking the point up to which the negated action
    holds. 'Until' best preserves the syntax.
- source_word: τρίς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: Modern, readable equivalent of the adverb.
- source_word: ἀπαρνήσῃ
  chosen: you deny
  alternatives:
  - you disown
  - you will deny
  lexicon: BDAG
  rationale: The verb means to deny or repudiate. 'Deny' is the standard and clearest
    rendering here. Although the form is aorist subjunctive after ἕως, English idiom
    naturally renders the clause as 'until you deny...' rather than preserving a more
    wooden form.
- source_word: με ἀπαρνήσῃ εἰδέναι
  chosen: you deny ... that you know me
  alternatives:
  - you deny knowing me
  - you deny me, saying you know me not
  lexicon: BDAG
  rationale: 'The complementary infinitive εἰδέναι specifies the content of the denial:
    Peter will deny knowing Jesus. ''That you know me'' is explicit and natural in
    English, preserving the sense better than a bare ''deny me,'' which could imply
    repudiating allegiance rather than denying acquaintance.'
- source_word: ὁ δὲ εἶπεν
  chosen: But he said
  alternatives:
  - And he said
  - Then he said
  lexicon: BDAG
  rationale: δέ is mildly contrastive or continuative; 'But' fits the immediate exchange
    and preserves the discourse turn.
