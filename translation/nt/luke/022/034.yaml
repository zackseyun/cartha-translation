theological_decisions:
- issue: Nature of Peter's predicted denial
  chosen_reading: 'Render the denial specifically as denying knowledge of Jesus: ''until
    you deny three times that you know me.'''
  alternative_readings:
  - until you deny me three times
  - until you three times deny knowing me
  rationale: The Greek includes εἰδέναι, which should not be omitted. This keeps the
    prediction tied to Peter's denial of acquaintance, without importing broader theological
    claims beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
