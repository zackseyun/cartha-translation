id: LUK.22.58
reference: Luke 22:58
source:
  edition: SBLGNT
  text: καὶ μετὰ βραχὺ ἕτερος ἰδὼν αὐτὸν ἔφη· Καὶ σὺ ἐξ αὐτῶν εἶ· ὁ δὲ Πέτρος ⸀ἔφη·
    Ἄνθρωπε, οὐκ εἰμί.
translation:
  text: And after a little while, another man, seeing him, said, “You also are one
    of them.” But Peter said, “Man, I am not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “I am not one of them.” The Greek simply says, “I am
      not,” leaving the object implied from the previous accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ βραχὺ
  chosen: after a little while
  alternatives:
  - shortly after
  - after a short time
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning a brief interval later. 'After
    a little while' preserves the sense naturally in English without over-literal
    awkwardness.
- source_word: ἕτερος
  chosen: another man
  alternatives:
  - another
  - someone else
  lexicon: BDAG
  rationale: ἕτερος means 'another' or 'another person.' 'Man' is supplied in English
    because the speaker addresses Peter as Ἄνθρωπε and the context is an individual
    accuser; this makes the narrative clear and remains faithful to the masculine
    singular referent.
- source_word: ἰδὼν αὐτὸν
  chosen: seeing him
  alternatives:
  - when he saw him
  - after seeing him
  lexicon: BDAG
  rationale: Aorist participle giving attendant circumstance/background. 'Seeing him'
    is concise and natural, preserving the participial force without unnecessary expansion.
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  - declared
  lexicon: BDAG
  rationale: φημί here functions as a simple speech introducer in narrative. 'Said'
    is the most natural modern English equivalent.
- source_word: Καὶ σὺ ἐξ αὐτῶν εἶ
  chosen: You also are one of them
  alternatives:
  - You too are from them
  - You also belong to them
  lexicon: BDAG
  rationale: ἐξ αὐτῶν in this context identifies association with the group around
    Jesus, not merely origin. 'One of them' is the idiomatic English expression for
    group membership and accusation.
- source_word: Ἄνθρωπε
  chosen: Man
  alternatives:
  - Sir
  lexicon: BDAG
  rationale: Vocative ἄνθρωπε is a direct address meaning 'man.' 'Sir' is possible
    as a smoother English equivalent, but 'Man' better preserves the abrupt, defensive
    tone of Peter's denial and follows the gender-accurate principle.
- source_word: οὐκ εἰμί
  chosen: I am not
  alternatives:
  - I am not one of them
  - No, I am not
  lexicon: BDAG
  rationale: The Greek is elliptical, literally 'I am not,' with the predicate understood
    from the accusation. Retaining the ellipsis preserves the terseness of Peter's
    denial without importing extra words into the main text.
