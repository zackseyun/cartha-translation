id: LUK.22.4
reference: Luke 22:4
source:
  edition: SBLGNT
  text: καὶ ἀπελθὼν συνελάλησεν τοῖς ἀρχιερεῦσιν καὶ στρατηγοῖς τὸ πῶς ⸂αὐτοῖς παραδῷ
    αὐτόν⸃.
translation:
  text: And after he went away, he discussed with the chief priests and officers how
    he might hand him over to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'betray him.' The Greek verb can mean 'hand over,' 'deliver over,' or,
      in this context, 'betray.'
    reason: lexical_alternative
  - marker: b
    text: The 'officers' were likely temple authorities or members of the temple guard,
      not Roman soldiers.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπελθὼν
  chosen: after he went away
  alternatives:
  - having gone away
  - departing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After he went away' is idiomatic and preserves the sequence
    without sounding wooden.
- source_word: συνελάλησεν
  chosen: discussed
  alternatives:
  - spoke with
  - conferred with
  lexicon: BDAG
  rationale: The verb indicates speaking together or conferring. 'Discussed' captures
    the collaborative, deliberative sense in readable modern English. 'Conferred'
    is possible but slightly more formal.
- source_word: ἀρχιερεῦσιν
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not multiple holders of the singular office of high priest at once.
- source_word: στρατηγοῖς
  chosen: officers
  alternatives:
  - captains
  - commanders
  - temple officers
  lexicon: BDAG
  rationale: In this Jerusalem temple context, the term refers to officials associated
    with the temple guard rather than generic military commanders. 'Officers' is concise
    and natural; the temple-specific nuance is preserved in a footnote.
- source_word: τὸ πῶς
  chosen: how
  alternatives:
  - about how
  - the way in which
  lexicon: BDAG
  rationale: The article with πῶς forms an idiomatic expression introducing the content
    of the discussion. English simply uses 'how'.
- source_word: παραδῷ
  chosen: might hand ... over
  alternatives:
  - might betray
  - might deliver over
  lexicon: BDAG
  rationale: παραδίδωμι can mean 'hand over,' 'deliver up,' or in context 'betray.'
    'Hand over' preserves the concrete lexical sense and lets the betrayal be inferred
    from context rather than importing an interpretive gloss into the verb itself.
- source_word: αὐτοῖς ... αὐτόν
  chosen: to them ... him
  lexicon: NA28/SBLGNT context
  rationale: 'The dative and accusative pronouns are retained distinctly: Judas seeks
    how he might hand ''him'' (Jesus) over ''to them'' (the chief priests and officers).
    English word order makes this clear.'
