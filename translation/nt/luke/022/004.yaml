theological_decisions:
- issue: Rendering παραδῷ in Judas's action
  chosen_reading: hand him over
  alternative_readings:
  - betray him
  - deliver him over
  rationale: The context is Judas's treacherous arrangement, but the Greek verb itself
    is broader than the English theological term 'betray.' Following optimal equivalence
    and original-language primacy, the main text keeps the more transparent lexical
    sense while preserving the more interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
