theological_decisions:
- issue: Whether 'the authority of darkness' should be made explicit as Satan's authority
    or the dominion of evil
  chosen_reading: Retain the metaphorical phrase 'the authority of darkness' without
    explicit interpretive expansion.
  alternative_readings:
  - the power of darkness
  - the authority of Satan
  - the dominion of evil
  rationale: The text itself uses 'darkness' rather than naming Satan directly. Preserving
    the metaphor maintains the theological tension and avoids importing a doctrinal
    specification the verse does not explicitly state, while still allowing readers
    to perceive the hostile spiritual dimension from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
