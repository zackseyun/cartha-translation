id: LUK.22.53
reference: Luke 22:53
source:
  edition: SBLGNT
  text: καθ’ ἡμέραν ὄντος μου μεθ’ ὑμῶν ἐν τῷ ἱερῷ οὐκ ἐξετείνατε τὰς χεῖρας ἐπ’ ἐμέ·
    ἀλλ’ αὕτη ⸂ἐστὶν ὑμῶν⸃ ἡ ὥρα καὶ ἡ ἐξουσία τοῦ σκότους.
translation:
  text: Day after day, while I was with you in the temple, you did not lay hands on
    me. But this is your hour, and the authority of darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you did not stretch out your hands against me'; the Greek idiom refers
      to taking hostile action, here in the context of arrest.
    reason: lexical_alternative
  - marker: b
    text: Or 'the power of darkness.'
    reason: alternative_reading
lexical_decisions:
- source_word: καθ’ ἡμέραν
  chosen: Day after day
  alternatives:
  - Every day
  - Daily
  lexicon: BDAG
  rationale: Idiomatic distributive expression meaning repeated daily occurrence.
    'Day after day' preserves the ongoing, repeated sense in natural English.
- source_word: ὄντος μου μεθ’ ὑμῶν
  chosen: while I was with you
  alternatives:
  - when I was with you
  - as I was with you
  lexicon: BDAG
  rationale: Genitive absolute rendered as a temporal clause in English. 'While I
    was with you' is natural and preserves the circumstantial force.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is standard and readable; the broader precinct sense is noted by alternatives
    but need not be expanded in the main text here.
- source_word: οὐκ ἐξετείνατε τὰς χεῖρας ἐπ’ ἐμέ
  chosen: you did not lay hands on me
  alternatives:
  - you did not stretch out your hands against me
  - you did not seize me
  lexicon: BDAG
  rationale: The Greek idiom literally speaks of stretching out hands against someone,
    here in arrest context. 'Lay hands on me' preserves the arrestive/hostile idiom
    in clear English without over-paraphrasing to 'seize me' alone.
- source_word: ἀλλ’ αὕτη ἐστὶν ὑμῶν ἡ ὥρα
  chosen: But this is your hour
  alternatives:
  - But this is your time
  - But this is the hour belonging to you
  lexicon: BDAG
  rationale: ὥρα here is more than clock-time; it denotes the appointed moment. 'Your
    hour' is concise, idiomatic, and preserves the solemn force.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - domain
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. 'Authority'
    best preserves the sense of operative dominion here without implying mere raw
    force.
- source_word: τοῦ σκότους
  chosen: of darkness
  alternatives:
  - of the darkness
  lexicon: BDAG
  rationale: The genitive is qualitative/personalized in context, referring to the
    realm or power characterized by darkness. 'Of darkness' is idiomatic and preserves
    the metaphorical and theological weight.
