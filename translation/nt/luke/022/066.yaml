theological_decisions:
- issue: Institutional terminology for Jewish ruling body
  chosen_reading: Differentiate πρεσβυτέριον and συνέδριον as 'the council of the
    elders' and 'their council chamber'
  alternative_readings:
  - Render both as 'council'
  - Render συνέδριον as 'Sanhedrin'
  rationale: The verse uses two related but distinct terms. Preserving that distinction
    improves auditability and respects the source text's lexical variation. Using
    'Sanhedrin' would import a conventional label rather than translate the Greek
    directly.
  doctrine_reference: Translation philosophy §1, §5
