id: LUK.22.66
reference: Luke 22:66
source:
  edition: SBLGNT
  text: Καὶ ὡς ἐγένετο ἡμέρα, συνήχθη τὸ πρεσβυτέριον τοῦ λαοῦ, ἀρχιερεῖς ⸀τε καὶ
    γραμματεῖς, καὶ ⸀ἀπήγαγον αὐτὸν εἰς τὸ συνέδριον αὐτῶν,
translation:
  text: And when day came, the council of the elders of the people gathered together,
    both chief priests and scribes, and they led him away into their council chamber,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when it became day' or 'at daybreak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into their council' or 'before their council.' The Greek uses συνέδριον,
      which can refer to the council itself or its formal meeting/place.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐγένετο ἡμέρα
  chosen: when day came
  alternatives:
  - when it became day
  - at daybreak
  lexicon: BDAG
  rationale: A natural English rendering of the idiom that preserves the temporal
    sense without unnecessary stiffness. 'At daybreak' is possible, but 'when day
    came' more closely reflects the verbal construction ἐγένετο.
- source_word: συνήχθη
  chosen: gathered together
  alternatives:
  - assembled
  - was convened
  lexicon: BDAG
  rationale: The passive form indicates the body came together/was assembled. 'Gathered
    together' preserves the collective sense and echoes the συν- prefix. 'Was convened'
    is possible but slightly more interpretive.
- source_word: τὸ πρεσβυτέριον τοῦ λαοῦ
  chosen: the council of the elders of the people
  alternatives:
  - the assembly of the elders of the people
  - the eldership of the people
  lexicon: BDAG
  rationale: πρεσβυτέριον denotes a body of elders rather than merely the abstract
    concept of eldership. 'Council of the elders' communicates an institutional group
    clearly in modern English while retaining the relation to 'elders.'
- source_word: ἀρχιερεῖς τε καὶ γραμματεῖς
  chosen: both chief priests and scribes
  alternatives:
  - chief priests as well as scribes
  - both the chief priests and the scribes
  lexicon: BDAG
  rationale: The correlative τε καί is well represented by 'both ... and ...'. 'Chief
    priests' and 'scribes' are standard, transparent renderings of the offices/groups
    involved.
- source_word: ἀπήγαγον
  chosen: they led him away
  alternatives:
  - they brought him away
  - they took him away
  lexicon: BDAG
  rationale: ἀπάγω commonly means to lead or take away. 'Led him away' preserves the
    directional force of ἀπό and fits the judicial setting without overstating violence.
- source_word: εἰς τὸ συνέδριον αὐτῶν
  chosen: into their council chamber
  alternatives:
  - into their council
  - before their council
  - into their Sanhedrin
  lexicon: BDAG
  rationale: Since πρεσβυτέριον has already been rendered as the council/body, συνέδριον
    here is best taken as the meeting place or formal session into which Jesus is
    brought. Rendering both nouns identically as 'council' would obscure Luke's variation.
    'Sanhedrin' is historically plausible but is a transliterated institutional term
    not present in the Greek and less transparent for general readers.
