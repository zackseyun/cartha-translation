theological_decisions:
- issue: Rendering of Jesus' self-reference through the title διδάσκαλος
  chosen_reading: The Teacher
  alternative_readings:
  - the teacher
  - Master
  rationale: The verse presents Jesus identifying himself by a recognized title. Translating
    the title rather than preserving traditional ecclesiastical wording follows the
    project's principle of translating titles for meaning. No doctrinal dispute is
    at stake, but the choice affects how directly the Greek is represented.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
