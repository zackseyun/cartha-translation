id: LUK.22.11
reference: Luke 22:11
source:
  edition: SBLGNT
  text: καὶ ἐρεῖτε τῷ οἰκοδεσπότῃ τῆς οἰκίας· Λέγει σοι ὁ διδάσκαλος· Ποῦ ἐστιν τὸ
    κατάλυμα ὅπου τὸ πάσχα μετὰ τῶν μαθητῶν μου φάγω;
translation:
  text: And you will say to the master of the house, ‘The Teacher says to you, “Where
    is the guest room, where I may eat the Passover with my disciples?”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lodging place.' The Greek κατάλυμα refers to a place for lodging or
      a guest room; it does not specifically mean 'inn' here, and 'upper room' is
      supplied only in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδεσπότῃ τῆς οἰκίας
  chosen: the master of the house
  alternatives:
  - the owner of the house
  - the householder
  lexicon: BDAG
  rationale: οἰκοδεσπότης denotes the head/master of a household. 'Master of the house'
    is natural modern English and preserves the authority nuance better than the more
    archaic 'householder.' The added genitive τῆς οἰκίας is retained idiomatically
    as 'of the house.'
- source_word: ὁ διδάσκαλος
  chosen: The Teacher
  alternatives:
  - the teacher
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος is a title here. 'Teacher' directly translates the Greek and
    avoids importing the more traditional but less transparent 'Master.' Capitalization
    reflects titular use referring to Jesus in direct speech.
- source_word: κατάλυμα
  chosen: guest room
  alternatives:
  - lodging place
  - inn
  - upper room
  lexicon: BDAG
  rationale: κατάλυμα refers to a place of lodging or guest accommodation. In Luke,
    'guest room' best fits the domestic setting and avoids the misleading 'inn.' 'Upper
    room' is not the lexical meaning here, though the next verse specifies a large
    furnished upper room.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  lexicon: BDAG
  rationale: πάσχα can denote the Passover festival or meal. Here the eating context
    makes the meal especially in view, but 'the Passover' is sufficiently precise
    and preserves the Jewish festal term without over-specifying beyond the Greek.
- source_word: μετὰ τῶν μαθητῶν μου
  chosen: with my disciples
  alternatives:
  - with my students
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Gospel contexts because
    it carries the relational and formative sense of committed followers, not merely
    classroom students.
- source_word: φάγω
  chosen: I may eat
  alternatives:
  - I will eat
  - I can eat
  lexicon: BDAG
  rationale: 'The aorist subjunctive after ὅπου naturally conveys purpose or contemplated
    action in an indirect question: ''where I may eat'' or ''where I can eat.'' ''May
    eat'' preserves the nuance without sounding overly formal.'
- source_word: ἐρεῖτε
  chosen: you will say
  alternatives:
  - you are to say
  lexicon: BDAG
  rationale: Future indicative here functions as an instruction about what the disciples
    will say. 'You will say' is a straightforward rendering that preserves the form
    while fitting English idiom.
