id: LUK.22.24
reference: Luke 22:24
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ καὶ φιλονεικία ἐν αὐτοῖς, τὸ τίς αὐτῶν δοκεῖ εἶναι μείζων.
translation:
  text: Now a dispute also arose among them about which of them was considered to
    be greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which of them seemed to be greater.' The Greek verb can mean 'seemed'
      or 'was considered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: arose
  alternatives:
  - came about
  - occurred
  - happened
  lexicon: BDAG
  rationale: γίνομαι here introduces the emergence of a situation rather than mere
    existence. 'Arose' is idiomatic English for the onset of a dispute and fits the
    narrative flow better than the more wooden 'there was' or 'it happened.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ marks a narrative development or transition. 'Now' signals the shift
    naturally in English without overstating contrast. An untranslated rendering is
    possible, but some connective is helpful for readability.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: καί here adds this incident to the surrounding events. 'Also' preserves
    the additive force and reflects that this dispute occurred in addition to what
    has just been narrated.
- source_word: φιλονεικία
  chosen: dispute
  alternatives:
  - quarrel
  - rivalry
  - contention
  lexicon: BDAG
  rationale: φιλονεικία denotes contentious rivalry or strife. 'Dispute' is clear
    modern English and fits the immediate context of argument over status. 'Rivalry'
    captures the competitive element but is less natural with the following clause
    in English.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - between them
  - in them
  lexicon: BDAG
  rationale: 'ἐν with the dative here is relational/social: the contention took place
    within the group. ''Among them'' is the most natural rendering for a plural group
    context.'
- source_word: τὸ τίς αὐτῶν
  chosen: about which of them
  alternatives:
  - as to which of them
  - concerning who among them
  lexicon: BDAG
  rationale: The article τὸ introduces the content of the dispute, effectively nominalizing
    the indirect question. 'About which of them' expresses the topic of the dispute
    in idiomatic English.
- source_word: δοκεῖ
  chosen: was considered
  alternatives:
  - seemed
  - was thought
  - appeared
  lexicon: BDAG
  rationale: δοκέω can mean 'seem' or 'be considered/think.' In this context of status
    ranking within the group, the sense is social estimation rather than mere appearance.
    'Was considered' best captures that evaluative nuance.
- source_word: εἶναι
  chosen: to be
  alternatives:
  - ''
  lexicon: BDAG
  rationale: The infinitive complements δοκεῖ and is naturally rendered 'to be' in
    English.
- source_word: μείζων
  chosen: greater
  alternatives:
  - the greatest
  - more important
  - superior
  lexicon: BDAG
  rationale: μείζων is the comparative form, literally 'greater.' Rendering it as
    'the greatest' would overtranslate the comparative into a superlative. 'Greater'
    preserves the Greek form while still conveying the status comparison.
