theological_decisions:
- issue: Status language among the disciples
  chosen_reading: greater
  alternative_readings:
  - greatest
  - more important
  rationale: The Greek uses the comparative μείζων, not an explicit superlative. The
    translation preserves the text's wording and does not intensify the claim beyond
    what the source states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
