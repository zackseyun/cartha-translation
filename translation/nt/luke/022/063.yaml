theological_decisions:
- issue: Identification of Jesus' abusers
  chosen_reading: the men who were holding him
  alternative_readings:
  - the guards who were holding him
  rationale: The text itself uses the generic term ἄνδρες. Although the broader context
    implies custodial personnel, the translation should not narrow the reference beyond
    what the Greek explicitly states.
  doctrine_reference: Translation philosophy §1, §4
