id: LUK.22.63
reference: Luke 22:63
source:
  edition: SBLGNT
  text: Καὶ οἱ ἄνδρες οἱ συνέχοντες ⸀αὐτὸν ἐνέπαιζον αὐτῷ δέροντες,
translation:
  text: And the men who were holding him mocked him while beating him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men who were detaining him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέχοντες
  chosen: were holding
  alternatives:
  - were detaining
  - were keeping in custody
  - were restraining
  lexicon: BDAG
  rationale: The participle from συνέχω here refers to physically keeping Jesus in
    custody. 'Were holding' is natural English and preserves the concrete sense without
    over-specifying formal imprisonment language.
- source_word: ἐνέπαιζον
  chosen: mocked
  alternatives:
  - ridiculed
  - made fun of
  - treated with contempt
  lexicon: BDAG
  rationale: ἐμπαίζω commonly means to mock or ridicule in a hostile sense. 'Mocked'
    is the standard, concise rendering and fits the passion context.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - at him
  lexicon: BDAG
  rationale: Although the verb can take a dative, idiomatic English expresses the
    object directly as 'mocked him' rather than 'mocked at him.'
- source_word: δέροντες
  chosen: while beating him
  alternatives:
  - striking him
  - flogging him
  lexicon: BDAG
  rationale: The participle denotes physical blows. 'While beating him' captures the
    durative, accompanying action with clear modern English. 'Flogging' would be too
    specific for the Greek here.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - guards
  - soldiers
  lexicon: BDAG
  rationale: The Greek explicitly says 'men,' not a more specific occupational term.
    To translate 'guards' would import context rather than reflect the lexical form.
    This also follows the gender-accurate principle.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: A simple connective best reflects the Greek narrative flow without adding
    temporal nuance beyond the text.
