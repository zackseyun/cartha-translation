theological_decisions:
- issue: Force of ἀνέλωσιν in relation to the leaders' intent
  chosen_reading: Rendered as 'kill him' without softening the hostility or specifying
    a formal execution process.
  alternative_readings:
  - do away with him
  - put him to death
  rationale: The verse presents a clear murderous intent by the chief priests and
    scribes. 'Kill him' preserves the severity of the Greek while avoiding over-interpretation
    about legal procedure at this point in the narrative.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of λαός
  chosen_reading: Rendered collectively as 'the people.'
  alternative_readings:
  - the crowd
  rationale: 'This avoids importing a narrower sociological reading and preserves
    the narrative tension: the leaders are restrained by fear of public reaction.'
  doctrine_reference: Translation philosophy §1, §5
