id: LUK.22.2
reference: Luke 22:2
source:
  edition: SBLGNT
  text: καὶ ἐζήτουν οἱ ἀρχιερεῖς καὶ οἱ γραμματεῖς τὸ πῶς ἀνέλωσιν αὐτόν, ἐφοβοῦντο
    γὰρ τὸν λαόν.
translation:
  text: And the chief priests and the scribes were seeking how they might kill him,
    for they were afraid of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how they could put him to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were looking for
  - were trying to find
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or repeated action in past time; 'were
    seeking' preserves that aspect better than simple past 'sought.'
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard plural rendering for the Jerusalem priestly leadership; 'high
    priests' is less idiomatic in English and can mislead readers into thinking of
    multiple holders of the singular office.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct and established rendering of γραμματεῖς
    in Gospel narrative. Alternatives are more interpretive and context-expanding
    than the Greek itself.'
- source_word: τὸ πῶς
  chosen: how
  alternatives:
  - the way in which
  - how they could
  lexicon: BDAG
  rationale: The article with πῶς forms an idiomatic expression meaning 'how' or 'the
    way/how.' English naturally omits the article here.
- source_word: ἀνέλωσιν
  chosen: might kill
  alternatives:
  - might do away with
  - might destroy
  - might put to death
  lexicon: BDAG
  rationale: ἀναιρέω here refers to killing/removing by death. 'Might kill' is clear,
    natural English and fits the deliberative force after πῶς. 'Put to death' is possible
    but slightly more formal/judicial than the immediate context requires.
- source_word: ἐφοβοῦντο
  chosen: were afraid
  alternatives:
  - feared
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates continuing state; 'were afraid' preserves
    the ongoing sense more clearly than simple past 'feared.'
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός in Luke commonly refers to the people as a collective body. 'The
    people' is the most direct rendering; 'the crowd' would narrow the reference too
    much to a gathered audience.
