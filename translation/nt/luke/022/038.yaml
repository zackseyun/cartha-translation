theological_decisions:
- issue: Interpretive ambiguity of Jesus' reply Ἱκανόν ἐστιν
  chosen_reading: It is enough
  alternative_readings:
  - That is enough
  - Enough of this
  rationale: The Greek permits either a literal assessment ('two are enough') or a
    dismissive ending of the conversation. In keeping with the translation philosophy,
    the main text preserves the ambiguity rather than resolving it interpretively.
    A footnote preserves the alternative sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
