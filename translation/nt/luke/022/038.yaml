id: LUK.22.38
reference: Luke 22:38
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Κύριε, ἰδοὺ μάχαιραι ὧδε δύο. ὁ δὲ εἶπεν αὐτοῖς· Ἱκανόν ἐστιν.
translation:
  text: And they said, “Lord, look, here are two swords.” And he said to them, “It
    is enough.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “That is enough,” possibly meaning the discussion should end rather
      than that two swords were sufficient.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - Then they said
  - But they said
  lexicon: BDAG
  rationale: δέ is a mild connective that can be rendered in several ways depending
    on English flow. 'And' preserves the narrative progression naturally without overstating
    contrast.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'Lord' best matches both
    the address to Jesus and established NT title usage.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: '''Look'' conveys the deictic force in readable modern English. ''Behold''
    is too archaic for the stated style, while ''see'' is possible but slightly less
    idiomatic in direct speech here.'
- source_word: μάχαιραι
  chosen: swords
  alternatives:
  - short swords
  - daggers
  lexicon: BDAG
  rationale: μάχαιρα denotes a bladed weapon and is conventionally rendered 'sword.'
    More specific renderings such as 'dagger' or 'short sword' may over-specify beyond
    what the context requires.
- source_word: ὧδε δύο
  chosen: here are two
  alternatives:
  - here, two
  - two here
  lexicon: BDAG
  rationale: This captures the deictic adverb ὧδε together with the numeral in natural
    English word order.
- source_word: Ἱκανόν ἐστιν
  chosen: It is enough
  alternatives:
  - Enough
  - That is enough
  - It is sufficient
  lexicon: BDAG
  rationale: ἱκανός can mean 'enough,' 'sufficient,' or 'adequate.' 'It is enough'
    preserves the Greek clause structure and leaves the saying's ambiguity intact,
    rather than interpreting whether Jesus means the number of swords is sufficient
    or that the discussion should stop.
