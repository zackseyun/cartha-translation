id: LUK.22.69
reference: Luke 22:69
source:
  edition: SBLGNT
  text: ἀπὸ τοῦ νῦν ⸀δὲ ἔσται ὁ υἱὸς τοῦ ἀνθρώπου καθήμενος ἐκ δεξιῶν τῆς δυνάμεως
    τοῦ θεοῦ.
translation:
  text: But from now on the Son of Man will be seated at the right hand of the power
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the right hand of Power,' a reverential way of referring to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time
  - henceforth
  lexicon: BDAG
  rationale: Idiomatic temporal expression indicating the point from which the stated
    reality holds. 'From now on' is natural modern English and preserves the forward-looking
    force.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks a contrastive or transitional turn in Jesus' reply. 'But'
    best reflects the adversative nuance in context.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - will become
  lexicon: BDAG
  rationale: Future of εἰμί here introduces the coming state of exaltation. 'Will
    be' is the straightforward rendering in English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation, echoing Danielic and apocalyptic
    usage. It should be translated literally rather than paraphrased, preserving both
    title and ambiguity.
- source_word: καθήμενος
  chosen: seated
  alternatives:
  - sitting
  lexicon: BDAG
  rationale: The participle denotes the enthroned posture. 'Seated' better conveys
    royal/session imagery in contemporary English than the more ordinary 'sitting'.
- source_word: ἐκ δεξιῶν
  chosen: at the right hand
  alternatives:
  - at the right side
  - on the right
  lexicon: BDAG
  rationale: This is a fixed biblical idiom for the place of highest honor and authority.
    'At the right hand' preserves the idiom and its intertextual resonance.
- source_word: τῆς δυνάμεως
  chosen: the power
  alternatives:
  - Power
  lexicon: BDAG
  rationale: δύναμις means 'power.' The phrase likely functions as a reverential circumlocution
    in parallel to expressions like 'the right hand of Power.' Lowercase 'power' is
    retained because the Greek common noun is articular but not explicitly a proper
    name here; the referent is clarified by 'of God.'
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Genitive specifying whose power is in view. Rendering it explicitly avoids
    obscuring the reverential circumlocution while preserving the Greek wording.
