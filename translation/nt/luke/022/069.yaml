theological_decisions:
- issue: Rendering the exaltation formula and divine authority claim
  chosen_reading: the Son of Man will be seated at the right hand of the power of
    God
  alternative_readings:
  - the Son of Man will sit at the right hand of God's power
  - the Son of Man will be seated at the right hand of Power
  rationale: The wording preserves the text's strong claim of exaltation and authority
    without over-paraphrasing. 'Seated at the right hand' maintains the Psalm 110/Daniel
    7 resonance central to the passage. The phrase 'power of God' is kept explicit
    rather than replacing it with a more interpretive title, while an alternative
    reflecting the reverential circumlocution is preserved in a footnote.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
