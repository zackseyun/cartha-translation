theological_decisions:
- issue: Narrative description of Peter's relation to Jesus during the arrest
  chosen_reading: Rendered the imperfect ἠκολούθει as 'was following' without importing
    evaluative language such as 'secretly' or 'timidly.'
  alternative_readings:
  - Peter followed from a distance
  - Peter kept following at a distance
  rationale: The verse narrates Peter's physical following at a distance but does
    not itself explicitly interpret his motive. The translation preserves the narrative
    tension without adding psychological commentary.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
