id: LUK.22.54
reference: Luke 22:54
source:
  edition: SBLGNT
  text: Συλλαβόντες δὲ αὐτὸν ἤγαγον καὶ ⸀εἰσήγαγον εἰς ⸂τὴν οἰκίαν⸃ τοῦ ἀρχιερέως·
    ὁ δὲ Πέτρος ἠκολούθει μακρόθεν.
translation:
  text: After arresting him, they led him away and brought him into the high priest’s
    house; but Peter was following at a distance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a distance' or more traditionally 'far off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συλλαβόντες
  chosen: After arresting
  alternatives:
  - Having seized
  - After seizing
  lexicon: BDAG
  rationale: Aorist participle of συλλαμβάνω indicating prior action relative to the
    main verbs. 'After arresting' is natural modern English and fits the legal/custodial
    context better than the more generic 'seizing.'
- source_word: ἤγαγον
  chosen: they led him away
  alternatives:
  - they led him
  - they took him away
  lexicon: BDAG
  rationale: ἄγω commonly means 'lead' or 'bring.' 'Led him away' captures movement
    under custody and works idiomatically in English, especially paired with the following
    εἰσήγαγον.
- source_word: εἰσήγαγον
  chosen: brought him into
  alternatives:
  - led him into
  - took him into
  lexicon: BDAG
  rationale: εἰσάγω adds the sense of bringing/leading into an interior space. 'Brought
    him into' preserves the directional force and avoids awkward repetition of 'led'
    immediately after ἤγαγον.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  - residence
  lexicon: BDAG
  rationale: οἰκία most straightforwardly means 'house' or 'household.' Here the physical
    location is in view, so 'house' is the most direct rendering; 'home' could sound
    too domestic and 'residence' too formal.
- source_word: ἀρχιερέως
  chosen: the high priest’s
  alternatives:
  - the chief priest’s
  lexicon: BDAG
  rationale: ἀρχιερεύς is the standard NT term for 'high priest.' This is the established
    and accurate rendering in this context.
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  - kept following
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time. 'Was following'
    preserves the progressive aspect more clearly than simple past 'followed.'
- source_word: μακρόθεν
  chosen: at a distance
  alternatives:
  - from a distance
  - far off
  lexicon: BDAG
  rationale: The adverb denotes spatial distance. 'At a distance' is clear modern
    English; 'far off' is more traditional but slightly less natural for contemporary
    readers.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: The second δέ marks a mild contrast between Jesus being taken inside
    and Peter's separate, cautious following. 'But' brings out that contrast naturally
    in English.
