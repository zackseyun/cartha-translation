id: LUK.22.10
reference: Luke 22:10
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Ἰδοὺ εἰσελθόντων ὑμῶν εἰς τὴν πόλιν συναντήσει ὑμῖν ἄνθρωπος
    κεράμιον ὕδατος βαστάζων· ἀκολουθήσατε αὐτῷ εἰς τὴν οἰκίαν ⸂εἰς ἣν⸃ εἰσπορεύεται.
translation:
  text: And he said to them, “Look, when you enter the city, a man carrying a jar
    of water will meet you. Follow him into the house that he enters.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Behold.'
    reason: lexical_alternative
  - marker: b
    text: κέράμιον can refer specifically to an earthenware vessel; hence 'an earthenware
      jar of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as the natural modern attention-getter 'Look' rather than the
    more archaic 'Behold,' preserving the deictic force in readable English.
- source_word: εἰσελθόντων ὑμῶν εἰς τὴν πόλιν
  chosen: when you enter the city
  alternatives:
  - as you enter the city
  - after you have entered the city
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally in English. 'When you
    enter the city' is idiomatic and preserves the sense of the action occurring upon
    their entry.
- source_word: συναντήσει ὑμῖν
  chosen: will meet you
  alternatives:
  - will encounter you
  - will meet with you
  lexicon: BDAG
  rationale: Future active with dative object naturally means 'will meet you.' This
    is the most straightforward and idiomatic rendering in context.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is grammatically and contextually masculine here, referring
    to a specific male individual. Per gender-accurate policy, 'a man' is preferred
    over gender-neutral renderings.
- source_word: κεράμιον ὕδατος
  chosen: a jar of water
  alternatives:
  - an earthenware jar of water
  - a water jar
  lexicon: BDAG
  rationale: '''Jar of water'' is clear and natural English. ''Earthenware'' is possible
    from κεράμιον but would over-specify in the main text; the basic sense of a vessel/jar
    is sufficiently conveyed.'
- source_word: βαστάζων
  chosen: carrying
  alternatives:
  - bearing
  lexicon: BDAG
  rationale: The participle describes the man's ongoing action. 'Carrying' is idiomatic
    modern English and fits the narrative naturally.
- source_word: ἀκολουθήσατε αὐτῷ
  chosen: Follow him
  alternatives:
  - Go after him
  lexicon: BDAG
  rationale: Aorist imperative calls for a direct command. 'Follow him' is the standard
    and clearest rendering.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: '''House'' is the more concrete and formally aligned rendering for οἰκία
    in this directional context.'
- source_word: εἰς ἣν εἰσπορεύεται
  chosen: that he enters
  alternatives:
  - into which he goes
  - where he goes in
  lexicon: BDAG
  rationale: This relative clause identifies the specific house. 'That he enters'
    is concise, idiomatic, and preserves the directional sense without awkwardness.
