id: LUK.22.40
reference: Luke 22:40
source:
  edition: SBLGNT
  text: γενόμενος δὲ ἐπὶ τοῦ τόπου εἶπεν αὐτοῖς· Προσεύχεσθε μὴ εἰσελθεῖν εἰς πειρασμόν.
translation:
  text: When he came to the place, he said to them, “Pray that you may not enter into
    temptation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “testing” or “trial.” The Greek term can refer either to temptation in
      the moral sense or to a time of testing more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  chosen: came
  alternatives:
  - arrived
  - having come
  - being there
  lexicon: BDAG
  rationale: The aorist participle of γίνομαι with ἐπὶ τοῦ τόπου is idiomatic for
    arrival at a location. 'Came' gives natural English while preserving the temporal
    sense before the main verb. 'Having come' is more formally explicit but less readable.
- source_word: δὲ
  chosen: When
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: δέ here lightly connects the narrative and, with the participle, is best
    represented by an English temporal transition. 'When' captures the participial
    linkage in smooth English better than a bare 'and' or 'then'.
- source_word: ἐπὶ τοῦ τόπου
  chosen: to the place
  alternatives:
  - at the place
  - to that place
  lexicon: BDAG
  rationale: The phrase refers to the known location just mentioned in context. 'To
    the place' reflects movement toward and arrival at the location in idiomatic English.
    'At the place' is possible but less natural with 'came'.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say.' 'Said to them' is slightly more formal
    and transparent than 'told them,' which can imply a stronger directive nuance
    not inherent in the verb itself.
- source_word: Προσεύχεσθε
  chosen: Pray
  alternatives:
  - Keep praying
  lexicon: BDAG
  rationale: The present middle imperative calls for ongoing or characteristic prayer.
    English imperative 'Pray' is the most natural rendering; the durative force is
    real but does not require an expanded paraphrase in the main text.
- source_word: μὴ εἰσελθεῖν
  chosen: that you may not enter
  alternatives:
  - so that you may not enter
  - lest you enter
  - that you may not fall into
  lexicon: BDAG
  rationale: The construction after προσεύχομαι expresses the content/purpose of the
    prayer. 'That you may not enter' is clear and close to the Greek. 'Fall into'
    interprets beyond the lexical force of εἰσέρχομαι ('enter').
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός can denote temptation, testing, or trial. In this immediate
    context—Jesus warning disciples in a moment of spiritual vulnerability—'temptation'
    is the most natural and traditional sense. Because the term can also carry the
    broader sense of 'testing' or 'trial,' that alternative is preserved in a footnote
    rather than resolved away.
