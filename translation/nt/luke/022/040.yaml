theological_decisions:
- issue: Meaning of πειρασμός in Jesus' warning
  chosen_reading: temptation
  alternative_readings:
  - testing
  - trial
  rationale: The verse warns the disciples about impending spiritual failure, so 'temptation'
    best fits the immediate context. However, the Greek term can also denote a time
    of testing more broadly, and the translation preserves that tension in a footnote
    rather than narrowing the sense without acknowledgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
