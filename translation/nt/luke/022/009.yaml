id: LUK.22.9
reference: Luke 22:9
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν αὐτῷ· Ποῦ θέλεις ⸀ἑτοιμάσωμεν;
translation:
  text: They said to him, “Where do you want us to prepare it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Where do you want us to make preparations?” The implied
      object is the Passover meal from the preceding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: They
  alternatives:
  - And they
  - But they
  lexicon: BDAG
  rationale: The nominative article functions substantivally, referring to the disciples
    in context. δέ is lightly connective here; in natural English it is usually absorbed
    rather than explicitly rendered, though alternatives like 'And they' or 'But they'
    are possible.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: λέγω in the aorist is most straightforwardly 'said.' Because the direct
    speech is a question, English may idiomatically use 'asked,' but 'said' stays
    closer to the Greek while remaining natural.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative pronoun is naturally rendered 'to him' after 'said' in English.
- source_word: Ποῦ
  chosen: Where
  alternatives:
  - In what place
  lexicon: BDAG
  rationale: The interrogative adverb asks for location; 'Where' is the clear and
    idiomatic equivalent.
- source_word: θέλεις
  chosen: do you want
  alternatives:
  - do you wish
  - would you like
  lexicon: BDAG
  rationale: θέλω denotes desire or intention. 'Do you want' is clear modern English
    and fits the direct question without sounding archaic.
- source_word: ἑτοιμάσωμεν
  chosen: us to prepare it
  alternatives:
  - we should prepare
  - we may prepare
  - we should make preparations
  lexicon: BDAG
  rationale: 'The first person plural aorist subjunctive after θέλεις is idiomatically
    expressed in English as an object-complement construction: ''do you want us to
    prepare...?'' The object ''it'' is implied from the immediate context of preparing
    the Passover meal (v. 8) and is supplied for natural English.'
