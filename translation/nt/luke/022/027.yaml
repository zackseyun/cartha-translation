theological_decisions:
- issue: Rendering Jesus' self-description with service language
  chosen_reading: But I am among you as one who serves.
  alternative_readings:
  - But I am in your midst as the one serving.
  - But I am among you as a servant.
  rationale: The Greek uses the participle διακονῶν rather than the noun δοῦλος. Rendering
    it with the verbal idea 'one who serves' preserves the immediate meal-setting
    contrast and avoids importing the stronger bonded-status nuance associated with
    δοῦλος. This also maintains the text's Christological humility without overstating
    a lexical claim the verse itself does not make.
  doctrine_reference: Translation philosophy §§1, 5
