id: LUK.22.27
reference: Luke 22:27
source:
  edition: SBLGNT
  text: τίς γὰρ μείζων, ὁ ἀνακείμενος ἢ ὁ διακονῶν; οὐχὶ ὁ ἀνακείμενος; ἐγὼ δὲ ⸂ἐν
    μέσῳ ὑμῶν εἰμι⸃ ὡς ὁ διακονῶν.
translation:
  text: For who is greater, the one reclining at the table or the one serving? Is
    it not the one reclining at the table? But I am among you as one who serves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one reclining' / 'in your midst.' The Greek reflects
      banquet custom, where diners reclined while attendants served.
    reason: cultural_note
lexical_decisions:
- source_word: τίς
  chosen: who
  alternatives:
  - which person
  lexicon: BDAG
  rationale: Interrogative pronoun introducing a comparison between persons; 'who'
    is the natural English equivalent.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding of the preceding statement. 'For' preserves
    the discourse connection succinctly.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - superior
  lexicon: BDAG
  rationale: Comparative adjective indicating higher status or rank in context. 'Greater'
    preserves the comparative force without overinterpreting.
- source_word: ὁ ἀνακείμενος
  chosen: the one reclining at the table
  alternatives:
  - the one at table
  - the one reclining
  lexicon: BDAG
  rationale: ἀνάκειμαι in meal contexts refers to reclining for a banquet. English
    needs slight expansion to make the cultural setting clear; 'at the table' is implied
    by the idiom and improves readability.
- source_word: ὁ διακονῶν
  chosen: the one serving
  alternatives:
  - the servant
  - the one ministering
  lexicon: BDAG
  rationale: Present participle contrasts the diner with the attendant. 'Serving'
    fits the meal setting better than 'ministering' and avoids importing ecclesial
    connotations.
- source_word: οὐχί
  chosen: Is it not
  alternatives:
  - surely it is not
  - isn't it
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. 'Is it not' preserves
    the rhetorical force in clear modern English.
- source_word: ἐγὼ δὲ
  chosen: But I
  alternatives:
  - Yet I
  - But as for me
  lexicon: BDAG
  rationale: δέ marks contrast between normal social expectation and Jesus' own example.
    'But I' is concise and preserves the contrast.
- source_word: ἐν μέσῳ ὑμῶν εἰμι
  chosen: am among you
  alternatives:
  - am in your midst
  - am in the middle of you
  lexicon: BDAG
  rationale: Idiomatic expression for presence in the midst of a group. 'Among you'
    is natural English; 'in your midst' is possible but slightly more formal.
- source_word: ὡς ὁ διακονῶν
  chosen: as one who serves
  alternatives:
  - as the one serving
  - like one who serves
  lexicon: BDAG
  rationale: ὡς expresses manner/comparison. 'As one who serves' is idiomatic and
    preserves the exemplary contrast Jesus makes.
