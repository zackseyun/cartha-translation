id: LUK.22.12
reference: Luke 22:12
source:
  edition: SBLGNT
  text: κἀκεῖνος ὑμῖν δείξει ἀνάγαιον μέγα ἐστρωμένον· ἐκεῖ ἑτοιμάσατε.
translation:
  text: And he will show you a large furnished upper room; prepare there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large upper room already prepared' or 'a large upper room with furnishings
      set out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνος
  chosen: And he
  alternatives:
  - and that man
  - and that one
  lexicon: BDAG
  rationale: κἀκεῖνος combines καί + ἐκεῖνος, here continuing the instruction sequence
    with reference to the previously mentioned householder. English 'And he' is natural
    and sufficiently definite without the awkwardness of 'that one.'
- source_word: δείξει
  chosen: will show
  alternatives:
  - will point out
  - will show you
  lexicon: BDAG
  rationale: Future active of δείκνυμι straightforwardly means 'will show' or 'will
    point out.' 'Will show' is the most natural modern English rendering in context.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative indirect object is naturally carried in English by 'show you'
    rather than requiring the more explicit 'show to you.'
- source_word: ἀνάγαιον
  chosen: upper room
  alternatives:
  - upstairs room
  - guest room upstairs
  lexicon: BDAG
  rationale: ἀνάγαιον denotes an upper-story room. 'Upper room' is both accurate and
    idiomatic, and fits the narrative setting without over-specifying beyond the Greek.
- source_word: μέγα
  chosen: large
  alternatives:
  - big
  - spacious
  lexicon: BDAG
  rationale: μέγα is the standard adjective 'large/great.' 'Large' fits the physical
    description of the room better than the broader 'great.'
- source_word: ἐστρωμένον
  chosen: furnished
  alternatives:
  - prepared
  - spread
  - set up
  lexicon: BDAG
  rationale: Perfect passive participle from στρώννυμι literally suggests something
    spread or arranged, likely with couches or dining arrangements made ready. 'Furnished'
    captures the state of the room in natural English without implying more than the
    context supports.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb; 'there' is the direct and idiomatic rendering.
- source_word: ἑτοιμάσατε
  chosen: prepare
  alternatives:
  - make preparations
  - get ready
  lexicon: BDAG
  rationale: Aorist active imperative plural calling for the disciples to make preparations.
    'Prepare' is concise and preserves the imperative force.
