id: LUK.22.48
reference: Luke 22:48
source:
  edition: SBLGNT
  text: ⸂Ἰησοῦς δὲ⸃ εἶπεν αὐτῷ· Ἰούδα, φιλήματι τὸν υἱὸν τοῦ ἀνθρώπου παραδίδως;
translation:
  text: But Jesus said to him, “Judas, are you betraying the Son of Man with a kiss?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “are you handing over the Son of Man with a kiss?”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the adversative nuance in context,
    marking Jesus' response to Judas' action more clearly than a simple 'And.'
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - said
  lexicon: BDAG
  rationale: The dative pronoun αὐτῷ is explicit and should be represented in English.
    'Said to him' is natural and preserves the direct address to Judas.
- source_word: Ἰούδα
  chosen: Judas
  lexicon: BDAG
  rationale: Vocative proper name, transliterated according to standard English convention,
    in keeping with the philosophy of transliterating personal names.
- source_word: φιλήματι
  chosen: with a kiss
  alternatives:
  - by a kiss
  - with a gesture of affection
  lexicon: BDAG
  rationale: The dative noun denotes means or instrument. 'With a kiss' is idiomatic
    modern English and preserves the concrete act without paraphrasing into an interpretive
    phrase.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels. 'The Son
    of Man' preserves the traditional and textually grounded title, including its
    Danielic resonance, better than more interpretive alternatives.
- source_word: παραδίδως
  chosen: are you betraying
  alternatives:
  - do you betray
  - are you handing over
  lexicon: BDAG
  rationale: Present indicative second singular in a rhetorical question. 'Are you
    betraying' captures the immediate ongoing action in context and reflects the hostile
    sense of παραδίδωμι here better than the more neutral 'handing over.'
