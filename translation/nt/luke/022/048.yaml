theological_decisions:
- issue: Rendering of τὸν υἱὸν τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a christological self-reference used by Jesus.
    The traditional rendering best preserves both the literal Greek structure and
    the title's intertextual weight without flattening it into a merely generic expression.
  doctrine_reference: Affirmations; Translation philosophy §§2, 3
