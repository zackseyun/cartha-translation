theological_decisions:
- issue: How to render the Isaiah citation in relation to translation tradition
  chosen_reading: And he was counted with the lawless
  alternative_readings:
  - And he was numbered with transgressors
  rationale: The Greek ἀνόμων is more directly 'lawless' than 'transgressors.' However,
    because Jesus is quoting Isaiah 53:12 and many readers will recognize the traditional
    wording, the traditional alternative is preserved in a footnote rather than adopted
    in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where useful.'
- issue: Sense of τέλος ἔχει
  chosen_reading: is reaching its end
  alternative_readings:
  - has fulfillment
  - is being fulfilled
  - has an end
  rationale: The phrase can suggest termination or completion/fulfillment. In this
    passion context, a completion sense is likely, but the wording should preserve
    some tension rather than resolve it too narrowly. The chosen rendering keeps the
    movement toward culmination without importing a stronger doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
