id: LUK.22.37
reference: Luke 22:37
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν ⸀ὅτι τοῦτο τὸ γεγραμμένον δεῖ τελεσθῆναι ἐν ἐμοί, τό· Καὶ μετὰ
    ἀνόμων ἐλογίσθη· καὶ γὰρ ⸀τὸ περὶ ἐμοῦ τέλος ἔχει.
translation:
  text: 'For I tell you that this which is written must be fulfilled in me: ‘And he
    was counted with the lawless.’ For what concerns me is reaching its end.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “And he was numbered with transgressors” (Isa 53:12).
    reason: alternative_reading
  - marker: b
    text: Or “what concerns me has fulfillment / is coming to completion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  lexicon: BDAG
  rationale: λέγω with indirect object ὑμῖν is naturally rendered 'I tell you' in
    contemporary English; γάρ is retained as 'For' to preserve the explanatory connection.
- source_word: τοῦτο τὸ γεγραμμένον
  chosen: this which is written
  alternatives:
  - this Scripture
  - this that is written
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the demonstrative plus perfect
    participle construction without over-paraphrasing. 'Scripture' is possible but
    not explicit in the Greek.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  lexicon: BDAG
  rationale: δεῖ expresses necessity; 'must' is the most natural concise English equivalent
    and preserves the force.
- source_word: τελεσθῆναι
  chosen: be fulfilled
  alternatives:
  - be accomplished
  - be completed
  lexicon: BDAG
  rationale: In context of what is written and then quoted from Scripture, 'be fulfilled'
    best conveys completion of prophetic writing in event, while remaining idiomatic.
- source_word: ἐν ἐμοί
  chosen: in me
  alternatives:
  - with respect to me
  - in my case
  lexicon: BDAG
  rationale: The preposition ἐν is kept as 'in' rather than interpreted more freely;
    this preserves the wording while allowing the sense that the Scripture is fulfilled
    in Jesus' person/case.
- source_word: Καὶ μετὰ ἀνόμων ἐλογίσθη
  chosen: And he was counted with the lawless
  alternatives:
  - And he was numbered with transgressors
  - And he was reckoned among outlaws
  lexicon: BDAG
  rationale: ἀνόμων is most basically 'lawless'; this is closer to the Greek than
    the traditional 'transgressors,' though that traditional rendering is worth preserving
    in a footnote because of Isaiah 53:12 resonance. ἐλογίσθη is well rendered 'was
    counted'.
- source_word: τὸ περὶ ἐμοῦ
  chosen: what concerns me
  alternatives:
  - the thing concerning me
  - what is about me
  lexicon: BDAG
  rationale: This idiomatic rendering captures the articular phrase without awkwardness
    and preserves that the statement refers to what pertains to Jesus.
- source_word: τέλος ἔχει
  chosen: is reaching its end
  alternatives:
  - has an end
  - is being fulfilled
  - is coming to completion
  lexicon: BDAG
  rationale: The idiom τέλος ἔχει can mean 'is coming to an end' or 'is reaching fulfillment/completion.'
    Here it likely refers to the divinely appointed course concerning Jesus moving
    toward completion. 'Is reaching its end' preserves the idiom while remaining readable
    and not over-interpreting.
