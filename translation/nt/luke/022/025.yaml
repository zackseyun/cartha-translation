id: LUK.22.25
reference: Luke 22:25
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Οἱ βασιλεῖς τῶν ἐθνῶν κυριεύουσιν αὐτῶν καὶ οἱ ἐξουσιάζοντες
    αὐτῶν εὐεργέται καλοῦνται.
translation:
  text: But he said to them, “The kings of the Gentiles lord it over them, and those
    exercising authority over them are called benefactors.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the nations.”
    reason: lexical_alternative
  - marker: b
    text: “Benefactors” was an honorific title used for rulers or powerful patrons
      who were regarded as public doers of good.
    reason: cultural_note
lexical_decisions:
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The noun specifically denotes kings, not merely generic rulers, so the
    more precise political term is retained.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: In Luke-Acts, ἔθνη commonly refers to the non-Jewish peoples, so 'Gentiles'
    best captures the likely sense here, though 'nations' is lexically possible.
- source_word: κυριεύουσιν
  chosen: lord it over
  alternatives:
  - rule over
  - dominate
  lexicon: BDAG
  rationale: The idiom 'lord it over' preserves the force of exercising mastery in
    a domineering way, fitting the contrast Jesus is making about worldly leadership.
- source_word: ἐξουσιάζοντες
  chosen: those exercising authority
  alternatives:
  - those who wield power
  - those in authority
  lexicon: BDAG
  rationale: The participle is rendered verbally to preserve the active sense of using
    authority, not merely possessing office.
- source_word: εὐεργέται
  chosen: benefactors
  alternatives:
  - do-gooders
  - patrons
  lexicon: BDAG
  rationale: This was a recognized honorific title in the Greco-Roman world for rulers
    or elites who bestowed public benefits; 'benefactors' is the standard concise
    equivalent.
- source_word: καλοῦνται
  chosen: are called
  alternatives:
  - are named
  - are styled
  lexicon: BDAG
  rationale: The passive straightforwardly indicates the title by which such rulers
    are known.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: δέ here marks mild contrast with the disciples' dispute in the preceding
    context; 'But' brings out that contrast naturally in English.
