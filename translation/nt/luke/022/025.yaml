theological_decisions:
- issue: Sense of ἐθνῶν in context
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The saying contrasts pagan-style political rule with the pattern Jesus
    gives his disciples. Rendering ἐθνῶν as 'Gentiles' reflects the common NT sense
    of non-Jewish peoples without importing extra theological claims.
  doctrine_reference: Translation philosophy §1, §6
