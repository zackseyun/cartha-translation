theological_decisions:
- issue: Rendering of κύριος for Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse refers to Jesus with the title κύριος. Following the doctrine's
    contested-terms guidance, 'Lord' is the default and best preserves both narrative
    usage and christological weight without importing a narrower sense like 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
