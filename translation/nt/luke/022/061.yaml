id: LUK.22.61
reference: Luke 22:61
source:
  edition: SBLGNT
  text: καὶ στραφεὶς ὁ κύριος ἐνέβλεψεν τῷ Πέτρῳ, καὶ ὑπεμνήσθη ὁ Πέτρος τοῦ ⸀λόγου
    τοῦ κυρίου ὡς εἶπεν αὐτῷ ὅτι Πρὶν ἀλέκτορα φωνῆσαι ⸀σήμερον ἀπαρνήσῃ με τρίς.
translation:
  text: And the Lord turned and looked at Peter, and Peter remembered the word of
    the Lord, how he had said to him, “Before a rooster crows today, you will deny
    me three times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked intently at Peter'; the Greek verb can suggest a fixed or direct
      gaze.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turned
  alternatives:
  - having turned
  - turned around
  lexicon: BDAG
  rationale: Aorist participle of στρέφω, introducing the Lord's action prior to looking
    at Peter. 'Turned' is natural English and preserves the sequence without over-literal
    participial awkwardness.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best reflects the title used
    of Jesus here and matches NT usage without weakening its force.
- source_word: ἐνέβλεψεν
  chosen: looked at
  alternatives:
  - gazed at
  - looked intently at
  lexicon: BDAG
  rationale: ἐμβλέπω can imply a direct or intent look. 'Looked at' is the clearest
    main-text rendering in modern English; the stronger nuance is worth preserving
    in a footnote rather than overstating it in the text.
- source_word: ὑπεμνήσθη
  chosen: remembered
  alternatives:
  - was reminded
  - recalled
  lexicon: BDAG
  rationale: Although the passive/middle form can suggest 'was reminded,' in context
    Peter's recollection is the point. 'Remembered' is idiomatic and accurately conveys
    the result of the Lord's look.
- source_word: λόγου
  chosen: word
  alternatives:
  - statement
  - saying
  lexicon: BDAG
  rationale: λόγος here refers to the specific utterance Jesus had spoken. 'Word'
    is a standard and natural rendering, especially in the phrase 'the word of the
    Lord.'
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - as
  lexicon: BDAG
  rationale: 'Here ὡς introduces the content/ manner of what Peter remembered: ''how
    he had said to him.'' This is more natural than a wooden ''as'' in English.'
- source_word: Πρὶν ἀλέκτορα φωνῆσαι
  chosen: Before a rooster crows
  alternatives:
  - Before the rooster crows
  - Before rooster-crow
  lexicon: BDAG
  rationale: πρίν with the infinitive expresses prior time. The anarthrous ἀλέκτορα
    is naturally indefinite in English, so 'a rooster' is preferred over the traditional
    'the rooster'.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: σήμερον straightforwardly means 'today.' This preserves the immediacy
    of Jesus' prediction in clear modern English.
- source_word: ἀπαρνήσῃ
  chosen: you will deny
  alternatives:
  - you will disown
  lexicon: BDAG
  rationale: Future middle of ἀπαρνέομαι. 'Deny' is the standard and precise rendering
    in this passion context; 'disown' is possible but less directly tied to the repeated
    Gospel wording.
- source_word: τρίς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: '''Three times'' is clear modern English; ''thrice'' is archaic and contrary
    to the translation philosophy.'
