theological_decisions:
- issue: Nature of Satan's action in Judas
  chosen_reading: Render the text straightforwardly as 'Satan entered into Judas'
    without softening it to mere influence.
  alternative_readings:
  - Satan influenced Judas
  - Satan took hold of Judas
  rationale: The Greek explicitly uses εἰσῆλθεν ... εἰς, indicating entry. The translation
    should preserve the text's strong wording and not reduce it to a weaker psychological
    or metaphorical expression. At the same time, no further doctrinal explanation
    about demonic possession or human responsibility is imported into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
