id: LUK.22.3
reference: Luke 22:3
source:
  edition: SBLGNT
  text: Εἰσῆλθεν δὲ Σατανᾶς εἰς Ἰούδαν τὸν ⸀καλούμενον Ἰσκαριώτην, ὄντα ἐκ τοῦ ἀριθμοῦ
    τῶν δώδεκα·
translation:
  text: Then Satan entered into Judas, the one called Iscariot, who was of the number
    of the twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who was called Iscariot.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one of the twelve.' Literally, 'of the number of the twelve.'
    reason: lexical_alternative
  - marker: c
    text: Some translations capitalize 'the Twelve' to mark the recognized apostolic
      group.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσῆλθεν
  chosen: entered into
  alternatives:
  - entered
  - went into
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι with εἰς expresses entry into a person. 'Entered
    into' preserves the force of the verb-preposition combination more clearly than
    simple 'entered' in English.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' gives natural English flow
    while preserving the connective sense without overstating contrast.
- source_word: Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title in NT usage. This
    is the conventional and clearest English rendering.
- source_word: εἰς Ἰούδαν
  chosen: into Judas
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: The preposition εἰς should be represented in English because the text
    explicitly describes Satan's entry into Judas, not merely influence upon him.
- source_word: τὸν καλούμενον Ἰσκαριώτην
  chosen: the one called Iscariot
  alternatives:
  - who was called Iscariot
  - called Iscariot
  lexicon: BDAG
  rationale: The participle καλούμενον is adjectival, identifying Judas. 'The one
    called Iscariot' is a transparent rendering of the Greek structure and remains
    natural English.
- source_word: ὄντα
  chosen: who was
  alternatives:
  - being
  lexicon: BDAG
  rationale: The participle links Judas to the following phrase descriptively. Relative-clause
    English is more natural than a bare participle while preserving the sense.
- source_word: ἐκ τοῦ ἀριθμοῦ
  chosen: of the number of
  alternatives:
  - one of
  - from among
  lexicon: BDAG
  rationale: This phrase literally refers to belonging to the counted group. 'Of the
    number of' preserves the formal nuance and the solemnity of the identification.
- source_word: τῶν δώδεκα
  chosen: the twelve
  alternatives:
  - the Twelve
  lexicon: BDAG
  rationale: The phrase refers to Jesus' inner apostolic group. Lowercase 'the twelve'
    is understandable and closely reflects the Greek, though capitalization is possible
    as an interpretive stylistic choice.
