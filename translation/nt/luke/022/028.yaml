theological_decisions:
- issue: Meaning of πειρασμοῖς in reference to Jesus
  chosen_reading: trials/ordeals endured by Jesus
  alternative_readings:
  - temptations experienced by Jesus
  rationale: The Greek term can include both testing and temptation, and Luke elsewhere
    uses it in contexts of temptation. In this verse, however, Jesus commends the
    disciples for remaining with him through his difficult circumstances and oppositions;
    'trials' best fits the relational and narrative context without denying that Jesus
    was also tempted.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
