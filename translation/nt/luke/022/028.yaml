id: LUK.22.28
reference: Luke 22:28
source:
  edition: SBLGNT
  text: Ὑμεῖς δέ ἐστε οἱ διαμεμενηκότες μετ’ ἐμοῦ ἐν τοῖς πειρασμοῖς μου·
translation:
  text: But you are the ones who have remained with me in my trials.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my temptations' or 'in my testings.' The Greek word can refer to
      temptation or trial; here it likely points to the ordeals Jesus endured.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun placed first for emphasis. English 'you'
    captures the referent; the emphatic force is conveyed by the clause structure
    'you are the ones.'
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the immediately preceding context. 'But' best preserves
    the adversative nuance here.
- source_word: οἱ διαμεμενηκότες
  chosen: the ones who have remained
  alternatives:
  - those who have stayed
  - those who have continued
  lexicon: BDAG
  rationale: The articular perfect active participle of διαμένω denotes a defined
    group characterized by continued persistence up to the present point. 'The ones
    who have remained' preserves both the substantival force and the perfect aspect
    better than a simple past.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: Standard rendering of μετά with the genitive indicating association or
    accompaniment.
- source_word: ἐν τοῖς πειρασμοῖς μου
  chosen: in my trials
  alternatives:
  - in my temptations
  - in my testings
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation depending on context.
    Here Jesus refers to the hardships and ordeals surrounding his ministry rather
    than inward enticements to sin, so 'trials' is the clearest contextual rendering
    in modern English.
