theological_decisions:
- issue: Relation of Jesus' human will to the Father's will
  chosen_reading: Render the contrast straightforwardly as 'not my will, but yours
    be done' without explanatory expansion.
  alternative_readings:
  - not what I want, but what you want
  - not my desire, but your plan
  rationale: The verse directly presents Jesus distinguishing his own will from the
    Father's while submitting to the Father's will. In keeping with Chalcedonian orthodoxy
    and the translation philosophy, the wording preserves the theological tension
    in the text without importing later doctrinal explanation or softening the distinction.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD); Translation
    philosophy §3 Preserve theological tension rather than resolve it.'
- issue: Metaphorical force of 'cup'
  chosen_reading: Keep 'cup' in the main text rather than interpret it as suffering
    or wrath.
  alternative_readings:
  - this suffering
  - this ordeal
  rationale: The metaphor is transparent enough in English and carries important biblical
    resonance. Interpreting it in the main text would over-resolve the image and reduce
    intertextual depth.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it.
