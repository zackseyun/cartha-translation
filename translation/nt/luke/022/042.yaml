id: LUK.22.42
reference: Luke 22:42
source:
  edition: SBLGNT
  text: λέγων· Πάτερ, εἰ βούλει ⸀παρένεγκε ⸂τοῦτο τὸ ποτήριον⸃ ἀπ’ ἐμοῦ· πλὴν μὴ τὸ
    θέλημά μου ἀλλὰ τὸ σὸν ⸀γινέσθω.
translation:
  text: saying, “Father, if you are willing, take this cup away from me. Nevertheless,
    not my will, but yours be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove this cup from me.' The Greek imperative can be rendered with
      either 'take away' or 'remove.'
    reason: lexical_alternative
  - marker: b
    text: '''Cup'' is a biblical metaphor for an allotted portion, often especially
      suffering or judgment.'
    reason: cross_reference
  - marker: c
    text: Or 'not what I will, but what you will.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - and saying
  - he said
  lexicon: BDAG
  rationale: Present participle introducing the content of Jesus' prayer; 'saying'
    preserves the participial linkage without over-paraphrasing.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: BDAG
  rationale: Vocative direct address to God. 'Father' is the natural English equivalent;
    adding 'O' would sound archaic and is not required by the Greek.
- source_word: εἰ βούλει
  chosen: if you are willing
  alternatives:
  - if you will
  - if you wish
  lexicon: BDAG
  rationale: βούλομαι here expresses volition or willingness. 'If you are willing'
    is idiomatic modern English and preserves the conditional appeal.
- source_word: παρένεγκε
  chosen: take ... away
  alternatives:
  - remove
  - carry away
  lexicon: BDAG
  rationale: Aorist imperative of παραφέρω in context asks for the cup to be taken
    away from Jesus. 'Take away' is clear, natural, and fits the following ἀπ’ ἐμοῦ.
- source_word: τοῦτο τὸ ποτήριον
  chosen: this cup
  alternatives:
  - this drinking cup
  lexicon: BDAG
  rationale: Literal 'this cup' should be retained because the metaphor is theologically
    and intertextually significant in biblical usage for allotted suffering/judgment;
    no need to flatten it into an explanatory paraphrase.
- source_word: ἀπ’ ἐμοῦ
  chosen: away from me
  alternatives:
  - from me
  lexicon: BDAG
  rationale: Combined with παρένεγκε, the prepositional phrase is best expressed as
    'away from me' in English.
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - Yet
  - However
  - Except that
  lexicon: BDAG
  rationale: Marks a strong concessive turn from the request to submission. 'Nevertheless'
    preserves the solemn contrast well.
- source_word: μὴ τὸ θέλημά μου ἀλλὰ τὸ σὸν
  chosen: not my will, but yours
  alternatives:
  - not what I will, but what you will
  lexicon: BDAG
  rationale: The Greek uses nominal expressions ('my will ... yours'). Rendering them
    as such is both accurate and concise. The supplied verb in English is completed
    by the following γινέσθω.
- source_word: γινέσθω
  chosen: be done
  alternatives:
  - come to pass
  - happen
  - be
  lexicon: BDAG
  rationale: Third-person imperative of γίνομαι here expresses that the Father's will
    should take effect. 'Be done' is the most idiomatic and established English rendering
    in this prayer context, without distorting the sense.
