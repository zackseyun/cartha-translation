theological_decisions:
- issue: Whether διατίθεμαι should be rendered with explicit covenant language
  chosen_reading: appoint
  alternative_readings:
  - covenant
  - grant
  - confer
  rationale: The verb can carry covenantal overtones, and some translations render it 'I covenant to you.' However, the immediate syntax with βασιλείαν and the parallel to the Father's action support a broader sense of conferring or appointing royal authority. To avoid overstating a specific theological construct in the main text while preserving the possible nuance, the covenantal alternative is footnoted.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T12:44:03Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/022/029.json
  category: awkward_english
  tier: 1
  from: appoint to you a kingdom, just as my Father appointed one to me,
  to: appoint to you, just as my Father appointed to me, a kingdom.
  rationale: The Greek structure places the object 'βασιλείαν' (a kingdom) at the end of the sentence, having it serve as the object for both verbs ('διατίθεμαι' and 'διέθετό'). The current draft makes 'a kingdom' the object of the first verb and then uses a pronoun ('one') for the second, resulting in the slightly awkward phrase 'appointed one to me.' Restructuring the English sentence to mirror the Greek ('...appoint to you, just as my Father appointed to me, a kingdom') is not only possible but more elegant. It better preserves the parallel structure and rhetorical effect of the original without sacrificing clarity.
