id: LUK.22.29
reference: Luke 22:29
source:
  edition: SBLGNT
  text: κἀγὼ διατίθεμαι ὑμῖν, καθὼς διέθετό μοι ὁ πατήρ μου βασιλείαν,
translation:
  text: And I appoint to you, just as my Father appointed to me, a kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I covenant to you a kingdom ... as my Father covenanted to me.' The Greek verb can carry covenantal or dispositional force as well as the sense of appointing or conferring.
    reason: alternative_reading
  - marker: b
    text: Or 'appoint to you a kingdom, just as my Father appointed one to me,'.
    reason: previous_rendering
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - And I also
  - I too
  lexicon: BDAG
  rationale: The crasis combines καί + ἐγώ, adding an emphatic/continuative 'and I' in connection with the preceding context. 'And I' preserves both the connective and the personal emphasis without overtranslating.
- source_word: διατίθεμαι
  chosen: appoint
  alternatives:
  - grant
  - confer
  - covenant
  - assign
  lexicon: BDAG
  rationale: The verb can mean to arrange, make a covenant, or confer/dispose something. In this context with βασιλείαν as object and the parallel with the Father's action toward the Son, 'appoint' best preserves the formal sense of conferral without importing a full covenant formula into the main text. Because covenantal nuance is possible, it is preserved in a footnote.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative marks the recipients of the appointment/conferral. 'To you' is the most straightforward English rendering here.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: This introduces a comparison between Jesus' action and the Father's prior action. 'Just as' clearly marks the correspondence.
- source_word: διέθετό
  chosen: appointed
  alternatives:
  - granted
  - conferred
  - covenanted
  lexicon: BDAG
  rationale: Using the same English gloss as διατίθεμαι preserves the verbal parallel in Greek. The aorist refers to the Father's completed action toward Jesus.
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: Simple dative of recipient; 'to me' is direct and idiomatic.
- source_word: ὁ πατήρ μου
  chosen: my Father
  alternatives:
  - the Father of me
  lexicon: BDAG
  rationale: Standard idiomatic rendering preserving the filial relationship central to Luke's Christology.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - kingdom
  - royal rule
  - reign
  lexicon: BDAG
  rationale: Anarthrous βασιλείαν is naturally rendered 'a kingdom' in this construction. While the term can denote reign/rule as well as realm, here the sense of a bestowed royal dominion fits the immediate context, especially with the following verse about eating at Jesus' table and sitting on thrones.
