- issue: Rendering of δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: The verse uses δοῦλος in a literal social sense. Following the doctrine's
    contested-terms guidance, 'slave' is used where bonded status is salient, while
    the common alternative 'servant' is preserved in a footnote for auditability.
