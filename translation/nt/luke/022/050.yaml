id: LUK.22.50
reference: Luke 22:50
source:
  edition: SBLGNT
  text: καὶ ἐπάταξεν εἷς τις ἐξ αὐτῶν ⸂τοῦ ἀρχιερέως τὸν δοῦλον⸃ καὶ ἀφεῖλεν ⸂τὸ οὖς
    αὐτοῦ⸃ τὸ δεξιόν.
translation:
  text: And one of them struck the high priest’s slave and cut off his right ear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high priest’s servant.' The Greek word is doulos, which can denote
      either a servant or a slave depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: BDAG
  rationale: Aorist active indicative of πατάσσω denotes a forceful blow. 'Struck'
    is natural modern English and preserves the concrete action without archaic tone
    ('smote') or overly casual diction ('hit').
- source_word: εἷς τις ἐξ αὐτῶν
  chosen: one of them
  alternatives:
  - a certain one of them
  - one among them
  lexicon: BDAG
  rationale: The combination εἷς τις is an indefinite expression. In idiomatic English,
    'one of them' best captures the sense without awkwardness, while retaining the
    anonymity present in Luke's wording.
- source_word: τοῦ ἀρχιερέως τὸν δοῦλον
  chosen: the high priest’s slave
  alternatives:
  - the high priest’s servant
  lexicon: BDAG
  rationale: δοῦλος can mean either 'servant' or 'slave' depending on context. Here
    it refers to a socially subordinate household dependent of the high priest. In
    keeping with the project's guidance, 'slave' is preferred where bonded status
    is in view; this is a concrete social designation rather than a softened domestic
    role.
- source_word: ἀφεῖλεν
  chosen: cut off
  alternatives:
  - removed
  - took off
  lexicon: BDAG
  rationale: Although ἀφαιρέω broadly means 'take away/remove,' in this injury context
    with 'ear' as object, 'cut off' expresses the result naturally and clearly in
    English.
- source_word: τὸ οὖς αὐτοῦ τὸ δεξιόν
  chosen: his right ear
  alternatives:
  - the right ear of him
  lexicon: BDAG
  rationale: This phrase specifies the body part and side affected. 'His right ear'
    is the natural English rendering and preserves the detail conveyed by δεξιόν.
