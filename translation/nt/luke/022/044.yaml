id: LUK.22.44
reference: Luke 22:44
source:
  edition: SBLGNT
  text: καὶ γενόμενος ἐν ἀγωνίᾳ ἐκτενέστερον προσηύχετο· ⸄καὶ ἐγένετο⸅ ὁ ἱδρὼς αὐτοῦ
    ὡσεὶ θρόμβοι αἵματος καταβαίνοντες ἐπὶ τὴν γῆν.⸃
translation:
  text: And being in agony, he was praying more intensely; and his sweat became like
    drops of blood falling to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more earnestly' or 'more fervently.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'like drops/clots of blood,' preserving a comparison rather than stating
      that the sweat itself was blood.
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts omit Luke 22:43–44; others include them. The SBLGNT prints
      the verses in brackets to reflect this textual uncertainty.
    reason: textual_variant
lexical_decisions:
- source_word: γενόμενος
  chosen: being
  alternatives:
  - becoming
  - having become
  lexicon: BDAG
  rationale: A participial form of γίνομαι introducing Jesus' state or condition.
    'Being' is natural English and captures the circumstantial sense without overemphasizing
    process.
- source_word: ἀγωνίᾳ
  chosen: agony
  alternatives:
  - distress
  - anguish
  lexicon: BDAG
  rationale: The noun denotes intense struggle or anguish. 'Agony' is the closest
    concise English equivalent and preserves the severity of the scene.
- source_word: ἐκτενέστερον
  chosen: more intensely
  alternatives:
  - more earnestly
  - more fervently
  lexicon: BDAG
  rationale: Comparative adverb indicating increased intensity. 'More intensely' reflects
    the comparative force directly; 'earnestly' is traditional but can sound more
    interpretive than the Greek requires.
- source_word: προσηύχετο
  chosen: he was praying
  alternatives:
  - he prayed
  lexicon: BDAG
  rationale: Imperfect middle/passive form conveys ongoing action. 'He was praying'
    preserves the progressive aspect better than simple past.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: BDAG
  rationale: 'The verb marks a resulting state: his sweat ''became'' or ''came to
    be'' like something. ''Became'' is concise and preserves the verbal force.'
- source_word: ἱδρὼς
  chosen: sweat
  lexicon: BDAG
  rationale: Straightforward lexical equivalent.
- source_word: ὡσεὶ
  chosen: like
  alternatives:
  - as if
  - as though
  lexicon: BDAG
  rationale: This comparative particle signals resemblance, not identity. 'Like' is
    the clearest way to preserve that the text compares the sweat to blood rather
    than necessarily asserting it was blood.
- source_word: θρόμβοι
  chosen: drops
  alternatives:
  - clots
  - thick drops
  lexicon: BDAG
  rationale: The term can denote clots or lumps, but in this context with falling
    to the ground it likely refers to heavy drops. 'Drops' is idiomatic English; the
    more specific sense is preserved in a footnote.
- source_word: αἵματος
  chosen: of blood
  lexicon: BDAG
  rationale: 'Genitive specifying the substance of comparison: drops of blood.'
- source_word: καταβαίνοντες ἐπὶ τὴν γῆν
  chosen: falling to the ground
  alternatives:
  - running down to the ground
  - descending onto the ground
  lexicon: BDAG
  rationale: The participle describes downward motion of the drops. 'Falling to the
    ground' is natural English and fits the imagery.
