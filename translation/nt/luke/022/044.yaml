theological_decisions:
- issue: Nature of the comparison in 'like drops of blood'
  chosen_reading: 'A simile is preserved: the sweat was like drops of blood.'
  alternative_readings:
  - The sweat was actual blood.
  rationale: Because ὡσεὶ explicitly marks comparison, the main text should preserve
    resemblance rather than collapse it into identity. This avoids importing a medical
    or miraculous claim beyond what the Greek states, while still leaving room for
    readers to consider the vividness or possible physiological background.
  doctrine_reference: Translation philosophy §1, §3
