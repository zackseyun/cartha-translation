id: LUK.22.6
reference: Luke 22:6
source:
  edition: SBLGNT
  text: καὶ ἐξωμολόγησεν, καὶ ἐζήτει εὐκαιρίαν τοῦ παραδοῦναι αὐτὸν ⸂ἄτερ ὄχλου αὐτοῖς⸃.
translation:
  text: And he agreed, and began seeking an opportunity to hand him over to them apart
    from the crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to betray him.' The Greek verb literally means 'to hand over' or 'to
      deliver up'; in Judas's role, 'betray' is a contextually valid interpretive
      rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξωμολόγησεν
  chosen: agreed
  alternatives:
  - consented
  - promised
  - confessed openly
  lexicon: BDAG
  rationale: In this context Judas is responding positively to the chief priests'
    proposal (vv. 4–5), so 'agreed' best captures the idiomatic sense in natural English.
    The verb can elsewhere mean 'confess' or 'acknowledge openly,' but here the narrative
    context favors consent rather than verbal confession.
- source_word: ἐζήτει
  chosen: began seeking
  alternatives:
  - was seeking
  - kept looking for
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action. 'Began seeking'
    preserves the narrative development after his agreement, while still sounding
    natural in English. 'Was seeking' is possible, but 'began seeking' better reflects
    the transition in the story.
- source_word: εὐκαιρίαν
  chosen: an opportunity
  alternatives:
  - a favorable time
  - a suitable occasion
  lexicon: BDAG
  rationale: '''Opportunity'' is the most idiomatic English rendering here and conveys
    the sense of a favorable occasion for action.'
- source_word: τοῦ παραδοῦναι
  chosen: to hand him over
  alternatives:
  - to betray him
  - to deliver him up
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over' or 'deliver.' In Judas contexts
    'betray' is interpretive and traditional, but 'hand him over' stays closer to
    the Greek while still fitting the context. It also preserves lexical consistency
    with the broader passion narrative, where the same verb is used in multiple kinds
    of 'handing over.'
- source_word: ἄτερ ὄχλου
  chosen: apart from the crowd
  alternatives:
  - without a crowd
  - in the absence of the crowd
  lexicon: BDAG
  rationale: ἄτερ means 'without/apart from.' 'Apart from the crowd' is concise and
    natural, and it conveys that Judas sought a moment when the crowd would not be
    present.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: The dative naturally indicates the recipients of the handing over, namely
    the chief priests and officers mentioned in the immediate context. 'To them' is
    the clearest English rendering.
