id: LUK.22.21
reference: Luke 22:21
source:
  edition: SBLGNT
  text: πλὴν ἰδοὺ ἡ χεὶρ τοῦ παραδιδόντος με μετ’ ἐμοῦ ἐπὶ τῆς τραπέζης·
translation:
  text: But look, the hand of the one betraying me is with me on the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the hand of the one handing me over is with me on the
      table.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Introduces a sharp contrast with the preceding statement. 'But' is the
    most natural concise English adversative here.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A deictic attention-getter. 'Look' preserves the force in readable modern
    English better than the more archaic 'behold'.
- source_word: ἡ χεὶρ
  chosen: the hand
  lexicon: BDAG
  rationale: A literal rendering is appropriate. In context 'hand' stands metonymically
    for the person/action of the betrayer, but the Greek explicitly says 'hand,' so
    the image is preserved.
- source_word: τοῦ παραδιδόντος με
  chosen: of the one betraying me
  alternatives:
  - of my betrayer
  - of the one handing me over
  lexicon: BDAG
  rationale: The present participle with article is best represented explicitly as
    'the one betraying me.' 'Handing me over' is possible and more literal to παραδίδωμι,
    but 'betraying' fits the contextual sense in the passion narrative and standard
    English idiom.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: Straightforward rendering of companionship/proximity; important for the
    irony that the betrayer is sharing table fellowship with Jesus.
- source_word: ἐπὶ τῆς τραπέζης
  chosen: on the table
  alternatives:
  - at the table
  lexicon: BDAG
  rationale: ἐπί with the genitive can denote position 'on' or, idiomatically in meal
    contexts, association with the table. 'On the table' follows the Greek wording
    closely and preserves the vivid image of the hand being there with Jesus.
