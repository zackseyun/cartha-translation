theological_decisions:
- issue: Rendering παραδιδόντος in the passion context
  chosen_reading: betraying
  alternative_readings:
  - handing over
  rationale: The verb παραδίδωμι can mean 'hand over/deliver up,' but in this context
    it refers to Judas's treacherous act. 'Betraying' communicates the narrative and
    moral force without importing additional doctrinal claims. The more literal alternative
    is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 3, 5
