id: LUK.22.52
reference: Luke 22:52
source:
  edition: SBLGNT
  text: εἶπεν ⸀δὲ Ἰησοῦς πρὸς τοὺς παραγενομένους ἐπ’ αὐτὸν ἀρχιερεῖς καὶ στρατηγοὺς
    τοῦ ἱεροῦ καὶ πρεσβυτέρους· Ὡς ἐπὶ λῃστὴν ⸀ἐξήλθατε μετὰ μαχαιρῶν καὶ ξύλων;
translation:
  text: But Jesus said to the chief priests, the officers of the temple, and the elders
    who had come against him, “Have you come out as against a robber, with swords
    and clubs?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bandit.' The Greek λῃστής can refer to a robber, brigand, or insurgent-type
      outlaw; here Jesus contrasts their armed approach with the kind of force used
      against a dangerous criminal.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative transition. 'But' fits the immediate
    shift from the arrest action to Jesus' response.
- source_word: παραγενομένους ἐπ’ αὐτόν
  chosen: who had come against him
  alternatives:
  - who had come to him
  - who had come upon him
  lexicon: BDAG
  rationale: The participle with ἐπί + accusative in this arrest context conveys movement
    directed against Jesus, not merely arrival near him. 'Against him' makes the hostile
    force explicit without overparaphrase.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard plural rendering for the leading priestly authorities; 'high
    priests' is less idiomatic in English for this collective group.
- source_word: στρατηγοὺς τοῦ ἱεροῦ
  chosen: the officers of the temple
  alternatives:
  - the temple captains
  - the commanders of the temple
  lexicon: BDAG
  rationale: Refers to temple security officials. 'Officers of the temple' is clear
    modern English; 'captains' is possible but more traditional and less immediately
    transparent.
- source_word: πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the older men
  lexicon: BDAG
  rationale: In this context the term denotes recognized Jewish leaders, not merely
    older males.
- source_word: Ὡς ἐπὶ λῃστὴν
  chosen: as against a robber
  alternatives:
  - as against a bandit
  - as if against a criminal
  lexicon: BDAG
  rationale: The idiom ὡς ἐπὶ with an accusative person means 'as against' or 'as
    if for the arrest of.' λῃστής can denote robber, brigand, or insurrectionist.
    'Robber' preserves the common lexical sense while keeping the rhetorical force
    of Jesus' question.
- source_word: ἐξήλθατε
  chosen: Have you come out
  alternatives:
  - Did you come out
  lexicon: BDAG
  rationale: English present perfect naturally conveys the force of the aorist in
    a question about the action just undertaken.
- source_word: μαχαιρῶν
  chosen: swords
  alternatives:
  - short swords
  - knives
  lexicon: BDAG
  rationale: The ordinary and contextually appropriate rendering in an arrest scene
    is 'swords.'
- source_word: ξύλων
  chosen: clubs
  alternatives:
  - sticks
  - wooden clubs
  lexicon: BDAG
  rationale: Though literally 'woods/wooden objects,' in this context it refers to
    cudgels or clubs carried as weapons. 'Clubs' gives the intended sense in natural
    English.
