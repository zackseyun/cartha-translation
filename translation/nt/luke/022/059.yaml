id: LUK.22.59
reference: Luke 22:59
source:
  edition: SBLGNT
  text: καὶ διαστάσης ὡσεὶ ὥρας μιᾶς ἄλλος τις διϊσχυρίζετο λέγων· Ἐπ’ ἀληθείας καὶ
    οὗτος μετ’ αὐτοῦ ἦν, καὶ γὰρ Γαλιλαῖός ἐστιν·
translation:
  text: And after about one hour had passed, another man insisted, saying, “Truly,
    this man also was with him, for he too is a Galilean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “another person” for ἄλλος τις; the Greek expression itself is indefinite,
      though the context suggests a male speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαστάσης ὡσεὶ ὥρας μιᾶς
  chosen: after about one hour had passed
  alternatives:
  - when about one hour had elapsed
  - after an interval of about one hour
  lexicon: BDAG
  rationale: The genitive absolute with διαστάσης from διΐστημι here marks the passing
    of time. 'Had passed' is natural modern English and preserves the temporal sense
    without awkward literalism.
- source_word: ἄλλος τις
  chosen: another man
  alternatives:
  - another person
  - someone else
  lexicon: BDAG
  rationale: The expression means 'another one/someone else.' Because the participle
    λέγων and the social setting imply a male speaker, 'another man' is a natural
    and gender-accurate rendering.
- source_word: διϊσχυρίζετο
  chosen: insisted
  alternatives:
  - strongly affirmed
  - kept insisting
  - maintained emphatically
  lexicon: BDAG
  rationale: The imperfect middle indicates continued or emphatic assertion. 'Insisted'
    captures both the force and the ongoing nature in idiomatic English.
- source_word: Ἐπ’ ἀληθείας
  chosen: Truly
  alternatives:
  - In truth
  - For a fact
  - Certainly
  lexicon: BDAG
  rationale: This idiom introduces a strong assertion of truthfulness. 'Truly' is
    concise, natural, and preserves the emphatic tone.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: The demonstrative points to Peter in a deictic, somewhat accusatory way.
    'This man' preserves that force better than the flatter 'he.'
- source_word: μετ’ αὐτοῦ ἦν
  chosen: was with him
  alternatives:
  - was with him in company
  - was one of his companions
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase and imperfect
    of εἰμί. It preserves the claim of association without overinterpreting it.
- source_word: καὶ γὰρ
  chosen: for he too
  alternatives:
  - for indeed he also
  - because he also
  lexicon: BDAG
  rationale: γάρ gives the reason for the accusation, and καί adds 'also/too.' 'For
    he too' is smooth English that keeps both elements.
- source_word: Γαλιλαῖός ἐστιν
  chosen: is a Galilean
  alternatives:
  - is from Galilee
  - is one of the Galileans
  lexicon: BDAG
  rationale: The predicate nominative identifies Peter by regional origin. 'Is a Galilean'
    is the most direct and idiomatic rendering, preserving the basis for the speaker's
    inference.
