id: LUK.22.30
reference: Luke 22:30
source:
  edition: SBLGNT
  text: ἵνα ⸀ἔσθητε καὶ πίνητε ἐπὶ τῆς τραπέζης μου ⸂ἐν τῇ βασιλείᾳ μου⸃, καὶ ⸀καθήσεσθε
    ἐπὶ θρόνων ⸂τὰς δώδεκα φυλὰς κρίνοντες⸃ τοῦ Ἰσραήλ.
translation:
  text: so that you may eat and drink at my table in my kingdom, and you will sit
    on thrones judging the twelve tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ruling' or 'governing' the twelve tribes of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result flowing from the previous promise. 'So that'
    is natural modern English while preserving the telic force.
- source_word: ἔσθητε
  chosen: you may eat
  alternatives:
  - you might eat
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα is well represented by 'may eat' in English.
    This keeps the purpose nuance without sounding stilted.
- source_word: πίνητε
  chosen: drink
  alternatives:
  - may drink
  lexicon: BDAG
  rationale: 'Coordinated with ἔσθητε; English idiom avoids repeating ''may'' after
    ''eat'' while preserving the same modal force: ''you may eat and drink.'''
- source_word: ἐπὶ τῆς τραπέζης μου
  chosen: at my table
  alternatives:
  - upon my table
  lexicon: BDAG
  rationale: Idiomatic English for table fellowship. A more literal 'upon' would be
    unnatural here.
- source_word: ἐν τῇ βασιλείᾳ μου
  chosen: in my kingdom
  alternatives:
  - in my reign
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom; here the setting of banquet fellowship
    and enthronement favors the realm sense, while still carrying royal authority.
- source_word: καθήσεσθε
  chosen: you will sit
  alternatives:
  - you will be seated
  lexicon: BDAG
  rationale: Future middle is naturally rendered as a simple future in English. 'Sit'
    is direct and preserves the enthronement imagery.
- source_word: ἐπὶ θρόνων
  chosen: on thrones
  alternatives:
  - upon thrones
  lexicon: BDAG
  rationale: Retains the royal/judicial imagery in straightforward English.
- source_word: κρίνοντες
  chosen: judging
  alternatives:
  - ruling
  - governing
  lexicon: BDAG
  rationale: The participle from κρίνω most directly means 'judging.' While the term
    can include governing authority, 'judging' best preserves the lexical sense and
    eschatological/judicial nuance.
- source_word: τὰς δώδεκα φυλὰς τοῦ Ἰσραήλ
  chosen: the twelve tribes of Israel
  lexicon: BDAG
  rationale: Standard and transparent rendering of the phrase, preserving the covenantal
    reference to Israel as twelve tribes.
