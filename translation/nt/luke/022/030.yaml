theological_decisions:
- issue: Nature of the disciples' future role in 'judging the twelve tribes of Israel'
  chosen_reading: Retain the judicial language 'judging' without narrowing it to either
    condemnation only or administrative rule only.
  alternative_readings:
  - ruling the twelve tribes of Israel
  - governing the twelve tribes of Israel
  rationale: The Greek κρίνω can carry judicial and governing connotations. To preserve
    theological tension rather than resolve it, the main text keeps 'judging,' which
    is the most direct lexical rendering, while alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
