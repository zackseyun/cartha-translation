theological_decisions:
- issue: Narrative portrayal of Judas's action
  chosen_reading: Render the approach and kiss straightforwardly without adding interpretive
    language such as 'betray' in the verse itself.
  alternative_readings:
  - to betray him with a kiss (interpretive expansion)
  rationale: The betrayal context is clear from the surrounding passage, but this
    verse's wording itself describes the approach and intended kiss. Optimal equivalence
    avoids importing explicit theological or moral interpretation beyond the Greek
    wording.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
