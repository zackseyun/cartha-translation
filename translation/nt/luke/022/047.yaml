id: LUK.22.47
reference: Luke 22:47
source:
  edition: SBLGNT
  text: ⸀Ἔτι αὐτοῦ λαλοῦντος ἰδοὺ ὄχλος, καὶ ὁ λεγόμενος Ἰούδας εἷς τῶν δώδεκα προήρχετο
    αὐτούς, καὶ ἤγγισεν τῷ Ἰησοῦ φιλῆσαι αὐτόν.
translation:
  text: While he was still speaking, behold, a crowd came, and the one called Judas,
    one of the twelve, was going before them, and he came near to Jesus to kiss him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was leading them' / 'went ahead of them' for 'was going before them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι αὐτοῦ λαλοῦντος
  chosen: While he was still speaking
  alternatives:
  - As he was still speaking
  - While he was yet speaking
  lexicon: BDAG
  rationale: Genitive absolute expressing ongoing action concurrent with what follows.
    'While he was still speaking' is natural modern English and preserves the temporal
    force of ἔτι + present participle.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retains the discourse-marker force of drawing attention to the sudden
    appearance of the crowd. Though somewhat marked in English, it preserves the narrative
    vividness better than omitting it.
- source_word: ὄχλος
  chosen: a crowd came
  alternatives:
  - a crowd
  - a multitude
  lexicon: BDAG
  rationale: ὄχλος denotes a crowd or multitude. English idiom benefits from supplying
    'came' after 'behold' to make a complete clause, reflecting the sudden arrival
    implied in context without over-paraphrase.
- source_word: ὁ λεγόμενος Ἰούδας
  chosen: the one called Judas
  alternatives:
  - the man called Judas
  - the so-called Judas
  lexicon: BDAG
  rationale: A participial designation identifying Judas. 'The one called Judas' is
    close to the Greek and avoids adding interpretive nuance.
- source_word: εἷς τῶν δώδεκα
  chosen: one of the twelve
  lexicon: BDAG
  rationale: Standard idiomatic rendering preserving the identifying force and the
    betrayal irony of Judas's membership among the twelve.
- source_word: προήρχετο αὐτούς
  chosen: was going before them
  alternatives:
  - was leading them
  - went ahead of them
  lexicon: BDAG
  rationale: προέρχομαι with object pronoun here most naturally means going before/ahead
    of the group. 'Was going before them' preserves the imperfect aspect and avoids
    overstating the sense as formal leadership, though that nuance is possible.
- source_word: ἤγγισεν τῷ Ἰησοῦ
  chosen: he came near to Jesus
  alternatives:
  - he approached Jesus
  - he drew near to Jesus
  lexicon: BDAG
  rationale: Aorist of ἐγγίζω indicates approach. 'Came near to Jesus' is clear and
    natural while preserving the directional sense.
- source_word: φιλῆσαι αὐτόν
  chosen: to kiss him
  alternatives:
  - to greet him with a kiss
  lexicon: BDAG
  rationale: φιλέω in this context refers to kissing as a greeting/sign. 'To kiss
    him' is the plain lexical sense and avoids importing explanatory material into
    the main text.
