theological_decisions:
- issue: Whether to make Jesus the explicit subject of the custom
  chosen_reading: Retain the more literal 'according to custom' without expanding
    to 'as was his custom.'
  alternative_readings:
  - as was his custom
  rationale: The context clearly refers to Jesus, but the Greek phrase itself does
    not explicitly state 'his.' Preserving the terser wording avoids adding interpretive
    material while still conveying the sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence.'
