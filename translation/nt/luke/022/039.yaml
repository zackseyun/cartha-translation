id: LUK.22.39
reference: Luke 22:39
source:
  edition: SBLGNT
  text: Καὶ ἐξελθὼν ἐπορεύθη κατὰ τὸ ἔθος εἰς τὸ Ὄρος τῶν Ἐλαιῶν· ἠκολούθησαν δὲ αὐτῷ
    καὶ οἱ ⸀μαθηταί.
translation:
  text: And going out, he went according to custom to the Mount of Olives, and the
    disciples also followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as was his custom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: going out
  alternatives:
  - after going out
  - having gone out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, rendered as a participial action preceding
    the main verb. 'Going out' preserves the narrative flow without overformal stiffness.
- source_word: ἐπορεύθη
  chosen: he went
  alternatives:
  - he proceeded
  - he traveled
  lexicon: BDAG
  rationale: Common narrative verb πορεύομαι is best rendered simply as 'went' in
    readable modern English.
- source_word: κατὰ τὸ ἔθος
  chosen: according to custom
  alternatives:
  - as was his custom
  - according to the habit
  lexicon: BDAG
  rationale: This phrase indicates customary practice. 'According to custom' stays
    close to the Greek while remaining natural. 'As was his custom' is idiomatic but
    slightly more interpretive by making the subject explicit.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: to the Mount of Olives
  alternatives:
  - to the mountain of the olive trees
  lexicon: BDAG
  rationale: Standard place-name rendering. The phrase functions as a recognized geographic
    designation, so idiomatic English capitalization is appropriate.
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went with
  - accompanied
  lexicon: BDAG
  rationale: ἀκολουθέω commonly means 'follow,' and that sense fits both the literal
    movement and the disciple relationship here.
- source_word: οἱ μαθηταί
  chosen: the disciples
  alternatives:
  - his disciples
  - the learners
  lexicon: BDAG
  rationale: '''The disciples'' is the natural and contextually sufficient rendering.
    Adding ''his'' is possible from context but not explicit in the Greek.'
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - then
  lexicon: BDAG
  rationale: The initial conjunction straightforwardly links this verse to the preceding
    narrative.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks mild narrative continuation rather than strong contrast,
    so 'and' is preferable in smooth English.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: The second καί before οἱ μαθηταί has an additive force, highlighting
    that the disciples joined in following him; 'also' captures that nuance.
