id: LUK.22.5
reference: Luke 22:5
source:
  edition: SBLGNT
  text: καὶ ἐχάρησαν καὶ συνέθεντο αὐτῷ ἀργύριον δοῦναι.
translation:
  text: And they rejoiced and agreed to give him money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "silver." The Greek word can refer literally to silver or more generally
      to money.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχάρησαν
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they were delighted
  lexicon: BDAG
  rationale: Aorist passive/deponent of χαίρω here expresses emotional response. 'Rejoiced'
    is a natural, sufficiently formal rendering that preserves the strength of their
    pleasure without sounding colloquial.
- source_word: συνέθεντο
  chosen: agreed
  alternatives:
  - came to an agreement
  - promised
  lexicon: BDAG
  rationale: The middle of συντίθεμαι in this context means to come to terms or agree.
    'Agreed' is concise and idiomatic. 'Promised' is possible in context but is less
    directly tied to the lexical sense of making an agreement.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object of δοῦναι. In English, 'give
    him money' is more natural than the more explicit 'give money to him,' while preserving
    the same sense.
- source_word: ἀργύριον
  chosen: money
  alternatives:
  - silver
  - silver money
  lexicon: BDAG
  rationale: Although ἀργύριον literally denotes silver, in transactional contexts
    it commonly refers to money. 'Money' communicates the sense clearly in modern
    English. The more literal 'silver' is preserved in a footnote because of its resonance
    with betrayal traditions and parallel phrasing elsewhere.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to pay
  lexicon: BDAG
  rationale: The infinitive depends on συνέθεντο and states the content of the agreement.
    'To give' is the straightforward lexical equivalent; 'to pay' would be interpretive,
    though contextually plausible.
