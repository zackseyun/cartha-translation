id: LUK.22.43
reference: Luke 22:43
source:
  edition: SBLGNT
  text: ⸂ὤφθη δὲ αὐτῷ ἄγγελος ⸀ἀπ’ οὐρανοῦ ἐνισχύων αὐτόν.
translation:
  text: Then an angel from heaven appeared to him, strengthening him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit verses 43–44.
    reason: textual_variant
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  lexicon: BDAG
  rationale: Aorist passive of ὁράω commonly functions in appearance formulas as 'appeared.'
    'Was seen' is more mechanically formal but less natural in English and can imply
    emphasis on observers rather than the manifestation itself.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' communicates the forward
    movement of the scene in readable English better than a bare 'and,' while not
    overstating contrast.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: BDAG
  rationale: Dative pronoun with ὤφθη is naturally rendered 'appeared to him.' This
    reflects the standard construction for an appearance directed toward a person.
- source_word: ἄγγελος
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: BDAG
  rationale: In this heavenly context, 'angel' is the clear sense rather than the
    more general 'messenger.' The anarthrous noun is appropriately indefinite in English.
- source_word: ἀπ’ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: The prepositional phrase indicates heavenly origin. 'From heaven' is
    idiomatic and preserves the source's theological sense without unnecessary archaism.
- source_word: ἐνισχύων
  chosen: strengthening
  alternatives:
  - giving strength to
  - encouraging
  lexicon: BDAG
  rationale: The present participle expresses attendant action concurrent with the
    appearance. 'Strengthening' preserves both the verbal force and the ongoing aspect
    better than the more interpretive 'encouraging.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforwardly rendered 'him.'
