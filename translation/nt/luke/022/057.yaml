theological_decisions:
- issue: Whether to supply an explicit object for Peter's denial
  chosen_reading: Included 'it' in 'he denied it' to reflect the implied accusation
    rather than leave the English intransitive.
  alternative_readings:
  - he denied, saying
  - he denied him, saying
  rationale: The Greek has no explicit object with ἠρνήσατο. English normally requires
    one or sounds abrupt. 'It' captures that he denied the charge/claim being made.
    'He denied him' would over-specify the object and could suggest a direct repudiation
    of Jesus rather than denial of the accusation in this immediate exchange.
