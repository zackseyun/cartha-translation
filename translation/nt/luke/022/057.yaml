id: LUK.22.57
reference: Luke 22:57
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀ἠρνήσατο λέγων· ⸂Οὐκ οἶδα αὐτόν, γύναι⸃.
translation:
  text: But he denied it, saying, “I do not know him, woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “But he denied, saying …” The Greek does not state the
      object of 'denied'; 'it' is supplied for natural English.
    reason: lexical_alternative
  - marker: b
    text: “Woman” translates the vocative γύναι. It is a direct address to a female
      speaker; alternatives such as “madam” or “lady” are interpretive softenings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρνήσατο
  chosen: denied it
  alternatives:
  - denied
  - disowned
  lexicon: BDAG
  rationale: The verb ἀρνέομαι means to deny or repudiate. In context Peter is responding
    to an accusation/claim about association with Jesus, so English idiom is best
    captured by 'denied it' rather than the more wooden 'denied.' 'Disowned' is possible
    but slightly stronger and less natural here.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle introduces the content of his denial. 'Saying'
    preserves the participial linkage naturally in English.
- source_word: Οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  - I know not
  lexicon: BDAG
  rationale: This is the straightforward negated verb of knowing. 'I do not know'
    is clear, natural, and maintains the gravity of the scene better than the more
    colloquial contraction.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - this man
  lexicon: BDAG
  rationale: The pronoun directly refers to Jesus and should be rendered simply as
    'him.' Some English versions expand to 'this man' from parallel accounts or for
    idiom, but that goes beyond the Greek here.
- source_word: γύναι
  chosen: woman
  alternatives:
  - madam
  - lady
  lexicon: BDAG
  rationale: The vocative γύναι is literally 'woman.' In this context it is a direct
    form of address to the female accuser. 'Madam' or 'lady' may soften the expression
    for English politeness, but 'woman' stays closer to the Greek while remaining
    understandable.
