id: LUK.22.32
reference: Luke 22:32
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἐδεήθην περὶ σοῦ ἵνα μὴ ἐκλίπῃ ἡ πίστις σου· καὶ σύ ποτε ἐπιστρέψας
    ⸀στήρισον τοὺς ἀδελφούς σου.
translation:
  text: But I have prayed for you, that your faith may not fail; and you, when you
    have turned back, strengthen your brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faithfulness' or 'your trust may not fail.' The Greek word can
      carry overlapping senses.
    reason: alternative_reading
  - marker: b
    text: Or 'when you have returned' or 'when you have turned again.' The wording
      suggests restoration after Peter's coming failure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεήθην
  chosen: have prayed
  alternatives:
  - prayed
  - begged
  - pleaded
  lexicon: BDAG
  rationale: The verb denotes earnest petition. 'Have prayed' renders the aorist naturally
    in English within Jesus' immediate speech, preserving the completed action with
    present relevance. 'Begged' or 'pleaded' are possible but sound too strong or
    colloquial here.
- source_word: περὶ σοῦ
  chosen: for you
  alternatives:
  - concerning you
  - about you
  lexicon: BDAG
  rationale: With verbs of prayer, περί + genitive is idiomatically rendered 'for.'
    This is the most natural English equivalent and reflects intercessory prayer rather
    than mere reference.
- source_word: ἵνα μὴ ἐκλίπῃ
  chosen: that ... may not fail
  alternatives:
  - that ... may not give out
  - that ... may not come to an end
  lexicon: BDAG
  rationale: ἐκλείπω can mean to fail, cease, or give out. 'May not fail' is idiomatic
    and fits the context of Peter's coming denial without overstating the loss as
    total apostasy.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text, with
    alternatives preserved where relevant. Here the sense is Peter's believing fidelity/trust
    in Jesus under testing; 'faith' best preserves the theological breadth without
    narrowing it.
- source_word: ποτε
  chosen: when
  alternatives:
  - once
  - afterward
  - at some point
  lexicon: BDAG
  rationale: 'In this context ποτέ marks a future point viewed indefinitely: ''when''
    or ''once.'' ''When'' is smoother in English before the participle and imperative
    sequence.'
- source_word: ἐπιστρέψας
  chosen: when you have turned back
  alternatives:
  - when you have returned
  - once you have turned again
  - after turning back
  lexicon: BDAG
  rationale: The participle can mean return/turn back, often with repentance or restoration
    overtones. 'Turned back' preserves the directional metaphor and fits Peter's restoration
    after failure. It avoids importing a full technical conversion sense while still
    allowing repentance nuance.
- source_word: στήρισον
  chosen: strengthen
  alternatives:
  - establish
  - support
  - make firm
  lexicon: BDAG
  rationale: The imperative calls Peter to make the others firm after his restoration.
    'Strengthen' is standard, clear English and suits both spiritual and relational
    support.
- source_word: ἀδελφούς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate over gender-neutral. The Greek is grammatically
    masculine plural and in immediate context refers to Jesus' male disciples, so
    'brothers' is the most accurate rendering. Broader inclusive alternatives would
    overgeneralize this scene.
