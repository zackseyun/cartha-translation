theological_decisions:
- issue: Rendering of πίστις in a context where 'faith' and 'faithfulness' overlap
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Following the doctrine table, the default rendering is 'faith' in the
    main text. Because the context involves Peter's perseverance under satanic testing,
    'faithfulness' is a meaningful nuance, but the Greek does not require narrowing
    the term to that sense alone. The alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; footnote alternatives
    where contested'
- issue: Sense of ἐπιστρέψας with respect to Peter's future state
  chosen_reading: when you have turned back
  alternative_readings:
  - when you have returned
  - when you have repented
  rationale: The participle indicates restoration after Peter's lapse. 'Turned back'
    preserves the metaphor and theological tension without forcing a narrower doctrinal
    reading such as explicit repentance language in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
- issue: Rendering ἀδελφούς in context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The immediate referent is the circle of male disciples, not a generic
    mixed congregation. Therefore the masculine plural should be retained rather than
    neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
