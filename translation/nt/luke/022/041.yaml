theological_decisions:
- issue: Prayer posture and Christological portrayal
  chosen_reading: Render the verse straightforwardly as Jesus physically withdrawing
    and kneeling to pray, without importing additional devotional or doctrinal interpretation.
  rationale: The verse narrates Jesus' action and posture in prayer. No contested
    doctrinal term is present, and the translation should preserve the scene's gravity
    without embellishment.
  doctrine_reference: Translation philosophy §§1, 3, 6
