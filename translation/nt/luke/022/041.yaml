id: LUK.22.41
reference: Luke 22:41
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ἀπεσπάσθη ἀπ’ αὐτῶν ὡσεὶ λίθου βολήν, καὶ θεὶς τὰ γόνατα προσηύχετο
translation:
  text: And he withdrew from them about a stone’s throw, and kneeling down, he was
    praying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about the distance of a stone’s throw.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'having placed the knees,' that is, 'kneeling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεσπάσθη
  chosen: withdrew
  alternatives:
  - was withdrawn
  - pulled away
  - went away
  lexicon: BDAG
  rationale: The passive form can be rendered woodenly as 'was withdrawn' or 'was
    pulled away,' but in context it idiomatically describes Jesus separating himself
    from the disciples. 'Withdrew' preserves the sense of deliberate movement away
    without over-literal awkwardness.
- source_word: ὡσεὶ λίθου βολήν
  chosen: about a stone’s throw
  alternatives:
  - about the distance of a stone’s throw
  - roughly a stone’s cast
  lexicon: BDAG
  rationale: This is a conventional distance expression. 'About a stone’s throw' is
    natural modern English and preserves the approximate force of ὡσεὶ.
- source_word: θεὶς τὰ γόνατα
  chosen: kneeling down
  alternatives:
  - having placed his knees
  - falling on his knees
  - having knelt
  lexicon: BDAG
  rationale: Literally 'having put the knees,' an idiom for kneeling. 'Kneeling down'
    communicates the action clearly in contemporary English while retaining the bodily
    posture of prayer.
- source_word: προσηύχετο
  chosen: he was praying
  alternatives:
  - he prayed
  - he began to pray
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing action. 'He was praying' preserves
    the durative aspect better than the simple past 'he prayed.'
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun adds slight emphasis, but English style does not require
    'he himself' here. The subject is still clearly marked by 'he.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: A straightforward connective is best here. 'And' preserves the narrative
    flow without adding interpretive nuance.
