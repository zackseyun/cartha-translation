id: LUK.22.17
reference: Luke 22:17
source:
  edition: SBLGNT
  text: καὶ δεξάμενος ποτήριον εὐχαριστήσας εἶπεν· Λάβετε τοῦτο καὶ διαμερίσατε ⸂εἰς
    ἑαυτούς⸃·
translation:
  text: And after receiving a cup and giving thanks, he said, “Take this and divide
    it among yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the cup.” The Greek says simply “a cup” without the article, though
      the meal context may imply a specific cup.
    reason: lexical_alternative
  - marker: b
    text: Or “distribute this among yourselves.” The verb can mean “divide” or “distribute/share
      out” in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεξάμενος
  chosen: after receiving
  alternatives:
  - having received
  - taking
  lexicon: BDAG
  rationale: Aorist middle participle of δέχομαι, indicating prior action relative
    to the main verb. 'After receiving' gives clear English sequence without over-literal
    awkwardness; 'having received' is possible but less natural.
- source_word: ποτήριον
  chosen: a cup
  alternatives:
  - the cup
  lexicon: BDAG
  rationale: The noun lacks the article in Greek, so 'a cup' best reflects the form
    here. Although the context is the Passover meal and later Eucharistic tradition
    may suggest a specific cup, the Greek in this verse is anarthrous.
- source_word: εὐχαριστήσας
  chosen: giving thanks
  alternatives:
  - having given thanks
  lexicon: BDAG
  rationale: The participle denotes thanksgiving offered before speaking. 'Giving
    thanks' is idiomatic and preserves the verbal sense without importing later technical
    Eucharistic terminology into the translation.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he said to them
  lexicon: BDAG
  rationale: The Greek simply has 'he said'; the indirect object is not explicit and
    should not be added in the main text.
- source_word: Λάβετε
  chosen: Take
  alternatives:
  - Receive
  lexicon: BDAG
  rationale: Aorist imperative of λαμβάνω. 'Take' is the most natural imperative in
    this meal setting and fits the immediate physical action.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this cup
  lexicon: BDAG
  rationale: The demonstrative is neuter singular and refers to the cup just mentioned,
    but the noun is not repeated. 'This' preserves the Greek terseness; 'this cup'
    is interpretive and therefore better left out of the main text.
- source_word: διαμερίσατε
  chosen: divide
  alternatives:
  - share out
  - distribute
  lexicon: BDAG
  rationale: The verb means to divide or distribute. 'Divide' is a close rendering,
    while the following phrase 'among yourselves' clarifies the interpersonal distribution.
- source_word: εἰς ἑαυτούς
  chosen: among yourselves
  alternatives:
  - among one another
  - for yourselves
  lexicon: BDAG
  rationale: The phrase is idiomatic in context for distribution within the group.
    'Among yourselves' best captures the reciprocal sense in natural English. 'For
    yourselves' could be misunderstood as self-directed possession rather than mutual
    sharing.
