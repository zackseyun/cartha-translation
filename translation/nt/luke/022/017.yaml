theological_decisions:
- issue: Whether to use Eucharistic liturgical language in translating εὐχαριστήσας
    and ποτήριον
  chosen_reading: 'Use ordinary narrative language: ''a cup'' and ''giving thanks'''
  alternative_readings:
  - '''the cup'''
  - '''he gave thanks'' with stronger sacramental overtones'
  rationale: The verse narrates Jesus' action at table without requiring later ecclesial
    terminology in the translation. This preserves the historical scene and avoids
    importing doctrinal formulations the Greek does not explicitly state.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
