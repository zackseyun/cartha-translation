theological_decisions:
- issue: Relation of divine determination to human responsibility
  chosen_reading: 'The verse is rendered to preserve both truths: the Son of Man goes
    according to what has been determined, yet woe remains upon the man who betrays
    him.'
  alternative_readings:
  - A rendering that softens divine determination
  - A rendering that softens the betrayer's culpability
  rationale: The Greek explicitly juxtaposes God's determined plan (κατὰ τὸ ὡρισμένον)
    with a pronouncement of woe on the betrayer. The translation should not resolve
    this tension in favor of a particular theological system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
