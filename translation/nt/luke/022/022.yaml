id: LUK.22.22
reference: Luke 22:22
source:
  edition: SBLGNT
  text: ⸂ὅτι ὁ υἱὸς μὲν⸃ τοῦ ἀνθρώπου ⸂κατὰ τὸ ὡρισμένον πορεύεται⸃, πλὴν οὐαὶ τῷ
    ἀνθρώπῳ ἐκείνῳ δι’ οὗ παραδίδοται.
translation:
  text: For the Son of Man indeed goes as it has been determined, but woe to that
    man through whom he is betrayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "through whom he is handed over." The Greek verb can mean either "betrayed"
      or "handed over" depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this introduces the reason for the preceding statement, so
    'For' fits the discourse flow better than a bare 'that' or 'because' in English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard rendering of Jesus' self-designation; preserves the title's
    established sense and intertextual resonance.
- source_word: μέν
  chosen: indeed
  alternatives:
  - on the one hand
  - (left untranslated)
  lexicon: BDAG
  rationale: Marks the first side of a contrast that is completed by πλὴν. 'Indeed'
    preserves the contrast naturally in English without overloading the sentence.
- source_word: κατὰ τὸ ὡρισμένον
  chosen: as it has been determined
  alternatives:
  - according to what has been determined
  - according to the decree
  - as appointed
  lexicon: BDAG
  rationale: The phrase indicates conformity to a prior determination. This rendering
    is natural English while preserving the passive sense of divine determination
    without adding explicit wording not in the text.
- source_word: πορεύεται
  chosen: goes
  alternatives:
  - is going
  - proceeds
  - goes on his way
  lexicon: BDAG
  rationale: A simple present 'goes' best matches the Greek and idiomatically refers
    to Jesus' course toward his death.
- source_word: πλὴν
  chosen: but
  alternatives:
  - nevertheless
  - except that
  lexicon: BDAG
  rationale: Signals a strong adversative contrast between divine determination and
    human culpability; 'but' is clear and natural.
- source_word: οὐαὶ
  chosen: woe
  alternatives:
  - alas
  - judgment
  lexicon: BDAG
  rationale: Traditional and accurate rendering for a pronouncement of doom or lament;
    retains the prophetic force.
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  chosen: to that man
  alternatives:
  - to that person
  lexicon: BDAG
  rationale: The referent is a specific male individual (Judas), so 'that man' is
    both gender-accurate and contextually precise.
- source_word: δι’ οὗ
  chosen: through whom
  alternatives:
  - by whom
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or instrumentality. 'Through
    whom' is slightly more literal and preserves the mediated sense.
- source_word: παραδίδοται
  chosen: he is betrayed
  alternatives:
  - he is handed over
  - he is delivered up
  lexicon: BDAG
  rationale: In this immediate context of Judas' action, 'betrayed' communicates the
    relational treachery implied in the narrative. 'Handed over' is lexically possible
    and worth preserving in a footnote because παραδίδωμι can carry both senses.
