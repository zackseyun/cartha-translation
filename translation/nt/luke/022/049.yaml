id: LUK.22.49
reference: Luke 22:49
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ περὶ αὐτὸν τὸ ἐσόμενον ⸀εἶπαν· Κύριε, εἰ πατάξομεν ἐν μαχαίρῃ;
translation:
  text: And when those around him saw what was about to happen, they said, “Lord,
    shall we strike with the sword?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with a sword.” The Greek μάχαιρα can refer to a sword or a shorter blade/dagger.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in smooth English:
    ''when ... saw.'' This preserves the participial relation to the main verb without
    awkwardness.'
- source_word: οἱ περὶ αὐτὸν
  chosen: those around him
  alternatives:
  - those about him
  - his companions
  - those with him
  lexicon: BDAG
  rationale: The idiom refers to the people surrounding Jesus, likely his disciples/companions.
    'Those around him' is a natural and sufficiently literal rendering that avoids
    over-specifying beyond the Greek.
- source_word: τὸ ἐσόμενον
  chosen: what was about to happen
  alternatives:
  - what was going to happen
  - what was coming
  lexicon: BDAG
  rationale: The articular future participle of εἰμί denotes the impending event.
    'What was about to happen' captures the imminence more clearly than the more wooden
    'the thing that was going to be.'
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they asked
  lexicon: BDAG
  rationale: λέγω normally means 'say.' Although the following clause is interrogative,
    English can preserve this naturally as 'they said, “...?”' without shifting to
    'asked'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In direct address to Jesus this
    preserves both respect and the title's theological resonance.
- source_word: εἰ
  chosen: shall
  alternatives:
  - if
  - whether
  lexicon: BDAG
  rationale: Here εἰ introduces a deliberative question in idiomatic Greek. English
    'shall we ...?' best conveys the sense, rather than a wooden 'if we will strike.'
- source_word: πατάξομεν
  chosen: shall we strike
  alternatives:
  - shall we attack
  - shall we hit
  lexicon: BDAG
  rationale: Future indicative used in a deliberative question. 'Strike' preserves
    the force of πατάσσω and fits the martial context without over-interpretation.
- source_word: ἐν μαχαίρῃ
  chosen: with the sword
  alternatives:
  - with a sword
  - by the sword
  lexicon: BDAG
  rationale: μάχαιρα can mean sword or dagger/short sword. The singular with ἐν is
    best rendered instrumentally. 'With the sword' is idiomatic and may reflect the
    weapon already in view among the group; 'with a sword' remains possible.
