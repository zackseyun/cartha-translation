- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance specifies 'Lord' as the default for κύριος. In
    this context it functions as direct address to Jesus and should retain the title's
    weight rather than be reduced to a merely social honorific.
