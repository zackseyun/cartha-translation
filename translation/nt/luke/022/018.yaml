theological_decisions:
- issue: Whether to render γενήματος τῆς ἀμπέλου as 'wine' or the more literal 'fruit
    of the vine'
  chosen_reading: fruit of the vine
  alternative_readings:
  - wine
  rationale: The Greek expression is broader and more formal than simply 'wine.' Retaining
    'fruit of the vine' avoids importing a narrower term than the text uses and preserves
    the Passover/meal setting's liturgical resonance.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the eschatological statement about the kingdom
  chosen_reading: until the kingdom of God comes
  alternative_readings:
  - until the kingdom of God has come
  - until God's reign comes fully
  rationale: The text states a future-oriented temporal boundary without specifying
    the precise mode or stage of the kingdom's coming. The translation preserves that
    theological tension rather than resolving it into a more systematized eschatological
    claim.
  doctrine_reference: Translation philosophy §3
