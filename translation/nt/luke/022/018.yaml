id: LUK.22.18
reference: Luke 22:18
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν, ⸀οὐ μὴ πίω ἀπὸ τοῦ ⸂νῦν ἀπὸ τοῦ⸃ γενήματος τῆς ἀμπέλου ἕως
    ⸀οὗ ἡ βασιλεία τοῦ θεοῦ ἔλθῃ.
translation:
  text: For I tell you, from now on I will certainly not drink from the fruit of the
    vine until the kingdom of God comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wine.' The Greek reads 'fruit of the vine,' a broader expression that
      likely refers to the cup's contents without using the ordinary word for wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  - Indeed, I tell you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is a standard direct-address formula. 'I tell you'
    is natural modern English; γάρ is retained as 'For' to preserve the explanatory
    connection.
- source_word: οὐ μὴ πίω
  chosen: I will certainly not drink
  alternatives:
  - I will never drink
  - I shall by no means drink
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic future denial. 'Will
    certainly not' preserves the strong negation without archaic phrasing; 'never'
    is possible but can overstate the temporal nuance apart from the following 'until'
    clause.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time
  - from now
  lexicon: BDAG
  rationale: This idiom marks the starting point from the present moment. 'From now
    on' is idiomatic English and captures the durative force better than the more
    wooden 'from this time'.
- source_word: ἀπὸ τοῦ γενήματος τῆς ἀμπέλου
  chosen: from the fruit of the vine
  alternatives:
  - of the produce of the vine
  - of the vine's fruit
  lexicon: BDAG
  rationale: γένημα denotes that which is produced or fruit/produce. In this meal
    context, 'fruit of the vine' is both accurate and recognizable, preserving the
    traditional Jewish liturgical expression without over-specifying 'wine,' which
    the Greek does not explicitly say here.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  - up to the point that
  lexicon: BDAG
  rationale: ἕως οὗ introduces the temporal limit of the negation. Simple 'until'
    is the clearest English equivalent.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom, but 'kingdom of God' is the established
    and contextually fitting rendering in the Synoptics. It preserves both the eschatological
    and royal dimensions without interpretive narrowing.
- source_word: ἔλθῃ
  chosen: comes
  alternatives:
  - has come
  - should come
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ἕως οὗ is naturally rendered with an English
    present in a future-oriented temporal clause: ''until ... comes.'' This is idiomatic
    and semantically accurate.'
