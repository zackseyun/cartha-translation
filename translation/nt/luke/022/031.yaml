id: LUK.22.31
reference: Luke 22:31
source:
  edition: SBLGNT
  text: ⸀Σίμων Σίμων, ἰδοὺ ὁ Σατανᾶς ἐξῃτήσατο ὑμᾶς τοῦ σινιάσαι ὡς τὸν σῖτον·
translation:
  text: 'Simon, Simon, look: Satan has demanded to have all of you, to sift you like
    wheat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek pronoun ''you'' here is plural: Satan has demanded all of the
      disciples, not only Peter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων Σίμων
  chosen: Simon, Simon
  alternatives:
  - Simon! Simon!
  lexicon: BDAG
  rationale: The repeated vocative is preserved directly for emphasis and solemnity.
    English punctuation with a comma reflects direct address without adding exclamatory
    force not explicit in the Greek.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A deictic/interjection drawing attention to what follows. 'Look' is natural
    modern English and preserves the alerting force better than the archaic 'behold.'
- source_word: ὁ Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title used in the NT. The
    article is not normally carried into English before proper names here.
- source_word: ἐξῃτήσατο
  chosen: has demanded to have
  alternatives:
  - has asked for
  - has obtained by asking
  lexicon: BDAG
  rationale: The verb ἐξαιτέομαι conveys asking for strongly, even demanding or claiming
    for oneself. 'Has demanded to have' captures both the forceful request and the
    sense that Satan seeks possession/control for the stated purpose.
- source_word: ὑμᾶς
  chosen: all of you
  alternatives:
  - you
  lexicon: BDAG
  rationale: The pronoun is plural, in contrast to the singular address 'Simon.' Rendering
    it as 'all of you' makes explicit in English that Jesus says Satan has asked for
    the whole group, not Peter alone.
- source_word: τοῦ σινιάσαι
  chosen: to sift you
  alternatives:
  - to shake you out
  - to sift
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/result after the request.
    'To sift you' is the established and accurate image, preserving the agricultural
    metaphor without overexplaining it in the main text.
- source_word: ὡς τὸν σῖτον
  chosen: like wheat
  alternatives:
  - as wheat
  - like grain
  lexicon: BDAG
  rationale: σῖτος here refers to wheat/grain in the agricultural image. 'Like wheat'
    is idiomatic and vivid in English; the singular with article is generic, so English
    drops the article.
