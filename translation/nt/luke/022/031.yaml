theological_decisions:
- issue: Scope of the pronoun addressed to Simon
  chosen_reading: Jesus addresses Simon individually but says Satan has demanded all
    the disciples.
  alternative_readings:
  - Jesus refers only to Simon/Peter
  rationale: The Greek shifts from singular vocative Σίμων to plural ὑμᾶς. The translation
    makes this distinction explicit with 'all of you,' preserving the textual tension
    rather than collapsing the statement into Peter alone.
  doctrine_reference: Translation philosophy §3, §5
