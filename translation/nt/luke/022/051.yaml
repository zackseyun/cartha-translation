id: LUK.22.51
reference: Luke 22:51
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν· Ἐᾶτε ἕως τούτου· καὶ ἁψάμενος τοῦ ⸀ὠτίου ἰάσατο
    αὐτόν.
translation:
  text: But Jesus answered, “Enough of this!” And he touched his ear and healed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Permit even this,” or “Let it go this far.” The Greek expression is
      brief and can be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Standard narrative participle introducing Jesus' reply. 'Answered' is
    idiomatic and preserves the discourse function.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition in the narrative. 'But' fits the
    immediate shift to Jesus' intervention.
- source_word: Ἐᾶτε
  chosen: Enough
  alternatives:
  - Permit
  - Allow
  - Leave
  lexicon: BDAG
  rationale: The imperative of ἐάω literally means 'allow/let,' but in this idiomatic
    arrest-scene context it is widely understood as a command to stop the violent
    action. 'Enough' captures the force in natural English without over-paraphrasing.
- source_word: ἕως τούτου
  chosen: of this
  alternatives:
  - up to this point
  - this far
  lexicon: BDAG
  rationale: Literally 'until this' or 'up to this point.' Combined with Ἐᾶτε, it
    forms an idiomatic expression. 'Enough of this!' best conveys the sense in contemporary
    English.
- source_word: ἁψάμενος
  chosen: touched
  alternatives:
  - having touched
  lexicon: BDAG
  rationale: Aorist middle participle from ἅπτω in the sense 'touch.' English smooths
    the participial sequence into a finite verb coordinated with the following main
    verb.
- source_word: τοῦ ὠτίου
  chosen: his ear
  alternatives:
  - the ear
  lexicon: BDAG
  rationale: ὠτίον means 'ear' (diminutive form, but not requiring a diminutive translation
    in English). The possessive 'his' is supplied naturally from the context and αὐτόν
    in the next clause.
- source_word: ἰάσατο
  chosen: healed
  alternatives:
  - restored
  - cured
  lexicon: BDAG
  rationale: ἰάομαι commonly means 'heal.' 'Healed' is the most direct and contextually
    appropriate rendering for Jesus' restorative act.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Refers to the injured man whose ear had been struck. 'Him' is the straightforward
    object of 'healed'.
