theological_decisions:
- issue: Sense of Jesus' command Ἐᾶτε ἕως τούτου
  chosen_reading: A rebuke meaning 'Enough of this!' directed at stopping the violent
    action
  alternative_readings:
  - '''Permit even this'' (addressed to those arresting him, allowing the event to
    proceed to the healing)'
  - '''Let it go this far'''
  rationale: The Greek phrase is terse and debated. In context, Jesus immediately
    heals the injured man, and the command most naturally functions as an intervention
    to halt the disciples' violent resistance. Because the phrase is genuinely ambiguous,
    the main text adopts the most contextually coherent idiomatic rendering while
    preserving the major alternative in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
