id: LUK.22.15
reference: Luke 22:15
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτούς· Ἐπιθυμίᾳ ἐπεθύμησα τοῦτο τὸ πάσχα φαγεῖν μεθ’ ὑμῶν
    πρὸ τοῦ με παθεῖν·
translation:
  text: And he said to them, “I have earnestly desired to eat this Passover with you
    before I suffer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “With desire I have desired”; the Greek uses an emphatic
      construction to intensify Jesus’ longing.
    reason: lexical_alternative
  - marker: b
    text: “This Passover” may refer specifically to the Passover meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρὸς αὐτούς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard narrative speech formula. 'Said to them' is the most direct
    and natural rendering of λέγω with πρός + accusative.
- source_word: Ἐπιθυμίᾳ ἐπεθύμησα
  chosen: I have earnestly desired
  alternatives:
  - I have greatly desired
  - with desire I have desired
  - I have eagerly desired
  lexicon: BDAG
  rationale: This is a Semitic-style cognate construction using the dative noun with
    the verb to intensify the statement. English should preserve the emphasis without
    sounding wooden. 'I have earnestly desired' communicates the strong intensity
    better than a literal but awkward 'with desire I desired.'
- source_word: τοῦτο τὸ πάσχα
  chosen: this Passover
  alternatives:
  - this Passover meal
  lexicon: BDAG
  rationale: πάσχα can denote the Passover festival or the meal. In this immediate
    context of eating, the meal is in view, but 'this Passover' is sufficiently natural
    in English and preserves the source wording without adding 'meal' to the main
    text.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - to partake of
  lexicon: BDAG
  rationale: The aorist infinitive of ἐσθίω is straightforwardly 'to eat.' No expansion
    is needed.
- source_word: μεθ’ ὑμῶν
  chosen: with you
  lexicon: BDAG
  rationale: Simple accompaniment; 'with you' is direct and idiomatic.
- source_word: πρὸ τοῦ με παθεῖν
  chosen: before I suffer
  alternatives:
  - before my suffering
  - before I am made to suffer
  lexicon: BDAG
  rationale: The articular infinitive with πρό expresses prior time. πάσχω here refers
    to Jesus' impending suffering in the passion. 'Before I suffer' is both accurate
    and natural, preserving the solemn forward-looking sense without over-specifying
    the events.
