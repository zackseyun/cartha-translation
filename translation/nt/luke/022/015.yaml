theological_decisions:
- issue: Meaning of πάσχα in context
  chosen_reading: Passover is retained in the main text without expanding to 'Passover
    meal.'
  alternative_readings:
  - this Passover meal
  rationale: The context clearly involves eating, so the meal is in view; however,
    the Greek itself says 'this Passover.' Retaining 'Passover' preserves the wording
    while allowing the context to supply that it is the meal. This avoids unnecessary
    interpretive expansion in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence.'
- issue: Force of the emphatic construction Ἐπιθυμίᾳ ἐπεθύμησα
  chosen_reading: The emphasis is rendered idiomatically as 'I have earnestly desired.'
  alternative_readings:
  - I have greatly desired
  - with desire I have desired
  - I have eagerly desired
  rationale: The verse expresses strong personal longing before Jesus' suffering.
    The translation preserves the intensity without importing additional theological
    meaning or flattening the emphasis.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense
    in readable modern English.'
