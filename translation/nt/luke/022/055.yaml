id: LUK.22.55
reference: Luke 22:55
source:
  edition: SBLGNT
  text: ⸀περιαψάντων δὲ πῦρ ἐν μέσῳ τῆς αὐλῆς καὶ ⸀συγκαθισάντων ἐκάθητο ὁ Πέτρος
    ⸀μέσος αὐτῶν.
translation:
  text: And after they had kindled a fire in the middle of the courtyard and sat down
    together, Peter was sitting among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Peter sat in their midst.' The Greek imperfect may be rendered more
      simply as 'sat,' but 'was sitting' better reflects the ongoing scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιαψάντων
  chosen: after they had kindled
  alternatives:
  - when they had lit
  - after they had started
  lexicon: BDAG
  rationale: Aorist active participle, genitive plural, giving prior action relative
    to the main verb. 'Kindled' fits the sense of lighting a fire and is slightly
    more natural than the more literal 'set around' implied by the compound's etymology.
- source_word: πῦρ
  chosen: a fire
  alternatives:
  - fire
  lexicon: BDAG
  rationale: 'Anarthrous singular noun in context refers to a specific fire that was
    made there; English idiom normally uses the indefinite article: ''a fire.'''
- source_word: ἐν μέσῳ
  chosen: in the middle of
  alternatives:
  - in the midst of
  - at the center of
  lexicon: BDAG
  rationale: The phrase is spatial and concrete here. 'In the middle of' is clear
    modern English and preserves the location.
- source_word: αὐλή
  chosen: courtyard
  alternatives:
  - court
  - palace courtyard
  lexicon: BDAG
  rationale: In this narrative setting αὐλή refers to the open court area of the high
    priest's residence. 'Courtyard' is the most natural and precise English rendering.
- source_word: συγκαθισάντων
  chosen: sat down together
  alternatives:
  - had sat down together
  - were seated together
  lexicon: BDAG
  rationale: Aorist active participle parallel to περιαψάντων. The σύν prefix indicates
    sitting together/with one another. 'Sat down together' preserves that communal
    nuance.
- source_word: ἐκάθητο
  chosen: was sitting
  alternatives:
  - sat
  - was seated
  lexicon: BDAG
  rationale: Imperfect middle/passive form of κάθημαι conveys ongoing past action.
    'Was sitting' best reflects the imperfect aspect in English.
- source_word: μέσος αὐτῶν
  chosen: among them
  alternatives:
  - in their midst
  - in the middle of them
  lexicon: BDAG
  rationale: Predicate use of μέσος with the genitive indicates Peter's position within
    the group. 'Among them' is idiomatic English that preserves the sense without
    awkwardness.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is a natural English narrative connector.
