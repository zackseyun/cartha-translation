id: LUK.22.16
reference: Luke 22:16
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν ⸀ὅτι οὐ μὴ φάγω ⸀αὐτὸ ἕως ὅτου πληρωθῇ ἐν τῇ βασιλείᾳ τοῦ θεοῦ.
translation:
  text: For I tell you that I will certainly not eat it until it is fulfilled in the
    kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will never eat it again until it is fulfilled in the kingdom of God.'
      The Greek emphatically denies a future eating; some translations make the implied
      'again' explicit from the context, but it is not stated in the Greek text.
    reason: lexical_alternative
  - marker: b
    text: '''It'' refers to the Passover just mentioned in the previous verse.'
    reason: cross_reference
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  - Indeed, I tell you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is a standard speech formula. 'I tell you' is natural
    modern English; γάρ is retained as 'For' to preserve the explanatory connection
    to the previous verse.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of Jesus' statement. English can omit it, but
    retaining 'that' preserves the explicit structure without sounding unnatural.
- source_word: οὐ μὴ φάγω
  chosen: I will certainly not eat
  alternatives:
  - I will never eat
  - I shall by no means eat
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation about the future.
    'Will certainly not eat' conveys the force clearly in contemporary English without
    archaic phrasing.
- source_word: αὐτό
  chosen: it
  alternatives:
  - this
  - this Passover meal
  lexicon: BDAG
  rationale: The pronoun refers back to the Passover mentioned in the previous verse.
    'It' is the most direct rendering here; supplying 'Passover meal' in the main
    text would import antecedent material not explicitly repeated in this verse.
- source_word: ἕως ὅτου
  chosen: until
  alternatives:
  - until the time when
  - up to the point that
  lexicon: BDAG
  rationale: This compound expression marks a temporal limit. Simple 'until' is idiomatic
    and fully adequate in English.
- source_word: πληρωθῇ
  chosen: it is fulfilled
  alternatives:
  - it is completed
  - it comes to fulfillment
  lexicon: BDAG
  rationale: πληρόω in the passive here naturally carries the sense of fulfillment/completion.
    'Fulfilled' preserves likely salvation-historical resonance and matches common
    biblical usage better than the flatter 'completed'.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - in God's kingdom
  lexicon: BDAG
  rationale: βασιλεία is best rendered 'kingdom' here, preserving both reign and realm
    associations in a familiar biblical phrase. The more literal genitive 'of God'
    is retained rather than recasting as the possessive 'God's' for consistency with
    key term usage.
