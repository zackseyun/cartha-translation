theological_decisions:
- issue: Referent of 'it' (αὐτό)
  chosen_reading: The pronoun refers to the Passover meal just mentioned in the previous
    verse.
  alternative_readings:
  - The pronoun refers more broadly to the Passover observance/event.
  rationale: The immediate context in v.15 is Jesus' desire to eat 'this Passover'
    with the disciples. Rendering αὐτό as 'it' preserves the Greek's compactness while
    allowing the contextual referent to remain the Passover meal/observance without
    over-specification.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of 'fulfilled in the kingdom of God'
  chosen_reading: The wording preserves the text's eschatological fulfillment language
    without specifying exactly how the Passover is fulfilled.
  alternative_readings:
  - fulfilled by the coming of God's kingdom
  - fulfilled in the messianic banquet
  rationale: The verse gestures toward eschatological completion, but the Greek does
    not explicitly define the mechanism or event. The translation therefore preserves
    the theological tension rather than resolving it into a narrower doctrinal interpretation.
  doctrine_reference: Translation philosophy §3
