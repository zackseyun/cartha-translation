theological_decisions:
- issue: Cause of the disciples' sleep
  chosen_reading: Their sleeping is presented as resulting from sorrow.
  alternative_readings:
  - They were sleeping while sorrowful, without strong causal emphasis.
  rationale: The phrase ἀπὸ τῆς λύπης most naturally expresses cause ('from/because
    of sorrow'). This is a contextual, not doctrinal, decision and does not import
    further psychological explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; no major
    doctrinal dispute involved.
