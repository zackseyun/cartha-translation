id: LUK.22.45
reference: Luke 22:45
source:
  edition: SBLGNT
  text: καὶ ἀναστὰς ἀπὸ τῆς προσευχῆς ἐλθὼν πρὸς τοὺς μαθητὰς εὗρεν ⸂κοιμωμένους αὐτοὺς⸃
    ἀπὸ τῆς λύπης,
translation:
  text: And after rising from prayer, he came to the disciples and found them sleeping
    from sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'found them asleep because of sorrow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: after rising
  alternatives:
  - having risen
  - getting up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, temporally prior to the main verb. 'After
    rising' gives clear English sequence without sounding wooden.
- source_word: ἀπὸ τῆς προσευχῆς
  chosen: from prayer
  alternatives:
  - from the prayer
  - after praying
  lexicon: BDAG
  rationale: The genitive with ἀπό is naturally 'from prayer.' The article is not
    necessarily definite in English. 'After praying' is interpretive; 'from prayer'
    stays closer to the Greek while remaining natural.
- source_word: ἐλθὼν πρὸς τοὺς μαθητὰς
  chosen: he came to the disciples
  alternatives:
  - coming to the disciples
  - he went to the disciples
  lexicon: BDAG
  rationale: The participle plus πρός indicates movement toward the disciples. Rendering
    with a finite verb in English improves readability while preserving the sequence
    of actions.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for
    μαθητής in the Gospels.'
- source_word: εὗρεν
  chosen: found
  alternatives:
  - discovered
  - saw
  lexicon: BDAG
  rationale: '''Found'' is the direct and idiomatic rendering of εὑρίσκω here.'
- source_word: κοιμωμένους αὐτούς
  chosen: them sleeping
  alternatives:
  - them asleep
  - them sleeping
  lexicon: BDAG
  rationale: The present participle κοιμωμένους depicts their state/action when he
    found them. 'Them sleeping' preserves the verbal force slightly better than the
    more static 'asleep,' though both are possible.
- source_word: ἀπὸ τῆς λύπης
  chosen: from sorrow
  alternatives:
  - because of sorrow
  - from grief
  lexicon: BDAG
  rationale: ἀπό here expresses cause. 'From sorrow' is a close, idiomatic rendering;
    'because of sorrow' is slightly more explicit but less concise. λύπη can be 'sorrow'
    or 'grief'; 'sorrow' fits the register and likely alludes to their emotional distress.
