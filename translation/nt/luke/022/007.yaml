theological_decisions:
- issue: Referent of τὸ πάσχα in a sacrificial context
  chosen_reading: Render as 'the Passover' in the main text while allowing the sacrificial
    sense to be carried by 'be sacrificed.'
  alternative_readings:
  - the Passover lamb
  - the Passover sacrifice
  rationale: The Greek term itself is broader than 'lamb' and can refer metonymically
    to the feast or its sacrificial victim. Because the verb θύεσθαι already signals
    sacrifice, the main text can remain close to the source with 'the Passover' without
    flattening the cultic meaning. The more explicit interpretations are preserved
    in a footnote to maintain auditability and interpretive transparency.
  doctrine_reference: Translation philosophy §§1, 3, 5
