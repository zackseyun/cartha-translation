id: LUK.22.7
reference: Luke 22:7
source:
  edition: SBLGNT
  text: Ἦλθεν δὲ ἡ ἡμέρα τῶν ἀζύμων, ⸀ᾗ ἔδει θύεσθαι τὸ πάσχα·
translation:
  text: Then the day of Unleavened Bread came, on which the Passover had to be sacrificed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover lamb' or 'the Passover sacrifice.' The Greek term can refer
      to the Passover observance or, in this context, specifically to the sacrificial
      victim.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι used idiomatically for the arrival of a time or day.
    'Came' is natural modern English and preserves the temporal sense without overtranslation.
- source_word: δὲ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' communicates the sequential
    development more clearly in English than a bare 'and,' while remaining restrained.
- source_word: ἡ ἡμέρα τῶν ἀζύμων
  chosen: the day of Unleavened Bread
  alternatives:
  - the day of the Unleavened Bread
  - the day of Unleavened Bread festival
  lexicon: BDAG
  rationale: The genitive construction refers to the festival day associated with
    unleavened bread. Singular 'day' should be preserved because the Greek is singular,
    even though the broader observance spans multiple days. Capitalization reflects
    a recognized Jewish feast.
- source_word: ᾗ
  chosen: on which
  alternatives:
  - when
  lexicon: BDAG
  rationale: Dative relative pronoun referring back to 'day.' 'On which' preserves
    the relative construction and temporal force more formally than simply 'when.'
- source_word: ἔδει
  chosen: had to
  alternatives:
  - it was necessary
  - it was required
  lexicon: BDAG
  rationale: Imperfect of impersonal necessity. 'Had to' gives clear idiomatic English
    and conveys obligation/necessity tied to the festival calendar.
- source_word: θύεσθαι
  chosen: be sacrificed
  alternatives:
  - be slaughtered
  lexicon: BDAG
  rationale: θύω in sacrificial contexts can denote slaughtering for sacrifice. Because
    the object is τὸ πάσχα and the cultic setting is explicit, 'be sacrificed' best
    conveys the ritual sense. 'Be slaughtered' is a viable lexical alternative but
    is less explicit about the sacrificial dimension.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover lamb
  - the Passover sacrifice
  lexicon: BDAG
  rationale: πάσχα can denote Passover, the Passover meal, or the Passover lamb/sacrifice
    depending on context. Here, with θύεσθαι, the referent is specifically the sacrificial
    Passover victim, but 'the Passover' is a standard and sufficiently precise rendering
    that preserves the Greek wording while allowing the sacrificial sense to be supplied
    by 'be sacrificed.' The more explicit alternatives are preserved in a footnote.
