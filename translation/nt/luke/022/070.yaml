theological_decisions:
- issue: Whether Jesus' reply should be rendered as an explicit affirmation or as
    a more indirect, qualified response
  chosen_reading: Render literally as 'You yourselves say that I am'
  alternative_readings:
  - You say that I am
  - It is as you say
  - You say so
  rationale: The Greek wording does not require an expanded paraphrase, though it
    functions as an affirmative response in context. To preserve theological tension
    rather than resolve it, the main text keeps the literal form while footnoting
    common idiomatic alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
