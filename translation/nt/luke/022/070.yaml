id: LUK.22.70
reference: Luke 22:70
source:
  edition: SBLGNT
  text: εἶπαν δὲ πάντες· Σὺ οὖν εἶ ὁ υἱὸς τοῦ θεοῦ; ὁ δὲ πρὸς αὐτοὺς ἔφη· Ὑμεῖς λέγετε
    ὅτι ἐγώ εἰμι.
translation:
  text: Then they all said, “So you are the Son of God?” And he said to them, “You
    yourselves say that I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “You say so” or “It is as you say.” Jesus' wording
      is an affirmative reply, but the Greek is more literally, “You yourselves say
      that I am.”
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  lexicon: BDAG
  rationale: The nominative plural adjective functions substantivally, referring to
    the whole group. 'They all' is natural English and preserves the collective emphasis.
- source_word: οὖν
  chosen: so
  alternatives:
  - then
  - therefore
  lexicon: BDAG
  rationale: In this interrogative context οὖν draws an inference from the preceding
    exchange. 'So' is idiomatic modern English and preserves the inferential force
    without sounding wooden.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is a christological title. The articular construction is best preserved
    as 'the Son of God,' which carries the formal weight of the accusation/question.
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - answered
  lexicon: BDAG
  rationale: The imperfect/inceptive force is not prominent enough here to require
    a marked English rendering. 'Said' is the most natural equivalent in context.
- source_word: Ὑμεῖς
  chosen: You yourselves
  alternatives:
  - You
  - You say
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. 'You yourselves' preserves the emphasis
    and the rhetorical force of placing the wording back on his interlocutors.
- source_word: λέγετε
  chosen: say
  alternatives:
  - are saying
  lexicon: BDAG
  rationale: Present indicative here is well represented by simple present in English.
    The plural verb matches the plural pronoun and keeps the statement direct.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  - '"'
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally introduces the content of what they say: ''that
    I am.'' This preserves the Greek syntax and avoids overinterpreting the phrase.'
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - it is as you say
  - I am he
  lexicon: BDAG
  rationale: The Greek is terse and potentially solemn. 'I am' is the most direct
    rendering of the words present. Expanded idiomatic renderings smooth the expression
    but add words not explicit in the text.
