id: LUK.22.33
reference: Luke 22:33
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ· Κύριε, μετὰ σοῦ ἕτοιμός εἰμι καὶ εἰς φυλακὴν καὶ εἰς θάνατον
    πορεύεσθαι.
translation:
  text: But he said to him, “Lord, I am ready to go with you both to prison and to
    death.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - And he
  - Then he
  lexicon: BDAG
  rationale: The article functions pronominally, referring back to Peter, and δέ is
    best rendered as a mild adversative or continuative. 'But he' fits the immediate
    contrast with Jesus' prior statement while remaining natural English.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - said to Jesus
  - told him
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with indirect object αὐτῷ. 'Said
    to him' preserves the Greek structure without over-specifying the referent in
    the main text.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus this preserves both respect and the title's theological resonance without
    flattening it to merely 'Master'.
- source_word: μετὰ σοῦ
  chosen: with you
  alternatives:
  - along with you
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment. 'With you' is the most
    natural and precise English equivalent here.
- source_word: ἕτοιμός εἰμι
  chosen: I am ready
  alternatives:
  - I am prepared
  lexicon: BDAG
  rationale: This idiom expresses willingness and preparedness. 'I am ready' is idiomatic,
    concise, and preserves Peter's emphatic self-assurance.
- source_word: καὶ ... καὶ
  chosen: both ... and
  alternatives:
  - and ... and
  - even ... and
  lexicon: BDAG
  rationale: The paired καί construction links two parallel destinations emphatically.
    English 'both ... and' captures the force more naturally than repeating 'and'
    alone.
- source_word: εἰς φυλακὴν
  chosen: to prison
  alternatives:
  - into prison
  - to imprisonment
  lexicon: BDAG
  rationale: φυλακή here refers to imprisonment/confinement. 'To prison' is idiomatic
    in English and matches the directional force of εἰς in this infinitival construction.
- source_word: εἰς θάνατον
  chosen: to death
  alternatives:
  - unto death
  - even to death
  lexicon: BDAG
  rationale: The phrase denotes willingness to go as far as death. 'To death' is clear
    and idiomatic, preserving the parallelism with 'to prison.'
- source_word: πορεύεσθαι
  chosen: to go
  alternatives:
  - to journey
  - to proceed
  lexicon: BDAG
  rationale: The present middle infinitive here functions as the complement of readiness,
    expressing accompanying movement or course. 'To go' is the most natural English
    rendering in context.
