id: LUK.22.36
reference: Luke 22:36
source:
  edition: SBLGNT
  text: εἶπεν ⸀δὲ αὐτοῖς· Ἀλλὰ νῦν ὁ ἔχων βαλλάντιον ἀράτω, ὁμοίως καὶ πήραν, καὶ
    ὁ μὴ ἔχων ⸀πωλησάτω τὸ ἱμάτιον αὐτοῦ καὶ ⸀ἀγορασάτω μάχαιραν.
translation:
  text: But now, let the one who has a money bag take it, and likewise a travel bag;
    and let the one who does not have one sell his cloak and buy a sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bag' or 'knapsack' for 'travel bag' (πήρα).
    reason: lexical_alternative
  - marker: b
    text: The Greek word translated 'sword' (μάχαιρα) can also refer to a shorter
      blade, such as a dagger or short sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ νῦν
  chosen: But now
  alternatives:
  - But as it is now
  - But now indeed
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding instructions in context; 'But
    now' is natural English and preserves the adversative force of ἀλλά with the temporal
    νῦν.
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - whoever has
  - the man who has
  lexicon: BDAG
  rationale: The articular participle is rendered generically. 'The one who has' preserves
    the singular representative force without unnecessarily specifying gender.
- source_word: βαλλάντιον
  chosen: money bag
  alternatives:
  - purse
  - money pouch
  lexicon: BDAG
  rationale: Refers to a bag for carrying money. 'Money bag' is clearer for modern
    readers than 'purse,' which can mislead in contemporary English.
- source_word: ἀράτω
  chosen: take it
  alternatives:
  - pick it up
  - carry it
  lexicon: BDAG
  rationale: Aorist imperative of αἴρω here means to take or carry along. 'Take it'
    is concise and idiomatic in this travel-preparation context.
- source_word: ὁμοίως καὶ πήραν
  chosen: and likewise a travel bag
  alternatives:
  - and likewise a bag
  - and also a knapsack
  lexicon: BDAG
  rationale: πήρα denotes a traveler's bag or knapsack. 'Travel bag' communicates
    function in accessible modern English; 'likewise' preserves ὁμοίως.
- source_word: ὁ μὴ ἔχων
  chosen: the one who does not have one
  alternatives:
  - whoever does not have
  - the one who has none
  lexicon: BDAG
  rationale: The ellipsis is supplied in English with 'one' to indicate the implied
    object, most naturally the sword mentioned by the following command. This avoids
    awkwardness while preserving the Greek's concise structure.
- source_word: πωλησάτω
  chosen: sell
  alternatives:
  - let him sell
  lexicon: BDAG
  rationale: Imperative force is already conveyed by the clause structure in English.
    'Sell' is the straightforward lexical equivalent.
- source_word: τὸ ἱμάτιον αὐτοῦ
  chosen: his cloak
  alternatives:
  - his outer garment
  - his robe
  lexicon: BDAG
  rationale: ἱμάτιον commonly refers to an outer garment or cloak. 'Cloak' is idiomatic
    and preserves the sense of a significant personal garment.
- source_word: ἀγορασάτω
  chosen: buy
  alternatives:
  - purchase
  - let him buy
  lexicon: BDAG
  rationale: Simple commercial verb; 'buy' is the natural modern equivalent.
- source_word: μάχαιραν
  chosen: a sword
  alternatives:
  - a dagger
  - a short sword
  lexicon: BDAG
  rationale: μάχαιρα can denote a relatively short sword or large knife, but 'sword'
    remains the standard and sufficiently broad rendering in this context. More specific
    options risk overprecision beyond what the Greek requires.
