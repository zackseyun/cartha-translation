theological_decisions:
- issue: Whether Jesus' command about buying a sword should be translated in a way
    that softens or intensifies its literal force.
  chosen_reading: Render the command literally as 'buy a sword' without interpretive
    softening.
  alternative_readings:
  - buy a weapon
  - prepare for danger figuratively
  rationale: The Greek explicitly uses μάχαιρα and gives direct imperatives. Translation
    should preserve the wording and leave broader interpretive questions to exegesis
    rather than importing a doctrinal stance on violence or metaphor into the text
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
