id: LUK.22.1
reference: Luke 22:1
source:
  edition: SBLGNT
  text: Ἤγγιζεν δὲ ἡ ἑορτὴ τῶν ἀζύμων ἡ λεγομένη Πάσχα.
translation:
  text: Now the Feast of Unleavened Bread, which is called Passover, was drawing near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Passover and the Feast of Unleavened Bread were closely related observances
      and could be referred to together or by overlapping names in Jewish usage.
    reason: cultural_note
lexical_decisions:
- source_word: Ἤγγιζεν
  chosen: was drawing near
  alternatives:
  - was approaching
  - came near
  lexicon: BDAG
  rationale: Imperfect tense indicates an ongoing or imminent approach rather than
    a simple punctiliar event. 'Was drawing near' is natural modern English and preserves
    the aspect better than a simple past like 'approached.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here functions as a mild discourse transition. 'Now' signals narrative
    movement in readable English without overstating contrast.
- source_word: ἑορτὴ
  chosen: Feast
  alternatives:
  - festival
  lexicon: BDAG
  rationale: ἑορτή denotes a religious festival/feast. 'Feast' is idiomatic in biblical
    English and fits the established expression 'Feast of Unleavened Bread.'
- source_word: τῶν ἀζύμων
  chosen: of Unleavened Bread
  alternatives:
  - of the Unleavened Bread
  - of Unleavened Loaves
  lexicon: BDAG
  rationale: The genitive phrase names the Jewish festival. 'Unleavened Bread' is
    the standard and clear English rendering for ἄζυμα in this context.
- source_word: ἡ λεγομένη
  chosen: which is called
  alternatives:
  - called
  - the one called
  lexicon: BDAG
  rationale: The participial construction identifies the feast by another name. 'Which
    is called' preserves the explanatory force in smooth English.
- source_word: Πάσχα
  chosen: Passover
  alternatives:
  - Pascha
  lexicon: BDAG
  rationale: πάσχα refers to Passover, the Jewish festival. The standard English equivalent
    is preferable to transliteration here because it is a festival name, not a personal
    name.
