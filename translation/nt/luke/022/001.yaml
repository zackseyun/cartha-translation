theological_decisions:
- issue: Relationship between 'the Feast of Unleavened Bread' and 'Passover'
  chosen_reading: 'Render both expressions as Luke''s explanatory identification of
    the festival period: ''the Feast of Unleavened Bread, which is called Passover.'''
  alternative_readings:
  - Treat 'Passover' as strictly distinct from the Feast of Unleavened Bread and translate
    more rigidly to emphasize a chronological distinction
  rationale: Luke's wording presents an explanatory apposition from the narrator's
    perspective, reflecting common first-century usage in which the terms could overlap
    for the broader festival period. The translation preserves Luke's phrasing without
    forcing a harmonization or a technical distinction beyond what the text itself
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
