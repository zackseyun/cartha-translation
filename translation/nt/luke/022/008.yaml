theological_decisions:
- issue: Referent of 'the Passover'
  chosen_reading: Rendered as 'the Passover' without specifying beyond the text whether
    this denotes the meal as a whole or a narrower sacrificial element.
  alternative_readings:
  - the Passover meal
  - the Passover lamb
  rationale: The verse concerns preparation for eating, which strongly suggests the
    meal, but the Greek term itself can carry a broader range in context. The translation
    preserves the source term's breadth while remaining clear in English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
