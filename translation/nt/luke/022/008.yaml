id: LUK.22.8
reference: Luke 22:8
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν Πέτρον καὶ Ἰωάννην εἰπών· Πορευθέντες ἑτοιμάσατε ἡμῖν τὸ πάσχα
    ἵνα φάγωμεν.
translation:
  text: And he sent Peter and John, saying, “Go and prepare the Passover for us, so
    that we may eat it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover meal'; the Greek can refer to Passover more broadly, though
      here the context of preparation and eating points to the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: The aorist of ἀποστέλλω straightforwardly means 'sent.' 'Dispatched'
    is possible but sounds overly formal in modern English. 'Sent' preserves the narrative
    simplicity and can naturally take the direct objects 'Peter and John.'
- source_word: εἰπών
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of Jesus' speech. 'Saying' preserves
    the participial linkage to the main verb, while remaining natural English. 'And
    said' is also idiomatic, but 'saying' better reflects the Greek structure without
    awkwardness.
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - After going
  - Go on your way
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having gone'), in this command
    context it functions idiomatically as an attendant circumstance or preliminary
    command. English 'Go' best captures the force in natural speech. 'After going'
    is too wooden, and 'Go on your way' adds nuance not required by the text.
- source_word: ἑτοιμάσατε
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: BDAG
  rationale: The imperative calls for practical preparation. 'Prepare' is clear, direct,
    and suitably neutral. 'Make ready' is slightly archaic; 'get ready' is too colloquial
    and could imply preparing themselves rather than the meal.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - for us all
  lexicon: BDAG
  rationale: 'The dative indicates benefit: they are to prepare it for Jesus and the
    group. ''For us'' is sufficient and does not over-specify. ''For us all'' is interpretively
    possible but adds emphasis not explicit in the Greek.'
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  - the Passover lamb
  lexicon: BDAG
  rationale: πάσχα can refer to Passover broadly, the meal, or associated sacrificial
    elements depending on context. Here the immediate context of preparation for eating
    supports the meal, but 'the Passover' is the most faithful and idiomatic rendering,
    allowing the context to supply the meal sense without narrowing the term too much.
- source_word: ἵνα φάγωμεν
  chosen: so that we may eat it
  alternatives:
  - that we may eat
  - so we can eat
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'So that we may eat it' clearly
    conveys purpose and makes explicit in English the implied object of eating, namely
    the Passover. 'That we may eat' is slightly less natural in contemporary English,
    while 'so we can eat' is somewhat more colloquial.
