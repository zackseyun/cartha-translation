id: LUK.22.20
reference: Luke 22:20
source:
  edition: SBLGNT
  text: ⸄καὶ τὸ ποτήριον ὡσαύτως⸅ μετὰ τὸ δειπνῆσαι, λέγων· Τοῦτο τὸ ποτήριον ἡ καινὴ
    διαθήκη ἐν τῷ αἵματί μου, τὸ ὑπὲρ ὑμῶν ἐκχυννόμενον]⸃.
translation:
  text: And likewise the cup after supper, saying, “This cup is the new covenant in
    my blood, which is poured out for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the new testament in my blood.'
    reason: alternative_reading
  - marker: b
    text: The Greek wording places 'which is poured out for you' after the whole clause;
      the sense is most naturally that Jesus' blood is poured out for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποτήριον
  chosen: cup
  alternatives:
  - chalice
  lexicon: BDAG
  rationale: Standard, natural rendering for the drinking vessel; 'chalice' is more
    ecclesiastical and imports liturgical tradition not required by the Greek.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Retains the connection with the preceding action while remaining idiomatic
    in English.
- source_word: μετὰ τὸ δειπνῆσαι
  chosen: after supper
  alternatives:
  - after they had eaten
  - after the meal
  lexicon: BDAG
  rationale: Compresses the articular infinitive into natural English while preserving
    temporal sequence.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Keeps the participial linkage of the Greek without overcomplicating the
    English.
- source_word: καινὴ
  chosen: new
  alternatives:
  - fresh
  lexicon: BDAG
  rationale: In covenantal context, 'new' is the established and semantically appropriate
    rendering.
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - testament
  lexicon: BDAG
  rationale: In biblical and Jewish theological context, διαθήκη refers to a covenantal
    arrangement rather than a last will; 'covenant' best preserves the OT background
    and Jesus' allusion.
- source_word: ἐν τῷ αἵματί μου
  chosen: in my blood
  alternatives:
  - by my blood
  - with my blood
  lexicon: BDAG
  rationale: A formally close rendering that preserves the sacrificial/covenantal
    idiom without prematurely interpreting the preposition beyond what the Greek states.
- source_word: τὸ ὑπὲρ ὑμῶν ἐκχυννόμενον
  chosen: which is poured out for you
  alternatives:
  - that is being poured out on your behalf
  - which is poured out on behalf of you
  lexicon: BDAG
  rationale: Treats the neuter participial phrase as referring most naturally to 'blood'
    within the covenant formula, while producing clear English. 'For you' captures
    ὑπὲρ with representative/sacrificial force without over-specifying substitution
    theory.
