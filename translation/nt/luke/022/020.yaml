theological_decisions:
- issue: Rendering διαθήκη in Eucharistic/covenantal context
  chosen_reading: new covenant
  alternative_readings:
  - new testament
  rationale: The immediate context evokes covenant-establishing blood language and
    OT covenant background; 'covenant' is theologically and lexically preferable in
    contemporary English. 'Testament' is preserved as an alternative because of historical
    translation tradition.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological weight without importing tradition.'
- issue: Referent of the participle ἐκχυννόμενον
  chosen_reading: attached in sense to 'my blood' within the clause, rendered in English
    as 'which is poured out for you'
  alternative_readings:
  - attached more directly to 'cup' in a strictly formal reading
  rationale: Although the syntax places the participle after the whole predicate,
    the sense in context is that Jesus' blood is poured out, not the vessel itself.
    English naturally expresses the intended sacrificial reference by rendering the
    relative clause after 'my blood' conceptually, while leaving the wording concise.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve beyond the text.'
