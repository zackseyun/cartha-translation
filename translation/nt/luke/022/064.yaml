id: LUK.22.64
reference: Luke 22:64
source:
  edition: SBLGNT
  text: καὶ περικαλύψαντες ⸂αὐτὸν ἐπηρώτων⸃ λέγοντες· Προφήτευσον, τίς ἐστιν ὁ παίσας
    σε;
translation:
  text: And after covering him, they kept asking, saying, “Prophesy! Who is the one
    who struck you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “after blindfolding him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: περικαλύψαντες
  chosen: after covering him
  alternatives:
  - after blindfolding him
  - having covered him
  lexicon: BDAG
  rationale: The participle denotes covering over or veiling. 'Covering him' stays
    close to the Greek without specifying the exact means, while naturally implying
    obstruction of sight in context. 'Blindfolding him' is possible but slightly more
    interpretive than the verb itself warrants.
- source_word: ἐπηρώτων
  chosen: they kept asking
  alternatives:
  - they were questioning
  - they asked
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or continued action. 'Kept asking'
    captures the iterative force better than simple past 'asked.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle introduces the content of their taunt. 'Saying' is idiomatic
    and sufficiently reflects the Greek participial construction without overloading
    the English.
- source_word: Προφήτευσον
  chosen: Prophesy!
  alternatives:
  - Prophesy for us!
  - Tell us as a prophet!
  lexicon: BDAG
  rationale: The aorist imperative is a mocking command. 'Prophesy!' is the most direct
    rendering and preserves the irony aimed at Jesus' prophetic identity.
- source_word: τίς ἐστιν ὁ παίσας σε
  chosen: Who is the one who struck you?
  alternatives:
  - Who is it that hit you?
  - Who was the one who struck you?
  lexicon: BDAG
  rationale: 'The articular participle ὁ παίσας functions substantivally: ''the one
    who struck you.'' ''Struck'' is slightly more formal and forceful than ''hit,''
    fitting the scene and preserving the verbal sense of παίω.'
