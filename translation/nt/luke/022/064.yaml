theological_decisions:
- issue: Whether to make explicit that Jesus was blindfolded
  chosen_reading: Retain the broader wording 'covering him' in the main text
  alternative_readings:
  - blindfolding him
  rationale: The context clearly implies obstruction of sight, but the Greek verb
    itself means to cover or veil. To avoid importing more specificity than the source
    text states, the main text keeps the broader expression while preserving the common
    interpretive rendering in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
