id: LUK.22.46
reference: Luke 22:46
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Τί καθεύδετε; ἀναστάντες προσεύχεσθε, ἵνα μὴ εἰσέλθητε εἰς
    πειρασμόν.
translation:
  text: And he said to them, “Why are you sleeping? Get up and pray, so that you may
    not enter into temptation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “testing” or “trial.” The Greek word can refer to temptation in the sense
      of enticement to sin, or more broadly to a time of testing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: In this interrogative idiom with a present indicative verb ('Τί καθεύδετε;'),
    English idiom is best captured by 'Why are you sleeping?' rather than the more
    wooden 'What are you sleeping?' or 'Why sleep?'. This reflects the rebuking force
    of the question.
- source_word: καθεύδετε
  chosen: are you sleeping
  alternatives:
  - do you sleep
  - sleep
  lexicon: BDAG
  rationale: Present active indicative, second plural. The progressive English form
    sounds most natural in context and conveys the ongoing action Jesus confronts.
- source_word: ἀναστάντες
  chosen: Get up
  alternatives:
  - Having arisen
  - Rise
  lexicon: BDAG
  rationale: Aorist participle used imperativally before the main imperative. 'Get
    up' communicates the force in natural English better than the overly formal 'having
    arisen,' while preserving the call to stand from sleep.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Present middle imperative, second plural. 'Pray' is the standard imperative
    rendering; the present aspect may imply ongoing prayer, but English imperative
    usage normally leaves that implicit unless emphasis is required.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  - in order that ... not
  lexicon: BDAG
  rationale: This conjunction plus negation expresses purpose with negative result
    avoided. 'So that you may not' is clear modern English and preserves the purposive
    sense.
- source_word: εἰσέλθητε εἰς
  chosen: enter into
  alternatives:
  - enter
  - come into
  lexicon: BDAG
  rationale: The verb with εἰς naturally yields 'enter into.' Retaining 'into' preserves
    the directional nuance and echoes common biblical phrasing without sounding archaic.
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός can denote temptation, testing, or trial. In this immediate
    context of vigilance and prayer against moral/spiritual failure, 'temptation'
    is the most fitting main-text rendering. The broader semantic range is worth preserving
    in a footnote.
