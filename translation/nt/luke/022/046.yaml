theological_decisions:
- issue: Meaning of πειρασμόν in Jesus' warning
  chosen_reading: temptation
  alternative_readings:
  - testing
  - trial
  rationale: The verse warns the disciples to pray so as not to succumb when confronted
    by spiritual danger. 'Temptation' best captures the likely sense in context, while
    not denying that the Greek term can also include the idea of testing or trial.
    The translation preserves the broader range in a footnote rather than narrowing
    the theology beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
