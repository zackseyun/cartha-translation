theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this context the term is clearly titular and bound to Jewish messianic
    expectation. The doctrine excerpt directs that Christological titles be translated,
    with Χριστός rendered 'Messiah' where context supports title usage.
