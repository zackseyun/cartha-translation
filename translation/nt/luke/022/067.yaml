id: LUK.22.67
reference: Luke 22:67
source:
  edition: SBLGNT
  text: λέγοντες· Εἰ σὺ εἶ ὁ χριστός, εἰπὸν ἡμῖν. εἶπεν δὲ αὐτοῖς· Ἐὰν ὑμῖν εἴπω οὐ
    μὴ πιστεύσητε·
translation:
  text: saying, “If you are the Messiah, tell us.” But he said to them, “If I tell
    you, you will certainly not believe;”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: Present participle introducing the content of the council's speech; 'saying'
    is concise and natural in English while preserving the participial linkage to
    the preceding narrative.
- source_word: Εἰ σὺ εἶ
  chosen: If you are
  alternatives:
  - Are you
  lexicon: BDAG
  rationale: 'Retains the explicit conditional form of the Greek rather than smoothing
    into a direct question. The construction reflects their challenge: ''If you are
    the Messiah, tell us.'''
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' rather than
    transliterated 'Christ,' preserving the Jewish messianic sense in this interrogation
    context.
- source_word: εἰπὸν ἡμῖν
  chosen: tell us
  alternatives:
  - say to us
  lexicon: BDAG
  rationale: Imperative of λέγω with dative object is idiomatically rendered 'tell
    us' in modern English; this preserves force without wooden phrasing.
- source_word: εἶπεν δὲ αὐτοῖς
  chosen: But he said to them
  alternatives:
  - And he said to them
  lexicon: BDAG
  rationale: δέ here marks mild contrast or transition; 'But' fits the adversative
    sense as Jesus responds to their demand.
- source_word: Ἐὰν ὑμῖν εἴπω
  chosen: If I tell you
  alternatives:
  - If I should tell you
  lexicon: BDAG
  rationale: Third-class conditional with aorist subjunctive; 'If I tell you' is standard
    English and preserves the conditional force.
- source_word: οὐ μὴ πιστεύσητε
  chosen: you will certainly not believe
  alternatives:
  - you will by no means believe
  - you will not believe
  lexicon: BDAG
  rationale: οὐ μή with subjunctive is emphatic negation. 'Will certainly not believe'
    communicates the strong force in clear modern English without archaic wording.
