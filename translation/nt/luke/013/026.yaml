theological_decisions:
- issue: Nature of the speakers' appeal to Jesus
  chosen_reading: The translation preserves their claim of outward association with
    Jesus without implying true saving relationship.
  alternative_readings:
  - A looser rendering could imply accepted fellowship or covenantal recognition.
  rationale: The verse presents the speakers' defense based on proximity ('ate and
    drank in your presence' and 'you taught in our streets'), not a declaration that
    Jesus acknowledges them. The wording should preserve that tension and not import
    theological validation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
