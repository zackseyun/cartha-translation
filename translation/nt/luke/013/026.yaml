id: LUK.13.26
reference: Luke 13:26
source:
  edition: SBLGNT
  text: τότε ἄρξεσθε λέγειν· Ἐφάγομεν ἐνώπιόν σου καὶ ἐπίομεν, καὶ ἐν ταῖς πλατείαις
    ἡμῶν ἐδίδαξας·
translation:
  text: Then you will begin to say, ‘We ate and drank in your presence, and you taught
    in our streets.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in our public squares'; the Greek can refer to broad streets or open
      public places within a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the discourse; 'Then' is the natural
    concise English equivalent.
- source_word: ἄρξεσθε λέγειν
  chosen: you will begin to say
  alternatives:
  - you will start saying
  - you will say
  lexicon: BDAG
  rationale: 'Future middle of ἄρχω with complementary infinitive λέγειν is best represented
    explicitly as ingressive: ''will begin to say.'' Rendering simply ''will say''
    would lose the aspectual nuance.'
- source_word: Ἐφάγομεν
  chosen: We ate
  alternatives:
  - We have eaten
  lexicon: BDAG
  rationale: Aorist indicative in direct speech is naturally rendered as simple past
    in English.
- source_word: ἐνώπιόν σου
  chosen: in your presence
  alternatives:
  - before you
  - in front of you
  lexicon: BDAG
  rationale: Idiomatic expression indicating personal proximity/association rather
    than merely spatial position; 'in your presence' is clear modern English and fits
    the appeal being made.
- source_word: ἐπίομεν
  chosen: drank
  alternatives:
  - have drunk
  lexicon: BDAG
  rationale: Paired with 'ate' as a simple past aorist, preserving the ordinary shared-meal
    sense.
- source_word: ἐν ταῖς πλατείαις ἡμῶν
  chosen: in our streets
  alternatives:
  - in our public squares
  - in our broad streets
  lexicon: BDAG
  rationale: πλατεῖα commonly refers to broad streets or public thoroughfares/open
    streets in a town. 'In our streets' is natural English and preserves the public,
    local setting. 'Public squares' is possible but too specific here.
- source_word: ἐδίδαξας
  chosen: you taught
  alternatives:
  - you were teaching
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past. The point is the historical
    fact of Jesus' public teaching among them.
