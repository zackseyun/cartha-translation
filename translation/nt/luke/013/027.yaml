id: LUK.13.27
reference: Luke 13:27
source:
  edition: SBLGNT
  text: καὶ ἐρεῖ ⸀λέγων ὑμῖν· Οὐκ ⸀οἶδα πόθεν ἐστέ· ἀπόστητε ἀπ’ ἐμοῦ, πάντες ⸀ἐργάται ἀδικίας.
translation:
  text: And he will say to you, ‘I do not know where you are from. Depart from me, all you workers of unrighteousness.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where you come from.'
    reason: lexical_alternative
  - marker: b
    text: Or 'workers of lawlessness' or 'workers of wrongdoing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'say, telling you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐρεῖ
  chosen: he will say
  alternatives:
  - he will tell
  - he will declare
  lexicon: BDAG
  rationale: Future of λέγω; 'say' is the most natural and direct English rendering in this speech-introduction context.
- source_word: λέγων
  chosen: telling
  alternatives:
  - saying
  lexicon: BDAG
  rationale: The participle is somewhat redundant with ἐρεῖ. Rendering it as 'telling' preserves the Greek's explicit participial form without collapsing it entirely, while still sounding acceptable in English. A smoother translation could omit it, but retaining it better reflects the source.
- source_word: οἶδα
  chosen: I do not know
  alternatives:
  - I do not recognize
  lexicon: BDAG
  rationale: οἶδα normally means 'know.' In context it conveys disavowal of relationship or recognition, but 'I do not know' preserves the wording most transparently.
- source_word: πόθεν ἐστέ
  chosen: where you are from
  alternatives:
  - where you come from
  lexicon: BDAG
  rationale: πόθεν denotes origin/source. 'Where you are from' is idiomatic modern English and preserves the sense of origin.
- source_word: ἀπόστητε ἀπ’ ἐμοῦ
  chosen: Depart from me
  alternatives:
  - Go away from me
  - Stand away from me
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίσταμαι calls for decisive separation. 'Depart from me' is both idiomatic and weighty, and echoes established biblical diction without being archaic.
- source_word: πάντες
  chosen: all you
  alternatives:
  - all
  lexicon: BDAG
  rationale: Vocative force with ἐργάται is naturally brought out in English by 'all you,' making the address explicit.
- source_word: ἐργάται
  chosen: workers
  alternatives:
  - laborers
  - doers
  lexicon: BDAG
  rationale: '''Workers'' best matches the noun''s sense of those who practice or carry out something.'
- source_word: ἀδικίας
  chosen: unrighteousness
  alternatives:
  - lawlessness
  - evil
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδικία most directly denotes unrighteousness/injustice/wrongdoing. 'Unrighteousness' preserves the moral-theological force and lexical connection to δικαιοσύνη-family language better than the more interpretive 'lawlessness.'
