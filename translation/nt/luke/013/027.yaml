theological_decisions:
- issue: Rendering ἀδικίας in a judgment saying
  chosen_reading: unrighteousness
  alternative_readings:
  - lawlessness
  - wrongdoing
  rationale: The phrase ἐργάται ἀδικίας can be rendered in several idiomatic ways. 'Unrighteousness' best preserves the lexical force of ἀδικία without importing the more specific concept of νόμος implied by 'lawlessness.' This keeps the condemnation broad and morally charged while avoiding over-interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 5
revisions:
- timestamp: '2026-04-21T03:37:54Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/013/027.json
  category: awkward_english
  tier: 1
  from: say, telling you
  to: say to you
  rationale: The Greek construction ἐρεῖ λέγων (future of 'say' + present participle 'saying') is often pleonastic, where the participle reinforces the main verb. In English, rendering both 'say' and 'telling' creates a slightly redundant and less natural phrasing. While the drafter's aim to preserve the participial form is noted, an optimal-equivalence approach would typically integrate the participle's function into the main verb or omit it for smoother English, especially when it doesn't add distinct semantic content. 'He will say to you' or 'He will tell you' would be more idiomatic and equally faithful to the meaning of introducing direct speech to an audience.
