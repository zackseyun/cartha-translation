theological_decisions:
- issue: Gender rendering of ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Greek explicitly uses ἄνθρωπος in the singular masculine for a character
    within the parable. Per doctrine, gender-accurate rendering is preferred over
    neutralizing language when the source presents a masculine figure.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagery of δένδρον in the mustard-seed parable
  chosen_reading: tree
  alternative_readings:
  - large plant
  - shrub
  rationale: The Greek text says δένδρον, 'tree.' Even if botanically hyperbolic or
    stylized, the translation should preserve the wording and the parable's imagery
    rather than reduce it to a more botanically cautious term.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
