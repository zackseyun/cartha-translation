id: LUK.13.19
reference: Luke 13:19
source:
  edition: SBLGNT
  text: ὁμοία ἐστὶν κόκκῳ σινάπεως, ὃν λαβὼν ἄνθρωπος ἔβαλεν εἰς κῆπον ἑαυτοῦ, καὶ
    ηὔξησεν καὶ ἐγένετο εἰς ⸀δένδρον, καὶ τὰ πετεινὰ τοῦ οὐρανοῦ κατεσκήνωσεν ἐν τοῖς
    κλάδοις αὐτοῦ.
translation:
  text: It is like a mustard seed, which a man took and threw into his garden, and
    it grew and became a tree, and the birds of the sky nested in its branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of heaven' or traditionally 'the birds of the air.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'became a tree,' preserving the parable's enlarged image
      of growth.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία ἐστὶν
  chosen: It is like
  alternatives:
  - It is comparable to
  - It is similar to
  lexicon: BDAG
  rationale: Standard simile formula in kingdom parables. 'It is like' is natural
    modern English and preserves the comparison without overformal wording.
- source_word: κόκκῳ σινάπεως
  chosen: a mustard seed
  alternatives:
  - a grain of mustard
  - a mustard grain
  lexicon: BDAG
  rationale: κόκκος can mean 'grain' or 'seed'; in English the idiomatic expression
    for the plant's small seed is 'mustard seed.' This best matches common usage while
    remaining accurate.
- source_word: ὃν λαβὼν ἄνθρωπος
  chosen: which a man took
  alternatives:
  - which someone took
  lexicon: BDAG
  rationale: The masculine singular ἄνθρωπος is retained as 'a man' in keeping with
    the gender-accurate policy. Here it refers to an individual male figure in the
    parable, not generic humanity.
- source_word: ἔβαλεν εἰς κῆπον ἑαυτοῦ
  chosen: threw into his garden
  alternatives:
  - put into his garden
  - sowed in his garden
  lexicon: BDAG
  rationale: βάλλω is literally 'throw/cast/put.' 'Threw into' preserves the vividness
    of the Greek better than the smoother 'put.' 'Sowed' is interpretive and not the
    verb used here. κῆπος is specifically 'garden,' not merely 'field.'
- source_word: ηὔξησεν
  chosen: it grew
  alternatives:
  - it increased
  - it grew up
  lexicon: BDAG
  rationale: Simple intransitive growth sense; 'it grew' is the most natural rendering
    in context.
- source_word: ἐγένετο εἰς δένδρον
  chosen: became a tree
  alternatives:
  - became into a tree
  lexicon: BDAG
  rationale: Idiomatic English for γίνομαι + εἰς. The wording preserves the surprising
    enlargement emphasized in the parable.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the birds of the air
  lexicon: BDAG
  rationale: A literal but natural rendering. 'Of the sky' closely reflects τοῦ οὐρανοῦ
    here in a non-theological, spatial sense. 'Birds of the air' is traditional but
    less directly tied to the Greek noun.
- source_word: κατεσκήνωσεν
  chosen: nested
  alternatives:
  - settled
  - made their nests
  - dwelt
  lexicon: BDAG
  rationale: The verb denotes settling or encamping; with birds and branches, 'nested'
    communicates the image clearly in idiomatic English. Although the Greek verb is
    singular with a neuter plural subject, English requires a plural verbal sense.
- source_word: ἐν τοῖς κλάδοις αὐτοῦ
  chosen: in its branches
  alternatives:
  - among its branches
  - in its boughs
  lexicon: BDAG
  rationale: κλάδοις means branches/boughs. 'In its branches' is straightforward and
    natural; 'its' refers back to the mustard plant/tree.
