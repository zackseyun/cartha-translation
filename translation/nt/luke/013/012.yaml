theological_decisions:
- issue: Nature of the woman's condition in ἀσθένεια
  chosen_reading: Render broadly as 'weakness' rather than narrowly as 'sickness'
    or 'disability.'
  alternative_readings:
  - sickness
  - infirmity
  - disability
  rationale: The immediate context involves a physical affliction, yet the Greek term
    itself is broader. A broader rendering preserves the text's wording without importing
    a modern diagnostic category or reducing the term to one specific medical sense.
  doctrine_reference: Translation philosophy §1, §5
