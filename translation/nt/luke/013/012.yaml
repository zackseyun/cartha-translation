id: LUK.13.12
reference: Luke 13:12
source:
  edition: SBLGNT
  text: ἰδὼν δὲ αὐτὴν ὁ Ἰησοῦς προσεφώνησεν καὶ εἶπεν αὐτῇ· Γύναι, ἀπολέλυσαι τῆς
    ἀσθενείας σου,
translation:
  text: But when Jesus saw her, he called to her and said, “Woman, you have been freed
    from your weakness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have been released from your infirmity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω, naturally rendered as a temporal participle
    in English: ''when Jesus saw her.'' This is smoother than a more wooden ''having
    seen'' while preserving the sequence.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative progression with mild contrast or development. 'But'
    fits the scene transition and keeps the discourse movement without overstating
    contrast.
- source_word: προσεφώνησεν
  chosen: he called to her
  alternatives:
  - he addressed her
  - he called out
  lexicon: BDAG
  rationale: προσφωνέω means to address or call to someone. 'Called to her' captures
    the initiative and public verbal summons more vividly than the flatter 'addressed
    her.'
- source_word: εἶπεν αὐτῇ
  chosen: and said
  alternatives:
  - and said to her
  lexicon: BDAG
  rationale: The dative object is already represented by the prior clause 'he called
    to her,' so 'and said' is sufficient in idiomatic English without loss of meaning.
- source_word: Γύναι
  chosen: Woman
  alternatives:
  - Madam
  - Dear woman
  lexicon: BDAG
  rationale: Vocative γύναι is a respectful form of address. 'Woman' is the most direct
    and consistent rendering, while alternatives like 'Madam' add a social nuance
    not explicit in the Greek and 'Dear woman' imports affection not stated.
- source_word: ἀπολέλυσαι
  chosen: you have been freed
  alternatives:
  - you are released
  - you have been released
  - you are set free
  lexicon: BDAG
  rationale: Perfect passive indicative of ἀπολύω emphasizes a completed act with
    present result. 'You have been freed' preserves both the passive sense and the
    resulting state. 'Released' is possible, but 'freed' better suits liberation from
    affliction.
- source_word: τῆς ἀσθενείας σου
  chosen: from your weakness
  alternatives:
  - from your sickness
  - from your infirmity
  - from your disability
  lexicon: BDAG
  rationale: ἀσθένεια can denote weakness, illness, or infirmity. Here the context
    is a debilitating physical condition, but 'weakness' closely reflects the Greek's
    broader semantic range and avoids over-specifying beyond the term itself.
