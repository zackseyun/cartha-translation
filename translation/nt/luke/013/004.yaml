theological_decisions:
- issue: Meaning of ὀφειλέται in this context
  chosen_reading: debtors
  alternative_readings:
  - sinners
  - worse offenders
  rationale: Jesus's wording in this verse differs from the previous verse's explicit
    'sinners.' Rendering ὀφειλέται as 'debtors' preserves the metaphor of moral indebtedness
    without collapsing it into an interpretive synonym. This also preserves theological
    tension rather than resolving it.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Rendering of ἀνθρώπους
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The Greek term can denote human beings generally, but the doctrine calls
    for gender-accurate rendering rather than automatic neutralization. Because the
    referent is the inhabitants of Jerusalem generally, 'people' is a viable alternative
    worth preserving in a footnote; however, the main text keeps the more formally
    aligned 'men.'
  doctrine_reference: 'Translation philosophy #4'
