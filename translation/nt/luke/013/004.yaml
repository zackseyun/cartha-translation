id: LUK.13.4
reference: Luke 13:4
source:
  edition: SBLGNT
  text: ἢ ἐκεῖνοι οἱ ⸀δεκαοκτὼ ἐφ’ οὓς ἔπεσεν ὁ πύργος ἐν τῷ Σιλωὰμ καὶ ἀπέκτεινεν
    αὐτούς, δοκεῖτε ὅτι ⸀αὐτοὶ ὀφειλέται ἐγένοντο παρὰ πάντας ⸀τοὺς ἀνθρώπους τοὺς
    ⸀κατοικοῦντας Ἰερουσαλήμ;
translation:
  text: Or those eighteen on whom the tower in Siloam fell and killed them—do you
    think that they became debtors beyond all the men living in Jerusalem?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sinners' or 'worse offenders' for 'debtors'; the Greek uses ὀφειλέται,
      literally 'debtors,' likely in a moral sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the people living in Jerusalem.' The Greek ἀνθρώπους can refer to
      human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or again
  - Or what about
  lexicon: BDAG
  rationale: Introduces an alternative example in Jesus's continuing argument; simple
    'Or' preserves the rhetorical flow from the previous verse.
- source_word: ἐκεῖνοι οἱ δεκαοκτώ
  chosen: those eighteen
  alternatives:
  - those eighteen men
  - the eighteen
  lexicon: BDAG
  rationale: Natural English rendering of the demonstrative + article + numeral construction.
    'Men' is not explicit in Greek and is therefore omitted.
- source_word: ἐφ’ οὓς
  chosen: on whom
  alternatives:
  - upon whom
  lexicon: BDAG
  rationale: Retains the relative construction with ἐπί in idiomatic but still fairly
    formal English.
- source_word: ἔπεσεν ὁ πύργος
  chosen: the tower ... fell
  alternatives:
  - the tower collapsed
  lexicon: BDAG
  rationale: The Greek says literally 'the tower fell'; 'collapsed' is possible but
    slightly more interpretive. The more direct wording better reflects the source.
- source_word: ἐν τῷ Σιλωὰμ
  chosen: in Siloam
  alternatives:
  - at Siloam
  lexicon: BDAG
  rationale: A straightforward transliteration of the place name with the preposition
    rendered simply. 'In Siloam' is sufficiently natural and close to the Greek.
- source_word: ἀπέκτεινεν αὐτούς
  chosen: killed them
  alternatives:
  - put them to death
  lexicon: BDAG
  rationale: Plain narrative sense; 'put them to death' would sound too agentive/judicial
    for an accidental disaster.
- source_word: δοκεῖτε ὅτι
  chosen: do you think that
  alternatives:
  - do you suppose that
  lexicon: BDAG
  rationale: Standard rendering of the question formula, preserving Jesus's direct
    challenge.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic in Greek, but English does not require
    explicit emphasis here; the contrast is already clear from context.
- source_word: ὀφειλέται
  chosen: debtors
  alternatives:
  - sinners
  - offenders
  - guilty ones
  lexicon: BDAG
  rationale: The noun literally denotes debtors/those under obligation. In this context
    it can imply moral liability before God, but translating it as 'sinners' would
    import interpretation from the parallel in v. 2 rather than preserve Luke's distinct
    wording here.
- source_word: ἐγένοντο
  chosen: became
  alternatives:
  - were
  - proved to be
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι is best represented by 'became,' preserving
    the verbal idea rather than flattening it to a stative 'were.'
- source_word: παρὰ πάντας τοὺς ἀνθρώπους
  chosen: beyond all the men
  alternatives:
  - worse than all the people
  - more than all the others
  lexicon: BDAG
  rationale: παρά with the accusative here marks comparison/excess. 'Beyond all the
    men' keeps the comparative force while staying close to the Greek. 'Men' reflects
    ἀνθρώπους in a gender-accurate way only if the referent is specifically male,
    but here the sense may be generic; see footnote for alternative.
- source_word: τοὺς κατοικοῦντας Ἰερουσαλήμ
  chosen: living in Jerusalem
  alternatives:
  - dwelling in Jerusalem
  - who live in Jerusalem
  lexicon: BDAG
  rationale: Present participle rendered idiomatically in English. 'Living in Jerusalem'
    is natural modern English and preserves the ongoing resident sense.
