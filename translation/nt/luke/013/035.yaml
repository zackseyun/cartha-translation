theological_decisions:
- issue: Referent of 'your house'
  chosen_reading: Kept as 'your house' in the main text without specifying the temple
    or Jerusalem
  alternative_readings:
  - the temple
  - Jerusalem
  - the nation/house of Israel
  rationale: The context of Jesus' lament over Jerusalem strongly suggests a corporate
    referent, likely centered on Jerusalem and its temple. However, the Greek expression
    itself is simply 'your house,' and the translation philosophy forbids importing
    a narrower doctrinal or interpretive claim into the main text where the wording
    is broader. The likely referent is best left implicit in the text and can be noted
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of the final quotation
  chosen_reading: Rendered as a future condition without specifying whether this is
    repentance by Jerusalem, the triumphal entry, or eschatological recognition
  alternative_readings:
  - reference to the triumphal entry
  - reference to a future repentance of Jerusalem/Israel
  - reference to eschatological acknowledgment at Jesus' return
  rationale: The verse's wording allows multiple interpretive horizons. To preserve
    theological tension rather than resolve it, the translation keeps the wording
    broad and does not encode one eschatological scheme in the main text.
  doctrine_reference: Translation philosophy §3
