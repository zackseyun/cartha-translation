id: LUK.13.35
reference: Luke 13:35
source:
  edition: SBLGNT
  text: ἰδοὺ ἀφίεται ὑμῖν ὁ οἶκος ⸀ὑμῶν. λέγω ⸀δὲ ⸀ὑμῖν, οὐ μὴ ⸂ἴδητέ με⸃ ἕως ⸂ἥξει
    ὅτε⸃ εἴπητε· Εὐλογημένος ὁ ἐρχόμενος ἐν ὀνόματι κυρίου.
translation:
  text: Look, your house is left to you. But I tell you, you will certainly not see
    me until the time comes when you say, ‘Blessed is the one who comes in the name
    of the Lord.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is abandoned' or 'is forsaken.' The Greek passive can carry a judicial
      sense of being given over.
    reason: lexical_alternative
  - marker: b
    text: '''Your house'' likely refers to Jerusalem, especially its temple, but the
      Greek says simply ''your house.'''
    reason: alternative_reading
  - marker: c
    text: The saying 'Blessed is the one who comes in the name of the Lord' echoes
      Psalm 118:26.
    reason: cross_reference
  - marker: d
    text: Some interpreters understand this as pointing to Jesus' triumphal entry;
      others to a future acknowledgment of him. The Greek itself does not require
      one specific timing.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  lexicon: BDAG
  rationale: Introduces a solemn declaration with attention-getting force. 'Look'
    preserves the deictic force in readable modern English; 'Behold' is more traditional
    but archaic for the stated translation philosophy.
- source_word: ἀφίεται
  chosen: is left
  alternatives:
  - is abandoned
  - is forsaken
  lexicon: BDAG
  rationale: The present passive indicates that the house is being left/abandoned.
    'Is left' is concise and preserves the passive without over-interpreting the exact
    nuance. 'Abandoned' or 'forsaken' are possible but slightly more interpretive
    and rhetorically heightened.
- source_word: ὁ οἶκος ὑμῶν
  chosen: your house
  alternatives:
  - your household
  - your temple
  - your desolate house
  lexicon: BDAG
  rationale: Literally 'your house.' In context it likely refers corporately to Jerusalem
    and especially the temple establishment, but the Greek itself says 'house.' 'Temple'
    would import an interpretation into the main text; 'desolate' reflects a textual
    tradition in Matthew and some manuscripts, not the SBLGNT reading here.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Retains the dative relation in a straightforward way. The phrase 'left
    to you' can carry an ironic/judicial sense without adding words not present in
    the Greek.
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I tell you
  - For I tell you
  lexicon: BDAG
  rationale: δέ here marks transition/continuation with mild contrast. 'But' fits
    the movement from pronouncement to consequence in idiomatic English.
- source_word: οὐ μὴ ἴδητέ με
  chosen: you will certainly not see me
  alternatives:
  - you will by no means see me
  - you shall certainly not see me
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation about the future.
    'Will certainly not' communicates the emphatic force in natural modern English.
- source_word: ἕως ἥξει ὅτε
  chosen: until the time comes when
  alternatives:
  - until it comes when
  - until when
  lexicon: BDAG
  rationale: This idiom is awkward if rendered too literally. 'Until the time comes
    when' captures the temporal sense of ἕως + future ἥξει + ὅτε in clear English.
- source_word: εἴπητε
  chosen: you say
  alternatives:
  - you will say
  lexicon: BDAG
  rationale: After 'until the time comes when,' English idiom normally uses present
    'you say' even though the Greek aorist subjunctive points to a future event. This
    is an optimal-equivalence smoothing rather than a change in meaning.
- source_word: Εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Standard rendering in citation-like blessing formulas. It preserves the
    scriptural resonance of Psalm 118:26 and Synoptic usage.
- source_word: ὁ ἐρχόμενος
  chosen: the one who comes
  alternatives:
  - he who comes
  - the coming one
  lexicon: BDAG
  rationale: The substantival participle is best represented by 'the one who comes'
    in contemporary English. 'He who comes' is more formal/traditional; 'the coming
    one' could suggest a title more strongly than the immediate phrase requires.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - in the Lord's name
  lexicon: BDAG
  rationale: This preserves the recognizable biblical formula. κύριος is rendered
    'Lord' per the project's default for Kyrios.
