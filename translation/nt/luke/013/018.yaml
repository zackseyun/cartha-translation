id: LUK.13.18
reference: Luke 13:18
source:
  edition: SBLGNT
  text: Ἔλεγεν ⸀οὖν· Τίνι ὁμοία ἐστὶν ἡ βασιλεία τοῦ θεοῦ, καὶ τίνι ὁμοιώσω αὐτήν;
translation:
  text: So he was saying, “What is the kingdom of God like, and to what shall I compare
    it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the reign of God,” emphasizing God's rule rather than a realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or iterative speech in the narrative;
    'he was saying' preserves that aspect better than the simple past, while remaining
    natural English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: Τίνι ... ὁμοία ἐστὶν
  chosen: What is ... like
  alternatives:
  - To what is ... similar
  - What does ... resemble
  lexicon: BDAG
  rationale: This idiom asks for a comparison. 'What is ... like' is the most idiomatic
    English equivalent and preserves the interrogative comparison.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and sufficiently transparent rendering
    of the phrase. ''Reign of God'' highlights dynamic rule but is less conventional
    and not required by the immediate context.'
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two parallel questions.
- source_word: τίνι ὁμοιώσω αὐτήν
  chosen: to what shall I compare it
  alternatives:
  - to what should I compare it
  - what shall I liken it to
  lexicon: BDAG
  rationale: Future indicative ὁμοιώσω is well represented by 'shall I compare.' This
    preserves the deliberative rhetorical force and reads naturally in English. 'Liken'
    is more formal/archaic.
