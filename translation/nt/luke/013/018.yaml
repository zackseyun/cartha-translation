theological_decisions:
- issue: Rendering βασιλεία τοῦ θεοῦ
  chosen_reading: the kingdom of God
  alternative_readings:
  - the reign of God
  rationale: The phrase can denote both realm and reign. 'Kingdom of God' preserves
    the established biblical expression and the metaphorical field used in Jesus'
    parables, while not foreclosing the dynamic sense of God's rule.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
