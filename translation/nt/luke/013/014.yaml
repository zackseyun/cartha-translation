id: LUK.13.14
reference: Luke 13:14
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ ἀρχισυνάγωγος, ἀγανακτῶν ὅτι τῷ σαββάτῳ ἐθεράπευσεν ὁ Ἰησοῦς,
    ἔλεγεν τῷ ὄχλῳ ⸀ὅτι Ἓξ ἡμέραι εἰσὶν ἐν αἷς δεῖ ἐργάζεσθαι· ἐν ⸀αὐταῖς οὖν ἐρχόμενοι
    θεραπεύεσθε καὶ μὴ τῇ ἡμέρᾳ τοῦ σαββάτου.
translation:
  text: But the synagogue ruler answered, indignant because Jesus had healed on the
    Sabbath, and was saying to the crowd, “There are six days in which it is necessary
    to work; so come on those days and be healed, and not on the day of the Sabbath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'There are six days when work should be done; come
      on those days and be healed, not on the Sabbath day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces a reply. 'Answered'
    is idiomatic in English and preserves the discourse function.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding healing scene; 'But' best
    conveys the adversative turn.
- source_word: ἀρχισυνάγωγος
  chosen: synagogue ruler
  alternatives:
  - leader of the synagogue
  - synagogue official
  lexicon: BDAG
  rationale: The term denotes the person overseeing synagogue affairs. 'Synagogue
    ruler' is concise and standard without implying civil authority.
- source_word: ἀγανακτῶν
  chosen: indignant
  alternatives:
  - angry
  - resentful
  lexicon: BDAG
  rationale: The participle expresses strong displeasure. 'Indignant' captures moralized
    offense better than the flatter 'angry.'
- source_word: ὅτι τῷ σαββάτῳ ἐθεράπευσεν ὁ Ἰησοῦς
  chosen: because Jesus had healed on the Sabbath
  alternatives:
  - because Jesus healed on the Sabbath
  lexicon: BDAG
  rationale: ὅτι here is causal, 'because.' The aorist ἐθεράπευσεν refers to the prior
    event; English past perfect naturally marks that prior action relative to his
    speaking.
- source_word: ἐθεράπευσεν
  chosen: had healed
  alternatives:
  - had cured
  lexicon: BDAG
  rationale: θεραπεύω in Luke regularly refers to healing. 'Healed' is the most natural
    and broadly understandable rendering.
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'Was saying' preserves
    the imperfective aspect without overinterpreting repetition.
- source_word: τῷ ὄχλῳ
  chosen: to the crowd
  alternatives:
  - to the people
  - to the multitude
  lexicon: BDAG
  rationale: ὄχλος in Luke commonly denotes the gathered crowd. 'Crowd' is natural
    modern English.
- source_word: Ἓξ ἡμέραι εἰσὶν ἐν αἷς δεῖ ἐργάζεσθαι
  chosen: There are six days in which it is necessary to work
  alternatives:
  - There are six days on which one ought to work
  - There are six days when work should be done
  lexicon: BDAG
  rationale: This keeps the structure of the Greek relatively closely. δεῖ conveys
    necessity/obligation; 'it is necessary' preserves that force more formally than
    'should.'
- source_word: δεῖ
  chosen: it is necessary
  alternatives:
  - one ought
  - it must be
  lexicon: BDAG
  rationale: δεῖ often expresses necessity or obligation. Here it reflects the ruler's
    normative claim about proper days for work.
- source_word: ἐργάζεσθαι
  chosen: to work
  alternatives:
  - to do work
  lexicon: BDAG
  rationale: Simple infinitive meaning 'to work'; no need to expand unless clarifying,
    and the context already concerns Sabbath work.
- source_word: ἐν αὐταῖς οὖν
  chosen: so come on those days
  alternatives:
  - therefore on those days
  - then on those days
  lexicon: BDAG
  rationale: The prepositional phrase plus inferential οὖν is rendered idiomatically
    with the implied motion from the following participle. This avoids awkward literalism
    while preserving the logic.
- source_word: ἐρχόμενοι
  chosen: come
  alternatives:
  - coming
  lexicon: BDAG
  rationale: The participle is attendant to the imperative-like θεραπεύεσθε. In English,
    an imperative 'come' communicates the force naturally.
- source_word: θεραπεύεσθε
  chosen: be healed
  alternatives:
  - receive healing
  - be cured
  lexicon: BDAG
  rationale: Present passive/deponent imperative/plural here is best rendered as a
    command to seek healing. 'Be healed' is idiomatic and matches the passive sense
    heard by English readers.
- source_word: καὶ μὴ τῇ ἡμέρᾳ τοῦ σαββάτου
  chosen: and not on the day of the Sabbath
  alternatives:
  - and not on the Sabbath day
  lexicon: BDAG
  rationale: This preserves the emphatic contrast and the genitival construction.
    Slightly more formal wording reflects the ruler's pointed prohibition.
- source_word: σαββάτῳ / σαββάτου
  chosen: Sabbath
  alternatives:
  - Sabbath day
  lexicon: BDAG
  rationale: Standard rendering for σάββατον in this context; no doctrinally contested
    issue here.
