theological_decisions:
- issue: Rendering the ruler's statement about proper days for work and healing
  chosen_reading: 'Translate his words as a human rule-bound objection without endorsing
    it: ''There are six days in which it is necessary to work; so come on those days
    and be healed.'''
  alternative_readings:
  - A looser paraphrase emphasizing hypocrisy
  - A more wooden rendering that obscures the rebuke's force
  rationale: The verse reports the synagogue ruler's perspective, not divine endorsement.
    The translation preserves his claim and tone without importing later theological
    commentary; this aligns with preserving the text's tension and not adding doctrinal
    conclusions the verse itself does not state.
  doctrine_reference: Translation philosophy items 1 and 3
