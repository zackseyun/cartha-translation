theological_decisions:
- issue: Narrative direction of Jesus' journey to Jerusalem
  chosen_reading: toward Jerusalem
  alternative_readings:
  - to Jerusalem
  rationale: The verse functions as part of Luke's larger travel narrative and emphasizes
    Jesus' ongoing progress rather than arrival. This is a translational, not doctrinal,
    decision; it preserves the narrative tension without importing further theological
    claims.
  doctrine_reference: Translation philosophy §3, §6
