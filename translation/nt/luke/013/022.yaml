id: LUK.13.22
reference: Luke 13:22
source:
  edition: SBLGNT
  text: Καὶ διεπορεύετο κατὰ πόλεις καὶ κώμας διδάσκων καὶ πορείαν ποιούμενος εἰς
    ⸀Ἱεροσόλυμα.
translation:
  text: And he was traveling through towns and villages, teaching and making his way
    toward Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to Jerusalem."
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύετο
  chosen: was traveling through
  alternatives:
  - went through
  - journeyed through
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing movement through various places. 'Was
    traveling through' captures the progressive sense better than a simple past 'went
    through.'
- source_word: κατὰ πόλεις καὶ κώμας
  chosen: through towns and villages
  alternatives:
  - from city to city and village to village
  - through cities and villages
  lexicon: BDAG
  rationale: κατά with the accusative here expresses movement through or across places
    distributively. 'Towns and villages' is natural modern English and preserves the
    distinction between larger and smaller settlements.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  lexicon: BDAG
  rationale: Present participle describing attendant activity during the journey.
    'Teaching' keeps the concise participial force without over-paraphrasing.
- source_word: πορείαν ποιούμενος
  chosen: making his way
  alternatives:
  - journeying
  - going on his way
  - traveling
  lexicon: BDAG
  rationale: This idiom literally means 'making a journey/way.' 'Making his way' is
    idiomatic English that preserves the sense of purposeful progress without awkward
    literalism.
- source_word: εἰς Ἱεροσόλυμα
  chosen: toward Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: BDAG
  rationale: Although εἰς often means 'to,' in this travel-summary context with the
    participial construction it can naturally denote direction toward the destination
    rather than immediate arrival. 'Toward Jerusalem' preserves the narrative sense
    of ongoing movement in Luke's travel section.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names rather than translate them.
