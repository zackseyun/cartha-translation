id: LUK.13.10
reference: Luke 13:10
source:
  edition: SBLGNT
  text: Ἦν δὲ διδάσκων ἐν μιᾷ τῶν συναγωγῶν ἐν τοῖς σάββασιν.
translation:
  text: Now he was teaching in one of the synagogues on the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the Sabbaths'; the Greek uses a plural form that commonly functions
      idiomatically for the singular 'Sabbath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now he was
  alternatives:
  - And he was
  - Now he was
  lexicon: BDAG
  rationale: The imperfect of εἰμί with διδάσκων forms a periphrastic imperfect, indicating
    ongoing past action ('was teaching'). δέ is rendered 'Now' to mark narrative transition
    in natural English without over-translating as a strong adversative.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: The present participle in periphrastic construction conveys continuous
    action. 'Teaching' is the standard and most natural rendering for διδάσκω in Gospel
    narrative.
- source_word: ἐν μιᾷ τῶν συναγωγῶν
  chosen: in one of the synagogues
  alternatives:
  - in one of the meeting places
  lexicon: BDAG
  rationale: The partitive expression literally means 'in one of the synagogues.'
    'Synagogue' is retained rather than generalized, since it names a specific Jewish
    institution and setting.
- source_word: ἐν τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  lexicon: BDAG
  rationale: Although σάββασιν is morphologically plural, in Koine usage it often
    functions idiomatically as a singular reference to the Sabbath day. English normally
    renders this as singular here. The plural alternative is preserved in a footnote
    for auditability.
