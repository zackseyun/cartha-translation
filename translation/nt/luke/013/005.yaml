id: LUK.13.5
reference: Luke 13:5
source:
  edition: SBLGNT
  text: οὐχί, λέγω ὑμῖν, ἀλλ’ ἐὰν μὴ ⸀μετανοῆτε πάντες ⸀ὡσαύτως ἀπολεῖσθε.
translation:
  text: No, I tell you; but unless you change your thinking, you will all likewise perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the same way perish.' The Greek likewise may point to a comparable
      kind of judgment in light of the preceding examples.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχί
  chosen: 'No'
  alternatives:
  - Certainly not
  - No indeed
  lexicon: BDAG
  rationale: A direct negative reply to the implied question from the preceding context.
    'No' is the most natural modern English equivalent and preserves the emphatic
    denial without sounding stilted.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common Lukan formula. 'I tell you' is idiomatic modern English while
    remaining close to the Greek.
- source_word: ἀλλ’ ἐὰν μὴ
  chosen: but unless
  alternatives:
  - but if not
  - but except if
  lexicon: BDAG
  rationale: This combination introduces a strong conditional exception. 'But unless'
    best captures the adversative turn and the conditional force in natural English.
- source_word: μετανοῆτε
  chosen: you change your thinking
  alternatives:
  - you change your mind
  - you turn back
  lexicon: BDAG
  rationale: μετανοέω in this context denotes repentance before God, not merely an
    intellectual change of mind. 'Repent' is the established and accurate theological
    term, concise and faithful to the warning context.
- source_word: πάντες
  chosen: you will all
  alternatives:
  - all of you
  - you all
  lexicon: BDAG
  rationale: Placed with the future verb in English to preserve the inclusive scope
    of the warning. 'You will all' is natural and keeps the emphasis on universality.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: ὡσαύτως can mean 'likewise' or 'in the same way.' 'Likewise' preserves
    the compactness of the Greek and echoes the comparison with the preceding examples,
    while leaving the exact nuance broad enough to match the context.
- source_word: ἀπολεῖσθε
  chosen: perish
  alternatives:
  - be destroyed
  - die
  lexicon: BDAG
  rationale: Future middle of ἀπόλλυμι here conveys ruin/destruction. 'Perish' is
    the best concise English equivalent because it preserves the gravity of the warning
    without reducing it merely to physical death.
