theological_decisions:
- issue: Meaning of repentance in Jesus' warning
  chosen_reading: Render μετανοῆτε as 'repent' without narrowing it to either mere
    inward remorse or a full doctrinal account of conversion.
  alternative_readings:
  - change your minds
  - turn back
  rationale: The verse issues a solemn call to repentance, but the Greek term should
    not be flattened into either purely emotional sorrow or a later systematic formulation.
    'Repent' preserves the biblical-theological weight and leaves the full scope of
    the term intact.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of ὡσαύτως ἀπολεῖσθε
  chosen_reading: Translate as 'likewise perish' and preserve that this refers to
    a comparable kind of judgment without over-specifying whether the comparison is
    manner, certainty, or suddenness.
  alternative_readings:
  - perish in the same way
  - die likewise
  rationale: The context compares the hearers with those mentioned in the preceding
    incidents, but the exact dimension of the comparison is not fully explicit. The
    translation should preserve the warning's tension rather than resolve it too narrowly.
  doctrine_reference: Translation philosophy §3
