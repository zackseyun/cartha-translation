id: LUK.13.23
reference: Luke 13:23
source:
  edition: SBLGNT
  text: εἶπεν δέ τις αὐτῷ· Κύριε, εἰ ὀλίγοι οἱ σῳζόμενοι; ὁ δὲ εἶπεν πρὸς αὐτούς·
translation:
  text: And someone said to him, “Lord, are only a few being saved?” And he said to
    them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “are few those who are being saved?”
    reason: lexical_alternative
  - marker: b
    text: “Lord” could also be understood as “Sir” in terms of respectful address;
      the Greek leaves the full force of the title open here.
    reason: alternative_reading
lexical_decisions:
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: Used as a mild connective advancing the narrative. 'And' is natural modern
    English and preserves the flow without overstating contrast.
- source_word: τις
  chosen: someone
  alternatives:
  - a certain person
  - someone or other
  lexicon: BDAG
  rationale: Indefinite pronoun referring to an unspecified individual. 'Someone'
    is idiomatic and sufficiently indefinite.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek; translating it as 'to him' preserves
    the text without importing the referent's name into this verse.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In Luke this address can carry
    either respectful or higher christological force; 'Lord' preserves that ambiguity
    better than 'Sir' or 'Master'.
- source_word: εἰ
  chosen: are
  alternatives:
  - whether there are
  lexicon: BDAG
  rationale: In this direct question, εἰ introduces an indirect-like inquiry best
    rendered in natural English as 'are only a few...?' rather than the more wooden
    'whether there are only a few...?'.
- source_word: ὀλίγοι
  chosen: only a few
  alternatives:
  - few
  - just a few
  lexicon: BDAG
  rationale: The adjective denotes small number. 'Only a few' captures the restrictive
    force naturally in English within the question.
- source_word: οἱ σῳζόμενοι
  chosen: being saved
  alternatives:
  - those who are being saved
  - saved
  lexicon: BDAG
  rationale: Present passive participle with article, literally 'the ones being saved.'
    'Being saved' preserves the ongoing/passive aspect while remaining idiomatic after
    'a few.'
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to those people
  lexicon: BDAG
  rationale: Standard rendering of πρός with accusative after a speech verb here.
    'Them' reflects the plural pronoun and leaves the referent as given by the text.
