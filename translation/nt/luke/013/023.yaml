theological_decisions:
- issue: Force of κύριε as address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The address may be polite, honorific, or christologically weighty. Rendering
    it 'Lord' follows the project's default for κύριος and preserves the theological
    openness of Luke's usage without flattening it to mere politeness.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological
    tension rather than resolve it.'
- issue: Aspect of σῳζόμενοι
  chosen_reading: being saved
  alternative_readings:
  - saved
  - those who are being saved
  rationale: The present participle suggests an ongoing state/process rather than
    a simple completed result. 'Being saved' preserves that verbal aspect without
    importing a specific soteriological system.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it.'
