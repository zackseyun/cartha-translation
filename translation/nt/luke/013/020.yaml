theological_decisions:
- issue: Rendering βασιλεία in a saying about God's rule
  chosen_reading: the kingdom of God
  alternative_readings:
  - the reign of God
  rationale: The phrase denotes God's kingly rule and realm. 'Kingdom of God' best
    preserves the canonical wording and semantic range without collapsing it into
    only dynamic rule. No doctrinally contested term from the table is involved, so
    no footnote is required, but the alternative is documented for auditability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
