id: LUK.13.20
reference: Luke 13:20
source:
  edition: SBLGNT
  text: ⸀Καὶ πάλιν εἶπεν· Τίνι ὁμοιώσω τὴν βασιλείαν τοῦ θεοῦ;
translation:
  text: And again he said, “To what shall I compare the kingdom of God?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Also
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without
    adding temporal nuance beyond the Greek.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - further
  lexicon: BDAG
  rationale: Adverb indicating repetition; 'again' is the most natural and direct
    rendering in modern English.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he spoke
  lexicon: BDAG
  rationale: Aorist of λέγω in narrative commonly introduces direct speech; 'he said'
    is idiomatic and sufficiently formal.
- source_word: Τίνι
  chosen: To what
  alternatives:
  - With what
  - To whom
  lexicon: BDAG
  rationale: Dative interrogative neuter singular here asks for a point of comparison,
    not a person. 'To what' fits the comparative construction with ὁμοιώσω.
- source_word: ὁμοιώσω
  chosen: shall I compare
  alternatives:
  - may I compare
  - will I liken
  lexicon: BDAG
  rationale: Future active indicative first singular of ὁμοιόω. In English rhetorical
    questions of this kind are naturally rendered with 'shall I compare,' which conveys
    deliberative force without woodenly preserving the future form.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering of βασιλεία with genitive τοῦ θεοῦ.
    'Kingdom of God' preserves the established biblical phrase and its semantic breadth;
    'reign of God' is possible but narrower and less idiomatic here.
