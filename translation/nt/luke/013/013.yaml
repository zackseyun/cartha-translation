theological_decisions:
- issue: Rendering the healing result described by ἀνωρθώθη
  chosen_reading: 'A physical restoration: ''she was made straight again'''
  alternative_readings:
  - she stood upright
  - she was straightened
  rationale: The immediate context concerns a woman bent over and unable to straighten
    herself. The chosen wording reflects a bodily healing without importing additional
    doctrinal claims about the mechanism of healing.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
