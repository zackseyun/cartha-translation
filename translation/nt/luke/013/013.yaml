id: LUK.13.13
reference: Luke 13:13
source:
  edition: SBLGNT
  text: καὶ ἐπέθηκεν αὐτῇ τὰς χεῖρας· καὶ παραχρῆμα ἀνωρθώθη, καὶ ἐδόξαζεν τὸν θεόν.
translation:
  text: And he laid his hands on her, and immediately she was made straight again,
    and she glorified God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she stood upright' or 'she was straightened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέθηκεν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: From ἐπιτίθημι, in the idiom ἐπιτίθημι τὰς χεῖρας, the natural English
    rendering is 'laid ... hands on.' This preserves the concrete action without paraphrase.
- source_word: αὐτῇ
  chosen: on her
  alternatives:
  - upon her
  lexicon: BDAG
  rationale: Dative pronoun governed by the idiom with ἐπιτίθημι; English requires
    'on her' to express the object of touch clearly.
- source_word: τὰς χεῖρας
  chosen: his hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: Greek commonly uses the article where English prefers a possessive in
    body-part expressions. 'His hands' is idiomatic and clearly refers back to Jesus
    as subject.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb denotes something happening at once. 'Immediately' is clear,
    natural, and preserves the suddenness of the healing.
- source_word: ἀνωρθώθη
  chosen: was made straight again
  alternatives:
  - was straightened
  - stood upright
  - was restored upright
  lexicon: BDAG
  rationale: Passive of ἀνορθόω in context refers to the bent-over woman being restored
    to an upright condition. 'Was made straight again' captures both the passive sense
    and the reversal of her prior condition, while avoiding over-interpretation beyond
    the text.
- source_word: ἐδόξαζεν
  chosen: glorified
  alternatives:
  - was glorifying
  - praised
  lexicon: BDAG
  rationale: Imperfect of δοξάζω indicates ongoing or inceptive response after healing.
    'Glorified' preserves the theological weight of giving glory to God better than
    the flatter 'praised.' English narrative style can represent the imperfect simply
    here without awkwardness.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἐδόξαζεν; standard rendering is 'God.'
