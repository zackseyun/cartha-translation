  from: There will be weeping there, and gnashing of teeth
  to: There will be weeping and gnashing of teeth there
  rationale: The placement of the locative 'there' (translating ἐκεῖ) after 'weeping' but before 'and gnashing of teeth' is awkward and could imply it only applies to 'weeping.' Moving it to the end of the clause clarifies that it applies to both 'weeping and gnashing of teeth,' even though the repetition with the existential 'there' remains.
- timestamp: '2026-04-21T03:37:54Z'
  adjudicator: auto_apply_tier1
