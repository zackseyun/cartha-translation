  category: awkward_english
  tier: 1
  from: being thrown outside
  to: being thrown out
  rationale: While grammatically correct, 'thrown outside' is less idiomatic in English than 'thrown out' or 'cast out' when referring to expulsion. The adverb 'out' already implies 'outside' in this context, making 'outside' somewhat redundant and slightly awkward. This aligns with optimal equivalence by choosing a more natural English idiom.
