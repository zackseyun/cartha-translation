id: LUK.13.28
reference: Luke 13:28
source:
  edition: SBLGNT
  text: ἐκεῖ ἔσται ὁ κλαυθμὸς καὶ ὁ βρυγμὸς τῶν ὀδόντων, ὅταν ⸀ὄψησθε Ἀβραὰμ καὶ Ἰσαὰκ
    καὶ Ἰακὼβ καὶ πάντας τοὺς προφήτας ἐν τῇ βασιλείᾳ τοῦ θεοῦ, ὑμᾶς δὲ ἐκβαλλομένους
    ἔξω.
translation:
  text: There will be weeping there, and gnashing of teeth, when you see Abraham and
    Isaac and Jacob and all the prophets in the kingdom of God, but you yourselves
    being thrown outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being cast out outside.' The Greek participle ἐκβαλλομένους with ἔξω
      emphasizes forcible exclusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Locative adverb pointing to the place of exclusion/judgment; 'there'
    is natural and sufficiently direct.
- source_word: κλαυθμὸς
  chosen: weeping
  alternatives:
  - wailing
  lexicon: BDAG
  rationale: Standard rendering in this Matthean/Lukan judgment formula; 'weeping'
    is idiomatic and avoids overstating the term beyond the Greek.
- source_word: βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: Established and accurate idiom for the expression of anguish and rage
    in judgment contexts.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the aorist subjunctive ὄψησθε, this introduces the circumstance
    in which the stated result occurs; 'when' fits the specific future scene.
- source_word: ὄψησθε
  chosen: you see
  alternatives:
  - you will see
  lexicon: BDAG
  rationale: Although future in sense, the subjunctive after ὅταν is naturally rendered
    in English as 'when you see.' This preserves idiomatic English while retaining
    the future-oriented event.
- source_word: πάντας τοὺς προφήτας
  chosen: all the prophets
  lexicon: BDAG
  rationale: Straightforward rendering of the accusative phrase; 'all' is retained
    for emphasis.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - in God's kingdom
  lexicon: BDAG
  rationale: Formal and familiar rendering that preserves the key biblical phrase
    βασιλεία τοῦ θεοῦ.
- source_word: ὑμᾶς δὲ
  chosen: but you yourselves
  alternatives:
  - but you
  - while you
  lexicon: BDAG
  rationale: δέ marks contrast, and the explicit pronoun ὑμᾶς is emphatic; 'yourselves'
    brings out the force without adding new content.
- source_word: ἐκβαλλομένους
  chosen: being thrown
  alternatives:
  - being cast out
  - being driven out
  lexicon: BDAG
  rationale: Present passive participle describing the hearers' state/action in contrast
    to the patriarchs and prophets. 'Thrown' preserves the force of ἐκβάλλω better
    than the softer 'sent out.'
- source_word: ἔξω
  chosen: outside
  alternatives:
  - out
  lexicon: BDAG
  rationale: Completes the exclusion imagery clearly and idiomatically in English.
