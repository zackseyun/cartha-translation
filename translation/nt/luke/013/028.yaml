theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Retain the concrete language of exclusion and anguish without softening
    or specifying beyond the text.
  alternative_readings:
  - Interpretive paraphrases such as 'deep sorrow' or 'final condemnation'
  rationale: The verse depicts exclusion from the kingdom and resulting anguish, but
    it does not itself define the full doctrine of final judgment. The translation
    therefore preserves the imagery rather than importing a fuller theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
