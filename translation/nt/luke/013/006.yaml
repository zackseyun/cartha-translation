id: LUK.13.6
reference: Luke 13:6
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ ταύτην τὴν παραβολήν. Συκῆν εἶχέν τις ⸂πεφυτευμένην ἐν τῷ ἀμπελῶνι
    αὐτοῦ⸃, καὶ ἦλθεν ζητῶν καρπὸν ἐν αὐτῇ καὶ οὐχ εὗρεν.
translation:
  text: 'And he was telling this parable: “A man had a fig tree planted in his vineyard,
    and he came looking for fruit on it and found none.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “someone had a fig tree planted in his vineyard.” The Greek indefinite
      pronoun can be rendered more generically, but “a man” best matches the parable’s
      narrative style.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was telling
  alternatives:
  - he said
  - he told
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or introductory narrative action; 'was
    telling' preserves the aspect better than simple past 'said,' while remaining
    natural in English narrative.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' preserves narrative continuity without
    overinterpreting the transition. An untranslated connective is possible in English,
    but retaining it reflects the Greek flow.
- source_word: παραβολήν
  chosen: parable
  alternatives:
  - illustration
  lexicon: BDAG
  rationale: '''Parable'' is the standard and contextually precise rendering for Jesus''
    figurative teaching story.'
- source_word: Συκῆν
  chosen: fig tree
  lexicon: BDAG
  rationale: The noun specifically denotes a fig tree, not merely figs in general.
- source_word: εἶχέν τις
  chosen: A man had
  alternatives:
  - Someone had
  - A certain man had
  lexicon: BDAG
  rationale: τις is indefinite. 'A man' is idiomatic and fits parabolic style in English.
    'A certain man' is more formal but slightly stilted here.
- source_word: πεφυτευμένην
  chosen: planted
  alternatives:
  - having been planted
  lexicon: BDAG
  rationale: Perfect passive participle indicates a tree in a planted state. English
    idiom is best served by the attributive 'planted,' which conveys the established
    condition without awkwardness.
- source_word: ἐν τῷ ἀμπελῶνι αὐτοῦ
  chosen: in his vineyard
  alternatives:
  - in his vine-garden
  lexicon: BDAG
  rationale: ἀμπελών is standardly 'vineyard.' The possessive αὐτοῦ is naturally rendered
    'his.'
- source_word: ἦλθεν ζητῶν
  chosen: he came looking for
  alternatives:
  - he came seeking
  - he came to look for
  lexicon: BDAG
  rationale: The aorist main verb with present participle expresses attendant action/purpose.
    'Came looking for' is natural modern English and preserves the sense of active
    search.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - produce
  lexicon: BDAG
  rationale: '''Fruit'' is the direct lexical equivalent and also preserves the metaphorical
    resonance that will matter in the parable''s development.'
- source_word: ἐν αὐτῇ
  chosen: on it
  alternatives:
  - in it
  lexicon: BDAG
  rationale: Although the preposition is ἐν ('in'), English idiom for fruit borne
    by a tree is 'on it.' This is an optimal-equivalence adjustment for naturalness
    while preserving meaning.
- source_word: οὐχ εὗρεν
  chosen: found none
  alternatives:
  - did not find any
  - found no fruit
  lexicon: BDAG
  rationale: '''Found none'' is concise, idiomatic, and clearly refers back to ''fruit''
    without unnecessary repetition.'
