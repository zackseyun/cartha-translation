theological_decisions:
- issue: Indefinite subject τις in a parable
  chosen_reading: A man
  alternative_readings:
  - Someone
  - A certain man
  rationale: The verse introduces a parabolic character without theological specification.
    'A man' preserves the ordinary human subject and matches common English storytelling
    style without adding interpretive weight.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
