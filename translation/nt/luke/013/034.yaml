id: LUK.13.34
reference: Luke 13:34
source:
  edition: SBLGNT
  text: Ἰερουσαλὴμ Ἰερουσαλήμ, ἡ ἀποκτείνουσα τοὺς προφήτας καὶ λιθοβολοῦσα τοὺς ἀπεσταλμένους
    πρὸς αὐτήν— ποσάκις ἠθέλησα ἐπισυνάξαι τὰ τέκνα σου ὃν τρόπον ὄρνις τὴν ἑαυτῆς
    νοσσιὰν ὑπὸ τὰς πτέρυγας, καὶ οὐκ ἠθελήσατε.
translation:
  text: Jerusalem, Jerusalem, the one killing the prophets and stoning those sent
    to her—how often I wanted to gather your children, the way a hen gathers her brood
    under her wings, and you were not willing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who kills ... and stones.' The Greek uses present participles, portraying
      Jerusalem by its characteristic treatment of God's messengers.
    reason: lexical_alternative
  - marker: b
    text: Or 'a bird ... her young.' The Greek ὄρνις can be more general than 'hen,'
      but the maternal image of gathering young under wings makes 'hen' the most natural
      rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλὴμ Ἰερουσαλήμ
  chosen: Jerusalem, Jerusalem
  lexicon: BDAG
  rationale: Standard transliteration of the place name; the repetition is retained
    to preserve the lamenting, emphatic address.
- source_word: ἡ ἀποκτείνουσα
  chosen: the one killing
  alternatives:
  - who kills
  - the one who kills
  lexicon: BDAG
  rationale: The article with present participle functions substantivally. 'The one
    killing' preserves the vivid participial force, while still reading naturally
    in English. It conveys characteristic action rather than a single event.
- source_word: τοὺς προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Straightforward rendering of προφήτας as 'prophets.' The article is retained.
- source_word: λιθοβολοῦσα
  chosen: stoning
  alternatives:
  - who stones
  lexicon: BDAG
  rationale: Present participle parallel to ἀποκτείνουσα; 'stoning' preserves the
    ongoing/characteristic portrayal and the rhetorical parallelism.
- source_word: τοὺς ἀπεσταλμένους πρὸς αὐτήν
  chosen: those sent to her
  alternatives:
  - those who have been sent to her
  - the ones sent to her
  lexicon: BDAG
  rationale: ἀπεσταλμένους is a perfect passive participle from ἀποστέλλω. 'Those
    sent to her' is natural English and preserves the passive sense without overloading
    the line.
- source_word: ποσάκις
  chosen: how often
  alternatives:
  - how many times
  lexicon: BDAG
  rationale: Idiomatic English equivalent in a lament context.
- source_word: ἠθέλησα
  chosen: I wanted
  alternatives:
  - I desired
  - I was willing
  lexicon: BDAG
  rationale: θέλω here expresses volition/desire. 'I wanted' is clear, natural, and
    preserves the personal pathos of the statement. 'Was willing' is possible but
    less idiomatic here.
- source_word: ἐπισυνάξαι
  chosen: to gather
  alternatives:
  - to gather together
  lexicon: BDAG
  rationale: The compound verb means to gather together, but English 'gather' already
    carries the sense adequately in this context. The fuller force is reflected by
    the image that follows.
- source_word: τὰ τέκνα σου
  chosen: your children
  alternatives:
  - your sons and daughters
  - your offspring
  lexicon: BDAG
  rationale: τέκνα is inclusive and naturally rendered 'children.' This fits both
    the metaphorical address to Jerusalem and readable modern English.
- source_word: ὃν τρόπον
  chosen: the way
  alternatives:
  - just as
  - in the way that
  lexicon: BDAG
  rationale: Natural comparative expression introducing the simile.
- source_word: ὄρνις
  chosen: a hen
  alternatives:
  - a bird
  - a fowl
  lexicon: BDAG
  rationale: Although ὄρνις can mean 'bird' more generally, the context of gathering
    young under wings strongly supports the specific maternal image 'hen,' which is
    the most natural and vivid English rendering.
- source_word: τὴν ἑαυτῆς νοσσιὰν
  chosen: her brood
  alternatives:
  - her chicks
  - her young
  lexicon: BDAG
  rationale: νοσσιά refers to a brood/nest of young birds. 'Her brood' preserves the
    collective sense better than 'her chicks,' while remaining natural in English.
- source_word: ὑπὸ τὰς πτέρυγας
  chosen: under her wings
  alternatives:
  - beneath her wings
  lexicon: BDAG
  rationale: Standard and vivid rendering of the protective image.
- source_word: καὶ οὐκ ἠθελήσατε
  chosen: and you were not willing
  alternatives:
  - and you did not want to
  - but you were not willing
  lexicon: BDAG
  rationale: The aorist of θέλω here contrasts Jesus' desire with Jerusalem's refusal.
    'You were not willing' preserves the volitional emphasis more clearly than the
    weaker 'did not want to.' The conjunction is kept as 'and' to reflect the Greek,
    though the adversative force is evident from context.
