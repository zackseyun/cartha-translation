theological_decisions:
- issue: Referent of 'your children' in the lament over Jerusalem
  chosen_reading: Rendered as 'your children' without specifying whether this means
    the city's inhabitants, its people more broadly, or especially those Jesus desired
    to gather within Jerusalem.
  alternative_readings:
  - the inhabitants of Jerusalem
  - the people belonging to Jerusalem/Israel represented by the city
  rationale: The Greek metaphorically addresses Jerusalem as a mother-city and speaks
    of 'your children.' The translation preserves that biblical personification and
    does not narrow the referent beyond what the text states, in keeping with the
    principle of preserving theological tension rather than resolving interpretive
    questions unnecessarily.
  doctrine_reference: Translation philosophy §3
- issue: Volitional contrast in θέλω / ἠθελήσατε
  chosen_reading: Used 'I wanted' and 'you were not willing' to preserve the text's
    emphasis on desire/will without importing a larger doctrinal conclusion about
    divine willing beyond the verse itself.
  alternative_readings:
  - I desired ... you did not want to
  - I was willing ... you were unwilling
  rationale: This verse is often drawn into broader theological debates about divine
    intention and human refusal. The translation keeps the explicit volitional language
    of the Greek while avoiding interpretive expansion not demanded by the verse.
  doctrine_reference: Affirmations; Translation philosophy §3
