theological_decisions:
- issue: Nature of the 'glorious things'
  chosen_reading: Render ἐνδόξοις broadly as 'glorious things' rather than specifying
    miracles.
  alternative_readings:
  - miraculous things
  - wonderful things
  rationale: The context involves a healing and public vindication of Jesus, but the
    adjective itself denotes what is glorious/splendid/honorable. A broader rendering
    preserves the text's wording without narrowing it to one category of act, while
    still allowing readers to infer miraculous deeds from context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Agency in ὑπ’ αὐτοῦ
  chosen_reading: Translate as 'by him.'
  alternative_readings:
  - through him
  rationale: The text straightforwardly attributes the deeds to Jesus' agency. Rendering
    'by him' reflects the Greek preposition and does not diminish orthodox Christology
    or import a more indirect instrumental sense not demanded by the syntax.
  doctrine_reference: Affirmations; Translation philosophy §1
