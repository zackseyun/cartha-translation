id: LUK.13.17
reference: Luke 13:17
source:
  edition: SBLGNT
  text: καὶ ταῦτα λέγοντος αὐτοῦ κατῃσχύνοντο πάντες οἱ ἀντικείμενοι αὐτῷ, καὶ πᾶς
    ὁ ὄχλος ἔχαιρεν ἐπὶ πᾶσιν τοῖς ἐνδόξοις τοῖς γινομένοις ὑπ’ αὐτοῦ.
translation:
  text: And as he was saying these things, all who were opposing him were put to shame,
    and the whole crowd was rejoicing over all the glorious things being done by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his opponents' for 'those who were opposing him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the wonderful things' or 'all the splendid things.' The Greek says
      'the glorious things,' a broad expression that can include his mighty deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῃσχύνοντο
  chosen: were put to shame
  alternatives:
  - were ashamed
  - were being humiliated
  lexicon: BDAG
  rationale: Imperfect passive/middle indicates an ongoing/resultative state as Jesus
    spoke. 'Were put to shame' preserves the passive sense and the public disgrace
    implied better than the weaker intransitive 'were ashamed.'
- source_word: οἱ ἀντικείμενοι αὐτῷ
  chosen: those who were opposing him
  alternatives:
  - his opponents
  - those set against him
  lexicon: BDAG
  rationale: The participle from ἀντίκειμαι denotes active opposition. 'Those who
    were opposing him' keeps the verbal force and ongoing aspect better than the more
    compressed nominal 'opponents.'
- source_word: πᾶς ὁ ὄχλος
  chosen: the whole crowd
  alternatives:
  - all the crowd
  - the entire multitude
  lexicon: BDAG
  rationale: Idiomatic English for the singular collective expression, preserving
    the sense that the crowd as a whole responded positively.
- source_word: ἔχαιρεν
  chosen: was rejoicing
  alternatives:
  - rejoiced
  - was glad
  lexicon: BDAG
  rationale: The imperfect suggests continued rejoicing rather than a simple punctiliar
    response. 'Was rejoicing' reflects that durative aspect.
- source_word: ἐπὶ πᾶσιν τοῖς ἐνδόξοις
  chosen: over all the glorious things
  alternatives:
  - at all the glorious things
  - because of all the splendid things
  lexicon: BDAG
  rationale: ἐπί with the dative here expresses the basis/object of rejoicing. 'Glorious
    things' preserves the adjective ἔνδοξος and leaves open both mighty acts and honorable
    deeds without over-specifying 'miracles.'
- source_word: τοῖς γινομένοις ὑπ’ αὐτοῦ
  chosen: being done by him
  alternatives:
  - that were happening through him
  - done by him
  lexicon: BDAG
  rationale: The present participle γινομένοις is rendered progressively as 'being
    done,' and ὑπό with genitive naturally indicates agency, 'by him.' This avoids
    importing a stronger instrumental nuance unless context requires it.
- source_word: ταῦτα λέγοντος αὐτοῦ
  chosen: as he was saying these things
  alternatives:
  - when he said these things
  - while he was saying these things
  lexicon: BDAG
  rationale: Genitive absolute with present participle is well represented by 'as
    he was saying these things,' preserving contemporaneous action and discourse flow.
