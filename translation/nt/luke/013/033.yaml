id: LUK.13.33
reference: Luke 13:33
source:
  edition: SBLGNT
  text: πλὴν δεῖ με σήμερον καὶ αὔριον καὶ τῇ ἐχομένῃ πορεύεσθαι, ὅτι οὐκ ἐνδέχεται
    προφήτην ἀπολέσθαι ἔξω Ἰερουσαλήμ.
translation:
  text: Nevertheless, I must go on my way today and tomorrow and the next day, because
    it is not possible for a prophet to perish outside Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it cannot be' or 'it is unthinkable' for a prophet to perish outside
      Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'today and tomorrow and the next day' may function idiomatically
      for a short, fixed course rather than specifying three literal calendar days.
    reason: cultural_note
lexical_decisions:
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - But
  - Yet
  - Except that
  lexicon: BDAG
  rationale: Marks a strong qualification or contrast with the preceding statement.
    'Nevertheless' preserves the adversative force in natural English better than
    the more abrupt 'but.'
- source_word: δεῖ με
  chosen: I must
  alternatives:
  - it is necessary for me
  - I have to
  lexicon: BDAG
  rationale: The impersonal verb δεῖ expresses necessity. 'I must' is idiomatic and
    preserves the sense of divine or compelling necessity without over-expanding it.
- source_word: σήμερον καὶ αὔριον καὶ τῇ ἐχομένῃ
  chosen: today and tomorrow and the next day
  alternatives:
  - today and tomorrow and on the following day
  - today and tomorrow and the day after
  lexicon: BDAG
  rationale: This sequence is temporal and likely idiomatic, indicating the immediate
    course ahead. 'The next day' is clear modern English and keeps the threefold progression
    explicit.
- source_word: πορεύεσθαι
  chosen: go on my way
  alternatives:
  - travel
  - go
  - continue on
  lexicon: BDAG
  rationale: πορεύομαι often means to go, travel, or proceed. 'Go on my way' fits
    the travel context and conveys continued movement better than the bare 'go.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the necessity just stated. 'Because' is the
    clearest contemporary English connector.
- source_word: οὐκ ἐνδέχεται
  chosen: it is not possible
  alternatives:
  - it cannot be
  - it is inadmissible
  - it is unthinkable
  lexicon: BDAG
  rationale: The expression denotes impossibility or incongruity. 'It is not possible'
    preserves the formal force without importing irony too strongly into the main
    text.
- source_word: προφήτην
  chosen: a prophet
  alternatives:
  - the prophet
  lexicon: BDAG
  rationale: 'Anarthrous singular is best rendered generically: ''a prophet.'' This
    preserves the proverbial character of the statement.'
- source_word: ἀπολέσθαι
  chosen: to perish
  alternatives:
  - to die
  - to be destroyed
  - to be killed
  lexicon: BDAG
  rationale: The aorist middle infinitive of ἀπόλλυμι can mean perish, be destroyed,
    or die. 'Perish' preserves the lexical range and solemn tone, while allowing the
    context of prophetic death to remain evident.
- source_word: ἔξω Ἰερουσαλήμ
  chosen: outside Jerusalem
  alternatives:
  - away from Jerusalem
  - beyond Jerusalem
  lexicon: BDAG
  rationale: A straightforward spatial expression. 'Outside Jerusalem' is the most
    natural and precise rendering.
