theological_decisions:
- issue: Force of Jesus' statement about a prophet perishing outside Jerusalem
  chosen_reading: Rendered as a statement of impossibility/incongruity without making
    it an absolute metaphysical claim.
  alternative_readings:
  - Rendered more idiomatically as 'surely no prophet can die outside Jerusalem' to
    emphasize irony
  - Rendered more historically as 'it is unthinkable' to stress rhetorical convention
  rationale: The Greek οὐκ ἐνδέχεται can express what is impossible, improper, or
    conventionally unthinkable. The translation preserves the wording of impossibility
    while leaving readers to hear the likely prophetic irony, rather than resolving
    the statement into either strict literalism or pure sarcasm.
  doctrine_reference: Preserve theological tension rather than resolve it.
