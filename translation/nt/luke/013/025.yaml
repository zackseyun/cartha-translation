theological_decisions:
- issue: Rendering κύριος in a parabolic address
  chosen_reading: Lord
  alternative_readings:
  - Master
  - Sir
  rationale: The project default for κύριος is 'Lord.' In this context the address
    is within a parable and could be rendered more generically, but retaining 'Lord'
    preserves lexical consistency and allows Luke's broader theological resonance
    without importing claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of οὐκ οἶδα ὑμᾶς πόθεν ἐστέ
  chosen_reading: I do not know where you are from
  alternative_readings:
  - I do not know you, where you are from
  - I do not know from where you come
  rationale: The Greek includes both the object 'you' and the clause 'where you are
    from.' Natural English often expresses the same sense without repeating the object.
    This is a stylistic compression, not a theological reduction; the exclusionary
    force remains intact.
