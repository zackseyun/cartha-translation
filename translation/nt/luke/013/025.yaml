id: LUK.13.25
reference: Luke 13:25
source:
  edition: SBLGNT
  text: ἀφ’ οὗ ἂν ἐγερθῇ ὁ οἰκοδεσπότης καὶ ἀποκλείσῃ τὴν θύραν, καὶ ἄρξησθε ἔξω ἑστάναι
    καὶ κρούειν τὴν θύραν λέγοντες· ⸀Κύριε, ἄνοιξον ἡμῖν· καὶ ἀποκριθεὶς ἐρεῖ ὑμῖν·
    Οὐκ οἶδα ὑμᾶς πόθεν ἐστέ.
translation:
  text: Once the master of the house has gotten up and shut the door, and you begin
    to stand outside and knock on the door, saying, ‘Lord, open to us,’ then he will
    answer you, ‘I do not know where you are from.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'After the master of the house has risen and shut the
      door.'
    reason: lexical_alternative
  - marker: b
    text: Greek κύριε, traditionally 'Lord'; in the parable it may also be understood
      as 'Master' or 'Sir.'
    reason: alternative_reading
  - marker: c
    text: Greek more literally, 'I do not know you, where you are from.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφ’ οὗ ἂν
  chosen: Once
  alternatives:
  - After
  - From the time when
  lexicon: BDAG
  rationale: 'The construction ἀφ’ οὗ with ἄν introduces an indefinite temporal clause:
    ''when/once/after the time that.'' ''Once'' gives natural English while preserving
    the temporal force tied to the following subjunctives.'
- source_word: ἐγερθῇ
  chosen: has gotten up
  alternatives:
  - rises
  - gets up
  lexicon: BDAG
  rationale: Here ἐγείρω refers to rising from a seated/reclining position, not resurrection.
    'Has gotten up' fits the aorist subjunctive in a temporal clause and reads naturally
    in sequence with 'shut the door.'
- source_word: οἰκοδεσπότης
  chosen: master of the house
  alternatives:
  - householder
  - owner of the house
  - head of the house
  lexicon: BDAG
  rationale: οἰκοδεσπότης denotes the householder/master. 'Master of the house' preserves
    the authority nuance better than the dated 'householder' and is more precise than
    merely 'owner.'
- source_word: ἀποκλείσῃ
  chosen: shut
  alternatives:
  - close
  - lock out by shutting
  lexicon: BDAG
  rationale: The verb means to shut/close off. 'Shut' is idiomatic with 'door' and
    preserves the decisive exclusion implied by the context.
- source_word: ἄρξησθε
  chosen: you begin
  alternatives:
  - you start
  - you will begin
  lexicon: BDAG
  rationale: Though formally future-like in context, the clause is governed by the
    temporal sequence. 'You begin' in English after 'once' communicates the ensuing
    action naturally.
- source_word: ἔξω ἑστάναι
  chosen: to stand outside
  alternatives:
  - to be standing outside
  - to stand on the outside
  lexicon: BDAG
  rationale: The perfect infinitive ἑστάναι with ἔξω conveys the state of being outside.
    'To stand outside' is idiomatic and sufficiently preserves the sense.
- source_word: κρούειν τὴν θύραν
  chosen: knock on the door
  alternatives:
  - beat on the door
  - knock at the door
  lexicon: BDAG
  rationale: Standard English idiom is 'knock on the door.' This preserves the repeated
    appeal without overstating the force as 'beat.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - Sir
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this parabolic address it
    could be heard as 'sir/master,' but 'Lord' preserves both the lexical default
    and Luke's theological resonance.
- source_word: ἄνοιξον ἡμῖν
  chosen: open to us
  alternatives:
  - open for us
  - open up to us
  lexicon: BDAG
  rationale: The dative ἡμῖν is naturally rendered 'to us' here. This keeps the direct
    plea concise and idiomatic.
- source_word: ἀποκριθεὶς ἐρεῖ
  chosen: he will answer
  alternatives:
  - answering, he will say
  - he will reply
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic/Greek narrative pattern.
    English compresses naturally to 'he will answer' without loss of meaning.
- source_word: Οὐκ οἶδα ὑμᾶς
  chosen: I do not know
  alternatives:
  - I do not know you
  - I do not recognize you
  lexicon: BDAG
  rationale: Although ὑμᾶς is explicit, the following πόθεν ἐστέ sharpens the statement
    toward origin/identity. English can omit the object and still preserve the sense
    because 'where you are from' completes it naturally. This avoids the slightly
    awkward 'I do not know you where you are from.'
- source_word: πόθεν ἐστέ
  chosen: where you are from
  alternatives:
  - where you come from
  - from where you are
  lexicon: BDAG
  rationale: πόθεν asks about origin/source. 'Where you are from' is the most natural
    modern English rendering and preserves the idiom of personal origin/identity.
