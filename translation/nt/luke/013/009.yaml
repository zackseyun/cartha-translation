id: LUK.13.9
reference: Luke 13:9
source:
  edition: SBLGNT
  text: κἂν μὲν ποιήσῃ καρπὸν ⸂εἰς τὸ μέλλον— εἰ δὲ μήγε,⸃ ἐκκόψεις αὐτήν.
translation:
  text: And if it bears fruit in the future—well and good; but if not, you will cut
    it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'next year'; some translations supply the more specific timeframe from
      the previous verse, but the Greek here more literally reads 'for the future'
      or 'in the coming time.'
    reason: alternative_reading
lexical_decisions:
- source_word: κἂν μὲν
  chosen: And if
  alternatives:
  - If indeed
  - And if indeed
  lexicon: BDAG
  rationale: κἂν combines καί + ἐάν and introduces a conditional clause; μέν sets
    up the first half of a μέν...δέ contrast. In natural English, 'And if' preserves
    the connective and conditional force without overloading the line.
- source_word: ποιήσῃ
  chosen: it bears
  alternatives:
  - it produces
  - it makes
  lexicon: BDAG
  rationale: With καρπός, ποιέω idiomatically means 'bear' or 'produce' fruit. 'Bears'
    is the most natural English collocation and preserves the agricultural metaphor.
- source_word: καρπὸν
  chosen: fruit
  lexicon: BDAG
  rationale: Standard rendering in agricultural contexts; singular in Greek is idiomatic
    and naturally represented by uncountable singular 'fruit' in English.
- source_word: εἰς τὸ μέλλον
  chosen: in the future
  alternatives:
  - next year
  - from now on
  - for the coming time
  lexicon: BDAG
  rationale: 'The phrase literally means ''for the future'' or ''into the coming [time].''
    Because some manuscripts/translation traditions smooth this to ''next year'' from
    the broader context, the main text stays close to the Greek wording here: ''in
    the future.'''
- source_word: εἰ δὲ μήγε
  chosen: but if not
  alternatives:
  - but otherwise
  - but if it does not
  lexicon: BDAG
  rationale: This introduces the contrasting apodosis succinctly. 'But if not' is
    idiomatic and preserves the contrast signaled by δέ and the negation of the prior
    condition.
- source_word: ἐκκόψεις
  chosen: you will cut it down
  alternatives:
  - you will cut it off
  - you will remove it
  lexicon: BDAG
  rationale: ἐκκόπτω in this horticultural context means to cut down/out. 'Cut it
    down' best matches the image of felling a fruitless tree.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: Although the Greek pronoun is grammatically feminine, it refers to the
    fig tree and should be rendered by the natural English inanimate pronoun 'it'.
