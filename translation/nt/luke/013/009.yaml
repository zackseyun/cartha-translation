theological_decisions:
- issue: Temporal sense of the owner's delayed judgment
  chosen_reading: The verse is left as a conditional outcome within the parable, without
    importing an explicit timeframe such as 'next year' into the main text.
  alternative_readings:
  - Translate εἰς τὸ μέλλον as 'next year' by assimilation to the preceding verse's
    χρονόν
  rationale: The Greek wording in this verse itself does not explicitly repeat 'this
    year' or say 'next year'; it speaks more generally of what happens 'for the future.'
    Preserving that avoids overstating specificity while maintaining the parable's
    warning of delayed but possible judgment.
