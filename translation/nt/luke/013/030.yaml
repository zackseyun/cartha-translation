theological_decisions:
- issue: Scope of the reversal saying
  chosen_reading: Render as a general statement about reversal of status without specifying
    ethnic, social, or eschatological categories in the translation itself.
  alternative_readings:
  - A saying specifically about Gentiles and Jews
  - A saying specifically about humility and pride
  - A saying specifically about final judgment rankings
  rationale: In context the saying follows discussion of entry into the kingdom and
    may imply multiple layers of reversal, but the Greek itself states the principle
    tersely and generally. The translation should preserve that breadth rather than
    import one interpretive framework into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
