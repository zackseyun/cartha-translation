id: LUK.13.30
reference: Luke 13:30
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ εἰσὶν ἔσχατοι οἳ ἔσονται πρῶτοι, καὶ εἰσὶν πρῶτοι οἳ ἔσονται ἔσχατοι.
translation:
  text: And look, some who are last will be first, and some who are first will be
    last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there are last ones who will be first, and there are
      first ones who will be last.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered with a natural modern attention-getter. 'Behold' is more traditional
    but archaic for the stated translation philosophy; 'look' preserves the discourse
    force of drawing attention to the saying.
- source_word: ἔσχατοι
  chosen: last
  alternatives:
  - least
  - those at the end
  lexicon: BDAG
  rationale: In this reversal saying, ἔσχατοι refers to those in the last position
    or lowest rank, not necessarily morally 'least.' 'Last' preserves the concise
    antithesis with πρῶτοι.
- source_word: πρῶτοι
  chosen: first
  alternatives:
  - foremost
  - leading
  lexicon: BDAG
  rationale: '''First'' is the direct and idiomatic counterpart to ἔσχατοι in this
    aphoristic reversal statement.'
- source_word: οἳ ἔσονται
  chosen: who will be
  alternatives:
  - who are going to be
  - who shall be
  lexicon: BDAG
  rationale: The relative clause with future εἰμί is rendered straightforwardly as
    future predication. 'Will be' is clear modern English without archaic 'shall.'
- source_word: εἰσὶν
  chosen: some who are
  alternatives:
  - there are
  - are
  lexicon: BDAG
  rationale: The Greek literally says 'there are last ones who will be first ... and
    there are first ones who will be last.' English idiom is improved by supplying
    'some who are,' which preserves the existential force without sounding wooden.
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  - also
  lexicon: BDAG
  rationale: Standard connective retained in both clauses to preserve the balanced
    parallelism of the Greek saying.
