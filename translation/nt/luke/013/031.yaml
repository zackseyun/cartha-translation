theological_decisions:
- issue: Portrayal of the Pharisees' warning
  chosen_reading: Render the statement straightforwardly as a warning without implying
    whether the Pharisees were sincere, deceptive, or allied with Herod.
  alternative_readings:
  - The Pharisees were genuinely warning Jesus
  - The Pharisees were attempting to intimidate Jesus into leaving
  rationale: The Greek reports their speech but does not explicitly disclose motive.
    The translation preserves that narrative openness rather than importing an interpretive
    judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
