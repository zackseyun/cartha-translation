id: LUK.13.31
reference: Luke 13:31
source:
  edition: SBLGNT
  text: Ἐν αὐτῇ τῇ ⸀ὥρᾳ προσῆλθάν τινες Φαρισαῖοι λέγοντες αὐτῷ· Ἔξελθε καὶ πορεύου
    ἐντεῦθεν, ὅτι Ἡρῴδης θέλει σε ἀποκτεῖναι.
translation:
  text: At that very hour some Pharisees came up and said to him, “Leave and go away
    from here, because Herod wants to kill you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “At that same hour.”
    reason: lexical_alternative
  - marker: b
    text: Or “Leave and depart from here.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν αὐτῇ τῇ ὥρᾳ
  chosen: At that very hour
  alternatives:
  - At that same hour
  - At that time
  lexicon: BDAG
  rationale: The idiom marks immediacy/specific timing. 'That very hour' preserves
    the emphatic force of αὐτῇ with the article and noun more clearly than the flatter
    'at that time.'
- source_word: προσῆλθάν
  chosen: came up
  alternatives:
  - came
  - approached
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'come to/approach.' 'Came up' gives natural
    English while retaining the sense of drawing near to Jesus.
- source_word: τινες Φαρισαῖοι
  chosen: some Pharisees
  alternatives:
  - certain Pharisees
  lexicon: BDAG
  rationale: τινες is indefinite, not specifying which Pharisees. 'Some Pharisees'
    is idiomatic modern English and avoids archaic tone.
- source_word: λέγοντες αὐτῷ
  chosen: said to him
  alternatives:
  - telling him
  - saying to him
  lexicon: BDAG
  rationale: The participle is contemporaneous with προσῆλθάν and is best rendered
    as a finite verb in English for readability.
- source_word: Ἔξελθε
  chosen: Leave
  alternatives:
  - Go out
  - Get out
  lexicon: BDAG
  rationale: Aorist imperative of ἐξέρχομαι. 'Leave' is direct and natural in context;
    'get out' sounds too colloquial and harsh, while 'go out' is less idiomatic here.
- source_word: καὶ πορεύου
  chosen: and go away
  alternatives:
  - and be on your way
  - and depart
  lexicon: BDAG
  rationale: πορεύομαι here carries the sense of proceeding/departing. 'Go away' complements
    'Leave' without sounding overly formal.
- source_word: ἐντεῦθεν
  chosen: from here
  alternatives:
  - away from here
  - from this place
  lexicon: BDAG
  rationale: The adverb indicates movement away from the present location. In English
    it is most naturally expressed with 'from here'; combined with 'go away' the full
    clause clearly conveys departure.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the warning. 'Because' is the clearest modern
    equivalent.
- source_word: Ἡρῴδης
  chosen: Herod
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, in keeping with
    the philosophy of transliterating names.
- source_word: θέλει
  chosen: wants
  alternatives:
  - desires
  - intends
  lexicon: BDAG
  rationale: θέλω denotes desire/wish. 'Wants' is the most straightforward modern
    rendering; 'intends' would overstate deliberateness beyond the lexical core.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  lexicon: BDAG
  rationale: The infinitive means 'to kill.' 'Put to death' is possible but can imply
    formal execution; 'kill' is broader and fits the warning naturally.
