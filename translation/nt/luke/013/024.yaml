id: LUK.13.24
reference: Luke 13:24
source:
  edition: SBLGNT
  text: Ἀγωνίζεσθε εἰσελθεῖν διὰ τῆς στενῆς ⸀θύρας, ὅτι πολλοί, λέγω ὑμῖν, ζητήσουσιν
    εἰσελθεῖν καὶ οὐκ ἰσχύσουσιν,
translation:
  text: Strive to enter through the narrow door, because many, I tell you, will seek
    to enter and will not be able.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the narrow gate.' Luke's Greek says 'door' (θύρα), while Matthew's
      parallel uses 'gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγωνίζεσθε
  chosen: Strive
  alternatives:
  - Make every effort
  - Struggle
  lexicon: BDAG
  rationale: The present middle/passive imperative of ἀγωνίζομαι conveys earnest exertion
    or struggle. 'Strive' preserves the force and seriousness without over-paraphrasing;
    'make every effort' is slightly more dynamic, while 'struggle' can sound awkward
    as a direct imperative in English.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go in
  lexicon: BDAG
  rationale: The aorist infinitive of εἰσέρχομαι is naturally rendered 'to enter.'
    This is idiomatic and fits both occurrences in the verse consistently.
- source_word: διὰ τῆς στενῆς θύρας
  chosen: through the narrow door
  alternatives:
  - through the narrow gate
  lexicon: BDAG
  rationale: θύρα ordinarily means 'door,' not 'gate.' Although Matthew's parallel
    uses 'gate,' Luke's wording here is best represented by 'door.' στενῆς is rendered
    'narrow' in its spatial/metaphorical sense.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the imperative. 'Because' is clear
    modern English and preserves the causal force.
- source_word: πολλοί
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: The adjective functions substantivally and is straightforwardly rendered
    'many.'
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: This discourse formula is idiomatic in English as 'I tell you.' 'I say
    to you' is more formal but less natural in contemporary English.
- source_word: ζητήσουσιν
  chosen: will seek
  alternatives:
  - will try
  - will attempt
  lexicon: BDAG
  rationale: ζητέω primarily means 'seek.' Rendering it this way preserves the lexical
    distinction from Ἀγωνίζεσθε; 'try' would flatten that distinction and over-interpret
    the nature of their action.
- source_word: οὐκ ἰσχύσουσιν
  chosen: will not be able
  alternatives:
  - will not succeed
  - will not be strong enough
  lexicon: BDAG
  rationale: ἰσχύω here denotes having the power or ability to accomplish something.
    'Will not be able' is the clearest and most direct rendering; 'will not succeed'
    is interpretive, and 'will not be strong enough' is too literal for the idiom.
