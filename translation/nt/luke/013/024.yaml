theological_decisions:
- issue: Human effort and salvation language
  chosen_reading: Retain the imperative 'Strive' without softening it, while not importing
    any doctrinal explanation about merit or works.
  alternative_readings:
  - Make every effort to enter
  - Try to enter
  rationale: The verse itself commands earnest effort and warns of failed attempts.
    The translation should preserve that tension without resolving broader debates
    about divine sovereignty, human responsibility, or merit. 'Strive' best reflects
    the Greek while remaining doctrinally non-sectarian.
  doctrine_reference: Preserve theological tension rather than resolve it.
