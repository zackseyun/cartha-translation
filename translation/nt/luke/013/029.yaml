theological_decisions:
- issue: Banquet imagery in the eschatological kingdom
  chosen_reading: Retain the meal image with 'will recline at table' rather than flattening
    it to merely 'enter' or 'sit down.'
  alternative_readings:
  - will sit down in the kingdom of God
  - will take their seats in the kingdom of God
  rationale: The verse evokes the eschatological banquet and parallels language elsewhere
    in the Gospels. Preserving the table-reclining image maintains the text's concrete
    picture of participation in the kingdom without importing extra doctrinal detail.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Universal geographic scope
  chosen_reading: Render the four directions straightforwardly as a worldwide ingathering
    without specifying ethnicity in the main text.
  alternative_readings:
  - Explicitly interpret as Gentiles from all nations
  rationale: The wording clearly signals people coming from every direction, but the
    verse itself does not explicitly name Gentiles. The translation should preserve
    the broad scope without over-interpreting beyond the Greek.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
