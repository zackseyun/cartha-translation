id: LUK.13.29
reference: Luke 13:29
source:
  edition: SBLGNT
  text: καὶ ἥξουσιν ἀπὸ ἀνατολῶν καὶ δυσμῶν καὶ ⸀ἀπὸ βορρᾶ καὶ νότου καὶ ἀνακλιθήσονται
    ἐν τῇ βασιλείᾳ τοῦ θεοῦ.
translation:
  text: And they will come from east and west, and from north and south, and will
    recline at table in the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will sit down'; the Greek more specifically refers to reclining for
      a banquet meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥξουσιν
  chosen: they will come
  alternatives:
  - they will arrive
  lexicon: BDAG
  rationale: Future of ἥκω commonly means 'come' or 'arrive.' 'Come' is more idiomatic
    in English here and fits the directional phrases that follow.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  chosen: from east and west
  alternatives:
  - from the east and the west
  - from eastern regions and western regions
  lexicon: BDAG
  rationale: The plural nouns literally denote 'sunrises' and 'sunsets,' an idiom
    for cardinal directions. English normally renders this as 'east and west.' The
    article is not required in natural English.
- source_word: ἀπὸ βορρᾶ καὶ νότου
  chosen: from north and south
  alternatives:
  - from the north and the south
  lexicon: BDAG
  rationale: These genitives after ἀπό continue the geographic sweep of the previous
    phrase. 'North and south' is the natural English equivalent.
- source_word: ἀνακλιθήσονται
  chosen: will recline at table
  alternatives:
  - will recline
  - will take their places at the table
  - will sit down
  lexicon: BDAG
  rationale: The verb ἀνακλίνω in banquet contexts refers to reclining for a meal.
    'Will recline at table' preserves the cultural image more precisely than the traditional
    but less exact 'sit down,' while remaining readable.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  chosen: in the kingdom of God
  alternatives:
  - in God's kingdom
  lexicon: BDAG
  rationale: This is the standard and transparent rendering of the phrase, preserving
    the theological and eschatological weight of βασιλεία τοῦ θεοῦ without paraphrase.
