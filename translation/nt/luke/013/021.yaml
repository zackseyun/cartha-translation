theological_decisions:
- issue: Symbolic force of leaven in the parable
  chosen_reading: Render neutrally as 'leaven' without importing a negative or positive
    theological interpretation into the translation.
  alternative_readings:
  - Interpret leaven negatively based on other passages
  - Interpret leaven positively as kingdom growth
  rationale: The verse itself presents a simile for the kingdom's permeating effect.
    Translation should preserve the image without resolving broader interpretive debates
    about whether leaven is always negative or can be positive depending on context.
  doctrine_reference: Preserve theological tension rather than resolve it.
