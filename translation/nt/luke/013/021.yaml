id: LUK.13.21
reference: Luke 13:21
source:
  edition: SBLGNT
  text: ὁμοία ἐστὶν ζύμῃ, ἣν λαβοῦσα γυνὴ ⸀ἔκρυψεν εἰς ἀλεύρου σάτα τρία ἕως οὗ ἐζυμώθη
    ὅλον.
translation:
  text: It is like leaven, which a woman took and hid in three measures of flour until
    it was all leavened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yeast.' The Greek term refers to leavening agent used in dough.
    reason: lexical_alternative
  - marker: b
    text: Greek 'three sata' (about three seahs), a large quantity of flour.
    reason: cultural_note
  - marker: c
    text: Or 'mixed into' for 'hid'; the Greek verb is literally 'hid' or 'concealed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία
  chosen: like
  alternatives:
  - similar to
  lexicon: BDAG
  rationale: Predicate adjective introducing a comparison in a parable; English idiom
    prefers 'is like' over the more wooden 'is similar to.'
- source_word: ζύμῃ
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: '''Leaven'' best matches the ancient fermenting agent and preserves biblical
    imagery. ''Yeast'' is possible in modern English but can suggest a modern commercial
    product rather than the broader ancient concept.'
- source_word: λαβοῦσα
  chosen: took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in natural English the participial
    action is well represented by the finite verb sequence 'took and hid.'
- source_word: γυνὴ
  chosen: a woman
  lexicon: BDAG
  rationale: Indefinite in sense here within the parable; 'a woman' is the natural
    English rendering.
- source_word: ἔκρυψεν
  chosen: hid
  alternatives:
  - mixed into
  lexicon: BDAG
  rationale: The verb literally means 'hid' or 'concealed.' Although some translations
    use 'mixed into' to clarify the baking image, 'hid' more closely follows the Greek
    and still makes sense in context.
- source_word: εἰς ἀλεύρου σάτα τρία
  chosen: in three measures of flour
  alternatives:
  - into three measures of flour
  - in about three seahs of flour
  lexicon: BDAG
  rationale: σάτα reflects a Semitic dry measure (seah). 'Three measures' is understandable
    and traditional without overloading the text with technical terminology; the more
    literal cultural equivalent can be preserved in a footnote.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction; simple 'until' is sufficient.
- source_word: ἐζυμώθη ὅλον
  chosen: it was all leavened
  alternatives:
  - the whole batch was leavened
  - it was completely leavened
  lexicon: BDAG
  rationale: The passive verb with neuter singular ὅλον refers to the whole amount
    of dough/flour mixture. 'It was all leavened' is concise, natural, and preserves
    the totalizing sense.
