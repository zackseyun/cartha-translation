theological_decisions:
- issue: Whether Jesus is asserting that extraordinary suffering proves extraordinary
    sinfulness
  chosen_reading: The verse is translated as a rhetorical question challenging that
    assumption, without endorsing it.
  alternative_readings:
  - A flatter rendering could be misconstrued as affirming that they were greater
    sinners.
  rationale: The syntax and immediate context indicate Jesus is exposing and rejecting
    the inference that tragic suffering marks greater guilt. The translation preserves
    the question form and avoids interpretive additions while not implying endorsement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
