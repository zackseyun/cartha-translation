id: LUK.13.2
reference: Luke 13:2
source:
  edition: SBLGNT
  text: καὶ ⸀ἀποκριθεὶς εἶπεν αὐτοῖς· Δοκεῖτε ὅτι οἱ Γαλιλαῖοι οὗτοι ἁμαρτωλοὶ παρὰ
    πάντας τοὺς Γαλιλαίους ἐγένοντο, ὅτι ⸀ταῦτα πεπόνθασιν;
translation:
  text: And answering, he said to them, “Do you think that these Galileans became
    sinners beyond all the Galileans, because they have suffered these things?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “more sinful than all the other Galileans” or “worse sinners than all
      the Galileans.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answering
  alternatives:
  - in response
  - answered
  lexicon: BDAG
  rationale: A participial form preceding εἶπεν; rendered with a participial sense
    to preserve the Greek structure while remaining natural in English when paired
    with 'he said.'
- source_word: Δοκεῖτε
  chosen: Do you think
  alternatives:
  - Do you suppose
  - Do you imagine
  lexicon: BDAG
  rationale: δοκέω here introduces Jesus' rhetorical question about their assumption;
    'Do you think' is clear, idiomatic, and close to the Greek.
- source_word: οἱ Γαλιλαῖοι οὗτοι
  chosen: these Galileans
  alternatives:
  - these men from Galilee
  lexicon: BDAG
  rationale: Standard demonym; the demonstrative is preserved by 'these.'
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: The adjective is used substantivally/predicatively; 'sinners' is the
    most direct and idiomatic rendering.
- source_word: παρὰ πάντας τοὺς Γαλιλαίους
  chosen: beyond all the Galileans
  alternatives:
  - more than all the Galileans
  - worse sinners than all the Galileans
  lexicon: BDAG
  rationale: παρά with the accusative expresses comparison. 'Beyond all the Galileans'
    preserves the comparative force without importing 'worse' into the main text,
    since 'worse' is interpretive though contextually plausible.
- source_word: ἐγένοντο
  chosen: became
  alternatives:
  - were
  - turned out to be
  lexicon: BDAG
  rationale: γίνομαι commonly means 'become' or 'come to be.' Here it conveys the
    judgment being ascribed to them; 'became' keeps the verbal force better than a
    simple copula.
- source_word: ὅτι
  chosen: because
  alternatives:
  - since
  - in that
  lexicon: BDAG
  rationale: The second ὅτι introduces the supposed reason for the judgment; 'because'
    best captures the causal sense.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - such things
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring to the calamities just mentioned; 'these
    things' is transparent and sufficiently natural.
- source_word: πεπόνθασιν
  chosen: they have suffered
  alternatives:
  - they suffered
  - they have experienced
  lexicon: BDAG
  rationale: Perfect tense of πάσχω emphasizes the fact of having undergone suffering;
    English present perfect reflects this well.
