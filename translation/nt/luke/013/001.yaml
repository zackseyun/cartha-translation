theological_decisions:
- issue: Historical and moral force of Pilate's act
  chosen_reading: Render the clause straightforwardly as a report of Pilate mixing
    the Galileans' blood with their sacrifices, without adding interpretive explanation.
  alternative_readings:
  - Interpretively expand to 'slaughtered while they were offering sacrifices'
  rationale: The verse reports a shocking event but does not itself explain the mechanics
    or theological meaning. The translation preserves the stark wording and avoids
    importing explanatory detail not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
