id: LUK.13.1
reference: Luke 13:1
source:
  edition: SBLGNT
  text: Παρῆσαν δέ τινες ἐν αὐτῷ τῷ καιρῷ ἀπαγγέλλοντες αὐτῷ περὶ τῶν Γαλιλαίων ὧν
    τὸ αἷμα Πιλᾶτος ἔμιξεν μετὰ τῶν θυσιῶν αὐτῶν.
translation:
  text: Now some were present at that very time reporting to him about the Galileans
    whose blood Pilate had mixed with their sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mingled with their sacrifices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρῆσαν
  chosen: were present
  alternatives:
  - came
  - arrived
  lexicon: BDAG
  rationale: The imperfect of πάρειμι here describes the presence of certain people
    rather than emphasizing their arrival. 'Were present' best captures the stative
    sense in natural English.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'Now' gives a natural discourse shift in
    English without overstating sequence.
- source_word: τινες
  chosen: some
  alternatives:
  - some people
  - certain ones
  lexicon: BDAG
  rationale: An indefinite plural is intended. 'Some' is concise and idiomatic.
- source_word: ἐν αὐτῷ τῷ καιρῷ
  chosen: at that very time
  alternatives:
  - at that time
  - in that same time
  lexicon: BDAG
  rationale: The phrase points to the specific time of the preceding context. 'At
    that very time' preserves the demonstrative force and temporal specificity.
- source_word: ἀπαγγέλλοντες αὐτῷ
  chosen: reporting to him
  alternatives:
  - telling him
  - bringing him news
  lexicon: BDAG
  rationale: The participle conveys giving a report or message. 'Reporting to him'
    preserves the informative nuance better than the more generic 'telling him.'
- source_word: περὶ τῶν Γαλιλαίων
  chosen: about the Galileans
  alternatives:
  - concerning the Galileans
  lexicon: BDAG
  rationale: περί with the genitive here introduces the topic of the report. 'About
    the Galileans' is clear modern English.
- source_word: ὧν τὸ αἷμα
  chosen: whose blood
  alternatives:
  - the blood of whom
  lexicon: BDAG
  rationale: The relative pronoun with αἷμα is most naturally rendered by the English
    possessive relative 'whose blood.'
- source_word: Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention.
- source_word: ἔμιξεν
  chosen: had mixed
  alternatives:
  - mixed
  - mingled
  lexicon: BDAG
  rationale: μίγνυμι means 'mix' or 'mingle.' 'Had mixed' fits the reported prior
    event relative to the act of reporting; 'mixed' would also be possible, while
    'mingled' is more traditional but less natural in contemporary English.
- source_word: μετὰ τῶν θυσιῶν αὐτῶν
  chosen: with their sacrifices
  alternatives:
  - with the sacrifices they were offering
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' θυσίαι refers to sacrificial offerings.
    The possessive 'their sacrifices' reflects αὐτῶν and leaves implicit whether these
    were sacrifices they brought or were in the act of offering, as in the Greek.
