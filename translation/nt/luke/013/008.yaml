id: LUK.13.8
reference: Luke 13:8
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς λέγει αὐτῷ· Κύριε, ἄφες αὐτὴν καὶ τοῦτο τὸ ἔτος, ἕως ὅτου
    σκάψω περὶ αὐτὴν καὶ βάλω κόπρια·
translation:
  text: But he answered and said to him, ‘Lord, leave it alone this year also, until
    I dig around it and put on manure.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spare it' or 'let it be this year also.'
    reason: lexical_alternative
  - marker: b
    text: Or 'put manure on it'; more generally, 'fertilize it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς λέγει
  chosen: answered and said
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: The participle + present verb is a common Semitic-influenced narrative
    expression. 'Answered and said' preserves the formal structure without becoming
    unnatural; 'replied' is smoother but compresses two source elements into one.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - sir
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is preferred. In this parabolic
    address it can function as a respectful title to the vineyard owner; 'Master'
    is possible, but 'Lord' maintains consistency with the project's rendering of
    κύριος.
- source_word: ἄφες αὐτὴν
  chosen: leave it alone
  alternatives:
  - leave it
  - let it be
  - spare it
  lexicon: BDAG
  rationale: ἀφίημι here means to let something remain or be left in place. 'Leave
    it alone' is idiomatic modern English and fits the agricultural context. 'Spare
    it' captures the implied reprieve but adds interpretive force not explicit in
    the verb itself.
- source_word: καὶ τοῦτο τὸ ἔτος
  chosen: this year also
  alternatives:
  - also this year
  - for this year too
  - for one more year
  lexicon: BDAG
  rationale: The phrase asks for an additional year. 'This year also' closely follows
    the Greek word order and sense. 'For one more year' is interpretive but clear;
    it was not chosen because the Greek explicitly says 'this year also.'
- source_word: ἕως ὅτου
  chosen: until
  alternatives:
  - until the time when
  - until such time as
  lexicon: BDAG
  rationale: This construction introduces the intended period of delay up to the speaker's
    actions. Simple 'until' is accurate and natural.
- source_word: σκάψω περὶ αὐτὴν
  chosen: I dig around it
  alternatives:
  - I cultivate around it
  - I loosen the soil around it
  lexicon: BDAG
  rationale: σκάπτω literally means 'dig.' In context it refers to digging around
    the tree, likely to aerate or cultivate the soil. 'Dig around it' preserves the
    concrete image without overexplaining.
- source_word: βάλω κόπρια
  chosen: put on manure
  alternatives:
  - put manure on it
  - apply manure
  - fertilize it
  lexicon: BDAG
  rationale: κόπρια refers to manure/dung used as fertilizer. 'Put on manure' keeps
    the earthy concreteness of the Greek. 'Fertilize it' is smoother but less vivid
    and more generalized than the source.
