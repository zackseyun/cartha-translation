id: LUK.13.3
reference: Luke 13:3
source:
  edition: SBLGNT
  text: οὐχί, λέγω ὑμῖν, ἀλλ’ ἐὰν μὴ μετανοῆτε πάντες ⸀ὁμοίως ἀπολεῖσθε.
translation:
  text: No, I tell you; but unless you change your thinking, you will all likewise perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the same way.' The adverb 'likewise' may refer to a similar kind
      of sudden judgment, not necessarily an identical manner of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχί
  chosen: 'No'
  alternatives:
  - Certainly not
  - No indeed
  lexicon: BDAG
  rationale: Introduces a strong negation in response to the implied assumption of
    the previous context. 'No' is the most natural modern English equivalent without
    adding emphasis beyond the Greek.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common emphatic discourse formula in Luke. 'I tell you' is idiomatic
    modern English and preserves the direct personal address.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - on the contrary
  lexicon: BDAG
  rationale: Marks contrast with the denied assumption. 'But' is the straightforward
    connective in English.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: This conditional combination is most naturally rendered 'unless' in English,
    preserving the force of the negative condition.
- source_word: μετανοῆτε
  chosen: you change your thinking
  alternatives:
  - you change your mind
  - you turn back
  lexicon: BDAG
  rationale: μετανοέω in this context denotes repentance before God, not merely intellectual
    reconsideration. 'Repent' preserves the moral and spiritual force of the term
    and is standard, clear English.
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: Placed with the future verb to stress the comprehensive scope applying
    to Jesus' hearers. 'All' is concise and natural.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Retains the adverbial comparison to the preceding examples. 'Likewise'
    is compact and preserves the rhetorical connection, though the exact sense may
    be broader than identical manner of death.
- source_word: ἀπολεῖσθε
  chosen: you will perish
  alternatives:
  - you will be destroyed
  - you will die
  lexicon: BDAG
  rationale: Future middle of ἀπόλλυμι here carries the sense of coming to ruin/perishing.
    'Perish' preserves both the immediate warning of destruction and the broader theological
    gravity without over-specifying physical death alone.
