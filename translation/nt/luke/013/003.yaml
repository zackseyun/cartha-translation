theological_decisions:
- issue: Scope of 'perish' in Jesus' warning
  chosen_reading: Render ἀπολεῖσθε as 'perish' without narrowing it to merely physical
    death or explicitly eternal condemnation.
  alternative_readings:
  - you will die
  - you will be eternally condemned
  - you will be destroyed
  rationale: The verse warns of judgment in response to lack of repentance, but the
    Greek term itself does not require the translator to specify the exact mode or
    extent of perishing here. Preserving 'perish' maintains the theological tension
    and avoids importing a more precise doctrinal conclusion than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
