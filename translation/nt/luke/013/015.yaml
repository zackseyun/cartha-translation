id: LUK.13.15
reference: Luke 13:15
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀δὲ αὐτῷ ὁ κύριος καὶ εἶπεν· Ὑποκριταί, ἕκαστος ὑμῶν τῷ σαββάτῳ οὐ
    λύει τὸν βοῦν αὐτοῦ ἢ τὸν ὄνον ἀπὸ τῆς φάτνης καὶ ⸀ἀπαγαγὼν ποτίζει;
translation:
  text: But the Lord answered him and said, “Hypocrites! Does not each of you on the
    Sabbath untie his ox or donkey from the feeding trough and lead it away to give
    it water?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “manger.” The Greek φάτνη can refer to a feeding place or trough.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Rendered as the title 'Lord' per the project's default for κύριος. In
    Luke's narrative this is also a christological/narratorial title, so 'the Lord'
    is appropriate rather than a lower-status term like 'master'.
- source_word: Ὑποκριταί
  chosen: Hypocrites
  alternatives:
  - You hypocrites
  lexicon: BDAG
  rationale: Vocative plural used as a direct rebuke. 'Hypocrites' preserves the sharpness
    and conventional force of the address without adding words not present in Greek.
- source_word: ἕκαστος ὑμῶν
  chosen: each of you
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: 'Natural English equivalent preserving distributive force: Jesus appeals
    to what each individual hearer does.'
- source_word: τῷ σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on the Sabbath day
  lexicon: BDAG
  rationale: Standard temporal dative. 'On the Sabbath' is idiomatic and concise.
- source_word: λύει
  chosen: untie
  alternatives:
  - loose
  - release
  lexicon: BDAG
  rationale: In context of an animal fastened at a stall or trough, 'untie' is the
    clearest modern English rendering.
- source_word: βοῦν
  chosen: ox
  alternatives:
  - cow
  - cattle animal
  lexicon: BDAG
  rationale: The singular βοῦς can denote bovine livestock broadly, but 'ox' is the
    conventional and contextually suitable rendering in a paired farm-animal example
    with donkey.
- source_word: ὄνον
  chosen: donkey
  alternatives:
  - ass
  lexicon: BDAG
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic/liable
    to misunderstanding.'
- source_word: φάτνης
  chosen: feeding trough
  alternatives:
  - manger
  - stall
  lexicon: BDAG
  rationale: φάτνη can denote a manger/feeding place. Here the sense is the place
    from which the animal is untied before being led to water. 'Feeding trough' is
    concrete and accessible. 'Manger' is possible but more tradition-bound; 'stall'
    shifts the image from the object/place of feeding to the enclosure.
- source_word: ἀπαγαγὼν
  chosen: lead it away
  alternatives:
  - having led it away
  - take it away
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb ποτίζει. In smooth English,
    coordinated finite verbs best convey the sequence: untie ... and lead it away
    ... to give it water.'
- source_word: ποτίζει
  chosen: give it water
  alternatives:
  - water it
  lexicon: BDAG
  rationale: The verb means to provide drink. 'Give it water' is slightly more explicit
    and natural with the preceding action of leading the animal away; 'water it' is
    also valid but a bit terser.
