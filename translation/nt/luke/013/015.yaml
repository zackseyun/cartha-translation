- issue: Narrative title κύριος applied to Jesus
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The verse identifies Jesus with Luke's narrative title κύριος. Following
    the doctrine table, κύριος is rendered 'Lord.' This preserves the text's christological
    weight without expanding beyond what Luke states.
