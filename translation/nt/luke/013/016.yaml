id: LUK.13.16
reference: Luke 13:16
source:
  edition: SBLGNT
  text: ταύτην δὲ θυγατέρα Ἀβραὰμ οὖσαν, ἣν ἔδησεν ὁ Σατανᾶς ἰδοὺ δέκα καὶ ὀκτὼ ἔτη,
    οὐκ ἔδει λυθῆναι ἀπὸ τοῦ δεσμοῦ τούτου τῇ ἡμέρᾳ τοῦ σαββάτου;
translation:
  text: And ought not this woman, being a daughter of Abraham, whom Satan bound for
    eighteen years—look—be released from this bond on the Sabbath day?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''be loosed from this bond.'' The Greek uses binding-and-loosing language:
      ''whom Satan bound ... be released/loosed from this bond.'''
    reason: lexical_alternative
  - marker: b
    text: '''Daughter of Abraham'' highlights her standing within Abraham''s covenant
      family and strengthens Jesus'' argument about what is fitting on the Sabbath.'
    reason: cross_reference
lexical_decisions:
- source_word: ταύτην δὲ
  chosen: And ... this
  alternatives:
  - Now ... this
  - But ... this
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' preserves the flow of Jesus' argument
    without overstating contrast. ταύτην is demonstrative and is carried by 'this.'
- source_word: θυγατέρα Ἀβραὰμ
  chosen: woman, being a daughter of Abraham
  alternatives:
  - daughter of Abraham
  - this daughter of Abraham
  lexicon: BDAG
  rationale: θυγατέρα is literally 'daughter,' but in English the clause reads more
    naturally with 'this woman' followed by the appositional participial phrase 'being
    a daughter of Abraham.' This preserves both her sex and her covenant identity.
    'Daughter of Abraham' is retained because it is theologically and rhetorically
    significant in context.
- source_word: οὖσαν
  chosen: being
  alternatives:
  - who is
  - as one who is
  lexicon: BDAG
  rationale: The present participle is best represented by 'being,' preserving the
    participial structure and appositional force.
- source_word: ἣν ἔδησεν ὁ Σατανᾶς
  chosen: whom Satan bound
  alternatives:
  - whom Satan has bound
  - whom the Adversary bound
  lexicon: BDAG
  rationale: ἔδησεν is aorist, so simple past 'bound' is appropriate. Σατανᾶς is transliterated
    as the personal name/title 'Satan' by standard convention.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἰδού is an attention-getter. 'Look' preserves the discourse force in
    readable modern English better than archaic 'behold.'
- source_word: δέκα καὶ ὀκτὼ ἔτη
  chosen: for eighteen years
  alternatives:
  - eighteen years
  - for ten and eight years
  lexicon: BDAG
  rationale: Idiomatic English expresses duration with 'for eighteen years.' The numeral
    is rendered in standard English form.
- source_word: οὐκ ἔδει
  chosen: ought not
  alternatives:
  - was it not necessary
  - should it not
  lexicon: BDAG
  rationale: The imperfect of δεῖ here expresses moral necessity/propriety in a rhetorical
    question. 'Ought not' captures the force naturally in English.
- source_word: λυθῆναι
  chosen: be released
  alternatives:
  - be loosed
  - be freed
  lexicon: BDAG
  rationale: λύω can mean 'loose' or 'release.' Because the verse plays on binding
    and unbinding, 'be released' is clear modern English while still matching the
    bondage imagery.
- source_word: ἀπὸ τοῦ δεσμοῦ τούτου
  chosen: from this bond
  alternatives:
  - from this binding
  - from this bondage
  lexicon: BDAG
  rationale: δεσμός denotes a bond/fetter. 'Bond' preserves the lexical connection
    with 'bound' earlier in the verse. 'Bondage' is possible but slightly more interpretive.
- source_word: τῇ ἡμέρᾳ τοῦ σαββάτου
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  - on the day of the Sabbath
  lexicon: BDAG
  rationale: This is the natural English rendering of the dative temporal phrase.
    'Sabbath day' preserves the explicit mention of 'day' present in Greek.
