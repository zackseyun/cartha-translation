theological_decisions:
- issue: Meaning of 'daughter of Abraham'
  chosen_reading: A covenantal designation affirming her place among Abraham's people,
    used rhetorically to underscore the appropriateness of her healing.
  alternative_readings:
  - A general commendation of her faith
  - A merely ethnic description without rhetorical weight
  rationale: The phrase carries more than biological sex; it marks her as a rightful
    member of the covenant community and strengthens Jesus' argument that Sabbath
    release is fitting for her.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Reference to Satan's binding
  chosen_reading: A real personal-agent reference to Satan as the one who had bound
    her, without specifying a full causal mechanism beyond the text.
  alternative_readings:
  - A purely metaphorical personification of evil
  - A detailed demonological explanation of her condition
  rationale: The text explicitly names Satan as agent, so the translation preserves
    that personal reference. It does not expand into claims about possession or medical
    causation that the verse itself does not state.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
