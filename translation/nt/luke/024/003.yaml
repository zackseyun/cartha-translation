id: LUK.24.3
reference: Luke 24:3
source:
  edition: SBLGNT
  text: ⸂εἰσελθοῦσαι δὲ⸃ οὐχ εὗρον τὸ ⸀σῶμα.
translation:
  text: But when they entered, they did not find the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'the body of the Lord Jesus.'
    reason: textual_variant
lexical_decisions:
- source_word: εἰσελθοῦσαι
  chosen: when they entered
  alternatives:
  - having entered
  - after entering
  lexicon: BDAG
  rationale: Aorist active participle, nominative feminine plural, referring back
    to the women. Rendered temporally in natural English as 'when they entered' rather
    than the more wooden 'having entered.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative progression with mild contrast. 'But' fits the movement
    from their arrival at the tomb to the unexpected result inside.
- source_word: οὐχ εὗρον
  chosen: they did not find
  alternatives:
  - they found not
  - they did not discover
  lexicon: BDAG
  rationale: Standard negated aorist verb of finding. 'Did not find' is idiomatic
    modern English and preserves the simple narrative force.
- source_word: τὸ σῶμα
  chosen: the body
  alternatives:
  - the corpse
  lexicon: BDAG
  rationale: σῶμα normally means 'body.' 'Corpse' is possible in burial context, but
    'body' is both more literal and better preserves the narrative connection to Jesus'
    bodily resurrection without adding interpretive coloration beyond the Greek.
