theological_decisions:
- issue: Whether to specify whose body is meant
  chosen_reading: the body
  alternative_readings:
  - the body of the Lord Jesus
  rationale: The earliest and shorter reading in the provided Greek text is simply
    'the body.' The translation should not import the longer expansion found in some
    manuscripts when it is absent from the source text supplied.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
