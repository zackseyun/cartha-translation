theological_decisions:
- issue: Narrative emphasis on the identity of the approaching figure
  chosen_reading: Jesus himself came near
  alternative_readings:
  - Jesus came near
  rationale: The text emphasizes that the risen Jesus personally approached them.
    This is a grammatical emphasis, not an added doctrinal inference, and should be
    retained in translation.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
