id: LUK.24.51
reference: Luke 24:51
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ εὐλογεῖν αὐτὸν αὐτοὺς διέστη ἀπ’ αὐτῶν ⸂[καὶ ἀνεφέρετο εἰς
    τὸν οὐρανόν]⸃.
translation:
  text: And it happened that, while he was blessing them, he parted from them and
    was carried up into heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit 'and was carried up into heaven.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: A common Lukan narrative formula. 'It happened' preserves the event-marking
    function in readable modern English without archaic tone.
- source_word: ἐν τῷ εὐλογεῖν
  chosen: while he was blessing
  alternatives:
  - as he blessed
  - in the act of blessing
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous action. 'While
    he was blessing' clearly conveys ongoing action at the moment of departure.
- source_word: εὐλογεῖν
  chosen: blessing
  alternatives:
  - speaking a blessing over
  lexicon: BDAG
  rationale: The verb means to bless. The simple English participial form is natural
    and sufficient here.
- source_word: διέστη ἀπ’ αὐτῶν
  chosen: he parted from them
  alternatives:
  - he withdrew from them
  - he departed from them
  lexicon: BDAG
  rationale: διΐστημι here denotes separation/departure. 'Parted from them' is concise,
    natural, and fits the physical leave-taking context.
- source_word: ἀνεφέρετο
  chosen: was carried up
  alternatives:
  - was taken up
  - was borne up
  lexicon: BDAG
  rationale: The imperfect/passive-form verb naturally conveys being taken upward.
    'Was carried up' preserves the passive sense without overinterpreting agency;
    'was taken up' is also possible but slightly more idiomatic than transparent.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - into the sky
  - to heaven
  lexicon: BDAG
  rationale: In this context οὐρανός refers to heaven, not merely the visible sky.
    'Into heaven' is the standard and contextually appropriate rendering.
