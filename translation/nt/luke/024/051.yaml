theological_decisions:
- issue: Bracketed clause καὶ ἀνεφέρετο εἰς τὸν οὐρανόν
  chosen_reading: Included in the main text with a textual-variant footnote
  alternative_readings:
  - Omit the clause as a likely later addition in some textual judgments
  rationale: The SBLGNT presents the clause in brackets, signaling textual uncertainty.
    Because the clause is present in the provided source text and coheres with Luke-Acts,
    it is translated in the main text, while the uncertainty is preserved explicitly
    in a footnote for auditability rather than silently resolved.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant alternatives in footnotes.
