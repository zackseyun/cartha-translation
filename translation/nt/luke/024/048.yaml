id: LUK.24.48
reference: Luke 24:48
source:
  edition: SBLGNT
  text: ὑμεῖς ⸀ἐστε μάρτυρες τούτων.
translation:
  text: You are witnesses of these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'You are witnesses of these.' The Greek demonstrative refers
      to the events Jesus has just spoken about.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun used explicitly for emphasis. English 'You'
    captures the subject naturally; the emphatic force is sufficiently conveyed by
    the explicit subject with 'are,' though 'you yourselves' is a possible more marked
    alternative.
- source_word: ἐστε
  chosen: are
  lexicon: BDAG
  rationale: Present indicative of 'to be,' straightforwardly rendered as 'are.'
- source_word: μάρτυρες
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: The standard sense here is those who bear testimony to what they have
    seen and heard. 'Witnesses' is the natural and established English equivalent
    and fits the Lukan context of apostolic testimony.
- source_word: τούτων
  chosen: of these things
  alternatives:
  - of these
  - to these things
  lexicon: BDAG
  rationale: Genitive plural demonstrative referring back to the events Jesus has
    just described. 'Of these things' makes the referent explicit and idiomatic in
    English. 'Of these' is possible but less clear; 'to these things' would suggest
    a different syntactic relation.
