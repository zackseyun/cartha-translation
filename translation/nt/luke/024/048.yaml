theological_decisions:
- issue: Force of the disciples' role as μάρτυρες
  chosen_reading: The verse identifies the disciples as those who bear testimony to
    the events just recounted, without importing later technical martyrdom connotations.
  alternative_readings:
  - The term may also resonate with the later Christian sense associated with martyrdom.
  rationale: In this immediate context, Jesus is commissioning testimony concerning
    his suffering, resurrection, and the proclaimed message. While μάρτυς later develops
    associations with martyrdom, the plain sense here is testimonial witness, and
    the translation should not overread later theological development into the verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
