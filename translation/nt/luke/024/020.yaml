theological_decisions:
- issue: Agency in Jesus' execution
  chosen_reading: The verse is translated with direct agency ('crucified him') as
    stated in the Greek, while understood as responsibility rather than necessarily
    manual execution.
  alternative_readings:
  - had him crucified
  rationale: The Greek uses an active plural verb with the chief priests and rulers
    as subject. Rendering it directly preserves the text's attribution of culpability.
    A more interpretive 'had him crucified' clarifies historical mediation through
    Roman execution but adds explanatory nuance beyond the wording.
  doctrine_reference: Translation philosophy §1, §3, §5
