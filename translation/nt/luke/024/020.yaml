id: LUK.24.20
reference: Luke 24:20
source:
  edition: SBLGNT
  text: ὅπως τε παρέδωκαν αὐτὸν οἱ ἀρχιερεῖς καὶ οἱ ἄρχοντες ἡμῶν εἰς κρίμα θανάτου
    καὶ ἐσταύρωσαν αὐτόν.
translation:
  text: and how our chief priests and rulers handed him over for a sentence of death
    and crucified him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a death sentence' or 'for condemnation to death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had him crucified,' making explicit that the leaders were responsible
      for the execution though Roman authorities carried it out.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως τε
  chosen: and how
  alternatives:
  - how
  - that
  lexicon: BDAG
  rationale: In this narrative continuation, ὅπως introduces the content of what is
    being recounted ('how...'), and τε adds connective force. 'And how' best reflects
    the discourse flow from the previous verse without over-literal awkwardness.
- source_word: παρέδωκαν
  chosen: handed ... over
  alternatives:
  - delivered over
  - turned over
  - betrayed
  lexicon: BDAG
  rationale: παραδίδωμι commonly means 'hand over/deliver over.' Here it refers to
    the leaders' act of surrendering Jesus to judicial execution. 'Handed over' is
    natural modern English and preserves the juridical nuance better than 'betrayed,'
    which would import a narrower sense not required here.
- source_word: οἱ ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: The plural ἀρχιερεῖς in Second Temple/Jewish leadership contexts is conventionally
    and accurately rendered 'chief priests,' referring to the high-priestly leadership
    class rather than multiple simultaneous high priests in the strictest sense.
- source_word: οἱ ἄρχοντες ἡμῶν
  chosen: our rulers
  alternatives:
  - our leaders
  - our authorities
  lexicon: BDAG
  rationale: ἄρχοντες denotes ruling authorities or leaders. 'Rulers' is slightly
    more formal and fits the judicial-political context. The possessive ἡμῶν is retained
    as 'our,' reflecting the speakers' identification with the Jewish people.
- source_word: εἰς κρίμα θανάτου
  chosen: for a sentence of death
  alternatives:
  - to a death sentence
  - for condemnation to death
  - for judgment of death
  lexicon: BDAG
  rationale: κρίμα can mean judgment, verdict, or sentence. In this context, with
    θανάτου, it refers to a judicial outcome resulting in execution. 'For a sentence
    of death' is clear, idiomatic, and preserves the legal sense. 'To a death sentence'
    is also possible, but 'for' better matches the force of εἰς here in English idiom.
- source_word: ἐσταύρωσαν
  chosen: crucified
  alternatives:
  - had him crucified
  lexicon: BDAG
  rationale: σταυρόω means 'crucify.' Although historically the leaders were not the
    direct physical executioners, the Greek states the action straightforwardly, attributing
    responsibility to them. 'Crucified' preserves that rhetorical and moral force
    without adding explanatory words not present in the text.
