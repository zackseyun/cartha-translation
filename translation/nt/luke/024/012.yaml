theological_decisions:
- issue: Interpretation of πρὸς αὑτὸν
  chosen_reading: to himself
  alternative_readings:
  - home
  rationale: This is not a major doctrinal issue, but it is a meaningful interpretive
    decision. The Greek reflexive pronoun naturally yields 'to himself,' suggesting
    inward reflection or solitary departure. Because 'home' appears in some translation
    traditions as an interpretive smoothing, it is preserved in a footnote rather
    than placed in the main text.
  doctrine_reference: Translation philosophy §1, §3
