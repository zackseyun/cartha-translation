id: LUK.24.12
reference: Luke 24:12
source:
  edition: SBLGNT
  text: ⸂Ὁ δὲ Πέτρος ἀναστὰς ἔδραμεν ἐπὶ τὸ μνημεῖον· καὶ παρακύψας βλέπει τὰ ⸀ὀθόνια
    μόνα· καὶ ἀπῆλθεν πρὸς ⸀αὑτὸν θαυμάζων τὸ γεγονός.⸃
translation:
  text: But Peter got up and ran to the tomb; and stooping to look in, he sees the
    linen cloths alone, and he went away to himself, marveling at what had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "home." The Greek literally says "to himself," which may indicate that
      Peter went away by himself or in inward reflection.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts omit this entire verse.
    reason: textual_variant
lexical_decisions:
- source_word: ἀναστὰς
  chosen: got up
  alternatives:
  - rose
  - stood up
  lexicon: BDAG
  rationale: Aorist participle indicating Peter's immediate movement from his prior
    state into action. 'Got up' is natural modern English and preserves the sequential
    force without sounding overly formal.
- source_word: ἔδραμεν
  chosen: ran
  alternatives:
  - hurried
  - ran off
  lexicon: BDAG
  rationale: The verb plainly denotes running. 'Ran' is the most direct and unembellished
    rendering.
- source_word: ἐπὶ τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - to the grave
  - to the memorial tomb
  lexicon: BDAG
  rationale: With motion, ἐπί here is idiomatically directional. 'Tomb' is the standard
    and contextually precise rendering for μνημεῖον in the burial narrative.
- source_word: παρακύψας
  chosen: stooping to look in
  alternatives:
  - bending down
  - peering in
  lexicon: BDAG
  rationale: The participle conveys bending/stooping in order to look into the tomb.
    Rendering both posture and visual action in English best captures the sense.
- source_word: βλέπει
  chosen: he sees
  alternatives:
  - he saw
  - he looks
  lexicon: BDAG
  rationale: The present tense is vivid in narrative. 'He sees' preserves the historical
    present rather than flattening it to a simple past.
- source_word: ὀθόνια
  chosen: the linen cloths
  alternatives:
  - the burial cloths
  - the linen wrappings
  lexicon: BDAG
  rationale: ὀθόνια refers to linen cloths associated with burial. 'Linen cloths'
    is transparent and avoids over-specifying beyond the term itself.
- source_word: μόνα
  chosen: alone
  alternatives:
  - by themselves
  - only
  lexicon: BDAG
  rationale: μόνα emphasizes that the cloths were there without the body. 'Alone'
    is concise and preserves that emphasis.
- source_word: πρὸς αὑτὸν
  chosen: to himself
  alternatives:
  - home
  - in himself
  lexicon: BDAG
  rationale: The Greek most naturally means 'to himself' or 'by himself,' indicating
    Peter's departure in a reflective state. Some interpreters take it as 'home,'
    but that is less directly expressed by the wording and should be preserved as
    an alternative in a footnote rather than adopted in the main text.
- source_word: θαυμάζων
  chosen: marveling
  alternatives:
  - wondering
  - amazed
  lexicon: BDAG
  rationale: The participle denotes ongoing astonishment as he departed. 'Marveling'
    preserves the sense of wonder without forcing a stronger emotional term.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - the thing that had happened
  - what had come to pass
  lexicon: BDAG
  rationale: The perfect participle used substantivally refers to the event that had
    occurred. 'What had happened' is idiomatic modern English and accurately conveys
    the completed event.
