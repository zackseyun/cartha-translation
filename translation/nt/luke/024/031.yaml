theological_decisions:
- issue: Nature of Jesus' disappearance
  chosen_reading: he became invisible to them
  alternative_readings:
  - he vanished from them
  - he disappeared from their sight
  rationale: The Greek wording uses ἄφαντος with γίνομαι, which more literally indicates
    becoming unseen/invisible. Rendering it this way preserves the event without over-specifying
    its mechanism, maintaining the narrative's theological mystery rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
