id: LUK.24.31
reference: Luke 24:31
source:
  edition: SBLGNT
  text: αὐτῶν δὲ διηνοίχθησαν οἱ ὀφθαλμοὶ καὶ ἐπέγνωσαν αὐτόν· καὶ αὐτὸς ἄφαντος ἐγένετο
    ἀπ’ αὐτῶν.
translation:
  text: Then their eyes were opened, and they recognized him; and he became invisible
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he vanished from them' or 'he disappeared from their sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηνοίχθησαν
  chosen: were opened
  alternatives:
  - were opened up
  lexicon: BDAG
  rationale: Aorist passive of διανοίγω. 'Were opened' is the natural English passive
    and preserves the sense that their perception was enabled rather than self-generated.
- source_word: οἱ ὀφθαλμοὶ
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: The Greek has the nominative subject 'the eyes' with the preceding genitive
    pronoun αὐτῶν. English idiom requires 'their eyes.'
- source_word: ἐπέγνωσαν
  chosen: recognized
  alternatives:
  - knew
  - fully recognized
  lexicon: BDAG
  rationale: ἐπιγινώσκω here denotes coming to recognize someone previously not identified.
    'Recognized' fits the Emmaus context better than the more wooden 'knew.'
- source_word: ἄφαντος
  chosen: invisible
  alternatives:
  - vanished
  - out of sight
  lexicon: BDAG
  rationale: ἄφαντος means 'invisible' or 'not visible.' Combined with ἐγένετο ('became'),
    the most direct rendering is 'became invisible.' This avoids importing the stronger
    idea of disappearance as annihilation or teleportation, while still conveying
    that he was no longer seen.
- source_word: ἐγένετο ἀπ’ αὐτῶν
  chosen: to them
  alternatives:
  - from them
  - out of their sight
  lexicon: BDAG
  rationale: Literally 'became from them,' an idiom meaning he was no longer visible
    in relation to them. In English, 'became invisible to them' is clearer and preserves
    the relational force of ἀπό without awkwardness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative development. 'Then' gives smooth English progression
    in context.
