theological_decisions:
- issue: Identity of the two figures
  chosen_reading: Render them as 'two men' in the main text, matching the Greek narrative
    presentation.
  alternative_readings:
  - two angels
  rationale: Although the wider context identifies them as heavenly messengers, this
    verse itself presents them as 'two men.' To avoid importing information from nearby
    verses into this line, the translation keeps the immediate wording and leaves
    theological identification to context.
  doctrine_reference: Translation philosophy §1, §3
