id: LUK.24.4
reference: Luke 24:4
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ ⸀ἀπορεῖσθαι αὐτὰς περὶ τούτου καὶ ἰδοὺ ἄνδρες δύο ἐπέστησαν
    αὐταῖς ἐν ⸂ἐσθῆτι ἀστραπτούσῃ⸃.
translation:
  text: And it happened, while they were perplexed about this, that behold, two men
    stood by them in dazzling clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in clothing flashing like lightning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Common Lukan narrative formula. 'It happened' preserves the event-introducing
    function without archaic tone ('it came to pass').
- source_word: ἐν τῷ ἀπορεῖσθαι
  chosen: while they were perplexed
  alternatives:
  - as they were at a loss
  - while they were wondering
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal, best rendered 'while.'
    ἀπορέω conveys being at a loss or perplexed rather than mere curiosity.
- source_word: αὐτὰς
  chosen: they
  alternatives:
  - the women
  lexicon: BDAG
  rationale: The pronoun refers back to the women in context. English uses the subject
    pronoun naturally here; the antecedent need not be repeated in the verse translation
    itself.
- source_word: περὶ τούτου
  chosen: about this
  alternatives:
  - about this matter
  - concerning this
  lexicon: BDAG
  rationale: A straightforward referential phrase pointing to the matter just described,
    rendered idiomatically in modern English.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to a sudden development.
    'Behold' preserves the markedness and narrative vividness better than the flatter
    'look'; 'suddenly' is interpretive rather than lexical.
- source_word: ἄνδρες δύο
  chosen: two men
  alternatives:
  - two males
  lexicon: BDAG
  rationale: ἀνήρ normally means 'man' rather than the more generic 'person.' In context
    these are angelic messengers appearing in male form, so 'two men' best matches
    the narrative presentation.
- source_word: ἐπέστησαν αὐταῖς
  chosen: stood by them
  alternatives:
  - appeared to them
  - came upon them
  lexicon: BDAG
  rationale: ἐφίστημι here denotes sudden presence/standing near. 'Stood by them'
    preserves the spatial sense and avoids over-interpreting with 'appeared,' though
    the suddenness is already signaled by ἰδού.
- source_word: ἐν ἐσθῆτι ἀστραπτούσῃ
  chosen: in dazzling clothing
  alternatives:
  - in clothing that flashed like lightning
  - in radiant apparel
  lexicon: BDAG
  rationale: ἐσθής is clothing/apparel; ἀστραπτούσῃ literally evokes lightning-like
    flashing. 'Dazzling clothing' is natural English that preserves the brilliance
    without cumbersome phrasing; the more literal lightning imagery is worth preserving
    in a footnote.
