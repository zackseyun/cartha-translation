id: LUK.24.42
reference: Luke 24:42
source:
  edition: SBLGNT
  text: οἱ δὲ ἐπέδωκαν αὐτῷ ἰχθύος ὀπτοῦ ⸀μέρος·
translation:
  text: And they gave him a piece of broiled fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some later manuscripts add, 'and from a honeycomb.'
    reason: textual_variant
lexical_decisions:
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - Now they
  - So they
  - But they
  lexicon: BDAG
  rationale: οἱ functions substantivally ('they'), referring back to the gathered
    disciples; δέ is a mild connective. 'And they' gives natural English continuity
    without overstating contrast.
- source_word: ἐπέδωκαν
  chosen: gave
  alternatives:
  - handed
  - offered
  lexicon: BDAG
  rationale: Aorist active indicative of ἐπιδίδωμι, here meaning to give or hand over.
    'Gave' is the most natural and sufficiently direct rendering in context.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative indirect object is naturally expressed in English as 'him' after
    'gave'; 'to him' would also be possible but is less smooth.
- source_word: ἰχθύος ὀπτοῦ μέρος
  chosen: a piece of broiled fish
  alternatives:
  - a portion of cooked fish
  - a piece of roasted fish
  lexicon: BDAG
  rationale: 'μέρος is the head noun (''piece/portion''), with ἰχθύος ὀπτοῦ as a genitive
    construction describing what the piece consisted of: fish that had been cooked
    by roasting/broiling. ''Broiled fish'' is idiomatic modern English and fits the
    likely sense of ὀπτός better than the broader ''cooked.'''
- source_word: ὀπτοῦ
  chosen: broiled
  alternatives:
  - roasted
  - cooked
  lexicon: BDAG
  rationale: ὀπτός denotes food prepared by roasting or broiling. 'Broiled' is a precise
    and readable culinary equivalent in modern English.
