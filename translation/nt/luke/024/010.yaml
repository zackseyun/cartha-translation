theological_decisions:
- issue: Identification of Μαρία ἡ Ἰακώβου
  chosen_reading: Mary the mother of James
  alternative_readings:
  - Mary of James
  - Mary, wife of James
  rationale: The Greek leaves the exact relationship implicit, but English normally
    requires an explicit relation. In Gospel naming conventions this genitive commonly
    identifies a woman by her son; 'mother of James' is the most likely and clearest
    reading, while alternatives are preserved in a footnote because the Greek itself
    is compressed.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where the source is genuinely ambiguous.
