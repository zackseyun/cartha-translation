id: LUK.24.10
reference: Luke 24:10
source:
  edition: SBLGNT
  text: ἦσαν δὲ ἡ Μαγδαληνὴ Μαρία καὶ Ἰωάννα καὶ Μαρία ⸀ἡ Ἰακώβου καὶ αἱ λοιπαὶ σὺν
    αὐταῖς· ⸀ἔλεγον πρὸς τοὺς ἀποστόλους ταῦτα.
translation:
  text: Now they were Mary Magdalene, Joanna, Mary the mother of James, and the other
    women with them, who were telling these things to the apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally 'Mary of James'; this likely means 'Mary the mother of James,'
      though 'Mary, wife of James' is also possible.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν
  chosen: they were
  alternatives:
  - it was
  lexicon: BDAG
  rationale: Imperfect plural of εἰμί introduces the women just mentioned in context;
    English supplies the plural pronoun naturally.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition. 'Now' is natural modern English
    and preserves the discourse shift without overstating sequence.
- source_word: ἡ Μαγδαληνὴ Μαρία
  chosen: Mary Magdalene
  alternatives:
  - Mary the Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration/order for the personal name and epithet;
    readable and conventional without loss of meaning.
- source_word: Ἰωάννα
  chosen: Joanna
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: Μαρία ἡ Ἰακώβου
  chosen: Mary the mother of James
  alternatives:
  - Mary of James
  - Mary, wife of James
  lexicon: BDAG
  rationale: The genitive is elliptical and in this naming formula is most naturally
    understood in English as a familial identifier. 'Mother of James' is the clearest
    idiomatic rendering and matches common usage, while the more literal 'of James'
    is too opaque in English.
- source_word: αἱ λοιπαὶ σὺν αὐταῖς
  chosen: the other women with them
  alternatives:
  - the rest with them
  - the others with them
  lexicon: BDAG
  rationale: Because the article and adjective are feminine plural and the referents
    are the women at the tomb, 'the other women' makes the implied noun explicit in
    English.
- source_word: ἔλεγον
  chosen: were telling
  alternatives:
  - told
  - were saying
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing or repeated report; 'were telling'
    preserves that better than simple past 'told'.
- source_word: πρὸς τοὺς ἀποστόλους
  chosen: to the apostles
  alternatives:
  - to the emissaries
  lexicon: BDAG
  rationale: ἀπόστολος is well established in English as 'apostle'; here it refers
    specifically to Jesus' apostolic circle, so the traditional term is both accurate
    and clear.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative points back to the reported events and message;
    'these things' preserves the plural reference.
