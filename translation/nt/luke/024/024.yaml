id: LUK.24.24
reference: Luke 24:24
source:
  edition: SBLGNT
  text: καὶ ἀπῆλθόν τινες τῶν σὺν ἡμῖν ἐπὶ τὸ μνημεῖον, καὶ εὗρον οὕτως καθὼς ⸀καὶ
    αἱ γυναῖκες εἶπον, αὐτὸν δὲ οὐκ εἶδον.
translation:
  text: And some of those with us went to the tomb and found it just as the women
    had said, but they did not see him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπῆλθόν
  chosen: went
  alternatives:
  - left
  - went away
  lexicon: BDAG
  rationale: Aorist indicative of ἀπέρχομαι, here simply narrating movement to the
    tomb. 'Went' is natural modern English and sufficient in context; 'left' would
    overemphasize departure rather than arrival at the destination.
- source_word: τινες τῶν σὺν ἡμῖν
  chosen: some of those with us
  alternatives:
  - some of our companions
  - some of those who were with us
  lexicon: BDAG
  rationale: The phrase identifies a subset of the group accompanying the speakers.
    'Some of those with us' stays close to the Greek structure while remaining readable.
    'Our companions' is possible but slightly more interpretive.
- source_word: ἐπὶ τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - to the grave
  - to the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in the resurrection narrative refers to Jesus' burial place.
    'Tomb' is the standard and most precise rendering in this context; 'grave' is
    less specific.
- source_word: εὗρον
  chosen: found
  alternatives:
  - discovered
  lexicon: BDAG
  rationale: Simple narrative verb meaning 'found.' 'Discovered' is possible but stylistically
    heavier than the Greek requires.
- source_word: οὕτως καθὼς καὶ αἱ γυναῖκες εἶπον
  chosen: just as the women had said
  alternatives:
  - exactly as the women said
  - as the women also had said
  lexicon: BDAG
  rationale: 'οὕτως καθὼς expresses correspondence: things were as reported. Rendering
    with past perfect in English (''had said'') clarifies sequence. The καί before
    αἱ γυναῖκες likely has an additive/emphatic sense (''also/even''), but explicit
    ''also'' is not necessary in idiomatic English because the comparison is already
    clear.'
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: The pronoun refers to Jesus. Retaining 'him' preserves the Greek cohesion
    and avoids unnecessary explicitation.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - however
  lexicon: BDAG
  rationale: δέ marks a mild contrast between finding the tomb as reported and not
    seeing Jesus. 'But' communicates this contrast naturally.
- source_word: οὐκ εἶδον
  chosen: they did not see
  alternatives:
  - they did not find
  - they saw no one
  lexicon: BDAG
  rationale: The verb is ὁράω, 'to see,' not 'to find.' The subject remains the same
    unnamed group. 'They did not see him' preserves the straightforward force of the
    Greek.
