theological_decisions:
- issue: Resurrection narrative wording
  chosen_reading: The verse reports that the visitors confirmed the women's report
    about the tomb's condition, yet did not see Jesus himself.
  rationale: The translation preserves the narrative distinction in the Greek between
    finding the tomb as reported and not seeing Jesus, without importing harmonizations
    from parallel accounts.
  doctrine_reference: Preserve theological tension rather than resolve it.
