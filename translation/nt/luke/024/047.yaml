theological_decisions:
- issue: Relation of repentance and forgiveness in the proclamation
  chosen_reading: The message proclaimed is 'repentance for the forgiveness of sins,'
    without making the verse specify a full ordo salutis beyond the text.
  alternative_readings:
  - '''repentance and forgiveness of sins'' as two coordinate items proclaimed'
  - '''repentance that leads to forgiveness of sins'''
  rationale: The Greek can be read with both nouns as content of proclamation, but
    the sense naturally links repentance with forgiveness. The translation preserves
    that connection while avoiding importing a more detailed doctrinal scheme than
    the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἔθνη
  chosen_reading: '''all the nations'''
  alternative_readings:
  - '''all nations'''
  - '''all the Gentiles'''
  rationale: The verse describes the worldwide scope of the gospel after the resurrection.
    'Nations' preserves the lexical form and avoids narrowing the reference to non-Jews
    only, while still including Gentiles within the universal scope.
