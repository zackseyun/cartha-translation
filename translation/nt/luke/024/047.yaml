id: LUK.24.47
reference: Luke 24:47
source:
  edition: SBLGNT
  text: καὶ κηρυχθῆναι ἐπὶ τῷ ὀνόματι αὐτοῦ μετάνοιαν ⸀καὶ ἄφεσιν ἁμαρτιῶν εἰς πάντα
    τὰ ἔθνη— ⸀ἀρξάμενοι ἀπὸ Ἰερουσαλήμ·
translation:
  text: and that repentance for the forgiveness of sins should be proclaimed in his
    name to all the nations, beginning from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and forgiveness of sins'; the Greek may be taken as two coordinated
      elements of the message proclaimed.
    reason: alternative_reading
  - marker: b
    text: Or 'to all nations.' The Greek term can also mean 'Gentiles' in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρυχθῆναι
  chosen: should be proclaimed
  alternatives:
  - be preached
  - be heralded
  lexicon: BDAG
  rationale: Aorist passive infinitive dependent on the preceding scriptural-fulfillment
    context ('that ... should be proclaimed'). 'Proclaimed' is clear modern English
    and preserves the public-announcement sense without restricting the action to
    formal preaching settings.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  chosen: in his name
  alternatives:
  - on the basis of his name
  - upon his name
  lexicon: BDAG
  rationale: The idiom with ἐπί + dative and 'name' here denotes authorization/grounding
    in the person and authority of Jesus. 'In his name' is the most natural English
    equivalent and preserves the theological force.
- source_word: μετάνοιαν
  chosen: repentance
  alternatives:
  - a call to repentance
  lexicon: BDAG
  rationale: Standard rendering for μετάνοια, denoting repentance/turning. The noun
    is kept rather than paraphrased to preserve the concise coordinate structure with
    'forgiveness of sins.'
- source_word: καὶ ἄφεσιν ἁμαρτιῶν
  chosen: for the forgiveness of sins
  alternatives:
  - and forgiveness of sins
  - for release from sins
  lexicon: BDAG
  rationale: ἄφεσις commonly means release, pardon, or forgiveness. Here 'forgiveness
    of sins' is the established and contextually precise sense. Rendering the phrase
    as 'repentance for the forgiveness of sins' reflects the close relation of the
    two accusatives under the infinitive and communicates the message being proclaimed.
- source_word: εἰς πάντα τὰ ἔθνη
  chosen: to all the nations
  alternatives:
  - to all nations
  - among all the nations
  - to all the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean nations or Gentiles. In this resurrection-commission context,
    the scope is universal peoples, not merely a Jew/Gentile contrast, so 'all the
    nations' best preserves the wording and allusive force of worldwide mission.
- source_word: ἀρξάμενοι ἀπὸ Ἰερουσαλήμ
  chosen: beginning from Jerusalem
  alternatives:
  - starting from Jerusalem
  - beginning at Jerusalem
  lexicon: BDAG
  rationale: The participle is attendant to the commission and indicates the starting
    point of the proclamation. 'Beginning from Jerusalem' is natural English and preserves
    the directional nuance of ἀπό.
