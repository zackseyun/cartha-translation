theological_decisions:
- issue: Rendering Jesus' statement about his bodily reality after resurrection
  chosen_reading: 'Explicitly bodily language retained: ''a spirit does not have flesh
    and bones as you see that I have.'''
  alternative_readings:
  - More interpretive renderings that soften the bodily contrast
  rationale: The Greek strongly emphasizes tangible corporeality through imperatives
    of sight and touch and through 'flesh and bones.' In keeping with Chalcedonian
    orthodoxy and the text's plain sense, the translation preserves the affirmation
    of the risen Jesus' real embodied presence without adding doctrinal explanation
    beyond the verse itself.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD); Translation
    philosophy: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T12:44:03Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/024/039.json
  category: awkward_english
  tier: 1
  from: Look at my hands and my feet, that it is I myself.
  to: Look at my hands and my feet, for it is I myself.
  rationale: 'The current rendering of the first `ὅτι` clause is grammatically awkward
    in English. While `ὅτι` can introduce the content of a verb of seeing, the result
    here is stilted. A causal sense for `ὅτι` (''for'', ''because'') is also well-attested
    and fits the context perfectly: Jesus is giving the reason why the disciples should
    inspect his hands and feet. This change results in a more natural English sentence
    and creates a clearer logical parallel with the second `ὅτι` in the verse, which
    the draft correctly translates with the causal ''because''.'
