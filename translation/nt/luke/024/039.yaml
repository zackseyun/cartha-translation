id: LUK.24.39
reference: Luke 24:39
source:
  edition: SBLGNT
  text: ἴδετε τὰς χεῖράς μου καὶ τοὺς πόδας μου ὅτι ⸂ἐγώ εἰμι αὐτός⸃· ψηλαφήσατέ με
    καὶ ἴδετε, ὅτι πνεῦμα σάρκα καὶ ὀστέα οὐκ ἔχει καθὼς ἐμὲ θεωρεῖτε ἔχοντα.
translation:
  text: Look at my hands and my feet, that it is I myself. Touch me and see, because
    a spirit does not have flesh and bones as you see that I have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''that I am he.'' The Greek expression is emphatic: ''I myself am [the
      one].'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'feel me' or 'handle me.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'a ghost.' The Greek word is 'spirit.'
    reason: alternative_reading
  - marker: d
    text: Or 'Look at my hands and my feet, that it is I myself.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἴδετε
  chosen: Look at / see
  alternatives:
  - behold
  lexicon: BDAG
  rationale: Aorist imperative plural calling for immediate visual inspection. 'Look
    at' is natural modern English in the first instance; the second occurrence is
    rendered 'see' for readable variation while preserving the same basic force.
- source_word: χεῖράς ... πόδας
  chosen: hands ... feet
  lexicon: BDAG
  rationale: Concrete bodily terms are translated straightforwardly. The paired mention
    underscores physical identity, likely including the visible wounds.
- source_word: ὅτι ἐγώ εἰμι αὐτός
  chosen: that it is I myself
  alternatives:
  - that I am he
  - that I myself am the one
  lexicon: BDAG
  rationale: The expression is emphatic, with ἐγώ and αὐτός reinforcing personal identity.
    'It is I myself' communicates recognition and emphasis in idiomatic English without
    importing theologically loaded overtones from 'I am he'.
- source_word: ψηλαφήσατέ
  chosen: Touch
  alternatives:
  - feel
  - handle
  lexicon: BDAG
  rationale: The verb can mean touch or feel by handling. 'Touch' is clear and natural,
    while still conveying physical verification. 'Handle' is more traditional but
    less natural in contemporary English.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - a ghost
  lexicon: BDAG
  rationale: In context Jesus contrasts his bodily reality with a non-corporeal being.
    'Spirit' is the most direct lexical equivalent; 'ghost' is possible but can sound
    culturally misleading in modern English.
- source_word: σάρκα καὶ ὀστέα
  chosen: flesh and bones
  alternatives:
  - flesh and bone
  lexicon: BDAG
  rationale: This is a literal bodily expression. 'Flesh and bones' is the established
    and natural English equivalent. Here σάρξ is literal, not metaphorical, in line
    with the doctrine's context-dependent guidance.
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces the comparison between what a spirit lacks and what the disciples
    observe in Jesus. 'As' is sufficient and idiomatic.
- source_word: θεωρεῖτε
  chosen: you see
  alternatives:
  - you observe
  - you behold
  lexicon: BDAG
  rationale: The verb can imply attentive observation, but 'you see' is the most natural
    English in this context and fits the immediate empirical appeal.
- source_word: ἔχοντα
  chosen: that I have
  alternatives:
  - me having
  - me possessing
  lexicon: BDAG
  rationale: 'The participle modifies ἐμέ and is best rendered idiomatically in English
    as a finite clause: ''that I have.'' This preserves the sense without awkward
    literalism.'
