id: LUK.24.38
reference: Luke 24:38
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Τί τεταραγμένοι ἐστέ, καὶ διὰ τί διαλογισμοὶ ἀναβαίνουσιν
    ἐν ⸂τῇ καρδίᾳ⸃ ὑμῶν;
translation:
  text: And he said to them, “Why are you troubled, and why do doubts arise in your
    heart?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “thoughts” or “reasonings” for “doubts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: 'Although τί is formally ''what,'' in this idiom with a predicate adjective
    and εἰμί it functions adverbially to ask the reason or cause: ''Why are you troubled?''
    This is the most natural and accurate English rendering.'
- source_word: τεταραγμένοι
  chosen: troubled
  alternatives:
  - disturbed
  - agitated
  lexicon: BDAG
  rationale: Perfect passive participle of ταράσσω describing their present state
    of inner disturbance. 'Troubled' is natural English and preserves the emotional
    force without overtranslation.
- source_word: διαλογισμοὶ
  chosen: doubts
  alternatives:
  - thoughts
  - reasonings
  - questionings
  lexicon: BDAG
  rationale: In this context Jesus addresses the disciples' uncertainty and hesitation
    about his appearance. While the noun can mean 'thoughts' or 'reasonings,' 'doubts'
    best captures the negative, wavering sense demanded by the immediate context.
- source_word: ἀναβαίνουσιν
  chosen: arise
  alternatives:
  - come up
  - ascend
  lexicon: BDAG
  rationale: Literally 'go up,' but idiomatically for internal mental activity 'arise'
    is the best English equivalent and fits naturally with 'doubts'.
- source_word: ἐν τῇ καρδίᾳ ὑμῶν
  chosen: in your heart
  alternatives:
  - in your hearts
  lexicon: BDAG
  rationale: The Greek uses singular καρδίᾳ with plural ὑμῶν, a common distributive
    construction. 'In your heart' preserves the singular form while still applying
    individually to the group. English could also idiomatically use 'in your hearts,'
    but the singular is closer to the source.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: BDAG
  rationale: '''Heart'' is the standard and theologically resonant rendering, encompassing
    the inner person, including thought and disposition. Rendering it as ''mind''
    would narrow the sense too much.'
