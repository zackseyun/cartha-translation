theological_decisions:
- issue: Anthropological term καρδία
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner being
  rationale: The verse speaks of internal reasoning located 'in the heart,' reflecting
    biblical anthropology in which the heart includes thought as well as emotion.
    Retaining 'heart' preserves this theological texture rather than reducing it to
    a modern psychological category.
  doctrine_reference: Translation philosophy §1, §6
